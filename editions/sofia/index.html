<script>
const P = [
  {id:1,n:"Alexander Nevsky Cathedral — Downtown",a:"Downtown",v:["history", "beautiful"],d:20,s:"Neo-Byzantine golden dome dominating the skyline since 1912",st:"You step into the grandeur of Bulgaria\'s most iconic cathedral. Golden mosaics catch the light, Orthodox chants echo through soaring arches, and worshippers light candles before towering icons. The crypt holds relics of Bulgarian saints and martyrs.",im:"It\'s 2024. You stand beneath the soaring dome, phone silent, absorbed in centuries of devotion.",t:"Free entry. Open daily 7am-7pm. Photography allowed inside.",c:["history_big"],r:"g",nn:"Александър Невски — Център",ns:"Най-впечатляващия храм в София с позлатен купол",nst:"Влизаш в величествената атмосфера на най-значимия храм на България. Позлатени мозайки блясват, православни песни отеквят в склепове, а вярващи запалват свещи пред иконите. Крипта съхранява мощите на светци.",nt:"Свободен вход. Открито всеки ден 7:00-19:00. Позволена фотография."},
  {id:2,n:"Roman Serdica Ruins — Largo Complex",a:"Largo",v:["history", "hidden"],d:15,s:"Ancient Roman city walls preserved beneath modern plaza, walkable through glass floor",st:"You walk on glass floors over 2,000-year-old Roman walls and streets. Tourists rarely notice this archaeological layer beneath their feet. The Largo metro station reveals three eras stacked vertically: Roman fortress, medieval church, Ottoman debris. Each layer tells Sofia\'s survival across empires.",im:"It\'s 2024. You stand where Roman soldiers once marched, their city\'s bones now your floor.",t:"Free access. Best viewed via metro station entrance. Guided tours available daily at 11am, 3pm.",c:["history_big"],r:"g",nn:"Останките на Сердика — Ларго",ns:"Древни римски стени на Сердика, видими под стъклена подова павета",nst:"Ходиш по стъклени подове над 2000-годишни римски стени. Туристите рядко забелязват тази археологическа слой под краката си. Метростанция Ларго разкрива три епохи наслагани вертикално.",nt:"Свободен достъп. Виждаш се чрез метростанцията. Водени обиколки ежедневно в 11:00 и 15:00."},
  {id:3,n:"Vitosha Boulevard — Golden Shopping Mile",a:"Downtown",v:["local", "beautiful"],d:10,s:"Sofia\'s pedestrian avenue lined with cafes, boutiques, and street performers",st:"You stroll beneath plane trees, pausing at outdoor cafes where Sofians nurse espressos for hours. Street musicians play classical covers. Designer boutiques alternate with vintage shops. Locals treat this as their living room—it\'s where deals are made, gossip exchanged, and the city\'s pulse felt.",im:"It\'s a warm autumn evening. You\'re one of hundreds promenading, watching the sun gold the trees.",t:"Fully walkable, free. Best 5-7pm when locals emerge. Cafes everywhere 2-8 BGN per coffee.",c:["local_only"],r:"g",nn:"Булевард Витоша — Разходна улица",ns:"Главната пешеходна булевард на София с кафенета и магазини",nst:"Разходиш се под платани, спираш в открити кафенета. Улични музиканти свирят класика. Дизайнерски магазини редуват с винтидж лавки. За софиянци това е тяхната хола.",nt:"Напълно пешеходна, свободна. Най-добре 17:00-19:00. Кафенета всички 2-8 лева."},
  {id:4,n:"National Palace of Culture (NDK) — Modern Hub",a:"South Park",v:["architecture", "beautiful"],d:25,s:"Massive brutalist congress hall with underground passages, concert venue, and panoramic rooftop",st:"The NDK rises like a concrete ship from the 1980s. Inside, soaring atriums echo footsteps. Exhibitions rotate constantly—contemporary art, photography, design. The rooftop offers unobstructed views to Vitosha Mountain. Underground passages connect surprising destinations. It\'s equal parts cultural institution and Soviet-era monument.",im:"It\'s 2024. You\'re lost in brutalist corridors, finding secret passages and unexpected galleries.",t:"Free entry to building. Exhibitions 5-10 BGN. Rooftop access during events. Concerts 20-80 BGN.",c:["architecture"],r:"g",nn:"Национален Дворец на Културата (НДК)",ns:"Огромна бруталистка сграда с подземни проходи и концертна зала",nst:"НДК се издига като бетонен кораб от 80-те. Вътре, грандиозни атриуми отекват. Изложби ротират постоянно. Покривът предлага непречени гледки към Витоша.",nt:"Свободен вход. Изложби 5-10 лева. Концерти 20-80 лева."},
  {id:5,n:"Boyana Church UNESCO — Medieval Frescoes",a:"Boyana",v:["history", "beautiful", "quiet"],d:60,s:"13th-century church with stunning Byzantine frescoes, UNESCO World Heritage on Vitosha\'s foothills",st:"The Boyana Church glows with 800-year-old frescoes—portraits of Bulgarian royalty, religious scenes rendered in jewel tones of lapis lazuli and vermillion. The paint still glimmers. You view from behind ropes, breathing in incense and history. Three architectural phases are visible: original 10th-century church, then 13th-century additions.",im:"It\'s 2024. A shaft of sunlight ignites a saint\'s golden halo painted centuries ago.",t:"8 BGN entry. Guided 45-min tours only (limited capacity). Reserve ahead in summer. 30min from city center by car/bus.",c:["history_big"],r:"g",nn:"Бойанска Церква — ЮНЕСКО",ns:"13-в. византийска църква с величествени фрески, ЮНЕСКО обект",nst:"Бойанската църква блясна с 800-годишни фрески. Портрети на български царе в лазурит и вермилион. Краската все още гръблеше. Виждаш три архитектурни фази.",nt:"8 лева. Само водени обиколки (ограничена капацитет). Резервирай предварително."},
  {id:6,n:"Cherni Vrah Peak — Vitosha Mountain",a:"Vitosha Mountain",v:["nature", "beautiful", "hidden"],d:90,s:"Sofia\'s tallest peak at 2,290m with cable car access and panoramic hiking trails",st:"You ascend the cable car, Sofia shrinking below. The peak offers 360-degree views: the city becomes a grid of lights, the Danube glints in the distance, and on clear days you see into five countries. The hiking down through beech forests takes three hours. Locals come here to think, to escape urban noise.",im:"It\'s a crisp dawn. You emerge above the clouds; Sofia lies in a blanket of fog below.",t:"Cable car: 12 BGN round trip. Hiking trails free and well-marked. Restaurant at peak (meals 15-25 BGN). Best May-October.",c:["nature"],r:"g",nn:"Чёрни Връх — Планина Витоша",ns:"Най-висок връх на Витоша с кабинков подемник и панорамни пътеки",nst:"Издигаш се с кабинката, София намалява под теб. Върхът дава панорамни гледки. Спускането през буков лес отнема три часа.",nt:"Кабинка: 12 лева. Пътеки свободни. Ресторант на върха 15-25 лева."},
  {id:7,n:"Aleko Hut — Mountain Village",a:"Vitosha Mountain",v:["nature", "quiet", "local"],d:75,s:"Alpine hut at 2,080m with cozy lodge, traditional food, and forest trails",st:"Aleko feels like stepping into a Balkan memory. A stone hut serves banitza (cheese pastry), shopska salad, and grilled meats. The owner\'s family has lived here for generations. You sit by a wood stove, watching mist roll through the pines. Locals arrive on weekends with children, hiking families stay overnight in dormitories.",im:"It\'s a foggy weekend. Woodsmoke curls from the chimney; you hear Bulgarian laughter inside.",t:"Meals 10-18 BGN. Lodging 25-40 BGN/night dormitory. Open year-round. Bus from city center 45min.",c:["local_only", "nature"],r:"g",nn:"Хижа Алеко — Планинско село",ns:"Алпийска хижа с традиционна храна и горски пътеки",nst:"Алеко е като скок в спомен на Балканите. Каменна хижа сервира баница, шопска салата. Семейството е живяло тук поколения. Местни дошъл с деца в уикенди.",nt:"Храна 10-18 лева. Легла 25-40 лева. Отворено цяла година."},
  {id:8,n:"Women\'s Market (Женски пазар) — Bazaar Chaos",a:"Downtown",v:["local", "hidden", "weird"],d:12,s:"Cramped, chaotic covered market selling produce, textiles, housewares, and street food",st:"The Women\'s Market assaults the senses. Vendors shout over each other. You squeeze past mountains of tomatoes, piles of cheap clothes, kitchen gadgets that seem useless. Yet Sofia\'s grandmothers have shopped here for decades—they know which vendor has the best feta cheese, the freshest herbs. Street food vendors fry shopska salads in tiny portions. It\'s disorganized perfection.",im:"It\'s a Saturday morning. You\'re navigating textile piles, haggling in a language you don\'t speak, laughing.",t:"Free entry. Best 8am-12pm. Small portions of street food 2-5 BGN. Cash only for vendors.",c:["local_only"],r:"g",nn:"Женски пазар — Традиционен базар",ns:"Харaрна пазарска холеча със зеленчуци, текстил и уличска храна",nst:"Женския пазар е хаотичен и жив. Продавачи кричат. Планини от домати, куп дрехи. Софийски баби пазаруват тук поколения. Уличните хранилки пълнят шопска салата.",nt:"Свободен вход. Най-добре 8:00-12:00. Уличната храна 2-5 лева."},
  {id:9,n:"Ivan Vazov National Theatre — Grand Neoclassical",a:"Downtown",v:["history", "architecture", "beautiful"],d:18,s:"Bulgaria\'s premier theatre (1906) with ornate interior, opera and drama performances",st:"You enter a world of red velvet and gilt. The lobby soars; chandeliers drip crystal. The 700-seat hall feels intimate despite its grandeur. Performances range from classical opera to avant-garde drama. Locals dress up for opening nights. The architecture speaks to Bulgaria\'s Belle Époque aspirations—this is old European culture, transplanted and cherished.",im:"It\'s opening night. You\'re dressed in your finest, ascending the grand staircase.",t:"Performances nightly (except Mondays). Tickets 15-60 BGN. Book online or at box office. Tours available.",c:["history_big"],r:"g",nn:"Национален театър И. Л. Вазов",ns:"Премиерен театър на България с опера и драма",nst:"Влизаш в свят от червено кадифе и позлата. Холът е величествен с кристални люстри. Представленията варират от опера до авангардна драма.",nt:"Представления всяка вечер (освен понеделници). Билети 15-60 лева."},
  {id:10,n:"Sofia Synagogue — Moorish Revival",a:"Downtown",v:["history", "beautiful", "architecture"],d:22,s:"1909 Sephardic synagogue, the largest in Southeastern Europe, with ornate interior and active congregation",st:"The synagogue dazzles with golden domes and Byzantine mosaics. Six chandeliers hang from the ceiling—each required separate electrical circuits. Inside, women\'s galleries overlook the main hall; the Ark gleams with religious objects. The Jewish Museum next door documents Sofia\'s once-thriving Sephardic community. Despite WWII horrors, this congregation survives.",im:"It\'s Shabbat evening. You sit in the ornate hall, hearing Hebrew prayers echo between time periods.",t:"5 BGN entry. Open Sunday-Thursday 2-6pm. Modest dress required. Photography limited.",c:["history_big"],r:"g",nn:"Софийска синагога — Мавритански стил",ns:"1909 синагога, най-голямата в Юго-Източна Европа",nst:"Синагогата блясна със золни куполи и византийски мозайки. Шест люстри висят от тавана. Еврейския музей съседствува.",nt:"5 лева. Открито неделя-четвъртък 14:00-18:00."},
  {id:11,n:"Banya Bashi Mosque — Ottoman Survivor",a:"Downtown",v:["history", "architecture"],d:20,s:"Only functioning mosque in Sofia (16th century), with ornate interior and active Muslim congregation",st:"The turquoise dome of Banya Bashi rises amid Orthodox churches—a reminder of Ottoman rule. Inside, intricate tilework decorates the walls. Worshippers remove shoes, kneeling on carpets. The atmosphere is serene, contemplative. Built over natural hot springs (banya = bath), it once served both spiritual and thermal needs. Women and men pray in separate spaces.",im:"It\'s Friday prayers. You stand respectfully outside, hearing the muezzin\'s call at sunset.",t:"Free entry (outside prayer times). Remove shoes. Modest dress required. Prayer times posted at entrance.",c:["history_big"],r:"g",nn:"Баня баши джамия — Османска джамия",ns:"Единствената функционираща джамия в София с активна мюсюлманска община",nst:"Турквоазния купол се издига сред православни храмове. Вътре, сложни керамични плочки украсяват стените. Молещите се обуват обувки, преклончават се на килими.",nt:"Свободен вход. Разувайте се. Скромна облекла."},
  {id:12,n:"Mineral Hot Springs — Free Thermal Pools",a:"Downtown",v:["free", "local", "hidden"],d:8,s:"Natural hot springs in central Sofia, open-air pools with locals, completely free",st:"You find yourself in an unassuming courtyard with steaming water. Sofians of all ages float in murky, mineral-rich pools—some have soaked here daily for 20 years. It\'s surreal: a working-class spa in the city center. The water smells vaguely of sulfur and feels silky against your skin. People chat in Bulgarian, oblivious to your presence. It\'s not Instagram-worthy; it\'s authentically lived-in.",im:"It\'s a chilly afternoon. You soak in steaming water while the city rushes by outside.",t:"Free. Open dawn to dusk. Bring swimsuit and towel. Locals, minimal tourists. Water temperature 38-42°C.",c:["free_museum", "local_only"],r:"g",nn:"Минерални термални басейни — Свободни",ns:"Естественообогрявани басейни с местни софиянци",nst:"Намираш се в скромен двор със сипеща вода. Софиянци плуват в гурава, минерална-богата вода. Суралистично: работническа баня в центъра на град.",nt:"Свободно. Отворено всеки ден. Вода 38-42°C."},
  {id:13,n:"Soviet Army Monument — Bronze Colossus",a:"Women\'s Market",v:["history", "weird", "hidden"],d:25,s:"Imposing Soviet-era bronze monument depicting Red Army soldiers, now a contested historical symbol",st:"Three bronze soldiers tower above you—one holding a baby, one wielding a rifle, one frozen in heroic stride. Built in 1954, it glorified Soviet liberation. Today, it\'s graffitied, contested, occasionally decapitated by vandals. Locals debate whether to preserve it as history or remove it as propaganda. It\'s uncomfortable—intentionally so. The monument forces confrontation with Bulgaria\'s Soviet past.",im:"It\'s dusk. You stand before the monument, a young couple kissing nearby, ignoring history.",t:"Free outdoor site. Always accessible. Debate club meets here monthly (evenings). Controversial but essential.",c:["history_big"],r:"g",nn:"Паметник на Съветската армия — Бронзов гигант",ns:"Впечатляващ съветски паметник с бронзови войници",nst:"Три бронзови войници се издигат над теб. Паметникът е съпровождан от графити и дебати за неговата съдба.",nt:"Свободно. Винаги достъпно. Дебатни клубове месечно."},
  {id:14,n:"Yuzhen Park — Lakeside Green Space",a:"Yuzhen",v:["nature", "local", "quiet"],d:35,s:"Urban park with artificial lake, walking paths, and families relaxing by the water",st:"Yuzhen Park is where Sofia exhales. Families rent paddleboats, fishermen cast lines, joggers circle the lake, couples sit on benches. The park wraps around water—swans glide, kids chase ducks. Cafes ring the perimeter selling coffee and ice cream. It\'s neither fancy nor rustic; it\'s functional beauty. Locals come here to Sunday promenade, to escape apartment living.",im:"It\'s a lazy Sunday. Dappled shade falls on the water; you hear children\'s laughter.",t:"Free entry. Open 6am-10pm. Paddleboats 10 BGN/30min. Cafes everywhere. Scenic running/walking.",c:["nature"],r:"g",nn:"Южен парк — Паркова зона с езеро",ns:"Парк с изкуствено езеро и пешеходни пътеки",nst:"Южен парк е където София дишат. Семейства наемат педални лодки. Рибари хвърлят удици. Двойки седят на пейки.",nt:"Свободен вход. Открито 6:00-22:00. Педални лодки 10 лева."},
  {id:15,n:"Doctors\' Garden — Secret Urban Oasis",a:"Downtown",v:["hidden", "quiet", "beautiful"],d:10,s:"Hidden green courtyard behind high walls, peaceful botanical garden few tourists find",st:"You discover Doctors\' Garden by accident—or maybe a local tips you off. High walls shield a botanical paradise. Benches sit among flower beds, a small fountain murmurs, old trees provide shade. It\'s impossibly quiet for downtown. People read books here, couples kiss, elderly men discuss politics. It feels stolen from time, a refuge that tourists rarely navigate to.",im:"It\'s a Tuesday afternoon. You\'re alone except for a woman reading, sunlight filtering through leaves.",t:"Free entry. Open 7am-7pm. Few tourists. Bring a book. Perfect for quiet time.",c:["hidden", "quiet"],r:"g",nn:"Докторската градина — Скрита оазис",ns:"Скрита зелена двор зад високи стени",nst:"Откриваш Докторската градина случайно или случайно. Висок стена защитават ботаническа рай. Тихо за центъра.",nt:"Свободен вход. Открито 7:00-19:00. Малко туристи."},
  {id:16,n:"South Park (Южен Парк) — Recreation Grounds",a:"South Park",v:["nature", "local"],d:40,s:"Sprawling public park with forested areas, walking trails, open meadows, and urban woodland",st:"South Park sprawls across the city\'s southern edge—a green refuge where Sofia escapes to hike. Forested paths wind through pine and beech, reaching small clearings. On weekends, families walk with children and dogs. The park connects to Vitosha Mountain, so trails extend for hours. It\'s underdeveloped—no fancy facilities, just nature. Locals know secret paths.",im:"It\'s early morning. Fog hangs among trees; you hear only bird calls and footsteps.",t:"Free entry. Open dawn-dusk. Trails well-marked. No facilities; bring water. Hiking boots recommended.",c:["nature"],r:"g",nn:"Южен Парк — Рекреационна площ",ns:"Голям обществен парк със скривалища, пътеки и открити равнини",nst:"Южен Парк се простира по южния край на град. Гори и пътеки. Семейства ходят с деца и кучета. Пътеките се свързват с Витоша.",nt:"Свободен вход. Открито всеки ден. Пътеки маркирани. Внесете вода."},
  {id:17,n:"National Art Gallery — Bulgarian Masters",a:"Downtown",v:["history", "beautiful"],d:16,s:"Bulgaria\'s premier art museum featuring medieval icons, Renaissance works, and modern paintings",st:"You ascend the marble staircase into rooms of medieval icons—religious paintings that shimmer with gold leaf. Then Renaissance works, Ottoman-era art, and finally modern Bulgarian painters. Each room reveals how artists grappled with invasion, occupation, independence. The collection spans centuries in a single afternoon. Labels are in Bulgarian and English.",im:"It\'s a rainy afternoon. You\'re alone in a gallery room, standing before an icon that feels alive.",t:"8 BGN entry. Open Tuesday-Sunday 10am-6pm. Closed Mondays. Audioguides available 3 BGN.",c:["history_big"],r:"g",nn:"Национална художествена галерия",ns:"Най-добрия художествен музей с икони и модерни картини",nst:"Възлизаш мраморните стълби в стаи от средновековни икони. Икони блясват със золна листа. Във всяка стая художници се справяк с завладяване.",nt:"8 лева. Открито вторник-неделя 10:00-18:00."},
  {id:18,n:"Church of St George Rotunda — Bulgaria\'s Oldest",a:"Largo",v:["history", "hidden"],d:18,s:"4th-century Roman rotunda church, Bulgaria\'s oldest building, surrounded by Soviet Largo complex",st:"The Church of St George is tiny—squeezed between communist buildings in the Largo. But it\'s ancient. Walk inside and you\'re in the 4th century. Byzantine frescoes decorate the walls (though faded). The cupola is original. Outside, the Largo looms—harsh Soviet concrete. Inside, the sacred silence endures. It\'s spatial contradiction: medieval spirituality cradled by modern totalitarianism.",im:"It\'s quiet dawn. You enter through a nondescript door and emerge 1,600 years back in time.",t:"Free entry. Open 9am-6pm. Often crowded with tourists. Photography allowed. Smallest major church.",c:["history_big"],r:"g",nn:"Ротонда св. Георги — Най-древната église",ns:"4-в. римска ротонда, най-старата сграда в България",nst:"Ротондата св. Георги е малка—стисната между комунистически сгради. Но е древна. Вътре си в 4-в. Фрески декорират стените.",nt:"Свободен вход. Открито 9:00-18:00. Фотография позволена."},
  {id:19,n:"Largo Complex — Soviet Urban Vision",a:"Largo",v:["architecture", "history", "weird"],d:20,s:"Massive Soviet-era administrative complex with brutalist buildings, underground passages, and layered history",st:"Largo is urban theater. Above ground: stark concrete ministry buildings arranged on a plaza. Below: Byzantine church, Roman walls, Ottoman remnants visible through glass floors and windows. Bureaucrats shuffle through corridors. Metro trains rattle beneath. Tourists peer down at ancient ruins while officials stamp forms. It\'s a vertical cross-section of Sofia\'s history, ugly and fascinating.",im:"It\'s lunchtime. You\'re eating a sandwich above 2,000-year-old walls while bureaucrats pass by.",t:"Free to explore. Best with map or guided tour. Metro provides access. Underground passages unsafe after dark.",c:["architecture"],r:"g",nn:"Комплекс Ларго — Съветска визия",ns:"Масивен съветски административен комплекс с подземни проходи",nst:"Ларго е урбанен театър. Над земята: суровите съветски сгради. Под земята: византийска църква, римски стени видими през стъклени подове.",nt:"Свободна разходка. Подземни проходи опасни след залез."},
  {id:20,n:"Earth and Man Museum — Mineral Cathedral",a:"Downtown",v:["hidden", "beautiful", "weird"],d:24,s:"Unique private museum of minerals, crystals, and geological specimens in private mansion",st:"You step into a jewel box. Floor to ceiling: amethyst geodes, rose quartz, tourmaline, mineral specimens from around the world. Some crystals are person-sized, glowing under museum lighting. The collection is obsessive—a private collector\'s life passion. The mansion itself is ornate. It feels like entering someone\'s dream. Few tourists find this place; it rewards wanderers.",im:"It\'s dim inside. Purple light from amethysts surrounds you; you feel like you\'re underwater.",t:"10 BGN entry. Open Tuesday-Sunday 10am-5pm. Closed Mondays. Photo prices (no phones inside).",c:["hidden"],r:"g",nn:"Музей Земя и човек — Кристален музей",ns:"Приватен музей на минерали и кристали в преамата на dynastie",nst:"Влизаш в кутия със бижута. От пода до таван: аметист, розов кварц, турмалин. Някои кристали са човекоразмерни.",nt:"10 лева. Открито вторник-неделя."},
  {id:21,n:"Red House Cultural Center — Creative Hub",a:"Downtown",v:["local", "hidden", "beautiful"],d:19,s:"Independent cultural space with art studios, exhibitions, theater, and cafe",st:"The Red House is Sofia\'s creative underground. A converted mansion hosts artist studios, galleries, a small theater, and a cafe that serves to locals and art students. It smells like paint and espresso. Performances happen weekends—indie films, experimental theater, live music. The space feels inhabited and alive, not curated. This is where Sofia\'s young artists congregate.",im:"It\'s Friday evening. A band sets up; the cafe fills with people with paint under their fingernails.",t:"Free entry. Cafe 3-8 BGN per drink. Performances 10-20 BGN. Schedule posted online.",c:["local_only"],r:"g",nn:"Червена Къща — Креативен център",ns:"Независим культурен център с студия, изложби и театър",nst:"Червена къща е София на творчески подземие. Превърната резиденция хоста студиа, галерии и мов театър.",nt:"Свободна входа. Кафе 3-8 лева. Представления 10-20 лева."},
  {id:22,n:"Graf Ignatiev Street — Shopping and Nightlife",a:"Downtown",v:["local", "night"],d:14,s:"Quirky shopping street lined with vintage boutiques, record shops, and bohemian bars",st:"Graf Ignatiev pulses with indie energy. Vintage shops sell second-hand leather jackets and Soviet memorabilia. Record stores crate-dig for obscure vinyl. Cafes with mismatched furniture serve espresso to students and artists. At night, underground bars open. It\'s Sofia\'s bohemian spine—where young people find alternative culture in a Balkan capital.",im:"It\'s evening. You\'re flipping through vinyl; a bartender chats in English.",t:"Free to walk. Shops 10am-7pm. Bars 9pm-3am. Drinks 3-8 BGN. Very walkable.",c:["local_only", "night"],r:"g",nn:"Улица Граф Игнатиев — Пазар и нощен живот",ns:"Чудна торговска улица с винтидж магазини и бохемски барове",nst:"Граф Игнатиев е пулс на индия енергия. Винтидж магазини. Бар с несъответстващи мебели.",nt:"Свободна. Магазини 10:00-19:00. Барове 21:00-03:00."},
  {id:23,n:"Lions Bridge (Мост Лъвов) — Iconic Span",a:"Downtown",v:["history", "beautiful"],d:12,s:"1889 bridge decorated with Art Deco lion sculptures, central meeting point and design icon",st:"Four bronze lions guard the Lions Bridge (Мост Лъвов), installed 1889. The bridge spans the Iskar River, connecting city districts. Tourists pose with the lions; locals use the bridge daily. The lions have become Sofia\'s unofficial mascot, appearing in city logos. The bridge\'s neoclassical design feels romantic—especially at sunset when light catches the bronze.",im:"It\'s golden hour. You stand between the lions, the city glowing behind you.",t:"Free crossing. Always accessible. Popular photo spot. River walk available on both banks.",c:["history_big"],r:"g",nn:"Мост Лъвов — Емблематичен мост",ns:"1889 мост украсен с артдеко лъвски статуи",nst:"Четири бронзови лъва охраняват моста. Туристи позират с лъвовете. Моста се появява в логото на град.",nt:"Свободно преминаване. Винаги достъпно. Популярна фото локация."},
  {id:24,n:"Orlov Most (Eagle Bridge) — Art Nouveau Masterpiece",a:"Downtown",v:["beautiful", "architecture"],d:16,s:"1889 Art Nouveau bridge with gilded eagles and ornamental railings, architectural treasure",st:"Orlov Most (Eagle Bridge) is Sofia\'s prettiest bridge. Four golden eagles perch on the railings—wings spread, ready to fly. The bridge curves gracefully over the Perlovska River. It\'s a pedestrian favorite, quieter than Lions Bridge. The Art Nouveau styling feels European, aspirational. Locals stroll it in evenings; couples linger between the eagles.",im:"It\'s twilight. Streetlamps illuminate the golden eagles; the city hums below.",t:"Free crossing. Walking only (no vehicles). Beautiful day or night. River views from railings.",c:["beautiful"],r:"g",nn:"Орлов мост — Артнуво шедьовър",ns:"1889 артнуво мост с позлатени орли",nst:"Орловия мост е най-хубавия мост на София. Четири позлатени орли седят на парапетите. Моста се извива красиво.",nt:"Свободна. Само пешеходни. Красиво денем и нощем."},
  {id:25,n:"Central Market Hall (Халите) — Food Emporium",a:"Downtown",v:["local", "food"],d:18,s:"Historic indoor market selling fresh produce, meats, fish, and regional specialties",st:"The Central Market Hall is sensory overload. Fishmongers display octopus and mackerel on ice. Vegetable vendors pyramid tomatoes and peppers. Butchers hang carcasses. Spice merchants sell paprika by the kilogram. Locals know which vendor has the best, cheapest goods. You taste fresh mozzarella from the dairy section. It\'s chaotic, aromatic, and utterly authentic.",im:"It\'s morning. You\'re navigating vendors, overwhelmed by smells: fish, fresh basil, aged meat.",t:"Free entry. Open daily 6am-7pm. Cash preferred. Taste samples abundant. Lunch here cheap.",c:["local_only"],r:"g",nn:"Централна пазарна халеча — Храни",ns:"Историческа закрита пазар със свежи произвеждам",nst:"Халеча е чувствено претоварване. Рибни търговци показват октопод. Зеленчукови продавачи пилотира. Месари висят туши.",nt:"Свободен вход. Открито всеки ден 6:00-19:00."},
  {id:26,n:"Studentski Grad — Student Quarter Nightlife",a:"Studentski Grad",v:["night", "local"],d:50,s:"Student housing complex with bars, clubs, and nightlife venues, beloved by young Sofians",st:"Studentski Grad is Sofia\'s party district. Uniform Soviet-style apartment buildings house thousands of students. At night, underground venues open—tiny clubs in basements, rooftop bars, informal gatherings. It\'s chaotic and youthful. Cheap beer, loud music, people sitting on curbs discussing life. It\'s not polished; it\'s lived-in fun. Locals avoid it (too loud); tourists seeking \'authentic nightlife\' find it.",im:"It\'s past midnight. Bass throbs from basement venues; students congregate on apartment steps.",t:"Free to explore. Bars/clubs 2-5 BGN entry. Drinks 2-6 BGN. Unsafe solo late-night. Take taxis.",c:["night"],r:"g",nn:"Студентски град — Нощен живот",ns:"Студентски жилищен комплекс с барове и нощен живот",nst:"Студентския град е партийния район на София. Еднообразни съветски апартаменти. Нощем, подземни клубове отварят. Евтина бира.",nt:"Свободно. Барове 2-5 лева. Пиво 2-6 лева."},
  {id:27,n:"Rila Monastery — Spiritual Mountain Sanctuary",a:"Rila Mountains",v:["history", "beautiful", "quiet", "nature"],d:240,s:"UNESCO monastery in mountain valley, Bulgaria\'s holiest site with frescoed cells and holy lake",st:"Two hours from Sofia, Rila Monastery emerges from forest like a medieval fortress. Stone walls enclose a courtyard with a church at its center. Monks\' cells ring the courtyard—thousands of frescoes cover every surface. A lake fed by snowmelt sits nearby, believed holy. You walk barefoot through silence. Pilgrims pray; tourists photograph. Despite crowds, the spiritual weight endures.",im:"It\'s early dawn. You walk alone through the courtyard; mist rises from the lake.",t:"Free entry. Modest dress required (covered shoulders/knees). Donations welcome. Meals 8-12 BGN at cafe. Overnight stays 30-40 BGN.",c:["history_big", "nature"],r:"g",nn:"Рилска манастир — Духовен приют",ns:"ЮНЕСКО манастир в планинската долина, най-светия място",nst:"Две часа от София, Рилския манастир се появява от гора. Каменни стени ограждат двор. Монашески килии. Люде се молят.",nt:"Свободен вход. Скромна облекла. Пожертвания добре. Легла 30-40 лева."},
  {id:28,n:"Seven Rila Lakes — Alpine Hiking Paradise",a:"Rila Mountains",v:["nature", "beautiful", "hidden"],d:180,s:"Glacial alpine lakes at 2,100-2,500m accessible via mountain trail, stunning backcountry hike",st:"The hike to Rila\'s seven lakes is strenuous but transcendent. You climb through alpine meadows, pass mountain huts, and reach crystalline lakes at elevation. Each lake is distinct: some blue as sapphires, others emerald, one called \'The Eye\' mirrors sky. The trail is crowded on weekends, solitary weekdays. You camp or stay in mountain huts. At night, stars engulf the sky.",im:"It\'s sunset at altitude. You sit by an alpine lake as alpenglow paints the peaks rose-gold.",t:"Free hiking. Huts 25-35 BGN/night. Camping 5-10 BGN. 2-3 days recommended. Guides available. Best July-September.",c:["nature"],r:"g",nn:"Седемте риларски езера — Алпийска хайк",ns:"Ледникови алпийски езера на 2,100-2,500м",nst:"Похода до седемте езера е напрегната но трансцендентна. Катериш се през алпийски ливади. Всяко езеро е различно: някои синьки, други смарагдени.",nt:"Свободна хайка. Хижи 25-35 лева. Палатки 5-10 лева."},
  {id:29,n:"Koprivshtitsa — Revival Town Museum",a:"Koprivshtitsa",v:["history", "beautiful", "quiet"],d:90,s:"Preserved 19th-century Bulgarian Revival town with museum houses, artisans\' workshops, architecture",st:"Koprivshtitsa is a time-preserved 19th-century Bulgarian town. Streets are narrow, sloped, and traffic-free. Houses painted in Revival style (ornate windows, pastel walls) shelter small museums. Each museum house displays period furnishings, textiles, household objects. Artisans demonstrate traditional crafts. It\'s a living museum, not sterile. Locals still inhabit the town. You walk for hours without seeing a car.",im:"It\'s afternoon. You\'re on a narrow street lined with painted houses, hearing only footsteps.",t:"Free to walk. Museum houses 2-5 BGN each. All museums open 9am-5pm daily. Buses from Sofia 2 hours.",c:["history_big"],r:"g",nn:"Копривщица — Възрожденския град",ns:"Съхранен 19-в. град със музейни къщи и занаятчийски работилници",nst:"Копривщица е времево-съхранен град. Улици са тесни, свободни от трафик. Възрожденски къщи със музейни експонати.",nt:"Свободна разходка. Музейни къщи 2-5 лева."},
  {id:30,n:"Serdika Metro Station — Three Eras Visible",a:"Downtown",v:["history", "hidden"],d:15,s:"Metro platform where Roman walls, Byzantine church, and Ottoman debris are visible through transparent windows",st:"The Serdika metro station is an archaeological theater. Descending the stairs, you pass glass windows revealing layers: Roman fortifications (bottom), Byzantine church remains (middle), Ottoman debris (top). The platform continues below them. It\'s a cross-section of Sofia compressed into 30 seconds. Most commuters ignore it; aware travelers stand transfixed.",im:"It\'s rush hour. You\'re frozen before the glass while commuters flow around you, oblivious.",t:"1.60 BGN metro fare. Always accessible. Photography allowed. Late-night exploration not safe.",c:["history_big"],r:"g",nn:"Метростанция Сердика — Три епохи",ns:"Метростанция където древни слои са видими",nst:"Метростанция Сердика е археологически театър. Спускаш се по стълби, виждаш стъклени прозорци. Древни слои стекат.",nt:"1.60 лева метро. Фотография позволена."},
  {id:31,n:"NDK Park Underground Passages — Secret Tunnels",a:"South Park",v:["hidden", "weird", "architecture"],d:28,s:"Extensive underground passages connecting NDK complex, remnants of Cold War-era construction",st:"Below the NDK lies a passage network—some lit, some dark. Rumors say they connect to ministry buildings, bomb shelters, Cold War bunkers. You navigate concrete corridors. Some passages are sealed off. Others open into unexpected underground plazas. It\'s liminal, eerie, educational. Local explorers know the network; tourists never venture here. Maps are scarce; exploration is partially forbidden.",im:"It\'s dusk. You\'re below the city, footsteps echoing, wondering how deep the passage goes.",t:"Officially off-limits in many sections. Accessible via NDK building. Exploration at own risk. Not safe solo.",c:["hidden"],r:"g",nn:"Подземни проходи под НДК — Таини тунели",ns:"Обширни подземни проходи под НДК комплекс",nst:"Под НДК лежа мрежа от проходи. Някои осветени, други мрачни. Слухове казват че свързват на министерства.",nt:"Официално забранено. Достъпно от НДК. На собствен риск."},
  {id:32,n:"Slaveykov Square — Book Market & History",a:"Downtown",v:["local", "history", "quiet"],d:13,s:"Historic square with daily open-air book market, antiquarian dealers, and literary heritage",st:"Slaveykov Square pulses with book energy. Daily, antiquarian dealers set up tables selling used volumes—Bulgarian literature, Soviet editions, old textbooks, rare finds. Locals hunt for vintage books; students buy cheap texts. The square feels literary despite being pedestrian. A statue of Slaveykov (poet) watches. Cafes ring the market. It\'s low-key, intellectual, and utterly Sofia.",im:"It\'s Saturday morning. You\'re flipping through old Bulgarian poetry while pigeons peck crumbs.",t:"Free to browse. Books 1-20 BGN. Cash only. Best 9am-3pm. Cafes everywhere.",c:["local_only"],r:"g",nn:"Площад Славейков — Книжен пазар",ns:"Историческа площ със дневния книжен пазар",nst:"Площад Славейков пулсира с книжна енергия. Дневно, антикварни търговци продават използвани томове. Локали ловуват винтидж книги.",nt:"Свободно. Книги 1-20 лева. Най-добре 9:00-15:00."},
  {id:33,n:"Maria Luiza Boulevard — Grand Avenue",a:"Downtown",v:["beautiful", "history", "architecture"],d:22,s:"Wide tree-lined avenue with belle époque buildings, government ministries, and Parisian-style planning",st:"Maria Luiza Boulevard stretches wide—a Parisian dream in Sofia. Plane trees line both sides. Belle époque buildings house government ministries, banks, and the National Museum of History. The avenue invokes Sofia\'s aspirations in the early 1900s: to be a European capital. Cafes spill onto sidewalks. It\'s formal, beautiful, and feels like Sofia trying to be Paris.",im:"It\'s a mild evening. You stroll beneath plane trees; streetlamps illuminate belle époque facades.",t:"Free walking. Cafes 3-8 BGN per drink. Museums open 10am-6pm. Fully walkable.",c:["beautiful"],r:"g",nn:"Булевард Мария Луиза — Мажестатична авенюа",ns:"Широк бул. със белепока сгради и парижка планирана улица",nst:"Булевард Мария Луиза протяга се широко. Платани от двете страни. Беллепока сгради хоста министерства. Булеварда желае София да бъде Париж.",nt:"Свободна разходка. Кафе 3-8 лева. Музеи 10:00-18:00."},
  {id:67,n:"Borovets Ski Resort — Winter Sports",a:"Borovets",v:["nature", "hidden"],d:180,s:"Bulgaria\'s premier ski resort on Rila Mountain, lifts, slopes, mountain villages",st:"Borovets is where Sofians escape to ski. Lifts ascend Rila Mountain; slopes range from beginner to advanced. In summer, it becomes a hiking hub. Alpine meadows, mountain huts, pristine air. The village has grown but retains mountain charm. You can rent equipment, take lessons, lodge in family-run hotels.",im:"It\'s winter dawn. You\'re ascending a slope as the sun ignites the peaks rose-gold.",t:"Ski pass 50-60 BGN/day. Equipment rental 25-35 BGN/day. 2.5 hours by bus from Sofia.",c:["nature"],r:"g",nn:"Ски курорт Боровец — Зимни спортове",ns:"България най-добър ски курорт на планина Рила",nst:"Боровец е където софиянци идват за ски. Лифтове се издигат. Склонове варират. През лято, планинска хайка.",nt:"Ски карта 50-60 лева. Оборудване 25-35 лева."},
  {id:68,n:"Plovdiv — Second City Day Trip",a:"Plovdiv",v:["history", "beautiful"],d:150,s:"Bulgaria\'s second-largest city, 2.5-hour train ride, Roman amphitheater, old town",st:"Plovdiv predates Rome. Its old town climbs a hillside with preserved Revival houses. A Roman amphitheater (still used for performances) anchors the lower city. The Danube passes nearby. Plovdiv feels less touristy than Sofia, more lived-in. A day trip is feasible; overnight stays reward deeper exploration.",im:"It\'s afternoon. You\'re sitting in the amphitheater, imagining ancient crowds.",t:"Train 8-15 BGN round-trip (2.5 hours). City free to explore. Amphitheater free entry.",c:["history_big"],r:"g",nn:"Пловдив — Втория град",ns:"Втория град на България, римски амфитеатър",nst:"Пловдив е преди Рим. Старо град се катерача по хълм. Римски амфитеатър (все още се използва). Дунай преминава наблизо.",nt:"Влак 8-15 лева. Град свободен. Амфитеатър свободен."},
  {id:69,n:"Buzludzha Monument — Abandoned Brutalism",a:"Buzludzha",v:["history", "weird", "hidden"],d:220,s:"Abandoned 1970s Soviet monument on mountain peak, architectural time capsule (access uncertain)",st:"Buzludzha is Sofia\'s urban legend. A 1970s UFO-like monument sits on a mountain peak celebrating the communist party. It\'s been abandoned, vandalized, and gradually deteriorating. Access is technically forbidden but locals find ways. Inside: frescoes, mosaics, Soviet iconography. It\'s eerie, beautiful, melancholic—a ruin of ideology.",im:"It\'s late afternoon. You\'re inside the abandoned monument, Soviet murals glowing in fading light.",t:"Access difficult/restricted. Hiking approach possible. Risk of structural danger. Not officially accessible.",c:["hidden", "weird"],r:"g",nn:"Паметник Бузлуджа — Напуснат",ns:"Напуснат 1970-в. советски паметник на върх",nst:"Бузлуджа е софийската легенда. 1970-в. UFO-като паметник. Е напуснат, вандализиран. Вътре: фрески, мозайки.",nt:"Достъп е затруднен. Пешеходен подход. Рисък."},
  {id:70,n:"Gorna Baня (Upper Bath) — Thermal Complex",a:"Downtown",v:["free", "local"],d:8,s:"Traditional Turkish bathhouse still operational, communal bathing experience",st:"Gorna Baня is old Sofia. A traditional hammam operates in Ottoman-era ruins. Separate bathing areas for men and women. You undress, enter steaming chambers, lie on hot stone, get scrubbed by attendants. It\'s vulnerable, authentic, cultural. Prices are negligible. It smells of steam and tradition.",im:"It\'s morning. You\'re lying on hot stone, being scrubbed, sweating history.",t:"5 BGN entry. Towel 2 BGN. Scrubbing service 10 BGN. Open 7am-6pm. Cash only.",c:["free_museum", "local_only"],r:"g",nn:"Горна баня — Термална сложност",ns:"Традиционна турска баня все още работеща",nst:"Горна баня е стара София. Традиционна хамам работи в османски развалин. Отделни бани за мъже и жени.",nt:"5 лева вход. Кърпа 2 лева. Чистене 10 лева."},
  {id:71,n:"Banya Baша Market — Thermal Shops",a:"Downtown",v:["local", "hidden"],d:10,s:"Market surrounding historic thermal bath, textile and spice vendors, atmospheric lanes",st:"The Banya Bash area spawned a market. Narrow lanes crammed with spice vendors (saffron, sumac, dried herbs), textile shops, and souvenir stalls. It\'s fragrant chaos. Locals negotiate prices; tourists photograph. The market predates the modern city. Some stalls operate from 200-year-old structures.",im:"It\'s morning. You\'re navigating fragrant lanes, overwhelmed by scents.",t:"Free to walk. Spices/textiles 5-50 BGN. Cash preferred. Best 8am-3pm.",c:["local_only"],r:"g",nn:"Пазар Баня Баша — Магазини при баня",ns:"Пазар около историческа баня, текстил и подправки",nst:"Зоната Бая Баша получи пазар. Тесни улици тъпачни с подправки, текстил, сувенири.",nt:"Свободна разходка. Подправки 5-50 лева. Най-добре 8:00-15:00."},
  {id:72,n:"Sv Nedelya Cathedral — Central Landmark",a:"Downtown",v:["history", "architecture"],d:16,s:"Neo-Byzantine cathedral in city center, ornate interior, active congregation",st:"Sv Nedelya is Sofia\'s working cathedral. Ornate interior, hanging chandeliers, worn icons showing age. Worshippers cross themselves; tourists shuffle quietly. It survived communism, wars, and modern development. It\'s simultaneously spiritual center and museum.",im:"It\'s evening. Candles flicker; prayers echo in the high dome.",t:"Free entry. Open 6am-8pm daily. Photography limited. Respectful dress required.",c:["history_big"],r:"g",nn:"Св. Неделя катедрала — Централна забележителност",ns:"Необизантийска катедрала в центъра на град",nst:"Св. Неделя е работеща София катедрала. Орнаментална вътрешност, висящи люстри. Вярващи се кръстосват.",nt:"Свободен вход. Открито 6:00-20:00. Фотография ограничена."},
  {id:73,n:"Lozenetz Market — Weekend Bazaar",a:"Lozenetz",v:["local", "free"],d:45,s:"Weekend open-air market in residential neighborhood, authentic local commerce",st:"Lozenetz Market operates weekends only. Vendors crowd a neighborhood square selling everything: used clothes, old books, kitchen gadgets, plants. It\'s chaotic, local, utterly unpretentious. Sofians hunt for bargains; you observe real neighborhood life. It\'s free to enter, energetic, and occasionally yields treasures.",im:"It\'s Saturday. You\'re surrounded by shoppers, haggling in Bulgarian.",t:"Free entry. Best 8am-12pm. Items 1-50 BGN. Cash only.",c:["free_museum", "local_only"],r:"g",nn:"Пазар Лозенец — Уикенд базар",ns:"Уикенд открит пазар в жилищен квартал",nst:"Пазар Лозенец работи уикенди. Продавачи продават всичко. Старо облекло, книги, кухненски гаджети. Софиянци ловят намаления.",nt:"Свободен вход. Най-добре 8:00-12:00. Предмети 1-50 лева."},
  {id:74,n:"Knyaz Alexander Battenberg Square — Historic Center",a:"Downtown",v:["history", "beautiful"],d:18,s:"Central square with historic buildings, parliamentary palace, green spaces, political nexus",st:"This square is Sofia\'s political heart. The Orthodox Cathedral, Parliament building, and former royal palace define its boundaries. Locals cut through; tourists photograph facades. Protests sometimes gather here. It\'s a living civic space—not a tourist attraction but a functional plaza where the city\'s power is exercised.",im:"It\'s a political rally. Thousands gather; rhetoric echoes off stone facades.",t:"Free walking. Always accessible. Cafes nearby (3-8 BGN per drink).",c:["history_big"],r:"g",nn:"Площад Княз Александър — Историчен център",ns:"Централна площ с исторически сгради и парламент",nst:"Площадта е политическото сърце на София. Катедрала, парламент, бивша кралска резиденция. Локали преминават.",nt:"Свободна разходка. Винаги достъпна."},
  {id:75,n:"Vasil Levski Sports Hall — Modern Venue",a:"Downtown",v:["modern"],d:22,s:"Contemporary sports arena hosting basketball, volleyball, concerts, major events",st:"The hall is Sofia\'s modern venue—sleek, well-maintained, hosting national and international events. Basketball games, volleyball tournaments, concerts by major acts. It\'s where Sofia\'s youth congregate for entertainment. It\'s contemporary, functional, less historically charged than Old Town sites.",im:"It\'s a concert night. Thousands stream in; bass reverberates from inside.",t:"Event-dependent. Tickets 20-100 BGN. Box office and online. Full accessibility.",c:["modern"],r:"g",nn:"Спортна зала Василий Левски — Модерна зала",ns:"Съвременна спортна арена с баскетбол, волейбол, концерти",nst:"Залата е съвременна София венюй. Блясъчна, добре поддържана. Баскетбол, волейбол, концерти.",nt:"Събитие зависимо. Билети 20-100 лева."},
  {id:76,n:"Botanical Garden — Plant Collections",a:"Botanical Garden",v:["nature", "quiet", "beautiful"],d:60,s:"University botanical garden with greenhouse, plant collections, quiet walking paths",st:"The Botanical Garden is Sofia\'s secret. Sections: Mediterranean plants, tropical greenhouse, native flora. Walking paths wind through gardens. Few tourists venture here. It\'s quiet, educational, peaceful. Students study; retirees walk; botanists work. It offers escape from urban noise.",im:"It\'s afternoon. You\'re in the greenhouse, surrounded by tropical humidity and unfamiliar plants.",t:"5 BGN entry. Open 9am-5pm daily. Peaceful walking. Benches throughout.",c:["nature"],r:"g",nn:"Ботаническа градина — Растителни събирки",ns:"Университетска ботаническа градина с оранжерия",nst:"Ботаническата градина е София тайна.섹ции: средиземни растения, тропическа оранжерия. Пътеки се намотават.",nt:"5 лева вход. Открито 9:00-17:00. Спокойна разходка."},
  {id:77,n:"Tsar Simeon Garden — Central Park",a:"Downtown",v:["nature", "local"],d:14,s:"Urban park in downtown, tree-shaded paths, playground, cafes, green sanctuary",st:"Tsar Simeon Garden is downtown\'s breathing space. Benches occupy leafy corners. A playground serves children. Cafes ring the perimeter. Locals escape here during work breaks. It\'s small but essential—the city\'s accessible green. In summer, open-air cinema operates here.",im:"It\'s lunch hour. Office workers sit on benches, eating sandwiches.",t:"Free entry. Open 6am-10pm. Cafes 3-8 BGN. Fully accessible.",c:["nature"],r:"g",nn:"Градина Цар Симеон — Централен парк",ns:"Градина в центъра на град със сенени пътеки",nst:"Градина Цар Симеон е санитар на центъра. Пейки в листи ъгли. Игрище за деца. Кафе около периметъра.",nt:"Свободен вход. Открито 6:00-22:00. Кафе 3-8 лева."},
  {id:78,n:"National Library Ivan Vazov",a:"Downtown",v:["history", "quiet"],d:19,s:"Bulgaria\'s national library, historic building, reading rooms, archives, cultural institution",st:"The National Library is Bulgaria\'s cultural memory. Grand reading rooms, towering shelves, quiet scholarship. You can browse the catalog, request items, sit for hours reading. It feels timeless—patrons absorbed in texts, librarians processing documents. The building itself is beautiful: marble, woodwork, period fixtures.",im:"It\'s quiet afternoon. You\'re in a vast reading room, surrounded by whispers and rustling pages.",t:"Free entry. Membership 5 BGN. Open 9am-7pm Monday-Saturday. Closed Sundays.",c:["history_big"],r:"g",nn:"Национална библиотека Иван Вазов",ns:"България национална библиотека, исторически сграда",nst:"Национална библиотека е България културна памет. Грандиозни читални. Вие можете да преглеждате каталога. Сградата е красива.",nt:"Свободен вход. Членство 5 лева. Открито 9:00-19:00 понеделник-събота."},
  {id:79,n:"Zaimov Park — Neighborhood Green",a:"Zaimov",v:["nature", "local"],d:55,s:"Residential neighborhood park, family-friendly, playground, local walking destination",st:"Zaimov Park is where Sofian families relax. It\'s smaller than Yuzhen or South Park but intimate. Children play; dogs run; couples walk. A small lake, trees, benches. It\'s lived-in, unpretentious, essential to neighborhood quality of life. Few tourists find it; it\'s purely local.",im:"It\'s weekend. Families are out; children laugh while parents watch from benches.",t:"Free entry. Open dawn to dusk. Playground equipment accessible. Quiet, family-friendly.",c:["nature"],r:"g",nn:"Парк Заимов — Сумоседен зелен",ns:"Жилищен парк, семейно приятелски, игрище",nst:"Парк Заимов е където София семейства релаксират. Малък басейн, дървета, пейки. Чисто местен.",nt:"Свободен вход. Открито от зора до залез. Игрище достъпно."},
  {id:80,n:"Banya Bashi Hamam Entrance",a:"Downtown",v:["hidden", "history"],d:9,s:"Historic hammam/bathhouse entrance, preserved Ottoman structure, minimal signage",st:"This entrance leads to an Ottoman-era bathhouse still operating. The facade is ornate, period. Inside: segregated bathing, steam rooms, attendants. It\'s a window into Ottoman urban life—preserved, functional, authentic. Few tourists find it; locals know.",im:"It\'s early morning. You\'re entering a structure unchanged for 300 years.",t:"5-10 BGN entry. Open 6am-10pm daily. Separate areas for men/women.",c:["hidden"],r:"g",nn:"Баня Баши Хамам вход",ns:"Историчен хамам, съхранена османска структура",nst:"Този вход води до хамам още работещ. Фасадата е орнаментална. Вътре: отделени бани, парни стаи.",nt:"5-10 лева вход. Открито 6:00-22:00."},
  {id:81,n:"Patriarchal Cathedral — Orthodox Splendor",a:"Downtown",v:["history", "beautiful"],d:20,s:"Orthodox cathedral with elaborate interior mosaics, frescoes, spiritual centerpiece",st:"This cathedral glows with spiritual intensity. Byzantine mosaics, frescoes rendered in lapis and gold. Worshippers kiss icons; candles illuminate faces. It\'s working spirituality, not museum piece. The architecture overwhelms: domes, arches, soaring spaces. You feel faith made physical.",im:"It\'s evening. Incense floats; a choir chants Orthodox hymns.",t:"Free entry. Open 6am-8pm daily. Photography limited. Respectful dress required.",c:["history_big"],r:"g",nn:"Патриаршеска катедрала — Православна величественост",ns:"Православна катедрала със сложни вътрешни мозайки",nst:"Тази катедрала светва със духовна интензивност. Византийски мозайки, фрески. Вярващи целуват икони.",nt:"Свободен вход. Открито 6:00-20:00. Фотография ограничена."},
  {id:82,n:"Bansko Ski Resort — Winter Mountain Town",a:"Bansko",v:["nature", "beautiful"],d:200,s:"Popular ski resort in Pirin Mountains, charming old town, extensive slope system",st:"Bansko combines skiing with old-town charm. A preserved medieval-era town sits below ski slopes. In winter: skiing, snowboarding, après-ski. In summer: hiking in wildflower meadows. The town has cobbled streets, traditional restaurants, local character. It\'s more developed than Borovets but retains authenticity.",im:"It\'s winter evening. You\'re sipping hot wine in an old-town tavern after a day\'s skiing.",t:"Ski pass 55-65 BGN/day. Bus from Sofia 3.5 hours. Lodging 30-60 BGN/night.",c:["nature"],r:"g",nn:"Ски курорт Банско — Зимна планинска град",ns:"Популярен ски курорт в Пиринските планини",nst:"Банско комбинира ски с старото град чар. Съхранен град се sedí под ски склонове. През зима: ски, сноубордване. През лято: планинска хайка.",nt:"Ски карта 55-65 лева. Автобус 3,5 часа. Легла 30-60 лева."},
  {id:83,n:"Pirin National Park — Mountain Wilderness",a:"Pirin Mountains",v:["nature", "beautiful", "quiet"],d:200,s:"UNESCO protected wilderness with alpine lakes, peaks, hiking trails, pristine ecosystems",st:"Pirin is raw Bulgaria. Alpine lakes at elevation, rocky peaks, sparse vegetation. Hiking trails traverse exposed ridges. It\'s genuinely remote—few tourists venture deep. You feel insignificant before nature. The park contains 1,000+ lakes, dozens of peaks over 2,500m. Multi-day treks are rewarding but demanding.",im:"It\'s dawn at altitude. You\'re alone on a mountain pass; the world stretches below.",t:"Free hiking. Huts 25-35 BGN/night. Guides available 50 BGN. Best June-September.",c:["nature"],r:"g",nn:"Национален парк Пирин — Планинска дива природа",ns:"ЮНЕСКО защитена дива природа с алпийски езера",nst:"Пирин е суров България. Алпийски езера на височина, каменисти върхове. Пътеките преминават откритите гребени.",nt:"Свободна хайка. Хижи 25-35 лева. Водачи 50 лева."},
  {id:51,n:"Dragalevtsi Monastery — Mountain Sanctuary",a:"Vitosha",v:["history", "quiet", "nature"],d:120,s:"Ancient monastery nestled in Vitosha Mountain foothills",st:"Dragalevtsi Monastery sits peacefully in forested Vitosha slopes. Founded in the 14th century, it survives as a functioning monastic community. Nuns tend gardens; pilgrims pray in the stone chapel. The setting is serene—far from city noise, immersed in nature.",im:"It\'s afternoon. You\'re in the monastery courtyard, hearing only bells and birdsong.",t:"Free entry. Donations welcome. Open 9am-5pm. 1 hour hiking from city edge.",c:["history_big"],r:"g",nn:"Драгалевски манастир — Планински приют",ns:"Древен манастир в подножието на Витоша",nst:"Драгалевски манастир е спокойно място в гора. Основан в 14 век, е функциониращо монашко общество. Монахини пестят градини.",nt:"Свободен вход. Отворено 9:00-17:00. Хайка 1 час."},
  {id:52,n:"Knyaginja Botanical Garden — Species Collection",a:"South Park",v:["nature", "beautiful"],d:45,s:"Sprawling botanical garden with rare plant collections, themed sections",st:"The Botanical Garden spreads across acres showcasing global plant diversity. Rose gardens, Mediterranean sections, tropical greenhouse. Families stroll; botanists study. It\'s educational and beautiful. The garden rewards multiple visits—new discoveries on each path.",im:"It\'s spring. Every plant blooms; you\'re overwhelmed by color and fragrance.",t:"5 BGN entry. Open 9am-5pm daily. Peaceful, fully accessible.",c:["nature"],r:"g",nn:"Кнегиня ботаническа градина — Видове",ns:"Обширна ботаническа градина с редки растения",nst:"Ботаническата градина се разпростира на акра с световни растения. Розови градини, средиземни секции. Семейства разходят.",nt:"5 лева вход. Открито 9:00-17:00. Спокойна."},
  {id:53,n:"Vasil Levski Square Park — Urban Green",a:"Downtown",v:["nature", "local"],d:16,s:"Central square park with trees, playgrounds, locals relaxing",st:"This small downtown park is Sofia exhaling. Benches occupy shaded corners. A playground keeps children entertained. It\'s functional, not fancy. Office workers eat lunch here; pensioners nap on benches. It\'s essential urban green space.",im:"It\'s lunch hour. The park fills with office workers eating sandwiches.",t:"Free entry. Open 6am-10pm. Fully accessible.",c:["nature"],r:"g",nn:"Парк площад Василий Левски — Градско зелено",ns:"Централен парк със дървета и игрище",nst:"Малкия парк е София дишане. Пейки под сянка. Офисни работници ядат обед тук.",nt:"Свободен вход. Открито 6:00-22:00."},
  {id:54,n:"Museum of Socialist Art — Soviet Collection",a:"South Park",v:["history", "weird"],d:50,s:"Unique museum housed in former communist party building, Soviet-era sculptures and artworks",st:"This museum collects the flotsam of communist Bulgaria. Massive socialist sculptures, propagandist paintings, revolutionary ceramics. It\'s eerie and fascinating—relics of an ideology that shaped the nation. The building itself (former party headquarters) adds meaning. You feel history\'s weight.",im:"You\'re standing before a 10-meter propaganda sculpture, reading its Cyrillic inscription.",t:"8 BGN entry. Open 10am-6pm Wednesday-Sunday. Closed Mondays.",c:["history_big"],r:"g",nn:"Музей на социалистическото изкуство — Советска колекция",ns:"Уникален музей в бивша комунистическа партия сграда",nst:"Музеят събира останките на комунистическа България. Масивни социалистически скулптури, революционни керамики. Сградата е бивша партия квартира.",nt:"8 лева вход. Отворено сряда-неделя."},
  {id:55,n:"Aleksandar Nevsky Crypt — Underground Saints",a:"Downtown",v:["history", "quiet"],d:20,s:"Underground crypt beneath cathedral with religious reliquaries and saints",st:"Below Alexander Nevsky Cathedral lies a crypt. Reliquaries hold saint remains; icons glow in candlelight. It\'s sacred, solemn. Few tourists venture below; it feels genuinely holy. The crypt connects visitors to centuries of devotion.",im:"You descend stone stairs into candlelit dimness; prayers echo.",t:"Free entry (donations). Open during cathedral hours. 15 BGN guided tour.",c:["history_big"],r:"g",nn:"Крипта на Александър Невски — Подземни светци",ns:"Подземна крипта под катедралата със св. мощи",nst:"Под катедралата е крипта със свети мощи. Икони светят при светлина на свещи.",nt:"Свободен вход (дарове). Отворено по време на работа на катедрала."},
  {id:56,n:"Metropolitan Library — Book Sanctuary",a:"Downtown",v:["quiet", "history"],d:18,s:"Central library with extensive Bulgarian collection, reading rooms, archives",st:"The Metropolitan Library is Bulgaria\'s book heart. Reading rooms hum with quiet scholarship. Librarians assist patrons. The collection spans centuries—rare manuscripts, contemporary works. You can spend days here. It\'s peaceful, intellectual, timeless.",im:"It\'s afternoon. You\'re at a reading desk, absorbed in a 19th-century manuscript.",t:"Free entry. Open 10am-7pm Monday-Saturday. Closed Sundays.",c:["history_big"],r:"g",nn:"Столична библиотека — Книжна събиране",ns:"Централна библиотека с богата събирка",nst:"Столична библиотека е България книжна събиране. Читални със безшумна учебност. Библиотекари помагат.",nt:"Свободен вход. Открито 10:00-19:00 понеделник-събота."},
  {id:57,n:"Banitza & Banitsa Workshops — Pastry Training",a:"Downtown",v:["local", "food"],d:12,s:"Traditional bakery workshops teaching Bulgarian pastry-making, edible results",st:"You learn to make banitsa (Bulgarian cheese pastry) from grandmothers who\'ve done it for 50 years. They guide your hands folding phyllo, showing technique. You eat your creation—hot, salty, perfect. It\'s culinary tradition made personal. Many workshops offer this in Old Town.",im:"Your banitsa is fresh from the oven; steam rises as you bite into it.",t:"15-25 BGN per workshop (2-3 hours, includes meal). Book ahead.",c:["local_only"],r:"g",nn:"Баница работилници — Обучение на тесто",ns:"Традиционни пекарни с обучение за тесто",nst:"Научи се да правиш баница от баби. Те ръководят твоите ръце. Ядеш своето творение.",nt:"15-25 лева работилница (2-3 часа). Резервирай предварително."},
  {id:58,n:"Sofia Fortress Remnants — City Walls",a:"Downtown",v:["history", "hidden"],d:14,s:"Fragments of medieval city fortress walls, archaeological remnants scattered throughout downtown",st:"Sofia\'s medieval fortress is mostly gone, but fragments survive. Stone walls peek from parks and gardens. Archaeology buffs follow the old perimeter. It\'s a puzzle—you imagine the lost city protected by these walls. Most tourists miss them; locals walk past without noticing.",im:"You\'re touching a 600-year-old fortification wall, hidden behind a modern building.",t:"Free. Scattered locations throughout downtown. No entry fees.",c:["history_big"],r:"g",nn:"Софийска крепост останки — Градски стени",ns:"Фрагменти на средновековни крепостни стени",nst:"София крепост е главно ушла, но фрагменти остават. Каменни стени пробиват из паркове. Е пъзел от древна град.",nt:"Свободно. Разпръскани през града. Нова входни такси."},
  {id:59,n:"Skobelev Park Sculptures — Art Collection",a:"Downtown",v:["beautiful", "architecture"],d:16,s:"Urban park with monumental sculptures, art installations, outdoor gallery",st:"Skobelev Park is Sofia\'s outdoor art gallery. Sculptures populate paths—some figurative, others abstract. It\'s a curator\'s selection of Bulgarian and international art. You can spend hours circling, interpreting, photographing. It\'s accessible and free.",im:"You\'re photographing an abstract sculpture backlit by late afternoon sun.",t:"Free entry. Open dawn to dusk. Very accessible.",c:["beautiful"],r:"g",nn:"Парк Скобелев скулптури — Артна събирка",ns:"Парк със скулптури, артни инсталации",nst:"Парк Скобелев е София открита артна галерия. Скулптури пътеките. Можеш да прекараш часове.",nt:"Свободен вход. Открито от зора до залез."},
  {id:60,n:"Banya Basha Spice Market Detail Walks",a:"Downtown",v:["local", "hidden", "weird"],d:11,s:"Guided walking tours of historic spice and textile market alleyways",st:"Hire a local guide to navigate Banya Basha market alleyways. They show hidden spice dealers, textile workshops, tea merchants. You taste saffron, handle silk, negotiate like a local. It\'s sensory, educational, authentic. Tours available most days from Old Town offices.",im:"Your guide introduces you to a spice merchant; you smell saffron, cumin, sumac.",t:"20-30 BGN per person (2-3 hours). Groups of 4+. Book ahead.",c:["local_only"],r:"g",nn:"Подробни разходки на пазара на подправки",ns:"Водени разходки по исторически пазар",nst:"Наеми местен водач за пазара. Показва скрити търговци. Ти дегустираш, преговаряш. Е сензорна, автентична.",nt:"20-30 лева на човек (2-3 часа). Групи от 4+. Резервирай."},
  {id:61,n:"Ivan Rilski Literary Museum",a:"Downtown",v:["history", "quiet"],d:17,s:"Museum honoring Bulgaria\'s national poet with personal effects and manuscripts",st:"This museum preserves Ivan Rilski\'s legacy. Period furniture, manuscripts, personal items. It\'s intimate—you feel the poet\'s presence. The building is modest, the collection modest, but the spiritual weight is immense.",im:"You\'re reading Rilski\'s handwritten poems under soft museum lighting.",t:"3 BGN entry. Open Tuesday-Sunday 10am-5pm. Closed Mondays.",c:["history_big"],r:"g",nn:"Литературен музей Иван Рилски",ns:"Музей на България национален поет",nst:"Музеят съхранява наследството на Иван Рилски. Личните предмети, ръкописи. Е интимна.",nt:"3 лева вход. Отворено вторник-неделя 10:00-17:00."},
  {id:62,n:"Ethnographic Museum — Folk Culture",a:"Downtown",v:["history", "beautiful"],d:19,s:"Museum showcasing Bulgarian folk traditions, textiles, household objects, rural life",st:"Rooms display traditional Bulgarian life: woven textiles, pottery, wedding costumes. Each region\'s distinctive style is represented. It\'s colorful, tactile, educational. You understand Bulgaria\'s cultural diversity through objects.",im:"You\'re examining an intricately woven dowry chest from the 19th century.",t:"4 BGN entry. Open 10am-5pm daily. Well-labeled exhibits in Bulgarian/English.",c:["history_big"],r:"g",nn:"Етнографски музей — Народна култура",ns:"Музей на България народна традиция",nst:"Стаи показват традиционния български живот. Тъкани, керамика, сватбени костюми.",nt:"4 лева вход. Открито 10:00-17:00."},
  {id:63,n:"Jazz Music Clubs — Nighttime Venues",a:"Downtown",v:["night", "local"],d:18,s:"Underground jazz clubs featuring live performances, intimate atmosphere",st:"Sofia has a vibrant underground jazz scene. Small clubs in Old Town and near Vitosha Boulevard feature nightly performances. Atmosphere is intimate, audiences appreciative. Artists from across Europe rotate through. It\'s sophisticated, soulful.",im:"You\'re in a basement club hearing live jazz; smoke curls in blue light.",t:"Free entry (2-drink minimum). Shows 10pm-2am. Drinks 5-10 BGN.",c:["night"],r:"g",nn:"Джаз клубове — Нощни венюй",ns:"Джазови клубове със живи представления",nst:"София има жив джаз сцена. Малки клубове със живи представления ежедневно. Атмосфера е интимна.",nt:"Свободен вход (пиће минимум). Представления 22:00-02:00."},
  {id:64,n:"Sofia Underpass Murals — Street Art",a:"Downtown",v:["weird", "beautiful", "modern"],d:13,s:"Underground passage walls covered in vibrant street art and murals",st:"Walking through pedestrian underpasses, you\'re surrounded by street art. Local artists use these spaces for expression. It\'s colorful chaos—tags, murals, tags over murals. Some pieces are sophisticated; others are throwups. It\'s authentic urban art, not gallery-curated.",im:"You\'re photographing a massive mural—a mythological creature rendered in neons.",t:"Free to walk. Always evolving. New art appears weekly. Photography encouraged.",c:["weird"],r:"g",nn:"Софийски подземни роспис — Уличното изкуство",ns:"Подземен проход със стена с живи роспис",nst:"Подходите са покрити с уличното изкуство. Е цветен хаос. Оригинално градско изкуство.",nt:"Свободна разходка. Винаги се развива. Нова артна всяка седмица."},
  {id:65,n:"Patriarchal Palace Historic Building",a:"Downtown",v:["history", "architecture"],d:21,s:"Former patriarchal residence, ornate building showcasing Orthodox grandeur",st:"This building housed Orthodox patriarchs. Ornate facades, high ceilings, period furnishings. It\'s marginally accessible but worth viewing from outside. The architecture speaks to church power in Ottoman and post-Ottoman Bulgaria.",im:"You\'re admiring the building\'s ornate balconies and decorative details.",t:"Limited access (restricted). Best viewed from street. 5 BGN donation if opened.",c:["history_big"],r:"g",nn:"Патриаршеска резиденция — Исторична сграда",ns:"Бивша патриаршеска резиденция със православна величественост",nst:"Сградата живеа православни патриархи. Орнаментална фасада, висок таван. Е архитектура на църковна власт.",nt:"Ограничен достъп. Виждаш се от улица. 5 лева дарение."},
  {id:66,n:"Bulgarian Women\'s Association — Social Hub",a:"Downtown",v:["local", "hidden"],d:14,s:"Historic women\'s organization building, cultural events, local gathering space",st:"This building has hosted Bulgarian women\'s activities for a century. Events, exhibitions, cultural programs. It\'s a functioning space—not a museum but a lived-in institution. Few tourists find it; it\'s genuinely local.",im:"You\'re at a women\'s author event; locals chat in Bulgarian.",t:"Free entry for events (check schedule). Open office hours 10am-5pm weekdays.",c:["local_only"],r:"g",nn:"Асоциация на български жени — Социален хъб",ns:"Историческа организация на женската сдружениця",nst:"Сградата хоста България женската активност поколения. События, изложби. Е функциониращо място.",nt:"Свободен вход на събития. Отворено 10:00-17:00 работни дни."},
  {id:67,n:"Zhenski Bazaar Market Extension — Hidden Stalls",a:"Downtown",v:["local", "hidden", "weird"],d:13,s:"Extended market areas beyond main Zhenski Bazaar with unique vendors",st:"Beyond the main Women\'s Market lie smaller alleys with specialized vendors. Spice dealers, fabric remnant sellers, tool merchants. It\'s less touristy than the main bazaar. Prices are cheaper. Locals know these passages; tourists rarely venture in.",im:"You\'re negotiating fabric prices with a vendor who only speaks Bulgarian.",t:"Free entry. Best 8am-12pm. Cash only. Expect negotiation.",c:["local_only"],r:"g",nn:"Женски пазар разширение — Скрити щайги",ns:"Разширение на Женския пазар със уникални продавачи",nst:"Извън главния пазар лежат по-малки улици със специализирани продавачи. Е по-местна.",nt:"Свободен вход. Най-добре 8:00-12:00. Само готівка."},
  {id:68,n:"Vasil Aprilov Monument — National Hero",a:"Downtown",v:["history"],d:15,s:"Monument honoring revolutionary and educator, surrounded by plaza",st:"Vasil Aprilov was a Bulgarian revolutionary. His monument stands in a plaza where locals pass daily. It\'s a focal point of civic identity. Tourists photograph it; locals barely notice. It\'s essential to Bulgarian nationalism but invisible to outsiders.",im:"You\'re reading the inscription, understanding a hero\'s sacrifice.",t:"Free outdoor monument. Always accessible.",c:["history_big"],r:"g",nn:"Паметник Василий Апрілов — национален герой",ns:"Паметник на революционер и учител",nst:"Василий Апрілов е български революционер. Паметникът му е в плаца. Е фокус на гражданска идентичност.",nt:"Свободен паметник. Винаги достъпен."},
  {id:69,n:"Puppet Theatre of Sofia — Children\'s Performances",a:"Downtown",v:["local", "beautiful"],d:16,s:"Dedicated puppet theatre with daily performances, traditional and contemporary shows",st:"This theatre brings puppets to life. Daily performances for children and adventurous adults. Puppetry is sophisticated art—traditions meet innovation. The building is charming, the atmosphere enchanting. Shows are in Bulgarian but visually clear.",im:"You\'re watching a masterful puppeteer animate a wooden figure to laughter.",t:"5-10 BGN per ticket. Shows daily (check schedule). Book online or at box office.",c:["local_only"],r:"g",nn:"Кукленски театър на София — Детски представления",ns:"Кукленски театър със дневни представления",nst:"Театърът придава живот на кукли. Дневни представления за деца. Е чаровна атмосфера.",nt:"5-10 лева билет. Представления ежедневно. Резервирай онлайн."},
  {id:70,n:"Dondukov Boulevard Trees — Shaded Walking Route",a:"Downtown",v:["beautiful", "local"],d:18,s:"Grand tree-lined avenue through downtown with historic buildings and cafes",st:"Dondukov Boulevard stretches through downtown shaded by ancient trees. Cafes spill onto the pavement. It\'s Sofia\'s most pleasant walking route—functional and beautiful. Locals use it daily; tourists discover it accidentally.",im:"It\'s afternoon. You\'re walking beneath a cathedral of leaves; dappled light everywhere.",t:"Free walking. Cafes 3-8 BGN per drink. Fully accessible.",c:["beautiful"],r:"g",nn:"Булевард Дондуков дърветата — Сенена разходка",ns:"Грандиозен булевард със сенени дърветата",nst:"Булевард Дондуков е най-приятния маршрут на София. Дърветата хвърчат сянка. Кафе всички.",nt:"Свободна разходка. Кафе 3-8 лева. Напълно достъпна."},
  {id:84,n:"Sofia City Park — Urban Green Space",a:"Parks",v:["nature", "local"],d:30,s:"Community park with walking paths and local life",st:"This park serves the community. Paths wind through trees. Locals walk, children play. It\'s functional, not fancy.",im:"You\'re sitting on a bench, watching the world pass.",t:"Free entry. Open dawn to dusk.",c:["nature"],r:"g",nn:"Park Sofia — Mestná Zeleň",ns:"Komunálny park s chodníkmi",nst:"Park slúži komunite. Chodníky sa kľučatia. Miestni chodia.",nt:"Slobodný vstup. Otvorené od zore do zaliezania."},
  {id:85,n:"Sofia Historical Archive — Document Collection",a:"Downtown",v:["history", "quiet"],d:22,s:"City archive preserving historical documents and maps",st:"The archive holds centuries of city records. Maps, deeds, photographs. Researchers work here daily. It\'s quiet, scholarly, essential to historical understanding.",im:"You\'re examining a 300-year-old map of the city.",t:"3 EUR entry. Open by appointment. Researchers priority.",c:["history_big"],r:"g",nn:"Archív Sofia — Zbierka Dokumentov",ns:"Mestný archív s historickými dokumentami",nst:"Archív obsahuje záznamy mesta. Mapy, listiny, fotografie.",nt:"3 EUR vstup. Otvorené na základe rezervácie."},
  {id:86,n:"Sofia Art School Gallery — Student Works",a:"Arts District",v:["hidden", "beautiful"],d:19,s:"Gallery showcasing student and faculty art works",st:"Art school galleries exhibit emerging artists. Work is diverse, often experimental. It\'s accessible, unpretentious, authentic.",im:"You\'re critiquing abstract paintings with a student artist.",t:"Free entry. Open Tuesday-Friday 10am-5pm.",c:["hidden"],r:"g",nn:"Galeria Umenovej Školy — Študentské Diela",ns:"Galéria so študentským a profesorským umením",nst:"Galéria vystavuje začínajúcich umelcov. Práca je rôznorodá.",nt:"Slobodný vstup. Otvorené utorok-piatok 10:00-17:00."},
  {id:87,n:"Sofia Local Brewery Taproom — Craft Beer",a:"Downtown",v:["local", "night"],d:16,s:"Small brewery serving house beers to local crowd",st:"This brewery makes beer for locals. No tourists, just community. You taste the beer, chat with brewers. It\'s authentic, affordable, communal.",im:"You\'re at the bar, sipping a fresh IPA, talking to the brewer.",t:"Free entry. Beers 3-5 EUR. Open 5pm-11pm daily.",c:["local_only"],r:"g",nn:"Piváreň Sofia — Craft Pivo",ns:"Malá pivovňa s domácim pivom",nst:"Pivovňa vyrába pivo pre miestnych. Žiadni turisti, iba komunita.",nt:"Slobodný vstup. Pivo 3-5 EUR. Otvorené 17:00-23:00."},
  {id:88,n:"Sofia Photography Museum — Image Archive",a:"Arts District",v:["history", "beautiful"],d:20,s:"Museum of photography documenting city and regional history through images",st:"Photography reveals history. This museum showcases city evolution through photographs. Images from 100 years ago show transformation. It\'s visual history, moving and clear.",im:"You\'re looking at photographs of the city from 1950, amazed at the changes.",t:"4 EUR entry. Open 10am-5pm Tuesday-Sunday. Closed Mondays.",c:["history_big"],r:"g",nn:"Fotografický Múzeum — Archív Obrázkov",ns:"Múzeum fotografie s archívom mesta",nst:"Fotografia odhaľuje históriu. Múzeum ukazuje vývoj mesta cez fotografie.",nt:"4 EUR vstup. Otvorené utorok-nedeľa 10:00-17:00."},

,{id:134,n:"Central Sofia Cemetery",a:"Orlandovtsi",v:["hidden", "eerie"],d:20,s:"Surprisingly beautiful open-air museum of ornate tombs and Soviet memorials",st:"Wander among hauntingly elegant family mausoleums and forgotten heroes under whispering pines. Golden hour casts a romantic glow on the eerie quietude. Feel history's chill in this locals' secret reflective retreat.",im:"Imagine golden light filtering through ancient trees onto intricate stone angels guarding eternal sleepers.",t:"Metro M1 to G.M. Dimitrov station, 20min walk north; free entry always; best golden hour sunset. ef: Nearby cheap banitsa stalls for picnic vibes.",c:["cemeteries", "history"],r:"g",nn:"Централни софийски гробища",ns:"Изненадващо красив открит музей на орнаментирани гробове и съветски паметници",nst:"Разхождай се сред призрачно елегантни фамилни мавзолеи и забравени герои под шепнещи борови. Златният час хвърля романтичен блясък върху зловещата тишина. Усети студа на историята в това тайно място за размисъл на местните.",nt:"Метро M1 до ст. Г.М. Димитров, 20 мин. пеша на север; безплатен вход винаги; най-добре при залез. ef: Близо евтини сергии с банitsa за пикник."},
{id:135,n:"Small Five Corners Boho Roam",a:"Sredets",v:["hidden", "boho"],d:15,s:"Self-guided wander through café-lined streets with cool facades and street scenes",st:"Lose yourself in Sredets' bohemian pulse where ivy-cloaked buildings hide buzzing hole-in-the-wall cafés. Locals sip rakia under eclectic murals, sharing whispers of underground art scenes. Perfect low-key adventure for curious souls.",im:"Picture yourself meandering past graffiti-splashed walls, coffee aroma luring you into a hidden courtyard party.",t:"Tram 20/22 or metro to Serdika, wander Tsar Ivan Shishman / Angel Kanchev / Neofit Rilski streets; free; late afternoon for vibe. ef: Street banitsa vendors for 2 BGN snack.",c:["streets", "culture"],r:"g",nn:"Малки петъкли (Sredets)",ns:"Самостоятелно блуждане из улички с кафенета, готин фасад и улични сцени",nst:"Загуби се в богемския пулс на Средит, където бршинени сгради крият жужащи кафенета. Местни пият ракия под еклектични мурали, споделяйки шепоти за подземни арт сцени. Перфектно приключение за любопитни души.",nt:"Трамвай 20/22 или метро до Сердика, блуждай по ул. Цар Иван Шишман / Ангел Кънчев / Неофит Рилски; безплатно; късно следобед за атмосфера. ef: Улични сергии с банitsa за 2 лв."},
{id:136,n:"Mineral Water Fountains Mission",a:"City Center",v:["hidden"],d:5,s:"Fill your bottle at free public mineral springs while exploring ancient core",st:"Hunt bubbly treasure from street fountains near Banya Bashi, tasting earth's fizzy gift. Locals top up daily for health kicks amid Ottoman echoes. A quirky ritual blending wellness and history.",im:"Feel the effervescent rush as pristine mineral water gurgles into your bottle, steam rising in crisp air.",t:"Walk from Largo or Banya Bashi Mosque; free always, bring empty bottle; anytime, lively mornings. ef: Zhenski Pazar snacks 1km away.",c:["springs", "wellness"],r:"g",nn:"Минерални чешми мисия",ns:"Напълни бутилката си от безплатни минерални извори в древното ядро",nst:"Лови мехурчастото съкровище от улични чешми близо Баня Баши, опитвайки газирания дар на земята. Местните се пълнят ежедневно за здравословни удари сред османски ехо. Куражлив ритуал, смесващ здраве и история.",nt:"Пеша от Ларго или Баня Баши; безплатно винаги, вземи празна бутилка; по всяко време, оживени сутрини. ef: Захарки от Женски пазар на 1км."},
{id:137,n:"Garage Tavern Mystery Dinner",a:"The Lakes / Sofia University",v:["hidden"],d:25,s:"Locals-only hidden garage eatery—no menu, just ask the elderly cook",st:"Duck into a shadowy garage where a granny whips up homey feasts from what's fresh. No frills, just authentic flavors and warm chats with uni crowd. Ultimate offbeat food quest reward.",im:"Savor steaming tarator soup ladled from a cauldron in a dimly lit garage turned secret tavern.",t:"Near Sofia Uni behind Orlov Most; free entry but pay for food (~10 BGN); go early evening, be polite. Almost free and worth it: Home meal, 8-12 BGN.",c:["food", "local"],r:"g",nn:"Гаражна таверна мистерия",ns:"Скрит гаражен ресторант само за местни—няма меню, питай готвачката",nst:"Завирай се в сянка гараж, където баба свари домашни гозби от свежото. Без излишества, само автентични вкусове и топли разговори с уни студентите. Най-добро възнаграждение за хранителна авантюра.",nt:"Близо Софийски уни зад Орлов мост; безплатен вход, но плати за храна (~10 лв); отиди рано вечер, бъди учтив. Почти безплатно и си струва: Домашно ядене, 8-12 лв."},
{id:138,n:"Kopitoto Sunset Viewpoint",a:"Vitosha Mountain",v:["hidden", "romantic"],d:30,s:"Epic free panorama of Sofia at golden hour from Vitosha's shoulder",st:"Hike up to where the city sprawls like a glittering toy set below jagged peaks. Couples picnic with thermoses as sun dips, painting sky in fire. Broke-romantic's dream perch.",im:"Watch Sofia's lights flicker on like stars mirrored in the valley as dusk kisses the peaks.",t:"Bus 122/123 from Hladilnika to Kopitoto TV tower trailhead, 30min hike; free; sunset. ef: Pack banitsa picnic.",c:["viewpoints", "hiking"],r:"g",nn:"Копитото изгрев",ns:"Епичен безплатен панорама на София при златния час от рамото на Витоша",nst:"Качи се където града се разстеля като блестяща играчка под назъбени върхове. двойки пикник с термоси докато слънцето потъва, боядисвайки небето в огън. Мечта за романтици без пари.",nt:"Автобус 122/123 от Хладилника до пътеката на Копитото, 30 мин. пеша; безплатно; залез. ef: Опакурай банitsa пикник."}];

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Sofia Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
