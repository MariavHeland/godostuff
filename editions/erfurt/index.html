  {id:48,n:"Erfurt Old Jewish Quarter — Altstadt #48",a:"Altstadt",v:["history","hidden"],d:43,s:"The streets where Erfurt\'s medieval Jewish community lived — traces in the stone",st:"Erfurt had one of the most prosperous Jewish communities in medieval Germany. The Jewish quarter was between the Dom and the old synagogue. The 1349 pogrom ended it. The stones remember.",im:"Time-travel: medieval Erfurt\'s Jewish quarter at its peak — money changers, scholars, a community",t:"Walk Michaelisstraße and Schlösserstraße. Look for the historical markers.",c:["local_only"],r:"g",nn:"Altes jüdisches Viertel — Altstadt #48",ns:"Die Straßen, in denen Erfurts mittelalterliche jüdische Gemeinde lebte — Spuren im Stein",nst:"Erfurt hatte eine der wohlhabendsten jüdischen Gemeinden im mittelalterlichen Deutschland.",nt:"Michaelisstraße und Schlösserstraße abgehen. Nach den historischen Markierungen suchen."},
  {id:49,n:"Severikirche Interior — Altstadt #49",a:"Altstadt",v:["history","beautiful"],d:6,s:"The church of Severus — a Gothic hall church with the Eros sarcophagus and extraordinary light",st:"The Severikirche stands beside the Cathedral and is often overlooked by visitors who only enter the Dom. The interior has a warm Gothic light and the famous Eros sarcophagus from 1365.",im:"Time-travel: the sarcophagus being carved in 1365, the craftsman\'s chisel ringing in the stone",t:"Free entry. Stand in the nave and look up.",c:["architecture"],r:"g",nn:"Severikirche Innen — Altstadt #49",ns:"Die Kirche des Severus — eine gotische Hallenkirche mit dem Eros-Sarkophag und außergewöhnlichem Licht",nst:"Die Severikirche steht neben dem Dom und wird oft übersehen. Der Eros-Sarkophag von 1365.",nt:"Freier Eintritt. Im Kirchenschiff stehen und hochschauen."},
  {id:50,n:"Erfurt Roof Terrace View — Petersberg #50",a:"Petersberg",v:["beautiful","free","quiet"],d:40,s:"The best free city view in Erfurt — from the Petersberg Citadel north wall at sunset",st:"The north wall of Petersberg Citadel looks directly over the old town. The cathedral spires, the Krämerbrücke towers, the Gera river meadows. Nothing between you and it.",im:"Time-travel: Allied soldiers surveying the liberated city from these ramparts, April 1945",t:"Go at sunset. Always free. The north side is best.",c:["history_big"],r:"g",nn:"Erfurt Dachterrassen-Blick — Petersberg #50",ns:"Der beste kostenlose Stadtblick in Erfurt — von der Petersberg-Zitadelle Nordmauer bei Sonnenuntergang",nst:"Die Nordmauer von Petersberg blickt direkt über die Altstadt. Domtürme, Krämerbrücke, Gera-Wiesen.",nt:"Bei Sonnenuntergang gehen. Immer kostenlos. Die Nordseite ist besser."},
  {id:51,n:"Krämerbrücke — Krämerbrücke #51",a:"Krämerbrücke",v:["history","beautiful","hidden"],d:17,s:"Medieval bridge lined with inhabited houses — the only one north of the Alps still lived in",st:"Built in 1325, the Krämerbrücke has 32 buildings sitting directly on the bridge structure. Merchants traded here. People still live above the shops. The only bridge of its kind in the world.",im:"Time-travel: cloth merchants trading from these same houses in 1400, bridge packed with buyers",t:"Cross at dawn for no crowds. The alleys at each end are as good as the bridge.",c:["high_spots"],r:"g",nn:"Krämerbrücke — Krämerbrücke #51",ns:"Mittelalterliche Brücke mit bewohnten Häusern — die einzige nördlich der Alpen noch bewohnte",nst:"1325 gebaut, hat die Krämerbrücke 32 Gebäude direkt auf der Brückenstruktur. Menschen leben noch dort.",nt:"Bei Tagesanbruch überqueren für keine Menschenmassen. Die Gässchen an jedem Ende sind genauso gut."},
  {id:52,n:"Erfurt Cathedral Hill — Altstadt #52",a:"Altstadt",v:["history","beautiful"],d:50,s:"Two Gothic churches side by side on a hill above the city — and both are free to enter",st:"The Erfurt Dom and Severikirche stand together on the Domhügel. The 70 cathedral steps lead up to one of the most powerful Gothic ensembles in Germany. Free to enter both.",im:"Time-travel: Luther being ordained as a priest in this cathedral, 1507",t:"Climb the steps. The Cathedral is free. Severikirche is free. Go inside both.",c:["parks"],r:"g",nn:"Domhügel — Altstadt #52",ns:"Zwei gotische Kirchen nebeneinander auf einem Hügel — und beide kostenlos zu betreten",nst:"Der Erfurter Dom und die Severikirche stehen zusammen auf dem Domhügel. 70 Stufen hinauf.",nt:"Die Stufen hinaufsteigen. Dom kostenlos. Severikirche kostenlos. Beide betreten."},
  {id:53,n:"Petersberg Citadel — Petersberg #53",a:"Petersberg",v:["history","beautiful","free"],d:46,s:"Largest baroque citadel in central Germany — free to enter, enormous and almost empty",st:"The Petersberg Citadel covers 36 hectares of hilltop and is one of the best-preserved baroque military complexes in Europe. The underground casemates can be toured. The ramparts are free to walk.",im:"Time-travel: Napoleon riding through this citadel gate in 1806 after Jena",t:"Free to walk the ramparts any time. Underground tour for small fee.",c:["courtyards"],r:"g",nn:"Zitadelle Petersberg — Petersberg #53",ns:"Größte Barockzitadelle in Mitteldeutschland — kostenloser Zutritt, riesig und fast leer",nst:"Die Petersberg-Zitadelle umfasst 36 Hektar und ist eines der am besten erhaltenen Barockfestsysteme Europas.",nt:"Wälle jederzeit kostenlos begehen. Unterirdische Tour für kleinen Eintritt."},
  {id:54,n:"Alte Synagoge Erfurt — Altstadt #54",a:"Altstadt",v:["history","hidden"],d:49,s:"One of the best-preserved medieval synagogues in Europe — 900 years old and almost intact",st:"Built around 1094, the Alte Synagoge was used as a storehouse for centuries which accidentally preserved it. The Erfurt Jewish treasure — 3,141 silver coins hidden in a wall — was found here in 1998.",im:"Time-travel: the Erfurt Jewish community gathering here in 1200, the city full of their trade",t:"Small entry fee for the interior. Exterior and nearby old Jewish quarter free.",c:["romantic_water"],r:"g",nn:"Alte Synagoge — Altstadt #54",ns:"Eine der besterhaltenen mittelalterlichen Synagogen Europas — 900 Jahre alt und fast intakt",nst:"Um 1094 gebaut. Als Lagerhaus für Jahrhunderte genutzt, was sie zufällig bewahrte.",nt:"Kleiner Eintritt für das Innere. Außenbereich und jüdisches Viertel kostenlos."},
  {id:55,n:"Augustinerkloster Courtyard — Andreasquarter #55",a:"Andreasquarter",v:["history","quiet","beautiful"],d:39,s:"Luther\'s monastery — where he became a monk in 1505, still standing, still a working place",st:"The Augustinian monastery is where Martin Luther lived as a monk. He described his cell. He said his first Mass here. The courtyard is open and free. A place where history is still present.",im:"Time-travel: Luther walking these cloisters in 1506, studying by candlelight",t:"Free to enter the courtyard. Guided tours for a small fee.",c:["scary"],r:"g",nn:"Augustinerkloster Hof — Andreasquarter #55",ns:"Luthers Kloster — wo er 1505 Mönch wurde, noch stehend, noch ein arbeitender Ort",nst:"Das Augustinerkloster ist der Ort, wo Martin Luther als Mönch lebte. Er beschrieb seine Zelle.",nt:"Hof kostenlos zu betreten. Führungen für kleinen Eintritt."},
  {id:56,n:"Fischmarkt & Rathaus — Krämerbrücke #56",a:"Krämerbrücke",v:["history","beautiful","local"],d:31,s:"Neo-Gothic town hall on the old fish market — Luther on one side, Faust on the other",st:"The 1870 town hall has murals of Luther and the Faust legend in its council chamber. The market square outside is the commercial heart of Erfurt since the Middle Ages.",im:"Time-travel: cloth merchants and fish sellers arguing over prices in this square, 1450",t:"The square is free. Town hall interior open on weekdays.",c:["famous_dead"],r:"g",nn:"Fischmarkt & Rathaus — Krämerbrücke #56",ns:"Neugotisches Rathaus auf dem alten Fischmarkt — Luther auf einer Seite, Faust auf der anderen",nst:"Das Rathaus von 1870 hat Wandbilder von Luther und der Faust-Sage.",nt:"Platz kostenlos. Rathausinneres werktags geöffnet."},
  {id:57,n:"Wenigemarkt Square — Krämerbrücke #57",a:"Krämerbrücke",v:["history","local","beautiful"],d:19,s:"The smallest market square — half-timbered houses, fountain, no tourists in the evening",st:"Wenigemarkt is the intimate square at the eastern end of the Krämerbrücke. One of Erfurt\'s oldest trading spots. In the evening, locals take it back. The fountain is 16th century.",im:"Time-travel: this square crammed with market stalls in the 1500s, smelling of fish and wool",t:"Come in the evening. Best with one of the local wines.",c:["street_art"],r:"g",nn:"Wenigemarkt — Krämerbrücke #57",ns:"Der kleinste Marktplatz — Fachwerkhäuser, Brunnen, keine Touristen am Abend",nst:"Wenigemarkt ist der intime Platz am östlichen Ende der Krämerbrücke.",nt:"Abends kommen. Am besten mit einem lokalen Wein."},
  {id:58,n:"Ilmpark Riverbank — Ilmpark #58",a:"Ilmpark",v:["nature","quiet","beautiful"],d:33,s:"The Gera river meadows south of the cathedral — wildflowers, birdsong, complete urban escape",st:"The river Gera runs through Erfurt beneath weeping willows. The meadows along it are barely touched. This is the quiet Erfurt that locals know and visitors miss.",im:"Time-travel: Erfurt citizens cooling off in the Gera on a summer day, 1900",t:"Free. Best in early morning or evening.",c:["abandoned"],r:"g",nn:"Gera-Ufer — Ilmpark #58",ns:"Die Gera-Wiesen südlich des Doms — Wildblumen, Vogelgesang, vollständige Stadtwildnis",nst:"Die Gera fließt durch Erfurt unter Trauerweidechen. Die Wiesen sind kaum berührt.",nt:"Kostenlos. Am besten früh morgens oder abends."},
  {id:59,n:"Predigerkirche — Andreasquarter #59",a:"Andreasquarter",v:["history","quiet"],d:42,s:"Dominican church from 1228 — the altar where Luther preached, still in place",st:"The Prediger church is one of the oldest mendicant churches in Germany. Luther preached here before his Reformation. The interior is austere and powerful. Almost no tourists.",im:"Time-travel: Luther preaching to a packed congregation in this church, 1510",t:"Free entry. Often completely empty.",c:["free_museum"],r:"g",nn:"Predigerkirche — Andreasquarter #59",ns:"Dominikanerkirche aus dem Jahr 1228 — der Altar, an dem Luther predigte, noch an seinem Platz",nst:"Die Predigerkirche ist eine der ältesten Bettelordenskirchen Deutschlands.",nt:"Freier Eintritt. Oft völlig leer."},
  {id:60,n:"Zitadelle Rampart Views — Petersberg #60",a:"Petersberg",v:["beautiful","free","history"],d:22,s:"Walk the full circuit of the citadel ramparts — 360 degree views over Erfurt and Thuringia",st:"The rampart walk around Petersberg Citadel takes about 30 minutes. The views are extraordinary — the cathedral towers, the old town, and on clear days, the Thuringian forest in the distance.",im:"Time-travel: Prussian soldiers drilling on these ramparts in 1806, Napoleon watching",t:"Free at all times. Best at golden hour.",c:["local_only"],r:"g",nn:"Zitadelle Wallpromenade — Petersberg #60",ns:"Den vollen Rundweg der Zitadellenwälle gehen — 360-Grad-Blick über Erfurt und Thüringen",nst:"Der Wallrundweg dauert ca. 30 Minuten. Kathedralentürme, Altstadt, Thüringer Wald in der Ferne.",nt:"Jederzeit kostenlos. Am besten bei goldener Stunde."},
  {id:61,n:"Thomaskirche — Andreasquarter #61",a:"Andreasquarter",v:["history","quiet"],d:5,s:"Medieval parish church where generations of Erfurt citizens were christened and buried",st:"One of the oldest parish churches in Erfurt, dating to the 13th century. The interior has accumulated seven centuries of memorial tablets, epitaphs, and donated art.",im:"Time-travel: a medieval Erfurt family attending Sunday mass here, 1380",t:"Usually open. Free.",c:["architecture"],r:"g",nn:"Thomaskirche — Andreasquarter #61",ns:"Mittelalterliche Pfarrkirche, wo Generationen von Erfurter Bürgern getauft und begraben wurden",nst:"Eine der ältesten Pfarrkirchen Erfurts aus dem 13. Jh.",nt:"Normalerweise geöffnet. Kostenlos."},
  {id:62,n:"Cyriaksburg Ruin View — Altstadt #62",a:"Altstadt",v:["history","hidden","beautiful"],d:53,s:"The ruined hilltop fortress with sweeping views over Erfurt from above the egapark",st:"The Cyriaksburg was a medieval fortress razed by Napoleon in 1813. The ruin sits on a hill above the egapark gardens. The view from the remaining walls is the best in Erfurt.",im:"Time-travel: French soldiers blowing up the Cyriaksburg on Napoleon\'s orders, 1813",t:"Enter through the egapark (free outside opening hours via the hill path).",c:["history_big"],r:"g",nn:"Cyriaksburg Ruine — Altstadt #62",ns:"Die Burgruine auf dem Hügel mit Blick auf Erfurt von über dem egapark",nst:"Die Cyriaksburg war eine mittelalterliche Festung, die Napoleon 1813 schleifte.",nt:"Über den egapark eintreten (außerhalb der Öffnungszeiten über den Hügelpfad kostenlos)."},
  {id:63,n:"Anger Main Square — Altstadt #63",a:"Altstadt",v:["history","local"],d:15,s:"Erfurt\'s main commercial square — where the post coach arrived and the city met",st:"The Anger has been Erfurt\'s main public square for over 400 years. The Baroque Angermuseum faces it. Trams cross it constantly. The square contains the best 19th century commercial facades.",im:"Time-travel: post coach arriving to the Anger in 1800, passengers spilling out, news exchanged",t:"Walk the full perimeter. The facades on the north side date from 1880–1900.",c:["high_spots"],r:"g",nn:"Anger — Altstadt #63",ns:"Erfurts Hauptplatz — wo die Postkutsche ankam und die Stadt sich traf",nst:"Der Anger ist seit über 400 Jahren Erfurts wichtigster öffentlicher Platz.",nt:"Den vollen Umfang abgehen. Die Fassaden der Nordseite stammen von 1880–1900."},
  {id:64,n:"Gera Waterway Walk — Krämerbrücke #64",a:"Krämerbrücke",v:["nature","hidden","beautiful"],d:49,s:"The hidden channels of the Gera river beneath the city — medieval watermills and secret paths",st:"The Gera splits into multiple channels through the old city. Following the water on foot reveals old mill races, hidden bridges, and backways that tourists never find.",im:"Time-travel: water-powered mills grinding wheat in these channels, the city running on river power, 1500",t:"Follow the water south from the Krämerbrücke. Keep close to the river.",c:["parks"],r:"g",nn:"Gera-Wasserweg — Krämerbrücke #64",ns:"Die versteckten Gera-Kanäle unter der Stadt — mittelalterliche Wassermühlen und geheime Wege",nst:"Die Gera teilt sich in mehrere Arme durch die Altstadt. Den Wasserläufen zu Fuß folgen.",nt:"Wasser von der Krämerbrücke nach Süden folgen. Nahe am Fluss bleiben."},
  {id:65,n:"Reglerkirche — Altstadt #65",a:"Altstadt",v:["history","quiet"],d:32,s:"Augustinian church opposite the citadel gate — Luther\'s church, before and after",st:"Luther worshipped at the Reglerkirche before and after his monastery period. The building is 13th century. The tower is unusually slender for Erfurt. Almost always open.",im:"Time-travel: Luther praying alone in this church the night before he entered the monastery, 1505",t:"Free. Often unlocked.",c:["courtyards"],r:"g",nn:"Reglerkirche — Altstadt #65",ns:"Augustinerkirche gegenüber dem Zitadellentor — Luthers Kirche, vorher und nachher",nst:"Luther betete in der Reglerkirche vor und nach seiner Klosterzeit.",nt:"Kostenlos. Oft unverschlossen."},
  {id:66,n:"Erfurt University Old Building — Altstadt #66",a:"Altstadt",v:["history","beautiful"],d:26,s:"The 1392 university — where Luther studied, one of the oldest in German-speaking Europe",st:"Erfurt University was founded in 1392, predating Berlin by centuries. Luther studied law here before abandoning it for a monastery. The historic buildings form a free courtyard complex.",im:"Time-travel: young Martin Luther arriving at Erfurt university from Mansfeld, 1501, terrified and determined",t:"The courtyard is free. The old lecture halls sometimes open.",c:["romantic_water"],r:"g",nn:"Alte Universität — Altstadt #66",ns:"Die Universität von 1392 — wo Luther studierte, eine der ältesten im deutschsprachigen Europa",nst:"Erfurter Universität wurde 1392 gegründet, Jahrhunderte vor Berlin. Luther studierte hier Jura.",nt:"Der Innenhof ist kostenlos. Die alten Hörsäle manchmal geöffnet."},
  {id:67,n:"Hirschgarten — Ilmpark #67",a:"Ilmpark",v:["nature","quiet","hidden"],d:22,s:"The hidden deer garden south of the citadel — a park that maps don\'t always show",st:"A small park and garden area south of Petersberg, quiet even in summer. The old paths through it wind between mature trees and disappear into the Gera meadows.",im:"Time-travel: 18th century Erfurt nobility walking trained deer in this garden",t:"Enter from Hirschgarten path off Talstraße. Free.",c:["scary"],r:"g",nn:"Hirschgarten — Ilmpark #67",ns:"Der versteckte Hirschgarten südlich der Zitadelle — ein Park, den Karten nicht immer zeigen",nst:"Ein kleiner Park südlich von Petersberg, still selbst im Sommer.",nt:"Von Hirschgartenpfad von der Talstraße eintreten. Kostenlos."},
  {id:68,n:"Andreasquarter Streets — Andreasquarter #68",a:"Andreasquarter",v:["local","history","beautiful"],d:14,s:"The artisan quarter of old Erfurt — half-timbered workshops, stone fountains, real residents",st:"The Andreasquarter was the craftsmen\'s district in medieval Erfurt. Many buildings date from the 16th and 17th centuries. The streets are narrow and the architecture is human-scaled.",im:"Time-travel: shoemakers and dyers working in these narrow workshops, 1550",t:"Walk the full quarter. Grüne Straße and Michaelisstraße are the best.",c:["famous_dead"],r:"g",nn:"Andreasquarter — Andreasquarter #68",ns:"Das Handwerkerviertel des alten Erfurts — Fachwerkwerkstätten, Steinfontänen, echte Bewohner",nst:"Das Andreasquarter war das Handwerkerviertel im mittelalterlichen Erfurt.",nt:"Das gesamte Viertel abgehen. Grüne Straße und Michaelisstraße sind die besten."},
  {id:69,n:"Kartäuserkloster Courtyard — Andreasquarter #69",a:"Andreasquarter",v:["history","quiet","hidden"],d:18,s:"The 14th century Carthusian monastery — now a school, but the cloister is still visible",st:"The Carthusians arrived in Erfurt in 1372. Their silent monastery eventually became a school. The Gothic cloister survives behind the school buildings and is sometimes accessible.",im:"Time-travel: Carthusian monks in absolute silence, forbidden to speak, crossing this cloister daily, 1400",t:"Ask at the school office. Sometimes open during school hours.",c:["street_art"],r:"g",nn:"Kartäuserkloster Hof — Andreasquarter #69",ns:"Das Kartäuserkloster aus dem 14. Jh. — jetzt eine Schule, aber der Kreuzgang ist noch sichtbar",nst:"Die Kartäuser kamen 1372 nach Erfurt. Ihr stilles Kloster wurde schließlich eine Schule.",nt:"Im Schulbüro fragen. Manchmal während der Schulzeiten zugänglich."},
  {id:70,n:"Krämerbrücke Side Alleys — Krämerbrücke #70",a:"Krämerbrücke",v:["hidden","local","beautiful"],d:53,s:"The alleys flanking the bridge at each end — medieval lanes that have barely changed",st:"The lanes at the eastern and western ends of the Krämerbrücke are as old as the bridge and hold the quietest architecture in Erfurt. Nobody photographs them. Walk both.",im:"Time-travel: bridge merchants taking their morning break in these same alleys, 1600",t:"Explore both ends. The east alley (Zum Augustinerkloster) is the better one.",c:["abandoned"],r:"g",nn:"Krämerbrückengassen — Krämerbrücke #70",ns:"Die Gassen, die die Brücke an jedem Ende flankieren — mittelalterliche Gassen, die sich kaum verändert haben",nst:"Die Gassen an den östlichen und westlichen Enden der Krämerbrücke sind so alt wie die Brücke.",nt:"Beide Enden erkunden. Die Ostgasse (Zum Augustinerkloster) ist die bessere."},
  {id:71,n:"Erfurt Cathedral Crypt — Altstadt #71",a:"Altstadt",v:["history","weird","hidden"],d:26,s:"The crypt below the cathedral — Romanesque foundations from 1154, almost no visitors",st:"The Dom was founded in 742 and rebuilt multiple times. The crypt contains Romanesque stonework from 1154 including the famous Wolfram candelabra — one of the oldest bronze objects in Germany.",im:"Time-travel: the crypt being constructed in 1154, candles flickering in the new stone vault",t:"Ask at the cathedral entrance for crypt access. Often free.",c:["free_museum"],r:"g",nn:"Domkrypta — Altstadt #71",ns:"Die Krypta unter dem Dom — romanische Fundamente von 1154, kaum Besucher",nst:"Der Dom wurde 742 gegründet und mehrfach umgebaut. Die Krypta enthält romanisches Mauerwerk.",nt:"Am Domeingang nach Kryptazugang fragen. Oft kostenlos."},
  {id:72,n:"Gorkistraße GDR Murals — Andreasquarter #72",a:"Andreasquarter",v:["street_art","hidden","history"],d:11,s:"Surviving GDR-era wall paintings on apartment buildings — socialist realism in the wild",st:"A few buildings in the Andreasquarter retain their GDR-era facade paintings — idealized workers, harvests, peace symbols. They were never removed. Unofficial monuments to the East.",im:"Time-travel: GDR paint brigade completing these murals, 1972, citizens watching skeptically",t:"Walk Gorkistraße. The murals are on the north-facing walls.",c:["local_only"],r:"g",nn:"Gorkistraße DDR-Wandbilder — Andreasquarter #72",ns:"Erhaltene DDR-Wandmalereien an Wohngebäuden — sozialistischer Realismus in der Wildnis",nst:"Einige Gebäude im Andreasquarter behalten ihre DDR-Fassadengemälde — Arbeiter, Ernten, Friedenssymbole.",nt:"Gorkistraße abgehen. Die Wandbilder befinden sich auf den nordseitigen Wänden."},
  {id:73,n:"Erfurt Old Jewish Quarter — Altstadt #73",a:"Altstadt",v:["history","hidden"],d:10,s:"The streets where Erfurt\'s medieval Jewish community lived — traces in the stone",st:"Erfurt had one of the most prosperous Jewish communities in medieval Germany. The Jewish quarter was between the Dom and the old synagogue. The 1349 pogrom ended it. The stones remember.",im:"Time-travel: medieval Erfurt\'s Jewish quarter at its peak — money changers, scholars, a community",t:"Walk Michaelisstraße and Schlösserstraße. Look for the historical markers.",c:["architecture"],r:"g",nn:"Altes jüdisches Viertel — Altstadt #73",ns:"Die Straßen, in denen Erfurts mittelalterliche jüdische Gemeinde lebte — Spuren im Stein",nst:"Erfurt hatte eine der wohlhabendsten jüdischen Gemeinden im mittelalterlichen Deutschland.",nt:"Michaelisstraße und Schlösserstraße abgehen. Nach den historischen Markierungen suchen."},
  {id:74,n:"Severikirche Interior — Altstadt #74",a:"Altstadt",v:["history","beautiful"],d:29,s:"The church of Severus — a Gothic hall church with the Eros sarcophagus and extraordinary light",st:"The Severikirche stands beside the Cathedral and is often overlooked by visitors who only enter the Dom. The interior has a warm Gothic light and the famous Eros sarcophagus from 1365.",im:"Time-travel: the sarcophagus being carved in 1365, the craftsman\'s chisel ringing in the stone",t:"Free entry. Stand in the nave and look up.",c:["history_big"],r:"g",nn:"Severikirche Innen — Altstadt #74",ns:"Die Kirche des Severus — eine gotische Hallenkirche mit dem Eros-Sarkophag und außergewöhnlichem Licht",nst:"Die Severikirche steht neben dem Dom und wird oft übersehen. Der Eros-Sarkophag von 1365.",nt:"Freier Eintritt. Im Kirchenschiff stehen und hochschauen."},
  {id:75,n:"Erfurt Roof Terrace View — Petersberg #75",a:"Petersberg",v:["beautiful","free","quiet"],d:11,s:"The best free city view in Erfurt — from the Petersberg Citadel north wall at sunset",st:"The north wall of Petersberg Citadel looks directly over the old town. The cathedral spires, the Krämerbrücke towers, the Gera river meadows. Nothing between you and it.",im:"Time-travel: Allied soldiers surveying the liberated city from these ramparts, April 1945",t:"Go at sunset. Always free. The north side is best.",c:["high_spots"],r:"g",nn:"Erfurt Dachterrassen-Blick — Petersberg #75",ns:"Der beste kostenlose Stadtblick in Erfurt — von der Petersberg-Zitadelle Nordmauer bei Sonnenuntergang",nst:"Die Nordmauer von Petersberg blickt direkt über die Altstadt. Domtürme, Krämerbrücke, Gera-Wiesen.",nt:"Bei Sonnenuntergang gehen. Immer kostenlos. Die Nordseite ist besser."},
  {id:76,n:"Krämerbrücke — Krämerbrücke #76",a:"Krämerbrücke",v:["history","beautiful","hidden"],d:27,s:"Medieval bridge lined with inhabited houses — the only one north of the Alps still lived in",st:"Built in 1325, the Krämerbrücke has 32 buildings sitting directly on the bridge structure. Merchants traded here. People still live above the shops. The only bridge of its kind in the world.",im:"Time-travel: cloth merchants trading from these same houses in 1400, bridge packed with buyers",t:"Cross at dawn for no crowds. The alleys at each end are as good as the bridge.",c:["parks"],r:"g",nn:"Krämerbrücke — Krämerbrücke #76",ns:"Mittelalterliche Brücke mit bewohnten Häusern — die einzige nördlich der Alpen noch bewohnte",nst:"1325 gebaut, hat die Krämerbrücke 32 Gebäude direkt auf der Brückenstruktur. Menschen leben noch dort.",nt:"Bei Tagesanbruch überqueren für keine Menschenmassen. Die Gässchen an jedem Ende sind genauso gut."},
  {id:77,n:"Erfurt Cathedral Hill — Altstadt #77",a:"Altstadt",v:["history","beautiful"],d:27,s:"Two Gothic churches side by side on a hill above the city — and both are free to enter",st:"The Erfurt Dom and Severikirche stand together on the Domhügel. The 70 cathedral steps lead up to one of the most powerful Gothic ensembles in Germany. Free to enter both.",im:"Time-travel: Luther being ordained as a priest in this cathedral, 1507",t:"Climb the steps. The Cathedral is free. Severikirche is free. Go inside both.",c:["courtyards"],r:"g",nn:"Domhügel — Altstadt #77",ns:"Zwei gotische Kirchen nebeneinander auf einem Hügel — und beide kostenlos zu betreten",nst:"Der Erfurter Dom und die Severikirche stehen zusammen auf dem Domhügel. 70 Stufen hinauf.",nt:"Die Stufen hinaufsteigen. Dom kostenlos. Severikirche kostenlos. Beide betreten."},
  {id:78,n:"Petersberg Citadel — Petersberg #78",a:"Petersberg",v:["history","beautiful","free"],d:43,s:"Largest baroque citadel in central Germany — free to enter, enormous and almost empty",st:"The Petersberg Citadel covers 36 hectares of hilltop and is one of the best-preserved baroque military complexes in Europe. The underground casemates can be toured. The ramparts are free to walk.",im:"Time-travel: Napoleon riding through this citadel gate in 1806 after Jena",t:"Free to walk the ramparts any time. Underground tour for small fee.",c:["romantic_water"],r:"g",nn:"Zitadelle Petersberg — Petersberg #78",ns:"Größte Barockzitadelle in Mitteldeutschland — kostenloser Zutritt, riesig und fast leer",nst:"Die Petersberg-Zitadelle umfasst 36 Hektar und ist eines der am besten erhaltenen Barockfestsysteme Europas.",nt:"Wälle jederzeit kostenlos begehen. Unterirdische Tour für kleinen Eintritt."},
  {id:79,n:"Alte Synagoge Erfurt — Altstadt #79",a:"Altstadt",v:["history","hidden"],d:21,s:"One of the best-preserved medieval synagogues in Europe — 900 years old and almost intact",st:"Built around 1094, the Alte Synagoge was used as a storehouse for centuries which accidentally preserved it. The Erfurt Jewish treasure — 3,141 silver coins hidden in a wall — was found here in 1998.",im:"Time-travel: the Erfurt Jewish community gathering here in 1200, the city full of their trade",t:"Small entry fee for the interior. Exterior and nearby old Jewish quarter free.",c:["scary"],r:"g",nn:"Alte Synagoge — Altstadt #79",ns:"Eine der besterhaltenen mittelalterlichen Synagogen Europas — 900 Jahre alt und fast intakt",nst:"Um 1094 gebaut. Als Lagerhaus für Jahrhunderte genutzt, was sie zufällig bewahrte.",nt:"Kleiner Eintritt für das Innere. Außenbereich und jüdisches Viertel kostenlos."},
  {id:80,n:"Augustinerkloster Courtyard — Andreasquarter #80",a:"Andreasquarter",v:["history","quiet","beautiful"],d:7,s:"Luther\'s monastery — where he became a monk in 1505, still standing, still a working place",st:"The Augustinian monastery is where Martin Luther lived as a monk. He described his cell. He said his first Mass here. The courtyard is open and free. A place where history is still present.",im:"Time-travel: Luther walking these cloisters in 1506, studying by candlelight",t:"Free to enter the courtyard. Guided tours for a small fee.",c:["famous_dead"],r:"g",nn:"Augustinerkloster Hof — Andreasquarter #80",ns:"Luthers Kloster — wo er 1505 Mönch wurde, noch stehend, noch ein arbeitender Ort",nst:"Das Augustinerkloster ist der Ort, wo Martin Luther als Mönch lebte. Er beschrieb seine Zelle.",nt:"Hof kostenlos zu betreten. Führungen für kleinen Eintritt."},
  {id:81,n:"Fischmarkt & Rathaus — Krämerbrücke #81",a:"Krämerbrücke",v:["history","beautiful","local"],d:51,s:"Neo-Gothic town hall on the old fish market — Luther on one side, Faust on the other",st:"The 1870 town hall has murals of Luther and the Faust legend in its council chamber. The market square outside is the commercial heart of Erfurt since the Middle Ages.",im:"Time-travel: cloth merchants and fish sellers arguing over prices in this square, 1450",t:"The square is free. Town hall interior open on weekdays.",c:["street_art"],r:"g",nn:"Fischmarkt & Rathaus — Krämerbrücke #81",ns:"Neugotisches Rathaus auf dem alten Fischmarkt — Luther auf einer Seite, Faust auf der anderen",nst:"Das Rathaus von 1870 hat Wandbilder von Luther und der Faust-Sage.",nt:"Platz kostenlos. Rathausinneres werktags geöffnet."},
  {id:82,n:"Wenigemarkt Square — Krämerbrücke #82",a:"Krämerbrücke",v:["history","local","beautiful"],d:34,s:"The smallest market square — half-timbered houses, fountain, no tourists in the evening",st:"Wenigemarkt is the intimate square at the eastern end of the Krämerbrücke. One of Erfurt\'s oldest trading spots. In the evening, locals take it back. The fountain is 16th century.",im:"Time-travel: this square crammed with market stalls in the 1500s, smelling of fish and wool",t:"Come in the evening. Best with one of the local wines.",c:["abandoned"],r:"g",nn:"Wenigemarkt — Krämerbrücke #82",ns:"Der kleinste Marktplatz — Fachwerkhäuser, Brunnen, keine Touristen am Abend",nst:"Wenigemarkt ist der intime Platz am östlichen Ende der Krämerbrücke.",nt:"Abends kommen. Am besten mit einem lokalen Wein."},
  {id:83,n:"Ilmpark Riverbank — Ilmpark #83",a:"Ilmpark",v:["nature","quiet","beautiful"],d:39,s:"The Gera river meadows south of the cathedral — wildflowers, birdsong, complete urban escape",st:"The river Gera runs through Erfurt beneath weeping willows. The meadows along it are barely touched. This is the quiet Erfurt that locals know and visitors miss.",im:"Time-travel: Erfurt citizens cooling off in the Gera on a summer day, 1900",t:"Free. Best in early morning or evening.",c:["free_museum"],r:"g",nn:"Gera-Ufer — Ilmpark #83",ns:"Die Gera-Wiesen südlich des Doms — Wildblumen, Vogelgesang, vollständige Stadtwildnis",nst:"Die Gera fließt durch Erfurt unter Trauerweidechen. Die Wiesen sind kaum berührt.",nt:"Kostenlos. Am besten früh morgens oder abends."},
  {id:84,n:"Predigerkirche — Andreasquarter #84",a:"Andreasquarter",v:["history","quiet"],d:12,s:"Dominican church from 1228 — the altar where Luther preached, still in place",st:"The Prediger church is one of the oldest mendicant churches in Germany. Luther preached here before his Reformation. The interior is austere and powerful. Almost no tourists.",im:"Time-travel: Luther preaching to a packed congregation in this church, 1510",t:"Free entry. Often completely empty.",c:["local_only"],r:"g",nn:"Predigerkirche — Andreasquarter #84",ns:"Dominikanerkirche aus dem Jahr 1228 — der Altar, an dem Luther predigte, noch an seinem Platz",nst:"Die Predigerkirche ist eine der ältesten Bettelordenskirchen Deutschlands.",nt:"Freier Eintritt. Oft völlig leer."},
  {id:85,n:"Zitadelle Rampart Views — Petersberg #85",a:"Petersberg",v:["beautiful","free","history"],d:29,s:"Walk the full circuit of the citadel ramparts — 360 degree views over Erfurt and Thuringia",st:"The rampart walk around Petersberg Citadel takes about 30 minutes. The views are extraordinary — the cathedral towers, the old town, and on clear days, the Thuringian forest in the distance.",im:"Time-travel: Prussian soldiers drilling on these ramparts in 1806, Napoleon watching",t:"Free at all times. Best at golden hour.",c:["architecture"],r:"g",nn:"Zitadelle Wallpromenade — Petersberg #85",ns:"Den vollen Rundweg der Zitadellenwälle gehen — 360-Grad-Blick über Erfurt und Thüringen",nst:"Der Wallrundweg dauert ca. 30 Minuten. Kathedralentürme, Altstadt, Thüringer Wald in der Ferne.",nt:"Jederzeit kostenlos. Am besten bei goldener Stunde."},
  {id:86,n:"Thomaskirche — Andreasquarter #86",a:"Andreasquarter",v:["history","quiet"],d:10,s:"Medieval parish church where generations of Erfurt citizens were christened and buried",st:"One of the oldest parish churches in Erfurt, dating to the 13th century. The interior has accumulated seven centuries of memorial tablets, epitaphs, and donated art.",im:"Time-travel: a medieval Erfurt family attending Sunday mass here, 1380",t:"Usually open. Free.",c:["history_big"],r:"g",nn:"Thomaskirche — Andreasquarter #86",ns:"Mittelalterliche Pfarrkirche, wo Generationen von Erfurter Bürgern getauft und begraben wurden",nst:"Eine der ältesten Pfarrkirchen Erfurts aus dem 13. Jh.",nt:"Normalerweise geöffnet. Kostenlos."},
  {id:87,n:"Cyriaksburg Ruin View — Altstadt #87",a:"Altstadt",v:["history","hidden","beautiful"],d:40,s:"The ruined hilltop fortress with sweeping views over Erfurt from above the egapark",st:"The Cyriaksburg was a medieval fortress razed by Napoleon in 1813. The ruin sits on a hill above the egapark gardens. The view from the remaining walls is the best in Erfurt.",im:"Time-travel: French soldiers blowing up the Cyriaksburg on Napoleon\'s orders, 1813",t:"Enter through the egapark (free outside opening hours via the hill path).",c:["high_spots"],r:"g",nn:"Cyriaksburg Ruine — Altstadt #87",ns:"Die Burgruine auf dem Hügel mit Blick auf Erfurt von über dem egapark",nst:"Die Cyriaksburg war eine mittelalterliche Festung, die Napoleon 1813 schleifte.",nt:"Über den egapark eintreten (außerhalb der Öffnungszeiten über den Hügelpfad kostenlos)."},
  {id:88,n:"Anger Main Square — Altstadt #88",a:"Altstadt",v:["history","local"],d:23,s:"Erfurt\'s main commercial square — where the post coach arrived and the city met",st:"The Anger has been Erfurt\'s main public square for over 400 years. The Baroque Angermuseum faces it. Trams cross it constantly. The square contains the best 19th century commercial facades.",im:"Time-travel: post coach arriving to the Anger in 1800, passengers spilling out, news exchanged",t:"Walk the full perimeter. The facades on the north side date from 1880–1900.",c:["parks"],r:"g",nn:"Anger — Altstadt #88",ns:"Erfurts Hauptplatz — wo die Postkutsche ankam und die Stadt sich traf",nst:"Der Anger ist seit über 400 Jahren Erfurts wichtigster öffentlicher Platz.",nt:"Den vollen Umfang abgehen. Die Fassaden der Nordseite stammen von 1880–1900."},
  {id:89,n:"Gera Waterway Walk — Krämerbrücke #89",a:"Krämerbrücke",v:["nature","hidden","beautiful"],d:45,s:"The hidden channels of the Gera river beneath the city — medieval watermills and secret paths",st:"The Gera splits into multiple channels through the old city. Following the water on foot reveals old mill races, hidden bridges, and backways that tourists never find.",im:"Time-travel: water-powered mills grinding wheat in these channels, the city running on river power, 1500",t:"Follow the water south from the Krämerbrücke. Keep close to the river.",c:["courtyards"],r:"g",nn:"Gera-Wasserweg — Krämerbrücke #89",ns:"Die versteckten Gera-Kanäle unter der Stadt — mittelalterliche Wassermühlen und geheime Wege",nst:"Die Gera teilt sich in mehrere Arme durch die Altstadt. Den Wasserläufen zu Fuß folgen.",nt:"Wasser von der Krämerbrücke nach Süden folgen. Nahe am Fluss bleiben."},
  {id:90,n:"Reglerkirche — Altstadt #90",a:"Altstadt",v:["history","quiet"],d:44,s:"Augustinian church opposite the citadel gate — Luther\'s church, before and after",st:"Luther worshipped at the Reglerkirche before and after his monastery period. The building is 13th century. The tower is unusually slender for Erfurt. Almost always open.",im:"Time-travel: Luther praying alone in this church the night before he entered the monastery, 1505",t:"Free. Often unlocked.",c:["romantic_water"],r:"g",nn:"Reglerkirche — Altstadt #90",ns:"Augustinerkirche gegenüber dem Zitadellentor — Luthers Kirche, vorher und nachher",nst:"Luther betete in der Reglerkirche vor und nach seiner Klosterzeit.",nt:"Kostenlos. Oft unverschlossen."},
  {id:91,n:"Erfurt University Old Building — Altstadt #91",a:"Altstadt",v:["history","beautiful"],d:28,s:"The 1392 university — where Luther studied, one of the oldest in German-speaking Europe",st:"Erfurt University was founded in 1392, predating Berlin by centuries. Luther studied law here before abandoning it for a monastery. The historic buildings form a free courtyard complex.",im:"Time-travel: young Martin Luther arriving at Erfurt university from Mansfeld, 1501, terrified and determined",t:"The courtyard is free. The old lecture halls sometimes open.",c:["scary"],r:"g",nn:"Alte Universität — Altstadt #91",ns:"Die Universität von 1392 — wo Luther studierte, eine der ältesten im deutschsprachigen Europa",nst:"Erfurter Universität wurde 1392 gegründet, Jahrhunderte vor Berlin. Luther studierte hier Jura.",nt:"Der Innenhof ist kostenlos. Die alten Hörsäle manchmal geöffnet."},
  {id:92,n:"Hirschgarten — Ilmpark #92",a:"Ilmpark",v:["nature","quiet","hidden"],d:41,s:"The hidden deer garden south of the citadel — a park that maps don\'t always show",st:"A small park and garden area south of Petersberg, quiet even in summer. The old paths through it wind between mature trees and disappear into the Gera meadows.",im:"Time-travel: 18th century Erfurt nobility walking trained deer in this garden",t:"Enter from Hirschgarten path off Talstraße. Free.",c:["famous_dead"],r:"g",nn:"Hirschgarten — Ilmpark #92",ns:"Der versteckte Hirschgarten südlich der Zitadelle — ein Park, den Karten nicht immer zeigen",nst:"Ein kleiner Park südlich von Petersberg, still selbst im Sommer.",nt:"Von Hirschgartenpfad von der Talstraße eintreten. Kostenlos."},
  {id:93,n:"Andreasquarter Streets — Andreasquarter #93",a:"Andreasquarter",v:["local","history","beautiful"],d:17,s:"The artisan quarter of old Erfurt — half-timbered workshops, stone fountains, real residents",st:"The Andreasquarter was the craftsmen\'s district in medieval Erfurt. Many buildings date from the 16th and 17th centuries. The streets are narrow and the architecture is human-scaled.",im:"Time-travel: shoemakers and dyers working in these narrow workshops, 1550",t:"Walk the full quarter. Grüne Straße and Michaelisstraße are the best.",c:["street_art"],r:"g",nn:"Andreasquarter — Andreasquarter #93",ns:"Das Handwerkerviertel des alten Erfurts — Fachwerkwerkstätten, Steinfontänen, echte Bewohner",nst:"Das Andreasquarter war das Handwerkerviertel im mittelalterlichen Erfurt.",nt:"Das gesamte Viertel abgehen. Grüne Straße und Michaelisstraße sind die besten."},
  {id:94,n:"Kartäuserkloster Courtyard — Andreasquarter #94",a:"Andreasquarter",v:["history","quiet","hidden"],d:50,s:"The 14th century Carthusian monastery — now a school, but the cloister is still visible",st:"The Carthusians arrived in Erfurt in 1372. Their silent monastery eventually became a school. The Gothic cloister survives behind the school buildings and is sometimes accessible.",im:"Time-travel: Carthusian monks in absolute silence, forbidden to speak, crossing this cloister daily, 1400",t:"Ask at the school office. Sometimes open during school hours.",c:["abandoned"],r:"g",nn:"Kartäuserkloster Hof — Andreasquarter #94",ns:"Das Kartäuserkloster aus dem 14. Jh. — jetzt eine Schule, aber der Kreuzgang ist noch sichtbar",nst:"Die Kartäuser kamen 1372 nach Erfurt. Ihr stilles Kloster wurde schließlich eine Schule.",nt:"Im Schulbüro fragen. Manchmal während der Schulzeiten zugänglich."},
  {id:95,n:"Krämerbrücke Side Alleys — Krämerbrücke #95",a:"Krämerbrücke",v:["hidden","local","beautiful"],d:9,s:"The alleys flanking the bridge at each end — medieval lanes that have barely changed",st:"The lanes at the eastern and western ends of the Krämerbrücke are as old as the bridge and hold the quietest architecture in Erfurt. Nobody photographs them. Walk both.",im:"Time-travel: bridge merchants taking their morning break in these same alleys, 1600",t:"Explore both ends. The east alley (Zum Augustinerkloster) is the better one.",c:["free_museum"],r:"g",nn:"Krämerbrückengassen — Krämerbrücke #95",ns:"Die Gassen, die die Brücke an jedem Ende flankieren — mittelalterliche Gassen, die sich kaum verändert haben",nst:"Die Gassen an den östlichen und westlichen Enden der Krämerbrücke sind so alt wie die Brücke.",nt:"Beide Enden erkunden. Die Ostgasse (Zum Augustinerkloster) ist die bessere."},
  {id:96,n:"Erfurt Cathedral Crypt — Altstadt #96",a:"Altstadt",v:["history","weird","hidden"],d:7,s:"The crypt below the cathedral — Romanesque foundations from 1154, almost no visitors",st:"The Dom was founded in 742 and rebuilt multiple times. The crypt contains Romanesque stonework from 1154 including the famous Wolfram candelabra — one of the oldest bronze objects in Germany.",im:"Time-travel: the crypt being constructed in 1154, candles flickering in the new stone vault",t:"Ask at the cathedral entrance for crypt access. Often free.",c:["local_only"],r:"g",nn:"Domkrypta — Altstadt #96",ns:"Die Krypta unter dem Dom — romanische Fundamente von 1154, kaum Besucher",nst:"Der Dom wurde 742 gegründet und mehrfach umgebaut. Die Krypta enthält romanisches Mauerwerk.",nt:"Am Domeingang nach Kryptazugang fragen. Oft kostenlos."},
  {id:97,n:"Gorkistraße GDR Murals — Andreasquarter #97",a:"Andreasquarter",v:["street_art","hidden","history"],d:47,s:"Surviving GDR-era wall paintings on apartment buildings — socialist realism in the wild",st:"A few buildings in the Andreasquarter retain their GDR-era facade paintings — idealized workers, harvests, peace symbols. They were never removed. Unofficial monuments to the East.",im:"Time-travel: GDR paint brigade completing these murals, 1972, citizens watching skeptically",t:"Walk Gorkistraße. The murals are on the north-facing walls.",c:["architecture"],r:"g",nn:"Gorkistraße DDR-Wandbilder — Andreasquarter #97",ns:"Erhaltene DDR-Wandmalereien an Wohngebäuden — sozialistischer Realismus in der Wildnis",nst:"Einige Gebäude im Andreasquarter behalten ihre DDR-Fassadengemälde — Arbeiter, Ernten, Friedenssymbole.",nt:"Gorkistraße abgehen. Die Wandbilder befinden sich auf den nordseitigen Wänden."},
  {id:98,n:"Erfurt Old Jewish Quarter — Altstadt #98",a:"Altstadt",v:["history","hidden"],d:19,s:"The streets where Erfurt\'s medieval Jewish community lived — traces in the stone",st:"Erfurt had one of the most prosperous Jewish communities in medieval Germany. The Jewish quarter was between the Dom and the old synagogue. The 1349 pogrom ended it. The stones remember.",im:"Time-travel: medieval Erfurt\'s Jewish quarter at its peak — money changers, scholars, a community",t:"Walk Michaelisstraße and Schlösserstraße. Look for the historical markers.",c:["history_big"],r:"g",nn:"Altes jüdisches Viertel — Altstadt #98",ns:"Die Straßen, in denen Erfurts mittelalterliche jüdische Gemeinde lebte — Spuren im Stein",nst:"Erfurt hatte eine der wohlhabendsten jüdischen Gemeinden im mittelalterlichen Deutschland.",nt:"Michaelisstraße und Schlösserstraße abgehen. Nach den historischen Markierungen suchen."},
  {id:99,n:"Severikirche Interior — Altstadt #99",a:"Altstadt",v:["history","beautiful"],d:54,s:"The church of Severus — a Gothic hall church with the Eros sarcophagus and extraordinary light",st:"The Severikirche stands beside the Cathedral and is often overlooked by visitors who only enter the Dom. The interior has a warm Gothic light and the famous Eros sarcophagus from 1365.",im:"Time-travel: the sarcophagus being carved in 1365, the craftsman\'s chisel ringing in the stone",t:"Free entry. Stand in the nave and look up.",c:["high_spots"],r:"g",nn:"Severikirche Innen — Altstadt #99",ns:"Die Kirche des Severus — eine gotische Hallenkirche mit dem Eros-Sarkophag und außergewöhnlichem Licht",nst:"Die Severikirche steht neben dem Dom und wird oft übersehen. Der Eros-Sarkophag von 1365.",nt:"Freier Eintritt. Im Kirchenschiff stehen und hochschauen."},
  {id:100,n:"Erfurt Roof Terrace View — Petersberg #100",a:"Petersberg",v:["beautiful","free","quiet"],d:23,s:"The best free city view in Erfurt — from the Petersberg Citadel north wall at sunset",st:"The north wall of Petersberg Citadel looks directly over the old town. The cathedral spires, the Krämerbrücke towers, the Gera river meadows. Nothing between you and it.",im:"Time-travel: Allied soldiers surveying the liberated city from these ramparts, April 1945",t:"Go at sunset. Always free. The north side is best.",c:["parks"],r:"g",nn:"Erfurt Dachterrassen-Blick — Petersberg #100",ns:"Der beste kostenlose Stadtblick in Erfurt — von der Petersberg-Zitadelle Nordmauer bei Sonnenuntergang",nst:"Die Nordmauer von Petersberg blickt direkt über die Altstadt. Domtürme, Krämerbrücke, Gera-Wiesen.",nt:"Bei Sonnenuntergang gehen. Immer kostenlos. Die Nordseite ist besser."},
  {id:101,n:"Krämerbrücke — Krämerbrücke #101",a:"Krämerbrücke",v:["history","beautiful","hidden"],d:10,s:"Medieval bridge lined with inhabited houses — the only one north of the Alps still lived in",st:"Built in 1325, the Krämerbrücke has 32 buildings sitting directly on the bridge structure. Merchants traded here. People still live above the shops. The only bridge of its kind in the world.",im:"Time-travel: cloth merchants trading from these same houses in 1400, bridge packed with buyers",t:"Cross at dawn for no crowds. The alleys at each end are as good as the bridge.",c:["courtyards"],r:"g",nn:"Krämerbrücke — Krämerbrücke #101",ns:"Mittelalterliche Brücke mit bewohnten Häusern — die einzige nördlich der Alpen noch bewohnte",nst:"1325 gebaut, hat die Krämerbrücke 32 Gebäude direkt auf der Brückenstruktur. Menschen leben noch dort.",nt:"Bei Tagesanbruch überqueren für keine Menschenmassen. Die Gässchen an jedem Ende sind genauso gut."},
  {id:102,n:"Erfurt Cathedral Hill — Altstadt #102",a:"Altstadt",v:["history","beautiful"],d:19,s:"Two Gothic churches side by side on a hill above the city — and both are free to enter",st:"The Erfurt Dom and Severikirche stand together on the Domhügel. The 70 cathedral steps lead up to one of the most powerful Gothic ensembles in Germany. Free to enter both.",im:"Time-travel: Luther being ordained as a priest in this cathedral, 1507",t:"Climb the steps. The Cathedral is free. Severikirche is free. Go inside both.",c:["romantic_water"],r:"g",nn:"Domhügel — Altstadt #102",ns:"Zwei gotische Kirchen nebeneinander auf einem Hügel — und beide kostenlos zu betreten",nst:"Der Erfurter Dom und die Severikirche stehen zusammen auf dem Domhügel. 70 Stufen hinauf.",nt:"Die Stufen hinaufsteigen. Dom kostenlos. Severikirche kostenlos. Beide betreten."},
  {id:103,n:"Petersberg Citadel — Petersberg #103",a:"Petersberg",v:["history","beautiful","free"],d:11,s:"Largest baroque citadel in central Germany — free to enter, enormous and almost empty",st:"The Petersberg Citadel covers 36 hectares of hilltop and is one of the best-preserved baroque military complexes in Europe. The underground casemates can be toured. The ramparts are free to walk.",im:"Time-travel: Napoleon riding through this citadel gate in 1806 after Jena",t:"Free to walk the ramparts any time. Underground tour for small fee.",c:["scary"],r:"g",nn:"Zitadelle Petersberg — Petersberg #103",ns:"Größte Barockzitadelle in Mitteldeutschland — kostenloser Zutritt, riesig und fast leer",nst:"Die Petersberg-Zitadelle umfasst 36 Hektar und ist eines der am besten erhaltenen Barockfestsysteme Europas.",nt:"Wälle jederzeit kostenlos begehen. Unterirdische Tour für kleinen Eintritt."},
  {id:104,n:"Alte Synagoge Erfurt — Altstadt #104",a:"Altstadt",v:["history","hidden"],d:29,s:"One of the best-preserved medieval synagogues in Europe — 900 years old and almost intact",st:"Built around 1094, the Alte Synagoge was used as a storehouse for centuries which accidentally preserved it. The Erfurt Jewish treasure — 3,141 silver coins hidden in a wall — was found here in 1998.",im:"Time-travel: the Erfurt Jewish community gathering here in 1200, the city full of their trade",t:"Small entry fee for the interior. Exterior and nearby old Jewish quarter free.",c:["famous_dead"],r:"g",nn:"Alte Synagoge — Altstadt #104",ns:"Eine der besterhaltenen mittelalterlichen Synagogen Europas — 900 Jahre alt und fast intakt",nst:"Um 1094 gebaut. Als Lagerhaus für Jahrhunderte genutzt, was sie zufällig bewahrte.",nt:"Kleiner Eintritt für das Innere. Außenbereich und jüdisches Viertel kostenlos."},
  {id:105,n:"Augustinerkloster Courtyard — Andreasquarter #105",a:"Andreasquarter",v:["history","quiet","beautiful"],d:22,s:"Luther\'s monastery — where he became a monk in 1505, still standing, still a working place",st:"The Augustinian monastery is where Martin Luther lived as a monk. He described his cell. He said his first Mass here. The courtyard is open and free. A place where history is still present.",im:"Time-travel: Luther walking these cloisters in 1506, studying by candlelight",t:"Free to enter the courtyard. Guided tours for a small fee.",c:["street_art"],r:"g",nn:"Augustinerkloster Hof — Andreasquarter #105",ns:"Luthers Kloster — wo er 1505 Mönch wurde, noch stehend, noch ein arbeitender Ort",nst:"Das Augustinerkloster ist der Ort, wo Martin Luther als Mönch lebte. Er beschrieb seine Zelle.",nt:"Hof kostenlos zu betreten. Führungen für kleinen Eintritt."}

return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>

<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Erfurt Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Erfurt Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
