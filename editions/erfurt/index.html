<script>
const P = [,
  {name:'Wilhelmssteg',area:'Krämpfervorstadt',desc:'Ein versteckter Steg über die Gera mit wildem Grün und Bänken zum Verweilen, wo Locals picknicken und die Stadtluft atmen. Erreicht mit Bus 6 oder Tram 5 bis Krämpfervorstadt. Locals schätzen die ruhige Flussstimmung fernab vom Trubel, komplett kostenlos.',tags:['hidden','park','local','free'],lat:50.9785,lng:11.0298},
  {name:'Hansaplatz',area:'Hansaviertel',desc:'Gemütlicher Plattenbau-Platz mit Street-Art-Wänden und spontanen Bänken, wo Nachbarschaftskinder spielen und Ältere plaudern. Bus 7 bringt dich direkt hin. Locals lieben es als Treffpunkt für Alltagsgespräche, gratis und authentisch.',tags:['street art','community','local','free'],lat:50.9652,lng:10.9894},
  {name:'NSG Alacher See',area:'Alach',desc:'Naturschutzgebiet mit kleinem See, Schilf und Wanderpfaden für Vogelbeobachtung im Grünen. Bus 4 bis Alach. Erfurter entfliehen hier dem Stadtleben für stille Spaziergänge, eintrittsfrei.',tags:['park','hidden','local','free'],lat:50.9451,lng:11.0056},
  {name:'Hof der Andreaskirche',area:'Andreasviertel',desc:'Geheimer Innenhof mit alten Fachwerkhäusern und Blumenkübeln, perfekt für ein langsames Sitzen und Leute beobachten. Tram 1 bis Andréanum. Locals genießen die versteckte Oase in der Nähe der Uni, absolut kostenlos.',tags:['courtyard','hidden','local','free'],lat:50.9842,lng:11.0247},
  {name:'Gustloffpark',area:'Nordstadt',desc:'Kleiner Nachbarschaftspark mit Klettergerüsten und Wiesen für entspanntes Lesen oder Ballspielen. Bus 9 vom Hauptbahnhof. Familien und Hunde-Liebhaber machen ihn zum lokalen Geheimtipp, gratis.',tags:['park','local','free'],lat:50.9923,lng:11.0125},
  {name:'Roter Berg Viewpoint',area:'Roter Berg',desc:'Versteckter Aussichtspunkt auf dem Hügel mit Panoramablick über Erfurts Dächer und Krämerbrücke. Bus 3 bis Roter Berg. Locals joggen hier hoch für Sonnenuntergänge, frei zugänglich.',tags:['viewpoint','hidden','local','free'],lat:50.9701,lng:11.0402},
  {name:'Street Art am Berliner Platz',area:'Oststadt',desc:'Frische Graffiti-Wände in leuchtenden Farben an alten Fabrikmauern, ideal zum Fotografieren. Tram 4 bis Berliner Platz. Street-Art-Fans und Künstler aus Erfurt treffen sich hier, kostenlos.',tags:['street art','local','free'],lat:50.9754,lng:11.0456},
  {name:'Hof der Barfüßerkirche',area:'Altstadt Rand',desc:'Geheimer Klosterhof mit Kräutergarten und Steinbänken, wo man die Geschichte spürt. Zu Fuß von Tram 3 (Barfüßertor). Locals mediteren oder lesen in der Stille, eintrittsfrei.',tags:['courtyard','hidden','local','free'],lat:50.9789,lng:11.0281},
  {name:'Löbervorstadt Wochenmarkt',area:'Löbervorstadt',desc:'Kleiner lokaler Flohmarkt samstags mit Second-Hand-Schätzen und selbstgemachten Leckereien. Bus 5 bis Löberstraße. Erfurter handeln hier günstig (Eintritt frei, Schnäppchen ab 1€).',tags:['market','local','cheap'],lat:50.9827,lng:11.0153},
  {name:'Cypressensteig Park',area:'Ilmtal',desc:'Schmaler Pfad mit Zypressen und Ilm-Ausblick, für langsame Spaziergänge. Bus 2 bis Ilmtalbrücke. Locals picknicken am Wasser, komplett gratis.',tags:['park','viewpoint','local','free'],lat:50.9608,lng:10.9954},
  {id:1,n:"Krämerbrücke — Krämerbrücke",a:"Krämerbrücke",v:["history","beautiful","hidden"],d:5,s:"Medieval bridge lined with inhabited houses — the only one north of the Alps still lived in",st:"Built in 1325, the Krämerbrücke has 32 buildings sitting directly on the bridge structure. Merchants traded here. People still live above the shops. The only bridge of its kind in the world.",im:"Time-travel: cloth merchants trading from these same houses in 1400, bridge packed with buyers",t:"Cross at dawn for no crowds. The alleys at each end are as good as the bridge.",c:["history_big"],r:"g",nn:"Krämerbrücke — Krämerbrücke",ns:"Mittelalterliche Brücke mit bewohnten Häusern — die einzige nördlich der Alpen noch bewohnte",nst:"1325 gebaut, hat die Krämerbrücke 32 Gebäude direkt auf der Brückenstruktur. Menschen leben noch dort.",nt:"Bei Tagesanbruch überqueren für keine Menschenmassen. Die Gässchen an jedem Ende sind genauso gut."},
  {id:2,n:"Erfurt Cathedral Hill — Altstadt",a:"Altstadt",v:["history","beautiful"],d:5,s:"Two Gothic churches side by side on a hill above the city — and both are free to enter",st:"The Erfurt Dom and Severikirche stand together on the Domhügel. The 70 cathedral steps lead up to one of the most powerful Gothic ensembles in Germany. Free to enter both.",im:"Time-travel: Luther being ordained as a priest in this cathedral, 1507",t:"Climb the steps. The Cathedral is free. Severikirche is free. Go inside both.",c:["history_big"],r:"g",nn:"Domhügel — Altstadt",ns:"Zwei gotische Kirchen nebeneinander auf einem Hügel — und beide kostenlos zu betreten",nst:"Der Erfurter Dom und die Severikirche stehen zusammen auf dem Domhügel. 70 Stufen hinauf.",nt:"Die Stufen hinaufsteigen. Dom kostenlos. Severikirche kostenlos. Beide betreten."},
  {id:3,n:"Petersberg Citadel — Petersberg",a:"Petersberg",v:["history","beautiful","free"],d:15,s:"Largest baroque citadel in central Germany — free to enter, enormous and almost empty",st:"The Petersberg Citadel covers 36 hectares of hilltop and is one of the best-preserved baroque military complexes in Europe. The underground casemates can be toured. The ramparts are free to walk.",im:"Time-travel: Napoleon riding through this citadel gate in 1806 after Jena",t:"Free to walk the ramparts any time. Underground tour for small fee.",c:["history_big"],r:"g",nn:"Zitadelle Petersberg — Petersberg",ns:"Größte Barockzitadelle in Mitteldeutschland — kostenloser Zutritt, riesig und fast leer",nst:"Die Petersberg-Zitadelle umfasst 36 Hektar und ist eines der am besten erhaltenen Barockfestsysteme Europas.",nt:"Wälle jederzeit kostenlos begehen. Unterirdische Tour für kleinen Eintritt."},
  {id:4,n:"Alte Synagoge Erfurt — Altstadt",a:"Altstadt",v:["history","hidden"],d:10,s:"One of the best-preserved medieval synagogues in Europe — 900 years old and almost intact",st:"Built around 1094, the Alte Synagoge was used as a storehouse for centuries which accidentally preserved it. The Erfurt Jewish treasure — 3,141 silver coins hidden in a wall — was found here in 1998.",im:"Time-travel: the Erfurt Jewish community gathering here in 1200, the city full of their trade",t:"Small entry fee for the interior. Exterior and nearby old Jewish quarter free.",c:["history_big"],r:"g",nn:"Alte Synagoge — Altstadt",ns:"Eine der besterhaltenen mittelalterlichen Synagogen Europas — 900 Jahre alt und fast intakt",nst:"Um 1094 gebaut. Als Lagerhaus für Jahrhunderte genutzt, was sie zufällig bewahrte.",nt:"Kleiner Eintritt für das Innere. Außenbereich und jüdisches Viertel kostenlos."},
  {id:5,n:"Augustinerkloster Courtyard — Andreasquarter",a:"Andreasquarter",v:["history","quiet","beautiful"],d:10,s:"Luther\'s monastery — where he became a monk in 1505, still standing, still a working place",st:"The Augustinian monastery is where Martin Luther lived as a monk. He described his cell. He said his first Mass here. The courtyard is open and free. A place where history is still present.",im:"Time-travel: Luther walking these cloisters in 1506, studying by candlelight",t:"Free to enter the courtyard. Guided tours for a small fee.",c:["history_big"],r:"g",nn:"Augustinerkloster Hof — Andreasquarter",ns:"Luthers Kloster — wo er 1505 Mönch wurde, noch stehend, noch ein arbeitender Ort",nst:"Das Augustinerkloster ist der Ort, wo Martin Luther als Mönch lebte. Er beschrieb seine Zelle.",nt:"Hof kostenlos zu betreten. Führungen für kleinen Eintritt."},
  {id:6,n:"Fischmarkt & Rathaus — Krämerbrücke",a:"Krämerbrücke",v:["history","beautiful","local"],d:5,s:"Neo-Gothic town hall on the old fish market — Luther on one side, Faust on the other",st:"The 1870 town hall has murals of Luther and the Faust legend in its council chamber. The market square outside is the commercial heart of Erfurt since the Middle Ages.",im:"Time-travel: cloth merchants and fish sellers arguing over prices in this square, 1450",t:"The square is free. Town hall interior open on weekdays.",c:["architecture"],r:"g",nn:"Fischmarkt & Rathaus — Krämerbrücke",ns:"Neugotisches Rathaus auf dem alten Fischmarkt — Luther auf einer Seite, Faust auf der anderen",nst:"Das Rathaus von 1870 hat Wandbilder von Luther und der Faust-Sage.",nt:"Platz kostenlos. Rathausinneres werktags geöffnet."},
  {id:7,n:"Wenigemarkt Square — Krämerbrücke",a:"Krämerbrücke",v:["history","local","beautiful"],d:5,s:"The smallest market square — half-timbered houses, fountain, no tourists in the evening",st:"Wenigemarkt is the intimate square at the eastern end of the Krämerbrücke. One of Erfurt\'s oldest trading spots. In the evening, locals take it back. The fountain is 16th century.",im:"Time-travel: this square crammed with market stalls in the 1500s, smelling of fish and wool",t:"Come in the evening. Best with one of the local wines.",c:["local_only"],r:"g",nn:"Wenigemarkt — Krämerbrücke",ns:"Der kleinste Marktplatz — Fachwerkhäuser, Brunnen, keine Touristen am Abend",nst:"Wenigemarkt ist der intime Platz am östlichen Ende der Krämerbrücke.",nt:"Abends kommen. Am besten mit einem lokalen Wein."},
  {id:8,n:"Ilmpark Riverbank — Ilmpark",a:"Ilmpark",v:["nature","quiet","beautiful"],d:10,s:"The Gera river meadows south of the cathedral — wildflowers, birdsong, complete urban escape",st:"The river Gera runs through Erfurt beneath weeping willows. The meadows along it are barely touched. This is the quiet Erfurt that locals know and visitors miss.",im:"Time-travel: Erfurt citizens cooling off in the Gera on a summer day, 1900",t:"Free. Best in early morning or evening.",c:["parks"],r:"g",nn:"Gera-Ufer — Ilmpark",ns:"Die Gera-Wiesen südlich des Doms — Wildblumen, Vogelgesang, vollständige Stadtwildnis",nst:"Die Gera fließt durch Erfurt unter Trauerweidechen. Die Wiesen sind kaum berührt.",nt:"Kostenlos. Am besten früh morgens oder abends."},
  {id:9,n:"Predigerkirche — Andreasquarter",a:"Andreasquarter",v:["history","quiet"],d:8,s:"Dominican church from 1228 — the altar where Luther preached, still in place",st:"The Prediger church is one of the oldest mendicant churches in Germany. Luther preached here before his Reformation. The interior is austere and powerful. Almost no tourists.",im:"Time-travel: Luther preaching to a packed congregation in this church, 1510",t:"Free entry. Often completely empty.",c:["history_big"],r:"g",nn:"Predigerkirche — Andreasquarter",ns:"Dominikanerkirche aus dem Jahr 1228 — der Altar, an dem Luther predigte, noch an seinem Platz",nst:"Die Predigerkirche ist eine der ältesten Bettelordenskirchen Deutschlands.",nt:"Freier Eintritt. Oft völlig leer."},
  {id:10,n:"Zitadelle Rampart Views — Petersberg",a:"Petersberg",v:["beautiful","free","history"],d:18,s:"Walk the full circuit of the citadel ramparts — 360 degree views over Erfurt and Thuringia",st:"The rampart walk around Petersberg Citadel takes about 30 minutes. The views are extraordinary — the cathedral towers, the old town, and on clear days, the Thuringian forest in the distance.",im:"Time-travel: Prussian soldiers drilling on these ramparts in 1806, Napoleon watching",t:"Free at all times. Best at golden hour.",c:["high_spots"],r:"g",nn:"Zitadelle Wallpromenade — Petersberg",ns:"Den vollen Rundweg der Zitadellenwälle gehen — 360-Grad-Blick über Erfurt und Thüringen",nst:"Der Wallrundweg dauert ca. 30 Minuten. Kathedralentürme, Altstadt, Thüringer Wald in der Ferne.",nt:"Jederzeit kostenlos. Am besten bei goldener Stunde."},
  {id:11,n:"Thomaskirche — Andreasquarter",a:"Andreasquarter",v:["history","quiet"],d:10,s:"Medieval parish church where generations of Erfurt citizens were christened and buried",st:"One of the oldest parish churches in Erfurt, dating to the 13th century. The interior has accumulated seven centuries of memorial tablets, epitaphs, and donated art.",im:"Time-travel: a medieval Erfurt family attending Sunday mass here, 1380",t:"Usually open. Free.",c:["history_big"],r:"g",nn:"Thomaskirche — Andreasquarter",ns:"Mittelalterliche Pfarrkirche, wo Generationen von Erfurter Bürgern getauft und begraben wurden",nst:"Eine der ältesten Pfarrkirchen Erfurts aus dem 13. Jh.",nt:"Normalerweise geöffnet. Kostenlos."},
  {id:12,n:"Cyriaksburg Ruin View — Altstadt",a:"Altstadt",v:["history","hidden","beautiful"],d:15,s:"The ruined hilltop fortress with sweeping views over Erfurt from above the egapark",st:"The Cyriaksburg was a medieval fortress razed by Napoleon in 1813. The ruin sits on a hill above the egapark gardens. The view from the remaining walls is the best in Erfurt.",im:"Time-travel: French soldiers blowing up the Cyriaksburg on Napoleon\'s orders, 1813",t:"Enter through the egapark (free outside opening hours via the hill path).",c:["abandoned"],r:"g",nn:"Cyriaksburg Ruine — Altstadt",ns:"Die Burgruine auf dem Hügel mit Blick auf Erfurt von über dem egapark",nst:"Die Cyriaksburg war eine mittelalterliche Festung, die Napoleon 1813 schleifte.",nt:"Über den egapark eintreten (außerhalb der Öffnungszeiten über den Hügelpfad kostenlos)."},
  {id:13,n:"Anger Main Square — Altstadt",a:"Altstadt",v:["history","local"],d:5,s:"Erfurt\'s main commercial square — where the post coach arrived and the city met",st:"The Anger has been Erfurt\'s main public square for over 400 years. The Baroque Angermuseum faces it. Trams cross it constantly. The square contains the best 19th century commercial facades.",im:"Time-travel: post coach arriving to the Anger in 1800, passengers spilling out, news exchanged",t:"Walk the full perimeter. The facades on the north side date from 1880–1900.",c:["architecture"],r:"g",nn:"Anger — Altstadt",ns:"Erfurts Hauptplatz — wo die Postkutsche ankam und die Stadt sich traf",nst:"Der Anger ist seit über 400 Jahren Erfurts wichtigster öffentlicher Platz.",nt:"Den vollen Umfang abgehen. Die Fassaden der Nordseite stammen von 1880–1900."},
  {id:14,n:"Gera Waterway Walk — Krämerbrücke",a:"Krämerbrücke",v:["nature","hidden","beautiful"],d:10,s:"The hidden channels of the Gera river beneath the city — medieval watermills and secret paths",st:"The Gera splits into multiple channels through the old city. Following the water on foot reveals old mill races, hidden bridges, and backways that tourists never find.",im:"Time-travel: water-powered mills grinding wheat in these channels, the city running on river power, 1500",t:"Follow the water south from the Krämerbrücke. Keep close to the river.",c:["romantic_water"],r:"g",nn:"Gera-Wasserweg — Krämerbrücke",ns:"Die versteckten Gera-Kanäle unter der Stadt — mittelalterliche Wassermühlen und geheime Wege",nst:"Die Gera teilt sich in mehrere Arme durch die Altstadt. Den Wasserläufen zu Fuß folgen.",nt:"Wasser von der Krämerbrücke nach Süden folgen. Nahe am Fluss bleiben."},
  {id:15,n:"Reglerkirche — Altstadt",a:"Altstadt",v:["history","quiet"],d:8,s:"Augustinian church opposite the citadel gate — Luther\'s church, before and after",st:"Luther worshipped at the Reglerkirche before and after his monastery period. The building is 13th century. The tower is unusually slender for Erfurt. Almost always open.",im:"Time-travel: Luther praying alone in this church the night before he entered the monastery, 1505",t:"Free. Often unlocked.",c:["history_big"],r:"g",nn:"Reglerkirche — Altstadt",ns:"Augustinerkirche gegenüber dem Zitadellentor — Luthers Kirche, vorher und nachher",nst:"Luther betete in der Reglerkirche vor und nach seiner Klosterzeit.",nt:"Kostenlos. Oft unverschlossen."},
  {id:16,n:"Erfurt University Old Building — Altstadt",a:"Altstadt",v:["history","beautiful"],d:8,s:"The 1392 university — where Luther studied, one of the oldest in German-speaking Europe",st:"Erfurt University was founded in 1392, predating Berlin by centuries. Luther studied law here before abandoning it for a monastery. The historic buildings form a free courtyard complex.",im:"Time-travel: young Martin Luther arriving at Erfurt university from Mansfeld, 1501, terrified and determined",t:"The courtyard is free. The old lecture halls sometimes open.",c:["history_big"],r:"g",nn:"Alte Universität — Altstadt",ns:"Die Universität von 1392 — wo Luther studierte, eine der ältesten im deutschsprachigen Europa",nst:"Erfurter Universität wurde 1392 gegründet, Jahrhunderte vor Berlin. Luther studierte hier Jura.",nt:"Der Innenhof ist kostenlos. Die alten Hörsäle manchmal geöffnet."},
  {id:17,n:"Hirschgarten — Ilmpark",a:"Ilmpark",v:["nature","quiet","hidden"],d:12,s:"The hidden deer garden south of the citadel — a park that maps don\'t always show",st:"A small park and garden area south of Petersberg, quiet even in summer. The old paths through it wind between mature trees and disappear into the Gera meadows.",im:"Time-travel: 18th century Erfurt nobility walking trained deer in this garden",t:"Enter from Hirschgarten path off Talstraße. Free.",c:["parks"],r:"g",nn:"Hirschgarten — Ilmpark",ns:"Der versteckte Hirschgarten südlich der Zitadelle — ein Park, den Karten nicht immer zeigen",nst:"Ein kleiner Park südlich von Petersberg, still selbst im Sommer.",nt:"Von Hirschgartenpfad von der Talstraße eintreten. Kostenlos."},
  {id:18,n:"Andreasquarter Streets — Andreasquarter",a:"Andreasquarter",v:["local","history","beautiful"],d:8,s:"The artisan quarter of old Erfurt — half-timbered workshops, stone fountains, real residents",st:"The Andreasquarter was the craftsmen\'s district in medieval Erfurt. Many buildings date from the 16th and 17th centuries. The streets are narrow and the architecture is human-scaled.",im:"Time-travel: shoemakers and dyers working in these narrow workshops, 1550",t:"Walk the full quarter. Grüne Straße and Michaelisstraße are the best.",c:["architecture"],r:"g",nn:"Andreasquarter — Andreasquarter",ns:"Das Handwerkerviertel des alten Erfurts — Fachwerkwerkstätten, Steinfontänen, echte Bewohner",nst:"Das Andreasquarter war das Handwerkerviertel im mittelalterlichen Erfurt.",nt:"Das gesamte Viertel abgehen. Grüne Straße und Michaelisstraße sind die besten."},
  {id:19,n:"Kartäuserkloster Courtyard — Andreasquarter",a:"Andreasquarter",v:["history","quiet","hidden"],d:10,s:"The 14th century Carthusian monastery — now a school, but the cloister is still visible",st:"The Carthusians arrived in Erfurt in 1372. Their silent monastery eventually became a school. The Gothic cloister survives behind the school buildings and is sometimes accessible.",im:"Time-travel: Carthusian monks in absolute silence, forbidden to speak, crossing this cloister daily, 1400",t:"Ask at the school office. Sometimes open during school hours.",c:["courtyards"],r:"g",nn:"Kartäuserkloster Hof — Andreasquarter",ns:"Das Kartäuserkloster aus dem 14. Jh. — jetzt eine Schule, aber der Kreuzgang ist noch sichtbar",nst:"Die Kartäuser kamen 1372 nach Erfurt. Ihr stilles Kloster wurde schließlich eine Schule.",nt:"Im Schulbüro fragen. Manchmal während der Schulzeiten zugänglich."},
  {id:20,n:"Krämerbrücke Side Alleys — Krämerbrücke",a:"Krämerbrücke",v:["hidden","local","beautiful"],d:5,s:"The alleys flanking the bridge at each end — medieval lanes that have barely changed",st:"The lanes at the eastern and western ends of the Krämerbrücke are as old as the bridge and hold the quietest architecture in Erfurt. Nobody photographs them. Walk both.",im:"Time-travel: bridge merchants taking their morning break in these same alleys, 1600",t:"Explore both ends. The east alley (Zum Augustinerkloster) is the better one.",c:["courtyards"],r:"g",nn:"Krämerbrückengassen — Krämerbrücke",ns:"Die Gassen, die die Brücke an jedem Ende flankieren — mittelalterliche Gassen, die sich kaum verändert haben",nst:"Die Gassen an den östlichen und westlichen Enden der Krämerbrücke sind so alt wie die Brücke.",nt:"Beide Enden erkunden. Die Ostgasse (Zum Augustinerkloster) ist die bessere."},
  {id:21,n:"Erfurt Cathedral Crypt — Altstadt",a:"Altstadt",v:["history","weird","hidden"],d:8,s:"The crypt below the cathedral — Romanesque foundations from 1154, almost no visitors",st:"The Dom was founded in 742 and rebuilt multiple times. The crypt contains Romanesque stonework from 1154 including the famous Wolfram candelabra — one of the oldest bronze objects in Germany.",im:"Time-travel: the crypt being constructed in 1154, candles flickering in the new stone vault",t:"Ask at the cathedral entrance for crypt access. Often free.",c:["history_big"],r:"g",nn:"Domkrypta — Altstadt",ns:"Die Krypta unter dem Dom — romanische Fundamente von 1154, kaum Besucher",nst:"Der Dom wurde 742 gegründet und mehrfach umgebaut. Die Krypta enthält romanisches Mauerwerk.",nt:"Am Domeingang nach Kryptazugang fragen. Oft kostenlos."},
  {id:22,n:"Gorkistraße GDR Murals — Andreasquarter",a:"Andreasquarter",v:["street_art","hidden","history"],d:10,s:"Surviving GDR-era wall paintings on apartment buildings — socialist realism in the wild",st:"A few buildings in the Andreasquarter retain their GDR-era facade paintings — idealized workers, harvests, peace symbols. They were never removed. Unofficial monuments to the East.",im:"Time-travel: GDR paint brigade completing these murals, 1972, citizens watching skeptically",t:"Walk Gorkistraße. The murals are on the north-facing walls.",c:["street_art"],r:"g",nn:"Gorkistraße DDR-Wandbilder — Andreasquarter",ns:"Erhaltene DDR-Wandmalereien an Wohngebäuden — sozialistischer Realismus in der Wildnis",nst:"Einige Gebäude im Andreasquarter behalten ihre DDR-Fassadengemälde — Arbeiter, Ernten, Friedenssymbole.",nt:"Gorkistraße abgehen. Die Wandbilder befinden sich auf den nordseitigen Wänden."},
  {id:23,n:"Erfurt Old Jewish Quarter — Altstadt",a:"Altstadt",v:["history","hidden"],d:10,s:"The streets where Erfurt\'s medieval Jewish community lived — traces in the stone",st:"Erfurt had one of the most prosperous Jewish communities in medieval Germany. The Jewish quarter was between the Dom and the old synagogue. The 1349 pogrom ended it. The stones remember.",im:"Time-travel: medieval Erfurt\'s Jewish quarter at its peak — money changers, scholars, a community",t:"Walk Michaelisstraße and Schlösserstraße. Look for the historical markers.",c:["history_big"],r:"g",nn:"Altes jüdisches Viertel — Altstadt",ns:"Die Straßen, in denen Erfurts mittelalterliche jüdische Gemeinde lebte — Spuren im Stein",nst:"Erfurt hatte eine der wohlhabendsten jüdischen Gemeinden im mittelalterlichen Deutschland.",nt:"Michaelisstraße und Schlösserstraße abgehen. Nach den historischen Markierungen suchen."},
  {id:24,n:"Severikirche Interior — Altstadt",a:"Altstadt",v:["history","beautiful"],d:8,s:"The church of Severus — a Gothic hall church with the Eros sarcophagus and extraordinary light",st:"The Severikirche stands beside the Cathedral and is often overlooked by visitors who only enter the Dom. The interior has a warm Gothic light and the famous Eros sarcophagus from 1365.",im:"Time-travel: the sarcophagus being carved in 1365, the craftsman\'s chisel ringing in the stone",t:"Free entry. Stand in the nave and look up.",c:["history_big"],r:"g",nn:"Severikirche Innen — Altstadt",ns:"Die Kirche des Severus — eine gotische Hallenkirche mit dem Eros-Sarkophag und außergewöhnlichem Licht",nst:"Die Severikirche steht neben dem Dom und wird oft übersehen. Der Eros-Sarkophag von 1365.",nt:"Freier Eintritt. Im Kirchenschiff stehen und hochschauen."},
  {id:25,n:"Erfurt Roof Terrace View — Petersberg",a:"Petersberg",v:["beautiful","free","quiet"],d:20,s:"The best free city view in Erfurt — from the Petersberg Citadel north wall at sunset",st:"The north wall of Petersberg Citadel looks directly over the old town. The cathedral spires, the Krämerbrücke towers, the Gera river meadows. Nothing between you and it.",im:"Time-travel: Allied soldiers surveying the liberated city from these ramparts, April 1945",t:"Go at sunset. Always free. The north side is best.",c:["high_spots"],r:"g",nn:"Erfurt Dachterrassen-Blick — Petersberg",ns:"Der beste kostenlose Stadtblick in Erfurt — von der Petersberg-Zitadelle Nordmauer bei Sonnenuntergang",nst:"Die Nordmauer von Petersberg blickt direkt über die Altstadt. Domtürme, Krämerbrücke, Gera-Wiesen.",nt:"Bei Sonnenuntergang gehen. Immer kostenlos. Die Nordseite ist besser."},
  {id:26,n:"Krämerbrücke — Krämerbrücke #26",a:"Krämerbrücke",v:["history","beautiful","hidden"],d:45,s:"Medieval bridge lined with inhabited houses — the only one north of the Alps still lived in",st:"Built in 1325, the Krämerbrücke has 32 buildings sitting directly on the bridge structure. Merchants traded here. People still live above the shops. The only bridge of its kind in the world.",im:"Time-travel: cloth merchants trading from these same houses in 1400, bridge packed with buyers",t:"Cross at dawn for no crowds. The alleys at each end are as good as the bridge.",c:["history_big"],r:"g",nn:"Krämerbrücke — Krämerbrücke #26",ns:"Mittelalterliche Brücke mit bewohnten Häusern — die einzige nördlich der Alpen noch bewohnte",nst:"1325 gebaut, hat die Krämerbrücke 32 Gebäude direkt auf der Brückenstruktur. Menschen leben noch dort.",nt:"Bei Tagesanbruch überqueren für keine Menschenmassen. Die Gässchen an jedem Ende sind genauso gut."},
  {id:27,n:"Erfurt Cathedral Hill — Altstadt #27",a:"Altstadt",v:["history","beautiful"],d:12,s:"Two Gothic churches side by side on a hill above the city — and both are free to enter",st:"The Erfurt Dom and Severikirche stand together on the Domhügel. The 70 cathedral steps lead up to one of the most powerful Gothic ensembles in Germany. Free to enter both.",im:"Time-travel: Luther being ordained as a priest in this cathedral, 1507",t:"Climb the steps. The Cathedral is free. Severikirche is free. Go inside both.",c:["high_spots"],r:"g",nn:"Domhügel — Altstadt #27",ns:"Zwei gotische Kirchen nebeneinander auf einem Hügel — und beide kostenlos zu betreten",nst:"Der Erfurter Dom und die Severikirche stehen zusammen auf dem Domhügel. 70 Stufen hinauf.",nt:"Die Stufen hinaufsteigen. Dom kostenlos. Severikirche kostenlos. Beide betreten."},
  {id:28,n:"Petersberg Citadel — Petersberg #28",a:"Petersberg",v:["history","beautiful","free"],d:6,s:"Largest baroque citadel in central Germany — free to enter, enormous and almost empty",st:"The Petersberg Citadel covers 36 hectares of hilltop and is one of the best-preserved baroque military complexes in Europe. The underground casemates can be toured. The ramparts are free to walk.",im:"Time-travel: Napoleon riding through this citadel gate in 1806 after Jena",t:"Free to walk the ramparts any time. Underground tour for small fee.",c:["parks"],r:"g",nn:"Zitadelle Petersberg — Petersberg #28",ns:"Größte Barockzitadelle in Mitteldeutschland — kostenloser Zutritt, riesig und fast leer",nst:"Die Petersberg-Zitadelle umfasst 36 Hektar und ist eines der am besten erhaltenen Barockfestsysteme Europas.",nt:"Wälle jederzeit kostenlos begehen. Unterirdische Tour für kleinen Eintritt."},
  {id:29,n:"Alte Synagoge Erfurt — Altstadt #29",a:"Altstadt",v:["history","hidden"],d:52,s:"One of the best-preserved medieval synagogues in Europe — 900 years old and almost intact",st:"Built around 1094, the Alte Synagoge was used as a storehouse for centuries which accidentally preserved it. The Erfurt Jewish treasure — 3,141 silver coins hidden in a wall — was found here in 1998.",im:"Time-travel: the Erfurt Jewish community gathering here in 1200, the city full of their trade",t:"Small entry fee for the interior. Exterior and nearby old Jewish quarter free.",c:["courtyards"],r:"g",nn:"Alte Synagoge — Altstadt #29",ns:"Eine der besterhaltenen mittelalterlichen Synagogen Europas — 900 Jahre alt und fast intakt",nst:"Um 1094 gebaut. Als Lagerhaus für Jahrhunderte genutzt, was sie zufällig bewahrte.",nt:"Kleiner Eintritt für das Innere. Außenbereich und jüdisches Viertel kostenlos."},
  {id:30,n:"Augustinerkloster Courtyard — Andreasquarter #30",a:"Andreasquarter",v:["history","quiet","beautiful"],d:22,s:"Luther\'s monastery — where he became a monk in 1505, still standing, still a working place",st:"The Augustinian monastery is where Martin Luther lived as a monk. He described his cell. He said his first Mass here. The courtyard is open and free. A place where history is still present.",im:"Time-travel: Luther walking these cloisters in 1506, studying by candlelight",t:"Free to enter the courtyard. Guided tours for a small fee.",c:["romantic_water"],r:"g",nn:"Augustinerkloster Hof — Andreasquarter #30",ns:"Luthers Kloster — wo er 1505 Mönch wurde, noch stehend, noch ein arbeitender Ort",nst:"Das Augustinerkloster ist der Ort, wo Martin Luther als Mönch lebte. Er beschrieb seine Zelle.",nt:"Hof kostenlos zu betreten. Führungen für kleinen Eintritt."},
  {id:31,n:"Fischmarkt & Rathaus — Krämerbrücke #31",a:"Krämerbrücke",v:["history","beautiful","local"],d:20,s:"Neo-Gothic town hall on the old fish market — Luther on one side, Faust on the other",st:"The 1870 town hall has murals of Luther and the Faust legend in its council chamber. The market square outside is the commercial heart of Erfurt since the Middle Ages.",im:"Time-travel: cloth merchants and fish sellers arguing over prices in this square, 1450",t:"The square is free. Town hall interior open on weekdays.",c:["scary"],r:"g",nn:"Fischmarkt & Rathaus — Krämerbrücke #31",ns:"Neugotisches Rathaus auf dem alten Fischmarkt — Luther auf einer Seite, Faust auf der anderen",nst:"Das Rathaus von 1870 hat Wandbilder von Luther und der Faust-Sage.",nt:"Platz kostenlos. Rathausinneres werktags geöffnet."},
  {id:32,n:"Wenigemarkt Square — Krämerbrücke #32",a:"Krämerbrücke",v:["history","local","beautiful"],d:19,s:"The smallest market square — half-timbered houses, fountain, no tourists in the evening",st:"Wenigemarkt is the intimate square at the eastern end of the Krämerbrücke. One of Erfurt\'s oldest trading spots. In the evening, locals take it back. The fountain is 16th century.",im:"Time-travel: this square crammed with market stalls in the 1500s, smelling of fish and wool",t:"Come in the evening. Best with one of the local wines.",c:["famous_dead"],r:"g",nn:"Wenigemarkt — Krämerbrücke #32",ns:"Der kleinste Marktplatz — Fachwerkhäuser, Brunnen, keine Touristen am Abend",nst:"Wenigemarkt ist der intime Platz am östlichen Ende der Krämerbrücke.",nt:"Abends kommen. Am besten mit einem lokalen Wein."},
  {id:33,n:"Ilmpark Riverbank — Ilmpark #33",a:"Ilmpark",v:["nature","quiet","beautiful"],d:13,s:"The Gera river meadows south of the cathedral — wildflowers, birdsong, complete urban escape",st:"The river Gera runs through Erfurt beneath weeping willows. The meadows along it are barely touched. This is the quiet Erfurt that locals know and visitors miss.",im:"Time-travel: Erfurt citizens cooling off in the Gera on a summer day, 1900",t:"Free. Best in early morning or evening.",c:["street_art"],r:"g",nn:"Gera-Ufer — Ilmpark #33",ns:"Die Gera-Wiesen südlich des Doms — Wildblumen, Vogelgesang, vollständige Stadtwildnis",nst:"Die Gera fließt durch Erfurt unter Trauerweidechen. Die Wiesen sind kaum berührt.",nt:"Kostenlos. Am besten früh morgens oder abends."},
  {id:34,n:"Predigerkirche — Andreasquarter #34",a:"Andreasquarter",v:["history","quiet"],d:52,s:"Dominican church from 1228 — the altar where Luther preached, still in place",st:"The Prediger church is one of the oldest mendicant churches in Germany. Luther preached here before his Reformation. The interior is austere and powerful. Almost no tourists.",im:"Time-travel: Luther preaching to a packed congregation in this church, 1510",t:"Free entry. Often completely empty.",c:["abandoned"],r:"g",nn:"Predigerkirche — Andreasquarter #34",ns:"Dominikanerkirche aus dem Jahr 1228 — der Altar, an dem Luther predigte, noch an seinem Platz",nst:"Die Predigerkirche ist eine der ältesten Bettelordenskirchen Deutschlands.",nt:"Freier Eintritt. Oft völlig leer."},
  {id:35,n:"Zitadelle Rampart Views — Petersberg #35",a:"Petersberg",v:["beautiful","free","history"],d:11,s:"Walk the full circuit of the citadel ramparts — 360 degree views over Erfurt and Thuringia",st:"The rampart walk around Petersberg Citadel takes about 30 minutes. The views are extraordinary — the cathedral towers, the old town, and on clear days, the Thuringian forest in the distance.",im:"Time-travel: Prussian soldiers drilling on these ramparts in 1806, Napoleon watching",t:"Free at all times. Best at golden hour.",c:["free_museum"],r:"g",nn:"Zitadelle Wallpromenade — Petersberg #35",ns:"Den vollen Rundweg der Zitadellenwälle gehen — 360-Grad-Blick über Erfurt und Thüringen",nst:"Der Wallrundweg dauert ca. 30 Minuten. Kathedralentürme, Altstadt, Thüringer Wald in der Ferne.",nt:"Jederzeit kostenlos. Am besten bei goldener Stunde."},
  {id:36,n:"Thomaskirche — Andreasquarter #36",a:"Andreasquarter",v:["history","quiet"],d:48,s:"Medieval parish church where generations of Erfurt citizens were christened and buried",st:"One of the oldest parish churches in Erfurt, dating to the 13th century. The interior has accumulated seven centuries of memorial tablets, epitaphs, and donated art.",im:"Time-travel: a medieval Erfurt family attending Sunday mass here, 1380",t:"Usually open. Free.",c:["local_only"],r:"g",nn:"Thomaskirche — Andreasquarter #36",ns:"Mittelalterliche Pfarrkirche, wo Generationen von Erfurter Bürgern getauft und begraben wurden",nst:"Eine der ältesten Pfarrkirchen Erfurts aus dem 13. Jh.",nt:"Normalerweise geöffnet. Kostenlos."},
  {id:37,n:"Cyriaksburg Ruin View — Altstadt #37",a:"Altstadt",v:["history","hidden","beautiful"],d:52,s:"The ruined hilltop fortress with sweeping views over Erfurt from above the egapark",st:"The Cyriaksburg was a medieval fortress razed by Napoleon in 1813. The ruin sits on a hill above the egapark gardens. The view from the remaining walls is the best in Erfurt.",im:"Time-travel: French soldiers blowing up the Cyriaksburg on Napoleon\'s orders, 1813",t:"Enter through the egapark (free outside opening hours via the hill path).",c:["architecture"],r:"g",nn:"Cyriaksburg Ruine — Altstadt #37",ns:"Die Burgruine auf dem Hügel mit Blick auf Erfurt von über dem egapark",nst:"Die Cyriaksburg war eine mittelalterliche Festung, die Napoleon 1813 schleifte.",nt:"Über den egapark eintreten (außerhalb der Öffnungszeiten über den Hügelpfad kostenlos)."},
  {id:38,n:"Anger Main Square — Altstadt #38",a:"Altstadt",v:["history","local"],d:39,s:"Erfurt\'s main commercial square — where the post coach arrived and the city met",st:"The Anger has been Erfurt\'s main public square for over 400 years. The Baroque Angermuseum faces it. Trams cross it constantly. The square contains the best 19th century commercial facades.",im:"Time-travel: post coach arriving to the Anger in 1800, passengers spilling out, news exchanged",t:"Walk the full perimeter. The facades on the north side date from 1880–1900.",c:["history_big"],r:"g",nn:"Anger — Altstadt #38",ns:"Erfurts Hauptplatz — wo die Postkutsche ankam und die Stadt sich traf",nst:"Der Anger ist seit über 400 Jahren Erfurts wichtigster öffentlicher Platz.",nt:"Den vollen Umfang abgehen. Die Fassaden der Nordseite stammen von 1880–1900."},
  {id:39,n:"Gera Waterway Walk — Krämerbrücke #39",a:"Krämerbrücke",v:["nature","hidden","beautiful"],d:10,s:"The hidden channels of the Gera river beneath the city — medieval watermills and secret paths",st:"The Gera splits into multiple channels through the old city. Following the water on foot reveals old mill races, hidden bridges, and backways that tourists never find.",im:"Time-travel: water-powered mills grinding wheat in these channels, the city running on river power, 1500",t:"Follow the water south from the Krämerbrücke. Keep close to the river.",c:["high_spots"],r:"g",nn:"Gera-Wasserweg — Krämerbrücke #39",ns:"Die versteckten Gera-Kanäle unter der Stadt — mittelalterliche Wassermühlen und geheime Wege",nst:"Die Gera teilt sich in mehrere Arme durch die Altstadt. Den Wasserläufen zu Fuß folgen.",nt:"Wasser von der Krämerbrücke nach Süden folgen. Nahe am Fluss bleiben."},
  {id:40,n:"Reglerkirche — Altstadt #40",a:"Altstadt",v:["history","quiet"],d:42,s:"Augustinian church opposite the citadel gate — Luther\'s church, before and after",st:"Luther worshipped at the Reglerkirche before and after his monastery period. The building is 13th century. The tower is unusually slender for Erfurt. Almost always open.",im:"Time-travel: Luther praying alone in this church the night before he entered the monastery, 1505",t:"Free. Often unlocked.",c:["parks"],r:"g",nn:"Reglerkirche — Altstadt #40",ns:"Augustinerkirche gegenüber dem Zitadellentor — Luthers Kirche, vorher und nachher",nst:"Luther betete in der Reglerkirche vor und nach seiner Klosterzeit.",nt:"Kostenlos. Oft unverschlossen."},
  {id:41,n:"Erfurt University Old Building — Altstadt #41",a:"Altstadt",v:["history","beautiful"],d:32,s:"The 1392 university — where Luther studied, one of the oldest in German-speaking Europe",st:"Erfurt University was founded in 1392, predating Berlin by centuries. Luther studied law here before abandoning it for a monastery. The historic buildings form a free courtyard complex.",im:"Time-travel: young Martin Luther arriving at Erfurt university from Mansfeld, 1501, terrified and determined",t:"The courtyard is free. The old lecture halls sometimes open.",c:["courtyards"],r:"g",nn:"Alte Universität — Altstadt #41",ns:"Die Universität von 1392 — wo Luther studierte, eine der ältesten im deutschsprachigen Europa",nst:"Erfurter Universität wurde 1392 gegründet, Jahrhunderte vor Berlin. Luther studierte hier Jura.",nt:"Der Innenhof ist kostenlos. Die alten Hörsäle manchmal geöffnet."},
  {id:42,n:"Hirschgarten — Ilmpark #42",a:"Ilmpark",v:["nature","quiet","hidden"],d:7,s:"The hidden deer garden south of the citadel — a park that maps don\'t always show",st:"A small park and garden area south of Petersberg, quiet even in summer. The old paths through it wind between mature trees and disappear into the Gera meadows.",im:"Time-travel: 18th century Erfurt nobility walking trained deer in this garden",t:"Enter from Hirschgarten path off Talstraße. Free.",c:["romantic_water"],r:"g",nn:"Hirschgarten — Ilmpark #42",ns:"Der versteckte Hirschgarten südlich der Zitadelle — ein Park, den Karten nicht immer zeigen",nst:"Ein kleiner Park südlich von Petersberg, still selbst im Sommer.",nt:"Von Hirschgartenpfad von der Talstraße eintreten. Kostenlos."},
  {id:43,n:"Andreasquarter Streets — Andreasquarter #43",a:"Andreasquarter",v:["local","history","beautiful"],d:6,s:"The artisan quarter of old Erfurt — half-timbered workshops, stone fountains, real residents",st:"The Andreasquarter was the craftsmen\'s district in medieval Erfurt. Many buildings date from the 16th and 17th centuries. The streets are narrow and the architecture is human-scaled.",im:"Time-travel: shoemakers and dyers working in these narrow workshops, 1550",t:"Walk the full quarter. Grüne Straße and Michaelisstraße are the best.",c:["scary"],r:"g",nn:"Andreasquarter — Andreasquarter #43",ns:"Das Handwerkerviertel des alten Erfurts — Fachwerkwerkstätten, Steinfontänen, echte Bewohner",nst:"Das Andreasquarter war das Handwerkerviertel im mittelalterlichen Erfurt.",nt:"Das gesamte Viertel abgehen. Grüne Straße und Michaelisstraße sind die besten."},
  {id:44,n:"Kartäuserkloster Courtyard — Andreasquarter #44",a:"Andreasquarter",v:["history","quiet","hidden"],d:10,s:"The 14th century Carthusian monastery — now a school, but the cloister is still visible",st:"The Carthusians arrived in Erfurt in 1372. Their silent monastery eventually became a school. The Gothic cloister survives behind the school buildings and is sometimes accessible.",im:"Time-travel: Carthusian monks in absolute silence, forbidden to speak, crossing this cloister daily, 1400",t:"Ask at the school office. Sometimes open during school hours.",c:["famous_dead"],r:"g",nn:"Kartäuserkloster Hof — Andreasquarter #44",ns:"Das Kartäuserkloster aus dem 14. Jh. — jetzt eine Schule, aber der Kreuzgang ist noch sichtbar",nst:"Die Kartäuser kamen 1372 nach Erfurt. Ihr stilles Kloster wurde schließlich eine Schule.",nt:"Im Schulbüro fragen. Manchmal während der Schulzeiten zugänglich."},
  {id:45,n:"Krämerbrücke Side Alleys — Krämerbrücke #45",a:"Krämerbrücke",v:["hidden","local","beautiful"],d:18,s:"The alleys flanking the bridge at each end — medieval lanes that have barely changed",st:"The lanes at the eastern and western ends of the Krämerbrücke are as old as the bridge and hold the quietest architecture in Erfurt. Nobody photographs them. Walk both.",im:"Time-travel: bridge merchants taking their morning break in these same alleys, 1600",t:"Explore both ends. The east alley (Zum Augustinerkloster) is the better one.",c:["street_art"],r:"g",nn:"Krämerbrückengassen — Krämerbrücke #45",ns:"Die Gassen, die die Brücke an jedem Ende flankieren — mittelalterliche Gassen, die sich kaum verändert haben",nst:"Die Gassen an den östlichen und westlichen Enden der Krämerbrücke sind so alt wie die Brücke.",nt:"Beide Enden erkunden. Die Ostgasse (Zum Augustinerkloster) ist die bessere."},
