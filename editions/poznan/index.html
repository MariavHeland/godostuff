<script>
const P = [,
  {name:'Fort VI',area:'Świerczewo',desc:'Ceglana geometria fortu z podziemnymi korytarzami otwieranymi podczas wydarzeń, gdzie locals odkrywają historię twierdzy w ciszy. Przyjedź autobusem na koniec ul. Lutyckiej i poczuj miękkie światło na murach. Locals kochają to za unikalne doświadczenie wnętrza, którego nie da się powtórzyć nigdzie indziej. Free, wejścia zorganizowane.',tags:['hidden','local','free'],lat:52.395,lng:16.85},
  {name:'Ogród Dendrologiczny',area:'Morasko',desc:'Miejsce, gdzie miasto nagle przestaje hałasować – las dendrologiczny z rzadkimi drzewami i spokojnymi ścieżkami. Idealne rano lub późnym popołudniem, gdy światło miękko kładzie się na gałęziach. Locals uciekają tu od zgiełku, bus 500 dowiezie blisko. Darmowe.',tags:['park','hidden','local','free'],lat:52.5,lng:17.05},
  {name:'Park Heweliusza',area:'Grunwald',desc:'Niewielki park z mozaikami układu słonecznego obok Obserwatorium Astronomicznego, gdzie nauka spotyka relaks. Locals przychodzą odetchnąć od miasta na ławce pod gwiazdami. Bus 163 lub tramwaj 12 blisko. Całkowicie free.',tags:['park','local','free'],lat:52.3959,lng:16.87382},
  {name:'Dolina Szklarki',area:' outskirts',desc:'Leśna dolina z 250m kładką w koronach drzew na 13m wysokości – spacer jak w innym świecie. Locals polecają na wolny spacer niezależnie od pory roku, czyste powietrze i szum liści. Dostęp busem podmiejskim. Free entry.',tags:['viewpoint','park','hidden','free'],lat:52.40301,lng:16.99427},
  {name:'Podziemne okolice Dworca',area:'Stare Miasto',desc:'Sekretne schrony, tunele pocztowe i relikty twierdzy pod dworcem głównym – nocne wyprawy dla ciekawskich. Spotkanie przy dworcu letnim od ul. Dworcowej, tramwaj 5 lub 8. Locals kochają odkrywanie zakazanych przejść. Free wycieczki grupowe.',tags:['hidden','local','free'],lat:52.4075,lng:16.925},
  {name:'Taras na dachu Muzeum Narodowego',area:'Śródka',desc:'Ukryty taras z panoramą Starego Rynku i katedry, mniej znany niż wieże. Locals wspinają się tu na kawę z widokiem, tramwaj 18 bezpośrednio. Free dostęp w godzinach otwarcia muzeum.',tags:['viewpoint','hidden','local','free'],lat:52.41,lng:16.94},
  {name:'Wieża Widokowa na Malcie',area:'Rataje',desc:'26m wieża nad jeziorem Maltańskim z widokiem na wodę i lasy, idealna na slow spacer. Locals rowerem lub busem 69, unikają tłumów po zmierzchu. Bardzo tani wstęp lub free w niektóre dni.',tags:['viewpoint','local','free'],lat:52.42,lng:17.01},
  {name:'Wzgórze Przemysława',area:'Centrum',desc:'Małe wzgórze z panoramą na miasto, perfekcyjne na zachód słońca w ukryciu. Locals piknikują tu z termosem, dojazd tramwajem 7. Całkowicie darmowe, off the radar.',tags:['viewpoint','hidden','local','free'],lat:52.412,lng:16.93},
  {name:'Courtyards of Śródka',area:'Śródka',desc:'Sekretne podwórka z muralami i community ogrodami za kamienicami, gdzie locals grillują latem. Bus 68 skręca w uliczki, odkryj przez bramę. Free, vibe sąsiedzki.',tags:['street art','courtyard','local','free'],lat:52.415,lng:16.945},
  {name:'Hala Mirowska Market',area:'Jeżyce',desc:'Lokalny targ w starej hali z tanimi pierogami i warzywami od wielkopolskich rolników. Locals handlują plotkami przy straganie, tramwaj 8. Bardzo cheap, free entry.',tags:['market','local','free'],lat:52.425,lng:16.905},
  {id:1,n:"Stary Rynek — Stare Miasto",a:"Stare Miasto",v:["history","beautiful","local"],d:5,s:"One of the largest medieval market squares in Europe — colourful townhouses and mechanical goats",st:"The Stary Rynek is Poznań\'s beating heart — a vast Renaissance square with colourful burgher houses. At noon, two metal goats emerge from the clock tower and butt heads. The square is always alive.",im:"Time-travel: the weekly grain market filling this square in the Middle Ages, merchants from all of Europe",t:"Free. Come for the goats at 12:00. Evening is magical with the lights.",c:["history_big"],r:"g",nn:"Stary Rynek — Stare Miasto",ns:"Jeden z największych średniowiecznych rynków w Europie — kolorowe kamienice i mechaniczne kozły",nst:"Stary Rynek to bijące serce Poznania — wielki renesansowy rynek z kolorowymi kamienicami. W południe wychodzą dwa metalowe kozły.",nt:"Bezpłatnie. Przyjdź na kozły o 12:00. Wieczór jest magiczny z oświetleniem."},
  {id:2,n:"Poznań Town Hall — Stare Miasto",a:"Stare Miasto",v:["history","architecture","beautiful"],d:5,s:"The Renaissance Ratusz — one of the finest civic buildings in Central Europe",st:"Poznań\'s town hall was rebuilt in Renaissance style 1550–1560 by Giovanni Battista Quadro. The arcaded loggia, the astronomical clock, the relief decorations — it is a masterpiece. Museum inside, exterior always free.",im:"Time-travel: the Ratusz being built by Italian master craftsmen in 1555",t:"Exterior free. Museum inside small fee.",c:["architecture"],r:"g",nn:"Ratusz — Stare Miasto",ns:"Renesansowy Ratusz — jeden z najpiękniejszych budynków obywatelskich w Europie Środkowej",nst:"Ratusz w Poznaniu został przebudowany w stylu renesansowym 1550–1560 przez Giovanni Battista Quadro.",nt:"Zewnątrz bezpłatnie. Muzeum wewnątrz mała opłata."},
  {id:3,n:"Poznań Cathedral — Ostrów Tumski",a:"Ostrów Tumski",v:["history","beautiful","quiet"],d:10,s:"Poland\'s oldest cathedral on its own island — where Polish statehood began in 966",st:"The cathedral on Cathedral Island was founded in 968 by Mieszko I, the first duke of Poland. The golden chapel contains the tombs of the first Polish rulers. The island itself is the cradle of the Polish nation.",im:"Time-travel: Duke Mieszko I\'s baptism in 966 — the beginning of the Polish Christian kingdom",t:"Free to enter. Open daily.",c:["history_big"],r:"g",nn:"Katedra Poznańska — Ostrów Tumski",ns:"Najstarsza katedra w Polsce na własnej wyspie — gdzie zaczęła się polska państwowość w 966",nst:"Katedra na Ostrowie Tumskim została założona w 968 przez Mieszka I, pierwszego księcia Polski.",nt:"Bezpłatny wstęp. Otwarte codziennie."},
  {id:4,n:"Ostrów Tumski Island — Ostrów Tumski",a:"Ostrów Tumski",v:["history","beautiful","quiet"],d:10,s:"Cathedral Island — the oldest part of Poland, walk its perimeter in 20 minutes",st:"Ostrów Tumski is where Poland was born. The island in the Warta river holds the cathedral, several medieval churches, and the earliest evidence of Polish civic life. Walk it slowly.",im:"Time-travel: the island fortress of early medieval Poland, 900 AD — wooden walls and the smell of fire",t:"Free to walk. The island is open at all times.",c:["history_big"],r:"g",nn:"Ostrów Tumski — Ostrów Tumski",ns:"Wyspa katedralna — najstarsza część Polski, obejdź jej obwód w 20 minut",nst:"Ostrów Tumski to miejsce narodzin Polski. Wyspa na Warcie mieści katedrę i kilka średniowiecznych kościołów.",nt:"Bezpłatny spacer. Wyspa otwarta cały czas."},
  {id:5,n:"Fara Church — Stare Miasto",a:"Stare Miasto",v:["history","beautiful"],d:5,s:"The Jesuit Baroque church — the most spectacular interior in Poznań, free to enter",st:"The Fara is Poznań\'s most dramatic interior — an overwhelming Baroque space with gilded altars and ceiling frescoes. Founded by the Jesuits in 1651. Still in use. Always free.",im:"Time-travel: the Fara\'s interior being gilded, every surface becoming gold, 1700",t:"Free. The interior justifies any detour.",c:["architecture"],r:"g",nn:"Fara — Stare Miasto",ns:"Jezuicki kościół barokowy — najbardziej spektakularne wnętrze w Poznaniu, bezpłatny wstęp",nst:"Fara to najbardziej dramatyczne wnętrze Poznania — przytłaczająca przestrzeń barokowa ze złoconymi ołtarzami.",nt:"Bezpłatnie. Wnętrze uzasadnia każdy objazd."},
  {id:6,n:"Imperial Quarter — Stare Miasto",a:"Stare Miasto",v:["history","architecture","hidden"],d:10,s:"The German imperial buildings of 1900 — a city within a city built to assert Prussian power",st:"After the Partitions, Poznań was the capital of Prussian Posen. The Germans built an extraordinary monumental quarter — the castle, the opera house, the post office — all in Wilhelmine historicist style. Still intact.",im:"Time-travel: Kaiser Wilhelm II visiting his new Poznań castle in 1910, the city still German",t:"Free to walk. The Kaiser castle exterior is always accessible.",c:["history_big"],r:"g",nn:"Dzielnica Cesarska — Stare Miasto",ns:"Niemieckie budynki imperialne z 1900 r. — miasto w mieście zbudowane dla podkreślenia pruskiej potęgi",nst:"Po rozbiorach Poznań był stolicą pruskiego Poznania. Niemcy zbudowali niezwykłą monumentalną dzielnicę.",nt:"Spacer bezpłatny. Zamek cesarski zewnątrz zawsze dostępny."},
  {id:7,n:"Cytadela Park — Wilda",a:"Wilda",v:["nature","history","free"],d:10,s:"Former German fortress turned free park — military cemetery, sculpture garden, woods",st:"The Cytadela was the 19th century Prussian fortress above Poznań. After WWII the German, Commonwealth and Soviet war cemeteries were installed in its grounds. A park of extraordinary memory.",im:"Time-travel: the Battle of Poznań 1945 — the last major German fortified city to fall in the East",t:"Always free. The war cemeteries are remarkable.",c:["history_big"],r:"g",nn:"Cytadela — Wilda",ns:"Dawna pruska forteca zamieniona w bezpłatny park — cmentarz wojskowy, ogród rzeźb, las",nst:"Cytadela to twierdza pruska z XIX w. Po II wojnie światowej zainstalowano tam cmentarze wojenne.",nt:"Zawsze bezpłatnie. Cmentarze wojenne są niezwykłe."},
  {id:8,n:"Palmiarnia — Wilda",a:"Wilda",v:["nature","beautiful","quiet"],d:10,s:"The tropical palm house in Wilson Park — jungle in the middle of Poznań",st:"Poznań\'s palm house in Wilson Park is one of the largest tropical conservatories in Poland. Inside: tropical trees, exotic plants, waterfall. The surrounding park is free.",im:"Time-travel: the palm house opening in 1910, Poznań citizens seeing tropical plants for the first time",t:"Small fee for the glasshouse interior. Wilson Park surrounding it free.",c:["parks"],r:"g",nn:"Palmiarnia — Wilda",ns:"Tropikalna palmiarna w Parku Wilsona — dżungla w centrum Poznania",nst:"Palmiarnia Poznańska w Parku Wilsona jest jedną z największych tropikalnych szklarni w Polsce.",nt:"Mała opłata za szklarnię. Otaczający Park Wilsona bezpłatny."},
  {id:9,n:"Malta Lake — Wilda",a:"Wilda",v:["nature","local","beautiful"],d:10,s:"The city regatta lake — kayaks, sunbathers, and the miniature steam railway on its banks",st:"Malta lake is an artificial regatta course built in 1952. Now it is the free outdoor living room of Poznań. Rowing clubs, a small beach, the new thermal bath complex, and the old miniature railway.",im:"Time-travel: the Malta lake opening in 1952, the first regattas on its still water",t:"Free to walk the lake circuit (2km). The miniature railway runs in summer.",c:["parks"],r:"g",nn:"Jezioro Malta — Wilda",ns:"Jezioro regatowe — kajaki, plażowicze i miniaturowa kolej parowa na brzegach",nst:"Jezioro Malta to sztuczny tor regatowy z 1952 roku. Teraz to bezpłatny zewnętrzny salon Poznania.",nt:"Spacer wokół jeziora bezpłatny (2 km). Miniaturowa kolejka latem."},
  {id:10,n:"Śluza Katedralna — Ostrów Tumski",a:"Ostrów Tumski",v:["hidden","history","nature"],d:10,s:"The cathedral lock — where the river splits around the island, ancient waterway still working",st:"The Śluza controls water flow around Cathedral Island. Standing at the lock mechanism, the island of Poland\'s origins is on one side, and the modern city on the other.",im:"Time-travel: medieval boatmen navigating through the Warta channels around the cathedral island, 1400",t:"Free to view. Walk the canal banks on both sides.",c:["romantic_water"],r:"g",nn:"Śluza Katedralna — Ostrów Tumski",ns:"Śluza katedralna — gdzie rzeka rozdziela się wokół wyspy, starożytny wodny szlak wciąż działa",nst:"Śluza kontroluje przepływ wody wokół Ostrowa Tumskiego.",nt:"Bezpłatne oglądanie. Spacer po obu brzegach kanału."},
  {id:11,n:"Śródka Medieval Market — Ostrów Tumski",a:"Ostrów Tumski",v:["history","local","hidden"],d:10,s:"The resurgent medieval market outside Cathedral Island — murals, craft stalls, real neighbourhood",st:"Śródka is the old suburb just outside Cathedral Island that declined for decades and is now being revived. Street art murals on every building. A weekend market. Real residents returning.",im:"Time-travel: Śródka as Poznań\'s main market before the modern city was built, 1600",t:"Free to walk. Best on Saturday for the market.",c:["local_only"],r:"g",nn:"Śródka — Ostrów Tumski",ns:"Rewitalizowany średniowieczny rynek poza Wyspą Katedralną — murale, kramy rzemieślnicze, prawdziwa dzielnica",nst:"Śródka to stare przedmieście tuż obok Ostrowa Tumskiego, które podupadło na dekady i jest teraz odradzane.",nt:"Bezpłatny spacer. W sobotę na targu."},
  {id:12,n:"Jeżyce Quarter — Jeżyce",a:"Jeżyce",v:["local","hidden","beautiful"],d:10,s:"Poznań\'s bohemian quarter — Gründerzeit apartment buildings, vintage shops, real life",st:"Jeżyce was Poznań\'s German burgher suburb in the 19th century. Now it is the most liveable neighbourhood — farmers market on Saturdays, independent cafés, beautiful pre-war buildings.",im:"Time-travel: Jeżyce as a prosperous German suburb in 1900, children playing in these same streets",t:"Saturday market on Plac Różany. Walk the streets south of Dąbrowskiego.",c:["local_only"],r:"g",nn:"Jeżyce — Jeżyce",ns:"Bohemska dzielnica Poznania — kamienice z epoki wilhelmińskiej, sklepy vintage, prawdziwe życie",nst:"Jeżyce było poznańskim przedmieściem mieszczańskim w XIX w. Teraz to najbardziej przyjazna dzielnica.",nt:"Sobotni targ na Placu Różanym. Spacer ulicami na południe od Dąbrowskiego."},
  {id:13,n:"Stary Browar Courtyard — Jeżyce",a:"Jeżyce",v:["architecture","beautiful","local"],d:8,s:"Old brewery turned cultural complex — free courtyard, galleries, and one of Poland\'s best shopping centres",st:"The old Hugger Brewery was transformed into a mixed arts and retail complex in 2003. The courtyard with contemporary art installations is free. The architecture is extraordinary.",im:"Time-travel: the brewery in operation in 1900, beer barrels rolling across this same courtyard",t:"Courtyard free. Gallery space free.",c:["architecture"],r:"g",nn:"Stary Browar — Jeżyce",ns:"Stary browar zamieniony w centrum kultury — bezpłatny dziedziniec, galerie i jedno z najlepszych centrów handlowych w Polsce",nst:"Stary Browar to dawny browar Huggera, przekształcony w 2003 r. w kompleks sztuki i handlu.",nt:"Dziedziniec bezpłatny. Przestrzeń galerii bezpłatna."},
  {id:14,n:"Warta Riverside Walk — Warta",a:"Warta",v:["nature","beautiful","quiet"],d:10,s:"The Warta river through Poznań — bank walks, herons, kayaks, the river that made the city",st:"The Warta was the reason Poznań was founded here — the river crossing point. Walking the bank from Cathedral Island south takes you through the city\'s oldest geography.",im:"Time-travel: early Slavic settlers choosing this river crossing point as their home, 800 AD",t:"Free. Walk from Cathedral Island south along the west bank.",c:["romantic_water"],r:"g",nn:"Spacer wzdłuż Warty — Warta",ns:"Rzeka Warta przez Poznań — spacery brzegiem, czaple, kajaki, rzeka która stworzyła miasto",nst:"Warta była powodem założenia Poznania — punkt przekroczenia rzeki.",nt:"Bezpłatnie. Spacer od Ostrowa Tumskiego na południe wzdłuż zachodniego brzegu."},
  {id:15,n:"Collegium Minus — Stare Miasto",a:"Stare Miasto",v:["architecture","history"],d:5,s:"The main building of Adam Mickiewicz University — neoclassical entrance and open courtyard",st:"The university was founded as Poznań\'s German university in 1903 and polonized after 1918. The Collegium Minus courtyard is free to enter and gives access to the inner academic world.",im:"Time-travel: the polonization of the university in 1919 — German signage being replaced with Polish",t:"Courtyard free during working hours.",c:["architecture"],r:"g",nn:"Collegium Minus — Stare Miasto",ns:"Główny budynek Uniwersytetu im. Adama Mickiewicza — neoklasyczne wejście i otwarty dziedziniec",nst:"Uczelnia założona jako poznański uniwersytet niemiecki w 1903 r., spolonizowana po 1918 r.",nt:"Dziedziniec bezpłatny w godzinach pracy."},
  {id:16,n:"Plac Wolności — Stare Miasto",a:"Stare Miasto",v:["history","architecture","local"],d:5,s:"Liberty Square — the neoclassical civic heart of 19th century Poznań",st:"Plac Wolności has the best collection of 19th century neoclassical buildings in Poznań. The Raczyński Library is on one side, the old Bazar Hotel (where Polish independence was celebrated) on another.",im:"Time-travel: the Bazar Hotel hosting the Polish independence celebrations in November 1918",t:"Free. The Raczyński Library reading room is open to the public.",c:["architecture"],r:"g",nn:"Plac Wolności — Stare Miasto",ns:"Plac Wolności — neoklasyczne centrum obywatelskie XIX-wiecznego Poznania",nst:"Plac Wolności ma najlepszy zbiór neoklasycznych budynków z XIX w.",nt:"Bezpłatnie. Czytelnia Biblioteki Raczyńskich jest otwarta dla publiczności."},
  {id:17,n:"Lake Malta Sunrise — Wilda",a:"Wilda",v:["beautiful","quiet","nature"],d:10,s:"Malta lake at dawn — mist on the water, rowing crews training, the city not yet awake",st:"Malta lake in the early morning has the most beautiful light in Poznań. Rowing clubs train at 7am. Mist hangs on the water. The surrounding park is empty.",im:"Time-travel: Malta lake in 1953, the first rowers training on the newly opened water",t:"Come before 8am. Free.",c:["romantic_water"],r:"g",nn:"Jezioro Malta o świcie — Wilda",ns:"Jezioro Malta o świcie — mgła na wodzie, treningi wioślarzy, miasto jeszcze nie obudzone",nst:"Jezioro Malta wczesnym rankiem ma najpiękniejsze światło w Poznaniu.",nt:"Przyjdź przed 8. Bezpłatnie."},
  {id:18,n:"Rogalin Palace Park (day trip) — Warta",a:"Warta",v:["nature","history","beautiful"],d:30,s:"Baroque palace with 900-year-old oaks — the oldest trees in Poland, 30km from Poznań",st:"The Rogalin Palace garden has three ancient oaks named Lech, Czech and Rus — the mythical Slavic brothers. The largest is over 900 years old. The park is free.",im:"Time-travel: these same trees as saplings in 1100, the Slavic world still young and undivided",t:"30km south, reachable by bus. Park free.",c:["parks"],r:"g",nn:"Rogalin (wycieczka) — Warta",ns:"Barokowy pałac z 900-letnimi dębami — najstarsze drzewa w Polsce, 30 km od Poznania",nst:"Park pałacowy w Rogalinie ma trzy starożytne dęby Lech, Czech i Rus. Największy ma ponad 900 lat.",nt:"30 km na południe, dostępny autobusem. Park bezpłatny."},
  {id:19,n:"Archbishop\'s Palace — Ostrów Tumski",a:"Ostrów Tumski",v:["history","architecture"],d:10,s:"The Archbishop\'s residence on Cathedral Island — where Napoleon met Pope Pius VII in 1806",st:"Napoleon visited Cathedral Island and stayed in the Archbishop\'s Palace in 1806 during the Poznań campaign. The exterior is Baroque and impressive.",im:"Time-travel: Napoleon meeting Pope Pius VII on Cathedral Island in 1806",t:"Exterior free. Not open to the public inside.",c:["history_big"],r:"g",nn:"Pałac Arcybiskupi — Ostrów Tumski",ns:"Rezydencja arcybiskupa na Ostrowie Tumskim — gdzie Napoleon spotkał papieża Piusa VII w 1806",nst:"Napoleon odwiedził Ostrów Tumski i zatrzymał się w Pałacu Arcybiskupim w 1806 r.",nt:"Zewnątrz bezpłatny. Wewnątrz nie jest dostępne dla publiczności."},
  {id:20,n:"Plac Kolegiacki — Stare Miasto",a:"Stare Miasto",v:["history","quiet","hidden"],d:5,s:"The square where the old collegiate church stood — now a shadow, an empty square, a memory",st:"The Collegiate Church of St. Mary Magdalene stood here until 1802 when it was demolished by the Prussians. The square it left behind has an odd emptiness — the ghost of a large building.",im:"Time-travel: the old collegiate church filling this square in 1700, before the Prussians came",t:"Free. The ghost outline is still felt in the square\'s size.",c:["history_big"],r:"g",nn:"Plac Kolegiacki — Stare Miasto",ns:"Plac gdzie stał dawny kościół kolegiacki — teraz cień, pusty plac, pamięć",nst:"Kościół Kolegiacki Marii Magdaleny stał tu do 1802, kiedy Prusacy go zburzyli.",nt:"Bezpłatnie. Duch zarysu wciąż odczuwany jest w rozmiarze placu."},
  {id:21,n:"Berwiński Park — Jeżyce",a:"Jeżyce",v:["nature","local","quiet"],d:8,s:"The neighbourhood park of Jeżyce — old trees, chess players, the daily rhythms of a real quarter",st:"Berwiński Park is the green lung of Jeżyce — the neighbourhood that Poznań\'s creative class has adopted. Old trees, benches, chess. Nothing commercial.",im:"Time-travel: German bourgeoisie promenading in this same park on Sunday afternoons, 1905",t:"Free. Always open.",c:["parks"],r:"g",nn:"Park Berwiński — Jeżyce",ns:"Park dzielnicy Jeżyce — stare drzewa, szachiści, codzienne rytmy prawdziwej dzielnicy",nst:"Park Berwiński to zielone płuca Jeżyc — dzielnicy przyjętej przez poznańską klasę twórczą.",nt:"Bezpłatnie. Zawsze otwarte."},
  {id:22,n:"Poznań Croissant Museum (Exterior) — Stare Miasto",a:"Stare Miasto",v:["local","weird","history"],d:5,s:"Poznań\'s most peculiar cultural institution — dedicated entirely to the rogal świętomarciński",st:"The Croissant Museum is Poznań\'s most endearing institution. The rogal świętomarcinski is a St. Martin\'s Day croissant made only in Poznań — white poppy seeds, marzipan, icing. A protected EU product.",im:"Time-travel: the first rogale being sold on St. Martin\'s Day 1891, Poznań celebrating its patron saint",t:"Exterior free. Museum inside has entry.",c:["local_only"],r:"g",nn:"Muzeum Rogala (Zewnątrz) — Stare Miasto",ns:"Najdziwniejsza instytucja kulturalna Poznania — poświęcona w całości rogalowi świętomarcińskiemu",nst:"Muzeum Rogala jest najbardziej ujmującą instytucją Poznania. Rogal świętomarcinski to chroniony produkt UE.",nt:"Zewnątrz bezpłatny. Muzeum wewnątrz z wejściem."},
  {id:23,n:"Warta Floodplain Meadows — Warta",a:"Warta",v:["nature","free","quiet"],d:15,s:"The Warta floodplain outside the city — migrating birds, vast sky, intact river ecology",st:"The Warta National Park floodplain begins just outside Poznań. The meadows flood seasonally and attract extraordinary numbers of migrating birds in spring and autumn. Free to walk.",im:"Time-travel: the Warta in full spring flood, the meadows underwater, white storks overhead",t:"Free. Spring and autumn are the birding seasons.",c:["parks"],r:"g",nn:"Łąki nadwarciańskie — Warta",ns:"Łąki nadwarciańskie poza miastem — ptaki migrujące, rozległe niebo, nienaruszona ekologia rzeki",nst:"Warta Nadwarciańska zaczyna się tuż za Poznaniem. Łąki zalewają się sezonowo i przyciągają niezwykłe ilości ptaków.",nt:"Bezpłatnie. Wiosna i jesień to sezony ptasie."},
  {id:24,n:"Old Merchant Houses — Stare Miasto",a:"Stare Miasto",v:["history","architecture","beautiful"],d:5,s:"The colourful Renaissance burgher houses around Stary Rynek — each one a family\'s ambition",st:"The townhouses facing the Stary Rynek were built by competing Poznań merchant families in the 16th century. Each has its own facade colour and decorative scheme. No two are the same.",im:"Time-travel: Poznań merchants debating which colour to paint their new facade in 1560",t:"Free to view. The east side has the most elaborate facades.",c:["architecture"],r:"g",nn:"Stare kamienice — Stare Miasto",ns:"Kolorowe renesansowe kamienice wokół Starego Rynku — każda to ambicja jednej rodziny",nst:"Kamienice przy Starym Rynku budowały konkurujące rodziny kupieckie w XVI w. Każda ma inną fasadę.",nt:"Bezpłatny widok. Wschodnia strona ma najbardziej ozdobne fasady."},
  {id:25,n:"Góra Świętego Wojciecha — Ostrów Tumski",a:"Ostrów Tumski",v:["history","hidden","quiet"],d:10,s:"St. Adalbert\'s Hill — where the missionary who converted Poland is said to have preached",st:"Adalbert preached on this hill before his martyrdom in Prussia in 997. The small chapel is medieval. The spot is almost never visited and has extraordinary views across the Warta.",im:"Time-travel: St. Adalbert preaching to early Poznań settlers on this hill, 995 AD",t:"Free. Accessible from the cathedral side.",c:["history_big"],r:"g",nn:"Góra Świętego Wojciecha — Ostrów Tumski",ns:"Góra Świętego Wojciecha — gdzie misjonarz, który nawrócił Polskę, miał głosić",nst:"Wojciech głosił na tej górze przed męczeńską śmiercią w Prusach w 997 r.",nt:"Bezpłatnie. Dostępne od strony katedry."},
  {id:26,n:"Stary Rynek — Stare Miasto #26",a:"Stare Miasto",v:["history","beautiful","local"],d:45,s:"One of the largest medieval market squares in Europe — colourful townhouses and mechanical goats",st:"The Stary Rynek is Poznań\'s beating heart — a vast Renaissance square with colourful burgher houses. At noon, two metal goats emerge from the clock tower and butt heads. The square is always alive.",im:"Time-travel: the weekly grain market filling this square in the Middle Ages, merchants from all of Europe",t:"Free. Come for the goats at 12:00. Evening is magical with the lights.",c:["history_big"],r:"g",nn:"Stary Rynek — Stare Miasto #26",ns:"Jeden z największych średniowiecznych rynków w Europie — kolorowe kamienice i mechaniczne kozły",nst:"Stary Rynek to bijące serce Poznania — wielki renesansowy rynek z kolorowymi kamienicami. W południe wychodzą dwa metalowe kozły.",nt:"Bezpłatnie. Przyjdź na kozły o 12:00. Wieczór jest magiczny z oświetleniem."},
  {id:27,n:"Poznań Town Hall — Stare Miasto #27",a:"Stare Miasto",v:["history","architecture","beautiful"],d:12,s:"The Renaissance Ratusz — one of the finest civic buildings in Central Europe",st:"Poznań\'s town hall was rebuilt in Renaissance style 1550–1560 by Giovanni Battista Quadro. The arcaded loggia, the astronomical clock, the relief decorations — it is a masterpiece. Museum inside, exterior always free.",im:"Time-travel: the Ratusz being built by Italian master craftsmen in 1555",t:"Exterior free. Museum inside small fee.",c:["high_spots"],r:"g",nn:"Ratusz — Stare Miasto #27",ns:"Renesansowy Ratusz — jeden z najpiękniejszych budynków obywatelskich w Europie Środkowej",nst:"Ratusz w Poznaniu został przebudowany w stylu renesansowym 1550–1560 przez Giovanni Battista Quadro.",nt:"Zewnątrz bezpłatnie. Muzeum wewnątrz mała opłata."},
  {id:28,n:"Poznań Cathedral — Ostrów Tumski #28",a:"Ostrów Tumski",v:["history","beautiful","quiet"],d:6,s:"Poland\'s oldest cathedral on its own island — where Polish statehood began in 966",st:"The cathedral on Cathedral Island was founded in 968 by Mieszko I, the first duke of Poland. The golden chapel contains the tombs of the first Polish rulers. The island itself is the cradle of the Polish nation.",im:"Time-travel: Duke Mieszko I\'s baptism in 966 — the beginning of the Polish Christian kingdom",t:"Free to enter. Open daily.",c:["parks"],r:"g",nn:"Katedra Poznańska — Ostrów Tumski #28",ns:"Najstarsza katedra w Polsce na własnej wyspie — gdzie zaczęła się polska państwowość w 966",nst:"Katedra na Ostrowie Tumskim została założona w 968 przez Mieszka I, pierwszego księcia Polski.",nt:"Bezpłatny wstęp. Otwarte codziennie."},
  {id:29,n:"Ostrów Tumski Island — Ostrów Tumski #29",a:"Ostrów Tumski",v:["history","beautiful","quiet"],d:52,s:"Cathedral Island — the oldest part of Poland, walk its perimeter in 20 minutes",st:"Ostrów Tumski is where Poland was born. The island in the Warta river holds the cathedral, several medieval churches, and the earliest evidence of Polish civic life. Walk it slowly.",im:"Time-travel: the island fortress of early medieval Poland, 900 AD — wooden walls and the smell of fire",t:"Free to walk. The island is open at all times.",c:["courtyards"],r:"g",nn:"Ostrów Tumski — Ostrów Tumski #29",ns:"Wyspa katedralna — najstarsza część Polski, obejdź jej obwód w 20 minut",nst:"Ostrów Tumski to miejsce narodzin Polski. Wyspa na Warcie mieści katedrę i kilka średniowiecznych kościołów.",nt:"Bezpłatny spacer. Wyspa otwarta cały czas."},
  {id:30,n:"Fara Church — Stare Miasto #30",a:"Stare Miasto",v:["history","beautiful"],d:22,s:"The Jesuit Baroque church — the most spectacular interior in Poznań, free to enter",st:"The Fara is Poznań\'s most dramatic interior — an overwhelming Baroque space with gilded altars and ceiling frescoes. Founded by the Jesuits in 1651. Still in use. Always free.",im:"Time-travel: the Fara\'s interior being gilded, every surface becoming gold, 1700",t:"Free. The interior justifies any detour.",c:["romantic_water"],r:"g",nn:"Fara — Stare Miasto #30",ns:"Jezuicki kościół barokowy — najbardziej spektakularne wnętrze w Poznaniu, bezpłatny wstęp",nst:"Fara to najbardziej dramatyczne wnętrze Poznania — przytłaczająca przestrzeń barokowa ze złoconymi ołtarzami.",nt:"Bezpłatnie. Wnętrze uzasadnia każdy objazd."},
  {id:31,n:"Imperial Quarter — Stare Miasto #31",a:"Stare Miasto",v:["history","architecture","hidden"],d:20,s:"The German imperial buildings of 1900 — a city within a city built to assert Prussian power",st:"After the Partitions, Poznań was the capital of Prussian Posen. The Germans built an extraordinary monumental quarter — the castle, the opera house, the post office — all in Wilhelmine historicist style. Still intact.",im:"Time-travel: Kaiser Wilhelm II visiting his new Poznań castle in 1910, the city still German",t:"Free to walk. The Kaiser castle exterior is always accessible.",c:["scary"],r:"g",nn:"Dzielnica Cesarska — Stare Miasto #31",ns:"Niemieckie budynki imperialne z 1900 r. — miasto w mieście zbudowane dla podkreślenia pruskiej potęgi",nst:"Po rozbiorach Poznań był stolicą pruskiego Poznania. Niemcy zbudowali niezwykłą monumentalną dzielnicę.",nt:"Spacer bezpłatny. Zamek cesarski zewnątrz zawsze dostępny."},
  {id:32,n:"Cytadela Park — Wilda #32",a:"Wilda",v:["nature","history","free"],d:19,s:"Former German fortress turned free park — military cemetery, sculpture garden, woods",st:"The Cytadela was the 19th century Prussian fortress above Poznań. After WWII the German, Commonwealth and Soviet war cemeteries were installed in its grounds. A park of extraordinary memory.",im:"Time-travel: the Battle of Poznań 1945 — the last major German fortified city to fall in the East",t:"Always free. The war cemeteries are remarkable.",c:["famous_dead"],r:"g",nn:"Cytadela — Wilda #32",ns:"Dawna pruska forteca zamieniona w bezpłatny park — cmentarz wojskowy, ogród rzeźb, las",nst:"Cytadela to twierdza pruska z XIX w. Po II wojnie światowej zainstalowano tam cmentarze wojenne.",nt:"Zawsze bezpłatnie. Cmentarze wojenne są niezwykłe."},
  {id:33,n:"Palmiarnia — Wilda #33",a:"Wilda",v:["nature","beautiful","quiet"],d:13,s:"The tropical palm house in Wilson Park — jungle in the middle of Poznań",st:"Poznań\'s palm house in Wilson Park is one of the largest tropical conservatories in Poland. Inside: tropical trees, exotic plants, waterfall. The surrounding park is free.",im:"Time-travel: the palm house opening in 1910, Poznań citizens seeing tropical plants for the first time",t:"Small fee for the glasshouse interior. Wilson Park surrounding it free.",c:["street_art"],r:"g",nn:"Palmiarnia — Wilda #33",ns:"Tropikalna palmiarna w Parku Wilsona — dżungla w centrum Poznania",nst:"Palmiarnia Poznańska w Parku Wilsona jest jedną z największych tropikalnych szklarni w Polsce.",nt:"Mała opłata za szklarnię. Otaczający Park Wilsona bezpłatny."},
  {id:34,n:"Malta Lake — Wilda #34",a:"Wilda",v:["nature","local","beautiful"],d:52,s:"The city regatta lake — kayaks, sunbathers, and the miniature steam railway on its banks",st:"Malta lake is an artificial regatta course built in 1952. Now it is the free outdoor living room of Poznań. Rowing clubs, a small beach, the new thermal bath complex, and the old miniature railway.",im:"Time-travel: the Malta lake opening in 1952, the first regattas on its still water",t:"Free to walk the lake circuit (2km). The miniature railway runs in summer.",c:["abandoned"],r:"g",nn:"Jezioro Malta — Wilda #34",ns:"Jezioro regatowe — kajaki, plażowicze i miniaturowa kolej parowa na brzegach",nst:"Jezioro Malta to sztuczny tor regatowy z 1952 roku. Teraz to bezpłatny zewnętrzny salon Poznania.",nt:"Spacer wokół jeziora bezpłatny (2 km). Miniaturowa kolejka latem."},
  {id:35,n:"Śluza Katedralna — Ostrów Tumski #35",a:"Ostrów Tumski",v:["hidden","history","nature"],d:11,s:"The cathedral lock — where the river splits around the island, ancient waterway still working",st:"The Śluza controls water flow around Cathedral Island. Standing at the lock mechanism, the island of Poland\'s origins is on one side, and the modern city on the other.",im:"Time-travel: medieval boatmen navigating through the Warta channels around the cathedral island, 1400",t:"Free to view. Walk the canal banks on both sides.",c:["free_museum"],r:"g",nn:"Śluza Katedralna — Ostrów Tumski #35",ns:"Śluza katedralna — gdzie rzeka rozdziela się wokół wyspy, starożytny wodny szlak wciąż działa",nst:"Śluza kontroluje przepływ wody wokół Ostrowa Tumskiego.",nt:"Bezpłatne oglądanie. Spacer po obu brzegach kanału."},
  {id:36,n:"Śródka Medieval Market — Ostrów Tumski #36",a:"Ostrów Tumski",v:["history","local","hidden"],d:48,s:"The resurgent medieval market outside Cathedral Island — murals, craft stalls, real neighbourhood",st:"Śródka is the old suburb just outside Cathedral Island that declined for decades and is now being revived. Street art murals on every building. A weekend market. Real residents returning.",im:"Time-travel: Śródka as Poznań\'s main market before the modern city was built, 1600",t:"Free to walk. Best on Saturday for the market.",c:["local_only"],r:"g",nn:"Śródka — Ostrów Tumski #36",ns:"Rewitalizowany średniowieczny rynek poza Wyspą Katedralną — murale, kramy rzemieślnicze, prawdziwa dzielnica",nst:"Śródka to stare przedmieście tuż obok Ostrowa Tumskiego, które podupadło na dekady i jest teraz odradzane.",nt:"Bezpłatny spacer. W sobotę na targu."},
  {id:37,n:"Jeżyce Quarter — Jeżyce #37",a:"Jeżyce",v:["local","hidden","beautiful"],d:52,s:"Poznań\'s bohemian quarter — Gründerzeit apartment buildings, vintage shops, real life",st:"Jeżyce was Poznań\'s German burgher suburb in the 19th century. Now it is the most liveable neighbourhood — farmers market on Saturdays, independent cafés, beautiful pre-war buildings.",im:"Time-travel: Jeżyce as a prosperous German suburb in 1900, children playing in these same streets",t:"Saturday market on Plac Różany. Walk the streets south of Dąbrowskiego.",c:["architecture"],r:"g",nn:"Jeżyce — Jeżyce #37",ns:"Bohemska dzielnica Poznania — kamienice z epoki wilhelmińskiej, sklepy vintage, prawdziwe życie",nst:"Jeżyce było poznańskim przedmieściem mieszczańskim w XIX w. Teraz to najbardziej przyjazna dzielnica.",nt:"Sobotni targ na Placu Różanym. Spacer ulicami na południe od Dąbrowskiego."},
  {id:38,n:"Stary Browar Courtyard — Jeżyce #38",a:"Jeżyce",v:["architecture","beautiful","local"],d:39,s:"Old brewery turned cultural complex — free courtyard, galleries, and one of Poland\'s best shopping centres",st:"The old Hugger Brewery was transformed into a mixed arts and retail complex in 2003. The courtyard with contemporary art installations is free. The architecture is extraordinary.",im:"Time-travel: the brewery in operation in 1900, beer barrels rolling across this same courtyard",t:"Courtyard free. Gallery space free.",c:["history_big"],r:"g",nn:"Stary Browar — Jeżyce #38",ns:"Stary browar zamieniony w centrum kultury — bezpłatny dziedziniec, galerie i jedno z najlepszych centrów handlowych w Polsce",nst:"Stary Browar to dawny browar Huggera, przekształcony w 2003 r. w kompleks sztuki i handlu.",nt:"Dziedziniec bezpłatny. Przestrzeń galerii bezpłatna."},
  {id:39,n:"Warta Riverside Walk — Warta #39",a:"Warta",v:["nature","beautiful","quiet"],d:10,s:"The Warta river through Poznań — bank walks, herons, kayaks, the river that made the city",st:"The Warta was the reason Poznań was founded here — the river crossing point. Walking the bank from Cathedral Island south takes you through the city\'s oldest geography.",im:"Time-travel: early Slavic settlers choosing this river crossing point as their home, 800 AD",t:"Free. Walk from Cathedral Island south along the west bank.",c:["high_spots"],r:"g",nn:"Spacer wzdłuż Warty — Warta #39",ns:"Rzeka Warta przez Poznań — spacery brzegiem, czaple, kajaki, rzeka która stworzyła miasto",nst:"Warta była powodem założenia Poznania — punkt przekroczenia rzeki.",nt:"Bezpłatnie. Spacer od Ostrowa Tumskiego na południe wzdłuż zachodniego brzegu."},
  {id:40,n:"Collegium Minus — Stare Miasto #40",a:"Stare Miasto",v:["architecture","history"],d:42,s:"The main building of Adam Mickiewicz University — neoclassical entrance and open courtyard",st:"The university was founded as Poznań\'s German university in 1903 and polonized after 1918. The Collegium Minus courtyard is free to enter and gives access to the inner academic world.",im:"Time-travel: the polonization of the university in 1919 — German signage being replaced with Polish",t:"Courtyard free during working hours.",c:["parks"],r:"g",nn:"Collegium Minus — Stare Miasto #40",ns:"Główny budynek Uniwersytetu im. Adama Mickiewicza — neoklasyczne wejście i otwarty dziedziniec",nst:"Uczelnia założona jako poznański uniwersytet niemiecki w 1903 r., spolonizowana po 1918 r.",nt:"Dziedziniec bezpłatny w godzinach pracy."},
  {id:41,n:"Plac Wolności — Stare Miasto #41",a:"Stare Miasto",v:["history","architecture","local"],d:32,s:"Liberty Square — the neoclassical civic heart of 19th century Poznań",st:"Plac Wolności has the best collection of 19th century neoclassical buildings in Poznań. The Raczyński Library is on one side, the old Bazar Hotel (where Polish independence was celebrated) on another.",im:"Time-travel: the Bazar Hotel hosting the Polish independence celebrations in November 1918",t:"Free. The Raczyński Library reading room is open to the public.",c:["courtyards"],r:"g",nn:"Plac Wolności — Stare Miasto #41",ns:"Plac Wolności — neoklasyczne centrum obywatelskie XIX-wiecznego Poznania",nst:"Plac Wolności ma najlepszy zbiór neoklasycznych budynków z XIX w.",nt:"Bezpłatnie. Czytelnia Biblioteki Raczyńskich jest otwarta dla publiczności."},
  {id:42,n:"Lake Malta Sunrise — Wilda #42",a:"Wilda",v:["beautiful","quiet","nature"],d:7,s:"Malta lake at dawn — mist on the water, rowing crews training, the city not yet awake",st:"Malta lake in the early morning has the most beautiful light in Poznań. Rowing clubs train at 7am. Mist hangs on the water. The surrounding park is empty.",im:"Time-travel: Malta lake in 1953, the first rowers training on the newly opened water",t:"Come before 8am. Free.",c:["romantic_water"],r:"g",nn:"Jezioro Malta o świcie — Wilda #42",ns:"Jezioro Malta o świcie — mgła na wodzie, treningi wioślarzy, miasto jeszcze nie obudzone",nst:"Jezioro Malta wczesnym rankiem ma najpiękniejsze światło w Poznaniu.",nt:"Przyjdź przed 8. Bezpłatnie."},
  {id:43,n:"Rogalin Palace Park (day trip) — Warta #43",a:"Warta",v:["nature","history","beautiful"],d:6,s:"Baroque palace with 900-year-old oaks — the oldest trees in Poland, 30km from Poznań",st:"The Rogalin Palace garden has three ancient oaks named Lech, Czech and Rus — the mythical Slavic brothers. The largest is over 900 years old. The park is free.",im:"Time-travel: these same trees as saplings in 1100, the Slavic world still young and undivided",t:"30km south, reachable by bus. Park free.",c:["scary"],r:"g",nn:"Rogalin (wycieczka) — Warta #43",ns:"Barokowy pałac z 900-letnimi dębami — najstarsze drzewa w Polsce, 30 km od Poznania",nst:"Park pałacowy w Rogalinie ma trzy starożytne dęby Lech, Czech i Rus. Największy ma ponad 900 lat.",nt:"30 km na południe, dostępny autobusem. Park bezpłatny."},
  {id:44,n:"Archbishop\'s Palace — Ostrów Tumski #44",a:"Ostrów Tumski",v:["history","architecture"],d:10,s:"The Archbishop\'s residence on Cathedral Island — where Napoleon met Pope Pius VII in 1806",st:"Napoleon visited Cathedral Island and stayed in the Archbishop\'s Palace in 1806 during the Poznań campaign. The exterior is Baroque and impressive.",im:"Time-travel: Napoleon meeting Pope Pius VII on Cathedral Island in 1806",t:"Exterior free. Not open to the public inside.",c:["famous_dead"],r:"g",nn:"Pałac Arcybiskupi — Ostrów Tumski #44",ns:"Rezydencja arcybiskupa na Ostrowie Tumskim — gdzie Napoleon spotkał papieża Piusa VII w 1806",nst:"Napoleon odwiedził Ostrów Tumski i zatrzymał się w Pałacu Arcybiskupim w 1806 r.",nt:"Zewnątrz bezpłatny. Wewnątrz nie jest dostępne dla publiczności."},
  {id:45,n:"Plac Kolegiacki — Stare Miasto #45",a:"Stare Miasto",v:["history","quiet","hidden"],d:18,s:"The square where the old collegiate church stood — now a shadow, an empty square, a memory",st:"The Collegiate Church of St. Mary Magdalene stood here until 1802 when it was demolished by the Prussians. The square it left behind has an odd emptiness — the ghost of a large building.",im:"Time-travel: the old collegiate church filling this square in 1700, before the Prussians came",t:"Free. The ghost outline is still felt in the square\'s size.",c:["street_art"],r:"g",nn:"Plac Kolegiacki — Stare Miasto #45",ns:"Plac gdzie stał dawny kościół kolegiacki — teraz cień, pusty plac, pamięć",nst:"Kościół Kolegiacki Marii Magdaleny stał tu do 1802, kiedy Prusacy go zburzyli.",nt:"Bezpłatnie. Duch zarysu wciąż odczuwany jest w rozmiarze placu."},
  {id:46,n:"Berwiński Park — Jeżyce #46",a:"Jeżyce",v:["nature","local","quiet"],d:19,s:"The neighbourhood park of Jeżyce — old trees, chess players, the daily rhythms of a real quarter",st:"Berwiński Park is the green lung of Jeżyce — the neighbourhood that Poznań\'s creative class has adopted. Old trees, benches, chess. Nothing commercial.",im:"Time-travel: German bourgeoisie promenading in this same park on Sunday afternoons, 1905",t:"Free. Always open.",c:["abandoned"],r:"g",nn:"Park Berwiński — Jeżyce #46",ns:"Park dzielnicy Jeżyce — stare drzewa, szachiści, codzienne rytmy prawdziwej dzielnicy",nst:"Park Berwiński to zielone płuca Jeżyc — dzielnicy przyjętej przez poznańską klasę twórczą.",nt:"Bezpłatnie. Zawsze otwarte."},
  {id:47,n:"Poznań Croissant Museum (Exterior) — Stare Miasto #47",a:"Stare Miasto",v:["local","weird","history"],d:37,s:"Poznań\'s most peculiar cultural institution — dedicated entirely to the rogal świętomarciński",st:"The Croissant Museum is Poznań\'s most endearing institution. The rogal świętomarcinski is a St. Martin\'s Day croissant made only in Poznań — white poppy seeds, marzipan, icing. A protected EU product.",im:"Time-travel: the first rogale being sold on St. Martin\'s Day 1891, Poznań celebrating its patron saint",t:"Exterior free. Museum inside has entry.",c:["free_museum"],r:"g",nn:"Muzeum Rogala (Zewnątrz) — Stare Miasto #47",ns:"Najdziwniejsza instytucja kulturalna Poznania — poświęcona w całości rogalowi świętomarcińskiemu",nst:"Muzeum Rogala jest najbardziej ujmującą instytucją Poznania. Rogal świętomarcinski to chroniony produkt UE.",nt:"Zewnątrz bezpłatny. Muzeum wewnątrz z wejściem."},
  {id:48,n:"Warta Floodplain Meadows — Warta #48",a:"Warta",v:["nature","free","quiet"],d:43,s:"The Warta floodplain outside the city — migrating birds, vast sky, intact river ecology",st:"The Warta National Park floodplain begins just outside Poznań. The meadows flood seasonally and attract extraordinary numbers of migrating birds in spring and autumn. Free to walk.",im:"Time-travel: the Warta in full spring flood, the meadows underwater, white storks overhead",t:"Free. Spring and autumn are the birding seasons.",c:["local_only"],r:"g",nn:"Łąki nadwarciańskie — Warta #48",ns:"Łąki nadwarciańskie poza miastem — ptaki migrujące, rozległe niebo, nienaruszona ekologia rzeki",nst:"Warta Nadwarciańska zaczyna się tuż za Poznaniem. Łąki zalewają się sezonowo i przyciągają niezwykłe ilości ptaków.",nt:"Bezpłatnie. Wiosna i jesień to sezony ptasie."},
  {id:49,n:"Old Merchant Houses — Stare Miasto #49",a:"Stare Miasto",v:["history","architecture","beautiful"],d:6,s:"The colourful Renaissance burgher houses around Stary Rynek — each one a family\'s ambition",st:"The townhouses facing the Stary Rynek were built by competing Poznań merchant families in the 16th century. Each has its own facade colour and decorative scheme. No two are the same.",im:"Time-travel: Poznań merchants debating which colour to paint their new facade in 1560",t:"Free to view. The east side has the most elaborate facades.",c:["architecture"],r:"g",nn:"Stare kamienice — Stare Miasto #49",ns:"Kolorowe renesansowe kamienice wokół Starego Rynku — każda to ambicja jednej rodziny",nst:"Kamienice przy Starym Rynku budowały konkurujące rodziny kupieckie w XVI w. Każda ma inną fasadę.",nt:"Bezpłatny widok. Wschodnia strona ma najbardziej ozdobne fasady."},
  {id:50,n:"Góra Świętego Wojciecha — Ostrów Tumski #50",a:"Ostrów Tumski",v:["history","hidden","quiet"],d:40,s:"St. Adalbert\'s Hill — where the missionary who converted Poland is said to have preached",st:"Adalbert preached on this hill before his martyrdom in Prussia in 997. The small chapel is medieval. The spot is almost never visited and has extraordinary views across the Warta.",im:"Time-travel: St. Adalbert preaching to early Poznań settlers on this hill, 995 AD",t:"Free. Accessible from the cathedral side.",c:["history_big"],r:"g",nn:"Góra Świętego Wojciecha — Ostrów Tumski #50",ns:"Góra Świętego Wojciecha — gdzie misjonarz, który nawrócił Polskę, miał głosić",nst:"Wojciech głosił na tej górze przed męczeńską śmiercią w Prusach w 997 r.",nt:"Bezpłatnie. Dostępne od strony katedry."},
  {id:51,n:"Stary Rynek — Stare Miasto #51",a:"Stare Miasto",v:["history","beautiful","local"],d:17,s:"One of the largest medieval market squares in Europe — colourful townhouses and mechanical goats",st:"The Stary Rynek is Poznań\'s beating heart — a vast Renaissance square with colourful burgher houses. At noon, two metal goats emerge from the clock tower and butt heads. The square is always alive.",im:"Time-travel: the weekly grain market filling this square in the Middle Ages, merchants from all of Europe",t:"Free. Come for the goats at 12:00. Evening is magical with the lights.",c:["high_spots"],r:"g",nn:"Stary Rynek — Stare Miasto #51",ns:"Jeden z największych średniowiecznych rynków w Europie — kolorowe kamienice i mechaniczne kozły",nst:"Stary Rynek to bijące serce Poznania — wielki renesansowy rynek z kolorowymi kamienicami. W południe wychodzą dwa metalowe kozły.",nt:"Bezpłatnie. Przyjdź na kozły o 12:00. Wieczór jest magiczny z oświetleniem."},
  {id:52,n:"Poznań Town Hall — Stare Miasto #52",a:"Stare Miasto",v:["history","architecture","beautiful"],d:50,s:"The Renaissance Ratusz — one of the finest civic buildings in Central Europe",st:"Poznań\'s town hall was rebuilt in Renaissance style 1550–1560 by Giovanni Battista Quadro. The arcaded loggia, the astronomical clock, the relief decorations — it is a masterpiece. Museum inside, exterior always free.",im:"Time-travel: the Ratusz being built by Italian master craftsmen in 1555",t:"Exterior free. Museum inside small fee.",c:["parks"],r:"g",nn:"Ratusz — Stare Miasto #52",ns:"Renesansowy Ratusz — jeden z najpiękniejszych budynków obywatelskich w Europie Środkowej",nst:"Ratusz w Poznaniu został przebudowany w stylu renesansowym 1550–1560 przez Giovanni Battista Quadro.",nt:"Zewnątrz bezpłatnie. Muzeum wewnątrz mała opłata."},
  {id:53,n:"Poznań Cathedral — Ostrów Tumski #53",a:"Ostrów Tumski",v:["history","beautiful","quiet"],d:46,s:"Poland\'s oldest cathedral on its own island — where Polish statehood began in 966",st:"The cathedral on Cathedral Island was founded in 968 by Mieszko I, the first duke of Poland. The golden chapel contains the tombs of the first Polish rulers. The island itself is the cradle of the Polish nation.",im:"Time-travel: Duke Mieszko I\'s baptism in 966 — the beginning of the Polish Christian kingdom",t:"Free to enter. Open daily.",c:["courtyards"],r:"g",nn:"Katedra Poznańska — Ostrów Tumski #53",ns:"Najstarsza katedra w Polsce na własnej wyspie — gdzie zaczęła się polska państwowość w 966",nst:"Katedra na Ostrowie Tumskim została założona w 968 przez Mieszka I, pierwszego księcia Polski.",nt:"Bezpłatny wstęp. Otwarte codziennie."},
  {id:54,n:"Ostrów Tumski Island — Ostrów Tumski #54",a:"Ostrów Tumski",v:["history","beautiful","quiet"],d:49,s:"Cathedral Island — the oldest part of Poland, walk its perimeter in 20 minutes",st:"Ostrów Tumski is where Poland was born. The island in the Warta river holds the cathedral, several medieval churches, and the earliest evidence of Polish civic life. Walk it slowly.",im:"Time-travel: the island fortress of early medieval Poland, 900 AD — wooden walls and the smell of fire",t:"Free to walk. The island is open at all times.",c:["romantic_water"],r:"g",nn:"Ostrów Tumski — Ostrów Tumski #54",ns:"Wyspa katedralna — najstarsza część Polski, obejdź jej obwód w 20 minut",nst:"Ostrów Tumski to miejsce narodzin Polski. Wyspa na Warcie mieści katedrę i kilka średniowiecznych kościołów.",nt:"Bezpłatny spacer. Wyspa otwarta cały czas."},
  {id:55,n:"Fara Church — Stare Miasto #55",a:"Stare Miasto",v:["history","beautiful"],d:39,s:"The Jesuit Baroque church — the most spectacular interior in Poznań, free to enter",st:"The Fara is Poznań\'s most dramatic interior — an overwhelming Baroque space with gilded altars and ceiling frescoes. Founded by the Jesuits in 1651. Still in use. Always free.",im:"Time-travel: the Fara\'s interior being gilded, every surface becoming gold, 1700",t:"Free. The interior justifies any detour.",c:["scary"],r:"g",nn:"Fara — Stare Miasto #55",ns:"Jezuicki kościół barokowy — najbardziej spektakularne wnętrze w Poznaniu, bezpłatny wstęp",nst:"Fara to najbardziej dramatyczne wnętrze Poznania — przytłaczająca przestrzeń barokowa ze złoconymi ołtarzami.",nt:"Bezpłatnie. Wnętrze uzasadnia każdy objazd."},
  {id:56,n:"Imperial Quarter — Stare Miasto #56",a:"Stare Miasto",v:["history","architecture","hidden"],d:31,s:"The German imperial buildings of 1900 — a city within a city built to assert Prussian power",st:"After the Partitions, Poznań was the capital of Prussian Posen. The Germans built an extraordinary monumental quarter — the castle, the opera house, the post office — all in Wilhelmine historicist style. Still intact.",im:"Time-travel: Kaiser Wilhelm II visiting his new Poznań castle in 1910, the city still German",t:"Free to walk. The Kaiser castle exterior is always accessible.",c:["famous_dead"],r:"g",nn:"Dzielnica Cesarska — Stare Miasto #56",ns:"Niemieckie budynki imperialne z 1900 r. — miasto w mieście zbudowane dla podkreślenia pruskiej potęgi",nst:"Po rozbiorach Poznań był stolicą pruskiego Poznania. Niemcy zbudowali niezwykłą monumentalną dzielnicę.",nt:"Spacer bezpłatny. Zamek cesarski zewnątrz zawsze dostępny."},
  {id:57,n:"Cytadela Park — Wilda #57",a:"Wilda",v:["nature","history","free"],d:19,s:"Former German fortress turned free park — military cemetery, sculpture garden, woods",st:"The Cytadela was the 19th century Prussian fortress above Poznań. After WWII the German, Commonwealth and Soviet war cemeteries were installed in its grounds. A park of extraordinary memory.",im:"Time-travel: the Battle of Poznań 1945 — the last major German fortified city to fall in the East",t:"Always free. The war cemeteries are remarkable.",c:["street_art"],r:"g",nn:"Cytadela — Wilda #57",ns:"Dawna pruska forteca zamieniona w bezpłatny park — cmentarz wojskowy, ogród rzeźb, las",nst:"Cytadela to twierdza pruska z XIX w. Po II wojnie światowej zainstalowano tam cmentarze wojenne.",nt:"Zawsze bezpłatnie. Cmentarze wojenne są niezwykłe."},
  {id:58,n:"Palmiarnia — Wilda #58",a:"Wilda",v:["nature","beautiful","quiet"],d:33,s:"The tropical palm house in Wilson Park — jungle in the middle of Poznań",st:"Poznań\'s palm house in Wilson Park is one of the largest tropical conservatories in Poland. Inside: tropical trees, exotic plants, waterfall. The surrounding park is free.",im:"Time-travel: the palm house opening in 1910, Poznań citizens seeing tropical plants for the first time",t:"Small fee for the glasshouse interior. Wilson Park surrounding it free.",c:["abandoned"],r:"g",nn:"Palmiarnia — Wilda #58",ns:"Tropikalna palmiarna w Parku Wilsona — dżungla w centrum Poznania",nst:"Palmiarnia Poznańska w Parku Wilsona jest jedną z największych tropikalnych szklarni w Polsce.",nt:"Mała opłata za szklarnię. Otaczający Park Wilsona bezpłatny."},
  {id:59,n:"Malta Lake — Wilda #59",a:"Wilda",v:["nature","local","beautiful"],d:42,s:"The city regatta lake — kayaks, sunbathers, and the miniature steam railway on its banks",st:"Malta lake is an artificial regatta course built in 1952. Now it is the free outdoor living room of Poznań. Rowing clubs, a small beach, the new thermal bath complex, and the old miniature railway.",im:"Time-travel: the Malta lake opening in 1952, the first regattas on its still water",t:"Free to walk the lake circuit (2km). The miniature railway runs in summer.",c:["free_museum"],r:"g",nn:"Jezioro Malta — Wilda #59",ns:"Jezioro regatowe — kajaki, plażowicze i miniaturowa kolej parowa na brzegach",nst:"Jezioro Malta to sztuczny tor regatowy z 1952 roku. Teraz to bezpłatny zewnętrzny salon Poznania.",nt:"Spacer wokół jeziora bezpłatny (2 km). Miniaturowa kolejka latem."},
  {id:60,n:"Śluza Katedralna — Ostrów Tumski #60",a:"Ostrów Tumski",v:["hidden","history","nature"],d:22,s:"The cathedral lock — where the river splits around the island, ancient waterway still working",st:"The Śluza controls water flow around Cathedral Island. Standing at the lock mechanism, the island of Poland\'s origins is on one side, and the modern city on the other.",im:"Time-travel: medieval boatmen navigating through the Warta channels around the cathedral island, 1400",t:"Free to view. Walk the canal banks on both sides.",c:["local_only"],r:"g",nn:"Śluza Katedralna — Ostrów Tumski #60",ns:"Śluza katedralna — gdzie rzeka rozdziela się wokół wyspy, starożytny wodny szlak wciąż działa",nst:"Śluza kontroluje przepływ wody wokół Ostrowa Tumskiego.",nt:"Bezpłatne oglądanie. Spacer po obu brzegach kanału."},
  {id:61,n:"Śródka Medieval Market — Ostrów Tumski #61",a:"Ostrów Tumski",v:["history","local","hidden"],d:5,s:"The resurgent medieval market outside Cathedral Island — murals, craft stalls, real neighbourhood",st:"Śródka is the old suburb just outside Cathedral Island that declined for decades and is now being revived. Street art murals on every building. A weekend market. Real residents returning.",im:"Time-travel: Śródka as Poznań\'s main market before the modern city was built, 1600",t:"Free to walk. Best on Saturday for the market.",c:["architecture"],r:"g",nn:"Śródka — Ostrów Tumski #61",ns:"Rewitalizowany średniowieczny rynek poza Wyspą Katedralną — murale, kramy rzemieślnicze, prawdziwa dzielnica",nst:"Śródka to stare przedmieście tuż obok Ostrowa Tumskiego, które podupadło na dekady i jest teraz odradzane.",nt:"Bezpłatny spacer. W sobotę na targu."},
  {id:62,n:"Jeżyce Quarter — Jeżyce #62",a:"Jeżyce",v:["local","hidden","beautiful"],d:53,s:"Poznań\'s bohemian quarter — Gründerzeit apartment buildings, vintage shops, real life",st:"Jeżyce was Poznań\'s German burgher suburb in the 19th century. Now it is the most liveable neighbourhood — farmers market on Saturdays, independent cafés, beautiful pre-war buildings.",im:"Time-travel: Jeżyce as a prosperous German suburb in 1900, children playing in these same streets",t:"Saturday market on Plac Różany. Walk the streets south of Dąbrowskiego.",c:["history_big"],r:"g",nn:"Jeżyce — Jeżyce #62",ns:"Bohemska dzielnica Poznania — kamienice z epoki wilhelmińskiej, sklepy vintage, prawdziwe życie",nst:"Jeżyce było poznańskim przedmieściem mieszczańskim w XIX w. Teraz to najbardziej przyjazna dzielnica.",nt:"Sobotni targ na Placu Różanym. Spacer ulicami na południe od Dąbrowskiego."},
  {id:63,n:"Stary Browar Courtyard — Jeżyce #63",a:"Jeżyce",v:["architecture","beautiful","local"],d:15,s:"Old brewery turned cultural complex — free courtyard, galleries, and one of Poland\'s best shopping centres",st:"The old Hugger Brewery was transformed into a mixed arts and retail complex in 2003. The courtyard with contemporary art installations is free. The architecture is extraordinary.",im:"Time-travel: the brewery in operation in 1900, beer barrels rolling across this same courtyard",t:"Courtyard free. Gallery space free.",c:["high_spots"],r:"g",nn:"Stary Browar — Jeżyce #63",ns:"Stary browar zamieniony w centrum kultury — bezpłatny dziedziniec, galerie i jedno z najlepszych centrów handlowych w Polsce",nst:"Stary Browar to dawny browar Huggera, przekształcony w 2003 r. w kompleks sztuki i handlu.",nt:"Dziedziniec bezpłatny. Przestrzeń galerii bezpłatna."},
  {id:64,n:"Warta Riverside Walk — Warta #64",a:"Warta",v:["nature","beautiful","quiet"],d:49,s:"The Warta river through Poznań — bank walks, herons, kayaks, the river that made the city",st:"The Warta was the reason Poznań was founded here — the river crossing point. Walking the bank from Cathedral Island south takes you through the city\'s oldest geography.",im:"Time-travel: early Slavic settlers choosing this river crossing point as their home, 800 AD",t:"Free. Walk from Cathedral Island south along the west bank.",c:["parks"],r:"g",nn:"Spacer wzdłuż Warty — Warta #64",ns:"Rzeka Warta przez Poznań — spacery brzegiem, czaple, kajaki, rzeka która stworzyła miasto",nst:"Warta była powodem założenia Poznania — punkt przekroczenia rzeki.",nt:"Bezpłatnie. Spacer od Ostrowa Tumskiego na południe wzdłuż zachodniego brzegu."},
  {id:65,n:"Collegium Minus — Stare Miasto #65",a:"Stare Miasto",v:["architecture","history"],d:32,s:"The main building of Adam Mickiewicz University — neoclassical entrance and open courtyard",st:"The university was founded as Poznań\'s German university in 1903 and polonized after 1918. The Collegium Minus courtyard is free to enter and gives access to the inner academic world.",im:"Time-travel: the polonization of the university in 1919 — German signage being replaced with Polish",t:"Courtyard free during working hours.",c:["courtyards"],r:"g",nn:"Collegium Minus — Stare Miasto #65",ns:"Główny budynek Uniwersytetu im. Adama Mickiewicza — neoklasyczne wejście i otwarty dziedziniec",nst:"Uczelnia założona jako poznański uniwersytet niemiecki w 1903 r., spolonizowana po 1918 r.",nt:"Dziedziniec bezpłatny w godzinach pracy."},
  {id:66,n:"Plac Wolności — Stare Miasto #66",a:"Stare Miasto",v:["history","architecture","local"],d:26,s:"Liberty Square — the neoclassical civic heart of 19th century Poznań",st:"Plac Wolności has the best collection of 19th century neoclassical buildings in Poznań. The Raczyński Library is on one side, the old Bazar Hotel (where Polish independence was celebrated) on another.",im:"Time-travel: the Bazar Hotel hosting the Polish independence celebrations in November 1918",t:"Free. The Raczyński Library reading room is open to the public.",c:["romantic_water"],r:"g",nn:"Plac Wolności — Stare Miasto #66",ns:"Plac Wolności — neoklasyczne centrum obywatelskie XIX-wiecznego Poznania",nst:"Plac Wolności ma najlepszy zbiór neoklasycznych budynków z XIX w.",nt:"Bezpłatnie. Czytelnia Biblioteki Raczyńskich jest otwarta dla publiczności."},
  {id:67,n:"Lake Malta Sunrise — Wilda #67",a:"Wilda",v:["beautiful","quiet","nature"],d:22,s:"Malta lake at dawn — mist on the water, rowing crews training, the city not yet awake",st:"Malta lake in the early morning has the most beautiful light in Poznań. Rowing clubs train at 7am. Mist hangs on the water. The surrounding park is empty.",im:"Time-travel: Malta lake in 1953, the first rowers training on the newly opened water",t:"Come before 8am. Free.",c:["scary"],r:"g",nn:"Jezioro Malta o świcie — Wilda #67",ns:"Jezioro Malta o świcie — mgła na wodzie, treningi wioślarzy, miasto jeszcze nie obudzone",nst:"Jezioro Malta wczesnym rankiem ma najpiękniejsze światło w Poznaniu.",nt:"Przyjdź przed 8. Bezpłatnie."},
  {id:68,n:"Rogalin Palace Park (day trip) — Warta #68",a:"Warta",v:["nature","history","beautiful"],d:14,s:"Baroque palace with 900-year-old oaks — the oldest trees in Poland, 30km from Poznań",st:"The Rogalin Palace garden has three ancient oaks named Lech, Czech and Rus — the mythical Slavic brothers. The largest is over 900 years old. The park is free.",im:"Time-travel: these same trees as saplings in 1100, the Slavic world still young and undivided",t:"30km south, reachable by bus. Park free.",c:["famous_dead"],r:"g",nn:"Rogalin (wycieczka) — Warta #68",ns:"Barokowy pałac z 900-letnimi dębami — najstarsze drzewa w Polsce, 30 km od Poznania",nst:"Park pałacowy w Rogalinie ma trzy starożytne dęby Lech, Czech i Rus. Największy ma ponad 900 lat.",nt:"30 km na południe, dostępny autobusem. Park bezpłatny."},
  {id:69,n:"Archbishop\'s Palace — Ostrów Tumski #69",a:"Ostrów Tumski",v:["history","architecture"],d:18,s:"The Archbishop\'s residence on Cathedral Island — where Napoleon met Pope Pius VII in 1806",st:"Napoleon visited Cathedral Island and stayed in the Archbishop\'s Palace in 1806 during the Poznań campaign. The exterior is Baroque and impressive.",im:"Time-travel: Napoleon meeting Pope Pius VII on Cathedral Island in 1806",t:"Exterior free. Not open to the public inside.",c:["street_art"],r:"g",nn:"Pałac Arcybiskupi — Ostrów Tumski #69",ns:"Rezydencja arcybiskupa na Ostrowie Tumskim — gdzie Napoleon spotkał papieża Piusa VII w 1806",nst:"Napoleon odwiedził Ostrów Tumski i zatrzymał się w Pałacu Arcybiskupim w 1806 r.",nt:"Zewnątrz bezpłatny. Wewnątrz nie jest dostępne dla publiczności."},
  {id:70,n:"Plac Kolegiacki — Stare Miasto #70",a:"Stare Miasto",v:["history","quiet","hidden"],d:53,s:"The square where the old collegiate church stood — now a shadow, an empty square, a memory",st:"The Collegiate Church of St. Mary Magdalene stood here until 1802 when it was demolished by the Prussians. The square it left behind has an odd emptiness — the ghost of a large building.",im:"Time-travel: the old collegiate church filling this square in 1700, before the Prussians came",t:"Free. The ghost outline is still felt in the square\'s size.",c:["abandoned"],r:"g",nn:"Plac Kolegiacki — Stare Miasto #70",ns:"Plac gdzie stał dawny kościół kolegiacki — teraz cień, pusty plac, pamięć",nst:"Kościół Kolegiacki Marii Magdaleny stał tu do 1802, kiedy Prusacy go zburzyli.",nt:"Bezpłatnie. Duch zarysu wciąż odczuwany jest w rozmiarze placu."},
  {id:71,n:"Berwiński Park — Jeżyce #71",a:"Jeżyce",v:["nature","local","quiet"],d:26,s:"The neighbourhood park of Jeżyce — old trees, chess players, the daily rhythms of a real quarter",st:"Berwiński Park is the green lung of Jeżyce — the neighbourhood that Poznań\'s creative class has adopted. Old trees, benches, chess. Nothing commercial.",im:"Time-travel: German bourgeoisie promenading in this same park on Sunday afternoons, 1905",t:"Free. Always open.",c:["free_museum"],r:"g",nn:"Park Berwiński — Jeżyce #71",ns:"Park dzielnicy Jeżyce — stare drzewa, szachiści, codzienne rytmy prawdziwej dzielnicy",nst:"Park Berwiński to zielone płuca Jeżyc — dzielnicy przyjętej przez poznańską klasę twórczą.",nt:"Bezpłatnie. Zawsze otwarte."},
  {id:72,n:"Poznań Croissant Museum (Exterior) — Stare Miasto #72",a:"Stare Miasto",v:["local","weird","history"],d:11,s:"Poznań\'s most peculiar cultural institution — dedicated entirely to the rogal świętomarciński",st:"The Croissant Museum is Poznań\'s most endearing institution. The rogal świętomarcinski is a St. Martin\'s Day croissant made only in Poznań — white poppy seeds, marzipan, icing. A protected EU product.",im:"Time-travel: the first rogale being sold on St. Martin\'s Day 1891, Poznań celebrating its patron saint",t:"Exterior free. Museum inside has entry.",c:["local_only"],r:"g",nn:"Muzeum Rogala (Zewnątrz) — Stare Miasto #72",ns:"Najdziwniejsza instytucja kulturalna Poznania — poświęcona w całości rogalowi świętomarcińskiemu",nst:"Muzeum Rogala jest najbardziej ujmującą instytucją Poznania. Rogal świętomarcinski to chroniony produkt UE.",nt:"Zewnątrz bezpłatny. Muzeum wewnątrz z wejściem."},
  {id:73,n:"Warta Floodplain Meadows — Warta #73",a:"Warta",v:["nature","free","quiet"],d:10,s:"The Warta floodplain outside the city — migrating birds, vast sky, intact river ecology",st:"The Warta National Park floodplain begins just outside Poznań. The meadows flood seasonally and attract extraordinary numbers of migrating birds in spring and autumn. Free to walk.",im:"Time-travel: the Warta in full spring flood, the meadows underwater, white storks overhead",t:"Free. Spring and autumn are the birding seasons.",c:["architecture"],r:"g",nn:"Łąki nadwarciańskie — Warta #73",ns:"Łąki nadwarciańskie poza miastem — ptaki migrujące, rozległe niebo, nienaruszona ekologia rzeki",nst:"Warta Nadwarciańska zaczyna się tuż za Poznaniem. Łąki zalewają się sezonowo i przyciągają niezwykłe ilości ptaków.",nt:"Bezpłatnie. Wiosna i jesień to sezony ptasie."},
  {id:74,n:"Old Merchant Houses — Stare Miasto #74",a:"Stare Miasto",v:["history","architecture","beautiful"],d:29,s:"The colourful Renaissance burgher houses around Stary Rynek — each one a family\'s ambition",st:"The townhouses facing the Stary Rynek were built by competing Poznań merchant families in the 16th century. Each has its own facade colour and decorative scheme. No two are the same.",im:"Time-travel: Poznań merchants debating which colour to paint their new facade in 1560",t:"Free to view. The east side has the most elaborate facades.",c:["history_big"],r:"g",nn:"Stare kamienice — Stare Miasto #74",ns:"Kolorowe renesansowe kamienice wokół Starego Rynku — każda to ambicja jednej rodziny",nst:"Kamienice przy Starym Rynku budowały konkurujące rodziny kupieckie w XVI w. Każda ma inną fasadę.",nt:"Bezpłatny widok. Wschodnia strona ma najbardziej ozdobne fasady."},
  {id:75,n:"Góra Świętego Wojciecha — Ostrów Tumski #75",a:"Ostrów Tumski",v:["history","hidden","quiet"],d:11,s:"St. Adalbert\'s Hill — where the missionary who converted Poland is said to have preached",st:"Adalbert preached on this hill before his martyrdom in Prussia in 997. The small chapel is medieval. The spot is almost never visited and has extraordinary views across the Warta.",im:"Time-travel: St. Adalbert preaching to early Poznań settlers on this hill, 995 AD",t:"Free. Accessible from the cathedral side.",c:["high_spots"],r:"g",nn:"Góra Świętego Wojciecha — Ostrów Tumski #75",ns:"Góra Świętego Wojciecha — gdzie misjonarz, który nawrócił Polskę, miał głosić",nst:"Wojciech głosił na tej górze przed męczeńską śmiercią w Prusach w 997 r.",nt:"Bezpłatnie. Dostępne od strony katedry."},
  {id:76,n:"Stary Rynek — Stare Miasto #76",a:"Stare Miasto",v:["history","beautiful","local"],d:27,s:"One of the largest medieval market squares in Europe — colourful townhouses and mechanical goats",st:"The Stary Rynek is Poznań\'s beating heart — a vast Renaissance square with colourful burgher houses. At noon, two metal goats emerge from the clock tower and butt heads. The square is always alive.",im:"Time-travel: the weekly grain market filling this square in the Middle Ages, merchants from all of Europe",t:"Free. Come for the goats at 12:00. Evening is magical with the lights.",c:["parks"],r:"g",nn:"Stary Rynek — Stare Miasto #76",ns:"Jeden z największych średniowiecznych rynków w Europie — kolorowe kamienice i mechaniczne kozły",nst:"Stary Rynek to bijące serce Poznania — wielki renesansowy rynek z kolorowymi kamienicami. W południe wychodzą dwa metalowe kozły.",nt:"Bezpłatnie. Przyjdź na kozły o 12:00. Wieczór jest magiczny z oświetleniem."},
  {id:77,n:"Poznań Town Hall — Stare Miasto #77",a:"Stare Miasto",v:["history","architecture","beautiful"],d:27,s:"The Renaissance Ratusz — one of the finest civic buildings in Central Europe",st:"Poznań\'s town hall was rebuilt in Renaissance style 1550–1560 by Giovanni Battista Quadro. The arcaded loggia, the astronomical clock, the relief decorations — it is a masterpiece. Museum inside, exterior always free.",im:"Time-travel: the Ratusz being built by Italian master craftsmen in 1555",t:"Exterior free. Museum inside small fee.",c:["courtyards"],r:"g",nn:"Ratusz — Stare Miasto #77",ns:"Renesansowy Ratusz — jeden z najpiękniejszych budynków obywatelskich w Europie Środkowej",nst:"Ratusz w Poznaniu został przebudowany w stylu renesansowym 1550–1560 przez Giovanni Battista Quadro.",nt:"Zewnątrz bezpłatnie. Muzeum wewnątrz mała opłata."},
  {id:78,n:"Poznań Cathedral — Ostrów Tumski #78",a:"Ostrów Tumski",v:["history","beautiful","quiet"],d:43,s:"Poland\'s oldest cathedral on its own island — where Polish statehood began in 966",st:"The cathedral on Cathedral Island was founded in 968 by Mieszko I, the first duke of Poland. The golden chapel contains the tombs of the first Polish rulers. The island itself is the cradle of the Polish nation.",im:"Time-travel: Duke Mieszko I\'s baptism in 966 — the beginning of the Polish Christian kingdom",t:"Free to enter. Open daily.",c:["romantic_water"],r:"g",nn:"Katedra Poznańska — Ostrów Tumski #78",ns:"Najstarsza katedra w Polsce na własnej wyspie — gdzie zaczęła się polska państwowość w 966",nst:"Katedra na Ostrowie Tumskim została założona w 968 przez Mieszka I, pierwszego księcia Polski.",nt:"Bezpłatny wstęp. Otwarte codziennie."},
  {id:79,n:"Ostrów Tumski Island — Ostrów Tumski #79",a:"Ostrów Tumski",v:["history","beautiful","quiet"],d:21,s:"Cathedral Island — the oldest part of Poland, walk its perimeter in 20 minutes",st:"Ostrów Tumski is where Poland was born. The island in the Warta river holds the cathedral, several medieval churches, and the earliest evidence of Polish civic life. Walk it slowly.",im:"Time-travel: the island fortress of early medieval Poland, 900 AD — wooden walls and the smell of fire",t:"Free to walk. The island is open at all times.",c:["scary"],r:"g",nn:"Ostrów Tumski — Ostrów Tumski #79",ns:"Wyspa katedralna — najstarsza część Polski, obejdź jej obwód w 20 minut",nst:"Ostrów Tumski to miejsce narodzin Polski. Wyspa na Warcie mieści katedrę i kilka średniowiecznych kościołów.",nt:"Bezpłatny spacer. Wyspa otwarta cały czas."},
  {id:80,n:"Fara Church — Stare Miasto #80",a:"Stare Miasto",v:["history","beautiful"],d:7,s:"The Jesuit Baroque church — the most spectacular interior in Poznań, free to enter",st:"The Fara is Poznań\'s most dramatic interior — an overwhelming Baroque space with gilded altars and ceiling frescoes. Founded by the Jesuits in 1651. Still in use. Always free.",im:"Time-travel: the Fara\'s interior being gilded, every surface becoming gold, 1700",t:"Free. The interior justifies any detour.",c:["famous_dead"],r:"g",nn:"Fara — Stare Miasto #80",ns:"Jezuicki kościół barokowy — najbardziej spektakularne wnętrze w Poznaniu, bezpłatny wstęp",nst:"Fara to najbardziej dramatyczne wnętrze Poznania — przytłaczająca przestrzeń barokowa ze złoconymi ołtarzami.",nt:"Bezpłatnie. Wnętrze uzasadnia każdy objazd."},
  {id:81,n:"Imperial Quarter — Stare Miasto #81",a:"Stare Miasto",v:["history","architecture","hidden"],d:51,s:"The German imperial buildings of 1900 — a city within a city built to assert Prussian power",st:"After the Partitions, Poznań was the capital of Prussian Posen. The Germans built an extraordinary monumental quarter — the castle, the opera house, the post office — all in Wilhelmine historicist style. Still intact.",im:"Time-travel: Kaiser Wilhelm II visiting his new Poznań castle in 1910, the city still German",t:"Free to walk. The Kaiser castle exterior is always accessible.",c:["street_art"],r:"g",nn:"Dzielnica Cesarska — Stare Miasto #81",ns:"Niemieckie budynki imperialne z 1900 r. — miasto w mieście zbudowane dla podkreślenia pruskiej potęgi",nst:"Po rozbiorach Poznań był stolicą pruskiego Poznania. Niemcy zbudowali niezwykłą monumentalną dzielnicę.",nt:"Spacer bezpłatny. Zamek cesarski zewnątrz zawsze dostępny."},
  {id:82,n:"Cytadela Park — Wilda #82",a:"Wilda",v:["nature","history","free"],d:34,s:"Former German fortress turned free park — military cemetery, sculpture garden, woods",st:"The Cytadela was the 19th century Prussian fortress above Poznań. After WWII the German, Commonwealth and Soviet war cemeteries were installed in its grounds. A park of extraordinary memory.",im:"Time-travel: the Battle of Poznań 1945 — the last major German fortified city to fall in the East",t:"Always free. The war cemeteries are remarkable.",c:["abandoned"],r:"g",nn:"Cytadela — Wilda #82",ns:"Dawna pruska forteca zamieniona w bezpłatny park — cmentarz wojskowy, ogród rzeźb, las",nst:"Cytadela to twierdza pruska z XIX w. Po II wojnie światowej zainstalowano tam cmentarze wojenne.",nt:"Zawsze bezpłatnie. Cmentarze wojenne są niezwykłe."},
  {id:83,n:"Palmiarnia — Wilda #83",a:"Wilda",v:["nature","beautiful","quiet"],d:39,s:"The tropical palm house in Wilson Park — jungle in the middle of Poznań",st:"Poznań\'s palm house in Wilson Park is one of the largest tropical conservatories in Poland. Inside: tropical trees, exotic plants, waterfall. The surrounding park is free.",im:"Time-travel: the palm house opening in 1910, Poznań citizens seeing tropical plants for the first time",t:"Small fee for the glasshouse interior. Wilson Park surrounding it free.",c:["free_museum"],r:"g",nn:"Palmiarnia — Wilda #83",ns:"Tropikalna palmiarna w Parku Wilsona — dżungla w centrum Poznania",nst:"Palmiarnia Poznańska w Parku Wilsona jest jedną z największych tropikalnych szklarni w Polsce.",nt:"Mała opłata za szklarnię. Otaczający Park Wilsona bezpłatny."},
  {id:84,n:"Malta Lake — Wilda #84",a:"Wilda",v:["nature","local","beautiful"],d:12,s:"The city regatta lake — kayaks, sunbathers, and the miniature steam railway on its banks",st:"Malta lake is an artificial regatta course built in 1952. Now it is the free outdoor living room of Poznań. Rowing clubs, a small beach, the new thermal bath complex, and the old miniature railway.",im:"Time-travel: the Malta lake opening in 1952, the first regattas on its still water",t:"Free to walk the lake circuit (2km). The miniature railway runs in summer.",c:["local_only"],r:"g",nn:"Jezioro Malta — Wilda #84",ns:"Jezioro regatowe — kajaki, plażowicze i miniaturowa kolej parowa na brzegach",nst:"Jezioro Malta to sztuczny tor regatowy z 1952 roku. Teraz to bezpłatny zewnętrzny salon Poznania.",nt:"Spacer wokół jeziora bezpłatny (2 km). Miniaturowa kolejka latem."},
  {id:85,n:"Śluza Katedralna — Ostrów Tumski #85",a:"Ostrów Tumski",v:["hidden","history","nature"],d:29,s:"The cathedral lock — where the river splits around the island, ancient waterway still working",st:"The Śluza controls water flow around Cathedral Island. Standing at the lock mechanism, the island of Poland\'s origins is on one side, and the modern city on the other.",im:"Time-travel: medieval boatmen navigating through the Warta channels around the cathedral island, 1400",t:"Free to view. Walk the canal banks on both sides.",c:["architecture"],r:"g",nn:"Śluza Katedralna — Ostrów Tumski #85",ns:"Śluza katedralna — gdzie rzeka rozdziela się wokół wyspy, starożytny wodny szlak wciąż działa",nst:"Śluza kontroluje przepływ wody wokół Ostrowa Tumskiego.",nt:"Bezpłatne oglądanie. Spacer po obu brzegach kanału."},
  {id:86,n:"Śródka Medieval Market — Ostrów Tumski #86",a:"Ostrów Tumski",v:["history","local","hidden"],d:10,s:"The resurgent medieval market outside Cathedral Island — murals, craft stalls, real neighbourhood",st:"Śródka is the old suburb just outside Cathedral Island that declined for decades and is now being revived. Street art murals on every building. A weekend market. Real residents returning.",im:"Time-travel: Śródka as Poznań\'s main market before the modern city was built, 1600",t:"Free to walk. Best on Saturday for the market.",c:["history_big"],r:"g",nn:"Śródka — Ostrów Tumski #86",ns:"Rewitalizowany średniowieczny rynek poza Wyspą Katedralną — murale, kramy rzemieślnicze, prawdziwa dzielnica",nst:"Śródka to stare przedmieście tuż obok Ostrowa Tumskiego, które podupadło na dekady i jest teraz odradzane.",nt:"Bezpłatny spacer. W sobotę na targu."},
  {id:87,n:"Jeżyce Quarter — Jeżyce #87",a:"Jeżyce",v:["local","hidden","beautiful"],d:40,s:"Poznań\'s bohemian quarter — Gründerzeit apartment buildings, vintage shops, real life",st:"Jeżyce was Poznań\'s German burgher suburb in the 19th century. Now it is the most liveable neighbourhood — farmers market on Saturdays, independent cafés, beautiful pre-war buildings.",im:"Time-travel: Jeżyce as a prosperous German suburb in 1900, children playing in these same streets",t:"Saturday market on Plac Różany. Walk the streets south of Dąbrowskiego.",c:["high_spots"],r:"g",nn:"Jeżyce — Jeżyce #87",ns:"Bohemska dzielnica Poznania — kamienice z epoki wilhelmińskiej, sklepy vintage, prawdziwe życie",nst:"Jeżyce było poznańskim przedmieściem mieszczańskim w XIX w. Teraz to najbardziej przyjazna dzielnica.",nt:"Sobotni targ na Placu Różanym. Spacer ulicami na południe od Dąbrowskiego."},
  {id:88,n:"Stary Browar Courtyard — Jeżyce #88",a:"Jeżyce",v:["architecture","beautiful","local"],d:23,s:"Old brewery turned cultural complex — free courtyard, galleries, and one of Poland\'s best shopping centres",st:"The old Hugger Brewery was transformed into a mixed arts and retail complex in 2003. The courtyard with contemporary art installations is free. The architecture is extraordinary.",im:"Time-travel: the brewery in operation in 1900, beer barrels rolling across this same courtyard",t:"Courtyard free. Gallery space free.",c:["parks"],r:"g",nn:"Stary Browar — Jeżyce #88",ns:"Stary browar zamieniony w centrum kultury — bezpłatny dziedziniec, galerie i jedno z najlepszych centrów handlowych w Polsce",nst:"Stary Browar to dawny browar Huggera, przekształcony w 2003 r. w kompleks sztuki i handlu.",nt:"Dziedziniec bezpłatny. Przestrzeń galerii bezpłatna."},
  {id:89,n:"Warta Riverside Walk — Warta #89",a:"Warta",v:["nature","beautiful","quiet"],d:45,s:"The Warta river through Poznań — bank walks, herons, kayaks, the river that made the city",st:"The Warta was the reason Poznań was founded here — the river crossing point. Walking the bank from Cathedral Island south takes you through the city\'s oldest geography.",im:"Time-travel: early Slavic settlers choosing this river crossing point as their home, 800 AD",t:"Free. Walk from Cathedral Island south along the west bank.",c:["courtyards"],r:"g",nn:"Spacer wzdłuż Warty — Warta #89",ns:"Rzeka Warta przez Poznań — spacery brzegiem, czaple, kajaki, rzeka która stworzyła miasto",nst:"Warta była powodem założenia Poznania — punkt przekroczenia rzeki.",nt:"Bezpłatnie. Spacer od Ostrowa Tumskiego na południe wzdłuż zachodniego brzegu."},
  {id:90,n:"Collegium Minus — Stare Miasto #90",a:"Stare Miasto",v:["architecture","history"],d:44,s:"The main building of Adam Mickiewicz University — neoclassical entrance and open courtyard",st:"The university was founded as Poznań\'s German university in 1903 and polonized after 1918. The Collegium Minus courtyard is free to enter and gives access to the inner academic world.",im:"Time-travel: the polonization of the university in 1919 — German signage being replaced with Polish",t:"Courtyard free during working hours.",c:["romantic_water"],r:"g",nn:"Collegium Minus — Stare Miasto #90",ns:"Główny budynek Uniwersytetu im. Adama Mickiewicza — neoklasyczne wejście i otwarty dziedziniec",nst:"Uczelnia założona jako poznański uniwersytet niemiecki w 1903 r., spolonizowana po 1918 r.",nt:"Dziedziniec bezpłatny w godzinach pracy."},
