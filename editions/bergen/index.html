  {id:102,n:"Damsgård Secret Garden — Damsgård",a:"Damsgård",v:["hidden", "night", "free"],d:102,s:"History lives in these streets.",st:"The Damsgård is where locals come to escape. To think. To live actual lives away from the spectacle. It\'s unfiltered and genuine.",im:"It\'s blue hour—after sunset, before night. The sky glows. Buildings glow. Everything feels possible.",t:"The Damsgård is where locals come to escape. To think. To live actual lives away from the spectacle. It\'s unfiltered and genuine.\",im:\"It\'s blue hour—after sunset, before night. The sky glows. Buildings glow. Everything feels possible.\",t:\"Go slow. Rush and you\'ll miss everything.",c:["courtyards", "parks", "abandoned"],r:"y",nn:"Bergen",ns:"Fjordenes gateway til trollenes rike.",nst:"Bergen er et pittoresk kyststed omgitt av fjorder og snøtopper. Bryggen er et frysende område av fargerike trehus som forteller om hanseatiske handelsmenn. Regnet daler hyppig, men det gir byen en drømmekvalitet. Her møtes vikingarv og moderne liv i harmoni.",nt:"Besøk Bryggen for tradisjonell arkitektur. Ta Fløibanen opp for utsikt. Fisk og sjømat er hele økonomien. Regnet er vedvarende—ta med paraply. Hiking er populært året rundt. Bergensere er varmhjertet og samtaleklar. Fjorden kalles \'Norges sjøl\'."},

  {id:106,n:"Fløyen Mountain Hike & Views",a:"City Center",v:["nature","beautiful","free"],d:25,s:"Cable car or hike to panoramic overlook of Bergen\'s harbor and islands",st:"Fløyen is a modest mountain with a funicular (paid) or a 20-minute hike for free. The summit offers 360° views of Bergen\'s harbor, surrounding fjords, and islands. Locals bring picnics and sunset wine.",im:"Time-travel: Bergen was a Hanseatic League trading city; Fløyen watched ships arrive for centuries.",t:"Free hike. Cable car: paid (€8-10). Trails are well-marked.",c:["high_spots","nature"],r:"g",nn:"Fløyen Fjelltur",ns:"Teleférico o senderismo — vistas del puerto y fjords",nst:"Sube el montaña para vistas del puerto de Bergen.",nt:"Sendero gratis. Funicular pagado €8-10."},
  {id:107,n:"Bryggen Alley Exploration",a:"Waterfront",v:["history","beautiful","architecture"],d:12,s:"UNESCO wooden merchant houses in iconic alleyways — a living trading post",st:"Bryggen is the UNESCO Old Harbor where Hanseatic merchants traded. Narrow alleys between colorful wooden houses echo 500+ years of commerce. The houses lean together at odd angles; each alley opens to different harbor views.",im:"Time-travel: Bryggen was established in the 1360s; fires destroyed it repeatedly but merchants rebuilt identically.",t:"Free to walk. Paid museums inside some buildings.",c:["architecture","history_big"],r:"g",nn:"Bryggens Gater",ns:"Casas de madera UNESCO — callejones de comerciantes",nst:"Camina entre las casas medievales del puerto.",nt:"Gratis paseos. Museos pagados en algunos edificios."}

,{id:117,n:"Free Canoeing at Lake Skomakerdiket",a:"Fløyen",v:["hidden"],d:20,s:"Paddle a free canoe on a mountain lake—pure Bergen magic!",st:"Nestled high on Fløyen, Skomakerdiket whispers adventure as you slip into a canoe with nothing but mist and mountains around. Locals share this summer secret for epic dates or solo drifts. Feel the fjord city's wild heart beating just a hike away.",im:"Imagine gliding silently across glassy waters, fjords unfolding below, with only the splash of your paddle breaking the silence.",t:"Short walk from Fløyen funicular top station; free canoe + lifejacket in summer (check Visit Bergen for dates); best on calm weekdays.",c:["parks"],r:"g",nn:"Gratis kano på Skomakerdiket",ns:"Padle gratis kano på fjellssjø—ren Bergen magi!",nst:"Opppe på Fløyen hvisker Skomakerdiket eventyr når du glir inn i kanoen med bare tåke og fjell rundt. Lokale deler denne sommerhemmeligheten for episk date eller solo-drift. Føl det ville hjertet i fjordbyen banke like ved.",nt:"Kort spasertur fra Fløyen funikular toppstasjon; gratis kano + redningsvest om sommeren (sjekk Visit Bergen for datoer); best på rolige hverdager."},
{id:118,n:"Vidden Ridge Hike",a:"Fløyen",v:["hidden"],d:20,s:"Epic ridge traverse from Fløyen to Ulriken—wild views for free!",st:"Step off Fløyen into the vast Vidden plateau, where heather moors stretch endlessly under big skies. This 4-5 hour classic feels like escaping to the wilderness, yet starts right from town. Locals swear it's Bergen's best free thrill.",im:"Picture striding a treeless ridge, Bergen’s fjords glittering far below like a Viking saga come alive.",t:"Start at Fløyen top; 4-5 hrs one-way to Ulriken (bus/cable back); free, year-round but summer best; pack water/snacks.",c:["parks"],r:"g",nn:"Vidden-ryggtur",ns:"Episk ryggtraverse fra Fløyen til Ulriken—ville utsikter gratis!",nst:"Trå ut fra Fløyen inn på det vide Vidden-platået, der lynghei strekker seg endeløst under store himler. Denne 4-5 timers klassikeren føles som flukt til villmarken, men starter rett fra byen. Lokale sverger det er Bergens beste gratis spenning.",nt:"Start på Fløyen topp; 4-5 t én vei til Ulriken (buss/heis tilbake); gratis, hele året men sommer best; pakk vann/mat."},
{id:119,n:"Løvstien Walkway",a:"Løvstakken",v:["hidden"],d:20,s:"Secret hillside path with valley vistas—local's new fave!",st:"Wander the fresh Løvstien trail linking Løvstakken and Ulriken, where wildflowers frame sweeping valley views. It's Bergen's under-the-radar gem, buzzing with curious explorers dodging the crowds. Pure slow-travel bliss on a rainy day.",im:"Envision meandering a lush hillside bridge, wind whispering through trees as Bergen's patchwork below glows golden.",t:"Bus to Løvstakken trailhead; free elevated walkway; anytime, dawn for solitude; sturdy shoes for sections.",c:["parks"],r:"g",nn:"Løvstien sti og broer",ns:"Hemmelig li-sti med dalutsikter—lokalens nye favoritt!",nst:"Vandre den nye Løvstien-stien som knytter Løvstakken og Ulriken, der ville blomster rammer inn svepende dalutsikter. Det er Bergens underradar-perle, summende av nysgjerrige oppdagere som unngår folkemengder. Ren slow-travel-lykke på regnværsdag.",nt:"Buss til Løvstakken sti-start; gratis hevet sti; når som helst, daggry for ensomhet; solide sko til partier."},
{id:120,n:"Fyllingsdalen Pedestrian Tunnel",a:"Fyllingsdalen",v:["hidden"],d:20,s:"World's longest bike/pedestrian tunnel—rainy-day weirdness!",st:"Cycle or stroll the glowing 3km Fyllingsdalen tunnel, a 2023 marvel lit like a sci-fi dream under the city. Locals geek out over its endless curves and acoustics—perfect Bergen quirk for wet weather warriors. Echoes of adventure bounce forever.",im:"Feel the hum of lights in the vast underground vein, your footsteps echoing like a secret subterranean party.",t:"Light rail to Fyllingsdalen; free entry; lit 24/7; great anytime, esp rain; bike rental nearby if needed.",c:["parks"],r:"g",nn:"Fyllingsdalen gang-/sykkeltunnel",ns:"Verdens lengste sykkel-/gangtunnel—regnværsraritet!",nst:"Sykle eller strolle den glødende 3 km Fyllingsdalen-tunnelen, et 2023-marvel lysende som sci-fi-drøm under byen. Lokale geek-er ut over endeløse kurver og akustikk—perfekt Bergen-quirk for våte værkrigere. Eventyrets ekko hopper evig.",nt:"Bybane til Fyllingsdalen; gratis inngang; opplyst 24/7; flott når som helst, esp regn; sykkelutleie i nærheten."},
{id:121,n:"University Museum Garden",a:"Sentrum",v:["hidden"],d:20,s:"Tiny botanical secret garden—quiet oasis amid buzz!",st:"Duck into Muséhagen's compact wonderland of themed beds, arboretum nooks, and watery whispers near the uni. It's Bergen's hushed green escape, where rare plants tell tales of far lands. Ideal for pondering life's little mysteries.",im:"Sink into a mossy bench, surrounded by exotic blooms swaying gently, city's hum fading to birdsong.",t:"Near Bergen University, Muséplassen; free always; best spring/summer mornings; central walkable.",c:["parks"],r:"g",nn:"Muséhagen",ns:"Liten botanisk hemmelighetsfull hage—stille oase midt i summen!",nst:"Stupp inn i Muséhagens kompakte vidunderverden av temaplantekasser, arboretum-nøkter og vannhvisken nær uni. Det er Bergens hysset grønne flukt, der sjeldne planter forteller historier fra fjerne land. Ideell for å gruble over livets små mysterier.",nt:"Nær Bergen Universitet, Muséplassen; gratis alltid; best vår/sommer morgenstunder; sentralt gåavstand."},
{id:122,n:"Kunsthall 3,14 Gallery",a:"Sentrum",v:["hidden"],d:20,s:"Always-free contemporary art shock—edgy vibes!",st:"Dive into Kunsthall 3,14's provocative installs at Vågsallmenningen 12, where bold art challenges your gaze. This central freebie pulses with Bergen's creative underground, drawing thinkers into visual whirlwinds. Unmissable mind-bender.",im:"Stand transfixed before a massive, throbbing installation, colors bleeding into your soul in silent provocation.",t:"Vågsallmenningen 12, city center; free admission always; check hours online; Thu-Sun typically.",c:["parks"],r:"g",nn:"Kunsthall 3,14",ns:"Alltid-gratis samtidskunst sjokk—edgy vibber!",nst:"Stupp inn i Kunsthall 3,14s provoserende installasjoner på Vågsallmenningen 12, der dristig kunst utfordrer blikket ditt. Denne sentrale gratisbiden pulserer med Bergens kreative undergrunn, og trekker tenkere inn i visuelle virvelvinder. Umulig å gå glipp av.",nt:"Vågsallmenningen 12, bysenter; gratis inngang alltid; sjekk åpningstider online; typisk tor-søn."},
{id:123,n:"Buekorpsmuseet",a:"Sentrum",v:["hidden"],d:20,s:"Free dive into Bergen's marching boys brigade weirdness!",st:"Uncover Buekorpsmuseet's quirky trove of drums, uniforms, and hyper-local marching lore—Bergen's oddball tradition alive. Weekend opens reveal the rhythmic soul of the city's youth brigades. Bizarrely addictive history hit.",im:"Hear phantom drumbeats echoing from dusty glass cases, transporting you to parade-filled streets of yore.",t:"Central Bergen; free entry weekends; check Visit Bergen for hours; quick, fun stop.",c:["parks"],r:"g",nn:"Buekorpsmuseet",ns:"Gratis dykk i Bergens marsjerende guttebrigade-raritet!",nst:"Avslør Buekorpsmuseets quirky skatt av trommer, uniformer og hyper-lokal marsjlor—Bergens skakkbilde tradisjon levende. Helgeåpninger viser den rytmiske sjelen til byens ungdomsbrigader. Bizarrelig avhengighetsskapende historietreff.",nt:"Sentralt i Bergen; gratis inngang helger; sjekk Visit Bergen for timer; kjapp, morsom stopp."},
{id:124,n:"Bergenhus Fortress Grounds",a:"Bergenhus",v:["hidden"],d:20,s:"Free fortress wander + moody waterfront picnics!",st:"Roam Bergenhus's ancient grounds, where stone walls guard moody fjord sunsets and grassy nooks beg picnics. This preserved powerhouse hums with medieval whispers by the harbor. Ultimate free moody explore.",im:"Lounge on fortress grass as golden light bathes weathered towers, waves lapping like timeless secrets.",t:"Near Bryggen harbor; free outdoor access always; sunset best; picnic-friendly.",c:["parks"],r:"g",nn:"Bergenhus festningsområde",ns:"Gratis festningsvandringer + stemningsfull havnepicknick!",nst:"Vandre Bergenhus' gamle område, der steinmurer vokter stemningsfulle fjordsolnedganger og gresskroker tigger om piknik. Denne bevarte kraftpakken summer med middelalderhvisken ved havna. Ultimate gratis stemningsfull utforskning.",nt:"Nær Bryggen havn; gratis utendørs tilgang alltid; solnedgang best; piknik-vennlig."},
{id:125,n:"Damsgårdsfjellet Hike",a:"Damsgård",v:["hidden"],d:20,s:"Solo summit views over Bergen—hike the quiet peak!",st:"Tackle Damsgårdsfjellet's steep trails to a post-top panorama of Ulriken and city sprawl, often yours alone. Less trodden than Fløyen, it's raw reward for the fit. Fog-free days reveal Bergen's hidden drama.",im:"Crest the summit breathless, Ulriken looming grand as Bergen twinkles like a fjord jewel below.",t:"Bus to Damsgårdsfjellet trailhead; 1hr up, free; summer clear days; good shoes, no winter.",c:["parks"],r:"g",nn:"Damsgårdsfjellet tur",ns:"Solo-topp utsikt over Bergen—gå den stille toppen!",nst:"Ta Damsgårdsfjellets bratte stier til post-topp panorama over Ulriken og byspredning, ofte din alene. Mindre tråkket enn Fløyen, rå belønning for de fitte. Tåke-frie dager avslører Bergens skjulte drama.",nt:"Buss til Damsgårdsfjellet sti-start; 1 t opp, gratis; sommer klare dager; gode sko, ikke vinter."},
{id:126,n:"Trollskogen Troll Forest",a:"Fløyen",v:["hidden"],d:20,s:"Wander 30+ troll statues in mossy woods—whimsical hike!",st:"Lose yourself in Trollskogen's emerald moss carpet, where 30 wooden trolls lurk crafted by locals atop Fløyen. Kid-magic meets eerie forest vibes on this easy loop. Bergen's playful wild side unveiled.",im:"Spot a grinning troll peeking from twisted roots, moss glowing neon under dappled light like a fairy tale trap.",t:"From Fløyen top, 2km easy trail; free; anytime, family-friendly; combine with canoe spot.",c:["parks"],r:"g",nn:"Trollskogen",ns:"Vandre 30+ trollstatter i mosete skog—hysterisk sti!",nst:"Mist deg i Trollskogens smaragd moseteppe, der 30 tre-troll lurer skapt av lokalfolk oppå Fløyen. Børnemagi møter eerieskog-vibber på denne enkle løkken. Bergens lekne ville side avdekket.",nt:"Fra Fløyen topp, 2 km lett sti; gratis; når som helst, familievennlig; kombiner med kanotspot."}];

<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Bergen Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
