const P = [
  {id:1,n:"Gold Museum — Museo del Oro",a:"La Candelaria",v:["history", "art", "hidden"],d:45,s:"The world's largest collection of pre-Hispanic gold, with over 36,000 pieces showcasing 1,500 years of indigenous craftsmanship and cosmological understanding.",st:"The Museo del Oro houses treasures that Spanish conquistadors spent centuries seeking: the legendary El Dorado was never a city of gold but rather the rituals of the Muisca people who would offer gold to the spirits of the high mountain lakes. The museum's collection spans from 1200 BCE to the Spanish conquest, featuring intricate masks, figurines, and jewelry that reveal sophisticated metallurgical knowledge—these pieces weren't merely decorative but served as spiritual conduits. The most famous object is the Muisca Raft, which inspired the El Dorado legend itself. The museum occupies a building designed specifically to protect and display these irreplaceable works. A visit here fundamentally changes your understanding of pre-Columbian civilizations: these were not primitive peoples but sophisticated cultures with complex cosmologies expressed through precious metals.",im:"A golden mask catches the light in a dim gallery, its face serene and eternal, surrounded by other artifacts glowing softly against black walls.",t:"Located in La Candelaria. Metro to Estación Museo del Oro. Admission required. Allow 2-3 hours. Arrive early to avoid crowds. Bring a light jacket as the museum maintains cool temperatures. English audioguides available.",c:[],r:"g",nn:"Museo del Oro",ns:"Colección más grande del mundo de oro prehispánico",nst:"36,000 piezas revelan cosmologías sofisticadas y artesanía metalúrgica de civilizaciones que existieron más de 1000 años antes del contacto europeo.",nt:"La Candelaria. Metró a Estación Museo del Oro. Entrada requerida. Permita 2-3 horas. Llegue temprano. Traiga chaqueta ligera. Audioguías en inglés disponibles."},
  {id:2,n:"La Candelaria Historic Center",a:"La Candelaria",v:["history", "architecture", "art"],d:30,s:"Bogotá's colonial heart with narrow cobblestone streets, colorful colonial buildings, galleries, cafés, and the Cathedral—the spiritual center of Spanish America.",st:"Walking through La Candelaria is like stepping backward in time to 16th-century Spanish America. The streets follow the colonial grid laid out in 1538 when Jiménez de Quesada founded Bogotá at 2,640 meters elevation—higher than any other major city in the Americas. The Cathedral, begun in 1553 but not completed until the 19th century, dominates the central plaza. The buildings surrounding it, painted in soft yellows, pinks, and blues, once housed colonial administrators and merchants who controlled South American wealth. Today, the neighborhood is alive with galleries, small museums, theaters, and cafés where artists, students, and intellectuals gather. The neighborhood's bohemian atmosphere contrasts with its historical weight—you can feel the past in every stone while experiencing a vibrant contemporary artistic community.",im:"Afternoon light illuminates the Cathedral's façade as a musician plays guitar on the plaza, families sitting on benches, colonial buildings framing the scene with their weathered pastel facades.",t:"Easily accessed by metro. The streets are safe during daylight; avoid at night. Wear comfortable shoes—the cobblestones are uneven and the altitude is significant (2,640m). Join a walking tour to understand the complex history. Many galleries and small museums are free or inexpensive.",c:[],r:"g",nn:"La Candelaria",ns:"Centro histórico colonial con calles empedradas y galerías",nst:"Fundada en 1538, La Candelaria preserva la arquitectura colonial mientras alberga comunidad artística vibrante que crea en las sombras del pasado.",nt:"Accesible por metró. Seguro durante el día. Calzado cómodo. Desniveles desiguales y altitud significativa. Paseo histórico recomendado."},
  {id:3,n:"Monserrate Church — Iglesia de Monserrate",a:"Monserrate",v:["history", "views", "architecture"],d:45,s:"A white basilica perched at 3,152 meters atop a mountain overlooking the city, accessible by cable car, with religious pilgrimage tradition dating to the 1600s.",st:"Perched dramatically above Bogotá, the Monserrate church has drawn pilgrims since the 1600s when a shrine was first built on the mountain. The current basilica, completed in 1910, glows white against the sky and dominates the visual landscape of Bogotá. The cable car journey up the mountain takes 10 minutes, rising from the city's sprawl into clouds and mountain greenness. The interior is austere: pale stone, simple iconography, a sense of spiritual purpose. But the view from the plaza is extraordinary—the entire city spreads below in a vast grid, mountains rising in all directions, the altitude making the air thin and the light crystalline. On Sundays, thousands of pilgrims climb the mountain (there's also a cable car), transforming it into a spiritual gathering space that has functioned for over 400 years.",im:"The white basilica glows against a cloudy sky as pilgrims in colorful clothes approach the entrance, mountains shrouded in mist beyond the city far below.",t:"Cable car from Monserrate station at the mountain's base (10 minutes). Alternatively, climb the hiking path for those seeking more engagement with the mountain. Admission required for cable car. Arrive early morning for best views and to avoid afternoon clouds. The altitude affects many visitors—allow time to adjust.",c:[],r:"g",nn:"Iglesia de Monserrate",ns:"Basílica blanca a 3152m con vistas que dominan toda la ciudad",nst:"Desde 1600, peregrinos suben a esta montaña sagrada; la basílica de 1910 se levanta blanca contra el cielo, testigo de siglos de fe.",nt:"Teleférico desde estación Monserrate (10 min). Alternativa: caminar la ruta de senderismo. Entrada requerida. Llegue temprano. Altitud significativa."},
  {id:4,n:"Palacio de Nariño — Presidential Palace",a:"La Candelaria",v:["history", "architecture"],d:30,s:"A 19th-century neoclassical palace serving as the official residence of Colombia's presidents, with tours available on weekends.",st:"The Palacio de Nariño, built in the 1870s, serves as the official residence and workplace of Colombia's president. The building's neoclassical facade was designed to convey governmental authority and permanence. Named after Antonio Nariño, a founding figure in Colombian independence, the palace has witnessed nearly 200 years of Colombian political history—independence, civil wars, constitutional reforms, and contemporary governance. Tours (available weekends) take visitors through state rooms decorated with art and historical artifacts that reveal how power is exercised and displayed in Colombia. The palace's location in La Candelaria, surrounded by colonial architecture, creates a fascinating temporal juxtaposition: 19th-century neoclassicism amid 16th-century Spanish colonial streets.",im:"The presidential palace's neoclassical columns frame an entrance where a solitary guard stands, the building's pale facade glowing in afternoon light.",t:"Located in La Candelaria. Metro to La Candelaria station. Tours available Saturdays and Sundays (book ahead). Security is rigorous—arrive early, bring ID, expect security screening. Photography may be restricted.",c:[],r:"g",nn:"Palacio de Nariño",ns:"Palacio presidencial neoclásico donde se ejerce poder colombiano",nst:"Construido en 1870, ha presenciado 200 años de historia política desde la independencia hasta la gobernanza contemporánea.",nt:"La Candelaria. Metró a La Candelaria. Paseos sábados y domingos (reserve). Seguridad rigurosa. Traiga ID. Fotografía puede ser restringida."},
  {id:5,n:"Bogotá Botanical Garden — Jardín Botánico de Bogotá",a:"Engativá",v:["nature", "beautiful", "hidden"],d:40,s:"A peaceful 32-acre garden with 30,000 plants native to Colombia's diverse ecosystems, including cloud forest specimens and indigenous orchid collections.",st:"The Bogotá Botanical Garden, founded in 1955, represents a living archive of Colombian botanical diversity. With 32 acres and over 30,000 plants, the garden documents the incredible range of Colombia's ecosystems: cloud forests, páramo (high mountain grasslands), tropical lowlands. The orchid collection is particularly magnificent—Colombia has the world's highest orchid diversity, and this garden preserves hundreds of species. Walking through the garden feels like traveling through Colombia's geography in miniature. The garden also serves a research function: scientists study plant conservation and sustainable agriculture. The surrounding neighborhood of Engativá is less touristy than central Bogotá, allowing for a more peaceful experience. This is a place where locals come to sit, think, and connect with nature.",im:"A visitor stands among towering orchids in the orchid greenhouse, their blooms in shades of purple and white, tropical humidity visible in the air.",t:"Located in Engativá neighborhood. Bus or metro to the area. Admission is inexpensive. Open daily. Allow 2-3 hours. Bring water and wear sunscreen. The altitude and sunny exposure can be intense. Guided tours available.",c:[],r:"g",nn:"Jardín Botánico de Bogotá",ns:"Jardín de 32 acres con 30,000 plantas nativas",nst:"Fundado en 1955, documenta la diversidad botánica colombiana desde bosques nubosos hasta páramos, preservando la riqueza natural del país.",nt:"Barrio Engativá. Ónibus o metró. Entrada económica. Abierto diariamente. Permita 2-3 horas. Leve agua y protector solar. Altitud y exposición solar intensas."},
  {id:6,n:"National Museum — Museo Nacional",a:"La Macarena",v:["history", "art", "architecture"],d:45,s:"Colombia's premier museum in a former prison building, with art, history, and ethnography spanning from pre-Hispanic times to the present.",st:"The Museo Nacional occupies a building that served as a prison from 1874 to 1968, a fact that adds emotional weight to the space. The transformation of this symbol of incarceration into a temple of cultural knowledge represents a reclaiming of Colombian narrative. The museum's collections span Colombian history: pre-Hispanic artifacts, colonial art, religious sculptures, paintings from the Spanish period, contemporary art documenting the country's complex 20th century. The ethnographic sections document Colombia's indigenous communities with respectful attention. Walking through the museum is a journey through Colombian identity—its indigenous roots, Spanish colonial past, African diaspora, and contemporary struggles and achievements. The building's architecture itself—with its prison watchtower visible and incorporated into the design—serves as a constant reminder of the past.",im:"A visitor stands before a massive colonial painting of a saint, the religious imagery rich and dramatic, the museum's high ceilings creating a sense of institutional grandeur.",t:"Located in La Macarena. Metro to La Macarena station. Admission is modest. Closed Mondays. Allow 2-3 hours. English information is available. The building's history as a prison is explained in exhibits. The surrounding La Macarena neighborhood has cafés and restaurants.",c:[],r:"g",nn:"Museo Nacional",ns:"Museo principal en edificio que fue prisión, documentando historia colombiana",nst:"Transformado de prisión en 1968 a museo, representa la reclamación de la narrativa colombiana, con colecciones que abarcan 3000 años.",nt:"La Macarena. Metró a La Macarena. Entrada modesta. Cerrado lunes. Permita 2-3 horas. Información en inglés disponible. Cafés cercanos."},
  {id:7,n:"Colombian Coffee Culture Museum — Museo de la Cultura del Café",a:"Teusaquillo",v:["food", "history", "local"],d:35,s:"An interactive museum dedicated to Colombia's coffee heritage, with bean tastings, demonstrations of roasting and brewing, and coffee farm history.",st:"Coffee is Colombia's story. Since the early 1800s, coffee farming has shaped the economy, landscape, and culture of the nation. This museum, located in Bogotá though it represents a national heritage, explores that history through interactive exhibits. You'll learn about the geography of Colombian coffee regions (Huila, Nariño, Cauca), the labor history (including complex colonial and post-colonial relationships), and the journey from bean to cup. The museum includes a café where you can taste different Colombian coffees and understand subtle flavor differences between beans from different regions. Exhibits use videos, artifacts, and demonstrations to make coffee culture tangible. This is not a quaint tourist experience but a serious examination of Colombia's primary export and its cultural significance.",im:"A person cups their hands around a small portion of roasted coffee beans, the aroma rising, a tasting expert explaining subtle flavor notes of chocolate and citrus.",t:"Located in Teusaquillo. Metro or bus to the area. Admission is modest. Allow 1-2 hours. The café is excellent for lingering with coffee. Book ahead for tasting experiences. Go on a weekday to avoid crowds.",c:[],r:"g",nn:"Museo de la Cultura del Café",ns:"Museo interactivo dedicado al café colombiano",nst:"Desde 1800, el café ha moldeado Colombia; este museo documenta la historia agrícola, laboral y cultural a través de degustaciones y demostraciones.",nt:"Teusaquillo. Metró u ónibus. Entrada modesta. Permita 1-2 horas. Café excelente. Reserve para catas. Visite entre semana."},
  {id:8,n:"Zipaquirá Salt Cathedral — Catedral de Sal",a:"Zipaquirá (Day Trip)",v:["history", "architecture", "hidden"],d:480,s:"A remarkable underground cathedral carved entirely from salt 600 feet below ground, built by miners as a spiritual sanctuary in a working salt mine.",st:"In the mountains north of Bogotá, beneath the town of Zipaquirá, lies one of the world's most extraordinary religious spaces: a cathedral carved entirely from salt. The salt mining in this area dates to pre-Columbian times; indigenous peoples extracted salt for trade centuries before the Spanish arrived. In the mid-1950s, a Chilean architect designed an underground cathedral where miners could pray during their work shifts. The current structure was completed in 1995. Walking into the cathedral, you descend through tunnels—lit by soft colored lights—that lead to the main basilica chamber with a 40-meter nave carved from pure salt. Crosses and religious figures are sculpted from salt. The acoustics are unusual, the temperature cool and constant. The overwhelming sensation is otherworldly: a sacred space born from human labor in the earth's depths, combining spiritual longing with geological reality.",im:"A visitor descends a salt tunnel, illuminated by soft blue light, the carved walls glowing translucently, the cathedral's main chamber visible ahead, vast and sublime.",t:"Located in Zipaquirá, 30 miles from Bogotá (1 hour by bus or car). Admission required. Allow 2-3 hours including travel time. Tours guide you through the site (some in English). The underground is cool; bring a light jacket. The main chamber is truly remarkable. Plan a half-day trip.",c:[],r:"g",nn:"Catedral de Sal",ns:"Catedral subterránea tallada completamente en sal",nst:"Excavada 600 pies bajo tierra, esta catedral es tanto tesoro arquitectónico como monumento laboral de los mineros de sal que crearon espacio sagrado.",nt:"Zipaquirá, 30 millas de Bogotá (1 hora en ónibus). Entrada requerida. Permita 2-3 horas. Paseos guiados. Subterráneo fresco; traiga chaqueta. Medio día."},
  {id:9,n:"La Liga District — Barrio La Liga",a:"La Liga",v:["art", "local", "food"],d:25,s:"An artsy, bohemian neighborhood with street art murals, independent galleries, vintage shops, and vibrant nightlife attracting young creative culture.",st:"La Liga is Bogotá's creative epicenter, where young artists, musicians, and entrepreneurs have established galleries, studios, and alternative venues that challenge established cultural institutions. The neighborhood's brick buildings are constantly being redecorated with murals that range from political messages to pure abstraction. The aesthetic is deliberately anti-establishment, with thrift shops, indie bookstores, and hole-in-the-wall galleries existing alongside upscale restaurants attempting to capitalize on the neighborhood's cool factor. Walking through La Liga, you encounter genuine artistic ferment: this is where Colombian contemporary culture is being created and contested. The neighborhood contrasts sharply with La Candelaria's colonial conservatism—where the past is preserved, in La Liga the future is being aggressively painted.",im:"A massive street mural covers an entire building facade—a portrait of a woman rendered in bold colors, a artist's signature visible, people walking past discussing the work.",t:"Metro to Rosario station, then walk into La Liga. The neighborhood is safe during daytime and early evening. Go on a Thursday-Saturday for the most vibrant atmosphere. The cafés and restaurants are excellent. Many galleries open Thursday-Sunday evenings.",c:[],r:"g",nn:"Barrio La Liga",ns:"Barrio artístico con murales y galerías independientes",nst:"Centro creativo donde artistas jóvenes reimaginan continuamente la cultura urbana; murales políticos ceden paso a tiendas vintage y estudio alternativo.",nt:"Metró a Rosario, luego caminar. Seguro durante el día y atardecer. Jueves-sábado para atmósfera más vibrant. Cafés y galerías excelentes."},
  {id:10,n:"Usaquén District — Barrio Usaquén",a:"Usaquén",v:["architecture", "local", "food"],d:30,s:"A northern neighborhood with a colonial village atmosphere, cobblestone plaza surrounded by galleries and restaurants, strong community identity and weekend artisan markets.",st:"Usaquén was a separate municipality until 1954 when it was absorbed into Bogotá, but it has retained a distinct identity and village atmosphere. The heart of Usaquén is a charming plaza ringed by low colonial buildings, now housing galleries, restaurants, and cafés. On weekends, the plaza fills with locals and visitors browsing artisan craft markets—jewelry, textiles, paintings, handmade items. The neighborhood has become fashionable among the wealthy, but it retains authentic character. The Community is strong; locals take pride in their neighborhood's independence and bohemian character. Walking through Usaquén feels like time-traveling to a small mountain town, even though you're within Bogotá's boundaries.",im:"The plaza glows in afternoon light, umbrellas shading vendors' stalls displaying colorful textiles and jewelry, people sitting at café tables, colonial buildings framing the scene.",t:"Metro to Usaquén station. The neighborhood is very safe and pedestrian-friendly. Best visited on weekends when the artisan market is active. Many cafés and restaurants throughout. The cobblestone streets are beautiful but uneven—wear comfortable shoes.",c:[],r:"g",nn:"Barrio Usaquén",ns:"Pueblo colonial dentro de Bogotá con plaza de artesanos",nst:"Absorbido por Bogotá en 1954 pero mantiene identidad distintiva; plaza cobbled rodead de galerías donde artesanos venden cada fin de semana.",nt:"Metró a Usaquén. Seguro y amigable peatonal. Fines de semana para mercado de artesanos. Cafés y restaurantes. Calzado cómodo para calles irregulares."},
  {id:11,n:"International Bogotá Museum — Museo de los Concilios y la Cultura Latinoamericana",a:"La Candelaria",v:["history", "art", "architecture"],d:30,s:"A museum dedicated to Latin American culture and colonial church councils, housed in a beautiful 16th-century colonial mansion with period furnishings.",st:"This mansion, built in the 16th century, illustrates how the Spanish colonial elite lived in Bogotá. The museum's focus on church councils (Concilios) documents the religious history of Latin America—how the Church shaped colonial society and vice versa. But the museum also showcases Latin American art, artifacts, and cultural expressions. The building itself is the main attraction: thick adobe walls, a central courtyard with indigenous-style stonework, rooms decorated with period furnishings and artwork. Walking through the mansion provides insight into colonial domestic life in the high Andes. The museum is less crowded than major institutions, offering a more intimate experience of colonial history.",im:"Light streams through colonial windows into a room where Spanish paintings hang above wooden furniture, the adobe walls glowing warm in afternoon light.",t:"Located in La Candelaria. Metro to La Candelaria station. Admission is modest. Allow 1-2 hours. The mansion is the highlight; the collections complement the architecture. Many small shops nearby.",c:[],r:"g",nn:"Museo de los Concilios y la Cultura Latinoamericana",ns:"Mansión colonial de 1600 documentando historia eclesiástica",nst:"La mansión revela vida colonial de élite; el museo documenta cómo la iglesia moldeó la sociedad latinoamericana desde los Andes.",nt:"La Candelaria. Metró a La Candelaria. Entrada modesta. Permita 1-2 horas. La mansión es lo principal. Tiendas pequeñas cercanas."},
  {id:12,n:"Simón Bolívar Park — Parque Simón Bolívar",a:"Teusaquillo",v:["nature", "local", "architecture"],d:30,s:"Bogotá's primary urban park with 396 acres, a lake, recreational spaces, museums, and cultural venues attracting picnickers, families, and cultural enthusiasts.",st:"Simón Bolívar Park, designed in 1938, is Bogotá's answer to Central Park—a large urban green space in the middle of the sprawling city. With 396 acres, the park provides recreational space for Bogotá's residents: children play, families picnic, joggers run the paths, couples walk hand-in-hand. The park includes a lake, botanical areas, museums, performance venues, and sports facilities. Cultural programming happens year-round. The park is also a statement of Colombian values: it's named for the military leader who liberated multiple South American nations from Spanish colonial rule. Walking through the park on a weekend, you see Bogotá's diverse population together in public space—a rare egalitarian moment in a city marked by severe economic inequality.",im:"Families spread blankets on grass as children run, the park's trees providing shade, a lake visible in the distance, Bogotá's buildings rising beyond.",t:"Multiple entry points throughout the city. Metro to various stations near the park. Free admission. Very safe during daytime; avoid after dark. Weekends are most lively. The park has food vendors and cafés. Bring water and sunscreen.",c:[],r:"g",nn:"Parque Simón Bolívar",ns:"Parque urbano de 396 acres con lago y espacios recreativos",nst:"Diseñado en 1938, el parque es respiro verde donde poblaciones diversas de Bogotá comparten espacio público y celebran cultura.",nt:"Múltiples entradas. Metró a varias estaciones. Entrada gratuita. Seguro durante el día. Fines de semana más animados. Vendedores de comida y cafés."},
  {id:13,n:"Espacio Odeón — Odeón Space",a:"La Candelaria",v:["art", "history", "hidden"],d:20,s:"A restored 1880s theater turned contemporary art space hosting innovative performances, exhibitions, and cultural events in a beautiful historic building.",st:"The Espacio Odeón occupies a theater originally built in the 1880s. After decades of decline, it was restored by a contemporary arts collective and now serves as a venue for experimental theater, contemporary dance, video art, and interdisciplinary performances. The building's architecture—with its historic stage, ornate detailing, and intimate scale—creates an unusual atmosphere for experimental work. The space embodies a reclamation of Colombian cultural institutions from mere preservation toward active artistic use. Performances are often free or inexpensive, reflecting the collective's commitment to cultural access. The surrounding La Candelaria neighborhood hosts many such cultural initiatives—small theaters, galleries, artist studios—creating a densely artistic area.",im:"A performer silhouetted against a massive projection on the theater's stage, the historic ornate balcony visible above, a small audience absorbed in the experimental work.",t:"Located in La Candelaria. Metro to La Candelaria station. Check the schedule ahead—performances and exhibitions vary. Admission is modest or free. Allow 1-2 hours for an event. The venue supports cultural experimentation.",c:[],r:"g",nn:"Espacio Odeón",ns:"Teatro de 1880 transformado en espacio de arte contemporáneo",nst:"Restaurado por colectivo artístico, alberga teatro experimental, danza, y performances que reimaginan el espacio histórico para arte contemporáneo.",nt:"La Candelaria. Metró a La Candelaria. Verifique programación. Entrada modesta o gratuita. Permita 1-2 horas. Apoye experimentación cultural."},
  {id:14,n:"Biblioteca Luis Ángel Arango — Luis Ángel Arango Library",a:"La Candelaria",v:["architecture", "art", "history"],d:35,s:"A landmark modern library with stunning architecture, free art exhibitions, and significant collections preserving Colombian cultural heritage and literature.",st:"The Biblioteca Luis Ángel Arango, opened in 1958, is one of the Americas' finest libraries. The building itself is architecturally distinguished: clean modernist lines, transparent walls allowing light to flood interior spaces, a design that makes the library feel open rather than institutional. The library is free and open to the public, representing a democratic vision of cultural access. Beyond books, the library hosts rotating art exhibitions (all free), concerts, and lectures. The building's facade, designed by renowned Colombian architect Gabriel Serrano, has become an iconic element of La Candelaria's streetscape. The library represents investment in Colombian cultural life not driven by profit or tourism but by genuine commitment to knowledge and artistic expression.",im:"The library's modern glass facade glows in evening light, interior spaces visible, people studying at desks, light streaming dramatically across the reading rooms.",t:"Located in La Candelaria at Paseo Peatonal. Metro to Avenida Jiménez station. Admission is completely free. Open daily except Mondays. Allow 1-2 hours. The exhibitions are world-class and free. Very peaceful atmosphere for studying or browsing.",c:[],r:"g",nn:"Biblioteca Luis Ángel Arango",ns:"Biblioteca moderna con arquitectura distinguida y exposiciones gratuitas",nst:"Abierta en 1958, representa visión democrática de acceso cultural; gratis para público, con exposiciones de arte que rivalizan con museos pagados.",nt:"La Candelaria, Paseo Peatonal. Metró a Avenida Jiménez. Entrada completamente gratuita. Abierto diariamente excepto lunes. Exposiciones de clase mundial."},
  {id:15,n:"Gavira Valley — Valle de Gavira",a:"Usaquén",v:["nature", "views", "hidden"],d:45,s:"A mountain valley north of Bogotá with hiking trails, streams, cloud forest ecosystem, and views of the city below—accessible as a day trip.",st:"The Gavira Valley, accessed from the Usaquén neighborhood, offers escape from the city into Andean mountain terrain. The valley contains cloud forest ecosystem—a rare environment where altitude and rainfall create permanent mist and incredibly dense vegetation. Hiking trails wind through the forest, crossing streams and climbing to ridgelines with views back toward Bogotá. The altitude (starting around 2,640m in the city, rising to over 3,000m) means the air is thin and the vegetation lush. The valley is less developed and trafficked than some Bogotá nature areas, offering a more immersive wilderness experience. Local guides can be arranged for more technical hikes. This is where Bogotá residents go to reconnect with the natural world that surrounds their mountain city.",im:"A hiker pauses on a trail, looking back toward the misty valley, Bogotá visible as a distant grid of lights and buildings through the cloud cover.",t:"Accessed from Usaquén or surrounding neighborhoods. Can be visited with a guide or self-guided with good preparation. Altitude requires acclimatization. Bring lots of water, good hiking shoes, and rain gear (clouds and mist are constant). Allow a full day.",c:[],r:"g",nn:"Valle de Gavira",ns:"Valle montañoso con bosque nuboso y senderos de senderismo",nst:"Bosque nuboso a altitud de 3000m+ ofrece escape natural donde la densa vegetación y la neblina crean ecosistema extraño y hermoso.",nt:"Acceso desde Usaquén. Con guía o auto-dirigido. Altitud requiere aclimatación. Leve mucha agua, buen calzado, lluvia. Día completo."},
  {id:16,n:"Cerro de Monserrate Cable Car Experience",a:"Monserrate",v:["views", "nature", "beautiful"],d:25,s:"The cable car journey itself, offering 10 minutes of steady climbing through mountain ecosystem with changing vistas and views of Bogotá below.",st:"While the Monserrate church and basilica are the stated destination, the cable car journey is an experience unto itself. The 10-minute ascent climbs from the city edge through mountain terrain—you leave behind urban sprawl and ascend into cloud forest, watching vegetation change and the city diminish below. The car's windows frame the landscape differently than ground-level hiking would. The psychological experience of rising 500 vertical meters in 10 minutes, seeing the city transform from sprawl to miniature to abstraction, is profound. Many visitors take the cable car up and hike down, which reverses the perspective—descending into the city rather than ascending above it.",im:"Through the cable car window, the city spreads below in a geometric grid, mountains shrouding the horizon, clouds moving across the middle distance.",t:"Cable car operates daily (hours vary by season). Tickets are modest. Go early morning for clearest views. Afternoon clouds often obscure the view. Bring a light jacket. The journey itself is the attraction regardless of destination.",c:[],r:"g",nn:"Teleférico a Monserrate",ns:"Viaje de 10 minutos escalando 500m verticales",nst:"La experiencia del teleférico, observando la ciudad transformarse de sprawl a miniatura, es tan importante como el destino en Monserrate.",nt:"Funciona diariamente. Entradas modestas. Mañana temprano para vistas claras. Nubes frecuentes en tarde. Chaqueta ligera. El viaje es la atracción."},
  {id:17,n:"International Art Museum — Museo de Arte de la Universidad Nacional",a:"La Candelaria",v:["art", "history", "architecture"],d:35,s:"Colombia's National University art museum with significant collections of Colombian and Latin American modern and contemporary art.",st:"The Museo de Arte de la Universidad Nacional (MANU) houses one of Latin America's most important collections of modern and contemporary art. The museum focuses on Colombian and Latin American artists, documenting how art engages with political, social, and cultural struggles. The building itself is architecturally significant: a modernist structure that complements the university campus. The collection includes works by Fernando Botero (Colombia's most famous artist), Frida Kahlo, and countless Latin American artists whose work addresses colonialism, inequality, indigenous identity, and social transformation. Walking through the museum is an education in how art functions as a vehicle for social commentary and cultural resistance.",im:"A massive Botero painting dominates a gallery wall—the characteristic exaggerated figures rendered in oil, their proportions simultaneously grotesque and human.",t:"Located on the National University campus in La Candelaria. Metro to Avenida Jiménez station. Admission is modest. Allow 2-3 hours. The campus itself is architecturally significant. The museum is less crowded than major commercial venues.",c:[],r:"g",nn:"Museo de Arte de la Universidad Nacional",ns:"Museo universitario con colección importante de arte latinoamericano",nst:"Una de las colecciones más significativas de arte moderno latinoamericano; documenta cómo el arte aborda colonialismo y transformación social.",nt:"Campus Universidad Nacional en La Candelaria. Metró a Avenida Jiménez. Entrada modesta. Permita 2-3 horas. Campus arquitectónicamente significativo."},
  {id:18,n:"Distrito Gourmet — Gourmet District",a:"Zona Rosa",v:["food", "local", "hidden"],d:20,s:"An upscale neighborhood concentrated with Colombian and international restaurants featuring fusion cuisine and fine dining experiences.",st:"The Zona Rosa neighborhood, particularly the Distrito Gourmet, represents contemporary Bogotá's culinary ambitions. Here, Colombian chefs are reimagining traditional foods through contemporary techniques, while international chefs explore Colombian ingredients. Restaurants range from high-end tasting menus to casual spots serving excellent food. What unites them is seriousness about cuisine: these are not tourist traps but places where food is treated as art and culture. The neighborhood itself is upscale and very safe. Dining here you encounter both contemporary Colombian cuisine and global influences, reflecting Bogotá's cosmopolitan ambitions.",im:"A chef plates a dish with careful precision—Colombian ingredients transformed through contemporary technique, the plating aesthetic and precise.",t:"Located in Zona Rosa neighborhood. Metro or Uber from most areas. Restaurants vary widely in price and style. Book ahead for popular spots. Many restaurants are closed Sundays. The neighborhood is very safe and walkable.",c:[],r:"g",nn:"Distrito Gourmet",ns:"Vecindario gastronómico con restaurantes de fusión contemporánea",nst:"Chefs colombianos reimaginan comidas tradicionales mediante técnicas contemporáneas, reflejando ambiciones culinarias de Bogotá.",nt:"Zona Rosa. Metró u Uber. Restaurantes varían en precio y estilo. Reserve para lugares populares. Muchos cierran domingos. Seguro y caminable."},
  {id:19,n:"Street Art Tours in La Candelaria",a:"La Candelaria",v:["art", "local", "hidden"],d:25,s:"Guided tours through La Candelaria's back streets revealing colorful murals, street art, artist studios, and contemporary graffiti culture with local artist guides.",st:"While La Candelaria's historic plaza preserves colonial heritage, the neighborhood's back streets pulse with contemporary street art. Colorful murals cover building facades; stencil work and tags exist alongside commissioned pieces. The street art ranges from political messages to purely aesthetic explorations. Local artist guides lead tours that explain the scene, introduce you to working artists, and provide context for understanding street art as legitimate artistic expression rather than vandalism. These tours support the artist community and offer perspectives that standard tourist routes miss. The experience reveals a Bogotá that exists beneath the official heritage sites.",im:"A massive stencil portrait of a historical figure covers a building wall, the monochromatic image striking, pedestrians passing, a street artist explaining the work's political context.",t:"Tours begin at various points in La Candelaria. Book through tourism offices or hotels. Tours typically last 2-3 hours. Guides are local artists. Tours support the artist community. Go in daytime. The tours reveal hidden aspects of Bogotá's contemporary culture.",c:[],r:"g",nn:"Paseos de Arte Callejero",ns:"Paseos guiados por artistas locales revelando murales y grafiti",nst:"Guías artistas locales revelan el pulso artístico contemporáneo de La Candelaria que existe bajo los sitios de patrimonio oficial.",nt:"Tours parten de varios puntos en La Candelaria. Reserve en turismo u hoteles. Tours típicamente 2-3 horas. Guías son artistas locales. Apoyan comunidad artista."},
  {id:20,n:"Ciclovía Weekly Streets",a:"Across Bogotá",v:["local", "nature", "beautiful"],d:30,s:"Every Sunday, Bogotá closes major streets to cars and opens them to pedestrians, cyclists, and skaters—a massive weekly celebration of public space and movement.",st:"Every Sunday morning, Bogotá transforms. Over 70 miles of major streets are closed to vehicle traffic and opened to pedestrians, cyclists, skateboarders, roller skaters, and runners. Hundreds of thousands of residents pour into the streets—families pushing strollers, elderly couples walking hand-in-hand, young people on skateboards, amateur cyclists competing. The Ciclovía (bicycle way) represents a radical reimagining of urban public space, where movement becomes communal rather than competitive, where the city is briefly reclaimed by humans rather than dominated by cars. The atmosphere is joyful, celebratory—a weekly ritual that builds social cohesion. The Ciclovía starts around 7am and winds down by 2pm. Participating is to experience Bogotá as its residents experience their city.",im:"A massive crowd fills a multi-lane street—cyclists, pedestrians, children, the street transformed from automotive space into human celebration under a sunny sky.",t:"Sundays 7am-2pm year-round. Route changes weekly (maps available at tourism offices). Bring water. The streets are completely safe and very crowded. Start early for best experience. Rent a bike or bring your own. Join the community experience.",c:[],r:"g",nn:"Ciclovía",ns:"Cada domingo, calles cerrads a carros para peatones y ciclistas",nst:"Ritual semanal donde cientos de miles de Bogotanos reclaiman las calles de la ciudad para movimiento comunitario sin competencia vehicular.",nt:"Domingos 7h-14h todo el año. Ruta cambia semanalmente. Traiga agua. Completamente seguro y muy concurrido. Comience temprano. Rente bicicleta o traiga suya."},
  {id:21,n:"Cathedral Basilica of Bogotá — Catedral Metropolitana",a:"La Candelaria",v:["history", "architecture", "art"],d:30,s:"Bogotá's main cathedral begun in 1553, completed in 19th century, with ornate interior, religious art, and historical significance as spiritual center of Spanish America.",st:"Construction of the Cathedral began in 1553, making it one of Spanish America's longest construction projects. The building embodies centuries of architectural evolution: the earliest colonial vision mixed with baroque additions and 19th-century neoclassical interventions. The interior is ornate—wooden altars covered in gold leaf, paintings by important religious artists, chapels dedicated to patron saints, stained glass depicting biblical scenes. The cathedral served as the spiritual center for Spanish colonial governance of South America: archbishops crowned here held significant political power. Today, the cathedral remains an active worship space and historic monument. Attending a service here, you feel the weight of centuries—the prayers of indigenous peoples, enslaved Africans, and Spanish colonists have echoed off these walls.",im:"The cathedral's interior glows in candlelight—gold-leafed altar, paintings catching the light, ornate wooden carving filling the sacred space.",t:"Located in La Candelaria at Plaza Mayor. Metro to Avenida Jiménez. Free admission for worship; donations welcome. Allow 1-2 hours. Service times vary. Respectful behavior required in this active worship space.",c:[],r:"g",nn:"Catedral Metropolitana",ns:"Catedral con construcción iniciada en 1553, completada en siglo XIX",nst:"Trescientos años de construcción reflejan evolución arquitectónica desde colonial a neoclásico; espacio sagrado donde poder religioso moldeó colonialismo.",nt:"Plaza Mayor en La Candelaria. Metró a Avenida Jiménez. Entrada gratuita. Permita 1-2 horas. Horarios de servicios varían. Comportamiento respetuoso requerido."},
  {id:22,n:"Andres Carne de Res Restaurant — Multi-venue Institution",a:"Zona Rosa & Chia",v:["food", "local", "architecture"],d:60,s:"A legendary Colombian restaurant and cultural institution with two locations, known for parrilla (grilled meats), festive atmosphere, and massive portions.",st:"Andres Carne de Res is more than a restaurant; it's a cultural phenomenon. The original location in Chia (a town outside Bogotá) is an impossibly colorful, sprawling compound of buildings decorated with art, sculptures, and whimsical design. The walls are literally painted with murals, the courtyards filled with eclectic installations. The food is Colombian comfort cuisine elevated: grilled meats (parrilla), handmade arepas, fresh salads, all served in massive portions meant for sharing. The atmosphere is celebratory, loud, joyful—a place where strangers become temporary companions. The newer Zona Rosa location brings the same energy to central Bogotá. Dining here is an experience of Colombian abundance, hospitality, and creative exuberance. It represents how food can be a vehicle for expressing cultural identity.",im:"The restaurant's courtyard fills with colorful murals and sculptures, long wooden tables laden with plates of grilled meats, people celebrating loudly, the evening light golden.",t:"Original location in Chia (45 minutes from Bogotá by car). Zona Rosa location in central Bogotá. Arrive hungry—portions are enormous. Reservations recommended for larger groups. Very festive, sometimes loud. Cash payment only at original location (credit cards at Zona Rosa).",c:[],r:"g",nn:"Andres Carne de Res",ns:"Institución restaurante legendaria con parrilla y atmósfera festiva",nst:"Restaurante cultural donde decoración exuberante, comida colombiana copiosa, y atmósfera de celebración reflejan identidad cultural nacional.",nt:"Chia (45 min de Bogotá) y Zona Rosa. Llegue hambriento; porciones enormes. Reservaciones recomendadas. Festivo y ruidoso. Efectivo en Chia."},
  {id:23,n:"Juan Valdez Coffee Museums & Cafes",a:"Multiple Locations",v:["food", "history", "local"],d:30,s:"Branded coffee cafe chain with museum locations in Bogotá exploring Colombian coffee heritage, sourced directly from Juan Valdez cooperatives.",st:"Juan Valdez, the iconic fictional coffee farmer representing Colombian coffee worldwide, is based on actual coffee cooperatives. The company maintains multiple locations in Bogotá combining retail cafés with small museums. These spaces document Colombian coffee production: the geography of coffee regions, the labor involved, the quality markers that distinguish Colombian coffee. You can taste coffees from different regions and learn to recognize flavor profiles. While some view the brand as commercialized tourism, the cooperative model it represents is genuine: small-scale farmers maintaining quality and fair compensation. The cafés themselves are excellent spaces to sit with coffee and watch Bogotá pass by.",im:"A barista carefully prepares a pour-over coffee, the grounds blooming with hot water, steam rising, a customer observing the process with interest.",t:"Multiple locations throughout Bogotá. Maps available at any location. Admission to museums is modest or free with drink purchase. The coffee quality is excellent. Ideal for breaks during sightseeing. Locations vary in size and ambience.",c:[],r:"g",nn:"Cafés Juan Valdez",ns:"Cafés con pequeños museos documentando herencia cafetera colombiana",nst:"Basados en cooperativas genuinas, los cafés exploran geografía, labor, y marcadores de calidad del café colombiano mientras sirven bebidas excelentes.",nt:"Múltiples ubicaciones. Mapas disponibles. Entrada a museos modesta o gratuita. Calidad excelente. Ideal para descansos. Ubicaciones varían."},
  {id:24,n:"La Pinta Gallery District",a:"Teusaquillo",v:["art", "hidden", "local"],d:25,s:"A concentration of contemporary art galleries in the Teusaquillo neighborhood showing Colombian and international artists in a low-key gallery scene.",st:"Unlike the commercial gallery districts of many cities, Bogotá's gallery scene remains intimate and artist-focused. La Pinta and surrounding areas in Teusaquillo concentrate galleries that show contemporary work by established and emerging Colombian artists, alongside international artists. The galleries are often in converted homes, maintaining a residential scale that makes art viewing feel personal rather than institutional. Opening nights (usually Thursday evenings) draw artists, collectors, and art enthusiasts for conversations about the work. The scene is less competitive and more community-oriented than major art markets, making it accessible to non-collectors.",im:"An artist stands beside their abstract painting in a small gallery space, the work taking up most of the wall, a few visitors studying the canvas intently.",t:"Located in Teusaquillo. Metro to the area, then walk. Many galleries free or modest admission. Go during opening nights (Thursday) for more interactive experience. Gallery hours vary; check ahead. The neighborhood has good cafés and small restaurants.",c:[],r:"g",nn:"Distrito de Galerías La Pinta",ns:"Concentración de galerías de arte contemporáneo en escala residencial",nst:"Galerías en casas convertidas muestran artistas colombianos e internacionales en escena íntima y centrada en la comunidad.",nt:"Teusaquillo. Metró al área. Muchas galerías gratuitas. Jueves para noches de apertura. Horarios varían. Cafés y restaurantes cercanos."},
  {id:25,n:"Murals Tour Route — La Candelaria Walking",a:"La Candelaria",v:["art", "history", "local"],d:20,s:"Self-guided or group walking route through La Candelaria's side streets observing contemporary street art, political murals, and artist signature work.",st:"Walking the back streets of La Candelaria reveals a vibrant street art scene that coexists with colonial architecture. Contemporary artists have transformed utility walls, building facades, and alley ways into an open-air gallery. The murals often carry political messages—references to Colombian violence, indigenous rights, environmental concerns—making them statements about power and social change, not mere decoration. The scale ranges from small stencil pieces to massive mural-sized paintings. Walking these streets with attention creates a layered understanding of Bogotá: the colonial heritage preserved in the main plaza, and the contemporary resistance and expression visible in street art.",im:"A massive mural depicting indigenous warriors in traditional dress covers a building end, rendered in bold colors, pedestrians passing beneath, the work commanding attention.",t:"Self-guided walking through La Candelaria side streets. Metro to La Candelaria station. Maps available at tourism offices. Go during daylight. Many artists are out during weekdays. Photography is usually okay but ask permission. Support artists by purchasing small works if available.",c:[],r:"g",nn:"Ruta de Murales",ns:"Paseo autoguiado por arte callejero político y contemporáneo",nst:"Callejones de La Candelaria muestran arte callejero como expresión política y resistencia, mensajes sobre violencia, derechos indígenas, y cambio social.",nt:"Autoguiado por calles laterales. Metró a La Candelaria. Mapas disponibles. Luz natural. Fotografía usualmente permitida. Apoye artistas."},
  {id:26,n:"Chía (Day Trip) — Colonial Town",a:"Chía (Day Trip)",v:["history", "architecture", "food"],d:360,s:"A colonial mountain town 20 km north of Bogotá, known for its Friday and Saturday artisan markets, restaurants, and preserved colonial architecture.",st:"The town of Chía exists in a state of transition—retaining colonial character while experiencing pressure from Bogotá's sprawl and tourism development. The central plaza, bordered by a colonial church, hosts vibrant artisan markets on Fridays and Saturdays where vendors from surrounding rural areas sell produce, crafts, and prepared foods. The town is famous for certain restaurants like the massive Andres Carne de Res, but also contains smaller, more authentic eateries. Walking through Chía, you encounter a different pace than Bogotá: more rural, more connected to agricultural cycles, less frantic. The surrounding mountains and agricultural areas provide context for understanding Bogotá's relationship to the countryside it depends on.",im:"The colonial plaza glows in morning light as vendors arrange produce and crafts, the church's white facade dominating, local people shopping and socializing.",t:"20 km north of Bogotá (30-45 minutes by car or minibus). Easiest via organized tour or rented car. Friday and Saturday markets are most lively. Go early morning for best selection. Bring cash for vendors. Many restaurants, particularly around the main plaza.",c:[],r:"g",nn:"Chía",ns:"Pueblo colonial con mercados de artesanos los viernes-sábados",nst:"A 20km de Bogotá, Chía mantiene carácter colonial mientras experimenta presión de sprawl; mercados vibrantes conectan ciudad a zonas rurales.",nt:"20km norte de Bogotá (30-45 min en auto). Viernes-sábados mercados. Mañana temprano. Traiga efectivo para vendedores. Muchos restaurantes."},
  {id:27,n:"Montserate Hiking Alternative",a:"Monserrate",v:["nature", "history", "views"],d:45,s:"The hiking trail ascending Monserrate mountain as an alternative to cable car, offering intimate mountain experience and arriving at the basilica on foot.",st:"While the cable car is convenient, many visitors choose to hike the mountain trail ascending Monserrate. The hiking trail winds through cloud forest, gaining elevation gradually, allowing time to acclimatize to altitude and observe the ecosystem. The path is used by local pilgrims—many of whom hike weekly as spiritual practice—and by visitors seeking physical engagement with the mountain. The ascent takes 45 minutes to an hour, depending on fitness level and altitude adaptation. Arriving at the basilica on foot creates a different experience than cable car arrival: the accomplishment of physical effort, the gradual emergence from cloud into clarity, the sense of pilgrimage rather than tourism.",im:"A hiker on a mountain trail pauses for breath, the path winding through dense cloud forest, visibility limited to 20 meters, the mountain atmosphere mysterious and intimate.",t:"Trail head accessible from the mountain's base (near cable car station). Allow 1-2 hours total (ascent plus time at basilica). Start early to avoid afternoon clouds. The altitude affects many visitors—go slowly. Bring plenty of water. Good hiking shoes essential. The trail can be muddy.",c:[],r:"g",nn:"Senderismo a Monserrate",ns:"Ascenso a pie alternativo al teleférico a través de bosque nuboso",nst:"La senda de peregrinación sube a través de bosque nuboso, ofreciendo experiencia física e íntima de la montaña sagrada.",nt:"Inicio de sendero cerca estación teleférico. Permita 1-2 horas. Comience temprano. Altitud afecta muchos. Mucha agua. Calzado bueno. Sendero puede estar enlodado."},
  {id:28,n:"Exito Downtown Shopping",a:"Centro",v:["local", "architecture"],d:30,s:"A historic department store building in downtown Bogotá representing mid-20th century retail architecture and consumerism in a multi-story shopping experience.",st:"The Exito building in downtown Bogotá represents an earlier phase of Colombian modernization—the mid-20th century expansion of consumer culture. The building's architecture, designed to showcase goods and facilitate shopping, is a historical artifact itself. Walking through multiple floors of merchandise—from electronics to clothing to cosmetics—provides insight into what Colombians consume and value. The building is popular with locals rather than tourists, making it a window into contemporary consumer life. The surrounding downtown area has experienced some decline but maintains architectural significance.",im:"The interior of a department store, floors stretching upward, shelves laden with merchandise, shoppers moving between sections, escalators connecting the levels.",t:"Located in downtown Centro. Metro access. Open daily for shopping. Allow 1-2 hours. Not a typical tourist attraction but reflects actual Colombian consumption patterns. The building itself shows signs of age but remains functional.",c:[],r:"g",nn:"Exito Centro",ns:"Tienda departamental con arquitectura de mitad del siglo XX",nst:"Edificio representa fase anterior de modernización colombiana; refleja patrones de consumo y valores de población local.",nt:"Centro. Acceso metró. Abierto para compras diarias. Permita 1-2 horas. No atracción turística típica pero refleja vida colombiana actual."},
  {id:29,n:"Universidad de Los Andes Campus",a:"Teusaquillo",v:["architecture", "hidden", "local"],d:25,s:"One of Colombia's elite universities with distinctive modernist campus architecture, student culture, and public spaces reflecting intellectual life.",st:"The Universidad de Los Andes campus in Teusaquillo represents Colombian intellectual life and modernist architecture. The campus, designed in the 1950s-60s, embodies educational ideals: open courtyards, libraries designed as public spaces, amphitheaters for lectures and performances. Walking the campus, you encounter students, academic life, intellectual culture. The library is one of Colombia's finest, and parts of the campus are architecturally significant. The university represents educational aspiration and represents both traditional and progressive intellectual traditions in Colombia.",im:"A campus courtyard frames modernist buildings, students studying on grass, the architectural lines clean and geometric, shade trees providing respite.",t:"Located in Teusaquillo. Metro access. Campus is generally open to visitors during daylight. Respectful behavior required. The library is particularly worth seeing. Cafés on campus serve good coffee. The student population adds vitality.",c:[],r:"g",nn:"Campus Universidad de Los Andes",ns:"Campus modernista reflejando vida intelectual colombiana",nst:"Campus de 1950-60 representa ideales educativos: espacios abiertos, bibliotecas públicas, anfiteatros para conferencias y performances intelectuales.",nt:"Teusaquillo. Acceso metró. Abierto durante el día. Comportamiento respetuoso. Biblioteca particularmente digna. Cafés de campus con buen café."},
  {id:30,n:"Usaquén Church and Plaza",a:"Usaquén",v:["architecture", "history", "local"],d:20,s:"A colonial church and surrounding plaza in Usaquén neighborhood representing village-scale religious architecture preserved within the expanding city.",st:"The Church of Usaquén, built in colonial times, stands at the heart of the neighborhood that retains its own identity. The church is modest compared to grand cathedrals, reflecting the scale of a village religious life. The plaza surrounding it has become a vibrant market and gathering space, particularly on weekends when artisans display crafts. The juxtaposition of colonial religious architecture with contemporary market culture reveals how traditional spaces adapt and remain relevant. The church represents centuries of spiritual practice, while the market represents contemporary creative expression—both occupying the same plaza.",im:"The church's white facade glows in afternoon light as a market surrounds it, colorful vendor stalls, people browsing crafts, the historic and contemporary overlapping.",t:"Located in Usaquén. Metro to Usaquén station. The plaza is vibrant on weekends when markets are active. Allow 30 minutes to explore church and plaza. Respectful behavior in the church. Many cafés and restaurants surround the plaza.",c:[],r:"g",nn:"Iglesia y Plaza de Usaquén",ns:"Iglesia colonial y plaza de escala village en el corazón de barrio",nst:"Iglesia colonial se mantiene modesta; plaza rodea con mercado contemporáneo, mostrando cómo espacios históricos se adaptan y permanecen relevantes.",nt:"Usaquén. Metró a Usaquén. Plaza vibrant los fines de semana. Permita 30 minutos. Comportamiento respetuoso. Cafés y restaurantes alrededor."}
,
  {id:31,n:"Monserrate Cable Car — Mountain Sanctuary Above the City",a:"East of Centre",v:["beautiful","hiking","day_trips"],d:30,s:"A cable car climbs to a mountain sanctuary at 3,152 metres—the views of Bogotá below are extraordinary and the air is cool and quiet.",st:"Monserrate is a mountain sanctuary above Bogotá. The cable car takes 10 minutes. At the top, locals come to visit the church and pray.",im:"Rising in the cable car. The city dropping below. Mountains beyond. The sanctuary appearing. Cool air.",t:"Take a cable car from the base station (entry: 16,000 COP roundtrip). Open daily 8am–5pm. Go morning for clearer views. The walk around the top is free.",c:["beautiful","day_trips"],r:"y",nn:"Monserrate",ns:"Un teleférico sube a un santuario de montaña a 3.152 metros.",nst:"Monserrate es un santuario de montaña sobre Bogotá. El teleférico tarda 10 minutos.",nt:"Tome un teleférico desde la estación base."},
  {id:32,n:"La Candelaria — Colonial Architecture and Museums",a:"Old Centre",v:["neighborhoods","history","local"],d:5,s:"The oldest neighbourhood in Bogotá with colonial buildings, narrow streets, museums, and bars—it's touristy but real at the same time.",st:"La Candelaria is Bogotá's old quarter. The buildings are colonial, the streets are narrow, and the vibe is bohemian.",im:"A narrow street. Old buildings. Colorful doors. A cafe spilling onto the sidewalk. The sound of Spanish.",t:"Explore on foot starting from Plaza de Bolivar. Museums are scattered throughout (Gold Museum is essential). Budget 30,000–50,000 COP for entry fees. Go morning for quieter experience.",c:["neighborhoods","history"],r:"g",nn:"La Candelaria",ns:"El barrio más antiguo de Bogotá con arquitectura colonial.",nst:"La Candelaria es el barrio antiguo de Bogotá.",nt:"Explora a pie comenzando desde la Plaza de Bolívar."},
  {id:33,n:"Usaquén Neighbourhood — Weekend Market and Cafes",a:"North of Centre",v:["neighborhoods","markets","local"],d:40,s:"A bohemian neighbourhood north of the city with street art, vintage shops, and weekend markets—locals gather here for coffee and people-watching.",st:"Usaquén is Bogotá's artistic neighbourhood. The streets are narrow. The buildings are colonial. The cafes are good. On weekends, a craft market fills the streets.",im:"A street filled with people and stalls. Artwork on walls. Cafe tables. The smell of fresh coffee.",t:"Take Metro to Usaquén station. Go Thursday evening or Saturday morning for the market. Wander the side streets. Eat at any of the many cafes.",c:["neighborhoods","markets"],r:"g",nn:"Usaquén",ns:"Un barrio bohemio al norte de la ciudad con arte callejero.",nst:"Usaquén es el barrio artístico de Bogotá.",nt:"Toma el Metro hasta la estación de Usaquén."},
  {id:34,n:"Gold Museum — The World's Largest Pre-Hispanic Gold Collection",a:"La Candelaria",v:["greatest_hits","history","museums"],d:5,s:"The Gold Museum holds 55,000 pre-Hispanic gold artifacts—the collection is the largest in the world and genuinely extraordinary.",st:"The Gold Museum in Bogotá is one of the world's best museums. The artifacts are direct from pre-Hispanic civilizations. The display is brilliant.",im:"Inside the museum. Gold glinting in light. Intricate pieces. The history of civilizations in objects. Quiet. Careful.",t:"Located in La Candelaria. Entry: 18,000 COP weekday, 20,000 COP weekend. Open Tue–Sun 9am–6pm. Go morning for fewer crowds. Allow 2–3 hours.",c:["greatest_hits","history"],r:"g",nn:"Museo del Oro",ns:"El Museo del Oro contiene 55.000 artefactos de oro precolombinos.",nst:"El Museo del Oro en Bogotá es uno de los mejores museos del mundo.",nt:"Ubicado en La Candelaria. Entrada: 18.000 COP entre semana.,
  {id:35,n:"Monserrate Sanctuary — Mountain Basilica",a:"East Mountain",v:["beautiful"],d:30,s:"Hilltop basilica at 3,152m with cable car ascent — colonial architecture and city views from above the clouds",st:"Take the cable car 800m up the mountainside. The basilica sits in cool air. On clear days, you see the entire city below. Pilgrims come year-round.",im:"The cable car ascending through mist. A white basilica emerging from clouds. The city far below.",t:"Cable car 20,000 COP. Warm jacket required. Go early morning for clearest views. Respectful dress for the sanctuary.",c:["greatest_hits"],r:"g",nn:"Santuario de Monserrate",ns:"Santuario en la cima de la montaña — vistas de la ciudad desde las nubes",nst:"Toma el teleférico subiendo. La basílica se sienta en aire fresco.",nt:"Teleférico 20,000 COP. Chaqueta cálida. Mañana temprano."},
  {id:36,n:"Botero Museum — Art in Colonial Building",a:"La Candelaria",v:["beautiful"],d:30,s:"120+ works by Fernando Botero — his signature distorted figures and surreal scenes in a restored colonial mansion",st:"Botero was Colombia\'s most famous artist. His paintings show exaggerated figures and everyday scenes. The collection sits in a beautifully restored colonial house. Free admission.",im:"Oversized figures with impossible proportions. Bright colors. Surreal domestic scenes painted in rich detail.",t:"Free entry. La Candelaria. Near Gold Museum. 1-2 hours. Go Wednesday or weekend.",c:["greatest_hits"],r:"g",nn:"Museo Botero",ns:"120+ obras de Fernando Botero — figuras distorsionadas y escenas surrealistas",nst:"Las obras de Botero muestran figuras exageradas y escenas cotidianas.",nt:"Entrada gratuita. La Candelaria. 1-2 horas."},
  {id:37,n:"Paloquemao Market — Produce and Chaos",a:"Downtown",v:["beautiful"],d:30,s:"Working farmers market — fresh tropical fruit, vegetables, flowers — authentic Bogotá energy and flavors",st:"Mornings are intense. Vendors shout. The smell of fresh fruit and flowers fills the air. You see fruits you\'ve never heard of. Watch out for pickpockets; it\'s crowded.",im:"Stacks of colorful tropical fruit. Vendors with machetes cutting samples. The chaos and energy of a working market.",t:"Free to walk. Best 6-9am. Watch your belongings. Cash only. Sample tropical fruit varieties.",c:["greatest_hits"],r:"g",nn:"Mercado de Paloquemao",ns:"Mercado de agricultores — fruta tropical fresca, verduras, flores",nst:"Las mañanas son intensas. Vendedores gritan. Olor a frutas frescas.",nt:"Gratis. Mejor 6-9am. Cuidado con tus pertenencias. Efectivo."},
  {id:38,n:"Usaquén Sunday Market — Artisan Crafts",a:"Usaquén",v:["beautiful"],d:30,s:"Weekly artisan market in a restored colonial neighborhood — handmade crafts, antiques, food stalls, street performers",st:"Sundays only. Locals and tourists mix in plazas filled with vendors. You find handmade jewelry, paintings, vintage items. Musicians perform.",im:"A plaza packed with vendors. Local musicians playing. Someone buying a hand-painted tile. Children running between stalls.",t:"Free to walk. Sunday 8am-3pm. Cash preferred. Start early for best items. This is where Bogotá mingles.",c:["greatest_hits"],r:"g",nn:"Mercado de Usaquén",ns:"Mercado artesanal semanal en barrio colonial restaurado",nst:"Domingos solamente. Locales y turistas se mezclan entre vendedores.",nt:"Gratis. Domingos 8am-3pm. Efectivo preferido. Comienza temprano."},
  {id:39,n:"Zipaquirá Salt Cathedral — Underground Marvel",a:"Zipaquirá (Day Trip)",v:["beautiful"],d:30,s:"Cathedral carved inside a salt mine 180m underground — massive nave with 14 chapels — architecture in rock salt",st:"Drive 45km north to Zipaquirá. Descend into a salt mine where locals carved a functioning cathedral. The scale is enormous; the salt glows in colored light. It\'s surreal and peaceful.",im:"Carved pillars of salt. A nave the size of a cathedral. Colored light on salt walls. The quiet echo of footsteps.",t:"30,000 COP entry. 45km north, 45-minute drive. Guided tours available. Wear warm clothes; it\'s 12°C underground.",c:["greatest_hits"],r:"g",nn:"Catedral de Sal",ns:"Catedral tallada dentro de una mina de sal — arquitectura en roca de sal",nst:"Desciende a una mina de sal donde los locales tallaron una catedral.",nt:"30,000 COP entré. 45km al norte. Tours guiados. Ropa cálida. 12°C subterráneo."}];
