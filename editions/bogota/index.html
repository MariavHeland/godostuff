  {id:40,n:"La Candelaria Walking Tour — Colonial Heart",a:"La Candelaria",v:["history","neighborhoods","art"],d:120,s:"The historic colonial center with colorful buildings, museums, street art, and the graffiti scene all within walking distance.",st:"La Candelaria is Bogotá\'s oldest neighborhood, built on a grid by Spanish colonizers. The streets are lined with colonial buildings painted in pastels—blues, yellows, oranges. The neighborhood has museums (Botero, Gold Museum, National Museum), street art covering entire blocks, and street food vendors. The architecture tells the story of Spanish colonization and its aftermath. The neighborhood is both touristy and authentically bohemian—artists, street vendors, and locals share the same space.",im:"A narrow street lined with colonial buildings, colorful murals covering lower walls, tourists and locals mixing, street musicians performing.",t:"Start at Carrera 7, the main street. Walk slowly—buildings are worth photographing. Go during daylight (8am-4pm) for safety. Street vendors sell everything. Allow 3-4 hours. The neighborhood gets less safe after dark. Wear a daypack, not a backpack.",c:["history","neighborhoods","art"],r:"g",nn:"La Candelaria",ns:"Centro histórico colonial con color y arte urbano",nst:"Candelaria es el barrio más antiguo, construido en grid por colonizadores españoles.",nt:"Comienzo en Carrera 7. Camina lentamente. De día (8-16h) para seguridad. Permite 3-4 horas. Menos seguro después del anochecer."},
  {id:41,n:"Monserrate Church at Sunrise — Funicular to Heaven",a:"Monserrate",v:["beautiful","highest_spots","greatest_hits"],d:60,s:"A cable car/funicular up a 3,152m mountain to a colonial church, with views over Bogotá and the Andes.",st:"Monserrate sits at 3,152 meters above Bogotá. A funicular climbs to a colonial church that\'s been a pilgrimage site for centuries. The view at sunrise is extraordinary—the city below still in shadow, the mountains beyond glowing pink and gold. The church is simple, authentic, working. Pilgrims come for the spiritual experience. Tourists come for the view. Both are valid. The mountain is colder than the city below (bring a layer).",im:"Sunrise light illuminating the valley below while the church sits on the mountain ridge, the city barely visible in morning mist.",t:"Funicular from the base station (lower than cable car entrance). Early morning departures start around 7am. Go for sunrise. The cable car is more touristy, the funicular more local. Budget 40-60 BRL. Allow 3 hours including travel.",c:["beautiful","highest_spots","greatest_hits"],r:"y",nn:"Monserrate",ns:"Iglesia colonial a 3,152m con vistas del amanecer",nst:"Monserrate es sitio de peregrinación con vistas extraordinarias al amanecer.",nt:"Funicular desde estación base. Salidas tempranas alrededor de 7am. Presupuesto 40-60 BRL. Permita 3 horas."},
  {id:42,n:"Usaquén Sunday Flea Market — Hipster + History",a:"Usaquén",v:["markets","neighborhoods","local"],d:180,s:"Every Sunday, this colonial neighborhood turns into an open-air artisan market with crafts, food, coffee, and live music.",st:"Usaquén was a colonial village outside Bogotá. As the city grew, it was absorbed but retained its character. On Sundays, the main plaza becomes a market: hundreds of vendors selling crafts, art, jewelry, books. Local musicians perform. Street vendors sell arepas, tamales, fresh juices. It\'s bohemian and touristy at once. The surrounding neighborhood has cafés, restaurants, and antique shops. The town itself is beautiful—preserved colonial architecture mixed with modern life.",im:"A crowded plaza filled with artist stalls, colorful crafts on display, musicians performing, the church tower visible in the background.",t:"Sundays only, market runs 10am-6pm. Take Metro Line A to Usaquén station. The market gets crowded after noon. Go mid-morning. Bring cash—many vendors don\'t use cards. Allow 3-4 hours. The neighborhood is worth exploring beyond the market.",c:["markets","neighborhoods","local"],r:"g",nn:"Usaquén",ns:"Mercado hippie dominical en pueblo colonial",nst:"Usaquén era pueblo colonial. Los domingos se transforma en mercado artesanal.",nt:"Domingos 10h-18h. Metro Línea A hasta Usaquén. Mercado lleno después de mediodía. Vai a media mañana. Efectivo. Permita 3-4 horas."},
  {id:43,n:"Paloquemao Market at Dawn — Where Bogotá Eats",a:"Paloquemao",v:["markets","food","local"],d:60,s:"A massive wholesale produce and meat market where chefs shop—visit at dawn when it\'s most alive with vendors and deals.",st:"Paloquemao is where Bogotá\'s restaurants source ingredients. It\'s not a tourist market—it\'s a working wholesale market. At dawn (5-7am), it\'s most alive: vendors shouting, trucks arriving, produce being arranged. You see vegetables you\'ve never seen before, flowers in mind-bending colors, meat being butchered. Eating here is cheap: market vendors serve cheap arepas, fresh juice, huevos rancheros. The experience is overwhelming and real.",im:"A vendor arranging pyramids of tomatoes in the early morning light, other vendors calling out, the market a chaos of color and commerce.",t:"Go before 8am. Get there by taxi (tell driver \'Paloquemao\' or \'Central de Abastos\'). The market is at street level, no special entrance. Wear old clothes—it\'s wet and messy. Bring cash. Street vendors serve breakfast. Allow 1-2 hours. It\'s safe during market hours, chaotic but fine.",c:["markets","food","local"],r:"g",nn:"Paloquemao",ns:"Mercado mayorista donde come Bogotá",nst:"Paloquemao es donde restaurantes compran ingredientes. Wholesale, no turístico.",nt:"Antes de 8h. Taxi hasta Paloquemao o Central de Abastos. Ropa vieja. Efectivo. Desayuno de vendedores. Permita 1-2 horas."},
  {id:44,n:"Ciclovía Sunday — 120km of Closed Streets",a:"Various",v:["sport","free_culture","local"],d:120,s:"Every Sunday, major streets are closed to cars and filled with cyclists, joggers, skateboarders, and families—a reimagined city.",st:"Ciclovía is Bogotá\'s weekly celebration of public space. From early morning until afternoon, 120 kilometers of roads are closed to cars. Thousands of people take over: cycling, jogging, skateboarding, walking, dancing. It\'s a transformation of the city—the streets become communal spaces. The vibe is joyful and local. Vendors set up along the route selling food and drinks. It\'s one of Bogotá\'s defining cultural experiences.",im:"A massive crowd of cyclists and joggers filling a city street that\'s usually filled with cars, the street stretching into the distance.",t:"Sundays 7am-2pm. The main route (Carrera 7) is always closed. It\'s free. Rent a bike (20-40 BRL/hour) or walk. Go early for fewer crowds. Bring water. The route connects different neighborhoods—you see the whole city. Safety is good during Ciclovía.",c:["sport","free_culture"],r:"g",nn:"Ciclovía",ns:"120km de calles cerradas cada domingo para comunidad",nst:"Ciclovía cierra 120km de calles cada domingo. Miles de personas celebran el espacio público.",nt:"Domingos 7h-14h. Ruta principal (Carrera 7) siempre cerrada. Libre. Renta bicicleta (20-40 BRL/hora). Madrugada. Agua. Permita 2-3 horas."},
  {id:45,n:"Museo del Oro (Gold Museum) — Pre-Columbian Treasures",a:"La Candelaria",v:["history","art","greatest_hits"],d:120,s:"The world\'s largest collection of pre-Columbian gold artifacts—30,000 pieces telling stories of ancient South America.",st:"The Gold Museum houses 30,000 pre-Columbian gold objects. The collection is extraordinary: ceremonial masks, llama figurines, jewelry, ritual objects. The objects tell the story of ancient cultures: the Muisca, the Quimbaya, the Nariño. The building itself is modern and designed beautifully to display the gold. The collection represents centuries of artistic achievement before Columbus. It\'s one of the most important museums in the Americas.",im:"A wall of golden masks glowing under museum lighting, each face unique, the gold catching and reflecting light.",t:"Located in La Candelaria. Metro to Biblioteca Público or Colegio station. Admission is modest (20-30 BRL). Open Tuesdays through Sundays, 9am-6pm. Allow 2-3 hours. Don\'t rush through—it rewards slow viewing. Photography usually allowed.",c:["history","art","greatest_hits"],r:"g",nn:"Museo del Oro",ns:"Colección mundial de artefactos de oro precolombinos",nst:"30,000 piezas de oro precolombino contando historias de culturas antiguas.",nt:"La Candelaria. Metrô hasta Biblioteca o Colegio. Entrada modesta (20-30 BRL). Martes-domingo 9h-18h. Permita 2-3 horas."},
  {id:46,n:"Botero Museum (Museo Botero) — Abundant Figures",a:"La Candelaria",v:["art","beautiful","history"],d:60,s:"The life work of Colombian artist Fernando Botero, known for voluptuous, exaggerated human figures—funny, provocative, deeply Colombian.",st:"Fernando Botero created a unique artistic language: figures that are oversized, voluptuous, exaggerated. Women\'s breasts and hips swell beyond reality. Men\'s bellies expand. Animals grow absurdly large. It\'s both absurd and profound—a commentary on Latin American culture, sensuality, and abundance. The museum houses his paintings, sculptures, and some works by other artists he collected. Botero is one of Colombia\'s most important contemporary artists.",im:"A painting of an impossibly voluptuous woman on a horse, the style unmistakable, the colors bright, the image both funny and sensual.",t:"Located in La Candelaria. Metro to Biblioteca or Colegio. Admission is modest (20-30 BRL). Open Tuesdays through Sundays, 10am-5pm, closed Mondays. Allow 1-2 hours. The collection is manageable in size. It\'s worth reading about Botero\'s life to understand the context.",c:["art","beautiful"],r:"g",nn:"Museo Botero",ns:"Obra de vida del artista Fernando Botero",nst:"Figuras voluptuosas y exageradas que comentan sobre cultura y sensualidad latinoamericana.",nt:"La Candelaria. Metrô. Entrada modesta (20-30 BRL). Martes-domingo 10h-17h. Permita 1-2 horas."},
  {id:47,n:"Zipaquirá Salt Cathedral — Underground Marvel",a:"Zipaquirá (Day Trip)",v:["day_trips","history","weird"],d:240,s:"A cathedral carved entirely from salt 200 meters underground, with naves, altars, and artwork carved from the salt walls.",st:"Zipaquirá is a salt mining town 50km from Bogotá. Deep underground, miners have carved an entire cathedral from salt rock. The structure includes multiple naves, an altar, and religious artwork—all made from salt. It\'s surreal and moving. You descend into the mountain, surrounded by salt, in a space that\'s both spiritual and geological. It\'s unique in the world.",im:"An underground cathedral with vaulted ceilings and an altar, all carved from salt rock, lit by artificial light, the walls crystalline.",t:"Direct buses from Bogotá to Zipaquirá (1.5 hours, 15-20 BRL). From town, taxi or tour to salt mines. Tour groups are mandatory. Admission is modest (30-50 BRL). Tours take 1 hour inside. It\'s cold underground—bring a jacket. Allow 4-5 hours including travel. The town has restaurants.",c:["day_trips","history","weird"],r:"g",nn:"Catedral de Sal",ns:"Catedral excavada de sal a 200m bajo tierra",nst:"Miners han tallado una catedral completa de roca de sal con naves, altares, y arte religioso.",nt:"Autobús directo desde Bogotá (1,5 horas, 15-20 BRL). Tours obligatorios. Entrada modesta (30-50 BRL). Frío—traje jaqueta. Permita 4-5 horas."},
  {id:48,n:"Zona T & Zona G Nightlife — Modern Bogotá",a:"Zona T / Zona G",v:["neighborhoods","food","weird"],d:120,s:"Two hip neighborhoods (Zona T = Travestía, Zona G = Gastronomía) with boutiques, restaurants, bars, and the city\'s modern social scene.",st:"Zona T and Zona G are where modern Bogotá plays. Zona T is the traditional shopping/nightlife district with bars and clubs. Zona G (also called Andrés Carne de Res area) is the newer gastronomic zone with trendy restaurants and upscale bars. Both neighborhoods are safe, walkable, and filled with Colombians (not just tourists). The energy is young, fashion-forward, and urbane.",im:"A street lined with boutiques and bars, people dining outside, the atmosphere upscale and lively.",t:"Both zones are best at night (9pm+). Take Metro to Calle 72 or Carrera 7. Safe neighborhoods. Drinks are expensive (40-80 BRL). Restaurant meals range from 60-150 BRL. Budget 150-200 BRL for an evening. It\'s worth experiencing contemporary Bogotá culture.",c:["neighborhoods","food"],r:"g",nn:"Zona T y Zona G",ns:"Barrios modernos con boutiques, restaurantes y vida nocturna",nst:"Zona T y Zona G donde Bogotá moderna juega y come.",nt:"Mejor por la noche (21h+). Metrô. Seguro. Bebidas caras (40-80 BRL). Cena 60-150 BRL. Presupuesto 150-200 BRL."},
  {id:49,n:"Teatro Colón — Opulent Performance Venue",a:"Centro",v:["architecture","history","beautiful"],d:45,s:"An ornate 1892 theater with opulent interior, hosting opera, ballet, and theater in one of South America\'s most important venues.",st:"The Colón Theater opened in 1892 and represents Bogotá\'s golden era ambitions. The interior is overwhelming in its detail: red velvet, gold leaf, marble columns, hand-painted ceiling frescoes. It hosted the world\'s greatest performers of its era. It remains a functioning theater hosting opera, ballet, and theater. A tour of the theater is as much about architecture as about performance history.",im:"The ornate interior with multiple balconies, red and gold decoration, painted ceiling, the orchestra pit visible below.",t:"Located in Centro. Metro to Colegio or Biblioteca. Tours available on days without performances. Admission is modest (20-30 BRL). If you attend a performance, book ahead. Allow 1-2 hours for a tour.",c:["architecture","history"],r:"g",nn:"Teatro Colón",ns:"Teatro opulento de 1892 con interior de oro y terciopelo",nst:"Colón abrió en 1892, representa ambiciones de era dorada de Bogotá.",nt:"Centro. Metrô. Tours en días sin performances. Entrada modesta (20-30 BRL). Si asiste función, reserve."},
  {id:50,n:"Simón Bolívar Park — Emerald Escape",a:"Parque Bolívar",v:["parks","nature","free_culture"],d:90,s:"A 100+ hectare park with walking trails, sports facilities, and a lake—the green heart of Bogotá used by locals.",st:"While Monserrate offers mountain views, Simón Bolívar Park is where Bogotá comes for nature. The park has walking trails through forests, a lake with bird watching, sports courts, and spaces for recreation. It\'s used heavily by locals—joggers, cyclists, families. The air is clearer than the city. You see the mountains in the distance. It\'s peaceful and real.",im:"A walking path through green woods with distant views of mountains, a few joggers visible, the city noise fading.",t:"Metro access points on multiple sides. Free entry. Go during daylight (7am-5pm). The park is safe during peak hours but less safe at night. Bring water. Allow 1-3 hours depending on how much you walk.",c:["parks","nature"],r:"g",nn:"Parque Simón Bolívar",ns:"Parque verde de 100+ hectáreas con senderos y lago",nst:"Corazón verde donde Bogotá viene a la naturaleza.",nt:"Acceso metrô múltiple. Entrada gratuita. De día (7h-17h). Seguro en horas pico. Agua. Permita 1-3 horas."},
  {id:51,n:"Parque 93 — Upper-Class Green Space",a:"Parque 93",v:["neighborhoods","parks","local"],d:45,s:"A more upscale park in the north with running tracks, cafés, and shops—where wealthy Bogotanos walk and meet.",st:"Parque 93 is different from Simón Bolívar. It\'s a square-block park in an affluent neighborhood with a running track, upscale cafés, and restaurants. It\'s where Bogotá\'s wealthy come to be seen. The cafés are expensive and good. The atmosphere is more fashion-focused than family-focused. It\'s an interesting contrast to other parks—showing how class shapes even green space use in the city.",im:"A clean, manicured park with a running track, people in expensive workout clothes, cafés on the periphery.",t:"Located in north Bogotá. Metro to Parque 93 station. Free entry to park. Cafés and restaurants charge accordingly (meals 60-100 BRL). It\'s a nice place to sit and observe modern Bogotá. Allow 1-2 hours.",c:["neighborhoods","parks"],r:"g",nn:"Parque 93",ns:"Parque de clase alta con cafés y tiendas",nst:"Parque donde Bogotá rica se reúne y es vista.",nt:"Norte de Bogotá. Metrô. Entrada gratuita. Cafés 60-100 BRL. Permita 1-2 horas."},
  {id:52,n:"Mercado de Pulgas San Alejo — Flea Market Experience",a:"Parque San Alejo",v:["markets","neighborhoods","local"],d:120,s:"A weekend flea market in the Parque San Alejo plaza with antiques, art, crafts, and food from local vendors.",st:"Different from Usaquén, the San Alejo market is smaller, more focused on antiques, vintage items, and local crafts. It\'s less touristy and more local. The food is authentic—fresh juices, tamales, empanadas. The artwork is by actual artists rather than mass-produced. It feels more authentic than the larger weekend markets.",im:"A plaza filled with vendor stalls and antique displays, art visible everywhere, people browsing and eating.",t:"Saturdays and Sundays. Located in the Parque San Alejo neighborhood (northwest Bogotá). Market runs 10am-6pm. Take Metro or taxi. Bring cash. Allow 2-3 hours. The neighborhood is walkable and has restaurants.",c:["markets","neighborhoods","local"],r:"g",nn:"Mercado San Alejo",ns:"Mercado de pulgas con antigüedades y arte local",nst:"Mercado de fin de semana, más pequeño y auténtico que Usaquén.",nt:"Sábados y domingos. Noroeste Bogotá. 10h-18h. Metrô o táxi. Efectivo. Permita 2-3 horas."},
  {id:53,n:"Quinta de Bolívar — Independence Hero Home",a:"La Candelaria",v:["history","architecture","beautiful"],d:45,s:"The restored home of Simón Bolívar, Latin America\'s independence hero, with period furnishings and political artifacts.",st:"Simón Bolívar liberated six nations (Colombia, Venezuela, Ecuador, Peru, Bolivia, Panama). He lived in this house in Bogotá. The home is preserved as it was, with his furniture, his books, his personal objects. It\'s a portrait of an intellectual warrior—someone who combined political action with philosophical study. The garden is beautiful. The house is intimate and moving.",im:"A period room with antique furniture, a wooden desk with papers, portraits on walls, windows overlooking a garden.",t:"Located in La Candelaria. Metro to Colegio or Biblioteca. Admission is modest (20-30 BRL). Open Tuesdays through Sundays, 10am-5pm. Tours available. Allow 1-2 hours. The house is small but rich with detail.",c:["history","architecture"],r:"g",nn:"Quinta de Bolívar",ns:"Casa del héroe de la independencia Simón Bolívar",nst:"Casa preservada con muebles de época y artefactos políticos.",nt:"La Candelaria. Metrô. Entrada modesta (20-30 BRL). Martes-domingo 10h-17h. Tours. Permita 1-2 horas."},
  {id:54,n:"Andrés Carne de Res — Dining as Experience",a:"Zona G / Chia",v:["food","neighborhoods","weird"],d:120,s:"An over-the-top steakhouse with chaotic décor, excellent meat, and live music—more theme park than restaurant.",st:"Andrés Carne de Res is a Colombian institution. The restaurant is intentionally chaotic: Christmas decorations year-round, objects hanging from the ceiling, a party atmosphere. The food is excellent—steaks, traditional Colombian dishes. The service is theatrical. It\'s not fine dining; it\'s celebratory dining. Every Colombian has been here. It\'s in the Zona G (newer location) or in Chía (the original, a day trip).",im:"A chaotic interior filled with colored lights and decorations, tables full of people eating steak, a live band playing on stage.",t:"Zona G location is easier to access (Metro to Calle 72). Chía location requires taxi/Uber (45 min from Centro). Both are open for lunch and dinner. Expect to pay 80-150 BRL per person with drinks. Make reservations—it\'s always crowded. It\'s an experience, not just a meal.",c:["food","neighborhoods","weird"],r:"g",nn:"Andrés Carne de Res",ns:"Restaurante de carnes con caos festivo y música en vivo",nst:"Institución colombiana. Comida excelente en atmósfera teatral.",nt:"Zona G (metrô) o Chía (original, taxi). 80-150 BRL. Reserve—siempre lleno."},
  {id:55,n:"Craft Beer Culture — Brewing Revolution",a:"Chapinero",v:["food","neighborhoods","weird"],d:90,s:"Bogotá\'s craft beer scene is exploding—breweries, beer bars, and a young community celebrating local brewing.",st:"Colombian craft beer is growing. Breweries like Cervecería Artesanal Bogotá, Monserrat Brewery, and dozens of others are creating interesting beers. The scene is young, fashionable, and genuinely creative. Many breweries have taprooms where you can taste and drink. The community is welcoming and knowledgeable. It\'s a very different Bogotá from the traditional culture—young, experimental, globalized.",im:"A brewery taproom with stainless steel tanks visible, people at a bar tasting craft beers, modern industrial aesthetics.",t:"Breweries are scattered throughout the city, especially in Chapinero and northern neighborhoods. Take Metro or taxi. Beer tastings cost 20-50 BRL. Many have food. It\'s safe and fun. Allow 2-3 hours for brewery tour and tasting.",c:["food","neighborhoods","weird"],r:"g",nn:"Cervecería Artesanal",ns:"Escena de cerveza artesanal en crecimiento",nst:"Cervecerías crean cervezas interesantes en atmósfera joven.",nt:"Chapinero y norte. Metrô o táxi. Degustaciones 20-50 BRL. Seguro. Permita 2-3 horas."},
  {id:56,n:"National Museum of Colombia — Vast History",a:"Centro",v:["history","art","free_culture"],d:120,s:"Colombia\'s most important museum with art from pre-Columbian to contemporary, housed in a former prison building.",st:"The National Museum is housed in a former prison built in the 1880s. The building itself is historically significant. Inside, the collection spans pre-Columbian to contemporary art. The museum tells the story of Colombian culture over millennia. It\'s comprehensive and well-curated. It requires time to experience properly.",im:"A gallery space with paintings on white walls, pre-Columbian artifacts in glass cases, and the soaring architecture of the former prison visible.",t:"Located in Centro. Metro to Museo Nacional station. Admission is modest (20-30 BRL). Open Tuesdays through Sundays, 10am-6pm. Allow 2-4 hours depending on what interests you. The building tours are available.",c:["history","art"],r:"g",nn:"Museo Nacional de Colombia",ns:"Museo más importante con arte precolombino a contemporáneo",nst:"Colección abarca milenios de cultura colombiana.",nt:"Centro. Metrô. Entrada modesta (20-30 BRL). Martes-domingo 10h-18h. Permita 2-4 horas."},
  {id:57,n:"La Macarena Neighborhood — Hipster Heart",a:"La Macarena",v:["neighborhoods","art","food"],d:120,s:"A bohemian neighborhood with street art, galleries, small restaurants, and young Bogotá culture.",st:"La Macarena is where young Bogotá lives. The streets are covered with street art. Small galleries show local artists. Restaurants range from casual to fine dining, all focused on experimentation. The vibe is creative, youthful, and international. It feels like a neighborhood that could be in Brooklyn or Berlin—but it\'s Bogotá and maintains its own character.",im:"A street corner with bright street art, small galleries, people with coffee and design glasses, a creative vibe.",t:"Located north of Centro. Metro to Colegio, then walk, or take Uber. Safe neighborhood. Restaurants range from 30-100 BRL. Street art is everywhere—photograph as you walk. Allow 3-4 hours. Go during the day for street art appreciation, evening for dining and bars.",c:["neighborhoods","art","food"],r:"g",nn:"La Macarena",ns:"Barrio bohemio con arte callejero y vida joven",nst:"Donde vive la Bogotá joven. Creatividad y experimentación.",nt:"Norte de Centro. Metrô o Uber. Seguro. Restaurantes 30-100 BRL. Permita 3-4 horas."},
  {id:58,n:"Chorro de Quevedo Plaza — Historic Bohemia",a:"Centro",v:["neighborhoods","history","local"],d:60,s:"The oldest plaza in Bogotá where the city began, now a bohemian gathering spot with cafés, bars, and musicians.",st:"Chorro de Quevedo is the plaza where Bogotá was founded in 1538. The colonial architecture remains. In modern times, it became a bohemian gathering place—artists, musicians, students. It\'s small and crowded but maintains authenticity. The cafés are cheap. The atmosphere is creative and slightly chaotic. It\'s the heart of bohemian Bogotá.",im:"A small plaza ringed by colonial buildings, street musicians playing, people drinking coffee at small tables, graffiti art on some walls.",t:"Located in Centro/La Candelaria area. Metro to Colegio or walk from other Centro sites. Free to visit. Cafés cost 10-20 BRL. It\'s safe during the day, less so at night. Go during afternoon/early evening for the best vibe. Allow 1-2 hours.",c:["neighborhoods","history","local"],r:"g",nn:"Chorro de Quevedo",ns:"Plaza más antigua donde Bogotá comenzó en 1538",nst:"Ahora lugar bohemio con cafés, bares, y músicos.",nt:"Centro/Candelaria. Metrô. Gratuito. Cafés 10-20 BRL. Tarde/atardecer mejor. De día seguro. Permita 1-2 horas."},
  {id:59,n:"Bogotá Graffiti Tour — Street Art as History",a:"Various",v:["art","neighborhoods","weird"],d:120,s:"Join a local street artist to understand Bogotá\'s graffiti scene, its politics, history, and the artists behind the walls.",st:"Bogotá has one of the world\'s most developed graffiti scenes. Street art covers entire blocks. It\'s not random vandalism—it\'s a cultural movement with roots in political resistance, artistic expression, and community identity. Tours with local artists give context. You learn which pieces are decades old, who the legendary artists are, what the symbols mean. It\'s a completely different way of reading the city.",im:"A massive wall covered in colorful, complex street art, the artist who created it visible in the image, explaining the meaning to tourists.",t:"Book through local tour companies or ask at hostels/hotels. Tours typically cost 40-60 BRL. Tours are usually 2-3 hours. Go with a guide—context matters. Most famous art is in La Candelaria but also scattered throughout the city. The scene changes constantly—new art appears weekly.",c:["art","neighborhoods","weird"],r:"g",nn:"Tour de Arte Callejero",ns:"Tour con artistas locales para entender la escena de graffiti",nst:"Bogotá tiene una de las escenas de graffiti más desarrolladas del mundo.",nt:"Reserva con tours locales. 40-60 BRL. 2-3 horas. Necesita contexto. Arte famoso en Candelaria. Constantemente cambia."},
  {id:60,n:"Bogotá Food Scene Evolution — From Traditional to Fusion",a:"Various",v:["food","neighborhoods","weird"],d:120,s:"Experience the range from traditional Colombian ajiaco (stew) to modern fusion cuisine, understanding how the city eats.",st:"Bogotá\'s food scene is transforming. Traditional Colombian food (ajiaco, bandeja paisa, empanadas) is still the foundation. But young chefs are experimenting—fusion cuisine mixing Colombian ingredients with Asian and European techniques. Street food remains excellent and cheap. Fine dining restaurants are growing. The food culture reflects Bogotá\'s modernity.",im:"A modern restaurant plating: deconstructed traditional Colombian food, artistic presentation, fusion techniques visible.",t:"Traditional food: street vendors (5-15 BRL), small restaurants (20-40 BRL). Modern fusion: 60-120 BRL. Street food walking tour is a fun way to explore. Go with local guides or use recommendations. Food is safe throughout the city. Allow 3-4 hours for a proper food exploration.",c:["food","neighborhoods"],r:"g",nn:"Escena Culinaria Bogotana",ns:"Desde comida tradicional a fusión moderna",nst:"Escena refleja la modernidad de Bogotá.",nt:"Tradicional: 5-40 BRL. Fusión: 60-120 BRL. Tours a pie. Seguro. Permita 3-4 horas."},
  {id:61,n:"Book Shops & Literary Culture — A Readers\' City",a:"Centro",v:["free_culture","neighborhoods","quiet"],d:90,s:"Bogotá has a strong literary tradition—bookshops, libraries, and a café culture where people read and discuss.",st:"Colombia has produced major writers (García Márquez, Vallejo). Bogotá celebrates reading. There are excellent bookshops (Libros Librería, Eslabón de Lujo), public libraries, and cafés where people read and discuss. The literary culture is alive. Many cafés are called "tertulias"—places for conversation and intellectual exchange. It\'s part of Bogotá\'s identity.",im:"A cozy bookshop café with wooden shelves, people reading, coffee cups on tables, conversation happening.",t:"Bookshops are scattered throughout the city, concentrated in Centro and La Macarena. Cafés cost 10-20 BRL. Allow 2-4 hours for browsing and café time. Even if you don\'t read Spanish, the literary culture is visible and worth experiencing.",c:["free_culture","neighborhoods"],r:"g",nn:"Librerías y Cultura Literaria",ns:"Bogotá tiene fuerte tradición literaria con librerías y cafés",nst:"Cultura literaria viva en tertulias y espacios de lectura.",nt:"Librerías en Centro y Macarena. Cafés 10-20 BRL. Permita 2-4 horas."},
  {id:62,n:"Altitude Acclimatization — Understanding Bogotá\'s 2,640m Reality",a:"Various",v:["weird","local","free_culture"],d:1,s:"Bogotá sits at 2,640m elevation. Your first day should include light activity, hydration, and respect for altitude impacts.",st:"Bogotá is very high. Denver is called the \'Mile High City\' at 1,600m. Bogotá is 1,000m higher. This affects your body: less oxygen, faster heart rate, potential altitude sickness. Many people feel fine immediately; some get headaches, fatigue, or nausea. The solution is slow activity the first day, lots of water, and rest. By day 2-3, most people acclimatize. The altitude affects everything: how you walk, how quickly you get tired, even how food tastes.",im:"A person sitting in a café, drinking water, looking slightly tired, the city visible at a high elevation in the background.",t:"Day 1: Arrive, settle, light activity, hydration. Skip alcohol and heavy exercise. Rest well. By day 2, normal activities. If altitude sickness occurs: headache, nausea, rest and hydration help. Take it seriously but don\'t panic. It\'s temporary.",c:["weird","local"],r:"g",nn:"Aclimatación a la Altura",ns:"Bogotá está a 2,640m—la altura afecta tu cuerpo",nst:"El cuerpo necesita tiempo para aclimatarse. Hidratos, descanso, paciencia.",nt:"Día 1: Ligera actividad, agua. Descansa. Día 2-3: normal. Si enfermedad de altura—reposo y agua."}

</div>}
{p.ef&&<p className="text-xs mt-3 pt-3" style={{color:"#555",lineHeight:1.7,borderTop:"1px solid #dcfce7"}}>🍔 {p.ef}</p>}
{p.sf&&<p className="text-xs mt-2" style={{color:"#555",lineHeight:1.7}}>🏠 {p.sf}</p>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
<div className="mt-5">
<p className="text-xs font-bold mb-2" style={{color:"#888",letterSpacing:"0.08em",textTransform:"uppercase"}}>City Moods</p>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} style={{borderRadius:10,overflow:"hidden",aspectRatio:"2/3",background:"#eee"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>)}</div></div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
const TBGS={"places":"https://mariavheland.github.io/godostuff/textures/tex01.png","collections":"https://mariavheland.github.io/godostuff/textures/tex07.png","missions":"https://mariavheland.github.io/godostuff/textures/tex07.png","plan":"https://mariavheland.github.io/godostuff/textures/tex07.png","phrases":"https://mariavheland.github.io/godostuff/textures/tex01.png","default":"https://mariavheland.github.io/godostuff/textures/tex01.png"};if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:"url('https://mariavheland.github.io/godostuff/textures/tex16.png') center/cover no-repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Bogotá Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Bogotá Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
