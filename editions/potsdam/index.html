  {id:84,n:"Cecilienhof Palace — Potsdam-Nord #84",a:"Potsdam-Nord",v:["history","hidden"],d:12,s:"English country house where Truman, Stalin and Churchill carved up the post-war world",st:"The Potsdam Conference of 1945 happened in this mock-Tudor mansion. The round table where the Big Three sat is still in place. The gardens are free to wander.",im:"Time-travel: August 1945 — three men deciding the fate of millions over a round table",t:"Gardens are free. Small fee for the conference rooms interior.",c:["local_only"],r:"g",nn:"Schloss Cecilienhof — Potsdam-Nord #84",ns:"Englisches Landhaus, wo Truman, Stalin und Churchill die Nachkriegswelt aufteilten",nst:"Die Potsdamer Konferenz 1945 fand in diesem Tudor-Herrenhaus statt. Der runde Tisch steht noch.",nt:"Gärten kostenlos. Kleiner Eintritt für die Konferenzräume."},
  {id:85,n:"Alter Markt & Nikolaikirche — Altstadt #85",a:"Altstadt",v:["history","beautiful"],d:29,s:"Rebuilt baroque square with the great dome of St. Nicholas rising above it all",st:"The Nikolaikirche dome was destroyed in WWII, rebuilt in 1981 by the GDR — a rare act of socialist historic preservation. The square around it was restored after reunification.",im:"Time-travel: the market square in 1750, busy with merchants under Prussian royal windows",t:"Climb the church steps for views. Free to enter.",c:["architecture"],r:"g",nn:"Alter Markt & Nikolaikirche — Altstadt #85",ns:"Wiederaufgebauter Barockplatz mit der großen Kuppel der Nikolaikirche",nst:"Die Kuppel wurde im Krieg zerstört, 1981 von der DDR wiederaufgebaut. Eine seltene sozialistische Denkmalpflege.",nt:"Die Kirchenstufen erklimmen für die Aussicht. Eintritt kostenlos."},
  {id:86,n:"Brandenburger Tor Potsdam — Altstadt #86",a:"Altstadt",v:["history","beautiful","local"],d:10,s:"Potsdam has its own Brandenburg Gate — older and more beautiful than Berlin\'s version",st:"Built in 1770 to celebrate the Seven Years War, it predates Berlin\'s gate. Two completely different faces — Roman on one side, ornate on the other.",im:"Time-travel: soldiers marching through the gate in 1770 after the Seven Years War",t:"Stand at the arch and look at both sides — they are completely different designs.",c:["history_big"],r:"g",nn:"Brandenburger Tor — Altstadt #86",ns:"Potsdam hat sein eigenes Brandenburger Tor — älter und schöner als Berlins Version",nst:"1770 zum Gedenken an den Siebenjährigen Krieg gebaut. Zwei völlig verschiedene Seiten.",nt:"Im Torbogen stehen und beide Seiten betrachten — sie sind komplett unterschiedlich."},
  {id:87,n:"Nauener Tor — Altstadt #87",a:"Altstadt",v:["history","quiet"],d:40,s:"Gothic gate built by a Prussian king who had never seen England — based on engravings",st:"Friedrich Wilhelm I built this English Gothic gate in 1755 using only engravings as reference — he had never visited England. It\'s the oldest neo-Gothic structure in Germany.",im:"Time-travel: the king studying English engravings and ordering a gate built from them",t:"Walk through and into Holländisches Viertel immediately beyond.",c:["high_spots"],r:"g",nn:"Nauener Tor — Altstadt #87",ns:"Gotisches Tor, erbaut von einem preußischen König, der England nie gesehen hatte — nach Stichen",nst:"1755 erbaut, nach englischen Stichen ohne je England besucht zu haben. Das älteste neugotische Bauwerk Deutschlands.",nt:"Durchgehen und direkt ins Holländische Viertel eintreten."},
  {id:88,n:"Freundschaftsinsel — Altstadt #88",a:"Altstadt",v:["nature","beautiful","quiet"],d:23,s:"Island garden in the Havel — rose collections, medicinal plants, absolute calm",st:"This island was used as a Nazi party garden, then a GDR experimental plant station. Now it grows 350 rose varieties and dozens of medicinal herbs. Free to wander.",im:"Time-travel: GDR botanists cataloguing every plant species on this island in 1965",t:"Free entry. Peak blooms June and September. Almost no tourists.",c:["parks"],r:"g",nn:"Freundschaftsinsel — Altstadt #88",ns:"Garteninsel in der Havel — Rosensammlungen, Heilpflanzen, absolute Ruhe",nst:"Diese Insel war Parteigarten der NSDAP, dann DDR-Versuchspflanzenstation. Jetzt 350 Rosensorten.",nt:"Freier Eintritt. Beste Blüte im Juni und September. Kaum Touristen."},
  {id:89,n:"Heiliger See — Potsdam-Nord #89",a:"Potsdam-Nord",v:["nature","beautiful","quiet"],d:45,s:"Wild glacial lake ringed by old villas — swim, canoe, or just sit at the edge",st:"The lake sits between royal park estates. Its northern shore is still wild. Old rowing boats rent by the hour. Some of the finest Berlin villas hide behind the trees.",im:"Time-travel: Kaiser Wilhelm II rowing on this lake in 1905, watching the swans",t:"FKK bathing allowed on the north bank. Warm summer months only.",c:["courtyards"],r:"g",nn:"Heiliger See — Potsdam-Nord #89",ns:"Wilder Gletschersee, umgeben von alten Villen — schwimmen, kanufahren oder einfach sitzen",nst:"Der See liegt zwischen Königsparks. Das Nordufer ist noch wild. Alte Ruderboote stundenweise.",nt:"FKK-Baden am Nordufer erlaubt. Nur in warmen Sommermonaten."},
  {id:90,n:"Schloss Charlottenhof — Sanssouci #90",a:"Sanssouci",v:["history","beautiful","hidden"],d:44,s:"Small Schinkel villa in the park that looks like a Roman country house",st:"Karl Friedrich Schinkel designed this neoclassical gem in 1829 for Crown Prince Friedrich Wilhelm. The Roman Baths complex next door was partly designed by the prince himself.",im:"Time-travel: Schinkel and the Crown Prince walking the site in 1829, sketching in hand",t:"In the park, free. Walk through the Italian Garden at the back.",c:["romantic_water"],r:"g",nn:"Schloss Charlottenhof — Sanssouci #90",ns:"Kleine Schinkel-Villa im Park — wie ein römisches Landhaus",nst:"Schinkel entwarf dieses neoklassische Juwel 1829 für Kronprinz Friedrich Wilhelm.",nt:"Im Park kostenlos. Durch den Italienischen Garten dahinter gehen."},
  {id:91,n:"Römische Bäder — Sanssouci #91",a:"Sanssouci",v:["history","beautiful","hidden"],d:28,s:"Mock Roman villa complex in the park — pure fantasy architecture built for pleasure",st:"The Crown Prince and his court architect Persius built this fantasy Roman estate 1829–1840 as an ornamental garden feature. It was never actually used for bathing.",im:"Time-travel: workers laying the Roman mosaic floors in 1835, piece by piece",t:"Exterior free. Walk the water garden. Small fee to enter the buildings.",c:["scary"],r:"g",nn:"Römische Bäder — Sanssouci #91",ns:"Pseudorömische Villenkomplex im Park — reine Fantasiearchitektur",nst:"Kronprinz und Persius bauten 1829–1840 diesen Fantasie-Romankomplex. Zum Baden war er nie gedacht.",nt:"Außenbereich kostenlos. Wassergarten abgehen. Kleiner Eintritt ins Gebäude."},
  {id:92,n:"Alexandrowka Orthodox Church — Potsdam-Nord #92",a:"Potsdam-Nord",v:["history","beautiful","quiet"],d:41,s:"Russian Orthodox chapel on a hill above the log houses — open and golden inside",st:"Built in 1829 for the Russian colony. The interior is intimate, richly decorated, and always unlocked. Incense drifts through the wooden structure.",im:"Time-travel: the Russian singers attending Sunday liturgy in 1830, far from home",t:"Light a candle. Nobody will stop you. Always free.",c:["famous_dead"],r:"g",nn:"Russisch-Orthodoxe Kirche Alexandrowka — Potsdam-Nord #92",ns:"Russisch-orthodoxe Kapelle auf einem Hügel — offen und golden innen",nst:"1829 für die russische Kolonie erbaut. Das Innere ist intim, reich dekoriert und immer offen.",nt:"Eine Kerze anzünden. Niemand wird Sie aufhalten. Immer kostenlos."},
  {id:93,n:"Dampfmaschinenhaus — Sanssouci #93",a:"Sanssouci",v:["hidden","weird","history"],d:17,s:"A steam engine disguised as a mosque — the minaret is a chimney",st:"To pump water for Sanssouci\'s fountains, Persius built a steam engine house in 1842 disguised as an Islamic mosque. The minaret is the chimney stack.",im:"Time-travel: Victorian engineers firing up the steam engine inside a fake mosque",t:"Open weekends in summer. Exterior always free.",c:["street_art"],r:"g",nn:"Dampfmaschinenhaus — Sanssouci #93",ns:"Eine Dampfmaschine als Moschee verkleidet — das Minarett ist ein Schornstein",nst:"Um Wasser für Sanssoucis Fontänen zu pumpen, baute Persius 1842 ein Maschinenhaus als islamische Moschee.",nt:"Wochenends im Sommer geöffnet. Außenbereich immer kostenlos."},
  {id:94,n:"Bassinplatz — Holländisches Viertel #94",a:"Holländisches Viertel",v:["local","quiet"],d:50,s:"Square with a fountain where locals actually live — not a tourist square",st:"At the heart of the Dutch Quarter, this plaza has a small fountain, no restaurants, and real Potsdam life: dogs, students, neighbours. It\'s the square the guidebooks miss.",im:"Time-travel: 18th century Dutch craftsmen gathering around this fountain on Sundays",t:"Sit here. Watch. Come back in the evening when the residents are out.",c:["abandoned"],r:"g",nn:"Bassinplatz — Holländisches Viertel #94",ns:"Platz mit Brunnen, auf dem Einheimische wirklich leben — kein Touristenplatz",nst:"Im Herzen des Holländischen Viertels, mit kleinem Brunnen, ohne Restaurants und mit echtem Potsdamer Leben.",nt:"Hinsetzen. Beobachten. Abends wiederkommen, wenn die Anwohner draußen sind."},
  {id:95,n:"Havel Waterfront Walk — Babelsberg #95",a:"Babelsberg",v:["nature","beautiful","quiet"],d:9,s:"Path along the Havel between Babelsberg and Wannsee — lake light, old villas, swans",st:"The Havel widens here into something like a sea. The path runs between forested banks, passing the Glienicker Bridge and old villa gardens. Silent in the mornings.",im:"Time-travel: Kaiser barges moving on the Havel river in 1900",t:"Walk south from the Glienicker Bridge for the best stretch.",c:["free_museum"],r:"g",nn:"Havel-Uferweg — Babelsberg #95",ns:"Weg an der Havel zwischen Babelsberg und Wannsee — Seelicht, alte Villen, Schwäne",nst:"Die Havel weitet sich hier zu etwas wie einem See. Der Weg führt durch bewaldete Ufer.",nt:"Vom Glienicker Brücke südlich gehen für den schönsten Abschnitt."},
  {id:96,n:"Jägertor — Altstadt #96",a:"Altstadt",v:["history","hidden","quiet"],d:7,s:"The oldest surviving city gate in Potsdam — 1733, and almost nobody photographs it",st:"This unassuming Baroque gate stands at the edge of Altstadt with no crowds around it. It is older than Berlin\'s Brandenburg Gate.",im:"Time-travel: soldiers passing through this gate in 1733, the city still half-built",t:"Find it on Jägerallee. Stand there and count how many people walk past.",c:["local_only"],r:"g",nn:"Jägertor — Altstadt #96",ns:"Das älteste erhaltene Stadttor in Potsdam — 1733, und fast niemand fotografiert es",nst:"Dieses schlichte Barocktor steht am Rand der Altstadt ohne jede Menschenmenge. Es ist älter als Berlins Brandenburger Tor.",nt:"In der Jägerallee finden. Davor stehen und zählen, wie viele Leute vorbeigehen."},
  {id:97,n:"Volkspark Sanssouci Northern Trail — Sanssouci #97",a:"Sanssouci",v:["nature","hidden","free"],d:47,s:"The forgotten northern end of the park where deer graze and paths wind unmarked",st:"While thousands crowd the terraces, the north of Sanssouci park is nearly empty. Ancient trees, deer paths, and a small lake. The map doesn\'t show all the trails.",im:"Time-travel: royal hunting parties pursuing deer through these same trees, 1750",t:"Enter from Schopenhauerstraße. Bring your own map.",c:["architecture"],r:"g",nn:"Volkspark Sanssouci Nordpfad — Sanssouci #97",ns:"Das vergessene nördliche Ende des Parks, wo Rehe grasen und Wege unmarkiert verlaufen",nst:"Während Tausende die Terrassen stürmen, ist der Norden fast leer. Alte Bäume, Rehpfade, ein kleiner See.",nt:"Von der Schopenhauerstraße eintreten. Eigene Karte mitbringen."},
  {id:98,n:"Krongut Bornstedt — Sanssouci #98",a:"Sanssouci",v:["history","local"],d:19,s:"Royal estate turned craft village — brewhouse, bakery, smithy still working",st:"The royal farm estate from 1853 became a GDR collective, then a restored artisan complex. The original brewhouse makes beer. Courtyard free to explore.",im:"Time-travel: royal servants working the estate in 1860, cattle and all",t:"The courtyard is free. Beer garden open in summer.",c:["history_big"],r:"g",nn:"Krongut Bornstedt — Sanssouci #98",ns:"Königliches Gut als Handwerkerdorf — Brauhaus, Bäckerei, Schmiede noch in Betrieb",nst:"Das königliche Gutshof von 1853 wurde DDR-Kollektiv, dann restaurierter Handwerkskomplex.",nt:"Der Innenhof ist kostenlos. Biergarten im Sommer geöffnet."},
  {id:99,n:"Luisenplatz — Altstadt #99",a:"Altstadt",v:["history","local"],d:54,s:"The square where Potsdam\'s tram meets its palace gate — the living heart of the city",st:"Where the Brandenburger Tor frames the view down the main axis of Sanssouci. Trams ring, students cycle, locals buy flowers. The best human square in Potsdam.",im:"Time-travel: horse-drawn carriages turning through this square in 1890",t:"Sit at the café terrace and watch the tram turn. Free to observe.",c:["high_spots"],r:"g",nn:"Luisenplatz — Altstadt #99",ns:"Der Platz, wo Potsdams Tram auf sein Palasttor trifft — das lebendige Herz der Stadt",nst:"Der Brandenburger Tor rahmt den Blick die Hauptachse von Sanssouci entlang. Straßenbahnen, Studenten, Blumenkäufer.",nt:"Am Café-Tisch sitzen und die Straßenbahn beobachten. Kostenlos."},
  {id:100,n:"Kapellenberg — Potsdam-Nord #100",a:"Potsdam-Nord",v:["hidden","quiet","nature"],d:23,s:"Forested hill with a ruined chapel and views nobody knows about",st:"The chapel was destroyed in the 19th century. Just foundations remain in a clearing at the top. The hike up is 20 minutes through beech trees. At the top: silence.",im:"Time-travel: the medieval chapel standing here fully intact, monks inside, 1500",t:"Start from Ribbeckstraße. No signs — find your own way.",c:["parks"],r:"g",nn:"Kapellenberg — Potsdam-Nord #100",ns:"Bewaldeter Hügel mit einer Ruine einer Kapelle und Aussichten, die niemand kennt",nst:"Die Kapelle wurde im 19. Jahrhundert zerstört. Oben in einer Lichtung: nur Fundamente.",nt:"Start von der Ribbeckstraße. Keine Schilder — eigenen Weg finden."},
  {id:101,n:"Sanssouci Park — Sanssouci #101",a:"Sanssouci",v:["nature","beautiful","hidden"],d:10,s:"Vast palace park open to all — wander far from the tourists into empty lanes",st:"Frederick the Great\'s summer retreat covers 290 hectares. Walk ten minutes from the palace and the crowds vanish. Just fountains, vine terraces, and stillness.",im:"Time-travel: Sanssouci 200 years ago — servants rushing past Rococo fountains",t:"Enter from the east gate for fewest crowds. Come weekday mornings.",c:["courtyards"],r:"g",nn:"Sanssouci Park — Sanssouci #101",ns:"Riesiger Schlosspark für alle — wander weit weg von den Touristen in leere Alleen",nst:"Friedrichs des Großen Sommerresidenz umfasst 290 Hektar. Zehn Minuten vom Schloss entfernt verschwinden die Massen.",nt:"Am Osttor eintreten für weniger Trubel. Unter der Woche morgens kommen."},
  {id:102,n:"Ruinenberg Hilltop — Sanssouci #102",a:"Sanssouci",v:["history","quiet","beautiful"],d:19,s:"Artificial ruins on a hill built as a romantic folly — and a secret reservoir",st:"Frederick ordered fake Roman ruins built here in 1748. Below them: a cistern feeding Sanssouci\'s fountains. Locals picnic here; tourists rarely find it.",im:"Time-travel: workers building fake ruins by hand in 1748",t:"Bring a picnic. The hill has 360-degree views. Mostly empty.",c:["romantic_water"],r:"g",nn:"Ruinenberg — Sanssouci #102",ns:"Künstliche Ruinen auf einem Hügel — ein romantisches Lustschloss und geheimes Wasserreservoir",nst:"Friedrich ließ 1748 falsche Römerruinen bauen. Darunter: eine Zisterne für Sanssoucis Fontänen.",nt:"Picknick mitbringen. Der Hügel bietet 360-Grad-Aussicht. Meist leer."},
  {id:103,n:"Pfingstberg Belvedere — Potsdam-Nord #103",a:"Potsdam-Nord",v:["beautiful","hidden","history"],d:11,s:"Twin-towered Italianate belvedere with views over Berlin and Potsdam",st:"Built 1847–1863 and never finished. The towers survived WWII, served as a Stasi observation post, and now reveal both cities on the horizon.",im:"Time-travel: construction halted mid-tower in 1860 — scaffolding left standing for decades",t:"Small admission for the tower interior but the surrounding park is free.",c:["scary"],r:"g",nn:"Pfingstberg Belvedere — Potsdam-Nord #103",ns:"Zweitürmiges Belvedere mit Blick auf Berlin und Potsdam",nst:"1847–1863 gebaut und nie fertiggestellt. Die Türme wurden Stasi-Beobachtungsposten.",nt:"Kleiner Eintritt für das Innere, aber der Park ist kostenlos."},
  {id:104,n:"Holländisches Viertel — Holländisches Viertel #104",a:"Holländisches Viertel",v:["history","local","beautiful"],d:29,s:"134 Dutch gabled houses built for craftsmen who never came — now full of cafés",st:"Frederick William I invited Dutch craftsmen to Potsdam in 1734. Most never arrived. The quarter stood half-empty for decades. Now the best neighbourhood in the city.",im:"Time-travel: empty Dutch houses awaiting settlers who never came, 1740",t:"Walk every street. The back alleys have the best details.",c:["famous_dead"],r:"g",nn:"Holländisches Viertel — Holländisches Viertel #104",ns:"134 holländische Giebelhäuser für Handwerker gebaut, die nie kamen — jetzt voller Cafés",nst:"Friedrich Wilhelm I. lud 1734 holländische Handwerker ein. Die meisten kamen nie.",nt:"Jede Straße abgehen. In den Hintergassen stecken die besten Details."},
  {id:105,n:"Glienicker Brücke — Babelsberg #105",a:"Babelsberg",v:["history","hidden","weird"],d:22,s:"The Cold War spy exchange bridge — real prisoners crossed here in silence",st:"Three times during the Cold War, KGB and CIA traded agents here at dawn. The bridge was closed to civilians for 28 years. You can walk it freely now.",im:"Time-travel: 1962 — spy exchange at dawn, both sides watching through binoculars",t:"Cross into the Wannsee side. The royal hunting grounds are just beyond.",c:["street_art"],r:"g",nn:"Glienicker Brücke — Babelsberg #105",ns:"Die Agentenbrücke des Kalten Krieges — echte Gefangene wurden hier schweigend ausgetauscht",nst:"Dreimal tauschten KGB und CIA hier Agenten bei Tagesanbruch aus. Die Brücke war 28 Jahre für Zivilisten gesperrt.",nt:"Auf die Wannsee-Seite hinübergehen. Dahinter liegen die königlichen Jagdgründe."}
];

<h2 className="text-base font-bold mb-3" style={{color:"white"}}>Before you start / Bevor du beginnst</h2>
<p className="text-sm leading-relaxed" style={{color:"#c8c0e0"}}>This app is a creative guide to hidden places. Content is curated for curiosity — not as instructions.</p>
<p className="text-xs leading-relaxed mt-1" style={{color:"#9990b8",fontStyle:"italic"}}>Diese App ist ein kreativer Stadtführer zu versteckten Orten. Die Inhalte sind aus Neugier zusammengestellt – nicht als Anleitung.</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#c8c0e0"}}>Some locations include natural environments, heights, water, or areas that may be restricted or unsafe. You explore at your own risk and are responsible for your own safety.</p>
<p className="text-xs leading-relaxed mt-1" style={{color:"#9990b8",fontStyle:"italic"}}>Einige Orte umfassen Naturräume, Höhen, Wasser oder können eingeschränkt oder unsicher sein. Du erkundest auf eigene Gefahr und bist selbst für deine Sicherheit verantwortlich.</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#c8c0e0"}}>This app does not provide safety advice. Always follow local laws, respect private property, and check current conditions before visiting any place.</p>
<p className="text-xs leading-relaxed mt-1" style={{color:"#9990b8",fontStyle:"italic"}}>Diese App bietet keine Sicherheitshinweise. Halte dich stets an lokale Gesetze, respektiere Privateigentum und informiere dich vor dem Besuch über aktuelle Bedingungen.</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#e8c0f0"}}>If you are under 18, please explore responsibly and avoid risky locations on your own.</p>
<p className="text-xs leading-relaxed mt-1" style={{color:"#c890d8",fontStyle:"italic"}}>Wenn du unter 18 bist: Erkunde verantwortungsbewusst und vermeide riskante Orte auf eigene Faust.</p>
</div>
<button onClick={onAccept} className="mt-6 w-full py-4 rounded-xl text-sm font-bold text-white" style={{background:"linear-gradient(135deg,#6366F1,#8B5CF6)",border:"none",cursor:"pointer",maxWidth:380,fontSize:"15px"}}>I understand — let me explore<br/><span style={{fontSize:"12px",opacity:0.85}}>Ich verstehe – erkunden</span></button>
</div>);

const CITY_EN="Potsdam";
const PlaceCard=({place:p,idx,onOpen,lang})=>(
<button onClick={()=>onOpen(p)} className="text-left w-full rounded-2xl p-4 fade-up" style={{background:"white",border:"1.5px solid #e4e4ed",cursor:"pointer",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div style={{flex:1}}>
<h3 className="text-base font-bold" style={{color:"#1a1a2e",lineHeight:1.3}}>{lang==="native"&&p.nn?p.nn:p.n}</h3>
{lang==="native"&&p.nn&&<p className="text-xs" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-xs mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p></div>
<span className="text-xs font-bold px-2 py-1 rounded-full ml-2 flex-shrink-0" style={{background:p.r==="g"?"#dcfce7":"#fef9c3",color:p.r==="g"?"#166534":"#854d0e"}}>{p.r==="g"?"Green":"Yellow"}</span></div>
<p className="text-sm mt-2" style={{color:"#555",lineHeight:1.5}}>{lang==="native"&&p.ns?p.ns:p.s}</p>
<div className="flex gap-1.5 mt-2 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-2 py-0.5 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</button>);

const PlaceDetail=({place:p,onClose,onNext,onPrev,lang})=>(
<div style={{position:"fixed",inset:0,zIndex:1000,background:"white",overflowY:"auto"}}>
<div className="px-5 pt-6 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex justify-between items-center mb-4">
<button onClick={onClose} className="text-sm font-bold" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← Back</button>
<div className="flex gap-2">
<button onClick={onPrev} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>←</button>
<button onClick={onNext} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>→</button></div></div>
<h1 className="text-2xl font-black" style={{color:"#1a1a2e"}}>{lang==="native"&&p.nn?p.nn:p.n}</h1>
{lang==="native"&&p.nn&&<p className="text-sm font-medium" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-sm mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p>
{PLACE_IMAGES[p.id]&&<div className="mt-4 rounded-xl overflow-hidden" style={{maxHeight:"400px"}}>
<img src={`images/${PLACE_IMAGES[p.id]}`} alt={p.n} style={{width:"100%",maxHeight:"360px",objectFit:"contain",display:"block",borderRadius:"8px"}}/>
<p className="text-xs mt-1" style={{color:"#aaa",textAlign:"center"}}>AI-generated illustration</p></div>}
<div className="mt-4 p-4 rounded-xl" style={{background:"#f8f8ff"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#1a1a2e"}}>The Story</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nst?p.nst:p.st}</p></div>
{p.im&&<div className="mt-3 p-4 rounded-xl" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#a78bfa"}}>Imagine This</h3>
<p className="text-sm" style={{color:"#b8b0d0",lineHeight:1.7,fontStyle:"italic"}}>{p.im}</p></div>}
{p.t&&<div className="mt-3 p-4 rounded-xl" style={{background:"#f0fdf4"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#166534"}}>{lang==="native"?"Tips / "+LANG_NAME:"Tips"}</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nt?p.nt:p.t}</p>
<a href={`https://maps.google.com/?q=${encodeURIComponent(p.n+', '+CITY_EN)}`} target="_blank" rel="noopener noreferrer"
  className="mt-3 flex items-center gap-2 text-sm font-bold"
  style={{color:"#166534",textDecoration:"none",display:"inline-flex",marginTop:"10px"}}>
  🗺 Get directions
</a>
</div>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

if(showPicker){const rp=P[Math.floor(Math.random()*P.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,background:"linear-gradient(180deg,#1a1a2e,#2d1b69)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<p className="text-4xl mb-4">🎲</p>
<h2 className="text-xl font-black text-center" style={{color:"white"}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-sm mt-2 text-center" style={{color:"#b8b0d0"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3 text-center px-6" style={{color:"#8b7fb8",lineHeight:1.6}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
<div className="flex gap-3 mt-6">
<button onClick={()=>setShowPicker(false)} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"transparent",color:"#8b7fb8",border:"1px solid #8b7fb8",cursor:"pointer"}}>Close</button>
<button onClick={()=>{setSelected(rp);setShowPicker(false)}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"#6366F1",color:"white",border:"none",cursor:"pointer"}}>Go!</button>
<button onClick={()=>setShowPicker(true)} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"transparent",color:"#8b7fb8",border:"1px solid #8b7fb8",cursor:"pointer"}}>Reroll</button>
</div></div>}

return <div style={{minHeight:"100vh",background:"linear-gradient(180deg,#FAFBFF 0%,#F0F2FF 100%)"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Potsdam Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={()=>setShowPicker(true)} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Potsdam Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
