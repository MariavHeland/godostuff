<script>
const P = [
  {id:1,n:"Sanssouci Park — Sanssouci",a:"Sanssouci",v:["nature","beautiful","hidden"],d:10,s:"Vast palace park open to all — wander far from the tourists into empty lanes",st:"Frederick the Great\'s summer retreat covers 290 hectares. Walk ten minutes from the palace and the crowds vanish. Just fountains, vine terraces, and stillness.",im:"Time-travel: Sanssouci 200 years ago — servants rushing past Rococo fountains",t:"Enter from the east gate for fewest crowds. Come weekday mornings.",c:["parks"],r:"g",nn:"Sanssouci Park — Sanssouci",ns:"Riesiger Schlosspark für alle — wander weit weg von den Touristen in leere Alleen",nst:"Friedrichs des Großen Sommerresidenz umfasst 290 Hektar. Zehn Minuten vom Schloss entfernt verschwinden die Massen.",nt:"Am Osttor eintreten für weniger Trubel. Unter der Woche morgens kommen."},
  {id:2,n:"Ruinenberg Hilltop — Sanssouci",a:"Sanssouci",v:["history","quiet","beautiful"],d:25,s:"Artificial ruins on a hill built as a romantic folly — and a secret reservoir",st:"Frederick ordered fake Roman ruins built here in 1748. Below them: a cistern feeding Sanssouci\'s fountains. Locals picnic here; tourists rarely find it.",im:"Time-travel: workers building fake ruins by hand in 1748",t:"Bring a picnic. The hill has 360-degree views. Mostly empty.",c:["history_big"],r:"g",nn:"Ruinenberg — Sanssouci",ns:"Künstliche Ruinen auf einem Hügel — ein romantisches Lustschloss und geheimes Wasserreservoir",nst:"Friedrich ließ 1748 falsche Römerruinen bauen. Darunter: eine Zisterne für Sanssoucis Fontänen.",nt:"Picknick mitbringen. Der Hügel bietet 360-Grad-Aussicht. Meist leer."},
  {id:3,n:"Pfingstberg Belvedere — Potsdam-Nord",a:"Potsdam-Nord",v:["beautiful","hidden","history"],d:30,s:"Twin-towered Italianate belvedere with views over Berlin and Potsdam",st:"Built 1847–1863 and never finished. The towers survived WWII, served as a Stasi observation post, and now reveal both cities on the horizon.",im:"Time-travel: construction halted mid-tower in 1860 — scaffolding left standing for decades",t:"Small admission for the tower interior but the surrounding park is free.",c:["high_spots"],r:"g",nn:"Pfingstberg Belvedere — Potsdam-Nord",ns:"Zweitürmiges Belvedere mit Blick auf Berlin und Potsdam",nst:"1847–1863 gebaut und nie fertiggestellt. Die Türme wurden Stasi-Beobachtungsposten.",nt:"Kleiner Eintritt für das Innere, aber der Park ist kostenlos."},
  {id:4,n:"Holländisches Viertel — Holländisches Viertel",a:"Holländisches Viertel",v:["history","local","beautiful"],d:5,s:"134 Dutch gabled houses built for craftsmen who never came — now full of cafés",st:"Frederick William I invited Dutch craftsmen to Potsdam in 1734. Most never arrived. The quarter stood half-empty for decades. Now the best neighbourhood in the city.",im:"Time-travel: empty Dutch houses awaiting settlers who never came, 1740",t:"Walk every street. The back alleys have the best details.",c:["architecture"],r:"g",nn:"Holländisches Viertel — Holländisches Viertel",ns:"134 holländische Giebelhäuser für Handwerker gebaut, die nie kamen — jetzt voller Cafés",nst:"Friedrich Wilhelm I. lud 1734 holländische Handwerker ein. Die meisten kamen nie.",nt:"Jede Straße abgehen. In den Hintergassen stecken die besten Details."},
  {id:5,n:"Glienicker Brücke — Babelsberg",a:"Babelsberg",v:["history","hidden","weird"],d:15,s:"The Cold War spy exchange bridge — real prisoners crossed here in silence",st:"Three times during the Cold War, KGB and CIA traded agents here at dawn. The bridge was closed to civilians for 28 years. You can walk it freely now.",im:"Time-travel: 1962 — spy exchange at dawn, both sides watching through binoculars",t:"Cross into the Wannsee side. The royal hunting grounds are just beyond.",c:["history_big"],r:"g",nn:"Glienicker Brücke — Babelsberg",ns:"Die Agentenbrücke des Kalten Krieges — echte Gefangene wurden hier schweigend ausgetauscht",nst:"Dreimal tauschten KGB und CIA hier Agenten bei Tagesanbruch aus. Die Brücke war 28 Jahre für Zivilisten gesperrt.",nt:"Auf die Wannsee-Seite hinübergehen. Dahinter liegen die königlichen Jagdgründe."},
  {id:6,n:"Schlosspark Babelsberg — Babelsberg",a:"Babelsberg",v:["nature","beautiful","quiet"],d:20,s:"English landscape garden along the Havel — Gothic towers, romantic ruins, river views",st:"Designed by Lenné and Pückler for Crown Prince Wilhelm. The gothic pump house looks like a fairy tale church. The Havel glimmers through the trees at every turn.",im:"Time-travel: Crown Prince Wilhelm walking these paths in 1838",t:"Enter from Waldmüllerstraße for the river views. Free throughout.",c:["parks"],r:"g",nn:"Schlosspark Babelsberg — Babelsberg",ns:"Englischer Landschaftspark an der Havel — gotische Türme, romantische Ruinen, Flussblick",nst:"Von Lenné und Pückler für Kronprinz Wilhelm gestaltet. Das gotische Pumpenhaus wirkt wie eine Märchenkirche.",nt:"Von der Waldmüllerstraße eintreten für die Flussblicke. Überall kostenlos."},
  {id:7,n:"Alexandrowka Russian Colony — Potsdam-Nord",a:"Potsdam-Nord",v:["history","hidden","local"],d:20,s:"12 log houses built for Russian singers stranded in Prussia after Napoleon — still inhabited",st:"In 1826, Friedrich Wilhelm III built this colony for 12 Russian POW singers who sang for him during the wars. Their descendants still live in some houses.",im:"Time-travel: Russian choir singing for the Prussian king in 1815, homesick and stranded",t:"The Alexander Nevsky church at the top is always open. Free to wander the paths.",c:["local_only"],r:"g",nn:"Alexandrowka — Potsdam-Nord",ns:"12 Blockhäuser für russische Sänger gebaut, die nach Napoleon in Preußen strandeten — noch bewohnt",nst:"1826 baute Friedrich Wilhelm III. diese Kolonie für 12 russische Kriegsgefangene-Sänger.",nt:"Die Alexander-Newski-Kirche oben ist immer geöffnet. Wege kostenlos zugänglich."},
  {id:8,n:"Telegrafenberg — Potsdam-Nord",a:"Potsdam-Nord",v:["history","hidden","quiet"],d:30,s:"Hilltop science campus with Einsteinturm — the tower that tested relativity",st:"The Einstein Tower was built in 1924 to prove Einstein\'s theory using solar spectroscopy. It still operates as a research telescope. The hill around it is silent and strange.",im:"Time-travel: Einstein visiting the tower in 1924, checking if it would work",t:"The campus is freely walkable. Einstein Tower exterior only unless on a guided tour.",c:["history_big"],r:"g",nn:"Telegrafenberg — Potsdam-Nord",ns:"Wissenschaftscampus auf dem Hügel mit dem Einsteinturm — der Turm, der die Relativitätstheorie testete",nst:"Der Einsteinturm wurde 1924 gebaut, um Einsteins Theorie mittels Sonnenspektroskopie zu beweisen.",nt:"Der Campus ist frei zugänglich. Einsteinturm nur außen, außer bei Führungen."},
  {id:9,n:"Cecilienhof Palace — Potsdam-Nord",a:"Potsdam-Nord",v:["history","hidden"],d:20,s:"English country house where Truman, Stalin and Churchill carved up the post-war world",st:"The Potsdam Conference of 1945 happened in this mock-Tudor mansion. The round table where the Big Three sat is still in place. The gardens are free to wander.",im:"Time-travel: August 1945 — three men deciding the fate of millions over a round table",t:"Gardens are free. Small fee for the conference rooms interior.",c:["history_big"],r:"g",nn:"Schloss Cecilienhof — Potsdam-Nord",ns:"Englisches Landhaus, wo Truman, Stalin und Churchill die Nachkriegswelt aufteilten",nst:"Die Potsdamer Konferenz 1945 fand in diesem Tudor-Herrenhaus statt. Der runde Tisch steht noch.",nt:"Gärten kostenlos. Kleiner Eintritt für die Konferenzräume."},
  {id:10,n:"Alter Markt & Nikolaikirche — Altstadt",a:"Altstadt",v:["history","beautiful"],d:5,s:"Rebuilt baroque square with the great dome of St. Nicholas rising above it all",st:"The Nikolaikirche dome was destroyed in WWII, rebuilt in 1981 by the GDR — a rare act of socialist historic preservation. The square around it was restored after reunification.",im:"Time-travel: the market square in 1750, busy with merchants under Prussian royal windows",t:"Climb the church steps for views. Free to enter.",c:["architecture"],r:"g",nn:"Alter Markt & Nikolaikirche — Altstadt",ns:"Wiederaufgebauter Barockplatz mit der großen Kuppel der Nikolaikirche",nst:"Die Kuppel wurde im Krieg zerstört, 1981 von der DDR wiederaufgebaut. Eine seltene sozialistische Denkmalpflege.",nt:"Die Kirchenstufen erklimmen für die Aussicht. Eintritt kostenlos."},
  {id:11,n:"Brandenburger Tor Potsdam — Altstadt",a:"Altstadt",v:["history","beautiful","local"],d:5,s:"Potsdam has its own Brandenburg Gate — older and more beautiful than Berlin\'s version",st:"Built in 1770 to celebrate the Seven Years War, it predates Berlin\'s gate. Two completely different faces — Roman on one side, ornate on the other.",im:"Time-travel: soldiers marching through the gate in 1770 after the Seven Years War",t:"Stand at the arch and look at both sides — they are completely different designs.",c:["history_big"],r:"g",nn:"Brandenburger Tor — Altstadt",ns:"Potsdam hat sein eigenes Brandenburger Tor — älter und schöner als Berlins Version",nst:"1770 zum Gedenken an den Siebenjährigen Krieg gebaut. Zwei völlig verschiedene Seiten.",nt:"Im Torbogen stehen und beide Seiten betrachten — sie sind komplett unterschiedlich."},
  {id:12,n:"Nauener Tor — Altstadt",a:"Altstadt",v:["history","quiet"],d:5,s:"Gothic gate built by a Prussian king who had never seen England — based on engravings",st:"Friedrich Wilhelm I built this English Gothic gate in 1755 using only engravings as reference — he had never visited England. It\'s the oldest neo-Gothic structure in Germany.",im:"Time-travel: the king studying English engravings and ordering a gate built from them",t:"Walk through and into Holländisches Viertel immediately beyond.",c:["history_big"],r:"g",nn:"Nauener Tor — Altstadt",ns:"Gotisches Tor, erbaut von einem preußischen König, der England nie gesehen hatte — nach Stichen",nst:"1755 erbaut, nach englischen Stichen ohne je England besucht zu haben. Das älteste neugotische Bauwerk Deutschlands.",nt:"Durchgehen und direkt ins Holländische Viertel eintreten."},
  {id:13,n:"Freundschaftsinsel — Altstadt",a:"Altstadt",v:["nature","beautiful","quiet"],d:10,s:"Island garden in the Havel — rose collections, medicinal plants, absolute calm",st:"This island was used as a Nazi party garden, then a GDR experimental plant station. Now it grows 350 rose varieties and dozens of medicinal herbs. Free to wander.",im:"Time-travel: GDR botanists cataloguing every plant species on this island in 1965",t:"Free entry. Peak blooms June and September. Almost no tourists.",c:["parks"],r:"g",nn:"Freundschaftsinsel — Altstadt",ns:"Garteninsel in der Havel — Rosensammlungen, Heilpflanzen, absolute Ruhe",nst:"Diese Insel war Parteigarten der NSDAP, dann DDR-Versuchspflanzenstation. Jetzt 350 Rosensorten.",nt:"Freier Eintritt. Beste Blüte im Juni und September. Kaum Touristen."},
  {id:14,n:"Heiliger See — Potsdam-Nord",a:"Potsdam-Nord",v:["nature","beautiful","quiet"],d:15,s:"Wild glacial lake ringed by old villas — swim, canoe, or just sit at the edge",st:"The lake sits between royal park estates. Its northern shore is still wild. Old rowing boats rent by the hour. Some of the finest Berlin villas hide behind the trees.",im:"Time-travel: Kaiser Wilhelm II rowing on this lake in 1905, watching the swans",t:"FKK bathing allowed on the north bank. Warm summer months only.",c:["parks"],r:"g",nn:"Heiliger See — Potsdam-Nord",ns:"Wilder Gletschersee, umgeben von alten Villen — schwimmen, kanufahren oder einfach sitzen",nst:"Der See liegt zwischen Königsparks. Das Nordufer ist noch wild. Alte Ruderboote stundenweise.",nt:"FKK-Baden am Nordufer erlaubt. Nur in warmen Sommermonaten."},
  {id:15,n:"Schloss Charlottenhof — Sanssouci",a:"Sanssouci",v:["history","beautiful","hidden"],d:20,s:"Small Schinkel villa in the park that looks like a Roman country house",st:"Karl Friedrich Schinkel designed this neoclassical gem in 1829 for Crown Prince Friedrich Wilhelm. The Roman Baths complex next door was partly designed by the prince himself.",im:"Time-travel: Schinkel and the Crown Prince walking the site in 1829, sketching in hand",t:"In the park, free. Walk through the Italian Garden at the back.",c:["architecture"],r:"g",nn:"Schloss Charlottenhof — Sanssouci",ns:"Kleine Schinkel-Villa im Park — wie ein römisches Landhaus",nst:"Schinkel entwarf dieses neoklassische Juwel 1829 für Kronprinz Friedrich Wilhelm.",nt:"Im Park kostenlos. Durch den Italienischen Garten dahinter gehen."},
  {id:16,n:"Römische Bäder — Sanssouci",a:"Sanssouci",v:["history","beautiful","hidden"],d:20,s:"Mock Roman villa complex in the park — pure fantasy architecture built for pleasure",st:"The Crown Prince and his court architect Persius built this fantasy Roman estate 1829–1840 as an ornamental garden feature. It was never actually used for bathing.",im:"Time-travel: workers laying the Roman mosaic floors in 1835, piece by piece",t:"Exterior free. Walk the water garden. Small fee to enter the buildings.",c:["architecture"],r:"g",nn:"Römische Bäder — Sanssouci",ns:"Pseudorömische Villenkomplex im Park — reine Fantasiearchitektur",nst:"Kronprinz und Persius bauten 1829–1840 diesen Fantasie-Romankomplex. Zum Baden war er nie gedacht.",nt:"Außenbereich kostenlos. Wassergarten abgehen. Kleiner Eintritt ins Gebäude."},
  {id:17,n:"Alexandrowka Orthodox Church — Potsdam-Nord",a:"Potsdam-Nord",v:["history","beautiful","quiet"],d:22,s:"Russian Orthodox chapel on a hill above the log houses — open and golden inside",st:"Built in 1829 for the Russian colony. The interior is intimate, richly decorated, and always unlocked. Incense drifts through the wooden structure.",im:"Time-travel: the Russian singers attending Sunday liturgy in 1830, far from home",t:"Light a candle. Nobody will stop you. Always free.",c:["history_big"],r:"g",nn:"Russisch-Orthodoxe Kirche Alexandrowka — Potsdam-Nord",ns:"Russisch-orthodoxe Kapelle auf einem Hügel — offen und golden innen",nst:"1829 für die russische Kolonie erbaut. Das Innere ist intim, reich dekoriert und immer offen.",nt:"Eine Kerze anzünden. Niemand wird Sie aufhalten. Immer kostenlos."},
  {id:18,n:"Dampfmaschinenhaus — Sanssouci",a:"Sanssouci",v:["hidden","weird","history"],d:25,s:"A steam engine disguised as a mosque — the minaret is a chimney",st:"To pump water for Sanssouci\'s fountains, Persius built a steam engine house in 1842 disguised as an Islamic mosque. The minaret is the chimney stack.",im:"Time-travel: Victorian engineers firing up the steam engine inside a fake mosque",t:"Open weekends in summer. Exterior always free.",c:["architecture"],r:"g",nn:"Dampfmaschinenhaus — Sanssouci",ns:"Eine Dampfmaschine als Moschee verkleidet — das Minarett ist ein Schornstein",nst:"Um Wasser für Sanssoucis Fontänen zu pumpen, baute Persius 1842 ein Maschinenhaus als islamische Moschee.",nt:"Wochenends im Sommer geöffnet. Außenbereich immer kostenlos."},
  {id:19,n:"Bassinplatz — Holländisches Viertel",a:"Holländisches Viertel",v:["local","quiet"],d:5,s:"Square with a fountain where locals actually live — not a tourist square",st:"At the heart of the Dutch Quarter, this plaza has a small fountain, no restaurants, and real Potsdam life: dogs, students, neighbours. It\'s the square the guidebooks miss.",im:"Time-travel: 18th century Dutch craftsmen gathering around this fountain on Sundays",t:"Sit here. Watch. Come back in the evening when the residents are out.",c:["local_only"],r:"g",nn:"Bassinplatz — Holländisches Viertel",ns:"Platz mit Brunnen, auf dem Einheimische wirklich leben — kein Touristenplatz",nst:"Im Herzen des Holländischen Viertels, mit kleinem Brunnen, ohne Restaurants und mit echtem Potsdamer Leben.",nt:"Hinsetzen. Beobachten. Abends wiederkommen, wenn die Anwohner draußen sind."},
  {id:20,n:"Havel Waterfront Walk — Babelsberg",a:"Babelsberg",v:["nature","beautiful","quiet"],d:10,s:"Path along the Havel between Babelsberg and Wannsee — lake light, old villas, swans",st:"The Havel widens here into something like a sea. The path runs between forested banks, passing the Glienicker Bridge and old villa gardens. Silent in the mornings.",im:"Time-travel: Kaiser barges moving on the Havel river in 1900",t:"Walk south from the Glienicker Bridge for the best stretch.",c:["romantic_water"],r:"g",nn:"Havel-Uferweg — Babelsberg",ns:"Weg an der Havel zwischen Babelsberg und Wannsee — Seelicht, alte Villen, Schwäne",nst:"Die Havel weitet sich hier zu etwas wie einem See. Der Weg führt durch bewaldete Ufer.",nt:"Vom Glienicker Brücke südlich gehen für den schönsten Abschnitt."},
  {id:21,n:"Jägertor — Altstadt",a:"Altstadt",v:["history","hidden","quiet"],d:5,s:"The oldest surviving city gate in Potsdam — 1733, and almost nobody photographs it",st:"This unassuming Baroque gate stands at the edge of Altstadt with no crowds around it. It is older than Berlin\'s Brandenburg Gate.",im:"Time-travel: soldiers passing through this gate in 1733, the city still half-built",t:"Find it on Jägerallee. Stand there and count how many people walk past.",c:["history_big"],r:"g",nn:"Jägertor — Altstadt",ns:"Das älteste erhaltene Stadttor in Potsdam — 1733, und fast niemand fotografiert es",nst:"Dieses schlichte Barocktor steht am Rand der Altstadt ohne jede Menschenmenge. Es ist älter als Berlins Brandenburger Tor.",nt:"In der Jägerallee finden. Davor stehen und zählen, wie viele Leute vorbeigehen."},
  {id:22,n:"Volkspark Sanssouci Northern Trail — Sanssouci",a:"Sanssouci",v:["nature","hidden","free"],d:10,s:"The forgotten northern end of the park where deer graze and paths wind unmarked",st:"While thousands crowd the terraces, the north of Sanssouci park is nearly empty. Ancient trees, deer paths, and a small lake. The map doesn\'t show all the trails.",im:"Time-travel: royal hunting parties pursuing deer through these same trees, 1750",t:"Enter from Schopenhauerstraße. Bring your own map.",c:["parks"],r:"g",nn:"Volkspark Sanssouci Nordpfad — Sanssouci",ns:"Das vergessene nördliche Ende des Parks, wo Rehe grasen und Wege unmarkiert verlaufen",nst:"Während Tausende die Terrassen stürmen, ist der Norden fast leer. Alte Bäume, Rehpfade, ein kleiner See.",nt:"Von der Schopenhauerstraße eintreten. Eigene Karte mitbringen."},
  {id:23,n:"Krongut Bornstedt — Sanssouci",a:"Sanssouci",v:["history","local"],d:15,s:"Royal estate turned craft village — brewhouse, bakery, smithy still working",st:"The royal farm estate from 1853 became a GDR collective, then a restored artisan complex. The original brewhouse makes beer. Courtyard free to explore.",im:"Time-travel: royal servants working the estate in 1860, cattle and all",t:"The courtyard is free. Beer garden open in summer.",c:["local_only"],r:"g",nn:"Krongut Bornstedt — Sanssouci",ns:"Königliches Gut als Handwerkerdorf — Brauhaus, Bäckerei, Schmiede noch in Betrieb",nst:"Das königliche Gutshof von 1853 wurde DDR-Kollektiv, dann restaurierter Handwerkskomplex.",nt:"Der Innenhof ist kostenlos. Biergarten im Sommer geöffnet."},
  {id:24,n:"Luisenplatz — Altstadt",a:"Altstadt",v:["history","local"],d:5,s:"The square where Potsdam\'s tram meets its palace gate — the living heart of the city",st:"Where the Brandenburger Tor frames the view down the main axis of Sanssouci. Trams ring, students cycle, locals buy flowers. The best human square in Potsdam.",im:"Time-travel: horse-drawn carriages turning through this square in 1890",t:"Sit at the café terrace and watch the tram turn. Free to observe.",c:["local_only"],r:"g",nn:"Luisenplatz — Altstadt",ns:"Der Platz, wo Potsdams Tram auf sein Palasttor trifft — das lebendige Herz der Stadt",nst:"Der Brandenburger Tor rahmt den Blick die Hauptachse von Sanssouci entlang. Straßenbahnen, Studenten, Blumenkäufer.",nt:"Am Café-Tisch sitzen und die Straßenbahn beobachten. Kostenlos."},
  {id:25,n:"Kapellenberg — Potsdam-Nord",a:"Potsdam-Nord",v:["hidden","quiet","nature"],d:35,s:"Forested hill with a ruined chapel and views nobody knows about",st:"The chapel was destroyed in the 19th century. Just foundations remain in a clearing at the top. The hike up is 20 minutes through beech trees. At the top: silence.",im:"Time-travel: the medieval chapel standing here fully intact, monks inside, 1500",t:"Start from Ribbeckstraße. No signs — find your own way.",c:["abandoned"],r:"g",nn:"Kapellenberg — Potsdam-Nord",ns:"Bewaldeter Hügel mit einer Ruine einer Kapelle und Aussichten, die niemand kennt",nst:"Die Kapelle wurde im 19. Jahrhundert zerstört. Oben in einer Lichtung: nur Fundamente.",nt:"Start von der Ribbeckstraße. Keine Schilder — eigenen Weg finden."},
  {id:26,n:"Alexandrowka Russian Colony — Potsdam-Nord",a:"Potsdam-Nord",v:["weird","history","beautiful"],d:20,s:"12 wooden Russian izba houses built in 1826 for Prussian-Russian singers — completely surreal in Brandenburg",st:"Friedrich Wilhelm III built Alexandrowka for 12 Russian soldiers who stayed in Prussia after the Napoleonic wars. Log houses, an Orthodox church, a Russian cemetery. It is now UNESCO heritage and open to walk freely.",im:"Time-travel: the 12 Russian singers standing in front of their new wooden houses in 1826, homesick in Brandenburg",t:"Free to walk the colony. Orthodox church has small fee. Bus 92 or 96.",c:["history_big"],r:"g",nn:"Alexandrowka — Potsdam-Nord",ns:"12 russische Holzhäuser, gebaut 1826 für preußisch-russische Sänger — im Brandenburg völlig surreal",nst:"Friedrich Wilhelm III baute Alexandrowka für 12 russische Soldaten, die nach den Napoleonischen Kriegen blieben. UNESCO-Welterbe.",nt:"Kolonie kostenlos erkunden. Orthodoxe Kirche kleiner Eintritt. Bus 92 oder 96."},
  {id:27,n:"Einstein Tower — Sanssouci",a:"Sanssouci",v:["architecture","weird","hidden"],d:25,s:"Erich Mendelsohn\'s 1922 expressionist tower on the Telegrafenberg science hill — one of the strangest buildings in Germany",st:"The Einstein Tower was designed in 1919 to test Einstein\'s theory of relativity using solar spectroscopy. The exterior is curved stucco, more sculpture than building. It still operates as a working observatory.",im:"Time-travel: Einstein visiting the finished tower in 1921, inspecting the telescope designed in his honour",t:"Exterior always viewable. Tram 96 to Telegrafenberg. Guided tours possible.",c:["architecture"],r:"g",nn:"Einsteinturm — Sanssouci",ns:"Erich Mendelsohns expressionistischer Turm von 1922 auf dem Telegrafenberg — eines der seltsamsten Gebäude Deutschlands",nst:"Der Einsteinturm wurde 1919 entworfen, um Einsteins Relativitätstheorie mit Sonnenspektroskopie zu testen.",nt:"Außenbereich immer einsehbar. Tram 96 zum Telegrafenberg."},
  {id:28,n:"Park Babelsberg Havel Walk — Babelsberg",a:"Babelsberg",v:["beautiful","romantic_water","free"],d:30,s:"The castle-in-the-trees riverbank — palace, suspension bridge and the Havel at sunset",st:"Park Babelsberg follows the Havel shore east from the Glienicke Bridge. Babelsberg Palace sits above in the trees. The riverside path has extraordinary views toward the Glienicke Bridge and back to Sanssouci. Almost nobody walks it.",im:"Time-travel: Kaiser Wilhelm I rowing on the Havel with his family from Babelsberg Palace, 1870",t:"Free. Enter from the Glienicke Bridge side. Walk the river path east.",c:["romantic_water"],r:"g",nn:"Park Babelsberg Havelweg — Babelsberg",ns:"Der Schloss-im-Wald-Uferweg — Schloss, Hängebrücke und die Havel bei Sonnenuntergang",nst:"Park Babelsberg folgt dem Havelufer östlich der Glienicker Brücke. Das Schloss Babelsberg liegt darüber in den Bäumen.",nt:"Kostenlos. Eingang von der Glienicker Brücke. Flussuferweg nach Osten gehen."},
  {id:29,n:"Krampnitz Soviet Barracks — Potsdam-Nord",a:"Potsdam-Nord",v:["abandoned","history","weird"],d:35,s:"A 1930s Wehrmacht then Soviet military town abandoned since 1992 — a ghost city on the edge of Potsdam",st:"Krampnitz was built for the Wehrmacht in 1937 and handed to the Soviet army in 1945. The Soviets left in 1992 and took everything. What remains is a complete military town — barracks, theatre, swimming pool — all empty.",im:"Time-travel: Soviet tanks rolling through this gate in 1945, taking over a base the Wehrmacht had just abandoned",t:"Free public access from Potsdamer Chaussee. Don\'t enter buildings — exterior only.",c:["abandoned"],r:"g",nn:"Sowjetsches Kasernendorf Krampnitz — Potsdam-Nord",ns:"Eine Wehrmacht- dann Sowjet-Militärstadt, 1992 verlassen — eine Geisterstadt am Rand von Potsdam",nst:"Krampnitz wurde 1937 für die Wehrmacht gebaut. Die Sowjets verließen es 1992. Eine vollständige Militärstadt — leer seit drei Jahrzehnten.",nt:"Freier Zugang von der Potsdamer Chaussee. Gebäude nicht betreten."},
  {id:30,n:"Pfingstberg Belvedere Viewpoint — Potsdam-Nord",a:"Potsdam-Nord",v:["beautiful","hidden","history"],d:25,s:"Potsdam\'s forgotten hilltop folly — an Italian palace on a forested hill with the best view of the lakes",st:"The Belvedere on the Pfingstberg was begun by Friedrich Wilhelm IV in 1847 and never finished. The two towers give an extraordinary panorama over the Heiliger See and toward Sanssouci. Far fewer visitors than Sanssouci.",im:"Time-travel: Friedrich Wilhelm IV standing on this unfinished terrace in 1860, watching the lake turn gold",t:"Small entry fee for the towers. Grounds partially free. Bus 692.",c:["high_spots"],r:"g",nn:"Belvedere auf dem Pfingstberg — Potsdam-Nord",ns:"Potsdams vergessene Hügellaune — ein italienischer Palast auf einem Waldhügel mit dem besten Seeblick",nst:"Das Belvedere auf dem Pfingstberg wurde 1847 von Friedrich Wilhelm IV. begonnen und nie fertiggestellt.",nt:"Kleiner Eintritt für die Türme. Gelände teilweise kostenlos. Bus 692."},
  {id:31,n:"Sanssouci Park — Sanssouci #31",a:"Sanssouci",v:["nature","beautiful","hidden"],d:45,s:"Vast palace park open to all — wander far from the tourists into empty lanes",st:"Frederick the Great\'s summer retreat covers 290 hectares. Walk ten minutes from the palace and the crowds vanish. Just fountains, vine terraces, and stillness.",im:"Time-travel: Sanssouci 200 years ago — servants rushing past Rococo fountains",t:"Enter from the east gate for fewest crowds. Come weekday mornings.",c:["history_big"],r:"g",nn:"Sanssouci Park — Sanssouci #31",ns:"Riesiger Schlosspark für alle — wander weit weg von den Touristen in leere Alleen",nst:"Friedrichs des Großen Sommerresidenz umfasst 290 Hektar. Zehn Minuten vom Schloss entfernt verschwinden die Massen.",nt:"Am Osttor eintreten für weniger Trubel. Unter der Woche morgens kommen."},
  {id:32,n:"Ruinenberg Hilltop — Sanssouci #32",a:"Sanssouci",v:["history","quiet","beautiful"],d:12,s:"Artificial ruins on a hill built as a romantic folly — and a secret reservoir",st:"Frederick ordered fake Roman ruins built here in 1748. Below them: a cistern feeding Sanssouci\'s fountains. Locals picnic here; tourists rarely find it.",im:"Time-travel: workers building fake ruins by hand in 1748",t:"Bring a picnic. The hill has 360-degree views. Mostly empty.",c:["high_spots"],r:"g",nn:"Ruinenberg — Sanssouci #32",ns:"Künstliche Ruinen auf einem Hügel — ein romantisches Lustschloss und geheimes Wasserreservoir",nst:"Friedrich ließ 1748 falsche Römerruinen bauen. Darunter: eine Zisterne für Sanssoucis Fontänen.",nt:"Picknick mitbringen. Der Hügel bietet 360-Grad-Aussicht. Meist leer."},
  {id:33,n:"Pfingstberg Belvedere — Potsdam-Nord #33",a:"Potsdam-Nord",v:["beautiful","hidden","history"],d:6,s:"Twin-towered Italianate belvedere with views over Berlin and Potsdam",st:"Built 1847–1863 and never finished. The towers survived WWII, served as a Stasi observation post, and now reveal both cities on the horizon.",im:"Time-travel: construction halted mid-tower in 1860 — scaffolding left standing for decades",t:"Small admission for the tower interior but the surrounding park is free.",c:["parks"],r:"g",nn:"Pfingstberg Belvedere — Potsdam-Nord #33",ns:"Zweitürmiges Belvedere mit Blick auf Berlin und Potsdam",nst:"1847–1863 gebaut und nie fertiggestellt. Die Türme wurden Stasi-Beobachtungsposten.",nt:"Kleiner Eintritt für das Innere, aber der Park ist kostenlos."},
  {id:34,n:"Holländisches Viertel — Holländisches Viertel #34",a:"Holländisches Viertel",v:["history","local","beautiful"],d:52,s:"134 Dutch gabled houses built for craftsmen who never came — now full of cafés",st:"Frederick William I invited Dutch craftsmen to Potsdam in 1734. Most never arrived. The quarter stood half-empty for decades. Now the best neighbourhood in the city.",im:"Time-travel: empty Dutch houses awaiting settlers who never came, 1740",t:"Walk every street. The back alleys have the best details.",c:["courtyards"],r:"g",nn:"Holländisches Viertel — Holländisches Viertel #34",ns:"134 holländische Giebelhäuser für Handwerker gebaut, die nie kamen — jetzt voller Cafés",nst:"Friedrich Wilhelm I. lud 1734 holländische Handwerker ein. Die meisten kamen nie.",nt:"Jede Straße abgehen. In den Hintergassen stecken die besten Details."},
  {id:35,n:"Glienicker Brücke — Babelsberg #35",a:"Babelsberg",v:["history","hidden","weird"],d:22,s:"The Cold War spy exchange bridge — real prisoners crossed here in silence",st:"Three times during the Cold War, KGB and CIA traded agents here at dawn. The bridge was closed to civilians for 28 years. You can walk it freely now.",im:"Time-travel: 1962 — spy exchange at dawn, both sides watching through binoculars",t:"Cross into the Wannsee side. The royal hunting grounds are just beyond.",c:["romantic_water"],r:"g",nn:"Glienicker Brücke — Babelsberg #35",ns:"Die Agentenbrücke des Kalten Krieges — echte Gefangene wurden hier schweigend ausgetauscht",nst:"Dreimal tauschten KGB und CIA hier Agenten bei Tagesanbruch aus. Die Brücke war 28 Jahre für Zivilisten gesperrt.",nt:"Auf die Wannsee-Seite hinübergehen. Dahinter liegen die königlichen Jagdgründe."},
  {id:36,n:"Schlosspark Babelsberg — Babelsberg #36",a:"Babelsberg",v:["nature","beautiful","quiet"],d:20,s:"English landscape garden along the Havel — Gothic towers, romantic ruins, river views",st:"Designed by Lenné and Pückler for Crown Prince Wilhelm. The gothic pump house looks like a fairy tale church. The Havel glimmers through the trees at every turn.",im:"Time-travel: Crown Prince Wilhelm walking these paths in 1838",t:"Enter from Waldmüllerstraße for the river views. Free throughout.",c:["scary"],r:"g",nn:"Schlosspark Babelsberg — Babelsberg #36",ns:"Englischer Landschaftspark an der Havel — gotische Türme, romantische Ruinen, Flussblick",nst:"Von Lenné und Pückler für Kronprinz Wilhelm gestaltet. Das gotische Pumpenhaus wirkt wie eine Märchenkirche.",nt:"Von der Waldmüllerstraße eintreten für die Flussblicke. Überall kostenlos."},
  {id:37,n:"Alexandrowka Russian Colony — Potsdam-Nord #37",a:"Potsdam-Nord",v:["history","hidden","local"],d:19,s:"12 log houses built for Russian singers stranded in Prussia after Napoleon — still inhabited",st:"In 1826, Friedrich Wilhelm III built this colony for 12 Russian POW singers who sang for him during the wars. Their descendants still live in some houses.",im:"Time-travel: Russian choir singing for the Prussian king in 1815, homesick and stranded",t:"The Alexander Nevsky church at the top is always open. Free to wander the paths.",c:["famous_dead"],r:"g",nn:"Alexandrowka — Potsdam-Nord #37",ns:"12 Blockhäuser für russische Sänger gebaut, die nach Napoleon in Preußen strandeten — noch bewohnt",nst:"1826 baute Friedrich Wilhelm III. diese Kolonie für 12 russische Kriegsgefangene-Sänger.",nt:"Die Alexander-Newski-Kirche oben ist immer geöffnet. Wege kostenlos zugänglich."},
  {id:38,n:"Telegrafenberg — Potsdam-Nord #38",a:"Potsdam-Nord",v:["history","hidden","quiet"],d:13,s:"Hilltop science campus with Einsteinturm — the tower that tested relativity",st:"The Einstein Tower was built in 1924 to prove Einstein\'s theory using solar spectroscopy. It still operates as a research telescope. The hill around it is silent and strange.",im:"Time-travel: Einstein visiting the tower in 1924, checking if it would work",t:"The campus is freely walkable. Einstein Tower exterior only unless on a guided tour.",c:["street_art"],r:"g",nn:"Telegrafenberg — Potsdam-Nord #38",ns:"Wissenschaftscampus auf dem Hügel mit dem Einsteinturm — der Turm, der die Relativitätstheorie testete",nst:"Der Einsteinturm wurde 1924 gebaut, um Einsteins Theorie mittels Sonnenspektroskopie zu beweisen.",nt:"Der Campus ist frei zugänglich. Einsteinturm nur außen, außer bei Führungen."},
  {id:39,n:"Cecilienhof Palace — Potsdam-Nord #39",a:"Potsdam-Nord",v:["history","hidden"],d:52,s:"English country house where Truman, Stalin and Churchill carved up the post-war world",st:"The Potsdam Conference of 1945 happened in this mock-Tudor mansion. The round table where the Big Three sat is still in place. The gardens are free to wander.",im:"Time-travel: August 1945 — three men deciding the fate of millions over a round table",t:"Gardens are free. Small fee for the conference rooms interior.",c:["abandoned"],r:"g",nn:"Schloss Cecilienhof — Potsdam-Nord #39",ns:"Englisches Landhaus, wo Truman, Stalin und Churchill die Nachkriegswelt aufteilten",nst:"Die Potsdamer Konferenz 1945 fand in diesem Tudor-Herrenhaus statt. Der runde Tisch steht noch.",nt:"Gärten kostenlos. Kleiner Eintritt für die Konferenzräume."},
  {id:40,n:"Alter Markt & Nikolaikirche — Altstadt #40",a:"Altstadt",v:["history","beautiful"],d:11,s:"Rebuilt baroque square with the great dome of St. Nicholas rising above it all",st:"The Nikolaikirche dome was destroyed in WWII, rebuilt in 1981 by the GDR — a rare act of socialist historic preservation. The square around it was restored after reunification.",im:"Time-travel: the market square in 1750, busy with merchants under Prussian royal windows",t:"Climb the church steps for views. Free to enter.",c:["free_museum"],r:"g",nn:"Alter Markt & Nikolaikirche — Altstadt #40",ns:"Wiederaufgebauter Barockplatz mit der großen Kuppel der Nikolaikirche",nst:"Die Kuppel wurde im Krieg zerstört, 1981 von der DDR wiederaufgebaut. Eine seltene sozialistische Denkmalpflege.",nt:"Die Kirchenstufen erklimmen für die Aussicht. Eintritt kostenlos."},
  {id:41,n:"Brandenburger Tor Potsdam — Altstadt #41",a:"Altstadt",v:["history","beautiful","local"],d:48,s:"Potsdam has its own Brandenburg Gate — older and more beautiful than Berlin\'s version",st:"Built in 1770 to celebrate the Seven Years War, it predates Berlin\'s gate. Two completely different faces — Roman on one side, ornate on the other.",im:"Time-travel: soldiers marching through the gate in 1770 after the Seven Years War",t:"Stand at the arch and look at both sides — they are completely different designs.",c:["local_only"],r:"g",nn:"Brandenburger Tor — Altstadt #41",ns:"Potsdam hat sein eigenes Brandenburger Tor — älter und schöner als Berlins Version",nst:"1770 zum Gedenken an den Siebenjährigen Krieg gebaut. Zwei völlig verschiedene Seiten.",nt:"Im Torbogen stehen und beide Seiten betrachten — sie sind komplett unterschiedlich."},
  {id:42,n:"Nauener Tor — Altstadt #42",a:"Altstadt",v:["history","quiet"],d:52,s:"Gothic gate built by a Prussian king who had never seen England — based on engravings",st:"Friedrich Wilhelm I built this English Gothic gate in 1755 using only engravings as reference — he had never visited England. It\'s the oldest neo-Gothic structure in Germany.",im:"Time-travel: the king studying English engravings and ordering a gate built from them",t:"Walk through and into Holländisches Viertel immediately beyond.",c:["architecture"],r:"g",nn:"Nauener Tor — Altstadt #42",ns:"Gotisches Tor, erbaut von einem preußischen König, der England nie gesehen hatte — nach Stichen",nst:"1755 erbaut, nach englischen Stichen ohne je England besucht zu haben. Das älteste neugotische Bauwerk Deutschlands.",nt:"Durchgehen und direkt ins Holländische Viertel eintreten."},
  {id:43,n:"Freundschaftsinsel — Altstadt #43",a:"Altstadt",v:["nature","beautiful","quiet"],d:39,s:"Island garden in the Havel — rose collections, medicinal plants, absolute calm",st:"This island was used as a Nazi party garden, then a GDR experimental plant station. Now it grows 350 rose varieties and dozens of medicinal herbs. Free to wander.",im:"Time-travel: GDR botanists cataloguing every plant species on this island in 1965",t:"Free entry. Peak blooms June and September. Almost no tourists.",c:["history_big"],r:"g",nn:"Freundschaftsinsel — Altstadt #43",ns:"Garteninsel in der Havel — Rosensammlungen, Heilpflanzen, absolute Ruhe",nst:"Diese Insel war Parteigarten der NSDAP, dann DDR-Versuchspflanzenstation. Jetzt 350 Rosensorten.",nt:"Freier Eintritt. Beste Blüte im Juni und September. Kaum Touristen."},
  {id:44,n:"Heiliger See — Potsdam-Nord #44",a:"Potsdam-Nord",v:["nature","beautiful","quiet"],d:10,s:"Wild glacial lake ringed by old villas — swim, canoe, or just sit at the edge",st:"The lake sits between royal park estates. Its northern shore is still wild. Old rowing boats rent by the hour. Some of the finest Berlin villas hide behind the trees.",im:"Time-travel: Kaiser Wilhelm II rowing on this lake in 1905, watching the swans",t:"FKK bathing allowed on the north bank. Warm summer months only.",c:["high_spots"],r:"g",nn:"Heiliger See — Potsdam-Nord #44",ns:"Wilder Gletschersee, umgeben von alten Villen — schwimmen, kanufahren oder einfach sitzen",nst:"Der See liegt zwischen Königsparks. Das Nordufer ist noch wild. Alte Ruderboote stundenweise.",nt:"FKK-Baden am Nordufer erlaubt. Nur in warmen Sommermonaten."},
  {id:45,n:"Schloss Charlottenhof — Sanssouci #45",a:"Sanssouci",v:["history","beautiful","hidden"],d:42,s:"Small Schinkel villa in the park that looks like a Roman country house",st:"Karl Friedrich Schinkel designed this neoclassical gem in 1829 for Crown Prince Friedrich Wilhelm. The Roman Baths complex next door was partly designed by the prince himself.",im:"Time-travel: Schinkel and the Crown Prince walking the site in 1829, sketching in hand",t:"In the park, free. Walk through the Italian Garden at the back.",c:["parks"],r:"g",nn:"Schloss Charlottenhof — Sanssouci #45",ns:"Kleine Schinkel-Villa im Park — wie ein römisches Landhaus",nst:"Schinkel entwarf dieses neoklassische Juwel 1829 für Kronprinz Friedrich Wilhelm.",nt:"Im Park kostenlos. Durch den Italienischen Garten dahinter gehen."},
  {id:46,n:"Römische Bäder — Sanssouci #46",a:"Sanssouci",v:["history","beautiful","hidden"],d:32,s:"Mock Roman villa complex in the park — pure fantasy architecture built for pleasure",st:"The Crown Prince and his court architect Persius built this fantasy Roman estate 1829–1840 as an ornamental garden feature. It was never actually used for bathing.",im:"Time-travel: workers laying the Roman mosaic floors in 1835, piece by piece",t:"Exterior free. Walk the water garden. Small fee to enter the buildings.",c:["courtyards"],r:"g",nn:"Römische Bäder — Sanssouci #46",ns:"Pseudorömische Villenkomplex im Park — reine Fantasiearchitektur",nst:"Kronprinz und Persius bauten 1829–1840 diesen Fantasie-Romankomplex. Zum Baden war er nie gedacht.",nt:"Außenbereich kostenlos. Wassergarten abgehen. Kleiner Eintritt ins Gebäude."},
  {id:47,n:"Alexandrowka Orthodox Church — Potsdam-Nord #47",a:"Potsdam-Nord",v:["history","beautiful","quiet"],d:7,s:"Russian Orthodox chapel on a hill above the log houses — open and golden inside",st:"Built in 1829 for the Russian colony. The interior is intimate, richly decorated, and always unlocked. Incense drifts through the wooden structure.",im:"Time-travel: the Russian singers attending Sunday liturgy in 1830, far from home",t:"Light a candle. Nobody will stop you. Always free.",c:["romantic_water"],r:"g",nn:"Russisch-Orthodoxe Kirche Alexandrowka — Potsdam-Nord #47",ns:"Russisch-orthodoxe Kapelle auf einem Hügel — offen und golden innen",nst:"1829 für die russische Kolonie erbaut. Das Innere ist intim, reich dekoriert und immer offen.",nt:"Eine Kerze anzünden. Niemand wird Sie aufhalten. Immer kostenlos."},
  {id:48,n:"Dampfmaschinenhaus — Sanssouci #48",a:"Sanssouci",v:["hidden","weird","history"],d:6,s:"A steam engine disguised as a mosque — the minaret is a chimney",st:"To pump water for Sanssouci\'s fountains, Persius built a steam engine house in 1842 disguised as an Islamic mosque. The minaret is the chimney stack.",im:"Time-travel: Victorian engineers firing up the steam engine inside a fake mosque",t:"Open weekends in summer. Exterior always free.",c:["scary"],r:"g",nn:"Dampfmaschinenhaus — Sanssouci #48",ns:"Eine Dampfmaschine als Moschee verkleidet — das Minarett ist ein Schornstein",nst:"Um Wasser für Sanssoucis Fontänen zu pumpen, baute Persius 1842 ein Maschinenhaus als islamische Moschee.",nt:"Wochenends im Sommer geöffnet. Außenbereich immer kostenlos."},
  {id:49,n:"Bassinplatz — Holländisches Viertel #49",a:"Holländisches Viertel",v:["local","quiet"],d:10,s:"Square with a fountain where locals actually live — not a tourist square",st:"At the heart of the Dutch Quarter, this plaza has a small fountain, no restaurants, and real Potsdam life: dogs, students, neighbours. It\'s the square the guidebooks miss.",im:"Time-travel: 18th century Dutch craftsmen gathering around this fountain on Sundays",t:"Sit here. Watch. Come back in the evening when the residents are out.",c:["famous_dead"],r:"g",nn:"Bassinplatz — Holländisches Viertel #49",ns:"Platz mit Brunnen, auf dem Einheimische wirklich leben — kein Touristenplatz",nst:"Im Herzen des Holländischen Viertels, mit kleinem Brunnen, ohne Restaurants und mit echtem Potsdamer Leben.",nt:"Hinsetzen. Beobachten. Abends wiederkommen, wenn die Anwohner draußen sind."},
  {id:50,n:"Havel Waterfront Walk — Babelsberg #50",a:"Babelsberg",v:["nature","beautiful","quiet"],d:18,s:"Path along the Havel between Babelsberg and Wannsee — lake light, old villas, swans",st:"The Havel widens here into something like a sea. The path runs between forested banks, passing the Glienicker Bridge and old villa gardens. Silent in the mornings.",im:"Time-travel: Kaiser barges moving on the Havel river in 1900",t:"Walk south from the Glienicker Bridge for the best stretch.",c:["street_art"],r:"g",nn:"Havel-Uferweg — Babelsberg #50",ns:"Weg an der Havel zwischen Babelsberg und Wannsee — Seelicht, alte Villen, Schwäne",nst:"Die Havel weitet sich hier zu etwas wie einem See. Der Weg führt durch bewaldete Ufer.",nt:"Vom Glienicker Brücke südlich gehen für den schönsten Abschnitt."},
  {id:51,n:"Jägertor — Altstadt #51",a:"Altstadt",v:["history","hidden","quiet"],d:19,s:"The oldest surviving city gate in Potsdam — 1733, and almost nobody photographs it",st:"This unassuming Baroque gate stands at the edge of Altstadt with no crowds around it. It is older than Berlin\'s Brandenburg Gate.",im:"Time-travel: soldiers passing through this gate in 1733, the city still half-built",t:"Find it on Jägerallee. Stand there and count how many people walk past.",c:["abandoned"],r:"g",nn:"Jägertor — Altstadt #51",ns:"Das älteste erhaltene Stadttor in Potsdam — 1733, und fast niemand fotografiert es",nst:"Dieses schlichte Barocktor steht am Rand der Altstadt ohne jede Menschenmenge. Es ist älter als Berlins Brandenburger Tor.",nt:"In der Jägerallee finden. Davor stehen und zählen, wie viele Leute vorbeigehen."},
  {id:52,n:"Volkspark Sanssouci Northern Trail — Sanssouci #52",a:"Sanssouci",v:["nature","hidden","free"],d:37,s:"The forgotten northern end of the park where deer graze and paths wind unmarked",st:"While thousands crowd the terraces, the north of Sanssouci park is nearly empty. Ancient trees, deer paths, and a small lake. The map doesn\'t show all the trails.",im:"Time-travel: royal hunting parties pursuing deer through these same trees, 1750",t:"Enter from Schopenhauerstraße. Bring your own map.",c:["free_museum"],r:"g",nn:"Volkspark Sanssouci Nordpfad — Sanssouci #52",ns:"Das vergessene nördliche Ende des Parks, wo Rehe grasen und Wege unmarkiert verlaufen",nst:"Während Tausende die Terrassen stürmen, ist der Norden fast leer. Alte Bäume, Rehpfade, ein kleiner See.",nt:"Von der Schopenhauerstraße eintreten. Eigene Karte mitbringen."},
  {id:53,n:"Krongut Bornstedt — Sanssouci #53",a:"Sanssouci",v:["history","local"],d:43,s:"Royal estate turned craft village — brewhouse, bakery, smithy still working",st:"The royal farm estate from 1853 became a GDR collective, then a restored artisan complex. The original brewhouse makes beer. Courtyard free to explore.",im:"Time-travel: royal servants working the estate in 1860, cattle and all",t:"The courtyard is free. Beer garden open in summer.",c:["local_only"],r:"g",nn:"Krongut Bornstedt — Sanssouci #53",ns:"Königliches Gut als Handwerkerdorf — Brauhaus, Bäckerei, Schmiede noch in Betrieb",nst:"Das königliche Gutshof von 1853 wurde DDR-Kollektiv, dann restaurierter Handwerkskomplex.",nt:"Der Innenhof ist kostenlos. Biergarten im Sommer geöffnet."},
  {id:54,n:"Luisenplatz — Altstadt #54",a:"Altstadt",v:["history","local"],d:6,s:"The square where Potsdam\'s tram meets its palace gate — the living heart of the city",st:"Where the Brandenburger Tor frames the view down the main axis of Sanssouci. Trams ring, students cycle, locals buy flowers. The best human square in Potsdam.",im:"Time-travel: horse-drawn carriages turning through this square in 1890",t:"Sit at the café terrace and watch the tram turn. Free to observe.",c:["architecture"],r:"g",nn:"Luisenplatz — Altstadt #54",ns:"Der Platz, wo Potsdams Tram auf sein Palasttor trifft — das lebendige Herz der Stadt",nst:"Der Brandenburger Tor rahmt den Blick die Hauptachse von Sanssouci entlang. Straßenbahnen, Studenten, Blumenkäufer.",nt:"Am Café-Tisch sitzen und die Straßenbahn beobachten. Kostenlos."},
  {id:55,n:"Kapellenberg — Potsdam-Nord #55",a:"Potsdam-Nord",v:["hidden","quiet","nature"],d:40,s:"Forested hill with a ruined chapel and views nobody knows about",st:"The chapel was destroyed in the 19th century. Just foundations remain in a clearing at the top. The hike up is 20 minutes through beech trees. At the top: silence.",im:"Time-travel: the medieval chapel standing here fully intact, monks inside, 1500",t:"Start from Ribbeckstraße. No signs — find your own way.",c:["history_big"],r:"g",nn:"Kapellenberg — Potsdam-Nord #55",ns:"Bewaldeter Hügel mit einer Ruine einer Kapelle und Aussichten, die niemand kennt",nst:"Die Kapelle wurde im 19. Jahrhundert zerstört. Oben in einer Lichtung: nur Fundamente.",nt:"Start von der Ribbeckstraße. Keine Schilder — eigenen Weg finden."},
  {id:56,n:"Alexandrowka Russian Colony — Potsdam-Nord #56",a:"Potsdam-Nord",v:["weird","history","beautiful"],d:17,s:"12 wooden Russian izba houses built in 1826 for Prussian-Russian singers — completely surreal in Brandenburg",st:"Friedrich Wilhelm III built Alexandrowka for 12 Russian soldiers who stayed in Prussia after the Napoleonic wars. Log houses, an Orthodox church, a Russian cemetery. It is now UNESCO heritage and open to walk freely.",im:"Time-travel: the 12 Russian singers standing in front of their new wooden houses in 1826, homesick in Brandenburg",t:"Free to walk the colony. Orthodox church has small fee. Bus 92 or 96.",c:["high_spots"],r:"g",nn:"Alexandrowka — Potsdam-Nord #56",ns:"12 russische Holzhäuser, gebaut 1826 für preußisch-russische Sänger — im Brandenburg völlig surreal",nst:"Friedrich Wilhelm III baute Alexandrowka für 12 russische Soldaten, die nach den Napoleonischen Kriegen blieben. UNESCO-Welterbe.",nt:"Kolonie kostenlos erkunden. Orthodoxe Kirche kleiner Eintritt. Bus 92 oder 96."},
  {id:57,n:"Einstein Tower — Sanssouci #57",a:"Sanssouci",v:["architecture","weird","hidden"],d:50,s:"Erich Mendelsohn\'s 1922 expressionist tower on the Telegrafenberg science hill — one of the strangest buildings in Germany",st:"The Einstein Tower was designed in 1919 to test Einstein\'s theory of relativity using solar spectroscopy. The exterior is curved stucco, more sculpture than building. It still operates as a working observatory.",im:"Time-travel: Einstein visiting the finished tower in 1921, inspecting the telescope designed in his honour",t:"Exterior always viewable. Tram 96 to Telegrafenberg. Guided tours possible.",c:["parks"],r:"g",nn:"Einsteinturm — Sanssouci #57",ns:"Erich Mendelsohns expressionistischer Turm von 1922 auf dem Telegrafenberg — eines der seltsamsten Gebäude Deutschlands",nst:"Der Einsteinturm wurde 1919 entworfen, um Einsteins Relativitätstheorie mit Sonnenspektroskopie zu testen.",nt:"Außenbereich immer einsehbar. Tram 96 zum Telegrafenberg."},
  {id:58,n:"Park Babelsberg Havel Walk — Babelsberg #58",a:"Babelsberg",v:["beautiful","romantic_water","free"],d:46,s:"The castle-in-the-trees riverbank — palace, suspension bridge and the Havel at sunset",st:"Park Babelsberg follows the Havel shore east from the Glienicke Bridge. Babelsberg Palace sits above in the trees. The riverside path has extraordinary views toward the Glienicke Bridge and back to Sanssouci. Almost nobody walks it.",im:"Time-travel: Kaiser Wilhelm I rowing on the Havel with his family from Babelsberg Palace, 1870",t:"Free. Enter from the Glienicke Bridge side. Walk the river path east.",c:["courtyards"],r:"g",nn:"Park Babelsberg Havelweg — Babelsberg #58",ns:"Der Schloss-im-Wald-Uferweg — Schloss, Hängebrücke und die Havel bei Sonnenuntergang",nst:"Park Babelsberg folgt dem Havelufer östlich der Glienicker Brücke. Das Schloss Babelsberg liegt darüber in den Bäumen.",nt:"Kostenlos. Eingang von der Glienicker Brücke. Flussuferweg nach Osten gehen."},
  {id:59,n:"Krampnitz Soviet Barracks — Potsdam-Nord #59",a:"Potsdam-Nord",v:["abandoned","history","weird"],d:49,s:"A 1930s Wehrmacht then Soviet military town abandoned since 1992 — a ghost city on the edge of Potsdam",st:"Krampnitz was built for the Wehrmacht in 1937 and handed to the Soviet army in 1945. The Soviets left in 1992 and took everything. What remains is a complete military town — barracks, theatre, swimming pool — all empty.",im:"Time-travel: Soviet tanks rolling through this gate in 1945, taking over a base the Wehrmacht had just abandoned",t:"Free public access from Potsdamer Chaussee. Don\'t enter buildings — exterior only.",c:["romantic_water"],r:"g",nn:"Sowjetsches Kasernendorf Krampnitz — Potsdam-Nord #59",ns:"Eine Wehrmacht- dann Sowjet-Militärstadt, 1992 verlassen — eine Geisterstadt am Rand von Potsdam",nst:"Krampnitz wurde 1937 für die Wehrmacht gebaut. Die Sowjets verließen es 1992. Eine vollständige Militärstadt — leer seit drei Jahrzehnten.",nt:"Freier Zugang von der Potsdamer Chaussee. Gebäude nicht betreten."},
  {id:60,n:"Pfingstberg Belvedere Viewpoint — Potsdam-Nord #60",a:"Potsdam-Nord",v:["beautiful","hidden","history"],d:39,s:"Potsdam\'s forgotten hilltop folly — an Italian palace on a forested hill with the best view of the lakes",st:"The Belvedere on the Pfingstberg was begun by Friedrich Wilhelm IV in 1847 and never finished. The two towers give an extraordinary panorama over the Heiliger See and toward Sanssouci. Far fewer visitors than Sanssouci.",im:"Time-travel: Friedrich Wilhelm IV standing on this unfinished terrace in 1860, watching the lake turn gold",t:"Small entry fee for the towers. Grounds partially free. Bus 692.",c:["scary"],r:"g",nn:"Belvedere auf dem Pfingstberg — Potsdam-Nord #60",ns:"Potsdams vergessene Hügellaune — ein italienischer Palast auf einem Waldhügel mit dem besten Seeblick",nst:"Das Belvedere auf dem Pfingstberg wurde 1847 von Friedrich Wilhelm IV. begonnen und nie fertiggestellt.",nt:"Kleiner Eintritt für die Türme. Gelände teilweise kostenlos. Bus 692."},
  {id:61,n:"Sanssouci Park — Sanssouci #61",a:"Sanssouci",v:["nature","beautiful","hidden"],d:31,s:"Vast palace park open to all — wander far from the tourists into empty lanes",st:"Frederick the Great\'s summer retreat covers 290 hectares. Walk ten minutes from the palace and the crowds vanish. Just fountains, vine terraces, and stillness.",im:"Time-travel: Sanssouci 200 years ago — servants rushing past Rococo fountains",t:"Enter from the east gate for fewest crowds. Come weekday mornings.",c:["famous_dead"],r:"g",nn:"Sanssouci Park — Sanssouci #61",ns:"Riesiger Schlosspark für alle — wander weit weg von den Touristen in leere Alleen",nst:"Friedrichs des Großen Sommerresidenz umfasst 290 Hektar. Zehn Minuten vom Schloss entfernt verschwinden die Massen.",nt:"Am Osttor eintreten für weniger Trubel. Unter der Woche morgens kommen."},
  {id:62,n:"Ruinenberg Hilltop — Sanssouci #62",a:"Sanssouci",v:["history","quiet","beautiful"],d:19,s:"Artificial ruins on a hill built as a romantic folly — and a secret reservoir",st:"Frederick ordered fake Roman ruins built here in 1748. Below them: a cistern feeding Sanssouci\'s fountains. Locals picnic here; tourists rarely find it.",im:"Time-travel: workers building fake ruins by hand in 1748",t:"Bring a picnic. The hill has 360-degree views. Mostly empty.",c:["street_art"],r:"g",nn:"Ruinenberg — Sanssouci #62",ns:"Künstliche Ruinen auf einem Hügel — ein romantisches Lustschloss und geheimes Wasserreservoir",nst:"Friedrich ließ 1748 falsche Römerruinen bauen. Darunter: eine Zisterne für Sanssoucis Fontänen.",nt:"Picknick mitbringen. Der Hügel bietet 360-Grad-Aussicht. Meist leer."},
  {id:63,n:"Pfingstberg Belvedere — Potsdam-Nord #63",a:"Potsdam-Nord",v:["beautiful","hidden","history"],d:33,s:"Twin-towered Italianate belvedere with views over Berlin and Potsdam",st:"Built 1847–1863 and never finished. The towers survived WWII, served as a Stasi observation post, and now reveal both cities on the horizon.",im:"Time-travel: construction halted mid-tower in 1860 — scaffolding left standing for decades",t:"Small admission for the tower interior but the surrounding park is free.",c:["abandoned"],r:"g",nn:"Pfingstberg Belvedere — Potsdam-Nord #63",ns:"Zweitürmiges Belvedere mit Blick auf Berlin und Potsdam",nst:"1847–1863 gebaut und nie fertiggestellt. Die Türme wurden Stasi-Beobachtungsposten.",nt:"Kleiner Eintritt für das Innere, aber der Park ist kostenlos."},
  {id:64,n:"Holländisches Viertel — Holländisches Viertel #64",a:"Holländisches Viertel",v:["history","local","beautiful"],d:42,s:"134 Dutch gabled houses built for craftsmen who never came — now full of cafés",st:"Frederick William I invited Dutch craftsmen to Potsdam in 1734. Most never arrived. The quarter stood half-empty for decades. Now the best neighbourhood in the city.",im:"Time-travel: empty Dutch houses awaiting settlers who never came, 1740",t:"Walk every street. The back alleys have the best details.",c:["free_museum"],r:"g",nn:"Holländisches Viertel — Holländisches Viertel #64",ns:"134 holländische Giebelhäuser für Handwerker gebaut, die nie kamen — jetzt voller Cafés",nst:"Friedrich Wilhelm I. lud 1734 holländische Handwerker ein. Die meisten kamen nie.",nt:"Jede Straße abgehen. In den Hintergassen stecken die besten Details."},
  {id:65,n:"Glienicker Brücke — Babelsberg #65",a:"Babelsberg",v:["history","hidden","weird"],d:22,s:"The Cold War spy exchange bridge — real prisoners crossed here in silence",st:"Three times during the Cold War, KGB and CIA traded agents here at dawn. The bridge was closed to civilians for 28 years. You can walk it freely now.",im:"Time-travel: 1962 — spy exchange at dawn, both sides watching through binoculars",t:"Cross into the Wannsee side. The royal hunting grounds are just beyond.",c:["local_only"],r:"g",nn:"Glienicker Brücke — Babelsberg #65",ns:"Die Agentenbrücke des Kalten Krieges — echte Gefangene wurden hier schweigend ausgetauscht",nst:"Dreimal tauschten KGB und CIA hier Agenten bei Tagesanbruch aus. Die Brücke war 28 Jahre für Zivilisten gesperrt.",nt:"Auf die Wannsee-Seite hinübergehen. Dahinter liegen die königlichen Jagdgründe."},
  {id:66,n:"Schlosspark Babelsberg — Babelsberg #66",a:"Babelsberg",v:["nature","beautiful","quiet"],d:5,s:"English landscape garden along the Havel — Gothic towers, romantic ruins, river views",st:"Designed by Lenné and Pückler for Crown Prince Wilhelm. The gothic pump house looks like a fairy tale church. The Havel glimmers through the trees at every turn.",im:"Time-travel: Crown Prince Wilhelm walking these paths in 1838",t:"Enter from Waldmüllerstraße for the river views. Free throughout.",c:["architecture"],r:"g",nn:"Schlosspark Babelsberg — Babelsberg #66",ns:"Englischer Landschaftspark an der Havel — gotische Türme, romantische Ruinen, Flussblick",nst:"Von Lenné und Pückler für Kronprinz Wilhelm gestaltet. Das gotische Pumpenhaus wirkt wie eine Märchenkirche.",nt:"Von der Waldmüllerstraße eintreten für die Flussblicke. Überall kostenlos."},
  {id:67,n:"Alexandrowka Russian Colony — Potsdam-Nord #67",a:"Potsdam-Nord",v:["history","hidden","local"],d:53,s:"12 log houses built for Russian singers stranded in Prussia after Napoleon — still inhabited",st:"In 1826, Friedrich Wilhelm III built this colony for 12 Russian POW singers who sang for him during the wars. Their descendants still live in some houses.",im:"Time-travel: Russian choir singing for the Prussian king in 1815, homesick and stranded",t:"The Alexander Nevsky church at the top is always open. Free to wander the paths.",c:["history_big"],r:"g",nn:"Alexandrowka — Potsdam-Nord #67",ns:"12 Blockhäuser für russische Sänger gebaut, die nach Napoleon in Preußen strandeten — noch bewohnt",nst:"1826 baute Friedrich Wilhelm III. diese Kolonie für 12 russische Kriegsgefangene-Sänger.",nt:"Die Alexander-Newski-Kirche oben ist immer geöffnet. Wege kostenlos zugänglich."},
  {id:68,n:"Telegrafenberg — Potsdam-Nord #68",a:"Potsdam-Nord",v:["history","hidden","quiet"],d:15,s:"Hilltop science campus with Einsteinturm — the tower that tested relativity",st:"The Einstein Tower was built in 1924 to prove Einstein\'s theory using solar spectroscopy. It still operates as a research telescope. The hill around it is silent and strange.",im:"Time-travel: Einstein visiting the tower in 1924, checking if it would work",t:"The campus is freely walkable. Einstein Tower exterior only unless on a guided tour.",c:["high_spots"],r:"g",nn:"Telegrafenberg — Potsdam-Nord #68",ns:"Wissenschaftscampus auf dem Hügel mit dem Einsteinturm — der Turm, der die Relativitätstheorie testete",nst:"Der Einsteinturm wurde 1924 gebaut, um Einsteins Theorie mittels Sonnenspektroskopie zu beweisen.",nt:"Der Campus ist frei zugänglich. Einsteinturm nur außen, außer bei Führungen."},
  {id:69,n:"Cecilienhof Palace — Potsdam-Nord #69",a:"Potsdam-Nord",v:["history","hidden"],d:49,s:"English country house where Truman, Stalin and Churchill carved up the post-war world",st:"The Potsdam Conference of 1945 happened in this mock-Tudor mansion. The round table where the Big Three sat is still in place. The gardens are free to wander.",im:"Time-travel: August 1945 — three men deciding the fate of millions over a round table",t:"Gardens are free. Small fee for the conference rooms interior.",c:["parks"],r:"g",nn:"Schloss Cecilienhof — Potsdam-Nord #69",ns:"Englisches Landhaus, wo Truman, Stalin und Churchill die Nachkriegswelt aufteilten",nst:"Die Potsdamer Konferenz 1945 fand in diesem Tudor-Herrenhaus statt. Der runde Tisch steht noch.",nt:"Gärten kostenlos. Kleiner Eintritt für die Konferenzräume."},
  {id:70,n:"Alter Markt & Nikolaikirche — Altstadt #70",a:"Altstadt",v:["history","beautiful"],d:32,s:"Rebuilt baroque square with the great dome of St. Nicholas rising above it all",st:"The Nikolaikirche dome was destroyed in WWII, rebuilt in 1981 by the GDR — a rare act of socialist historic preservation. The square around it was restored after reunification.",im:"Time-travel: the market square in 1750, busy with merchants under Prussian royal windows",t:"Climb the church steps for views. Free to enter.",c:["courtyards"],r:"g",nn:"Alter Markt & Nikolaikirche — Altstadt #70",ns:"Wiederaufgebauter Barockplatz mit der großen Kuppel der Nikolaikirche",nst:"Die Kuppel wurde im Krieg zerstört, 1981 von der DDR wiederaufgebaut. Eine seltene sozialistische Denkmalpflege.",nt:"Die Kirchenstufen erklimmen für die Aussicht. Eintritt kostenlos."},
  {id:71,n:"Brandenburger Tor Potsdam — Altstadt #71",a:"Altstadt",v:["history","beautiful","local"],d:26,s:"Potsdam has its own Brandenburg Gate — older and more beautiful than Berlin\'s version",st:"Built in 1770 to celebrate the Seven Years War, it predates Berlin\'s gate. Two completely different faces — Roman on one side, ornate on the other.",im:"Time-travel: soldiers marching through the gate in 1770 after the Seven Years War",t:"Stand at the arch and look at both sides — they are completely different designs.",c:["romantic_water"],r:"g",nn:"Brandenburger Tor — Altstadt #71",ns:"Potsdam hat sein eigenes Brandenburger Tor — älter und schöner als Berlins Version",nst:"1770 zum Gedenken an den Siebenjährigen Krieg gebaut. Zwei völlig verschiedene Seiten.",nt:"Im Torbogen stehen und beide Seiten betrachten — sie sind komplett unterschiedlich."},
  {id:72,n:"Nauener Tor — Altstadt #72",a:"Altstadt",v:["history","quiet"],d:22,s:"Gothic gate built by a Prussian king who had never seen England — based on engravings",st:"Friedrich Wilhelm I built this English Gothic gate in 1755 using only engravings as reference — he had never visited England. It\'s the oldest neo-Gothic structure in Germany.",im:"Time-travel: the king studying English engravings and ordering a gate built from them",t:"Walk through and into Holländisches Viertel immediately beyond.",c:["scary"],r:"g",nn:"Nauener Tor — Altstadt #72",ns:"Gotisches Tor, erbaut von einem preußischen König, der England nie gesehen hatte — nach Stichen",nst:"1755 erbaut, nach englischen Stichen ohne je England besucht zu haben. Das älteste neugotische Bauwerk Deutschlands.",nt:"Durchgehen und direkt ins Holländische Viertel eintreten."},
  {id:73,n:"Freundschaftsinsel — Altstadt #73",a:"Altstadt",v:["nature","beautiful","quiet"],d:14,s:"Island garden in the Havel — rose collections, medicinal plants, absolute calm",st:"This island was used as a Nazi party garden, then a GDR experimental plant station. Now it grows 350 rose varieties and dozens of medicinal herbs. Free to wander.",im:"Time-travel: GDR botanists cataloguing every plant species on this island in 1965",t:"Free entry. Peak blooms June and September. Almost no tourists.",c:["famous_dead"],r:"g",nn:"Freundschaftsinsel — Altstadt #73",ns:"Garteninsel in der Havel — Rosensammlungen, Heilpflanzen, absolute Ruhe",nst:"Diese Insel war Parteigarten der NSDAP, dann DDR-Versuchspflanzenstation. Jetzt 350 Rosensorten.",nt:"Freier Eintritt. Beste Blüte im Juni und September. Kaum Touristen."},
  {id:74,n:"Heiliger See — Potsdam-Nord #74",a:"Potsdam-Nord",v:["nature","beautiful","quiet"],d:18,s:"Wild glacial lake ringed by old villas — swim, canoe, or just sit at the edge",st:"The lake sits between royal park estates. Its northern shore is still wild. Old rowing boats rent by the hour. Some of the finest Berlin villas hide behind the trees.",im:"Time-travel: Kaiser Wilhelm II rowing on this lake in 1905, watching the swans",t:"FKK bathing allowed on the north bank. Warm summer months only.",c:["street_art"],r:"g",nn:"Heiliger See — Potsdam-Nord #74",ns:"Wilder Gletschersee, umgeben von alten Villen — schwimmen, kanufahren oder einfach sitzen",nst:"Der See liegt zwischen Königsparks. Das Nordufer ist noch wild. Alte Ruderboote stundenweise.",nt:"FKK-Baden am Nordufer erlaubt. Nur in warmen Sommermonaten."},
  {id:75,n:"Schloss Charlottenhof — Sanssouci #75",a:"Sanssouci",v:["history","beautiful","hidden"],d:53,s:"Small Schinkel villa in the park that looks like a Roman country house",st:"Karl Friedrich Schinkel designed this neoclassical gem in 1829 for Crown Prince Friedrich Wilhelm. The Roman Baths complex next door was partly designed by the prince himself.",im:"Time-travel: Schinkel and the Crown Prince walking the site in 1829, sketching in hand",t:"In the park, free. Walk through the Italian Garden at the back.",c:["abandoned"],r:"g",nn:"Schloss Charlottenhof — Sanssouci #75",ns:"Kleine Schinkel-Villa im Park — wie ein römisches Landhaus",nst:"Schinkel entwarf dieses neoklassische Juwel 1829 für Kronprinz Friedrich Wilhelm.",nt:"Im Park kostenlos. Durch den Italienischen Garten dahinter gehen."},
  {id:76,n:"Römische Bäder — Sanssouci #76",a:"Sanssouci",v:["history","beautiful","hidden"],d:26,s:"Mock Roman villa complex in the park — pure fantasy architecture built for pleasure",st:"The Crown Prince and his court architect Persius built this fantasy Roman estate 1829–1840 as an ornamental garden feature. It was never actually used for bathing.",im:"Time-travel: workers laying the Roman mosaic floors in 1835, piece by piece",t:"Exterior free. Walk the water garden. Small fee to enter the buildings.",c:["free_museum"],r:"g",nn:"Römische Bäder — Sanssouci #76",ns:"Pseudorömische Villenkomplex im Park — reine Fantasiearchitektur",nst:"Kronprinz und Persius bauten 1829–1840 diesen Fantasie-Romankomplex. Zum Baden war er nie gedacht.",nt:"Außenbereich kostenlos. Wassergarten abgehen. Kleiner Eintritt ins Gebäude."},
  {id:77,n:"Alexandrowka Orthodox Church — Potsdam-Nord #77",a:"Potsdam-Nord",v:["history","beautiful","quiet"],d:11,s:"Russian Orthodox chapel on a hill above the log houses — open and golden inside",st:"Built in 1829 for the Russian colony. The interior is intimate, richly decorated, and always unlocked. Incense drifts through the wooden structure.",im:"Time-travel: the Russian singers attending Sunday liturgy in 1830, far from home",t:"Light a candle. Nobody will stop you. Always free.",c:["local_only"],r:"g",nn:"Russisch-Orthodoxe Kirche Alexandrowka — Potsdam-Nord #77",ns:"Russisch-orthodoxe Kapelle auf einem Hügel — offen und golden innen",nst:"1829 für die russische Kolonie erbaut. Das Innere ist intim, reich dekoriert und immer offen.",nt:"Eine Kerze anzünden. Niemand wird Sie aufhalten. Immer kostenlos."},
  {id:78,n:"Dampfmaschinenhaus — Sanssouci #78",a:"Sanssouci",v:["hidden","weird","history"],d:10,s:"A steam engine disguised as a mosque — the minaret is a chimney",st:"To pump water for Sanssouci\'s fountains, Persius built a steam engine house in 1842 disguised as an Islamic mosque. The minaret is the chimney stack.",im:"Time-travel: Victorian engineers firing up the steam engine inside a fake mosque",t:"Open weekends in summer. Exterior always free.",c:["architecture"],r:"g",nn:"Dampfmaschinenhaus — Sanssouci #78",ns:"Eine Dampfmaschine als Moschee verkleidet — das Minarett ist ein Schornstein",nst:"Um Wasser für Sanssoucis Fontänen zu pumpen, baute Persius 1842 ein Maschinenhaus als islamische Moschee.",nt:"Wochenends im Sommer geöffnet. Außenbereich immer kostenlos."},
  {id:79,n:"Bassinplatz — Holländisches Viertel #79",a:"Holländisches Viertel",v:["local","quiet"],d:29,s:"Square with a fountain where locals actually live — not a tourist square",st:"At the heart of the Dutch Quarter, this plaza has a small fountain, no restaurants, and real Potsdam life: dogs, students, neighbours. It\'s the square the guidebooks miss.",im:"Time-travel: 18th century Dutch craftsmen gathering around this fountain on Sundays",t:"Sit here. Watch. Come back in the evening when the residents are out.",c:["history_big"],r:"g",nn:"Bassinplatz — Holländisches Viertel #79",ns:"Platz mit Brunnen, auf dem Einheimische wirklich leben — kein Touristenplatz",nst:"Im Herzen des Holländischen Viertels, mit kleinem Brunnen, ohne Restaurants und mit echtem Potsdamer Leben.",nt:"Hinsetzen. Beobachten. Abends wiederkommen, wenn die Anwohner draußen sind."},
  {id:80,n:"Havel Waterfront Walk — Babelsberg #80",a:"Babelsberg",v:["nature","beautiful","quiet"],d:11,s:"Path along the Havel between Babelsberg and Wannsee — lake light, old villas, swans",st:"The Havel widens here into something like a sea. The path runs between forested banks, passing the Glienicker Bridge and old villa gardens. Silent in the mornings.",im:"Time-travel: Kaiser barges moving on the Havel river in 1900",t:"Walk south from the Glienicker Bridge for the best stretch.",c:["high_spots"],r:"g",nn:"Havel-Uferweg — Babelsberg #80",ns:"Weg an der Havel zwischen Babelsberg und Wannsee — Seelicht, alte Villen, Schwäne",nst:"Die Havel weitet sich hier zu etwas wie einem See. Der Weg führt durch bewaldete Ufer.",nt:"Vom Glienicker Brücke südlich gehen für den schönsten Abschnitt."},
  {id:81,n:"Jägertor — Altstadt #81",a:"Altstadt",v:["history","hidden","quiet"],d:27,s:"The oldest surviving city gate in Potsdam — 1733, and almost nobody photographs it",st:"This unassuming Baroque gate stands at the edge of Altstadt with no crowds around it. It is older than Berlin\'s Brandenburg Gate.",im:"Time-travel: soldiers passing through this gate in 1733, the city still half-built",t:"Find it on Jägerallee. Stand there and count how many people walk past.",c:["parks"],r:"g",nn:"Jägertor — Altstadt #81",ns:"Das älteste erhaltene Stadttor in Potsdam — 1733, und fast niemand fotografiert es",nst:"Dieses schlichte Barocktor steht am Rand der Altstadt ohne jede Menschenmenge. Es ist älter als Berlins Brandenburger Tor.",nt:"In der Jägerallee finden. Davor stehen und zählen, wie viele Leute vorbeigehen."},
  {id:82,n:"Volkspark Sanssouci Northern Trail — Sanssouci #82",a:"Sanssouci",v:["nature","hidden","free"],d:27,s:"The forgotten northern end of the park where deer graze and paths wind unmarked",st:"While thousands crowd the terraces, the north of Sanssouci park is nearly empty. Ancient trees, deer paths, and a small lake. The map doesn\'t show all the trails.",im:"Time-travel: royal hunting parties pursuing deer through these same trees, 1750",t:"Enter from Schopenhauerstraße. Bring your own map.",c:["courtyards"],r:"g",nn:"Volkspark Sanssouci Nordpfad — Sanssouci #82",ns:"Das vergessene nördliche Ende des Parks, wo Rehe grasen und Wege unmarkiert verlaufen",nst:"Während Tausende die Terrassen stürmen, ist der Norden fast leer. Alte Bäume, Rehpfade, ein kleiner See.",nt:"Von der Schopenhauerstraße eintreten. Eigene Karte mitbringen."},
  {id:83,n:"Krongut Bornstedt — Sanssouci #83",a:"Sanssouci",v:["history","local"],d:43,s:"Royal estate turned craft village — brewhouse, bakery, smithy still working",st:"The royal farm estate from 1853 became a GDR collective, then a restored artisan complex. The original brewhouse makes beer. Courtyard free to explore.",im:"Time-travel: royal servants working the estate in 1860, cattle and all",t:"The courtyard is free. Beer garden open in summer.",c:["romantic_water"],r:"g",nn:"Krongut Bornstedt — Sanssouci #83",ns:"Königliches Gut als Handwerkerdorf — Brauhaus, Bäckerei, Schmiede noch in Betrieb",nst:"Das königliche Gutshof von 1853 wurde DDR-Kollektiv, dann restaurierter Handwerkskomplex.",nt:"Der Innenhof ist kostenlos. Biergarten im Sommer geöffnet."},
  {id:84,n:"Luisenplatz — Altstadt #84",a:"Altstadt",v:["history","local"],d:21,s:"The square where Potsdam\'s tram meets its palace gate — the living heart of the city",st:"Where the Brandenburger Tor frames the view down the main axis of Sanssouci. Trams ring, students cycle, locals buy flowers. The best human square in Potsdam.",im:"Time-travel: horse-drawn carriages turning through this square in 1890",t:"Sit at the café terrace and watch the tram turn. Free to observe.",c:["scary"],r:"g",nn:"Luisenplatz — Altstadt #84",ns:"Der Platz, wo Potsdams Tram auf sein Palasttor trifft — das lebendige Herz der Stadt",nst:"Der Brandenburger Tor rahmt den Blick die Hauptachse von Sanssouci entlang. Straßenbahnen, Studenten, Blumenkäufer.",nt:"Am Café-Tisch sitzen und die Straßenbahn beobachten. Kostenlos."},
  {id:85,n:"Kapellenberg — Potsdam-Nord #85",a:"Potsdam-Nord",v:["hidden","quiet","nature"],d:7,s:"Forested hill with a ruined chapel and views nobody knows about",st:"The chapel was destroyed in the 19th century. Just foundations remain in a clearing at the top. The hike up is 20 minutes through beech trees. At the top: silence.",im:"Time-travel: the medieval chapel standing here fully intact, monks inside, 1500",t:"Start from Ribbeckstraße. No signs — find your own way.",c:["famous_dead"],r:"g",nn:"Kapellenberg — Potsdam-Nord #85",ns:"Bewaldeter Hügel mit einer Ruine einer Kapelle und Aussichten, die niemand kennt",nst:"Die Kapelle wurde im 19. Jahrhundert zerstört. Oben in einer Lichtung: nur Fundamente.",nt:"Start von der Ribbeckstraße. Keine Schilder — eigenen Weg finden."},
  {id:86,n:"Alexandrowka Russian Colony — Potsdam-Nord #86",a:"Potsdam-Nord",v:["weird","history","beautiful"],d:51,s:"12 wooden Russian izba houses built in 1826 for Prussian-Russian singers — completely surreal in Brandenburg",st:"Friedrich Wilhelm III built Alexandrowka for 12 Russian soldiers who stayed in Prussia after the Napoleonic wars. Log houses, an Orthodox church, a Russian cemetery. It is now UNESCO heritage and open to walk freely.",im:"Time-travel: the 12 Russian singers standing in front of their new wooden houses in 1826, homesick in Brandenburg",t:"Free to walk the colony. Orthodox church has small fee. Bus 92 or 96.",c:["street_art"],r:"g",nn:"Alexandrowka — Potsdam-Nord #86",ns:"12 russische Holzhäuser, gebaut 1826 für preußisch-russische Sänger — im Brandenburg völlig surreal",nst:"Friedrich Wilhelm III baute Alexandrowka für 12 russische Soldaten, die nach den Napoleonischen Kriegen blieben. UNESCO-Welterbe.",nt:"Kolonie kostenlos erkunden. Orthodoxe Kirche kleiner Eintritt. Bus 92 oder 96."},
  {id:87,n:"Einstein Tower — Sanssouci #87",a:"Sanssouci",v:["architecture","weird","hidden"],d:34,s:"Erich Mendelsohn\'s 1922 expressionist tower on the Telegrafenberg science hill — one of the strangest buildings in Germany",st:"The Einstein Tower was designed in 1919 to test Einstein\'s theory of relativity using solar spectroscopy. The exterior is curved stucco, more sculpture than building. It still operates as a working observatory.",im:"Time-travel: Einstein visiting the finished tower in 1921, inspecting the telescope designed in his honour",t:"Exterior always viewable. Tram 96 to Telegrafenberg. Guided tours possible.",c:["abandoned"],r:"g",nn:"Einsteinturm — Sanssouci #87",ns:"Erich Mendelsohns expressionistischer Turm von 1922 auf dem Telegrafenberg — eines der seltsamsten Gebäude Deutschlands",nst:"Der Einsteinturm wurde 1919 entworfen, um Einsteins Relativitätstheorie mit Sonnenspektroskopie zu testen.",nt:"Außenbereich immer einsehbar. Tram 96 zum Telegrafenberg."},
  {id:88,n:"Park Babelsberg Havel Walk — Babelsberg #88",a:"Babelsberg",v:["beautiful","romantic_water","free"],d:39,s:"The castle-in-the-trees riverbank — palace, suspension bridge and the Havel at sunset",st:"Park Babelsberg follows the Havel shore east from the Glienicke Bridge. Babelsberg Palace sits above in the trees. The riverside path has extraordinary views toward the Glienicke Bridge and back to Sanssouci. Almost nobody walks it.",im:"Time-travel: Kaiser Wilhelm I rowing on the Havel with his family from Babelsberg Palace, 1870",t:"Free. Enter from the Glienicke Bridge side. Walk the river path east.",c:["free_museum"],r:"g",nn:"Park Babelsberg Havelweg — Babelsberg #88",ns:"Der Schloss-im-Wald-Uferweg — Schloss, Hängebrücke und die Havel bei Sonnenuntergang",nst:"Park Babelsberg folgt dem Havelufer östlich der Glienicker Brücke. Das Schloss Babelsberg liegt darüber in den Bäumen.",nt:"Kostenlos. Eingang von der Glienicker Brücke. Flussuferweg nach Osten gehen."},
  {id:89,n:"Krampnitz Soviet Barracks — Potsdam-Nord #89",a:"Potsdam-Nord",v:["abandoned","history","weird"],d:12,s:"A 1930s Wehrmacht then Soviet military town abandoned since 1992 — a ghost city on the edge of Potsdam",st:"Krampnitz was built for the Wehrmacht in 1937 and handed to the Soviet army in 1945. The Soviets left in 1992 and took everything. What remains is a complete military town — barracks, theatre, swimming pool — all empty.",im:"Time-travel: Soviet tanks rolling through this gate in 1945, taking over a base the Wehrmacht had just abandoned",t:"Free public access from Potsdamer Chaussee. Don\'t enter buildings — exterior only.",c:["local_only"],r:"g",nn:"Sowjetsches Kasernendorf Krampnitz — Potsdam-Nord #89",ns:"Eine Wehrmacht- dann Sowjet-Militärstadt, 1992 verlassen — eine Geisterstadt am Rand von Potsdam",nst:"Krampnitz wurde 1937 für die Wehrmacht gebaut. Die Sowjets verließen es 1992. Eine vollständige Militärstadt — leer seit drei Jahrzehnten.",nt:"Freier Zugang von der Potsdamer Chaussee. Gebäude nicht betreten."},
  {id:90,n:"Pfingstberg Belvedere Viewpoint — Potsdam-Nord #90",a:"Potsdam-Nord",v:["beautiful","hidden","history"],d:29,s:"Potsdam\'s forgotten hilltop folly — an Italian palace on a forested hill with the best view of the lakes",st:"The Belvedere on the Pfingstberg was begun by Friedrich Wilhelm IV in 1847 and never finished. The two towers give an extraordinary panorama over the Heiliger See and toward Sanssouci. Far fewer visitors than Sanssouci.",im:"Time-travel: Friedrich Wilhelm IV standing on this unfinished terrace in 1860, watching the lake turn gold",t:"Small entry fee for the towers. Grounds partially free. Bus 692.",c:["architecture"],r:"g",nn:"Belvedere auf dem Pfingstberg — Potsdam-Nord #90",ns:"Potsdams vergessene Hügellaune — ein italienischer Palast auf einem Waldhügel mit dem besten Seeblick",nst:"Das Belvedere auf dem Pfingstberg wurde 1847 von Friedrich Wilhelm IV. begonnen und nie fertiggestellt.",nt:"Kleiner Eintritt für die Türme. Gelände teilweise kostenlos. Bus 692."},
  {id:91,n:"Sanssouci Park — Sanssouci #91",a:"Sanssouci",v:["nature","beautiful","hidden"],d:10,s:"Vast palace park open to all — wander far from the tourists into empty lanes",st:"Frederick the Great\'s summer retreat covers 290 hectares. Walk ten minutes from the palace and the crowds vanish. Just fountains, vine terraces, and stillness.",im:"Time-travel: Sanssouci 200 years ago — servants rushing past Rococo fountains",t:"Enter from the east gate for fewest crowds. Come weekday mornings.",c:["history_big"],r:"g",nn:"Sanssouci Park — Sanssouci #91",ns:"Riesiger Schlosspark für alle — wander weit weg von den Touristen in leere Alleen",nst:"Friedrichs des Großen Sommerresidenz umfasst 290 Hektar. Zehn Minuten vom Schloss entfernt verschwinden die Massen.",nt:"Am Osttor eintreten für weniger Trubel. Unter der Woche morgens kommen."},
  {id:92,n:"Ruinenberg Hilltop — Sanssouci #92",a:"Sanssouci",v:["history","quiet","beautiful"],d:40,s:"Artificial ruins on a hill built as a romantic folly — and a secret reservoir",st:"Frederick ordered fake Roman ruins built here in 1748. Below them: a cistern feeding Sanssouci\'s fountains. Locals picnic here; tourists rarely find it.",im:"Time-travel: workers building fake ruins by hand in 1748",t:"Bring a picnic. The hill has 360-degree views. Mostly empty.",c:["high_spots"],r:"g",nn:"Ruinenberg — Sanssouci #92",ns:"Künstliche Ruinen auf einem Hügel — ein romantisches Lustschloss und geheimes Wasserreservoir",nst:"Friedrich ließ 1748 falsche Römerruinen bauen. Darunter: eine Zisterne für Sanssoucis Fontänen.",nt:"Picknick mitbringen. Der Hügel bietet 360-Grad-Aussicht. Meist leer."},
  {id:93,n:"Pfingstberg Belvedere — Potsdam-Nord #93",a:"Potsdam-Nord",v:["beautiful","hidden","history"],d:23,s:"Twin-towered Italianate belvedere with views over Berlin and Potsdam",st:"Built 1847–1863 and never finished. The towers survived WWII, served as a Stasi observation post, and now reveal both cities on the horizon.",im:"Time-travel: construction halted mid-tower in 1860 — scaffolding left standing for decades",t:"Small admission for the tower interior but the surrounding park is free.",c:["parks"],r:"g",nn:"Pfingstberg Belvedere — Potsdam-Nord #93",ns:"Zweitürmiges Belvedere mit Blick auf Berlin und Potsdam",nst:"1847–1863 gebaut und nie fertiggestellt. Die Türme wurden Stasi-Beobachtungsposten.",nt:"Kleiner Eintritt für das Innere, aber der Park ist kostenlos."},
