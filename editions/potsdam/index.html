  {id:94,n:"Holländisches Viertel — Holländisches Viertel #94",a:"Holländisches Viertel",v:["history","local","beautiful"],d:45,s:"134 Dutch gabled houses built for craftsmen who never came — now full of cafés",st:"Frederick William I invited Dutch craftsmen to Potsdam in 1734. Most never arrived. The quarter stood half-empty for decades. Now the best neighbourhood in the city.",im:"Time-travel: empty Dutch houses awaiting settlers who never came, 1740",t:"Walk every street. The back alleys have the best details.",c:["courtyards"],r:"g",nn:"Holländisches Viertel — Holländisches Viertel #94",ns:"134 holländische Giebelhäuser für Handwerker gebaut, die nie kamen — jetzt voller Cafés",nst:"Friedrich Wilhelm I. lud 1734 holländische Handwerker ein. Die meisten kamen nie.",nt:"Jede Straße abgehen. In den Hintergassen stecken die besten Details."},
  {id:95,n:"Glienicker Brücke — Babelsberg #95",a:"Babelsberg",v:["history","hidden","weird"],d:44,s:"The Cold War spy exchange bridge — real prisoners crossed here in silence",st:"Three times during the Cold War, KGB and CIA traded agents here at dawn. The bridge was closed to civilians for 28 years. You can walk it freely now.",im:"Time-travel: 1962 — spy exchange at dawn, both sides watching through binoculars",t:"Cross into the Wannsee side. The royal hunting grounds are just beyond.",c:["romantic_water"],r:"g",nn:"Glienicker Brücke — Babelsberg #95",ns:"Die Agentenbrücke des Kalten Krieges — echte Gefangene wurden hier schweigend ausgetauscht",nst:"Dreimal tauschten KGB und CIA hier Agenten bei Tagesanbruch aus. Die Brücke war 28 Jahre für Zivilisten gesperrt.",nt:"Auf die Wannsee-Seite hinübergehen. Dahinter liegen die königlichen Jagdgründe."},
  {id:96,n:"Schlosspark Babelsberg — Babelsberg #96",a:"Babelsberg",v:["nature","beautiful","quiet"],d:28,s:"English landscape garden along the Havel — Gothic towers, romantic ruins, river views",st:"Designed by Lenné and Pückler for Crown Prince Wilhelm. The gothic pump house looks like a fairy tale church. The Havel glimmers through the trees at every turn.",im:"Time-travel: Crown Prince Wilhelm walking these paths in 1838",t:"Enter from Waldmüllerstraße for the river views. Free throughout.",c:["scary"],r:"g",nn:"Schlosspark Babelsberg — Babelsberg #96",ns:"Englischer Landschaftspark an der Havel — gotische Türme, romantische Ruinen, Flussblick",nst:"Von Lenné und Pückler für Kronprinz Wilhelm gestaltet. Das gotische Pumpenhaus wirkt wie eine Märchenkirche.",nt:"Von der Waldmüllerstraße eintreten für die Flussblicke. Überall kostenlos."},
  {id:97,n:"Alexandrowka Russian Colony — Potsdam-Nord #97",a:"Potsdam-Nord",v:["history","hidden","local"],d:41,s:"12 log houses built for Russian singers stranded in Prussia after Napoleon — still inhabited",st:"In 1826, Friedrich Wilhelm III built this colony for 12 Russian POW singers who sang for him during the wars. Their descendants still live in some houses.",im:"Time-travel: Russian choir singing for the Prussian king in 1815, homesick and stranded",t:"The Alexander Nevsky church at the top is always open. Free to wander the paths.",c:["famous_dead"],r:"g",nn:"Alexandrowka — Potsdam-Nord #97",ns:"12 Blockhäuser für russische Sänger gebaut, die nach Napoleon in Preußen strandeten — noch bewohnt",nst:"1826 baute Friedrich Wilhelm III. diese Kolonie für 12 russische Kriegsgefangene-Sänger.",nt:"Die Alexander-Newski-Kirche oben ist immer geöffnet. Wege kostenlos zugänglich."},
  {id:98,n:"Telegrafenberg — Potsdam-Nord #98",a:"Potsdam-Nord",v:["history","hidden","quiet"],d:17,s:"Hilltop science campus with Einsteinturm — the tower that tested relativity",st:"The Einstein Tower was built in 1924 to prove Einstein\'s theory using solar spectroscopy. It still operates as a research telescope. The hill around it is silent and strange.",im:"Time-travel: Einstein visiting the tower in 1924, checking if it would work",t:"The campus is freely walkable. Einstein Tower exterior only unless on a guided tour.",c:["street_art"],r:"g",nn:"Telegrafenberg — Potsdam-Nord #98",ns:"Wissenschaftscampus auf dem Hügel mit dem Einsteinturm — der Turm, der die Relativitätstheorie testete",nst:"Der Einsteinturm wurde 1924 gebaut, um Einsteins Theorie mittels Sonnenspektroskopie zu beweisen.",nt:"Der Campus ist frei zugänglich. Einsteinturm nur außen, außer bei Führungen."},
  {id:99,n:"Cecilienhof Palace — Potsdam-Nord #99",a:"Potsdam-Nord",v:["history","hidden"],d:50,s:"English country house where Truman, Stalin and Churchill carved up the post-war world",st:"The Potsdam Conference of 1945 happened in this mock-Tudor mansion. The round table where the Big Three sat is still in place. The gardens are free to wander.",im:"Time-travel: August 1945 — three men deciding the fate of millions over a round table",t:"Gardens are free. Small fee for the conference rooms interior.",c:["abandoned"],r:"g",nn:"Schloss Cecilienhof — Potsdam-Nord #99",ns:"Englisches Landhaus, wo Truman, Stalin und Churchill die Nachkriegswelt aufteilten",nst:"Die Potsdamer Konferenz 1945 fand in diesem Tudor-Herrenhaus statt. Der runde Tisch steht noch.",nt:"Gärten kostenlos. Kleiner Eintritt für die Konferenzräume."},
  {id:100,n:"Alter Markt & Nikolaikirche — Altstadt #100",a:"Altstadt",v:["history","beautiful"],d:9,s:"Rebuilt baroque square with the great dome of St. Nicholas rising above it all",st:"The Nikolaikirche dome was destroyed in WWII, rebuilt in 1981 by the GDR — a rare act of socialist historic preservation. The square around it was restored after reunification.",im:"Time-travel: the market square in 1750, busy with merchants under Prussian royal windows",t:"Climb the church steps for views. Free to enter.",c:["free_museum"],r:"g",nn:"Alter Markt & Nikolaikirche — Altstadt #100",ns:"Wiederaufgebauter Barockplatz mit der großen Kuppel der Nikolaikirche",nst:"Die Kuppel wurde im Krieg zerstört, 1981 von der DDR wiederaufgebaut. Eine seltene sozialistische Denkmalpflege.",nt:"Die Kirchenstufen erklimmen für die Aussicht. Eintritt kostenlos."},
  {id:101,n:"Brandenburger Tor Potsdam — Altstadt #101",a:"Altstadt",v:["history","beautiful","local"],d:7,s:"Potsdam has its own Brandenburg Gate — older and more beautiful than Berlin\'s version",st:"Built in 1770 to celebrate the Seven Years War, it predates Berlin\'s gate. Two completely different faces — Roman on one side, ornate on the other.",im:"Time-travel: soldiers marching through the gate in 1770 after the Seven Years War",t:"Stand at the arch and look at both sides — they are completely different designs.",c:["local_only"],r:"g",nn:"Brandenburger Tor — Altstadt #101",ns:"Potsdam hat sein eigenes Brandenburger Tor — älter und schöner als Berlins Version",nst:"1770 zum Gedenken an den Siebenjährigen Krieg gebaut. Zwei völlig verschiedene Seiten.",nt:"Im Torbogen stehen und beide Seiten betrachten — sie sind komplett unterschiedlich."},
  {id:102,n:"Nauener Tor — Altstadt #102",a:"Altstadt",v:["history","quiet"],d:47,s:"Gothic gate built by a Prussian king who had never seen England — based on engravings",st:"Friedrich Wilhelm I built this English Gothic gate in 1755 using only engravings as reference — he had never visited England. It\'s the oldest neo-Gothic structure in Germany.",im:"Time-travel: the king studying English engravings and ordering a gate built from them",t:"Walk through and into Holländisches Viertel immediately beyond.",c:["architecture"],r:"g",nn:"Nauener Tor — Altstadt #102",ns:"Gotisches Tor, erbaut von einem preußischen König, der England nie gesehen hatte — nach Stichen",nst:"1755 erbaut, nach englischen Stichen ohne je England besucht zu haben. Das älteste neugotische Bauwerk Deutschlands.",nt:"Durchgehen und direkt ins Holländische Viertel eintreten."},
  {id:103,n:"Freundschaftsinsel — Altstadt #103",a:"Altstadt",v:["nature","beautiful","quiet"],d:19,s:"Island garden in the Havel — rose collections, medicinal plants, absolute calm",st:"This island was used as a Nazi party garden, then a GDR experimental plant station. Now it grows 350 rose varieties and dozens of medicinal herbs. Free to wander.",im:"Time-travel: GDR botanists cataloguing every plant species on this island in 1965",t:"Free entry. Peak blooms June and September. Almost no tourists.",c:["history_big"],r:"g",nn:"Freundschaftsinsel — Altstadt #103",ns:"Garteninsel in der Havel — Rosensammlungen, Heilpflanzen, absolute Ruhe",nst:"Diese Insel war Parteigarten der NSDAP, dann DDR-Versuchspflanzenstation. Jetzt 350 Rosensorten.",nt:"Freier Eintritt. Beste Blüte im Juni und September. Kaum Touristen."},
  {id:104,n:"Heiliger See — Potsdam-Nord #104",a:"Potsdam-Nord",v:["nature","beautiful","quiet"],d:54,s:"Wild glacial lake ringed by old villas — swim, canoe, or just sit at the edge",st:"The lake sits between royal park estates. Its northern shore is still wild. Old rowing boats rent by the hour. Some of the finest Berlin villas hide behind the trees.",im:"Time-travel: Kaiser Wilhelm II rowing on this lake in 1905, watching the swans",t:"FKK bathing allowed on the north bank. Warm summer months only.",c:["high_spots"],r:"g",nn:"Heiliger See — Potsdam-Nord #104",ns:"Wilder Gletschersee, umgeben von alten Villen — schwimmen, kanufahren oder einfach sitzen",nst:"Der See liegt zwischen Königsparks. Das Nordufer ist noch wild. Alte Ruderboote stundenweise.",nt:"FKK-Baden am Nordufer erlaubt. Nur in warmen Sommermonaten."},
  {id:105,n:"Schloss Charlottenhof — Sanssouci #105",a:"Sanssouci",v:["history","beautiful","hidden"],d:23,s:"Small Schinkel villa in the park that looks like a Roman country house",st:"Karl Friedrich Schinkel designed this neoclassical gem in 1829 for Crown Prince Friedrich Wilhelm. The Roman Baths complex next door was partly designed by the prince himself.",im:"Time-travel: Schinkel and the Crown Prince walking the site in 1829, sketching in hand",t:"In the park, free. Walk through the Italian Garden at the back.",c:["parks"],r:"g",nn:"Schloss Charlottenhof — Sanssouci #105",ns:"Kleine Schinkel-Villa im Park — wie ein römisches Landhaus",nst:"Schinkel entwarf dieses neoklassische Juwel 1829 für Kronprinz Friedrich Wilhelm.",nt:"Im Park kostenlos. Durch den Italienischen Garten dahinter gehen."}
  {id:106,n:"Sanssouci Palace at Dawn — Sanssouci Park",a:"Sanssouci",v:["famous","beautiful","history_big"],d:5,s:"The palace before the crowds arrive — walk straight to Frederick's study, golden hour light bouncing off Rococo white paint.",st:"Sanssouci is mobbed by noon. Come at 8am when the park opens and the tour groups haven't arrived. The palace interior is small — the real experience is Frederick the Great's personal study, filled with light and his things, as if he just stepped out.

The park stretches 70km in all directions. Start early, see the palace room, then walk toward the New Palace. You'll have the whole thing to yourself.",im:"Empty rooms. Morning light on white Rococo plasterwork. A desk where Frederick wrote military orders. Complete silence.",t:"Tickets: €12. Buy online. First slot 8am opens at 7:45am. Allow 1.5 hours inside. The park itself is free. Come Tuesday–Thursday, not weekends.",c:["greatest_hits","beautiful","history_big"],r:"g",nn:"Sanssouci-Schloss zur Morgenröte — Sanssouci Park",ns:"Das Schloss vor der Menge — ganz direkt zu Fredericks Arbeitszimmer, Morgenlicht auf Rokoko-Weiß",nst:"Sanssouci ist mittags überlaufen. Komm um 8 Uhr morgens, wenn der Park öffnet. Das Innere ist klein — das echte Erlebnis ist Fredericks privates Arbeitszimmer.",nt:"Eintritte: €12. Online kaufen. Erste Schicht 8 Uhr. 1,5 Stunden innen. Der Park ist kostenlos."},
  {id:107,n:"Jungfernsee Lake Cycling — Werder",a:"Werder",v:["swimming","cycling","day_trips","local"],d:30,s:"The 40km lake loop that locals do on weekends — tea gardens, small beaches, no English speakers, perfect difficulty.",st:"Potsdam sits in a network of glacial lakes. The best one for cycling is Jungfernsee, accessible via a 40km loop from central Potsdam that takes 4 hours at a relaxed pace.

The route is completely flat. You pass tea gardens (Teehaus) where locals stop for coffee, small sandy beaches that nobody photographs, and villages where German families are actually living their lives.

Rent a bike in Potsdam (€8–12/day). The route is marked. You can jump in the water at any point.",im:"Pedaling past vineyards. Locals on cargo bikes. A small sandy beach with a kiosk selling wine and bread. The lake reflecting clouds.",t:"Rent from Potsdam train station. Maps at tourist info. €10–15 return for a good bike. Bring water. Stop at any Teehaus for coffee. The loop is 40km (4 hours). No traffic. Perfect for medium cyclists.",c:["swimming","cycling","day_trips"],r:"g",nn:"Jungfernsee-See-Radstrecke — Werder",ns:"Die 40-km-Seenschleife, die Einheimische am Wochenende fahren — Teegärten, kleine Strände, keine Touristen",nst:"Potsdam sitzt in einem Netzwerk von Gletscherseen. Der beste für Radfahren ist der Jungfernsee, erreichbar über eine 40-km-Schleife von Potsdam aus.",nt:"Fahrrad am Bahnhof mieten (€8–12/Tag). Routen bei Tourismusinfo. 40 km (4 Stunden). Keine Autos."},
  {id:108,n:"Cecilienhof Palace — English Style",a:"Havel",v:["architecture","history","quiet"],d:15,s:"The palace where the Potsdam Conference ended WWII — English Tudor-style on the Havel, almost nobody goes here.",st:"While tourists queue for Sanssouci, Cecilienhof sits nearly empty. Built in 1917 by the last kaiser for his son, it looks like a massive English manor house transplanted to the Havel.

This is where Truman, Stalin, and Churchill negotiated the post-WWII world in 1945. The rooms are exactly as they were that day. Walking through the conference room feels strange and historical in a way the more famous palaces don't.

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
const TBGS={"places":"https://mariavheland.github.io/godostuff/textures/tex04.png","collections":"https://mariavheland.github.io/godostuff/textures/tex03.png","missions":"https://mariavheland.github.io/godostuff/textures/tex03.png","plan":"https://mariavheland.github.io/godostuff/textures/tex03.png","phrases":"https://mariavheland.github.io/godostuff/textures/tex04.png","default":"https://mariavheland.github.io/godostuff/textures/tex04.png"};if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
{/* dark scrim over photo */}
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:`url(\'${TBGS[tab]||TBGS.default}\') center/cover no-repeat`}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Potsdam Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Potsdam Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
