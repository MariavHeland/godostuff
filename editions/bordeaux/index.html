,{id:121,n:"Base sous-marine",a:"Bacalan",v:["hidden", "urbex"],d:20,s:"Creepy WWII submarine bunker lurking by the docks—brutalist vibes for free exterior chills.",st:"Wander the industrial edges of this massive concrete beast, once hiding U-boats under Bordeaux's nose. Echoes of wartime secrets mix with rusty shipyards and salty river air. Perfect for that eerie, time-warped photo op without stepping inside.",im:"Imagine standing dwarfed by towering concrete walls, wind whipping off the Garonne as you peer into shadowy dock voids.",t:"Tram B to Bassins à Flot stop, then 5-min walk along quays; free outside views 24/7, exhibitions €5 (skip for free thrill); dawn/dusk for moody light.",c:["urbex", "history"],r:"g",nn:"Base sous-marine",ns:"Bunker sous-marin WWII creepy au bord des docks—vibes brutalistes gratuites.",nst:"Errez aux abords industriels de cette bête de béton massive, autrefois abri de sous-marins sous le nez de Bordeaux. Échos de secrets de guerre se mêlent aux chantiers rouillés et à l'air salin du fleuve. Parfait pour des photos éerie sans entrer.",nt:"Tram B jusqu'à Bassins à Flot, puis 5 min à pied le long des quais ; vues extérieures gratuites 24/7, expos €5 (sautez pour le frisson gratuit) ; aube/crépuscule pour lumière moody.",ef:"Grab cheap sandwiches at nearby Fortiche Club (~€6-10)."},
{id:122,n:"GR Bordeaux Métropole",a:"Riverbanks & suburbs",v:["hidden", "hike"],d:25,s:"DIY urban long-distance hike threading parks, riverbanks, and wild suburbs.",st:"Stitch together hidden green corridors from city heart to fringe escapes. Sweat through graffiti'd underpasses into bird-filled woods. Feels like hacking the city's secret backbone.",im:"Picture cresting a riverside path at golden hour, Bordeaux's skyline popping against untamed greenery.",t:"Start anywhere (e.g., Pont de Pierre); free, use Komoot app for segments 5-20km; best spring/fall, wear good shoes.",c:["hikes", "adventure"],r:"g",nn:"GR® Bordeaux Métropole",ns:"Rando urbaine longue distance DIY reliant parcs, berges et banlieues sauvages.",nst:"Assemblez des couloirs verts cachés du centre-ville aux échappées périphériques. Transpirez sous des passages graffitiés vers des bois emplis d'oiseaux. Sensation de pirater l'épine dorsale secrète de la ville.",nt:"Démarrez n'importe où (ex. Pont de Pierre) ; gratuit, app Komoot pour segments 5-20km ; meilleur au printemps/automne, bonnes chaussures.",ef:"Picnic from Marché des Capucins for trail fuel."},
{id:123,n:"Lac de Bordeaux + Plaine des Sports",a:"Bègles",v:["hidden", "swim"],d:15,s:"Wild urban lake dips for instant summer escape—locals' secret splash spot.",st:"Slip into cool waters ringed by gritty parks and buzzing cicadas. Far from tourist splashes, it's raw city-nature fusion. Check quality flags before diving in.",im:"Feel the thrill of jumping into glassy lake waters, city hum fading to splash and laughter.",t:"Tram C to Bègles centre, 10-min walk; free swimming (check water quality online); summer afternoons, bring towel.",c:["swim", "nature"],r:"g",nn:"Lac de Bordeaux + Plaine des Sports",ns:"Baignade sauvage en lac urbain—spot secret des locaux pour évasion estivale.",nst:"Glissez dans des eaux fraîches bordées de parcs gritty et cigales bourdonnantes. Loin des éclaboussures touristiques, fusion brute ville-nature. Vérifiez les qualités avant plongée.",nt:"Tram C à Bègles centre, 10 min à pied ; baignade gratuite (qualité eau en ligne) ; après-midi été, serviette.",ef:"Cheap crepes from nearby markets."},
{id:124,n:"Jardin des Remparts",a:"Saint-Michel",v:["hidden"],d:10,s:"Secret garden on ancient city walls—if the gates whisper open.",st:"Climb hidden stairs to overgrown ramparts blooming with wildflowers and forgotten benches. A hushed oasis amid Saint-Michel's buzz, like stumbling into a fairy-tale hideout. Peek for reopenings post-2025 closures.",im:"Envision lounging on vine-draped walls, medieval stones warm under sun, city chaos below.",t:"Rue Marbotin / rue des Douves stairs; free if open; mornings for quiet, check local updates as entrances were closed June 2025.",c:["gardens"],r:"g",nn:"Jardin des Remparts",ns:"Jardin secret sur remparts anciens—si les portes murmurent ouvert.",nst:"Montez escaliers cachés vers remparts envahis de fleurs sauvages et bancs oubliés. Oasis silencieuse au milieu du bourdonnement Saint-Michel, comme un repaire de conte de fées. Vérifiez réouvertures après fermetures 2025.",nt:"Escaliers rue Marbotin / rue des Douves ; gratuit si ouvert ; matins calmes, actu locales car fermé juin 2025."}];

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Bordeaux Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
