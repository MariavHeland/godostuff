<script>
const P = [
  {id:1,n:"Stadtturm Climb — Altstadt",a:"Altstadt",v:["beautiful","history","high_spots"],d:15,s:"Climb 148 steps for a 360° view of the Alps and the old town — the best vantage in Innsbruck",st:"The medieval watchtower was built in 1358. From the open-air viewing gallery, you look straight down the colourful Herzog-Friedrich-Straße and up to the Nordkette wall. No better introduction to this city.",im:"Time-travel: a watchman scanning the Inn valley from this tower for danger, 1500",t:"Small entry fee (€3). Open daily. Worth every cent for the view.",c:["high_spots"],r:"g",nn:"Stadtturm — Altstadt",ns:"148 Stufen für einen 360°-Blick auf die Alpen und die Altstadt",nst:"Der mittelalterliche Wachturm wurde 1358 erbaut. Von der Aussichtsplattform blickt man geradeaus die Herzog-Friedrich-Straße entlang.",nt:"Kleiner Eintritt (3 €). Täglich geöffnet."},
  {id:2,n:"Herzog-Friedrich-Straße — Altstadt",a:"Altstadt",v:["beautiful","history","architecture"],d:10,s:"The most photogenic street in Austria — pastel arcades, Golden Roof, mountain backdrop",st:"The arcaded street has been Innsbruck\'s main artery since the 14th century. The Golden Roof glitters at the far end. Walk it early morning before the tourists arrive. The mountains are always there, framed between buildings.",im:"Time-travel: Emperor Maximilian I watching a tournament from the Golden Roof, 1496",t:"Free always. Best light at 7–9am.",c:["architecture"],r:"g",nn:"Herzog-Friedrich-Straße — Altstadt",ns:"Die fotogenste Straße Österreichs — Pastellarkaden, Goldenes Dachl, Bergkulisse",nst:"Die Arkadengasse ist seit dem 14. Jahrhundert Innsbrucks Hauptader.",nt:"Immer gratis. Bestes Licht 7–9 Uhr morgens."},
  {id:3,n:"Innkai Riverside Walk — Altstadt",a:"Altstadt",v:["nature","quiet","beautiful"],d:20,s:"The Inn riverbank — fast glacier water, mountain backdrop, free swimming in summer",st:"The Inn runs fast and cold from the Alps straight through the city centre. The riverside promenade is where locals jog, sunbathe on pebble banks, and swim in the turquoise glacier water in summer.",im:"Time-travel: the medieval bridge at this spot, the gateway to Innsbruck for Alpine traders, 1300",t:"Free always. Swimming is local custom — enter carefully, strong current.",c:["parks"],r:"g",nn:"Innkai — Altstadt",ns:"Das Innufer — schnelles Gletscherwasser, Bergkulisse, Freibaden im Sommer",nst:"Der Inn fließt schnell und kalt von den Alpen direkt durch die Innenstadt.",nt:"Immer gratis. Schwimmen ist lokale Tradition — Vorsicht, starke Strömung."},
  {id:4,n:"Hofgarten — Altstadt",a:"Altstadt",v:["beautiful","nature","quiet"],d:20,s:"The imperial court garden — pavilion concerts, chess tables, and a rose garden with mountain views",st:"The Hofgarten was laid out in 1410 for the Habsburg court. It is still the city\'s most elegant park. Pensioners play chess on permanent stone boards under the trees. Free summer concerts in the pavilion.",im:"Time-travel: the Habsburg court promenading here in formal dress, watched by the Nordkette, 1780",t:"Free. Open daily. Check for free summer concert programme.",c:["parks"],r:"g",nn:"Hofgarten — Altstadt",ns:"Der kaiserliche Hofgarten — Pavillonkonzerte, Schachtische, Rosengarten mit Bergblick",nst:"Der Hofgarten wurde 1410 für den Habsburger Hof angelegt.",nt:"Gratis. Täglich geöffnet. Sommerkonzerte sind gratis."},
  {id:5,n:"Nordkette Footpath — Nordkette",a:"Nordkette",v:["nature","high_spots","local"],d:90,s:"Hike from the city centre straight up the Nordkette — the mountain wall Innsbruck looks up at",st:"The Höhenweg trail rises from 900 m to 2334 m (Hafelekar). The lower section through the forest takes 2 hours and is free. You emerge above the treeline to see the whole city and Inn valley. Locals do this on weekends.",im:"Time-travel: chamois watching the first mountaineers climbing this ridge in the 1800s",t:"Free to walk. Cable car costs €30 return — hike instead if you have time.",c:["parks"],r:"g",nn:"Nordkette Wanderweg — Nordkette",ns:"Zu Fuß vom Stadtzentrum hoch auf die Nordkette",nst:"Der Höhenweg steigt von 900 m auf 2334 m (Hafelekar). Das untere Waldstück dauert 2 Stunden.",nt:"Zu Fuß kostenlos. Seilbahn kostet 30 €."},
  {id:6,n:"Hungerburg Village — Hungerburg",a:"Hungerburg",v:["local","beautiful","hidden"],d:40,s:"The mountain village above Innsbruck that 99% of visitors never reach — extraordinary views",st:"Hungerburg sits at 870 m above the city, reachable by the Hungerburgbahn funicular. Once there it is a quiet residential area. Walk to the Grab viewpoint for the full Inn valley panorama.",im:"Time-travel: the first funicular opening in 1906, Innsbruck residents taking Sunday trips up for the air",t:"Hungerburgbahn included in Innsbruck Card or day ticket.",c:["high_spots"],r:"g",nn:"Hungerburg — Hungerburg",ns:"Das Bergdorf über Innsbruck, das 99 % der Besucher nie erreichen",nst:"Hungerburg liegt auf 870 m über der Stadt und ist mit der Hungerburgbahn erreichbar.",nt:"Hungerburgbahn im Innsbruck Card enthalten."},
  {id:7,n:"Stift Wilten Basilica — Wilten",a:"Wilten",v:["beautiful","history","architecture"],d:15,s:"A small baroque basilica in the student quarter with extraordinary yellow-and-white interior",st:"The Basilika Wilten was completed in 1756 on the site of a Roman settlement. The interior is an explosion of fresco, gilt, and cream stone. It is always quiet. The monastery garden next door is free.",im:"Time-travel: Cistercian monks building this basilica on top of the Roman ruins of Veldidena, 1750",t:"Free. Open daily. No tickets needed.",c:["architecture"],r:"g",nn:"Basilika Wilten — Wilten",ns:"Eine kleine Barockbasilika im Studentenviertel mit außergewöhnlichem Gelb-Weiß-Interieur",nst:"Die Basilika Wilten wurde 1756 auf dem Gelände einer römischen Siedlung fertiggestellt.",nt:"Gratis. Täglich geöffnet."},
  {id:8,n:"Triumphpforte — Mariahilf",a:"Mariahilf",v:["history","architecture","weird"],d:10,s:"A triumphal arch built to celebrate a wedding — one face mourns, one face celebrates",st:"The arch was built in 1765 for the wedding of Leopold II. Mid-celebration, his father Franz I died. Maria Theresa had the south face redesigned as a mourning arch. So one face celebrates, one face mourns.",im:"Time-travel: the Habsburg court ceremony under this arch, half celebrating, half in black mourning, 1765",t:"Free, always visible. Best seen from both sides.",c:["history_big"],r:"g",nn:"Triumphpforte — Mariahilf",ns:"Ein Triumphbogen gebaut für eine Hochzeit — ein Gesicht trauert, das andere feiert",nst:"Der Bogen wurde 1765 für die Hochzeit Leopolds II. gebaut. Mitten in der Feier starb sein Vater.",nt:"Gratis, immer sichtbar."},
  {id:9,n:"Bergisel Ski Jump Exterior — Wilten",a:"Wilten",v:["architecture","weird","beautiful"],d:15,s:"Zaha Hadid\'s swooping ski jump tower — the most dramatic architecture in Tyrol",st:"The Bergisel ski jump was rebuilt by Zaha Hadid in 2002. The structure curves and cantilevers over the old hillside like a liquid steel sculpture. The exterior is free to walk around and photograph.",im:"Time-travel: the first ski jump competition at Bergisel in 1925, wooden ramps and leather boots",t:"Exterior always free. Tower café has entry fee. Exterior alone is worth it.",c:["architecture"],r:"g",nn:"Bergisel Schanze — Wilten",ns:"Zaha Hadids geschwungener Sprungturm — das dramatischste Bauwerk Tirols",nst:"Die Bergisel-Schanze wurde 2002 von Zaha Hadid umgebaut.",nt:"Außenbereich immer gratis."},
  {id:10,n:"Wiltener Platzl Market — Wilten",a:"Wilten",v:["local","free","hidden"],d:20,s:"The local weekly market far from the tourist trail — the real Innsbruck food culture",st:"Wiltener Platzl\'s Saturday market is where chefs and local families shop for Tyrolean cheese, speck, fresh bread, and forest mushrooms. Half the stalls offer tastings.",im:"Time-travel: this square as the village centre of Wilten before it was absorbed by the city, 1890",t:"Free. Saturdays, 7am–1pm.",c:["local_only"],r:"g",nn:"Wiltener Platzl Markt — Wilten",ns:"Der lokale Wochenmarkt abseits des Touristenpfads",nst:"Der Samstagmarkt auf dem Wiltener Platzl ist der Ort, wo Köche und Familien Tiroler Käse einkaufen.",nt:"Gratis. Samstags 7–13 Uhr."},
  {id:11,n:"Hötting Village Path — Hötting",a:"Hötting",v:["hidden","local","nature"],d:35,s:"Walk through the hillside residential suburb where Innsbruck residents actually live",st:"Hötting climbs the north slope above the Inn, a maze of footpaths between old farmhouses and modern apartments. The Martinswand cliff looms above. Walk up for views and silence.",im:"Time-travel: Hötting as a completely separate village looking down at the town of Innsbruck, 1850",t:"Free. Walk from the Altstadt bridge north, then follow signs uphill.",c:["local_only"],r:"g",nn:"Hötting Dorfpfad — Hötting",ns:"Durch den Wohnvorort, wo Innsbrucker wirklich leben",nst:"Hötting klettert den Nordhang über dem Inn hinauf, ein Labyrinth aus Fußwegen.",nt:"Gratis. Zu Fuß von der Altstadtbrücke."},
  {id:12,n:"Alpenzoo — Hungerburg",a:"Hungerburg",v:["nature","local","history"],d:60,s:"Europe\'s highest-altitude zoo — bears, wolves, ibex, and golden eagles",st:"The Alpenzoo sits at 727 m and houses only species native to the Alps. Brown bears, lynx, golden eagles, ibex, and bearded vultures. The mountain views from the enclosures are remarkable.",im:"Time-travel: the last wolf shot in Tyrol in 1882, now these same animals protected here",t:"Entry fee (€12). Hungerburgbahn included with zoo ticket.",c:["parks"],r:"g",nn:"Alpenzoo — Hungerburg",ns:"Europas höchstgelegener Zoo — Bären, Wölfe, Steinböcke, native Alpenarten",nst:"Der Alpenzoo liegt auf 727 m und beherbergt nur in den Alpen heimische Tierarten.",nt:"Eintritt (12 €). Hungerburgbahn mit Zooticket enthalten."},
  {id:13,n:"Igls Village Hike — Igls",a:"Igls",v:["nature","quiet","local"],d:60,s:"Tram to the plateau village above Innsbruck — old Tyrolean houses, meadows, and mountain silence",st:"The historic tram line climbs to Igls at 900 m, a village of old farmhouses, a small baroque church, and summer meadows. Walk the Patscherkofel trail or just sit in the silence.",im:"Time-travel: the original tram ride to Igls as Innsbruck\'s first leisure excursion, 1900",t:"Day ticket covers the tram. Walk freely from the Igls terminus.",c:["parks"],r:"g",nn:"Igls Dorfwanderung — Igls",ns:"Straßenbahn zum Plateaudorf über Innsbruck — alte Tiroler Häuser, Wiesen, Bergstille",nst:"Die historische Straßenbahn fährt nach Igls auf 900 m.",nt:"Tageskarte enthält Straßenbahn. Ab Endstation Igls frei herumlaufen."},
  {id:14,n:"Hall in Tirol Old Town — Hall in Tirol",a:"Hall in Tirol",v:["history","hidden","beautiful"],d:60,s:"The medieval silver-mint town 10 km east — better preserved than Innsbruck, half the tourists",st:"Hall was more important than Innsbruck for centuries — the site of Tyrol\'s silver mint from 1477. The medieval old town is astonishingly intact. The Schulgasse, Münzergasse, and Stadtturm are all free.",im:"Time-travel: Hall at the peak of its silver wealth, carts of coin rolling out the gate to the Habsburg treasury, 1520",t:"Free to walk. Bus 4 from Innsbruck (25 min).",c:["history_big"],r:"g",nn:"Hall in Tirol Altstadt — Hall in Tirol",ns:"Die mittelalterliche Silbermünzstadt 10 km östlich — besser erhalten als Innsbruck",nst:"Hall war jahrhundertelang wichtiger als Innsbruck.",nt:"Gratis zu Fuß. Bus 4 ab Innsbruck (25 min)."},
  {id:15,n:"Annasäule — Altstadt",a:"Altstadt",v:["history","architecture","beautiful"],d:5,s:"A gilded baroque column in Innsbruck\'s most photographed piazza — meeting point of the city",st:"The Annasäule was erected in 1706 to commemorate the defeat of Bavarian forces. It stands at the crossing point of the Maria-Theresien-Straße. The golden figure catches the afternoon light.",im:"Time-travel: Innsbruck citizens erecting this column in celebration, the Alps as always behind, 1706",t:"Free. Open square, always accessible.",c:["architecture"],r:"g",nn:"Annasäule — Altstadt",ns:"Eine vergoldete Barockkolonne auf Innsbrucks meist fotografiertem Platz",nst:"Die Annasäule wurde 1706 errichtet zum Gedenken an den Sieg über bayerische Truppen.",nt:"Gratis. Öffentlicher Platz, immer zugänglich."},
  {id:16,n:"Goldenes Dachl — Altstadt",a:"Altstadt",v:["history","beautiful","weird"],d:10,s:"2,657 fire-gilded copper tiles — the most expensive balcony in Europe, built to settle a rumour",st:"Emperor Maximilian I built the Golden Roof in 1500 partly to prove he was not impoverished — a rumour was circulating. The result: 2,657 gilded copper tiles. The loggia museum inside is worth a visit.",im:"Time-travel: Emperor Maximilian watching tournament jousting from this balcony, 1500",t:"Exterior free always. Museum entry €5.",c:["history_big"],r:"g",nn:"Goldenes Dachl — Altstadt",ns:"2.657 feuervergoldete Kupferschindeln — der teuerste Balkon Europas",nst:"Kaiser Maximilian I. baute das Goldene Dachl 1500.",nt:"Außen immer gratis. Museumseingang 5 €."},
  {id:17,n:"Dom zu St. Jakob — Altstadt",a:"Altstadt",v:["architecture","beautiful","history"],d:15,s:"The cathedral with Cranach\'s Madonna and one of the finest baroque interiors in Tyrol",st:"The Dom was rebuilt in baroque style in 1722. The ceiling fresco by the Asam brothers is one of the largest in the world. Cranach\'s Madonna painting hangs in the side chapel. Always free.",im:"Time-travel: the Asam brothers painting the cathedral ceiling on scaffolding 20 metres up, 1720",t:"Free. Open daily. Check for organ concerts.",c:["architecture"],r:"g",nn:"Dom zu St. Jakob — Altstadt",ns:"Die Kathedrale mit Cranachs Madonna und einem der schönsten Barockinterieurs Tirols",nst:"Der Dom wurde 1722 im Barockstil umgebaut.",nt:"Gratis. Täglich geöffnet."},
  {id:18,n:"Grassmayr Bell Museum — Altstadt",a:"Altstadt",v:["hidden","history","local"],d:30,s:"A family bell foundry operating continuously since 1599 — the oldest business in Innsbruck",st:"The Grassmayr family has cast bells in the same building since 1599. They supply churches across the Alps. The museum explains bell casting with original moulds and an acoustic chamber.",im:"Time-travel: a Grassmayr bell being cast for a Tyrolean village church, molten bronze poured at midnight, 1750",t:"Small entry (€5). Open weekdays. Ring the bells yourself.",c:["history_big"],r:"g",nn:"Grassmayr Glockenmuseum — Altstadt",ns:"Eine Glockengießerei, die seit 1599 ununterbrochen betrieben wird",nst:"Die Familie Grassmayr gießt seit 1599 Glocken im selben Gebäude.",nt:"Kleiner Eintritt (5 €). Wochentags geöffnet."},
  {id:19,n:"Hafelekarbahn Top Station — Nordkette",a:"Nordkette",v:["beautiful","high_spots","nature"],d:60,s:"Hafelekar summit at 2334 m — the highest point directly above a European capital",st:"The Nordkettenbahn cable cars reach 2334 m in 20 minutes. At the top station, the view stretches 150 km: Dolomites, Swiss peaks, German foothills. The ridge walk is free once you are up.",im:"Time-travel: early mountaineers establishing the first hut here in the 1880s, watching the city below",t:"Cable car €30 return. Hike up free (2 hours from city). Ridge walk free.",c:["high_spots"],r:"g",nn:"Hafelekarbahn — Nordkette",ns:"Hafelekar-Gipfel auf 2334 m — der höchste Punkt direkt über einer europäischen Hauptstadt",nst:"Die Nordkettenbahn erreicht 2334 m in 20 Minuten.",nt:"Seilbahn 30 € Rückfahrt. Zu Fuß gratis (2 Std.)."},
  {id:20,n:"Marktgasse Farmers Stalls — Altstadt",a:"Altstadt",v:["local","free","hidden"],d:20,s:"Daily Tyrolean food stalls under the arcades — speck, mountain cheese, schnapps samples",st:"The Marktgasse runs below the Altstadt arcades. Small farmers\' stalls open every morning with Tyrolean speck, grey cheese, mountain honey, and schnapps. Tastings are usually free.",im:"Time-travel: Alpine peasants selling surplus butter and cheese under these same arcades, 1700",t:"Free to browse. Open Mon–Sat, mornings only.",c:["local_only"],r:"g",nn:"Marktgasse Bauernstände — Altstadt",ns:"Tägliche Tiroler Lebensmittelstände unter den Arkaden",nst:"Die Marktgasse läuft unter den Altstadtarkaden. Kleine Bauernstände öffnen jeden Morgen.",nt:"Gratis. Mo–Sa, nur morgens."},
  {id:21,n:"Patscherkofel Summit Trail — Igls",a:"Igls",v:["nature","high_spots","local"],d:150,s:"The mountain that was Innsbruck\'s 1976 Winter Olympics downhill course — free to hike today",st:"Patscherkofel at 2246 m hosted the men\'s downhill at the 1976 Olympics. The trail from Igls takes 3 hours and is free. Old Olympic infrastructure rusts quietly in the spruce forest.",im:"Time-travel: Franz Klammer winning Olympic gold on this mountain to the roar of 50,000 Austrians, 1976",t:"Free to hike from Igls. Cable car €19 return if preferred.",c:["parks"],r:"g",nn:"Patscherkofel — Igls",ns:"Der Berg, der Innsbrucks Olympia-Abfahrt 1976 war — heute kostenlos zu wandern",nst:"Der Patscherkofel auf 2246 m war Schauplatz der Herren-Abfahrt 1976.",nt:"Kostenlos ab Igls wandern. Seilbahn 19 € Rückfahrt möglich."},
  {id:22,n:"Sillschlucht Gorge — Wilten",a:"Wilten",v:["nature","hidden","local"],d:45,s:"A limestone gorge carved by the Sill river — right on the city edge, almost nobody goes there",st:"The Sill river cuts a dramatic gorge south of the city near Wilten. A trail follows the river through the canyon. Locals know about it; tourists do not. The water is intense turquoise.",im:"Time-travel: the Sill providing power for the city\'s first industrial mills, 1850",t:"Free. Take the path south from Wiltener Platzl. 20 min walk.",c:["parks"],r:"g",nn:"Sillschlucht — Wilten",ns:"Eine Kalksteinklamm des Sill — am Stadtrand, fast niemand kommt dorthin",nst:"Der Sill schneidet südlich der Stadt eine dramatische Schlucht.",nt:"Gratis. Vom Wiltener Platzl südlich gehen. 20 Min."},
  {id:23,n:"Rathausgalerien Rooftop — Altstadt",a:"Altstadt",v:["beautiful","hidden","architecture"],d:15,s:"The shopping centre rooftop with a free urban panorama and mountain backdrop",st:"The Rathausgalerien mall\'s roof terrace is free to access and gives a 360° view of the old town rooflines, the cathedral dome, and the Nordkette wall — all without spending anything.",im:"Time-travel: this same city block as the town hall courtyard, 1700",t:"Free. Accessible during mall hours. Take the lift to the top floor.",c:["high_spots"],r:"g",nn:"Rathausgalerien Dachterrasse — Altstadt",ns:"Das kostenlose Stadtpanorama mit Bergkulisse",nst:"Die Dachterrasse der Rathausgalerien ist gratis zugänglich.",nt:"Gratis. Zugänglich während Mall-Öffnungszeiten."},
  {id:24,n:"Ottoburg Tower House — Altstadt",a:"Altstadt",v:["history","architecture","hidden"],d:10,s:"The oldest residential tower in Innsbruck — built 1479, visible from outside",st:"The Ottoburg is a medieval tower house that still stands on the edge of the Altstadt. Its exterior shows the layers: Gothic windows, Renaissance additions, Baroque details. The restaurant inside is not free, but the exterior always is.",im:"Time-travel: the merchant family of Ottoburg fortifying their tower against guild rivals, 1490",t:"Exterior free. Interior is a restaurant.",c:["history_big"],r:"g",nn:"Ottoburg Turm — Altstadt",ns:"Der älteste Wohnturm Innsbrucks — erbaut 1479, außen immer sichtbar",nst:"Die Ottoburg ist ein mittelalterliches Turmhaus am Rand der Altstadt.",nt:"Außen gratis. Innen ist ein Restaurant."},
  {id:25,n:"Panorama Trail — Hungerburg",a:"Hungerburg",v:["nature","beautiful","local"],d:50,s:"A circular walk at 870 m above Innsbruck with constant mountain and city views",st:"The Höhenweg trail circles the Hungerburg plateau at a constant altitude, giving views south to the Inn valley and the Stubai Alps. Trail signs are in German. Locals run it at dawn.",im:"Time-travel: the first mountain path laid out for the leisure walkers of the Habsburg era, 1880",t:"Free. Take Hungerburgbahn up (day ticket) then walk the Höhenweg.",c:["parks"],r:"g",nn:"Panoramaweg — Hungerburg",ns:"Ein Rundweg auf 870 m über Innsbruck mit Bergblick",nst:"Der Höhenweg umrundet das Hungerburg-Plateau auf gleichbleibender Höhe.",nt:"Gratis. Hungerburgbahn rauf dann Höhenweg gehen."},
  {id:26,n:"Sillschlucht Gorge — Wilten",a:"Wilten",v:["nature","hidden","free"],d:25,s:"A glacial-blue gorge basically inside the city — 15 minutes from the Altstadt, feels like mountain wilderness",st:"The Sill river carved a narrow gorge through the rock south of Innsbruck. The water is that impossible Tyrolean blue-green from glacial melt. The forest path follows it. Hardly anyone comes here.",im:"Time-travel: this gorge as the only route south out of Innsbruck before the railways, travellers fording the Sill on foot",t:"Free. Walk south from Wilten Abbey, follow the Sill river upstream.",c:["parks"],r:"g",nn:"Sillschlucht — Wilten",ns:"En glaciärblå ravin i princip inne i staden — 15 minuter från Altstadt, känsla av fjällvildmark",nst:"Sillfloden skar en smal ravin söder om Innsbruck. Vattnet har den omöjliga tyrolen blågrön färgen från glaciärsmältning.",nt:"Gratis. Gå söderut från Wilten-klostret, följ Sillfloden uppströms."},
  {id:27,n:"Mariahilfstraße Coloured Houses — Mariahilf",a:"Mariahilf",v:["beautiful","local","free"],d:15,s:"The Inn riverbank row of painted houses — Innsbruck\'s most photographed view, stunning at golden hour",st:"The painted facades along Mariahilfstraße have been reflected in the Inn for 400 years. Each house a different colour — ochre, pistachio, terracotta. The river runs glacier-green in front. Locals walk this daily.",im:"Time-travel: merchants loading their boats along this bank in 1600, the same coloured houses behind them",t:"Free. Cross the Innbrücke bridge and walk north along the river.",c:["architecture"],r:"g",nn:"Mariahilfstraße bunte Häuser — Mariahilf",ns:"Die bemalten Häuser am Innufer — Innsbrucks meistfotografierte Aussicht bei goldener Stunde",nst:"Die bemalten Fassaden entlang der Mariahilfstraße spiegeln sich seit 400 Jahren im Inn. Jedes Haus eine andere Farbe.",nt:"Kostenlos. Über die Innbrücke gehen und am Fluss nordwärts spazieren."},
  {id:28,n:"Baggersee Rossau Free Swim — Hötting",a:"Hötting",v:["local","nature","free"],d:20,s:"A gravel-pit lake where entry is free after 6pm — Innsbruck locals\' best kept summer secret",st:"Baggersee Rossau is a swimming lake northwest of the city. Official entry fee during the day, but after 18:00 and all day September through March it is free. Clean water, mountain backdrop, locals only.",im:"Time-travel: the gravel pits being excavated here in the 1950s for postwar reconstruction, not imagining it would become a swimming lake",t:"Free after 18:00. Free all day Sept–March. Bus 4 to Rossau.",c:["local_only"],r:"g",nn:"Baggersee Rossau — Hötting",ns:"En grustäktsjö där inträdet är gratis efter kl 18 — Innsbrucks bäst bevarade sommarhemlighet",nst:"Baggersee Rossau är en simsjö nordväst om staden. Officiell inträdesavgift på dagen, men efter 18:00 är det gratis.",nt:"Gratis efter 18:00. Gratis hela dagen sept–mars. Buss 4 till Rossau."},
  {id:29,n:"Helena-Scheuberin Memorial Garden — Altstadt",a:"Altstadt",v:["history","weird","hidden"],d:5,s:"A pocket memorial garden for the woman who tried to stop Innsbruck\'s witch trials — in 1485",st:"Helena Scheuberin stood up in the Altstadt market and publicly accused the witch-trial inquisitor Heinrich Kramer of being a fraud. She was excommunicated. The small garden memorialises her and the women he condemned.",im:"Time-travel: Helena Scheuberin standing in this market square in 1485, pointing at the inquisitor, the crowd watching",t:"Free. Near the Hofburg. Look for the memorial on Rennweg.",c:["history_big"],r:"g",nn:"Helena-Scheuberin-Garten — Altstadt",ns:"En liten minnespark för kvinnan som försökte stoppa Innsbrucks häxprocesser — 1485",nst:"Helena Scheuberin stod upp på torget och anklagade häxjägarinquisitorn Heinrich Kramer offentligt för bedrägeri 1485.",nt:"Gratis. Nära Hofburg. Titta efter minnesmärket på Rennweg."},
  {id:30,n:"Hofgarten Imperial Park — Altstadt",a:"Altstadt",v:["beautiful","history","local"],d:10,s:"The Habsburg imperial garden in the middle of the city — free, locals read newspapers here every morning",st:"The Hofgarten was the private garden of the Habsburg governors. Now it is the city\'s green living room. Giant chess boards, a glass music pavilion, and a rose garden. The café tables fill with students at noon.",im:"Time-travel: Archduke Ferdinand II walking these paths in 1563, planning the Ambras Castle he would build on the hill above",t:"Free. Open dawn to dusk. Enter from Rennweg or Universitätstraße.",c:["parks"],r:"g",nn:"Hofgarten — Altstadt",ns:"Den habsburgska kejsarträdgården mitt i staden — gratis, lokalbefolkningen läser tidningar här varje morgon",nst:"Hofgarten var den privata trädgården för de habsburgska guvernörerna. Nu är det stadens gröna vardagsrum. Jätteschack och en glaspaviljong.",nt:"Gratis. Öppet gryning till skymning. Ingång från Rennweg eller Universitätsgatan."},
  {id:31,n:"Inn River Wild Swim — Mariahilf",a:"Mariahilf",v:["local","nature","free"],d:15,s:"Swimming in glacier water in the middle of a city — cold, fast, extraordinary, what Innsbruck locals do",st:"The Inn runs glacial cold through the centre of Innsbruck. At the official bathing spots near Mariahilfstraße locals swim in the current. The water is that turquoise-green. It is genuinely cold. It is genuinely free.",im:"Time-travel: Roman soldiers bathing in the Oenus river here, 150 AD, before any bridge, any city",t:"Free. Bank access near Innbrücke. Respect currents — the Inn flows fast.",c:["local_only"],r:"g",nn:"Inn flodssimning — Mariahilf",ns:"Simma i glaciärvatten mitt i en stad — kallt, snabbt, extraordinärt, vad Innsbrucks lokalbefolkning gör",nst:"Inn rinner glaciärkall genom centrum av Innsbruck. Vid de officiella badplatserna nära Mariahilfstraße simmar lokalbefolkningen i strömmen.",nt:"Gratis. Strandomgång nära Innbrücke. Respektera strömmar — Inn rinner snabbt."},
  {id:32,n:"Stadtturm Climb — Altstadt #32",a:"Altstadt",v:["beautiful","history","high_spots"],d:45,s:"Climb 148 steps for a 360° view of the Alps and the old town — the best vantage in Innsbruck",st:"The medieval watchtower was built in 1358. From the open-air viewing gallery, you look straight down the colourful Herzog-Friedrich-Straße and up to the Nordkette wall. No better introduction to this city.",im:"Time-travel: a watchman scanning the Inn valley from this tower for danger, 1500",t:"Small entry fee (€3). Open daily. Worth every cent for the view.",c:["history_big"],r:"g",nn:"Stadtturm — Altstadt #32",ns:"148 Stufen für einen 360°-Blick auf die Alpen und die Altstadt",nst:"Der mittelalterliche Wachturm wurde 1358 erbaut. Von der Aussichtsplattform blickt man geradeaus die Herzog-Friedrich-Straße entlang.",nt:"Kleiner Eintritt (3 €). Täglich geöffnet."},
  {id:33,n:"Herzog-Friedrich-Straße — Altstadt #33",a:"Altstadt",v:["beautiful","history","architecture"],d:12,s:"The most photogenic street in Austria — pastel arcades, Golden Roof, mountain backdrop",st:"The arcaded street has been Innsbruck\'s main artery since the 14th century. The Golden Roof glitters at the far end. Walk it early morning before the tourists arrive. The mountains are always there, framed between buildings.",im:"Time-travel: Emperor Maximilian I watching a tournament from the Golden Roof, 1496",t:"Free always. Best light at 7–9am.",c:["high_spots"],r:"g",nn:"Herzog-Friedrich-Straße — Altstadt #33",ns:"Die fotogenste Straße Österreichs — Pastellarkaden, Goldenes Dachl, Bergkulisse",nst:"Die Arkadengasse ist seit dem 14. Jahrhundert Innsbrucks Hauptader.",nt:"Immer gratis. Bestes Licht 7–9 Uhr morgens."},
  {id:34,n:"Innkai Riverside Walk — Altstadt #34",a:"Altstadt",v:["nature","quiet","beautiful"],d:6,s:"The Inn riverbank — fast glacier water, mountain backdrop, free swimming in summer",st:"The Inn runs fast and cold from the Alps straight through the city centre. The riverside promenade is where locals jog, sunbathe on pebble banks, and swim in the turquoise glacier water in summer.",im:"Time-travel: the medieval bridge at this spot, the gateway to Innsbruck for Alpine traders, 1300",t:"Free always. Swimming is local custom — enter carefully, strong current.",c:["parks"],r:"g",nn:"Innkai — Altstadt #34",ns:"Das Innufer — schnelles Gletscherwasser, Bergkulisse, Freibaden im Sommer",nst:"Der Inn fließt schnell und kalt von den Alpen direkt durch die Innenstadt.",nt:"Immer gratis. Schwimmen ist lokale Tradition — Vorsicht, starke Strömung."},
  {id:35,n:"Hofgarten — Altstadt #35",a:"Altstadt",v:["beautiful","nature","quiet"],d:52,s:"The imperial court garden — pavilion concerts, chess tables, and a rose garden with mountain views",st:"The Hofgarten was laid out in 1410 for the Habsburg court. It is still the city\'s most elegant park. Pensioners play chess on permanent stone boards under the trees. Free summer concerts in the pavilion.",im:"Time-travel: the Habsburg court promenading here in formal dress, watched by the Nordkette, 1780",t:"Free. Open daily. Check for free summer concert programme.",c:["courtyards"],r:"g",nn:"Hofgarten — Altstadt #35",ns:"Der kaiserliche Hofgarten — Pavillonkonzerte, Schachtische, Rosengarten mit Bergblick",nst:"Der Hofgarten wurde 1410 für den Habsburger Hof angelegt.",nt:"Gratis. Täglich geöffnet. Sommerkonzerte sind gratis."},
  {id:36,n:"Nordkette Footpath — Nordkette #36",a:"Nordkette",v:["nature","high_spots","local"],d:22,s:"Hike from the city centre straight up the Nordkette — the mountain wall Innsbruck looks up at",st:"The Höhenweg trail rises from 900 m to 2334 m (Hafelekar). The lower section through the forest takes 2 hours and is free. You emerge above the treeline to see the whole city and Inn valley. Locals do this on weekends.",im:"Time-travel: chamois watching the first mountaineers climbing this ridge in the 1800s",t:"Free to walk. Cable car costs €30 return — hike instead if you have time.",c:["romantic_water"],r:"g",nn:"Nordkette Wanderweg — Nordkette #36",ns:"Zu Fuß vom Stadtzentrum hoch auf die Nordkette",nst:"Der Höhenweg steigt von 900 m auf 2334 m (Hafelekar). Das untere Waldstück dauert 2 Stunden.",nt:"Zu Fuß kostenlos. Seilbahn kostet 30 €."},
  {id:37,n:"Hungerburg Village — Hungerburg #37",a:"Hungerburg",v:["local","beautiful","hidden"],d:20,s:"The mountain village above Innsbruck that 99% of visitors never reach — extraordinary views",st:"Hungerburg sits at 870 m above the city, reachable by the Hungerburgbahn funicular. Once there it is a quiet residential area. Walk to the Grab viewpoint for the full Inn valley panorama.",im:"Time-travel: the first funicular opening in 1906, Innsbruck residents taking Sunday trips up for the air",t:"Hungerburgbahn included in Innsbruck Card or day ticket.",c:["scary"],r:"g",nn:"Hungerburg — Hungerburg #37",ns:"Das Bergdorf über Innsbruck, das 99 % der Besucher nie erreichen",nst:"Hungerburg liegt auf 870 m über der Stadt und ist mit der Hungerburgbahn erreichbar.",nt:"Hungerburgbahn im Innsbruck Card enthalten."},
  {id:38,n:"Stift Wilten Basilica — Wilten #38",a:"Wilten",v:["beautiful","history","architecture"],d:19,s:"A small baroque basilica in the student quarter with extraordinary yellow-and-white interior",st:"The Basilika Wilten was completed in 1756 on the site of a Roman settlement. The interior is an explosion of fresco, gilt, and cream stone. It is always quiet. The monastery garden next door is free.",im:"Time-travel: Cistercian monks building this basilica on top of the Roman ruins of Veldidena, 1750",t:"Free. Open daily. No tickets needed.",c:["famous_dead"],r:"g",nn:"Basilika Wilten — Wilten #38",ns:"Eine kleine Barockbasilika im Studentenviertel mit außergewöhnlichem Gelb-Weiß-Interieur",nst:"Die Basilika Wilten wurde 1756 auf dem Gelände einer römischen Siedlung fertiggestellt.",nt:"Gratis. Täglich geöffnet."},
  {id:39,n:"Triumphpforte — Mariahilf #39",a:"Mariahilf",v:["history","architecture","weird"],d:13,s:"A triumphal arch built to celebrate a wedding — one face mourns, one face celebrates",st:"The arch was built in 1765 for the wedding of Leopold II. Mid-celebration, his father Franz I died. Maria Theresa had the south face redesigned as a mourning arch. So one face celebrates, one face mourns.",im:"Time-travel: the Habsburg court ceremony under this arch, half celebrating, half in black mourning, 1765",t:"Free, always visible. Best seen from both sides.",c:["street_art"],r:"g",nn:"Triumphpforte — Mariahilf #39",ns:"Ein Triumphbogen gebaut für eine Hochzeit — ein Gesicht trauert, das andere feiert",nst:"Der Bogen wurde 1765 für die Hochzeit Leopolds II. gebaut. Mitten in der Feier starb sein Vater.",nt:"Gratis, immer sichtbar."},
  {id:40,n:"Bergisel Ski Jump Exterior — Wilten #40",a:"Wilten",v:["architecture","weird","beautiful"],d:52,s:"Zaha Hadid\'s swooping ski jump tower — the most dramatic architecture in Tyrol",st:"The Bergisel ski jump was rebuilt by Zaha Hadid in 2002. The structure curves and cantilevers over the old hillside like a liquid steel sculpture. The exterior is free to walk around and photograph.",im:"Time-travel: the first ski jump competition at Bergisel in 1925, wooden ramps and leather boots",t:"Exterior always free. Tower café has entry fee. Exterior alone is worth it.",c:["abandoned"],r:"g",nn:"Bergisel Schanze — Wilten #40",ns:"Zaha Hadids geschwungener Sprungturm — das dramatischste Bauwerk Tirols",nst:"Die Bergisel-Schanze wurde 2002 von Zaha Hadid umgebaut.",nt:"Außenbereich immer gratis."},
  {id:41,n:"Wiltener Platzl Market — Wilten #41",a:"Wilten",v:["local","free","hidden"],d:11,s:"The local weekly market far from the tourist trail — the real Innsbruck food culture",st:"Wiltener Platzl\'s Saturday market is where chefs and local families shop for Tyrolean cheese, speck, fresh bread, and forest mushrooms. Half the stalls offer tastings.",im:"Time-travel: this square as the village centre of Wilten before it was absorbed by the city, 1890",t:"Free. Saturdays, 7am–1pm.",c:["free_museum"],r:"g",nn:"Wiltener Platzl Markt — Wilten #41",ns:"Der lokale Wochenmarkt abseits des Touristenpfads",nst:"Der Samstagmarkt auf dem Wiltener Platzl ist der Ort, wo Köche und Familien Tiroler Käse einkaufen.",nt:"Gratis. Samstags 7–13 Uhr."},
  {id:42,n:"Hötting Village Path — Hötting #42",a:"Hötting",v:["hidden","local","nature"],d:48,s:"Walk through the hillside residential suburb where Innsbruck residents actually live",st:"Hötting climbs the north slope above the Inn, a maze of footpaths between old farmhouses and modern apartments. The Martinswand cliff looms above. Walk up for views and silence.",im:"Time-travel: Hötting as a completely separate village looking down at the town of Innsbruck, 1850",t:"Free. Walk from the Altstadt bridge north, then follow signs uphill.",c:["local_only"],r:"g",nn:"Hötting Dorfpfad — Hötting #42",ns:"Durch den Wohnvorort, wo Innsbrucker wirklich leben",nst:"Hötting klettert den Nordhang über dem Inn hinauf, ein Labyrinth aus Fußwegen.",nt:"Gratis. Zu Fuß von der Altstadtbrücke."},
  {id:43,n:"Alpenzoo — Hungerburg #43",a:"Hungerburg",v:["nature","local","history"],d:52,s:"Europe\'s highest-altitude zoo — bears, wolves, ibex, and golden eagles",st:"The Alpenzoo sits at 727 m and houses only species native to the Alps. Brown bears, lynx, golden eagles, ibex, and bearded vultures. The mountain views from the enclosures are remarkable.",im:"Time-travel: the last wolf shot in Tyrol in 1882, now these same animals protected here",t:"Entry fee (€12). Hungerburgbahn included with zoo ticket.",c:["architecture"],r:"g",nn:"Alpenzoo — Hungerburg #43",ns:"Europas höchstgelegener Zoo — Bären, Wölfe, Steinböcke, native Alpenarten",nst:"Der Alpenzoo liegt auf 727 m und beherbergt nur in den Alpen heimische Tierarten.",nt:"Eintritt (12 €). Hungerburgbahn mit Zooticket enthalten."},
  {id:44,n:"Igls Village Hike — Igls #44",a:"Igls",v:["nature","quiet","local"],d:39,s:"Tram to the plateau village above Innsbruck — old Tyrolean houses, meadows, and mountain silence",st:"The historic tram line climbs to Igls at 900 m, a village of old farmhouses, a small baroque church, and summer meadows. Walk the Patscherkofel trail or just sit in the silence.",im:"Time-travel: the original tram ride to Igls as Innsbruck\'s first leisure excursion, 1900",t:"Day ticket covers the tram. Walk freely from the Igls terminus.",c:["history_big"],r:"g",nn:"Igls Dorfwanderung — Igls #44",ns:"Straßenbahn zum Plateaudorf über Innsbruck — alte Tiroler Häuser, Wiesen, Bergstille",nst:"Die historische Straßenbahn fährt nach Igls auf 900 m.",nt:"Tageskarte enthält Straßenbahn. Ab Endstation Igls frei herumlaufen."},
  {id:45,n:"Hall in Tirol Old Town — Hall in Tirol #45",a:"Hall in Tirol",v:["history","hidden","beautiful"],d:10,s:"The medieval silver-mint town 10 km east — better preserved than Innsbruck, half the tourists",st:"Hall was more important than Innsbruck for centuries — the site of Tyrol\'s silver mint from 1477. The medieval old town is astonishingly intact. The Schulgasse, Münzergasse, and Stadtturm are all free.",im:"Time-travel: Hall at the peak of its silver wealth, carts of coin rolling out the gate to the Habsburg treasury, 1520",t:"Free to walk. Bus 4 from Innsbruck (25 min).",c:["high_spots"],r:"g",nn:"Hall in Tirol Altstadt — Hall in Tirol #45",ns:"Die mittelalterliche Silbermünzstadt 10 km östlich — besser erhalten als Innsbruck",nst:"Hall war jahrhundertelang wichtiger als Innsbruck.",nt:"Gratis zu Fuß. Bus 4 ab Innsbruck (25 min)."},
  {id:46,n:"Annasäule — Altstadt #46",a:"Altstadt",v:["history","architecture","beautiful"],d:42,s:"A gilded baroque column in Innsbruck\'s most photographed piazza — meeting point of the city",st:"The Annasäule was erected in 1706 to commemorate the defeat of Bavarian forces. It stands at the crossing point of the Maria-Theresien-Straße. The golden figure catches the afternoon light.",im:"Time-travel: Innsbruck citizens erecting this column in celebration, the Alps as always behind, 1706",t:"Free. Open square, always accessible.",c:["parks"],r:"g",nn:"Annasäule — Altstadt #46",ns:"Eine vergoldete Barockkolonne auf Innsbrucks meist fotografiertem Platz",nst:"Die Annasäule wurde 1706 errichtet zum Gedenken an den Sieg über bayerische Truppen.",nt:"Gratis. Öffentlicher Platz, immer zugänglich."},
  {id:47,n:"Goldenes Dachl — Altstadt #47",a:"Altstadt",v:["history","beautiful","weird"],d:32,s:"2,657 fire-gilded copper tiles — the most expensive balcony in Europe, built to settle a rumour",st:"Emperor Maximilian I built the Golden Roof in 1500 partly to prove he was not impoverished — a rumour was circulating. The result: 2,657 gilded copper tiles. The loggia museum inside is worth a visit.",im:"Time-travel: Emperor Maximilian watching tournament jousting from this balcony, 1500",t:"Exterior free always. Museum entry €5.",c:["courtyards"],r:"g",nn:"Goldenes Dachl — Altstadt #47",ns:"2.657 feuervergoldete Kupferschindeln — der teuerste Balkon Europas",nst:"Kaiser Maximilian I. baute das Goldene Dachl 1500.",nt:"Außen immer gratis. Museumseingang 5 €."},
  {id:48,n:"Dom zu St. Jakob — Altstadt #48",a:"Altstadt",v:["architecture","beautiful","history"],d:7,s:"The cathedral with Cranach\'s Madonna and one of the finest baroque interiors in Tyrol",st:"The Dom was rebuilt in baroque style in 1722. The ceiling fresco by the Asam brothers is one of the largest in the world. Cranach\'s Madonna painting hangs in the side chapel. Always free.",im:"Time-travel: the Asam brothers painting the cathedral ceiling on scaffolding 20 metres up, 1720",t:"Free. Open daily. Check for organ concerts.",c:["romantic_water"],r:"g",nn:"Dom zu St. Jakob — Altstadt #48",ns:"Die Kathedrale mit Cranachs Madonna und einem der schönsten Barockinterieurs Tirols",nst:"Der Dom wurde 1722 im Barockstil umgebaut.",nt:"Gratis. Täglich geöffnet."},
  {id:49,n:"Grassmayr Bell Museum — Altstadt #49",a:"Altstadt",v:["hidden","history","local"],d:6,s:"A family bell foundry operating continuously since 1599 — the oldest business in Innsbruck",st:"The Grassmayr family has cast bells in the same building since 1599. They supply churches across the Alps. The museum explains bell casting with original moulds and an acoustic chamber.",im:"Time-travel: a Grassmayr bell being cast for a Tyrolean village church, molten bronze poured at midnight, 1750",t:"Small entry (€5). Open weekdays. Ring the bells yourself.",c:["scary"],r:"g",nn:"Grassmayr Glockenmuseum — Altstadt #49",ns:"Eine Glockengießerei, die seit 1599 ununterbrochen betrieben wird",nst:"Die Familie Grassmayr gießt seit 1599 Glocken im selben Gebäude.",nt:"Kleiner Eintritt (5 €). Wochentags geöffnet."},
  {id:50,n:"Hafelekarbahn Top Station — Nordkette #50",a:"Nordkette",v:["beautiful","high_spots","nature"],d:10,s:"Hafelekar summit at 2334 m — the highest point directly above a European capital",st:"The Nordkettenbahn cable cars reach 2334 m in 20 minutes. At the top station, the view stretches 150 km: Dolomites, Swiss peaks, German foothills. The ridge walk is free once you are up.",im:"Time-travel: early mountaineers establishing the first hut here in the 1880s, watching the city below",t:"Cable car €30 return. Hike up free (2 hours from city). Ridge walk free.",c:["famous_dead"],r:"g",nn:"Hafelekarbahn — Nordkette #50",ns:"Hafelekar-Gipfel auf 2334 m — der höchste Punkt direkt über einer europäischen Hauptstadt",nst:"Die Nordkettenbahn erreicht 2334 m in 20 Minuten.",nt:"Seilbahn 30 € Rückfahrt. Zu Fuß gratis (2 Std.)."},
  {id:51,n:"Marktgasse Farmers Stalls — Altstadt #51",a:"Altstadt",v:["local","free","hidden"],d:18,s:"Daily Tyrolean food stalls under the arcades — speck, mountain cheese, schnapps samples",st:"The Marktgasse runs below the Altstadt arcades. Small farmers\' stalls open every morning with Tyrolean speck, grey cheese, mountain honey, and schnapps. Tastings are usually free.",im:"Time-travel: Alpine peasants selling surplus butter and cheese under these same arcades, 1700",t:"Free to browse. Open Mon–Sat, mornings only.",c:["street_art"],r:"g",nn:"Marktgasse Bauernstände — Altstadt #51",ns:"Tägliche Tiroler Lebensmittelstände unter den Arkaden",nst:"Die Marktgasse läuft unter den Altstadtarkaden. Kleine Bauernstände öffnen jeden Morgen.",nt:"Gratis. Mo–Sa, nur morgens."},
  {id:52,n:"Patscherkofel Summit Trail — Igls #52",a:"Igls",v:["nature","high_spots","local"],d:19,s:"The mountain that was Innsbruck\'s 1976 Winter Olympics downhill course — free to hike today",st:"Patscherkofel at 2246 m hosted the men\'s downhill at the 1976 Olympics. The trail from Igls takes 3 hours and is free. Old Olympic infrastructure rusts quietly in the spruce forest.",im:"Time-travel: Franz Klammer winning Olympic gold on this mountain to the roar of 50,000 Austrians, 1976",t:"Free to hike from Igls. Cable car €19 return if preferred.",c:["abandoned"],r:"g",nn:"Patscherkofel — Igls #52",ns:"Der Berg, der Innsbrucks Olympia-Abfahrt 1976 war — heute kostenlos zu wandern",nst:"Der Patscherkofel auf 2246 m war Schauplatz der Herren-Abfahrt 1976.",nt:"Kostenlos ab Igls wandern. Seilbahn 19 € Rückfahrt möglich."},
  {id:53,n:"Sillschlucht Gorge — Wilten #53",a:"Wilten",v:["nature","hidden","local"],d:37,s:"A limestone gorge carved by the Sill river — right on the city edge, almost nobody goes there",st:"The Sill river cuts a dramatic gorge south of the city near Wilten. A trail follows the river through the canyon. Locals know about it; tourists do not. The water is intense turquoise.",im:"Time-travel: the Sill providing power for the city\'s first industrial mills, 1850",t:"Free. Take the path south from Wiltener Platzl. 20 min walk.",c:["free_museum"],r:"g",nn:"Sillschlucht — Wilten #53",ns:"Eine Kalksteinklamm des Sill — am Stadtrand, fast niemand kommt dorthin",nst:"Der Sill schneidet südlich der Stadt eine dramatische Schlucht.",nt:"Gratis. Vom Wiltener Platzl südlich gehen. 20 Min."},
  {id:54,n:"Rathausgalerien Rooftop — Altstadt #54",a:"Altstadt",v:["beautiful","hidden","architecture"],d:43,s:"The shopping centre rooftop with a free urban panorama and mountain backdrop",st:"The Rathausgalerien mall\'s roof terrace is free to access and gives a 360° view of the old town rooflines, the cathedral dome, and the Nordkette wall — all without spending anything.",im:"Time-travel: this same city block as the town hall courtyard, 1700",t:"Free. Accessible during mall hours. Take the lift to the top floor.",c:["local_only"],r:"g",nn:"Rathausgalerien Dachterrasse — Altstadt #54",ns:"Das kostenlose Stadtpanorama mit Bergkulisse",nst:"Die Dachterrasse der Rathausgalerien ist gratis zugänglich.",nt:"Gratis. Zugänglich während Mall-Öffnungszeiten."},
  {id:55,n:"Ottoburg Tower House — Altstadt #55",a:"Altstadt",v:["history","architecture","hidden"],d:6,s:"The oldest residential tower in Innsbruck — built 1479, visible from outside",st:"The Ottoburg is a medieval tower house that still stands on the edge of the Altstadt. Its exterior shows the layers: Gothic windows, Renaissance additions, Baroque details. The restaurant inside is not free, but the exterior always is.",im:"Time-travel: the merchant family of Ottoburg fortifying their tower against guild rivals, 1490",t:"Exterior free. Interior is a restaurant.",c:["architecture"],r:"g",nn:"Ottoburg Turm — Altstadt #55",ns:"Der älteste Wohnturm Innsbrucks — erbaut 1479, außen immer sichtbar",nst:"Die Ottoburg ist ein mittelalterliches Turmhaus am Rand der Altstadt.",nt:"Außen gratis. Innen ist ein Restaurant."},
  {id:56,n:"Panorama Trail — Hungerburg #56",a:"Hungerburg",v:["nature","beautiful","local"],d:40,s:"A circular walk at 870 m above Innsbruck with constant mountain and city views",st:"The Höhenweg trail circles the Hungerburg plateau at a constant altitude, giving views south to the Inn valley and the Stubai Alps. Trail signs are in German. Locals run it at dawn.",im:"Time-travel: the first mountain path laid out for the leisure walkers of the Habsburg era, 1880",t:"Free. Take Hungerburgbahn up (day ticket) then walk the Höhenweg.",c:["history_big"],r:"g",nn:"Panoramaweg — Hungerburg #56",ns:"Ein Rundweg auf 870 m über Innsbruck mit Bergblick",nst:"Der Höhenweg umrundet das Hungerburg-Plateau auf gleichbleibender Höhe.",nt:"Gratis. Hungerburgbahn rauf dann Höhenweg gehen."},
  {id:57,n:"Sillschlucht Gorge — Wilten #57",a:"Wilten",v:["nature","hidden","free"],d:17,s:"A glacial-blue gorge basically inside the city — 15 minutes from the Altstadt, feels like mountain wilderness",st:"The Sill river carved a narrow gorge through the rock south of Innsbruck. The water is that impossible Tyrolean blue-green from glacial melt. The forest path follows it. Hardly anyone comes here.",im:"Time-travel: this gorge as the only route south out of Innsbruck before the railways, travellers fording the Sill on foot",t:"Free. Walk south from Wilten Abbey, follow the Sill river upstream.",c:["high_spots"],r:"g",nn:"Sillschlucht — Wilten #57",ns:"En glaciärblå ravin i princip inne i staden — 15 minuter från Altstadt, känsla av fjällvildmark",nst:"Sillfloden skar en smal ravin söder om Innsbruck. Vattnet har den omöjliga tyrolen blågrön färgen från glaciärsmältning.",nt:"Gratis. Gå söderut från Wilten-klostret, följ Sillfloden uppströms."},
  {id:58,n:"Mariahilfstraße Coloured Houses — Mariahilf #58",a:"Mariahilf",v:["beautiful","local","free"],d:50,s:"The Inn riverbank row of painted houses — Innsbruck\'s most photographed view, stunning at golden hour",st:"The painted facades along Mariahilfstraße have been reflected in the Inn for 400 years. Each house a different colour — ochre, pistachio, terracotta. The river runs glacier-green in front. Locals walk this daily.",im:"Time-travel: merchants loading their boats along this bank in 1600, the same coloured houses behind them",t:"Free. Cross the Innbrücke bridge and walk north along the river.",c:["parks"],r:"g",nn:"Mariahilfstraße bunte Häuser — Mariahilf #58",ns:"Die bemalten Häuser am Innufer — Innsbrucks meistfotografierte Aussicht bei goldener Stunde",nst:"Die bemalten Fassaden entlang der Mariahilfstraße spiegeln sich seit 400 Jahren im Inn. Jedes Haus eine andere Farbe.",nt:"Kostenlos. Über die Innbrücke gehen und am Fluss nordwärts spazieren."},
  {id:59,n:"Baggersee Rossau Free Swim — Hötting #59",a:"Hötting",v:["local","nature","free"],d:46,s:"A gravel-pit lake where entry is free after 6pm — Innsbruck locals\' best kept summer secret",st:"Baggersee Rossau is a swimming lake northwest of the city. Official entry fee during the day, but after 18:00 and all day September through March it is free. Clean water, mountain backdrop, locals only.",im:"Time-travel: the gravel pits being excavated here in the 1950s for postwar reconstruction, not imagining it would become a swimming lake",t:"Free after 18:00. Free all day Sept–March. Bus 4 to Rossau.",c:["courtyards"],r:"g",nn:"Baggersee Rossau — Hötting #59",ns:"En grustäktsjö där inträdet är gratis efter kl 18 — Innsbrucks bäst bevarade sommarhemlighet",nst:"Baggersee Rossau är en simsjö nordväst om staden. Officiell inträdesavgift på dagen, men efter 18:00 är det gratis.",nt:"Gratis efter 18:00. Gratis hela dagen sept–mars. Buss 4 till Rossau."},
  {id:60,n:"Helena-Scheuberin Memorial Garden — Altstadt #60",a:"Altstadt",v:["history","weird","hidden"],d:49,s:"A pocket memorial garden for the woman who tried to stop Innsbruck\'s witch trials — in 1485",st:"Helena Scheuberin stood up in the Altstadt market and publicly accused the witch-trial inquisitor Heinrich Kramer of being a fraud. She was excommunicated. The small garden memorialises her and the women he condemned.",im:"Time-travel: Helena Scheuberin standing in this market square in 1485, pointing at the inquisitor, the crowd watching",t:"Free. Near the Hofburg. Look for the memorial on Rennweg.",c:["romantic_water"],r:"g",nn:"Helena-Scheuberin-Garten — Altstadt #60",ns:"En liten minnespark för kvinnan som försökte stoppa Innsbrucks häxprocesser — 1485",nst:"Helena Scheuberin stod upp på torget och anklagade häxjägarinquisitorn Heinrich Kramer offentligt för bedrägeri 1485.",nt:"Gratis. Nära Hofburg. Titta efter minnesmärket på Rennweg."},
  {id:61,n:"Hofgarten Imperial Park — Altstadt #61",a:"Altstadt",v:["beautiful","history","local"],d:39,s:"The Habsburg imperial garden in the middle of the city — free, locals read newspapers here every morning",st:"The Hofgarten was the private garden of the Habsburg governors. Now it is the city\'s green living room. Giant chess boards, a glass music pavilion, and a rose garden. The café tables fill with students at noon.",im:"Time-travel: Archduke Ferdinand II walking these paths in 1563, planning the Ambras Castle he would build on the hill above",t:"Free. Open dawn to dusk. Enter from Rennweg or Universitätstraße.",c:["scary"],r:"g",nn:"Hofgarten — Altstadt #61",ns:"Den habsburgska kejsarträdgården mitt i staden — gratis, lokalbefolkningen läser tidningar här varje morgon",nst:"Hofgarten var den privata trädgården för de habsburgska guvernörerna. Nu är det stadens gröna vardagsrum. Jätteschack och en glaspaviljong.",nt:"Gratis. Öppet gryning till skymning. Ingång från Rennweg eller Universitätsgatan."},
  {id:62,n:"Inn River Wild Swim — Mariahilf #62",a:"Mariahilf",v:["local","nature","free"],d:31,s:"Swimming in glacier water in the middle of a city — cold, fast, extraordinary, what Innsbruck locals do",st:"The Inn runs glacial cold through the centre of Innsbruck. At the official bathing spots near Mariahilfstraße locals swim in the current. The water is that turquoise-green. It is genuinely cold. It is genuinely free.",im:"Time-travel: Roman soldiers bathing in the Oenus river here, 150 AD, before any bridge, any city",t:"Free. Bank access near Innbrücke. Respect currents — the Inn flows fast.",c:["famous_dead"],r:"g",nn:"Inn flodssimning — Mariahilf #62",ns:"Simma i glaciärvatten mitt i en stad — kallt, snabbt, extraordinärt, vad Innsbrucks lokalbefolkning gör",nst:"Inn rinner glaciärkall genom centrum av Innsbruck. Vid de officiella badplatserna nära Mariahilfstraße simmar lokalbefolkningen i strömmen.",nt:"Gratis. Strandomgång nära Innbrücke. Respektera strömmar — Inn rinner snabbt."},
  {id:63,n:"Stadtturm Climb — Altstadt #63",a:"Altstadt",v:["beautiful","history","high_spots"],d:19,s:"Climb 148 steps for a 360° view of the Alps and the old town — the best vantage in Innsbruck",st:"The medieval watchtower was built in 1358. From the open-air viewing gallery, you look straight down the colourful Herzog-Friedrich-Straße and up to the Nordkette wall. No better introduction to this city.",im:"Time-travel: a watchman scanning the Inn valley from this tower for danger, 1500",t:"Small entry fee (€3). Open daily. Worth every cent for the view.",c:["street_art"],r:"g",nn:"Stadtturm — Altstadt #63",ns:"148 Stufen für einen 360°-Blick auf die Alpen und die Altstadt",nst:"Der mittelalterliche Wachturm wurde 1358 erbaut. Von der Aussichtsplattform blickt man geradeaus die Herzog-Friedrich-Straße entlang.",nt:"Kleiner Eintritt (3 €). Täglich geöffnet."},
  {id:64,n:"Herzog-Friedrich-Straße — Altstadt #64",a:"Altstadt",v:["beautiful","history","architecture"],d:33,s:"The most photogenic street in Austria — pastel arcades, Golden Roof, mountain backdrop",st:"The arcaded street has been Innsbruck\'s main artery since the 14th century. The Golden Roof glitters at the far end. Walk it early morning before the tourists arrive. The mountains are always there, framed between buildings.",im:"Time-travel: Emperor Maximilian I watching a tournament from the Golden Roof, 1496",t:"Free always. Best light at 7–9am.",c:["abandoned"],r:"g",nn:"Herzog-Friedrich-Straße — Altstadt #64",ns:"Die fotogenste Straße Österreichs — Pastellarkaden, Goldenes Dachl, Bergkulisse",nst:"Die Arkadengasse ist seit dem 14. Jahrhundert Innsbrucks Hauptader.",nt:"Immer gratis. Bestes Licht 7–9 Uhr morgens."},
  {id:65,n:"Innkai Riverside Walk — Altstadt #65",a:"Altstadt",v:["nature","quiet","beautiful"],d:42,s:"The Inn riverbank — fast glacier water, mountain backdrop, free swimming in summer",st:"The Inn runs fast and cold from the Alps straight through the city centre. The riverside promenade is where locals jog, sunbathe on pebble banks, and swim in the turquoise glacier water in summer.",im:"Time-travel: the medieval bridge at this spot, the gateway to Innsbruck for Alpine traders, 1300",t:"Free always. Swimming is local custom — enter carefully, strong current.",c:["free_museum"],r:"g",nn:"Innkai — Altstadt #65",ns:"Das Innufer — schnelles Gletscherwasser, Bergkulisse, Freibaden im Sommer",nst:"Der Inn fließt schnell und kalt von den Alpen direkt durch die Innenstadt.",nt:"Immer gratis. Schwimmen ist lokale Tradition — Vorsicht, starke Strömung."},
  {id:66,n:"Hofgarten — Altstadt #66",a:"Altstadt",v:["beautiful","nature","quiet"],d:22,s:"The imperial court garden — pavilion concerts, chess tables, and a rose garden with mountain views",st:"The Hofgarten was laid out in 1410 for the Habsburg court. It is still the city\'s most elegant park. Pensioners play chess on permanent stone boards under the trees. Free summer concerts in the pavilion.",im:"Time-travel: the Habsburg court promenading here in formal dress, watched by the Nordkette, 1780",t:"Free. Open daily. Check for free summer concert programme.",c:["local_only"],r:"g",nn:"Hofgarten — Altstadt #66",ns:"Der kaiserliche Hofgarten — Pavillonkonzerte, Schachtische, Rosengarten mit Bergblick",nst:"Der Hofgarten wurde 1410 für den Habsburger Hof angelegt.",nt:"Gratis. Täglich geöffnet. Sommerkonzerte sind gratis."},
  {id:67,n:"Nordkette Footpath — Nordkette #67",a:"Nordkette",v:["nature","high_spots","local"],d:5,s:"Hike from the city centre straight up the Nordkette — the mountain wall Innsbruck looks up at",st:"The Höhenweg trail rises from 900 m to 2334 m (Hafelekar). The lower section through the forest takes 2 hours and is free. You emerge above the treeline to see the whole city and Inn valley. Locals do this on weekends.",im:"Time-travel: chamois watching the first mountaineers climbing this ridge in the 1800s",t:"Free to walk. Cable car costs €30 return — hike instead if you have time.",c:["architecture"],r:"g",nn:"Nordkette Wanderweg — Nordkette #67",ns:"Zu Fuß vom Stadtzentrum hoch auf die Nordkette",nst:"Der Höhenweg steigt von 900 m auf 2334 m (Hafelekar). Das untere Waldstück dauert 2 Stunden.",nt:"Zu Fuß kostenlos. Seilbahn kostet 30 €."},
  {id:68,n:"Hungerburg Village — Hungerburg #68",a:"Hungerburg",v:["local","beautiful","hidden"],d:53,s:"The mountain village above Innsbruck that 99% of visitors never reach — extraordinary views",st:"Hungerburg sits at 870 m above the city, reachable by the Hungerburgbahn funicular. Once there it is a quiet residential area. Walk to the Grab viewpoint for the full Inn valley panorama.",im:"Time-travel: the first funicular opening in 1906, Innsbruck residents taking Sunday trips up for the air",t:"Hungerburgbahn included in Innsbruck Card or day ticket.",c:["history_big"],r:"g",nn:"Hungerburg — Hungerburg #68",ns:"Das Bergdorf über Innsbruck, das 99 % der Besucher nie erreichen",nst:"Hungerburg liegt auf 870 m über der Stadt und ist mit der Hungerburgbahn erreichbar.",nt:"Hungerburgbahn im Innsbruck Card enthalten."},
  {id:69,n:"Stift Wilten Basilica — Wilten #69",a:"Wilten",v:["beautiful","history","architecture"],d:15,s:"A small baroque basilica in the student quarter with extraordinary yellow-and-white interior",st:"The Basilika Wilten was completed in 1756 on the site of a Roman settlement. The interior is an explosion of fresco, gilt, and cream stone. It is always quiet. The monastery garden next door is free.",im:"Time-travel: Cistercian monks building this basilica on top of the Roman ruins of Veldidena, 1750",t:"Free. Open daily. No tickets needed.",c:["high_spots"],r:"g",nn:"Basilika Wilten — Wilten #69",ns:"Eine kleine Barockbasilika im Studentenviertel mit außergewöhnlichem Gelb-Weiß-Interieur",nst:"Die Basilika Wilten wurde 1756 auf dem Gelände einer römischen Siedlung fertiggestellt.",nt:"Gratis. Täglich geöffnet."},
  {id:70,n:"Triumphpforte — Mariahilf #70",a:"Mariahilf",v:["history","architecture","weird"],d:49,s:"A triumphal arch built to celebrate a wedding — one face mourns, one face celebrates",st:"The arch was built in 1765 for the wedding of Leopold II. Mid-celebration, his father Franz I died. Maria Theresa had the south face redesigned as a mourning arch. So one face celebrates, one face mourns.",im:"Time-travel: the Habsburg court ceremony under this arch, half celebrating, half in black mourning, 1765",t:"Free, always visible. Best seen from both sides.",c:["parks"],r:"g",nn:"Triumphpforte — Mariahilf #70",ns:"Ein Triumphbogen gebaut für eine Hochzeit — ein Gesicht trauert, das andere feiert",nst:"Der Bogen wurde 1765 für die Hochzeit Leopolds II. gebaut. Mitten in der Feier starb sein Vater.",nt:"Gratis, immer sichtbar."},
  {id:71,n:"Bergisel Ski Jump Exterior — Wilten #71",a:"Wilten",v:["architecture","weird","beautiful"],d:32,s:"Zaha Hadid\'s swooping ski jump tower — the most dramatic architecture in Tyrol",st:"The Bergisel ski jump was rebuilt by Zaha Hadid in 2002. The structure curves and cantilevers over the old hillside like a liquid steel sculpture. The exterior is free to walk around and photograph.",im:"Time-travel: the first ski jump competition at Bergisel in 1925, wooden ramps and leather boots",t:"Exterior always free. Tower café has entry fee. Exterior alone is worth it.",c:["courtyards"],r:"g",nn:"Bergisel Schanze — Wilten #71",ns:"Zaha Hadids geschwungener Sprungturm — das dramatischste Bauwerk Tirols",nst:"Die Bergisel-Schanze wurde 2002 von Zaha Hadid umgebaut.",nt:"Außenbereich immer gratis."},
  {id:72,n:"Wiltener Platzl Market — Wilten #72",a:"Wilten",v:["local","free","hidden"],d:26,s:"The local weekly market far from the tourist trail — the real Innsbruck food culture",st:"Wiltener Platzl\'s Saturday market is where chefs and local families shop for Tyrolean cheese, speck, fresh bread, and forest mushrooms. Half the stalls offer tastings.",im:"Time-travel: this square as the village centre of Wilten before it was absorbed by the city, 1890",t:"Free. Saturdays, 7am–1pm.",c:["romantic_water"],r:"g",nn:"Wiltener Platzl Markt — Wilten #72",ns:"Der lokale Wochenmarkt abseits des Touristenpfads",nst:"Der Samstagmarkt auf dem Wiltener Platzl ist der Ort, wo Köche und Familien Tiroler Käse einkaufen.",nt:"Gratis. Samstags 7–13 Uhr."},
  {id:73,n:"Hötting Village Path — Hötting #73",a:"Hötting",v:["hidden","local","nature"],d:22,s:"Walk through the hillside residential suburb where Innsbruck residents actually live",st:"Hötting climbs the north slope above the Inn, a maze of footpaths between old farmhouses and modern apartments. The Martinswand cliff looms above. Walk up for views and silence.",im:"Time-travel: Hötting as a completely separate village looking down at the town of Innsbruck, 1850",t:"Free. Walk from the Altstadt bridge north, then follow signs uphill.",c:["scary"],r:"g",nn:"Hötting Dorfpfad — Hötting #73",ns:"Durch den Wohnvorort, wo Innsbrucker wirklich leben",nst:"Hötting klettert den Nordhang über dem Inn hinauf, ein Labyrinth aus Fußwegen.",nt:"Gratis. Zu Fuß von der Altstadtbrücke."},
  {id:74,n:"Alpenzoo — Hungerburg #74",a:"Hungerburg",v:["nature","local","history"],d:14,s:"Europe\'s highest-altitude zoo — bears, wolves, ibex, and golden eagles",st:"The Alpenzoo sits at 727 m and houses only species native to the Alps. Brown bears, lynx, golden eagles, ibex, and bearded vultures. The mountain views from the enclosures are remarkable.",im:"Time-travel: the last wolf shot in Tyrol in 1882, now these same animals protected here",t:"Entry fee (€12). Hungerburgbahn included with zoo ticket.",c:["famous_dead"],r:"g",nn:"Alpenzoo — Hungerburg #74",ns:"Europas höchstgelegener Zoo — Bären, Wölfe, Steinböcke, native Alpenarten",nst:"Der Alpenzoo liegt auf 727 m und beherbergt nur in den Alpen heimische Tierarten.",nt:"Eintritt (12 €). Hungerburgbahn mit Zooticket enthalten."},
  {id:75,n:"Igls Village Hike — Igls #75",a:"Igls",v:["nature","quiet","local"],d:18,s:"Tram to the plateau village above Innsbruck — old Tyrolean houses, meadows, and mountain silence",st:"The historic tram line climbs to Igls at 900 m, a village of old farmhouses, a small baroque church, and summer meadows. Walk the Patscherkofel trail or just sit in the silence.",im:"Time-travel: the original tram ride to Igls as Innsbruck\'s first leisure excursion, 1900",t:"Day ticket covers the tram. Walk freely from the Igls terminus.",c:["street_art"],r:"g",nn:"Igls Dorfwanderung — Igls #75",ns:"Straßenbahn zum Plateaudorf über Innsbruck — alte Tiroler Häuser, Wiesen, Bergstille",nst:"Die historische Straßenbahn fährt nach Igls auf 900 m.",nt:"Tageskarte enthält Straßenbahn. Ab Endstation Igls frei herumlaufen."},
  {id:76,n:"Hall in Tirol Old Town — Hall in Tirol #76",a:"Hall in Tirol",v:["history","hidden","beautiful"],d:53,s:"The medieval silver-mint town 10 km east — better preserved than Innsbruck, half the tourists",st:"Hall was more important than Innsbruck for centuries — the site of Tyrol\'s silver mint from 1477. The medieval old town is astonishingly intact. The Schulgasse, Münzergasse, and Stadtturm are all free.",im:"Time-travel: Hall at the peak of its silver wealth, carts of coin rolling out the gate to the Habsburg treasury, 1520",t:"Free to walk. Bus 4 from Innsbruck (25 min).",c:["abandoned"],r:"g",nn:"Hall in Tirol Altstadt — Hall in Tirol #76",ns:"Die mittelalterliche Silbermünzstadt 10 km östlich — besser erhalten als Innsbruck",nst:"Hall war jahrhundertelang wichtiger als Innsbruck.",nt:"Gratis zu Fuß. Bus 4 ab Innsbruck (25 min)."},
  {id:77,n:"Annasäule — Altstadt #77",a:"Altstadt",v:["history","architecture","beautiful"],d:26,s:"A gilded baroque column in Innsbruck\'s most photographed piazza — meeting point of the city",st:"The Annasäule was erected in 1706 to commemorate the defeat of Bavarian forces. It stands at the crossing point of the Maria-Theresien-Straße. The golden figure catches the afternoon light.",im:"Time-travel: Innsbruck citizens erecting this column in celebration, the Alps as always behind, 1706",t:"Free. Open square, always accessible.",c:["free_museum"],r:"g",nn:"Annasäule — Altstadt #77",ns:"Eine vergoldete Barockkolonne auf Innsbrucks meist fotografiertem Platz",nst:"Die Annasäule wurde 1706 errichtet zum Gedenken an den Sieg über bayerische Truppen.",nt:"Gratis. Öffentlicher Platz, immer zugänglich."},
  {id:78,n:"Goldenes Dachl — Altstadt #78",a:"Altstadt",v:["history","beautiful","weird"],d:11,s:"2,657 fire-gilded copper tiles — the most expensive balcony in Europe, built to settle a rumour",st:"Emperor Maximilian I built the Golden Roof in 1500 partly to prove he was not impoverished — a rumour was circulating. The result: 2,657 gilded copper tiles. The loggia museum inside is worth a visit.",im:"Time-travel: Emperor Maximilian watching tournament jousting from this balcony, 1500",t:"Exterior free always. Museum entry €5.",c:["local_only"],r:"g",nn:"Goldenes Dachl — Altstadt #78",ns:"2.657 feuervergoldete Kupferschindeln — der teuerste Balkon Europas",nst:"Kaiser Maximilian I. baute das Goldene Dachl 1500.",nt:"Außen immer gratis. Museumseingang 5 €."},
  {id:79,n:"Dom zu St. Jakob — Altstadt #79",a:"Altstadt",v:["architecture","beautiful","history"],d:10,s:"The cathedral with Cranach\'s Madonna and one of the finest baroque interiors in Tyrol",st:"The Dom was rebuilt in baroque style in 1722. The ceiling fresco by the Asam brothers is one of the largest in the world. Cranach\'s Madonna painting hangs in the side chapel. Always free.",im:"Time-travel: the Asam brothers painting the cathedral ceiling on scaffolding 20 metres up, 1720",t:"Free. Open daily. Check for organ concerts.",c:["architecture"],r:"g",nn:"Dom zu St. Jakob — Altstadt #79",ns:"Die Kathedrale mit Cranachs Madonna und einem der schönsten Barockinterieurs Tirols",nst:"Der Dom wurde 1722 im Barockstil umgebaut.",nt:"Gratis. Täglich geöffnet."},
  {id:80,n:"Grassmayr Bell Museum — Altstadt #80",a:"Altstadt",v:["hidden","history","local"],d:29,s:"A family bell foundry operating continuously since 1599 — the oldest business in Innsbruck",st:"The Grassmayr family has cast bells in the same building since 1599. They supply churches across the Alps. The museum explains bell casting with original moulds and an acoustic chamber.",im:"Time-travel: a Grassmayr bell being cast for a Tyrolean village church, molten bronze poured at midnight, 1750",t:"Small entry (€5). Open weekdays. Ring the bells yourself.",c:["history_big"],r:"g",nn:"Grassmayr Glockenmuseum — Altstadt #80",ns:"Eine Glockengießerei, die seit 1599 ununterbrochen betrieben wird",nst:"Die Familie Grassmayr gießt seit 1599 Glocken im selben Gebäude.",nt:"Kleiner Eintritt (5 €). Wochentags geöffnet."},
  {id:81,n:"Hafelekarbahn Top Station — Nordkette #81",a:"Nordkette",v:["beautiful","high_spots","nature"],d:11,s:"Hafelekar summit at 2334 m — the highest point directly above a European capital",st:"The Nordkettenbahn cable cars reach 2334 m in 20 minutes. At the top station, the view stretches 150 km: Dolomites, Swiss peaks, German foothills. The ridge walk is free once you are up.",im:"Time-travel: early mountaineers establishing the first hut here in the 1880s, watching the city below",t:"Cable car €30 return. Hike up free (2 hours from city). Ridge walk free.",c:["high_spots"],r:"g",nn:"Hafelekarbahn — Nordkette #81",ns:"Hafelekar-Gipfel auf 2334 m — der höchste Punkt direkt über einer europäischen Hauptstadt",nst:"Die Nordkettenbahn erreicht 2334 m in 20 Minuten.",nt:"Seilbahn 30 € Rückfahrt. Zu Fuß gratis (2 Std.)."},
  {id:82,n:"Marktgasse Farmers Stalls — Altstadt #82",a:"Altstadt",v:["local","free","hidden"],d:27,s:"Daily Tyrolean food stalls under the arcades — speck, mountain cheese, schnapps samples",st:"The Marktgasse runs below the Altstadt arcades. Small farmers\' stalls open every morning with Tyrolean speck, grey cheese, mountain honey, and schnapps. Tastings are usually free.",im:"Time-travel: Alpine peasants selling surplus butter and cheese under these same arcades, 1700",t:"Free to browse. Open Mon–Sat, mornings only.",c:["parks"],r:"g",nn:"Marktgasse Bauernstände — Altstadt #82",ns:"Tägliche Tiroler Lebensmittelstände unter den Arkaden",nst:"Die Marktgasse läuft unter den Altstadtarkaden. Kleine Bauernstände öffnen jeden Morgen.",nt:"Gratis. Mo–Sa, nur morgens."},
  {id:83,n:"Patscherkofel Summit Trail — Igls #83",a:"Igls",v:["nature","high_spots","local"],d:27,s:"The mountain that was Innsbruck\'s 1976 Winter Olympics downhill course — free to hike today",st:"Patscherkofel at 2246 m hosted the men\'s downhill at the 1976 Olympics. The trail from Igls takes 3 hours and is free. Old Olympic infrastructure rusts quietly in the spruce forest.",im:"Time-travel: Franz Klammer winning Olympic gold on this mountain to the roar of 50,000 Austrians, 1976",t:"Free to hike from Igls. Cable car €19 return if preferred.",c:["courtyards"],r:"g",nn:"Patscherkofel — Igls #83",ns:"Der Berg, der Innsbrucks Olympia-Abfahrt 1976 war — heute kostenlos zu wandern",nst:"Der Patscherkofel auf 2246 m war Schauplatz der Herren-Abfahrt 1976.",nt:"Kostenlos ab Igls wandern. Seilbahn 19 € Rückfahrt möglich."},
  {id:84,n:"Sillschlucht Gorge — Wilten #84",a:"Wilten",v:["nature","hidden","local"],d:43,s:"A limestone gorge carved by the Sill river — right on the city edge, almost nobody goes there",st:"The Sill river cuts a dramatic gorge south of the city near Wilten. A trail follows the river through the canyon. Locals know about it; tourists do not. The water is intense turquoise.",im:"Time-travel: the Sill providing power for the city\'s first industrial mills, 1850",t:"Free. Take the path south from Wiltener Platzl. 20 min walk.",c:["romantic_water"],r:"g",nn:"Sillschlucht — Wilten #84",ns:"Eine Kalksteinklamm des Sill — am Stadtrand, fast niemand kommt dorthin",nst:"Der Sill schneidet südlich der Stadt eine dramatische Schlucht.",nt:"Gratis. Vom Wiltener Platzl südlich gehen. 20 Min."},
  {id:85,n:"Rathausgalerien Rooftop — Altstadt #85",a:"Altstadt",v:["beautiful","hidden","architecture"],d:21,s:"The shopping centre rooftop with a free urban panorama and mountain backdrop",st:"The Rathausgalerien mall\'s roof terrace is free to access and gives a 360° view of the old town rooflines, the cathedral dome, and the Nordkette wall — all without spending anything.",im:"Time-travel: this same city block as the town hall courtyard, 1700",t:"Free. Accessible during mall hours. Take the lift to the top floor.",c:["scary"],r:"g",nn:"Rathausgalerien Dachterrasse — Altstadt #85",ns:"Das kostenlose Stadtpanorama mit Bergkulisse",nst:"Die Dachterrasse der Rathausgalerien ist gratis zugänglich.",nt:"Gratis. Zugänglich während Mall-Öffnungszeiten."},
  {id:86,n:"Ottoburg Tower House — Altstadt #86",a:"Altstadt",v:["history","architecture","hidden"],d:7,s:"The oldest residential tower in Innsbruck — built 1479, visible from outside",st:"The Ottoburg is a medieval tower house that still stands on the edge of the Altstadt. Its exterior shows the layers: Gothic windows, Renaissance additions, Baroque details. The restaurant inside is not free, but the exterior always is.",im:"Time-travel: the merchant family of Ottoburg fortifying their tower against guild rivals, 1490",t:"Exterior free. Interior is a restaurant.",c:["famous_dead"],r:"g",nn:"Ottoburg Turm — Altstadt #86",ns:"Der älteste Wohnturm Innsbrucks — erbaut 1479, außen immer sichtbar",nst:"Die Ottoburg ist ein mittelalterliches Turmhaus am Rand der Altstadt.",nt:"Außen gratis. Innen ist ein Restaurant."},
  {id:87,n:"Panorama Trail — Hungerburg #87",a:"Hungerburg",v:["nature","beautiful","local"],d:51,s:"A circular walk at 870 m above Innsbruck with constant mountain and city views",st:"The Höhenweg trail circles the Hungerburg plateau at a constant altitude, giving views south to the Inn valley and the Stubai Alps. Trail signs are in German. Locals run it at dawn.",im:"Time-travel: the first mountain path laid out for the leisure walkers of the Habsburg era, 1880",t:"Free. Take Hungerburgbahn up (day ticket) then walk the Höhenweg.",c:["street_art"],r:"g",nn:"Panoramaweg — Hungerburg #87",ns:"Ein Rundweg auf 870 m über Innsbruck mit Bergblick",nst:"Der Höhenweg umrundet das Hungerburg-Plateau auf gleichbleibender Höhe.",nt:"Gratis. Hungerburgbahn rauf dann Höhenweg gehen."},
  {id:88,n:"Sillschlucht Gorge — Wilten #88",a:"Wilten",v:["nature","hidden","free"],d:34,s:"A glacial-blue gorge basically inside the city — 15 minutes from the Altstadt, feels like mountain wilderness",st:"The Sill river carved a narrow gorge through the rock south of Innsbruck. The water is that impossible Tyrolean blue-green from glacial melt. The forest path follows it. Hardly anyone comes here.",im:"Time-travel: this gorge as the only route south out of Innsbruck before the railways, travellers fording the Sill on foot",t:"Free. Walk south from Wilten Abbey, follow the Sill river upstream.",c:["abandoned"],r:"g",nn:"Sillschlucht — Wilten #88",ns:"En glaciärblå ravin i princip inne i staden — 15 minuter från Altstadt, känsla av fjällvildmark",nst:"Sillfloden skar en smal ravin söder om Innsbruck. Vattnet har den omöjliga tyrolen blågrön färgen från glaciärsmältning.",nt:"Gratis. Gå söderut från Wilten-klostret, följ Sillfloden uppströms."},
  {id:89,n:"Mariahilfstraße Coloured Houses — Mariahilf #89",a:"Mariahilf",v:["beautiful","local","free"],d:39,s:"The Inn riverbank row of painted houses — Innsbruck\'s most photographed view, stunning at golden hour",st:"The painted facades along Mariahilfstraße have been reflected in the Inn for 400 years. Each house a different colour — ochre, pistachio, terracotta. The river runs glacier-green in front. Locals walk this daily.",im:"Time-travel: merchants loading their boats along this bank in 1600, the same coloured houses behind them",t:"Free. Cross the Innbrücke bridge and walk north along the river.",c:["free_museum"],r:"g",nn:"Mariahilfstraße bunte Häuser — Mariahilf #89",ns:"Die bemalten Häuser am Innufer — Innsbrucks meistfotografierte Aussicht bei goldener Stunde",nst:"Die bemalten Fassaden entlang der Mariahilfstraße spiegeln sich seit 400 Jahren im Inn. Jedes Haus eine andere Farbe.",nt:"Kostenlos. Über die Innbrücke gehen und am Fluss nordwärts spazieren."},
  {id:90,n:"Baggersee Rossau Free Swim — Hötting #90",a:"Hötting",v:["local","nature","free"],d:12,s:"A gravel-pit lake where entry is free after 6pm — Innsbruck locals\' best kept summer secret",st:"Baggersee Rossau is a swimming lake northwest of the city. Official entry fee during the day, but after 18:00 and all day September through March it is free. Clean water, mountain backdrop, locals only.",im:"Time-travel: the gravel pits being excavated here in the 1950s for postwar reconstruction, not imagining it would become a swimming lake",t:"Free after 18:00. Free all day Sept–March. Bus 4 to Rossau.",c:["local_only"],r:"g",nn:"Baggersee Rossau — Hötting #90",ns:"En grustäktsjö där inträdet är gratis efter kl 18 — Innsbrucks bäst bevarade sommarhemlighet",nst:"Baggersee Rossau är en simsjö nordväst om staden. Officiell inträdesavgift på dagen, men efter 18:00 är det gratis.",nt:"Gratis efter 18:00. Gratis hela dagen sept–mars. Buss 4 till Rossau."},
  {id:91,n:"Helena-Scheuberin Memorial Garden — Altstadt #91",a:"Altstadt",v:["history","weird","hidden"],d:29,s:"A pocket memorial garden for the woman who tried to stop Innsbruck\'s witch trials — in 1485",st:"Helena Scheuberin stood up in the Altstadt market and publicly accused the witch-trial inquisitor Heinrich Kramer of being a fraud. She was excommunicated. The small garden memorialises her and the women he condemned.",im:"Time-travel: Helena Scheuberin standing in this market square in 1485, pointing at the inquisitor, the crowd watching",t:"Free. Near the Hofburg. Look for the memorial on Rennweg.",c:["architecture"],r:"g",nn:"Helena-Scheuberin-Garten — Altstadt #91",ns:"En liten minnespark för kvinnan som försökte stoppa Innsbrucks häxprocesser — 1485",nst:"Helena Scheuberin stod upp på torget och anklagade häxjägarinquisitorn Heinrich Kramer offentligt för bedrägeri 1485.",nt:"Gratis. Nära Hofburg. Titta efter minnesmärket på Rennweg."},
  {id:92,n:"Hofgarten Imperial Park — Altstadt #92",a:"Altstadt",v:["beautiful","history","local"],d:10,s:"The Habsburg imperial garden in the middle of the city — free, locals read newspapers here every morning",st:"The Hofgarten was the private garden of the Habsburg governors. Now it is the city\'s green living room. Giant chess boards, a glass music pavilion, and a rose garden. The café tables fill with students at noon.",im:"Time-travel: Archduke Ferdinand II walking these paths in 1563, planning the Ambras Castle he would build on the hill above",t:"Free. Open dawn to dusk. Enter from Rennweg or Universitätstraße.",c:["history_big"],r:"g",nn:"Hofgarten — Altstadt #92",ns:"Den habsburgska kejsarträdgården mitt i staden — gratis, lokalbefolkningen läser tidningar här varje morgon",nst:"Hofgarten var den privata trädgården för de habsburgska guvernörerna. Nu är det stadens gröna vardagsrum. Jätteschack och en glaspaviljong.",nt:"Gratis. Öppet gryning till skymning. Ingång från Rennweg eller Universitätsgatan."},
  {id:93,n:"Inn River Wild Swim — Mariahilf #93",a:"Mariahilf",v:["local","nature","free"],d:40,s:"Swimming in glacier water in the middle of a city — cold, fast, extraordinary, what Innsbruck locals do",st:"The Inn runs glacial cold through the centre of Innsbruck. At the official bathing spots near Mariahilfstraße locals swim in the current. The water is that turquoise-green. It is genuinely cold. It is genuinely free.",im:"Time-travel: Roman soldiers bathing in the Oenus river here, 150 AD, before any bridge, any city",t:"Free. Bank access near Innbrücke. Respect currents — the Inn flows fast.",c:["high_spots"],r:"g",nn:"Inn flodssimning — Mariahilf #93",ns:"Simma i glaciärvatten mitt i en stad — kallt, snabbt, extraordinärt, vad Innsbrucks lokalbefolkning gör",nst:"Inn rinner glaciärkall genom centrum av Innsbruck. Vid de officiella badplatserna nära Mariahilfstraße simmar lokalbefolkningen i strömmen.",nt:"Gratis. Strandomgång nära Innbrücke. Respektera strömmar — Inn rinner snabbt."},
  {id:94,n:"Stadtturm Climb — Altstadt #94",a:"Altstadt",v:["beautiful","history","high_spots"],d:23,s:"Climb 148 steps for a 360° view of the Alps and the old town — the best vantage in Innsbruck",st:"The medieval watchtower was built in 1358. From the open-air viewing gallery, you look straight down the colourful Herzog-Friedrich-Straße and up to the Nordkette wall. No better introduction to this city.",im:"Time-travel: a watchman scanning the Inn valley from this tower for danger, 1500",t:"Small entry fee (€3). Open daily. Worth every cent for the view.",c:["parks"],r:"g",nn:"Stadtturm — Altstadt #94",ns:"148 Stufen für einen 360°-Blick auf die Alpen und die Altstadt",nst:"Der mittelalterliche Wachturm wurde 1358 erbaut. Von der Aussichtsplattform blickt man geradeaus die Herzog-Friedrich-Straße entlang.",nt:"Kleiner Eintritt (3 €). Täglich geöffnet."},
