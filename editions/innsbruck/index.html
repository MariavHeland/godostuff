  {id:95,n:"Herzog-Friedrich-Straße — Altstadt #95",a:"Altstadt",v:["beautiful","history","architecture"],d:45,s:"The most photogenic street in Austria — pastel arcades, Golden Roof, mountain backdrop",st:"The arcaded street has been Innsbruck\'s main artery since the 14th century. The Golden Roof glitters at the far end. Walk it early morning before the tourists arrive. The mountains are always there, framed between buildings.",im:"Time-travel: Emperor Maximilian I watching a tournament from the Golden Roof, 1496",t:"Free always. Best light at 7–9am.",c:["courtyards"],r:"g",nn:"Herzog-Friedrich-Straße — Altstadt #95",ns:"Die fotogenste Straße Österreichs — Pastellarkaden, Goldenes Dachl, Bergkulisse",nst:"Die Arkadengasse ist seit dem 14. Jahrhundert Innsbrucks Hauptader.",nt:"Immer gratis. Bestes Licht 7–9 Uhr morgens."},
  {id:96,n:"Innkai Riverside Walk — Altstadt #96",a:"Altstadt",v:["nature","quiet","beautiful"],d:44,s:"The Inn riverbank — fast glacier water, mountain backdrop, free swimming in summer",st:"The Inn runs fast and cold from the Alps straight through the city centre. The riverside promenade is where locals jog, sunbathe on pebble banks, and swim in the turquoise glacier water in summer.",im:"Time-travel: the medieval bridge at this spot, the gateway to Innsbruck for Alpine traders, 1300",t:"Free always. Swimming is local custom — enter carefully, strong current.",c:["romantic_water"],r:"g",nn:"Innkai — Altstadt #96",ns:"Das Innufer — schnelles Gletscherwasser, Bergkulisse, Freibaden im Sommer",nst:"Der Inn fließt schnell und kalt von den Alpen direkt durch die Innenstadt.",nt:"Immer gratis. Schwimmen ist lokale Tradition — Vorsicht, starke Strömung."},
  {id:97,n:"Hofgarten — Altstadt #97",a:"Altstadt",v:["beautiful","nature","quiet"],d:28,s:"The imperial court garden — pavilion concerts, chess tables, and a rose garden with mountain views",st:"The Hofgarten was laid out in 1410 for the Habsburg court. It is still the city\'s most elegant park. Pensioners play chess on permanent stone boards under the trees. Free summer concerts in the pavilion.",im:"Time-travel: the Habsburg court promenading here in formal dress, watched by the Nordkette, 1780",t:"Free. Open daily. Check for free summer concert programme.",c:["scary"],r:"g",nn:"Hofgarten — Altstadt #97",ns:"Der kaiserliche Hofgarten — Pavillonkonzerte, Schachtische, Rosengarten mit Bergblick",nst:"Der Hofgarten wurde 1410 für den Habsburger Hof angelegt.",nt:"Gratis. Täglich geöffnet. Sommerkonzerte sind gratis."},
  {id:98,n:"Nordkette Footpath — Nordkette #98",a:"Nordkette",v:["nature","high_spots","local"],d:41,s:"Hike from the city centre straight up the Nordkette — the mountain wall Innsbruck looks up at",st:"The Höhenweg trail rises from 900 m to 2334 m (Hafelekar). The lower section through the forest takes 2 hours and is free. You emerge above the treeline to see the whole city and Inn valley. Locals do this on weekends.",im:"Time-travel: chamois watching the first mountaineers climbing this ridge in the 1800s",t:"Free to walk. Cable car costs €30 return — hike instead if you have time.",c:["famous_dead"],r:"g",nn:"Nordkette Wanderweg — Nordkette #98",ns:"Zu Fuß vom Stadtzentrum hoch auf die Nordkette",nst:"Der Höhenweg steigt von 900 m auf 2334 m (Hafelekar). Das untere Waldstück dauert 2 Stunden.",nt:"Zu Fuß kostenlos. Seilbahn kostet 30 €."},
  {id:99,n:"Hungerburg Village — Hungerburg #99",a:"Hungerburg",v:["local","beautiful","hidden"],d:17,s:"The mountain village above Innsbruck that 99% of visitors never reach — extraordinary views",st:"Hungerburg sits at 870 m above the city, reachable by the Hungerburgbahn funicular. Once there it is a quiet residential area. Walk to the Grab viewpoint for the full Inn valley panorama.",im:"Time-travel: the first funicular opening in 1906, Innsbruck residents taking Sunday trips up for the air",t:"Hungerburgbahn included in Innsbruck Card or day ticket.",c:["street_art"],r:"g",nn:"Hungerburg — Hungerburg #99",ns:"Das Bergdorf über Innsbruck, das 99 % der Besucher nie erreichen",nst:"Hungerburg liegt auf 870 m über der Stadt und ist mit der Hungerburgbahn erreichbar.",nt:"Hungerburgbahn im Innsbruck Card enthalten."},
  {id:100,n:"Stift Wilten Basilica — Wilten #100",a:"Wilten",v:["beautiful","history","architecture"],d:50,s:"A small baroque basilica in the student quarter with extraordinary yellow-and-white interior",st:"The Basilika Wilten was completed in 1756 on the site of a Roman settlement. The interior is an explosion of fresco, gilt, and cream stone. It is always quiet. The monastery garden next door is free.",im:"Time-travel: Cistercian monks building this basilica on top of the Roman ruins of Veldidena, 1750",t:"Free. Open daily. No tickets needed.",c:["abandoned"],r:"g",nn:"Basilika Wilten — Wilten #100",ns:"Eine kleine Barockbasilika im Studentenviertel mit außergewöhnlichem Gelb-Weiß-Interieur",nst:"Die Basilika Wilten wurde 1756 auf dem Gelände einer römischen Siedlung fertiggestellt.",nt:"Gratis. Täglich geöffnet."},
  {id:101,n:"Triumphpforte — Mariahilf #101",a:"Mariahilf",v:["history","architecture","weird"],d:9,s:"A triumphal arch built to celebrate a wedding — one face mourns, one face celebrates",st:"The arch was built in 1765 for the wedding of Leopold II. Mid-celebration, his father Franz I died. Maria Theresa had the south face redesigned as a mourning arch. So one face celebrates, one face mourns.",im:"Time-travel: the Habsburg court ceremony under this arch, half celebrating, half in black mourning, 1765",t:"Free, always visible. Best seen from both sides.",c:["free_museum"],r:"g",nn:"Triumphpforte — Mariahilf #101",ns:"Ein Triumphbogen gebaut für eine Hochzeit — ein Gesicht trauert, das andere feiert",nst:"Der Bogen wurde 1765 für die Hochzeit Leopolds II. gebaut. Mitten in der Feier starb sein Vater.",nt:"Gratis, immer sichtbar."},
  {id:102,n:"Bergisel Ski Jump Exterior — Wilten #102",a:"Wilten",v:["architecture","weird","beautiful"],d:7,s:"Zaha Hadid\'s swooping ski jump tower — the most dramatic architecture in Tyrol",st:"The Bergisel ski jump was rebuilt by Zaha Hadid in 2002. The structure curves and cantilevers over the old hillside like a liquid steel sculpture. The exterior is free to walk around and photograph.",im:"Time-travel: the first ski jump competition at Bergisel in 1925, wooden ramps and leather boots",t:"Exterior always free. Tower café has entry fee. Exterior alone is worth it.",c:["local_only"],r:"g",nn:"Bergisel Schanze — Wilten #102",ns:"Zaha Hadids geschwungener Sprungturm — das dramatischste Bauwerk Tirols",nst:"Die Bergisel-Schanze wurde 2002 von Zaha Hadid umgebaut.",nt:"Außenbereich immer gratis."},
  {id:103,n:"Wiltener Platzl Market — Wilten #103",a:"Wilten",v:["local","free","hidden"],d:47,s:"The local weekly market far from the tourist trail — the real Innsbruck food culture",st:"Wiltener Platzl\'s Saturday market is where chefs and local families shop for Tyrolean cheese, speck, fresh bread, and forest mushrooms. Half the stalls offer tastings.",im:"Time-travel: this square as the village centre of Wilten before it was absorbed by the city, 1890",t:"Free. Saturdays, 7am–1pm.",c:["architecture"],r:"g",nn:"Wiltener Platzl Markt — Wilten #103",ns:"Der lokale Wochenmarkt abseits des Touristenpfads",nst:"Der Samstagmarkt auf dem Wiltener Platzl ist der Ort, wo Köche und Familien Tiroler Käse einkaufen.",nt:"Gratis. Samstags 7–13 Uhr."},
  {id:104,n:"Hötting Village Path — Hötting #104",a:"Hötting",v:["hidden","local","nature"],d:19,s:"Walk through the hillside residential suburb where Innsbruck residents actually live",st:"Hötting climbs the north slope above the Inn, a maze of footpaths between old farmhouses and modern apartments. The Martinswand cliff looms above. Walk up for views and silence.",im:"Time-travel: Hötting as a completely separate village looking down at the town of Innsbruck, 1850",t:"Free. Walk from the Altstadt bridge north, then follow signs uphill.",c:["history_big"],r:"g",nn:"Hötting Dorfpfad — Hötting #104",ns:"Durch den Wohnvorort, wo Innsbrucker wirklich leben",nst:"Hötting klettert den Nordhang über dem Inn hinauf, ein Labyrinth aus Fußwegen.",nt:"Gratis. Zu Fuß von der Altstadtbrücke."},
  {id:105,n:"Alpenzoo — Hungerburg #105",a:"Hungerburg",v:["nature","local","history"],d:54,s:"Europe\'s highest-altitude zoo — bears, wolves, ibex, and golden eagles",st:"The Alpenzoo sits at 727 m and houses only species native to the Alps. Brown bears, lynx, golden eagles, ibex, and bearded vultures. The mountain views from the enclosures are remarkable.",im:"Time-travel: the last wolf shot in Tyrol in 1882, now these same animals protected here",t:"Entry fee (€12). Hungerburgbahn included with zoo ticket.",c:["high_spots"],r:"g",nn:"Alpenzoo — Hungerburg #105",ns:"Europas höchstgelegener Zoo — Bären, Wölfe, Steinböcke, native Alpenarten",nst:"Der Alpenzoo liegt auf 727 m und beherbergt nur in den Alpen heimische Tierarten.",nt:"Eintritt (12 €). Hungerburgbahn mit Zooticket enthalten."}

,{id:115,n:"Hexengarten Witch’s Garden",a:"Nordkette",v:["hidden", "goth"],d:20,s:"Folklore herb garden with Tyrolean witch plants high on the alpine slopes!",st:"Whispered legends of mountain witches linger among the twisted roots and rare herbs. This botanical oddity feels like a secret potion lab perched on the edge of the world. Perfect for goth-alpine soul-searching.",im:"Imagine plucking 'witch herbs' while fog rolls over jagged peaks, channeling your inner Tyrolean sorceress.",t:"Hike up Nordkette trails from Hungerburg (free footpath access); best in summer mornings for wildflowers. Lifts not free but hikeable for adventurers. Cool but not free: Nordkette cable car €45 roundtrip.",c:["hikes", "gardens"],r:"g",nn:"Hexengarten",ns:"Folklore-Kräutergarten mit Tiroler Hexenpflanzen hoch in den Alpen!",nst:"Geisterhafte Legenden von Berghexen weben sich durch Wurzeln und seltene Kräuter. Dieser botanische Kuriosum wirkt wie ein geheimes Zauberlabor am Rand der Welt. Ideal für gotisch-alpines Seelenwandern.",nt:"Wandere Nordkette-Pfade von Hungerburg aus (freier Fußweg); besten Sommer vormittags für Wildblumen. Bahnen kostenpflichtig, aber zu Fuß machbar für Abenteurer. Cool aber nicht gratis: Nordkette-Seilbahn €45 Hin/Rück."},
{id:116,n:"Altstadt Secret Alleys",a:"Altstadt",v:["hidden"],d:15,s:"Narrow hidden lanes off the main drag hiding courtyards and quirky doorways!",st:"Duck into shadowy Seilergasse for a micro-adventure through medieval whispers and forgotten nooks. These side-streets pulse with nightlife ghosts and architectural surprises. Urban exploration without leaving town.",im:"Picture slipping through a tiny archway into a sun-dappled courtyard where time forgot to tick.",t:"Start at Herzog-Friedrich-Straße, wander Seilergasse and adjacent alleys; anytime, golden hour for photos. Totally free, wear comfy shoes for cobblestones.",c:["walks"],r:"g",nn:"Altstadt Geheim-Gassen",ns:"Tauche in die schattigen Seilergasse für ein Mikro-Abenteuer durch mittelalterliche Flüstern und vergessene Nischen. Diese Nebenstraßen pulsieren mit Nachtleben-Geistern und Architektur-Überraschungen.",nt:"Von Herzog-Friedrich-Straße aus in Seilergasse und Nachbargassen schlendern; jederzeit, Goldene Stunde für Fotos. Komplett gratis, bequeme Schuhe für Kopfsteinpflaster."},
{id:117,n:"Medieval Street Art Facades",a:"Altstadt",v:["hidden"],d:10,s:"Hunt dragons and coats of arms on ornate historic building fronts!",st:"Transform Herzog-Friedrich-Straße into a free open-air gallery of late-medieval graffiti vibes. Spot mythical beasts carved into arcades and inscriptions begging to be decoded. Rainy day arcade strolling included.",im:"Eyes widen as a snarling dragon facade emerges from the stone, like medieval graffiti come alive.",t:"Stroll Herzog-Friedrich-Straße porticos; free always, bad weather bonus under arcades. Pair with nearby alleys.",c:["art"],r:"g",nn:"Mittelalterliche Straßenkunst-Fassaden",ns:"Drachen und Wappen auf verzierten historischen Hausfronten jagen!",nst:"Verwandele Herzog-Friedrich-Straße in eine gratis Freiluftgalerie mit spätmittelalterlichem Graffiti-Flair. Entdecke mythische Bestien in Arkaden und Rätsel-Inschriften. Regenschutz inklusive.",nt:"Unter den Arkaden der Herzog-Friedrich-Straße bummeln; immer gratis, Schlechtwetter-Bonus. Mit Gassen kombinieren."},
{id:118,n:"Bergisel Panorama Point",a:"Wilten",v:["hidden"],d:25,s:"Locals’ free sunset lookout near the ski jump with epic city views!",st:"Escape to this understated hilltop gem for panoramic Innsbruck magic minus the crowds. Locals swear by it for low-key romance and golden-hour drama. Short walk from Bergisel action.",im:"Sun dips behind Nordkette, painting the valley in fiery hues from your secret perch.",t:"Walk 10-15min from Bergisel Ski Jump exterior; free access, best at sunset. Path can be steep.",c:["views"],r:"g",nn:"Bergisel Panoramapunkt",ns:"Lokales Gratis-Sonnenuntergangs-Aussichtspunkt nah am Skischanzen-Hügel!",nst:"Flieh zu diesem unterschätzten Hügeljuwel für panoramische Innsbruck-Zauberei ohne Massen. Einheimische schwören drauf für entspannte Romantik und Goldstunde-Drama. Kurzer Spaziergang vom Bergisel.",nt:"10-15 Min zu Fuß vom Bergisel-Skischanzen-Exterior; freier Zutritt, Sonnenuntergang optimal. Pfad steil."},

<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Innsbruck Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Innsbruck Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
