<script>
const P = [,
  {name:'Eilenriede Hidden Paths',area:'Eilenriede Forest',desc:'Wander the lesser-known trails in Hannover's vast city forest, where locals escape for quiet picnics under ancient oaks. Take bus 130 or 140 from central station to reach the southern edges. Free, cherished for its serene spots away from joggers.',tags:['park','hidden','free','local'],lat:52.393,lng:9.758},
  {name:'List Park Overlook',area:'List',desc:'A subtle hill in this neighborhood park offers a hidden viewpoint over rooftops and distant Herrenhausen gardens. Bus 100 stops nearby at Liststraße. Locals love the wildflower meadows and sunset vibes, completely free.',tags:['viewpoint','park','free','local'],lat:52.385,lng:9.72},
  {name:'Kirchrode Courtyard Secrets',area:'Kirchrode',desc:'Tucked behind half-timbered houses, these secret courtyards bloom with community gardens and ivy walls. Tram 4 or bus 143 gets you to Kirchrode Zentrum. Free access, a slow spot for locals to chat over coffee from nearby kiosks.',tags:['hidden','courtyard','free','local'],lat:52.41,lng:9.78},
  {name:'Vahrenwalder Street Art Alley',area:'Vahrenwald',desc:'Narrow alley bursting with fresh murals by local artists, evolving monthly. Bus 151 from Ernst-August-Platz drops close. Free, where kids and creatives hang out sketching in the shade.',tags:['street art','free','local','hidden'],lat:52.39,lng:9.74},
  {name:'Lahe Weekly Flea',area:'Lahe',desc:'Tiny local market on Saturdays with vintage finds and homemade jams, off the tourist radar. Bus 156 to Laher Feld. Very cheap (under 5€ treasures), beloved for neighborly banter.',tags:['market','local','cheap'],lat:52.42,lng:9.76},
  {name:'Döhrener Rooftop View',area:'Döhren',desc:'Climb to the public viewing platform over the neighborhood, spotting steeples and parks below. Tram 3/7 to Döhrener Chaussee. Free hidden gem, locals' sunset ritual with thermos tea.',tags:['viewpoint','hidden','free','local'],lat:52.35,lng:9.71},
  {name:'Bothfeld Community Meadow',area:'Bothfeld',desc:'Wild meadow turned impromptu community space for yoga and barbecues amid wild grasses. Bus 144 from city center. Free, a slow haven for families avoiding crowded parks.',tags:['park','community','free','local'],lat:52.43,lng:9.77},
  {name:'Linden Süd Murals',area:'Linden-Mitte',desc:'Vibrant street art on factory walls, with QR codes linking to artists' stories. Bus 109 nearby. Free discovery spot, locals snap pics and linger on benches.',tags:['street art','free','local'],lat:52.37,lng:9.69},
  {name:'Ricklingen Secret Garden',area:'Ricklingen',desc:'Enclosed courtyard garden with ponds and benches, shared by residents for quiet reads. Tram 10 to Ricklingen. Free entry via side gate, adored for its birdsong symphony.',tags:['courtyard','hidden','free','local'],lat:52.36,lng:9.68},
  {name:'Misburg Hill Vista',area:'Misburg',desc:'Overgrown hill path revealing panoramic views of industrial edges blending into green. Bus 141 stops at Misburg Bahnhof. Free, locals' off-path hike for fresh air.',tags:['viewpoint','park','free','hidden'],lat:52.44,lng:9.85},
  {id:1,n:"Herrenhäuser Gärten — Herrenhausen",a:"Herrenhausen",v:["nature","beautiful","history"],d:15,s:"Baroque garden of the Hanoverian kings — labyrinths, fountains, Europe\'s tallest garden fountain",st:"The Große Garten was the pleasure ground of the British royal house when they also ruled Hanover. The tallest garden fountain in Europe (82m) shoots every day in summer. The hedge maze is original 1674.",im:"Time-travel: Georg I of England inspecting his Hannover gardens before sailing to London, 1714",t:"The gardens are paid. The surrounding park areas and Bergpark are free.",c:["parks"],r:"g",nn:"Herrenhäuser Gärten — Herrenhausen",ns:"Barockgarten der hannoverschen Könige — Labyrinthe, Fontänen, Europas höchster Gartenbrunnen",nst:"Der Große Garten war das Vergnügungsgelände des britischen Königshauses als es auch Hannover regierte.",nt:"Die Gärten sind kostenpflichtig. Umgebende Parkbereiche und Bergpark kostenlos."},
  {id:2,n:"Georgengarten — Herrenhausen",a:"Herrenhausen",v:["nature","beautiful","free"],d:15,s:"English landscape garden free to enter — the forgotten half of Herrenhausen",st:"The Georgengarten connects Herrenhausen to the city and is completely free. English style — rolling meadows, old trees, ponds. It\'s as beautiful as the formal gardens next door.",im:"Time-travel: Hanoverian aristocrats taking their morning ride through this park, 1780",t:"Always free. Enter from Nienburger Straße. No crowds.",c:["parks"],r:"g",nn:"Georgengarten — Herrenhausen",ns:"Englischer Landschaftspark frei zugänglich — die vergessene Hälfte von Herrenhausen",nst:"Der Georgengarten verbindet Herrenhausen mit der Stadt und ist völlig kostenlos.",nt:"Immer kostenlos. Von der Nienburger Straße eintreten. Keine Menschenmassen."},
  {id:3,n:"Maschsee Lake — Maschsee",a:"Maschsee",v:["nature","beautiful","local"],d:10,s:"The city lake built by unemployed workers in the 1930s — now the living room of Hannover",st:"The Maschsee was constructed between 1934 and 1936 by thousands of unemployed Hanoverians in an emergency employment programme. 2.4 km long, it sits in the city centre and costs nothing.",im:"Time-travel: unemployed workers digging the Maschsee basin with shovels in 1934",t:"Walk the full circuit (6km) or rent a boat. Always free to walk.",c:["romantic_water"],r:"g",nn:"Maschsee — Maschsee",ns:"Der Stadtsee, von Arbeitslosen in den 1930ern erbaut — jetzt das Wohnzimmer Hannovers",nst:"Der Maschsee wurde 1934–36 von Tausenden arbeitslosen Hannoveranern gebaut.",nt:"Den vollen Rundweg (6km) gehen oder ein Boot mieten. Zu Fuß immer kostenlos."},
  {id:4,n:"Aegidienkirche War Memorial — Altstadt",a:"Altstadt",v:["history","quiet","weird"],d:5,s:"A bombed church left as a ruin — the open sky where the roof was is the memorial",st:"The Aegidienkirche was destroyed in a single RAF raid in October 1943. The decision was made not to rebuild it but to leave it as an anti-war memorial. A bell from Hiroshima hangs inside.",im:"Time-travel: the night of October 8 1943 — firestorm over Hannover, the church burning",t:"Free to enter the ruins. The Hiroshima bell rings each year on August 6.",c:["history_big"],r:"g",nn:"Aegidienkirche Kriegsmahnmal — Altstadt",ns:"Eine zerbombte Kirche als Ruine belassen — der offene Himmel wo das Dach war ist das Mahnmal",nst:"Die Aegidienkirche wurde in einem einzigen RAF-Angriff im Oktober 1943 zerstört. Beschluss sie als Mahnmal zu belassen.",nt:"Ruinen kostenlos zu betreten. Die Hiroshima-Glocke läutet jedes Jahr am 6. August."},
  {id:5,n:"Eilenriede City Forest — Eilenriede",a:"Eilenriede",v:["nature","free","quiet"],d:10,s:"650 hectares of beech forest in the city — Europe\'s largest inner-city forest",st:"The Eilenriede has protected Hannover from its own expansion since 1331. Almost 700 hectares of beech and oak within the city limits. Wild deer still live here. Free at all times.",im:"Time-travel: Hanoverian children picking mushrooms in this forest on autumn Sundays, 1910",t:"Enter at any point. The forest roads are car-free and free forever.",c:["parks"],r:"g",nn:"Eilenriede Stadtwald — Eilenriede",ns:"650 Hektar Buchenwald in der Stadt — Europas größter innerstädtischer Wald",nst:"Die Eilenriede schützt Hannover seit 1331 vor seiner eigenen Expansion.",nt:"An beliebiger Stelle eintreten. Die Waldwege sind autofrei und ewig kostenlos."},
  {id:6,n:"Waterloo Column — Altstadt",a:"Altstadt",v:["history","beautiful"],d:5,s:"A 40-metre victory column celebrating the Battle of Waterloo — built 1832",st:"Hannover contributed troops to the Battle of Waterloo against Napoleon. This column, inspired by Trajan\'s Column in Rome, lists every Hanoverian soldier who died there.",im:"Time-travel: Hanoverian veterans of Waterloo gathering at this column on the first anniversary, 1816",t:"Free to approach. The view from the surrounding park is excellent.",c:["history_big"],r:"g",nn:"Waterloosäule — Altstadt",ns:"Eine 40 Meter hohe Siegessäule für die Waterlooschlacht — 1832 erbaut",nst:"Hannover stellte Truppen für die Waterlooschlacht. Diese Säule nennt jeden gefallenen Hannoveraner.",nt:"Kostenlos zu besichtigen. Der Blick vom umliegenden Park ist ausgezeichnet."},
  {id:7,n:"Neues Rathaus Dome — Altstadt",a:"Altstadt",v:["beautiful","history","high_spots"],d:8,s:"The 1913 town hall with a slanted lift — worth it for the model of Hannover before WWII",st:"The Neues Rathaus has a unique curved lift to the dome. Inside: four scale models of Hannover from 1689, 1939, 1945 (destroyed), and today. The model of the bombed city in 1945 is the most important.",im:"Time-travel: the dome observation gallery in 1939, the city below still intact",t:"Free to enter the ground floor with the city models. Lift to dome: small fee.",c:["high_spots"],r:"g",nn:"Neues Rathaus Kuppel — Altstadt",ns:"Das Rathaus von 1913 mit einem schrägen Aufzug — lohnenswert für das Modell Hannovers vor WWII",nst:"Das Neue Rathaus hat einen einzigartigen Kurvenaufzug zur Kuppel. Vier Stadtmodelle von 1689, 1939, 1945, heute.",nt:"Erdgeschoss mit Stadtmodellen kostenlos. Kuppelaufzug kleiner Eintritt."},
  {id:8,n:"Old Town Half-Timbered Quarter — Altstadt",a:"Altstadt",v:["history","beautiful"],d:5,s:"The restored half-timbered houses of the Altstadt — 90% destroyed in WWII, rebuilt exactly",st:"Hannover\'s Altstadt was 90% destroyed in 1943. The city made the extraordinary decision to rebuild the half-timbered houses exactly as they were. Walk it knowing the stones are new but the forms are 400 years old.",im:"Time-travel: architects working from pre-war photographs to rebuild these houses in 1952",t:"Free to walk. Marktkirche is inside and free.",c:["architecture"],r:"g",nn:"Fachwerkquartier Altstadt — Altstadt",ns:"Die restaurierten Fachwerkhäuser der Altstadt — 90% im WWII zerstört, exakt wiederaufgebaut",nst:"Hannovers Altstadt wurde 1943 zu 90% zerstört. Die Stadt entschied, die Häuser exakt wiederaufzubauen.",nt:"Kostenlos zu gehen. Marktkirche ist innen und kostenlos."},
  {id:9,n:"Linden Alternative Quarter — Linden",a:"Linden",v:["local","hidden","beautiful"],d:10,s:"Hannover\'s leftist, alternative quarter — murals, organic markets, protest posters, real life",st:"Linden was a working-class area that became politically radical in the 1970s and stayed that way. The best food market in Hannover is here (Lindener Markt, Wednesday and Saturday). Community, not tourists.",im:"Time-travel: Linden factory workers becoming political activists, 1920, this same neighbourhood",t:"Wednesday and Saturday market in Lindener Markt. Everything is real.",c:["local_only"],r:"g",nn:"Linden Alternativviertel — Linden",ns:"Hannovers linkes, alternatives Viertel — Wandbilder, Biomärkte, Protestplakate, echtes Leben",nst:"Linden war ein Arbeiterbezirk, der in den 1970ern politisch radikal wurde und so blieb.",nt:"Mittwoch und Samstag Markt auf dem Lindener Markt. Alles ist echt."},
  {id:10,n:"Marktkirche Interior — Altstadt",a:"Altstadt",v:["history","beautiful"],d:5,s:"The great Gothic church of Hannover — rebuilt after 1943 with original medieval bricks salvaged",st:"The Marktkirche is the oldest church in the city, dating from the 14th century. After 1943 it was rebuilt using every original brick that could be salvaged. The interior has beautiful modern glass.",im:"Time-travel: citizens sifting through the rubble in 1945, saving every original brick by hand",t:"Free to enter. The modern glass windows are extraordinary.",c:["history_big"],r:"g",nn:"Marktkirche Innen — Altstadt",ns:"Die große gotische Kirche Hannovers — nach 1943 mit geretteten mittelalterlichen Originalbausteinen wiederaufgebaut",nst:"Die Marktkirche ist die älteste Kirche der Stadt aus dem 14. Jh. 1943 mit jedem retten Originalziegel wiederaufgebaut.",nt:"Kostenlos zu betreten. Die modernen Glasfenster sind außergewöhnlich."},
  {id:11,n:"Bergpark Herrenhausen — Herrenhausen",a:"Herrenhausen",v:["nature","free","quiet"],d:15,s:"Cascading terraces and artificial waterfalls on the hill behind the formal gardens — all free",st:"The Bergpark is the wild older sibling of the formal Herrenhäuser Gärten. Wooded hillside, cascading water features, and the Leibniztempel. All free. All beautiful.",im:"Time-travel: Hanoverian courtiers escaping the formality of the palace gardens for this wilder hill, 1730",t:"Enter from Georgengarten. Always free.",c:["parks"],r:"g",nn:"Bergpark Herrenhausen — Herrenhausen",ns:"Terrassen und künstliche Wasserfälle auf dem Hügel hinter den formalen Gärten — alle kostenlos",nst:"Der Bergpark ist das wilde ältere Geschwister der formalen Herrenhäuser Gärten.",nt:"Von Georgengarten eintreten. Immer kostenlos."},
  {id:12,n:"Leibniztempel — Herrenhausen",a:"Herrenhausen",v:["history","hidden","quiet"],d:18,s:"The temple commemorating Gottfried Wilhelm Leibniz — the philosopher who invented calculus invented here",st:"Leibniz spent 40 years in Hannover as court librarian and advisor. He invented calculus (before and independently of Newton), binary numbers, and much of modern logic. This small temple honours him in the Georgengarten.",im:"Time-travel: Leibniz writing his papers in a Hannover study, simultaneously inventing calculus and binary code, 1690",t:"Free. Always open.",c:["famous_dead"],r:"g",nn:"Leibniztempel — Herrenhausen",ns:"Der Tempel zu Ehren von Gottfried Wilhelm Leibniz — dem Philosophen, der die Infinitesimalrechnung hier erfand",nst:"Leibniz verbrachte 40 Jahre in Hannover als Hofbibliothekar. Er erfand Infinitesimalrechnung (vor Newton).",nt:"Kostenlos. Immer geöffnet."},
  {id:13,n:"Ihme Zentrum — Linden",a:"Linden",v:["weird","hidden","history"],d:10,s:"The failed utopian brutalist mega-complex — a whole city in one building, now slowly dying",st:"Built in 1975 as a self-contained mixed-use utopia, Ihme Zentrum failed commercially almost immediately. The shopping centre is half-empty. The residential towers leak. An architectural tragedy worth seeing.",im:"Time-travel: the opening of Ihme Zentrum in 1975, politicians cutting ribbon, crowds filing in optimistically",t:"Walk through the public ground floor. Free to explore the exterior.",c:["abandoned"],r:"g",nn:"Ihme Zentrum — Linden",ns:"Der gescheiterte utopische Brutalismus-Megakomplex — eine ganze Stadt in einem Gebäude, jetzt langsam sterbend",nst:"1975 als autarke gemischte Nutzung gebaut. Kommerziell fast sofort gescheitert.",nt:"Durch das öffentliche Erdgeschoss gehen. Außenbereich kostenlos erkunden."},
  {id:14,n:"Kronenbrücke Canal Walk — Linden",a:"Linden",v:["nature","local","quiet"],d:8,s:"The hidden canal walk through Linden — industrial heritage, barge traffic, working waterway",st:"The Stichkanal runs through Linden carrying commercial barge traffic. The canal banks have been opened as a walking and cycling path. Industrial heritage meets urban nature.",im:"Time-travel: barges delivering coal to the Linden factories along this canal, 1920",t:"Free. Walk from the Kronenbrücke south along the canal.",c:["romantic_water"],r:"g",nn:"Kronenbrücke Kanalweg — Linden",ns:"Der versteckte Kanalweg durch Linden — Industrieerbe, Lastkähne, arbeitender Wasserweg",nst:"Der Stichkanal fließt durch Linden und trägt gewerblichen Kahnverkehr.",nt:"Kostenlos. Von der Kronenbrücke nach Süden entlang des Kanals gehen."},
  {id:15,n:"Maschpark — Maschsee",a:"Maschsee",v:["nature","local"],d:8,s:"The park between the Maschsee and the city — where Hannover jogs, picnics, and does nothing",st:"The Maschpark connects the new town hall, the Sprengel Museum and the lake. On Sunday mornings it is the most active free space in the city — runners, families, dogs.",im:"Time-travel: post-war Hannover citizens walking here to forget the ruins, 1950",t:"Free. Sunday morning is the best time.",c:["parks"],r:"g",nn:"Maschpark — Maschsee",ns:"Der Park zwischen dem Maschsee und der Stadt — wo Hannover joggt, picknickt und nichts tut",nst:"Der Maschpark verbindet Neues Rathaus, Sprengel Museum und See.",nt:"Kostenlos. Sonntagmorgen ist die beste Zeit."},
  {id:16,n:"Sprengel Museum Garden — Maschsee",a:"Maschsee",v:["art","beautiful","free"],d:8,s:"The sculpture garden of the best modern art museum in Lower Saxony — free outdoors",st:"The Sprengel Museum holds one of the best 20th century art collections in Germany, including major Kurt Schwitters works. The outdoor sculpture garden is free.",im:"Time-travel: Kurt Schwitters in Hannover creating his first Merz collages, 1919",t:"Sculpture garden free. Museum has an entry fee.",c:["street_art"],r:"g",nn:"Sprengel Museum Garten — Maschsee",ns:"Der Skulpturengarten des besten modernen Kunstmuseums Niedersachsens — draußen kostenlos",nst:"Das Sprengel Museum hält eine der besten deutschen Sammlungen des 20. Jh., darunter große Kurt Schwitters Werke.",nt:"Skulpturengarten kostenlos. Museum kostenpflichtig."},
  {id:17,n:"Hannover Stadtwald — Eilenriede",a:"Eilenriede",v:["nature","free","hidden"],d:15,s:"The deep interior of the Eilenriede — old beech trees, wild areas, deer in the dawn",st:"Walking 20 minutes into the Eilenriede, the city disappears. The old beech forest has trees over 150 years old. Deer are common in the early morning.",im:"Time-travel: 19th century Hannover workers cutting timber in this same forest on royal permit, 1850",t:"Enter at Eilenrieder Weg. Dawn is when the deer are out.",c:["parks"],r:"g",nn:"Hannover Stadtwald — Eilenriede",ns:"Das tiefe Innere der Eilenriede — alte Buchen, wilde Bereiche, Rehe in der Morgendämmerung",nst:"20 Minuten in die Eilenriede gehen und die Stadt verschwindet.",nt:"Bei Eilenrieder Weg eintreten. Dämmerung ist wenn die Rehe raus sind."},
  {id:18,n:"Leineschloss Exterior — Altstadt",a:"Altstadt",v:["history","architecture"],d:5,s:"The former royal palace — now the Niedersachsen parliament, still with the Hanoverian kings\' portico",st:"The Leineschloss was the principal residence of the Kings of Hannover and the British royal family. After WWII, it became the state parliament. The Neoclassical portico (1817) by Laves is spectacular.",im:"Time-travel: Georg V, last King of Hannover, leaving this palace for the final time in 1866 as Prussia annexed the kingdom",t:"Exterior free. Parliamentary sessions sometimes public.",c:["history_big"],r:"g",nn:"Leineschloss Außen — Altstadt",ns:"Der ehemalige Königspalast — jetzt Niedersächsischer Landtag, noch mit dem Portikus der Hannoveraner Könige",nst:"Das Leineschloss war die Hauptresidenz der Könige von Hannover und des britischen Königshauses.",nt:"Außenbereich kostenlos. Parlamentssitzungen manchmal öffentlich."},
  {id:19,n:"Hannover Market Hall — Altstadt",a:"Altstadt",v:["local","food","beautiful"],d:5,s:"The 1890s market hall — the best place in Hannover to eat and watch and do nothing",st:"The Markthalle is a covered market from 1892, restored beautifully. Stalls selling Niedersachsen produce, flowers, bread, and prepared food. Come hungry at noon.",im:"Time-travel: the market hall on its opening day in 1892 — fish stalls, flower sellers, working Hannover",t:"Tue-Sat during market hours. Free to wander. Eat something.",c:["local_only"],r:"g",nn:"Hannover Markthalle — Altstadt",ns:"Die Markthalle der 1890er — der beste Ort in Hannover zum Essen, Beobachten und Nichtstun",nst:"Die Markthalle von 1892, wunderschön restauriert. Stände mit niedersächsischen Produkten.",nt:"Di-Sa während der Marktzeiten. Kostenlos zu erkunden. Etwas essen."},
  {id:20,n:"Tiergarten Hannover — Eilenriede",a:"Eilenriede",v:["nature","local","hidden"],d:10,s:"The old animal park within the Eilenriede — deer, wild boar, and forest calm",st:"A small section of the Eilenriede has been maintained as a semi-wild deer park since the 19th century. Deer approach the fence. Wild boar root nearby. Free to visit.",im:"Time-travel: royal hunting parties chasing deer in this park, the Eilenriede still the king\'s property, 1800",t:"Free. Enter from Am Tiergarten.",c:["parks"],r:"g",nn:"Tiergarten Hannover — Eilenriede",ns:"Der alte Tierpark in der Eilenriede — Rehe, Wildschweine und Waldruhe",nst:"Ein kleiner Teil der Eilenriede wird seit dem 19. Jh. als halbwildes Wildgehege gepflegt.",nt:"Kostenlos. Von Am Tiergarten eintreten."},
  {id:21,n:"Opernplatz — Altstadt",a:"Altstadt",v:["architecture","beautiful"],d:5,s:"The grand neo-Rococo opera house — the most beautiful 19th century building in Hannover",st:"The Staatsoper Hannover (1852) is a Neoclassical masterpiece. The square in front of it is where Hannover gathers for demonstrations and celebrations. The facade is always free to admire.",im:"Time-travel: the opera house opening night, 1852 — carriages and gas lamps in the square",t:"Free to view exterior. Guided tours on some Sundays.",c:["architecture"],r:"g",nn:"Opernplatz — Altstadt",ns:"Das große neorokoko Opernhaus — das schönste Gebäude des 19. Jh. in Hannover",nst:"Die Staatsoper Hannover (1852) ist ein neoklassisches Meisterwerk.",nt:"Außenbereich kostenlos zu besichtigen. Führungen an einigen Sonntagen."},
  {id:22,n:"Linden Mural Walk — Linden",a:"Linden",v:["street_art","local","hidden"],d:10,s:"Murals covering entire apartment buildings in Linden — political, enormous, constantly changing",st:"Linden has accumulated decades of large-scale political murals on the side walls of apartment buildings. Some are commissioned, some unsanctioned, all honest. A free outdoor gallery.",im:"Time-travel: activist painters working on a 6-storey wall mural overnight, Linden 1987",t:"Walk Schwarzer Bär and Deisterstraße. New murals appear each summer.",c:["street_art"],r:"g",nn:"Linden Wandbildweg — Linden",ns:"Wandbilder über ganze Wohngebäude in Linden — politisch, riesig, ständig wechselnd",nst:"Linden hat über Jahrzehnte großflächige politische Wandbilder auf Hauswänden angesammelt.",nt:"Schwarzer Bär und Deisterstraße abgehen. Neue Wandbilder erscheinen jeden Sommer."},
  {id:23,n:"Maschsee North Shore — Maschsee",a:"Maschsee",v:["beautiful","local","nature"],d:10,s:"The north shore of the Maschsee at dusk — the whole city reflected in still water",st:"As the sun sets over Hannover, the Maschsee north shore reflects the Neues Rathaus dome and the tree line in the water. Locals walk here every evening without thinking about it.",im:"Time-travel: first swimmers in the new Maschsee, 1936, disbelieving it was real",t:"Come at 7pm in summer. Free to walk the full circuit.",c:["romantic_water"],r:"g",nn:"Maschsee Nordfer — Maschsee",ns:"Das Nordufer des Maschsees in der Dämmerung — die ganze Stadt spiegelt sich im stillen Wasser",nst:"Bei Sonnenuntergang spiegelt das Nordufer des Maschsees die Kuppel des Neuen Rathauses im Wasser.",nt:"Im Sommer um 19 Uhr kommen. Den vollen Rundweg kostenlos gehen."},
  {id:24,n:"Hannover Zoo Perimeter — Eilenriede",a:"Eilenriede",v:["local","free","nature"],d:10,s:"The free walk around the zoo fence — hear the lions, watch the giraffes through the trees",st:"The Hannover Zoo is at the edge of the Eilenriede. The forest path around the perimeter is free and very close to the animal enclosures. Giraffes are visible through the fence from the path.",im:"Time-travel: the zoo opening in 1865, Hannover citizens seeing their first elephant",t:"The path is always free. Best early morning.",c:["parks"],r:"g",nn:"Hannover Zoo Umgehungsweg — Eilenriede",ns:"Der kostenlose Weg um den Zaun des Zoos — Löwen hören, Giraffen durch die Bäume sehen",nst:"Der Hannover Zoo liegt am Rand der Eilenriede. Der Waldweg um den Umfang ist kostenlos.",nt:"Der Weg ist immer kostenlos. Am besten früh morgens."},
  {id:25,n:"Friederikenplatz — Altstadt",a:"Altstadt",v:["history","quiet"],d:5,s:"The square outside the opera — where Hannover gathers for demonstration and celebration equally",st:"Hannover has a tradition of large peaceful demonstrations and this square has seen them all — anti-nuclear in the 1980s, anti-war, pro-refugee. The political memory of the square is part of its character.",im:"Time-travel: 400,000 people filling this square and the streets around it in the 1980s anti-nuclear protests",t:"Free. The pedestrian area around it is the social heart of the city.",c:["local_only"],r:"g",nn:"Friederikenplatz — Altstadt",ns:"Der Platz vor der Oper — wo Hannover gleichsam für Demos und Feiern zusammenkommt",nst:"Hannover hat eine Tradition friedlicher Großdemos, und dieser Platz hat alle gesehen.",nt:"Kostenlos. Der Fußgängerbereich drum herum ist das soziale Herz der Stadt."},
  {id:26,n:"Herrenhäuser Gärten — Herrenhausen #26",a:"Herrenhausen",v:["nature","beautiful","history"],d:45,s:"Baroque garden of the Hanoverian kings — labyrinths, fountains, Europe\'s tallest garden fountain",st:"The Große Garten was the pleasure ground of the British royal house when they also ruled Hanover. The tallest garden fountain in Europe (82m) shoots every day in summer. The hedge maze is original 1674.",im:"Time-travel: Georg I of England inspecting his Hannover gardens before sailing to London, 1714",t:"The gardens are paid. The surrounding park areas and Bergpark are free.",c:["history_big"],r:"g",nn:"Herrenhäuser Gärten — Herrenhausen #26",ns:"Barockgarten der hannoverschen Könige — Labyrinthe, Fontänen, Europas höchster Gartenbrunnen",nst:"Der Große Garten war das Vergnügungsgelände des britischen Königshauses als es auch Hannover regierte.",nt:"Die Gärten sind kostenpflichtig. Umgebende Parkbereiche und Bergpark kostenlos."},
  {id:27,n:"Georgengarten — Herrenhausen #27",a:"Herrenhausen",v:["nature","beautiful","free"],d:12,s:"English landscape garden free to enter — the forgotten half of Herrenhausen",st:"The Georgengarten connects Herrenhausen to the city and is completely free. English style — rolling meadows, old trees, ponds. It\'s as beautiful as the formal gardens next door.",im:"Time-travel: Hanoverian aristocrats taking their morning ride through this park, 1780",t:"Always free. Enter from Nienburger Straße. No crowds.",c:["high_spots"],r:"g",nn:"Georgengarten — Herrenhausen #27",ns:"Englischer Landschaftspark frei zugänglich — die vergessene Hälfte von Herrenhausen",nst:"Der Georgengarten verbindet Herrenhausen mit der Stadt und ist völlig kostenlos.",nt:"Immer kostenlos. Von der Nienburger Straße eintreten. Keine Menschenmassen."},
  {id:28,n:"Maschsee Lake — Maschsee #28",a:"Maschsee",v:["nature","beautiful","local"],d:6,s:"The city lake built by unemployed workers in the 1930s — now the living room of Hannover",st:"The Maschsee was constructed between 1934 and 1936 by thousands of unemployed Hanoverians in an emergency employment programme. 2.4 km long, it sits in the city centre and costs nothing.",im:"Time-travel: unemployed workers digging the Maschsee basin with shovels in 1934",t:"Walk the full circuit (6km) or rent a boat. Always free to walk.",c:["parks"],r:"g",nn:"Maschsee — Maschsee #28",ns:"Der Stadtsee, von Arbeitslosen in den 1930ern erbaut — jetzt das Wohnzimmer Hannovers",nst:"Der Maschsee wurde 1934–36 von Tausenden arbeitslosen Hannoveranern gebaut.",nt:"Den vollen Rundweg (6km) gehen oder ein Boot mieten. Zu Fuß immer kostenlos."},
  {id:29,n:"Aegidienkirche War Memorial — Altstadt #29",a:"Altstadt",v:["history","quiet","weird"],d:52,s:"A bombed church left as a ruin — the open sky where the roof was is the memorial",st:"The Aegidienkirche was destroyed in a single RAF raid in October 1943. The decision was made not to rebuild it but to leave it as an anti-war memorial. A bell from Hiroshima hangs inside.",im:"Time-travel: the night of October 8 1943 — firestorm over Hannover, the church burning",t:"Free to enter the ruins. The Hiroshima bell rings each year on August 6.",c:["courtyards"],r:"g",nn:"Aegidienkirche Kriegsmahnmal — Altstadt #29",ns:"Eine zerbombte Kirche als Ruine belassen — der offene Himmel wo das Dach war ist das Mahnmal",nst:"Die Aegidienkirche wurde in einem einzigen RAF-Angriff im Oktober 1943 zerstört. Beschluss sie als Mahnmal zu belassen.",nt:"Ruinen kostenlos zu betreten. Die Hiroshima-Glocke läutet jedes Jahr am 6. August."},
  {id:30,n:"Eilenriede City Forest — Eilenriede #30",a:"Eilenriede",v:["nature","free","quiet"],d:22,s:"650 hectares of beech forest in the city — Europe\'s largest inner-city forest",st:"The Eilenriede has protected Hannover from its own expansion since 1331. Almost 700 hectares of beech and oak within the city limits. Wild deer still live here. Free at all times.",im:"Time-travel: Hanoverian children picking mushrooms in this forest on autumn Sundays, 1910",t:"Enter at any point. The forest roads are car-free and free forever.",c:["romantic_water"],r:"g",nn:"Eilenriede Stadtwald — Eilenriede #30",ns:"650 Hektar Buchenwald in der Stadt — Europas größter innerstädtischer Wald",nst:"Die Eilenriede schützt Hannover seit 1331 vor seiner eigenen Expansion.",nt:"An beliebiger Stelle eintreten. Die Waldwege sind autofrei und ewig kostenlos."},
  {id:31,n:"Waterloo Column — Altstadt #31",a:"Altstadt",v:["history","beautiful"],d:20,s:"A 40-metre victory column celebrating the Battle of Waterloo — built 1832",st:"Hannover contributed troops to the Battle of Waterloo against Napoleon. This column, inspired by Trajan\'s Column in Rome, lists every Hanoverian soldier who died there.",im:"Time-travel: Hanoverian veterans of Waterloo gathering at this column on the first anniversary, 1816",t:"Free to approach. The view from the surrounding park is excellent.",c:["scary"],r:"g",nn:"Waterloosäule — Altstadt #31",ns:"Eine 40 Meter hohe Siegessäule für die Waterlooschlacht — 1832 erbaut",nst:"Hannover stellte Truppen für die Waterlooschlacht. Diese Säule nennt jeden gefallenen Hannoveraner.",nt:"Kostenlos zu besichtigen. Der Blick vom umliegenden Park ist ausgezeichnet."},
  {id:32,n:"Neues Rathaus Dome — Altstadt #32",a:"Altstadt",v:["beautiful","history","high_spots"],d:19,s:"The 1913 town hall with a slanted lift — worth it for the model of Hannover before WWII",st:"The Neues Rathaus has a unique curved lift to the dome. Inside: four scale models of Hannover from 1689, 1939, 1945 (destroyed), and today. The model of the bombed city in 1945 is the most important.",im:"Time-travel: the dome observation gallery in 1939, the city below still intact",t:"Free to enter the ground floor with the city models. Lift to dome: small fee.",c:["famous_dead"],r:"g",nn:"Neues Rathaus Kuppel — Altstadt #32",ns:"Das Rathaus von 1913 mit einem schrägen Aufzug — lohnenswert für das Modell Hannovers vor WWII",nst:"Das Neue Rathaus hat einen einzigartigen Kurvenaufzug zur Kuppel. Vier Stadtmodelle von 1689, 1939, 1945, heute.",nt:"Erdgeschoss mit Stadtmodellen kostenlos. Kuppelaufzug kleiner Eintritt."},
  {id:33,n:"Old Town Half-Timbered Quarter — Altstadt #33",a:"Altstadt",v:["history","beautiful"],d:13,s:"The restored half-timbered houses of the Altstadt — 90% destroyed in WWII, rebuilt exactly",st:"Hannover\'s Altstadt was 90% destroyed in 1943. The city made the extraordinary decision to rebuild the half-timbered houses exactly as they were. Walk it knowing the stones are new but the forms are 400 years old.",im:"Time-travel: architects working from pre-war photographs to rebuild these houses in 1952",t:"Free to walk. Marktkirche is inside and free.",c:["street_art"],r:"g",nn:"Fachwerkquartier Altstadt — Altstadt #33",ns:"Die restaurierten Fachwerkhäuser der Altstadt — 90% im WWII zerstört, exakt wiederaufgebaut",nst:"Hannovers Altstadt wurde 1943 zu 90% zerstört. Die Stadt entschied, die Häuser exakt wiederaufzubauen.",nt:"Kostenlos zu gehen. Marktkirche ist innen und kostenlos."},
  {id:34,n:"Linden Alternative Quarter — Linden #34",a:"Linden",v:["local","hidden","beautiful"],d:52,s:"Hannover\'s leftist, alternative quarter — murals, organic markets, protest posters, real life",st:"Linden was a working-class area that became politically radical in the 1970s and stayed that way. The best food market in Hannover is here (Lindener Markt, Wednesday and Saturday). Community, not tourists.",im:"Time-travel: Linden factory workers becoming political activists, 1920, this same neighbourhood",t:"Wednesday and Saturday market in Lindener Markt. Everything is real.",c:["abandoned"],r:"g",nn:"Linden Alternativviertel — Linden #34",ns:"Hannovers linkes, alternatives Viertel — Wandbilder, Biomärkte, Protestplakate, echtes Leben",nst:"Linden war ein Arbeiterbezirk, der in den 1970ern politisch radikal wurde und so blieb.",nt:"Mittwoch und Samstag Markt auf dem Lindener Markt. Alles ist echt."},
  {id:35,n:"Marktkirche Interior — Altstadt #35",a:"Altstadt",v:["history","beautiful"],d:11,s:"The great Gothic church of Hannover — rebuilt after 1943 with original medieval bricks salvaged",st:"The Marktkirche is the oldest church in the city, dating from the 14th century. After 1943 it was rebuilt using every original brick that could be salvaged. The interior has beautiful modern glass.",im:"Time-travel: citizens sifting through the rubble in 1945, saving every original brick by hand",t:"Free to enter. The modern glass windows are extraordinary.",c:["free_museum"],r:"g",nn:"Marktkirche Innen — Altstadt #35",ns:"Die große gotische Kirche Hannovers — nach 1943 mit geretteten mittelalterlichen Originalbausteinen wiederaufgebaut",nst:"Die Marktkirche ist die älteste Kirche der Stadt aus dem 14. Jh. 1943 mit jedem retten Originalziegel wiederaufgebaut.",nt:"Kostenlos zu betreten. Die modernen Glasfenster sind außergewöhnlich."},
  {id:36,n:"Bergpark Herrenhausen — Herrenhausen #36",a:"Herrenhausen",v:["nature","free","quiet"],d:48,s:"Cascading terraces and artificial waterfalls on the hill behind the formal gardens — all free",st:"The Bergpark is the wild older sibling of the formal Herrenhäuser Gärten. Wooded hillside, cascading water features, and the Leibniztempel. All free. All beautiful.",im:"Time-travel: Hanoverian courtiers escaping the formality of the palace gardens for this wilder hill, 1730",t:"Enter from Georgengarten. Always free.",c:["local_only"],r:"g",nn:"Bergpark Herrenhausen — Herrenhausen #36",ns:"Terrassen und künstliche Wasserfälle auf dem Hügel hinter den formalen Gärten — alle kostenlos",nst:"Der Bergpark ist das wilde ältere Geschwister der formalen Herrenhäuser Gärten.",nt:"Von Georgengarten eintreten. Immer kostenlos."},
  {id:37,n:"Leibniztempel — Herrenhausen #37",a:"Herrenhausen",v:["history","hidden","quiet"],d:52,s:"The temple commemorating Gottfried Wilhelm Leibniz — the philosopher who invented calculus invented here",st:"Leibniz spent 40 years in Hannover as court librarian and advisor. He invented calculus (before and independently of Newton), binary numbers, and much of modern logic. This small temple honours him in the Georgengarten.",im:"Time-travel: Leibniz writing his papers in a Hannover study, simultaneously inventing calculus and binary code, 1690",t:"Free. Always open.",c:["architecture"],r:"g",nn:"Leibniztempel — Herrenhausen #37",ns:"Der Tempel zu Ehren von Gottfried Wilhelm Leibniz — dem Philosophen, der die Infinitesimalrechnung hier erfand",nst:"Leibniz verbrachte 40 Jahre in Hannover als Hofbibliothekar. Er erfand Infinitesimalrechnung (vor Newton).",nt:"Kostenlos. Immer geöffnet."},
  {id:38,n:"Ihme Zentrum — Linden #38",a:"Linden",v:["weird","hidden","history"],d:39,s:"The failed utopian brutalist mega-complex — a whole city in one building, now slowly dying",st:"Built in 1975 as a self-contained mixed-use utopia, Ihme Zentrum failed commercially almost immediately. The shopping centre is half-empty. The residential towers leak. An architectural tragedy worth seeing.",im:"Time-travel: the opening of Ihme Zentrum in 1975, politicians cutting ribbon, crowds filing in optimistically",t:"Walk through the public ground floor. Free to explore the exterior.",c:["history_big"],r:"g",nn:"Ihme Zentrum — Linden #38",ns:"Der gescheiterte utopische Brutalismus-Megakomplex — eine ganze Stadt in einem Gebäude, jetzt langsam sterbend",nst:"1975 als autarke gemischte Nutzung gebaut. Kommerziell fast sofort gescheitert.",nt:"Durch das öffentliche Erdgeschoss gehen. Außenbereich kostenlos erkunden."},
  {id:39,n:"Kronenbrücke Canal Walk — Linden #39",a:"Linden",v:["nature","local","quiet"],d:10,s:"The hidden canal walk through Linden — industrial heritage, barge traffic, working waterway",st:"The Stichkanal runs through Linden carrying commercial barge traffic. The canal banks have been opened as a walking and cycling path. Industrial heritage meets urban nature.",im:"Time-travel: barges delivering coal to the Linden factories along this canal, 1920",t:"Free. Walk from the Kronenbrücke south along the canal.",c:["high_spots"],r:"g",nn:"Kronenbrücke Kanalweg — Linden #39",ns:"Der versteckte Kanalweg durch Linden — Industrieerbe, Lastkähne, arbeitender Wasserweg",nst:"Der Stichkanal fließt durch Linden und trägt gewerblichen Kahnverkehr.",nt:"Kostenlos. Von der Kronenbrücke nach Süden entlang des Kanals gehen."},
  {id:40,n:"Maschpark — Maschsee #40",a:"Maschsee",v:["nature","local"],d:42,s:"The park between the Maschsee and the city — where Hannover jogs, picnics, and does nothing",st:"The Maschpark connects the new town hall, the Sprengel Museum and the lake. On Sunday mornings it is the most active free space in the city — runners, families, dogs.",im:"Time-travel: post-war Hannover citizens walking here to forget the ruins, 1950",t:"Free. Sunday morning is the best time.",c:["parks"],r:"g",nn:"Maschpark — Maschsee #40",ns:"Der Park zwischen dem Maschsee und der Stadt — wo Hannover joggt, picknickt und nichts tut",nst:"Der Maschpark verbindet Neues Rathaus, Sprengel Museum und See.",nt:"Kostenlos. Sonntagmorgen ist die beste Zeit."},
  {id:41,n:"Sprengel Museum Garden — Maschsee #41",a:"Maschsee",v:["art","beautiful","free"],d:32,s:"The sculpture garden of the best modern art museum in Lower Saxony — free outdoors",st:"The Sprengel Museum holds one of the best 20th century art collections in Germany, including major Kurt Schwitters works. The outdoor sculpture garden is free.",im:"Time-travel: Kurt Schwitters in Hannover creating his first Merz collages, 1919",t:"Sculpture garden free. Museum has an entry fee.",c:["courtyards"],r:"g",nn:"Sprengel Museum Garten — Maschsee #41",ns:"Der Skulpturengarten des besten modernen Kunstmuseums Niedersachsens — draußen kostenlos",nst:"Das Sprengel Museum hält eine der besten deutschen Sammlungen des 20. Jh., darunter große Kurt Schwitters Werke.",nt:"Skulpturengarten kostenlos. Museum kostenpflichtig."},
  {id:42,n:"Hannover Stadtwald — Eilenriede #42",a:"Eilenriede",v:["nature","free","hidden"],d:7,s:"The deep interior of the Eilenriede — old beech trees, wild areas, deer in the dawn",st:"Walking 20 minutes into the Eilenriede, the city disappears. The old beech forest has trees over 150 years old. Deer are common in the early morning.",im:"Time-travel: 19th century Hannover workers cutting timber in this same forest on royal permit, 1850",t:"Enter at Eilenrieder Weg. Dawn is when the deer are out.",c:["romantic_water"],r:"g",nn:"Hannover Stadtwald — Eilenriede #42",ns:"Das tiefe Innere der Eilenriede — alte Buchen, wilde Bereiche, Rehe in der Morgendämmerung",nst:"20 Minuten in die Eilenriede gehen und die Stadt verschwindet.",nt:"Bei Eilenrieder Weg eintreten. Dämmerung ist wenn die Rehe raus sind."},
  {id:43,n:"Leineschloss Exterior — Altstadt #43",a:"Altstadt",v:["history","architecture"],d:6,s:"The former royal palace — now the Niedersachsen parliament, still with the Hanoverian kings\' portico",st:"The Leineschloss was the principal residence of the Kings of Hannover and the British royal family. After WWII, it became the state parliament. The Neoclassical portico (1817) by Laves is spectacular.",im:"Time-travel: Georg V, last King of Hannover, leaving this palace for the final time in 1866 as Prussia annexed the kingdom",t:"Exterior free. Parliamentary sessions sometimes public.",c:["scary"],r:"g",nn:"Leineschloss Außen — Altstadt #43",ns:"Der ehemalige Königspalast — jetzt Niedersächsischer Landtag, noch mit dem Portikus der Hannoveraner Könige",nst:"Das Leineschloss war die Hauptresidenz der Könige von Hannover und des britischen Königshauses.",nt:"Außenbereich kostenlos. Parlamentssitzungen manchmal öffentlich."},
  {id:44,n:"Hannover Market Hall — Altstadt #44",a:"Altstadt",v:["local","food","beautiful"],d:10,s:"The 1890s market hall — the best place in Hannover to eat and watch and do nothing",st:"The Markthalle is a covered market from 1892, restored beautifully. Stalls selling Niedersachsen produce, flowers, bread, and prepared food. Come hungry at noon.",im:"Time-travel: the market hall on its opening day in 1892 — fish stalls, flower sellers, working Hannover",t:"Tue-Sat during market hours. Free to wander. Eat something.",c:["famous_dead"],r:"g",nn:"Hannover Markthalle — Altstadt #44",ns:"Die Markthalle der 1890er — der beste Ort in Hannover zum Essen, Beobachten und Nichtstun",nst:"Die Markthalle von 1892, wunderschön restauriert. Stände mit niedersächsischen Produkten.",nt:"Di-Sa während der Marktzeiten. Kostenlos zu erkunden. Etwas essen."},
  {id:45,n:"Tiergarten Hannover — Eilenriede #45",a:"Eilenriede",v:["nature","local","hidden"],d:18,s:"The old animal park within the Eilenriede — deer, wild boar, and forest calm",st:"A small section of the Eilenriede has been maintained as a semi-wild deer park since the 19th century. Deer approach the fence. Wild boar root nearby. Free to visit.",im:"Time-travel: royal hunting parties chasing deer in this park, the Eilenriede still the king\'s property, 1800",t:"Free. Enter from Am Tiergarten.",c:["street_art"],r:"g",nn:"Tiergarten Hannover — Eilenriede #45",ns:"Der alte Tierpark in der Eilenriede — Rehe, Wildschweine und Waldruhe",nst:"Ein kleiner Teil der Eilenriede wird seit dem 19. Jh. als halbwildes Wildgehege gepflegt.",nt:"Kostenlos. Von Am Tiergarten eintreten."},
  {id:46,n:"Opernplatz — Altstadt #46",a:"Altstadt",v:["architecture","beautiful"],d:19,s:"The grand neo-Rococo opera house — the most beautiful 19th century building in Hannover",st:"The Staatsoper Hannover (1852) is a Neoclassical masterpiece. The square in front of it is where Hannover gathers for demonstrations and celebrations. The facade is always free to admire.",im:"Time-travel: the opera house opening night, 1852 — carriages and gas lamps in the square",t:"Free to view exterior. Guided tours on some Sundays.",c:["abandoned"],r:"g",nn:"Opernplatz — Altstadt #46",ns:"Das große neorokoko Opernhaus — das schönste Gebäude des 19. Jh. in Hannover",nst:"Die Staatsoper Hannover (1852) ist ein neoklassisches Meisterwerk.",nt:"Außenbereich kostenlos zu besichtigen. Führungen an einigen Sonntagen."},

  {id:48,n:"Maschsee North Shore — Maschsee #48",a:"Maschsee",v:["beautiful","local","nature"],d:43,s:"The north shore of the Maschsee at dusk — the whole city reflected in still water",st:"As the sun sets over Hannover, the Maschsee north shore reflects the Neues Rathaus dome and the tree line in the water. Locals walk here every evening without thinking about it.",im:"Time-travel: first swimmers in the new Maschsee, 1936, disbelieving it was real",t:"Come at 7pm in summer. Free to walk the full circuit.",c:["local_only"],r:"g",nn:"Maschsee Nordfer — Maschsee #48",ns:"Das Nordufer des Maschsees in der Dämmerung — die ganze Stadt spiegelt sich im stillen Wasser",nst:"Bei Sonnenuntergang spiegelt das Nordufer des Maschsees die Kuppel des Neuen Rathauses im Wasser.",nt:"Im Sommer um 19 Uhr kommen. Den vollen Rundweg kostenlos gehen."},
  {id:49,n:"Hannover Zoo Perimeter — Eilenriede #49",a:"Eilenriede",v:["local","free","nature"],d:6,s:"The free walk around the zoo fence — hear the lions, watch the giraffes through the trees",st:"The Hannover Zoo is at the edge of the Eilenriede. The forest path around the perimeter is free and very close to the animal enclosures. Giraffes are visible through the fence from the path.",im:"Time-travel: the zoo opening in 1865, Hannover citizens seeing their first elephant",t:"The path is always free. Best early morning.",c:["architecture"],r:"g",nn:"Hannover Zoo Umgehungsweg — Eilenriede #49",ns:"Der kostenlose Weg um den Zaun des Zoos — Löwen hören, Giraffen durch die Bäume sehen",nst:"Der Hannover Zoo liegt am Rand der Eilenriede. Der Waldweg um den Umfang ist kostenlos.",nt:"Der Weg ist immer kostenlos. Am besten früh morgens."},
  {id:50,n:"Friederikenplatz — Altstadt #50",a:"Altstadt",v:["history","quiet"],d:40,s:"The square outside the opera — where Hannover gathers for demonstration and celebration equally",st:"Hannover has a tradition of large peaceful demonstrations and this square has seen them all — anti-nuclear in the 1980s, anti-war, pro-refugee. The political memory of the square is part of its character.",im:"Time-travel: 400,000 people filling this square and the streets around it in the 1980s anti-nuclear protests",t:"Free. The pedestrian area around it is the social heart of the city.",c:["history_big"],r:"g",nn:"Friederikenplatz — Altstadt #50",ns:"Der Platz vor der Oper — wo Hannover gleichsam für Demos und Feiern zusammenkommt",nst:"Hannover hat eine Tradition friedlicher Großdemos, und dieser Platz hat alle gesehen.",nt:"Kostenlos. Der Fußgängerbereich drum herum ist das soziale Herz der Stadt."},
  {id:51,n:"Herrenhäuser Gärten — Herrenhausen #51",a:"Herrenhausen",v:["nature","beautiful","history"],d:17,s:"Baroque garden of the Hanoverian kings — labyrinths, fountains, Europe\'s tallest garden fountain",st:"The Große Garten was the pleasure ground of the British royal house when they also ruled Hanover. The tallest garden fountain in Europe (82m) shoots every day in summer. The hedge maze is original 1674.",im:"Time-travel: Georg I of England inspecting his Hannover gardens before sailing to London, 1714",t:"The gardens are paid. The surrounding park areas and Bergpark are free.",c:["high_spots"],r:"g",nn:"Herrenhäuser Gärten — Herrenhausen #51",ns:"Barockgarten der hannoverschen Könige — Labyrinthe, Fontänen, Europas höchster Gartenbrunnen",nst:"Der Große Garten war das Vergnügungsgelände des britischen Königshauses als es auch Hannover regierte.",nt:"Die Gärten sind kostenpflichtig. Umgebende Parkbereiche und Bergpark kostenlos."},
  {id:52,n:"Georgengarten — Herrenhausen #52",a:"Herrenhausen",v:["nature","beautiful","free"],d:50,s:"English landscape garden free to enter — the forgotten half of Herrenhausen",st:"The Georgengarten connects Herrenhausen to the city and is completely free. English style — rolling meadows, old trees, ponds. It\'s as beautiful as the formal gardens next door.",im:"Time-travel: Hanoverian aristocrats taking their morning ride through this park, 1780",t:"Always free. Enter from Nienburger Straße. No crowds.",c:["parks"],r:"g",nn:"Georgengarten — Herrenhausen #52",ns:"Englischer Landschaftspark frei zugänglich — die vergessene Hälfte von Herrenhausen",nst:"Der Georgengarten verbindet Herrenhausen mit der Stadt und ist völlig kostenlos.",nt:"Immer kostenlos. Von der Nienburger Straße eintreten. Keine Menschenmassen."},
  {id:53,n:"Maschsee Lake — Maschsee #53",a:"Maschsee",v:["nature","beautiful","local"],d:46,s:"The city lake built by unemployed workers in the 1930s — now the living room of Hannover",st:"The Maschsee was constructed between 1934 and 1936 by thousands of unemployed Hanoverians in an emergency employment programme. 2.4 km long, it sits in the city centre and costs nothing.",im:"Time-travel: unemployed workers digging the Maschsee basin with shovels in 1934",t:"Walk the full circuit (6km) or rent a boat. Always free to walk.",c:["courtyards"],r:"g",nn:"Maschsee — Maschsee #53",ns:"Der Stadtsee, von Arbeitslosen in den 1930ern erbaut — jetzt das Wohnzimmer Hannovers",nst:"Der Maschsee wurde 1934–36 von Tausenden arbeitslosen Hannoveranern gebaut.",nt:"Den vollen Rundweg (6km) gehen oder ein Boot mieten. Zu Fuß immer kostenlos."},
  {id:54,n:"Aegidienkirche War Memorial — Altstadt #54",a:"Altstadt",v:["history","quiet","weird"],d:49,s:"A bombed church left as a ruin — the open sky where the roof was is the memorial",st:"The Aegidienkirche was destroyed in a single RAF raid in October 1943. The decision was made not to rebuild it but to leave it as an anti-war memorial. A bell from Hiroshima hangs inside.",im:"Time-travel: the night of October 8 1943 — firestorm over Hannover, the church burning",t:"Free to enter the ruins. The Hiroshima bell rings each year on August 6.",c:["romantic_water"],r:"g",nn:"Aegidienkirche Kriegsmahnmal — Altstadt #54",ns:"Eine zerbombte Kirche als Ruine belassen — der offene Himmel wo das Dach war ist das Mahnmal",nst:"Die Aegidienkirche wurde in einem einzigen RAF-Angriff im Oktober 1943 zerstört. Beschluss sie als Mahnmal zu belassen.",nt:"Ruinen kostenlos zu betreten. Die Hiroshima-Glocke läutet jedes Jahr am 6. August."},
  {id:55,n:"Eilenriede City Forest — Eilenriede #55",a:"Eilenriede",v:["nature","free","quiet"],d:39,s:"650 hectares of beech forest in the city — Europe\'s largest inner-city forest",st:"The Eilenriede has protected Hannover from its own expansion since 1331. Almost 700 hectares of beech and oak within the city limits. Wild deer still live here. Free at all times.",im:"Time-travel: Hanoverian children picking mushrooms in this forest on autumn Sundays, 1910",t:"Enter at any point. The forest roads are car-free and free forever.",c:["scary"],r:"g",nn:"Eilenriede Stadtwald — Eilenriede #55",ns:"650 Hektar Buchenwald in der Stadt — Europas größter innerstädtischer Wald",nst:"Die Eilenriede schützt Hannover seit 1331 vor seiner eigenen Expansion.",nt:"An beliebiger Stelle eintreten. Die Waldwege sind autofrei und ewig kostenlos."},
  {id:56,n:"Waterloo Column — Altstadt #56",a:"Altstadt",v:["history","beautiful"],d:31,s:"A 40-metre victory column celebrating the Battle of Waterloo — built 1832",st:"Hannover contributed troops to the Battle of Waterloo against Napoleon. This column, inspired by Trajan\'s Column in Rome, lists every Hanoverian soldier who died there.",im:"Time-travel: Hanoverian veterans of Waterloo gathering at this column on the first anniversary, 1816",t:"Free to approach. The view from the surrounding park is excellent.",c:["famous_dead"],r:"g",nn:"Waterloosäule — Altstadt #56",ns:"Eine 40 Meter hohe Siegessäule für die Waterlooschlacht — 1832 erbaut",nst:"Hannover stellte Truppen für die Waterlooschlacht. Diese Säule nennt jeden gefallenen Hannoveraner.",nt:"Kostenlos zu besichtigen. Der Blick vom umliegenden Park ist ausgezeichnet."},
  {id:57,n:"Neues Rathaus Dome — Altstadt #57",a:"Altstadt",v:["beautiful","history","high_spots"],d:19,s:"The 1913 town hall with a slanted lift — worth it for the model of Hannover before WWII",st:"The Neues Rathaus has a unique curved lift to the dome. Inside: four scale models of Hannover from 1689, 1939, 1945 (destroyed), and today. The model of the bombed city in 1945 is the most important.",im:"Time-travel: the dome observation gallery in 1939, the city below still intact",t:"Free to enter the ground floor with the city models. Lift to dome: small fee.",c:["street_art"],r:"g",nn:"Neues Rathaus Kuppel — Altstadt #57",ns:"Das Rathaus von 1913 mit einem schrägen Aufzug — lohnenswert für das Modell Hannovers vor WWII",nst:"Das Neue Rathaus hat einen einzigartigen Kurvenaufzug zur Kuppel. Vier Stadtmodelle von 1689, 1939, 1945, heute.",nt:"Erdgeschoss mit Stadtmodellen kostenlos. Kuppelaufzug kleiner Eintritt."},
  {id:58,n:"Old Town Half-Timbered Quarter — Altstadt #58",a:"Altstadt",v:["history","beautiful"],d:33,s:"The restored half-timbered houses of the Altstadt — 90% destroyed in WWII, rebuilt exactly",st:"Hannover\'s Altstadt was 90% destroyed in 1943. The city made the extraordinary decision to rebuild the half-timbered houses exactly as they were. Walk it knowing the stones are new but the forms are 400 years old.",im:"Time-travel: architects working from pre-war photographs to rebuild these houses in 1952",t:"Free to walk. Marktkirche is inside and free.",c:["abandoned"],r:"g",nn:"Fachwerkquartier Altstadt — Altstadt #58",ns:"Die restaurierten Fachwerkhäuser der Altstadt — 90% im WWII zerstört, exakt wiederaufgebaut",nst:"Hannovers Altstadt wurde 1943 zu 90% zerstört. Die Stadt entschied, die Häuser exakt wiederaufzubauen.",nt:"Kostenlos zu gehen. Marktkirche ist innen und kostenlos."},
  {id:59,n:"Linden Alternative Quarter — Linden #59",a:"Linden",v:["local","hidden","beautiful"],d:42,s:"Hannover\'s leftist, alternative quarter — murals, organic markets, protest posters, real life",st:"Linden was a working-class area that became politically radical in the 1970s and stayed that way. The best food market in Hannover is here (Lindener Markt, Wednesday and Saturday). Community, not tourists.",im:"Time-travel: Linden factory workers becoming political activists, 1920, this same neighbourhood",t:"Wednesday and Saturday market in Lindener Markt. Everything is real.",c:["free_museum"],r:"g",nn:"Linden Alternativviertel — Linden #59",ns:"Hannovers linkes, alternatives Viertel — Wandbilder, Biomärkte, Protestplakate, echtes Leben",nst:"Linden war ein Arbeiterbezirk, der in den 1970ern politisch radikal wurde und so blieb.",nt:"Mittwoch und Samstag Markt auf dem Lindener Markt. Alles ist echt."},
  {id:60,n:"Marktkirche Interior — Altstadt #60",a:"Altstadt",v:["history","beautiful"],d:22,s:"The great Gothic church of Hannover — rebuilt after 1943 with original medieval bricks salvaged",st:"The Marktkirche is the oldest church in the city, dating from the 14th century. After 1943 it was rebuilt using every original brick that could be salvaged. The interior has beautiful modern glass.",im:"Time-travel: citizens sifting through the rubble in 1945, saving every original brick by hand",t:"Free to enter. The modern glass windows are extraordinary.",c:["local_only"],r:"g",nn:"Marktkirche Innen — Altstadt #60",ns:"Die große gotische Kirche Hannovers — nach 1943 mit geretteten mittelalterlichen Originalbausteinen wiederaufgebaut",nst:"Die Marktkirche ist die älteste Kirche der Stadt aus dem 14. Jh. 1943 mit jedem retten Originalziegel wiederaufgebaut.",nt:"Kostenlos zu betreten. Die modernen Glasfenster sind außergewöhnlich."},
  {id:61,n:"Bergpark Herrenhausen — Herrenhausen #61",a:"Herrenhausen",v:["nature","free","quiet"],d:5,s:"Cascading terraces and artificial waterfalls on the hill behind the formal gardens — all free",st:"The Bergpark is the wild older sibling of the formal Herrenhäuser Gärten. Wooded hillside, cascading water features, and the Leibniztempel. All free. All beautiful.",im:"Time-travel: Hanoverian courtiers escaping the formality of the palace gardens for this wilder hill, 1730",t:"Enter from Georgengarten. Always free.",c:["architecture"],r:"g",nn:"Bergpark Herrenhausen — Herrenhausen #61",ns:"Terrassen und künstliche Wasserfälle auf dem Hügel hinter den formalen Gärten — alle kostenlos",nst:"Der Bergpark ist das wilde ältere Geschwister der formalen Herrenhäuser Gärten.",nt:"Von Georgengarten eintreten. Immer kostenlos."},
  {id:62,n:"Leibniztempel — Herrenhausen #62",a:"Herrenhausen",v:["history","hidden","quiet"],d:53,s:"The temple commemorating Gottfried Wilhelm Leibniz — the philosopher who invented calculus invented here",st:"Leibniz spent 40 years in Hannover as court librarian and advisor. He invented calculus (before and independently of Newton), binary numbers, and much of modern logic. This small temple honours him in the Georgengarten.",im:"Time-travel: Leibniz writing his papers in a Hannover study, simultaneously inventing calculus and binary code, 1690",t:"Free. Always open.",c:["history_big"],r:"g",nn:"Leibniztempel — Herrenhausen #62",ns:"Der Tempel zu Ehren von Gottfried Wilhelm Leibniz — dem Philosophen, der die Infinitesimalrechnung hier erfand",nst:"Leibniz verbrachte 40 Jahre in Hannover als Hofbibliothekar. Er erfand Infinitesimalrechnung (vor Newton).",nt:"Kostenlos. Immer geöffnet."},
  {id:63,n:"Ihme Zentrum — Linden #63",a:"Linden",v:["weird","hidden","history"],d:15,s:"The failed utopian brutalist mega-complex — a whole city in one building, now slowly dying",st:"Built in 1975 as a self-contained mixed-use utopia, Ihme Zentrum failed commercially almost immediately. The shopping centre is half-empty. The residential towers leak. An architectural tragedy worth seeing.",im:"Time-travel: the opening of Ihme Zentrum in 1975, politicians cutting ribbon, crowds filing in optimistically",t:"Walk through the public ground floor. Free to explore the exterior.",c:["high_spots"],r:"g",nn:"Ihme Zentrum — Linden #63",ns:"Der gescheiterte utopische Brutalismus-Megakomplex — eine ganze Stadt in einem Gebäude, jetzt langsam sterbend",nst:"1975 als autarke gemischte Nutzung gebaut. Kommerziell fast sofort gescheitert.",nt:"Durch das öffentliche Erdgeschoss gehen. Außenbereich kostenlos erkunden."},
  {id:64,n:"Kronenbrücke Canal Walk — Linden #64",a:"Linden",v:["nature","local","quiet"],d:49,s:"The hidden canal walk through Linden — industrial heritage, barge traffic, working waterway",st:"The Stichkanal runs through Linden carrying commercial barge traffic. The canal banks have been opened as a walking and cycling path. Industrial heritage meets urban nature.",im:"Time-travel: barges delivering coal to the Linden factories along this canal, 1920",t:"Free. Walk from the Kronenbrücke south along the canal.",c:["parks"],r:"g",nn:"Kronenbrücke Kanalweg — Linden #64",ns:"Der versteckte Kanalweg durch Linden — Industrieerbe, Lastkähne, arbeitender Wasserweg",nst:"Der Stichkanal fließt durch Linden und trägt gewerblichen Kahnverkehr.",nt:"Kostenlos. Von der Kronenbrücke nach Süden entlang des Kanals gehen."},
  {id:65,n:"Maschpark — Maschsee #65",a:"Maschsee",v:["nature","local"],d:32,s:"The park between the Maschsee and the city — where Hannover jogs, picnics, and does nothing",st:"The Maschpark connects the new town hall, the Sprengel Museum and the lake. On Sunday mornings it is the most active free space in the city — runners, families, dogs.",im:"Time-travel: post-war Hannover citizens walking here to forget the ruins, 1950",t:"Free. Sunday morning is the best time.",c:["courtyards"],r:"g",nn:"Maschpark — Maschsee #65",ns:"Der Park zwischen dem Maschsee und der Stadt — wo Hannover joggt, picknickt und nichts tut",nst:"Der Maschpark verbindet Neues Rathaus, Sprengel Museum und See.",nt:"Kostenlos. Sonntagmorgen ist die beste Zeit."},
  {id:66,n:"Sprengel Museum Garden — Maschsee #66",a:"Maschsee",v:["art","beautiful","free"],d:26,s:"The sculpture garden of the best modern art museum in Lower Saxony — free outdoors",st:"The Sprengel Museum holds one of the best 20th century art collections in Germany, including major Kurt Schwitters works. The outdoor sculpture garden is free.",im:"Time-travel: Kurt Schwitters in Hannover creating his first Merz collages, 1919",t:"Sculpture garden free. Museum has an entry fee.",c:["romantic_water"],r:"g",nn:"Sprengel Museum Garten — Maschsee #66",ns:"Der Skulpturengarten des besten modernen Kunstmuseums Niedersachsens — draußen kostenlos",nst:"Das Sprengel Museum hält eine der besten deutschen Sammlungen des 20. Jh., darunter große Kurt Schwitters Werke.",nt:"Skulpturengarten kostenlos. Museum kostenpflichtig."},
  {id:67,n:"Hannover Stadtwald — Eilenriede #67",a:"Eilenriede",v:["nature","free","hidden"],d:22,s:"The deep interior of the Eilenriede — old beech trees, wild areas, deer in the dawn",st:"Walking 20 minutes into the Eilenriede, the city disappears. The old beech forest has trees over 150 years old. Deer are common in the early morning.",im:"Time-travel: 19th century Hannover workers cutting timber in this same forest on royal permit, 1850",t:"Enter at Eilenrieder Weg. Dawn is when the deer are out.",c:["scary"],r:"g",nn:"Hannover Stadtwald — Eilenriede #67",ns:"Das tiefe Innere der Eilenriede — alte Buchen, wilde Bereiche, Rehe in der Morgendämmerung",nst:"20 Minuten in die Eilenriede gehen und die Stadt verschwindet.",nt:"Bei Eilenrieder Weg eintreten. Dämmerung ist wenn die Rehe raus sind."},
  {id:68,n:"Leineschloss Exterior — Altstadt #68",a:"Altstadt",v:["history","architecture"],d:14,s:"The former royal palace — now the Niedersachsen parliament, still with the Hanoverian kings\' portico",st:"The Leineschloss was the principal residence of the Kings of Hannover and the British royal family. After WWII, it became the state parliament. The Neoclassical portico (1817) by Laves is spectacular.",im:"Time-travel: Georg V, last King of Hannover, leaving this palace for the final time in 1866 as Prussia annexed the kingdom",t:"Exterior free. Parliamentary sessions sometimes public.",c:["famous_dead"],r:"g",nn:"Leineschloss Außen — Altstadt #68",ns:"Der ehemalige Königspalast — jetzt Niedersächsischer Landtag, noch mit dem Portikus der Hannoveraner Könige",nst:"Das Leineschloss war die Hauptresidenz der Könige von Hannover und des britischen Königshauses.",nt:"Außenbereich kostenlos. Parlamentssitzungen manchmal öffentlich."},
  {id:69,n:"Hannover Market Hall — Altstadt #69",a:"Altstadt",v:["local","food","beautiful"],d:18,s:"The 1890s market hall — the best place in Hannover to eat and watch and do nothing",st:"The Markthalle is a covered market from 1892, restored beautifully. Stalls selling Niedersachsen produce, flowers, bread, and prepared food. Come hungry at noon.",im:"Time-travel: the market hall on its opening day in 1892 — fish stalls, flower sellers, working Hannover",t:"Tue-Sat during market hours. Free to wander. Eat something.",c:["street_art"],r:"g",nn:"Hannover Markthalle — Altstadt #69",ns:"Die Markthalle der 1890er — der beste Ort in Hannover zum Essen, Beobachten und Nichtstun",nst:"Die Markthalle von 1892, wunderschön restauriert. Stände mit niedersächsischen Produkten.",nt:"Di-Sa während der Marktzeiten. Kostenlos zu erkunden. Etwas essen."},
  {id:70,n:"Tiergarten Hannover — Eilenriede #70",a:"Eilenriede",v:["nature","local","hidden"],d:53,s:"The old animal park within the Eilenriede — deer, wild boar, and forest calm",st:"A small section of the Eilenriede has been maintained as a semi-wild deer park since the 19th century. Deer approach the fence. Wild boar root nearby. Free to visit.",im:"Time-travel: royal hunting parties chasing deer in this park, the Eilenriede still the king\'s property, 1800",t:"Free. Enter from Am Tiergarten.",c:["abandoned"],r:"g",nn:"Tiergarten Hannover — Eilenriede #70",ns:"Der alte Tierpark in der Eilenriede — Rehe, Wildschweine und Waldruhe",nst:"Ein kleiner Teil der Eilenriede wird seit dem 19. Jh. als halbwildes Wildgehege gepflegt.",nt:"Kostenlos. Von Am Tiergarten eintreten."},
  {id:71,n:"Opernplatz — Altstadt #71",a:"Altstadt",v:["architecture","beautiful"],d:26,s:"The grand neo-Rococo opera house — the most beautiful 19th century building in Hannover",st:"The Staatsoper Hannover (1852) is a Neoclassical masterpiece. The square in front of it is where Hannover gathers for demonstrations and celebrations. The facade is always free to admire.",im:"Time-travel: the opera house opening night, 1852 — carriages and gas lamps in the square",t:"Free to view exterior. Guided tours on some Sundays.",c:["free_museum"],r:"g",nn:"Opernplatz — Altstadt #71",ns:"Das große neorokoko Opernhaus — das schönste Gebäude des 19. Jh. in Hannover",nst:"Die Staatsoper Hannover (1852) ist ein neoklassisches Meisterwerk.",nt:"Außenbereich kostenlos zu besichtigen. Führungen an einigen Sonntagen."},
  {id:72,n:"Linden Mural Walk — Linden #72",a:"Linden",v:["street_art","local","hidden"],d:11,s:"Murals covering entire apartment buildings in Linden — political, enormous, constantly changing",st:"Linden has accumulated decades of large-scale political murals on the side walls of apartment buildings. Some are commissioned, some unsanctioned, all honest. A free outdoor gallery.",im:"Time-travel: activist painters working on a 6-storey wall mural overnight, Linden 1987",t:"Walk Schwarzer Bär and Deisterstraße. New murals appear each summer.",c:["local_only"],r:"g",nn:"Linden Wandbildweg — Linden #72",ns:"Wandbilder über ganze Wohngebäude in Linden — politisch, riesig, ständig wechselnd",nst:"Linden hat über Jahrzehnte großflächige politische Wandbilder auf Hauswänden angesammelt.",nt:"Schwarzer Bär und Deisterstraße abgehen. Neue Wandbilder erscheinen jeden Sommer."},
  {id:73,n:"Maschsee North Shore — Maschsee #73",a:"Maschsee",v:["beautiful","local","nature"],d:10,s:"The north shore of the Maschsee at dusk — the whole city reflected in still water",st:"As the sun sets over Hannover, the Maschsee north shore reflects the Neues Rathaus dome and the tree line in the water. Locals walk here every evening without thinking about it.",im:"Time-travel: first swimmers in the new Maschsee, 1936, disbelieving it was real",t:"Come at 7pm in summer. Free to walk the full circuit.",c:["architecture"],r:"g",nn:"Maschsee Nordfer — Maschsee #73",ns:"Das Nordufer des Maschsees in der Dämmerung — die ganze Stadt spiegelt sich im stillen Wasser",nst:"Bei Sonnenuntergang spiegelt das Nordufer des Maschsees die Kuppel des Neuen Rathauses im Wasser.",nt:"Im Sommer um 19 Uhr kommen. Den vollen Rundweg kostenlos gehen."},
  {id:74,n:"Hannover Zoo Perimeter — Eilenriede #74",a:"Eilenriede",v:["local","free","nature"],d:29,s:"The free walk around the zoo fence — hear the lions, watch the giraffes through the trees",st:"The Hannover Zoo is at the edge of the Eilenriede. The forest path around the perimeter is free and very close to the animal enclosures. Giraffes are visible through the fence from the path.",im:"Time-travel: the zoo opening in 1865, Hannover citizens seeing their first elephant",t:"The path is always free. Best early morning.",c:["history_big"],r:"g",nn:"Hannover Zoo Umgehungsweg — Eilenriede #74",ns:"Der kostenlose Weg um den Zaun des Zoos — Löwen hören, Giraffen durch die Bäume sehen",nst:"Der Hannover Zoo liegt am Rand der Eilenriede. Der Waldweg um den Umfang ist kostenlos.",nt:"Der Weg ist immer kostenlos. Am besten früh morgens."},
