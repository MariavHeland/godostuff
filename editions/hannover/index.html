  {id:76,n:"Herrenhäuser Gärten — Herrenhausen #76",a:"Herrenhausen",v:["nature","beautiful","history"],d:27,s:"Baroque garden of the Hanoverian kings — labyrinths, fountains, Europe\'s tallest garden fountain",st:"The Große Garten was the pleasure ground of the British royal house when they also ruled Hanover. The tallest garden fountain in Europe (82m) shoots every day in summer. The hedge maze is original 1674.",im:"Time-travel: Georg I of England inspecting his Hannover gardens before sailing to London, 1714",t:"The gardens are paid. The surrounding park areas and Bergpark are free.",c:["parks"],r:"g",nn:"Herrenhäuser Gärten — Herrenhausen #76",ns:"Barockgarten der hannoverschen Könige — Labyrinthe, Fontänen, Europas höchster Gartenbrunnen",nst:"Der Große Garten war das Vergnügungsgelände des britischen Königshauses als es auch Hannover regierte.",nt:"Die Gärten sind kostenpflichtig. Umgebende Parkbereiche und Bergpark kostenlos."},
  {id:77,n:"Georgengarten — Herrenhausen #77",a:"Herrenhausen",v:["nature","beautiful","free"],d:27,s:"English landscape garden free to enter — the forgotten half of Herrenhausen",st:"The Georgengarten connects Herrenhausen to the city and is completely free. English style — rolling meadows, old trees, ponds. It\'s as beautiful as the formal gardens next door.",im:"Time-travel: Hanoverian aristocrats taking their morning ride through this park, 1780",t:"Always free. Enter from Nienburger Straße. No crowds.",c:["courtyards"],r:"g",nn:"Georgengarten — Herrenhausen #77",ns:"Englischer Landschaftspark frei zugänglich — die vergessene Hälfte von Herrenhausen",nst:"Der Georgengarten verbindet Herrenhausen mit der Stadt und ist völlig kostenlos.",nt:"Immer kostenlos. Von der Nienburger Straße eintreten. Keine Menschenmassen."},
  {id:78,n:"Maschsee Lake — Maschsee #78",a:"Maschsee",v:["nature","beautiful","local"],d:43,s:"The city lake built by unemployed workers in the 1930s — now the living room of Hannover",st:"The Maschsee was constructed between 1934 and 1936 by thousands of unemployed Hanoverians in an emergency employment programme. 2.4 km long, it sits in the city centre and costs nothing.",im:"Time-travel: unemployed workers digging the Maschsee basin with shovels in 1934",t:"Walk the full circuit (6km) or rent a boat. Always free to walk.",c:["romantic_water"],r:"g",nn:"Maschsee — Maschsee #78",ns:"Der Stadtsee, von Arbeitslosen in den 1930ern erbaut — jetzt das Wohnzimmer Hannovers",nst:"Der Maschsee wurde 1934–36 von Tausenden arbeitslosen Hannoveranern gebaut.",nt:"Den vollen Rundweg (6km) gehen oder ein Boot mieten. Zu Fuß immer kostenlos."},
  {id:79,n:"Aegidienkirche War Memorial — Altstadt #79",a:"Altstadt",v:["history","quiet","weird"],d:21,s:"A bombed church left as a ruin — the open sky where the roof was is the memorial",st:"The Aegidienkirche was destroyed in a single RAF raid in October 1943. The decision was made not to rebuild it but to leave it as an anti-war memorial. A bell from Hiroshima hangs inside.",im:"Time-travel: the night of October 8 1943 — firestorm over Hannover, the church burning",t:"Free to enter the ruins. The Hiroshima bell rings each year on August 6.",c:["scary"],r:"g",nn:"Aegidienkirche Kriegsmahnmal — Altstadt #79",ns:"Eine zerbombte Kirche als Ruine belassen — der offene Himmel wo das Dach war ist das Mahnmal",nst:"Die Aegidienkirche wurde in einem einzigen RAF-Angriff im Oktober 1943 zerstört. Beschluss sie als Mahnmal zu belassen.",nt:"Ruinen kostenlos zu betreten. Die Hiroshima-Glocke läutet jedes Jahr am 6. August."},
  {id:80,n:"Eilenriede City Forest — Eilenriede #80",a:"Eilenriede",v:["nature","free","quiet"],d:7,s:"650 hectares of beech forest in the city — Europe\'s largest inner-city forest",st:"The Eilenriede has protected Hannover from its own expansion since 1331. Almost 700 hectares of beech and oak within the city limits. Wild deer still live here. Free at all times.",im:"Time-travel: Hanoverian children picking mushrooms in this forest on autumn Sundays, 1910",t:"Enter at any point. The forest roads are car-free and free forever.",c:["famous_dead"],r:"g",nn:"Eilenriede Stadtwald — Eilenriede #80",ns:"650 Hektar Buchenwald in der Stadt — Europas größter innerstädtischer Wald",nst:"Die Eilenriede schützt Hannover seit 1331 vor seiner eigenen Expansion.",nt:"An beliebiger Stelle eintreten. Die Waldwege sind autofrei und ewig kostenlos."},
  {id:81,n:"Waterloo Column — Altstadt #81",a:"Altstadt",v:["history","beautiful"],d:51,s:"A 40-metre victory column celebrating the Battle of Waterloo — built 1832",st:"Hannover contributed troops to the Battle of Waterloo against Napoleon. This column, inspired by Trajan\'s Column in Rome, lists every Hanoverian soldier who died there.",im:"Time-travel: Hanoverian veterans of Waterloo gathering at this column on the first anniversary, 1816",t:"Free to approach. The view from the surrounding park is excellent.",c:["street_art"],r:"g",nn:"Waterloosäule — Altstadt #81",ns:"Eine 40 Meter hohe Siegessäule für die Waterlooschlacht — 1832 erbaut",nst:"Hannover stellte Truppen für die Waterlooschlacht. Diese Säule nennt jeden gefallenen Hannoveraner.",nt:"Kostenlos zu besichtigen. Der Blick vom umliegenden Park ist ausgezeichnet."},
  {id:82,n:"Neues Rathaus Dome — Altstadt #82",a:"Altstadt",v:["beautiful","history","high_spots"],d:34,s:"The 1913 town hall with a slanted lift — worth it for the model of Hannover before WWII",st:"The Neues Rathaus has a unique curved lift to the dome. Inside: four scale models of Hannover from 1689, 1939, 1945 (destroyed), and today. The model of the bombed city in 1945 is the most important.",im:"Time-travel: the dome observation gallery in 1939, the city below still intact",t:"Free to enter the ground floor with the city models. Lift to dome: small fee.",c:["abandoned"],r:"g",nn:"Neues Rathaus Kuppel — Altstadt #82",ns:"Das Rathaus von 1913 mit einem schrägen Aufzug — lohnenswert für das Modell Hannovers vor WWII",nst:"Das Neue Rathaus hat einen einzigartigen Kurvenaufzug zur Kuppel. Vier Stadtmodelle von 1689, 1939, 1945, heute.",nt:"Erdgeschoss mit Stadtmodellen kostenlos. Kuppelaufzug kleiner Eintritt."},
  {id:83,n:"Old Town Half-Timbered Quarter — Altstadt #83",a:"Altstadt",v:["history","beautiful"],d:39,s:"The restored half-timbered houses of the Altstadt — 90% destroyed in WWII, rebuilt exactly",st:"Hannover\'s Altstadt was 90% destroyed in 1943. The city made the extraordinary decision to rebuild the half-timbered houses exactly as they were. Walk it knowing the stones are new but the forms are 400 years old.",im:"Time-travel: architects working from pre-war photographs to rebuild these houses in 1952",t:"Free to walk. Marktkirche is inside and free.",c:["free_museum"],r:"g",nn:"Fachwerkquartier Altstadt — Altstadt #83",ns:"Die restaurierten Fachwerkhäuser der Altstadt — 90% im WWII zerstört, exakt wiederaufgebaut",nst:"Hannovers Altstadt wurde 1943 zu 90% zerstört. Die Stadt entschied, die Häuser exakt wiederaufzubauen.",nt:"Kostenlos zu gehen. Marktkirche ist innen und kostenlos."},
  {id:84,n:"Linden Alternative Quarter — Linden #84",a:"Linden",v:["local","hidden","beautiful"],d:12,s:"Hannover\'s leftist, alternative quarter — murals, organic markets, protest posters, real life",st:"Linden was a working-class area that became politically radical in the 1970s and stayed that way. The best food market in Hannover is here (Lindener Markt, Wednesday and Saturday). Community, not tourists.",im:"Time-travel: Linden factory workers becoming political activists, 1920, this same neighbourhood",t:"Wednesday and Saturday market in Lindener Markt. Everything is real.",c:["local_only"],r:"g",nn:"Linden Alternativviertel — Linden #84",ns:"Hannovers linkes, alternatives Viertel — Wandbilder, Biomärkte, Protestplakate, echtes Leben",nst:"Linden war ein Arbeiterbezirk, der in den 1970ern politisch radikal wurde und so blieb.",nt:"Mittwoch und Samstag Markt auf dem Lindener Markt. Alles ist echt."},
  {id:85,n:"Marktkirche Interior — Altstadt #85",a:"Altstadt",v:["history","beautiful"],d:29,s:"The great Gothic church of Hannover — rebuilt after 1943 with original medieval bricks salvaged",st:"The Marktkirche is the oldest church in the city, dating from the 14th century. After 1943 it was rebuilt using every original brick that could be salvaged. The interior has beautiful modern glass.",im:"Time-travel: citizens sifting through the rubble in 1945, saving every original brick by hand",t:"Free to enter. The modern glass windows are extraordinary.",c:["architecture"],r:"g",nn:"Marktkirche Innen — Altstadt #85",ns:"Die große gotische Kirche Hannovers — nach 1943 mit geretteten mittelalterlichen Originalbausteinen wiederaufgebaut",nst:"Die Marktkirche ist die älteste Kirche der Stadt aus dem 14. Jh. 1943 mit jedem retten Originalziegel wiederaufgebaut.",nt:"Kostenlos zu betreten. Die modernen Glasfenster sind außergewöhnlich."},
  {id:86,n:"Bergpark Herrenhausen — Herrenhausen #86",a:"Herrenhausen",v:["nature","free","quiet"],d:10,s:"Cascading terraces and artificial waterfalls on the hill behind the formal gardens — all free",st:"The Bergpark is the wild older sibling of the formal Herrenhäuser Gärten. Wooded hillside, cascading water features, and the Leibniztempel. All free. All beautiful.",im:"Time-travel: Hanoverian courtiers escaping the formality of the palace gardens for this wilder hill, 1730",t:"Enter from Georgengarten. Always free.",c:["history_big"],r:"g",nn:"Bergpark Herrenhausen — Herrenhausen #86",ns:"Terrassen und künstliche Wasserfälle auf dem Hügel hinter den formalen Gärten — alle kostenlos",nst:"Der Bergpark ist das wilde ältere Geschwister der formalen Herrenhäuser Gärten.",nt:"Von Georgengarten eintreten. Immer kostenlos."},
  {id:87,n:"Leibniztempel — Herrenhausen #87",a:"Herrenhausen",v:["history","hidden","quiet"],d:40,s:"The temple commemorating Gottfried Wilhelm Leibniz — the philosopher who invented calculus invented here",st:"Leibniz spent 40 years in Hannover as court librarian and advisor. He invented calculus (before and independently of Newton), binary numbers, and much of modern logic. This small temple honours him in the Georgengarten.",im:"Time-travel: Leibniz writing his papers in a Hannover study, simultaneously inventing calculus and binary code, 1690",t:"Free. Always open.",c:["high_spots"],r:"g",nn:"Leibniztempel — Herrenhausen #87",ns:"Der Tempel zu Ehren von Gottfried Wilhelm Leibniz — dem Philosophen, der die Infinitesimalrechnung hier erfand",nst:"Leibniz verbrachte 40 Jahre in Hannover als Hofbibliothekar. Er erfand Infinitesimalrechnung (vor Newton).",nt:"Kostenlos. Immer geöffnet."},
  {id:88,n:"Ihme Zentrum — Linden #88",a:"Linden",v:["weird","hidden","history"],d:23,s:"The failed utopian brutalist mega-complex — a whole city in one building, now slowly dying",st:"Built in 1975 as a self-contained mixed-use utopia, Ihme Zentrum failed commercially almost immediately. The shopping centre is half-empty. The residential towers leak. An architectural tragedy worth seeing.",im:"Time-travel: the opening of Ihme Zentrum in 1975, politicians cutting ribbon, crowds filing in optimistically",t:"Walk through the public ground floor. Free to explore the exterior.",c:["parks"],r:"g",nn:"Ihme Zentrum — Linden #88",ns:"Der gescheiterte utopische Brutalismus-Megakomplex — eine ganze Stadt in einem Gebäude, jetzt langsam sterbend",nst:"1975 als autarke gemischte Nutzung gebaut. Kommerziell fast sofort gescheitert.",nt:"Durch das öffentliche Erdgeschoss gehen. Außenbereich kostenlos erkunden."},
  {id:89,n:"Kronenbrücke Canal Walk — Linden #89",a:"Linden",v:["nature","local","quiet"],d:45,s:"The hidden canal walk through Linden — industrial heritage, barge traffic, working waterway",st:"The Stichkanal runs through Linden carrying commercial barge traffic. The canal banks have been opened as a walking and cycling path. Industrial heritage meets urban nature.",im:"Time-travel: barges delivering coal to the Linden factories along this canal, 1920",t:"Free. Walk from the Kronenbrücke south along the canal.",c:["courtyards"],r:"g",nn:"Kronenbrücke Kanalweg — Linden #89",ns:"Der versteckte Kanalweg durch Linden — Industrieerbe, Lastkähne, arbeitender Wasserweg",nst:"Der Stichkanal fließt durch Linden und trägt gewerblichen Kahnverkehr.",nt:"Kostenlos. Von der Kronenbrücke nach Süden entlang des Kanals gehen."},
  {id:90,n:"Maschpark — Maschsee #90",a:"Maschsee",v:["nature","local"],d:44,s:"The park between the Maschsee and the city — where Hannover jogs, picnics, and does nothing",st:"The Maschpark connects the new town hall, the Sprengel Museum and the lake. On Sunday mornings it is the most active free space in the city — runners, families, dogs.",im:"Time-travel: post-war Hannover citizens walking here to forget the ruins, 1950",t:"Free. Sunday morning is the best time.",c:["romantic_water"],r:"g",nn:"Maschpark — Maschsee #90",ns:"Der Park zwischen dem Maschsee und der Stadt — wo Hannover joggt, picknickt und nichts tut",nst:"Der Maschpark verbindet Neues Rathaus, Sprengel Museum und See.",nt:"Kostenlos. Sonntagmorgen ist die beste Zeit."},
  {id:91,n:"Sprengel Museum Garden — Maschsee #91",a:"Maschsee",v:["art","beautiful","free"],d:28,s:"The sculpture garden of the best modern art museum in Lower Saxony — free outdoors",st:"The Sprengel Museum holds one of the best 20th century art collections in Germany, including major Kurt Schwitters works. The outdoor sculpture garden is free.",im:"Time-travel: Kurt Schwitters in Hannover creating his first Merz collages, 1919",t:"Sculpture garden free. Museum has an entry fee.",c:["scary"],r:"g",nn:"Sprengel Museum Garten — Maschsee #91",ns:"Der Skulpturengarten des besten modernen Kunstmuseums Niedersachsens — draußen kostenlos",nst:"Das Sprengel Museum hält eine der besten deutschen Sammlungen des 20. Jh., darunter große Kurt Schwitters Werke.",nt:"Skulpturengarten kostenlos. Museum kostenpflichtig."},
  {id:92,n:"Hannover Stadtwald — Eilenriede #92",a:"Eilenriede",v:["nature","free","hidden"],d:41,s:"The deep interior of the Eilenriede — old beech trees, wild areas, deer in the dawn",st:"Walking 20 minutes into the Eilenriede, the city disappears. The old beech forest has trees over 150 years old. Deer are common in the early morning.",im:"Time-travel: 19th century Hannover workers cutting timber in this same forest on royal permit, 1850",t:"Enter at Eilenrieder Weg. Dawn is when the deer are out.",c:["famous_dead"],r:"g",nn:"Hannover Stadtwald — Eilenriede #92",ns:"Das tiefe Innere der Eilenriede — alte Buchen, wilde Bereiche, Rehe in der Morgendämmerung",nst:"20 Minuten in die Eilenriede gehen und die Stadt verschwindet.",nt:"Bei Eilenrieder Weg eintreten. Dämmerung ist wenn die Rehe raus sind."},
  {id:93,n:"Leineschloss Exterior — Altstadt #93",a:"Altstadt",v:["history","architecture"],d:17,s:"The former royal palace — now the Niedersachsen parliament, still with the Hanoverian kings\' portico",st:"The Leineschloss was the principal residence of the Kings of Hannover and the British royal family. After WWII, it became the state parliament. The Neoclassical portico (1817) by Laves is spectacular.",im:"Time-travel: Georg V, last King of Hannover, leaving this palace for the final time in 1866 as Prussia annexed the kingdom",t:"Exterior free. Parliamentary sessions sometimes public.",c:["street_art"],r:"g",nn:"Leineschloss Außen — Altstadt #93",ns:"Der ehemalige Königspalast — jetzt Niedersächsischer Landtag, noch mit dem Portikus der Hannoveraner Könige",nst:"Das Leineschloss war die Hauptresidenz der Könige von Hannover und des britischen Königshauses.",nt:"Außenbereich kostenlos. Parlamentssitzungen manchmal öffentlich."},
  {id:94,n:"Hannover Market Hall — Altstadt #94",a:"Altstadt",v:["local","food","beautiful"],d:50,s:"The 1890s market hall — the best place in Hannover to eat and watch and do nothing",st:"The Markthalle is a covered market from 1892, restored beautifully. Stalls selling Niedersachsen produce, flowers, bread, and prepared food. Come hungry at noon.",im:"Time-travel: the market hall on its opening day in 1892 — fish stalls, flower sellers, working Hannover",t:"Tue-Sat during market hours. Free to wander. Eat something.",c:["abandoned"],r:"g",nn:"Hannover Markthalle — Altstadt #94",ns:"Die Markthalle der 1890er — der beste Ort in Hannover zum Essen, Beobachten und Nichtstun",nst:"Die Markthalle von 1892, wunderschön restauriert. Stände mit niedersächsischen Produkten.",nt:"Di-Sa während der Marktzeiten. Kostenlos zu erkunden. Etwas essen."},
  {id:95,n:"Tiergarten Hannover — Eilenriede #95",a:"Eilenriede",v:["nature","local","hidden"],d:9,s:"The old animal park within the Eilenriede — deer, wild boar, and forest calm",st:"A small section of the Eilenriede has been maintained as a semi-wild deer park since the 19th century. Deer approach the fence. Wild boar root nearby. Free to visit.",im:"Time-travel: royal hunting parties chasing deer in this park, the Eilenriede still the king\'s property, 1800",t:"Free. Enter from Am Tiergarten.",c:["free_museum"],r:"g",nn:"Tiergarten Hannover — Eilenriede #95",ns:"Der alte Tierpark in der Eilenriede — Rehe, Wildschweine und Waldruhe",nst:"Ein kleiner Teil der Eilenriede wird seit dem 19. Jh. als halbwildes Wildgehege gepflegt.",nt:"Kostenlos. Von Am Tiergarten eintreten."},
  {id:96,n:"Opernplatz — Altstadt #96",a:"Altstadt",v:["architecture","beautiful"],d:7,s:"The grand neo-Rococo opera house — the most beautiful 19th century building in Hannover",st:"The Staatsoper Hannover (1852) is a Neoclassical masterpiece. The square in front of it is where Hannover gathers for demonstrations and celebrations. The facade is always free to admire.",im:"Time-travel: the opera house opening night, 1852 — carriages and gas lamps in the square",t:"Free to view exterior. Guided tours on some Sundays.",c:["local_only"],r:"g",nn:"Opernplatz — Altstadt #96",ns:"Das große neorokoko Opernhaus — das schönste Gebäude des 19. Jh. in Hannover",nst:"Die Staatsoper Hannover (1852) ist ein neoklassisches Meisterwerk.",nt:"Außenbereich kostenlos zu besichtigen. Führungen an einigen Sonntagen."},
  {id:97,n:"Linden Mural Walk — Linden #97",a:"Linden",v:["street_art","local","hidden"],d:47,s:"Murals covering entire apartment buildings in Linden — political, enormous, constantly changing",st:"Linden has accumulated decades of large-scale political murals on the side walls of apartment buildings. Some are commissioned, some unsanctioned, all honest. A free outdoor gallery.",im:"Time-travel: activist painters working on a 6-storey wall mural overnight, Linden 1987",t:"Walk Schwarzer Bär and Deisterstraße. New murals appear each summer.",c:["architecture"],r:"g",nn:"Linden Wandbildweg — Linden #97",ns:"Wandbilder über ganze Wohngebäude in Linden — politisch, riesig, ständig wechselnd",nst:"Linden hat über Jahrzehnte großflächige politische Wandbilder auf Hauswänden angesammelt.",nt:"Schwarzer Bär und Deisterstraße abgehen. Neue Wandbilder erscheinen jeden Sommer."},
  {id:98,n:"Maschsee North Shore — Maschsee #98",a:"Maschsee",v:["beautiful","local","nature"],d:19,s:"The north shore of the Maschsee at dusk — the whole city reflected in still water",st:"As the sun sets over Hannover, the Maschsee north shore reflects the Neues Rathaus dome and the tree line in the water. Locals walk here every evening without thinking about it.",im:"Time-travel: first swimmers in the new Maschsee, 1936, disbelieving it was real",t:"Come at 7pm in summer. Free to walk the full circuit.",c:["history_big"],r:"g",nn:"Maschsee Nordfer — Maschsee #98",ns:"Das Nordufer des Maschsees in der Dämmerung — die ganze Stadt spiegelt sich im stillen Wasser",nst:"Bei Sonnenuntergang spiegelt das Nordufer des Maschsees die Kuppel des Neuen Rathauses im Wasser.",nt:"Im Sommer um 19 Uhr kommen. Den vollen Rundweg kostenlos gehen."},
  {id:99,n:"Hannover Zoo Perimeter — Eilenriede #99",a:"Eilenriede",v:["local","free","nature"],d:54,s:"The free walk around the zoo fence — hear the lions, watch the giraffes through the trees",st:"The Hannover Zoo is at the edge of the Eilenriede. The forest path around the perimeter is free and very close to the animal enclosures. Giraffes are visible through the fence from the path.",im:"Time-travel: the zoo opening in 1865, Hannover citizens seeing their first elephant",t:"The path is always free. Best early morning.",c:["high_spots"],r:"g",nn:"Hannover Zoo Umgehungsweg — Eilenriede #99",ns:"Der kostenlose Weg um den Zaun des Zoos — Löwen hören, Giraffen durch die Bäume sehen",nst:"Der Hannover Zoo liegt am Rand der Eilenriede. Der Waldweg um den Umfang ist kostenlos.",nt:"Der Weg ist immer kostenlos. Am besten früh morgens."},
  {id:100,n:"Friederikenplatz — Altstadt #100",a:"Altstadt",v:["history","quiet"],d:23,s:"The square outside the opera — where Hannover gathers for demonstration and celebration equally",st:"Hannover has a tradition of large peaceful demonstrations and this square has seen them all — anti-nuclear in the 1980s, anti-war, pro-refugee. The political memory of the square is part of its character.",im:"Time-travel: 400,000 people filling this square and the streets around it in the 1980s anti-nuclear protests",t:"Free. The pedestrian area around it is the social heart of the city.",c:["parks"],r:"g",nn:"Friederikenplatz — Altstadt #100",ns:"Der Platz vor der Oper — wo Hannover gleichsam für Demos und Feiern zusammenkommt",nst:"Hannover hat eine Tradition friedlicher Großdemos, und dieser Platz hat alle gesehen.",nt:"Kostenlos. Der Fußgängerbereich drum herum ist das soziale Herz der Stadt."},
  {id:101,n:"Herrenhäuser Gärten — Herrenhausen #101",a:"Herrenhausen",v:["nature","beautiful","history"],d:10,s:"Baroque garden of the Hanoverian kings — labyrinths, fountains, Europe\'s tallest garden fountain",st:"The Große Garten was the pleasure ground of the British royal house when they also ruled Hanover. The tallest garden fountain in Europe (82m) shoots every day in summer. The hedge maze is original 1674.",im:"Time-travel: Georg I of England inspecting his Hannover gardens before sailing to London, 1714",t:"The gardens are paid. The surrounding park areas and Bergpark are free.",c:["courtyards"],r:"g",nn:"Herrenhäuser Gärten — Herrenhausen #101",ns:"Barockgarten der hannoverschen Könige — Labyrinthe, Fontänen, Europas höchster Gartenbrunnen",nst:"Der Große Garten war das Vergnügungsgelände des britischen Königshauses als es auch Hannover regierte.",nt:"Die Gärten sind kostenpflichtig. Umgebende Parkbereiche und Bergpark kostenlos."},
  {id:102,n:"Georgengarten — Herrenhausen #102",a:"Herrenhausen",v:["nature","beautiful","free"],d:19,s:"English landscape garden free to enter — the forgotten half of Herrenhausen",st:"The Georgengarten connects Herrenhausen to the city and is completely free. English style — rolling meadows, old trees, ponds. It\'s as beautiful as the formal gardens next door.",im:"Time-travel: Hanoverian aristocrats taking their morning ride through this park, 1780",t:"Always free. Enter from Nienburger Straße. No crowds.",c:["romantic_water"],r:"g",nn:"Georgengarten — Herrenhausen #102",ns:"Englischer Landschaftspark frei zugänglich — die vergessene Hälfte von Herrenhausen",nst:"Der Georgengarten verbindet Herrenhausen mit der Stadt und ist völlig kostenlos.",nt:"Immer kostenlos. Von der Nienburger Straße eintreten. Keine Menschenmassen."},
  {id:103,n:"Maschsee Lake — Maschsee #103",a:"Maschsee",v:["nature","beautiful","local"],d:11,s:"The city lake built by unemployed workers in the 1930s — now the living room of Hannover",st:"The Maschsee was constructed between 1934 and 1936 by thousands of unemployed Hanoverians in an emergency employment programme. 2.4 km long, it sits in the city centre and costs nothing.",im:"Time-travel: unemployed workers digging the Maschsee basin with shovels in 1934",t:"Walk the full circuit (6km) or rent a boat. Always free to walk.",c:["scary"],r:"g",nn:"Maschsee — Maschsee #103",ns:"Der Stadtsee, von Arbeitslosen in den 1930ern erbaut — jetzt das Wohnzimmer Hannovers",nst:"Der Maschsee wurde 1934–36 von Tausenden arbeitslosen Hannoveranern gebaut.",nt:"Den vollen Rundweg (6km) gehen oder ein Boot mieten. Zu Fuß immer kostenlos."},
  {id:104,n:"Aegidienkirche War Memorial — Altstadt #104",a:"Altstadt",v:["history","quiet","weird"],d:29,s:"A bombed church left as a ruin — the open sky where the roof was is the memorial",st:"The Aegidienkirche was destroyed in a single RAF raid in October 1943. The decision was made not to rebuild it but to leave it as an anti-war memorial. A bell from Hiroshima hangs inside.",im:"Time-travel: the night of October 8 1943 — firestorm over Hannover, the church burning",t:"Free to enter the ruins. The Hiroshima bell rings each year on August 6.",c:["famous_dead"],r:"g",nn:"Aegidienkirche Kriegsmahnmal — Altstadt #104",ns:"Eine zerbombte Kirche als Ruine belassen — der offene Himmel wo das Dach war ist das Mahnmal",nst:"Die Aegidienkirche wurde in einem einzigen RAF-Angriff im Oktober 1943 zerstört. Beschluss sie als Mahnmal zu belassen.",nt:"Ruinen kostenlos zu betreten. Die Hiroshima-Glocke läutet jedes Jahr am 6. August."},
  {id:105,n:"Eilenriede City Forest — Eilenriede #105",a:"Eilenriede",v:["nature","free","quiet"],d:22,s:"650 hectares of beech forest in the city — Europe\'s largest inner-city forest",st:"The Eilenriede has protected Hannover from its own expansion since 1331. Almost 700 hectares of beech and oak within the city limits. Wild deer still live here. Free at all times.",im:"Time-travel: Hanoverian children picking mushrooms in this forest on autumn Sundays, 1910",t:"Enter at any point. The forest roads are car-free and free forever.",c:["street_art"],r:"g",nn:"Eilenriede Stadtwald — Eilenriede #105",ns:"650 Hektar Buchenwald in der Stadt — Europas größter innerstädtischer Wald",nst:"Die Eilenriede schützt Hannover seit 1331 vor seiner eigenen Expansion.",nt:"An beliebiger Stelle eintreten. Die Waldwege sind autofrei und ewig kostenlos."}

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
{/* dark scrim over photo */}
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Hannover Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Hannover Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
