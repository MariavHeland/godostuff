  {id:1,n:"Baščaršija\'s Hidden Hammams — Baščaršija",a:"Baščaršija",v:["hidden", "history"],d:1,s:"Ottoman bathhouses still operating in 500-year-old structures—working museums of bathing culture",st:"The hammams in Baščaršija are functional. You\'re bathing in Ottoman architecture built in the 1500s. The ritual—hot room, warm room, cold plunge—follows the same pattern for 500 years. It\'s tradition as lived experience.",im:"It\'s 1550. Ottoman merchants relax in hammams after trading in the bazaar. The ritual is sacred, the architecture is permanent, the tradition will last centuries.",t:"The hammams in Baščaršija are functional. You\'re bathing in Ottoman architecture built in the 1500s. The ritual—hot room, warm room, cold plunge—follows the same pattern for 500 years. It\'s tradition as lived experience.\",im:\"It\'s 1550. Ottoman merchants relax in hammams after trading in the bazaar. The ritual is sacred, the architecture is permanent, the tradition will last centuries.\",t:\"Entry ~15-20 KM. Located throughout Baščaršija (Gazi Husrev-beg Hamam is most famous). Bring towel. Gender-separated bathhouses. Morning hours quieter.",c:["history_big", "local_only"],r:"g",nn:"Sarajevo",ns:"Gdje rijeka Miljacka nosi sjećanja od propasti i obnove.",nst:"Sarajevo je grad koji je prošao kroz ratne oluje i ponovno se rodio. Stari grad blista sa osmanlijskim arhitekturom i bosanskom toplinom. Lat de bas je vijekne kafiće gdje se vrijeme zaustavlja. Sarajlije su duhovni narod, strpljivi i puni humora.",nt:"Baščaršija je srce grada—šetnja kroz vjekovne ulice. Odgajeni su bira i rakija u kafiću. Čaj od limunskoga bilja je lijek za sve. Novine su pune priča o otpornosti. Bošnjakom je čudan jezik, ali srce je jasno. Grad čini ljude toplim."},

  {id:56,n:"Baščaršija\'s Hidden Hammams — Baščaršija",a:"Baščaršija",v:["hidden", "history"],d:56,s:"Ottoman bathhouses still operating in 500-year-old structures—working museums of bathing culture",st:"The hammams in Baščaršija are functional. You\'re bathing in Ottoman architecture built in the 1500s. The ritual—hot room, warm room, cold plunge—follows the same pattern for 500 years. It\'s tradition as lived experience.",im:"It\'s 1550. Ottoman merchants relax in hammams after trading in the bazaar. The ritual is sacred, the architecture is permanent, the tradition will last centuries.",t:"The hammams in Baščaršija are functional. You\'re bathing in Ottoman architecture built in the 1500s. The ritual—hot room, warm room, cold plunge—follows the same pattern for 500 years. It\'s tradition as lived experience.\",im:\"It\'s 1550. Ottoman merchants relax in hammams after trading in the bazaar. The ritual is sacred, the architecture is permanent, the tradition will last centuries.\",t:\"Entry ~15-20 KM. Located throughout Baščaršija (Gazi Husrev-beg Hamam is most famous). Bring towel. Gender-separated bathhouses. Morning hours quieter.",c:["history_big", "local_only"],r:"g",nn:"Sarajevo",ns:"Gdje rijeka Miljacka nosi sjećanja od propasti i obnove.",nst:"Sarajevo je grad koji je prošao kroz ratne oluje i ponovno se rodio. Stari grad blista sa osmanlijskim arhitekturom i bosanskom toplinom. Lat de bas je vijekne kafiće gdje se vrijeme zaustavlja. Sarajlije su duhovni narod, strpljivi i puni humora.",nt:"Baščaršija je srce grada—šetnja kroz vjekovne ulice. Odgajeni su bira i rakija u kafiću. Čaj od limunskoga bilja je lijek za sve. Novine su pune priča o otpornosti. Bošnjakom je čudan jezik, ali srce je jasno. Grad čini ljude toplim."},

  {id:57,n:"Baščaršija\'s Copper Bazaar — Baščaršija",a:"Baščaršija",v:["history", "beautiful"],d:57,s:"An Ottoman marketplace where coppersmiths still hammer goods using 500-year-old techniques",st:"The copper bazaar is working, not preserved. Coppersmiths hammer bowls and pots using the same techniques Ottoman craftspeople used. The sound—hammer on copper—is the actual sound of the bazaar for 500 years.",im:"It\'s 1580. A copper smith hammers a tray while merchants sell spices and textiles around him. The bazaar is alive with trade and craft.",t:"The copper bazaar is working, not preserved. Coppersmiths hammer bowls and pots using the same techniques Ottoman craftspeople used. The sound—hammer on copper—is the actual sound of the bazaar for 500 years.\",im:\"It\'s 1580. A copper smith hammers a tray while merchants sell spices and textiles around him. The bazaar is alive with trade and craft.\",t:\"Free to watch. Items for sale. Located in central Baščaršija. Best mornings when craftspeople work. Buy something small.",c:["history_big", "local_only"],r:"g",nn:"Sarajevo",ns:"Gdje rijeka Miljacka nosi sjećanja od propasti i obnove.",nst:"Sarajevo je grad koji je prošao kroz ratne oluje i ponovno se rodio. Stari grad blista sa osmanlijskim arhitekturom i bosanskom toplinom. Lat de bas je vijekne kafiće gdje se vrijeme zaustavlja. Sarajlije su duhovni narod, strpljivi i puni humora.",nt:"Baščaršija je srce grada—šetnja kroz vjekovne ulice. Odgajeni su bira i rakija u kafiću. Čaj od limunskoga bilja je lijek za sve. Novine su pune priča o otpornosti. Bošnjakom je čudan jezik, ali srce je jasno. Grad čini ljude toplim."},

  {id:70,n:"Latinski Bridge\'s WWI Moment — History",a:"Latin Bridge",v:["history", "weird"],d:70,s:"A bridge where Archduke Franz Ferdinand was assassinated in 1914—standing there is standing at history\'s hinge",st:"Latinski Most (Latin Bridge) is unremarkable except for what happened there. The assassination of Franz Ferdinand triggered World War I. Standing there, you\'re standing at the moment that changed the century.",im:"It\'s 1914. A car drives over the bridge. An assassin shoots. The future tilts toward war. Sarajevo becomes the trigger for global conflict.",t:"Latinski Most (Latin Bridge) is unremarkable except for what happened there. The assassination of Franz Ferdinand triggered World War I. Standing there, you\'re standing at the moment that changed the century.\",im:\"It\'s 1914. A car drives over the bridge. An assassin shoots. The future tilts toward war. Sarajevo becomes the trigger for global conflict.\",t:\"Free. Located on Miljacka River in central Sarajevo. Plaque marks the assassination spot. Brief and haunting.",c:["history_big", "quiet"],r:"g",nn:"Sarajevo",ns:"Gdje rijeka Miljacka nosi sjećanja od propasti i obnove.",nst:"Sarajevo je grad koji je prošao kroz ratne oluje i ponovno se rodio. Stari grad blista sa osmanlijskim arhitekturom i bosanskom toplinom. Lat de bas je vijekne kafiće gdje se vrijeme zaustavlja. Sarajlije su duhovni narod, strpljivi i puni humora.",nt:"Baščaršija je srce grada—šetnja kroz vjekovne ulice. Odgajeni su bira i rakija u kafiću. Čaj od limunskoga bilja je lijek za sve. Novine su pune priča o otpornosti. Bošnjakom je čudan jezik, ali srce je jasno. Grad čini ljude toplim."},

  {id:71,n:"Baščaršija\'s Hidden Hammams — Baščaršija",a:"Baščaršija",v:["hidden", "history"],d:71,s:"Ottoman bathhouses still operating in 500-year-old structures—working museums of bathing culture",st:"The hammams in Baščaršija are functional. You\'re bathing in Ottoman architecture built in the 1500s. The ritual—hot room, warm room, cold plunge—follows the same pattern for 500 years. It\'s tradition as lived experience.",im:"It\'s 1550. Ottoman merchants relax in hammams after trading in the bazaar. The ritual is sacred, the architecture is permanent, the tradition will last centuries.",t:"The hammams in Baščaršija are functional. You\'re bathing in Ottoman architecture built in the 1500s. The ritual—hot room, warm room, cold plunge—follows the same pattern for 500 years. It\'s tradition as lived experience.\",im:\"It\'s 1550. Ottoman merchants relax in hammams after trading in the bazaar. The ritual is sacred, the architecture is permanent, the tradition will last centuries.\",t:\"Entry ~15-20 KM. Located throughout Baščaršija (Gazi Husrev-beg Hamam is most famous). Bring towel. Gender-separated bathhouses. Morning hours quieter.",c:["history_big", "local_only"],r:"g",nn:"Sarajevo",ns:"Gdje rijeka Miljacka nosi sjećanja od propasti i obnove.",nst:"Sarajevo je grad koji je prošao kroz ratne oluje i ponovno se rodio. Stari grad blista sa osmanlijskim arhitekturom i bosanskom toplinom. Lat de bas je vijekne kafiće gdje se vrijeme zaustavlja. Sarajlije su duhovni narod, strpljivi i puni humora.",nt:"Baščaršija je srce grada—šetnja kroz vjekovne ulice. Odgajeni su bira i rakija u kafiću. Čaj od limunskoga bilja je lijek za sve. Novine su pune priča o otpornosti. Bošnjakom je čudan jezik, ali srce je jasno. Grad čini ljude toplim."},

  ,{id:116,n:"Gazi Husrev Bey Mosque",a:"Baščaršija",v:["famous","architecture","history"],d:1,s:"Built 1530. The largest historical mosque in Bosnia. Designed by chief architect of Ottoman Empire. First mosque to receive electricity in 1898.",st:"Gazi Husrev-beg Mosque sits at the heart of Baščaršija in 1530 Ottoman grandeur. Built by Mimar Ali, a Persian from Tabriz who was chief architect of the Ottoman Empire at that time.

The mosque is still active. People pray here. The courtyard has a fountain. The Clock Tower (Sahat-kula) nearby is unique for lunar timekeeping, synchronized with five daily Islamic prayers. During the Siege, Serbian forces targeted this. Reconstruction started 1996. It still stands.",im:"The mosque courtyard. Fountain in the center. The minaret rising. Afternoon light on stone.",t:"Free entry (donations welcome). Baščaršija neighborhood. Open for prayer times. Modest dress requested (head covering for women). Allow 30 minutes. Adjacent Clock Tower is also worth climbing.",c:["greatest_hits","architecture","history_big"],r:"g",nn:"Gazihusrevbegovамosquе",ns:"Izgraden 1530. Najveća istorijska džamija u Bosni.",nst:"Gazihusrevbegova Džamija se nalazi na srcu Baščaršije u 1530 osmanlskoj veličanstvenosti.",nt:"Besplatан ulazak (donacije su dobrodošle). Baščaršija suседstvo. Otvoreno za vremenske molitve. Skromna odečа tražena."},
  ,
  {id:117,n:"Baščaršija Old Town",a:"Baščaršija",v:["famous","beautiful","local"],d:1,s:"The Ottoman bazaar where Sarajevo's soul still trades—copperware, carpets, coffee, and the smell of Turkish history.",st:"Baščaršija is the old Ottoman bazaar of Sarajevo, a maze of narrow streets and workshops where coppersmith hammer their craft, carpet sellers spread their wares, and coffee sellers serve strong coffee in small cups.

The bombardment during the war scarred many buildings—you can see the shrapnel marks. But the bazaar rebuilt itself. People are here—not tourists pretending, but locals buying, selling, living. The smell is Turkish coffee, fresh bread, and centuries of trade.",im:"Narrow bazaar streets. Light filtering through wooden overhead covers. Merchants at their stalls. The sound of hammering copper.",t:"Free to walk. Baščaršija neighborhood. Best weekday mornings when vendors are active. Avoid midday summer heat. Small purchase EUR1-5. Photography often not welcomed—ask first.",c:["greatest_hits","beautiful","local"],r:"g",nn:"Baščaršija Stari Grad",ns:"Osmanski bazar gde Sarajevo duša još uvek trguje.",nst:"Baščaršija je stari Osmanski bazar Sarajeva, lavirint uskih ulica i radionica.",nt:"Besplatno za setju. Baščaršija suседstvo. Najbolje radnim danima ujutru. Izbegavati midday summer."},
  ,
  {id:118,n:"Sarajevo War Tunnel Museum",a:"Dobrinja",v:["famous","history","scary"],d:4,s:"The 800-meter tunnel dug under the city during the siege. Now a museum with original wagons, backpacks, and stories of survival.",st:"During the Siege of Sarajevo (1992-1996), the city was surrounded. The only supply line was a 4-meter-tall tunnel dug by hand beneath the airport. 800 meters of life-support. Hundreds of thousands of people passed through carrying food, medicine, ammunition, hope.

A small section is now a museum. You can walk it. You can see the original wooden beams, the cramped space, the wagons they used to carry supplies. The photos and stories on the walls are from people who survived. It's one of the most powerful war museums in Europe.",im:"Inside the tunnel. Low wooden ceiling. Cramped darkness. Light at the end. The weight of history.",t:"EUR5 entry. Dobrinja neighborhood, south of center (taxi recommended). Narrow tunnel—claustrophobic for some. Allow 45 minutes. Open 9am-5pm daily. Respectful atmosphere—it's a grave and a miracle at once.",c:["greatest_hits","history_big","scary"],r:"g",nn:"Tunelј Spasa Museum",ns:"800-metar tunel iskopan ispod grada tokom opsade.",nst:"Tokom opsade Sarajeva (1992-1996), grad je bio okružen. Jedina linija zalihe je bio 4-metar visok tunel iskopan ručno.",nt:"EUR5 ulazak. Dobrinja suседstvo, jug od centra (taksi preporučen). Uzan tunel—klaustrofobičan za neke."},

<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:`url(\'${TBGS[tab]||TBGS.default}\') center/cover no-repeat`}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Sarajevo Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Sarajevo Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
