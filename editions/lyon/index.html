{id:41,n:"Op\u00e9ra de Lyon \u2014 Rooftop",a:"Presqu\'\u00eele",v:["hidden","beautiful"],d:15,s:"The rooftop bar of Lyon\'s opera house, hidden behind the eight muse statues, with a panoramic view that most visitors never discover.",st:"Jean Nouvel renovated the Op\u00e9ra de Lyon in the 1990s, keeping the original 19th-century facade and replacing everything behind it with a massive glass barrel vault. The eight muse statues on top \u2014 visible from anywhere on Place des Terreaux \u2014 hide a bar and terrace behind them.\n\nFrom up there, you see the H\u00f4tel de Ville, the Croix-Rousse, and Fourvi\u00e8re in a single sweep. The bar opens intermittently, often linked to performances. Opera tickets themselves start at \u20ac10 \u2014 among the cheapest in Europe for a house of this calibre.",im:"A glass of wine behind the muses, the H\u00f4tel de Ville lit gold below, the Fourvi\u00e8re Basilica white against a darkening sky.",t:"Place de la Com\u00e9die, 1st. M\u00e9tro A, H\u00f4tel de Ville. Check opera-lyon.com for bar opening schedule and performance calendar. Tickets from \u20ac10.",c:["free_culture","high_spots"],r:"y",nn:"Op\u00e9ra de Lyon \u2014 Toit-terrasse",ns:"Le bar en terrasse de l\'op\u00e9ra, cach\u00e9 derri\u00e8re les huit statues de muses, avec un panorama que la plupart des visiteurs ne d\u00e9couvrent jamais.",nst:"Jean Nouvel a r\u00e9nov\u00e9 l\'Op\u00e9ra dans les ann\u00e9es 1990, gardant la fa\u00e7ade du XIXe et rempla\u00e7ant tout derri\u00e8re par une immense vo\u00fbte de verre. Les huit muses au sommet cachent un bar et une terrasse.\n\nDe l\u00e0-haut, on voit l\'H\u00f4tel de Ville, la Croix-Rousse et Fourvi\u00e8re d\'un seul regard. Les billets d\'op\u00e9ra commencent \u00e0 10\u20ac.",nt:"Place de la Com\u00e9die, 1er. M\u00e9tro A H\u00f4tel de Ville. Horaires du bar sur opera-lyon.com. Billets d\u00e8s 10\u20ac."},
{id:42,n:"Les murs peints de Lyon",a:"Presqu\'\u00eele",v:["beautiful","free entry","local"],d:60,s:"Over 100 trompe-l\'\u0153il murals across the city \u2014 Lyon is the unofficial mural capital of France, and the best ones are scattered across neighbourhoods most visitors never reach.",st:"Lyon has more painted walls than any other city in France \u2014 over 100 trompe-l\'\u0153il murals scattered across every arrondissement. The Fresque des Lyonnais and the Mur des Canuts get the attention, but the less famous ones are often better: the Biblioth\u00e8que de la Cit\u00e9 on Boulevard de la Croix-Rousse, the fresco at the Mus\u00e9e Tony Garnier in the 8th arrondissement (an entire housing estate painted with utopian visions), the small wall paintings hidden in courtyards and alleyways.\n\nCit\u00e9 Cr\u00e9ation, the Lyon collective responsible for most of them, has been at it since 1978. The city itself has become their canvas.",im:"A building you thought was a library until you got close enough to touch the books and your hand hit flat paint.",t:"Start with the Fresque des Lyonnais (1st arr.) and Mur des Canuts (4th arr.). The Mus\u00e9e Tony Garnier open-air museum (8th, M\u00e9tro D \u00c9tats-Unis) has 25 murals. All free, always visible. The tourist office has a mural map.",c:["free_culture"],r:"g",nn:"Les murs peints de Lyon",ns:"Plus de 100 trompe-l\'\u0153il \u00e0 travers la ville \u2014 Lyon est la capitale officieuse du mur peint en France.",nst:"Lyon a plus de murs peints que toute autre ville de France \u2014 plus de 100 trompe-l\'\u0153il dans tous les arrondissements. Les moins c\u00e9l\u00e8bres sont souvent les meilleurs : la Biblioth\u00e8que de la Cit\u00e9 sur le Boulevard de la Croix-Rousse, le Mus\u00e9e Tony Garnier dans le 8e.\n\nCit\u00e9 Cr\u00e9ation, le collectif lyonnais, fait \u00e7a depuis 1978. La ville est devenue leur toile.",nt:"Commencez par la Fresque des Lyonnais (1er) et le Mur des Canuts (4e). Mus\u00e9e Tony Garnier (8e, M\u00e9tro D \u00c9tats-Unis) : 25 fresques. Tout gratuit. Plan des murs \u00e0 l\'office de tourisme."},
{id:43,n:"Serres du Parc de la T\u00eate d\'Or",a:"T\u00eate d\'Or",v:["beautiful","quiet","free entry"],d:30,s:"Tropical greenhouses inside Lyon\'s largest park \u2014 orchids, palms, cacti, and humid warmth even in January. Free.",st:"The greenhouses of the Parc de la T\u00eate d\'Or were built in the late 19th century and contain tropical and subtropical plant collections that would justify a museum price elsewhere. Palms, orchids, carnivorous plants, ferns the size of small trees, and a cactus collection that spans a continent. The warmth and humidity hit you the moment you walk in.\n\nIn winter, the contrast between the grey Lyon sky outside and the dense, warm green inside is almost hallucinogenic. They are completely free, open daily, and almost nobody visits on weekday mornings.",im:"Steam on the glass, the smell of wet earth and tropical leaves, a palm overhead, and the Lyon winter grey visible through condensation on the windows.",t:"Inside Parc de la T\u00eate d\'Or, near the botanical garden. Free, open daily. M\u00e9tro A, Mass\u00e9na. Best in winter when you need the warmth.",c:["free_culture","parks","nature"],r:"g",nn:"Serres du Parc de la T\u00eate d\'Or",ns:"Serres tropicales dans le plus grand parc de Lyon \u2014 orchid\u00e9es, palmiers, cactus et chaleur humide m\u00eame en janvier. Gratuit.",nst:"Les serres du Parc de la T\u00eate d\'Or ont \u00e9t\u00e9 construites au XIXe si\u00e8cle et contiennent des collections tropicales qui justifieraient un prix d\'entr\u00e9e ailleurs. Palmiers, orchid\u00e9es, plantes carnivores, foug\u00e8res g\u00e9antes, cactus.\n\nEn hiver, le contraste entre le gris lyonnais dehors et le vert dense et chaud dedans est presque hallucitoire. Gratuites, ouvertes tous les jours.",nt:"Dans le Parc de la T\u00eate d\'Or, pr\u00e8s du jardin botanique. Gratuit, ouvert tous les jours. M\u00e9tro A Mass\u00e9na. Id\u00e9al en hiver."},
{id:44,n:"M\u00e9morial de la prison Montluc",a:"Part-Dieu",v:["history","quiet","free entry"],d:45,s:"The actual prison where Jean Moulin, the children of Izieu, and 9,000 others were held by the Gestapo before deportation or execution.",st:"Lyon was the capital of the French Resistance, and Montluc was its darkest address. After the Germans invaded the southern zone in November 1942, they placed this military prison under Klaus Barbie\'s direct control. Individual cells designed for one person held up to eight. Prisoners were transported to Barbie\'s interrogation headquarters on Avenue Berthelot for torture.\n\nThe prison is preserved almost exactly as it was. The cells, the corridors, the courtyard, the execution wall \u2014 all unchanged. The silence inside is total. On 24 August 1944, the remaining prisoners were freed \u2014 partly by Resistance intervention, partly because the guards fled. Lyon was liberated ten days later.",im:"A cell, four square metres, the names scratched into the wall, the knowledge that eight people slept in this room.",t:"4 Rue Jeanne Hachette, 3rd. Free. Guided tours available \u2014 check memorial-montluc.fr. Combine with CHRD (14 Avenue Berthelot, 7th) \u2014 the actual building where Barbie conducted interrogations.",c:["history_big","scary"],r:"g",nn:"M\u00e9morial de la prison Montluc",ns:"La prison o\u00f9 Jean Moulin, les enfants d\'Izieu et 9 000 autres furent d\u00e9tenus par la Gestapo avant d\u00e9portation ou ex\u00e9cution.",nst:"Lyon \u00e9tait la capitale de la R\u00e9sistance fran\u00e7aise, et Montluc en \u00e9tait l\'adresse la plus sombre. Apr\u00e8s l\'invasion de la zone sud en novembre 1942, les Allemands plac\u00e8rent cette prison sous le contr\u00f4le direct de Klaus Barbie. Des cellules pour une personne en contenaient huit.\n\nLa prison est conserv\u00e9e presque intacte. Le silence y est total. Le 24 ao\u00fbt 1944, les derniers prisonniers furent lib\u00e9r\u00e9s.",nt:"4 rue Jeanne Hachette, 3e. Gratuit. Visites guid\u00e9es sur memorial-montluc.fr. \u00c0 combiner avec le CHRD (14 av. Berthelot, 7e)."},
{id:45,n:"Traboules de la R\u00e9sistance",a:"Croix-Rousse",v:["history","hidden","free entry"],d:45,s:"The network of hidden passageways through apartment buildings \u2014 used by silk workers in the 19th century and by the Resistance to move between safe houses under German occupation.",st:"Lyon has about 500 traboules \u2014 covered passages cutting through buildings, connecting one street to another via internal courtyards and staircases. They were originally built so silk workers could transport fabric to the river without getting it wet. During the German occupation, the Resistance used them to move between safe houses, evade patrols, and transport documents and weapons.\n\nThe longest runs between 54 Rue Saint-Jean and 27 Rue du B\u0153uf in Vieux Lyon. In Croix-Rousse, the Cour des Voraces at 9 Place Colbert is where Resistance fighters escaped via a monumental external staircase. Most traboules are in private buildings \u2014 the doors are often unlocked during the day, but you\'re walking through people\'s homes. Be quiet. Close the doors behind you.",im:"Pushing open a heavy wooden door on a busy street, stepping into a silent stone courtyard with a Renaissance staircase spiralling upward, emerging on a completely different street.",t:"Lyon tourist office publishes a free traboule map (Place Bellecour). Best concentration: Vieux Lyon (Rue Saint-Jean / Rue du B\u0153uf) and Pentes de la Croix-Rousse. Open ~7am\u20137:30pm. Free. Respect the residents.",c:["history_big","hidden"],r:"g",nn:"Traboules de la R\u00e9sistance",ns:"Le r\u00e9seau de passages secrets \u00e0 travers les immeubles \u2014 utilis\u00e9 par les canuts au XIXe si\u00e8cle et par la R\u00e9sistance pendant l\'occupation allemande.",nst:"Lyon compte environ 500 traboules \u2014 des passages couverts \u00e0 travers les immeubles. Elles servaient aux canuts pour transporter la soie sans la mouiller. Pendant l\'occupation, la R\u00e9sistance les utilisait pour se d\u00e9placer entre planques, \u00e9viter les patrouilles et transporter documents et armes.\n\nLa Cour des Voraces \u00e0 la Croix-Rousse est o\u00f9 les r\u00e9sistants s\'\u00e9chappaient par un escalier monumental.",nt:"Plan gratuit des traboules \u00e0 l\'office de tourisme (Place Bellecour). Vieux Lyon et Pentes de la Croix-Rousse. ~7h\u201319h30. Gratuit. Respectez les habitants."},
{id:46,n:"Tour m\u00e9tallique de Fourvi\u00e8re",a:"Fourvi\u00e8re",v:["weird","history","free entry"],d:10,s:"A mini Eiffel Tower on the Fourvi\u00e8re hill, built in 1894 as a deliberate secular counter-monument to the Basilica next door.",st:"The Basilica of Notre-Dame de Fourvi\u00e8re was built as a statement of Catholic faith. The secular, republican city council was not thrilled. So they helped finance an 85-metre steel tower right next to it \u2014 a deliberate counterpoint, a monument to reason and progress in the face of religious authority. The tower was modelled on the Eiffel Tower, built five years earlier.\n\nIt\'s now used as a telecommunications antenna and is not open to the public, but it stands there on the skyline, a permanent architectural argument between church and state that neither side has conceded in 130 years.",im:"Two monuments on the same hilltop \u2014 one praising God, the other praising engineering \u2014 and neither one willing to come down.",t:"Visible from everywhere in Lyon. Not open to the public. Best viewed from the Presqu\'\u00eele or the Croix-Rousse. The Basilica next door is open and free.",c:["weird","history_big","nerd"],r:"g",nn:"Tour m\u00e9tallique de Fourvi\u00e8re",ns:"Une mini Tour Eiffel sur Fourvi\u00e8re, construite en 1894 comme contre-monument la\u00efc d\u00e9lib\u00e9r\u00e9 face \u00e0 la Basilique.",nst:"La Basilique \u00e9tait une d\u00e9claration de foi catholique. Le conseil municipal r\u00e9publicain la\u00efc n\'\u00e9tait pas ravi. Alors ils ont financ\u00e9 une tour d\'acier de 85 m\u00e8tres juste \u00e0 c\u00f4t\u00e9 \u2014 un contrepoint d\u00e9lib\u00e9r\u00e9, un monument \u00e0 la raison.\n\nElle est maintenant une antenne de t\u00e9l\u00e9communication, ferm\u00e9e au public, mais elle reste sur la ligne d\'horizon \u2014 un argument architectural permanent entre \u00c9glise et \u00c9tat.",nt:"Visible de partout \u00e0 Lyon. Pas ouverte au public. La Basilique \u00e0 c\u00f4t\u00e9 est ouverte et gratuite."},
{id:47,n:"Le Gros Caillou",a:"Croix-Rousse",v:["weird","free entry"],d:10,s:"A massive boulder sitting at the end of the Croix-Rousse boulevard, dug up during funicular construction in 1861 \u2014 an Alpine erratic deposited here by a glacier.",st:"When engineers were excavating for the Croix-Rousse funicular in 1861, they hit an enormous boulder \u2014 a piece of Alpine rock that had been carried here by a glacier during the last ice age and deposited on the hill where it waited, underground, for roughly 140,000 years.\n\nThey hauled it to the surface and placed it at the eastern end of the Boulevard de la Croix-Rousse, where it sits like a geological non sequitur. The viewpoint beside it has a good view over the Rh\u00f4ne valley and the Alps. Nobody can explain why they decided to display it. But it\'s been there ever since, and the Croix-Rousse would feel wrong without it.",im:"A boulder the size of a car, sitting on a boulevard, surrounded by apartment buildings, 140,000 years old and completely unexplained.",t:"Eastern end of Boulevard de la Croix-Rousse, near the Rh\u00f4ne-side viewpoint. Free, always there. M\u00e9tro C to Croix-Rousse, then walk east. Good combined with the market.",c:["weird"],r:"g",nn:"Le Gros Caillou",ns:"Un \u00e9norme rocher au bout du boulevard de la Croix-Rousse, d\u00e9terr\u00e9 lors de la construction du funiculaire en 1861 \u2014 un bloc erratique alpin d\u00e9pos\u00e9 ici par un glacier.",nst:"En 1861, des ing\u00e9nieurs creusant pour le funiculaire ont touch\u00e9 un \u00e9norme rocher \u2014 un morceau de roche alpine transport\u00e9 ici par un glacier pendant la derni\u00e8re p\u00e9riode glaciaire, il y a environ 140 000 ans.\n\nIls l\'ont hiss\u00e9 \u00e0 la surface et plac\u00e9 au bout du boulevard, o\u00f9 il reste comme un non-sens g\u00e9ologique. Personne ne peut expliquer pourquoi ils ont d\u00e9cid\u00e9 de l\'exposer.",nt:"Bout est du Boulevard de la Croix-Rousse. Gratuit, toujours l\u00e0. M\u00e9tro C Croix-Rousse puis marcher vers l\'est."},
{id:48,n:"Aqueduc du Gier \u2014 Vestiges",a:"Beyond Lyon",v:["history","hidden","free entry"],d:20,s:"Remnants of the longest Roman aqueduct that supplied Lugdunum \u2014 86 kilometres from the Gier valley, with arches still standing in suburban Lyon.",st:"Lugdunum was served by four Roman aqueducts. The longest \u2014 the Aqueduct of the Gier \u2014 ran 86 kilometres from the Pilat mountains to the Fourvi\u00e8re hill, crossing valleys on arched bridges and tunnelling through hills. Sections of it are still standing.\n\nThe most accessible remnants are in Chaponost (20 minutes from Lyon by car or bus), where a line of Roman arches marches across open fields \u2014 a fragment of engineering that supplied water to a city of 50,000 people two thousand years ago. Other fragments survive in Beaunant, Sainte-Foy-l\u00e8s-Lyon, and even in the 5th arrondissement of Lyon itself.",im:"A line of Roman arches in a field outside a suburb, two thousand years old, still standing, still aligned, still carrying the memory of water.",t:"Chaponost remnants: Bus 12 from Lyon to Chaponost-Plaine, then 10-min walk. Free, always visible. The arches in Beaunant are also accessible. Closer fragments survive along Rue Roger Radisson in the 5th arrondissement.",c:["history_big","nerd","day_trips"],r:"g",nn:"Aqueduc du Gier \u2014 Vestiges",ns:"Vestiges du plus long aqueduc romain qui alimentait Lugdunum \u2014 86 kilom\u00e8tres, avec des arches encore debout en banlieue lyonnaise.",nst:"Lugdunum \u00e9tait aliment\u00e9e par quatre aqueducs romains. Le plus long \u2014 l\'aqueduc du Gier \u2014 parcourait 86 km depuis les monts du Pilat. Des sections sont encore debout.\n\nLes vestiges les plus accessibles sont \u00e0 Chaponost, o\u00f9 une ligne d\'arches romaines traverse des champs ouverts \u2014 un fragment d\'ing\u00e9nierie qui alimentait une ville de 50 000 habitants il y a deux mill\u00e9naires.",nt:"Vestiges de Chaponost : Bus 12, puis 10 min \u00e0 pied. Gratuit. D\'autres fragments rue Roger Radisson dans le 5e."},
{id:49,n:"Cour des Voraces",a:"Croix-Rousse",v:["history","hidden","free entry"],d:10,s:"A monumental six-storey external staircase inside a Croix-Rousse courtyard \u2014 where silk workers revolted in 1831 and Resistance fighters escaped during the occupation.",st:"At 9 Place Colbert, push open the door and step into the Cour des Voraces \u2014 a narrow courtyard dominated by a six-storey stone staircase built into the exterior wall. The word \u00abvoraces\u00bb means \u00abthe voracious ones\u00bb \u2014 the name of the mutual aid society of silk workers (mutuellistes) who lived here.\n\nIn November 1831, the Canuts of Lyon revolted against their employers in one of the first workers\' uprisings in industrial Europe. The Cour des Voraces was one of their strongholds. A century later, Resistance fighters used the same staircase to escape German patrols \u2014 the courtyard connects to multiple streets through traboules running in different directions.",im:"A narrow courtyard, a stone staircase climbing six storeys on the outside of the building, the echo of footsteps that have been running up these stairs for two hundred years.",t:"9 Place Colbert, 1st arrondissement. Free, usually open during daytime hours. Part of the Croix-Rousse traboule circuit. Be quiet \u2014 people live here.",c:["history_big","hidden"],r:"g",nn:"Cour des Voraces",ns:"Un escalier monumental de six \u00e9tages dans une cour de la Croix-Rousse \u2014 o\u00f9 les canuts se r\u00e9volt\u00e8rent en 1831 et les r\u00e9sistants s\'\u00e9chapp\u00e8rent pendant l\'occupation.",nst:"Au 9 Place Colbert, poussez la porte pour d\u00e9couvrir la Cour des Voraces \u2014 une cour \u00e9troite domin\u00e9e par un escalier de pierre de six \u00e9tages. Les \u00abvoraces\u00bb \u00e9taient la soci\u00e9t\u00e9 d\'entraide des canuts.\n\nEn 1831, les canuts se r\u00e9volt\u00e8rent ici dans l\'un des premiers soul\u00e8vements ouvriers d\'Europe industrielle. Un si\u00e8cle plus tard, les r\u00e9sistants utilisaient le m\u00eame escalier pour \u00e9chapper aux patrouilles.",nt:"9 Place Colbert, 1er. Gratuit, ouvert en journ\u00e9e. Circuit des traboules de la Croix-Rousse. Silence \u2014 des gens vivent ici."},
{id:50,n:"Passerelle du Coll\u00e8ge",a:"Presqu\'\u00eele",v:["beautiful","quiet","free entry"],d:10,s:"The pedestrian footbridge over the Rh\u00f4ne that catches the light better than any other bridge in Lyon \u2014 especially at dusk when the water turns gold.",st:"Lyon has many bridges, but this narrow pedestrian footbridge connecting the Presqu\'\u00eele to the Guilloti\u00e8re has something the others don\'t: it catches the sunset perfectly. The metal railings frame the river in both directions, and on summer evenings the water beneath turns from grey to gold to orange.\n\nPeople stop in the middle to take photos, lean on the railing, or just stand and watch the light change. It takes about two minutes to cross. Most people spend fifteen.",im:"Standing in the middle of a footbridge, the Rh\u00f4ne turning gold beneath you, Fourvi\u00e8re catching the last sun to the west, the H\u00f4tel-Dieu\'s dome glowing on the far bank.",t:"Between Quai de la Pêcherie (Presqu\'\u00eele) and Quai Victor Augagneur (Guilloti\u00e8re). Free, always open. Best at sunset, May\u2013September.",c:["high_spots"],r:"g",nn:"Passerelle du Coll\u00e8ge",ns:"La passerelle pi\u00e9tonne sur le Rh\u00f4ne qui attrape la lumi\u00e8re mieux que tout autre pont de Lyon \u2014 surtout au cr\u00e9puscule.",nst:"Lyon a beaucoup de ponts, mais cette passerelle pi\u00e9tonne \u00e9troite a quelque chose que les autres n\'ont pas : elle attrape le coucher de soleil parfaitement. Les rampes m\u00e9talliques encadrent le fleuve, et les soirs d\'\u00e9t\u00e9 l\'eau passe du gris \u00e0 l\'or.\n\nLes gens s\'arr\u00eatent au milieu pour regarder la lumi\u00e8re changer. Il faut deux minutes pour traverser. La plupart en passent quinze.",nt:"Entre quai de la P\u00eacherie et quai Victor Augagneur. Gratuit, toujours ouvert. Id\u00e9al au coucher du soleil, mai\u2013septembre."},
{id:51,n:"Berges du Rh\u00f4ne \u2014 The River Promenade",a:"Guilloti\u00e8re",v:["beautiful","local","free entry"],d:30,s:"Five kilometres of car-free cycling and running along the Rh\u00f4ne, from the T\u00eate d\'Or to the Confluence \u2014 reclaimed from a car park in 2007.",st:"The Berges du Rh\u00f4ne were a car park until 2007. Now they\'re one of the best urban promenades in France \u2014 five kilometres of flat, paved path along the left bank of the Rh\u00f4ne, lined with trees and grass terraces. Runners, cyclists, rollerbladers, and families share the space, and in summer the pop-up bars and food trucks turn the embankment into a linear festival.\n\nThe ride from T\u00eate d\'Or to Confluence takes about 25 minutes at a leisurely pace on a V\u00e9lo\'v. In the evening, the grass banks fill with picnickers and the light on the river turns the whole thing gold.",im:"Rolling south on a V\u00e9lo\'v, the Rh\u00f4ne to your right, the Guilloti\u00e8re skyline to your left, a runner passing you, a family picnicking on the grass bank.",t:"Pick up a V\u00e9lo\'v at any station along the river (first 30 minutes free with day pass). The path runs from Parc de la T\u00eate d\'Or south to the Confluence. Bring a lock \u2014 docking stations fill up in popular areas. Free.",c:["sport","parks","nature"],r:"g",nn:"Berges du Rh\u00f4ne",ns:"Cinq kilom\u00e8tres de v\u00e9lo et de course \u00e0 pied le long du Rh\u00f4ne, sans voitures, de la T\u00eate d\'Or \u00e0 la Confluence.",nst:"Les Berges du Rh\u00f4ne \u00e9taient un parking jusqu\'en 2007. Aujourd\'hui c\'est l\'une des plus belles promenades urbaines de France \u2014 cinq kilom\u00e8tres de piste plate le long de la rive gauche du Rh\u00f4ne, bord\u00e9e d\'arbres et de terrasses herbeuses.\n\nLe trajet de la T\u00eate d\'Or \u00e0 la Confluence prend environ 25 minutes \u00e0 v\u00e9lo. Le soir, les berges se remplissent de pique-niqueurs et la lumi\u00e8re sur le fleuve devient dor\u00e9e.",nt:"V\u00e9lo\'v \u00e0 toute station (30 premi\u00e8res minutes gratuites avec pass journalier). Piste de la T\u00eate d\'Or au sud vers la Confluence. Gratuit."},
{id:52,n:"V\u00e9lo\'v \u2014 The Bike-Share That Works",a:"Presqu\'\u00eele",v:["local","free entry"],d:45,s:"Over 400 stations, 5,000 bikes, first 30 minutes free \u2014 Lyon\'s bike-share system is the fastest way to move between neighbourhoods.",st:"V\u00e9lo\'v launched in 2005 \u2014 two years before Paris copied the idea with V\u00e9lib\'. Over 400 stations cover the city and inner suburbs, with bikes available 24 hours a day. A day ticket costs \u20ac2 and makes the first 30 minutes of each trip free. In a compact city like Lyon, 30 minutes gets you almost anywhere.\n\nThe bikes are heavy and indestructible \u2014 designed to survive drunk students and cobblestoned hills. There are now electric V\u00e9lo\'v mixed into the fleet, which make the Croix-Rousse slopes survivable. The trick is learning which stations are always full and which are always empty. After a week, you\'ll know.",im:"Docking a red V\u00e9lo\'v at a station along the Sa\u00f4ne, the green light confirming it\'s locked, already thinking about the next ride.",t:"Day pass: \u20ac2 (first 30 min free per trip). Buy at any station terminal or via the V\u00e9lo\'v app. Stations every 300 metres in the centre. Electric bikes available. Return before 30 minutes to avoid charges.",c:["sport"],r:"g",nn:"V\u00e9lo\'v",ns:"Plus de 400 stations, 5 000 v\u00e9los, les 30 premi\u00e8res minutes gratuites \u2014 le moyen le plus rapide de se d\u00e9placer entre les quartiers.",nst:"V\u00e9lo\'v a lanc\u00e9 en 2005 \u2014 deux ans avant que Paris ne copie l\'id\u00e9e. Plus de 400 stations couvrent la ville, avec des v\u00e9los disponibles 24h/24. Un ticket journalier co\u00fbte 2\u20ac et rend les 30 premi\u00e8res minutes de chaque trajet gratuites.\n\nLes v\u00e9los sont lourds et indestructibles. Il y a maintenant des V\u00e9lo\'v \u00e9lectriques dans la flotte, ce qui rend les pentes de la Croix-Rousse supportables.",nt:"Pass jour : 2\u20ac (30 min gratuites par trajet). Achat en borne ou via l\'appli V\u00e9lo\'v. Stations tous les 300 m au centre. V\u00e9los \u00e9lectriques disponibles."},
{id:53,n:"Basilique Notre-Dame de Fourvi\u00e8re",a:"Fourvi\u00e8re",v:["famous","history","beautiful"],d:45,s:"Lyon\'s most visible landmark \u2014 a white confection of towers and crenellations on the Fourvi\u00e8re hill that looks more Byzantine fortress than French church.",st:"The Basilica was built between 1872 and 1884 as a statement of Catholic faith after Lyon was spared during the Franco-Prussian War. The upper church is a riot of gold mosaic, marble, and stained glass \u2014 intentionally overwhelming, designed to make the faithful feel small and the Republic feel inadequate. The lower crypt is quieter and more interesting: Romanesque, stone, contemplative.\n\nThe rooftop terrace \u2014 accessible by guided tour in summer \u2014 offers a 360-degree panorama of the city, the two rivers, and the Alps. The view from the esplanade in front is free and almost as good. The Metallic Tower next door \u2014 built by secular republicans as a deliberate counterpoint \u2014 stands as a permanent architectural argument between church and state.",im:"Standing on the esplanade, the city spread below you in a map of terracotta roofs, two rivers cutting silver lines through it, the Alps a white wall on the horizon.",t:"Funicular from Vieux Lyon (TCL ticket, \u20ac1.90) or walk up the Mont\u00e9e Nicolas de Lange. Free entry. Rooftop tours: check fourviere.org. Best at sunset. The view alone is worth the climb.",c:["greatest_hits","history_big"],r:"g",nn:"Basilique Notre-Dame de Fourvi\u00e8re",ns:"Le monument le plus visible de Lyon \u2014 une confiserie blanche de tours et de cr\u00e9neaux sur la colline de Fourvi\u00e8re.",nst:"La Basilique a \u00e9t\u00e9 construite entre 1872 et 1884 comme affirmation de la foi catholique apr\u00e8s que Lyon fut \u00e9pargn\u00e9e pendant la guerre franco-prussienne. L\'\u00e9glise sup\u00e9rieure est un d\u00e9luge de mosa\u00efques dor\u00e9es, de marbre et de vitraux. La crypte est plus calme et plus int\u00e9ressante : romane, en pierre, contemplative.\n\nLa terrasse sur le toit offre un panorama \u00e0 360\u00b0 sur la ville, les deux fleuves et les Alpes. La vue depuis l\'esplanade est gratuite et presque aussi belle.",nt:"Funiculaire depuis Vieux Lyon (ticket TCL, 1,90\u20ac) ou mont\u00e9e Nicolas de Lange \u00e0 pied. Entr\u00e9e gratuite. Visites du toit : voir fourviere.org. Id\u00e9al au coucher du soleil."},
{id:54,n:"Vieux Lyon",a:"Vieux Lyon",v:["famous","history","beautiful"],d:60,s:"One of the largest Renaissance districts in Europe \u2014 500 buildings from the 15th and 16th centuries, almost demolished in the 1960s for a motorway.",st:"Vieux Lyon was nearly destroyed. In the 1960s, the plan was to bulldoze the quarter and build a motorway through it. Andr\u00e9 Malraux, then Minister of Culture, stopped it, and the neighbourhood became one of the first urban conservation zones in France. What survived is one of the largest Renaissance districts in Europe \u2014 over 500 buildings from the 15th and 16th centuries, narrow streets, traboules threading through courtyards, and a cathedral with an astronomical clock.\n\nRue Saint-Jean is touristy during the day \u2014 bouchons with English menus, souvenir shops, guided groups. But walk into the side streets or come back at dusk and it empties out. The traboule run between 54 Rue Saint-Jean and 27 Rue du B\u0153uf is the longest in the city \u2014 you push through heavy doors, cross silent courtyards with Renaissance staircases, and emerge on a different street.",im:"Pushing open a heavy door on Rue du B\u0153uf, stepping into a stone courtyard with a spiral staircase four storeys high, the sound of the street disappearing behind you.",t:"M\u00e9tro D, Vieux Lyon. Free to wander. Best traboule run: 54 Rue Saint-Jean to 27 Rue du B\u0153uf. Saint-Jean Cathedral is free and open daily. For bouchons, look for the \u2018Bouchons Lyonnais\u2019 certification label \u2014 if the menu has pizza, keep walking.",c:["greatest_hits","history_big","neighbourhoods"],r:"g",nn:"Vieux Lyon",ns:"L\'un des plus grands quartiers Renaissance d\'Europe \u2014 500 b\u00e2timents des XVe et XVIe si\u00e8cles, presque d\u00e9moli dans les ann\u00e9es 1960 pour une autoroute.",nst:"Vieux Lyon a failli dispara\u00eetre. Dans les ann\u00e9es 1960, le projet \u00e9tait de raser le quartier pour construire une autoroute. Andr\u00e9 Malraux l\'a emp\u00each\u00e9, et le quartier est devenu l\'une des premi\u00e8res zones de protection urbaine de France.\n\nLa traboule entre le 54 rue Saint-Jean et le 27 rue du B\u0153uf est la plus longue de la ville \u2014 vous poussez des portes lourdes, traversez des cours silencieuses avec des escaliers Renaissance, et ressortez dans une autre rue.",nt:"M\u00e9tro D, Vieux Lyon. Gratuit. Meilleur circuit de traboules : 54 rue Saint-Jean \u00e0 27 rue du B\u0153uf. Cath\u00e9drale gratuite. Pour les bouchons, cherchez le label \u2018Bouchons Lyonnais\u2019."},
{id:55,n:"Th\u00e9\u00e2tres Romains de Fourvi\u00e8re",a:"Fourvi\u00e8re",v:["famous","history","beautiful","free entry"],d:45,s:"Lyon was the capital of Roman Gaul, and these two theatres on the Fourvi\u00e8re hill \u2014 one from 15 BCE \u2014 are the proof. You can sit where Romans sat.",st:"Lugdunum was the capital of the three Gauls, and its Grand Th\u00e9\u00e2tre dates to 15 BCE. It seated 10,000 people. The smaller Odéon next to it has a geometric mosaic floor that\'s still intact after two millennia. Neither is behind glass or roped off \u2014 you walk down the stone tiers and sit where Romans sat, the city spread below you.\n\nThe adjacent Mus\u00e9e Gallo-Romain is built into the hillside, descending underground through the archaeological layers. The Claudian Table \u2014 a bronze tablet inscribed with a speech by Emperor Claudius to the Roman Senate, found in Lyon \u2014 is here. In summer, the Nuits de Fourvi\u00e8re festival fills the Grand Th\u00e9\u00e2tre with theatre, music, and dance under the stars.",im:"Sitting on a stone tier carved 2,000 years ago, the city below you, the Basilica above, the strange sensation that the person who sat here last might have spoken Latin.",t:"Free access to the theatres, always open during daylight. Museum: \u20ac4, free under 18. Funicular to Fourvi\u00e8re, then 5-minute walk. Combine with the Basilica and Jardin des Curiosit\u00e9s for a full half-day on the hill.",c:["greatest_hits","history_big","free_culture"],r:"g",nn:"Th\u00e9\u00e2tres Romains de Fourvi\u00e8re",ns:"Lyon \u00e9tait la capitale de la Gaule romaine, et ces deux th\u00e9\u00e2tres sur la colline de Fourvi\u00e8re \u2014 le premier date de 15 av. J.-C. \u2014 en sont la preuve.",nst:"Lugdunum \u00e9tait la capitale des trois Gaules, et son Grand Th\u00e9\u00e2tre date de 15 av. J.-C. L\'Od\u00e9on voisin conserve un sol en mosa\u00efque g\u00e9om\u00e9trique intact apr\u00e8s deux mill\u00e9naires. Rien n\'est sous verre \u2014 vous descendez les gradins de pierre et vous vous asseyez o\u00f9 les Romains se sont assis.\n\nLe Mus\u00e9e Gallo-Romain adjacent descend dans la colline \u00e0 travers les couches arch\u00e9ologiques. La Table Claudienne \u2014 une tablette de bronze avec un discours de l\'empereur Claude \u2014 y est expos\u00e9e.",nt:"Acc\u00e8s libre aux th\u00e9\u00e2tres, toujours ouverts en journ\u00e9e. Mus\u00e9e : 4\u20ac, gratuit \u2013 18 ans. Funiculaire Fourvi\u00e8re puis 5 min \u00e0 pied."},
{id:56,n:"Mus\u00e9e des Confluences",a:"Confluence",v:["famous","beautiful"],d:90,s:"A deconstructivist cloud of glass and steel at the point where the Rh\u00f4ne and Sa\u00f4ne merge \u2014 the building alone justifies the visit.",st:"The Mus\u00e9e des Confluences sits at the southern tip of the Presqu\'\u00eele, where the Rh\u00f4ne and Sa\u00f4ne finally meet. The building \u2014 a massive deconstructivist crystal of glass and steel \u2014 is one of the most striking pieces of architecture in France. Inside, the permanent collection spans natural history, anthropology, and science, with displays that are genuinely inventive: a full whale skeleton suspended over a room about evolution, an Egyptian mummy next to a discussion of death rituals across cultures.\n\nThe free rooftop terrace has the best river-and-Alps view in the city. On clear days the chain of the Alps stretches across the horizon with Mont Blanc at its centre. There\'s a caf\u00e9 up there, and nobody is asking you to buy a ticket to reach it.",im:"Standing at the point where two rivers become one, construction cranes behind you, a building that looks like it was designed by someone who doesn\'t believe in right angles, and the Alps on the horizon.",t:"86 Quai Perrache. Tram T1, Mus\u00e9e des Confluences. \u20ac12 adults, free under 18. Tue\u2013Sun 10:30am\u20136:30pm. Terrace and caf\u00e9 free without ticket. The ice cream at the Comptoir Gourmand (level 4) is good.",c:["greatest_hits"],r:"g",nn:"Mus\u00e9e des Confluences",ns:"Un nuage d\u00e9constructiviste de verre et d\'acier au confluent du Rh\u00f4ne et de la Sa\u00f4ne \u2014 le b\u00e2timent seul justifie la visite.",nst:"Le mus\u00e9e se dresse \u00e0 la pointe sud de la Presqu\'\u00eele, o\u00f9 le Rh\u00f4ne et la Sa\u00f4ne se rencontrent enfin. Le b\u00e2timent est l\'une des pi\u00e8ces d\'architecture les plus frappantes de France. La collection permanente couvre l\'histoire naturelle, l\'anthropologie et les sciences.\n\nLa terrasse gratuite sur le toit offre la meilleure vue fleuve-et-Alpes de la ville. Par temps clair, la cha\u00eene des Alpes s\'\u00e9tire \u00e0 l\'horizon avec le Mont Blanc au centre.",nt:"86 quai Perrache. Tram T1, Mus\u00e9e des Confluences. 12\u20ac adultes, gratuit \u2013 18 ans. Mar\u2013dim 10h30\u201318h30. Terrasse et caf\u00e9 gratuits sans billet."},
{id:57,n:"Parc de la T\u00eate d\'Or",a:"T\u00eate d\'Or",v:["famous","beautiful","free entry","local"],d:60,s:"117 hectares, a lake with rowboats, a rose garden with 16,000 plants, greenhouses with tropical species, a free zoo \u2014 and Lyonnais treat it as an extension of their living rooms.",st:"One of the largest urban parks in France \u2014 117 hectares designed in the 1850s with the kind of mature-tree grandeur that only 170 years of growth can produce. A lake with rowboats, a botanical garden, a rose garden with 16,000 plants that peaks in June, greenhouses with tropical species, and a free zoo where deer and giraffes roam in open enclosures.\n\nLyonnais don\'t visit the T\u00eate d\'Or. They live in it. Saturday mornings the paths fill with runners and families. Sunday afternoons the grass fills with picnics. In the evening, the light through the plane trees turns everything amber. The p\u00e9tanque terrains near the north gate are where the city\'s most serious casual sport happens.",im:"The rose garden in June \u2014 16,000 plants blooming at once, the scent arriving before the colour does, a couple photographing a single perfect bloom.",t:"Free, always open. M\u00e9tro A, Mass\u00e9na. Rose garden peaks June. Greenhouses open daily, free. Rowing boats for hire on the lake in summer. P\u00e9tanque terrains near Porte des Enfants du Rh\u00f4ne.",c:["greatest_hits","parks","nature"],r:"g",nn:"Parc de la T\u00eate d\'Or",ns:"117 hectares, un lac avec des barques, une roseraie de 16 000 plantes, des serres tropicales, un zoo gratuit \u2014 et les Lyonnais le traitent comme une extension de leur salon.",nst:"L\'un des plus grands parcs urbains de France \u2014 117 hectares dessin\u00e9s dans les ann\u00e9es 1850 avec la grandeur que seuls 170 ans de croissance d\'arbres peuvent produire. Un lac, un jardin botanique, une roseraie de 16 000 plants qui culmine en juin, des serres tropicales, et un zoo gratuit.\n\nLes Lyonnais ne visitent pas la T\u00eate d\'Or. Ils y vivent. Le samedi matin, les all\u00e9es se remplissent de coureurs et de familles. Le dimanche apr\u00e8s-midi, l\'herbe se couvre de pique-niques.",nt:"Gratuit, toujours ouvert. M\u00e9tro A Mass\u00e9na. Roseraie au sommet en juin. Serres gratuites. Barques sur le lac en \u00e9t\u00e9."},
{id:58,n:"Cath\u00e9drale Saint-Jean-Baptiste",a:"Vieux Lyon",v:["famous","history","beautiful","free entry"],d:30,s:"300 years to build, Romanesque at one end and Gothic at the other, with a 14th-century astronomical clock that still computes the date of Easter.",st:"The cathedral took 300 years to build \u2014 12th to 15th century \u2014 and the result is a building that shifts from Romanesque at the apse to Gothic at the nave, as if you\'re walking through time. The 14th-century astronomical clock in the north transept computes the date of Easter, the position of the sun and moon, and the rise of certain stars. At noon, 2pm, 3pm, and 4pm, a small mechanical show activates \u2014 brief, about two minutes, but mesmerising if you time your visit.\n\nThe stained glass is 13th-century original, and in the right light the colours thrown across the stone floor are extraordinary. The building is free, it\'s usually quiet midmorning, and it has the particular calm of a place that took twelve generations to complete.",im:"Light through 13th-century glass thrown across a stone floor, blue and red and gold, the clock ticking behind you, a building that started Romanesque and ended Gothic because three centuries is a long time to make up your mind.",t:"Place Saint-Jean, 5th arr. Free. Open daily 8:15am\u20137:45pm. Clock show at noon, 2pm, 3pm, 4pm \u2014 about 2 minutes. Worth timing your visit for.",c:["greatest_hits","history_big","free_culture"],r:"g",nn:"Cath\u00e9drale Saint-Jean-Baptiste",ns:"300 ans de construction, romane d\'un c\u00f4t\u00e9 et gothique de l\'autre, avec une horloge astronomique du XIVe qui calcule encore la date de P\u00e2ques.",nst:"La cath\u00e9drale a mis 300 ans \u00e0 se construire \u2014 du XIIe au XVe si\u00e8cle \u2014 et le r\u00e9sultat est un b\u00e2timent qui passe du roman au gothique. L\'horloge astronomique du XIVe si\u00e8cle calcule la date de P\u00e2ques, la position du soleil et de la lune. \u00c0 midi, 14h, 15h et 16h, un petit spectacle m\u00e9canique se d\u00e9clenche.\n\nLes vitraux du XIIIe si\u00e8cle sont d\'origine, et sous la bonne lumi\u00e8re, les couleurs projet\u00e9es sur le sol de pierre sont extraordinaires.",nt:"Place Saint-Jean, 5e. Gratuit. Ouvert 8h15\u201319h45. Spectacle de l\'horloge \u00e0 12h, 14h, 15h, 16h \u2014 environ 2 minutes."},
{id:59,n:"F\u00eate des Lumi\u00e8res",a:"Presqu\'\u00eele",v:["famous","beautiful","local"],d:120,s:"Every December, Lyon fills with light \u2014 professional artists projecting animations onto churches, city halls, and riversides. The whole city walks the streets. It\'s free and spectacular.",st:"Every December 8th \u2014 and the three nights around it \u2014 Lyon fills with light installations on the facades of its buildings. The tradition dates to 1852, when Lyonnais placed candles in their windows to honour the Virgin Mary. It\'s now one of the largest light festivals in the world: professional artists project animations, patterns, and stories onto churches, city halls, and riversides.\n\nThe entire city walks the streets. Four million visitors across four nights. It\'s free, it\'s spectacular, and it\'s bitterly cold. The biggest installations \u2014 Place des Terreaux, Place Bellecour, the Cath\u00e9drale Saint-Jean \u2014 draw the densest crowds. The smaller, residential installations in the Croix-Rousse and on side streets are often more beautiful and far less crushed.",im:"The facade of the Cath\u00e9drale Saint-Jean alive with projected colour, the crowd silent for a moment, breath visible in the cold air, the entire city turned into a gallery.",t:"Usually December 5\u20138 or 7\u201310, depending on the year. Free. Go on a weeknight for smaller crowds. Check fetedeslumieres.lyon.fr for programme and map. Dress very warm \u2014 you\'ll be standing still outside for hours.",c:["greatest_hits"],r:"g",nn:"F\u00eate des Lumi\u00e8res",ns:"Chaque d\u00e9cembre, Lyon se remplit de lumi\u00e8re \u2014 des artistes projettent des animations sur les \u00e9glises, les mairies et les rives. Toute la ville marche. Gratuit et spectaculaire.",nst:"Chaque 8 d\u00e9cembre \u2014 et les trois nuits autour \u2014 Lyon se couvre d\'installations lumineuses sur les fa\u00e7ades. La tradition remonte \u00e0 1852, quand les Lyonnais pla\u00e7aient des bougies \u00e0 leurs fen\u00eatres pour honorer la Vierge Marie. C\'est aujourd\'hui l\'un des plus grands festivals de lumi\u00e8re au monde.\n\nQuatre millions de visiteurs en quatre nuits. Les plus petites installations dans la Croix-Rousse et les rues lat\u00e9rales sont souvent plus belles et bien moins \u00e9cras\u00e9es que les grandes places.",nt:"G\u00e9n\u00e9ralement du 5 au 8 ou du 7 au 10 d\u00e9cembre. Gratuit. En semaine pour moins de monde. Programme sur fetedeslumieres.lyon.fr. Habillez-vous tr\u00e8s chaudement."},
{id:60,n:"Centre d\'Histoire de la R\u00e9sistance et de la D\u00e9portation",a:"Guilloti\u00e8re",v:["famous","history"],d:120,s:"Housed in the actual building where Klaus Barbie ran his Gestapo interrogation headquarters. The basement rooms where prisoners were tortured are preserved.",st:"This museum is in the building where it happened. 14 Avenue Berthelot was Klaus Barbie\'s headquarters during the occupation \u2014 the place where Resistance fighters and Jews were brought for interrogation. The basement rooms where prisoners were tortured are preserved. The permanent exhibition traces the war, the Vichy regime, and the Resistance through documents, photographs, film footage, and testimonies.\n\nA documentary about the 1987 Barbie trial is shown in a small theatre. The audience exits in silence. Lyon was the capital of the French Resistance. This museum explains what that cost.\n\nCombine with the Montluc Prison Memorial \u2014 the actual prison where Jean Moulin, Marc Bloch, and the children of Izieu were held before deportation \u2014 for the full picture.",im:"A basement corridor, the walls close, the light fluorescent, the knowledge that real people were brought down these stairs and some of them never came back up.",t:"14 Avenue Berthelot, 7th arr. M\u00e9tro B, Jean Mac\u00e9. \u20ac8 adults, free under 18. Audio guides in English. Allow 2 hours. Combine with Montluc Prison Memorial (4 Rue Jeanne Hachette, free).",c:["greatest_hits","history_big"],r:"g",nn:"Centre d\'Histoire de la R\u00e9sistance et de la D\u00e9portation",ns:"Install\u00e9 dans le b\u00e2timent m\u00eame o\u00f9 Klaus Barbie dirigeait son quartier g\u00e9n\u00e9ral d\'interrogatoire de la Gestapo. Les salles de torture au sous-sol sont pr\u00e9serv\u00e9es.",nst:"Ce mus\u00e9e occupe le b\u00e2timent o\u00f9 tout s\'est pass\u00e9. Le 14 avenue Berthelot \u00e9tait le QG de Barbie pendant l\'occupation. Les salles de torture au sous-sol sont conserv\u00e9es. L\'exposition permanente retrace la guerre, Vichy et la R\u00e9sistance.\n\nUn documentaire sur le proc\u00e8s Barbie de 1987 est projet\u00e9 dans un petit cin\u00e9ma. Le public en sort en silence. Lyon \u00e9tait la capitale de la R\u00e9sistance. Ce mus\u00e9e explique ce que cela a co\u00fbt\u00e9.",nt:"14 avenue Berthelot, 7e. M\u00e9tro B Jean Mac\u00e9. 8\u20ac adultes, gratuit \u2013 18 ans. Audioguides en anglais. Pr\u00e9voir 2 heures. Combiner avec le M\u00e9morial Montluc (gratuit)."},
{id:61,n:"Institut Lumi\u00e8re",a:"Monplaisir",v:["famous","history"],d:60,s:"The family home where Auguste and Louis Lumi\u00e8re built the world\'s first movie camera. The street where the first film was shot is a five-minute walk away.",st:"On 19 March 1895, the Lumi\u00e8re brothers filmed workers leaving their factory on Rue du Premier Film in Lyon. That footage \u2014 46 seconds long \u2014 is considered the first motion picture ever made. The brothers\' family villa, an Art Nouveau mansion in the Monplaisir neighbourhood, is now a museum tracing the invention of cinema through early equipment, original film reels, and the Cin\u00e9matographe itself \u2014 the device that changed everything.\n\nThe Institut also houses a cinema that screens classic and independent films. The garden behind the villa is quiet and shaded, with a bust of Louis looking slightly smug about what he started. The factory at 25 Rue du Premier Film is a five-minute walk \u2014 there\'s a plaque, but the building is not open.",im:"Standing in the room where the Cin\u00e9matographe was assembled, the actual device behind glass, thinking about the fact that every film you\'ve ever watched traces back to this house.",t:"M\u00e9tro D, Monplaisir-Lumi\u00e8re. \u20ac8 adults, \u20ac7 reduced. Tue\u2013Sun, 10am\u20136:30pm. The factory (25 Rue du Premier Film) is a 5-minute walk.",c:["greatest_hits","nerd"],r:"g",nn:"Institut Lumi\u00e8re",ns:"La maison familiale o\u00f9 Auguste et Louis Lumi\u00e8re ont construit la premi\u00e8re cam\u00e9ra du monde. La rue du premier film est \u00e0 cinq minutes \u00e0 pied.",nst:"Le 19 mars 1895, les fr\u00e8res Lumi\u00e8re ont film\u00e9 les ouvriers sortant de leur usine rue du Premier Film. Ces 46 secondes sont consid\u00e9r\u00e9es comme le premier film de l\'histoire. La villa familiale Art Nouveau est aujourd\'hui un mus\u00e9e retra\u00e7ant l\'invention du cin\u00e9ma.\n\nL\'Institut abrite aussi un cin\u00e9ma qui projette des films classiques et ind\u00e9pendants. Le jardin arri\u00e8re est calme, avec un buste de Louis qui a l\'air l\u00e9g\u00e8rement satisfait de ce qu\'il a d\u00e9clench\u00e9.",nt:"M\u00e9tro D Monplaisir-Lumi\u00e8re. 8\u20ac adultes, 7\u20ac r\u00e9duit. Mar\u2013dim 10h\u201318h30. L\'usine (25 rue du Premier Film) est \u00e0 5 min \u00e0 pied."},
{id:62,n:"Nuits de Fourvi\u00e8re",a:"Fourvi\u00e8re",v:["famous","beautiful","history"],d:120,s:"A summer arts festival in a 2,000-year-old Roman theatre \u2014 theatre, dance, music, and film under the open sky, every year since 1946.",st:"The Th\u00e9\u00e2tre Antique de Fourvi\u00e8re was built around 15 BCE and seats about 4,500. Every summer, from late May to late July, it hosts theatre, dance, music, and film under the open sky. The programme ranges from classical orchestras to hip-hop, from Shakespeare to contemporary circus, and the setting is extraordinary \u2014 you\'re watching a performance in a Roman ruin, the city spread out below you, the stars overhead.\n\nThe festival has been running since 1946. Tickets range from \u20ac10 to \u20ac45 \u2014 among the best value for live performance anywhere in France. Some shows sell out months ahead. The stone seats are not forgiving \u2014 bring a cushion.",im:"A cello concerto in a stone amphitheatre built before Christ, the lights of Lyon flickering below, the Basilica lit white above you.",t:"Programme published ~March at nuitsdefourviere.com. Tickets \u20ac10\u2013\u20ac45. Funicular from Vieux Lyon to Fourvi\u00e8re. Bring a cushion. Late May\u2013late July.",c:["greatest_hits"],r:"g",nn:"Nuits de Fourvi\u00e8re",ns:"Un festival d\'arts d\'\u00e9t\u00e9 dans un th\u00e9\u00e2tre romain de 2 000 ans \u2014 th\u00e9\u00e2tre, danse, musique et cin\u00e9ma en plein air, chaque ann\u00e9e depuis 1946.",nst:"Le Th\u00e9\u00e2tre Antique de Fourvi\u00e8re a \u00e9t\u00e9 construit vers 15 av. J.-C. Chaque \u00e9t\u00e9, de fin mai \u00e0 fin juillet, il accueille th\u00e9\u00e2tre, danse, musique et cin\u00e9ma en plein air. Le programme va de l\'orchestre classique au hip-hop, de Shakespeare au cirque contemporain.\n\nLe festival existe depuis 1946. Les billets vont de 10\u20ac \u00e0 45\u20ac. Les gradins de pierre sont impitoyables \u2014 apportez un coussin.",nt:"Programme publi\u00e9 ~mars sur nuitsdefourviere.com. Billets 10\u20ac\u201345\u20ac. Funiculaire depuis Vieux Lyon. Fin mai\u2013fin juillet. Apportez un coussin."},
{id:63,n:"Le M\u00e2chon \u2014 Lyon\'s Morning Feast",a:"Presqu\'\u00eele",v:["local","weird","hidden"],d:60,s:"The traditional Lyonnais 9am breakfast: offal, sausage, tripe, grattons, and Beaujolais wine. Before most cities have finished their coffee.",st:"The m\u00e2chon comes from the Canuts \u2014 the silk workers of Croix-Rousse \u2014 who started their shifts before dawn and needed a serious meal by 9am. The word comes from \u2018m\u00e2cher\u2019 (to chew), and what they chewed was pork in every form: grattons (pork scratchings), andouillette (tripe sausage), tablier de sapeur (breaded beef tripe), and cervelle de canut (herbed fromage blanc \u2014 \u2018silk worker\'s brains,\u2019 which contains no brains at all). All washed down with Beaujolais or M\u00e2connais wine. In the morning.\n\nSeveral bouchons still serve the m\u00e2chon, usually by reservation. It is not a meal for the cautious. It is heavy, meaty, extremely Lyonnais, and the kind of thing that makes you understand why this city takes food more seriously than anywhere else in France.",im:"9:30am, a checked tablecloth, a glass of red wine, a plate of grattons glistening with fat, a waiter who has seen this surprise on a foreigner\'s face before.",t:"Book 24h ahead. Chez Daniel et Denise (Cr\u00e9qui: Mon\u2013Sat from 9am; Saint-Jean: Wed\u2013Sun from 9am). La Meuni\u00e8re: Tue\u2013Sun from 9am. Expect \u20ac20\u2013\u20ac35 per person.",c:["food","weird"],r:"g",nn:"Le M\u00e2chon",ns:"Le petit-d\u00e9jeuner lyonnais traditionnel de 9h : abats, saucisson, tripes, grattons et Beaujolais. Avant que les autres villes aient fini leur caf\u00e9.",nst:"Le m\u00e2chon vient des Canuts, les ouvriers en soie de la Croix-Rousse, qui commen\u00e7aient avant l\'aube et avaient besoin d\'un vrai repas \u00e0 9h. Le mot vient de \u2018m\u00e2cher\u2019, et ce qu\'ils m\u00e2chaient, c\'\u00e9tait du porc sous toutes ses formes : grattons, andouillette, tablier de sapeur, cervelle de canut.\n\nPlusieurs bouchons servent encore le m\u00e2chon, g\u00e9n\u00e9ralement sur r\u00e9servation. Ce n\'est pas un repas pour les timides. C\'est lourd, carn\u00e9, extr\u00eamement lyonnais.",nt:"R\u00e9server 24h \u00e0 l\'avance. Chez Daniel et Denise (Cr\u00e9qui : lun\u2013sam d\u00e8s 9h). La Meuni\u00e8re : mar\u2013dim d\u00e8s 9h. Compter 20\u20ac\u201335\u20ac par personne."},
{id:64,n:"Jardin Rosa Mir",a:"Croix-Rousse",v:["hidden","weird","beautiful","quiet"],d:20,s:"A secret garden built by a Spanish exile in his own courtyard \u2014 every surface covered in shells, stones, and coral, like a cathedral made by one man with a glue gun and a vision.",st:"Jules Senis was a Spanish bricklayer who fled Franco\'s Spain and settled in Lyon. After surviving throat cancer in the 1950s, he began building a garden in the courtyard of his apartment building at 87 Grande Rue de la Croix-Rousse. He spent 25 years covering every surface \u2014 walls, pillars, arches \u2014 with seashells, pebbles, coral, and fragments of stone, creating an intricate miniature landscape that looks like a cross between a grotto and a Gaud\u00ed fever dream.\n\nSenis worked alone, in silence, for a quarter of a century. He died in 1983. The garden was classified as a historical monument in 1987. It\'s open to the public on Saturday mornings and occasionally during the week, and it sits behind an ordinary apartment door that gives no hint of what\'s inside.",im:"Pushing open a door on a busy street and finding a courtyard where every wall, every pillar, every arch is encrusted with shells and stones \u2014 one man\'s 25-year answer to mortality.",t:"87 Grande Rue de la Croix-Rousse, 4th arr. Open Sat 10am\u2013noon (Apr\u2013Nov), and some weekday afternoons \u2014 check jardinrosamir.com. Free. M\u00e9tro C, Croix-Rousse. Easy to miss \u2014 the entrance is an ordinary apartment door.",c:["weird","free_culture"],r:"g",nn:"Jardin Rosa Mir",ns:"Un jardin secret construit par un exil\u00e9 espagnol dans sa propre cour \u2014 chaque surface couverte de coquillages, pierres et corail.",nst:"Jules Senis \u00e9tait un ma\u00e7on espagnol qui a fui l\'Espagne de Franco. Apr\u00e8s avoir surv\u00e9cu \u00e0 un cancer de la gorge dans les ann\u00e9es 1950, il a commenc\u00e9 \u00e0 construire un jardin dans la cour de son immeuble. Il a pass\u00e9 25 ans \u00e0 recouvrir chaque surface de coquillages, galets et corail.\n\nSenis a travaill\u00e9 seul, en silence, pendant un quart de si\u00e8cle. Le jardin a \u00e9t\u00e9 class\u00e9 monument historique en 1987.",nt:"87 Grande Rue de la Croix-Rousse, 4e. Ouvert sam 10h\u201312h (avr\u2013nov). Gratuit. M\u00e9tro C Croix-Rousse. L\'entr\u00e9e est une porte d\'immeuble ordinaire."},
{id:65,n:"Parc des Hauteurs",a:"Fourvi\u00e8re",v:["quiet","beautiful","free entry"],d:30,s:"A walking path along the Fourvi\u00e8re ridge connecting the Basilica to the Saint-Just neighbourhood \u2014 the whole city below you, almost nobody else on the path.",st:"The Parc des Hauteurs is not really a park \u2014 it\'s a green corridor running along the crest of the Fourvi\u00e8re hill, connecting the area behind the Basilica to the Loyasse cemetery and the Saint-Just neighbourhood. The path winds through trees and opens periodically onto views of the city that are better than the famous esplanade because there\'s nobody else looking at them.\n\nThe Passerelle des Quatre Vents \u2014 a metal footbridge suspended above the old railway cutting \u2014 is part of the route. Below it, the disused Loyasse railway line has been reclaimed by vegetation, creating a narrow strip of near-wilderness on the hillside. The walk takes about 30 minutes end to end and delivers you at the Jardin des Curiosit\u00e9s.",im:"A narrow path through trees on a hilltop, the city appearing and disappearing through gaps in the canopy, the sound of traffic far below, the sense of being above everything.",t:"Start at the Basilica esplanade and walk south along the ridge. Follow signs for Parc des Hauteurs / Jardins du Rosaire. The path ends near the funicular station at Saint-Just. Free, always open.",c:["parks","nature","high_spots"],r:"g",nn:"Parc des Hauteurs",ns:"Un sentier le long de la cr\u00eate de Fourvi\u00e8re reliant la Basilique au quartier Saint-Just \u2014 toute la ville en contrebas, presque personne d\'autre sur le chemin.",nst:"Le Parc des Hauteurs n\'est pas vraiment un parc \u2014 c\'est un corridor vert le long de la cr\u00eate de Fourvi\u00e8re. Le chemin serpente entre les arbres et s\'ouvre p\u00e9riodiquement sur des vues de la ville meilleures que la c\u00e9l\u00e8bre esplanade, parce que personne d\'autre ne les regarde.\n\nLa Passerelle des Quatre Vents, une passerelle m\u00e9tallique suspendue au-dessus de l\'ancienne voie ferr\u00e9e, fait partie du parcours. La promenade dure environ 30 minutes et vous d\u00e9pose au Jardin des Curiosit\u00e9s.",nt:"D\u00e9part de l\'esplanade de la Basilique, marcher vers le sud le long de la cr\u00eate. Suivre les panneaux Parc des Hauteurs. Arriv\u00e9e pr\u00e8s du funiculaire Saint-Just. Gratuit."},
{id:66,n:"Cimeti\u00e8re de Loyasse",a:"Fourvi\u00e8re",v:["quiet","hidden","history"],d:30,s:"Lyon\'s hilltop cemetery where the city\'s great and forgotten rest side by side \u2014 Edouard Herriot, the Lumi\u00e8re brothers, and 200 years of Lyonnais history carved in stone.",st:"Loyasse sits on the Fourvi\u00e8re ridge, perched above the city like a stone village of the dead. The Lumi\u00e8re brothers are buried here. So is Edouard Herriot, Lyon\'s most famous mayor. So are Resistance fighters, silk merchants, and thousands of Lyonnais whose names mean nothing to visitors and everything to the city.\n\nThe cemetery is beautiful in the way that only 19th-century French cemeteries are \u2014 monumental tombs, overgrown paths, stone angels with mossy faces, and views of the Sa\u00f4ne valley through gaps in the walls. It\'s not P\u00e8re Lachaise. Nobody comes here looking for famous graves. That\'s what makes it peaceful.",im:"A stone angel with moss on its face, the Sa\u00f4ne visible through a gap in the cemetery wall, the city below making the noise that cities make, and up here only the wind.",t:"Chemin de Loyasse, 5th arr. Free, open daily during daylight hours. Reachable from Parc des Hauteurs walk or funicular to Saint-Just. The Lumi\u00e8re family tomb is in the older section on the east side.",c:["weird","history_big"],r:"g",nn:"Cimeti\u00e8re de Loyasse",ns:"Le cimeti\u00e8re de Fourvi\u00e8re o\u00f9 les grands et les oubli\u00e9s de Lyon reposent c\u00f4te \u00e0 c\u00f4te \u2014 les fr\u00e8res Lumi\u00e8re, Herriot, et 200 ans d\'histoire.",nst:"Loyasse est perch\u00e9 sur la cr\u00eate de Fourvi\u00e8re, au-dessus de la ville comme un village de pierre des morts. Les fr\u00e8res Lumi\u00e8re y sont enterr\u00e9s. Edouard Herriot aussi. Et des r\u00e9sistants, des marchands de soie, et des milliers de Lyonnais.\n\nLe cimeti\u00e8re est beau comme seuls les cimeti\u00e8res fran\u00e7ais du XIXe si\u00e8cle le sont \u2014 tombes monumentales, chemins envahis, anges de pierre moussus, et vues sur la vall\u00e9e de la Sa\u00f4ne.",nt:"Chemin de Loyasse, 5e. Gratuit, ouvert en journ\u00e9e. Accessible depuis le Parc des Hauteurs ou funiculaire Saint-Just. Tombe des Lumi\u00e8re dans la section est."},
{id:67,n:"Parc de Gerland",a:"Confluence",v:["quiet","local","free entry"],d:30,s:"A 80-hectare park in the southern city where Lyonnais families go on Sundays \u2014 a skatepark, community gardens, sports pitches, and a wild-planted meadow that most visitors never find.",st:"Gerland was industrial until recently \u2014 the neighbourhood that had the abattoirs, the football stadium, and not much reason to visit. The Parc de Gerland changed that. Eighty hectares of green space designed by Michel Corajoud, with areas that range from manicured lawns to deliberately wild meadows planted with native grasses and wildflowers.\n\nThe skatepark on the western edge is one of the best in the city. The community gardens along the Rh\u00f4ne are tended by local families. On Sunday afternoons, the whole park fills with the sound of footballs, children, and the particular French activity of doing nothing in a public space with great seriousness.",im:"A wild meadow in the middle of a city, poppies and cornflowers between the grass stems, a jogger on the path behind you, the distant sound of a football hitting a crossbar.",t:"Tram T1 to Halle Tony Garnier or M\u00e9tro B Stade de Gerland. Free, always open. The skatepark is near the Halle Tony Garnier entrance. The wild meadow section is south of the main lawns.",c:["parks","nature"],r:"g",nn:"Parc de Gerland",ns:"Un parc de 80 hectares dans le sud de la ville o\u00f9 les familles lyonnaises vont le dimanche \u2014 skatepark, jardins partag\u00e9s, terrains de sport, et une prairie sauvage.",nst:"Gerland \u00e9tait industriel jusqu\'\u00e0 r\u00e9cemment. Le Parc de Gerland a chang\u00e9 les choses. 80 hectares d\'espaces verts, des pelouses entretenues aux prairies sauvages plant\u00e9es de gramin\u00e9es et de fleurs locales.\n\nLe skatepark est l\'un des meilleurs de la ville. Les jardins partag\u00e9s le long du Rh\u00f4ne sont entretenus par des familles du quartier. Le dimanche, tout le parc se remplit.",nt:"Tram T1 Halle Tony Garnier ou M\u00e9tro B Stade de Gerland. Gratuit. Skatepark c\u00f4t\u00e9 Halle Tony Garnier. Prairie sauvage au sud."},
{id:68,n:"Mont\u00e9e du Gourguillon",a:"Vieux Lyon",v:["hidden","history","quiet"],d:20,s:"The steepest street in Lyon \u2014 a cobblestoned climb between Vieux Lyon and Fourvi\u00e8re that most tourists never find because the funicular is right there.",st:"The Mont\u00e9e du Gourguillon is one of the oldest streets in Lyon and one of the steepest in France. It climbs from the back of Vieux Lyon to the Fourvi\u00e8re hill in a series of sharp switchbacks, flanked by 15th-century houses with sagging shutters and iron balconies. Almost nobody uses it because the funicular is fifty metres away and does the same job without the cardiovascular effort.\n\nThe reward at the top is a view over the rooftops of Vieux Lyon that you can\'t get from the funicular station. Halfway up, at the hairpin bend, there\'s a small shrine to the Virgin \u2014 one of many that dot the hillside, remnants of a time when climbing to Fourvi\u00e8re was an act of devotion rather than tourism.",im:"Cobblestones worn smooth by five centuries of feet, a shuttered window above you, the sound of your own breathing on the steep bits, and the sudden reveal of the Vieux Lyon rooftops behind you.",t:"Starts at Place du Petit-Coll\u00e8ge in Vieux Lyon. Steep but short \u2014 about 10 minutes up. Free. Wear decent shoes. Connects to the Parc des Hauteurs at the top.",c:["high_spots","history_big"],r:"g",nn:"Mont\u00e9e du Gourguillon",ns:"La rue la plus raide de Lyon \u2014 une mont\u00e9e pav\u00e9e entre Vieux Lyon et Fourvi\u00e8re que les touristes ne trouvent jamais parce que le funiculaire est juste \u00e0 c\u00f4t\u00e9.",nst:"La Mont\u00e9e du Gourguillon est l\'une des rues les plus anciennes de Lyon et l\'une des plus raides de France. Elle grimpe depuis le fond de Vieux Lyon jusqu\'\u00e0 Fourvi\u00e8re en lacets serr\u00e9s, bord\u00e9e de maisons du XVe si\u00e8cle.\n\nLa r\u00e9compense en haut est une vue sur les toits du Vieux Lyon qu\'on ne peut pas avoir depuis la gare du funiculaire.",nt:"D\u00e9part Place du Petit-Coll\u00e8ge, Vieux Lyon. Raide mais court \u2014 environ 10 min. Gratuit. Bonnes chaussures. Rejoint le Parc des Hauteurs."},
{id:69,n:"Place Sathonay",a:"Presqu\'\u00eele",v:["hidden","quiet","local","free entry"],d:15,s:"A shaded square between Terreaux and Croix-Rousse that most visitors walk past \u2014 plane trees, a fountain, children running, nobody in a hurry.",st:"Place Sathonay sits just north of Place des Terreaux, on the border between the Presqu\'\u00eele and the slopes of the Croix-Rousse. It\'s shaded by enormous plane trees, has a fountain in its centre, and is surrounded by caf\u00e9s with terraces that fill up at lunch and stay full until dark. Almost no tourists end up here because Place des Terreaux, one block south, absorbs all the foot traffic.\n\nThe square has the energy of a village square dropped into the middle of a city. Children play around the fountain. Elderly men sit on benches. The caf\u00e9 waiters know the regulars by name. On warm evenings, the entire neighbourhood seems to converge here.",im:"Plane tree shade, a fountain splashing, two old men on a bench arguing about something that happened in 1987, a child running in circles, and a cold beer on a caf\u00e9 table.",t:"Between Place des Terreaux and the Croix-Rousse slopes. M\u00e9tro A, H\u00f4tel de Ville, then 3 minutes north. Free. Best on a warm evening.",c:["parks"],r:"g",nn:"Place Sathonay",ns:"Une place ombrag\u00e9e entre Terreaux et la Croix-Rousse que les visiteurs ne trouvent pas \u2014 platanes, fontaine, enfants qui courent, personne press\u00e9.",nst:"La Place Sathonay est juste au nord de la Place des Terreaux. Ombrag\u00e9e par d\'\u00e9normes platanes, avec une fontaine au centre et des caf\u00e9s dont les terrasses se remplissent \u00e0 midi. Presque aucun touriste n\'y arrive parce que la Place des Terreaux absorbe tout le passage.\n\nLa place a l\'\u00e9nergie d\'une place de village pos\u00e9e au milieu d\'une grande ville.",nt:"Entre Place des Terreaux et les pentes de la Croix-Rousse. M\u00e9tro A H\u00f4tel de Ville, 3 min vers le nord. Gratuit."},
{id:70,n:"Parc de la Cerisaie",a:"Croix-Rousse",v:["hidden","quiet","beautiful","free entry"],d:20,s:"A sloping park on the Croix-Rousse hillside with a panoramic terrace that rivals Fourvi\u00e8re \u2014 except there\'s almost nobody here.",st:"The Parc de la Cerisaie clings to the eastern slope of the Croix-Rousse, behind the boulevard. It\'s a terraced garden with old cherry trees \u2014 cerisaie means cherry orchard \u2014 and a viewpoint terrace that looks east over the Rh\u00f4ne valley, the Part-Dieu tower, and on clear days the Alps.\n\nAlmost nobody comes here. The park is tucked behind residential streets with no signage, no caf\u00e9, no reason for a casual visitor to find it. Which is exactly why the people who do know about it guard it carefully. On a May evening, the cherry trees are in bloom and the light on the Alps is pink.",im:"Cherry blossoms above you, the Rh\u00f4ne valley below, the Alps on the horizon turning pink, and the realisation that you\'ve found something the guidebooks didn\'t mention.",t:"Enter from Rue Chazière or Rue Philippe de Lassalle, 4th arr. M\u00e9tro C Croix-Rousse, then 5-minute walk east. Free, always open. Best in May when the cherry trees bloom.",c:["parks","high_spots"],r:"g",nn:"Parc de la Cerisaie",ns:"Un parc en pente sur la Croix-Rousse avec une terrasse panoramique qui rivalise avec Fourvi\u00e8re \u2014 sauf qu\'il n\'y a presque personne.",nst:"Le Parc de la Cerisaie s\'accroche au versant est de la Croix-Rousse. C\'est un jardin en terrasses avec de vieux cerisiers et un b\u00e9lv\u00e9d\u00e8re qui regarde vers l\'est sur la vall\u00e9e du Rh\u00f4ne, la tour Part-Dieu, et les Alpes.\n\nPresque personne ne vient. Le parc est cach\u00e9 derri\u00e8re des rues r\u00e9sidentielles sans signalisation. En mai, les cerisiers sont en fleur et la lumi\u00e8re sur les Alpes est rose.",nt:"Entr\u00e9e par rue Chazi\u00e8re ou rue Philippe de Lassalle, 4e. M\u00e9tro C Croix-Rousse, 5 min \u00e0 l\'est. Gratuit. Id\u00e9al en mai pour les cerisiers."},
{id:71,n:"Passage Thiaffait \u2014 Village des Cr\u00e9ateurs",a:"Croix-Rousse",v:["hidden","local"],d:20,s:"A traboule turned into an open-air village of independent designers \u2014 jewellers, ceramicists, textile artists working in the old silk-worker passageways.",st:"Passage Thiaffait is a traboule that was converted in the early 2000s into an open-air village of independent designers and artisans. The passageway \u2014 which runs between Rue Ren\u00e9 Leynaud and Mont\u00e9e de la Grande C\u00f4te on the Croix-Rousse slopes \u2014 now houses about twenty studios and boutiques: jewellery, ceramics, textiles, leather goods, illustration, and fashion, all designed and made on-site.\n\nThe connection to the neighbourhood\'s history is deliberate. The Canuts made silk in these buildings; their successors make other things in the same spaces. On the first Thursday of each month, the Village des Cr\u00e9ateurs holds an evening open house \u2014 wine, conversation, and the chance to watch people make things with their hands.",im:"A narrow passageway between stone walls, a jeweller\'s workshop visible through a glass door, handmade ceramics on a shelf, the sense that this building has always housed people who make things.",t:"19 Rue Ren\u00e9 Leynaud, 1st arr. M\u00e9tro C Croix-Rousse. Studios open Tue\u2013Sat, hours vary. Free to browse. First Thursday evening: open house. Check villagedescreateurs.com.",c:["neighbourhoods","free_culture"],r:"g",nn:"Passage Thiaffait \u2014 Village des Cr\u00e9ateurs",ns:"Une traboule transform\u00e9e en village de cr\u00e9ateurs ind\u00e9pendants \u2014 bijoutiers, c\u00e9ramistes, artistes textiles dans les anciens passages des Canuts.",nst:"Le Passage Thiaffait est une traboule convertie en village de cr\u00e9ateurs et d\'artisans ind\u00e9pendants. Une vingtaine d\'ateliers-boutiques : bijoux, c\u00e9ramique, textiles, maroquinerie, illustration et mode, tout con\u00e7u et fabriqu\u00e9 sur place.\n\nLe lien avec l\'histoire du quartier est d\u00e9lib\u00e9r\u00e9. Les Canuts faisaient de la soie ici ; leurs successeurs fabriquent autre chose dans les m\u00eames espaces.",nt:"19 rue Ren\u00e9 Leynaud, 1er. M\u00e9tro C Croix-Rousse. Ateliers ouverts mar\u2013sam. Gratuit pour fl\u00e2ner. Premier jeudi du mois : soir\u00e9e portes ouvertes."},
{id:72,n:"Quais de Sa\u00f4ne \u2014 Evening Walk",a:"Vieux Lyon",v:["beautiful","quiet","romantic_water","free entry"],d:30,s:"The most beautiful urban river walk in Lyon \u2014 from Saint-Paul to the Passerelle du Palais de Justice, the facades of Vieux Lyon reflected in the water.",st:"The Sa\u00f4ne is the quieter of Lyon\'s two rivers \u2014 narrower, slower, more intimate. The quays on its west bank, between the Gare de Saint-Paul and the Palais de Justice, are lined with Renaissance facades that reflect in the water on still evenings. The passerelles \u2014 pedestrian bridges \u2014 cross at intervals, each one offering a different frame of the riverscape.\n\nThis walk is best done slowly, at dusk, when the stone turns warm and the buildings on the opposite bank begin to light up. The Passerelle du Palais de Justice, strung with cables like a harp, is the most photogenic bridge in the city. At its centre, the view north towards the Fourvi\u00e8re hill is extraordinary.",im:"The Sa\u00f4ne running smooth as glass, Renaissance facades doubled in the water, the Fourvi\u00e8re hill catching the last light, a barge passing slowly beneath the passerelle.",t:"Start at M\u00e9tro A Gare de Saint-Paul, walk south along Quai de Bondy / Quai Fulchiron. End at Passerelle du Palais de Justice. About 20 minutes. Free. Best at dusk.",c:["romantic_water","nature"],r:"g",nn:"Quais de Sa\u00f4ne \u2014 Promenade du soir",ns:"La plus belle promenade fluviale urbaine de Lyon \u2014 de Saint-Paul au Palais de Justice, les fa\u00e7ades du Vieux Lyon reflet\u00e9es dans l\'eau.",nst:"La Sa\u00f4ne est le plus calme des deux fleuves de Lyon \u2014 plus \u00e9troite, plus lente, plus intime. Les quais de sa rive ouest sont bord\u00e9s de fa\u00e7ades Renaissance qui se refl\u00e8tent dans l\'eau les soirs calmes.\n\nCette promenade est \u00e0 faire lentement, au cr\u00e9puscule. La Passerelle du Palais de Justice, tendue de c\u00e2bles comme une harpe, est le pont le plus photog\u00e9nique de la ville.",nt:"D\u00e9part M\u00e9tro A Gare de Saint-Paul, longer le quai vers le sud. Arriv\u00e9e Passerelle du Palais de Justice. ~20 min. Gratuit. Id\u00e9al au cr\u00e9puscule."},
{id:73,n:"Place des Terreaux \u2014 Bartholdi Fountain",a:"Presqu\'\u00eele",v:["famous","beautiful","free entry"],d:15,s:"The monumental square at the heart of the Presqu\'\u00eele \u2014 the H\u00f4tel de Ville on one side, the Mus\u00e9e des Beaux-Arts on the other, and a Bartholdi fountain in between.",st:"Place des Terreaux is the civic heart of Lyon. The H\u00f4tel de Ville faces the Mus\u00e9e des Beaux-Arts across a vast square redesigned by Daniel Buren in the 1990s with 69 small fountains flush with the pavement \u2014 children run through them in summer, and the water reflects the buildings at night.\n\nThe big fountain in the centre was sculpted by Fr\u00e9d\u00e9ric Auguste Bartholdi \u2014 the man who built the Statue of Liberty. It was originally designed for Bordeaux, but Lyon bought it. It depicts a chariot pulled by four horses representing rivers rushing towards the sea. Bartholdi\'s other famous work is a thousand times larger, but this one is arguably more beautiful.\n\nDuring the F\u00eate des Lumi\u00e8res, the H\u00f4tel de Ville facade becomes the canvas for the festival\'s most ambitious light projections.",im:"Sixty-nine fountains flush with the pavement, a child running through the jets, the H\u00f4tel de Ville lit gold behind them, and a Bartholdi original in the centre that most people don\'t know is by the same sculptor as Lady Liberty.",t:"M\u00e9tro A, H\u00f4tel de Ville. Free, always open. The fountains are most active in summer. Best at night when lit. The Mus\u00e9e des Beaux-Arts cloister garden, on the east side of the square, is free to enter.",c:["free_culture"],r:"g",nn:"Place des Terreaux \u2014 Fontaine Bartholdi",ns:"La place monumentale au c\u0153ur de la Presqu\'\u00eele \u2014 l\'H\u00f4tel de Ville d\'un c\u00f4t\u00e9, le Mus\u00e9e des Beaux-Arts de l\'autre, et une fontaine de Bartholdi au milieu.",nst:"La Place des Terreaux est le c\u0153ur civique de Lyon. L\'H\u00f4tel de Ville fait face au Mus\u00e9e des Beaux-Arts sur une vaste place redessin\u00e9e par Daniel Buren dans les ann\u00e9es 1990 avec 69 petites fontaines au ras du sol.\n\nLa grande fontaine au centre a \u00e9t\u00e9 sculpt\u00e9e par Bartholdi \u2014 le m\u00eame qui a construit la Statue de la Libert\u00e9. Elle \u00e9tait initialement destin\u00e9e \u00e0 Bordeaux, mais Lyon l\'a achet\u00e9e.",nt:"M\u00e9tro A H\u00f4tel de Ville. Gratuit. Les fontaines sont plus actives en \u00e9t\u00e9. Id\u00e9al la nuit \u00e9clair\u00e9e. Le clo\u00eetre du Mus\u00e9e des Beaux-Arts, c\u00f4t\u00e9 est, est gratuit."},
{id:74,n:"Les Subsistances",a:"Vieux Lyon",v:["hidden","local","free entry"],d:30,s:"A former military supply depot turned into a laboratory for contemporary performance \u2014 circus, dance, theatre, and experimental art, often free, always unpredictable.",st:"Les Subsistances occupies a 17th-century convent that was converted into a military supply depot and then, in 2003, into a laboratory for live performance. The programme is experimental and sometimes baffling: contemporary circus, dance, theatre, installation art, and things that defy categorisation. Some shows are free, others cheap. The outdoor courtyard hosts events in summer.\n\nThe building sits on the banks of the Sa\u00f4ne in the 1st arrondissement, just north of Vieux Lyon. The architecture alone is worth seeing \u2014 stone vaults, industrial additions, and the sense of a place that has been repurposed so many times it\'s lost count. The bar is good and the crowd is the kind of Lyon you don\'t meet at Les Halles.",im:"A stone-vaulted room, an acrobat suspended from the ceiling, an audience of thirty people who came because they trust this place to show them something they haven\'t seen before.",t:"8bis Quai Saint-Vincent, 1st arr. Bus C14 or walk from Gare de Saint-Paul. Many events free or under \u20ac10. Check lessub.com for programme. Bar open on event nights.",c:["free_culture","local"],r:"g",nn:"Les Subsistances",ns:"Un ancien d\u00e9p\u00f4t militaire transform\u00e9 en laboratoire de spectacle vivant \u2014 cirque, danse, th\u00e9\u00e2tre et art exp\u00e9rimental, souvent gratuit.",nst:"Les Subsistances occupent un couvent du XVIIe si\u00e8cle devenu d\u00e9p\u00f4t militaire puis, en 2003, laboratoire de spectacle vivant. La programmation est exp\u00e9rimentale : cirque contemporain, danse, th\u00e9\u00e2tre, installation. Beaucoup de spectacles sont gratuits.\n\nLe b\u00e2timent est au bord de la Sa\u00f4ne, juste au nord du Vieux Lyon. L\'architecture seule vaut le d\u00e9tour \u2014 vo\u00fbtes en pierre, ajouts industriels.",nt:"8bis quai Saint-Vincent, 1er. Bus C14 ou marche depuis Gare de Saint-Paul. Beaucoup d\'\u00e9v\u00e9nements gratuits ou \u00e0 moins de 10\u20ac. Programme sur lessub.com."},
{id:75,n:"Berges de Sa\u00f4ne \u2014 Northern Walk",a:"Sa\u00f4ne Valley",v:["quiet","beautiful","nature","free entry"],d:45,s:"North of the city centre, the Sa\u00f4ne quays become a tree-lined promenade connecting \u00cele Barbe to Vaise \u2014 houseboats, fishermen, and the city falling away behind you.",st:"South of Vieux Lyon, the Sa\u00f4ne is urban \u2014 bridges, restaurants, tourists. North of Saint-Paul, it changes. The quays become tree-lined, the houseboats multiply, and by the time you reach the Pont de l\'\u00cele Barbe, the city feels distant. Fishermen sit on the banks. Joggers pass. The occasional p\u00e9niche \u2014 a converted barge \u2014 has washing on its deck.\n\nThe walk from the Gare de Vaise to \u00cele Barbe takes about 30 minutes along the water. It\'s flat, shaded, and almost entirely used by locals. On summer evenings, some of the p\u00e9niches open as floating bars, but the real pleasure is the walk itself \u2014 the slow river, the plane trees, and the gradual disappearance of traffic noise.",im:"Plane tree shadows on the water, a houseboat with geraniums in the window, a fisherman who hasn\'t moved in an hour, and the city somewhere behind you, no longer your concern.",t:"Start at M\u00e9tro D, Gare de Vaise. Walk north along the Sa\u00f4ne. About 30 minutes to \u00cele Barbe. Free. Return by Bus 31 or 43. Best on a warm evening.",c:["nature","romantic_water","parks"],r:"g",nn:"Berges de Sa\u00f4ne \u2014 Promenade Nord",ns:"Au nord du centre, les quais de Sa\u00f4ne deviennent une promenade bord\u00e9e d\'arbres reliant l\'\u00cele Barbe \u00e0 Vaise \u2014 p\u00e9niches, p\u00eacheurs, et la ville qui s\'\u00e9loigne.",nst:"Au sud du Vieux Lyon, la Sa\u00f4ne est urbaine. Au nord de Saint-Paul, elle change. Les quais deviennent ombrag\u00e9s, les p\u00e9niches se multiplient, et \u00e0 hauteur de l\'\u00cele Barbe, la ville para\u00eet lointaine.\n\nLa marche de la Gare de Vaise \u00e0 l\'\u00cele Barbe prend environ 30 minutes le long de l\'eau. C\'est plat, ombrag\u00e9, et presque exclusivement fr\u00e9quent\u00e9 par les locaux.",nt:"D\u00e9part M\u00e9tro D Gare de Vaise. Marcher vers le nord le long de la Sa\u00f4ne. ~30 min jusqu\'\u00e0 l\'\u00cele Barbe. Gratuit. Retour Bus 31 ou 43."},
{id:76,n:"Tunnel de la Croix-Rousse \u2014 Pedestrian Tube",a:"Croix-Rousse",v:["weird","hidden","free entry"],d:15,s:"A kilometre-long pedestrian tunnel underneath the Croix-Rousse hill, with a permanent sound-and-light installation that turns your walk into an art experience.",st:"The Croix-Rousse road tunnel has a parallel tube reserved for pedestrians and cyclists. It runs for about a kilometre underneath the hill, connecting the Sa\u00f4ne side to the Rh\u00f4ne side. The tunnel has a permanent installation by a consortium of artists \u2014 projections on the walls, sound design, and lighting effects that change with the seasons and the time of day.\n\nWalking through it is strange and wonderful. The temperature drops. The sound changes. The projections move along the walls as you walk. It takes about 12 minutes end to end, and you emerge blinking into a completely different part of the city. Above you, buried in the rock, are the Ar\u00eates de Poisson \u2014 the unexplained tunnels that nobody can explain.",im:"Walking through a tunnel underneath a hill, projections of underwater scenes moving along the walls, the sound of your footsteps echoing, and the knowledge that directly above you are 32 unexplained tunnels from an unknown era.",t:"Entrances on both sides of the hill \u2014 Rue du Sergent Blandan (Sa\u00f4ne side) or Boulevard des Canuts (Rh\u00f4ne side). Open 6am\u201310pm. Free. ~12 minutes to walk through.",c:["weird","free_culture"],r:"g",nn:"Tunnel pi\u00e9ton de la Croix-Rousse",ns:"Un tunnel pi\u00e9ton d\'un kilom\u00e8tre sous la colline de la Croix-Rousse, avec une installation son et lumi\u00e8re permanente.",nst:"Le tunnel routier de la Croix-Rousse a un tube parall\u00e8le r\u00e9serv\u00e9 aux pi\u00e9tons et cyclistes. Il traverse la colline sur environ un kilom\u00e8tre avec une installation artistique permanente \u2014 projections, design sonore, effets lumineux qui changent avec les saisons.\n\nLa travers\u00e9e prend environ 12 minu
