<script>
const P = [

{id:1, n:"Vieux Lyon", a:"Vieux Lyon", v:["history","beautiful"], d:5, s:"Push unlocked doors on Renaissance streets at dawn, before tourists arrive.", st:"Cold stone spirals and courtyard gardens open from the street. Rue du Bœuf smells of centuries-old plaster and morning shade. You push a heavy wooden door and find yourself in someone else's palazzo — a traboule passageway with light falling through a narrow oculus onto stone worn smooth by five centuries of hands.", im:"It's 1550. A silk merchant's wife climbs the spiral staircase in the dark, her candle throwing shadows up the stone walls.", t:"Métro D to Vieux Lyon. Free entry. Go before 9am on Sunday when codes aren't active and the quarter is yours. Wear comfortable shoes for the narrow streets.", c:["history_big","neighbourhoods"], r:"g", nn:"Vieux Lyon", ns:"Franchissez les portes verrouillées des rues Renaissance à l'aube.", nst:"La pierre froide spirale et les jardins des cours s'ouvrent sur la rue. Rue du Bœuf sent la chaux séculaire et l'ombre matinale. Vous poussez une lourde porte en bois et vous vous retrouvez dans un palazzo — une traboule avec la lumière tombant à travers un oculus étroit sur la pierre usée par cinq siècles.", nt:"Métro D jusqu'à Vieux Lyon. Entrée gratuite. Allez avant 9h le dimanche quand les digiccodes ne sont pas activés. Portez des chaussures confortables."},
{id:2, n:"Fourvière Roman Theatre", a:"Fourvière", v:["history","beautiful"], d:10, s:"Two thousand-year-old theatres carved into hillside stone, almost always empty.", st:"You emerge from the funicular and the theatres are suddenly there, cut into the slope like someone scooped out the mountain. Stone tiers rise in concentric circles, weather-worn and perfect. On a clear day the Alps sit on the horizon above the city. The air is thinner here, the light different.", im:"It's 177 AD. An audience of 10,000 sits in these same seats watching a play in Latin, the city spread below them unchanged.", t:"Take funicular (ficelle) from Vieux Lyon — single TCL ticket (€1.90). Free entry. Visit mid-week for empty theatres. June brings Nuits de Fourvière concerts. Bring a jacket — the wind off the Alps is real even in summer.", c:["history_big","high_spots"], r:"g", nn:"Théâtre Romain de Fourvière", ns:"Deux théâtres de deux mille ans creusés dans la pierre de la colline.", nst:"Vous sortez de la ficelle et les théâtres sont là, creusés dans la pente comme si quelqu'un avait évidé la montagne. Les gradins de pierre se lèvent en cercles concentriques. Par beau temps, les Alpes s'assoient à l'horizon au-dessus de la ville.", nt:"Ficelle depuis Vieux Lyon — ticket TCL (1,90€). Entrée gratuite. Venez en semaine pour les théâtres vides. Juin apporte les Nuits de Fourvière. Apportez une veste."},
{id:3, n:"Croix-Rousse Market", a:"Croix-Rousse", v:["local","beautiful"], d:8, s:"Boulevard stretches over a kilometre with vendors your grandmother bought from.", st:"The market spills across the slope — farmers from the Dombes with eggs still warm, a cheese vendor whose family has sold from the same spot for four generations, pralines roses in pink pyramids under a striped awning. The smell is butter and earth and voices overlapping in French. Tuesday dawn: the best light, the fewest tourists.", im:"It's 1680. A silk merchant's wife buys pralines from a confectioner who invented them three weeks ago for the Duc de Praslin.", t:"Métro C to Croix-Rousse or tram T1. Tuesday–Sunday, 6am–1pm. Best on weekday mornings before 9am. Bring cash — some vendors don't take cards. Pralines roses are €8–12 per bag from legitimate makers.", c:["markets","food"], r:"g", nn:"Marché de la Croix-Rousse", ns:"Le boulevard s'étire sur plus d'un kilomètre avec des vendeurs que votre grand-mère achetait.", nst:"Le marché s'écoule sur la pente — des fermiers des Dombes avec des œufs encore chauds, un vendeur de fromage dont la famille vend du même endroit depuis quatre générations, des pralines roses en pyramides roses sous un auvent rayé. L'odeur est le beurre et la terre et les voix qui se chevauchent.", nt:"Métro C vers Croix-Rousse ou tramway T1. Mardi–dimanche, 6h–13h. Mieux en matinées de semaine avant 9h. Apportez de l'espèces. Les vraies pralines roses coûtent 8–12€ par sachet."},
{id:4, n:"Traboules", a:"Vieux Lyon", v:["hidden","history","weird"], d:8, s:"Secret passageways silk workers used, later sheltered Resistance fighters.", st:"You push through a door coded 1234 into a stone corridor lit by a single window. The passage runs through the building interior, emerging on a different street. In Croix-Rousse the traboules are narrower, darker, more labyrinthine. Some still have silk-work equipment in the courtyards, rusting but present.", im:"It's 1943. A Resistance fighter ducks through a traboule on rue Leynaud as Gestapo boots echo on the street behind them.", t:"Vieux Lyon: rue du Bœuf and rue Saint-Jean. Croix-Rousse: rue Leynaud and rue Imbert-Colomès. Visit 7–9am when doors are unlocked. Tourist office sells a map of 40 public traboules (€5). Free entry.", c:["history_big","neighbourhoods","weird"], r:"g", nn:"Traboules", ns:"Les passages secrets que les ouvriers en soie utilisaient, ont abrité plus tard les Résistants.", nst:"Vous poussez une porte codée dans un corridor de pierre éclairé par une seule fenêtre. Le passage traverse l'intérieur du bâtiment, émergeant dans une rue différente. À Croix-Rousse les traboules sont plus étroits, plus sombres, plus labyrinthiques.", nt:"Vieux Lyon: rue du Bœuf et rue Saint-Jean. Croix-Rousse: rue Leynaud et rue Imbert-Colomès. Visitez entre 7–9h quand les portes sont ouvertes. Office de tourisme vend une carte de 40 traboules publiques (5€). Entrée gratuite."},
{id:5, n:"Place Bellecour", a:"Presqu'île", v:["beautiful","free entry"], d:3, s:"Europe's largest square holds the Rhône and Saône in its relief sculpture.", st:"The square opens impossibly wide — all terracotta buildings receding, all sky. At the statue's base: a woman crowned between two men (the two rivers). At dusk the Fourvière Basilica glows gold above the rooftops. In summer heat the pavement shimmers. The square is empty in early morning, crowded by noon.", im:"It's 1825. The statue was raised here, and Lyon saw its rivers for the first time rendered as figures in stone.", t:"Free entry. Best at 7am or 5pm. Métro A to Bellecour. The square is 312 by 207 metres — walk the perimeter if you have time. Bring water in summer.", c:["history_big"], r:"g", nn:"Place Bellecour", ns:"La plus grande place d'Europe détient le Rhône et la Saône dans sa sculpture en relief.", nst:"La place s'ouvre impossiblement large — tous les bâtiments en terre cuite qui se reculent, tout le ciel. À la base de la statue : une femme couronnée entre deux hommes (les deux fleuves). Au crépuscule la Basilique Fourvière brille d'or au-dessus des toits.", nt:"Entrée gratuite. Mieux à 7h ou 17h. Métro A jusqu'à Bellecour. La place mesure 312 par 207 mètres. Apportez de l'eau en été."},
{id:6, n:"Les Halles de Lyon Paul Bocuse", a:"Part-Dieu", v:["local"], d:8, s:"Covered market: forty-eight stalls where serious cooking begins.", st:"The market is dense with sound and smell and standing room only. Mère Richard cheese is wrapped in leaves, quenelles sit in cream sauce under heat lamps, pink praline tarts in a display you can't stop looking at. Vendors call out daily specials. The floor is sawdust and ice.", im:"It's 1971. Paul Bocuse opens the market named after him, declaring that 'good food comes from here.'", t:"102 cours Lafayette, 3rd. Métro D to Part-Dieu. Tuesday–Saturday morning, 8am–noon. Cost: €5–15 depending on what you buy. Go hungry.", c:["food","markets"], r:"g", nn:"Les Halles de Lyon Paul Bocuse", ns:"Marché couvert : quarante-huit étals où commence la vraie cuisine.", nst:"Le marché est dense de son et d'odeur et d'espace debout uniquement. Le fromage Mère Richard est emballé dans des feuilles, les quenelles sont dans une sauce à la crème sous des lampes chauffantes. Les vendeurs crient les spécialités du jour.", nt:"102 cours Lafayette, 3e. Métro D vers Part-Dieu. Mardi–samedi matin, 8h–midi. Coût : 5–15€ selon ce que vous achetez. Allez affamé."},
{id:7, n:"Institut Lumière", a:"8th (Monplaisir)", v:["history","beautiful"], d:15, s:"The villa where cinema was invented, April 1895, first film.", st:"The house is a belle époque villa set back from the street, modest and extraordinary. Inside: the camera that filmed workers leaving the factory — the Lumière brothers' workers in 1895. The garden is peaceful. In the cinema they still show films. You sit in a room where the history of images was decided.", im:"It's April 19, 1895. Workers pour out of the Lumière factory gates. The camera runs for 46 seconds. Cinema is born.", t:"Métro D to Monplaisir–Lumière. Museum €7, cinema €8. Gardens free. Tuesday–Sunday 10am–6:30pm. The villa is beautiful in late afternoon light.", c:["history_big","nerd"], r:"g", nn:"Institut Lumière", ns:"La villa où le cinéma a été inventé, avril 1895, le premier film.", nst:"La maison est une villa belle époque en retrait de la rue, modeste et extraordinaire. À l'intérieur : la caméra qui a filmé les ouvriers quittant l'usine — les ouvriers Lumière en 1895. Le jardin est paisible. Au cinéma, ils projettent encore des films.", nt:"Métro D vers Monplaisir–Lumière. Musée 7€, cinéma 8€. Jardins gratuits. Mardi–dimanche 10h–18h30. La villa est belle en lumière d'après-midi."},
{id:8, n:"Parc de la Tête d'Or", a:"Presqu'île", v:["beautiful","free entry","local"], d:5, s:"One hundred hectares of park: lake, zoo, roses, gardens, all free entry.", st:"The park is a world inside the city. The lake reflects the sky and the swans. The rose garden has 16,000 plants blooming through the summer. The zoo is small and old and somehow perfect. On Sunday mornings everyone in Lyon is here — children, grandmothers, couples — walking slowly, pausing at views.", im:"It's 1857. The park opens and Lyon realizes it has a lake in the centre of itself.", t:"Free entry, free zoo. Métro A to Masséna or Tram T1/T4. Early morning or late afternoon. Rose garden best May–September. Bring bread for the ducks (though they're well-fed). The loop walk takes 1.5 hours.", c:["parks","nature","free_culture"], r:"g", nn:"Parc de la Tête d'Or", ns:"Cent hectares de parc : lac, zoo, roses, jardins, tous gratuits.", nst:"Le parc est un monde dans la ville. Le lac reflète le ciel et les cygnes. Le jardin de roses a 16 000 plantes en fleur tout l'été. Le zoo est petit et ancien et quelque part parfait. Le dimanche matin tout Lyon est ici.", nt:"Entrée gratuite, zoo gratuit. Métro A vers Masséna ou Tram T1/T4. Tôt le matin ou fin d'après-midi. Jardin de roses mieux mai–septembre. Apportez du pain pour les canards. La boucle prend 1,5 heures."},
{id:9, n:"Musée des Beaux-Arts", a:"Presqu'île", v:["beautiful","history"], d:4, s:"France's second-largest art museum, Impressionists and Egyptian mummies.", st:"The museum wraps around a courtyard where no one sits after 4pm. The Impressionist gallery has a particular quality of light at 3pm. Egyptian mummies are in the ground floor in a room painted deep green. The museum is never crowded.", im:"It's 1872. Monet's Impressionist paintings arrive here and change what art can be.", t:"Place des Terreaux, 1st. Métro A to Hôtel de Ville. €8 entry. Free first Sunday of the month. Hours 10am–6pm, closed Tuesdays. Allow 2–3 hours minimum.", c:["history_big"], r:"g", nn:"Musée des Beaux-Arts", ns:"Le deuxième plus grand musée d'art de France, Impressionnistes et momies égyptiennes.", nst:"Le musée s'enroule autour d'une cour où personne ne s'assoit après 16h. La galerie impressionniste a une qualité particulière de lumière à 15h. Les momies égyptiennes sont au rez-de-chaussée dans une salle peinte en vert foncé.", nt:"Place des Terreaux, 1er. Métro A vers Hôtel de Ville. 8€ d'entrée. Gratuit premier dimanche du mois. Horaires 10h–18h, fermé mardis. Comptez 2–3 heures minimum."},
{id:10, n:"Place des Terreaux", a:"Presqu'île", v:["history","beautiful"], d:4, s:"Bartholdi's fountain: same sculptor who made Liberty, before she was colossal.", st:"The fountain dominates the square — horses and women in bronze, water moving through their forms. The Hôtel de Ville frames the south side, Renaissance revival, solid and sure. At night the building glows. The square is busy with tourists and locals both, always some kind of life happening.", im:"It's 1793. The guillotine stood here during the Terror, until the fountain came and changed what the square meant.", t:"Free entry. Best at 6pm when light hits the fountain. Métro A to Hôtel de Ville. The Musée des Beaux-Arts is on the north side. Cafés surround the square.", c:["history_big"], r:"g", nn:"Place des Terreaux", ns:"La fontaine Bartholdi : le même sculpteur qui a fait la Liberté, avant qu'elle soit colossale.", nst:"La fontaine domine la place — chevaux et femmes en bronze, l'eau se déplaçant dans leurs formes. L'Hôtel de Ville encadre le côté sud, Réalisme Renaissance, solide et sûr. La nuit le bâtiment brille.", nt:"Entrée gratuite. Mieux à 18h quand la lumière frappe la fontaine. Métro A vers Hôtel de Ville. Le Musée des Beaux-Arts est au nord. Des cafés entourent la place."},
{id:11, n:"Jardin des Curiosités", a:"Fourvière", v:["hidden","beautiful","quiet"], d:20, s:"Push through a stone wall gap: the entire city is below you at sunset.", st:"The garden is small and overgrown and almost unmarked. You find it by feeling for the gap in the wall. Once through: a grassy slope, old trees, and below you — the entire city in perfect layering. The Opéra, the Hôtel de Ville, Place Bellecour, the Confluence Museum, both rivers catching light. The Alps are visible on clear days.", im:"It's 1900. A botanist came to this hillside and decided to let it grow wild instead of taming it.", t:"Bus 31 from Vieux Lyon. Free entry. Best 5–7pm. There's no official path — wear shoes with good grip. Bring a camera. The local saying: if you see the Alps from here, it will rain tomorrow.", c:["high_spots"], r:"g", nn:"Jardin des Curiosités", ns:"Passez par une brèche dans le mur : toute la ville est en dessous au coucher du soleil.", nst:"Le jardin est petit et envahissant et presque sans marquage. Vous le trouvez en cherchant la brèche dans le mur. Une fois à travers : une pente herbeuse, de vieux arbres, et en dessous — toute la ville en stratification parfaite. L'Opéra, l'Hôtel de Ville, Place Bellecour, le Musée Confluence, les deux fleuves capturant la lumière.", nt:"Bus 31 depuis Vieux Lyon. Entrée gratuite. Mieux 17–19h. Pas de sentier officiel — portez des chaussures avec bonne adhérence. Apportez un appareil photo. La ville dit : si vous voyez les Alpes d'ici, il pleuvra demain."},
{id:12, n:"Amphithéâtre des Trois-Gaules", a:"Croix-Rousse", v:["history","hidden"], d:10, s:"Roman amphitheatre built 19 BC, martyrs died here, almost no tourists ever come.", st:"Behind a chain-link fence on rue Lucien Sportisse the stone tiers are still visible, weather-weathered and real. You can see where the arena was, where the animals came out, where the crowd sat. The fence is there but the stones are accessible to touch. Grass grows between the tiers. It feels like a secret.", im:"It's 177 AD. Early Christians are led into the arena while Lyon watches from the stands.", t:"Rue Lucien Sportisse, Croix-Rousse. Free entry. The site is behind a fence but visible. Go mid-week when the neighbourhood is quiet. Bring flowers if the mood strikes — locals sometimes do.", c:["history_big","scary"], r:"g", nn:"Amphithéâtre des Trois-Gaules", ns:"Amphithéâtre romain construit en 19 av. J.-C., des martyrs sont morts ici, presque aucun touriste ne vient jamais.", nst:"Derrière une clôture en chaîne-maillon sur rue Lucien Sportisse les gradins en pierre sont encore visibles, usés par les intempéries et réels. Vous pouvez voir où était l'arène, où venaient les animaux, où la foule s'asseyait. La clôture est là mais les pierres sont accessibles au toucher.", nt:"Rue Lucien Sportisse, Croix-Rousse. Entrée gratuite. Le site est derrière une clôture mais visible. Allez en semaine quand le quartier est calme. Apportez des fleurs si l'humeur vous prend."},
{id:13, n:"Île Barbe", a:"Île Barbe", v:["quiet","history","beautiful"], d:20, s:"Medieval abbey ruins on a Saône island, locals only, Sunday families.", st:"The island is reachable by footbridge, overgrown and peaceful. Medieval abbey ruins stand among trees, crumbled and soft-edged. Families walk the perimeter on Sunday afternoons watching the river flow around them. The light here is different — more filtered, quieter. You hear the Saône before you see it.", im:"It's 1000 AD. Monks are singing in a cloister that no longer exists, their voices carrying across the island.", t:"Bus C7 to Île Barbe. Free entry. Sunday afternoons are best — bring a picnic. The walk around the island takes 30 minutes. No facilities on the island.", c:["history_big","neighbourhoods"], r:"g", nn:"Île Barbe", ns:"Les ruines de l'abbaye médiévale sur une île de la Saône, locaux seulement, familles le dimanche.", nst:"L'île est accessible par passerelle, envahie et paisible. Les ruines de l'abbaye médiévale se dressent parmi les arbres, effondrées et aux bords doux. Les familles font le tour le dimanche après-midi en regardant le fleuve couler autour d'eux.", nt:"Bus C7 vers Île Barbe. Entrée gratuite. Les dimanches après-midi sont mieux — apportez un pique-nique. Le tour de l'île prend 30 minutes. Pas de commodités sur l'île."},
{id:14, n:"Les Pentes de la Croix-Rousse", a:"Croix-Rousse", v:["local","weird","beautiful"], d:10, s:"Steep slopes with vintage shops, bars, bookshops, and real neighbourhood life.", st:"The neighbourhood climbs steeply — rue des Capucins and montée de la Grande-Côte are where young Lyon lives. Vintage shops sell furniture from the 1970s, bars have handwritten menus, bookshops are small and curated. The steepness is real and makes your calves burn. The light is different at every elevation.", im:"It's 1831. Silk weavers marched down this hill with the slogan 'live working or die fighting,' changing labour history forever.", t:"Métro A to Hôtel de Ville and walk up. Wear flat shoes — the slope is steep and you will need grip. Best in late afternoon. Most shops open from 2pm. Budget €5–10 for coffee, €15–25 for vintage finds.", c:["neighbourhoods"], r:"g", nn:"Les Pentes de la Croix-Rousse", ns:"Pentes abruptes avec magasins vintage, bars, librairies et vraie vie de quartier.", nst:"Le quartier grimpe abruptement — rue des Capucins et montée de la Grande-Côte sont où vit la jeune Lyon. Les magasins vintage vendent des meubles des années 1970, les bars ont des menus manuscrits, les librairies sont petites et curées.", nt:"Métro A vers Hôtel de Ville et marchez. Portez des chaussures plates — la pente est abrupte. Mieux en fin d'après-midi. La plupart des magasins ouvrent à 14h. Budget 5–10€ pour le café, 15–25€ pour les trouvailles vintage."},
{id:15, n:"Maison des Canuts", a:"Croix-Rousse", v:["history","weird"], d:10, s:"Silk-loom museum: the Jacquard machine that inspired the computer.", st:"A working Jacquard loom fills the small museum. The machine is hypnotic — punchcards control the pattern, every thread predestined. The room smells of oil and old wood. Upstairs: the 1831 Canuts Revolt is told in photographs and artifacts — weavers marching down the slope with 'live working or die fighting' on their banners.", im:"It's 1834. Babbage sees the Jacquard loom and realizes: this is the future of calculating machines.", t:"Rue d'Ivry, Croix-Rousse. €7 entry. Tuesday–Sunday 10am–6pm. The loom demonstrations happen at 11am and 3pm — arrive early. Bring paper to write down what you want to weave.", c:["history_big","nerd","weird"], r:"g", nn:"Maison des Canuts", ns:"Musée des métiers à soie : la machine Jacquard qui a inspiré l'ordinateur.", nst:"Un métier Jacquard en fonctionnement remplit le petit musée. La machine est hypnotique — les cartes perforées contrôlent le motif, chaque fil est prédéterminé. La salle sent l'huile et le vieux bois. À l'étage : la Révolte des Canuts de 1831 est racontée en photographies et artefacts.", nt:"Rue d'Ivry, Croix-Rousse. 7€ d'entrée. Mardi–dimanche 10h–18h. Les démonstrations du métier se font à 11h et 15h — arrivez tôt. Apportez du papier pour écrire ce que vous voulez tisser."},
{id:16, n:"Parc Sergent Blandan", a:"Guillotière", v:["quiet","free entry","local"], d:18, s:"Former military fort turned park: ramparts, lake, volleyball, almost no tourists.", st:"The fort's walls still stand, grass-covered and gentle. Inside: a small lake, willows, a volleyball court where locals play on summer evenings. Very few tourists ever venture here. The ramparts offer views of the city at a distance. It feels like a secret the neighbourhood keeps.", im:"It's 1870. The fort was built to defend Lyon from enemies that never came.", t:"Tram T2 to Blandan. Free entry. Go in late afternoon when locals are playing volleyball. The park is spacious — bring a book. There's a small café at the entrance.", c:["parks"], r:"g", nn:"Parc Sergent Blandan", ns:"Ancien fort militaire transformé en parc : remparts, lac, volleyball, presque aucun touriste.", nst:"Les murs du fort se dressent encore, couverts d'herbe et doux. À l'intérieur : un petit lac, des saules, un court de volleyball où les locaux jouent les soirs d'été. Très peu de touristes viennent jamais ici.", nt:"Tram T2 vers Blandan. Entrée gratuite. Allez en fin d'après-midi quand les locaux jouent au volleyball. Le parc est spacieux — apportez un livre. Il y a un petit café à l'entrée."},
{id:17, n:"La Guillotière", a:"Guillotière", v:["local","weird"], d:8, s:"International neighbourhood: Vietnamese, Turkish, Ethiopian, Madagascan food.", st:"Seven different worlds fit into a six-block radius. Vietnamese restaurants with steaming pho at 11am, Turkish bakeries smelling of sesame, North African spice shops with mounds of ras el hanout, Madagascan markets with zebu meat, Ethiopian restaurants where injera doubles as plate. The Sunday market on cours Gambetta is chaos and perfect.", im:"It's 1970. Migrants arrive in Lyon looking for work and open restaurants to remind themselves of home. Guillotière is born.", t:"Tram T2 to Guillotière. Best Sunday mornings on cours Gambetta market. Meals €7–15 in neighbourhood restaurants. Go hungry and go often — no single visit captures it all.", c:["neighbourhoods","food","weird"], r:"g", nn:"La Guillotière", ns:"Quartier international : nourriture vietnamienne, turque, éthiopienne, malgache.", nst:"Sept mondes différents tiennent dans un rayon de six pâtés de maisons. Restaurants vietnamiens avec pho fumant à 11h, boulangeries turques sentant la sésame, épiceries nord-africaines avec des tas de ras el hanout, marchés malgaches avec viande de zébu, restaurants éthiopiens où l'injera sert de plat.", nt:"Tram T2 vers Guillotière. Mieux les dimanches matin sur le marché de cours Gambetta. Repas 7–15€ dans les restaurants du quartier. Allez affamé et allez souvent."},
{id:18, n:"Jardin du Rosaire", a:"Fourvière", v:["beautiful","quiet","history"], d:15, s:"Terraced garden down the Fourvière slope: cypress, roses, terracotta rooftops.", st:"The garden runs steep downhill, narrow and long. Roses in summer, cypress trees year-round, their dark forms perfect against the slope. Old men sit on benches looking downhill at Vieux Lyon's terracotta rooftops and the Saône below. The light is filtered and soft.", im:"It's 1750. A nun plants the first rosemary here to honour the Fourvière chapel above.", t:"Enter from near Fourvière Basilica or via montée du Gourguillon. Free entry. Best May–September for roses. The descent is steep — wear shoes with grip. Takes 30 minutes to walk from top to bottom.", c:["romantic_water"], r:"g", nn:"Jardin du Rosaire", ns:"Jardin en terrasse descendant la pente de Fourvière : cyprès, roses, toits en terre cuite.", nst:"Le jardin s'étend abruptement vers le bas, étroit et long. Roses en été, cyprès toute l'année, leurs formes sombres parfaites contre la pente. De vieux hommes s'assoient sur des bancs regardant vers le bas les toits en terre cuite de Vieux Lyon et la Saône en dessous.", nt:"Entrez près de la Basilique Fourvière ou via montée du Gourguillon. Entrée gratuite. Mieux mai–septembre pour les roses. La descente est abrupte — portez des chaussures avec adhérence. Prend 30 minutes pour descendre du haut en bas."},
{id:19, n:"Cimetière de Loyasse", a:"Fourvière", v:["beautiful","history","weird"], d:15, s:"Lyon's answer to Père Lachaise: silk merchant tombs in neo-Gothic ruin.", st:"The cemetery sits on the Fourvière hill, paths winding in concentric circles that confuse you on purpose. Neo-Gothic tombs, Art Deco mausoleums, some collapsed into beautiful ruin. Silk merchants and artists and architects are buried here in their stone houses. The view looks down over Saône rooftops. Getting lost is part of the experience.", im:"It's 1880. A wealthy silk merchant is lowered into the ground beneath a marble angel that will watch him for the next hundred years.", t:"Fourvière hill, up past the Basilica. Free entry. Daily 8am–5pm. The concentric paths are intentionally confusing — bring a map. Best on weekday mornings. Wear comfortable shoes.", c:["history_big","weird"], r:"g", nn:"Cimetière de Loyasse", ns:"La réponse de Lyon au Père Lachaise : tombes des marchands de soie en ruine néo-gothique.", nst:"Le cimetière se dresse sur la colline de Fourvière, les sentiers serpentant en cercles concentriques qui vous confondent exprès. Tombes néo-gothiques, mausolées Art Déco, certains effondrés en belle ruine. Des marchands de soie et des artistes et des architectes sont enterrés ici dans leurs maisons de pierre.", nt:"Colline de Fourvière, en haut après la Basilique. Entrée gratuite. Quotidien 8h–17h. Les sentiers concentriques sont volontairement confus — apportez une carte. Mieux les matins de semaine. Portez des chaussures confortables."},
{id:20, n:"Jardin des Chartreux", a:"Croix-Rousse", v:["quiet","free entry","beautiful"], d:12, s:"Croix-Rousse slopes: big lawns, open sky, locals reading in silence.", st:"The garden spreads across the slope with room to breathe. Old trees provide shade. Locals come here to read alone, to sleep in the sun, to exist without talking to anyone. The view faces west toward the Monts d'Or mountains. The space is generous and quiet.", im:"It's 1900. A grandmother brings her granddaughter here and says: 'This is where Lyon comes to think.'", t:"Free entry. Walk up from Métro A at Hôtel de Ville — steep but worth it. Best 3–6pm on weekday afternoons. Bring a book. The lawns are soft enough to lie on.", c:["parks"], r:"g", nn:"Jardin des Chartreux", ns:"Pentes de la Croix-Rousse : grandes pelouses, ciel ouvert, locaux lisant en silence.", nst:"Le jardin s'étend sur la pente avec place de respirer. De vieux arbres offrent de l'ombre. Les locaux viennent ici lire seuls, dormir au soleil, exister sans parler à personne. La vue fait face à l'ouest vers les montagnes des Monts d'Or.", nt:"Entrée gratuite. Marchez depuis Métro A à Hôtel de Ville — abrupt mais valable. Mieux 15–18h l'après-midi en semaine. Apportez un livre. Les pelouses sont assez douces pour s'allonger."},
{id:21, n:"CHRD — Centre d'Histoire de la Résistance et de la Déportation", a:"Guillotière", v:["history"], d:12, s:"The Gestapo headquarters is now a museum: cells still in the basement.", st:"The building is austere and heavy. You descend into the basement where the cells still exist — small, cold, permanent. Klaus Barbie ran the Gestapo from this building. The museum refuses sanitization: it shows what happened here in its raw form. Photographs, testimonies, objects left behind. This is not a comfortable place to be.", im:"It's 1943. A prisoner descends these stairs knowing they will not return.", t:"14 avenue Berthelot, 7th. €8 entry, free under 18. Wednesday–Sunday 9am–5:30pm. Closed Mondays and Tuesdays. Allow 1.5–2 hours minimum. This is not a sightseeing museum — come prepared to be moved.", c:["history_big","scary"], r:"g", nn:"CHRD — Centre d'Histoire de la Résistance et de la Déportation", ns:"Le quartier général de la Gestapo est maintenant un musée : les cellules sont encore au sous-sol.", nst:"Le bâtiment est austère et lourd. Vous descendez au sous-sol où les cellules existent toujours — petites, froides, permanentes. Klaus Barbie a dirigé la Gestapo depuis ce bâtiment. Le musée refuse la sanitisation : il montre ce qui s'est passé ici sous forme brute.", nt:"14 avenue Berthelot, 7e. 8€ d'entrée, gratuit moins de 18 ans. Mercredi–dimanche 9h–17h30. Fermé lundi et mardi. Comptez 1,5–2 heures minimum. Ce n'est pas un musée touristique."},
{id:22, n:"Musée Gallo-Romain", a:"Fourvière", v:["history","beautiful"], d:12, s:"Museum built into the hillside: Roman speech about Gallic citizenship.", st:"The museum is built down into the Fourvière hill like an underground temple. Natural light comes from above, illuminating a bronze copy of Emperor Claudius's speech arguing that Gauls should be admitted as Roman citizens — one of the most important political documents of the ancient world. The stone feels cool. The quiet is deliberate.", im:"It's 48 AD. Claudius reads his speech in Rome, arguing for a radical idea: Gauls are human too.", t:"Bottom of Fourvière hill, accessible by funicular. €4 entry, free under 18. Tuesday–Sunday 10am–6pm. Allow 1–1.5 hours. The building itself is architecture worth experiencing.", c:["history_big","nerd"], r:"g", nn:"Musée Gallo-Romain", ns:"Le musée construit dans la colline : le discours romain sur la citoyenneté gauloise.", nst:"Le musée est construit dans la colline de Fourvière comme un temple souterrain. La lumière naturelle vient d'en haut, illuminant une copie en bronze du discours de l'empereur Claude arguant que les Gaulois devraient être admis comme citoyens romains — l'un des documents politiques les plus importants du monde antique.", nt:"Au bas de la colline de Fourvière, accessible par funiculaire. 4€ d'entrée, gratuit moins de 18 ans. Mardi–dimanche 10h–18h. Comptez 1–1,5 heures. Le bâtiment lui-même vaut la peine d'être expérimenté."},
{id:23, n:"Maison du Guignol", a:"Presqu'île", v:["weird","local"], d:5, s:"Guignol puppet theatre: Lyon invented talking-back-to-power in 1808.", st:"The puppet Guignol was born here — a character who talks back, who mouths off to authority, who gets in trouble and escapes. Lyon's answer to Punch. The Théâtre le Guignol de Lyon still performs shows in French that even non-speakers understand because Guignol is pure physical comedy and cheek. The theatre is small and close and full of children laughing.", im:"It's 1808. A puppet master creates Guignol, and suddenly there's a character who says what no human can.", t:"Presqu'île (exact location varies — contact tourist office for current venue). Shows typically €8–12. Wednesday and Saturday afternoons are best for larger casts. No French required to understand the physical humour.", c:["weird","free_culture"], r:"g", nn:"Maison du Guignol", ns:"Théâtre de marionnettes Guignol : Lyon a inventé la rébellion en 1808.", nst:"La marionnette Guignol est née ici — un personnage qui parle d'en bas, qui fait du cheeky à l'autorité, qui se met en difficulté et s'échappe. La réponse de Lyon à Punch. Le Théâtre le Guignol de Lyon joue encore des spectacles en français que même les non-locuteurs comprennent parce que Guignol est de la pure comédie physique.", nt:"Presqu'île (le lieu exact varie — contactez l'office du tourisme pour le lieu actuel). Les spectacles coûtent généralement 8–12€. Les mercredis et samedis après-midi sont meilleurs pour les distributions plus importantes."},
{id:24, n:"Mur des Canuts", a:"Croix-Rousse", v:["weird","beautiful","local"], d:10, s:"1,200 square metres of false perspective showing Croix-Rousse's real life.", st:"The mural sprawls across a corner building in trompe-l'œil: a street scene of impossible convincing depth. Find the two parrots. Find the painter at his easel. Find the faces that have changed as the mural was updated over decades — new fashions, new faces, new Lyon. The scale is disorienting and perfect.", im:"It's 1988. An artist looks at blank concrete and imagines a street scene that will fool the eye for thirty years.", t:"Corner of boulevard des Canuts and rue Denfert-Rochereau. Free entry. Métro C to Hénon. Best photographed early morning when light rakes the surface. The mural is 800m² and updates every few years — go multiple times to see it change.", c:["weird"], r:"g", nn:"Mur des Canuts", ns:"1 200 mètres carrés de fausse perspective montrant la vraie vie de la Croix-Rousse.", nst:"La fresque s'étend sur un coin de bâtiment en trompe-l'œil : une scène de rue d'une profondeur d'une conviction impossible. Trouvez les deux perroquets. Trouvez le peintre à son chevalet. Trouvez les visages qui ont changé alors que la fresque était mise à jour au fil des décennies.", nt:"Coin de boulevard des Canuts et rue Denfert-Rochereau. Entrée gratuite. Métro C vers Hénon. Mieux photographié tôt le matin. La fresque est mise à jour tous les quelques ans."},
{id:25, n:"Fresque des Lyonnais", a:"Presqu'île", v:["weird","beautiful","local"], d:5, s:"800 square metres: 30 famous Lyonnais drawn as false apartment residents.", st:"The mural covers a building façade in trompe-l'œil: Lumière brothers, Paul Bocuse, Guignol, Saint-Exupéry and others as if they lived in this building's apartments. Windows, washing lines, a cat on a sill. The detail is extraordinary. Find the one living person mixed among the historical dead. The mural updates as fashions change and people are added.", im:"It's 1997. An artist realizes: we can make Lyon's heroes live in the same building.", t:"Quai de la Martinière, Presqu'île. Free entry. Métro A to Bellecour then walk. Best light in morning from the east. The mural is 800m² — plan to spend 10 minutes finding all the figures.", c:["weird"], r:"g", nn:"Fresque des Lyonnais", ns:"800 mètres carrés : 30 Lyonnais célèbres dessinés comme de vrais résidents d'immeubles.", nst:"La fresque couvre une façade de bâtiment en trompe-l'œil : les frères Lumière, Paul Bocuse, Guignol, Saint-Exupéry et d'autres comme s'ils vivaient dans les appartements de cet immeuble. Fenêtres, cordes à linge, un chat sur un rebord.", nt:"Quai de la Martinière, Presqu'île. Entrée gratuite. Métro A vers Bellecour puis marchez. Meilleure lumière le matin de l'est. La fresque est 800m²."},
{id:26, n:"Musée Urbain Tony Garnier", a:"8th (Monplaisir)", v:["weird","beautiful","local"], d:20, s:"1920s workers' city with 25 giant murals by artists from five continents.", st:"The Cité des États-Unis is a workers' housing development from 1920 designed by visionary architect Tony Garnier. Twenty-five giant murals painted 1988–1997 by artists from Egypt, India, Mexico, Ivory Coast, Russia, USA cover the buildings. People live here — Tuesday mornings kids play football under a 15-meter Mexican mural. The art is integrated into ordinary life.", im:"It's 1920. Garnier imagines housing where working people could live with dignity and beauty around them.", t:"8th arrondissement, Métro D to États-Unis. Free to walk through. Guided tours available (€8). The murals are best in morning light. Spend 1–2 hours. This is a real neighbourhood — be respectful.", c:["weird","neighbourhoods"], r:"g", nn:"Musée Urbain Tony Garnier", ns:"Cité ouvrière des années 1920 avec 25 fresques géantes par des artistes de cinq continents.", nst:"La Cité des États-Unis est un développement de logements pour ouvriers de 1920 conçu par l'architecte visionnaire Tony Garnier. Vingt-cinq fresques géantes peintes entre 1988 et 1997 par des artistes d'Égypte, d'Inde, du Mexique, de Côte d'Ivoire, de Russie, des États-Unis couvrent les bâtiments.", nt:"8e arrondissement, Métro D vers États-Unis. Gratuit de marcher. Les visites guidées sont disponibles (8€). Les fresques sont mieux à la lumière du matin. Passez 1–2 heures. C'est un vrai quartier — soyez respectueux."},
{id:27, n:"Street art on the Pentes", a:"Croix-Rousse", v:["weird","beautiful","local"], d:10, s:"Smaller, rougher street art: stencils, paste-ups, murals on Croix-Rousse slopes.", st:"Rue des Capucins and rue Neyret are covered in smaller, rawer street art than the tourist murals. Stencils, paste-ups, vinyl bird murals by Kesa that have survived since 2014. The art is alive and changing — new pieces appear, others fade. You turn a corner and there's a 4-metre thrush made of coloured vinyl.", im:"It's 2012. An artist cuts a stencil in a cold flat and goes out to paint the slopes before dawn.", t:"Croix-Rousse, rue des Capucins and rue Neyret. Free entry. Best explored on foot Wednesday–Friday when the neighbourhood is quieter. The art changes constantly — go multiple times. Early morning light is best.", c:["weird"], r:"g", nn:"Street art sur les Pentes", ns:"L'art de rue plus petit et plus rude : pochoirs, pâtes-ups, fresques sur les pentes de la Croix-Rousse.", nst:"Rue des Capucins et rue Neyret sont couverts d'art de rue plus petit et plus cru que les fresques touristiques. Pochoirs, collages, fresques de vinyls d'oiseaux de Kesa qui ont survécu depuis 2014.", nt:"Croix-Rousse, rue des Capucins et rue Neyret. Entrée gratuite. Mieux explorées à pied mercredi–vendredi quand le quartier est plus calme. L'art change constamment. La lumière du matin est meilleure."},
{id:28, n:"Berges du Rhône", a:"Guillotière", v:["beautiful","local","quiet"], d:8, s:"Six kilometres of riverbank park: former motorway now has boules, ping-pong, gardens.", st:"The Rhône runs here and the motorway is gone. Now: wooden terraces, boules courts where old men play with meditation-like focus, vegetable gardens where locals grow tomatoes, bars in converted barges (péniches), ping-pong tables. In summer evenings: wine on the river bank, light going off the water, the sound of the city at a distance. Kids ride bikes along the path.", im:"It's 2007. The motorway is torn up and someone plants grass instead. The Rhône returns to Lyon.", t:"Start at Guillotière bridge and walk south. Free entry. Best 5pm–sunset in summer. Bring a picnic and wine. The path is flat and easy — good for families. Barge bars open 6pm+.", c:["parks","romantic_water"], r:"g", nn:"Berges du Rhône", ns:"Six kilomètres de parc riverain : ancienne autoroute a maintenant des boules, ping-pong, jardins.", nst:"Le Rhône coule ici et l'autoroute a disparu. Maintenant : terrasses en bois, terrains de boules où les vieux hommes jouent avec une concentration méditative, jardins potagers où les locaux cultivent des tomates, bars dans des péniches converties.", nt:"Commencez à Guillotière et marchez vers le sud. Entrée gratuite. Mieux 17h–coucher de soleil en été. Apportez un pique-nique et du vin. Le sentier est plat et facile. Les bars des péniches ouvrent à 18h+."},
{id:29, n:"Bouchon lunch", a:"Presqu'île", v:["local"], d:4, s:"Traditional Lyon bistro: quenelles, tripe, herbed cheese served mid-day.", st:"A bouchon is small and crowded at noon. The menu is fixed: quenelles de brochet (pike dumplings in cream sauce), tablier de sapeur (breaded tripe), cervelle de canut (herbed fromage blanc, literally 'weaver's brains'). Platefuls of meat. Red wine. Old waiters who remember regular customers. The light is warm and the air smells like butter and stock.", im:"It's 1900. A silk worker comes here at noon to eat his lunch before returning to the loom.", t:"Look for the Authentique Bouchon Lyonnais sign. Presqu'île, 2nd arrondissement. Lunch service 12–2pm, dinner rare. Cost €15–25. Book ahead on weekends. Close in July — chefs go on holiday.", c:["food","history_big"], r:"g", nn:"Déjeuner bouchon", ns:"Bistrot de tradition lyonnaise : quenelles, tripes, fromage aux herbes servis à midi.", nst:"Un bouchon est petit et bondé à midi. Le menu est fixe : quenelles de brochet, tablier de sapeur, cervelle de canut. Des assiettes de viande. Du vin rouge. De vieux serveurs qui se souviennent des clients réguliers.", nt:"Cherchez le signe Authentique Bouchon Lyonnais. Presqu'île, 2e arrondissement. Service du déjeuner 12–14h, dîner rare. Coût 15–25€. Réservez à l'avance les fins de semaine. Fermé en juillet."},
{id:30, n:"Marché Saint-Antoine", a:"Presqu'île", v:["local","beautiful"], d:3, s:"Saône riverside market: morning produce, fish, Lyon charcuterie, coffee terraces.", st:"The market spreads along the quai Saint-Antoine with the Saône behind it. Tuesday–Sunday mornings: produce piled in pyramids, fish on ice, rosette de Lyon (cured pork coil) in rings, farmers calling out the day's specials. Best: buy from the market, then sit at a café terrace with coffee and a croissant watching the river and the market crowds.", im:"It's 1850. The same market, the same river, the same ritual of morning shopping.", t:"Quai Saint-Antoine, Presqu'île. Tuesday–Sunday mornings, 7am–1pm. Free to browse. Café meals €5–10. Best on Wednesday or Thursday morning when it's less crowded.", c:["markets","food"], r:"g", nn:"Marché Saint-Antoine", ns:"Marché riverain de la Saône : produits du matin, poisson, charcuterie lyonnaise, cafés terrasses.", nst:"Le marché s'étend le long du quai Saint-Antoine avec la Saône derrière lui. Mardi–dimanche matin : les produits sont empilés en pyramides, le poisson sur la glace, la rosette de Lyon en anneaux, les fermiers crient les spécialités du jour.", nt:"Quai Saint-Antoine, Presqu'île. Mardi–dimanche matin, 7h–13h. Gratuit de regarder. Repas de café 5–10€. Mieux mercredi ou jeudi matin quand c'est moins bondé."},
{id:31, n:"Pralines roses", a:"Presqu'île", v:["local"], d:3, s:"Pink sugar almonds invented in 1650s: buy from Maison Voisin, place Bellecour.", st:"Pralines roses are Lyon's sugar-dusted pink almonds, invented by a confectioner named Charnier for the Duc de Praslin in the 1650s. They're supposed to be crumbly and pink and sweet. Real ones come from Maison Voisin on place Bellecour — the original maker. They come in a paper cone. Tourist shops sell fake versions. The taste is almond sweetness with a dissolving sugar shell.", im:"It's 1650. A confectioner invents pralines for a duke, and they're so good they outlive everyone present.", t:"Maison Voisin, place Bellecour. €8–12 per bag depending on size. Also used in tarte aux pralines (pink praline tart) — best from a local pâtisserie, not tourist shops. They don't keep well — eat within a week.", c:["food"], r:"g", nn:"Pralines roses", ns:"Amandes roses en sucre inventées dans les années 1650 : achetez chez Maison Voisin, place Bellecour.", nst:"Les pralines roses sont les amandes roses de Lyon enduites de sucre, inventées par un confiseur nommé Charnier pour le Duc de Praslin dans les années 1650. Elles sont censées être friables, roses et sucrées.", nt:"Maison Voisin, place Bellecour. 8–12€ par sachet selon la taille. Aussi utilisées dans la tarte aux pralines — meilleure d'une pâtisserie locale. Elles ne se conservent pas bien — mangez dans une semaine."},
{id:32, n:"Café Abel", a:"Presqu'île", v:["local","history"], d:4, s:"1930s bouchon: unchanged bar, andouillette, Beaujolais, lunch only.", st:"The bar at the front is exactly as it was in 1935 — small, dark, with regulars at the counter. Order andouillette (tripe sausage, very strong) or rosette de Lyon with a glass of Beaujolais. The meat is piled on the plate without apology. The waiters are old and they know who belongs here.", im:"It's 1950. A weaver sits at the counter eating andouillette the way his grandfather did.", t:"Rue Guynemer, 2nd. Lunch service only, 12–2pm. Closed mid-July to early September. €15–22 for a full lunch. The andouillette is an acquired taste — start with rosette if you're uncertain.", c:["food","history_big"], r:"g", nn:"Café Abel", ns:"Bouchon des années 1930 : bar inchangé, andouillette, Beaujolais, déjeuner seulement.", nst:"Le bar à l'avant est exactement comme il l'était en 1935 — petit, sombre, avec des réguliers au comptoir. Commandez une andouillette ou une rosette de Lyon avec un verre de Beaujolais. La viande est empilée sur l'assiette sans excuses.", nt:"Rue Guynemer, 2e. Service du déjeuner seulement, 12–14h. Fermé mi-juillet à début septembre. 15–22€ pour un déjeuner complet. L'andouillette est un goût acquis."},
{id:33, n:"Saône river walk", a:"Presqu'île", v:["quiet","beautiful"], d:3, s:"West bank walk: quiet, bouchons on water, morning light from the east.", st:"The west bank of the Saône (quai de Bondy, quai des Célestins) is quieter than the Rhône bank. Residential. In the morning the low light comes from the east and reflects off the water — the Presqu'île buildings doubled in the river. Bouchons open directly onto the water. A few cafés face the river. It's possible to stand on the bank in complete quiet at 7am and feel like the only person awake in Lyon.", im:"It's dawn, always. The water is still and the light is gold and the city doesn't know you're here yet.", t:"Start at any point on quai de Bondy or quai des Célestins. Free entry. Best 7–9am in any season. The walk is flat and easy — good for any pace. Winter morning light is particularly good.", c:["romantic_water"], r:"g", nn:"Promenade de la Saône", ns:"Promenade rive ouest : calme, bouchons sur l'eau, lumière matinale de l'est.", nst:"La rive ouest de la Saône est plus calme que la rive du Rhône. Résidentielle. Le matin la lumière basse vient de l'est et se reflète sur l'eau — les bâtiments Presqu'île doublés dans la rivière. Les bouchons s'ouvrent directement sur l'eau.", nt:"Commencez à n'importe quel endroit sur quai de Bondy ou quai des Célestins. Entrée gratuite. Mieux 7–9h en toute saison. La promenade est plate et facile. La lumière matinale d'hiver est particulièrement bonne."},
{id:34, n:"Amphithéâtre des Trois-Gaules at dusk", a:"Croix-Rousse", v:["beautiful","history","quiet"], d:10, s:"Roman stones at dusk: light catches stone differently, almost no one comes here.", st:"You've seen this place in daylight behind a fence. At dusk it transforms. The light catches the stone at a different angle, the shadows deepen, the ruins feel less like archaeology and more like presence. Almost no one comes here after 5pm. You're alone with 2,000 years of stone.", im:"It's sunset. The light is leaving the city and the amphitheatre glows as if lit from within.", t:"Rue Lucien Sportisse, Croix-Rousse. Free entry. Visit 5–6:30pm in summer, 4–5pm in winter. Bring a camera. The fence is still there but the stones are visible and touchable. Midweek is quieter.", c:["history_big"], r:"g", nn:"Amphithéâtre des Trois-Gaules au crépuscule", ns:"Les pierres romaines au crépuscule : la lumière frappe la pierre différemment, presque personne ne vient ici.", nst:"Vous avez vu ce lieu en lumière du jour derrière une clôture. Au crépuscule il se transforme. La lumière frappe la pierre sous un angle différent, les ombres s'approfondissent, les ruines semblent moins de l'archéologie et plus de la présence.", nt:"Rue Lucien Sportisse, Croix-Rousse. Entrée gratuite. Visitez 17–18h30 en été, 16–17h en hiver. Apportez un appareil photo. La clôture est toujours là mais les pierres sont visibles et touchables."},
{id:35, n:"Fourvière Basilica interior", a:"Fourvière", v:["beautiful","history","quiet"], d:12, s:"Inside: Byzantine mosaics, gold, caves-like chapels, built after 1870 war.", st:"Most people photograph the outside. Inside the basilica is extraordinary: Byzantine mosaic work covers the walls, gold on every surface. The light comes through small windows and is refracted by the mosaics into colours that shift as you move. The chapels feel like caves cut into a hillside. The whole interior was built as an act of piety after the Franco-Prussian War in 1870.", im:"It's 1872. A bishop decides the city needs redemption for surviving war, and gold and mosaic will provide it.", t:"Top of the funicular from Vieux Lyon. Free entry. Tuesday–Sunday 8am–7pm. Allow 30–45 minutes. The interior is cool and the light is dreamlike — avoid midday when tour groups fill it. Early morning is peaceful.", c:["history_big"], r:"g", nn:"Intérieur de la Basilique Fourvière", ns:"À l'intérieur : mosaïques byzantines, or, chapelles en forme de grotte, construites après la guerre de 1870.", nst:"La plupart des gens photographient l'extérieur. L'intérieur de la basilique est extraordinaire : les mosaïques byzantines couvrent les murs, l'or sur chaque surface. La lumière vient par des petites fenêtres et est réfractée par les mosaïques en couleurs qui changent en vous déplaçant.", nt:"Haut de la ficelle depuis Vieux Lyon. Entrée gratuite. Mardi–dimanche 8h–19h. Comptez 30–45 minutes. L'intérieur est frais et la lumière est onirique — évitez midi. Tôt le matin est paisible."},
{id:36, n:"Celest Bar", a:"Part-Dieu", v:["beautiful"], d:10, s:"32nd floor of pencil skyscraper: 360° Alps and Massif Central view.", st:"You take the lift to the 32nd floor of the Tour Part-Dieu (the 'pencil' — the city's strangest building). The bar is small and it's all glass. In one direction: the Alps clear on clear days. In another: the Massif Central. Below: both rivers, the entire metro sprawl, the city flattened into a map. Order one drink (€12–15) and sit. The view does the rest.", im:"It's 1972. An architect builds the pencil because why not, and suddenly there's a bar at the top.", t:"Tour Part-Dieu, 3rd. Métro B or D to Part-Dieu. €12–15 for a drink. Book ahead on weekends — it's tiny. Open evenings. Best at sunset or just after when the light is gold and the lights of the city are starting.", c:["high_spots","romantic_water"], r:"g", nn:"Celest Bar", ns:"32e étage de l'immeuble crayon : vue à 360° Alpes et Massif Central.", nst:"Vous prenez l'ascenseur au 32e étage de la Tour Part-Dieu (le 'crayon'). Le bar est petit et c'est tout du verre. Dans une direction : les Alpes claires par temps clair. Dans une autre : le Massif Central. En dessous : les deux fleuves, toute la zone métro, la ville aplatie en carte.", nt:"Tour Part-Dieu, 3e. Métro B ou D vers Part-Dieu. 12–15€ pour un verre. Réservez à l'avance les fins de semaine. Ouvert le soir. Mieux au coucher du soleil. Apportez une caméra."},
{id:37, n:"Opéra de Lyon", a:"Presqu'île", v:["beautiful","history"], d:4, s:"Neoclassical building with 1993 black glass top: extraordinary at night.", st:"The opera house is split between old and new. The neoclassical base is 19th century, stately. On top sits Jean Nouvel's 1993 addition: a black half-cylinder of glass and steel that looks like it landed from the future. The roof seen from Place des Terreaux at night is extraordinary — the glass glows. Inside: red velvet, gold trim, the architecture of Romance.", im:"It's 1993. A modern architect places glass on top of neoclassical stone and changes the meaning of both.", t:"Place de la Comédie, 1st. Métro A to Hôtel de Ville. Performances €10–80+. Last-minute tickets (€10–15) often available on performance days. Tours of the building available. Best seen at night from Place des Terreaux.", c:["history_big"], r:"g", nn:"Opéra de Lyon", ns:"Bâtiment néoclassique avec sommet en verre noir 1993 : extraordinaire la nuit.", nst:"L'opéra est divisé entre ancien et nouveau. La base néoclassique est du 19e siècle, majestueuse. Sur le dessus se trouve l'ajout de Jean Nouvel de 1993 : un demi-cylindre noir de verre et d'acier qui ressemble à un atterrissage du futur.", nt:"Place de la Comédie, 1er. Métro A vers Hôtel de Ville. Spectacles 10–80€+. Les billets de dernière minute (10–15€) sont souvent disponibles. Les visites du bâtiment sont disponibles. Mieux vu la nuit de Place des Terreaux."},
{id:38, n:"Berges du Rhône at night", a:"Guillotière", v:["beautiful","local"], d:8, s:"Summer nights on converted barges: light off water, city sound, wine.", st:"The barge bars (péniches) come alive after 9pm in summer — La Plateforme, Le Sirius, others. Wooden decks, fairy lights, wine by the river. The light off the water ripples. The sound of the city at night carries across the river. People sit on the edge of the water in summer heat, drinks in hand, the city lights reflecting. It feels like being inside the city but apart from it.", im:"It's midnight. The river holds the city in its reflection and you're floating between them.", t:"Berges du Rhône, Guillotière. Barge bars open 9pm+ in summer (May–September). €4–8 for drinks. Get there early in peak summer or the bars fill to capacity. No cover charge — just arrive and drink. Close in winter.", c:["romantic_water"], r:"g", nn:"Berges du Rhône la nuit", ns:"Nuits d'été sur péniches converties : lumière sur l'eau, son de la ville, vin.", nst:"Les bars des péniches s'animent après 21h en été — La Plateforme, Le Sirius, d'autres. Ponts en bois, guirlandes lumineuses, vin au bord du fleuve. La lumière sur l'eau ondule. Le son de la ville la nuit traverse le fleuve.", nt:"Berges du Rhône, Guillotière. Les bars des péniches ouvrent 21h+ en été (mai–septembre). 4–8€ pour les boissons. Arrivez tôt en plein été. Pas de droit d'entrée. Ferment en hiver."},
{id:39, n:"Neuville-sur-Saône swimming", a:"Day trip", v:["free entry","beautiful"], d:25, s:"Beach swimming on the Saône 12km north: weekend families, cheap day trip.", st:"The Saône widens at Neuville-sur-Saône and there's an actual beach with sand. Summer weekends: families swimming, children building sandcastles, people reading on the bank. The water is brown and warm and real. It's the cheapest summer escape from the city — a train ride away, a world away.", im:"It's July. A kid jumps off the bank into water that doesn't exist in the city.", t:"TER train from Perrache station, 12 minutes, €5. Swimming beach open June–August, lifeguards on duty weekends. Bring a towel. Arrive early on weekends — parking fills up. Food stalls sell sandwiches and ice cream.", c:["swimming","parks"], r:"g", nn:"Nage à Neuville-sur-Saône", ns:"Baignade sur la Saône 12km au nord : familles du week-end, journée bon marché.", nst:"La Saône s'élargit à Neuville-sur-Saône et il y a une vraie plage avec du sable. Fins de semaine d'été : familles nageant, enfants construisant des châteaux de sable, gens lisant sur la rive. L'eau est brune et chaude et réelle.", nt:"Train TER depuis la gare de Perrache, 12 minutes, 5€. Plage de baignade ouverte juin–août, maîtres-nageurs le week-end. Apportez une serviette. Arrivez tôt les fins de semaine. Apportez de l'argent pour les stands de nourriture."},
{id:40, n:"Dombes day trip", a:"Day trip", v:["beautiful"], d:45, s:"One thousand glacial lakes, 30 minutes northeast: birds, autumn, mostly by car.", st:"The Dombes is a plateau of glacial lakes — a thousand of them spread across the landscape. The Parc des Oiseaux at Villars-les-Dombes has 2,000 bird species. The water is still and reflects the sky. Autumn is best when migratory birds pass through and the deciduous trees turn. It's a different ecosystem from Lyon entirely — feels farther away than it is.", im:"It's September. Migratory birds arrive for the season and the Dombes holds thousands of them.", t:"Bus OUIBUS or car required — 30 mins northeast of Lyon. Parc des Oiseaux €18 entry. Full day visit recommended. Bring binoculars and a field guide. Car is best but impossible without one — check OUIBUS schedules. Autumn best for birds, April for nesting season. Pack a picnic.", c:["nature","day_trips","parks"], r:"g", nn:"Excursion Dombes", ns:"Mille lacs glaciaires, 30 minutes au nord-est : oiseaux, automne, surtout en voiture.", nst:"Le Dombes est un plateau de lacs glaciaires — mille d'entre eux disséminés dans le paysage. Le Parc des Oiseaux à Villars-les-Dombes a 2 000 espèces d'oiseaux. L'eau est immobile et reflète le ciel. L'automne est le meilleur quand les oiseaux migrateurs passent par et les arbres à feuilles caduques se tournent.", nt:"Bus OUIBUS ou voiture requise — 30 mins nord-est de Lyon. Parc des Oiseaux 18€ d'entrée. Journée complète recommandée. Apportez des jumelles et un guide de terrain. La voiture est mieux. L'automne est meilleur pour les oiseaux. Apportez un pique-nique."},


{id:41, n:"Pérouges", a:"Day trip", v:["history","beautiful","quiet"], d:45, s:"Walled medieval village where car fumes never arrive", st:"Cobblestone streets slope upward between cream-coloured houses. The air is still — no engines, just voices and footsteps echoing off stone. A bakery window displays galettes au sucre, the city's sugared flatbread, the smell layering over everything else.", im:"It's 1467. A merchant's wife watches from a shuttered window as silk traders pass on the road to Geneva.", t:"Drive or taxi (no direct train). Bus from Lyon takes 1.5 hours. Arrive at 9am before tour groups arrive by 11am. €0 entry. Bring water; no regular cafés, only tourist spots.", c:["history_big","day_trips","neighbourhoods"], r:"g", nn:"Pérouges", ns:"Le village médiéval où les voitures n'arrivent jamais", nst:"Les ruelles en pierre montent entre des maisons crème. L'air est immobile — ni moteurs, juste des voix et des pas qui résonnent sur la pierre. Une boulangerie expose des galettes au sucre, le dessert lyonnais sucré, l'odeur recouvrant tout.", nt:"En voiture ou taxi (pas de train direct). Le bus depuis Lyon prend 1.5 heures. Arrivez à 9h avant que les groupes de touristes n'arrivent à 11h. €0 d'entrée. Apportez de l'eau; pas de vrais cafés, juste des pièges à touristes."},

{id:42, n:"Vienne Roman Theatre", a:"Day trip", v:["history","beautiful"], d:50, s:"Two thousand-year-old seats still echo with live jazz every July", st:"The stone bowl rises from the ground, worn smooth by two millennia of weight. The summer sun bakes the auditorium and warms the stones under your feet. The stage framed by a fragment of the original wall — what remains of the scene building — grounds you in actual Roman time.", im:"It's 1881. A travelling opera company performs for the first time in two centuries, and the town realizes what they've been sitting on.", t:"TER train from Perrache station, 35 mins, ~€10 return. Theatre visit €3, or free if attending a Jazz à Vienne concert (July, tickets €25–80). Best in late afternoon. Bring hat; very little shade. Vienne town centre has a Roman temple and decent cafés.", c:["history_big","day_trips"], r:"g", nn:"Théâtre Romain de Vienne", ns:"Deux mille ans de sièges qui résonnent encore avec du jazz vivant en juillet", nst:"Le bol de pierre s'élève du sol, poli lisse par deux millénaires de poids. Le soleil d'été cuit l'amphithéâtre et réchauffe les pierres sous vos pieds. La scène encadrée par un fragment du mur original — ce qui reste du bâtiment de scène — vous ancre dans le temps romain réel.", nt:"Train TER depuis la gare de Perrache, 35 mins, ~€10 aller-retour. Visite du théâtre €3, ou gratuit si vous assistez à un concert Jazz à Vienne (juillet, billets €25–80). Mieux en fin d'après-midi. Apportez un chapeau; très peu d'ombre. Centre-ville de Vienne a un temple romain et des cafés corrects."},

{id:43, n:"Beaujolais wine region", a:"Day trip", v:["local","free entry","history"], d:40, s:"Small winemakers fill your glass at the cave door for pocket change", st:"The villages — Fleurie, Morgon, Moulin-à-Vent — sit on gentle slopes. The caves are not fancy buildings but stone structures attached to houses. A man or woman opens the door, pours you a taste in a plastic cup, and charges €3–5 for a bottle you didn't ask to buy but somehow feel obligated to drink.", im:"It's 1950. A young man works his family plot with his father, and neither imagines wine tourism will ever become a word.", t:"Car or local trains to Villefranche-sur-Saône (30 mins, €8), then local buses to villages (20–40 mins each). Better by car if you're with friends. Arrive mid-morning. No entry fees, just honour the cave culture — you taste, you buy small, you move on.", c:["food","nature","day_trips"], r:"g", nn:"Beaujolais", ns:"Des petits vignerons remplissent votre verre à la porte de la cave pour l'argent de poche", nst:"Les villages — Fleurie, Morgon, Moulin-à-Vent — s'assoient sur des pentes douces. Les caves ne sont pas des bâtiments chics mais des structures en pierre attachées à des maisons. Un homme ou une femme ouvre la porte, vous verse une dégustation dans une tasse en plastique, et vous charge €3–5 pour une bouteille que vous n'aviez pas demandée mais que vous vous sentez obligé de boire.", nt:"Voiture ou trains locaux jusqu'à Villefranche-sur-Saône (30 mins, €8), puis bus locaux vers les villages (20–40 mins chacun). Mieux en voiture si vous êtes avec des amis. Arrivez en milieu de matinée. Pas de frais d'entrée, juste respectez la culture de la cave — vous goûtez, vous achetez petit, vous passez."},

{id:44, n:"Annecy", a:"Day trip", v:["beautiful","history"], d:105, s:"The clearest Alpine lake water reflects old stones in perpetual blue", st:"The water is green-blue and so clear you can count stones on the shallow bottom. The old town crowds around the water's edge; narrow canals run under stone bridges where swans drift. The air carries the smell of fresh water and fountain spray. Mountains rise to the south, snow-capped until June.", im:"It's 1730. A silk merchant's daughter walks the same bridge, admiring the same water, in a dress that cost what a worker made in a year.", t:"TGV direct train from Part-Dieu (1h45, €25–50). Better as overnight (hotels €60–150). Hire a kayak on the lake (~€20/hour). Walk the old town. Eat on the waterfront (not cheap, €15–25 mains). Go in May or September; July and August flood with French families.", c:["day_trips","romantic_water","nature","neighbourhoods"], r:"g", nn:"Annecy", ns:"L'eau du lac alpin la plus claire reflète les vieilles pierres dans un bleu perpétuel", nst:"L'eau est bleu-vert et si claire que vous pouvez compter les pierres sur le fond peu profond. La vieille ville s'entasse autour du bord de l'eau; des canaux étroits courent sous des ponts de pierre où les cygnes dérivent. L'air porte l'odeur de l'eau fraîche et des embruns de fontaine. Les montagnes s'élèvent vers le sud, couvertes de neige jusqu'en juin.", nt:"TGV direct depuis Part-Dieu (1h45, €25–50). Mieux comme nuit sur place (hôtels €60–150). Louez un kayak sur le lac (~€20/heure). Promenez-vous dans la vieille ville. Mangez au bord de l'eau (pas bon marché, €15–25 plats). Allez en mai ou septembre; juillet et août inondent avec les familles françaises."},

{id:45, n:"Cimetière de la Guillotière", a:"Day trip", v:["history","quiet"], d:25, s:"Seventy hectares of tombs mapping Lyon's forgotten immigrant waves", st:"The cemetery sprawls — larger than you expect — with graves in a dozen languages. Turkish headstones next to Italian. African surnames. Chinese characters. The grass is mown but the paths feel unmaintained, peaceful. You pass families tending graves on Sunday, but the weekday silence is complete.", im:"It's 1930. A Polish man's wife places flowers at his grave, speaking to him in a language no one else in Lyon understands.", t:"Tram T2 to the eastern suburbs. €0 entry. Go on a weekday morning for solitude. Bring water; no cafés. The cemetery is democratic history — every immigrant community in Lyon for two centuries is here.", c:["history_big","neighbourhoods"], r:"g", nn:"Cimetière de la Guillotière", ns:"Soixante-dix hectares de tombes cartographiant les vagues d'immigrés oubliés de Lyon", nst:"Le cimetière s'étend — plus grand que vous ne l'espériez — avec des tombes en une douzaine de langues. Des pierres tombales turques à côté d'italien. Des noms de famille africains. Des caractères chinois. L'herbe est tondue mais les chemins semblent non entretenus, paisibles. Vous passez des familles entretenant des tombes le dimanche, mais le silence en semaine est complet.", nt:"Tram T2 vers les banlieues orientales. €0 d'entrée. Allez en semaine matin pour la solitude. Apportez de l'eau; pas de cafés. Le cimetière est l'histoire démocratique — chaque communauté d'immigrants à Lyon pendant deux siècles est ici."},

{id:46, n:"Passage de l'Argue", a:"Presqu'île", v:["hidden","history","quiet"], d:5, s:"Wrought iron and 19th-century forgetting shelter an empty shopping passage", st:"The passage opens onto the street without fanfare — a narrow entrance between two shopfronts. Inside, the light softens. Iron railings curve above on the second floor. The shops have changed a dozen times but the structure endures: glass roof letting in grey light, the smell of old wood and dust. You can be alone here for minutes.", im:"It's 1895. Shopkeepers polish their windows, and this passage is the new heart of the city.", t:"Off Rue de la République, 2nd arrondissement. €0. Walk it at 7am when deliverymen still have the street. No one watches you. Near Opéra metro.", c:["history_big","neighbourhoods","free_culture"], r:"g", nn:"Passage de l'Argue", ns:"Le fer forgé et l'oubli du 19e siècle abritent une galerie commerciale vide", nst:"Le passage s'ouvre sur la rue sans fanfare — une entrée étroite entre deux devantures. À l'intérieur, la lumière s'adoucit. Les rampes en fer se courbent au-dessus au deuxième étage. Les boutiques ont changé une douzaine de fois mais la structure endure: plafond de verre laissant entrer une lumière grise, l'odeur du vieux bois et de la poussière. Vous pouvez être seul ici pendant des minutes.", nt:"Off Rue de la République, 2e arrondissement. €0. Promenez-vous à 7h quand les livreurs ont encore la rue. Personne ne vous regarde. Près du métro Opéra."},

{id:47, n:"Rue de la République", a:"Presqu'île", v:["beautiful","history"], d:5, s:"Lyon's main street belongs to street cleaners before the day begins", st:"At dawn, the street is a theatre of workers: sweeping, restocking, washing. The Haussmann-scale buildings — heavy stone, ornate cornices — belong to the city for those first two hours. The light is soft. Shop windows reflect the quiet street. By 8am the tourists arrive; by 10am it's noise.", im:"It's 1870. The street is lined with silk warehouses and the richest men in France walk it on their way to the Exchange.", t:"Metro A or B to any central station. €0. Walk it at 7am, alone, with a café crème from somewhere. The architecture is visible then — not obscured by crowds.", c:["neighbourhoods","history_big"], r:"g", nn:"Rue de la République", ns:"La rue principale de Lyon appartient aux balayeurs avant que le jour ne commence", nst:"À l'aube, la rue est un théâtre de travailleurs: balayage, ravitaillement, nettoyage. Les bâtiments de style Haussmann — pierre lourde, corniches ornées — appartiennent à la ville pendant ces deux premières heures. La lumière est douce. Les vitrines reflètent la rue tranquille. À 8h les touristes arrivent; à 10h c'est du bruit.", nt:"Metro A ou B à n'importe quelle gare centrale. €0. Promenez-vous à 7h, seul, avec un café crème de quelque part. L'architecture est visible alors — pas obscurcie par les foules."},

{id:48, n:"Confluence District", a:"Confluence", v:["weird","beautiful","history"], d:15, s:"Two rivers finally meet where a spacecraft of a building waits", st:"The Confluence point is architectural shock: the Musée des Confluences rises from the riverbank as stainless steel and glass in shapes that reject geometry. The Rhône and Saône converge below in a muddy swirl. On Saturday morning, the market surrounds the building — flowers, bread, noise — which somehow makes the strange architecture less strange.", im:"It's 1870. A boat captain watches the two rivers decide where to flow, and imagines someday building a monument to the moment.", t:"Tram T1 to Musée des Confluences. €0 to visit the confluence point itself (walk along the banks). Museum €9 (free first Sunday of month). Saturday market 8am–1pm. Bring your own bag; bags are restricted.", c:["history_big","weird","nature"], r:"g", nn:"Confluences", ns:"Deux rivières se rencontrent enfin où un bâtiment en forme de vaisseau spatial attend", nst:"Le point de Confluence est un choc architectural: le Musée des Confluences s'élève de la rive en acier inoxydable et verre dans des formes qui rejettent la géométrie. Le Rhône et la Saône convergent en dessous dans un tourbillon boueux. Le samedi matin, le marché entoure le bâtiment — fleurs, pain, bruit — ce qui rend bizarrement l'architecture étrange moins étrange.", nt:"Tram T1 jusqu'à Musée des Confluences. €0 pour visiter le point de confluence lui-même (marchez le long des rives). Musée €9 (gratuit premier dimanche du mois). Marché samedi 8h–13h. Apportez votre propre sac; les sacs sont restreints."},

{id:49, n:"Musée des Confluences", a:"Confluence", v:["weird","beautiful"], d:15, s:"A deconstructivist spacecraft catalogues human death and navigation", st:"The building is disorienting — no right angles, no obvious entry. Inside, the collection is remarkable: Egyptian mummies next to Pacific Islander wayfinding charts. A glass cabinet of beetles from the Amazon. The museum doesn't organize by culture or period; it follows themes — water, death, migration — which makes you think differently about what you're seeing.", im:"It's 1920. An anthropologist imagines a museum where objects from all human cultures sit as equals, refusing the hierarchy of Western museums.", t:"Tram T1: Musée des Confluences. €9 general admission. Free entry first Sunday of every month. Allow 2 hours minimum. The audio guide is in French and English; worth €3.", c:["weird","history_big","nerd"], r:"g", nn:"Musée des Confluences", ns:"Un vaisseau spatial déconstructiviste catalogue la mort et la navigation humaines", nst:"Le bâtiment est désorientant — pas d'angles droits, pas d'entrée évidente. À l'intérieur, la collection est remarquable: momies égyptiennes à côté des cartes de navigation océaniennes du Pacifique. Un cabinet de verre de coléoptères d'Amazonie. Le musée n'organise pas par culture ou période; il suit des thèmes — eau, mort, migration — ce qui vous fait penser différemment à ce que vous voyez.", nt:"Tram T1: Musée des Confluences. €9 admission générale. Entrée gratuite premier dimanche de chaque mois. Prévoyez 2 heures minimum. Le guide audio est en français et anglais; vaut €3."},

{id:50, n:"Lumière Brothers' Garden", a:"8th (Monplaisir)", v:["history","beautiful","hidden"], d:25, s:"Stand where moving pictures first flickered onto a wall in 1895", st:"The garden surrounds the Institute Lumière — a converted factory where the brothers lived and worked. The exact wall where the workers in the Sortie des usines Lumière emerged is still here, now overgrown with ivy. The garden is green, quiet. You stand on the same ground where cinema was born as an accidental thing.", im:"It's 1895. Louis watches his factory workers walk across the courtyard, and he captures it on film — not knowing he's invented a century of storytelling.", t:"Métro A to Monplaisir-Lumière or Tram T6. Institut Lumière €7 (garden included). Open 2–7pm Tuesday–Sunday. The house interior is also visible. Bring a camera; the garden and wall are photogenic.", c:["history_big","free_culture"], r:"g", nn:"Jardin des frères Lumière", ns:"Tenez-vous où les images animées ont d'abord scintillé sur un mur en 1895", nst:"Le jardin entoure l'Institut Lumière — une ancienne usine convertie où les frères ont vécu et travaillé. Le mur exact où les ouvriers de la Sortie des usines Lumière ont émergé est toujours là, maintenant recouvert de lierre. Le jardin est vert, tranquille. Vous vous tenez sur le même sol où le cinéma est né comme une chose accidentelle.", nt:"Métro A jusqu'à Monplaisir-Lumière ou Tram T6. Institut Lumière €7 (jardin inclus). Ouvert 14–19h mardi–dimanche. L'intérieur de la maison est également visible. Apportez un appareil photo; le jardin et le mur sont photogéniques."},

{id:51, n:"Saint-Just Church", a:"Fourvière", v:["hidden","quiet","history"], d:20, s:"Romanesque stone rising among the quiet streets above Fourvière", st:"The church sits on a small square with no signage, no tourists, no crowds. The interior is dim stone and arches. Light falls through high windows onto the floor. You're often alone — maybe a cleaner, maybe someone in prayer. The Romanesque stonework is subtle, not showy. It feels like a working church, not a monument.", im:"It's 1200. The church is new. Stone cutters have just finished the last arch, and the bishop kneels to inspect their work.", t:"Métro C to Croix-Rousse, then walk uphill 15 minutes to Saint-Just plateau. €0. Open during mass times (usually 6–8pm). Early morning visits sometimes possible; check online. The plateau itself is worth the walk: quieter than the lower city, wider streets.", c:["history_big","neighbourhoods","free_culture"], r:"g", nn:"Église Saint-Just", ns:"La pierre romane s'élève parmi les rues tranquilles au-dessus de Fourvière", nst:"L'église s'asseoit sur une petite place sans panneaux, pas de touristes, pas de foules. L'intérieur est pierre dimanche et arches. La lumière tombe par des fenêtres hautes sur le sol. Vous êtes souvent seul — peut-être un nettoyeur, peut-être quelqu'un en prière. La maçonnerie romane est subtile, pas voyante. Cela ressemble à une église qui fonctionne, pas à un monument.", nt:"Métro C jusqu'à Croix-Rousse, puis marchez uphill 15 minutes jusqu'au plateau de Saint-Just. €0. Ouvert pendant les heures de messe (généralement 18–20h). Les visites tôt le matin parfois possibles; vérifiez en ligne. Le plateau lui-même vaut la promenade: plus tranquille que la ville basse, rues plus larges."},

{id:52, n:"Rue Burdeau", a:"Presqu'île", v:["local","hidden","quiet"], d:8, s:"Second-hand bookshops crowd a narrow street for readers, not tourists", st:"Five or six bookshops in a row, each in an old narrow building. Philosophy in one, art and design in another, French literature in a third. The owners have been there 20, 30, sometimes 40 years. They'll talk to you about books if you stand long enough. The street is quiet — not many tourists know it.", im:"It's 1970. A student walks this street for the first time, and buys a Foucault book that changes how he thinks.", t:"1st arrondissement, near Rue de la République. €0 to browse. Walk slowly; most shopkeepers appreciate people who read the spines, not just pass through.", c:["neighbourhoods"], r:"g", nn:"Rue Burdeau", ns:"Les bouquineries se pressent sur une rue étroite pour les lecteurs, pas les touristes", nst:"Cinq ou six bouquineries à la suite, chacune dans un vieil immeuble étroit. Philosophie dans l'une, art et design dans une autre, littérature française dans une troisième. Les propriétaires ont été là 20, 30, parfois 40 ans. Ils vous parleront de livres si vous restez assez longtemps. La rue est tranquille — pas beaucoup de touristes ne la connaissent.", nt:"1er arrondissement, près de Rue de la République. €0 pour parcourir. Marchez lentement; la plupart des libraires apprécient les gens qui lisent les épines, pas simplement passer."},

{id:53, n:"Nuits de Fourvière", a:"Fourvière", v:["famous","beautiful"], d:18, s:"Classical music echoing through a Roman theatre with Alps visible beyond", st:"The Nuits de Fourvière festival transforms the Roman theatre for the summer: chairs arranged in stone amphitheatre sections, a makeshift stage with real orchestras and soloists. The city lights below fade as dusk darkens. You hear not just the music but the rustle of the 3,000 people around you, very still, very quiet.", im:"It's 1965. The first concert is held — a Monteverdi opera — and the theatre comes alive after 1,900 years of silence.", t:"June–July, varied schedule. Métro F to Fourvière Basilica area or Tram T4. Tickets €15–40 (some free concerts for entry under €5). Book ahead online (festival-nuits-fouviere.com). Bring a cushion; stone seats are unforgiving. Bring a light sweater; evening temperature drops.", c:["history_big"], r:"g", nn:"Nuits de Fourvière", ns:"La musique classique résonne dans un théâtre romain avec les Alpes visibles au-delà", nst:"Le festival des Nuits de Fourvière transforme le théâtre romain pour l'été: chaises arrangées en sections d'amphithéâtre de pierre, une scène improvisée avec de vrais orchestres et solistes. Les lumières de la ville ci-dessous s'estompent à mesure que le crépuscule s'assombrit. Vous entendez non seulement la musique mais le bruissement des 3000 personnes autour de vous, très immobiles, très tranquilles.", nt:"Juin–juillet, calendrier varié. Métro F à Fourvière Basilica area ou Tram T4. Billets €15–40 (certains concerts gratuits pour entrée moins de €5). Réservez en ligne (festival-nuits-fouviere.com). Apportez un coussin; les sièges en pierre sont impitoyables. Apportez un pull léger; la température du soir baisse."},

{id:54, n:"Fête des Lumières", a:"City-wide", v:["famous","beautiful","weird"], d:0, s:"Eight million people watch the entire city transform into light for four nights", st:"December 8th evening: every facade is a screen. 3D projections map onto building surfaces. Light sculptures appear in the streets and squares. The Basilica glows. The streets fill with people, but moving, not stationary. It's not orderly — it's chaos, wonder, families pushing strollers, teenagers dancing to street musicians. The air is cold and the light is brilliant.", im:"It's 1643. Children place candles in windows to pray for the plague to end, and the city glows by accident.", t:"December 8–11 annually. €0 (walk the streets). Book accommodation 6 months ahead; the city fills completely. Streets are closed to cars; walk freely. Bring warm clothes. The programme changes each year; check Fête des Lumières website in November.", c:["weird","neighbourhoods"], r:"g", nn:"Fête des Lumières", ns:"Huit millions de personnes regardent la ville entière se transformer en lumière pendant quatre nuits", nst:"Soirée du 8 décembre: chaque façade est un écran. Des projections 3D se mappent sur les surfaces des bâtiments. Des sculptures de lumière apparaissent dans les rues et les places. La Basilique brille. Les rues se remplissent de gens, mais se déplacent, pas stationnaires. Ce n'est pas ordonné — c'est du chaos, de la merveille, des familles poussant des poussettes, des adolescents dansant sur des musiciens de rue. L'air est froid et la lumière est brillante.", nt:"8–11 décembre annuellement. €0 (promenez-vous dans les rues). Réservez un hébergement 6 mois à l'avance; la ville se remplit complètement. Les rues sont fermées aux voitures; marchez librement. Apportez des vêtements chauds. Le programme change chaque année; vérifiez le site de la Fête des Lumières en novembre."},
