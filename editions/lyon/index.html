const P = [,
  {name:'Hôtel de Bullioud',area:'Vieux Lyon 5e',desc:'Tucked at the end of one of Lyon's most remarkable traboules in rue Juiverie, this Renaissance gem features Philibert Delorme's gallery inspired by his 1536 Italy trip—the first of its style in France. Locals slip through for a quiet architectural whisper amid the old town's buzz. Free to enter; bus C19 or metro B to Suquet.[1]',tags:['hidden','courtyard','local','free'],lat:45.7667,lng:4.8245},
  {name:'Espace Diego Rivera',area:'Gerland 7e',desc:'This street art haven in the heart of the 7e bursts with bold, colorful frescoes honoring Mexican painter Diego Rivera, depicting ancient and modern slavery in South America. Locals wander here for an open-air gallery jolt that sparks deep conversations. Completely free; tram T1 to Debourg.[1]',tags:['street art','local','free'],lat:45.7385,lng:4.824},
  {name:'Musée Urbain Tony Garnier',area:'Monplaisir 8e',desc:'Wander 25 massive 230m² murals on building gables showcasing architect Tony Garnier's futuristic Lyon visions—an outdoor museum blending history and street art. Neighborhood folks bike by daily, drawing quiet inspiration from its urban dreams. Free access; metro D to Monplaisir-Lumière.[1]',tags:['street art','local','free'],lat:45.75,lng:4.867},
  {name:'Tombeau de Turpio',area:'Saint-Just 5e',desc:'Shaded by Fourvière hill, this mysterious Roman necropolis from 1885 excavations links to ancient Trion burial sites—a subtle archaeological pause off the beaten path. Locals hike up for reflective moments amid whispering stones. Free; bus 12 to Choulans.[1]',tags:['hidden','local','free'],lat:45.756,lng:4.813},
  {name:'Escaliers Prunelle',area:'Pentes de la Croix-Rousse 1er',desc:'These steep, secret stairs weave through the Croix-Rousse slopes, offering unexpected city glimpses and a slow climb into local lore. Hill residents use them daily for hidden shortcuts and fresh air breaths. Free; metro A to Croix-Rousse.[1]',tags:['hidden','viewpoint','local','free'],lat:45.775,lng:4.835},
  {name:'Passage des Imprimeurs',area:'Presqu'île 2e',desc:'A narrow, arcaded passageway linking quai Saint-Antoine to rue Mercière evokes old Lyon printing history, with intimate spots for lingering. Locals duck in for coffee pauses near the nearby printing museum. Free; metro A to Cordeliers.[1]',tags:['hidden','courtyard','local','free'],lat:45.76,lng:4.831},
  {name:'Jardin Botanique Tête d’Or',area:'Parc de la Tête d’Or 6e',desc:'Deeper in the park's free botanical gardens, locals lose hours among serres, themed gardens, and a vast arboretum—more captivating than Paris's version. Perfect for slow picnics or quiet runs under rare trees. Free; metro B to Masséna.[4]',tags:['park','local','free'],lat:45.785,lng:4.858},
  {name:'Maison Valla',area:'Brotteaux 6e',desc:'This tucked-away house in the elegant Brotteaux hides architectural surprises that locals share in hushed tones for its understated elegance. A serene courtyard escape from boulevard bustle. Free; tram T1 to Brotteaux.[1]',tags:['hidden','courtyard','local','free'],lat:45.777,lng:4.855},
  {name:'Traboule de la Maison Brunet',area:'Vieux Lyon',desc:'One of Lyon's mythical secret passages with vaulted ceilings and hidden doors, part of 500 traboules shaping the city's soul—only 80 public. Locals guide friends through for that insider thrill. Free; metro D to Vieux Lyon.[2]',tags:['hidden','courtyard','local','free'],lat:45.765,lng:4.825},
  {name:'Cour des Voraces',area:'Croix-Rousse',desc:'Fabled traboule courtyard steeped in canut silk worker history, with echoing voûtes that locals cherish for evening whispers and history haunts. A slow spiral into Lyon's rebellious past. Free; metro C to Hénon.[2]',tags:['hidden','courtyard','local','free'],lat:45.7755,lng:4.83},
  {id:1,n:"Traboules Secret Passages #1 — Vieux Lyon",a:"Vieux Lyon",v:["hidden", "history"],d:1,s:"Renaissance passageways connecting blocks: silk workers used them, secret routes, now you slip between buildings like a ghost.",st:"A doorway leads into darkness. You walk through a courtyard you couldn\'t see from the street. You emerge on another street. The route is hidden. Used for centuries.",im:"It\'s 1500s. Silk workers use traboules to move between workshops unseen.",t:"A doorway leads into darkness. You walk through a courtyard you couldn\'t see from the street. You emerge on another street. The route is hidden. Used for centuries.\",im:\"It\'s 1500s. Silk workers use traboules to move between workshops unseen.\",t:\"Vieux Lyon (Old Town). Free to walk many. Some gated. 2-3 hours exploring. Go midday.",c:["hidden", "architecture"],r:"g",nn:"Traboules Secret Passages #1 — Vieux Lyon",ns:"Un lieu authentique où les Parisiens se retrouvent.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},
  {id:2,n:"Fourvière Hill Roman Amphitheatres #2 — Fourvière",a:"Fourvière",v:["history", "beautiful"],d:2,s:"Ancient Roman theaters carved into a hillside: seats are worn, 2,000 years of weight is visible, the view overlooks the city.",st:"Stone seats. You sit where Romans sat. The stage area is small. The hillside curves. From the top: Lyon spreads below. The scale is human despite the age.",im:"It\'s 150 AD. Romans build theaters on a hill. The city grows below.",t:"Stone seats. You sit where Romans sat. The stage area is small. The hillside curves. From the top: Lyon spreads below. The scale is human despite the age.\",im:\"It\'s 150 AD. Romans build theaters on a hill. The city grows below.\",t:\"Funicular or walk to Fourvière. Free to walk ruins. €8 for museum. 2 hours. Morning light best.",c:["history_big", "high_spots"],r:"g",nn:"Fourvière Hill Roman Amphitheatres #2 — Fourvière",ns:"Un lieu authentique où les Parisiens se retrouvent.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},

  {id:106,n:"Traboules (Secret Passageways)",a:"Vieux Lyon",v:["hidden","history","local"],d:15,s:"Renaissance passageways connecting buildings — a network of secret routes",st:"Traboules are covered passages through buildings, originally used by silk workers. Many are now open to the public. Duck through unmarked doors to discover shortcuts, courtyards, and hidden history.",im:"Time-travel: Built 16th-18th centuries for the silk trade.",t:"Free. Walk Vieux Lyon looking for \"traboule\" signs.",c:["history_big","architecture"],r:"g",nn:"Traboules Lyon",ns:"Pasajes secretos de Renacimiento — red de rutas",nst:"Descubre los pasadizos ocultos a través de edificios.",nt:"Gratis. Busca señales de \"traboule\"."},
  {id:107,n:"Basilica of Notre-Dame de Fourvière Exteriorviews",a:"Fourvière",v:["beautiful","free","history"],d:25,s:"Stunning white basilica on a hill — views over the city from the outside",st:"The basilica dominates Lyon\'s skyline. While the interior is paid, the exterior and surrounding gardens are free. The views from the basilica steps over the city are stunning.",im:"Time-travel: Built 1872-1946; it\'s a symbol of Lyon.",t:"Free exterior and steps. Funicular up. Paid interior.",c:["architecture","high_spots"],r:"g",nn:"Basilique Notre-Dame de Fourvière",ns:"Basílica blanca en la colina — vistas de la ciudad",nst:"Sube a la basílica para vistas panorámicas de Lyon.",nt:"Gratis exterior. Funicular. Interior pagado."}

  ,{id:108, n:"Traboules Passage Thiaffait — Croix-Rousse", a:"Croix-Rousse", v:["hidden","history","weird"], d:45, s:"Secret silk-worker passageways through entire blocks of Croix-Rousse—galleries where canuts smuggled silk bolts and coordinated revolts in the 1830s.", st:"Traboules are interior courtyards and covered passages linking apartment blocks. You enter one building and exit three blocks away through stone corridors, hidden courtyards, and spiral staircases. Passage Thiaffait has exposed beams, worn stone, the smell of old wood. It's a shortcut but also a time machine.", im:"Walking through a narrow covered passage, sunlight from distant courtyards ahead, rough stone walls on both sides, footsteps echoing, emerging into an unexpected courtyard where you were lost but the neighborhood was never lost.", t:"L4 metro to Croix-Rousse, or bus 19. Rue des Augustins area in Croix-Rousse. Traboules are open to the public (many buildings have doorway signs). Free. Go in daytime. Explore multiple traboules—each is different. This is not a formal site, just walk through.", c:[], r:"g", nn:"Traboule Passage Thiaffait", ns:"Passatges secrets de treball de seda a través de blocs sencers de Croix-Rousse—galeries on els canuts van contrabandear boltes de seda i van coordinar revoltes als 1830s.", nst:"Els traboules són patis interiors i passatges coberts que enllaçen blocs d'apartaments. Entres un edifici i surts tres blocs més endavant a través de corredors de pedra, patis ocults, i escales de cargol. Passage Thiaffait té bigues exposades, pedra gastada, la flaire de fusta vella.", nt:"L4 a Croix-Rousse, o autobús 19. Zona Rue des Augustins a Croix-Rousse. Els traboules estan oberts al públic. Gratis. Dia. Explora múltiples traboules—cadascun és diferent."}

  ,{id:109, n:"Cour des Voraces — Croix-Rousse", a:"Croix-Rousse", v:["hidden","history","weird"], d:30, s:"1831 revolutionary canut headquarters—a secret courtyard where silk workers planned the first European industrial strike, now a quiet Renaissance-style yard off a normal street.", st:"Cour des Voraces is accessed through a narrow archway from Rue Imbert Colomès. Inside is a Renaissance courtyard with old buildings facing inward, completely hidden from the street. This is where canuts met to organize the 1831 and 1834 revolts. The courtyard feels like a fortress disguised as a home.", im:"Pushing through a narrow archway into sudden quiet, a cobblestone courtyard, buildings with shuttered windows facing inward, complete silence, the street noise cut off instantly.", t:"L4 metro to Croix-Rousse. Rue Imbert Colomès in Croix-Rousse. Cour des Voraces is a free passage accessible during the day. It's not a formal museum, just walk in through the archway. Small plaques in French mark the historical site. Best visited early morning for solitude.", c:[], r:"g", nn:"Cour des Voraces", ns:"Seus revolucionari canut de 1831—un pati secret on els treballadors de seda van planejar la primera vaga industrial europea, ara un pati tranquil de renaixença fora d'un carrer normal.", nst:"Cour des Voraces està accedit a través d'una arxada estreta de Rue Imbert Colomès. Dins hi ha un pati de renaixença amb edificis vells enfrontats cap a dins, completament ocult del carrer.", nt:"L4 a Croix-Rousse. Rue Imbert Colomès a Croix-Rousse. Cour des Voraces és un passatge lliure accessible durant el dia. Gratis. Millor matí aviat per a solitud."}

  ,{id:110, n:"Les Halles Paul Bocuse Tuesday Morning — Presqu'île", a:"Presqu'île", v:["local","weird"], d:90, s:"Lyon's grand covered market—but go Tuesday morning when professional chefs shop for the week, not tourists browsing cheese stalls.", st:"Tuesday mornings at 8-10am, working chefs from restaurants across Lyon are at Les Halles selecting ingredients. You're not shopping for dinner, you're watching the restaurant supply chain happen live. Vendors recognize the chefs by name. It's choreography.", im:"Standing behind a Michelin-star chef as he examines a cut of fish under harsh market light, pointing at a specific filet, negotiating price with the vendor he's bought from for 20 years.", t:"L2 metro to Bougé-Bellecour, or walk from Presqu'île. Quai Saint-Antoine. Tue-Sun 7am-7:30pm. Best Tue 8-10am. Free to browse. Food €5-30. No entrance fee. Arrive early, some vendors sell out by 9am.", c:[], r:"y", nn:"Les Halles Paul Bocuse Dimarts al Matí", ns:"El mercat gran cobert de Lyon—però anar dimarts al matí quan els cuiners professionals compren per a la setmana, no turistes mirant parades de formatge.", nst:"Els dimarts al matí a les 8-10am, cuiners professionals de restaurants a través de Lyon estan a Les Halles seleccionant ingredients. No compres per a sopar, estàs mirant la cadena de subministrament de restaurants passar en directe.", nt:"L2 a Bougé-Bellecour. Quai Saint-Antoine. Dimarts-diumenge 7-19:30h. Millor dimarts 8-10am. Gratis mirar. Menjar €5-30."}

  ,{id:111, n:"Institut Lumière — Monplaisir", a:"Monplaisir", v:["history","beautiful"], d:90, s:"Where cinema was invented in 1895—the Lumière brothers' home, their Cinématographe camera, first films, everything that started motion pictures, still in the same house.", st:"The museum is inside the Lumière family mansion in Monplaisir. You see the Cinématographe camera, early film reels, photographs of the brothers, and the recreation of how they filmed their first movies in the backyard. It's small but profound—the birthplace of cinema.", im:"Looking at an 1895 camera that changed the world, tiny and precise, then sitting in a restored screening room watching silent film excerpts from the 1890s on a white wall, your only light the phosphorescent glow.", t:"L2 metro to Monplaisir, walk to Rue du Premier Film. Institut Lumière, Monplaisir. Tue-Sun 10am-5:30pm, closed Monday. €8. Guided tours available in French/English. Phone +33 4 78 78 18 95. Small museum, allow 60 min. Pre-booking suggested.", c:[], r:"y", nn:"Institut Lumière", ns:"On es va inventar el cinema el 1895—la casa dels germans Lumière, la seva Cinématografe, primeres pel·lícules, tot el que va començar pel·lícules de moviment.", nst:"El museu està dins la mansió de la família Lumière a Monplaisir. Veus la Cinématografe, bobines de pel·lícula primitives, fotografies dels germans, i la recreació de com van filmar les seves primeres pel·lícules al pati.", nt:"L2 a Monplaisir. Institut Lumière, Monplaisir. Dimarts-diumenge 10-17:30h, dilluns tancat. €8. Tours guiats disponibles. +33 4 78 78 18 95."}

  ,{id:112, n:"Théâtres Romains Sunset — Fourvière", a:"Fourvière", v:["history","beautiful","quiet"], d:60, s:"2,000-year-old Roman amphitheaters still in the hillside—two theaters built for 10,000 people, perfect sunset views over Saône, grass grows where actors once stood.", st:"The theaters are carved into the Fourvière hillside, largely intact. Grass and wildflowers cover the tiers where Romans once sat. The Saône river spreads below. At sunset, the light hits everything gold. It's a Roman moment preserved in French soil, with actual French families picnicking on ancient stones.", im:"Standing where Roman actors performed, grass under your feet on a 2,000-year-old stage, the river below catching sunset gold, the whole valley orange and pink.", t:"Bus C5, C14, or F13 to Fourvière. Walk uphill from basilica through park to theaters. Free entry. Open 24/7, outdoor site. Visit 6-8pm for sunset. Bring picnic, wine, blanket. Very few tourists know about this.", c:[], r:"g", nn:"Teatres Romans de Fourvière", ns:"Anfiteatres romans de 2.000 anys fa aún al costat de la collada—dos teatres construïts per a 10.000 persones, vistes de capvespre perfectes sobre el Saône.", nst:"Els teatres estan tallats al costat de Fourvière, en gran part intactes. L'herba i les flors silvestres cobreixen les files on els romans es van seure. El riu Saône s'estén a sota. Al capvespre, la llum colpeja tot or.", nt:"Autobús C5, C14, o F13 a Fourvière. Camina aigua amunt des de basílica pel parc als teatres. Entrada lliure. Obert 24/7. Visita 18-20h per a capvespre. Pica, vi, manta. Molt pocs turistes ho saben."}

  ,{id:113, n:"Jardin Rosa Mir — Croix-Rousse", a:"Croix-Rousse", v:["beautiful","weird","hidden"], d:45, s:"Private 700-square-meter mosaic garden hidden behind an apartment building—70 years of one woman creating an entire world of colored tiles and glass.", st:"Rosa Mir was a Catalan immigrant who, from 1947-1993, transformed her tiny apartment garden into a complete fantasy landscape of mosaics—walls, walkways, sculptures, all made from broken tiles she collected. It's like stepping into her brain. Hours are limited, so it's never crowded.", im:"Walking through a narrow garden path where every surface is covered in tiny mosaic tiles—blues, golds, greens—creating waves and patterns that seem to move, glass embedded in grout, the air sweet with age.", t:"L4 metro to Croix-Rousse. Rue Denfert-Rochereau 9. Garden hours Wed, Sat, Sun 2-6pm (closed Christmas, January). €5. Absolutely worth the search and the limited hours—truly unique. Guided tours available by appointment.", c:[], r:"y", nn:"Jardí de Rosa Mir", ns:"Jardí de mosaic privat de 700 metres quadrats ocult darrere un edifici d'apartaments—70 anys d'una dona creant un sencer món de rajoles de color i vidre.", nst:"Rosa Mir era una immigrant catalana qui, de 1947-1993, va transformar el seu petit jardí d'apartament en un paisatge fantasia complet de mosaics—parets, passadissos, escultures, tots fets de teules trencades que va recopilar.", nt:"L4 a Croix-Rousse. Rue Denfert-Rochereau 9. Hores jardí dimecres, dissabte, diumenge 14-18h. €5. Tours guiats per cita."}

  ,{id:114, n:"Pérouges Medieval Village — Pérouges", a:"Pérouges", v:["history","beautiful","quiet"], d:180, s:"13th-century walled village 35 minutes by TER train north—cobblestone streets, no cars allowed inside walls, feels like stepping into a game of thrones set.", st:"Pérouges is tiny—maybe 100 people live inside the walls. The entire village is stone streets, shuttered houses, a central square with a 14th-century church and no modern intrusion. It takes 30 minutes to walk the full village. The walk up from the train station takes 25 minutes through farmland.", im:"Standing in the central square with the church tower behind you, narrow streets fanning out, medieval geometry everywhere, not a single car sound, the smell of stone and age.", t:"TER from Lyon Part-Dieu to Meximieux-Pérouges station (33 min, €5). Walk or taxi 2km uphill to walled village (25 min walk, €10 taxi). Free to explore. Museum inside walls €5. Restaurants €10-18. Arrive morning, leave by 5pm before buses.", c:[], r:"g", nn:"Poble Medieval de Pérouges", ns:"Poble murat del segle XIII 35 minuts en tren TER al nord—carrers de llambordes, sense cotxes dins muralles, es sensa que entraràs en un escenari Game of Thrones.", nst:"Pérouges és minúscul—potser 100 persones viuen dins les muralles. Tot el poble és carrers de pedra, cases amb porticons, una plaça central amb una església del segle XIV sense intrusió moderna.", nt:"TER desde Lyon Part-Dieu fins Meximieux-Pérouges (33 min, €5). Camina o taxi 2 km aigua amunt fins poble murat (25 min camina, €10 taxi). Gratis explorar."}

  ,{id:115, n:"Musée des Beaux-Arts — Presqu'île", a:"Presqu'île", v:["beautiful","history"], d:120, s:"France's 2nd-largest art museum (if you count seriously)—French paintings, Italian Renaissance, Egyptian antiquities, housed in an 18th-century palace facing the Saône.", st:"The museum is organized perfectly by era—Egyptian through contemporary. Ground floor has massive Renaissance paintings. Second floor is French masters. The building itself is a palace. Wednesday afternoons have special hours but not free—admission is €8 full price, usually worth it for the collection.", im:"Standing in front of a 3-meter Delacroix painting in a high-ceilinged palace room, the Saône visible through tall windows, the light hitting gilt frames, the silence of people moving slowly through centuries.", t:"L4 metro to Fourvière, walk downhill or bus to Place Bellecour. Palais Saint-Pierre, 1 Place des Terreaux. Wed-Mon 10am-6pm, Tue closed. €8 full. Audioguides €3. Allow 2+ hours minimum. Permanent collection is world-class.", c:[], r:"g", nn:"Museu de les Belles Arts", ns:"Museu d'art de 2n més gran de França—pintures franceses, renaixença italiana, antiguitats egípcies, dins un palau del segle XVIII enfrontat al Saône.", nst:"El museu s'organitza perfectament per era—egípcia fins contemporània. La planta baixa té pintures renaixença massives. La segona planta és mestre francès. L'edifici mateix és un palau.", nt:"L4 a Fourvière. Palai Saint-Pierre, 1 Place Terreaux. Dimecres-dilluns 10-18h, dimarts tancat. €8. Audioguies €3."}

  ,{id:116, n:"Vieux Lyon Rue Saint-Jean — Vieux Lyon", a:"Vieux Lyon", v:["history","beautiful"], d:90, s:"Renaissance street 500 years old—narrow, winding, lined with silk merchants' homes, half-timbered facades, small galleries and restaurants, the beating heart of old Lyon.", st:"Rue Saint-Jean is the main spine of Vieux Lyon. It climbs from the Saône up toward the Fourvière basilica. On weekdays, locals use it. On weekends, it's busy but not touristy-crowded. Every doorway has a story—silk merchant homes, printing houses, bishops' quarters. The street has no planned aesthetic—it grew organically for 500 years.", im:"Walking cobblestone uphill, Renaissance facades pressing close on both sides, doorways dark and deep, a hidden courtyard opening off to the left, voices echoing in Vieux Lyon French.", t:"L1 metro to Vieux Lyon. Rue Saint-Jean runs from Saône to Place Saint-Jean (uphill). Free to explore. Small museums and galleries scattered throughout, €3-5 each. Restaurants €8-20. Best mid-morning weekday for locals' feeling.", c:[], r:"g", nn:"Carrer de Saint-Jean — Vieux Lyon", ns:"Carrer renaixença 500 anys vell—estret, sinuós, revestit de cases de mercaders de seda, façanes de fusta mitja, petites galeries i restaurants, el cor batent del vell Lyon.", nst:"Rue Saint-Jean és l'espina dorsal principal de Vieux Lyon. Puja desde el Saône vers la basílica de Fourvière. Entre setmana, locals l'usen. Els cap de setmana, és ocupada però no turística-massiva.", nt:"L1 a Vieux Lyon. Rue Saint-Jean puja del Saône fins Place Saint-Jean. Gratis explorar. Petits museus i galeries espargides, €3-5 cadascun."}

  ,{id:117, n:"Bouchon Chez Paul — Vieux Lyon", a:"Vieux Lyon", v:["local","weird"], d:90, s:"30-year-old family bouchon in Vieux Lyon—traditional Lyonnais cuisine, red tablecloths, wooden tables squeezed close, pot Lyonnais wine in pitchers, real neighborhood restaurant.", st:"Chez Paul is not touristy. The walls are wood-paneled, the floor is worn from decades of feet, the menu is handwritten. You sit elbow-to-elbow with other diners. The kitchen makes quenelles, andouillette, salade Lyonnaise—classics, done perfectly. Everyone speaks French. The owner knows his customers.", im:"Sitting at a wooden table inches from the next diner, a waiter setting down a heavy plate of quenelles, the smell of butter and pike fish, voices overlapping in French, the clink of wine glasses.", t:"L1 metro to Vieux Lyon. Rue Tramassac 6. Lunch 12-2pm, Dinner 7-10pm. Closed Sunday dinner, all day Monday. €18-25 per person with wine. Reservations essential—phone +33 4 78 28 50 84. Cash preferred but cards OK.", c:[], r:"y", nn:"Bouchon Chez Paul", ns:"Bouchon familiar de 30 anys al Vieux Lyon—cuina tradcional lionesa, mants roges, taules de fusta escanyades a prop, pot Lyonnais vi en mescles, restaurant de barri real.", nst:"Chez Paul no és turístic. Les parets són de fusta ressenyada, el terra està gastat per dècades de peus, el menú és manuscrit. T'asseus colze amb colze amb altres comensals.", nt:"L1 a Vieux Lyon. Rue Tramassac 6. Dinar 12-14h, Cena 19-22h. Tancat diumenge cena, tot dilluns. €18-25 per persona amb vi. Reserva essencial. +33 4 78 28 50 84."}

  ,{id:118, n:"Saône Swimming — Confluence", a:"Confluence", v:["local","free entry","quiet"], d:60, s:"Summer-only riverside swimming area where locals cool off—the Saône river at a designated beach area near Confluence Museum, no tourists.", st:"Late June through August, Confluence has a small supervised swimming area on the Saône riverbank. Water is cool but swimmable. Locals bring towels, jump in, float. It's free and unmanicured—no pools, no chlorine, just river water that's been tested for safety. Arrive early (8-9am) for calm water.", im:"Standing in cool river water up to your chest, the Confluence museum building glowing in morning light, green water around you, the Saône smell—river and stone, a few other locals floating nearby.", t:"L2 metro to Confluence, walk to riverbank. Designated swimming area open June-Aug, 8am-6pm. Free. Lifeguard on duty 10am-6pm. Cold water, bring towel. Very local, zero tourists. Morning is calmer, afternoon can be busy with families.", c:[], r:"y", nn:"Banya al Saône — Confluence", ns:"Zona de natació estival a la vora del riu on els locals es refreden—el riu Saône en una zona de platja designada prop del Museu Confluence, sense turistes.", nst:"De finals de juny a agost, Confluence té una petita zona de natació supervisada a la riba del Saône. L'aigua és freda però nedable. Els locals porten toalla, salten, floten. Gratis i sense manicura—sense piscines, sense clor.", nt:"L2 a Confluence. Zona de natació designada oberta juny-agost, 8-18h. Gratis. Socorrista en deure 10-18h. Aigua freda, porta toalla."}

  ,{id:119, n:"Le Mur des Canuts — Croix-Rousse", a:"Croix-Rousse", v:["beautiful","history","weird"], d:45, s:"1,200-square-meter trompe-l'oeil mural painted on a building side in 1987—depicts silk-worker life in Croix-Rousse, updated 1997, 2013, reflecting neighborhood evolution.", st:"The Mur des Canuts (Wall of the Silk Weavers) covers the entire side of a building at Boulevard des Canuts. It's photorealistic—painted buildings with windows, people in windows, stairways, the Jacquard loom, everything looks real but is paint on a wall. It's been updated several times to keep the characters aging and the neighborhood evolving.", im:"Standing across the street looking at the mural, your brain struggling to see it as flat paint—windows seem deep, people seem real, fabric seems to hang—the trompe-l'oeil effect complete.", t:"Bus C13, C14, F13 to Croix-Rousse, or L4 metro then walk. Boulevard des Canuts 36. Free to view from street. Open 24/7. No tours, just photograph. The whole wall is lit differently at different times—sunset gives the best light.", c:[], r:"g", nn:"Mur dels Canuts", ns:"Mural de trompe-l'oeil de 1.200 metres quadrats pintat en un costat de construcció el 1987—descriu la vida de treballador de seda a Croix-Rousse, actualitzat 1997, 2013.", nst:"El Mur dels Canuts (Paret dels Teixedors de Seda) cobreix tot el costat d'un edifici a Boulevard Canuts. És fotorealista—edificis pintats amb finestres, gent a finestres, escales, el teler de Jacquard.", nt:"Autobús C13, C14, F13 a Croix-Rousse. Boulevard Canuts 36. Gratis veure del carrer. Obert 24/7. Sense tours, només foto."}

  ,{id:120, n:"Musée Lugdunum — Fourvière", a:"Fourvière", v:["history","free entry"], d:75, s:"Roman Lyon museum—mosaics, sculptures, coins, tablets from when the city was a Roman frontier post, free first Sunday of month.", st:"Lugdunum is the Roman name for Lyon. The museum sits below the Fourvière basilica on the hillside, built into the slope. It's dedicated to Roman artifacts—glass, pottery, mosaics showing daily life, religious objects. The setting underground gives it an archaeological feel. Very few tourists find it.", im:"Walking down stone stairs into a cool museum built into a hillside, Roman mosaics under glass, pottery fragments dated to the 1st century AD, the smell of earth and stone.", t:"Bus C5, C14, F13, or walk uphill from Vieux Lyon. Place Fourvière 6. Wed-Sun 10am-6pm, Mon-Tue closed. €4 normal, FREE first Sunday of month. Allow 60 min. Phone +33 4 72 38 49 30. Very few tourists know about this.", c:[], r:"g", nn:"Museu Lugdunum", ns:"Museu roma de Lyon—mosaics, escultures, monedes, tauletes de quan la ciutat era una posició de frontera romana, gratis primer diumenge de mes.", nst:"Lugdunum és el nom romà de Lyon. El museu seu sota la basílica de Fourvière a la collada, construït en la pendent. Està dedicat a artefactes romans—vidre, ceràmica, mosaics que mostren la vida diària.", nt:"Autobús C5, C14, F13. Place Fourvière 6. Dimecres-diumenge 10-18h, dilluns-dimarts tancat. €4 normal, GRATIS primer diumenge de mes."}

  ,{id:121, n:"Beaujolais Wine Villages — Beaujolais", a:"Beaujolais", v:["beautiful","history"], d:240, s:"Ten historic cru villages in wine country 30 minutes north by TER—stop at Brouilly, Fleurie, Morgon, taste young wine fresh from the barrel.", st:"Beaujolais is not a single place but a region of 10 wine villages, each with its own appellation. The TER train from Lyon connects them. You can hop off at any village, taste wine at local caves, walk through vineyards, eat lunch with wine by the glass. Villages are small, walkable, genuine. Harvest season (September-October) is peak.", im:"Standing in a small winery tasting room, barrel-aged Beaujolais in a glass, the taste bright and young, window framing rows of grapevines sloping downhill.", t:"TER from Lyon Part-Dieu to Beaujolais villages (30-45 min, €5-8). Stop at Brouilly, Fleurie, or Morgon. Each village has wine shops open 10am-6pm. Wine €8-15/bottle. Restaurants €12-20. Best mid-September for harvest, mild weather. No reservation needed for casual wine stops.", c:[], r:"g", nn:"Pobles de Vins de Beaujolais", ns:"Deu pobles de cru històrics al país del vi 30 minuts al nord per TER—aturada a Brouilly, Fleurie, Morgon, tasten vins joves frescos del barril.", nst:"Beaujolais no és un lloc únic sinó una regió de 10 pobles de vi, cadascun amb la seva pròpia apel·lació. El tren TER de Lyon els connecta. Pots baixar en qualsevol poble, tasten vi en caves locals, caminar pel vinya.", nt:"TER desde Lyon Part-Dieu a pobles Beaujolais (30-45 min, €5-8). Atura a Brouilly, Fleurie, o Morgon. Cada poble té botigues de vi obertes 10-18h. Vi €8-15/botella."}

  ,{id:122, n:"Confluence Museum — Confluence", a:"Confluence", v:["beautiful","weird"], d:120, s:"Modern glacier-shaped building on the Saône—exhibits on human origins, ancient civilizations, evolution, a weird and wonderful museum designed like a ship.", st:"The Confluence Museum building looks like a giant ship run aground or a glacier melting into the river. Inside, exhibits on human evolution, ancient Egypt, mysterious cultures flow chronologically. It's weirdly presented—lots of interactive elements, multimedia, a bit chaotic but fascinating. The Saône forms the view from upstairs galleries.", im:"Walking through a floor devoted to Egypt, then rounding a corner to find human skeletons mounted in motion, then entering a gallery where light pours through angled museum windows onto the river below.", t:"L2 metro to Confluence. Quai Saint-Clair 86. Wed-Sun 10am-6pm, Tue closed, Mon 11am-6pm. €9 basic entry. Audioguides €3. Allow 2-3 hours minimum. Phone +33 4 28 38 12 12. Modern, unusual, very worth it.", c:[], r:"g", nn:"Museu Confluence", ns:"Edifici modern en forma de gelera a la vora del Saône—exhibits sobre orígens humans, civilitzacions antigues, evolució, un museu estrany i meravellós dissenyat com a vaixell.", nst:"L'edifici del Museu Confluence sembla un vaixell gegant encallat o un gelera fent-se aigua. Dins, exhibits sobre evolució humana, Egipte antigu, cultures misterioses flueixen cronològicament.", nt:"L2 a Confluence. Quai Saint-Clair 86. Dimecres-diumenge 10-18h, dimarts tancat, dilluns 11-18h. €9. Audioguies €3."}

  ,{id:123, n:"Rue du Boeuf — Vieux Lyon", a:"Vieux Lyon", v:["history","quiet","beautiful"], d:60, s:"Parallel Renaissance street to Saint-Jean but quieter—printers' homes, booksellers, narrow alley feeling, fewer tourists than main drag.", st:"Rue du Boeuf runs parallel to Rue Saint-Jean, one block over. It's the same Renaissance architecture but has kept its local feel. You'll see shuttered bookshops, small galleries, locals picking up groceries at small markets. It's the real Vieux Lyon where people actually live.", im:"Walking a narrow cobblestone street where shutters press close on both sides, a bookseller's window showing old volumes, the sound of your footsteps bouncing off stone.", t:"L1 metro to Vieux Lyon. Rue du Boeuf runs north-south parallel to Saint-Jean, starting from near Saône. Free to explore. Small bookshops and galleries scattered throughout. No formal sites, just walk and discover. Very local, very quiet.", c:[], r:"g", nn:"Carrer del Boeuf", ns:"Carrer renaixença paral·lel a Saint-Jean però més tranquil—cases d'impressors, venedors de llibres, sensació d'al·leyó estreta, menys turistes que el carrer principal.", nst:"Rue du Boeuf corre paral·lela a Rue Saint-Jean, un bloc més. És la mateixa arquitectura renaixença però ha mantingut el seu caràcter local. Veuràs botigues de llibres tancades, petites galeries.", nt:"L1 a Vieux Lyon. Rue du Boeuf corre nord-sud paral·lel a Saint-Jean. Gratis explorar. Botigues de llibres i galeries petites espargides."}

  ,{id:124, n:"Presqu'île Grid Walk — Presqu'île", a:"Presqu'île", v:["history","beautiful","quiet"], d:120, s:"19th-century geometric street grid planned like Paris—Place Bellecour is world's largest square, streets form perfect rectangles, a mathematical walk through urban planning.", st:"The Presqu'île was planned in the 1800s with absolute geometric precision—streets intersect at right angles, plazas are perfectly proportioned, the whole district is a lesson in urban design. Walking it is like walking through graph paper made human-scale. No chaos, just order.", im:"Standing at a plaza, streets radiating out in perfect lines, trees lining each street in regular intervals, the perspective seeming to stretch forever, the mathematical order obvious.", t:"Start at Presqu'île metro. Walk any street you like—they're all interesting. No tour needed, just the geometry itself is the experience. Free. Allow 2-3 hours for a full walk. Visit mid-morning when streets are quiet. Bring a map—you can navigate by the perfect grid.", c:[], r:"g", nn:"Camina de la Graella de Presqu'île", ns:"Graella de carrers geomètrica del segle XIX planificada com a París—Place Bellecour és la plaça més gran del món, els carrers formen rectangles perfectes, una camina matemàtica a través de planificació urbana.", nst:"La Presqu'île va ser planificada als 1800 amb precisió geomètrica absoluta—els carrers s'entrecreuen en angles rectes, les plazas estan perfectament proporcionals.", nt:"Comença a metro Presqu'île. Camina qualsevol carrer que vulguis—són tots interessants. Sense tour, només la geometria mateixa és l'experiència. Gratis."}

  ,{id:125, n:"Resistance Museum — Montchat", a:"Montchat", v:["history","weird"], d:90, s:"WWII Resistance headquarters in former Gestapo building where Klaus Barbie tortured prisoners—cellars still hold torture evidence, Jean Moulin was interrogated here.", st:"The Centre d'Histoire de la Résistance et de la Déportation sits in the school that the Germans requisitioned as Lyon's Gestapo headquarters. The cellars are still there—you see where torture happened. It's heavy history. The museum presents artifacts, photographs, testimony from survivors. Not a casual visit.", im:"Descending into cellar levels where light comes through high windows, rough stone walls, plaques marking cells, the sound of footsteps echoing, the weight of history pressing down.", t:"Bus 42 or 43 to Montchat, walk to Avenue Berthelot 14. Tue-Sun 10am-5:30pm, Mon closed. €7. Audioguides in English available. Phone +33 4 72 73 99 99. Allow 90 minutes. Not for the squeamish—it's real history.", c:[], r:"y", nn:"Museu de la Resistència", ns:"Seus de Resistència WWII en edifici Gestapo anterior on Klaus Barbie torturava presoners—els serrats encara mantenen evidència de tortura, Jean Moulin va ser interrogat aquí.", nst:"El Centre d'Histoire de la Résistance et de la Déportation seu a l'escola que els Alemanys van requisa com a seu de la Gestapo de Lyon. Els serrats són encara—veus on la tortura va passar.", nt:"Autobús 42 o 43 a Montchat. Avenue Berthelot 14. Dimarts-diumenge 10-17:30h, dilluns tancat. €7. Audioguies en anglès disponibles."}

  ,{id:126, n:"Musée des Miniatures et Décors de Cinéma — Vieux Lyon", a:"Vieux Lyon", v:["weird","beautiful","hidden"], d:60, s:"Museum of tiny film sets and miniature worlds—dollhouse-sized movie scenery from 200+ films, absurdly intricate, Paris, Rome, spaceships, all fitting in tiny cases.", st:"This museum is genuinely weird. You're looking at miniature sets from real films—the boat from Titanic but 6 inches long, a complete medieval castle 2 feet tall, a spaceship interior smaller than a shoebox. Every detail is perfect. It takes a special kind of obsession to notice and create these.", im:"Leaning close to a display case to see a miniature dining room where every fork is perfect and the candles are real tiny candles, the detail impossible in something so small.", t:"L1 metro to Vieux Lyon. Rue Saint-Jean 10 (upstairs in a small building). Wed-Sun 10am-6pm, Mon-Tue closed. €10. Absolutely strange and wonderful. Phone +33 4 72 00 44 06. Allow 45-60 min. Perfect for the weird-curious.", c:[], r:"y", nn:"Museu de Miniatures i Decorats de Cinema", ns:"Museu de diminuts decorats de pel·lícules i mons en miniatura—escenografia de cinema de mida de casa de nines de més de 200 pel·lícules, absourdament intrincada, París, Roma, naus espacials.", nst:"Aquest museu és genuïnament estrany. Veus diminuts estableix de pel·lícules reals—el vaixell del Titanic però 6 polzades de llarg, un castell medieval complet de 2 peus d'alçada.", nt:"L1 a Vieux Lyon. Rue Saint-Jean 10. Dimecres-diumenge 10-18h, dilluns-dimarts tancat. €10. Absolutament estrany i meravellós. +33 4 72 00 44 06."}

  ,{id:127, n:"Place Bellecour Market — Presqu'île", a:"Presqu'île", v:["local","free entry"], d:75, s:"World's largest public square (312,000 m²) hosting a market Tuesday and Sunday mornings—flowers, produce, local crafts, locals buying for the week.", st:"Place Bellecour is so massive that the market doesn't look crowded even though there are hundreds of vendors. Tuesday and Sunday mornings, the square fills with flower stands, vegetable vendors, local cheesemakers, bread. The Saône glimmers at one edge. It's the real Lyon shopping market.", im:"Standing in the massive square watching the market stretch away in all directions, sun hitting the wet morning pavement, vendors unpacking flowers and oranges, the smell of fresh bread.", t:"L2 metro to Bellecour. Place Bellecour center. Market Tue & Sun mornings 7am-2pm. Free to browse, cheap food. Arrive 8-9am for best selection, less crowded than 10am-noon. No entrance fee. Locals shopping, not tourists.", c:[], r:"g", nn:"Mercat de Place Bellecour", ns:"La plaça pública més gran del món (312.000 m²) acollint un mercat els dimarts i diumenges matins—flors, producte, oficis locals, locals comprant per a la setmana.", nst:"Place Bellecour és tan massiva que el mercat no sembla encomplert encara que hi hagi centenars de venedors. Els dimarts i diumenges matins, la plaça s'omple de parades de flors, venedors de verdures.", nt:"L2 a Bellecour. Place Bellecour centre. Mercat dimarts i diumenge matins 7-14h. Gratis mirar, menjar barat. Arribar 8-9am per a millor selecció."}



  ,{id:108, n:"Traboules Passage Thiaffait — Croix-Rousse", a:"Croix-Rousse", v:["hidden","history","weird"], d:45, s:"Secret silk-worker passageways through entire blocks of Croix-Rousse—galleries where canuts smuggled silk bolts and coordinated revolts in the 1830s.", st:"Traboules are interior courtyards and covered passages linking apartment blocks. You enter one building and exit three blocks away through stone corridors, hidden courtyards, and spiral staircases. Passage Thiaffait has exposed beams, worn stone, the smell of old wood. It's a shortcut but also a time machine.", im:"Walking through a narrow covered passage, sunlight from distant courtyards ahead, rough stone walls on both sides, footsteps echoing, emerging into an unexpected courtyard where you were lost but the neighborhood was never lost.", t:"L4 metro to Croix-Rousse, or bus 19. Rue des Augustins area in Croix-Rousse. Traboules are open to the public (many buildings have doorway signs). Free. Go in daytime. Explore multiple traboules—each is different. This is not a formal site, just walk through.", c:[], r:"g", nn:"Traboule Passage Thiaffait", ns:"Passatges secrets de treball de seda a través de blocs sencers de Croix-Rousse—galeries on els canuts van contrabandear boltes de seda i van coordinar revoltes als 1830s.", nst:"Els traboules són patis interiors i passatges coberts que enllaçen blocs d'apartaments. Entres un edifici i surts tres blocs més endavant a través de corredors de pedra, patis ocults, i escales de cargol. Passage Thiaffait té bigues exposades, pedra gastada, la flaire de fusta vella.", nt:"L4 a Croix-Rousse, o autobús 19. Zona Rue des Augustins a Croix-Rousse. Els traboules estan oberts al públic. Gratis. Dia. Explora múltiples traboules—cadascun és diferent."}

  
  ,{id:109, n:"Cour des Voraces — Croix-Rousse", a:"Croix-Rousse", v:["hidden","history","weird"], d:30, s:"1831 revolutionary canut headquarters—a secret courtyard where silk workers planned the first European industrial strike, now a quiet Renaissance-style yard off a normal street.", st:"Cour des Voraces is accessed through a narrow archway from Rue Imbert Colomès. Inside is a Renaissance courtyard with old buildings facing inward, completely hidden from the street. This is where canuts met to organize the 1831 and 1834 revolts. The courtyard feels like a fortress disguised as a home.", im:"Pushing through a narrow archway into sudden quiet, a cobblestone courtyard, buildings with shuttered windows facing inward, complete silence, the street noise cut off instantly.", t:"L4 metro to Croix-Rousse. Rue Imbert Colomès in Croix-Rousse. Cour des Voraces is a free passage accessible during the day. It's not a formal museum, just walk in through the archway. Small plaques in French mark the historical site. Best visited early morning for solitude.", c:[], r:"g", nn:"Cour des Voraces", ns:"Seus revolucionari canut de 1831—un pati secret on els treballadors de seda van planejar la primera vaga industrial europea, ara un pati tranquil de renaixença fora d'un carrer normal.", nst:"Cour des Voraces està accedit a través d'una arxada estreta de Rue Imbert Colomès. Dins hi ha un pati de renaixença amb edificis vells enfrontats cap a dins, completament ocult del carrer.", nt:"L4 a Croix-Rousse. Rue Imbert Colomès a Croix-Rousse. Cour des Voraces és un passatge lliure accessible durant el dia. Gratis. Millor matí aviat per a solitud."}

  
  ,{id:110, n:"Les Halles Paul Bocuse Tuesday Morning — Presqu'île", a:"Presqu'île", v:["local","weird"], d:90, s:"Lyon's grand covered market—but go Tuesday morning when professional chefs shop for the week, not tourists browsing cheese stalls.", st:"Tuesday mornings at 8-10am, working chefs from restaurants across Lyon are at Les Halles selecting ingredients. You're not shopping for dinner, you're watching the restaurant supply chain happen live. Vendors recognize the chefs by name. It's choreography.", im:"Standing behind a Michelin-star chef as he examines a cut of fish under harsh market light, pointing at a specific filet, negotiating price with the vendor he's bought from for 20 years.", t:"L2 metro to Bougé-Bellecour, or walk from Presqu'île. Quai Saint-Antoine. Tue-Sun 7am-7:30pm. Best Tue 8-10am. Free to browse. Food €5-30. No entrance fee. Arrive early, some vendors sell out by 9am.", c:[], r:"y", nn:"Les Halles Paul Bocuse Dimarts al Matí", ns:"El mercat gran cobert de Lyon—però anar dimarts al matí quan els cuiners professionals compren per a la setmana, no turistes mirant parades de formatge.", nst:"Els dimarts al matí a les 8-10am, cuiners professionals de restaurants a través de Lyon estan a Les Halles seleccionant ingredients. No compres per a sopar, estàs mirant la cadena de subministrament de restaurants passar en directe.", nt:"L2 a Bougé-Bellecour. Quai Saint-Antoine. Dimarts-diumenge 7-19:30h. Millor dimarts 8-10am. Gratis mirar. Menjar €5-30."}

  
  ,{id:111, n:"Institut Lumière — Monplaisir", a:"Monplaisir", v:["history","beautiful"], d:90, s:"Where cinema was invented in 1895—the Lumière brothers' home, their Cinématographe camera, first films, everything that started motion pictures, still in the same house.", st:"The museum is inside the Lumière family mansion in Monplaisir. You see the Cinématographe camera, early film reels, photographs of the brothers, and the recreation of how they filmed their first movies in the backyard. It's small but profound—the birthplace of cinema.", im:"Looking at an 1895 camera that changed the world, tiny and precise, then sitting in a restored screening room watching silent film excerpts from the 1890s on a white wall, your only light the phosphorescent glow.", t:"L2 metro to Monplaisir, walk to Rue du Premier Film. Institut Lumière, Monplaisir. Tue-Sun 10am-5:30pm, closed Monday. €8. Guided tours available in French/English. Phone +33 4 78 78 18 95. Small museum, allow 60 min. Pre-booking suggested.", c:[], r:"y", nn:"Institut Lumière", ns:"On es va inventar el cinema el 1895—la casa dels germans Lumière, la seva Cinématografe, primeres pel·lícules, tot el que va començar pel·lícules de moviment.", nst:"El museu està dins la mansió de la família Lumière a Monplaisir. Veus la Cinématografe, bobines de pel·lícula primitives, fotografies dels germans, i la recreació de com van filmar les seves primeres pel·lícules al pati.", nt:"L2 a Monplaisir. Institut Lumière, Monplaisir. Dimarts-diumenge 10-17:30h, dilluns tancat. €8. Tours guiats disponibles. +33 4 78 78 18 95."}

  
  ,{id:112, n:"Théâtres Romains Sunset — Fourvière", a:"Fourvière", v:["history","beautiful","quiet"], d:60, s:"2,000-year-old Roman amphitheaters still in the hillside—two theaters built for 10,000 people, perfect sunset views over Saône, grass grows where actors once stood.", st:"The theaters are carved into the Fourvière hillside, largely intact. Grass and wildflowers cover the tiers where Romans once sat. The Saône river spreads below. At sunset, the light hits everything gold. It's a Roman moment preserved in French soil, with actual French families picnicking on ancient stones.", im:"Standing where Roman actors performed, grass under your feet on a 2,000-year-old stage, the river below catching sunset gold, the whole valley orange and pink.", t:"Bus C5, C14, or F13 to Fourvière. Walk uphill from basilica through park to theaters. Free entry. Open 24/7, outdoor site. Visit 6-8pm for sunset. Bring picnic, wine, blanket. Very few tourists know about this.", c:[], r:"g", nn:"Teatres Romans de Fourvière", ns:"Anfiteatres romans de 2.000 anys fa aún al costat de la collada—dos teatres construïts per a 10.000 persones, vistes de capvespre perfectes sobre el Saône.", nst:"Els teatres estan tallats al costat de Fourvière, en gran part intactes. L'herba i les flors silvestres cobreixen les files on els romans es van seure. El riu Saône s'estén a sota. Al capvespre, la llum colpeja tot or.", nt:"Autobús C5, C14, o F13 a Fourvière. Camina aigua amunt des de basílica pel parc als teatres. Entrada lliure. Obert 24/7. Visita 18-20h per a capvespre. Pica, vi, manta. Molt pocs turistes ho saben."}

  
  ,{id:113, n:"Jardin Rosa Mir — Croix-Rousse", a:"Croix-Rousse", v:["beautiful","weird","hidden"], d:45, s:"Private 700-square-meter mosaic garden hidden behind an apartment building—70 years of one woman creating an entire world of colored tiles and glass.", st:"Rosa Mir was a Catalan immigrant who, from 1947-1993, transformed her tiny apartment garden into a complete fantasy landscape of mosaics—walls, walkways, sculptures, all made from broken tiles she collected. It's like stepping into her brain. Hours are limited, so it's never crowded.", im:"Walking through a narrow garden path where every surface is covered in tiny mosaic tiles—blues, golds, greens—creating waves and patterns that seem to move, glass embedded in grout, the air sweet with age.", t:"L4 metro to Croix-Rousse. Rue Denfert-Rochereau 9. Garden hours Wed, Sat, Sun 2-6pm (closed Christmas, January). €5. Absolutely worth the search and the limited hours—truly unique. Guided tours available by appointment.", c:[], r:"y", nn:"Jardí de Rosa Mir", ns:"Jardí de mosaic privat de 700 metres quadrats ocult darrere un edifici d'apartaments—70 anys d'una dona creant un sencer món de rajoles de color i vidre.", nst:"Rosa Mir era una immigrant catalana qui, de 1947-1993, va transformar el seu petit jardí d'apartament en un paisatge fantasia complet de mosaics—parets, passadissos, escultures, tots fets de teules trencades que va recopilar.", nt:"L4 a Croix-Rousse. Rue Denfert-Rochereau 9. Hores jardí dimecres, dissabte, diumenge 14-18h. €5. Tours guiats per cita."}

  
  ,{id:114, n:"Pérouges Medieval Village — Pérouges", a:"Pérouges", v:["history","beautiful","quiet"], d:180, s:"13th-century walled village 35 minutes by TER train north—cobblestone streets, no cars allowed inside walls, feels like stepping into a game of thrones set.", st:"Pérouges is tiny—maybe 100 people live inside the walls. The entire village is stone streets, shuttered houses, a central square with a 14th-century church and no modern intrusion. It takes 30 minutes to walk the full village. The walk up from the train station takes 25 minutes through farmland.", im:"Standing in the central square with the church tower behind you, narrow streets fanning out, medieval geometry everywhere, not a single car sound, the smell of stone and age.", t:"TER from Lyon Part-Dieu to Meximieux-Pérouges station (33 min, €5). Walk or taxi 2km uphill to walled village (25 min walk, €10 taxi). Free to explore. Museum inside walls €5. Restaurants €10-18. Arrive morning, leave by 5pm before buses.", c:[], r:"g", nn:"Poble Medieval de Pérouges", ns:"Poble murat del segle XIII 35 minuts en tren TER al nord—carrers de llambordes, sense cotxes dins muralles, es sensa que entraràs en un escenari Game of Thrones.", nst:"Pérouges és minúscul—potser 100 persones viuen dins les muralles. Tot el poble és carrers de pedra, cases amb porticons, una plaça central amb una església del segle XIV sense intrusió moderna.", nt:"TER desde Lyon Part-Dieu fins Meximieux-Pérouges (33 min, €5). Camina o taxi 2 km aigua amunt fins poble murat (25 min camina, €10 taxi). Gratis explorar."}

  
  ,{id:115, n:"Musée des Beaux-Arts — Presqu'île", a:"Presqu'île", v:["beautiful","history"], d:120, s:"France's 2nd-largest art museum (if you count seriously)—French paintings, Italian Renaissance, Egyptian antiquities, housed in an 18th-century palace facing the Saône.", st:"The museum is organized perfectly by era—Egyptian through contemporary. Ground floor has massive Renaissance paintings. Second floor is French masters. The building itself is a palace. Wednesday afternoons have special hours but not free—admission is €8 full price, usually worth it for the collection.", im:"Standing in front of a 3-meter Delacroix painting in a high-ceilinged palace room, the Saône visible through tall windows, the light hitting gilt frames, the silence of people moving slowly through centuries.", t:"L4 metro to Fourvière, walk downhill or bus to Place Bellecour. Palais Saint-Pierre, 1 Place des Terreaux. Wed-Mon 10am-6pm, Tue closed. €8 full. Audioguides €3. Allow 2+ hours minimum. Permanent collection is world-class.", c:[], r:"g", nn:"Museu de les Belles Arts", ns:"Museu d'art de 2n més gran de França—pintures franceses, renaixença italiana, antiguitats egípcies, dins un palau del segle XVIII enfrontat al Saône.", nst:"El museu s'organitza perfectament per era—egípcia fins contemporània. La planta baixa té pintures renaixença massives. La segona planta és mestre francès. L'edifici mateix és un palau.", nt:"L4 a Fourvière. Palai Saint-Pierre, 1 Place Terreaux. Dimecres-dilluns 10-18h, dimarts tancat. €8. Audioguies €3."}

  
  ,{id:116, n:"Vieux Lyon Rue Saint-Jean — Vieux Lyon", a:"Vieux Lyon", v:["history","beautiful"], d:90, s:"Renaissance street 500 years old—narrow, winding, lined with silk merchants' homes, half-timbered facades, small galleries and restaurants, the beating heart of old Lyon.", st:"Rue Saint-Jean is the main spine of Vieux Lyon. It climbs from the Saône up toward the Fourvière basilica. On weekdays, locals use it. On weekends, it's busy but not touristy-crowded. Every doorway has a story—silk merchant homes, printing houses, bishops' quarters. The street has no planned aesthetic—it grew organically for 500 years.", im:"Walking cobblestone uphill, Renaissance facades pressing close on both sides, doorways dark and deep, a hidden courtyard opening off to the left, voices echoing in Vieux Lyon French.", t:"L1 metro to Vieux Lyon. Rue Saint-Jean runs from Saône to Place Saint-Jean (uphill). Free to explore. Small museums and galleries scattered throughout, €3-5 each. Restaurants €8-20. Best mid-morning weekday for locals' feeling.", c:[], r:"g", nn:"Carrer de Saint-Jean — Vieux Lyon", ns:"Carrer renaixença 500 anys vell—estret, sinuós, revestit de cases de mercaders de seda, façanes de fusta mitja, petites galeries i restaurants, el cor batent del vell Lyon.", nst:"Rue Saint-Jean és l'espina dorsal principal de Vieux Lyon. Puja desde el Saône vers la basílica de Fourvière. Entre setmana, locals l'usen. Els cap de setmana, és ocupada però no turística-massiva.", nt:"L1 a Vieux Lyon. Rue Saint-Jean puja del Saône fins Place Saint-Jean. Gratis explorar. Petits museus i galeries espargides, €3-5 cadascun."}

  
  ,{id:117, n:"Bouchon Chez Paul — Vieux Lyon", a:"Vieux Lyon", v:["local","weird"], d:90, s:"30-year-old family bouchon in Vieux Lyon—traditional Lyonnais cuisine, red tablecloths, wooden tables squeezed close, pot Lyonnais wine in pitchers, real neighborhood restaurant.", st:"Chez Paul is not touristy. The walls are wood-paneled, the floor is worn from decades of feet, the menu is handwritten. You sit elbow-to-elbow with other diners. The kitchen makes quenelles, andouillette, salade Lyonnaise—classics, done perfectly. Everyone speaks French. The owner knows his customers.", im:"Sitting at a wooden table inches from the next diner, a waiter setting down a heavy plate of quenelles, the smell of butter and pike fish, voices overlapping in French, the clink of wine glasses.", t:"L1 metro to Vieux Lyon. Rue Tramassac 6. Lunch 12-2pm, Dinner 7-10pm. Closed Sunday dinner, all day Monday. €18-25 per person with wine. Reservations essential—phone +33 4 78 28 50 84. Cash preferred but cards OK.", c:[], r:"y", nn:"Bouchon Chez Paul", ns:"Bouchon familiar de 30 anys al Vieux Lyon—cuina tradcional lionesa, mants roges, taules de fusta escanyades a prop, pot Lyonnais vi en mescles, restaurant de barri real.", nst:"Chez Paul no és turístic. Les parets són de fusta ressenyada, el terra està gastat per dècades de peus, el menú és manuscrit. T'asseus colze amb colze amb altres comensals.", nt:"L1 a Vieux Lyon. Rue Tramassac 6. Dinar 12-14h, Cena 19-22h. Tancat diumenge cena, tot dilluns. €18-25 per persona amb vi. Reserva essencial. +33 4 78 28 50 84."}

  
  ,{id:118, n:"Saône Swimming — Confluence", a:"Confluence", v:["local","free entry","quiet"], d:60, s:"Summer-only riverside swimming area where locals cool off—the Saône river at a designated beach area near Confluence Museum, no tourists.", st:"Late June through August, Confluence has a small supervised swimming area on the Saône riverbank. Water is cool but swimmable. Locals bring towels, jump in, float. It's free and unmanicured—no pools, no chlorine, just river water that's been tested for safety. Arrive early (8-9am) for calm water.", im:"Standing in cool river water up to your chest, the Confluence museum building glowing in morning light, green water around you, the Saône smell—river and stone, a few other locals floating nearby.", t:"L2 metro to Confluence, walk to riverbank. Designated swimming area open June-Aug, 8am-6pm. Free. Lifeguard on duty 10am-6pm. Cold water, bring towel. Very local, zero tourists. Morning is calmer, afternoon can be busy with families.", c:[], r:"y", nn:"Banya al Saône — Confluence", ns:"Zona de natació estival a la vora del riu on els locals es refreden—el riu Saône en una zona de platja designada prop del Museu Confluence, sense turistes.", nst:"De finals de juny a agost, Confluence té una petita zona de natació supervisada a la riba del Saône. L'aigua és freda però nedable. Els locals porten toalla, salten, floten. Gratis i sense manicura—sense piscines, sense clor.", nt:"L2 a Confluence. Zona de natació designada oberta juny-agost, 8-18h. Gratis. Socorrista en deure 10-18h. Aigua freda, porta toalla."}

  
  ,{id:119, n:"Le Mur des Canuts — Croix-Rousse", a:"Croix-Rousse", v:["beautiful","history","weird"], d:45, s:"1,200-square-meter trompe-l'oeil mural painted on a building side in 1987—depicts silk-worker life in Croix-Rousse, updated 1997, 2013, reflecting neighborhood evolution.", st:"The Mur des Canuts (Wall of the Silk Weavers) covers the entire side of a building at Boulevard des Canuts. It's photorealistic—painted buildings with windows, people in windows, stairways, the Jacquard loom, everything looks real but is paint on a wall. It's been updated several times to keep the characters aging and the neighborhood evolving.", im:"Standing across the street looking at the mural, your brain struggling to see it as flat paint—windows seem deep, people seem real, fabric seems to hang—the trompe-l'oeil effect complete.", t:"Bus C13, C14, F13 to Croix-Rousse, or L4 metro then walk. Boulevard des Canuts 36. Free to view from street. Open 24/7. No tours, just photograph. The whole wall is lit differently at different times—sunset gives the best light.", c:[], r:"g", nn:"Mur dels Canuts", ns:"Mural de trompe-l'oeil de 1.200 metres quadrats pintat en un costat de construcció el 1987—descriu la vida de treballador de seda a Croix-Rousse, actualitzat 1997, 2013.", nst:"El Mur dels Canuts (Paret dels Teixedors de Seda) cobreix tot el costat d'un edifici a Boulevard Canuts. És fotorealista—edificis pintats amb finestres, gent a finestres, escales, el teler de Jacquard.", nt:"Autobús C13, C14, F13 a Croix-Rousse. Boulevard Canuts 36. Gratis veure del carrer. Obert 24/7. Sense tours, només foto."}

  
  ,{id:120, n:"Musée Lugdunum — Fourvière", a:"Fourvière", v:["history","free entry"], d:75, s:"Roman Lyon museum—mosaics, sculptures, coins, tablets from when the city was a Roman frontier post, free first Sunday of month.", st:"Lugdunum is the Roman name for Lyon. The museum sits below the Fourvière basilica on the hillside, built into the slope. It's dedicated to Roman artifacts—glass, pottery, mosaics showing daily life, religious objects. The setting underground gives it an archaeological feel. Very few tourists find it.", im:"Walking down stone stairs into a cool museum built into a hillside, Roman mosaics under glass, pottery fragments dated to the 1st century AD, the smell of earth and stone.", t:"Bus C5, C14, F13, or walk uphill from Vieux Lyon. Place Fourvière 6. Wed-Sun 10am-6pm, Mon-Tue closed. €4 normal, FREE first Sunday of month. Allow 60 min. Phone +33 4 72 38 49 30. Very few tourists know about this.", c:[], r:"g", nn:"Museu Lugdunum", ns:"Museu roma de Lyon—mosaics, escultures, monedes, tauletes de quan la ciutat era una posició de frontera romana, gratis primer diumenge de mes.", nst:"Lugdunum és el nom romà de Lyon. El museu seu sota la basílica de Fourvière a la collada, construït en la pendent. Està dedicat a artefactes romans—vidre, ceràmica, mosaics que mostren la vida diària.", nt:"Autobús C5, C14, F13. Place Fourvière 6. Dimecres-diumenge 10-18h, dilluns-dimarts tancat. €4 normal, GRATIS primer diumenge de mes."}

  
  ,{id:121, n:"Beaujolais Wine Villages — Beaujolais", a:"Beaujolais", v:["beautiful","history"], d:240, s:"Ten historic cru villages in wine country 30 minutes north by TER—stop at Brouilly, Fleurie, Morgon, taste young wine fresh from the barrel.", st:"Beaujolais is not a single place but a region of 10 wine villages, each with its own appellation. The TER train from Lyon connects them. You can hop off at any village, taste wine at local caves, walk through vineyards, eat lunch with wine by the glass. Villages are small, walkable, genuine. Harvest season (September-October) is peak.", im:"Standing in a small winery tasting room, barrel-aged Beaujolais in a glass, the taste bright and young, window framing rows of grapevines sloping downhill.", t:"TER from Lyon Part-Dieu to Beaujolais villages (30-45 min, €5-8). Stop at Brouilly, Fleurie, or Morgon. Each village has wine shops open 10am-6pm. Wine €8-15/bottle. Restaurants €12-20. Best mid-September for harvest, mild weather. No reservation needed for casual wine stops.", c:[], r:"g", nn:"Pobles de Vins de Beaujolais", ns:"Deu pobles de cru històrics al país del vi 30 minuts al nord per TER—aturada a Brouilly, Fleurie, Morgon, tasten vins joves frescos del barril.", nst:"Beaujolais no és un lloc únic sinó una regió de 10 pobles de vi, cadascun amb la seva pròpia apel·lació. El tren TER de Lyon els connecta. Pots baixar en qualsevol poble, tasten vi en caves locals, caminar pel vinya.", nt:"TER desde Lyon Part-Dieu a pobles Beaujolais (30-45 min, €5-8). Atura a Brouilly, Fleurie, o Morgon. Cada poble té botigues de vi obertes 10-18h. Vi €8-15/botella."}

  
  ,{id:122, n:"Confluence Museum — Confluence", a:"Confluence", v:["beautiful","weird"], d:120, s:"Modern glacier-shaped building on the Saône—exhibits on human origins, ancient civilizations, evolution, a weird and wonderful museum designed like a ship.", st:"The Confluence Museum building looks like a giant ship run aground or a glacier melting into the river. Inside, exhibits on human evolution, ancient Egypt, mysterious cultures flow chronologically. It's weirdly presented—lots of interactive elements, multimedia, a bit chaotic but fascinating. The Saône forms the view from upstairs galleries.", im:"Walking through a floor devoted to Egypt, then rounding a corner to find human skeletons mounted in motion, then entering a gallery where light pours through angled museum windows onto the river below.", t:"L2 metro to Confluence. Quai Saint-Clair 86. Wed-Sun 10am-6pm, Tue closed, Mon 11am-6pm. €9 basic entry. Audioguides €3. Allow 2-3 hours minimum. Phone +33 4 28 38 12 12. Modern, unusual, very worth it.", c:[], r:"g", nn:"Museu Confluence", ns:"Edifici modern en forma de gelera a la vora del Saône—exhibits sobre orígens humans, civilitzacions antigues, evolució, un museu estrany i meravellós dissenyat com a vaixell.", nst:"L'edifici del Museu Confluence sembla un vaixell gegant encallat o un gelera fent-se aigua. Dins, exhibits sobre evolució humana, Egipte antigu, cultures misterioses flueixen cronològicament.", nt:"L2 a Confluence. Quai Saint-Clair 86. Dimecres-diumenge 10-18h, dimarts tancat, dilluns 11-18h. €9. Audioguies €3."}

  
  ,{id:123, n:"Rue du Boeuf — Vieux Lyon", a:"Vieux Lyon", v:["history","quiet","beautiful"], d:60, s:"Parallel Renaissance street to Saint-Jean but quieter—printers' homes, booksellers, narrow alley feeling, fewer tourists than main drag.", st:"Rue du Boeuf runs parallel to Rue Saint-Jean, one block over. It's the same Renaissance architecture but has kept its local feel. You'll see shuttered bookshops, small galleries, locals picking up groceries at small markets. It's the real Vieux Lyon where people actually live.", im:"Walking a narrow cobblestone street where shutters press close on both sides, a bookseller's window showing old volumes, the sound of your footsteps bouncing off stone.", t:"L1 metro to Vieux Lyon. Rue du Boeuf runs north-south parallel to Saint-Jean, starting from near Saône. Free to explore. Small bookshops and galleries scattered throughout. No formal sites, just walk and discover. Very local, very quiet.", c:[], r:"g", nn:"Carrer del Boeuf", ns:"Carrer renaixença paral·lel a Saint-Jean però més tranquil—cases d'impressors, venedors de llibres, sensació d'al·leyó estreta, menys turistes que el carrer principal.", nst:"Rue du Boeuf corre paral·lela a Rue Saint-Jean, un bloc més. És la mateixa arquitectura renaixença però ha mantingut el seu caràcter local. Veuràs botigues de llibres tancades, petites galeries.", nt:"L1 a Vieux Lyon. Rue du Boeuf corre nord-sud paral·lel a Saint-Jean. Gratis explorar. Botigues de llibres i galeries petites espargides."}

  
  ,{id:124, n:"Presqu'île Grid Walk — Presqu'île", a:"Presqu'île", v:["history","beautiful","quiet"], d:120, s:"19th-century geometric street grid planned like Paris—Place Bellecour is world's largest square, streets form perfect rectangles, a mathematical walk through urban planning.", st:"The Presqu'île was planned in the 1800s with absolute geometric precision—streets intersect at right angles, plazas are perfectly proportioned, the whole district is a lesson in urban design. Walking it is like walking through graph paper made human-scale. No chaos, just order.", im:"Standing at a plaza, streets radiating out in perfect lines, trees lining each street in regular intervals, the perspective seeming to stretch forever, the mathematical order obvious.", t:"Start at Presqu'île metro. Walk any street you like—they're all interesting. No tour needed, just the geometry itself is the experience. Free. Allow 2-3 hours for a full walk. Visit mid-morning when streets are quiet. Bring a map—you can navigate by the perfect grid.", c:[], r:"g", nn:"Camina de la Graella de Presqu'île", ns:"Graella de carrers geomètrica del segle XIX planificada com a París—Place Bellecour és la plaça més gran del món, els carrers formen rectangles perfectes, una camina matemàtica a través de planificació urbana.", nst:"La Presqu'île va ser planificada als 1800 amb precisió geomètrica absoluta—els carrers s'entrecreuen en angles rectes, les plazas estan perfectament proporcionals.", nt:"Comença a metro Presqu'île. Camina qualsevol carrer que vulguis—són tots interessants. Sense tour, només la geometria mateixa és l'experiència. Gratis."}

  
  ,{id:125, n:"Resistance Museum — Montchat", a:"Montchat", v:["history","weird"], d:90, s:"WWII Resistance headquarters in former Gestapo building where Klaus Barbie tortured prisoners—cellars still hold torture evidence, Jean Moulin was interrogated here.", st:"The Centre d'Histoire de la Résistance et de la Déportation sits in the school that the Germans requisitioned as Lyon's Gestapo headquarters. The cellars are still there—you see where torture happened. It's heavy history. The museum presents artifacts, photographs, testimony from survivors. Not a casual visit.", im:"Descending into cellar levels where light comes through high windows, rough stone walls, plaques marking cells, the sound of footsteps echoing, the weight of history pressing down.", t:"Bus 42 or 43 to Montchat, walk to Avenue Berthelot 14. Tue-Sun 10am-5:30pm, Mon closed. €7. Audioguides in English available. Phone +33 4 72 73 99 99. Allow 90 minutes. Not for the squeamish—it's real history.", c:[], r:"y", nn:"Museu de la Resistència", ns:"Seus de Resistència WWII en edifici Gestapo anterior on Klaus Barbie torturava presoners—els serrats encara mantenen evidència de tortura, Jean Moulin va ser interrogat aquí.", nst:"El Centre d'Histoire de la Résistance et de la Déportation seu a l'escola que els Alemanys van requisa com a seu de la Gestapo de Lyon. Els serrats són encara—veus on la tortura va passar.", nt:"Autobús 42 o 43 a Montchat. Avenue Berthelot 14. Dimarts-diumenge 10-17:30h, dilluns tancat. €7. Audioguies en anglès disponibles."}

  
  ,{id:126, n:"Musée des Miniatures et Décors de Cinéma — Vieux Lyon", a:"Vieux Lyon", v:["weird","beautiful","hidden"], d:60, s:"Museum of tiny film sets and miniature worlds—dollhouse-sized movie scenery from 200+ films, absurdly intricate, Paris, Rome, spaceships, all fitting in tiny cases.", st:"This museum is genuinely weird. You're looking at miniature sets from real films—the boat from Titanic but 6 inches long, a complete medieval castle 2 feet tall, a spaceship interior smaller than a shoebox. Every detail is perfect. It takes a special kind of obsession to notice and create these.", im:"Leaning close to a display case to see a miniature dining room where every fork is perfect and the candles are real tiny candles, the detail impossible in something so small.", t:"L1 metro to Vieux Lyon. Rue Saint-Jean 10 (upstairs in a small building). Wed-Sun 10am-6pm, Mon-Tue closed. €10. Absolutely strange and wonderful. Phone +33 4 72 00 44 06. Allow 45-60 min. Perfect for the weird-curious.", c:[], r:"y", nn:"Museu de Miniatures i Decorats de Cinema", ns:"Museu de diminuts decorats de pel·lícules i mons en miniatura—escenografia de cinema de mida de casa de nines de més de 200 pel·lícules, absourdament intrincada, París, Roma, naus espacials.", nst:"Aquest museu és genuïnament estrany. Veus diminuts estableix de pel·lícules reals—el vaixell del Titanic però 6 polzades de llarg, un castell medieval complet de 2 peus d'alçada.", nt:"L1 a Vieux Lyon. Rue Saint-Jean 10. Dimecres-diumenge 10-18h, dilluns-dimarts tancat. €10. Absolutament estrany i meravellós. +33 4 72 00 44 06."}

  
  ,{id:127, n:"Place Bellecour Market — Presqu'île", a:"Presqu'île", v:["local","free entry"], d:75, s:"World's largest public square (312,000 m²) hosting a market Tuesday and Sunday mornings—flowers, produce, local crafts, locals buying for the week.", st:"Place Bellecour is so massive that the market doesn't look crowded even though there are hundreds of vendors. Tuesday and Sunday mornings, the square fills with flower stands, vegetable vendors, local cheesemakers, bread. The Saône glimmers at one edge. It's the real Lyon shopping market.", im:"Standing in the massive square watching the market stretch away in all directions, sun hitting the wet morning pavement, vendors unpacking flowers and oranges, the smell of fresh bread.", t:"L2 metro to Bellecour. Place Bellecour center. Market Tue & Sun mornings 7am-2pm. Free to browse, cheap food. Arrive 8-9am for best selection, less crowded than 10am-noon. No entrance fee. Locals shopping, not tourists.", c:[], r:"g", nn:"Mercat de Place Bellecour", ns:"La plaça pública més gran del món (312.000 m²) acollint un mercat els dimarts i diumenges matins—flors, producte, oficis locals, locals comprant per a la setmana.", nst:"Place Bellecour és tan massiva que el mercat no sembla encomplert encara que hi hagi centenars de venedors. Els dimarts i diumenges matins, la plaça s'omple de parades de flors, venedors de verdures.", nt:"L2 a Bellecour. Place Bellecour centre. Mercat dimarts i diumenge matins 7-14h. Gratis mirar, menjar barat. Arribar 8-9am per a millor selecció."}
