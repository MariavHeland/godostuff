const P = [
{id:1,n:"Lac de Miribel-Jonage",a:"Beyond Lyon",v:["beautiful","local","free entry"],d:45,s:"The lake where Lyon goes when the city overheats \u2014 350 hectares of water, three free beaches, 20 minutes by bus.",st:"Every Lyonnais knows Miribel-Jonage. It\'s the city\'s escape valve in summer \u2014 four beaches of sand and gravel spread around a lake fed by the Rh\u00f4ne\'s water table, so clean you could drink it. And technically, you are \u2014 it supplies the city\'s drinking water. Three beaches are free: Le Morlet, La Baraka, and Le Fontanil.\n\nThe lake hides small coves along its edges if you\'re willing to walk. On a weekday in June, you can find stretches of shore with nobody on them. On a Saturday in August, forget it \u2014 arrive early or don\'t arrive. A cycling path connects the lake all the way to Lyon-Gerland via La Doua.",im:"Lying on gravel at La Baraka, the water still cold enough to shock you, the city skyline just visible through the trees, a family unpacking a cooler beside you.",t:"Bus 83 from Part-Dieu to Grand Parc Miribel-Jonage. Or bike it \u2014 the voie verte from Gerland is flat and beautiful. Free beaches supervised 1pm\u20137pm in summer. Get there before 11am on weekends or you\'ll be fighting for space.",c:["swimming","lakes","nature"],r:"g",nn:"Lac de Miribel-Jonage",ns:"Le lac o\u00f9 Lyon va quand la ville surchauffe \u2014 350 hectares d\'eau, trois plages gratuites, 20 minutes en bus.",nst:"Tous les Lyonnais connaissent Miribel-Jonage. C\'est la soupape de la ville en \u00e9t\u00e9 \u2014 quatre plages de sable et de gravier autour d\'un lac aliment\u00e9 par la nappe du Rh\u00f4ne. Trois plages sont gratuites : Le Morlet, La Baraka, Le Fontanil.\n\nLe lac cache des criques sur ses bords si vous \u00eates pr\u00eat \u00e0 marcher. En semaine en juin, vous trouverez des berges d\u00e9sertes. Un samedi d\'ao\u00fbt, arrivez t\u00f4t ou n\'arrivez pas.",nt:"Bus 83 depuis Part-Dieu. Ou \u00e0 v\u00e9lo par la voie verte depuis Gerland. Plages gratuites surveill\u00e9es 13h\u201319h en \u00e9t\u00e9. Arrivez avant 11h le week-end."},
{id:2,n:"Plages du Port-Galland",a:"Beyond Lyon",v:["hidden","beautiful","quiet","free entry"],d:40,s:"River swimming in water so clear it barely looks wet, 35 minutes east of Lyon, with no entrance fee and no lifeguard.",st:"The Ain river is one of the cleanest in the region, and at Port-Galland it spreads out over pebble beaches shaded by trees. The water is clear enough to see the bottom at two metres. Some sections are popular with naturists; others are just quiet stretches of gravel where families set up for the day.\n\nIt feels wild in a way that lakes with infrastructure don\'t. No parasols, no snack bars, no lifeguard whistles. Just a river, some shade, and whatever you brought with you.",im:"Standing knee-deep in water so clear it barely looks wet, smooth pebbles underfoot, the shade of an oak tree three steps behind you.",t:"Car only \u2014 35 minutes east of Lyon on the D1084. Free, unsupervised. Bring everything you need, there\'s no shop. Go midweek to avoid crowds.",c:["swimming","nature"],r:"g",nn:"Plages du Port-Galland \u2014 Rivi\u00e8re de l\'Ain",ns:"Baignade en rivi\u00e8re dans une eau cristalline, 35 minutes de Lyon. Gratuit, sans surveillance.",nst:"L\'Ain est l\'une des rivi\u00e8res les plus propres de la r\u00e9gion. \u00c0 Port-Galland, elle s\'\u00e9tale sur des plages de galets ombrag\u00e9es. L\'eau est assez claire pour voir le fond \u00e0 deux m\u00e8tres.\n\nC\'est sauvage d\'une mani\u00e8re que les lacs am\u00e9nag\u00e9s n\'ont pas. Pas de parasols, pas de snack, pas de sifflet de ma\u00eetre-nageur. Juste une rivi\u00e8re et ce que vous avez apport\u00e9.",nt:"Voiture uniquement \u2014 35 min \u00e0 l\'est de Lyon par la D1084. Gratuit. Apportez tout. En semaine pour \u00e9viter la foule."},
{id:3,n:"Lac d\'Aiguebelette",a:"Beyond Lyon",v:["beautiful","quiet","free entry"],d:90,s:"A glacial lake one hour east where the water turns turquoise, reaches 28\u00b0C in summer, and is free to swim after 7pm.",st:"Lac d\'Aiguebelette sits at 400 metres altitude in Savoie, surrounded by forested mountains. The water temperature is among the highest of any natural lake in France, and the colour \u2014 a deep emerald that shifts to turquoise depending on the light \u2014 is genuinely startling. Seven beaches spread around the lake, some supervised, some wild. Motorboats are banned, so the water stays glassy and the only sound is birdsong and paddle-splashes.\n\nAfter 7pm, swimming is free at all beaches. The evening light on the water is extraordinary \u2014 the lake turns from green to gold in twenty minutes.",im:"Turquoise water, 28 degrees, pine trees on every shore, no motorboat noise, a mountain reflected in the surface like a postcard that hasn\'t been retouched.",t:"TER from Part-Dieu to Voiron, then bus to Aiguebelette (~1.5 hours total). Beaches: \u20ac2.50 weekdays, \u20ac4 weekends. Free after 7pm. Parking fills fast in August \u2014 arrive by 10am on weekends.",c:["swimming","lakes","day_trips","nature"],r:"y",nn:"Lac d\'Aiguebelette",ns:"Un lac glaciaire \u00e0 une heure \u00e0 l\'est o\u00f9 l\'eau devient turquoise, atteint 28\u00b0C en \u00e9t\u00e9, et la baignade est gratuite apr\u00e8s 19h.",nst:"Le lac d\'Aiguebelette est \u00e0 400 m\u00e8tres d\'altitude en Savoie, entour\u00e9 de montagnes bois\u00e9es. La temp\u00e9rature de l\'eau est parmi les plus \u00e9lev\u00e9es de France, et la couleur \u2014 un \u00e9meraude profond qui vire au turquoise selon la lumi\u00e8re \u2014 est saisissante. Les bateaux \u00e0 moteur sont interdits.\n\nApr\u00e8s 19h, la baignade est gratuite sur toutes les plages. La lumi\u00e8re du soir sur l\'eau est extraordinaire.",nt:"TER depuis Part-Dieu jusqu\'\u00e0 Voiron, puis bus (~1h30 au total). Plages : 2,50\u20ac en semaine, 4\u20ac le week-end. Gratuit apr\u00e8s 19h."},
{id:4,n:"Lac des Sapins \u2014 Cublize",a:"Beyond Lyon",v:["hidden","beautiful","quiet","nature"],d:60,s:"Europe\'s largest biological swimming pool \u2014 8,000 square metres filtered by plants instead of chlorine, one hour north in the Beaujolais hills.",st:"At Cublize, in the green Beaujolais, someone built an 8,000-square-metre swimming pool and filtered it with plants instead of chlorine. The water is astonishingly pure \u2014 no chemicals, no sting in the eyes, no smell. The lake around it is also open for swimming, and the setting is deep countryside \u2014 forested hills, birdsong, the kind of quiet that makes you forget the A6 exists.\n\nIf you have sunscreen-averse skin or just a philosophical objection to chlorine, this is your answer. The hiking trails around the lake are free and beautiful even if you don\'t swim.",im:"Floating in water that has been cleaned by reeds and algae, surrounded by forest, the only sound a kayak paddle somewhere behind you.",t:"TER from Part-Dieu to Amplepuis, then Cars du Rh\u00f4ne shuttle to Cublize (weekends June, daily July\u2013August). Biological pool: \u20ac6 adults, \u20ac5 children. Lake trails free. Sunscreen banned in bio pool \u2014 bring a UV shirt. Board shorts banned.",c:["swimming","lakes","day_trips","nature"],r:"y",nn:"Lac des Sapins \u2014 Cublize",ns:"La plus grande piscine biologique d\'Europe \u2014 8 000 m\u00b2 filtr\u00e9s par des plantes, une heure au nord dans les collines du Beaujolais.",nst:"\u00c0 Cublize, dans le Beaujolais vert, quelqu\'un a construit une piscine de 8 000 m\u00b2 filtr\u00e9e par des plantes au lieu du chlore. L\'eau est d\'une puret\u00e9 \u00e9tonnante. Le lac autour est aussi ouvert \u00e0 la baignade, et le cadre est la campagne profonde \u2014 collines bois\u00e9es, chants d\'oiseaux.\n\nLes sentiers de randonn\u00e9e autour du lac sont gratuits et magnifiques m\u00eame sans se baigner.",nt:"TER depuis Part-Dieu jusqu\'\u00e0 Amplepuis, puis navette. Piscine bio : 6\u20ac adultes. Sentiers du lac gratuits. Cr\u00e8me solaire interdite dans la piscine bio."},
{id:5,n:"Jardin des Curiosit\u00e9s",a:"Fourvi\u00e8re",v:["hidden","beautiful","quiet","free entry"],d:30,s:"A tiny park on the Fourvi\u00e8re hill with six chairs bolted to the ground, permanently facing the entire city.",st:"The Jardin des Curiosit\u00e9s was a gift from Montr\u00e9al to Lyon \u2014 a symbol of friendship between the two cities. It sits on a steep slope above the Saint-Just neighbourhood, about 6,000 square metres of grass and a few trees. From its edge you can see the Presqu\'\u00eele, the two rivers, the Croix-Rousse hill, and on clear days the Alps and Mont Blanc. Six metal chairs are anchored to the ground at the viewpoint, permanently facing west.\n\nAt sunset, the light changes fast \u2014 the city turns gold, then copper, then blue. There\'s almost nobody here, even on summer evenings. It\'s the kind of place Lyonnais mention when they want to impress someone.",im:"Sitting in a bolted-down chair, wine in hand, watching the Sa\u00f4ne turn orange while the Basilica glows white above you.",t:"Funicular to Saint-Just (not Fourvi\u00e8re \u2014 Saint-Just is less crowded and closer). 5-minute walk. Free, always open. Best May to September. Bring wine \u2014 there\'s no shop nearby.",c:["high_spots","parks"],r:"g",nn:"Jardin des Curiosit\u00e9s",ns:"Un petit parc sur la colline de Fourvi\u00e8re avec six chaises boulonnées au sol, face \u00e0 toute la ville.",nst:"Le Jardin des Curiosit\u00e9s est un cadeau de Montr\u00e9al \u00e0 Lyon. Il surplombe le quartier Saint-Just \u2014 6 000 m\u00b2 d\'herbe et quelques arbres. Depuis le bord, on voit la Presqu\'\u00eele, les deux fleuves, la Croix-Rousse, et par temps clair les Alpes et le Mont Blanc. Six chaises m\u00e9talliques sont ancr\u00e9es au sol, face \u00e0 l\'ouest.\n\nAu coucher du soleil, la lumi\u00e8re change vite \u2014 la ville devient or, puis cuivre, puis bleue. Il n\'y a presque personne, m\u00eame les soirs d\'\u00e9t\u00e9.",nt:"Funiculaire jusqu\'\u00e0 Saint-Just. 5 min \u00e0 pied. Gratuit, toujours ouvert. Id\u00e9al de mai \u00e0 septembre. Apportez du vin."},
{id:6,n:"Place Rouville",a:"Croix-Rousse",v:["hidden","beautiful","local","quiet"],d:20,s:"The square at the top of the Croix-Rousse slopes where locals watch the sun drop directly behind the Basilica.",st:"Place Rouville is not well known outside the neighbourhood. It sits at the top of the Pentes, with an uninterrupted panorama over the Presqu\'\u00eele, the Sa\u00f4ne quays, and the Fourvi\u00e8re hill. There are benches. There are no tourists. The sun sets directly behind the Basilica in summer, and the light on the rooftops is extraordinary.\n\nThis is the sunset that Lyonnais from the Croix-Rousse consider theirs. They do not share it widely.",im:"The Basilica silhouetted against an orange sky, the sound of someone playing guitar two benches away, the city below turning on its lights.",t:"Bus C13 or walk up from Terreaux. Free, always open. Combine with a drink at a Croix-Rousse terrace afterwards.",c:["high_spots"],r:"g",nn:"Place Rouville",ns:"La place au sommet des pentes de la Croix-Rousse o\u00f9 les locaux regardent le soleil descendre derri\u00e8re la Basilique.",nst:"Place Rouville n\'est pas connue hors du quartier. Elle surplombe la Presqu\'\u00eele, les quais de Sa\u00f4ne et Fourvi\u00e8re. Il y a des bancs. Il n\'y a pas de touristes. Le soleil se couche pile derri\u00e8re la Basilique en \u00e9t\u00e9, et la lumi\u00e8re sur les toits est extraordinaire.\n\nC\'est le coucher de soleil que les Croix-Roussiens consid\u00e8rent comme le leur.",nt:"Bus C13 ou mont\u00e9e \u00e0 pied depuis les Terreaux. Gratuit, toujours ouvert."},
{id:7,n:"Mont\u00e9e de la Grande C\u00f4te",a:"Croix-Rousse",v:["local","beautiful","free entry"],d:25,s:"The steep pedestrian street that climbs from the Presqu\'\u00eele to the Croix-Rousse plateau \u2014 every step higher gives you a wider city view.",st:"The Mont\u00e9e de la Grande C\u00f4te is 500 metres of stone steps and cobblestones rising from the Rue des Terreaux to the Croix-Rousse plateau. It is punishing on the calves and spectacular for the eyes. Every few steps you turn around and the panorama expands \u2014 first the rooftops, then the river, then the Fourvi\u00e8re hill, then the whole city laid out below you.\n\nThe street is lined with small shops, galleries, and caf\u00e9s that get progressively more local the higher you climb. At the top you arrive breathless at the plateau and the Croix-Rousse market. At sunset, the light catches the city below like a painting being lit from the side.",im:"Halfway up, pausing on a stone step, the entire Presqu\'\u00eele golden below you, the Fourvi\u00e8re Basilica catching the last light.",t:"Start at Place des Terreaux (M\u00e9tro A, H\u00f4tel de Ville). Walk up. Free. 15 minutes if you\'re fit, 25 if you stop to look. Best in the hour before sunset.",c:["high_spots","neighbourhoods"],r:"g",nn:"Mont\u00e9e de la Grande C\u00f4te",ns:"La rue pi\u00e9tonne raide qui grimpe de la Presqu\'\u00eele au plateau de la Croix-Rousse \u2014 chaque marche \u00e9largit la vue.",nst:"La Mont\u00e9e de la Grande C\u00f4te, c\'est 500 m\u00e8tres de marches en pierre qui montent des Terreaux au plateau de la Croix-Rousse. C\'est \u00e9puisant pour les mollets et spectaculaire pour les yeux. \u00c0 chaque pas, le panorama s\'\u00e9largit \u2014 d\'abord les toits, puis le fleuve, puis Fourvi\u00e8re.\n\nLa rue est bord\u00e9e de petites boutiques et de caf\u00e9s qui deviennent de plus en plus locaux en montant. Au coucher du soleil, la lumi\u00e8re attrape la ville comme un tableau \u00e9clair\u00e9 de c\u00f4t\u00e9.",nt:"Depuis Place des Terreaux (M\u00e9tro A). Mont\u00e9e \u00e0 pied. Gratuit. 15 min en forme, 25 en s\'arr\u00eatant. Id\u00e9al une heure avant le coucher du soleil."},
{id:8,n:"P\u00e9rouges",a:"Beyond Lyon",v:["beautiful","history","quiet"],d:90,s:"A walled medieval village 30 minutes by train whose population dropped to 12 people before artists saved it from demolition.",st:"P\u00e9rouges sits on a hilltop above the Ain plain, its cobblestone streets and timber-framed houses essentially unchanged since the 15th century. Founded \u2014 legend says \u2014 by a Gallic colony returning from Perugia in Italy. For centuries it thrived on linen weaving. Then the industrial revolution happened, and the population collapsed from 1,500 to just 12 inhabitants. The village was about to be demolished when a group of artists formed a committee to save it.\n\nThe Galette de P\u00e9rouges \u2014 a flat tart of butter, sugar, and lemon \u2014 has been baked to the same recipe since medieval times. You eat it warm from the bakery on the main square, which hasn\'t changed since the 1400s.",im:"Cobblestones so uneven you have to watch your feet, hydrangeas climbing every doorframe, the smell of baking butter coming from around a stone corner.",t:"TER from Part-Dieu to Meximieux-P\u00e9rouges, ~32 min, runs hourly. \u20ac10 each way. 20-minute walk uphill from station (no bus). Entry free. Go before 10am or after 3pm to avoid tour groups.",c:["day_trips","history_big"],r:"g",nn:"P\u00e9rouges",ns:"Un village m\u00e9di\u00e9val fortifi\u00e9 \u00e0 30 minutes en train, dont la population est tomb\u00e9e \u00e0 12 habitants avant que des artistes ne le sauvent.",nst:"P\u00e9rouges est perch\u00e9 sur une colline au-dessus de la plaine de l\'Ain, ses rues pav\u00e9es et ses maisons \u00e0 colombages inchang\u00e9es depuis le XVe si\u00e8cle. La population est pass\u00e9e de 1 500 \u00e0 12 habitants. Le village allait \u00eatre d\u00e9moli quand des artistes l\'ont sauv\u00e9.\n\nLa Galette de P\u00e9rouges \u2014 beurre, sucre, citron \u2014 est cuite selon la m\u00eame recette depuis le Moyen \u00c2ge. On la mange chaude sur la place principale.",nt:"TER depuis Part-Dieu vers Meximieux-P\u00e9rouges, ~32 min. 10\u20ac l\'aller. 20 min de marche en montant. Entr\u00e9e gratuite. Avant 10h ou apr\u00e8s 15h."},
{id:9,n:"Vienne",a:"Beyond Lyon",v:["history","beautiful","free entry"],d:60,s:"A working French town 30 minutes south with a Roman temple still standing in the high street, virtually intact.",st:"Vienne was one of the most important cities in Roman Gaul \u2014 the Temple of Augustus and Livia still stands in the town centre, looking like it belongs in Rome rather than on a provincial French high street. The Roman theatre on the hillside above town hosts Jazz \u00e0 Vienne every summer \u2014 two weeks of world-class jazz in a 2,000-year-old amphitheatre seating 8,000.\n\nOutside festival season, the town is quiet, walkable, and almost tourist-free. The Mus\u00e9e Gallo-Romain de Saint-Romain-en-Gal, across the Rh\u00f4ne, has extraordinary mosaic floors and a view that makes you wonder why anyone goes to Arles instead.",im:"A Roman temple on a French high street, two thousand years old, shoppers walking past it with baguettes.",t:"TER from Part-Dieu or Perrache, ~25\u201330 min, runs frequently. \u20ac6\u2013\u20ac8 each way. Temple and town free to wander. Jazz \u00e0 Vienne: late June to mid-July, book in advance.",c:["day_trips","history_big","nerd"],r:"g",nn:"Vienne",ns:"Une ville \u00e0 30 minutes au sud avec un temple romain encore debout dans la rue principale.",nst:"Vienne \u00e9tait l\'une des plus importantes cit\u00e9s de la Gaule romaine. Le Temple d\'Auguste et de Livie est toujours debout en centre-ville, intact, comme s\'il appartenait \u00e0 Rome plut\u00f4t qu\'\u00e0 une rue commer\u00e7ante de province.\n\nHors festival, la ville est calme, piétonne et presque sans touristes. Le Mus\u00e9e de Saint-Romain-en-Gal, de l\'autre c\u00f4t\u00e9 du Rh\u00f4ne, poss\u00e8de des mosa\u00efques extraordinaires.",nt:"TER depuis Part-Dieu ou Perrache, ~25\u201330 min. 6\u20ac\u20138\u20ac l\'aller. Temple et ville : gratuits. Jazz \u00e0 Vienne : fin juin \u00e0 mi-juillet."},
{id:10,n:"Beaujolais \u2014 Pierres Dor\u00e9es",a:"Beyond Lyon",v:["beautiful","quiet","local"],d:90,s:"Golden stone villages, family vineyards, and Gamay wine \u2014 the real Beaujolais starts 30km north of Lyon.",st:"Most people associate Beaujolais with the Nouveau \u2014 the young wine released every November. But the real Beaujolais is the Crus: ten named appellations that produce serious, age-worthy wines from Gamay grapes at prices Burgundy hasn\'t seen in twenty years.\n\nThe southern Beaujolais \u2014 the Pierres Dor\u00e9es \u2014 is named for the warm golden colour of its local limestone. Villages like Oingt (officially one of France\'s most beautiful), Ch\u00e2tillon d\'Azergues, and Theiz\u00e9 sit among vineyards on gentle hills. Nearly every domaine will pour you a tasting if you knock on the door.",im:"A glass of chilled Fleurie on a stone terrace, golden-walled houses around you, the smell of sun-warmed limestone and grapevines.",t:"Car needed for the villages. Day tours from Place Bellecour (~\u20ac80\u2013\u20ac100 with tastings). TER to Belleville-en-Beaujolais from Part-Dieu (35 min) for the edge of the region. Villages free to walk.",c:["day_trips","nature"],r:"y",nn:"Beaujolais \u2014 Pierres Dor\u00e9es",ns:"Villages en pierre dor\u00e9e, vignobles familiaux et Gamay \u2014 le vrai Beaujolais commence \u00e0 30 km au nord de Lyon.",nst:"Le vrai Beaujolais, ce sont les Crus : dix appellations qui produisent des vins s\u00e9rieux \u00e0 des prix que la Bourgogne n\'a plus vus depuis vingt ans.\n\nLe sud du Beaujolais \u2014 les Pierres Dor\u00e9es \u2014 doit son nom \u00e0 la couleur dor\u00e9e de son calcaire. Des villages comme Oingt, Ch\u00e2tillon d\'Azergues et Theiz\u00e9 sont nich\u00e9s parmi les vignes.",nt:"Voiture n\u00e9cessaire. Circuits depuis Place Bellecour (~80\u2013100\u20ac). TER jusqu\'\u00e0 Belleville-en-Beaujolais (35 min). Villages gratuits."},
{id:11,n:"Jardin du Rosaire",a:"Fourvi\u00e8re",v:["hidden","beautiful","quiet","free entry"],d:30,s:"Hanging gardens cascading down the Fourvi\u00e8re hill between the Basilica and Vieux Lyon \u2014 terraces of roses, stone paths, almost nobody.",st:"Between the Basilica at the top and the rooftops of Vieux Lyon at the bottom, the Jardin du Rosaire descends the hillside in a series of planted terraces linked by stone paths and stairways. Rose bushes, wisteria, old trees, and benches placed at viewpoints that face east over the city.\n\nMost visitors take the funicular up and walk straight to the Basilica. They miss this garden entirely. It is one of the quietest places in Lyon \u2014 ten minutes from the tourist crush of Rue Saint-Jean, and utterly empty on weekday mornings. The descent takes about fifteen minutes and deposits you at the bottom of Vieux Lyon.",im:"A stone path winding through rose bushes, the city spread below through gaps in the trees, the sound of nothing except a bird.",t:"Enter from the Basilica esplanade or from Vieux Lyon at the bottom (Mont\u00e9e des Chazeaux). Free, always open. Best in May\u2013June when the roses peak. The descent from Basilica to Vieux Lyon is the better direction.",c:["parks","high_spots"],r:"g",nn:"Jardin du Rosaire",ns:"Jardins suspendus qui descendent la colline de Fourvi\u00e8re entre la Basilique et le Vieux Lyon \u2014 terrasses de roses, sentiers de pierre, presque personne.",nst:"Entre la Basilique en haut et les toits du Vieux Lyon en bas, le Jardin du Rosaire descend la colline en terrasses plant\u00e9es reli\u00e9es par des sentiers de pierre. Rosiers, glycine, vieux arbres, et des bancs plac\u00e9s face \u00e0 la ville.\n\nLa plupart des visiteurs prennent le funiculaire et foncent vers la Basilique. Ils ratent ce jardin. C\'est l\'un des endroits les plus calmes de Lyon.",nt:"Depuis l\'esplanade de la Basilique ou depuis le Vieux Lyon en bas. Gratuit, toujours ouvert. Id\u00e9al en mai\u2013juin pour les roses."},
{id:12,n:"Amphith\u00e9\u00e2tre des Trois Gaules",a:"Croix-Rousse",v:["history","hidden","free entry"],d:20,s:"The oldest Roman amphitheatre in France, below street level on the Croix-Rousse, where the first Christian martyrs in Gaul were killed in 177 CE.",st:"In 19 CE, the Romans built this amphitheatre as the federal sanctuary for the three Gallic provinces \u2014 the place where delegations from across Gaul gathered annually to affirm loyalty to Rome. In 177 CE, the first Christians in Gaul \u2014 including Blandine, a slave girl who became the city\'s patron saint \u2014 were tortured and killed here in front of a crowd.\n\nThe amphitheatre sits below street level at the base of the Croix-Rousse hill, almost invisible from the surrounding streets. Most Lyonnais walk past it without realising what happened there. It is smaller than the theatres on Fourvi\u00e8re, and more unsettling for it.",im:"Standing on the Rue des Tables Claudiennes, looking down into a sunken amphitheatre 2,000 years old, the Fourvi\u00e8re hill rising behind it.",t:"Rue des Tables Claudiennes, 1st arrondissement. Free, always open. The sunset view from here \u2014 amphitheatre in the foreground, Fourvi\u00e8re behind \u2014 is one of the best-kept photographic secrets in the city.",c:["history_big","nerd"],r:"g",nn:"Amphith\u00e9\u00e2tre des Trois Gaules",ns:"Le plus ancien amphith\u00e9\u00e2tre romain de France, sous le niveau de la rue sur la Croix-Rousse, o\u00f9 les premiers martyrs chr\u00e9tiens de Gaule furent tu\u00e9s en 177.",nst:"En 19 apr. J.-C., les Romains ont construit cet amphith\u00e9\u00e2tre comme sanctuaire f\u00e9d\u00e9ral des trois provinces gauloises. En 177, les premiers chr\u00e9tiens de Gaule \u2014 dont Blandine \u2014 y furent tortur\u00e9s et tu\u00e9s devant la foule.\n\nL\'amphith\u00e9\u00e2tre est sous le niveau de la rue, presque invisible. La plupart des Lyonnais passent devant sans savoir ce qui s\'y est pass\u00e9.",nt:"Rue des Tables Claudiennes, 1er. Gratuit, toujours ouvert. Vue spectaculaire au coucher du soleil avec Fourvi\u00e8re en arri\u00e8re-plan."},
{id:13,n:"Ar\u00eates de Poisson",a:"Croix-Rousse",v:["weird","hidden"],d:15,s:"Thirty-two identical dead-end tunnels radiating from a central shaft under the Croix-Rousse, discovered in 1959. Nobody knows who built them or why.",st:"Road workers building a tunnel under Croix-Rousse in 1959 stumbled upon an old well. Branching off from it were 32 tunnels, each about 30 metres long, all terminating in dead ends. The structure resembles a fish skeleton \u2014 hence the name. Nobody knows who built them, when, or why.\n\nTheories range from Roman-era grain storage to 16th-century military engineering to a Knights Templar treasury, but none has been confirmed. Archaeological digs found pottery fragments but nothing conclusive. It is one of the weirdest archaeological mysteries in France.",im:"Thirty-two identical dead-end tunnels, radiating from a central shaft like ribs from a spine, beneath a city that\'s been continuously inhabited for 2,000 years. Nobody knows why they\'re there.",t:"Not accessible without a guided tour. Check Lyon Patrimoine or the Journ\u00e9es du Patrimoine programme (third weekend of September). If you can\'t get in, the Croix-Rousse road tunnel passes directly over them.",c:["weird","nerd","history_big"],r:"y",nn:"Ar\u00eates de Poisson",ns:"Trente-deux tunnels identiques en cul-de-sac sous la Croix-Rousse, d\u00e9couverts en 1959. Personne ne sait qui les a construits ni pourquoi.",nst:"En 1959, des ouvriers qui creusaient un tunnel sous la Croix-Rousse sont tomb\u00e9s sur un vieux puits. Partant de celui-ci : 32 tunnels d\'environ 30 m\u00e8tres chacun, tous en cul-de-sac. La structure ressemble \u00e0 un squelette de poisson.\n\nPersonne ne sait qui les a construits, quand, ni pourquoi. C\'est l\'un des myst\u00e8res arch\u00e9ologiques les plus \u00e9tranges de France.",nt:"Accessible uniquement en visite guid\u00e9e. Journ\u00e9es du Patrimoine (3e week-end de septembre). Le tunnel routier de la Croix-Rousse passe juste au-dessus."},
{id:14,n:"Statue de Saint-Exup\u00e9ry et du Petit Prince",a:"Presqu\'\u00eele",v:["hidden","quiet","free entry"],d:10,s:"The statue of Saint-Exup\u00e9ry and the Little Prince at the corner of Place Bellecour, with the last page of the book on the pedestal, and almost nobody looking at it.",st:"Antoine de Saint-Exup\u00e9ry was born at 8 Rue du Peyrat (now Rue Saint-Exup\u00e9ry) on 29 June 1900, and lived at 1 Place Bellecour until he was about seven. In 2000, a statue of Saint-Exup\u00e9ry and the Little Prince was installed at the southwest corner of Place Bellecour, facing the house where he was born.\n\nIt sits on a five-metre marble column weighing seven tons, and almost nobody looks at it \u2014 tucked under trees, across from a bus stop, in the busiest square in the city. The last page of The Little Prince is inscribed on the pedestal. On 31 July 1944, he took off from Corsica on a reconnaissance flight over the Rh\u00f4ne Valley and never came back.",im:"One of the most famous literary characters in the world, sitting on a marble planet above Lyon, and everyone on the square below walking straight past without looking up.",t:"Place Bellecour, southwest corner, near the Sa\u00f4ne side. Free, always visible. The house at 8 Rue Saint-Exup\u00e9ry is not open. Best in morning light when the trees don\'t block the view.",c:["nerd"],r:"g",nn:"Statue de Saint-Exup\u00e9ry et du Petit Prince",ns:"La statue de Saint-Exup\u00e9ry et du Petit Prince au coin de la Place Bellecour, avec la derni\u00e8re page du livre sur le socle, et presque personne pour la regarder.",nst:"Antoine de Saint-Exup\u00e9ry est n\u00e9 au 8 rue du Peyrat le 29 juin 1900 et a v\u00e9cu au 1 Place Bellecour. En 2000, une statue a \u00e9t\u00e9 install\u00e9e au coin sud-ouest de la place, face \u00e0 sa maison natale.\n\nElle est perch\u00e9e sur une colonne de marbre de cinq m\u00e8tres, et presque personne ne la regarde. La derni\u00e8re page du Petit Prince est grav\u00e9e sur le socle. Le 31 juillet 1944, il a d\u00e9coll\u00e9 de Corse et n\'est jamais revenu.",nt:"Place Bellecour, angle sud-ouest. Gratuit, toujours visible. La maison au 8 rue Saint-Exup\u00e9ry n\'est pas ouverte. Meilleur le matin."},
{id:15,n:"Rue du Premier Film",a:"Monplaisir",v:["history","hidden","quiet","free entry"],d:15,s:"The street where the world\'s first movie was filmed \u2014 46 seconds of workers leaving a factory, 19 March 1895.",st:"On 19 March 1895, the Lumi\u00e8re brothers pointed a camera at the gates of their factory at 25 Rue du Premier Film and filmed workers leaving. Forty-six seconds. That footage is considered the first motion picture ever made. Every film you have ever watched traces back to this street in the Monplaisir neighbourhood.\n\nThe factory is not open to the public, but there\'s a plaque on the wall and the street itself is unchanged enough to feel the weight of what happened here. The Institut Lumi\u00e8re \u2014 the family villa, now a museum \u2014 is a 5-minute walk away, and its garden is free to enter, quiet and shaded, with a bust of Louis looking slightly smug.",im:"Standing on the pavement where cinema was born, the factory wall in front of you, a plaque, and the knowledge that 46 seconds here changed everything.",t:"25 Rue du Premier Film, 8th arrondissement. M\u00e9tro D, Monplaisir-Lumi\u00e8re. Plaque and street: free, always visible. Institut Lumi\u00e8re garden: free. Museum: \u20ac8 (Tue\u2013Sun, 10am\u20136:30pm).",c:["nerd","history_big"],r:"g",nn:"Rue du Premier Film",ns:"La rue o\u00f9 le premier film du monde a \u00e9t\u00e9 tourn\u00e9 \u2014 46 secondes d\'ouvriers sortant d\'une usine, le 19 mars 1895.",nst:"Le 19 mars 1895, les fr\u00e8res Lumi\u00e8re ont point\u00e9 une cam\u00e9ra vers les portes de leur usine au 25 rue du Premier Film. Quarante-six secondes. Chaque film que vous avez vu remonte \u00e0 cette rue du quartier Monplaisir.\n\nL\'usine n\'est pas ouverte au public, mais il y a une plaque. Le jardin de l\'Institut Lumi\u00e8re, \u00e0 5 minutes, est gratuit et calme.",nt:"25 rue du Premier Film, 8e. M\u00e9tro D Monplaisir-Lumi\u00e8re. Plaque et rue : gratuit. Jardin de l\'Institut : gratuit. Mus\u00e9e : 8\u20ac."},
{id:16,n:"Mus\u00e9e Testut-Latarjet",a:"Monplaisir",v:["weird","hidden","quiet"],d:30,s:"An anatomical museum inside Lyon\'s medical university, deliberately macabre, with preserved organs, skeletons, and fetuses in jars since 1789.",st:"Most medical museums arrange their specimens with clinical detachment. The Testut-Latarjet doesn\'t bother. Preserved organs, reconstructed skeletons, fetuses in jars, mummies, and even dinosaur bones fill glass cases in a setting that leans deliberately into the macabre. The collection was started by a breakaway group of doctors from Lyon\'s university who founded their own medical society. A criminology section was added later.\n\nThe museum is inside the Universit\u00e9 Lyon 1 campus and requires effort to find. It is not for everyone. But if you\'re the kind of person who finds an exploded preserved organ more interesting than a Monet, this is your room.",im:"A jar, a label, a thing inside it that you\'re not sure you want to identify, and the growing suspicion that the museum was designed to test your composure.",t:"By appointment \u2014 check Universit\u00e9 Lyon 1 website or contact Soci\u00e9t\u00e9 Nationale de M\u00e9decine de Lyon. Rockefeller campus (M\u00e9tro D, Grange Blanche). Free when open.",c:["weird","nerd"],r:"y",nn:"Mus\u00e9e Testut-Latarjet",ns:"Un mus\u00e9e anatomique dans l\'universit\u00e9 de m\u00e9decine, volontairement macabre, avec organes conserv\u00e9s, squelettes et f\u0153tus en bocaux depuis 1789.",nst:"La plupart des mus\u00e9es m\u00e9dicaux pr\u00e9sentent leurs sp\u00e9cimens avec d\u00e9tachement. Le Testut-Latarjet ne s\'en donne pas la peine. Organes, squelettes, momies et os de dinosaures remplissent des vitrines dans un cadre d\u00e9lib\u00e9r\u00e9ment macabre.\n\nLe mus\u00e9e est sur le campus de l\'Universit\u00e9 Lyon 1. Il faut le chercher. Ce n\'est pas pour tout le monde.",nt:"Sur rendez-vous. Campus Rockefeller (M\u00e9tro D, Grange Blanche). Gratuit quand ouvert."},
{id:17,n:"Table Claudienne",a:"Croix-Rousse",v:["history","hidden","nerd","free entry"],d:10,s:"A plaque on the Croix-Rousse hillside marking where a bronze tablet was found \u2014 inscribed with Emperor Claudius\'s speech that gave Gaul a voice in the Roman Senate.",st:"In 1528, on the slopes of the Croix-Rousse, someone dug up two large bronze fragments of a tablet inscribed with a speech by Emperor Claudius to the Roman Senate in 48 CE. In that speech, Claudius \u2014 himself born in Lugdunum (Lyon) \u2014 argued that Gauls should be admitted to the Senate. He won. It was one of the most consequential political acts in the history of the Roman Empire.\n\nThe original tablet is in the Mus\u00e9e Gallo-Romain on the Fourvi\u00e8re hill. But on the Croix-Rousse slope where it was found, there is a plaque and a reproduction. You stand on the exact spot where the most important archaeological find in Lyon\'s history was pulled from the ground five hundred years ago.",im:"A hillside, a plaque, and the knowledge that a speech carved in bronze here changed who could govern an empire.",t:"Rue des Tables Claudiennes (named for the find), 1st arrondissement. Free, always visible. The original is in the Mus\u00e9e Gallo-Romain (\u20ac4, free under 18). The street name is the clue.",c:["nerd","history_big"],r:"g",nn:"Table Claudienne",ns:"Une plaque sur la Croix-Rousse marque l\'endroit o\u00f9 une tablette de bronze a \u00e9t\u00e9 trouv\u00e9e \u2014 grav\u00e9e du discours de l\'empereur Claude qui donna une voix \u00e0 la Gaule au S\u00e9nat romain.",nst:"En 1528, sur les pentes de la Croix-Rousse, on a d\u00e9terr\u00e9 deux fragments de bronze grav\u00e9s d\'un discours de l\'empereur Claude au S\u00e9nat en 48 apr. J.-C. Claude \u2014 lui-m\u00eame n\u00e9 \u00e0 Lugdunum \u2014 argumenta que les Gaulois devaient \u00eatre admis au S\u00e9nat. Il gagna.\n\nL\'original est au Mus\u00e9e Gallo-Romain. Sur la pente o\u00f9 la tablette fut trouv\u00e9e, il y a une plaque et une reproduction.",nt:"Rue des Tables Claudiennes, 1er. Gratuit, toujours visible. L\'original est au Mus\u00e9e Gallo-Romain (4\u20ac, gratuit -18 ans)."},
{id:18,n:"Nuits Sonores \u2014 Daytime Programme",a:"Confluence",v:["local","free entry"],d:45,s:"Lyon\'s annual electronic music festival takes over the city every May \u2014 and the daytime programme is often free.",st:"Nuits Sonores has been running since 2003 and is now one of Europe\'s best electronic music festivals \u2014 not by building a megasite in a field, but by occupying the city itself. Stages appear in former industrial buildings, museum courtyards, riverbanks, and car parks. The nighttime fills La Sucri\u00e8re and the Confluence warehouses.\n\nThe daytime programme (Extra!) is often free and includes talks, installations, and DJ sets in unexpected locations across the city. The festival attracts an international crowd but remains deeply Lyonnais \u2014 the food stalls serve local wine, the venues are real city spaces, and you can walk home afterwards.",im:"2am in a converted sugar warehouse on the Sa\u00f4ne, concrete walls, a crowd that knows this DJ, the bass so deep you feel it in your ribcage.",t:"Usually late May. Many daytime events free. Check nuits-sonores.com. La Sucri\u00e8re and Confluence warehouses are the main night venues \u2014 Tram T1 to H\u00f4tel R\u00e9gion Montrochet.",c:["free_culture"],r:"y",nn:"Nuits Sonores \u2014 Programme de jour",ns:"Le festival de musique \u00e9lectronique de Lyon envahit la ville chaque mai \u2014 le programme de jour est souvent gratuit.",nst:"Nuits Sonores existe depuis 2003 et c\'est l\'un des meilleurs festivals de musique \u00e9lectronique d\'Europe \u2014 pas dans un champ, mais dans la ville elle-m\u00eame. Le programme de jour (Extra!) est souvent gratuit : conférences, installations, DJ sets dans des lieux inattendus.\n\nLe festival reste profond\u00e9ment lyonnais \u2014 vin local aux stands, lieux r\u00e9els de la ville.",nt:"G\u00e9n\u00e9ralement fin mai. Nombreux \u00e9v\u00e9nements de jour gratuits. nuits-sonores.com. Tram T1 H\u00f4tel R\u00e9gion Montrochet."},
{id:19,n:"La Vogue des Marrons",a:"Croix-Rousse",v:["local","free entry"],d:45,s:"A fairground that takes over the Boulevard de la Croix-Rousse every October \u2014 dodgems, roasted chestnuts, and bugnes.",st:"Every autumn, the Croix-Rousse boulevard transforms into a traditional French fairground. Dodgems, dippers, candy floss, shooting galleries \u2014 the kind of fair that hasn\'t changed much in decades. The smell of roasting chestnuts gives it its name, and the bugnes \u2014 deep-fried pastry strips dusted with sugar \u2014 are worth the climb up the hill on their own.\n\nIt runs through most of October and is intensely local. This is not a tourist attraction. This is what the Croix-Rousse does when summer ends.",im:"The creak of a carousel, the crack of a shooting gallery, the smell of burnt sugar and chestnut smoke drifting over the Croix-Rousse skyline.",t:"Most of October. Free entry. Boulevard de la Croix-Rousse, 4th arrondissement. M\u00e9tro C to Croix-Rousse.",c:["free_culture"],r:"y",nn:"La Vogue des Marrons",ns:"Une f\u00eate foraine qui envahit le boulevard de la Croix-Rousse chaque octobre \u2014 auto-tamponneuses, marrons grill\u00e9s et bugnes.",nst:"Chaque automne, le boulevard de la Croix-Rousse se transforme en f\u00eate foraine traditionnelle. Auto-tamponneuses, barbe \u00e0 papa, tirs \u00e0 la carabine. L\'odeur des marrons grill\u00e9s donne son nom \u00e0 la f\u00eate, et les bugnes valent \u00e0 elles seules la mont\u00e9e.\n\nCe n\'est pas une attraction touristique. C\'est ce que fait la Croix-Rousse quand l\'\u00e9t\u00e9 se termine.",nt:"La majeure partie d\'octobre. Entr\u00e9e gratuite. Boulevard de la Croix-Rousse. M\u00e9tro C Croix-Rousse."},
{id:20,n:"Friday Night Roller",a:"Presqu\'\u00eele",v:["local","free entry"],d:120,s:"Every Friday night, hundreds of inline skaters take over Lyon\'s streets with a police escort, rolling through the city for two hours.",st:"The Friday Night Roller departs from Place Bellecour most Friday evenings and rolls through the city for about two hours, with police motorcycles blocking traffic. The route changes weekly. The atmosphere is festive and the skill levels range from near-professional to barely-standing.\n\nYou need to be a confident skater \u2014 the pace isn\'t slow and the streets are real streets. But if you can hold your own on eight wheels, there is no better way to see Lyon after dark.",im:"Rolling down the middle of a three-lane boulevard at 10pm, 300 people in front of you, 300 behind, the streetlights streaking past, a police motorcycle waving traffic aside.",t:"Departs Place Bellecour, usually ~9:30\u201310pm Fridays. Free. Bring your own skates. Check lyon-roller.com or Lyon Roller Facebook for schedules. Does not run in rain. Helmets recommended, wrist guards strongly recommended.",c:["sport"],r:"y",nn:"Friday Night Roller",ns:"Chaque vendredi soir, des centaines de patineurs envahissent les rues de Lyon avec escorte polici\u00e8re.",nst:"Le Friday Night Roller part de la Place Bellecour la plupart des vendredis soirs et roule dans la ville pendant deux heures, escort\u00e9 par la police. Le parcours change chaque semaine. L\'ambiance est festive.\n\nIl faut \u00eatre un patineur confiant \u2014 le rythme n\'est pas lent et les rues sont de vraies rues. Mais si vous tenez sur huit roues, c\'est la meilleure fa\u00e7on de voir Lyon la nuit.",nt:"D\u00e9part Place Bellecour, vers 21h30\u201322h les vendredis. Gratuit. Apportez vos patins. lyon-roller.com. Pas par temps de pluie."},
{id:21,n:"Guignol au Parc de la T\u00eate d\'Or",a:"T\u00eate d\'Or",v:["local","weird","free entry"],d:30,s:"Lyon\'s 200-year-old puppet character still performs in the park every summer \u2014 slapping his landlord with a stick, children screaming with laughter.",st:"Guignol was created around 1808 by Laurent Mourguet, a former silk worker turned dentist turned puppeteer. The character \u2014 a quick-witted Lyonnais worker with a braid and a wooden stick \u2014 became the voice of the city\'s working class, mocking landlords, policemen, and politicians. The puppet theatre tradition is still alive.\n\nIn summer, free outdoor Guignol shows are performed in the Parc de la T\u00eate d\'Or. The routine hasn\'t fundamentally changed in two centuries: a tiny wooden stage, a hand puppet beating another puppet with a stick, and children who have never heard of irony screaming advice at a piece of wood.",im:"A tiny wooden stage, a puppet with a braid beating another puppet with a stick, children screaming with laughter, adults pretending they\'re only here for the children.",t:"Free summer shows in Parc de la T\u00eate d\'Or \u2014 check schedules locally, usually July\u2013August. The Petit Mus\u00e9e Fantastique de Guignol (6 Rue Saint-Jean, Vieux Lyon, \u20ac7 adults) has the full history.",c:["weird","free_culture"],r:"y",nn:"Guignol au Parc de la T\u00eate d\'Or",ns:"La marionnette bicentenaire de Lyon joue encore dans le parc chaque \u00e9t\u00e9 \u2014 tapant son propri\u00e9taire avec un b\u00e2ton.",nst:"Guignol a \u00e9t\u00e9 cr\u00e9\u00e9 vers 1808 par Laurent Mourguet, canut devenu dentiste devenu marionnettiste. Le personnage \u2014 un ouvrier lyonnais malin avec une tresse et un b\u00e2ton \u2014 moquait propri\u00e9taires, policiers et politiciens.\n\nEn \u00e9t\u00e9, des spectacles gratuits sont donn\u00e9s au Parc de la T\u00eate d\'Or. Le spectacle n\'a pas fondamentalement chang\u00e9 en deux si\u00e8cles.",nt:"Spectacles gratuits en \u00e9t\u00e9 au Parc de la T\u00eate d\'Or, g\u00e9n\u00e9ralement juillet\u2013ao\u00fbt. Mus\u00e9e de Guignol : 6 rue Saint-Jean, 7\u20ac."},
{id:22,n:"Le March\u00e9 de la Cr\u00e9ation",a:"Croix-Rousse",v:["local","free entry"],d:30,s:"An open-air art market on the Boulevard de la Croix-Rousse every Sunday morning \u2014 local painters, photographers, and printmakers selling their work directly.",st:"Every Sunday morning, the Boulevard de la Croix-Rousse hosts a second market alongside the food stalls: the March\u00e9 de la Cr\u00e9ation. Local artists \u2014 painters, illustrators, photographers, ceramists, printmakers \u2014 display and sell their work directly. No middlemen, no galleries, no curated pretension. Just someone standing next to something they made.\n\nThe quality is uneven in the way all honest art markets are, which is part of the appeal. You can find something genuinely striking for \u20ac20 or spend an hour talking to a lithographer about a technique you didn\'t know existed.",im:"A row of easels on a boulevard, a woman explaining her lithograph to a stranger, the food market\'s cheese smell drifting over from two stalls down.",t:"Boulevard de la Croix-Rousse, Sunday mornings roughly 7am\u20131pm. Free to browse. M\u00e9tro C to Croix-Rousse.",c:["markets","free_culture"],r:"y",nn:"March\u00e9 de la Cr\u00e9ation",ns:"Un march\u00e9 d\'art en plein air sur le boulevard de la Croix-Rousse chaque dimanche matin \u2014 artistes locaux vendant directement.",nst:"Chaque dimanche matin, le boulevard de la Croix-Rousse accueille un second march\u00e9 : le March\u00e9 de la Cr\u00e9ation. Des artistes locaux \u2014 peintres, photographes, c\u00e9ramistes \u2014 exposent et vendent directement. Pas d\'interm\u00e9diaire, pas de galerie.\n\nLa qualit\u00e9 est in\u00e9gale comme dans tout march\u00e9 d\'art honn\u00eate, ce qui fait partie du charme.",nt:"Boulevard de la Croix-Rousse, dimanche matin ~7h\u201313h. Gratuit. M\u00e9tro C Croix-Rousse."},
{id:23,n:"P\u00e9tanque \u00e0 la T\u00eate d\'Or",a:"T\u00eate d\'Or",v:["local","free entry"],d:45,s:"The gravel terrains near the park\'s north gate where Lyonnais play the most serious casual sport in France.",st:"P\u00e9tanque in Lyon is not a game \u2014 it\'s a philosophy. The terrains at T\u00eate d\'Or are packed on weekends and summer evenings, with players ranging from teenagers to eighty-year-olds. Nobody will refuse you a game if you ask politely. The rules are simple: throw metal balls as close to the cochonnet as possible. The etiquette is strict: don\'t walk through someone\'s game, don\'t talk during a throw, and don\'t argue with the measurement.\n\nGames run until dark. A bottle of ros\u00e9 appears at some point. This is how evenings work in Lyon.",im:"The clack of metal on metal, a man on one knee measuring the distance with his thumb, a bottle of ros\u00e9 sweating in the shade behind the terrain.",t:"Terrains near the Porte des Enfants du Rh\u00f4ne (north entrance). Free. Buy boules at Decathlon (~\u20ac15) or borrow from someone playing. Games run until dark.",c:["sport","parks"],r:"g",nn:"P\u00e9tanque \u00e0 la T\u00eate d\'Or",ns:"Les terrains de gravier pr\u00e8s de l\'entr\u00e9e nord du parc o\u00f9 les Lyonnais jouent au sport d\u00e9contract\u00e9 le plus s\u00e9rieux de France.",nst:"La p\u00e9tanque \u00e0 Lyon n\'est pas un jeu \u2014 c\'est une philosophie. Les terrains de la T\u00eate d\'Or sont pleins les week-ends et soirs d\'\u00e9t\u00e9, avec des joueurs de 15 \u00e0 80 ans. Personne ne refusera une partie si vous demandez poliment.\n\nLes parties durent jusqu\'\u00e0 la tomb\u00e9e de la nuit. Une bouteille de ros\u00e9 appara\u00eet \u00e0 un moment. C\'est comme \u00e7a que les soir\u00e9es fonctionnent \u00e0 Lyon.",nt:"Terrains pr\u00e8s de la Porte des Enfants du Rh\u00f4ne. Gratuit. Boules \u00e0 Decathlon (~15\u20ac) ou empruntez. Parties jusqu\'\u00e0 la nuit."},
{id:24,n:"March\u00e9 Saint-Antoine",a:"Presqu\'\u00eele",v:["local","beautiful","free entry"],d:30,s:"Lyon\'s best outdoor food market, running along the Sa\u00f4ne every morning except Monday \u2014 where chefs and locals buy what they\'re cooking for dinner.",st:"The March\u00e9 Saint-Antoine stretches along the quay on the left bank of the Sa\u00f4ne, between the Pont de la Feuill\u00e9e and the Passerelle du Palais de Justice. Locals and chefs shop here for produce, cheese, charcuterie, flowers, and bread. The stalls are not arranged for tourists \u2014 this is where people buy what they\'re cooking for dinner.\n\nSaturday mornings are the busiest and the best: the full length of the quay is active, and if you get there before 9am you\'ll see restaurant owners loading crates into vans.",im:"A wheel of Saint-Marcellin so ripe it barely holds its shape, a man in an apron slicing Rosette de Lyon onto wax paper, the Sa\u00f4ne running grey and quiet behind the stalls.",t:"Quai des C\u00e9lestins / Quai Saint-Antoine, 2nd. Tue\u2013Sun, ~6am\u20131pm. Best on Saturday. Arrive early \u2014 by noon the best stalls are packing up. Free to browse.",c:["markets","food"],r:"g",nn:"March\u00e9 Saint-Antoine",ns:"Le meilleur march\u00e9 de plein air de Lyon, le long de la Sa\u00f4ne chaque matin sauf lundi.",nst:"Le march\u00e9 Saint-Antoine s\'\u00e9tire le long du quai sur la rive gauche de la Sa\u00f4ne. Les habitants et les chefs y ach\u00e8tent fruits, fromages, charcuterie et pain. Les \u00e9tals ne sont pas dispos\u00e9s pour les touristes \u2014 c\'est l\u00e0 o\u00f9 l\'on ach\u00e8te ce qu\'on cuisine le soir.\n\nLe samedi matin est le meilleur : tout le quai est actif, et avant 9h vous verrez les restaurateurs charger des caisses.",nt:"Quai des C\u00e9lestins / Quai Saint-Antoine, 2e. Mar\u2013dim, ~6h\u201313h. Id\u00e9al le samedi. Arrivez t\u00f4t. Gratuit."},
{id:25,n:"March\u00e9 de la Croix-Rousse",a:"Croix-Rousse",v:["local","free entry"],d:45,s:"Six mornings a week, year-round, intensely local \u2014 the market that makes Croix-Rousse residents never want to leave their neighbourhood.",st:"The Croix-Rousse market runs Tuesday to Sunday along the boulevard, and it\'s the one Lyonnais describe when they explain why they never want to leave their neighbourhood. Producers from the surrounding countryside sell fruit, vegetables, cheese, honey, bread, and flowers. On Saturday mornings the boulevard is completely packed and the atmosphere is closer to a village market than a city one.\n\nAfter the market, walk to the Gros Caillou \u2014 the enormous boulder dug up during construction of the Croix-Rousse funicular in 1861, now sitting at the end of the boulevard like a geological non sequitur. The viewpoint has a good view over the Rh\u00f4ne valley and the Alps.",im:"A farmer handing you a slice of tomme, the sun just hitting the boulevard, a dog waiting patiently outside a fromagerie.",t:"Boulevard de la Croix-Rousse. Tue\u2013Sun mornings, ~6am\u20131pm. M\u00e9tro C to Croix-Rousse. The Gros Caillou viewpoint is at the east end of the boulevard. Free.",c:["markets","food"],r:"g",nn:"March\u00e9 de la Croix-Rousse",ns:"Six matins par semaine, toute l\'ann\u00e9e, intensément local \u2014 le march\u00e9 qui donne aux habitants de la Croix-Rousse z\u00e9ro envie de partir.",nst:"Le march\u00e9 de la Croix-Rousse fonctionne du mardi au dimanche le long du boulevard. C\'est celui que les Lyonnais d\u00e9crivent quand ils expliquent pourquoi ils ne veulent jamais quitter leur quartier. Des producteurs de la campagne vendent fruits, l\u00e9gumes, fromage, miel et pain.\n\nApr\u00e8s le march\u00e9, allez voir le Gros Caillou \u2014 l\'\u00e9norme rocher d\u00e9terr\u00e9 lors de la construction du funiculaire en 1861.",nt:"Boulevard de la Croix-Rousse. Mar\u2013dim matin, ~6h\u201313h. M\u00e9tro C Croix-Rousse. Gros Caillou au bout est du boulevard. Gratuit."},
{id:26,n:"Les Halles de Lyon Paul Bocuse",a:"Part-Dieu",v:["famous","local"],d:45,s:"Fifty specialist vendors under one roof \u2014 the temple where Lyon\'s food culture is concentrated at its highest intensity.",st:"Les Halles is not a casual market. It\'s a cathedral of French gastronomy \u2014 every stall is a specialist, and the quality is absurdly high. Fromageries with Saint-Marcellin aged to perfection. Charcutiers with rosettes curing in the window. P\u00e2tisseries with praline tarts in that unmistakable Lyon pink. Fish so fresh it\'s still rigid. The people shopping here include Michelin-starred chefs buying their mise en place.\n\nYou can eat here too \u2014 a plate of oysters and a glass of white wine at 10am on a Saturday is entirely normal behaviour in Les Halles.",im:"A glass counter displaying six varieties of quenelle, a woman in pearls choosing between two kinds of Saint-Marcellin, the air thick with the smell of roasting chickens.",t:"102 Cours Lafayette, 3rd. Tue\u2013Sun, 7am\u201310:30pm. M\u00e9tro B, Part-Dieu. Free to browse. Go on a weekday morning for a calmer experience. Weekend mornings are packed.",c:["greatest_hits","markets","food"],r:"g",nn:"Les Halles de Lyon Paul Bocuse",ns:"Cinquante vendeurs sp\u00e9cialistes sous un m\u00eame toit \u2014 le temple de la gastronomie lyonnaise \u00e0 son intensit\u00e9 maximale.",nst:"Les Halles ne sont pas un march\u00e9 ordinaire. C\'est une cath\u00e9drale de la gastronomie \u2014 chaque \u00e9tal est un sp\u00e9cialiste, et la qualit\u00e9 est absurde. Saint-Marcellin affin\u00e9 \u00e0 la perfection. Rosettes en vitrine. Tartes \u00e0 la praline dans ce rose lyonnais inimitable.\n\nOn peut y manger aussi \u2014 des hu\u00eetres et un verre de blanc \u00e0 10h un samedi, c\'est parfaitement normal ici.",nt:"102 cours Lafayette, 3e. Mar\u2013dim, 7h\u201322h30. M\u00e9tro B Part-Dieu. Gratuit pour fl\u00e2ner. En semaine pour le calme."},
{id:27,n:"Quai Saint-Antoine \u00e0 l\'aube",a:"Presqu\'\u00eele",v:["hidden","quiet","local"],d:30,s:"The same river market, but at 6am, when the stalls are still setting up and the chefs are doing their buying.",st:"If you\'re awake at 6am in Lyon and walking the Sa\u00f4ne quays, you\'ll see the market assembling itself \u2014 crates being unloaded from vans, pyramids of tomatoes being built, a cheese vendor slicing the first wheel of the day. The light on the river is flat and grey, the Fourvi\u00e8re hill is just catching the first sun, and the only other people here are professionals.\n\nBy 7:30am the first civilian shoppers appear. By 9am it\'s a crowd. The version between 6 and 7 is a different world.",im:"The thud of a crate on cobblestones, the scratch of a knife through rind, the river grey and silent, the city still asleep around you.",t:"Quai Saint-Antoine. Stalls begin setting up ~5:30\u20136am. Officially open from 6am. Tue\u2013Sun. Free.",c:["markets","food"],r:"g",nn:"March\u00e9 Saint-Antoine \u00e0 l\'aube",ns:"Le m\u00eame march\u00e9, mais \u00e0 6h du matin, quand les \u00e9tals se montent et les chefs font leurs achats.",nst:"Si vous \u00eates debout \u00e0 6h \u00e0 Lyon, vous verrez le march\u00e9 s\'assembler \u2014 caisses d\u00e9charg\u00e9es, pyramides de tomates construites, un fromager coupant la premi\u00e8re meule. La lumi\u00e8re sur la rivi\u00e8re est plate et grise, Fourvi\u00e8re attrape les premiers rayons.\n\nVers 7h30, les premiers acheteurs civils arrivent. La version entre 6h et 7h est un autre monde.",nt:"Quai Saint-Antoine. Installation d\u00e8s ~5h30. Officiellement ouvert d\u00e8s 6h. Mar\u2013dim. Gratuit."},
{id:28,n:"La Croix-Rousse",a:"Croix-Rousse",v:["local","history","free entry"],d:60,s:"\"La colline qui travaille\" \u2014 the silk workers\' hilltop quarter with 5-metre ceilings, functioning traboules, and the largest trompe-l\'\u0153il mural in Europe.",st:"Croix-Rousse is called \u00abla colline qui travaille\u00bb (the hill that works), in contrast to Fourvi\u00e8re, \u00abla colline qui prie\u00bb (the hill that prays). The neighbourhood was built for the Canuts \u2014 the silk workers \u2014 and their apartments have ceiling heights of 4 to 5 metres, originally designed to fit enormous Jacquard looms. Today those high-ceilinged flats are among the most coveted in Lyon.\n\nThe traboules \u2014 secret passageways through apartment buildings, originally used to transport silk without getting it wet \u2014 are still functioning. The Mur des Canuts at the north end of the boulevard is a 1,200m\u00b2 trompe-l\'\u0153il mural depicting the neighbourhood and its inhabitants. Residents are famous for rarely \u00abgoing down\u00bb to the peninsula. They don\'t need to.",im:"Walking through a narrow stone passage, through someone\'s courtyard, past a Renaissance staircase, and emerging on a completely different street a block away.",t:"M\u00e9tro C to Croix-Rousse. Best traboules on the slopes: 9 Place Colbert/14bis Mont\u00e9e Saint-S\u00e9bastien (six-storey external staircase) and Cour des Voraces. Mur des Canuts: north end of boulevard. All free.",c:["neighbourhoods","history_big"],r:"g",nn:"La Croix-Rousse",ns:"\u00abLa colline qui travaille\u00bb \u2014 le quartier des canuts avec des plafonds de 5 m\u00e8tres, des traboules et le plus grand trompe-l\'\u0153il d\'Europe.",nst:"La Croix-Rousse est \u00abla colline qui travaille\u00bb. Le quartier a \u00e9t\u00e9 construit pour les canuts \u2014 les tisseurs de soie \u2014 et leurs appartements ont des plafonds de 4 \u00e0 5 m\u00e8tres. Les traboules \u2014 passages secrets \u00e0 travers les immeubles \u2014 fonctionnent encore.\n\nLe Mur des Canuts au nord du boulevard est un trompe-l\'\u0153il de 1 200 m\u00b2. Les habitants descendent rarement sur la presqu\'\u00eele. Ils n\'en ont pas besoin.",nt:"M\u00e9tro C Croix-Rousse. Traboules : 9 Place Colbert. Mur des Canuts : nord du boulevard. Tout gratuit."},
{id:29,n:"Les Pentes de la Croix-Rousse",a:"Croix-Rousse",v:["local","hidden"],d:45,s:"The steep bohemian slopes connecting the Croix-Rousse plateau to the Presqu\'\u00eele \u2014 art galleries, craft workshops, and bars with exposed brick.",st:"The Pentes are the lower, steeper part of the Croix-Rousse \u2014 the slopes that drop from the plateau to the Presqu\'\u00eele. They are the more bohemian, hipster-Brooklyn part of the neighbourhood: art galleries, craft workshops, independent bookshops, bars with exposed brick and natural wine, and a general atmosphere of people doing slightly unusual things for a living.\n\nThe streets are steep, narrow, and full of graffiti that ranges from terrible to extraordinary. The concentration of independent makers \u2014 ceramists, leather workers, printers, small-batch roasters \u2014 is higher here than anywhere else in Lyon.",im:"A steep cobbled street, a hand-painted sign for a ceramist\'s studio, a cat sitting in a doorway that leads to a courtyard you\'d never have found.",t:"Walk down from Croix-Rousse plateau or up from Place des Terreaux. Free to wander. The area around Rue Burdeau and Rue Ren\u00e9 Leynaud has the highest density of interesting shops.",c:["neighbourhoods"],r:"g",nn:"Les Pentes de la Croix-Rousse",ns:"Les pentes boh\u00e8mes raides entre le plateau de la Croix-Rousse et la Presqu\'\u00eele \u2014 galeries, ateliers et bars.",nst:"Les Pentes sont la partie basse et raide de la Croix-Rousse. C\'est le c\u00f4t\u00e9 plus boh\u00e8me : galeries d\'art, ateliers d\'artisans, bars avec briques apparentes et vin nature.\n\nLes rues sont raides, \u00e9troites et couvertes de graffitis. La concentration d\'artisans ind\u00e9pendants \u2014 c\u00e9ramistes, maroquiniers, torr\u00e9facteurs \u2014 est la plus forte de Lyon.",nt:"Depuis le plateau Croix-Rousse ou depuis les Terreaux. Gratuit. Rues Burdeau et Ren\u00e9 Leynaud pour la plus forte densit\u00e9."},
{id:30,n:"La Guilloti\u00e8re",a:"Guilloti\u00e8re",v:["local","hidden"],d:45,s:"Lyon\'s most multicultural quarter \u2014 raw, real, and where you\'ll eat the best couscous, ph\u1edf, and falafel in the city.",st:"Guilloti\u00e8re has a reputation, and the reputation is mixed. Around the metro station and Place Gabriel-P\u00e9ri, it can feel tense. But walk five minutes in any direction and the neighbourhood opens up: North African grocers, Vietnamese ph\u1edf shops, Kurdish bakeries, a thriving student scene, and alternative bars catering to anyone who doesn\'t want to eat exclusively from the bouchon playbook.\n\nThis is where Lyon\'s diversity actually lives. It\'s not polished, it\'s not curated, and it\'s where you\'ll eat the best couscous, the best banh mi, and the best falafel in the city.",im:"The smell of cumin and mint from a doorway, a shop selling spices by weight from open sacks, Arabic script above a caf\u00e9, students with bikes at a light.",t:"M\u00e9tro B, Guilloti\u00e8re or Saxe-Gambetta. The area around Place Gabriel-P\u00e9ri can feel uncomfortable at night \u2014 stick to side streets and the Saxe-Gambetta end. Best eating: Rue de Marseille and streets south of the bridge. Free to walk.",c:["neighbourhoods","food"],r:"g",nn:"La Guilloti\u00e8re",ns:"Le quartier le plus multiculturel de Lyon \u2014 brut, vrai, et o\u00f9 l\'on mange le meilleur couscous, ph\u1edf et falafel de la ville.",nst:"La Guilloti\u00e8re a une r\u00e9putation mitig\u00e9e. Autour du m\u00e9tro et de la Place Gabriel-P\u00e9ri, l\'ambiance peut \u00eatre tendue. Mais \u00e0 cinq minutes dans n\'importe quelle direction, le quartier s\'ouvre : \u00e9piceries nord-africaines, restaurants vietnamiens, boulangeries kurdes.\n\nC\'est l\u00e0 que vit r\u00e9ellement la diversit\u00e9 de Lyon. C\'est brut, pas gentrifié, et c\'est l\u00e0 qu\'on mange le mieux.",nt:"M\u00e9tro B Guilloti\u00e8re ou Saxe-Gambetta. Place Gabriel-P\u00e9ri inconfortable la nuit. Rue de Marseille pour manger. Gratuit."},
{id:31,n:"La Confluence",a:"Confluence",v:["beautiful","free entry"],d:45,s:"The southern tip of the Presqu\'\u00eele \u2014 where a wasteland of docks became Lyon\'s most ambitious new neighbourhood, and two rivers finally become one.",st:"Twenty years ago, south of Perrache station was industrial dead zone \u2014 rail sidings, a wholesale market, abandoned warehouses. The Confluence project turned it into a neighbourhood from scratch: the Mus\u00e9e des Confluences at the tip, La Sucri\u00e8re (a former sugar warehouse now hosting exhibitions), the Docks \u2014 a converted 1920s port building \u2014 and blocks of architect-designed housing in vivid colours.\n\nThe neighbourhood still feels half-built in places, which is part of its appeal. The waterfront promenade along the southern tip, where the Rh\u00f4ne and Sa\u00f4ne finally merge, is one of the quietest walks in the city.",im:"Standing at the point where two rivers become one, construction cranes behind you, a fluorescent-orange apartment block to your left, a 19th-century warehouse to your right.",t:"Tram T1 to H\u00f4tel R\u00e9gion Montrochet or Mus\u00e9e des Confluences. The walk along the tip where the rivers meet is best at dusk. Free to wander.",c:["neighbourhoods"],r:"g",nn:"La Confluence",ns:"La pointe sud de la Presqu\'\u00eele \u2014 o\u00f9 des docks d\u00e9saffect\u00e9s sont devenus le quartier le plus ambitieux de Lyon, et o\u00f9 deux fleuves n\'en font plus qu\'un.",nst:"Il y a vingt ans, au sud de Perrache, c\'\u00e9tait une zone industrielle morte. Le projet Confluence en a fait un quartier : le Mus\u00e9e des Confluences \u00e0 la pointe, La Sucri\u00e8re, les Docks.\n\nLa promenade du front d\'eau \u00e0 la pointe sud, o\u00f9 le Rh\u00f4ne et la Sa\u00f4ne se rejoignent enfin, est l\'une des balades les plus tranquilles de la ville.",nt:"Tram T1 H\u00f4tel R\u00e9gion Montrochet ou Mus\u00e9e des Confluences. La promenade de la pointe est id\u00e9ale au cr\u00e9puscule. Gratuit."},
{id:32,n:"\u00cele Barbe",a:"Sa\u00f4ne Valley",v:["weird","history","quiet","hidden"],d:45,s:"An island in the Sa\u00f4ne where Druids gathered, hermits founded a monastery, and Charlemagne donated a library that nobody has since found.",st:"\u00cele Barbe \u2014 from the Latin insula barbara, \u00abbarbarians\' island\u00bb \u2014 sits in the Sa\u00f4ne in the 9th arrondissement. In the 5th century, hermits founded a monastery \u2014 one of the oldest in Gaul. Charlemagne gave it a library that became one of the most important of the medieval age. The abbey was sacked by Saracens, Huns, and eventually Protestants. The Revolution finished it off.\n\nWhat remains: a Romanesque church tower half-swallowed by vegetation, exclusive private homes, and a public park at the southern end. Half the island is gated. The suspension bridge connecting it to the banks is the oldest in Lyon still in use, built 1827. You cross it and step into a silence that feels like a different century.",im:"Crossing a 200-year-old bridge onto an island in the middle of a river, Romanesque ruins to your left, a stone path disappearing into someone\'s private garden.",t:"Bus 31 or 43 from Gare de Vaise (10 min), or Bus 40 from Place Bellecour (15 min). Free. Only the southern half (public park) is accessible.",c:["weird","history_big","parks"],r:"g",nn:"\u00cele Barbe",ns:"Une \u00eele sur la Sa\u00f4ne o\u00f9 les druides se r\u00e9unissaient, des ermites ont fond\u00e9 un monast\u00e8re, et Charlemagne a donn\u00e9 une biblioth\u00e8que que personne n\'a retrouv\u00e9e.",nst:"\u00cele Barbe \u2014 du latin insula barbara \u2014 se trouve sur la Sa\u00f4ne. Au Ve si\u00e8cle, des ermites y ont fond\u00e9 un monast\u00e8re \u2014 l\'un des plus anciens de Gaule. Charlemagne lui donna une biblioth\u00e8que devenue l\'une des plus importantes du Moyen \u00c2ge. L\'abbaye fut saccag\u00e9e par les Sarrasins, les Huns, puis les Protestants.\n\nCe qui reste : un clocher roman \u00e0 moiti\u00e9 englouti par la v\u00e9g\u00e9tation, des maisons priv\u00e9es, et un parc public au sud. Le pont suspendu date de 1827.",nt:"Bus 31 ou 43 depuis Gare de Vaise (10 min). Gratuit. Seule la moiti\u00e9 sud (parc) est accessible."},
{id:33,n:"Presqu\'\u00eele \u2014 Place des Terreaux to Bellecour",a:"Presqu\'\u00eele",v:["beautiful","famous","free entry"],d:45,s:"The architectural spine of Lyon \u2014 from Bartholdi\'s fountain at the Terreaux to the largest pedestrian square in France at Bellecour.",st:"The Presqu\'\u00eele \u2014 the peninsula between the Rh\u00f4ne and the Sa\u00f4ne \u2014 is where Lyon concentrates its grandeur. Place des Terreaux at the north end has the H\u00f4tel de Ville (one of the finest baroque civic buildings in France) and the Bartholdi fountain \u2014 originally designed for Bordeaux, rejected, and bought by Lyon. The same Bartholdi who made the Statue of Liberty.\n\nWalk south through pedestrian streets lined with 18th-century facades to Place Bellecour \u2014 one of the largest open squares in Europe, with Louis XIV on a horse in the middle and the Fourvi\u00e8re Basilica visible on the hill behind. The walk is about 15 minutes and free.",im:"Bartholdi\'s fountain at dusk, the H\u00f4tel de Ville lit gold behind it, the same sculptor\'s other work standing in New York harbour.",t:"M\u00e9tro A, H\u00f4tel de Ville (north) or Bellecour (south). Free. Best at dusk when the buildings are lit. The Bartholdi fountain runs in summer months.",c:["neighbourhoods"],r:"g",nn:"Presqu\'\u00eele \u2014 Place des Terreaux \u00e0 Bellecour",ns:"L\'axe architectural de Lyon \u2014 de la fontaine Bartholdi aux Terreaux \u00e0 la plus grande place pi\u00e9tonne de France \u00e0 Bellecour.",nst:"La Presqu\'\u00eele \u2014 entre le Rh\u00f4ne et la Sa\u00f4ne \u2014 concentre la grandeur de Lyon. Place des Terreaux : l\'H\u00f4tel de Ville et la fontaine Bartholdi \u2014 le m\u00eame Bartholdi qui a fait la Statue de la Libert\u00e9.\n\nMarchez vers le sud jusqu\'\u00e0 la Place Bellecour \u2014 l\'une des plus grandes places ouvertes d\'Europe, Louis XIV \u00e0 cheval au centre, la Basilique visible sur la colline derri\u00e8re.",nt:"M\u00e9tro A, H\u00f4tel de Ville ou Bellecour. Gratuit. Id\u00e9al au cr\u00e9puscule. La fontaine Bartholdi fonctionne en \u00e9t\u00e9."},
{id:34,n:"Parc Sergent Blandan",a:"Guilloti\u00e8re",v:["hidden","local","free entry"],d:30,s:"A former military fort turned public park in the 7th arrondissement \u2014 ramparts, a moat, climbing walls, and the feeling of a secret the city kept for 150 years.",st:"Until 2013, the Fort de la Vitriolerie was a closed military compound in the heart of the 7th arrondissement. Now it\'s a 17-hectare public park \u2014 one of the newest and most unusual in Lyon. The ramparts are still there, the moat has been turned into a garden, and sections of the military architecture have been left deliberately exposed.\n\nThere\'s a skatepark, climbing walls, community gardens, and a large prairie where people lie in the grass surrounded by the remnants of a fortress. It is less known than T\u00eate d\'Or and far less crowded.",im:"Sitting on a rampart, the moat below you turned into a garden, a skateboarder in the distance, the quiet hum of a neighbourhood that didn\'t have a park until ten years ago.",t:"17 Rue Cr\u00e9qui prolongée, 7th arrondissement. Free, always open. Tram T2 to Centre Berthelot or M\u00e9tro B Jean Mac\u00e9. Less crowded than T\u00eate d\'Or every day of the year.",c:["parks"],r:"g",nn:"Parc Sergent Blandan",ns:"Un ancien fort militaire devenu parc public dans le 7e \u2014 remparts, foss\u00e9, murs d\'escalade, et le sentiment d\'un secret gard\u00e9 150 ans.",nst:"Jusqu\'en 2013, le Fort de la Vitriolerie \u00e9tait un site militaire ferm\u00e9 au c\u0153ur du 7e. C\'est maintenant un parc public de 17 hectares. Les remparts sont encore l\u00e0, le foss\u00e9 est devenu un jardin, et l\'architecture militaire a \u00e9t\u00e9 laiss\u00e9e d\u00e9lib\u00e9r\u00e9ment visible.\n\nIl y a un skatepark, des murs d\'escalade, des jardins communautaires. Moins connu que la T\u00eate d\'Or et bien moins bond\u00e9.",nt:"17 rue Cr\u00e9qui prolong\u00e9e, 7e. Gratuit. Tram T2 Centre Berthelot ou M\u00e9tro B Jean Mac\u00e9."},
{id:35,n:"Fourvi\u00e8re Hill at Sunrise",a:"Fourvi\u00e8re",v:["beautiful","quiet","free entry"],d:30,s:"The Fourvi\u00e8re esplanade at 6am \u2014 the city below still sleeping, the Alps catching the first light, and nobody else there.",st:"The esplanade in front of the Basilica is one of the most visited spots in Lyon. At 6am it is one of the emptiest. The city spreads out below in a grey pre-dawn haze that lifts as the sun comes over the Alps to the east. On clear mornings you can see Mont Blanc turning pink before the rest of the world has colour.\n\nThe funicular doesn\'t run this early, so you walk up \u2014 the Mont\u00e9e Nicolas de Lange from Vieux Lyon takes about fifteen minutes. By the time you arrive, the sweat has cooled and the view has opened, and you have the whole hilltop to yourself.",im:"The city below in grey, the Alps pink on the horizon, the Basilica white and silent behind you, and the only sound a bird on the esplanade railing.",t:"Walk up Mont\u00e9e Nicolas de Lange from Vieux Lyon (~15 min). Free, always open. Best March\u2013October when sunrise is before 7am. The Basilica itself opens at 7am.",c:["high_spots"],r:"g",nn:"Fourvi\u00e8re au lever du soleil",ns:"L\'esplanade de Fourvi\u00e8re \u00e0 6h \u2014 la ville endormie en dessous, les Alpes dans la premi\u00e8re lumi\u00e8re, personne d\'autre.",nst:"L\'esplanade devant la Basilique est l\'un des endroits les plus visit\u00e9s de Lyon. \u00c0 6h, c\'est l\'un des plus vides. La ville s\'\u00e9tale en dessous dans une brume grise qui se l\u00e8ve quand le soleil passe au-dessus des Alpes. Par temps clair, on voit le Mont Blanc devenir rose.\n\nLe funiculaire ne fonctionne pas si t\u00f4t, alors on monte \u00e0 pied. La Mont\u00e9e Nicolas de Lange depuis le Vieux Lyon prend quinze minutes.",nt:"Mont\u00e9e Nicolas de Lange depuis le Vieux Lyon (~15 min). Gratuit, toujours ouvert. Id\u00e9al mars\u2013octobre. Basilique ouvre \u00e0 7h."},
{id:36,n:"Berges du Rh\u00f4ne at Dawn",a:"Guilloti\u00e8re",v:["quiet","beautiful","free entry"],d:30,s:"The car-free riverbank at 6am \u2014 empty, silent, the water flat, and the city visible but not yet awake.",st:"By mid-morning the Berges du Rh\u00f4ne are full of runners, cyclists, and families. At 6am they are deserted. The paved promenade stretches from the Parc de la T\u00eate d\'Or to the Confluence, and at dawn the river is flat, the plane trees cast long shadows, and the silence is almost rural.\n\nThe light is different here in the early morning \u2014 the facades on the far bank catch the sun before anything else, and the water reflects them with a clarity that disappears by 9am. If you run, this is the run. If you walk, this is the walk.",im:"The Rh\u00f4ne flat as glass, the Guilloti\u00e8re facades catching the first sun, a single runner ahead of you, the city silent.",t:"Any access point along the left bank of the Rh\u00f4ne. Free, always open. The stretch between Pont de la Guilloti\u00e8re and Pont de l\'Universit\u00e9 is the most beautiful at dawn.",c:["sport","parks","nature"],r:"g",nn:"Berges du Rh\u00f4ne \u00e0 l\'aube",ns:"La promenade pi\u00e9tonne au bord du Rh\u00f4ne \u00e0 6h \u2014 vide, silencieuse, l\'eau plate, la ville visible mais pas encore r\u00e9veill\u00e9e.",nst:"En milieu de matin\u00e9e, les Berges du Rh\u00f4ne sont pleines de coureurs et de familles. \u00c0 6h, elles sont d\u00e9sertes. La lumi\u00e8re est diff\u00e9rente \u2014 les fa\u00e7ades de l\'autre rive attrapent le soleil en premier, et l\'eau les refl\u00e8te avec une clart\u00e9 qui dispara\u00eet \u00e0 9h.\n\nSi vous courez, c\'est le parcours. Si vous marchez, c\'est la promenade.",nt:"Tout acc\u00e8s le long de la rive gauche du Rh\u00f4ne. Gratuit. Le tron\u00e7on entre Pont de la Guilloti\u00e8re et Pont de l\'Universit\u00e9 est le plus beau \u00e0 l\'aube."},
{id:37,n:"Clo\u00eetre du Mus\u00e9e des Beaux-Arts",a:"Presqu\'\u00eele",v:["beautiful","quiet","free entry"],d:20,s:"A cloistered garden with sculptures and a fountain inside a 17th-century abbey on Place des Terreaux \u2014 free to enter, always.",st:"The Mus\u00e9e des Beaux-Arts occupies the Palais Saint-Pierre, a former Benedictine abbey. The museum costs \u20ac8. But the cloistered garden at its centre \u2014 a quiet courtyard with a fountain, stone benches, and sculptures scattered among the hedges \u2014 is free to enter anytime the museum doors are open.\n\nLyonnais eat lunch here in the sun. Students read. Nobody rushes. It is one of the most peaceful spaces in the city, and it sits in the middle of one of the busiest squares.",im:"A Rodin in a cloistered garden, your coffee on a stone bench, nobody in the room with the Veronese.",t:"Place des Terreaux, 1st. M\u00e9tro A, H\u00f4tel de Ville. Cloister: free, open whenever museum is open (Wed\u2013Mon 10am\u20136pm, Fri until 9pm). Museum itself: \u20ac8, free first Friday evening of each month.",c:["free_culture","parks"],r:"g",nn:"Clo\u00eetre du Mus\u00e9e des Beaux-Arts",ns:"Un jardin clo\u00eetr\u00e9 avec sculptures et fontaine dans une abbaye du XVIIe si\u00e8cle, Place des Terreaux \u2014 acc\u00e8s libre, toujours.",nst:"Le Mus\u00e9e des Beaux-Arts occupe le Palais Saint-Pierre, ancienne abbaye b\u00e9n\u00e9dictine. Le mus\u00e9e co\u00fbte 8\u20ac. Mais le jardin du clo\u00eetre \u2014 une cour tranquille avec fontaine, bancs de pierre et sculptures \u2014 est gratuit.\n\nLes Lyonnais y d\u00e9jeunent au soleil. Les \u00e9tudiants lisent. Personne ne se presse. C\'est l\'un des espaces les plus paisibles de la ville.",nt:"Place des Terreaux, 1er. M\u00e9tro A H\u00f4tel de Ville. Clo\u00eetre : gratuit (mer\u2013lun 10h\u201318h, ven jusqu\'\u00e0 21h). Mus\u00e9e : 8\u20ac, gratuit le 1er vendredi soir du mois."},
{id:38,n:"Fresque des Lyonnais",a:"Presqu\'\u00eele",v:["beautiful","free entry","local"],d:10,s:"An 800m\u00b2 trompe-l\'\u0153il mural depicting 30 famous Lyonnais \u2014 from the Lumi\u00e8re brothers to Bocuse \u2014 painted so precisely the balconies look real from a distance.",st:"On the corner of Quai Saint-Vincent and Rue de la Martini\u00e8re, 30 famous Lyonnais figures are painted onto the side of a building \u2014 the Lumi\u00e8re brothers, Antoine de Saint-Exup\u00e9ry, Paul Bocuse, Abb\u00e9 Pierre, and others, each on a balcony or in a doorway, painted with such precision that from twenty metres away the windows look real.\n\nLyon has over 100 painted walls across the city \u2014 it\'s the unofficial mural capital of France. This one is the masterpiece.",im:"A building that shouldn\'t have balconies but does, a chef on one of them, a pilot on another, and the slow realisation that none of it is real.",t:"2 Rue de la Martini\u00e8re / 49 Quai Saint-Vincent, 1st. Free, always visible. Best photographed in morning light.",c:["free_culture"],r:"g",nn:"Fresque des Lyonnais",ns:"Un trompe-l\'\u0153il de 800 m\u00b2 repr\u00e9sentant 30 Lyonnais c\u00e9l\u00e8bres \u2014 si pr\u00e9cis que les balcons semblent vrais \u00e0 distance.",nst:"Au coin du Quai Saint-Vincent et de la Rue de la Martini\u00e8re, 30 Lyonnais c\u00e9l\u00e8bres sont peints sur un immeuble \u2014 les fr\u00e8res Lumi\u00e8re, Saint-Exup\u00e9ry, Bocuse \u2014 chacun sur un balcon ou dans une porte, peints avec une telle pr\u00e9cision que les fen\u00eatres semblent vraies.\n\nLyon compte plus de 100 murs peints. Celui-ci est le chef-d\'\u0153uvre.",nt:"2 rue de la Martini\u00e8re / 49 quai Saint-Vincent, 1er. Gratuit, toujours visible. Meilleure photo le matin."},
{id:39,n:"Mur des Canuts",a:"Croix-Rousse",v:["beautiful","free entry","local"],d:10,s:"Europe\'s largest trompe-l\'\u0153il \u2014 1,200 square metres depicting the Croix-Rousse neighbourhood and its inhabitants, repainted every decade to age the characters.",st:"At the north end of the Boulevard de la Croix-Rousse, an entire building facade has been transformed into a 1,200m\u00b2 painting of the neighbourhood itself \u2014 streets, staircases, balconies, and residents going about their day. The extraordinary detail: the mural has been repainted three times since 1987, and each time the characters are aged to match the passage of time. A child painted in 1987 is now a young adult.\n\nIt is one of the largest outdoor murals in Europe and the most ambitious. Stand across the street and try to find the seam between reality and paint.",im:"A building with residents on every balcony, a staircase climbing to a street that doesn\'t exist, a dog on a windowsill that will never move, and the disorienting sense that the wall is more alive than the street.",t:"Boulevard des Canuts, 4th arrondissement. Free, always visible. M\u00e9tro C to H\u00e9non. 5 minutes north of the Croix-Rousse market.",c:["free_culture"],r:"g",nn:"Mur des Canuts",ns:"Le plus grand trompe-l\'\u0153il d\'Europe \u2014 1 200 m\u00b2 repr\u00e9sentant la Croix-Rousse, repaint tous les dix ans pour vieillir les personnages.",nst:"Au bout nord du Boulevard de la Croix-Rousse, une fa\u00e7ade enti\u00e8re est devenue une peinture de 1 200 m\u00b2 du quartier \u2014 rues, escaliers, balcons et habitants. La fresque a \u00e9t\u00e9 repeinte trois fois depuis 1987, et chaque fois les personnages vieillissent.\n\nMettez-vous de l\'autre c\u00f4t\u00e9 de la rue et essayez de trouver la limite entre la r\u00e9alit\u00e9 et la peinture.",nt:"Boulevard des Canuts, 4e. Gratuit. M\u00e9tro C H\u00e9non. 5 min au nord du march\u00e9 de la Croix-Rousse."},
{id:40,n:"Terrasse du Mus\u00e9e des Confluences",a:"Confluence",v:["beautiful","free entry"],d:20,s:"The rooftop terrace of the Mus\u00e9e des Confluences \u2014 360-degree views of the rivers, the Alps, and the city, no ticket needed.",st:"The Mus\u00e9e des Confluences is a science and anthropology museum at the southern tip of the Presqu\'\u00eele, where the Rh\u00f4ne and Sa\u00f4ne meet. The building \u2014 a massive deconstructivist crystal of glass and steel \u2014 is one of the most striking pieces of architecture in France. The top-floor terrace offers a 360-degree view: the rivers merging below, Fourvi\u00e8re to the west, and on clear days the chain of the Alps with Mont Blanc at its centre.\n\nThe terrace is free. There\'s a caf\u00e9. You do not need a museum ticket.",im:"Standing at the point where two rivers become one, the Alps visible on the horizon, a building that looks like it was designed by someone who doesn\'t believe in right angles.",t:"86 Quai Perrache, 2nd. Tram T1 to Mus\u00e9e des Confluences. Museum: \u20ac12, free under 18. Terrace and caf\u00e9: free without ticket.",c:["free_culture","high_spots"],r:"g",nn:"Terrasse du Mus\u00e9e des Confluences",ns:"La terrasse panoramique du mus\u00e9e \u2014 vue \u00e0 360\u00b0 sur les fleuves, les Alpes et la ville, sans billet.",nst:"Le Mus\u00e9e des Confluences est un b\u00e2timent de verre et d\'acier d\u00e9constructiviste \u00e0 la pointe de la Presqu\'\u00eele. La terrasse offre une vue \u00e0 360\u00b0 : les fleuves qui fusionnent, Fourvi\u00e8re \u00e0 l\'ouest, les Alpes par temps clair avec le Mont Blanc.\n\nLa terrasse est gratuite. Il y a un caf\u00e9. Pas besoin de billet de mus\u00e9e.",nt:"86 quai Perrache, 2e. Tram T1 Mus\u00e9e des Confluences. Mus\u00e9e : 12\u20ac. Terrasse et caf\u00e9 : gratuit sans billet."},
