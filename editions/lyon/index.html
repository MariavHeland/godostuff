{id:108,n:"Mus\u00e9e des Beaux-Arts \u2014 Full Collection",a:"Presqu\'\u00eele",v:["famous","beautiful","history"],d:90,s:"One of France\'s largest art collections \u2014 antiquity to Bacon, housed in a 17th-century abbey. The cloister is free; the collection inside costs \u20ac8.",st:"The Mus\u00e9e des Beaux-Arts occupies the Palais Saint-Pierre, a former Benedictine abbey on Place des Terreaux. The collection spans antiquity to modern art \u2014 Egyptian sarcophagi, Veronese, Rubens, Monet, Picasso, Bacon \u2014 and it\'s the second-largest art museum in France after the Louvre.\n\nThe building alone is worth it: vaulted ceilings, stone staircases, a cloistered garden with sculptures and a fountain. But the art is what keeps you. A room of Dutch masters. A Rodin. A Delacroix next to a Courbet. And because this isn\'t Paris, you\'ll often have the room to yourself.",im:"A Rodin in a vaulted stone room, natural light from a high window, nobody else in the gallery, and the strange luxury of standing alone with a masterpiece.",t:"Place des Terreaux, 1st arr. M\u00e9tro A, H\u00f4tel de Ville. \u20ac8 adults. Wed\u2013Mon, 10am\u20136pm (Fri until 9pm). Free first Friday evening of each month. Free under 18. Free for EU residents under 26.",c:["free_culture","history_big"],r:"g",free_for:["under18","eu_under26"],nn:"Mus\u00e9e des Beaux-Arts \u2014 Collection compl\u00e8te",ns:"L\'une des plus grandes collections d\'art de France \u2014 de l\'Antiquit\u00e9 \u00e0 Bacon, dans une abbaye du XVIIe. Le clo\u00eetre est gratuit ; la collection co\u00fbte 8\u20ac.",nst:"Le Mus\u00e9e des Beaux-Arts occupe le Palais Saint-Pierre, ancienne abbaye b\u00e9n\u00e9dictine sur la Place des Terreaux. La collection va de l\'Antiquit\u00e9 \u00e0 l\'art moderne \u2014 sarcophages \u00e9gyptiens, V\u00e9ron\u00e8se, Rubens, Monet, Picasso, Bacon \u2014 c\'est le deuxi\u00e8me plus grand mus\u00e9e d\'art de France apr\u00e8s le Louvre.\n\nLe b\u00e2timent seul vaut le d\u00e9tour. Mais c\'est l\'art qui vous retient. Et parce que ce n\'est pas Paris, vous aurez souvent les salles pour vous seul.",nt:"Place des Terreaux, 1er. M\u00e9tro A H\u00f4tel de Ville. 8\u20ac adultes. Mer\u2013lun 10h\u201318h (ven jusqu\'\u00e0 21h). Gratuit le premier vendredi soir du mois. Gratuit \u2013 18 ans. Gratuit r\u00e9sidents UE \u2013 26 ans."},
{id:109,n:"Mus\u00e9e Gadagne \u2014 Histoire de Lyon",a:"Vieux Lyon",v:["history","hidden"],d:60,s:"Two museums inside Lyon\'s finest Renaissance mansion \u2014 the history of the city from Roman Lugdunum to the present, plus a world-class puppet collection.",st:"The Mus\u00e9e Gadagne occupies the H\u00f4tel de Gadagne, a 16th-century Renaissance palace in the heart of Vieux Lyon. Inside are two museums: the Mus\u00e9e d\'Histoire de Lyon, which traces the city from its founding as Lugdunum through the silk trade, the Resistance, and the modern era; and the Mus\u00e9e des Marionnettes du Monde, one of the most important puppet collections anywhere.\n\nThe rooftop garden \u2014 a secret hanging garden four storeys above the street \u2014 offers a view over the Vieux Lyon rooftops that most visitors never see. The building itself, with its stone staircases and carved ceilings, is half the experience.",im:"A Renaissance staircase spiralling up four storeys, a 16th-century ceiling carved with grotesques, and then suddenly a rooftop garden with the old town\'s terracotta roofs stretching below you.",t:"1 Place du Petit-Coll\u00e8ge, 5th arr. M\u00e9tro D, Vieux Lyon. \u20ac6 adults (both museums). Wed\u2013Sun 10:30am\u20136pm. Free under 18. Rooftop garden included with ticket.",c:["history_big","free_culture"],r:"g",free_for:["under18"],nn:"Mus\u00e9e Gadagne \u2014 Histoire de Lyon",ns:"Deux mus\u00e9es dans le plus bel h\u00f4tel particulier Renaissance de Lyon \u2014 l\'histoire de la ville et une collection mondiale de marionnettes.",nst:"Le Mus\u00e9e Gadagne occupe l\'H\u00f4tel de Gadagne, un palais Renaissance du XVIe si\u00e8cle au c\u0153ur du Vieux Lyon. Deux mus\u00e9es : l\'Histoire de Lyon de Lugdunum \u00e0 aujourd\'hui, et le Mus\u00e9e des Marionnettes du Monde.\n\nLe jardin sur le toit \u2014 un jardin suspendu secret au quatri\u00e8me \u00e9tage \u2014 offre une vue sur les toits du Vieux Lyon.",nt:"1 place du Petit-Coll\u00e8ge, 5e. M\u00e9tro D Vieux Lyon. 6\u20ac adultes (les deux mus\u00e9es). Mer\u2013dim 10h30\u201318h. Gratuit \u2013 18 ans. Jardin sur le toit inclus."},
{id:110,n:"MAC Lyon \u2014 Mus\u00e9e d\'Art Contemporain",a:"T\u00eate d\'Or",v:["hidden","beautiful"],d:60,s:"Lyon\'s contemporary art museum inside Renzo Piano\'s Cit\u00e9 Internationale \u2014 the entire collection changes with every exhibition, so the building is never the same twice.",st:"The MAC Lyon is unusual: it has no permanent collection on display. Instead, the entire museum is reconfigured for each new exhibition cycle. The spaces are enormous \u2014 open, flexible, white \u2014 and the programme is ambitious: large-scale installations, video art, contemporary photography, and international artists who wouldn\'t fit in a smaller gallery.\n\nThe building is part of Renzo Piano\'s Cit\u00e9 Internationale complex, between the T\u00eate d\'Or park and the Rh\u00f4ne. The architecture is warm terracotta and glass \u2014 a container designed to disappear behind whatever it holds. Between exhibitions, the museum closes entirely for reinstallation.",im:"A vast white room, a single installation filling it, the ceiling four storeys above you, and the knowledge that the next time you come, this room will be a completely different space.",t:"Cit\u00e9 Internationale, 81 Quai Charles de Gaulle, 6th arr. Tram T1 to Cit\u00e9 Internationale. \u20ac8 adults. Wed\u2013Sun 11am\u20136pm. Free under 18. Check macLYON.com for current exhibitions \u2014 the museum closes between shows.",c:["free_culture"],r:"g",free_for:["under18","eu_under26"],nn:"MAC Lyon \u2014 Mus\u00e9e d\'Art Contemporain",ns:"Le mus\u00e9e d\'art contemporain de Lyon dans la Cit\u00e9 Internationale de Renzo Piano \u2014 la collection enti\u00e8re change \u00e0 chaque exposition.",nst:"Le MAC Lyon est particulier : pas de collection permanente expos\u00e9e. Tout le mus\u00e9e est reconfigur\u00e9 \u00e0 chaque cycle d\'exposition. Les espaces sont \u00e9normes et le programme ambitieux : installations grand format, vid\u00e9o, photographie contemporaine.\n\nLe b\u00e2timent fait partie du complexe Cit\u00e9 Internationale de Renzo Piano. Entre les expositions, le mus\u00e9e ferme pour r\u00e9installation compl\u00e8te.",nt:"Cit\u00e9 Internationale, 81 quai Charles de Gaulle, 6e. Tram T1. 8\u20ac adultes. Mer\u2013dim 11h\u201318h. Gratuit \u2013 18 ans. Voir macLYON.com pour les expos en cours."},
{id:111,n:"Mus\u00e9e de l\'Imprimerie et de la Communication graphique",a:"Presqu\'\u00eele",v:["nerd","history","hidden"],d:45,s:"The history of printing from Gutenberg to digital \u2014 housed in the 15th-century H\u00f4tel de la Couronne, where Lyon\'s first book was printed in 1473.",st:"Lyon was one of the first great printing cities in Europe. By the early 16th century, the city had over 100 printing workshops. The Mus\u00e9e de l\'Imprimerie traces this history from Gutenberg\'s press to contemporary graphic design, with original presses, typographic tools, rare books, and examples of printing from across five centuries.\n\nThe building itself is part of the story: the H\u00f4tel de la Couronne, a 15th-century mansion where Lyon\'s first book was printed. The collection includes a Gutenberg Bible page, original Plantin typefaces, and a history of the transition from metal type to phototypesetting to digital.\n\nIf you care about typography, design, or the history of how words reach paper, this is a pilgrimage.",im:"A 16th-century printing press behind glass, lead typefaces in a wooden drawer, a Gutenberg Bible page under low light, and the satisfying weight of a history that starts with ink and ends with pixels.",t:"13 Rue de la Poulaillerie, 2nd arr. M\u00e9tro A, Cordeliers. \u20ac6 adults. Wed\u2013Sun 10:30am\u20136pm. Free under 18. Audio guide in English available.",c:["nerd","history_big","free_culture"],r:"g",free_for:["under18"],nn:"Mus\u00e9e de l\'Imprimerie",ns:"L\'histoire de l\'imprimerie de Gutenberg au num\u00e9rique \u2014 dans l\'h\u00f4tel o\u00f9 le premier livre de Lyon fut imprim\u00e9 en 1473.",nst:"Lyon \u00e9tait l\'une des premi\u00e8res grandes villes d\'imprimerie en Europe. Le mus\u00e9e retrace cette histoire depuis la presse de Gutenberg jusqu\'au design graphique contemporain, avec des presses originales, des caract\u00e8res typographiques et des livres rares.\n\nLe b\u00e2timent est l\'H\u00f4tel de la Couronne, o\u00f9 le premier livre de Lyon a \u00e9t\u00e9 imprim\u00e9. Si vous aimez la typographie ou le design, c\'est un p\u00e8lerinage.",nt:"13 rue de la Poulaillerie, 2e. M\u00e9tro A Cordeliers. 6\u20ac adultes. Mer\u2013dim 10h30\u201318h. Gratuit \u2013 18 ans. Audioguide en anglais."},
{id:112,n:"Mus\u00e9e des Tissus et des Arts d\u00e9coratifs",a:"Presqu\'\u00eele",v:["history","beautiful","hidden"],d:60,s:"4,500 years of textile history \u2014 Coptic fabrics, Ottoman silks, Lyon\'s own silk-weaving heritage, and a collection that rivals the V&A.",st:"The Mus\u00e9e des Tissus holds one of the most important textile collections in the world \u2014 over 2.5 million pieces spanning 4,500 years. Coptic tapestries, Persian carpets, Ottoman silks, Italian brocades, and Lyon\'s own silk production from the 15th century onwards. The collection rivals the V&A in London and the Met in New York for breadth and quality.\n\nThe museum occupies two connected 18th-century mansions in the Presqu\'\u00eele. The decorative arts section includes period rooms with original furnishings, wallpapers, and ceramics. The textile galleries are dimly lit to protect the fabrics, which gives them an almost sacred atmosphere.\n\nLyon was the silk capital of Europe for three centuries. This museum is where that story is told in thread.",im:"A 17th-century Lyon silk panel under low light, gold thread glinting, the weave so fine you need to lean in to see the pattern, and the knowledge that this fabric was made in a building a few hundred metres from where you\'re standing.",t:"34 Rue de la Charit\u00e9, 2nd arr. M\u00e9tro A, Amp\u00e8re. \u20ac10 adults. Tue\u2013Sun 10am\u20135:30pm. Free under 18. Student rate \u20ac5 with card.",c:["history_big","free_culture","nerd"],r:"g",free_for:["under18","student"],nn:"Mus\u00e9e des Tissus et des Arts d\u00e9coratifs",ns:"4 500 ans d\'histoire textile \u2014 tissus coptes, soies ottomanes, patrimoine soyeux de Lyon, et une collection qui rivalise avec le V&A.",nst:"Le Mus\u00e9e des Tissus d\u00e9tient l\'une des plus importantes collections textiles au monde \u2014 plus de 2,5 millions de pi\u00e8ces sur 4 500 ans. Tapisseries coptes, tapis persans, soies ottomanes, et la production soyeuse de Lyon depuis le XVe si\u00e8cle.\n\nLyon \u00e9tait la capitale de la soie en Europe pendant trois si\u00e8cles. Ce mus\u00e9e raconte cette histoire en fil.",nt:"34 rue de la Charit\u00e9, 2e. M\u00e9tro A Amp\u00e8re. 10\u20ac adultes. Mar\u2013dim 10h\u201317h30. Gratuit \u2013 18 ans. Tarif \u00e9tudiant 5\u20ac."},
{id:113,n:"Plan\u00e9tarium de Vaulx-en-Velin",a:"Beyond Lyon",v:["nerd","beautiful"],d:90,s:"One of the largest planetariums in France \u2014 immersive dome shows, interactive exhibits on space exploration, and a telescope for public observation evenings.",st:"The Plan\u00e9tarium de Vaulx-en-Velin is one of the most ambitious science centres in the Lyon region. The main dome seats over 200 people for immersive full-dome projections \u2014 tours of the solar system, deep-space imagery, and shows about current space missions. The permanent exhibition covers astronomy, space exploration, and the physics of the universe with genuinely interactive exhibits.\n\nPublic observation evenings with large telescopes are held regularly, weather permitting \u2014 often free. The building was renovated in 2013 and the projection technology is state-of-the-art.\n\nIt\'s in Vaulx-en-Velin, 20 minutes east by bus, in a neighbourhood most visitors never see. That\'s part of what makes it interesting.",im:"Two hundred people in the dark, the Milky Way projected across a dome above you, a narrator explaining what you\'re seeing, and for a few minutes the ceiling disappears entirely.",t:"Place de la Nation, Vaulx-en-Velin. Bus C8 from Part-Dieu (~20 min). \u20ac7 adults, \u20ac5 children. Tue\u2013Sun (hours vary). Free under 4. Free for under 18 during school holidays. Check planetariumvv.com.",c:["nerd"],r:"g",free_for:["under12","under18"],nn:"Plan\u00e9tarium de Vaulx-en-Velin",ns:"L\'un des plus grands plan\u00e9tariums de France \u2014 projections immersives, expositions interactives sur l\'espace, et soir\u00e9es d\'observation au t\u00e9lescope.",nst:"Le Plan\u00e9tarium de Vaulx-en-Velin est l\'un des centres scientifiques les plus ambitieux de la r\u00e9gion. Le d\u00f4me principal accueille 200 personnes pour des projections immersives. L\'exposition permanente couvre l\'astronomie et l\'exploration spatiale.\n\nDes soir\u00e9es d\'observation publiques avec de grands t\u00e9lescopes sont organis\u00e9es r\u00e9guli\u00e8rement, souvent gratuites.",nt:"Place de la Nation, Vaulx-en-Velin. Bus C8 depuis Part-Dieu (~20 min). 7\u20ac adultes, 5\u20ac enfants. Mar\u2013dim. Gratuit \u2013 4 ans. Gratuit \u2013 18 ans en vacances scolaires. Voir planetariumvv.com."},
{id:114,n:"Mus\u00e9e Miniature et Cin\u00e9ma",a:"Vieux Lyon",v:["weird","nerd"],d:60,s:"A museum of miniature scenes so detailed you need a magnifying glass, and original props from Hollywood films \u2014 Alien, Batman, The Perfume \u2014 in the heart of Vieux Lyon.",st:"The Mus\u00e9e Miniature et Cin\u00e9ma occupies the Maison des Avocats, a Renaissance building in Vieux Lyon. The miniature collection \u2014 created by artist Dan Ohlmann \u2014 consists of hyper-realistic scenes built at 1:12 scale or smaller: a crumbling Parisian apartment, a flooded subway station, a workshop with tools the size of rice grains. The detail is genuinely unsettling in its precision.\n\nThe cinema section holds original props, costumes, and special effects pieces from major films. Alien xenomorph suits. Batman cowls. Prosthetics from The Perfume (filmed partly in Lyon). The collection is serious \u2014 these are real production pieces, not replicas.\n\nThe combination of obsessive miniaturism and Hollywood props is strange and works perfectly.",im:"A miniature room so realistic you reach for the magnifying glass, then turn around and face an actual Alien suit from the 1979 film, and the line between tiny and terrifying blurs completely.",t:"60 Rue Saint-Jean, 5th arr. M\u00e9tro D, Vieux Lyon. \u20ac9.50 adults. Daily 10am\u20136:30pm (extended hours in summer). Free under 4. Reduced rate under 18 (\u20ac6.50).",c:["weird","nerd"],r:"g",free_for:["under12"],nn:"Mus\u00e9e Miniature et Cin\u00e9ma",ns:"Un mus\u00e9e de sc\u00e8nes miniatures si d\u00e9taill\u00e9es qu\'il faut une loupe, et des accessoires originaux de films \u2014 Alien, Batman, Le Parfum \u2014 au c\u0153ur du Vieux Lyon.",nst:"Le mus\u00e9e occupe la Maison des Avocats, un b\u00e2timent Renaissance du Vieux Lyon. La collection miniature de Dan Ohlmann : des sc\u00e8nes hyper-r\u00e9alistes \u00e0 l\'\u00e9chelle 1:12 ou plus petit. La section cin\u00e9ma : accessoires originaux de films \u2014 combinaisons d\'Alien, masques de Batman, proth\u00e8ses du Parfum.\n\nLa combinaison de miniaturisme obsessionnel et d\'accessoires hollywoodiens est \u00e9trange et fonctionne parfaitement.",nt:"60 rue Saint-Jean, 5e. M\u00e9tro D Vieux Lyon. 9,50\u20ac adultes. Tous les jours 10h\u201318h30. Gratuit \u2013 4 ans. Tarif r\u00e9duit \u2013 18 ans (6,50\u20ac)."},
{id:115,n:"Mus\u00e9e Lumi\u00e8re \u2014 Cin\u00e9math\u00e8que screenings",a:"Monplaisir",v:["local","hidden"],d:120,s:"The Institut Lumi\u00e8re\'s cinema programme \u2014 classic, independent, and restored films screened in a beautiful room, with student and under-26 prices.",st:"The Institut Lumi\u00e8re isn\'t just a museum. Its cinema \u2014 the Salle du Hangar, a converted warehouse next to the Lumi\u00e8re villa \u2014 screens a curated programme of classic, independent, and restored films year-round. Retrospectives, director spotlights, and new restorations are programmed with the care you\'d expect from the birthplace of cinema.\n\nThe room is beautiful \u2014 tiered seating, excellent projection, and the particular hush of an audience that chose this film for a reason. Student tickets and under-26 rates make it one of the cheapest quality cinema experiences in Lyon.\n\nThe Lumi\u00e8re brothers would approve.",im:"A darkened cinema in a converted warehouse, a restored 1960s French film on the screen, an audience of fifty people who came because they wanted this specific film, and the sense of watching cinema in the place where cinema was born.",t:"25 Rue du Premier Film, 8th arr. M\u00e9tro D, Monplaisir-Lumi\u00e8re. Screenings: \u20ac6.50 regular, \u20ac5 under 26 / students. Programme at institut-lumiere.org. Evening screenings most nights.",c:["free_culture","nerd"],r:"g",free_for:["student","eu_under26"],nn:"Cin\u00e9math\u00e8que Lumi\u00e8re \u2014 S\u00e9ances",ns:"Le cin\u00e9ma de l\'Institut Lumi\u00e8re \u2014 films classiques, ind\u00e9pendants et restaur\u00e9s dans une belle salle, \u00e0 prix \u00e9tudiant et moins de 26 ans.",nst:"L\'Institut Lumi\u00e8re n\'est pas qu\'un mus\u00e9e. Son cin\u00e9ma \u2014 la Salle du Hangar \u2014 programme des films classiques, ind\u00e9pendants et restaur\u00e9s toute l\'ann\u00e9e. R\u00e9trospectives, hommages, restaurations.\n\nLa salle est belle, la projection excellente, et les tarifs \u00e9tudiants et moins de 26 ans en font l\'une des exp\u00e9riences cin\u00e9matographiques les moins ch\u00e8res de Lyon.",nt:"25 rue du Premier Film, 8e. M\u00e9tro D Monplaisir-Lumi\u00e8re. 6,50\u20ac plein, 5\u20ac \u2013 26 ans / \u00e9tudiants. Programme : institut-lumiere.org."},
{id:116,n:"Aquarium de Lyon",a:"Confluence",v:["local"],d:90,s:"A large aquarium near the Confluence with over 300 species \u2014 sharks, tropical fish, a touch pool, and a well-designed section on the Rh\u00f4ne\'s own underwater life.",st:"The Aquarium de Lyon sits in the La Mulatière area south of the Confluence, near the A7 motorway. It\'s not in a photogenic location, but inside it holds over 300 aquatic species across five continents. The tropical section has sharks, rays, and fish the colour of cartoons. The temperate section covers Mediterranean and Atlantic marine life.\n\nThe best part is the section dedicated to the Rh\u00f4ne and its tributaries \u2014 the fish that live in the rivers running through the city, species most Lyonnais have never seen despite living metres from the water. The touch pool is popular with children. The whole visit takes about 90 minutes.\n\nIt\'s expensive for adults, but free for very young children and significantly reduced for families.",im:"A shark passing overhead in a glass tunnel, a child\'s face pressed against the touch pool, and a room full of Rh\u00f4ne river fish that you never knew lived under the bridges you cross every day.",t:"7 Rue St\u00e9phane D\u00e9chant, La Mulati\u00e8re. Tram T1 to Mus\u00e9e des Confluences, then 10-minute walk or bus. \u20ac16.50 adults, \u20ac13 children (3\u201312). Free under 3. Family passes available. Tue\u2013Sun 10am\u20137pm.",c:["nature"],r:"g",free_for:["under12"],nn:"Aquarium de Lyon",ns:"Un grand aquarium pr\u00e8s de la Confluence avec plus de 300 esp\u00e8ces \u2014 requins, poissons tropicaux, bassin tactile, et une section sur la vie sous-marine du Rh\u00f4ne.",nst:"L\'Aquarium de Lyon abrite plus de 300 esp\u00e8ces aquatiques de cinq continents. La section tropicale a des requins et des raies. La meilleure partie est la section d\u00e9di\u00e9e au Rh\u00f4ne \u2014 les poissons qui vivent sous les ponts que vous traversez chaque jour.\n\nLe bassin tactile est populaire aupr\u00e8s des enfants. Cher pour les adultes, mais gratuit pour les tr\u00e8s jeunes.",nt:"7 rue St\u00e9phane D\u00e9chant, La Mulati\u00e8re. Tram T1 Mus\u00e9e des Confluences puis 10 min. 16,50\u20ac adultes, 13\u20ac enfants (3\u201312). Gratuit \u2013 3 ans. Mar\u2013dim 10h\u201319h."},
{id:117,n:"Maison des Canuts",a:"Croix-Rousse",v:["history","nerd","local"],d:45,s:"The living museum of Lyon\'s silk-weaving heritage \u2014 working Jacquard looms, weaving demonstrations, and the story of the Canuts who built Croix-Rousse.",st:"The Maison des Canuts is a small museum and workshop dedicated to Lyon\'s silk-weaving tradition. Working Jacquard looms fill the main room \u2014 enormous wooden machines, some of them 200 years old, still producing silk fabric in demonstrations. The guide (usually a former weaver or textile specialist) explains the Jacquard system \u2014 the punch-card mechanism that was, depending on your perspective, the ancestor of the computer or the ancestor of the player piano.\n\nThe museum tells the story of the Canuts: the 30,000 silk workers who filled the Croix-Rousse in the 19th century, their revolts, their contribution to Lyon\'s wealth, and their eventual replacement by industrial machinery. The shop sells Lyon silk at workshop prices.\n\nStudents with a valid card enter free.",im:"A Jacquard loom the height of a room, punch cards feeding through the mechanism, silk emerging thread by thread, and the realisation that this machine is a 200-year-old computer.",t:"10\u201312 Rue d\'Ivry, 4th arr. M\u00e9tro C, Croix-Rousse. \u20ac7 adults. Tue\u2013Sat 10am\u20136:30pm. Demonstrations at set times \u2014 check maisondescanuts.com. Free for students with card.",c:["history_big","nerd"],r:"g",free_for:["student","under18"],nn:"Maison des Canuts",ns:"Le mus\u00e9e vivant du patrimoine soyeux de Lyon \u2014 m\u00e9tiers Jacquard en fonctionnement, d\u00e9monstrations de tissage, et l\'histoire des Canuts.",nst:"La Maison des Canuts est un mus\u00e9e-atelier d\u00e9di\u00e9 \u00e0 la tradition soyeuse de Lyon. Des m\u00e9tiers Jacquard en fonctionnement remplissent la salle principale \u2014 \u00e9normes machines en bois, certaines vieilles de 200 ans, produisant encore de la soie.\n\nLe mus\u00e9e raconte l\'histoire des Canuts : 30 000 ouvriers en soie qui remplissaient la Croix-Rousse au XIXe si\u00e8cle, leurs r\u00e9voltes, leur contribution \u00e0 la richesse de Lyon.",nt:"10\u201312 rue d\'Ivry, 4e. M\u00e9tro C Croix-Rousse. 7\u20ac adultes. Mar\u2013sam 10h\u201318h30. D\u00e9monstrations \u00e0 heures fixes. Gratuit pour les \u00e9tudiants sur pr\u00e9sentation de carte."},
{id:118,n:"Op\u00e9ra de Lyon \u2014 Performances",a:"Presqu\'\u00eele",v:["famous","beautiful"],d:150,s:"World-class opera, ballet, and concerts in Jean Nouvel\'s stunning building \u2014 tickets start at \u20ac10, with deep discounts for under-28s and students.",st:"The Op\u00e9ra de Lyon is one of the best opera houses in France outside Paris. Jean Nouvel\'s 1990s renovation kept the original 19th-century facade and replaced everything behind it with a massive glass barrel vault, creating a building that is half heritage, half spaceship. The programme covers opera, ballet, contemporary dance, and orchestral concerts, with a reputation for adventurous programming.\n\nTickets start at \u20ac10 for the cheapest seats \u2014 among the best value for live performance in Europe. Under-28 tariffs bring the price down further, and students get an additional discount. The house has 1,100 seats and excellent acoustics.\n\nOn performance nights, the glass vault glows from inside, and the eight muse statues on the roof become silhouettes against the lit barrel vault. It\'s one of the best sights in Lyon.",im:"The glass vault of the Op\u00e9ra glowing at night, eight muse statues silhouetted on the roofline, and inside an orchestra tuning, the audience settling, the lights dimming.",t:"Place de la Com\u00e9die, 1st arr. M\u00e9tro A, H\u00f4tel de Ville. Tickets from \u20ac10. Under-28 and student discounts significant. Book at opera-lyon.com. Season runs Sept\u2013July.",c:["free_culture"],r:"g",free_for:["student","eu_under26"],nn:"Op\u00e9ra de Lyon \u2014 Spectacles",ns:"Op\u00e9ra, ballet et concerts de classe mondiale dans le b\u00e2timent de Jean Nouvel \u2014 places \u00e0 partir de 10\u20ac, avec tarifs r\u00e9duits pour les moins de 28 ans et \u00e9tudiants.",nst:"L\'Op\u00e9ra de Lyon est l\'une des meilleures maisons d\'op\u00e9ra de France hors Paris. La r\u00e9novation de Jean Nouvel dans les ann\u00e9es 1990 a gard\u00e9 la fa\u00e7ade du XIXe et remplac\u00e9 tout le reste par une vo\u00fbte de verre massive. Le programme couvre op\u00e9ra, ballet, danse contemporaine et concerts.\n\nLes places commencent \u00e0 10\u20ac. Les tarifs moins de 28 ans et \u00e9tudiants r\u00e9duisent encore le prix. La salle a 1 100 places et une acoustique excellente.",nt:"Place de la Com\u00e9die, 1er. M\u00e9tro A H\u00f4tel de Ville. Places \u00e0 partir de 10\u20ac. Tarifs \u2013 28 ans et \u00e9tudiants significatifs. R\u00e9server sur opera-lyon.com. Saison sept\u2013juil."},
];

{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="free_for"?(<FreeForYou group={freeForGroup} setGroup={setFreeForGroup} onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i} expanded={expandedMission===m.id} onToggle={()=>setExpandedMission(expandedMission===m.id?null:m.id)} onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Lyon Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
