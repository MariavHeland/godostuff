{id:55, n:"Voie Verte Cycling", a:"Rhône", v:["beautiful","free entry","local"], d:30, s:"Flat dedicated path running alongside the Rhône toward Beaujolais vineyards", st:"The path runs at water level, separated from roads. You pass under bridges, past industrial areas that don't matter, through small riverside towns. The water is brown and fast-moving. Trees line the path. You can smell the river. After 10km, the city thins and the hills begin to the east — Beaujolais vineyards start appearing.", im:"It's 1970. A delivery cyclist pedals to work, not knowing decades later this path will be considered a tourist route.", t:"Vélo'v bike from any city station (first 30 mins free with subscription, €1.80/hour after). Or rent from shops near Parc de la Tête d'Or. Path is 12km from city to Neuville-sur-Saône, mostly flat. One direction only sensible as day trip; the return is into prevailing wind.", c:["nature","parks","free_culture"], r:"g", nn:"Voie Verte", ns:"Chemin plat dédié longeant le Rhône en direction des vignobles du Beaujolais", nst:"Le chemin serpente au niveau de l'eau, séparé des routes. Vous passez sous les ponts, près des zones industrielles qui n'importent pas, à travers de petits villages riverains. L'eau est brune et rapide. Les arbres bordent le chemin. Vous pouvez sentir le fleuve. Après 10 km, la ville s'amincit et les collines commencent à l'est — les vignobles du Beaujolais commencent à apparaître.", nt:"Vélo'v depuis n'importe quelle station de la ville (premiers 30 mins gratuits avec abonnement, €1,80/heure après). Ou louez dans des magasins près du Parc de la Tête d'Or. Le chemin est 12 km de la ville à Neuville-sur-Saône, principalement plat. Une direction seulement sensible comme excursion d'un jour; le retour est contre le vent dominant."},

{id:56, n:"Vélo'v Bike Sharing", a:"City-wide", v:["local","free entry"], d:5, s:"Six thousand bikes scattered across the city for rambling the flat Presqu'île", st:"Vélo'v stations are bright blue docks filled with identical bikes. You scan a card or app, grab one, ride. The bikes are heavy and slower than you expect but solid. The system works: you can grab one, ride to a meeting, drop it at another station. The flat streets mean you can actually move.", im:"It's 2005. The city decides that not everyone has a car, and invents a system so you don't need one.", t:"App: Vélo'v (iOS/Android). Single ride: €1.80/hour. Best option: day pass €5 (24 hours unlimited 30-min journeys). Free first 30 mins if you have subscription account. Station finder on app. Works for Presqu'île, Croix-Rousse, parts of east bank — not great for hills.", c:["free_culture","neighbourhoods"], r:"g", nn:"Vélo'v", ns:"Six mille vélos dispersés dans la ville pour flâner le long du Presqu'île plat", nst:"Les stations Vélo'v sont des quais bleu vif remplis de vélos identiques. Vous scannez une carte ou une application, en saisissez une, vous roulez. Les vélos sont lourds et plus lents que vous ne l'espériez mais solides. Le système fonctionne: vous pouvez en saisir une, rouler à une réunion, la déposer à une autre station. Les rues plates signifient que vous pouvez réellement vous déplacer.", nt:"Application: Vélo'v (iOS/Android). Trajet unique: €1,80/heure. Meilleure option: forfait journée €5 (24 heures trajets illimités 30 mins). Premiers 30 mins gratuits si vous avez un compte d'abonnement. Chercheur de station sur application. Fonctionne pour Presqu'île, Croix-Rousse, parties de la rive est — pas très bien pour les collines."},

{id:57, n:"Boules on the Berges", a:"Rhône", v:["local","weird"], d:8, s:"Retired men and young athletes compete fiercely at France's ancient ball game", st:"The boules courts on the Berges are lined with players on weekend afternoons. It looks casual until you see them play. The throw is fierce, calculated. Arguments over measurements. A referee measures with a small string. Money — usually small amounts — changes hands silently. You can watch for hours.", im:"It's 1895. A factory worker throws boules after 12 hours at the loom, and for two hours, he's the best player in Lyon.", t:"Berges du Rhône, 2nd–3rd arrondissements. €0 to watch. Free to join if you ask respectfully; you'll be laughed at, but included. Saturday and Sunday afternoons best. Bring nothing; just watch.", c:["sport","weird","neighbourhoods"], r:"g", nn:"Pétanque sur les Berges", ns:"Des hommes retraités et des athlètes jeunes rivalisent férocement au jeu de boules français ancien", nst:"Les terrains de boules sur les Berges sont bordés de joueurs les après-midi de fin de semaine. Cela semble décontracté jusqu'à ce que vous les voyez jouer. Le lancer est féroce, calculé. Des querelles sur les mesures. Un arbitre mesure avec une petite corde. De l'argent — généralement de petits montants — change silencieusement de mains. Vous pouvez regarder pendant des heures.", nt:"Berges du Rhône, 2e–3e arrondissements. €0 pour regarder. Gratuit pour rejoindre si vous demandez respectueusement; vous serez ridiculisé, mais inclus. Samedi et dimanche après-midi mieux. N'apportez rien; juste regardez."},

{id:58, n:"Parc de la Tête d'Or Lake", a:"Tête d'Or", v:["beautiful","free entry","local"], d:10, s:"Rowing a boat across a lake inside the city, watched by weeping willows", st:"The lake is large — 46 hectares — and feels like a world removed from the streets beyond the park gates. Swans drift. Ducks cluster in the reeds. The banks are lined with weeping willows that touch the water. If you rent a rowboat (€8/hour), the lake deepens as you leave the shore, and the city noise fades.", im:"It's 1860. A family rows across the lake for pleasure, and for two hours, the city doesn't exist.", t:"Métro A: Masséna or Tram T1: Parc de la Tête d'Or. €0 entry to park. Rowboat rental: €8/hour (1–4 people). Open daily 10am–dusk (times vary by season). Bring camera; the willows reflect in water at dusk. Avoid Sunday afternoons (families pack the lake).", c:["free_culture","parks","romantic_water"], r:"g", nn:"Lac Parc de la Tête d'Or", ns:"Faire du canotage sur un lac à l'intérieur de la ville, regardé par des saules pleureurs", nst:"Le lac est grand — 46 hectares — et se sent comme un monde loin des rues au-delà des portes du parc. Les cygnes dérivent. Les canards se regroupent dans les roseaux. Les rives sont bordées de saules pleureurs qui touchent l'eau. Si vous louez un bateau à rames (€8/heure), le lac s'approfondit lorsque vous quittez le rivage, et le bruit de la ville s'estompe.", nt:"Métro A: Masséna ou Tram T1: Parc de la Tête d'Or. €0 d'entrée au parc. Location de bateau à rames: €8/heure (1–4 personnes). Ouvert quotidiennement 10h–crépuscule (horaires varient selon la saison). Apportez une caméra; les saules se reflètent dans l'eau au crépuscule. Évitez les dimanche après-midi (familles remplissent le lac)."},

{id:59, n:"Bouchon Restaurants", a:"Presqu'île", v:["local","history"], d:8, s:"Lunch-only working-class bistros serving liver and quenelles to their own", st:"Rue des Marronniers has five bouchons in a row, each with tightly packed tables, handwritten menus, waiters who've worked the same station for 20 years. The food is heavy and local: quenelles, andouillette, calf's liver, sauce béarnaise. The wine is local Beaujolais, €5 a glass. The conversation of the tables around you is entirely in Lyonnais dialect — you understand maybe half.", im:"It's 1920. A silk worker eats his lunch bouillon and quenelle in the same seat his father ate in, and will eat in the same seat tomorrow.", t:"Rue Mercière / Rue des Marronniers, 2nd arrondissement. Lunch only (closed for dinner at most bouchons). €15–25 for 2 courses. Walk in — no reservations usually accepted. Go 12–1:30pm for guaranteed seating. Métro A: Bellecour or Tram T2.", c:["food","history_big"], r:"g", nn:"Restaurants Bouchon", ns:"Petits bistrots ouvriers en journée seulement servant foie et quenelles aux leurs", nst:"Rue des Marronniers a cinq bouchons à la suite, chacun avec des tables serrées, des menus manuscrits, des serveurs qui travaillent la même station depuis 20 ans. La nourriture est lourde et locale: quenelles, andouillette, foie de veau, sauce béarnaise. Le vin est du Beaujolais local, €5 un verre. La conversation des tables autour de vous est entièrement en dialecte lyonnais — vous comprenez peut-être la moitié.", nt:"Rue Mercière / Rue des Marronniers, 2e arrondissement. Déjeuner seulement (fermé pour le dîner dans la plupart des bouchons). €15–25 pour 2 plats. Entrez à pied — généralement pas de réservations acceptées. Allez 12–13h30 pour une place garantie. Métro A: Bellecour ou Tram T2."},

{id:60, n:"Croix-Rousse Plateau", a:"Croix-Rousse", v:["local","quiet","history"], d:12, s:"At the plateau top, wider streets and a different scale than the city below", st:"The plateau — above the steep streets of the lower Croix-Rousse — has a different feeling entirely. The air is clearer. Buildings are lower and more spread out. Place de la Croix-Rousse itself is a proper square with café terraces facing it. The side streets are quiet. This is where the silk weavers lived when they wanted to escape the dense streets.", im:"It's 1850. A master weaver walks these streets at dusk, and no one bothers him here. He is among equals.", t:"Métro C: Croix-Rousse. Walk uphill from the station to reach the plateau (15–20 mins). €0. The plateau is also home to the Tuesday–Thursday market (produce, flowers, second-hand goods). Saturday morning is liveliest.", c:["neighbourhoods","markets"], r:"g", nn:"Plateau de la Croix-Rousse", ns:"Au sommet du plateau, des rues plus larges et une échelle différente que la ville ci-dessous", nst:"Le plateau — au-dessus des rues escarpées du bas Croix-Rousse — a un sentiment entièrement différent. L'air est plus clair. Les bâtiments sont plus bas et plus espacés. La Place de la Croix-Rousse elle-même est une véritable place avec des terrasses de café face à elle. Les petites rues sont tranquilles. C'est là que vivaient les tisserands de soie quand ils voulaient échapper aux rues denses.", nt:"Métro C: Croix-Rousse. Marchez uphill depuis la station pour atteindre le plateau (15–20 mins). €0. Le plateau abrite également le marché mardi–jeudi (produits, fleurs, produits de seconde main). Samedi matin est le plus animé."},

{id:61, n:"Monts d'Or Hills", a:"Day trip", v:["beautiful","hidden"], d:35, s:"Low wine hills northwest of Lyon hide villages and a Michelin-starred restaurant", st:"The Monts d'Or are gentle hills — not Alps, not dramatic, but green and vineyard-covered. Three main villages cluster: Curis-au-Mont-d'Or, Collonges-au-Mont-d'Or (where the Bocuse family restaurant sits overlooking the Saône), Poleymieux-au-Mont-d'Or. Walking paths wind through vineyards. The view back toward Lyon is always present — the city below, the Fourvière basilica white against the sky.", im:"It's 1960. Paul Bocuse walks his family property, planning what he will build, not knowing it will become the world's most famous restaurant.", t:"Car from Lyon (20 mins by road) or bus #19 from the city centre (40 mins). €0 hiking. Restaurants range from €15 sandwiches to €150+ at Bocuse. Walk the vineyards in May or September; July/August are hot and crowded with tourists.", c:["nature","day_trips","food"], r:"g", nn:"Monts d'Or", ns:"Les collines basses des vignes au nord-ouest de Lyon cachent des villages et un restaurant étoilé", nst:"Les Monts d'Or sont des collines douces — pas les Alpes, pas dramatiques, mais vertes et couvertes de vignes. Trois villages principaux se regroupent: Curis-au-Mont-d'Or, Collonges-au-Mont-d'Or (où le restaurant de la famille Bocuse s'asseoit surplombant la Saône), Poleymieux-au-Mont-d'Or. Des chemins de randonnée serpentent à travers les vignobles. La vue vers Lyon est toujours présente — la ville ci-dessous, la basilique Fourvière blanche contre le ciel.", nt:"Voiture depuis Lyon (20 mins en route) ou bus #19 depuis le centre-ville (40 mins). €0 randonnée. Les restaurants varient de €15 sandwiches à €150+ chez Bocuse. Promenez-vous dans les vignobles en mai ou septembre; juillet/août sont chauds et bondés de touristes."},

{id:62, n:"Saint-Nizier Church", a:"Presqu'île", v:["history","beautiful","local"], d:6, s:"A Gothic church now a quiet prayer space and LGBTQ history marker", st:"Saint-Nizier is the city's most prominent Gothic church — pointed arches, stone vaults, light filtering through tall windows. Inside, the space is cool and often empty. The real history: in 1995, AIDS activists occupied the church for ten days in protest of government inaction. The occupation is now a plaque on the wall, a footnote, but the church still carries that weight.", im:"It's 1995. Young people fill the pews with banners, refusing to leave until the government promises action. The church, for once, is at the centre of history.", t:"2nd arrondissement, near Rue Mercière. €0. Open daily 10am–6pm (check for mass times). Métro A or B to nearby stations. Very peaceful on weekday mornings. The immediate area has bouchons, second-hand bookshops.", c:["history_big","neighbourhoods","free_culture"], r:"g", nn:"Église Saint-Nizier", ns:"Une église gothique maintenant un espace de prière tranquille et marqueur d'histoire LGBTQ+", nst:"Saint-Nizier est l'église gothique la plus visible de la ville — arches pointues, voûtes de pierre, lumière filtrant par les hautes fenêtres. À l'intérieur, l'espace est frais et souvent vide. La vraie histoire: en 1995, les militants du SIDA ont occupé l'église pendant dix jours en protestation contre l'inaction gouvernementale. L'occupation est maintenant une plaque au mur, une note en bas de page, mais l'église porte toujours ce poids.", nt:"2e arrondissement, près de Rue Mercière. €0. Ouvert quotidiennement 10h–18h (vérifiez les heures de messe). Métro A ou B aux stations à proximité. Très paisible les matins en semaine. La région immédiate a des bouchons, des bouquineries."},

{id:63, n:"Bibliothèque Part-Dieu", a:"Part-Dieu", v:["quiet","free entry","local"], d:15, s:"The library's reading rooms are free shelter, quiet, full of ordinary people studying", st:"The 1970s brutalist building doesn't announce itself as beautiful, but inside the reading rooms are calm. People sit at desks with books or laptops for hours. The light is institutional but adequate. The Wi-Fi is free. You can sit for the entire day and no one minds. It's not a tourist space — it's a working library.", im:"It's 1975. A student sits for the first time at a Part-Dieu desk and realizes a library can be a sanctuary, not just a building full of books.", t:"Métro B: Part-Dieu (opposite the train station). €0. WiFi free. Open 9am–9pm (varies by day). Bring your own work; don't expect to find tourist information. Quietest before 11am.", c:["free_culture"], r:"g", nn:"Bibliothèque Part-Dieu", ns:"Les salles de lecture de la bibliothèque sont un refuge gratuit, tranquille, plein de gens ordinaires qui étudient", nst:"Le bâtiment brutaliste des années 1970 ne se présente pas comme beau, mais à l'intérieur les salles de lecture sont calmes. Les gens s'assoient aux pupitres avec des livres ou des ordinateurs portables pendant des heures. La lumière est institutionnelle mais adéquate. Le Wi-Fi est gratuit. Vous pouvez vous asseoir toute la journée et personne ne s'en soucie. Ce n'est pas un espace touristique — c'est une bibliothèque de travail.", nt:"Métro B: Part-Dieu (face à la gare de train). €0. WiFi gratuit. Ouvert 9h–21h (varie selon le jour). Apportez votre propre travail; ne vous attendez pas à trouver d'informations touristiques. Le plus tranquille avant 11h."},

{id:64, n:"Hôtel-Dieu Courtyards", a:"Presqu'île", v:["history","beautiful","hidden"], d:10, s:"Eighteenth-century hospital courtyards reopened as luxury hotel and public galleries", st:"The Hôtel-Dieu complex sprawls around multiple courtyards — the architecture is that warm 18th-century institutional stone. The main courtyard is ringed by colonnaded galleries. A domed chapel sits at the centre. Some areas are accessible to visitors: the chapel, some of the galleries. It's a strange layering: the old hospital still visible, now serving champagne and designer shopping.", im:"It's 1780. The hospital is new and the stone is fresh. Doctors walk the galleries between patient wards, imagining they can contain suffering with good architecture.", t:"Métro A: Bellecour (Place Bellecour end). €0 for courtyards. The chapel requires checking current access (may have times). The shopping areas and restaurants are public. No entrance fee, but you're in a luxury space.", c:["history_big","neighbourhoods"], r:"g", nn:"Hôtel-Dieu Courtyards", ns:"Les cours de l'hôpital du 18e siècle rouvrent comme hôtel de luxe et galeries publiques", nst:"Le complexe Hôtel-Dieu s'étend autour de plusieurs cours — l'architecture est cette pierre institutionnelle chaude du 18e siècle. La cour principale est entourée de galeries à colonnades. Une chapelle avec dôme s'asseoit au centre. Certaines zones sont accessibles aux visiteurs: la chapelle, certaines des galeries. C'est un étrange empilement: l'ancien hôpital toujours visible, servant maintenant du champagne et du shopping de designers.", nt:"Métro A: Bellecour (extrémité Place Bellecour). €0 pour les cours. La chapelle nécessite de vérifier l'accès actuel (peut avoir des horaires). Les zones commerciales et les restaurants sont publics. Pas de frais d'entrée, mais vous êtes dans un espace de luxe."},

{id:65, n:"Quai Romain Rolland at Dusk", a:"Vieux Lyon", v:["beautiful","quiet"], d:8, s:"Stone buildings and their exact reflections share the water at golden hour", st:"The west bank of the Saône, looking east toward the Renaissance buildings of Vieux Lyon. At dusk, the light turns gold and the water becomes a mirror. The buildings — four and five storeys, Renaissance windows, stone facades worn by 500 years — reflect so precisely that the water reads as solid. It's the photograph every visitor wants, but the moment itself is less crowded than the image.", im:"It's 1550. A silk merchant stands on this quay and watches the light turn the water to gold, as it does every evening in his life.", t:"Vieux Lyon, east bank of Saône. €0. Walk along the quay around 6–7pm depending on season (golden hour shifts). Restaurants open onto the quay — book ahead if eating. Best light May–September. Photography is tempting but the reality is more beautiful than the image.", c:["romantic_water","neighbourhoods"], r:"g", nn:"Quai Romain Rolland au Crépuscule", ns:"Les bâtiments de pierre et leurs reflets exacts partagent l'eau à l'heure dorée", nst:"La rive ouest de la Saône, regardant vers l'est les bâtiments de la Renaissance de Vieux Lyon. Au crépuscule, la lumière tourne à l'or et l'eau devient un miroir. Les bâtiments — quatre et cinq étages, fenêtres de la Renaissance, façades de pierre usées par 500 ans — reflètent si précisément que l'eau se lit comme solide. C'est la photographie que chaque visiteur veut, mais le moment lui-même est moins bondé que l'image.", nt:"Vieux Lyon, rive est de la Saône. €0. Promenez-vous le long du quai environ 18–19h selon la saison (l'heure dorée décale). Les restaurants s'ouvrent sur le quai — réservez en ligne si vous mangez. Meilleure lumière mai–septembre. La photographie est tentante mais la réalité est plus belle que l'image."},

{id:66, n:"Montée de la Grande-Côte", a:"Croix-Rousse", v:["history","beautiful","hidden"], d:12, s:"A steep staircase street that cloth workers climbed for two centuries", st:"The staircase runs steeply from the 1st arrondissement up toward Croix-Rousse. It's narrow — only pedestrian, no cars. As you climb, the view shifts: first the Presqu'île below, then at midway, both rivers. Stone buildings press close on both sides. This is not a tourist path — it's a shortcut that locals use. You pass residents walking down with shopping bags.", im:"It's 1800. A silk worker climbs this same staircase at dawn to reach the atelier, and will climb it 3,000 times in his working life.", t:"Between 1st and 4th arrondissements. €0. Steep — takes 15 minutes uphill even for the fit. The staircase is very narrow; let people pass. At the top, you're near Croix-Rousse plateau. Bring water; no cafés on the climb.", c:["history_big","neighbourhoods"], r:"g", nn:"Montée de la Grande-Côte", ns:"Une rue-escalier escarpée que les ouvriers du textile ont montée pendant deux siècles", nst:"L'escalier monte très steeply du 1er arrondissement jusqu'à vers Croix-Rousse. C'est étroit — piétonnier uniquement, pas de voitures. Alors que vous montez, la vue se décale: d'abord le Presqu'île ci-dessous, puis à mi-chemin, les deux fleuves. Les bâtiments de pierre se serrent près des deux côtés. Ce n'est pas un chemin touristique — c'est un raccourci que les habitants utilisent. Vous passez des résidents descendant avec des sacs de courses.", nt:"Entre 1er et 4e arrondissements. €0. Raide — prend 15 minutes uphill même pour les en forme. L'escalier est très étroit; laissez les gens passer. Au sommet, vous êtes près du plateau de Croix-Rousse. Apportez de l'eau; pas de cafés sur la montée."},

{id:67, n:"Musée Miniature et Cinéma", a:"Vieux Lyon", v:["weird","beautiful","hidden"], d:10, s:"Handcrafted dioramas at 1:12 scale, rooms and objects exact and obsessive", st:"The museum is small — two stories of rooms — and densely packed with miniature scenes. Eighteenth-century kitchens with working stoves and tiny pots. Bedrooms with furniture, paintings, books you can almost read. A 19th-century apothecary with bottles labelled in infinitesimal script. The obsession of the craftspeople is visible in every detail. Some visitors rush; others stand transfixed for hours.", im:"It's 1950. A master miniaturist spends three months carving a single wooden spoon at full size, then shrinks it to 1:12 scale, and the spoon looks exactly right.", t:"Rue Saint-Jean, Vieux Lyon, 5th. €12. Open 10am–6pm daily (closed Monday–Tuesday). Allow 1.5–2 hours. Photography allowed in some areas, not others (ask). Métro F to Vieux Lyon.", c:["weird","nerd"], r:"g", nn:"Musée Miniature et Cinéma", ns:"Des dioramas faits à la main à l'échelle 1:12, des pièces et des objets exacts et obsessionnels", nst:"Le musée est petit — deux étages de pièces — et densément emballé de scènes miniatures. Cuisines du 18e siècle avec cuisinières fonctionnelles et petits pots. Chambres à coucher avec meubles, peintures, livres que vous pouvez presque lire. Une pharmacie du 19e siècle avec des bouteilles étiquetées en script infinitésimal. L'obsession des artisans est visible dans chaque détail. Certains visiteurs se précipitent; d'autres se tiennent transfixés pendant des heures.", nt:"Rue Saint-Jean, Vieux Lyon, 5e. €12. Ouvert 10h–18h quotidiennement (fermé lundi–mardi). Permettez 1.5–2 heures. La photographie est autorisée dans certaines zones, pas d'autres (demandez). Métro F jusqu'à Vieux Lyon."},

{id:68, n:"Guignol Puppet Theatre", a:"Croix-Rousse", v:["local","weird","history"], d:12, s:"Lyon's most traditional puppet speaks back to authority in dirty jokes", st:"Guignol is a local puppet character — created here in 1808 by a silk worker named Laurent Mourguet. The puppet shows happen in a small 150-seat theatre. Guignol talks back to anyone: police, mayors, tourists. He makes dirty jokes that somehow land as appropriate for the children who fill the theatre. The shows are in French (fast dialect French), but the physical comedy is universal.", im:"It's 1810. Laurent Mourguet pulls a puppet head onto his hand for the first time, and the voice that comes out is angry, irreverent, and exactly what Lyon's workers need to hear.", t:"Rue Louis Carrand, 4th arrondissement. Tickets €10–15. Shows multiple times daily (check schedule). Métro C: Croix-Rousse area. The theatre is small and fills quickly on weekends. Arrive 20 minutes early. The experience is entirely in French but very physical.", c:["weird","history_big"], r:"g", nn:"Théâtre le Guignol de Lyon", ns:"Le plus traditionnel des marionnettes de Lyon parle à l'autorité avec des blagues sales", nst:"Guignol est un personnage de marionnette locale — créé ici en 1808 par un ouvrier de la soie nommé Laurent Mourguet. Les spectacles de marionnettes se déroulent dans un petit théâtre de 150 places. Guignol parle à tous: police, maires, touristes. Il raconte des blagues sales qui atterrissent d'une manière ou d'une autre comme appropriées pour les enfants qui remplissent le théâtre. Les spectacles sont en français (dialecte français rapide), mais la comédie physique est universelle.", nt:"Rue Louis Carrand, 4e arrondissement. Billets €10–15. Spectacles plusieurs fois par jour (vérifiez l'horaire). Métro C: région Croix-Rousse. Le théâtre est petit et se remplit rapidement les fins de semaine. Arrivez 20 minutes tôt. L'expérience est entièrement en français mais très physique."},

{id:69, n:"Le Sucre Rooftop Venue", a:"Confluence", v:["weird","beautiful","famous"], d:20, s:"Electronic music on a sugar refinery rooftop over the river confluence", st:"La Sucrière is a former sugar refinery — brutalist concrete, five stories high. Le Sucre occupies the rooftop. The view is of the Confluence point where the rivers meet, the city beyond, the Monts d'Or to the north. DJ sets and live electronic acts happen here spring through autumn. The space is industrial, the music is serious, and the view is extraordinary.", im:"It's 1970. The refinery is still operating, and no one imagines a nightclub will someday sit on its roof under the stars.", t:"Tram T1: Musée des Confluences. €10–20 entry. Open spring–autumn (closed November–March, check calendar). Arrive 11pm minimum. Food and drink expensive. No entry under 18 (ID required). Bring light coat; wind on the roof is strong.", c:["weird"], r:"g", nn:"Le Sucre", ns:"Musique électronique sur un toit de raffinerie de sucre sur la confluence fluviale", nst:"La Sucrière est une ancienne raffinerie de sucre — béton brutaliste, cinq étages de hauteur. Le Sucre occupe le toit. La vue est du point de Confluence où les rivières se rencontrent, la ville au-delà, les Monts d'Or au nord. Les ensembles DJ et les actes de musique électronique en direct se déroulent ici du printemps jusqu'à l'automne. L'espace est industriel, la musique est sérieuse, et la vue est extraordinaire.", nt:"Tram T1: Musée des Confluences. €10–20 d'entrée. Ouvert printemps–automne (fermé novembre–mars, vérifiez le calendrier). Arrivez 23h minimum. Nourriture et boisson chers. Pas d'entrée de moins de 18 ans (ID requis). Apportez un léger manteau; le vent sur le toit est fort."},

{id:70, n:"Le Périscope Jazz Venue", a:"Presqu'île", v:["weird","hidden","quiet"], d:8, s:"A 150-seat underground jazz club where programming is serious, space uncomfortable", st:"Le Périscope is entered via a narrow staircase going down. The room is small — probably never meant as a music venue — with pillars, pipes, exposed concrete. Seating is tight and uncomfortable. The bar is cheap. The music programming is professional: jazz, experimental, improv, world music. The audience is mix of jazz nerds and locals; very few tourists. You leave having heard real music, and your neck hurts.", im:"It's 1990. The space opens and someone thinks: this is too small, too uncomfortable, too awkward. But the music will be good. And it is.", t:"Rue Neuve, 2nd arrondissement. €10–20 entry. Open Thu–Sat evenings. Métro A/B to central stations. No reservation; arrive before 10pm. The bar has beer and wine, overpriced. Go for the music, not the comfort.", c:["weird"], r:"g", nn:"Le Périscope", ns:"Un club de jazz souterrain de 150 places où la programmation est sérieuse, l'espace inconfortable", nst:"Le Périscope est entré via un escalier étroit descendant. La pièce est petite — probablement jamais pensée comme une salle de musique — avec des piliers, des tuyaux, du béton exposé. Les sièges sont serrés et inconfortables. Le bar est bon marché. La programmation musicale est professionnelle: jazz, expérimental, improvisation, musique du monde. Le public est un mélange de nerds du jazz et de locaux; très peu de touristes. Vous partez en ayant entendu de la vraie musique, et votre cou fait mal.", nt:"Rue Neuve, 2e arrondissement. €10–20 d'entrée. Ouvert jeu–sam soirées. Métro A/B aux gares centrales. Pas de réservation; arrivez avant 22h. Le bar a de la bière et du vin, surfacturé. Allez pour la musique, pas pour le confort."},

{id:71, n:"Frac Auvergne-Rhône-Alpes", a:"Guillotière", v:["weird","beautiful","hidden"], d:22, s:"Contemporary art foundation with rotating exhibitions less conservative than Beaux-Arts", st:"The FRAC building is modest from outside — industrial, not impressive. Inside, the galleries are clean and white. Exhibitions rotate every few months: paintings, sculpture, video, installation. The programming is less safe than the Musée des Beaux-Arts — sometimes you encounter interesting work, sometimes baffling work, always something being argued about.", im:"It's 1990. The foundation opens and someone says: we will show what other museums won't yet.", t:"Cours Gambetta, 7th arrondissement. €3–5 entry (sometimes free). Open Wed–Sun 11am–7pm (closed Mondays). Métro D: Jean Macé area. Check website for current exhibitions. Allow 1–1.5 hours.", c:["weird","free_culture"], r:"g", nn:"Frac Auvergne-Rhône-Alpes", ns:"Fondation d'art contemporain avec des expositions rotatives moins conservatrices que les Beaux-Arts", nst:"Le bâtiment FRAC est modeste de l'extérieur — industriel, pas impressionnant. À l'intérieur, les galeries sont propres et blanches. Les expositions tournent tous les quelques mois: peintures, sculptures, vidéo, installation. La programmation est moins sûre que le Musée des Beaux-Arts — parfois vous rencontrez un travail intéressant, parfois un travail déroutant, toujours quelque chose qui est débattu.", nt:"Cours Gambetta, 7e arrondissement. €3–5 d'entrée (parfois gratuit). Ouvert mer–dim 11h–19h (fermé lundi). Métro D: région Jean Macé. Vérifiez le site web pour les expositions actuelles. Permettez 1–1.5 heures."},

{id:72, n:"Les Subsistances Performance Space", a:"Île Barbe", v:["weird","beautiful","hidden"], d:28, s:"Former military warehouses now host experimental theatre, dance, circus acts", st:"Les Subsistances occupies a complex of low Napoleon III-era stone buildings that once provisioned the military. The spaces are now converted to performance venues. An old warehouse becomes a circus tent. A courtyard becomes a stage. The architecture and the experimental programming fit together strangely. You might see contemporary dance, or failed experimental opera, or circus training in progress.", im:"It's 1920. The military provisioning facility is efficient and orderly. No one imagines it will become a laboratory for failure and risk.", t:"Île Barbe, north of central Lyon (near Villeurbanne). Métro C: Cusset area, then walk. Or Tram T1/T4. Performance tickets €8–22. Check calendar (les-subsistances.com). The space itself is worth seeing even between shows. No consistent hours; go only for scheduled events.", c:["weird"], r:"g", nn:"Les Subsistances", ns:"Les anciens entrepôts militaires accueillent maintenant le théâtre expérimental, la danse, les actes de cirque", nst:"Les Subsistances occupent un complexe de bâtiments en pierre de l'époque de Napoléon III qui approvisionnaient autrefois l'armée. Les espaces sont maintenant convertis en salles de spectacle. Un vieil entrepôt devient une tente de cirque. Une cour devient une scène. L'architecture et la programmation expérimentale s'ajustent d'une manière étrange. Vous pourriez voir de la danse contemporaine, ou un opéra expérimental échoué, ou un entraînement de cirque en cours.", nt:"Île Barbe, au nord du centre-ville de Lyon (près de Villeurbanne). Métro C: région Cusset, puis marchez. Ou Tram T1/T4. Billets de spectacle €8–22. Vérifiez le calendrier (les-subsistances.com). L'espace lui-même vaut le coup d'être vu même entre les spectacles. Pas d'horaires constants; allez seulement pour les événements programmés."},

{id:73, n:"Patinoire de Charlet Ice Rink", a:"8th (Monplaisir)", v:["local","weird"], d:20, s:"Year-round indoor ice skating for wet afternoons and childhood nostalgia", st:"The ice rink is functional and unglamorous — a concrete structure in the 8th. The ice is real. Other skaters circle. The heating is inconsistent; sometimes the rink is comfortable, sometimes you skate in a cold fog. Skate hire is possible but the skates are worn. The experience is less about the elegance of skating and more about moving on ice, remembering or discovering your balance.", im:"It's 1985. A child skates for the first time and falls, and laughs, and the moment matters more than the skill.", t:"8th arrondissement. Métro D: Monplaisir area. €7 entry, €5 skate hire. Check hours online (seasonal variations). Busiest Wednesdays (school holidays) and weekends. Bring warm clothes; indoor rinks stay cool. Go on weekday mornings for fewer crowds.", c:["sport","weird"], r:"g", nn:"Patinoire de Charlet", ns:"La patinoire intérieure toute l'année pour les après-midi humides et la nostalgie de l'enfance", nst:"La patinoire est fonctionnelle et sans prétention — une structure en béton dans le 8e. La glace est réelle. Les autres patineurs tournent en cercle. Le chauffage est incohérent; parfois la patinoire est confortable, parfois vous patinez dans un brouillard froid. La location de patins est possible mais les patins sont usés. L'expérience concerne moins l'élégance du patinage et plus le mouvement sur la glace, se souvenir ou découvrir votre équilibre.", nt:"8e arrondissement. Métro D: région Monplaisir. €7 d'entrée, €5 location de patins. Vérifiez les heures en ligne (variations saisonnières). Les plus occupées mercredi (vacances scolaires) et fins de semaine. Apportez des vêtements chauds; les patinoires intérieures restent fraîches. Allez les matins de semaine pour moins de foules."},

{id:74, n:"Musée des Tissus (Silk Museum)", a:"Presqu'île", v:["history","beautiful","hidden"], d:8, s:"The world's most important textile collection: two thousand years of cloth", st:"The museum sits adjacent to Place des Terreaux — an unassuming building hiding the world's greatest collection of historic textiles. Byzantine silks from the 6th century. Lyonnais designs from the canuts, each piece annotated with when it was woven and by which merchant. 18th-century brocades so intricate you see the weaver's hand. The collection runs from pre-Roman times to present. Few visitors — the room is often quiet.", im:"It's 1870. A weaver's widow donates her late husband's collection, and the city realizes it has been sitting on treasure.", t:"Place des Terreaux, adjacent to the main Museum. €10. Open 10am–5:30pm, closed Mondays. Allow 1.5–2 hours. The museum is scholarly — reading the labels gives deep context. Métro A/B to Terreaux.", c:["history_big"], r:"g", nn:"Musée des Tissus", ns:"La collection textile la plus importante du monde: deux mille ans de tissu", nst:"Le musée s'asseoit adjacent à Place des Terreaux — un bâtiment discret cachant la plus grande collection de textiles historiques du monde. Soies byzantines du 6e siècle. Designs lyonnais des canuts, chaque pièce annotée avec quand elle a été tissée et par quel marchand. Brocarts du 18e siècle si complexes que vous voyez la main du tisserand. La collection s'exécute des temps pré-romains au présent. Peu de visiteurs — la pièce est souvent tranquille.", nt:"Place des Terreaux, adjacent au Museum principal. €10. Ouvert 10h–17h30, fermé lundi. Permettez 1.5–2 heures. Le musée est savant — lire les étiquettes donne un contexte approfondi. Métro A/B jusqu'à Terreaux."},

{id:75, n:"Piscine du Rhône Outdoor Pool", a:"Presqu'île", v:["beautiful","free entry","local"], d:10, s:"Summer swimming pool so close to the Rhône it seems to float on the river", st:"The Piscine du Rhône is an outdoor pool — 50 metres long — that sits so close to the river's edge that swimmers feel the Rhône's presence. The pool water is clean and chlorinated. The river water is brown and fast. On summer afternoons, the pool fills with families and lap swimmers. The light reflects off both waters. The experience is strange: swimming inside the city while the river speeds past.", im:"It's 1950. A swimmer does a lap and glances at the river moving parallel, and feels very much alive.", t:"Presqu'île, 2nd. €7 entry (free with Lyon sports card, available to residents). Open May–September (dates vary). Busiest 2–7pm. Métro A/B to central stations. Bring towel; rental not available. The pool closes if the Rhône level is dangerously high.", c:["swimming","free_culture"], r:"g", nn:"Piscine du Rhône", ns:"La piscine extérieure d'été si près du Rhône qu'elle semble flotter sur le fleuve", nst:"La Piscine du Rhône est une piscine extérieure — 50 mètres de long — qui s'asseoit si près du bord du fleuve que les nageurs ressentent la présence du Rhône. L'eau de la piscine est propre et chlorée. L'eau du fleuve est brune et rapide. Les après-midi d'été, la piscine se remplit de familles et de nageurs qui font des longueurs. La lumière se reflète sur les deux eaux. L'expérience est étrange: nager à l'intérieur de la ville tandis que le fleuve se précipite.", nt:"Presqu'île, 2e. €7 d'entrée (gratuit avec la carte de sport de Lyon, disponible pour les résidents). Ouvert mai–septembre (les dates varient). La plus occupée 14–19h. Métro A/B aux gares centrales. Apportez une serviette; la location n'est pas disponible. La piscine ferme si le niveau du Rhône est dangereusement élevé."},

{id:76, n:"Stade de Gerland Stadium", a:"8th (Monplaisir)", v:["history","weird","local"], d:25, s:"1913 municipal stadium designed by architect Tony Garnier before stadia were concepts", st:"Stade de Gerland is no longer the main Olympic Lyonnais stadium (Parc OL is newer), but it still functions. The building is remarkable: designed by Tony Garnier in 1913 as the world's first municipally-owned stadium. The architecture reflects Garnier's utopian city ideas — every line intentional, the form ideological. It's a working stadium in disrepair, which makes it more honest than newer places.", im:"It's 1913. Tony Garnier stands in the completed stadium and imagines it as the model for a whole city — Le Cité Industrielle — where every building serves a purpose and reflects a philosophy.", t:"Gerland, 8th arrondissement. Free to observe exterior. Match tickets available (€15–50). Métro D: Passe or Tram T2: Stade de Gerland. The stadium is not a major tourist spot; matches are infrequent. Even if you don't attend a match, the architecture is worth seeing.", c:["history_big","sport","weird"], r:"g", nn:"Stade de Gerland", ns:"Le stade municipal de 1913 conçu par l'architecte Tony Garnier avant que les stades ne soient des concepts", nst:"Le Stade de Gerland n'est plus le stade principal d'Olympique Lyonnais (Parc OL est plus récent), mais il fonctionne toujours. Le bâtiment est remarquable: conçu par Tony Garnier en 1913 en tant que premier stade appartenant à une municipalité au monde. L'architecture reflète les idées de la ville utopique de Garnier — chaque ligne intentionnelle, la forme idéologique. C'est un stade de travail en état de délabrement, ce qui le rend plus honnête que les endroits plus récents.", nt:"Gerland, 8e arrondissement. Gratuit pour observer l'extérieur. Les billets de match sont disponibles (€15–50). Métro D: Passe ou Tram T2: Stade de Gerland. Le stade n'est pas un endroit touristique majeur; les matchs sont peu fréquents. Même si vous n'assistez pas à un match, l'architecture vaut le coup d'être vu."},

{id:77, n:"Croix-Rousse Silk Ateliers", a:"Croix-Rousse", v:["history","local","hidden"], d:15, s:"Working silk looms still producing cloth for Versailles and haute couture houses", st:"Some of Lyon's historic silk-weaving ateliers still exist and operate. The Jacquard looms are still used — the sound of weaving fills entire buildings. Modern work: fabrics for Versailles restoration, Élysée Palace, designer ateliers, museum restoration. The weavers are mostly older men who learned the trade generations ago. The rhythmic clack of the looms is hypnotic. You visit by appointment, which means you're a guest, not a tourist.", im:"It's 1960. An apprentice watches a master weaver work, learning the movement his hands will repeat 10,000 times — the same movement his father made, and his father's father.", t:"Croix-Rousse, 4th. Access by appointment only (contact through tourist office or individual atelier websites). €0–15 depending on atelier. Allow 30–60 mins. The ateliers are functional spaces, not museums. Go early morning to catch active weaving. Métro C: Croix-Rousse.", c:["history_big"], r:"g", nn:"Ateliers de soie Croix-Rousse", ns:"Les métiers à soie en fonctionnement produisent toujours du tissu pour Versailles et les maisons de haute couture", nst:"Certains des ateliers de tissage de soie historiques de Lyon existent et fonctionnent toujours. Les métiers Jacquard sont toujours utilisés — le son du tissage remplit des bâtiments entiers. Travail moderne: tissus pour la restauration de Versailles, Palais de l'Élysée, ateliers de designers, restauration de musées. Les tisserands sont surtout des hommes plus âgés qui ont appris le métier des générations auparavant. Le claquement rythmique des métiers est hypnotique. Vous visitez sur rendez-vous, ce qui signifie que vous êtes un invité, pas un touriste.", nt:"Croix-Rousse, 4e. Accès sur rendez-vous uniquement (contactez par l'office de tourisme ou les sites web des ateliers individuels). €0–15 selon l'atelier. Permettez 30–60 mins. Les ateliers sont des espaces fonctionnels, pas des musées. Allez tôt le matin pour attraper un tissage actif. Métro C: Croix-Rousse."},

{id:78, n:"Musée d'Art Contemporain (MAC)", a:"Cité Internationale", v:["weird","beautiful","famous"], d:15, s:"Renzo Piano building hosting rotating contemporary shows on the park edge", st:"The building itself is striking — Renzo Piano architecture, white, modern, precise. The views from inside are of the park. The galleries are clean and white. Exhibitions rotate every few months: painting, sculpture, video, installation, performance. The programming is international: sometimes brilliant, sometimes baffling, always worth seeing. Few tourists discover this; many visitors know only the Musée des Beaux-Arts.", im:"It's 1995. Renzo Piano's building opens and the city realizes it has a contemporary space equal to any in France.", t:"Cité Internationale, edge of Parc de la Tête d'Or. €8, free first Sunday of each month. Open 10am–6pm (varies). Closed Mondays. Tram T1: Musée des Confluences then walk, or Métro A: Masséna. Allow 1.5–2 hours. The park is immediately adjacent — good for an afternoon walk.", c:["weird"], r:"g", nn:"Musée d'Art Contemporain", ns:"Le bâtiment Renzo Piano accueillant les expositions contemporaines rotatives au bord du parc", nst:"Le bâtiment lui-même est frappant — architecture Renzo Piano, blanc, moderne, précis. Les vues de l'intérieur sont du parc. Les galeries sont propres et blanches. Les expositions tournent tous les quelques mois: peinture, sculpture, vidéo, installation, performance. La programmation est internationale: parfois brillante, parfois déconcertante, toujours digne d'être vue. Peu de touristes découvrent ceci; beaucoup de visiteurs ne connaissent que le Musée des Beaux-Arts.", nt:"Cité Internationale, bord du Parc de la Tête d'Or. €8, gratuit premier dimanche de chaque mois. Ouvert 10h–18h (varie). Fermé lundi. Tram T1: Musée des Confluences puis marchez, ou Métro A: Masséna. Permettez 1.5–2 heures. Le parc est immédiatement adjacent — bon pour une promenade l'après-midi."},

{id:79, n:"Planétarium de Vaulx-en-Velin", a:"Day trip", v:["weird","free entry"], d:35, s:"Cheap astronomy shows in a low-tech planetarium for rainy afternoon refuge", st:"The planetarium is a modest building in an ordinary suburb. The dome is small. The shows are in French but follow a clear narrative: the solar system, the galaxy, deep space. The star projector is older technology — the stars aren't photorealistic, but they're accurate. Children and adults sit in the dark dome, looking up. It's peaceful and accessible. Definitely not a major cultural attraction, but a good escape from weather.", im:"It's 1990. A child watches stars appear in the dome and feels the universe suddenly fit inside the building.", t:"Tram T3 to Vaulx-en-Velin La Soie, then local bus (20 mins total from centre). €6 per person. Multiple shows daily (check schedule online). Allow 1 hour. The neighbourhood is ordinary; the planetarium is the only reason to visit Vaulx-en-Velin.", c:["weird","free_culture","nerd"], r:"g", nn:"Planétarium de Vaulx-en-Velin", ns:"Des spectacles d'astronomie bon marché dans un planétarium basse technologie pour un refuge l'après-midi pluvieux", nst:"Le planétarium est un bâtiment modeste dans une banlieue ordinaire. Le dôme est petit. Les spectacles sont en français mais suivent une narration claire: le système solaire, la galaxie, l'espace profond. Le projecteur d'étoiles est une technologie plus ancienne — les étoiles ne sont pas réalistes sur le plan photographique, mais elles sont précises. Les enfants et les adultes s'assoient dans le dôme sombre, regardant vers le haut. C'est paisible et accessible. Définitivement pas une attraction culturelle majeure, mais une bonne évasion de la météo.", nt:"Tram T3 jusqu'à Vaulx-en-Velin La Soie, puis bus local (20 mins au total du centre). €6 par personne. Plusieurs spectacles quotidiens (vérifiez l'horaire en ligne). Permettez 1 heure. Le quartier est ordinaire; le planétarium est la seule raison de visiter Vaulx-en-Velin."},

{id:80, n:"Manufacture des Tabacs", a:"8th (Monplaisir)", v:["history","beautiful","hidden"], d:22, s:"A 1910s cigarette factory repurposed as university campus and cultural spaces", st:"The Manufacture des Tabacs is a complex of buildings from the 1910s — industrial architecture, red brick and stone. Built to manufacture cigarettes for France. Converted decades later into university campus buildings and public cultural spaces. Walk through the courtyards. The scale is large; the details are intact. You can move through freely without paying. The building whispers its industrial past even as students walk to lectures.", im:"It's 1920. A woman works in the factory, rolling cigarettes, 12 hours a day, in a building designed to seem important by its sheer size.", t:"8th arrondissement. €0. Publicly accessible courtyards and passages. Tram T2 or T7: Manufacture stop. Check website for scheduled cultural events (sometimes open to public). Walk it any time — the building is open during business hours. Allow 30–45 minutes.", c:["history_big"], r:"g", nn:"Manufacture des Tabacs", ns:"Une usine de cigarettes des années 1910 réaffectée comme campus universitaire et espaces culturels", nst:"La Manufacture des Tabacs est un complexe de bâtiments des années 1910 — architecture industrielle, brique rouge et pierre. Construit pour fabriquer des cigarettes pour la France. Converti des décennies plus tard en bâtiments de campus universitaire et espaces culturels publics. Promenez-vous dans les cours. L'échelle est grande; les détails sont intacts. Vous pouvez vous déplacer librement sans payer. Le bâtiment chuchote son passé industriel même lorsque les étudiants se rendent aux cours.", nt:"8e arrondissement. €0. Cours et passages accessibles au public. Tram T2 ou T7: arrêt Manufacture. Vérifiez le site web pour les événements culturels programmés (parfois ouverts au public). Promenez-vous n'importe quand — le bâtiment est ouvert pendant les heures d'affaires. Permettez 30–45 minutes."},

{id:81, n:"INSA Lyon Campus & Culture", a:"Day trip", v:["hidden","weird","local"], d:25, s:"Grande école campus hosting experimental theatre and student gallery programming", st:"INSA Lyon is a prestigious engineering school — the campus is large and green. Among the buildings are spaces dedicated to student culture: a theatre venue, galleries, rehearsal spaces. Student-produced work: theatre, dance, experimental performance. The quality varies (it's student work), but the access is open. Walk through campus as if you belong. The culture programme is real and taken seriously by the institution.", im:"It's 1970. Engineering students discover that ideas live in buildings as much as in calculations, and they build a stage.", t:"Métro D: La Doua–Gaston Berger. Campus accessible (walk around freely). Check INSA website for scheduled cultural events. €5–15 entry for performances. The campus has a cafeteria and library. Very different from central Lyon — campus feels separate, its own world.", c:["weird"], r:"g", nn:"Campus INSA Lyon", ns:"Campus de grande école accueillant la programmation théâtrale et galerie expérimentales étudiantes", nst:"L'INSA Lyon est une école d'ingénieurs prestigieuse — le campus est grand et vert. Parmi les bâtiments se trouvent des espaces dédiés à la culture étudiante: une salle de théâtre, des galeries, des espaces de répétition. Travail produit par les étudiants: théâtre, danse, performance expérimentale. La qualité varie (c'est le travail d'étudiant), mais l'accès est ouvert. Promenez-vous dans le campus comme si vous y apparteniez. Le programme de culture est réel et pris au sérieux par l'institution.", nt:"Métro D: La Doua–Gaston Berger. Campus accessible (promenez-vous librement). Vérifiez le site web d'INSA pour les événements culturels programmés. €5–15 d'entrée pour les performances. Le campus a une cafétéria et une bibliothèque. Très différent du centre-ville de Lyon — le campus se sent séparé, son propre monde."},

{id:82, n:"Musée des Beaux-Arts reading room", a:"Presqu'île", v:["quiet","weird","beautiful"], d:3, s:"Museum library reading room accessible, quiet, beautiful, almost no one uses", st:"Not the galleries but the library and reading room inside the Musée des Beaux-Arts. Accessible with museum ticket. The space is quiet and has walls lined with books and light from windows. The fact that almost nobody uses it is remarkable. You can sit and read and the sound is of pages turning and pencils on paper. The quality of the space is extraordinary. The effect is of having found something secret inside something public.", im:"It's 1950. A scholar is sitting in this room and reading and the light is perfect and they've been coming here every afternoon for 30 years and the city outside doesn't know this place exists.", t:"Musée des Beaux-Arts, Place des Terreaux. €8 (museum ticket). Access during museum hours (Wed–Sun 10am–6pm). Métro A: Bellecour. Quietest late afternoons.", c:["nerd","free_culture"], r:"g", nn:"Salle de lecture Musée des Beaux-Arts", ns:"Bibliothèque musée salle de lecture accessible, calme, belle, presque personne n'utilise", nst:"Pas les galeries mais la bibliothèque et salle de lecture à l'intérieur du Musée des Beaux-Arts. Accessible avec ticket musée. L'espace est calme et a murs bordés de livres et lumière des fenêtres. Le fait que presque personne ne l'utilise est remarquable.", nt:"Musée des Beaux-Arts, Place des Terreaux. €8 (ticket musée). Accès pendant heures musée (mer–dim 10h–18h)."},

{id:83, n:"Les Berges du Rhône north section", a:"Rhône", v:["beautiful","local"], d:15, s:"Voie Verte north takes you to where the river swims itself", st:"The path north from the Tête d'Or continues up the Rhône into the Monts d'Or foothills. The landscape becomes more rural. The river has actual swimming spots where locals know. Bike 12km north on the Voie Verte and the city feeling disappears. The light is different away from the city.", im:"It's 1900. A farmer is swimming in the river here and they've been doing it every summer for 50 years and they know the exact depth and temperature.", t:"Voie Verte north from Tête d'Or. Vélo'v bike 12km (45 mins). Swimming spots unmarked but locals know. Summer only. FREE. Bring swimsuit.", c:["swimming","nature","parks"], r:"g", nn:"Berges du Rhône section nord", ns:"La Voie Verte nord vous mène là où le fleuve nage lui-même", nst:"Le chemin nord depuis Tête d'Or continue vers le Rhône dans les pieds des Monts d'Or. Le paysage devient plus rural. Le fleuve a des vrais endroits de baignade.", nt:"Voie Verte nord depuis Tête d'Or. Vélo'v 12km (45 mins). Baignade non marquée mais locaux connaissent. Été uniquement. GRATUIT."},

{id:84, n:"Fontaines de la Part-Dieu", a:"Part-Dieu", v:["weird","local"], d:10, s:"Shopping centre fountain where children wade in absurd delight", st:"The fountain in front of the Part-Dieu shopping centre is unusual — not beautiful in a classical sense but absurd and delightful. Children wade in summer. Adults sit on the edge and eat lunch. The water feature is integrated into the urban planning in a way that works. The light reflects on the water and makes moving patterns.", im:"It's 1975. The fountain is new and people are discovering that a shopping centre can have water and it feels revolutionary and kind.", t:"Part-Dieu shopping centre forecourt. Métro B: Part-Dieu. FREE. Summer (June–September) best for wading. Bring lunch and sit on the edge.", c:["weird","free_culture"], r:"g", nn:"Fontaines de la Part-Dieu", ns:"La fontaine du centre commercial où les enfants pataugent dans une joie absurde", nst:"La fontaine devant le centre commercial Part-Dieu est inhabituelle. Les enfants pataugent en été. Les adultes s'assoient sur le bord et mangent. La fontaine est intégrée d'une façon qui marche.", nt:"Centre commercial Part-Dieu. Métro B: Part-Dieu. GRATUIT. Été meilleur pour patauger."},

{id:85, n:"Lyon's covered passages", a:"Presqu'île", v:["weird","hidden","beautiful"], d:5, s:"19th-century passages couverts: ironwork, melancholy, almost nobody left", st:"The Presqu'île has several covered shopping passages from the 19th century. Passage de l'Argue, Passage Thiaffait — mostly forgotten, slightly melancholy, beautiful ironwork. The light is controlled and warm. The shops have changed but the structure remains. Very few tourists know they exist. You can walk the length in 10 minutes but the effect is of stepping backward in time.", im:"It's 1890. These passages are thriving and people are shopping and the glass roof is new technology and the passages feel like the future of shopping.", t:"Presqu'île: Passage de l'Argue, Passage Thiaffait. Métro A: Bellecour. FREE to walk through. Open during shop hours. Best 10am–3pm for light.", c:["weird","neighbourhoods"], r:"g", nn:"Passages couverts de Lyon", ns:"Les passages couverts du 19e siècle: ferronnerie, mélancolie, presque personne", nst:"La Presqu'île a plusieurs passages couverts 19e siècle. Passage de l'Argue, Passage Thiaffait — surtout oubliés, légèrement mélancoliques, belle ferronnerie. La lumière est contrôlée et chaude.", nt:"Presqu'île: Passage de l'Argue, Passage Thiaffait. Métro A: Bellecour. GRATUIT. Ouvert pendant heures magasins."}
];;

{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:`url(\'${TBGS[tab]||TBGS.default}\') center/cover no-repeat`}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Lyon Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3"><TransportCard />{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Lyon Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
