tes. Au-dessus de vous, dans la roche, se trouvent les Ar\u00eates de Poisson \u2014 les tunnels myst\u00e9rieux que personne ne peut expliquer.",nt:"Entr\u00e9es des deux c\u00f4t\u00e9s de la colline \u2014 rue du Sergent Blandan (Sa\u00f4ne) ou boulevard des Canuts (Rh\u00f4ne). Ouvert 6h\u201322h. Gratuit. ~12 min \u00e0 pied."},
{id:77,n:"Aqueduc romain de Chaponost",a:"Beyond Lyon",v:["history","hidden","quiet","free entry"],d:30,s:"Thirty arches of a Roman aqueduct still standing in a field south of Lyon \u2014 part of the longest aqueduct system in the Roman Empire.",st:"The Romans built four aqueducts to supply Lugdunum with water. The longest \u2014 the Aqueduct of the Gier \u2014 ran 86 kilometres from the Pilat mountains to the Fourvi\u00e8re hill. At Chaponost, 10 kilometres southwest of Lyon, thirty arches of the aqueduct still stand in an open field, two storeys high, made of the same ochre stone as the rest of Roman Lyon.\n\nThe site is completely unattended. No ticket booth, no information panel worth reading, no fence. You walk through a suburban neighbourhood, turn a corner, and there they are \u2014 Roman arches in a meadow, cows sometimes grazing between them. The scale of what the Romans built to get water uphill to their city only becomes real when you see the infrastructure they left behind.",im:"Thirty stone arches in a meadow, two thousand years old, no fence, no ticket booth, a cow standing between the pillars as if this is perfectly normal.",t:"Chaponost, ~10km southwest of Lyon. Bus 11 from Oullins (M\u00e9tro B terminus) to Chaponost, then 10-minute walk. Free, always open. The arches are on Rue des Aqueducs \u2014 visible from the road.",c:["history_big","day_trips"],r:"g",nn:"Aqueduc romain de Chaponost",ns:"Trente arches d\'un aqueduc romain toujours debout dans un champ au sud de Lyon \u2014 partie du plus long syst\u00e8me d\'aqueducs de l\'Empire romain.",nst:"Les Romains ont construit quatre aqueducs pour alimenter Lugdunum en eau. Le plus long \u2014 l\'aqueduc du Gier \u2014 faisait 86 kilom\u00e8tres. \u00c0 Chaponost, 10 km au sud-ouest de Lyon, trente arches tiennent encore dans un champ ouvert.\n\nLe site est totalement libre d\'acc\u00e8s. Pas de billetterie, pas de barri\u00e8re. Vous tournez un coin de rue banlieusard et elles sont l\u00e0 \u2014 des arches romaines dans un pr\u00e9.",nt:"Chaponost, ~10 km au sud-ouest. Bus 11 depuis Oullins (terminus M\u00e9tro B). Gratuit, toujours ouvert. Arches visibles depuis la rue des Aqueducs."},
{id:78,n:"Halle Tony Garnier",a:"Confluence",v:["history","hidden","beautiful"],d:20,s:"The largest concert and event hall in Lyon, built in 1914 as a cattle market and slaughterhouse \u2014 now decorated with murals by Cit\u00e9 de la Cr\u00e9ation visible from outside.",st:"Tony Garnier was Lyon\'s most visionary architect \u2014 a utopian who designed an imaginary \u2018Cit\u00e9 Industrielle\u2019 before World War I and then got to build parts of it for real. The Halle that bears his name was built in 1914 as a cattle market and slaughterhouse, with a vast steel-and-glass structure that was revolutionary for its time.\n\nThe exterior walls are decorated with monumental murals by Cit\u00e9 de la Cr\u00e9ation \u2014 painted scenes from Garnier\'s utopian city designs and from Lyon\'s industrial history. These murals are visible from the street and the tramway, free to admire. Inside, the Halle hosts concerts, exhibitions, and events \u2014 the space is cathedral-like.\n\nThe surrounding Cit\u00e9 Tony Garnier \u2014 a 1920s social housing development also designed by Garnier \u2014 has 25 additional murals on its buildings, making the entire neighbourhood an open-air gallery.",im:"A steel-and-glass hall the size of a cathedral, painted murals on its flanks depicting a utopian city that was imagined a century ago and partially built.",t:"Tram T1, Halle Tony Garnier. The exterior murals are free and always visible. The Cit\u00e9 Tony Garnier murals are a 10-minute walk south. For events inside, check halletonygarnier.com.",c:["free_culture","history_big"],r:"g",nn:"Halle Tony Garnier",ns:"La plus grande salle de concerts de Lyon, construite en 1914 comme march\u00e9 aux bestiaux \u2014 d\u00e9cor\u00e9e de fresques de la Cit\u00e9 de la Cr\u00e9ation visibles de l\'ext\u00e9rieur.",nst:"Tony Garnier \u00e9tait l\'architecte le plus visionnaire de Lyon. La Halle qui porte son nom a \u00e9t\u00e9 construite en 1914 comme march\u00e9 aux bestiaux, avec une structure d\'acier et de verre r\u00e9volutionnaire.\n\nLes murs ext\u00e9rieurs sont d\u00e9cor\u00e9s de fresques monumentales de la Cit\u00e9 de la Cr\u00e9ation. La Cit\u00e9 Tony Garnier voisine \u2014 des logements sociaux des ann\u00e9es 1920 \u2014 a 25 fresques suppl\u00e9mentaires.",nt:"Tram T1 Halle Tony Garnier. Fresques ext\u00e9rieures gratuites et visibles en permanence. Cit\u00e9 Tony Garnier \u00e0 10 min au sud. \u00c9v\u00e9nements : halletonygarnier.com."},
{id:79,n:"Pont de la Guilloti\u00e8re",a:"Guilloti\u00e8re",v:["history","free entry"],d:10,s:"The oldest river crossing in Lyon \u2014 a bridge on this spot since Roman times, rebuilt eleven times, and the place where you stand between two halves of the city.",st:"There has been a bridge at this exact point across the Rh\u00f4ne since Roman times. The current Pont de la Guilloti\u00e8re dates to the 1950s, but the crossing itself is older than most European cities. It connects the Presqu\'\u00eele to the left bank and was, for centuries, the only way across the Rh\u00f4ne in Lyon.\n\nStand in the middle of the bridge at sunset. To the west: the Presqu\'\u00eele, the Fourvi\u00e8re hill, the Basilica catching the last light. To the east: the Guilloti\u00e8re, the university quarter, the Part-Dieu skyline. The Rh\u00f4ne runs fast beneath you. Eleven bridges have stood here and fallen. This one seems to be holding.",im:"Standing at the midpoint of the bridge, the Rh\u00f4ne running fast beneath you, Fourvi\u00e8re to the west catching gold light, the modern city to the east, and the sense of standing on a crossing that has existed for two thousand years.",t:"M\u00e9tro B, Guilloti\u00e8re, then 2 minutes. Free. Best at sunset, facing west. The view north towards the Universit\u00e9 bridge and south towards the Confluence is also good.",c:["history_big"],r:"g",nn:"Pont de la Guilloti\u00e8re",ns:"La plus ancienne travers\u00e9e du Rh\u00f4ne \u00e0 Lyon \u2014 un pont ici depuis l\'\u00e9poque romaine, reconstruit onze fois.",nst:"Un pont existe \u00e0 cet endroit exact depuis l\'\u00e9poque romaine. L\'actuel Pont de la Guilloti\u00e8re date des ann\u00e9es 1950, mais le franchissement est plus ancien que la plupart des villes europ\u00e9ennes.\n\nDebout au milieu du pont au coucher du soleil : \u00e0 l\'ouest, la Presqu\'\u00eele et Fourvi\u00e8re dans la lumi\u00e8re dor\u00e9e. \u00c0 l\'est, la Guilloti\u00e8re et le quartier universitaire. Le Rh\u00f4ne coule vite en dessous.",nt:"M\u00e9tro B Guilloti\u00e8re, 2 min. Gratuit. Id\u00e9al au coucher du soleil face \u00e0 l\'ouest."},
{id:80,n:"Jardin des Chartreux",a:"Presqu\'\u00eele",v:["quiet","beautiful","hidden","free entry"],d:20,s:"A terraced garden cascading down the hill behind the Gare de Saint-Paul, with views of the Sa\u00f4ne and Fourvi\u00e8re that feel stolen from a more famous viewpoint.",st:"The Jardin des Chartreux sits on the slope between the Croix-Rousse and the Sa\u00f4ne, just behind the Gare de Saint-Paul. It cascades down the hill in terraces \u2014 stone staircases, mature trees, benches facing west towards Fourvi\u00e8re. On summer evenings, the garden fills with people reading, talking, or just sitting in the light.\n\nThe view is excellent \u2014 the Sa\u00f4ne below, the Fourvi\u00e8re hill opposite, the Basilica and the Metallic Tower side by side on the skyline. But the garden\'s real quality is its sense of enclosure. The terraces create private pockets of space, and the trees filter the sound of the city. It feels like a garden in a novel.",im:"A stone bench on a terrace, the Sa\u00f4ne below, Fourvi\u00e8re opposite, a book in your hand, the particular silence of a garden that knows it doesn\'t need to advertise.",t:"Entrance from Rue des Chartreux or Mont\u00e9e Saint-Barth\u00e9l\u00e9my, 1st arr. M\u00e9tro A, Gare de Saint-Paul. Free, open during daylight. Best on a warm evening.",c:["parks","high_spots"],r:"g",nn:"Jardin des Chartreux",ns:"Un jardin en terrasses descendant la colline derri\u00e8re la Gare de Saint-Paul, avec des vues sur la Sa\u00f4ne et Fourvi\u00e8re.",nst:"Le Jardin des Chartreux est sur la pente entre la Croix-Rousse et la Sa\u00f4ne. Il descend la colline en terrasses \u2014 escaliers de pierre, arbres matures, bancs face \u00e0 Fourvi\u00e8re.\n\nLa vue est excellente. Mais la vraie qualit\u00e9 du jardin est son sentiment d\'enclos. Les terrasses cr\u00e9ent des espaces priv\u00e9s, et les arbres filtrent le bruit de la ville.",nt:"Entr\u00e9e rue des Chartreux ou Mont\u00e9e Saint-Barth\u00e9l\u00e9my, 1er. M\u00e9tro A Saint-Paul. Gratuit, en journ\u00e9e. Id\u00e9al par temps chaud le soir."},
{id:81,n:"Belv\u00e9d\u00e8re de la Calade",a:"Fourvi\u00e8re",v:["hidden","beautiful","quiet","free entry"],d:15,s:"A viewpoint at the top of a narrow stone staircase on the Fourvi\u00e8re hill \u2014 the whole city framed between two walls, and almost nobody knows it\'s there.",st:"The Mont\u00e9e de la Calade is a narrow stone staircase that climbs the Fourvi\u00e8re hill from the Saint-Paul quarter. At the top, a small belv\u00e9d\u00e8re opens onto a view of the Presqu\'\u00eele, the Sa\u00f4ne, and the Croix-Rousse that is better than most of the famous viewpoints because nobody is standing in front of you.\n\nThe staircase is old \u2014 worn stone, iron railings, moss in the joints. It connects to the Parc des Hauteurs at the top, so you can use it as an alternative route up the hill. The effort is real \u2014 several hundred steps \u2014 but the view at the top is the kind of thing that makes you stand still for a while.",im:"The last step of a stone staircase, the city suddenly appearing below you \u2014 the Sa\u00f4ne, the Presqu\'\u00eele, the Croix-Rousse \u2014 framed between two walls like a painting you walked into.",t:"Start at Rue de la Quarantaine or Rue de l\'Antiquaille, 5th arr. M\u00e9tro D Vieux Lyon, then walk west. Free, always open. Steep \u2014 good shoes. Connects to Parc des Hauteurs.",c:["high_spots"],r:"g",nn:"Belv\u00e9d\u00e8re de la Calade",ns:"Un point de vue au sommet d\'un escalier de pierre \u00e9troit sur la colline de Fourvi\u00e8re \u2014 toute la ville encadr\u00e9e entre deux murs.",nst:"La Mont\u00e9e de la Calade est un escalier de pierre \u00e9troit qui grimpe la colline de Fourvi\u00e8re depuis le quartier Saint-Paul. Au sommet, un petit belv\u00e9d\u00e8re s\'ouvre sur une vue de la Presqu\'\u00eele, de la Sa\u00f4ne et de la Croix-Rousse.\n\nL\'escalier est ancien \u2014 pierre us\u00e9e, rambardes en fer, mousse dans les joints. L\'effort est r\u00e9el, mais la vue au sommet vaut chaque marche.",nt:"D\u00e9part rue de la Quarantaine ou rue de l\'Antiquaille, 5e. M\u00e9tro D Vieux Lyon. Gratuit. Raide \u2014 bonnes chaussures. Rejoint le Parc des Hauteurs."},
{id:82,n:"Street Art des Pentes",a:"Croix-Rousse",v:["hidden","local","free entry"],d:30,s:"The slopes of the Croix-Rousse are covered in street art \u2014 not tags, but commissioned murals, paste-ups, and installations that change every few months.",st:"The Pentes de la Croix-Rousse \u2014 the steep slopes between the plateau and the Presqu\'\u00eele \u2014 have become one of the best open-air galleries for street art in France. The work is serious: large-scale murals by established artists, intricate paste-ups on shop shutters, stencils on electrical boxes, and installations that appear and disappear with the seasons.\n\nThe concentration is highest along the Mont\u00e9e de la Grande C\u00f4te, Rue Burdeau, Rue des Tables Claudiennes, and the staircases connecting them. The style ranges from political commentary to surrealism to pure colour. Unlike the city\'s famous trompe-l\'oeil walls, this work is raw, unauthorised in spirit even when commissioned, and constantly evolving.",im:"A four-storey paste-up on a shuttered building, a stencilled fox on an electrical box, the slope of a street so steep you can see the art on the building opposite at eye level.",t:"Start at Place des Terreaux, walk up Mont\u00e9e de la Grande C\u00f4te. The art is on both sides, in courtyards, on staircases. Free, always visible. Best discovered by wandering rather than following a route.",c:["free_culture","neighbourhoods"],r:"g",nn:"Street art des Pentes",ns:"Les pentes de la Croix-Rousse sont couvertes de street art \u2014 pas des tags, mais des fresques, collages et installations qui changent tous les quelques mois.",nst:"Les Pentes de la Croix-Rousse sont devenues l\'une des meilleures galeries de street art en plein air de France. La concentration est la plus forte le long de la Mont\u00e9e de la Grande C\u00f4te, rue Burdeau et rue des Tables Claudiennes.\n\nLe style va du commentaire politique au surr\u00e9alisme. Contrairement aux c\u00e9l\u00e8bres murs peints en trompe-l\'\u0153il, ce travail est brut et en constante \u00e9volution.",nt:"D\u00e9part Place des Terreaux, monter la Grande C\u00f4te. L\'art est des deux c\u00f4t\u00e9s, dans les cours et les escaliers. Gratuit. Mieux d\u00e9couvert en fl\u00e2nant."},
{id:83,n:"Rh\u00f4ne Confluence at Dusk",a:"Confluence",v:["beautiful","quiet","romantic_water","free entry"],d:20,s:"The exact point where the Rh\u00f4ne and Sa\u00f4ne merge \u2014 two rivers with different colours, different speeds, running side by side for a few hundred metres before becoming one.",st:"At the southern tip of the Presqu\'\u00eele, the Rh\u00f4ne and Sa\u00f4ne finally merge. The Sa\u00f4ne is green-grey and slow; the Rh\u00f4ne is blue-grey and fast. Where they meet, the two colours run side by side for a few hundred metres before blending \u2014 you can see the boundary line in the water from the bank.\n\nThe promenade at the tip is quiet in the evenings. The Mus\u00e9e des Confluences sits to the east. To the south, the merged river widens towards the distant industrial zone. The light at dusk is extraordinary \u2014 the water reflects two different skies, and the city behind you fades into silhouette. It\'s one of those places where geography does something your camera can\'t quite capture.",im:"Two rivers running side by side, one green-grey, one blue-grey, the boundary visible in the water like a seam, the city behind you, the merged river ahead.",t:"Tram T1 to Mus\u00e9e des Confluences, then walk to the southern tip of the Presqu\'\u00eele. Free. Best at dusk. The promenade is paved and flat.",c:["romantic_water","nature"],r:"g",nn:"Confluent du Rh\u00f4ne et de la Sa\u00f4ne au cr\u00e9puscule",ns:"Le point exact o\u00f9 le Rh\u00f4ne et la Sa\u00f4ne fusionnent \u2014 deux fleuves de couleurs diff\u00e9rentes, c\u00f4te \u00e0 c\u00f4te pendant quelques centaines de m\u00e8tres avant de n\'en faire qu\'un.",nst:"\u00c0 la pointe sud de la Presqu\'\u00eele, le Rh\u00f4ne et la Sa\u00f4ne fusionnent enfin. La Sa\u00f4ne est vert-gris et lente ; le Rh\u00f4ne est bleu-gris et rapide. L\u00e0 o\u00f9 ils se rencontrent, les deux couleurs courent c\u00f4te \u00e0 c\u00f4te avant de se m\u00e9langer.\n\nLa lumi\u00e8re au cr\u00e9puscule est extraordinaire \u2014 l\'eau refl\u00e8te deux ciels diff\u00e9rents, et la ville derri\u00e8re vous s\'efface en silhouette.",nt:"Tram T1 Mus\u00e9e des Confluences, puis marcher jusqu\'\u00e0 la pointe sud. Gratuit. Id\u00e9al au cr\u00e9puscule. Promenade plate et pav\u00e9e."},
{id:84,n:"March\u00e9 de la Part-Dieu",a:"Part-Dieu",v:["local","hidden"],d:30,s:"The covered market inside the Part-Dieu shopping centre that most visitors walk straight past \u2014 smaller than Les Halles, cheaper, and with the same quality produce.",st:"Everyone goes to Les Halles. Almost nobody goes to the March\u00e9 de la Part-Dieu, which is tucked inside the Part-Dieu shopping centre on the lower level, easy to miss if you don\'t know it\'s there. The stalls are run by local producers and specialists \u2014 cheese, charcuterie, bread, fish, fruit \u2014 and the prices are lower than Les Halles because the rent is lower and the tourists are fewer.\n\nThe atmosphere is working-class Lyon \u2014 regulars who come every morning, vendors who know what their customers are cooking tonight. It\'s not glamorous. The lighting is fluorescent. The floor is concrete. But the Saint-Marcellin is just as ripe, and no one is posing for Instagram.",im:"A fluorescent-lit hall, a vendor slicing saucisson onto wax paper, a woman counting coins for a bag of cherries, and the realisation that this market exists twenty metres from 200 shops and nobody told you.",t:"Centre Commercial de la Part-Dieu, lower level. M\u00e9tro B Part-Dieu. Tue\u2013Sat mornings. Free to browse. Enter from the Cours Lafayette side for the easiest access.",c:["markets","food"],r:"g",nn:"March\u00e9 de la Part-Dieu",ns:"Le march\u00e9 couvert \u00e0 l\'int\u00e9rieur du centre commercial Part-Dieu que les visiteurs d\u00e9passent sans le voir \u2014 plus petit que les Halles, moins cher, m\u00eame qualit\u00e9.",nst:"Tout le monde va aux Halles. Presque personne ne va au March\u00e9 de la Part-Dieu, cach\u00e9 au niveau inf\u00e9rieur du centre commercial. Les \u00e9tals sont tenus par des producteurs locaux et les prix sont plus bas parce que le loyer est moindre et les touristes absents.\n\nL\'atmosph\u00e8re est le Lyon populaire \u2014 des habitu\u00e9s qui viennent chaque matin, des vendeurs qui savent ce que leurs clients cuisinent ce soir.",nt:"Centre Commercial Part-Dieu, niveau inf\u00e9rieur. M\u00e9tro B Part-Dieu. Mar\u2013sam matin. Gratuit. Entr\u00e9e c\u00f4t\u00e9 cours Lafayette."},
{id:85,n:"Le Jardin des Plantes de Lyon",a:"Presqu\'\u00eele",v:["hidden","quiet","free entry"],d:20,s:"A tiny botanical garden on the Presqu\'\u00eele, squeezed between apartment buildings \u2014 older than the T\u00eate d\'Or by decades and visited by almost nobody.",st:"Lyon\'s Jardin des Plantes is not the T\u00eate d\'Or. It\'s a pocket botanical garden on the slope above the Amphith\u00e9\u00e2tre des Trois Gaules, squeezed between apartment buildings in the 1st arrondissement. It was established in 1796 \u2014 over fifty years before the Parc de la T\u00eate d\'Or \u2014 and it has the overgrown intimacy of a garden that exists because someone forgot to build on it.\n\nThe collection is small but thoughtful: medicinal plants, alpine species, a few ancient trees that predate the neighbourhood around them. The benches face south and catch the sun all day. On a weekday morning, you might be the only person here. It\'s the kind of place that rewards sitting still.",im:"A wooden bench in a botanical garden the size of a courtyard, medicinal herbs labelled in Latin, a tree older than the apartment building behind it, and the sound of the city completely absent.",t:"Rue du Jardin des Plantes, 1st arr. M\u00e9tro C Croix-Paquet. Free, open daily. Small \u2014 ten minutes is enough to see it all, but the benches invite longer.",c:["parks","nature"],r:"g",nn:"Jardin des Plantes de Lyon",ns:"Un petit jardin botanique sur la Presqu\'\u00eele, coinc\u00e9 entre des immeubles \u2014 plus ancien que la T\u00eate d\'Or et visit\u00e9 par presque personne.",nst:"Le Jardin des Plantes de Lyon n\'est pas la T\u00eate d\'Or. C\'est un jardin botanique de poche, coinc\u00e9 entre des immeubles du 1er arrondissement. \u00c9tabli en 1796 \u2014 plus de cinquante ans avant le Parc de la T\u00eate d\'Or \u2014 il a l\'intimit\u00e9 envahissante d\'un jardin qu\'on a oubli\u00e9 de construire par-dessus.\n\nLa collection est petite mais r\u00e9fl\u00e9chie : plantes m\u00e9dicinales, esp\u00e8ces alpines, quelques arbres anciens.",nt:"Rue du Jardin des Plantes, 1er. M\u00e9tro C Croix-Paquet. Gratuit. Petit \u2014 dix minutes suffisent, mais les bancs invitent \u00e0 rester."},
{id:86,n:"Quartier Monplaisir",a:"Monplaisir",v:["hidden","local","quiet"],d:30,s:"The neighbourhood where the Lumi\u00e8re brothers lived and worked \u2014 now a residential quarter with a village feel, independent shops, and no tourists despite hosting cinema\'s birthplace.",st:"Monplaisir is where cinema was born, but the neighbourhood barely mentions it. Beyond the Institut Lumi\u00e8re, this is a quiet, residential quarter with a village feel \u2014 a pedestrianised high street (Rue du Premier Film / Rue Antoine Lumi\u00e8re), independent bakeries, a weekly market, and the kind of caf\u00e9s where the waiter knows which table you prefer.\n\nThe architecture is early 20th century \u2014 low-rise, tree-lined avenues, workers\' housing that has aged into something charming. The neighbourhood market on Place Ambroise Courtois, held twice a week, is one of the best in the city for fruit and vegetables. Monplaisir is what happens when a neighbourhood decides it doesn\'t need visitors to validate it.",im:"A pedestrianised street with plane trees, a bakery with a queue, a woman walking a dog past the house where cinema was invented, and nobody in the street who looks like a tourist.",t:"M\u00e9tro D, Monplaisir-Lumi\u00e8re. Free to wander. Market on Place Ambroise Courtois Wed and Sat mornings. Combine with the Institut Lumi\u00e8re for a half-day.",c:["neighbourhoods"],r:"g",nn:"Quartier Monplaisir",ns:"Le quartier o\u00f9 les fr\u00e8res Lumi\u00e8re vivaient et travaillaient \u2014 r\u00e9sidentiel, des commerces ind\u00e9pendants, une atmosph\u00e8re de village, et aucun touriste.",nst:"Monplaisir est le berceau du cin\u00e9ma, mais le quartier le mentionne \u00e0 peine. Au-del\u00e0 de l\'Institut Lumi\u00e8re, c\'est un quartier r\u00e9sidentiel tranquille avec une rue pi\u00e9tonne, des boulangeries ind\u00e9pendantes, un march\u00e9 hebdomadaire, et le genre de caf\u00e9s o\u00f9 le serveur sait quelle table vous pr\u00e9f\u00e9rez.\n\nLe march\u00e9 sur la Place Ambroise Courtois est l\'un des meilleurs de la ville pour les fruits et l\u00e9gumes.",nt:"M\u00e9tro D Monplaisir-Lumi\u00e8re. Gratuit. March\u00e9 Place Ambroise Courtois mer et sam matin. Combiner avec l\'Institut Lumi\u00e8re."},
{id:87,n:"Les Puces du Canal",a:"Beyond Lyon",v:["local","weird","free entry"],d:60,s:"The largest flea market in the Lyon region \u2014 over 400 vendors every weekend in a converted industrial zone along the canal at Villeurbanne.",st:"Every Thursday, Saturday, and Sunday, over 400 vendors set up along the Canal de Jonage in Villeurbanne, just east of the city. The Puces du Canal is the Lyon area\'s biggest flea market \u2014 a sprawl of antiques, vintage furniture, old books, vinyl records, tools, clothes, and the kind of objects whose purpose you can\'t immediately identify.\n\nThe market divides into two zones: the covered halls (more established dealers, higher prices) and the outdoor area (anything goes, haggling expected). On a good Sunday, the outdoor section has the energy of a small festival \u2014 food trucks, live music, and the particular excitement of finding something that someone else threw away.\n\nThe setting is industrial-zone bleak, which somehow makes the treasure-hunting more satisfying.",im:"A vinyl record crate, a brass lamp missing its shade, a 1970s poster for a Lyon jazz festival, a vendor sitting on a camping chair reading Le Progr\u00e8s, and the canal running grey behind it all.",t:"1 Rue du Canal, Villeurbanne. Tram T3 to Reconnaissance-Balzac. Thu 6am\u2013noon, Sat\u2013Sun 6am\u20131pm. Free entry. Arrive early for the best finds. Cash preferred for outdoor vendors.",c:["markets","weird"],r:"g",nn:"Les Puces du Canal",ns:"Le plus grand march\u00e9 aux puces de la r\u00e9gion lyonnaise \u2014 plus de 400 vendeurs chaque week-end le long du canal \u00e0 Villeurbanne.",nst:"Chaque jeudi, samedi et dimanche, plus de 400 vendeurs s\'installent le long du Canal de Jonage \u00e0 Villeurbanne. Les Puces du Canal sont le plus grand march\u00e9 aux puces de la r\u00e9gion \u2014 antiquit\u00e9s, meubles vintage, livres, vinyles, outils.\n\nLe march\u00e9 se divise en deux zones : les halles couvertes et la zone ext\u00e9rieure o\u00f9 tout est n\u00e9gociable. Le cadre est industriellement triste, ce qui rend la chasse au tr\u00e9sor plus satisfaisante.",nt:"1 rue du Canal, Villeurbanne. Tram T3 Reconnaissance-Balzac. Jeu 6h\u201312h, sam\u2013dim 6h\u201313h. Gratuit. Arrivez t\u00f4t. Esp\u00e8ces pr\u00e9f\u00e9r\u00e9es pour les ext\u00e9rieurs."},
{id:88,n:"Croix-Rousse Plateau at Night",a:"Croix-Rousse",v:["local","hidden","quiet"],d:30,s:"The Croix-Rousse plateau after dark \u2014 when the market is gone, the tourists are in the Presqu\'\u00eele, and the neighbourhood belongs to the people who live there.",st:"The Croix-Rousse plateau during the day is a market, a tourist trail, a neighbourhood in performance mode. At night, it becomes itself. The Boulevard de la Croix-Rousse empties of stalls and fills with the hum of caf\u00e9s and bars that cater to locals. The Gros Caillou viewpoint, deserted after dark, offers the Rh\u00f4ne valley and the twinkling Part-Dieu skyline without competition.\n\nThe side streets off the boulevard \u2014 Rue d\'Austerlitz, Rue Dumenge, Rue Neyret \u2014 have neighbourhood bars with no signage and restaurants where the menu is whatever the chef bought this morning. The atmosphere is distinctly anti-Presqu\'\u00eele: no chains, no dress code, no rush.",im:"A lit bar window on a dark street, two people at a zinc counter, the sound of conversation in French drifting out, and the city lights visible through a gap between buildings.",t:"M\u00e9tro C, Croix-Rousse. Walk the boulevard and side streets. Bars and restaurants open until midnight or later. The Gros Caillou viewpoint is at the east end of the boulevard \u2014 best after dark.",c:["neighbourhoods"],r:"g",nn:"Plateau de la Croix-Rousse la nuit",ns:"Le plateau de la Croix-Rousse apr\u00e8s la tomb\u00e9e de la nuit \u2014 le march\u00e9 parti, les touristes en bas, le quartier pour ses habitants.",nst:"Le plateau de la Croix-Rousse en journ\u00e9e est un march\u00e9 et un circuit touristique. La nuit, il redevient lui-m\u00eame. Le boulevard se vide des \u00e9tals et se remplit du bourdonnement des caf\u00e9s et bars pour locaux.\n\nLes rues lat\u00e9rales ont des bars sans enseigne et des restaurants o\u00f9 le menu est ce que le chef a achet\u00e9 le matin. L\'atmosph\u00e8re est distinctement anti-Presqu\'\u00eele.",nt:"M\u00e9tro C Croix-Rousse. Arpenter le boulevard et les rues lat\u00e9rales. Bars et restos ouverts jusqu\'\u00e0 minuit ou plus. Gros Caillou au bout est du boulevard \u2014 meilleur la nuit."},
{id:89,n:"Ancien H\u00f4pital de l\'Antiquaille",a:"Fourvi\u00e8re",v:["history","hidden","weird"],d:20,s:"A former hospital on the Fourvi\u00e8re hill, built on top of the ruins of the Roman Imperial Palace \u2014 now partly converted, with traces of both civilisations visible.",st:"The Antiquaille sits on the Fourvi\u00e8re hill at the site where the Roman Imperial Palace of Lugdunum once stood. A hospital was built here in the 16th century, and for 400 years it served as one of Lyon\'s major medical institutions. The building closed as a hospital in 2003 and has been partly redeveloped.\n\nWhat remains is a strange palimpsest: Roman foundations visible in the basement, 16th-century cloisters, 19th-century medical wings, and modern apartments. A small free exhibition space \u2014 the Espace Culturel du Christianisme \u2014 occupies part of the building and traces the early history of Christianity in Lyon, including the story of the martyrs of 177 CE, which happened just down the hill at the Amphith\u00e9\u00e2tre des Trois Gaules.",im:"A 16th-century cloister with Roman stone in the foundations, a modern apartment block behind it, and the sense that every century has left something here and nobody has bothered to tidy up.",t:"1 Rue de l\'Antiquaille, 5th arr. Funicular to Saint-Just, then 5-minute walk. The Espace Culturel is free and open Wed\u2013Sun. The exterior and cloister are freely accessible.",c:["history_big","weird"],r:"g",nn:"Ancien H\u00f4pital de l\'Antiquaille",ns:"Un ancien h\u00f4pital sur Fourvi\u00e8re, construit sur les ruines du palais imp\u00e9rial romain \u2014 partiellement reconverti, avec des traces des deux civilisations.",nst:"L\'Antiquaille est sur le site de l\'ancien palais imp\u00e9rial romain de Lugdunum. Un h\u00f4pital a \u00e9t\u00e9 construit ici au XVIe si\u00e8cle et a fonctionn\u00e9 pendant 400 ans. Ce qui reste est un \u00e9trange palimpseste : fondations romaines au sous-sol, clo\u00eetres du XVIe, ailes m\u00e9dicales du XIXe, et appartements modernes.\n\nUn petit espace d\'exposition gratuit retrace l\'histoire du christianisme primitif \u00e0 Lyon.",nt:"1 rue de l\'Antiquaille, 5e. Funiculaire Saint-Just, 5 min. Espace Culturel gratuit, ouvert mer\u2013dim. Ext\u00e9rieur et clo\u00eetre accessibles."},
{id:90,n:"Jazz \u00e0 Vienne \u2014 from Lyon",a:"Beyond Lyon",v:["famous","beautiful"],d:180,s:"Two weeks of world-class jazz in a 2,000-year-old Roman amphitheatre, 30 minutes south by train \u2014 one of the best live music settings in Europe.",st:"Jazz \u00e0 Vienne runs for two weeks every summer in the Roman theatre of Vienne, a town 30 minutes south of Lyon by TER train. The amphitheatre seats 8,000 people and is almost 2,000 years old. The programme covers jazz, blues, soul, funk, world music, and whatever doesn\'t fit neatly into categories \u2014 recent editions have featured everything from Herbie Hancock to Ayo to Khruangbin.\n\nThe setting is what makes it. You\'re sitting on Roman stone, the Rh\u00f4ne valley darkening behind the stage, the stars appearing above, and a trumpet beginning to play. The daytime programme \u2014 free concerts in the town centre \u2014 is excellent and costs nothing. Evening tickets sell out early for the big names.",im:"A Roman amphitheatre at dusk, 8,000 people in stone seats, the stage lit below, a trumpet beginning to play, and the stars appearing one by one over the Rh\u00f4ne valley.",t:"TER from Part-Dieu or Perrache to Vienne, ~25\u201330 min, runs late. Festival runs late June\u2013mid July. Daytime concerts free. Evening tickets from ~\u20ac35. Book early for headliners. Check jazzavienne.com.",c:["day_trips"],r:"g",nn:"Jazz \u00e0 Vienne",ns:"Deux semaines de jazz de classe mondiale dans un amphith\u00e9\u00e2tre romain de 2 000 ans, \u00e0 30 minutes en train \u2014 l\'un des meilleurs cadres de musique live en Europe.",nst:"Jazz \u00e0 Vienne dure deux semaines chaque \u00e9t\u00e9 dans le th\u00e9\u00e2tre romain de Vienne, \u00e0 30 minutes de Lyon en TER. L\'amphith\u00e9\u00e2tre accueille 8 000 personnes et a presque 2 000 ans.\n\nLe programme couvre jazz, blues, soul, funk, musiques du monde. Les concerts en journ\u00e9e dans le centre-ville sont gratuits et excellents.",nt:"TER depuis Part-Dieu ou Perrache, ~25\u201330 min. Fin juin\u2013mi-juillet. Concerts de jour gratuits. Soir\u00e9es \u00e0 partir de ~35\u20ac. R\u00e9server t\u00f4t. jazzavienne.com."},
{id:91,n:"Mus\u00e9e Africain de Lyon",a:"Presqu\'\u00eele",v:["hidden","history"],d:45,s:"A small museum of African art and ethnography in the 2nd arrondissement, founded by missionaries in the 1860s and now housing over 3,000 objects from West and Central Africa.",st:"The Mus\u00e9e Africain de Lyon was founded in 1861 by the Soci\u00e9t\u00e9 des Missions Africaines and occupies a discreet building on Cours Gambetta. The collection spans over 3,000 objects from West and Central Africa \u2014 masks, textiles, sculptures, ritual objects, and everyday tools \u2014 assembled over more than 150 years.\n\nThe museum is small enough to see in under an hour and thoughtful enough to change how you think about Lyon\'s connections to Africa. The colonial context is not hidden \u2014 the museum addresses its own origins as a missionary collection and the questions that raises about how these objects arrived in Lyon.\n\nAlmost nobody visits. On a weekday afternoon, you may have the collection to yourself.",im:"A wooden mask behind glass, a textile dyed with indigo, 3,000 objects from a continent 5,000 kilometres away, and a museum that asks honest questions about why they\'re here.",t:"150 Cours Gambetta, 7th arr. M\u00e9tro D, Sans Souci. \u20ac6 adults. Wed\u2013Sun 11am\u20135:30pm. Small enough to see in 45 minutes. Check musee-africain-lyon.org.",c:["free_culture","history_big"],r:"g",nn:"Mus\u00e9e Africain de Lyon",ns:"Un petit mus\u00e9e d\'art et d\'ethnographie africains, fond\u00e9 par des missionnaires dans les ann\u00e9es 1860, avec plus de 3 000 objets d\'Afrique de l\'Ouest et centrale.",nst:"Le Mus\u00e9e Africain a \u00e9t\u00e9 fond\u00e9 en 1861 par la Soci\u00e9t\u00e9 des Missions Africaines. La collection couvre plus de 3 000 objets \u2014 masques, textiles, sculptures, objets rituels \u2014 assembl\u00e9s sur plus de 150 ans.\n\nLe mus\u00e9e aborde honn\u00eatement le contexte colonial de sa propre collection. Presque personne ne le visite.",nt:"150 cours Gambetta, 7e. M\u00e9tro D Sans Souci. 6\u20ac adultes. Mer\u2013dim 11h\u201317h30. Voir musee-africain-lyon.org."},
{id:92,n:"Centre Nautique Tony Bertrand",a:"Guilloti\u00e8re",v:["local","beautiful"],d:30,s:"Lyon\'s outdoor public pool complex on the banks of the Rh\u00f4ne \u2014 slides, diving boards, sun decks, and the city skyline visible over the wall.",st:"When the lakes are too far and the rivers are too unpredictable, Lyonnais go to the Centre Nautique Tony Bertrand. Multiple pools, waterslides, diving boards, and a sun terrace with views of the Rh\u00f4ne. On hot summer days the queues form early, but inside it\'s big enough to absorb the crowd. Municipal prices \u2014 a few euros for a full day.\n\nThe setting is what elevates it: the Rh\u00f4ne runs past just behind the wall, the Fourvi\u00e8re hill rises to the west, and you\'re floating on your back in the middle of a city of 500,000 people. Board shorts are banned \u2014 bring proper swimwear, or you\'ll be turned away at the gate.",im:"Chlorine, sun cream, the shriek of a teenager on the waterslide, the Rh\u00f4ne visible over the wall, and you floating on your back watching the Fourvi\u00e8re Basilica against the sky.",t:"21 Quai Claude Bernard, 7th arr. M\u00e9tro B, Saxe-Gambetta. Open June\u2013Sept. \u20ac4\u2013\u20ac5 adults. Board shorts banned. Arrive before noon on weekends.",c:["swimming","sport"],r:"g",nn:"Centre Nautique Tony Bertrand",ns:"Le complexe de piscines ext\u00e9rieures de Lyon sur les berges du Rh\u00f4ne \u2014 toboggans, plongeoirs, terrasses, et le skyline de la ville derri\u00e8re le mur.",nst:"Quand les lacs sont trop loin, les Lyonnais vont au Centre Nautique Tony Bertrand. Plusieurs bassins, toboggans, plongeoirs, et une terrasse avec vue sur le Rh\u00f4ne. Prix municipaux \u2014 quelques euros pour la journ\u00e9e.\n\nLe cadre est ce qui l\'\u00e9l\u00e8ve : le Rh\u00f4ne coule juste derri\u00e8re le mur, Fourvi\u00e8re s\'\u00e9l\u00e8ve \u00e0 l\'ouest. Short de bain interdit \u2014 maillot obligatoire.",nt:"21 quai Claude Bernard, 7e. M\u00e9tro B Saxe-Gambetta. Ouvert juin\u2013sept. 4\u20ac\u20135\u20ac adultes. Short de bain interdit. Avant midi le week-end."},
{id:93,n:"Mur des Lyonnais de la Sa\u00f4ne",a:"Vieux Lyon",v:["hidden","weird","free entry"],d:10,s:"A trompe-l\'oeil mural on the Sa\u00f4ne depicting a cross-section of a Lyonnais apartment building \u2014 residents in their windows, every floor a different era.",st:"Lyon has over 100 trompe-l\'oeil murals, but the Mur des Lyonnais de la Sa\u00f4ne \u2014 on the corner of Quai Saint-Vincent and Rue de la Martinière \u2014 is one of the most clever. It depicts the cross-section of a Lyonnais apartment building, with residents in their windows: a grandmother cooking, a student studying, a couple arguing, children playing. Each floor represents a different period of Lyon\'s history, and the characters include both fictional residents and real Lyonnais figures.\n\nThe mural is painted with such precision that from a distance the windows look real. Up close, you can identify the details \u2014 the objects on windowsills, the style of curtains, the books on shelves. It\'s a building that tells the story of a city, one window at a time.",im:"A painted building that isn\'t a building, windows that aren\'t windows, a grandmother who isn\'t a grandmother \u2014 and the moment your brain catches up with your eyes.",t:"Quai Saint-Vincent / Rue de la Martinière, 1st arr. M\u00e9tro A, H\u00f4tel de Ville. Free, always visible. Best in morning light. Walk north along the quay to see other murals in the series.",c:["weird","free_culture"],r:"g",nn:"Mur des Lyonnais de la Sa\u00f4ne",ns:"Un trompe-l\'\u0153il sur la Sa\u00f4ne montrant la coupe d\'un immeuble lyonnais \u2014 des habitants \u00e0 chaque fen\u00eatre, chaque \u00e9tage une \u00e9poque diff\u00e9rente.",nst:"Lyon a plus de 100 fresques en trompe-l\'\u0153il, mais le Mur des Lyonnais de la Sa\u00f4ne est l\'un des plus ing\u00e9nieux. Il montre la coupe d\'un immeuble lyonnais, avec des habitants \u00e0 chaque fen\u00eatre : une grand-m\u00e8re qui cuisine, un \u00e9tudiant, un couple qui se dispute.\n\nChaque \u00e9tage repr\u00e9sente une p\u00e9riode diff\u00e9rente de l\'histoire de Lyon. De loin, les fen\u00eatres ont l\'air vraies.",nt:"Quai Saint-Vincent / rue de la Martinière, 1er. M\u00e9tro A H\u00f4tel de Ville. Gratuit. Id\u00e9al le matin. Marcher vers le nord pour d\'autres fresques."},
{id:94,n:"Balme Noire \u2014 Gorge Walk",a:"Beyond Lyon",v:["hidden","beautiful","nature","quiet"],d:60,s:"A slot canyon carved by a stream 45 minutes north of Lyon \u2014 moss-covered walls, a waterfall, and the feeling of being somewhere that shouldn\'t exist this close to a city.",st:"The Balme Noire is a short gorge near Saint-Romain-de-Popey in the Monts du Lyonnais, about 45 minutes northwest of Lyon by car. A stream has carved a narrow slot through dark rock, creating walls of moss and fern that close in overhead. At the end of the gorge, a small waterfall drops into a pool.\n\nThe walk is short \u2014 under an hour round trip \u2014 and the gorge is not dramatic by Alpine standards. But it feels impossibly remote for somewhere less than an hour from a city of two million. On a weekday, you may not see another person. The path can be slippery after rain \u2014 decent shoes are essential.\n\nIt\'s the kind of place that makes you wonder what else is hiding in the hills around Lyon.",im:"Moss-covered rock walls closing in above you, a stream running over your feet, ferns growing from cracks in the stone, and the sound of a waterfall you can hear but haven\'t reached yet.",t:"Car recommended \u2014 ~45 min northwest. Park at Saint-Romain-de-Popey, follow signs for Balme Noire. Walk: ~45 min round trip. Free. Slippery after rain \u2014 proper shoes. No facilities.",c:["nature","day_trips"],r:"g",nn:"Balme Noire \u2014 Gorges",ns:"Un canyon \u00e9troit creus\u00e9 par un ruisseau \u00e0 45 minutes au nord de Lyon \u2014 parois moussues, cascade, et l\'impression d\'\u00eatre ailleurs.",nst:"La Balme Noire est une courte gorge pr\u00e8s de Saint-Romain-de-Popey, \u00e0 environ 45 minutes au nord-ouest de Lyon. Un ruisseau a creus\u00e9 une fente \u00e9troite dans la roche sombre, cr\u00e9ant des parois de mousse et de foug\u00e8re. Au bout, une petite cascade.\n\nLa marche est courte \u2014 moins d\'une heure aller-retour. Mais l\'endroit para\u00eet impossiblement isol\u00e9 pour \u00eatre si proche d\'une m\u00e9tropole.",nt:"Voiture recommand\u00e9e, ~45 min au nord-ouest. Se garer \u00e0 Saint-Romain-de-Popey. Marche ~45 min A/R. Gratuit. Glissant apr\u00e8s la pluie."},
{id:95,n:"Roseraie du Parc de la T\u00eate d\'Or",a:"T\u00eate d\'Or",v:["beautiful","quiet","free entry"],d:30,s:"16,000 rose plants, 320 international varieties, a perfume garden, and an international rose competition that\'s been running since 1930 \u2014 all inside the park, all free.",st:"The Roseraie Internationale is the rose garden inside the Parc de la T\u00eate d\'Or, and it\'s one of the finest in Europe. 16,000 plants across 5 hectares, including 320 labelled varieties from breeders around the world. The perfume garden in the centre groups roses by scent rather than colour \u2014 you walk through zones of citrus, musk, damask, and tea, with your eyes closed if you want to.\n\nThe Concours International de Roses Nouvelles has been held here since 1930 \u2014 breeders submit new varieties for blind judging. The garden peaks in June, when the first flush of blooms makes the air heavy with scent and the colours saturate the camera. A second, lighter flush comes in September.\n\nThe rose garden is free and open during park hours. It\'s best visited midmorning, before the midday heat wilts the petals.",im:"16,000 roses blooming at once, the scent arriving before the colour, a woman bending to smell a bloom she hasn\'t identified yet, the sun warm on the petal edges.",t:"Inside Parc de la T\u00eate d\'Or, near the M\u00e9tro A Mass\u00e9na entrance. Free. Open during park hours. Peaks June, second flush September. Best midmorning.",c:["parks","nature"],r:"g",nn:"Roseraie du Parc de la T\u00eate d\'Or",ns:"16 000 rosiers, 320 vari\u00e9t\u00e9s internationales, un jardin de parfums, et un concours international de roses depuis 1930 \u2014 dans le parc, gratuit.",nst:"La Roseraie Internationale est le jardin de roses du Parc de la T\u00eate d\'Or, et c\'est l\'une des plus belles d\'Europe. 16 000 plants sur 5 hectares, dont 320 vari\u00e9t\u00e9s \u00e9tiquet\u00e9es. Le jardin de parfums regroupe les roses par odeur plut\u00f4t que par couleur.\n\nLe Concours International de Roses Nouvelles se tient ici depuis 1930. Le jardin culmine en juin.",nt:"Dans le Parc de la T\u00eate d\'Or, entr\u00e9e Mass\u00e9na. Gratuit. Heures du parc. Pic en juin, deuxi\u00e8me floraison en septembre. Id\u00e9al le matin."},
{id:96,n:"Lac du Parc de la T\u00eate d\'Or \u2014 Rowing",a:"T\u00eate d\'Or",v:["beautiful","local","romantic_water","free entry"],d:30,s:"Rowing on the lake in the middle of the city \u2014 swans, an island you can\'t land on, and the particular calm of doing something slow in a place that doesn\'t require it.",st:"The lake at the T\u00eate d\'Or has rowing boats for hire in summer \u2014 old-fashioned wooden boats, two or four seats, rented by the half hour. The lake is big enough to feel like you\'re going somewhere and small enough that you can\'t get lost. An island sits in the middle, dense with trees and technically off-limits, which naturally makes it more interesting.\n\nSwans patrol the water with the territorial confidence of animals who know they outrank you. The botanical garden borders the north shore. The Roseraie is to the east. The whole experience is deliberately slow \u2014 you row, you drift, you look at trees, you come back. It costs a few euros and lasts exactly as long as you need it to.",im:"A wooden rowing boat on a city lake, swans keeping their distance, an island you can\'t land on, the sound of oars in water, and the Croix-Rousse skyline through the trees.",t:"Boats for hire near the Porte des Enfants du Rh\u00f4ne. Summer months, ~\u20ac10\u201315 per half hour. Park is free and always open. The walk around the lake takes about 25 minutes.",c:["romantic_water","parks"],r:"g",nn:"Lac du Parc de la T\u00eate d\'Or \u2014 Barque",ns:"Ramer sur le lac au milieu de la ville \u2014 cygnes, une \u00eele inaccessible, et le calme particulier de faire quelque chose de lent.",nst:"Le lac de la T\u00eate d\'Or propose des barques en \u00e9t\u00e9 \u2014 bateaux en bois \u00e0 l\'ancienne, lou\u00e9s \u00e0 la demi-heure. Le lac est assez grand pour donner l\'impression d\'aller quelque part et assez petit pour ne pas se perdre.\n\nLes cygnes patrouillent avec la confiance territoriale d\'animaux qui savent qu\'ils sont au-dessus de vous dans la hi\u00e9rarchie.",nt:"Location de barques pr\u00e8s de la Porte des Enfants du Rh\u00f4ne. \u00c9t\u00e9, ~10\u20ac\u201315\u20ac la demi-heure. Parc gratuit. Le tour du lac \u00e0 pied prend ~25 min."},
{id:97,n:"Fort de Loyasse",a:"Fourvi\u00e8re",v:["hidden","history","quiet"],d:20,s:"A Napoleonic-era fort on the Fourvi\u00e8re ridge, overgrown and half-forgotten, with walls you can walk along and views the guidebooks don\'t mention.",st:"Fort de Loyasse was built in the 1830s as part of Lyon\'s ring of military fortifications \u2014 a system of forts designed to protect the city from both external invasion and internal revolt (Lyon had a history of both). The fort sits at the western end of the Fourvi\u00e8re ridge, near the Loyasse cemetery, and has been largely abandoned to time.\n\nThe walls and ramparts are accessible on foot. The interior is closed, but the perimeter path offers views to the west over the Sa\u00f4ne valley and the Monts du Lyonnais that almost no one sees. The fort has the atmosphere of a place that served a purpose that no longer exists \u2014 thick walls, narrow windows, and grass growing through the gun emplacements.",im:"Thick stone walls with grass on top, a narrow window looking west over the Sa\u00f4ne valley, the city to the east, and the sense of a place designed for a war that never came.",t:"Chemin des Forts, 5th arr. Walk from Loyasse cemetery or the Parc des Hauteurs path. Free, exterior always accessible. Not signposted \u2014 look for the walls on the ridge.",c:["history_big","abandoned"],r:"g",nn:"Fort de Loyasse",ns:"Un fort de l\'\u00e9poque napol\u00e9onienne sur la cr\u00eate de Fourvi\u00e8re, envahi par la v\u00e9g\u00e9tation et \u00e0 moiti\u00e9 oubli\u00e9.",nst:"Le Fort de Loyasse a \u00e9t\u00e9 construit dans les ann\u00e9es 1830 dans le cadre de la ceinture de fortifications militaires de Lyon. Il est au bout ouest de la cr\u00eate de Fourvi\u00e8re, largement abandonn\u00e9.\n\nLes murs et remparts sont accessibles \u00e0 pied. Le chemin p\u00e9riph\u00e9rique offre des vues vers l\'ouest que presque personne ne voit. L\'atmosph\u00e8re est celle d\'un lieu con\u00e7u pour une guerre qui n\'est jamais venue.",nt:"Chemin des Forts, 5e. Marche depuis le cimeti\u00e8re de Loyasse ou le Parc des Hauteurs. Gratuit, ext\u00e9rieur toujours accessible. Non signal\u00e9."},
{id:98,n:"Le Transbordeur",a:"Beyond Lyon",v:["local","hidden"],d:120,s:"Lyon\'s best independent live music venue \u2014 a converted warehouse across the Rh\u00f4ne in Villeurbanne where the sound is excellent and the crowd knows every song.",st:"Le Transbordeur sits in an industrial zone in Villeurbanne, just across the Rh\u00f4ne from the city centre. It\'s a converted warehouse with a capacity of about 1,500, and it books acts that are too big for clubs and too interesting for arenas. The programme leans towards indie, electronic, rap, and world music, with occasional jazz and metal.\n\nThe sound system is excellent \u2014 the room was designed for live music, not repurposed from something else. The crowd skews young and Lyonnais, the bar prices are reasonable, and the atmosphere on a sold-out night has the energy of a city that takes its live music seriously.\n\nGetting home afterwards is the only challenge \u2014 the venue is not near a metro station, and taxis fill up fast.",im:"A converted warehouse, the bass hitting your chest, 1,500 people who all knew about this show before you did, and the walk back to the tram afterwards in the cold air.",t:"3 Boulevard de Stalingrad, Villeurbanne. Tram T1 to Cit\u00e9 Internationale or Bus C1. Tickets via letransbordeur.fr. Most shows \u20ac15\u2013\u20ac35. Check transport home before going \u2014 last trams run ~midnight.",c:["local"],r:"g",nn:"Le Transbordeur",ns:"La meilleure salle de musique live ind\u00e9pendante de Lyon \u2014 un entrep\u00f4t converti \u00e0 Villeurbanne o\u00f9 le son est excellent.",nst:"Le Transbordeur est dans une zone industrielle \u00e0 Villeurbanne. C\'est un entrep\u00f4t converti d\'environ 1 500 places, avec une programmation qui penche vers l\'indie, l\'\u00e9lectro, le rap et les musiques du monde.\n\nLe syst\u00e8me son est excellent. La foule est jeune et lyonnaise, les prix du bar raisonnables.",nt:"3 bd de Stalingrad, Villeurbanne. Tram T1 Cit\u00e9 Internationale ou Bus C1. Billets via letransbordeur.fr. ~15\u20ac\u201335\u20ac. V\u00e9rifier les transports du retour."},
{id:99,n:"Mus\u00e9e Gallo-Romain de Fourvi\u00e8re",a:"Fourvi\u00e8re",v:["history","hidden"],d:60,s:"Built into the hillside next to the Roman theatres, this museum descends underground through the archaeological layers \u2014 the Claudian Table is reason enough.",st:"The Mus\u00e9e Gallo-Romain is built into the Fourvi\u00e8re hill, its ramps descending through the geology like an archaeological dig made permanent. Each level takes you deeper into the history of Lugdunum \u2014 from the founding of the city in 43 BCE through its rise as the capital of the three Gauls.\n\nThe centrepiece is the Claudian Table \u2014 a bronze tablet inscribed with a speech by Emperor Claudius to the Roman Senate in 48 CE, arguing that Gauls should be admitted to the Senate. The original tablet was found in Lyon in 1528 and is displayed here. The speech itself is preserved by Tacitus, but the bronze is the actual object \u2014 the physical record of a Roman emperor\'s words, touched by the hands that inscribed them.\n\nThe museum is small enough to see in an hour and dense enough to spend two.",im:"A ramp descending into a hillside, Roman mosaics on the walls, a 2,000-year-old bronze tablet with an emperor\'s handwriting, and the strange intimacy of reading someone\'s political speech across twenty centuries.",t:"17 Rue Cl\u00e9berg, 5th arr. Next to the Roman theatres. \u20ac4, free under 18. Tue\u2013Sun 10am\u20136pm. Funicular to Fourvi\u00e8re. Combine with the theatres (free) for a full visit.",c:["history_big","nerd"],r:"g",nn:"Mus\u00e9e Gallo-Romain de Fourvi\u00e8re",ns:"Construit dans la colline \u00e0 c\u00f4t\u00e9 des th\u00e9\u00e2tres romains, ce mus\u00e9e descend sous terre \u00e0 travers les couches arch\u00e9ologiques \u2014 la Table Claudienne est une raison suffisante.",nst:"Le mus\u00e9e est construit dans la colline de Fourvi\u00e8re, ses rampes descendant \u00e0 travers la g\u00e9ologie. Chaque niveau vous entra\u00eene plus profond\u00e9ment dans l\'histoire de Lugdunum.\n\nLa pi\u00e8ce ma\u00eetresse est la Table Claudienne \u2014 une tablette de bronze grav\u00e9e d\'un discours de l\'empereur Claude au S\u00e9nat romain en 48 ap. J.-C. L\'objet original, trouv\u00e9 \u00e0 Lyon en 1528.",nt:"17 rue Cl\u00e9berg, 5e. \u00c0 c\u00f4t\u00e9 des th\u00e9\u00e2tres romains. 4\u20ac, gratuit \u2013 18 ans. Mar\u2013dim 10h\u201318h. Funiculaire Fourvi\u00e8re."},
{id:100,n:"Mont Cindre",a:"Beyond Lyon",v:["hidden","beautiful","nature","quiet","free entry"],d:60,s:"The highest point near Lyon \u2014 a 30-minute drive or bus ride to a hilltop with 360-degree views of the city, the Sa\u00f4ne valley, and the Alps.",st:"Mont Cindre rises 469 metres above the west bank of the Sa\u00f4ne, in the commune of Saint-Cyr-au-Mont-d\'Or. The summit is accessible by car, by bus, or by a hiking trail that climbs through forest from the village. From the top, the view is 360 degrees: Lyon spread to the east, the Sa\u00f4ne valley to the south, the Monts du Lyonnais to the west, and the Alps to the east, with Mont Blanc visible on clear days.\n\nThe summit has a small chapel, some benches, and nothing else. No caf\u00e9, no gift shop, no entrance fee. In the evening, when the city lights come on and the Alps fade to silhouette, the view is one of the best in the Lyon region. Paragliders launch from the slopes on weekends.",im:"Standing at the top of a hill with the entire city of Lyon below you, two rivers visible, the Alps on one side, green hills on the other, and the wind doing whatever wind does at 469 metres.",t:"Bus 43 from Gare de Vaise to Saint-Cyr, then 30-minute walk uphill. Or drive \u2014 parking at the summit. Free. Best at sunset or on clear mornings for the Alps view. Hiking trails start from the village.",c:["nature","high_spots","day_trips"],r:"g",nn:"Mont Cindre",ns:"Le point culminant pr\u00e8s de Lyon \u2014 un sommet avec vue \u00e0 360\u00b0 sur la ville, la vall\u00e9e de la Sa\u00f4ne et les Alpes.",nst:"Le Mont Cindre culmine \u00e0 469 m\u00e8tres au-dessus de la rive ouest de la Sa\u00f4ne. Depuis le sommet, la vue est \u00e0 360\u00b0 : Lyon \u00e0 l\'est, la vall\u00e9e de la Sa\u00f4ne au sud, les Monts du Lyonnais \u00e0 l\'ouest, les Alpes \u00e0 l\'est avec le Mont Blanc par temps clair.\n\nAu sommet : une petite chapelle, quelques bancs, rien d\'autre. Le soir, quand les lumi\u00e8res de la ville s\'allument, la vue est l\'une des meilleures de la r\u00e9gion.",nt:"Bus 43 depuis Gare de Vaise, puis 30 min de marche. Ou en voiture. Gratuit. Id\u00e9al au coucher du soleil ou par temps clair pour les Alpes."},
{id:101,n:"Pont Raymond Barre at Sunset",a:"Confluence",v:["beautiful","quiet","romantic_water","free entry"],d:15,s:"A modern pedestrian and tram bridge at the Confluence \u2014 the best spot to watch the sun set behind the Fourvi\u00e8re hill with both rivers in view.",st:"The Pont Raymond Barre crosses the Rh\u00f4ne at the Confluence, carrying the T1 tram and a wide pedestrian walkway. The bridge is nothing special architecturally. What makes it exceptional is the view west at sunset: the Fourvi\u00e8re hill with the Basilica and the Metallic Tower silhouetted against the sky, the Sa\u00f4ne merging into the Rh\u00f4ne to your left, and the water turning copper and gold.\n\nThe bridge is wide enough to stop and stand without blocking anyone. On summer evenings, people lean on the railings and watch. Nobody planned this as a viewpoint. It just happens to be in the right place at the right time of day.",im:"Leaning on a bridge railing, the Fourvi\u00e8re silhouette black against an orange sky, the Rh\u00f4ne running gold beneath you, a tram passing behind you, and the sense that this view was an accident of engineering.",t:"Tram T1 across the bridge (Mus\u00e9e des Confluences stop). Or walk from Quai Perrache. Free. Best at sunset facing west. Works any time of year.",c:["romantic_water","high_spots"],r:"g",nn:"Pont Raymond Barre au coucher du soleil",ns:"Un pont moderne au Confluent \u2014 le meilleur endroit pour regarder le soleil se coucher derri\u00e8re Fourvi\u00e8re avec les deux fleuves en vue.",nst:"Le Pont Raymond Barre traverse le Rh\u00f4ne au Confluent. Ce qui le rend exceptionnel, c\'est la vue vers l\'ouest au coucher du soleil : Fourvi\u00e8re avec la Basilique et la Tour m\u00e9tallique en silhouette, la Sa\u00f4ne qui se fond dans le Rh\u00f4ne, et l\'eau qui devient cuivr\u00e9e et dor\u00e9e.\n\nPersonne n\'a pr\u00e9vu cet endroit comme point de vue. Il se trouve juste au bon endroit au bon moment de la journ\u00e9e.",nt:"Tram T1 (arr\u00eat Mus\u00e9e des Confluences) ou marche depuis quai Perrache. Gratuit. Id\u00e9al au coucher du soleil face \u00e0 l\'ouest."},
{id:102,n:"Jardin arch\u00e9ologique Saint-Jean",a:"Vieux Lyon",v:["hidden","history","quiet","free entry"],d:10,s:"The ruins of three churches layered on top of each other, visible through glass at ground level \u2014 next to the cathedral but missed by almost everyone.",st:"Right next to the Cath\u00e9drale Saint-Jean, at ground level, a glass-covered archaeological garden reveals the foundations of three successive churches built on the same site between the 4th and 11th centuries. The oldest layer is a 4th-century baptistery \u2014 one of the first in Gaul. Above it, a 6th-century church. Above that, an 11th-century choir.\n\nThe site is open to the sky, protected by low walls and glass panels. You can look down into it from street level, or enter the small surrounding garden. Almost nobody stops. The tour groups heading into the cathedral walk straight past. But if you pause for two minutes, you\'re looking at 1,600 years of Christian architecture stacked like geological layers.",im:"Three churches visible at once \u2014 the 4th-century baptistery at the bottom, the 6th-century walls above it, the 11th-century choir on top \u2014 all framed by glass and ignored by everyone walking past.",t:"Next to the Cath\u00e9drale Saint-Jean, on the north side. M\u00e9tro D, Vieux Lyon. Free, always visible. Small interpretive panels in French and English.",c:["history_big","nerd"],r:"g",nn:"Jardin arch\u00e9ologique Saint-Jean",ns:"Les ruines de trois \u00e9glises superpos\u00e9es, visibles \u00e0 travers le verre au niveau du sol \u2014 \u00e0 c\u00f4t\u00e9 de la cath\u00e9drale mais rat\u00e9 par presque tout le monde.",nst:"\u00c0 c\u00f4t\u00e9 de la cath\u00e9drale Saint-Jean, un jardin arch\u00e9ologique r\u00e9v\u00e8le les fondations de trois \u00e9glises successives construites entre le IVe et le XIe si\u00e8cle. La couche la plus ancienne est un bapt\u00e8re du IVe si\u00e8cle.\n\nPresque personne ne s\'arr\u00eate. Mais si vous prenez deux minutes, vous regardez 1 600 ans d\'architecture chr\u00e9tienne empil\u00e9e comme des couches g\u00e9ologiques.",nt:"\u00c0 c\u00f4t\u00e9 de la Cath\u00e9drale Saint-Jean, c\u00f4t\u00e9 nord. M\u00e9tro D Vieux Lyon. Gratuit. Panneaux en fran\u00e7ais et anglais."},
{id:103,n:"Place Bellecour",a:"Presqu\'\u00eele",v:["famous","free entry"],d:15,s:"One of the largest open squares in Europe \u2014 not beautiful, not ugly, just enormous, with a Louis XIV on a horse and a Saint-Exup\u00e9ry statue that nobody notices.",st:"Place Bellecour is the largest pedestrian square in France and one of the largest in Europe. It\'s also strikingly empty \u2014 no trees, no benches in the main area, just red gravel and a statue of Louis XIV on a horse. The square functions more as a crossing point than a destination. Lyonnais use it for orientation (\u2018I\'ll meet you at Bellecour\u2019) rather than recreation.\n\nBut the scale is impressive. Standing in the centre, the Fourvi\u00e8re hill rises to the west, the Presqu\'\u00eele stretches north and south, and the sense of space is rare for a European city centre. The Saint-Exup\u00e9ry and Little Prince statue sits at the southwest corner, overlooked by almost everyone. The tourist office at the southeast corner has free traboule maps.",im:"Red gravel stretching in every direction, a bronze king on a bronze horse at the centre, the Fourvi\u00e8re hill framing the western edge, and the realisation that this square is bigger than many villages.",t:"M\u00e9tro A or D, Bellecour. Free. Tourist office on the southeast corner has free maps and traboule guides. The Saint-Exup\u00e9ry statue is at the southwest corner, under the trees.",c:["neighbourhoods"],r:"g",nn:"Place Bellecour",ns:"L\'une des plus grandes places ouvertes d\'Europe \u2014 ni belle ni laide, juste \u00e9norme, avec un Louis XIV \u00e0 cheval et une statue de Saint-Exup\u00e9ry que personne ne remarque.",nst:"La Place Bellecour est la plus grande place pi\u00e9tonne de France. Elle est aussi \u00e9tonnamment vide \u2014 pas d\'arbres, pas de bancs, juste du gravier rouge et un Louis XIV \u00e0 cheval. Les Lyonnais l\'utilisent comme point de rep\u00e8re plut\u00f4t que comme destination.\n\nLa statue de Saint-Exup\u00e9ry et du Petit Prince est au coin sud-ouest, ignor\u00e9e par presque tout le monde. L\'office de tourisme distribue des plans de traboules gratuits.",nt:"M\u00e9tro A ou D Bellecour. Gratuit. Office de tourisme au coin sud-est pour plans et guides traboules. Statue Saint-Exup\u00e9ry au sud-ouest."},
{id:104,n:"Fort de Vaise",a:"Sa\u00f4ne Valley",v:["hidden","quiet","free entry"],d:20,s:"Another of Lyon\'s forgotten 19th-century forts \u2014 this one converted into a community garden and urban farm on the heights above Vaise.",st:"Fort de Vaise was built in the 1840s as part of Lyon\'s outer ring of fortifications. Unlike the more accessible Fort de Loyasse, this one has been partly converted into a community space \u2014 community gardens, an urban farm project, and an association that organises cultural events in the old military buildings.\n\nThe fort sits on a hill above the Vaise neighbourhood, accessible by a steep path from the bottom or a gentler road from the top. The views over the Sa\u00f4ne valley and towards the Monts du Lyonnais are wide and quiet. The community gardens are tended by local families, and on open days you can walk through the old fortifications and the planted terraces.\n\nIt\'s the kind of place that only exists because someone decided that an abandoned fort could become something better than a ruin.",im:"Vegetable plots growing inside 19th-century fortification walls, a child watering tomatoes where soldiers once stood guard, the Sa\u00f4ne valley spread below.",t:"Above Vaise \u2014 walk up from M\u00e9tro D Gare de Vaise (~15 min uphill). Free. Open days vary \u2014 check with the association Fort de Vaise. The gardens are most active Apr\u2013Oct.",c:["parks","nature","abandoned"],r:"g",nn:"Fort de Vaise",ns:"Un autre fort oubli\u00e9 du XIXe si\u00e8cle \u2014 celui-ci converti en jardin partag\u00e9 et ferme urbaine sur les hauteurs de Vaise.",nst:"Le Fort de Vaise a \u00e9t\u00e9 construit dans les ann\u00e9es 1840. Il a \u00e9t\u00e9 partiellement converti en espace communautaire \u2014 jardins partag\u00e9s, projet de ferme urbaine, et \u00e9v\u00e9nements culturels dans les anciens b\u00e2timents militaires.\n\nLes vues sur la vall\u00e9e de la Sa\u00f4ne sont larges et calmes. Les jardins sont entretenus par des familles du quartier.",nt:"Au-dessus de Vaise \u2014 monter depuis M\u00e9tro D Gare de Vaise (~15 min). Gratuit. Jours d\'ouverture variables. Jardins actifs avr\u2013oct."},
{id:105,n:"Cit\u00e9 Internationale \u2014 Renzo Piano",a:"T\u00eate d\'Or",v:["hidden","beautiful","quiet"],d:20,s:"A Renzo Piano-designed complex between the T\u00eate d\'Or park and the Rh\u00f4ne \u2014 terracotta facades, a cinema, a casino, and some of the best modern architecture in Lyon.",st:"The Cit\u00e9 Internationale sits between the Parc de la T\u00eate d\'Or and the Rh\u00f4ne, on the site of a former international fairground. Renzo Piano \u2014 the architect of the Centre Pompidou and The Shard \u2014 designed it in the 1990s as a mixed-use complex: congress centre, hotel, cinema, shops, offices, and the Mus\u00e9e d\'Art Contemporain.\n\nThe architecture is all terracotta, glass, and clean lines \u2014 warm and angular in a way that feels distinctly Mediterranean despite Lyon\'s continental climate. The pedestrian promenade along the Rh\u00f4ne side is one of the best-designed public spaces in the city \u2014 wide, shaded, with the river on one side and Piano\'s facades on the other.\n\nAlmost nobody comes here for the architecture. They should.",im:"Terracotta facades catching the evening sun, the Rh\u00f4ne running past, the T\u00eate d\'Or park visible through a gap between buildings, and the clean geometry of an architect who knows how to make a building feel warm.",t:"Tram T1 to Cit\u00e9 Internationale \u2014 Transbordeur, or walk from the T\u00eate d\'Or north gate. Free to walk through. The Mus\u00e9e d\'Art Contemporain is here (\u20ac6, check macLYON.com).",c:["free_culture"],r:"g",nn:"Cit\u00e9 Internationale \u2014 Renzo Piano",ns:"Un complexe de Renzo Piano entre le parc de la T\u00eate d\'Or et le Rh\u00f4ne \u2014 fa\u00e7ades en terre cuite, cin\u00e9ma, et l\'une des meilleures architectures modernes de Lyon.",nst:"La Cit\u00e9 Internationale est entre le Parc de la T\u00eate d\'Or et le Rh\u00f4ne. Renzo Piano l\'a con\u00e7ue dans les ann\u00e9es 1990 \u2014 centre de congr\u00e8s, h\u00f4tel, cin\u00e9ma, commerces, Mus\u00e9e d\'Art Contemporain.\n\nL\'architecture en terre cuite, verre et lignes nettes est chaude et angulaire. La promenade pi\u00e9tonne le long du Rh\u00f4ne est l\'un des meilleurs espaces publics de la ville.",nt:"Tram T1 Cit\u00e9 Internationale ou marche depuis la T\u00eate d\'Or. Gratuit pour se promener. Mus\u00e9e d\'Art Contemporain : 6\u20ac, voir macLYON.com."},
{id:106,n:"Couloir de la Chimie \u2014 Industrial Rh\u00f4ne",a:"Beyond Lyon",v:["weird","hidden"],d:20,s:"The industrial corridor south of Lyon along the Rh\u00f4ne \u2014 chemical plants, refineries, and cooling towers stretching to the horizon. Not beautiful. Strangely compelling.",st:"South of the Confluence, the Rh\u00f4ne passes through one of the densest industrial corridors in France. Chemical plants, oil refineries, and cooling towers line both banks for about 20 kilometres, from Pierre-B\u00e9nite to Givors. The locals call it the Couloir de la Chimie \u2014 the Chemistry Corridor.\n\nIt\'s not a tourist destination. But if you take the TER south towards Vienne and look out the window, the landscape is extraordinary in its way \u2014 vast, metallic, and humming with a kind of energy that cities don\'t produce. The cooling towers of Feyzin refinery, steaming against the sky, have an accidental grandeur. The contrast with the Fourvi\u00e8re Basilica, 15 kilometres north, is total.\n\nLyon\'s wealth wasn\'t built only on silk and gastronomy. This corridor is the other story.",im:"A cooling tower steaming against a grey sky, pipelines crossing the Rh\u00f4ne on a steel bridge, the smell of something chemical in the air, and the realisation that this is what pays for the pretty parts.",t:"TER from Part-Dieu or Perrache towards Vienne \u2014 window seat, right side. Or drive the D315 south along the Rh\u00f4ne. Free to see from the train. Not a walking destination.",c:["weird"],r:"g",nn:"Couloir de la Chimie",ns:"Le corridor industriel au sud de Lyon le long du Rh\u00f4ne \u2014 usines chimiques, raffineries et tours de refroidissement \u00e0 perte de vue. Pas beau. \u00c9trangement fascinant.",nst:"Au sud du Confluent, le Rh\u00f4ne traverse l\'un des corridors industriels les plus denses de France. Usines chimiques, raffineries, tours de refroidissement s\'\u00e9tirent sur 20 kilom\u00e8tres.\n\nCe n\'est pas une destination touristique. Mais depuis le TER vers Vienne, le paysage a une grandeur accidentelle. La richesse de Lyon ne s\'est pas construite seulement sur la soie et la gastronomie.",nt:"TER depuis Part-Dieu vers Vienne \u2014 place c\u00f4t\u00e9 fen\u00eatre droite. Ou conduire la D315 vers le sud. Visible gratuitement depuis le train."},
{id:107,n:"L\'\u00cele du Souvenir \u2014 T\u00eate d\'Or Lake Island",a:"T\u00eate d\'Or",v:["hidden","quiet","history","free entry"],d:10,s:"A small island in the T\u00eate d\'Or lake accessible by a stone footbridge \u2014 a WWI memorial, weeping willows, and the quietest spot in the busiest park in Lyon.",st:"In the middle of the T\u00eate d\'Or lake sits a small island connected to the shore by a stone footbridge. The \u00cele du Souvenir \u2014 the Island of Memory \u2014 is a war memorial created after World War I. At its centre, a monument lists the names of Lyonnais killed in the wars. Around it, weeping willows trail into the water and the sound of the park fades to silence.\n\nMost people rowing on the lake never land here. Most people walking around the lake never cross the bridge. The island exists as a pocket of stillness in the middle of the most popular park in Lyon \u2014 a place designed for reflection that accidentally became the quietest bench in the city.",im:"A stone footbridge to an island nobody visits, weeping willows touching the water, a memorial with names you don\'t recognise, and the sound of the park entirely gone.",t:"Stone footbridge on the west side of the T\u00eate d\'Or lake, near the Porte des Enfants du Rh\u00f4ne. Free, always open during park hours. Two minutes to cross, as long as you want to stay.",c:["parks","history_big"],r:"g",nn:"\u00cele du Souvenir \u2014 Lac de la T\u00eate d\'Or",ns:"Une petite \u00eele dans le lac de la T\u00eate d\'Or, accessible par une passerelle \u2014 un m\u00e9morial de la Premi\u00e8re Guerre, des saules pleureurs, et le point le plus calme du parc.",nst:"Au milieu du lac de la T\u00eate d\'Or, une petite \u00eele reli\u00e9e \u00e0 la rive par une passerelle de pierre. L\'\u00cele du Souvenir est un m\u00e9morial cr\u00e9\u00e9 apr\u00e8s la Premi\u00e8re Guerre mondiale. Des saules pleureurs tra\u00eenent dans l\'eau et le bruit du parc dispara\u00eet.\n\nLa plupart des gens ne traversent jamais le pont. L\'\u00eele est une poche de silence au milieu du parc le plus fr\u00e9quent\u00e9 de Lyon.",nt:"Passerelle c\u00f4t\u00e9 ouest du lac, pr\u00e8s de la Porte des Enfants du Rh\u00f4ne. Gratuit. Ouvert aux heures du parc."},
