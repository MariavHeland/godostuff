@keyframes finalLand{0%{opacity:0;transform:scale(.75) translateY(28px)}65%{transform:scale(1.08) translateY(-4px)}85%{transform:scale(.97) translateY(2px)}100%{opacity:1;transform:scale(1) translateY(0)}}

<script>
const P = [
  {id:1,n:"Monteliusvägen Cliff Walk — Södermalm",a:"Södermalm",v:["beautiful","hidden","free"],d:15,s:"Clifftop path above the water — City Hall, Riddarholmen and the whole archipelago at once",st:"The path runs along the edge of the Söder Heights. Stockholm is built on islands and here you see all of them at once. Come at golden hour. Locals walk their dogs here every day.",im:"Time-travel: Södermalm as a working-class island 100 years ago, before the artists arrived",t:"Free always. Enter from Blecktornsgränd. Best at 6–8pm.",c:["high_spots"],r:"g",nn:"Monteliusvägen — Södermalm",ns:"Klippväg ovan vattnet — Stadshuset, Riddarholmen och hela skärgården på en gång",nst:"Vägen löper längs kanten av Södermalm. Stockholm är byggt på öar och här ser du dem alla på en gång.",nt:"Alltid gratis. Ingång från Blecktornsgränd. Bäst 18–20."},
  {id:2,n:"Långholmen Island Swim — Södermalm",a:"Södermalm",v:["local","nature","free"],d:20,s:"A former prison island with the best free swimming beaches in the city — locals know this",st:"Långholmen prison closed in 1975. The island is now a park with flat granite rocks and a sand beach. Swim on the west side. The old prison cells are now a hotel. The inmates swam too.",im:"Time-travel: prisoners watching free Stockholm citizens swim just beyond the walls, 1960",t:"Free. Walk from Hornstull or Söder Mälarstrand. Bring a towel.",c:["local_only"],r:"g",nn:"Långholmen — Södermalm",ns:"En tidigare fängelseö med stadens bästa gratis simstränder — lokalbefolkningen vet om det",nst:"Långholmen fängelse stängde 1975. Ön är nu en park med platta granitklippor och en sandstrand.",nt:"Gratis. Gå från Hornstull eller Söder Mälarstrand. Ta med en handduk."},
  {id:3,n:"Trekanten Lake — Liljeholmen",a:"Liljeholmen",v:["hidden","local","nature"],d:30,s:"A mirror-still lake in the southwest, surrounded by pines — locals swim here all summer",st:"Trekanten is the triangle-shaped lake between Liljeholmen and Hägersten. Pine trees go right to the water\'s edge. Granite rocks for jumping. Almost completely unknown to tourists.",im:"Time-travel: this lake as a natural hollow in farmland before the suburb grew around it, 1910",t:"Free. T-bana to Liljeholmen then 10 min walk. Weekday afternoons are quiet.",c:["parks"],r:"g",nn:"Trekanten — Liljeholmen",ns:"En spegelstilla sjö i sydväst, omgiven av tallar — lokalbefolkningen simmar här hela sommaren",nst:"Trekanten är den triangulärt formade sjön mellan Liljeholmen och Hägersten.",nt:"Gratis. T-bana till Liljeholmen sedan 10 min promenad. Vardagseftermiddagar är lugna."},
  {id:4,n:"Kulturhuset Stadsteatern — Norrmalm",a:"Norrmalm",v:["free","local","art"],d:5,s:"Seven floors of free culture on Sergels Torg — galleries, reading rooms, youth spaces, rooftop",st:"Kulturhuset was built in 1974 as Stockholm\'s public living room. Most of it is free. The reading rooms have Swedish magazines and newspapers. The top floor looks straight down at the fountain.",im:"Time-travel: the building opening in 1974, controversial and modern, the city debating it",t:"Free. Open daily. The rooftop terrace has the best Sergels Torg view.",c:["free_museum"],r:"g",nn:"Kulturhuset — Norrmalm",ns:"Sju våningar gratis kultur vid Sergels Torg — gallerier, läsrum, ungdomsutrymmen, takterrass",nst:"Kulturhuset byggdes 1974 som Stockholms publika vardagsrum. Det mesta är gratis.",nt:"Gratis. Öppet dagligen. Takterrassen har den bästa Sergels Torg-utsikten."},
  {id:5,n:"Drottningholm Palace Park — Lovön",a:"Lidingö",v:["beautiful","history","nature"],d:40,s:"The royal family\'s actual home — a UNESCO park you reach by boat from City Hall",st:"The Drottningholm boat from City Hall pier takes 50 minutes. The baroque park is free. The palace gardens and Chinese Pavilion are extraordinary. This is where the Swedish royal family lives.",im:"Time-travel: the Swedish court arriving here by barge from Stockholm in 1750, the summer season beginning",t:"Boat from City Hall (fee) or bus 176. Park free. Palace has entry fee.",c:["parks"],r:"g",nn:"Drottningholms slottsträdgård — Lovön",ns:"Kungafamiljens faktiska hem — en UNESCO-park du når med båt från Stadshuset",nst:"Drottningholmsbåten från Stadshuskajen tar 50 minuter. Den barocka parken är gratis.",nt:"Båt från Stadshuset (avgift) eller buss 176. Park gratis. Palatset har inträde."},
  {id:6,n:"Koppartälten Sculptures — Vasastan",a:"Vasastan",v:["hidden","art","beautiful"],d:20,s:"Strange copper-tent sculptures in a quiet park that most Stockholmers walk past without knowing",st:"The Koppartälten are three abstract copper sculptures in Vasaparken that have been here since 1970. The park itself is where Vasastan families bring their children. The sculptures have no label.",im:"Time-travel: the sculptures being installed in this park in 1970 while Stockholmers debated whether they were art",t:"Free. Vasaparken is open always.",c:["street_art"],r:"g",nn:"Koppartälten — Vasastan",ns:"Märkliga kopparskulpturer i en tyst park som de flesta stockholmare passerar utan att märka",nst:"Koppartälten är tre abstrakta kopparskulpturer i Vasaparken som funnits sedan 1970.",nt:"Gratis. Vasaparken är alltid öppen."},
  {id:7,n:"Kräftriket Nature Reserve — Vasastan",a:"Vasastan",v:["nature","hidden","local"],d:25,s:"Wild nature reserve 15 minutes from the city centre — crayfish, herons, walking trails",st:"Kräftriket sits between the university campus and Brunnsviken lake. Old woodland, marsh, and open water. The name means \"crayfish kingdom.\" Crayfish still live in the creek.",im:"Time-travel: Stockholm University students having crayfish parties here by candlelight in the 1960s",t:"Free. Enter from Frescativägen near Stockholm University.",c:["parks"],r:"g",nn:"Kräftriket naturreservat — Vasastan",ns:"Vilt naturreservat 15 minuter från stadskärnan — kräftor, häger, vandringsled",nst:"Kräftriket ligger mellan universitetsområdet och Brunnsviken. Gammal skog, kärr och öppet vatten.",nt:"Gratis. Ingång från Frescativägen nära Stockholms universitet."},
  {id:8,n:"Local Bus Ferries — Djurgården",a:"Djurgården",v:["local","weird","beautiful"],d:10,s:"Take Djurgårdslinjen ferry with a regular SL ticket — the cheapest harbour cruise in the city",st:"Line 80 connects Slussen, Djurgården and Skeppsholmen. A single SL metro ticket covers it. Locals use it to cross the water. Tourists pay ten times more for the tourist boats.",im:"Time-travel: the original horse-drawn ferry crossing from Slussen to Djurgården, 1880",t:"Use your regular SL card. Line 80. Runs every 10 minutes in summer.",c:["local_only"],r:"g",nn:"Lokala färjor — Djurgården",ns:"Ta Djurgårdslinjen med ett vanligt SL-kort — stadens billigaste hamnkryssning",nst:"Linje 80 förbinder Slussen, Djurgården och Skeppsholmen. Gratis med SL-kort.",nt:"Använd ditt vanliga SL-kort. Linje 80. Avgår var 10:e minut på sommaren."},
  {id:9,n:"Riddarhuset — Gamla Stan",a:"Gamla Stan",v:["history","beautiful","hidden"],d:5,s:"The House of Nobility — 2,300 coats of arms cover every wall and ceiling",st:"Built in 1674 as the parliament of the Swedish nobility. The Great Hall has every noble family\'s coat of arms, floor to ceiling. Few visitors find it. The courtyard is free.",im:"Time-travel: the Swedish nobility debating war and succession in this hall, 1700",t:"Courtyard always free. Interior has a small fee. Worth it.",c:["architecture"],r:"g",nn:"Riddarhuset — Gamla Stan",ns:"Riddarhuset — 2 300 vapensköldar täcker varje vägg och tak",nst:"Byggt 1674 som den svenska adelns parlament. Stora salen har varje adelsfamiljs vapensköld.",nt:"Innergården alltid gratis. Interiören kostar lite. Värt det."},
  {id:10,n:"Skinnarviksberget — Södermalm",a:"Södermalm",v:["local","quiet","beautiful"],d:20,s:"The highest natural point in Stockholm — locals gather here every evening to watch the sunset",st:"No railing, no café, no signs. Just a flat rock at the top of Söder with the whole city below. Teenagers, pensioners and dogs share it equally.",im:"Time-travel: this hilltop as farmland before the city spread, 1800",t:"Always free. Walk up from Ringvägen. Bring something to drink.",c:["local_only"],r:"g",nn:"Skinnarviksberget — Södermalm",ns:"Stockholms högsta naturliga punkt — lokalbefolkningen samlas här varje kväll",nst:"Inget räcke, inget café, inga skyltar. Bara en flat klippa med hela staden nedanför.",nt:"Alltid gratis. Gå upp från Ringvägen. Ta med något att dricka."},
  {id:11,n:"Inner City Basketball Courts — Vasastan",a:"Vasastan",v:["local","free","sport"],d:20,s:"Open basketball courts at Vanadisplan — summer leagues, pickup games, free to join",st:"The Vanadisplan courts are the heartbeat of Stockholm street basketball. Summer evenings have serious pickup games. No fee, no registration. Bring your shoes.",im:"Time-travel: these courts in the 1980s, the first generation of Stockholm streetball players",t:"Free. Open daily. Best weekday evenings and weekend afternoons.",c:["local_only"],r:"g",nn:"Basketplanerna vid Vanadisplan — Vasastan",ns:"Öppna basketplaner vid Vanadisplan — sommarläger, pickup-spel, gratis att delta",nst:"Vanadisplan-planerna är pulsen i Stockholms gatabasket. Kvällarna har serier pickup-spel.",nt:"Gratis. Öppet dagligen. Bäst vardagskvällar och helgeftermiddagar."},
  {id:12,n:"Stadsbiblioteket — Vasastan",a:"Vasastan",v:["beautiful","quiet","architecture"],d:15,s:"Asplund\'s 1928 library — a perfect cylinder of books rising through the rotunda",st:"Gunnar Asplund designed this as a Nordic classicist masterpiece. The main hall is a full cylinder lined floor-to-ceiling with books. Walk in and look straight up. Free.",im:"Time-travel: the opening of the library in 1928, Stockholmers filing in to borrow the first books",t:"Free. Open during library hours. The top-level reading room is the best.",c:["architecture"],r:"g",nn:"Stadsbiblioteket — Vasastan",ns:"Asplunds bibliotek från 1928 — en perfekt cylinder av böcker som reser sig genom rotundan",nst:"Gunnar Asplund ritade detta som ett nordiskt klassicistiskt mästerverk.",nt:"Gratis. Öppet under bibliotekets öppettider."},
  {id:13,n:"Fredhällsklipporna Swim — Kungsholmen",a:"Kungsholmen",v:["nature","local","free"],d:25,s:"Wild swimming rocks at the tip of Kungsholmen — best free swim in the city, locals only",st:"Flat granite rocks at the water\'s edge, facing Mälarens open water. Divers, swimmers, sunbathers. No lifeguards, no facilities, no tourists. A Stockholm summer.",im:"Time-travel: factory workers bathing from these same rocks after shifts, 1910",t:"Free. Summer only. Walk from Fridhemsplan 15 min.",c:["parks"],r:"g",nn:"Fredhällsklipporna — Kungsholmen",ns:"Vilda badklippor vid spetsen av Kungsholmen — bästa gratis simning, bara lokalbefolkning",nst:"Platta granitklippor vid vattenbrynet med utsikt mot Mälarens öppna vatten.",nt:"Gratis. Bara sommar. Gå från Fridhemsplan 15 min."},
  {id:14,n:"Rosendal Garden — Djurgården",a:"Djurgården",v:["hidden","nature","beautiful"],d:30,s:"Biodynamic kitchen garden inside the royal park — free to walk, extraordinary in summer",st:"The palace kitchen garden runs biodynamically. Greenhouses, vegetable beds, fruit trees. The café uses everything grown here. The garden is free.",im:"Time-travel: royal gardeners planting the first beds here for the 18th century court kitchen",t:"Garden free. Café worth every krona. Open daily in season.",c:["parks"],r:"g",nn:"Rosendalsträdgård — Djurgården",ns:"Biodynamisk köksträdgård i kungaparken — gratis att gå i, extraordinär på sommaren",nst:"Palatsets köksträdgård drivs biodynamiskt. Växthus, odlingsbäddar, fruktträd.",nt:"Trädgård gratis. Caféet värt varje krona. Öppen dagligen i säsong."},
  {id:15,n:"Rålambshovs Park Thursday Dance — Kungsholmen",a:"Kungsholmen",v:["local","weird","free"],d:20,s:"Every Thursday in summer, strangers dance swing on the park lawn for free — seriously",st:"Rålis Thursday folk dance is one of Stockholm\'s most beloved traditions. A DJ plays swing and jazz. Complete strangers pair up. All ages. Free to join. It starts at 6pm.",im:"Time-travel: 1930s Stockholm workers dancing here on the first free Saturdays after the working week shortened",t:"Free. Thursdays 6pm June–August. Just show up and join.",c:["local_only"],r:"g",nn:"Rålambshovsparken torsdagsdansen — Kungsholmen",ns:"Varje torsdag på sommaren dansar främlingar swing på gräsmattan gratis — på riktigt",nst:"Rålis torsdagsdans är en av Stockholms mest älskade traditioner. DJ spelar swing och jazz.",nt:"Gratis. Torsdagar 18:00 juni–augusti. Dyk bara upp och delta."},
  {id:16,n:"Tanto Allotment Hill — Södermalm",a:"Södermalm",v:["hidden","nature","local"],d:25,s:"Stockholm\'s oldest allotment colony — tiny wooden houses and gardens on a hillside since 1919",st:"Over 200 small garden plots on the slopes of Söder. Residents paint them in Swedish folk colours. The paths between them are free to walk and the views over Mälaren are the best on Söder.",im:"Time-travel: working-class families growing their first vegetables in these plots in 1920",t:"Walk the paths freely. Respect the gardens. Peak June–August.",c:["parks"],r:"g",nn:"Tantolunden kolonilotter — Södermalm",ns:"Stockholms äldsta koloniområde — små trähus och trädgårdar i sluttning sedan 1919",nst:"Över 200 odlingslotter i Söders sluttningar. Invånarna målar dem i svenska folkfärger.",nt:"Promenera fritt längs stigarna. Respektera trädgårdarna."},
  {id:17,n:"Millesgården — Lidingö",a:"Lidingö",v:["beautiful","art","hidden"],d:45,s:"Sculptor Carl Milles\' home on a cliff above Stockholm — terraces of bronze gods over the water",st:"Carl Milles built his home and studio on the edge of a cliff on Lidingö. The terraces have his sculptures placed against the sky and water. One of the most beautiful settings in Europe.",im:"Time-travel: Milles working in this studio in 1935, surrounded by gods in bronze",t:"Small entry fee. Metro to Ropsten then bus 207. Worth the trip.",c:["architecture"],r:"g",nn:"Millesgården — Lidingö",ns:"Skulptören Carl Milles hem på en klippa ovan Stockholm — terrasser av bronsgudar över vattnet",nst:"Carl Milles byggde sitt hem och ateljé på kanten av en klippa på Lidingö.",nt:"Liten inträdesavgift. T-bana till Ropsten sedan buss 207."},
  {id:18,n:"Nacka Nature Reserve — Nacka",a:"Lidingö",v:["nature","hidden","free"],d:45,s:"Ancient forest 20 minutes from the city centre — no crowds, pure Swedish wilderness",st:"Nacka Naturreservat starts where the suburbs end. Mossy bedrock, birch and pine, small lakes. The city feels completely gone after 10 minutes walking.",im:"Time-travel: this same forest untouched for 10,000 years since the ice retreated",t:"Free. Take the Saltsjöbanan train to Neglinge. Walk into the forest.",c:["parks"],r:"g",nn:"Nacka naturreservat — Nacka",ns:"Urskog 20 minuter från stadscentrum — inga folkmassor, ren svensk vildmark",nst:"Nacka naturreservat börjar där förorterna slutar. Mossbetäckt berggrund, björk och tall.",nt:"Gratis. Ta Saltsjöbanan till Neglinge."},
  {id:19,n:"Djurgårdsbrunnsviken Canal Walk — Djurgården",a:"Djurgården",v:["nature","beautiful","quiet"],d:20,s:"A canal walk through the royal park where swans outnumber tourists",st:"The narrow canal separates Djurgården from Östermalm. In winter it freezes and Stockholm skates on it. In summer it\'s lined with rowing boats and the smell of pine.",im:"Time-travel: royal hunting parties arriving by boat at Djurgården, 1700s",t:"Enter from Djurgårdsbron. Walk east along the canal for the quietest stretch.",c:["romantic_water"],r:"g",nn:"Djurgårdsbrunnsviken — Djurgården",ns:"En kanalpromenad genom kungaparken där svanar är fler än turister",nst:"Den smala kanalen skiljer Djurgården från Östermalm. Vintertid fryser den.",nt:"Ingång från Djurgårdsbron. Gå österut längs kanalen."},
  {id:20,n:"Fjäderholmarna Day Trip — Archipelago",a:"Lidingö",v:["beautiful","nature","local"],d:30,s:"The nearest archipelago island — 25 min by boat, wild rocks, Stockholm left behind",st:"The boat from Slussen takes 25 minutes. The island has a smokehouse, a brewery and open granite for swimming. The archipelago starts here.",im:"Time-travel: Stockholm fishermen working from these islands before the city reached this far, 1880",t:"Boat from Slussen (small fee). The island itself costs nothing.",c:["romantic_water"],r:"g",nn:"Fjäderholmarna — Skärgården",ns:"Den närmaste skärgårdsön — 25 min med båt, vilda klippor, Stockholm lämnat bakom",nst:"Båten från Slussen tar 25 minuter. Ön har ett rökeri, ett bryggeri och öppen granit för simning.",nt:"Båt från Slussen (liten avgift). Ön i sig kostar ingenting."},
  {id:21,n:"Observatorielunden — Vasastan",a:"Vasastan",v:["hidden","quiet","history"],d:20,s:"Park on a hill with the 18th century observatory — students and locals, no tourists",st:"The old Stockholm Observatory (1753) stands at the top of a small forested park in Vasastan. The hill has benches, hammocks in the trees, and almost no tourists.",im:"Time-travel: astronomers charting the night sky from this hilltop in 1760",t:"Always free. The park below the observatory is the best sitting spot.",c:["history_big"],r:"g",nn:"Observatorielunden — Vasastan",ns:"Park på en kulle med 1700-talets observatorium — studenter och lokalbefolkning",nst:"Gamla Stockholmsobservatoriet (1753) kröner en liten skogklädd kulle i Vasastan.",nt:"Alltid gratis."},
  {id:22,n:"Vita Bergen Wooden Houses — Södermalm",a:"Södermalm",v:["hidden","beautiful","history"],d:20,s:"18th century wooden cottages on a rocky hill — the most photogenic corner of Söder",st:"The White Mountains district has wooden allotment houses from the 1700s on a rocky hill. The park is free. The Sofia Church crowns the top. Almost no tourists.",im:"Time-travel: 18th century poor families living in these wooden houses, the city growing around them",t:"Free. Walk from Medborgarplatsen. The church is open.",c:["architecture"],r:"g",nn:"Vita Bergen — Södermalm",ns:"1700-talsstugor i trä på en stenig kulle — Söders mest fotogeniska hörn",nst:"Vita Bergen har trä-odlingsstugor från 1700-talet på en stenig kulle.",nt:"Gratis. Gå från Medborgarplatsen."},
  {id:23,n:"Katarina Churchyard View — Södermalm",a:"Södermalm",v:["quiet","history","hidden"],d:15,s:"Hilltop churchyard with the best view in Södermalm — locals only",st:"The Katarina Church dates to 1695 and the churchyard wraps around a rocky hilltop. The graves of Stockholm working-class history. The view north is straight to the Old Town.",im:"Time-travel: the Katarina Church burning in the great Stockholm fire of 1723",t:"Always open. Free. Sit on the wall and look north.",c:["famous_dead"],r:"g",nn:"Katarina kyrkogård — Södermalm",ns:"Kullekyrka med bästa utsikten i Södermalm",nst:"Katarina kyrka härstammar från 1695 och kyrkogården slingrar sig runt en stenig kulle.",nt:"Alltid öppen. Gratis."},
  {id:24,n:"Mäster Mikaels Gata — Gamla Stan",a:"Gamla Stan",v:["hidden","quiet","local"],d:5,s:"The narrow lane tourists never find — medieval walls, uneven cobblestones, total silence",st:"While Västerlånggatan is packed with souvenir shops, this parallel lane has nothing but old walls and cats. The same buildings, zero crowds.",im:"Time-travel: a Stockholm merchant hurrying along this lane in 1550, candle in hand",t:"Find it behind Stortorget. Walk it slowly. Look up.",c:["history_big"],r:"g",nn:"Mäster Mikaels Gata — Gamla Stan",ns:"Granden som turister aldrig hittar — medeltida murar, total tystnad",nst:"Medan Västerlånggatan är full med souvenirbutiker har denna parallella gränd ingenting.",nt:"Hitta den bakom Stortorget."},
  {id:25,n:"Järntorget Bar Square — Gamla Stan",a:"Gamla Stan",v:["history","local","night"],d:5,s:"The south square of Old Town where locals actually drink — not the tourist trap north end",st:"While Stortorget gets the tourists, Järntorget is where Gamla Stan residents and Södermalm people meet. The square has been a market since the 13th century.",im:"Time-travel: the iron market in Järntorget, 1400 — traders selling metalwork from across Sweden",t:"Free to be here. Evenings are when it comes alive.",c:["local_only"],r:"g",nn:"Järntorget — Gamla Stan",ns:"Gamla Stans södra torg där lokalbefolkningen faktiskt dricker",nst:"Medan Stortorget lockar turister är Järntorget där Gamla Stan-bor och Söderfolk möts.",nt:"Gratis att vara här. Kvällen är när det vaknar till liv."},
  {id:26,n:"Stockholm Metro Art Gallery — Norrmalm",a:"Norrmalm",v:["art","hidden","free"],d:20,s:"World\'s longest art gallery — 90 T-bana stations decorated by 150 artists since 1950",st:"The Stockholm metro is officially the world\'s longest art gallery. Stations like Kungsträdgården, Solna Centrum and T-Centralen are extraordinary underground caves of murals, sculptures and mosaics. Your SL day ticket covers all of it.",im:"Time-travel: the 1956 decision to make art mandatory in every new metro station — a public investment that would last 70 years",t:"Regular SL day ticket. Kungsträdgården and Solna Centrum are the must-sees.",c:["free_museum"],r:"g",nn:"Tunnelbanans konstgalleri — Norrmalm",ns:"Världens längsta konstgalleri — 90 T-banestationer dekorerade av 150 konstnärer sedan 1950",nst:"Stockholms tunnelbana är officiellt världens längsta konstgalleri. Stationer som Kungsträdgården och Solna Centrum är extraordinära underjordiska grottor med muraler och mosaiker.",nt:"Vanligt SL-dagkort räcker. Kungsträdgården och Solna Centrum är ett måste."},
  {id:27,n:"Snösätra Graffiti Wall — Södermalm",a:"Södermalm",v:["art","local","hidden"],d:35,s:"Stockholm\'s biggest legal graffiti site — rotating murals in a post-industrial park that tourists never reach",st:"Snösätra in Rågsved has been a legal graffiti site since 2012. The walls change constantly. Stockholm\'s best street artists work here seriously. Almost no tourists come this far south.",im:"Time-travel: this industrial recycling yard in 1980, workers not imagining it would become a canvas for the best artists in the city",t:"Free. T-bana to Rågsved then 15 min walk south. Best on weekend afternoons.",c:["street_art"],r:"g",nn:"Snösätra graffitivägg — Södermalm",ns:"Stockholms största legala graffitiplats — roterande murals i post-industriell park",nst:"Snösätra i Rågsved är laglig graffiti-plats sedan 2012. Väggarna byter ständigt. Stockholms bästa street artists arbetar här på allvar.",nt:"Gratis. T-bana till Rågsved sedan 15 min promenad söderut."},
  {id:28,n:"Soul Train at Café Opera — Norrmalm",a:"Norrmalm",v:["local","night","free"],d:5,s:"Free funk and soul every Friday before midnight in the Royal Opera building — Stockholm\'s best-kept secret",st:"Café Opera is inside the Royal Opera House by the palace. On Fridays before midnight, entry is free. The crowd is mixed — all ages, all types. The DJ plays classic soul and funk on the original ballroom floor.",im:"Time-travel: the opera house ballroom in 1900, Stockholm bourgeoisie waltzing on the same parquet floor",t:"Free entry before midnight on Fridays. Smart casual. Queue forms outside from 10pm.",c:["local_only"],r:"g",nn:"Soul Train på Café Opera — Norrmalm",ns:"Gratis funk och soul varje fredagskväll i Kungliga Operan — Stockholms bäst bevarade hemlighet",nst:"Café Opera ligger i Kungliga Operahuset. På fredagar är ingången gratis före midnatt. DJ spelar klassisk soul och funk på originalparkett.",nt:"Gratis inträde före midnatt på fredagar. Pynta dig lite."},
  {id:29,n:"Green Kayak Eco Paddle — Djurgården",a:"Djurgården",v:["free","nature","weird"],d:25,s:"Borrow a kayak for free in exchange for collecting litter from the water — completely serious",st:"Green Kayak lends kayaks, paddles and life jackets for free. You paddle the channels around Djurgården and collect whatever litter you find. The kayak costs nothing. Stockholm water, all yours for two hours.",im:"Time-travel: these same channels in 1850, wooden sailing vessels and rowing boats the only traffic on the water",t:"Free. Book online at greenkayak.org. Bring dry shoes and sunscreen.",c:["local_only"],r:"g",nn:"Green Kayak skräppaddling — Djurgården",ns:"Låna kajak gratis i utbyte mot att plocka skräp från Stockholms vatten",nst:"Green Kayak lånar ut kajak, paddel och flytväst gratis. Du paddlar kanalerna runt Djurgården och samlar skräp du hittar.",nt:"Gratis. Boka online på greenkayak.org."},
  {id:30,n:"Södermalm Staircase Round — Södermalm",a:"Södermalm",v:["local","hidden","sport"],d:90,s:"3,300 steps across 30 hidden staircases — a local challenge that reveals the real Söder",st:"Södermalm sits on a rocky plateau. The only routes between the low streets and the clifftop are steep staircases carved into the rock. There are over 30 separate staircase routes. Locals time themselves. The full circuit takes you through alleys tourists never find.",im:"Time-travel: factory workers climbing these same steps to Söder Heights every morning before dawn, 1900",t:"Free. Start at Medborgarplatsen. The routes are on local walking maps.",c:["local_only"],r:"g",nn:"Södermalms trapprundan — Södermalm",ns:"3 300 steg över 30 dolda trappor — en lokal utmaning som avslöjar det riktiga Söder",nst:"Södermalm är byggt på ett stenigt platå. Enda vägarna upp är branta trappor i berget. Det finns över 30 rutter.",nt:"Gratis. Starta från Medborgarplatsen."},
  {id:31,n:"Stortorget at Dawn — Gamla Stan",a:"Gamla Stan",v:["beautiful","quiet","history"],d:5,s:"Stockholm\'s oldest square, empty and golden at 6am — a completely different city before the tourists arrive",st:"By 9am Stortorget fills with tour groups. At 6am it is empty — the coloured facades catching the early light, chairs upturned on café tables. The 1520 Stockholm Bloodbath happened here. The square still holds it.",im:"Time-travel: the Stockholm Bloodbath of 1520, Danish soldiers executing 90 Swedish nobles in this square over three days",t:"Free. Come at sunrise — 5:30am in summer. Coffee from a 7-Eleven nearby.",c:["history_big"],r:"g",nn:"Stortorget i gryningen — Gamla Stan",ns:"Stockholms äldsta torg, tomt och gyllene klockan sex — en helt annan stad",nst:"Klockan 9 fylls Stortorget med turister. Klockan 6 är det tomt, fasaderna fångar det tidiga ljuset.",nt:"Gratis. Kom vid soluppgången. Ta med kaffe."},
  {id:32,n:"Rosenporten — Oldest Door in Stockholm",a:"Gamla Stan",v:["hidden","history","weird"],d:5,s:"The oldest surviving door in Stockholm, dated 1580 — in a lane so narrow nobody walks down it",st:"Staffan Sasses Gränd is barely wide enough for two people. At one end is a doorway from the 1580s — original iron hinges, original wood, 450 years in place. No plaque, no tourist sign. Just the door.",im:"Time-travel: the craftsman fitting these iron hinges in 1580, the owner inspecting the work, not imagining it would still be there 450 years later",t:"Free. Staffan Sasses Gränd runs off Österlånggatan. Look for the iron hardware.",c:["history_big"],r:"g",nn:"Rosenporten — Gamla Stans äldsta dörr",ns:"Stockholms äldsta bevarade dörr, daterad 1580 — i en gränd ingen går ner",nst:"Staffan Sasses Gränd är knappt bred nog för två. En dörröppning från 1580-talet med original järngångjärn, 450 år på plats.",nt:"Gratis. Staffan Sasses Gränd från Österlånggatan."},
  {id:33,n:"Tyresta National Park — Southern Suburbs",a:"Liljeholmen",v:["nature","hidden","free"],d:60,s:"400-year-old pine forest 20km from the city centre — wilderness inside Stockholm County",st:"Tyresta is Sweden\'s largest national park close to a major city. The forest has never been logged. Some pines are 400 years old. The silence is total. Reindeer lichen covers the ground. Buses run from Handen.",im:"Time-travel: these same pine trees growing in 1620, before Stockholm was a major capital, before almost everything",t:"Free. Commuter train to Handen then bus 834. Full day recommended.",c:["parks"],r:"g",nn:"Tyresta nationalpark — Sydförorten",ns:"400-årig tallskog 20 km från stadskärnan — vildmarken inne i Stockholms län",nst:"Tyresta är Sveriges närmaste nationalpark till en storstad. Skogen har aldrig avverkats. Vissa tallar är 400 år gamla. Total tystnad.",nt:"Gratis. Pendeltåg till Handen sedan buss 834."},
  {id:34,n:"Vinterviken Nobel Gardens — Liljeholmen",a:"Liljeholmen",v:["hidden","history","beautiful"],d:30,s:"Alfred Nobel\'s old dynamite factory, now a wild garden with orchids growing in the lime kiln ruins",st:"Nobel made his first fortune here — the Alfred Nobel explosives factory operated at Vinterviken from 1865 to 1921. The buildings are overgrown ruins now. Wild orchids grow in the lime kilns in spring. The lake below is perfectly still.",im:"Time-travel: workers filling dynamite cartridges at Vinterviken in 1890, explosions a constant risk, the lake glittering below",t:"Free. Walk from Liljeholmen T-bana 20 minutes along the water.",c:["abandoned"],r:"g",nn:"Vinterviken Nobels trädgårdar — Liljeholmen",ns:"Alfred Nobels gamla dynamitfabrik, nu en vild trädgård med orkidéer i kalkugnsruiner",nst:"Nobel tjänade sin förmögenhet här. Sprängämnesfabriken vid Vinterviken 1865–1921. Byggnaderna är ruiner med vilda blommor och orkidéer på våren.",nt:"Gratis. Gå från Liljeholmen T-bana 20 minuter längs vattnet."},
  {id:35,n:"Skeppsholmen Island Walk — Norrmalm",a:"Norrmalm",v:["hidden","beautiful","art"],d:15,s:"The old naval island between city and Djurgården — free to walk, water on all sides, almost no crowds",st:"Skeppsholmen was Stockholm\'s naval base until 1969. Now it is a quiet island with the Museum of Modern Art, the Architecture Museum and extraordinary views in every direction. Bridge from Strandvägen.",im:"Time-travel: Swedish naval frigates moored here in 1800, the island alive with sailors, ropes and cannon",t:"Free to walk. Museums have entry fees. Bridge from Strandvägen.",c:["romantic_water"],r:"g",nn:"Skeppsholmen — Norrmalm",ns:"Den gamla marinön mellan staden och Djurgården — gratis att promenera, vatten åt alla håll",nst:"Skeppsholmen var Stockholms flottbas till 1969. Nu en lugn ö med Moderna Museet och enastående vyer.",nt:"Gratis att promenera. Museer har inträde. Gå över bron från Strandvägen."},
  {id:36,n:"Hornstull Street Art Walk — Södermalm",a:"Södermalm",v:["art","local","free"],d:25,s:"20 years of murals along the Hornstull waterfront — the heart of Stockholm\'s street art scene",st:"The streets around Hornstull — Långholmsgatan, Hornsbruksgatan — have accumulated serious murals for 20 years. The neighbourhood is changing fast. Your chance to see the street art before rising rents push it out.",im:"Time-travel: Hornstull as an industrial waterfront in 1920, before the artists, before the bars, before any of it",t:"Free. Start at Hornstull metro. Walk east along Långholmsgatan.",c:["street_art"],r:"g",nn:"Hornstull street art-promenad — Södermalm",ns:"20 år av murals längs Hornstulls strandpromenad — hjärtat i Stockholms street art-scen",nst:"Gatorna runt Hornstull har samlat seriösa murals under 20 år. Området förändras snabbt.",nt:"Gratis. Starta vid Hornstull T-bana."},
  {id:37,n:"Skogskyrkogården UNESCO Cemetery — Liljeholmen",a:"Liljeholmen",v:["beautiful","quiet","history"],d:30,s:"The world\'s most beautiful cemetery — UNESCO heritage, pine forest, 1920 Asplund architecture",st:"Gunnar Asplund and Sigurd Lewerentz designed Skogskyrkogården between 1915 and 1940. The forest cemetery uses pines, hills and silence as the architecture. Greta Garbo is buried here. The reflection pond has no ripples.",im:"Time-travel: Asplund sketching the first plans in 1915 — a cemetery that felt like a forest, not a field of stones",t:"Free. Metro green line to Skogskyrkogården. The chapel hill is the highlight.",c:["famous_dead"],r:"g",nn:"Skogskyrkogården — Liljeholmen",ns:"Världens vackraste kyrkogård — UNESCO-arv, tallskog, Asplunds arkitektur från 1920",nst:"Skogskyrkogården designades av Asplund och Lewerentz 1915–1940. Greta Garbo är begravd här. Reflektionsdammen har inga ripplar.",nt:"Gratis. T-bana grönlinjen till Skogskyrkogården."},
  {id:38,n:"Fjällgatan Panoramic Walk — Södermalm",a:"Södermalm",v:["beautiful","hidden","local"],d:20,s:"Stockholm\'s secret panoramic street — a clifftop lane with the best view of the Old Town and the water",st:"Fjällgatan runs along the Söder cliff edge east of Katarinahissen. Painted wooden houses, globe lamps, and an unbroken panorama of Gamla Stan, Djurgården and the harbour. Almost no one walks here.",im:"Time-travel: 19th century working-class Stockholm looking out from these cliffs at the merchant ships below",t:"Free. Walk from Slussen east past Katarina Church. 20 minutes of path.",c:["high_spots"],r:"g",nn:"Fjällgatan — Södermalm",ns:"Stockholms hemliga panoramagata — en klippkant med bästa utsikten mot Gamla Stan",nst:"Fjällgatan löper längs Söderhöjden öster om Katarinahissen. Målade trähus, klotlampor och ett obrutet panorama.",nt:"Gratis. Gå från Slussen österut förbi Katarina kyrka."},
  {id:39,n:"Hagaparken Royal Park — Vasastan",a:"Vasastan",v:["beautiful","nature","history"],d:25,s:"The romantic park where Swedish kings picnicked — waterfalls, Chinese pavilions and Gustav III\'s unfinished palace",st:"Haga was Gustav III\'s dream park in the English romantic style. The copper tents, the Turkish pavilion, the half-built palace that stopped when he was assassinated in 1792. All free to walk.",im:"Time-travel: Gustav III strolling these grounds in 1790, planning a palace he would never finish",t:"Free. Bus 515 or 540 from Odenplan. Copper Tents are the must-see.",c:["parks"],r:"g",nn:"Hagaparken — Vasastan",ns:"Den romantiska park där svenska kungar picknickade — vattenfalls, paviljonger och ett ofullbordat palats",nst:"Haga var Gustav III:s drömpark i engelsk romantisk stil. Koppartälten, turkiska paviljongen, det halvfärdiga palatset.",nt:"Gratis. Buss 515 eller 540 från Odenplan."},
  {id:40,n:"Bergianska Trädgården — Vasastan",a:"Vasastan",v:["nature","hidden","free"],d:30,s:"The university botanical garden free to walk — Victoria water lilies, the Victorian glasshouse, total calm",st:"The outdoor gardens of the Bergius Botanical Garden are free to enter. Lakeside path along Brunnsviken, the 1900 glasshouse, ponds with giant Victoria amazonica water lilies in summer. Almost no tourists.",im:"Time-travel: 18th century botanists cataloguing Swedish plants in this garden, before the city grew around it",t:"Outdoor areas free. Metro to Universitetet then 5 min walk.",c:["parks"],r:"g",nn:"Bergianska trädgården — Vasastan",ns:"Universitetets botaniska trädgård gratis att promenera — Victoriagynglor, victorianskt växthus, total lugn",nst:"Utomhusarealerna i Bergianska trädgården är gratis att besöka. Sjöpromenad längs Brunnsviken, 1900-talets växthus.",nt:"Utomhus gratis. T-bana till Universitetet sedan 5 min promenad."},
  {id:41,n:"Munkbrohamnen Sunset — Gamla Stan",a:"Gamla Stan",v:["beautiful","local","quiet"],d:5,s:"The secret waterfront of Gamla Stan — locals watch the sunset here while tourists are one block away",st:"Munkbrohamnen is the western waterfront of the Old Town. The view is straight across Riddarfjärden to Södermalm and City Hall. The light at sunset turns the water pink. Locals sit on the bollards with takeaway coffee.",im:"Time-travel: the medieval harbour of Stockholm at Munkbrohamnen, merchant boats unloading Baltic grain, 1450",t:"Free. Walk west through Gamla Stan past Riddarhuset to the water.",c:["romantic_water"],r:"g",nn:"Munkbrohamnen — Gamla Stan",ns:"Gamla Stans hemliga strandkant — lokalbefolkningen ser solnedgången här medan turisterna är ett kvarter bort",nst:"Munkbrohamnen är Gamla Stans västra strandkant. Utsikten går rakt över Riddarfjärden mot Södermalm och Stadshuset.",nt:"Gratis. Gå västerut genom Gamla Stan förbi Riddarhuset till vattnet."},
  {id:42,n:"Monteliusvägen Cliff Walk — Södermalm #42",a:"Södermalm",v:["beautiful","hidden","free"],d:45,s:"Clifftop path above the water — City Hall, Riddarholmen and the whole archipelago at once",st:"The path runs along the edge of the Söder Heights. Stockholm is built on islands and here you see all of them at once. Come at golden hour. Locals walk their dogs here every day.",im:"Time-travel: Södermalm as a working-class island 100 years ago, before the artists arrived",t:"Free always. Enter from Blecktornsgränd. Best at 6–8pm.",c:["history_big"],r:"g",nn:"Monteliusvägen — Södermalm #42",ns:"Klippväg ovan vattnet — Stadshuset, Riddarholmen och hela skärgården på en gång",nst:"Vägen löper längs kanten av Södermalm. Stockholm är byggt på öar och här ser du dem alla på en gång.",nt:"Alltid gratis. Ingång från Blecktornsgränd. Bäst 18–20."},
  {id:43,n:"Långholmen Island Swim — Södermalm #43",a:"Södermalm",v:["local","nature","free"],d:12,s:"A former prison island with the best free swimming beaches in the city — locals know this",st:"Långholmen prison closed in 1975. The island is now a park with flat granite rocks and a sand beach. Swim on the west side. The old prison cells are now a hotel. The inmates swam too.",im:"Time-travel: prisoners watching free Stockholm citizens swim just beyond the walls, 1960",t:"Free. Walk from Hornstull or Söder Mälarstrand. Bring a towel.",c:["high_spots"],r:"g",nn:"Långholmen — Södermalm #43",ns:"En tidigare fängelseö med stadens bästa gratis simstränder — lokalbefolkningen vet om det",nst:"Långholmen fängelse stängde 1975. Ön är nu en park med platta granitklippor och en sandstrand.",nt:"Gratis. Gå från Hornstull eller Söder Mälarstrand. Ta med en handduk."},
  {id:44,n:"Trekanten Lake — Liljeholmen #44",a:"Liljeholmen",v:["hidden","local","nature"],d:6,s:"A mirror-still lake in the southwest, surrounded by pines — locals swim here all summer",st:"Trekanten is the triangle-shaped lake between Liljeholmen and Hägersten. Pine trees go right to the water\'s edge. Granite rocks for jumping. Almost completely unknown to tourists.",im:"Time-travel: this lake as a natural hollow in farmland before the suburb grew around it, 1910",t:"Free. T-bana to Liljeholmen then 10 min walk. Weekday afternoons are quiet.",c:["parks"],r:"g",nn:"Trekanten — Liljeholmen #44",ns:"En spegelstilla sjö i sydväst, omgiven av tallar — lokalbefolkningen simmar här hela sommaren",nst:"Trekanten är den triangulärt formade sjön mellan Liljeholmen och Hägersten.",nt:"Gratis. T-bana till Liljeholmen sedan 10 min promenad. Vardagseftermiddagar är lugna."},
  {id:45,n:"Kulturhuset Stadsteatern — Norrmalm #45",a:"Norrmalm",v:["free","local","art"],d:52,s:"Seven floors of free culture on Sergels Torg — galleries, reading rooms, youth spaces, rooftop",st:"Kulturhuset was built in 1974 as Stockholm\'s public living room. Most of it is free. The reading rooms have Swedish magazines and newspapers. The top floor looks straight down at the fountain.",im:"Time-travel: the building opening in 1974, controversial and modern, the city debating it",t:"Free. Open daily. The rooftop terrace has the best Sergels Torg view.",c:["courtyards"],r:"g",nn:"Kulturhuset — Norrmalm #45",ns:"Sju våningar gratis kultur vid Sergels Torg — gallerier, läsrum, ungdomsutrymmen, takterrass",nst:"Kulturhuset byggdes 1974 som Stockholms publika vardagsrum. Det mesta är gratis.",nt:"Gratis. Öppet dagligen. Takterrassen har den bästa Sergels Torg-utsikten."},
  {id:46,n:"Drottningholm Palace Park — Lovön #46",a:"Lidingö",v:["beautiful","history","nature"],d:22,s:"The royal family\'s actual home — a UNESCO park you reach by boat from City Hall",st:"The Drottningholm boat from City Hall pier takes 50 minutes. The baroque park is free. The palace gardens and Chinese Pavilion are extraordinary. This is where the Swedish royal family lives.",im:"Time-travel: the Swedish court arriving here by barge from Stockholm in 1750, the summer season beginning",t:"Boat from City Hall (fee) or bus 176. Park free. Palace has entry fee.",c:["romantic_water"],r:"g",nn:"Drottningholms slottsträdgård — Lovön #46",ns:"Kungafamiljens faktiska hem — en UNESCO-park du når med båt från Stadshuset",nst:"Drottningholmsbåten från Stadshuskajen tar 50 minuter. Den barocka parken är gratis.",nt:"Båt från Stadshuset (avgift) eller buss 176. Park gratis. Palatset har inträde."},
  {id:47,n:"Koppartälten Sculptures — Vasastan #47",a:"Vasastan",v:["hidden","art","beautiful"],d:20,s:"Strange copper-tent sculptures in a quiet park that most Stockholmers walk past without knowing",st:"The Koppartälten are three abstract copper sculptures in Vasaparken that have been here since 1970. The park itself is where Vasastan families bring their children. The sculptures have no label.",im:"Time-travel: the sculptures being installed in this park in 1970 while Stockholmers debated whether they were art",t:"Free. Vasaparken is open always.",c:["scary"],r:"g",nn:"Koppartälten — Vasastan #47",ns:"Märkliga kopparskulpturer i en tyst park som de flesta stockholmare passerar utan att märka",nst:"Koppartälten är tre abstrakta kopparskulpturer i Vasaparken som funnits sedan 1970.",nt:"Gratis. Vasaparken är alltid öppen."},
  {id:48,n:"Kräftriket Nature Reserve — Vasastan #48",a:"Vasastan",v:["nature","hidden","local"],d:19,s:"Wild nature reserve 15 minutes from the city centre — crayfish, herons, walking trails",st:"Kräftriket sits between the university campus and Brunnsviken lake. Old woodland, marsh, and open water. The name means \"crayfish kingdom.\" Crayfish still live in the creek.",im:"Time-travel: Stockholm University students having crayfish parties here by candlelight in the 1960s",t:"Free. Enter from Frescativägen near Stockholm University.",c:["famous_dead"],r:"g",nn:"Kräftriket naturreservat — Vasastan #48",ns:"Vilt naturreservat 15 minuter från stadskärnan — kräftor, häger, vandringsled",nst:"Kräftriket ligger mellan universitetsområdet och Brunnsviken. Gammal skog, kärr och öppet vatten.",nt:"Gratis. Ingång från Frescativägen nära Stockholms universitet."},
  {id:49,n:"Local Bus Ferries — Djurgården #49",a:"Djurgården",v:["local","weird","beautiful"],d:13,s:"Take Djurgårdslinjen ferry with a regular SL ticket — the cheapest harbour cruise in the city",st:"Line 80 connects Slussen, Djurgården and Skeppsholmen. A single SL metro ticket covers it. Locals use it to cross the water. Tourists pay ten times more for the tourist boats.",im:"Time-travel: the original horse-drawn ferry crossing from Slussen to Djurgården, 1880",t:"Use your regular SL card. Line 80. Runs every 10 minutes in summer.",c:["street_art"],r:"g",nn:"Lokala färjor — Djurgården #49",ns:"Ta Djurgårdslinjen med ett vanligt SL-kort — stadens billigaste hamnkryssning",nst:"Linje 80 förbinder Slussen, Djurgården och Skeppsholmen. Gratis med SL-kort.",nt:"Använd ditt vanliga SL-kort. Linje 80. Avgår var 10:e minut på sommaren."},
  {id:50,n:"Riddarhuset — Gamla Stan #50",a:"Gamla Stan",v:["history","beautiful","hidden"],d:52,s:"The House of Nobility — 2,300 coats of arms cover every wall and ceiling",st:"Built in 1674 as the parliament of the Swedish nobility. The Great Hall has every noble family\'s coat of arms, floor to ceiling. Few visitors find it. The courtyard is free.",im:"Time-travel: the Swedish nobility debating war and succession in this hall, 1700",t:"Courtyard always free. Interior has a small fee. Worth it.",c:["abandoned"],r:"g",nn:"Riddarhuset — Gamla Stan #50",ns:"Riddarhuset — 2 300 vapensköldar täcker varje vägg och tak",nst:"Byggt 1674 som den svenska adelns parlament. Stora salen har varje adelsfamiljs vapensköld.",nt:"Innergården alltid gratis. Interiören kostar lite. Värt det."},
  {id:51,n:"Skinnarviksberget — Södermalm #51",a:"Södermalm",v:["local","quiet","beautiful"],d:11,s:"The highest natural point in Stockholm — locals gather here every evening to watch the sunset",st:"No railing, no café, no signs. Just a flat rock at the top of Söder with the whole city below. Teenagers, pensioners and dogs share it equally.",im:"Time-travel: this hilltop as farmland before the city spread, 1800",t:"Always free. Walk up from Ringvägen. Bring something to drink.",c:["free_museum"],r:"g",nn:"Skinnarviksberget — Södermalm #51",ns:"Stockholms högsta naturliga punkt — lokalbefolkningen samlas här varje kväll",nst:"Inget räcke, inget café, inga skyltar. Bara en flat klippa med hela staden nedanför.",nt:"Alltid gratis. Gå upp från Ringvägen. Ta med något att dricka."},
  {id:52,n:"Inner City Basketball Courts — Vasastan #52",a:"Vasastan",v:["local","free","sport"],d:48,s:"Open basketball courts at Vanadisplan — summer leagues, pickup games, free to join",st:"The Vanadisplan courts are the heartbeat of Stockholm street basketball. Summer evenings have serious pickup games. No fee, no registration. Bring your shoes.",im:"Time-travel: these courts in the 1980s, the first generation of Stockholm streetball players",t:"Free. Open daily. Best weekday evenings and weekend afternoons.",c:["local_only"],r:"g",nn:"Basketplanerna vid Vanadisplan — Vasastan #52",ns:"Öppna basketplaner vid Vanadisplan — sommarläger, pickup-spel, gratis att delta",nst:"Vanadisplan-planerna är pulsen i Stockholms gatabasket. Kvällarna har serier pickup-spel.",nt:"Gratis. Öppet dagligen. Bäst vardagskvällar och helgeftermiddagar."},
  {id:53,n:"Stadsbiblioteket — Vasastan #53",a:"Vasastan",v:["beautiful","quiet","architecture"],d:52,s:"Asplund\'s 1928 library — a perfect cylinder of books rising through the rotunda",st:"Gunnar Asplund designed this as a Nordic classicist masterpiece. The main hall is a full cylinder lined floor-to-ceiling with books. Walk in and look straight up. Free.",im:"Time-travel: the opening of the library in 1928, Stockholmers filing in to borrow the first books",t:"Free. Open during library hours. The top-level reading room is the best.",c:["architecture"],r:"g",nn:"Stadsbiblioteket — Vasastan #53",ns:"Asplunds bibliotek från 1928 — en perfekt cylinder av böcker som reser sig genom rotundan",nst:"Gunnar Asplund ritade detta som ett nordiskt klassicistiskt mästerverk.",nt:"Gratis. Öppet under bibliotekets öppettider."},
  {id:54,n:"Fredhällsklipporna Swim — Kungsholmen #54",a:"Kungsholmen",v:["nature","local","free"],d:39,s:"Wild swimming rocks at the tip of Kungsholmen — best free swim in the city, locals only",st:"Flat granite rocks at the water\'s edge, facing Mälarens open water. Divers, swimmers, sunbathers. No lifeguards, no facilities, no tourists. A Stockholm summer.",im:"Time-travel: factory workers bathing from these same rocks after shifts, 1910",t:"Free. Summer only. Walk from Fridhemsplan 15 min.",c:["history_big"],r:"g",nn:"Fredhällsklipporna — Kungsholmen #54",ns:"Vilda badklippor vid spetsen av Kungsholmen — bästa gratis simning, bara lokalbefolkning",nst:"Platta granitklippor vid vattenbrynet med utsikt mot Mälarens öppna vatten.",nt:"Gratis. Bara sommar. Gå från Fridhemsplan 15 min."},
  {id:55,n:"Rosendal Garden — Djurgården #55",a:"Djurgården",v:["hidden","nature","beautiful"],d:10,s:"Biodynamic kitchen garden inside the royal park — free to walk, extraordinary in summer",st:"The palace kitchen garden runs biodynamically. Greenhouses, vegetable beds, fruit trees. The café uses everything grown here. The garden is free.",im:"Time-travel: royal gardeners planting the first beds here for the 18th century court kitchen",t:"Garden free. Café worth every krona. Open daily in season.",c:["high_spots"],r:"g",nn:"Rosendalsträdgård — Djurgården #55",ns:"Biodynamisk köksträdgård i kungaparken — gratis att gå i, extraordinär på sommaren",nst:"Palatsets köksträdgård drivs biodynamiskt. Växthus, odlingsbäddar, fruktträd.",nt:"Trädgård gratis. Caféet värt varje krona. Öppen dagligen i säsong."},
  {id:56,n:"Rålambshovs Park Thursday Dance — Kungsholmen #56",a:"Kungsholmen",v:["local","weird","free"],d:42,s:"Every Thursday in summer, strangers dance swing on the park lawn for free — seriously",st:"Rålis Thursday folk dance is one of Stockholm\'s most beloved traditions. A DJ plays swing and jazz. Complete strangers pair up. All ages. Free to join. It starts at 6pm.",im:"Time-travel: 1930s Stockholm workers dancing here on the first free Saturdays after the working week shortened",t:"Free. Thursdays 6pm June–August. Just show up and join.",c:["parks"],r:"g",nn:"Rålambshovsparken torsdagsdansen — Kungsholmen #56",ns:"Varje torsdag på sommaren dansar främlingar swing på gräsmattan gratis — på riktigt",nst:"Rålis torsdagsdans är en av Stockholms mest älskade traditioner. DJ spelar swing och jazz.",nt:"Gratis. Torsdagar 18:00 juni–augusti. Dyk bara upp och delta."},
  {id:57,n:"Tanto Allotment Hill — Södermalm #57",a:"Södermalm",v:["hidden","nature","local"],d:32,s:"Stockholm\'s oldest allotment colony — tiny wooden houses and gardens on a hillside since 1919",st:"Over 200 small garden plots on the slopes of Söder. Residents paint them in Swedish folk colours. The paths between them are free to walk and the views over Mälaren are the best on Söder.",im:"Time-travel: working-class families growing their first vegetables in these plots in 1920",t:"Walk the paths freely. Respect the gardens. Peak June–August.",c:["courtyards"],r:"g",nn:"Tantolunden kolonilotter — Södermalm #57",ns:"Stockholms äldsta koloniområde — små trähus och trädgårdar i sluttning sedan 1919",nst:"Över 200 odlingslotter i Söders sluttningar. Invånarna målar dem i svenska folkfärger.",nt:"Promenera fritt längs stigarna. Respektera trädgårdarna."},
  {id:58,n:"Millesgården — Lidingö #58",a:"Lidingö",v:["beautiful","art","hidden"],d:7,s:"Sculptor Carl Milles\' home on a cliff above Stockholm — terraces of bronze gods over the water",st:"Carl Milles built his home and studio on the edge of a cliff on Lidingö. The terraces have his sculptures placed against the sky and water. One of the most beautiful settings in Europe.",im:"Time-travel: Milles working in this studio in 1935, surrounded by gods in bronze",t:"Small entry fee. Metro to Ropsten then bus 207. Worth the trip.",c:["romantic_water"],r:"g",nn:"Millesgården — Lidingö #58",ns:"Skulptören Carl Milles hem på en klippa ovan Stockholm — terrasser av bronsgudar över vattnet",nst:"Carl Milles byggde sitt hem och ateljé på kanten av en klippa på Lidingö.",nt:"Liten inträdesavgift. T-bana till Ropsten sedan buss 207."},
  {id:59,n:"Nacka Nature Reserve — Nacka #59",a:"Lidingö",v:["nature","hidden","free"],d:6,s:"Ancient forest 20 minutes from the city centre — no crowds, pure Swedish wilderness",st:"Nacka Naturreservat starts where the suburbs end. Mossy bedrock, birch and pine, small lakes. The city feels completely gone after 10 minutes walking.",im:"Time-travel: this same forest untouched for 10,000 years since the ice retreated",t:"Free. Take the Saltsjöbanan train to Neglinge. Walk into the forest.",c:["scary"],r:"g",nn:"Nacka naturreservat — Nacka #59",ns:"Urskog 20 minuter från stadscentrum — inga folkmassor, ren svensk vildmark",nst:"Nacka naturreservat börjar där förorterna slutar. Mossbetäckt berggrund, björk och tall.",nt:"Gratis. Ta Saltsjöbanan till Neglinge."},
  {id:60,n:"Djurgårdsbrunnsviken Canal Walk — Djurgården #60",a:"Djurgården",v:["nature","beautiful","quiet"],d:10,s:"A canal walk through the royal park where swans outnumber tourists",st:"The narrow canal separates Djurgården from Östermalm. In winter it freezes and Stockholm skates on it. In summer it\'s lined with rowing boats and the smell of pine.",im:"Time-travel: royal hunting parties arriving by boat at Djurgården, 1700s",t:"Enter from Djurgårdsbron. Walk east along the canal for the quietest stretch.",c:["famous_dead"],r:"g",nn:"Djurgårdsbrunnsviken — Djurgården #60",ns:"En kanalpromenad genom kungaparken där svanar är fler än turister",nst:"Den smala kanalen skiljer Djurgården från Östermalm. Vintertid fryser den.",nt:"Ingång från Djurgårdsbron. Gå österut längs kanalen."},
  {id:61,n:"Fjäderholmarna Day Trip — Archipelago #61",a:"Lidingö",v:["beautiful","nature","local"],d:18,s:"The nearest archipelago island — 25 min by boat, wild rocks, Stockholm left behind",st:"The boat from Slussen takes 25 minutes. The island has a smokehouse, a brewery and open granite for swimming. The archipelago starts here.",im:"Time-travel: Stockholm fishermen working from these islands before the city reached this far, 1880",t:"Boat from Slussen (small fee). The island itself costs nothing.",c:["street_art"],r:"g",nn:"Fjäderholmarna — Skärgården #61",ns:"Den närmaste skärgårdsön — 25 min med båt, vilda klippor, Stockholm lämnat bakom",nst:"Båten från Slussen tar 25 minuter. Ön har ett rökeri, ett bryggeri och öppen granit för simning.",nt:"Båt från Slussen (liten avgift). Ön i sig kostar ingenting."},
  {id:62,n:"Observatorielunden — Vasastan #62",a:"Vasastan",v:["hidden","quiet","history"],d:19,s:"Park on a hill with the 18th century observatory — students and locals, no tourists",st:"The old Stockholm Observatory (1753) stands at the top of a small forested park in Vasastan. The hill has benches, hammocks in the trees, and almost no tourists.",im:"Time-travel: astronomers charting the night sky from this hilltop in 1760",t:"Always free. The park below the observatory is the best sitting spot.",c:["abandoned"],r:"g",nn:"Observatorielunden — Vasastan #62",ns:"Park på en kulle med 1700-talets observatorium — studenter och lokalbefolkning",nst:"Gamla Stockholmsobservatoriet (1753) kröner en liten skogklädd kulle i Vasastan.",nt:"Alltid gratis."},
  {id:63,n:"Vita Bergen Wooden Houses — Södermalm #63",a:"Södermalm",v:["hidden","beautiful","history"],d:37,s:"18th century wooden cottages on a rocky hill — the most photogenic corner of Söder",st:"The White Mountains district has wooden allotment houses from the 1700s on a rocky hill. The park is free. The Sofia Church crowns the top. Almost no tourists.",im:"Time-travel: 18th century poor families living in these wooden houses, the city growing around them",t:"Free. Walk from Medborgarplatsen. The church is open.",c:["free_museum"],r:"g",nn:"Vita Bergen — Södermalm #63",ns:"1700-talsstugor i trä på en stenig kulle — Söders mest fotogeniska hörn",nst:"Vita Bergen har trä-odlingsstugor från 1700-talet på en stenig kulle.",nt:"Gratis. Gå från Medborgarplatsen."},
  {id:64,n:"Katarina Churchyard View — Södermalm #64",a:"Södermalm",v:["quiet","history","hidden"],d:43,s:"Hilltop churchyard with the best view in Södermalm — locals only",st:"The Katarina Church dates to 1695 and the churchyard wraps around a rocky hilltop. The graves of Stockholm working-class history. The view north is straight to the Old Town.",im:"Time-travel: the Katarina Church burning in the great Stockholm fire of 1723",t:"Always open. Free. Sit on the wall and look north.",c:["local_only"],r:"g",nn:"Katarina kyrkogård — Södermalm #64",ns:"Kullekyrka med bästa utsikten i Södermalm",nst:"Katarina kyrka härstammar från 1695 och kyrkogården slingrar sig runt en stenig kulle.",nt:"Alltid öppen. Gratis."},
  {id:65,n:"Mäster Mikaels Gata — Gamla Stan #65",a:"Gamla Stan",v:["hidden","quiet","local"],d:6,s:"The narrow lane tourists never find — medieval walls, uneven cobblestones, total silence",st:"While Västerlånggatan is packed with souvenir shops, this parallel lane has nothing but old walls and cats. The same buildings, zero crowds.",im:"Time-travel: a Stockholm merchant hurrying along this lane in 1550, candle in hand",t:"Find it behind Stortorget. Walk it slowly. Look up.",c:["architecture"],r:"g",nn:"Mäster Mikaels Gata — Gamla Stan #65",ns:"Granden som turister aldrig hittar — medeltida murar, total tystnad",nst:"Medan Västerlånggatan är full med souvenirbutiker har denna parallella gränd ingenting.",nt:"Hitta den bakom Stortorget."},
  {id:66,n:"Järntorget Bar Square — Gamla Stan #66",a:"Gamla Stan",v:["history","local","night"],d:40,s:"The south square of Old Town where locals actually drink — not the tourist trap north end",st:"While Stortorget gets the tourists, Järntorget is where Gamla Stan residents and Södermalm people meet. The square has been a market since the 13th century.",im:"Time-travel: the iron market in Järntorget, 1400 — traders selling metalwork from across Sweden",t:"Free to be here. Evenings are when it comes alive.",c:["history_big"],r:"g",nn:"Järntorget — Gamla Stan #66",ns:"Gamla Stans södra torg där lokalbefolkningen faktiskt dricker",nst:"Medan Stortorget lockar turister är Järntorget där Gamla Stan-bor och Söderfolk möts.",nt:"Gratis att vara här. Kvällen är när det vaknar till liv."},
  {id:67,n:"Stockholm Metro Art Gallery — Norrmalm #67",a:"Norrmalm",v:["art","hidden","free"],d:17,s:"World\'s longest art gallery — 90 T-bana stations decorated by 150 artists since 1950",st:"The Stockholm metro is officially the world\'s longest art gallery. Stations like Kungsträdgården, Solna Centrum and T-Centralen are extraordinary underground caves of murals, sculptures and mosaics. Your SL day ticket covers all of it.",im:"Time-travel: the 1956 decision to make art mandatory in every new metro station — a public investment that would last 70 years",t:"Regular SL day ticket. Kungsträdgården and Solna Centrum are the must-sees.",c:["high_spots"],r:"g",nn:"Tunnelbanans konstgalleri — Norrmalm #67",ns:"Världens längsta konstgalleri — 90 T-banestationer dekorerade av 150 konstnärer sedan 1950",nst:"Stockholms tunnelbana är officiellt världens längsta konstgalleri. Stationer som Kungsträdgården och Solna Centrum är extraordinära underjordiska grottor med muraler och mosaiker.",nt:"Vanligt SL-dagkort räcker. Kungsträdgården och Solna Centrum är ett måste."},
  {id:68,n:"Snösätra Graffiti Wall — Södermalm #68",a:"Södermalm",v:["art","local","hidden"],d:50,s:"Stockholm\'s biggest legal graffiti site — rotating murals in a post-industrial park that tourists never reach",st:"Snösätra in Rågsved has been a legal graffiti site since 2012. The walls change constantly. Stockholm\'s best street artists work here seriously. Almost no tourists come this far south.",im:"Time-travel: this industrial recycling yard in 1980, workers not imagining it would become a canvas for the best artists in the city",t:"Free. T-bana to Rågsved then 15 min walk south. Best on weekend afternoons.",c:["parks"],r:"g",nn:"Snösätra graffitivägg — Södermalm #68",ns:"Stockholms största legala graffitiplats — roterande murals i post-industriell park",nst:"Snösätra i Rågsved är laglig graffiti-plats sedan 2012. Väggarna byter ständigt. Stockholms bästa street artists arbetar här på allvar.",nt:"Gratis. T-bana till Rågsved sedan 15 min promenad söderut."},
  {id:69,n:"Soul Train at Café Opera — Norrmalm #69",a:"Norrmalm",v:["local","night","free"],d:46,s:"Free funk and soul every Friday before midnight in the Royal Opera building — Stockholm\'s best-kept secret",st:"Café Opera is inside the Royal Opera House by the palace. On Fridays before midnight, entry is free. The crowd is mixed — all ages, all types. The DJ plays classic soul and funk on the original ballroom floor.",im:"Time-travel: the opera house ballroom in 1900, Stockholm bourgeoisie waltzing on the same parquet floor",t:"Free entry before midnight on Fridays. Smart casual. Queue forms outside from 10pm.",c:["courtyards"],r:"g",nn:"Soul Train på Café Opera — Norrmalm #69",ns:"Gratis funk och soul varje fredagskväll i Kungliga Operan — Stockholms bäst bevarade hemlighet",nst:"Café Opera ligger i Kungliga Operahuset. På fredagar är ingången gratis före midnatt. DJ spelar klassisk soul och funk på originalparkett.",nt:"Gratis inträde före midnatt på fredagar. Pynta dig lite."},
  {id:70,n:"Green Kayak Eco Paddle — Djurgården #70",a:"Djurgården",v:["free","nature","weird"],d:49,s:"Borrow a kayak for free in exchange for collecting litter from the water — completely serious",st:"Green Kayak lends kayaks, paddles and life jackets for free. You paddle the channels around Djurgården and collect whatever litter you find. The kayak costs nothing. Stockholm water, all yours for two hours.",im:"Time-travel: these same channels in 1850, wooden sailing vessels and rowing boats the only traffic on the water",t:"Free. Book online at greenkayak.org. Bring dry shoes and sunscreen.",c:["romantic_water"],r:"g",nn:"Green Kayak skräppaddling — Djurgården #70",ns:"Låna kajak gratis i utbyte mot att plocka skräp från Stockholms vatten",nst:"Green Kayak lånar ut kajak, paddel och flytväst gratis. Du paddlar kanalerna runt Djurgården och samlar skräp du hittar.",nt:"Gratis. Boka online på greenkayak.org."},
  {id:71,n:"Södermalm Staircase Round — Södermalm #71",a:"Södermalm",v:["local","hidden","sport"],d:39,s:"3,300 steps across 30 hidden staircases — a local challenge that reveals the real Söder",st:"Södermalm sits on a rocky plateau. The only routes between the low streets and the clifftop are steep staircases carved into the rock. There are over 30 separate staircase routes. Locals time themselves. The full circuit takes you through alleys tourists never find.",im:"Time-travel: factory workers climbing these same steps to Söder Heights every morning before dawn, 1900",t:"Free. Start at Medborgarplatsen. The routes are on local walking maps.",c:["scary"],r:"g",nn:"Södermalms trapprundan — Södermalm #71",ns:"3 300 steg över 30 dolda trappor — en lokal utmaning som avslöjar det riktiga Söder",nst:"Södermalm är byggt på ett stenigt platå. Enda vägarna upp är branta trappor i berget. Det finns över 30 rutter.",nt:"Gratis. Starta från Medborgarplatsen."},
  {id:72,n:"Stortorget at Dawn — Gamla Stan #72",a:"Gamla Stan",v:["beautiful","quiet","history"],d:31,s:"Stockholm\'s oldest square, empty and golden at 6am — a completely different city before the tourists arrive",st:"By 9am Stortorget fills with tour groups. At 6am it is empty — the coloured facades catching the early light, chairs upturned on café tables. The 1520 Stockholm Bloodbath happened here. The square still holds it.",im:"Time-travel: the Stockholm Bloodbath of 1520, Danish soldiers executing 90 Swedish nobles in this square over three days",t:"Free. Come at sunrise — 5:30am in summer. Coffee from a 7-Eleven nearby.",c:["famous_dead"],r:"g",nn:"Stortorget i gryningen — Gamla Stan #72",ns:"Stockholms äldsta torg, tomt och gyllene klockan sex — en helt annan stad",nst:"Klockan 9 fylls Stortorget med turister. Klockan 6 är det tomt, fasaderna fångar det tidiga ljuset.",nt:"Gratis. Kom vid soluppgången. Ta med kaffe."},
  {id:73,n:"Rosenporten — Oldest Door in Stockholm #73",a:"Gamla Stan",v:["hidden","history","weird"],d:19,s:"The oldest surviving door in Stockholm, dated 1580 — in a lane so narrow nobody walks down it",st:"Staffan Sasses Gränd is barely wide enough for two people. At one end is a doorway from the 1580s — original iron hinges, original wood, 450 years in place. No plaque, no tourist sign. Just the door.",im:"Time-travel: the craftsman fitting these iron hinges in 1580, the owner inspecting the work, not imagining it would still be there 450 years later",t:"Free. Staffan Sasses Gränd runs off Österlånggatan. Look for the iron hardware.",c:["street_art"],r:"g",nn:"Rosenporten — Gamla Stans äldsta dörr #73",ns:"Stockholms äldsta bevarade dörr, daterad 1580 — i en gränd ingen går ner",nst:"Staffan Sasses Gränd är knappt bred nog för två. En dörröppning från 1580-talet med original järngångjärn, 450 år på plats.",nt:"Gratis. Staffan Sasses Gränd från Österlånggatan."},
  {id:74,n:"Tyresta National Park — Southern Suburbs #74",a:"Liljeholmen",v:["nature","hidden","free"],d:33,s:"400-year-old pine forest 20km from the city centre — wilderness inside Stockholm County",st:"Tyresta is Sweden\'s largest national park close to a major city. The forest has never been logged. Some pines are 400 years old. The silence is total. Reindeer lichen covers the ground. Buses run from Handen.",im:"Time-travel: these same pine trees growing in 1620, before Stockholm was a major capital, before almost everything",t:"Free. Commuter train to Handen then bus 834. Full day recommended.",c:["abandoned"],r:"g",nn:"Tyresta nationalpark — Sydförorten #74",ns:"400-årig tallskog 20 km från stadskärnan — vildmarken inne i Stockholms län",nst:"Tyresta är Sveriges närmaste nationalpark till en storstad. Skogen har aldrig avverkats. Vissa tallar är 400 år gamla. Total tystnad.",nt:"Gratis. Pendeltåg till Handen sedan buss 834."},
  {id:75,n:"Vinterviken Nobel Gardens — Liljeholmen #75",a:"Liljeholmen",v:["hidden","history","beautiful"],d:42,s:"Alfred Nobel\'s old dynamite factory, now a wild garden with orchids growing in the lime kiln ruins",st:"Nobel made his first fortune here — the Alfred Nobel explosives factory operated at Vinterviken from 1865 to 1921. The buildings are overgrown ruins now. Wild orchids grow in the lime kilns in spring. The lake below is perfectly still.",im:"Time-travel: workers filling dynamite cartridges at Vinterviken in 1890, explosions a constant risk, the lake glittering below",t:"Free. Walk from Liljeholmen T-bana 20 minutes along the water.",c:["free_museum"],r:"g",nn:"Vinterviken Nobels trädgårdar — Liljeholmen #75",ns:"Alfred Nobels gamla dynamitfabrik, nu en vild trädgård med orkidéer i kalkugnsruiner",nst:"Nobel tjänade sin förmögenhet här. Sprängämnesfabriken vid Vinterviken 1865–1921. Byggnaderna är ruiner med vilda blommor och orkidéer på våren.",nt:"Gratis. Gå från Liljeholmen T-bana 20 minuter längs vattnet."},
  {id:76,n:"Skeppsholmen Island Walk — Norrmalm #76",a:"Norrmalm",v:["hidden","beautiful","art"],d:22,s:"The old naval island between city and Djurgården — free to walk, water on all sides, almost no crowds",st:"Skeppsholmen was Stockholm\'s naval base until 1969. Now it is a quiet island with the Museum of Modern Art, the Architecture Museum and extraordinary views in every direction. Bridge from Strandvägen.",im:"Time-travel: Swedish naval frigates moored here in 1800, the island alive with sailors, ropes and cannon",t:"Free to walk. Museums have entry fees. Bridge from Strandvägen.",c:["local_only"],r:"g",nn:"Skeppsholmen — Norrmalm #76",ns:"Den gamla marinön mellan staden och Djurgården — gratis att promenera, vatten åt alla håll",nst:"Skeppsholmen var Stockholms flottbas till 1969. Nu en lugn ö med Moderna Museet och enastående vyer.",nt:"Gratis att promenera. Museer har inträde. Gå över bron från Strandvägen."},
  {id:77,n:"Hornstull Street Art Walk — Södermalm #77",a:"Södermalm",v:["art","local","free"],d:5,s:"20 years of murals along the Hornstull waterfront — the heart of Stockholm\'s street art scene",st:"The streets around Hornstull — Långholmsgatan, Hornsbruksgatan — have accumulated serious murals for 20 years. The neighbourhood is changing fast. Your chance to see the street art before rising rents push it out.",im:"Time-travel: Hornstull as an industrial waterfront in 1920, before the artists, before the bars, before any of it",t:"Free. Start at Hornstull metro. Walk east along Långholmsgatan.",c:["architecture"],r:"g",nn:"Hornstull street art-promenad — Södermalm #77",ns:"20 år av murals längs Hornstulls strandpromenad — hjärtat i Stockholms street art-scen",nst:"Gatorna runt Hornstull har samlat seriösa murals under 20 år. Området förändras snabbt.",nt:"Gratis. Starta vid Hornstull T-bana."},
  {id:78,n:"Skogskyrkogården UNESCO Cemetery — Liljeholmen #78",a:"Liljeholmen",v:["beautiful","quiet","history"],d:53,s:"The world\'s most beautiful cemetery — UNESCO heritage, pine forest, 1920 Asplund architecture",st:"Gunnar Asplund and Sigurd Lewerentz designed Skogskyrkogården between 1915 and 1940. The forest cemetery uses pines, hills and silence as the architecture. Greta Garbo is buried here. The reflection pond has no ripples.",im:"Time-travel: Asplund sketching the first plans in 1915 — a cemetery that felt like a forest, not a field of stones",t:"Free. Metro green line to Skogskyrkogården. The chapel hill is the highlight.",c:["history_big"],r:"g",nn:"Skogskyrkogården — Liljeholmen #78",ns:"Världens vackraste kyrkogård — UNESCO-arv, tallskog, Asplunds arkitektur från 1920",nst:"Skogskyrkogården designades av Asplund och Lewerentz 1915–1940. Greta Garbo är begravd här. Reflektionsdammen har inga ripplar.",nt:"Gratis. T-bana grönlinjen till Skogskyrkogården."},
  {id:79,n:"Fjällgatan Panoramic Walk — Södermalm #79",a:"Södermalm",v:["beautiful","hidden","local"],d:15,s:"Stockholm\'s secret panoramic street — a clifftop lane with the best view of the Old Town and the water",st:"Fjällgatan runs along the Söder cliff edge east of Katarinahissen. Painted wooden houses, globe lamps, and an unbroken panorama of Gamla Stan, Djurgården and the harbour. Almost no one walks here.",im:"Time-travel: 19th century working-class Stockholm looking out from these cliffs at the merchant ships below",t:"Free. Walk from Slussen east past Katarina Church. 20 minutes of path.",c:["high_spots"],r:"g",nn:"Fjällgatan — Södermalm #79",ns:"Stockholms hemliga panoramagata — en klippkant med bästa utsikten mot Gamla Stan",nst:"Fjällgatan löper längs Söderhöjden öster om Katarinahissen. Målade trähus, klotlampor och ett obrutet panorama.",nt:"Gratis. Gå från Slussen österut förbi Katarina kyrka."},
  {id:80,n:"Hagaparken Royal Park — Vasastan #80",a:"Vasastan",v:["beautiful","nature","history"],d:49,s:"The romantic park where Swedish kings picnicked — waterfalls, Chinese pavilions and Gustav III\'s unfinished palace",st:"Haga was Gustav III\'s dream park in the English romantic style. The copper tents, the Turkish pavilion, the half-built palace that stopped when he was assassinated in 1792. All free to walk.",im:"Time-travel: Gustav III strolling these grounds in 1790, planning a palace he would never finish",t:"Free. Bus 515 or 540 from Odenplan. Copper Tents are the must-see.",c:["parks"],r:"g",nn:"Hagaparken — Vasastan #80",ns:"Den romantiska park där svenska kungar picknickade — vattenfalls, paviljonger och ett ofullbordat palats",nst:"Haga var Gustav III:s drömpark i engelsk romantisk stil. Koppartälten, turkiska paviljongen, det halvfärdiga palatset.",nt:"Gratis. Buss 515 eller 540 från Odenplan."},
  {id:81,n:"Bergianska Trädgården — Vasastan #81",a:"Vasastan",v:["nature","hidden","free"],d:32,s:"The university botanical garden free to walk — Victoria water lilies, the Victorian glasshouse, total calm",st:"The outdoor gardens of the Bergius Botanical Garden are free to enter. Lakeside path along Brunnsviken, the 1900 glasshouse, ponds with giant Victoria amazonica water lilies in summer. Almost no tourists.",im:"Time-travel: 18th century botanists cataloguing Swedish plants in this garden, before the city grew around it",t:"Outdoor areas free. Metro to Universitetet then 5 min walk.",c:["courtyards"],r:"g",nn:"Bergianska trädgården — Vasastan #81",ns:"Universitetets botaniska trädgård gratis att promenera — Victoriagynglor, victorianskt växthus, total lugn",nst:"Utomhusarealerna i Bergianska trädgården är gratis att besöka. Sjöpromenad längs Brunnsviken, 1900-talets växthus.",nt:"Utomhus gratis. T-bana till Universitetet sedan 5 min promenad."},
  {id:82,n:"Munkbrohamnen Sunset — Gamla Stan #82",a:"Gamla Stan",v:["beautiful","local","quiet"],d:26,s:"The secret waterfront of Gamla Stan — locals watch the sunset here while tourists are one block away",st:"Munkbrohamnen is the western waterfront of the Old Town. The view is straight across Riddarfjärden to Södermalm and City Hall. The light at sunset turns the water pink. Locals sit on the bollards with takeaway coffee.",im:"Time-travel: the medieval harbour of Stockholm at Munkbrohamnen, merchant boats unloading Baltic grain, 1450",t:"Free. Walk west through Gamla Stan past Riddarhuset to the water.",c:["romantic_water"],r:"g",nn:"Munkbrohamnen — Gamla Stan #82",ns:"Gamla Stans hemliga strandkant — lokalbefolkningen ser solnedgången här medan turisterna är ett kvarter bort",nst:"Munkbrohamnen är Gamla Stans västra strandkant. Utsikten går rakt över Riddarfjärden mot Södermalm och Stadshuset.",nt:"Gratis. Gå västerut genom Gamla Stan förbi Riddarhuset till vattnet."},
  {id:83,n:"Monteliusvägen Cliff Walk — Södermalm #83",a:"Södermalm",v:["beautiful","hidden","free"],d:22,s:"Clifftop path above the water — City Hall, Riddarholmen and the whole archipelago at once",st:"The path runs along the edge of the Söder Heights. Stockholm is built on islands and here you see all of them at once. Come at golden hour. Locals walk their dogs here every day.",im:"Time-travel: Södermalm as a working-class island 100 years ago, before the artists arrived",t:"Free always. Enter from Blecktornsgränd. Best at 6–8pm.",c:["scary"],r:"g",nn:"Monteliusvägen — Södermalm #83",ns:"Klippväg ovan vattnet — Stadshuset, Riddarholmen och hela skärgården på en gång",nst:"Vägen löper längs kanten av Södermalm. Stockholm är byggt på öar och här ser du dem alla på en gång.",nt:"Alltid gratis. Ingång från Blecktornsgränd. Bäst 18–20."},
  {id:84,n:"Långholmen Island Swim — Södermalm #84",a:"Södermalm",v:["local","nature","free"],d:14,s:"A former prison island with the best free swimming beaches in the city — locals know this",st:"Långholmen prison closed in 1975. The island is now a park with flat granite rocks and a sand beach. Swim on the west side. The old prison cells are now a hotel. The inmates swam too.",im:"Time-travel: prisoners watching free Stockholm citizens swim just beyond the walls, 1960",t:"Free. Walk from Hornstull or Söder Mälarstrand. Bring a towel.",c:["famous_dead"],r:"g",nn:"Långholmen — Södermalm #84",ns:"En tidigare fängelseö med stadens bästa gratis simstränder — lokalbefolkningen vet om det",nst:"Långholmen fängelse stängde 1975. Ön är nu en park med platta granitklippor och en sandstrand.",nt:"Gratis. Gå från Hornstull eller Söder Mälarstrand. Ta med en handduk."},
  {id:85,n:"Trekanten Lake — Liljeholmen #85",a:"Liljeholmen",v:["hidden","local","nature"],d:18,s:"A mirror-still lake in the southwest, surrounded by pines — locals swim here all summer",st:"Trekanten is the triangle-shaped lake between Liljeholmen and Hägersten. Pine trees go right to the water\'s edge. Granite rocks for jumping. Almost completely unknown to tourists.",im:"Time-travel: this lake as a natural hollow in farmland before the suburb grew around it, 1910",t:"Free. T-bana to Liljeholmen then 10 min walk. Weekday afternoons are quiet.",c:["street_art"],r:"g",nn:"Trekanten — Liljeholmen #85",ns:"En spegelstilla sjö i sydväst, omgiven av tallar — lokalbefolkningen simmar här hela sommaren",nst:"Trekanten är den triangulärt formade sjön mellan Liljeholmen och Hägersten.",nt:"Gratis. T-bana till Liljeholmen sedan 10 min promenad. Vardagseftermiddagar är lugna."},
  {id:86,n:"Kulturhuset Stadsteatern — Norrmalm #86",a:"Norrmalm",v:["free","local","art"],d:53,s:"Seven floors of free culture on Sergels Torg — galleries, reading rooms, youth spaces, rooftop",st:"Kulturhuset was built in 1974 as Stockholm\'s public living room. Most of it is free. The reading rooms have Swedish magazines and newspapers. The top floor looks straight down at the fountain.",im:"Time-travel: the building opening in 1974, controversial and modern, the city debating it",t:"Free. Open daily. The rooftop terrace has the best Sergels Torg view.",c:["abandoned"],r:"g",nn:"Kulturhuset — Norrmalm #86",ns:"Sju våningar gratis kultur vid Sergels Torg — gallerier, läsrum, ungdomsutrymmen, takterrass",nst:"Kulturhuset byggdes 1974 som Stockholms publika vardagsrum. Det mesta är gratis.",nt:"Gratis. Öppet dagligen. Takterrassen har den bästa Sergels Torg-utsikten."},
  {id:87,n:"Drottningholm Palace Park — Lovön #87",a:"Lidingö",v:["beautiful","history","nature"],d:26,s:"The royal family\'s actual home — a UNESCO park you reach by boat from City Hall",st:"The Drottningholm boat from City Hall pier takes 50 minutes. The baroque park is free. The palace gardens and Chinese Pavilion are extraordinary. This is where the Swedish royal family lives.",im:"Time-travel: the Swedish court arriving here by barge from Stockholm in 1750, the summer season beginning",t:"Boat from City Hall (fee) or bus 176. Park free. Palace has entry fee.",c:["free_museum"],r:"g",nn:"Drottningholms slottsträdgård — Lovön #87",ns:"Kungafamiljens faktiska hem — en UNESCO-park du når med båt från Stadshuset",nst:"Drottningholmsbåten från Stadshuskajen tar 50 minuter. Den barocka parken är gratis.",nt:"Båt från Stadshuset (avgift) eller buss 176. Park gratis. Palatset har inträde."},
  {id:88,n:"Koppartälten Sculptures — Vasastan #88",a:"Vasastan",v:["hidden","art","beautiful"],d:11,s:"Strange copper-tent sculptures in a quiet park that most Stockholmers walk past without knowing",st:"The Koppartälten are three abstract copper sculptures in Vasaparken that have been here since 1970. The park itself is where Vasastan families bring their children. The sculptures have no label.",im:"Time-travel: the sculptures being installed in this park in 1970 while Stockholmers debated whether they were art",t:"Free. Vasaparken is open always.",c:["local_only"],r:"g",nn:"Koppartälten — Vasastan #88",ns:"Märkliga kopparskulpturer i en tyst park som de flesta stockholmare passerar utan att märka",nst:"Koppartälten är tre abstrakta kopparskulpturer i Vasaparken som funnits sedan 1970.",nt:"Gratis. Vasaparken är alltid öppen."},
  {id:89,n:"Kräftriket Nature Reserve — Vasastan #89",a:"Vasastan",v:["nature","hidden","local"],d:10,s:"Wild nature reserve 15 minutes from the city centre — crayfish, herons, walking trails",st:"Kräftriket sits between the university campus and Brunnsviken lake. Old woodland, marsh, and open water. The name means \"crayfish kingdom.\" Crayfish still live in the creek.",im:"Time-travel: Stockholm University students having crayfish parties here by candlelight in the 1960s",t:"Free. Enter from Frescativägen near Stockholm University.",c:["architecture"],r:"g",nn:"Kräftriket naturreservat — Vasastan #89",ns:"Vilt naturreservat 15 minuter från stadskärnan — kräftor, häger, vandringsled",nst:"Kräftriket ligger mellan universitetsområdet och Brunnsviken. Gammal skog, kärr och öppet vatten.",nt:"Gratis. Ingång från Frescativägen nära Stockholms universitet."},
  {id:90,n:"Local Bus Ferries — Djurgården #90",a:"Djurgården",v:["local","weird","beautiful"],d:29,s:"Take Djurgårdslinjen ferry with a regular SL ticket — the cheapest harbour cruise in the city",st:"Line 80 connects Slussen, Djurgården and Skeppsholmen. A single SL metro ticket covers it. Locals use it to cross the water. Tourists pay ten times more for the tourist boats.",im:"Time-travel: the original horse-drawn ferry crossing from Slussen to Djurgården, 1880",t:"Use your regular SL card. Line 80. Runs every 10 minutes in summer.",c:["history_big"],r:"g",nn:"Lokala färjor — Djurgården #90",ns:"Ta Djurgårdslinjen med ett vanligt SL-kort — stadens billigaste hamnkryssning",nst:"Linje 80 förbinder Slussen, Djurgården och Skeppsholmen. Gratis med SL-kort.",nt:"Använd ditt vanliga SL-kort. Linje 80. Avgår var 10:e minut på sommaren."},
  {id:91,n:"Riddarhuset — Gamla Stan #91",a:"Gamla Stan",v:["history","beautiful","hidden"],d:11,s:"The House of Nobility — 2,300 coats of arms cover every wall and ceiling",st:"Built in 1674 as the parliament of the Swedish nobility. The Great Hall has every noble family\'s coat of arms, floor to ceiling. Few visitors find it. The courtyard is free.",im:"Time-travel: the Swedish nobility debating war and succession in this hall, 1700",t:"Courtyard always free. Interior has a small fee. Worth it.",c:["high_spots"],r:"g",nn:"Riddarhuset — Gamla Stan #91",ns:"Riddarhuset — 2 300 vapensköldar täcker varje vägg och tak",nst:"Byggt 1674 som den svenska adelns parlament. Stora salen har varje adelsfamiljs vapensköld.",nt:"Innergården alltid gratis. Interiören kostar lite. Värt det."},
