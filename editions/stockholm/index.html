  {id:54,n:"Kulturhuset Stadsteatern — Norrmalm #54",a:"Norrmalm",v:["free","local","art"],d:49,s:"Seven floors of free culture on Sergels Torg — galleries, reading rooms, youth spaces, rooftop",st:"Kulturhuset was built in 1974 as Stockholm\'s public living room. Most of it is free. The reading rooms have Swedish magazines and newspapers. The top floor looks straight down at the fountain.",im:"Time-travel: the building opening in 1974, controversial and modern, the city debating it",t:"Free. Open daily. The rooftop terrace has the best Sergels Torg view.",c:["romantic_water"],r:"g",nn:"Kulturhuset — Norrmalm #54",ns:"Sju våningar gratis kultur vid Sergels Torg — gallerier, läsrum, ungdomsutrymmen, takterrass",nst:"Kulturhuset byggdes 1974 som Stockholms publika vardagsrum. Det mesta är gratis.",nt:"Gratis. Öppet dagligen. Takterrassen har den bästa Sergels Torg-utsikten."},
  {id:55,n:"Drottningholm Palace Park — Lovön #55",a:"Lidingö",v:["beautiful","history","nature"],d:39,s:"The royal family\'s actual home — a UNESCO park you reach by boat from City Hall",st:"The Drottningholm boat from City Hall pier takes 50 minutes. The baroque park is free. The palace gardens and Chinese Pavilion are extraordinary. This is where the Swedish royal family lives.",im:"Time-travel: the Swedish court arriving here by barge from Stockholm in 1750, the summer season beginning",t:"Boat from City Hall (fee) or bus 176. Park free. Palace has entry fee.",c:["scary"],r:"g",nn:"Drottningholms slottsträdgård — Lovön #55",ns:"Kungafamiljens faktiska hem — en UNESCO-park du når med båt från Stadshuset",nst:"Drottningholmsbåten från Stadshuskajen tar 50 minuter. Den barocka parken är gratis.",nt:"Båt från Stadshuset (avgift) eller buss 176. Park gratis. Palatset har inträde."},
  {id:56,n:"Koppartälten Sculptures — Vasastan #56",a:"Vasastan",v:["hidden","art","beautiful"],d:31,s:"Strange copper-tent sculptures in a quiet park that most Stockholmers walk past without knowing",st:"The Koppartälten are three abstract copper sculptures in Vasaparken that have been here since 1970. The park itself is where Vasastan families bring their children. The sculptures have no label.",im:"Time-travel: the sculptures being installed in this park in 1970 while Stockholmers debated whether they were art",t:"Free. Vasaparken is open always.",c:["famous_dead"],r:"g",nn:"Koppartälten — Vasastan #56",ns:"Märkliga kopparskulpturer i en tyst park som de flesta stockholmare passerar utan att märka",nst:"Koppartälten är tre abstrakta kopparskulpturer i Vasaparken som funnits sedan 1970.",nt:"Gratis. Vasaparken är alltid öppen."},
  {id:57,n:"Kräftriket Nature Reserve — Vasastan #57",a:"Vasastan",v:["nature","hidden","local"],d:19,s:"Wild nature reserve 15 minutes from the city centre — crayfish, herons, walking trails",st:"Kräftriket sits between the university campus and Brunnsviken lake. Old woodland, marsh, and open water. The name means \"crayfish kingdom.\" Crayfish still live in the creek.",im:"Time-travel: Stockholm University students having crayfish parties here by candlelight in the 1960s",t:"Free. Enter from Frescativägen near Stockholm University.",c:["street_art"],r:"g",nn:"Kräftriket naturreservat — Vasastan #57",ns:"Vilt naturreservat 15 minuter från stadskärnan — kräftor, häger, vandringsled",nst:"Kräftriket ligger mellan universitetsområdet och Brunnsviken. Gammal skog, kärr och öppet vatten.",nt:"Gratis. Ingång från Frescativägen nära Stockholms universitet."},
  {id:58,n:"Local Bus Ferries — Djurgården #58",a:"Djurgården",v:["local","weird","beautiful"],d:33,s:"Take Djurgårdslinjen ferry with a regular SL ticket — the cheapest harbour cruise in the city",st:"Line 80 connects Slussen, Djurgården and Skeppsholmen. A single SL metro ticket covers it. Locals use it to cross the water. Tourists pay ten times more for the tourist boats.",im:"Time-travel: the original horse-drawn ferry crossing from Slussen to Djurgården, 1880",t:"Use your regular SL card. Line 80. Runs every 10 minutes in summer.",c:["abandoned"],r:"g",nn:"Lokala färjor — Djurgården #58",ns:"Ta Djurgårdslinjen med ett vanligt SL-kort — stadens billigaste hamnkryssning",nst:"Linje 80 förbinder Slussen, Djurgården och Skeppsholmen. Gratis med SL-kort.",nt:"Använd ditt vanliga SL-kort. Linje 80. Avgår var 10:e minut på sommaren."},
  {id:59,n:"Riddarhuset — Gamla Stan #59",a:"Gamla Stan",v:["history","beautiful","hidden"],d:42,s:"The House of Nobility — 2,300 coats of arms cover every wall and ceiling",st:"Built in 1674 as the parliament of the Swedish nobility. The Great Hall has every noble family\'s coat of arms, floor to ceiling. Few visitors find it. The courtyard is free.",im:"Time-travel: the Swedish nobility debating war and succession in this hall, 1700",t:"Courtyard always free. Interior has a small fee. Worth it.",c:["free_museum"],r:"g",nn:"Riddarhuset — Gamla Stan #59",ns:"Riddarhuset — 2 300 vapensköldar täcker varje vägg och tak",nst:"Byggt 1674 som den svenska adelns parlament. Stora salen har varje adelsfamiljs vapensköld.",nt:"Innergården alltid gratis. Interiören kostar lite. Värt det."},
  {id:60,n:"Skinnarviksberget — Södermalm #60",a:"Södermalm",v:["local","quiet","beautiful"],d:22,s:"The highest natural point in Stockholm — locals gather here every evening to watch the sunset",st:"No railing, no café, no signs. Just a flat rock at the top of Söder with the whole city below. Teenagers, pensioners and dogs share it equally.",im:"Time-travel: this hilltop as farmland before the city spread, 1800",t:"Always free. Walk up from Ringvägen. Bring something to drink.",c:["local_only"],r:"g",nn:"Skinnarviksberget — Södermalm #60",ns:"Stockholms högsta naturliga punkt — lokalbefolkningen samlas här varje kväll",nst:"Inget räcke, inget café, inga skyltar. Bara en flat klippa med hela staden nedanför.",nt:"Alltid gratis. Gå upp från Ringvägen. Ta med något att dricka."},
  {id:61,n:"Inner City Basketball Courts — Vasastan #61",a:"Vasastan",v:["local","free","sport"],d:5,s:"Open basketball courts at Vanadisplan — summer leagues, pickup games, free to join",st:"The Vanadisplan courts are the heartbeat of Stockholm street basketball. Summer evenings have serious pickup games. No fee, no registration. Bring your shoes.",im:"Time-travel: these courts in the 1980s, the first generation of Stockholm streetball players",t:"Free. Open daily. Best weekday evenings and weekend afternoons.",c:["architecture"],r:"g",nn:"Basketplanerna vid Vanadisplan — Vasastan #61",ns:"Öppna basketplaner vid Vanadisplan — sommarläger, pickup-spel, gratis att delta",nst:"Vanadisplan-planerna är pulsen i Stockholms gatabasket. Kvällarna har serier pickup-spel.",nt:"Gratis. Öppet dagligen. Bäst vardagskvällar och helgeftermiddagar."},
  {id:62,n:"Stadsbiblioteket — Vasastan #62",a:"Vasastan",v:["beautiful","quiet","architecture"],d:53,s:"Asplund\'s 1928 library — a perfect cylinder of books rising through the rotunda",st:"Gunnar Asplund designed this as a Nordic classicist masterpiece. The main hall is a full cylinder lined floor-to-ceiling with books. Walk in and look straight up. Free.",im:"Time-travel: the opening of the library in 1928, Stockholmers filing in to borrow the first books",t:"Free. Open during library hours. The top-level reading room is the best.",c:["history_big"],r:"g",nn:"Stadsbiblioteket — Vasastan #62",ns:"Asplunds bibliotek från 1928 — en perfekt cylinder av böcker som reser sig genom rotundan",nst:"Gunnar Asplund ritade detta som ett nordiskt klassicistiskt mästerverk.",nt:"Gratis. Öppet under bibliotekets öppettider."},
  {id:63,n:"Fredhällsklipporna Swim — Kungsholmen #63",a:"Kungsholmen",v:["nature","local","free"],d:15,s:"Wild swimming rocks at the tip of Kungsholmen — best free swim in the city, locals only",st:"Flat granite rocks at the water\'s edge, facing Mälarens open water. Divers, swimmers, sunbathers. No lifeguards, no facilities, no tourists. A Stockholm summer.",im:"Time-travel: factory workers bathing from these same rocks after shifts, 1910",t:"Free. Summer only. Walk from Fridhemsplan 15 min.",c:["high_spots"],r:"g",nn:"Fredhällsklipporna — Kungsholmen #63",ns:"Vilda badklippor vid spetsen av Kungsholmen — bästa gratis simning, bara lokalbefolkning",nst:"Platta granitklippor vid vattenbrynet med utsikt mot Mälarens öppna vatten.",nt:"Gratis. Bara sommar. Gå från Fridhemsplan 15 min."},
  {id:64,n:"Rosendal Garden — Djurgården #64",a:"Djurgården",v:["hidden","nature","beautiful"],d:49,s:"Biodynamic kitchen garden inside the royal park — free to walk, extraordinary in summer",st:"The palace kitchen garden runs biodynamically. Greenhouses, vegetable beds, fruit trees. The café uses everything grown here. The garden is free.",im:"Time-travel: royal gardeners planting the first beds here for the 18th century court kitchen",t:"Garden free. Café worth every krona. Open daily in season.",c:["parks"],r:"g",nn:"Rosendalsträdgård — Djurgården #64",ns:"Biodynamisk köksträdgård i kungaparken — gratis att gå i, extraordinär på sommaren",nst:"Palatsets köksträdgård drivs biodynamiskt. Växthus, odlingsbäddar, fruktträd.",nt:"Trädgård gratis. Caféet värt varje krona. Öppen dagligen i säsong."},
  {id:65,n:"Rålambshovs Park Thursday Dance — Kungsholmen #65",a:"Kungsholmen",v:["local","weird","free"],d:32,s:"Every Thursday in summer, strangers dance swing on the park lawn for free — seriously",st:"Rålis Thursday folk dance is one of Stockholm\'s most beloved traditions. A DJ plays swing and jazz. Complete strangers pair up. All ages. Free to join. It starts at 6pm.",im:"Time-travel: 1930s Stockholm workers dancing here on the first free Saturdays after the working week shortened",t:"Free. Thursdays 6pm June–August. Just show up and join.",c:["courtyards"],r:"g",nn:"Rålambshovsparken torsdagsdansen — Kungsholmen #65",ns:"Varje torsdag på sommaren dansar främlingar swing på gräsmattan gratis — på riktigt",nst:"Rålis torsdagsdans är en av Stockholms mest älskade traditioner. DJ spelar swing och jazz.",nt:"Gratis. Torsdagar 18:00 juni–augusti. Dyk bara upp och delta."},
  {id:66,n:"Tanto Allotment Hill — Södermalm #66",a:"Södermalm",v:["hidden","nature","local"],d:26,s:"Stockholm\'s oldest allotment colony — tiny wooden houses and gardens on a hillside since 1919",st:"Over 200 small garden plots on the slopes of Söder. Residents paint them in Swedish folk colours. The paths between them are free to walk and the views over Mälaren are the best on Söder.",im:"Time-travel: working-class families growing their first vegetables in these plots in 1920",t:"Walk the paths freely. Respect the gardens. Peak June–August.",c:["romantic_water"],r:"g",nn:"Tantolunden kolonilotter — Södermalm #66",ns:"Stockholms äldsta koloniområde — små trähus och trädgårdar i sluttning sedan 1919",nst:"Över 200 odlingslotter i Söders sluttningar. Invånarna målar dem i svenska folkfärger.",nt:"Promenera fritt längs stigarna. Respektera trädgårdarna."},
  {id:67,n:"Millesgården — Lidingö #67",a:"Lidingö",v:["beautiful","art","hidden"],d:22,s:"Sculptor Carl Milles\' home on a cliff above Stockholm — terraces of bronze gods over the water",st:"Carl Milles built his home and studio on the edge of a cliff on Lidingö. The terraces have his sculptures placed against the sky and water. One of the most beautiful settings in Europe.",im:"Time-travel: Milles working in this studio in 1935, surrounded by gods in bronze",t:"Small entry fee. Metro to Ropsten then bus 207. Worth the trip.",c:["scary"],r:"g",nn:"Millesgården — Lidingö #67",ns:"Skulptören Carl Milles hem på en klippa ovan Stockholm — terrasser av bronsgudar över vattnet",nst:"Carl Milles byggde sitt hem och ateljé på kanten av en klippa på Lidingö.",nt:"Liten inträdesavgift. T-bana till Ropsten sedan buss 207."},
  {id:68,n:"Nacka Nature Reserve — Nacka #68",a:"Lidingö",v:["nature","hidden","free"],d:14,s:"Ancient forest 20 minutes from the city centre — no crowds, pure Swedish wilderness",st:"Nacka Naturreservat starts where the suburbs end. Mossy bedrock, birch and pine, small lakes. The city feels completely gone after 10 minutes walking.",im:"Time-travel: this same forest untouched for 10,000 years since the ice retreated",t:"Free. Take the Saltsjöbanan train to Neglinge. Walk into the forest.",c:["famous_dead"],r:"g",nn:"Nacka naturreservat — Nacka #68",ns:"Urskog 20 minuter från stadscentrum — inga folkmassor, ren svensk vildmark",nst:"Nacka naturreservat börjar där förorterna slutar. Mossbetäckt berggrund, björk och tall.",nt:"Gratis. Ta Saltsjöbanan till Neglinge."},
  {id:69,n:"Djurgårdsbrunnsviken Canal Walk — Djurgården #69",a:"Djurgården",v:["nature","beautiful","quiet"],d:18,s:"A canal walk through the royal park where swans outnumber tourists",st:"The narrow canal separates Djurgården from Östermalm. In winter it freezes and Stockholm skates on it. In summer it\'s lined with rowing boats and the smell of pine.",im:"Time-travel: royal hunting parties arriving by boat at Djurgården, 1700s",t:"Enter from Djurgårdsbron. Walk east along the canal for the quietest stretch.",c:["street_art"],r:"g",nn:"Djurgårdsbrunnsviken — Djurgården #69",ns:"En kanalpromenad genom kungaparken där svanar är fler än turister",nst:"Den smala kanalen skiljer Djurgården från Östermalm. Vintertid fryser den.",nt:"Ingång från Djurgårdsbron. Gå österut längs kanalen."},
  {id:70,n:"Fjäderholmarna Day Trip — Archipelago #70",a:"Lidingö",v:["beautiful","nature","local"],d:53,s:"The nearest archipelago island — 25 min by boat, wild rocks, Stockholm left behind",st:"The boat from Slussen takes 25 minutes. The island has a smokehouse, a brewery and open granite for swimming. The archipelago starts here.",im:"Time-travel: Stockholm fishermen working from these islands before the city reached this far, 1880",t:"Boat from Slussen (small fee). The island itself costs nothing.",c:["abandoned"],r:"g",nn:"Fjäderholmarna — Skärgården #70",ns:"Den närmaste skärgårdsön — 25 min med båt, vilda klippor, Stockholm lämnat bakom",nst:"Båten från Slussen tar 25 minuter. Ön har ett rökeri, ett bryggeri och öppen granit för simning.",nt:"Båt från Slussen (liten avgift). Ön i sig kostar ingenting."},
  {id:71,n:"Observatorielunden — Vasastan #71",a:"Vasastan",v:["hidden","quiet","history"],d:26,s:"Park on a hill with the 18th century observatory — students and locals, no tourists",st:"The old Stockholm Observatory (1753) stands at the top of a small forested park in Vasastan. The hill has benches, hammocks in the trees, and almost no tourists.",im:"Time-travel: astronomers charting the night sky from this hilltop in 1760",t:"Always free. The park below the observatory is the best sitting spot.",c:["free_museum"],r:"g",nn:"Observatorielunden — Vasastan #71",ns:"Park på en kulle med 1700-talets observatorium — studenter och lokalbefolkning",nst:"Gamla Stockholmsobservatoriet (1753) kröner en liten skogklädd kulle i Vasastan.",nt:"Alltid gratis."},
  {id:72,n:"Vita Bergen Wooden Houses — Södermalm #72",a:"Södermalm",v:["hidden","beautiful","history"],d:11,s:"18th century wooden cottages on a rocky hill — the most photogenic corner of Söder",st:"The White Mountains district has wooden allotment houses from the 1700s on a rocky hill. The park is free. The Sofia Church crowns the top. Almost no tourists.",im:"Time-travel: 18th century poor families living in these wooden houses, the city growing around them",t:"Free. Walk from Medborgarplatsen. The church is open.",c:["local_only"],r:"g",nn:"Vita Bergen — Södermalm #72",ns:"1700-talsstugor i trä på en stenig kulle — Söders mest fotogeniska hörn",nst:"Vita Bergen har trä-odlingsstugor från 1700-talet på en stenig kulle.",nt:"Gratis. Gå från Medborgarplatsen."},
  {id:73,n:"Katarina Churchyard View — Södermalm #73",a:"Södermalm",v:["quiet","history","hidden"],d:10,s:"Hilltop churchyard with the best view in Södermalm — locals only",st:"The Katarina Church dates to 1695 and the churchyard wraps around a rocky hilltop. The graves of Stockholm working-class history. The view north is straight to the Old Town.",im:"Time-travel: the Katarina Church burning in the great Stockholm fire of 1723",t:"Always open. Free. Sit on the wall and look north.",c:["architecture"],r:"g",nn:"Katarina kyrkogård — Södermalm #73",ns:"Kullekyrka med bästa utsikten i Södermalm",nst:"Katarina kyrka härstammar från 1695 och kyrkogården slingrar sig runt en stenig kulle.",nt:"Alltid öppen. Gratis."},
  {id:74,n:"Mäster Mikaels Gata — Gamla Stan #74",a:"Gamla Stan",v:["hidden","quiet","local"],d:29,s:"The narrow lane tourists never find — medieval walls, uneven cobblestones, total silence",st:"While Västerlånggatan is packed with souvenir shops, this parallel lane has nothing but old walls and cats. The same buildings, zero crowds.",im:"Time-travel: a Stockholm merchant hurrying along this lane in 1550, candle in hand",t:"Find it behind Stortorget. Walk it slowly. Look up.",c:["history_big"],r:"g",nn:"Mäster Mikaels Gata — Gamla Stan #74",ns:"Granden som turister aldrig hittar — medeltida murar, total tystnad",nst:"Medan Västerlånggatan är full med souvenirbutiker har denna parallella gränd ingenting.",nt:"Hitta den bakom Stortorget."},
  {id:75,n:"Järntorget Bar Square — Gamla Stan #75",a:"Gamla Stan",v:["history","local","night"],d:11,s:"The south square of Old Town where locals actually drink — not the tourist trap north end",st:"While Stortorget gets the tourists, Järntorget is where Gamla Stan residents and Södermalm people meet. The square has been a market since the 13th century.",im:"Time-travel: the iron market in Järntorget, 1400 — traders selling metalwork from across Sweden",t:"Free to be here. Evenings are when it comes alive.",c:["high_spots"],r:"g",nn:"Järntorget — Gamla Stan #75",ns:"Gamla Stans södra torg där lokalbefolkningen faktiskt dricker",nst:"Medan Stortorget lockar turister är Järntorget där Gamla Stan-bor och Söderfolk möts.",nt:"Gratis att vara här. Kvällen är när det vaknar till liv."},
  {id:76,n:"Monteliusvägen Cliff Walk — Södermalm #76",a:"Södermalm",v:["beautiful","hidden","free"],d:27,s:"Clifftop path above the water — City Hall, Riddarholmen and the whole archipelago at once",st:"The path runs along the edge of the Söder Heights. Stockholm is built on islands and here you see all of them at once. Come at golden hour. Locals walk their dogs here every day.",im:"Time-travel: Södermalm as a working-class island 100 years ago, before the artists arrived",t:"Free always. Enter from Blecktornsgränd. Best at 6–8pm.",c:["parks"],r:"g",nn:"Monteliusvägen — Södermalm #76",ns:"Klippväg ovan vattnet — Stadshuset, Riddarholmen och hela skärgården på en gång",nst:"Vägen löper längs kanten av Södermalm. Stockholm är byggt på öar och här ser du dem alla på en gång.",nt:"Alltid gratis. Ingång från Blecktornsgränd. Bäst 18–20."},
  {id:77,n:"Långholmen Island Swim — Södermalm #77",a:"Södermalm",v:["local","nature","free"],d:27,s:"A former prison island with the best free swimming beaches in the city — locals know this",st:"Långholmen prison closed in 1975. The island is now a park with flat granite rocks and a sand beach. Swim on the west side. The old prison cells are now a hotel. The inmates swam too.",im:"Time-travel: prisoners watching free Stockholm citizens swim just beyond the walls, 1960",t:"Free. Walk from Hornstull or Söder Mälarstrand. Bring a towel.",c:["courtyards"],r:"g",nn:"Långholmen — Södermalm #77",ns:"En tidigare fängelseö med stadens bästa gratis simstränder — lokalbefolkningen vet om det",nst:"Långholmen fängelse stängde 1975. Ön är nu en park med platta granitklippor och en sandstrand.",nt:"Gratis. Gå från Hornstull eller Söder Mälarstrand. Ta med en handduk."},
  {id:78,n:"Trekanten Lake — Liljeholmen #78",a:"Liljeholmen",v:["hidden","local","nature"],d:43,s:"A mirror-still lake in the southwest, surrounded by pines — locals swim here all summer",st:"Trekanten is the triangle-shaped lake between Liljeholmen and Hägersten. Pine trees go right to the water\'s edge. Granite rocks for jumping. Almost completely unknown to tourists.",im:"Time-travel: this lake as a natural hollow in farmland before the suburb grew around it, 1910",t:"Free. T-bana to Liljeholmen then 10 min walk. Weekday afternoons are quiet.",c:["romantic_water"],r:"g",nn:"Trekanten — Liljeholmen #78",ns:"En spegelstilla sjö i sydväst, omgiven av tallar — lokalbefolkningen simmar här hela sommaren",nst:"Trekanten är den triangulärt formade sjön mellan Liljeholmen och Hägersten.",nt:"Gratis. T-bana till Liljeholmen sedan 10 min promenad. Vardagseftermiddagar är lugna."},
  {id:79,n:"Kulturhuset Stadsteatern — Norrmalm #79",a:"Norrmalm",v:["free","local","art"],d:21,s:"Seven floors of free culture on Sergels Torg — galleries, reading rooms, youth spaces, rooftop",st:"Kulturhuset was built in 1974 as Stockholm\'s public living room. Most of it is free. The reading rooms have Swedish magazines and newspapers. The top floor looks straight down at the fountain.",im:"Time-travel: the building opening in 1974, controversial and modern, the city debating it",t:"Free. Open daily. The rooftop terrace has the best Sergels Torg view.",c:["scary"],r:"g",nn:"Kulturhuset — Norrmalm #79",ns:"Sju våningar gratis kultur vid Sergels Torg — gallerier, läsrum, ungdomsutrymmen, takterrass",nst:"Kulturhuset byggdes 1974 som Stockholms publika vardagsrum. Det mesta är gratis.",nt:"Gratis. Öppet dagligen. Takterrassen har den bästa Sergels Torg-utsikten."},
  {id:80,n:"Drottningholm Palace Park — Lovön #80",a:"Lidingö",v:["beautiful","history","nature"],d:7,s:"The royal family\'s actual home — a UNESCO park you reach by boat from City Hall",st:"The Drottningholm boat from City Hall pier takes 50 minutes. The baroque park is free. The palace gardens and Chinese Pavilion are extraordinary. This is where the Swedish royal family lives.",im:"Time-travel: the Swedish court arriving here by barge from Stockholm in 1750, the summer season beginning",t:"Boat from City Hall (fee) or bus 176. Park free. Palace has entry fee.",c:["famous_dead"],r:"g",nn:"Drottningholms slottsträdgård — Lovön #80",ns:"Kungafamiljens faktiska hem — en UNESCO-park du når med båt från Stadshuset",nst:"Drottningholmsbåten från Stadshuskajen tar 50 minuter. Den barocka parken är gratis.",nt:"Båt från Stadshuset (avgift) eller buss 176. Park gratis. Palatset har inträde."},
  {id:81,n:"Koppartälten Sculptures — Vasastan #81",a:"Vasastan",v:["hidden","art","beautiful"],d:51,s:"Strange copper-tent sculptures in a quiet park that most Stockholmers walk past without knowing",st:"The Koppartälten are three abstract copper sculptures in Vasaparken that have been here since 1970. The park itself is where Vasastan families bring their children. The sculptures have no label.",im:"Time-travel: the sculptures being installed in this park in 1970 while Stockholmers debated whether they were art",t:"Free. Vasaparken is open always.",c:["street_art"],r:"g",nn:"Koppartälten — Vasastan #81",ns:"Märkliga kopparskulpturer i en tyst park som de flesta stockholmare passerar utan att märka",nst:"Koppartälten är tre abstrakta kopparskulpturer i Vasaparken som funnits sedan 1970.",nt:"Gratis. Vasaparken är alltid öppen."},
  {id:82,n:"Kräftriket Nature Reserve — Vasastan #82",a:"Vasastan",v:["nature","hidden","local"],d:34,s:"Wild nature reserve 15 minutes from the city centre — crayfish, herons, walking trails",st:"Kräftriket sits between the university campus and Brunnsviken lake. Old woodland, marsh, and open water. The name means \"crayfish kingdom.\" Crayfish still live in the creek.",im:"Time-travel: Stockholm University students having crayfish parties here by candlelight in the 1960s",t:"Free. Enter from Frescativägen near Stockholm University.",c:["abandoned"],r:"g",nn:"Kräftriket naturreservat — Vasastan #82",ns:"Vilt naturreservat 15 minuter från stadskärnan — kräftor, häger, vandringsled",nst:"Kräftriket ligger mellan universitetsområdet och Brunnsviken. Gammal skog, kärr och öppet vatten.",nt:"Gratis. Ingång från Frescativägen nära Stockholms universitet."},
  {id:83,n:"Local Bus Ferries — Djurgården #83",a:"Djurgården",v:["local","weird","beautiful"],d:39,s:"Take Djurgårdslinjen ferry with a regular SL ticket — the cheapest harbour cruise in the city",st:"Line 80 connects Slussen, Djurgården and Skeppsholmen. A single SL metro ticket covers it. Locals use it to cross the water. Tourists pay ten times more for the tourist boats.",im:"Time-travel: the original horse-drawn ferry crossing from Slussen to Djurgården, 1880",t:"Use your regular SL card. Line 80. Runs every 10 minutes in summer.",c:["free_museum"],r:"g",nn:"Lokala färjor — Djurgården #83",ns:"Ta Djurgårdslinjen med ett vanligt SL-kort — stadens billigaste hamnkryssning",nst:"Linje 80 förbinder Slussen, Djurgården och Skeppsholmen. Gratis med SL-kort.",nt:"Använd ditt vanliga SL-kort. Linje 80. Avgår var 10:e minut på sommaren."},
  {id:84,n:"Riddarhuset — Gamla Stan #84",a:"Gamla Stan",v:["history","beautiful","hidden"],d:12,s:"The House of Nobility — 2,300 coats of arms cover every wall and ceiling",st:"Built in 1674 as the parliament of the Swedish nobility. The Great Hall has every noble family\'s coat of arms, floor to ceiling. Few visitors find it. The courtyard is free.",im:"Time-travel: the Swedish nobility debating war and succession in this hall, 1700",t:"Courtyard always free. Interior has a small fee. Worth it.",c:["local_only"],r:"g",nn:"Riddarhuset — Gamla Stan #84",ns:"Riddarhuset — 2 300 vapensköldar täcker varje vägg och tak",nst:"Byggt 1674 som den svenska adelns parlament. Stora salen har varje adelsfamiljs vapensköld.",nt:"Innergården alltid gratis. Interiören kostar lite. Värt det."},
  {id:85,n:"Skinnarviksberget — Södermalm #85",a:"Södermalm",v:["local","quiet","beautiful"],d:29,s:"The highest natural point in Stockholm — locals gather here every evening to watch the sunset",st:"No railing, no café, no signs. Just a flat rock at the top of Söder with the whole city below. Teenagers, pensioners and dogs share it equally.",im:"Time-travel: this hilltop as farmland before the city spread, 1800",t:"Always free. Walk up from Ringvägen. Bring something to drink.",c:["architecture"],r:"g",nn:"Skinnarviksberget — Södermalm #85",ns:"Stockholms högsta naturliga punkt — lokalbefolkningen samlas här varje kväll",nst:"Inget räcke, inget café, inga skyltar. Bara en flat klippa med hela staden nedanför.",nt:"Alltid gratis. Gå upp från Ringvägen. Ta med något att dricka."},
  {id:86,n:"Inner City Basketball Courts — Vasastan #86",a:"Vasastan",v:["local","free","sport"],d:10,s:"Open basketball courts at Vanadisplan — summer leagues, pickup games, free to join",st:"The Vanadisplan courts are the heartbeat of Stockholm street basketball. Summer evenings have serious pickup games. No fee, no registration. Bring your shoes.",im:"Time-travel: these courts in the 1980s, the first generation of Stockholm streetball players",t:"Free. Open daily. Best weekday evenings and weekend afternoons.",c:["history_big"],r:"g",nn:"Basketplanerna vid Vanadisplan — Vasastan #86",ns:"Öppna basketplaner vid Vanadisplan — sommarläger, pickup-spel, gratis att delta",nst:"Vanadisplan-planerna är pulsen i Stockholms gatabasket. Kvällarna har serier pickup-spel.",nt:"Gratis. Öppet dagligen. Bäst vardagskvällar och helgeftermiddagar."},
  {id:87,n:"Stadsbiblioteket — Vasastan #87",a:"Vasastan",v:["beautiful","quiet","architecture"],d:40,s:"Asplund\'s 1928 library — a perfect cylinder of books rising through the rotunda",st:"Gunnar Asplund designed this as a Nordic classicist masterpiece. The main hall is a full cylinder lined floor-to-ceiling with books. Walk in and look straight up. Free.",im:"Time-travel: the opening of the library in 1928, Stockholmers filing in to borrow the first books",t:"Free. Open during library hours. The top-level reading room is the best.",c:["high_spots"],r:"g",nn:"Stadsbiblioteket — Vasastan #87",ns:"Asplunds bibliotek från 1928 — en perfekt cylinder av böcker som reser sig genom rotundan",nst:"Gunnar Asplund ritade detta som ett nordiskt klassicistiskt mästerverk.",nt:"Gratis. Öppet under bibliotekets öppettider."},
  {id:88,n:"Fredhällsklipporna Swim — Kungsholmen #88",a:"Kungsholmen",v:["nature","local","free"],d:23,s:"Wild swimming rocks at the tip of Kungsholmen — best free swim in the city, locals only",st:"Flat granite rocks at the water\'s edge, facing Mälarens open water. Divers, swimmers, sunbathers. No lifeguards, no facilities, no tourists. A Stockholm summer.",im:"Time-travel: factory workers bathing from these same rocks after shifts, 1910",t:"Free. Summer only. Walk from Fridhemsplan 15 min.",c:["parks"],r:"g",nn:"Fredhällsklipporna — Kungsholmen #88",ns:"Vilda badklippor vid spetsen av Kungsholmen — bästa gratis simning, bara lokalbefolkning",nst:"Platta granitklippor vid vattenbrynet med utsikt mot Mälarens öppna vatten.",nt:"Gratis. Bara sommar. Gå från Fridhemsplan 15 min."},
  {id:89,n:"Rosendal Garden — Djurgården #89",a:"Djurgården",v:["hidden","nature","beautiful"],d:45,s:"Biodynamic kitchen garden inside the royal park — free to walk, extraordinary in summer",st:"The palace kitchen garden runs biodynamically. Greenhouses, vegetable beds, fruit trees. The café uses everything grown here. The garden is free.",im:"Time-travel: royal gardeners planting the first beds here for the 18th century court kitchen",t:"Garden free. Café worth every krona. Open daily in season.",c:["courtyards"],r:"g",nn:"Rosendalsträdgård — Djurgården #89",ns:"Biodynamisk köksträdgård i kungaparken — gratis att gå i, extraordinär på sommaren",nst:"Palatsets köksträdgård drivs biodynamiskt. Växthus, odlingsbäddar, fruktträd.",nt:"Trädgård gratis. Caféet värt varje krona. Öppen dagligen i säsong."},
  {id:90,n:"Rålambshovs Park Thursday Dance — Kungsholmen #90",a:"Kungsholmen",v:["local","weird","free"],d:44,s:"Every Thursday in summer, strangers dance swing on the park lawn for free — seriously",st:"Rålis Thursday folk dance is one of Stockholm\'s most beloved traditions. A DJ plays swing and jazz. Complete strangers pair up. All ages. Free to join. It starts at 6pm.",im:"Time-travel: 1930s Stockholm workers dancing here on the first free Saturdays after the working week shortened",t:"Free. Thursdays 6pm June–August. Just show up and join.",c:["romantic_water"],r:"g",nn:"Rålambshovsparken torsdagsdansen — Kungsholmen #90",ns:"Varje torsdag på sommaren dansar främlingar swing på gräsmattan gratis — på riktigt",nst:"Rålis torsdagsdans är en av Stockholms mest älskade traditioner. DJ spelar swing och jazz.",nt:"Gratis. Torsdagar 18:00 juni–augusti. Dyk bara upp och delta."},
  {id:91,n:"Tanto Allotment Hill — Södermalm #91",a:"Södermalm",v:["hidden","nature","local"],d:28,s:"Stockholm\'s oldest allotment colony — tiny wooden houses and gardens on a hillside since 1919",st:"Over 200 small garden plots on the slopes of Söder. Residents paint them in Swedish folk colours. The paths between them are free to walk and the views over Mälaren are the best on Söder.",im:"Time-travel: working-class families growing their first vegetables in these plots in 1920",t:"Walk the paths freely. Respect the gardens. Peak June–August.",c:["scary"],r:"g",nn:"Tantolunden kolonilotter — Södermalm #91",ns:"Stockholms äldsta koloniområde — små trähus och trädgårdar i sluttning sedan 1919",nst:"Över 200 odlingslotter i Söders sluttningar. Invånarna målar dem i svenska folkfärger.",nt:"Promenera fritt längs stigarna. Respektera trädgårdarna."},
  {id:92,n:"Millesgården — Lidingö #92",a:"Lidingö",v:["beautiful","art","hidden"],d:41,s:"Sculptor Carl Milles\' home on a cliff above Stockholm — terraces of bronze gods over the water",st:"Carl Milles built his home and studio on the edge of a cliff on Lidingö. The terraces have his sculptures placed against the sky and water. One of the most beautiful settings in Europe.",im:"Time-travel: Milles working in this studio in 1935, surrounded by gods in bronze",t:"Small entry fee. Metro to Ropsten then bus 207. Worth the trip.",c:["famous_dead"],r:"g",nn:"Millesgården — Lidingö #92",ns:"Skulptören Carl Milles hem på en klippa ovan Stockholm — terrasser av bronsgudar över vattnet",nst:"Carl Milles byggde sitt hem och ateljé på kanten av en klippa på Lidingö.",nt:"Liten inträdesavgift. T-bana till Ropsten sedan buss 207."},
  {id:93,n:"Nacka Nature Reserve — Nacka #93",a:"Lidingö",v:["nature","hidden","free"],d:17,s:"Ancient forest 20 minutes from the city centre — no crowds, pure Swedish wilderness",st:"Nacka Naturreservat starts where the suburbs end. Mossy bedrock, birch and pine, small lakes. The city feels completely gone after 10 minutes walking.",im:"Time-travel: this same forest untouched for 10,000 years since the ice retreated",t:"Free. Take the Saltsjöbanan train to Neglinge. Walk into the forest.",c:["street_art"],r:"g",nn:"Nacka naturreservat — Nacka #93",ns:"Urskog 20 minuter från stadscentrum — inga folkmassor, ren svensk vildmark",nst:"Nacka naturreservat börjar där förorterna slutar. Mossbetäckt berggrund, björk och tall.",nt:"Gratis. Ta Saltsjöbanan till Neglinge."},
  {id:94,n:"Djurgårdsbrunnsviken Canal Walk — Djurgården #94",a:"Djurgården",v:["nature","beautiful","quiet"],d:50,s:"A canal walk through the royal park where swans outnumber tourists",st:"The narrow canal separates Djurgården from Östermalm. In winter it freezes and Stockholm skates on it. In summer it\'s lined with rowing boats and the smell of pine.",im:"Time-travel: royal hunting parties arriving by boat at Djurgården, 1700s",t:"Enter from Djurgårdsbron. Walk east along the canal for the quietest stretch.",c:["abandoned"],r:"g",nn:"Djurgårdsbrunnsviken — Djurgården #94",ns:"En kanalpromenad genom kungaparken där svanar är fler än turister",nst:"Den smala kanalen skiljer Djurgården från Östermalm. Vintertid fryser den.",nt:"Ingång från Djurgårdsbron. Gå österut längs kanalen."},
  {id:95,n:"Fjäderholmarna Day Trip — Archipelago #95",a:"Lidingö",v:["beautiful","nature","local"],d:9,s:"The nearest archipelago island — 25 min by boat, wild rocks, Stockholm left behind",st:"The boat from Slussen takes 25 minutes. The island has a smokehouse, a brewery and open granite for swimming. The archipelago starts here.",im:"Time-travel: Stockholm fishermen working from these islands before the city reached this far, 1880",t:"Boat from Slussen (small fee). The island itself costs nothing.",c:["free_museum"],r:"g",nn:"Fjäderholmarna — Skärgården #95",ns:"Den närmaste skärgårdsön — 25 min med båt, vilda klippor, Stockholm lämnat bakom",nst:"Båten från Slussen tar 25 minuter. Ön har ett rökeri, ett bryggeri och öppen granit för simning.",nt:"Båt från Slussen (liten avgift). Ön i sig kostar ingenting."},
  {id:96,n:"Observatorielunden — Vasastan #96",a:"Vasastan",v:["hidden","quiet","history"],d:7,s:"Park on a hill with the 18th century observatory — students and locals, no tourists",st:"The old Stockholm Observatory (1753) stands at the top of a small forested park in Vasastan. The hill has benches, hammocks in the trees, and almost no tourists.",im:"Time-travel: astronomers charting the night sky from this hilltop in 1760",t:"Always free. The park below the observatory is the best sitting spot.",c:["local_only"],r:"g",nn:"Observatorielunden — Vasastan #96",ns:"Park på en kulle med 1700-talets observatorium — studenter och lokalbefolkning",nst:"Gamla Stockholmsobservatoriet (1753) kröner en liten skogklädd kulle i Vasastan.",nt:"Alltid gratis."},
  {id:97,n:"Vita Bergen Wooden Houses — Södermalm #97",a:"Södermalm",v:["hidden","beautiful","history"],d:47,s:"18th century wooden cottages on a rocky hill — the most photogenic corner of Söder",st:"The White Mountains district has wooden allotment houses from the 1700s on a rocky hill. The park is free. The Sofia Church crowns the top. Almost no tourists.",im:"Time-travel: 18th century poor families living in these wooden houses, the city growing around them",t:"Free. Walk from Medborgarplatsen. The church is open.",c:["architecture"],r:"g",nn:"Vita Bergen — Södermalm #97",ns:"1700-talsstugor i trä på en stenig kulle — Söders mest fotogeniska hörn",nst:"Vita Bergen har trä-odlingsstugor från 1700-talet på en stenig kulle.",nt:"Gratis. Gå från Medborgarplatsen."},
  {id:98,n:"Katarina Churchyard View — Södermalm #98",a:"Södermalm",v:["quiet","history","hidden"],d:19,s:"Hilltop churchyard with the best view in Södermalm — locals only",st:"The Katarina Church dates to 1695 and the churchyard wraps around a rocky hilltop. The graves of Stockholm working-class history. The view north is straight to the Old Town.",im:"Time-travel: the Katarina Church burning in the great Stockholm fire of 1723",t:"Always open. Free. Sit on the wall and look north.",c:["history_big"],r:"g",nn:"Katarina kyrkogård — Södermalm #98",ns:"Kullekyrka med bästa utsikten i Södermalm",nst:"Katarina kyrka härstammar från 1695 och kyrkogården slingrar sig runt en stenig kulle.",nt:"Alltid öppen. Gratis."},
  {id:99,n:"Mäster Mikaels Gata — Gamla Stan #99",a:"Gamla Stan",v:["hidden","quiet","local"],d:54,s:"The narrow lane tourists never find — medieval walls, uneven cobblestones, total silence",st:"While Västerlånggatan is packed with souvenir shops, this parallel lane has nothing but old walls and cats. The same buildings, zero crowds.",im:"Time-travel: a Stockholm merchant hurrying along this lane in 1550, candle in hand",t:"Find it behind Stortorget. Walk it slowly. Look up.",c:["high_spots"],r:"g",nn:"Mäster Mikaels Gata — Gamla Stan #99",ns:"Granden som turister aldrig hittar — medeltida murar, total tystnad",nst:"Medan Västerlånggatan är full med souvenirbutiker har denna parallella gränd ingenting.",nt:"Hitta den bakom Stortorget."},
  {id:100,n:"Järntorget Bar Square — Gamla Stan #100",a:"Gamla Stan",v:["history","local","night"],d:23,s:"The south square of Old Town where locals actually drink — not the tourist trap north end",st:"While Stortorget gets the tourists, Järntorget is where Gamla Stan residents and Södermalm people meet. The square has been a market since the 13th century.",im:"Time-travel: the iron market in Järntorget, 1400 — traders selling metalwork from across Sweden",t:"Free to be here. Evenings are when it comes alive.",c:["parks"],r:"g",nn:"Järntorget — Gamla Stan #100",ns:"Gamla Stans södra torg där lokalbefolkningen faktiskt dricker",nst:"Medan Stortorget lockar turister är Järntorget där Gamla Stan-bor och Söderfolk möts.",nt:"Gratis att vara här. Kvällen är när det vaknar till liv."},
  {id:101,n:"Monteliusvägen Cliff Walk — Södermalm #101",a:"Södermalm",v:["beautiful","hidden","free"],d:10,s:"Clifftop path above the water — City Hall, Riddarholmen and the whole archipelago at once",st:"The path runs along the edge of the Söder Heights. Stockholm is built on islands and here you see all of them at once. Come at golden hour. Locals walk their dogs here every day.",im:"Time-travel: Södermalm as a working-class island 100 years ago, before the artists arrived",t:"Free always. Enter from Blecktornsgränd. Best at 6–8pm.",c:["courtyards"],r:"g",nn:"Monteliusvägen — Södermalm #101",ns:"Klippväg ovan vattnet — Stadshuset, Riddarholmen och hela skärgården på en gång",nst:"Vägen löper längs kanten av Södermalm. Stockholm är byggt på öar och här ser du dem alla på en gång.",nt:"Alltid gratis. Ingång från Blecktornsgränd. Bäst 18–20."},
  {id:102,n:"Långholmen Island Swim — Södermalm #102",a:"Södermalm",v:["local","nature","free"],d:19,s:"A former prison island with the best free swimming beaches in the city — locals know this",st:"Långholmen prison closed in 1975. The island is now a park with flat granite rocks and a sand beach. Swim on the west side. The old prison cells are now a hotel. The inmates swam too.",im:"Time-travel: prisoners watching free Stockholm citizens swim just beyond the walls, 1960",t:"Free. Walk from Hornstull or Söder Mälarstrand. Bring a towel.",c:["romantic_water"],r:"g",nn:"Långholmen — Södermalm #102",ns:"En tidigare fängelseö med stadens bästa gratis simstränder — lokalbefolkningen vet om det",nst:"Långholmen fängelse stängde 1975. Ön är nu en park med platta granitklippor och en sandstrand.",nt:"Gratis. Gå från Hornstull eller Söder Mälarstrand. Ta med en handduk."},
  {id:103,n:"Trekanten Lake — Liljeholmen #103",a:"Liljeholmen",v:["hidden","local","nature"],d:11,s:"A mirror-still lake in the southwest, surrounded by pines — locals swim here all summer",st:"Trekanten is the triangle-shaped lake between Liljeholmen and Hägersten. Pine trees go right to the water\'s edge. Granite rocks for jumping. Almost completely unknown to tourists.",im:"Time-travel: this lake as a natural hollow in farmland before the suburb grew around it, 1910",t:"Free. T-bana to Liljeholmen then 10 min walk. Weekday afternoons are quiet.",c:["scary"],r:"g",nn:"Trekanten — Liljeholmen #103",ns:"En spegelstilla sjö i sydväst, omgiven av tallar — lokalbefolkningen simmar här hela sommaren",nst:"Trekanten är den triangulärt formade sjön mellan Liljeholmen och Hägersten.",nt:"Gratis. T-bana till Liljeholmen sedan 10 min promenad. Vardagseftermiddagar är lugna."},
  {id:104,n:"Kulturhuset Stadsteatern — Norrmalm #104",a:"Norrmalm",v:["free","local","art"],d:29,s:"Seven floors of free culture on Sergels Torg — galleries, reading rooms, youth spaces, rooftop",st:"Kulturhuset was built in 1974 as Stockholm\'s public living room. Most of it is free. The reading rooms have Swedish magazines and newspapers. The top floor looks straight down at the fountain.",im:"Time-travel: the building opening in 1974, controversial and modern, the city debating it",t:"Free. Open daily. The rooftop terrace has the best Sergels Torg view.",c:["famous_dead"],r:"g",nn:"Kulturhuset — Norrmalm #104",ns:"Sju våningar gratis kultur vid Sergels Torg — gallerier, läsrum, ungdomsutrymmen, takterrass",nst:"Kulturhuset byggdes 1974 som Stockholms publika vardagsrum. Det mesta är gratis.",nt:"Gratis. Öppet dagligen. Takterrassen har den bästa Sergels Torg-utsikten."},
  {id:105,n:"Drottningholm Palace Park — Lovön #105",a:"Lidingö",v:["beautiful","history","nature"],d:22,s:"The royal family\'s actual home — a UNESCO park you reach by boat from City Hall",st:"The Drottningholm boat from City Hall pier takes 50 minutes. The baroque park is free. The palace gardens and Chinese Pavilion are extraordinary. This is where the Swedish royal family lives.",im:"Time-travel: the Swedish court arriving here by barge from Stockholm in 1750, the summer season beginning",t:"Boat from City Hall (fee) or bus 176. Park free. Palace has entry fee.",c:["street_art"],r:"g",nn:"Drottningholms slottsträdgård — Lovön #105",ns:"Kungafamiljens faktiska hem — en UNESCO-park du når med båt från Stadshuset",nst:"Drottningholmsbåten från Stadshuskajen tar 50 minuter. Den barocka parken är gratis.",nt:"Båt från Stadshuset (avgift) eller buss 176. Park gratis. Palatset har inträde."}
];

const PhrasesCard=()=>(
PHRASES.length>0&&<div className="rounded-2xl p-4 mt-3" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-3" style={{color:"#a78bfa"}}>🗣️ Useful {LANG_NAME} Phrases</h3>
<div className="flex flex-col gap-2">{PHRASES.map((ph,i)=><div key={i} className="flex justify-between items-center">
<div><span className="text-xs font-bold" style={{color:"white"}}>{ph.native}</span>
<span className="text-xs ml-2" style={{color:"#8b7fb8"}}>— {ph.en}</span></div></div>)}</div></div>);

const EntryGate=({onAccept})=>(
<div style={{minHeight:"100vh",background:"linear-gradient(180deg,rgba(10,8,30,0.72) 0%,rgba(10,8,30,0.20) 45%,rgba(10,8,30,0.10) 100%),url('images/05_timetravel.png') center/cover no-repeat",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 24px",textAlign:"center"}}>
<h1 className="text-sm font-bold tracking-widest" style={{color:"rgba(255,255,255,0.6)",textTransform:"uppercase",letterSpacing:"3px"}}>Go Do Stuff</h1>
<p className="text-6xl font-black mt-1 leading-none" style={{color:"white",textShadow:"0 2px 16px rgba(0,0,0,0.7)",letterSpacing:"-1px"}}>Stockholm Edition</p>
<p className="text-sm mt-2" style={{color:"#b8b0d0",lineHeight:1.5}}>Activities are free.<br/><span style={{fontSize:"11px",opacity:0.7}}>Travel & food recommendations: low budget.</span></p>
<p className="text-xs mt-2" style={{color:"#6366F1"}}>🌍 Bilingual: English + {LANG_NAME}</p>
<p className="text-xs mt-6 px-4" style={{color:"#8b7fb8",lineHeight:1.6,maxWidth:340}}>
{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>Free. Curated. No tourist traps.</p>
<div className="rounded-2xl p-6 mt-8 mx-4 text-left" style={{background:"rgba(10,10,30,0.72)",border:"1px solid rgba(255,255,255,0.15)",maxWidth:380}}>
  <p style={{color:"#f0d080",fontWeight:700,fontSize:"1.05rem",marginBottom:8}}>Säkerhetsnotering</p>
  <p style={{color:"rgba(255,255,255,0.85)",fontSize:"0.92rem",lineHeight:1.6,marginBottom:16}}>Dessa platser är offentliga utrymmen. Titta alltid på din omgivning. Respektera privat egendom och stäng grindar du öppnar. Lita på din magkänsla.</p>
  <button onClick={()=>setGateOpen(true)} style={{background:"linear-gradient(135deg,#f0d080,#c8a840)",border:"none",borderRadius:12,padding:"10px 24px",fontWeight:700,fontSize:"0.95rem",cursor:"pointer",color:"#1a1a2e",width:"100%"}}>
    <span>Jag förstår – utforska</span></button>
</div>
</div>);

const CITY_EN="Stockholm";
const PlaceCard=({place:p,idx,onOpen,lang})=>(
<button onClick={()=>onOpen(p)} className="text-left w-full rounded-2xl p-4 fade-up" style={{background:"white",border:"1.5px solid #e4e4ed",cursor:"pointer",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div style={{flex:1}}>
<h3 className="text-base font-bold" style={{color:"#1a1a2e",lineHeight:1.3}}>{lang==="native"&&p.nn?p.nn:p.n}</h3>
{lang==="native"&&p.nn&&<p className="text-xs" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-xs mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p></div>
<span className="text-xs font-bold px-2 py-1 rounded-full ml-2 flex-shrink-0" style={{background:p.r==="g"?"#dcfce7":"#fef9c3",color:p.r==="g"?"#166534":"#854d0e"}}>{p.r==="g"?"Green":"Yellow"}</span></div>
<p className="text-sm mt-2" style={{color:"#555",lineHeight:1.5}}>{lang==="native"&&p.ns?p.ns:p.s}</p>
<div className="flex gap-1.5 mt-2 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-2 py-0.5 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</button>);

const PlaceDetail=({place:p,onClose,onNext,onPrev,lang})=>(
<div style={{position:"fixed",inset:0,zIndex:1000,background:"white",overflowY:"auto"}}>
<div className="px-5 pt-6 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex justify-between items-center mb-4">
<button onClick={onClose} className="text-sm font-bold" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← Back</button>
<div className="flex gap-2">
<button onClick={onPrev} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>←</button>
<button onClick={onNext} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>→</button></div></div>
<h1 className="text-2xl font-black" style={{color:"#1a1a2e"}}>{lang==="native"&&p.nn?p.nn:p.n}</h1>
{lang==="native"&&p.nn&&<p className="text-sm font-medium" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-sm mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p>
{PLACE_IMAGES[p.id]&&<div className="mt-4 rounded-xl overflow-hidden" style={{maxHeight:"400px"}}>
<img src={`images/${PLACE_IMAGES[p.id]}`} alt={p.n} style={{width:"100%",maxHeight:"360px",objectFit:"contain",display:"block",borderRadius:"8px"}}/>
<p className="text-xs mt-1" style={{color:"#aaa",textAlign:"center"}}>AI-generated illustration</p></div>}
<div className="mt-4 p-4 rounded-xl" style={{background:"#f8f8ff"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#1a1a2e"}}>The Story</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nst?p.nst:p.st}</p></div>
{p.im&&<div className="mt-3 p-4 rounded-xl" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#a78bfa"}}>Imagine This</h3>
<p className="text-sm" style={{color:"#b8b0d0",lineHeight:1.7,fontStyle:"italic"}}>{p.im}</p></div>}
{p.t&&<div className="mt-3 p-4 rounded-xl" style={{background:"#f0fdf4"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#166534"}}>{lang==="native"?"Tips / "+LANG_NAME:"Tips"}</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nt?p.nt:p.t}</p>
<a href={`https://maps.google.com/?q=${encodeURIComponent(p.n+', '+CITY_EN)}`} target="_blank" rel="noopener noreferrer"
  className="mt-3 flex items-center gap-2 text-sm font-bold"
  style={{color:"#166534",textDecoration:"none",display:"inline-flex",marginTop:"10px"}}>
  🗺 Get directions
</a>
</div>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

if(showPicker){const rp=P[Math.floor(Math.random()*P.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,background:"linear-gradient(180deg,#1a1a2e,#2d1b69)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<p className="text-4xl mb-4">🎲</p>
<h2 className="text-xl font-black text-center" style={{color:"white"}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-sm mt-2 text-center" style={{color:"#b8b0d0"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3 text-center px-6" style={{color:"#8b7fb8",lineHeight:1.6}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
<div className="flex gap-3 mt-6">
<button onClick={()=>setShowPicker(false)} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"transparent",color:"#8b7fb8",border:"1px solid #8b7fb8",cursor:"pointer"}}>Close</button>
<button onClick={()=>{setSelected(rp);setShowPicker(false)}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"#6366F1",color:"white",border:"none",cursor:"pointer"}}>Go!</button>
<button onClick={()=>setShowPicker(true)} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"transparent",color:"#8b7fb8",border:"1px solid #8b7fb8",cursor:"pointer"}}>Reroll</button>
</div></div>}

return <div style={{minHeight:"100vh",background:"linear-gradient(180deg,#FAFBFF 0%,#F0F2FF 100%)"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Stockholm Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={()=>setShowPicker(true)} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Stockholm Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
