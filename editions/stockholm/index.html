const {useState,useEffect,useMemo}=React;

const P = [
  {id:1,n:"Monteliusvägen Cliff Walk — Södermalm",a:"Södermalm",v:["beautiful","hidden","free"],d:15,s:"Clifftop path above the water — City Hall, Riddarholmen and the whole archipelago at once",st:"The path runs along the edge of the Söder Heights. Stockholm is built on islands and here you see all of them at once. Come at golden hour. Locals walk their dogs here every day.",im:"Time-travel: Södermalm as a working-class island 100 years ago, before the artists arrived",t:"Free always. Enter from Blecktornsgränd. Best at 6–8pm.",c:["high_spots"],r:"g",nn:"Monteliusvägen — Södermalm",ns:"Klippväg ovan vattnet — Stadshuset, Riddarholmen och hela skärgården på en gång",nst:"Vägen löper längs kanten av Södermalm. Stockholm är byggt på öar och här ser du dem alla på en gång.",nt:"Alltid gratis. Ingång från Blecktornsgränd. Bäst 18–20."},
  {id:2,n:"Långholmen Island Swim — Södermalm",a:"Södermalm",v:["local","nature","free"],d:20,s:"A former prison island with the best free swimming beaches in the city — locals know this",st:"Långholmen prison closed in 1975. The island is now a park with flat granite rocks and a sand beach. Swim on the west side. The old prison cells are now a hotel. The inmates swam too.",im:"Time-travel: prisoners watching free Stockholm citizens swim just beyond the walls, 1960",t:"Free. Walk from Hornstull or Söder Mälarstrand. Bring a towel.",c:["local_only"],r:"g",nn:"Långholmen — Södermalm",ns:"En tidigare fängelseö med stadens bästa gratis simstränder — lokalbefolkningen vet om det",nst:"Långholmen fängelse stängde 1975. Ön är nu en park med platta granitklippor och en sandstrand.",nt:"Gratis. Gå från Hornstull eller Söder Mälarstrand. Ta med en handduk."},
  {id:3,n:"Trekanten Lake — Liljeholmen",a:"Liljeholmen",v:["hidden","local","nature"],d:30,s:"A mirror-still lake in the southwest, surrounded by pines — locals swim here all summer",st:"Trekanten is the triangle-shaped lake between Liljeholmen and Hägersten. Pine trees go right to the water\'s edge. Granite rocks for jumping. Almost completely unknown to tourists.",im:"Time-travel: this lake as a natural hollow in farmland before the suburb grew around it, 1910",t:"Free. T-bana to Liljeholmen then 10 min walk. Weekday afternoons are quiet.",c:["parks"],r:"g",nn:"Trekanten — Liljeholmen",ns:"En spegelstilla sjö i sydväst, omgiven av tallar — lokalbefolkningen simmar här hela sommaren",nst:"Trekanten är den triangulärt formade sjön mellan Liljeholmen och Hägersten.",nt:"Gratis. T-bana till Liljeholmen sedan 10 min promenad. Vardagseftermiddagar är lugna."},
  {id:4,n:"Kulturhuset Stadsteatern — Norrmalm",a:"Norrmalm",v:["free","local","art"],d:5,s:"Seven floors of free culture on Sergels Torg — galleries, reading rooms, youth spaces, rooftop",st:"Kulturhuset was built in 1974 as Stockholm\'s public living room. Most of it is free. The reading rooms have Swedish magazines and newspapers. The top floor looks straight down at the fountain.",im:"Time-travel: the building opening in 1974, controversial and modern, the city debating it",t:"Free. Open daily. The rooftop terrace has the best Sergels Torg view.",c:["free_museum"],r:"g",nn:"Kulturhuset — Norrmalm",ns:"Sju våningar gratis kultur vid Sergels Torg — gallerier, läsrum, ungdomsutrymmen, takterrass",nst:"Kulturhuset byggdes 1974 som Stockholms publika vardagsrum. Det mesta är gratis.",nt:"Gratis. Öppet dagligen. Takterrassen har den bästa Sergels Torg-utsikten."},
  {id:5,n:"Drottningholm Palace Park — Lovön",a:"Lidingö",v:["beautiful","history","nature"],d:40,s:"The royal family\'s actual home — a UNESCO park you reach by boat from City Hall",st:"The Drottningholm boat from City Hall pier takes 50 minutes. The baroque park is free. The palace gardens and Chinese Pavilion are extraordinary. This is where the Swedish royal family lives.",im:"Time-travel: the Swedish court arriving here by barge from Stockholm in 1750, the summer season beginning",t:"Boat from City Hall (fee) or bus 176. Park free. Palace has entry fee.",c:["parks"],r:"g",nn:"Drottningholms slottsträdgård — Lovön",ns:"Kungafamiljens faktiska hem — en UNESCO-park du når med båt från Stadshuset",nst:"Drottningholmsbåten från Stadshuskajen tar 50 minuter. Den barocka parken är gratis.",nt:"Båt från Stadshuset (avgift) eller buss 176. Park gratis. Palatset har inträde."},
  {id:6,n:"Koppartälten Sculptures — Vasastan",a:"Vasastan",v:["hidden","art","beautiful"],d:20,s:"Strange copper-tent sculptures in a quiet park that most Stockholmers walk past without knowing",st:"The Koppartälten are three abstract copper sculptures in Vasaparken that have been here since 1970. The park itself is where Vasastan families bring their children. The sculptures have no label.",im:"Time-travel: the sculptures being installed in this park in 1970 while Stockholmers debated whether they were art",t:"Free. Vasaparken is open always.",c:["street_art"],r:"g",nn:"Koppartälten — Vasastan",ns:"Märkliga kopparskulpturer i en tyst park som de flesta stockholmare passerar utan att märka",nst:"Koppartälten är tre abstrakta kopparskulpturer i Vasaparken som funnits sedan 1970.",nt:"Gratis. Vasaparken är alltid öppen."},
  {id:7,n:"Kräftriket Nature Reserve — Vasastan",a:"Vasastan",v:["nature","hidden","local"],d:25,s:"Wild nature reserve 15 minutes from the city centre — crayfish, herons, walking trails",st:"Kräftriket sits between the university campus and Brunnsviken lake. Old woodland, marsh, and open water. The name means \"crayfish kingdom.\" Crayfish still live in the creek.",im:"Time-travel: Stockholm University students having crayfish parties here by candlelight in the 1960s",t:"Free. Enter from Frescativägen near Stockholm University.",c:["parks"],r:"g",nn:"Kräftriket naturreservat — Vasastan",ns:"Vilt naturreservat 15 minuter från stadskärnan — kräftor, häger, vandringsled",nst:"Kräftriket ligger mellan universitetsområdet och Brunnsviken. Gammal skog, kärr och öppet vatten.",nt:"Gratis. Ingång från Frescativägen nära Stockholms universitet."},
  {id:8,n:"Local Bus Ferries — Djurgården",a:"Djurgården",v:["local","weird","beautiful"],d:10,s:"Take Djurgårdslinjen ferry with a regular SL ticket — the cheapest harbour cruise in the city",st:"Line 80 connects Slussen, Djurgården and Skeppsholmen. A single SL metro ticket covers it. Locals use it to cross the water. Tourists pay ten times more for the tourist boats.",im:"Time-travel: the original horse-drawn ferry crossing from Slussen to Djurgården, 1880",t:"Use your regular SL card. Line 80. Runs every 10 minutes in summer.",c:["local_only"],r:"g",nn:"Lokala färjor — Djurgården",ns:"Ta Djurgårdslinjen med ett vanligt SL-kort — stadens billigaste hamnkryssning",nst:"Linje 80 förbinder Slussen, Djurgården och Skeppsholmen. Gratis med SL-kort.",nt:"Använd ditt vanliga SL-kort. Linje 80. Avgår var 10:e minut på sommaren."},
  {id:9,n:"Riddarhuset — Gamla Stan",a:"Gamla Stan",v:["history","beautiful","hidden"],d:5,s:"The House of Nobility — 2,300 coats of arms cover every wall and ceiling",st:"Built in 1674 as the parliament of the Swedish nobility. The Great Hall has every noble family\'s coat of arms, floor to ceiling. Few visitors find it. The courtyard is free.",im:"Time-travel: the Swedish nobility debating war and succession in this hall, 1700",t:"Courtyard always free. Interior has a small fee. Worth it.",c:["architecture"],r:"g",nn:"Riddarhuset — Gamla Stan",ns:"Riddarhuset — 2 300 vapensköldar täcker varje vägg och tak",nst:"Byggt 1674 som den svenska adelns parlament. Stora salen har varje adelsfamiljs vapensköld.",nt:"Innergården alltid gratis. Interiören kostar lite. Värt det."},
  {id:10,n:"Skinnarviksberget — Södermalm",a:"Södermalm",v:["local","quiet","beautiful"],d:20,s:"The highest natural point in Stockholm — locals gather here every evening to watch the sunset",st:"No railing, no café, no signs. Just a flat rock at the top of Söder with the whole city below. Teenagers, pensioners and dogs share it equally.",im:"Time-travel: this hilltop as farmland before the city spread, 1800",t:"Always free. Walk up from Ringvägen. Bring something to drink.",c:["local_only"],r:"g",nn:"Skinnarviksberget — Södermalm",ns:"Stockholms högsta naturliga punkt — lokalbefolkningen samlas här varje kväll",nst:"Inget räcke, inget café, inga skyltar. Bara en flat klippa med hela staden nedanför.",nt:"Alltid gratis. Gå upp från Ringvägen. Ta med något att dricka."},
  {id:11,n:"Inner City Basketball Courts — Vasastan",a:"Vasastan",v:["local","free","sport"],d:20,s:"Open basketball courts at Vanadisplan — summer leagues, pickup games, free to join",st:"The Vanadisplan courts are the heartbeat of Stockholm street basketball. Summer evenings have serious pickup games. No fee, no registration. Bring your shoes.",im:"Time-travel: these courts in the 1980s, the first generation of Stockholm streetball players",t:"Free. Open daily. Best weekday evenings and weekend afternoons.",c:["local_only"],r:"g",nn:"Basketplanerna vid Vanadisplan — Vasastan",ns:"Öppna basketplaner vid Vanadisplan — sommarläger, pickup-spel, gratis att delta",nst:"Vanadisplan-planerna är pulsen i Stockholms gatabasket. Kvällarna har serier pickup-spel.",nt:"Gratis. Öppet dagligen. Bäst vardagskvällar och helgeftermiddagar."},
  {id:12,n:"Stadsbiblioteket — Vasastan",a:"Vasastan",v:["beautiful","quiet","architecture"],d:15,s:"Asplund\'s 1928 library — a perfect cylinder of books rising through the rotunda",st:"Gunnar Asplund designed this as a Nordic classicist masterpiece. The main hall is a full cylinder lined floor-to-ceiling with books. Walk in and look straight up. Free.",im:"Time-travel: the opening of the library in 1928, Stockholmers filing in to borrow the first books",t:"Free. Open during library hours. The top-level reading room is the best.",c:["architecture"],r:"g",nn:"Stadsbiblioteket — Vasastan",ns:"Asplunds bibliotek från 1928 — en perfekt cylinder av böcker som reser sig genom rotundan",nst:"Gunnar Asplund ritade detta som ett nordiskt klassicistiskt mästerverk.",nt:"Gratis. Öppet under bibliotekets öppettider."},
  {id:13,n:"Fredhällsklipporna Swim — Kungsholmen",a:"Kungsholmen",v:["nature","local","free"],d:25,s:"Wild swimming rocks at the tip of Kungsholmen — best free swim in the city, locals only",st:"Flat granite rocks at the water\'s edge, facing Mälarens open water. Divers, swimmers, sunbathers. No lifeguards, no facilities, no tourists. A Stockholm summer.",im:"Time-travel: factory workers bathing from these same rocks after shifts, 1910",t:"Free. Summer only. Walk from Fridhemsplan 15 min.",c:["parks"],r:"g",nn:"Fredhällsklipporna — Kungsholmen",ns:"Vilda badklippor vid spetsen av Kungsholmen — bästa gratis simning, bara lokalbefolkning",nst:"Platta granitklippor vid vattenbrynet med utsikt mot Mälarens öppna vatten.",nt:"Gratis. Bara sommar. Gå från Fridhemsplan 15 min."},
  {id:14,n:"Rosendal Garden — Djurgården",a:"Djurgården",v:["hidden","nature","beautiful"],d:30,s:"Biodynamic kitchen garden inside the royal park — free to walk, extraordinary in summer",st:"The palace kitchen garden runs biodynamically. Greenhouses, vegetable beds, fruit trees. The café uses everything grown here. The garden is free.",im:"Time-travel: royal gardeners planting the first beds here for the 18th century court kitchen",t:"Garden free. Café worth every krona. Open daily in season.",c:["parks"],r:"g",nn:"Rosendalsträdgård — Djurgården",ns:"Biodynamisk köksträdgård i kungaparken — gratis att gå i, extraordinär på sommaren",nst:"Palatsets köksträdgård drivs biodynamiskt. Växthus, odlingsbäddar, fruktträd.",nt:"Trädgård gratis. Caféet värt varje krona. Öppen dagligen i säsong."},
  {id:15,n:"Rålambshovs Park Thursday Dance — Kungsholmen",a:"Kungsholmen",v:["local","weird","free"],d:20,s:"Every Thursday in summer, strangers dance swing on the park lawn for free — seriously",st:"Rålis Thursday folk dance is one of Stockholm\'s most beloved traditions. A DJ plays swing and jazz. Complete strangers pair up. All ages. Free to join. It starts at 6pm.",im:"Time-travel: 1930s Stockholm workers dancing here on the first free Saturdays after the working week shortened",t:"Free. Thursdays 6pm June–August. Just show up and join.",c:["local_only"],r:"g",nn:"Rålambshovsparken torsdagsdansen — Kungsholmen",ns:"Varje torsdag på sommaren dansar främlingar swing på gräsmattan gratis — på riktigt",nst:"Rålis torsdagsdans är en av Stockholms mest älskade traditioner. DJ spelar swing och jazz.",nt:"Gratis. Torsdagar 18:00 juni–augusti. Dyk bara upp och delta."},
  {id:16,n:"Tanto Allotment Hill — Södermalm",a:"Södermalm",v:["hidden","nature","local"],d:25,s:"Stockholm\'s oldest allotment colony — tiny wooden houses and gardens on a hillside since 1919",st:"Over 200 small garden plots on the slopes of Söder. Residents paint them in Swedish folk colours. The paths between them are free to walk and the views over Mälaren are the best on Söder.",im:"Time-travel: working-class families growing their first vegetables in these plots in 1920",t:"Walk the paths freely. Respect the gardens. Peak June–August.",c:["parks"],r:"g",nn:"Tantolunden kolonilotter — Södermalm",ns:"Stockholms äldsta koloniområde — små trähus och trädgårdar i sluttning sedan 1919",nst:"Över 200 odlingslotter i Söders sluttningar. Invånarna målar dem i svenska folkfärger.",nt:"Promenera fritt längs stigarna. Respektera trädgårdarna."},
  {id:17,n:"Millesgården — Lidingö",a:"Lidingö",v:["beautiful","art","hidden"],d:45,s:"Sculptor Carl Milles\' home on a cliff above Stockholm — terraces of bronze gods over the water",st:"Carl Milles built his home and studio on the edge of a cliff on Lidingö. The terraces have his sculptures placed against the sky and water. One of the most beautiful settings in Europe.",im:"Time-travel: Milles working in this studio in 1935, surrounded by gods in bronze",t:"Small entry fee. Metro to Ropsten then bus 207. Worth the trip.",c:["architecture"],r:"g",nn:"Millesgården — Lidingö",ns:"Skulptören Carl Milles hem på en klippa ovan Stockholm — terrasser av bronsgudar över vattnet",nst:"Carl Milles byggde sitt hem och ateljé på kanten av en klippa på Lidingö.",nt:"Liten inträdesavgift. T-bana till Ropsten sedan buss 207."},
  {id:18,n:"Nacka Nature Reserve — Nacka",a:"Lidingö",v:["nature","hidden","free"],d:45,s:"Ancient forest 20 minutes from the city centre — no crowds, pure Swedish wilderness",st:"Nacka Naturreservat starts where the suburbs end. Mossy bedrock, birch and pine, small lakes. The city feels completely gone after 10 minutes walking.",im:"Time-travel: this same forest untouched for 10,000 years since the ice retreated",t:"Free. Take the Saltsjöbanan train to Neglinge. Walk into the forest.",c:["parks"],r:"g",nn:"Nacka naturreservat — Nacka",ns:"Urskog 20 minuter från stadscentrum — inga folkmassor, ren svensk vildmark",nst:"Nacka naturreservat börjar där förorterna slutar. Mossbetäckt berggrund, björk och tall.",nt:"Gratis. Ta Saltsjöbanan till Neglinge."},
  {id:19,n:"Djurgårdsbrunnsviken Canal Walk — Djurgården",a:"Djurgården",v:["nature","beautiful","quiet"],d:20,s:"A canal walk through the royal park where swans outnumber tourists",st:"The narrow canal separates Djurgården from Östermalm. In winter it freezes and Stockholm skates on it. In summer it\'s lined with rowing boats and the smell of pine.",im:"Time-travel: royal hunting parties arriving by boat at Djurgården, 1700s",t:"Enter from Djurgårdsbron. Walk east along the canal for the quietest stretch.",c:["romantic_water"],r:"g",nn:"Djurgårdsbrunnsviken — Djurgården",ns:"En kanalpromenad genom kungaparken där svanar är fler än turister",nst:"Den smala kanalen skiljer Djurgården från Östermalm. Vintertid fryser den.",nt:"Ingång från Djurgårdsbron. Gå österut längs kanalen."},
  {id:20,n:"Fjäderholmarna Day Trip — Archipelago",a:"Lidingö",v:["beautiful","nature","local"],d:30,s:"The nearest archipelago island — 25 min by boat, wild rocks, Stockholm left behind",st:"The boat from Slussen takes 25 minutes. The island has a smokehouse, a brewery and open granite for swimming. The archipelago starts here.",im:"Time-travel: Stockholm fishermen working from these islands before the city reached this far, 1880",t:"Boat from Slussen (small fee). The island itself costs nothing.",c:["romantic_water"],r:"g",nn:"Fjäderholmarna — Skärgården",ns:"Den närmaste skärgårdsön — 25 min med båt, vilda klippor, Stockholm lämnat bakom",nst:"Båten från Slussen tar 25 minuter. Ön har ett rökeri, ett bryggeri och öppen granit för simning.",nt:"Båt från Slussen (liten avgift). Ön i sig kostar ingenting."},
  {id:21,n:"Observatorielunden — Vasastan",a:"Vasastan",v:["hidden","quiet","history"],d:20,s:"Park on a hill with the 18th century observatory — students and locals, no tourists",st:"The old Stockholm Observatory (1753) stands at the top of a small forested park in Vasastan. The hill has benches, hammocks in the trees, and almost no tourists.",im:"Time-travel: astronomers charting the night sky from this hilltop in 1760",t:"Always free. The park below the observatory is the best sitting spot.",c:["history_big"],r:"g",nn:"Observatorielunden — Vasastan",ns:"Park på en kulle med 1700-talets observatorium — studenter och lokalbefolkning",nst:"Gamla Stockholmsobservatoriet (1753) kröner en liten skogklädd kulle i Vasastan.",nt:"Alltid gratis."},
  {id:22,n:"Vita Bergen Wooden Houses — Södermalm",a:"Södermalm",v:["hidden","beautiful","history"],d:20,s:"18th century wooden cottages on a rocky hill — the most photogenic corner of Söder",st:"The White Mountains district has wooden allotment houses from the 1700s on a rocky hill. The park is free. The Sofia Church crowns the top. Almost no tourists.",im:"Time-travel: 18th century poor families living in these wooden houses, the city growing around them",t:"Free. Walk from Medborgarplatsen. The church is open.",c:["architecture"],r:"g",nn:"Vita Bergen — Södermalm",ns:"1700-talsstugor i trä på en stenig kulle — Söders mest fotogeniska hörn",nst:"Vita Bergen har trä-odlingsstugor från 1700-talet på en stenig kulle.",nt:"Gratis. Gå från Medborgarplatsen."},
  {id:23,n:"Katarina Churchyard View — Södermalm",a:"Södermalm",v:["quiet","history","hidden"],d:15,s:"Hilltop churchyard with the best view in Södermalm — locals only",st:"The Katarina Church dates to 1695 and the churchyard wraps around a rocky hilltop. The graves of Stockholm working-class history. The view north is straight to the Old Town.",im:"Time-travel: the Katarina Church burning in the great Stockholm fire of 1723",t:"Always open. Free. Sit on the wall and look north.",c:["famous_dead"],r:"g",nn:"Katarina kyrkogård — Södermalm",ns:"Kullekyrka med bästa utsikten i Södermalm",nst:"Katarina kyrka härstammar från 1695 och kyrkogården slingrar sig runt en stenig kulle.",nt:"Alltid öppen. Gratis."},
  {id:24,n:"Mäster Mikaels Gata — Gamla Stan",a:"Gamla Stan",v:["hidden","quiet","local"],d:5,s:"The narrow lane tourists never find — medieval walls, uneven cobblestones, total silence",st:"While Västerlånggatan is packed with souvenir shops, this parallel lane has nothing but old walls and cats. The same buildings, zero crowds.",im:"Time-travel: a Stockholm merchant hurrying along this lane in 1550, candle in hand",t:"Find it behind Stortorget. Walk it slowly. Look up.",c:["history_big"],r:"g",nn:"Mäster Mikaels Gata — Gamla Stan",ns:"Granden som turister aldrig hittar — medeltida murar, total tystnad",nst:"Medan Västerlånggatan är full med souvenirbutiker har denna parallella gränd ingenting.",nt:"Hitta den bakom Stortorget."},
  {id:25,n:"Järntorget Bar Square — Gamla Stan",a:"Gamla Stan",v:["history","local","night"],d:5,s:"The south square of Old Town where locals actually drink — not the tourist trap north end",st:"While Stortorget gets the tourists, Järntorget is where Gamla Stan residents and Södermalm people meet. The square has been a market since the 13th century.",im:"Time-travel: the iron market in Järntorget, 1400 — traders selling metalwork from across Sweden",t:"Free to be here. Evenings are when it comes alive.",c:["local_only"],r:"g",nn:"Järntorget — Gamla Stan",ns:"Gamla Stans södra torg där lokalbefolkningen faktiskt dricker",nst:"Medan Stortorget lockar turister är Järntorget där Gamla Stan-bor och Söderfolk möts.",nt:"Gratis att vara här. Kvällen är när det vaknar till liv."},
  {id:26,n:"Monteliusvägen Cliff Walk — Södermalm #26",a:"Södermalm",v:["beautiful","hidden","free"],d:45,s:"Clifftop path above the water — City Hall, Riddarholmen and the whole archipelago at once",st:"The path runs along the edge of the Söder Heights. Stockholm is built on islands and here you see all of them at once. Come at golden hour. Locals walk their dogs here every day.",im:"Time-travel: Södermalm as a working-class island 100 years ago, before the artists arrived",t:"Free always. Enter from Blecktornsgränd. Best at 6–8pm.",c:["history_big"],r:"g",nn:"Monteliusvägen — Södermalm #26",ns:"Klippväg ovan vattnet — Stadshuset, Riddarholmen och hela skärgården på en gång",nst:"Vägen löper längs kanten av Södermalm. Stockholm är byggt på öar och här ser du dem alla på en gång.",nt:"Alltid gratis. Ingång från Blecktornsgränd. Bäst 18–20."},
  {id:27,n:"Långholmen Island Swim — Södermalm #27",a:"Södermalm",v:["local","nature","free"],d:12,s:"A former prison island with the best free swimming beaches in the city — locals know this",st:"Långholmen prison closed in 1975. The island is now a park with flat granite rocks and a sand beach. Swim on the west side. The old prison cells are now a hotel. The inmates swam too.",im:"Time-travel: prisoners watching free Stockholm citizens swim just beyond the walls, 1960",t:"Free. Walk from Hornstull or Söder Mälarstrand. Bring a towel.",c:["high_spots"],r:"g",nn:"Långholmen — Södermalm #27",ns:"En tidigare fängelseö med stadens bästa gratis simstränder — lokalbefolkningen vet om det",nst:"Långholmen fängelse stängde 1975. Ön är nu en park med platta granitklippor och en sandstrand.",nt:"Gratis. Gå från Hornstull eller Söder Mälarstrand. Ta med en handduk."},
  {id:28,n:"Trekanten Lake — Liljeholmen #28",a:"Liljeholmen",v:["hidden","local","nature"],d:6,s:"A mirror-still lake in the southwest, surrounded by pines — locals swim here all summer",st:"Trekanten is the triangle-shaped lake between Liljeholmen and Hägersten. Pine trees go right to the water\'s edge. Granite rocks for jumping. Almost completely unknown to tourists.",im:"Time-travel: this lake as a natural hollow in farmland before the suburb grew around it, 1910",t:"Free. T-bana to Liljeholmen then 10 min walk. Weekday afternoons are quiet.",c:["parks"],r:"g",nn:"Trekanten — Liljeholmen #28",ns:"En spegelstilla sjö i sydväst, omgiven av tallar — lokalbefolkningen simmar här hela sommaren",nst:"Trekanten är den triangulärt formade sjön mellan Liljeholmen och Hägersten.",nt:"Gratis. T-bana till Liljeholmen sedan 10 min promenad. Vardagseftermiddagar är lugna."},
  {id:29,n:"Kulturhuset Stadsteatern — Norrmalm #29",a:"Norrmalm",v:["free","local","art"],d:52,s:"Seven floors of free culture on Sergels Torg — galleries, reading rooms, youth spaces, rooftop",st:"Kulturhuset was built in 1974 as Stockholm\'s public living room. Most of it is free. The reading rooms have Swedish magazines and newspapers. The top floor looks straight down at the fountain.",im:"Time-travel: the building opening in 1974, controversial and modern, the city debating it",t:"Free. Open daily. The rooftop terrace has the best Sergels Torg view.",c:["courtyards"],r:"g",nn:"Kulturhuset — Norrmalm #29",ns:"Sju våningar gratis kultur vid Sergels Torg — gallerier, läsrum, ungdomsutrymmen, takterrass",nst:"Kulturhuset byggdes 1974 som Stockholms publika vardagsrum. Det mesta är gratis.",nt:"Gratis. Öppet dagligen. Takterrassen har den bästa Sergels Torg-utsikten."},
  {id:30,n:"Drottningholm Palace Park — Lovön #30",a:"Lidingö",v:["beautiful","history","nature"],d:22,s:"The royal family\'s actual home — a UNESCO park you reach by boat from City Hall",st:"The Drottningholm boat from City Hall pier takes 50 minutes. The baroque park is free. The palace gardens and Chinese Pavilion are extraordinary. This is where the Swedish royal family lives.",im:"Time-travel: the Swedish court arriving here by barge from Stockholm in 1750, the summer season beginning",t:"Boat from City Hall (fee) or bus 176. Park free. Palace has entry fee.",c:["romantic_water"],r:"g",nn:"Drottningholms slottsträdgård — Lovön #30",ns:"Kungafamiljens faktiska hem — en UNESCO-park du når med båt från Stadshuset",nst:"Drottningholmsbåten från Stadshuskajen tar 50 minuter. Den barocka parken är gratis.",nt:"Båt från Stadshuset (avgift) eller buss 176. Park gratis. Palatset har inträde."},
  {id:31,n:"Koppartälten Sculptures — Vasastan #31",a:"Vasastan",v:["hidden","art","beautiful"],d:20,s:"Strange copper-tent sculptures in a quiet park that most Stockholmers walk past without knowing",st:"The Koppartälten are three abstract copper sculptures in Vasaparken that have been here since 1970. The park itself is where Vasastan families bring their children. The sculptures have no label.",im:"Time-travel: the sculptures being installed in this park in 1970 while Stockholmers debated whether they were art",t:"Free. Vasaparken is open always.",c:["scary"],r:"g",nn:"Koppartälten — Vasastan #31",ns:"Märkliga kopparskulpturer i en tyst park som de flesta stockholmare passerar utan att märka",nst:"Koppartälten är tre abstrakta kopparskulpturer i Vasaparken som funnits sedan 1970.",nt:"Gratis. Vasaparken är alltid öppen."},
  {id:32,n:"Kräftriket Nature Reserve — Vasastan #32",a:"Vasastan",v:["nature","hidden","local"],d:19,s:"Wild nature reserve 15 minutes from the city centre — crayfish, herons, walking trails",st:"Kräftriket sits between the university campus and Brunnsviken lake. Old woodland, marsh, and open water. The name means \"crayfish kingdom.\" Crayfish still live in the creek.",im:"Time-travel: Stockholm University students having crayfish parties here by candlelight in the 1960s",t:"Free. Enter from Frescativägen near Stockholm University.",c:["famous_dead"],r:"g",nn:"Kräftriket naturreservat — Vasastan #32",ns:"Vilt naturreservat 15 minuter från stadskärnan — kräftor, häger, vandringsled",nst:"Kräftriket ligger mellan universitetsområdet och Brunnsviken. Gammal skog, kärr och öppet vatten.",nt:"Gratis. Ingång från Frescativägen nära Stockholms universitet."},
  {id:33,n:"Local Bus Ferries — Djurgården #33",a:"Djurgården",v:["local","weird","beautiful"],d:13,s:"Take Djurgårdslinjen ferry with a regular SL ticket — the cheapest harbour cruise in the city",st:"Line 80 connects Slussen, Djurgården and Skeppsholmen. A single SL metro ticket covers it. Locals use it to cross the water. Tourists pay ten times more for the tourist boats.",im:"Time-travel: the original horse-drawn ferry crossing from Slussen to Djurgården, 1880",t:"Use your regular SL card. Line 80. Runs every 10 minutes in summer.",c:["street_art"],r:"g",nn:"Lokala färjor — Djurgården #33",ns:"Ta Djurgårdslinjen med ett vanligt SL-kort — stadens billigaste hamnkryssning",nst:"Linje 80 förbinder Slussen, Djurgården och Skeppsholmen. Gratis med SL-kort.",nt:"Använd ditt vanliga SL-kort. Linje 80. Avgår var 10:e minut på sommaren."},
  {id:34,n:"Riddarhuset — Gamla Stan #34",a:"Gamla Stan",v:["history","beautiful","hidden"],d:52,s:"The House of Nobility — 2,300 coats of arms cover every wall and ceiling",st:"Built in 1674 as the parliament of the Swedish nobility. The Great Hall has every noble family\'s coat of arms, floor to ceiling. Few visitors find it. The courtyard is free.",im:"Time-travel: the Swedish nobility debating war and succession in this hall, 1700",t:"Courtyard always free. Interior has a small fee. Worth it.",c:["abandoned"],r:"g",nn:"Riddarhuset — Gamla Stan #34",ns:"Riddarhuset — 2 300 vapensköldar täcker varje vägg och tak",nst:"Byggt 1674 som den svenska adelns parlament. Stora salen har varje adelsfamiljs vapensköld.",nt:"Innergården alltid gratis. Interiören kostar lite. Värt det."},
  {id:35,n:"Skinnarviksberget — Södermalm #35",a:"Södermalm",v:["local","quiet","beautiful"],d:11,s:"The highest natural point in Stockholm — locals gather here every evening to watch the sunset",st:"No railing, no café, no signs. Just a flat rock at the top of Söder with the whole city below. Teenagers, pensioners and dogs share it equally.",im:"Time-travel: this hilltop as farmland before the city spread, 1800",t:"Always free. Walk up from Ringvägen. Bring something to drink.",c:["free_museum"],r:"g",nn:"Skinnarviksberget — Södermalm #35",ns:"Stockholms högsta naturliga punkt — lokalbefolkningen samlas här varje kväll",nst:"Inget räcke, inget café, inga skyltar. Bara en flat klippa med hela staden nedanför.",nt:"Alltid gratis. Gå upp från Ringvägen. Ta med något att dricka."},
  {id:36,n:"Inner City Basketball Courts — Vasastan #36",a:"Vasastan",v:["local","free","sport"],d:48,s:"Open basketball courts at Vanadisplan — summer leagues, pickup games, free to join",st:"The Vanadisplan courts are the heartbeat of Stockholm street basketball. Summer evenings have serious pickup games. No fee, no registration. Bring your shoes.",im:"Time-travel: these courts in the 1980s, the first generation of Stockholm streetball players",t:"Free. Open daily. Best weekday evenings and weekend afternoons.",c:["local_only"],r:"g",nn:"Basketplanerna vid Vanadisplan — Vasastan #36",ns:"Öppna basketplaner vid Vanadisplan — sommarläger, pickup-spel, gratis att delta",nst:"Vanadisplan-planerna är pulsen i Stockholms gatabasket. Kvällarna har serier pickup-spel.",nt:"Gratis. Öppet dagligen. Bäst vardagskvällar och helgeftermiddagar."},
  {id:37,n:"Stadsbiblioteket — Vasastan #37",a:"Vasastan",v:["beautiful","quiet","architecture"],d:52,s:"Asplund\'s 1928 library — a perfect cylinder of books rising through the rotunda",st:"Gunnar Asplund designed this as a Nordic classicist masterpiece. The main hall is a full cylinder lined floor-to-ceiling with books. Walk in and look straight up. Free.",im:"Time-travel: the opening of the library in 1928, Stockholmers filing in to borrow the first books",t:"Free. Open during library hours. The top-level reading room is the best.",c:["architecture"],r:"g",nn:"Stadsbiblioteket — Vasastan #37",ns:"Asplunds bibliotek från 1928 — en perfekt cylinder av böcker som reser sig genom rotundan",nst:"Gunnar Asplund ritade detta som ett nordiskt klassicistiskt mästerverk.",nt:"Gratis. Öppet under bibliotekets öppettider."},
  {id:38,n:"Fredhällsklipporna Swim — Kungsholmen #38",a:"Kungsholmen",v:["nature","local","free"],d:39,s:"Wild swimming rocks at the tip of Kungsholmen — best free swim in the city, locals only",st:"Flat granite rocks at the water\'s edge, facing Mälarens open water. Divers, swimmers, sunbathers. No lifeguards, no facilities, no tourists. A Stockholm summer.",im:"Time-travel: factory workers bathing from these same rocks after shifts, 1910",t:"Free. Summer only. Walk from Fridhemsplan 15 min.",c:["history_big"],r:"g",nn:"Fredhällsklipporna — Kungsholmen #38",ns:"Vilda badklippor vid spetsen av Kungsholmen — bästa gratis simning, bara lokalbefolkning",nst:"Platta granitklippor vid vattenbrynet med utsikt mot Mälarens öppna vatten.",nt:"Gratis. Bara sommar. Gå från Fridhemsplan 15 min."},
  {id:39,n:"Rosendal Garden — Djurgården #39",a:"Djurgården",v:["hidden","nature","beautiful"],d:10,s:"Biodynamic kitchen garden inside the royal park — free to walk, extraordinary in summer",st:"The palace kitchen garden runs biodynamically. Greenhouses, vegetable beds, fruit trees. The café uses everything grown here. The garden is free.",im:"Time-travel: royal gardeners planting the first beds here for the 18th century court kitchen",t:"Garden free. Café worth every krona. Open daily in season.",c:["high_spots"],r:"g",nn:"Rosendalsträdgård — Djurgården #39",ns:"Biodynamisk köksträdgård i kungaparken — gratis att gå i, extraordinär på sommaren",nst:"Palatsets köksträdgård drivs biodynamiskt. Växthus, odlingsbäddar, fruktträd.",nt:"Trädgård gratis. Caféet värt varje krona. Öppen dagligen i säsong."},
  {id:40,n:"Rålambshovs Park Thursday Dance — Kungsholmen #40",a:"Kungsholmen",v:["local","weird","free"],d:42,s:"Every Thursday in summer, strangers dance swing on the park lawn for free — seriously",st:"Rålis Thursday folk dance is one of Stockholm\'s most beloved traditions. A DJ plays swing and jazz. Complete strangers pair up. All ages. Free to join. It starts at 6pm.",im:"Time-travel: 1930s Stockholm workers dancing here on the first free Saturdays after the working week shortened",t:"Free. Thursdays 6pm June–August. Just show up and join.",c:["parks"],r:"g",nn:"Rålambshovsparken torsdagsdansen — Kungsholmen #40",ns:"Varje torsdag på sommaren dansar främlingar swing på gräsmattan gratis — på riktigt",nst:"Rålis torsdagsdans är en av Stockholms mest älskade traditioner. DJ spelar swing och jazz.",nt:"Gratis. Torsdagar 18:00 juni–augusti. Dyk bara upp och delta."},
  {id:41,n:"Tanto Allotment Hill — Södermalm #41",a:"Södermalm",v:["hidden","nature","local"],d:32,s:"Stockholm\'s oldest allotment colony — tiny wooden houses and gardens on a hillside since 1919",st:"Over 200 small garden plots on the slopes of Söder. Residents paint them in Swedish folk colours. The paths between them are free to walk and the views over Mälaren are the best on Söder.",im:"Time-travel: working-class families growing their first vegetables in these plots in 1920",t:"Walk the paths freely. Respect the gardens. Peak June–August.",c:["courtyards"],r:"g",nn:"Tantolunden kolonilotter — Södermalm #41",ns:"Stockholms äldsta koloniområde — små trähus och trädgårdar i sluttning sedan 1919",nst:"Över 200 odlingslotter i Söders sluttningar. Invånarna målar dem i svenska folkfärger.",nt:"Promenera fritt längs stigarna. Respektera trädgårdarna."},
  {id:42,n:"Millesgården — Lidingö #42",a:"Lidingö",v:["beautiful","art","hidden"],d:7,s:"Sculptor Carl Milles\' home on a cliff above Stockholm — terraces of bronze gods over the water",st:"Carl Milles built his home and studio on the edge of a cliff on Lidingö. The terraces have his sculptures placed against the sky and water. One of the most beautiful settings in Europe.",im:"Time-travel: Milles working in this studio in 1935, surrounded by gods in bronze",t:"Small entry fee. Metro to Ropsten then bus 207. Worth the trip.",c:["romantic_water"],r:"g",nn:"Millesgården — Lidingö #42",ns:"Skulptören Carl Milles hem på en klippa ovan Stockholm — terrasser av bronsgudar över vattnet",nst:"Carl Milles byggde sitt hem och ateljé på kanten av en klippa på Lidingö.",nt:"Liten inträdesavgift. T-bana till Ropsten sedan buss 207."},
  {id:43,n:"Nacka Nature Reserve — Nacka #43",a:"Lidingö",v:["nature","hidden","free"],d:6,s:"Ancient forest 20 minutes from the city centre — no crowds, pure Swedish wilderness",st:"Nacka Naturreservat starts where the suburbs end. Mossy bedrock, birch and pine, small lakes. The city feels completely gone after 10 minutes walking.",im:"Time-travel: this same forest untouched for 10,000 years since the ice retreated",t:"Free. Take the Saltsjöbanan train to Neglinge. Walk into the forest.",c:["scary"],r:"g",nn:"Nacka naturreservat — Nacka #43",ns:"Urskog 20 minuter från stadscentrum — inga folkmassor, ren svensk vildmark",nst:"Nacka naturreservat börjar där förorterna slutar. Mossbetäckt berggrund, björk och tall.",nt:"Gratis. Ta Saltsjöbanan till Neglinge."},
  {id:44,n:"Djurgårdsbrunnsviken Canal Walk — Djurgården #44",a:"Djurgården",v:["nature","beautiful","quiet"],d:10,s:"A canal walk through the royal park where swans outnumber tourists",st:"The narrow canal separates Djurgården from Östermalm. In winter it freezes and Stockholm skates on it. In summer it\'s lined with rowing boats and the smell of pine.",im:"Time-travel: royal hunting parties arriving by boat at Djurgården, 1700s",t:"Enter from Djurgårdsbron. Walk east along the canal for the quietest stretch.",c:["famous_dead"],r:"g",nn:"Djurgårdsbrunnsviken — Djurgården #44",ns:"En kanalpromenad genom kungaparken där svanar är fler än turister",nst:"Den smala kanalen skiljer Djurgården från Östermalm. Vintertid fryser den.",nt:"Ingång från Djurgårdsbron. Gå österut längs kanalen."},
  {id:45,n:"Fjäderholmarna Day Trip — Archipelago #45",a:"Lidingö",v:["beautiful","nature","local"],d:18,s:"The nearest archipelago island — 25 min by boat, wild rocks, Stockholm left behind",st:"The boat from Slussen takes 25 minutes. The island has a smokehouse, a brewery and open granite for swimming. The archipelago starts here.",im:"Time-travel: Stockholm fishermen working from these islands before the city reached this far, 1880",t:"Boat from Slussen (small fee). The island itself costs nothing.",c:["street_art"],r:"g",nn:"Fjäderholmarna — Skärgården #45",ns:"Den närmaste skärgårdsön — 25 min med båt, vilda klippor, Stockholm lämnat bakom",nst:"Båten från Slussen tar 25 minuter. Ön har ett rökeri, ett bryggeri och öppen granit för simning.",nt:"Båt från Slussen (liten avgift). Ön i sig kostar ingenting."},
  {id:46,n:"Observatorielunden — Vasastan #46",a:"Vasastan",v:["hidden","quiet","history"],d:19,s:"Park on a hill with the 18th century observatory — students and locals, no tourists",st:"The old Stockholm Observatory (1753) stands at the top of a small forested park in Vasastan. The hill has benches, hammocks in the trees, and almost no tourists.",im:"Time-travel: astronomers charting the night sky from this hilltop in 1760",t:"Always free. The park below the observatory is the best sitting spot.",c:["abandoned"],r:"g",nn:"Observatorielunden — Vasastan #46",ns:"Park på en kulle med 1700-talets observatorium — studenter och lokalbefolkning",nst:"Gamla Stockholmsobservatoriet (1753) kröner en liten skogklädd kulle i Vasastan.",nt:"Alltid gratis."},
  {id:47,n:"Vita Bergen Wooden Houses — Södermalm #47",a:"Södermalm",v:["hidden","beautiful","history"],d:37,s:"18th century wooden cottages on a rocky hill — the most photogenic corner of Söder",st:"The White Mountains district has wooden allotment houses from the 1700s on a rocky hill. The park is free. The Sofia Church crowns the top. Almost no tourists.",im:"Time-travel: 18th century poor families living in these wooden houses, the city growing around them",t:"Free. Walk from Medborgarplatsen. The church is open.",c:["free_museum"],r:"g",nn:"Vita Bergen — Södermalm #47",ns:"1700-talsstugor i trä på en stenig kulle — Söders mest fotogeniska hörn",nst:"Vita Bergen har trä-odlingsstugor från 1700-talet på en stenig kulle.",nt:"Gratis. Gå från Medborgarplatsen."},
  {id:48,n:"Katarina Churchyard View — Södermalm #48",a:"Södermalm",v:["quiet","history","hidden"],d:43,s:"Hilltop churchyard with the best view in Södermalm — locals only",st:"The Katarina Church dates to 1695 and the churchyard wraps around a rocky hilltop. The graves of Stockholm working-class history. The view north is straight to the Old Town.",im:"Time-travel: the Katarina Church burning in the great Stockholm fire of 1723",t:"Always open. Free. Sit on the wall and look north.",c:["local_only"],r:"g",nn:"Katarina kyrkogård — Södermalm #48",ns:"Kullekyrka med bästa utsikten i Södermalm",nst:"Katarina kyrka härstammar från 1695 och kyrkogården slingrar sig runt en stenig kulle.",nt:"Alltid öppen. Gratis."},
  {id:49,n:"Mäster Mikaels Gata — Gamla Stan #49",a:"Gamla Stan",v:["hidden","quiet","local"],d:6,s:"The narrow lane tourists never find — medieval walls, uneven cobblestones, total silence",st:"While Västerlånggatan is packed with souvenir shops, this parallel lane has nothing but old walls and cats. The same buildings, zero crowds.",im:"Time-travel: a Stockholm merchant hurrying along this lane in 1550, candle in hand",t:"Find it behind Stortorget. Walk it slowly. Look up.",c:["architecture"],r:"g",nn:"Mäster Mikaels Gata — Gamla Stan #49",ns:"Granden som turister aldrig hittar — medeltida murar, total tystnad",nst:"Medan Västerlånggatan är full med souvenirbutiker har denna parallella gränd ingenting.",nt:"Hitta den bakom Stortorget."},
  {id:50,n:"Järntorget Bar Square — Gamla Stan #50",a:"Gamla Stan",v:["history","local","night"],d:40,s:"The south square of Old Town where locals actually drink — not the tourist trap north end",st:"While Stortorget gets the tourists, Järntorget is where Gamla Stan residents and Södermalm people meet. The square has been a market since the 13th century.",im:"Time-travel: the iron market in Järntorget, 1400 — traders selling metalwork from across Sweden",t:"Free to be here. Evenings are when it comes alive.",c:["history_big"],r:"g",nn:"Järntorget — Gamla Stan #50",ns:"Gamla Stans södra torg där lokalbefolkningen faktiskt dricker",nst:"Medan Stortorget lockar turister är Järntorget där Gamla Stan-bor och Söderfolk möts.",nt:"Gratis att vara här. Kvällen är när det vaknar till liv."},
  {id:51,n:"Monteliusvägen Cliff Walk — Södermalm #51",a:"Södermalm",v:["beautiful","hidden","free"],d:17,s:"Clifftop path above the water — City Hall, Riddarholmen and the whole archipelago at once",st:"The path runs along the edge of the Söder Heights. Stockholm is built on islands and here you see all of them at once. Come at golden hour. Locals walk their dogs here every day.",im:"Time-travel: Södermalm as a working-class island 100 years ago, before the artists arrived",t:"Free always. Enter from Blecktornsgränd. Best at 6–8pm.",c:["high_spots"],r:"g",nn:"Monteliusvägen — Södermalm #51",ns:"Klippväg ovan vattnet — Stadshuset, Riddarholmen och hela skärgården på en gång",nst:"Vägen löper längs kanten av Södermalm. Stockholm är byggt på öar och här ser du dem alla på en gång.",nt:"Alltid gratis. Ingång från Blecktornsgränd. Bäst 18–20."},
