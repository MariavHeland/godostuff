{id:46,n:"Smedsuddsbadet — Kungsholmen",a:"Kungsholmen",v:["hidden","beautiful","free entry","local"],d:20,s:"Soft sand cove where Stockholmers escape the tourist beaches — kayaks and calm water",st:"Smedsuddsbadet has a sandy beach in a protected cove on Kungsholmen's west side. Summer mornings you'll see locals spreading blankets on grass, kids in the shallows, and the sun catching water toward Södermalm. The café serves fika. Feels like escape without leaving the city.",im:"Time-travel: medieval Stockholm fishermen launching from this same cove, 500 years ago",t:"Free entry. T-bana to Hornstull or Fridhemsplan. Showers and café on site. Best early morning or sunset.",c:["beaches"],r:"g",nn:"Smedsuddsbadet — Kungsholmen",ns:"Mjukt sandig vik där Stockholmaren flyr turiststränderna",nst:"Smedsuddsbadet har sandstrand i en skyddad vik på Kungsholmens västra sida. Sommarkväll ser du lokala med fika och barn i vattnet.",nt:"Gratis. T-bana till Hornstull. Duschar och café."},
{id:47,n:"Ängbybadet — Ängby",a:"Ängby",v:["hidden","beautiful","free entry"],d:25,s:"Local beach 10 minutes from the metro — grass, jetty, and almost no tourists",st:"Ängbybadet sits in a quiet residential area where families have been swimming for generations. The water is calm, the jetty worn smooth by decades of feet, the grass scattered with locals reading books and eating sandwiches. Accessibility ramps mean grandmothers can wade in alongside kids.",im:"The light on the water at 4 PM when summer finally feels real",t:"Free. Green line metro to Ängbyplan. Café and changing rooms. Summer weekends get busy but never crowded like city beaches.",c:["beaches"],r:"g",nn:"Ängbybadet — Ängby",ns:"Lokal strand 10 minuter från tunnelbanan",nst:"Ängbybadet ligger i ett lugnt bostadsområde där familjer badat i generationer.",nt:"Gratis. Gröna linjen till Ängbyplan. Café och omklädningsrum."},
{id:48,n:"Brunnsviken Water Circle — Vasastan",a:"Vasastan",v:["hidden","beautiful","quiet","free entry"],d:30,s:"Brackish lake forest-ringed — float on a wooden raft, forest smell, no city noise",st:"Brunnsviken is a lake north of central Stockholm completely surrounded by pine forest. A small sandy beach has a floating jetty and wooden raft. Summer mornings the air smells like pine resin and wet earth. Locals bring kids, books, thermoses of coffee. The lake is shallow and warm by August.",im:"Diving from a wooden raft into clear brown water, the forest going quiet",t:"Free. T-bana to Universitetet or Norrlands Vägen. 10-min walk through forest. No facilities — bring your own.",c:["beaches"],r:"g",nn:"Brunnsviken — Vasastan",ns:"Brackisk sjö omgiven av skog — flyt på en trästege",nst:"Brunnsviken är en sjö helt omgiven av tallskog. En liten sandstrand har en flytande pir och träflotte.",nt:"Gratis. T-bana till Universitetet. 10 min skogspromenad."},
{id:49,n:"Hellasgården Swimming Saunas — Nacka",a:"Nacka",v:["hidden","beautiful","free entry","local"],d:30,s:"Winter and summer sauna ritual in a forest reserve — ice holes and the silence after heat",st:"Hellasgården is buried in the Nacka nature reserve south of the city. Locals drive out here year-round: summer to swim in the lake, winter to heat the wood saunas, dive into ice holes, then sit in silence with the forest. The café is open all year. This is how Stockholm winters are bearable. This is where locals belong.",im:"Steam rising from a sauna into a winter evening, someone running barefoot across snow",t:"Free to walk grounds. 10-15 min bus from Slussen. Saunas cost (ca 150 SEK). Winter sauna culture is sacred here. Call ahead.",c:["nature"],r:"y",nn:"Hellasgården bastu — Nacka",ns:"Vinter och sommarbad saunakultur",nst:"Hellasgården ligger i Nacka naturreservat. Lokalbefolkningen åker här året om.",nt:"Gratis att gå. Sauna kostar ca 150 kr."},
{id:50,n:"Hötorgshallen Underground Market — Norrmalm",a:"Norrmalm",v:["local","free entry","history"],d:15,s:"One level below street, 40+ stalls — international Stockholm in a basement that's been alive since 1914",st:"Hötorgshallen is one floor down from Hötorget square, a subterranean market that smells like spices, bread, fresh fish, and decades of cooking. Swedish vendors next to Thai, Palestinian, Vietnamese. Locals stop here to buy lunch, vegetables, coffee. The acoustic peculiarity makes it louder, more urgent, more alive than the street above.",im:"Voices echoing in tile corridors, steam rising from noodle stalls, morning light from street-level windows",t:"Free to walk. Norrmalm, Hötorget. Weekdays busier than weekends. Bring cash. Open mornings until early evening.",c:["markets"],r:"g",nn:"Hötorgshallen — Norrmalm",ns:"40+ försäljare en trappa ner från Hötorget",nst:"Hötorgshallen är på en trappa under Hötorget, en underjordisk marknad.",nt:"Gratis. Norrmalm, Hötorget. Vardagar fullare än helger."},
{id:51,n:"Östermalmshallen Historic Hall — Östermalm",a:"Östermalm",v:["history","beautiful","local"],d:20,s:"19th-century brick temple to Swedish tradition — closed for renovation until 2026, but the exterior and courtyard are architectural poetry",st:"Östermalmshallen sits in a red-brick fortress on Östermalm. It opened in 1888 as a symbol of Stockholm's growing prosperity. Now under renovation until Christmas 2026, but the courtyard and facade remain. Locals remember the smell of proper deli food and how Sunday mornings felt here. The architecture itself tells the story: this was where the city fed itself.",im:"Rain on brick, the weight of a century of groceries and gossip",t:"Currently closed for renovation (until Dec 2026). Walk around the exterior and courtyard. Östermalm district.",c:["history"],r:"y",nn:"Östermalmshallen — Östermalm",ns:"1800-talsbent tegelmuseum för svensk tradition",nst:"Östermalmshallen sitter i en rödtegelsborg på Östermalm.",nt:"Stängd för renovering till dec 2026. Gå runt fasaden."},
{id:52,n:"Söderhallarna Market Hall — Södermalm",a:"Södermalm",v:["local","free entry","market"],d:20,s:"Living market where locals buy vegetables, coffee, and handmade crafts — casual and real",st:"Söderhallarna at Medborgarplatsen is where Stockholm buys lunch. Independent food stands, fresh fruit, handmade things. Locals pop in between work, between errands. The light is yellow-white fluorescent, the acoustics are honest. There's no curated Scandi-design here — just people getting what they need.",im:"The moment a regular walks in and the vendor calls out their name",t:"Free. T-bana Medborgarplatsen. Open weekdays, quieter Sundays. Busiest lunchtime.",c:["markets"],r:"g",nn:"Söderhallarna — Södermalm",ns:"Levande marknad där lokalbefolkningen köper mat",nst:"Söderhallarna på Medborgarplatsen är där Stockholm köper lunch.",nt:"Gratis. T-bana Medborgarplatsen. Öppet vardagar."},
{id:53,n:"Hornstull Street Market — Kungsholmen",a:"Kungsholmen",v:["local","market","free entry"],d:15,s:"Waterside market every weekend April-September — vintage, secondhand, food trucks, locals, summer",st:"Hornstull market happens Saturday and Sunday from April through September along the water. Locals sell vintage clothes, used books, antiques from home. Food trucks serve street food. It smells like falafel and possibility. The light at 2 PM is butter-gold. You see the whole neighbourhood here — kids, dogs, 70-year-olds looking for one specific record.",im:"Sunlight on Lake Riddarfjärden with people moving slowly between stalls",t:"Free to walk. Hornstull waterfront, Kungsholmen. April-September weekends. Busiest 12-4 PM.",c:["markets"],r:"g",nn:"Hornstulls marknad — Kungsholmen",ns:"Vattenkantmarknad varje helg april-september",nst:"Hornstull marknad händer lördag och söndag april till september vid vattnet.",nt:"Gratis. Hornstull vattenkant. April-september helger."},
{id:54,n:"Vaxholm Island Day Trip — Vaxholm",a:"Vaxholm Archipelago",v:["hidden","history","local"],d:90,s:"Hour ferry to the gateway island — fortress, wooden houses, real archipelago life that tourists only touch the edge of",st:"Vaxholm is the transport hub to the outer archipelago, a working island where people live year-round. Red and white wooden houses, a fortress (Vaxholm Fortress), narrow lanes where locals walk dogs. The ferry ride itself is part of the experience — 90 minutes watching the archipelago reveal itself. Most tourists jump to Sandhamn, but locals stay here.",im:"Approaching a 17th-century fortress by water, light on red houses, the actual sound of seabirds",t:"Ferry from Nybroplan (ca 90 min, Waxholmsbolaget). Cost ~150 SEK return. Fortress has entry fee. Eat at a waterfront café.",c:["islands"],r:"g",nn:"Vaxholm dag — Vaxholm",ns:"En timmes färja till grindöns gateway",nst:"Vaxholm är transportnavet till yttre skärgård, en arbetsö.",nt:"Färja från Nybroplan ca 90 min. Kostnad ~150 kr retur."},
{id:55,n:"Grinda Island Nature Reserve — Grinda Archipelago",a:"Grinda Archipelago",v:["hidden","nature","beaches","free entry"],d:120,s:"Small island, entire nature reserve, beautiful beaches — see everything in 45 minutes and understand why locals keep coming back",st:"Grinda is small but complete: forest trails, a sandy beach, a lake, wildflowers in June. You can walk the entire island in under an hour. No cars. Families camp here, locals bring kids to learn what real nature is. The beach faces east and catches morning sun. It feels private because crowds go to Sandhamn.",im:"The moment the ferry motor cuts and you hear only wind and water",t:"Ferry from Nybroplan (ca 60 min, Waxholmsbolaget, ~140 SEK return). Bring picnic. No shops. Go weekday.",c:["islands"],r:"g",nn:"Grinda ön — Grinda",ns:"Liten ö, helt naturreservat, vackra strander",nst:"Grinda är liten men fullständig: skogsvägar, sandstrand, sjö.",nt:"Färja från Nybroplan ca 60 min. Ta picnic."},
{id:56,n:"Sandhamn Island Summer — Sandhamn Archipelago",a:"Sandhamn Archipelago",v:["beautiful","beaches","local"],d:150,s:"Sandy island with hotels, restaurants, a functioning community — the real archipelago experience most tourists never get",st:"Sandhamn is a working island where people actually live. Hotels, shops, cafés, sailing clubs. The name means 'sand harbour' and the entire island is sandy beaches. The ferry ride reveals the archipelago properly — you pass dozens of inhabited and uninhabited islands. Locals come here for the sailing, for the light, for the sense that you've actually left Stockholm.",im:"The moment you see nothing but water and islands in every direction",t:"Ferry from Nybroplan (ca 120 min, Waxholmsbolaget, ~200 SEK return). Book accommodation if staying overnight. Restaurants and cafés on island.",c:["islands"],r:"g",nn:"Sandhamn ö — Sandhamn",ns:"Sandig ö med hotell, restauranger",nst:"Sandhamn är en arbetsö där människor faktiskt bor.",nt:"Färja från Nybroplan ca 120 min. Restauranger på ön."},
{id:57,n:"Möja Island Tranquility — Möja Archipelago",a:"Möja Archipelago",v:["hidden","quiet","nature"],d:180,s:"Quiet year-round island with forests, meadows, lakeside cliffs — where locals go when they want to actually disappear",st:"Möja is farther out than Grinda or Sandhamn, so it stays quieter. Forests, meadows, small lake with cliffs. No real village, just accommodations and the essential quiet. Summer evenings are endless light, the water flat and perfect. Locals come here to remember why they chose to live on an island surrounded by water.",im:"The sound of a single bird, and then silence for a very long time",t:"Ferry from Nybroplan (ca 140-180 min depending on route, Waxholmsbolaget, ~220-280 SEK). Cozy accommodations and one small restaurant. Go for 2 days minimum.",c:["islands"],r:"g",nn:"Möja ö — Möja",ns:"Lugn ö året runt",nst:"Möja är längre ut än Grinda, så det förblir lugnt.",nt:"Färja från Nybroplan ca 140-180 min."},
{id:58,n:"Utö Island Mining History — Utö Archipelago",a:"Utö Archipelago",v:["history","hidden","bikes"],d:160,s:"Outer island with iron mine museum, ice cream, bike paths, kayak rentals — the island that feels most like actual discovery",st:"Utö was mined for iron for centuries. The mines are closed now but the museum is open and strange. The island has ice cream in the harbor, beach volleyball, kayak rentals. Bike paths loop the whole place. It's far enough that day-trippers are rare. Locals who come here once keep coming back.",im:"Pedalling a bike over an island where real work happened for 300 years",t:"Ferry from Nybroplan (ca 160 min, Waxholmsbolaget, ~250 SEK return). Bicycle rental on island. Mining museum entry fee. One café.",c:["islands"],r:"g",nn:"Utö ö — Utö",ns:"Ytteröar med gruvmuseum",nst:"Utö gruvades för järn i århundraden.",nt:"Färja från Nybroplan ca 160 min. Cykeluthyrning på ön."},
{id:59,n:"Judarskogen Nature Reserve — Bromma",a:"Bromma",v:["hidden","nature","quiet","free entry"],d:45,s:"Lake surrounded by forest with 2km trail and the haunting Russian Wall — a genuine Stockholm forest walk where locals jog",st:"Judarskogen (named for the 'Russian Wall', a mysterious 1100-metre stone barrier) is a proper nature reserve. A 2km trail circles Lake Judarn. Forest is old, the trail is easy, the lake view is sudden and peaceful. Amphibians nest here including the rare crested newt. Early morning you see locals jogging, birds raising hell, mist off the water.",im:"The moment you round a corner and the lake appears between pines",t:"Free. T-bana to Bromma, then bus or 15-min walk to reserve entrance. Best spring-autumn.",c:["nature"],r:"g",nn:"Judarskogen naturreservat — Bromma",ns:"Sjö omgiven av skog med 2 km stig",nst:"Judarskogen är ett riktigt naturreservat. En 2 km stig cirkulerar sjön.",nt:"Gratis. T-bana till Bromma. Bäst vår-höst."},
{id:60,n:"Grimsta Nature Reserve — Västerort",a:"Västerort",v:["hidden","nature","free entry","local"],d:60,s:"320 hectares of forest, pine, noble woods and Mälaren shoreline — where Stockholm goes to hike when no one is watching",st:"Grimsta is huge and barely known outside Stockholm. Established 2004. Pine forests, wetlands, hilly deciduous woods. A footpath runs along Lake Mälaren with view over water for kilometres. Wide rocky areas, places to sit and disappear. Locals come here for real forest time, not Instagram time.",im:"The particular silence of a Swedish pine forest where you haven't seen another person in an hour",t:"Free. Car or longer bus journey west from Stockholm. Multiple trail starts around reserve perimeter.",c:["nature"],r:"g",nn:"Grimsta naturreservat — Västerort",ns:"320 hektar skog och sjöstrand",nst:"Grimsta är enormt och knappt känt utanför Stockholm.",nt:"Gratis. Bil eller buss västerut från Stockholm."},
{id:61,n:"Midsommarkransen Neighbourhood Stroll — Midsommarkransen",a:"Midsommarkransen",v:["local","history","hidden"],d:45,s:"1920s workers' neighbourhood turned bohemian suburb — Ericsson-era architecture, Konstfack art school, independent cinema Tellus",st:"Midsommarkransen started as workers' housing for Ericsson factory. Now it's evolved into what locals call 'suburban Södermalm' — bohemian, non-touristy, full of artists and second-hand shops. Konstfack (design school) is in an old Ericsson building. Tellus cinema hosts jazz, poetry, art. It has a neighbourhood integrity that central Stockholm has lost.",im:"Walking past facades of early-industrial housing now home to painters and musicians",t:"T-bana to Midsommarkransen station. Walk the whole neighbourhood. Tellus cinema, cafés, small shops.",c:["neighborhoods"],r:"g",nn:"Midsommarkransen promenad",ns:"1920-talsbostäder för arbetare nu bohemisk förort",nst:"Midsommarkransen började som arbetarbostäder för Ericsson.",nt:"T-bana till Midsommarkransen. Gå hela stadsdelen."},
{id:62,n:"Telefonplan Art District — Södermalm",a:"Södermalm",v:["art","hidden","local"],d:30,s:"Former telephone exchange building now studios, galleries, artist collective — where contemporary Stockholm actually happens",st:"Telefonplan is a rambling complex of artist studios and galleries. A former telephone switchboard building that's been repurposed into creative space. Open studio days bring the neighbourhood together. You'll find everything: painters, musicians, experimental makers. It's not curated or commercialized — it's just working artists.",im:"Climbing concrete stairs to a studio door, then into another world",t:"T-bana to Södermalm or Skanstull. Walk to Telefonplan. Check opening hours — some days closed.",c:["art"],r:"y",nn:"Telefonplan konstdistrik",ns:"Före detta telefonautomatcentral nu studio",nst:"Telefonplan är ett omfattande komplex av konstnärsatéljéer.",nt:"T-bana till Södermalm eller Skanstull."},
{id:63,n:"Konstnärshuset Bar — Norrmalm",a:"Norrmalm",v:["history","local","weird"],d:30,s:"The Artists' House bar where Stockholm creative types have drunk since 1891 — red booths, permanent tables, a cafe society that still exists",st:"Konstnärshuset (the Artists' House) opened in 1891 as a gathering place for painters, writers, musicians. The bar still has original red velvet booths and permanent tables where the same people have sat for decades. This is a real café society — actual artists, actual conversations, the smell of coffee and old leather.",im:"A painter's notebook on a table next to a newspaper from 1952, no exaggeration",t:"Norrmalm, Malmskillnadsgatan 23. Open café hours (mornings for coffee), bar in evenings. Very Swedish.",c:["history"],r:"g",nn:"Konstnärshuset bar",ns:"Konstnärcafé sedan 1891",nst:"Konstnärshuset öppnade 1891 som träffpunkt.",nt:"Norrmalm, Malmskillnadsgatan 23."},
{id:64,n:"Moderna Museet Sculpture Garden — Skeppsholmen",a:"Djurgården",v:["art","beautiful","free entry"],d:30,s:"Sculpture garden free to walk while the museum charges entry — Giacometti and contemporary work against water and stone",st:"Moderna Museet's outdoor sculpture garden is free. Giacometti, contemporary installations, the view toward Gamla Stan. You can sit here for hours watching light move across granite, watching artists think. The garden is part of how Stockholm makes art accessible — not locked behind admission.",im:"A bronze figure in profile against blue-grey water",t:"Free. Skeppsholmen island. Walk around exterior anytime. Museum entry is paid.",c:["art"],r:"g",nn:"Moderna Museets skulpturträdgård",ns:"Skulpturgård gratis att gå",nst:"Moderna Museets utomhusträdgård är gratis.",nt:"Gratis. Skeppsholmen. Museiinträde betalt."},
{id:65,n:"Arkitekturmuseet Garden Walk — Skeppsholmen",a:"Djurgården",v:["architecture","free entry","beautiful"],d:25,s:"Architecture museum courtyard free to walk — modernist design, water, a quiet corner of the city that most miss",st:"The Architecture Museum on Skeppsholmen has a courtyard and garden that are free to explore. Modernist design, clean lines, water visible from everywhere. It's the kind of space that teaches you something about how to live without saying a word. Summer, locals bring newspapers here to read.",im:"The geometry of a building's edge against natural light",t:"Free. Skeppsholmen. Museum entry is paid but courtyard is open.",c:["architecture"],r:"g",nn:"Arkitekturmuseets trädgård",ns:"Arkitekturmuseet gård gratis",nst:"Arkitekturmuseets gård och trädgård är gratis.",nt:"Gratis. Skeppsholmen."},
{id:66,n:"Gustaf Vasa Church Vasastan — Vasastan",a:"Vasastan",v:["history","beautiful","local"],d:20,s:"Enormous copper dome — 1906 Neo-Baroque, seats 1500, locals pass it daily and feel its weight",st:"Gustaf Vasa Church (Gustaf Vasa Kyrka) opened in 1906, designed by Agi Lindegren. The copper dome is 60+ metres high and green with age. Inside: massive, echoing, beautiful light. The exterior dominates Vasastan's skyline. Locals know it as a marker, a landmark, proof that the neighbourhood has history and permanence.",im:"The moment you see the dome approaching through city streets",t:"Free to enter. Vasastan. Check service times. Often open daily.",c:["history"],r:"y",nn:"Gustaf Vasa kyrka — Vasastan",ns:"Enorm kupol — 1906 neobarock",nst:"Gustaf Vasa kyrka öppnades 1906.",nt:"Gratis att gå in. Vasastan. Kontrollera servicetider."},
{id:67,n:"Hedvig Eleonora Church Östermalm — Östermalm",a:"Östermalm",v:["history","beautiful"],d:20,s:"Rare octagonal church, 1737, pale light through tall windows — Stockholm baroque at its most intimate",st:"Hedvig Eleonora Church (Hedvig Eleonora Kyrka) was consecrated in 1737 and has an octagonal plan — unusual in Swedish church design. Pale interior, tall windows, the particular Swedish light that makes stone look almost blue. It's used for classical music. The space teaches you something about proportion and silence.",im:"Light moving across an octagonal floor through windows 10 metres high",t:"Free to enter. Östermalm. Check opening hours and classical concert schedule.",c:["history"],r:"y",nn:"Hedvig Eleonora kyrka — Östermalm",ns:"Sällsynt åttakantig kyrka",nst:"Hedvig Eleonora kyrka invigdes 1737.",nt:"Gratis att gå in. Östermalm."},
{id:68,n:"Engelbrekt Church — Vasastan",a:"Vasastan",v:["history","beautiful"],d:15,s:"Neo-Gothic tower dominating the skyline — church where Vasastan gathers, simple and serious",st:"Engelbrekt Church (Engelbrekts kyrka) is Neo-Gothic, serious, with a tower that marks Vasastan on the horizon. Simpler interior than Gustaf Vasa nearby, but with equal weight. This is where locals marry, where funerals happen, where the neighbourhood gathered for centuries.",im:"The tower appearing above buildings as you approach",t:"Free to enter. Vasastan. Check service times.",c:["history"],r:"y",nn:"Engelbrekts kyrka",ns:"Nygotisk kyrka som dominerar skyline",nst:"Engelbrekts kyrka är nygotisk, allvarlig.",nt:"Gratis att gå in. Vasastan."},
{id:69,n:"Riddarfjärden Kayak Perspective — Gamla Stan",a:"Gamla Stan",v:["beautiful","water","local"],d:120,s:"Paddle around Gamla Stan and see Stockholm's water perspective — the city from the archipelago's view",st:"Rent a kayak and paddle Riddarfjärden, the water surrounding Gamla Stan. You see the Old Town from the water — the exact view medieval traders had. Skeppsholmen island appears. Kungsholmen's edge becomes real. The water is cold and dark and clean. You understand Stockholm differently from a kayak.",im:"The moment the paddle dips and silence takes over",t:"Kayak rentals at Green Kayak or similar operators. Booking recommended. Cost ~300-400 SEK. Summer only.",c:["water"],r:"y",nn:"Riddarfjärden kajak perspektiv",ns:"Paddla runt Gamla Stan",nst:"Hyra kajak och paddla Riddarfjärden.",nt:"Kajakhyrning. Bokning rekommenderad. ~300-400 kr."},
{id:70,n:"Hammarby Canal Walk — Liljeholmen",a:"Södermalm",v:["modern","water","local"],d:30,s:"Eco-docks and redeveloped waterfront — sustainable Stockholm that's still figuring itself out",st:"Hammarby Sjöstad is a redeveloped area with floating walkways over canals, green building design, birdwatching. It's not old Stockholm, it's not quaint. It's contemporary and intentional — a place the city built for the future. Locals jog here, walk dogs, test out what urban sustainability looks like when you're honest about it.",im:"Reflections on canal water, green roofs, and the sound of real building happening",t:"Free. T-bana to Liljeholmen or walk along water. Café and restaurants nearby.",c:["waterfront"],r:"g",nn:"Hammarby kanal — Liljeholmen",ns:"Ekodockor och ombyggd vattenkant",nst:"Hammarby Sjöstad är ett omvandlat område.",nt:"Gratis. T-bana till Liljeholmen eller gå vid vattnet."},
{id:71,n:"Norra Djurgårdsstaden Canal Loop — Djurgården",a:"Djurgården",v:["modern","water","beautiful"],d:40,s:"North Djurgården's new neighbourhood with canals, water perspective, locals living in contemporary design",st:"Norra Djurgårdsstaden is newer housing on Djurgården with canals and public walkways. It's a place where Stockholm is building forward thoughtfully — water views, public space, actual neighbourhoods not theme parks. Walk the canal edges, watch light reflect off water, see how contemporary Stockholm lives.",im:"Modern architecture framing views of water in all directions",t:"Free. Walk the public canals. T-bana to nearby stations. Cafés and restaurants in development.",c:["waterfront"],r:"g",nn:"Norra Djurgårdsstaden kanal",ns:"Nya stadsdelen med kanaler",nst:"Norra Djurgårdsstaden är nya bostäder på Djurgården.",nt:"Gratis. Gå längs kanalerna."},
{id:72,n:"Ivar Los Park — Södermalm",a:"Södermalm",v:["hidden","quiet","view"],d:10,s:"Tiny mysterious park in Södermalm — benches, a view, questions about who was Ivar Los and why his name here",st:"Ivar Los Park is small and somehow hidden despite being central. A few benches, green space, a view toward water and Gamla Stan. Locals sometimes sit here reading or thinking. It has the feeling of a place nobody fully knows — which is the point. Small parks in big cities are resistance.",im:"Finding a place that feels private in the middle of everything",t:"Free. Södermalm. Easy to miss. Look between buildings near Skeppsbron area.",c:["parks"],r:"g",nn:"Ivar Los park",ns:"Liten hemlig park i Södermalm",nst:"Ivar Los park är liten och dold.",nt:"Gratis. Södermalm."},
{id:73,n:"Katarinavägen Panoramic Walk — Södermalm",a:"Södermalm",v:["beautiful","view","local"],d:30,s:"600 metres of uninterrupted panorama — water, islands, light — where Stockholm finally makes sense",st:"Katarinavägen is a street on Södermalm that runs for 600 metres with views across Riddarfjärden, to Gamla Stan, Skeppsholmen, the water. It's the simplest experience in Stockholm: walk slowly, look across, understand the city's relationship to water. Early evening light is honey-gold. Locals don't talk about it because they want to keep it quiet.",im:"Walking a street where the entire city appears to your right",t:"Free. Södermalm. Best at sunset. Walk from Slussen area south along the ridge.",c:["view"],r:"g",nn:"Katarinavägen promenad",ns:"600 meter obruten panorama",nst:"Katarinavägen är en gata med utsikt.",nt:"Gratis. Södermalm. Bäst vid solnedgång."},
{id:74,n:"Almänna Gränd Hidden Passage — Gamla Stan",a:"Gamla Stan",v:["history","hidden","weird"],d:10,s:"Medieval passageway between buildings — locals use it, tourists never find it",st:"Almänna Gränd is a narrow passage between buildings in Gamla Stan, barely signposted. Medieval narrow, dark on winter mornings. Locals walk it daily as shortcut. It's the exact kind of Stockholm space that makes you understand why people fell in love with this city — utility and atmosphere in one.",im:"Moving between light and shadow, stone walls from the 1600s brushing your shoulder",t:"Free. Gamla Stan. Look for narrow passages between major streets.",c:["history"],r:"g",nn:"Almänna Gränd passage",ns:"Medeltida passage mellan byggnader",nst:"Almänna Gränd är en smal passage mellan byggnader.",nt:"Gratis. Gamla Stan."},
{id:75,n:"Stortorget at First Light — Gamla Stan",a:"Gamla Stan",v:["history","beautiful","quiet"],d:15,s:"The big square empty before tourists wake — medieval town geometry, light on cobbles, one café opening",st:"Stortorget is Old Town's central square. At 7 AM it's silent except for delivery trucks and one café worker unlocking the door. The light is different — it hits the medieval facades directly, no reflection. It's the Stockholm that existed before tourism. Go very early. See what the city actually is.",im:"Cobblestones wet from overnight cleaning, geometric shadow angles from buildings",t:"Free. Gamla Stan. Go before 7 AM. Bring coffee from home.",c:["history"],r:"g",nn:"Stortorget före ljusmorgon",ns:"Stora torget tomt före turister väcker",nst:"Stortorget är Gamla Stans centralplan.",nt:"Gratis. Gamla Stan. Gå före 7 AM."},
{id:76,n:"Rosenporten Oldest Door — Gamla Stan",a:"Gamla Stan",v:["history","hidden"],d:5,s:"Stockholm's oldest door, 1635 — a painted wooden door that survived 400 years because people loved it",st:"Rosenporten is a wooden door in Gamla Stan, painted red and gold, dated to 1635. It's old. It's survived three and a half centuries because people protected it. Walking past it, you understand what love means — humans keeping something beautiful alive.",im:"A single old painted door, the weight of 400 years",t:"Free. Gamla Stan, look at building facades carefully. Easy to miss.",c:["history"],r:"g",nn:"Rosenporten dörrn",ns:"Stockholms äldsta dörr",nst:"Rosenporten är en träölnjärd från 1635.",nt:"Gratis. Gamla Stan."},
{id:77,n:"Vintage Shops Loop — Södermalm",a:"Södermalm",v:["local","market","hidden"],d:60,s:"Second-hand Stockholm — clothing, books, records, furniture found in apartments before they're gentrified",st:"Södermalm has a dense network of vintage and second-hand shops along Bondegatan, Nybrogatan, Görgatan. This is where locals buy clothes that have history. Records from collections someone cleaned out. Books with notes in margins. The logic is: if it survived this long, maybe it's worth keeping. The light in these shops is low and honest.",im:"Dust moving through afternoon sun in a vintage shop, a book from someone's grandmother",t:"Free to browse. Södermalm. Budget SEK 100-500 depending on what you find. Weekdays quieter.",c:["market"],r:"g",nn:"Vintage shoppar — Södermalm",ns:"Second-handStockholm",nst:"Södermalm har tätt nätverk av begagnadbutiker.",nt:"Gratis att titta. Södermalm. Vardagar tystare."},
{id:78,n:"Trädgården Summer Club Early Evening — Skanstull",a:"Södermalm",v:["music","free entry","local"],d:60,s:"Stockholm's largest summer club under the bridge — free entry before 10 PM, DJs, local crowd dancing in the last light",st:"Trädgården (The Garden) is under Skanstull bridge, the city's biggest outdoor summer club. Before 10 PM entry is free. The main stage and bar are outside. Local DJs play. The light at 9 PM is never-ending Swedish summer light. People dance on concrete. It's not curated — it's raw Stockholm.",im:"Dancing until you notice the sky is still light, no exit to the night happening",t:"Free before 10 PM. Skanstull. Busiest weekends June-August. Under Bron indoor club opens later.",c:["music"],r:"g",nn:"Trädgården tidig kväll",ns:"Stockholms största sommarbikupa",nst:"Trädgården är under Skanstull bron.",nt:"Gratis före 22:00. Skanstull."},
{id:79,n:"Debaser Strand Live Music — Norrmalm",a:"Norrmalm",v:["music","local"],d:60,s:"Concert venue hosting rock, hip-hop, metal — where Stockholm's actual music happens, not tourist music",st:"Debaser Strand is a venue that books everything: rock, hip-hop, metal, country, pop, electronic. Locals go here to hear good bands that never make international press. The sound is good, the crowd is real. It's not pretentious, it's just people who care about music gathering to hear music.",im:"The moment the lights cut and the first bass note hits",t:"Check calendar for shows. Entry fee varies (200-500+ SEK). Stockholm city centre.",c:["music"],r:"y",nn:"Debaser Strand konserter",ns:"Konsertsal för rock, hip-hop",nst:"Debaser Strand är en konsertsal.",nt:"Se kalender för shower. Inträde varierar."},
{id:80,n:"Södra Teatern Rooftop View — Södermalm",a:"Södermalm",v:["beautiful","view","restaurant"],d:45,s:"Historic theatre from 1859 now with rooftop bars offering Stockholm panorama — champagne view on beer budget",st:"Södra Teatern opened in 1859 and still operates. The main building has rooftop bars — one is the champagne bar, one is casual. The view is across the entire city, water, islands, light. Summer nights, this is where Stockholm drinks and looks at itself.",im:"Sunset turning the city golden while you're sitting on a rooftop",t:"Free to climb stairs but drinks cost (beer ~100 SEK, cocktails ~150+). Södermalm. Summer access only.",c:["view"],r:"y",nn:"Södra Teatern tak",ns:"Historisk teater från 1859",nst:"Södra Teatern öppnades 1859.",nt:"Gratis att gå upp. Drycker kostar."},
{id:81,n:"Kungsholmens Library Reading Room — Kungsholmen",a:"Kungsholmen",v:["quiet","free entry","local"],d:30,s:"Municipal library with a proper quiet reading room and café — where Stockholm comes to read and think for free",st:"Kungsholmens bibliotek is a city library with a distinct quiet room (tyst läsrum), comfortable chairs, windows with natural light. The café serves fika. It's completely free. Locals come here to read, to work on projects, to sit in silence. Libraries are where cities show who they are — Stockholm made this available to everyone.",im:"Afternoon light on the pages of a book you found here",t:"Free. T-bana Fridhemsplan or walk from Kungsholmen. Open weekdays and Saturdays. Quiet room from 10-18:00.",c:["libraries"],r:"g",nn:"Kungsholmens bibliotek läsrum",ns:"Bibliotek med ordentlig tystrum",nst:"Kungsholmens bibliotek är ett stadsbibliotek.",nt:"Gratis. T-bana Fridhemsplan."},
{id:82,n:"Tessinparken Frisbee Golf — Södermalm",a:"Södermalm",v:["free entry","sports","hidden"],d:45,s:"Local 9-hole disc golf course in a small park — Stockholmers perfecting throws among pine trees",st:"Tessinparken has a 9-hole frisbee golf course that locals use regularly. It's free. You throw your disc from tee boxes through the park, ending at baskets. It teaches you the geometry of the park. Early morning you see joggers and disc golfers coexisting peacefully. It's humble and very Stockholm.",im:"A disc flying between trees, landing exactly where you intended",t:"Free. Tessinparken, Södermalm. Bring your own disc or rent one. Early morning best.",c:["sports"],r:"g",nn:"Tessinparken frisbegolf",ns:"Lokal 9-håls discgolfbana",nst:"Tessinparken har en frisbee-golfbana.",nt:"Gratis. Tessinparken. Egen disc eller hyrning."},
{id:83,n:"Rålambshovs Frisbee Golf — Kungsholmen",a:"Kungsholmen",v:["free entry","sports","local"],d:45,s:"Another free disc golf course where locals throw under chestnut trees — minimal, honest, real",st:"Rålambshovs Park has a frisbee golf course. Chestnut trees, locals, morning light, the sound of plastic meeting basket. It's not Instagram-worthy — it's just good. People have been throwing discs here for years. It becomes meditative.",im:"The quiet focus moment before you throw",t:"Free. Rålambshov, Kungsholmen. Bring your disc. Best weekday mornings.",c:["sports"],r:"g",nn:"Rålambshovs frisbegolf",ns:"Annan gratis discgolfbana",nst:"Rålambshovs park har en frisbee-golfbana.",nt:"Gratis. Rålambshov, Kungsholmen."},
{id:84,n:"Eriksdalsbadet Summer Pool Area — Södermalm",a:"Södermalm",v:["beautiful","free entry","swimming"],d:60,s:"27,500 sq metre pool complex with outdoor pools, sauna, beach volleyball in summer — where locals cool off",st:"Eriksdalsbadet is massive. Indoor pools in winter, but summer opens four outdoor pools, saunas, volleyball courts, dance floor. Locals bring kids, bring books, stay for hours. The complex is functional and honest — this is how Stockholm keeps cool without leaving the city.",im:"The moment you enter cold water on a 25-degree afternoon",t:"Entry fee (ca 100-150 SEK). Södermalm/Skanstull area. Summer season (June-August).",c:["swimming"],r:"g",nn:"Eriksdalsbadet sommarpool",ns:"Stor poolkomplex med utebad",nst:"Eriksdalsbadet är enorm.",nt:"Inträde ~100-150 kr. Juni-augusti."},
{id:85,n:"Zinkensdamm Sports Field — Södermalm",a:"Södermalm",v:["sports","local","free entry"],d:30,s:"Central sports facility with football pitches, athletics track, winter ice rink — where Stockholm plays",st:"Zinkensdamm is a sports field in the middle of Södermalm. Artificial grass football, athletics track, and in winter an ice rink (6,700 sq metres). Locals book pitches, play futsal, jog the track. It's public, it's affordable, it's how Swedish cities keep people moving.",im:"Evening light on an artificial pitch, players running after a ball that never changes colour",t:"Free to walk past. Pitch booking required for play (fee ~200-400 SEK/hour). Södermalm.",c:["sports"],r:"g",nn:"Zinkensdamm idrottsplats",ns:"Centralidrottsanläggning",nst:"Zinkensdamm är en idrottsplats.",nt:"Gratis att gå förbi. Bokning för spel ~200-400 kr/timme."},
{id:86,n:"Lidingö Cycle Paths East — Lidingö",a:"Lidingö",v:["bikes","nature","quiet"],d:120,s:"Island east of Stockholm with network of cycling paths separated from traffic — roll through silence for hours",st:"Lidingö is a suburban island with a dense network of bike paths mostly separated from cars. Flat terrain, suburban quiet, the feeling of leaving Stockholm without leaving. Local families spend entire weekends pedalling between lakes and forests. You can rent bikes or bring your own.",im:"Rolling silently on a path through forest, no cars, no sound except pedalling",t:"Bike rental available (ca 200-300 SEK/day). T-bana to Ropsten or drive. Maps at rental shops.",c:["bikes"],r:"g",nn:"Lidingö cykelvägar",ns:"Ön öst om Stockholm med cykelvägar",nst:"Lidingö är en förortö med cykelvägar.",nt:"Cykeluthyrning ~200-300 kr/dag. T-bana till Ropsten."},
{id:87,n:"Ekerö Church Trail Cycling — Ekerö",a:"Ekerö",v:["history","bikes","nature"],d:180,s:"Cycle through rural Mälaren landscape passing eight 12th-century churches, castles, manor houses — another world 30 minutes from the city",st:"The Ekerö Leden (Trail) is a bike route through the countryside west of Stockholm on the Ekerö peninsula in Lake Mälaren. Mostly flat, rural, agricultural. Eight medieval churches, castles, manor houses appear as you pedal. It's a complete time-travel experience on two wheels. Locals do this on weekends to remember what land looks like.",im:"Approaching a 12th-century church spire in a field, nothing else in sight",t:"Bike rental in central Stockholm or at Ekerö. Route map available. ~60 km round-trip. Full day. Cafés along route.",c:["bikes"],r:"g",nn:"Ekerö kyrkoled cykling",ns:"Cykla genom landskapet förbi åtta medeltidskyrkor",nst:"Ekerö Leden är en cykelväg genom landsbygden.",nt:"Cykeluthyrning. Karta tillgänglig. ~60 km fram och tillbaka."},
{id:88,n:"Björnö Nature Reserve Hiking — Ingarö",a:"Ingarö Archipelago",v:["nature","hiking","free entry"],d:120,s:"Archipelago nature reserve with forest trails, rocky terrain, island beaches — where Stockholm goes to remember what wild is",st:"Björnö is at the tip of Ingarö peninsula south of Stockholm. A marine nature reserve with mix of forest, open areas, rocky terrain, beaches. Trail system connects viewpoints. Summer, locals hike here for granite views, swimming between rocks, the particular silence of a place where almost nobody goes. Winter it's even quieter.",im:"Standing on granite watching water stretch to the horizon",t:"Free. Car needed (30-40 min south from Stockholm) or ferry in summer. Hiking boots recommended.",c:["hiking"],r:"g",nn:"Björnö naturreservat vandrande",ns:"Skärgårdsreservat med skogsvägar",nst:"Björnö ligger vid spetsen av Ingarö.",nt:"Gratis. Bil behövs eller färja sommaren."},
{id:89,n:"Tyresta National Park Forest — Värmdö",a:"Värmdö Archipelago",v:["nature","hiking","history"],d:120,s:"Ancient forest ecosystem — beech and oak that pre-date Stockholm — where the archipelago's original vegetation survives",st:"Tyresta National Park protects old-growth forest south of Stockholm. Beech, oak, ancient ecosystem. Walking here is walking through pre-urban Sweden. The forest teaches you silence. In spring, woodpeckers announce themselves. In summer, cool shade feels like actual relief.",im:"Walking under a canopy so dense that noon feels like morning",t:"Free. Car needed (40+ min south). Multiple trail options. Bring water and food. Mosquito repellent in summer.",c:["hiking"],r:"g",nn:"Tyresta nationalpark",ns:"Gammal skogsekoystem",nst:"Tyresta nationalpark skyddar gammal skog.",nt:"Gratis. Bil behövs. Flera vägar."},
{id:90,n:"Skansen Back Paths — Djurgården",a:"Djurgården",v:["hidden","history","quiet"],d:90,s:"Walk behind Skansen museum avoiding the main crowds — forest paths, hill views, free access",st:"Skansen is a famous open-air museum, but the surrounding park has free walking paths that locals use. You can hike the back of Djurgården, finding viewpoints and forest without paying museum admission. The paths are less crowded, more real. Some locals have never paid to enter Skansen — they've hiked it from behind for years.",im:"The moment you realize you're in genuine forest, not a tourist park",t:"Free. Djurgården. Multiple trail entrances. Come early morning before buses arrive.",c:["hiking"],r:"g",nn:"Skansen bakvägar",ns:"Gå bakom Skansen utan att betala",nst:"Skansen är känt, men bakvägarna är gratis.",nt:"Gratis. Djurgården. Flera vägar."},
{id:91,n:"Vasa Church Vasastan Neighbourhood — Vasastan",a:"Vasastan",v:["history","neighborhood","quiet"],d:30,s:"Walk the residential streets around Gustaf Vasa Church — early 1900s architecture, quiet locals, untouristy",st:"The neighbourhood around Gustaf Vasa Church (Vasastan proper) is early 20th century residential architecture. Real Stockholm living — corner shops, apartment buildings with character, the church marking the centre. Walk Vasutkagen, side streets, and you see how Stockholm lives when tourists aren't watching.",im:"The particular quietness of a Swedish neighbourhood street at 3 PM",t:"Free. Walk from Gustaf Vasa Church area. Quietest weekday afternoons.",c:["neighborhoods"],r:"g",nn:"Vasastan området",ns:"Gå runt boendegatorna",nst:"Området runt Gustaf Vasa kyrka är 1900-talsboendehusen.",nt:"Gratis. Gå från kyrkan."},
{id:92,n:"Södermalm Staircase Network — Södermalm",a:"Södermalm",v:["beautiful","hidden","walking"],d:60,s:"Walking between Södermalm's levels via 30+ staircases — the city's vertical geography revealed on foot",st:"Södermalm sits on a hill. Between street levels are dozens of hidden staircases connecting upper and lower neighbourhoods. Walking the staircase network, you discover the city's topography. Each staircase has a different story, different light, different views. Locals know all of them. Tourists walk the main streets and miss everything.",im:"The moment a staircase appears between buildings, leading to an entirely different level",t:"Free. Södermalm. Start from Slussen or Medborgarplatsen. Get a map or wander. Allow 2+ hours.",c:["walking"],r:"g",nn:"Södermalm trappor",ns:"Gå mellan nivåer via gömda trappor",nst:"Södermalm ligger på en backe.",nt:"Gratis. Södermalm. Start från Slussen."},
{id:93,n:"Stockholm Metro Art Gallery — Norrmalm/Various",a:"City Centre",v:["art","free entry","hidden"],d:"varies",s:"The metro itself is a design and art installation — 100+ stations with murals, sculptures, installations. It's the world's longest art gallery at 100 km",st:"Stockholm's metro is world-famous for art. Nearly every station has murals, sculptures, themed installations. What started as functional transport became a public art project that kept evolving. Locals commute through galleries. Tourists pay for museums. Stockholm locals are walking through art daily.",im:"The moment you realize the walls themselves are museum-quality work",t:"Free. T-bana system. Spend a day riding lines instead of going places.",c:["art"],r:"g",nn:"Stockholms tunnelbana konstgalleri",ns:"Tunnelbanan själv är en konstinstallation",nst:"Stockholms tunnelbana är världsberömda för konst.",nt:"Gratis. T-bana systemet."},
{id:94,n:"Snösätra Graffiti Wall Legal — Södermalm",a:"Södermalm",v:["art","free entry","weird"],d:20,s:"Official legal graffiti wall where Stockholm street artists paint — the closest you get to understanding contemporary urban expression",st:"Snösätra is a legal graffiti wall managed by the city. Street artists paint here instead of on buildings. It changes constantly. The work ranges from tags to complex pieces. It's the place where Stockholm's street art culture exists legitimately. Go monthly and it's completely different.",im:"Colour and movement and complexity you won't see in galleries",t:"Free. Walk to Snösätra. Best light afternoons. No guarantee what you'll see.",c:["art"],r:"g",nn:"Snösätra graffitvägg",ns:"Officiell rättslig graffittivägg",nst:"Snösätra är en laglig graffittivägg.",nt:"Gratis. Gå till Snösätra."},
{id:95,n:"Observatorielunden Hill — Södermalm",a:"Södermalm",v:["hidden","view","quiet"],d:20,s:"Observatory hill with 19th-century building and views toward eastern Stockholm — where the city was first measured",st:"Observatorielunden sits on Södermalm with a small 1800s building (the Observatory). Views across the city. It's one of those Stockholm places that feels private despite being central. Locals sit here on lunch breaks. The light is clear because the elevation gives air circulation.",im:"Looking at the city from exactly where it was first observed and measured",t:"Free. Walk to Södermalm high points. Small, easy to miss. Weekday afternoons are empty.",c:["view"],r:"g",nn:"Observatorielunden",ns:"Observatoriekulle med utsikt",nst:"Observatorielunden ligger på Södermalm.",nt:"Gratis. Gå till höga punkter."},
{id:96,n:"Fåfängen Mountain Picnic Spot — Södermalm",a:"Södermalm",v:["hidden","view","local"],d:25,s:"10-minute walk from Slussen, mountain views of rooftops and water — favourite picnic location for Stockholmers",st:"Fåfängen (which means vanity/folly) is a modest hill 10 minutes from Slussen with views across central Stockholm. Locals bring picnics, wine, friends. The view is toward Djurgården, Gamla Stan, water. It's unpretentious and completely real — this is how Stockholm locals spend summer afternoons.",im:"Sitting on grass with a bottle and the entire city spread out",t:"Free. Walk from Slussen past Mosebacke. Look for upward paths. Bring your own picnic.",c:["view"],r:"g",nn:"Fåfängen picnic",ns:"10 minuter från Slussen, bergutsikt",nst:"Fåfängen är en blygsam kulle.",nt:"Gratis. Gå från Slussen."},
{id:97,n:"Gröndal Green Viewpoint — Södermalm",a:"Södermalm",v:["hidden","view","quiet"],d:30,s:"Upper Södermalm viewpoint over Riddarfjärden — quieter than Skinnarviksberget, locals only",st:"Gröndal sits on upper Södermalm with views across Riddarfjärden to Norrmalm and beyond. Less famous than Skinnarviksberget so fewer crowds. Locals know it as a place to breathe and look. Summer evenings the light is extraordinary. It has the feel of a neighbourhood secret that actually is secret.",im:"The quiet moment when you stop walking and just look",t:"Free. Upper Södermalm. Find via street maps or local guidance. Best approaching from Södermalm.",c:["view"],r:"g",nn:"Gröndal utsiktspunkt",ns:"Övre Södermalm med utsikt",nst:"Gröndal ligger på övre Södermalm.",nt:"Gratis. Övre Södermalm."},
{id:98,n:"Mosebacke Terrace Evening — Södermalm",a:"Södermalm",v:["view","beautiful","local"],d:20,s:"Terrace overlooking Gamla Stan and water — summer when the terrace cafe opens is when the light is perfect",st:"Mosebacke is a terrace/café space on Södermalm with direct views to Gamla Stan and the water. Summer, tables are set out and locals gather. The light at 8-9 PM is never-night Swedish summer light. Drinks cost money but the view would be worth millions if it were privately owned. Instead it's public.",im:"Sunset turning the Old Town golden from a terrace where you're sitting with coffee or beer",t:"Terrace café (drinks ~80-150 SEK). Södermalm. Summer season (May-September). Busiest weekends.",c:["view"],r:"y",nn:"Mosebacke terrass kväll",ns:"Terrass med utsikt över Gamla Stan",nst:"Mosebacke är en terrasscafé.",nt:"Drycker ~80-150 kr. Sommaren (maj-september)."},
{id:99,n:"Tantolunden Green Hang-Out — Södermalm",a:"Södermalm",v:["local","park","free entry"],d:45,s:"Södermalm's main park where locals actually spend time — grass, barbecue areas, real Stockholm summer culture",st:"Tantolunden is how Stockholm spends summer. Large park with grass, trees, designated barbecue areas. Locals bring families, bring friends, bring beer and grilled sausages. The culture here is honest — this is how the neighbourhood actually gathers. Very non-touristy. Very real. The smell of coal and sausages and the sound of Swedish conversations.",im:"Groups spreading across grass, smoke from grills, kids playing, summer happening",t:"Free. Södermalm. Barbecue grill use free or small fee. Busiest June-August weekends. Bring food.",c:["parks"],r:"g",nn:"Tantolunden gräsyta",ns:"Södermalms huvudpark",nst:"Tantolunden är hur Stockholm tillbringar sommaren.",nt:"Gratis. Södermalm. Grill gratis eller små avgift."},
{id:100,n:"Fåfängen Chess and Wine — Södermalm",a:"Södermalm",v:["local","weird","hidden"],d:30,s:"Locals play chess and drink wine on a hillside park — the most Stockholm scene possible",st:"Near Fåfängen and across Södermalm parks, locals set up for chess matches with friends and wine. It's informal, it's free, it's how Stockholm leisure looks. Watching serious chess players on park grass with water views and wine is the soul of the city.",im:"The quiet intensity of chess, the clink of a wine glass, water visible beyond trees",t:"Free. Bring your own chess set or find others. Wine is BYOB or nearby shops. Weekday afternoons.",c:["local"],r:"g",nn:"Fåfängen schack och vin",ns:"Lokala spelar schack och drinker vin",nst:"Lokala spelar schack på en kullpark.",nt:"Gratis. Ta egen schackspel."},
{id:101,n:"Langholmen Prison Museum Walk — Kungsholmen",a:"Kungsholmen",v:["history","free entry","weird"],d:60,s:"Former prison island now a walk — prison buildings still stand, museum sections explain the history, locals know it as real",st:"Långholmen Island was a prison. It's now a public space with walking paths and a small prison museum (entry fee). The cells remain. The architecture is serious and sad. Walking here, you understand Swedish criminal history and how the city transformed an institution into public park. It's not creepy — it's educational and respectful.",im:"Walking past the actual cells where people served actual time",t:"Free to walk island. Museum entry ~50-80 SEK. Kungsholmen. Prison path is clearly marked.",c:["history"],r:"g",nn:"Långholmen fängelsemuseum",ns:"Före detta fängelseö nu promenad",nst:"Långholmen var ett fängelse.",nt:"Gratis att gå. Museuminträde ~50-80 kr."},
{id:102,n:"Hornstull Cliff Walk — Kungsholmen",a:"Kungsholmen",v:["beautiful","hidden","water"],d:30,s:"Rock cliffs overlooking Riddarfjärden on Hornstull — water and granite and city views in one small area",st:"Hornstull has cliffs overlooking the water with views across to Södermalm. Rock formations create natural seating. Locals come here to sit, look, think. It's not dramatic cliff-walking — it's modest geology that teaches you Stockholm's landscape. The water is cold and clean and visible.",im:"Sitting on stone with the water directly below reflecting late light",t:"Free. Walk to Hornstull area on Kungsholmen. Easy scramble down to rocks.",c:["water"],r:"g",nn:"Hornstull klippkant",ns:"Klippa med Riddarfjärdenutsikt",nst:"Hornstull har klippor över vattnet.",nt:"Gratis. Gå till Hornstull."},
{id:103,n:"Sauna Radio Summer Sessions — Södermalm",a:"Södermalm",v:["music","local","weird"],d:120,s:"Underground sauna hosting DJ sets and performances throughout summer — unique Stockholm cultural moment",st:"Sauna Radio is a small sauna space that hosts summer programming: DJs, live performances, conversations. It's free and open to all. The vibe is intentionally alternative. You might arrive for a sauna and encounter live music or experimental art. This is what Stockholm creates when real people have a space to use.",im:"Steam and music mixing, something between ritual and celebration",t:"Check schedule online (free and paid events mix). Södermalm. Capacity is small so go early.",c:["music"],r:"y",nn:"Sauna Radio program",ns:"Underground bastu med DJ",nst:"Sauna Radio är ett litet bastu-utrymme.",nt:"Kontrollera schema online. Södermalm."},
{id:104,n:"Rosendal Garden Vegetable Plot — Djurgården",a:"Djurgården",v:["nature","beautiful","free entry"],d:45,s:"Organic garden on Djurgården managed by locals — walk between vegetable beds, learn how the city gardens",st:"Rosendal Trädgård (Rosendal Garden) is an organic garden on Djurgården. Locals manage it. You can walk and see what grows, buy plants, understand how urban farming looks in Stockholm. The café serves food from the garden. It's not a museum — it's a living, working garden.",im:"Walking past rows of vegetables in the middle of the city, hands in soil energy",t:"Free to walk. Djurgården. Café and plant sales. Weekends busier. Hours vary by season.",c:["nature"],r:"y",nn:"Rosendal trädgård",ns:"Ekologisk trädgård på Djurgården",nst:"Rosendal är en ekologisk trädgård.",nt:"Gratis att gå. Djurgården. Café och växtförsäljning."},
{id:105,n:"Vita Bergen Wooden Houses Tour — Södermalm",a:"Södermalm",v:["history","beautiful","walking"],d:45,s:"Late 1800s neighbourhood of red wooden houses — Stockholm architecture before concrete, walk between them and see how it was built",st:"Vita Bergen is an area of Södermalm with preserved wooden houses from the late 1800s. Red facades, original windows, narrow streets. Walking here is walking through Stockholm's 19th century housing. The houses are lived in, not museums. You see how space was organized, how light moved, how people fit.",im:"Red wooden facades casting shadow patterns at afternoon light",t:"Free. Södermalm, Vita Bergen area. Best photographed afternoon. Still residential — respect privacy.",c:["history"],r:"g",nn:"Vita Bergen trähus",ns:"1800-talsnätet av röda trähus",nst:"Vita Bergen är ett område med bevarade trähus.",nt:"Gratis. Södermalm. Respektera privathed."},
{id:106,n:"Fotografiska (exterior courtyard) — Södermalm",a:"Södermalm",v:["art","free entry"],d:20,s:"Photography museum courtyard free to walk — contemporary photography displayed, water views, courtyard café",st:"Fotografiska is a photography museum on Södermalm with an entrance courtyard that's free to access. Exhibitions change. The courtyard has views toward water, a café. Even without paying museum entry, the space itself teaches something about design and visibility.",im:"Large photographs displayed in open space, light moving across them",t:"Free courtyard access. Södermalm waterfront. Museum entry is paid (~150-200 SEK).",c:["art"],r:"g",nn:"Fotografiska utegård",ns:"Fotograf museum öppen gård",nst:"Fotografiska är ett fotografimuseum.",nt:"Gratis gård. Inträde betalt (~150-200 kr)."},
{id:107,n:"Skeppsholmen Island Walk Loop — Djurgården",a:"Djurgården",v:["beautiful","walk","quiet"],d:60,s:"Walk the perimeter of Skeppsholmen island — water on three sides, museums you don't have to enter, real island experience",st:"Skeppsholmen is an island accessible by bridge from Djurgården. Walking its perimeter, you have water on three sides. Museums (Fotografiska, Arkitekturmuseet, Moderna Museet, Naval Museum) sit on the island but you don't need entry to appreciate the walk. The paths are public. It's one of Stockholm's quiet moments.",im:"Walking an island path with water constantly visible, no cars",t:"Free. Island accessible by bridge. Allow 1.5-2 hours for loop.",c:["walking"],r:"g",nn:"Skeppsholmen promenad",ns:"Gå runt ön — vatten på tre sidor",nst:"Skeppsholmen är en ö med vatten på tre sidor.",nt:"Gratis. Gång-/cykelväg. 1,5-2 timmar."},
{id:108,n:"Fjäderholmarna Archipelago Day — Inner Archipelago",a:"Djurgården",v:["islands","beautiful","free entry"],d:120,s:"Small islands 20 minutes by ferry — artist studios, local restaurants, the archipelago experience in 3 hours",st:"Fjäderholmarna is three small islands 20 minutes from Nybropier. Artists have studios there. Summer brings restaurants and cafés. You get the archipelago experience without going far. Locals bring families. The light moves through the day differently on water. It teaches you Stockholm's relationship to its islands.",im:"Approaching the islands by water, seeing another world appear",t:"Ferry cost ~80-100 SEK return. Open year-round but peak season summer. Restaurants and cafés on islands.",c:["islands"],r:"g",nn:"Fjäderholmarna dag",ns:"Små öar 20 minuter med färja",nst:"Fjäderholmarna är tre små öar.",nt:"Färja ~80-100 kr retur. Restauranger på öar."},
{id:109,n:"Kalkbrännerivägen Cottage Road — Djurgården",a:"Djurgården",v:["history","quiet","beautiful"],d:30,s:"Single lane cottage road on Djurgården — red cottages, no cars, the closest Stockholm gets to countryside within the city",st:"Kalkbrännerivägen is a small lane on Djurgården with red cottages from the 1800s. No cars are allowed. It's the closest place in Stockholm to actual countryside — narrow lane, cottage walls, the sound of nothing. Walking here feels like you've gone back in time or far away, when in fact you're inside the city.",im:"A single lane, red cottage walls, silence except for birds",t:"Free. Djurgården. Accessible by walking through Djurgård main area. Respect residents.",c:["history"],r:"g",nn:"Kalkbrännerivägen väg",ns:"Liten stuga väg på Djurgården",nst:"Kalkbrännerivägen är en liten väg.",nt:"Gratis. Djurgården. Respektera boende."},
{id:110,n:"Soul Train DJ Sessions — Södermalm",a:"Södermalm",v:["music","local","dance"],d:90,s:"Saturday afternoon soul and funk DJs at various venues — Stockholm's underground dance culture, locals dancing at 4 PM in summer",st:"Soul Train is an informal series of DJ sessions playing soul, funk, house at Stockholm venues on Saturday afternoons (often Café Opera or Debaser). Locals gather to dance. The vibe is authentic. You're watching real Stockholm culture, not something packaged for tourists. Summer light coming through windows while people dance.",im:"Sunlight and movement and the sound that makes bodies respond",t:"Entry varies (often free or 100-150 SEK). Check schedule online. Södermalm areas.",c:["music"],r:"y",nn:"Soul Train DJ sessioner",ns:"Lördag soul och funk DJ",nst:"Soul Train är en serie DJ sessioner.",nt:"Inträde varierar. Kontrollera schema."}
];

<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Stockholm Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Stockholm Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
