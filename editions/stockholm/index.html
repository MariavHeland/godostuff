const P = [
  {id:1,n:"Hidden Alley Behind Stortorget — Gamla Stan",a:"Gamla Stan",v:["hidden", "history"],d:1,s:"Medieval secrets in the narrowest streets — where 16th-century merchants whispered deals",st:"You slip through an impossibly narrow passageway, stone walls so close they nearly touch. Sunlight breaks into golden fragments overhead. Tour groups are blocks away, but here, in Gamla Stan\'s hidden alley, you\'re standing in a 16th-century squeeze that\'s barely changed in 500 years. The cobbles still bear the grooves of merchant carts.",im:"It\'s 1520. Royal banquets echo through Stortorget Square while you navigate merchant passages designed for stealth and speed during the Kalmar Union.",t:"You slip through an impossibly narrow passageway, stone walls so close they nearly touch. Sunlight breaks into golden fragments overhead. Tour groups are blocks away, but here, in Gamla Stan\'s hidden alley, you\'re standing in a 16th-century squeeze that\'s barely changed in 500 years. The cobbles still bear the grooves of merchant carts.\",im:\"It\'s 1520. Royal banquets echo through Stortorget Square while you navigate merchant passages designed for stealth and speed during the Kalmar Union.\",t:\"Free. Accessible 24/7. Find it between Stortorget and Österlånggatan. Wear comfortable shoes for uneven medieval cobbles.",c:["history_big", "local_only"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},
  {id:2,n:"Secret Courtyard at Käkbrinken — Gamla Stan",a:"Gamla Stan",v:["hidden", "quiet"],d:2,s:"A Renaissance courtyard locked behind an unmarked green door — barely anyone notices it",st:"Push through the unlabeled green door and you\'re transported. This Renaissance courtyard is where Gamla Stan residents hung laundry and raised children while the city exploded around them. It\'s silent. You can hear water dripping. Plants climb ancient walls.",im:"It\'s 1600. A merchant\'s wife hangs linens while bells from Storkyrkan ring across the city. The courtyard absorbs the sound, creating a pocket of peace within medieval chaos.",t:"Push through the unlabeled green door and you\'re transported. This Renaissance courtyard is where Gamla Stan residents hung laundry and raised children while the city exploded around them. It\'s silent. You can hear water dripping. Plants climb ancient walls.\",im:\"It\'s 1600. A merchant\'s wife hangs linens while bells from Storkyrkan ring across the city. The courtyard absorbs the sound, creating a pocket of peace within medieval chaos.\",t:\"Free. The green door is between Österlånggatan and Prästgatan. Unlock is free during daylight. Bring a sketchbook.",c:["history_big", "quiet"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},
  {id:3,n:"Kornhamnstorg\'s Hidden Well — Gamla Stan",a:"Gamla Stan",v:["hidden", "history"],d:3,s:"A 700-year-old public well in a forgotten square that locals still use",st:"Most people walk past Kornhamnstorg\'s well without a glance. It\'s been there since the 1300s, slowly oxidizing into blue-green patina. This is where Stockholm got water before pipes existed. Sit on the well\'s edge and you\'re sitting where a baker might have sat in 1450.",im:"It\'s 1380. Water-carriers fill buckets before dawn while early merchants set up stalls. The well is the pulse of the neighborhood.",t:"Most people walk past Kornhamnstorg\'s well without a glance. It\'s been there since the 1300s, slowly oxidizing into blue-green patina. This is where Stockholm got water before pipes existed. Sit on the well\'s edge and you\'re sitting where a baker might have sat in 1450.\",im:\"It\'s 1380. Water-carriers fill buckets before dawn while early merchants set up stalls. The well is the pulse of the neighborhood.\",t:\"Free. Located at Kornhamnstorg off Västerlånggatan. Bring a coin to make a wish like locals do.",c:["history_big", "local_only"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},
  {id:4,n:"Storkyrkan\'s Secret Passages — Gamla Stan",a:"Gamla Stan",v:["history", "quiet"],d:4,s:"Medieval cathedral with underground tunnels to the royal palace that few tourists know",st:"Storkyrkan Cathedral feels medieval outside, but inside you\'ll find hidden passages—some still accessible if you ask staff nicely. These tunnels connected to the royal palace so royalty could attend services unseen. The stone walls have medieval graffiti.",im:"It\'s 1340. A secret passage echoes with royal footsteps while the city above knows nothing of the connection beneath. Stone and shadow hold Stockholm\'s secrets.",t:"Storkyrkan Cathedral feels medieval outside, but inside you\'ll find hidden passages—some still accessible if you ask staff nicely. These tunnels connected to the royal palace so royalty could attend services unseen. The stone walls have medieval graffiti.\",im:\"It\'s 1340. A secret passage echoes with royal footsteps while the city above knows nothing of the connection beneath. Stone and shadow hold Stockholm\'s secrets.\",t:\"Free entry to cathedral. Passages available by guided tour (small fee). Ask staff about hidden routes. Best visited on weekday mornings.",c:["history_big", "architecture"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},
  {id:5,n:"Mårten Trotzigs Gränd — Gamla Stan",a:"Gamla Stan",v:["hidden", "beautiful"],d:5,s:"World\'s narrowest street at 90cm wide—a medieval squeeze that feels timeless",st:"Mårten Trotzigs Gränd is Instagram famous but still feels undiscovered because you experience it alone. At 90cm, no one can walk side-by-side. You\'re pressed against 16th-century stone. It\'s claustrophobic and magical simultaneously.",im:"It\'s 1550. A merchant carefully navigates the narrow passage carrying spices from the harbor. Every step has been taken thousands of times, but the street never gets wider.",t:"Mårten Trotzigs Gränd is Instagram famous but still feels undiscovered because you experience it alone. At 90cm, no one can walk side-by-side. You\'re pressed against 16th-century stone. It\'s claustrophobic and magical simultaneously.\",im:\"It\'s 1550. A merchant carefully navigates the narrow passage carrying spices from the harbor. Every step has been taken thousands of times, but the street never gets wider.\",t:\"Free. Located between Västerlånggatan and Järntorget. Go early morning for fewer crowds. Bring your camera for the light.",c:["history_big", "local_only"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},

  {id:14,n:"Storkyrkan\'s Secret Passages — Gamla Stan",a:"Gamla Stan",v:["history", "quiet"],d:14,s:"Medieval cathedral with underground tunnels to the royal palace that few tourists know",st:"Storkyrkan Cathedral feels medieval outside, but inside you\'ll find hidden passages—some still accessible if you ask staff nicely. These tunnels connected to the royal palace so royalty could attend services unseen. The stone walls have medieval graffiti.",im:"It\'s 1340. A secret passage echoes with royal footsteps while the city above knows nothing of the connection beneath. Stone and shadow hold Stockholm\'s secrets.",t:"Storkyrkan Cathedral feels medieval outside, but inside you\'ll find hidden passages—some still accessible if you ask staff nicely. These tunnels connected to the royal palace so royalty could attend services unseen. The stone walls have medieval graffiti.\",im:\"It\'s 1340. A secret passage echoes with royal footsteps while the city above knows nothing of the connection beneath. Stone and shadow hold Stockholm\'s secrets.\",t:\"Free entry to cathedral. Passages available by guided tour (small fee). Ask staff about hidden routes. Best visited on weekday mornings.",c:["history_big", "architecture"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},
  {id:15,n:"Mårten Trotzigs Gränd — Gamla Stan",a:"Gamla Stan",v:["hidden", "beautiful"],d:15,s:"World\'s narrowest street at 90cm wide—a medieval squeeze that feels timeless",st:"Mårten Trotzigs Gränd is Instagram famous but still feels undiscovered because you experience it alone. At 90cm, no one can walk side-by-side. You\'re pressed against 16th-century stone. It\'s claustrophobic and magical simultaneously.",im:"It\'s 1550. A merchant carefully navigates the narrow passage carrying spices from the harbor. Every step has been taken thousands of times, but the street never gets wider.",t:"Mårten Trotzigs Gränd is Instagram famous but still feels undiscovered because you experience it alone. At 90cm, no one can walk side-by-side. You\'re pressed against 16th-century stone. It\'s claustrophobic and magical simultaneously.\",im:\"It\'s 1550. A merchant carefully navigates the narrow passage carrying spices from the harbor. Every step has been taken thousands of times, but the street never gets wider.\",t:\"Free. Located between Västerlånggatan and Järntorget. Go early morning for fewer crowds. Bring your camera for the light.",c:["history_big", "local_only"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},
  {id:16,n:"Hidden Alley Behind Stortorget — Gamla Stan",a:"Gamla Stan",v:["hidden", "history"],d:16,s:"Medieval secrets in the narrowest streets — where 16th-century merchants whispered deals",st:"You slip through an impossibly narrow passageway, stone walls so close they nearly touch. Sunlight breaks into golden fragments overhead. Tour groups are blocks away, but here, in Gamla Stan\'s hidden alley, you\'re standing in a 16th-century squeeze that\'s barely changed in 500 years. The cobbles still bear the grooves of merchant carts.",im:"It\'s 1520. Royal banquets echo through Stortorget Square while you navigate merchant passages designed for stealth and speed during the Kalmar Union.",t:"You slip through an impossibly narrow passageway, stone walls so close they nearly touch. Sunlight breaks into golden fragments overhead. Tour groups are blocks away, but here, in Gamla Stan\'s hidden alley, you\'re standing in a 16th-century squeeze that\'s barely changed in 500 years. The cobbles still bear the grooves of merchant carts.\",im:\"It\'s 1520. Royal banquets echo through Stortorget Square while you navigate merchant passages designed for stealth and speed during the Kalmar Union.\",t:\"Free. Accessible 24/7. Find it between Stortorget and Österlånggatan. Wear comfortable shoes for uneven medieval cobbles.",c:["history_big", "local_only"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter   {id:27,n:"Secret Courtyard at Käkbrinken — Gamla Stan",a:"Gamla Stan",v:["hidden", "quiet"],d:27,s:"A Renaissance courtyard locked behind an unmarked green door — barely anyone notices it",st:"Push through the unlabeled green door and you\'re transported. This Renaissance courtyard is where Gamla Stan residents hung laundry and raised children while the city exploded around them. It\'s silent. You can hear water dripping. Plants climb ancient walls.",im:"It\'s 1600. A merchant\'s wife hangs linens while bells from Storkyrkan ring across the city. The courtyard absorbs the sound, creating a pocket of peace within medieval chaos.",t:"Push through the unlabeled green door and you\'re transported. This Renaissance courtyard is where Gamla Stan residents hung laundry and raised children while the city exploded around them. It\'s silent. You can hear water dripping. Plants climb ancient walls.\",im:\"It\'s 1600. A merchant\'s wife hangs linens while bells from Storkyrkan ring across the city. The courtyard absorbs the sound, creating a pocket of peace within medieval chaos.\",t:\"Free. The green door is between Österlånggatan and Prästgatan. Unlock is free during daylight. Bring a sketchbook.",c:["history_big", "quiet"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},
  {id:28,n:"Kornhamnstorg\'s Hidden Well — Gamla Stan",a:"Gamla Stan",v:["hidden", "history"],d:28,s:"A 700-year-old public well in a forgotten square that locals still use",st:"Most people walk past Kornhamnstorg\'s well without a glance. It\'s been there since the 1300s, slowly oxidizing into blue-green patina. This is where Stockholm got water before pipes existed. Sit on the well\'s edge and you\'re sitting where a baker might have sat in 1450.",im:"It\'s 1380. Water-carriers fill buckets before dawn while early merchants set up stalls. The well is the pulse of the neighborhood.",t:"Most people walk past Kornhamnstorg\'s well without a glance. It\'s been there since the 1300s, slowly oxidizing into blue-green patina. This is where Stockholm got water before pipes existed. Sit on the well\'s edge and you\'re sitting where a baker might have sat in 1450.\",im:\"It\'s 1380. Water-carriers fill buckets before dawn while early merchants set up stalls. The well is the pulse of the neighborhood.\",t:\"Free. Located at Kornhamnstorg off Västerlånggatan. Bring a coin to make a wish like locals do.",c:["history_big", "local_only"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},
  {id:29,n:"Storkyrkan\'s Secret Passages — Gamla Stan",a:"Gamla Stan",v:["history", "quiet"],d:29,s:"Medieval cathedral with underground tunnels to the royal palace that few tourists know",st:"Storkyrkan Cathedral feels medieval outside, but inside you\'ll find hidden passages—some still accessible if you ask staff nicely. These tunnels connected to the royal palace so royalty could attend services unseen. The stone walls have medieval graffiti.",im:"It\'s 1340. A secret passage echoes with royal footsteps while the city above knows nothing of the connection beneath. Stone and shadow hold Stockholm\'s secrets.",t:"Storkyrkan Cathedral feels medieval outside, but inside you\'ll find hidden passages—some still accessible if you ask staff nicely. These tunnels connected to the royal palace so royalty could attend services unseen. The stone walls have medieval graffiti.\",im:\"It\'s 1340. A secret passage echoes with royal footsteps while the city above knows nothing of the connection beneath. Stone and shadow hold Stockholm\'s secrets.\",t:\"Free entry to cathedral. Passages available by guided tour (small fee). Ask staff about hidden routes. Best visited on weekday mornings.",c:["history_big", "architecture"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},
  {id:30,n:"Mårten Trotzigs Gränd — Gamla Stan",a:"Gamla Stan",v:["hidden", "beautiful"],d:30,s:"World\'s narrowest street at 90cm wide—a medieval squeeze that feels timeless",st:"Mårten Trotzigs Gränd is Instagram famous but still feels undiscovered because you experience it alone. At 90cm, no one can walk side-by-side. You\'re pressed against 16th-century stone. It\'s claustrophobic and magical simultaneously.",im:"It\'s 1550. A merchant carefully navigates the narrow passage carrying spices from the harbor. Every step has been taken thousands of times, but the street never gets wider.",t:"Mårten Trotzigs Gränd is Instagram famous but still feels undiscovered because you experience it alone. At 90cm, no one can walk side-by-side. You\'re pressed against 16th-century stone. It\'s claustrophobic and magical simultaneously.\",im:\"It\'s 1550. A merchant carefully navigates the narrow passage carrying spices from the harbor. Every step has been taken thousands of times, but the street never gets wider.\",t:\"Free. Located between Västerlånggatan and Järntorget. Go early morning for fewer crowds. Bring your camera for the light.",c:["history_big", "local_only"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},

  {id:41,n:"Hidden Alley Behind Stortorget — Gamla Stan",a:"Gamla Stan",v:["hidden", "history"],d:41,s:"Medieval secrets in the narrowest streets — where 16th-century merchants whispered deals",st:"You slip through an impossibly narrow passageway, stone walls so close they nearly touch. Sunlight breaks into golden fragments overhead. Tour groups are blocks away, but here, in Gamla Stan\'s hidden alley, you\'re standing in a 16th-century squeeze that\'s barely changed in 500 years. The cobbles still bear the grooves of merchant carts.",im:"It\'s 1520. Royal banquets echo through Stortorget Square while you navigate merchant passages designed for stealth and speed during the Kalmar Union.",t:"You slip through an impossibly narrow passageway, stone walls so close they nearly touch. Sunlight breaks into golden fragments overhead. Tour groups are blocks away, but here, in Gamla Stan\'s hidden alley, you\'re standing in a 16th-century squeeze that\'s barely changed in 500 years. The cobbles still bear the grooves of merchant carts.\",im:\"It\'s 1520. Royal banquets echo through Stortorget Square while you navigate merchant passages designed for stealth and speed during the Kalmar Union.\",t:\"Free. Accessible 24/7. Find it between Stortorget and Österlånggatan. Wear comfortable shoes for uneven medieval cobbles.",c:["history_big", "local_only"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter   {id:42,n:"Secret Courtyard at Käkbrinken — Gamla Stan",a:"Gamla Stan",v:["hidden", "quiet"],d:42,s:"A Renaissance courtyard locked behind an unmarked green door — barely anyone notices it",st:"Push through the unlabeled green door and you\'re transported. This Renaissance courtyard is where Gamla Stan residents hung laundry and raised children while the city exploded around them. It\'s silent. You can hear water dripping. Plants climb ancient walls.",im:"It\'s 1600. A merchant\'s wife hangs linens while bells from Storkyrkan ring across the city. The courtyard absorbs the sound, creating a pocket of peace within medieval chaos.",t:"Push through the unlabeled green door and you\'re transported. This Renaissance courtyard is where Gamla Stan residents hung laundry and raised children while the city exploded around them. It\'s silent. You can hear water dripping. Plants climb ancient walls.\",im:\"It\'s 1600. A merchant\'s wife hangs linens while bells from Storkyrkan ring across the city. The courtyard absorbs the sound, creating a pocket of peace within medieval chaos.\",t:\"Free. The green door is between Österlånggatan and Prästgatan. Unlock is free during daylight. Bring a sketchbook.",c:["history_big", "quiet"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},
  {id:43,n:"Kornhamnstorg\'s Hidden Well — Gamla Stan",a:"Gamla Stan",v:["hidden", "history"],d:43,s:"A 700-year-old public well in a forgotten square that locals still use",st:"Most people walk past Kornhamnstorg\'s well without a glance. It\'s been there since the 1300s, slowly oxidizing into blue-green patina. This is where Stockholm got water before pipes existed. Sit on the well\'s edge and you\'re sitting where a baker might have sat in 1450.",im:"It\'s 1380. Water-carriers fill buckets before dawn while early merchants set up stalls. The well is the pulse of the neighborhood.",t:"Most people walk past Kornhamnstorg\'s well without a glance. It\'s been there since the 1300s, slowly oxidizing into blue-green patina. This is where Stockholm got water before pipes existed. Sit on the well\'s edge and you\'re sitting where a baker might have sat in 1450.\",im:\"It\'s 1380. Water-carriers fill buckets before dawn while early merchants set up stalls. The well is the pulse of the neighborhood.\",t:\"Free. Located at Kornhamnstorg off Västerlånggatan. Bring a coin to make a wish like locals do.",c:["history_big", "local_only"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},

  {id:54,n:"Storkyrkan\'s Secret Passages — Gamla Stan",a:"Gamla Stan",v:["history", "quiet"],d:54,s:"Medieval cathedral with underground tunnels to the royal palace that few tourists know",st:"Storkyrkan Cathedral feels medieval outside, but inside you\'ll find hidden passages—some still accessible if you ask staff nicely. These tunnels connected to the royal palace so royalty could attend services unseen. The stone walls have medieval graffiti.",im:"It\'s 1340. A secret passage echoes with royal footsteps while the city above knows nothing of the connection beneath. Stone and shadow hold Stockholm\'s secrets.",t:"Storkyrkan Cathedral feels medieval outside, but inside you\'ll find hidden passages—some still accessible if you ask staff nicely. These tunnels connected to the royal palace so royalty could attend services unseen. The stone walls have medieval graffiti.\",im:\"It\'s 1340. A secret passage echoes with royal footsteps while the city above knows nothing of the connection beneath. Stone and shadow hold Stockholm\'s secrets.\",t:\"Free entry to cathedral. Passages available by guided tour (small fee). Ask staff about hidden routes. Best visited on weekday mornings.",c:["history_big", "architecture"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},
  {id:55,n:"Mårten Trotzigs Gränd — Gamla Stan",a:"Gamla Stan",v:["hidden", "beautiful"],d:55,s:"World\'s narrowest street at 90cm wide—a medieval squeeze that feels timeless",st:"Mårten Trotzigs Gränd is Instagram famous but still feels undiscovered because you experience it alone. At 90cm, no one can walk side-by-side. You\'re pressed against 16th-century stone. It\'s claustrophobic and magical simultaneously.",im:"It\'s 1550. A merchant carefully navigates the narrow passage carrying spices from the harbor. Every step has been taken thousands of times, but the street never gets wider.",t:"Mårten Trotzigs Gränd is Instagram famous but still feels undiscovered because you experience it alone. At 90cm, no one can walk side-by-side. You\'re pressed against 16th-century stone. It\'s claustrophobic and magical simultaneously.\",im:\"It\'s 1550. A merchant carefully navigates the narrow passage carrying spices from the harbor. Every step has been taken thousands of times, but the street never gets wider.\",t:\"Free. Located between Västerlånggatan and Järntorget. Go early morning for fewer crowds. Bring your camera for the light.",c:["history_big", "local_only"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},
  {id:56,n:"Hidden Alley Behind Stortorget — Gamla Stan",a:"Gamla Stan",v:["hidden", "history"],d:56,s:"Medieval secrets in the narrowest streets — where 16th-century merchants whispered deals",st:"You slip through an impossibly narrow passageway, stone walls so close they nearly touch. Sunlight breaks into golden fragments overhead. Tour groups are blocks away, but here, in Gamla Stan\'s hidden alley, you\'re standing in a 16th-century squeeze that\'s barely changed in 500 years. The cobbles still bear the grooves of merchant carts.",im:"It\'s 1520. Royal banquets echo through Stortorget Square while you navigate merchant passages designed for stealth and speed during the Kalmar Union.",t:"You slip through an impossibly narrow passageway, stone walls so close they nearly touch. Sunlight breaks into golden fragments overhead. Tour groups are blocks away, but here, in Gamla Stan\'s hidden alley, you\'re standing in a 16th-century squeeze that\'s barely changed in 500 years. The cobbles still bear the grooves of merchant carts.\",im:\"It\'s 1520. Royal banquets echo through Stortorget Square while you navigate merchant passages designed for stealth and speed during the Kalmar Union.\",t:\"Free. Accessible 24/7. Find it between Stortorget and Österlånggatan. Wear comfortable shoes for uneven medieval cobbles.",c:["history_big", "local_only"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter   {id:67,n:"Secret Courtyard at Käkbrinken — Gamla Stan",a:"Gamla Stan",v:["hidden", "quiet"],d:67,s:"A Renaissance courtyard locked behind an unmarked green door — barely anyone notices it",st:"Push through the unlabeled green door and you\'re transported. This Renaissance courtyard is where Gamla Stan residents hung laundry and raised children while the city exploded around them. It\'s silent. You can hear water dripping. Plants climb ancient walls.",im:"It\'s 1600. A merchant\'s wife hangs linens while bells from Storkyrkan ring across the city. The courtyard absorbs the sound, creating a pocket of peace within medieval chaos.",t:"Push through the unlabeled green door and you\'re transported. This Renaissance courtyard is where Gamla Stan residents hung laundry and raised children while the city exploded around them. It\'s silent. You can hear water dripping. Plants climb ancient walls.\",im:\"It\'s 1600. A merchant\'s wife hangs linens while bells from Storkyrkan ring across the city. The courtyard absorbs the sound, creating a pocket of peace within medieval chaos.\",t:\"Free. The green door is between Österlånggatan and Prästgatan. Unlock is free during daylight. Bring a sketchbook.",c:["history_big", "quiet"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},
  {id:68,n:"Kornhamnstorg\'s Hidden Well — Gamla Stan",a:"Gamla Stan",v:["hidden", "history"],d:68,s:"A 700-year-old public well in a forgotten square that locals still use",st:"Most people walk past Kornhamnstorg\'s well without a glance. It\'s been there since the 1300s, slowly oxidizing into blue-green patina. This is where Stockholm got water before pipes existed. Sit on the well\'s edge and you\'re sitting where a baker might have sat in 1450.",im:"It\'s 1380. Water-carriers fill buckets before dawn while early merchants set up stalls. The well is the pulse of the neighborhood.",t:"Most people walk past Kornhamnstorg\'s well without a glance. It\'s been there since the 1300s, slowly oxidizing into blue-green patina. This is where Stockholm got water before pipes existed. Sit on the well\'s edge and you\'re sitting where a baker might have sat in 1450.\",im:\"It\'s 1380. Water-carriers fill buckets before dawn while early merchants set up stalls. The well is the pulse of the neighborhood.\",t:\"Free. Located at Kornhamnstorg off Västerlånggatan. Bring a coin to make a wish like locals do.",c:["history_big", "local_only"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},
  {id:69,n:"Storkyrkan\'s Secret Passages — Gamla Stan",a:"Gamla Stan",v:["history", "quiet"],d:69,s:"Medieval cathedral with underground tunnels to the royal palace that few tourists know",st:"Storkyrkan Cathedral feels medieval outside, but inside you\'ll find hidden passages—some still accessible if you ask staff nicely. These tunnels connected to the royal palace so royalty could attend services unseen. The stone walls have medieval graffiti.",im:"It\'s 1340. A secret passage echoes with royal footsteps while the city above knows nothing of the connection beneath. Stone and shadow hold Stockholm\'s secrets.",t:"Storkyrkan Cathedral feels medieval outside, but inside you\'ll find hidden passages—some still accessible if you ask staff nicely. These tunnels connected to the royal palace so royalty could attend services unseen. The stone walls have medieval graffiti.\",im:\"It\'s 1340. A secret passage echoes with royal footsteps while the city above knows nothing of the connection beneath. Stone and shadow hold Stockholm\'s secrets.\",t:\"Free entry to cathedral. Passages available by guided tour (small fee). Ask staff about hidden routes. Best visited on weekday mornings.",c:["history_big", "architecture"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},
  {id:70,n:"Mårten Trotzigs Gränd — Gamla Stan",a:"Gamla Stan",v:["hidden", "beautiful"],d:70,s:"World\'s narrowest street at 90cm wide—a medieval squeeze that feels timeless",st:"Mårten Trotzigs Gränd is Instagram famous but still feels undiscovered because you experience it alone. At 90cm, no one can walk side-by-side. You\'re pressed against 16th-century stone. It\'s claustrophobic and magical simultaneously.",im:"It\'s 1550. A merchant carefully navigates the narrow passage carrying spices from the harbor. Every step has been taken thousands of times, but the street never gets wider.",t:"Mårten Trotzigs Gränd is Instagram famous but still feels undiscovered because you experience it alone. At 90cm, no one can walk side-by-side. You\'re pressed against 16th-century stone. It\'s claustrophobic and magical simultaneously.\",im:\"It\'s 1550. A merchant carefully navigates the narrow passage carrying spices from the harbor. Every step has been taken thousands of times, but the street never gets wider.\",t:\"Free. Located between Västerlånggatan and Järntorget. Go early morning for fewer crowds. Bring your camera for the light.",c:["history_big", "local_only"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},

  {id:81,n:"Hidden Alley Behind Stortorget — Gamla Stan",a:"Gamla Stan",v:["hidden", "history"],d:81,s:"Medieval secrets in the narrowest streets — where 16th-century merchants whispered deals",st:"You slip through an impossibly narrow passageway, stone walls so close they nearly touch. Sunlight breaks into golden fragments overhead. Tour groups are blocks away, but here, in Gamla Stan\'s hidden alley, you\'re standing in a 16th-century squeeze that\'s barely changed in 500 years. The cobbles still bear the grooves of merchant carts.",im:"It\'s 1520. Royal banquets echo through Stortorget Square while you navigate merchant passages designed for stealth and speed during the Kalmar Union.",t:"You slip through an impossibly narrow passageway, stone walls so close they nearly touch. Sunlight breaks into golden fragments overhead. Tour groups are blocks away, but here, in Gamla Stan\'s hidden alley, you\'re standing in a 16th-century squeeze that\'s barely changed in 500 years. The cobbles still bear the grooves of merchant carts.\",im:\"It\'s 1520. Royal banquets echo through Stortorget Square while you navigate merchant passages designed for stealth and speed during the Kalmar Union.\",t:\"Free. Accessible 24/7. Find it between Stortorget and Österlånggatan. Wear comfortable shoes for uneven medieval cobbles.",c:["history_big", "local_only"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter   {id:82,n:"Secret Courtyard at Käkbrinken — Gamla Stan",a:"Gamla Stan",v:["hidden", "quiet"],d:82,s:"A Renaissance courtyard locked behind an unmarked green door — barely anyone notices it",st:"Push through the unlabeled green door and you\'re transported. This Renaissance courtyard is where Gamla Stan residents hung laundry and raised children while the city exploded around them. It\'s silent. You can hear water dripping. Plants climb ancient walls.",im:"It\'s 1600. A merchant\'s wife hangs linens while bells from Storkyrkan ring across the city. The courtyard absorbs the sound, creating a pocket of peace within medieval chaos.",t:"Push through the unlabeled green door and you\'re transported. This Renaissance courtyard is where Gamla Stan residents hung laundry and raised children while the city exploded around them. It\'s silent. You can hear water dripping. Plants climb ancient walls.\",im:\"It\'s 1600. A merchant\'s wife hangs linens while bells from Storkyrkan ring across the city. The courtyard absorbs the sound, creating a pocket of peace within medieval chaos.\",t:\"Free. The green door is between Österlånggatan and Prästgatan. Unlock is free during daylight. Bring a sketchbook.",c:["history_big", "quiet"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},
  {id:83,n:"Kornhamnstorg\'s Hidden Well — Gamla Stan",a:"Gamla Stan",v:["hidden", "history"],d:83,s:"A 700-year-old public well in a forgotten square that locals still use",st:"Most people walk past Kornhamnstorg\'s well without a glance. It\'s been there since the 1300s, slowly oxidizing into blue-green patina. This is where Stockholm got water before pipes existed. Sit on the well\'s edge and you\'re sitting where a baker might have sat in 1450.",im:"It\'s 1380. Water-carriers fill buckets before dawn while early merchants set up stalls. The well is the pulse of the neighborhood.",t:"Most people walk past Kornhamnstorg\'s well without a glance. It\'s been there since the 1300s, slowly oxidizing into blue-green patina. This is where Stockholm got water before pipes existed. Sit on the well\'s edge and you\'re sitting where a baker might have sat in 1450.\",im:\"It\'s 1380. Water-carriers fill buckets before dawn while early merchants set up stalls. The well is the pulse of the neighborhood.\",t:\"Free. Located at Kornhamnstorg off Västerlånggatan. Bring a coin to make a wish like locals do.",c:["history_big", "local_only"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},

  {id:95,n:"Mårten Trotzigs Gränd — Gamla Stan",a:"Gamla Stan",v:["hidden", "beautiful"],d:95,s:"World\'s narrowest street at 90cm wide—a medieval squeeze that feels timeless",st:"Mårten Trotzigs Gränd is Instagram famous but still feels undiscovered because you experience it alone. At 90cm, no one can walk side-by-side. You\'re pressed against 16th-century stone. It\'s claustrophobic and magical simultaneously.",im:"It\'s 1550. A merchant carefully navigates the narrow passage carrying spices from the harbor. Every step has been taken thousands of times, but the street never gets wider.",t:"Mårten Trotzigs Gränd is Instagram famous but still feels undiscovered because you experience it alone. At 90cm, no one can walk side-by-side. You\'re pressed against 16th-century stone. It\'s claustrophobic and magical simultaneously.\",im:\"It\'s 1550. A merchant carefully navigates the narrow passage carrying spices from the harbor. Every step has been taken thousands of times, but the street never gets wider.\",t:\"Free. Located between Västerlånggatan and Järntorget. Go early morning for fewer crowds. Bring your camera for the light.",c:["history_big", "local_only"],r:"g",nn:"Stockholm",ns:"Skönheten bygger på 14 öar och hundra års stil.",nst:"Stockholm spänner över 14 öar där 8 miljoner turister möter en städslighet som känns underlig. Gamla Stan är en labyrint av färgade palats och hemliga gränder där Gustav Vasa en gång styrt. Moderna museer väcks längs Norrmalm medan Södermalm bubblar med konstnärer och bohemianer. Denna stad är både kronprinceslig och rebellisk.",nt:"Skaffa ett Stockholmskortet för transport. Fika är en religion—ta tiden för kaffe. Vintage-butiker är överallt. Sommaren lockar folk till öarna. Vintern är vacker men kall. Svenskar är reserverade men vänliga när du väl möter dem."},

const VIBES=[{id:"hidden",l:"Hidden",e:"🔎"},{id:"history",l:"History",e:"📜"},{id:"beautiful",l:"Beautiful",e:"✨"},{id:"weird",l:"Weird",e:"👁"},{id:"quiet",l:"Quiet",e:"🤫"},{id:"free",l:"Free entry",e:"🎟"},{id:"local",l:"Locals only",e:"📍"},{id:"night",l:"Night",e:"🌙"},{id:"nature",l:"Nature",e:"🌿"}];

const PLACE_IMAGES={};

const LangToggle=({lang,setLang})=>(
<div className="lang-toggle">
<button className={`lang-btn ${lang==="en"?"active":""}`} onClick={()=>setLang("en")}>EN</button>
<button className={`lang-btn ${lang==="native"?"active":""}`} onClick={()=>setLang("native")}>{LANG_NAME}</button>
</div>);

const PhrasesCard=()=>(
PHRASES.length>0&&<div className="rounded-2xl p-4 mt-3" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-3" style={{color:"#a78bfa"}}>🗣️ Useful {LANG_NAME} Phrases</h3>
<div className="flex flex-col gap-2">{PHRASES.map((ph,i)=><div key={i} className="flex justify-between items-center">
<div><span className="text-xs font-bold" style={{color:"white"}}>{ph.native}</span>
<span className="text-xs ml-2" style={{color:"#8b7fb8"}}>— {ph.en}</span></div></div>)}</div></div>);

const EntryGate=({onAccept})=>(
<div style={{minHeight:"100vh",background:"linear-gradient(180deg,rgba(10,8,30,0.72) 0%,rgba(10,8,30,0.20) 45%,rgba(10,8,30,0.10) 100%),url('images/04_night.png') center/cover no-repeat",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 24px",textAlign:"center"}}>
<h1 className="text-3xl font-black" style={{color:"white",letterSpacing:"-.5px"}}>Go Do Stuff</h1>
<p className="text-base font-bold mt-1" style={{color:"#a78bfa"}}>Stockholm Edition</p>
<p className="text-sm mt-2" style={{color:"#b8b0d0"}}>For the curious. All free.</p>
<p className="text-xs mt-2" style={{color:"#6366F1"}}>🌍 Bilingual: English + {LANG_NAME}</p>
<p className="text-xs mt-6 px-4" style={{color:"#8b7fb8",lineHeight:1.6,maxWidth:340}}>
{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>Free. Curated. No tourist traps.</p>
<div className="rounded-2xl p-6 mt-8 mx-4 text-left" style={{background:"rgba(10,10,30,0.93)",border:"1px solid rgba(255,255,255,0.15)",maxWidth:380}}>
<h2 className="text-base font-bold mb-3" style={{color:"white"}}>Before you start / Innan du börjar</h2>
<p className="text-sm leading-relaxed" style={{color:"#c8c0e0"}}>This app is a creative guide to hidden places. Content is curated for curiosity — not as instructions.</p>
<p className="text-xs leading-relaxed mt-1" style={{color:"#9990b8",fontStyle:"italic"}}>Den här appen är en kreativ guide till dolda platser. Innehållet är utvalt av nyfikenhet — inte som instruktioner.</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#c8c0e0"}}>Some locations include natural environments, heights, water, or areas that may be restricted or unsafe. You explore at your own risk and are responsible for your own safety.</p>
<p className="text-xs leading-relaxed mt-1" style={{color:"#9990b8",fontStyle:"italic"}}>Vissa platser innefattar naturmiljöer, höjder, vatten eller områden som kan vara begränsade eller osäkra. Du utforskar på egen risk och ansvarar för din egen säkerhet.</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#c8c0e0"}}>This app does not provide safety advice. Always follow local laws, respect private property, and check current conditions before visiting any place.</p>
<p className="text-xs leading-relaxed mt-1" style={{color:"#9990b8",fontStyle:"italic"}}>Appen ger inga säkerhetsråd. Följ alltid lokala lagar, respektera privatägd mark och kontrollera aktuella förhållanden innan du besöker en plats.</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#e8c0f0"}}>If you are under 18, please explore responsibly and avoid risky locations on your own.</p>
<p className="text-xs leading-relaxed mt-1" style={{color:"#c890d8",fontStyle:"italic"}}>Om du är under 18 år: utforska ansvarsfullt och undvik riskfyllda platser på egen hand.</p>
</div>
<button onClick={onAccept} className="mt-6 w-full py-4 rounded-xl text-sm font-bold text-white" style={{background:"linear-gradient(135deg,#6366F1,#8B5CF6)",border:"none",cursor:"pointer",maxWidth:380,fontSize:"15px"}}>I understand — let me explore<br/><span style={{fontSize:"12px",opacity:0.85}}>Jag förstår — vi utforskar</span></button>
</div>);

const CITY_EN="Stockholm";
const PlaceCard=({place:p,idx,onOpen,lang})=>(
<button onClick={()=>onOpen(p)} className="text-left w-full rounded-2xl p-4 fade-up" style={{background:"white",border:"1.5px solid #e4e4ed",cursor:"pointer",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div style={{flex:1}}>
<h3 className="text-base font-bold" style={{color:"#1a1a2e",lineHeight:1.3}}>{lang==="native"&&p.nn?p.nn:p.n}</h3>
{lang==="native"&&p.nn&&<p className="text-xs" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-xs mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p></div>
<span className="text-xs font-bold px-2 py-1 rounded-full ml-2 flex-shrink-0" style={{background:p.r==="g"?"#dcfce7":"#fef9c3",color:p.r==="g"?"#166534":"#854d0e"}}>{p.r==="g"?"Green":"Yellow"}</span></div>
<p className="text-sm mt-2" style={{color:"#555",lineHeight:1.5}}>{lang==="native"&&p.ns?p.ns:p.s}</p>
<div className="flex gap-1.5 mt-2 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-2 py-0.5 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</button>);

const PlaceDetail=({place:p,onClose,onNext,onPrev,lang})=>(
<div style={{position:"fixed",inset:0,zIndex:1000,background:"white",overflowY:"auto"}}>
<div className="px-5 pt-6 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex justify-between items-center mb-4">
<button onClick={onClose} className="text-sm font-bold" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← Back</button>
<div className="flex gap-2">
<button onClick={onPrev} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>←</button>
<button onClick={onNext} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>→</button></div></div>
<h1 className="text-2xl font-black" style={{color:"#1a1a2e"}}>{lang==="native"&&p.nn?p.nn:p.n}</h1>
{lang==="native"&&p.nn&&<p className="text-sm font-medium" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-sm mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p>
{PLACE_IMAGES[p.id]&&<div className="mt-4 rounded-xl overflow-hidden" style={{maxHeight:"400px"}}>
<img src={`images/${PLACE_IMAGES[p.id]}`} alt={p.n} style={{width:"100%",maxHeight:"360px",objectFit:"contain",display:"block",borderRadius:"8px"}}/>
<p className="text-xs mt-1" style={{color:"#aaa",textAlign:"center"}}>AI-generated illustration</p></div>}
<div className="mt-4 p-4 rounded-xl" style={{background:"#f8f8ff"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#1a1a2e"}}>The Story</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nst?p.nst:p.st}</p></div>
{p.im&&<div className="mt-3 p-4 rounded-xl" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#a78bfa"}}>Imagine This</h3>
<p className="text-sm" style={{color:"#b8b0d0",lineHeight:1.7,fontStyle:"italic"}}>{p.im}</p></div>}
{p.t&&<div className="mt-3 p-4 rounded-xl" style={{background:"#f0fdf4"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#166534"}}>{lang==="native"?"Tips / "+LANG_NAME:"Tips"}</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nt?p.nt:p.t}</p>
<a href={`https://maps.google.com/?q=${encodeURIComponent(p.n+', '+CITY_EN)}`} target="_blank" rel="noopener noreferrer"
  className="mt-3 flex items-center gap-2 text-sm font-bold"
  style={{color:"#166534",textDecoration:"none",display:"inline-flex",marginTop:"10px"}}>
  🗺 Get directions
</a>
</div>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

if(showPicker){const rp=P[Math.floor(Math.random()*P.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,background:"linear-gradient(180deg,#1a1a2e,#2d1b69)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<p className="text-4xl mb-4">🎲</p>
<h2 className="text-xl font-black text-center" style={{color:"white"}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-sm mt-2 text-center" style={{color:"#b8b0d0"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3 text-center px-6" style={{color:"#8b7fb8",lineHeight:1.6}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
<div className="flex gap-3 mt-6">
<button onClick={()=>setShowPicker(false)} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"transparent",color:"#8b7fb8",border:"1px solid #8b7fb8",cursor:"pointer"}}>Close</button>
<button onClick={()=>{setSelected(rp);setShowPicker(false)}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"#6366F1",color:"white",border:"none",cursor:"pointer"}}>Go!</button>
<button onClick={()=>setShowPicker(true)} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"transparent",color:"#8b7fb8",border:"1px solid #8b7fb8",cursor:"pointer"}}>Reroll</button>
</div></div>}

return <div style={{minHeight:"100vh",background:"linear-gradient(180deg,#FAFBFF 0%,#F0F2FF 100%)"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Stockholm Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={()=>setShowPicker(true)} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Stockholm Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
