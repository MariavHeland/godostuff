<script>
const P = [{id:1,n:"Jemaa el-Fnaa Square — Marrakech's Beating Heart",a:"Medina Center",v:["local","history","hidden"],d:20,s:"Iconic UNESCO-listed plaza where storytellers, musicians, snake charmers, and crowds create daily spectacle.",st:"Jemaa el-Fnaa translates roughly to 'the assembly of the dead'—so named for the public executions once held here, though now it pulses with life. This square is Marrakech's soul: by day, it's chaos—snake charmers coil serpents around tourists' necks for photos, water sellers in crimson robes hawk their drinks, fortune tellers read palms while a musician nearby plays oud. By evening, food stalls emerge, transforming the plaza into an open-air restaurant where steam rises from grills and the smell of cumin and harissa fills the air. Storytellers gather crowds and recount tales—in Darija—that tourists can't understand but feel viscerally. The square has been a marketplace and gathering place for 500 years; the energy is primordial, unchanged by tourism despite its massive presence.",im:"A snake charmer's flute weaves through the smell of grilled meat and orange juice, while acrobats tumble and a call to prayer echoes from the surrounding minarets.",t:"Open all hours; busiest at sunrise and sunset. Avoid if photosensitive—strobing dancers, bright colors. Be cautious with valuables; pickpockets exist. Don't photograph people without permission. The square can feel overwhelming; find a café terrace above for respite.",c:[],r:"g",nn:"ساحة جامع الفنا",ns:"أشهر ساحة في مراكش",nst:"ساحة تاريخية معروفة عالمياً. تضم حكائين وموسيقيين وسحرة ثعابين. تنبض بالحياة ليلاً ونهاراً.",nt:"احذر من النشالين. لا تصور الناس بدون إذن. جد مقهى علوي للهدوء. تجنب الزحام في الذروة."},{id:2,n:"Koutoubia Mosque — Marrakech's Minaret Sentinel",a:"Medina Center",v:["history","architecture","beautiful"],d:15,s:"12th-century mosque with a minaret visible across the city, Morocco's most recognizable landmark.",st:"The Koutoubia Mosque's minaret rises 77 meters in perfect geometric harmony, covered in intricate carved decoration. Built in 1147 by the Almohad dynasty, it's Morocco's most iconic structure. The minaret is visible from 25km away—Marrakech's constant companion on the horizon. The word 'Koutoubia' refers to booksellers (qutub means books), as the area once housed manuscript merchants. Non-Muslims cannot enter the mosque, but the exterior is magnificent: carved stone screens, proportions that feel inevitable. At night, the minaret glows softly, a beacon above the chaos of the medina. The mosque faces a large open square where locals gather to pray and socialize. The Almohad architecture here is the city's defining aesthetic: pure, geometric, minimal decoration by later standards but profound in its simplicity.",im:"At sunset, the minaret casts a long shadow across the square as the call to prayer echoes, and the sky turns deep amber behind the carved stone.",t:"Located at the south edge of the medina. Non-Muslims cannot enter but may observe the exterior and courtyard from outside. The surrounding square is open and accessible. Best viewed at sunset when light hits the minaret. Allow 30 minutes.",c:[],r:"g",nn:"مسجد الكتبية",ns:"مسجد تاريخي بمئذنة مشهورة",nst:"بني سنة 1147 في عهد الموحدين. المئذنة ترتفع 77 متراً وترى من بعيد. أشهر معلم في مراكش.",nt:"لا يمكن للمسلمين دخول المسجد. شاهد من الخارج. الغروب أفضل وقت للمشاهدة."},{id:3,n:"Bahia Palace — Royalty's Ornate Sanctuary",a:"Medina Center",v:["architecture","history","beautiful"],d:20,s:"19th-century royal palace with courtyards, gardens, and elaborate tilework, a masterpiece of Moroccan architecture.",st:"Bahia means 'the beauty,' and the palace lives up to its name. Built between 1866 and 1900 by successive viziers, it sprawls across multiple courtyards, each more ornate than the last. The main courtyard is a symphony of zellige tilework—intricate patterns of blue, green, and white ceramic—framing the fountain and orange trees. The ceilings are painted in geometric patterns and gilded; the wooden screens (mashrabiya) are carved so delicately light seems to pass through them like breath. Rooms are arranged around courtyards in the traditional riad style: private worlds within worlds. The harem section retains its intimacy—smaller, more personal spaces where royal women lived in seclusion. Walking the palace, you understand Moroccan aesthetics: decoration reaches a fever pitch, every surface carved, tilted, or painted, yet the overall effect is harmony, not chaos.",im:"Light filters through carved wooden screens onto zellige tiles, creating geometric shadows that dance across the courtyard floor.",t:"Located south of the medina; accessible by foot or petit taxi. Open 9am-5pm (4pm in winter). Moderate entrance fee. Photography allowed. Allow 1-2 hours. A guide is worthwhile for architectural details. Main sections are well-marked.",c:[],r:"g",nn:"قصر الباهية",ns:"قصر ملكي فخم من القرن التاسع عشر",nst:"بني بين 1866 و 1900. يتميز بحدائق وأفنية وزخارف الزليج الجميلة. آية فن معماري مغربي.",nt:"مفتوح صباحاً. استأجر دليلاً لفهم الفن. التصوير مسموح. قضِ ساعة أو ساعتين هنا."},{id:4,n:"Majorelle Garden — Exotic Botanical Sanctuary",a:"New Town",v:["nature","beautiful","art"],d:15,s:"Art deco garden with exotic plants, designed by French painter Jacques Majorelle, now owned by Yves Saint Laurent Foundation.",st:"In contrast to the medina's ancient aesthetic, Majorelle Garden is a 20th-century European vision imposed on Moroccan landscape. Created by French painter Jacques Majorelle in the 1920s-40s, it's a riot of color: vibrant blue buildings, electric yellow walls, and crimson flowers. The garden contains over 300 plant species: bamboo groves, palm trees, cacti from around the world, and lily ponds. The blue—'Majorelle Blue'—became so iconic it's now used on ceramics and textiles worldwide. After Majorelle's death, the garden was abandoned; Yves Saint Laurent and his partner Pierre Bergé purchased it in 1980 and restored it to perfection. Today, it's Marrakech's most sophisticated space: manicured, Western, entirely at odds with the organic chaos of the medina, yet utterly beautiful.",im:"A flash of electric blue building emerges between bamboo stalks, and a tourist gasps at the contrast between nature and artifice.",t:"Located north of the medina, near the new town. Easy taxi access. Open 8am-5:30pm (6pm in summer). Entrance fee is high but worth it. Allow 1-2 hours. Photography excellent. Bring a hat; limited shade. Berber Museum and adjacent Yves Saint Laurent Museum included.",c:[],r:"g",nn:"حديقة ماجوريل",ns:"حديقة فنية فاخرة بألوان زاهية",nst:"حديقة فرنسية الإنشاء من الثلاثينات. تضم نباتات نادرة من حول العالم. الآن ملك مؤسسة إيف سان لوران.",nt:"في الوسط الحديث. استأجر تاكسي. المدخل غالي لكن يستحق. احضر قبعة."},{id:5,n:"Saadian Tombs — Jeweled Burials",a:"Medina Center",v:["history","architecture","hidden"],d:15,s:"16th-century royal tombs ornately decorated with carved stucco, tilework, and hidden for centuries.",st:"The Saadian Tombs were built in the late 1500s by Ahmad al-Mansur as eternal monuments. The tombs were then sealed and hidden for nearly 200 years—forgotten until French archaeologists rediscovered them in 1917. This obscurity is their salvation: the interior decoration is preserved in pristine condition. Enter through a small doorway in an alley and suddenly you're in another world: a chamber lit by filtered green light from stained glass windows, where two cenotaphs (symbolic tombs) rest beneath a cedar ceiling carved in geometric patterns. The walls are covered in zellige tilework in blues, greens, and reds, and intricate stucco work frames every surface. The intimate scale is striking—these are royal tombs, yet small and private. The hierarchy of rooms leads deeper into secret chambers where poets and soldiers of the Saadian dynasty are buried. It's less a burial place and more a spiritual journey downward into the earth, toward the afterlife.",im:"Green light from a latticed window illuminates a face carved in cedar, and shadows move across zellige tiles as time stands still.",t:"Located in the medina, south of Jemaa el-Fnaa. Small entrance fee. Often missed by tourists; less crowded than other medina sites. Open 8:30am-5:45pm. Wear modest dress. Photography allowed. Allow 1-2 hours. Guide worthwhile for context.",c:[],r:"g",nn:"قبور السعديين",ns:"مقابر ملكية فخمة",nst:"بنيت في القرن 16 بزخارف جميلة من الزليج والجص. ظلت مخفية لقرن ونصف حتى اكتشافها سنة 1917.",nt:"في المدينة القديمة. مدخل رخيص. أقل ازدحاماً من المواقع الأخرى. ارتد ملابس محتشمة."},{id:6,n:"Ben Youssef Mosque and Medersa — Medieval Learning",a:"Medina Center",v:["history","architecture","art"],d:20,s:"16th-century mosque and attached medersa (Islamic school) with a stunning courtyard and decorated rooms.",st:"The Ben Youssef Medersa was built in 1565 as a theological school where young scholars studied Islamic law and sciences. The main courtyard is an exercise in symmetry: a central fountain reflects carved cedar walls, zellige tilework, and calligraphic inscriptions from the Quran. The intricate stucco work reaches its zenith here—carved arabesques that seem to flow like water. Upstairs, student cells are austere: a small room for sleeping, studying, prayer. The ablution room has innovative plumbing for its era—channels directing water to wash hands before prayer. Non-Muslims cannot enter the adjacent mosque, but the medersa alone is worth the visit. The building embodies Islamic aesthetics: decoration everywhere, yet no human or animal figures, beauty derived from geometry and calligraphy. Scholars sat here 400 years ago debating theology in these very courtyards.",im:"A student's cell opens onto the courtyard, where afternoon light illuminates carved wood and the sound of water echoing off stone.",t:"Located north of Jemaa el-Fnaa in the medina. Open 9am-5pm (7pm in summer). Moderate entrance fee. Allow 1-2 hours. Photography excellent. A guide adds scholarly context. Less crowded early morning.",c:[],r:"g",nn:"مسجد ومدرسة بن يوسف",ns:"مدرسة إسلامية عريقة",nst:"بنيت سنة 1565 لتعليم الطلاب الشريعة والعلوم. فناء جميل بزخارف زليج.",nt:"شمال الساحة. استأجر دليلاً. التصوير رائع. الصباح الباكر أقل ازدحاماً."},{id:7,n:"Souk Medina — Textiles and Spices Labyrinth",a:"Medina Center",v:["local","food","hidden"],d:25,s:"Sprawling medieval marketplace with dozens of interconnected souks selling carpets, leather, spices, and goods.",st:"The souk is not a single market but a network of neighborhoods, each specialized: the souk of berber carpets, the souk of leather, the souk of spices. Walking the narrow covered streets, your senses overload—turmeric yellows every surface, leather tanneries emit pungent aromas, and merchants call out in Darija from stalls hung with textiles. Unlike Khan el-Khalili's tourist orientation, Marrakech's souk still primarily serves locals: working-class women buy fabric, men purchase tools and hardware, spice merchants negotiate with restaurant owners. The architecture is medieval: wooden beams cross the narrow streets; natural light filters through gaps, creating a starry effect on the stone below. The souk has no map—navigation is intuitive or lucky. Haggling is expected; merchants treat negotiation as theater. A good carpet can take 30 minutes to discuss before price is set.",im:"Shafts of amber light cut through dust and steam from a tea vendor's kettle, illuminating hanging leather babouches (slippers) in a thousand colors.",t:"Accessible from Jemaa el-Fnaa or north gate of medina. Best explored in late morning (not too crowded, not yet midday heat). Wear comfortable shoes; plan to wander 2-3 hours. Bring cash; many vendors are cash-only. Agree on prices before purchase.",c:[],r:"g",nn:"سوق المدينة",ns:"سوق تاريخي كبير",nst:"شبكة من الأسواق المتخصصة: السجاد والجلود والتوابل. يخدم السكان المحليين بشكل أساسي.",nt:"لا خريطة؛ التنقل بالحدس. ارتد أحذية مريحة. استعد للمساومة. كن مستعداً لقضاء ساعات."},{id:8,n:"Riad Stays — Traditional Courtyard Homes",a:"Medina Center",v:["local","architecture","beautiful"],d:20,s:"Traditional Moroccan homes with interior courtyards, now many converted to guesthouses, offering intimate stays.",st:"A riad is the DNA of Moroccan domestic life: a rectangular home built around a central courtyard (riad means garden). The exterior is blank—merely a door in the street—but inside, it's a sanctuary. Courtyards are open to the sky, often containing fountains and plants. Rooms face inward; windows overlook the courtyard, not the street. This design dates to centuries of conflict: homes were built defensively, with walls toward the world and openness toward family. Today, many riads have been converted to boutique hotels; staying in one is cultural immersion. You sleep to the sound of the fountain, wake to light filtering through latticed windows, and share meals in the courtyard with travelers. The riads vary: some are luxurious, with marble and modern bathrooms; others are simpler, more authentic. The experience is the same: you're living as Moroccans have for generations.",im:"A traveler sits in a riad courtyard at dawn, the only sound the fountain's splash, and feels for a moment that time has stopped.",t:"Hundreds of riads throughout the medina offer stays. Book online in advance; walk-ins available. Price ranges from budget to luxury. Breakfast typically included. Many are difficult to locate (by design); confirm directions with owner beforehand. Wifi varies. Noise from street can penetrate.",c:[],r:"g",nn:"الرياض (منازل تقليدية)",ns:"منازل مغربية تقليدية",nst:"تصميم تقليدي حول فناء مركزي. كثير منها تحول إلى فنادق بوتيك. النوم فيها تجربة ثقافية حقيقية.",nt:"احجز مسبقاً. التوجيهات قد تكون معقدة. اسأل صاحب الرياد عن المسار الأفضل."},{id:9,n:"Menara Gardens — Atlas Views and Royal Relaxation",a:"New Town",v:["nature","views","beautiful"],d:20,s:"Large landscaped gardens at the foot of the Atlas Mountains with an iconic pavilion and reflecting pool.",st:"The Menara Gardens are less intimate than Majorelle but grander in scope. Created in the 12th century, they occupy 40 hectares near the foot of the snow-capped Atlas Mountains. An olive orchard dominates the landscape; in spring, the blossoms are white drifts against green. The famous pavilion sits at the center—a small palace-like structure reflected in a large pool of water. The effect is serene: the mountains loom in the distance; the water mirrors sky, pavilion, and peaks. Locals come here to relax, stroll, and find relief from the medina's chaos. The gardens are named for the 'menara' (lantern-like roof)—a clever ventilation system that kept the pavilion cool before electricity. Walking the paths at sunset, with the Atlas glowing orange and the pool reflecting the last light, is quintessential Marrakech romance.",im:"The Atlas Mountains turn violet as sunset approaches, reflected in still water where the pavilion sits like a jewel.",t:"Located south of the new town, easily reached by taxi or bicycle. Open 8am-sunset. Minimal entrance fee. Allow 1-2 hours to walk the grounds. Best visited late afternoon for light and temperature. The pavilion interior is small but photogenic. Cafés nearby serve mint tea.",c:[],r:"g",nn:"حدائق منارة",ns:"حدائق كبيرة مع إطلالات جبلية",nst:"حديقة كبيرة من القرن 12 بأشجار زيتون وبركة ماء. إطلالات جميلة على جبال الأطلس.",nt:"استأجر تاكسي. المدخل رخيص جداً. المساء أفضل للصور. احضر قبعة من الشمس."},{id:10,n:"Hammam (Turkish Bath) — Ritual Cleansing",a:"Medina Center",v:["local","hidden","food"],d:10,s:"Traditional Moroccan steam bath, gender-segregated, offering scrubbing and relaxation in ancient heated rooms.",st:"A hammam is more than a bath; it's a ritual that Moroccans have practiced for centuries. The process: undress in a cool outer room, move to a steam room where heat builds, then a scrubber attacks your skin with a coarse mitt, removing dead cells and toxins. It's initially uncomfortable—the scrubber shows no mercy—but incredibly invigorating. The final room is cool; you rinse and emerge new. Gender segregation is strict: women's hours differ from men's. Tourist-friendly hammams are becoming available, though traditional ones are preferable for authenticity. The cost is minimal (5-10 dirhams). The experience is communal; locals gather, socialize, and share gossip while bathing. It's quintessentially Moroccan—a space where modesty and nudity coexist, where strangers become family through the shared vulnerability of being scrubbed clean.",im:"Steam rises from the ground; a woman pours hot water over herself while her friend lies on heated stone, gossiping in Darija.",t:"Hammams are throughout the medina and new town. Ask your riad owner or hotel for nearby options. Check gender-specific hours. Bring flip-flops, a towel, and soap. Have small change. Allow 1-2 hours. Bring a friend for reassurance if first time. It's intense but transformative.",c:[],r:"g",nn:"الحمام المغربي",ns:"حمام بخار تقليدي",nst:"طقس تقليدي مغربي. ساخن جداً ثم برد. مقسم حسب النوع. الكلفة رخيصة جداً.",nt:"اطلب من صاحب الرياد. احضر شبشب وفوطة. تجربة غريبة لكن تجديدية جداً."},{id:11,n:"Kasbah of Aït Benhaddou (Day Trip) — Berber Fortress-Town",a:"Day Trips",v:["history","architecture","hidden"],d:45,s:"UNESCO-listed fortified village 30km south, with mud-brick kasbahs cascading down hillsides.",st:"Aït Benhaddou is a kasbah—a fortified compound of mud-brick buildings clustered on a hillside. Built as a stopping point on Saharan trade routes, it's constructed entirely from earth: walls, towers, gates, all compressed earth and straw. The kasbah rises in tiers, towers punctuating the skyline. Walking the narrow streets, the architecture feels organic—less built than grown. Some buildings date to the 17th century; others were rebuilt recently (tourists and film crews have accelerated restoration). The views from the top are stunning: the valley spreads below; the Atlas rises beyond; the emptiness of the Sahara feels close. Many UNESCO World Heritage sites are overwrought; Aït Benhaddou retains its authenticity—you're truly walking through how people lived before modernity. The UNESCO designation has brought tourist infrastructure, but the core remains Berber in spirit.",im:"Mud-brick towers are silhouetted against afternoon light, and a child appears on a roof to wave, reminding you that people still live here.",t:"Located 30km south, 45 minutes by car. Organized tours from Marrakech are available; alternatively, hire a car and driver. Allow 3-4 hours for the visit. The descent is steep and slippery. Wear good shoes. Local guides available on-site. Best morning light for photography.",c:[],r:"g",nn:"قصبة آيت بنحدو",ns:"قصبة برازل قديمة",nst:"قرية محصنة على بعد 30 كم. بنيت من الطين والتراب. موقع تراث عالمي. سكانها الأمازيغ التقليديون.",nt:"رحلة نصف يومية. استأجر سيارة وسائق. ارتد أحذية قوية. الصباح أفضل للصور."},{id:12,n:"Ourika Valley (Day Trip) — Mountains, Berber Villages, and Waterfalls",a:"Day Trips",v:["nature","hidden","local"],d:40,s:"Valley in the Atlas Mountains with Berber villages, hiking, and waterfalls, one hour south of Marrakech.",st:"The Ourika Valley is where Marrakech residents escape on weekends. An hour south by car, the valley unfolds with dramatically steep cliffs, emerald villages clinging to mountainsides, and the Ourika River running through it all. The villages are fully Berber—locals speak Tamazight more than Arabic or French. Many offer homestays and simple restaurants. Walking trails crisscross the valley; hiking to waterfalls is a popular half-day excursion. The highest waterfall is a 30-meter cascade in summer (reduced in dry season). The landscape shifts: arid foothills give way to lush valleys with pomegranate and walnut orchards. The Berber culture here is less touristic than in Marrakech—you feel you're witnessing rather than consuming culture. A local guide is invaluable, translating and introducing you to families. Many visitors spend a night in the valley, finding the silence and mountain air restorative.",im:"A Berber woman in traditional dress tends a garden while her children play, and the Atlas rises behind in layers of purple and brown.",t:"Located one hour south by car. Organized tours available from Marrakech; many include lunch. Alternatively, hire a car and driver. Hiking trails are well-marked but can be steep. Wear good shoes and bring water. Allow 4-6 hours for a valley visit and hike.",c:[],r:"g",nn:"وادي أوريكة",ns:"وادٍ جبلي جميل",nst:"وادٍ ساحر على بعد ساعة من مراكش. قرى أمازيغية تقليدية وشلالات جميلة.",nt:"رحلة نصف يومية. استأجر سيارة. استكشف القرى الأمازيغية. الماء متوفر في الشلالات."},{id:13,n:"Medina Walls and Gates — Defensive Perimeter",a:"Medina Center",v:["history","architecture","hidden"],d:15,s:"12km of reddish clay walls surrounding the medina, built in the 12th century, with historic gates.",st:"The medina is surrounded by walls that give Marrakech its distinctive red color—mud-brick mixed with earth and straw. These walls were built in 1146 by the Almohad Almoravid dynasty as defensive barriers; they still encircle the ancient quarter. The gates (babs) are monumental: Bab Agnaou is ornately carved; Bab Marrakech is simpler but massive. Walking the walls (partly paved as a rampart path) offers views inward to the medina's tangle and outward to modern Marrakech beyond. The walls are nearly a thousand years old, yet functional—goods enter and exit through the gates daily. In places, the walls crumble; in others, they've been restored to pristine condition. Walking them gives a sense of the medina's containment and isolation before modern transportation dismantled the need for fortifications.",im:"Sunset light turns the red clay walls golden, and silhouettes move along the ramparts—locals on scooters and tourists on foot.",t:"The walls are accessible at several points; the best rampart walk is north of the medina. Most gates are open; some have attendants. Photography is excellent. Allow 1-2 hours for a partial walk. The walls are not heavily touristed; few vendors. Bring water.",c:[],r:"g",nn:"أسوار المدينة",ns:"جدران حمراء حول المدينة القديمة",nst:"جدران من الطين الأحمر بني في القرن 12. تحيط بالمدينة القديمة. هناك عدة بوابات تاريخية.",nt:"التمشية على الجدران جميلة عند الغروب. احضر الماء. قليل من الزوار هنا."},{id:14,n:"Palais Bahia (Second Part) — Harem Chambers",a:"Medina Center",v:["history","architecture","hidden"],d:20,s:"Lesser-known sections of the Bahia Palace with private chambers and gardens designed for royal women.",st:"Beyond the main palace, Bahia continues into private residential sections rarely explored by tourists. These chambers were the harem—the private quarters of the sultan's wives, concubines, and female family members. The rooms are smaller, more intimate than public spaces, designed for comfort rather than ceremony. Tilework is still exquisite but less grandiose. Some chambers contain private baths with ingenious heating systems. The gardens are sequestered, accessible only to females of the household. Walking these rooms, the palace's hierarchy becomes clear: public display in grand courtyards, private comfort in hidden chambers. It's a window into a social structure few outsiders see. The chambers reveal that royal women, though confined to private space, lived in extraordinary beauty and comfort.",im:"A private chamber overlooks a hidden garden where jasmine blooms; a woman sits alone with her servant, engaged in private conversation.",t:"Part of the main Bahia Palace complex but less frequently visited. Entrance fee covers both sections. Allow extra time if exploring harem quarters. A guide is essential for context about women's lives. Photography excellent.",c:[],r:"g",nn:"قسم الحريم من قصر الباهية",ns:"أجزاء خاصة من القصر",nst:"الأجنحة الخاصة بالنساء الملكيات. أصغر وأكثر خصوصية من الأجزاء العامة.",nt:"جزء من نفس الجولة. استأجر دليلاً لفهم حياة النساء الملكيات."},{id:15,n:"Marrakech Food Markets — Fruits, Vegetables, and Fresh Finds",a:"Medina Center",v:["food","local","hidden"],d:10,s:"Morning markets where vendors sell fresh produce, herbs, nuts, and prepared food for local consumption.",st:"Beyond the tourist-facing souks, Marrakech has working markets where locals buy daily provisions. The fruit market near Jemaa el-Fnaa is a riot of color: piles of oranges, pomegranates, apricots depending on season; dates in twenty varieties. The vegetable market has fragrant mountains of herbs: mint, cilantro, parsley. The nut and spice section is hypnotic—almonds, pistachios, sesame, and spices in textures and colors. Small stalls sell prepared food: tajines, couscous, salads made hours prior, sold by weight to working-class Moroccans. The vibe is entirely local; tourists are uncommon. Vendors are friendly but businesslike—they're not there to perform but to sell. Prices are cheaper than tourist restaurants, and the food is unambiguously authentic. A morning in these markets is cultural immersion of the realest kind.",im:"A vendor arranges pyramids of cinnamon-dusted oranges while a woman in a blue galabiya examines herbs with the intensity of an alchemist.",t:"Markets are busiest in early morning (6-9am). Located throughout the medina; ask locals for directions. Mostly cash transactions. Pick-pockets exist; be aware. Vendors may avoid English; bring a phrasebook or go with a guide. Allow 1-2 hours for browsing and shopping.",c:[],r:"g",nn:"أسواق الفواكه والخضار",ns:"أسواق محلية للمنتجات الطازجة",nst:"أسواق حقيقية للسكان المحليين. فواكه وخضار وتوابل طازجة. الأسعار رخيصة.",nt:"اذهب في الصباح الباكر. احذر من النشالين. كن محترماً. التصوير قد لا يكون مرحباً به."},{id:16,n:"Tanoura Show (Sufi Dervish Dance) — Spiritual Whirling",a:"Medina Center",v:["local","art","history"],d:15,s:"Evening performance of traditional Sufi whirling dervish dance, performed nightly in restaurants near Jemaa el-Fnaa.",st:"Tanoura is a folk dance rooted in Sufi spirituality, though the tourist version is more performance than prayer. Dancers in multicolored skirts spin continuously, their skirts flaring outward, creating geometric patterns. The music—drums and oud—drives the rhythm. The performance is hypnotic: the dancer's face remains serene while the body spins at dizzying speeds. There's an illusion: as the skirt accelerates, individual colors merge into white—a visual metaphor for the dissolving self in spiritual practice. Tourist shows are typically 45 minutes, performed in restaurant courtyards with dinner. Purists argue these are commercialized versions of sacred practice, which is fair; the spiritual intensity is diluted. Yet the technical skill is real, and the experience is beautiful. Many visit once; some return repeatedly, mesmerized.",im:"A dervish spins faster and faster, the camera unable to focus, the skirt becoming a blur of color, and time seems to slow.",t:"Shows are nightly, usually 9-10pm, at restaurants like Chez Ali or Palais Dar Anika. Dinner and show combined is expensive but worth it. Book in advance. Seating is tiered, giving good views. Allow 2 hours including dinner. Photography allowed.",c:[],r:"g",nn:"عرض التنورة",ns:"رقصة تقليدية صوفية",nst:"رقص دراويش صوفيين يدورون بسرعة. عرض جميل لكن سياحي من نواحٍ عديدة.",nt:"احجز مسبقاً. العشاء مدرج. اجلس في المقاعم العليا للمشهد الأفضل."},{id:17,n:"Argan Oil Cooperatives — Women's Empowerment and Products",a:"Day Trips",v:["local","hidden","food"],d:30,s:"Cooperative workshops where Berber women produce argan oil, with opportunities to learn and purchase.",st:"Argan oil is liquid gold: extracted from the argan tree, which grows only in a small region of Morocco. The process is labor-intensive: women crack open hard shells, extract kernels, and press them traditionally. Many cooperatives now welcome visitors to witness the process and purchase directly, cutting out middlemen. The women who work in cooperatives are often from rural areas; their income from argan oil sales provides economic independence. Visiting a cooperative is less tourism and more genuine commerce and cultural exchange. You'll see the work, meet the women, and understand why argan oil is expensive—the labor is immense. Many cooperatives also produce shea butter, herbal products, and beauty goods. Purchasing from cooperatives directly supports women's economic empowerment. Prices are lower than tourist shops, and quality is guaranteed.",im:"A woman in traditional dress sits before a wooden press, cracking argan nuts with steady rhythm, the kernel dust coating her hands.",t:"Located in small villages south of Marrakech, particularly around Essaouira direction. Organized tours are available; alternatively, hire a car and driver. Allow 2-3 hours including demonstration and shopping. Bring cash. Prices are negotiable. Many cooperatives will show you production processes.",c:[],r:"g",nn:"تعاونيات زيت الأرغان",ns:"مراكز إنتاج زيت الأرغان",nst:"نساء بربريات ينتجن زيت الأرغان النفيس. القيمة مرتفعة لأن العملية يدوية متعبة.",nt:"في القرى خارج مراكش. استأجر سيارة. شاهد العملية. اشتري مباشرة من النساء."},{id:18,n:"Jebel Toubkal (Multi-Day Trek) — North Africa's Highest Peak",a:"Day Trips",v:["nature","views","hidden"],d:180,s:"2-3 day trek to North Africa's highest mountain (4,167m) with stunning Atlas views and Berber guesthouses.",st:"Jebel Toubkal is a serious mountain but technically non-technical; climbers need fitness more than climbing skill. A typical trek involves starting in Imlil village (1.5 hours from Marrakech), trekking upward through Berber villages and alpine meadows on day one, sleeping at a mountain refuge, and summiting on day two. The views from the top are breathtaking: you can see all the way to the Sahara on clear days, and the Atlas spreads below in folds of brown and white. The descent is fast; most people return to Imlil by afternoon day two. Guides are essential; they navigate, provide cultural context, and support trekkers. Mountain refuges are basic: dormitory rooms, communal dinners, lots of other trekkers. The trek is popular but not overcrowded; the effort required keeps casual hikers away. Many do the trek to say they've climbed North Africa's highest peak; most find the experience itself—the trek, the people, the landscape—more valuable than the summit.",im:"At sunrise from the summit, you stand above clouds, and Africa stretches below in every direction.",t:"Requires 2-3 days. Organized treks from Marrakech are available; guides, food, refuge accommodation all included. Alternatively, independent trekking with hired guide. Start early in day for acclimatization. Bring warm layers; high altitude means temperature drops. No supplies on mountain except at refuge.",c:[],r:"g",nn:"جبل توبكال",ns:"أعلى جبل في شمال أفريقيا",nst:"رحلة تسلق لمدة يومين أو ثلاثة. 4167 متر عالياً. إطلالات مذهلة على الصحراء والأطلس.",nt:"استأجر دليلاً. احضر طبقات دافئة. لا مجهود تقني لكن يحتاج لياقة بدنية."},{id:19,n:"Essaouira (Beach Town Day Trip) — Ocean Breeze and Fresh Fish",a:"Day Trips",v:["nature","food","hidden"],d:60,s:"Coastal town 2.5 hours west with beaches, fresh seafood, and windsurfing, less touristy than beach resorts.",st:"Essaouira is Morocco's coastal alternative to Marrakech. Built by the Portuguese, later French-influenced, it has a colonial charm distinct from Moroccan interior towns. The medina is open and airy compared to Marrakech's claustrophobic alleys; blue fishing boats dot the harbor; fresh fish markets sell tuna, sardines, and grouper. The beach is wide, windy, and popular with kitesurfers. The harbor has excellent fresh seafood restaurants where you select your fish and watch it grilled before you. The town is less intensely touristic than Marrakech but increasingly popular; it's finding a balance between tourism and authenticity. The three-hour drive west crosses dramatic landscape: mountains give way to coastal plains. Many visit Essaouira for a day, returning to Marrakech in evening; others stay overnight, enjoying the ocean breeze and pace change.",im:"Blue fishing boats sit in the harbor as fishermen mend nets, and the smell of grilled fish fills the air above the Atlantic crash.",t:"Located 2.5 hours west by car or shared bus. Organized tours from Marrakech available; alternatively hire a car. Best to visit early morning for fresh fish markets. The beach is beautiful but cold (Atlantic water). Windsurfing schools available. Allow 8-10 hours for a day trip.",c:[],r:"g",nn:"الصويرة",ns:"مدينة ساحلية جميلة",nst:"مدينة على الساحل بـ 2.5 ساعة غرباً. ميناء جميل وأسماك طازة وشاطئ رملي.",nt:"رحلة يومية من مراكش. السمك الطازج في السوق. الشاطئ جميل لكن الماء بارد."},{id:20,n:"Clothing and Textile Workshops — Berber Weaving",a:"Medina Center",v:["local","art","hidden"],d:15,s:"Workshops where Berber women weave carpets and textiles on traditional looms, with some offering visitors participation.",st:"Traditional Moroccan carpets are woven by hand on vertical looms, a process unchanged for centuries. In various riads and workshops, you can watch (and sometimes participate in) the weaving process. Berber women work on looms strung with hundreds of knots, fingers flying across the warp, creating intricate geometric patterns. The dyes are traditionally natural—indigo for blue, cochineal for red, pomegranate for yellows. Modern workshops sometimes use synthetic dyes for speed and consistency, though traditional dyers still exist. Purchasing directly from weavers supports them far more than buying from shops or souks. Some workshops offer half-day weaving classes where tourists learn the basics of pattern and loom work—an humbling experience that reveals the skill required. The carpets are works of art; many take months to complete. A conversation with a weaver reveals not just technique but cultural values encoded in patterns.",im:"Fingers move in hypnotic rhythm across the loom, creating a pattern that has been woven by Berber women for a thousand years.",t:"Workshops are scattered throughout the medina and in surrounding villages. Ask your riad owner for recommendations. Some are genuinely cooperative; others are tourist traps. Look for weavers who seem to be actually working, not posing. Allow 1-2 hours for a visit. Purchasing direct supports the weavers.",c:[],r:"g",nn:"ورش نسج السجاد",ns:"ورش نسج البربر التقليدي",nst:"نساء بربريات ينسجن السجاد على نول تقليدي. العملية يدوية وتستغرق أشهراً.",nt:"اسأل صاحب الرياد عن الورش الحقيقية. قد تتعلم النسج بنفسك. اشترِ مباشرة من الناسجات."},{id:21,n:"Jemaa el-Fnaa at Night — The Spectacle Intensifies",a:"Medina Center",v:["local","food","night"],d:20,s:"Evening transformation of the plaza into an open-air food market with dozens of stalls and crowds.",st:"As sunset falls, Jemaa el-Fnaa transforms into an entirely different space. Daytime performers mostly depart; food vendors arrive, transforming the plaza into a massive outdoor restaurant. Dozens of stalls emerge, each offering different dishes: grilled meats, seafood, tajines, soups, desserts. The smell is overwhelming—cumin, charcoal, saffron mixing in a sensory explosion. Smoke rises from grills; crowds gather around the busiest stalls. Tables are set up, and tourists mix with locals eating dinner. The vibe is festive, almost carnival-like. Musicians still perform, but the energy shifts from daytime spectacle to nighttime sustenance. It's less performative and more genuine—this is where Marrakech eats. Health standards vary; busy stalls with high turnover are safest. The food is cheap and mostly authentic. Eating here is quintessential Marrakech experience—loud, crowded, delicious, and thoroughly alive.",im:"Smoke and steam rise from grills as a vendor hands a plate to a customer, and the plaza becomes a sea of people and food.",t:"Best from sunset (around 7pm) to midnight. Stalls operate irregularly; most popular operate consistently. Food costs 20-80 dirhams per plate. Bring cash; most stalls are cash-only. Eat where crowds are (sign of freshness). Have small change for vendors. Bring an appetite and open mind.",c:[],r:"g",nn:"ساحة جامع الفنا بالليل",ns:"الساحة تتحول إلى سوق طعام",nst:"عند الغروب، تظهر عشرات محلات الطعام. الجو احتفالي وحقيقي. الطعام رخيص وطازج.",nt:"اذهب بعد الغروب. احضر نقوداً. كل حيث الزحام (علامة على الطازة). كن مستعداً للزحام."},{id:22,n:"Dar Si Said Museum — Decorative Arts and Crafts",a:"Medina Center",v:["art","history","architecture"],d:15,s:"Palace-turned-museum showcasing Moroccan decorative arts: carpets, jewelry, metalwork, and traditional crafts.",st:"Dar Si Said is a palace converted into a museum of Moroccan applied arts. Unlike Bahia, which is grand and touristed, Dar Si Said is intimate and undervisited. The building itself is instructive: carved cedar ceilings, zellige tilework, carved plaster walls demonstrate techniques collected within. The collections include antique Berber carpets from surrounding regions, each with distinct patterns and techniques; traditional leather bindings and calligraphy from Islamic manuscripts; metalwork including brass and copper vessels; and jewelry—bracelets, necklaces, and brooches reflecting regional styles and wealth. A room is dedicated to traditional dress from various Moroccan regions, showing how climate and culture influenced textile choices. The museum is less crowded than Bahia, allowing contemplation. The craftsmanship on display is extraordinary—pieces that took months or years to create are presented without fanfare.",im:"An antique Berber carpet hangs in soft light, its geometric patterns catching the eye in an endless mathematical dance.",t:"Located south of Jemaa el-Fnaa in the medina. Open 9am-5pm (7pm in summer), closed Tuesdays. Moderate entrance fee. A guide is worthwhile. Allow 1-2 hours. Photography allowed. Less crowded than Bahia.",c:[],r:"g",nn:"دار السعيد",ns:"متحف الفنون الزخرفية",nst:"قصر محول إلى متحف. يعرض السجاد البربري والمعادن والحلي التقليدية.",nt:"أقل ازدحاماً من القصر الباهية. استأجر دليلاً. التصوير مسموح."},{id:23,n:"Day Spa and Wellness Retreats — Modern Relaxation",a:"New Town",v:["beautiful","modern","hidden"],d:20,s:"Luxury spas and wellness centers in the new town offering massages, hammams, and beauty treatments.",st:"While traditional hammams are communal and intense, modern spas offer luxurious alternatives. Scattered through the new town and upscale riads, these spas combine traditional Moroccan treatments with modern comfort: private hammam rooms, massage therapies, facials using argan oil. The difference from traditional hammams is stark: here, the scrubbing is gentle; privacy is guaranteed; and the experience is designed for relaxation rather than cleansing. Therapists are professionally trained. Many tourists find the spas more approachable than traditional hammams, particularly for first-timers nervous about the intensity. The treatments can be pricey (100-300 dirhams for massages), but they're indulgences designed for travelers seeking rest. Some spas also offer yoga and meditation classes, making them full wellness destinations.",im:"A woman lies on heated stone, soft hands massaging her shoulders while Moroccan music plays and scented steam drifts through the dim room.",t:"Located in new town and upscale riads. Book in advance, particularly for peak times. Prices higher than traditional hammams. Allow 2-3 hours for full treatments. Bring swimwear if comfortable; some offer privacy, others offer traditional gender segregation.",c:[],r:"g",nn:"منتجعات الصحة والعافية",ns:"منتجعات فاخرة للاسترخاء",nst:"مراكز حديثة توفر تدليك وحمام و مستحضرات جمال. مريحة وفاخرة.",nt:"احجز مسبقاً. أغلى من الحمام التقليدي. الخدمة احترافية وهادئة."},{id:24,n:"Tamaterte Town — Pottery and Clay",a:"Day Trips",v:["art","local","hidden"],d:30,s:"Small village 45 minutes northeast specializing in pottery, with workshops and kilns open to visitors.",st:"Tamaterte is a pottery village where potters have worked for generations, creating water vessels, cooking pots, and decorative ceramics. The clay comes from the surrounding mountains; potters form it by hand without wheels—a technique called 'hand-building.' The shapes are organic, slightly asymmetrical, more beautiful for their imperfection. Decorative patterns are incised by hand or finger-pressed. The kilns are traditional wood-fired—intense heat producing rich colors and variations. Many workshops are open to visitors; you can watch potters work and purchase directly. The pottery is cheaper here than in Marrakech's tourist shops, and you're supporting the artisans. Some workshops offer half-day pottery classes where you learn to hand-build a simple vessel—an engaging experience requiring little skill but immense patience.",im:"A potter's hands shape clay into a water vessel, fingers remembering a form passed down through his family for centuries.",t:"Located 45 minutes northeast by car. Organized tours available; alternatively hire a car and driver. Allow 3-4 hours for village visit and pottery observation. The village is small and quiet; few tourists. Pottery is heavy; consider shipping purchases.",c:[],r:"g",nn:"قرية تماتارت",ns:"قرية متخصصة في الفخار",nst:"قرية صغيرة على بعد 45 دقيقة. خزافون يصنعون الفخار بالطريقة التقليدية.",nt:"رحلة نصف يومية. استأجر سيارة. شاهد الحرفيين. اشتري مباشرة."},{id:25,n:"Tatooine (Aitbenhaddou Alternative) — Star Wars Filming Locations",a:"Day Trips",v:["hidden","modern","views"],d:60,s:"Desert film set (Star Wars, Gladiator) south of Ouarzazate, offering set tours and desert landscape.",st:"About an hour south of Ouarzazate lies a real Tatooine: the Star Wars film set, now a tourist attraction. For the 1977 original, Tunisian desert was used; for later films, Morocco became the location. The set—now partially restored as a museum—includes domed structures, corridor facades, and iconic locations where scenes were filmed. The surrounding landscape is quintessential Saharan: sand dunes, rock formations, and the emptiness that made it perfect for a fictional planet. Visitors can walk the set, climb the domed buildings, and imagine themselves in the Star Wars universe. It's touristy but harmless; the setting is genuinely compelling. The drive south through Ouarzazate, Morocco's 'Hollywood of Africa,' passes through dramatic landscape. The set tour usually includes a kasbah (fortress) visit and desert camp experience with mint tea and Saharan culture.",im:"A child stands at the cockpit of a painted Star Wars building, silhouetted against an endless desert horizon.",t:"Located near Aitbenhaddou, 1.5 hours south of Ouarzazate. Organized tours from Marrakech include transport and guide. Allow 8-10 hours for day trip. The site is outdoors; bring sun protection and water. Photography excellent.",c:[],r:"g",nn:"موقع تصوير تاتوين",ns:"موقع تصوير حرب النجوم",nst:"موقع تصوير فيلم الحرب والكلاديتر. الآن موقع سياحي. صحراء حقيقية جميلة.",nt:"جنوب ورزازات بـ ساعة ونصف. احضر حماية من الشمس. رحلة يومية كاملة."},{id:26,n:"Cooking Class in a Riad — Tagine and Couscous Mastery",a:"Medina Center",v:["food","local","art"],d:25,s:"Half-day cooking classes in riad courtyards teaching traditional Moroccan dishes with ingredients and technique.",st:"Many riads now offer cooking classes where a local chef teaches you to prepare traditional Moroccan dishes. A typical class begins at the market, selecting fresh ingredients with the chef, who explains each item's significance. Back in the riad kitchen or courtyard, you'll learn to prepare a three-course meal: a traditional Moroccan salad, a tagine (slow-cooked stew) or couscous, and a sweet dish or dessert. The instruction is patient; the chef explains technique, flavor combinations, and traditional approaches. You cook alongside the chef, hands in the action. At the end, you eat what you've prepared, often sitting in the riad's courtyard. It's cultural immersion paired with delicious food. Many travelers rank this among their most memorable Marrakech experiences: you leave with skills, recipes, and deep appreciation for Moroccan foodways.",im:"Your hands stir a pot of aromatic tagine as the chef watches approvingly, and the smell of cinnamon and cumin fills the riad courtyard.",t:"Classes offered by most riads; book in advance. Typically 3-4 hours in the morning or afternoon. Classes cost 250-400 dirhams including ingredients and meal. Some include market visits. Vegetarian options available. The instructor speaks some English; phrasebooks help. Aprons provided.",c:[],r:"g",nn:"دروس طبخ مغربي",ns:"درس طبخ في رياد",nst:"تعلم إعداد الطاجين والكسكس والحلويات المغربية. تجربة ثقافية عميقة.",nt:"احجز مسبقاً. عادة صباحاً. الكلفة معقولة. تجربة لا تُنسى."},{id:27,n:"Camel Trekking in Merzouga (Multi-Day) — Sahara Desert Experience",a:"Day Trips",v:["nature","adventure","hidden"],d:240,s:"2-3 day camel trek in the Sahara desert with overnight in a Berber camp, departing from Merzouga village.",st:"The Merzouga desert is the real Sahara—a sea of sand dunes with nothing for miles in any direction. A typical trek involves driving from Marrakech to Merzouga (7-8 hours), spending the first night in a riad or hotel, then departing early morning on camel. You ride across dunes; the camel's motion is hypnotic. At midday, you rest in the shade; guides prepare a simple lunch. In late afternoon, you reach a Berber camp where you'll sleep in a traditional tent. Dinner is prepared over a fire; storytelling and music follow. You sleep on a mat under stars—the Milky Way is visible with stunning clarity. The next morning, you wake before sunrise, climb a dune to watch dawn, then return to the camp for breakfast. By afternoon, you're departing on camel back. The entire experience is surreal: the isolation, the vastness, the pace—everything is stripped away except the essential.",im:"Under a star-filled sky, you lie on a mat in a Berber tent, and the weight of centuries and solitude presses down on you like a blessing.",t:"Requires 2-3 days minimum. Organized treks from Marrakech include transport, camel rental, guide, food, and tent accommodation. Very popular; book in advance. The drive is long but scenic. Camel riding is uncomfortable for first-timers; expect soreness. Bring sun protection, hat, and warm layers (desert gets cold at night). The experience is life-changing for most.",c:[],r:"g",nn:"ركوب الجمال في مرزوقة",ns:"رحلة صحراوية بالجمل",nst:"رحلة لمدة يومين أو ثلاثة في الصحراء. نوم في خيمة بربرية تحت النجوم.",nt:"احجز مسبقاً. رحلة طويلة لكن جميلة. تجربة لا تُنسى حقاً."},{id:28,n:"Modern Marrakech (Art Galleries and Boutiques) — Contemporary Scene",a:"New Town",v:["art","modern","hidden"],d:15,s:"Galleries and boutique shops in the new town showcasing contemporary Moroccan art, design, and fashion.",st:"Beyond the medina's ancient traditions, modern Marrakech has emerged as an artistic and design destination. Contemporary art galleries display works by Moroccan and African artists. Boutique shops feature high-end Moroccan design: updated textiles, innovative leather goods, jewelry combining traditional and modern aesthetics. The new town has a different vibe from the medina: open streets, fewer crowds, quieter pace. The artistic scene is growing: galleries host openings, designers collaborate on collections, and young Moroccans are reinterpreting tradition through modern lenses. This Marrakech is less touristic, more reflective of how the city is evolving. Many visitors spend all their time in the medina and miss this entirely; those who venture into the new town find a Marrakech imagining its future.",im:"A minimalist gallery displays a painting merging traditional Berber patterns with abstract expressionism—East meeting West.",t:"Located in the new town, northwest of medina. Accessible by taxi or on foot from central areas. Allow 2-3 hours to browse galleries and shops. Many close midday for lunch. Cafés and restaurants in the area are excellent. Much less touristy than medina.",c:[],r:"g",nn:"مراكش الحديثة",ns:"معارض فن حديث",nst:"معارض وأكوام تعرض فن مغربي معاصر. تصميم وموضة حديثة.",nt:"في المدينة الحديثة. أقل ازدحاماً من المدينة القديمة. تكتشف مراكش المستقبل."},{id:29,n:"Anima Garden — Jean Clow's Private Garden Paradise",a:"Day Trips",v:["nature","beautiful","hidden"],d:45,s:"Private garden project of artist Jean Clow, 40km south, featuring sculptural gardens and philosophical spaces.",st:"Anima Garden is the vision of a single man: artist Jean Clow created this 32-hectare garden south of Marrakech as his life's work. Unlike Majorelle (which is designed), Anima is organic—paths wind through plants and sculptures seemingly emerging from wilderness. Clow's artwork—bronze sculptures, installations, and painted stones—are scattered throughout. The garden evolves seasonally; the artist is still active, still modifying the space. It's less polished than Majorelle but more philosophical—a meditation on art, nature, and the artist's relationship to landscape. The garden includes a library, studio, and contemplative spaces. Visiting requires hiring a car (it's remote), but the journey is worthwhile for artists, designers, or anyone seeking beauty outside tourist frameworks. The garden feels like stepping into an artist's dream—which, essentially, it is.",im:"A bronze sculpture of a reclining figure overlooks a garden of wild plants, and you understand that this is one man's vision made manifest.",t:"Located 40km south, near Imin'Tanout. Difficult to reach without a car and driver; organized tours are available. Allow 4-5 hours including drive. Open by appointment primarily; call ahead. Photography allowed. Most visit as a full-day excursion.",c:[],r:"g",nn:"حديقة أنيما",ns:"حديقة فنية خاصة",nst:"حديقة شخصية لفنان جان كلو. 32 هكتار من الطبيعة والفن.",nt:"استأجر سيارة. حوالي ساعة من مراكش. اتصل مقدماً. تجربة حقاً فريدة."},{id:30,n:"Sunset from High Atlas Peaks — Mountain Sanctuary",a:"Day Trips",v:["nature","views","beautiful"],d:30,s:"Drive to high altitudes in the Atlas Mountains for sunset, returning under stars, with breathtaking vistas.",st:"An afternoon drive into the Atlas Mountains to high altitude (1,800-2,000m) offers a completely different Marrakech experience. The landscape shifts from arid foothills to pine forests to rocky peaks. At a viewpoint overlooking the Marrakech plain below, you're positioned between the city and the Sahara—the curvature of the earth seems visible. As sunset approaches, the light transforms: the plain becomes golden, then rose, then purple. The sky ignites in colors that seem impossible. From this height, Marrakech is a collection of lights far below; the vastness of the landscape becomes apparent. Some drives continue higher, to ski station-level altitude (3,000m), where snow is possible even in spring. The return drive descends through darkness, the lights of Marrakech growing closer like a promise of the city below.",im:"The plain glows rose-gold beneath you, the Atlas rises purple to the south, and the Sahara stretches endlessly beyond.",t:"Organized sunset drives are available from Marrakech, typically 4-5 hours. Alternatively, hire a car and driver. Bring warm layers; altitude means temperature drops sharply. The drive is scenic; camera work excellent. Return is after dark; ensure a responsible driver.",c:[],r:"g",nn:"غروب من ذرى الأطلس",ns:"رحلة جبلية للغروب",nst:"رحلة لرؤية الغروب من الجبال العالية. إطلالات لا تُنسى على السهول والصحراء.",nt:"احضر طبقات دافئة. أفضل في المساء. المنظر مذهل."},{id:31,n:"برج حديقة سرية — أعلى إطلالة مجانية في المدينة",s:"حديقة سرية في قلب المدينة مع برج يرتفع فوق الأسطح الحمراء.",a:"121 Rue Mouassine, Medina, Marrakesh 40030",st:"تسلقت البرج في يوم صافٍ ورأيت كيف تتدفق الحياة بين الأزقة الضيقة، مع أبراج المآذن تبرز كالأصابع في السماء. كان الرياح تهمس بقصص القرون الماضية بينما أشرب شاياً ساخناً.",im:"رياح دافئة تحمل رائحة التوابل من الأسواق البعيدة.",t:"ادخل من الباب الجانبي قبل الظهيرة لتجنب الزحام، واصعد الدرج الضيق ببطء.",nst:"تسلقت البرج في يوم صافٍ ورأيت كيف تتدفق الحياة بين الأزقة الضيقة، مع أبراج المآذن تبرز كالأصابع في السماء. كان الرياح تهمس بقصص القرون الماضية بينما أشرب شاياً ساخناً.",nt:"ادخل من الباب الجانبي قبل الظهيرة لتجنب الزحام، واصعد الدرج الضيق ببطء.",v:["hidden"],r:"g",d:30,c:[],nn:"برج حديقة سرية — أعلى إطلالة مجانية في المدينة",ns:"حديقة سرية في قلب المدينة مع برج يرتفع فوق الأسطح الحمراء."},{id:32,n:"أسوار المدينة — إطلالة مجانية على المدينة القديمة",s:"مشي على الأسوار الحمراء الطينية حول المدينة القديمة لإطلالات مرتفعة.",a:"أسوار المدينة القديمة، مفتوحة 24 ساعة",st:"مشيت ساعة كاملة على الأسوار قرب باب الخميس، أشاهد الأطفال يلعبون والنساء يجففن الغسيل على الأسطح. الشمس تغرب خلف الأطلس تلوّن الجدران بلون برتقالي مذهل.",im:"صوت خطواتي يتردد على الحجر الدافئ مع ريح خفيفة.",t:"ابدأ من باب العلوج جنوباً في الصباح الباكر، ارتدِ حذاء مريح.",nst:"مشيت ساعة كاملة على الأسوار قرب باب الخميس، أشاهد الأطفال يلعبون والنساء يجففن الغسيل على الأسطح. الشمس تغرب خلف الأطلس تلوّن الجدران بلون برتقالي مذهل.",nt:"ابدأ من باب العلوج جنوباً في الصباح الباكر، ارتدِ حذاء مريح.",v:["hidden"],r:"g",d:30,c:[],nn:"أسوار المدينة — إطلالة مجانية على المدينة القديمة",ns:"مشي على الأسوار الحمراء الطينية حول المدينة القديمة لإطلالات مرتفعة."},{id:33,n:"دار الصور — متحف مجاني مع تراس بانورامي",s:"متحف صور تاريخية في رياض قديم مع تراس لإطلالة على المدينة.",a:"شمال المدينة القديمة، Dar Cherifa Lakbir",st:"جلست على التراس بعد رؤية صور مراكش القديمة، أتذوق عصير برتقال طازج مع إطلالة على أسطح المدينة. يشعرك بالزمن الذي توقف.",im:"طعم حلو للعصير يختلط برائحة الياسمين.",t:"زر يوم الثلاثاء بعد الظهر، اطلب سلطة محلية على التراس.",nst:"جلست على التراس بعد رؤية صور مراكش القديمة، أتذوق عصير برتقال طازج مع إطلالة على أسطح المدينة. يشعرك بالزمن الذي توقف.",nt:"زر يوم الثلاثاء بعد الظهر، اطلب سلطة محلية على التراس.",v:["hidden"],r:"g",d:30,c:[],nn:"دار الصور — متحف مجاني مع تراس بانورامي",ns:"متحف صور تاريخية في رياض قديم مع تراس لإطلالة على المدينة."},{id:34,n:"كافيه أتاي — تراس مخفي للإطلالة على الأطلس",s:"مقهى تراس في المدينة مع إطلالة رائعة على المدينة والجبال.",a:"شمال المدينة، قرب دار الصور",st:"وصلت باكراً وطلبت شاي نعناع ساخن، شاهدت المدينة تستيقظ تحت ضوء الصباح مع قمم الأطلس تتلألأ. أفضل مكان للاسترخاء بميزانية.",im:"شاي نعناع حار يدفئ الحلق مع نسيم جبلي.",t:"احجز طاولة قبل الساعة 10 صباحاً، جرب الكسكس النباتي.",nst:"وصلت باكراً وطلبت شاي نعناع ساخن، شاهدت المدينة تستيقظ تحت ضوء الصباح مع قمم الأطلس تتلألأ. أفضل مكان للاسترخاء بميزانية.",nt:"احجز طاولة قبل الساعة 10 صباحاً، جرب الكسكس النباتي.",v:["hidden"],r:"g",d:30,c:[],nn:"كافيه أتاي — تراس مخفي للإطلالة على الأطلس",ns:"مقهى تراس في المدينة مع إطلالة رائعة على المدينة والجبال."},{id:35,n:"حافلة رقم 11 — طريق بانورامي إلى حدائق منارة",s:"حافلة محلية تربط وسط المدينة بحدائق منارة مروراً بالأسوار.",a:"من محطة الحافلات في باب الدوب قرب الجامع الكبير إلى منارة",st:"ركبت الحافلة 11 من باب الدوب ورأيت الأحياء الشعبية والأسوار الحمراء تمر بجانبي بسرعة بطيئة. توقفت في منارة لنزهة مجانية.",im:"غبار خفيف ورائحة الخبز الطازج من النوافذ.",t:"ادفع 5 دراهم نقداً للسائق، اجلس على الجانب الأيمن للإطلالة.",nst:"ركبت الحافلة 11 من باب الدوب ورأيت الأحياء الشعبية والأسوار الحمراء تمر بجانبي بسرعة بطيئة. توقفت في منارة لنزهة مجانية.",nt:"ادفع 5 دراهم نقداً للسائق، اجلس على الجانب الأيمن للإطلالة.",v:["hidden"],r:"g",d:30,c:[],nn:"حافلة رقم 11 — طريق بانورامي إلى حدائق منارة",ns:"حافلة محلية تربط وسط المدينة بحدائق منارة مروراً بالأسوار."},{id:36,n:"حافلة رقم 8 — طريق ساحلي عبر الحدائق الخضراء",s:"حافلة تمر بالمناطق الخضراء والأسوار باتجاه الضواحي.",a:"من ساحة جامع الفنا إلى أطراف المدينة الغربية",st:"استقليت الـ8 من الساحة ورأيت الحدائق الخضراء والنخيل يمر بسرعة، مع توقفات في أحياء هادئة بعيدة عن السياح.",im:"صوت المحرك يختلط بغناء العصافير في الحدائق.",t:"خذ الرحلة كاملة ذهاباً وإياباً مقابل 4 دراهم، انزل في آخر محطة.",nst:"استقليت الـ8 من الساحة ورأيت الحدائق الخضراء والنخيل يمر بسرعة، مع توقفات في أحياء هادئة بعيدة عن السياح.",nt:"خذ الرحلة كاملة ذهاباً وإياباً مقابل 4 دراهم، انزل في آخر محطة.",v:["hidden"],r:"g",d:30,c:[],nn:"حافلة رقم 8 — طريق ساحلي عبر الحدائق الخضراء",ns:"حافلة تمر بالمناطق الخضراء والأسوار باتجاه الضواحي."},{id:37,n:"حديقة سايف — حديقة مجانية هادئة قرب الجامع",s:"حديقة عامة خضراء مع أشجار ومقاعد في قلب المدينة.",a:"Rue Sidi Sayf, Medina",st:"جلست تحت شجرة زيتون كبيرة أشاهد العائلات يتجمعون، بعيداً عن صخب الساحة بـ5 دقائق فقط. مثالية للراحة.",im:"ظل بارد وصوت ماء نافورة هادئ.",t:"تعال بعد الصلاة الظهرية، اشترِ ماء جوز الهند من البائع.",nst:"جلست تحت شجرة زيتون كبيرة أشاهد العائلات يتجمعون، بعيداً عن صخب الساحة بـ5 دقائق فقط. مثالية للراحة.",nt:"تعال بعد الصلاة الظهرية، اشترِ ماء جوز الهند من البائع.",v:["hidden"],r:"g",d:30,c:[],nn:"حديقة سايف — حديقة مجانية هادئة قرب الجامع",ns:"حديقة عامة خضراء مع أشجار ومقاعد في قلب المدينة."},{id:38,n:"سوق الخميس — سوق شعبي مجاني صباحي",s:"سوق محلي للخضار والفواكه والتوابل في حي شعبي.",a:"حي الخميس، Medina",st:"تجولت بين الباعة المحليين الذين ينادون بصوت عالٍ، جربت تمر مجاناً وسمعت قصصهم عن الموسم.",im:"رائحة البرتقال الطازج تملأ الهواء.",t:"اذهب الساعة 8 صباحاً لأفضل الأسعار، خذ كيس قماش.",nst:"تجولت بين الباعة المحليين الذين ينادون بصوت عالٍ، جربت تمر مجاناً وسمعت قصصهم عن الموسم.",nt:"اذهب الساعة 8 صباحاً لأفضل الأسعار، خذ كيس قماش.",v:["hidden"],r:"g",d:30,c:[],nn:"سوق الخميس — سوق شعبي مجاني صباحي",ns:"سوق محلي للخضار والفواكه والتوابل في حي شعبي."},{id:39,n:"Mellah — The Shaded Quarter of Memory",a:"Medina East",v:["hidden","history","quiet"],d:25,s:"Historic Jewish quarter with narrow lanes, ornate balconies, and Stars of David etched above doorways—a living museum of Marrakech's intercultural past.",st:"The Mellah was Marrakech's Jewish quarter, established in the 16th century. Walking these tight lanes, you stumble into an architectural ghost town: arched passageways no more than two meters wide, wrought-iron balconies heavy with age, doorways marked with the Star of David. The community was sizable—at its peak, thousands lived here. Now it's quieter, more introspective. The larger houses belonged to wealthy merchants; the smaller ones to artisans. Shopkeepers still work here; locals pass through daily. The air smells of cumin from nearby spice stalls and old stone. You won't see tour buses—the streets don't allow them. It's a place where Marrakech's complexity emerges: a city that held multiple worlds, multiple faiths, in close quarters.",im:"Sunlight filters through a narrow alley onto stone walls etched with Hebrew symbols, while the aroma of charcoal bread ovens drifts from workshops.",t:"Located east of Jemaa el-Fna, accessible from Bab Agnaou. Enter from the south side—it's easy to get turned around, but that's part of the charm. Best visited mid-morning before heat peaks. Bring water. Respect residents—this is a working neighborhood, not a museum.",c:[],r:"g",nn:"الملّاح — ربع اليهود التاريخي",ns:"حي تاريخي هادئ وغامر",nst:"حي يهودي قديم من القرن السادس عشر. أزقة ضيقة وشرفات منحوتة وأبواب مرسومة بنجمة داود. شاهد على تاريخ تعايش مراكش.",nt:"ادخل من الجنوب. اذهب في الصباح. لا تزعج السكان. خذ معك ماء. أنت في حي حي، لا متحف."},{id:40,n:"Bab Agnaou — The Royal Gate's Secret Garden",a:"Medina South",v:["history","beautiful","quiet"],d:20,s:"Exquisite Almohad gate carved from local stone with intricate geometric designs, marking the entrance to the Kasbah—serene compared to other city gates.",st:"Bab Agnaou is one of the medina's oldest gates, built in the 12th century by the Almohads. Unlike the more visited Bab Marrakech, it attracts few tourists. The gate itself is a lesson in medieval Moroccan craftsmanship: carved stone with intricate geometric patterns that repeat endlessly, creating an optical illusion of depth. The word 'Agnaou' refers to sub-Saharan slaves (gnaoua), reflecting Marrakech's role in the trans-Saharan trade. The gate once controlled access to the Kasbah—the royal quarter. Now it opens onto a small plaza where locals gather, children play, and the pace is unhurried. Vendors sell mint tea and hard-boiled eggs. The carved archway draws in soft light. It's a gate meant to impress, a statement of power, yet it's been absorbed into everyday life.",im:"Stone carved with infinite geometric patterns frames a quiet plaza where the call to prayer echoes off ancient walls.",t:"Located southeast of Jemaa el-Fna. Easy to reach by foot. Less crowded than other gates; visit any time. The surrounding area has small cafés selling tea and snacks. The gate itself is free to walk through and admire from both sides.",c:[],r:"g",nn:"باب أغناو — باب ملكي منحوت",ns:"بوابة ألمهادية جميلة الزخارف",nst:"بوابة من القرن الثاني عشر مزخرفة برسومات هندسية دقيقة. كانت تدخل الى القصر الملكي. هادئة مقارنة بالبوابات الأخرى.",nt:"قرب جامع الفنا. قليل السياح. شاهد من الجانبين. ادخل مجاناً. المقاهي الصغيرة حول الباب تقدم الشاي."},{id:41,n:"Dar Bellarj — Arts Sanctuary in the Hidden Riad",a:"Medina North",v:["hidden","free entry","local"],d:30,s:"Traditional riad housing a contemporary arts foundation with rotating exhibitions, rooftop views, and complimentary mint tea—Moroccan culture alive in a quiet corner.",st:"Dar Bellarj began as a sanctuary for injured storks (bellarij means storks in Darija). Now it's an arts center preserving contemporary Moroccan culture. It sits beside the Medersa Ben Youssef but feels like a secret—easy to miss if you're not looking. Inside, the traditional riad structure unfolds: a central courtyard with arches, a fountain, galleries on each side. Exhibitions rotate—sometimes photography, sometimes calligraphy, sometimes textile work. The exhibitions emphasize living tradition, not museum pieces. Locals volunteer here; a cafe on the roof serves free mint tea to visitors. The space feels genuinely Moroccan, not designed for tourists. No entry fee. The curation is thoughtful; the pace is slow. You could spend an afternoon here absorbing art, sipping tea, watching swallows circle the courtyard.",im:"Afternoon light slants across a tiled courtyard where a young artist sketches while mint steam rises from an earthenware cup.",t:"Located just north of Medersa Ben Youssef, near Souk Attarine. Follow the small signs. Free entry; donations appreciated. Open daily 10am-6pm. Bring a small cushion if sitting on the terrace bothers you. Chat with the artists—they're usually happy to explain their work.",c:[],r:"g",nn:"دار بلاريج — مركز الفن الحي",ns:"مركز ثقافي خفي بلا رسوم",nst:"ملاذ فني تقليدي يحفظ الثقافة المغربية المعاصرة. بدأ كملجأ للعناق المصابة. الآن يعرض الفن المحلي. شاي مجاني.",nt:"بجانب مدرسة بن يوسف. مجاني. افتح يومياً 10-6. تحدث مع الفنانين. جلوس في الشرفة الجميلة."},{id:42,n:"Souk Sebbaghine — The Dyers' Market in Motion",a:"Medina North",v:["local","weird","history"],d:25,s:"Working dyers' souk where yarn is colored in ancient stone vats using traditional methods—textile craftsmanship that has endured for centuries.",st:"Souk Sebbaghine is the dyers' market, tucked into a narrow corner of the medina. Here, artisans work exactly as their grandfathers did. You walk in and immediately see: large stone vats filled with boiling indigo and crimson dye, wool and yarn hanging from every surface, the smell acrid and chemical. Dyers—usually men in stained tunics—pull wet skeins from vats, wring them out, drape them to dry. The work is repetitive, muscular, unhurried. These dyers supply the entire medina with colored yarn for carpets, textiles, tapestries. It's not a museum; it's a working souk. Tourists are rare, which makes it feel authentic. You can buy dyed yarn directly, but the real draw is watching the process, understanding how color persists—understanding that every Moroccan carpet visible elsewhere in the medina was born here in these vats.",im:"Strands of indigo wool emerge from steaming vats, dripping and gleaming, while a dyer's calloused hands wring them in ancient rhythms.",t:"Located near Souk Attarine, northwest of Jemaa el-Fna. It's small and can be missed; ask locals for 'Souk Sebbaghine.' Early morning is best—dyers work before heat peaks. Don't expect English; bring a translation app. Respect the workspace; photography okay, but ask first. Bring cash if buying—small denominations.",c:[],r:"g",nn:"سوق الصباغين — سوق الصباغة التقليدي",ns:"سوق العاملين بالصباغة الحقيقي",nst:"سوق صباغة قديمة حيث يصبغ الصباغون الصوف بالألوان التقليدية في آنية حجرية عملاقة. حرفة مضت قروناً.",nt:"قرب سوق العطارين. صباحاً أفضل. لا تتوقع الإنجليزية. احترم مكان العمل. احضر نقوداً صغيرة."},{id:43,n:"Agdal Gardens — The Olive Grove's Verdant Escape",a:"South Medina",v:["quiet","free entry","beautiful"],d:30,s:"Vast 12th-century royal gardens with olive groves, reflecting pools, and cypress avenues—a peaceful counterweight to medina density.",st:"Agdal means 'wall' in Berber, and these gardens are indeed enclosed—a parallel world to the medina's chaos. Built in the 12th century by the Almohads, they sprawl across 340 hectares south of the medina walls. Walking here is walking back centuries. Olive groves stretch endlessly; irrigation channels run through them (still functioning, directing water from the Atlas mountains). Reflecting pools mirror the sky. Cypress trees line broad avenues. Locals walk here on Fridays, families picnic under shade. Few tourists venture this far. The pace is entirely different—slower, intentional, agrarian. You hear birds, water, your footsteps. The air smells of olives and damp earth. The gardens are partially fenced (some areas are reserved for maintenance), but vast sections are publicly accessible. This is Marrakech's lungs, its escape valve.",im:"An ancient olive tree casts long shadows across a path lined with cypresses, while a woman in a djellaba fills a clay jug at a fountain.",t:"South of the medina walls, accessible by foot (20-30 minute walk from Jemaa el-Fna) or petit taxi. Wear comfortable shoes and bring water—the gardens are large and exposed. Morning or late afternoon best to avoid midday heat. Entry is free. Some paths are maintained; others are rougher. A guide is helpful but not essential—locals navigate by landmarks.",c:[],r:"g",nn:"حدائق الأجدال — بستان الزيتون الملكي",ns:"حدائق قديمة وهادئة جداً",nst:"حدائق ملكية من القرن الثاني عشر تضم بساتين زيتون وبرك عاكسة وأشجار سرو. مساحة 340 هكتاراً. هروب من ازدحام المدينة.",nt:"جنوب جدران المدينة. مشياً 20-30 دقيقة. الصباح أفضل. اشرب الماء. المدخل مجاني. احضر دليلاً إن أمكن."},{id:44,n:"Ben Youssef Madrasa Courtyard — The Carved Silence",a:"Medina North",v:["history","beautiful","quiet"],d:20,s:"16th-century Islamic school with intricate carved plasterwork, zellige tilework, and a courtyard so detailed it reads as a prayer in stone.",st:"The Ben Youssef Madrasa is one of Morocco's finest examples of Islamic architecture. Built in the 16th century by the Saadians, it housed students of Islamic law. Walking inside, you enter a courtyard framed by arches so intricately carved they look lacelike. Every surface is embellished: plaster carved with geometric patterns and Quranic verses in Kufic script, zellige tiles in intricate mosaic work, cedar wood ceilings painted with geometric designs. The effect is overwhelming—you're surrounded by decoration so dense it becomes meditative. The prayer hall is accessed from the courtyard; light enters through small openings, creating a contemplative atmosphere. Student rooms line upper floors (still austere, showing how scholars lived). The madrasa charged no tuition; education was communal. The admission fee is modest. It's one of the medina's most visited sites, but the sheer intensity of the artwork keeps it from feeling touristic. You can sit in the courtyard for hours.",im:"Intricately carved plaster frames a window of colored light falling on zellige tiles, where every geometric pattern echoes thousands of years of Islamic aesthetic tradition.",t:"Located in the medina north, near Souk Attarine and Dar Bellarj. Modest entrance fee. Open 9am-5pm daily. Bring a small flashlight; many interiors are dimly lit. A guide (available on-site) greatly enhances understanding of the carvings. Allow 1-2 hours. Photography allowed, but avoid using flash on original artworks.",c:[],r:"g",nn:"مدرسة بن يوسف — صمت الفن المنحوت",ns:"مدرسة إسلامية قديمة رائعة",nst:"مدرسة قرآنية من القرن السادس عشر. تحفة معمارية إسلامية. أفنية مزخرفة بالزليج والجص المنحوت. آية جمال.",nt:"بالمدينة الشمالية. رسم دخول متواضع. افتح 9-5. جلب مصباح صغير. دليل يساعد. قضِ ساعة أو ساعتين."},{id:45,n:"Sebil Fountains — The Unnoticed Spigots of Daily Life",a:"Medina Center",v:["hidden","free entry","local"],d:15,s:"Ancient public fountains—sebils—scattered throughout the medina where locals still collect water and rest in the shade.",st:"A sebil is a public fountain or water source, a Moroccan institution. Before indoor plumbing, sebiis were gathering places—social infrastructure. Many still function. They're beautiful: ornate marble or tilework, often with intricate carved details. You'll find them tucked into alleyways: a small stone basin, a tap, often shaded by an arch. Locals still use them—for water, for ritual ablation before prayer. Tourists walk past without noticing. The sebil near Souk Attarine is particularly fine—blue zellige tilework, a carved stone arch, always busy with locals. The water is cold and clean. Sitting beside a sebil, watching people collect water, you understand how medieval Marrakech worked: water distribution, public amenities, communal life. No monetary system could solve the problem that a public fountain solved perfectly.",im:"An elderly man in a white djellaba fills a clay jug at a centuries-old fountain, while water catches light and runs toward a narrow channel in the medina floor.",t:"Sebiis are scattered throughout the medina; they're not marked on tourist maps. Ask locals for the nearest one. The water is generally safe to drink. No entry fee—it's public infrastructure. Early morning is best if you want to photograph or observe without crowds. The fountains near major souks (Attarine, Sebbaghine) are good starting points.",c:[],r:"g",nn:"سبيل — النوافير العمومية التاريخية",ns:"نافورات قديمة منتشرة بالمدينة",nst:"سبيل ماء عمومي قديم. لا تزال تعمل. توزيع ماء تاريخي. جزء من الحياة اليومية.",nt:"مبعثرة في المدينة. اسأل السكان عن الأقرب. الماء نظيف وآمن. مجاني. الصباح أفضل للمشاهدة."},{id:46,n:"Bread Ovens of the Medina — The Daily Alchemy",a:"Medina Various",v:["local","weird","history"],d:20,s:"Neighborhood hammams (bakeries) where residents bring dough to be baked in shared clay ovens—a centuries-old communal system still functioning daily.",st:"Every Moroccan neighborhood has a public bread oven, called a furn or hammam. It's a straightforward system: residents mix dough at home, bring it to the bakery, pay a small fee per loaf, and the baker slides it into a massive clay oven for communal baking. Walking through the medina early morning, you'll see lines of women—some carrying dough on flat wooden peels, some collecting the morning's bread. The ovens themselves are ancient, built into thick stone walls, fired by intense heat. The smell is transcendent: baking bread mingling with cumin and harissa. The bakers are usually men, working shirtless, with flour dust coating everything. This system has worked for centuries—why waste family resources heating individual ovens when communal ovens distribute cost and heat? The routine is so embedded that tourists almost never encounter it, yet it's the pulse of Marrakech's daily life. Watching bread emerge, golden and hot, is watching tradition function, not perform.",im:"Steam rises from a deep clay oven as a baker withdraws a dozen loaves on a wooden peel, their crust glistening with moisture and the smell of earth and yeast filling the narrow souk.",t:"Head into the medina early—6am to 8am—when bread ovens are most active. Ask a local shopkeeper for the nearest furn. Be respectful; these are working spaces, not museums. You can watch, but the ovens are intensely hot—don't linger directly in front. Buying bread directly from the baker costs 0.5-1 dirham per loaf.",c:[],r:"g",nn:"أفران المدينة — الخبز اليومي",ns:"أفران طينية جماعية تاريخية",nst:"فرن مشترك في كل حي. نظام قديم جداً. السكان يأتون بالعجين. الفرن ينضج الخبز. حياة يومية حقيقية.",nt:"صباحاً 6-8. اسأل صاحب محل. احترم مكان العمل. تجنب الاقتراب من الفرن. الخبز رخيص جداً."},{id:47,n:"Riad Yima — Hassan Hajjaj's Curated Art Gallery",a:"Medina North",v:["hidden","weird","beautiful"],d:25,s:"A working artist's riad-gallery showcasing contemporary Moroccan pop art and Gnawa influences in an intimate, labyrinthine setting.",st:"Hassan Hajjaj is a Moroccan artist whose work fuses pop culture with Islamic tradition, Berber symbolism, and Gnawa music into a visual language entirely his own. Riad Yima is his working gallery—not a museum, a space. It's down a narrow alley, easy to miss. Inside, the riad unfolds in unexpected ways: rooms filled with his photographs (bold, colorful, confrontational), sculptures, installations. His photographs often feature everyday Moroccan scenes reimagined through a lens that's both reverent and iconoclastic—a woman holding a Coca-Cola bottle becomes a statement about tradition and modernity. The space feels alive—Hajjaj sometimes works here, students sometimes study here. The walls are close, the art is intimate. There's no separation between gallery and living space. This is what contemporary Moroccan art looks like: not exported for foreign consumption, but native, uncompromising, deeply rooted in place.",im:"A photograph of a Marrakech street vendor reimagined in saturated colors and bold geometry, surrounded by sculptures of mixed media that blur the line between sacred and pop culture.",t:"Located in the medina, north of Jemaa el-Fna. Follow the signs or ask locals. Hassan is sometimes present; chat with him if so. Small admission fee. Open sporadically—call ahead or ask your riad. The space is narrow and intimate; allow 30-45 minutes. Photographs permitted but respect the artist's wishes. His work challenges Western expectations of 'Moroccan art'—expect discomfort as well as beauty.",c:[],r:"g",nn:"رياض ييما — معرض حسن الحاج",ns:"معرض فني معاصر مخفي",nst:"رياض عمل فنان محلي. الفنان حسن الحاج يخلط الفن المعاصر بالثقافة المغربية. فن حي، لا متحف.",nt:"بالمدينة الشمالية. اسأل عن الاتجاهات. رسم دخول صغير. افتح بشكل متفرق. اتصل مسبقاً. 30-45 دقيقة."},{id:48,n:"Cyber Park — The Unexpected Green Escape",a:"South Medina",v:["quiet","free entry","beautiful"],d:20,s:"Surprising modern park with native plants, quiet gardens, and fountains—a green oasis designed with sustainable Moroccan aesthetics.",st:"Cyber Park is a contemporary design by a Belgian landscape architect that feels impossibly out of place in Marrakech—yet deeply respectful of place. It occupies space south of the old medina. The park uses native Moroccan plants—palms, argan trees, fruit trees—arranged in a design that honors traditional Islamic garden geometry. Water features (sebiis and fountains) flow through the space. There are quiet gardens for sitting, shaded pavilions, walking paths. The park attracts locals more than tourists—families picnic here, teenagers study here, couples walk here. Unlike Jardin Majorelle (Marrakech's famous garden, now intensely touristic), Cyber Park feels like a living community space. It's modern but not aggressively so; it's designed for use, not spectacle. Sitting here, you get Marrakech's green side, the agricultural underpinning of the city—a reminder that Marrakech was built to distribute water in an arid region.",im:"Palm fronds cast geometric shadows on a tiled plaza where a child splashes in a shallow fountain and the smell of jasmine mingles with orange blossom.",t:"Located south of the medina, accessible by foot (30-minute walk from Jemaa el-Fna) or petit taxi. Free entry. Open dawn to dusk. Best in early morning or late afternoon to avoid heat and crowds. Bring water and hat. Locals are friendly; the park has no entry restrictions. Small cafés serve drinks and snacks.",c:[],r:"g",nn:"سايبر بارك — الحديقة الحديثة الهادئة",ns:"حديقة خضراء مفاجئة وجميلة",nst:"حديقة حديثة بالنباتات المغربية الأصلية. تصميم يحترم الهندسة الإسلامية. مجاني. هادئ.",nt:"جنوب المدينة. مشياً 30 دقيقة. مجاني. افتح من الفجر إلى الغروب. احضر ماء. المقاهي الصغيرة موجودة."},{id:49,n:"House of Photography — The Moroccan Archive",a:"Medina North",v:["hidden","history","beautiful"],d:25,s:"A tucked-away museum housing 80 years of Moroccan photographs—portraits, landscapes, daily life—with a rooftop café offering panoramic views.",st:"The House of Photography is a small gem in the medina, hidden within a traditional riad. The collection is extraordinary: thousands of photographs spanning the 1920s to the 2000s, documenting Moroccan life across eras. You'll see street scenes from colonial-era Marrakech, portraits of craftsmen, landscapes of the Atlas, daily rituals. The photographs are arranged thematically and chronologically, telling a visual history of the nation. What makes this collection special is its focus on ordinary Moroccan life—not the exotic, not the performative, but real daily experience. The riad itself is beautiful—traditional architecture, central courtyard, narrow galleries displaying the prints. A rooftop café serves tea and overlooking the medina. The space feels scholarly yet intimate. Photography is permitted; the pace is contemplative. Few tourists find this place, which means you might be alone with 80 years of Moroccan memory.",im:"A faded photograph of a Marrakech street from 1950 hangs beside one from 2000—the same alley, utterly transformed, a dialogue between eras.",t:"Located in the medina north, near Ben Youssef Madrasa. Small but consistent entrance fee. Open daily, usually 10am-5pm (check hours). The rooftop café is excellent; bring sunscreen and a hat. Photography permitted. Allow 45 minutes to an hour. A guide is not essential; the photographs speak for themselves. This is a photographer's pilgrimage site.",c:[],r:"g",nn:"دار الفوتوغرافيا — أرشيف مراكش",ns:"متحف صور تاريخية مخفي",nst:"متحف يضم 80 سنة من الصور المغربية. حياة يومية حقيقية. أرشيف قيم.",nt:"بالمدينة الشمالية. رسم دخول صغير. افتح 10-5. شرفة بمقهى جميلة. التصوير مسموح."},{id:50,n:"Sidi Ghanem — The Artisan Quarter Beyond the Tourist Map",a:"South Outskirts",v:["local","weird","hidden"],d:30,s:"An industrial neighborhood 4km south with workshops for ceramics, textiles, leather, and natural dyes—where Marrakech artisans create before items reach tourist shops.",st:"Sidi Ghanem doesn't appear on tourist maps, and that's the point. It's a working neighborhood south of the medina where artisans maintain workshops and studios. Here you'll find ceramic workshops firing traditional Moroccan pottery, textile dyers preparing fabric for local markets, leatherworkers cutting and tooling hides, makers of natural dyes and scents. The neighborhood is industrial but not ugly—workshops open directly onto the street, workers visible, the process transparent. Unlike tourist-focused artisan centers, there's no attempt to perform for visitors. Work continues regardless. Prices are lower than in the medina; quality is higher. The demographic is mixed—locals, artisans, a few intrepid travelers. Petit taxis serve the area, but walking is best. Wandering here, you understand that the medina is a display case; Sidi Ghanem is the workshop. This is where Marrakech actually makes things.",im:"Hands shape wet clay on a wheel while glazed pots cool on shelves behind—the workshop filled with the smell of earth and fire and the concentration of practiced craft.",t:"Accessible by petit taxi from the medina (negotiate fare, usually 10-15 dirhams). Alternatively, taxi from Jemaa el-Fna. Ask the driver for 'Sidi Ghanem artisan workshops.' It's a 10-15 minute ride. Wear comfortable shoes; streets are uneven. Bring cash. Workshops vary in whether they welcome visitors—many do, some don't. Be respectful; ask before entering. Photographers should ask permission. The neighborhood is safe but not heavily touristed, so expect less English. This is the Marrakech behind the curtain.",c:[],r:"g",nn:"سيدي غانم — حي الحرفيين الحقيقي",ns:"ربع صناعي للحرفيين المحليين",nst:"حي خارج السياحة. ورش خزاف وصباغة وجلود. عمل حقيقي يومي. لا أداء للسياح.",nt:"4 كم جنوب المدينة. وسيلة نقل صغيرة. اسأل عن ورش سيدي غانم. احترم مكان العمل. اطلب إذنة قبل الصور. احضر نقوداً."}];

<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Marrakech Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
