const P = [
  {id:1,n:"Jemaa el-Fnaa Square — Marrakech's Beating Heart",a:"Medina Center",v:["local", "history", "hidden"],d:20,s:"Iconic UNESCO-listed plaza where storytellers, musicians, snake charmers, and crowds create daily spectacle.",st:"Jemaa el-Fnaa translates roughly to 'the assembly of the dead'—so named for the public executions once held here, though now it pulses with life. This square is Marrakech's soul: by day, it's chaos—snake charmers coil serpents around tourists' necks for photos, water sellers in crimson robes hawk their drinks, fortune tellers read palms while a musician nearby plays oud. By evening, food stalls emerge, transforming the plaza into an open-air restaurant where steam rises from grills and the smell of cumin and harissa fills the air. Storytellers gather crowds and recount tales—in Darija—that tourists can't understand but feel viscerally. The square has been a marketplace and gathering place for 500 years; the energy is primordial, unchanged by tourism despite its massive presence.",im:"A snake charmer's flute weaves through the smell of grilled meat and orange juice, while acrobats tumble and a call to prayer echoes from the surrounding minarets.",t:"Open all hours; busiest at sunrise and sunset. Avoid if photosensitive—strobing dancers, bright colors. Be cautious with valuables; pickpockets exist. Don't photograph people without permission. The square can feel overwhelming; find a café terrace above for respite.",c:[],r:"g",nn:"ساحة جامع الفنا",ns:"أشهر ساحة في مراكش",nst:"ساحة تاريخية معروفة عالمياً. تضم حكائين وموسيقيين وسحرة ثعابين. تنبض بالحياة ليلاً ونهاراً.",nt:"احذر من النشالين. لا تصور الناس بدون إذن. جد مقهى علوي للهدوء. تجنب الزحام في الذروة."},
  {id:2,n:"Koutoubia Mosque — Marrakech's Minaret Sentinel",a:"Medina Center",v:["history", "architecture", "beautiful"],d:15,s:"12th-century mosque with a minaret visible across the city, Morocco's most recognizable landmark.",st:"The Koutoubia Mosque's minaret rises 77 meters in perfect geometric harmony, covered in intricate carved decoration. Built in 1147 by the Almohad dynasty, it's Morocco's most iconic structure. The minaret is visible from 25km away—Marrakech's constant companion on the horizon. The word 'Koutoubia' refers to booksellers (qutub means books), as the area once housed manuscript merchants. Non-Muslims cannot enter the mosque, but the exterior is magnificent: carved stone screens, proportions that feel inevitable. At night, the minaret glows softly, a beacon above the chaos of the medina. The mosque faces a large open square where locals gather to pray and socialize. The Almohad architecture here is the city's defining aesthetic: pure, geometric, minimal decoration by later standards but profound in its simplicity.",im:"At sunset, the minaret casts a long shadow across the square as the call to prayer echoes, and the sky turns deep amber behind the carved stone.",t:"Located at the south edge of the medina. Non-Muslims cannot enter but may observe the exterior and courtyard from outside. The surrounding square is open and accessible. Best viewed at sunset when light hits the minaret. Allow 30 minutes.",c:[],r:"g",nn:"مسجد الكتبية",ns:"مسجد تاريخي بمئذنة مشهورة",nst:"بني سنة 1147 في عهد الموحدين. المئذنة ترتفع 77 متراً وترى من بعيد. أشهر معلم في مراكش.",nt:"لا يمكن للمسلمين دخول المسجد. شاهد من الخارج. الغروب أفضل وقت للمشاهدة."},
  {id:3,n:"Bahia Palace — Royalty's Ornate Sanctuary",a:"Medina Center",v:["architecture", "history", "beautiful"],d:20,s:"19th-century royal palace with courtyards, gardens, and elaborate tilework, a masterpiece of Moroccan architecture.",st:"Bahia means 'the beauty,' and the palace lives up to its name. Built between 1866 and 1900 by successive viziers, it sprawls across multiple courtyards, each more ornate than the last. The main courtyard is a symphony of zellige tilework—intricate patterns of blue, green, and white ceramic—framing the fountain and orange trees. The ceilings are painted in geometric patterns and gilded; the wooden screens (mashrabiya) are carved so delicately light seems to pass through them like breath. Rooms are arranged around courtyards in the traditional riad style: private worlds within worlds. The harem section retains its intimacy—smaller, more personal spaces where royal women lived in seclusion. Walking the palace, you understand Moroccan aesthetics: decoration reaches a fever pitch, every surface carved, tilted, or painted, yet the overall effect is harmony, not chaos.",im:"Light filters through carved wooden screens onto zellige tiles, creating geometric shadows that dance across the courtyard floor.",t:"Located south of the medina; accessible by foot or petit taxi. Open 9am-5pm (4pm in winter). Moderate entrance fee. Photography allowed. Allow 1-2 hours. A guide is worthwhile for architectural details. Main sections are well-marked.",c:[],r:"g",nn:"قصر الباهية",ns:"قصر ملكي فخم من القرن التاسع عشر",nst:"بني بين 1866 و 1900. يتميز بحدائق وأفنية وزخارف الزليج الجميلة. آية فن معماري مغربي.",nt:"مفتوح صباحاً. استأجر دليلاً لفهم الفن. التصوير مسموح. قضِ ساعة أو ساعتين هنا."},
  {id:4,n:"Majorelle Garden — Exotic Botanical Sanctuary",a:"New Town",v:["nature", "beautiful", "art"],d:15,s:"Art deco garden with exotic plants, designed by French painter Jacques Majorelle, now owned by Yves Saint Laurent Foundation.",st:"In contrast to the medina's ancient aesthetic, Majorelle Garden is a 20th-century European vision imposed on Moroccan landscape. Created by French painter Jacques Majorelle in the 1920s-40s, it's a riot of color: vibrant blue buildings, electric yellow walls, and crimson flowers. The garden contains over 300 plant species: bamboo groves, palm trees, cacti from around the world, and lily ponds. The blue—'Majorelle Blue'—became so iconic it's now used on ceramics and textiles worldwide. After Majorelle's death, the garden was abandoned; Yves Saint Laurent and his partner Pierre Bergé purchased it in 1980 and restored it to perfection. Today, it's Marrakech's most sophisticated space: manicured, Western, entirely at odds with the organic chaos of the medina, yet utterly beautiful.",im:"A flash of electric blue building emerges between bamboo stalks, and a tourist gasps at the contrast between nature and artifice.",t:"Located north of the medina, near the new town. Easy taxi access. Open 8am-5:30pm (6pm in summer). Entrance fee is high but worth it. Allow 1-2 hours. Photography excellent. Bring a hat; limited shade. Berber Museum and adjacent Yves Saint Laurent Museum included.",c:[],r:"g",nn:"حديقة ماجوريل",ns:"حديقة فنية فاخرة بألوان زاهية",nst:"حديقة فرنسية الإنشاء من الثلاثينات. تضم نباتات نادرة من حول العالم. الآن ملك مؤسسة إيف سان لوران.",nt:"في الوسط الحديث. استأجر تاكسي. المدخل غالي لكن يستحق. احضر قبعة."},
  {id:5,n:"Saadian Tombs — Jeweled Burials",a:"Medina Center",v:["history", "architecture", "hidden"],d:15,s:"16th-century royal tombs ornately decorated with carved stucco, tilework, and hidden for centuries.",st:"The Saadian Tombs were built in the late 1500s by Ahmad al-Mansur as eternal monuments. The tombs were then sealed and hidden for nearly 200 years—forgotten until French archaeologists rediscovered them in 1917. This obscurity is their salvation: the interior decoration is preserved in pristine condition. Enter through a small doorway in an alley and suddenly you're in another world: a chamber lit by filtered green light from stained glass windows, where two cenotaphs (symbolic tombs) rest beneath a cedar ceiling carved in geometric patterns. The walls are covered in zellige tilework in blues, greens, and reds, and intricate stucco work frames every surface. The intimate scale is striking—these are royal tombs, yet small and private. The hierarchy of rooms leads deeper into secret chambers where poets and soldiers of the Saadian dynasty are buried. It's less a burial place and more a spiritual journey downward into the earth, toward the afterlife.",im:"Green light from a latticed window illuminates a face carved in cedar, and shadows move across zellige tiles as time stands still.",t:"Located in the medina, south of Jemaa el-Fnaa. Small entrance fee. Often missed by tourists; less crowded than other medina sites. Open 8:30am-5:45pm. Wear modest dress. Photography allowed. Allow 1-2 hours. Guide worthwhile for context.",c:[],r:"g",nn:"قبور السعديين",ns:"مقابر ملكية فخمة",nst:"بنيت في القرن 16 بزخارف جميلة من الزليج والجص. ظلت مخفية لقرن ونصف حتى اكتشافها سنة 1917.",nt:"في المدينة القديمة. مدخل رخيص. أقل ازدحاماً من المواقع الأخرى. ارتد ملابس محتشمة."},
  {id:6,n:"Ben Youssef Mosque and Medersa — Medieval Learning",a:"Medina Center",v:["history", "architecture", "art"],d:20,s:"16th-century mosque and attached medersa (Islamic school) with a stunning courtyard and decorated rooms.",st:"The Ben Youssef Medersa was built in 1565 as a theological school where young scholars studied Islamic law and sciences. The main courtyard is an exercise in symmetry: a central fountain reflects carved cedar walls, zellige tilework, and calligraphic inscriptions from the Quran. The intricate stucco work reaches its zenith here—carved arabesques that seem to flow like water. Upstairs, student cells are austere: a small room for sleeping, studying, prayer. The ablution room has innovative plumbing for its era—channels directing water to wash hands before prayer. Non-Muslims cannot enter the adjacent mosque, but the medersa alone is worth the visit. The building embodies Islamic aesthetics: decoration everywhere, yet no human or animal figures, beauty derived from geometry and calligraphy. Scholars sat here 400 years ago debating theology in these very courtyards.",im:"A student's cell opens onto the courtyard, where afternoon light illuminates carved wood and the sound of water echoing off stone.",t:"Located north of Jemaa el-Fnaa in the medina. Open 9am-5pm (7pm in summer). Moderate entrance fee. Allow 1-2 hours. Photography excellent. A guide adds scholarly context. Less crowded early morning.",c:[],r:"g",nn:"مسجد ومدرسة بن يوسف",ns:"مدرسة إسلامية عريقة",nst:"بنيت سنة 1565 لتعليم الطلاب الشريعة والعلوم. فناء جميل بزخارف زليج.",nt:"شمال الساحة. استأجر دليلاً. التصوير رائع. الصباح الباكر أقل ازدحاماً."},
  {id:7,n:"Souk Medina — Textiles and Spices Labyrinth",a:"Medina Center",v:["local", "food", "hidden"],d:25,s:"Sprawling medieval marketplace with dozens of interconnected souks selling carpets, leather, spices, and goods.",st:"The souk is not a single market but a network of neighborhoods, each specialized: the souk of berber carpets, the souk of leather, the souk of spices. Walking the narrow covered streets, your senses overload—turmeric yellows every surface, leather tanneries emit pungent aromas, and merchants call out in Darija from stalls hung with textiles. Unlike Khan el-Khalili's tourist orientation, Marrakech's souk still primarily serves locals: working-class women buy fabric, men purchase tools and hardware, spice merchants negotiate with restaurant owners. The architecture is medieval: wooden beams cross the narrow streets; natural light filters through gaps, creating a starry effect on the stone below. The souk has no map—navigation is intuitive or lucky. Haggling is expected; merchants treat negotiation as theater. A good carpet can take 30 minutes to discuss before price is set.",im:"Shafts of amber light cut through dust and steam from a tea vendor's kettle, illuminating hanging leather babouches (slippers) in a thousand colors.",t:"Accessible from Jemaa el-Fnaa or north gate of medina. Best explored in late morning (not too crowded, not yet midday heat). Wear comfortable shoes; plan to wander 2-3 hours. Bring cash; many vendors are cash-only. Agree on prices before purchase.",c:[],r:"g",nn:"سوق المدينة",ns:"سوق تاريخي كبير",nst:"شبكة من الأسواق المتخصصة: السجاد والجلود والتوابل. يخدم السكان المحليين بشكل أساسي.",nt:"لا خريطة؛ التنقل بالحدس. ارتد أحذية مريحة. استعد للمساومة. كن مستعداً لقضاء ساعات."},
  {id:8,n:"Riad Stays — Traditional Courtyard Homes",a:"Medina Center",v:["local", "architecture", "beautiful"],d:20,s:"Traditional Moroccan homes with interior courtyards, now many converted to guesthouses, offering intimate stays.",st:"A riad is the DNA of Moroccan domestic life: a rectangular home built around a central courtyard (riad means garden). The exterior is blank—merely a door in the street—but inside, it's a sanctuary. Courtyards are open to the sky, often containing fountains and plants. Rooms face inward; windows overlook the courtyard, not the street. This design dates to centuries of conflict: homes were built defensively, with walls toward the world and openness toward family. Today, many riads have been converted to boutique hotels; staying in one is cultural immersion. You sleep to the sound of the fountain, wake to light filtering through latticed windows, and share meals in the courtyard with travelers. The riads vary: some are luxurious, with marble and modern bathrooms; others are simpler, more authentic. The experience is the same: you're living as Moroccans have for generations.",im:"A traveler sits in a riad courtyard at dawn, the only sound the fountain's splash, and feels for a moment that time has stopped.",t:"Hundreds of riads throughout the medina offer stays. Book online in advance; walk-ins available. Price ranges from budget to luxury. Breakfast typically included. Many are difficult to locate (by design); confirm directions with owner beforehand. Wifi varies. Noise from street can penetrate.",c:[],r:"g",nn:"الرياض (منازل تقليدية)",ns:"منازل مغربية تقليدية",nst:"تصميم تقليدي حول فناء مركزي. كثير منها تحول إلى فنادق بوتيك. النوم فيها تجربة ثقافية حقيقية.",nt:"احجز مسبقاً. التوجيهات قد تكون معقدة. اسأل صاحب الرياد عن المسار الأفضل."},
  {id:9,n:"Menara Gardens — Atlas Views and Royal Relaxation",a:"New Town",v:["nature", "views", "beautiful"],d:20,s:"Large landscaped gardens at the foot of the Atlas Mountains with an iconic pavilion and reflecting pool.",st:"The Menara Gardens are less intimate than Majorelle but grander in scope. Created in the 12th century, they occupy 40 hectares near the foot of the snow-capped Atlas Mountains. An olive orchard dominates the landscape; in spring, the blossoms are white drifts against green. The famous pavilion sits at the center—a small palace-like structure reflected in a large pool of water. The effect is serene: the mountains loom in the distance; the water mirrors sky, pavilion, and peaks. Locals come here to relax, stroll, and find relief from the medina's chaos. The gardens are named for the 'menara' (lantern-like roof)—a clever ventilation system that kept the pavilion cool before electricity. Walking the paths at sunset, with the Atlas glowing orange and the pool reflecting the last light, is quintessential Marrakech romance.",im:"The Atlas Mountains turn violet as sunset approaches, reflected in still water where the pavilion sits like a jewel.",t:"Located south of the new town, easily reached by taxi or bicycle. Open 8am-sunset. Minimal entrance fee. Allow 1-2 hours to walk the grounds. Best visited late afternoon for light and temperature. The pavilion interior is small but photogenic. Cafés nearby serve mint tea.",c:[],r:"g",nn:"حدائق منارة",ns:"حدائق كبيرة مع إطلالات جبلية",nst:"حديقة كبيرة من القرن 12 بأشجار زيتون وبركة ماء. إطلالات جميلة على جبال الأطلس.",nt:"استأجر تاكسي. المدخل رخيص جداً. المساء أفضل للصور. احضر قبعة من الشمس."},
  {id:10,n:"Hammam (Turkish Bath) — Ritual Cleansing",a:"Medina Center",v:["local", "hidden", "food"],d:10,s:"Traditional Moroccan steam bath, gender-segregated, offering scrubbing and relaxation in ancient heated rooms.",st:"A hammam is more than a bath; it's a ritual that Moroccans have practiced for centuries. The process: undress in a cool outer room, move to a steam room where heat builds, then a scrubber attacks your skin with a coarse mitt, removing dead cells and toxins. It's initially uncomfortable—the scrubber shows no mercy—but incredibly invigorating. The final room is cool; you rinse and emerge new. Gender segregation is strict: women's hours differ from men's. Tourist-friendly hammams are becoming available, though traditional ones are preferable for authenticity. The cost is minimal (5-10 dirhams). The experience is communal; locals gather, socialize, and share gossip while bathing. It's quintessentially Moroccan—a space where modesty and nudity coexist, where strangers become family through the shared vulnerability of being scrubbed clean.",im:"Steam rises from the ground; a woman pours hot water over herself while her friend lies on heated stone, gossiping in Darija.",t:"Hammams are throughout the medina and new town. Ask your riad owner or hotel for nearby options. Check gender-specific hours. Bring flip-flops, a towel, and soap. Have small change. Allow 1-2 hours. Bring a friend for reassurance if first time. It's intense but transformative.",c:[],r:"g",nn:"الحمام المغربي",ns:"حمام بخار تقليدي",nst:"طقس تقليدي مغربي. ساخن جداً ثم برد. مقسم حسب النوع. الكلفة رخيصة جداً.",nt:"اطلب من صاحب الرياد. احضر شبشب وفوطة. تجربة غريبة لكن تجديدية جداً."},
  {id:11,n:"Kasbah of Aït Benhaddou (Day Trip) — Berber Fortress-Town",a:"Day Trips",v:["history", "architecture", "hidden"],d:45,s:"UNESCO-listed fortified village 30km south, with mud-brick kasbahs cascading down hillsides.",st:"Aït Benhaddou is a kasbah—a fortified compound of mud-brick buildings clustered on a hillside. Built as a stopping point on Saharan trade routes, it's constructed entirely from earth: walls, towers, gates, all compressed earth and straw. The kasbah rises in tiers, towers punctuating the skyline. Walking the narrow streets, the architecture feels organic—less built than grown. Some buildings date to the 17th century; others were rebuilt recently (tourists and film crews have accelerated restoration). The views from the top are stunning: the valley spreads below; the Atlas rises beyond; the emptiness of the Sahara feels close. Many UNESCO World Heritage sites are overwrought; Aït Benhaddou retains its authenticity—you're truly walking through how people lived before modernity. The UNESCO designation has brought tourist infrastructure, but the core remains Berber in spirit.",im:"Mud-brick towers are silhouetted against afternoon light, and a child appears on a roof to wave, reminding you that people still live here.",t:"Located 30km south, 45 minutes by car. Organized tours from Marrakech are available; alternatively, hire a car and driver. Allow 3-4 hours for the visit. The descent is steep and slippery. Wear good shoes. Local guides available on-site. Best morning light for photography.",c:[],r:"g",nn:"قصبة آيت بنحدو",ns:"قصبة برازل قديمة",nst:"قرية محصنة على بعد 30 كم. بنيت من الطين والتراب. موقع تراث عالمي. سكانها الأمازيغ التقليديون.",nt:"رحلة نصف يومية. استأجر سيارة وسائق. ارتد أحذية قوية. الصباح أفضل للصور."},
  {id:12,n:"Ourika Valley (Day Trip) — Mountains, Berber Villages, and Waterfalls",a:"Day Trips",v:["nature", "hidden", "local"],d:40,s:"Valley in the Atlas Mountains with Berber villages, hiking, and waterfalls, one hour south of Marrakech.",st:"The Ourika Valley is where Marrakech residents escape on weekends. An hour south by car, the valley unfolds with dramatically steep cliffs, emerald villages clinging to mountainsides, and the Ourika River running through it all. The villages are fully Berber—locals speak Tamazight more than Arabic or French. Many offer homestays and simple restaurants. Walking trails crisscross the valley; hiking to waterfalls is a popular half-day excursion. The highest waterfall is a 30-meter cascade in summer (reduced in dry season). The landscape shifts: arid foothills give way to lush valleys with pomegranate and walnut orchards. The Berber culture here is less touristic than in Marrakech—you feel you're witnessing rather than consuming culture. A local guide is invaluable, translating and introducing you to families. Many visitors spend a night in the valley, finding the silence and mountain air restorative.",im:"A Berber woman in traditional dress tends a garden while her children play, and the Atlas rises behind in layers of purple and brown.",t:"Located one hour south by car. Organized tours available from Marrakech; many include lunch. Alternatively, hire a car and driver. Hiking trails are well-marked but can be steep. Wear good shoes and bring water. Allow 4-6 hours for a valley visit and hike.",c:[],r:"g",nn:"وادي أوريكة",ns:"وادٍ جبلي جميل",nst:"وادٍ ساحر على بعد ساعة من مراكش. قرى أمازيغية تقليدية وشلالات جميلة.",nt:"رحلة نصف يومية. استأجر سيارة. استكشف القرى الأمازيغية. الماء متوفر في الشلالات."},
  {id:13,n:"Medina Walls and Gates — Defensive Perimeter",a:"Medina Center",v:["history", "architecture", "hidden"],d:15,s:"12km of reddish clay walls surrounding the medina, built in the 12th century, with historic gates.",st:"The medina is surrounded by walls that give Marrakech its distinctive red color—mud-brick mixed with earth and straw. These walls were built in 1146 by the Almohad Almoravid dynasty as defensive barriers; they still encircle the ancient quarter. The gates (babs) are monumental: Bab Agnaou is ornately carved; Bab Marrakech is simpler but massive. Walking the walls (partly paved as a rampart path) offers views inward to the medina's tangle and outward to modern Marrakech beyond. The walls are nearly a thousand years old, yet functional—goods enter and exit through the gates daily. In places, the walls crumble; in others, they've been restored to pristine condition. Walking them gives a sense of the medina's containment and isolation before modern transportation dismantled the need for fortifications.",im:"Sunset light turns the red clay walls golden, and silhouettes move along the ramparts—locals on scooters and tourists on foot.",t:"The walls are accessible at several points; the best rampart walk is north of the medina. Most gates are open; some have attendants. Photography is excellent. Allow 1-2 hours for a partial walk. The walls are not heavily touristed; few vendors. Bring water.",c:[],r:"g",nn:"أسوار المدينة",ns:"جدران حمراء حول المدينة القديمة",nst:"جدران من الطين الأحمر بني في القرن 12. تحيط بالمدينة القديمة. هناك عدة بوابات تاريخية.",nt:"التمشية على الجدران جميلة عند الغروب. احضر الماء. قليل من الزوار هنا."},
  {id:14,n:"Palais Bahia (Second Part) — Harem Chambers",a:"Medina Center",v:["history", "architecture", "hidden"],d:20,s:"Lesser-known sections of the Bahia Palace with private chambers and gardens designed for royal women.",st:"Beyond the main palace, Bahia continues into private residential sections rarely explored by tourists. These chambers were the harem—the private quarters of the sultan's wives, concubines, and female family members. The rooms are smaller, more intimate than public spaces, designed for comfort rather than ceremony. Tilework is still exquisite but less grandiose. Some chambers contain private baths with ingenious heating systems. The gardens are sequestered, accessible only to females of the household. Walking these rooms, the palace's hierarchy becomes clear: public display in grand courtyards, private comfort in hidden chambers. It's a window into a social structure few outsiders see. The chambers reveal that royal women, though confined to private space, lived in extraordinary beauty and comfort.",im:"A private chamber overlooks a hidden garden where jasmine blooms; a woman sits alone with her servant, engaged in private conversation.",t:"Part of the main Bahia Palace complex but less frequently visited. Entrance fee covers both sections. Allow extra time if exploring harem quarters. A guide is essential for context about women's lives. Photography excellent.",c:[],r:"g",nn:"قسم الحريم من قصر الباهية",ns:"أجزاء خاصة من القصر",nst:"الأجنحة الخاصة بالنساء الملكيات. أصغر وأكثر خصوصية من الأجزاء العامة.",nt:"جزء من نفس الجولة. استأجر دليلاً لفهم حياة النساء الملكيات."},
  {id:15,n:"Marrakech Food Markets — Fruits, Vegetables, and Fresh Finds",a:"Medina Center",v:["food", "local", "hidden"],d:10,s:"Morning markets where vendors sell fresh produce, herbs, nuts, and prepared food for local consumption.",st:"Beyond the tourist-facing souks, Marrakech has working markets where locals buy daily provisions. The fruit market near Jemaa el-Fnaa is a riot of color: piles of oranges, pomegranates, apricots depending on season; dates in twenty varieties. The vegetable market has fragrant mountains of herbs: mint, cilantro, parsley. The nut and spice section is hypnotic—almonds, pistachios, sesame, and spices in textures and colors. Small stalls sell prepared food: tajines, couscous, salads made hours prior, sold by weight to working-class Moroccans. The vibe is entirely local; tourists are uncommon. Vendors are friendly but businesslike—they're not there to perform but to sell. Prices are cheaper than tourist restaurants, and the food is unambiguously authentic. A morning in these markets is cultural immersion of the realest kind.",im:"A vendor arranges pyramids of cinnamon-dusted oranges while a woman in a blue galabiya examines herbs with the intensity of an alchemist.",t:"Markets are busiest in early morning (6-9am). Located throughout the medina; ask locals for directions. Mostly cash transactions. Pick-pockets exist; be aware. Vendors may avoid English; bring a phrasebook or go with a guide. Allow 1-2 hours for browsing and shopping.",c:[],r:"g",nn:"أسواق الفواكه والخضار",ns:"أسواق محلية للمنتجات الطازجة",nst:"أسواق حقيقية للسكان المحليين. فواكه وخضار وتوابل طازجة. الأسعار رخيصة.",nt:"اذهب في الصباح الباكر. احذر من النشالين. كن محترماً. التصوير قد لا يكون مرحباً به."},
  {id:16,n:"Tanoura Show (Sufi Dervish Dance) — Spiritual Whirling",a:"Medina Center",v:["local", "art", "history"],d:15,s:"Evening performance of traditional Sufi whirling dervish dance, performed nightly in restaurants near Jemaa el-Fnaa.",st:"Tanoura is a folk dance rooted in Sufi spirituality, though the tourist version is more performance than prayer. Dancers in multicolored skirts spin continuously, their skirts flaring outward, creating geometric patterns. The music—drums and oud—drives the rhythm. The performance is hypnotic: the dancer's face remains serene while the body spins at dizzying speeds. There's an illusion: as the skirt accelerates, individual colors merge into white—a visual metaphor for the dissolving self in spiritual practice. Tourist shows are typically 45 minutes, performed in restaurant courtyards with dinner. Purists argue these are commercialized versions of sacred practice, which is fair; the spiritual intensity is diluted. Yet the technical skill is real, and the experience is beautiful. Many visit once; some return repeatedly, mesmerized.",im:"A dervish spins faster and faster, the camera unable to focus, the skirt becoming a blur of color, and time seems to slow.",t:"Shows are nightly, usually 9-10pm, at restaurants like Chez Ali or Palais Dar Anika. Dinner and show combined is expensive but worth it. Book in advance. Seating is tiered, giving good views. Allow 2 hours including dinner. Photography allowed.",c:[],r:"g",nn:"عرض التنورة",ns:"رقصة تقليدية صوفية",nst:"رقص دراويش صوفيين يدورون بسرعة. عرض جميل لكن سياحي من نواحٍ عديدة.",nt:"احجز مسبقاً. العشاء مدرج. اجلس في المقاعم العليا للمشهد الأفضل."},
  {id:17,n:"Argan Oil Cooperatives — Women's Empowerment and Products",a:"Day Trips",v:["local", "hidden", "food"],d:30,s:"Cooperative workshops where Berber women produce argan oil, with opportunities to learn and purchase.",st:"Argan oil is liquid gold: extracted from the argan tree, which grows only in a small region of Morocco. The process is labor-intensive: women crack open hard shells, extract kernels, and press them traditionally. Many cooperatives now welcome visitors to witness the process and purchase directly, cutting out middlemen. The women who work in cooperatives are often from rural areas; their income from argan oil sales provides economic independence. Visiting a cooperative is less tourism and more genuine commerce and cultural exchange. You'll see the work, meet the women, and understand why argan oil is expensive—the labor is immense. Many cooperatives also produce shea butter, herbal products, and beauty goods. Purchasing from cooperatives directly supports women's economic empowerment. Prices are lower than tourist shops, and quality is guaranteed.",im:"A woman in traditional dress sits before a wooden press, cracking argan nuts with steady rhythm, the kernel dust coating her hands.",t:"Located in small villages south of Marrakech, particularly around Essaouira direction. Organized tours are available; alternatively, hire a car and driver. Allow 2-3 hours including demonstration and shopping. Bring cash. Prices are negotiable. Many cooperatives will show you production processes.",c:[],r:"g",nn:"تعاونيات زيت الأرغان",ns:"مراكز إنتاج زيت الأرغان",nst:"نساء بربريات ينتجن زيت الأرغان النفيس. القيمة مرتفعة لأن العملية يدوية متعبة.",nt:"في القرى خارج مراكش. استأجر سيارة. شاهد العملية. اشتري مباشرة من النساء."},
  {id:18,n:"Jebel Toubkal (Multi-Day Trek) — North Africa's Highest Peak",a:"Day Trips",v:["nature", "views", "hidden"],d:180,s:"2-3 day trek to North Africa's highest mountain (4,167m) with stunning Atlas views and Berber guesthouses.",st:"Jebel Toubkal is a serious mountain but technically non-technical; climbers need fitness more than climbing skill. A typical trek involves starting in Imlil village (1.5 hours from Marrakech), trekking upward through Berber villages and alpine meadows on day one, sleeping at a mountain refuge, and summiting on day two. The views from the top are breathtaking: you can see all the way to the Sahara on clear days, and the Atlas spreads below in folds of brown and white. The descent is fast; most people return to Imlil by afternoon day two. Guides are essential; they navigate, provide cultural context, and support trekkers. Mountain refuges are basic: dormitory rooms, communal dinners, lots of other trekkers. The trek is popular but not overcrowded; the effort required keeps casual hikers away. Many do the trek to say they've climbed North Africa's highest peak; most find the experience itself—the trek, the people, the landscape—more valuable than the summit.",im:"At sunrise from the summit, you stand above clouds, and Africa stretches below in every direction.",t:"Requires 2-3 days. Organized treks from Marrakech are available; guides, food, refuge accommodation all included. Alternatively, independent trekking with hired guide. Start early in day for acclimatization. Bring warm layers; high altitude means temperature drops. No supplies on mountain except at refuge.",c:[],r:"g",nn:"جبل توبكال",ns:"أعلى جبل في شمال أفريقيا",nst:"رحلة تسلق لمدة يومين أو ثلاثة. 4167 متر عالياً. إطلالات مذهلة على الصحراء والأطلس.",nt:"استأجر دليلاً. احضر طبقات دافئة. لا مجهود تقني لكن يحتاج لياقة بدنية."},
  {id:19,n:"Essaouira (Beach Town Day Trip) — Ocean Breeze and Fresh Fish",a:"Day Trips",v:["nature", "food", "hidden"],d:60,s:"Coastal town 2.5 hours west with beaches, fresh seafood, and windsurfing, less touristy than beach resorts.",st:"Essaouira is Morocco's coastal alternative to Marrakech. Built by the Portuguese, later French-influenced, it has a colonial charm distinct from Moroccan interior towns. The medina is open and airy compared to Marrakech's claustrophobic alleys; blue fishing boats dot the harbor; fresh fish markets sell tuna, sardines, and grouper. The beach is wide, windy, and popular with kitesurfers. The harbor has excellent fresh seafood restaurants where you select your fish and watch it grilled before you. The town is less intensely touristic than Marrakech but increasingly popular; it's finding a balance between tourism and authenticity. The three-hour drive west crosses dramatic landscape: mountains give way to coastal plains. Many visit Essaouira for a day, returning to Marrakech in evening; others stay overnight, enjoying the ocean breeze and pace change.",im:"Blue fishing boats sit in the harbor as fishermen mend nets, and the smell of grilled fish fills the air above the Atlantic crash.",t:"Located 2.5 hours west by car or shared bus. Organized tours from Marrakech available; alternatively hire a car. Best to visit early morning for fresh fish markets. The beach is beautiful but cold (Atlantic water). Windsurfing schools available. Allow 8-10 hours for a day trip.",c:[],r:"g",nn:"الصويرة",ns:"مدينة ساحلية جميلة",nst:"مدينة على الساحل بـ 2.5 ساعة غرباً. ميناء جميل وأسماك طازة وشاطئ رملي.",nt:"رحلة يومية من مراكش. السمك الطازج في السوق. الشاطئ جميل لكن الماء بارد."},
  {id:20,n:"Clothing and Textile Workshops — Berber Weaving",a:"Medina Center",v:["local", "art", "hidden"],d:15,s:"Workshops where Berber women weave carpets and textiles on traditional looms, with some offering visitors participation.",st:"Traditional Moroccan carpets are woven by hand on vertical looms, a process unchanged for centuries. In various riads and workshops, you can watch (and sometimes participate in) the weaving process. Berber women work on looms strung with hundreds of knots, fingers flying across the warp, creating intricate geometric patterns. The dyes are traditionally natural—indigo for blue, cochineal for red, pomegranate for yellows. Modern workshops sometimes use synthetic dyes for speed and consistency, though traditional dyers still exist. Purchasing directly from weavers supports them far more than buying from shops or souks. Some workshops offer half-day weaving classes where tourists learn the basics of pattern and loom work—an humbling experience that reveals the skill required. The carpets are works of art; many take months to complete. A conversation with a weaver reveals not just technique but cultural values encoded in patterns.",im:"Fingers move in hypnotic rhythm across the loom, creating a pattern that has been woven by Berber women for a thousand years.",t:"Workshops are scattered throughout the medina and in surrounding villages. Ask your riad owner for recommendations. Some are genuinely cooperative; others are tourist traps. Look for weavers who seem to be actually working, not posing. Allow 1-2 hours for a visit. Purchasing direct supports the weavers.",c:[],r:"g",nn:"ورش نسج السجاد",ns:"ورش نسج البربر التقليدي",nst:"نساء بربريات ينسجن السجاد على نول تقليدي. العملية يدوية وتستغرق أشهراً.",nt:"اسأل صاحب الرياد عن الورش الحقيقية. قد تتعلم النسج بنفسك. اشترِ مباشرة من الناسجات."},
  {id:21,n:"Jemaa el-Fnaa at Night — The Spectacle Intensifies",a:"Medina Center",v:["local", "food", "night"],d:20,s:"Evening transformation of the plaza into an open-air food market with dozens of stalls and crowds.",st:"As sunset falls, Jemaa el-Fnaa transforms into an entirely different space. Daytime performers mostly depart; food vendors arrive, transforming the plaza into a massive outdoor restaurant. Dozens of stalls emerge, each offering different dishes: grilled meats, seafood, tajines, soups, desserts. The smell is overwhelming—cumin, charcoal, saffron mixing in a sensory explosion. Smoke rises from grills; crowds gather around the busiest stalls. Tables are set up, and tourists mix with locals eating dinner. The vibe is festive, almost carnival-like. Musicians still perform, but the energy shifts from daytime spectacle to nighttime sustenance. It's less performative and more genuine—this is where Marrakech eats. Health standards vary; busy stalls with high turnover are safest. The food is cheap and mostly authentic. Eating here is quintessential Marrakech experience—loud, crowded, delicious, and thoroughly alive.",im:"Smoke and steam rise from grills as a vendor hands a plate to a customer, and the plaza becomes a sea of people and food.",t:"Best from sunset (around 7pm) to midnight. Stalls operate irregularly; most popular operate consistently. Food costs 20-80 dirhams per plate. Bring cash; most stalls are cash-only. Eat where crowds are (sign of freshness). Have small change for vendors. Bring an appetite and open mind.",c:[],r:"g",nn:"ساحة جامع الفنا بالليل",ns:"الساحة تتحول إلى سوق طعام",nst:"عند الغروب، تظهر عشرات محلات الطعام. الجو احتفالي وحقيقي. الطعام رخيص وطازج.",nt:"اذهب بعد الغروب. احضر نقوداً. كل حيث الزحام (علامة على الطازة). كن مستعداً للزحام."},
  {id:22,n:"Dar Si Said Museum — Decorative Arts and Crafts",a:"Medina Center",v:["art", "history", "architecture"],d:15,s:"Palace-turned-museum showcasing Moroccan decorative arts: carpets, jewelry, metalwork, and traditional crafts.",st:"Dar Si Said is a palace converted into a museum of Moroccan applied arts. Unlike Bahia, which is grand and touristed, Dar Si Said is intimate and undervisited. The building itself is instructive: carved cedar ceilings, zellige tilework, carved plaster walls demonstrate techniques collected within. The collections include antique Berber carpets from surrounding regions, each with distinct patterns and techniques; traditional leather bindings and calligraphy from Islamic manuscripts; metalwork including brass and copper vessels; and jewelry—bracelets, necklaces, and brooches reflecting regional styles and wealth. A room is dedicated to traditional dress from various Moroccan regions, showing how climate and culture influenced textile choices. The museum is less crowded than Bahia, allowing contemplation. The craftsmanship on display is extraordinary—pieces that took months or years to create are presented without fanfare.",im:"An antique Berber carpet hangs in soft light, its geometric patterns catching the eye in an endless mathematical dance.",t:"Located south of Jemaa el-Fnaa in the medina. Open 9am-5pm (7pm in summer), closed Tuesdays. Moderate entrance fee. A guide is worthwhile. Allow 1-2 hours. Photography allowed. Less crowded than Bahia.",c:[],r:"g",nn:"دار السعيد",ns:"متحف الفنون الزخرفية",nst:"قصر محول إلى متحف. يعرض السجاد البربري والمعادن والحلي التقليدية.",nt:"أقل ازدحاماً من القصر الباهية. استأجر دليلاً. التصوير مسموح."},
  {id:23,n:"Day Spa and Wellness Retreats — Modern Relaxation",a:"New Town",v:["beautiful", "modern", "hidden"],d:20,s:"Luxury spas and wellness centers in the new town offering massages, hammams, and beauty treatments.",st:"While traditional hammams are communal and intense, modern spas offer luxurious alternatives. Scattered through the new town and upscale riads, these spas combine traditional Moroccan treatments with modern comfort: private hammam rooms, massage therapies, facials using argan oil. The difference from traditional hammams is stark: here, the scrubbing is gentle; privacy is guaranteed; and the experience is designed for relaxation rather than cleansing. Therapists are professionally trained. Many tourists find the spas more approachable than traditional hammams, particularly for first-timers nervous about the intensity. The treatments can be pricey (100-300 dirhams for massages), but they're indulgences designed for travelers seeking rest. Some spas also offer yoga and meditation classes, making them full wellness destinations.",im:"A woman lies on heated stone, soft hands massaging her shoulders while Moroccan music plays and scented steam drifts through the dim room.",t:"Located in new town and upscale riads. Book in advance, particularly for peak times. Prices higher than traditional hammams. Allow 2-3 hours for full treatments. Bring swimwear if comfortable; some offer privacy, others offer traditional gender segregation.",c:[],r:"g",nn:"منتجعات الصحة والعافية",ns:"منتجعات فاخرة للاسترخاء",nst:"مراكز حديثة توفر تدليك وحمام و مستحضرات جمال. مريحة وفاخرة.",nt:"احجز مسبقاً. أغلى من الحمام التقليدي. الخدمة احترافية وهادئة."},
  {id:24,n:"Tamaterte Town — Pottery and Clay",a:"Day Trips",v:["art", "local", "hidden"],d:30,s:"Small village 45 minutes northeast specializing in pottery, with workshops and kilns open to visitors.",st:"Tamaterte is a pottery village where potters have worked for generations, creating water vessels, cooking pots, and decorative ceramics. The clay comes from the surrounding mountains; potters form it by hand without wheels—a technique called 'hand-building.' The shapes are organic, slightly asymmetrical, more beautiful for their imperfection. Decorative patterns are incised by hand or finger-pressed. The kilns are traditional wood-fired—intense heat producing rich colors and variations. Many workshops are open to visitors; you can watch potters work and purchase directly. The pottery is cheaper here than in Marrakech's tourist shops, and you're supporting the artisans. Some workshops offer half-day pottery classes where you learn to hand-build a simple vessel—an engaging experience requiring little skill but immense patience.",im:"A potter's hands shape clay into a water vessel, fingers remembering a form passed down through his family for centuries.",t:"Located 45 minutes northeast by car. Organized tours available; alternatively hire a car and driver. Allow 3-4 hours for village visit and pottery observation. The village is small and quiet; few tourists. Pottery is heavy; consider shipping purchases.",c:[],r:"g",nn:"قرية تماتارت",ns:"قرية متخصصة في الفخار",nst:"قرية صغيرة على بعد 45 دقيقة. خزافون يصنعون الفخار بالطريقة التقليدية.",nt:"رحلة نصف يومية. استأجر سيارة. شاهد الحرفيين. اشتري مباشرة."},
  {id:25,n:"Tatooine (Aitbenhaddou Alternative) — Star Wars Filming Locations",a:"Day Trips",v:["hidden", "modern", "views"],d:60,s:"Desert film set (Star Wars, Gladiator) south of Ouarzazate, offering set tours and desert landscape.",st:"About an hour south of Ouarzazate lies a real Tatooine: the Star Wars film set, now a tourist attraction. For the 1977 original, Tunisian desert was used; for later films, Morocco became the location. The set—now partially restored as a museum—includes domed structures, corridor facades, and iconic locations where scenes were filmed. The surrounding landscape is quintessential Saharan: sand dunes, rock formations, and the emptiness that made it perfect for a fictional planet. Visitors can walk the set, climb the domed buildings, and imagine themselves in the Star Wars universe. It's touristy but harmless; the setting is genuinely compelling. The drive south through Ouarzazate, Morocco's 'Hollywood of Africa,' passes through dramatic landscape. The set tour usually includes a kasbah (fortress) visit and desert camp experience with mint tea and Saharan culture.",im:"A child stands at the cockpit of a painted Star Wars building, silhouetted against an endless desert horizon.",t:"Located near Aitbenhaddou, 1.5 hours south of Ouarzazate. Organized tours from Marrakech include transport and guide. Allow 8-10 hours for day trip. The site is outdoors; bring sun protection and water. Photography excellent.",c:[],r:"g",nn:"موقع تصوير تاتوين",ns:"موقع تصوير حرب النجوم",nst:"موقع تصوير فيلم الحرب والكلاديتر. الآن موقع سياحي. صحراء حقيقية جميلة.",nt:"جنوب ورزازات بـ ساعة ونصف. احضر حماية من الشمس. رحلة يومية كاملة."},
  {id:26,n:"Cooking Class in a Riad — Tagine and Couscous Mastery",a:"Medina Center",v:["food", "local", "art"],d:25,s:"Half-day cooking classes in riad courtyards teaching traditional Moroccan dishes with ingredients and technique.",st:"Many riads now offer cooking classes where a local chef teaches you to prepare traditional Moroccan dishes. A typical class begins at the market, selecting fresh ingredients with the chef, who explains each item's significance. Back in the riad kitchen or courtyard, you'll learn to prepare a three-course meal: a traditional Moroccan salad, a tagine (slow-cooked stew) or couscous, and a sweet dish or dessert. The instruction is patient; the chef explains technique, flavor combinations, and traditional approaches. You cook alongside the chef, hands in the action. At the end, you eat what you've prepared, often sitting in the riad's courtyard. It's cultural immersion paired with delicious food. Many travelers rank this among their most memorable Marrakech experiences: you leave with skills, recipes, and deep appreciation for Moroccan foodways.",im:"Your hands stir a pot of aromatic tagine as the chef watches approvingly, and the smell of cinnamon and cumin fills the riad courtyard.",t:"Classes offered by most riads; book in advance. Typically 3-4 hours in the morning or afternoon. Classes cost 250-400 dirhams including ingredients and meal. Some include market visits. Vegetarian options available. The instructor speaks some English; phrasebooks help. Aprons provided.",c:[],r:"g",nn:"دروس طبخ مغربي",ns:"درس طبخ في رياد",nst:"تعلم إعداد الطاجين والكسكس والحلويات المغربية. تجربة ثقافية عميقة.",nt:"احجز مسبقاً. عادة صباحاً. الكلفة معقولة. تجربة لا تُنسى."},
  {id:27,n:"Camel Trekking in Merzouga (Multi-Day) — Sahara Desert Experience",a:"Day Trips",v:["nature", "adventure", "hidden"],d:240,s:"2-3 day camel trek in the Sahara desert with overnight in a Berber camp, departing from Merzouga village.",st:"The Merzouga desert is the real Sahara—a sea of sand dunes with nothing for miles in any direction. A typical trek involves driving from Marrakech to Merzouga (7-8 hours), spending the first night in a riad or hotel, then departing early morning on camel. You ride across dunes; the camel's motion is hypnotic. At midday, you rest in the shade; guides prepare a simple lunch. In late afternoon, you reach a Berber camp where you'll sleep in a traditional tent. Dinner is prepared over a fire; storytelling and music follow. You sleep on a mat under stars—the Milky Way is visible with stunning clarity. The next morning, you wake before sunrise, climb a dune to watch dawn, then return to the camp for breakfast. By afternoon, you're departing on camel back. The entire experience is surreal: the isolation, the vastness, the pace—everything is stripped away except the essential.",im:"Under a star-filled sky, you lie on a mat in a Berber tent, and the weight of centuries and solitude presses down on you like a blessing.",t:"Requires 2-3 days minimum. Organized treks from Marrakech include transport, camel rental, guide, food, and tent accommodation. Very popular; book in advance. The drive is long but scenic. Camel riding is uncomfortable for first-timers; expect soreness. Bring sun protection, hat, and warm layers (desert gets cold at night). The experience is life-changing for most.",c:[],r:"g",nn:"ركوب الجمال في مرزوقة",ns:"رحلة صحراوية بالجمل",nst:"رحلة لمدة يومين أو ثلاثة في الصحراء. نوم في خيمة بربرية تحت النجوم.",nt:"احجز مسبقاً. رحلة طويلة لكن جميلة. تجربة لا تُنسى حقاً."},
  {id:28,n:"Modern Marrakech (Art Galleries and Boutiques) — Contemporary Scene",a:"New Town",v:["art", "modern", "hidden"],d:15,s:"Galleries and boutique shops in the new town showcasing contemporary Moroccan art, design, and fashion.",st:"Beyond the medina's ancient traditions, modern Marrakech has emerged as an artistic and design destination. Contemporary art galleries display works by Moroccan and African artists. Boutique shops feature high-end Moroccan design: updated textiles, innovative leather goods, jewelry combining traditional and modern aesthetics. The new town has a different vibe from the medina: open streets, fewer crowds, quieter pace. The artistic scene is growing: galleries host openings, designers collaborate on collections, and young Moroccans are reinterpreting tradition through modern lenses. This Marrakech is less touristic, more reflective of how the city is evolving. Many visitors spend all their time in the medina and miss this entirely; those who venture into the new town find a Marrakech imagining its future.",im:"A minimalist gallery displays a painting merging traditional Berber patterns with abstract expressionism—East meeting West.",t:"Located in the new town, northwest of medina. Accessible by taxi or on foot from central areas. Allow 2-3 hours to browse galleries and shops. Many close midday for lunch. Cafés and restaurants in the area are excellent. Much less touristy than medina.",c:[],r:"g",nn:"مراكش الحديثة",ns:"معارض فن حديث",nst:"معارض وأكوام تعرض فن مغربي معاصر. تصميم وموضة حديثة.",nt:"في المدينة الحديثة. أقل ازدحاماً من المدينة القديمة. تكتشف مراكش المستقبل."},
  {id:29,n:"Anima Garden — Jean Clow's Private Garden Paradise",a:"Day Trips",v:["nature", "beautiful", "hidden"],d:45,s:"Private garden project of artist Jean Clow, 40km south, featuring sculptural gardens and philosophical spaces.",st:"Anima Garden is the vision of a single man: artist Jean Clow created this 32-hectare garden south of Marrakech as his life's work. Unlike Majorelle (which is designed), Anima is organic—paths wind through plants and sculptures seemingly emerging from wilderness. Clow's artwork—bronze sculptures, installations, and painted stones—are scattered throughout. The garden evolves seasonally; the artist is still active, still modifying the space. It's less polished than Majorelle but more philosophical—a meditation on art, nature, and the artist's relationship to landscape. The garden includes a library, studio, and contemplative spaces. Visiting requires hiring a car (it's remote), but the journey is worthwhile for artists, designers, or anyone seeking beauty outside tourist frameworks. The garden feels like stepping into an artist's dream—which, essentially, it is.",im:"A bronze sculpture of a reclining figure overlooks a garden of wild plants, and you understand that this is one man's vision made manifest.",t:"Located 40km south, near Imin'Tanout. Difficult to reach without a car and driver; organized tours are available. Allow 4-5 hours including drive. Open by appointment primarily; call ahead. Photography allowed. Most visit as a full-day excursion.",c:[],r:"g",nn:"حديقة أنيما",ns:"حديقة فنية خاصة",nst:"حديقة شخصية لفنان جان كلو. 32 هكتار من الطبيعة والفن.",nt:"استأجر سيارة. حوالي ساعة من مراكش. اتصل مقدماً. تجربة حقاً فريدة."},
  {id:30,n:"Sunset from High Atlas Peaks — Mountain Sanctuary",a:"Day Trips",v:["nature", "views", "beautiful"],d:30,s:"Drive to high altitudes in the Atlas Mountains for sunset, returning under stars, with breathtaking vistas.",st:"An afternoon drive into the Atlas Mountains to high altitude (1,800-2,000m) offers a completely different Marrakech experience. The landscape shifts from arid foothills to pine forests to rocky peaks. At a viewpoint overlooking the Marrakech plain below, you're positioned between the city and the Sahara—the curvature of the earth seems visible. As sunset approaches, the light transforms: the plain becomes golden, then rose, then purple. The sky ignites in colors that seem impossible. From this height, Marrakech is a collection of lights far below; the vastness of the landscape becomes apparent. Some drives continue higher, to ski station-level altitude (3,000m), where snow is possible even in spring. The return drive descends through darkness, the lights of Marrakech growing closer like a promise of the city below.",im:"The plain glows rose-gold beneath you, the Atlas rises purple to the south, and the Sahara stretches endlessly beyond.",t:"Organized sunset drives are available from Marrakech, typically 4-5 hours. Alternatively, hire a car and driver. Bring warm layers; altitude means temperature drops sharply. The drive is scenic; camera work excellent. Return is after dark; ensure a responsible driver.",c:[],r:"g",nn:"غروب من ذرى الأطلس",ns:"رحلة جبلية للغروب",nst:"رحلة لرؤية الغروب من الجبال العالية. إطلالات لا تُنسى على السهول والصحراء.",nt:"احضر طبقات دافئة. أفضل في المساء. المنظر مذهل."}
,
  {id:31,n:"Jemaa el-Fnaa Square — Morning Before Crowds",a:"Medina",v:["markets","local","beautiful"],d:5,s:"Jemaa el-Fnaa is chaos by day but at 7am it's quiet, the light is golden, and you see the real square before the tourist machinery wakes.",st:"Jemaa el-Fnaa is Marrakech's main square. By day, it's snake charmers and tourist stalls. At dawn, it's locals buying food, water sellers setting up, the light hitting the buildings golden.",im:"The square at 7am. Golden light. A few vendors. A few locals. The sound of the city waking. No crowds.",t:"Go 6:30–8am any day. Arrive from a side alley if possible. Coffee shops open early. Sit and watch. It's free. By 9am tourists start arriving.",c:["markets","local"],r:"g",nn:"ساحة جامع الفنا",ns:"ساحة جامع الفنا في الصباح قبل الحشود",nst:"ساحة جامع الفنا هي الساحة الرئيسية في مراكش. في النهار، إنها فوضى.",nt:"اذهب 6:30–8 صباحًا أي يوم."},
  {id:32,n:"Palais de la Bahia — Empty Palace Interior",a:"Medina",v:["history","beautiful","quiet"],d:8,s:"A 19th-century palace with intricate tile work, carved wood, and fountains—usually quiet even with entrance fees.",st:"Palais de la Bahia is one of Marrakech's most beautiful buildings. Inside are rooms decorated with zellige tile, cedar carvings, and fountains. Most tourists skip it for the souk.",im:"Inside a room with high ceilings. Geometric tiles covering walls. Intricate wood. A fountain. The space empty. Light from windows. Cool air.",t:"Located in the medina near Jemaa el-Fnaa. Entry: 70–80 MAD. Open 9am–5:30pm daily. Go 10am or 3pm for fewer people. Allow 1 hour. Respect the space—it's still lived in.",c:["history","beautiful"],r:"g",nn:"قصر الباهية",ns:"قصر من القرن التاسع عشر بنقوش بلاطية معقدة وخشب منقوش.",nst:"قصر الباهية هو أحد أجمل المباني في مراكش.",nt:"يقع في المدينة بالقرب من ساحة جامع الفنا."},
  {id:33,n:"Argan Oil Cooperatives — Countryside Visit",a:"Argan Region",v:["day_trips","local","beautiful"],d:60,s:"Women's cooperatives crush argan nuts by hand and press the oil—you can visit, watch the process, and buy directly from the source.",st:"Argan oil is Moroccan gold. In countryside villages, women's cooperatives produce it using traditional methods. They crack nuts by hand, roast them, and press the oil.",im:"Women sitting in a circle cracking nuts. The smell of roasting nuts. The oil being pressed. The countryside beyond.",t:"Hire a driver or join a tour (200–300 MAD). The cooperatives are 30–40km outside Marrakech. Go morning. Buy oil directly (much cheaper than shops). Allow 3–4 hours.",c:["day_trips","local"],r:"y",nn:"تعاونيات زيت الأرغان",ns:"تعاونيات نسائية حيث تُسحق ثمار الأرغان يدويًا.",nst:"زيت الأرغان هو الذهب المغربي. في قرى الريف، تنتج التعاونيات النسائية زيت الأرغان.",nt:"استأجر سائقًا أو انضم إلى جولة سياحية."},
  {id:34,n:"Koutoubia Mosque — Sunset From Outside",a:"Medina",v:["history","beautiful","sunset","greatest_hits"],d:3,s:"The Koutoubia Mosque is Marrakech's most important mosque—non-Muslims can't enter, but the outside at sunset is one of the city's greatest sights.",st:"Koutoubia Mosque is Marrakech's symbol. The minaret is visible from everywhere. Non-Muslims can't enter the mosque, but the courtyard and gardens are accessible.",im:"The minaret at sunset. The light turning the stone pink. The gardens quiet. A few people sitting. The city beyond.",t:"Go at 5pm (winter) or 5:30pm (summer). The gardens are free. Open outside prayer times. Bring water. Sit and watch the light change.",c:["history","beautiful","greatest_hits"],r:"g",nn:"مسجد الكتبية",ns:"مسجد الكتبية هو أهم مسجد في مراكش.",nst:"مسجد الكتبية هو رمز مراكش. المئذنة مرئية من كل مكان.",nt:"اذهب في 5 مساءً (الشتاء) أو 5:30 مساءً (الصيف)."},
  {id:35,n:"Jemaa el-Fnaa Square — The Heartbeat",a:"Medina",v:["beautiful"],d:30,s:"UNESCO site and Morocco\'s most famous plaza — storytellers, musicians, snake charmers, and food stalls creating sensory chaos",st:"Jemaa el-Fnaa is chaos and energy. Snake charmers play pipes. Musicians play traditional instruments. Storytellers gather crowds. Acrobats perform. Food vendors grill meat. Tourists and locals mingle. Go at dusk when the square is most alive and the vendors light up. Don\'t miss the rooftop restaurants overlooking it.",im:"Snake charmers with baskets. Musicians playing. Crowds gathered. Acrobats flipping. Smoke from grills. Rooftop restaurants with city views. The golden light at dusk. The energy is intoxicating.",t:"Free to walk. Central Medina location. Best 4pm-10pm (cooler and more atmospheric). Rooftop restaurants offer views and dinner (budget 100-200 MAD). Photography: ask before photographing people (some want money). This is the absolute heart of Marrakech.",c:["greatest_hits"],r:"g",nn:"جماع الفناء",ns:"Jemaa el-Fnaa Square — جماع الفناء الساحة",nst:"جماع الفناء هي فوضى والطاقة. يقومون محرري الأفاعي بعزف الأنابيب.",nt:"مجاني. موقع Medina المركزي. الأفضل 16-22."},
  {id:36,n:"Bahia Palace — Opulent Moroccan Architecture",a:"Medina",v:["beautiful"],d:30,s:"Ornate 19th-century palace with intricate zellige tilework and stunning gardens — a showcase of Moroccan luxury",st:"Walk through rooms with ceilings decorated with carved cedar. Tilework (zellige) covers walls in geometric patterns. Gardens are peaceful oases of plants and water features. The palace sprawls over multiple courtyards. It was built over 50 years. The detail is extraordinary.",im:"Ornate carved cedar ceilings. Blue zellige tile patterns. Quiet courtyards with fountains. Plants everywhere. Light filtering through latticed windows. The sense of luxury and leisure preserved.",t:"120 MAD entry (~$11). Medina location. 1.5-2 hours. Guides available (tip afterward). Photography allowed. Best 10am-12pm (fewer crowds). The gardens are the highlight. Wear comfortable shoes for the maze of rooms.",c:["greatest_hits"],r:"g",nn:"قصر بهية",ns:"Bahia Palace — قصر بهية القصر المزخرف",nst:"اغفر عن الأسقف المزخرفة بخشب الأرز المنحوت.",nt:"120 درهم مغربي. موقع Medina. 1.5-2 ساعة."},
  {id:37,n:"Majorelle Garden — Blue Oasis",a:"Gueliz",v:["beautiful"],d:30,s:"Exotic garden designed by a French artist — vibrant blue buildings, pools, and cacti creating an otherworldly space",st:"The garden is surreal. Electric blue buildings. Exotic plants from around the world. Water features and pathways. The color blue is everywhere, creating a dreamlike atmosphere. It was designed by Jacques Majorelle and later restored by Yves Saint Laurent. It\'s peaceful and magical.",im:"Brilliant blue structures. Exotic cacti and plants. Still pools of water. Pathways creating exploration. The color contrast between blue and green plants. The sense of stepping into another world.",t:"110 MAD entry (~$10). Gueliz area (south of medina). 1-1.5 hours. Open 8am-6pm (5pm in winter). Early morning is less crowded. Photography is beautiful; bring a camera. The museum (Berber Museum) inside costs extra. This is a mandatory stop for color photography.",c:["greatest_hits"],r:"g",nn:"حديقة ماجوريل",ns:"Majorelle Garden — حديقة ماجوريل الزرقاء الواحة",nst:"الحديقة غير واقعية. المباني الزرقاء الكهربائية.",nt:"110 درهم مغربي. منطقة Gueliz. 1-1.5 ساعة."},
  {id:38,n:"Medina Souks — Labyrinthine Bazaars",a:"Medina",v:["beautiful"],d:30,s:"Complex of interconnected bazaars selling everything — textiles, leather, spices, lanterns, and Moroccan crafts",st:"Get lost in the souks. The narrow streets twist and turn. Every corner offers something new. Leather workers hammer hides. Spice vendors sell fragrant mountains. Textile merchants show carpets and fabrics. It\'s overwhelming and wonderful. Guides help navigate; hire one if you\'re overwhelmed. Negotiate prices.",im:"Narrow twisted streets. Stacks of colorful textiles. Leather goods hanging. Spice mountains. Lanterns gleaming. Merchants calling out. The smell of leather, spices, and incense. Constant haggling. The sensory overload of a traditional bazaar.",t:"Free to walk (shopping costs money). Medina souks. Best 10am-1pm or 4pm-8pm (avoid midday heat). Hire a guide (100-150 MAD) if needed. Wear comfortable shoes; you\'ll walk for hours. Bring cash for small vendors. This is the authentic souk experience.",c:["greatest_hits"],r:"g",nn:"أسواق الميدينة",ns:"Medina Souks — أسواق الميدينة المتاهة",nst:"فقدان نفسك في الأسواق. الشوارع الضيقة تلتوي والتفاف.",nt:"مجاني للمشي. أسواق الميدينة. الأفضل 10-13 أو 16-20."},
  {id:39,n:"Saadian Tombs — Royal Underground Burial Site",a:"Medina",v:["beautiful"],d:30,s:"Underground royal tombs from the 16th century — decorated chambers and the bodies of sultans preserved for centuries",st:"The tombs are underground and accessed through a small entrance. They\'re richly decorated with zellige tilework and carved cedar. The underground chambers hold the bodies of sultans and family. It\'s quiet, cool, and deeply respectful. Photography is restricted in some areas.",im:"Ornate underground chambers. Zellige tilework. Carved cedar. The bodies of sultans in sarcophagi. The quiet reverence of the space. Candlelight illuminating the decorations.",t:"120 MAD entry (~$11). Medina location (south of Jemaa el-Fnaa). 30-45 minutes. Open 9am-5pm. Respectful dress required. Photography allowed (except where marked). Less crowded than Bahia Palace. The underground chambers are cool, which is pleasant.",c:["greatest_hits"],r:"g",nn:"مقابر السعديين",ns:"Saadian Tombs — مقابر السعديين الملكية",nst:"الأضرحة تحت الأرض يتم الوصول إليها من خلال مدخل صغير.",nt:"120 درهم مغربي. موقع Medina. 30-45 دقيقة."}];
