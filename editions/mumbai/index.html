  {id:52,n:"Bandra Bandstand Promenade — Sunset Walk Past Iconic Homes",a:"West Mumbai",v:["greatest_hits","romantic_water"],d:60,s:"Walk the rocky promenade at Bandra Bandstand at sunset—the path curves along the sea, passes celebrity homes, and feels like a quiet film scene.",st:"It\'s a working-class promenade that accidentally became famous for one reason: it faces the sea at sunset, and celebrities live nearby. Walk the rocks. Watch couples gather as the light changes. See the homes of Bollywood stars from the public path (no trespassing needed—the view is from water\'s edge). The promenade is peaceful because most tourists don\'t know it exists.",im:"Rocky coastline meeting calm water. The sun disappearing into the Arabian Sea. Silhouettes of couples against golden light. The distant lights of Mumbai coming on.",t:"Free. Bandra Bandstand (west Mumbai). Best 5-7pm (sunset). Go on weekdays (weekends are crowded). Wear shoes with good grip; rocks are slippery, especially if wet. This is romantic and peaceful. Photography is gorgeous here. Avoid after dark.",c:["greatest_hits","romantic_water"],r:"g",nn:"बांद्रा बैंडस्टैंड प्रोमेनेड",ns:"Bandra Bandstand Promenade — सूर्यास्त सैर प्रतिष्ठित घरों के पास",nst:"बांद्रा बैंडस्टैंड पर प्रोमेनेड पर चलें — रास्ता समुद्र के साथ घूमता है।",nt:"मुफ़्त। बांद्रा बैंडस्टैंड। 17-19 सर्वश्रेष्ठ।"},
  {id:53,n:"Leopold Café — Shantaram\'s Bullet Holes and Chai Culture",a:"Colaba",v:["greatest_hits","history_big"],d:30,s:"The famous café from Gregory David Roberts\' novel Shantaram—the 2008 attack bullets still mark the walls, and locals still gather for chai and conversation.",st:"It\'s a working café. People sit, eat, and talk. The bullet holes in the wall are from the 2008 Mumbai attacks. They remain as a scar and a symbol of resilience. The café didn\'t close. It didn\'t hide the damage. It serves chai and became more famous. The locals sit unbothered. The tourists stare at walls.",im:"Bullet-scarred walls behind tables of chai drinkers. The worn facade. The smell of black tea and milk. Conversations happening as if the walls weren\'t marked by violence.",t:"Free to sit (chai ~80 INR). Colaba area (south Mumbai). Best 9am-11am or 4-6pm. It\'s a real café, not a museum. Order something; support the place. Watch valuables in crowds. This is both a memorial and a place of everyday life.",c:["greatest_hits","history_big"],r:"g",nn:"लियोपोल्ड कैफ़े",ns:"Leopold Café — Shantaram\'s बुलेट होल और चाय संस्कृति",nst:"Gregory David Roberts\' उपन्यास शांतरम से प्रसिद्ध कैफ़े।",nt:"मुफ़्त (चाय ~80 रुपये)। कोलाबा। 9-11 या 16-18 सर्वश्रेष्ठ।"},
  {id:54,n:"Bhau Daji Lad Museum — Victorian Architecture Meets Indian Art",a:"Byculla",v:["greatest_hits","history_big"],d:120,s:"A beautifully restored 1862 Victorian museum houses Indian decorative arts, textiles, and sculptures—the building itself is as beautiful as what\'s inside.",st:"The museum sits in Veermata Jijabai Bhonsale City Museum (formally known as Bhau Daji Lad Museum). The restoration was meticulous. The gallery is bright and airy. You\'ll see Indian textiles, traditional crafts, sculptures, and decorative objects. The architecture is Gothic Revival with Indian touches. It feels less like a museum and more like stepping into a collector\'s home from 1862.",im:"High ceilings and arched windows letting in golden light. Indian textile patterns hanging in neat rows. Sculptures on pedestals. The polished wooden floors and ornate railings of a Victorian-era building.",t:"Entry: 300 INR. Byculla area (central Mumbai). Closed Mondays. Best 10am-5pm. Budget 1.5-2 hours. Photography allowed. This is one of Mumbai\'s most beautiful buildings. The restoration is a masterclass.",c:["greatest_hits","history_big"],r:"g",nn:"भाऊ दाजी लाड संग्रहालय",ns:"Bhau Daji Lad Museum — विक्टोरियन आर्किटेक्चर भारतीय कला से मिलता है",nst:"1862 का सुंदर बहाल विक्टोरियन संग्रहालय भारतीय सजावटी कला रखता है।",nt:"प्रवेश: 300 रुपये। बाईकुला। सोमवार बंद।"},
  {id:55,n:"Mahalaxmi Temple — Hilltop Shrine with Sea Views and Morning Ritual",a:"South Mumbai",v:["greatest_hits","high_spots"],d:45,s:"Perched on a hilltop overlooking the Arabian Sea, this ancient temple draws pilgrims at dawn—the climb rewards you with view and a glimpse of devotion.",st:"The temple is old (exact age debated, but centuries old). The view from the hilltop is unobstructed sea. At dawn, pilgrims arrive. You\'ll see people bringing flowers, ringing bells, pouring water—the rituals unchanged for generations. The temple is simple; the setting is extraordinary. The dawn light on the sea while people pray is the whole experience.",im:"Stone steps ascending a hill. A small temple silhouetted against the dawn sky. The sea spreading below. Flowers and bells. The warmth of the rising sun.",t:"Free. Mahalaxmi area (south Mumbai). Open dawn to dusk. Best 5-7am (fewer crowds, best light). Wear respectful clothing. The steps are uneven; go carefully. This is a working temple. The view justifies the climb.",c:["greatest_hits","high_spots"],r:"g",nn:"महालक्ष्मी मंदिर",ns:"Mahalaxmi Temple — समुद्र के दृश्य के साथ पहाड़ी मंदिर",nst:"अरब सागर को देखते हुए एक पहाड़ी पर स्थित, यह प्राचीन मंदिर भोर में तीर्थयात्रियों को आकर्षित करता है।",nt:"मुफ़्त। महालक्ष्मी क्षेत्र। 5-7 सुबह सर्वश्रेष्ठ।"},
  {id:56,n:"Flora Fountain (Hutatma Chowk) — Art Deco Heart of Fort District",a:"South Mumbai",v:["beautiful","neighborhoods"],d:30,s:"A 1864 Art Deco fountain sits at the heart of the Fort district—historically a gathering point and symbol of colonial commerce transformed into modern Mumbai\'s hub.",st:"The fountain is small but ornate. Four figures (representing Justice, Progress, Science, and Agriculture) stand atop. The plaza around it fills with people during working hours. It\'s not quiet or peaceful—it\'s the beating heart of the Fort\'s commerce. The architecture is belle époque; the energy is entirely modern Mumbai.",im:"An ornate stone fountain with sculpted figures. The plaza filled with people and vehicles. Colonial architecture surrounding it. The contrast between the old monument and the chaotic modern activity.",t:"Free to view. Fort area (central Mumbai). Open all hours. Best 10am-12pm or 5-6pm (see the plaza activity). It\'s not a tourist spot; it\'s a working plaza. Watch valuables in crowds. Photography is good from any angle. This is Mumbai\'s historic center.",c:["beautiful","neighborhoods"],r:"g",nn:"फ्लोरा फाउंटेन",ns:"Flora Fountain (Hutatma Chowk) — फोर्ट जिले का आर्ट डेको केंद्र",nst:"1864 का एक आर्ट डेको फव्वारा फोर्ट जिले के केंद्र में बैठा है।",nt:"मुफ़्त। फोर्ट क्षेत्र। 10-12 या 17-18 सर्वश्रेष्ठ।"},
  {id:57,n:"Siddhivinayak Temple — Mumbai\'s Most Visited Shrine with Queue Culture",a:"South Mumbai",v:["greatest_hits","neighborhoods"],d:60,s:"This hilltop Ganesh temple draws hundreds of thousands annually—the experience is less about the shrine and more about witnessing Mumbai\'s devotion in queues.",st:"The temple is small and ancient (1801). The waiting line can stretch hours, even at off-peak times. You\'ll see everyone: actors, executives, street vendors, families—all waiting together. The queue is the experience. The ritual is efficient (you have seconds before you\'re moved along). But what\'s remarkable is the sheer volume of people who show up, daily, to make this devotion work.",im:"A long line of people snaking through barriers. The small shrine packed with devotees. The sound of bells and chanting. The devotion in people\'s faces as they approach the altar.",t:"Free. South Mumbai (Prabhadevi area). Open early morning (3-5am) for shortest queues. Best 6-9am on weekdays. The queue is always long; go on a weekday for slightly shorter waits. No photography inside the temple. This is one of India\'s most-visited shrines. The waiting teaches patience.",c:["greatest_hits","neighborhoods"],r:"g",nn:"सिद्धिविनायक मंदिर",ns:"Siddhivinayak Temple — मुंबई का सबसे अधिक देखा जाने वाला मंदिर",nst:"यह पहाड़ी गणेश मंदिर सालाना सैकड़ों हजार आकर्षित करता है।",nt:"मुफ़्त। प्रभादेवी क्षेत्र। 3-5 सुबह सबसे कम कतार।"},
  {id:58,n:"BEST Bus Route 1 (Colaba to Churchgate) — The ₹10 City Tour",a:"South Mumbai",v:["free_culture","neighborhoods"],d:45,s:"Ride the iconic red BEST bus from Colaba to Churchgate for ₹10—the route skims the coast and passes historic Mumbai neighborhoods in 45 minutes.",st:"BEST (Brihanmumbai Electric Supply and Transport) buses are red and omnipresent. Route 1 is the most scenic. You\'ll travel along the coast, pass Gateway of India, ride through Fort, and watch Mumbai change outside the window. It\'s the slowest possible way to see the city, which makes it the best way. The bus fills with commuters. The experience is transportation and observation merged.",im:"The red bus packed with people. The Arabian Sea visible through windows. Colonial buildings passing by. The afternoon light on the water. The rhythm of the bus stopping and starting.",t:"Cost: 10 INR (roughly 12 cents). Start at Colaba, end at Churchgate. Daily buses every few minutes. Best 9-11am or 4-6pm (avoid rush hours if you want a seat). No air conditioning. Windows open. Bring comfort with crowds. This is how Mumbai moves. No tourist bus can match it.",c:["free_culture","neighborhoods"],r:"g",nn:"बीईएसटी बस मार्ग 1",ns:"BEST Bus Route 1 (Colaba to Churchgate) — 10 रुपये शहर का दौरा",nst:"रूट 1 सबसे सुंदर है। आप समुद्र के किनारे यात्रा करते हैं।",nt:"लागत: 10 रुपये। 9-11 या 16-18 सर्वश्रेष्ठ।"},
  {id:59,n:"Nariman Point Seaface — South Mumbai",a:"South Mumbai",v:["quiet","beautiful"],d:30,s:"Office towers frame a working-class waterfront where sea breeze clears the city from your lungs.",st:"Nariman Point is where corporate Mumbai ends and the Arabian Sea begins. By day, office workers in crisp shirts jostle with joggers and fishermen. The rough concrete promenade lacks the polish of Marine Drive, which makes it more real. Salt spray stings. The panorama stretches: Worli Sea Face to the north, open water west. The rhythm is Mumbai breathing—constant movement, no pretense.",im:"Standing at the edge of a busy seaface, towers behind you, waves ahead, the salt-tang smell, the sound of traffic and seagulls mixed.",t:"South Mumbai, reachable by local trains to Churchgate, then bus or auto. Go early morning (6-7am) or late evening (5-7pm) for crowds of joggers. No entry fees. The breakwater can be slippery after rain—watch your step. Bring water; no vendors nearby.","c":["neighbourhoods"],"r":"g",nn:"नारिमन प्वाइंट समुद्र तट",ns:"कार्यालय टावरों से घिरा कार्यरत मुंबई का समुद्र तट",nst:"नारिमन प्वाइंट वह जगह है जहाँ कॉर्पोरेट मुंबई समाप्त होती है।",nt:"दक्षिण मुंबई, चर्चगेट से स्थानीय ट्रेन से पहुंचें।"},
  {id:60,n:"Oval Maidan Cricket at Dusk — Fort",a:"South Mumbai",v:["beautiful","free_culture"],d:45,s:"A sprawling cricket ground ringed by Gothic and Art Deco structures, where the city plays itself out against colonial backdrops.",st:"Oval Maidan is Mumbai's cricket cathedral. On weekdays at dusk, dozens of games unfold simultaneously—street teams, office leagues, children. The field sits in the heart of Fort's architectural treasure: High Court (Venetian Gothic), Secretariat, old commercial buildings with turrets and arches. The sky turns orange. The crack of cricket bats echoes off stone. You can sit on the perimeter and watch Mumbai's passion—the sport isn't just a game here, it's citizenship, belonging, the ritual that binds the city.",im:"The sun low and gold. A cricket bat cracks. The ball flies. Behind the fielders, a Gothic tower rises. The grass is worn from use. The noise rises—cheers, calls, the sound of the city at play.",t:"Fort, South Mumbai. Best time: 5-7pm on weekdays. Oval Maidan Road. Completely free. Security tight but open to public. Watch from the perimeter (don't wander onto active games). The surrounding Fort district has restaurants and tea shops. Weather can be hot; bring water. This is where Sachin Tendulkar learned to bat as a boy.","c":["sport","free_culture"],"r":"g",nn:"ओवल मैदान क्रिकेट",ns:"दुःख के समय क्रिकेट मैदान में खेल",nst:"ओवल मैदान मुंबई का क्रिकेट मंदिर है।",nt:"दुःख के समय (शाम 5-7) सर्वश्रेष्ठ। बिल्कुल मुफ़्त।"},
  {id:61,n:"Horniman Circle Garden — Fort",a:"South Mumbai",v:["quiet","beautiful"],d:20,s:"A calm Victorian garden anchored by a fountain, completely surrounded by 19th-century commercial buildings—a pocket of peace in Mumbai's densest quarter.",st:"Horniman Circle Garden is invisible to most visitors. It sits in the heart of Fort like a secret. The circular garden has a central fountain, manicured lawns (rare in Mumbai), and benches. Around it: old commercial buildings in sandstone and granite, their facades weathered, their windows regular and stern. No crowds. The air is quieter than the city around it. You hear birds. Merchants and clerks pass by, unbothered. Time moves differently here.",im:"Stone buildings surrounding you on all sides. A fountain in the center with water catching light. The cool shade of old architecture. The smell of old stone and earth.",t:"Fort, South Mumbai. Reachable by train to Churchgate, then walk. Best morning (7-10am) for fewest crowds and best light. Completely free. No facilities. Nearby restaurants and cafés. Photography is allowed. The surrounding buildings are office spaces and shops—don't expect tourist infrastructure.","c":["parks"],"r":"g",nn:"हॉर्नीमैन सर्कल गार्डन",ns:"फोर्ट में शांत विक्टोरियन बगीचा",nst:"हॉर्नीमैन सर्कल गार्डन किसी के लिए भी अदृश्य है।",nt:"सुबह (7-10 सुबह) सर्वश्रेष्ठ।"},
  {id:62,n:"Worli Sea Face Promenade — Worli",a:"West Mumbai",v:["local","beautiful"],d:40,s:"Rough waves, less-polished than Marine Drive, more muscular and local—Mumbai's working waterfront without the veneer.",st:"Worli Sea Face is Marine Drive's unpolished cousin. The waves hit harder here (the concrete still shows water damage). The promenade is wider and more exposed. Fishermen work nearby. The buildings are older, less glossy. The crowd is mixed—joggers, families, workers. There's an edge to the place; it feels lived-in rather than curated. The sea is real here, not a backdrop. The sunset is dramatic because nothing is softened.",im:"Waves crashing against a worn concrete wall. The spray reaches your face. Old buildings behind. The light turning orange on rough water.",t:"Worli, West Mumbai. Reachable by local trains or buses to Worli. Best 5-7pm for sunset and crowds. Free. No formal amenities. The area floods during monsoon (June-Sept). Watch for water on the promenade. Bring water and wear comfortable shoes—the walk is long and unshaded.","c":["neighbourhoods","romantic_water"],"r":"g",nn:"वर्ली समुद्र तट",ns:"मरीन ड्राइव का कम पॉलिश किया हुआ चचेरा भाई",nst:"वर्ली समुद्र तट एक खुरदरा, कम पॉलिश किया हुआ जगह है।",nt:"शाम 5-7 सूर्यास्त के लिए सर्वश्रेष्ठ।"},
  {id:63,n:"Priyadarshini Park — Napean Sea Road",a:"West Mumbai",v:["quiet","beautiful"],d:45,s:"Open green space with unobstructed Arabian Sea views, joggers, and silence—a rare uncluttered park in the heart of expensive Mumbai.",st:"Priyadarshini Park (also called Hanging Gardens) sits on the crest of Malabar Hill, overlooking the Arabian Sea. The park is spare and minimal: grass, walking paths, benches, views. No major monuments, no crowds. Joggers in the morning, families at dusk. The perspective is vast—you see water stretching to the horizon, city skyline, the curve of the coast. The park feels held in suspension between sea and sky. It's quiet in a way few places in Mumbai are.",im:"Standing on elevated ground. The Arabian Sea spread before you, vast and unbroken. The sky meeting water at a clear line. Silence except for footsteps and birdsong.",t:"Napean Sea Road, Malabar Hill, West Mumbai. Best morning (6-8am) for joggers and light, or dusk (5-7pm) for sunset. Completely free. No facilities. Bring your own water. The park is well-maintained by the city. Photography allowed. Surrounding area is expensive residential—minimal vendors. Walking distance from Malabar Hill hiking trails.","c":["parks"],"r":"g",nn:"प्रियदर्शिनी पार्क",ns:"अरब सागर के विस्तृत दृश्य के साथ खुली हरी जगह",nst:"प्रियदर्शिनी पार्क मालाबार हिल के शिखर पर बैठता है।",nt:"सुबह (6-8) या दुःख (5-7) सर्वश्रेष्ठ।"},
  {id:64,n:"Carter Road Evening Walk — Bandra West",a:"West Mumbai",v:["local"],d:30,s:"Joggers and couples move along the sea; food stalls spill onto the street; the lived-in rhythm of a neighborhood that doesn't perform for tourists.",st:"Carter Road runs along Bandra's coast and pulses with evening life. Joggers in athletic wear run past men selling roasted corn and pani puri. Couples lean against the wall overlooking the water. The street is narrow and crowded but unhurried. Vendors call out. The air smells like grilled food and salt. Bandra's character reveals itself here—bohemian and commercial, local and aspirational, all at once. It's not a destination; it's where Bandra lives.",im:"Walking through a food-scented street. Vendors to your left, the sea wall and water to your right. A couple sitting on the wall. The smell of roasted corn. The sound of traffic and calling vendors mixing with the sea.",t:"Bandra West, West Mumbai. Reachable by train to Bandra, then taxi or walk. Best 6-8pm for crowds and energy. Completely free to walk. Food stalls charge ₹10-50 for snacks. The street can be crowded and chaotic. Watch for vehicles and cyclists. Bring cash for vendors. It's a local experience first, tourist destination second.","c":["neighbourhoods","food"],"r":"g",nn:"कार्टर रोड शाम की सैर",ns:"बांद्रा पश्चिम में भोजन स्टॉल के साथ समुद्र के किनारे टहलना",nst:"कार्टर रोड बांद्रा के जीवन को दर्शाता है।",nt:"शाम 6-8 सर्वश्रेष्ठ। स्थानीय अनुभव पहली, पर्यटक गंतव्य दूसरा।"},
  {id:65,n:"Malabar Hill Nature Trail — Malabar Hill",a:"West Mumbai",v:["quiet","hidden"],d:60,s:"A rare elevated forest-like trail through one of Mumbai's most exclusive residential areas—an urban nature escape that feels removed from the city's chaos.",st:"Malabar Hill is Mumbai's lushest corner, where the wealthy built homes among old trees. The nature trail winds through this zone, climbing steadily. The canopy closes overhead. The sound of the city fades. You pass enormous old trees—some centuries old—their roots lifting the pavement. The air is cooler, damper. Very few people walk here; locals know but don't advertise. The trail offers views of the city below and the sea beyond, but always framed by greenery. It's the closest Mumbai comes to a forest experience. The path is uneven, sometimes muddy, sometimes dry. This is Mumbai's hidden nature, the green that survives beneath the visible city.",im:"Walking beneath a canopy of leaves. Old tree roots grip the ground. Dappled light. The path narrows. Silence except for birds and distant city hum. The smell of damp earth and old trees.",t:"Malabar Hill, West Mumbai. Start at the Hindu Pillar viewpoint or from near Bombay High platform. Trail is approximately 2-3 km. Best morning (7-9am) before heat. Wear proper shoes; the path is uneven and can be muddy. Bring water. No formal facilities. This is residential property, but public pathways. Go with respect. Few tourists; very local. The trail connects to other hills; exploring branches off the main path.","c":["nature","parks"],"r":"g",nn:"मालाबार हिल प्रकृति ट्रेल",ns:"शहर के सबसे एक्सक्लूसिव इलाके में वन जैसा रास्ता",nst:"मालाबार हिल मुंबई का सबसे हरा कोना है, जहाँ धनी लोगों ने पुराने पेड़ों के बीच घर बनाए।",nt:"सुबह (7-9) सर्वश्रेष्ठ। उचित जूते पहनें। पानी लाएँ।"},
  {id:66,n:"Aarey Colony Morning Walk — Goregaon",a:"North of City",v:["hidden","quiet"],d:90,s:"Semi-rural edge of Mumbai with tree cover, tribal hamlets, buffalo herds, and winding roads—where the city dissolves into countryside.",st:"Aarey Colony sits at Mumbai's northern edge, between the city and forests. It's a milk cooperative that sprawls across open land with trees. The roads wind through tribal hamlets where children play and buffalo graze. The air smells different here—green, earth, animal. Vehicles are rare. The pace slows. You can walk for an hour and feel like you've left Mumbai entirely. The landscape is semi-rural: pasture, trees, old structures, new construction beginning to encroach. It's a threshold space—neither fully urban nor fully rural. Early morning is best; the light is golden, the air is cool, the animals are most active. It's becoming known, so crowds are starting to arrive, but still, weekday mornings are largely empty.",im:"A dirt or paved road stretching ahead. Buffalo in a field. Trees overhead. A small hamlet. The sound of birds, not traffic. The smell of grass and animals. A wide sky.",t:"Aarey Colony, Goregaon, North Mumbai. Reachable by bus or taxi to Aarey Gate. Morning walks (6-9am) best. Completely free. No facilities. Bring water. This area is being developed; roads are sometimes muddy, sometimes paved. Watch for animals and vehicles. Monsoon (June-Sept) can make parts inaccessible. Local guides available; ask around. The area is beautiful but lacks tourist infrastructure. Respect the space and local communities.","c":["nature"],"r":"g",nn:"आरे कॉलोनी सुबह की सैर",ns:"मुंबई के उत्तरी किनारे पर पेड़ों के साथ अर्ध-ग्रामीण जगह",nst:"आरे कॉलोनी मुंबई के उत्तरी किनारे पर बैठता है, शहर और वनों के बीच।",nt:"सुबह (6-9) सर्वश्रेष्ठ। पानी लाएँ।"},
  {id:67,n:"Bandra Fort Gardens — Bandra",a:"West Mumbai",v:["history","beautiful"],d:30,s:"17th century Portuguese fort ruins with sea views, weathered stone walls, and a sunset spot beloved by couples—history eroding into the present.",st:"Bandra Fort (Castella da Aguada) dates to the 1660s, built by Portuguese settlers. The structure is now ruins—stone walls, crenellated edges, some chambers still intact. It sits on a small promontory with sea views on three sides. The fort is small and intimate, not a grand monument. It's been eroded by salt spray and weather. Couples come here at dusk. The light is golden. The stone glows. The Worli Sea Face and back bay are visible. It's a place where history has become very small and very beautiful—not grand, but felt.",im:"Standing within stone walls. The sea visible through gaps. The stone dark and weathered. The sky turning orange. A couple kissing nearby. The sound of waves.",t:"Bandra, West Mumbai. Near Bandra Fort subway station. Climb to the fort (about 5 minutes from the road). Best sunset (5-7pm). Completely free. No facilities. The path can be uneven; wear shoes. The stone is slippery when wet. Photography excellent. Nearby restaurants and cafés. This is a local hangout, not a major tourist site. Bring water.","c":["history_big","romantic_water"],"r":"g",nn:"बांद्रा किला उद्यान",ns:"17वीं सदी के पुर्तगाली किले के खंडहर",nst:"बांद्रा किला (कास्टेला डा अगुआडा) 1660 के दशक से है।",nt:"सूर्यास्त (5-7) सर्वश्रेष्ठ। बिल्कुल मुफ़्त।"},
  {id:68,n:"Shivaji Park — Dadar",a:"Central Mumbai",v:["local","free_culture"],d:30,s:"Mumbai's great democratic space—where cricket matches, families, political rallies, and morning yoga all happen simultaneously, and where Tendulkar learned to bat.",st:"Shivaji Park is Mumbai's Central Park, but more democratic and less curated. It's a massive open ground in the heart of the city. Every morning, hundreds of people come to walk, jog, do yoga, and play cricket. The space accommodates everyone without hierarchy. Political rallies happen here. Cricket teams practice. Families spread out picnic cloths. The sound is constant: bouncing balls, calling voices, calling vendors. It's Mumbai's commons—the place where the city gathers. Sachin Tendulkar played cricket here as a child; the ground produced countless other cricketers. It's not beautiful in the conventional sense, but it's alive and shared.",im:"A huge open field. Dozens of cricket games happening. Families sitting. Vendors. The morning light spreading over the grass. The sound of many voices, many languages, all at once.",t:"Dadar, Central Mumbai. Reachable by train to Dadar. Best morning (6-9am) for activity and light. Completely free. Limited facilities. Bring water. The ground is open early morning to evening. Football, cricket, and running happen constantly. The surrounding area has restaurants and shops. This is where Mumbai gathers—expect crowds, expect life.","c":["sport","neighbourhoods"],"r":"g",nn:"शिवाजी पार्क",ns:"दादर में मुंबई का महान लोकतांत्रिक स्थान",nst:"शिवाजी पार्क मुंबई का सेंट्रल पार्क है, लेकिन अधिक लोकतांत्रिक है।",nt:"सुबह (6-9) सर्वश्रेष्ठ। बिल्कुल मुफ़्त।"},
  {id:69,n:"Five Gardens Matunga — Matunga",a:"Central Mumbai",v:["quiet","local"],d:30,s:"A charming residential green pocket with a South Indian neighborhood feel—quiet morning walks through Mumbai's most underrated area.",st:"Five Gardens is a small cluster of green spaces within the Matunga neighborhood, which is predominantly South Indian (Tamil and Marathi). The area is quiet, tree-lined streets, old buildings, minimal traffic. The gardens are modest—pocket parks within residential zones. Locals walk here early morning. Vendors sell flowers and vegetables. The neighborhood has a different rhythm than commercial Mumbai. Small temples, old shops, South Indian restaurants. The air is calm. You can walk for an hour and feel completely removed from the city's intensity.",im:"Walking down a tree-lined residential street. A small garden plot with benches. South Indian Tamil writing on shop signs. The sound of quiet footsteps and birds. A shopkeeper arranging flowers.",t:"Matunga, Central Mumbai. Reachable by train to Matunga Road or Mahim. Best morning (7-9am). Completely free. No formal facilities; local tea shops nearby. The neighborhood is residential, so respect the quietness. Bring water. Photography is fine but respect privacy. This is a local experience; few tourists visit. The area has beautiful old buildings and hidden temples.","c":["parks","neighbourhoods"],"r":"g",nn:"पाँच बगीचे मातुंगा",ns:"मातुंगा में दक्षिण भारतीय पड़ोस की भावना के साथ शांत सड़कें",nst:"पाँच बगीचे मातुंगा पड़ोस के भीतर हरे स्थानों का एक छोटा समूह है।",nt:"सुबह (7-9) सर्वश्रेष्ठ। बिल्कुल मुफ़्त।"},
  {id:70,n:"Asiatic Society Library Steps — Fort",a:"South Mumbai",v:["history","quiet"],d:20,s:"Sit on the grand staircase of Town Hall and watch old-Bombay energy flow past—the city's history moving beneath your feet.",st:"The Asiatic Society Library is housed in Town Hall, an imposing Grecian structure in Fort. The grand staircase inside is a statement of 19th-century architecture: marble, high ceilings, natural light. If you sit on the steps, you watch people entering and leaving—scholars, students, occasionally visitors. The energy is intellectual and calm. The space feels separate from the street outside, but not sealed off from it. You're inside a monument but it's a living, breathing one. The library's collections are vast and rare. The reading rooms are quiet. The stairs are a vantage point to observe the city's cultural infrastructure.",im:"Grand marble stairs. High ceiling above. Natural light from windows. People walking up and down. The quiet sound of footsteps echoing. The smell of old books and stone.",t:"Fort, South Mumbai. Inside Town Hall. Reachable by train to Churchgate. Best morning (10am-1pm) when light is good and crowds are minimal. Completely free to sit on the steps. Library access requires registration (free, with ID). The building is monitored; respect the space. Photography usually allowed but ask. Bring quiet and respect.","c":["history_big","free_culture"],"r":"g",nn:"एशियाटिक सोसाइटी लाइब्रेरी सीढ़ियां",ns:"टाउन हॉल की भव्य सीढ़ियों पर बैठें",nst:"एशियाटिक सोसाइटी लाइब्रेरी टाउन हॉल में है।",nt:"सुबह (10-1) सर्वश्रेष्ठ। बिल्कुल मुफ़्त।"},
  {id:71,n:"Bhendi Bazaar Walking — Bhendi Bazaar",a:"South Mumbai",v:["local","weird"],d:45,s:"Dense, lived-in, everyday Mumbai street life at its most intense—tiny lanes, spice shops, chai stalls, the city at full throttle.",st:"Bhendi Bazaar is one of Mumbai's oldest market areas, a maze of narrow lanes packed with shops. It's chaotic, loud, aromatic. Spice shops line the street; the smell is overwhelming—turmeric, cumin, cardamom, pepper. Chai stalls serve endless cups. Textile vendors, jewelry shops, small eateries. The crowd is thick, moving fast, purposeful. It's not a destination for tourists; it's where Mumbai lives and trades. The energy is frenetic. The architecture is old—narrow buildings, strings of electric wires overhead, weathered facades. This is the city at its most overwhelming and most real. Every sensory input is maxed out. You feel alive and confused and energized all at once.",im:"A narrow lane. Vendor calls from all sides. The smell of spices. Crowds moving. Goods hanging overhead. The sound of haggling. A chai cup in your hand. The warmth and density of bodies.",t:"Bhendi Bazaar, South Mumbai. Reachable by train to Bhendi Bazaar or nearby stations. Best morning (8-10am) for slightly fewer crowds. Completely free to walk. Shops sell everything; prices are local rates. Bring cash. The lanes are narrow and crowded; watch for vehicles and pickpockets. This is not a tourist area; go with respect. Comfortable shoes. Bring water. The area is sensory overload; go prepared for intensity.","c":["markets","neighbourhoods"],"r":"g",nn:"भेंडी बाजार सैर",ns:"मुंबई की सबसे पुरानी बाजार क्षेत्र में घूमना",nst:"भेंडी बाजार मुंबई के सबसे पुराने बाजार क्षेत्रों में से एक है।",nt:"सुबह (8-10) सर्वश्रेष्ठ। नकद लाएँ।"},
  {id:72,n:"Khotachiwadi Heritage Village — Girgaon",a:"Central Mumbai",v:["hidden","history"],d:30,s:"Colorful Portuguese-style wooden homes in a rare village-like pocket—a preserved 19th-century enclave surrounded by modern towers.",st:"Khotachiwadi is one of Mumbai's best-kept secrets. It's a tiny residential enclave of about 20 houses, all built in the 1880s by Portuguese and Goan Christians. The houses are traditional Portuguese-style: wooden frames, colorful tile work, wooden shutters, small courtyards. The streets are narrow. The architecture is stunning and completely incongruous with modern Mumbai, which has grown up around it. Walking here feels like stepping back in time. The residents are long-time families; the community is tight-knit. The area has become slightly known, but it remains quiet. The light is beautiful—golden stone, colored tiles, shadows from wooden shutters. Photography is popular here, but go early to avoid crowds and respect residents.",im:"A narrow lane lined with colorful Portuguese houses. Wooden shutters. Tile work. Small courtyards behind walls. The sky framed by buildings. Silence except for occasional footsteps.",t:"Khotachiwadi, Girgaon, Central Mumbai. Reachable by train to Girgaon or Charni Road. Best early morning (6-8am) for light and solitude. Completely free. No facilities. Bring water. This is a residential area; respect privacy and quietness. Photography is allowed but ask permission if photographing residents or their homes. The area is becoming known, so crowds are increasing. Weekday mornings are quietest. Nearby restaurants on the main street.","c":["history_big","neighbourhoods"],"r":"g",nn:"खोताचिवाड़ी विरासत गांव",ns:"पुर्तगाली-शैली के रंगीन लकड़ी के घरों की एक दुर्लभ गांव जैसी जगह",nst:"खोताचिवाड़ी मुंबई के सर्वश्रेष्ठ-संरक्षित रहस्यों में से एक है।",nt:"सुबह (6-8) सर्वश्रेष्ठ। स्थानीय सम्मान करें।"},
  {id:73,n:"Ballard Estate Heritage Quarter — Fort",a:"South Mumbai",v:["quiet","history"],d:30,s:"Quiet streets lined with beautiful Edwardian architecture and symmetrical facades—almost no tourists, pure colonial Mumbai.",st:"Ballard Estate is a carefully planned 19th-century commercial quarter in Fort, designed as a unified block with consistent architecture. The buildings are Edwardian, four to five stories, with repeated facades, regular windows, symmetrical streets. It was built to house commercial houses and trading companies. The quarter was cutting-edge when built; now it feels like a ghost of its former grandeur. The buildings are still occupied but quieter than surrounding areas. The street plan is rational and grid-like, unusual in Mumbai. Light plays beautifully on the stone facades. Very few tourists stumble here. It's pure colonial Mumbai, preserved almost by accident because the buildings didn't become glamorous like other areas.",im:"A wide street lined with identical buildings on both sides. Regular windows. Stone facades. Regular rhythm. Golden light on stone. Quiet. Almost no people.",t:"Ballard Estate, Fort, South Mumbai. Reachable by train to Churchgate, then walk. Best morning (9-11am) for light and fewer people. Completely free. No facilities. The buildings are offices; respect working spaces. Photography is allowed. Bring water. The area is quiet and slightly neglected, but that's part of its charm. It's a walking tour, not a destination with amenities. Nearby Fort restaurants and shops. This is where Mumbai's trading history is written in stone.","c":["history_big","neighbourhoods"],"r":"g",nn:"बैलर्ड एस्टेट हेरिटेज क्वार्टर",ns:"एडवर्डियन आर्किटेक्चर के साथ शांत सड़कें",nst:"बैलर्ड एस्टेट फोर्ट में 19वीं सदी का सावधानीपूर्वक योजित वाणिज्यिक क्षेत्र है।",nt:"सुबह (9-11) सर्वश्रेष्ठ। बिल्कुल मुफ़्त।"},
  {id:74,n:"Mazgaon Dockyard Area — Mazgaon",a:"Central Mumbai",v:["hidden","history"],d:45,s:"Colonial churches, Parsi heritage, older neighborhood textures—a different side of the city where maritime history is still inscribed in streets.",st:"Mazgaon is an older neighborhood that connects to Mumbai's maritime past. The dockyard (Mazgaon Dock, still operational) sits here. Around it: old colonial churches, Parsi fire temples, aging buildings, small workshops. The area is less developed than surrounding zones. The architecture reflects layers of history—Portuguese colonial, Parsi commercial, British maritime. Walking here, you feel the age of the neighborhood. It's not polished or promoted as a tourist destination. Local families live here, many with generational roots. The energy is slower, more rooted. It's becoming gentrified, but still retains character. Small restaurants serve local food. The streets near the docks have industrial character—warehouses, ship repair facilities.",im:"Old buildings facing narrow streets. A colonial church bell tower. Parsi community symbols. The smell of old buildings and salt air. The sound of dockyards working in the distance.",t:"Mazgaon, Central Mumbai. Reachable by train to Mazgaon or Byculla. Walk is best. The dockyard itself is restricted, but the surrounding neighborhood is accessible. Best morning (8-10am). Completely free. No formal facilities. Bring water. This is a working neighborhood with industrial character. Respect the spaces. Photography allowed but respect privacy. The area is less developed for tourism; go with curiosity and respect.","c":["history_big","neighbourhoods"],"r":"g",nn:"माझगाँव डॉकयार्ड क्षेत्र",ns:"औपनिवेशिक चर्च, पारसी विरासत के साथ पड़ोस",nst:"माझगाँव एक पुराना पड़ोस है जो मुंबई के समुद्री अतीत से जुड़ा है।",nt:"सुबह (8-10) सर्वश्रेष्ठ। बिल्कुल मुफ़्त।"},
  {id:75,n:"Dadar Flower Market at Dawn — Dadar West",a:"Central Mumbai",v:["local","beautiful"],d:30,s:"Mountains of marigolds, roses, jasmine at dawn—one of Mumbai's most vivid scenes. Go before 7am for full sensory immersion.",st:"Dadar Flower Market is a wholesale flower bazaar that operates from pre-dawn through early morning. The sight is staggering: entire streets lined with vendors selling marigolds by the ton—golden, orange, deep red, mixed bunches stacked higher than your head. Roses in every color. Jasmine flowers in white mounds. The smell is overwhelming—floral, green, fresh. Vendors move fast, transactions happen in seconds. Wholesale buyers arrive with trucks. The energy is efficient and beautiful—this is commerce, but commerce in flowers feels almost spiritual. The colors are saturated. The light is golden (early morning sun hitting the flowers). It's peak Mumbai energy—functional, beautiful, purposeful, alive.",im:"Standing amid mountains of flowers. The golden marigolds catching light. The smell wrapping around you. Vendors calling prices. The sound of quick negotiations. The sight of color piled impossibly high.",t:"Dadar West, Central Mumbai. Reachable by train to Dadar. Must go before 7am (market winds down by 9am). Completely free to walk and observe. Vendors are focused on sales; photography may be tolerated if you're respectful. Bring cash if you want to buy flowers. The market is crowded and chaotic; watch for vehicles and pushcarts. Comfortable shoes. The smell is intense; go prepared for sensory overload. Bring water. Nearby tea shops serve chai. This is a wholesale market, not a retail destination, but open to public observation.","c":["markets"],"r":"g",nn:"दादर फूलों की बाजार सुबह",ns:"सुबह मैरीगोल्ड, गुलाब, चमेली के पहाड़",nst:"दादर फूलों की बाजार एक थोक फूलों का बाजार है।",nt:"7 सुबह से पहले जाएँ। बिल्कुल मुफ़्त।"},
  {id:76,n:"Mangaldas Market Textile Lanes — Kalbadevi",a:"South Mumbai",v:["local"],d:45,s:"Rivers of fabric, color, and old commercial Mumbai energy—textile lanes where the city's clothes are made and traded.",st:"Mangaldas Market is the heart of Mumbai's textile wholesale trade. The narrow lanes are packed with fabric shops selling everything—cotton, silk, synthetic, traditional, contemporary, expensive, cheap. The streets are rivers of color. Vendors call out. The energy is intense and commercial. The architecture is old—weathered buildings, overhead wires, signs in multiple languages. The crowd is dense: retailers buying stock, small tailors shopping, designers sourcing materials. It's not a destination; it's where the city sources its clothes. The sensory experience is overwhelming—the smell of cotton and dye, the colors, the noise, the bodies. Very few tourists; mostly traders and locals.",im:"Narrow lanes filled with fabric. Stacks of color. Vendors in small stalls. The crowd moving. The smell of fabric and dye. Cloth hanging overhead. The sound of haggling and calling.",t:"Mangaldas Market, Kalbadevi, South Mumbai. Reachable by train to Bhendi Bazaar or Kalbadevi. Best morning (8-10am) for activity and light. Completely free to walk. Vendors sell fabric by the meter; prices are wholesale. Bring cash if buying. The lanes are narrow and crowded; watch for motorcycles and pickpockets. This is not a tourist market; go with respect for the trade. Comfortable shoes. Bring water. The area is less polished than tourist destinations; go with curiosity.","c":["markets"],"r":"g",nn:"मंगलदास मार्केट टेक्सटाइल लेन",ns:"कपड़ों के रंगों और व्यापार से भरी गलियां",nst:"मंगलदास मार्केट मुंबई के कपड़ों के थोक व्यापार का केंद्र है।",nt:"सुबह (8-10) सर्वश्रेष्ठ। नकद लाएँ।"},
  {id:77,n:"Zaveri Bazaar Gold District — Kalbadevi",a:"South Mumbai",v:["local","weird"],d:30,s:"Intense, fast-moving jewelry trading district where gold is measured in grams and the pace is sensory overload.",st:"Zaveri Bazaar is Mumbai's gold trading heartland. The lanes are lined with jewelry shops, each with windows displaying gold in every form—necklaces, bangles, ornaments, plain gold. The activity is frenetic. Buyers and sellers transact constantly. The energy is pure commerce—prices moving, calculations happening, money changing hands. The shopkeepers are expert traders. The air smells like metal and incense. The sound is constant negotiation. It's not beautiful in a conventional sense, but it's alive. The architecture is old—narrow buildings, dense signage, overhead wires. The area is historic; it's been the gold market for over a century. Very few tourists; mostly traders, families buying jewelry, businesspeople. The pace is fast and the intensity is real.",im:"Narrow lane lined with bright lights and glass cases. Gold shining in every window. Fast-moving people. Serious faces. The sound of calculation and negotiation. The smell of metal and commerce.",t:"Zaveri Bazaar, Kalbadevi, South Mumbai. Reachable by train to Bhendi Bazaar or Kalbadevi. Best morning (8-11am) for full activity. Completely free to walk. Vendors are focused on sales; respect that. Photography may not be welcome; ask first. Bring cash if buying jewelry. The lanes are narrow and crowded; watch for traffic and pickpockets. Comfortable shoes. Bring water. This is a pure trading market; not a tourist destination. Go with respect for the commerce happening. The energy is intense; go prepared.","c":["markets"],"r":"g",nn:"जवेरी बाजार गोल्ड जिला",ns:"तेजी से चलने वाली गहना व्यापार जिला",nst:"जवेरी बाजार मुंबई का सोना व्यापार का केंद्र है।",nt:"सुबह (8-11) सर्वश्रेष्ठ। सम्मान के साथ जाएँ।"},
  {id:78,n:"Cutting Chai and Vada Pav Trail — Across Mumbai",a:"Multiple",v:["local","free_culture"],d:20,s:"The ₹10 street food ritual that IS Mumbai—tiny cups of tea and fried potato pastries where the city's commuters fuel themselves.",st:"Cutting chai (half a cup) and vada pav (a potato fritter inside a bread bun) are Mumbai's pulse. The ritual costs ₹10-20 and is performed millions of times daily. A cutting chai is served in small glasses, often shared. The vada is fried fresh—golden, hot, soft inside. The taste is simple, the purpose is fuel and warmth and habit. The best stalls are not fancy; they're in high-traffic areas—outside train stations, near colleges, in markets. Ashok Vada Pav at Kirti College is legendary; people line up. Anand Stall in Vile Parle is beloved by locals. The stalls are often just a counter, no seating. You stand, eat, move on. This is not dining; it's a ritual, a moment of communion with millions of others doing the same thing. The taste is irrelevant (though it's delicious); the experience is the point.",im:"Standing at a simple counter. A vada in a paper bag. A small glass of chai in your hand. The vendor quickly serving the next person. The taste of the fried potato and sweet chai. The warmth in your hands. The sound of the city around you.",t:"Multiple locations across Mumbai. Ashok Vada Pav (outside Kirti College, South Mumbai) and Anand Stall (Vile Parle, West Mumbai) are famous starting points. Cost: ₹10-20 per transaction. Available from early morning (6am) through evening (until stall closes, often 8-9pm). Completely free to walk around. These are high-volume stalls; expect queues during peak times. Go prepared for chaos. No facilities. Bring cash. This is a taste of authentic Mumbai—functional, flavorful, democratic. Everyone eats at these stalls.","c":["food"],"r":"g",nn:"कटिंग चाय और वड़ा पाव ट्रेल",ns:"₹10 की सड़क खाने की परंपरा जो मुंबई है",nst:"कटिंग चाय और वड़ा पाव मुंबई की नाड़ी हैं।",nt:"₹10-20 प्रति लेन-देन। नकद लाएँ।"}];

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");

const[search,setSearch]=useState("");

const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);

const filtered=useMemo(()=>P.filter(p=>{

if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};

if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};

return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>

<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}

</div></div>}

return <div style={{minHeight:"100vh",background:"url('https://mariavheland.github.io/godostuff/textures/tex06.png') center/cover no-repeat"}}>

<div className="flex items-start justify-between">

<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>

</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}

{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>

</div>

:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">

:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>

):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Mumbai Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
