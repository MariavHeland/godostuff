जे जब लाइट्स जलें, एसी बस अवॉइड करो ओपन व्यू के लिए।",nst:"रूट 124 पर मरीन ड्राइव से गुज़रते हुए क्वीन्स नेकलस चमक रहा था। साइड में स्ट्रीट फ़ूड की महक। लोकल्स का फ़ेवरेट।",nt:"कोलीवाड़ा से 124 पकड़ो, शाम 6 बजे जब लाइट्स जलें, एसी बस अवॉइड करो ओपन व्यू के लिए।",v:["hidden"],r:"g",d:30,c:[],nn:"बेस्ट बस रूट 124 — मरीन ड्राइव प्रोमेनेड",ns:"कोलीवाड़ा से ग्रांट रोड तक, मरीन ड्राइव को स्कर्ट करता हुआ सीनिक रूट।"},{id:36,n:"वीरमाता जिजाबाई भोंसले उद्यान — फ्री पार्क",s:"जिजामाता उद्यान के नाम से जाना जाता फ्री पार्क जो शहर के बीचोंबीच हरा-भरा है।",a:"बी.के.जी.सी. प्लेस, परेल, सेंट्रल मुंबई",st:"यहां का जोहराबाग़ झील के पास पिकनिक किया, बच्चों के लिए ट्रेन राइड फ्री। संग्रहालय भी अंदर मुफ्त।",im:"पेड़ों की छांव में ठंडक और पक्षियों की चहचहाहट सुनाई दे रही।",t:"सुबह 5 बजे खुलता है, जोहराबाग़ सेक्शन में जाओ शांति के लिए।",nst:"यहाँ का जोहराबाग़ झील के पास पिकनिक किया, बच्चों के लिए ट्रेन राइड फ्री। संग्रहालय भी अंदर मुफ़्त।",nt:"सुबह 5 बजे खुलता है, जोहराबाग़ सेक्शन में जाओ शांति के लिए।",v:["hidden"],r:"g",d:30,c:[],nn:"वीरमाता जिजाबाई भोंसले उद्यान — फ्री पार्क",ns:"जिजामाता उद्यान के नाम से जाना जाता फ्री पार्क जो शहर के बीचोंबीच हरा-भरा है।"},{id:38,n:"माहिम नेचर पार्क — फ्री मंगल वेटलैंड",s:"माहिम क्रीक का फ्री पार्क जहां मैंग्रोव और पक्षी देखने को मिलते हैं।",a:"माहिम क्रीक, नेरू रोड, वेस्ट मुंबई",st:"बोर्डवॉक पर चलते हुए फ्लेमिंगो झुंड देखा, सूर्यास्त पर जादू। फिशर्स की कहानियां सुनी।",im:"नमकीन हवा और मैंग्रोव की हरियाली आंखों को सुकून दे रही।",t:"सुबह 6 बजे एंटर, बर्डिंग के लिए बाइनोकुलर ले आओ।",nst:"बोर्डवॉक पर चलते हुए फ़्लेमिंगो झुंड देखा, सूर्यास्त पर जादू। फ़िशर्स की कहानियाँ सुनीं।",nt:"सुबह 6 बजे एंटर, बर्डिंग के लिए बाइनोकुलर ले आओ।",v:["hidden"],r:"g",d:30,c:[],nn:"माहिम नेचर पार्क — फ्री मंगल वेटलैंड",ns:"माहिम क्रीक का फ्री पार्क जहां मैंग्रोव और पक्षी देखने को मिलते हैं।"},{id:39,n:"भिंडिमूल्का — ऑफबीट फिशिंग गांव",s:"कोली फिशिंग कम्युनिटी का पुराना गांव, कोलाबा के पास छिपा हुआ।",a:"भिंडिमूल्का रोड, कोलाबा, साउथ मुंबई",st:"सुबह नेट बुनते कोली महिलाओं से बात की, फ्रेश सीफूड ट्राय किया। गांव की गलियां साफ-सुथरी।",im:"मछलियों की ताजगी और समुद्र की लवणीय हवा सांसों में।",t:"सुबह 7 बजे आओ जब नेट्स लौटते हैं, फोटो से पहले पूछ लो।",nst:"सुबह नेट बुनते कोली महिलाओं से बात की, फ़्रेश सीफ़ूड ट्राय किया। गाँव की गलियाँ साफ़-सुथरी।",nt:"सुबह 7 बजे आओ जब नेट्स लौटते हैं, फ़ोटो से पहले पूछ लो।",v:["hidden"],r:"g",d:30,c:[],nn:"भिंडिमूल्का — ऑफबीट फिशिंग गांव",ns:"कोली फिशिंग कम्युनिटी का पुराना गांव, कोलाबा के पास छिपा हुआ।"},{id:40,n:"Worli Koliwada — Fishing Village Among Towers",a:"Worli",v:["hidden","history","local","quiet"],d:45,s:"Ancient fishing village where Koli families still mend nets among towering high-rises—a living remnant of Mumbai's archipelago past.",st:"Walk through Worli Koliwada and time fractures. You step into tight lanes where clothes hang between buildings; fishermen repair nets; temples honoring Khambdevatta (sea deity) sit in shadow. The Kolis have lived here since before British occupation, on what was once an island. Now they're wedged between luxury apartments and corporate headquarters. Early morning is best—boats anchor at the creek's edge, fishermen depart with nets. The smell is salt and diesel. Children play in spaces their ancestors played in. The community feels both vanishing and resolute. This is how Mumbai began.",im:"An elderly Koli woman, sitting on her doorstep at dawn, watching fishing boats move out as they have for 600 years, knowing the apartment tower above her will soon be where her granddaughter cannot afford to live.",t:"Best visited early morning (6am-8am) when boats push out. Enter via the narrow lanes near Worli traffic signal. Respect the fishing equipment and family spaces. Local temples welcome respectful visitors. Photography appreciated but ask locals first.","c":[],"r":"g","nn":"वर्ली कोळीवाडा","ns":"समुद्रातील माछीमार समाज आज उंचच्या इमारतीत","nst":"वर्ली कोळीवाडा हा प्राचीन मासेमारी गांव आहे. 600 वर्षांपासून कोळी लोक येथे जाळी मेडतात. आता भोवताली बिल्डिंग आहेत पण समाज अजूनही तेथे आहे.","nt":"सकाळी 6-8 दरम्यान जा. नौकांचे सन्मान करा. स्थानिक माणसांला फोटो करायला विचारा."}
,{id:41,n:"Banganga Tank — Water, Temples, and 900 Years",a:"Walkeshwar",v:["history","quiet","hidden","beautiful"],d:40,s:"A sacred water tank built in 1127 CE, now a secret sanctuary of temples, peacocks, and pilgrims hidden in Mumbai's oldest neighborhood.",st:"Banganga feels extracted from a different era. The rectangular tank is ancient—built during the Silhara dynasty. Around it, narrow alleys and small temples. Pilgrims bathe in the water at dawn. The Walkeshwar temple sits nearby, equally old. Above the tank, carved stone steps and heritage homes with peeling paint. Peacocks roam freely. The light here is soft even at noon. Local residents tend gardens; temples perform rituals unchanged for centuries. The water is believed sacred—connected, in mythology, to the Ganges. This is where Mumbai's history lives quietly, untouched by the city's speed.",im:"A pilgrim in white, splashing water from the tank over his face, offering prayers to gods whose statues have watched this same water for 900 years.",t:"Located in Walkeshwar, accessible via local train (Churchgate Line). Small entry fee for temple areas. Best early morning or late evening. Photography allowed respectfully. Very few tourists; locals treat it as their daily sacred place.","c":[],"r":"g","nn":"बंगाणा टाकी","ns":"900 वर्षांचे पाणी, देवता आणि मंदिर","nst":"बंगाणा टाकी 1127 साली बांधली गेली. येथे प्राचीन मंदिरे आणि लोक दरोज प्रार्थना करतात. हा मुंबईचा सर्वात जुना भाग आहे.","nt":"सकाळी 6-8 किंवा संध्याकाळी 5-7 दरम्यान जा. वॉकेश्वर स्टेशन पासून पायी हाटा. मंदिरांत आदरने वर्तन करा."}
,{id:42,n:"Girangaon Mill Lanes — Industrial Heritage Walking Route",a:"Parel/Girangaon",v:["history","local","weird","hidden"],d:60,s:"Former textile mill district where 130 mills once turned Mumbai into the 'Manchester of the East'—now a patchwork of shuttered factories and worker communities.",st:"Girangaon is industrial archaeology. Walk the narrow lanes between dormant mills and chawls (worker tenement blocks). The buildings are red-brick Victorian, some with clock towers. Mills named for their owners—Homi Mill, Empress Mill, Tata Mills. Many are locked, some repurposed as studios or storage. The chawl communities still thrive—narrow shared courtyards, laundry strung between buildings, smell of spices from lunch being cooked. This was where India's first textile revolution happened, where the modern Indian working class was born. The energy is melancholic, nostalgic, layered with history.",im:"A mill worker's daughter, walking home past the shuttered gates where her father worked forty years, carrying forward the memory of noise and looms in her footsteps.",t:"Parel or Lower Parel stations nearby. Walk during daytime. The Museum of Industrial Heritage is at United Mill in Lalbaug. Some mills have studios and galleries inside—check current access. Very much a living neighborhood; respect residents' privacy.","c":[],"r":"y","nn":"गिरंगाव मिलच्या गल्ली","ns":"130 मिलांचा औद्योगिक इतिहास","nst":"गिरंगाव येथे एकदा 130 कपडाकारी मिलें होती. आता बंद आहेत पण कामगारांचे समाज अजूनही तेथे राहतो. इतिहास आणि सुन्न आवाजाचा मिश्रण.","nt":"पारेल स्टेशन पासून सकाळी किंवा दुपारी जा. कामगारांचे घर सन्मान करा. किरकोळ कोणी खजिना ढूंढायला विचारू नकोस."}
,{id:43,n:"Bandra Fort Rocks — Sunset at the Edge",a:"Bandra",v:["beautiful","views","quiet","free entry"],d:30,s:"Crumbling 17th-century Portuguese fort perched on black rocks above the Arabian Sea—best place to watch sunset alone in Mumbai.",st:"Bandra Fort is a skeleton. The fort itself is largely ruined, but what remains is extraordinary. Stone walls emerge from rough black rock overlooking the sea. Local fishermen use the rocks as stages. You arrive at high tide and find yourself waist-deep between boulders—the sea surges around you, spray in your face, salt in the air. At sunset, the sky turns amber and the rocks blacken into silhouettes. Few tourists come here; mostly locals, couples, photographers. The fort was built by the Portuguese in 1640 to defend against pirates. Now it defends nothing but offers everything—solitude, beauty, Atlantic-facing light.",im:"A solitary figure standing on the rocks at dusk, waves breaking around them, the entire city skyline behind them glowing gold, feeling simultaneously isolated and at the center of the world.",t:"Bandra. Walk toward the rocks from Bandra Fort viewpoint. Best at low tide but beautiful at any tide. Wear water-resistant shoes—rocks are slippery. Sunset is 6:30-7pm depending on season. No facilities; go with water.","c":[],"r":"g","nn":"बांद्रा किल्ला खडक","ns":"समुद्रातून जुने किल्ले आणि सूर्यास्त","nst":"बांद्रा किल्ला 1640 मध्ये पोर्तुगीजांनी बांधला. आता खडकावर उडणारे पक्षी आणि लाटा. सूर्यास्त हा स्वर्गीय दृश्य.","nt":"बांद्रा स्टेशन पासून 10 मिनिटांचा रस्ता. घसरण्याची शक्यता आहे. पाण्याचे जुते घेऊन जा. सूर्यास्त साधारण 6:30 ला."}
,{id:44,n:"Crawford Market Covered Bazaar Walks",a:"Fort",v:["hidden","local","weird","architecture"],d:50,s:"Victorian-era wholesale market with narrow segregated lanes—each street dedicated to spices, flowers, party goods, perfume—pure sensory overload.",st:"Crawford Market, built 1869, is sensory assault in the best way. You enter through the main lion-emblazoned entrance and immediately lose yourself in a maze of lanes. 'Mirchi Gaali' (chili street) has open sacks of red, green, yellow chilies. The flower lane (Pholon ki Galli) smells like jasmine and marigold concentrated. Abdul Rehman Street has perfumes and essences bottled for 150 years. Metal workers hammer in Lohar Chawl. Each lane is its own economy, its own community. The architecture is Victorian Gothic with carved stone faces. The market supplies restaurants and homes across Mumbai. Bargaining is expected. This is not tourism; this is Mumbai's infrastructure.",im:"A spice merchant weighing cardamom on brass scales, the same scales his grandfather used, crushing one pod between his fingers to release the ghost of a thousand kitchens.",t:"Fort area. M.G. Road station nearest. Go 9am-12pm, before lunch rush. Don't take large bags. Photography discouraged in some lanes—ask first. The market is chaotic but organized. Bring cash. Eat at any of the lane-side tea stalls.","c":[],"r":"g","nn":"क्रॉफर्ड बाजार गल्ली","ns":"1869 च्या विक्टोरियन मार्केट मधील घमघमाट","nst":"क्रॉफर्ड बाजार मुंबईचा संपूर्ण शहर आहे. मिर्ची, फुल, सुगंध, धातु - सगळे येथे. 150 वर्षांची परंपरा अजूनही जिवंत.","nt":"फोर्ट, एमजी रोड स्टेशन. सकाळी 9-12. मोठी बॅग न घेऊन जा. फोटो पहिल्या विचारा. नकद घेऊन जा."}
,{id:45,n:"Sewri Fort and Flamingo Viewing",a:"Sewri",v:["nature","hidden","quiet","views"],d:60,s:"Tiny 17th-century fort with views of oil refineries and mangrove creeks—best place in Mumbai to spot migratory pink flamingos (Nov-March).",st:"Sewri Fort is small, weathered, and wonderful. The fort is a white lighthouse-like structure on the shoreline. Around it, mangrove creeks and salt pans. The area is industrial (oil refineries across the water) and natural (birds everywhere). November to March, flamingos arrive from Central Asia. They wade in the shallow creeks—thousands of them, pink against grey water. The contrast is strange and beautiful. Sewri is where Mumbai's industrial side meets ecological side. Locals fish here. Photographers come for light. Few tourists. The fort offers a view across the harbor toward the Elephanta islands.",im:"A flamingo, improbably pink against Mumbai's gray industrial backdrop, standing on one leg as if defying the city to change its nature.",t:"Sewri, accessible via CSMT train then local bus or taxi to Sewri jetty. Best morning light. Flamingos visible Nov-March. Bring binoculars. The area is quiet; walk respectfully. Local fishing families appreciate quiet observers.","c":[],"r":"g","nn":"सेवरी किल्ला","ns":"फ्लामिंगो आणि समुद्रातील सुंदरता","nst":"सेवरी किल्ला 17 व्या शतकातील किल्ला आहे. नोव्हेंबर ते मार्चमध्ये लाखो फ्लामिंगो येथे आतात. अद्भुत दृश्य.","nt":"सेवरी, ट्रेन आणि बस. सकाळी जा. दुर्बिन घेऊन जा. नोव-मार्च मधील फ्लामिंगो हा मुख्य आकर्षण."}
,{id:46,n:"Mahim Dargah — Sufi Shrine and Evening Spiritual Rush",a:"Mahim",v:["history","local","quiet"],d:45,s:"Centuries-old Muslim shrine built on Mahim's beach—pilgrims, Qawwali singers, and incense create an intense spiritual vibe at dusk.",st:"Mahim Dargah sits literally on the beach. It's a white domed shrine dedicated to saint Hazrat Makhdoom Ali. Enter through the bazaar street with flower vendors, candle sellers, ribbon merchants (meant as offerings). Inside, devotees pray on carpets. The air is thick with incense. A Qawwali singer sometimes performs—soulful, ecstatic devotional singing. Women bring flowers and make vows. The shrine has no tourist infrastructure, which is exactly why it feels sacred. Around it, the Mahim neighborhood pulses—fish markets, street food, families, prayers. This is a living shrine, not a monument.",im:"A devotee, eyes closed, swaying to Qawwali, tears on their face, in a space where faith transcends religion and time moves in circles.",t:"Mahim area, walkable from Mahim station. Best visited late afternoon to evening for Qawwali singing (check schedules). Entrance is respectful but free. Bring flowers or sweets as offering. Remove shoes. The adjoining bazaar is chaotic but authentic.","c":[],"r":"g","nn":"महिम दरगाह","ns":"समुद्र किनार्यावरील सूफी मंदिर","nst":"महिम दरगाह 5 शतकांचा तीर्थ आहे. संध्याकाळी कव्वाली गीत होते. महिमांचा आध्यात्मिक केंद्र.","nt":"महिम स्टेशन पासून. संध्याकाळी जा. फुल घेऊन जा. जुत्याचा सन्मान करा."}
,{id:47,n:"Versova Koliwada — Second Fishing Village Remnant",a:"Versova",v:["hidden","history","local","quiet"],d:40,s:"Another surviving Koli fishing community (dating to 1600s) where fisherfolk still sell the morning catch at the beach—less touristed than Worli.",st:"Versova Koliwada is older than Worli Koliwada, traceable to the 1600s. It's less crowded with tourists, more integrated into the beach's daily rhythm. Walk the narrow lanes early morning to find fishermen cleaning nets, selling fish directly from boats. The structures are simple—old wooden houses, communal spaces, makeshift temples. The creek is narrow and alive. The beach above is where catch is laid out. Families live here generationally; fishing knowledge passes like DNA. The Koliwada sits under threat from development, but the community persists. This is about stubborn history, inheritance, and the sea.",im:"A fisherman's son, learning the weight of a net from his father for the first time, understanding that this skill will leave his hands in five years when he moves to the city for tech jobs.",t:"Versova beach area. Early morning (5am-8am) best for fishing activity. Walk through lanes with respect. Ask fishermen before photographing. The beach is public; many locals swim and exercise here. Simple tea shops nearby.","c":[],"r":"g","nn":"वर्सोवा कोळीवाडा","ns":"1600 चा मासेमारी गांव","nst":"वर्सोवा कोळीवाडा हा वर्ली पेक्षा अधिक जुना आहे. येथे मासेमारी पारंपरिक पद्धतीने होते. समुद्र आणि समाज एकमेकांचा.","nt":"वर्सोवा बीच. सकाळी 5-8. मासेमारी सम्मान करा. फोटो विचारा."}
,{id:48,n:"Khotachiwadi Heritage Colony — Goan-Style Houses",a:"Girgaum",v:["history","beautiful","architecture","hidden"],d:45,s:"Narrow lanes of colorful Portuguese-era mansions with sloped roofs and verandas—Mumbai's closest approximation to Goa's architectural heritage.",st:"Khotachiwadi is a 300-year-old neighborhood frozen in a gentler time. Colorful Portuguese-style homes with Portuguese tiles, sloped roofs, inner courtyards (Portuguese: 'chawl'). The lanes are so narrow that two cars cannot pass. Gardens overflow onto streets. Residents have lived here for generations. Some homes are museums; others are inhabited. The architecture reflects Mumbai's syncretism—Portuguese colonialism mixed with Indian living. At night, lantern light filters through wooden shutters. The neighborhood has slow, walking-pace life. Few tourists know about it. Local residents treat it as their own. This is the Mumbai that tourism hasn't yet spoiled.",im:"An elderly woman in a yellow dress, sitting on her veranda in the golden hour, watching the lane as she has for sixty years, as if waiting for something to come that never arrives but might.",t:"Girgaum (east Fort area). Walk lanes early evening when residents are out. A few buildings are heritage hotels or studios. Photography is appreciated but ask residents. Very few shops; bring water. The lanes are genuinely confusing—getting lost is part of the experience.","c":[],"r":"g","nn":"खोटाचिवाडी","ns":"पोर्तुगीज रंगीत घरांची गली","nst":"खोटाचिवाडी हा 300 वर्षांचा गांव आहे. पोर्तुगीज घर आणि भारतीय जीवन एकत्र. बहुरंगी आणि शांत.","nt":"गिरगाव, फोर्ट पूर्व. संध्याकाळी हटा. रहिवाशांला फोटो विचारा. मोबाईल पर्जन्य शक्यता कमी."}
,{id:49,n:"Chhatrapati Shivaji Terminus (Heritage Walk) — Gothic Cathedral Train Station",a:"Fort",v:["architecture","history","beautiful"],d:75,s:"UNESCO-listed Victorian Gothic railway terminus (1887) built as a palace for trains—the grandest example of colonial architecture in Mumbai.",st:"CST is a cathedral made for trains. Built between 1878-1888 during the height of the Raj, it's a masterpiece of Victorian-Gothic revival. The central dome is surrounded by turrets, spires, carved stone faces, and ornamental details. Inside, soaring ceilings, intricate tile work, grand staircases. Thousands of trains arrive and depart daily; millions of commuters pour through daily. Yet the building maintains its aristocratic bearing. The slow walk through platforms, waiting rooms, and grand hallways reveals details—carved gargoyles, stone ornaments, craftsmanship impossible to replicate now. This is colonialism with unintended beauty. It was built to assert British power but became the heartbeat of India's independence struggle. Gandhiji traveled on these trains to his assassin.",im:"A child in school uniform, rushing for a train, glancing up at a stone ceiling carved by unknown artisans, not knowing this building will hold every commute of their life.",t:"Fort area, CST station. Arrive early morning for quieter atmosphere. Free to explore public areas. Photography allowed. Walk platform to platform slowly. Heritage tours available. The Central Library inside is stunning. Avoid rush hours (7-9am, 5-7pm).","c":[],"r":"g","nn":"छत्रपती शिवाजी टर्मिनस","ns":"1887 चा गॉथिक ट्रेन महल","nst":"CST हा विक्टोरियन आर्किटेक्चरचा उत्कृष्ट नमुना आहे. राजवाडे सारखा ट्रेन स्टेशन. 1878-1888 मध्ये बांधला.","nt":"फोर्ट, CST स्टेशन. सकाळी 6-8. खाली प्लॅटफॉर्ममध्ये हटा. मोठी गर्दी असते 7-9 व 5-7 दरम्यान."}
,{id:50,n:"Dhobi Ghat (Mahalaxmi) — World's Largest Open-Air Laundry",a:"Mahalaxmi",v:["local","weird","architecture"],d:40,s:"Ancient open-air laundry where 700+ families wash 100,000+ clothes daily by hand using stone troughs and monsoon magic—a centuries-old system that still works.",st:"Dhobi Ghat is a labyrinth of concrete wash pens arranged like a honeycomb. Each pen belongs to a dhobi (washer) family, passed through generations. You see them beating wet clothes on flat stones, creating rhythmic percussion that echoes across the ghat. Clothes are flayed, wrung, rinsed in communal channels, then laid out to dry on ropes stretching across the ghat—creating forests of color. A coding system on garment tags ensures the right shirt reaches the right owner (a system that predates computers). The scale is industrial but the method is entirely manual. The profession is disappearing—younger generations move to cities, become engineers. But the remaining dhobis persist. The ghat smells of soap, heat, and devotion. It's disorganized-looking but precise. A visitor sees chaos; the dhobis see elegant mathematics.",im:"A dhobi's hands, weathered from forty years of beating cloth, moving with unconscious grace, muscle-memory of a million wring-twists, knowing when cloth is clean by touch alone.",t:"Mahalaxmi, near Mahalaxmi station. Early morning (6am-8am) shows maximum activity. Afternoon is slower. The ghat is slightly chaotic; watch your footing on wet stones. Photography is tolerated but ask first—these are workplaces, not museums. Bring water and hat.","c":[],"r":"g","nn":"धोबी घाट","ns":"दैनिक 100,000 कपडे हाथाने धुणे","nst":"धोबी घाट मुंबईचा 150 वर्षांचा कपडाधोबी केंद्र आहे. 700 कुटुंबे, दैनिक 100,000 कपडे. मशीनविना, पारंपरिक, अद्भुत.","nt":"महालक्ष्मी स्टेशन. सकाळी 6-8. ओले दगड सावधगीने. फोटो विचारा. हे काम करण्याचे ठिकाण आहे."}
,{id:51,n:"Sanjay Gandhi National Park — Monsoon Forest and Kanheri Caves",a:"North Mumbai",v:["nature","history","hidden","beautiful"],d:180,s:"Ancient Buddhist cave monastery (1st century BCE) hidden inside a national park forest—pre-colonialaccess to monastic history and monsoon light through jungle.",st:"Sanjay Gandhi National Park is Mumbai's lungs. Inside this protected forest are caves carved into rock by Buddhist monks in the 1st century BCE. The main cave (Cave 3) is a massive hall with a stupa (Buddhist shrine) in the center, stone pillars, carved gateways. The scale suggests community—hundreds of monks lived here, studied, meditated. Walking to the caves means climbing through jungle, negotiating monsoon mud, navigating stone steps. The forest canopy filters green light. You hear bird calls, insect noise, water. The caves feel ancient in truth, not in metaphor. This is Mumbai before Mumbai, when the islands were forested and sacred sites. The park also has leopards, though sightings are rare. Most visitors come for the caves but miss the forest's beauty.",im:"A Buddhist monk in 100 CE, meditating in the cave as monsoon rain sounds outside, aware that his ritual will be understood by strangers 2000 years hence.",t:"North Mumbai, Borivali East. National park entrance fee required. SGNP safari booking recommended for safety (guides arrange everything). Caves are 1-2 hour hike from parking. Best in monsoon (June-Sept) and winter (Oct-Dec). Bring water, sturdy shoes. Much less touristy than other places.","c":[],"r":"g","nn":"संजय गांधी राष्ट्रीय उद्यान","ns":"1000 वर्षांच्या बौद्ध गुहा मठ","nst":"SGNP मध्ये कन्हेरी गुहा आहे जी 1 शतकाच्या बीसीई पुरानी आहे. बौद्ध साधकांनी हे खोदले. जंगल आणि इतिहास एकत्र.","nt":"बोरिवली पूर्व. प्रवेश शुल्क. गाईड घेऊन जा. मान्सून सर्वोत्तम. मजबूत जुते घेऊन जा."}
,{id:52,n:"Gorai Mangrove Boardwalk (New) — Wooden Trail Through Estuary",a:"Gorai",v:["nature","free entry","quiet","beautiful"],d:90,s:"India's first dedicated mangrove forest park with a 740-meter wooden boardwalk through dense estuary ecosystem—newly opened, largely undiscovered.",st:"The Gorai Mangrove Park is new (opened 2026) and still finding its audience. The boardwalk is wooden, 2.4 meters wide, winds through living mangrove forest. The trees rise on both sides; roots tangle below; water reflects sky. The ecosystem is rich—migratory birds, small fish, crabs. The boardwalk doesn't cut trees; it hovers above them. There's a Nature Interpretation Centre with exhibits. The whole park is eco-designed. The quiet here is profound. Few people know about it yet. It's the kind of place where you can hear your own breathing. Mangroves filter salt, slow climate change, birth fish. Walking through them, you walk through survival. The creek water is tidal; light changes hourly.",im:"A heron, perfectly still on a mangrove root, watching water below, aware that this forest is its nursery, its hunting ground, its refuge.",t:"Gorai, North Mumbai. Accessible by local bus or taxi to Gorai village, then short walk to park entrance. New facility; entry fee likely modest. Best early morning for bird activity. Bring hat, water, binoculars. Walkway is accessible for all mobility levels. Photography encouraged.","c":[],"r":"g","nn":"गोराई म्यानग्रोव्ह बोर्डवॉक","ns":"भारताचा पहिला मॅनग्रोव्ह पार्क","nst":"गोराई म्यानग्रोव्ह पार्क 2026 मध्ये उघडला. 740 मीटरचा लाकडी रस्ता. शांत आणि परিस्थिती-शुद्ध.","nt":"गोराई, उत्तर मुंबई. बस किंवा टॅक्सी. सकाळी सर्वोत्तम. टोपी आणि दुर्बिन घेऊन जा."}

</div>}
{p.ef&&<p className="text-xs mt-3 pt-3" style={{color:"#555",lineHeight:1.7,borderTop:"1px solid #dcfce7"}}>🍔 {p.ef}</p>}
{p.sf&&<p className="text-xs mt-2" style={{color:"#555",lineHeight:1.7}}>🏠 {p.sf}</p>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
<div className="mt-5">
<p className="text-xs font-bold mb-2" style={{color:"#888",letterSpacing:"0.08em",textTransform:"uppercase"}}>City Moods</p>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} style={{borderRadius:10,overflow:"hidden",aspectRatio:"2/3",background:"#eee"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>)}</div></div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TBGS={"places":"url('../../textures/tex12.webp') center/cover fixed no-repeat","collections":"url('../../textures/tex13.webp') center/cover fixed no-repeat","missions":"url('../../textures/tex14.webp') center/cover fixed no-repeat","plan":"url('../../textures/tex15.webp') center/cover fixed no-repeat","phrases":"url('../../textures/tex16.webp') center/cover fixed no-repeat","default":"url('../../textures/tex12.webp') center/cover fixed no-repeat"};function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Mumbai Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Mumbai Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
