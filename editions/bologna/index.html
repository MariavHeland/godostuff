  {id:45,n:"Porta Mascarella Gate Climb — Navile",a:"Navile",v:["history", "high_spots"],d:45,s:"Climb the inside of a medieval city gate for a view of the city wall network spreading out like defensive veins.",st:"The climb is through narrow passages inside the gate structure. It\'s cool, stone, echoing. Then you emerge on top where the defensive walls stretch in both directions. You see the strategy—the gate is positioned to control flow. The walls are positioned to rain arrows down on invaders. It\'s military architecture made visible.",im:"It\'s 1380. An enemy approaches. Defenders fill this gate and the walls above. Arrows fly. One group holds a gate against an army. That gate is still standing.",t:"The climb is through narrow passages inside the gate structure. It\'s cool, stone, echoing. Then you emerge on top where the defensive walls stretch in both directions. You see the strategy—the gate is positioned to control flow. The walls are positioned to rain arrows down on invaders. It\'s military architecture made visible.\",im:\"It\'s 1380. An enemy approaches. Defenders fill this gate and the walls above. Arrows fly. One group holds a gate against an army. That gate is still standing.\",t:\"Free. It\'s not marked so you have to find it. It\'s at Porta Mascarella, north of the center. Not always officially open but locals use it constantly. Go during the day. Takes 15 minutes to climb and explore. The view is less famous than San Luca but just as good.",c:["history_big", "high_spots"],r:"y",nn:"Porta Mascarella Gate Climb",ns:"Porta Mascarella Gate Climb è una gioia italiana.",nst:"Porta Mascarella Gate Climb respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:46,n:"Jazz Club Sequitur — Centro Storico",a:"Centro Storico",v:["night", "beautiful"],d:46,s:"A basement jazz club where local musicians play for crowds of 30 people—live jazz so close you can see the musician\'s fingers on the keys.",st:"You descend into a dark room. A stage is maybe 3 meters away. The band starts. A saxophone wails. A double bass shakes the floor. It\'s intimate, intense, real. The sweat on the musicians\' faces is visible. You\'re not watching a concert, you\'re in a conversation with music.",im:"It\'s any night. A musician comes here because they love it, not because they\'re famous. They play like no one\'s listening. Everyone listens like they\'re hearing music for the first time.",t:"You descend into a dark room. A stage is maybe 3 meters away. The band starts. A saxophone wails. A double bass shakes the floor. It\'s intimate, intense, real. The sweat on the musicians\' faces is visible. You\'re not watching a concert, you\'re in a conversation with music.\",im:\"It\'s any night. A musician comes here because they love it, not because they\'re famous. They play like no one\'s listening. Everyone listens like they\'re hearing music for the first time.\",t:\"Entry €10-15, drinks €5-8. Music usually starts 10pm. Go after 11pm when the second set starts and the crowd is pure music fans. Go with someone who appreciates silence between songs. Book ahead for weekends.",c:["night", "beautiful"],r:"g",nn:"Jazz Club Sequitur",ns:"Jazz Club Sequitur è una gioia italiana.",nst:"Jazz Club Sequitur respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:47,n:"San Domenico Church Underground — Santo Stefano",a:"Santo Stefano",v:["history", "weird"],d:47,s:"Below a church lies a crypt housing the remains of Saint Dominic—descend into candlelit darkness to see medieval devotion made stone.",st:"The descent is gradual. Light fades. You enter the crypt. Candles flicker against stone walls. The shrine is ornate—gold, marble, a tomb covered in prayers. People kneel in the shadows. It\'s devotion in its raw form. It\'s what faith looked like before electricity.",im:"It\'s 1300. Dominican monks tend this crypt, generation after generation. They never leave. They never stop praying for the man in the tomb. Now tourists come. The monks are gone but the candles still burn.",t:"The descent is gradual. Light fades. You enter the crypt. Candles flicker against stone walls. The shrine is ornate—gold, marble, a tomb covered in prayers. People kneel in the shadows. It\'s devotion in its raw form. It\'s what faith looked like before electricity.\",im:\"It\'s 1300. Dominican monks tend this crypt, generation after generation. They never leave. They never stop praying for the man in the tomb. Now tourists come. The monks are gone but the candles still burn.\",t:\"Free. The church is on Piazza San Domenico, south of Piazza Maggiore. The crypt is always accessible. Go on a quiet afternoon when no tours are happening. Bring a quiet mind. This isn\'t a tourist spot, it\'s a place of prayer.",c:["scary", "history_big"],r:"g",nn:"San Domenico Church Underground",ns:"San Domenico Church Underground è una gioia italiana.",nst:"San Domenico Church Underground respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:48,n:"Cimitero Monumentale Architecture Tour — Irnerio",a:"Irnerio",v:["beautiful", "history"],d:48,s:"Join a guided tour of the monumental cemetery and learn the stories behind the sculptures—each tomb is a life compressed into art.",st:"A guide leads you through rows of elaborate tombs. This one is a man who built factories. This one is a mother of 13 children. The guide tells the stories. The sculptures show grief, power, hope. A marble woman weeping forever. A family frozen in an embrace. Death becomes visible.",im:"It\'s 1900. A wealthy man dies. His family commissions the finest sculptor in Italy. The sculpture will outlast his company, his family name, everything. Only the grief remains, in stone.",t:"A guide leads you through rows of elaborate tombs. This one is a man who built factories. This one is a mother of 13 children. The guide tells the stories. The sculptures show grief, power, hope. A marble woman weeping forever. A family frozen in an embrace. Death becomes visible.\",im:\"It\'s 1900. A wealthy man dies. His family commissions the finest sculptor in Italy. The sculpture will outlast his company, his family name, everything. Only the grief remains, in stone.\",t:\"Guided tours €12-15, usually on weekends. Book ahead. Go on an overcast afternoon—the light on marble is perfect. Spend 90 minutes. You\'ll leave feeling both sad and inspired.",c:["famous_dead", "architecture"],r:"g",nn:"Cimitero Monumentale Architecture Tour",ns:"Cimitero Monumentale Architecture Tour è una gioia italiana.",nst:"Cimitero Monumentale Architecture Tour respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:49,n:"Torrazzo Tower — Santo Stefano",a:"Santo Stefano",v:["hidden", "high_spots"],d:49,s:"A smaller tower hidden in plain sight that you can climb for a side view of the city most tourists completely miss.",st:"The stairs spiral up. Each step is worn smooth by centuries of feet. The stairwell is narrow. Then you emerge on a covered platform. From here, the view is different—perpendicular to the Two Towers, showing different neighborhoods. You see how the city actually connects rather than just the postcard view.",im:"It\'s 1200. A merchant built this tower to watch his trade routes. Now it watches a city that forgot he existed. The tower remembers.",t:"The stairs spiral up. Each step is worn smooth by centuries of feet. The stairwell is narrow. Then you emerge on a covered platform. From here, the view is different—perpendicular to the Two Towers, showing different neighborhoods. You see how the city actually connects rather than just the postcard view.\",im:\"It\'s 1200. A merchant built this tower to watch his trade routes. Now it watches a city that forgot he existed. The tower remembers.\",t:\"€3-4 entry. It\'s not on most maps so locals prefer it to the crowded Two Towers. Takes 20 minutes to climb. Go midweek morning for zero crowds. The view is honestly better because fewer people know about it.",c:["high_spots", "hidden"],r:"g",nn:"Torrazzo Tower",ns:"Torrazzo Tower è una gioia italiana.",nst:"Torrazzo Tower respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:50,n:"Ostello San Sisto Hostel Rooftop — Irnerio",a:"Irnerio",v:["hidden", "beautiful"],d:50,s:"A hostel with a rooftop bar open to the public—watch the sunset with backpackers and a cold drink, no reservation required.",st:"You climb to the roof. The city sprawls below. The Two Towers glow in the distance. A breeze moves through. People sit in groups, laughing in different languages. It\'s international and local at once. The drinks are cheap. The view is free. The moment is perfect.",im:"It\'s 2010. A hostel decides to open their roof. Young people gather. The city becomes smaller when you see it from above. The towers become human-scale again.",t:"You climb to the roof. The city sprawls below. The Two Towers glow in the distance. A breeze moves through. People sit in groups, laughing in different languages. It\'s international and local at once. The drinks are cheap. The view is free. The moment is perfect.\",im:\"It\'s 2010. A hostel decides to open their roof. Young people gather. The city becomes smaller when you see it from above. The towers become human-scale again.\",t:\"Free entry to the rooftop bar. Drinks €4-6. It\'s in the Irnerio neighborhood, north of center. Open until 11pm usually. Go at 6pm-7pm when the light is golden. No reservation needed. Go solo or with friends.",c:["high_spots", "beautiful"],r:"g",nn:"Ostello San Sisto Hostel Rooftop",ns:"Ostello San Sisto Hostel Rooftop è una gioia italiana.",nst:"Ostello San Sisto Hostel Rooftop respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:51,n:"Ravenna Basilica of Sant\'Apollinare — Day Trip",a:"Day Trip",v:["history", "beautiful"],d:51,s:"Beyond the famous mosaics is a basilica in the countryside—walk through rapeseed fields to reach it, then step into 6th-century perfection.",st:"You walk through fields turning golden in late afternoon. The basilica rises suddenly, alone, like it fell from heaven and landed there. Inside, mosaics show a long procession of saints—they\'re still processing 1,500 years later. The light hits the dome. Everything glows.",im:"It\'s 520. Builders finish this basilica in the middle of nowhere. For 1,500 years it stands alone. Now you find it by accident and understand eternity.",t:"You walk through fields turning golden in late afternoon. The basilica rises suddenly, alone, like it fell from heaven and landed there. Inside, mosaics show a long procession of saints—they\'re still processing 1,500 years later. The light hits the dome. Everything glows.\",im:\"It\'s 520. Builders finish this basilica in the middle of nowhere. For 1,500 years it stands alone. Now you find it by accident and understand eternity.\",t:\"Train from Bologna to Ravenna (45 min, €8-15), then local bus or taxi to Sant\'Apollinare (15 more minutes). €3 entry. Spend 90 minutes total. Go on an overcast day—the light bouncing off those ancient mosaics is perfect when it\'s not too bright. Pack water. It\'s rural. Have a picnic.",c:["history_big", "architecture"],r:"g",nn:"Ravenna Basilica of Sant\'Apollinare",ns:"Ravenna Basilica of Sant\'Apollinare è una gioia italiana.",nst:"Ravenna Basilica of Sant\'Apollinare respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},

  {id:106,n:"Seven Secrets of Bologna Self-Guided",a:"Centro Histórico",v:["hidden","history","local"],d:15,s:"Hidden details in medieval buildings and alleyways — a local folklore hunt",st:"Bologna has seven \"secrets\" local kids learn about: a tiny statue on a corner, a hidden relief, a forbidden sight. These are urban folklore, marked with informal signs. Hunt them as a treasure game; the city reveals itself through careful looking.",im:"Time-travel: Medieval Bologna was a center of learning; these symbols protected guild secrets.",t:"Free. Self-guided using local blogs/apps (search \"Seven Secrets Bologna\").",c:["history_big","local_only"],r:"g",nn:"Sette Segreti di Bologna",ns:"Secretos ocultos en el antiguo Bologna",nst:"Caza los siete secretos escondidos en la ciudad.",nt:"Gratis. Guía de blogs locales."},
  {id:107,n:"Arcades (Portici) Covered Walks",a:"Centro Histórico",v:["architecture","quiet","beautiful"],d:20,s:"UNESCO porticoes creating 40+ km of covered walkways — medieval and modern",st:"Bologna\'s arcades are its signature: 40 km of covered walkways where you can stroll rain-free. From medieval narrow passages to modern wide porticoes, each section has a different character. It\'s architecture as urban planning.",im:"Time-travel: Arcades began in the 11th century for flood protection and have expanded ever since.",t:"Free. Walk at any time. Various routes through different districts.",c:["architecture","history_big"],r:"g",nn:"Portici di Bologna",ns:"Columnatas cubiertas — 40 km de paseos",nst:"Camina bajo los pórticos históricos de Bologna.",nt:"Gratis. Accesible cualquier hora."}

,{id:117,n:"Finestrella di Via Piella",a:"Centro Storico",v:["hidden"],d:15,s:"Piccola Venezia bolognese.",st:"Antica finestra che si apre su un canale nascosto usato per secoli per muovere il grano ai mulini, creando un'illusione di Venezia nel cuore di Bologna.",im:"Immagina case medievali affacciate su acque tranquille.",t:"Apri lo sportellino con delicatezza, meglio al tramonto.",c:["hidden", "history"],r:"g",nn:"Finestrella di Via Piella",ns:"La piccola Venezia bolognese.",nst:"Finestra antica su canale nascosto per il grano ai mulini, illusione veneziana a Bologna.",nt:"Apri con cura lo sportellino, ideale al tramonto.",fixes:[]},

<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Bologna Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Bologna Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
