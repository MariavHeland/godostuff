const P = [
  {id:1,n:"Portico di San Luca — San Luca",a:"San Luca",v:["history", "beautiful"],d:1,s:"Walk under 666 ancient arches up a sacred hilltop—the longest portico in the world, unchanged for 400 years.",st:"Your feet echo on terracotta tiles. Arches stretch endlessly above, filtering golden afternoon light. At the top, the white sanctuary glows. Locals jog past you like it\'s nothing. It\'s their secret commute to God.",im:"It\'s 1674. Pilgrims process up these arches through rain and plague, their candles flickering in the darkness, praying to the Madonna above the city.",t:"Your feet echo on terracotta tiles. Arches stretch endlessly above, filtering golden afternoon light. At the top, the white sanctuary glows. Locals jog past you like it\'s nothing. It\'s their secret commute to God.\",im:\"It\'s 1674. Pilgrims process up these arches through rain and plague, their candles flickering in the darkness, praying to the Madonna above the city.\",t:\"Free. Take bus 20 from Piazza Maggiore to San Luca. Go at sunset—the light is unreal. Bring water; it\'s a steep climb. Locals usually start from Piazza di Porta Saragozza (Bolognina neighborhood).",c:["history_big", "high_spots"],r:"g",nn:"Portico di San Luca",ns:"Portico di San Luca è una gioia italiana.",nst:"Portico di San Luca respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:2,n:"Two Towers — Centro Storico",a:"Centro Storico",v:["history", "hidden"],d:2,s:"Two medieval towers lean over Piazza di Porta Ravegnana like they\'re about to crash down on you—one\'s literally tilting.",st:"The Asinelli tower soars 97 meters straight up. The Garisenda leans 3 meters off vertical, dwarfing the square. Climb the Asinelli stairs (498 of them) and Bologna spreads below in terracotta waves. Your legs burn. Your lungs burn. Worth it.",im:"It\'s 1109. Merchant families race to build the tallest tower in the city, stacking wealth and violence layer by layer. Someone\'s going to die in a feud over this skyline.",t:"The Asinelli tower soars 97 meters straight up. The Garisenda leans 3 meters off vertical, dwarfing the square. Climb the Asinelli stairs (498 of them) and Bologna spreads below in terracotta waves. Your legs burn. Your lungs burn. Worth it.\",im:\"It\'s 1109. Merchant families race to build the tallest tower in the city, stacking wealth and violence layer by layer. Someone\'s going to die in a feud over this skyline.\",t:\"Asinelli costs €5, Garisenda is free exterior. Open daily 9:30am-6pm. Best light at sunrise. It\'s the heart of Bologna—can\'t miss it but go early to beat crowds.",c:["history_big", "architecture"],r:"g",nn:"Two Towers",ns:"Two Towers è una gioia italiana.",nst:"Two Towers respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:3,n:"Finestrella — Centro Storico",a:"Centro Storico",v:["hidden", "beautiful"],d:3,s:"A secret window over a tiny canal in the middle of the city—Bologna\'s Venice, just 2 meters wide and absolutely photogenic.",st:"You turn a corner near the Two Towers and suddenly: water. A narrow canal reflects old brick buildings. A single window frames the scene like a painting. Locals lean out of it. Pigeons scatter. It feels like you\'ve walked through a portal into another century.",im:"It\'s 1280. These canals flowed through the entire city, powering mills and running sewage away. Then they paved most of them over, forgot them, buried them alive under the stones.",t:"You turn a corner near the Two Towers and suddenly: water. A narrow canal reflects old brick buildings. A single window frames the scene like a painting. Locals lean out of it. Pigeons scatter. It feels like you\'ve walked through a portal into another century.\",im:\"It\'s 1280. These canals flowed through the entire city, powering mills and running sewage away. Then they paved most of them over, forgot them, buried them alive under the stones.\",t:\"Free. Located on Via Pescherie Vecchie, two minutes from Piazza di Porta Ravegnana. Go midweek morning—no tourists yet. Bring your phone for the shot; everyone does.",c:["romantic_water", "hidden"],r:"g",nn:"Finestrella",ns:"Finestrella è una gioia italiana.",nst:"Finestrella respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:4,n:"Teatro Anatomico — Archiginnasio",a:"Santo Stefano",v:["history", "weird"],d:4,s:"Step into the secret room where they dissected dead bodies in front of 250 students in the 1600s—the walls are carved with skeletons.",st:"You enter a tall wooden amphitheater. Wooden desks rise in concentric circles around a central dissection table. The walls are covered in intricate wood carvings—skulls, skeletons, anatomical diagrams, morbid jokes in Latin. Medical students crammed in here watching bodies opened up. No anesthetic. Just screams and knowledge.",im:"It\'s 1637. A corpse lies on the marble slab. The professor makes the first cut. Blood drips. Students lean in, packed shoulder-to-shoulder, desperate to see a human heart for the first time. Some faint. Some vomit. Most scribble notes.",t:"You enter a tall wooden amphitheater. Wooden desks rise in concentric circles around a central dissection table. The walls are covered in intricate wood carvings—skulls, skeletons, anatomical diagrams, morbid jokes in Latin. Medical students crammed in here watching bodies opened up. No anesthetic. Just screams and knowledge.\",im:\"It\'s 1637. A corpse lies on the marble slab. The professor makes the first cut. Blood drips. Students lean in, packed shoulder-to-shoulder, desperate to see a human heart for the first time. Some faint. Some vomit. Most scribble notes.\",t:\"€3 entry. Archiginnasio is massive—explore the whole building. It\'s in Piazza Galvani, 10 min walk from train station. Go on a weekday to really feel it. Bring cash—some areas don\'t take cards.",c:["history_big", "scary"],r:"g",nn:"Teatro Anatomico",ns:"Teatro Anatomico è una gioia italiana.",nst:"Teatro Anatomico respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:5,n:"Piazza Santo Stefano — Santo Stefano",a:"Santo Stefano",v:["history", "beautiful"],d:5,s:"Seven churches crammed into one medieval square—a pilgrimage site where crusaders got blessed before dying in holy wars.",st:"The square is misshapen, irregular, like it grew organically over centuries instead of being planned. Seven church facades surround you in Romanesque brick and marble. They\'re so close you could almost touch two at once. Sunlight bounces between them, gold on red brick. Pigeons nest in the bell towers. It smells like age and incense.",im:"It\'s 1200. Pilgrims kneel in the Basilica di Santo Stefano before heading east to Jerusalem. If they don\'t come back, their names get carved into the stone. Most don\'t come back.",t:"The square is misshapen, irregular, like it grew organically over centuries instead of being planned. Seven church facades surround you in Romanesque brick and marble. They\'re so close you could almost touch two at once. Sunlight bounces between them, gold on red brick. Pigeons nest in the bell towers. It smells like age and incense.\",im:\"It\'s 1200. Pilgrims kneel in the Basilica di Santo Stefano before heading east to Jerusalem. If they don\'t come back, their names get carved into the stone. Most don\'t come back.\",t:\"Free exterior, churches inside cost €3-4 each. Around 9am on weekdays, there are almost no tourists. The square is a five-minute walk south from Piazza Maggiore. Sit on the steps for 20 minutes and just watch—it\'s a living medieval neighborhood, not a museum.",c:["history_big", "romantic_water"],r:"g",nn:"Piazza Santo Stefano",ns:"Piazza Santo Stefano è una gioia italiana.",nst:"Piazza Santo Stefano respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:6,n:"Giardini Margherita — Irnerio",a:"Irnerio",v:["beautiful", "quiet"],d:6,s:"A 26-hectare green escape where locals actually hang out instead of tourists—lakes, shade trees, and a secret vibe.",st:"You push through the iron gates and the city noise cuts in half. A lake appears. People lie on the grass reading in Italian. Someone\'s playing a guitar badly under a tree. Kids splash in the water. It\'s so normal and local that you feel like you\'re not supposed to be here, which means you definitely should be.",im:"It\'s 1880. This was all city blocks until Bologna tore them down and decided green space mattered. Now it\'s where everyone comes to pretend work doesn\'t exist.",t:"You push through the iron gates and the city noise cuts in half. A lake appears. People lie on the grass reading in Italian. Someone\'s playing a guitar badly under a tree. Kids splash in the water. It\'s so normal and local that you feel like you\'re not supposed to be here, which means you definitely should be.\",im:\"It\'s 1880. This was all city blocks until Bologna tore them down and decided green space mattered. Now it\'s where everyone comes to pretend work doesn\'t exist.\",t:\"Free. Open dawn to dusk. Bring a book, bring a friend, bring snacks from a nearby market. It\'s 15 minutes north from the city center on foot, or tram 7 gets you close. Go on a sunny weekday afternoon—locals know it but tourists mostly skip it.",c:["parks", "local_only"],r:"g",nn:"Giardini Margherita",ns:"Giardini Margherita è una gioia italiana.",nst:"Giardini Margherita respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:7,n:"Manifattura delle Arti — Navile",a:"Navile",v:["weird", "local"],d:7,s:"A former textile factory turned artist squat—galleries, studios, music venues, and the only place in Bologna that feels like it could implode tomorrow.",st:"Raw brick walls. Exposed pipes. Graffiti that took hours. A band soundchecks in one corner while a painter stretches canvas in another. You climb metal stairs. Every room smells different—turpentine, coffee, incense, ambition. It\'s chaotic and real in a way nothing else in Bologna is.",im:"It\'s 1995. After the factory closed, artists started breaking in at night, claiming corners, painting walls, throwing parties. Now it\'s officially tolerated but barely. It could end tomorrow. That\'s the whole point.",t:"Raw brick walls. Exposed pipes. Graffiti that took hours. A band soundchecks in one corner while a painter stretches canvas in another. You climb metal stairs. Every room smells different—turpentine, coffee, incense, ambition. It\'s chaotic and real in a way nothing else in Bologna is.\",im:\"It\'s 1995. After the factory closed, artists started breaking in at night, claiming corners, painting walls, throwing parties. Now it\'s officially tolerated but barely. It could end tomorrow. That\'s the whole point.\",t:\"Free to walk around. Some exhibitions cost €3-5. It\'s in Navile, north of the city center. Go Friday or Saturday night when there\'s usually live music or DJ sets. Not safe late at night alone, but perfectly fine in groups. Take a taxi if you\'re leaving after midnight—trams stop running.",c:["street_art", "abandoned"],r:"y",nn:"Manifattura delle Arti",ns:"Manifattura delle Arti è una gioia italiana.",nst:"Manifattura delle Arti respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:8,n:"Via del Pratello — Navile",a:"Navile",v:["night", "local"],d:8,s:"The street where every bar spills onto the pavement and you\'ll meet more Bolognese in one night than in a week of museums.",st:"Aperitivo hour. The street is packed shoulder-to-shoulder. Everyone\'s holding a spritz. Someone\'s smoking. Someone\'s loudly arguing about football. A group of students blocks the entire sidewalk. Music from four different bars blurs together. It\'s chaos but it\'s warm. It\'s real. It\'s where Bologna actually lives.",im:"It\'s Friday, 7pm. The workweek just died. Every bar owner puts out tables. The street transforms into an open-air living room. By 11pm, it\'s packed with people who know exactly who they are.",t:"Aperitivo hour. The street is packed shoulder-to-shoulder. Everyone\'s holding a spritz. Someone\'s smoking. Someone\'s loudly arguing about football. A group of students blocks the entire sidewalk. Music from four different bars blurs together. It\'s chaos but it\'s warm. It\'s real. It\'s where Bologna actually lives.\",im:\"It\'s Friday, 7pm. The workweek just died. Every bar owner puts out tables. The street transforms into an open-air living room. By 11pm, it\'s packed with people who know exactly who they are.\",t:\"Budget €5-8 per drink. Most places do happy hour 6-8pm with free snacks. Get there early or late to actually move. It\'s 10 minutes northwest of Piazza Maggiore on foot. Don\'t expect hipster vibes—it\'s pure neighborhood, pure fun.",c:["local_only", "night"],r:"g",nn:"Via del Pratello",ns:"Via del Pratello è una gioia italiana.",nst:"Via del Pratello respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:9,n:"Certosa Cemetery Monumental Art — Irnerio",a:"Irnerio",v:["history", "beautiful"],d:9,s:"Walk through a cemetery where the tombs are basically micro-palaces—elaborate sculptures, marble, and the stories of old money.",st:"You step through iron gates into a silent world. The tombs aren\'t markers in grass—they\'re buildings. Mausoleums with columns. Sculptured angels weeping over marble. A whole city built for the dead, organized by wealth and grief. The afternoon light turns everything golden. No one\'s here. It\'s a museum no one visits.",im:"It\'s 1850. A family patriarch dies. His children spend what a house costs on his tomb. They visit every Sunday in black clothes. They leave flowers. Their own children don\'t. The tomb outlasts the memory.",t:"You step through iron gates into a silent world. The tombs aren\'t markers in grass—they\'re buildings. Mausoleums with columns. Sculptured angels weeping over marble. A whole city built for the dead, organized by wealth and grief. The afternoon light turns everything golden. No one\'s here. It\'s a museum no one visits.\",im:\"It\'s 1850. A family patriarch dies. His children spend what a house costs on his tomb. They visit every Sunday in black clothes. They leave flowers. Their own children don\'t. The tomb outlasts the memory.\",t:\"Free. North of the city, accessible by tram 7. It\'s haunting on a sunny afternoon—go then, not in gloom. Spend an hour. Read the names. Think about the lives behind the marble. It\'s meditative.",c:["history_big", "famous_dead"],r:"g",nn:"Certosa Cemetery Monumental Art",ns:"Certosa Cemetery Monumental Art è una gioia italiana.",nst:"Certosa Cemetery Monumental Art respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:10,n:"Bolognina Street Art — Bolognina",a:"Bolognina",v:["street_art", "local"],d:10,s:"A neighborhood where every wall is a gallery and the artists are still fighting for their walls—not a polished district, a living one.",st:"Murals cover buildings floor to roof. Some are old, faded, beautiful in decay. Others are fresh, aggressive, loud. A stencil of a political figure. A 15-meter portrait of a local musician. Tags everywhere. You\'re walking through something being created in real time. It feels like you\'re inside someone\'s diary.",im:"It\'s 2005. Young artists started tagging these walls as protest art. Twenty years later, it became identity. Every tag is a name. Every wall is a conversation.",t:"Murals cover buildings floor to roof. Some are old, faded, beautiful in decay. Others are fresh, aggressive, loud. A stencil of a political figure. A 15-meter portrait of a local musician. Tags everywhere. You\'re walking through something being created in real time. It feels like you\'re inside someone\'s diary.\",im:\"It\'s 2005. Young artists started tagging these walls as protest art. Twenty years later, it became identity. Every tag is a name. Every wall is a conversation.\",t:\"Free. It\'s northwest of the city center—take tram 7 or a 15-minute walk from Navile. Go during the day with a friend. Some areas get sketchy at night, especially alone. But daytime is totally fine and absolutely worth it.",c:["street_art", "local_only"],r:"y",nn:"Bolognina Street Art",ns:"Bolognina Street Art è una gioia italiana.",nst:"Bolognina Street Art respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:11,n:"Archiginnasio Library — Santo Stefano",a:"Santo Stefano",v:["history", "beautiful"],d:11,s:"Climb to the secret library where 800,000 old books sit in a room that looks like a Renaissance fever dream.",st:"The staircase spirals up. Then you step into a long corridor lined with wooden bookcases floor to ceiling. Afternoon light pours through tall windows. The books are old—some 500 years old. Your shoes echo. You\'re breathing in five centuries of paper and binding glue and human knowledge. It\'s sacred without being a church.",im:"It\'s 1562. Scholars argue in this library over texts that were illegal 50 years ago. They\'re building a new world with words. No one knows yet that this room will outlast empires.",t:"The staircase spirals up. Then you step into a long corridor lined with wooden bookcases floor to ceiling. Afternoon light pours through tall windows. The books are old—some 500 years old. Your shoes echo. You\'re breathing in five centuries of paper and binding glue and human knowledge. It\'s sacred without being a church.\",im:\"It\'s 1562. Scholars argue in this library over texts that were illegal 50 years ago. They\'re building a new world with words. No one knows yet that this room will outlast empires.\",t:\"Free to enter. Open weekday afternoons, usually 3-5pm, but check ahead—hours are weird. It\'s in the Archiginnasio, ten minutes from Piazza Maggiore. Go with someone—sharing silence is better than experiencing it alone.",c:["history_big", "architecture"],r:"g",nn:"Archiginnasio Library",ns:"Archiginnasio Library è una gioia italiana.",nst:"Archiginnasio Library respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:12,n:"Fico Eataly World — Bolognina",a:"Bolognina",v:["local", "beautiful"],d:12,s:"Three football fields of Italian food culture—markets, restaurants, cooking classes, and the smell alone will change your life.",st:"You enter a massive hangar that\'s part market, part museum, part food court. Pasta-making happens live. Chefs demo at stations. Elderly women sell handmade tortellini from tables. The smell is intense—parmigiano, cured meat, fresh basil. You taste things you can\'t name. You buy things you\'ll eat on the train. Everyone here is serious about food in a way that\'s slightly insane and totally Italian.",im:"It\'s 2018. Eataly decides to make a cathedral to Italian food. They don\'t build a museum—they build a place where food is alive, happening, being made and eaten constantly.",t:"You enter a massive hangar that\'s part market, part museum, part food court. Pasta-making happens live. Chefs demo at stations. Elderly women sell handmade tortellini from tables. The smell is intense—parmigiano, cured meat, fresh basil. You taste things you can\'t name. You buy things you\'ll eat on the train. Everyone here is serious about food in a way that\'s slightly insane and totally Italian.\",im:\"It\'s 2018. Eataly decides to make a cathedral to Italian food. They don\'t build a museum—they build a place where food is alive, happening, being made and eaten constantly.\",t:\"Free entry, but you\'ll spend money on food. Budget €15-40 for a real meal or snacks. It\'s in Bolognina, north of the city. Open until 10pm most nights. Go early (11am) for the market energy, or at 6pm for the happy-hour food deals. Tram 7 or tram 14 gets you there.",c:["local_only", "free_museum"],r:"g",nn:"Fico Eataly World",ns:"Fico Eataly World è una gioia italiana.",nst:"Fico Eataly World respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:13,n:"Ravenna Mosaics Day Trip — Day Trip",a:"Day Trip",v:["history", "beautiful"],d:13,s:"Take a train 45 minutes away and step into the 6th century—walls covered in golden mosaics so bright they look new despite being 1,500 years old.",st:"San Vitale church glows from inside. The dome is covered in intricate golden mosaics—biblical scenes, saints, emperors. The light hits the tiles and bounces gold everywhere. Your eyes adjust slowly. You\'re standing in a 1,500-year-old room decorated like heaven. It\'s surreal. It\'s perfect. It\'s a pilgrimage.",im:"It\'s 540. Emperor Justinian rules from Constantinople but his power is here, in these walls, in these golden tiles. A monk places each piece by hand. He\'ll be dust before anyone understands the beauty he created.",t:"San Vitale church glows from inside. The dome is covered in intricate golden mosaics—biblical scenes, saints, emperors. The light hits the tiles and bounces gold everywhere. Your eyes adjust slowly. You\'re standing in a 1,500-year-old room decorated like heaven. It\'s surreal. It\'s perfect. It\'s a pilgrimage.\",im:\"It\'s 540. Emperor Justinian rules from Constantinople but his power is here, in these walls, in these golden tiles. A monk places each piece by hand. He\'ll be dust before anyone understands the beauty he created.\",t:\"Train from Bologna to Ravenna: 45 minutes, €8-15. Walk to the mosaics from the station or take bus 1. Spend 3 hours. Entry to each church is €3-5. Go early to beat crowds. Pack sunscreen—the walk between sites is exposed. Best to go on a weekday.",c:["history_big", "architecture"],r:"g",nn:"Ravenna Mosaics Day Trip",ns:"Ravenna Mosaics Day Trip è una gioia italiana.",nst:"Ravenna Mosaics Day Trip respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:14,n:"Mercato delle Erbe — Santo Stefano",a:"Santo Stefano",v:["local", "hidden"],d:14,s:"The oldest food market in Bologna where real people buy real food—no tourists, no Instagram, just life happening in Italian.",st:"Stands overflow with vegetables, cheese, cured meat, pasta. Vendors yell prices. Women in their 70s argue about tomatoes. A guy in a white coat slices prosciutto paper-thin. The smell is overwhelming—basil, garlic, rosemary, salt. You\'re surrounded by people who know exactly what they want and don\'t have time for questions.",im:"It\'s 1910. This market has been here for 200 years. It looks the same now as it did then—people buying food, living their daily lives, oblivious to the fact that they\'re part of something timeless.",t:"Stands overflow with vegetables, cheese, cured meat, pasta. Vendors yell prices. Women in their 70s argue about tomatoes. A guy in a white coat slices prosciutto paper-thin. The smell is overwhelming—basil, garlic, rosemary, salt. You\'re surrounded by people who know exactly what they want and don\'t have time for questions.\",im:\"It\'s 1910. This market has been here for 200 years. It looks the same now as it did then—people buying food, living their daily lives, oblivious to the fact that they\'re part of something timeless.\",t:\"Free to walk around. Open mornings, Monday-Saturday, closed Sundays and afternoons. Get there before 11am when it\'s packed and alive. It\'s right by Santo Stefano churches. Bring cash—not all vendors take cards. Pick up fresh pasta, cheese, or bread for a cheap, amazing lunch.",c:["local_only", "free_museum"],r:"g",nn:"Mercato delle Erbe",ns:"Mercato delle Erbe è una gioia italiana.",nst:"Mercato delle Erbe respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:15,n:"University Quarter Nightlife — Santo Stefano",a:"Santo Stefano",v:["night", "local"],d:15,s:"Ancient university by day, student bar explosion by night—the streets fill with people aged 18-30 who are basically living their best lives.",st:"By 10pm the entire neighborhood transforms. Bar after bar opens onto the street. Students spill out with drinks, loud voices, laughter. Pickup football games happen in piazzas. Someone\'s singing badly. Someone\'s making out under a portal. It\'s controlled chaos. It\'s where Bologna\'s future is writing itself.",im:"It\'s 1088. This university is already 500 years old when the Renaissance starts. Now it\'s where Bologna keeps reinventing itself, one night at a time.",t:"By 10pm the entire neighborhood transforms. Bar after bar opens onto the street. Students spill out with drinks, loud voices, laughter. Pickup football games happen in piazzas. Someone\'s singing badly. Someone\'s making out under a portal. It\'s controlled chaos. It\'s where Bologna\'s future is writing itself.\",im:\"It\'s 1088. This university is already 500 years old when the Renaissance starts. Now it\'s where Bologna keeps reinventing itself, one night at a time.\",t:\"Drinks €5-8. Most bars happy hour 6-8pm with free appetizers. The quarter is around Via Zamboni and Piazza Rossini, easily reached on foot from the center. Go after 9pm for the real scene. Don\'t expect a quiet night—expect noise and joy.",c:["night", "local_only"],r:"g",nn:"University Quarter Nightlife",ns:"University Quarter Nightlife è una gioia italiana.",nst:"University Quarter Nightlife respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:16,n:"San Luca Sunrise from Base — San Luca",a:"San Luca",v:["beautiful", "quiet"],d:16,s:"Sleep in a small guesthouse at the base and climb the portico in pre-dawn darkness—watch the city wake up from above as the sun hits the towers.",st:"You start walking at 5:45am in near-darkness. Your phone light catches the arches ahead. The world is silent. After 45 minutes your legs burn but you\'re alone. Then the sun touches the horizon. The city below turns gold. The two towers glow. You\'re alone in heaven for exactly 12 minutes before anyone else arrives.",im:"It\'s any day, any year. The same climb. The same light. The same moment where the world reveals itself as beautiful and you remember why you bothered.",t:"You start walking at 5:45am in near-darkness. Your phone light catches the arches ahead. The world is silent. After 45 minutes your legs burn but you\'re alone. Then the sun touches the horizon. The city below turns gold. The two towers glow. You\'re alone in heaven for exactly 12 minutes before anyone else arrives.\",im:\"It\'s any day, any year. The same climb. The same light. The same moment where the world reveals itself as beautiful and you remember why you bothered.\",t:\"Stay at a basic pensione near Piazza di Porta Saragozza (€40-60/night). Start at 5:45am, arrive by 6:30am for sunrise around 6:45am (March timing—adjust seasonally). Bring a headlamp. Bring water. Bring your own coffee in a thermos. No one is selling anything at that hour.",c:["high_spots", "quiet"],r:"g",nn:"San Luca Sunrise from Base",ns:"San Luca Sunrise from Base è una gioia italiana.",nst:"San Luca Sunrise from Base respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:17,n:"Rosa Maltoni Apartment Tour — Bolognina",a:"Bolognina",v:["history", "hidden"],d:17,s:"Visit the apartment where the founder of Lamborghini lived before he built sports cars—a time-capsule flat that smells like the 1950s.",st:"The apartment is frozen. Furniture from 1952. A kitchen that doesn\'t look real. Photos on walls of cars being built. It\'s a normal middle-class flat but walking through it, you\'re walking through Italian ambition—the moment just before everything changed. The air smells like old wood and secrets.",im:"It\'s 1948. A young mechanic buys this flat with money he doesn\'t quite have. He looks out the window at Bologna and imagines. He\'ll die a billionaire. His apartment stays the same forever.",t:"The apartment is frozen. Furniture from 1952. A kitchen that doesn\'t look real. Photos on walls of cars being built. It\'s a normal middle-class flat but walking through it, you\'re walking through Italian ambition—the moment just before everything changed. The air smells like old wood and secrets.\",im:\"It\'s 1948. A young mechanic buys this flat with money he doesn\'t quite have. He looks out the window at Bologna and imagines. He\'ll die a billionaire. His apartment stays the same forever.\",t:\"Guided tours only, €8. Book ahead—very limited availability. It\'s in Bolognina, north of the center. Tours are in Italian and English on weekends. Call ahead or check the official site. Go if you love design history or just want to feel like you\'re haunting someone\'s past.",c:["history_big", "architecture"],r:"g",nn:"Rosa Maltoni Apartment Tour",ns:"Rosa Maltoni Apartment Tour è una gioia italiana.",nst:"Rosa Maltoni Apartment Tour respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:18,n:"Parco della Montagnola Cemetery Art — Irnerio",a:"Irnerio",v:["history", "weird"],d:18,s:"A smaller, lesser-known cemetery with equally stunning sculpture—but way fewer tourists and way more silence.",st:"Iron gates. Cypress trees. Marble angels in various states of emotional breakdown. A tomb where three people are sculpted embracing each other. A woman lying down with her head resting on her hand, sleeping forever. The art here is raw—death captured in marble like it just happened. The quiet is complete.",im:"It\'s 1870. An artist sculpts his grief into marble because words don\'t work. A hundred years later, strangers stand in front of it and feel that grief. This is how immortality actually works.",t:"Iron gates. Cypress trees. Marble angels in various states of emotional breakdown. A tomb where three people are sculpted embracing each other. A woman lying down with her head resting on her hand, sleeping forever. The art here is raw—death captured in marble like it just happened. The quiet is complete.\",im:\"It\'s 1870. An artist sculpts his grief into marble because words don\'t work. A hundred years later, strangers stand in front of it and feel that grief. This is how immortality actually works.\",t:\"Free. Open daily dawn to dusk. North of the city, accessible by tram 7. Go on an overcast afternoon—the light is perfect for shadows and marble. Spend an hour slowly. Don\'t rush. Bring a small notebook if you want to sketch or write.",c:["history_big", "famous_dead"],r:"g",nn:"Parco della Montagnola Cemetery Art",ns:"Parco della Montagnola Cemetery Art è una gioia italiana.",nst:"Parco della Montagnola Cemetery Art respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:19,n:"Two Minutes from Piazza Maggiore — Centro Storico",a:"Centro Storico",v:["beautiful", "hidden"],d:19,s:"Hidden between two buildings is a perfectly framed view of the Two Towers that most people walk past without seeing.",st:"You turn a corner on a narrow via. There—perfectly framed between two buildings like someone designed it as a photograph—the Two Towers rise against the sky. It\'s the view that makes Bologna look like Bologna. No one stands here. Everyone rushes past. You stop. You stare. You take the photo everyone else takes but from a place no one knows exists.",im:"It\'s 1500. The towers already look ancient. An artist decides to paint exactly this view—two towers between two buildings, the composition perfect. Now your phone camera does the same thing.",t:"You turn a corner on a narrow via. There—perfectly framed between two buildings like someone designed it as a photograph—the Two Towers rise against the sky. It\'s the view that makes Bologna look like Bologna. No one stands here. Everyone rushes past. You stop. You stare. You take the photo everyone else takes but from a place no one knows exists.\",im:\"It\'s 1500. The towers already look ancient. An artist decides to paint exactly this view—two towers between two buildings, the composition perfect. Now your phone camera does the same thing.\",t:\"Free. It\'s on Via Santo Stefano, about two minutes\' walk from Piazza Maggiore. You can\'t really \'go\' here—you just stumble on it. Tell a friend. They\'ll miss it the first time too.",c:["hidden", "beautiful"],r:"g",nn:"Two Minutes from Piazza Maggiore",ns:"Two Minutes from Piazza Maggiore è una gioia italiana.",nst:"Two Minutes from Piazza Maggiore respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:20,n:"Tortellini Workshop — Santo Stefano",a:"Santo Stefano",v:["local", "beautiful"],d:20,s:"Spend two hours learning to fold tiny pasta parcels in someone\'s grandmother\'s kitchen while she judges your technique.",st:"You sit at a wooden table. A woman (probably a grandmother) dumps flour on the wood. She cracks eggs. Her hands move—fold, pinch, fold again. It looks easy. It\'s not. Your tortellini look like sad, deflated pillows. She laughs. She fixes them. You eat them boiled in broth thirty minutes later. They taste like the effort. They taste perfect.",im:"It\'s 1300. A cook in a family kitchen creates this shape. It takes 200 years before anyone outside Bologna knows what a tortellini is. It takes 700 years before a tourist tries to fold one and fails hilariously.",t:"You sit at a wooden table. A woman (probably a grandmother) dumps flour on the wood. She cracks eggs. Her hands move—fold, pinch, fold again. It looks easy. It\'s not. Your tortellini look like sad, deflated pillows. She laughs. She fixes them. You eat them boiled in broth thirty minutes later. They taste like the effort. They taste perfect.\",im:\"It\'s 1300. A cook in a family kitchen creates this shape. It takes 200 years before anyone outside Bologna knows what a tortellini is. It takes 700 years before a tourist tries to fold one and fails hilariously.\",t:\"Workshops run €50-80 and include lunch. Book through tourist office or cooking websites. They happen in various locations around the city. Go with a friend—it\'s more fun to fail together. Morning classes are better than afternoon (lighter, easier to fold). Plan 3 hours total.",c:["local_only", "free_museum"],r:"g",nn:"Tortellini Workshop",ns:"Tortellini Workshop è una gioia italiana.",nst:"Tortellini Workshop respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:21,n:"Basilica di San Petronio — Centro Storico",a:"Centro Storico",v:["history", "beautiful"],d:21,s:"The 5th largest church in the world, left intentionally unfinished—a reminder that even God\'s house in Bologna is incomplete.",st:"The facade is bare brick with marble patterns only partially finished. It\'s been that way for 500 years. Inside, the space is so vast your head tilts back automatically. Light pours through tall windows onto Renaissance frescoes. It\'s not polished. It\'s not perfect. It\'s more powerful because of it.",im:"It\'s 1390. Builders start on what they swear will be the greatest church on Earth. Then politics happen, money runs out, priorities shift. It never gets finished. Somehow that makes it immortal.",t:"The facade is bare brick with marble patterns only partially finished. It\'s been that way for 500 years. Inside, the space is so vast your head tilts back automatically. Light pours through tall windows onto Renaissance frescoes. It\'s not polished. It\'s not perfect. It\'s more powerful because of it.\",im:\"It\'s 1390. Builders start on what they swear will be the greatest church on Earth. Then politics happen, money runs out, priorities shift. It never gets finished. Somehow that makes it immortal.\",t:\"Free entry. Open daily 10am-6pm usually. It\'s on Piazza Maggiore. The south entrance has a sun dial built into the floor—designed in the 1600s and still accurate. Go midday when light fills the interior.",c:["history_big", "architecture"],r:"g",nn:"Basilica di San Petronio",ns:"Basilica di San Petronio è una gioia italiana.",nst:"Basilica di San Petronio respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:22,n:"Torresotto Tower Climb — Centro Storico",a:"Centro Storico",v:["hidden", "beautiful"],d:22,s:"Climb the tower almost no tourists know about for a view of the Two Towers that the Two Towers can\'t give you.",st:"Narrow spiral stairs. Each step is worn smooth by seven centuries of footsteps. You count them without meaning to—there are too many. Then you emerge on a roof view. The Two Towers rise away from you. You see them from the side. The entire portico system radiates out in perfect lines. It\'s a map of medieval power written in brick.",im:"It\'s 1200. A family builds this tower to watch for enemies. Now it watches the towers that watched the towers. Ambition in stone.",t:"Narrow spiral stairs. Each step is worn smooth by seven centuries of footsteps. You count them without meaning to—there are too many. Then you emerge on a roof view. The Two Towers rise away from you. You see them from the side. The entire portico system radiates out in perfect lines. It\'s a map of medieval power written in brick.\",im:\"It\'s 1200. A family builds this tower to watch for enemies. Now it watches the towers that watched the towers. Ambition in stone.\",t:\"€4 entry. Not always clearly marked—ask at nearby tourist offices. It\'s near the Two Towers but separate. Takes 20 minutes to climb and explore. Best in morning light for photos.",c:["high_spots", "hidden"],r:"g",nn:"Torresotto Tower Climb",ns:"Torresotto Tower Climb è una gioia italiana.",nst:"Torresotto Tower Climb respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:23,n:"Parma Day Trip — Day Trip",a:"Day Trip",v:["history", "beautiful"],d:23,s:"Train 1 hour away to the city with the best food in Italy and art museums hidden behind unmarked doors.",st:"Parma is smaller than Bologna, more elegant. The baptistry is octagonal and perfect. The camera obscura museum is in an old monastery. Everything feels crafted by someone with time and taste. The food is better than Bologna\'s (don\'t tell Bolognese). The tourists are fewer. You feel like you found something special.",im:"It\'s 1545. Parma gets a duke who builds art. Not because he needs to. Because he understands that beauty is rebellion against time.",t:"Parma is smaller than Bologna, more elegant. The baptistry is octagonal and perfect. The camera obscura museum is in an old monastery. Everything feels crafted by someone with time and taste. The food is better than Bologna\'s (don\'t tell Bolognese). The tourists are fewer. You feel like you found something special.\",im:\"It\'s 1545. Parma gets a duke who builds art. Not because he needs to. Because he understands that beauty is rebellion against time.\",t:\"Train from Bologna to Parma: 1 hour, €8-15. The city center is walkable. Spend a full day. Visit the Camera di San Paolo (decorated Renaissance room, €5). Eat at a small trattoria not in guidebooks. Budget €50-80 for food and entry fees. Go on a weekday—way more peaceful than weekends.",c:["history_big", "architecture"],r:"g",nn:"Parma Day Trip",ns:"Parma Day Trip è una gioia italiana.",nst:"Parma Day Trip respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:24,n:"Ospedale della Pieta Underground Room — Santo Stefano",a:"Santo Stefano",v:["history", "weird"],d:24,s:"A secret underground room where foundlings were anonymously dropped off centuries ago—the Room of Abandonment, still preserved.",st:"You descend into stone arches. A small room. A wheeled box (the \'foundling wheel\'—a cylinder that rotated in the wall so mothers could leave babies anonymously). Walls covered with names, dates, initials carved or written by people who came back years later looking for clues. It\'s heartbreaking and hopeful at once. You\'re standing in a room full of desperation and survival.",im:"It\'s 1410. A woman places her newborn in the wheel. She turns it. The baby disappears inside. She walks away. That baby will grow up never knowing her face. Tens of thousands of babies came through this wheel. Most lived.",t:"You descend into stone arches. A small room. A wheeled box (the \'foundling wheel\'—a cylinder that rotated in the wall so mothers could leave babies anonymously). Walls covered with names, dates, initials carved or written by people who came back years later looking for clues. It\'s heartbreaking and hopeful at once. You\'re standing in a room full of desperation and survival.\",im:\"It\'s 1410. A woman places her newborn in the wheel. She turns it. The baby disappears inside. She walks away. That baby will grow up never knowing her face. Tens of thousands of babies came through this wheel. Most lived.\",t:\"€3-5 entry. Part of the Archiginnasio complex. It\'s rarely crowded because it\'s not on every tourist map. Go on a quiet afternoon. The guide here speaks about it like it matters—because it does.",c:["history_big", "scary"],r:"g",nn:"Ospedale della Pieta Underground Room",ns:"Ospedale della Pieta Underground Room è una gioia italiana.",nst:"Ospedale della Pieta Underground Room respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:25,n:"Strada Maggiore Architecture Walk — Santo Stefano",a:"Santo Stefano",v:["beautiful", "history"],d:25,s:"Walk a single medieval street and read 900 years of architecture like it\'s a timeline carved in brick and stone.",st:"Every building is different. A Romanesque facade. A Renaissance doorway. A 1700s window frame. They\'re all jumbled together because this street just grew organically for centuries. Someone built something, then their great-great-grandchild renovated it, added new style, kept the old bones. It\'s like reading someone\'s entire life in real-time architecture.",im:"It\'s any year between 1200 and 1700. A mason is working on a wall. A hundred years later, his great-grandson will rebuild that same wall in new style. The cycle never stops.",t:"Every building is different. A Romanesque facade. A Renaissance doorway. A 1700s window frame. They\'re all jumbled together because this street just grew organically for centuries. Someone built something, then their great-great-grandchild renovated it, added new style, kept the old bones. It\'s like reading someone\'s entire life in real-time architecture.\",im:\"It\'s any year between 1200 and 1700. A mason is working on a wall. A hundred years later, his great-grandson will rebuild that same wall in new style. The cycle never stops.\",t:\"Free walk. It\'s long—plan for a 45-minute stroll from one end to the other. Start at the Two Towers, end at the Cemetery. Go slowly. Read plaques. Duck into courtyards. The whole street teaches you how cities actually grow.",c:["architecture", "history_big"],r:"g",nn:"Strada Maggiore Architecture Walk",ns:"Strada Maggiore Architecture Walk è una gioia italiana.",nst:"Strada Maggiore Architecture Walk respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:26,n:"Sartoria Bonetti Tailoring Workshop — Santo Stefano",a:"Santo Stefano",v:["local", "hidden"],d:26,s:"Watch a third-generation tailor hand-stitch suits in a tiny shop—and maybe order one if you want to look incredible for the next 20 years.",st:"The shop is barely wider than two people. Fabric samples line every wall. The tailor (probably over 70) sits at a table with a needle, stitching buttonholes with the precision of a neurosurgeon. He doesn\'t rush. He doesn\'t look up. A suit takes 40 hours of his hands. That\'s why it costs what it costs.",im:"It\'s 1965. This man\'s father opened this shop. His father\'s father before him. They don\'t make suits for fashion. They make them for people who understand that quality lasts.",t:"The shop is barely wider than two people. Fabric samples line every wall. The tailor (probably over 70) sits at a table with a needle, stitching buttonholes with the precision of a neurosurgeon. He doesn\'t rush. He doesn\'t look up. A suit takes 40 hours of his hands. That\'s why it costs what it costs.\",im:\"It\'s 1965. This man\'s father opened this shop. His father\'s father before him. They don\'t make suits for fashion. They make them for people who understand that quality lasts.\",t:\"Walk-ins welcome, but appointments are better. It\'s near Santo Stefano churches. Expect to pay €300-500 for a suit—genuinely handmade. Or just visit and watch for free. The tailor doesn\'t mind. He\'s been watched for 50 years.",c:["local_only", "architecture"],r:"g",nn:"Sartoria Bonetti Tailoring Workshop",ns:"Sartoria Bonetti Tailoring Workshop è una gioia italiana.",nst:"Sartoria Bonetti Tailoring Workshop respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:27,n:"Asmara Immigrant Market — Navile",a:"Navile",v:["weird", "local"],d:27,s:"The only place in Bologna where you can buy Ethiopian spices, Somali fabrics, and experience a totally different culture without leaving the city.",st:"The market explodes with color. Spices you can\'t identify. Fabrics in wild prints. Elderly women in traditional dress arguing about prices. A shop owner is playing music in a language you don\'t speak. It smells like cumin, cinnamon, something else entirely. It\'s a portal to somewhere else. You\'re 3,000 miles from Africa but closer to it here than in the city center.",im:"It\'s 2005. Refugees and immigrants start settling in Navile. They bring their markets. Their food. Their culture. Bologna transforms quietly. No one notices except people who go to this market.",t:"The market explodes with color. Spices you can\'t identify. Fabrics in wild prints. Elderly women in traditional dress arguing about prices. A shop owner is playing music in a language you don\'t speak. It smells like cumin, cinnamon, something else entirely. It\'s a portal to somewhere else. You\'re 3,000 miles from Africa but closer to it here than in the city center.\",im:\"It\'s 2005. Refugees and immigrants start settling in Navile. They bring their markets. Their food. Their culture. Bologna transforms quietly. No one notices except people who go to this market.\",t:\"Free to explore. Open weekday mornings and Saturday all day. It\'s in Navile, north of the city center. Bring cash. Pick up spices, fabrics, bread you can\'t find elsewhere. Talk to people—they\'ll tell you stories if you ask. It\'s the realest Bologna there is.",c:["local_only", "weird"],r:"g",nn:"Asmara Immigrant Market",ns:"Asmara Immigrant Market è una gioia italiana.",nst:"Asmara Immigrant Market respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:28,n:"Sanctuary of the Madonna di San Luca Interior — San Luca",a:"San Luca",v:["beautiful", "quiet"],d:28,s:"After the 666-arch climb, step inside the white dome—a baroque sanctuary completely covered in gold and candlelight.",st:"The interior is overwhelming. Frescoes curve across the dome. Candles flicker. The marble floor reflects light. An icon of the Black Madonna sits high above, watching over the city. People pray. Some cry. It\'s not about religion—it\'s about arrival. You climbed the mountain. You reached it. The sanctuary acknowledges this.",im:"It\'s 1190. An icon appears in a cave. Pilgrims start coming. By 1600, the sanctuary is so famous that a pope requires the portico to protect pilgrims from weather. A 666-arch umbrella to heaven.",t:"The interior is overwhelming. Frescoes curve across the dome. Candles flicker. The marble floor reflects light. An icon of the Black Madonna sits high above, watching over the city. People pray. Some cry. It\'s not about religion—it\'s about arrival. You climbed the mountain. You reached it. The sanctuary acknowledges this.\",im:\"It\'s 1190. An icon appears in a cave. Pilgrims start coming. By 1600, the sanctuary is so famous that a pope requires the portico to protect pilgrims from weather. A 666-arch umbrella to heaven.\",t:\"Free. Open daily. Best visited after the climb—you\'ve earned the peace inside. The light shifts throughout the afternoon. Go at 4pm for the golden light. Sit quietly for 15 minutes. Don\'t feel bad if you\'re not religious—this place doesn\'t care.",c:["beautiful", "quiet"],r:"g",nn:"Sanctuary of the Madonna di San Luca Interior",ns:"Sanctuary of the Madonna di San Luca Interior è una gioia italiana.",nst:"Sanctuary of the Madonna di San Luca Interior respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:29,n:"Cesare Zavattini Cinema Archive — Navile",a:"Navile",v:["hidden", "history"],d:29,s:"A secret film archive where the papers, scripts, and personal notebooks of an Italian neorealist filmmaker gather dust like treasure.",st:"The archive is quiet, climate-controlled, scholarly. Original scripts with handwritten notes. Letters from famous directors. Photos from film sets. It\'s a window into how cinema got made before CGI, before computers, when it was just men and women with obsessions about truth. You feel like a spy in someone\'s life.",im:"It\'s 1945. A young filmmaker decides to film real people in real places instead of actors on stages. He invents neorealism and changes cinema forever. A hundred years later, his papers sit in a room, waiting for people who care.",t:"The archive is quiet, climate-controlled, scholarly. Original scripts with handwritten notes. Letters from famous directors. Photos from film sets. It\'s a window into how cinema got made before CGI, before computers, when it was just men and women with obsessions about truth. You feel like a spy in someone\'s life.\",im:\"It\'s 1945. A young filmmaker decides to film real people in real places instead of actors on stages. He invents neorealism and changes cinema forever. A hundred years later, his papers sit in a room, waiting for people who care.\",t:\"€5 entry. Guided tours only, must book ahead. It\'s rarely open—check schedules. When it is open, go. Spend an hour. This is the kind of place that changes how you see cinema. It\'s a pilgrimage for film nerds.",c:["history_big", "hidden"],r:"g",nn:"Cesare Zavattini Cinema Archive",ns:"Cesare Zavattini Cinema Archive è una gioia italiana.",nst:"Cesare Zavattini Cinema Archive respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:30,n:"Quadrilatero Medieval Market Streets — Centro Storico",a:"Centro Storico",v:["history", "local"],d:30,s:"Four medieval streets where butchers, fishmongers, and pasta makers set up stalls in the same locations they did in 1200.",st:"Via Pescherie Vecchie (fish market street). Via Clavature (cutlery—still hammering metal). Via Caprarie (goat cheese). These streets are working markets, not museums. You\'re shopping where Bolognese have shopped for 800 years. The organization is logical, medieval, perfect. Every street its own district of commerce.",im:"It\'s 1250. A fish merchant sets up in the same spot every day. His great-great-great-great-grandson is there now, in the same spot, selling fish. The location never moved. The family might have changed but the commerce is eternal.",t:"Via Pescherie Vecchie (fish market street). Via Clavature (cutlery—still hammering metal). Via Caprarie (goat cheese). These streets are working markets, not museums. You\'re shopping where Bolognese have shopped for 800 years. The organization is logical, medieval, perfect. Every street its own district of commerce.\",im:\"It\'s 1250. A fish merchant sets up in the same spot every day. His great-great-great-great-grandson is there now, in the same spot, selling fish. The location never moved. The family might have changed but the commerce is eternal.\",t:\"Free. Open mornings Mon-Sat, dead on Sundays. This is where locals buy food. You\'re a tourist but you\'re in their space. Respect the flow. Arrive early for the best selection. Bring cash. Buy something to cook later—that\'s the point.",c:["local_only", "history_big"],r:"g",nn:"Quadrilatero Medieval Market Streets",ns:"Quadrilatero Medieval Market Streets è una gioia italiana.",nst:"Quadrilatero Medieval Market Streets respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:31,n:"Cantina Bentivoglio Wine Underground — Centro Storico",a:"Centro Storico",v:["weird", "hidden"],d:31,s:"A wine bar built in the medieval basement of a palazzo—you drink wine sitting in 800-year-old arches like you own the place.",st:"Descend into stone arches. The walls are original medieval construction. It\'s cold. It\'s damp. It\'s perfect. Sit at a wine bar built into the historic walls. Order Lambrusco. The wine is tart and lightly fizzy. You\'re drinking peasant wine the way peasants drank it, in a medieval basement in the oldest city center in Italy. It costs €4-6 a glass.",im:"It\'s 1400. This basement stored grain, wine, weapons. Now it holds people talking, laughing, drinking wine. The walls have seen 600 years of humanity.",t:"Descend into stone arches. The walls are original medieval construction. It\'s cold. It\'s damp. It\'s perfect. Sit at a wine bar built into the historic walls. Order Lambrusco. The wine is tart and lightly fizzy. You\'re drinking peasant wine the way peasants drank it, in a medieval basement in the oldest city center in Italy. It costs €4-6 a glass.\",im:\"It\'s 1400. This basement stored grain, wine, weapons. Now it holds people talking, laughing, drinking wine. The walls have seen 600 years of humanity.\",t:\"Free entry (wine €4-8). It\'s off Via Santo Stefano, easily found once you know to look. Go at 6pm for aperitivo when there\'s free snacks. There\'s live jazz Thursday nights. Bring a date or a friend. The underground vibe is unbeatable.",c:["romantic_water", "night"],r:"g",nn:"Cantina Bentivoglio Wine Underground",ns:"Cantina Bentivoglio Wine Underground è una gioia italiana.",nst:"Cantina Bentivoglio Wine Underground respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:32,n:"Montagnola Park Tree Maze — Irnerio",a:"Irnerio",v:["hidden", "nature"],d:32,s:"A small wooded area in the park where cypress and box trees are grown into a maze—kids get lost here intentionally.",st:"The trees form walls about 5 feet high. You walk in not knowing if you\'ll get out. It\'s deliberate confusion. Kids run ahead, laughing when they hit dead ends. Adults find it meditative. The trees smell like green. The sun filters through. It\'s just a maze but it feels like an adventure into a secret forest.",im:"It\'s 1890. A gardener plants this maze as a joke, a play. It\'s still here. Trees have grown. The geometry is still perfect. Kids still get lost. Adults still smile.",t:"The trees form walls about 5 feet high. You walk in not knowing if you\'ll get out. It\'s deliberate confusion. Kids run ahead, laughing when they hit dead ends. Adults find it meditative. The trees smell like green. The sun filters through. It\'s just a maze but it feels like an adventure into a secret forest.\",im:\"It\'s 1890. A gardener plants this maze as a joke, a play. It\'s still here. Trees have grown. The geometry is still perfect. Kids still get lost. Adults still smile.\",t:\"Free. It\'s in Montagnola Park, north of the center. The maze is small—maybe 10 minutes to navigate. Go with kids or with someone you want to be slightly lost with. It\'s not challenging but it\'s charming as hell.",c:["nature", "parks"],r:"g",nn:"Montagnola Park Tree Maze",ns:"Montagnola Park Tree Maze è una gioia italiana.",nst:"Montagnola Park Tree Maze respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:33,n:"Saragozza Gate and Walls Walk — Irnerio",a:"Irnerio",v:["history", "beautiful"],d:33,s:"Walk along original medieval city walls and pass through an ancient gate that defended Bologna for 600 years.",st:"The walls rise 10 meters, red brick, scarred by time and weather. The gate is narrow, designed to funnel invaders into killzones. You walk through history in a single step. On top, the view is different—you see the city from the defensive position. You understand why walls mattered.",im:"It\'s 1400. An army approaches. The gate closes. Defenders take positions on the walls above. For 12 hours everything is terror. Then they leave. The walls stand. They always stand.",t:"The walls rise 10 meters, red brick, scarred by time and weather. The gate is narrow, designed to funnel invaders into killzones. You walk through history in a single step. On top, the view is different—you see the city from the defensive position. You understand why walls mattered.\",im:\"It\'s 1400. An army approaches. The gate closes. Defenders take positions on the walls above. For 12 hours everything is terror. Then they leave. The walls stand. They always stand.\",t:\"Free. You can walk the walls from Piazza di Porta Saragozza heading towards San Luca. It\'s a 30-minute walk. Go on a clear day for views. This is where locals jog in mornings. You\'re not a tourist here—you\'re part of the rhythm.",c:["history_big", "high_spots"],r:"g",nn:"Saragozza Gate and Walls Walk",ns:"Saragozza Gate and Walls Walk è una gioia italiana.",nst:"Saragozza Gate and Walls Walk respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:34,n:"Anatomical Collection of Palazzo Poggi — Santo Stefano",a:"Santo Stefano",v:["weird", "history"],d:34,s:"A display of anatomical wax figures—precise, beautiful, and absolutely unsettling representations of human bodies showing what\'s underneath skin.",st:"The figures are reclining on marble tables in a room painted blue. Their torsos are open, organs exposed. The detail is incredible—every vein visible, every muscle defined. They\'re beautiful and horrible at once. The craftsmanship is 18th-century Italian perfectionism applied to human dissection. It\'s art that looks like murder until you understand it\'s science.",im:"It\'s 1770. A wax artist creates these figures so medical students don\'t have to dissect real corpses. It\'s revolutionary. It\'s grotesque. It\'s the future of learning about the body without the smell of death.",t:"The figures are reclining on marble tables in a room painted blue. Their torsos are open, organs exposed. The detail is incredible—every vein visible, every muscle defined. They\'re beautiful and horrible at once. The craftsmanship is 18th-century Italian perfectionism applied to human dissection. It\'s art that looks like murder until you understand it\'s science.\",im:\"It\'s 1770. A wax artist creates these figures so medical students don\'t have to dissect real corpses. It\'s revolutionary. It\'s grotesque. It\'s the future of learning about the body without the smell of death.\",t:\"€8 entry. Part of the Palazzo Poggi university building. It\'s not on every tourist radar, which makes it less crowded. Go with someone—it\'s intense alone. Hours vary, so check ahead. Bring a friend and laugh nervously together.",c:["scary", "architecture"],r:"g",nn:"Anatomical Collection of Palazzo Poggi",ns:"Anatomical Collection of Palazzo Poggi è una gioia italiana.",nst:"Anatomical Collection of Palazzo Poggi respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:35,n:"Pincio Balcony at Dusk — Santo Stefano",a:"Santo Stefano",v:["beautiful", "quiet"],d:35,s:"A single balcony overlooking the city at golden hour—where couples go and tourists somehow never find.",st:"The balcony extends from a palazzo corner. From here, the entire skyline shifts to gold. The Two Towers glow. The distant Apennines turn purple. You stand with three other people, all quiet, all watching the same light show. It\'s perfect. It\'s free. It costs nothing but a 20-minute walk to find.",im:"It\'s any sunset, any year. Same light. Same view. Same magic that makes Bologna stop and breathe.",t:"The balcony extends from a palazzo corner. From here, the entire skyline shifts to gold. The Two Towers glow. The distant Apennines turn purple. You stand with three other people, all quiet, all watching the same light show. It\'s perfect. It\'s free. It costs nothing but a 20-minute walk to find.\",im:\"It\'s any sunset, any year. Same light. Same view. Same magic that makes Bologna stop and breathe.\",t:\"Free. It\'s tucked on a small via near Piazza Santo Stefano—literally two minutes from the basilica but hidden from main crowds. Go 30 minutes before sunset. Bring a friend or don\'t. Bring a phone for photos or don\'t. Just come.",c:["romantic_water", "high_spots"],r:"g",nn:"Pincio Balcony at Dusk",ns:"Pincio Balcony at Dusk è una gioia italiana.",nst:"Pincio Balcony at Dusk respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:36,n:"Lambrusco Wine Cellar Tour — Outside City",a:"Outside City",v:["local", "beautiful"],d:36,s:"20 minutes outside Bologna are family-owned wineries producing the sparkling red wine that pairs with everything—visit one, taste, eat, feel local.",st:"The winery smells like fermentation and oak. The owner\'s family has been here for 100 years. They pour Lambrusco—tart, bubbly, alive. It\'s not fancy wine, it\'s peasant wine that became legendary. You taste the difference between what you drank at home and what this is. Everything tastes better with Lambrusco. They\'re not lying.",im:"It\'s 1800. Farmers planted vines on this land. Their kids made wine. Now tourists come to taste what was always just for family. The wine tastes like time.",t:"The winery smells like fermentation and oak. The owner\'s family has been here for 100 years. They pour Lambrusco—tart, bubbly, alive. It\'s not fancy wine, it\'s peasant wine that became legendary. You taste the difference between what you drank at home and what this is. Everything tastes better with Lambrusco. They\'re not lying.\",im:\"It\'s 1800. Farmers planted vines on this land. Their kids made wine. Now tourists come to taste what was always just for family. The wine tastes like time.\",t:\"Tours €15-30 including tastings. They\'re outside the city—you need a car or a tour company. Go on Saturday afternoon for the full experience with lunch. Book ahead. This is a full half-day experience. Worth every minute and penny.",c:["local_only", "romantic_water"],r:"g",nn:"Lambrusco Wine Cellar Tour",ns:"Lambrusco Wine Cellar Tour è una gioia italiana.",nst:"Lambrusco Wine Cellar Tour respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:37,n:"Biblioteca dell\'Archiginnasio Reading Rooms — Santo Stefano",a:"Santo Stefano",v:["beautiful", "quiet"],d:37,s:"Sit in a reading room where scholars have sat for 400 years—at a desk facing a window, surrounded by silence and old books.",st:"The reading room is hushed. Everyone whispers. Sunlight hits wooden desks worn smooth by four centuries of elbows. A stack of old books sits in front of you. You\'re not supposed to be here but you are. The librarian treats you like a scholar. You feel smarter just by breathing the air.",im:"It\'s 1600. A student sits in this exact spot, reading by candlelight, trying to understand the world. Now you sit where they sat. The desk remembers their effort.",t:"The reading room is hushed. Everyone whispers. Sunlight hits wooden desks worn smooth by four centuries of elbows. A stack of old books sits in front of you. You\'re not supposed to be here but you are. The librarian treats you like a scholar. You feel smarter just by breathing the air.\",im:\"It\'s 1600. A student sits in this exact spot, reading by candlelight, trying to understand the world. Now you sit where they sat. The desk remembers their effort.\",t:\"Free to use. Open weekday afternoons. It\'s part of the Archiginnasio complex. Bring your own book or request one at the desk. Sit for an hour. Just be. No phones, no talking, no interruption. It\'s meditative.",c:["quiet", "history_big"],r:"g",nn:"Biblioteca dell\'Archiginnasio Reading Rooms",ns:"Biblioteca dell\'Archiginnasio Reading Rooms è una gioia italiana.",nst:"Biblioteca dell\'Archiginnasio Reading Rooms respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:38,n:"Bolognina Nightlife Hidden Venues — Bolognina",a:"Bolognina",v:["night", "weird"],d:38,s:"Beyond Via del Pratello are tiny bars and underground clubs where Bolognese actually hang out and most tourists never find.",st:"No neon signs. No obvious entrances. You find them by word of mouth or by accident. A bar in someone\'s basement. A DJ set in an artist\'s loft. Live jazz in a tiny room with maybe 20 people. It\'s DIY and authentic and feels like you\'ve infiltrated something real. Because you have.",im:"It\'s Friday night and a group of friends decide to throw an event in their space. Word spreads. People show up. By next week it\'s legendary and then it\'s gone. This is how culture actually happens before it gets Instagram-fied.",t:"No neon signs. No obvious entrances. You find them by word of mouth or by accident. A bar in someone\'s basement. A DJ set in an artist\'s loft. Live jazz in a tiny room with maybe 20 people. It\'s DIY and authentic and feels like you\'ve infiltrated something real. Because you have.\",im:\"It\'s Friday night and a group of friends decide to throw an event in their space. Word spreads. People show up. By next week it\'s legendary and then it\'s gone. This is how culture actually happens before it gets Instagram-fied.\",t:\"No addresses—ask locals or check alternative Bologna websites. Budget €5-10 entry, €4-6 drinks. Go after 11pm. Go with someone local if possible. It\'s not dangerous but it\'s definitely more \'real Bologna\' than the main tourist bars.",c:["night", "local_only"],r:"y",nn:"Bolognina Nightlife Hidden Venues",ns:"Bolognina Nightlife Hidden Venues è una gioia italiana.",nst:"Bolognina Nightlife Hidden Venues respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:39,n:"Casa di Carducci Poet\'s Home Museum — Santo Stefano",a:"Santo Stefano",v:["history", "hidden"],d:39,s:"The preserved home of an Italian poet where every object is exactly as he left it—books, pen, desk, glasses.",st:"The rooms are frozen in time. His desk faces a window. His glasses sit on papers. The bookshelf is organized with intention. It\'s not a museum display, it\'s a home that happens to be preserved. You feel like you\'re interrupting someone\'s privacy. That\'s the whole point—to understand poets as humans, not legends.",im:"It\'s 1907. The poet sits at this desk writing in the afternoon light. Now it\'s 2026 and his glasses still sit there, waiting for him to put them on again.",t:"The rooms are frozen in time. His desk faces a window. His glasses sit on papers. The bookshelf is organized with intention. It\'s not a museum display, it\'s a home that happens to be preserved. You feel like you\'re interrupting someone\'s privacy. That\'s the whole point—to understand poets as humans, not legends.\",im:\"It\'s 1907. The poet sits at this desk writing in the afternoon light. Now it\'s 2026 and his glasses still sit there, waiting for him to put them on again.\",t:\"€8 entry. Guided tours only, in Italian but worthwhile. Book ahead. It\'s near Via Santo Stefano. Go on a quiet morning. Spend an hour. It\'s an intimate experience—small groups only, so always quiet.",c:["history_big", "hidden"],r:"g",nn:"Casa di Carducci Poet\'s Home Museum",ns:"Casa di Carducci Poet\'s Home Museum è una gioia italiana.",nst:"Casa di Carducci Poet\'s Home Museum respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:40,n:"Bologna by Night Walking Tour — Centro Storico",a:"Centro Storico",v:["beautiful", "night"],d:40,s:"The porticoes light up at night and transform into something otherworldly—shadows, arches, the city becomes a maze of light and dark.",st:"Walk the porticoes at 9pm. The lights hit the arches at sharp angles. Shadows stretch across the stone. The covered walkways create tunnels of light and dark. There are fewer people. Your footsteps echo. It\'s the same city but a different world entirely. It\'s beautiful and slightly eerie and totally free.",im:"It\'s midnight. A couple walks through the porticoes, their shadows stretching impossibly long. The city is asleep but the porticoes keep moving. Arches are time machines.",t:"Walk the porticoes at 9pm. The lights hit the arches at sharp angles. Shadows stretch across the stone. The covered walkways create tunnels of light and dark. There are fewer people. Your footsteps echo. It\'s the same city but a different world entirely. It\'s beautiful and slightly eerie and totally free.\",im:\"It\'s midnight. A couple walks through the porticoes, their shadows stretching impossibly long. The city is asleep but the porticoes keep moving. Arches are time machines.\",t:\"Free. Go at night starting around 8:30pm-9pm. Bring a friend. The city feels different after dark but it\'s completely safe. The nocturnal Bologna is less crowded, more atmospheric. Start at Piazza Maggiore and wander.",c:["beautiful", "night"],r:"g",nn:"Bologna by Night Walking Tour",ns:"Bologna by Night Walking Tour è una gioia italiana.",nst:"Bologna by Night Walking Tour respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:41,n:"Acetaia (Balsamic Vinegar) Tasting — Outside City",a:"Outside City",v:["local", "beautiful"],d:41,s:"30 minutes from Bologna in Modena, watch balsamic vinegar age in wooden barrels for 25 years, then taste the result.",st:"The acetaia is a hot room filled with wooden barrels. The smell is intense—sweet, sour, complex. Old men (always old men) explain the process. The vinegar gets older and more concentrated each year. When it\'s 25 years old, it\'s black, thick, expensive, and one small spoon tastes like everything. You understand why it costs €50 for a bottle.",im:"It\'s 1999. A barrel is filled. In 25 years someone will open it and find treasure. Time becomes viscous. Time becomes valuable.",t:"The acetaia is a hot room filled with wooden barrels. The smell is intense—sweet, sour, complex. Old men (always old men) explain the process. The vinegar gets older and more concentrated each year. When it\'s 25 years old, it\'s black, thick, expensive, and one small spoon tastes like everything. You understand why it costs €50 for a bottle.\",im:\"It\'s 1999. A barrel is filled. In 25 years someone will open it and find treasure. Time becomes viscous. Time becomes valuable.\",t:\"Tours €15-30. You need a car or book a group tour from Bologna. Most acetaia are family businesses in small towns around Modena. Half-day trip. Go on a weekend. Taste, eat lunch nearby, leave happy. This is where balsamic happens before it becomes famous.",c:["local_only", "romantic_water"],r:"g",nn:"Acetaia (Balsamic Vinegar) Tasting",ns:"Acetaia (Balsamic Vinegar) Tasting è una gioia italiana.",nst:"Acetaia (Balsamic Vinegar) Tasting respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:42,n:"Medieval Tower Cluster — Centro Storico",a:"Centro Storico",v:["history", "beautiful"],d:42,s:"Beyond the famous Two Towers are dozens of smaller towers embedded in buildings—a skyline you have to look up to see.",st:"Look up while walking the narrow vias. Towers rise from building corners. Some are squat and strong. Some are crumbling. Some still have wooden defensive structures. They\'re integrated into the urban fabric like they\'re growing out of the city itself. It\'s vertical history everywhere you look.",im:"It\'s 1150. Every family with money builds a tower to show power and defend their corner. The city becomes a forest of vertical ambition. Now they\'re just part of the buildings, forgotten, beautiful.",t:"Look up while walking the narrow vias. Towers rise from building corners. Some are squat and strong. Some are crumbling. Some still have wooden defensive structures. They\'re integrated into the urban fabric like they\'re growing out of the city itself. It\'s vertical history everywhere you look.\",im:\"It\'s 1150. Every family with money builds a tower to show power and defend their corner. The city becomes a forest of vertical ambition. Now they\'re just part of the buildings, forgotten, beautiful.\",t:\"Free walk. Bring your neck—you\'ll be looking up constantly. It\'s best done on a guided walk to learn which towers are which and what their stories are. Or just wander slowly and make up your own stories.",c:["history_big", "architecture"],r:"g",nn:"Medieval Tower Cluster",ns:"Medieval Tower Cluster è una gioia italiana.",nst:"Medieval Tower Cluster respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:43,n:"Osteria dell\'Orsa Hidden Courtyard Seating — Santo Stefano",a:"Santo Stefano",v:["beautiful", "local"],d:43,s:"A restaurant with seating in a medieval courtyard where you eat among flowers, history, and the sounds of the city bouncing off old brick.",st:"You sit at a table in a courtyard. Ivy climbs walls. Old brick surrounds you on all sides. The sky is framed like a painting above. The food is Bolognese classics. You\'re in a 500-year-old courtyard eating tagliatelle, and the moment is perfect. The tourists are on the street. You\'re where locals eat.",im:"It\'s 1700. A merchant family sits in this courtyard. Now strangers sit in the same spot, 200 years later, eating what might be the same recipe.",t:"You sit at a table in a courtyard. Ivy climbs walls. Old brick surrounds you on all sides. The sky is framed like a painting above. The food is Bolognese classics. You\'re in a 500-year-old courtyard eating tagliatelle, and the moment is perfect. The tourists are on the street. You\'re where locals eat.\",im:\"It\'s 1700. A merchant family sits in this courtyard. Now strangers sit in the same spot, 200 years later, eating what might be the same recipe.\",t:\"Dinner €30-50. Book ahead—it\'s not massive and the courtyard fills fast. Go for dinner at 8pm, not lunch. You want the evening light and the quiet after tourist crowds leave. It\'s worth the splurge.",c:["romantic_water", "local_only"],r:"g",nn:"Osteria dell\'Orsa Hidden Courtyard Seating",ns:"Osteria dell\'Orsa Hidden Courtyard Seating è una gioia italiana.",nst:"Osteria dell\'Orsa Hidden Courtyard Seating respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:44,n:"Street Art Tour — Bolognina",a:"Bolognina",v:["street_art", "local"],d:44,s:"Book a local artist to show you the Bolognina murals and explain the meanings—the real stories behind the spray-painted faces.",st:"Your guide is an artist. They explain the murals like reading a book in images. This face is political resistance. This one is memory. This one is pure color rebellion. The walls are a conversation. You\'re reading the real thoughts of the neighborhood, not a museum version.",im:"It\'s 2015. An artist sprays a face on a wall. It takes 3 hours. Ten seconds later, someone takes a photo. The image spreads. The artist might never know their wall went worldwide.",t:"Your guide is an artist. They explain the murals like reading a book in images. This face is political resistance. This one is memory. This one is pure color rebellion. The walls are a conversation. You\'re reading the real thoughts of the neighborhood, not a museum version.\",im:\"It\'s 2015. An artist sprays a face on a wall. It takes 3 hours. Ten seconds later, someone takes a photo. The image spreads. The artist might never know their wall went worldwide.\",t:\"Tours €25-40, usually 2-3 hours. Book through local companies or ask at hostels. The guide makes it—a good guide turns it from \'looking at street art\' into \'understanding how a city talks to itself.\' Go early morning when the light is perfect for photos.",c:["street_art", "local_only"],r:"g",nn:"Street Art Tour",ns:"Street Art Tour è una gioia italiana.",nst:"Street Art Tour respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
