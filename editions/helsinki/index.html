  {id:1,n:"Sompasauna",a:"Vallila",v:["hidden", "local", "nature", "free"],d:1,s:"Free floating sauna where locals strip and dive into the Baltic",st:"Jump into the icy sea from a wooden sauna on the shore. No frills, no fees, pure Finnish ritual. Weekends pack with regulars who\'ve been coming for decades.",im:"It\'s 6am. Steam rises from wooden benches. You strip down, sweat, then plunge into black water while the city sleeps.",t:"Jump into the icy sea from a wooden sauna on the shore. No frills, no fees, pure Finnish ritual. Weekends pack with regulars who\'ve been coming for decades.\",im:\"It\'s 6am. Steam rises from wooden benches. You strip down, sweat, then plunge into black water while the city sleeps.\",t:\"Sompasauna, Kallioniementie 4, Vallila. Winter Oct–Apr, weekends. Bring towel. Brace for cold.",c:["local_only", "nature"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},

  {id:15,n:"Hakasalmen Villa",a:"Katajanokka",v:["history", "architecture", "beautiful"],d:15,s:"A 1840s aristocrat\'s home that\'s frozen in time with original furniture and secrets",st:"Every room tells a story. Medicine bottles in the bathroom. Clothes in wardrobes. Servants\' quarters unchanged.",im:"It\'s 1900. The villa hums with upper-class life. Servants move quietly. The family\'s private moments remain in objects.",t:"Every room tells a story. Medicine bottles in the bathroom. Clothes in wardrobes. Servants\' quarters unchanged.\",im:\"It\'s 1900. The villa hums with upper-class life. Servants move quietly. The family\'s private moments remain in objects.\",t:\"Hakasalmen Villa, Aleksanterinkatu 16, Katajanokka. Museum open daily. Interior tours available. Booking recommended.",c:["history_big", "architecture"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},
  {id:16,n:"Tapiola Modern Suburb",a:"Lauttasaari",v:["architecture", "quiet", "beautiful"],d:16,s:"A planned 1950s suburb that looks like designers actually cared about humans",st:"Wide streets. Curved buildings. Forests integrated into blocks. This is what utopian modernism looks like in real life.",im:"It\'s 1957. New residents move in. The suburb feels like a dream—safe, ordered, surrounded by nature.",t:"Wide streets. Curved buildings. Forests integrated into blocks. This is what utopian modernism looks like in real life.\",im:\"It\'s 1957. New residents move in. The suburb feels like a dream—safe, ordered, surrounded by nature.\",t:\"Tapiola, Lauttasaari. Tram line 8 from city center. Walk the central square. Explore residential streets. Bring a map.",c:["architecture"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},
  {id:17,n:"Eira Waterfront Villas",a:"Katajanokka",v:["history", "beautiful", "quiet"],d:17,s:"1910s grand villas facing the sea where Helsinki\'s old money lives invisibly",st:"Quiet streets. Massive homes hidden by trees. This is where bankers and artists built in the early 1900s.",im:"It\'s 1912. The villas rise. Families arrive with their secrets and their wealth. The sea hides them from the city.",t:"Quiet streets. Massive homes hidden by trees. This is where bankers and artists built in the early 1900s.\",im:\"It\'s 1912. The villas rise. Families arrive with their secrets and their wealth. The sea hides them from the city.\",t:\"Eira neighborhood: Merikatu, Eirantie streets. Walk the waterfront path. Best in summer. These are private homes—respect distance.",c:["history_big"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},
  {id:18,n:"Tietomaa Science Museum",a:"Kamppi",v:["weird", "beautiful", "local"],d:18,s:"A submarine-shaped science museum where you touch everything and nothing breaks",st:"Hands-on exhibits about energy, light, sound. Kids and adults get equal wonder. It\'s permission to be curious.",im:"It\'s 1999. The submarine appeared on the harbor. Science became playtime.",t:"Hands-on exhibits about energy, light, sound. Kids and adults get equal wonder. It\'s permission to be curious.\",im:\"It\'s 1999. The submarine appeared on the harbor. Science became playtime.\",t:\"Tietomaa, Mechelininkatu 34, Kamppi. Take metro. Entry fee. Weekday mornings less crowded. Parking available.",c:["weird"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},
  {id:19,n:"Ompelimo Artist Collective",a:"Kallio",v:["local", "hidden", "architecture"],d:19,s:"A converted textile factory where 40 artists run studios and you can watch them work",st:"Climb stairs in an old industrial building. Open studio doors. Painters, sculptors, ceramicists. Real work in progress.",im:"It\'s 1980s squatting. Artists occupied the factory. They\'re still here, legal now, creating in the same spaces.",t:"Climb stairs in an old industrial building. Open studio doors. Painters, sculptors, ceramicists. Real work in progress.\",im:\"It\'s 1980s squatting. Artists occupied the factory. They\'re still here, legal now, creating in the same spaces.\",t:\"Ompelimo, Välimerenkatu 16, Kallio. Open studio days monthly. Check website for visiting hours. Entry free to studios.",c:["local_only"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},
  {id:20,n:"Senate Square Winter Light",a:"Kruununhaka",v:["history", "beautiful", "quiet"],d:20,s:"A neoclassical square that glows different colors under winter darkness",st:"The White Cathedral dominates. Buildings wrapped in snow. Street lamps cast gold. It feels like stepping into a memory.",im:"It\'s 1820. The square completed. Russia\'s mark on Helsinki. Symmetry and power. Now it\'s pure beauty.",t:"The White Cathedral dominates. Buildings wrapped in snow. Street lamps cast gold. It feels like stepping into a memory.\",im:\"It\'s 1820. The square completed. Russia\'s mark on Helsinki. Symmetry and power. Now it\'s pure beauty.\",t:\"Senate Square (Senaatintori), Kruununhaka. Winter Dec–Feb. Dusk and evening best. Cafés nearby for warmth.",c:["history_big", "beautiful"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},
  {id:21,n:"Suomenlinna Underground Tunnels",a:"Suomenlinna",v:["history", "hidden", "weird"],d:21,s:"Military tunnels from 1747 that still connect different parts of the fortress island",st:"Walk through stone passages carved by hand. Echoes. Cool air. The fortress\'s defensive secrets underground.",im:"It\'s 1788. Soldiers move supplies through darkness. Cannons overhead. The tunnels are the fortress\'s veins.",t:"Walk through stone passages carved by hand. Echoes. Cool air. The fortress\'s defensive secrets underground.\",im:\"It\'s 1788. Soldiers move supplies through darkness. Cannons overhead. The tunnels are the fortress\'s veins.\",t:\"Suomenlinna, access via ferry from Kauppatori. Guided tours available for tunnels. Wear closed shoes. Temperature drops underground.",c:["history_big"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},
  {id:22,n:"Noor Normen Bookshop",a:"Kallio",v:["local", "hidden", "beautiful"],d:22,s:"A secondhand bookshop in a Kallio basement where you can lose hours",st:"Cramped shelves. Wooden floors. Books in Finnish and Swedish. This is where locals find forgotten classics.",im:"It\'s been here since 1987. Regulars have found books they didn\'t know they needed.",t:"Cramped shelves. Wooden floors. Books in Finnish and Swedish. This is where locals find forgotten classics.\",im:\"It\'s been here since 1987. Regulars have found books they didn\'t know they needed.\",t:\"Noor Normen, Helsinginkatu 35, Kallio. Tram 3A or 7A. Weekends can be crowded. Bring time. Cash and card accepted.",c:["local_only"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},
  {id:23,n:"Oodi Central Library",a:"Töölö",v:["architecture", "beautiful", "quiet"],d:23,s:"A library that looks like a wooden ship and costs nothing to feel wonder",st:"Curved wood. Open spaces. A landscape of light and silence. Libraries should all feel this way.",im:"It\'s 2018. Finland opens its new library to the world. A building that says reading matters.",t:"Curved wood. Open spaces. A landscape of light and silence. Libraries should all feel this way.\",im:\"It\'s 2018. Finland opens its new library to the world. A building that says reading matters.\",t:\"Oodi Library, Töölönlahdenkatu 4, Töölö. Free entry. Metro line to Kallio station. Best midweek mornings.",c:["architecture"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},
  {id:24,n:"Harakka Island Nature Reserve",a:"Lauttasaari",v:["nature", "quiet", "free", "beautiful"],d:24,s:"A protected island where birds nest and humans barely whisper",st:"Cross a narrow causeway to find nesting plovers and terns. Binoculars essential. Silence is the rule.",im:"It\'s April. Thousands of birds arrive. They nest. They raise young. Humans watch in awe from designated paths.",t:"Cross a narrow causeway to find nesting plovers and terns. Binoculars essential. Silence is the rule.\",im:\"It\'s April. Thousands of birds arrive. They nest. They raise young. Humans watch in awe from designated paths.\",t:\"Harakka Island, reachable from Lauttasaari by bike or foot. Causeway walkable year-round. Spring best for birds. Respect nesting areas.",c:["nature"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},
  {id:25,n:"Turun Satama Port District",a:"Katajanokka",v:["history", "local", "beautiful"],d:25,s:"Historic warehouse district where wooden buildings still smell like tar and timber",st:"Narrow streets. Red and brown wooden buildings. Ships dock. This is working port beauty.",im:"It\'s 1880. Ships load cargo. Sailors drink in taverns. The port hums with trade.",t:"Narrow streets. Red and brown wooden buildings. Ships dock. This is working port beauty.\",im:\"It\'s 1880. Ships load cargo. Sailors drink in taverns. The port hums with trade.\",t:\"Turun Satama (Turku Port area parallel, Helsinki equivalent: Katajanokka Harbor). Walk Katajanokka peninsula. Photography golden hour.",c:["history_big", "beautiful"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},
  {id:26,n:"Rock Climbing in Kallvik",a:"Kruununhaka",v:["nature", "weird", "beautiful"],d:26,s:"You can climb the same granite used to build Helsinki, right in the city",st:"Bouldering spots in carved granite. Routes set by locals. Sweat and stone. City views from the top.",im:"It\'s the 1900s. Granite hewers carved these rocks. Now climbers use what nature left behind.",t:"Bouldering spots in carved granite. Routes set by locals. Sweat and stone. City views from the top.\",im:\"It\'s the 1900s. Granite hewers carved these rocks. Now climbers use what nature left behind.\",t:\"Kallvik climbing area, Kruununhaka. Public bouldering spots on Kallvikintie. Bring climbing shoes. Crashes land on rock—skill required.",c:["nature"],r:"y",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},
  {id:27,n:"Kiasma Exterior Staircase",a:"Kamppi",v:["architecture", "weird", "beautiful"],d:27,s:"An impossible copper staircase on the outside of the museum that curves without logic",st:"The stairs wrap the building like a helix. Walk them. Perspective shifts. Architecture becomes sculpture.",im:"It\'s design genius in motion. The architect played with gravity and human perception.",t:"The stairs wrap the building like a helix. Walk them. Perspective shifts. Architecture becomes sculpture.\",im:\"It\'s design genius in motion. The architect played with gravity and human perception.\",t:\"Kiasma, Mannerheiminaukio 2, Kamppi. Exterior accessible always. The stairs are safe—just look strange. Photo op crucial.",c:["architecture"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},
  {id:28,n:"Pullman City District",a:"Vallila",v:["history", "architecture", "quiet"],d:28,s:"A 1920s workers\' neighborhood built by railroad workers that feels stuck in time",st:"Small identical wooden houses. Railroad yards nearby. This is where ordinary people built their lives.",im:"It\'s 1925. Railroad workers and their families moved in. Each house identical. Order and community.",t:"Small identical wooden houses. Railroad yards nearby. This is where ordinary people built their lives.\",im:\"It\'s 1925. Railroad workers and their families moved in. Each house identical. Order and community.\",t:\"Pullman/Vallila area: Kaisaniemenkatu, Topeliuksenkatu. Quiet weekday walks. Sunday mornings peaceful. No commercial tourism.",c:["history_big"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},
  {id:29,n:"Storm Bell Tower",a:"Kruununhaka",v:["history", "quiet", "beautiful"],d:29,s:"A bell tower that only rang when dangerous storms approached the harbor",st:"The warning bell saved sailors\' lives. Now it\'s silent, a monument to weather and danger.",im:"It\'s 1850. A massive storm forms. The bell clangs warnings. Ships scramble. The system works.",t:"The warning bell saved sailors\' lives. Now it\'s silent, a monument to weather and danger.\",im:\"It\'s 1850. A massive storm forms. The bell clangs warnings. Ships scramble. The system works.\",t:\"Storm Bell Tower, visible from Senate Square area, Kruununhaka. Best photographed from different angles around the square.",c:["history_big"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},

  {id:32,n:"Sörensen Park Sculpture Trail",a:"Sörnäinen",v:["nature", "art", "beautiful", "free"],d:32,s:"A riverside park where modern sculptures emerge from nature like surprises",st:"Walk a path. Find wooden sculptures. Metal pieces. Artists engaged with land and stone.",im:"It\'s summer. An artist installs work. Next spring, nature reclaims parts of it. The cycle begins.",t:"Walk a path. Find wooden sculptures. Metal pieces. Artists engaged with land and stone.\",im:\"It\'s summer. An artist installs work. Next spring, nature reclaims parts of it. The cycle begins.\",t:\"Sörensen Park, riverside in Sörnäinen. Free. Walk Aura River path. Sculptures scattered along trails. Bring a camera.",c:["nature", "art"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},
  {id:33,n:"White Christmas Market (Stockmann)",a:"Kamppi",v:["local", "beautiful", "free"],d:33,s:"An outdoor Christmas market that transforms the city center into Nordic magic from November to December",st:"Wooden stalls. Hot glögi. Gingerbread. Local crafts. This is Finland\'s holiday heartbeat.",im:"It\'s November evening. Lights arrive. The market appears overnight. The city smells like cinnamon and pine.",t:"Wooden stalls. Hot glögi. Gingerbread. Local crafts. This is Finland\'s holiday heartbeat.\",im:\"It\'s November evening. Lights arrive. The market appears overnight. The city smells like cinnamon and pine.\",t:\"Stockmann Christmas Market, downtown Helsinki, Kamppi area. Nov–Dec only. Free entry. Stalls and cafés. Bundle up.",c:["local_only", "beautiful"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},

  {id:36,n:"Eläintarha Zoo Winter Walks",a:"Töölö",v:["nature", "quiet", "local"],d:36,s:"A zoo that\'s less crowded in winter when the animals are more active in cold",st:"Snow. Birch trees. Animals emerging. Winter transforms the experience. Bears seem more real.",im:"It\'s January. A lynx walks fresh snow. Tourists gone. The zoo breathes differently in cold.",t:"Snow. Birch trees. Animals emerging. Winter transforms the experience. Bears seem more real.\",im:\"It\'s January. A lynx walks fresh snow. Tourists gone. The zoo breathes differently in cold.\",t:\"Eläintarha Zoo, Eläintarhanaukio 1, Töölö. Winter open daily. Entry fee. Parking available. Best Dec–Feb. Dress warmly.",c:["nature"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},

  {id:48,n:"Kallio Winter Ice Swimming",a:"Kallio",v:["hidden", "local", "weird", "nature"],d:48,s:"Secret winter swimming spots where locals strip and dive when tourists are home by 4pm",st:"Find a hole in the ice. Plunge. Surface gasping. It\'s the most alive you\'ll feel and the most terrified.",im:"It\'s January dusk. A group strips at the shore. Steam rises. They laugh. The water accepts them.",t:"Find a hole in the ice. Plunge. Surface gasping. It\'s the most alive you\'ll feel and the most terrified.\",im:\"It\'s January dusk. A group strips at the shore. Steam rises. They laugh. The water accepts them.\",t:\"Kallio harbor area and surrounding ice spots. December–February only. Go with locals first. Respect the cold. Safety crucial.",c:["local_only", "weird"],r:"y",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},
  {id:49,n:"Kruununhaka Medieval Street Layout",a:"Kruununhaka",v:["history", "hidden", "beautiful", "quiet"],d:49,s:"Streets that follow medieval patterns even though the buildings are 1800s—you\'re walking medieval geography",st:"Narrow lanes. Tight angles. Cobblestone. The city\'s oldest district where planning from 1600s still dictates paths.",im:"It\'s 1600. A town planner drew these lines. Centuries later, we still follow them. The past guides our feet.",t:"Narrow lanes. Tight angles. Cobblestone. The city\'s oldest district where planning from 1600s still dictates paths.\",im:\"It\'s 1600. A town planner drew these lines. Centuries later, we still follow them. The past guides our feet.\",t:\"Kruununhaka neighborhood: Mariankatu, Meritullinkatu area. Sunday morning walks best. Walk slowly. Notice patterns. Very quiet.",c:["history_big"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},

  {id:62,n:"Porvoo Old Town Red Houses",a:"Porvoo",v:["history", "beautiful", "quiet"],d:62,s:"Medieval town where red wooden houses line a river frozen in the 1700s",st:"Cobblestone streets. Leaning buildings in primary colors. A river below with swans. Time moved differently here.",im:"It\'s 1750. A merchant counts coins in his red house. Now you walk, smelling bread baking in those same kitchens.",t:"Cobblestone streets. Leaning buildings in primary colors. A river below with swans. Time moved differently here.\",im:\"It\'s 1750. A merchant counts coins in his red house. Now you walk, smelling bread baking in those same kitchens.\",t:\"Train from central Helsinki (30 min) then short bus. Old town is free to wander. Bring euros for cafes.",c:["history_big", "romantic_water", "architecture"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},
  {id:63,n:"Kiasma Free Art Mornings",a:"Kamppi",v:["free", "beautiful", "hidden"],d:63,s:"Contemporary museum that gives free entry 4 hours every Tuesday",st:"Modern art in a glass cube. Tuesdays 5pm–9pm free. Locals know. Tourists don\'t. It\'s Finland\'s best-kept art secret.",im:"It\'s Tuesday evening. A teenager stands before a video installation. Behind her, the city glows gold.",t:"Modern art in a glass cube. Tuesdays 5pm–9pm free. Locals know. Tourists don\'t. It\'s Finland\'s best-kept art secret.\",im:\"It\'s Tuesday evening. A teenager stands before a video installation. Behind her, the city glows gold.\",t:\"Kiasma, Mannerheiminaukio 2. Tuesdays 5–9pm free (€12 other times). Metro to Kamppi. Skip weekends.",c:["free_museum", "architecture"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},
  {id:64,n:"Oodi Library Secret Reading Nooks",a:"Kamppi",v:["beautiful", "hidden", "quiet"],d:64,s:"Futuristic library with hidden corners where you can disappear into books",st:"Wooden architecture, curved walls, strange light. Third floor has nooks where locals hide all day reading. No one bothers you.",im:"It\'s a rainy afternoon. You\'re in a cocoon of blonde wood, alone with a book, while the city rains outside the glass.",t:"Wooden architecture, curved walls, strange light. Third floor has nooks where locals hide all day reading. No one bothers you.\",im:\"It\'s a rainy afternoon. You\'re in a cocoon of blonde wood, alone with a book, while the city rains outside the glass.\",t:\"Oodi Library, Töölönkatu 4. Free. Open 8am–10pm daily. Bring your own book or use theirs. Cafes on each floor.",c:["architecture", "quiet"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},

  {id:78,n:"Kallioniemi Rock Carving Petroglyphs",a:"Vallila",v:["history", "weird", "hidden"],d:78,s:"Ancient rock carvings from when the sea covered this city—proof of pre-Helsinki",st:"Rocks carved 3500 years ago. Fish, elk, humans. The sea receded. The carvings remained—a message from the Bronze Age.",im:"It\'s 1500 BC. A hunter carves a fish into rock by firelight. His great-great-great grandchildren walk above it unaware.",t:"Rocks carved 3500 years ago. Fish, elk, humans. The sea receded. The carvings remained—a message from the Bronze Age.\",im:\"It\'s 1500 BC. A hunter carves a fish into rock by firelight. His great-great-great grandchildren walk above it unaware.\",t:\"Near Sompasauna, Vallila. Free. Always accessible. Bring water. Photography allowed. Respectfully.",c:["history_big", "weird"],r:"g",nn:"Helsinki",ns:"Pohjolan modernismin sydän.",nst:"Helsinki on pienehkö pääkaupunki, jossa design ja minimalismi ovat elämäntapoja. Rautatieasema on Eliel Saarinens mestariteoksia, kun taas modernit museot hyrähtelevät kallioista. Sauna on elämää—kuumaan veteen heitetään löyly ja mielessä syntyy selkeys. Suomalaiset ovat hiljaisia, mutta sauna avaa sydämen.",nt:"Saunominen on pakollista—ota löyly. Museoiden joukossa voit hukuttaa päiviä. Ruoka on yksinkertaista ja terveellistä. Sokos-tavaratalo on shoppiin. Saariset houkuttelevat kesällä. Talvi on pimmeä mutta kaunis. Suomalaiset eivät tykkää pienpuhumisesta."},

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
const TBGS={"places":"https://mariavheland.github.io/godostuff/textures/tex16.png","collections":"https://mariavheland.github.io/godostuff/textures/tex04.png","missions":"https://mariavheland.github.io/godostuff/textures/tex04.png","plan":"https://mariavheland.github.io/godostuff/textures/tex04.png","phrases":"https://mariavheland.github.io/godostuff/textures/tex16.png","default":"https://mariavheland.github.io/godostuff/textures/tex16.png"};if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
{/* dark scrim over photo */}
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:`url(\'${TBGS[tab]||TBGS.default}\') center/cover no-repeat`}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Helsinki Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Helsinki Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
