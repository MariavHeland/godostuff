  {id:75,n:"Free Community Cinema — Margaret Island",a:"Margaret Island",v:["free", "night"],d:75,s:"Summer outdoor cinema on Margaret Island—free films, packed crowds, beautiful setting",st:"July-August. A screen appears on the island. A movie plays. Hundreds come. They sit on grass. The Danube flows behind. The city glows. The film plays free. It\'s community.",im:"It\'s always been like this. Cities gather around stories. Fire. Then screens. Now projection. The ritual is the same. The need is the same. The freedom is the same.",t:"July-August. A screen appears on the island. A movie plays. Hundreds come. They sit on grass. The Danube flows behind. The city glows. The film plays free. It\'s community.\",im:\"It\'s always been like this. Cities gather around stories. Fire. Then screens. Now projection. The ritual is the same. The need is the same. The freedom is the same.\",t:\"Margaret Island (tram to end). Films June-September. Times vary (usually 8-9pm start). Completely free. Bring blanket and friends. The crowd is local and diverse. The vibe is pure summer magic.",c:["free", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:76,n:"Free Classical Concerts — Churches",a:"Downtown",v:["free", "music", "night"],d:76,s:"Baroque churches host free classical concerts—the acoustics are perfect, the music is transcendent",st:"You sit in a church. A quartet appears. Vivaldi echoes through centuries-old stone. The acoustics are built for this. The experience is spiritual without being religious.",im:"It\'s always been like this. Churches resonant. Musicians arrive. Sound fills stone. Sacred and beautiful. Now you experience it.",t:"You sit in a church. A quartet appears. Vivaldi echoes through centuries-old stone. The acoustics are built for this. The experience is spiritual without being religious.\",im:\"It\'s always been like this. Churches resonant. Musicians arrive. Sound fills stone. Sacred and beautiful. Now you experience it.\",t:\"Matthias Church, St. Stephen\'s Basilica area. Check Budapest tourism for concert schedules. Usually 7-8pm. Donation-based (suggest €5). Very local experience. Very transcendent.",c:["free", "music", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:77,n:"District VII Jewish Quarter Murals",a:"District VII",v:["street_art", "history", "hidden"],d:77,s:"A neighborhood celebrates its Jewish heritage through murals and street art",st:"You walk the Jewish Quarter. Murals of Yiddish words. Portraits of rabbis. Historical scenes. The neighborhood reclaims and honors its past. Art as memorial.",im:"It\'s 1940s. This neighborhood is erased. Thousands vanish. Now, decades later, art returns. Art resurrects memory. Art says: we were here. We mattered.",t:"You walk the Jewish Quarter. Murals of Yiddish words. Portraits of rabbis. Historical scenes. The neighborhood reclaims and honors its past. Art as memorial.\",im:\"It\'s 1940s. This neighborhood is erased. Thousands vanish. Now, decades later, art returns. Art resurrects memory. Art says: we were here. We mattered.\",t:\"District VII (Kazinczy, Dob streets). Free walking tour. Self-guided. The murals are changing. New ones added regularly. Check #jewishbudapest on Instagram. Very moving space.",c:["street_art", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:78,n:"Kazinczy Street Art Festival",a:"District VII",v:["street_art", "hidden"],d:78,s:"An entire street transforms annually with new murals—a living festival",st:"Every year, Kazinczy updates. New artists. New walls. New visions. The street is a canvas in constant evolution. You witness art as process, not product.",im:"It\'s ongoing. Every year brings transformation. The artists return. The walls renew. The neighborhood stays alive. Not frozen. Alive.",t:"Every year, Kazinczy updates. New artists. New walls. New visions. The street is a canvas in constant evolution. You witness art as process, not product.\",im:\"It\'s ongoing. Every year brings transformation. The artists return. The walls renew. The neighborhood stays alive. Not frozen. Alive.\",t:\"Kazinczy utca, District VII. Free. Self-guided. Best in daylight. The murals are new each year (usually updated in spring). Go twice in a year and see change.",c:["street_art"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:79,n:"Tűzoltó utca Murals",a:"District IX",v:["street_art", "hidden"],d:79,s:"A historic firefighter street that became an open-air gallery of political and social art",st:"A whole street dedicated to murals. Political messages. Social commentary. Artistic statements. The walls speak. The neighborhood listens. Art as voice.",im:"It\'s 2010s. The street opens to artists. They paint. The neighborhood responds. Now it\'s known. Now it\'s visited. But the spirit is still radical.",t:"A whole street dedicated to murals. Political messages. Social commentary. Artistic statements. The walls speak. The neighborhood listens. Art as voice.\",im:\"It\'s 2010s. The street opens to artists. They paint. The neighborhood responds. Now it\'s known. Now it\'s visited. But the spirit is still radical.\",t:\"Tűzoltó utca, District IX. Free. Self-guided. Beautiful murals. Some new each year. Go with a local if possible—they\'ll explain the meanings. The street is gentrifying but still authentic.",c:["street_art"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:80,n:"Batthyány Thermal — Rooftop Ritual",a:"Margaret Island",v:["beautiful", "hidden", "night"],d:80,s:"A hidden rooftop thermal with sunset views — locals guard this secret",st:"You climb to the rooftop. The thermal pool steams. Budapest sprawls below. The sun descends. You float in warm water watching the city glow. It\'s transcendent.",im:"It\'s been like this for 100 years. Locals know. They keep coming. They rarely tell tourists. Now you\'re part of the secret.",t:"You climb to the rooftop. The thermal pool steams. Budapest sprawls below. The sun descends. You float in warm water watching the city glow. It\'s transcendent.\",im:\"It\'s been like this for 100 years. Locals know. They keep coming. They rarely tell tourists. Now you\'re part of the secret.\",t:\"Batthyány fürdő, Margaret Island area. €15-20 entry. Rooftop access included. Go 6-8pm. Bring a towel. The experience is unmissable.",c:["beautiful", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:81,n:"Great Synagogue Hidden Genizah",a:"District VII",v:["history", "weird", "hidden"],d:81,s:"Below the famous synagogue, a hidden room held sacred scrolls — discovered in walls",st:"You descend below the main synagogue. A small room. This genizah held damaged Torah scrolls. Jews couldn\'t throw them away, so they hid them. Centuries later, they were found. Now you see where faith hid.",im:"It\'s medieval times. A Torah tears. It\'s placed in a hidden room. For 400 years it waits. Then someone discovers it. Then it\'s sacred. Then you see the spot.",t:"You descend below the main synagogue. A small room. This genizah held damaged Torah scrolls. Jews couldn\'t throw them away, so they hid them. Centuries later, they were found. Now you see where faith hid.\",im:\"It\'s medieval times. A Torah tears. It\'s placed in a hidden room. For 400 years it waits. Then someone discovers it. Then it\'s sacred. Then you see the spot.\",t:\"Great Synagogue, District VII. €12 entry (includes museum and genizah). Open 10am-5pm. The genizah tour is special. Book ahead. Very moving.",c:["history_big", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:82,n:"Memento Park — Soviet Statues Cemetery",a:"Memento Park (south Budapest)",v:["weird", "history", "art"],d:82,s:"A museum of removed Soviet statues — a cemetery for ideology",st:"You walk through a field of statues. Lenin stares. A Soviet soldier stands. Hammer and sickles are everywhere. They were removed from the city. Now they\'re displayed as history. Now they\'re art.",im:"It\'s 1989. Soviet statues come down. People tear them down. They\'re saved by a curator. Now they\'re a museum. Now they tell the story of what fell.",t:"You walk through a field of statues. Lenin stares. A Soviet soldier stands. Hammer and sickles are everywhere. They were removed from the city. Now they\'re displayed as history. Now they\'re art.\",im:\"It\'s 1989. Soviet statues come down. People tear them down. They\'re saved by a curator. Now they\'re a museum. Now they tell the story of what fell.\",t:\"Memento Park (bus from central Budapest, 45min). €14 entry. Open 10am-sunset. The statues are surreal. The experience is historically heavy. Bring time.",c:["weird", "history_big", "art"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:83,n:"Óbudai Museum Apáti Henszlmann Villa",a:"Óbuda",v:["history", "beautiful"],d:83,s:"A Renaissance mansion hidden in Óbuda — where Turks and Hungarians lived side by side",st:"You find a small villa. Inside, Turkish and Hungarian artifacts. This house witnessed the Ottoman occupation. The family survived by adapting. Now you see how.",im:"It\'s 1550. Ottomans occupy. A family builds a house. They blend two worlds. Now you walk through their compromise.",t:"You find a small villa. Inside, Turkish and Hungarian artifacts. This house witnessed the Ottoman occupation. The family survived by adapting. Now you see how.\",im:\"It\'s 1550. Ottomans occupy. A family builds a house. They blend two worlds. Now you walk through their compromise.\",t:\"Óbuda area. €4 entry. Open 10am-4pm, closed Mondays. Self-guided tour. Very few tourists. The collection is intimate.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:84,n:"Budapest Underground Tunnels — Pálvölgyi Caves",a:"Buda",v:["nature", "weird", "hidden"],d:84,s:"Natural cave system under Buda with 29 kilometers of passages — you can explore 500m",st:"You descend into limestone caves. The passages narrow. Stalactites form. An underground lake appears. It\'s been carving for 100,000 years. You\'re deep in the earth.",im:"It\'s ancient. Water started carving. It never stopped. Now you walk what water created.",t:"You descend into limestone caves. The passages narrow. Stalactites form. An underground lake appears. It\'s been carving for 100,000 years. You\'re deep in the earth.\",im:\"It\'s ancient. Water started carving. It never stopped. Now you walk what water created.\",t:\"Pálvölgyi Cave, Buda. €10 entry. Tours 1 hour. Open 10am-4pm. Bring a light jacket (8°C). The cave is actively forming. The experience is otherworldly.",c:["nature", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:85,n:"Margit Island Hidden Franciscan Monastery",a:"Margaret Island",v:["history", "hidden", "quiet"],d:85,s:"Ruins of a 13th-century convent on the island—only foundations remain",st:"You find stone ruins in the park. A woman lived here 800 years ago. She was royalty who became a nun. The convent is half-visible. Nature is slowly reclaiming. It\'s melancholic and beautiful.",im:"It\'s 1200. A princess chooses the convent. She lives in prayer. Now her walls crumble. Now you find her.",t:"You find stone ruins in the park. A woman lived here 800 years ago. She was royalty who became a nun. The convent is half-visible. Nature is slowly reclaiming. It\'s melancholic and beautiful.\",im:\"It\'s 1200. A princess chooses the convent. She lives in prayer. Now her walls crumble. Now you find her.\",t:\"Margaret Island (tram to end). Walk east side. Ruins are free, visible. Very atmospheric. Bring imagination. The solitude is absolute.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:86,n:"Chain Bridge Walk — Midnight Crossing",a:"Danube",v:["beautiful", "night", "quiet"],d:86,s:"Cross the famous bridge at midnight — no crowds, only you and the illuminated Danube",st:"You walk the bridge. The river glows beneath. Parliament glows on both sides. The water reflects. It\'s intimate. It\'s yours. The bridge is yours at midnight.",im:"It\'s always been here. For 150 years. Now you cross it when it\'s yours.",t:"You walk the bridge. The river glows beneath. Parliament glows on both sides. The water reflects. It\'s intimate. It\'s yours. The bridge is yours at midnight.\",im:\"It\'s always been here. For 150 years. Now you cross it when it\'s yours.\",t:\"Chain Bridge (Széchenyi Lánchíd), any side. Free. 24/7. Best midnight-3am. Very safe. Bring a friend. The experience is magical.",c:["beautiful", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:87,n:"Vajdahunyad Castle — Architectural Fantasy",a:"City Park",v:["weird", "beautiful"],d:87,s:"A castle that\'s not a castle — a fantasy building mixing every European style",st:"You approach a castle. It looks real. It\'s not real. It\'s an architect\'s dream. Romanesque. Gothic. Baroque. Renaissance. All in one building. It\'s obsessive. It\'s beautiful. It\'s artificial.",im:"It\'s 1896. For the millennium, someone builds a castle that\'s every castle. It becomes beloved. It becomes real.",t:"You approach a castle. It looks real. It\'s not real. It\'s an architect\'s dream. Romanesque. Gothic. Baroque. Renaissance. All in one building. It\'s obsessive. It\'s beautiful. It\'s artificial.\",im:\"It\'s 1896. For the millennium, someone builds a castle that\'s every castle. It becomes beloved. It becomes real.\",t:\"City Park. €4 entry (or view free from outside). Open 10am-5pm. The architecture is the attraction. Bring a camera. The interior is a bit empty but the facade is stunning.",c:["weird", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:88,n:"Central European University Library Rooftop",a:"District XIII",v:["hidden", "beautiful", "quiet"],d:88,s:"A university library rooftop with secret views of the city—open to public",st:"You enter the university. You climb to the top floor. A rooftop opens. Budapest below. Few tourists. Few people. The view rivals paid viewpoints. It\'s free.",im:"It\'s a library building. Someone had the idea: let the rooftop breathe. Now it\'s a secret spot.",t:"You enter the university. You climb to the top floor. A rooftop opens. Budapest below. Few tourists. Few people. The view rivals paid viewpoints. It\'s free.\",im:\"It\'s a library building. Someone had the idea: let the rooftop breathe. Now it\'s a secret spot.\",t:\"CEU (Nádor u. 9, near Deák). Free rooftop access. Open during library hours (9am-9pm). Bring ID. Very few tourists know this.",c:["hidden", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:89,n:"Kiscellar Cellar Wine Tasting — Historic Pub",a:"District I",v:["hidden", "local", "night"],d:89,s:"A wine cellar dating to medieval times — locals drink here, tourists never find it",st:"You descend stone stairs. A cellar opens. Wine barrels line walls. The bartender knows everyone. You order by pointing. It\'s authentic. It\'s timeless. It\'s pure Hungarian hospitality.",im:"It\'s medieval. Wine ages here. Now you taste it. Now you\'re part of the tradition.",t:"You descend stone stairs. A cellar opens. Wine barrels line walls. The bartender knows everyone. You order by pointing. It\'s authentic. It\'s timeless. It\'s pure Hungarian hospitality.\",im:\"It\'s medieval. Wine ages here. Now you taste it. Now you\'re part of the tradition.\",t:\"Budapest wine cellars (several exist). €5-15 per glass. Small plates available. Very local. Ask locals for current favorites. Hours vary. Cash only.",c:["local_only", "night", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:90,n:"Danube Arch Sculpture — Hidden River Passage",a:"Danube Passage",v:["weird", "art", "hidden"],d:90,s:"A sculptural archway beneath bridges where kayakers pass — public art in private space",st:"By boat, you pass under stone arches. Sculptures hang. The sound echoes. It\'s surreal. It\'s only visible from water. Most Hungarians never see it.",im:"It\'s modern. An artist realized kayakers see a gap. They filled it with art. Now it\'s secret.",t:"By boat, you pass under stone arches. Sculptures hang. The sound echoes. It\'s surreal. It\'s only visible from water. Most Hungarians never see it.\",im:\"It\'s modern. An artist realized kayakers see a gap. They filled it with art. Now it\'s secret.\",t:\"Kayak rental (€20-50 for half day). Tours depart from Margaret Island area. Guide will show you. The experience is unforgettable.",c:["art", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:91,n:"Military Hospital Records — WWII & Soviet",a:"District XII",v:["history", "scary", "hidden"],d:91,s:"A former military hospital now a museum showing how regimes used medicine as control",st:"You walk through old operating rooms. Medical instruments. Records. The history is the building. People were treated and tortured. The line blurs. The history is visible.",im:"It\'s 1940s-1980s. Medicine was power. Now you see how.",t:"You walk through old operating rooms. Medical instruments. Records. The history is the building. People were treated and tortured. The line blurs. The history is visible.\",im:\"It\'s 1940s-1980s. Medicine was power. Now you see how.\",t:\"Military Hospital Museum, Buda. €6 entry. Open 10am-4pm (closed Mondays). Very specific history. Bring patience. Bring open mind.",c:["history_big", "scary"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:92,n:"Vígszínház Rooftop Terrace (Hidden Theater Bar)",a:"District XIII",v:["hidden", "art", "night"],d:92,s:"A theater\'s rooftop bar overlooking the Danube — performers hang out here",st:"You climb theater stairs. You emerge on a rooftop. Danube stretches. Theater crowd mingles. It\'s cultured. It\'s informal. It\'s a secret society for people who love the arts.",im:"It\'s a theater. Someone realized the roof is empty. They made it alive. Now artists gather.",t:"You climb theater stairs. You emerge on a rooftop. Danube stretches. Theater crowd mingles. It\'s cultured. It\'s informal. It\'s a secret society for people who love the arts.\",im:\"It\'s a theater. Someone realized the roof is empty. They made it alive. Now artists gather.\",t:\"Vigszínház (XIII district). €10-15 entry (or free with show ticket). Theater crowd hours vary. Best 8pm onwards. Bring friends. The view is gold.",c:["art", "night", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:93,n:"Molnár János Ice Cave",a:"Buda",v:["nature", "hidden"],d:93,s:"A natural ice cave in Budapest\'s hills — ice forms even in summer",st:"You descend into a cave. It\'s cold. Ice glints. In summer. Underground cold lasts forever. It\'s a pocket of winter in a warm city.",im:"It\'s geology. Water seeps. Cold descends. Ice forms. The cycle repeats. Now you see it.",t:"You descend into a cave. It\'s cold. Ice glints. In summer. Underground cold lasts forever. It\'s a pocket of winter in a warm city.\",im:\"It\'s geology. Water seeps. Cold descends. Ice forms. The cycle repeats. Now you see it.\",t:\"North Buda (HÉV north). €8 entry. Guided tours only. 1 hour. Bring a warm layer. The cave is surreal.",c:["nature", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:94,n:"Wekerle Telep — Garden City Neighborhood",a:"District XIX",v:["hidden", "beautiful", "local"],d:94,s:"An entire neighborhood built as a utopian community — 1920s garden city ideals intact",st:"You walk streets designed by architects who believed in human harmony. Villas with gardens. Wide streets. It\'s a time capsule of idealism. It mostly worked.",im:"It\'s 1920. Architects imagine a community. No slums. No despair. Gardens and beauty. Now you walk their dream.",t:"You walk streets designed by architects who believed in human harmony. Villas with gardens. Wide streets. It\'s a time capsule of idealism. It mostly worked.\",im:\"It\'s 1920. Architects imagine a community. No slums. No despair. Gardens and beauty. Now you walk their dream.\",t:\"District XIX (HÉV east). Walking tour self-guided. Free. Open streets. Very peaceful. Far from tourists. Go for the feeling.",c:["hidden", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:95,n:"Nagytétény Palace — Furniture Museum",a:"District XI",v:["history", "beautiful", "hidden"],d:95,s:"A Baroque palace displaying centuries of Hungarian furniture design",st:"You walk through rooms of chairs, tables, beds. Each one has a story. The craftsmanship is visible. Hungarian design is underrated. Here it\'s honored.",im:"It\'s medieval-modern. People sit. They sleep. Craftsmen build. Now you see the art in daily objects.",t:"You walk through rooms of chairs, tables, beds. Each one has a story. The craftsmanship is visible. Hungarian design is underrated. Here it\'s honored.\",im:\"It\'s medieval-modern. People sit. They sleep. Craftsmen build. Now you see the art in daily objects.\",t:\"District XI (bus south). €8 entry. Open 10am-4pm, closed Mondays. Very few tourists. The collection is comprehensive. Bring patience.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:96,n:"Ady Endre Literary House — Poet\'s Room",a:"District IV",v:["history", "quiet"],d:96,s:"Where a famous poet lived and wrote — his desk and books still arranged",st:"You enter a room. A poet\'s desk. His chair. His books. Some opened to pages he loved. It\'s intimate. It\'s haunting. You\'re in his sanctuary.",im:"It\'s 1900. A poet writes. He dreams. He suffers. His words endure. Now you stand in the place where those words were born.",t:"You enter a room. A poet\'s desk. His chair. His books. Some opened to pages he loved. It\'s intimate. It\'s haunting. You\'re in his sanctuary.\",im:\"It\'s 1900. A poet writes. He dreams. He suffers. His words endure. Now you stand in the place where those words were born.\",t:\"District IV (bus from center). €4 entry. Open 10am-4pm, closed Mondays. Small but moving. Bring silence.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:97,n:"Farkasrét Cemetery — Graves of Famous Hungarians",a:"District XII",v:["history", "quiet", "weird"],d:97,s:"A cemetery where legends rest — composers, poets, revolutionaries in one ground",st:"You walk rows. Names you recognize. Artists. Fighters. The stones tell stories. It\'s beautiful. It\'s melancholic. It\'s peaceful.",im:"It\'s been receiving the famous for 100 years. Now you pay respects. Now you remember.",t:"You walk rows. Names you recognize. Artists. Fighters. The stones tell stories. It\'s beautiful. It\'s melancholic. It\'s peaceful.\",im:\"It\'s been receiving the famous for 100 years. Now you pay respects. Now you remember.\",t:\"District XII (tram 61 to end). Free. Open 7am-5pm daily. Maps available at entrance. The cemetery is peaceful. Bring respect.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:98,n:"Castle Museum Basement — Medieval Foundations",a:"Buda Castle",v:["history", "weird", "hidden"],d:98,s:"Below the castle museum, medieval rooms still visible in the stone",st:"You descend from the main museum. Medieval chambers appear. Doorways carved in rock. It\'s the original castle. It\'s beneath everything. It\'s still alive.",im:"It\'s medieval. Someone carved a room from stone. That room still exists. Still matters.",t:"You descend from the main museum. Medieval chambers appear. Doorways carved in rock. It\'s the original castle. It\'s beneath everything. It\'s still alive.\",im:\"It\'s medieval. Someone carved a room from stone. That room still exists. Still matters.\",t:\"Buda Castle complex. €18 entry (castle included). The basement is part of the museum. Open 10am-6pm. Bring a light.",c:["history_big", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:99,n:"Eötvös Loránd University Library — Secret Reading Rooms",a:"District VIII",v:["hidden", "beautiful", "quiet"],d:99,s:"University library with hidden reading alcoves where students study in medieval rooms",st:"You enter the library. The halls are vast. But tucked in corners: alcoves. Small rooms. Windows. It\'s where serious students hide. It\'s where knowledge is born.",im:"It\'s a university. Students come. They study. They think. Some find perfect corners. Those corners are secret. Now you find them too.",t:"You enter the library. The halls are vast. But tucked in corners: alcoves. Small rooms. Windows. It\'s where serious students hide. It\'s where knowledge is born.\",im:\"It\'s a university. Students come. They study. They think. Some find perfect corners. Those corners are secret. Now you find them too.\",t:\"Eötvös University library (ask at main desk about visiting). €3-5 day pass. Hours 8am-8pm. Bring ID. The atmosphere is pure scholarly.",c:["hidden", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:100,n:"Kopaszi Gát Waterfront Promenade",a:"District XI",v:["nature", "beautiful", "hidden"],d:100,s:"A Danube embankment park with views, art installations, and zero crowds",st:"You walk along the river. Art sculptures puncture the landscape. The water reflects. Trees shade. It\'s beautiful. It\'s alone. It\'s yours.",im:"It\'s modern. Someone realized the Danube can be beautiful without tourists. They built it. Now you find it.",t:"You walk along the river. Art sculptures puncture the landscape. The water reflects. Trees shade. It\'s beautiful. It\'s alone. It\'s yours.\",im:\"It\'s modern. Someone realized the Danube can be beautiful without tourists. They built it. Now you find it.\",t:\"District XI (south Buda, easy tram access). Free. Open dawn-dusk. Walking trail 2km+. Very peaceful. Very beautiful.",c:["nature", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:101,n:"Buda Hills Viewpoint — Háros Island Route",a:"Buda Hills",v:["nature", "quiet", "high_spots"],d:101,s:"A hiking trail through the Buda Hills with viewpoints where the city spreads below",st:"You hike through green. The city appears. It disappears. It reappears. The viewpoints accumulate. The experience is immersive. You\'re in nature within the city.",im:"It\'s been wild forever. Now you walk through it. The nature doesn\'t know about the city. It doesn\'t care.",t:"You hike through green. The city appears. It disappears. It reappears. The viewpoints accumulate. The experience is immersive. You\'re in nature within the city.\",im:\"It\'s been wild forever. Now you walk through it. The nature doesn\'t know about the city. It doesn\'t care.\",t:\"Buda Hills (multiple trailheads). Free. All-day hiking possible. Bring water and snacks. Very beautiful. Very peaceful. Local favorite.",c:["nature", "quiet", "high_spots"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:102,n:"Keleti Station Art Deco Hall",a:"District VIII",v:["beautiful", "history"],d:102,s:"A train station that\'s secretly a palace — gilded halls where trains arrive",st:"You enter the station. It\'s not just a station. It\'s architecture. Frescoes. Gilt. Chandeliers. Trains arrive in beauty. It\'s insane. It\'s gorgeous.",im:"It\'s 1884. Trains are new. So they build stations like palaces. Now it\'s normal. Now you see it. Now you understand.",t:"You enter the station. It\'s not just a station. It\'s architecture. Frescoes. Gilt. Chandeliers. Trains arrive in beauty. It\'s insane. It\'s gorgeous.\",im:\"It\'s 1884. Trains are new. So they build stations like palaces. Now it\'s normal. Now you see it. Now you understand.\",t:\"Keleti Station (District VIII). Free to walk around. The main hall is accessible. Go during daylight to see the details. The beauty is in the details.",c:["beautiful", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:103,n:"Budapest Pinball Museum",a:"District VII",v:["weird", "art"],d:103,s:"A working museum of vintage pinball machines — you can play them all",st:"You walk into a room. Dozens of machines. They chime. They light. You play. It\'s the past alive. It\'s play. It\'s art. It\'s joy.",im:"It\'s 1950s-1990s. Machines were entertainment. Now they\'re art. Now you play them. Now you\'re part of history.",t:"You walk into a room. Dozens of machines. They chime. They light. You play. It\'s the past alive. It\'s play. It\'s art. It\'s joy.\",im:\"It\'s 1950s-1990s. Machines were entertainment. Now they\'re art. Now you play them. Now you\'re part of history.\",t:\"District VII (near ruin bars). €10 entry (€1 per machine). Open 2pm-11pm. Bring small coins. It\'s quirky. It\'s fun. It\'s unforgettable.",c:["weird", "art"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:104,n:"Danube Bank Sculpture Trail",a:"Waterfront",v:["art", "beautiful", "quiet"],d:104,s:"A walking path along the Danube with modern sculptures every 100m",st:"You walk by the river. Art appears. A sculpture. Then another. It\'s a gallery walk. The Danube is the curator. The sculptures are the words.",im:"It\'s modern. Artists and the city collaborated. They placed beauty. Now you experience it.",t:"You walk by the river. Art appears. A sculpture. Then another. It\'s a gallery walk. The Danube is the curator. The sculptures are the words.\",im:\"It\'s modern. Artists and the city collaborated. They placed beauty. Now you experience it.\",t:\"Multiple points along the Danube (south of Parliament). Free. Walking trail 3km+. Best at sunset. Very peaceful. Very beautiful.",c:["art", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:105,n:"Jáki Chapel — Summit Meditation",a:"Buda Hills",v:["quiet", "history", "beautiful"],d:105,s:"A small chapel on a hilltop where silence is the only sound",st:"You climb to a chapel. It\'s tiny. It\'s stone. The city is invisible. The world is invisible. Just you and the sky. It\'s meditation made visible.",im:"It\'s been here for 400 years. People climb to pray. Now you climb. Now you understand.",t:"You climb to a chapel. It\'s tiny. It\'s stone. The city is invisible. The world is invisible. Just you and the sky. It\'s meditation made visible.\",im:\"It\'s been here for 400 years. People climb to pray. Now you climb. Now you understand.\",t:\"Buda Hills (north). Moderate hike from city. The chapel is always open. Free. Go at dawn. Go at dusk. The quiet is sacred.",c:["quiet", "history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""}
,
  {id:106,n:"Thermal Baths (Széchenyi) Free Entry Times",a:"City Park",v:["beautiful","free","local"],d:15,s:"Massive Art Nouveau bath complex with free entry windows — soak like a Hungarian spa legend",st:"Széchenyi is the largest bath in Europe. Check for free-entry or pay-what-you-wish evening hours. Locals soak in steaming pools surrounded by faded grandeur; you\'re treated as an equal whether paying or not.",im:"Time-travel: Széchenyi opened in 1913 as a symbol of Budapest\'s Belle Époque.",t:"Check website for free/cheap hours (usually 6-9am or late evening). Swimsuit required.",c:["romantic_water","architecture"],r:"g",nn:"Széchenyi fürdő",ns:"Hatalmas fürdőkomplexum — ingyenes bejutási időkben",nst:"Fürdőzzön, mint egy igazi magyar spa betöltésben.",nt:"Leírás: Ingyenes vagy olcsó bejutás bizonyos időpontokra. Fürdőruha szükséges."},
  {id:107,n:"Flea Market (Ecseri)",a:"Ninth District",v:["local","hidden","art"],d:20,s:"Sprawling outdoor market with everything from Soviet relics to vintage furniture",st:"Ecseri is an overwhelming maze of vendor stalls selling used goods, Communist artifacts, paintings, and oddities. Haggle aggressively; locals come for treasure, not price tags. The energy is chaotic and alive.",im:"Time-travel: Ecseri emerged after 1989 as Hungarians sold off Soviet-era goods.",t:"Free entry. Saturday-Sunday 7am-2pm. Tram 1 or bus. Bring cash.",c:["local_only","abandoned"],r:"g",nn:"Ecseri Piac",ns:"Hatalmas szabadtéri piac szovjet erekciókkal és retró bútorokkal",nst:"Kutasson kincsekért ezen az őrült vásáron.",nt:"Szabad belépés. Szombat-vasárnap 7-14. Készpénz szükséges."},
  {id:108,n:"Margaret Island Swimming — Thermal Pool",a:"Margaret Island",v:["swimming","local","beautiful"],d:5,s:"A thermal pool in the middle of the Danube. Locals call it the best urban swimming in Europe.",st:"Margaret Island is a park in the middle of the Danube. On the north end there's a thermal pool fed by natural springs. The water is warm year-round. Locals swim here in December.\n\nThe pool overlooks the Danube. You can see Pest across the water. It's surreal.",im:"Soaking in warm water in a pool in the middle of a river, the city skyline on both banks, the cold December air, and steam rising around you.",t:"Entry €10. Hours 6am–8pm daily. Take tram 4 or 6 to Margaret Island. The pool area is on the northern part of the island. Go early morning for fewer tourists. Winter swimming (Dec–Mar) is the real thing.",c:["swimming","local","beautiful"],r:"g",nn:"Margit-sziget Termálfürdő — Úszás",ns:"Egy termálfürdő a Duna közepén. A helyiek szerint ez a legjobb városi úszás Európában.",nst:"Margit-sziget egy park a Duna közepén. Az északi végén termálfürdő van, amelyet természetes források táplálnak. A víz egész évben meleg. A helyiek itt úsznak decemberben.\n\nA medence a Dunára néz. Láthatod Pestet a víz másik partján.",nt:"Belépés €10. Nyitva 6h-20h naponta. Vedd a 4-es vagy 6-os villamosvárost Margit-szigetre. A medence területe a sziget északi részén van. Menj korán reggel. Tél úszása a valódi dolog."},
  {id:109,n:"Parliament Building — Midnight Tour",a:"Downtown",v:["greatest_hits","famous","architecture"],d:3,s:"The Hungarian Parliament is a Gothic Revival monster on the Danube. Book the midnight tour on a Saturday. The city is lit up below you.",st:"The Parliament Building is extraordinary — 268 meters long, Gothic Revival, covered in spires. Most tourists take the daytime tour at 11am with crowds. Take the Saturday midnight tour.\n\nYou get the building almost alone. The light show below (the buildings and bridges are lit gold) is something else. You understand why they built this.",im:"Standing on the Parliament rooftop at midnight, the Danube lit gold below, the Chain Bridge glowing, the Pest skyline lit up in all directions, and maybe 20 other people with you.",t:"Midnight tours Saturdays only, book online weeks ahead (€45). Daytime tours are €30 and hourly (good if you can't get midnight). The building is Gothic Revival 1896. The interior detail is insane. Bring a camera. The views from the top are worth it alone.",c:["greatest_hits","famous","architecture"],r:"g",nn:"Parlamentépület — Éjféli Túra",ns:"A magyar Parlamentépület egy gótikus újjáélesztési szörny a Dunán. Foglalj éjféli túrát szombat éjszakán. A város alattad világít fel.",nst:"A Parlamentépület rendkívüli — 268 méter hosszú, gótikus újjáélesztés, tele tornyokkal. A legtöbb turista nappal 11h-kor vesz részt a túrában tömeg közepette. Vedd a szombat éjféli túrát.\n\nA nézet alattad (az épületek és hidak aranyszínű világítással vannak) valami más. Megérted, hogy miért építette ezt.",nt:"Éjféli túrák csak szombat este, foglalj online hetekkel előre (€45). Nappali túrák €30 és óránként (jó ha nem kapsz éjfélit). Az épület gótikus újjáélesztés 1896."},
  {id:110,n:"Gellért Hill — Citadella at Sunset",a:"Buda",v:["high_spots","beautiful","quiet"],d:3,s:"A hilltop fortress with the view of Budapest's best light. Climb at 5pm on a Tuesday. The city transforms at golden hour.",st:"Gellért Hill is a 235-meter hill on the Buda side. The Citadella was built in 1854. Most tourists come at 2pm and take the tourist photo from the railing.\n\nClimb at 5pm on a Tuesday in September. The light is golden. The sun is setting behind Pest. The tourists have left. You have the fortress almost alone.",im:"Standing on the Citadella wall at 6pm with the Danube below turning gold, the Chain Bridge lit by the golden light, the Parliament Building glowing, and the entire Pest skyline on fire.",t:"Gellért Hill is free. The Citadella has a small museum (€5). Climb from the Buda side (start at Kelenhegyi ut street). Takes 30 minutes. Go at sunset (spring/fall is best). Bring a bottle of wine. Stay until dark. This is the one sunset in Budapest that matters.",c:["high_spots","beautiful","quiet"],r:"g",nn:"Gellért-hegy — Citadella Napnyergetéskor",ns:"Egy hegycsúcsi vár a Budapest legjobb fénypályájával. Mászik fel 5h-kor egy kedden. A város arany órán átalakulik.",nst:"Gellért-hegy egy 235 méteres hegy a buda oldalon. A Citadella 1854-ben készült. A legtöbb turista 14h-kor jön és fényképet készít a korlát mellől.\n\nMászik fel 17h-kor egy kedden szeptemberben. A fény arany. A nap nyugaton nyugszik Pest mögött. A turisták elmentek. Az erődöt szinte egyedül van.",nt:"Gellért-hegy ingyenes. A Citadelának egy kis múzeuma van (€5). Mászik fel a Buda oldalról (kezdj Kelenhegyi ut utcánál)."},
  {id:111,n:"Széchenyi Thermal Bath — Winter Soaking",a:"City Park",v:["greatest_hits","famous","swimming"],d:6,s:"A massive thermal bath with outdoor pools in City Park. Locals in bathing suits play chess. Go in December when it's surreal.",st:"The Széchenyi Thermal Bath was built in 1913. There are 18 pools, indoor and outdoor. The outdoor pools are fed by natural hot springs. In December, the water is 38°C, the air is 5°C, and steam rises so thick you can't see the end of the pool.\n\nLocals in bathing suits sit in circles playing chess. It's bizarre and perfect.",im:"Soaking in hot water in a pool in City Park in December, snow falling around you, the steam so thick you can't see the edge of the pool, a Hungarian man next to you reading a newspaper completely submerged except his head.",t:"Entry €25. Hours 6am–10pm daily. The outdoor pools are open year-round. Go in winter (Nov–Mar) for the surreal experience. Come at 7am on a weekday when it's mostly locals. The chess players gather around 10am. Bring a bathing suit. The water is hot. The air is cold.",c:["greatest_hits","famous","swimming"],r:"g",nn:"Széchenyi Termálfürdő — Téli Fürdőzés",ns:"Egy masszív termálfürdő úszómedencékkel a Városligetben. Helyiek fürdőruhában játszanak sakkot. Menj decemberben amikor szürreal.",nst:"A Széchenyi Termálfürdő 1913-ban készült. 18 medence van, beltéri és kültéri. A kültéri medencéket természetes forró források táplálják. Decemberben a víz 38°C, a levegő 5°C, és a gőz olyan sűrű, hogy nem látod a medence végét.\n\nHelyiek fürdőruhában körben ülnek és sakkoznak.",nt:"Belépés €25. Nyitva 6h-22h naponta. A kültéri medencék egész évben nyitva. Menj télben (nov–már) a szürreális élményért."},
  {id:112,n:"Ruin Bar Crawl — Szimpla Kert Midnight",a:"District VII",v:["local","night","weird"],d:4,s:"Budapest's ruin bars started as squatted buildings. Szimpla Kert is the original. Go at midnight on Friday. The entire building is human.",st:"A ruin bar is a bar built into an abandoned building. Szimpla Kert (meaning Simple Garden) was the first. It's a maze of rooms, each decorated differently, filled with found objects, art, and people.\n\nAt midnight on Friday, the place is packed with locals and travelers. The music is loud. People are dancing in rooms with no light except candles and phone flashlights.",im:"Standing in a dark room in an abandoned building with 100 other people dancing to a DJ, the walls covered in art and scribbles, someone next to you on a 1970s couch, the music shaking the floor.",t:"Entry €5. Hours 2pm–4am daily. Szimpla Kert is on Kazinczy utca in District VII. Go late (midnight or after). The place gets more interesting after 2am. There are dozens of ruin bars in the neighborhood. Get a local map at your hostel. Each bar has a different vibe.",c:["local","night","weird"],r:"g",nn:"Romkocsmák — Szimpla Kert Éjfél",ns:"Budapest romkocsmai a szavatott épületekből kezdtek. Szimpla Kert az eredeti. Menj éjfél körül pénteken. Az egész épület emberi.",nst:"A romkocsma olyan kocsma, amely egy elhagyott épületbe készült. A Szimpla Kert (amely Egyszerű kertet jelent) az első volt. Ez egy teremek labirintusa, mindegyik másképpen díszített, teleásva talált tárgyakkal, művészettel és emberekkel.\n\nPénteken éjfél körül a hely tele van helyiekkel és utazókkal. A zene hangos. Az emberek sötét szobákban táncolnak.",nt:"Belépés €5. Nyitva 14h-4h naponta. A Szimpla Kert a Kazinczy utcán van a VII. kerületben. Menj később (éjfél után). A hely érdekesebb 2h után. Több tucat romkocsma van a szomszédságban."}];
