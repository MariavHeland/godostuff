<script>
const P = [
  {id:1,n:"Thermal bath culture (Széchenyi Steam Bath)",a:"Városliget",v:["beautiful", "free"],d:1,s:"Yellow palace where locals soak year-round in steaming pools",st:"The water is 77 degrees Celsius. Locals play chess on floating boards. The baroque architecture frames the steam. It\'s a ritual unchanged since the 1900s. You float. You are reborn.",im:"It\'s 1913. The bath opens. Workers come first. Rich people come second. The water makes everyone equal. It still does.",t:"The water is 77 degrees Celsius. Locals play chess on floating boards. The baroque architecture frames the steam. It\'s a ritual unchanged since the 1900s. You float. You are reborn.\",im:\"It\'s 1913. The bath opens. Workers come first. Rich people come second. The water makes everyone equal. It still does.\",t:\"Állatkerti körút 9-11. €25 entry. Open 6am-10pm. Go at 8am to avoid crowds. Bring a towel. Wear flip-flops. The ritual matters more than comfort.",c:["beautiful", "free"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:2,n:"Gellért Hill cave chapel (Fellegvár)",a:"Gellért Hill",v:["history", "quiet"],d:2,s:"A limestone cave where monks hid from Ottoman occupation",st:"The chapel is carved into rock. Candles burn. The stone still holds cold from 500 years ago. It\'s a refuge that never stopped being sacred. Prayer echoes differently in stone.",im:"It\'s 1550. A monk hides in the cave. Above, Turks occupy the city. Below, he prays in silence. The cave is his world. It\'s enough.",t:"The chapel is carved into rock. Candles burn. The stone still holds cold from 500 years ago. It\'s a refuge that never stopped being sacred. Prayer echoes differently in stone.\",im:\"It\'s 1550. A monk hides in the cave. Above, Turks occupy the city. Below, he prays in silence. The cave is his world. It\'s enough.\",t:\"Citadella utca 1. €3 entry. Open 9am-5pm. Climb from Buda side or take bus 27. Wear sturdy shoes. The cave is damp and cool even in summer.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:3,n:"Ruin bar culture (Szimpla Kert underground)",a:"District VII",v:["weird", "night", "local"],d:3,s:"An abandoned tenement transformed into a bar across multiple rooms",st:"Every room is different. Vintage furniture. Strange art. A bathtub in the corner. The Danube is nearby but you feel underground. The crowd is mixed—locals, travelers, artists. It\'s democracy made nightlife.",im:"It\'s 2002. An empty building waits. Artists move in at night. By morning, it\'s a bar. By evening, it\'s legendary. Nobody planned it. It just happened.",t:"Every room is different. Vintage furniture. Strange art. A bathtub in the corner. The Danube is nearby but you feel underground. The crowd is mixed—locals, travelers, artists. It\'s democracy made nightlife.\",im:\"It\'s 2002. An empty building waits. Artists move in at night. By morning, it\'s a bar. By evening, it\'s legendary. Nobody planned it. It just happened.\",t:\"Kazinczy utca 14. Open 12pm-4am. No cover (donations appreciated). Go after 11pm. The earlier hours are tourist-heavy. Come for the space, not the drinks. Get lost in the rooms.",c:["weird", "night", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:4,n:"Danube banks at night (Margaret Bridge to Elizabeth Bridge)",a:"Danube Embankment",v:["beautiful", "night", "romantic_water"],d:4,s:"The riverfront glows with city lights reflecting on the water",st:"Parliament lights up. The Castle glows amber. Couples walk slowly. Street musicians play. The Danube carries reflections like a moving mirror. The river is the most beautiful thing in the city.",im:"It\'s 1900. A man walks with his love. The bridges are lit. The future seems possible. The river moves. The moment is eternal. Or feels like it.",t:"Parliament lights up. The Castle glows amber. Couples walk slowly. Street musicians play. The Danube carries reflections like a moving mirror. The river is the most beautiful thing in the city.\",im:\"It\'s 1900. A man walks with his love. The bridges are lit. The future seems possible. The river moves. The moment is eternal. Or feels like it.\",t:\"Széna tér to Elizabeth Bridge, both sides. Walk slowly. Stop on bridges. Bring wine if hungry. The walk takes 2 hours. Schedule from 8pm-10pm. The city is yours.",c:["beautiful", "night", "romantic_water"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:5,n:"Market Hall (Vásárcsarnok) ground level",a:"District IX",v:["local", "free"],d:5,s:"Three-story market where vendors still haggle and sell real food",st:"Ground level: vegetables, fish, meat. The vendors know their customers by name. The language is Hungarian and negotiation. Upstairs is tourism. Downstairs is living.",im:"It\'s 1896. The market opens. Horses bring goods. By 1950, trucks come. By 2024, it\'s the same dance. Vegetables, money, thanks. Repeat daily.",t:"Ground level: vegetables, fish, meat. The vendors know their customers by name. The language is Hungarian and negotiation. Upstairs is tourism. Downstairs is living.\",im:\"It\'s 1896. The market opens. Horses bring goods. By 1950, trucks come. By 2024, it\'s the same dance. Vegetables, money, thanks. Repeat daily.\",t:\"Vámház körút 1-3. Open 6am-5pm weekdays, 6am-3pm weekends. Go early (7am). Bring cash. Ask prices before buying—bargaining is expected. The experience is free.",c:["local_only", "free"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:6,n:"Óbuda\'s Roman amphitheater ruins",a:"Óbuda",v:["history", "quiet"],d:6,s:"A 2,000-year-old Roman fortress city\'s stone still stands",st:"The amphitheater was carved into earth. Rain fills it now. Ivy grows. You stand where Romans watched gladiators. The stone remembers. The ground holds bones.",im:"It\'s 150 AD. A gladiator dies here. Twenty thousand watch. In 2024, nobody watches. The stone still marks the spot. The circle remains.",t:"The amphitheater was carved into earth. Rain fills it now. Ivy grows. You stand where Romans watched gladiators. The stone remembers. The ground holds bones.\",im:\"It\'s 150 AD. A gladiator dies here. Twenty thousand watch. In 2024, nobody watches. The stone still marks the spot. The circle remains.\",t:\"Fő tér, Óbuda. Free to view. Open always. It\'s partially surrounded by buildings now. Walk around the perimeter. The scale is still visible. Bring imagination.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:7,n:"Kiscell Monastery hidden courtyard",a:"Óbuda",v:["quiet", "beautiful", "history"],d:7,s:"A 17th-century cloister courtyard where time stopped",st:"The monastery survived multiple wars. The courtyard is enclosed. Silence is thick. The arches frame nothing but peace. A few monks still live here. The world outside doesn\'t matter inside.",im:"It\'s 1650. A monk walks the courtyard daily. Same path. Same time. In 2024, another monk walks. The path is still worn. The routine is eternal.",t:"The monastery survived multiple wars. The courtyard is enclosed. Silence is thick. The arches frame nothing but peace. A few monks still live here. The world outside doesn\'t matter inside.\",im:\"It\'s 1650. A monk walks the courtyard daily. Same path. Same time. In 2024, another monk walks. The path is still worn. The routine is eternal.\",t:\"Kiscelli utca 108. €5 entry to museum. The courtyard is free from street side. Open 10am-6pm. The baroque architecture is preserved intact. Spend time here.",c:["quiet", "beautiful", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:8,n:"Soviet-era apartment block pilgrimage",a:"Angyalföld",v:["history", "weird"],d:8,s:"Massive prefab housing built by the Communist state still holds families",st:"Panel buildings everywhere. Soviet ideology made concrete. Inside, families have painted walls with love and hope. The buildings are grey. The lives inside are colorful. The contradiction is the point.",im:"It\'s 1972. Workers move into new apartments. They\'re grateful and resentful. The space is space. The freedom is limited. They live anyway.",t:"Panel buildings everywhere. Soviet ideology made concrete. Inside, families have painted walls with love and hope. The buildings are grey. The lives inside are colorful. The contradiction is the point.\",im:\"It\'s 1972. Workers move into new apartments. They\'re grateful and resentful. The space is space. The freedom is limited. They live anyway.\",t:\"Csillaghegyi út area. Free to walk around. Take tram 4/6 to the area. The buildings are monuments to a specific idea. Photography is straightforward—the architecture doesn\'t hide.",c:["history_big", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:9,n:"Margaret Island hidden gardens",a:"Margaret Island",v:["beautiful", "quiet", "nature"],d:9,s:"A car-free island in the Danube with Japanese and rose gardens",st:"The island has no crowds despite being central. Gardens bloom. The water is on all sides. The air smells like flowers. It\'s escape without leaving the city. Locals know but don\'t tell tourists.",im:"It\'s 1869. The island is developed as an escape. By 2024, it still works. The water isolation is the magic. The island is separate.",t:"The island has no crowds despite being central. Gardens bloom. The water is on all sides. The air smells like flowers. It\'s escape without leaving the city. Locals know but don\'t tell tourists.\",im:\"It\'s 1869. The island is developed as an escape. By 2024, it still works. The water isolation is the magic. The island is separate.\",t:\"Margaretinsel. Free entry. Open 24 hours. Walk the entire perimeter (5km). The rose garden is peak June-September. Bring a picnic. Stay until sunset.",c:["beautiful", "quiet", "nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:10,n:"House of Terror museum (Communist secret police)",a:"District VI",v:["scary", "history"],d:10,s:"A building where political prisoners were tortured and executed",st:"The cells are small. The walls are padded with blood-stained fabric. It\'s visceral history. The museum doesn\'t look away. The weight of it is crushing. You\'ll be changed after.",im:"It\'s 1956. A political prisoner is brought in. The torture begins. In 2024, visitors stand where they stood. The suffering echoes. It doesn\'t fade.",t:"The cells are small. The walls are padded with blood-stained fabric. It\'s visceral history. The museum doesn\'t look away. The weight of it is crushing. You\'ll be changed after.\",im:\"It\'s 1956. A political prisoner is brought in. The torture begins. In 2024, visitors stand where they stood. The suffering echoes. It doesn\'t fade.\",t:\"Andrássy út 60. €12 entry. Open 10am-6pm (Tuesdays open 12pm). Go slowly—budget 2+ hours. The experience is heavy. Bring tissues. It matters.",c:["scary", "history_big"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:11,n:"Castle District narrow streets at dawn",a:"Buda Castle Area",v:["beautiful", "quiet", "history"],d:11,s:"Medieval alleys where the city began, empty before 8am",st:"The streets are narrow. The buildings lean. Cats sleep on steps. At dawn, it\'s medieval in reality. By 9am, tourists fill it. Come early. The authentic city only exists in silence.",im:"It\'s 1500. A merchant walks these streets. The layout is identical in 2024. The stones are worn the same. The rhythm is the same.",t:"The streets are narrow. The buildings lean. Cats sleep on steps. At dawn, it\'s medieval in reality. By 9am, tourists fill it. Come early. The authentic city only exists in silence.\",im:\"It\'s 1500. A merchant walks these streets. The layout is identical in 2024. The stones are worn the same. The rhythm is the same.\",t:\"Enter from Várkert Bazár or the Castle funicular. Walk at 6:30am before anyone arrives. No shops are open. Just the stones and you. It\'s free. It\'s sacred.",c:["beautiful", "quiet", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:12,n:"Fishermen\'s Bastion\'s hidden back stairs",a:"Buda Castle",v:["hidden", "beautiful"],d:12,s:"Spiral stairs ascending to a viewpoint few tourists find",st:"The main entrance is crowded. The back stairs are empty. You climb. The view expands. The city reveals itself layer by layer. By the top, you\'ve earned the vista.",im:"It\'s 1902. The bastion is built. By 1950, tourists climb. By 2024, they clog the main stairs. But the back stairs remain secret. Effort still pays off.",t:"The main entrance is crowded. The back stairs are empty. You climb. The view expands. The city reveals itself layer by layer. By the top, you\'ve earned the vista.\",im:\"It\'s 1902. The bastion is built. By 1950, tourists climb. By 2024, they clog the main stairs. But the back stairs remain secret. Effort still pays off.\",t:\"Fishermen\'s Bastion back entrance. €6 entry if you go through main gate. The back stairs are free but you have to find them. Ask a local. Climb at dawn. The view is yours alone.",c:["hidden", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:13,n:"Jewish Synagogue (Dohány Street)\'s secret burial room",a:"District VII",v:["history", "sad"],d:13,s:"A room beneath the synagogue where victims of the 1944 massacre were buried",st:"The synagogue is ornate. The room below is tragic. Bodies were buried in haste during German occupation. The memorial is quiet. The sadness is tangible. You stand where grief crystallized.",im:"It\'s 1944. Bodies are brought down. There\'s no time for ritual. They\'re laid to rest quickly. In 2024, the room is a memorial. The quiet is respect.",t:"The synagogue is ornate. The room below is tragic. Bodies were buried in haste during German occupation. The memorial is quiet. The sadness is tangible. You stand where grief crystallized.\",im:\"It\'s 1944. Bodies are brought down. There\'s no time for ritual. They\'re laid to rest quickly. In 2024, the room is a memorial. The quiet is respect.\",t:\"Dohány utca 2-8. €6 entry. Open 10am-3:30pm. The burial room is accessed via steps at the rear. Photography is prohibited. Bring silence.",c:["history_big", "sad"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:14,n:"Ferencváros working-class market",a:"Ferencváros",v:["local", "weird"],d:14,s:"A square where immigrant vendors sell goods traditional to their countries",st:"The market is Budapest\'s most diverse. Chinese, Vietnamese, Hungarian, Romani. No tourist infrastructure. Real food for real people. It\'s alive, chaotic, unfiltered.",im:"It\'s 2000. An immigrant opens a stall. By 2024, the market is majority immigrant. The city is changing. The market shows it first. The change is not without friction.",t:"The market is Budapest\'s most diverse. Chinese, Vietnamese, Hungarian, Romani. No tourist infrastructure. Real food for real people. It\'s alive, chaotic, unfiltered.\",im:\"It\'s 2000. An immigrant opens a stall. By 2024, the market is majority immigrant. The city is changing. The market shows it first. The change is not without friction.\",t:\"Ferencvárosi piac, Ferencváros. Open 6am-2pm daily. Go early. Don\'t expect English. Bring cash. Photography might make people uncomfortable. Respect that. Buy something. Eat it nearby.",c:["local_only", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:15,n:"Aquincum Roman civilian settlement",a:"Óbuda",v:["history", "quiet"],d:15,s:"Excavated Roman homes and civic buildings from the 2nd century",st:"The museum is small. But the actual ruins are outside. Mosaics remain. A Roman kitchen. Streets where people walked 1,900 years ago. The scale is human. The time is impossible.",im:"It\'s 180 AD. A Roman governor walks this street. His concerns are local. By 2024, his stones remain. His concerns are dust. The stones outlasted empires.",t:"The museum is small. But the actual ruins are outside. Mosaics remain. A Roman kitchen. Streets where people walked 1,900 years ago. The scale is human. The time is impossible.\",im:\"It\'s 180 AD. A Roman governor walks this street. His concerns are local. By 2024, his stones remain. His concerns are dust. The stones outlasted empires.\",t:\"Szentendrei út 139. €5 entry. Open 10am-5pm (closed Mondays). The ruins are in a small park. Calm and contemplative. Take 90 minutes minimum.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:16,n:"Varad Square underpass murals",a:"Angyalföld",v:["street_art", "local"],d:16,s:"An underpass become a legal graffiti gallery",st:"Artists have permission. The walls are constantly painted. Last week\'s masterpiece is whitewashed. This week\'s is half-done. It\'s impermanence as art. The cycle teaches.",im:"It\'s 2015. Artists ask permission. They paint. By morning, it\'s a gallery. By next week, it\'s changed. The impermanence is the point.",t:"Artists have permission. The walls are constantly painted. Last week\'s masterpiece is whitewashed. This week\'s is half-done. It\'s impermanence as art. The cycle teaches.\",im:\"It\'s 2015. Artists ask permission. They paint. By morning, it\'s a gallery. By next week, it\'s changed. The impermanence is the point.\",t:\"Varad tér underpass. Open always. Free. Best visited during day. Walk slow. Each wall takes time. This is community art made visible.",c:["street_art", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:17,n:"Batthyány Market Hall (Nádor tér side)",a:"District II",v:["local", "free"],d:17,s:"A 19th-century market where locals still buy fish",st:"The main hall is touristy. The back side is real. Vendors know prices by heart. They argue. They laugh. The energy is authentic. It\'s a financial transaction and a social ritual.",im:"It\'s 1897. The market opens. By 1950, the same vendors\' children work. By 2024, the same spirit remains. Market-days are church days.",t:"The main hall is touristy. The back side is real. Vendors know prices by heart. They argue. They laugh. The energy is authentic. It\'s a financial transaction and a social ritual.\",im:\"It\'s 1897. The market opens. By 1950, the same vendors\' children work. By 2024, the same spirit remains. Market-days are church days.\",t:\"Batthyány tér. Open 6am-2pm. Go early. Bring cash. Ask for recommendations. The vendors speak some English and enjoy explaining Hungarian fish. The experience is free.",c:["local_only", "free"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:18,n:"Citadel\'s underground tunnels",a:"Gellért Hill",v:["scary", "history"],d:18,s:"The fortress\'s internal passages where soldiers stored supplies and weapons",st:"The tunnels run through the hill. Some are sealed. Some are open. You walk inside a military monument. The walls are thick. The paranoia is architecture. The fortress was built not to be conquered.",im:"It\'s 1854. The fortress is completed. It\'s a statement of force. Occupiers should fear. In 2024, tourists climb. The fear has become tourism.",t:"The tunnels run through the hill. Some are sealed. Some are open. You walk inside a military monument. The walls are thick. The paranoia is architecture. The fortress was built not to be conquered.\",im:\"It\'s 1854. The fortress is completed. It\'s a statement of force. Occupiers should fear. In 2024, tourists climb. The fear has become tourism.\",t:\"Citadella utca 1. €8 entry for tunnel tours. Tours depart hourly. The experience is 90 minutes. Wear good shoes. The tunnels are uneven.",c:["scary", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:19,n:"District VII apartment building courtyards",a:"District VII",v:["hidden", "local"],d:19,s:"Hidden courtyards where urban gardeners grow vegetables",st:"Behind apartment doors, courtyards exist. Residents grow tomatoes, herbs, flowers. It\'s private agriculture in the city. The courtyards are hidden but alive. They\'re secret only to outsiders.",im:"It\'s 1995. An apartment dweller plants seeds. The courtyard becomes garden. By 2024, the tradition is passed to children. The courtyard is legacy.",t:"Behind apartment doors, courtyards exist. Residents grow tomatoes, herbs, flowers. It\'s private agriculture in the city. The courtyards are hidden but alive. They\'re secret only to outsiders.\",im:\"It\'s 1995. An apartment dweller plants seeds. The courtyard becomes garden. By 2024, the tradition is passed to children. The courtyard is legacy.\",t:\"Kazinczy utca or Dob utca area. These streets have multiple courtyard buildings. The courtyards are technically private but visible from street gates. Look and respect privacy.",c:["hidden", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:20,n:"Gellért Hotel thermal bath at sunset",a:"Gellért Hill",v:["beautiful", "romantic_water"],d:20,s:"A 1918 hotel\'s glass-enclosed thermal pools overlooking the Danube",st:"The water is warm. The view is golden. You float while watching the city light up. It\'s luxury and function combined. The thermal culture is not just utility—it\'s ritual.",im:"It\'s 1918. The hotel opens. Rich people soak while looking at their city. By 2024, anyone with €30 can float here. The city looks the same.",t:"The water is warm. The view is golden. You float while watching the city light up. It\'s luxury and function combined. The thermal culture is not just utility—it\'s ritual.\",im:\"It\'s 1918. The hotel opens. Rich people soak while looking at their city. By 2024, anyone with €30 can float here. The city looks the same.\",t:\"Kelenhegyi út 4. €30 entry (day pass). Open 6am-10pm. Go at 5pm. The sunset reflection on water is the best light of the day. Reserve in advance on weekends.",c:["beautiful", "romantic_water"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:21,n:"Erzsébet Bridge pedestrian path at night",a:"Danube Embankment",v:["beautiful", "night"],d:21,s:"Walking the bridge at 2am when the city is yours alone",st:"The bridge lights up. The Danube flows below. No cars (pedestrians only at night). The city\'s lights reflect. You\'re suspended between worlds. The quiet is profound.",im:"It\'s 1964. The bridge opens. By 1989, Hungarians cross from oppression to hope. By 2024, nobody remembers. The bridge is just beautiful.",t:"The bridge lights up. The Danube flows below. No cars (pedestrians only at night). The city\'s lights reflect. You\'re suspended between worlds. The quiet is profound.\",im:\"It\'s 1964. The bridge opens. By 1989, Hungarians cross from oppression to hope. By 2024, nobody remembers. The bridge is just beautiful.\",t:\"Erzsébet híd, pedestrian path. Free. Open 24 hours. Go after midnight. Bring a friend. The walk takes 15 minutes. The experience rewires your neurons.",c:["beautiful", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:22,n:"Stray dogs of Budapest (ethical observation)",a:"Multi-neighborhood",v:["weird", "sad"],d:22,s:"The city\'s dog population has become semi-feral yet remarkably gentle",st:"Hundreds of dogs live between buildings. They\'re not vicious. They\'re organized. Packs roam at night. They cross streets carefully. It\'s a parallel society. They understand the city better than humans.",im:"It\'s 1990. Dogs multiply. The state doesn\'t control them. They adapt. By 2024, there\'s a treaty between species. Dogs own night. Humans own day.",t:"Hundreds of dogs live between buildings. They\'re not vicious. They\'re organized. Packs roam at night. They cross streets carefully. It\'s a parallel society. They understand the city better than humans.\",im:\"It\'s 1990. Dogs multiply. The state doesn\'t control them. They adapt. By 2024, there\'s a treaty between species. Dogs own night. Humans own day.\",t:\"Observe ethically from distance. Don\'t pet strays. They\'re healthier than they appear. The phenomenon is real and documented. Walk at dusk to see them. Bring humility.",c:["weird", "sad"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:23,n:"Museum of Applied Arts interior courtyard",a:"District IX",v:["beautiful", "history"],d:23,s:"A Moorish-inspired courtyard inside a decorative arts museum",st:"The courtyard is a garden enclosed by arches. Tile work covers the walls. It\'s an oasis designed as art. The museum is about making beautiful things. The courtyard proves the point.",im:"It\'s 1896. Architects build a museum about beauty. The courtyard is the thesis. Beauty breeds beauty. The cycle continues.",t:"The courtyard is a garden enclosed by arches. Tile work covers the walls. It\'s an oasis designed as art. The museum is about making beautiful things. The courtyard proves the point.\",im:\"It\'s 1896. Architects build a museum about beauty. The courtyard is the thesis. Beauty breeds beauty. The cycle continues.\",t:\"Üllői út 33-37. €8 entry. Open 10am-6pm. The courtyard is the best part. Spend 30 minutes here. Sit on the benches. Let the architecture speak.",c:["beautiful", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:24,n:"Új Public Cemetery (memorial wall)",a:"District VIII",v:["sad", "quiet"],d:24,s:"A memorial wall for those killed in the 1956 revolution",st:"The wall lists names. Hundreds died. The stones don\'t judge. The sadness is permanent. This cemetery was built for the revolutionary dead. It\'s where martyrs rest.",im:"It\'s 1956. Young people die for freedom. Their families can\'t grieve publicly. By 1990, the wall is built. Finally, the dead are acknowledged.",t:"The wall lists names. Hundreds died. The stones don\'t judge. The sadness is permanent. This cemetery was built for the revolutionary dead. It\'s where martyrs rest.\",im:\"It\'s 1956. Young people die for freedom. Their families can\'t grieve publicly. By 1990, the wall is built. Finally, the dead are acknowledged.\",t:\"Kerepesi Cemetery has this wall. €3 entry to cemetery. Open 7:30am-6pm. The wall is found inside—ask at entrance. Bring flowers if moved. Respect the names.",c:["sad", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:25,n:"Central European University library",a:"District V",v:["hidden", "beautiful"],d:25,s:"A library that survived censorship and became a monument to knowledge",st:"The library holds rare books. It was censored by the regime. Now it\'s free. The books breathe relief. Scholars work quietly. Knowledge is freedom made tangible.",im:"It\'s 1990. Censors leave. Books are unsealed. The library explodes into openness. The pages have been waiting to be read.",t:"The library holds rare books. It was censored by the regime. Now it\'s free. The books breathe relief. Scholars work quietly. Knowledge is freedom made tangible.\",im:\"It\'s 1990. Censors leave. Books are unsealed. The library explodes into openness. The pages have been waiting to be read.\",t:\"Nádor utca 9. €5 entry for visitors. Open 9am-6pm weekdays. Tours available with reservation. The collection is extraordinary. The history is heroic.",c:["hidden", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:26,n:"Thermal caves of Molnár János",a:"Buda",v:["nature", "quiet"],d:26,s:"Underground cave passages with thermal springs flowing through limestone",st:"You float in darkness inside the earth. The water is warm. The cave breathes. It\'s like being inside the planet. The sensory deprivation is meditation made geology.",im:"It\'s 2000 years ago. The Romans discover the heat rising from earth. They bathe. By 2024, the same heat flows. The earth\'s memory is constant.",t:"You float in darkness inside the earth. The water is warm. The cave breathes. It\'s like being inside the planet. The sensory deprivation is meditation made geology.\",im:\"It\'s 2000 years ago. The Romans discover the heat rising from earth. They bathe. By 2024, the same heat flows. The earth\'s memory is constant.\",t:\"Szépvölgyi út 162. Tours €15 (90 minutes). Reservations required. You wear a swimsuit and float in the dark. Bring towel. The experience is genuinely profound.",c:["nature", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:27,n:"Parliament Building\'s ornamental details",a:"District V",v:["beautiful", "history"],d:27,s:"A Gothic-inspired structure with 10,000 carved stone figures",st:"Every surface is detailed. Statues crowd every corner. Towers pierce the sky. It\'s maximalist architecture made political statement. Hungary\'s power is expressed in stone.",im:"It\'s 1896. Architects compete to make something unprecedented. Every detail matters. The building is finished. It stands as permanent ambition.",t:"Every surface is detailed. Statues crowd every corner. Towers pierce the sky. It\'s maximalist architecture made political statement. Hungary\'s power is expressed in stone.\",im:\"It\'s 1896. Architects compete to make something unprecedented. Every detail matters. The building is finished. It stands as permanent ambition.\",t:\"Kossuth Lajos tér 1-3. €30 entry for tours. Tours in English depart hourly 10am-4pm. Go early. The light is best morning. Photography is limited inside but exterior is free.",c:["beautiful", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:28,n:"Retro Espresso bar (1970s time capsule)",a:"District VII",v:["weird", "history", "local"],d:28,s:"A café that hasn\'t updated its interior since 1972",st:"Plastic seats. Fluorescent lights. Original menu board. Old Hungarians sit for hours. The coffee is strong. The time warp is intentional. It\'s a monument to a specific era.",im:"It\'s 1972. A café opens. By 2024, it\'s still there. Everything is original. The owners could modernize. They choose not to. The choice is the art.",t:"Plastic seats. Fluorescent lights. Original menu board. Old Hungarians sit for hours. The coffee is strong. The time warp is intentional. It\'s a monument to a specific era.\",im:\"It\'s 1972. A café opens. By 2024, it\'s still there. Everything is original. The owners could modernize. They choose not to. The choice is the art.\",t:\"Semmelweis utca 6. Open 8am-8pm daily. Coffee €1.50. The seating is limited. Sit at the counter. Talk to the owner. They have stories from the regime.",c:["weird", "history_big", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:29,n:"Újlipótváros bohemian cafés",a:"Újlipótváros",v:["local", "beautiful"],d:29,s:"A neighborhood of writers, painters, and thinkers still gathering in old cafés",st:"The cafés are worn. The coffee is cheap. The conversation is intellectual. Artists come here to think. The neighborhood\'s soul is coffee and ideas. It\'s unchanged since the 1950s.",im:"It\'s 1955. An artist sits here. No money, but endless coffee. The café becomes home. By 2024, new artists replace old ones. The tradition continues.",t:"The cafés are worn. The coffee is cheap. The conversation is intellectual. Artists come here to think. The neighborhood\'s soul is coffee and ideas. It\'s unchanged since the 1950s.\",im:\"It\'s 1955. An artist sits here. No money, but endless coffee. The café becomes home. By 2024, new artists replace old ones. The tradition continues.\",t:\"Pozsonyi út area. Try Café Marta or Café Gusto. No menus. Coffee and pastry. The experience is about sitting, not rushing. Budget 2 hours minimum.",c:["local_only", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:30,n:"Holocaust memorial shoes on Danube bank",a:"Pest Embankment",v:["sad", "history"],d:30,s:"Metal shoes marking where Jews were shot into the Danube",st:"There are 60 pairs of shoes. Each represents a person. The shoes point downward. It\'s simple and devastating. The river carries history. The shoes hold memory.",im:"It\'s 1944. People are brought to the bank. They\'re shot. They fall into the river. Decades later, shoes mark the spot. The river doesn\'t speak. The shoes do.",t:"There are 60 pairs of shoes. Each represents a person. The shoes point downward. It\'s simple and devastating. The river carries history. The shoes hold memory.\",im:\"It\'s 1944. People are brought to the bank. They\'re shot. They fall into the river. Decades later, shoes mark the spot. The river doesn\'t speak. The shoes do.\",t:\"Danube bank, near Szabadság tér. Free. Open always. Stand in front of the shoes. Read the names if you can. Bring flowers. The memorial asks for presence.",c:["sad", "history_big"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:31,n:"Millennium Park\'s lesser-known sculptures",a:"Városliget",v:["beautiful", "quiet"],d:31,s:"Garden sculptures by contemporary artists, mostly unvisited",st:"Heroes Square has tourists. Millennium Park has silence. The sculptures are thought-provoking. The park is manicured. It\'s an escape within the city center. Few find it.",im:"It\'s 2000. Artists are commissioned. By 2024, their work blooms. The tourists miss it. The locals own it.",t:"Heroes Square has tourists. Millennium Park has silence. The sculptures are thought-provoking. The park is manicured. It\'s an escape within the city center. Few find it.\",im:\"It\'s 2000. Artists are commissioned. By 2024, their work blooms. The tourists miss it. The locals own it.\",t:\"Varosliget Park area (away from main square). Free. Open always. Walk slowly. Bring curiosity. The artworks encourage contemplation. Sit on benches. Watch children play.",c:["beautiful", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:32,n:"Ádám Páldy\'s secret art garden",a:"District III",v:["hidden", "weird"],d:32,s:"A private garden where an artist has created sculptures over 30 years",st:"It\'s not on the tourist map. It\'s behind an unmarked gate. Inside, sculptures emerge from overgrown plants. It\'s chaos organized by obsession. The artist still works here.",im:"It\'s 1990. An artist buys land. They start making sculptures. Decades later, it\'s an entire world. Few know. Those who find it tell others. The word spreads quietly.",t:"It\'s not on the tourist map. It\'s behind an unmarked gate. Inside, sculptures emerge from overgrown plants. It\'s chaos organized by obsession. The artist still works here.\",im:\"It\'s 1990. An artist buys land. They start making sculptures. Decades later, it\'s an entire world. Few know. Those who find it tell others. The word spreads quietly.\",t:\"Call ahead for access (through Budapest tourism). Tours are by appointment only. €5-10 donation. The garden is genuinely hidden. The artist is genuinely excited to show it.",c:["hidden", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:33,n:"Roman sewage system (Aqua Claudia remains)",a:"Óbuda",v:["weird", "history"],d:33,s:"Ancient Roman plumbing that still functions partially",st:"The engineering is genius. Water flows downward via gravity. Toilets worked 2,000 years ago. The system was abandoned, then forgotten, then rediscovered. Human engineering is constant.",im:"It\'s 170 AD. A Roman engineer designs pipes. The water flows. By 2024, some of the original pipes still carry water. Engineering outlasts empires.",t:"The engineering is genius. Water flows downward via gravity. Toilets worked 2,000 years ago. The system was abandoned, then forgotten, then rediscovered. Human engineering is constant.\",im:\"It\'s 170 AD. A Roman engineer designs pipes. The water flows. By 2024, some of the original pipes still carry water. Engineering outlasts empires.\",t:\"Óbuda Museum has artifacts. The actual aqueduct traces are scattered. Ask locals about \"Aqua Claudia.\" Some sections are visible underground. It\'s a historical scavenger hunt.",c:["weird", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:34,n:"Zsigmond Móricz square bohemian culture",a:"District XI",v:["local", "weird"],d:34,s:"A square where counterculture thrives and nobody cares",st:"Street musicians. Artist collectives. Cheap bars. The square is owned by youth culture. It\'s alive in a way tourist areas can\'t be. The vibe is authentic because profit isn\'t the point.",im:"It\'s 1990. Young people claim the square. It becomes theirs. By 2024, it\'s still theirs. The rhythm hasn\'t changed. The purpose hasn\'t shifted.",t:"Street musicians. Artist collectives. Cheap bars. The square is owned by youth culture. It\'s alive in a way tourist areas can\'t be. The vibe is authentic because profit isn\'t the point.\",im:\"It\'s 1990. Young people claim the square. It becomes theirs. By 2024, it\'s still theirs. The rhythm hasn\'t changed. The purpose hasn\'t shifted.\",t:\"Móricz Zsigmond körtér. Open always. Best visited at night (8pm-midnight). Stand in the center. Feel the energy. It\'s raw and good. Money isn\'t required.",c:["local_only", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:35,n:"St. Stephen\'s Basilica\'s crypt",a:"District V",v:["history", "quiet"],d:35,s:"The underground chamber where Hungary\'s founder\'s right hand is preserved",st:"The relic is in a case. The crypt is marble and memory. St. Stephen established Christianity in Hungary. His hand still holds power—literal and symbolic. It\'s the foundation.",im:"It\'s 1083. Stephen is canonized. His hand is preserved. By 2024, pilgrims still touch the case. The hand is immortal. The body is dust.",t:"The relic is in a case. The crypt is marble and memory. St. Stephen established Christianity in Hungary. His hand still holds power—literal and symbolic. It\'s the foundation.\",im:\"It\'s 1083. Stephen is canonized. His hand is preserved. By 2024, pilgrims still touch the case. The hand is immortal. The body is dust.\",t:\"Szent István tér 1. €3 to enter basilica, €2 extra for crypt. Open 9am-5pm. The crypt is accessible via stairs. It\'s cool and quiet. Bring respect.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:36,n:"Petőfi Literary Museum\'s editing room",a:"District IV",v:["history", "hidden"],d:36,s:"The desk where a revolutionary poet edited a newspaper that changed history",st:"The desk is small. Ink stains mark it. The poet was 25 when he died fighting for freedom. His words inspired. His desk is now a shrine to words-as-power.",im:"It\'s 1848. Sándor Petőfi writes at this desk. His words move people. He goes to fight. He dies young. By 2024, his desk is preserved. Words outlast life.",t:"The desk is small. Ink stains mark it. The poet was 25 when he died fighting for freedom. His words inspired. His desk is now a shrine to words-as-power.\",im:\"It\'s 1848. Sándor Petőfi writes at this desk. His words move people. He goes to fight. He dies young. By 2024, his desk is preserved. Words outlast life.\",t:\"Marcibányi tér 5. €5 entry. Open 10am-4pm (closed Mondays). The museum is small and intimate. The editing room is the centerpiece. Poetry has power.",c:["history_big", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:37,n:"Pest embankment flood markers",a:"Pest Embankment",v:["history", "quiet"],d:37,s:"Stone markers showing water levels from catastrophic 19th-century floods",st:"The Danube rises. It swallows the embankment. The markers show how high. History is measured vertically. The river is more powerful than people. The markers prove it.",im:"It\'s 1838. The Danube floods. People die. The markers are placed. By 2024, the water rises and falls. The markers measure the memory.",t:"The Danube rises. It swallows the embankment. The markers show how high. History is measured vertically. The river is more powerful than people. The markers prove it.\",im:\"It\'s 1838. The Danube floods. People die. The markers are placed. By 2024, the water rises and falls. The markers measure the memory.\",t:\"Along Danube bank, Pest side. Free to view. The markers are weathered and hard to spot. Ask locals to point them out. Stand at the bank. Imagine the rise.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:38,n:"Turkish bath of Rudas (medieval hammer marks)",a:"Buda",v:["history", "beautiful"],d:38,s:"A 16th-century Ottoman bath where medieval tools marked the stone",st:"The bath survived the Ottoman occupation. Turkish architecture is preserved. But look close—the hammer marks from construction are visible. The hands that swung them are gone. The marks remain.",im:"It\'s 1550. Turkish builders construct a bath. Their hammer strikes mark stone. By 2024, someone runs a finger over the marks. They\'re connecting to centuries.",t:"The bath survived the Ottoman occupation. Turkish architecture is preserved. But look close—the hammer marks from construction are visible. The hands that swung them are gone. The marks remain.\",im:\"It\'s 1550. Turkish builders construct a bath. Their hammer strikes mark stone. By 2024, someone runs a finger over the marks. They\'re connecting to centuries.\",t:\"Dobrentei utca 9. €9 entry. Open 9am-8pm. The hammer marks are on interior walls—ask staff where to look. The thermal water is still hot. It still heals.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:39,n:"Kádár Soup Kitchen (real workers food)",a:"District VII",v:["local", "free"],d:39,s:"A standing-room-only soup and goulash counter unchanged since 1910",st:"Workers come before dawn. The broth is simmering. The bowls are passed. Nobody talks. They eat. They leave. It\'s pure function. It\'s humanity reduced to nutrition and ritual.",im:"It\'s 1910. A worker eats here before his shift. By 1950, his son eats here. By 2024, a grandchild eats here. The broth tastes like generations.",t:"Workers come before dawn. The broth is simmering. The bowls are passed. Nobody talks. They eat. They leave. It\'s pure function. It\'s humanity reduced to nutrition and ritual.\",im:\"It\'s 1910. A worker eats here before his shift. By 1950, his son eats here. By 2024, a grandchild eats here. The broth tastes like generations.\",t:\"Kádár Péter utca 21. Open 11:30am-3:30pm (closed weekends). Standing room only. No menu. Soup or goulash. €3-5. Cash only. Show up. Eat. Leave. That\'s the ritual.",c:["local_only", "free"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:40,n:"Keleti Railway Station art deco interior",a:"Keleti pályaudvar",v:["beautiful", "history"],d:40,s:"A 1884 terminal with ironwork and arches that frame departures",st:"The station was built as a gateway. Art deco curves. Iron railings. The arrivals board changes constantly but the architecture is eternal. People come and go. The station remains.",im:"It\'s 1884. The first trains depart. The architecture frames the future. By 2024, the same arches frame the same departures. The beauty hasn\'t aged.",t:"The station was built as a gateway. Art deco curves. Iron railings. The arrivals board changes constantly but the architecture is eternal. People come and go. The station remains.\",im:\"It\'s 1884. The first trains depart. The architecture frames the future. By 2024, the same arches frame the same departures. The beauty hasn\'t aged.\",t:\"Keleti pályaudvar. Free to walk around. Tours possible with station staff. Best time: early morning when light streams through. Arrive 30 minutes before a train—feel the energy.",c:["beautiful", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:41,n:"Óbuda neighborhood ancient streets",a:"Óbuda",v:["history", "quiet"],d:41,s:"Streets that followed Roman paths for 2,000 years without change",st:"The Romans laid roads. The Medievals used them. Now pedestrians walk them. The path hasn\'t changed. The destination keeps changing. But the way stays the same.",im:"It\'s 120 AD. A Roman walks north from the fortress. In 1450, a merchant takes the same route. In 2024, a tourist does. The road remembers all of them.",t:"The Romans laid roads. The Medievals used them. Now pedestrians walk them. The path hasn\'t changed. The destination keeps changing. But the way stays the same.\",im:\"It\'s 120 AD. A Roman walks north from the fortress. In 1450, a merchant takes the same route. In 2024, a tourist does. The road remembers all of them.\",t:\"Fő utca and Zichy utca, Óbuda. Walk slowly. The buildings are low and old. The street width is ancient. The feeling is unmistakable.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:42,n:"Vajdahunyad Castle reflection lake",a:"Városliget",v:["beautiful", "romantic_water"],d:42,s:"A fake castle reflected perfectly in still water at sunset",st:"The castle is a fantasy. It was built in 1896 for the Hungarian exhibition. The reflection doubles the magic. Stand on the bridge. The city disappears. Only the castle and its mirror exist.",im:"It\'s 1896. They build a castle that never existed. It\'s a dream of Hungarian architecture. In 2024, the dream still stands. The reflection makes it real.",t:"The castle is a fantasy. It was built in 1896 for the Hungarian exhibition. The reflection doubles the magic. Stand on the bridge. The city disappears. Only the castle and its mirror exist.\",im:\"It\'s 1896. They build a castle that never existed. It\'s a dream of Hungarian architecture. In 2024, the dream still stands. The reflection makes it real.\",t:\"Városliget park. Free. Open always. Best at sunset (6pm-7:30pm depending on season). Stand on the bridge. Bring someone to hold. The moment is romantic.",c:["beautiful", "romantic_water"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:43,n:"Promenade des Anglais-style Danube walk",a:"Danube Embankment",v:["beautiful", "night"],d:43,s:"Walking the embankment at the hour when locals exercise and couples kiss",st:"The time is 6pm. Joggers pass. Lovers pause on benches. The light is gold. The Danube reflects everything. It\'s the city\'s outdoor living room. Everyone is beautiful when the light is right.",im:"It\'s 1900. The embankment is new. People promenade. It becomes tradition. By 2024, joggers have replaced walkers but the ritual is the same.",t:"The time is 6pm. Joggers pass. Lovers pause on benches. The light is gold. The Danube reflects everything. It\'s the city\'s outdoor living room. Everyone is beautiful when the light is right.\",im:\"It\'s 1900. The embankment is new. People promenade. It becomes tradition. By 2024, joggers have replaced walkers but the ritual is the same.\",t:\"From Shoes to Castle Bridge, Pest side. Start at 5:30pm. Walk slowly (2-3 hours). Stop on benches. The experience is about observing and being observed.",c:["beautiful", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:44,n:"Buda fortress tunnel system escape route",a:"Buda Castle",v:["scary", "history"],d:44,s:"Medieval passages connecting the castle to safe houses in the city",st:"The escape routes were built for sieges. If enemies breached the castle, exits existed. The tunnels are now sealed or collapsed. But the paranoia is preserved. Fear made architecture.",im:"It\'s 1500. A tunnel is dug. Soldiers practice escape. They pray they\'ll never need it. By 2024, the tunnel is history. The prayer is answered.",t:"The escape routes were built for sieges. If enemies breached the castle, exits existed. The tunnels are now sealed or collapsed. But the paranoia is preserved. Fear made architecture.\",im:\"It\'s 1500. A tunnel is dug. Soldiers practice escape. They pray they\'ll never need it. By 2024, the tunnel is history. The prayer is answered.\",t:\"Castle complex tours include tunnel history. €20+ for specialized tours. The actual tunnels are mostly closed. The history is accessible through museums. The experience is intellectual.",c:["scary", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:45,n:"Nagyvásárkozda market hall\'s secret basement",a:"District V",v:["weird", "hidden"],d:45,s:"An underground storage level where vendors kept ice blocks to preserve meat",st:"The basement is rarely shown. It\'s where sawdust was placed on ice. Meat was preserved without electricity. The engineering was clever. The basement is a museum of old food logic.",im:"It\'s 1890. A vendor descends into cold. Meat lies on ice. By 1950, refrigeration makes it obsolete. By 2024, it\'s a historical artifact. The basement remembers.",t:"The basement is rarely shown. It\'s where sawdust was placed on ice. Meat was preserved without electricity. The engineering was clever. The basement is a museum of old food logic.\",im:\"It\'s 1890. A vendor descends into cold. Meat lies on ice. By 1950, refrigeration makes it obsolete. By 2024, it\'s a historical artifact. The basement remembers.\",t:\"Central Market Hall. €4 entry to main hall. Basement tours are rare—ask vendors. The basement is cold even in summer. Bring a sweater. Bring wonder.",c:["weird", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:46,n:"Art Nouveau architecture of Andrássy Avenue",a:"Andrássy út",v:["beautiful", "history"],d:46,s:"A 2.4km avenue of Turn-of-century mansions and palaces",st:"Every building is a statement. Art Nouveau curves. Decorated facades. Turrets. The avenue was designed as political expression. Hungary\'s wealth on display. The streets still echo that ambition.",im:"It\'s 1900. Architects compete. Each mansion is more ornate. The avenue becomes a jewelry box. By 2024, it\'s still ornate. The competition never ended.",t:"Every building is a statement. Art Nouveau curves. Decorated facades. Turrets. The avenue was designed as political expression. Hungary\'s wealth on display. The streets still echo that ambition.\",im:\"It\'s 1900. Architects compete. Each mansion is more ornate. The avenue becomes a jewelry box. By 2024, it\'s still ornate. The competition never ended.\",t:\"Walk from Deák Ferenc to Heroes Square. It\'s 2.4km. Stop at cafés to rest. Photography everywhere. The architecture is your museum. No admission required.",c:["beautiful", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:47,n:"Margaret Island\'s tram line ruins",a:"Margaret Island",v:["history", "quiet"],d:47,s:"Overgrown tram tracks that once connected island attractions",st:"The tram line is abandoned. Grass grows over rails. The track beds are visible. It\'s infrastructure frozen in time. The island decided cars instead. The tracks are ghosts.",im:"It\'s 1950. The tram line runs daily. By 1970, it\'s closed. By 2024, the rails are overgrown. The decision to close was final. The tracks remain as proof.",t:"The tram line is abandoned. Grass grows over rails. The track beds are visible. It\'s infrastructure frozen in time. The island decided cars instead. The tracks are ghosts.\",im:\"It\'s 1950. The tram line runs daily. By 1970, it\'s closed. By 2024, the rails are overgrown. The decision to close was final. The tracks remain as proof.\",t:\"Walk Margaret Island\'s interior paths. The tram beds are visible in certain areas. Ask island staff where the best sections are visible. Photography is easy—the decay is beautiful.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:48,n:"Synagogue of Dohány the back entrance",a:"District VII",v:["hidden", "history"],d:48,s:"A side entrance to Europe\'s largest synagogue that most miss",st:"The main entrance is obvious. The back entrance is architectural whisper. The side entrances show the building\'s depth. The hidden passages reveal the complexity.",im:"It\'s 1859. The synagogue opens. Jews arrive through front and back. The building is built for community. Both entrances lead to worship.",t:"The main entrance is obvious. The back entrance is architectural whisper. The side entrances show the building\'s depth. The hidden passages reveal the complexity.\",im:\"It\'s 1859. The synagogue opens. Jews arrive through front and back. The building is built for community. Both entrances lead to worship.\",t:\"Dohány utca 2-8. The back entrance is on Wesselényi utca. €6 entry. Open 10am-3:30pm. Use the back entrance at least once. The perspective is different.",c:["hidden", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:49,n:"Thonet chair factory museum",a:"District I",v:["weird", "history"],d:49,s:"The birthplace of bent-wood furniture and the industrial revolution\'s aesthetic",st:"Michael Thonet invented the bentwood process. The factory produced chairs. The design is so perfect it never changed. The museum is small. The impact is infinite.",im:"It\'s 1859. Thonet perfects the bend. The chair is born. By 2024, billions of Thonet chairs exist. He died having no idea of his legacy.",t:"Michael Thonet invented the bentwood process. The factory produced chairs. The design is so perfect it never changed. The museum is small. The impact is infinite.\",im:\"It\'s 1859. Thonet perfects the bend. The chair is born. By 2024, billions of Thonet chairs exist. He died having no idea of his legacy.\",t:\"Bem Jézsef u. 20. €5 entry. Open 10am-6pm. Small but complete museum. The design logic is visible. You\'ll never see a Thonet chair the same way.",c:["weird", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:50,n:"Eötvös Loránd University library manuscript room",a:"District V",v:["hidden", "beautiful"],d:50,s:"A room where 500-year-old manuscripts are handled by researchers",st:"The manuscripts are fragile. Scholars work with tweezers and gloves. The room smells like age and preservation. Knowledge is handled as sacred. This is where learning meets reverence.",im:"It\'s 1500. A monk copies a manuscript. His hand guides the quill. By 2024, a scholar studies his work. The monk\'s effort is vindicated.",t:"The manuscripts are fragile. Scholars work with tweezers and gloves. The room smells like age and preservation. Knowledge is handled as sacred. This is where learning meets reverence.\",im:\"It\'s 1500. A monk copies a manuscript. His hand guides the quill. By 2024, a scholar studies his work. The monk\'s effort is vindicated.\",t:\"Egyetem tér 1-3. Manuscript room access requires permission (research purposes or tours). Tours €5. Open by appointment. The experience is intellectual and moving.",c:["hidden", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:51,n:"Shoes off ritual in thermal baths",a:"Multiple Baths",v:["free", "local"],d:51,s:"The moment of removing shoes and entering thermal water",st:"The ritual is universal. Shoes off. Towel around waist. The transition from street to sacred. The thermal water is 38 degrees Celsius. It\'s surrender to heat and history.",im:"It\'s 150 AD. A Roman removes his boots. The thermal water receives him. By 2024, the same ritual. The surrender is eternal.",t:"The ritual is universal. Shoes off. Towel around waist. The transition from street to sacred. The thermal water is 38 degrees Celsius. It\'s surrender to heat and history.\",im:\"It\'s 150 AD. A Roman removes his boots. The thermal water receives him. By 2024, the same ritual. The surrender is eternal.\",t:\"All major baths (Széchenyi, Rudas, Gellért). €15-30 entry. The ritual is the experience. Go early morning. The locals own the water by 10am.",c:["free", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:52,n:"Communist-era propaganda posters (private collection viewing)",a:"District V",v:["history", "weird"],d:52,s:"A collection of regime posters that shaped public consciousness",st:"The posters are graphic. The messages are heavy. They\'re designed to persuade. Now they\'re artifacts. The art is sophisticated even as the message is oppressive. The contradiction is the point.",im:"It\'s 1956. A poster goes up. Workers see it. They\'re supposed to believe. By 1989, the posters come down. By 2024, they\'re studied. The power hasn\'t faded.",t:"The posters are graphic. The messages are heavy. They\'re designed to persuade. Now they\'re artifacts. The art is sophisticated even as the message is oppressive. The contradiction is the point.\",im:\"It\'s 1956. A poster goes up. Workers see it. They\'re supposed to believe. By 1989, the posters come down. By 2024, they\'re studied. The power hasn\'t faded.\",t:\"Museum of Socialist Art (Memento Park). €12 entry. The collection is comprehensive. The experience is chilling and educational. Open 10am-dusk. Bring context. These were not innocent.",c:["history_big", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:53,n:"Buda embankment at 3am",a:"Buda Embankment",v:["quiet", "night"],d:53,s:"The riverfront when the city is truly asleep",st:"The lights reflect. The water is still. No sound. The castle is black silhouette. It\'s a moment of pure peace. The Danube breathes. You breathe with it.",im:"It\'s 3am. A night worker finishes. They walk the embankment. The quiet is total. The city is theirs alone. By 4am, delivery trucks arrive. The moment passes.",t:"The lights reflect. The water is still. No sound. The castle is black silhouette. It\'s a moment of pure peace. The Danube breathes. You breathe with it.\",im:\"It\'s 3am. A night worker finishes. They walk the embankment. The quiet is total. The city is theirs alone. By 4am, delivery trucks arrive. The moment passes.\",t:\"Any point on Buda embankment. Go at 3am (yes, really). Bring someone or bring solitude. Bring silence. The experience is free and profound. The city is different at night.",c:["quiet", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:54,n:"Pálvölgyi Stalactite Cave\'s underground chamber",a:"District II",v:["nature", "quiet", "scary"],d:54,s:"A cave system descending 70 meters where water dripped for millions of years",st:"The stalactites hang. The formations are alien. You descend into darkness. The air is cool. Time is measured in geological epochs. Your presence is accidental.",im:"It\'s 2 million years ago. Water drips. Stone forms. By 2024, you descend. The drop is the same. The time is irrelevant. The cave is eternal.",t:"The stalactites hang. The formations are alien. You descend into darkness. The air is cool. Time is measured in geological epochs. Your presence is accidental.\",im:\"It\'s 2 million years ago. Water drips. Stone forms. By 2024, you descend. The drop is the same. The time is irrelevant. The cave is eternal.\",t:\"Szépvölgyi út 162. Tours €10 (90 minutes). Descend 600 steps. It\'s dark and cold. Wear good shoes. The cave is alive in the geological sense. Bring humility.",c:["nature", "quiet", "scary"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:55,n:"The city at 5am from Elizabeth Tower (Erzsébet-torony)",a:"Gellért Hill",v:["beautiful", "high_spots"],d:55,s:"The moment when dawn breaks and the city wakes",st:"The sun rises. The city shifts from grey to gold. The Danube catches fire. The Parliament lights fade. It\'s the daily rebirth. It never gets old. It never will.",im:"It\'s 5am. Every day. The sun rises. The city wakes. By 2024, the same miracle. The sun doesn\'t know it\'s been doing this for 4 billion years.",t:"The sun rises. The city shifts from grey to gold. The Danube catches fire. The Parliament lights fade. It\'s the daily rebirth. It never gets old. It never will.\",im:\"It\'s 5am. Every day. The sun rises. The city wakes. By 2024, the same miracle. The sun doesn\'t know it\'s been doing this for 4 billion years.\",t:\"Elizabeth Tower, Gellért Hill. €3 entry. Open 9am-sunset (extended in summer). Go at 5am—you\'ll be alone. Bring coffee. Watch the transformation. The experience is prayer.",c:["beautiful", "high_spots"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:56,n:"Szimpla Kert — Original Ruin Bar",a:"Kazinczy",v:["hidden", "night", "local"],d:56,s:"The first ruin bar—an abandoned building turned into the city\'s living room",st:"You walk into decay. Broken furniture. Hanging art. Plants growing through walls. People everywhere. Beer €1. It\'s chaotic and alive. This is where Budapest\'s youth defined a generation.",im:"It\'s 2002. An abandoned Jewish warehouse. Squatters claim it. They hang string lights. They throw parties. Within years, it becomes a movement. Now it\'s legendary. Now it\'s expensive. But the chaos is real.",t:"You walk into decay. Broken furniture. Hanging art. Plants growing through walls. People everywhere. Beer €1. It\'s chaotic and alive. This is where Budapest\'s youth defined a generation.\",im:\"It\'s 2002. An abandoned Jewish warehouse. Squatters claim it. They hang string lights. They throw parties. Within years, it becomes a movement. Now it\'s legendary. Now it\'s expensive. But the chaos is real.\",t:\"Kazinczy u. 14. Opens 2pm. Peak after midnight. Beer €2-4. No phone signal. Bring cash. The crowd is young, diverse, friendly. The feeling is: we built this together. We still own it.",c:["local_only", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:57,n:"Gozár Club — Deep House Underground",a:"District VII",v:["night", "hidden", "weird"],d:57,s:"An obscure basement club where Budapest\'s electronic music heads gather",st:"You descend into a cellar. No signage. Password-only entry. The bass is heavy. The lights are minimal. The dance floor is small. The sound is pure. This is underground.",im:"It\'s 1989. Budapest opens. DJs arrive with records. They find basements. They set up sound systems. The scene grows. The basements deepen. Now it\'s legendary.",t:"You descend into a cellar. No signage. Password-only entry. The bass is heavy. The lights are minimal. The dance floor is small. The sound is pure. This is underground.\",im:\"It\'s 1989. Budapest opens. DJs arrive with records. They find basements. They set up sound systems. The scene grows. The basements deepen. Now it\'s legendary.\",t:\"District VII (exact location passed by word of mouth). Password changes weekly. Check Resident Advisor. €8-15 entry. Opens midnight, peak 2-4am. Very local. Very underground.",c:["night", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:58,n:"Hidden Thermal Spot — Rudas Rooftop",a:"Buda",v:["hidden", "beautiful", "free"],d:58,s:"A thermal bath with a secret rooftop pool overlooking the Danube—locals only",st:"You enter Rudas. Climb to the roof. The thermal pool steams into night air. The Danube glows below. City lights reflect in the water. You\'re in thermal luxury above the city.",im:"It\'s 1550. Ottomans build this bath. The roof opens to sky. For 450 years, locals soak in this pool. Now you do too. The ritual is unchanged.",t:"You enter Rudas. Climb to the roof. The thermal pool steams into night air. The Danube glows below. City lights reflect in the water. You\'re in thermal luxury above the city.\",im:\"It\'s 1550. Ottomans build this bath. The roof opens to sky. For 450 years, locals soak in this pool. Now you do too. The ritual is unchanged.\",t:\"Rudas fürdő, Buda. €18 entry. Rooftop open 6am-8pm. Go early morning or twilight for best light. Bring a towel. The water is 42°C. The view is priceless. A Hungarian ritual.",c:["beautiful", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:59,n:"Széchenyi Thermal — Night Bathing",a:"Lipótváros",v:["beautiful", "free", "night"],d:59,s:"The famous thermal bath at night—surreal and beautiful, locals in the pools",st:"After dark. The outdoor pools steam into cold air. Budapest night sky above. Thermal water warm. You float. The city glows around you. It\'s dreamlike. It\'s perfect.",im:"It\'s 1913. This bath opens as a palace. Aristocrats bathe. Now commoners bathe. Now tourists. But at night, it reverts. At night, it\'s magical. At night, you feel royal.",t:"After dark. The outdoor pools steam into cold air. Budapest night sky above. Thermal water warm. You float. The city glows around you. It\'s dreamlike. It\'s perfect.\",im:\"It\'s 1913. This bath opens as a palace. Aristocrats bathe. Now commoners bathe. Now tourists. But at night, it reverts. At night, it\'s magical. At night, you feel royal.\",t:\"Széchenyi fürdő, City Park. €18 entry. Open until 10pm (extended in summer). Go 7-9pm for perfect light. The queue is smaller than daydays. The experience is transcendent.",c:["beautiful", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:60,n:"Thermal Foot Bath — Free Outdoor",a:"Margaret Island",v:["free", "hidden", "beautiful"],d:60,s:"A hidden thermal foot bath on Margaret Island—free, warm, and absolutely unknown",st:"You find a small pool. Thermal water flows. It\'s warm. It\'s free. Locals soak their feet. The island surrounds you. This is the best-kept secret. This is how locals relax.",im:"It\'s ancient times. Hot springs naturally heat this island. Monks lived here. They soaked. For 1000 years, people healed here. Now you do too.",t:"You find a small pool. Thermal water flows. It\'s warm. It\'s free. Locals soak their feet. The island surrounds you. This is the best-kept secret. This is how locals relax.\",im:\"It\'s ancient times. Hot springs naturally heat this island. Monks lived here. They soaked. For 1000 years, people healed here. Now you do too.\",t:\"Margaret Island (tram 4/6 to end). Walk north along island. The foot bath is unmarked. Free. Always open. Bring a towel. The water is natural thermal. The feeling is deep wellness.",c:["free", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:61,n:"Szentendre Artist Village — Day Trip by HÉV",a:"Szentendre (day trip)",v:["art", "beautiful", "history"],d:61,s:"A riverside town where Serbian Orthodox churches sit next to artist studios",st:"The HÉV train winds along the Danube. Szentendre appears like a Balkan dream. Cobbled streets. Orthodox crosses. Art galleries everywhere. Coffee culture. This is not Budapest. This is another world.",im:"It\'s 1700. Serbs flee the Ottomans. They settle here. They build churches. They paint icons. Now artists follow. Now it\'s an art colony. Now it\'s a time capsule.",t:"The HÉV train winds along the Danube. Szentendre appears like a Balkan dream. Cobbled streets. Orthodox crosses. Art galleries everywhere. Coffee culture. This is not Budapest. This is another world.\",im:\"It\'s 1700. Serbs flee the Ottomans. They settle here. They build churches. They paint icons. Now artists follow. Now it\'s an art colony. Now it\'s a time capsule.\",t:\"HÉV train from Budapest (40min, €1.50). Walkable town. Most galleries free. Coffee €1. Lunch cheap. The vibe is artistic, not touristy. Go midweek. Weekends are crowded.",c:["art", "beautiful", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:62,n:"Visegrád Castle by Danube Boat",a:"Visegrád (day trip)",v:["history", "beautiful", "nature"],d:62,s:"A medieval fortress where Hungarian kings ruled—reached by boat down the Danube Bend",st:"The boat winds through the Danube Bend. Hills rise on both sides. Then the castle appears. Stone on a cliff. Power made visible. This is the Danube at its most romantic and historical.",im:"It\'s 1300s. Kings rule from this castle. The Danube flows below. It\'s power. It\'s beauty. Now tourists arrive. But the castle holds. It remembers its function.",t:"The boat winds through the Danube Bend. Hills rise on both sides. Then the castle appears. Stone on a cliff. Power made visible. This is the Danube at its most romantic and historical.\",im:\"It\'s 1300s. Kings rule from this castle. The Danube flows below. It\'s power. It\'s beauty. Now tourists arrive. But the castle holds. It remembers its function.\",t:\"HÉV to Visegrád Nagymaros (1.5 hours). Ferry across the Danube (€2). Then cable car up to castle (€4). Castle entry €7. The boat ride is as important as the destination.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:63,n:"Gödöllő Palace — Royal Day Trip",a:"Gödöllő (day trip)",v:["history", "beautiful"],d:63,s:"A Baroque palace where the last Austro-Hungarian empress withdrew from the world",st:"The palace is honey-colored stone. Inside, Baroque excess. Chandeliers. Frescoes. The empress Sisi spent her life here, loved it, tried to escape life through riding and writing.",im:"It\'s 1850. The empress arrives. The palace is her refuge. She rides horses. She writes poems. She avoids court. For 50 years, this palace is her sanctuary.",t:"The palace is honey-colored stone. Inside, Baroque excess. Chandeliers. Frescoes. The empress Sisi spent her life here, loved it, tried to escape life through riding and writing.\",im:\"It\'s 1850. The empress arrives. The palace is her refuge. She rides horses. She writes poems. She avoids court. For 50 years, this palace is her sanctuary.\",t:\"Train from Budapest (30min, €2). Palace entry €10. Open 10am-5pm. Tours available in English. The royal chambers are the highlight. The stables are beautiful. Plan 3 hours.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:64,n:"Danube Bend Hike — Visegrád to Esztergom",a:"Danube Bend (day trip)",v:["nature", "beautiful", "history"],d:64,s:"A day hike along the Danube\'s most beautiful bend—medieval castles visible from trails",st:"You hike riverside. The Danube bends around you. Castles perch on cliffs. Wine villages appear. The water is alive. The history is visible. This is the Danube\'s soul.",im:"It\'s centuries of commerce. Trading boats. Military transport. Romance. Now you walk the path. The Danube still flows. The story still writes itself.",t:"You hike riverside. The Danube bends around you. Castles perch on cliffs. Wine villages appear. The water is alive. The history is visible. This is the Danube\'s soul.\",im:\"It\'s centuries of commerce. Trading boats. Military transport. Romance. Now you walk the path. The Danube still flows. The story still writes itself.\",t:\"HÉV to Visegrád (1.5 hours). Hike northbound 20km (8-10 hours). Or do half (10km, 4-5 hours). Beautiful trails. Bring water and snacks. End at Esztergom, return by bus (1 hour). The views are monumental.",c:["nature", "beautiful", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:65,n:"Gellért Hill at Dawn",a:"Gellért",v:["beautiful", "quiet", "high_spots"],d:65,s:"The hill where the city wakes—solo at 5am, golden by 6am",st:"5am. You\'re alone on the hill. The city is grey. Then the sun rises. Budapest turns gold. The Parliament. The Danube. The bridges. Everything glows. This is rebirth daily.",im:"It\'s been like this for 4 billion years. The sun rises. The city transforms. You\'re part of something ancient and eternal.",t:"5am. You\'re alone on the hill. The city is grey. Then the sun rises. Budapest turns gold. The Parliament. The Danube. The bridges. Everything glows. This is rebirth daily.\",im:\"It\'s been like this for 4 billion years. The sun rises. The city transforms. You\'re part of something ancient and eternal.\",t:\"Gellért hegytetőre. Free. 24/7. Go 5-6am for magic light. Bring a coffee. Bring silence. The walk down is easier in daylight. The experience is transcendent.",c:["beautiful", "high_spots", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:66,n:"Fisherman\'s Bastion — Secret Angles",a:"Buda",v:["beautiful", "hidden", "high_spots"],d:66,s:"Everyone knows the main view—but the terraces off-path have angles the tourists miss",st:"You skip the crowds. You find the side terraces. From here, different angles. The Danube below. Parliament at a slant. The city spreads differently. The view is equally stunning, utterly alone.",im:"It\'s 1900. This was built for the city to admire itself. Now millions come. But if you look, there are still quiet corners. Still yours alone.",t:"You skip the crowds. You find the side terraces. From here, different angles. The Danube below. Parliament at a slant. The city spreads differently. The view is equally stunning, utterly alone.\",im:\"It\'s 1900. This was built for the city to admire itself. Now millions come. But if you look, there are still quiet corners. Still yours alone.\",t:\"Fisherman\'s Bastion, Buda. €8 entry (or view free from outside). Open 9am-7pm. Go very early or just before closing for solitude. The less-trafficked areas are just as beautiful.",c:["beautiful", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:67,n:"Margaret Island Japanese Garden",a:"Margaret Island",v:["beautiful", "quiet", "nature"],d:67,s:"A hidden Japanese garden on an island in the Danube—pure tranquility",st:"You find the garden. Stone lanterns. Bamboo. A pond. Water features. It\'s transported you to Japan. Budapest forgets. The garden holds peace. The island amplifies it.",im:"It\'s 1970s. Someone plants a Japanese garden on an island in Budapest. Why? Maybe homesickness. Maybe dreaming. Now it\'s magic. Now it\'s real.",t:"You find the garden. Stone lanterns. Bamboo. A pond. Water features. It\'s transported you to Japan. Budapest forgets. The garden holds peace. The island amplifies it.\",im:\"It\'s 1970s. Someone plants a Japanese garden on an island in Budapest. Why? Maybe homesickness. Maybe dreaming. Now it\'s magic. Now it\'s real.\",t:\"Margaret Island (tram 4/6 to end). Walk to south end. Garden is partially free-to-view from outside. Full entry €3. The island is beautiful. The garden is the crown.",c:["beautiful", "nature", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:68,n:"Fővám Tér Sunset Over Danube",a:"Pest",v:["beautiful", "quiet"],d:68,s:"A small plaza where the Danube sunset hits perfectly—locals know, tourists don\'t",st:"You sit on steps. The sun descends. The Danube catches fire. The opposite bank glows. You\'re at eye level with beauty. No barriers. Just you and the light.",im:"It\'s always been like this. This plaza, this angle, this light. For 200 years, people have stood here and watched. Now you do. Now you understand.",t:"You sit on steps. The sun descends. The Danube catches fire. The opposite bank glows. You\'re at eye level with beauty. No barriers. Just you and the light.\",im:\"It\'s always been like this. This plaza, this angle, this light. For 200 years, people have stood here and watched. Now you do. Now you understand.\",t:\"Fővám tér, Budapest. Free. Best 6-7pm any clear day. Bring a friend or a book. The crowd is minimal. The magic is absolute.",c:["beautiful", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:69,n:"Ottoman Bath Foundations",a:"Buda",v:["history", "hidden"],d:69,s:"Under a modern thermal bath lie 400 years of Ottoman architecture—still visible",st:"In the basement of Rudas, you see Ottoman stone. Arches. Columns. The Ottomans who built here 400 years ago left their architecture under the modern structure. Time is layered.",im:"It\'s 1550. Ottoman engineers arrive. They understand thermal baths. They build with stone that lasts. Then they leave. Then the bathes transform. But their bones remain.",t:"In the basement of Rudas, you see Ottoman stone. Arches. Columns. The Ottomans who built here 400 years ago left their architecture under the modern structure. Time is layered.\",im:\"It\'s 1550. Ottoman engineers arrive. They understand thermal baths. They build with stone that lasts. Then they leave. Then the bathes transform. But their bones remain.\",t:\"Rudas fürdő. Ask at reception for basement tour (sometimes available). €18 entry. The historical layers are visible. The Ottoman work is evident. History is literal archaeology.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:70,n:"Arrow Cross Terror Sites",a:"District VII",v:["history", "scary", "weird"],d:70,s:"Bullets still visible in walls where WWII\'s Hungarian Nazis executed thousands",st:"You walk past walls. Look closely. Bullet holes. Dozens. Hundreds. The Arrow Cross killed here. In 1944-45. The bullets remain. The evidence is literal. The weight is heavy.",im:"It\'s 1945. Chaos. The Arrow Cross hunts. They execute. They don\'t hide. People fall. Bullets mark walls. Now you see it. Now you know it happened here.",t:"You walk past walls. Look closely. Bullet holes. Dozens. Hundreds. The Arrow Cross killed here. In 1944-45. The bullets remain. The evidence is literal. The weight is heavy.\",im:\"It\'s 1945. Chaos. The Arrow Cross hunts. They execute. They don\'t hide. People fall. Bullets mark walls. Now you see it. Now you know it happened here.\",t:\"District VII (Kazinczy and surrounding streets). Free. Open air. Look for plaques marking execution sites. The Shoes on the Danube Bank (Shoes on the Embankment) is a main memorial. Respectful. Heavy.",c:["history_big", "scary"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:71,n:"1956 Revolution Bullet Holes",a:"Downtown",v:["history", "weird"],d:71,s:"Soviet tank bullets still embedded in building facades—a revolution written in damage",st:"You walk past buildings. The walls are scarred. Bullet trajectories visible. This is where Soviet tanks came. This is where Hungarians fought. The tanks won. The scars remain.",im:"It\'s October 1956. The city rises. Soviet tanks roll in. Buildings burn. People fall. Then it\'s over. The tanks leave. The scars stay. Now you see them. Now you know they were here.",t:"You walk past buildings. The walls are scarred. Bullet trajectories visible. This is where Soviet tanks came. This is where Hungarians fought. The tanks won. The scars remain.\",im:\"It\'s October 1956. The city rises. Soviet tanks roll in. Buildings burn. People fall. Then it\'s over. The tanks leave. The scars stay. Now you see them. Now you know they were here.\",t:\"Various locations downtown (Parliament area, Astoria intersection). Free. Open air. Ask locals for specific sites. The Eternal Flame memorial is official. The bullet holes are accidental art. Both tell the story.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:72,n:"Roman Aquincum Ruins",a:"Aquincum",v:["history", "hidden", "archaeological"],d:72,s:"Budapest\'s Roman name—actual 2000-year-old ruins of a garrison city",st:"You find crumbled walls. Stone channels. Artifacts scattered. This was a Roman fortress city. Legionaries lived here. It fell. Centuries passed. Then Buda. Then Budapest. Now archaeology.",im:"It\'s 100 AD. Roman soldiers arrive. They build. They garrison. They stay 300 years. Then Rome falls. The city empties. Now you see what they left.",t:"You find crumbled walls. Stone channels. Artifacts scattered. This was a Roman fortress city. Legionaries lived here. It fell. Centuries passed. Then Buda. Then Budapest. Now archaeology.\",im:\"It\'s 100 AD. Roman soldiers arrive. They build. They garrison. They stay 300 years. Then Rome falls. The city empties. Now you see what they left.\",t:\"Aquincum Museum, north Buda. HÉV north. €7 entry. Open 10am-5pm. The museum is small but excellent. The ruins are outdoor and atmospheric. Bring imagination.",c:["history_big", "archaeological"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:73,n:"Medieval Cave Churches",a:"Buda",v:["history", "weird", "hidden"],d:73,s:"Underground chapels carved into Buda\'s rock—secret places of worship for centuries",st:"You descend into caves. Stone walls carved into rooms. This was a church. A hidden one. People prayed here when prayer was dangerous. The silence is sacred. The stone is ancient.",im:"It\'s medieval times. Faith must hide. So people carve caves. They build altars in rock. They pray in darkness. The faith endures. The caves endure. Now you enter their sanctuary.",t:"You descend into caves. Stone walls carved into rooms. This was a church. A hidden one. People prayed here when prayer was dangerous. The silence is sacred. The stone is ancient.\",im:\"It\'s medieval times. Faith must hide. So people carve caves. They build altars in rock. They pray in darkness. The faith endures. The caves endure. Now you enter their sanctuary.\",t:\"Hungarian Cavern and Church caves require guided tours (ask tourism office, €10-15). The experience is deeply spiritual. The caves are cool and damp. Bring a headlamp and open mind.",c:["history_big", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:74,n:"Free Ruin Bar Courtyards",a:"Multiple locations",v:["free", "night", "local"],d:74,s:"Some ruin bars open their courtyards free—you pay for drinks only",st:"You walk into a bar courtyard. Art everywhere. A band plays. No cover charge. You can sit for hours on benches. You order beer (€1-2). It\'s the lowest-cost night out in Budapest.",im:"It\'s 2000s. Ruin bars define the city. They should be free. So some keep entry free. You just buy a drink. Democracy.",t:"You walk into a bar courtyard. Art everywhere. A band plays. No cover charge. You can sit for hours on benches. You order beer (€1-2). It\'s the lowest-cost night out in Budapest.\",im:\"It\'s 2000s. Ruin bars define the city. They should be free. So some keep entry free. You just buy a drink. Democracy.\",t:\"Check TripAdvisor for \'Free ruin bars Budapest.\' Many smaller ones are free entry. Peak 9pm onwards. Bring cash. The crowds are young and friendly. The vibe is authentic.",c:["free", "night", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
