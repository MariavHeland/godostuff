const P = [
  {id:1,n:"Great Wall at Badaling — Humanity's Ancient Defiance",a:"North of City",v:["history", "beautiful", "nature", "views"],d:240,s:"The most accessible section of the Great Wall, climbing steep stone staircases with panoramic views across mountains and valleys—constructed over 2,000 years to defend an empire.",st:"The Badaling section was rebuilt during the Ming Dynasty (1368-1644) and remains the Wall's most dramatic segment. Climb the main tower and feel the weight of military strategy: the Wall traces ridgelines offering views of approaching invaders for 50km. Each stone was hauled by laborers whose names are lost to history. Guard towers punctuate the Wall's spine. Your legs burn climbing the steep staircases; your breath comes short in thin mountain air. Yet at the summit of a tower, 700 meters above valleys below, you understand the Wall's purpose and hubris: the massive human effort to separate civilization from wilderness. The view humbles you. The Wall continues into mist-shrouded mountains, a serpent of stone binding the empire to the earth.",im:"A Ming Dynasty soldier, 1530s, standing alone in a watch tower, looking across the Great Wall's spine toward the Mongol steppes—watching, waiting, knowing that invasion could come any dawn, that his duty is to stand here regardless.",t:"Located 40km north of Beijing. Train from downtown reaches Badaling in 1 hour. Buy tickets in advance on busy weekends. The main wall is steep; allow 2-3 hours. Cable car available if legs fail. Download offline maps; cell reception is poor. Wear sturdy shoes. Water stations exist but bring extra water.",c:[],r:"g",nn:"八达岭长城",ns:"长城最可达的、最陡峭的段落，可俯瞰山谷",nst:"八达岭段是明代重建的。登上塔楼，可眺望50公里外的群山。这是守卫帝国的2000年石头。",nt:"距北京40公里。火车1小时可达。建议提前购票。陡峭段需2-3小时。备好水和舒适的登山鞋。"},
  {id:2,n:"Forbidden City — Thousand Hall Dynasty Seat",a:"Central Beijing",v:["history", "architecture", "beautiful"],d:240,s:"The largest and best-preserved imperial palace complex in the world—nearly 1,000 buildings arranged in perfect axial symmetry, inhabited by 24 emperors across 500 years.",st:"Walking through the Forbidden City's outer gates, you enter a space designed to intimidate and awe. The courtyards are vast; your footsteps echo. Dragons writhe across roof tiles and columns—symbols of imperial power. The main throne hall (Hall of Supreme Harmony) is where emperors received tribute from vassal states. Stand where emperors stood and feel the grandeur. The residential quarters reveal the palace's true function: hundreds of concubines housed in compounds, eunuchs navigating hidden passages, princes educated in isolation. Every room contains museums: imperial collections of jade, ceramics, manuscripts. Walk the palace for hours and barely see a fraction. The Forbidden City is overwhelming—not just in scale but in historical weight. You're walking through 500 years of political intrigue, military strategy, and dynastic ambition, etched into imperial brickwork.",im:"An emperor at age 15, crowned in the Hall of Supreme Harmony, standing beneath 20-meter ceilings, the weight of empire settling onto his shoulders—the loneliness visible in his eyes.",t:"Located in central Beijing, Chaoyang District. Subway Line 1 to Tiananmen Dong/Xi stations. Open 8:30am-5pm, closed Mondays. Tickets RMB 60 (base) to RMB 90 (with special exhibits). Enter by 3pm to avoid crowds. Audio guide recommended. Allow 4-5 hours minimum. Photography generally allowed.",c:[],r:"g",nn:"故宫",ns:"世界上保存最完好的帝国宫殿，有近千座建筑",nst:"故宫是24位皇帝500年的住所。主殿、后宫、花园、库房记录了王朝的辉煌与衰落。",nt:"位于北京市中心。乘坐地铁1号线。每日8时30分至17时开放，周一休馆。建议预留4-5小时参观。"},
  {id:3,n:"Summer Palace — Imperial Garden Retreat",a:"Northwest Beijing",v:["beautiful", "history", "nature", "architecture"],d:180,s:"A vast landscaped estate featuring artificial lakes, traditional buildings, and temple grounds—designed as an emperor's summer escape from Forbidden City heat.",st:"Built in the 18th century, the Summer Palace represents the pinnacle of Chinese garden design. Everything is calculated: the placement of pavilions, the shape of the lake, the arrangement of stone lanterns. Walk the Long Corridor with its 14,000 painted panels illustrating classical texts and landscapes. Rent a boat and float on Kunming Lake, watching the marble bridge reflect in water. The Temple of Wisdom rises above gardens where azaleas bloom in spring. The palace was burned during the Boxer Rebellion and carefully reconstructed. What makes the Summer Palace transcendent is its restraint: no single element dominates; the composition emerges from balance. Spend a full day wandering. Picnic by the lake. Sit in a pavilion and watch the landscape shift as light changes. The palace teaches that gardens are not plants arranged but spaces composed—orchestrations of human and natural elements.",im:"An empress dowager in 1880, gliding in a silk barge across Kunming Lake at sunset, watching kingfishers dive, understanding that beauty is the one dominion no foreign army can invade.",t:"Located 15km northwest of central Beijing. Subway Line 4 to Beigongmen, then bus or 20-minute walk. Entry RMB 30 (March-October) or RMB 20 (November-February). Boat rentals available. Allow 4-6 hours. The palace is sprawling; walking the full perimeter takes 2+ hours. Best visited on weekday mornings.",c:[],r:"g",nn:"颐和园",ns:"18世纪皇帝的避暑地，有人工湖、亭台楼阁",nst:"颐和园是中国古典园林设计的杰作。昆明湖、长廊、石桥组成完美的构图。",nt:"距北京西北15公里。乘坐地铁4号线至北宫门站。门票30元（3-10月）或20元（11-2月）。可租船。"},
  {id:4,n:"Temple of Heaven — Cosmic Alignment",a:"South Beijing",v:["history", "beautiful", "architecture"],d:120,s:"An imperial temple complex where emperors performed rituals to maintain cosmic harmony—featuring the iconic circular Hall of Prayer for Good Harvests.",st:"The Temple of Heaven's design embodies Chinese cosmological beliefs: the circular altar represents heaven; the square outer walls represent earth. The Hall of Prayer for Good Harvests, built in 1420, is a marvel of acoustic engineering—the reverberations carry prayers directly to heaven, or so the architects calculated. The hall's interior contains 28 pillars of wood harvested from specific forests, positioned to support the roof's dramatic curve. No nails are used; the structure is assembled like a three-dimensional puzzle. Each winter solstice, the emperor ascended the platform at dawn to perform rituals ensuring the coming year's harvests—a ceremony repeated unchanged for 500 years. The temple grounds are where Beijing's residents gather at dawn to practice tai chi and listen to birds. The cosmic geometry persists; even secular visitors feel its order.",im:"An emperor in December, 1530, kneeling alone in the Hall of Prayer before dawn, the acoustics carrying his whispered prayer upward, believing that in this moment his voice touches heaven.",t:"Located in south-central Beijing, Xuanwu District. Subway Line 2 to Tiantan Dong/Xi stations. Entry RMB 35. Open 6am-10pm. Best visited at dawn when locals practice tai chi and the light is ethereal. Allow 2-3 hours. The temple grounds are vast and peaceful.",c:[],r:"g",nn:"天坛",ns:"皇帝进行仪式以维持宇宙和谐的地点",nst:"天坛1420年建成。圆形设计代表天，方形外墙代表地。祈年殿是宇宙和谐的建筑体现。",nt:"位于北京南中心。乘坐地铁2号线。门票35元。清晨6时开放。建议清晨游览。"},
  {id:5,n:"Tiananmen Square — Monumental Power",a:"Central Beijing",v:["history", "architecture", "views"],d:120,s:"The world's largest public square, surrounded by monuments to imperial and revolutionary authority—a space designed to overwhelm individual significance.",st:"Tiananmen Square occupies 440,000 square meters. Stand in its center and you feel diminished—this is intentional architecture. The square was rebuilt by the Communists in 1949 to assert revolutionary power; it is Communist China's answer to ancient imperial monuments. At the square's center rises the Monument to the People's Heroes. The perimeter includes the Mausoleum of Mao Zedong (where Mao's embalmed body lies), the National Museum, and the Great Hall of the People (parliament building). On the square's north edge stands the Gate of Heavenly Peace. Walk the square at different times: at dawn it's meditative; at midday it's crowded with tourists; at night, monuments are illuminated, creating a different emotional resonance. The square has witnessed 500 years of history: imperial processions, revolutionary rallies, military parades, student demonstrations. It is a landscape of power made visible—monumental, moving, and slightly unsettling.",im:"October 1, 1949: a peasant soldier, age 22, standing on this newly-completed square for the first time, watching Mao declare a new China—not knowing the history about to unfold here.",t:"Located in central Beijing. Easily reached by subway Line 1 to Tiananmen stations. Entry is free. The square is open 6am-midnight but security concerns restrict access during certain hours; check current status. Photography generally allowed. The square can accommodate over a million people; arrive early morning or late evening for less crowd.",c:[],r:"g",nn:"天安门广场",ns:"世界最大的公共广场，周围环绕帝国和革命纪念碑",nst:"天安门广场有44万平方米。中心的人民英雄纪念碑和毛泽东纪念堂见证了500年的历史。",nt:"位于北京市中心。乘坐地铁1号线。全天开放但可能有安全限制。清晨或傍晚人较少。"},
  {id:6,n:"National Palace Museum — Imperial Treasures",a:"Central Beijing",v:["art", "history", "beautiful"],d:180,s:"A museum housing the imperial collection of Chinese art spanning 5,000 years—bronze vessels, scroll paintings, ceramics, and jade representing humanity's finest aesthetic achievements.",st:"The National Palace Museum preserves over 1 million objects from the imperial collections, displayed across dozens of galleries. The bronze vessel gallery contains Shang Dynasty ritual bronzes (3,000+ years old) whose patterns suggest beliefs now lost to language. The ceramics gallery traces kilns' evolution: Song Dynasty celadon, Ming Dynasty blue-and-white porcelain, Qing Dynasty innovations. The painting gallery includes works by Song Dynasty masters whose brushwork suggests entire landscapes in minimal strokes. A 12th-century landscape scroll depicts mountains, valleys, rivers, and human figures so small they're barely visible—yet they exist. The painting teaches that in Chinese aesthetics, humans are elements within nature, not nature's center. Spend hours in this museum. The objects on display represent centuries of craftspeople perfecting their arts—each bowl thrown by a potter dead for 800 years, yet still holding water, still beautiful.",im:"A Song Dynasty potter, kneeling before a kiln, watching celadon glaze transform opaque clay into translucent jade-colored porcelain—knowing he's created beauty that will be admired a thousand years hence.",t:"Located in the Forbidden City (also called Palace Museum). Entry RMB 60. Hours 8:30am-5pm, closed Mondays. Allow minimum 3-4 hours. The museum is vast; focus on galleries of greatest interest rather than attempting completeness. English signage is good. Photography without flash allowed in most galleries.",c:[],r:"g",nn:"故宫博物院",ns:"收藏帝国5000年艺术品的博物馆",nst:"故宫博物院保存超过100万件文物。从商代青铜到清代瓷器，见证人类最高的美学成就。",nt:"位于故宫内。门票60元。每日8时30分至17时开放，周一休馆。建议留出3-4小时。"},
  {id:7,n:"Ming Tombs — Eternal Rest Valley",a:"North of City",v:["history", "beautiful", "nature"],d:180,s:"A sacred valley containing 13 imperial mausoleums built by Ming Dynasty emperors—featuring underground vaults, stone monuments, and the Spirit Way lined with guardian statues.",st:"The Ming Tombs occupy a valley 50km north of Beijing, each tomb representing an emperor's vision of eternal residence. The Changling Tomb (Emperor Yongle) is the largest—an underground palace where the emperor was buried with hundreds of artifacts. The surface features a stone Spirit Way leading uphill, flanked by 24 guardian stone animals (lions, elephants, camels, horses) carved in ranks. The stones are massive—each lion weighs tons. Walk between them and you feel watched by an eternal honor guard. The Sacred Way reflects beliefs about the afterlife: the emperor needs protection and attendance in the next world as in this one. Most tombs have been excavated; visitors descend into chambers where imperial remains rested. The valley's scale is overwhelming: thirteen imperial tombs spread across kilometers, each representing an emperor's desire for permanence against the certainty of decay.",im:"Ming Dynasty court officials processing up the Sacred Way in 1424, carrying an emperor's coffin draped in silk, performing the burial ritual that would anchor his soul to this valley for eternity.",t:"Located 50km north of Beijing in Changping District. Organized tours common from hotels; otherwise taxi from downtown (1.5-hour drive). The Changling and Dingling tombs are most impressive. Entry combined ticket RMB 110. Allow 4-5 hours. Wear comfortable shoes; the Sacred Way requires walking uphill. The valley is peaceful, especially on weekdays.",c:[],r:"g",nn:"明十三陵",ns:"13座皇帝陵墓分布的神圣山谷",nst:"明十三陵距北京50公里。每座陵墓都是皇帝永恒居所的愿景。石神道两侧的守护兽见证了500年。",nt:"距北京50公里。乘坐旅游车或出租车1.5小时可达。建议选择导游。门票110元。"},
  {id:8,n:"Olympic Stadium — Twenty-First Century Monument",a:"North Beijing",v:["architecture", "modern", "beautiful"],d:90,s:"An iconic steel lattice structure designed by Herzog & de Meuron—the centrepiece of Beijing's 2008 Olympics and symbol of modern China's global ambitions.",st:"The Olympic Stadium's nickname, the Bird's Nest, reflects its interwoven steel design. Built for the 2008 Olympics, it represented Beijing's statement to the world: we are modern, ambitious, capable of engineering on a cosmic scale. The structure seats 91,000 people. Walk inside the vast spaces and feel the architectural confidence. Architects designed the stadium to echo traditional Chinese ceramics: a vessel, a container, a domestic object scaled to monumental proportions. The construction involved 110,000 workers; 42 workers died. Every nation's Olympics involves human cost hidden behind ceremonies and medals. Yet the stadium endures as a remarkable achievement of engineering and ambition. Today it hosts athletic events and tourist visits. The structure's honesty appeals: no attempt to disguise the steel framework, no pretense. The engineering is the beauty.",im:"A Chinese athlete in 2008, entering the stadium for the first time to compete, understanding that this stadium represents China's coming of age as a global power—the weight of national pride tangible in the steel.",t:"Located in northern Beijing, Chaoyang District. Subway Line 8 to Olympic Sports Centre Station. Stadium tours available 9am-5pm daily. Entry RMB 50. Allow 1-2 hours. The Water Cube (aquatic center) is nearby; both can be visited in one outing. Photography allowed. The stadium is spectacular both inside and outside.",c:[],r:"g",nn:"奥林匹克体育馆",ns:"2008奥运会的主体育馆，称为鸟巢",nst:"体育馆由瑞士建筑师设计。可容纳91000人。钢铁框架的设计体现中国现代的自信。",nt:"位于北京北部。乘坐地铁8号线至奥运中心站。门票50元。参观需1-2小时。"},
  {id:9,n:"Lama Temple (Yonghe Gong) — Tibetan Buddhism in Beijing",a:"Northeast Beijing",v:["history", "beautiful", "local"],d:90,s:"Beijing's largest Tibetan Buddhist temple, featuring ornate golden decoration, incense-filled halls, and a 26-meter sandalwood Buddha—an unexpected spiritual sanctuary in the capital.",st:"Yonghe Gong was built in 1694 as a royal residence, later converted into a Tibetan Buddhist temple in 1744. The transformation created architectural uniqueness: Tibetan decoration adorns traditionally Chinese building structures. Walking through the temple, incense smoke curls toward ceilings. In the main hall, the Wanfu Pavilion, stands a colossal 26-meter sandalwood Buddha statue carved from a single piece of wood. The statue is so massive that when it arrived in Beijing, they had to remove roofs to install it. The Tibetan monks who inhabit the temple practice quietly; visitors are welcomed but respectfully tolerated. The temple is unexpectedly serene despite Beijing's surrounding chaos. Devotees circumambulate the halls, prayer wheels, temple bells. The experience offers a glimpse of Tibetan Buddhism, usually experienced only in remote Himalayan monasteries, accessible in China's capital city.",im:"A Tibetan monk, age 24, dressed in maroon robes, prostrating himself before the sandalwood Buddha, his forehead touching stone—a prayer of devotion repeated daily for decades.",t:"Located in northeast Beijing, Dongcheng District. Subway Line 2 or 5 to Yonghe Gong Lama Temple Station. Entry RMB 25. Open 9am-4:30pm daily. Respectful dress required (covered shoulders and knees). Photography allowed in most areas but not during active prayers. Allow 1-2 hours.",c:[],r:"g",nn:"雍和宫",ns:"北京最大的藏传佛教寺庙",nst:"雍和宫建于1694年。供奉26米高的檀木大佛。寺内藏传佛教文化与中国建筑融合。",nt:"位于北京东北部。乘坐地铁2、5号线至雍和宫站。门票25元。每日9时至16时30分开放。"},
  {id:10,n:"Confucian Temple and Imperial Academy — Scholarly Traditions",a:"Northeast Beijing",v:["history", "architecture", "local"],d:60,s:"Parallel institutions where classical scholars studied and civil service exams were held—preserving 700 years of China's educational and philosophical traditions.",st:"The Confucian Temple and Imperial Academy occupy adjacent compounds in northeast Beijing, connected by shared philosophy: education as path to enlightenment and service. The temple honors Confucius with ritual halls; the academy trained the bureaucrats who governed China for centuries. The Imperial Academy's courtyards featured stone pools representing harmony. Exam candidates studied texts on government, ethics, and classical poetry, preparing for exams that determined their entire lives. A man passing the provincial exam became eligible for imperial service—a path from farmer's son to provincial governor. The system lasted 1,300 years; millions of men attempted exams; only thousands succeeded. Walking the academy's halls, you sense the weight: these stones witnessed the dreams and failures of millions seeking advancement through learning. The temple preserves 189 stone tablets inscribed with the names of exam graduates—a permanent record of those who achieved distinction through intellect.",im:"A farmer's son in 1750, age 16, arriving in Beijing for the first time, entering the academy, understanding that his intelligence is his only path to escape fields and poverty.",t:"Located in northeast Beijing, Dongcheng District. Subway Line 2 or 5 to Guozijian Station. Entry RMB 30 combined ticket. Open 9am-5pm, closed Mondays. Allow 1-2 hours for both sites. Audio guides available. The courtyards are peaceful; morning visits offer solitude.",c:[],r:"g",nn:"孔庙和国子监",ns:"700年教育传统的象征，科举考试的场所",nst:"孔庙和国子监相邻。寺庙供奉孔子，学院培养了治理中国的官僚。石碑记录了数千名考中的学者。",nt:"位于东北京。乘坐地铁2、5号线至国子监站。门票30元。每日9时至17时开放。"},
  {id:11,n:"Hutong Neighborhoods — Urban Vernacular",a:"Central Beijing",v:["local", "history", "hidden"],d:120,s:"Traditional single-story residential alleyways dating to the Yuan Dynasty—intimate human-scaled neighborhoods where Beijing's soul persists despite modernization.",st:"Hutongs (alleys) represent Beijing's urban vernacular. Built in a grid pattern, aligned north-south with feng shui principles, the hutongs connect grey-tiled courtyard homes (siheyuan) housing extended families. Walking a hutong, you enter another era: elderly residents sitting on stoops, children playing, women hanging laundry from windows. The walls are weathered brick; many buildings are 500+ years old. Each neighborhood had distinct character: silk merchants in one area, soldiers in another, scholars in a third. The hutongs are disappearing—developers demolish them for high-rises—making them increasingly precious. Some hutongs have been preserved and commercialized (restaurants, shops); others remain residential and authentic. Wander randomly, get lost, experience Beijing's horizontal world before it vanishes entirely. The hutong teaches that cities are communities, not just infrastructure—these alleyways were where neighbors knew each other, where commerce and daily life intertwined, where Beijing's human scale persisted for centuries.",im:"An elderly couple in their 80s, sitting outside their siheyuan on a summer evening, surrounded by grandchildren and neighbors, knowing this courtyard will soon be demolished for a tower.",t:"Multiple hutong neighborhoods exist throughout central Beijing. Accessible by all subway lines. No entry fee. Best explored on foot with a map or guide. Smoking Gun Hutong and Yangmeizhu Hutong are well-known but commercialized. For authentic experience, hire a local guide who knows less-touristy areas. Photography respectfully. Always ask permission before photographing residents.",c:[],r:"g",nn:"胡同",ns:"传统的单层住宅区，是老北京的缩影",nst:"胡同源自元代。狭窄的巷子连接四合院民居。传统北京的邻里关系在此展现。",nt:"分布在北京市中心各处。步行探索最佳。建议聘请当地导游了解真实情况。访问时需尊重居民隐私。"},
  {id:12,n:"798 Art District — Industrial Creativity",a:"Northeast Beijing",v:["art", "modern", "hidden"],d:120,s:"A converted military electronics factory transformed into galleries, studios, and cultural spaces—Beijing's contemporary art hub and symbol of adaptive reuse.",st:"In the 1990s, Beijing artists discovered abandoned factory spaces and began establishing studios in 798 (named after the factory's original designation). Over two decades, 798 evolved into a thriving creative district: galleries showing cutting-edge art, studios where artists work, bookstores, cafés, design studios. The architecture remains industrial—high ceilings, exposed brick, massive windows. The contrast of 21st-century conceptual art displayed in 1950s industrial shells is intellectually stimulating. Walking 798, you encounter installation art that questions authority, video pieces exploring identity, photography pushing documentary boundaries. Some galleries are serious; others are commercialized. The district remains authentic enough to maintain creative energy. The government tolerates 798 because it represents China's artistic openness to the world; yet there's always underlying tension—a major installation was recently removed for political sensitivity. 798 exists in that unstable space where creativity and state power negotiate boundaries.",im:"A Chinese artist in 1998, discovering an empty factory space, imagining it filled with art—not knowing that decades hence, galleries would pay rent here, that his studio space would become valuable real estate.",t:"Located in northeast Beijing, Chaoyang District. Subway Line 13 to Wangjing West, then bus. Or taxi from downtown (30 minutes). Entry to district is free; individual galleries charge admission. Hours vary; most open 10am-6pm. Best visited on weekends when artist-hosted events occur. Photography excellent; ask permission before photographing individual artworks.",c:[],r:"g",nn:"798艺术区",ns:"旧军工厂改造成的当代艺术区",nst:"798源于1990年代被遗弃的工厂。艺术家入驻，改造成画廊和工作室。成为北京当代艺术的中心。",nt:"位于北京东北。乘坐地铁13号线至望京西站。地区入场免费。画廊开放时间多为10时至18时。"},
  {id:13,n:"National Stadium District — Olympic Legacy",a:"North Beijing",v:["architecture", "modern", "views"],d:120,s:"A cluster of Olympic structures built for the 2008 Games, including the Bird's Nest Stadium and Water Cube—a landscape of Chinese-scale engineering ambitions.",st:"The Olympic District represents China's 2008 statement to the world: we can host the Olympics, we can build on a scale that astounds. The Bird's Nest Stadium dominates, but surrounding it are the Water Cube (National Aquatics Center), the Badminton Hall, and various other venues. The Water Cube is an engineering marvel: inflated ETFE plastic pillows form the exterior, creating a translucent facade that seems organic yet technological. Inside, the facility hosted Olympic swimming; today it functions as a water park. The Olympic Green surrounding all structures was planted with trees to create parkland. Walking the district, you see the Olympics' physical legacy: world-class facilities maintained at massive expense, architectural icons for Instagram photos, yet underneath, an existential question: was building this worth the displaced residents, environmental cost, and expense? The structures are impressive. The question of their purpose lingers.",im:"A construction worker in 2007, standing atop the Bird's Nest framework, looking across the Olympic Green being planted with thousands of trees—not knowing that his work would define China's global image for generations.",t:"Located in north Beijing, Chaoyang District. Subway Line 8 to Olympic Sports Centre or Beiyue Road stations. Both main stadiums open for tours 9am-5pm. Combined ticket RMB 150 for Bird's Nest and Water Cube. Photography excellent, especially at dusk when structures are illuminated. Allow 3-4 hours for full experience.",c:[],r:"g",nn:"奥林匹克体育中心",ns:"2008年奥运会场馆群，见证中国现代工程",nst:"鸟巢体育馆、水立方游泳馆等奥运场馆展示中国建筑的雄心。",nt:"位于北京北部。乘坐地铁8号线至奥运中心站。门票150元。每日9时至17时开放。"},
  {id:14,n:"Imperial Examination Site (Gongyuan) — Success and Failure",a:"East Beijing",v:["history", "hidden"],d:90,s:"The original examination grounds where millions of Chinese men tested for imperial service—thousands of preserved exam cells and historical records remain.",st:"The Imperial Examination Site (gongyuan) housed the civil service examinations that determined China's bureaucracy for 1,300 years. The grounds contained thousands of individual cells where exam candidates spent 24-72 hours answering questions on Confucian texts and governance. Each cell was identical: a narrow stone bench, a small window, a metal plate. The cells were designed to prevent cheating and ensure isolation—nothing but the candidate's mind and Confucian texts. Winners became governors and military leaders; losers returned home as failures, often unable to find employment. The examination system was simultaneously meritocratic (any man, regardless of birth, could theoretically pass) and brutal (only an infinitesimal percentage succeeded). Walking rows of preserved exam cells, you feel the weight of aspiration and failure. Scratch marks on cell walls suggest frantic note-taking. The grounds include a museum documenting examination history. This site represents an intellectual meritocracy now lost—modern societies have eliminated such winnowing tests, yet China's exam traditions influence education globally.",im:"A peasant's son in 1850, sitting alone in an exam cell, brush in hand, attempting to answer a question on governance, knowing his entire future depends on the next three hours.",t:"Located in east Beijing, Dongcheng District. Subway Line 5 to Gongyuan Station. Entry RMB 20. Open 9am-4pm, closed Mondays. Allow 1.5-2 hours. The preserved exam cells are the highlight. English signage is limited; guide recommended. Photography allowed.",c:[],r:"g",nn:"贡院",ns:"科举考试场地，几千个考生小间保留至今",nst:"贡院见证了中国1300年的科举传统。数百万考生曾在这里参加改变人生的考试。",nt:"位于东京。乘坐地铁5号线至贡院站。门票20元。每日9时至16时开放。建议聘请导游。"},
  {id:15,n:"White Cloud Temple (Baiyun Guan) — Taoist Sanctuary",a:"West Beijing",v:["history", "beautiful", "local"],d:75,s:"Beijing's oldest Taoist temple, founded in 739 CE, featuring ornate halls, wandering gardens, and a collection of Taoist philosophical texts.",st:"Baiyun Guan (White Cloud Temple) represents 1,200+ years of continuous Taoist practice. The temple is dedicated to Lao Tzu, the philosopher whose 'Tao Te Ching' forms Taoism's philosophical core. Walking the temple, you encounter intricate decoration: ornate roof tiles, painted beams, detailed carvings. The interior courtyards feature meditation gardens with stones, water, carefully pruned trees. Taoist monks maintain the temple and lead pilgrimages. The temple museum displays Taoist texts and iconography. The complex includes guest halls where long-term visitors can practice meditation. What distinguishes Baiyun Guan is its authentic continuity: not a government museum but a functioning religious institution where monks practice, where pilgrims come for guidance, where ancient philosophy persists. On Lunar New Year, thousands attend the traditional temple fair—an annual tradition unbroken for centuries. Visitors are welcomed; the temple remains committed to Taoist practice as its primary purpose.",im:"A Taoist monk, age 70, meditating in a hall where predecessors meditated 800 years ago, seeking the same enlightenment through the same practices—time dissolving in the timeless present.",t:"Located in west Beijing, Xicheng District. Subway Line 2 to Lingjing Hutong, then 10-minute walk. Entry RMB 10. Open 8am-5pm daily. Respectful dress required. Photography allowed in most areas but not during active temple ceremonies. Allow 1-2 hours. Temple fair occurs around Lunar New Year.",c:[],r:"g",nn:"白云观",ns:"北京最古老的道教寺庙，建于739年",nst:"白云观是道教文化的中心。1200多年的历史见证了中国精神传统的延续。",nt:"位于西京。乘坐地铁2号线至灵境胡同站。门票10元。每日8时至17时开放。"},
  {id:16,n:"Chaoyang District Nightlife — Contemporary Beijing",a:"East Beijing",v:["night", "local"],d:120,s:"Sanlitun and Worker's Stadium areas featuring clubs, rooftop bars, and live music venues—where Beijing's young professionals gather for modern entertainment.",st:"Chaoyang District represents new Beijing: cosmopolitan, energetic, restlessly modern. Sanlitun contains dozens of bars, clubs, and restaurants catering to expats and urban Chinese seeking international entertainment. The Forbidden City Bar offers views overlooking the Drum Tower. Rooftop bars at the area's high-rises provide sunset views across Beijing. Worker's Stadium area features live music venues where both Chinese and international bands perform. The nightlife scene is younger, less historical, yet reveals contemporary Beijing's character: economically powerful, globally connected, seeking pleasure and modernity. Walk these areas at night and you see Beijing's future—high-rises, foreign influences, nightlife until 3am. This contrasts sharply with temple visits and hutong neighborhoods, yet it's equally authentic Beijing. Modern cities are not only history but also present-day experience. Chaoyang represents where Beijing is, even if it lacks the temporal depth of imperial monuments.",im:"A 28-year-old Beijing professional, in a rooftop bar, looking across the city's lights, calculating career ambitions, earning a salary her parents couldn't have imagined—the old city invisible beneath neon.",t:"Located in east Beijing, Chaoyang District. Subway Line 1, 6, 10 serve Sanlitun. Worker's Stadium accessible by Line 6. Bars and clubs typically open 6pm-3am. Cover charges vary; often waived with drink purchase. Photography policies vary by venue. Dress code smart-casual to business dress. High prices compared to local establishments.",c:[],r:"g",nn:"朝阳区夜生活",ns:"酒吧、俱乐部和音乐现场聚集的现代北京",nst:"三里屯和工人体育馆周边代表当代北京。国际化、现代、充满活力。",nt:"位于朝阳区。地铁1、6、10号线可到。酒吧通常18时至次日3时营业。入场费因地而异。"},
  {id:17,n:"Mutianyu Great Wall — Scenic Alternative",a:"North of City",v:["nature", "beautiful", "history"],d:240,s:"A less-crowded section of the Great Wall featuring stunning mountain scenery, cable cars, and restored watchtowers—an excellent alternative to Badaling.",st:"Mutianyu is 70km northeast of Beijing, more remote than Badaling yet more accessible than wild sections further out. The wall here ascends steep mountains, descends into valleys, offers views of unrestored wall stretching into wilderness. The scenery is more dramatic than Badaling: forested mountains, winding wall, ancient towers weathered by centuries. Fewer tourists come here; the experience is less crowded. Cable cars assist ascent; toboggan slides descend (surprisingly fun). The wall's construction is visible: stone blocks fitted without mortar, some displaced by centuries of weathering. Walk the wall and your legs burn from climbing; your lungs strain from altitude; your spirit lifts from the views. Mutianyu rewards visitors seeking both historical experience and natural beauty. The restored sections show the wall's original grandeur; the unrestored sections show its actual condition—a lesson in how restoration can improve presentation while potentially losing authenticity.",im:"A Ming Dynasty soldier in 1550, stationed at a Mutianyu tower, watching the mountains for invaders, knowing this wall connects him to the empire in ways the landscape does not suggest.",t:"Located 70km northeast of Beijing. Organized tours available from hotels; otherwise taxi from downtown (1.5-hour drive). Entry RMB 140 includes cable car and descent slide. Open 7am-5:30pm. Allow 4-5 hours. The wall is steep; wear sturdy shoes. Weather can change rapidly; bring layers. Less crowded than Badaling, especially on weekdays.",c:[],r:"g",nn:"慕田峪长城",ns:"比八达岭更偏远、更秀美的长城段落",nst:"慕田峪距北京70公里。山林秀美，游客较少。缆车和滑梯增加体验的乐趣。",nt:"距北京70公里。乘坐出租车1.5小时可达。门票140元包含缆车和滑梯。每日7时至17时30分开放。"},
  {id:18,n:"Jingshan Park — Forbidden City Vista",a:"Central Beijing",v:["views", "beautiful"],d:60,s:"A modest hill directly north of the Forbidden City offering the best vantage point for photographing the imperial palace and Beijing's extended cityscape.",st:"Jingshan Park is a 45-meter artificial hill created from earth excavated when building the Forbidden City in the 15th century. It's a modest elevation by most standards, yet in flat Beijing, it offers panoramic views. Stand atop the pavilion and the Forbidden City spreads beneath you—its golden roof tiles gleaming, its perfect geometric organization visible in complete form. Beyond it, Beijing's modern skyline rises: the towers of finance districts competing in height and glitter. Jingshan teaches perspective: from here, the ancient palace seems intimate despite its vast scale; the modern city seems diminished despite its apparent dominance. The hill's historical irony: this vantage was forbidden to ordinary people for 500 years; today any visitor can ascend and contemplate. Walking the park's paths, you encounter locals practicing tai chi, couples sharing quiet moments, students sketching the palace view. The park is peaceful despite proximity to Beijing's bustle.",im:"An emperors concubine in 1500, forbidden by law from ascending this hill, glimpsing it from far distances, never permitted the view of her home from above, forever seeing it from within.",t:"Located directly north of the Forbidden City. Subway Line 1 to Tiananmen Xi/Dong, walk north. Entry RMB 2 (nominal). Open 6am-9pm daily. Best visited sunrise or golden hour for photography. The ascent is gradual and accessible. Allow 1-2 hours.",c:[],r:"g",nn:"景山公园",ns:"俯瞰故宫的小山公园，最佳摄影地点",nst:"景山高45米。登顶可俯瞰故宫全景和北京天际线。是拍摄故宫的最佳位置。",nt:"位于故宫北侧。乘坐地铁1号线至天安门站。门票2元。每日6时至21时开放。日出或黄昏最佳。"},
  {id:19,n:"Houhai Lake — Waterfront Leisure",a:"Central Beijing",v:["beautiful", "local", "food"],d:120,s:"Three connected lakes in north-central Beijing featuring waterfront bars, restaurants, and traditional hutong neighborhoods—a social hub for residents and visitors.",st:"Houhai (Back Lake) consists of three interconnected lakes: Qianhai, Houhai, and Xihai. The waterfront has been developed with bars and restaurants while maintaining traditional neighborhoods in surrounding hutongs. Walking the lakefront at dusk, you see Beijing residents—families with children, couples, joggers—enjoying public space. The restaurants offer views across the water; the bars fill with youth seeking evening entertainment. Behind the waterfront, the hutongs maintain authenticity: elderly residents in courtyards, traditional shops, the smell of home cooking. The lake freezes in winter, becoming a skating rink. The contrast between ancient residential alleys and modern waterfront entertainment captures Beijing's duality: a city preserving tradition while embracing modernity, often uneasily. Houhai is where Beijing residents actually spend leisure time, not tourists following guidebooks—making it an authentic social geography of contemporary urban life.",im:"A Beijing couple in their 80s, sitting at Houhai's edge as they have every evening for forty years, watching younger generations' romance bloom at the same lake, time accelerating around their constancy.",t:"Located in central Beijing, Xicheng District. Subway Line 2 or 6 to Gulou Dajie or Lingjing Hutong. Lakefront open 24/7. Restaurants open 11am-11pm typically. Walk the full perimeter (5km) for complete experience. Best visited early morning (peaceful) or dusk (romantic lighting). Photography excellent from multiple vantage points.",c:[],r:"g",nn:"后海湖",ns:"北京市中心的三个湖泊，周边有餐厅和传统胡同",nst:"后海是北京人休闲的地方。湖边酒吧与周边老胡同形成对比。冬季结冰可溜冰。",nt:"位于北京市中心。乘坐地铁2、6号线。全天开放。餐厅多11时至23时营业。步行环湖5公里。"},
  {id:20,n:"Beijing National Library — Knowledge Repository",a:"West Beijing",v:["history", "beautiful"],d:90,s:"One of the world's largest libraries, holding over 39 million items including rare imperial manuscripts, rare books, and extensive historical collections.",st:"The Beijing National Library represents 5,000 years of Chinese intellectual history materialized in books. Its collection includes Song Dynasty woodblock prints, Yuan Dynasty manuscripts, rare books from the Qing Dynasty, and contemporary publications. The library's reading rooms are open to the public; visitors can browse collections. The Special Collections Room displays rare items: imperial documents, calligraphic works, ancient maps, precious texts. The library's recent expansion included a modern wing with contemporary design, creating dialogue between old and new. Walking the library's halls, surrounded by millions of items representing humanity's recorded knowledge, induces philosophical contemplation: all these texts carry information; the library protects knowledge against loss. The library survived the Cultural Revolution when Red Guards burned millions of texts; librarians hid precious materials to preserve them. Today's library represents survival of knowledge through political upheaval.",im:"A librarian in 1966, hiding rare manuscripts in walls as Red Guards burn books outside—knowing that knowledge must survive, that destruction is temporary, that books will be valued again.",t:"Located in west Beijing, Xicheng District. Subway Line 1 to National Library, walk 10 minutes. Entry free with ID. Reading rooms open 9am-9pm. Special Collections viewing by appointment. Photography restricted in rare book rooms. Allow 2-4 hours for general collections.",c:[],r:"g",nn:"中国国家图书馆",ns:"世界最大的图书馆之一，收藏3900万件文献",nst:"国家图书馆收藏了5000年的中国文化记录。包括宋版书、明清手稿等珍贵文献。",nt:"位于西京。乘坐地铁1号线至国家图书馆站。免费入场。开放时间9时至21时。"},
  {id:21,n:"Yuyuantan Park — Urban Recreation",a:"West Beijing",v:["nature", "beautiful", "local"],d:90,s:"A 303-acre park featuring artificial lakes, gardens, and recreational facilities—a green space where Beijing residents find respite from urban intensity.",st:"Yuyuantan Park is Beijing's largest park, a landscape design blending natural and artificial elements. Two lakes occupy the center; gardens surround them. Walking paths wind through plantings of cherry blossoms, peonies, and bamboo. The park is where Beijing residents exercise: joggers, cyclists, tai chi practitioners. In spring, cherry blossoms draw crowds; people picnic beneath falling petals. In autumn, the park's vegetation turns golden. In winter, the lakes freeze. The park represents Beijing's commitment to urban green space despite the city's density. Within the park, the noise of the city diminishes. You could forget you're in a metropolis of 21 million people. The park includes museums and temples. Boats can be rented for lake exploration. Families spend entire weekends here. The park teaches that cities need breathing room—open space where people can remember that nature persists within metropolitan boundaries.",im:"A grandmother and grandchild in spring, sitting beneath cherry blossoms at Yuyuantan, petals falling like snow—a moment of quiet joy amid the city's accelerated pace.",t:"Located in west Beijing, Haidian District. Subway Line 2 to Yuyuantan Park. Entry RMB 5. Open 6am-11pm. Parks peak spring (cherry blossoms) and autumn. Boat rentals available. Allow 2-3 hours for leisurely walk. Photography excellent, especially during seasonal flowering.",c:[],r:"g",nn:"玉渊潭公园",ns:"北京最大的城市公园，有人工湖和花园",nst:"玉渊潭公园面积303亩。湖泊、花园、运动设施齐全。是北京人休闲的地方。",nt:"位于西京。乘坐地铁2号线至玉渊潭公园站。门票5元。每日6时至23时开放。"},
  {id:22,n:"Dongzhimen Market — Traditional Commerce",a:"Northeast Beijing",v:["local", "food", "hidden"],d:60,s:"A traditional wet market where vendors sell fresh produce, meats, fish, and dried goods—the authentic daily commerce supplying Beijing residents.",st:"Dongzhimen Market operates before dawn. Vendors unload trucks of vegetables; fish in ice-filled crates gasp in shallow water; chicken vendors kill birds on-site. The market is sensory overload: smell of blood, fish, earth; sound of negotiation in Beijing dialect; sight of abundance and careful selection. It's not a tourist destination—it's where Beijing residents actually shop. Elderly women select vegetables with the expertise of decades; they know soil quality by touch, ripeness by smell. Fishmongers clean fish while customers watch. The market reveals Beijing's culinary backbone: the daily logistics supporting a 21-million-person city. Everything here will be consumed today. Food is perishable; supply chains must be perfect. Walk the market and understand that cities depend on invisible infrastructure—the millions of transactions enabling daily nutrition. This is the reality beneath restaurants and hotels.",im:"A vegetable vendor at 5am, arranging cabbages in pyramids as he has for thirty years, knowing which customers prefer which varieties, each arrangement a small act of commercial artistry.",t:"Located in northeast Beijing, Dongcheng District near Dongzhimen metro. Open 5am-2pm daily. Arrive before 8am for best selection. Bring cash; most vendors don't accept cards. Photography respectful; don't photograph vendors without permission. Bring empty bags for purchases. The market experience is best captured at dawn.",c:[],r:"g",nn:"东直门市场",ns:"传统湿地集市，供应北京居民的日常食材",nst:"东直门市场凌晨开市。蔬菜、水产、肉类交易。是真正的北京日常生活。",nt:"位于东北京。乘坐地铁2号线至东直门站。每日5时至14时营业。建议清晨到访。带现金。"},
  {id:23,n:"Xidan Commercial Street — Modern Shopping",a:"West Beijing",v:["local", "modern"],d:60,s:"A bustling pedestrian shopping street featuring department stores, international brands, and traditional Chinese goods—a microcosm of Beijing's consumer culture.",st:"Xidan represents modern Beijing commerce. The street was created in the 1930s and renovated repeatedly; today it's a commercial thoroughfare serving millions of shoppers. Department stores (like Parkson and APM) contain international fashion brands; smaller shops sell traditional Chinese goods—silk scarves, jade jewelry, calligraphy supplies. Street vendors sell snacks: sesame cookies, candied fruit, roasted nuts. The crowd is dense; the energy is commercial energy. Despite its modernity, traditional shops persist: century-old pharmacies, family-run teahouses, old bookstores. Walking Xidan, you see Beijing's consumer boom: people with bags, young women seeking fashion, tourists seeking souvenirs. The street reveals economic transformation: what was revolutionary China is now capitalist consumer culture—a transformation most visible in Xidan's commerce. Yet beneath modernity, traditional commerce persists—a reminder that Beijing contains multiple economic eras simultaneously.",im:"A shop owner in 1980, opening a tiny stall during the first wave of Chinese economic liberalization, not knowing that this modest effort would lead to contemporary Xidan's commercialism.",t:"Located in west Beijing, Xicheng District. Subway Line 1 to Xidan. Shopping street open 10am-10pm typically. Stores vary in hours. Most major stores accept credit cards. Street parking unavailable; arrive by transit. Less crowded on weekday mornings. Photography generally allowed.",c:[],r:"g",nn:"西单商街",ns:"现代购物街道，有百货公司和国际品牌",nst:"西单代表北京的消费文化。百货公司、国际品牌和传统商店并存。",nt:"位于西京。乘坐地铁1号线至西单。街道10时至22时营业。平日上午人少。"},
  {id:24,n:"Drum Tower and Bell Tower — City's Temporal Heart",a:"Central Beijing",v:["history", "architecture", "beautiful"],d:75,s:"Twin towers from the Yuan Dynasty that regulated Beijing's temporal rhythm by sounding drums and bells—a symbolic center of the old city.",st:"The Drum Tower and Bell Tower occupy the north-south axis of old Beijing. The Drum Tower, built in 1272, held a massive drum struck 24 times daily to mark watch periods (pre-modern time divisions). The Bell Tower, directly behind, contained a massive bronze bell heard across the city. Together, they regulated Beijing's temporal life—dawn bell, noon drum, evening chime. The drum and bell are no longer sounded daily; they're now historical monuments. Climbing the Drum Tower's interior stairs, you reach a level where the ancient drum sits. Climbing the Bell Tower, you see the enormous bell. The towers offer views across old Beijing's hutongs and toward modern districts. The contrast is stark: viewing from 14th-century structures across contemporary towers. The towers' purpose was temporal coordination; in an age of atomic clocks and GPS, we've forgotten how important centralized time was. Visitors today understand the towers as symbols of pre-modern time, a reminder that cities were once organized differently.",im:"A 13th-century gatekeeper, running up the tower at dawn, striking the ceremonial drum to wake Beijing—that sound carrying across the city, ordering people to commerce, to work, to structured daily rhythm.",t:"Located in central Beijing, Dongcheng District. Subway Line 2 or 8 to Gulou Dajie. Entry to towers RMB 30 each or RMB 50 combined. Open 9am-5pm daily. Climbing involves steep wooden stairs. Allow 1-2 hours for both towers. Photography from tower windows excellent.",c:[],r:"g",nn:"钟鼓楼",ns:"元代建造的古塔，曾规制北京的时间",nst:"鼓楼和钟楼建于1272年。击鼓和钟声曾调节北京的日常时间。",nt:"位于市中心。乘坐地铁2、8号线至鼓楼大街站。门票30元或50元联票。每日9时至17时开放。"},
  {id:25,n:"Qing Dynasty Old Summer Palace (Yuanmingyuan) — Ruin and Remembrance",a:"Northwest Beijing",v:["history", "beautiful", "hidden"],d:120,s:"The sprawling ruins of a 18th-century imperial garden complex destroyed by British and French forces during the Second Opium War—preserved as ruins rather than restored.",st:"The Old Summer Palace once rivaled the Forbidden City in grandeur. Built over 150 years, it contained thousands of buildings, gardens, and artistic treasures. In 1860, British and French forces invaded Beijing during the Second Opium War. For three days, they systematically looted and burned the palace. French soldiers took what they could carry; British soldiers burned what remained. The palace was essentially destroyed. Yet today, rather than reconstructing it, Beijing preserves the ruins—a decision revealing different values about heritage. Some structures have been partially restored; many remain as fragmented walls and stone foundations. Walking the ruins, you see scattered columns, broken walls, a stone vessel half-buried. The ruins are melancholic—a landscape of loss. Plaques explain what each ruin once was. The decision to preserve ruins rather than reconstruct the palace makes a statement: these ruins are history itself, more powerful than a restoration would be. The palace teaches that empires fall; beautiful things are destroyed. Preserving ruins honors those losses.",im:"A British soldier in 1860, torch in hand, setting fire to irreplaceable artworks knowing his grandchildren will judge him, yet doing it anyway—history moving forward through destruction.",t:"Located in northwest Beijing, Haidian District. Subway Line 4 to Yuanmingyuan Park. Entry RMB 10. Open 7am-7pm. Allow 3-4 hours to appreciate ruins fully. Walking paths connect major remaining structures. It's more peaceful than active heritage sites; fewer crowds. Photography deeply moving—the ruins evoke historical melancholy.",c:[],r:"g",nn:"圆明园遗址",ns:"被英法联军毁灭的18世纪皇家园林的遗迹",nst:"圆明园曾与故宫齐名。1860年被英法军队焚毁。今天保留遗迹而非重建。",nt:"位于西北京。乘坐地铁4号线至圆明园站。门票10元。每日7时至19时开放。步行需3-4小时。"},
  {id:26,n:"Beijing Opera Museum — Traditional Performance Art",a:"East Beijing",v:["art", "history", "local"],d:90,s:"A museum dedicated to Beijing Opera, featuring costumes, instruments, makeup techniques, and performance history—showcasing China's distinctive theatrical tradition.",st:"Beijing Opera (Jingju) is a 200-year-old performance art combining acrobatics, martial arts, music, and narrative. The museum houses magnificent costumes: silk robes with hand-embroidered dragons, face paint designs encoding character types, musical instruments from regional traditions. The museum includes performance spaces where visitors can experience live shows. Beijing Opera seems strange to Western audiences—the music is unfamiliar, the costumes vivid, the storytelling abstract. Yet watching a master performer leap, contort, and sing simultaneously reveals extraordinary artistry. The museum documents opera's history through the Cultural Revolution when traditional arts were suppressed; many performers died before opera was restored. Today, while television and cinema challenge opera's relevance, dedicated audiences maintain the tradition. The museum represents preservation efforts: keeping alive an art form that might otherwise vanish in modernization.",im:"An opera master in 1970, during Cultural Revolution suppression, secretly practicing movements in his apartment, knowing that someday opera would be valued again, that his knowledge must be preserved.",t:"Located in east Beijing, Chaoyang District. Subway Line 1 or 10 nearby. Entry RMB 50. Hours vary; typically 10am-5pm. Live performances scheduled regularly; check schedule. Photography generally allowed but not during performances. Allow 1-2 hours for museum; add 1-2 hours if attending a show.",c:[],r:"g",nn:"京剧博物馆",ns:"展示北京京剧服装、化妆和表演艺术的博物馆",nst:"京剧是200年传统。博物馆展示华丽服装、脸谱、乐器。保护传统艺术。",nt:"位于东京。地铁1、10号线附近。门票50元。通常10时至17时开放。有演出时间表。"},
  {id:27,n:"Beijing Zoo — Natural History",a:"North Beijing",v:["nature", "local"],d:120,s:"A major zoo featuring giant pandas, rare animals, and botanical gardens—balancing education, conservation, and entertainment.",st:"Beijing Zoo, established in 1906, is one of Asia's oldest zoos. Today it houses over 3,000 animals representing 1,000 species. The giant panda exhibit is the main attraction—visitors queue to see China's national animal. The pandas, loaned from China to foreign zoos, are diplomatic gifts. Watching a panda eat bamboo for hours is mesmerizing; their slowness and gentleness contrast with their massive size. Beyond pandas, the zoo features African savanna animals, reptiles, birds. The zoo raises conservation awareness; endangered species breeding programs operate behind the scenes. The zoo also raises ethical questions about animal captivity—concerns that persist globally. Walking the zoo, you balance competing feelings: delight at seeing animals you'd never encounter otherwise, with uneasiness about their confinement. Modern zoos attempt to address this through naturalistic exhibits; still, cages persist. The zoo represents humanity's complicated relationship with animals: our desire to preserve them conflicting with our tendency to control them.",im:"A giant panda, aged 3, in Beijing Zoo, born into captivity, knowing nothing of wild mountains—yet through its existence here, it secures international attention for species conservation.",t:"Located in north Beijing, Xicheng District. Subway Line 2 to Beijing Zoo. Entry RMB 15. Open 7:30am-6pm. Panda viewing 7:30am-9am and 3pm-5pm (most active then). The zoo is large; allow 3-4 hours. Bring water. Summer heat and crowds are significant. Weekday mornings offer better experience.",c:[],r:"g",nn:"北京动物园",ns:"有大熊猫和稀有动物的主要动物园",nst:"北京动物园1906年建立。大熊猫是主要景点。园内还有非洲动物和爬行动物。",nt:"位于北京。乘坐地铁2号线至北京动物园站。门票15元。每日7时30分至18时开放。建议早上参观。"},
  {id:28,n:"Capital Museum — Beijing's Comprehensive History",a:"West Beijing",v:["history", "art", "beautiful"],d:150,s:"A major museum comprehensively documenting Beijing's 3,000-year history from ancient settlements through imperial dynasties to modern era.",st:"The Capital Museum occupies a modern building that itself reflects Beijing's architectural philosophy: stone base representing tradition, glass top suggesting modernity. Inside, nine floors organize Beijing's history chronologically. The Ancient Beijing section features bronze vessels and oracle bones from settlements predating the imperial city. The Imperial Beijing section documents dynasties: artifacts from temples, official robes, imperial seals. The Modern Beijing section addresses 20th-century transformation: photographs, documents, period rooms recreating period life. The museum's curatorial approach is sophisticated: not merely displaying objects but contextualizing them historically. The jade collection is exceptional—jade was traditionally valued above gold in Chinese culture; the museum's pieces demonstrate why. Walking the museum, you experience Beijing's temporal depth: the city's 3,000-year occupation, multiple dynasties, revolutionary transformation—all concentrated in a single space. The museum is less crowded than the Forbidden City yet offers deeper historical understanding.",im:"A ceramicist from 800 years ago, creating a bowl, not knowing it would eventually be displayed in a future museum for people who speak different languages and live in unimaginable times.",t:"Located in west Beijing, Xicheng District. Subway Line 1 to National Library, nearby. Entry free with valid ID. Hours 10am-5pm, closed Mondays. Allow 3-4 hours for thorough visit. English signage good. Photography without flash allowed. Special exhibitions rotate; check what's current.",c:[],r:"g",nn:"首都博物馆",ns:"记录北京3000年历史的综合博物馆",nst:"首都博物馆全面展示北京从古代到现代的历史。帝国北京、民国北京、现代北京的遗迹。",nt:"位于西京。乘坐地铁1号线至国家图书馆站附近。免费入场。每日10时至17时开放，周一休馆。"},
  {id:29,n:"Miyun Reservoir — Water Sanctuary",a:"Northeast of City",v:["nature", "beautiful"],d:240,s:"A vast reservoir 70km northeast of Beijing supplying the city's drinking water—surrounded by mountains and offering recreational opportunities.",st:"The Miyun Reservoir supplies 80% of Beijing's drinking water—a fact most residents never consider while turning a tap. The reservoir was created in 1960 by damming the Chaobai River, covering valleys that once housed villages. Today, the 61-square-kilometer surface supports recreation: boating, fishing, swimming. The surrounding area is rural—forests, small villages, farms. Visiting the reservoir reveals Beijing's dependence on distant water resources; the city's sprawl is only possible because water is piped hundreds of kilometers. The reservoir's mountains offer hiking opportunities; the water allows fishing. In summer, Beijing residents escape the city heat for the cooler reservoir area. The water is relatively clean but treated extensively before reaching taps. The reservoir raises environmental questions: climate change threatens water supply; if rainfall decreases, Beijing's growth becomes unsustainable. The reservoir reveals the invisible infrastructure sustaining urban life.",im:"A villager in 1960, evacuated from lands soon to be submerged by the reservoir, watching water rise over homes and fields—a sacrifice unknown to millions of future residents using the water.",t:"Located 70km northeast of Beijing. Accessible by organized tour or private transport. The reservoir area is sprawling; different sections have different recreational facilities. Entry fees vary by activity. Swimming areas 8am-5pm May-October. Boating and fishing available. The area is peaceful; weekday visits avoid crowds. Photography beautiful, especially sunrise.",c:[],r:"g",nn:"密云水库",ns:"供应北京饮用水的大型水库",nst:"密云水库供应北京80%的饮用水。占地61平方公里。周围有山林和农村。",nt:"距北京70公里。乘坐旅游车或出租车可到。提供多种游憩活动。夏季是避暑地点。"},
  {id:30,n:"Beijing Night Market (Temple Fairs) — Festival Commerce",a:"Citywide",v:["local", "food", "night"],d:120,s:"Seasonal temple fairs offering traditional snacks, crafts, and entertainment—annual celebrations rooted in Chinese festival traditions.",st:"Temple fairs (miao hui) have occurred in Beijing for centuries during Chinese festivals, particularly Lunar New Year. Vendors set up temporary stalls; crowds gather for entertainment, food, shopping. Spring fairs feature traditional crafts: woodblock prints, clay toys, embroidery. Food vendors sell: sugar-coated hawthorn, fried dough, candied fruits, soups. Performers sing traditional opera, perform acrobatics, tell stories. The fairs evoke festive energy: children eating sweets, elders socializing, the smell of fried food, the sound of vendors' calls. Modern fairs maintain continuity with centuries-past fairs; yet modernity intrudes: contemporary music alongside traditional opera, plastic goods alongside handcraft. The fairs represent Beijing's persistence of traditional culture amid modernization. They offer glimpses of pre-modern festival life, now compressed into annual events. The fairs also reveal economic transformation: traditional crafts sold alongside mass-produced goods, festival traditions adapted for contemporary consumption.",im:"A vendor in 1900, selling the same candied hawthorn at this same fair location, not knowing that centuries hence, descendants would maintain the tradition.",t:"Fairs occur during Lunar New Year (January-February) and other festivals. Multiple locations citywide; Dragon Lantern Festival Fair (Longtan Lake) and Jade Lantern Festival (Longtan Lake) are major annual events. Dates vary yearly; check calendar. Fair hours typically 9am-10pm. Photography excellent. Peak crowds during evening and weekends. Bring cash; many vendors don't accept cards.",c:[],r:"g",nn:"庙会",ns:"传统节日集市，有小吃、手工艺品和娱乐",nst:"庙会在农历新年等节日举办。销售传统小吃、手工艺品。体现北京的节日传统。",nt:"在中国新年和其他节日举办。城市多处有庙会。龙潭湖庙会是主要活动。时间9时至22时。"}
,
  {id:31, n:"Guozijian Street Sunset — East City", a:"East City", v:["sunset","history","beautiful"], d:25, s:"14th-century Confucian Academy street—the walls glow red-gold at 6:30pm—locals know this, tourists take photos of the Forbidden City instead.", st:"An ancient street. Confucian Academy on one side. At sunset in summer, the light hits the walls and they glow. Locals walk here. The tour groups are at the Forbidden City.", im:"Red walls glowing gold. The light on ancient stone. No crowds.", t:"Walk from Guozijian Street metro station. 5–6pm best. Free. Bring camera.", c:["history_big","beautiful"], r:"g", nn:"国子监街日落 — East City", ns:"14世纪孔庙街—墙壁在傍晚6:30发出红金色。", nst:"一条古老的街道。孔庙在一侧。", nt:"从国子监街地铁站步行。下午5–6点最好。"},
  {id:32, n:"Kunming Lake Swimming at Dawn — Summer Palace", a:"Haidian", v:["swimming","beautiful","hidden"], d:45, s:"Locals swim in the lake at the Summer Palace at 6am—before tourists arrive—the water is cold and clear.", st:"A massive lake at the heart of the Summer Palace. At 6am, locals arrive with goggles and caps. They swim laps. The water is clean. The palace buildings are reflected. It\'s quiet.", im:"A swimmer in the water. Palace buildings reflected. Dawn light on water.", t:"Summer Palace north gate. 6–8am. Bring goggles. 4€ entry. Locals-only swimming area (ask).", c:["swimming","day_trips"], r:"g", nn:"昆明湖晨泳 — Summer Palace", ns:"本地人在颐和园的湖里6点游泳。", nst:"夏宫中心的一个大湖。在早上6点，当地人到达。", nt:"夏宫北门。6–8点。带上护目镜。"},
  {id:33, n:"Juyongguan Pass — Ming Dynasty Trail", a:"North", v:["day_trips","history","ancient"], d:70, s:"30km north—the best-preserved section of the Great Wall—built by the Ming Dynasty—1.5 hour drive, then a 2-hour hike.", st:"The Wall here is thick stone. Built 600 years ago. The stairs are stone. The views are down valleys that go on forever. The restoration is minimal—you see the original work. Locals hike this section. No tourists.", im:"Stone wall winding up a ridge. Valleys descending. No people. Sky huge.", t:"Drive north 1.5 hours. Parking at Juyongguan. Hike 2 hours up and down. 20€ entry. Bring water.", c:["day_trips","history_big"], r:"g", nn:"居庸关 — Ming Dynasty Trail", ns:"30公里以北—长城最保存最完好的一段。", nst:"这里的城墙是厚实的石头。600年前建造。", nt:"向北驾驶1.5小时。停车在居庸关。"},
  {id:34, n:"Forbidden City Interior Passages — Secret Routes", a:"Central", v:["history","architecture","hidden"], d:10, s:"The service passages and hidden rooms inside the Forbidden City—meant for servants—now open 1 day per month—the architecture reveals itself.", st:"The Forbidden City has 1,000 rooms. Most are empty or off-limits. But once a month, the back passages and servant routes open. You walk through spaces the emperors never saw, the infrastructure of absolute power.", im:"A narrow stone passage. A small servant\'s room with a single window. Light coming from above.", t:"Book ahead online for hidden passages tours (usually third Wed of month). 60€. Call 8610-6513-2255 for schedule.", c:["history_big","architecture"], r:"y", nn:"故宫内部通道 — Secret Routes", ns:"故宫内部的仆人通道。", nst:"故宫有1000个房间。大多数是空的。", nt:"提前在线预订隐藏通道之旅。"},
  {id:35, n:"Dashanzi Art District — Converted Factory", a:"Northeast", v:["art","weird","local"], d:35, s:"Former military factory turned artist studios—galleries, sculptures outside, real artists working—open during studio hours.", st:"A converted factory complex. Chinese and international artists work in studios. Walk around. See work being made. The space is raw. It\'s not a museum or a polished gallery.", im:"An artist at work. A large abstract sculpture outside a studio. Red brick factory walls.", t:"Dashanzi Art District, Chaoyang. Bus or taxi. Check hours—studios vary. Free entry to exterior, galleries have fees.", c:["art","weird"], r:"g", nn:"大山子艺术区 — Converted Factory", ns:"前军事工厂变成的艺术家工作室。", nst:"一个改造的工厂综合体。中国和国际艺术家在工作室工作。", nt:"大山子艺术区，朝阳。公交或出租车。"},
  {id:36, n:"Yonghe Temple Morning Prayer — Northeast", a:"Northeast", v:["sacred","history","beautiful"], d:20, s:"Buddhist temple with monks chanting every morning at 7am—the sound reverberates through chambers—you sit and listen.", st:"Lamas in robes. They chant. The sound fills the temple. The incense. The gold. It\'s a real temple, not a museum. Locals and tourists mix. The prayer happens regardless.", im:"Red temple walls. Incense smoke. A lama in maroon robes chanting.", t:"Yonghe Temple, Dongzhimen. Open 9:30am–4:30pm daily. But morning prayer is before opening (arrive 6:45am, staff let you in). 20€ entry.", c:["sacred","history_big"], r:"g", nn:"雍和宫晨祷 — Northeast", ns:"每天早上7点有僧人吟诵的佛教寺院。", nst:"穿着僧袍的喇嘛。他们唱诵。声音充满寺庙。", nt:"雍和宫，东直门。每日上午9:30–16:30。"},
  {id:37, n:"Jingshan Park View — Central", a:"Central", v:["parks","sunset","free_entry"], d:8, s:"Free park on a hill with the only completely unobstructed 360° view of Beijing—5-story pagoda at the top.", st:"Climb the hill. At the top: a small pagoda. The view is complete. The Forbidden City is below. The city spreads forever. It\'s free. Locals bring families.", im:"The view from the top. The Forbidden City in the center. The city extending to the horizon.", t:"Jingshan Park, north of Forbidden City. Open 6am–9pm. Free. Carry water. Best sunset 6–7pm.", c:["parks","free_entry"], r:"g", nn:"景山公园景观 — Central", ns:"免费公园，可以看到北京的360°景观。", nst:"爬上山。顶部：一个小塔。景色完整。", nt:"景山公园，故宫北部。开放6-21点。"},
  {id:38, n:"Hutong Street Market — Local Neighborhood", a:"West", v:["food","market","local"], d:15, s:"A hutong alley where locals sell vegetables from carts—no tourists—the smell of fresh vegetables and grilling meat fills the narrow street.", st:"A traditional alley. Locals live here. In the morning, vendors push carts selling fresh vegetables, grilled meat on sticks. The smell is extraordinary. You eat standing up, talking to people. This is how Beijing eats.", im:"A vendor\'s cart piled with leafy greens. The steam from grilled skewers.", t:"Various hutong areas (Nanluoguxiang, Wudaoying). Best 7–9am. Bring cash only. Navigate with offline map.", c:["markets","food","local_only"], r:"g", nn:"胡同街市 — Local Neighborhood", ns:"一条胡同小巷，当地人出售蔬菜。", nst:"一条传统胡同。当地人住在这里。", nt:"各种胡同区域。最好7–9点。只带现金。"},
  {id:39, n:"Purple Forbidden City Artifact — Archaeology Museum", a:"South", v:["history","weird","museum"], d:30, s:"There is a sister Forbidden City south of Beijing—less known—the artifact collection is extraordinary—purple glazed tiles exist here only.", st:"Chengde Imperial Mountain Resort is north, but there\'s also a complex south. The purple glazed tiles are used only here—unusual in Forbidden City archaeology. The collection is extraordinary.", im:"Purple glazed tile roof. Golden dragon details. Light catching the glaze.", t:"Museum location varies. Research "purple glazed tiles Beijing museum" before visiting. Usually 30km radius. 15€ entry.", c:["history_big","weird"], r:"y", nn:"紫禁城文物 — 考古博物馆", ns:"北京南边有一座姐妹紫禁城。", nst:"成都山庄在北方，但南方也有一个综合体。", nt:"博物馆位置不同。预先研究。"},
  {id:40, n:"Temple of Heaven at 7am — Tai Chi Hour", a:"South", v:["greatest_hits","beautiful","sacred"], d:25, s:"Ming Dynasty temple—UNESCO site—at dawn, thousands of locals practice tai chi on the grounds—the building is magnificent enough to earn its fame.", st:"The building is blue tile and marble and extraordinary. Built 1420. At 7am, locals practice tai chi on the grounds. Slow movement. Hundreds of people. The temple rises behind them. The sound is the shuffle of feet and breathing.\n\nIt earned it.", im:"Tai chi practitioners moving slowly. The blue temple beyond. Morning mist on the ground.", t:"Temple of Heaven Park, south Beijing. Open 6am–10pm. 40€. Go 6–8am for tai chi. Respectful observation only.", c:["greatest_hits","sacred","history_big"], r:"g", nn:"天坛7点钟 — Tai Chi Hour", ns:"明朝寺庙—联合国教科文组织遗址.", nst:"建筑是蓝色瓷砖和大理石，非常不寻常。", nt:"天坛公园，南京北京。开放6-22点。"}];

  {id:2,title:"Imperial Beijing Dynasty Tour",desc:"Visit the throne rooms and residences of emperors: the Forbidden City's Hall of Supreme Harmony, the Summer Palace's imperial gardens, and the Temple of Heaven's cosmic geometry. Understand the empire's power structure.",places:[2, 3, 4],time:"6 hours"},
