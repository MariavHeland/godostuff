  {id:1,n:"Banksy Graffiti Trail — Various",a:"Various",v:["street_art", "local"],d:3,s:"Artist\'s hidden murals scattered throughout the city",st:"Bristol\'s famous street artist left signatures everywhere. Girl with Balloon, Well Hung Lover, Mild Mild West. Maps online. Treasure hunt through Stokes Croft and Bethnal Green.",im:"2000s: Banksy paints anonymously. 2024: Tourists hunt his work.",t:"Get street art map. Some fading—photograph now. Trespassing not required.",c:["street_art", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},

  {id:112, n:"Avon Gorge Swimming Hole — Clifton", a:"Clifton", v:["swimming","beautiful","hidden"], d:28, s:"Locals swim in a hidden pool on the Avon River—under the Clifton Suspension Bridge—the water is cold and clear.", st:"A path down to the river. In summer, locals wade and swim. The bridge is above. The gorge walls are steep. It\'s cold and specific. Few tourists find this.", im:"Water reflecting grey stone cliffs. The red bridge far above.", t:"Park near Clifton Suspension Bridge. Walk down (10 min). Free. June–August best.", c:["swimming","hidden"], r:"g", nn:"Avon Gorge Swimming Hole — Clifton", ns:"Locals swim in a hidden pool on the Avon.", nst:"Ein Pfad hinunter zum Fluss.", nt:"Parken Sie in der Nähe der Clifton Suspension Bridge."},
  {id:113, n:"Brandon Hill Park Sunset — City Center", a:"City Center", v:["sunset","parks","beautiful"], d:5, s:"Urban park where Bristol lights up at 6:30pm—the tower on the hill frames the light perfectly—locals know this.", st:"A green park in the middle of Bristol. On the hill: Cabot Tower. At sunset in summer, the light hits the tower and the buildings around the park glow. Locals bring blankets. It\'s free and beautiful.", im:"A stone tower glowing gold. Park spreading below lit by sunset.", t:"Brandon Hill Park, city center. Open all hours. Best 6–7pm May to August. Bring blanket.", c:["parks","romantic_water"], r:"g", nn:"Brandon Hill Park Sunset — City Center", ns:"Urban park where Bristol lights up at 6:30pm.", nst:"Ein grüner Park in der Mitte von Bristol.", nt:"Brandon Hill Park, Stadtzentrum."},
  {id:114, n:"Bath Roman Baths Day Trip — 20 Minutes", a:"South", v:["day_trips","history_big"], d:60, s:"20 minute train—2,000-year-old Roman bath complex still full of 46°C hot water—the oldest indoor plumbing in Europe.", st:"A Roman city 20 minutes south by train. The baths are preserved. Stone pools filled with hot water. The engineering is extraordinary. People have bathed here for 2,000 years.", im:"Ancient stone bath filled with green water. Steam rising. Carved stone walls.", t:"Train from Bristol Temple Meads (20 min). Bath Spa station to city center (walk 10 min). Baths open 9am–6pm. 15€. Book ahead summer.", c:["day_trips","history_big"], r:"g", nn:"Bath Roman Baths Day Trip — 20 Minutes", ns:"20 minute train—2,000-year-old Roman bath.", nst:"Eine römische Stadt 20 Minuten südlich.", nt:"Zug von Bristol Temple Meads (20 min)."},
  {id:115, n:"Bristol Street Art — Stokes Croft", a:"Stokes Croft", v:["art","weird","local"], d:18, s:"Entire neighborhood painted by street artists—walls change monthly—locals created this and tourists are unwelcome here.", st:"A working-class neighborhood taken over by street art. Every wall is painted. It\'s not a gallery or a tour. It\'s real artists working. The art changes. The neighborhood is raw and real.", im:"A building covered in wild spray paint. A new piece being painted.", t:"Stokes Croft, north Bristol. Walk the neighborhood. Best Sat–Sun. Respectful behavior only.", c:["art","weird"], r:"g", nn:"Bristol Street Art — Stokes Croft", ns:"Entire neighborhood painted by street artists.", nst:"Ein Arbeiterviertel, das von Straßenkünstlern übernommen wurde.", nt:"Stokes Croft, Nord-Bristol. Spazieren Sie."},
  {id:116, n:"St. Werburgh\'s City Farm — Local Spot", a:"Bedminster", v:["free_entry","local","parks"], d:12, s:"Community farm run by locals—pigs, cows, chickens—admission free, the café serves food grown here.", st:"A working farm in the middle of the city. Animals. Vegetables growing. The café makes food from what\'s grown here. It\'s run by volunteers. Real community. No tourists.", im:"A pig in a pen. Vegetables growing. A person eating at an outdoor table.", t:"St. Werburgh\'s Street, Bedminster. Open daily 10am–4pm. Free. Café open lunch hours.", c:["free_entry","parks","local_only"], r:"g", nn:"St. Werburgh\'s City Farm — Local Spot", ns:"Community farm run by locals.", nst:"Ein Bauernhof mitten in der Stadt.", nt:"St. Werburgh\'s Street, Bedminster."},
  {id:117, n:"Bristol Harbourside at 6am — Waterfront", a:"Waterfront", v:["quiet","beautiful","local"], d:10, s:"The harbor empty before the city wakes—boats, birds, the water still—the floating harbor is an engineering marvel.", st:"At 6am, Bristol Harbour is empty. A few fishermen. Birds. The water is still. The floating harbor (it\'s an engineering feat—the harbor level is controlled) is a place where locals walk quietly.", im:"A boat reflected in still water. A bird on a dock.", t:"Bristol Harbour area (multiple entry points). 5–7am best. Free. Bring coffee.", c:["quiet","parks"], r:"g", nn:"Bristol Harbourside at 6am — Waterfront", ns:"The harbor empty before the city wakes.", nst:"Um 6 Uhr morgens ist Bristols Hafen leer.", nt:"Bristol Harbour area. 5–7 Uhr best."},
  {id:118, n:"M Shed Museum — Free Entry", a:"Waterfront", v:["free_entry","history","local"], d:10, s:"Museum of Bristol life—free—housed in a 1950s warehouse—the social history is told through objects, not text.", st:"A warehouse converted to a museum. Bristol\'s real history. Not polished. Objects from everyday life. The story of Bristol\'s working class, its harbor, its past. Locals come. It\'s free.", im:"A display of old tools. A 1950s sign from a closed shop.", t:"Bristol Harbourside. Open daily 10am–5pm. Free. Café onsite.", c:["free_entry","history_big"], r:"g", nn:"M Shed Museum — Free Entry", ns:"Museum of Bristol life—free.", nst:"Ein Lagerhaus, das zu einem Museum umgewandelt wurde.", nt:"Bristol Harbourside. Täglich 10-17 Uhr geöffnet."},
  {id:119, n:"Graffiti Street — Artist Wall", a:"Bedminster", v:["art","weird","street art"], d:16, s:"An entire street where street artists are legally allowed to paint—the walls change weekly—owned by the artists themselves.", st:"A street where anything goes. Artists have painted it for years. The wall changes constantly. It\'s legal, it\'s intentional, it\'s not tourist. It\'s real artists making real work.", im:"A wall covered in complex, colorful spray paint. A fresh piece being finished.", t:"Graffiti Street, Bedminster. Best Sat–Sun. Respectful viewing. Artists may be working.", c:["art","weird"], r:"g", nn:"Graffiti Street — Artist Wall", ns:"An entire street where street artists are legally.", nst:"Eine Straße, wo künstlerische Graffiti erlaubt ist.", nt:"Graffiti Street, Bedminster."},
  {id:120, n:"Blaise Castle Estate — Hidden Manor", a:"West", v:["parks","history","beautiful"], d:35, s:"18th-century castle (not actually a castle, but a folly) on 600 acres of woodland—locals hike here but tourists don\'t know it exists.", st:"A fake castle built in the 1700s as a summer house. On 600 acres. The building is ornate and ridiculous. The woodland is beautiful. Locals bring families. It\'s hidden.", im:"A stone castle emerging from trees. A path through dense forest.", t:"Drive or bus to Blaise Castle Estate. Estate open dawn to dusk. Free. Bring water.", c:["parks","history"], r:"g", nn:"Blaise Castle Estate — Hidden Manor", ns:"18th-century castle on 600 acres.", nst:"Ein gefälschtes Schloss aus dem 18. Jahrhundert.", nt:"Drive or bus to Blaise Castle Estate."},
  {id:121, n:"Clifton Suspension Bridge Sunset Walk — Clifton", a:"Clifton", v:["greatest_hits","beautiful","engineering"], d:28, s:"Brunel\'s bridge from 1864—red-painted iron spanning 214 meters—walk it at dusk when the Avon gorge below turns purple.", st:"Designed by Isambard Kingdom Brunel when he was young. Opened in 1864. You walk across it. Below: the gorge, 76 meters down. At dusk, the stone glows red, the water below darkens to purple. The view is extraordinary.\n\nIt earned its fame.", im:"Walking across the bridge. The gorge below turning dark. The sun on the iron turning gold.", t:"Clifton, northwest Bristol. Walk 24/7. Toll 0.70€. Best 6–7pm May–August. Bring camera.", c:["greatest_hits","high_spots","beautiful"], r:"g", nn:"Clifton Suspension Bridge Sunset — Clifton", ns:"Brunels Brücke von 1864.", nst:"Entworfen von Isambard Kingdom Brunel.", nt:"Clifton, Nordwest-Bristol. Rund um die Uhr."}];

  {id:122,n:"St Nicholas Market Saturday Morning — Centro",a:"Centro",v:["greatest_hits", "local", "free entry"],d:10,s:"Historic covered market in city center. Saturday mornings packed with locals buying fresh food. Incredible authentic energy.",st:"St Nicholas Market has operated since the 1700s. Inside it's a maze of stalls: food, flowers, crafts, clothing. Saturday mornings are the real market.\n\nYou're surrounded by locals making weekly purchases. The noise and energy is authentic.",im:"Voices calling from stalls. Smells of fresh bread, flowers, spices. Light streaming through skylights. People with purpose.",t:"Free entry. Open Saturday 8am–4pm, weekdays 9am–5pm. Best 9–11am Saturday. Street food €5–12.",c:["greatest_hits"],r:"g",nn:"St Nicholas Market Saturday Morgen",ns:"Historički pokriveni tržnica u centru grada.",nst:"St Nicholas Market besteht seit den 1700er Jahren.",nt:"Freier Eintritt. Offen Samstag 8–16 Uhr. Am besten 9–11 Uhr Samstag."},
  {id:123,n:"Harbourside Evening Stroll — Waterfront",a:"Harbourside",v:["greatest_hits", "quiet", "beautiful"],d:15,s:"Redeveloped waterfront on the River Avon. Walk at dusk when restaurants empty. The water is calm. The light is gold.",st:"Bristol Harbourside was once industrial, now redeveloped but kept character. In the evening when day-trippers leave and restaurants open, it becomes peaceful.",im:"Water reflecting city lights at dusk. Historic buildings beside water. A few people walking. Bridge lit above.",t:"Free to walk. Best 5–8pm. Street from city center to Harbourside (15 min walk) or bus.",c:["greatest_hits"],r:"g",nn:"Harbourside Abendspaziergang",ns:"Ispunjeni vodeni dio na rijeci Avon.",nst:"Bristol Harbourside war einst industriell.",nt:"Kostenlos zu Fuß. Am besten 17–20 Uhr."},
  {id:124,n:"Cabot Tower Light at Sunset — High Spots",a:"Brandon Hill",v:["greatest_hits", "beautiful", "views"],d:8,s:"Red sandstone tower (100 feet) in Brandon Hill Park. Climb it at sunset for 360-degree views. The tower glows red in the light.",st:"Cabot Tower built in 1898 as a monument. It sits on a hill in the middle of the city. Inside, climb narrow stairs to the top. The view is 360 degrees.\n\nAt sunset, the tower glows red.",im:"A red stone tower against orange sunset sky. The city small below, lights appearing. The curve of the river visible.",t:"Free entry. Park open dawn to dusk. Best 6–7:30pm. Central, 10 min walk from center. Narrow stairs, 100+ steps.",c:["greatest_hits"],r:"g",nn:"Cabot Tower Licht bei Sonnenuntergang",ns:"Crvena pješčana kula u Brandon Hill parku.",nst:"Cabot Tower wurde 1898 als Denkmal erbaut.",nt:"Kostenlos. Beste 18–19:30 Uhr."},
  {id:125,n:"SS Great Britain Interior at Night — Maritime",a:"Harbourside",v:["greatest_hits", "history", "weird"],d:45,s:"Brunel's 1843 steamship, first iron-hulled propeller-driven ship. Now a museum. At night it's atmospheric: narrow metal corridors.",st:"The SS Great Britain is the oldest iron-hulled steamship in existence. Designed by Isambard Kingdom Brunel. You walk through cabins and engine rooms. You're inside a 180-year-old ship.\n\nAt night, when fewer people are there, the metal corridors echo. You hear the water below.",im:"Narrow iron corridor lit by cabin lamps. Wooden cabins with period furniture. The ship rocking slightly. The smell of wood and metal.",t:"Entry €18. Evening hours May–September, 10am–5:30pm daily. Harbourside. Allow 2 hours.",c:["greatest_hits"],r:"g",nn:"SS Great Britain Interieur bei Nacht",ns:"Brunelova parobroda iz 1843. godine.",nst:"SS Great Britain ist das älteste Schiff mit eisernem Rumpf.",nt:"Eintritt €18. Abendstunden Mai–September."},
  {id:126,n:"St Werburgh's Street Art Quarter Late Afternoon — Art",a:"St Werburgh",v:["greatest_hits", "art", "weird"],d:20,s:"Pedestrian streets covered in large-scale murals and street art. Legal walls for artists. The pieces change. It's colorful, raw, genuine.",st:"St Werburgh's is a small area that became an open-air gallery. Artists paint murals legally here. The work is serious—large, complex, colorful pieces. The vibe is working artists creating for the community, not for Instagram.",im:"Massive colorful murals covering entire walls. Spray paint equipment. A piece being finished in golden hour light. Graffiti and stencil work.",t:"Free. St Werburgh district (south of city center). Best 3–6pm. 20 min bus or walk from center. Bring camera. Respect artists.",c:["greatest_hits"],r:"g",nn:"St Werburgh's Street Art Quarter",ns:"Pješačke ulice pokrivene velikim zidnim slikama.",nst:"St Werburgh's ist eine kleine Gegend, die zur Open-Air-Galerie wurde.",nt:"Kostenlos. Am besten 15–18 Uhr."}

</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Bristol Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
