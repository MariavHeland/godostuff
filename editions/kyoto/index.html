*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
@keyframes diceShake{0%,100%{transform:rotate(0deg) scale(1)}15%{transform:rotate(-18deg) scale(1.35)}30%{transform:rotate(16deg) scale(1.35)}45%{transform:rotate(-12deg) scale(1.25)}60%{transform:rotate(10deg) scale(1.2)}75%{transform:rotate(-6deg) scale(1.1)}}
@keyframes diceSpin{0%{transform:rotateY(0deg) scale(1.1)}100%{transform:rotateY(360deg) scale(1.1)}}
@keyframes slotFlicker{0%,100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0px)}50%{opacity:.55;transform:translateY(-6px) scale(.96);filter:blur(1.5px)}}
@keyframes finalLand{0%{opacity:0;transform:scale(.75) translateY(28px)}65%{transform:scale(1.08) translateY(-4px)}85%{transform:scale(.97) translateY(2px)}100%{opacity:1;transform:scale(1) translateY(0)}}

@keyframes floatSuit2{0%,100%{transform:translateY(0) rotate(0deg);opacity:.08}50%{transform:translateY(14px) rotate(-6deg);opacity:.18}}

.lang-btn:not(.active){background:white;color:#888}

<script>
const P = [{id:1,n:"Fushimi Inari at Dawn",a:"Fushimi",v:["hidden","beautiful","local"],d:45,s:"Thousands of vermillion torii gates wind up the mountain in the early morning silence",st:"Arriving before 6am to see the stone foxes emerge from mist",im:"Golden light filtering through orange gates while cicadas buzz",t:"Wear comfortable shoes, bring water, exit by 8am before crowds arrive",c:["history_big"],r:"g",nn:"伏見稲荷大社",ns:"千の鳥居が朝焼けに浮かぶ",nst:"早朝の静寂の中で、石造りの狐たちが霧から姿を現す",nt:"歩きやすい靴を履いて、水を持参し、8時までに出口に達してください"},{id:2,n:"Philosopher Path at Sunrise",a:"Higashiyama",v:["beautiful","quiet","local"],d:25,s:"A stone canal path lined with cherry trees runs through a residential neighbourhood",st:"Walking the entire 1.8km path solo before 7am",im:"Early morning light on water, stone lanterns emerging from shadow",t:"Start at the north end for fewer tourists, bring a camera",c:["beautiful"],r:"g",nn:"哲学の道",ns:"桜並木の間を水が静かに流れる",nst:"朝5時に北側の出発地点から1.8km の道を歩く",nt:"カメラを持参し、少ない観光客の北側から始めてください"},{id:3,n:"Kinkaku-ji Before Opening",a:"Kitayama",v:["beautiful","quiet"],d:20,s:"The Golden Pavilion reflected in still water, waiting for the day",st:"Arriving at 8:45am when gates open, visiting the temple garden in silence",im:"Mist rising from the pond, gold catching the first direct light",t:"Go early, study the garden composition before crowds, visit the tearoom",c:["beautiful","history_big"],r:"y",nn:"金閣寺",ns:"池の静寂に金の光が映る",nst:"朝8時45分、門が開く時間に到着し、庭園を静寂の中で歩く",nt:"列ができる前に到着し、茶室を訪問してください"},{id:4,n:"Gion District at 6am",a:"Gion",v:["local","history","hidden"],d:30,s:"The wooden geisha district before the day begins, only locals and early risers",st:"Walking back streets where geishas head home from evening appointments",im:"Wooden facades, quiet cobblestones, occasional glimpse of someone in kimono",t:"Walk quietly, do not photograph geishas, visit teahouses for breakfast",c:["local_only"],r:"g",nn:"祇園",ns:"古い木造の家並みが静寂に包まれている",nst:"夜の仕事から帰る芸者を見かけることもある狭い道を歩く",nt:"静かに歩き、芸者を撮影しないでください。朝食は茶屋で"},{id:5,n:"Bamboo Grove Before 7am",a:"Arashiyama",v:["beautiful","hidden"],d:20,s:"Towering bamboo creates a green tunnel with no other visitors",st:"Entering the north entrance at 6:30am and walking the full grove alone",im:"Pale green light filtering through dense bamboo, sounds completely muffled",t:"Enter from north gate, walk to south, exit before tourist buses arrive",c:["beautiful"],r:"g",nn:"竹林の道",ns:"天井から床まで緑色の竹で埋められている",nst:"朝6時30分に北門から入場し、竹林全体を一人で歩く",nt:"北門から入場し、8時までに南口から出てください"},{id:6,n:"Nishiki Market at 5pm",a:"Nishiki",v:["local","free"],d:30,s:"Kyoto food market closing down, vendors offering discounts to locals",st:"Browsing produce, pickles, tea as stallholders pack up for the day",im:"Neon lights starting to flicker on, vendor voices calling final prices",t:"Bring cash, ask shopkeepers about seasonal items, taste before buying",c:["local_only"],r:"g",nn:"錦市場",ns:"その日の商品が割引で販売されている",nst:"営業終了時に地元の人々と一緒に買い物をする",nt:"現金を用意し、店主に季節の品について尋ねてください"},{id:7,n:"Fushimi Sake Breweries",a:"Fushimi",v:["local","history"],d:60,s:"Family-run sake breweries with tasting rooms, some free to visit",st:"Learning sake production from small brewers, tasting seasonal varieties",im:"Wooden barrels, the smell of fermentation, sunlight through old warehouse windows",t:"Visit 3-4 breweries, ask about production methods, buy direct from makers",c:["local_only"],r:"y",nn:"伏見の日本酒蔵",ns:"小さな家族経営の蔵が軒を連ねている",nst:"醸造工程を学び、季節限定の酒を試飲する",nt:"3つから4つの蔵を訪問し、製造方法について尋ねてください"},{id:8,n:"Higashiyama Shrine Steps",a:"Higashiyama",v:["quiet","beautiful"],d:40,s:"1000 stone steps wind through forest to a hidden shrine",st:"Climbing at dawn, resting at small wayside shrines, reaching the peak alone",im:"Forest canopy opening to sky, stone lanterns half-buried in moss",t:"Start at 5:30am, wear hiking boots, bring water, visit tiny shrine at top",c:["nature"],r:"g",nn:"清水寺の裏参道",ns:"千段の石段が森の中へ続いている",nst:"夜明け前に登り、小さな社を何度も見かけながら進む",nt:"5時30分に出発し、ハイキングブーツを履いて、水を持参してください"},{id:9,n:"Pontocho Alley Evening",a:"Pontocho",v:["beautiful","local"],d:20,s:"Narrow alley along the Kamogawa with wooden teahouses, geisha passing",st:"Walking the alley at 6pm, watching the river and people, visiting a cheap izakaya",im:"Lantern light on water, the sound of shamisen floating from teahouses",t:"Do not photograph geishas, eat at ground-level izakayas, sit by the river",c:["romantic_water"],r:"y",nn:"先斗町",ns:"川に沿って細い路地が続いている",nst:"夜18時に歩きながら、川と人々を眺める",nt:"芸者を撮影せず、川沿いの居酒屋に座ってください"},{id:10,n:"Nishijin Textile District",a:"Nishijin",v:["local","history"],d:45,s:"Neighbourhood where silk kimono are still made, with traditional looms",st:"Visiting weaver studios, learning about kimono production, watching artisans work",im:"The rhythmic clicking of wooden looms, bolts of silk catching light",t:"Visit early morning, ask weavers about their work, small purchases support families",c:["local_only","architecture"],r:"y",nn:"西陣織",ns:"今も絹の着物が作られている",nst:"工房を訪問し、職人が働く様子を見学する",nt:"早朝に訪問し、職人に仕事について尋ねてください"},{id:11,n:"Cemetery on the Hill",a:"Higashiyama",v:["quiet","history","hidden"],d:30,s:"Ancient cemetery with moss-covered graves and overgrown paths",st:"Walking alone through hundreds of weathered tombstones",im:"Dappled light, stone moss, the feeling of centuries settling",t:"Respect the space, walk quietly, visit in morning light",c:["history_big"],r:"g",nn:"野仏庵の墓所",ns:"苔むした古い墓石が山いっぱいにある",nst:"一人で何百もの石碑の間を歩く",nt:"尊重を持ち、静かに歩き、朝日の中で訪問してください"},{id:12,n:"Demachiyanagi Coffee Shops",a:"Demachiyanagi",v:["local","quiet"],d:20,s:"Neighbourhood east of downtown with independent cafes and local clientele",st:"Visiting small roastery cafes, meeting university students and artists",im:"Pour-over coffee, notebook-filled tables, conversation in soft voices",t:"Ask baristas for recommendations, order coffee, sit for hours",c:["local_only"],r:"y",nn:"出町柳",ns:"小さな自家焙煎コーヒー店がいくつかある",nst:"自家焙煎のコーヒーを飲みながら地元の人々に会う",nt:"バリスタに推奨を尋ね、何時間も座ってください"},{id:13,n:"Kurama Mountain Day Trip",a:"Kurama",v:["nature","hidden"],d:240,s:"Mountain village north of the city with hiking, hot springs, and temples",st:"Taking the cable car up, hiking to Kibune shrine, soaking in onsen",im:"Misty forest canopy, hot spring surrounded by trees, stars from the mountain",t:"Start early, bring hiking clothes, stay for afternoon onsen",c:["nature"],r:"y",nn:"鞍馬山",ns:"京都の北にある山村",nst:"ケーブルカーで上り、森の中をハイキングする",nt:"早朝に出発し、ハイキング服を持参してください"},{id:14,n:"Ohara Valley Villages",a:"Ohara",v:["nature","hidden","local"],d:180,s:"Peaceful mountain valley with ancient temples, farmland, and few tourists",st:"Visiting Sanzen-in temple, walking between farmhouses, eating village food",im:"Autumn leaves reflected in pools, farmhouses with smoke, quiet everywhere",t:"Explore side roads, eat at local restaurants, stay until evening",c:["nature"],r:"y",nn:"大原",ns:"京都の北東にある静かな谷",nst:"古い寺院や農場を訪問し、村の食事をする",nt:"脇道を探索し、地元のレストランで食べてください"},{id:15,n:"Shimogamo Shrine Forest",a:"Shimogamo",v:["nature","quiet"],d:30,s:"Ancient forest surrounding a shrine, protected for 1000 years",st:"Walking deep into the woods, finding small shrines, sitting in silence",im:"Huge cypress trees, light filtering through canopy, complete stillness",t:"Visit in morning, walk the outer paths, sit on benches and listen",c:["nature"],r:"g",nn:"下鴨神社の森",ns:"1000年保護されている古い森",nst:"森の中を歩き、小さな社を見つける",nt:"朝に訪問し、静かに座ってください"},{id:16,n:"Philosopher Path Temples",a:"Higashiyama",v:["history","quiet"],d:50,s:"Small temples hidden along the Philosopher Path canal",st:"Stopping at each temple, exploring gardens, drinking tea",im:"Temple gates appearing suddenly, gardens revealing themselves one step at a time",t:"Walk slowly, visit 5-6 small temples, end at Nanzenji",c:["history_big"],r:"y",nn:"南禅寺周辺の小さな寺院",ns:"哲学の道に沿った隠れた小さな寺院",nst:"各寺院で停止し、庭園を探索する",nt:"ゆっくり歩き、5つから6つの小さな寺院を訪問してください"},{id:17,n:"Arashiyama Togetsu Bridge",a:"Arashiyama",v:["beautiful","quiet"],d:15,s:"Stone bridge crossing the Oigawa river at the base of bamboo grove",st:"Sitting on the bridge at sunset, watching river and forest",im:"Golden light on water, bamboo green against darkening sky",t:"Visit late afternoon, bring a jacket, sit for sunset",c:["romantic_water"],r:"g",nn:"渡月橋",ns:"竹林の下を流れる川に架かる橋",nst:"夕方に橋に座り、川と森を眺める",nt:"午後遅くに訪問し、ジャケットを持参してください"},{id:18,n:"Sanjusangendo Temple",a:"Higashiyama",v:["history","beautiful"],d:25,s:"Hall containing 1000 golden Buddha statues in perfect rows",st:"Standing alone in the hall, walking between rows of statues",im:"Golden light reflecting off 1000 identical faces, overwhelming sense of presence",t:"Go early morning, walk slowly, meditate in the silence",c:["history_big"],r:"y",nn:"三十三間堂",ns:"1000体の金色の仏像が並んでいる",nst:"1000体の仏像の間を歩く",nt:"早朝に訪問し、ゆっくり歩いてください"},{id:19,n:"Kiyomizu-dera Temple",a:"Higashiyama",v:["history","beautiful"],d:30,s:"Hilltop temple with wooden veranda overlooking the valley",st:"Climbing steep stone steps, viewing the city from the temple platform",im:"Wooden floors worn smooth by centuries, views stretching to mountains",t:"Arrive early, visit the water shrine below, explore back gardens",c:["history_big"],r:"y",nn:"清水寺",ns:"谷を見下ろす高台にある寺院",nst:"急な石段を登り、寺院から都市を眺める",nt:"早朝に到着し、下の水の社を訪問してください"},{id:20,n:"Maruyama Park",a:"Higashiyama",v:["quiet","local"],d:30,s:"Park in the hills with walking paths, views, and local resting spots",st:"Walking trails, sitting under trees, watching locals exercise",im:"Morning mist lifting from forest, people stretching in clearings",t:"Visit early, bring a book, sit for hours",c:["parks"],r:"g",nn:"円山公園",ns:"丘の中の静かな公園",nst:"小道を歩き、木の下に座る",nt:"早朝に訪問し、読書をしてください"},{id:21,n:"Yasaka Pagoda",a:"Higashiyama",v:["beautiful","history"],d:15,s:"Five-story pagoda silhouetted against the sky",st:"Finding angles to photograph, sitting in nearby buildings",im:"Pagoda rising above temple roofs, sunset turning wood to fire",t:"Photograph from different angles, visit at dusk",c:["history_big"],r:"g",nn:"八坂塔",ns:"空に対して矢を立てる塔",nst:"異なる角度から塔を見る",nt:"写真を撮り、夜間に訪問してください"},{id:22,n:"Gion Shrine",a:"Gion",v:["local","quiet"],d:20,s:"Small shrine in the middle of the geisha district, frequented by locals",st:"Visiting early morning, seeing geishas passing on their way",im:"Simple wooden shrine, lanterns just lit, geishas in silk crossing the square",t:"Do not photograph, visit very early, sit and observe",c:["local_only"],r:"g",nn:"八坂神社",ns:"祇園の真ん中にある小さな神社",nst:"早朝に訪問し、芸者を見かける",nt:"写真を撮らず、観察に徹してください"},{id:23,n:"Katsura Imperial Villa Grounds",a:"Arashiyama",v:["beautiful","quiet"],d:90,s:"Imperial villa gardens with reserved tours, architectural masterpiece",st:"Booking tour weeks ahead, exploring garden design with guide",im:"Water gardens, tea houses hidden in bamboo, the sound of streams",t:"Reserve far in advance, follow guide exactly, take notes on design",c:["beautiful"],r:"y",nn:"桂離宮",ns:"皇室の別荘の庭園",nst:"ガイド付きツアーで庭園設計を学ぶ",nt:"何週間も前に予約し、ガイドの指示に従ってください"},{id:24,n:"Ryoan-ji Temple Garden",a:"Arashiyama",v:["quiet","beautiful"],d:45,s:"Famous rock garden with 15 rocks in sand, meditation focus",st:"Sitting silently, trying to see all 15 rocks (only 14 visible from any angle)",im:"Raked sand patterns, dark rocks catching light, mountain backdrop",t:"Arrive very early, sit for 30 minutes, study the garden composition",c:["beautiful"],r:"y",nn:"龍安寺",ns:"15個の石がある庭園",nst:"静かに座り、瞑想する",nt:"非常に早く到着し、30分間座ってください"},{id:25,n:"Sagano Neighbourhood Walk",a:"Sagano",v:["local","quiet"],d:60,s:"Tree-lined streets and farms west of bamboo grove, few tourists",st:"Walking back roads, visiting small temples, eating at local restaurants",im:"Cypress trees dripping with rain, temple bells in distance, silence",t:"Get a local map, explore side streets, eat where locals eat",c:["local_only"],r:"g",nn:"嵯峨野",ns:"竹林の西にある地元の町",nst:"裏道を歩き、地元の寺院を訪問する",nt:"地元の地図を手に入れ、脇道を探索してください"},{id:26,n:"Tenryu-ji Temple",a:"Sagano",v:["history","beautiful"],d:40,s:"UNESCO temple with famous garden and river views",st:"Exploring the garden in sequence, viewing river from upper terrace",im:"Garden revealing itself at each step, borrowed scenery of mountains",t:"Arrive before 9am, study the garden philosophy, visit the bamboo grove after",c:["beautiful","history_big"],r:"y",nn:"天龍寺",ns:"ユネスコの寺院",nst:"庭園を順番に探索する",nt:"朝9時前に到着し、庭園の哲学を学んでください"},{id:27,n:"Okochi Sanso Villa",a:"Sagano",v:["beautiful","hidden"],d:45,s:"Private villa on hillside with gardens and tea house",st:"Walking through gardens, sitting in tea house overlooking city",im:"City lights from mountain, tea cup warming hands, complete silence",t:"Pay entry fee, sit for tea, walk slowly through gardens",c:["beautiful"],r:"y",nn:"大覚寺御所跡",ns:"山腹に位置する俳優の別荘",nst:"庭園を歩き、茶室に座る",nt:"入場料を払い、ゆっくり庭園を歩いてください"},{id:28,n:"Togetsukyo Bridge Sunrise",a:"Arashiyama",v:["beautiful","quiet"],d:15,s:"Bridge at first light, river mist rising, complete solitude",st:"Arriving at 5:30am, watching light change on water and mountains",im:"Pre-dawn grey turning to pink, mist burning away, world coming awake",t:"Bring warm clothes, stand alone, watch the light transform",c:["beautiful"],r:"g",nn:"渡月橋の夜明け",ns:"最初の光の中の橋",nst:"5時30分に到着し、水と山の光の変化を見守る",nt:"暖かい服を持参し、一人で立ってください"},{id:29,n:"Nanzen-ji Temple Complex",a:"Higashiyama",v:["history","quiet"],d:60,s:"Large temple complex with multiple halls, gardens, and subtemples",st:"Following a self-guided route through the buildings and grounds",im:"Wooden gates opening to gardens, monks moving silently",t:"Start early, visit all subtemples, end at the massive san-mon gate",c:["history_big"],r:"y",nn:"南禅寺",ns:"複数の堂宇と庭園のある大きな寺院複合体",nst:"建物と庭園を通じてセルフガイドルートに従う",nt:"早朝に開始し、すべての小寺院を訪問してください"},{id:30,n:"Hokanji Temple",a:"Higashiyama",v:["history","weird"],d:20,s:"Temple with quirky 5-story pagoda, slightly off-kilter and charming",st:"Climbing the pagoda, discovering the temple has a unique leaning quality",im:"Creaking wooden floors, narrow stairs, views from each level",t:"Climb the pagoda slowly, enjoy the quirky architecture",c:["history_big"],r:"y",nn:"法観寺",ns:"ユニークな五層の塔を持つ寺院",nst:"塔 <p className="text-xs leading-relaxed mt-1" style={{color:"#9990b8",fontStyle:"italic"}}>京都を安全に楽しむため、すべての通知と警告に従ってください。</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#c8c0e0"}}>Some locations include natural environments, heights, water, or areas that may be restricted or unsafe. You explore at your own risk.</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#c8c0e0"}}>Always follow local laws, respect private property, and check current conditions before visiting any place.</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#e8c0f0"}}>If you are under 18, please explore responsibly.</p>
</div>
<button onClick={onAccept} className="mt-6 w-full py-4 rounded-xl text-sm font-bold text-white" style={{background:"linear-gradient(135deg,#6366F1,#8B5CF6)",border:"none",cursor:"pointer",maxWidth:380,fontSize:"15px"}}>I understand — let me explore<br/><span style={{fontSize:"12px",opacity:0.85}}>了解しました</span></button>
</div>);

const PlaceCard=({place:p,idx,onOpen,lang})=>(
<button onClick={()=>onOpen(p)} className="text-left w-full rounded-2xl p-4 fade-up" style={{background:"white",border:"1.5px solid #e4e4ed",cursor:"pointer",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div style={{flex:1}}>
<h3 className="text-base font-bold" style={{color:"#1a1a2e",lineHeight:1.3}}>{lang==="native"&&p.nn?p.nn:p.n}</h3>
{lang==="native"&&p.nn&&<p className="text-xs" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-xs mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p></div>
<span className="text-xs font-bold px-2 py-1 rounded-full ml-2 flex-shrink-0" style={{background:p.r==="g"?"#dcfce7":"#fef9c3",color:p.r==="g"?"#166534":"#854d0e"}}>{p.r==="g"?"Green":"Yellow"}</span></div>
<p className="text-sm mt-2" style={{color:"#555",lineHeight:1.5}}>{lang==="native"&&p.ns?p.ns:p.s}</p>
<div className="flex gap-1.5 mt-2 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-2 py-0.5 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</button>);

const PlaceDetail=({place:p,onClose,onNext,onPrev,lang})=>(
<div style={{position:"fixed",inset:0,zIndex:1000,backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat",overflowY:"auto"}}>
<div className="px-5 pt-6 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex justify-between items-center mb-4">
<button onClick={onClose} className="text-sm font-bold" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← Back</button>
<div className="flex gap-2">
<button onClick={onPrev} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>←</button>
<button onClick={onNext} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>→</button></div></div>
<h1 className="text-2xl font-black" style={{color:"#1a1a2e"}}>{lang==="native"&&p.nn?p.nn:p.n}</h1>
{lang==="native"&&p.nn&&<p className="text-sm font-medium" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-sm mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p>
{PLACE_IMAGES[p.id]&&<div className="mt-4 rounded-xl overflow-hidden" style={{maxHeight:"400px"}}>
<img src={`images/${PLACE_IMAGES[p.id]}`} alt={p.n} style={{width:"100%",maxHeight:"360px",objectFit:"contain",display:"block",borderRadius:"8px"}}/>
<p className="text-xs mt-1" style={{color:"#aaa",textAlign:"center"}}>AI-generated illustration</p></div>}
<div className="mt-4 p-4 rounded-xl" style={{background:"#f8f8ff"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#1a1a2e"}}>The Story</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nst?p.nst:p.st}</p></div>
{p.im&&<div className="mt-3 p-4 rounded-xl" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#a78bfa"}}>Imagine This</h3>
<p className="text-sm" style={{color:"#b8b0d0",lineHeight:1.7,fontStyle:"italic"}}>{p.im}</p></div>}
{p.t&&<div className="mt-3 p-4 rounded-xl" style={{background:"#f0fdf4"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#166534"}}>{lang==="native"?"Tips / "+LANG_NAME:"Tips"}</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nt?p.nt:p.t}</p>
<a href={`https://maps.google.com/?q=${encodeURIComponent(p.n+', '+CITY_EN)}`} target="_blank" rel="noopener noreferrer"
  className="mt-3 flex items-center gap-2 text-sm font-bold"
  style={{color:"#166534",textDecoration:"none",display:"inline-flex",marginTop:"10px"}}>
  🗺 Get directions
</a>
</div>}
{p.ef&&<p className="text-xs mt-3 pt-3" style={{color:"#555",lineHeight:1.7,borderTop:"1px solid #dcfce7"}}>🍔 {p.ef}</p>}
{p.sf&&<p className="text-xs mt-2" style={{color:"#555",lineHeight:1.7}}>🏠 {p.sf}</p>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
<div className="mt-5">
<p className="text-xs font-bold mb-2" style={{color:"#888",letterSpacing:"0.08em",textTransform:"uppercase"}}>City Moods</p>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} style={{borderRadius:10,overflow:"hidden",aspectRatio:"2/3",background:"#eee"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>)}</div></div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TBGS={"places":"url('../../textures/tex13.webp') center/cover fixed no-repeat","collections":"url('../../textures/tex14.webp') center/cover fixed no-repeat","missions":"url('../../textures/tex15.webp') center/cover fixed no-repeat","plan":"url('../../textures/tex16.webp') center/cover fixed no-repeat","phrases":"url('../../textures/tex17.webp') center/cover fixed no-repeat","default":"url('../../textures/tex13.webp') center/cover fixed no-repeat"};function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Kyoto Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Kyoto Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
