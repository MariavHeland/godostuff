const PLACE_IMAGES={,{id:41,n:"Fushimi Inari Shrine",a:"Fushimi",v:["famous","beautiful","weird"],d:120,s:"10,000 vermilion torii gates ascending a mountain. The gates form tunnels. Walk them at dawn for solitude.",st:"Fushimi Inari is one of the oldest and most important Shinto shrines in Japan, founded in 711. It is known entirely for its torii gates—thousands upon thousands of them, vermilion red, stacked so densely they form tunnels leading up the mountain. The effect is hypnotic, meditative, almost overwhelming.\\n\\nThe complication: it is famous, so it is crowded. The secret is the time. Arrive at 5:45am on a weekday. You will have the gates almost entirely to yourself for the first 45 minutes. Climb slowly. Sit halfway up. Watch the light change as the sun rises through the gates.",im:"Vermilion gates in darkness, then slowly turning golden as the sun rises through them.",t:"Free. Always open. Fushimi Inari Station, JR Nara Line, 20 min from Kyoto Station. Arrive before 6am. The main shrine area is sufficient.",c:["greatest_hits","beautiful","weird"],r:"g",nn:"伏見稲荷大社",ns:"山を上る10,000個の朱い鳥居。",nst:"伏見稲荷は日本で最も古く、最も重要な神社の1つで、711年に創建された。10,000個の朱い鳥居で知られており、非常に密集して積み重ねられ、山を上るトンネルを形成している。その効果は催眠的で、瞑想的で、ほぼ圧倒的だ。\\n\\nコツは時間だ。平日午前5時45分に到着しよう。最初の45分間、ゲートはほぼ完全に独りきりになるだろう。ゆっくり登る。",nt:"無料。常に開放。伏見稲荷駅。京都駅から約20分。午前6時前に到着。"},{id:42,n:"Arashiyama Bamboo Grove",a:"Ukyo",v:["famous","beautiful"],d:45,s:"A forest of bamboo 40 feet tall. The stalks are so close together you can touch both sides at once.",st:"The Arashiyama Bamboo Grove is a Japanese postcard come to life. A narrow path runs through a bamboo forest where the stalks reach 40+ feet into the air. The path is only wide enough for single-file walking. The stalks are so dense and tall that they filter the light into a specific shade of green that you cannot find elsewhere.\\n\\nThe complication: it is famous, so it is crowded. But go at 6:30am on a weekday. The path will be nearly empty. The light will be exactly right. The sound of the bamboo, the smell, the closeness of the stalks—all of it works the way it was designed to work.",im:"Towering green stalks, dappled light, the rustling sound of bamboo in wind.",t:"Free. Open 24 hours. Sagaotenryuji-Susukinobabacho, Ukyo Ward. Train: Randen Tram to Sagatenryuji. Go before 7am. The path is exactly 400m.",c:["greatest_hits","beautiful","free"],r:"g",nn:"嵐山竹林",ns:"40フィートの竹林。",nst:"嵐山竹林は日本のポストカードが人生に来たものだ。狭い道が竹林を通り、茎は40フィート以上の空気に達する。道幅は一列歩行にのみ十分である。茎の密度が高く、背が高いため、光を特定の緑色にフィルタリングしている。\\n\\n複雑さ：有名なので混雑している。しかし、平日の午前6時30分に行こう。その道はほぼ空になる。",nt:"無料。24時間営業。京都市右京区嵯峨天龍寺門前町。電車：嵐電で嵐山天龍寺駅。午前7時前に行く。"},{id:43,n:"Kiyomizu-dera Temple",a:"Higashiyama",v:["famous","beautiful","history"],d:45,s:"A 1,200-year-old temple built on a cliff without a single nail. The wooden stage extends into air.",st:"Kiyomizu-dera was founded in 778 and is one of the oldest temples in Kyoto. The main building is built on a cliff, supported by 139 wooden pillars, without a single nail. The structure has stood for over a thousand years. The wooden stage extends out over the cliff, and standing on it you feel the ancient engineers' confidence in their design.\\n\\nGo at sunset, 5:30-6:30pm. The light turns golden and the city below the cliff begins to glow. The crowds thin out. You're standing on a wooden platform built 800 years ago, watching the light change in the valley below.",im:"A wooden platform suspended over a drop. The city below glowing gold in evening light. Mountains in the distance.",t:"₩1,000 admission. 1am-5pm. Higashiyama-ku. Bus: #100 or #101 from Kyoto Station to Kiyomizu-michi stop. Best 5-6pm. 200+ steps—bring comfortable shoes.",c:["greatest_hits","beautiful","history"],r:"g",nn:"清水寺",ns:"1,200年前に建設された崖の寺院。",nst:"清水寺は778年に創建され、京都最古の寺院の一つだ。主要な建物は崖の上に建設され、139本の木製柱で支えられ、単一の釘がない。構造は1000年以上持続している。木製のステージは崖を越えて伸び、その上に立つと古代の技術者の設計への信頼を感じる。\\n\\n日没時、午後5時30分～6時30分に行こう。光が金色に変わり、崖下の街が輝き始める。",nt:"₩1,000 入場料。午前1時～午後5時。東山区。バス：京都駅から#100または#101で清水道停留所。午後5-6時がベスト。"},{id:44,n:"Gion District",a:"Higashiyama",v:["famous","beautiful","local"],d:45,s:"Kyoto's geisha district. Wooden machiya houses, lantern-lit lanes. You might see a geisha.",st:"Gion is Kyoto's most famous entertainment district and has been for centuries. The streets are lined with traditional wooden machiya houses, many now converted to restaurants, tea houses, and bars. The alleyways—especially Hanamikoji and Shirakawa—are narrow and lit by soft lanterns. On a warm evening, you can almost feel the history.\\n\\nGo at dusk, 6-7pm. The sun is low, the lanterns are just lighting up, and locals are heading out for the evening. Walk slowly. Don't rush. If you see a woman in kimono, it's likely a geisha heading to an appointment—don't photograph her.",im:"Narrow wooden lane, soft golden light from lanterns, wooden doors, the silhouette of someone in kimono.",t:"Free to walk. Higashiyama-ku, centered on Hanamikoji Street. Bus: #100 or #101 to Gojo-dori or Gion stops. Best 6-8pm. Restaurants ₩5,000+.",c:["greatest_hits","beautiful","local"],r:"g",nn:"祇園",ns:"京都の芸者地区。",nst:"祇園は京都で最も有名な歓楽街で、何世紀にもわたってそうであった。通りは伝統的な木製の町家で並んでおり、現在多くはレストラン、茶室、バーに改装されている。路地、特に花見小路と白川は狭く、柔らかいランタンで照らされている。\\n\\n夕暮れ時、午後6～7時に行こう。太陽は低く、ランタンはちょうど点灯し始め、地元の人々は夜に出かけている。ゆっくり歩く。",nt:"散歩は無料。東山区、花見小路を中心。バス：#100または#101で五条通りまたは祇園停留所。午後6-8時がベスト。"},{id:45,n:"Kinkaku-ji (Golden Pavilion)",a:"Kita",v:["famous","beautiful"],d:60,s:"A three-story pavilion covered entirely in gold leaf. Built in 1398. The reflection in the water is the real thing.",st:"Kinkaku-ji is the single most photographed building in Japan. A three-story pavilion completely covered in gold leaf, standing on the edge of a mirror-like pool. Built in 1398 as a shogun's villa, it was converted to a temple in 1408 and has been rebuilt several times (most recently in 1955 after a fire).\\n\\nGo early, 8:30am when they open. The tour groups don't arrive until 10am. The light is perfect—coming from the side, illuminating the gold. Stand on the viewing platform and look at the reflection. The water is so still that the building appears twice—once solid, once mirrored. This doubling is the entire point. Leave by 10am.",im:"A golden building reflected perfectly in still water. Maple trees surrounding the water. No one else visible.",t:"₩400 admission. 9am-5pm. Kita-ku. Bus: #101 from Kyoto Station to Kinkakuji-michi. Best 8:30-10am. Go early—you'll spend more time in lines than looking at the building otherwise.",c:["greatest_hits","beautiful"],r:"g",nn:"金閣寺",ns:"金箔で覆われた三層の建物。",nst:"金閣寺は日本で最も多く撮影される建物だ。3階建ての建物で金箔で完全に覆われ、鏡のような池の端に立っている。1398年に将軍の別荘として建設され、1408年に寺院に転用された。あなたが見ている建物は古代ではないが、デザインは古代だ。\\n\\n朝、午前8時30分に開場時に行こう。ツアーグループは午前10時までは到着しない。光は完璧だ。見学プラットフォームに立ち、反射を見よう。",nt:"₩400 入場料。午前9時～午後5時。北区。バス：京都駅から#101で金閣寺道。午前8時30分～午前10時がベスト。"}};

<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Kyoto Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Kyoto Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
