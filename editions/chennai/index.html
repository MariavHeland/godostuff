<script>
const P = [{id:1,n:"Meenakshi Amman Temple — Dravidian Architecture Masterpiece",a:"Meenakshi Temple",v:["history","sacred","art"],d:45,s:"A 2,500-year-old Hindu temple with massive gopurams (towers), intricate sculptures, and sacred significance to millions of devotees.",st:"The Meenakshi Amman Temple stands as one of the world's largest temples and a pinnacle of Dravidian architecture. The temple's four gopurams (towers) rise dramatically, each tier decorated with hundreds of sculpted figures. The temple is dedicated to Goddess Meenakshi (an avatar of Parvati) and her consort Sundareswara (Shiva). The temple's construction spanned centuries; major additions occurred during the Nayak period (1500s-1700s). Walking through the temple's corridors, you encounter intricate stone carvings, massive pillars, and sacred spaces. The temple remains an active place of worship: thousands of devotees gather daily for prayer, ritual, and spiritual connection. The temple represents Tamil culture, Hindu spirituality, and artistic excellence. Respectful engagement requires understanding the sacred nature of the space and following protocols.",im:"A massive gopuram dominates the skyline, its towers ascending tier by tier, each tier sculpted with hundreds of divine figures, the craftsmanship overwhelming.",t:"Located in the heart of Madurai (240km from Chennai, 4-5 hours by car or train). Entry fee minimal (nominal amount). Respectful dress required: cover shoulders and knees. Remove shoes before entering sanctum. Photography restricted in inner sanctums. Allow 2-3 hours. Early morning and evenings are quieter. Guides available. Go with reverence.",c:[],r:"g",nn:"மீனாக்ஷி அம்மன் கோயில்",ns:"கால் சதகம் ஆண்டுகள் முன் கட்டப்பட்ட திராவிட கட்டடக்கலை",nst:"மீனாக்ஷி தெய்வத்திற்கு நீண்ட வரலாறு; கோபுரங்கள் பல நூறு சிற்ப வேலைகளை சுமந்துள்ளது.",nt:"மதுரையில் (சென்னையிலிருந்து 240 கி.மீ., 4-5 மணி நேரம்). உள்ளிட கட்டணம். மரியாதைப்பூர்வ ஆடை. வாசல் முன்பு காலணி நீக்கவும். உள்ளே புகைப்படம் தடை."},{id:2,n:"Kapaleeshwar Temple — Oceanside Shiva Sanctuary",a:"Mylapore",v:["sacred","history","art"],d:30,s:"A 7th-century Shiva temple in the Mylapore neighborhood with ornate gopuram, sacred tank, and important pilgrimage site.",st:"The Kapaleeshwar Temple, one of the oldest temples in Chennai, dates to the 7th century and underwent major renovations in the 16th century. The temple is dedicated to Shiva and is considered one of the Pancha Bhoota Sthalams (five elemental temples dedicated to Shiva). The temple's gopuram is beautifully sculpted; the sacred tank (temple pond) is considered especially holy. The surrounding Mylapore neighborhood is historically significant and theologically important to Tamil Hinduism. The temple attracts devotees and pilgrims from across Tamil Nadu and beyond. Walking the temple and surrounding area, you encounter religious devotion, artistic heritage, and cultural continuity spanning centuries.",im:"The temple's gopuram rises ornately above the surrounding buildings; devotees perform rituals at the sacred tank below; the atmosphere spiritual and devotional.",t:"Located in Mylapore, a central Chennai neighborhood (accessible by metro, bus, or taxi). Entry fee nominal. Respectful dress required. Remove shoes in designated areas. Photography limited in sanctums. Allow 1-2 hours. Go early morning for peaceful experience. Guides available for deeper information.",c:[],r:"g",nn:"கபாலீஸ்வர் கோயில்",ns:"ஏழாம் நூற்றாண்டுக்கு உரிய சிவன் கோயில் மயிலாப்பூரில்",nst:"பஞ்ச பூதஸ்தலங்களின் ஒன்று; பெண் தெய்வம் அம்பிகா வழிபாட்டு ஸ்தலம்.",nt:"மயிலாப்பூரில் (மெட்ரோ, பேருந்து, தக்षி அணுகல்). உள்ளிட கட்டணம். மரியாதைப்பூர்வ ஆடை. வாசல் முன் காலணி."},{id:3,n:"Parthasarathy Temple — Vaishnavite Heritage",a:"Triplicane",v:["sacred","history","art"],d:30,s:"An ancient Vishnu temple with beautiful sculptures, considered one of South India's most important Vaishnavite pilgrimage sites.",st:"The Parthasarathy Temple, dedicated to Krishna (as Partha's charioteer), dates to antiquity and underwent significant renovations during the Pallava period. The temple is one of South India's most important Vaishnavite temples. The intricate stone carvings depict Krishna's life and divine mythology. The temple remains a center of Tamil Vaishnavism and traditional Vedic learning. The Triplicane neighborhood surrounding the temple has historical significance stretching back centuries. Walking the temple, you encounter elaborate sculptural work, sacred spaces, and the living tradition of temple worship. The temple represents Tamil's unique Vaishnavite tradition that blends philosophical depth with artistic excellence.",im:"Stone pillars covered in intricate Krishna imagery; the inner sanctum glowing with oil lamps; devotees engaged in prayer rituals.",t:"Located in Triplicane, central Chennai (accessible by public transport). Entry fee nominal. Respectful dress required. Remove shoes before entering main sanctum. Photography limited in inner areas. Allow 1-2 hours. Early morning is peaceful. Guides available. Go with reverence.",c:[],r:"g",nn:"பார்தசாரதி கோயில்",ns:"கிருஷ்ணனுக்கு பதிப்பிக்கப்பட்ட பழைய வைணவ கோயில்",nst:"தமிழ் வைணவவசனத்தின் ஒரு முக்கிய ஸ்தலம்; கிருஷ்ணனின் சரித்திரம் மூர்திகளில் சிற்ப வேலை.",nt:"திருப்ளிகாணத்தில் (பொதுப் போக்குவரத்து அணுகல்). உள்ளிட கட்டணம். மரியாதைப்பூர்வ ஆடை. வாசல் முன் காலணி."},{id:4,n:"Sri Veeramakaliamman Temple — Goddess Worship",a:"Perambur",v:["sacred","local","cultural"],d:25,s:"A 300-year-old temple dedicated to Goddess Kali, important to local devotion, with vibrant rituals and strong community connections.",st:"The Sri Veeramakaliamman Temple is dedicated to Goddess Kali, a fierce form of the divine feminine in Hindu theology. The temple serves a primarily working-class neighborhood and retains the character of local, community-based worship rather than grand pilgrimage temple. The deity Kali represents transformation, destruction of ego, and liberation. The temple holds important festivals throughout the year; during Navaratri (nine-day festival honoring the goddess), the temple becomes a center of devotional intensity. Walking the temple and neighborhood, you encounter genuine grassroots Hindu practice, women's spiritual leadership (priestesses and devotees), and the integration of divine worship into daily community life.",im:"The temple's inner sanctum glows with oil lamps; the goddess Kali's fierce form depicted with dark complexion and wild appearance; devotees perform puja (worship rituals).",t:"Located in Perambur, northern Chennai (accessible by public transport). Entry free. Respectful dress required. Remove shoes before entering. Photography allowed in outer areas but restricted in sanctum. Allow 30-45 minutes. Go during festivals for most vibrant experience. The neighborhood is authentic and welcoming.",c:[],r:"g",nn:"ஸ்ரீ வீரமகாளியம்மன் கோயில்",ns:"தெய்வத்தி கெளடின் உபாசனையின் மூன்று நூற்றாண்டுப் பழமையான கோயில்",nst:"கண்ணி தெய்வத்தை பிரதிநிதித்துவம்; உள்ளூர் ஆன்மீக நடன ஒரு மையம்.",nt:"பெரம்பூரில் (பொதுப் போக்குவரத்து அணுகல்). உள்ளிட இல்லை. மரியாதைப்பூர்வ ஆடை. வாசல் முன் காலணி."},{id:5,n:"San Thome Cathedral — Colonial Christian Heritage",a:"San Thome",v:["history","architecture","hidden"],d:25,s:"A 16th-century Portuguese church built over an earlier Syrian Christian shrine, representing Christianity's long presence in South India.",st:"San Thome Cathedral stands on the traditional burial site of St. Thomas the Apostle, who is believed to have traveled to South India in 52 CE and was martyred near Chennai. The current structure, begun in 1504 by Portuguese colonizers, replaced earlier Syrian Christian structures. The cathedral represents the intersection of Indian Christianity (one of the oldest Christian communities in the world) and European colonialism. The Gothic architecture contrasts with surrounding temple architecture, representing religious and cultural plurality. The cathedral remains an active place of Christian worship with services continuing. Walking the cathedral, you encounter the layers of history: ancient Christianity, colonial architecture, and contemporary faith practice.",im:"The cathedral's Gothic towers rise above the waterfront; Portuguese architectural elements contrast with the South Indian landscape; the interior glows with Christian iconography.",t:"Located in San Thome, central Chennai (accessible by public transport). Entry nominal fee. Respectful dress required. Remove shoes if requested. Photography often allowed. Allow 30-45 minutes. Services held at specific times; respecting worship is important. The location offers views of the ocean.",c:[],r:"g",nn:"சான் தோமி கதீட்ரல்",ns:"பதினாறாம் நூற்றாண்டுக் கிரிஸ்தவ சேக்கை கோயில்",nst:"ஆரம்ப கிரிஸ்தவ சமுதாயத் தொட்டுவர்; ஐரோப்பிய கட்டடக்கலை தமிழ் நாட்டில் வடிவமைப்பு.",nt:"சான் தோமியில் (பொதுப் போக்குவரத்து அணுகல்). உள்ளிட கட்டணம். மரியாதைப்பூர்வ ஆடை. வாசல் முன் காலணி."},{id:6,n:"Government Museum and National Art Gallery",a:"Egmore",v:["art","history","culture"],d:40,s:"A major museum with bronzes, sculptures, textiles, and art documenting South Indian history and Dravidian civilization.",st:"The Government Museum houses one of India's most important collections: Chola bronze sculptures (9th-13th centuries), stone sculptures from various periods, Greek and Roman artifacts, textiles, and contemporary art. The bronze collection is particularly remarkable—thousands of years old, depicting divine and royal figures with extraordinary artistry. The museum documents South India's sophisticated civilization: the Dravidian kingdoms, artistic achievement, and cultural continuity. Walking through the museum, you encounter the material heritage of Tamil and South Indian civilization—objects made hundreds and thousands of years ago, revealing the sophistication and artistic vision of ancient peoples. The museum provides essential context for understanding South India's historical importance and cultural depth.",im:"A bronze Shiva Nataraja (dancing Shiva) statue glows under museum lighting—intricate detail visible, the pose expressing divine cosmic dance.",t:"Located in Egmore, central Chennai (accessible by metro, bus, taxi). Admission fee required (modest). Open daily except Mondays. Allow 2-3 hours. Photography allowed in most sections. The bronze collection is the highlight. Guides available. English descriptions provided.",c:[],r:"g",nn:"அரசு சங்கிப பொருட்கள் மற்றும் கலையியல் சேகரிக்கப்",ns:"சோழ வெண்கல மூர்திகள் மற்றும் தென்னிந்திய கட்டடக்கலை",nst:"வெண்கல சங்கிப பொருட்கள் தென்னிந்திய நாகரிகத்தின் கலை உருவாக்கத்தைக் காட்டுகிறது.",nt:"ஏக்மோரில் (மெட்ரோ, பேருந்து, தக்சி அணுகல்). உள்ளிட கட்டணம். திங்கட்கிழமை மூடுவார். புகைப்படம் அனுமதிக்கப்பட்டுள்ளது."},{id:7,n:"Marina Beach — Coastal Public Space",a:"Marina",v:["beautiful","local","nature"],d:30,s:"One of the world's longest urban beaches, offering coastal walks, sunsets, and social gathering spaces for locals and visitors.",st:"Marina Beach stretches 13km along the Bay of Bengal, offering Chennai residents and visitors a major public space. The beach is not for swimming (strong currents and pollution) but for walking, socializing, watching sunsets, and enjoying sea breeze. The promenade is crowded during morning and evening hours: joggers, walkers, families, vendors, musicians. The beach hosts festivals and cultural events. The surrounding area contains important monuments: the former presidency building, memorials to freedom fighters. Marina Beach represents Tamil Nadu's relationship with the ocean and serves as a democratic public space where people of all classes gather.",im:"Crowds of people walk along the long beach at sunset; vendors sell food and beverages; the bay glimmers with reflected light; families enjoy the evening breeze.",t:"Located along central Chennai's eastern edge. Easily accessible by public transport, walking, or taxi. Free access. Best visited during early morning (5-7am) or evening (5-7pm) for cooler temperatures. Bring water. Do not swim (dangerous currents). The promenade offers pleasant walking.",c:[],r:"g",nn:"மரீனா கடல் கரை",ns:"உலகின் மிக நீளமான நகர கடல் கரை பொது இடம்",nst:"13 கிமீ நீளமான; மக்களை ஒன்றுபடுத்துவ பொது இடம் அனைத்து வகுப்பு.",nt:"சென்னையின் கீழ் விளிம்பு. பொதுப் போக்குவரத்து, நடைபயணம், தக்சி அணுகல். உள்ளிட இல்லை. ஆரம்பம் மணி (5-7) அல்லது மாலை (5-7)."},{id:8,n:"Vedantharangam — Vedantic Learning Center",a:"Vedantharangam",v:["history","hidden","cultural"],d:30,s:"A traditional center for Vedantic study and Sanskrit learning, representing centuries-old intellectual traditions in South India.",st:"Vedantharangam represents the continuation of India's ancient philosophical traditions. The institution focuses on Vedanta (Hindu philosophical tradition) and Sanskrit studies. Teachers and students engage with classical texts, oral traditions, and philosophical inquiry. The existence of such institutions in contemporary Chennai represents cultural continuity: these scholarly traditions persist despite modernization. Visiting or learning about Vedantharangam provides insight into intellectual traditions that have sustained for millennia. The institution represents the depth of Hindu intellectual culture and Tamil philosophical heritage. Access may be limited, but respectful inquiry may allow observation of classes or conversations with scholars.",im:"Traditional guru and students sit on the floor studying Sanskrit texts; oil lamps illuminate the space; the atmosphere contemplative and scholarly.",t:"Located in Vedantharangam neighborhood of Chennai. Access depends on institutional policies; some observation might be possible with respectful request. Allow 1-2 hours if access granted. Respectful behavior essential. Go with genuine interest in learning, not tourism.",c:[],r:"g",nn:"வேதாந்தாரங்கம்",ns:"வேதாந்த மற்றும் சம்ஸ்கிரிதம் கற்றல் மையம்",nst:"ஆயிரம் ஆண்டுகளாக தொடர் தத்துவ பரம்பரை; சம்ஸ்கிரித உபனிஷத் ஆய்வு.",nt:"வேதாந்தாரங்கம் பக்கவாதி சென்னையில். அணுகல் மையத்தின் கொள்கை சார். மரியாதைப்பூர்வ நடத்தை."},{id:9,n:"Kalakshetra Foundation — Classical Arts Preservation",a:"Thiruvanmiyur",v:["art","culture","hidden"],d:35,s:"An institution dedicated to preserving classical Indian dance (Bharatanatyam) and other traditional arts, with performances and training.",st:"Kalakshetra was founded in 1936 to preserve and propagate Bharatanatyam, a classical dance form with roots in Tamil temples. The institution provides training to dancers while maintaining traditional standards. Bharatanatyam originated as a devotional practice in temples; colonial-era suppression nearly led to its disappearance. Kalakshetra's work helped revive and legitimize the form. The institution also preserves other classical arts: music, drama, textile arts. Kalakshetra hosts performances and cultural events. The surrounding area (Thiruvanmiyur) is peaceful. Visiting allows observation of classes, performances, or learning about classical Indian dance traditions.",im:"A young dancer in traditional costume performs Bharatanatyam in the courtyard; the movements precise and devotional; musicians accompany with traditional instruments.",t:"Located in Thiruvanmiyur, southern Chennai (accessible by public transport). Admission for performances or classes. Training programs available for serious students. Allow 1-2 hours for visiting. Performances scheduled regularly; check ahead. Go to support classical arts preservation.",c:[],r:"g",nn:"கலாக்ஷேத்திரம்",ns:"பாரதநாட்டிய கிளாসிக் நৃত்த பாதுக்காக்க நிறுவனம்",nst:"பாரதநாட்டிய உத்தராக; கோயில் கொடிப் நூல் நாட்டியம் உறவு.",nt:"திருவாண்மியூரில் (பொதுப் போக்குவரத்து அணுகல்). அ நடனம் அல்லது வகுப்புக்கு உள்ளிட. பரிசு தொடர்பளிக்க."},{id:10,n:"Thiruvanmiyur Beach — Calm Coastal Area",a:"Thiruvanmiyur",v:["nature","beautiful","local"],d:25,s:"A quieter southern beach with temple proximity, fishing activity, and local color distinct from Marina Beach's urbanity.",st:"Thiruvanmiyur Beach, in southern Chennai, offers a different experience than Marina Beach: quieter, less commercial, closer to local fishing communities. The beach has a temple proximity (Sri Veeramakaliamman Temple) that adds spiritual character. Fishing boats still operate from the beach, representing traditional livelihoods. The surrounding neighborhood retains village character despite urban encroachment. Walking the beach early morning allows observation of fishermen returning with catches, birds, and the ocean's natural rhythms. The beach is less touristy than Marina, offering more authentic local experience.",im:"Fishing boats rest on the beach at dawn; fishermen prepare nets; the ocean calm; the neighborhood quiet and atmospheric.",t:"Located in southern Chennai (30-40 minutes from downtown). Accessible by public transport or taxi. Free access. Best early morning for authentic experience. Do not swim (strong currents). The neighborhood is authentic and welcoming. Walk respectfully through local areas.",c:[],r:"g",nn:"திருவாண்மியூர் கடல் கரை",ns:"அமைதி கொடிய கடல் கரை உள்ளூர் மீன்பிடி",nst:"உள்ளூர் மீன்பிடி சম்প்रதாயம் தொடர்ந்து; கோயில் அருகத்தி.",nt:"தெற்கு சென்னையில் (30-40 நிமிஷம் மையம் இருந்து). பொதுப் போக்குவரத்து அணுகல். உள்ளிட இல்லை. ஆரம்பம் மணி."},{id:11,n:"Arignar Anna Zoological Park",a:"Vandalur",v:["wildlife","nature","local"],d:40,s:"A 602-acre zoo with varied animal species, conservation breeding programs, and safari experiences in open enclosures.",st:"The Arignar Anna Zoo, one of India's largest, houses over 2,500 animals representing hundreds of species. The zoo functions as both a recreational destination and a conservation institution: breeding programs for endangered species, wildlife research, and education. The zoo includes a safari park where visitors ride through open enclosures observing animals in semi-naturalistic environments. The zoo offers opportunities to observe Indian wildlife: Bengal tigers, Asian elephants, Indian bison, and numerous bird species. The zoo also houses exotic species from around the world. The zoo is popular with families and school groups.",im:"A safari vehicle drives through an open enclosure as herbivores graze; peacocks display their plumage; the animals unbothered by the vehicle.",t:"Located in Vandalur, about 35km south of downtown Chennai (40-50 minutes by car). Entry fee required. Open daily. Allow 3-4 hours for a comprehensive visit. Safari rides require additional fee. Early morning is best for animal activity. Bring water and sunscreen.",c:[],r:"g",nn:"அரிஞ்சனার் அண்ணா விலங்கு பூங்கா",ns:"பொதுவான விலங்குகளாக 602 ஏக்கர் விலங்கு பூங்கா",nst:"2500 விலங்குகள் நூற்றுக்கும் விலங்கு சங்கிப; பாதுக்காக்கப் வளிநிலை கட்டுரை.",nt:"வாண்டலூரில் (சென்னை தெற்கு 35 கிமீ, 40-50 நிமிஷம் தக்சி). உள்ளிட கட்டணம். அபுபுஜி கல்சி. சافারி ஊக்க நிதி. ஆரம்பம் மணி சிறப்பு."},{id:12,n:"Cholamandal Artists' Village — Contemporary Art Community",a:"Cholamandal",v:["art","local","hidden"],d:30,s:"An artist community with studios, galleries, workshops, and exhibitions showcasing contemporary Indian art and handicrafts.",st:"Cholamandal Artists' Village was established to provide a space for visual artists to work, exhibit, and engage with communities. The village consists of artist studios, galleries, and workshop spaces. Visitors can observe artists at work, purchase directly from creators, and engage with contemporary Indian art. The village represents grassroots art practice and cultural creativity. The work ranges from traditional crafts to contemporary explorations. Supporting the village directly funds artists. The location is peaceful and creative. Visiting supports living art practice and contemporary cultural creation.",im:"An artist paints in a studio space; galleries display artwork ranging from abstract to figurative; visitors browse and discuss with creators.",t:"Located in Cholamandal, about 20km south of downtown Chennai (30 minutes by auto-rickshaw). Most studios/galleries are small and independent; hours vary. Many are closed Sundays or Mondays. Allow 1-2 hours. Photography often welcome. Go with genuine interest in art. Support artists by purchasing if possible.",c:[],r:"g",nn:"சோளமண்டல் கலைஞர் கிராமம்",ns:"கிராமம் சமகாலிக கலையாளர்கள் சமுதாயம்",nst:"கலை நிலைய அனுமதி; கிறேটর் உடன் எளிய ஏற்பாடு.",nt:"சோளமண்டலில் (சென்னை தெற்கு 20 கிமீ, 30 நிமிஷம் তூக்). நிலை மாற்ற; திங்கட்கிழமை மூடு. புகைப்படம் அனுமதிக்கப்பட்ட."},{id:13,n:"Theosophical Society Headquarters",a:"Adyar",v:["history","architecture","hidden"],d:35,s:"A historic spiritual organization's headquarters with 270-acre grounds, library, and peaceful gardens representing 19th-century intellectual movements.",st:"The Theosophical Society, founded in New York in 1875, moved its headquarters to Adyar, Chennai in 1882. The organization aimed to synthesize Eastern and Western spirituality and philosophy. The headquarters sits on 270 acres with banyan trees, gardens, and meditation spaces. The library contains extensive collections on world religions, philosophy, and comparative spirituality. The society attracted prominent thinkers and spiritual seekers. Walking the grounds and visiting the library offers perspective on 19th-20th century intellectual movements that attempted to bridge Eastern and Western knowledge systems. The peaceful setting invites contemplation.",im:"Ancient banyan trees spread across grounds; meditation temples dot the landscape; the library stands as an architectural monument; the atmosphere peaceful and scholarly.",t:"Located in Adyar, southern Chennai (accessible by public transport or taxi). Admission nominal. Open daily except some religious holidays. Library access may require membership or donation. Allow 1-2 hours. Respectful behavior required. The setting is contemplative. Photography often allowed in gardens.",c:[],r:"g",nn:"தியோசοபிக்கல் சமிதி தலைமையகம்",ns:"1882 சென்னை நகர் ஞான தகரணை சமுதாயம்",nst:"270 ஏக்கர் அடிய தோட்டி; வாழ்க்கை உவாத் சாধனை; ஆர்ய சமാজ தகரணை.",nt:"ஆதியாரில் (பொதுப் போக்குவரத்து அணுகல்). உள்ளிட கட்டணம். தபல் திருவிளம் கொலி. புகைப்படம் தோட்டி அனுமதிக்கப்ட."},{id:14,n:"Mylapore — Historic Neighborhood",a:"Mylapore",v:["history","local","hidden"],d:30,s:"One of Chennai's oldest neighborhoods with temples, traditional streets, bazaars, and historical significance to Tamil culture.",st:"Mylapore is among Chennai's oldest settlements, with temples and cultural institutions dating back centuries. The neighborhood is the heart of traditional Tamil culture: temples, religious institutions, and cultural organizations concentrate here. Walking Mylapore's streets, you encounter narrow lanes, temples tucked into corners, street bazaars selling flowers for ritual use, and cultural institutions preserving Tamil traditions. Mylapore feels distinct from modern Chennai: traditional, religious, tied to ancient practices. The neighborhood has been the site of significant cultural and religious activity for millennia. Exploring Mylapore offers glimpses into how religious and cultural continuity persists in contemporary urban India.",im:"Narrow street lined with temple entrances and religious institutions; vendors sell flowers, incense, and ritual items; the atmosphere steeped in tradition.",t:"Located in central Chennai (accessible by metro or public transport). Free to walk and explore. Many small temples and cultural sites. Allow 2-3 hours for comprehensive exploration. Go early morning for quieter experience. Respect sacred spaces. The neighborhood is welcoming to respectful visitors.",c:[],r:"g",nn:"மயிலாப்பூர்",ns:"சென்னையின் பழைய கோயிலினங் பன்னிரு",nst:"பரியொளிப்பான் தமிழ் கோயில் மையம்; நூற் தொல் சங்கிதி.",nt:"சென்னை மையம் (மெட்ரோ அணுகல்). நடை மாத்திரம். கோயில் நிறைய. நமஸ்காரம் பேசு."},{id:15,n:"Chennai Central Railway Station — Colonial Transportation Hub",a:"Downtown",v:["architecture","history","local"],d:25,s:"A 1900s Victorian-era railway station, architectural landmark, and transportation hub representing colonial infrastructure.",st:"Chennai Central Railway Station, built between 1900-1930, is an architectural masterpiece of colonial Victorian design. The station served British colonial administration's need for transportation and control. The architecture announces European power: high ceilings, ornate detailing, and grand scale. The station remains a functioning transportation hub where thousands of people daily pass through. Walking the station, you encounter both architectural grandeur and contemporary reality: colonial structures serving modern transportation needs. The station represents colonialism's material legacies: beautiful but built through extraction and domination.",im:"The station's Victorian facade glows in afternoon light; trains arrive and depart; passengers move through the grand halls; the ornate interior visible.",t:"Located in downtown Chennai. Easily accessible and a major transit hub. Free to walk through public areas. Photography usually allowed in non-restricted areas. Allow 30-45 minutes to appreciate architecture. Respectful behavior in this functioning transportation hub required.",c:[],r:"g",nn:"சென்னை மைய வரிசை நிலையம்",ns:"1900 விக்டோரியாய் வரிசை சாசனம் அடிச্சாசனம்",nst:"வரிசை சாசனம் மைய சொத்து; இங்கேயே ஈஸ்ட் இந்திய நிறுவனம் சாசனம்.",nt:"சென்னை மையம் (தொடர்புக்கு கட்டடம்). நடை பொதுப் பகுதி. புகைப்படம் அனுமதিக்கப்ப."},{id:16,n:"St. Andrew's Church — Gothic Colonial Architecture",a:"Downtown",v:["architecture","history","hidden"],d:20,s:"A 19th-century Gothic church representing Christian missionary presence and colonial architectural heritage.",st:"St. Andrew's Church, built in 1821, showcases Gothic architectural style transplanted to India. The church served the colonial Christian community and missionary efforts. The interior features stained glass, ornate ceilings, and Christian iconography. Walking the church, you encounter religious architecture distinct from the dominant Hindu and Dravidian aesthetics of Tamil Nadu. The church represents religious plurality in India and the layered histories of colonialism, Christianity, and cultural coexistence. The church remains an active place of Christian worship.",im:"The church's Gothic spire rises above surrounding buildings; the interior glows with stained glass; Christian iconography decorates the space.",t:"Located in downtown Chennai (near Parry's Corner). Easily accessible by public transport. Entry free. Respectful dress required. Remove shoes if requested. Photography allowed. Allow 20-30 minutes. Services held at specific times; respecting worship is important.",c:[],r:"g",nn:"செயின்ட் ஆண்ட்ரூ தேவாலயம்",ns:"1821 கொதிக்கட்ட கிறிஸ்தவ கோயில் சாசனம்",nst:"கொதிக்கட்ட கிறிஸ்தவ சாசனம்; ஐரோப்பிய ஜாதகம்.",nt:"சென்னை மையம் (பொதுப் போக்குவரத்து அணுகல்). உள்ளிட இல்லை. மரியாதைப்பூர்வ ஆடை. வாசல் முன் காலணி."},{id:17,n:"Sundaresan Fine Arts Gallery — Contemporary South Indian Art",a:"Teynampet",v:["art","culture","hidden"],d:25,s:"A private gallery showcasing contemporary South Indian artists, traditional crafts, and cultural heritage pieces.",st:"Sundaresan Gallery represents contemporary art patronage and curation of South Indian artistic traditions. The gallery displays works by living artists alongside traditional pieces. Supporting such galleries directly funds artists and helps preserve cultural heritage. The gallery offers perspective on contemporary Indian art and how traditional forms evolve in modern contexts. Gallery visiting contributes to understanding South India's vibrant artistic culture.",im:"Gallery walls display paintings, sculptures, and traditional crafts; visitors study the work intently; the curated space reflects artistic vision.",t:"Located in Teynampet, central Chennai (accessible by metro or taxi). Admission typically free or modest. Hours vary; closed some days. Allow 1-2 hours. Photography often welcome. Support artists and galleries by engaging seriously. Go with genuine interest in art.",c:[],r:"g",nn:"சுந்தரேசன் நன்னூல் கலை சேகரிக்கப்",ns:"சமகாலிக தென்னிந்திய கலையாளர்கள் சேகரிக்கை",nst:"சமகாலிக கலை தென்னிந்திய; கலை உயிர்த்துவம்.",nt:"டெய்னம்பेট் (மெட்ரோ அணுகல்). உள்ளிட இல்லை அல்லது கட்டணம். புகைப்படம் அனுமதிக்கப்டு. அக்கம் කරუणा கலை."},{id:18,n:"Madras Leather Heritage Museum",a:"Madras Leather Complex",v:["history","local","hidden"],d:25,s:"A museum documenting Chennai's leather tanning traditions, industrial heritage, and artisan craftsmanship.",st:"Chennai has a significant leather tanning tradition extending back centuries. The Madras Leather Heritage Museum documents this heritage: tanning processes, leather goods, artisan techniques. The museum celebrates the craft and the communities who practiced it. Leather tanning is labor-intensive and involves chemical processes; understanding the craft's complexity and the artisans who continue it is important. Supporting leather artisans and traditional crafts helps preserve cultural heritage and support livelihoods.",im:"Displays show leather working tools, finished leather goods, and photographs of artisans at work; the craftsmanship visible in displayed items.",t:"Located in the Madras Leather Complex, accessible from downtown (30-40 minutes by taxi). Admission nominal. Hours may vary. Allow 1-2 hours. Photography allowed. Support artisans by purchasing leather goods if interested.",c:[],r:"g",nn:"மதுரை தோல் கலை பொருட்கள் அடிச்சாசனம்",ns:"சென்னை தோல் மற்றும் பாரம்பரியம் সங்കலனம்",nst:"தோல் தான்ன்; வணிக பாரம்பரியம் செயற்பாட.",nt:"மதுரை தோல் சிறு (தக்சி 30-40 நிமிஷம்). உள்ளிட கட்டணம். புகைப்படம் அனுமதிக்கப்டு."},{id:19,n:"Cooum River Cleanup and Urban Ecology",a:"Multiple Areas",v:["nature","local","hidden"],d:20,s:"Urban river restoration efforts highlighting grassroots environmental activism and community participation in urban ecology.",st:"The Cooum River, which flows through Chennai, faces severe pollution and environmental degradation. Community organizations and environmental activists work to clean, restore, and protect the river. These efforts represent grassroots environmentalism and community engagement with urban ecology. Supporting or learning about river cleanup efforts highlights environmental challenges and possibilities for community action. The Cooum represents Chennai's relationship with its natural environment and contemporary efforts to reclaim and restore it.",im:"Community volunteers work along the river banks removing trash; the river's pollution visible; the effort to restore environmental health evident.",t:"Cleanup efforts occur at various points along the river. Volunteer participation available through environmental organizations. Allow 1-3 hours depending on participation. Go with genuine environmental commitment. The work is meaningful but humble.",c:[],r:"g",nn:"கூவம் நதி கொண்ட பழுதுசெய்தல் மற்றும் சுற்றி சமச்சீர்",ns:"நதி மாথ்தி உயிர்த்துவம் சமூத்திய நடந்தாய்.",nst:"கூவம் நாருமாய் மாக்ரி; வல ஓதை; சம்பறாய় மூவ் சுற்றி.",nt:"கூவம் நதி விரும் போட்டு நிலை. சுற்றி ஜீवन ஸbhாவஏ."},{id:20,n:"Nungambakkam Tank — Urban Water Body",a:"Nungambakkam",v:["nature","local","hidden"],d:20,s:"A historic urban reservoir supporting water needs, bird watching, and community use, representing urban ecology and public resources.",st:"Nungambakkam Tank is a historic water body that served Chennai's water needs for centuries. The tank supports urban ecology: birds, fish, and vegetation dependent on the water. The tank is a public resource used by residents for various purposes. The tank's existence highlights the importance of urban green spaces and water bodies for environmental health and community wellbeing. Urban tanks like Nungambakkam represent traditional water management systems and contemporary environmental challenges (pollution, encroachment, reduced water levels). Walking the tank area offers perspective on urban ecology and water security.",im:"A water body surrounded by trees; birds rest on the water; the urban environment visible beyond the green space; the ecosystem visible in the urban landscape.",t:"Located in Nungambakkam, central Chennai (accessible by public transport). Free access. Best for walking early morning or evening. Bird watching is rewarding with binoculars. The surrounding area has cafés and restaurants.",c:[],r:"g",nn:"நுங்கம்பக்கம் பட்டீய",ns:"நிறுவ நீர் கண்ணடி சரி உர்பன் சமத்தை",nst:"நுங்கம்பக்கம் பட்டீய ஐதிஹ்य நீர் கண்டங்கம்.",nt:"நுங்கம்பக்கம் (பொதுப் போக்குவரத்து அணுகல்). உள்ளிட இல்லை. ஆரம்பம் மணி நன்று."},{id:21,n:"Ramakrishna Math — Spiritual Organization",a:"Mylapore",v:["sacred","hidden","cultural"],d:25,s:"A spiritual organization and monastery following Vedantic teachings, with meditation spaces, library, and community service programs.",st:"Ramakrishna Math represents contemporary spiritual movements in India rooted in Vedantic philosophy. The organization emphasizes universal spirituality: respect for all religions and philosophical approaches. The math provides meditation spaces, conducts classes on spiritual texts, maintains a library, and engages in community service. The organization represents institutional spirituality: organized approaches to spiritual practice distinct from purely personal spirituality. Visiting allows observation of meditation practice, library study, or learning about the organization's philosophy.",im:"A meditation hall with devotees sitting in meditation; the space peaceful and sacred; the organization's spiritual purpose evident.",t:"Located in Mylapore, central Chennai (accessible by public transport). Open to visitors. Meditation sessions held regularly. Library access available. Classes on Vedanta held at specific times. Respectful dress and behavior required. Allow 1-2 hours.",c:[],r:"g",nn:"ராமகிருஷ்ணர் கணிதம்",ns:"வேதாந்த தத்துவ ஆன்மீக சங்கிப",nst:"ராமகிருஷ்ணர் உபாசனை; வேதாந்த தாப்பு; மனித பொல்லி.",nt:"மயிலாப்பூரில் (பொதுப் போக்குவரத்து அணுகல்). தியாக் உபாசனை தோட்டி பொதுவ. மரியாதைப் வடிவ."},{id:22,n:"DakshinChitra — Living Heritage Museum",a:"Muttukadu",v:["culture","art","local"],d:40,s:"An open-air museum preserving South Indian architectural heritage, handicrafts, performing arts, and traditional ways of life.",st:"DakshinChitra presents living heritage: traditional buildings from different regions of South India relocated and preserved, artisans demonstrating traditional crafts, and cultural performances showcasing regional traditions. The museum functions as an immersive experience rather than a display-only space: visitors encounter functioning crafts, traditions being actively practiced, and cultural continuity. DakshinChitra represents efforts to preserve endangered crafts and cultural knowledge. Supporting the museum directly funds artisans and preservation efforts.",im:"Traditional buildings arranged in museum setting; artisans work traditional crafts; cultural performance occurs in courtyard; the living heritage visible.",t:"Located in Muttukadu, about 25km south of downtown Chennai (30-40 minutes by taxi). Admission fee required (modest). Open daily. Allow 3-4 hours. Cultural performances scheduled regularly. Photography welcome. Go with genuine interest in cultural preservation.",c:[],r:"g",nn:"தக்ஷிணசித்திர",ns:"தென்னிந்திய உய்யிலு மரியாதை குலும்பே",nst:"தென்னிந்திய பாரம்பரியம் வாழ்க்கை; மரிய நிபுணர் வேலை.",nt:"முத்துக்குடி (சென்னை தெற்கு 25 கிமீ, 30-40 நிமிஷம் தக்சி). உள்ளிட கட்டணம். தபல் செய்விய குறுக்குசேவை. நடன செயல் உட்சேவை."},{id:23,n:"Kathyayani Temple — Women's Spirituality",a:"Kanchipuram",v:["sacred","cultural","hidden"],d:30,s:"A temple dedicated to a manifestation of the Divine Feminine, representing women's spiritual practice and goddess worship.",st:"The Kathyayani Temple represents the divine feminine in Hindu theology. Goddess Kathyayani is associated with warrior energy, protection, and transformation. Temples dedicated to goddess forms are important spaces for women's spiritual practice and power. Walking such temples, you encounter women's religious leadership and the centrality of goddess worship in Hindu spirituality. The temple represents Hindu theology's sophistication: multiple forms of divinity, feminine power as fundamental, and women's agency in spiritual practice.",im:"The goddess Kathyayani is depicted in warrior stance; devotees, particularly women, perform rituals of worship; the atmosphere devotional and powerful.",t:"Located in Kanchipuram area (accessible from Chennai). Entry free or nominal fee. Respectful dress required. Remove shoes before entering. Photography allowed in most areas. Allow 1-2 hours. Go with reverence for sacred space.",c:[],r:"g",nn:"கத்யாயணி தெய்வங்க",ns:"பெண் தெய்வ குறிப் கோயில்",nst:"கத்யாயணி தெய்வம் ஆயுந் மீன்; பெண் பிரம் உபாசனை.",nt:"கஞ்சிபுரம் (சென்னை அணுகல்). உள்ளிட இல்லை அல்லது கட்டணம். மரியாதைப் ஆடை. வாசல் முன் காலணி."},{id:24,n:"Dakshineswar Temple — Kali Worship",a:"Kanchipuram",v:["sacred","cultural","art"],d:30,s:"A temple dedicated to Goddess Kali, important pilgrimage site, with devotional intensity and philosophical significance.",st:"The Dakshineswar Temple represents Kali worship, a significant goddess tradition in Hindu spirituality. Kali represents transformation, the destruction of ego, and liberation. Kali temples attract devotees seeking goddess connection and transformation. The temple exemplifies how goddess traditions persist as vibrant spiritual practice. Visiting Kali temples offers perspective on Hindu theology's complexity and women's spiritual centrality.",im:"The fierce Goddess Kali is depicted with dark skin, wild appearance, and dancing pose; devotees offer flowers and prayers; the atmosphere intense and devotional.",t:"Located in Kanchipuram area (accessible from Chennai). Entry free or nominal. Respectful dress required. Remove shoes. Photography allowed in outer areas. Allow 1-2 hours. Go during festivals for most vibrant experience. Respect sacred atmosphere.",c:[],r:"g",nn:"தக்ஷிணேஸ்வர் கோயில்",ns:"கண்ணி தெய்வ குறிப் கோயில்",nst:"கண்ணி தெய்வம்; பெண் சக்தி உபாசனை.",nt:"கஞ்சிபுரம் (சென்னை அணுகல்). உள்ளிட இல்லை அல்லது கட்டணம். மரியாதைப் ஆடை. வாசல் முன் காலணி."},{id:25,n:"Kanchipuram — Sacred Pilgrimage Town (Day Trip)",a:"Kanchipuram (Day Trip)",v:["sacred","history","culture"],d:480,s:"A sacred pilgrimage city 70km from Chennai, with 108 temples, important Hindu sites, and silk weaving heritage.",st:"Kanchipuram, called the 'City of a Thousand Temples,' is one of Hinduism's most sacred pilgrimage destinations. The city contains numerous significant temples including those dedicated to Kamakshi (goddess), Vaikunthaperumal (Vishnu), and Kailasanatha (Shiva). The city combines spiritual significance with living tradition: active temples, continuing pilgrimage, and contemporary religious life. Kanchipuram is also famous for silk weaving—a traditional craft preserving centuries-old techniques. The city offers glimpses into sustained Hindu religious culture and handicraft traditions. A day trip from Chennai allows exploration of temples and silk workshops.",im:"Multiple gopurams rise above the city; pilgrims circumambulate temples; silk weavers work traditional looms; the city pulses with religious and cultural life.",t:"Located 70km southwest of Chennai (1.5 hours by car or bus). Accessible by day trip or overnight stay. Entry fees nominal for temples. Respectful dress required. Allow 5-6 hours for comprehensive visit. Early morning quieter. Guides helpful. Support local silk artisans by purchasing traditional fabrics.",c:[],r:"g",nn:"கஞ்சிபுரம்",ns:"பெண் நூற் கோயில் மற்றும் பயணம் தெய்வ",nst:"108 கோயில் நூற் நூல்; பெண் உபாசனை மையம்.",nt:"சென்னை தெற்கு 70 கிமீ (1.5 மணி கார்). தினமொறும் பயணம் அல்லது இரவீய. உல்ளிட குறைவுக. மரியாதைப் ஆடை."},{id:26,n:"Foreshore Estate — Working Waterfront",a:"Foreshore Estate",v:["local","nature","hidden"],d:20,s:"A working waterfront area with fishing communities, boat yards, and maritime traditions representing Chennai's relationship with the sea.",st:"The Foreshore Estate represents working Chennai: fishing communities, boat repair yards, fish markets, and maritime commerce. The area is less touristy than Marina Beach and retains authentic working character. Visiting the Foreshore Estate with respect for working communities allows observation of livelihoods, traditional maritime practices, and the labor that sustains coastal life. The area represents the unglamorous reality of urban waterfront work distinct from tourist-oriented beach culture.",im:"Fishermen repair nets and boats; fish markets bustle with commerce; the waterfront alive with working activity rather than tourism.",t:"Located along Chennai's waterfront (accessible from Marina Beach area). Free to walk and observe. Respectful photography essential. Ask permission before photographing people. Early morning best for active fishing activity. The area is working and functional, not a tourist attraction.",c:[],r:"g",nn:"கரைத்தूर் பங்களை",ns:"வேலை கடல் முகிழ் மற்றும் மீன்பிடி சங்கம்",nst:"மீன்பிடி சம்பறாய் வாழ்க; கடல் வாழ்க்கை நாவை.",nt:"சென்னை கரைத் பகுதி. நடை மற்றும் அவதான. மரியாதைப் புகைப்படம். ஆரம்பம் மணி."},{id:27,n:"Ramakrishna Mutt Library — Spiritual Texts",a:"Mylapore",v:["culture","hidden","history"],d:25,s:"A library housing extensive collections of spiritual texts, Vedantic philosophy, and comparative religion documents.",st:"The library preserves texts documenting Hindu philosophy, comparative spirituality, and Vedantic traditions. Access to these texts supports intellectual engagement with spiritual traditions. Libraries like this represent institutional efforts to preserve and share knowledge. Visiting the library offers perspective on how spiritual knowledge is preserved and transmitted.",im:"Shelves of ancient and modern texts on philosophy, spirituality, and Vedantic traditions; scholars study quietly; the library preserves intellectual heritage.",t:"Located in Mylapore. Library access may require membership or donation. Allow 1-2 hours. Respectful behavior required. Quiet, scholarly atmosphere. Photography restricted. Go with genuine interest in spiritual texts.",c:[],r:"g",nn:"ராமகிருஷ்ணர் குலுंब நூலக",ns:"வேதாந்த மற்றும் ஆன்மீக நூல் சிங்ங",nst:"நூல் வேதாந்த உபாசனை; ஆன்மீக புத்தகம் சேகரணை.",nt:"மயிலாப்பூரில் (அணுகல் சீஷ் அல்லது கட்டணம்). மூணை நமஸ்மூறி. உல்ளிட அணுகல்."},{id:28,n:"Ripon Building — British Colonial Architecture",a:"Downtown",v:["architecture","history","hidden"],d:20,s:"A 19th-century colonial building serving as Chennai's municipal corporation, representing Victorian Gothic architecture.",st:"The Ripon Building, completed in 1888, exemplifies Victorian Gothic architecture transplanted to India. The building represents colonial governmental infrastructure and European aesthetic imposition. The building continues to function as Chennai's municipal office. Walking past or learning about the building provides perspective on colonialism's material legacies. The architecture is impressive but represents power structures now challenged.",im:"The Ripon Building's Gothic towers dominate downtown; the ornate architecture visible; the building functioning as contemporary administrative center.",t:"Located in downtown Chennai. Free to view exterior. Viewing interior requires special permission. Allow 15-20 minutes to appreciate architecture. Photography usually permitted of exterior.",c:[],r:"g",nn:"ரிப்பண் கட்டடம்",ns:"1888 விக்டோரியாய় கொதிக்கட்ட சாசனம்",nst:"கொதிக்கட்ட கட்டடம்; வெளிநாட் சொத்து சாசன குறி.",nt:"சென்னை மையம். வெளிப்புற வேலு அணுகல் நிலைய புகைப்படம் அனுமதிக்கப்டு."},{id:29,n:"Carnatic Music Concerts — Classical South Indian Music",a:"Various Venues",v:["culture","art","local"],d:30,s:"Performances of Carnatic (South Indian classical) music at concert halls, during festivals, and special events throughout Chennai.",st:"Carnatic music is one of the world's great classical music traditions. Chennai is the epicenter of Carnatic music culture. December hosts the month-long Margazhi season when hundreds of concerts occur throughout the city. Performances feature renowned musicians and emerging artists. Listening to Carnatic music—complex melodic systems, sophisticated rhythmic structures, and profound emotional expression—is a transformative experience. The music connects spiritual practice and aesthetic sophistication. Supporting concerts and musicians helps preserve this precious cultural tradition.",im:"A musician plays the mridangam (drum) with intricate rhythmic patterns; a vocalist sings complex melodic phrases; the performance transporting and meditative.",t:"Concerts held year-round at various venues (December particularly rich). Check schedules with tourism office or online. Admission fees modest. Respectful dress expected. Arrive early for seating. Silence during performances crucial. The experience is profound.",c:[],r:"g",nn:"கர்னாடக সங்கீதம் சங்கிப",ns:"சென்னை பழங்குலம் கர்நாப் சங்கீத மையம்",nst:"ஆயிரம் வருஷம் சங்கீத பாரம்பரியம்; ஆழ்ந்த ஆன்மீக வடிவிட.",nt:"சங்கீத அரங்க (டிசம்பர் அதிக). நூல் அணுகல். உல்ளிட கட்டணம். மூணை மொறு."},{id:30,n:"Sunset at Marina Beach — Evening Gathering",a:"Marina",v:["beautiful","local","views"],d:15,s:"Watching sunset at Marina Beach as the sky transforms and city lights glow, joining locals for evening time on the beach.",st:"Marina Beach at sunset transforms: the light turns golden and purple, the bay sparkles, and the city begins to glow with evening lights. Families, couples, joggers, and vendors gather for evening hours. The experience is shared: thousands of people enjoying a common public space, the democratic character of the beach evident. Watching the light change while surrounded by locals offers perspective on Chennai's relationship with its waterfront.",im:"The sun descends toward the bay as Marina Beach fills with evening crowds; the light transforms the water to gold; city lights begin to glow.",t:"Located along Marina's eastern edge. Easily accessible. Free access. Go 30 minutes before sunset. Bring water. The experience is popular and social. Photography excellent during golden hour. Very crowded during high season.",c:[],r:"g",nn:"மரீனா கடல் கரை மாலை",ns:"மாலை கட்டு கடல் கரை பொது இடம்",nst:"உள்ளூர் மக்கள் மாலை பொதுப் இடம்; சங்கொ யுங்க.",nt:"மரீனா கிழக் கரைய. உல்ளிட இல்லை. 30 நிமிஷம் முன்பு. நீர் எடுக்கு. புகைப்படம் அழகு."},{id:31,n:"Guindy National Park — Free Urban Forest",s:"A 2.7 sq km urban park in the heart of Chennai with walking trails through dense forests, spotting deer and peacocks, and no entry fee for locals.",a:"Guindy National Park, Sardar Patel Road, Guindy, Chennai 600025",st:"Last weekend I wandered into Guindy National Park after work, followed a trail past grazing blackbucks, and sat under a banyan tree watching peacocks strut like they owned the place.",im:"Peacock feathers rustle in the breeze carrying earthy soil and wildflower scents.",t:"Enter from Gate 2 on Sardar Patel Road early morning to avoid crowds, bring water as no shops inside.",nst:"கடந்த வார இறுதியில் வேலையிலிருந்து வெளியே வந்த பிறகு கிண்டி தேசிய பூங்காவுக்குச் சென்றேன், கருப்பு மான் மேய்க்கும் பாதையைப் பின்தொடர்ந்து, ஆலமரத்தின் கீழ் உட்கார்ந்து மயில் நடக்கும் காட்சியைப் பார்த்தேன்.",nt:"காலை முன் 6 மணிக்கு சர்தார் படேல் சாலையில் உள்ள கேட் 2 இலிருந்து நுழையுங்கள் பெரிய கூட்டத்தைத் தவிர்க்க, உள்ளே கடைகள் இல்லாததால் தண்ணீர் கொண்டு வருங்கள்.",v:["hidden"],r:"g",d:30,c:[],nn:"Guindy National Park — Free Urban Forest",ns:"A 2.7 sq km urban park in the heart of Chennai with walking trails through dense forests, spotting deer and peacocks, and no entry fee for locals."},{id:32,n:"Semmozhi Poonga — Free Botanical Garden",s:"A 20-acre free public garden in Egmore with themed plant sections, fountains, and shaded paths open daily till 7:30 PM.",a:"Semmozhi Poonga, Cathedral Road, Egmore, Chennai 600008",st:"I biked to Semmozhi Poonga on a humid afternoon, cooled off by the mist fountain, and found a quiet bench surrounded by orchids buzzing with butterflies.",im:"Fine mist sprays cool your skin amid jasmine sweetness and rustling bamboo.",t:"Visit after 4 PM on weekdays for empty orchid house, park bike at free stand near main gate.",nst:"அதிக வெப்பமுள்ள மதியத்தில் செம்மொழி பூங்காவுக்கு சைக்கிளில் சென்றேன், தண்ணirpூச்சி அருகே ஆறுதல் அடைந்து, ஆர்கிட் பூக்களால் சூழப்பட்ட அமைதியான பெஞ்சைக் கண்டேன்.",nt:"வாரத்திற்கு பிறகு மதியம் 4 மணிக்கு பார்க்கவும் ஆர்கிட் அறை காலியாக இருக்கும், மெயின் கேட்டருகே இலவச பைக்கு ஸ்டாண்ட் உள்ளது.",v:["hidden"],r:"g",d:30,c:[],nn:"Semmozhi Poonga — Free Botanical Garden",ns:"A 20-acre free public garden in Egmore with themed plant sections, fountains, and shaded paths open daily till 7:30 PM."},{id:33,n:"Anna Memorial Viewpoint — Free Marina Overlook",s:"Free elevated viewpoint atop Anna Memorial offering panoramic Marina Beach and lighthouse views, accessible daily.",a:"Anna Memorial, Lighthouse Hill, Marina Beach, Chennai 600028",st:"Climbed the steps at Anna Memorial last evening, wind whipping my face as fishing boats dotted the horizon below the lighthouse.",im:"Salty sea wind mixes with roasted corn smells from vendors below.",t:"Go at 5 PM sunset, take steps on south side less crowded than ramp.",nst:"நேற்று மாலை அண்ணா நினைவிடத்தின் படிகளேறி, காற்று முகத்தைத் தாக்க, விளக்குத்தடியில் மீன் படகுகள் தெரிந்தன.",nt:"மாலை 5 மணி சூரிய அஸ்தமனத்துக்கு செல்லுங்கள், ராம்பைவிட குறைந்த கூட்டம் தெற்கு பக்க படிகள்.",v:["hidden"],r:"g",d:30,c:[],nn:"Anna Memorial Viewpoint — Free Marina Overlook",ns:"Free elevated viewpoint atop Anna Memorial offering panoramic Marina Beach and lighthouse views, accessible daily."},{id:34,n:"21G Bus Route — Scenic East Coast Road",s:"MTC bus 21G from Broadway to Kovalam via ECR, passing beaches, temples, and villages, scenic coastal ride.",a:"Route: Broadway Bus Terminus to Kovalam via ECR, Chennai",st:"Rode 21G bus from Broadway one morning, watched waves crash at Elliot's Beach, then palm groves before Mahabalipuram shore temples.",im:"Ocean spray scents waft through open windows with temple drum echoes.",t:"Board 21G at 8 AM from platform 13 at Broadway, sit left side for sea views, fare Rs 30.",nst:"ஒரு காலை பிராட்வேயிலிருந்து 21G பேருந்தில் ஏறி, எலியட் பீச்சில் அலைகள் அடிக்கும் காட்சி பார்த்து, மகாபலிபுரம் கரையோர கோயில்கள் வரை பனைக்காடுகளைப் பார்த்தேன்.",nt:"காலை 8 மணிக்கு பிராட்வேவில் பிளாட்பார்ம் 13 இல் 21G ஏறுங்கள், கடல் காட்சிக்கு இடது பக்கம் உட்காருங்கள், கட்டணம் ரூ.30.",v:["hidden"],r:"g",d:30,c:[],nn:"21G Bus Route — Scenic East Coast Road",ns:"MTC bus 21G from Broadway to Kovalam via ECR, passing beaches, temples, and villages, scenic coastal ride."},{id:35,n:"Muthialpet Fish Market — Free Vibrant Market",s:"Bustling free morning fish market in North Chennai with fresh catches, local haggling, and harbor views.",a:"Muthialpet Fish Market, Near Chennai Port, George Town, Chennai 600001",st:"Squeezed through Muthialpet market at dawn, silver pomfret gleaming on ice slabs as aunties bargained fiercely with fishermen.",im:"Fish brine and frying oil aromas assault your nose amid loud Tamil shouts.",t:"Arrive 6 AM Tuesday for freshest seer fish, wear slippers for wet floors.",nst:"மாற்றில் சூரிய உதயத்தின் போது சந்தைக்குச் சென்று, பன்னீரில் வெள்ளி பாம்ப்ரெட் மின்ன, தாத்தாக்கள் விலையில் சண்டை போட்டனர்.",nt:"செவ்வாய் காலை 6 மணிக்கு வந்தால் புது வஞ்சிராம்படி கிடைக்கும், ஈரமான தரைக்கு சொறி அணியுங்கள்.",v:["hidden"],r:"g",d:30,c:[],nn:"Muthialpet Fish Market — Free Vibrant Market",ns:"Bustling free morning fish market in North Chennai with fresh catches, local haggling, and harbor views."},{id:36,n:"Perambur Neighborhood — Off-beat Industrial Area",s:"Working-class neighborhood north of central Chennai with old bungalows, street food stalls, and local vibe away from tourist spots.",a:"Perambur, Near Perambur Railway Station, Chennai 600011",st:"Strolled Perambur lanes after train spotting at the station, grabbed hot samosas from a pushcart uncle who's been there 20 years.",im:"Spicy samosa steam rises with distant train whistles and evening temple bells.",t:"Walk Perambur High Road evenings, try bajji at Ganapathy stall near signal.",nst:"நிலையத்தில் ரயில் பார்த்த பிறகு பெரம்பூர் தெருக்களில் நடந்தேன், 20 வருஷமா இருக்கிற புஷ்கார்ட் தாத்தாவிடம் சூடான சமோசா வாங்கினேன்.",nt:"மாலை பெரம்பூர் ஹை ரோட்டில் நடந்து, சிக்னல் அருகே கணபதி ஸ்டாலில் பஜ்ஜி சாப்பிடுங்கள்.",v:["hidden"],r:"g",d:30,c:[],nn:"Perambur Neighborhood — Off-beat Industrial Area",ns:"Working-class neighborhood north of central Chennai with old bungalows, street food stalls, and local vibe away from tourist spots."}];

,{id:37,n:"Mylapore Temple Tank Walk",a:"Mylapore",v:["hidden","history","quiet"],d:30,s:"Ancient tank at dawn with Brahmin quarter waking up",st:"The Kapaleeshwarar Tank is a 2000-year-old ritual centre where Mylapore's oldest Brahmin community comes to bathe before dawn prayers. Jasmine and sea salt mingle in the air. You're walking through Tamil civilization's living heartbeat.",im:"Purple light spills across water as temple bells begin their 5am call.",t:"Come before 6am. The mada streets around the tank fill with flower sellers and brass vendors by 7am.",c:[],r:"g",nn:"மயிலாபூர் தெவூர் கடை நடை",ns:"பிரம்மின் பurbans மற்றும் பெண்களின் saris கலோரிएत நிறங்கள்",nst:"கோபாலக்ஷரர் தொட்டி மயிலாபூரின் மையமாகும். 2,000 ஆண்டுகாலமாக பிராமணிய சமூதாயம் இங்கு வாழ்கிறது. விடியல் வேளை நீர் நிலை தெய்வ வழிபாட்டின் மையம்.",nt:"விடியலுக்கு முன் வாருங்கள். மணம், சங்கு அழைப்பு, மூலிகை தீபம்."},
{id:38,n:"Besant Nagar Fishing Village Morning",a:"Besant Nagar",v:["local","history","free entry"],d:45,s:"The other Mumbai: where fishermen still own the beach at 5am",st:"Before the walkers arrive, the fishing boats come in with the tide. Women organize their catch in careful piles while children run between nets. This is how this beach has worked for 400 years.",im:"Salt-soaked air, the cries of vendors, the glint of fresh fish on wet sand.",t:"Walk from the quieter southern end. Fishermen land boats 5-7am. Bring cash for fresh fish breakfast.",c:[],r:"g",nn:"பேசந்த் நகர் மீன் பிடிக்கும் கிராமம்",ns:"கடல் இன்னும் மீனவர்களுக்கு சொந்தம்",nst:"பேசந்த் நகர் கடலோரமான கிராமம் நூற்றாண்டு தொட்டு மீனவர் சமூதாயத்தின் வாழ்க்கை நட்டத்தை செய்யும். விடியல் நேரம் மறுவாழ்வு எங்கு இன்னும் உள்ளது.",nt:"விடியல் வேளை நடை செய்யுங்கள். தாজா மீன் பிடிக்கும் காட்சி."},
{id:39,n:"Elliott's Beach Quiet South",a:"Besant Nagar",v:["beautiful","quiet","local"],d:30,s:"The cleanest, loneliest 2km of Chennai sand",st:"While Marina Beach heaves with crowds, Elliott's southern curve curls into solitude. The Ashtalakshmi Temple anchors the quiet end. Fishermen still mend nets here, and the light is gentler.",im:"Morning mist rolling off the Bay of Bengal, the temple's white gopuram emerging from fog.",t:"Walk early. The quiet end is south of Ashtalakshmi Temple. Bring water; no vendors until the main beach.",c:[],r:"g",nn:"எலியட் கடற்கரை அமைதி",ns:"மணலின் 2 கிமீ தனிமை",nst:"செண்ணையின் அழகான மணலோரம். பழைய கோயில் மற்றும் மீனவர் நெறுகள் இங்கு உள்ளன.",nt:"விடியல் நடை. குறைந்த இடம் ஆசலக்ஷ்மி கோயிலுக்குத் தெற்கே."},
{id:40,n:"Adyar Library Gardens",a:"Adyar",v:["hidden","beautiful","quiet"],d:45,s:"450-year-old banyan tree and a library that reads like a Sanskrit verse",st:"The Theosophical Society gardens are perhaps Chennai's best-kept secret. A massive ancient banyan dominates everything. Bats roost in the canopy, philosophers sat under these roots for a century. Free to wander.",im:"Dappled light through a thousand branches, the hum of fruit bats at dusk, silence so complete it feels ancient.",t:"Open afternoons. Bring a book. The Adyar River flows behind the gardens. It's a 30-minute walk through shade.",c:[],r:"g",nn:"ஆதியார் தோட்டம்",ns:"450 ஆண்டுகள் புரியா மரம்",nst:"தியோசோபிக்கல் சமூகம் தோட்டங்கள் செண்ணையின் மிகவும் மறைந்த ரத்தினம். பழங்களும் பாதுரை விலங்கினங்கள் தசாப்தம் முழுவதும் தங்கியுள்ளன.",nt:"பிற்பகல் நாட்களில் பொதுவாக திறந்திருக்கும்."},
{id:41,n:"Kapaleeshwarar Temple Mada Streets",a:"Mylapore",v:["history","local","weird"],d:40,s:"Four chaotic streets where 400 years of trade never stopped",st:"The four mada streets circling the Kapaleeshwarar tank are a time-machine loop of flower sellers, brass vendors, and Brahmin grocers. Mornings smell of jasmine and jaggery. You can buy silver ornaments worth ₹50 or ₹50,000.",im:"Spice clouds rising from breakfast vendors, the metallic chime of brass bangles, incomprehensible abundance.",t:"Go in morning before 9am. The streets are a maze; get gloriously lost. Bring small bills for pakodas and filter coffee.",c:[],r:"g",nn:"கபாலீசுவரர் மாதா தெரு",ns:"நான்கு வீதிகள், நூற்றாண்டு வர்த்தகம்",nst:"மாதா வீதிகள் செண்ணையின் மையமான வாணிக வீதிகள். பூ விற்பனைக்காரர், பித்தளை கடைக்காரர், தங்க வைரம் வர்த்தகிகள் இங்கே செயல்பட்டு வரும்.",nt:"காலையில் 9am க்கு முன் செல்லவும்."},
{id:42,n:"George Town Colonial Walk",a:"George Town",v:["history","beautiful","hidden"],d:60,s:"Where the British built a city and left it as a time capsule",st:"George Town is how Chennai began: Fort St. George, St. Mary's Church (oldest Anglican church in India), the Madras High Court in Gothic splendor. The streets still feel 1750s—small stalls between colonial facades, the smell of port and history.",im:"Weathered British stonework glowing in afternoon sun, the dense warren of Armenian jewelers' shops and spice dealers.",t:"Self-guided walk from Fort St. George. The streets are winding and chaotic. Get lost intentionally. Free. Bring a camera.",c:[],r:"g",nn:"ஜார்ஜ் டவுன் நடை",ns:"பிரிட்டிஷ் நகர் கட்டமைப்பு",nst:"ஜார்ஜ் டவுனில் செண்ணை பிறந்தது. பழைய கட்டடங்கள், பெங்களூர் வணிகர்கள், புரியாதொல்லிப் பாதை நகரம்.",nt:"சுயமாக வேண்டும் அல்லது ஆய்வு செய்யவும்."},
{id:43,n:"Kalakshetra Foundation Open Classes",a:"Adyar",v:["history","beautiful","local"],d:90,s:"Watch Bharatanatyam dancers in training at India's oldest classical arts academy",st:"Kalakshetra sits on 100 acres by the sea. Students practice Bharatanatyam and Carnatic music daily. You can watch through classroom windows: young women in practice saris, bells on their feet, moving through thousand-year-old gestures. The academy was founded in 1936.",im:"The rapid tattoo of ghungroos, the harsh breathing of exertion, the hypnotic geometry of a mudra.",t:"Go weekday afternoons. Peek into open-air classrooms. No admission fee. The campus itself is a museum of Dravidian architecture.",c:[],r:"g",nn:"கலாக்ஷேத்ர நிறுவனம்",ns:"ஆயிரம் வருஷ பரம்பரை நடனம்",nst:"கலாக்ஷேத்ர இந்தியாவின் மிகவும் பழைய கலை கல்வி நிறுவனம். பாரதநாட்ய நৃத்த மாணவர்கள் தினசரி பயிற்சி செய்கின்றனர்.",nt:"வார நாட்களில் மதியம் செல்லவும்."},
{id:44,n:"Semmozhi Poonga Botanical Garden",a:"Alandur",v:["beautiful","hidden","free entry"],d:60,s:"20 acres of riotous, planned chaos: 500+ flowering plants",st:"A newer park (opened 2010s), Semmozhi Poonga is designed like a Tamil poem—curved pathways through sculpted gardens with herbs, tropical flowers, medicinal plants. It's lush but organized. Butterflies everywhere. locals still don't know about it.",im:"The shock of a thousand colors at once, butterflies like flying stained glass, the smell of jasmine and mint competing.",t:"Small entry fee. Go in morning. Bring a notebook; it's perfect for sitting and thinking. The medicinal herb section is fascinating.",c:[],r:"g",nn:"செம்மொழி பூங்கா",ns:"500+ பூக்கள் ஒரு தோட்டத்தில்",nst:"செம்மொழி பூங்கா தமிழ் கவிதையை போல் வளைந்த பாதைகளால் நட்டப்பட்டுள்ளது.",nt:"மிதமான நுழைவு கட்டணம். காலையில் செல்லவும்."},
{id:45,n:"Velleeswarar Temple Hidden Gem",a:"Triplicane",v:["hidden","history","quiet"],d:30,s:"A 7th-century temple that tourists completely miss",st:"While Kapaleeshwarar draws crowds, Velleeswarar sits in peaceful obscurity in Triplicane. Ancient gopuram, intricate carvings, and almost nobody. The air is cooler here, the stones worn smooth by centuries. It feels like a secret.",im:"Shadows pooling in carved niches, the sound of your own footsteps, the weight of very old stone.",t:"Go early morning. Bring water. The temple kitchen (annadana) operates some mornings—ask for free breakfast.",c:[],r:"g",nn:"வேள்ளேசுவரர் கோயில்",ns:"ஏழாம் நூற்றாண்டு திரவிடக் கட்டடம்",nst:"வேள்ளேசுவரர் கோயில் சுமாரு 7வது நூற்றாண்டுகளுக்கு முந்தைய தமிழ் கோயில். இங்கு சுமாரு மக்கள் இல்லை.",nt:"விடியலுக்கு செல்லவும்."},
{id:46,n:"Cholamandal Artists' Village",a:"Cholamandal",v:["weird","beautiful","local"],d:120,s:"India's first collective of artists: 45 minutes south where painters still live and work",st:"Founded 1966, Cholamandal is a painted village where artists actually live, work, and sell. Pastel buildings, open studios, weavers and sculptors at their looms. It's not a museum—it's a functioning creative ecosystem. Many artists are second-generation now.",im:"The smell of oil paint, fresh flowers by doorsteps, the whine of looms, the particular color of artist-village light at 4pm.",t:"Hire a car (₹500-800) or bus from Chennai. Studios open afternoons. Bring cash. Artists are generous with time—chat with them.",c:[],r:"g",nn:"சோழமண்டல் கலைஞர் கிராமம்",ns:"ஓவியர்களின் முதல் சமூகம்",nst:"சோழமண்டல் 1966ஆம் ஆண்டில் நிறுவப்பட்டது. இங்கு கலைஞர்கள் வாழ்க்கை மற்றும் கலை செய்கின்றனர்.",nt:"மாலையில் அவர்களைக் கூட மாட்டுங்கள்."},
{id:47,n:"Nochikuppam Fish Market Dawn",a:"Marina",v:["local","weird","free entry"],d:45,s:"2.5km of organized chaos: where 2,000 fishermen sell the day's catch",st:"The Loop Road fish market is where Chennai's protein comes from. At 6-7am, it's a symphony of negotiation: women in saris bargaining, ice melting in the sun, the smell of salt and ammonia. It's raw, real, and completely unglamorous.",im:"Ice chips gleaming on silver bodies, the particular shriek of women merchants, mud under bare feet, chaos made rhythmic.",t:"Go 6-7am. Bring small change. Ask a vendor for breakfast—they'll point you to the best place. Come hungry.",c:[],r:"g",nn:"நொச்சிக்குப்பம் மீன் சந்தை",ns:"2.5கி.மீ மீன் சந்தை",nst:"நொச்சிக்குப்பம் மீன் சந்தை செண்ணையின் மிக முக்கியமான மீன் சந்தை.",nt:"விடியலுக்கு 6-7 மணிக்கு வாருங்கள்."},
{id:48,n:"Adyar River Sunset Walk",a:"Adyar",v:["quiet","beautiful","hidden"],d:60,s:"The river that gave Adyar its name, at its quietest and most luminous",st:"The Adyar River flows through Chennai but most people never see it. A walk along its banks at dusk reveals fishing communities, bird sanctuaries beginning to wake, the smell of water hyacinth. It's intimate and urban at once.",im:"Gold light on brown water, the calls of night birds starting up, the silhouettes of fishing boats.",t:"Start from Adyar Library and walk along the river path. Best in winter (Oct-Feb). Watch for mosquitoes at dusk.",c:[],r:"g",nn:"ஆதியார் ஆறு சூரிய மறைவு நடை",ns:"நதி வெள்ளுக்கும் ஒளி",nst:"ஆதியார் ஆறு செண்ணை வழியாக பாய்கிறது. சூரிய மறைவு நேரம் அழகாக இருக்கிறது.",nt:"ஆதியார் நூல் நிலையத்தில் இருந்து தொடங்குங்கள்."}];

const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TBGS={"places":"url('../../textures/tex12.webp') center/cover fixed no-repeat","collections":"url('../../textures/tex13.webp') center/cover fixed no-repeat","missions":"url('../../textures/tex14.webp') center/cover fixed no-repeat","plan":"url('../../textures/tex15.webp') center/cover fixed no-repeat","phrases":"url('../../textures/tex16.webp') center/cover fixed no-repeat","default":"url('../../textures/tex12.webp') center/cover fixed no-repeat"};function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Chennai Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Chennai Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
