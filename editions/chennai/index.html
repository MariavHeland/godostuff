<script>
const P = [
  {id:1,n:"Meenakshi Amman Temple — Dravidian Architecture Masterpiece",a:"Meenakshi Temple",v:["history", "sacred", "art"],d:45,s:"A 2,500-year-old Hindu temple with massive gopurams (towers), intricate sculptures, and sacred significance to millions of devotees.",st:"The Meenakshi Amman Temple stands as one of the world's largest temples and a pinnacle of Dravidian architecture. The temple's four gopurams (towers) rise dramatically, each tier decorated with hundreds of sculpted figures. The temple is dedicated to Goddess Meenakshi (an avatar of Parvati) and her consort Sundareswara (Shiva). The temple's construction spanned centuries; major additions occurred during the Nayak period (1500s-1700s). Walking through the temple's corridors, you encounter intricate stone carvings, massive pillars, and sacred spaces. The temple remains an active place of worship: thousands of devotees gather daily for prayer, ritual, and spiritual connection. The temple represents Tamil culture, Hindu spirituality, and artistic excellence. Respectful engagement requires understanding the sacred nature of the space and following protocols.",im:"A massive gopuram dominates the skyline, its towers ascending tier by tier, each tier sculpted with hundreds of divine figures, the craftsmanship overwhelming.",t:"Located in the heart of Madurai (240km from Chennai, 4-5 hours by car or train). Entry fee minimal (nominal amount). Respectful dress required: cover shoulders and knees. Remove shoes before entering sanctum. Photography restricted in inner sanctums. Allow 2-3 hours. Early morning and evenings are quieter. Guides available. Go with reverence.",c:[],r:"g",nn:"மீனாக்ஷி அம்மன் கோயில்",ns:"கால் சதகம் ஆண்டுகள் முன் கட்டப்பட்ட திராவிட கட்டடக்கலை",nst:"மீனாக்ஷி தெய்வத்திற்கு நீண்ட வரலாறு; கோபுரங்கள் பல நூறு சிற்ப வேலைகளை சுமந்துள்ளது.",nt:"மதுரையில் (சென்னையிலிருந்து 240 கி.மீ., 4-5 மணி நேரம்). உள்ளிட கட்டணம். மரியாதைப்பூர்வ ஆடை. வாசல் முன்பு காலணி நீக்கவும். உள்ளே புகைப்படம் தடை."},
  {id:2,n:"Kapaleeshwar Temple — Oceanside Shiva Sanctuary",a:"Mylapore",v:["sacred", "history", "art"],d:30,s:"A 7th-century Shiva temple in the Mylapore neighborhood with ornate gopuram, sacred tank, and important pilgrimage site.",st:"The Kapaleeshwar Temple, one of the oldest temples in Chennai, dates to the 7th century and underwent major renovations in the 16th century. The temple is dedicated to Shiva and is considered one of the Pancha Bhoota Sthalams (five elemental temples dedicated to Shiva). The temple's gopuram is beautifully sculpted; the sacred tank (temple pond) is considered especially holy. The surrounding Mylapore neighborhood is historically significant and theologically important to Tamil Hinduism. The temple attracts devotees and pilgrims from across Tamil Nadu and beyond. Walking the temple and surrounding area, you encounter religious devotion, artistic heritage, and cultural continuity spanning centuries.",im:"The temple's gopuram rises ornately above the surrounding buildings; devotees perform rituals at the sacred tank below; the atmosphere spiritual and devotional.",t:"Located in Mylapore, a central Chennai neighborhood (accessible by metro, bus, or taxi). Entry fee nominal. Respectful dress required. Remove shoes in designated areas. Photography limited in sanctums. Allow 1-2 hours. Go early morning for peaceful experience. Guides available for deeper information.",c:[],r:"g",nn:"கபாலீஸ்வர் கோயில்",ns:"ஏழாம் நூற்றாண்டுக்கு உரிய சிவன் கோயில் மயிலாப்பூரில்",nst:"பஞ்ச பூதஸ்தலங்களின் ஒன்று; பெண் தெய்வம் அம்பிகா வழிபாட்டு ஸ்தலம்.",nt:"மயிலாப்பூரில் (மெட்ரோ, பேருந்து, தக்षி அணுகல்). உள்ளிட கட்டணம். மரியாதைப்பூர்வ ஆடை. வாசல் முன் காலணி."},
  {id:3,n:"Parthasarathy Temple — Vaishnavite Heritage",a:"Triplicane",v:["sacred", "history", "art"],d:30,s:"An ancient Vishnu temple with beautiful sculptures, considered one of South India's most important Vaishnavite pilgrimage sites.",st:"The Parthasarathy Temple, dedicated to Krishna (as Partha's charioteer), dates to antiquity and underwent significant renovations during the Pallava period. The temple is one of South India's most important Vaishnavite temples. The intricate stone carvings depict Krishna's life and divine mythology. The temple remains a center of Tamil Vaishnavism and traditional Vedic learning. The Triplicane neighborhood surrounding the temple has historical significance stretching back centuries. Walking the temple, you encounter elaborate sculptural work, sacred spaces, and the living tradition of temple worship. The temple represents Tamil's unique Vaishnavite tradition that blends philosophical depth with artistic excellence.",im:"Stone pillars covered in intricate Krishna imagery; the inner sanctum glowing with oil lamps; devotees engaged in prayer rituals.",t:"Located in Triplicane, central Chennai (accessible by public transport). Entry fee nominal. Respectful dress required. Remove shoes before entering main sanctum. Photography limited in inner areas. Allow 1-2 hours. Early morning is peaceful. Guides available. Go with reverence.",c:[],r:"g",nn:"பார்தசாரதி கோயில்",ns:"கிருஷ்ணனுக்கு பதிப்பிக்கப்பட்ட பழைய வைணவ கோயில்",nst:"தமிழ் வைணவவசனத்தின் ஒரு முக்கிய ஸ்தலம்; கிருஷ்ணனின் சரித்திரம் மூர்திகளில் சிற்ப வேலை.",nt:"திருப்ளிகாணத்தில் (பொதுப் போக்குவரத்து அணுகல்). உள்ளிட கட்டணம். மரியாதைப்பூர்வ ஆடை. வாசல் முன் காலணி."},
  {id:4,n:"Sri Veeramakaliamman Temple — Goddess Worship",a:"Perambur",v:["sacred", "local", "cultural"],d:25,s:"A 300-year-old temple dedicated to Goddess Kali, important to local devotion, with vibrant rituals and strong community connections.",st:"The Sri Veeramakaliamman Temple is dedicated to Goddess Kali, a fierce form of the divine feminine in Hindu theology. The temple serves a primarily working-class neighborhood and retains the character of local, community-based worship rather than grand pilgrimage temple. The deity Kali represents transformation, destruction of ego, and liberation. The temple holds important festivals throughout the year; during Navaratri (nine-day festival honoring the goddess), the temple becomes a center of devotional intensity. Walking the temple and neighborhood, you encounter genuine grassroots Hindu practice, women's spiritual leadership (priestesses and devotees), and the integration of divine worship into daily community life.",im:"The temple's inner sanctum glows with oil lamps; the goddess Kali's fierce form depicted with dark complexion and wild appearance; devotees perform puja (worship rituals).",t:"Located in Perambur, northern Chennai (accessible by public transport). Entry free. Respectful dress required. Remove shoes before entering. Photography allowed in outer areas but restricted in sanctum. Allow 30-45 minutes. Go during festivals for most vibrant experience. The neighborhood is authentic and welcoming.",c:[],r:"g",nn:"ஸ்ரீ வீரமகாளியம்மன் கோயில்",ns:"தெய்வத்தி கெளடின் உபாசனையின் மூன்று நூற்றாண்டுப் பழமையான கோயில்",nst:"கண்ணி தெய்வத்தை பிரதிநிதித்துவம்; உள்ளூர் ஆன்மீக நடன ஒரு மையம்.",nt:"பெரம்பூரில் (பொதுப் போக்குவரத்து அணுகல்). உள்ளிட இல்லை. மரியாதைப்பூர்வ ஆடை. வாசல் முன் காலணி."},
  {id:5,n:"San Thome Cathedral — Colonial Christian Heritage",a:"San Thome",v:["history", "architecture", "hidden"],d:25,s:"A 16th-century Portuguese church built over an earlier Syrian Christian shrine, representing Christianity's long presence in South India.",st:"San Thome Cathedral stands on the traditional burial site of St. Thomas the Apostle, who is believed to have traveled to South India in 52 CE and was martyred near Chennai. The current structure, begun in 1504 by Portuguese colonizers, replaced earlier Syrian Christian structures. The cathedral represents the intersection of Indian Christianity (one of the oldest Christian communities in the world) and European colonialism. The Gothic architecture contrasts with surrounding temple architecture, representing religious and cultural plurality. The cathedral remains an active place of Christian worship with services continuing. Walking the cathedral, you encounter the layers of history: ancient Christianity, colonial architecture, and contemporary faith practice.",im:"The cathedral's Gothic towers rise above the waterfront; Portuguese architectural elements contrast with the South Indian landscape; the interior glows with Christian iconography.",t:"Located in San Thome, central Chennai (accessible by public transport). Entry nominal fee. Respectful dress required. Remove shoes if requested. Photography often allowed. Allow 30-45 minutes. Services held at specific times; respecting worship is important. The location offers views of the ocean.",c:[],r:"g",nn:"சான் தோமி கதீட்ரல்",ns:"பதினாறாம் நூற்றாண்டுக் கிரிஸ்தவ சேக்கை கோயில்",nst:"ஆரம்ப கிரிஸ்தவ சமுதாயத் தொட்டுவர்; ஐரோப்பிய கட்டடக்கலை தமிழ் நாட்டில் வடிவமைப்பு.",nt:"சான் தோமியில் (பொதுப் போக்குவரத்து அணுகல்). உள்ளிட கட்டணம். மரியாதைப்பூர்வ ஆடை. வாசல் முன் காலணி."},
  {id:6,n:"Government Museum and National Art Gallery",a:"Egmore",v:["art", "history", "culture"],d:40,s:"A major museum with bronzes, sculptures, textiles, and art documenting South Indian history and Dravidian civilization.",st:"The Government Museum houses one of India's most important collections: Chola bronze sculptures (9th-13th centuries), stone sculptures from various periods, Greek and Roman artifacts, textiles, and contemporary art. The bronze collection is particularly remarkable—thousands of years old, depicting divine and royal figures with extraordinary artistry. The museum documents South India's sophisticated civilization: the Dravidian kingdoms, artistic achievement, and cultural continuity. Walking through the museum, you encounter the material heritage of Tamil and South Indian civilization—objects made hundreds and thousands of years ago, revealing the sophistication and artistic vision of ancient peoples. The museum provides essential context for understanding South India's historical importance and cultural depth.",im:"A bronze Shiva Nataraja (dancing Shiva) statue glows under museum lighting—intricate detail visible, the pose expressing divine cosmic dance.",t:"Located in Egmore, central Chennai (accessible by metro, bus, taxi). Admission fee required (modest). Open daily except Mondays. Allow 2-3 hours. Photography allowed in most sections. The bronze collection is the highlight. Guides available. English descriptions provided.",c:[],r:"g",nn:"அரசு சங்கிப பொருட்கள் மற்றும் கலையியல் சேகரிக்கப்",ns:"சோழ வெண்கல மூர்திகள் மற்றும் தென்னிந்திய கட்டடக்கலை",nst:"வெண்கல சங்கிப பொருட்கள் தென்னிந்திய நாகரிகத்தின் கலை உருவாக்கத்தைக் காட்டுகிறது.",nt:"ஏக்மோரில் (மெட்ரோ, பேருந்து, தக்சி அணுகல்). உள்ளிட கட்டணம். திங்கட்கிழமை மூடுவார். புகைப்படம் அனுமதிக்கப்பட்டுள்ளது."},
  {id:7,n:"Marina Beach — Coastal Public Space",a:"Marina",v:["beautiful", "local", "nature"],d:30,s:"One of the world's longest urban beaches, offering coastal walks, sunsets, and social gathering spaces for locals and visitors.",st:"Marina Beach stretches 13km along the Bay of Bengal, offering Chennai residents and visitors a major public space. The beach is not for swimming (strong currents and pollution) but for walking, socializing, watching sunsets, and enjoying sea breeze. The promenade is crowded during morning and evening hours: joggers, walkers, families, vendors, musicians. The beach hosts festivals and cultural events. The surrounding area contains important monuments: the former presidency building, memorials to freedom fighters. Marina Beach represents Tamil Nadu's relationship with the ocean and serves as a democratic public space where people of all classes gather.",im:"Crowds of people walk along the long beach at sunset; vendors sell food and beverages; the bay glimmers with reflected light; families enjoy the evening breeze.",t:"Located along central Chennai's eastern edge. Easily accessible by public transport, walking, or taxi. Free access. Best visited during early morning (5-7am) or evening (5-7pm) for cooler temperatures. Bring water. Do not swim (dangerous currents). The promenade offers pleasant walking.",c:[],r:"g",nn:"மரீனா கடல் கரை",ns:"உலகின் மிக நீளமான நகர கடல் கரை பொது இடம்",nst:"13 கிமீ நீளமான; மக்களை ஒன்றுபடுத்துவ பொது இடம் அனைத்து வகுப்பு.",nt:"சென்னையின் கீழ் விளிம்பு. பொதுப் போக்குவரத்து, நடைபயணம், தக்சி அணுகல். உள்ளிட இல்லை. ஆரம்பம் மணி (5-7) அல்லது மாலை (5-7)."},
  {id:8,n:"Vedantharangam — Vedantic Learning Center",a:"Vedantharangam",v:["history", "hidden", "cultural"],d:30,s:"A traditional center for Vedantic study and Sanskrit learning, representing centuries-old intellectual traditions in South India.",st:"Vedantharangam represents the continuation of India's ancient philosophical traditions. The institution focuses on Vedanta (Hindu philosophical tradition) and Sanskrit studies. Teachers and students engage with classical texts, oral traditions, and philosophical inquiry. The existence of such institutions in contemporary Chennai represents cultural continuity: these scholarly traditions persist despite modernization. Visiting or learning about Vedantharangam provides insight into intellectual traditions that have sustained for millennia. The institution represents the depth of Hindu intellectual culture and Tamil philosophical heritage. Access may be limited, but respectful inquiry may allow observation of classes or conversations with scholars.",im:"Traditional guru and students sit on the floor studying Sanskrit texts; oil lamps illuminate the space; the atmosphere contemplative and scholarly.",t:"Located in Vedantharangam neighborhood of Chennai. Access depends on institutional policies; some observation might be possible with respectful request. Allow 1-2 hours if access granted. Respectful behavior essential. Go with genuine interest in learning, not tourism.",c:[],r:"g",nn:"வேதாந்தாரங்கம்",ns:"வேதாந்த மற்றும் சம்ஸ்கிரிதம் கற்றல் மையம்",nst:"ஆயிரம் ஆண்டுகளாக தொடர் தத்துவ பரம்பரை; சம்ஸ்கிரித உபனிஷத் ஆய்வு.",nt:"வேதாந்தாரங்கம் பக்கவாதி சென்னையில். அணுகல் மையத்தின் கொள்கை சார். மரியாதைப்பூர்வ நடத்தை."},
  {id:9,n:"Kalakshetra Foundation — Classical Arts Preservation",a:"Thiruvanmiyur",v:["art", "culture", "hidden"],d:35,s:"An institution dedicated to preserving classical Indian dance (Bharatanatyam) and other traditional arts, with performances and training.",st:"Kalakshetra was founded in 1936 to preserve and propagate Bharatanatyam, a classical dance form with roots in Tamil temples. The institution provides training to dancers while maintaining traditional standards. Bharatanatyam originated as a devotional practice in temples; colonial-era suppression nearly led to its disappearance. Kalakshetra's work helped revive and legitimize the form. The institution also preserves other classical arts: music, drama, textile arts. Kalakshetra hosts performances and cultural events. The surrounding area (Thiruvanmiyur) is peaceful. Visiting allows observation of classes, performances, or learning about classical Indian dance traditions.",im:"A young dancer in traditional costume performs Bharatanatyam in the courtyard; the movements precise and devotional; musicians accompany with traditional instruments.",t:"Located in Thiruvanmiyur, southern Chennai (accessible by public transport). Admission for performances or classes. Training programs available for serious students. Allow 1-2 hours for visiting. Performances scheduled regularly; check ahead. Go to support classical arts preservation.",c:[],r:"g",nn:"கலாக்ஷேத்திரம்",ns:"பாரதநாட்டிய கிளாসிக் நৃত்த பாதுக்காக்க நிறுவனம்",nst:"பாரதநாட்டிய உத்தராக; கோயில் கொடிப் நூல் நாட்டியம் உறவு.",nt:"திருவாண்மியூரில் (பொதுப் போக்குவரத்து அணுகல்). அ நடனம் அல்லது வகுப்புக்கு உள்ளிட. பரிசு தொடர்பளிக்க."},
  {id:10,n:"Thiruvanmiyur Beach — Calm Coastal Area",a:"Thiruvanmiyur",v:["nature", "beautiful", "local"],d:25,s:"A quieter southern beach with temple proximity, fishing activity, and local color distinct from Marina Beach's urbanity.",st:"Thiruvanmiyur Beach, in southern Chennai, offers a different experience than Marina Beach: quieter, less commercial, closer to local fishing communities. The beach has a temple proximity (Sri Veeramakaliamman Temple) that adds spiritual character. Fishing boats still operate from the beach, representing traditional livelihoods. The surrounding neighborhood retains village character despite urban encroachment. Walking the beach early morning allows observation of fishermen returning with catches, birds, and the ocean's natural rhythms. The beach is less touristy than Marina, offering more authentic local experience.",im:"Fishing boats rest on the beach at dawn; fishermen prepare nets; the ocean calm; the neighborhood quiet and atmospheric.",t:"Located in southern Chennai (30-40 minutes from downtown). Accessible by public transport or taxi. Free access. Best early morning for authentic experience. Do not swim (strong currents). The neighborhood is authentic and welcoming. Walk respectfully through local areas.",c:[],r:"g",nn:"திருவாண்மியூர் கடல் கரை",ns:"அமைதி கொடிய கடல் கரை உள்ளூர் மீன்பிடி",nst:"உள்ளூர் மீன்பிடி சম்প்रதாயம் தொடர்ந்து; கோயில் அருகத்தி.",nt:"தெற்கு சென்னையில் (30-40 நிமிஷம் மையம் இருந்து). பொதுப் போக்குவரத்து அணுகல். உள்ளிட இல்லை. ஆரம்பம் மணி."},
  {id:11,n:"Arignar Anna Zoological Park",a:"Vandalur",v:["wildlife", "nature", "local"],d:40,s:"A 602-acre zoo with varied animal species, conservation breeding programs, and safari experiences in open enclosures.",st:"The Arignar Anna Zoo, one of India's largest, houses over 2,500 animals representing hundreds of species. The zoo functions as both a recreational destination and a conservation institution: breeding programs for endangered species, wildlife research, and education. The zoo includes a safari park where visitors ride through open enclosures observing animals in semi-naturalistic environments. The zoo offers opportunities to observe Indian wildlife: Bengal tigers, Asian elephants, Indian bison, and numerous bird species. The zoo also houses exotic species from around the world. The zoo is popular with families and school groups.",im:"A safari vehicle drives through an open enclosure as herbivores graze; peacocks display their plumage; the animals unbothered by the vehicle.",t:"Located in Vandalur, about 35km south of downtown Chennai (40-50 minutes by car). Entry fee required. Open daily. Allow 3-4 hours for a comprehensive visit. Safari rides require additional fee. Early morning is best for animal activity. Bring water and sunscreen.",c:[],r:"g",nn:"அரிஞ்சனার் அண்ணா விலங்கு பூங்கா",ns:"பொதுவான விலங்குகளாக 602 ஏக்கர் விலங்கு பூங்கா",nst:"2500 விலங்குகள் நூற்றுக்கும் விலங்கு சங்கிப; பாதுக்காக்கப் வளிநிலை கட்டுரை.",nt:"வாண்டலூரில் (சென்னை தெற்கு 35 கிமீ, 40-50 நிமிஷம் தக்சி). உள்ளிட கட்டணம். அபுபுஜி கல்சி. சافারி ஊக்க நிதி. ஆரம்பம் மணி சிறப்பு."},
  {id:12,n:"Cholamandal Artists' Village — Contemporary Art Community",a:"Cholamandal",v:["art", "local", "hidden"],d:30,s:"An artist community with studios, galleries, workshops, and exhibitions showcasing contemporary Indian art and handicrafts.",st:"Cholamandal Artists' Village was established to provide a space for visual artists to work, exhibit, and engage with communities. The village consists of artist studios, galleries, and workshop spaces. Visitors can observe artists at work, purchase directly from creators, and engage with contemporary Indian art. The village represents grassroots art practice and cultural creativity. The work ranges from traditional crafts to contemporary explorations. Supporting the village directly funds artists. The location is peaceful and creative. Visiting supports living art practice and contemporary cultural creation.",im:"An artist paints in a studio space; galleries display artwork ranging from abstract to figurative; visitors browse and discuss with creators.",t:"Located in Cholamandal, about 20km south of downtown Chennai (30 minutes by auto-rickshaw). Most studios/galleries are small and independent; hours vary. Many are closed Sundays or Mondays. Allow 1-2 hours. Photography often welcome. Go with genuine interest in art. Support artists by purchasing if possible.",c:[],r:"g",nn:"சோளமண்டல் கலைஞர் கிராமம்",ns:"கிராமம் சமகாலிக கலையாளர்கள் சமுதாயம்",nst:"கலை நிலைய அனுமதி; கிறேটর் உடன் எளிய ஏற்பாடு.",nt:"சோளமண்டலில் (சென்னை தெற்கு 20 கிமீ, 30 நிமிஷம் তூக்). நிலை மாற்ற; திங்கட்கிழமை மூடு. புகைப்படம் அனுமதிக்கப்பட்ட."},
  {id:13,n:"Theosophical Society Headquarters",a:"Adyar",v:["history", "architecture", "hidden"],d:35,s:"A historic spiritual organization's headquarters with 270-acre grounds, library, and peaceful gardens representing 19th-century intellectual movements.",st:"The Theosophical Society, founded in New York in 1875, moved its headquarters to Adyar, Chennai in 1882. The organization aimed to synthesize Eastern and Western spirituality and philosophy. The headquarters sits on 270 acres with banyan trees, gardens, and meditation spaces. The library contains extensive collections on world religions, philosophy, and comparative spirituality. The society attracted prominent thinkers and spiritual seekers. Walking the grounds and visiting the library offers perspective on 19th-20th century intellectual movements that attempted to bridge Eastern and Western knowledge systems. The peaceful setting invites contemplation.",im:"Ancient banyan trees spread across grounds; meditation temples dot the landscape; the library stands as an architectural monument; the atmosphere peaceful and scholarly.",t:"Located in Adyar, southern Chennai (accessible by public transport or taxi). Admission nominal. Open daily except some religious holidays. Library access may require membership or donation. Allow 1-2 hours. Respectful behavior required. The setting is contemplative. Photography often allowed in gardens.",c:[],r:"g",nn:"தியோசοபிக்கல் சமிதி தலைமையகம்",ns:"1882 சென்னை நகர் ஞான தகரணை சமுதாயம்",nst:"270 ஏக்கர் அடிய தோட்டி; வாழ்க்கை உவாத் சாধனை; ஆர்ய சமാজ தகரணை.",nt:"ஆதியாரில் (பொதுப் போக்குவரத்து அணுகல்). உள்ளிட கட்டணம். தபல் திருவிளம் கொலி. புகைப்படம் தோட்டி அனுமதிக்கப்ட."},
  {id:14,n:"Mylapore — Historic Neighborhood",a:"Mylapore",v:["history", "local", "hidden"],d:30,s:"One of Chennai's oldest neighborhoods with temples, traditional streets, bazaars, and historical significance to Tamil culture.",st:"Mylapore is among Chennai's oldest settlements, with temples and cultural institutions dating back centuries. The neighborhood is the heart of traditional Tamil culture: temples, religious institutions, and cultural organizations concentrate here. Walking Mylapore's streets, you encounter narrow lanes, temples tucked into corners, street bazaars selling flowers for ritual use, and cultural institutions preserving Tamil traditions. Mylapore feels distinct from modern Chennai: traditional, religious, tied to ancient practices. The neighborhood has been the site of significant cultural and religious activity for millennia. Exploring Mylapore offers glimpses into how religious and cultural continuity persists in contemporary urban India.",im:"Narrow street lined with temple entrances and religious institutions; vendors sell flowers, incense, and ritual items; the atmosphere steeped in tradition.",t:"Located in central Chennai (accessible by metro or public transport). Free to walk and explore. Many small temples and cultural sites. Allow 2-3 hours for comprehensive exploration. Go early morning for quieter experience. Respect sacred spaces. The neighborhood is welcoming to respectful visitors.",c:[],r:"g",nn:"மயிலாப்பூர்",ns:"சென்னையின் பழைய கோயிலினங் பன்னிரு",nst:"பரியொளிப்பான் தமிழ் கோயில் மையம்; நூற் தொல் சங்கிதி.",nt:"சென்னை மையம் (மெட்ரோ அணுகல்). நடை மாத்திரம். கோயில் நிறைய. நமஸ்காரம் பேசு."},
  {id:15,n:"Chennai Central Railway Station — Colonial Transportation Hub",a:"Downtown",v:["architecture", "history", "local"],d:25,s:"A 1900s Victorian-era railway station, architectural landmark, and transportation hub representing colonial infrastructure.",st:"Chennai Central Railway Station, built between 1900-1930, is an architectural masterpiece of colonial Victorian design. The station served British colonial administration's need for transportation and control. The architecture announces European power: high ceilings, ornate detailing, and grand scale. The station remains a functioning transportation hub where thousands of people daily pass through. Walking the station, you encounter both architectural grandeur and contemporary reality: colonial structures serving modern transportation needs. The station represents colonialism's material legacies: beautiful but built through extraction and domination.",im:"The station's Victorian facade glows in afternoon light; trains arrive and depart; passengers move through the grand halls; the ornate interior visible.",t:"Located in downtown Chennai. Easily accessible and a major transit hub. Free to walk through public areas. Photography usually allowed in non-restricted areas. Allow 30-45 minutes to appreciate architecture. Respectful behavior in this functioning transportation hub required.",c:[],r:"g",nn:"சென்னை மைய வரிசை நிலையம்",ns:"1900 விக்டோரியாய் வரிசை சாசனம் அடிச্சாசனம்",nst:"வரிசை சாசனம் மைய சொத்து; இங்கேயே ஈஸ்ட் இந்திய நிறுவனம் சாசனம்.",nt:"சென்னை மையம் (தொடர்புக்கு கட்டடம்). நடை பொதுப் பகுதி. புகைப்படம் அனுமதিக்கப்ப."},
  {id:16,n:"St. Andrew's Church — Gothic Colonial Architecture",a:"Downtown",v:["architecture", "history", "hidden"],d:20,s:"A 19th-century Gothic church representing Christian missionary presence and colonial architectural heritage.",st:"St. Andrew's Church, built in 1821, showcases Gothic architectural style transplanted to India. The church served the colonial Christian community and missionary efforts. The interior features stained glass, ornate ceilings, and Christian iconography. Walking the church, you encounter religious architecture distinct from the dominant Hindu and Dravidian aesthetics of Tamil Nadu. The church represents religious plurality in India and the layered histories of colonialism, Christianity, and cultural coexistence. The church remains an active place of Christian worship.",im:"The church's Gothic spire rises above surrounding buildings; the interior glows with stained glass; Christian iconography decorates the space.",t:"Located in downtown Chennai (near Parry's Corner). Easily accessible by public transport. Entry free. Respectful dress required. Remove shoes if requested. Photography allowed. Allow 20-30 minutes. Services held at specific times; respecting worship is important.",c:[],r:"g",nn:"செயின்ட் ஆண்ட்ரூ தேவாலயம்",ns:"1821 கொதிக்கட்ட கிறிஸ்தவ கோயில் சாசனம்",nst:"கொதிக்கட்ட கிறிஸ்தவ சாசனம்; ஐரோப்பிய ஜாதகம்.",nt:"சென்னை மையம் (பொதுப் போக்குவரத்து அணுகல்). உள்ளிட இல்லை. மரியாதைப்பூர்வ ஆடை. வாசல் முன் காலணி."},
  {id:17,n:"Sundaresan Fine Arts Gallery — Contemporary South Indian Art",a:"Teynampet",v:["art", "culture", "hidden"],d:25,s:"A private gallery showcasing contemporary South Indian artists, traditional crafts, and cultural heritage pieces.",st:"Sundaresan Gallery represents contemporary art patronage and curation of South Indian artistic traditions. The gallery displays works by living artists alongside traditional pieces. Supporting such galleries directly funds artists and helps preserve cultural heritage. The gallery offers perspective on contemporary Indian art and how traditional forms evolve in modern contexts. Gallery visiting contributes to understanding South India's vibrant artistic culture.",im:"Gallery walls display paintings, sculptures, and traditional crafts; visitors study the work intently; the curated space reflects artistic vision.",t:"Located in Teynampet, central Chennai (accessible by metro or taxi). Admission typically free or modest. Hours vary; closed some days. Allow 1-2 hours. Photography often welcome. Support artists and galleries by engaging seriously. Go with genuine interest in art.",c:[],r:"g",nn:"சுந்தரேசன் நன்னூல் கலை சேகரிக்கப்",ns:"சமகாலிக தென்னிந்திய கலையாளர்கள் சேகரிக்கை",nst:"சமகாலிக கலை தென்னிந்திய; கலை உயிர்த்துவம்.",nt:"டெய்னம்பेট் (மெட்ரோ அணுகல்). உள்ளிட இல்லை அல்லது கட்டணம். புகைப்படம் அனுமதிக்கப்டு. அக்கம் කරუणा கலை."},
  {id:18,n:"Madras Leather Heritage Museum",a:"Madras Leather Complex",v:["history", "local", "hidden"],d:25,s:"A museum documenting Chennai's leather tanning traditions, industrial heritage, and artisan craftsmanship.",st:"Chennai has a significant leather tanning tradition extending back centuries. The Madras Leather Heritage Museum documents this heritage: tanning processes, leather goods, artisan techniques. The museum celebrates the craft and the communities who practiced it. Leather tanning is labor-intensive and involves chemical processes; understanding the craft's complexity and the artisans who continue it is important. Supporting leather artisans and traditional crafts helps preserve cultural heritage and support livelihoods.",im:"Displays show leather working tools, finished leather goods, and photographs of artisans at work; the craftsmanship visible in displayed items.",t:"Located in the Madras Leather Complex, accessible from downtown (30-40 minutes by taxi). Admission nominal. Hours may vary. Allow 1-2 hours. Photography allowed. Support artisans by purchasing leather goods if interested.",c:[],r:"g",nn:"மதுரை தோல் கலை பொருட்கள் அடிச்சாசனம்",ns:"சென்னை தோல் மற்றும் பாரம்பரியம் সங்കலனம்",nst:"தோல் தான்ன்; வணிக பாரம்பரியம் செயற்பாட.",nt:"மதுரை தோல் சிறு (தக்சி 30-40 நிமிஷம்). உள்ளிட கட்டணம். புகைப்படம் அனுமதிக்கப்டு."},
  {id:19,n:"Cooum River Cleanup and Urban Ecology",a:"Multiple Areas",v:["nature", "local", "hidden"],d:20,s:"Urban river restoration efforts highlighting grassroots environmental activism and community participation in urban ecology.",st:"The Cooum River, which flows through Chennai, faces severe pollution and environmental degradation. Community organizations and environmental activists work to clean, restore, and protect the river. These efforts represent grassroots environmentalism and community engagement with urban ecology. Supporting or learning about river cleanup efforts highlights environmental challenges and possibilities for community action. The Cooum represents Chennai's relationship with its natural environment and contemporary efforts to reclaim and restore it.",im:"Community volunteers work along the river banks removing trash; the river's pollution visible; the effort to restore environmental health evident.",t:"Cleanup efforts occur at various points along the river. Volunteer participation available through environmental organizations. Allow 1-3 hours depending on participation. Go with genuine environmental commitment. The work is meaningful but humble.",c:[],r:"g",nn:"கூவம் நதி கொண்ட பழுதுசெய்தல் மற்றும் சுற்றி சமச்சீர்",ns:"நதி மாথ்தி உயிர்த்துவம் சமூத்திய நடந்தாய்.",nst:"கூவம் நாருமாய் மாக்ரி; வல ஓதை; சம்பறாய় மூவ் சுற்றி.",nt:"கூவம் நதி விரும் போட்டு நிலை. சுற்றி ஜீवन ஸbhாவஏ."},
  {id:20,n:"Nungambakkam Tank — Urban Water Body",a:"Nungambakkam",v:["nature", "local", "hidden"],d:20,s:"A historic urban reservoir supporting water needs, bird watching, and community use, representing urban ecology and public resources.",st:"Nungambakkam Tank is a historic water body that served Chennai's water needs for centuries. The tank supports urban ecology: birds, fish, and vegetation dependent on the water. The tank is a public resource used by residents for various purposes. The tank's existence highlights the importance of urban green spaces and water bodies for environmental health and community wellbeing. Urban tanks like Nungambakkam represent traditional water management systems and contemporary environmental challenges (pollution, encroachment, reduced water levels). Walking the tank area offers perspective on urban ecology and water security.",im:"A water body surrounded by trees; birds rest on the water; the urban environment visible beyond the green space; the ecosystem visible in the urban landscape.",t:"Located in Nungambakkam, central Chennai (accessible by public transport). Free access. Best for walking early morning or evening. Bird watching is rewarding with binoculars. The surrounding area has cafés and restaurants.",c:[],r:"g",nn:"நுங்கம்பக்கம் பட்டீய",ns:"நிறுவ நீர் கண்ணடி சரி உர்பன் சமத்தை",nst:"நுங்கம்பக்கம் பட்டீய ஐதிஹ்य நீர் கண்டங்கம்.",nt:"நுங்கம்பக்கம் (பொதுப் போக்குவரத்து அணுகல்). உள்ளிட இல்லை. ஆரம்பம் மணி நன்று."},
  {id:21,n:"Ramakrishna Math — Spiritual Organization",a:"Mylapore",v:["sacred", "hidden", "cultural"],d:25,s:"A spiritual organization and monastery following Vedantic teachings, with meditation spaces, library, and community service programs.",st:"Ramakrishna Math represents contemporary spiritual movements in India rooted in Vedantic philosophy. The organization emphasizes universal spirituality: respect for all religions and philosophical approaches. The math provides meditation spaces, conducts classes on spiritual texts, maintains a library, and engages in community service. The organization represents institutional spirituality: organized approaches to spiritual practice distinct from purely personal spirituality. Visiting allows observation of meditation practice, library study, or learning about the organization's philosophy.",im:"A meditation hall with devotees sitting in meditation; the space peaceful and sacred; the organization's spiritual purpose evident.",t:"Located in Mylapore, central Chennai (accessible by public transport). Open to visitors. Meditation sessions held regularly. Library access available. Classes on Vedanta held at specific times. Respectful dress and behavior required. Allow 1-2 hours.",c:[],r:"g",nn:"ராமகிருஷ்ணர் கணிதம்",ns:"வேதாந்த தத்துவ ஆன்மீக சங்கிப",nst:"ராமகிருஷ்ணர் உபாசனை; வேதாந்த தாப்பு; மனித பொல்லி.",nt:"மயிலாப்பூரில் (பொதுப் போக்குவரத்து அணுகல்). தியாக் உபாசனை தோட்டி பொதுவ. மரியாதைப் வடிவ."},
  {id:22,n:"DakshinChitra — Living Heritage Museum",a:"Muttukadu",v:["culture", "art", "local"],d:40,s:"An open-air museum preserving South Indian architectural heritage, handicrafts, performing arts, and traditional ways of life.",st:"DakshinChitra presents living heritage: traditional buildings from different regions of South India relocated and preserved, artisans demonstrating traditional crafts, and cultural performances showcasing regional traditions. The museum functions as an immersive experience rather than a display-only space: visitors encounter functioning crafts, traditions being actively practiced, and cultural continuity. DakshinChitra represents efforts to preserve endangered crafts and cultural knowledge. Supporting the museum directly funds artisans and preservation efforts.",im:"Traditional buildings arranged in museum setting; artisans work traditional crafts; cultural performance occurs in courtyard; the living heritage visible.",t:"Located in Muttukadu, about 25km south of downtown Chennai (30-40 minutes by taxi). Admission fee required (modest). Open daily. Allow 3-4 hours. Cultural performances scheduled regularly. Photography welcome. Go with genuine interest in cultural preservation.",c:[],r:"g",nn:"தக்ஷிணசித்திர",ns:"தென்னிந்திய உய்யிலு மரியாதை குலும்பே",nst:"தென்னிந்திய பாரம்பரியம் வாழ்க்கை; மரிய நிபுணர் வேலை.",nt:"முத்துக்குடி (சென்னை தெற்கு 25 கிமீ, 30-40 நிமிஷம் தக்சி). உள்ளிட கட்டணம். தபல் செய்விய குறுக்குசேவை. நடன செயல் உட்சேவை."},
  {id:23,n:"Kathyayani Temple — Women's Spirituality",a:"Kanchipuram",v:["sacred", "cultural", "hidden"],d:30,s:"A temple dedicated to a manifestation of the Divine Feminine, representing women's spiritual practice and goddess worship.",st:"The Kathyayani Temple represents the divine feminine in Hindu theology. Goddess Kathyayani is associated with warrior energy, protection, and transformation. Temples dedicated to goddess forms are important spaces for women's spiritual practice and power. Walking such temples, you encounter women's religious leadership and the centrality of goddess worship in Hindu spirituality. The temple represents Hindu theology's sophistication: multiple forms of divinity, feminine power as fundamental, and women's agency in spiritual practice.",im:"The goddess Kathyayani is depicted in warrior stance; devotees, particularly women, perform rituals of worship; the atmosphere devotional and powerful.",t:"Located in Kanchipuram area (accessible from Chennai). Entry free or nominal fee. Respectful dress required. Remove shoes before entering. Photography allowed in most areas. Allow 1-2 hours. Go with reverence for sacred space.",c:[],r:"g",nn:"கத்யாயணி தெய்வங்க",ns:"பெண் தெய்வ குறிப் கோயில்",nst:"கத்யாயணி தெய்வம் ஆயுந் மீன்; பெண் பிரம் உபாசனை.",nt:"கஞ்சிபுரம் (சென்னை அணுகல்). உள்ளிட இல்லை அல்லது கட்டணம். மரியாதைப் ஆடை. வாசல் முன் காலணி."},
  {id:24,n:"Dakshineswar Temple — Kali Worship",a:"Kanchipuram",v:["sacred", "cultural", "art"],d:30,s:"A temple dedicated to Goddess Kali, important pilgrimage site, with devotional intensity and philosophical significance.",st:"The Dakshineswar Temple represents Kali worship, a significant goddess tradition in Hindu spirituality. Kali represents transformation, the destruction of ego, and liberation. Kali temples attract devotees seeking goddess connection and transformation. The temple exemplifies how goddess traditions persist as vibrant spiritual practice. Visiting Kali temples offers perspective on Hindu theology's complexity and women's spiritual centrality.",im:"The fierce Goddess Kali is depicted with dark skin, wild appearance, and dancing pose; devotees offer flowers and prayers; the atmosphere intense and devotional.",t:"Located in Kanchipuram area (accessible from Chennai). Entry free or nominal. Respectful dress required. Remove shoes. Photography allowed in outer areas. Allow 1-2 hours. Go during festivals for most vibrant experience. Respect sacred atmosphere.",c:[],r:"g",nn:"தக்ஷிணேஸ்வர் கோயில்",ns:"கண்ணி தெய்வ குறிப் கோயில்",nst:"கண்ணி தெய்வம்; பெண் சக்தி உபாசனை.",nt:"கஞ்சிபுரம் (சென்னை அணுகல்). உள்ளிட இல்லை அல்லது கட்டணம். மரியாதைப் ஆடை. வாசல் முன் காலணி."},
  {id:25,n:"Kanchipuram — Sacred Pilgrimage Town (Day Trip)",a:"Kanchipuram (Day Trip)",v:["sacred", "history", "culture"],d:480,s:"A sacred pilgrimage city 70km from Chennai, with 108 temples, important Hindu sites, and silk weaving heritage.",st:"Kanchipuram, called the 'City of a Thousand Temples,' is one of Hinduism's most sacred pilgrimage destinations. The city contains numerous significant temples including those dedicated to Kamakshi (goddess), Vaikunthaperumal (Vishnu), and Kailasanatha (Shiva). The city combines spiritual significance with living tradition: active temples, continuing pilgrimage, and contemporary religious life. Kanchipuram is also famous for silk weaving—a traditional craft preserving centuries-old techniques. The city offers glimpses into sustained Hindu religious culture and handicraft traditions. A day trip from Chennai allows exploration of temples and silk workshops.",im:"Multiple gopurams rise above the city; pilgrims circumambulate temples; silk weavers work traditional looms; the city pulses with religious and cultural life.",t:"Located 70km southwest of Chennai (1.5 hours by car or bus). Accessible by day trip or overnight stay. Entry fees nominal for temples. Respectful dress required. Allow 5-6 hours for comprehensive visit. Early morning quieter. Guides helpful. Support local silk artisans by purchasing traditional fabrics.",c:[],r:"g",nn:"கஞ்சிபுரம்",ns:"பெண் நூற் கோயில் மற்றும் பயணம் தெய்வ",nst:"108 கோயில் நூற் நூல்; பெண் உபாசனை மையம்.",nt:"சென்னை தெற்கு 70 கிமீ (1.5 மணி கார்). தினமொறும் பயணம் அல்லது இரவீய. உல்ளிட குறைவுக. மரியாதைப் ஆடை."},
  {id:26,n:"Foreshore Estate — Working Waterfront",a:"Foreshore Estate",v:["local", "nature", "hidden"],d:20,s:"A working waterfront area with fishing communities, boat yards, and maritime traditions representing Chennai's relationship with the sea.",st:"The Foreshore Estate represents working Chennai: fishing communities, boat repair yards, fish markets, and maritime commerce. The area is less touristy than Marina Beach and retains authentic working character. Visiting the Foreshore Estate with respect for working communities allows observation of livelihoods, traditional maritime practices, and the labor that sustains coastal life. The area represents the unglamorous reality of urban waterfront work distinct from tourist-oriented beach culture.",im:"Fishermen repair nets and boats; fish markets bustle with commerce; the waterfront alive with working activity rather than tourism.",t:"Located along Chennai's waterfront (accessible from Marina Beach area). Free to walk and observe. Respectful photography essential. Ask permission before photographing people. Early morning best for active fishing activity. The area is working and functional, not a tourist attraction.",c:[],r:"g",nn:"கரைத்தूर் பங்களை",ns:"வேலை கடல் முகிழ் மற்றும் மீன்பிடி சங்கம்",nst:"மீன்பிடி சம்பறாய் வாழ்க; கடல் வாழ்க்கை நாவை.",nt:"சென்னை கரைத் பகுதி. நடை மற்றும் அவதான. மரியாதைப் புகைப்படம். ஆரம்பம் மணி."},
  {id:27,n:"Ramakrishna Mutt Library — Spiritual Texts",a:"Mylapore",v:["culture", "hidden", "history"],d:25,s:"A library housing extensive collections of spiritual texts, Vedantic philosophy, and comparative religion documents.",st:"The library preserves texts documenting Hindu philosophy, comparative spirituality, and Vedantic traditions. Access to these texts supports intellectual engagement with spiritual traditions. Libraries like this represent institutional efforts to preserve and share knowledge. Visiting the library offers perspective on how spiritual knowledge is preserved and transmitted.",im:"Shelves of ancient and modern texts on philosophy, spirituality, and Vedantic traditions; scholars study quietly; the library preserves intellectual heritage.",t:"Located in Mylapore. Library access may require membership or donation. Allow 1-2 hours. Respectful behavior required. Quiet, scholarly atmosphere. Photography restricted. Go with genuine interest in spiritual texts.",c:[],r:"g",nn:"ராமகிருஷ்ணர் குலுंब நூலக",ns:"வேதாந்த மற்றும் ஆன்மீக நூல் சிங்ங",nst:"நூல் வேதாந்த உபாசனை; ஆன்மீக புத்தகம் சேகரணை.",nt:"மயிலாப்பூரில் (அணுகல் சீஷ் அல்லது கட்டணம்). மூணை நமஸ்மூறி. உல்ளிட அணுகல்."},
  {id:28,n:"Ripon Building — British Colonial Architecture",a:"Downtown",v:["architecture", "history", "hidden"],d:20,s:"A 19th-century colonial building serving as Chennai's municipal corporation, representing Victorian Gothic architecture.",st:"The Ripon Building, completed in 1888, exemplifies Victorian Gothic architecture transplanted to India. The building represents colonial governmental infrastructure and European aesthetic imposition. The building continues to function as Chennai's municipal office. Walking past or learning about the building provides perspective on colonialism's material legacies. The architecture is impressive but represents power structures now challenged.",im:"The Ripon Building's Gothic towers dominate downtown; the ornate architecture visible; the building functioning as contemporary administrative center.",t:"Located in downtown Chennai. Free to view exterior. Viewing interior requires special permission. Allow 15-20 minutes to appreciate architecture. Photography usually permitted of exterior.",c:[],r:"g",nn:"ரிப்பண் கட்டடம்",ns:"1888 விக்டோரியாய় கொதிக்கட்ட சாசனம்",nst:"கொதிக்கட்ட கட்டடம்; வெளிநாட் சொத்து சாசன குறி.",nt:"சென்னை மையம். வெளிப்புற வேலு அணுகல் நிலைய புகைப்படம் அனுமதிக்கப்டு."},
  {id:29,n:"Carnatic Music Concerts — Classical South Indian Music",a:"Various Venues",v:["culture", "art", "local"],d:30,s:"Performances of Carnatic (South Indian classical) music at concert halls, during festivals, and special events throughout Chennai.",st:"Carnatic music is one of the world's great classical music traditions. Chennai is the epicenter of Carnatic music culture. December hosts the month-long Margazhi season when hundreds of concerts occur throughout the city. Performances feature renowned musicians and emerging artists. Listening to Carnatic music—complex melodic systems, sophisticated rhythmic structures, and profound emotional expression—is a transformative experience. The music connects spiritual practice and aesthetic sophistication. Supporting concerts and musicians helps preserve this precious cultural tradition.",im:"A musician plays the mridangam (drum) with intricate rhythmic patterns; a vocalist sings complex melodic phrases; the performance transporting and meditative.",t:"Concerts held year-round at various venues (December particularly rich). Check schedules with tourism office or online. Admission fees modest. Respectful dress expected. Arrive early for seating. Silence during performances crucial. The experience is profound.",c:[],r:"g",nn:"கர்னாடக সங்கீதம் சங்கிப",ns:"சென்னை பழங்குலம் கர்நாப் சங்கீத மையம்",nst:"ஆயிரம் வருஷம் சங்கீத பாரம்பரியம்; ஆழ்ந்த ஆன்மீக வடிவிட.",nt:"சங்கீத அரங்க (டிசம்பர் அதிக). நூல் அணுகல். உல்ளிட கட்டணம். மூணை மொறு."},
  {id:30,n:"Sunset at Marina Beach — Evening Gathering",a:"Marina",v:["beautiful", "local", "views"],d:15,s:"Watching sunset at Marina Beach as the sky transforms and city lights glow, joining locals for evening time on the beach.",st:"Marina Beach at sunset transforms: the light turns golden and purple, the bay sparkles, and the city begins to glow with evening lights. Families, couples, joggers, and vendors gather for evening hours. The experience is shared: thousands of people enjoying a common public space, the democratic character of the beach evident. Watching the light change while surrounded by locals offers perspective on Chennai's relationship with its waterfront.",im:"The sun descends toward the bay as Marina Beach fills with evening crowds; the light transforms the water to gold; city lights begin to glow.",t:"Located along Marina's eastern edge. Easily accessible. Free access. Go 30 minutes before sunset. Bring water. The experience is popular and social. Photography excellent during golden hour. Very crowded during high season.",c:[],r:"g",nn:"மரீனா கடல் கரை மாலை",ns:"மாலை கட்டு கடல் கரை பொது இடம்",nst:"உள்ளூர் மக்கள் மாலை பொதுப் இடம்; சங்கொ யுங்க.",nt:"மரீனா கிழக் கரைய. உல்ளிட இல்லை. 30 நிமிஷம் முன்பு. நீர் எடுக்கு. புகைப்படம் அழகு."}
,
  {id:31,n:"Marina Beach Walk — Endless Sand at Sunset",a:"Marina",v:["beautiful","sunset","swimming"],d:5,s:"Marina Beach is 13 kilometres long—at sunset, the light turns the sand and water gold, and locals gather to watch the day end.",st:"Marina Beach is one of the world's longest beaches. At sunset, locals come to walk, swim, and watch. The light is extraordinary.",im:"The beach at sunset. Sand gold. Water turquoise. Families walking. A few swimmers. The horizon endless.",t:"Go anytime. Best 5–6:30pm for sunset. No entry fee. Bring water. The beach is always free. Lifeguards present November–May.",c:["beautiful","sunset"],r:"g",nn:"Marina Beach",ns:"Marina Beach is 13 kilometres long with incredible sunset light.",nst:"Marina Beach is one of the world's longest beaches.",nt:"Go anytime, best 5–6:30pm for sunset."},
  {id:32,n:"San Thome Cathedral — 16th Century Portuguese Church",a:"San Thome",v:["history","beautiful","quiet"],d:10,s:"A Portuguese cathedral from the 16th century standing in the middle of Chennai—the architecture is unexpected and the quietness inside is complete.",st:"San Thome Cathedral is one of Chennai's oldest churches. The architecture is Portuguese colonial. The interior is austere and peaceful.",im:"Inside the cathedral. High ceilings. Stone. Light from windows. Few visitors. The air cool.",t:"Located in San Thome neighbourhood. Entry free or small donation. Open 6am–6pm daily. Allow 30 minutes. Respectful dress required.",c:["history","beautiful"],r:"g",nn:"San Thome Cathedral",ns:"Portuguese cathedral from the 16th century in the middle of Chennai.",nst:"San Thome Cathedral is one of Chennai's oldest churches.",nt:"Located in San Thome neighbourhood. Entry free or small donation."},
  {id:33,n:"Thousand Lights Lake — Urban Green Escape",a:"Thousand Lights",v:["parks","quiet","beautiful"],d:15,s:"A lake in the middle of the city surrounded by park and birds—completely quiet despite being city-centre, with locals feeding the swans and walking the paths.",st:"Thousand Lights Lake is a protected water body in the middle of Chennai. Parks surround it. Birds are everywhere. Locals come to feed swans and walk.",im:"The lake. Swans floating. People sitting on benches. Trees reflected. Completely quiet. The city far away.",t:"Walk from Thousand Lights station. Entry free. Best morning 7–9am. Bring water and bread for the swans. Allow 1 hour.",c:["parks","quiet"],r:"g",nn:"Thousand Lights Lake",ns:"Lake in the middle of the city with parks and birds everywhere.",nst:"Thousand Lights Lake is a protected water body surrounded by parks.",nt:"Walk from Thousand Lights station. Entry free. Best 7–9am."},
  {id:34,n:"Kapaleeshwara Temple — 7th Century Dravidian Temple",a:"Mylapore",v:["history","beautiful","greatest_hits"],d:10,s:"One of South India's oldest temples, Kapaleeshwara is a working temple with ornate Dravidian architecture—the detail and the spiritual energy are genuine.",st:"Kapaleeshwara Temple dates to the 7th century. The gopuram (tower) is ornately carved. Locals come to pray. The energy is spiritual and real.",im:"Inside the temple. The gopuram visible above. Flowers. Incense. Locals praying. The carved stone detail. The sound of bells and prayers.",t:"Located in Mylapore neighbourhood. Entry free. Open 6am–12pm, 4–9pm. Respectful dress essential. Cover shoulders and knees. Allow 1 hour.",c:["history","beautiful","greatest_hits"],r:"g",nn:"Kapaleeshwara Temple",ns:"One of South India's oldest temples with Dravidian architecture.",nst:"Kapaleeshwara Temple dates to the 7th century with ornate carving.",nt:"Located in Mylapore. Entry free. Respectful dress essential."},
  {id:35,n:"Kapaleeshwarar Temple — Sacred Hinduism",a:"Mylapore",v:["beautiful"],d:30,s:"Ancient Shiva temple with ornate towers and ritual practices — spiritual energy woven into carved stone",st:"This 16th-century temple is active and sacred. Devotees come daily to worship. The main tower is covered in intricate carvings. Watch the early morning rituals; the air is thick with incense.",im:"An ornate gopuram (temple tower). Incense smoke. Bells ringing. People praying. The quiet intensity of devotion.",t:"Free entry. Mylapore neighborhood. Best 6-8am for rituals. Remove shoes. Respectful photography only. Women may wear dupatta over shoulders.",c:["greatest_hits"],r:"g",nn:"கபாலீஸ்வரர் கோயில்",ns:"பழைய சிவன் கோயில் — ஆன்மீக வலிமை கல்லில் பொறிக்கப்பட்டது",nst:"இந்த 16 ஆம் நூற்றாண்டு கோயில் செயல்பட்டு புனிதமாக உள்ளது.",nt:"இலவச நுழைவு. மயிலாபூர் பகுதி. காலை 6-8 மணிக்கு சிறந்தது."},
  {id:36,n:"San Thome Cathedral — Portuguese Colonial Architecture",a:"Mylapore",v:["beautiful"],d:30,s:"Baroque cathedral built over the tomb of St. Thomas the Apostle — 400 years of religious history in colonial stone",st:"This Portuguese colonial cathedral sits where Christians believe St. Thomas was buried. The architecture is Baroque with intricate details. Inside, the tomb is venerated by pilgrims from around the world.",im:"Baroque arches. Stained glass light inside. A sacred tomb beneath the altar. The quiet of a working church.",t:"Free entry. Mylapore area. Photography allowed outside tomb area. Service times vary. Best to visit mornings.",c:["greatest_hits"],r:"g",nn:"திருநாவாய் கதீட்ரல்",ns:"போர்த்துகீசு காலோனியல் கட்டடக்கலை — 400 ஆண்டு மதத்தின் வரலாறு",nst:"இந்த போர்த்துகீசு கதீட்ரல் தாமஸ் அப்பஸ்தலர் புதைக்கப்பட்ட இடத்தில் உள்ளது.",nt:"இலவச நுழைவு. மயிலாபூர் பகுதி. புகைப்படங்கள் அனுமதிக்கப்படுகிறது."},
  {id:37,n:"Marina Beach — Urban Seaside",a:"Marina",v:["beautiful"],d:30,s:"India\'s longest urban beach — crowded with locals, street food, and sunset energy — pure Chennai vibes",st:"Marina Beach stretches for miles along the Bay of Bengal. It\'s not pristine, but it\'s alive with energy. Locals gather at sunset. Street vendors sell snacks. Families walk.",im:"A crowded beach at sunset. Vendors cooking on carts. Families walking in the waves. The chaos of urban India by the sea.",t:"Free. Evening is best. Avoid alone late at night for safety. Snacks and drinks abundant. Swimming not always safe; check current conditions.",c:["greatest_hits"],r:"g",nn:"மரீனா கடற்கரை",ns:"இந்தியாவின் நீண்ட நகர கடற்கரை — உள்ளூர் மக்கள் மற்றும் தெருவெறி உணவு",nst:"மரீனா கடற்கரை வளைகுடா தூர்த்தது. இது ஜீவன்ம மற்றும் சக்தி வாய்ந்ததாக உள்ளது.",nt:"இலவசம். மாலை சிறந்தது. தனியாக இரவு தவிர்க்கவும்."},
  {id:38,n:"Dakshinachitra — Open Air Heritage Museum",a:"Mahabalipuram (Day Trip)",v:["beautiful"],d:30,s:"Open-air museum with reconstructed houses from South India — traditional architecture and crafts in action",st:"About 40km from Chennai. Walk through traditional houses from different regions of South India. Craftspeople demonstrate traditional skills. It\'s a living museum of South Indian culture.",im:"Traditional wooden houses. Artisans weaving and carving. The smell of wood and spices. South Indian architecture brought together.",t:"250 INR entry. 40km from city (30-minute drive). Go mornings. Craftspeople are most active 10am-1pm. Bring water.",c:["greatest_hits"],r:"g",nn:"தக்ஷிணாசித்ர",ns:"திற நிலவெளி பொருட்கள தாய்லாந்து — பாரம்பரிய வாழ்க்கை கலை",nst:"சுமார் 40 கி.மீ சென்னைக்கு இருந்து. வெவ்வேறு பகுதிகளிலிருந்து பாரம்பரிய குடிப்பிடிகளின் மூலம் நடந்து செல்லவும்.",nt:"250 ரூபாய் நுழைவு. 40 கி.மீ. காலை சிறந்தது."},
  {id:39,n:"Fort St George — Colonial Military Fort",a:"Georgetown",v:["beautiful"],d:30,s:"Historic British military fort from 1644 — ramparts, museum, and colonial-era buildings in active use",st:"The oldest British settlement in India, established in 1644. Walk through ramparts. The museum houses artifacts from colonial times. Government buildings still operate from the fort grounds.",im:"Stone ramparts along the water. Historic cannons. Colonial-era buildings. The flag flying overhead. The weight of history in architecture.",t:"Free to walk the grounds. Museum entry 25 INR. Security checks required. Go mornings for fewer crowds. The church inside is still active.",c:["greatest_hits"],r:"g",nn:"ஃபோர்ட் செயிண்ட் ஜார்ஜ்",ns:"வரலாற்று பிரிட்டிஷ் இராணுவ கோட்டை 1644 இலிருந்து",nst:"இந்தியாவிலேயே மிகப் பழமையான பிரிட்டிஷ் குடியேற்றம்.",nt:"இலவசம் மணிக்கு. இரவு அதிக சுரக்ஷை வெளி. காலை சிறந்தது."},
{id:11,n:"Mylapore Temple Streets at Dawn",a:"Mylapore",v:["history","religious","local"],d:120,s:"Walking ancient temple neighborhoods at sunrise—experiencing centuries-old temple culture.",st:"Mylapore at dawn is spiritual: quiet, alive with ritual. Pilgrims arrive; temple opens; bells sound. Women drawing kolam, devotees in white, priests preparing offerings.",im:"A priest in 1500, opening Kapaleeshwarar Temple at dawn, rituals continued 500 years hence.",t:"Located in Mylapore, Chennai. Metro or local bus. Open 6am-12pm, 4pm-9pm. Free entry. Photography allowed respectfully. Allow 1.5-2 hours.",c:["history","religious","local"],r:"g",nn:"மிளபூர் — கோயில் வீதிகள்",ns:"தெய்வ அறிவு பொழுது விடிகிற போது",nst:"மிளபூர் விடிகிற போது தெய்வீக।",nt:"மிளபூரில் கபளீஸ்வரர் கோயிலில்।"},
{id:12,n:"Marina Beach at 5am — Urban Waterfront",a:"Marina Beach",v:["nature","local","beaches"],d:75,s:"Marina Beach before dawn—where Chennaiites gather for swimming, jogging, yoga, socializing.",st:"Marina Beach is world's second-longest urban beach (13km). At 5am, beach fills with locals: swimmers, joggers, yoga practitioners. Atmosphere is communal.",im:"A Chennaiite in 1900, swimming at Marina Beach, ritual continued by descendants.",t:"Located along Marina Beach, central Chennai. Metro or local bus. Open 24/7 (best 5-7am). Free entry. Allow 1-2 hours.",c:["nature","local","beaches"],r:"g",nn:"மரீனா கடற்கரை — விடியாலில்",ns:"நகர கடற்கரை பொழுது விடிகிற",nst:"மரீனா கடற்கரை இந்தியாவின் இரண்டாவது।",nt:"மரீனா கடற்கரையில் 5-7am।"},
{id:13,n:"Dakshinachitra — Living Museum of South Indian Culture",a:"Muttukadu",v:["day_trips","history","free_culture"],d:150,s:"Museum village preserving traditional South Indian crafts, architecture, and lifestyles.",st:"Dakshinachitra (35km south) recreates traditional architecture: homes from Tamil Nadu, Andhra Pradesh, Karnataka, Kerala. Museum is functioning: artisans work daily.",im:"A master craftsperson in 1990, bringing skills to Dakshinachitra.",t:"Located in Muttukadu, 35km south. Taxi/car (45 min) or tour. Entry ~Rs. 300-400. Open 9am-6pm. Allow 3-4 hours.",c:["day_trips","history","free_culture"],r:"g",nn:"தக்ஷிணசித்திரா",ns:"தென் இந்திய கலை",nst:"தக்ஷிணசித்திரா வடிவ தமிழ் கலை।",nt:"சென்னை தெற்கே 35 கிமீ।"},
{id:14,n:"T. Nagar Market — Shopping Bazaar",a:"T. Nagar",v:["market","local"],d:90,s:"Chennai's main shopping district—fabric shops, jewelry, traditional South Indian items.",st:"T. Nagar is premier shopping destination. Dense: shops lining lanes, specialization by merchandise. Jewelry lanes feature gold; fabric lanes overflow with silks, cottons.",im:"A shopkeeper in 1960, opening store in T. Nagar, serving generations.",t:"Located in T. Nagar, central Chennai. Metro (T. Nagar station). Open 10am-8pm. Best visited 10am-12pm. Bring cash. Allow 2-3 hours.",c:["market","local"],r:"g",nn:"டி. நகர் விற்பொருள் சந்தை",ns:"சென்னை முக்கிய கொள்ளை",nst:"டி. நகர் சென்னைக்கு தங்களுக்கு।",nt:"டி. நகர்மதி நடு சென்னை।"},
{id:15,n:"Theosophical Society Gardens — Quiet Intellectual Sanctuary",a:"Adyar",v:["parks","history"],d:90,s:"64-acre sanctuary with meditation halls, ancient banyan trees, peaceful gardens.",st:"Theosophical Society is international spiritual organization with Chennai headquarters. Adyar compound is 64 acres: gardens, meditation, library, ancient trees.",im:"A spiritual seeker in 1925, discovering Theosophical Society as philosophical inquiry space.",t:"Located in Adyar, South Chennai. Metro or local bus. Open daytime (hours vary). Free or minimal fee. Photography restricted in areas. Allow 1-2 hours.",c:["parks","history"],r:"g",nn:"தியோசோபிக்கல் சமாசம் தோட்டம்",ns:"அமைதியாக बौद्ধिक स्वर्ग",nst:"தியோசோபிக்கल் சமாசம் 64 எக்கர়।",nt:"அடையார் உள்ளது।"},
{id:16,n:"Elliot's Beach — Coastal Escape",a:"Besant Nagar",v:["beaches","nature","local"],d:90,s:"Smaller, quieter beach than Marina—where locals swim, jog, relax away from tourists.",st:"Elliot's Beach in Besant Nagar offers respite from Marina's crowds. Less commercialized; locals dominate. Water is clean; swimming safe.",im:"A local resident in 1990, visiting Elliot's Beach with family.",t:"Located in Besant Nagar, South Chennai. Metro or local bus. Open 24/7. Free entry. Swimming safe. Parking available. Allow 1-2 hours.",c:["beaches","nature","local"],r:"g",nn:"எலியட்ஸ் கடற்கரை",ns:"நகர்வாழ்க்கை கடற்கரை விடுதி",nst:"எலியட்ஸ் கடற்கரை பெசாந்த் நகர்।",nt:"பெசாந்த் நகரில் உள்ளது।"},
{id:17,n:"South Indian Dosa, Idli, Sambar — Food Trinity",a:"Anna Nagar/Multiple",v:["food","local","markets"],d:90,s:"Authentic South Indian breakfast temples—specialized restaurants perfecting rice-lentil traditions.",st:"South Indian breakfast centers on three items: dosa, idli, sambar. Specialized restaurants perfect each. Traditional dosa restaurant prepares batter daily.",im:"A dosa maker in 1950, fermenting batter, process continuing across generations.",t:"Located throughout Chennai, especially Anna Nagar, Mylapore, T. Nagar. Local transport. Open 6am-10:30am typically. Allow 45-60 minutes.",c:["food","local","markets"],r:"g",nn:"இட்லி, தோசை, சாம்பார்",ns:"தென் இந்திய உணவு திரிமுகம்",nst:"இட்லி, தோசை, சாம்பார் தென் இந்திய।",nt:"சென்னை முழுவதும் உள்ளது।"},
{id:18,n:"Kapaleeshwarar Temple — Ornate Dravidian Architecture",a:"Mylapore",v:["history","religious","architecture"],d:90,s:"Rebuilt 16th-century temple with exquisite South Indian gopuram and intricate sculptures.",st:"Kapaleeshwarar Temple is one of Chennai's most important Hindu temples. The gopuram is extraordinary: 40m high, carved with hundreds of statues.",im:"A sculptor in 1500, carving statues for gopuram, admired 500 years hence.",t:"Located in Mylapore, central Chennai. Metro or local bus. Open 6am-12pm, 4pm-9pm. Free entry. Photography allowed respectfully. Allow 1-1.5 hours.",c:["history","religious","architecture"],r:"g",nn:"கபாலீச்வரர் கோயில்",ns:"அலங்கரணமான திராவிட",nst:"கபாலீச்வரர் கோயில் 16வது நூற்றாண்டு।",nt:"மிளபூரில் உள்ளது।"},
{id:19,n:"Crocodile Bank — Reptile Sanctuary",a:"Mahabalipuram Area",v:["nature","day_trips"],d:120,s:"Wildlife sanctuary specializing in crocodile breeding and reptile education.",st:"Crocodile Bank is 35km south. Facility houses thousands of crocodiles plus reptiles. Organization runs breeding programs for endangered species.",im:"A conservationist in 1976, establishing Crocodile Bank.",t:"Located 35km south, near Mahabalipuram. Taxi/car (45-60 min) or tour. Entry ~Rs. 300-400. Open 8am-6pm. Allow 2-3 hours.",c:["nature","day_trips"],r:"g",nn:"மகரமச்ছ வங்கி",ns:"பல்லி பாதுகாப்பு केंद्रम",nst:"மகரமச்ছ வங்கி பல்லி விரிசோம्।",nt:"மாகாளிபुरम் அருகில் 35 கிमீ।"},
{id:20,n:"Mahabalipuram Day Trip — Coastal Temples & Sculptures",a:"Mahabalipuram",v:["day_trips","history","beaches"],d:180,s:"Ancient coastal temple town 60km south—monolithic temples, rock-carved rathas, golden beach.",st:"Mahabalipuram is Tamil Nadu's coastal temple destination. Site contains ancient temples carved from monolithic granite: Shore Temple, Pancha Rathas.",im:"A sculptor in 700CE, carving Shore Temple from rock face.",t:"Located 60km south (90 min by car). Taxi, tour, or local bus. Entry Rs. 600. Open 6am-6pm. Allow 4-5 hours.",c:["day_trips","history","beaches"],r:"g",nn:"மாகாளிபुरम्",ns:"கடலோரம் கோயில் நகரம्",nst:"மாகாளிபुरம् 8வது நூற्றाண्டு कोयil।",nt:"சென्னையிலிருந்து 60 किमीত।"},
{id:21,n:"Central Library — British Colonial Architecture",a:"Central Area",v:["architecture","history"],d:75,s:"Grand colonial library with extensive collection—architectural gem.",st:"Connemara Library (Central Library) is Chennai's primary library. Building is colonial: red brick, high ceilings, grand reading rooms.",im:"A scholar in 1920, researching in Connemara Library.",t:"Located in Chennai city center. Local transport. Open specified hours. Free or minimal entry. Photography may be restricted. Allow 1-2 hours.",c:["architecture","history"],r:"g",nn:"மத्திய நூலகம्",ns:"पिरिटिश कोलोनियल आर्किटेकचर",nst:"மத्திய நூलகम் சென्नையின् मुख्य।",nt:"சென்नை नगर मायल में।"},
{id:22,n:"Santhome Cathedral Basilica — Coastal Christian Heritage",a:"Mylapore",v:["history","religious"],d:75,s:"Gothic cathedral built on site believed to be Apostle Thomas's martyrdom.",st:"Santhome Cathedral is Chennai's landmark Christian church. Current cathedral dates to 1896. Site is ancient: tradition claims Apostle Thomas was martyred here.",im:"A Christian in 1700, worshipping at Santhome site.",t:"Located in Mylapore, near coast. Local transport. Open for visits and services. Free entry. Photography allowed. Allow 45-60 minutes.",c:["history","religious"],r:"g",nn:"சாந்தோம் கதீட்ரல் பசிलிக்கா",ns:"కృștavn मरpत परбिbार थेর",nst:"சாந்தோம் கதீட्रल அப्போஸ्தோล।",nt:"மிளபூரில் உள்ளது।"},
{id:23,n:"Fort St. George Museum — British Colonial Archive",a:"Fort St. George",v:["history","architecture"],d:90,s:"Museum within colonial fort complex—documenting British East India Company.",st:"Fort St. George is British East India Company's first major Indian establishment (1640s). Museum documents colonial history.",im:"A Company official in 1700, working in Fort St. George.",t:"Located in Fort area, central Chennai. Local transport. Entry nominal. Open 10am-5pm typically. Allow 1-2 hours.",c:["history","architecture"],r:"g",nn:"फोर्ट सेंट जॉर्ज संग्रहालय",ns:"british कोलोनियल ईतिहास",nst:"फोर्ट सेंट जॉर्ज 1640s में।",nt:"वलैय सेंट जॉर्ज क्षेत्र।"},
{id:24,n:"Varadaraja Perumal Temple — Ancient Vaishnava Heritage",a:"Kanchipuram",v:["day_trips","religious","history"],d:180,s:"Day trip to Kanchipuram's ancient Varadaraja Perumal Temple—hub of Vaishnava philosophy.",st:"Kanchipuram, 70km southwest, is ancient temple town. Varadaraja Perumal Temple is one of South India's most sacred temples.",im:"A pilgrim centuries ago, visiting this same temple.",t:"Located in Kanchipuram, 70km southwest (2 hours). Bus or car. Entry free. Open 6am-12pm, 4pm-8pm. Allow 3-4 hours for visit.",c:["day_trips","religious","history"],r:"g",nn:"वरदराज पेरुमल मंदिर",ns:"प्राचीन वैष्नव विरासत",nst:"वरदराज पेरुमल मंदिर कांचीपुरम।",nt:"कांचीपुरम, दक्षिण-पश्चिम में।"},
{id:25,n:"Guindy National Park — Urban Wildlife Sanctuary",a:"Guindy",v:["nature","parks","free_culture"],d:120,s:"Urban national park within city limits—protecting Indian wildlife and ecosystems.",st:"Guindy National Park is unique: urban national park within Chennai city. Park protects blackbuck, sambar, and various birds.",im:"A blackbuck in Guindy Park, surviving in urban sanctuary.",t:"Located in Guindy, central Chennai. Entry ~Rs. 50-100. Open 6am-6pm. Allow 2-3 hours for walking.",c:["nature","parks","free_culture"],r:"g",nn:"गुइंडी नेशनल पार्क",ns:"शहरी वन्यजीव अभयारण्य",nst:"गुइंडी नेशनल पार्क शहर सीमा में।",nt:"गुइंडी, मध्य चेन्नई में।"},
{id:26,n:"Government Museum & National Art Gallery — Art & Antiquity",a:"Egmore",v:["art","history"],d:120,s:"Government Museum housing extensive collection of art, antiquities, and historical artifacts.",st:"Government Museum & National Art Gallery in Egmore houses extensive collections. Features South Indian sculpture, paintings, artifacts.",im:"A curator in 1850, documenting artifacts for this museum.",t:"Located in Egmore, central Chennai. Metro or local bus. Entry ~Rs. 100-150. Open 9:30am-5pm, closed Fridays. Allow 2-3 hours.",c:["art","history"],r:"g",nn:"सरकारी संग्रहालय",ns:"कला और प्राचीनता",nst:"सरकारी संग्रहालय एग्मोर में।",nt:"एग्मोर, केंद्रीय चेन्नई।"},
{id:27,n:"Periakulam Reservoir & Walking Path — Water Body Respite",a:"Periakulam",v:["parks","nature","local"],d:75,s:"Peaceful reservoir with walking path—urban green space for morning walks and meditation.",st:"Periakulam Reservoir is peaceful water body. Walking path encircles the reservoir. Locals gather for morning walks.",im:"A walker in 2000, discovering Periakulam as peaceful morning destination.",t:"Located in central Chennai. Local bus or auto. Entry free. Open 6am-sunset. Best visited early morning. Allow 1-2 hours.",c:["parks","nature","local"],r:"g",nn:"पेरिअकुलम जलाशय",ns:"जल निकाय श्वास",nst:"पेरिअकुलम जलाशय शांतिपूर्ण।",nt:"पेरिअकुलम, मध्य चेन्नई।"},
{id:28,n:"San Thome Basilica Crypt — Apostolic Relics",a:"Mylapore",v:["religious","history"],d:60,s:"Visit the basilica's crypt containing relics believed to be Apostle Thomas.",st:"Below Santhome Cathedral Basilica is crypt containing relics. The crypt is dark, solemn, spiritual.",im:"A pilgrim centuries ago, venerating this same saint's relics.",t:"Located beneath Santhome Cathedral, Mylapore. Modest entry fee. Photography usually restricted in crypt. Allow 30-45 minutes.",c:["religious","history"],r:"g",nn:"सेंट थोम बेसिलिका क्रिप्ट",ns:"अप्रैल अवशेष",nst:"सेंट थोम बेसिलिका क्रिप्ट संरक्षित।",nt:"मिलपोर में सेंट थोम के नीचे।"},
{id:29,n:"Birdie Farm — Organic Agritourism",a:"Oragadam",v:["day_trips","nature"],d:180,s:"Day trip to organic farm 35km north—experiencing sustainable agriculture and farm life.",st:"Birdie Farm is organic farm 35km north of Chennai. Visitors learn organic farming, observe crops, participate in farm activities.",im:"A farmer in 2010, transitioning to organic practices.",t:"Located in Oragadam, 35km north (1 hour). Car or tour. Entry ~Rs. 300-500. Open by appointment. Allow 3-4 hours.",c:["day_trips","nature"],r:"g",nn:"बिर्डी फार्म",ns:"जैविक कृषि पर्यटन",nst:"बिर्डी फार्म 35 किमी उत्तर।",nt:"ओरागाडम में स्थित है।"},
{id:30,n:"Chennai Best Time to Visit — Climate Awareness",a:"Citywide",v:["hidden","weird"],d:30,s:"Understanding Chennai's climate—essential for comfortable city experience.",st:"Chennai is tropical: hot and humid year-round. Summer (March-May) is hottest. Monsoon (October-November) brings heavy rains. Best visiting season is winter (December-February).",im:"A visitor in summer, struggling with heat, learning that timing matters.",t:"Plan visits for December-February. Bring light, breathable clothing year-round. Carry water constantly. Heat can be overwhelming. Morning and evening are cooler.",c:["hidden","weird"],r:"g",nn:"चेन्नई सर्वोत्तम समय",ns:"जलवायु जागरूकता",nst:"चेन्नई उष्णकटिबंधीय है।",nt:"दिसंबर-फरवरी सर्वोत्तम है।"}];
