{id:40,n:"Kapaleeshwarar Temple at Dawn — Dravidian Devotion",a:"Mylapore",v:["dawn","sacred","temple"],d:45,s:"Before 7am: first puja, bells, drums, incense, chanting. Painted gopuram reflects in temple tank. Arrive for devotion, not tourism.",st:"Kapaleeshwarar Temple is one of Chennai's most important Shiva temples, dating to the 7th century. The temple stands in Mylapore, among dense streets and shops. The gopuram (tower) is painted and ornately sculpted, rising several stories. The temple tank (sacred pond) sits before the main sanctuary. At dawn, before 7am, the temple opens for first puja. Priests begin rituals in dimly lit inner sanctums. Bells ring continuously. Drums sound in complex rhythms. Incense smoke fills corridors. Chanting in Sanskrit and Tamil echoes through the space. Devotees arrive: families, elderly residents, workers before their day begins. The devotion is genuine—this is not performance but authentic worship. Walking through at dawn, you enter a sacred space fully alive with ritual. The temple tank reflects the gopuram's image. This is how millions of Indians encounter the sacred daily.",im:"A priest rings a large bronze bell inside the temple; smoke from incense swirls around a sculpted deity; devotees stand in bare feet, watching.",t:"Located in Mylapore, central Chennai (accessible by metro, bus, auto). Arrive before 7am for dawn puja. Modest dress required: covered shoulders and knees. Remove shoes in designated areas (designated people watch them). Photography restricted in inner sanctums. Allow 1-2 hours. Go with reverence and curiosity. Guides available but not necessary. Women may be restricted from certain inner areas during menstruation (temple tradition).",c:["temple","dawn","sacred"],r:"g",nn:"கபாலீஸ்வரர் கோயில்",ns:"விடியல் வேளையில் முதல் பூஜை, மணி, முரசு, தூபம், கோஷ்டி",nst:"ஏழாம் நூற்றாண்டுக் கோயில்; சிவனுக்கு அர்ப்பணம்; பக்தர்களின் ஒரு தினம் இதில் தொடங்குகிறது.",nt:"விடியல் 7 மணிக்கு முன்னர் வரவும். முறையான ஆடை: தோள் மற்றும் முழங்கால்கள் மூடப்பட்டிருக்க வேண்டும். புகைப்படம் உள் பகுதிகளில் தடை."}
{id:41,n:"Mylapore Neighbourhood Walk — Traditional Urban Life",a:"Mylapore",v:["neighborhood","culture","dawn"],d:60,s:"Oldest part of Chennai. Flower sellers, kolam on doorsteps, silk shops, filter coffee, women in silk saris at 7am. Most intact traditional urban neighbourhood.",st:"Mylapore is Chennai's oldest neighborhood, home to thousands of families for centuries. The streets are narrow, crowded with commerce and daily life. Before 9am, the neighborhood is at its most authentic: flower sellers arrange jasmine garlands outside shops; women draw kolam (colored powder patterns) on doorsteps; silk sari shops open; elderly women in traditional silk dress buy vegetables; filter coffee smells drift from tiny cafes. The streets were designed centuries ago; they have not changed fundamentally. Walking through Mylapore, you encounter urban India as it has persisted: family shops passed through generations, elaborate houses built for joint families, temples at street corners, the rhythm of traditional life. By 9am, heat intensifies and crowds increase. But in early morning, you see the neighborhood's soul: continuous, traditional, specific, local.",im:"A woman in a blue silk sari arranges jasmine flowers outside her shop; another woman draws a kolam pattern on her doorstep with colored powder; the street is narrow and crowded.",t:"Start early, 6-8am. Best on weekday mornings. Walk slowly. Wear comfortable shoes and modest dress. Get lost intentionally in the side streets. Buy filter coffee at a local café—ask for it in a tumbler and davara (two metal vessels). Watch how locals interact with the neighborhood. Photograph respectfully. This is residential life, not a museum. Be observant and humble. Photography welcome but ask permission for people photographs.",c:["neighborhood","culture","tradition"],r:"g",nn:"மயிலாப்பூர்",ns:"சென்னையின் மிகப் பழைய பகுதி; புஷ்பவிற்பனர், கோலம், பட்டு சேலைகள்",nst:"ஆயிரம் ஆண்டுகளின் உரிமை; குடும்ப கடைகள், பாரம்பரிய வாழ்க்கை, தெய்வ கோயில்கள்.",nt:"விடியல் 6-8 மணியில் தொடங்கவும். மெதுவாக நடந்து செல்லவும். உள்ளூர் வடிப்பு காபி அருந்தவும்."}
{id:42,n:"Marina Beach at Dawn — Urban Waterfront Awakening",a:"Marina Beach",v:["dawn","beach","people"],d:45,s:"13km along Bay of Bengal. At 5am: walkers, joggers, vendors, fishermen, yoga, families. By 9am heat makes it impossible. Scale at first light genuine.",st:"Marina Beach stretches 13 kilometers along Chennai's coast. At 5am, as the sun edges toward the horizon, the beach awakens. Hundreds of people are already there: walkers moving in purposeful strides, joggers in groups, families, elderly residents doing yoga or tai chi, vendors setting up carts, fishermen casting nets, dogs being exercised. The light is extraordinary: the sun paints the sky orange and pink; shadows are long and dramatic. The crowd is mixed by class, age, and religion—this is Chennai's democratic beach. People nod to strangers, move in their own rhythms, share the space. By 6am, the crowd grows. By 7am, it is substantial. By 9am, heat rises and the beach becomes difficult. But in those first hours, you experience the beach at its most alive and authentic—not a tourist place but where the city comes to move and breathe.",im:"Dozens of people move across sand at dawn: walkers, joggers, a fisherman casting a net, a woman doing yoga, children playing, the sun rising over the Bay of Bengal.",t:"Arrive by 5am before dawn if possible, or by 5:30am for best light. Come early morning on weekdays for fuller experience. Don't swim—undertow is dangerous and deadly. This is for walking and observing, not swimming. Bring hat and water. Wear comfortable shoes and modest dress. Photography welcome. Observe the mixing of people and activity. This is where Chennai lives.",c:["beach","dawn","people"],r:"g",nn:"மெரीனா கடற்கரை",ns:"விடியல் 5 மணிக்கு; நூற்றுக்கு மேற்பட்ட மக்கள் ஆ புலரும் வேளை",nst:"சென்னையின் ஜனतந்திர கடற்கரை; நடைபயிற்சி, யோக, குடும்பங்கள், மீனவர்கள்.",nt:"5 மணிக்கு வரவும். நீந்தாதீர்கள்—கீழ்க்கரை ஆபத்தளவு. தொப்பி மற்றும் நீர் எடுத்துச்செல்லவும்."}
{id:43,n:"George Town — Colonial Merchant Quarter",a:"George Town",v:["history","commerce","colonial"],d:90,s:"Oldest commercial district. Narrow lanes, wholesale merchants, colonial warehouses, flower market, Armenian church 1629. Walk early during deliveries.",st:"George Town is Chennai's oldest commercial district, established during the British colonial period. The area is a dense warren of narrow lanes, wholesale merchants, and colonial-era warehouses. Walking George Town, you encounter layers of Indian-British-global commerce: flower merchants selling massive quantities of jasmine and marigold, spice traders, fabric wholesalers, metal merchants, hardware dealers. The architecture is colonial: late 1700s and 1800s warehouses and administrative buildings. The Armenian church dates to 1629, predating much of the colonial presence. The street is chaotic: vehicles squeeze through narrow lanes, porters carry enormous loads, merchants haggle, deliveries happen constantly. Best visited early morning during 6-8am deliveries when the merchant life is at peak activity. Walking through George Town, you encounter a century of global trade—goods from around the world flowing through these lanes, fortunes made and lost, communities persisting.",im:"A narrow lane crowded with delivery porters carrying fabric bolts; spice merchants stand in shop doorways; an old colonial building with weathered yellow paint stands nearby.",t:"Located in downtown Chennai near central station. Walk early morning 6-8am during deliveries and merchant activity. Best on weekdays. Wear comfortable shoes. Watch for traffic—lanes are narrow and congested. Go with someone who knows the area if possible. Photography welcome but ask merchants for permission. Respect the working environment—this is commerce, not tourism. Slow down and observe. The neighborhood's authenticity is its value.",c:["history","commerce","colonial"],r:"g",nn:"ஜார்ஜ் டவுன்",ns:"மிகப் பழைய வணிக பகுதி; செறிந்த வீதிகள், கொள்ளை வர்த்தகர்கள், பூக்கள்",nst:"ஒரு நூற்றாண்டுக் குண்டு வணிகம்; உலக மாயம் சென்னை வழியாக.",nt:"விடியல் 6-8 மணியில் தொடங்கவும். வாசல் மாயம் கூறவும். வணிக சூழ்நிலைக்கு மரியாதை கொடுங்கள்."}
{id:44,n:"Little Mount Caves — St Thomas & Ancient Spring",a:"Little Mount",v:["sacred","history","spiritual"],d:45,s:"St Thomas Apostle tradition: sheltered here 1st century AD. Footprints on rock. Tiny, cool, ancient, moving. Spring never dry. Free. Metro to Guindy plus auto.",st:"Little Mount caves are a small religious site in south Chennai with deep historical and spiritual significance. According to tradition, St Thomas the Apostle sheltered in these caves in the first century AD. The caves are modest—low-ceilinged natural rock shelters—but the setting is ancient and powerful. Stone surfaces bear markings described as footprints. A spring emerges from the rock; the water is always cool, said to never dry even in drought. The site is sacred in Christian tradition but also valued in other Indian spiritual contexts. The caves are silent, cool, and surprisingly moving despite their small size. Few tourists visit; the site retains authentic sacred quality. Walking inside, feeling the cool rock, seeing the spring, you encounter depth of time and tradition.",im:"Inside a low rock cave, a small spring flows from stone into a pool; light falls from the cave entrance; a small Christian cross is mounted on the rock wall.",t:"Located in south Chennai (Little Mount area). Get there via metro to Guindy station, then auto-rickshaw to Little Mount (10-15 minutes). Entrance is modest—free or very small donation. Remove shoes before entering. Dress modestly. Allow 30-45 minutes. Go with respectful intention. The space is sacred; be quiet and observant. Cool, dark interior; bring a light. Small shops outside sell religious items. This is a genuine pilgrimage site, not a tourist attraction.",c:["sacred","history","spiritual"],r:"g",nn:"லிட்டல் மவுண்ட்",ns:"புனித தோமஸ் அப்போஸ்தல் பரம்பரை; ஒரு நூற்றாண்டு கால சரண",nst:"ப்தின் நூற்றாண்டில் புனிதர் பாதுகாப்பு; ஒரு செspring் எப்போதும் உலர்ந்து போனதில்லை.",nt:"கோயிலுக்கு முன்பு காலணி நீக்கவும். மரியாதைப்பூர்வ ஆடை. வசன சூழ்நிலை."}
{id:45,n:"Theosophical Society at Adyar — Banyan Cathedral",a:"Adyar",v:["nature","spirituality","meditative"],d:90,s:"One of India's largest banyan trees covering 40,000 sq ft. Walk under aerial roots and canopy creating cathedral-like space.",st:"The Theosophical Society's grounds at Adyar contain one of India's largest and oldest banyan trees. The tree covers approximately 40,000 square feet. Walking beneath the tree is walking through a natural cathedral: the canopy is dense and high; aerial roots hang from branches creating natural columns and corridors. Light filters through leaves creating shifting patterns. The air is cool and still. The tree was planted or began growing in ancient times; its age is measured in centuries. The Theosophical Society is a spiritual organization founded in the 19th century; the grounds are peaceful and maintained. Few visitors come; the site is quiet. Walking under the banyan, you feel both insignificant and supported—the tree is vast and ancient, and you are small beneath it. This is a place for sitting, thinking, breathing.",im:"Aerial roots hang from above like natural pillars; light dapples the ground; a solitary person sits on a bench beneath the canopy in the cool shade.",t:"Located in Adyar, south Chennai (accessible by metro, bus, auto). Grounds open weekday mornings 8:30-10am and 2-4pm. Closed Sundays. Walking meditation allowed. Bring water. Wear modest dress. Remove shoes in designated areas. Photography permitted. Go quietly. This is meditation space as much as natural wonder. Allow 1-2 hours. The tree is timeless; sit beneath it and feel time differently.",c:["nature","spirituality","tree"],r:"g",nn:"தியோசோபிக்கல் சமிதி",ns:"ஒரு மாபெரும் பனி மரம் 40,000 சதுரஃப அடியை நிரப்புகிறது",nst:"பழைய வேரியல் அயனுக்கு சரணம்; ஆன்மீக சூழ்நிலை; பொ மூலம் ஞான வலி.",nt:"விடியல் 8:30-10am. சூழ்நிலை யோग. மூலம் தியான. தொப்பி கொடுங்கள்."}
{id:46,n:"Adyar Estuary & Broken Bridge — Industrial-Natural Edge",a:"Adyar",v:["nature","birds","estuary"],d:60,s:"Where Adyar meets sea. Partially demolished bridge, estuary with egrets, herons, mangroves. Industrial-natural edge beauty.",st:"The Adyar River estuary is where freshwater meets the Bay of Bengal. The landscape is liminal: industrial development abuts mangrove forests; a partially demolished bridge spans the estuary creating a dramatic skeletal structure against water and sky; fishermen work alongside modern buildings. The water attracts wading birds: egrets, herons, cormorants, kingfishers. Low tide reveals mudflats where birds feed intensively. The estuary is a crucial ecological zone despite industrial pressure. Walking the estuary, you encounter the tension between development and ecology, modernity and tradition—the bridge's broken skeleton frames this contrast. The light at dawn or dusk is extraordinary. Few tourists visit; bird watchers and local residents are the primary visitors.",im:"A partially demolished bridge's concrete skeleton rises above water; egrets wade in shallow estuary water; mangrove roots protrude from muddy banks; industrial buildings visible in the distance.",t:"Located at Adyar, accessible by auto or taxi. Best visited at low tide for bird watching and mudflat exploration. Dawn or dusk light is magical. Bring binoculars for bird watching. Wear neutral colors. Move slowly and quietly—birds are easily startled. Bring water and hat. Photography excellent but respect birds' space; don't approach closely. Local bird watchers are helpful. This is an ecological zone with growing conservation importance.",c:["nature","birds","estuary"],r:"g",nn:"ஆதியார் உண்ணிகட்டை",ns:"ஆதியார் கடலுடன் சந்திக்கும் இடம்; பக்ஷி வாழ்க்கை",nst:"நீர் வாழ் பறவை மற்றும் வேடிக்கை; மாற்று பழங்கள் வனப்பு.",nt:"குறைந்த அலை சமயம் சிறந்தது. விடியல் அல்லது மாலை. தொலை நோக்கி எடுத்துச்செல்லவும்."}
{id:47,n:"DakshinChitra — Living Museum of Architecture",a:"ECR (East Coast Road)",v:["architecture","heritage","cultural"],d:120,s:"Open-air museum on ECR. Transplanted vernacular houses from Tamil Nadu, Kerala, Karnataka, Andhra Pradesh. Walk actual buildings understanding climate, material, belief.",st:"DakshinChitra is an open-air museum on the East Coast Road south of Chennai. The museum preserves traditional vernacular architecture from four South Indian states: Tamil Nadu, Kerala, Karnataka, and Andhra Pradesh. Complete traditional houses have been transplanted to the museum grounds. Walking through, you encounter different architectural traditions: Tamil Nadu's tiled-roof houses with courtyards, Kerala's slope-roofed wooden structures designed for monsoon rainfall, Karnataka's stone-walled homes, Andhra Pradesh's houses with distinctive construction methods. Each house reveals how climate, available materials, and cultural beliefs shaped design. Artisans are often present: potters, weavers, craftspeople using traditional methods. The museum is not static but represents living traditions. This is architecture experienced not as images but as inhabitable space.",im:"A traditional Tamil Nadu house with a sloped tiled roof and central courtyard is photographed from outside; an elderly craftsperson sits inside a Kerala traditional house weaving cloth.",t:"Located on ECR, about 20-25km south of Chennai (30-40 minutes by taxi or auto). Admission fee required (modest). Open most days, closed Tuesdays. Allow 2-3 hours. Bring hat and water; the grounds are expansive and sunny. Wear comfortable shoes. Photography permitted. Speak with artisans if present. This is educational and authentic. Guide services available. Best for morning visits when light is good and heat is less intense.",c:["architecture","heritage","cultural"],r:"g",nn:"தக்ஷிணசித்ர",ns:"திறந்த வான சங்கிரகணம் தெற்கு இந்தியன் கட்டடக்கலை",nst:"பாரம்பரிய வீடுகளை நகர்த்தி; நாட்டுப்புற வாழ்க்கை; பொ மூலம் பொ.",nt:"ECR மீது; சுமார் 20-25கி.மீ தெற்கு; சுமார் 30-40 நிமிட. உள்ளிட்ட கட்டணம்."}
{id:48,n:"Filter Coffee Culture — The Pour and Ritual",a:"Citywide",v:["coffee","ritual","local"],d:30,s:"Chennai runs on filter coffee in metal tumbler and davara. Order at café, pour between vessels to cool, drink standing at counter.",st:"Chennai has one of the world's great coffee cultures, centered on a specific preparation method and ritual. In coffee shops across the city—from high-street cafes to humble street vendors—filter coffee is prepared in a special metal filter set. The coffee grounds steep in hot water in the upper chamber; dark liquid drips slowly into a lower chamber. When ready, the coffee is poured into a metal tumbler and a wider, flatter vessel called a davara. The pouring between vessels, called 'narikeram' (play), is both practical and theatrical: it cools the coffee and creates elaborate foam. Customers stand at counters, hold the tumbler in one hand and davara in the other, and pour repeatedly before drinking. The ritual is social: people chat, watch others pour, exchange recommendations. Coffee is not merely a drink but a daily ceremony. The practice persists across generations and economic classes. Joining the ritual—ordering filter coffee, learning to pour, standing at the counter with locals—is joining a social continuity that spans centuries.",im:"A vendor pours dark filter coffee in a high arc between a metal tumbler and davara, creating foam and aerating the liquid; steam rises; a man watches the pouring intently.",t:"Available at any café or street coffee vendor across Chennai. Cost is minimal (very cheap). Order 'filter coffee' at any small shop. Ask for medium or strong sweetness. Watch locals pour; it's the same technique. Hold tumbler in one hand, davara in the other. Pour slowly, creating height between vessels. Repeat until cooled and foamed. Don't worry about perfection; the ritual matters more than skill. Stand at counter like locals. This is democratic, welcoming, authentic Chennai.",c:["coffee","ritual","culture"],r:"g",nn:"ஃபில்டர் காபி",ns:"தமிழ் நாட்டு அன்றாட தெய়வ நேரம்",nst:"சென்னை ஃபில்டர் காபி வழியாக உயிரோடு; உள்ளுள் வாழ்க்கை.",nt:"எந்த கேஃவிலும் ஆர்டர் செய்யவும். மெல்லிய சக்கரத்திலிருந்து பாய்கிறது. பூ செய்யவும் போல் செய்யவும்."}
{id:49,n:"San Thome Cathedral — Apostolic Layering",a:"San Thome",v:["sacred","history","colonial"],d:45,s:"16th-century Portuguese, rebuilt Gothic, almost on beach. Tomb of St Thomas below. Apostle, colonialism, Christianity all in one building.",st:"San Thome Cathedral is a church with extraordinary historical layering. The original structure was built by Portuguese in the 16th century at the traditional site of St Thomas the Apostle's martyrdom. The current structure was rebuilt in Gothic style during British colonial rule in the late 1800s. The cathedral sits near the beach; the Bay of Bengal is visible and audible from within. Below the main cathedral, a crypt contains the tomb tradition of St Thomas, connecting the space to the first century. Walking into the cathedral, you enter layers: Portuguese colonialism, British imperialism, Christian devotion, Indian religious history, architectural innovation. The building itself is beautiful: Gothic arches, stained glass windows, peaceful interior spaces. The proximity to the ocean and the tradition of apostolic presence create a powerful sense of place. This is a sacred space layered with historical weight.",im:"The Gothic cathedral's stone facade stands against the sky; the Bay of Bengal is visible beyond; a solitary devotee sits in a pew; light filters through stained glass.",t:"Located in San Thome, accessible by metro or bus. Entrance free but donations welcome. Dress modestly: covered shoulders and knees. Remove shoes in designated areas or keep them on in main cathedral spaces depending on rules posted. Photography permitted in main cathedral, restricted in crypt. Allow 45 minutes to an hour. Go at dawn or early evening for peaceful atmosphere. This is a sacred space for active worshippers and visitors.",c:["sacred","history","colonial"],r:"g",nn:"சாந்தோம் கதீட்ரல்",ns:"16 நூற்றாண்டு போர்த்துகல் மறுதொடுக்கம் கோதிக் பணி",nst:"புனித தோமஸ் கோயிலுக்கு பாரம்பரிக; கடலுடன் ஆட்ட; குறிப்புக்கு அடியில் நிகழ்தல் விவரம்.",nt:"சாந்தோமில் அணுகல்; முவுக்கு பொய்த்தல்; மரியாதைப்பூர்வ ஆடை; ஓட்ட அல்லது உள்ள்ளில்."}
{id:50,n:"Mahabalipuram Day Trip — Coastal Temple Complex",a:"Mahabalipuram",v:["temples","sculpture","coastal"],d:180,s:"60km south. 7th-century rock-cut and shore temples. Shore Temple at sunrise with sea behind. Arjuna's Penance bas-relief.",st:"Mahabalipuram (Mamallapuram) is a town on the coast about 60km south of Chennai, famous for its ancient temples dating to the 7th century Pallava dynasty. The Shore Temple stands directly on the beach; waves wash at its base. The temple is made of stone and was carved from existing rock formations. At sunrise, the temple is silhouetted against the rising sun with the Bay of Bengal behind it—an image of profound beauty and spiritual power. Arjuna's Penance is one of the world's largest bas-relief sculptures, carved into a massive rock face depicting scenes from Hindu mythology. Other rock-cut temples and sculptures dot the town. The town remains relatively quiet despite its archaeological significance; it retains a small-town character. Walking the area, you encounter ancient sacred artistry integrated with contemporary life.",im:"The Shore Temple's stone towers rise against dawn light; the Bay of Bengal stretches beyond; waves reflect sky and temple in their surface.",t:"Located 60km south, accessible by bus, car, or shared taxi from Chennai (1-1.5 hours). Go early in morning to arrive at Shore Temple for sunrise. Allow full day. Wear hat, sunscreen, and comfortable shoes. Photography excellent. Guides available. Entry fees required for major temples. This is essential South Indian sculpture and architecture. Go with curiosity and respect for the sacred spaces.",c:["temples","sculpture","coastal"],r:"g",nn:"மகாபலிபுரம்",ns:"7 நூற்றாண்டு ஐதீக கோதி மூர்தியுள்ள தமிழ்",nst:"வெளிமறை கோயில் கடலுடன் நிலைப்பாடு; அர்ஜுனன் பேனல்; உலக மூர்தி.",nt:"தெற்கு 60கி.மீ; விடியல் வரவும்; முழுநாள் நேரம்; கோயிலின் நுழைவு கட்டணம்."}
{id:51,n:"Besant Nagar Beach Evening — Neighbourhood Coastal Life",a:"Besant Nagar",v:["beach","neighborhood","evening"],d:45,s:"Calmer, cleaner, more neighbourhood. Families, couples, dogs, snack vendors. Less dramatic than Marina but intimate.",st:"Besant Nagar (Bessie) Beach is less famous and less crowded than Marina Beach, serving the neighborhood as a local gathering place. The beach is calmer and cleaner than Marina. At evening time, families arrive with children, couples walk together, dogs run on sand, vendors sell snacks. The water is safer for wading (though swimming still carries risks). The beach feels like a neighborhood amenity rather than a tourist destination—people are local residents, not visitors. The light at dusk is soft and golden. The crowd is diverse and mixed. This is informal Chennai life: families spending evening time together, vendors making a living, people simply being at the seaside. The beach lacks Marina's scale but gains in intimacy and authenticity.",im:"A family sits on the sand at dusk; children play nearby; a vendor sells snacks from a cart; couples walk along the waterline; dogs run freely.",t:"Located in Besant Nagar neighborhood, accessible by bus or auto. Go at late afternoon or early evening for best atmosphere. No entry fee. Wear modest dress. Water is relatively safe for wading, not swimming. Bring hat and water. Photography welcome. This is neighborhood space; be respectful of local residents. Spend time observing and sitting. This is where Chennai lives everyday.",c:["beach","neighborhood","evening"],r:"g",nn:"பெசன்ட் நகர் கடற்கரை",ns:"மெல்லிய, சுத்தமான, ஆப விறவ பூ கடற்கரை",nst:"குடும்பம், தம্பதிகளும் நாய்களும் மாலையில் வருவர்; உள்ளூர் வாழ்க்கை.",nt:"மாலை வரவும். குறைந்த நீர் சுरક्षا. கிராமங்கள் என மதிப்பெள்ளல்."}
{id:52,n:"Midnight Masala Dosa — Eating Like Chennai Eats",a:"Citywide",v:["food","nightlife","local"],d:30,s:"Chennai eats late. Dosa restaurants best 10pm-1am. Find crowd outside, order masala dosa, plain dosa, filter coffee.",st:"Chennai's restaurant culture runs counter to much of the world's meal schedules: the city eats dinner late, often between 9pm and midnight. Dosa restaurants (specialized South Indian pancake restaurants) come alive between 10pm and 1am. At these hours, crowds gather outside popular dosa shops: workers, students, night-shift employees, couples, families. The dosa makers work rapidly, spreading batter on greased griddles, flipping perfectly timed crepes, filling with spiced potatoes and chilies. A masala dosa is crispy outside, soft inside, accompanied by sambar (spiced lentil soup) and coconut chutney. Ordering and eating at the counter at midnight, standing or sitting at small tables, you encounter Chennai's nocturnal food culture. This is not tourist food but authentic daily sustenance. The social nature of eating together, the skill of the dosa maker, the efficiency of service despite chaotic energy—all speak to how deeply food is embedded in Chennai's social life.",im:"A dosa maker spreads thin batter on a hot griddle with practiced speed; steam rises; a crispy crepe begins to form; customers wait expectantly nearby.",t:"Find any dosa restaurant in Chennai (many across the city). Go between 10pm-1am for authentic crowds and energy. Look for a restaurant with people standing outside waiting—that indicates good dosa and popularity. Order 'masala dosa' (filled with spiced potato) and 'plain dosa' (without filling). Eat with right hand if possible (Tamil food tradition). Accompany with filter coffee. Stand at counter or sit at small table. No reservations; it's first-come service. Cost is minimal. This is essential Chennai experience.",c:["food","nightlife","local"],r:"g",nn:"மசாலா தோசை",ns:"தமிழ் ராத்திரி உணவு; தொளை போல் 10பி-1ம் உணவு",nst:"சென்னை ராத்திரி நேரத்தில் உணவுண் நம்மைப் பெறுவது; தோசை கடை வாழ்க்கை ஆரம்ப.",nt:"10பி-1ம் நেரத்திற்குப் செல்லவும். பெரிய மக்கள் இருக்கும் இடம் தேர్్్. வலக் கையுடன் சாப்பிடவும்."}
{id:53,n:"Cheap Bus Ride — City Transformation on Wheels",a:"Citywide",v:["transport","observation","urban"],d:45,s:"Random long-distance city bus 45 minutes. Watch city change: colonial to chaos to suburb. Costs nothing.",st:"Chennai's bus network is one of the busiest in India, operated by the government. A random long-distance bus ride through the city reveals Chennai's spatial and social geography. Starting in colonial downtown (ordered streets, old British buildings), the bus moves through chaotic central areas (markets, crowds, congestion), then into residential suburbs (quieter, middle-class apartments, educational institutions), and eventually into the edges (industrial areas, construction, new development). The bus carries working-class and middle-class residents, not tourists. Passengers board and exit constantly. Conversations in Tamil, English, Telugu overlap. Riding a 45-minute bus journey, you experience the city's transformation across time and space: colonial infrastructure persisting, medieval-like markets, modern middle-class life, speculative development at the edges. The cost is almost nothing. This is public transport as urban education.",im:"Inside a crowded bus: passengers stand and sit, some reading, some sleeping, one hanging from a handle. Outside, the window frames changing streetscapes: ordered colonial blocks giving way to market congestion.",t:"Board any long-distance city bus (frequent from central station or major hubs). Costs minimal (few rupees). Travel during daytime for safety. Keep bag in front, valuables secure. Watch the city flow past the window. Don't get off at random stops. Ride to end of line and return, or ride 45 minutes then exit at a major hub. Go during off-peak hours (mid-morning, mid-afternoon) for less crowding. Photography welcome but don't photograph people without asking. This is real transport, not a tour.",c:["transport","observation","urban"],r:"g",nn:"சென்னை பேருந்து",ns:"நகர் மாற்றம்; குலியாக் தக் சுவ்องன இ",nst:"பேருந்து வழியாக சென்னை புதிய கட்டடக்கலை தோறும் மாற்றாதல்.",nt:"பேருந்தை ஏற்றவும்; 45 நிமிட கூர்க்கும்; சென்னை மாற்றம் பேணவும்."}

<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} style={{borderRadius:10,overflow:"hidden",aspectRatio:"2/3",background:"#eee"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>)}</div></div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
const TBGS={"places":"https://mariavheland.github.io/godostuff/textures/tex18.png","collections":"https://mariavheland.github.io/godostuff/textures/tex09.png","missions":"https://mariavheland.github.io/godostuff/textures/tex09.png","plan":"https://mariavheland.github.io/godostuff/textures/tex09.png","phrases":"https://mariavheland.github.io/godostuff/textures/tex18.png","default":"https://mariavheland.github.io/godostuff/textures/tex18.png"};if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:"url('https://mariavheland.github.io/godostuff/textures/tex17.png') center/cover no-repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Chennai Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Chennai Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
