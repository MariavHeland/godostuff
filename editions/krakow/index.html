<script>
const P = [
  {id:1,n:"Kazimierz Jewish Quarter (Medieval & Tragic) — Kazimierz",a:"Kazimierz",v:["history", "beautiful"],d:1,s:"Jewish neighborhood from 1500s where thriving community existed, now empty of people but full of memory.",st:"Streets curve in medieval patterns. Synagogues (now museums) stand empty. Plaques mark destroyed buildings. The quiet is heavy. Art installations everywhere. You feel the weight of what was and was taken.",im:"It\'s 1920. The quarter thrives. Yiddish is spoken. Stores are open. Jewish life in full volume.",t:"Streets curve in medieval patterns. Synagogues (now museums) stand empty. Plaques mark destroyed buildings. The quiet is heavy. Art installations everywhere. You feel the weight of what was and was taken.\",im:\"It\'s 1920. The quarter thrives. Yiddish is spoken. Stores are open. Jewish life in full volume.\",t:\"Walk freely. Museums €5-10 each. Don\'t photograph if praying. Go respectfully. Old Cemetery €7. Spend full day. Get guidebook.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:2,n:"Nowa Huta (Soviet Planned City) — Nowa Huta",a:"Nowa Huta",v:["weird", "history"],d:2,s:"Complete city built in 1950s by Soviets—wide streets, identical blocks, grand socialist vision now slightly decayed.",st:"Enormous squares with monumental buildings. Wide streets designed for parades. Apartment blocks in rows. The scale is immense and slightly terrifying. You can trace the idea: housing for workers, standardized and equal.",im:"It\'s 1956. The city is brand new. Soviet engineers created something unprecedented.",t:"Enormous squares with monumental buildings. Wide streets designed for parades. Apartment blocks in rows. The scale is immense and slightly terrifying. You can trace the idea: housing for workers, standardized and equal.\",im:\"It\'s 1956. The city is brand new. Soviet engineers created something unprecedented.\",t:\"Tram to Nowa Huta. Free exploration. Walking tours €10-15. Go in daytime. Scale best appreciated walking. Bring camera.",c:["architecture", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:3,n:"Podgórze Ghetto Area (WWII History) — Podgórze",a:"Podgórze",v:["history", "scary"],d:3,s:"Neighborhood where Kraków Ghetto was established—marked with plaza and remnants—geography of tragedy made visible.",st:"A plaza with 70 empty chairs—one for each thousand ghetto residents who died. Streets are normal except for this reminder. Apartment blocks Soviet-era. History layers. You see old walls\' trace. The weight is immense.",im:"It\'s 1943. A wall surrounds this area. Inside, 60,000 people in space meant for 1/3 that many.",t:"A plaza with 70 empty chairs—one for each thousand ghetto residents who died. Streets are normal except for this reminder. Apartment blocks Soviet-era. History layers. You see old walls\' trace. The weight is immense.\",im:\"It\'s 1943. A wall surrounds this area. Inside, 60,000 people in space meant for 1/3 that many.\",t:\"Free plaza. Schindler\'s Factory museum (€10) nearby has full context. Go respectfully. Bring time to sit. Don\'t make it tourism.",c:["history_big", "scary"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:4,n:"Wawel Hill (Free Grounds, Paid Interior) — Old Town",a:"Old Town",v:["history", "beautiful"],d:4,s:"Hill where Polish power centered for centuries—castle, cathedral, museums—the landscape itself tells the story.",st:"The hill rises. Walls climb. Buildings crown it. Inside walls, ancient cathedrals. Outside, you can walk perimeter for free. Views of city and Vistula. The sense of importance and history is physical.",im:"It\'s 1400. The King moves to this fortress. Poland\'s power will center here for centuries.",t:"The hill rises. Walls climb. Buildings crown it. Inside walls, ancient cathedrals. Outside, you can walk perimeter for free. Views of city and Vistula. The sense of importance and history is physical.\",im:\"It\'s 1400. The King moves to this fortress. Poland\'s power will center here for centuries.\",t:\"Free grounds walk. €18+ for interior museums. Exterior walk sufficient if budget tight. Early morning for light and solitude.",c:["history_big", "high_spots"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:5,n:"Planty Park Ring (Green Encircle) — Old Town",a:"Old Town",v:["beautiful", "parks", "quiet"],d:5,s:"Ring of parks encircling Old Town—instead of walls, a green buffer—walk 4km through gardens and trees.",st:"Park follows where medieval walls were. Trees are mature. Paths are peaceful. You circle historic center without needing to be inside tourist chaos. It\'s beautiful and meditative.",im:"It\'s 1800. Walls are torn down. Instead of fortifications, trees are planted. It\'s an act of peace.",t:"Park follows where medieval walls were. Trees are mature. Paths are peaceful. You circle historic center without needing to be inside tourist chaos. It\'s beautiful and meditative.\",im:\"It\'s 1800. Walls are torn down. Instead of fortifications, trees are planted. It\'s an act of peace.\",t:\"Free. Start anywhere. Walk as much as you want. Early morning for quiet. Locals use it daily. You feel part of normal city life.",c:["parks", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:6,n:"Kleparz Market (Flower & Food) — Old Town",a:"Old Town",v:["local_only", "beautiful"],d:6,s:"Covered market where vendors sell flowers, vegetables, regional foods—chaos and color, locals doing daily shopping.",st:"Flowers everywhere—roses, carnations, sunflowers. Vendors call prices. Smells intense—flowers, herbs, produce. It\'s chaotic and beautiful. You watch transactions, conversations, ordinary commerce fundamental to cities.",im:"It\'s anytime for centuries. The market is where food and flowers come from.",t:"Flowers everywhere—roses, carnations, sunflowers. Vendors call prices. Smells intense—flowers, herbs, produce. It\'s chaotic and beautiful. You watch transactions, conversations, ordinary commerce fundamental to cities.\",im:\"It\'s anytime for centuries. The market is where food and flowers come from.\",t:\"Go mornings. Free to walk. Bring cash for flowers (€1-5 per bunch) or food. Respect vendors—don\'t photograph without asking.",c:["local_only", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:7,n:"Zabłocie Street Art District (Murals & Artists) — Zabłocie",a:"Zabłocie",v:["street_art", "weird"],d:7,s:"Neighborhood designated for street art—walls are legal canvases—enormous murals, constantly evolving art.",st:"Walls explode with color. Scale is massive. Murals tell stories—political, personal, abstract. Quality is high. You see artists working. The neighborhood changes constantly. You need to return to see new pieces.",im:"It\'s 2010s. Artists reclaim urban surfaces. The city allows it. Magic happens.",t:"Walls explode with color. Scale is massive. Murals tell stories—political, personal, abstract. Quality is high. You see artists working. The neighborhood changes constantly. You need to return to see new pieces.\",im:\"It\'s 2010s. Artists reclaim urban surfaces. The city allows it. Magic happens.\",t:\"Walk freely. Free. Go afternoon for light. Some galleries and cafés around. Photography encouraged. The art is raw and earnest.",c:["street_art", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:8,n:"Wolnica Square (Medieval Market Heart) — Kazimierz",a:"Kazimierz",v:["history", "beautiful"],d:8,s:"Main square in Kazimierz where medieval Jewish market took place—older than Main Square, less touristy, equally historic.",st:"Stone buildings surround. Town hall central. It\'s quieter than Main Square. Outdoor cafés. The atmosphere is medieval but alive. You feel history without crowds.",im:"It\'s 1500. This square is where the Jewish community sells goods and gathers.",t:"Stone buildings surround. Town hall central. It\'s quieter than Main Square. Outdoor cafés. The atmosphere is medieval but alive. You feel history without crowds.\",im:\"It\'s 1500. This square is where the Jewish community sells goods and gathers.\",t:\"Free to walk. Cafés €3-8 for coffee/food. Go early morning or evening for quiet. Square beautiful in any light. Sit at outdoor café.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:9,n:"Kościuszko Mound (Earthen Monument) — Podgórze",a:"Podgórze",v:["history", "high_spots"],d:9,s:"Mound built from earth carried by hand as a memorial—climb it and see the city from unusual vantage point.",st:"The mound rises. Stairs climb the outside. At the top, views change. The city spreads. It\'s unusual structure—not built with stone or engineering, but human effort accumulated. It feels democratic and heroic.",im:"It\'s 1820. Soil is carried by hand to build a memorial. Thousands of people participate.",t:"The mound rises. Stairs climb the outside. At the top, views change. The city spreads. It\'s unusual structure—not built with stone or engineering, but human effort accumulated. It feels democratic and heroic.\",im:\"It\'s 1820. Soil is carried by hand to build a memorial. Thousands of people participate.\",t:\"€3 entry. 15-minute walk up. Go early morning for light. The view is worth it. Go on clear day. Effort to climb is modest.",c:["high_spots", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:10,n:"St. Mary\'s Trumpeter (Hourly Signal) — Main Square",a:"Main Square",v:["history", "beautiful"],d:10,s:"From church tower, trumpet player plays medieval melody every hour—tradition unbroken for centuries, still beautiful.",st:"The melody is brief and mournful. It echoes across Main Square. Everyone pauses. It\'s a moment of collective attention. The tradition is so old and maintained that you feel history in the present tense.",im:"It\'s 1400. A trumpeter signals the hours. It\'s practical and will become tradition.",t:"The melody is brief and mournful. It echoes across Main Square. Everyone pauses. It\'s a moment of collective attention. The tradition is so old and maintained that you feel history in the present tense.\",im:\"It\'s 1400. A trumpeter signals the hours. It\'s practical and will become tradition.\",t:\"Free to hear. Happens on the hour. Go to Main Square before the hour. It\'s brief but beautiful. Hear it multiple times.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:11,n:"Wieliczka Salt Mine Day Trip — Wieliczka",a:"Wieliczka",v:["weird", "history"],d:11,s:"A medieval salt mine turned into underground cathedral and ballroom—you descend into galleries carved from salt.",st:"Chambers are enormous, chandeliers hang, sculpture carved from salt depicts religious scenes. It\'s cathedral-like and otherworldly. You\'ve descended into a different world. The air is strange—salty and cool.",im:"It\'s 1300s. Miners work by candlelight carving salt that will fuel Poland\'s wealth.",t:"Chambers are enormous, chandeliers hang, sculpture carved from salt depicts religious scenes. It\'s cathedral-like and otherworldly. You\'ve descended into a different world. The air is strange—salty and cool.\",im:\"It\'s 1300s. Miners work by candlelight carving salt that will fuel Poland\'s wealth.\",t:\"€18-20 entry. Tour takes 2.5 hours. Book ahead. Go during day. Dress warmly—it\'s cool underground. The descent is steep but manageable.",c:["history_big", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:12,n:"Ojców National Park Day Trip — Ojców",a:"Ojców",v:["nature", "history"],d:12,s:"Limestone gorge with hiking, caves, castle ruins—completely different landscape 45 minutes by bus.",st:"Limestone cliffs rise. A river winds through. Walking trails. Castle ruins on a hill. Caves to explore. It\'s wild and beautiful. You feel transported to a different world.",im:"It\'s 1800s. Romantics came here seeking natural beauty and medieval history.",t:"Limestone cliffs rise. A river winds through. Walking trails. Castle ruins on a hill. Caves to explore. It\'s wild and beautiful. You feel transported to a different world.\",im:\"It\'s 1800s. Romantics came here seeking natural beauty and medieval history.\",t:\"Bus from Kraków (45 minutes, €5-7). Free to explore. Guides available for caves (€10). Spend full day. Bring water. Good shoes. Café available.",c:["nature", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:13,n:"Underground Market Square Museum — Old Town",a:"Old Town",v:["history", "weird"],d:13,s:"A museum underground beneath Main Square—preserved medieval streets and stories below the modern city.",st:"You descend and suddenly you\'re in medieval streets. Display cases show artifacts. You understand the vertical complexity of Kraków—old below, new above, both active.",im:"It\'s 1400. These streets were aboveground. Over time, the city built higher.",t:"You descend and suddenly you\'re in medieval streets. Display cases show artifacts. You understand the vertical complexity of Kraków—old below, new above, both active.\",im:\"It\'s 1400. These streets were aboveground. Over time, the city built higher.\",t:\"€8-10 entry. Takes 1-2 hours. Go midweek afternoon for quiet. The museum explains Kraków\'s history. Worth seeing.",c:["history_big", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:14,n:"Stained Glass Museum (Light & Color) — Kraków",a:"Kraków",v:["beautiful", "history"],d:14,s:"Museum of stained glass where every window is backlit—you walk through color and light and medieval storytelling.",st:"Windows glow. Reds burn, blues glow, golds shine. Narrative panels tell stories—biblical scenes, donor portraits. Standing in front of a backlit window, you understand why medieval people felt god\'s presence.",im:"It\'s 1450. A master glazier completes a window. Light streams through exactly as imagined. It will last 500 years.",t:"Windows glow. Reds burn, blues glow, golds shine. Narrative panels tell stories—biblical scenes, donor portraits. Standing in front of a backlit window, you understand why medieval people felt god\'s presence.\",im:\"It\'s 1450. A master glazier completes a window. Light streams through exactly as imagined. It will last 500 years.\",t:\"€4-6 entry. Go midday when natural light strongest. Afternoon light different than morning. Spend time. Bring someone artistic.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:15,n:"Cricoteka Theatre Museum — Kraków",a:"Kraków",v:["weird", "history"],d:15,s:"Museum dedicated to radical Polish theatre—puppet heads, strange sets, art that makes you uncomfortable.",st:"Displays chaotic and beautiful. Puppets stare. Sets surreal—twisted and impossible. Videos play of performances from another dimension. It\'s weird and brilliant. You leave questioning what theatre is.",im:"It\'s 1960s. Polish theatre artists create pieces from inside dreams. The work is dangerous and vital.",t:"Displays chaotic and beautiful. Puppets stare. Sets surreal—twisted and impossible. Videos play of performances from another dimension. It\'s weird and brilliant. You leave questioning what theatre is.\",im:\"It\'s 1960s. Polish theatre artists create pieces from inside dreams. The work is dangerous and vital.\",t:\"Check location before going—check Kraków art calendar. €5-8 entry. Go when live performance if possible. Not always open. Verify hours. It\'s niche but profound.",c:["weird", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:16,n:"Liban Quarry (Abandoned Industrial Site) — Podgórze",a:"Podgórze",v:["weird", "abandoned"],d:16,s:"An abandoned limestone quarry—industrial archaeology visible in geological time.",st:"Sheer stone walls rise. The ground is uneven, marked by extraction. It\'s raw geology exposed. The site is simultaneously beautiful and slightly threatening. You feel the weight of time.",im:"It\'s 1900s. Stone is extracted. In a hundred years, it will be forgotten.",t:"Sheer stone walls rise. The ground is uneven, marked by extraction. It\'s raw geology exposed. The site is simultaneously beautiful and slightly threatening. You feel the weight of time.\",im:\"It\'s 1900s. Stone is extracted. In a hundred years, it will be forgotten.\",t:\"Free to explore. Go during daylight. Watch your footing—uneven ground. Bring water. The site is accessible but unmarked.",c:["weird", "abandoned"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:17,n:"Zakrzówek Quarry Lake (Swimming Hole) — Zakrzówek",a:"Zakrzówek",v:["nature", "weird"],d:17,s:"Flooded limestone quarry with turquoise water—a swimming hole locals know, tourists miss.",st:"The quarry is deep and clear. The water reflects sky, magnifying blue. Stone cliffs surround. In summer, families picnic. The temperature is cold. It feels prehistoric, untouched.",im:"It\'s 1920s. Miners work. In another century, the machines will stop and nature will reclaim it.",t:"The quarry is deep and clear. The water reflects sky, magnifying blue. Stone cliffs surround. In summer, families picnic. The temperature is cold. It feels prehistoric, untouched.\",im:\"It\'s 1920s. Miners work. In another century, the machines will stop and nature will reclaim it.\",t:\"Zakrzówek area, hidden. Free. Summer swimming only. Cold water—acclimatize. Check with locals. Can be trespassing depending on day.",c:["nature", "weird"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:18,n:"Schindler\'s Factory Area (WWII History) — Podgórze",a:"Podgórze",v:["history", "scary"],d:18,s:"The factory where Schindler saved workers—museum now, connected to Holocaust history.",st:"The building is factory-like and functional. Inside, exhibits explain who Schindler was and what he did. The history is heavy. You understand survival and the power of individual action against systematic evil.",im:"It\'s 1943. A factory owner decides to save his workers. He risks everything.",t:"The building is factory-like and functional. Inside, exhibits explain who Schindler was and what he did. The history is heavy. You understand survival and the power of individual action against systematic evil.\",im:\"It\'s 1943. A factory owner decides to save his workers. He risks everything.\",t:\"€10-15 entry. Takes 2 hours. Go respectfully. Go with time to read and absorb. This is serious history, not entertainment.",c:["history_big", "scary"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:19,n:"Communist-Era Architecture Walk — Nowa Huta",a:"Nowa Huta",v:["architecture", "history"],d:19,s:"Walking tour focusing on preserved Soviet-era buildings—bold architecture from an ideological moment.",st:"Buildings are grand and utilitarian. Proportions are immense. They\'re designed to impress. The forms are geometric and powerful. Looking at them, you understand architecture as politics.",im:"It\'s 1956. A Soviet architect designs a building to represent the eternal future of socialism.",t:"Buildings are grand and utilitarian. Proportions are immense. They\'re designed to impress. The forms are geometric and powerful. Looking at them, you understand architecture as politics.\",im:\"It\'s 1956. A Soviet architect designs a building to represent the eternal future of socialism.\",t:\"Free to explore. Guided tours €10-15. Go with an interest in architecture and history. The buildings are worth seeing regardless of agreement with their origin.",c:["architecture", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:20,n:"Polish TikTok Hidden Spots (Local Discovery) — Various",a:"Various",v:["local_only", "weird"],d:20,s:"Hidden Instagram-worthy spots that locals share on social media—finding the aesthetic Kraków nobody posts about.",st:"These spots are carefully framed. Light is considered. The composition is intentional. They\'re beautiful because someone cared enough to find them and show them. You feel like you\'re seeing the city through a local\'s eyes.",im:"It\'s today. A local stands in the perfect light taking the perfect photo. It will be seen thousands of times.",t:"These spots are carefully framed. Light is considered. The composition is intentional. They\'re beautiful because someone cared enough to find them and show them. You feel like you\'re seeing the city through a local\'s eyes.\",im:\"It\'s today. A local stands in the perfect light taking the perfect photo. It will be seen thousands of times.\",t:\"Search \'Kraków hidden gems\' or similar on TikTok/Instagram. Go with coordinates. Go during golden hour. Bring a camera. The spots are real and worth finding.",c:["local_only", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:21,n:"Kazimierz Synagogue Courtyards — Kazimierz",a:"Kazimierz",v:["history", "quiet"],d:21,s:"Courtyards behind synagogues—preserved medieval Jewish community spaces, quiet and contemplative.",st:"Courtyards are enclosed. History is palpable. Art installations honor absence. It\'s peaceful and heavy.",im:"It\'s 1920. A community gathers in these courtyards.",t:"Courtyards are enclosed. History is palpable. Art installations honor absence. It\'s peaceful and heavy.\",im:\"It\'s 1920. A community gathers in these courtyards.\",t:\"Free to explore. Museums €5-10. Go respectfully. Go early morning. Meditate on loss.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:22,n:"Nowa Huta Aleja Róż Main Avenue — Nowa Huta",a:"Nowa Huta",v:["architecture", "weird"],d:22,s:"Soviet-planned main avenue—monumental architecture, perfect perspective, ideological space made physical.",st:"The avenue is enormous. Buildings frame it. You feel the Soviet vision. It\'s grandiose and slightly terrifying.",im:"It\'s 1956. The avenue is new. Soviet engineers are proud.",t:"The avenue is enormous. Buildings frame it. You feel the Soviet vision. It\'s grandiose and slightly terrifying.\",im:\"It\'s 1956. The avenue is new. Soviet engineers are proud.\",t:\"Tram to Nowa Huta. Walk the avenue. Free. Go afternoon for light. Photography good.",c:["architecture", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:23,n:"Nowa Huta Plac Centralny Central Square — Nowa Huta",a:"Nowa Huta",v:["weird", "history"],d:23,s:"Central square of the planned city—enormous plaza, monuments, original socialist vision visible.",st:"The square is vast. It\'s designed to impress and intimidate. You understand propaganda through space.",im:"It\'s 1956. The square opens. It\'s the future, they believe.",t:"The square is vast. It\'s designed to impress and intimidate. You understand propaganda through space.\",im:\"It\'s 1956. The square opens. It\'s the future, they believe.\",t:\"Free to explore. Go during day. Feel the scale. Bring camera.",c:["architecture", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:24,n:"Podgórze Ghetto Chairs Memorial — Podgórze",a:"Podgórze",v:["history", "scary"],d:24,s:"Plaza with 70 empty chairs—each represents 1,000 deaths—the most powerful memorial in Kraków.",st:"The chairs are simple. The math is devastating. You sit on an empty one and understand scale.",im:"It\'s 1943. 60,000 people in space meant for 20,000.",t:"The chairs are simple. The math is devastating. You sit on an empty one and understand scale.\",im:\"It\'s 1943. 60,000 people in space meant for 20,000.\",t:\"Free. Go respectfully. Sit. Absorb. Don\'t make it a photo shoot. Bring time.",c:["history_big", "scary"],r:"g",nn:"",ns:"",nst:"",nt:""},
