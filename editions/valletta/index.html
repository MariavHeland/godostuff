<script>
const P = [,
  {name:'Valletta Ditch and Francesco Laparelli Gardens',area:'City Gate',desc:'Tucked below the City Gate bridge, this deep moat-turned-green space offers a quiet escape with lush gardens amid ancient fortifications. Locals cherish it for picnics and unwinding away from crowds, peering into the historic ditch that could once flood for defense. Free to wander; reachable by bus 13 or 14 stopping at City Gate.',tags:['park','hidden','free','local'],lat:35.8985,lng:14.5102},
  {name:'Steps Below the Bastions Quay',area:'Mediterranean Conference Centre',desc:'Descend hidden steps near the old Sacra Infermeria to a serene seafront quay with fisherman shacks hugging Valletta's towering walls. Maltese folks slip down here for peaceful sea gazes and fresh air, feeling the city's underbelly pulse slowly. Completely free; bus 2 or 3 nearby.',tags:['hidden','viewpoint','free','local'],lat:35.8968,lng:14.5125},
  {name:'Mental Health Awareness Mural on St. Christopher Street',area:'Strada San Kristofru',desc:'Gigantic murals promoting mental health splash color across this side street, crafted by local artists for quiet reflection amid urban buzz. Valletta residents point friends here for uplifting vibes and photo pauses during daily strolls. Free street art spot; bus 15 or 16 along the street.',tags:['street art','hidden','free','local'],lat:35.8972,lng:14.514},
  {name:'Blue Whale Mural on Old Theatre Street',area:'Triq it-Teatru l-Qadim',desc:'A massive blue whale graces this alley wall, part of Valletta's thriving urban art scene drawing curious locals for whimsical discoveries. Neighbors love sharing it in hushed tones as a creative breather from routine. Free to admire; central, walkable from bus 1 or 3.',tags:['street art','hidden','free','local'],lat:35.8978,lng:14.5128},
  {name:'Auberge d’Italie Courtyard',area:'Merchant Street',desc:'Slip through the doorway of this historic auberge to a sun-dappled courtyard with a central well, now a cozy cafe nook for locals. Maltese gather here for coffee chats under ornate arches, savoring hidden calm. Free entry to courtyard; bus 13 or 14 nearby.',tags:['courtyard','hidden','free','local'],lat:35.898,lng:14.5105},
  {name:'Mosaic Street Art Alleys',area:'Backstreets near Strait Street',desc:'Look down in narrow alleys for intricate mosaic paving stones blending history and art, a subtle delight locals tread daily. They adore these underfoot surprises that spark slow wanders and stories of Valletta's craft. Free; scattered, bus 2 central.',tags:['street art','hidden','free','local'],lat:35.8975,lng:14.513},
  {name:'Small Piazzas and Fountains',area:'Neighborhood backstreets',desc:'Maze-like lanes hide pocket piazzas with trickling fountains, where locals linger on benches watching neighborhood life unfold lazily. These are cherished for authentic Maltese rhythms, far from tourist trails. Free gems; explore on foot from bus 15 stops.',tags:['park','hidden','free','local'],lat:35.8965,lng:14.511},
  {name:'Wrought-Iron Balcony Peek Alleys',area:'Upper Valletta lanes',desc:'Peek through doorways in winding alleys to ornate wrought-iron balconies and colorful doors framing local courtyards. Valletta insiders treasure these glimpses into private worlds, perfect for curious, unhurried peeks. Free discovery; bus 1 or 3 access.',tags:['courtyard','hidden','free','local'],lat:35.899,lng:14.5095},
  {name:'Triton Fountain Plaza',area:'City Gate Plaza',desc:'This illuminated fountain plaza just outside City Gate buzzes as a local meetup spot, glowing magically at dusk for casual hangs. Maltese love its vibrant energy and colored lights drawing evening strollers. Free public space; direct bus 13, 14 drop-off.',tags:['local','hidden','free'],lat:35.8987,lng:14.5098},
  {name:'Hidden Water Cistern Peeks',area:'Residential alleys',desc:'Every Valletta house hides underground cisterns from Knight times—peek grates reveal these rainwater relics locals nod to proudly. They evoke siege tales during slow neighborhood drifts. Free street-level views; wander from bus 16.',tags:['hidden','free','local'],lat:35.897,lng:14.5115},
  {id:1,n:"Upper Barrakka Gardens — Valletta",a:"Valletta",v:["beautiful","high_spots","history"],d:20,s:"The finest view in Malta — Grand Harbour, the Three Cities, and tankers at anchor, all free",st:"From this 16th-century garden bastion, the Grand Harbour spreads below you. The dockyard creeks, Vittoriosa, Senglea, and the open sea beyond. Free to enter, always open. Nothing in Malta competes with this view.",im:"Time-travel: Knights of St John watching the Ottoman fleet fill the harbour in the Great Siege, 1565",t:"Free. Open daily. Cannon fired at noon — very loud.",c:["high_spots"],r:"g",nn:"Upper Barrakka Gardens — Valletta",ns:"Il panorama più bello di Malta — il Grand Harbour, le Tre Città",nst:"Da questo bastione-giardino del XVI secolo, il Grand Harbour si apre sotto di te.",nt:"Gratis. Aperto quotidianamente. Cannone sparato a mezzogiorno."},
  {id:2,n:"Republic Street Walk — Valletta",a:"Valletta",v:["history","architecture","local"],d:30,s:"Valletta\'s spine — walk end to end past baroque churches, the Grand Master\'s Palace, and the sea",st:"Republic Street runs from the City Gate to Fort St Elmo, the full length of Valletta. The Grand Master\'s Palace courtyard is free entry. The street narrows and the light changes at every intersection.",im:"Time-travel: the Knights of St John processing in full ceremony along this street on feast days, 1600",t:"Free always.",c:["architecture"],r:"g",nn:"Republic Street — Valletta",ns:"La spina di Valletta - percorrila da un\'estremita all\'altra",nst:"Republic Street corre dal City Gate a Fort St Elmo.",nt:"Sempre gratis."},
  {id:3,n:"Lower Barrakka Gardens — Valletta",a:"Valletta",v:["nature","quiet","beautiful"],d:15,s:"A quieter bastion garden at the harbour\'s edge — Doric temple memorial and sea views",st:"The Lower Barrakka is a small bastion garden at the harbour\'s edge. It has a Doric temple memorial and views toward Fort Ricasoli. Often less crowded than the Upper Barrakka, and always free.",im:"Time-travel: the original wooden lookout platform here, sentinels watching for enemy ships, 1580",t:"Free. Open daily.",c:["parks"],r:"g",nn:"Lower Barrakka Gardens — Valletta",ns:"Un tranquillo giardino bastionato — tempio dorico e vista sul mare",nst:"I Lower Barrakka sono un piccolo giardino bastionato sul bordo del porto.",nt:"Gratis. Aperto quotidianamente."},
  {id:4,n:"Hastings Gardens — Valletta",a:"Valletta",v:["nature","local","quiet"],d:15,s:"A long bastion terrace garden looking across Marsamxett Harbour — local cats and evening breeze",st:"Hastings Gardens runs along the Marsamxett side of Valletta\'s bastions. Look across the water to Sliema. Shaded benches, local cats, and evening breezes. Free at all times.",im:"Time-travel: this bastion as a key defensive position facing the mainland, sentinels on watch, 1570",t:"Free always.",c:["parks"],r:"g",nn:"Hastings Gardens — Valletta",ns:"Un lungo giardino terrazzo che guarda verso Marsamxett Harbour",nst:"Hastings Gardens corre lungo i bastioni di Valletta.",nt:"Sempre gratis."},
  {id:5,n:"Renzo Piano City Gate — Valletta",a:"Valletta",v:["architecture","beautiful","weird"],d:15,s:"Renzo Piano\'s 2015 city gate — a dramatic cut through the bastion, framing the Parliament",st:"The City Gate project was completed in 2015. Piano\'s design cuts dramatically through the ancient bastion. The new Parliament building faces you as you enter. Free to view and photograph from the bridge.",im:"Time-travel: the old bus terminus that occupied the Venetian moat here for 50 years, 1970",t:"Free. Always accessible.",c:["architecture"],r:"g",nn:"City Gate di Renzo Piano — Valletta",ns:"Il city gate del 2015 di Renzo Piano — un taglio drammatico nel bastione",nst:"Il progetto City Gate è stato completato nel 2015.",nt:"Gratis. Sempre accessibile."},
  {id:6,n:"Sa Maison Garden — Floriana",a:"Floriana",v:["nature","hidden","beautiful"],d:20,s:"A hidden garden on a promontory between both harbours — extraordinary views with no tourists",st:"Sa Maison Garden sits on a promontory between the Grand Harbour and Marsamxett. Shaded benches, palms, and views across both harbours. Reached via a short walk from Floriana. Rarely visited.",im:"Time-travel: British naval officers using this promontory for signalling to the fleet in the Grand Harbour, 1900",t:"Free. Walk from Floriana bus stop 10 min.",c:["parks"],r:"g",nn:"Sa Maison Garden — Floriana",ns:"Un giardino nascosto su un promontorio tra i due porti",nst:"Sa Maison Garden si trova su un promontorio tra il Grand Harbour e Marsamxett.",nt:"Gratis. 10 minuti a piedi da Floriana."},
  {id:7,n:"Floriana Granaries — Floriana",a:"Floriana",v:["history","architecture","weird"],d:15,s:"74 underground grain silos beneath a vast paved square — a free open space with an extraordinary secret",st:"The Floriana Granaries were built as underground food storage for a siege. The huge limestone-paved square above is now used for outdoor concerts and festivals. 74 silos beneath the stone.",im:"Time-travel: the granaries being filled with enough wheat to feed the entire population for years, 1636",t:"Free. Open space always accessible.",c:["history_big"],r:"g",nn:"Granai di Floriana — Floriana",ns:"74 silos sotterranei sotto una vasta piazza lastricata",nst:"I Granai di Floriana furono costruiti come deposito alimentare sotterraneo.",nt:"Gratis. Piazza sempre accessibile."},
  {id:8,n:"Vittoriosa Waterfront — Vittoriosa (Birgu)",a:"Vittoriosa (Birgu)",v:["beautiful","history","local"],d:25,s:"The marina waterfront of Birgu — superyachts and luzzu fishing boats side by side",st:"The Vittoriosa waterfront lines up superyachts and traditional luzzu boats together. Walk the quays, see the Freedom Monument, and take the harbour ferry back to Valletta for €1.50.",im:"Time-travel: the Knights of St John building their first fortifications on this small peninsula, 1530",t:"Free to walk. Ferry to Valletta €1.50 — same as a bus.",c:["romantic_water"],r:"g",nn:"Waterfront di Vittoriosa — Vittoriosa (Birgu)",ns:"Il lungofiume di Birgu — superyacht e tradizionali luzzu fianco a fianco",nst:"Il waterfront di Vittoriosa allinea superyacht e barche tradizionali luzzu.",nt:"Gratis. Traghetto per Valletta 1,50 € — stesso prezzo dell\'autobus."},
  {id:9,n:"Birgu Alleyways — Vittoriosa (Birgu)",a:"Vittoriosa (Birgu)",v:["history","hidden","architecture"],d:30,s:"Medieval alleyways predating Valletta by centuries — narrower, older, and far less visited",st:"Birgu\'s medieval alley grid predates Valletta by centuries. The narrow streets, colourful balconies, and hidden chapels are free to wander. Narrower than Valletta, and far less touristed.",im:"Time-travel: the Knights of St John establishing their first Maltese base in these very streets, 1530",t:"Free always.",c:["history_big"],r:"g",nn:"Vicoli di Birgu — Vittoriosa (Birgu)",ns:"Vicoli medievali precedenti Valletta di secoli — più stretti, più antichi",nst:"I vicoli medievali di Birgu precedono Valletta di secoli.",nt:"Sempre gratis."},
  {id:10,n:"Grand Harbour Ferry — Vittoriosa (Birgu)",a:"Vittoriosa (Birgu)",v:["local","beautiful","weird"],d:10,s:"Cross Grand Harbour by ferry for €1.50 — same price as a bus, the most beautiful commute in Europe",st:"The traditional ferry crosses Grand Harbour between Valletta and the Three Cities waterfront for €1.50 each way. A beautiful five-minute harbour crossing past the superyacht marina.",im:"Time-travel: the original dghajsa (water taxi) as the only transport between the peninsula cities, 1800",t:"€1.50 each way. Runs all day. Valletta landing at the Lower Barrakka foot.",c:["local_only"],r:"g",nn:"Traghetto Grand Harbour — Vittoriosa (Birgu)",ns:"Attraversa il Grand Harbour in traghetto per 1,50 € — stesso prezzo dell\'autobus",nst:"Il traghetto tradizionale attraversa il Grand Harbour per 1,50 € a tratta.",nt:"1,50 € a tratta. Tutto il giorno."},
  {id:11,n:"Gardjola Gardens — Senglea",a:"Senglea",v:["beautiful","high_spots","hidden"],d:20,s:"At the tip of Senglea\'s peninsula — the most intimate Grand Harbour view of all",st:"The Gardjola Gardens are at the very tip of Senglea\'s peninsula. The carved watchtower eye symbol is iconic. You can almost touch the superyachts. Locals bring children here on Sundays.",im:"Time-travel: the watchtower sentinel scanning the harbour for enemy vessels, looking in every direction at once, 1580",t:"Free. Walk from the ferry landing along the peninsula tip. 15 min.",c:["high_spots"],r:"g",nn:"Gardjola Gardens — Senglea",ns:"In punta alla penisola di Senglea — la vista più intima del Grand Harbour",nst:"I Gardjola Gardens si trovano all\'estrema punta della penisola di Senglea.",nt:"Gratis. 15 min a piedi dall\'attracco del traghetto."},
  {id:12,n:"Senglea Village Walk — Senglea",a:"Senglea",v:["local","hidden","history"],d:30,s:"The most authentically Maltese of the Three Cities — quiet streets, fishing nets, zero tourists",st:"Senglea (L-Isla) remains the most authentically Maltese of the Three Cities. Quiet streets, tiny chapels, working fishing nets, and virtually no tourists. Walk from the ferry landing to the Gardjola tip and back.",im:"Time-travel: the Three Cities as Malta\'s equivalent of Venice — a labyrinth of peninsulas, 1600",t:"Free. 5-min ferry from Vittoriosa.",c:["local_only"],r:"g",nn:"Passeggiata a Senglea — Senglea",ns:"La più autenticamente maltese delle Tre Città — strade tranquille, reti da pesca",nst:"Senglea (L-Isla) rimane la più autenticamente maltese delle Tre Città.",nt:"Gratis. Traghetto 5 min da Vittoriosa."},
  {id:13,n:"Mdina Silent City Walk — Mdina & Rabat",a:"Mdina & Rabat",v:["history","beautiful","quiet"],d:60,s:"The medieval walled capital — walk the Silent City at dusk for a panorama across the whole island",st:"Mdina is called the Silent City. Walk the limestone streets, the cathedral square (free), and the Bastion Square viewpoint at dusk for a panorama across Malta. No cars, almost no noise. Entry is free.",im:"Time-travel: the Arab emirate of Malta governing this entire island from within these walls, 900 AD",t:"Free to enter. Walk from bus stop (Rabat, 3 min). Best at dusk.",c:["history_big"],r:"g",nn:"Mdina, la Città Silenziosa — Mdina & Rabat",ns:"La capitale medievale murata — percorrila al tramonto per un panorama sull\'isola",nst:"Mdina è chiamata la Città Silenziosa. Le strade di calcare, la piazza della cattedrale.",nt:"Gratis. Bus da Valletta (40 min). Meglio al tramonto."},
  {id:14,n:"Mdina Bastion Viewpoint — Mdina & Rabat",a:"Mdina & Rabat",v:["beautiful","high_spots","nature"],d:20,s:"360° view across nearly the whole island — Valletta, the harbours, Dingli, and the sea",st:"The bastions of Mdina offer a 360° view across nearly the whole island: Valletta and its harbours to the east, Dingli cliffs to the west, and the rural centre in every direction. Most dramatic at sunset.",im:"Time-travel: the medieval city of Mdina visible from ships far out at sea, a beacon for returning sailors, 1400",t:"Free. Always accessible. The main bastion is Bastion Square.",c:["high_spots"],r:"g",nn:"Bastioni di Mdina — Mdina & Rabat",ns:"Vista a 360° su quasi tutta l\'isola — Valletta, i porti, Dingli e il mare",nst:"I bastioni di Mdina offrono una vista a 360°.",nt:"Gratis. Sempre accessibile."},
  {id:15,n:"Rabat Town Walk — Mdina & Rabat",a:"Mdina & Rabat",v:["local","history","hidden"],d:30,s:"The town just outside Mdina\'s walls — excellent churches, local market, ancient catacombs",st:"Rabat sits just outside Mdina\'s walls and is far less visited. The town has excellent parish churches, a local market on weekday mornings, and the St Agatha catacombs (small entry fee). Walk freely above ground.",im:"Time-travel: Rabat as the suburb of Roman Melita, the Roman town sprawling outside the city walls, 200 AD",t:"Free to walk. Catacombs have small entry fee.",c:["history_big"],r:"g",nn:"Rabat — Mdina & Rabat",ns:"La città appena fuori le mura di Mdina — chiese, mercato locale, catacombe",nst:"Rabat si trova appena fuori dalle mura di Mdina.",nt:"Gratis a piedi. Catacombe con piccolo biglietto."},
  {id:16,n:"Marsaxlokk Sunday Fish Market — Marsaxlokk",a:"Marsaxlokk",v:["local","free","beautiful"],d:60,s:"Every Sunday morning — Malta\'s main fishing village, colourful luzzu boats, famous waterfront market",st:"Every Sunday morning, Marsaxlokk holds a famous waterfront market. Colourful luzzu fishing boats fill the harbour behind the stalls. Free to browse; fresh fish and pastizzi at the stalls. Very local.",im:"Time-travel: Marsaxlokk as Malta\'s main fishing harbour before the tourist age, the whole village smelling of fish, 1950",t:"Free. Bus 119 from Valletta (45 min). Sunday mornings only.",c:["local_only"],r:"g",nn:"Mercato del pesce di domenica — Marsaxlokk",ns:"Ogni domenica mattina — il principale villaggio di pescatori di Malta",nst:"Ogni domenica mattina, Marsaxlokk tiene un famoso mercato sul lungomare.",nt:"Gratis. Bus 119 da Valletta (45 min). Solo domenica mattina."},
  {id:17,n:"Pretty Bay — Marsaxlokk",a:"Marsaxlokk",v:["nature","local","free"],d:45,s:"Malta\'s most accessible sandy beach — free swimming, promenade, and distant industrial views",st:"Pretty Bay in Birzebbuga is a wide bay of sandy beach. The power station is visible in the distance — which keeps it from the tourist crowds. Free swimming and a pleasant promenade for sunset walks.",im:"Time-travel: this bay as an empty fishing cove before the industrialisation of the south, 1950",t:"Free. Bus 119 from Valletta.",c:["parks"],r:"g",nn:"Pretty Bay — Marsaxlokk",ns:"La spiaggia sabbiosa più accessibile di Malta — nuoto gratuito",nst:"Pretty Bay è una vasta baia di spiaggia sabbiosa.",nt:"Gratis. Bus 119 da Valletta."},
  {id:18,n:"Cottonera Lines Walk — Cottonera Lines",a:"Cottonera Lines",v:["history","hidden","local"],d:50,s:"Five kilometres of 17th-century ramparts enclosing the Three Cities — rarely visited, always free",st:"The Cottonera Lines are a vast fortification ring enclosing the Three Cities, five kilometres long. Walk the grassy ramparts for views across the inner harbour and into the dockyard. Free, quiet, and rarely visited.",im:"Time-travel: engineers calculating the geometry of these bastions to provide interlocking fields of fire, 1670",t:"Free. Access from multiple points around Cospicua.",c:["history_big"],r:"g",nn:"Cottonera Lines — Cottonera Lines",ns:"Cinque chilometri di bastioni del XVII secolo — raramente visitati, sempre gratuiti",nst:"Le Cottonera Lines sono un vasto anello di fortifications lungo cinque chilometri.",nt:"Gratis. Accesso da più punti intorno a Cospicua."},
  {id:19,n:"Cospicua Waterfront — Cottonera Lines",a:"Cottonera Lines",v:["local","hidden","weird"],d:25,s:"The third of the Three Cities — tourist-free waterfront with views of the working dockyard",st:"Cospicua (Bormla) is almost entirely free of tourists. Its waterfront overlooks the working dockyard where Malta\'s maritime industry survives. Sit at a local café and watch the tugs and ferries.",im:"Time-travel: the dockyard in full wartime production, hundreds of workers building and repairing ships, 1942",t:"Free to walk. 5-min walk from Vittoriosa.",c:["local_only"],r:"g",nn:"Cospicua Waterfront — Cottonera Lines",ns:"La terza delle Tre Città — lungomare senza turisti con vista sul cantiere navale",nst:"Cospicua (Bormla) è quasi del tutto priva di turisti.",nt:"Gratis a piedi. 5 min da Vittoriosa."},
  {id:20,n:"Gozo Ferry from Cirkewwa — Gozo",a:"Gozo",v:["local","nature","beautiful"],d:30,s:"Ferry to Gozo for €4.65 return — quieter, greener, and completely different from Malta",st:"The Gozo Channel ferry crosses in 25 minutes from Cirkewwa (north Malta). Gozo is quieter, greener, and the limestone villages feel entirely different. The island rewards a full day trip.",im:"Time-travel: the first regular ferry service to Gozo, islanders bringing their produce to sell in Valletta, 1870",t:"€4.65 return. Bus from Valletta to Cirkewwa 1 hour. Ferry every 45 min.",c:["local_only"],r:"g",nn:"Traghetto per Gozo — Gozo",ns:"Traghetto per Gozo per 4,65 € A/R — più tranquilla, più verde e completamente diversa",nst:"Il traghetto Gozo Channel impega 25 minuti da Cirkewwa.",nt:"4,65 € A/R. Bus da Valletta 1 ora."},
  {id:21,n:"Gozo Citadel Victoria — Gozo",a:"Gozo",v:["history","beautiful","high_spots"],d:60,s:"The medieval citadel of Victoria — free to enter and walk the bastions, extraordinary island views",st:"The citadel of Victoria (Il-Belt) sits atop Gozo\'s central hill. Free to enter and walk the bastions — the views across the whole island are extraordinary. The cathedral interior is also free.",im:"Time-travel: the entire population of Gozo taking refuge inside this citadel during an Ottoman raid, 1551",t:"Free. Bus from Cirkewwa ferry to Victoria.",c:["history_big"],r:"g",nn:"Cittadella di Victoria — Gozo",ns:"La cittadella medievale di Victoria — gratuita, vista straordinaria sull\'isola",nst:"La Cittadella di Victoria si trova sulla collina centrale di Gozo.",nt:"Gratis. Bus dal traghetto di Cirkewwa a Victoria."},
  {id:22,n:"Ramla Bay Gozo — Gozo",a:"Gozo",v:["nature","beautiful","local"],d:60,s:"Malta\'s finest sandy beach — wide bay of reddish sand, Roman villa ruins, and far fewer crowds",st:"Ramla Bay is a wide bay of reddish sand backed by ancient fields and the ruins of a Roman villa. Bus-accessible, free swimming. Far less crowded than beaches near Valletta.",im:"Time-travel: the Roman summer villa at this bay, a wealthy family arriving by boat for the season, 100 AD",t:"Free. Bus from Victoria to Ramla.",c:["parks"],r:"g",nn:"Ramla Bay Gozo — Gozo",ns:"La spiaggia sabbiosa più bella di Malta — ampia baia di sabbia rossastra",nst:"Ramla Bay è una vasta baia di sabbia rossastra con rovine di una villa romana.",nt:"Gratis. Bus da Victoria a Ramla."},
  {id:23,n:"Fort St Elmo Exterior — Valletta",a:"Valletta",v:["history","architecture","beautiful"],d:20,s:"The star fort at Valletta\'s tip that held against the Great Siege of 1565",st:"Fort St Elmo held for 31 days against the full Ottoman force in 1565, buying time for the relief force. The War Museum inside charges entry but the exterior fortifications and sea-facing gun platforms are freely accessible.",im:"Time-travel: the garrison of Fort St Elmo holding out against 40,000 Ottoman soldiers, until the last man, 1565",t:"Exterior/gun platforms free. Interior charges.",c:["history_big"],r:"g",nn:"Fort St Elmo — Valletta",ns:"Il forte a punta di Valletta che resistette all\'Assedio del 1565",nst:"Fort St Elmo resistette per 31 giorni contro le forze ottomane nel 1565.",nt:"Esterno gratuito. Interno a pagamento."},
  {id:24,n:"Dingli Cliffs Walk — Mdina & Rabat",a:"Mdina & Rabat",v:["nature","beautiful","high_spots"],d:60,s:"Malta\'s highest point at 253 m — sheer cliffs dropping to the Mediterranean, sunset spectacular",st:"The Dingli Cliffs are sheer limestone dropping to the Mediterranean at 253 m, no railing, no crowds. Bus 52 from Valletta reaches the clifftop. At sunset the views toward Filfla island are extraordinary.",im:"Time-travel: the clifftop as a lookout for the Knights of St John, watching for Ottoman ships approaching, 1600",t:"Free. Bus 52 from Valletta (45 min).",c:["parks"],r:"g",nn:"Scogliere di Dingli — Mdina & Rabat",ns:"Il punto più alto di Malta a 253 m — scogliere a picco sul Mediterraneo",nst:"Le scogliere di Dingli cadono verticali a 253 m nel Mediterraneo.",nt:"Gratis. Bus 52 da Valletta (45 min)."},
  {id:25,n:"St John\'s Co-Cathedral Exterior — Valletta",a:"Valletta",v:["architecture","beautiful","history"],d:15,s:"The grandest baroque church in the Mediterranean — the austere exterior hides the overwhelming interior",st:"St John\'s Co-Cathedral was built by the Knights of St John in 1578. The austere limestone façade gives no hint of the overwhelming baroque interior (Caravaggio\'s two masterpieces are inside). Interior costs €15 but the exterior and surrounding streets are always free.",im:"Time-travel: the Knights of St John attending Mass here in full ceremonial armour, 1600",t:"Exterior free. Interior €15. Worth the entry for the Caravaggios.",c:["architecture"],r:"g",nn:"St John\'s Co-Cathedral — Valletta",ns:"La più grande chiesa barocca del Mediterraneo — l\'esterno austero nasconde un interno travolgente",nst:"La St John\'s Co-Cathedral fu costruita dai Cavalieri di San Giovanni nel 1578.",nt:"Esterno gratuito. Interno 15 €. Vale l\'ingresso per i Caravaggio."},
  {id:26,n:"Lower Barrakka Gardens — Valletta",a:"Valletta",v:["beautiful","quiet","hidden"],d:10,s:"The quiet sibling of Upper Barrakka — a shaded terrace with the best view of the Three Cities across the water",st:"Lower Barrakka is smaller and calmer than Upper. A Neo-classical temple to Alexander Ball stands at the edge of the bastion. The view is straight across to the Three Cities. Come here to escape the Valletta crowds.",im:"Time-travel: Knights of St John watching their fleet depart from these bastion walls, 1565, the Great Siege beginning",t:"Free. Walk southeast along the bastions from Upper Barrakka.",c:["romantic_water"],r:"g",nn:"Il-Gnien tal-Barrakka t\'Isfel — Valletta",ns:"L-aħ sibling ta\' Upper Barrakka — terrazza mistrieħa bl-aħjar veduta tat-Tliet Ibliet",nst:"Il-Barrakka t\'Isfel hija iżgħar u aktar kalma. Tempju Neo-klassiku ta\' Alexander Ball jinsab fil-wieqfa tal-bastjon.",nt:"B\'xejn. Imxi lejn ix-xlokk mal-bastjuni minn Upper Barrakka."},
  {id:27,n:"Strait Street at Night — Valletta",a:"Valletta",v:["history","local","night"],d:15,s:"The street that serviced the British Royal Navy for 150 years — bars, live music, the ghost of every sailor",st:"Strait Street (Il-Strada Stretta) was Valletta\'s red-light district for the British Navy from the 1800s to 1979. Now it has bars, live jazz and the bones of the old taverns. Free to walk end to end. The neon signs are original.",im:"Time-travel: British sailors filling this narrow street on shore leave in 1942, the Malta convoys running through the siege",t:"Free to walk. Best Thu–Sat from 9pm. Buy one drink if you sit.",c:["local_only"],r:"g",nn:"Triq id-Dejqa bil-lejl — Valletta",ns:"It-triq li serviet lill-Baħrija Rjali Brittanika għal 150 sena — bari, mużika live, l-ispirtu ta\' kull baħħar",nst:"Triq id-Dejqa kienet id-distrett tal-ħajja bil-lejl ta\' Valletta għall-Baħrija Brittanika mill-1800s sal-1979.",nt:"B\'xejn timxi. L-aħjar Ħam-Sibt mis-9pm."},
  {id:28,n:"Spazju Kreattiv Free Gallery — Valletta",a:"Valletta",v:["art","local","free"],d:15,s:"Malta\'s contemporary arts centre in a 16th century fortification — free shows, locals not tourists",st:"Spazju Kreattiv is inside St James Cavalier, built by the Knights in 1566. The exhibitions change monthly and are usually free. Theatre, dance, visual art. This is where Maltese contemporary culture actually happens.",im:"Time-travel: the Knights of St John firing cannon from this cavalier in 1565 during the Ottoman Great Siege",t:"Free most exhibitions. Misraħ San Ġorġ, near the Main Gate.",c:["free_museum"],r:"g",nn:"Spazju Kreattiv — Valletta",ns:"Iċ-ċentru tal-arti kontemporanja ta\' Malta f\'fortifikazzjoni tas-seklu 16 — wirjiet b\'xejn",nst:"Spazju Kreattiv jinsab ġewwa Kavallier San Ġakbu, mibnija mill-Kavallieri fl-1566. L-esibizzjonijiet jinbidlu kull xahar.",nt:"Il-biċċa l-kbira tal-esibizzjonijiet b\'xejn. Misraħ San Ġorġ, ħdejn il-Bieb Ewlieni."},
  {id:29,n:"Is-Suq tal-Belt Food Market — Valletta",a:"Valletta",v:["local","beautiful","free"],d:15,s:"A grand Victorian iron market hall restored in 2018 — free to walk, local food, exactly where locals shop",st:"Is-Suq tal-Belt (City Market) was built in 1861, derelict for decades, and beautifully restored in 2018. Three floors of iron galleries. Local produce, pastizzi stalls, fresh fish. Free to enter and wander.",im:"Time-travel: the market\'s opening in 1861, Valletta housekeepers inspecting vegetables under the new iron roof",t:"Free to enter. St John\'s Street / Merchants Street junction. Open daily.",c:["local_only"],r:"g",nn:"Is-Suq tal-Belt — Valletta",ns:"Swieq tal-iħbula tal-1861 restawrat fl-2018 — b\'xejn tidħol, ikel lokali, fejn jixtrjaw il-lokalitajiet",nst:"Is-Suq tal-Belt inbena fl-1861 u restawrat b\'mod sabiħ fl-2018. Tliet sulari ta\' galleriji tal-ħadid.",nt:"B\'xejn tidħol. Triq San Ġwann / Triq il-Merkanti. Miftuħ kuljum."},
  {id:30,n:"Three Cities Ferry Crossing — Vittoriosa (Birgu)",a:"Vittoriosa (Birgu)",v:["beautiful","local","history"],d:20,s:"€1.50 ferry from Valletta to the Knights\' fortifications opposite — the best view of Valletta is looking back from the water",st:"The dgħajsa water taxis cross the Grand Harbour from Valletta to Birgu in minutes. The return view of Valletta from the water — the bastions, the dome of the Carmelite church, the skyline intact since 1566 — is the best view in Malta.",im:"Time-travel: the same harbour crossing made by the Knights of St John in their longboats every day, 1580",t:"€1.50 each way. Traditional water taxi from Valletta Waterfront. All day.",c:["romantic_water"],r:"g",nn:"Ferrovija tat-Tliet Ibliet — Vittoriosa (Birgu)",ns:"Dgħajsa ta\' €1.50 minn Valletta għall-fortifikazzjonijiet tal-Kavallieri — l-aħjar veduta ta\' Valletta hija meta titlef lura mill-ilma",nst:"Id-dgħajjes jaqsmu l-Port il-Kbir minn Valletta għal Birgu f\'minuti. Il-veduta tal-Valletta mill-ilma hija l-aqwa veduta f\'Malta.",nt:"€1.50 it-triq. Dgħajsa tradizzjonali mill-Waterfront ta\' Valletta."},
  {id:31,n:"Upper Barrakka Gardens — Valletta #31",a:"Valletta",v:["beautiful","high_spots","history"],d:45,s:"The finest view in Malta — Grand Harbour, the Three Cities, and tankers at anchor, all free",st:"From this 16th-century garden bastion, the Grand Harbour spreads below you. The dockyard creeks, Vittoriosa, Senglea, and the open sea beyond. Free to enter, always open. Nothing in Malta competes with this view.",im:"Time-travel: Knights of St John watching the Ottoman fleet fill the harbour in the Great Siege, 1565",t:"Free. Open daily. Cannon fired at noon — very loud.",c:["history_big"],r:"g",nn:"Upper Barrakka Gardens — Valletta #31",ns:"Il panorama più bello di Malta — il Grand Harbour, le Tre Città",nst:"Da questo bastione-giardino del XVI secolo, il Grand Harbour si apre sotto di te.",nt:"Gratis. Aperto quotidianamente. Cannone sparato a mezzogiorno."},
  {id:32,n:"Republic Street Walk — Valletta #32",a:"Valletta",v:["history","architecture","local"],d:12,s:"Valletta\'s spine — walk end to end past baroque churches, the Grand Master\'s Palace, and the sea",st:"Republic Street runs from the City Gate to Fort St Elmo, the full length of Valletta. The Grand Master\'s Palace courtyard is free entry. The street narrows and the light changes at every intersection.",im:"Time-travel: the Knights of St John processing in full ceremony along this street on feast days, 1600",t:"Free always.",c:["high_spots"],r:"g",nn:"Republic Street — Valletta #32",ns:"La spina di Valletta - percorrila da un\'estremita all\'altra",nst:"Republic Street corre dal City Gate a Fort St Elmo.",nt:"Sempre gratis."},
  {id:33,n:"Lower Barrakka Gardens — Valletta #33",a:"Valletta",v:["nature","quiet","beautiful"],d:6,s:"A quieter bastion garden at the harbour\'s edge — Doric temple memorial and sea views",st:"The Lower Barrakka is a small bastion garden at the harbour\'s edge. It has a Doric temple memorial and views toward Fort Ricasoli. Often less crowded than the Upper Barrakka, and always free.",im:"Time-travel: the original wooden lookout platform here, sentinels watching for enemy ships, 1580",t:"Free. Open daily.",c:["parks"],r:"g",nn:"Lower Barrakka Gardens — Valletta #33",ns:"Un tranquillo giardino bastionato — tempio dorico e vista sul mare",nst:"I Lower Barrakka sono un piccolo giardino bastionato sul bordo del porto.",nt:"Gratis. Aperto quotidianamente."},
  {id:34,n:"Hastings Gardens — Valletta #34",a:"Valletta",v:["nature","local","quiet"],d:52,s:"A long bastion terrace garden looking across Marsamxett Harbour — local cats and evening breeze",st:"Hastings Gardens runs along the Marsamxett side of Valletta\'s bastions. Look across the water to Sliema. Shaded benches, local cats, and evening breezes. Free at all times.",im:"Time-travel: this bastion as a key defensive position facing the mainland, sentinels on watch, 1570",t:"Free always.",c:["courtyards"],r:"g",nn:"Hastings Gardens — Valletta #34",ns:"Un lungo giardino terrazzo che guarda verso Marsamxett Harbour",nst:"Hastings Gardens corre lungo i bastioni di Valletta.",nt:"Sempre gratis."},
  {id:35,n:"Renzo Piano City Gate — Valletta #35",a:"Valletta",v:["architecture","beautiful","weird"],d:22,s:"Renzo Piano\'s 2015 city gate — a dramatic cut through the bastion, framing the Parliament",st:"The City Gate project was completed in 2015. Piano\'s design cuts dramatically through the ancient bastion. The new Parliament building faces you as you enter. Free to view and photograph from the bridge.",im:"Time-travel: the old bus terminus that occupied the Venetian moat here for 50 years, 1970",t:"Free. Always accessible.",c:["romantic_water"],r:"g",nn:"City Gate di Renzo Piano — Valletta #35",ns:"Il city gate del 2015 di Renzo Piano — un taglio drammatico nel bastione",nst:"Il progetto City Gate è stato completato nel 2015.",nt:"Gratis. Sempre accessibile."},
  {id:36,n:"Sa Maison Garden — Floriana #36",a:"Floriana",v:["nature","hidden","beautiful"],d:20,s:"A hidden garden on a promontory between both harbours — extraordinary views with no tourists",st:"Sa Maison Garden sits on a promontory between the Grand Harbour and Marsamxett. Shaded benches, palms, and views across both harbours. Reached via a short walk from Floriana. Rarely visited.",im:"Time-travel: British naval officers using this promontory for signalling to the fleet in the Grand Harbour, 1900",t:"Free. Walk from Floriana bus stop 10 min.",c:["scary"],r:"g",nn:"Sa Maison Garden — Floriana #36",ns:"Un giardino nascosto su un promontorio tra i due porti",nst:"Sa Maison Garden si trova su un promontorio tra il Grand Harbour e Marsamxett.",nt:"Gratis. 10 minuti a piedi da Floriana."},
  {id:37,n:"Floriana Granaries — Floriana #37",a:"Floriana",v:["history","architecture","weird"],d:19,s:"74 underground grain silos beneath a vast paved square — a free open space with an extraordinary secret",st:"The Floriana Granaries were built as underground food storage for a siege. The huge limestone-paved square above is now used for outdoor concerts and festivals. 74 silos beneath the stone.",im:"Time-travel: the granaries being filled with enough wheat to feed the entire population for years, 1636",t:"Free. Open space always accessible.",c:["famous_dead"],r:"g",nn:"Granai di Floriana — Floriana #37",ns:"74 silos sotterranei sotto una vasta piazza lastricata",nst:"I Granai di Floriana furono costruiti come deposito alimentare sotterraneo.",nt:"Gratis. Piazza sempre accessibile."},
  {id:38,n:"Vittoriosa Waterfront — Vittoriosa (Birgu) #38",a:"Vittoriosa (Birgu)",v:["beautiful","history","local"],d:13,s:"The marina waterfront of Birgu — superyachts and luzzu fishing boats side by side",st:"The Vittoriosa waterfront lines up superyachts and traditional luzzu boats together. Walk the quays, see the Freedom Monument, and take the harbour ferry back to Valletta for €1.50.",im:"Time-travel: the Knights of St John building their first fortifications on this small peninsula, 1530",t:"Free to walk. Ferry to Valletta €1.50 — same as a bus.",c:["street_art"],r:"g",nn:"Waterfront di Vittoriosa — Vittoriosa (Birgu) #38",ns:"Il lungofiume di Birgu — superyacht e tradizionali luzzu fianco a fianco",nst:"Il waterfront di Vittoriosa allinea superyacht e barche tradizionali luzzu.",nt:"Gratis. Traghetto per Valletta 1,50 € — stesso prezzo dell\'autobus."},
  {id:39,n:"Birgu Alleyways — Vittoriosa (Birgu) #39",a:"Vittoriosa (Birgu)",v:["history","hidden","architecture"],d:52,s:"Medieval alleyways predating Valletta by centuries — narrower, older, and far less visited",st:"Birgu\'s medieval alley grid predates Valletta by centuries. The narrow streets, colourful balconies, and hidden chapels are free to wander. Narrower than Valletta, and far less touristed.",im:"Time-travel: the Knights of St John establishing their first Maltese base in these very streets, 1530",t:"Free always.",c:["abandoned"],r:"g",nn:"Vicoli di Birgu — Vittoriosa (Birgu) #39",ns:"Vicoli medievali precedenti Valletta di secoli — più stretti, più antichi",nst:"I vicoli medievali di Birgu precedono Valletta di secoli.",nt:"Sempre gratis."},
  {id:40,n:"Grand Harbour Ferry — Vittoriosa (Birgu) #40",a:"Vittoriosa (Birgu)",v:["local","beautiful","weird"],d:11,s:"Cross Grand Harbour by ferry for €1.50 — same price as a bus, the most beautiful commute in Europe",st:"The traditional ferry crosses Grand Harbour between Valletta and the Three Cities waterfront for €1.50 each way. A beautiful five-minute harbour crossing past the superyacht marina.",im:"Time-travel: the original dghajsa (water taxi) as the only transport between the peninsula cities, 1800",t:"€1.50 each way. Runs all day. Valletta landing at the Lower Barrakka foot.",c:["free_museum"],r:"g",nn:"Traghetto Grand Harbour — Vittoriosa (Birgu) #40",ns:"Attraversa il Grand Harbour in traghetto per 1,50 € — stesso prezzo dell\'autobus",nst:"Il traghetto tradizionale attraversa il Grand Harbour per 1,50 € a tratta.",nt:"1,50 € a tratta. Tutto il giorno."},
  {id:41,n:"Gardjola Gardens — Senglea #41",a:"Senglea",v:["beautiful","high_spots","hidden"],d:48,s:"At the tip of Senglea\'s peninsula — the most intimate Grand Harbour view of all",st:"The Gardjola Gardens are at the very tip of Senglea\'s peninsula. The carved watchtower eye symbol is iconic. You can almost touch the superyachts. Locals bring children here on Sundays.",im:"Time-travel: the watchtower sentinel scanning the harbour for enemy vessels, looking in every direction at once, 1580",t:"Free. Walk from the ferry landing along the peninsula tip. 15 min.",c:["local_only"],r:"g",nn:"Gardjola Gardens — Senglea #41",ns:"In punta alla penisola di Senglea — la vista più intima del Grand Harbour",nst:"I Gardjola Gardens si trovano all\'estrema punta della penisola di Senglea.",nt:"Gratis. 15 min a piedi dall\'attracco del traghetto."},
  {id:42,n:"Senglea Village Walk — Senglea #42",a:"Senglea",v:["local","hidden","history"],d:52,s:"The most authentically Maltese of the Three Cities — quiet streets, fishing nets, zero tourists",st:"Senglea (L-Isla) remains the most authentically Maltese of the Three Cities. Quiet streets, tiny chapels, working fishing nets, and virtually no tourists. Walk from the ferry landing to the Gardjola tip and back.",im:"Time-travel: the Three Cities as Malta\'s equivalent of Venice — a labyrinth of peninsulas, 1600",t:"Free. 5-min ferry from Vittoriosa.",c:["architecture"],r:"g",nn:"Passeggiata a Senglea — Senglea #42",ns:"La più autenticamente maltese delle Tre Città — strade tranquille, reti da pesca",nst:"Senglea (L-Isla) rimane la più autenticamente maltese delle Tre Città.",nt:"Gratis. Traghetto 5 min da Vittoriosa."},
  {id:43,n:"Mdina Silent City Walk — Mdina & Rabat #43",a:"Mdina & Rabat",v:["history","beautiful","quiet"],d:39,s:"The medieval walled capital — walk the Silent City at dusk for a panorama across the whole island",st:"Mdina is called the Silent City. Walk the limestone streets, the cathedral square (free), and the Bastion Square viewpoint at dusk for a panorama across Malta. No cars, almost no noise. Entry is free.",im:"Time-travel: the Arab emirate of Malta governing this entire island from within these walls, 900 AD",t:"Free to enter. Walk from bus stop (Rabat, 3 min). Best at dusk.",c:["history_big"],r:"g",nn:"Mdina, la Città Silenziosa — Mdina & Rabat #43",ns:"La capitale medievale murata — percorrila al tramonto per un panorama sull\'isola",nst:"Mdina è chiamata la Città Silenziosa. Le strade di calcare, la piazza della cattedrale.",nt:"Gratis. Bus da Valletta (40 min). Meglio al tramonto."},
  {id:44,n:"Mdina Bastion Viewpoint — Mdina & Rabat #44",a:"Mdina & Rabat",v:["beautiful","high_spots","nature"],d:10,s:"360° view across nearly the whole island — Valletta, the harbours, Dingli, and the sea",st:"The bastions of Mdina offer a 360° view across nearly the whole island: Valletta and its harbours to the east, Dingli cliffs to the west, and the rural centre in every direction. Most dramatic at sunset.",im:"Time-travel: the medieval city of Mdina visible from ships far out at sea, a beacon for returning sailors, 1400",t:"Free. Always accessible. The main bastion is Bastion Square.",c:["high_spots"],r:"g",nn:"Bastioni di Mdina — Mdina & Rabat #44",ns:"Vista a 360° su quasi tutta l\'isola — Valletta, i porti, Dingli e il mare",nst:"I bastioni di Mdina offrono una vista a 360°.",nt:"Gratis. Sempre accessibile."},
  {id:45,n:"Rabat Town Walk — Mdina & Rabat #45",a:"Mdina & Rabat",v:["local","history","hidden"],d:42,s:"The town just outside Mdina\'s walls — excellent churches, local market, ancient catacombs",st:"Rabat sits just outside Mdina\'s walls and is far less visited. The town has excellent parish churches, a local market on weekday mornings, and the St Agatha catacombs (small entry fee). Walk freely above ground.",im:"Time-travel: Rabat as the suburb of Roman Melita, the Roman town sprawling outside the city walls, 200 AD",t:"Free to walk. Catacombs have small entry fee.",c:["parks"],r:"g",nn:"Rabat — Mdina & Rabat #45",ns:"La città appena fuori le mura di Mdina — chiese, mercato locale, catacombe",nst:"Rabat si trova appena fuori dalle mura di Mdina.",nt:"Gratis a piedi. Catacombe con piccolo biglietto."},
  {id:46,n:"Marsaxlokk Sunday Fish Market — Marsaxlokk #46",a:"Marsaxlokk",v:["local","free","beautiful"],d:32,s:"Every Sunday morning — Malta\'s main fishing village, colourful luzzu boats, famous waterfront market",st:"Every Sunday morning, Marsaxlokk holds a famous waterfront market. Colourful luzzu fishing boats fill the harbour behind the stalls. Free to browse; fresh fish and pastizzi at the stalls. Very local.",im:"Time-travel: Marsaxlokk as Malta\'s main fishing harbour before the tourist age, the whole village smelling of fish, 1950",t:"Free. Bus 119 from Valletta (45 min). Sunday mornings only.",c:["courtyards"],r:"g",nn:"Mercato del pesce di domenica — Marsaxlokk #46",ns:"Ogni domenica mattina — il principale villaggio di pescatori di Malta",nst:"Ogni domenica mattina, Marsaxlokk tiene un famoso mercato sul lungomare.",nt:"Gratis. Bus 119 da Valletta (45 min). Solo domenica mattina."},
  {id:47,n:"Pretty Bay — Marsaxlokk #47",a:"Marsaxlokk",v:["nature","local","free"],d:7,s:"Malta\'s most accessible sandy beach — free swimming, promenade, and distant industrial views",st:"Pretty Bay in Birzebbuga is a wide bay of sandy beach. The power station is visible in the distance — which keeps it from the tourist crowds. Free swimming and a pleasant promenade for sunset walks.",im:"Time-travel: this bay as an empty fishing cove before the industrialisation of the south, 1950",t:"Free. Bus 119 from Valletta.",c:["romantic_water"],r:"g",nn:"Pretty Bay — Marsaxlokk #47",ns:"La spiaggia sabbiosa più accessibile di Malta — nuoto gratuito",nst:"Pretty Bay è una vasta baia di spiaggia sabbiosa.",nt:"Gratis. Bus 119 da Valletta."},
  {id:48,n:"Cottonera Lines Walk — Cottonera Lines #48",a:"Cottonera Lines",v:["history","hidden","local"],d:6,s:"Five kilometres of 17th-century ramparts enclosing the Three Cities — rarely visited, always free",st:"The Cottonera Lines are a vast fortification ring enclosing the Three Cities, five kilometres long. Walk the grassy ramparts for views across the inner harbour and into the dockyard. Free, quiet, and rarely visited.",im:"Time-travel: engineers calculating the geometry of these bastions to provide interlocking fields of fire, 1670",t:"Free. Access from multiple points around Cospicua.",c:["scary"],r:"g",nn:"Cottonera Lines — Cottonera Lines #48",ns:"Cinque chilometri di bastioni del XVII secolo — raramente visitati, sempre gratuiti",nst:"Le Cottonera Lines sono un vasto anello di fortifications lungo cinque chilometri.",nt:"Gratis. Accesso da più punti intorno a Cospicua."},
  {id:49,n:"Cospicua Waterfront — Cottonera Lines #49",a:"Cottonera Lines",v:["local","hidden","weird"],d:10,s:"The third of the Three Cities — tourist-free waterfront with views of the working dockyard",st:"Cospicua (Bormla) is almost entirely free of tourists. Its waterfront overlooks the working dockyard where Malta\'s maritime industry survives. Sit at a local café and watch the tugs and ferries.",im:"Time-travel: the dockyard in full wartime production, hundreds of workers building and repairing ships, 1942",t:"Free to walk. 5-min walk from Vittoriosa.",c:["famous_dead"],r:"g",nn:"Cospicua Waterfront — Cottonera Lines #49",ns:"La terza delle Tre Città — lungomare senza turisti con vista sul cantiere navale",nst:"Cospicua (Bormla) è quasi del tutto priva di turisti.",nt:"Gratis a piedi. 5 min da Vittoriosa."},
  {id:50,n:"Gozo Ferry from Cirkewwa — Gozo #50",a:"Gozo",v:["local","nature","beautiful"],d:18,s:"Ferry to Gozo for €4.65 return — quieter, greener, and completely different from Malta",st:"The Gozo Channel ferry crosses in 25 minutes from Cirkewwa (north Malta). Gozo is quieter, greener, and the limestone villages feel entirely different. The island rewards a full day trip.",im:"Time-travel: the first regular ferry service to Gozo, islanders bringing their produce to sell in Valletta, 1870",t:"€4.65 return. Bus from Valletta to Cirkewwa 1 hour. Ferry every 45 min.",c:["street_art"],r:"g",nn:"Traghetto per Gozo — Gozo #50",ns:"Traghetto per Gozo per 4,65 € A/R — più tranquilla, più verde e completamente diversa",nst:"Il traghetto Gozo Channel impega 25 minuti da Cirkewwa.",nt:"4,65 € A/R. Bus da Valletta 1 ora."},
  {id:51,n:"Gozo Citadel Victoria — Gozo #51",a:"Gozo",v:["history","beautiful","high_spots"],d:19,s:"The medieval citadel of Victoria — free to enter and walk the bastions, extraordinary island views",st:"The citadel of Victoria (Il-Belt) sits atop Gozo\'s central hill. Free to enter and walk the bastions — the views across the whole island are extraordinary. The cathedral interior is also free.",im:"Time-travel: the entire population of Gozo taking refuge inside this citadel during an Ottoman raid, 1551",t:"Free. Bus from Cirkewwa ferry to Victoria.",c:["abandoned"],r:"g",nn:"Cittadella di Victoria — Gozo #51",ns:"La cittadella medievale di Victoria — gratuita, vista straordinaria sull\'isola",nst:"La Cittadella di Victoria si trova sulla collina centrale di Gozo.",nt:"Gratis. Bus dal traghetto di Cirkewwa a Victoria."},
  {id:52,n:"Ramla Bay Gozo — Gozo #52",a:"Gozo",v:["nature","beautiful","local"],d:37,s:"Malta\'s finest sandy beach — wide bay of reddish sand, Roman villa ruins, and far fewer crowds",st:"Ramla Bay is a wide bay of reddish sand backed by ancient fields and the ruins of a Roman villa. Bus-accessible, free swimming. Far less crowded than beaches near Valletta.",im:"Time-travel: the Roman summer villa at this bay, a wealthy family arriving by boat for the season, 100 AD",t:"Free. Bus from Victoria to Ramla.",c:["free_museum"],r:"g",nn:"Ramla Bay Gozo — Gozo #52",ns:"La spiaggia sabbiosa più bella di Malta — ampia baia di sabbia rossastra",nst:"Ramla Bay è una vasta baia di sabbia rossastra con rovine di una villa romana.",nt:"Gratis. Bus da Victoria a Ramla."},
  {id:53,n:"Fort St Elmo Exterior — Valletta #53",a:"Valletta",v:["history","architecture","beautiful"],d:43,s:"The star fort at Valletta\'s tip that held against the Great Siege of 1565",st:"Fort St Elmo held for 31 days against the full Ottoman force in 1565, buying time for the relief force. The War Museum inside charges entry but the exterior fortifications and sea-facing gun platforms are freely accessible.",im:"Time-travel: the garrison of Fort St Elmo holding out against 40,000 Ottoman soldiers, until the last man, 1565",t:"Exterior/gun platforms free. Interior charges.",c:["local_only"],r:"g",nn:"Fort St Elmo — Valletta #53",ns:"Il forte a punta di Valletta che resistette all\'Assedio del 1565",nst:"Fort St Elmo resistette per 31 giorni contro le forze ottomane nel 1565.",nt:"Esterno gratuito. Interno a pagamento."},
  {id:54,n:"Dingli Cliffs Walk — Mdina & Rabat #54",a:"Mdina & Rabat",v:["nature","beautiful","high_spots"],d:6,s:"Malta\'s highest point at 253 m — sheer cliffs dropping to the Mediterranean, sunset spectacular",st:"The Dingli Cliffs are sheer limestone dropping to the Mediterranean at 253 m, no railing, no crowds. Bus 52 from Valletta reaches the clifftop. At sunset the views toward Filfla island are extraordinary.",im:"Time-travel: the clifftop as a lookout for the Knights of St John, watching for Ottoman ships approaching, 1600",t:"Free. Bus 52 from Valletta (45 min).",c:["architecture"],r:"g",nn:"Scogliere di Dingli — Mdina & Rabat #54",ns:"Il punto più alto di Malta a 253 m — scogliere a picco sul Mediterraneo",nst:"Le scogliere di Dingli cadono verticali a 253 m nel Mediterraneo.",nt:"Gratis. Bus 52 da Valletta (45 min)."},
  {id:55,n:"St John\'s Co-Cathedral Exterior — Valletta #55",a:"Valletta",v:["architecture","beautiful","history"],d:40,s:"The grandest baroque church in the Mediterranean — the austere exterior hides the overwhelming interior",st:"St John\'s Co-Cathedral was built by the Knights of St John in 1578. The austere limestone façade gives no hint of the overwhelming baroque interior (Caravaggio\'s two masterpieces are inside). Interior costs €15 but the exterior and surrounding streets are always free.",im:"Time-travel: the Knights of St John attending Mass here in full ceremonial armour, 1600",t:"Exterior free. Interior €15. Worth the entry for the Caravaggios.",c:["history_big"],r:"g",nn:"St John\'s Co-Cathedral — Valletta #55",ns:"La più grande chiesa barocca del Mediterraneo — l\'esterno austero nasconde un interno travolgente",nst:"La St John\'s Co-Cathedral fu costruita dai Cavalieri di San Giovanni nel 1578.",nt:"Esterno gratuito. Interno 15 €. Vale l\'ingresso per i Caravaggio."},
  {id:56,n:"Lower Barrakka Gardens — Valletta #56",a:"Valletta",v:["beautiful","quiet","hidden"],d:17,s:"The quiet sibling of Upper Barrakka — a shaded terrace with the best view of the Three Cities across the water",st:"Lower Barrakka is smaller and calmer than Upper. A Neo-classical temple to Alexander Ball stands at the edge of the bastion. The view is straight across to the Three Cities. Come here to escape the Valletta crowds.",im:"Time-travel: Knights of St John watching their fleet depart from these bastion walls, 1565, the Great Siege beginning",t:"Free. Walk southeast along the bastions from Upper Barrakka.",c:["high_spots"],r:"g",nn:"Il-Gnien tal-Barrakka t\'Isfel — Valletta #56",ns:"L-aħ sibling ta\' Upper Barrakka — terrazza mistrieħa bl-aħjar veduta tat-Tliet Ibliet",nst:"Il-Barrakka t\'Isfel hija iżgħar u aktar kalma. Tempju Neo-klassiku ta\' Alexander Ball jinsab fil-wieqfa tal-bastjon.",nt:"B\'xejn. Imxi lejn ix-xlokk mal-bastjuni minn Upper Barrakka."},
  {id:57,n:"Strait Street at Night — Valletta #57",a:"Valletta",v:["history","local","night"],d:50,s:"The street that serviced the British Royal Navy for 150 years — bars, live music, the ghost of every sailor",st:"Strait Street (Il-Strada Stretta) was Valletta\'s red-light district for the British Navy from the 1800s to 1979. Now it has bars, live jazz and the bones of the old taverns. Free to walk end to end. The neon signs are original.",im:"Time-travel: British sailors filling this narrow street on shore leave in 1942, the Malta convoys running through the siege",t:"Free to walk. Best Thu–Sat from 9pm. Buy one drink if you sit.",c:["parks"],r:"g",nn:"Triq id-Dejqa bil-lejl — Valletta #57",ns:"It-triq li serviet lill-Baħrija Rjali Brittanika għal 150 sena — bari, mużika live, l-ispirtu ta\' kull baħħar",nst:"Triq id-Dejqa kienet id-distrett tal-ħajja bil-lejl ta\' Valletta għall-Baħrija Brittanika mill-1800s sal-1979.",nt:"B\'xejn timxi. L-aħjar Ħam-Sibt mis-9pm."},
  {id:58,n:"Spazju Kreattiv Free Gallery — Valletta #58",a:"Valletta",v:["art","local","free"],d:46,s:"Malta\'s contemporary arts centre in a 16th century fortification — free shows, locals not tourists",st:"Spazju Kreattiv is inside St James Cavalier, built by the Knights in 1566. The exhibitions change monthly and are usually free. Theatre, dance, visual art. This is where Maltese contemporary culture actually happens.",im:"Time-travel: the Knights of St John firing cannon from this cavalier in 1565 during the Ottoman Great Siege",t:"Free most exhibitions. Misraħ San Ġorġ, near the Main Gate.",c:["courtyards"],r:"g",nn:"Spazju Kreattiv — Valletta #58",ns:"Iċ-ċentru tal-arti kontemporanja ta\' Malta f\'fortifikazzjoni tas-seklu 16 — wirjiet b\'xejn",nst:"Spazju Kreattiv jinsab ġewwa Kavallier San Ġakbu, mibnija mill-Kavallieri fl-1566. L-esibizzjonijiet jinbidlu kull xahar.",nt:"Il-biċċa l-kbira tal-esibizzjonijiet b\'xejn. Misraħ San Ġorġ, ħdejn il-Bieb Ewlieni."},
  {id:59,n:"Is-Suq tal-Belt Food Market — Valletta #59",a:"Valletta",v:["local","beautiful","free"],d:49,s:"A grand Victorian iron market hall restored in 2018 — free to walk, local food, exactly where locals shop",st:"Is-Suq tal-Belt (City Market) was built in 1861, derelict for decades, and beautifully restored in 2018. Three floors of iron galleries. Local produce, pastizzi stalls, fresh fish. Free to enter and wander.",im:"Time-travel: the market\'s opening in 1861, Valletta housekeepers inspecting vegetables under the new iron roof",t:"Free to enter. St John\'s Street / Merchants Street junction. Open daily.",c:["romantic_water"],r:"g",nn:"Is-Suq tal-Belt — Valletta #59",ns:"Swieq tal-iħbula tal-1861 restawrat fl-2018 — b\'xejn tidħol, ikel lokali, fejn jixtrjaw il-lokalitajiet",nst:"Is-Suq tal-Belt inbena fl-1861 u restawrat b\'mod sabiħ fl-2018. Tliet sulari ta\' galleriji tal-ħadid.",nt:"B\'xejn tidħol. Triq San Ġwann / Triq il-Merkanti. Miftuħ kuljum."},
  {id:60,n:"Three Cities Ferry Crossing — Vittoriosa (Birgu) #60",a:"Vittoriosa (Birgu)",v:["beautiful","local","history"],d:39,s:"€1.50 ferry from Valletta to the Knights\' fortifications opposite — the best view of Valletta is looking back from the water",st:"The dgħajsa water taxis cross the Grand Harbour from Valletta to Birgu in minutes. The return view of Valletta from the water — the bastions, the dome of the Carmelite church, the skyline intact since 1566 — is the best view in Malta.",im:"Time-travel: the same harbour crossing made by the Knights of St John in their longboats every day, 1580",t:"€1.50 each way. Traditional water taxi from Valletta Waterfront. All day.",c:["scary"],r:"g",nn:"Ferrovija tat-Tliet Ibliet — Vittoriosa (Birgu) #60",ns:"Dgħajsa ta\' €1.50 minn Valletta għall-fortifikazzjonijiet tal-Kavallieri — l-aħjar veduta ta\' Valletta hija meta titlef lura mill-ilma",nst:"Id-dgħajjes jaqsmu l-Port il-Kbir minn Valletta għal Birgu f\'minuti. Il-veduta tal-Valletta mill-ilma hija l-aqwa veduta f\'Malta.",nt:"€1.50 it-triq. Dgħajsa tradizzjonali mill-Waterfront ta\' Valletta."},
  {id:61,n:"Upper Barrakka Gardens — Valletta #61",a:"Valletta",v:["beautiful","high_spots","history"],d:31,s:"The finest view in Malta — Grand Harbour, the Three Cities, and tankers at anchor, all free",st:"From this 16th-century garden bastion, the Grand Harbour spreads below you. The dockyard creeks, Vittoriosa, Senglea, and the open sea beyond. Free to enter, always open. Nothing in Malta competes with this view.",im:"Time-travel: Knights of St John watching the Ottoman fleet fill the harbour in the Great Siege, 1565",t:"Free. Open daily. Cannon fired at noon — very loud.",c:["famous_dead"],r:"g",nn:"Upper Barrakka Gardens — Valletta #61",ns:"Il panorama più bello di Malta — il Grand Harbour, le Tre Città",nst:"Da questo bastione-giardino del XVI secolo, il Grand Harbour si apre sotto di te.",nt:"Gratis. Aperto quotidianamente. Cannone sparato a mezzogiorno."},
  {id:62,n:"Republic Street Walk — Valletta #62",a:"Valletta",v:["history","architecture","local"],d:19,s:"Valletta\'s spine — walk end to end past baroque churches, the Grand Master\'s Palace, and the sea",st:"Republic Street runs from the City Gate to Fort St Elmo, the full length of Valletta. The Grand Master\'s Palace courtyard is free entry. The street narrows and the light changes at every intersection.",im:"Time-travel: the Knights of St John processing in full ceremony along this street on feast days, 1600",t:"Free always.",c:["street_art"],r:"g",nn:"Republic Street — Valletta #62",ns:"La spina di Valletta - percorrila da un\'estremita all\'altra",nst:"Republic Street corre dal City Gate a Fort St Elmo.",nt:"Sempre gratis."},
  {id:63,n:"Lower Barrakka Gardens — Valletta #63",a:"Valletta",v:["nature","quiet","beautiful"],d:33,s:"A quieter bastion garden at the harbour\'s edge — Doric temple memorial and sea views",st:"The Lower Barrakka is a small bastion garden at the harbour\'s edge. It has a Doric temple memorial and views toward Fort Ricasoli. Often less crowded than the Upper Barrakka, and always free.",im:"Time-travel: the original wooden lookout platform here, sentinels watching for enemy ships, 1580",t:"Free. Open daily.",c:["abandoned"],r:"g",nn:"Lower Barrakka Gardens — Valletta #63",ns:"Un tranquillo giardino bastionato — tempio dorico e vista sul mare",nst:"I Lower Barrakka sono un piccolo giardino bastionato sul bordo del porto.",nt:"Gratis. Aperto quotidianamente."},
  {id:64,n:"Hastings Gardens — Valletta #64",a:"Valletta",v:["nature","local","quiet"],d:42,s:"A long bastion terrace garden looking across Marsamxett Harbour — local cats and evening breeze",st:"Hastings Gardens runs along the Marsamxett side of Valletta\'s bastions. Look across the water to Sliema. Shaded benches, local cats, and evening breezes. Free at all times.",im:"Time-travel: this bastion as a key defensive position facing the mainland, sentinels on watch, 1570",t:"Free always.",c:["free_museum"],r:"g",nn:"Hastings Gardens — Valletta #64",ns:"Un lungo giardino terrazzo che guarda verso Marsamxett Harbour",nst:"Hastings Gardens corre lungo i bastioni di Valletta.",nt:"Sempre gratis."},
  {id:65,n:"Renzo Piano City Gate — Valletta #65",a:"Valletta",v:["architecture","beautiful","weird"],d:22,s:"Renzo Piano\'s 2015 city gate — a dramatic cut through the bastion, framing the Parliament",st:"The City Gate project was completed in 2015. Piano\'s design cuts dramatically through the ancient bastion. The new Parliament building faces you as you enter. Free to view and photograph from the bridge.",im:"Time-travel: the old bus terminus that occupied the Venetian moat here for 50 years, 1970",t:"Free. Always accessible.",c:["local_only"],r:"g",nn:"City Gate di Renzo Piano — Valletta #65",ns:"Il city gate del 2015 di Renzo Piano — un taglio drammatico nel bastione",nst:"Il progetto City Gate è stato completato nel 2015.",nt:"Gratis. Sempre accessibile."},
  {id:66,n:"Sa Maison Garden — Floriana #66",a:"Floriana",v:["nature","hidden","beautiful"],d:5,s:"A hidden garden on a promontory between both harbours — extraordinary views with no tourists",st:"Sa Maison Garden sits on a promontory between the Grand Harbour and Marsamxett. Shaded benches, palms, and views across both harbours. Reached via a short walk from Floriana. Rarely visited.",im:"Time-travel: British naval officers using this promontory for signalling to the fleet in the Grand Harbour, 1900",t:"Free. Walk from Floriana bus stop 10 min.",c:["architecture"],r:"g",nn:"Sa Maison Garden — Floriana #66",ns:"Un giardino nascosto su un promontorio tra i due porti",nst:"Sa Maison Garden si trova su un promontorio tra il Grand Harbour e Marsamxett.",nt:"Gratis. 10 minuti a piedi da Floriana."},
  {id:67,n:"Floriana Granaries — Floriana #67",a:"Floriana",v:["history","architecture","weird"],d:53,s:"74 underground grain silos beneath a vast paved square — a free open space with an extraordinary secret",st:"The Floriana Granaries were built as underground food storage for a siege. The huge limestone-paved square above is now used for outdoor concerts and festivals. 74 silos beneath the stone.",im:"Time-travel: the granaries being filled with enough wheat to feed the entire population for years, 1636",t:"Free. Open space always accessible.",c:["history_big"],r:"g",nn:"Granai di Floriana — Floriana #67",ns:"74 silos sotterranei sotto una vasta piazza lastricata",nst:"I Granai di Floriana furono costruiti come deposito alimentare sotterraneo.",nt:"Gratis. Piazza sempre accessibile."},
  {id:68,n:"Vittoriosa Waterfront — Vittoriosa (Birgu) #68",a:"Vittoriosa (Birgu)",v:["beautiful","history","local"],d:15,s:"The marina waterfront of Birgu — superyachts and luzzu fishing boats side by side",st:"The Vittoriosa waterfront lines up superyachts and traditional luzzu boats together. Walk the quays, see the Freedom Monument, and take the harbour ferry back to Valletta for €1.50.",im:"Time-travel: the Knights of St John building their first fortifications on this small peninsula, 1530",t:"Free to walk. Ferry to Valletta €1.50 — same as a bus.",c:["high_spots"],r:"g",nn:"Waterfront di Vittoriosa — Vittoriosa (Birgu) #68",ns:"Il lungofiume di Birgu — superyacht e tradizionali luzzu fianco a fianco",nst:"Il waterfront di Vittoriosa allinea superyacht e barche tradizionali luzzu.",nt:"Gratis. Traghetto per Valletta 1,50 € — stesso prezzo dell\'autobus."},
  {id:69,n:"Birgu Alleyways — Vittoriosa (Birgu) #69",a:"Vittoriosa (Birgu)",v:["history","hidden","architecture"],d:49,s:"Medieval alleyways predating Valletta by centuries — narrower, older, and far less visited",st:"Birgu\'s medieval alley grid predates Valletta by centuries. The narrow streets, colourful balconies, and hidden chapels are free to wander. Narrower than Valletta, and far less touristed.",im:"Time-travel: the Knights of St John establishing their first Maltese base in these very streets, 1530",t:"Free always.",c:["parks"],r:"g",nn:"Vicoli di Birgu — Vittoriosa (Birgu) #69",ns:"Vicoli medievali precedenti Valletta di secoli — più stretti, più antichi",nst:"I vicoli medievali di Birgu precedono Valletta di secoli.",nt:"Sempre gratis."},
  {id:70,n:"Grand Harbour Ferry — Vittoriosa (Birgu) #70",a:"Vittoriosa (Birgu)",v:["local","beautiful","weird"],d:32,s:"Cross Grand Harbour by ferry for €1.50 — same price as a bus, the most beautiful commute in Europe",st:"The traditional ferry crosses Grand Harbour between Valletta and the Three Cities waterfront for €1.50 each way. A beautiful five-minute harbour crossing past the superyacht marina.",im:"Time-travel: the original dghajsa (water taxi) as the only transport between the peninsula cities, 1800",t:"€1.50 each way. Runs all day. Valletta landing at the Lower Barrakka foot.",c:["courtyards"],r:"g",nn:"Traghetto Grand Harbour — Vittoriosa (Birgu) #70",ns:"Attraversa il Grand Harbour in traghetto per 1,50 € — stesso prezzo dell\'autobus",nst:"Il traghetto tradizionale attraversa il Grand Harbour per 1,50 € a tratta.",nt:"1,50 € a tratta. Tutto il giorno."},
  {id:71,n:"Gardjola Gardens — Senglea #71",a:"Senglea",v:["beautiful","high_spots","hidden"],d:26,s:"At the tip of Senglea\'s peninsula — the most intimate Grand Harbour view of all",st:"The Gardjola Gardens are at the very tip of Senglea\'s peninsula. The carved watchtower eye symbol is iconic. You can almost touch the superyachts. Locals bring children here on Sundays.",im:"Time-travel: the watchtower sentinel scanning the harbour for enemy vessels, looking in every direction at once, 1580",t:"Free. Walk from the ferry landing along the peninsula tip. 15 min.",c:["romantic_water"],r:"g",nn:"Gardjola Gardens — Senglea #71",ns:"In punta alla penisola di Senglea — la vista più intima del Grand Harbour",nst:"I Gardjola Gardens si trovano all\'estrema punta della penisola di Senglea.",nt:"Gratis. 15 min a piedi dall\'attracco del traghetto."},
  {id:72,n:"Senglea Village Walk — Senglea #72",a:"Senglea",v:["local","hidden","history"],d:22,s:"The most authentically Maltese of the Three Cities — quiet streets, fishing nets, zero tourists",st:"Senglea (L-Isla) remains the most authentically Maltese of the Three Cities. Quiet streets, tiny chapels, working fishing nets, and virtually no tourists. Walk from the ferry landing to the Gardjola tip and back.",im:"Time-travel: the Three Cities as Malta\'s equivalent of Venice — a labyrinth of peninsulas, 1600",t:"Free. 5-min ferry from Vittoriosa.",c:["scary"],r:"g",nn:"Passeggiata a Senglea — Senglea #72",ns:"La più autenticamente maltese delle Tre Città — strade tranquille, reti da pesca",nst:"Senglea (L-Isla) rimane la più autenticamente maltese delle Tre Città.",nt:"Gratis. Traghetto 5 min da Vittoriosa."},
  {id:73,n:"Mdina Silent City Walk — Mdina & Rabat #73",a:"Mdina & Rabat",v:["history","beautiful","quiet"],d:14,s:"The medieval walled capital — walk the Silent City at dusk for a panorama across the whole island",st:"Mdina is called the Silent City. Walk the limestone streets, the cathedral square (free), and the Bastion Square viewpoint at dusk for a panorama across Malta. No cars, almost no noise. Entry is free.",im:"Time-travel: the Arab emirate of Malta governing this entire island from within these walls, 900 AD",t:"Free to enter. Walk from bus stop (Rabat, 3 min). Best at dusk.",c:["famous_dead"],r:"g",nn:"Mdina, la Città Silenziosa — Mdina & Rabat #73",ns:"La capitale medievale murata — percorrila al tramonto per un panorama sull\'isola",nst:"Mdina è chiamata la Città Silenziosa. Le strade di calcare, la piazza della cattedrale.",nt:"Gratis. Bus da Valletta (40 min). Meglio al tramonto."},
  {id:74,n:"Mdina Bastion Viewpoint — Mdina & Rabat #74",a:"Mdina & Rabat",v:["beautiful","high_spots","nature"],d:18,s:"360° view across nearly the whole island — Valletta, the harbours, Dingli, and the sea",st:"The bastions of Mdina offer a 360° view across nearly the whole island: Valletta and its harbours to the east, Dingli cliffs to the west, and the rural centre in every direction. Most dramatic at sunset.",im:"Time-travel: the medieval city of Mdina visible from ships far out at sea, a beacon for returning sailors, 1400",t:"Free. Always accessible. The main bastion is Bastion Square.",c:["street_art"],r:"g",nn:"Bastioni di Mdina — Mdina & Rabat #74",ns:"Vista a 360° su quasi tutta l\'isola — Valletta, i porti, Dingli e il mare",nst:"I bastioni di Mdina offrono una vista a 360°.",nt:"Gratis. Sempre accessibile."},
  {id:75,n:"Rabat Town Walk — Mdina & Rabat #75",a:"Mdina & Rabat",v:["local","history","hidden"],d:53,s:"The town just outside Mdina\'s walls — excellent churches, local market, ancient catacombs",st:"Rabat sits just outside Mdina\'s walls and is far less visited. The town has excellent parish churches, a local market on weekday mornings, and the St Agatha catacombs (small entry fee). Walk freely above ground.",im:"Time-travel: Rabat as the suburb of Roman Melita, the Roman town sprawling outside the city walls, 200 AD",t:"Free to walk. Catacombs have small entry fee.",c:["abandoned"],r:"g",nn:"Rabat — Mdina & Rabat #75",ns:"La città appena fuori le mura di Mdina — chiese, mercato locale, catacombe",nst:"Rabat si trova appena fuori dalle mura di Mdina.",nt:"Gratis a piedi. Catacombe con piccolo biglietto."},
  {id:76,n:"Marsaxlokk Sunday Fish Market — Marsaxlokk #76",a:"Marsaxlokk",v:["local","free","beautiful"],d:26,s:"Every Sunday morning — Malta\'s main fishing village, colourful luzzu boats, famous waterfront market",st:"Every Sunday morning, Marsaxlokk holds a famous waterfront market. Colourful luzzu fishing boats fill the harbour behind the stalls. Free to browse; fresh fish and pastizzi at the stalls. Very local.",im:"Time-travel: Marsaxlokk as Malta\'s main fishing harbour before the tourist age, the whole village smelling of fish, 1950",t:"Free. Bus 119 from Valletta (45 min). Sunday mornings only.",c:["free_museum"],r:"g",nn:"Mercato del pesce di domenica — Marsaxlokk #76",ns:"Ogni domenica mattina — il principale villaggio di pescatori di Malta",nst:"Ogni domenica mattina, Marsaxlokk tiene un famoso mercato sul lungomare.",nt:"Gratis. Bus 119 da Valletta (45 min). Solo domenica mattina."},
  {id:77,n:"Pretty Bay — Marsaxlokk #77",a:"Marsaxlokk",v:["nature","local","free"],d:11,s:"Malta\'s most accessible sandy beach — free swimming, promenade, and distant industrial views",st:"Pretty Bay in Birzebbuga is a wide bay of sandy beach. The power station is visible in the distance — which keeps it from the tourist crowds. Free swimming and a pleasant promenade for sunset walks.",im:"Time-travel: this bay as an empty fishing cove before the industrialisation of the south, 1950",t:"Free. Bus 119 from Valletta.",c:["local_only"],r:"g",nn:"Pretty Bay — Marsaxlokk #77",ns:"La spiaggia sabbiosa più accessibile di Malta — nuoto gratuito",nst:"Pretty Bay è una vasta baia di spiaggia sabbiosa.",nt:"Gratis. Bus 119 da Valletta."},
  {id:78,n:"Cottonera Lines Walk — Cottonera Lines #78",a:"Cottonera Lines",v:["history","hidden","local"],d:10,s:"Five kilometres of 17th-century ramparts enclosing the Three Cities — rarely visited, always free",st:"The Cottonera Lines are a vast fortification ring enclosing the Three Cities, five kilometres long. Walk the grassy ramparts for views across the inner harbour and into the dockyard. Free, quiet, and rarely visited.",im:"Time-travel: engineers calculating the geometry of these bastions to provide interlocking fields of fire, 1670",t:"Free. Access from multiple points around Cospicua.",c:["architecture"],r:"g",nn:"Cottonera Lines — Cottonera Lines #78",ns:"Cinque chilometri di bastioni del XVII secolo — raramente visitati, sempre gratuiti",nst:"Le Cottonera Lines sono un vasto anello di fortifications lungo cinque chilometri.",nt:"Gratis. Accesso da più punti intorno a Cospicua."},
  {id:79,n:"Cospicua Waterfront — Cottonera Lines #79",a:"Cottonera Lines",v:["local","hidden","weird"],d:29,s:"The third of the Three Cities — tourist-free waterfront with views of the working dockyard",st:"Cospicua (Bormla) is almost entirely free of tourists. Its waterfront overlooks the working dockyard where Malta\'s maritime industry survives. Sit at a local café and watch the tugs and ferries.",im:"Time-travel: the dockyard in full wartime production, hundreds of workers building and repairing ships, 1942",t:"Free to walk. 5-min walk from Vittoriosa.",c:["history_big"],r:"g",nn:"Cospicua Waterfront — Cottonera Lines #79",ns:"La terza delle Tre Città — lungomare senza turisti con vista sul cantiere navale",nst:"Cospicua (Bormla) è quasi del tutto priva di turisti.",nt:"Gratis a piedi. 5 min da Vittoriosa."},
  {id:80,n:"Gozo Ferry from Cirkewwa — Gozo #80",a:"Gozo",v:["local","nature","beautiful"],d:11,s:"Ferry to Gozo for €4.65 return — quieter, greener, and completely different from Malta",st:"The Gozo Channel ferry crosses in 25 minutes from Cirkewwa (north Malta). Gozo is quieter, greener, and the limestone villages feel entirely different. The island rewards a full day trip.",im:"Time-travel: the first regular ferry service to Gozo, islanders bringing their produce to sell in Valletta, 1870",t:"€4.65 return. Bus from Valletta to Cirkewwa 1 hour. Ferry every 45 min.",c:["high_spots"],r:"g",nn:"Traghetto per Gozo — Gozo #80",ns:"Traghetto per Gozo per 4,65 € A/R — più tranquilla, più verde e completamente diversa",nst:"Il traghetto Gozo Channel impega 25 minuti da Cirkewwa.",nt:"4,65 € A/R. Bus da Valletta 1 ora."},
  {id:81,n:"Gozo Citadel Victoria — Gozo #81",a:"Gozo",v:["history","beautiful","high_spots"],d:27,s:"The medieval citadel of Victoria — free to enter and walk the bastions, extraordinary island views",st:"The citadel of Victoria (Il-Belt) sits atop Gozo\'s central hill. Free to enter and walk the bastions — the views across the whole island are extraordinary. The cathedral interior is also free.",im:"Time-travel: the entire population of Gozo taking refuge inside this citadel during an Ottoman raid, 1551",t:"Free. Bus from Cirkewwa ferry to Victoria.",c:["parks"],r:"g",nn:"Cittadella di Victoria — Gozo #81",ns:"La cittadella medievale di Victoria — gratuita, vista straordinaria sull\'isola",nst:"La Cittadella di Victoria si trova sulla collina centrale di Gozo.",nt:"Gratis. Bus dal traghetto di Cirkewwa a Victoria."},
  {id:82,n:"Ramla Bay Gozo — Gozo #82",a:"Gozo",v:["nature","beautiful","local"],d:27,s:"Malta\'s finest sandy beach — wide bay of reddish sand, Roman villa ruins, and far fewer crowds",st:"Ramla Bay is a wide bay of reddish sand backed by ancient fields and the ruins of a Roman villa. Bus-accessible, free swimming. Far less crowded than beaches near Valletta.",im:"Time-travel: the Roman summer villa at this bay, a wealthy family arriving by boat for the season, 100 AD",t:"Free. Bus from Victoria to Ramla.",c:["courtyards"],r:"g",nn:"Ramla Bay Gozo — Gozo #82",ns:"La spiaggia sabbiosa più bella di Malta — ampia baia di sabbia rossastra",nst:"Ramla Bay è una vasta baia di sabbia rossastra con rovine di una villa romana.",nt:"Gratis. Bus da Victoria a Ramla."},
  {id:83,n:"Fort St Elmo Exterior — Valletta #83",a:"Valletta",v:["history","architecture","beautiful"],d:43,s:"The star fort at Valletta\'s tip that held against the Great Siege of 1565",st:"Fort St Elmo held for 31 days against the full Ottoman force in 1565, buying time for the relief force. The War Museum inside charges entry but the exterior fortifications and sea-facing gun platforms are freely accessible.",im:"Time-travel: the garrison of Fort St Elmo holding out against 40,000 Ottoman soldiers, until the last man, 1565",t:"Exterior/gun platforms free. Interior charges.",c:["romantic_water"],r:"g",nn:"Fort St Elmo — Valletta #83",ns:"Il forte a punta di Valletta che resistette all\'Assedio del 1565",nst:"Fort St Elmo resistette per 31 giorni contro le forze ottomane nel 1565.",nt:"Esterno gratuito. Interno a pagamento."},
  {id:84,n:"Dingli Cliffs Walk — Mdina & Rabat #84",a:"Mdina & Rabat",v:["nature","beautiful","high_spots"],d:21,s:"Malta\'s highest point at 253 m — sheer cliffs dropping to the Mediterranean, sunset spectacular",st:"The Dingli Cliffs are sheer limestone dropping to the Mediterranean at 253 m, no railing, no crowds. Bus 52 from Valletta reaches the clifftop. At sunset the views toward Filfla island are extraordinary.",im:"Time-travel: the clifftop as a lookout for the Knights of St John, watching for Ottoman ships approaching, 1600",t:"Free. Bus 52 from Valletta (45 min).",c:["scary"],r:"g",nn:"Scogliere di Dingli — Mdina & Rabat #84",ns:"Il punto più alto di Malta a 253 m — scogliere a picco sul Mediterraneo",nst:"Le scogliere di Dingli cadono verticali a 253 m nel Mediterraneo.",nt:"Gratis. Bus 52 da Valletta (45 min)."},
  {id:85,n:"St John\'s Co-Cathedral Exterior — Valletta #85",a:"Valletta",v:["architecture","beautiful","history"],d:7,s:"The grandest baroque church in the Mediterranean — the austere exterior hides the overwhelming interior",st:"St John\'s Co-Cathedral was built by the Knights of St John in 1578. The austere limestone façade gives no hint of the overwhelming baroque interior (Caravaggio\'s two masterpieces are inside). Interior costs €15 but the exterior and surrounding streets are always free.",im:"Time-travel: the Knights of St John attending Mass here in full ceremonial armour, 1600",t:"Exterior free. Interior €15. Worth the entry for the Caravaggios.",c:["famous_dead"],r:"g",nn:"St John\'s Co-Cathedral — Valletta #85",ns:"La più grande chiesa barocca del Mediterraneo — l\'esterno austero nasconde un interno travolgente",nst:"La St John\'s Co-Cathedral fu costruita dai Cavalieri di San Giovanni nel 1578.",nt:"Esterno gratuito. Interno 15 €. Vale l\'ingresso per i Caravaggio."},
  {id:86,n:"Lower Barrakka Gardens — Valletta #86",a:"Valletta",v:["beautiful","quiet","hidden"],d:51,s:"The quiet sibling of Upper Barrakka — a shaded terrace with the best view of the Three Cities across the water",st:"Lower Barrakka is smaller and calmer than Upper. A Neo-classical temple to Alexander Ball stands at the edge of the bastion. The view is straight across to the Three Cities. Come here to escape the Valletta crowds.",im:"Time-travel: Knights of St John watching their fleet depart from these bastion walls, 1565, the Great Siege beginning",t:"Free. Walk southeast along the bastions from Upper Barrakka.",c:["street_art"],r:"g",nn:"Il-Gnien tal-Barrakka t\'Isfel — Valletta #86",ns:"L-aħ sibling ta\' Upper Barrakka — terrazza mistrieħa bl-aħjar veduta tat-Tliet Ibliet",nst:"Il-Barrakka t\'Isfel hija iżgħar u aktar kalma. Tempju Neo-klassiku ta\' Alexander Ball jinsab fil-wieqfa tal-bastjon.",nt:"B\'xejn. Imxi lejn ix-xlokk mal-bastjuni minn Upper Barrakka."},
  {id:87,n:"Strait Street at Night — Valletta #87",a:"Valletta",v:["history","local","night"],d:34,s:"The street that serviced the British Royal Navy for 150 years — bars, live music, the ghost of every sailor",st:"Strait Street (Il-Strada Stretta) was Valletta\'s red-light district for the British Navy from the 1800s to 1979. Now it has bars, live jazz and the bones of the old taverns. Free to walk end to end. The neon signs are original.",im:"Time-travel: British sailors filling this narrow street on shore leave in 1942, the Malta convoys running through the siege",t:"Free to walk. Best Thu–Sat from 9pm. Buy one drink if you sit.",c:["abandoned"],r:"g",nn:"Triq id-Dejqa bil-lejl — Valletta #87",ns:"It-triq li serviet lill-Baħrija Rjali Brittanika għal 150 sena — bari, mużika live, l-ispirtu ta\' kull baħħar",nst:"Triq id-Dejqa kienet id-distrett tal-ħajja bil-lejl ta\' Valletta għall-Baħrija Brittanika mill-1800s sal-1979.",nt:"B\'xejn timxi. L-aħjar Ħam-Sibt mis-9pm."},
  {id:88,n:"Spazju Kreattiv Free Gallery — Valletta #88",a:"Valletta",v:["art","local","free"],d:39,s:"Malta\'s contemporary arts centre in a 16th century fortification — free shows, locals not tourists",st:"Spazju Kreattiv is inside St James Cavalier, built by the Knights in 1566. The exhibitions change monthly and are usually free. Theatre, dance, visual art. This is where Maltese contemporary culture actually happens.",im:"Time-travel: the Knights of St John firing cannon from this cavalier in 1565 during the Ottoman Great Siege",t:"Free most exhibitions. Misraħ San Ġorġ, near the Main Gate.",c:["free_museum"],r:"g",nn:"Spazju Kreattiv — Valletta #88",ns:"Iċ-ċentru tal-arti kontemporanja ta\' Malta f\'fortifikazzjoni tas-seklu 16 — wirjiet b\'xejn",nst:"Spazju Kreattiv jinsab ġewwa Kavallier San Ġakbu, mibnija mill-Kavallieri fl-1566. L-esibizzjonijiet jinbidlu kull xahar.",nt:"Il-biċċa l-kbira tal-esibizzjonijiet b\'xejn. Misraħ San Ġorġ, ħdejn il-Bieb Ewlieni."},
