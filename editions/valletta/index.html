  {id:89,n:"Is-Suq tal-Belt Food Market — Valletta #89",a:"Valletta",v:["local","beautiful","free"],d:12,s:"A grand Victorian iron market hall restored in 2018 — free to walk, local food, exactly where locals shop",st:"Is-Suq tal-Belt (City Market) was built in 1861, derelict for decades, and beautifully restored in 2018. Three floors of iron galleries. Local produce, pastizzi stalls, fresh fish. Free to enter and wander.",im:"Time-travel: the market\'s opening in 1861, Valletta housekeepers inspecting vegetables under the new iron roof",t:"Free to enter. St John\'s Street / Merchants Street junction. Open daily.",c:["local_only"],r:"g",nn:"Is-Suq tal-Belt — Valletta #89",ns:"Swieq tal-iħbula tal-1861 restawrat fl-2018 — b\'xejn tidħol, ikel lokali, fejn jixtrjaw il-lokalitajiet",nst:"Is-Suq tal-Belt inbena fl-1861 u restawrat b\'mod sabiħ fl-2018. Tliet sulari ta\' galleriji tal-ħadid.",nt:"B\'xejn tidħol. Triq San Ġwann / Triq il-Merkanti. Miftuħ kuljum."},
  {id:90,n:"Three Cities Ferry Crossing — Vittoriosa (Birgu) #90",a:"Vittoriosa (Birgu)",v:["beautiful","local","history"],d:29,s:"€1.50 ferry from Valletta to the Knights\' fortifications opposite — the best view of Valletta is looking back from the water",st:"The dgħajsa water taxis cross the Grand Harbour from Valletta to Birgu in minutes. The return view of Valletta from the water — the bastions, the dome of the Carmelite church, the skyline intact since 1566 — is the best view in Malta.",im:"Time-travel: the same harbour crossing made by the Knights of St John in their longboats every day, 1580",t:"€1.50 each way. Traditional water taxi from Valletta Waterfront. All day.",c:["architecture"],r:"g",nn:"Ferrovija tat-Tliet Ibliet — Vittoriosa (Birgu) #90",ns:"Dgħajsa ta\' €1.50 minn Valletta għall-fortifikazzjonijiet tal-Kavallieri — l-aħjar veduta ta\' Valletta hija meta titlef lura mill-ilma",nst:"Id-dgħajjes jaqsmu l-Port il-Kbir minn Valletta għal Birgu f\'minuti. Il-veduta tal-Valletta mill-ilma hija l-aqwa veduta f\'Malta.",nt:"€1.50 it-triq. Dgħajsa tradizzjonali mill-Waterfront ta\' Valletta."},
  {id:91,n:"Upper Barrakka Gardens — Valletta #91",a:"Valletta",v:["beautiful","high_spots","history"],d:10,s:"The finest view in Malta — Grand Harbour, the Three Cities, and tankers at anchor, all free",st:"From this 16th-century garden bastion, the Grand Harbour spreads below you. The dockyard creeks, Vittoriosa, Senglea, and the open sea beyond. Free to enter, always open. Nothing in Malta competes with this view.",im:"Time-travel: Knights of St John watching the Ottoman fleet fill the harbour in the Great Siege, 1565",t:"Free. Open daily. Cannon fired at noon — very loud.",c:["history_big"],r:"g",nn:"Upper Barrakka Gardens — Valletta #91",ns:"Il panorama più bello di Malta — il Grand Harbour, le Tre Città",nst:"Da questo bastione-giardino del XVI secolo, il Grand Harbour si apre sotto di te.",nt:"Gratis. Aperto quotidianamente. Cannone sparato a mezzogiorno."},
  {id:92,n:"Republic Street Walk — Valletta #92",a:"Valletta",v:["history","architecture","local"],d:40,s:"Valletta\'s spine — walk end to end past baroque churches, the Grand Master\'s Palace, and the sea",st:"Republic Street runs from the City Gate to Fort St Elmo, the full length of Valletta. The Grand Master\'s Palace courtyard is free entry. The street narrows and the light changes at every intersection.",im:"Time-travel: the Knights of St John processing in full ceremony along this street on feast days, 1600",t:"Free always.",c:["high_spots"],r:"g",nn:"Republic Street — Valletta #92",ns:"La spina di Valletta - percorrila da un\'estremita all\'altra",nst:"Republic Street corre dal City Gate a Fort St Elmo.",nt:"Sempre gratis."},
  {id:93,n:"Lower Barrakka Gardens — Valletta #93",a:"Valletta",v:["nature","quiet","beautiful"],d:23,s:"A quieter bastion garden at the harbour\'s edge — Doric temple memorial and sea views",st:"The Lower Barrakka is a small bastion garden at the harbour\'s edge. It has a Doric temple memorial and views toward Fort Ricasoli. Often less crowded than the Upper Barrakka, and always free.",im:"Time-travel: the original wooden lookout platform here, sentinels watching for enemy ships, 1580",t:"Free. Open daily.",c:["parks"],r:"g",nn:"Lower Barrakka Gardens — Valletta #93",ns:"Un tranquillo giardino bastionato — tempio dorico e vista sul mare",nst:"I Lower Barrakka sono un piccolo giardino bastionato sul bordo del porto.",nt:"Gratis. Aperto quotidianamente."},
  {id:94,n:"Hastings Gardens — Valletta #94",a:"Valletta",v:["nature","local","quiet"],d:45,s:"A long bastion terrace garden looking across Marsamxett Harbour — local cats and evening breeze",st:"Hastings Gardens runs along the Marsamxett side of Valletta\'s bastions. Look across the water to Sliema. Shaded benches, local cats, and evening breezes. Free at all times.",im:"Time-travel: this bastion as a key defensive position facing the mainland, sentinels on watch, 1570",t:"Free always.",c:["courtyards"],r:"g",nn:"Hastings Gardens — Valletta #94",ns:"Un lungo giardino terrazzo che guarda verso Marsamxett Harbour",nst:"Hastings Gardens corre lungo i bastioni di Valletta.",nt:"Sempre gratis."},
  {id:95,n:"Renzo Piano City Gate — Valletta #95",a:"Valletta",v:["architecture","beautiful","weird"],d:44,s:"Renzo Piano\'s 2015 city gate — a dramatic cut through the bastion, framing the Parliament",st:"The City Gate project was completed in 2015. Piano\'s design cuts dramatically through the ancient bastion. The new Parliament building faces you as you enter. Free to view and photograph from the bridge.",im:"Time-travel: the old bus terminus that occupied the Venetian moat here for 50 years, 1970",t:"Free. Always accessible.",c:["romantic_water"],r:"g",nn:"City Gate di Renzo Piano — Valletta #95",ns:"Il city gate del 2015 di Renzo Piano — un taglio drammatico nel bastione",nst:"Il progetto City Gate è stato completato nel 2015.",nt:"Gratis. Sempre accessibile."},
  {id:96,n:"Sa Maison Garden — Floriana #96",a:"Floriana",v:["nature","hidden","beautiful"],d:28,s:"A hidden garden on a promontory between both harbours — extraordinary views with no tourists",st:"Sa Maison Garden sits on a promontory between the Grand Harbour and Marsamxett. Shaded benches, palms, and views across both harbours. Reached via a short walk from Floriana. Rarely visited.",im:"Time-travel: British naval officers using this promontory for signalling to the fleet in the Grand Harbour, 1900",t:"Free. Walk from Floriana bus stop 10 min.",c:["scary"],r:"g",nn:"Sa Maison Garden — Floriana #96",ns:"Un giardino nascosto su un promontorio tra i due porti",nst:"Sa Maison Garden si trova su un promontorio tra il Grand Harbour e Marsamxett.",nt:"Gratis. 10 minuti a piedi da Floriana."},
  {id:97,n:"Floriana Granaries — Floriana #97",a:"Floriana",v:["history","architecture","weird"],d:41,s:"74 underground grain silos beneath a vast paved square — a free open space with an extraordinary secret",st:"The Floriana Granaries were built as underground food storage for a siege. The huge limestone-paved square above is now used for outdoor concerts and festivals. 74 silos beneath the stone.",im:"Time-travel: the granaries being filled with enough wheat to feed the entire population for years, 1636",t:"Free. Open space always accessible.",c:["famous_dead"],r:"g",nn:"Granai di Floriana — Floriana #97",ns:"74 silos sotterranei sotto una vasta piazza lastricata",nst:"I Granai di Floriana furono costruiti come deposito alimentare sotterraneo.",nt:"Gratis. Piazza sempre accessibile."},
  {id:98,n:"Vittoriosa Waterfront — Vittoriosa (Birgu) #98",a:"Vittoriosa (Birgu)",v:["beautiful","history","local"],d:17,s:"The marina waterfront of Birgu — superyachts and luzzu fishing boats side by side",st:"The Vittoriosa waterfront lines up superyachts and traditional luzzu boats together. Walk the quays, see the Freedom Monument, and take the harbour ferry back to Valletta for €1.50.",im:"Time-travel: the Knights of St John building their first fortifications on this small peninsula, 1530",t:"Free to walk. Ferry to Valletta €1.50 — same as a bus.",c:["street_art"],r:"g",nn:"Waterfront di Vittoriosa — Vittoriosa (Birgu) #98",ns:"Il lungofiume di Birgu — superyacht e tradizionali luzzu fianco a fianco",nst:"Il waterfront di Vittoriosa allinea superyacht e barche tradizionali luzzu.",nt:"Gratis. Traghetto per Valletta 1,50 € — stesso prezzo dell\'autobus."},
  {id:99,n:"Birgu Alleyways — Vittoriosa (Birgu) #99",a:"Vittoriosa (Birgu)",v:["history","hidden","architecture"],d:50,s:"Medieval alleyways predating Valletta by centuries — narrower, older, and far less visited",st:"Birgu\'s medieval alley grid predates Valletta by centuries. The narrow streets, colourful balconies, and hidden chapels are free to wander. Narrower than Valletta, and far less touristed.",im:"Time-travel: the Knights of St John establishing their first Maltese base in these very streets, 1530",t:"Free always.",c:["abandoned"],r:"g",nn:"Vicoli di Birgu — Vittoriosa (Birgu) #99",ns:"Vicoli medievali precedenti Valletta di secoli — più stretti, più antichi",nst:"I vicoli medievali di Birgu precedono Valletta di secoli.",nt:"Sempre gratis."},
  {id:100,n:"Grand Harbour Ferry — Vittoriosa (Birgu) #100",a:"Vittoriosa (Birgu)",v:["local","beautiful","weird"],d:9,s:"Cross Grand Harbour by ferry for €1.50 — same price as a bus, the most beautiful commute in Europe",st:"The traditional ferry crosses Grand Harbour between Valletta and the Three Cities waterfront for €1.50 each way. A beautiful five-minute harbour crossing past the superyacht marina.",im:"Time-travel: the original dghajsa (water taxi) as the only transport between the peninsula cities, 1800",t:"€1.50 each way. Runs all day. Valletta landing at the Lower Barrakka foot.",c:["free_museum"],r:"g",nn:"Traghetto Grand Harbour — Vittoriosa (Birgu) #100",ns:"Attraversa il Grand Harbour in traghetto per 1,50 € — stesso prezzo dell\'autobus",nst:"Il traghetto tradizionale attraversa il Grand Harbour per 1,50 € a tratta.",nt:"1,50 € a tratta. Tutto il giorno."},
  {id:101,n:"Gardjola Gardens — Senglea #101",a:"Senglea",v:["beautiful","high_spots","hidden"],d:7,s:"At the tip of Senglea\'s peninsula — the most intimate Grand Harbour view of all",st:"The Gardjola Gardens are at the very tip of Senglea\'s peninsula. The carved watchtower eye symbol is iconic. You can almost touch the superyachts. Locals bring children here on Sundays.",im:"Time-travel: the watchtower sentinel scanning the harbour for enemy vessels, looking in every direction at once, 1580",t:"Free. Walk from the ferry landing along the peninsula tip. 15 min.",c:["local_only"],r:"g",nn:"Gardjola Gardens — Senglea #101",ns:"In punta alla penisola di Senglea — la vista più intima del Grand Harbour",nst:"I Gardjola Gardens si trovano all\'estrema punta della penisola di Senglea.",nt:"Gratis. 15 min a piedi dall\'attracco del traghetto."},
  {id:102,n:"Senglea Village Walk — Senglea #102",a:"Senglea",v:["local","hidden","history"],d:47,s:"The most authentically Maltese of the Three Cities — quiet streets, fishing nets, zero tourists",st:"Senglea (L-Isla) remains the most authentically Maltese of the Three Cities. Quiet streets, tiny chapels, working fishing nets, and virtually no tourists. Walk from the ferry landing to the Gardjola tip and back.",im:"Time-travel: the Three Cities as Malta\'s equivalent of Venice — a labyrinth of peninsulas, 1600",t:"Free. 5-min ferry from Vittoriosa.",c:["architecture"],r:"g",nn:"Passeggiata a Senglea — Senglea #102",ns:"La più autenticamente maltese delle Tre Città — strade tranquille, reti da pesca",nst:"Senglea (L-Isla) rimane la più autenticamente maltese delle Tre Città.",nt:"Gratis. Traghetto 5 min da Vittoriosa."},
  {id:103,n:"Mdina Silent City Walk — Mdina & Rabat #103",a:"Mdina & Rabat",v:["history","beautiful","quiet"],d:19,s:"The medieval walled capital — walk the Silent City at dusk for a panorama across the whole island",st:"Mdina is called the Silent City. Walk the limestone streets, the cathedral square (free), and the Bastion Square viewpoint at dusk for a panorama across Malta. No cars, almost no noise. Entry is free.",im:"Time-travel: the Arab emirate of Malta governing this entire island from within these walls, 900 AD",t:"Free to enter. Walk from bus stop (Rabat, 3 min). Best at dusk.",c:["history_big"],r:"g",nn:"Mdina, la Città Silenziosa — Mdina & Rabat #103",ns:"La capitale medievale murata — percorrila al tramonto per un panorama sull\'isola",nst:"Mdina è chiamata la Città Silenziosa. Le strade di calcare, la piazza della cattedrale.",nt:"Gratis. Bus da Valletta (40 min). Meglio al tramonto."},
  {id:104,n:"Mdina Bastion Viewpoint — Mdina & Rabat #104",a:"Mdina & Rabat",v:["beautiful","high_spots","nature"],d:54,s:"360° view across nearly the whole island — Valletta, the harbours, Dingli, and the sea",st:"The bastions of Mdina offer a 360° view across nearly the whole island: Valletta and its harbours to the east, Dingli cliffs to the west, and the rural centre in every direction. Most dramatic at sunset.",im:"Time-travel: the medieval city of Mdina visible from ships far out at sea, a beacon for returning sailors, 1400",t:"Free. Always accessible. The main bastion is Bastion Square.",c:["high_spots"],r:"g",nn:"Bastioni di Mdina — Mdina & Rabat #104",ns:"Vista a 360° su quasi tutta l\'isola — Valletta, i porti, Dingli e il mare",nst:"I bastioni di Mdina offrono una vista a 360°.",nt:"Gratis. Sempre accessibile."},
  {id:105,n:"Rabat Town Walk — Mdina & Rabat #105",a:"Mdina & Rabat",v:["local","history","hidden"],d:23,s:"The town just outside Mdina\'s walls — excellent churches, local market, ancient catacombs",st:"Rabat sits just outside Mdina\'s walls and is far less visited. The town has excellent parish churches, a local market on weekday mornings, and the St Agatha catacombs (small entry fee). Walk freely above ground.",im:"Time-travel: Rabat as the suburb of Roman Melita, the Roman town sprawling outside the city walls, 200 AD",t:"Free to walk. Catacombs have small entry fee.",c:["parks"],r:"g",nn:"Rabat — Mdina & Rabat #105",ns:"La città appena fuori le mura di Mdina — chiese, mercato locale, catacombe",nst:"Rabat si trova appena fuori dalle mura di Mdina.",nt:"Gratis a piedi. Catacombe con piccolo biglietto."}

<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Valletta Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
