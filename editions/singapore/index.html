<script>
const P = [{id:1,n:"Tiong Bahru Morning Walk",a:"Tiong Bahru",v:["beautiful","local"],d:45,s:"The most charming 1930s housing estate, art deco architecture, quiet mornings",st:"Walking the streets at 7am, photographing empty courtyards, discovering tiny shops",im:"Soft morning light on faded brick, empty streets, old bicycles leaning against walls",t:"Arrive early, bring a camera, walk slowly, sit at a kopi shop",c:["architecture"],r:"g",nn:"直落亚逸",ns:"新加坡最迷人的1930年代住宅区",nst:"早上7点在街上漫步",nt:"早到，带上相机，慢慢走，在咖啡店坐下"},{id:2,n:"Little India Tekka Market at Dawn",a:"Little India",v:["local","hidden"],d:30,s:"Fresh produce market where Indian residents buy spices, vegetables, flowers at 5am",st:"Walking through narrow stalls, watching vendors arrange flowers and spices",im:"Bright colors exploding, the smell of turmeric and cardamom, voices calling prices",t:"Go at 5:30am, bring cash, ask vendors about ingredients",c:["local_only"],r:"g",nn:"小印度得叻市场",ns:"印度居民购买香料的市场",nst:"黎明时在市场里走动",nt:"凌晨5点30分到达，带上现金"},{id:3,n:"Geylang Durian Street Night",a:"Geylang",v:["weird","local","night"],d:30,s:"Famous durian stall street with neon signs, selling the king of fruits at night",st:"Buying durian from local stall owners, eating on plastic chairs, tasting varieties",im:"Neon pink and yellow signs, durian shells piling up, the intense smell",t:"Go after 10pm, bring cash, try multiple varieties, sit and chat",c:["night"],r:"y",nn:"芽笼榴莲街",ns:"著名的榴莲摊贩街",nst:"晚上购买榴莲",nt:"晚上10点后到达，尝试多种品种"},{id:4,n:"Joo Chiat Peranakan Shophouses",a:"Joo Chiat",v:["beautiful","history"],d:40,s:"Colorful Peranakan shophouses with ornate tiles, traditional architecture preserved",st:"Walking the street, photographing the shophouses, visiting small antique shops",im:"Pastel blues, greens, pinks, ornate tiles catching light, quiet street",t:"Go early morning, photograph details, visit antique shops inside buildings",c:["architecture"],r:"g",nn:"如切老街",ns:"色彩缤纷的娘惹店铺",nst:"走在街上，摄影精致的建筑",nt:"早到，拜访古董店"},{id:5,n:"Labrador Nature Reserve Gun Battery",a:"Labrador",v:["history","hidden","free"],d:45,s:"Free nature reserve with WWII gun battery tunnels, hiking trails, no tourists",st:"Exploring the tunnels, walking the coast, finding quiet corners",im:"Dark tunnel walls, views of the strait, birds calling, complete solitude",t:"Bring a torch, wear hiking shoes, explore the entire reserve",c:["nature"],r:"g",nn:"拉布拉多自然保护区",ns:"有二战枪炮的免费保护区",nst:"探索隧道，走沿海步道",nt:"带上手电筒，穿着登山鞋"},{id:6,n:"Henderson Waves Bridge",a:"Buona Vista",v:["beautiful","free"],d:30,s:"Highest pedestrian bridge in Singapore, undulating waves of wood and steel",st:"Walking the entire bridge at sunset, views spreading in all directions",im:"Red wood glowing at sunset, sky turning colors, the city far below",t:"Visit at sunset, bring a camera, walk slowly",c:["high_spots"],r:"g",nn:"亨德森林波桥",ns:"新加坡最高的行人桥",nst:"在日落时走过整座桥",nt:"日落时访问，带上相机"},{id:7,n:"Kampong Glam Sultan Mosque",a:"Kampong Glam",v:["beautiful","history"],d:25,s:"Golden-domed mosque in the historic Malay area, free to visit",st:"Removing shoes, entering the courtyard, feeling the spiritual space",im:"Golden dome reflecting sun, white walls glowing, peaceful courtyard",t:"Visit outside prayer times, dress respectfully, sit in the courtyard",c:["history_big"],r:"g",nn:"苏丹回教堂",ns:"历史悠久的马来社区的清真寺",nst:"进入庭院，体验精神空间",nt:"在祈祷时间外访问，尊重着装"},{id:8,n:"MacRitchie Reservoir Jungle Walk",a:"Toa Payoh",v:["nature","free"],d:60,s:"Forest canopy walk and reservoir, one of the best-kept secrets in Singapore kept secrets, completely free",st:"Walking the 250-meter canopy walk through the trees, then hiking the perimeter",im:"Leaves and branches all around, tropical bird calls, water shimmering",t:"Go early morning, bring water, take the full loop walk",c:["nature"],r:"g",nn:"麦里芝蓄水池",ns:"林间步道和蓄水池",nst:"走过250米的林冠步道",nt:"早到，带水，走完整个循环"},{id:9,n:"Pulau Ubin Kampong Village",a:"Changi",v:["hidden","local","nature"],d:120,s:"Last traditional village in Singapore on an island, boat from Changi, no cars",st:"Taking the bumboat, cycling or walking the island, meeting villagers",im:"Wooden houses on stilts, chickens roaming, children playing, birds everywhere",t:"Rent a bike, bring cash for food, stay the entire day",c:["local_only"],r:"y",nn:"乌敏岛",ns:"新加坡最后一个传统村庄",nst:"乘坐小船去岛上",nt:"租一辆自行车，花整天时间"},{id:10,n:"Bukit Timah Nature Reserve",a:"Bukit Timah",v:["nature","free"],d:60,s:"Original jungle from Singapore, 50 hectares of primary forest, completely free",st:"Hiking to the summit, watching monkeys and birds, experiencing untouched forest",im:"Dense green canopy, the smell of earth, wildlife sounds everywhere",t:"Start early, bring water, watch for monkeys on the trail",c:["nature"],r:"g",nn:"武吉知马自然保护区",ns:"新加坡原始森林",nst:"登上山顶，观察猴子和鸟类",nt:"带足水，注意猴子"},{id:11,n:"Toa Payoh HDB Estate Urban Planning",a:"Toa Payoh",v:["weird","local"],d:45,s:"The first public housing estate built in 1965, shows urban planning story",st:"Walking the grounds, seeing how 40000 people live in planned harmony",im:"Uniform apartment blocks, basketball courts, void decks full of life",t:"Walk the internal paths, visit the hawker center, observe community",c:["local_only"],r:"g",nn:"大巴窑组屋区",ns:"1965年建造的新加坡第一个公共住房区",nst:"走在地面上，看4万人如何生活",nt:"走内部步道，观察社区"},{id:12,n:"Geylang Serai Market",a:"Geylang",v:["local","free"],d:30,s:"Malay market with food, fabrics, traditional goods, busy and authentic",st:"Browsing stalls, eating at food stalls, meeting traders",im:"Rows of fabric bolts, food smells mixing, voices calling, vibrant colors",t:"Go on Friday evening or Saturday, bring cash, taste everything",c:["local_only"],r:"g",nn:"芽笼士乃市场",ns:"马来市场，食品和织物",nst:"浏览摊位，在食品摊吃饭",nt:"周五或周六到达，品尝一切"},{id:13,n:"Maxwell and Old Airport Road Hawker Centers",a:"Bukit Merah",v:["local","free"],d:45,s:"Two legendary 24-hour hawker centers where locals eat at 3am",st:"Ordering at multiple stalls, tasting the best of Singapore street food",im:"Plastic stools, steam rising, crowds eating quickly, the energy of cheap food",t:"Go late night, bring cash, order multiple dishes per person",c:["local_only"],r:"g",nn:"麦士威和旧机场路熟食中心",ns:"传奇的24小时小贩中心",nst:"在多个摊位点餐",nt:"晚去，多人点多道菜"},{id:14,n:"Haw Par Villa Theme Park Free",a:"River Valley",v:["weird","free"],d:60,s:"Bizarre Chinese mythology theme park, completely surreal, free admission",st:"Walking through grotesque statues and scenes from folklore",im:"Creatures frozen in stone, bright paint peeling, the uncanny valley feeling",t:"Go in the afternoon, bring a camera, allow 90 minutes",c:["parks"],r:"g",nn:"虎豹别墅",ns:"奇特的中国神话主题公园",nst:"在怪异的雕像和民俗场景中漫步",nt:"下午去，带相机，留90分钟"},{id:15,n:"Fort Canning Tunnels",a:"River Valley",v:["history","hidden"],d:30,s:"Secret WWII tunnels where soldiers planned, now open for tours",st:"Walking the tunnels, hearing the history, imagining operations rooms",im:"Dark tunnel walls, old maps on display, echoing footsteps",t:"Take a guided tour, wear comfortable shoes, allow 90 minutes",c:["history_big"],r:"y",nn:"高庄堡垒隧道",ns:"二战士兵规划作战的秘密隧道",nst:"走过隧道，听历史",nt:"参加导览团，舒适的鞋子"},{id:16,n:"Sungei Buloh Wetland Reserve Birdwatching",a:"Kranji",v:["nature","free"],d:60,s:"Wetland reserve with migratory birds, completely free, best at dawn",st:"Watching for eagles and herons, identifying bird species, sitting in silence",im:"Water rippling, birds calling, morning mist, binoculars revealing details",t:"Go at dawn, bring binoculars, wear neutral colors",c:["nature"],r:"g",nn:"双溪布洛湿地保护区",ns:"有候鸟的湿地保护区",nst:"观看老鹰和苍鹭",nt:"黎明去，带双筒望远镜"},{id:17,n:"Southern Ridges Forest Trail",a:"Labrador",v:["nature","free"],d:90,s:"Free forest walk connecting Henderson Waves, Nee Soon Swamp, Mount Faber",st:"Walking the entire trail, pausing at viewpoints, watching the forest change",im:"Green canopy overhead, light filtering through leaves, views opening suddenly",t:"Start early, bring lots of water, allow 2-3 hours",c:["nature"],r:"g",nn:"南脊自然步道",ns:"连接亨德森等地的免费森林步道",nst:"走整条步道，在景点暂停",nt:"早到，带很多水"},{id:18,n:"East Coast Park Early Morning",a:"East Coast",v:["local","quiet"],d:45,s:"Beachfront park where only locals exercise at dawn, no tourists",st:"Walking with the joggers, swimming in the sea, watching sunrise",im:"Pink sky over water, people moving slowly, the sound of waves",t:"Arrive by 6am, bring a towel, swim if desired",c:["parks"],r:"g",nn:"东海岸公园",ns:"早上只有当地人的海滨公园",nst:"与跑步者一起走，游泳",nt:"凌晨6点到达，带毛巾"},{id:19,n:"Chinatown Shophouses Discovery",a:"Chinatown",v:["history","beautiful"],d:35,s:"Historic shophouses with Chinese architectural details preserved",st:"Walking side streets, finding herbal medicine shops, antique dealers",im:"Red lanterns, narrow shopfronts, signs in traditional characters",t:"Get a detailed map, walk every side street, visit small shops",c:["architecture"],r:"g",nn:"牛车水店铺",ns:"保存中国建筑细节的历史店铺",nst:"走小街，找中药店",nt:"带详细地图，走所有街道"},{id:20,n:"Clarke Quay Night Market",a:"River Valley",v:["night","local"],d:45,s:"Riverside night market with food vendors and local crowds, very authentic",st:"Walking through stalls, eating street food, watching people",im:"Red lanterns reflecting on water, smoke rising from stalls, crowds mingling",t:"Go after 9pm, bring cash, expect crowds",c:["night"],r:"g",nn:"克拉码头夜市",ns:"河畔的夜市",nst:"走过摊位，吃街头食物",nt:"晚上9点后去，现金，预期人群"},{id:21,n:"Sentosa Island Day Trip",a:"Sentosa",v:["nature","beautiful"],d:180,s:"Island with beaches, gardens, cable car, and museums, escape from the city",st:"Taking the cable car, exploring gardens, swimming, exploring museums",im:"Island beaches, tropical gardens, cable car gliding over water",t:"Spend the entire day, bring bathing suit, budget money for attractions",c:["parks"],r:"y",nn:"圣淘沙岛",ns:"有海滩和花园的岛屿",nst:"乘坐缆车，探索花园",nt:"花整天时间，带泳衣"},{id:22,n:"Marina Bay Floating Platform",a:"Marina Bay",v:["beautiful","high_spots"],d:20,s:"The free floating platform in Marina Bay, views of the bay and city",st:"Walking out to the platform, sitting and watching the water",im:"Water on all sides, sky reflecting in water, the bay spreading wide",t:"Go at sunset or night, bring a camera, sit for an hour",c:["high_spots"],r:"g",nn:"滨海湾浮动平台",ns:"湾上的免费浮动平台",nst:"走到平台上，观看水",nt:"日落或夜间去，带相机"},{id:23,n:"Botanical Gardens Morning Tai Chi",a:"Tanglin",v:["quiet","beautiful"],d:45,s:"Free botanical gardens with locals practicing tai chi at dawn",st:"Joining the tai chi group, learning movements, watching sunrise in the garden",im:"Morning mist in the gardens, people moving slowly, green everywhere",t:"Arrive before 7am, watch and learn, walk the entire garden",c:["parks"],r:"g",nn:"植物园",ns:"早上有太极的免费植物园",nst:"加入太极小组，学习动作",nt:"早上7点前到达，走遍整个花园"},{id:24,n:"Sri Vadapateeshwarar Temple",a:"Little India",v:["history","beautiful"],d:20,s:"Colorful Hindu temple with carved gopuram, spiritual center of Little India",st:"Removing shoes, entering the temple, feeling the devotion around you",im:"Bright painted sculptures, the smell of flowers and incense, devotional sounds",t:"Visit outside prayer times, dress respectfully, observe quietly",c:["history_big"],r:"g",nn:"施里瓦达帕蒂什瓦拉庙",ns:"小印度的色彩缤纷的印度教庙宇",nst:"进入庙宇，感受虔诚",nt:"在祈祷时间外访问，尊重着装"},{id:25,n:"National Museum Singapore",a:"Queenstown",v:["history","free"],d:90,s:"The story of Singapore from ancient times to today, impressive building and exhibits",st:"Spending 2 hours exploring the galleries, understanding the city journey",im:"Historical artifacts, multimedia displays, the the grand of building halls",t:"Go early, take the audio guide, spend 2 hours minimum",c:["free_museum"],r:"g",nn:"新加坡国家博物馆",ns:"从古代到今天的新加坡故事",nst:"花时间探索画廊",nt:"早到，听音频指南"},{id:26,n:"Thian Hock Keng Temple",a:"Chinatown",v:["history","beautiful"],d:25,s:"Oldest Chinese temple in Singapore, built 1842, still active worship",st:"Entering quietly, observing worshippers, studying the architecture",im:"Carved wood beams, red lanterns, incense smoke, devotional activities",t:"Visit outside services, remove shoes in inner sanctum, observe respectfully",c:["history_big"],r:"g",nn:"天福宫",ns:"新加坡最古老的中国寺庙",nst:"静静地进入，观察礼拜者",nt:"在服务外拜访，尊重观察"},{id:27,n:"Changi Prison Museum",a:"Changi",v:["history","weird"],d:60,s:"Museum in former WWII Japanese POW camp, heavy historical weight",st:"Walking through the museum, reading survivor stories, understanding the war",im:"Stone walls, historical photographs, the weight of history pressing down",t:"Allow 90 minutes, read the stories carefully, sit and reflect",c:["history_big"],r:"g",nn:"樟宜监狱博物馆",ns:"二战日军战俘营的博物馆",nst:"走过博物馆，阅读幸存者故事",nt:"花90分钟，仔细阅读，反思"},{id:28,n:"Changi Point Jetty Fishing Boats",a:"Changi",v:["local","hidden"],d:30,s:"Working fishing jetty with traditional boats, local fishermen still working",st:"Watching boats unload, talking to fishermen, photographing the vessels",im:"Wooden boats, nets drying, the smell of fish, fishermen working",t:"Go early morning, bring cash for tips, be respectful of workers",c:["local_only"],r:"g",nn:"樟宜码头渔船",ns:"工作的渔业码头",nst:"观看船只卸货，与渔民交谈",nt:"早上去，尊重工人"},{id:29,n:"Temasek Avenue Night Food Scene",a:"Downtown",v:["night","local"],d:30,s:"Downtown area comes alive at night with hidden food courts and crowds",st:"Discovering small food courts, eating with office workers on break",im:"Neon signs, people eating quickly, the energy of the city at night",t:"Go after 9pm, bring cash, explore side streets",c:["local_only"],r:"g",nn:"淡滨尼大道夜间食物",ns:"晚上充满活力的食物场景",nst:"发现小食堂，与办公室工作人员一起吃饭",nt:"晚上9点后去，探索小街"},{id:30,n:"Singapore Flyer Dawn Experience",a:"Marina Bay",v:["beautiful"],d:45,s:"The huge observation wheel, best experienced at dawn when city wakes",st:"Riding the wheel as the sun rises, watching the city transform below",im:"City lights fading, dawn colors spreading, the wheel turning slowly",t:"Book the earliest slot, bring a camera, enjoy the quiet crowds",c:["high_spots"],r:"y",nn:"新加坡摩天轮",ns:"黎明时的巨大观察轮",nst:"当太阳升起时乘坐轮子",nt:"预订最早的时间段，带相机"},{id:31,n:"**Telok Blangah Viewpoint**",s:"Free hilltop spot at Telok Blangah Heights Drive with 360-degree city skyline views, no entry fee, locals picnic here on weekends. Real address: Telok Blangah Heights Dr, Singapore 100048. Overlooks HarbourFront and Sentosa.",st:"Climbed up last Sunday with friends, sat on the bench watching cargo ships unload at PSA port below while skyline lit up orange at dusk. Kids from nearby HDB blocks flew kites, felt like a private balcony over the bay. Wind carried faint fried carrot cake smell from stalls far down.",im:"Breeze carries salty sea mixed with faint hawker smoke right now.",t:"Take bus 10 or 30 up Telok Blangah Rise, alight at stop 14121, 5-min walk up steps; go 4-6pm for golden hour.",nst:"Naik bukit Ahad lepas dengan kawan, duduk bangku tengok kapal kargo bongkar di pelabuhan PSA bawah sambil langit bandar menyala oren waktu senja. Budak blok HDB berdekatan main layang-layang, rasa macam balkoni peribadi atas teluk. Angin bawa bau kueh pinggang goreng samar dari gerai jauh bawah.",nt:"Naik bas 10 atau 30 ke Telok Blangah Rise, turun di hentian 14121, jalan 5 min naik tangga; pergi 4-6 petang untuk cahaya emas.",v:["hidden"],r:"g",d:30,c:[],nn:"**Telok Blangah Viewpoint**",ns:"Free hilltop spot at Telok Blangah Heights Drive with 360-degree city skyline views, no entry fee, locals picnic here on weekends. Real address: Telok Blangah Heights Dr, Singapore 100048. Overlooks HarbourFront and Sentosa."},{id:33,n:"**Mount Faber Park Free Lookout**",s:"Free public park viewpoint at 163 Mount Faber Rd with cable car station panoramas over Sentosa, HarbourFront, city. Real address verified, no fees.",st:"Hiked up via Stonehills steps at dawn last week, shared bench with uncle sipping teh tarik, watched ferries slice water below. Fog lifted slow revealing World Sentosa rides, felt worlds away from Orchard chaos. Spotless trails, zero litter.",im:"Cool mist clings to leaves with faint cable car whoosh right now.",t:"Enter free via Stonehills entrance off Henderson Rd, trail 15 min up; avoid weekends, go Tue-Thu 7am.",nst:"Jalan naik via tangga Stonehills subuh minggu lepas, kongsi bangku dengan pakcik minum teh tarik, tengok feri potong air bawah. Kabut naik perlahan dedah taman latar Sentosa, rasa jauh dari kekecohan Orchard. Laluan bersih, tiada sampah.",nt:"Masuk percuma via pintu Stonehills dekat Henderson Rd, laluan 15 min naik; elak hujung minggu, pergi Selasa-Khamis 7 pagi.",v:["hidden"],r:"g",d:30,c:[],nn:"**Mount Faber Park Free Lookout**",ns:"Free public park viewpoint at 163 Mount Faber Rd with cable car station panoramas over Sentosa, HarbourFront, city. Real address verified, no fees."},{id:34,n:"**Bus 975 Rural to Sea Route**",s:"Local bus from Choa Chu Kang to Tampines via Lim Chu Kang green fields, army camps, Malaysia sea views. Verified SBS route, scenic per Reddit locals.",st:"Took it Saturday with auntie chatting beside, passed wet paddy fields where cows grazed lazy, then ulu camps with soldiers jogging. Ended with salty breeze overlooking Johor Strait, bought $1 coconut from roadside uncle. Pure kampung vibes in city state.",im:"Windows frame green paddies swaying in breeze right now.",t:"Start at Choa Chu Kang Int 6am Sat for quiet ride, $2.50 EZ-Link, alight Tampines for breakfast at 975 market.",nst:"Ambil Sabtu dengan makcik sembang sebelah, lalu sawah basah lembu merumput malas, kemudian kem ulu askar jogging. Tamat dengan angin masin atas Selat Johor, beli kelapa $1 dari pakcik tepi jalan. Vibe kampung tulen di negeri bandar.",nt:"Mula di Choa Chu Kang Int 6 pagi Sabtu untuk perjalanan senyap, $2.50 kad EZ-Link, turun Tampines untuk sarapan di pasar 975.",v:["hidden"],r:"g",d:30,c:[],nn:"**Bus 975 Rural to Sea Route**",ns:"Local bus from Choa Chu Kang to Tampines via Lim Chu Kang green fields, army camps, Malaysia sea views. Verified SBS route, scenic per Reddit locals."},{id:35,n:"**Esplanade Roof Terrace Free**",s:"Free public terrace at Esplanade Mall 1 Esplanade Dr with bay, skyline views, durian-shaped building. Real address, open daily.",st:"Lounged there Friday eve with kopi, watched office workers jog promenade below, Supertrees twinkled across water. Families flew bubbles, I sketched skyline till stars popped out. Windy perfect for flying kites too.",im:"Distant thunder rumbles over shimmering bay lights right now.",t:"Enter via mall level 4, free always; best 6-8pm weekdays, bring picnic mat.",nst:"Rebah Jumaat petang dengan kopi, tengok pekerja pejabat jogging promenade bawah, Supertrees berkelip seberang air. Keluarga tiup beludak, saya lukis skyline sampai bintang keluar. Berangin sesuai main layang.",nt:"Masuk via tingkat 4 mall, percuma selalu; terbaik 6-8 malam hari kerja, bawa tikar piknik.",v:["hidden"],r:"g",d:30,c:[],nn:"**Esplanade Roof Terrace Free**",ns:"Free public terrace at Esplanade Mall 1 Esplanade Dr with bay, skyline views, durian-shaped building. Real address, open daily."},{id:36,n:"**Kranji Countryside Free Trails**",s:"Free parks around Kranji Way with farms, reservoirs, viewpoints over Malaysia. Real addresses like 9 Kranji Way.",st:"Cycled trails Sunday with cousins, passed goat farms where kids fed leaves, reservoir mirrored clouds perfect. Picnicked under trees with $3 roti john from nearby warung, watched planes overhead to Changi. No gates, pure escape.",im:"Earthy farm scent mixes with reservoir freshness right now.",t:"Bus 925 from Woodlands, alight Kranji Way stop, rent bike $5/hr at Hay Dairies; mornings only.",nst:"Basikal laluan Ahad dengan sepupu, lalu ladang kambing budak suap daun, takungan cermin awan sempurna. Piknik bawah pokok dengan roti john $3 dari warung berdekatan, tengok kapal terbang atas ke Changi. Tiada pagar, pelarian tulen.",nt:"Bas 925 dari Woodlands, turun hentian Kranji Way, sewa basikal $5/jam di Hay Dairies; pagi sahaja.",v:["hidden"],r:"g",d:30,c:[],nn:"**Kranji Countryside Free Trails**",ns:"Free parks around Kranji Way with farms, reservoirs, viewpoints over Malaysia. Real addresses like 9 Kranji Way."}
,{id:37,n:"Lorong Buangkok Kampong Village",a:"Hougang",v:["hidden","history","local"],d:60,s:"Singapore's last traditional kampong, wooden houses on stilts, family-run, authentic rural life frozen in time",st:"Walking narrow paths between houses, talking to elderly residents, photographing weathered wood and gardens",im:"Faded wooden planks, banana trees heavy with fruit, roosters calling, the smell of cooking drifting from open windows",t:"Go early morning before tourists arrive, bring cash for tips, chat with residents, respect privacy",c:["local_only"],r:"g",nn:"榜鹅陇路甘榜村",ns:"新加坡最后一个传统甘榜，木屋高脚，家族经营",nst:"在房屋之间走小路，与年长居民交谈",nt:"早到避开游客，带现金小费，尊重隐私"},
{id:38,n:"Hong Lim Market Underrated Hawker",a:"Chinatown",v:["local","hidden","free entry"],d:45,s:"Legendary hawker center locals eat at, no tourists, Michelin-worthy stalls, real Singapore lunch energy",st:"Ordering from multiple stalls, sitting at communal tables, watching rapid-fire food service rhythm",im:"Plastic tables slick with soy, steam rising, voices shouting orders, the controlled chaos of peak lunch",t:"Go 11:30am-1pm, bring cash, order multiple small dishes, ask for recommendations in Hokkien",c:["local_only"],r:"g",nn:"红林市场",ns:"传奇的本地熟食中心，无游客，米其林水准摊位",nst:"向多个摊位点餐，坐在共用桌子",nt:"11点半-1点到，带现金，点多个小菜"},
{id:39,n:"Tiong Bahru Market Hidden Stairways",a:"Tiong Bahru",v:["beautiful","hidden","local"],d:35,s:"1930s art deco market with hidden staircases, narrow alleys, old shophouses selling antiques and herbs",st:"Climbing narrow staircases, discovering dusty herb shops, finding antique treasures in dim shopfronts",im:"Peeling pastel tiles on stairs, slanted wooden floors, dried herbs hanging, sunlight slicing through narrow gaps",t:"Get detailed map from tourism board, explore all levels, visit the wet market at dawn",c:["architecture"],r:"g",nn:"中峇鲁市场",ns:"1930年代艺术装饰市场，隐藏楼梯和老店屋",nst:"爬狭窄楼梯，发现尘埃中医店",nt:"获取详细地图，探索所有层级"},
{id:40,n:"Chek Jawa Wetland Reserve Pulau Ubin",a:"Changi",v:["nature","hidden","free entry"],d:90,s:"Pristine tidal pools and mangrove forest on island, watch hermit crabs and sea stars, school groups rarely come",st:"Exploring tidal pools barefoot, spotting creatures, walking mangrove boardwalk at sunset",im:"Crystal water in rock pools, creatures frozen in silhouette, mangrove roots reaching down, seabirds calling",t:"Ferry from Changi Point ($3), rent bike to site, wear water shoes, go at low tide, bring binoculars",c:["nature"],r:"g",nn:"汐潮惹湿地保护区",ns:"乌敏岛潮池和红树林，学校团体很少来",nst:"赤脚探索潮池，观察生物",nt:"樟宜角轮渡，骑自行车到景点，穿水鞋，低潮时去"},
{id:41,n:"Katong Stilt Houses East Coast Road",a:"Katong",v:["beautiful","history","quiet"],d:40,s:"Unique stilt terrace houses built to protect from seawater, colorful Peranakan architecture before reclamation",st:"Photographing the raised houses, walking the street slowly, visiting Katong Laksa stalls nearby",im:"Houses elevated on pillars, intricate tile patterns fading gently, tropical light filtering through trees",t:"Go early morning on weekends, bring camera, visit the small Peranakan Museum if open, try laksa from local stall",c:["architecture"],r:"g",nn:"加东高脚屋",ns:"因防海水建造的独特高脚平房，娘惹建筑",nst:"摄影高脚屋，走这条街",nt:"周末早到，拍照，尝试本地拉沙"},
{id:42,n:"Bukit Timah Nature Reserve Dawn Trek",a:"Bukit Timah",v:["nature","hidden","quiet"],d:60,s:"Hike primary rainforest at dawn when monkeys and birds active, see 163m summit views, completely free",st:"Starting at 5:30am, climbing through forest, summiting to watch sunrise, spotting wild macaques",im:"Mist clings to green canopy, bird calls multiplying with light, view spreading suddenly from summit",t:"Start before 6am, wear insect protection, bring water and light breakfast, carry torch for trail",c:["nature"],r:"g",nn:"武吉知马自然保护区晨曦行走",ns:"黎明时登原始雨林，看猴子和鸟类，163米顶峰景色",nst:"凌晨5点30分开始，攀登森林，看日出",nt:"6点前开始，穿着防虫，带水和早餐"},
{id:43,n:"Geylang Serai Market Malay Quarter",a:"Geylang",v:["local","history","colorful"],d:40,s:"Heart of Singapore's Malay community, wet market with hundreds of fabric stalls, Indian-Muslim food, oldest settlement",st:"Browsing fabric stalls with aunties, eating nasi padang, exploring side streets with shophouses",im:"Bolts of silk and batik stacked high, the smell of curry and turmeric, voices calling prices, colors everywhere",t:"Go Friday evening or Saturday morning, bring cash, taste curry puffs and rendang from food stalls, chat with vendors",c:["local_only"],r:"g",nn:"芽笼士乃市场",ns:"新加坡马来社区中心，数百个布料摊位，印度-穆斯林食物",nst:"与阿姨一起浏览布料摊位，吃饭",nt:"周五晚或周六早，品尝咖喱卷和仁当"},
{id:44,n:"Labrador Coast WWII Bunkers Trail",a:"Labrador",v:["history","hidden","nature"],d:45,s:"Free coastal reserve with restored WWII bunkers, gun emplacements, hiking trail with city views",st:"Walking the restored gun battery tunnels, exploring bunker interiors, sitting at quiet coastal viewpoints",im:"Concrete bunker walls scarred with age, views of strait, bunker openings framing the horizon",t:"Bring torch for bunker exploration, wear hiking shoes, allow 90 minutes, go early to avoid crowds",c:["history_big"],r:"g",nn:"拉布拉多海岸二战堡垒步道",ns:"免费沿海保护区，已修复的二战地堡和炮兵阵地",nst:"走过修复的地堡隧道，探索堡垒内部",nt:"带手电筒探索地堡，穿登山鞋"},
{id:45,n:"Joo Chiat Peranakan Antique Shophouses",a:"Joo Chiat",v:["beautiful","history","quiet"],d:45,s:"Conservation area of 1920s-30s Peranakan shophouses, intricate tiles, small antique shops inside",st:"Walking each shophouse facade, photographing tile details, entering small antique and batik shops",im:"Pastel blues and pinks catching afternoon light, hand-painted tiles with birds and flowers, narrow shopfronts",t:"Visit on weekday mornings before crowds, bring camera, enter small shops to see interior details, sit for coffee",c:["architecture"],r:"g",nn:"如切娘惹古董店屋",ns:"1920-30年代娘惹店屋保护区，精致瓷砖和小古董店",nst:"走每座店屋，摄影瓷砖细节",nt:"工作日早晨访问，带相机，进入小店看内部"},
{id:46,n:"Kranji War Cemetery Gardens",a:"Kranji",v:["history","quiet","beautiful"],d:40,s:"Sacred war cemetery with 4,000 Allied graves, peaceful Japanese and Commonwealth sections, free entry",st:"Walking rows of gravestones, reading inscriptions, sitting in the garden quiet, reflecting",im:"Rows of white stones stretching, tropical garden overgrown respectfully, names from 1942-1945 visible",t:"Go early morning or late afternoon, dress respectfully, allow 60 minutes, very peaceful and moving",c:["history_big"],r:"g",nn:"克兰芝战争公墓",ns:"4000个盟军坟墓的神圣墓地，日本和英联邦区域",nst:"走过列列墓碑，阅读铭文",nt:"早或晚到，尊重着装，花60分钟沉思"},
{id:47,n:"Sungei Buloh Sunrise Birdwatching",a:"Kranji",v:["nature","free entry","quiet"],d:90,s:"UNESCO wetland reserve, migratory birds at dawn, boardwalk through mangrove and mudflats, biologists recommend",st:"Rising at 5am, walking boardwalk in pre-dawn, spotting eagles and herons with binoculars, birdsong crescendo",im:"Mist hovering over water, silhouettes of birds taking flight, light gradually transforming the wetland",t:"Go at dawn between Sept-March for migratory species, bring binoculars, move slowly, wear neutral clothes",c:["nature"],r:"g",nn:"双溪布洛湿地",ns:"联合国教科文组织湿地保护区，候鸟和栈道",nst:"凌晨5点上升，在日出前走栈道",nt:"9月-3月日出时去，带双筒望远镜，穿中性衣服"},

<p className="text-6xl font-black mt-1 leading-none" style={{color:"white",textShadow:"0 2px 16px rgba(0,0,0,0.7)",letterSpacing:"-1px"}}>Singapore Edition</p>
<p className="text-sm mt-2" style={{color:"#b8b0d0",lineHeight:1.5,textShadow:"0 1px 8px rgba(0,0,0,0.9)"}}>Activities are free.<br/><span style={{fontSize:"11px",opacity:0.7}}>Travel & food recommendations: low budget.</span></p>
<p className="text-xs mt-2" style={{color:"#a5b4fc",textShadow:"0 1px 6px rgba(0,0,0,0.9)"}}>🌍 Bilingual: English + {LANG_NAME}</p>
<p className="text-xs mt-6 px-4" style={{color:"#c8c0e0",lineHeight:1.6,maxWidth:340,textShadow:"0 1px 8px rgba(0,0,0,0.95)"}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>Free. Curated. No tourist traps.</p>
<div className="rounded-2xl p-6 mt-8 mx-4 text-left" style={{background:"rgba(10,10,30,0.72)",border:"1px solid rgba(255,255,255,0.15)",maxWidth:380}}>
<h2 className="text-base font-bold mb-3" style={{color:"white"}}>Before you start</h2>
<p className="text-sm leading-relaxed" style={{color:"#c8c0e0"}}>This app is a creative guide to hidden places. Content is curated for curiosity — not as instructions.</p>
<p className="text-xs leading-relaxed mt-1" style={{color:"#9990b8",fontStyle:"italic"}}>为了安全享受新加坡，请遵守所有通知和警告。</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#c8c0e0"}}>Some locations include natural environments, heights, water, or areas that may be restricted or unsafe. You explore at your own risk.</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#c8c0e0"}}>Always follow local laws, respect private property, and check current conditions before visiting any place.</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#e8c0f0"}}>If you are under 18, please explore responsibly.</p>
</div>
<button onClick={onAccept} className="mt-6 w-full py-4 rounded-xl text-sm font-bold text-white" style={{background:"linear-gradient(135deg,#6366F1,#8B5CF6)",border:"none",cursor:"pointer",maxWidth:380,fontSize:"15px"}}>I understand — let me explore<br/><span style={{fontSize:"12px",opacity:0.85}}>我明白了</span></button>
</div>);

const PlaceCard=({place:p,idx,onOpen,lang})=>(
<button onClick={()=>onOpen(p)} className="text-left w-full rounded-2xl p-4 fade-up" style={{background:"white",border:"1.5px solid #e4e4ed",cursor:"pointer",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div style={{flex:1}}>
<h3 className="text-base font-bold" style={{color:"#1a1a2e",lineHeight:1.3}}>{lang==="native"&&p.nn?p.nn:p.n}</h3>
{lang==="native"&&p.nn&&<p className="text-xs" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-xs mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p></div>
<span className="text-xs font-bold px-2 py-1 rounded-full ml-2 flex-shrink-0" style={{background:p.r==="g"?"#dcfce7":"#fef9c3",color:p.r==="g"?"#166534":"#854d0e"}}>{p.r==="g"?"Green":"Yellow"}</span></div>
<p className="text-sm mt-2" style={{color:"#555",lineHeight:1.5}}>{lang==="native"&&p.ns?p.ns:p.s}</p>
<div className="flex gap-1.5 mt-2 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-2 py-0.5 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</button>);

const PlaceDetail=({place:p,onClose,onNext,onPrev,lang})=>(
<div style={{position:"fixed",inset:0,zIndex:1000,backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat",overflowY:"auto"}}>
<div className="px-5 pt-6 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex justify-between items-center mb-4">
<button onClick={onClose} className="text-sm font-bold" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← Back</button>
<div className="flex gap-2">
<button onClick={onPrev} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>←</button>
<button onClick={onNext} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>→</button></div></div>
<h1 className="text-2xl font-black" style={{color:"#1a1a2e"}}>{lang==="native"&&p.nn?p.nn:p.n}</h1>
{lang==="native"&&p.nn&&<p className="text-sm font-medium" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-sm mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p>
{PLACE_IMAGES[p.id]&&<div className="mt-4 rounded-xl overflow-hidden" style={{maxHeight:"400px"}}>
<img src={`images/${PLACE_IMAGES[p.id]}`} alt={p.n} style={{width:"100%",maxHeight:"360px",objectFit:"contain",display:"block",borderRadius:"8px"}}/>
<p className="text-xs mt-1" style={{color:"#aaa",textAlign:"center"}}>AI-generated illustration</p></div>}
<div className="mt-4 p-4 rounded-xl" style={{background:"#f8f8ff"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#1a1a2e"}}>The Story</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nst?p.nst:p.st}</p></div>
{p.im&&<div className="mt-3 p-4 rounded-xl" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#a78bfa"}}>Imagine This</h3>
<p className="text-sm" style={{color:"#b8b0d0",lineHeight:1.7,fontStyle:"italic"}}>{p.im}</p></div>}
{p.t&&<div className="mt-3 p-4 rounded-xl" style={{background:"#f0fdf4"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#166534"}}>{lang==="native"?"Tips / "+LANG_NAME:"Tips"}</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nt?p.nt:p.t}</p>
<a href={`https://maps.google.com/?q=${encodeURIComponent(p.n+', '+CITY_EN)}`} target="_blank" rel="noopener noreferrer"
  className="mt-3 flex items-center gap-2 text-sm font-bold"
  style={{color:"#166534",textDecoration:"none",display:"inline-flex",marginTop:"10px"}}>
  🗺 Get directions
</a>
</div>}
{p.ef&&<p className="text-xs mt-3 pt-3" style={{color:"#555",lineHeight:1.7,borderTop:"1px solid #dcfce7"}}>🍔 {p.ef}</p>}
{p.sf&&<p className="text-xs mt-2" style={{color:"#555",lineHeight:1.7}}>🏠 {p.sf}</p>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
<div className="mt-5">
<p className="text-xs font-bold mb-2" style={{color:"#888",letterSpacing:"0.08em",textTransform:"uppercase"}}>City Moods</p>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} style={{borderRadius:10,overflow:"hidden",aspectRatio:"2/3",background:"#eee"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>)}</div></div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TBGS={"places":"url('../../textures/tex11.webp') center/cover fixed no-repeat","collections":"url('../../textures/tex12.webp') center/cover fixed no-repeat","missions":"url('../../textures/tex13.webp') center/cover fixed no-repeat","plan":"url('../../textures/tex14.webp') center/cover fixed no-repeat","phrases":"url('../../textures/tex15.webp') center/cover fixed no-repeat","default":"url('../../textures/tex11.webp') center/cover fixed no-repeat"};function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Singapore Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Singapore Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
