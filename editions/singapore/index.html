const P = [
  {id:1,n:"Tiong Bahru Morning Walk",a:"Tiong Bahru",v:["beautiful", "local"],d:45,s:"The most charming 1930s housing estate, art deco architecture, quiet mornings",st:"Walking the streets at 7am, photographing empty courtyards, discovering tiny shops",im:"Soft morning light on faded brick, empty streets, old bicycles leaning against walls",t:"Arrive early, bring a camera, walk slowly, sit at a kopi shop",c:["architecture"],r:"g",nn:"直落亚逸",ns:"新加坡最迷人的1930年代住宅区",nst:"早上7点在街上漫步",nt:"早到，带上相机，慢慢走，在咖啡店坐下"},
  {id:2,n:"Little India Tekka Market at Dawn",a:"Little India",v:["local", "hidden"],d:30,s:"Fresh produce market where Indian residents buy spices, vegetables, flowers at 5am",st:"Walking through narrow stalls, watching vendors arrange flowers and spices",im:"Bright colors exploding, the smell of turmeric and cardamom, voices calling prices",t:"Go at 5:30am, bring cash, ask vendors about ingredients",c:["local_only"],r:"g",nn:"小印度得叻市场",ns:"印度居民购买香料的市场",nst:"黎明时在市场里走动",nt:"凌晨5点30分到达，带上现金"},
  {id:3,n:"Geylang Durian Street Night",a:"Geylang",v:["weird", "local", "night"],d:30,s:"Famous durian stall street with neon signs, selling the king of fruits at night",st:"Buying durian from local stall owners, eating on plastic chairs, tasting varieties",im:"Neon pink and yellow signs, durian shells piling up, the intense smell",t:"Go after 10pm, bring cash, try multiple varieties, sit and chat",c:["night"],r:"y",nn:"芽笼榴莲街",ns:"著名的榴莲摊贩街",nst:"晚上购买榴莲",nt:"晚上10点后到达，尝试多种品种"},
  {id:4,n:"Joo Chiat Peranakan Shophouses",a:"Joo Chiat",v:["beautiful", "history"],d:40,s:"Colorful Peranakan shophouses with ornate tiles, traditional architecture preserved",st:"Walking the street, photographing the shophouses, visiting small antique shops",im:"Pastel blues, greens, pinks, ornate tiles catching light, quiet street",t:"Go early morning, photograph details, visit antique shops inside buildings",c:["architecture"],r:"g",nn:"如切老街",ns:"色彩缤纷的娘惹店铺",nst:"走在街上，摄影精致的建筑",nt:"早到，拜访古董店"},
  {id:5,n:"Labrador Nature Reserve Gun Battery",a:"Labrador",v:["history", "hidden", "free"],d:45,s:"Free nature reserve with WWII gun battery tunnels, hiking trails, no tourists",st:"Exploring the tunnels, walking the coast, finding quiet corners",im:"Dark tunnel walls, views of the strait, birds calling, complete solitude",t:"Bring a torch, wear hiking shoes, explore the entire reserve",c:["nature"],r:"g",nn:"拉布拉多自然保护区",ns:"有二战枪炮的免费保护区",nst:"探索隧道，走沿海步道",nt:"带上手电筒，穿着登山鞋"},
  {id:6,n:"Henderson Waves Bridge",a:"Buona Vista",v:["beautiful", "free"],d:30,s:"Highest pedestrian bridge in Singapore, undulating waves of wood and steel",st:"Walking the entire bridge at sunset, views spreading in all directions",im:"Red wood glowing at sunset, sky turning colors, the city far below",t:"Visit at sunset, bring a camera, walk slowly",c:["high_spots"],r:"g",nn:"亨德森林波桥",ns:"新加坡最高的行人桥",nst:"在日落时走过整座桥",nt:"日落时访问，带上相机"},
  {id:7,n:"Kampong Glam Sultan Mosque",a:"Kampong Glam",v:["beautiful", "history"],d:25,s:"Golden-domed mosque in the historic Malay area, free to visit",st:"Removing shoes, entering the courtyard, feeling the spiritual space",im:"Golden dome reflecting sun, white walls glowing, peaceful courtyard",t:"Visit outside prayer times, dress respectfully, sit in the courtyard",c:["history_big"],r:"g",nn:"苏丹回教堂",ns:"历史悠久的马来社区的清真寺",nst:"进入庭院，体验精神空间",nt:"在祈祷时间外访问，尊重着装"},
  {id:8,n:"MacRitchie Reservoir Jungle Walk",a:"Toa Payoh",v:["nature", "free"],d:60,s:"Forest canopy walk and reservoir, one of the best-kept secrets in Singapore kept secrets, completely free",st:"Walking the 250-meter canopy walk through the trees, then hiking the perimeter",im:"Leaves and branches all around, tropical bird calls, water shimmering",t:"Go early morning, bring water, take the full loop walk",c:["nature"],r:"g",nn:"麦里芝蓄水池",ns:"林间步道和蓄水池",nst:"走过250米的林冠步道",nt:"早到，带水，走完整个循环"},
  {id:9,n:"Pulau Ubin Kampong Village",a:"Changi",v:["hidden", "local", "nature"],d:120,s:"Last traditional village in Singapore on an island, boat from Changi, no cars",st:"Taking the bumboat, cycling or walking the island, meeting villagers",im:"Wooden houses on stilts, chickens roaming, children playing, birds everywhere",t:"Rent a bike, bring cash for food, stay the entire day",c:["local_only"],r:"y",nn:"乌敏岛",ns:"新加坡最后一个传统村庄",nst:"乘坐小船去岛上",nt:"租一辆自行车，花整天时间"},
  {id:10,n:"Bukit Timah Nature Reserve",a:"Bukit Timah",v:["nature", "free"],d:60,s:"Original jungle from Singapore, 50 hectares of primary forest, completely free",st:"Hiking to the summit, watching monkeys and birds, experiencing untouched forest",im:"Dense green canopy, the smell of earth, wildlife sounds everywhere",t:"Start early, bring water, watch for monkeys on the trail",c:["nature"],r:"g",nn:"武吉知马自然保护区",ns:"新加坡原始森林",nst:"登上山顶，观察猴子和鸟类",nt:"带足水，注意猴子"},
  {id:11,n:"Toa Payoh HDB Estate Urban Planning",a:"Toa Payoh",v:["weird", "local"],d:45,s:"The first public housing estate built in 1965, shows urban planning story",st:"Walking the grounds, seeing how 40000 people live in planned harmony",im:"Uniform apartment blocks, basketball courts, void decks full of life",t:"Walk the internal paths, visit the hawker center, observe community",c:["local_only"],r:"g",nn:"大巴窑组屋区",ns:"1965年建造的新加坡第一个公共住房区",nst:"走在地面上，看4万人如何生活",nt:"走内部步道，观察社区"},
  {id:12,n:"Geylang Serai Market",a:"Geylang",v:["local", "free"],d:30,s:"Malay market with food, fabrics, traditional goods, busy and authentic",st:"Browsing stalls, eating at food stalls, meeting traders",im:"Rows of fabric bolts, food smells mixing, voices calling, vibrant colors",t:"Go on Friday evening or Saturday, bring cash, taste everything",c:["local_only"],r:"g",nn:"芽笼士乃市场",ns:"马来市场，食品和织物",nst:"浏览摊位，在食品摊吃饭",nt:"周五或周六到达，品尝一切"},
  {id:13,n:"Maxwell and Old Airport Road Hawker Centers",a:"Bukit Merah",v:["local", "free"],d:45,s:"Two legendary 24-hour hawker centers where locals eat at 3am",st:"Ordering at multiple stalls, tasting the best of Singapore street food",im:"Plastic stools, steam rising, crowds eating quickly, the energy of cheap food",t:"Go late night, bring cash, order multiple dishes per person",c:["local_only"],r:"g",nn:"麦士威和旧机场路熟食中心",ns:"传奇的24小时小贩中心",nst:"在多个摊位点餐",nt:"晚去，多人点多道菜"},
  {id:14,n:"Haw Par Villa Theme Park Free",a:"River Valley",v:["weird", "free"],d:60,s:"Bizarre Chinese mythology theme park, completely surreal, free admission",st:"Walking through grotesque statues and scenes from folklore",im:"Creatures frozen in stone, bright paint peeling, the uncanny valley feeling",t:"Go in the afternoon, bring a camera, allow 90 minutes",c:["parks"],r:"g",nn:"虎豹别墅",ns:"奇特的中国神话主题公园",nst:"在怪异的雕像和民俗场景中漫步",nt:"下午去，带相机，留90分钟"},
  {id:15,n:"Fort Canning Tunnels",a:"River Valley",v:["history", "hidden"],d:30,s:"Secret WWII tunnels where soldiers planned, now open for tours",st:"Walking the tunnels, hearing the history, imagining operations rooms",im:"Dark tunnel walls, old maps on display, echoing footsteps",t:"Take a guided tour, wear comfortable shoes, allow 90 minutes",c:["history_big"],r:"y",nn:"高庄堡垒隧道",ns:"二战士兵规划作战的秘密隧道",nst:"走过隧道，听历史",nt:"参加导览团，舒适的鞋子"},
  {id:16,n:"Sungei Buloh Wetland Reserve Birdwatching",a:"Kranji",v:["nature", "free"],d:60,s:"Wetland reserve with migratory birds, completely free, best at dawn",st:"Watching for eagles and herons, identifying bird species, sitting in silence",im:"Water rippling, birds calling, morning mist, binoculars revealing details",t:"Go at dawn, bring binoculars, wear neutral colors",c:["nature"],r:"g",nn:"双溪布洛湿地保护区",ns:"有候鸟的湿地保护区",nst:"观看老鹰和苍鹭",nt:"黎明去，带双筒望远镜"},
  {id:17,n:"Southern Ridges Forest Trail",a:"Labrador",v:["nature", "free"],d:90,s:"Free forest walk connecting Henderson Waves, Nee Soon Swamp, Mount Faber",st:"Walking the entire trail, pausing at viewpoints, watching the forest change",im:"Green canopy overhead, light filtering through leaves, views opening suddenly",t:"Start early, bring lots of water, allow 2-3 hours",c:["nature"],r:"g",nn:"南脊自然步道",ns:"连接亨德森等地的免费森林步道",nst:"走整条步道，在景点暂停",nt:"早到，带很多水"},
  {id:18,n:"East Coast Park Early Morning",a:"East Coast",v:["local", "quiet"],d:45,s:"Beachfront park where only locals exercise at dawn, no tourists",st:"Walking with the joggers, swimming in the sea, watching sunrise",im:"Pink sky over water, people moving slowly, the sound of waves",t:"Arrive by 6am, bring a towel, swim if desired",c:["parks"],r:"g",nn:"东海岸公园",ns:"早上只有当地人的海滨公园",nst:"与跑步者一起走，游泳",nt:"凌晨6点到达，带毛巾"},
  {id:19,n:"Chinatown Shophouses Discovery",a:"Chinatown",v:["history", "beautiful"],d:35,s:"Historic shophouses with Chinese architectural details preserved",st:"Walking side streets, finding herbal medicine shops, antique dealers",im:"Red lanterns, narrow shopfronts, signs in traditional characters",t:"Get a detailed map, walk every side street, visit small shops",c:["architecture"],r:"g",nn:"牛车水店铺",ns:"保存中国建筑细节的历史店铺",nst:"走小街，找中药店",nt:"带详细地图，走所有街道"},
  {id:20,n:"Clarke Quay Night Market",a:"River Valley",v:["night", "local"],d:45,s:"Riverside night market with food vendors and local crowds, very authentic",st:"Walking through stalls, eating street food, watching people",im:"Red lanterns reflecting on water, smoke rising from stalls, crowds mingling",t:"Go after 9pm, bring cash, expect crowds",c:["night"],r:"g",nn:"克拉码头夜市",ns:"河畔的夜市",nst:"走过摊位，吃街头食物",nt:"晚上9点后去，现金，预期人群"},
  {id:21,n:"Sentosa Island Day Trip",a:"Sentosa",v:["nature", "beautiful"],d:180,s:"Island with beaches, gardens, cable car, and museums, escape from the city",st:"Taking the cable car, exploring gardens, swimming, exploring museums",im:"Island beaches, tropical gardens, cable car gliding over water",t:"Spend the entire day, bring bathing suit, budget money for attractions",c:["parks"],r:"y",nn:"圣淘沙岛",ns:"有海滩和花园的岛屿",nst:"乘坐缆车，探索花园",nt:"花整天时间，带泳衣"},
  {id:22,n:"Marina Bay Floating Platform",a:"Marina Bay",v:["beautiful", "high_spots"],d:20,s:"The free floating platform in Marina Bay, views of the bay and city",st:"Walking out to the platform, sitting and watching the water",im:"Water on all sides, sky reflecting in water, the bay spreading wide",t:"Go at sunset or night, bring a camera, sit for an hour",c:["high_spots"],r:"g",nn:"滨海湾浮动平台",ns:"湾上的免费浮动平台",nst:"走到平台上，观看水",nt:"日落或夜间去，带相机"},
  {id:23,n:"Botanical Gardens Morning Tai Chi",a:"Tanglin",v:["quiet", "beautiful"],d:45,s:"Free botanical gardens with locals practicing tai chi at dawn",st:"Joining the tai chi group, learning movements, watching sunrise in the garden",im:"Morning mist in the gardens, people moving slowly, green everywhere",t:"Arrive before 7am, watch and learn, walk the entire garden",c:["parks"],r:"g",nn:"植物园",ns:"早上有太极的免费植物园",nst:"加入太极小组，学习动作",nt:"早上7点前到达，走遍整个花园"},
  {id:24,n:"Sri Vadapateeshwarar Temple",a:"Little India",v:["history", "beautiful"],d:20,s:"Colorful Hindu temple with carved gopuram, spiritual center of Little India",st:"Removing shoes, entering the temple, feeling the devotion around you",im:"Bright painted sculptures, the smell of flowers and incense, devotional sounds",t:"Visit outside prayer times, dress respectfully, observe quietly",c:["history_big"],r:"g",nn:"施里瓦达帕蒂什瓦拉庙",ns:"小印度的色彩缤纷的印度教庙宇",nst:"进入庙宇，感受虔诚",nt:"在祈祷时间外访问，尊重着装"},
  {id:25,n:"National Museum Singapore",a:"Queenstown",v:["history", "free"],d:90,s:"The story of Singapore from ancient times to today, impressive building and exhibits",st:"Spending 2 hours exploring the galleries, understanding the city journey",im:"Historical artifacts, multimedia displays, the the grand of building halls",t:"Go early, take the audio guide, spend 2 hours minimum",c:["free_museum"],r:"g",nn:"新加坡国家博物馆",ns:"从古代到今天的新加坡故事",nst:"花时间探索画廊",nt:"早到，听音频指南"},
  {id:26,n:"Thian Hock Keng Temple",a:"Chinatown",v:["history", "beautiful"],d:25,s:"Oldest Chinese temple in Singapore, built 1842, still active worship",st:"Entering quietly, observing worshippers, studying the architecture",im:"Carved wood beams, red lanterns, incense smoke, devotional activities",t:"Visit outside services, remove shoes in inner sanctum, observe respectfully",c:["history_big"],r:"g",nn:"天福宫",ns:"新加坡最古老的中国寺庙",nst:"静静地进入，观察礼拜者",nt:"在服务外拜访，尊重观察"},
  {id:27,n:"Changi Prison Museum",a:"Changi",v:["history", "weird"],d:60,s:"Museum in former WWII Japanese POW camp, heavy historical weight",st:"Walking through the museum, reading survivor stories, understanding the war",im:"Stone walls, historical photographs, the weight of history pressing down",t:"Allow 90 minutes, read the stories carefully, sit and reflect",c:["history_big"],r:"g",nn:"樟宜监狱博物馆",ns:"二战日军战俘营的博物馆",nst:"走过博物馆，阅读幸存者故事",nt:"花90分钟，仔细阅读，反思"},
  {id:28,n:"Changi Point Jetty Fishing Boats",a:"Changi",v:["local", "hidden"],d:30,s:"Working fishing jetty with traditional boats, local fishermen still working",st:"Watching boats unload, talking to fishermen, photographing the vessels",im:"Wooden boats, nets drying, the smell of fish, fishermen working",t:"Go early morning, bring cash for tips, be respectful of workers",c:["local_only"],r:"g",nn:"樟宜码头渔船",ns:"工作的渔业码头",nst:"观看船只卸货，与渔民交谈",nt:"早上去，尊重工人"},
  {id:29,n:"Temasek Avenue Night Food Scene",a:"Downtown",v:["night", "local"],d:30,s:"Downtown area comes alive at night with hidden food courts and crowds",st:"Discovering small food courts, eating with office workers on break",im:"Neon signs, people eating quickly, the energy of the city at night",t:"Go after 9pm, bring cash, explore side streets",c:["local_only"],r:"g",nn:"淡滨尼大道夜间食物",ns:"晚上充满活力的食物场景",nst:"发现小食堂，与办公室工作人员一起吃饭",nt:"晚上9点后去，探索小街"},
  {id:30,n:"Singapore Flyer Dawn Experience",a:"Marina Bay",v:["beautiful"],d:45,s:"The huge observation wheel, best experienced at dawn when city wakes",st:"Riding the wheel as the sun rises, watching the city transform below",im:"City lights fading, dawn colors spreading, the wheel turning slowly",t:"Book the earliest slot, bring a camera, enjoy the quiet crowds",c:["high_spots"],r:"y",nn:"新加坡摩天轮",ns:"黎明时的巨大观察轮",nst:"当太阳升起时乘坐轮子",nt:"预订最早的时间段，带相机"},
  {id:31,n:"Supertrees Garden Rhapsody Light Show — Free Evening Spectacle",a:"Marina Bay",v:["beautiful", "free", "weird"],d:15,s:"Eighteen 50-metre trees that light up with synchronized music every night, completely free",st:"Watching the Garden Rhapsody light show at 7:45pm and 8:45pm. The Supertrees illuminate in sequence, a musical performance choreographed to light. The whole landscape becomes a theatre. You\'re watching future-Singapore, built on top of the Marina. It\'s strange and beautiful and completely free.",im:"Thirty-metre trees blazing with light, colours chasing each other up the trunks, music pulsing, shadows cast huge and dancing",t:"Visit anytime 5am–2am. Garden Rhapsody shows at 7:45pm and 8:45pm. Arrive early for a good view. No tickets needed. OCBC Skyway bridge walk is paid.",c:["beautiful", "free_museum", "architecture"],r:"g",nn:"超级树花园幻想曲",ns:"18棵50米的树与同步音乐照亮",nst:"观看花园幻想曲灯光秀。超级树按顺序照亮。",nt:"随时访问下午5点至凌晨2点。"},
  {id:32,n:"Sago Lane Street of the Dead — Chinatown's Macabre Past",a:"Chinatown",v:["history", "weird"],d:25,s:"The street where Chinese death houses once sent the dying, named Sei Yan Kai — Street of the Dead",st:"Walking Sago Lane now is walking through a century of superstition and practicality. Between the 1930s and 1960s, people believed dying at home was inauspicious. They paid a small fee to die in these houses instead. The street also sold coffins, incense paper, funeral clothing. The government banned it in 1961. Now it\'s shops and restaurants, but the weight is still here.",im:"Quiet street with shophouses, memory in the air, the knowledge of what happened here, the past written into the pavement",t:"Walk Sago Lane slowly. The buildings are where it happened. Visit nearby Buddha Tooth Relic Temple for context. No entrance fee for the street.",c:["history_big"],r:"g",nn:"佛爷街",ns:"中国死亡之家曾在这里发送濒临死亡的人",nst:"走佛爷街现在就是走过一个世纪的迷信。",nt:"慢慢走佛爷街。附近有佛牙寺。"},
  {id:33,n:"Singapore Stone Fragment — Undeciphered Ancient Script",a:"Queenstown",v:["history", "hidden"],d:90,s:"Mysterious 10–14th century sandstone carved with Kawi script and Sanskrit, meaning still unknown",st:"The original stone was 10 feet high, found at the mouth of the Singapore River in 1819. The British blew it up in 1843 to build military quarters. Lieutenant-Colonel James Low saved these fragments before the blast. The script is still undeciphered. Scholars think it rewrites Singapore\'s founding date 300 years earlier than 1299. It\'s one of the most mysterious objects in the city.",im:"Ancient sandstone carved with strange symbols, the weathering of centuries, the weight of undiscovered meaning, fragments of a lost story",t:"View the fragment at the National Museum of Singapore. Gallery 1, Singapore History Gallery. Free with museum admission. Takes 30 minutes to see and process.",c:["history_big"],r:"y",nn:"新加坡石头片段",ns:"10-14世纪神秘砂岩刻着卡威文字",nst:"原始石头10英尺高。",nt:"在新加坡国家博物馆查看。免费参观博物馆。"},
  {id:34,n:"Long Bar at Raffles — Where Singapore Sling Was Invented",a:"Downtown",v:["history", "famous"],d:25,s:"1915. Bartender Ngiam Tong Boon mixed gin, grenadine, and fruit juice. The Singapore Sling was born. Still here.",st:"Walking into a bar designed to look like 1920s Malaya. Peanut shells everywhere on the floor — on purpose. Plantation owners started brushing them there a century ago and it became tradition. Nearly 1000 Singapore Slings are made here every day. The drink is pink and sweet and looks like juice but isn\'t. You\'re drinking the invention.",im:"Wood and leather, the long bar gleaming, peanut shells crunching underfoot, the pink drink in the glass, history in the decoration",t:"Expect high prices (SGD 40 for a Sling). Go at happy hour 5–8pm for slightly less expensive. Sit at the bar to watch the bartenders work. Dress neat.",c:["history_big", "famous"],r:"y",nn:"莱佛士长吧",ns:"1915年新加坡司令诞生的地方",nst:"走进一家设计得像1920年代马来亚的酒吧。",nt:"期望高价格。下午5–8点去享受快乐时光。"},
  {id:35,n:"Pasir Ris Park Bird-Watching Tower Sunrise Mangrove",a:"Pasir Ris",v:["nature", "free"],d:60,s:"Three-storey tower inside mangrove forest, unobstructed views, sunrise views are ethereal",st:"Climbing the tower as the sun rises, watching egrets and herons fishing below. The view is completely clear — the mangrove treetops surround you, water stretches wide. This is the spot where photographers come at dawn. Local bird watchers know it. Tourists are rare.",im:"Sun rising over water, egrets taking flight, the mangrove canopy all around, colours bleeding across the sky, complete stillness",t:"Go at dawn (around 6:30am year-round). Bring binoculars and a camera. Wear neutral colors. Allow 90 minutes. Free access.",c:["nature", "high_spots"],r:"g",nn:"巴西立公园观鸟塔",ns:"红树林内的三层塔，无遮挡的景色",nst:"当太阳升起时爬塔。观看苍鹭和白鹭钓鱼。",nt:"黎明去（全年约早上6:30）。带双筒望远镜。"},
  {id:36,n:"Seletar Fishing Village Sunset Secret Spot — Breakwater Discovery",a:"Seletar",v:["beautiful", "hidden"],d:90,s:"The actual best sunset spot in Singapore, breakwater next to a small beach, locals only",st:"The guidebooks send everyone to Marina Bay. Locals come here to Seletar. Small beach with a breakwater stretching into the water. The sun drops directly west. The light turns the water gold. Nobody here. Just fishermen and a few people who know.",im:"Sun touching water, colours multiplying, the breakwater stretching dark against the gold, fishermen with their rods, complete calm",t:"Take bus to Seletar Village. Walk to the waterfront. Bring wine. Go 30 minutes before sunset. Swim after if tide allows.",c:["romantic_water", "beautiful"],r:"g",nn:"实篮渔村日落",ns:"新加坡最美丽的日落地点，防波堤旁",nst:"指南将每个人送到滨海湾。当地人来这里。",nt:"乘坐巴士到实篮村。带酒。日落前30分钟去。"},
  {id:37,n:"Mount Faber Faber Point — Quiet Viewpoint East Coast",a:"Sentosa",v:["beautiful", "free"],d:60,s:"South peak offers bird's eye views of the entire southern coast without crowds",st:"Most visitors go to the Marina Bay viewpoints and fight for space. Faber Point is quiet. The viewing platform offers 360-degree views of islands, the straits, and the coast. You can sit here for an hour without seeing more than 10 people. The sunsets are extraordinary.",im:"City spread wide below, islands scattered in the water, light turning everything gold and red, silence and space",t:"Take cable car up (cost) or hike up (free). From MRT to the starting point, then 45 minutes uphill. Bring water. Sunset is ideal.",c:["high_spots", "beautiful"],r:"g",nn:"法伯山法伯点",ns:"南峰提供整个南海岸的鸟瞰图",nst:"大多数游客去滨海湾。法伯点很安静。",nt:"乘坐缆车上升或徒步上升（免费）。"},
  {id:38,n:"Lower Seletar Reservoir Park Sunset Lesser-Known Spot",a:"Seletar",v:["beautiful", "quiet"],d:90,s:"Peaceful reservoir park, almost nobody here, views across water at golden hour",st:"Walking the perimeter of the lower reservoir as dusk approaches. The water calm and reflective. A few locals fishing. No vendors. No crowds. Just the sound of water and birds. The sunset comes and the whole sky changes.",im:"Water reflecting sky colours, silence broken only by birds, the park completely empty, colours shifting from gold to pink to purple",t:"Take bus to Lower Seletar area. Walk around the entire reservoir (takes 60 minutes). Go 60 minutes before sunset. Bring a friend.",c:["beautiful", "parks"],r:"g",nn:"下实篮蓄水池公园",ns:"安静的蓄水池公园，几乎没人",nst:"走蓄水池的周长。水很平静。",nt:"乘坐巴士到下实篮。走遍蓄水池。"},
  {id:39,n:"Changi Bay Point — Crack of Dawn Seascape Sunrise",a:"Changi",v:["beautiful", "free"],d:60,s:"The exact spot where the sun rises from the sea, unobstructed view, completely local",st:"Arriving at 6am to find fishermen already casting. The sun breaks the horizon perfectly. The water is calm and empty. Light spreads across the water. This is what mornings look like when nobody else is watching.",im:"Sun line rising from water, light spreading fast, colours impossibly vivid, the moment when night becomes day, complete stillness",t:"Go at dawn (around 6:20am, check local sunrise time). Bring a camera and a friend. Sit and watch for 30 minutes. Bring coffee.",c:["high_spots", "romantic_water"],r:"g",nn:"樟宜湾点",ns:"太阳从海面升起的确切地点",nst:"早上6点到达。看到渔民已经在投竿。",nt:"黎明去。带相机和朋友。"},
  {id:40,n:"Yio Chu Kang Swimming Complex — Quiet Lap Pool Community Gem",a:"Toa Payoh",v:["local", "free"],d:60,s:"Open-air Olympic-sized pool where locals do serious swimming, never crowded",st:"Swimming laps in an Olympic-sized pool in the open air. The surrounding neighbourhood is quiet residential. No tourism. Just swimmers focused on their training. The water is clean and cool. Changing rooms are simple. It\'s real community swimming.",im:"Water surface flat, sun bright, lap swimmers moving methodically, quiet neighbourhood sounds, no crowds, just dedication",t:"Entry fee is minimal (SGD 2-3). Go early (7-8am) or late (6-7pm) to avoid small crowds. Bring a towel and goggles.",c:["swimming", "local_only"],r:"g",nn:"尤初港游泳池",ns:"当地人做严肃游泳的开放式奥运池",nst:"在开放式奥运池游泳。邻近的社区很安静。",nt:"门票费很低。早到或晚到。"},
  {id:41,n:"Jurong Lake District Sunrise Walk — Urban Parks Connected",a:"Jurong",v:["nature", "free"],d:120,s:"Two connected lakes with walking trails, peaceful morning vibe, views of water and sky",st:"Walking the trails around Jurong East and West lakes as morning breaks. The parks are connected by trails. Water reflects the sky. Birds are active. Almost nobody is here. It\'s a different Singapore — green and quiet.",im:"Water reflecting dawn colours, trails winding through park, birds calling, the city in the distance but feeling far away",t:"Start at Jurong East Lake, walk the entire loop (90 minutes). Go at dawn. Bring water. It\'s completely free.",c:["nature", "parks", "beautiful"],r:"g",nn:"裕廊湖区日出步行",ns:"两个相连的湖泊和步行道",nst:"当早晨破晓时走路。",nt:"从裕廊东湖开始。黎明去。完全免费。"},
  {id:42,n:"Desker Road Art Alley — Street Art Free Gallery",a:"Little India",v:["street_art", "free"],d:30,s:"Legal street art alley, changing murals and installations, completely free open-air gallery",st:"Walking Desker Road to find walls covered in street art. The pieces change regularly. Local and international artists contribute. The wall space is designated — this is Singapore\'s permission-based street art zone. It\'s vibrant and messy and real.",im:"Colorful murals covering entire walls, layers of paint and meaning, people taking photos, the energy of creation and expression",t:"Go anytime. Photography is encouraged. Early morning light is best for photos. Stop at nearby Little India cafés. Free.",c:["street_art", "free_museum"],r:"g",nn:"德司卡路艺术小巷",ns:"法律街头艺术小巷，不断变化的壁画",nst:"走德司卡路发现墙壁覆盖街头艺术。",nt:"随时去。摄影受到鼓励。免费。"},
  {id:401,n:"Marina Bay Sands at night",a:"Marina Bay",v:["famous","beautiful","high_spots"],d:60,s:"The hotel with a rooftop pool 57 stories up — the view of Singapore\'s entire modern geography from a platform of concrete and sky.",st:"Marina Bay Sands opened in 2010 and immediately became Singapore\'s defining structure. Three towers connected by a curved platform. The rooftop pool is open only to hotel guests (or people who book the observation deck + spa). But the view from outside the building, across the bay at night when the building is lit, is equally powerful.

The Marina Bay complex is best at night. The building lights up. The water reflects everything. You see the entire geometry of modern Singapore: the financial towers of the CBD, the colonial dome of City Hall reflected in water, the gardens below, and the Strait beyond. It\'s a moment of perfect urban clarity.",im:"Standing across from Marina Bay Sands at night, the building illuminated, its reflection in the bay perfect, the city lights spreading.",t:"Marina Bay. Observation deck: SGD $26 (about €18). Open 9:30am-10pm daily. Rooftop pool: hotel guests only or spa booking. MRT to Bayfront. Best 7-9pm.",c:["greatest_hits","beautiful","high_spots"],r:"g",nn:"濱海灣金沙夜間",ns:"擁有57層高屋頂游泳池的酒店 — 從混凝土和天空的平台看新加坡。",nst:"濱海灣金沙於2010年開業，立即成為新加坡的定義結構。三座塔樓由彎曲的平台連接。

濱海灣綜合體在夜間最佳。建築亮起來。水反映一切。",nt:"濱海灣。觀景台：SGD $26。9:30-22:00開放。MRT至貝馬特。"},
  {id:402,n:"Chinatown wet market at dawn",a:"Chinatown",v:["famous","local","free entry"],d:60,s:"Where locals buy vegetables and fish before the tourists wake up — the market that feeds Singapore.",st:"Singapore\'s Chinatown market (Kreta Ayer Market) operates 6am-5pm but it\'s most authentic at 6-7am when vendors are setting up and locals are shopping for the day. The market is covered and smells of fresh vegetables, fish, and herbs. Vendors call prices. Locals choose. There\'s no tourism performance — just commerce.

Buy breakfast at one of the wet market food stalls. Eat what local Singaporeans eat before going to work. The energy is completely different from daytime.",im:"Standing in the market at 6:30am, vendors arranging produce, the smell of fresh herbs and fish, locals shopping.",t:"Chinatown. Kreta Ayer Market, 221 Smith Street. Open daily 6am-5pm. Best 6-7am. Completely free. Food stalls serve breakfast SGD $4-8 (€3-6). MRT to Chinatown.",c:["greatest_hits","local","free entry"],r:"g",nn:"牛車水濕地市場 黎明",ns:"當地人在遊客醒來之前購買蔬菜和魚的地方 — 養活新加坡的市場。",nst:"新加坡牛車水市場（克雷塔艾爾市場）運營6-17，但最真實的是早上6-7點，當小販正在設置時。市場被覆蓋，聞起來像新鮮蔬菜和魚。

在濕市場食物攤位買早餐。吃新加坡人在上班前吃的東西。",nt:"牛車水。克雷塔艾爾市場，221史密斯街。每天6-17開放。最好6-7。食物攤位早餐SGD $4-8。"},
  {id:403,n:"Fort Canning Park",a:"Fort Canning",v:["famous","history","beautiful"],d:90,s:"14 hectares in the middle of the city where Singapore\'s history is buried — fort, cemetery, spice garden, all layered underground.",st:"Fort Canning Park sits on a hill in central Singapore. It was the site of the royal palace during the Malay sultanate. Then the British built a fort here. Then it became a cemetery. Then a park. Now you walk through layers of history: the old gate, the cemetery with 4,000 graves, the underground tunnels from World War II, the spice garden where they\'ve replanted cloves, nutmeg, and other spices that made Singapore rich.

The top of the hill has views over the city. The fort itself is partially restored. The cemetery still has names and dates from the 1800s. This is where you understand Singapore\'s layers of history in a single place.",im:"Walking through the cemetery in the shade of old trees, gravestones from the 1800s visible, the city rising beyond the trees.",t:"Fort Canning. Open daily 5:30am-midnight. Free entry. Small museum (SGD $8). Allow 1.5-2 hours. MRT to Dhoby Ghaut, then walk 10 minutes.",c:["greatest_hits","history_big","beautiful"],r:"g",nn:"芳林公園",ns:"城市中心14公頃，新加坡歷史埋在其中 — 堡壘、墓地、香料花園。",nst:"芳林公園坐落在新加坡市中心的一座山上。這是馬來蘇丹國時期皇宮的所在地。然後英國人在這裡建造了堡壘。然後成為墓地。現在走通過層層。

山頂俯瞰城市。堡壘本身部分恢復。墓地仍然有1800年代的名字和日期。",nt:"芳林。每天5:30-24開放。免費進入。小博物館（SGD $8）。1.5-2小時。MRT至多美歌。"},
  {id:404,n:"Botanic Gardens",a:"Tanglin",v:["famous","beautiful","quiet"],d:120,s:"74 hectares where Singapore built a garden to rival the world\'s best — palms, orchids, water features in a place of complete peace.",st:"Singapore\'s Botanic Gardens were established in 1859 and expanded over decades. They contain 2,300 plant species and manage them impeccably. Walk the Palm Grove, see the orchid collection, sit by the lakes. The gardens are organized but feel natural. The paths are perfect for walking.

At dawn or late afternoon when locals come for their walks and the tour groups have left, the gardens are transcendent. The air is warm and humid. The plants are lush. The water is still. The city is completely blocked out. This is not a tourist attraction — it\'s where Singaporeans go to be in nature.",im:"Walking through the Palm Grove at dusk, sunlight filtering through fronds, the lake visible beyond.",t:"Tanglin. Open daily 5am-midnight. Free entry to general garden. Orchid and other sections: SGD $8. Allow 1.5-2 hours for full visit. MRT to Orchard.",c:["greatest_hits","beautiful","quiet"],r:"g",nn:"植物園",ns:"74公頃，新加坡建造了一個與世界最佳花園相比的花園 — 棕櫚樹、蘭花、水景。",nst:"新加坡植物園成立於1859年，數十年來不斷擴展。它們包含2,300種植物物種。走棕櫚林間林，看蘭花收藏，坐在湖邊。

在黎明或傍晚，當當地人來散步時，花園是超越的。",nt:"塐林。每天5-24開放。免費進入通用花園。蘭花部分：SGD $8。1.5-2小時。"}
];

<div className="mt-5">
<p className="text-xs font-bold mb-2" style={{color:"#888",letterSpacing:"0.08em",textTransform:"uppercase"}}>City Moods</p>

const CollectionView=({col,onOpenPlace,lang})=>{

return <div><div className="flex items-center gap-2 mb-3">

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
const TBGS={"places":"https://mariavheland.github.io/godostuff/textures/tex13.png","collections":"https://mariavheland.github.io/godostuff/textures/tex17.png","missions":"https://mariavheland.github.io/godostuff/textures/tex17.png","plan":"https://mariavheland.github.io/godostuff/textures/tex17.png","phrases":"https://mariavheland.github.io/godostuff/textures/tex13.png","default":"https://mariavheland.github.io/godostuff/textures/tex13.png"};if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length),
  {id:31,n:"Pulau Ubin Island Cycling",a:"Pulau Ubin",v:["nature","hidden","local"],d:60,s:"Car-free island with kampong houses, abandoned quarries, and bike trails that locals use.",st:"Ferry out to Ubin, rent a bike, and discover wooden houses frozen in time. The island feels like 1960s Singapore. Abandoned quarries fill with water, mangrove trails wind through green, and locals fish from rickety platforms.",im:"Pedaling past traditional wooden houses, the sound of cicadas everywhere, sudden water views from the quarry, nobody watching.",t:"MRT to Tanah Merah, bus 2 to Changi Point Ferry (15 min), then 10-minute bumboat to Ubin. Bike rental ~S$5. Best: early morning or weekday.",c:["nature","day_trips"],r:"g",nn:"烏敏島",ns:"没有汽车的岛屿，传统木屋和自行车步道",nst:"坐渡轮到乌敏，租自行车，发现冻结在时间里的木屋。这个岛感觉像1960年代的新加坡。",nt:"地铁到淡滨尼，巴士2号到樟宜码头渡轮（15分钟），然后10分钟小船到乌敏。自行车租赁约5新元。"},
  {id:32,n:"Katong Peranakan Shophouses",a:"Katong",v:["beautiful","history","local"],d:15,s:"Pastel-painted Peranakan shophouses on Joo Chiat Road, a former fishing village neighborhood with actual character.",st:"Walk Joo Chiat and Koon Seng Road. The houses are painted in faded pinks, greens, and blues, with decorative tiles and wooden shutters. Locals live here, not tourists. Smell the spice shops. Watch hawkers in their doorways.",im:"Narrow shophouses in soft colors, lace curtains, the call of fruit vendors, old men on benches, the smell of rattan and spices.",t:"MRT to Eunos, walk to Joo Chiat Road. Browse the shops, eat at hawker stalls, sit on the benches. No entry fees. Best: late morning when locals are shopping.",c:["history_big","parks"],r:"g",nn:"加东峇峇娘惹店铺",ns:"彩色的峇峇娘惹店铺，有真实角色的前渔村邻居",nst:"沿着柔佳和昆城路行走。房屋涂成褪色的粉红色、绿色和蓝色。",nt:"地铁到尤诺士，步行到柔佳路。浏览商店，在小贩摊位吃东西。无需入场费。"},
  {id:33,n:"Henderson Waves Pedestrian Bridge",a:"Henderson",v:["beautiful","high_spots"],d:30,s:"The highest pedestrian bridge in Singapore, a wave-shaped structure where the sunset hits perfectly.",st:"At 36 meters, Henderson Waves curves over the Southern Ridges trail. Come at golden hour. The bridge glows. Below you see the city and the coast. At night, it's lit in white. Locals come here with beer to watch the light change.",im:"Standing on a curved bridge high above the city, the horizon turning orange and pink, the whole island spread out below.",t:"Get off MRT at HarbourFront, follow signs to Southern Ridges. Free. 5pm-7pm for best sunset. Bring a drink, stay till dark.",c:["high_spots","romantic_water","parks"],r:"g",nn:"亨德森波浪桥",ns:"新加坡最高的人行天桥，日落时风景完美",nst:"在36米高处，亨德森波浪弧形跨越南脊步道。黄金时刻来这里。桥闪闪发光。",nt:"地铁在港湾前下车，跟着指示去南脊。免费。下午5-7点最适合日落。"},
  {id:34,n:"Kampong Lorong Buangkok Village",a:"Lorong Buangkok",v:["hidden","local","quiet"],d:25,s:"The last surviving traditional Malay village in Singapore's mainland—wooden houses, roosters, slow time.",st:"This kampong exists in a pocket of the city that hasn't been developed. Wooden houses on stilts, chickens in yards, the sound of conversations in Malay. Old men sit on porches. Kids play. It feels like another century.",im:"Walking between simple wooden houses, roosters calling, laundry hanging, the smell of cooking, complete silence from the city around you.",t:"Difficult to reach by public transport—most visitors drive. Use a taxi to Lorong Buangkok, Sengkang. Walk slowly, respectfully. No photos of people. This is where locals live, not a museum.",c:["history_big","local_only"],r:"y",nn:"榜鹅路村",ns:"新加坡本岛最后幸存的传统马来村庄",nst:"这个村存在于城市未被开发的口袋里。木屋，鸡在院子里，马来语的声音。",nt:"乘出租车到榜鹅路。尊重地行走。不要拍照。这是当地人住的地方，不是博物馆。"},
  {id:35,n:"Bukit Timah Nature Reserve Tracks",a:"Bukit Timah",v:["nature","free"],d:20,s:"Primary rainforest in the middle of the city—hiking trails where you actually hear birds and see wildlife.",st:"Bukit Timah is a 164-hectare nature reserve with trails through actual jungle. The main summit hike is steep but short. You climb through forest that feels untouched. Birds. Trees. No people.",im:"Pushing through vegetation, the air humid and thick, bird calls echoing, sudden glimpses of sky through the canopy.",t:"MRT to Kranji, bus 170 toward Bukit Timah. Free entry. Park at the visitor center. Bring water. The summit is about 20 minutes of steep climbing. Go early morning for birds and quiet.",c:["nature","parks"],r:"g",nn:"武吉知马自然保护区",ns:"城市中心的原始雨林，有实际的野生动物",nst:"武吉知马是164公顷的自然保护区，步道穿过真实的丛林。",nt:"地铁到克兰芝，巴士170向武吉知马。免费入场。早上去听鸟叫和安静。"},
  {id:36,n:"Whampoa Drive Hawker Frenzy",a:"Whampoa",v:["local","free"],d:20,s:"Hawker center where locals queue for specific stalls—trust the lines, the uncles and aunties know.",st:"Whampoa is chaos. Long lines at stalls where one person has been making the same dish for 30 years. The smell of frying, boiling, grilling. Every stall has a line because they're worth it. Sit at plastic tables. Listen to conversations in Hokkien. Eat.",im:"Chaos and noise, steam rising from woks, the smell of chili and garlic, trying three different stalls, strangers at the next table sharing their meal.",t:"Pinggir Whampoa Drive. Open all day. Breakfast, lunch, dinner—each time has different stalls busy. No reservations. Bring cash. Ask locals which line to join—they'll point you to the real ones.",c:["local_only","parks"],r:"g",nn:"黄埔路美食中心",ns:"当地人排队的小贩中心，叔叔阿姨们知道最好的",nst:"黄埔是混乱的。长队伍在摊位前，一个人做了同样的菜30年。",nt:"黄埔路边缘。带现金。问当地人排哪条队伍。"},
  {id:37,n:"Gillman Barracks Art Space Former Military",a:"Gillman Barracks",v:["beautiful","architecture","history"],d:20,s:"Colonial-era military barracks converted into an art complex—timber buildings, galleries, quiet gardens.",st:"Gillman Barracks was a British military camp. Now it's galleries and studios in original colonial architecture. Walk through timber buildings, see contemporary art, sit in manicured gardens. The atmosphere is calm, the building history is everywhere.",im:"Wooden doors and shutters, sunlight through verandas, contemporary art in colonial spaces, quiet courtyards, the smell of old wood.",t:"In Labrador Park area. Free to walk around. Galleries are free entry unless you're seeing a specific exhibition. Bus to the area, then walk. Best: weekday afternoon when it's quiet.",c:["architecture","history_big","parks"],r:"g",nn:"吉灵兵营艺术空间",ns:"转换为艺术综合体的英国军营，有木制建筑和画廊",nst:"吉灵兵营曾是英国军营。现在是原始殖民地建筑中的画廊和工作室。",nt:"在拉布拉多公园区域。步行是免费的。白天下午去。"},
  {id:38,n:"Marina Barrage Sunset Grass Slope",a:"Marina",v:["beautiful","free","quiet"],d:5,s:"A sloped grass hill where the entire city skyline is framed perfectly as the sun sets—locals know it, tourists don't.",st:"Marina Barrage has a massive sloped lawn facing the city. At sunset, the skyline turns pink and gold. Locals sit on the grass with beer and snacks. It's free, it's public, and it's one of the best views in Singapore with zero effort.",im:"Lying on grass, the skyline rising in front of you, the light changing every minute, sitting with strangers who are also quiet.",t:"Free entry to barrage. The grass slope is on the north side. Come 30 minutes before sunset. Bring snacks or beer. Sit, watch, stay till dark.",c:["high_spots","romantic_water","free"],r:"g",nn:"滨海堤坝草坡",ns:"夕阳时整个城市天际线完美显示的草坡",nst:"滨海堤坝有一个巨大的草坡，面向城市。日落时，天际线变成粉红色和金色。",nt:"免费进入堤坝。草坡在北侧。日落前30分钟来。带零食或啤酒。坐着，看着。"},
  {id:39,n:"Tiong Bahru Artisan and Vintage Shops",a:"Tiong Bahru",v:["local","beautiful","history"],d:15,s:"1930s art deco shophouses slowly being gentrified—ceramic shops, vintage bookstores, real neighborhood still.",st:"Tiong Bahru is a 1930s neighborhood with art deco buildings still lived in by locals. Some places stay true—ceramics shops, old bookstores. Others are becoming cafes. Walk slowly. Sit in one of the tiny shops. The neighborhood is changing but not gone.",im:"Pale art deco facades, narrow staircases, a tiny ceramic shop smelling of clay, old men in chair in doorways, the sense of something slowly disappearing.",t:"MRT to Tiong Bahru. Walk the side streets. Enter every small shop. Sit at one of the hawker stalls. Best: early morning when locals are still here before it gets trendy.",c:["architecture","history_big","local_only"],r:"g",nn:"中峇鲁",ns:"1930年代艺术装饰店屋，缓慢变动的邻居",nst:"中峇鲁是1930年代邻居，有艺术装饰建筑，当地人还住在这里。",nt:"地铁到中峇鲁。步行穿过侧街。进入每个小商店。早上去。"},
  {id:40,n:"Kranji War Memorial Cemetery",a:"Kranji",v:["history_big","quiet","scary"],d:25,s:"Commonwealth war cemetery with 4,000+ graves of soldiers from WWII, maintained with perfect geometry, heavy silence.",st:"Kranji holds soldiers from across the Commonwealth who died in Southeast Asia during WWII. The cemetery is serene, perfectly maintained, with rows of headstones facing Mecca (for Muslim soldiers). The silence is profound. Read the stones—they tell a story of war.",im:"Rows of identical white headstones, the smell of tropical flowers, the sound of only birds, reading the inscriptions of young men who died far from home.",t:"Bus 170, 171 to Kranji. Free entry. Open till sunset. Spend an hour, slow. Read the stones. Respect the space—this is not tourism, this is memory.",c:["history_big","scary"],r:"g",nn:"克兰芝战争纪念墓地",ns:"4000+第二次世界大战士兵的坟墓，完全的几何排列，沉默",nst:"克兰芝是东南亚第二次世界大战期间死亡的士兵的墓地。完全沉默。",nt:"巴士170, 171到克兰芝。免费入场。日落前。花一小时，缓慢走。"}
,
  {id:405,n:"Marina Bay Sunrise Jog",a:"Marina",v:['famous', 'high_spots'],d:45,s:"Run along bay at sunrise watching skyline light up.",st:"Start 5:45am Marina Bay route. Temperature perfect. By 6:15am sky orange and pink. Skyline glows. Gardens light up.\n\nRun slow. Pause at Artscience Museum. Watch early joggers. Energy builds.",im:"Bay water, illuminating skyline, gardens, few joggers.",t:"MRT Marina Bay. Route along bay 5km. 5:45am. 1 hour jog.",c:["greatest_hits", 'high_spots', 'beautiful'],r:"g",nn:"Marina灣",ns:"Bay dawn jog",nst:"5:45am start.",nt:"Marina Bay MRT."},
  {id:406,n:"Tiong Bahru Breakfast Alley",a:"Tiong Bahru",v:['famous', 'local'],d:50,s:"Historic neighborhood, breakfast stalls, old shophouses, kaya toast.",st:"Walk 7:30am. Narrow alleys between shophouses. Smell coffee and bread. Stalls opening. Locals sit. Condensed milk dripping into coffee.\n\nOrder kaya toast and eggs. Sound frying, slurping, rapid Mandarin.",im:"Shophouse alley, breakfast stalls, condensed milk coffee.",t:"MRT Tiong Bahru. Walk neighborhood. 7:30am. Breakfast 5-10 SGD. 1.5 hours.",c:["greatest_hits", 'local_only'],r:"g",nn:"大巴窯",ns:"Alley breakfast",nst:"7:30am walk.",nt:"Tiong Bahru MRT."},
  {id:407,n:"Botanic Gardens Orchid Dawn",a:"Novena",v:['famous', 'beautiful'],d:60,s:"Lush tropical gardens with orchid nursery at dawn, quiet pathways.",st:"Enter 5:30am. Pathways empty. Orchids just opening in humidity. Smell flowers and wet earth. Light filters through canopy. Very few people.\n\nWalk slowly by water features. Sit on bench. Listen to birds. By 7am joggers arrive.",im:"Orchid garden, wet earth, tropical canopy, water.",t:"MRT Orchard. Walk to Botanic Gardens. 5:30am. 1.5-2 hours. Free.",c:["greatest_hits", 'beautiful'],r:"g",nn:"新加坡植物園",ns:"Orchid garden dawn",nst:"5:30am opening.",nt:"Orchard MRT."},
  {id:408,n:"Geylang Red Lantern Evening",a:"Geylang",v:['famous', 'local'],d:45,s:"Red Light district with neon, food stalls, complex local energy.",st:"Walk 6pm. Streets still daylight but neon beginning. Eateries packed. Food smell incredible. Street life happening.\n\nWalk slowly. Respect space. Order food. Watch and listen.",im:"Neon street, red lanterns, eateries, food vendors.",t:"MRT Kallang. Walk Geylang streets. 6pm. 1-1.5 hours. Food 20-30 SGD.",c:["greatest_hits", 'local_only'],r:"g",nn:"芽籠",ns:"Red lantern evening",nst:"6pm walk.",nt:"Kallang MRT."},
  {id:409,n:"Chinese Garden Island Tai Chi",a:"Clementi",v:['famous', 'beautiful'],d:90,s:"Traditional Chinese garden on island with pagodas and early tai chi.",st:"Cross bridge 6:30am. Island empty except tai chi groups. Pagodas rise from water. Pathways winding through bamboo. Sound water, birds, gentle movement.\n\nWatch tai chi 15 min. Sit by water. Smell earth and stone.",im:"Chinese pagoda, water reflection, tai chi group, bamboo.",t:"MRT Clementi. Bus/walk to garden. 6:30am. 1.5-2 hours.",c:["greatest_hits", 'beautiful', 'spiritual'],r:"g",nn:"中國園林",ns:"Island pagoda tai chi",nst:"6:30am practice.",nt:"Clementi MRT."},
  {id:410,n:"Kampong Glam Spice Market Walk",a:"Kampong Glam",v:['famous', 'local'],d:50,s:"Malay neighborhood with spice shops, textile vendors, muezzin call.",st:"Walk 2pm. Shops selling spices open air. Cardamom, clove, nutmeg piled. Textile vendors arranging fabrics. Sound negotiation. Smell overwhelming beautiful.\n\nStop café. Coffee and cake. By 5:30pm call to prayer echoes.",im:"Spice piles, textile vendors, narrow street, mosque.",t:"MRT Bugis. Walk Kampong Glam. 2pm. 2 hours. Café 3-5 SGD.",c:["greatest_hits", 'local_only'],r:"g",nn:"甘榜格南",ns:"Spice market walk",nst:"2pm negotiation.",nt:"Bugis MRT."},
  {id:411,n:"Gardens by Bay Supertree Sunset",a:"Marina",v:['famous', 'beautiful'],d:60,s:"Futuristic botanical museum, Supertrees lit at dusk with music.",st:"Arrive 5:15pm. Gardens spacious. By 5:45pm sun setting. Supertrees light with music. Aerial walkway connecting trees—walking in air.\n\nStay until 7pm. Trees fully lit. Light show continuing. Technology and nature blended strange beautiful.",im:"Supertrees illuminated, aerial walkway, sunset, light show.",t:"MRT Bayfront/Marina South. 5:15pm. Entry 42 SGD. 1.5-2 hours.",c:["greatest_hits", 'beautiful'],r:"g",nn:"濱海灣花園",ns:"Supertree lights evening",nst:"5:15pm arrival.",nt:"Bayfront MRT."},
  {id:412,n:"Pulau Ubin Bicycle Island Cycle",a:"East",v:['famous', 'beautiful'],d:120,s:"Small island, bicycle-only, mangrove trails, coastal views, away from city.",st:"Ferry Changi Point 8am to Pulau Ubin. Rent bicycle. Ride through mangrove trails. View coastal. Maybe twenty bikers. Roads tiny and peaceful. Completely away despite 30 min boat.\n\nStop beach café. Swim. Rest. Ride back before 5pm.",im:"Bicycle island path, mangrove trees, coastal view.",t:"Bus Changi Point. Ferry 8am (3-5 SGD). Bike 5-10 SGD. 3-4 hours whole island.",c:["greatest_hits", 'beautiful'],r:"g",nn:"烏敏島",ns:"Island bicycle",nst:"8am ferry start.",nt:"Changi Point. Ferry+bike."},
  {id:413,n:"Fort Canning Park Tunnel Walk",a:"Downtown",v:['famous', 'history'],d:60,s:"Historic park with World War II tunnels, lush grounds, quiet center.",st:"Walk 9am. Park peaceful. Tunnels underground where decisions made during war. Walk slowly. History here.\n\nGround lush and green. Few people. Sound just birds and footsteps.",im:"Historical tunnel interior, lush park, quiet pathways.",t:"MRT Dhoby Ghaut. Walk to Fort Canning. 9am. 1.5-2 hours. Free entry.",c:["greatest_hits", 'history'],r:"g",nn:"芳林公園",ns:"Historic fort tunnels",nst:"9am walk start.",nt:"Dhoby Ghaut MRT."},
  {id:414,n:"Changi Beach Sunrise Walk",a:"East",v:['famous', 'beautiful'],d:45,s:"Long sandy beach, early morning before crowds, listening to waves.",st:"Walk Changi 6am. Beach empty. Sound of waves. Sky turning pink. Sand firm. Walk slowly for one hour.\n\nSit and watch light increase. By 7:30am first walkers arriving.",im:"Long beach, sunrise sky, few people, waves.",t:"MRT Tanah Merah. Bus to Changi. 6am. 1.5 hours. Fresh air and peace.",c:["greatest_hits", 'beautiful'],r:"g",nn:"樟宜海灣",ns:"Beach sunrise walk",nst:"6am tide check.",nt:"Tanah Merah MRT."},
  {id:415,n:"Lau Pa Sat Market Breakfast Chaos",a:"Downtown",v:['famous', 'local'],d:45,s:"Historic 1894 market, local breakfast vendors, chaos at 7am.",st:"Arrive 7am right when vendors open. Stalls filling. Smell eggs and coffee. Locals sitting elbow to elbow. Everything happening fast.\n\nOrder breakfast. Sit. Eat quickly. Watch market dance.",im:"Historic market structure, breakfast stalls, packed locals.",t:"MRT Raffles Place. Walk to Lau Pa Sat. 7am. 45 min breakfast. 5-10 SGD.",c:["greatest_hits", 'local_only'],r:"g",nn:"老巴剎",ns:"Market breakfast rush",nst:"7am opening time.",nt:"Raffles Place MRT."},
  {id:416,n:"Bukit Timah Nature Reserve Hike",a:"Central",v:['famous', 'beautiful'],d:90,s:"Nature reserve with hiking trails through primary forest, Singapore's wildest spot.",st:"Start 7am at Bukit Timah Nature Reserve. Trails winding through forest. Humid and green. Sound of nature. Few people. This is Singapore's wild heart.\n\nWalk three hour loop. Climb to summit. View city through trees.",im:"Forest trail, lush canopy, hiking path, summit view.",t:"MRT Newton. Bus to Bukit Timah entrance. 7am. 2.5-3 hours total. Free.",c:["greatest_hits", 'beautiful'],r:"g",nn:"武吉知馬",ns:"Forest hike reserve",nst:"7am trail start.",nt:"Newton MRT. Bus to start."}];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:"url('https://mariavheland.github.io/godostuff/textures/tex05.png') center/cover no-repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Singapore Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Singapore Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
