const P = [
  {id:1,n:"Horta Museum (Art Nouveau Mansion)",a:"Saint-Gilles",v:["beautiful", "history"],d:1,s:"Victor Horta\'s own house, still breathing.",st:"The architect\'s 1901 residence is a manifesto in curves. Every banister flows. Every mirror frames light. Stained glass. Skylights. Walk up and down stairs just to feel architecture move.",im:"It\'s 1905. Horta works at his desk. Light flows through skylights. Curves aren\'t decoration. They\'re philosophy.",t:"The architect\'s 1901 residence is a manifesto in curves. Every banister flows. Every mirror frames light. Stained glass. Skylights. Walk up and down stairs just to feel architecture move.\",im:\"It\'s 1905. Horta works at his desk. Light flows through skylights. Curves aren\'t decoration. They\'re philosophy.\",t:\"Rue Américaine 25. Open 2pm-5:30pm Wed-Sun. €8. Book ahead. Audio guides excellent. Allow 2 hours.",c:["architecture", "beautiful", "history_big"],r:"g",nn:"Horta Museum (Art Nouveau Mansion)",ns:"Un lieu authentique où les Parisiens se retrouvent.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},
  {id:2,n:"Rue Mouffetard Murals",a:"Saint-Gilles",v:["street_art", "weird", "beautiful"],d:2,s:"Walls that tell stories in impossible colors.",st:"A street dedicated to comic book murals. 15-foot tall characters. Speech bubbles. Heroic poses. Brussels celebrates its comics obsession here. Every wall is Tintin. Every corner is Magritte pretending to be serious.",im:"It\'s 1995. An artist draws comic panels on concrete. By sunset, Rue Mouffetard becomes a strip that moves.",t:"A street dedicated to comic book murals. 15-foot tall characters. Speech bubbles. Heroic poses. Brussels celebrates its comics obsession here. Every wall is Tintin. Every corner is Magritte pretending to be serious.\",im:\"It\'s 1995. An artist draws comic panels on concrete. By sunset, Rue Mouffetard becomes a strip that moves.\",t:\"Rue Mouffetard, full street. Best walked daytime. Photography essential. Free. Check seasonal murals online.",c:["street_art", "beautiful", "weird"],r:"g",nn:"Rue Mouffetard Murals",ns:"Un lieu authentique où les Parisiens se retrouvent.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},
  {id:3,n:"Magritte Museum Hidden Works",a:"Ixelles",v:["hidden", "beautiful", "weird"],d:3,s:"Surrealism\'s most honest confusion.",st:"The museum fills a small mansion. Magritte\'s paintings cover walls. Men in bowlers. Apples hiding faces. His logic breaks language. The museum is intimate. You\'re alone with impossibility.",im:"It\'s 1948. Magritte paints \'Son of Man.\' His face is hidden. Apple obscures eyes. What is hidden becomes visible.",t:"The museum fills a small mansion. Magritte\'s paintings cover walls. Men in bowlers. Apples hiding faces. His logic breaks language. The museum is intimate. You\'re alone with impossibility.\",im:\"It\'s 1948. Magritte paints \'Son of Man.\' His face is hidden. Apple obscures eyes. What is hidden becomes visible.\",t:\"Rue Esseghem 135. Open 10am-5:45pm (closed Mondays). €8. Small but essential. 90 minutes perfect. Audio guides available.",c:["beautiful", "weird", "architecture"],r:"g",nn:"Magritte Museum Hidden Works",ns:"Un lieu authentique où les Parisiens se retrouvent.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},
  {id:4,n:"Grand Place Midnight Architecture",a:"Bruxelles-Centre",v:["beautiful", "history", "night"],d:4,s:"Medieval chaos at eye level.",st:"The Grand Place is guildhalls screaming at each other. Baroque. Renaissance. Gold. Gables. In daylight it\'s tourist chaos. At midnight it\'s lit differently. Empty. Perfect. The buildings reclaim their voice.",im:"It\'s 1700. Guilds build. Each one taller. Richer. By night, the square glows like heaven. Or hell.",t:"The Grand Place is guildhalls screaming at each other. Baroque. Renaissance. Gold. Gables. In daylight it\'s tourist chaos. At midnight it\'s lit differently. Empty. Perfect. The buildings reclaim their voice.\",im:\"It\'s 1700. Guilds build. Each one taller. Richer. By night, the square glows like heaven. Or hell.\",t:\"Grand Place (Grote Markt). Visit midnight 12am-2am. Empty. Quiet. Photography sublime. Street musicians often present.",c:["history_big", "beautiful", "night"],r:"g",nn:"Grand Place Midnight Architecture",ns:"Un lieu authentique où les Parisiens se retrouvent.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},
  {id:5,n:"Galeries Royales Saint-Hubert Passage",a:"Bruxelles-Centre",v:["beautiful", "history", "architecture"],d:5,s:"1847 shopping arcade where elegance is required.",st:"A covered passage lined with shops. Glass ceiling. Marble. Perfection of retail. Nothing\'s changed since 1847. A time machine where you buy coffee. It\'s precious. It\'s fragile. It somehow endures.",im:"It\'s 1850. A lady walks between shops. Gaslight reflects marble. She feels continental. Europe fits in this passage.",t:"A covered passage lined with shops. Glass ceiling. Marble. Perfection of retail. Nothing\'s changed since 1847. A time machine where you buy coffee. It\'s precious. It\'s fragile. It somehow endures.\",im:\"It\'s 1850. A lady walks between shops. Gaslight reflects marble. She feels continental. Europe fits in this passage.\",t:\"Enter from Rue de l\'Ecuyer. Walk full length toward Rue des Bouchers. Free passage. Shops inside. Café au Chocolat (famous) inside. Allow 45 minutes.",c:["architecture", "beautiful", "history_big"],r:"g",nn:"Galeries Royales Saint-Hubert Passage",ns:"Un lieu authentique où les Parisiens se retrouvent.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},
  {id:6,n:"Atomium Internal Stairs",a:"Heysel",v:["architecture", "weird", "beautiful"],d:6,s:"1958 futurism still believing in atoms.",st:"The spheres are Insta-bait. But ride the internal escalators. They feel cosmic. Stand in a chrome sphere. Belgium invented this vision of tomorrow. Tomorrow never came. The optimism remains.",im:"It\'s 1958. Visitors gasp. The future is here. Atoms are beautiful. Tomorrow will be better. (It wasn\'t.)",t:"The spheres are Insta-bait. But ride the internal escalators. They feel cosmic. Stand in a chrome sphere. Belgium invented this vision of tomorrow. Tomorrow never came. The optimism remains.\",im:\"It\'s 1958. Visitors gasp. The future is here. Atoms are beautiful. Tomorrow will be better. (It wasn\'t.)\",t:\"Place de l\'Atomium. Open 10am-6pm daily. €15. Interior worth the money. Café upstairs. Go early or late to avoid crowds.",c:["architecture", "weird", "beautiful"],r:"g",nn:"Atomium Internal Stairs",ns:"Un lieu authentique où les Parisiens se retrouvent.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},
  {id:7,n:"Sabena Airport Abandoned Terminal",a:"Zaventem Area",v:["history", "weird", "architecture"],d:7,s:"Ghost of Belgium\'s airline pride.",st:"Belgium\'s national airline Sabena is gone. The old terminal sits partially abandoned. Brutalist structure. Faded logos. It\'s a monument to national ambition. Developers circle. Nostalgia holds on.",im:"It\'s 1960. Travelers board Sabena flights. Belgium means something global. By 2000, it\'s bankrupt. By 2010, it\'s memory.",t:"Belgium\'s national airline Sabena is gone. The old terminal sits partially abandoned. Brutalist structure. Faded logos. It\'s a monument to national ambition. Developers circle. Nostalgia holds on.\",im:\"It\'s 1960. Travelers board Sabena flights. Belgium means something global. By 2000, it\'s bankrupt. By 2010, it\'s memory.\",t:\"Brussels-Zaventem Airport area. Exterior visible from highway. Interior mostly inaccessible. View from road. Photography okay from distance. Check current status.",c:["history_big", "weird", "architecture"],r:"g",nn:"Sabena Airport Abandoned Terminal",ns:"Un lieu authentique où les Parisiens se retrouvent.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},
  {id:8,n:"Rue de Flandre Flea Market (Weekends)",a:"Saint-Gilles",v:["weird", "local", "free"],d:8,s:"Junk that becomes conversation.",st:"Saturday street market of used goods. Belgian artifacts. Old postcards. Furniture. Clothing. Vendors know history. Prices are fair. Chat happens. It\'s not chaotic. It\'s curated chaos.",im:"It\'s 1989. The market explodes with goods. Cold War artifacts appear. History becomes affordable.",t:"Saturday street market of used goods. Belgian artifacts. Old postcards. Furniture. Clothing. Vendors know history. Prices are fair. Chat happens. It\'s not chaotic. It\'s curated chaos.\",im:\"It\'s 1989. The market explodes with goods. Cold War artifacts appear. History becomes affordable.\",t:\"Rue de Flandre and surrounding area. Saturday 8am-2pm. Weekday options limited. Go early. Bring euros. Cash preferred.",c:["local_only", "weird"],r:"g",nn:"Rue de Flandre Flea Market (Weekends)",ns:"Un lieu authentique où les Parisiens se retrouvent.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},
  {id:9,n:"Saint-Gilles Prison Courtyard (Partial View)",a:"Saint-Gilles",v:["scary", "history", "hidden"],d:9,s:"Where freedom ended and hope began.",st:"A working prison. From outside, you see only walls. But from street, glimpses of courtyard. Political prisoners. Resistance fighters. Housed here. Tours sometimes available if you contact ahead. It\'s haunting even from distance.",im:"It\'s 1943. A resistance member enters. The gate closes. Hope doesn\'t.",t:"A working prison. From outside, you see only walls. But from street, glimpses of courtyard. Political prisoners. Resistance fighters. Housed here. Tours sometimes available if you contact ahead. It\'s haunting even from distance.\",im:\"It\'s 1943. A resistance member enters. The gate closes. Hope doesn\'t.\",t:\"Rue du Puits 3. Exterior visible. Tours occasionally available. Contact museum ahead. Respectful approach required.",c:["history_big", "scary"],r:"y",nn:"Saint-Gilles Prison Courtyard (Partial View)",ns:"Un lieu authentique où les Parisiens se retrouvent.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},
  {id:10,n:"Ixelles Ponds Reflection Walk",a:"Ixelles",v:["beautiful", "quiet", "nature"],d:10,s:"Water that mirrors art nouveau perfection.",st:"Two ponds in Ixelles neighborhood. Surrounded by art nouveau mansions. Walk the perimeter. Reflections. Gardens. It\'s serene. It\'s how Brussels escapes itself. Locals jog. Couples sit. Time bends.",im:"It\'s 1900. An architect designs his villa facing water. Beauty becomes property. Water reflects his ambition.",t:"Two ponds in Ixelles neighborhood. Surrounded by art nouveau mansions. Walk the perimeter. Reflections. Gardens. It\'s serene. It\'s how Brussels escapes itself. Locals jog. Couples sit. Time bends.\",im:\"It\'s 1900. An architect designs his villa facing water. Beauty becomes property. Water reflects his ambition.\",t:\"Etangs d\'Ixelles (Vijvers van Elsene). Start at Place Flagey. Walk full circuit. Free. Cafés nearby. Morning light sublime.",c:["beautiful", "parks", "nature"],r:"g",nn:"Ixelles Ponds Reflection Walk",ns:"Un quartier qui crie ses couleurs sur le béton et l\'histoire.",nst:"Levez les yeux. Les couleurs explosent partout — arabe, chinois, français. Chaque langue. Chaque culture. Le quartier se peint lui-même. C\'est vivant. C\'est vrai. C\'est politique. Les artistes revendiquent les murs depuis les années 2000. Les communautés suivent. Malgré la gentrification, les fresques restent comme témoins du passé.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},
  {id:11,n:"Musée des Instruments de Musique (Music Museum)",a:"Bruxelles-Centre",v:["beautiful", "quiet"],d:11,s:"20,000 instruments frozen in sound.",st:"An art nouveau building filled with instruments from history. Each one silent. Each one capable of sound. Use the audio headsets. When a lute plays in your ear, the room transforms. It\'s magic.",im:"It\'s 1880. An instrument maker tunes a violin. The sound defines perfection. By 2024, it\'s museum. It\'s still perfect.",t:"An art nouveau building filled with instruments from history. Each one silent. Each one capable of sound. Use the audio headsets. When a lute plays in your ear, the room transforms. It\'s magic.\",im:\"It\'s 1880. An instrument maker tunes a violin. The sound defines perfection. By 2024, it\'s museum. It\'s still perfect.\",t:\"Rue de la Monnaie 2. Open 10am-5pm (closed Mondays). €8. Audio guides included. Allow 2 hours. Restaurant upstairs.",c:["beautiful", "quiet", "architecture"],r:"g",nn:"Musée des Instruments de Musique (Music Museum)",ns:"Un lieu authentique où les Parisiens se retrouvent.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},
  {id:12,n:"Rue de Sablons Comic Book Shop Network",a:"Bruxelles-Centre",v:["local", "beautiful", "history"],d:12,s:"Where Tintin was born, still selling dreams.",st:"Multiple comic shops on one street. Belgian comics dominate. Artists used to meet here. They created history. Now shops sell that history. It\'s pilgrimage for fans. It\'s livelihood for dealers.",im:"It\'s 1938. A young artist walks this street. Ideas form. By 1939, Tintin adventures begin here.",t:"Multiple comic shops on one street. Belgian comics dominate. Artists used to meet here. They created history. Now shops sell that history. It\'s pilgrimage for fans. It\'s livelihood for dealers.\",im:\"It\'s 1938. A young artist walks this street. Ideas form. By 1939, Tintin adventures begin here.\",t:\"Rue de Sablons (several shops). Open 10am-6pm. Most accept cards. Conversation flows. Allow 1-2 hours. Gesamtwerk for rare editions.",c:["local_only", "history_big"],r:"g",nn:"Rue de Sablons Comic Book Shop Network",ns:"Un lieu authentique où les Parisiens se retrouvent.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},

  {id:111,n:"Grand Place Midnight Illumination",a:"Centrum",v:["beautiful","free","night"],d:5,s:"UNESCO square flooded with golden light — the most photogenic moment is free",st:"Grand Place is stunning any time, but the 11pm-1am light show transforms it into a jewel box. Sit with a beer and watch the historic guild halls glow. It\'s theatrical and magical without paying for a tour.",im:"Time-travel: Grand Place was gutted by French bombing in 1695, then rebuilt by merchants to prove Brussels\' resilience.",t:"Free. Center of Centrum. Best 11pm-midnight.",c:["romantic_water","architecture"],r:"g",nn:"Grand Place Verlichtingen",ns:"UNESCO-plein verlicht als een juwelkist",nst:"Bekijk het plein in het magische gouden licht.",nt:"Gratis. Midden Centrum. Beste 23-24 uur."},
  {id:112,n:"Horta Museum Stained Glass",a:"Saint-Gilles",v:["art","history","beautiful"],d:12,s:"Art Nouveau master Victor Horta\'s home — a time-capsule of elegant design",st:"The Horta Museum is Horta\'s actual residence, untouched. Every detail screams early-1900s luxury; the stained glass, iron railings, and interior design are obsessive. Locals call it the most perfect Art Nouveau house in Europe.",im:"Time-travel: Built in 1901, Horta\'s home shows the height of Belgian Art Nouveau.",t:"Paid entry (€10). Tram or metro to Saint-Gilles. Guided tours recommended.",c:["architecture","art"],r:"g",nn:"Horta Museum",ns:"Art Nouveau meesterhuis met perfect interieur",nst:"Ontdek het huis van Victor Horta, een kunstwerk zelf.",nt:"Betaald entree. Tram naar Saint-Gilles. Rondleiding aanbevolen."},

{id:125, n:"Grand Place", a:"Centrum", v:["famous", "architecture", "history"], d:30, s:"A UNESCO square surrounded by gilded guild houses — arguably Europe\'s most beautiful central square.", st:"The Grand Place was completely destroyed in 1695 and rebuilt even more elaborately. The buildings are decorated to excess — gilt, carved stone, architectural flourishes everywhere.

You understand why it\'s famous when you stand in the square at dusk. The gilding catches the last light. The scale is perfect for a human being.", im:"Standing in the center at dusk, gilding catching light, buildings glowing.", t:"Centrum. Best time: 4–6pm for afternoon light, or evening when lit. Free to visit. Surrounding cafés are tourist-priced. Night photography is stunning.", c:["greatest_hits", "architecture", "history_big"], r:"g", nn:"Grand Place", ns:"UNESCO-aukio jota ympäröivät kullat kilta-talot.", nst:"Grand Place tuhoutui täysin vuonna 1695.", nt:"Centrum. Paras aika: iltavalo."},
{id:126, n:"Manneken Pis (Honest Take)", a:"Old Town", v:["famous", "weird", "local"], d:20, s:"A 60cm bronze statue of a boy peeing that became Brussels\' most photographed landmark. It\'s absurd, and that\'s the whole point.", st:"The original 1619 bronze is in the Brussels City Museum. What you see in the street is a 1965 replica. The statue has about 1,000 different costumes.

The whole thing is deliberately ridiculous. Brussels built a cult around a boy peeing and committed to it. This is what makes Brussels great — the confidence in its own absurdity.", im:"Standing in front of a tiny bronze boy while tourists take pictures, the absurdity suddenly clear.", t:"Old Town. Always outdoors, always free. Take your photo and move on. Original bronze in City Museum (€10).", c:["greatest_hits", "weird", "local"], r:"g", nn:"Manneken Pis", ns:"60cm pronssipatsas pojasta.", nst:"Alkuperäinen 1619 pronssipatsas on Brysselin kaupunginmuseossa.", nt:"Vanha kaupunki. Aina ulkona, aina ilmainen."},
{id:127, n:"Belgian Chocolate Trail", a:"Various", v:["food", "local", "markets"], d:90, s:"Master chocolatiers throughout Brussels — walk from shop to shop tasting chocolate made hours before you eat it.", st:"Belgian chocolate is a real craft. Chocolatiers apprentice for years. The difference between chocolate made that morning and factory chocolate is immediate.

Walk through the city stopping at small shops. Neuhaus invented the praline in 1912. Independent makers around Rue Haute are better — they\'re doing the actual work.", im:"Biting into a praline still warm from the mold, chocolate snapping apart.", t:"Various locations. Independent makers on Rue Haute are best. Most shops 10am–6pm. Try a single praline before a box. Morning purchases are freshest.", c:["greatest_hits", "food", "markets"], r:"g", nn:"Belgian Suklaapolku", ns:"Mestari suklaanvalmistajat kautta Brysselin.", nst:"Belgalainen suklaa on todellinen käsityö.", nt:"Eri paikat. Rue Haute:lla itsenäiset tekijät."},
{id:128, n:"Art Nouveau Architecture", a:"Various", v:["architecture", "history", "nerd"], d:120, s:"Brussels is where Art Nouveau started — Victor Horta\'s revolutionary houses changed architecture forever. Walk and notice the details.", st:"Art Nouveau was born in Brussels in the 1890s. Victor Horta designed residential houses so revolutionary they changed architecture — curved lines, natural materials, light from glass skylights.

You can see his houses still standing (some are museums), but better is just walking neighborhoods and noticing decorative details — railings shaped like plants, windows at angles, asymmetrical facades.

Art Nouveau buildings still work as homes and shops — they\'re not museum pieces. They\'re lived in.", im:"Running your hand along an iron railing shaped like plants, understanding someone chose this detail.", t:"Neighborhoods: St-Gilles, Ixelles, Sablon. Horta Museum (his house): €11. Better to wander these neighborhoods. Most buildings are private homes — see exteriors from street.", c:["greatest_hits", "architecture", "nerd"], r:"g", nn:"Art Nouveau arkkitehtuurikierros", ns:"Brysseli on jossa Art Nouveau alkoi.", nst:"Art Nouveau syntyi Brysselissä 1890-luvulla.", nt:"Naapurustot: St-Gilles, Ixelles, Sablon."},

{id:129, n:"Sablon Neighborhood", a:"Sablon", v:["neighbourhoods", "art", "antique"], d:120, s:"A neighborhood of antique shops, galleries, cafés, and Art Nouveau townhouses where Brussels feels like itself, not like a capital.", st:"Sablon is where Bruxellois (the locals) actually come to spend Saturday. The square has antique markets on weekends. Around it are small galleries, antique shops run by people who care about the objects they sell, restaurants where the owners are usually in the kitchen.

The buildings are 19th-century townhouses, many in Art Nouveau style. The neighborhood wasn\'t gentrified — it gentrified itself. It\'s never become corporate. It\'s stayed the way Brussels likes to be: understated, slightly scruffy, genuinely good.", im:"Browsing an antique shop window, noticing the objects — old maps, Art Deco boxes, things with history.", t:"Sablon (metro: Sablon or Porte de Namur). Antique market: Saturday and Sunday mornings. Shops mostly open 10am–6pm. Cafés are excellent — Les Cures or Café Bla are good. Wander slowly, this is not a destination neighborhood but a place to spend hours.", c:["neighbourhoods", "art", "shopping"], r:"g", nn:"Sablon Naapurusto", ns:"Naapurusto antiikki kauppa, galleriat, kahvilat.", nst:"Sablon on jonne Bruxellois tosiasiassa tulevat lauantaina.", nt:"Sablon (metro). Antiikki markkina: lauantai ja sunnuntai aamulla."}];

<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:`url(\'${TBGS[tab]||TBGS.default}\') center/cover no-repeat`}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Brussels Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Brussels Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
