<script>
const P = [
  {id:1,n:"Hinterhöfe of Sophienstraße",a:"Mitte",v:["hidden", "history"],d:1,s:"Courtyards that survived the war",st:"Walk through the doorways and find chains of hidden courtyards dating to the 1800s. Most survived the bombing. Old signage on the walls if you look up.",im:"It\'s 1920. Workshops — tailors, metalworkers, printing presses. Kids running between buildings. The city roaring into the Weimar Republic.",t:"Many courtyards are semi-public and accessible through unlocked doorways. Be quiet and respectful — people live here.",c:["courtyards"],r:"g",nn:"Hinterhöfe der Sophienstraße — Mitte",ns:"Versteckte Welten im Zentrum — Hinterhöfe, die den Krieg überlebt haben",nst:"Du gehst durch eine unscheinbare Toreinfahrt und plötzlich stehst du in einer ganz anderen Welt. Alte Backsteinwände, baumelnde Wäscheleinen, die Zeit bleibt stehen. Hier tickt Berlin noch wie damals.",nt:"Kostenlos. Sophienstraße in Mitte, einfach durch die Toreinfahrten gehen. Am besten tagsüber und leise sein — es wohnen Menschen dort."},
  {id:2,n:"Invalidenfriedhof",a:"Mitte",v:["quiet", "history"],d:2,s:"A cemetery split by the Wall",st:"Military cemetery from 1748 cut in half by the Berlin Wall. Graves destroyed for the death strip. You can see where the Wall ran.",im:"1961. Soldiers stringing barbed wire through a cemetery. The dead on one side, families on the other, unable to visit for 28 years.",t:"Scharnhorststraße. Free, daylight hours. Almost nobody comes.",c:["scary", "history_big"],r:"g",nn:"Invalidenfriedhof — Mitte",ns:"Ein Friedhof, durch den die Mauer schnitt — doppelt getrennt",nst:"Du stehst auf diesem Friedhof und siehst noch immer: wo die Mauer den Boden spaltete. Gräber zerstört, Familien auf einer Seite, ihre Toten auf der anderen. 28 Jahre ohne Besuch.",nt:"Kostenlos. Scharnhorststraße in Mitte. Tagsüber offen. Fast niemand kommt hin."},
  {id:3,n:"Ghost stations of the U-Bahn",a:"Mitte",v:["weird", "history"],d:3,s:"Abandoned platforms you pass through on the train",st:"Cold War: several U-Bahn stations sealed shut. West Berlin trains passed without stopping. Ghostly platforms with armed guards. Some still have DDR tiles.",im:"A West Berlin train in 1975. It slows through a station but doesn\'t stop. Through the window — a platform in the dark. A soldier stares back. Then blackness.",t:"Ride U6 between Friedrichstraße and Kochstraße. Nordbahnhof has a free exhibition.",c:["scary", "history_big"],r:"g",nn:"Geisterstationen der U-Bahn — Mitte",ns:"Bahntunnel voller Soldaten im Dunkeln — willkommen im Kalten Krieg",nst:"Du sitzt 1975 in einer West-Berlin U-Bahn. Der Zug verlangsamt sich, hält aber nicht. Durch die Scheibe: eine Bahnsteig im Dunkeln. Ein bewaffneter Soldat starrt zurück. Dann Schwärze.",nt:"U6 zwischen Friedrichstraße und Kochstraße fahren. Nordbahnhof hat kostenlose Ausstellung. Augen offen halten beim Durchfahren."},
  {id:4,n:"Dorotheenstädtischer Friedhof",a:"Mitte",v:["quiet", "beautiful"],d:4,s:"Where Hegel, Brecht, and Fichte are buried",st:"Small cemetery where some of history\'s most important thinkers are buried. Hegel. Brecht. Heinrich Mann. Peaceful, overgrown, barely visited.",im:"Brecht\'s funeral, 1956. East Berlin intellectuals in the rain, knowing the state they believed in was cracking.",t:"Free. Chausseestraße 126. Daylight hours.",c:["famous_dead", "parks"],r:"g",nn:"Dorotheenstädtischer Friedhof — Mitte",ns:"Wo Hegel, Brecht und Fichte im Gras liegen — Friedhof für Denker",nst:"Dieser kleine Friedhof ist wild und verwachsen, und hier liegen die Denker, die Deutschland geprägt haben. Brecht ist hier. Hegel ist hier. Es ist still und kaum jemand kommt vorbei.",nt:"Kostenlos. Chausseestraße 126 in Mitte. Tagsüber offen. Morgens wenn der Tau noch auf dem Gras liegt."},
  {id:5,n:"Humboldt Forum roof terrace",a:"Mitte",v:["beautiful", "free"],d:5,s:"Best free view in central Berlin",st:"Free rooftop terrace — TV tower, Museum Island, Unter den Linden. Most tourists pay to go inside. The terrace is free and almost nobody goes up.",im:"Prussian royal palace. Then DDR parliament. Then empty lot. Now palace again. 500 years of reinvention.",t:"West side entrance, elevator to terrace. Free. Best at golden hour.",c:["high_spots"],r:"g",nn:"Humboldt Forum Dachterrasse — Mitte",ns:"Kostenloses Dach mit der besten Aussicht — während alle unten zahlen",nst:"Während Tausende unten 13 Euro für einen Kaffee zahlen, stehst du kostenlos oben und schaust auf Fernsehturm, Museumsinsel, ganz Berlin zu deinen Füßen.",nt:"Kostenlos. Westeingang, Aufzug zur Terrasse. Keine Warteliste. Best bei Sonnenuntergang."},
  {id:6,n:"Monbijoupark at midnight",a:"Mitte",v:["local", "night"],d:6,s:"The Spree at night with Museum Island glowing",st:"After dark this park transforms. Museum Island lit up across water. Free swing or tango nights in summer. The view alone is worth it.",im:"1750 — garden of palace Monbijou. Nobility walking by torchlight along the same riverbank. The cathedral doesn\'t exist yet.",t:"Best visited in summer evenings when the park is busy. Bring a blanket. Visit with friends.",c:["romantic_water"],r:"y",nn:"Monbijoupark nachts — Mitte",ns:"Nachts ein anderer Ort: Der Fernsehturm zeichnet sich grau gegen den Himmel ab",nst:"Du sitzt hier nachts auf der Wiese und der Fernsehturm strahlt rot über Mitte. Die Stadt ist wach, aber der Park ist leer. Nur du und Berlin.",nt:"Kostenlos. Am Wochenende voll, aber nachts fast leer. Bring was zu trinken mit."},
  {id:7,n:"Bebelplatz",a:"Mitte",v:["history", "quiet"],d:7,s:"Where the Nazis burned 20,000 books",st:"On May 10, 1933, Nazi students burned 20,000 books here. A glass panel in the ground shows empty white bookshelves below — a memorial to the books that were destroyed. Look down through the glass at night when it\'s lit.",im:"The fire is enormous. Students throwing books by Freud, Einstein, Mann, Kafka. A crowd watches. Heinrich Heine wrote: \'Where they burn books, they will also burn people.\'",t:"Free, always accessible. Best at night when the underground memorial is lit. Look for the glass square in the pavement.",c:["scary", "history_big"],r:"g",nn:"Bebelplatz — Mitte",ns:"Der Platz der verbrannten Bücher — Deutschlands dunkelste Nacht",nst:"Hier haben Nazis 1933 Bücher verbrannt. Jetzt ist es ein Platz wie jeder andere, aber unter deinen Füßen ist eine Glasplatte. Darunter: leere weiße Regale. Erinnerung an Auslöschung.",nt:"Kostenlos. Tagsüber offen. Nacht einsam. Glasplatte ist versteckt im Boden — guck genau hin."},
  {id:8,n:"Hitler\'s bunker site",a:"Mitte",v:["history", "weird"],d:8,s:"A parking lot where the war ended",st:"This is where Hitler spent his last days and killed himself. There\'s no monument — just a car park and an information board. The deliberate ordinariness is the point. The most evil man of the 20th century ended in a hole under a parking lot.",im:"April 1945. Underground, the dictator rages at maps while the city above burns. Soviet shells shake the ceiling. Then a gunshot. Then silence.",t:"Near In den Ministergärten / Gertrud-Kolmar-Straße. Just a parking lot with an info sign. That\'s all.",c:["scary", "history_big"],r:"g",nn:"Hitlers Bunker Stelle — Mitte",ns:"Nichts ist hier außer Gras — die Tiefe und das Versteckte",nst:"Du stehst auf Rasen und merkst: unter deinen Füßen war Führerbunker. Kein Denkmal, kein Museum, nur Gras. Berlin hat gewählt: Vergessen statt Ruhmrederei.",nt:"Kostenlos. Zwischen Reichstag und Tiergarten. Schild erklärt was hier war. Spaziergang, als würde es nie passiert sein."},
  {id:9,n:"Reichstag dome",a:"Mitte",v:["free", "beautiful"],d:9,s:"Free but register online first",st:"Glass dome of parliament — spiral ramp with audio guide, looking into the chamber and over Berlin. Burned 1933, bombed 1945, wrapped by Christo 1995, rebuilt by Foster.",im:"Looking down into democracy. Then up through glass at sky. The architect put the people above their politicians.",t:"Register free at bundestag.de days in advance.",c:["high_spots", "history_big"],r:"g",nn:"Reichstag Kuppel — Mitte",ns:"Glaskuppel — wo Worte Luft sind und Macht hier lebt",nst:"Du gehst in den Reichstag rein und siehst Glas und Stein und Geschichte. Von oben schaut du auf Berlin und merkst: das ist Macht. Und das Glas zeigt: wir sehen dich.",nt:"Kostenlos aber Anmeldung nötig (online). Aussicht großartig. Nachts schön beleuchtet. Morgens weniger Leute."},
  {id:10,n:"Hackesche Höfe",a:"Mitte",v:["beautiful", "local"],d:10,s:"Berlin\'s most famous courtyard complex — 8 connected courtyards",st:"Eight interconnected courtyards from 1906 with Art Nouveau tile facades, galleries, cafés, a cinema, and a theater. The first courtyard is stunning — blue and gold Jugendstil tiles on every wall.",im:"Imagine 1906: this was a revolutionary idea — connecting residential, commercial, and cultural spaces through courtyards. Light and air for everyone, not just the rich.",t:"Rosenthaler Straße 40-41. Free to walk through all 8 courtyards. Go deep — courtyard 5 and beyond get quieter.",c:["courtyards", "staircases"],r:"g",nn:"Hackesche Höfe — Mitte",ns:"Kaufhof-Hof voll Läden — Berlin wird kommerziell",nst:"Du gehst durch acht Innenhöfe, jeder schöner als der letzte. Art-Deco Fassaden, Restaurants, Läden. Es ist hübsch, aber es kostet. Das ist Berlin 2020: schön, aber für Geld.",nt:"Kostenlos zum Schauen. Läden und Restaurants teuer. Best tagsüber. Nacht macht es weniger Sinn."},
  {id:11,n:"Viktoriapark waterfall & monument",a:"Kreuzberg",v:["beautiful", "nature"],d:11,s:"A 24m waterfall and the highest point in inner Berlin",st:"A genuine waterfall cascading down rocks. Built 1894. At the top: the iron cross monument that gave Kreuzberg its name, and a panoramic view of the city.",im:"Workers hauling massive boulders up a hill to create a fake mountain waterfall in flat Berlin. A city dreaming itself into a landscape.",t:"Kreuzbergstraße entrance. Climb to the top. Free.",c:["high_spots", "parks", "romantic_water"],r:"y",nn:"Viktoriapark Wasserfall & Denkmal — Kreuzberg",ns:"Park auf Hügel mit Wasserfall — Kreuzberg schaut auf dich runter",nst:"Du sitzt auf diesem Hügel und schaust auf Berlin. Wasserfall rauscht neben dir. Kriegerdenkmal schaut dich an. Es ist schön und es ist Geschichte.",nt:"Kostenlos. Hügel raufgehen anstrengend aber lohnt sich. Biergarten unten günstig. Sommer populär, deshalb früh kommen."},
  {id:12,n:"Markthalle Neun",a:"Kreuzberg",v:["local", "free"],d:12,s:"1891 iron market hall — free to wander",st:"Gorgeous iron hall. Thursday is Street Food Thursday — even without buying, the atmosphere and architecture are electric.",im:"1891 — gas lamps, horse carts, women buying potatoes. Same iron columns, same roof, same light.",t:"Eisenbahnstraße 42/43. Thursday from 5pm.",c:[],r:"g",nn:"Markthalle Neun — Kreuzberg",ns:"Markthalle mit Food und Kultur — Essen ist hier Kunstwerk",nst:"In dieser Markthalle verkaufen Leute gutes Essen. Nicht billig aber frisch. Du isst während hundert Menschen zugucken. Donnerstag Street Food Wahnsinn.",nt:"Kostenlos herumgehen. Essen kostet aber lohnt sich. Donnerstag Street Food. Samstag auch. Komm früh, beste Plätze weg um 19 Uhr."},
  {id:13,n:"Turkish market Maybachufer",a:"Kreuzberg",v:["local", "beautiful"],d:13,s:"A canal-side market that feels like Istanbul",st:"Tuesdays and Fridays — olives, bread, fabrics, spices along the Landwehrkanal. The canal sparkles. Börek fills the air.",im:"A Turkish family in 1960s Kreuzberg. Homesick. Then slowly building this — a piece of home by a Berlin canal.",t:"Maybachufer, Tue and Fri mornings.",c:["romantic_water"],r:"g",nn:"Türkischer Markt Maybachufer — Kreuzberg",ns:"Markt voller Sprachen — ganz Welt in Kreuzberg",nst:"Du gehst durch diesen Markt und hörst zehn Sprachen. Gemüse, Fleisch, Trockenobst. Es riecht nach überall. Das ist Berlin-Türkei.",nt:"Kostenlos zum Gucken. Mittwoch-Samstag offen. Geld mitbringen zum Einkaufen. Morgens frische Ware, abends billiger."},
  {id:14,n:"Böcklerpark canal steps",a:"Kreuzberg",v:["quiet", "nature"],d:14,s:"Stone steps right at the water",st:"Wide steps down to the Landwehrkanal. Sit with feet almost in water, watch boats. Mediterranean quay vibes with a döner shop behind you.",im:"This canal was hand-dug in the 1850s by workers from the slums. The same water that was once a sewer.",t:"South side of Landwehrkanal near Prinzenstraße.",c:["romantic_water"],r:"g",nn:"Böcklerpark Kanaltreppe — Kreuzberg",ns:"Geheime Treppe zum Kanal hinunter — versteckte Oase",nst:"Von oben sieht man diesen Park nicht. Aber du findest die Treppen, und plötzlich sitzt du am Kanal, unter der Straße. Wasser und Grün überall. Die Stadt ist oben und du bist unten.",nt:"Kostenlos. Versteckt zwischen Häusern. Karte brauchst du. Boot fahren möglich. Stille, die du in Kreuzberg sonst nicht findest."},
  {id:15,n:"Landwehrkanal at golden hour",a:"Kreuzberg",v:["beautiful", "quiet"],d:15,s:"The canal turns gold for 20 minutes every evening",st:"Around sunset, the canal between Kottbusser Brücke and Paul-Lincke-Ufer glows. Houseboats, swans, willows — all in gold. Lasts 20 minutes.",im:"Rosa Luxemburg was killed and thrown in this canal in 1919. Now Kreuzberg sits in evening light, grateful to be alive.",t:"Paul-Lincke-Ufer facing west, 30 min before sunset.",c:["romantic_water", "history_big"],r:"g",nn:"Landwehr-Kanal Goldene Stunde — Kreuzberg",ns:"Kanal bei Sonnenuntergang — Licht macht alles schön",nst:"Du sitzt am Kanal und die Sonne geht runter. Das Wasser wird Gold. Spiegelbild der Häuser tanzt. Alle anderen Touristen gucken woanders hin.",nt:"Kostenlos. Immer offen. Golden hour ist eine Stunde vor Sonnenuntergang. Kamera bereit. Vögel schön fotografieren wenn du ruhig bist."},
  {id:16,n:"Görlitzer Park railway embankment",a:"Kreuzberg",v:["hidden", "nature"],d:16,s:"Elevated secret corner nobody walks to",st:"Nobody walks to Görli\'s southeast corner where the old railway embankment rises. Hidden community garden, elevated Kreuzberg rooftop views.",im:"This was Görlitzer Bahnhof. Steam trains from Saxony. All gone. Grass where tracks were.",t:"Southeast corner near Wiener Straße.",c:["parks"],r:"g",nn:"Görlitzer Park Bahnböschung — Kreuzberg",ns:"Wilde Böschung voller Künstler und Tiere — unkontrolliert und echt",nst:"Diese Böschung neben dem Park ist wild. Graffiti überall, Käfer überall, Leben überall. Es ist hässlich und es ist schön. Das ist Kreuzberg.",nt:"Kostenlos. Teil vom Görlitzer Park. Nachts weniger sicher. Tagsüber chill. Künstler arbeiten manchmal hier."},
  {id:17,n:"Where Rosa Luxemburg was murdered",a:"Kreuzberg",v:["history", "quiet"],d:17,s:"A bridge with a memorial where a revolutionary was killed",st:"On January 15, 1919, Rosa Luxemburg was beaten, shot, and thrown into the Landwehrkanal from the Lichtensteinbrücke. A small cross and flowers mark the spot on the canal bank. Most people walk right past.",im:"Soldiers drag a woman to a bridge in the winter dark. A gunshot. A splash. The water closes over one of the 20th century\'s most brilliant minds.",t:"Lichtensteinbrücke / Katharina-Heinroth-Ufer on the canal. A small memorial is on the bank. Quiet and unnoticed.",c:["history_big", "scary", "famous_dead"],r:"g",nn:"Wo Rosa Luxemburg ermordet wurde — Kreuzberg",ns:"Revolutionärin ins Wasser geworfen — Märtyrer ohne Denkmal",nst:"Rosa Luxemburg wurde 1919 in der Spree ertränkt. Hier. Der Fluss floss damals noch rot. Jetzt ist es einfach Wasser. Die Stadt hat es vergessen, aber Geschichte bleibt.",nt:"Kostenlos. Landwehrkanal Nähe. Gedenktafel suchen. Künstler haben Kunstwerk hier gemacht. Wichtig zu wissen."},
  {id:18,n:"Körnerpark",a:"Neukölln",v:["beautiful", "hidden"],d:18,s:"A sunken Baroque garden nobody knows",st:"Below street level — a miniature Versailles. Waterfalls, colonnades, hedges. Built 1916 on a gravel pit. Free gallery.",im:"Someone turned a hole in the ground into a palace garden for working-class Neukölln.",t:"Enter from Schierker Straße — you descend steps.",c:["parks", "courtyards"],r:"g",nn:"Körnerpark — Neukölln",ns:"Park wie eine kleine Perle — Neukölln aus einer anderen Zeit",nst:"Dieser Park ist klein und sauber und schön. Brunnen, alte Bäume, wenig Leute. Neukölln hat viele Orte, aber dieser Park ist Traum.",nt:"Kostenlos. Neukölln Süd. Zu Fuß beste Weg. Ruhig morgens, Ästhetik-Fans überall Samstag. Café nebenan."},
  {id:19,n:"Tempelhofer Feld at night",a:"Neukölln",v:["vast", "night"],d:19,s:"Walk an airport runway under the stars",st:"At night, runways stretch into darkness. The city glows at edges. Above: more sky than seems possible in a city.",im:"1948. Every 90 seconds, a plane with food, coal, medicine. 2 million surviving on what comes through the sky.",t:"Columbiadamm entrance. Open until dusk (summer = very late).",c:["romantic_water", "history_big", "high_spots"],r:"y",nn:"Tempelhofer Feld nachts — Neukölln",ns:"Mega-Flughafen voller Dunkelheit und Schatten — spooky schön",nst:"Nachts ist dieses Feld anders. Schatten überall, Wind heult, die Startbahn wird zu Mondlandschaft. Du fährst Fahrrad und merkst: ich bin allein auf Startbahn.",nt:"Kostenlos. Aber dunkel und spooky. Nur mit Licht fahren. Nachts ruhig, tagsüber manche Bereiche gesperrt für Sicherheit."},
  {id:20,n:"Comenius Garden",a:"Neukölln",v:["hidden", "quiet"],d:20,s:"A philosophical garden behind a wall",st:"Behind an unmarked wall — a garden designed around 17th-century philosopher Comenius. Paths = stages of life. Plants chosen for symbolic meaning.",im:"Comenius believed every person deserved education and beauty. A free thinking space hidden in Berlin\'s poorest neighborhood.",t:"Richardstraße 35. Small gate. Daylight hours.",c:["parks"],r:"g",nn:"Comenius Garten — Neukölln",ns:"Gemeinschaftsgarten voller Hoffnung — wo Nachbarn zusammen pflanzen",nst:"In diesem Garten pflanzen Nachbarn zusammen Gemüse. Es ist klein aber es ist gemacht mit Liebe. Jeder Beet hat eine Geschichte.",nt:"Kostenlos. Sommer am besten. Helfen willkommen. Neukölln-Süd. Erde und Wasser brauchst du."},
  {id:21,n:"Neukölln Arcaden car park rooftop",a:"Neukölln",v:["weird", "secret"],d:21,s:"Parking garage with 360° views",st:"Top floor of the parking structure. 360° view of south Berlin. Nobody else up here. Completely public.",im:"All the shoppers below, unaware the best view in Neukölln is above their heads.",t:"Karl-Marx-Straße. Elevator to top. Free.",c:["high_spots"],r:"g",nn:"Neukölln Arcaden Parkhaus Dach — Neukölln",ns:"Parkhaus-Dach mit Aussicht — ungeplante Plattform über Neukölln",nst:"Du fährst auf das Dach dieses Parkhauses und siehst: ganz Neukölln von oben. Nicht schön wie Fernsehturm, aber echt wie Neukölln ist echt.",nt:"Kostenlos wenn du oben parkst und zahlst. Oder einfach hochlaufen mit Fahrrad. Beste View für Fotos. Wind kann stark sein."},
  {id:22,n:"RAW Gelände side paths",a:"Friedrichshain",v:["local", "weird"],d:22,s:"Crumbling railway buildings turned art jungle",st:"1860s railway repair halls. Decades of street art, abandoned infrastructure, studios in shipping containers.",im:"1870 — Prussian railway expansion. Massive halls of steam engines. Now artists where machines were.",t:"Walk past main entrance, explore the edges.",c:["abandoned"],r:"g",nn:"RAW-Gelände Seitenwege — Friedrichshain",ns:"Kleine Wege durch Schienen-Gelände — versteckte Ecken des RAW",nst:"Während alle zu den Clubs gehen, findest du kleine Wege zwischen alten Bahnhallen. Grafitti überall. Es ist wie hinter den Kulissen.",nt:"Kostenlos. RAW-Gelände geöffnet tagsüber. Nachts Clubs. Komm tagsüber wenn es ruhig ist."},
  {id:24,n:"Volkspark Friedrichshain fairy tale fountain",a:"Friedrichshain",v:["beautiful", "hidden"],d:24,s:"A fountain with 106 Brothers Grimm stone figures",st:"In Berlin\'s oldest park (1846), an enormous neo-Baroque fountain with 106 fairy tale figures. Hansel and Gretel, Sleeping Beauty, Snow White — all in stone.",im:"The sculptor spending years on each character, knowing children would climb them for centuries.",t:"Enter from Friedenstraße. Southwest section.",c:["parks"],r:"g",nn:"Volkspark Friedrichshain Märchenbrunnen — Friedrichshain",ns:"Märchen-Brunnen mit Figuren — DDR-Kindertraum aus Zement",nst:"Dieser Brunnen hat Märchenfiguren aus DDR-Zeit. Sie schauen dich an mit Augen aus Zement. Es ist kitch und es ist wunderbar.",nt:"Kostenlos. Tagsüber offen. Park auch kostenlos. Kinder lieben es. Kamera bereit für Kunstwerk."},
  {id:25,n:"Spreepark from the river path",a:"Friedrichshain",v:["secret", "weird"],d:25,s:"A rusting Ferris wheel in the forest",st:"East Germany\'s only amusement park — closed 2001 after the owner fled to Peru (with drugs in the rides). Decaying dinosaurs visible from the fence.",im:"1989. Last summer before the Wall. East Berlin families on the Ferris wheel, not knowing everything was about to change.",t:"Walk through Plänterwald along the Spree. The park is visible from the public path and through the fence. Do not enter — the site is under restoration.",c:["abandoned"],r:"y",nn:"Spreepark vom Flussufer — Friedrichshain",ns:"Alter Vergnügungspark vom Wasser aus — Erinnerung an bessere Zeiten",nst:"Vom Spree-Ufer siehst du den verlassenen Spreepark. Riesenrad still. Bäume wachsen, Attraktionen rosten. Zeit lauft anders hier.",nt:"Kostenlos. Spree-Uferweg schön. Boot fahren noch schöner. Fotos von der Seite sind beste."},
  {id:28,n:"Mauerpark Sunday karaoke",a:"Prenzlauer Berg",v:["local", "vast"],d:28,s:"Where the Wall was, now people sing",st:"The death strip is now where hundreds watch strangers sing karaoke. Anyone can sing.",im:"1985. Guard towers. Dogs. Shoot orders. Now ABBA and 500 people clapping.",t:"Sunday from 3pm. Get there early.",c:["history_big"],r:"g",nn:"Mauerpark Sonntag Karaoke — Prenzlauer Berg",ns:"Sünntach Karaoke im Park — Berlin singt zusammen falsch",nst:"Jeden Sonntag um drei Uhr stellt sich jemand hin und singt. Alle anderen machen mit. Manche gut, manche furchtbar, aber alle happy.",nt:"Kostenlos. Sonntags 14 Uhr. Mauerpark am besten. Bring Freunde mit. Es ist lustig und es ist Berlin."},
  {id:29,n:"Wasserturm Prenzlauer Berg",a:"Prenzlauer Berg",v:["hidden", "history"],d:29,s:"Oldest water tower with a dark past",st:"Beautiful 1877 brick water tower. During the Nazi era, the basement was an SA torture site. Memorial marks the spot. Beauty and horror in one building.",im:"1933. People disappearing at night, taken to the basement. Neighbors hearing screams. Water above, cruelty below.",t:"Knaackstraße. Free park around it.",c:["scary", "famous_dead"],r:"g",nn:"Wasserturm Prenzlauer Berg — Prenzlauer Berg",ns:"Alter Wasserturm wo Nazi-Gegner starben — Erinnerung in Stein",nst:"Dieser Turm ist alt und rot und es ist Monument für die, die hier starben unter Nazismus. Es ist still und es ist wichtig.",nt:"Kostenlos von außen. Inside manchmal Ausstellung. Tagsüber offen. Nacht macht es weniger Sinn."},
  {id:30,n:"Kollwitzplatz & Käthe Kollwitz\'s home",a:"Prenzlauer Berg",v:["beautiful", "history"],d:30,s:"Where Germany\'s greatest artist of suffering lived",st:"Käthe Kollwitz lived at Weißenburger Straße 25 (now Kollwitzstraße) from 1891 to 1943. She drew and sculpted the poverty, hunger, and grief she saw from her window. The square named after her has a sculpture of her face.",im:"Kollwitz at her window, watching mothers carrying dead children during WWI food shortages. Then drawing exactly what she saw. Making the invisible suffering visible.",t:"Kollwitzplatz. Her former address is marked. The Saturday farmer\'s market on the square is free to wander.",c:["famous_dead"],r:"g",nn:"Kollwitzplatz & Käthe Kollwitz Haus — Prenzlauer Berg",ns:"Platz gebenannt nach Künstlerin die litt — Kunstwerk aus Schmerz",nst:"Käthe Kollwitz war Künstlerin die gelitten hat. Ihre Werke schreien. Ihr Haus ist hier und der Platz trägt ihren Namen. Das ist Berlin: Künstler werden erinnert.",nt:"Kostenlos auf Platz. Museum ca. 5 Euro. Prenzlauer Berg schön drum herum. Café auf Platz."},
  {id:31,n:"Bowie\'s Berlin (Hauptstraße 155)",a:"Schöneberg",v:["history", "local"],d:31,s:"Where David Bowie lived and made Heroes",st:"David Bowie lived in a flat at Hauptstraße 155 in Schöneberg from 1976-1978. He recorded Heroes, Low, and Lodger here. The Wall ran just behind Hansa Studios where he recorded — he could see the guards from the studio window.",im:"Bowie at the window of Hansa Studios, watching East German guards on the Wall, and writing \'Heroes\' — a song about lovers kissing by the Wall. Standing by the Wall.",t:"Hauptstraße 155 (plaque on building). Then walk to Hansa Studios, Köthener Straße 38 near Potsdamer Platz. The wall was visible from the studio.",c:["famous_dead", "history_big"],r:"g",nn:"Bowie\'s Berlin Hauptstraße 155 — Schöneberg",ns:"David Bowie wohnte hier in Schöneberg — Ziggy kam aus diesem Fenster",nst:"David Bowie lebte 1976-1979 in dieser Wohnung. Er war hier als er \'Low\' und \'Heroes\' machte. Das Fenster schaut auf die Straße. Damals war das Berliner Westen und es war alt.",nt:"Kostenlos von außen. Haus ist privat. Nur Schild und Fotos. Schöneberg rum auch gemütlich. Kino nebenan auch Bowie-Verbindungen."},
  {id:32,n:"Silent Green Kulturquartier",a:"Wedding",v:["hidden", "quiet"],d:32,s:"A crematorium turned culture space",st:"Domed crematorium, now art/film/concerts. Below: the \'Betonhalle\' — former furnace room.",im:"Families saying goodbye. Chimney smoke across Wedding. Now electronic music in the furnace room.",t:"Free events often. Plantagenstraße 31.",c:["abandoned"],r:"g",nn:"Silent Green Kulturquartier — Wedding",ns:"Alte Leichenhalle wird Kunstort — Tod wird Kreativität",nst:"Diese alte Leichenhalle ist jetzt Kunstort. Ja, Leichenhalle. Künstler arbeiten wo die Toten waren. Berlin macht Kunst überall.",nt:"Kostenlos zum Gucken. Events kosten manchmal. Führungen verfügbar. Dunkel und spooky aber cool. Wedding ist schön drum herum."},
  {id:33,n:"Plötzensee Memorial",a:"Wedding",v:["quiet", "history"],d:33,s:"Where the resistance was executed",st:"Bare room. Steel beam. Hooks on ceiling. 3,000 executed here — including the July 20 plotters who tried to kill Hitler.",im:"1944. You tried to stop a dictator. You failed. This is the room. The hooks are still there.",t:"Free, daily. Hüttigpfad.",c:["scary", "history_big", "famous_dead"],r:"g",nn:"Plötzensee Gedenkstätte — Wedding",ns:"Erinnerung an Widerständler die starben — Guillotine stand hier",nst:"Am Plötzensee wurden Widerständler gegen Hitler hingerichtet. Guillotine stand hier. Das See ist jetzt schön, aber unter Wasser ist Geschichte.",nt:"Kostenlos. Gedenkstätte offen. Museum auch. Ruhe und Nachdenklichkeit. Lage wichtig wissen."},
  {id:34,n:"Humboldthain Flak Tower ruins",a:"Gesundbrunnen",v:["secret", "history"],d:34,s:"A WWII bunker buried under a hill",st:"Hill isn\'t natural — rubble on a massive anti-aircraft tower. Parts poke through. Concrete ruins exposed on north side.",im:"1945. Colossal fortress with guns firing at bombers. They couldn\'t demolish it, so they buried it.",t:"Viewing platform on top, free. Best at sunset.",c:["high_spots", "abandoned", "history_big"],r:"y",nn:"Humboldthain Flak Tower Ruinen — Wedding",ns:"Riesige Flak-Türme von Nazis — Monster aus Beton bleibt stehen",nst:"Diese Türme sind massive. Nazis bauten sie um Flugzeuge abzuschießen. Alliierte konnten nicht zerstören. Jetzt sind es Berge in der Stadt.",nt:"Kostenlos. Umwandern oder raufklettern (illegal aber möglich). Foto von oben ist berühmt. Humboldthain Park drum herum schön."},
  {id:35,n:"Panke river walk",a:"Wedding",v:["nature", "quiet"],d:35,s:"A secret river through Wedding",st:"Most don\'t know the Panke runs through Wedding. Tree-lined paths, old mills, community gardens, near-wild stretches.",im:"Before Berlin, this river powered mills. The Panke was here first.",t:"Start at Badstraße, walk north. Gets wilder.",c:["romantic_water", "parks"],r:"g",nn:"Panke Fluss Spaziergang — Wedding",ns:"Fluss durch Wedding — wo Berlin wild und grün wird",nst:"Du spazierst entlang dem Panke und merkst: Berlin ist nicht nur Häuser. Wald überall, Wasser, Vögel. Es ist wie Trip aus Stadt.",nt:"Kostenlos. Zu Fuß. Wedding nördlich am besten. Natur pur. Bring Wasser mit, wenig Cafés."},
  {id:36,n:"Schillerpark UNESCO housing",a:"Wedding",v:["hidden", "beautiful"],d:36,s:"Bauhaus housing for workers — UNESCO-listed",st:"Bruno Taut, 1920s. For working-class families. Colors, geometry, the radical idea that poor people deserved beauty.",im:"1928. Workers moving in — light, color, gardens. After slums, this felt like the future.",t:"Bristolstraße area. Free to walk through.",c:["courtyards"],r:"g",nn:"Schillerpark UNESCO-Wohnungen — Wedding",ns:"1920er-Siedlung mit Architektur-Genie — wie Menschen wohnen sollten",nst:"Diese Siedlung wurde in den 1920ern gebaut. Die Architekten wollten zeigen: so wohnen Arbeiter besser. Symmetrie überall. Grün überall. Es ist ideal.",nt:"Kostenlos zum Gucken. Zu Fuß spazieren und gucken. UNESCO-Schutz. Wedding Geschichte hier lebendig."},
  {id:37,n:"Lietzensee Park",a:"Charlottenburg",v:["beautiful", "quiet"],d:37,s:"A hidden lake with weeping willows",st:"Hidden lake surrounded by grand buildings. Willows, a waterfall, ducks, empty benches. Rose garden on the west side.",im:"1900s Charlottenburg — fur coats and top hats strolling here. Same trees, same water.",t:"Enter from Wundtstraße. 15 min around the lake.",c:["romantic_water", "parks"],r:"g",nn:"Lietzensee Park — Charlottenburg",ns:"See im West-Berlin — wo Reiche ihre Freizeit hatten",nst:"Dieser See ist klein und fein. Charlottenburg drum herum ist reich und ruhig. Das ist West-Berlin wie es sich selbst kannte.",nt:"Kostenlos. Strandbad kostet ca. 5 Euro Sommer. See schön zum Paddeln. Charlottenburg Schloss nebenan."},
  {id:38,n:"Teufelsberg",a:"Grunewald",v:["secret", "history"],d:38,s:"Spy station on a rubble mountain",st:"West Berlin\'s highest point — 75 million cubic meters of rubble burying a Nazi college. American listening station on top. Domes covered in street art.",ef:"Bring everything. There is absolutely nothing at Teufelsberg. The nearest option is a café at the Grunewaldsee (30 min walk through forest).",im:"1960s. American soldiers with headphones. A buried Nazi building below. The Wall beyond the forest.",t:"Hill is open — walk up free. View is incredible.",c:["high_spots", "abandoned", "history_big"],r:"y",nn:"Teufelsberg — Grunewald",ns:"Berg aus Trümmern — aus Ruinen wurde Hügel",nst:"Nach WWII stapelten die Alliierten Trümmer. Jetzt ist Berg 80 Meter hoch. Oben siehst du Wald und Stadt. Unter dir: altes Berlin.",nt:"Kostenlos. Zu Fuß raufgehen. Aussicht großartig. Teufelssee neben auch schön. Bring Energie mit, es ist Trümmer."},
  {id:39,n:"Olympiastadion grounds",a:"Charlottenburg",v:["history", "vast"],d:39,s:"Nazi architecture you can walk free",st:"Can\'t enter free, but Maifeld parade ground, Waldbühne area, bell tower ruins are open. Scale designed to make you feel small.",im:"1936. Jesse Owels destroying the Aryan myth while Hitler watches.",t:"Walk exterior and Maifeld. Free.",c:["history_big", "scary"],r:"g",nn:"Olympiastadion Gelände — Westend",ns:"Nazi-Stadion von 1936 — Architektur der Macht",nst:"Das Stadion steht noch wie Hitler es bauen ließ. Riesig. Monumental. Es schmeißt mit Größe um sich. Innen Rasen, außen Geschichte.",nt:"Eintritt ca. 13 Euro wenn nicht Event ist. Führung gut. Zu Fuß rum kostenlos. Westend drum herum. U-Bahn Olympia-Stadion."},
  {id:40,n:"Glienicker Brücke (Bridge of Spies)",a:"Wannsee",v:["history", "beautiful"],d:40,s:"Where Cold War spies were exchanged",st:"This bridge between Berlin and Potsdam was where the US and USSR exchanged captured spies. Gary Powers was swapped here. The bridge connects two worlds — West and East, then and now. The Spielberg film was named after it.",im:"A foggy morning, 1962. Two men walk from opposite ends of a bridge. In the middle, they pass each other without a word. One goes east, one goes west. The cars on both sides drive away.",t:"Bus 316 from Wannsee S-Bahn. Walk across the bridge — halfway is where the border was. Free. The Havel views are gorgeous.",c:["history_big", "romantic_water"],r:"g",nn:"Glienicker Brücke Bridge of Spies — Wannsee",ns:"Brücke zwischen Welten — Spione tauschten hier",nst:"Auf dieser Brücke wurden Spione getauscht. Ost und West trafen sich hier. Jetzt ist es normale Brücke. Aber die Geschichte bleibt.",nt:"Kostenlos. Grunewald See nebenan. Spandau Zitadel auf anderem Ufer sichtbar. Zu Fuß gehen am besten."},
  {id:41,n:"Natur-Park Südgelände",a:"Schöneberg",v:["nature", "weird"],d:41,s:"Railway yard swallowed by forest",st:"Freight yard abandoned after war, untouched 50 years. Trees through tracks. Elevated steel paths. Rusting locomotives.",im:"1930s trains. Then silence for decades. Seeds, roots, forest took it back.",t:"1-2€. S-Bahn Priesterweg.",c:["abandoned", "parks", "nature"],r:"g",nn:"Natur-Park Südgelände — Schöneberg",ns:"Alter Bahnhof wird Wildnis — Natur macht sich Bahn",nst:"Hier war Bahnhof. Jetzt ist es Wald. Bäume wachsen zwischen Schienen. Es ist wie Natur sagt: ich nehme meinen Platz zurück.",nt:"Kostenlos. Zu Fuß oder Fahrrad. Führungen verfügbar. Schöneberg südlich. Ruhe und Grün."},
  {id:43,n:"Schöneberg Rathaus",a:"Schöneberg",v:["history", "free"],d:43,s:"Where JFK said \'Ich bin ein Berliner\'",st:"June 26, 1963. Kennedy on this balcony. One of the most famous Cold War speeches. Free exhibition.",im:"400,000 West Berliners terrified of abandonment. Kennedy says four words in German. The crowd erupts.",t:"John-F.-Kennedy-Platz. Free.",c:["history_big", "famous_dead"],r:"g",nn:"Schöneberg Rathaus — Schöneberg",ns:"Rathaus wo Kennedy \'Ich bin Berliner\' sagte — Geschichte in Stein",nst:"Kennedy stand hier 1963 und sagte die beste Worte für Berlin. Die Mauer war gerade gebaut. Der Platz war voller Menschen. Die Welt schaute zu.",nt:"Kostenlos von außen. Innen manchmal Ausstellungen. Platz groß und öffentlich. Schöneberg schöne Gegend drum herum."},
  {id:44,n:"Insulaner hill observatory",a:"Schöneberg",v:["quiet", "nature"],d:44,s:"Rubble mountain with observatory on top",st:"WWII rubble = 78m hill. Observatory on top. Quiet climb, south Berlin views.",im:"The Trümmerfrauen passing rubble bucket by bucket. Every stone was once a wall, a staircase, a home.",t:"Free to walk up via paved paths. Observatory sometimes has free public nights.",c:["high_spots"],r:"y",nn:"Insulaner Hügel Observatorium — Schöneberg",ns:"Berg mit Ausblick und Teleskop — wo Himmel und Stadt sich treffen",nst:"Du sitzt auf diesem Berg und schaust auf Berlin. Nachts kannst du mit Teleskop den Mond sehen. Sterne sind kaum sichtbar wegen Lichtverschmutzung, aber Mond ist gross.",nt:"Kostenlos Hügel. Observatorium hat Öffnungszeiten. Zu Fuß raufgehen einfach. Schöneberg Park nebenan auch schön."},
  {id:45,n:"Christopher Isherwood\'s flat",a:"Schöneberg",v:["history", "local"],d:45,s:"Where \'Cabaret\' was born",st:"Nollendorfstraße 17 — Christopher Isherwood lived here in the early 1930s and wrote the Berlin Stories that became the musical Cabaret. A plaque marks the building. The area around Nollendorfplatz was (and is) Berlin\'s queer heart.",im:"Isherwood at his window watching the Weimar Republic collapse. Drag bars closing. Brown shirts marching. \'I am a camera with its shutter open,\' he wrote.",t:"Nollendorfstraße 17. Plaque on the building. Walk around Nollendorfplatz — still the heart of queer Berlin.",c:["famous_dead"],r:"g",nn:"Christopher Isherwood Wohnung — Schöneberg",ns:"Isherwood lebte hier und schrieb — Weimar in britischer Augen",nst:"Christopher Isherwood war britischer Schriftsteller der in Berlin während Weimar lebte. Seine Wohnung war hier. Die Worte die er schrieb sind wie Stadt danach war.",nt:"Kostenlos von außen. Wohnung ist privat. Nur Erinnerung. Schöneberg rum interessant für Geschichte."},
  {id:46,n:"Dong Xuan Center",a:"Lichtenberg",v:["hidden", "weird"],d:46,s:"Vietnamese market city in warehouses",st:"Former DDR Vietnamese workers created their own economy. Hundreds of stalls. Best, cheapest Vietnamese food in Europe.",im:"Vietnamese contract worker, 1980s. Wall falls, contract void. You build a world inside warehouses.",t:"Tram to Herzbergstraße. Food hall in back. Thu-Sat.",c:[],r:"g",nn:"Dong Xuan Zentrum — Lichtenberg",ns:"Asiatisches Einkaufszentrum riesig — ganz Asien in Lichtenberg",nst:"Hier kaufen Menschen alles was sie aus Asien brauchen. Essen, Kleidung, Elektronik. Du gehst rein und du bist in Hanoi.",nt:"Kostenlos zum Herumgucken. Essen günstig und gut. Wochenende voll. Unter der Woche ruhiger. Lichtenberg östlich."},
  {id:47,n:"Stasi Museum / HQ",a:"Lichtenberg",v:["history", "weird"],d:47,s:"East German secret police headquarters",st:"Exactly as it was when the Wall fell. Mielke\'s preserved office. 90,000 employees. 189,000 informants. One in every 63 East Germans.",im:"Working here. Monitoring neighbors, friends, family. The desk where surveillance on millions was ordered.",t:"Ruschestraße 103. Some exhibitions free.",c:["scary", "history_big"],r:"g",nn:"Stasi Museum Zentrale — Lichtenberg",ns:"Hauptquartier der Geheimpolizei — wo Angst ihren Sitz hatte",nst:"Das Stasi-Büro ist wie ein Denkmal für Überwachung. Erich Mielke saß hier. Alles ist konserviert wie damals. Es ist disturbing und wichtig.",nt:"Eintritt ca. 8 Euro. Führung gut aber extra. Deutsch und Englisch. Lichtenberg. U-Bahn Magdalenenstraße."},
  {id:48,n:"Stasi Prison Hohenschönhausen",a:"Lichtenberg",v:["history", "quiet"],d:48,s:"Where political prisoners were held and tortured",st:"The main Stasi remand prison, hidden in a residential area. Prisoners were brought here in windowless vans so they never knew where they were. The cells, interrogation rooms, and isolation chambers are preserved exactly as they were. Tours are led by former prisoners.",im:"You\'re arrested at night. Driven for hours in a van with no windows. You have no idea where you are. The door opens onto a corridor of cells. You won\'t leave for months. Nobody knows you\'re here.",t:"Genslerstraße 66. Guided tours (small fee) — try to get one led by a former inmate. Their stories are devastating. Book online.",c:["scary", "history_big"],r:"g",nn:"Stasi Gefängnis Hohenschönhausen — Lichtenberg",ns:"Geheimgefängnis wo Menschen verschwanden — Folterort vom Staat",nst:"Dieses Gefängnis ist existiert noch. Zellen sind klein. Torturen waren psychologisch. Menschen waren hier, jetzt sind es Räume. Aber Schmerz bleibt in Mauern.",nt:"Eintritt ca. 8 Euro. Führung auf Deutsch wichtig. Dauer 2-3 Stunden. Emotional und wichtig. U-Bahn Wartenberg zum Start."},
  {id:49,n:"Botanischer Volkspark Pankow",a:"Pankow",v:["quiet", "nature"],d:49,s:"A forgotten botanical garden",st:"Free and empty. Old greenhouses, wildflower meadows, geological garden, crumbling DDR infrastructure reclaimed by plants.",im:"DDR botanists tending plants from the socialist world. Trees planted under a different country.",t:"Blankenfelder Chaussee. Free.",c:["parks", "nature"],r:"g",nn:"Botanischer Volkspark Pankow — Pankow",ns:"Volks-Botanischer Garten — Pflanzen für normale Menschen",nst:"Dieser Garten ist kleiner als große botanische, aber es ist schön und es ist für Volk. Blumen überall. Bäume überall. Es ist Heilung.",nt:"Kostenlos oder minimal Eintritt. Pankow nördlich. Zu Fuß schön. Morgens beste Zeit. Café möglich."},
  {id:50,n:"Schloss Schönhausen gardens",a:"Pankow",v:["beautiful", "history"],d:50,s:"Royal palace garden in Pankow",st:"Baroque palace — Prussian queen\'s summer home, then DDR president\'s residence. Free gardens: French parterre, old trees, canal.",im:"Queen Elisabeth Christine in 1750. Then DDR president Pieck 200 years later. Same garden, opposite worlds.",t:"Tschaikowskistraße. Free garden.",c:["parks", "romantic_water"],r:"g",nn:"Schloss Schönhausen Gärten — Pankow",ns:"Preußisches Schloss mit Gärten — Royal in Pankow",nst:"Schönhausen war Schloss von Königen. Jetzt ist es DDR-Monument. Gärten sind Barock und symmetrisch. Du spazierst und merkst: Schönheit bleibt.",nt:"Eintritt ca. 5 Euro. Gärten frei. Pankow nordöstlich. Führung optional. Picknick-Spot gut."},
  {id:51,n:"Müggelsee & Müggelberge",a:"Köpenick",v:["nature", "vast"],d:51,s:"Berlin\'s biggest lake and actual hills",st:"Huge lake with hills, trails, ancient woodland. Free beaches. Feels nothing like a city.",im:"Slavic people fished here thousands of years before Berlin. The Spree flows from this lake.",t:"🚇 S3 to Friedrichshagen (45 min from Alexanderplatz), then tram 60 or 15-min walk through the old town to the shore. Free beaches, forest trails.",c:["swimming", "nature", "romantic_water", "lakes"],r:"g",nn:"Müggelsee & Müggelberge — Köpenick",ns:"Biggest See + Berg in Berlin — Berg der Ebene dominiert",nst:"Müggelsee ist riesig. Müggelberge ist 114 Meter hoch, aber in flacher Gegend sieht es wie Alpen aus. Natur außerhalb Stadt. Fast Spreewald.",nt:"Kostenlos. Strandbad ca. 5-6 Euro. Boot fahren möglich. U-Bahn Köpenick zum Start. Sommer populär."},
  {id:52,n:"Köpenick Old Town island",a:"Köpenick",v:["beautiful", "quiet"],d:52,s:"A medieval island town inside Berlin",st:"Island where Spree meets Dahme. Cobblestones, palace, fishermen\'s cottages. Famous for the cobbler who impersonated a captain and robbed the town in 1906.",im:"Wilhelm Voigt in a thrift-shop captain\'s uniform commanding real soldiers. They arrest the mayor and steal the cash.",t:"S3 Köpenick. Schloss garden free.",c:["history_big", "romantic_water"],r:"g",nn:"Köpenick Altstadt Insel — Köpenick",ns:"Mittelalterliche Insel-Stadt — Zeit sprang hier still",nst:"Köpenick ist auf Insel und es hat älteste Häuser. Gassen sind schmal wie Mittelalter. Schloss ragt rauf. Es ist wie Deutschland Zeit-Maschine.",nt:"Kostenlos. Zu Fuß. Schloss Museum ca. 6 Euro. Café überall. Spree Ufer schön. Alt-Köpenick Mittwoch Markt."},
  {id:53,n:"Schöneweide industrial ruins",a:"Schöneweide",v:["secret", "weird"],d:53,s:"Crumbling factories on the Spree",st:"Oberschöneweide — AEG, cable works, massive factories. Many crumbling, some now art. Scale is staggering.",im:"1910. Tens of thousands. Coal smoke. Cables made here powered Europe.",t:"Wilhelminenhofstraße from S-Bahn.",c:["abandoned"],r:"y",nn:"Schöneweide Industrie-Ruinen — Schöneweide",ns:"Fabrik-Gelände halb verfallen — Arbeiter-Vergangenheit in Beton",nst:"Diese Fabrik war mal Elektro-Werk. Jetzt ist halb offen, halb verfallen. Künstler arbeiten drin. Es ist poetisch verfallen.",nt:"Kostenlos von außen. Manchmal Kunstprojekte. Führungen frag ab. Zu Fuß wandern schön. Friedrichshain östlich."},
  {id:55,n:"Spandau Old Town",a:"Spandau",v:["hidden", "beautiful"],d:55,s:"Medieval town older than Berlin",st:"Existed before Berlin. Cobblestones, half-timbered houses, 14th-century church. The Zitadelle nearby.",im:"1200. Berlin is a fishing village. Spandau has markets and walls.",t:"Walk from Spandau S-Bahn.",c:["history_big"],r:"g",nn:"Spandau Altstadt — Spandau",ns:"Älteste Bezirk-Kern von Berlin — wo Spandau alt wie König ist",nst:"Spandau ist so alt dass es älter als Berlin ist. Gassen sind Gothic. Kirche steht hier seit 800 Jahren. Es ist wie in Märchen.",nt:"Kostenlos. Zu Fuß. Zitadel nebenan auch gut. Weit weg vom Zentrum aber echtes Berlin. U-Bahn Zitadel."},
  {id:56,n:"Pfaueninsel",a:"Wannsee",v:["beautiful", "nature"],d:56,s:"Fairy-tale island with peacocks",st:"Tiny Havel island. Fake ruined castle (1794), free-roaming peacocks, ancient oaks. UNESCO.",im:"Prussian kings escaping by boat. A castle built to look already ruined — the Romantics loved decay.",t:"S-Bahn Wannsee, bus 218 to ferry.",c:["romantic_water", "nature", "parks"],r:"g",nn:"Pfaueninsel — Wannsee",ns:"Insel mit Pfauen frei — König mochte Schönheit",nst:"Diese Insel hat Schloss und Pfauen laufen frei. Es ist kleine Zauberwelt auf See. Könige mochten das. Jetzt ist es für alle.",nt:"Eintritt ca. 3-4 Euro. Boot-Fahrt inbegriffen. Zu Fuß auf Insel schön. Wannsee-Gegend Reich. Berlin grün-Seite."},
  {id:57,n:"Soviet War Memorial Tiergarten",a:"Tiergarten",v:["history", "beautiful"],d:57,s:"Built from Hitler\'s chancellery marble",st:"Two Soviet tanks, memorial. Built months after war from Hitler\'s Reich Chancellery marble. Soldiers buried here, in the British sector.",im:"Soviet soldiers building a monument from the building where Hitler planned their destruction.",t:"Free, 24h. Walk from Brandenburg Gate.",c:["history_big"],r:"g",nn:"Sowjetisches Ehrenmal Tiergarten — Tiergarten",ns:"Riesiges Denkmal für sowjetische Tote — Monumental wie Stalin",nst:"Dieses Denkmal hat Panzer und großartig Soldat. Es ist so groß dass du klein wirst. Tote unter dir. Die Sowjetunion wollte nicht vergessen werden.",nt:"Kostenlos. Tiergarten west. Zu Fuß schön. Unter Denkmal ist Rauchanal. Monumental und etwas spooky."},
  {id:58,n:"Tiergarten deep interior",a:"Tiergarten",v:["nature", "quiet"],d:58,s:"The wild parts nobody reaches",st:"Past the main paths: wild meadows, hidden benches, ponds with herons, silence.",im:"Before a park, this was a royal hunting ground — Tiergarten means \'animal garden.\' Boar and deer.",t:"Enter from a side path. Neuer See and Lichtensteinbrücke areas.",c:["parks", "nature", "romantic_water"],r:"g",nn:"Tiergarten tiefe Innenseite — Tiergarten",ns:"Wald im Zentrum — Berlin ist grün wenn du nicht guckst",nst:"Du fährst Fahrrad in Tiergarten und nach 5 Minuten: keine Stadt mehr. Nur Bäume und See. Du bist allein mitten in der Mitte.",nt:"Kostenlos. Fahrrad gut. Zu Fuß auch. Morgens am besten. Karte brauchst du weil es groß ist. Biergarten versteckt rum."},
  {id:59,n:"Siegessäule (Victory Column)",a:"Tiergarten",v:["history", "beautiful"],d:59,s:"Climb 285 steps for a 360° view from the golden angel",st:"Berlin\'s golden angel — the Victory Column. 67 meters tall, 285 steps to the viewing platform. Panoramic view over Tiergarten, the Reichstag, the skyline. Originally on Potsdamer Platz, moved here by the Nazis to fit their megacity plans.",im:"This column celebrated Prussian military victories. The Nazis moved it. The Allies wanted to demolish it. The French wanted to blow it up. It survived everything. Now it\'s a symbol of Berlin\'s queer community.",t:"Großer Stern. Small entrance fee. The 285 steps are a spiral — dizzying but worth it. Best on clear days.",c:["high_spots", "history_big"],r:"y",nn:"Siegessäule — Tiergarten",ns:"Riesige Säule mit Goldene Frau — Triumph über Krieg",nst:"Diese Säule steht mitten in Tiergarten. Oben Gold überall. Wendeltreppe hoch und auf der Spitze: ganz Berlin unter dir.",nt:"Eintritt ca. 5 Euro. Wendeltreppe 285 Stufen. Aussicht großartig. Tiergarten Kreis-Mitte. U-Bahn Siegessäule."},
  {id:60,n:"Arminiusmarkthalle",a:"Moabit",v:["local", "hidden"],d:60,s:"1891 market hall locals actually use",st:"Same era as Markthalle Neun, same iron beauty, without hipster prices.",im:"1890s Berlin had dozens of these iron food cathedrals. Most destroyed. This survived.",t:"Arminiusstraße 2-4. Free to walk.",c:[],r:"g",nn:"Arminiusmarkthalle — Moabit",ns:"Markthalle mit Flair — Moabit hat noch Seele",nst:"Diese Markthalle ist alt und es hat Character. Essen überall, Menschen laut, Leben pulsiert. Moabit in einer Halle.",nt:"Kostenlos zum Gucken. Essen kaufen günstiger als anderswo. Morgens beste Ware. Moabit West. U-Bahn Turmstraße."},
  {id:61,n:"Soviet War Memorial Treptower Park",a:"Treptow",v:["history", "vast"],d:61,s:"The most overwhelming war memorial in Europe",st:"12-meter soldier, child, crushed swastika. 7,000 buried below. Stone sarcophagi. Nothing prepares you for the scale.",im:"Battle of Berlin: 80,000 Soviet soldiers in two weeks. Built on their graves from city ruins.",t:"Free, always open. Walk the full approach.",c:["history_big", "scary"],r:"g",nn:"Sowjetisches Ehrenmal Treptower Park — Treptow",ns:"Mega-Monument für Million Tote — Erinnerung sehr groß",nst:"Dieser Soldat steht 12 Meter hoch. Er hält ein Kind und ein zerbrochenes Schwert. Unter ihm schlafen Millionen Sowjet-Soldaten. Es ist imposant und es ist traurig.",nt:"Kostenlos. Treptower Park. U-Bahn Treptower Park. Denk-Raum unter dem Monument auch. Zu Fuß schön. Spree-Ufer schön auch."},
  {id:62,n:"Insel der Jugend",a:"Treptow",v:["beautiful", "quiet"],d:62,s:"Tiny island via footbridge",st:"Small Spree island via arched bridge. Peace, water, a path around it. Sometimes cinema.",im:"DDR teenagers — Island of Youth — together, away from adults and the state.",t:"From S Treptower Park along the river.",c:["romantic_water", "parks"],r:"g",nn:"Insel der Jugend — Treptow",ns:"Insel zum Feiern — Jugend macht Party auf Wasser",nst:"Diese Insel war DDR-Jugend-Projekt. Jetzt machen Partys hier. Menschen tanzen auf Insel. Boote fahren vorbei. Es ist surreal und es ist lustig.",nt:"Kostenlos zum Hinkommen. Veranstaltungen kosten. Sommer Betrieb. U-Bahn Treptower Park. Boot fahren möglich."},
  {id:63,n:"Archenhold Observatory",a:"Treptow",v:["weird", "history"],d:63,s:"World\'s longest telescope — Einstein lectured here",st:"Built 1896. 21-meter telescope. Einstein on general relativity here, 1915.",im:"Einstein explaining curved spacetime. Nobody understood. The telescope pointed at a universe that just got stranger.",t:"Alt-Treptow 1. Free exterior. Check observation nights.",c:["history_big", "famous_dead"],r:"g",nn:"Archenhold Sternenwarte — Treptow",ns:"Älteste Sternenwarte mit Teleskop — Himmel war schon immer Traum",nst:"Diese Sternenwarte hat ältestes funktionierendes Teleskop Deutschlands. Wissenschaft schaut nach oben. Du schaust auch. Sterne sind unveränderlich.",nt:"Eintritt ca. 6 Euro. Führungen verfügbar. Abends beste Zeit. Treptower Park. Teleskop Beobachtung wenn Wetter gut."},
  {id:64,n:"Tegeler Forst",a:"Reinickendorf",v:["nature", "vast"],d:64,s:"Genuine forest at Berlin\'s edge",st:"One of the largest forests. Old beech, wild boar, sandy paths. Tegeler Fließ wetlands on the edge.",im:"Before Berlin — all forest. Slavic hunters, wolves, bears.",t:"U6 Alt-Tegel, walk north.",c:["nature"],r:"g",nn:"Tegeler Forst — Reinickendorf",ns:"Wald nordwestlich — nächste Wald wenn du weg willst",nst:"Dieser Wald ist groß und still. Du fahrrädest oder spazierst und Berlin ist weg. Bäume überall. Vögel schreien. Es ist wie Land.",nt:"Kostenlos. Zu Fuß oder Fahrrad. Natur pur. Wenig Cafés aber Picknick ideal. Norden weit weg vom Zentrum."},
  {id:65,n:"Tegel Greenwich-Promenade",a:"Reinickendorf",v:["beautiful", "quiet"],d:65,s:"Lakeside promenade — resort vibes",st:"Tegeler See, one of Berlin\'s cleanest lakes. Promenade with benches, trees, water views.",im:"1920s Berliners escaping by steamer. Same view, same water.",t:"🚇 U6 to Alt-Tegel, walk 10 min to the Greenwich-Promenade. Dicke Marie — 900-year-old tree — nearby.",c:["romantic_water", "swimming", "lakes"],r:"g",nn:"Tegel Grün-Straße Promenade — Reinickendorf",ns:"Spaziergang am Wasser — Tegel ist Wasser und Wind",nst:"Du spazierst entlang Tegeler See und der Wind bläst dir ins Gesicht. Boote fahren. Segel überall. Es ist maritim.",nt:"Kostenlos. Zu Fuß oder Fahrrad. Café am Weg. U-Bahn Tegel zum Start. Sommer populär."},
  {id:66,n:"Domäne Dahlem",a:"Dahlem",v:["weird", "nature"],d:66,s:"Working farm in the middle of Berlin",st:"Real farm — cows, pigs, chickens — in an expensive neighborhood. 800-year-old buildings.",im:"This farm since the 1200s. Kings, wars, walls, reunification — cows kept being milked.",t:"U3 Dahlem-Dorf. Outdoor fields free.",c:["nature"],r:"g",nn:"Domäne Dahlem — Dahlem",ns:"Bauernhof mitten in Stadt — Erde und Tiere zwischen Häusern",nst:"Auf dieser Domäne sind echte Tiere. Schafe, Kühe, Schweine. Du kannst Eier kaufen die gerade gelegt wurden. Es ist Farm in Berlin.",nt:"Kostenlos zum Gucken. Einkaufen günstig. Sonntag Markt. Süd-West Berlin. Botanischer Garten nebenan auch."},
  {id:67,n:"Bierpinsel tower",a:"Steglitz",v:["weird", "hidden"],d:67,s:"Brutalist tower shaped like a tree",st:"1972 concrete tower. Tree-mushroom-brush. Empty years, graffiti covered. Magnificent and useless.",im:"Architect in 1970: \'Restaurants in the canopy!\' Berlin said yes. Then it closed.",t:"Schloßstraße. Can\'t enter. Exterior is the point.",c:["abandoned", "weird"],r:"g",nn:"Bierpinsel Turm — Steglitz",ns:"Runde Gaststätte auf Hügel — Architektur wie Bierglas",nst:"Dieser Turm sieht aus wie Pinsel zum Biertrinken. Oben ist Gaststätte mit Aussicht. Architektur ist verrückt und es ist Steglitz. Warum nicht?",nt:"Kostenlos von außen. Essen teuer aber Aussicht kostet. Steglitz südlich. Zu Fuß raufgehen easy. Berlin verrückte Architektur."},
  {id:69,n:"Marzahn from Kienberg",a:"Marzahn",v:["weird", "vast"],d:69,s:"Europe\'s largest prefab estate",st:"Most concentrated socialist housing in Europe. Sheer scale from the Skywalk.",im:"1980. New apartment. Hot water — luxury. Your view: identical buildings to the horizon.",t:"Walk up Kienberg (free, accessible path) for the view.",c:["high_spots"],r:"g",nn:"Marzahn vom Kienberg Hügel — Marzahn",ns:"Block-Siedlung von oben — 100.000 Menschen in Beton",nst:"Vom Kienberg-Hügel siehst du Marzahn. Tausend identische Häuser. Straßen gerade wie Lineal. Es ist geplante Traum oder Albtraum, je nachdem.",nt:"Kostenlos. Gärten der Welt nebenan. Hügel zu Fuß raufgehen. Ostern. Marzahn ist große Siedlung, wenig Touristisch."},
  {id:70,n:"Schlachtensee",a:"Zehlendorf",v:["nature", "beautiful"],d:70,s:"Crystal-clear forest lake with sandy beaches",st:"Berlin\'s most beloved swimming lake. Clean glacial water, sandy shores, thick forest pressing in from all sides. On hot days the whole of southwest Berlin comes here, but there\'s always space if you walk further around.",im:"Carved by glaciers 10,000 years ago. The same water, the same sand. Your body touching the same cold that the first humans here felt.",t:"🚇 S1 to Schlachtensee (30 min from Friedrichstraße). Walk 2 min to the water. The further south you walk, the emptier it gets. Free.",c:["swimming", "nature", "romantic_water", "lakes"],r:"g",nn:"Schlachtensee — Zehlendorf",ns:"See für Wanderer — Natur ist hier noch natürlich",nst:"Dieser See ist schön und ruhig. Waldweg rum. Du kannst spazieren den ganzen Tag. Es ist wie Brandenburg aber in Berlin.",nt:"Kostenlos. Zu Fuß. Strandbad günstig. Wassersport möglich. Süd-West Berlin sehr weit weg."},
  {id:71,n:"Krumme Lanke",a:"Zehlendorf",v:["nature", "quiet"],d:71,s:"Quieter, deeper, surrounded by forest",st:"Next lake south from Schlachtensee but wilder and quieter. Deeper water, more forest. A path connects them through the trees.",im:"These lakes are a chain left by melting ice. Walk south from Krumme Lanke and you reach wilder and wilder water.",t:"🚇 U3 to Krumme Lanke (end of line, 35 min from Wittenbergplatz). Walk south toward the water. Free. Bring towel.",c:["swimming", "nature", "lakes"],r:"y",nn:"Krumme Lanke — Zehlendorf",ns:"Gebogener See — Natur hat Humor",nst:"Der See hat Name Krumme Lanke weil er ist... krumm. Waldweg rum. Camping möglich. Du bist weg von Stadt.",nt:"Kostenlos. Zu Fuß oder Fahrrad. Campingplatz günstig. Süd-West Berlin, weit weg. Sommerziel der echten Berliner."},
  {id:72,n:"Plötzensee Strandbad",a:"Wedding",v:["local", "nature"],d:72,s:"A beach in the middle of Wedding",st:"Sandy beach on a lake in Wedding. One of the few free-access lakeshores in central Berlin. The memorial is nearby but the mood is completely different — families, kids, barbecues.",im:"The lake doesn\'t know about the memorial down the road. Water is just water. Sun is just sun. People swim where they can.",t:"🚇 U9 to Amrumer Straße or bus 106 to Nordufer. Walk 5 min. Free access to parts of the lakeshore. Paid Strandbad area is a few euros.",c:["swimming", "lakes"],r:"g",nn:"Plötzensee Strandbad — Wedding",ns:"Strand am See — Berliner Sommer",nst:"Am Plötzensee sitzt du im Sand und schaust See. Die Stadt ist nah aber fühlt sich weit weg. Sonne, Wasser, Menschen.",nt:"Eintritt ca. 5-6 Euro. Sommer. Wasser sauber. Liegen überall. Biergarten auch. Wedding westlich."},
  {id:73,n:"Weißer See",a:"Pankow",v:["local", "beautiful"],d:73,s:"A lake with a free beach, boats, and a fairy-tale feel",st:"A small lake in Weißensee with a free bathing beach, rowboat rental, and parkland all around it. Art Nouveau buildings peek through the trees. On summer evenings, it feels like a village lake, not a city.",im:"In the 1920s this was a resort — Berliners took the tram here for weekend swimming. The same beach, the same water, the same summer happiness.",t:"🚇 Tram M4 or M13 to Berliner Allee / Indira-Gandhi-Straße (25 min from Alexanderplatz). Free beach on the west side. Path around the lake is a 20-min walk.",c:["swimming", "romantic_water", "parks", "lakes"],r:"g",nn:"Weißer See — Pankow",ns:"See im Pankow — wo Berliner braun werden",nst:"Dieser See hat Name weil Wasser hell ist. Strand gut. Menschen sonnen sich. Es ist Berlin-Ostsee.",nt:"Kostenlos oder Strandbad ca. 5 Euro. Sommer. Wasser OK. Pankow nördlich. U-Bahn nicht direkt."},
  {id:74,n:"Obersee & Orankesee",a:"Lichtenberg",v:["quiet", "beautiful"],d:74,s:"Twin lakes with a hidden villa garden between them",st:"Two small lakes connected by a path through the gardens of abandoned villas. Almost nobody from outside the neighborhood comes here. The water is fringed with willows and reeds. One of the most romantic spots in all of Berlin.",im:"In the 1920s, wealthy families built lakeside villas here. The DDR turned them into community spaces. Now they\'re half-abandoned, half-reclaimed, and the gardens between the lakes are magical.",t:"🚇 Tram M5 to Obersee (20 min from Alexanderplatz). Walk between the two lakes. Villa gardens are accessible. Quiet even on weekends.",c:["swimming", "romantic_water", "abandoned", "lakes"],r:"y",nn:"Obersee & Orankesee — Lichtenberg",ns:"Zwei Seen verbunden — Wasser überall",nst:"Diese zwei Seen sind nebeneinander und du kannst von einem zum anderen spazieren. Grün überall. Vögel überall. Es ist Naturschutzgebiet.",nt:"Kostenlos. Zu Fuß. Natur-Pfad gut. Lichtenberg südlich. Wenig tourisch. Wild und schön."},
  {id:75,n:"Bertolt Brecht\'s house",a:"Mitte",v:["history", "quiet"],d:75,s:"Where the playwright lived and wrote",st:"Brecht lived at Chausseestraße 125, right next to the cemetery where he\'s now buried. You can see his apartment from the street — the windows where he sat writing Mother Courage and The Threepenny Opera in his later years.",im:"Brecht at his desk, looking out at the cemetery next door where he knew he\'d end up. Writing plays about war and poverty while the DDR built socialism outside his window.",t:"Chausseestraße 125. Small museum (few euros). The cemetery next door (free) has his grave.",c:["famous_dead"],r:"g",nn:"Bertolt Brecht Haus — Mitte",ns:"Wo Brecht wohnte — Theater-Mann in seiner Wohnung",nst:"Brecht mochte Arbeit mehr als Komfort. Seine Wohnung hat gezeigt: hier arbeitete Genius. Jetzt ist Museum und du siehst wie er lebte.",nt:"Eintritt ca. 8 Euro. Deutsch gut verstehen. Mitte östlich. Führung optional. Theater-Fans müssen hin."},
  {id:76,n:"Einstein\'s Berlin addresses",a:"Schöneberg",v:["history", "hidden"],d:76,s:"Where Einstein developed general relativity",st:"Einstein lived in Berlin from 1914 to 1933 at several addresses. His apartment at Haberlandstraße 5 in Bayerisches Viertel is where he was living when the Nazis came to power. There\'s a memorial. The whole Bayerisches Viertel has memorial signs on lampposts listing the anti-Jewish laws.",im:"The greatest physicist alive, sitting in this apartment in 1933, reading in the newspaper that the new government has banned Jews from universities. Packing a suitcase. Never coming back.",t:"Haberlandstraße 5. Memorial sign. Walk the Bayerisches Viertel — the lamppost memorials listing anti-Jewish laws are devastating and unique.",c:["famous_dead", "scary"],r:"g",nn:"Einsteins Berliner Adressen — Schöneberg",ns:"Wo Einstein dachte — Relativity in Häuser",nst:"Einstein lebte an mehrere Adresse in Berlin. In einer hat er nachgedacht was Zeit ist. Die Häuser sind normal, aber drin war Genie.",nt:"Kostenlos von außen. Häuser sind privat. Nur Plaques und Geschichte. Schöneberg. Walking Tour idea."},
  {id:77,n:"Marlene Dietrich\'s birthplace",a:"Schöneberg",v:["history", "local"],d:77,s:"Where the world\'s most glamorous Berliner was born",st:"Marlene Dietrich was born at Leberstraße 65 in 1901 (building destroyed in the war, but the street is there). She grew up on Sedanstraße (now Leberstraße). A plaque marks approximately where. She left Germany in the 1930s and never really came back.",im:"A baby born on this street in 1901. She\'ll become the most famous woman in the world. She\'ll refuse to work for the Nazis. She\'ll entertain Allied troops. She\'ll never forgive Germany and Germany will never forgive her.",t:"Leberstraße (near Schöneberg Rathaus). Memorial plaque. Not much to see, but the story is powerful.",c:["famous_dead"],r:"g",nn:"Marlene Dietrich Geburtsort — Schöneberg",ns:"Wo Dietrich geboren wurde — Schöneberg ist berühmt",nst:"Marlene Dietrich wurde hier in Schöneberg geboren. Sie ist weltberühmt. Die Straße ist normal. Aber Geschichte ist overklasse.",nt:"Kostenlos von außen. Haus privat. Plaque am Haus. Schöneberg schön spazieren. Berlin hat viele Berühmte."},
  {id:78,n:"House of the Wannsee Conference",a:"Wannsee",v:["history", "quiet"],d:78,s:"Where the Holocaust was organized over breakfast",st:"On January 20, 1942, fifteen senior Nazi officials met in this beautiful lakeside villa over coffee and cognac to plan the systematic murder of Europe\'s Jews. The meeting lasted 90 minutes. The minutes were discovered after the war. The villa is now a museum and memorial. Free.",im:"Fifteen men in suits sitting around a table in a lovely house by a lake, calmly discussing how to kill 11 million people. The minutes record that they broke for breakfast.",t:"Am Großen Wannsee 56-58. Free. Open daily. Bus 114 from Wannsee S-Bahn. Take your time. Read the documents.",c:["scary", "history_big", "famous_dead"],r:"g",nn:"Haus der Wannsee Konferenz — Wannsee",ns:"Wo Holocaust geplant wurde — Horror in Villa",nst:"In diesem schönen Haus diskutierten Nazis den Genozid. Schöner Garten draußen. Horror drinnen. Das ist Deutschland.",nt:"Eintritt ca. 7 Euro. Dokumentation wichtig. Führung auf Deutsch gut. Wannsee südlich. Tagsüber offen. Wichtig zu sehen."},
  {id:79,n:"Altes Stadthaus spiral staircase",a:"Mitte",v:["beautiful", "hidden"],d:79,s:"A perfect spiral staircase in a city government building",st:"The Altes Stadthaus on Molkenmarkt has one of Berlin\'s most beautiful staircases — a spiral of white stone and iron railings rising through the tower. It\'s a government building so it\'s free to enter during office hours, but almost nobody knows the staircase is there.",im:"Imagine the architect drawing this spiral in 1911 — knowing that generations of Berliners would climb it without looking up. Look up.",t:"Molkenmarkt 1. Enter during weekday office hours. Ask at the desk if you can see the staircase. They usually say yes.",c:["staircases"],r:"g",nn:"Altes Stadthaus Wendeltreppe — Mitte",ns:"Wendeltreppe das ist Kunstwerk — Architektur die bewegt",nst:"Im Alten Stadthaus ist eine Wendeltreppe so schön dass Künstler sie malt. Spirale nach oben. Es ist Meditation.",nt:"Kostenlos wenn Building offen. Mitte. Zu Fuß hinein. Treppe fotografieren wenn allowed. Schöne alte Architektur."},
  {id:80,n:"Berliner Dom interior staircase",a:"Mitte",v:["beautiful", "history"],d:80,s:"270 steps up to the cathedral dome — dizzying spiral",st:"The Berlin Cathedral has a staircase of 270 steps spiraling up to the dome walkway with panoramic views. The staircase itself is the attraction — narrow, dizzying, with the dome\'s interior painting getting closer and closer above you.",im:"Imagine climbing this in 1905 when the cathedral was new. The same spiral, the same vertigo, the same moment when you step onto the dome walkway and Berlin opens up below.",t:"Small entrance fee. The staircase narrows near the top. Not for the claustrophobic. The view from the dome walkway is one of the best in Berlin.",c:["staircases", "high_spots"],r:"y",nn:"Berliner Dom Innenwendeltreppe — Mitte",ns:"Kirchen-Treppe zum Himmel — Stein wird spirale",nst:"In dieser Kirche ist Treppe die geht und geht. Du steigst rauf und rauf und Berlin wird klein. Oben: Kuppel. Darunter: Geschichte.",nt:"Eintritt ca. 7 Euro. Kuppel-Aufstieg Treppe. Mitte. Zu Fuß. Aussicht großartig. Kirche auch schön innen."},
  {id:81,n:"Prenzlauer Berg Altbau staircases",a:"Prenzlauer Berg",v:["beautiful", "hidden"],d:81,s:"Push open doors and find Art Nouveau staircases",st:"Many of the 1890-1910 apartment buildings in Prenzlauer Berg have stunning staircases — ornate iron railings, tiled floors, stained glass windows, carved banisters. Push open an unlocked front door and look up.",im:"A young couple in 1905, moving into their first apartment, carrying furniture up these same stairs. The tiles under their feet are the same tiles under yours.",t:"Rykestraße, Wörther Straße, Husemannstraße — the area between Kollwitzplatz and Wasserturm has the best. Push doors open, look up, be respectful.",c:["staircases", "courtyards"],r:"g",nn:"Prenzlauer Berg Altbau Treppen — Prenzlauer Berg",ns:"Geheime Treppen in alten Häusern — jede Treppe hat Story",nst:"In Prenzlauer Berg Gründerzeit-Häusern sind Treppen Kunstwerk. Griff aus Holz, Stufen verschlissen von hundert Jahren Schritte.",nt:"Kostenlos wenn du Haus betrittst. Manche Häuser haben öffentliche Innenhöfe. Kamera bereit. Prenzlauer Berg schön spazieren."},
  {id:82,n:"Topography of Terror",a:"Kreuzberg",v:["history", "free"],d:82,s:"Where the Gestapo and SS had their headquarters",st:"The Gestapo headquarters, SS command center, and Reich Security Main Office were all here. The buildings were destroyed but the cellars where prisoners were tortured are excavated and visible. A long stretch of the Berlin Wall runs alongside. Free museum.",im:"This was the most feared address in Europe. People brought here for interrogation often never left. The cellars are open to the sky now. Rain falls where screams once echoed.",t:"Niederkirchnerstraße 8. Free. Open daily. Give yourself time — it\'s extensive. The Berlin Wall fragment here is one of the longest remaining stretches.",c:["scary", "history_big"],r:"g",nn:"Topographie des Terrors — Kreuzberg",ns:"Ausgrabung der Gestapo — wo Angst wohnte",nst:"Auf diesem Platz war Gestapo-Headquarters. Unter dir Gefängnisse. Jetzt ist Ausstellung im Freien. Du siehst Grundmauern. Horror in Mauern bleibt.",nt:"Kostenlos von außen. Ausstellung-Gebäude auch kostenlos. Information gut. Kreuzberg. Zu Fuß. Wichtig zu verstehen was passiert ist."},
  {id:83,n:"Sachsenhausen approach (from Oranienburg)",a:"Various",v:["history", "quiet"],d:83,s:"Walk the route prisoners walked to the camp",st:"Sachsenhausen concentration camp is a 35-minute S-Bahn ride from central Berlin. But what most people miss: the walk from Oranienburg station to the camp follows approximately the route prisoners were marched. The camp is free, devastating, and essential.",im:"Walking this road in 1936. A column of prisoners, shaved heads, thin clothes in winter. The town\'s residents watch from their windows. Nobody stops it.",t:"S1 to Oranienburg. Walk 20 minutes to the camp. Free entry. Audio guide a few euros. Go early, take your time. This is not a quick visit.",c:["scary", "history_big"],r:"g",nn:"Sachsenhausen-Denkmal Annäherung von Oranienburg — Brandenburg",ns:"Konzentrationslager-Gedenkstätte — Horror außerhalb Stadt",nst:"Sachsenhausen ist ehemaliges Konzentrationslager. Du kannst von Oranienburg Zug fahren und sehen: das war Reality für Tausende. Es ist wichtig und traurig.",nt:"Kostenlos Gedenkstätte. Führung verfügbar. Oranienburg U-Bahn + Bus. 1 Stunde von Berlin. Emotional. Respekt nötig."},
  {id:84,n:"Eisfabrik (Ice Factory ruins)",a:"Mitte",v:["weird", "secret"],d:84,s:"A crumbling ice factory on the Spree — abandoned since WWII",st:"On the banks of the Spree near Schiffbauerdamm stands a ruined building that was once Berlin\'s ice factory. It\'s been abandoned since the war and slowly crumbling. You can\'t enter, but from the riverbank you can see the hollow shell — one of the last true war ruins in central Berlin.",im:"This factory made ice for Berlin\'s butchers and restaurants in the 1900s. Then the bombs came. Then everyone forgot about it. Now it just stands there, falling apart in the middle of a city that rebuilt everything else.",t:"Visible from the Spree bank path near Schiffbauerdamm. Best seen from across the river. You can\'t enter — just look.",c:["abandoned", "scary"],r:"y",nn:"Eisfabrik Ruinen — Mitte",ns:"Verlassene Fabrik wo Kunstler arbeiten — DDR Industrial",nst:"Eisfabrik war Eismaschinen-Fabrik. Jetzt ist verfallen. Künstler nutzen es. Mauern sind Galerie. Es ist Industrie-Poesie.",nt:"Kostenlos von außen. Manchmal Kunstprojekte offen. Führung frag ab. Mitte südlich. U-Bahn Warschauer Straße."},
  {id:87,n:"Treptower Park Spree banks",a:"Treptow",v:["beautiful", "quiet"],d:87,s:"Kilometre-long tree-lined Spree banks — the most romantic walk in Berlin",st:"The Spree banks through Treptower Park are lined with massive old trees, wide grassy slopes running down to the water, and benches placed perfectly for watching boats and sunsets. In the evening light, this might be the single most beautiful free walk in Berlin.",im:"Berliners have been walking along this stretch of river since the 1800s. The trees are the same. The river is the same. The feeling of the sun going down over the water — exactly the same.",t:"Walk from S Treptower Park south along the Spree. Keep going past the Soviet memorial. The stretch toward Plänterwald is the quietest and most beautiful.",c:["romantic_water", "parks"],r:"g",nn:"Treptower Park Spree Ufer — Treptow",ns:"Park am Fluss — Spree macht Park schöner",nst:"Der Park ist groß und Spree läuft durch. Du sitzt am Wasser und schaust Fluss. Boote fahren. Vögel schreien. Es ist entspannt.",nt:"Kostenlos. Zu Fuß. Boot fahren möglich. U-Bahn Treptower Park. Spree-Uferweg lang und schön."},
  {id:88,n:"Bus 100 — the free sightseeing bus",a:"Various",v:["free", "beautiful"],d:88,s:"A regular city bus that passes every major landmark",st:"Bus 100 runs from Zoologischer Garten to Alexanderplatz and passes the Victory Column, Reichstag, Brandenburg Gate, Unter den Linden, and Museum Island. It\'s a regular double-decker city bus that happens to hit every major sight. Sit upstairs, front seat.",im:"You\'re on the top deck of a double-decker bus, watching all of central Berlin roll past your window like a movie. Except this movie cost €3.50 and has real people in it.",t:"Get on at Zoo or Alex. Sit upstairs, front left seat. A regular BVG ticket is all you need. Runs every 5-10 minutes.",c:["rides", "instagram"],r:"g",nn:"Bus 100 — der kostenlose Sightseeing Bus — Verschiedene",ns:"Bus durch Zentrum — beste Sightseeing ist öffentlich",nst:"Mit Bus 100 siehst du Zentrum. Schloss, Reichstag, Tiergarten, Kurfürstendamm. Alles aus Bus. Kostenlos mit Ticket.",nt:"Kostenlos mit Berliner Ticket. 30 Minuten fahrt. Täglich. Von Zentrum Bahnhof. Tourist oder Berliner: alle nutzen."},
  {id:89,n:"S1 ride — along the former Wall, end to end",a:"Various",v:["vast", "history"],d:89,s:"A train ride that traces the entire Cold War divide",st:"The S1 runs from Wannsee in the far southwest to Oranienburg in the far north. For much of its length, it runs exactly along where the Berlin Wall stood. You pass through wealthy west, through the center, and out into the east. Every station change is a chapter of Berlin history.",im:"This train line was split for 28 years. West Berlin passengers could only ride part of it. East Berlin passengers the other part. Now the whole line is connected again. Sit on this train and you\'re riding reunification.",t:"Get on at either end. The ride takes about 80 minutes end to end. Wannsee is near the Bridge of Spies. Oranienburg is near Sachsenhausen. Both ends are worth exploring.",c:["rides", "history_big"],r:"g",nn:"S1 Fahrt — entlang der alten Mauer, Ende zu Ende — Verschiedene",ns:"Zug-Fahrt entlang Mauer — Geschichte vorbei fahren",nst:"S1 fährt wo die Mauer war. Berlin Nord zu Süd. Du siehst die Linien wo Mauer war. Du merkst: Spaltung ist sichtbar im Bild.",nt:"Kostenlos mit Ticket. 30 Minuten oder mehr. Guck raus Fenster. Alte Mauer-Teile noch sichtbar. Wichtig historisch."},
  {id:90,n:"U5 ride — new stations from Hauptbahnhof to Alexanderplatz",a:"Mitte",v:["beautiful", "weird"],d:90,s:"Berlin\'s newest U-Bahn stations are underground cathedrals",st:"The U5 extension opened in 2020 with stations designed as art. Museumsinsel station has 6,600 points of light in the ceiling — a starry sky underground. Unter den Linden station has vast modernist halls. Bundestag station is sleek and enormous. Ride just 4 stops and you\'re in a design exhibition.",im:"These stations took 20 years to build. Engineers had to tunnel under the Spree, under Museum Island, under history itself. Now you ride through in 8 minutes without thinking.",t:"Get on at Hauptbahnhof or Alexanderplatz. Ride the full U5 if you have time — it goes all the way to Hönow at the eastern city edge. But the new section between Hauptbahnhof and Alex is the showpiece.",c:["rides", "staircases", "instagram"],r:"g",nn:"U5 Fahrt — neue Stationen von Hauptbahnhof zu Alexanderplatz — Mitte",ns:"U-Bahn neue Linie — Zentrum verbunden frisch",nst:"U5 ist relativ neu. Sie verbindet Hauptbahnhof zu Alexanderplatz. Stationen sind modern. Du siehst Berlin wird durchlüftet.",nt:"Kostenlos mit Ticket. 20 Minuten fahrt. Stationen neu und sauber. Häufig. Mitte zentral."},
  {id:91,n:"S7 to Ahrensfelde — where Berlin just stops",a:"Various",v:["weird", "vast"],d:91,s:"Ride to the eastern terminus where the city meets fields",st:"The S7 takes you from the center of Berlin to Ahrensfelde, where the city abruptly ends and open farmland begins. Step off the train at the last stop and you\'re standing at Berlin\'s edge — Plattenbau towers behind you, wheat fields ahead. It\'s one of the sharpest city-countryside borders you\'ll ever see.",im:"For 28 years this was the edge of East Berlin. The countryside beyond was another country. Now it\'s just... the end of the S-Bahn line. You can walk into the fields.",t:"S7 from Friedrichstraße. Ride to the end. Step off. Walk to where the buildings end and the fields begin. Then ride back. The whole trip is a meditation on edges.",c:["rides"],r:"g",nn:"S7 nach Ahrensfelde — wo Berlin gerade stop — Brandenburg",ns:"Zug in Nothingness — wohin fahren wenn es keine Stadt mehr gibt",nst:"S7 fährt bis Ahrensfelde und dann: Natur. Feld. Himmel. Du merkst: Berlin ist nicht unendlich. Draußen ist das echte Land.",nt:"Kostenlos mit Ticket. 45 Minuten fahrt. Fenster offen. Natur überall plötzlich. Grenze zwischen Stadt und Land sichtbar."},
  {id:92,n:"Heidelberger Platz U-Bahn station",a:"Charlottenburg",v:["beautiful", "hidden"],d:92,s:"An underground cathedral with echoing vaults",st:"Heidelberger Platz station on the U3 is twice as deep as most stations. The vaulted ceiling creates a cathedral atmosphere — voices echo, footsteps resonate. It was designed in 1913 and feels like walking into a church. Most Berliners ride through without looking up.",im:"1913. They\'re building a train station underground and the architect decides it should feel like a cathedral. Not because God is here, but because the daily commute deserves beauty too.",t:"U3 Heidelberger Platz. Stand in the center of the platform and look up. Listen to the echo. Then look at the Art Deco details in the tilework.",c:["rides", "staircases"],r:"g",nn:"Heidelberger Platz U-Bahn Station — Charlottenburg",ns:"U-Bahn Station schön designt — Funktionalität wird Kunstwerk",nst:"Diese Station ist wunderschön designt. Fliesen, Licht, Architektur. Du stellst dich hin und staunst. U-Bahn kann schön sein.",nt:"Kostenlos zum Gucken. Charlottenburg westlich. U7 Linie. Fotografieren erlaubt. Viele beste U-Bahn Stationen in Berlin."},
  {id:93,n:"M10 tram ride — Kreuzberg to Prenzlauer Berg",a:"Various",v:["local", "vast"],d:93,s:"The tram that connects two Berlins",st:"The M10 runs from Warschauer Straße through Friedrichshain, up through Prenzlauer Berg to Wedding. It crosses from the east hipster heartland into the old working-class north. Watch through the window as döner shops become Vietnamese restaurants become African hair salons. Berlin\'s diversity in one tram ride.",im:"This tram runs through what used to be East Berlin only. All of it was behind the Wall. Now it\'s the most international stretch of city in Germany.",t:"Get on at Warschauer Straße. Ride north. Sit by the window. Watch the city change.",c:["rides"],r:"g",nn:"M10 Straßenbahn Fahrt — Kreuzberg zu Prenzlauer Berg — Verschiedene",ns:"Straßenbahn durch historische Straßen — Alt-Berlin sichtbar",nst:"M10 fährt durch alte Stadtteile. Du siehst Geschichte Schicht für Schicht. Gründerzeit-Häuser, Boutiquen, Leben.",nt:"Kostenlos mit Ticket. 40 Minuten fahrt. Fenster offen. Guck raus für Details. Beste Richtung Nord gen Süd."},
  {id:94,n:"Tegeler Fließ wetlands walk",a:"Reinickendorf",v:["nature", "quiet"],d:94,s:"Water buffalo, rare birds, and wildflower meadows — 30 min from the center",st:"A 6km walk along the Tegeler Fließ — a stream valley with wetlands, reed beds, and (yes) water buffalo grazing in the meadows. Rare birds nest here. Wildflowers everywhere in spring. It feels like Brandenburg, not Berlin.",im:"Water buffalo in Berlin. Not in a zoo — just standing in a wetland eating grass, 30 minutes from Alexanderplatz. Berlin is weirder than people think.",t:"S-Bahn to Hermsdorf or Alt-Tegel. Walk north to the Fließ. The path follows the stream east through Lübars to Schildow. Completely free.",c:["nature_walks", "nature"],r:"g",nn:"Tegeler Fließ Feuchtgebiet Spaziergang — Reinickendorf",ns:"Sumpf-Wanderung — Natur braucht Feuchtigkeit zum Leben",nst:"Tegeler Fließ ist Naturschutzgebiet. Vögel überall. Sumpf überall. Du siehst Berlin macht Platz für Natur.",nt:"Kostenlos. Zu Fuß. Mücken im Sommer möglich. Fernglas gut. Reinickendorf nord. Wild und ursprünglich."},
  {id:95,n:"Wuhletal trail",a:"Marzahn",v:["nature", "quiet"],d:95,s:"A hidden valley walk from Marzahn to Köpenick",st:"The Wuhle is a small river that carved a green valley through east Berlin. A trail follows it from Marzahn south through surprisingly wild landscape — meadows, ponds, kingfishers — all the way to the Spree near Köpenick. Nobody from west Berlin has ever heard of it.",im:"In the shadow of Marzahn\'s tower blocks, a river cuts through a valley of wildflowers. The contrast is Berlin in one image.",t:"U5 to Wuhletal station (the station is named after it). Walk south along the river. The trail goes for 12km. Do as much as you want.",c:["nature_walks", "nature"],r:"g",nn:"Wuhletal Wanderweg — Marzahn",ns:"Tal durch Ost-Berlin — Fluss macht Wald",nst:"Wuhle ist Fluss und hat Tal. Du wanderst und Bäume werden dichter. Nach 20 Minuten: keine Stadt. Nur Natur.",nt:"Kostenlos. Zu Fuß oder Fahrrad. Marzahn östlich. Picknick ideal. Wild und ruhig."},
