  {id:96,n:"Panke trail to Karower Teiche",a:"Pankow",v:["nature", "local"],d:96,s:"Follow a river from Wedding to wild ponds with birds",st:"Start in urban Wedding and follow the Panke river north for 8km. The city fades away. You end up at Karower Teiche — a nature reserve with ponds, waterfowl, and actual water buffalo. Then hop on the S-Bahn home.",im:"Walking north along the Panke is like time-traveling backwards through Berlin\'s history. Concrete gives way to gravel, gravel to grass, grass to wild reeds.",t:"Start at S Gesundbrunnen, follow Panke north. End at Karower Teiche (near S Karow). The S-Bahn takes you back in 20 minutes.",c:["nature_walks", "nature"],r:"g",nn:"Panke Wanderweg zu Karower Teiche — Pankow",ns:"Fluss-Wanderweg in Nord — Wasser führt in Stille",nst:"Panke-Wanderweg geht zu Karower Seen. Wald überall. Wasser überall. Du wechselst von Stadt zu Natur.",nt:"Kostenlos. Zu Fuß. Pankow nördlich. Länge variabel. Seen schön zum Schwimmen im Sommer."},
  {id:97,n:"Grunewald circular walk via Teufelssee",a:"Grunewald",v:["nature", "beautiful"],d:97,s:"A forest lake circuit through Berlin\'s biggest forest",st:"A loop through Grunewald forest past Teufelssee (Devil\'s Lake) — a dark, still lake surrounded by old-growth beech and oak. The path climbs through forest, past Teufelsberg, and back. Wild boar live here. You\'ll forget you\'re in a city of 4 million.",im:"This forest has been here for thousands of years. Kings hunted here. Artists painted it. Soldiers hid in it. Now families hike it on Sundays and the boar still don\'t care.",t:"S-Bahn Grunewald, walk west into the forest. Follow signs to Teufelssee. The full loop is about 10km. Completely free.",c:["nature_walks", "nature", "swimming"],r:"y",nn:"Grunewald Rundweg über Teufelssee — Grunewald",ns:"Waldweg in Kreis — Natur ist auch Meditation",nst:"Grunewald-Rundweg geht um Teufelssee. Du läufst und läufst und merkst: alles ist Wald. Zeit wird anders.",nt:"Kostenlos. Zu Fuß oder Fahrrad. Grünewald westlich. Länge ca. 10 km. Karte brauchst. Picknick perfekt."},
  {id:98,n:"James Simon Galerie",a:"Mitte",v:["beautiful", "free"],d:98,s:"Museum Island\'s newest building — geometry, columns, perfect light",st:"David Chipperfield\'s entrance building for Museum Island (2019) is a photographer\'s dream. Minimal columns, clean stone, wide staircases that catch the light perfectly. The exterior and staircase are free to walk.",im:"An architect designed a building specifically to make you look good standing in front of it. The columns frame you. The stairs elevate you. The light sculpts you. It\'s architecture as Instagram filter.",t:"Bodestraße, Museum Island. The exterior stairs and colonnades are free. Best light: late afternoon or blue hour.",c:["instagram", "staircases"],r:"g",nn:"James Simon Galerie — Mitte",ns:"Neue Eingang zur Museumsinsel — modern trifft alt",nst:"James Simon Galerie ist neue Eingang zur Museumsinsel. Architektur modern. Innen alt. Es ist Brücke zwischen Zeiten.",nt:"Kostenlos zum Gucken. Mitte zentral. Zu Fuß. Museum-Ticketverkauf hier. Café auch. Neue Architektur."},
  {id:99,n:"Haus Schwarzenberg street art courtyard",a:"Mitte",v:["weird", "local"],d:99,s:"The last raw courtyard in polished Mitte",st:"While the Hackesche Höfe got renovated into boutiques, Haus Schwarzenberg next door stayed wild. The courtyard is covered floor-to-ceiling in street art — changing constantly. Art studios, the Anne Frank memorial, and Monster Kabinett are inside. It\'s the last piece of 1990s Berlin in Mitte.",im:"Every wall was tagged, painted, pasted over, and painted again. Layers on layers. This courtyard is a time capsule of every style of Berlin street art from the last 30 years.",t:"Rosenthaler Straße 39. Walk through the entrance into the courtyard. Free. Every surface is art. Look up, look down.",c:["instagram", "courtyards"],r:"g",nn:"Haus Schwarzenberg Street Art Hof — Mitte",ns:"Künstler-Hof voller Graffiti — wo Wand Seele hat",nst:"In diesem Hof haben Künstler überall gemalt. Jede Wand ist Kunstwerk. Café unten. Künstler-Vibes überall.",nt:"Kostenlos. Mitte. Zu Fuß. Café günstig. Nachts magisch. Kunstliebhaber müssen hin."},
  {id:100,n:"East Side Gallery",a:"Friedrichshain",v:["history", "vast"],d:100,s:"1.3km of painted Wall — the world\'s longest open-air gallery",st:"The longest remaining stretch of the Berlin Wall, painted by artists from around the world after it fell. 105 paintings on 1.3km of concrete. The most famous: Brezhnev and Honecker kissing, and the Trabant breaking through the Wall.",im:"In 1989 this was a death strip. Within months, artists were painting it. A wall that killed people became a canvas. That transformation is Berlin in one act.",t:"Along Mühlenstraße. Free. Walk the full 1.3km. Go early morning for photos without crowds. The river side is less visited.",c:["instagram", "history_big"],r:"g",nn:"East Side Gallery — Friedrichshain",ns:"Längste Kunstwerk-Mauer der Welt — Künstler haben Angst gezeigt",nst:"East Side Gallery ist 1,3 Kilometer lange Mauer-Kunstwerk. Jedes Gemälde hat Botschaft. \'My God, help me survive this deadly love\' — und du weißt: Mauer ist weg.",nt:"Kostenlos. Friedrichshain südlich. Zu Fuß lang. Frühjahr/Herbst beste Lichter. Künstler malen manchmal noch."},
  {id:101,n:"Molecule Man from Elsenbrücke",a:"Treptow",v:["beautiful", "weird"],d:101,s:"Three giant aluminum figures in the Spree",st:"Jonathan Borofsky\'s 30-meter sculpture of three figures meeting in the river — symbolizing the meeting of three former city districts (Kreuzberg, Treptow, Friedrichshain). Best photographed from the Elsenbrücke bridge or the Spree banks at sunset.",im:"Three giants standing in the river where three Berlins used to meet. Full of holes — you can see the sky through them. We\'re all full of holes too.",t:"View from Elsenbrücke bridge (S Treptower Park). Sunset photos are extraordinary — the figures are silhouetted against the sky.",c:["instagram", "romantic_water"],r:"g",nn:"Molecule Man von Elsenbrücke — Treptow",ns:"Riesige Statue im Fluss — Mensch tanzt im Wasser",nst:"Molecule Man ist riesig. Die Figur steht im Wasser und tanzt fast. Von Elsenbrücke siehst du ihn. Es ist magisch.",nt:"Kostenlos. Elsenbrücke südlich. Zu Fuß über Brücke. Foto-Spot berühmt. Spree schön hier auch."},
  {id:102,n:"Teledisko at RAW Gelände",a:"Friedrichshain",v:["weird", "local"],d:102,s:"The world\'s smallest disco — inside a phone booth",st:"A repurposed phone booth at RAW Gelände that\'s been turned into the world\'s tiniest nightclub. Put in a coin, pick a song, and for 3 minutes you get fog machine, strobe lights, disco ball, and a dancefloor for one (or two, if you squeeze).",im:"Berlin turned a phone booth into a nightclub. Because why not. Because this city takes abandoned infrastructure and makes it dance.",t:"RAW Gelände, near the entrance area. Look for the old phone booth with lights inside. A few coins per ride. Best at night.",c:["instagram", "weird"],r:"g",nn:"Teledisko im RAW-Gelände — Friedrichshain",ns:"Stille-Disco in Bahnhalle — Musik in Köpfe nicht in Ohren",nst:"Teledisko ist wo Leute tanzen zu Musik die nur Sie hören. Jeder tanzt zur anderen Musik. Es ist surreal und es ist lustig.",nt:"Eintritt ca. 10-15 Euro. Kopfhörer bekommen. Freitag-Sonntag Betrieb. RAW-Gelände. Weit, aber cool."},
  {id:104,n:"Neu-Venedig (New Venice)",a:"Köpenick",v:["beautiful", "hidden"],d:104,s:"Five canals, 13 bridges, water lilies — Berlin\'s secret Venice",st:"Hidden between Müggelsee and Dämeritzsee: a settlement of holiday homes along five hand-dug canals with 13 bridges. Water lilies, swans, weeping willows, tiny footbridges. Dug in 1926 when they decided to live with the marshland instead of draining it.",im:"1926. Someone looks at a swamp: \'What if we don\'t drain it? What if we dig canals?\' Now it\'s a Venice that 99% of Berliners have never heard of.",t:"S3 to Wilhelmshagen (AB zone), 15 min walk. Paths are public. Free. Canoe rental ~€10/hr but walking is free.",c:["romantic_water", "nature", "instagram"],r:"g",nn:"Neu-Venedig Kanäle — Köpenick",ns:"Kanäle zwischen Gartenhütten — Arbeiters Traum von Venice",nst:"Neu-Venedig ist Kanäle zwischen kleine Gartenhütten. Leute wohnen hier in Miniatur-Häuschen. Es ist wie Alice im Wunderland.",nt:"Kostenlos zu gucken. Köpenick südlich. Zu Fuß. Boot fahren möglich. Sommer populär. Ruhig und verrückt."},
  {id:105,n:"Holzmarkt 25",a:"Friedrichshain",v:["local", "weird"],d:105,s:"A hand-built creative village on the Spree",st:"When Bar 25 was demolished, the community crowdfunded to buy the land back. Holzmarkt 25 is what they built — restaurants, workshops, a club, a kindergarten, a sauna, all on the Spree bank. Ramshackle, idealistic, alive.",im:"Berlin keeps selling riverbanks to developers. These people said no. They crowdfunded, fought city hall, built a village with their hands. Messy, free, theirs.",t:"Holzmarktstraße 25 (near Jannowitzbrücke). Free to walk. Riverbank terrace is beautiful.",c:["romantic_water", "instagram"],r:"g",nn:"Holzmarkt 25 — Friedrichshain",ns:"Künstler-Dorf am Spree-Ufer — schwimmende Häuser",nst:"Holzmarkt 25 sind zusammengewürfelte Holzhütten am Wasser. Künstler arbeiten. Musik spielt. Es ist Traum von Freiheit.",nt:"Kostenlos zum Gucken. Getränk kaufen wenn du bleibst. Friedrichshain Ost. Zu Fuß. Abends beste Zeit. Live-Musik oft."},
  {id:106,n:"Boros Collection bunker",a:"Mitte",v:["history", "weird"],d:106,s:"WWII bunker → Soviet prison → fruit warehouse → techno club → fetish dungeon → art gallery",st:"This concrete cube has been a wartime shelter, Soviet POW prison, tropical fruit warehouse, techno club, and fetish dungeon. Now it houses a billionaire\'s art collection. The exterior alone tells the story — raw concrete in polished Mitte.",im:"Every layer is a Berlin chapter. Air raids. Soviet prisoners. Bananas. Techno. Fetish. Contemporary art. All in one concrete cube.",t:"Reinhardtstraße 20. Exterior always visible. Art visits free but book months ahead. The building itself is the statement.",c:["abandoned", "history_big", "instagram"],r:"g",nn:"Boros Collection Bunker — Mitte",ns:"Kunstsammlung in Nazi-Bunker — Schönheit über Dunkelheit",nst:"Dieser Bunker war Nazi-Zeit. Jetzt hängen Kunstwerke drin. Du gehst runter und merkst: Kunst kann Dunkelheit aufheben.",nt:"Eintritt ca. 12 Euro. Führung nur möglich. Mitte. Zu Fuß. Anmeldung brauchst. Limitierte Besucherzahl. Faszinierend und strange."},
  {id:107,n:"Siemensbahn ghost railway",a:"Spandau",v:["secret", "weird"],d:107,s:"An entire 1929 elevated railway frozen since 1980",st:"A full S-Bahn line built by Siemens in 1929 for factory workers. Closed 1980. Abandoned since — stations, platforms, tracks, all overgrown. Trees grow from platforms. Ghost stations visible from below.",im:"1929 — gleaming electric railway, workers commuting to the future. Now birch trees on platforms, ivy in ticket halls. The future became the past.",t:"Walk Rohrdamm or Nonnendammallee to see elevated structure. Wernerwerk and Siemensstadt stations most visible. See it before it reopens.",c:["abandoned", "rides"],r:"g",nn:"Siemensbahn Geisterbahn — Spandau",ns:"Alte Bahn die ging nie — verlassene Schienen",nst:"Siemensbahn ist alte Eisenbahn die kaum fuhr. Jetzt ist verlassen. Schienen sind da aber kein Zug. Es ist Relikt.",nt:"Kostenlos. Zu Fuß along Schienen. Spandau westlich. Museum auch. Historisch interessant. Geister-Gefühl."},
  {id:109,n:"The Ringbahn experiment",a:"Various",v:["weird", "local"],d:109,s:"Get off at a random ring station and explore for 30 min",st:"Ride S41/S42. Close your eyes. Get off at random. Walk 15 minutes in any direction, then back. Every station is a different Berlin. Sonnenallee ≠ Westend ≠ Wedding ≠ Treptow.",im:"Berlin is 30 cities pretending to be one. The ring connects them. Close your eyes, get off, discover which Berlin you\'ve landed in.",t:"S41 or S42. Eyes closed. Get off. Walk. Repeat at different stations on different days.",c:["rides"],r:"g",nn:"The Ringbahn Experiment — Verschiedene",ns:"Zug rund um Berlin fahren — was ist am Rand?",nst:"Ringbahn fährt im Kreis um ganz Zentrum. Wenn du am ganzen fahrt sitzest, siehst du was Berlin ist. Von innen.",nt:"Kostenlos mit Ticket. 1-1,5 Stunde Fahrt. Täglich. S-Bahn. Guck raus Fenster die ganze Zeit. Besser als Bus 100."},
  {id:110,n:"Bornholmer Straße bridge",a:"Prenzlauer Berg",v:["history", "quiet"],d:110,s:"The exact spot where the Berlin Wall first opened",st:"On November 9, 1989, this was the first border crossing to open. The guards were overwhelmed by the crowd and just let people through. Thousands streamed across this bridge — the first steps from East to West in 28 years. A memorial marks the exact spot.",im:"The guard looks at the crowd. He looks at his orders. He looks at the crowd again. Then he shrugs and opens the barrier. The Cold War ends on a bridge in Prenzlauer Berg because one man decided not to follow orders.",t:"S Bornholmer Straße. Walk onto the bridge. The memorial is on the east side. Free. Almost nobody visits. One of the most important spots in 20th-century history.",c:["history_big"],r:"g",nn:"Bornholmer Straße Brücke — Prenzlauer Berg",ns:"Brücke wo Flüchtlinge sprangen — Mauer-Tod-Stätte",nst:"Auf dieser Brücke sprangen Menschen von Mauer beim Fall. Die Höhe war hoch. Manche überlebten, manche nicht. Jetzt ist normale Brücke.",nt:"Kostenlos. Prenzlauer Berg nord. Gedenkstelle suchen. Zu Fuß über. Geschichte ist überall wenn du guckst."},
  {id:111,n:"Gleimtunnel",a:"Wedding",v:["history", "secret"],d:111,s:"A brick tunnel where the Berlin Wall ran overhead",st:"This 1800s railway underpass became a border crossing during the Wall years — the Wall ran right over the top. Bricked up for 28 years. Now you can walk through and see the memorial on both sides. The brickwork still feels heavy, old, and haunted.",im:"You\'re walking through in 1985. Except you can\'t — it\'s sealed. East on one side, West on the other. People who grew up 50 meters apart haven\'t seen each other in decades. The tunnel waits.",t:"Gleimstraße at the Mauerpark end. Walk through slowly. Look at the memorial plaques on the Wedding side. Then walk into Mauerpark.",c:["history_big", "scary"],r:"g",nn:"Gleimtunnel — Wedding",ns:"Tunnel voller Graffiti — Untergrund-Kunst",nst:"Gleimtunnel ist U-Bahn Tunnel voller Graffiti. Künstler machen Kunstwerk ohne Papier. Wand ist Leinwand.",nt:"Kostenlos. Wedding nord. U-Bahn Gleisdreieck. Kunstliebhaber mögen. Künstler arbeiten manchmal noch."},
  {id:112,n:"Yorckbrücken",a:"Schöneberg",v:["weird", "beautiful"],d:112,s:"30 rusting iron railway bridges — a cathedral of steel",st:"Over Yorckstraße, roughly 30 old railway bridges span the road in a row — some active, most abandoned. Different eras, different styles, rusting at different speeds. Painted in wild colours since 2015. Walking under them feels like passing through an industrial cathedral.",im:"1880s. Every bridge carries a different railway company into Anhalter or Potsdamer Bahnhof. Steam and noise and coal smoke. Now: silence, rust, pigeons, street art.",t:"Yorckstraße between S Yorckstraße and U Yorckstraße. Walk the full length. Look up. Some bridges have been painted bright colours — green, orange, blue.",c:["instagram", "history_big"],r:"g",nn:"Yorckbrücken — Schöneberg",ns:"Brücke über Brücke — Verkehr wird Architektur",nst:"Yorckbrücken sind übereinander Brücken. Eisenbahn und U-Bahn kreuzen sich. Es ist Puzzle aus Eisen.",nt:"Kostenlos. Schöneberg nah. Zu Fuß unter Brücken. Architektur-Fans lieben. Fotos interessant."},
  {id:113,n:"Yorck train tracks nature trail",a:"Schöneberg",v:["nature", "secret"],d:113,s:"Wild overgrown railway tracks you can walk along",st:"Behind the Yorck bridges, old rail lines stretch south through Schöneberg — tracks still in the ground, overgrown with birch trees and wildflowers. A secret corridor of green running through the city. Some sections are now Flaschenhalspark, some are still wild.",im:"Last train: maybe 1952. Since then, nature reclaimed every centimeter. Rails buried in moss. Signal boxes covered in ivy. A fox path through what used to be an empire\'s railway.",t:"🚇 Enter from Yorckstraße S-Bahn side or from Monumentenbrücke. Flaschenhalspark is the publicly accessible section with maintained paths. Stay on designated trails.",c:["nature", "abandoned", "nature_walks"],r:"g",nn:"Yorck Bahngleise Natur-Pfad — Schöneberg",ns:"Weg entlang Schienen — wo Natur erobert Eisen",nst:"Entlang alten Yorck-Schienen ist Naturpfad. Gras wächst aus Stein. Bäume übernehmen. Natur kämpft mit Stadt.",nt:"Kostenlos. Schöneberg. Zu Fuß. Länge variabel. Ruhig und grün. Interessant für Natur-Fotos."},
  {id:115,n:"Urban Nation Museum",a:"Schöneberg",v:["art", "free"],d:115,s:"A whole museum of street art — inside and out",st:"A building covered in massive murals housing curated urban art exhibitions inside. Feels like walking a graffiti world that somebody turned into a gallery. Artists from all over the world. The exterior alone is worth the trip — every wall is a canvas.",im:"Imagine if Banksy designed a museum and then invited every street artist alive to fill it. That\'s roughly what happened here.",t:"Bülowstraße 7. Free entry. Check the exterior murals on surrounding streets too — the whole block is a gallery.",c:["instagram", "art"],r:"g",nn:"Urban Nation Museum — Schöneberg",ns:"Museum für Urban Art — Graffiti ist Kunstform",nst:"Urban Nation zeigt Straßen-Kunstwerk in Museum. Graffiti wird legitim. Du siehst: Straße hat Kunst immer gehabt.",nt:"Eintritt ca. 12 Euro. Schöneberg südlich. Zu Fuß. Führung verfügbar. Street Art Fans müssen hin."},
  {id:116,n:"Haus am Lützowplatz",a:"Tiergarten",v:["art", "quiet"],d:116,s:"Tiny contemporary art gallery — empty, free, surprising",st:"A small exhibition space with rotating contemporary shows that locals drop into and tourists never find. Quiet rooms, interesting work, the feeling of having a gallery to yourself. Sometimes video art, sometimes installations, always free.",im:"You walk in and there\'s nobody here. Just you and whatever strange beautiful thing an artist made this month. This is what galleries felt like before Instagram.",t:"Lützowplatz 9. Free. Check what\'s on — shows rotate every few weeks.",c:["art"],r:"g",nn:"Haus am Lützowplatz — Tiergarten",ns:"Kunsthaus voller Geschichte — Künstler und Politik vermischt",nst:"Dieses Haus ist Kunsthaus. Historisch wichtig. Künstler haben hier gelebt und gearbeitet. Politik und Kunst vermischt.",nt:"Kostenlos manchmal. Ausstellungen kosten. Tiergarten westlich. Zu Fuß. Lützowplatz auch schön spazieren."},
  {id:117,n:"Schinkel Pavillon",a:"Mitte",v:["art", "hidden"],d:117,s:"Contemporary art in a tiny neoclassical jewel box",st:"A small octagonal pavilion from the 1960s (named after Berlin\'s legendary architect Schinkel) hosting ambitious contemporary art exhibitions. The space is so small that installations feel immersive — you\'re inside the art, not looking at it.",im:"Schinkel built half of classical Berlin. Now his namesake pavilion holds art that would make him raise an eyebrow. The old city meets whatever comes next.",t:"Oberwallstraße 1, near Schlossplatz. Free or donation. Check current show — some are extraordinary.",c:["art", "history_big"],r:"g",nn:"Schinkel Pavillon — Mitte",ns:"Kleine Klassisches Gebäude — Architektur ist Gesamtkunstwerk",nst:"Schinkel war Architektur-Genie und dieses Pavillon zeigt: weniger ist mehr. Symmetrie überall. Es ist perfekt.",nt:"Eintritt ca. 3 Euro. Mitte. Zu Fuß. Tiergarten nebenan. Architektur-Studenten lieben. Ganz und einfach elegant."},
  {id:118,n:"Hansaviertel",a:"Tiergarten",v:["weird", "beautiful"],d:118,s:"A whole neighbourhood designed by the world\'s best architects",st:"After the 1957 Interbau exhibition, this neighbourhood was rebuilt by 53 architects from 13 countries — Aalto, Niemeyer, Gropius, all of them. Every building is different. Walk through and you\'re in an open-air architecture museum. Brutalist towers next to organic curves next to glass boxes.",im:"1957. Berlin says: \'We\'ll rebuild this neighbourhood as the future.\' Niemeyer flies in from Brazil. Aalto from Finland. Each designs one building. The future arrives, one block at a time.",t:"U Hansaplatz. Walk slowly. Every building is by a different famous architect. The Aalto building and Niemeyer apartment block are the stars. Free, always, just walk.",c:["instagram", "history_big"],r:"g",nn:"Hansaviertel — Tiergarten",ns:"1957er Expo-Viertel — Zukunft war damals optimistisch",nst:"Hansaviertel wurde für 1957 Bau-Ausstellung entwickelt. Modernes Design überall. Bäume überall. Es ist Traum von besser Zukunft.",nt:"Kostenlos. Zu Fuß spazieren. Tiergarten nah. Café überall. Architektur interessant. Abschlag Lotterie."},
  {id:119,n:"Futurium",a:"Mitte",v:["weird", "free"],d:119,s:"Free interactive museum about the future — surprisingly good",st:"A genuinely great free museum about technology, cities, nature, and the future. Interactive, smart, not dumbed down. The building itself is striking — angular and reflective on the Spree. The rooftop terrace has views. The lab lets you tinker and build.",im:"What if Berlin in 2060 has vertical farms, robot neighbours, and buildings that breathe? Walk through the scenarios. Some are exciting. Some are terrifying. All are free.",t:"Alexanderufer 2, near Hauptbahnhof. Completely free. Go to the Futurium Lab too — hands-on experiments and workshops.",c:["art"],r:"g",nn:"Futurium — Mitte",ns:"Museum der Zukunft — was kommt nach hier",nst:"Futurium zeigt was Zukunft sein könnte. Technologie. Ethik. Traum. Du fragst dich: will ich das?",nt:"Kostenlos. Mitte nah Hauptbahnhof. Ausstellungen gut. Zu Fuß. Interaktiv. Denk-Provokation."},
  {id:120,n:"Düppel Museum Village",a:"Zehlendorf",v:["weird", "nature"],d:120,s:"A reconstructed medieval village at the edge of Berlin",st:"A living-history site where a 13th-century village has been rebuilt on its actual archaeological site. Thatched huts, heritage breed animals, medieval gardens, forge demonstrations. Feels genuinely ancient and strange, especially during seasonal events with fire and folklore.",im:"It\'s 1250. You live here. Your house is wattle and daub. Your pig is heritage breed. Your herbs are medicine. Berlin doesn\'t exist yet — just forest and this clearing.",t:"Clauertstraße 11, Zehlendorf. Small entry fee for events, but grounds often accessible. Spring and harvest events are wild — fire, folklore, surreal atmosphere.",c:["nature", "history_big"],r:"g",nn:"Düppel Museum Dorf — Zehlendorf",ns:"Mittelalterlich-Dorf rekonstruiert — Zeit zurück",nst:"Düppel ist Rekonstruktion von mittelalterlich Dorf. Häuser von damals. Tiere damals. Es ist wie Maschine Zeit.",nt:"Eintritt ca. 4 Euro. Zehlendorf südlich. Zu Fuß. Geschichte-Fans. Wochenende beste. Picknick ideal."},
  {id:121,n:"East Side Gallery at midnight",a:"Friedrichshain",v:["night", "history"],d:121,s:"The longest Wall section — completely different after dark",st:"During the day it\'s tourists and selfie sticks. At midnight it\'s empty. Just you, the painted Wall, the Spree, and the Oberbaumbrücke glowing at the end. The art looks different in the dark — more urgent, more political, more raw.",im:"November 1989. This concrete just became worthless. Within months, artists from 21 countries paint it. At night, alone, you feel what they felt — the wall is still warm from history.",t:"If you choose to visit in the evening, the atmosphere is completely different from daytime. Walk the full 1.3km. The Oberbaumbrücke end is most atmospheric. Visit with friends.",c:["history_big", "scary", "instagram"],r:"y",nn:"East Side Gallery um Mitternacht — Friedrichshain",ns:"Mauer-Kunstwerk bei Nacht — Dunkelheit macht Lichter",nst:"Nachts wird die Galerie beleuchtet. Kunstwerk leuchtet. Es ist magisch und es ist spooky. Nachts anders als tagsüber.",nt:"Kostenlos. Friedrichshain südlich. Nachts. Zu Fuß lang. Kamera mit Nachtmodus. Vorsicht Verletzungen."},
  {id:122,n:"Flughafensee",a:"Reinickendorf",v:["secret", "nature"],d:122,s:"A turquoise lake in a crater next to the old Tegel airport",st:"A flooded gravel pit turned surreal turquoise swimming lake, right next to the Tegel airport runway. The water is unnervingly clear and blue-green. Sandy beach, dunes, and a nature reserve with rare birds on the far shore. One of Berlin\'s best-kept secrets.",im:"Planes used to land 200 meters away. Now: silence, herons, turquoise water so clear you can see the bottom at 3 meters. The airport closed and the lake got quieter.",t:"🚇 Take U6 to Alt-Tegel, then bus 133 to Bernauer Str. Walk 10 min through the path at Flughafensee entrance. Or cycle from Tegel — 15 min. Free, no lifeguard.",c:["swimming", "lakes", "nature"],r:"g",nn:"Flughafensee — Reinickendorf",ns:"See neben alter Flughafen — Natur siegt",nst:"Flughafensee ist neben Tegel. Wasser ist sauber. Flugzeuge waren hier, jetzt ist Natur. Landung anderswo.",nt:"Kostenlos. Strandbad Sommer. Reinickendorf nördlich. Zu Fuß. Boot fahren möglich. Ruhig."},
  {id:123,n:"Liepnitzsee",a:"Wandlitz",v:["beautiful", "nature"],d:123,s:"The most beautiful lake near Berlin — an island in the middle",st:"Just outside Berlin in Brandenburg, this glacial lake has water so clear it looks Caribbean. A forested island (Großer Werder) sits in the middle that you can swim to. Almost no development on the shore — just forest meeting water. Many Berliners consider this the best lake within reach.",im:"Glaciers carved this 10,000 years ago and left the island as a gift. GDR party elites used to come here secretly. Now it belongs to everyone with a towel and a train ticket.",t:"🚇 S2 to Bernau, then bus 894 to Wandlitz Bahnhof, then walk 20 min through the forest to the lake. About 50 min total from Friedrichstraße. Bring everything — no shops. Free.",c:["swimming", "lakes", "nature", "romantic_water"],r:"y",nn:"Liepnitzsee — Wandlitz",ns:"See wo DDR-Eliten versteckten — Luxus für dicke Fische",nst:"Liepnitzsee ist See wo DDR-Politiker versteckten. Villen überall. Jetzt ist offen für alle. Natur ist schön.",nt:"Kostenlos. Brandenburger Gegend. Zu Fuß. Boot fahren. Sommer populär. 45 Minuten von Berlin."},
  {id:124,n:"Großer Wannsee (Strandbad)",a:"Wannsee",v:["vast", "beautiful"],d:124,s:"Europe\'s longest inland beach — 1,275 meters of sand",st:"The famous Wannsee lido has a sand beach longer than most seaside resorts. Art Deco changing cabins from the 1920s. The Havel stretches out like a sea. On hot days 10,000 people come, but the beach is so long you always find space.",im:"1920s Berlin — the golden age of lake culture. Factory workers and aristocrats side by side on the sand. Same beach, same water, same summer democracy.",t:"🚇 S1 or S7 to Wannsee, then bus 114 to Strandbad Wannsee. 40 min from Friedrichstraße. Small entry fee (€5.50) but worth it. Free shore access at other spots along the Havel.",c:["swimming", "lakes"],r:"g",nn:"Großer Wannsee Strandbad — Wannsee",ns:"Biggest See-Bad — Berliner Riviera",nst:"Großer Wannsee ist riesig. Strand ist lang. Menschen sind überall. Es ist Berlins Antwort auf Mittelmeer.",nt:"Eintritt ca. 6-7 Euro. Sommer. Essen teuer. Wannsee südlich. U-Bahn + Bus. Populär und schön."},
  {id:125,n:"Groß Glienicker See",a:"Spandau",v:["secret", "quiet"],d:125,s:"The lake the Berlin Wall cut in half",st:"During the Wall years, this lake was literally divided — the border ran through the water. West Berliners swam on one side, East Germans were forbidden from their own shore. Now reunited, with a wild, undeveloped east bank that still feels like a secret.",im:"1970. You\'re swimming. The buoy line is the border. Beyond it: East Germany. Guards with binoculars on the far shore. You swim back. Someone on the other side watches you swim away.",t:"🚇 Take S-Bahn to Spandau, then bus X34 to Groß Glienicke, Ort. Walk 5 min to the lake. The east shore (Sacrower Weg) is the wildest and quietest. About 55 min from Zoo. Free.",c:["swimming", "lakes", "history_big", "romantic_water"],r:"y",nn:"Groß Glienicker See — Spandau",ns:"See neben Bridge of Spies — wo Welten sich trafen",nst:"Groß Glienicker See ist neben Glienicker Brücke. Ost und West schauten sich über Wasser an. Jetzt ist Frieden.",nt:"Kostenlos. Spandau westlich. Zu Fuß. Boot fahren. Glienicker Brücke nebenan historisch. Sommer gut."},
  {id:126,n:"Tegeler See",a:"Reinickendorf",v:["beautiful", "local"],d:126,s:"Berlin\'s cleanest big lake — resort vibes 25 min from Mitte",st:"One of Berlin\'s largest and cleanest lakes, with a proper promenade, sailing boats, and a resort atmosphere. The Greenwich-Promenade along the shore has old trees, benches, and views across the water. Nearby: Dicke Marie, a 900-year-old oak tree — the oldest in Berlin.",im:"In the 1920s, steamers brought Berliners here for weekend escapes. Same promenade, same trees, same water glittering. The 900-year-old oak watched all of it.",t:"🚇 U6 to Alt-Tegel, walk 10 min to the Greenwich-Promenade. Free swimming spots on the east shore. The boat rental is cheap. 25 min from Friedrichstraße. Free.",c:["swimming", "lakes", "romantic_water"],r:"g",nn:"Tegeler See — Reinickendorf",ns:"Beliebtest See — wo Berlin Sommer macht",nst:"Tegeler See ist voll. Strände überall. Segeln überall. Es ist Party und es ist Urlaub in der Stadt.",nt:"Kostenlos. Strandbäder kosten. Reinickendorf nördlich. U-Bahn Tegel. Wassersport überall. Sommer Wahnsinn."},
  {id:127,n:"Müggelsee beaches",a:"Köpenick",v:["vast", "nature"],d:127,s:"Berlin\'s biggest lake — free beaches and actual wilderness",st:"Müggelsee is enormous — 7.4 km² of open water. The south shore has free sandy beaches backed by deep forest. The Müggelberge hills rise behind — Berlin\'s highest natural point. On a sunny day, standing at the water\'s edge, you\'d never believe you\'re in a city of 3.7 million.",im:"Slavic fishermen lived here a thousand years before Berlin existed. The lake fed them, the forest sheltered them. The Spree flows out of this water toward a city that doesn\'t know it depends on a lake.",t:"🚇 S3 to Friedrichshagen (45 min from Alexanderplatz), then tram 60 to the lake or walk 15 min through the old town to the shore. Rübezahl beer garden on the south shore. Free beaches everywhere.",c:["swimming", "lakes", "nature"],r:"g",nn:"Müggelsee Strände — Köpenick",ns:"Biggest See-Strände — Meer in Brandenburg",nst:"Müggelsee ist so groß dass Strand lang ist. Sand überall. Himmel überall. Du fragst dich: bin ich noch in Berlin?",nt:"Kostenlos oder Strandbad. Sommer. Köpenick südlich. U-Bahn Köpenick + Bus. Boot fahren. Windsurfen."},
  {id:128,n:"Jungfernheideteich",a:"Charlottenburg",v:["local", "quiet"],d:128,s:"A hidden pond for swimming in the middle of Jungfernheide park",st:"Inside the large Volkspark Jungfernheide, this pond has a small free bathing area that most Berliners don\'t even know exists. Surrounded by old trees and parkland. It\'s not glamorous — it\'s better. A neighbourhood secret.",im:"This was a military training ground. Then a people\'s park. The pond doesn\'t care about history. It just sits there, cool and green, waiting for someone to swim.",t:"🚇 U7 to Jakob-Kaiser-Platz, walk 10 min into the park. Or U7 Jungfernheide, walk south. The bathing pond is signed. Free. Bring a towel and snacks.",c:["swimming", "lakes"],r:"g",nn:"Jungfernheideteich — Charlottenburg",ns:"Kleiner See mit Geschichte — Jungfern badeten hier",nst:"Jungfernheideteich ist klein See mit Namen von Jungfern. Name ist romantisch. See ist normal. Aber Geschichte ist überall.",nt:"Kostenlos. Charlottenburg westlich. Zu Fuß. Waldweg schön. Ruhig. Picknick ideal."},
  {id:129,n:"Rummelsburger Bucht",a:"Friedrichshain",v:["local", "beautiful"],d:129,s:"A bay on the Spree with houseboats and sunset views — closest lake-feeling to the centre",st:"Not technically a lake but a wide bay of the Spree between Stralau and Rummelsburg. Houseboats, a floating swimming pool in summer, sunset views over the water, and a boardwalk. The closest thing to lakeside living in central Berlin.",im:"In the DDR this was industrial waterfront — coal barges, factory runoff. Now houseboats bob where barges docked. The water cleaned itself. The city turned its back to the water for decades, and now slowly turns around again.",t:"🚇 S-Bahn to Ostkreuz, walk 10 min south to the water. Or tram 21 to Rummelsburger Bucht. The boardwalk runs along the south shore. Floating pool (Badeschiff-style) in summer. Free to walk, small fee for pool.",c:["swimming", "lakes", "romantic_water", "instagram"],r:"g",nn:"Rummelsburger Bucht — Friedrichshain",ns:"Bucht voller Techno — Fabrik wird Nachtclub",nst:"Rummelsburger Bucht ist Wasser neben altem Fabrik-Gelände. Nachts spielt Techno. Wasser tanzt. Industrie wird Musik.",nt:"Kostenlos zum Gucken. Clubs kosten. Friedrichshain östlich. Zu Fuß. Nachts magisch. Sicher in Gruppe gehen."},
  {id:130,n:"Tram 68 to Alt-Schmöckwitz",a:"Köpenick",v:["beautiful", "nature"],d:130,s:"One of the world\'s most beautiful tram rides — lakes, forest, a ferry",st:"National Geographic named this one of the 10 most beautiful tram rides in the world. 14.5 km hugging the shore of Langer See through pine forest. Swimmers sunbathe yards from the tracks. At the end: a tiny village, water on all sides, and ferry F21 to Krampenburg — a campsite in dense forest across the lake.",im:"1912. They built a tram line to the lakes because Berliners needed to escape. The city grew but the tram still runs the same route through the same pines to the same water.",t:"🚇 S3 to Köpenick or S46 to Grünau, then Tram 68 to Alt-Schmöckwitz. The full tram ride is the point — sit by the window. At the end, take Ferry F21 (BVG ticket valid) to Krampenburg. Every 20 min.",c:["rides", "lakes", "nature", "nature_walks", "end_of_line"],r:"g",nn:"Straßenbahn 68 zu Alt-Schmöckwitz — Köpenick",ns:"Tram zum Ende — wo Berlin aufhört zu sein",nst:"Tram 68 fährt bis Alt-Schmöckwitz. Du fährst und fährst und Stadt wird Land. Ende der Linie ist fast Ende der Welt.",nt:"Kostenlos mit Ticket. 1 Stunde fahrt. Fenster offen. Köpenick südlich. Leben wird weniger dicht. Grenze sichtbar."},
  {id:131,n:"Ruhleben — U2\'s secret forest end",a:"Charlottenburg",v:["secret", "nature"],d:131,s:"The U2 ends in a forest clearing next to an Olympic horse arena",st:"Everyone knows the U2 runs from Pankow through Alexanderplatz and Zoo. Almost nobody rides it to the end. Ruhleben station sits in a forest clearing beside the 1936 Olympic equestrian grounds. Step out and you\'re in the Grunewald with zero transition — subway to wilderness in one step.",im:"1936 Olympics. Horses and riders competing for gold where now only joggers and deer pass. The U-Bahn brought the crowds. Now it brings you to silence.",t:"🚇 U2 to Ruhleben (end of line, 30 min from Alexanderplatz). Walk out and you\'re at the edge of Grunewald forest. The old Olympic equestrian grounds are a 5-min walk. Trails lead deep into the forest.",c:["nature", "end_of_line"],r:"g",nn:"Ruhleben — U2\'s Geheimer Wald-Ende — Charlottenburg",ns:"U-Bahn ins Nichts — Wald gewinnt über Technik",nst:"U2 fährt bis Ruhleben und dann ist Wald. Bahnhof ist allein. Wald überall. Es ist wie Ende der Welt.",nt:"Kostenlos mit Ticket. Charlottenburg westlich. U-Bahn U2. Zu Fuß in Wald. Spooky und schön. Wenig Menschen."},
  {id:132,n:"Rathaus Spandau — cathedral underground",a:"Spandau",v:["weird", "beautiful"],d:132,s:"Berlin\'s most dramatic U-Bahn station + a medieval old town above",st:"The U7 runs 32 km — Berlin\'s longest line — and ends at Rathaus Spandau, a postmodern cathedral underground. High vaulted ceilings, 64 suspended lamps, black granite columns, parquet floors. The station itself is a protected monument. Above ground: Spandau\'s medieval old town and the Zitadelle fortress with 800-year-old walls and a bat cave.",im:"The architects thought: if people must travel underground, give them a cathedral. Above, Spandau has been a town since 1232 — older than Berlin itself.",t:"🚇 U7 to Rathaus Spandau (end of line, 45 min from Neukölln). Admire the station first. Then walk 10 min to Zitadelle Spandau — free courtyard, small museum fee. The old town has cobblestones and half-timbered houses.",c:["end_of_line", "history_big"],r:"g",nn:"Rathaus Spandau — Kathedrale Underground — Spandau",ns:"Keller-Kathedrale — Kunstwerk unter Rathaus",nst:"Unter Rathaus Spandau ist Kunstwerk: \'Kathedrale\'. Künstler machte das heimlich. Jetzt ist offen. Unterirdisch und wunderschön.",nt:"Eintritt ca. 5 Euro. Spandau nah. Führung Optional. Rathaus auch interessant. Treppe rauf interessant auch."},
  {id:133,n:"Hönow — where Berlin just stops",a:"Marzahn",v:["weird", "quiet"],d:133,s:"The U5 ends and Berlin becomes Brandenburg fields",st:"The U5 is Berlin\'s newest-oldest line — extended to Hauptbahnhof in 2020, but its eastern end has been at Hönow since 1989. Step out and the city just... ends. Fields, allotment gardens, silence. But nearby: Gärten der Welt (Gardens of the World) — a massive park with a Chinese garden, Japanese garden, Balinese garden, and a cable car over the whole thing.",im:"November 1989. This station opened the same month the Wall fell. East Berlin\'s newest subway stop, built for a future that changed overnight.",t:"🚇 U5 to Hönow (end of line, 40 min from Alexanderplatz). For Gärten der Welt: get off at Kienberg instead — cable car from the hill. Hönow itself: walk into the fields. Feel Berlin disappear.",c:["end_of_line", "nature", "parks"],r:"g",nn:"Hönow — wo Berlin gerade aufhört — Marzahn",ns:"U-Bahn Ende wo Natur anfängt — Dorf statt Stadt",nst:"Hönow ist Ende von U5. Du kommst raus und: Dorf. Natur. Keine Stadt mehr. Abrupt ist anders als gradual.",nt:"Kostenlos mit Ticket. Marzahn östlich. U5 Ende. Zu Fuß in Gegend. Landwirtschaft überall. Abenteuer-Gefühl."},
  {id:134,n:"Mahlsdorf — a Gründerzeit time capsule",a:"Marzahn",v:["history", "hidden"],d:134,s:"A manor house frozen in the 1890s, at the end of the S5",st:"At the end of the S5, the Gründerzeitmuseum in Gutshaus Mahlsdorf is Europe\'s largest collection of Gründerzeit furniture and objects — 17 fully furnished rooms from the 1870s-1900s. Mechanical music machines, original wallpaper, gas lamps. The house was saved single-handedly by Charlotte von Mahlsdorf, a legendary trans woman who survived the Nazis and the DDR.",im:"Charlotte von Mahlsdorf — born Lothar Berfelde — spent her life rescuing beautiful things from demolished buildings. She carried chandeliers through rubble. The house is her life\'s work, every room a rescue.",t:"🚇 S5 to Mahlsdorf (end of line, 40 min from Alexanderplatz), then Tram 62 two stops. Small entry fee. Check opening hours — limited days.",c:["end_of_line", "history_big", "famous_dead"],r:"g",nn:"Mahlsdorf — Gründerzeit-Zeitkapsel — Marzahn",ns:"Dorf-Viertel mit alten Häusern — Berlin wie Großmutter sah",nst:"Mahlsdorf hat Häuser von 1880er-Jahren. Gründerzeit überall. Du spazierst und Zeit geht zurück. Es ist wie Museum aber lebend.",nt:"Kostenlos zu spazieren. Marzahn südlich. U-Bahn Mahlsdorf. Gründerzeit-Fans. Ruhig und authentisch."},
  {id:135,n:"Oranienburg — Sachsenhausen Memorial",a:"Oranienburg",v:["history", "quiet"],d:135,s:"A concentration camp memorial at the end of the S1 — heavy but important",st:"The S1 runs north to Oranienburg, where the Sachsenhausen concentration camp memorial stands. Over 200,000 people were imprisoned here between 1936-1945. The barracks, guard towers, execution trench, and Station Z remain. It\'s one of the most important memorial sites in Germany. Not a fun day out — but an essential one.",ef:"Oranienburg has a small Rewe near the station. Stock up before heading to Sachsenhausen — nothing at the memorial itself.",im:"1936. This was designed to be visible. The triangular layout meant guards could see everything from one point. It was built to break people. Now it stands so we don\'t forget what breaking people looks like.",t:"🚇 S1 to Oranienburg (end of line, 50 min from Friedrichstraße). Walk 20 min or bus 804 to the memorial. Free entry. Audio guide €3. Allow 2-3 hours minimum. Go with someone.",c:["end_of_line", "history_big", "scary"],r:"g",nn:"Oranienburg — Sachsenhausen Gedenkstätte — Brandenburg",ns:"KZ-Gedenkstätte — Horror an Ort",nst:"Sachsenhausen ist Konzentrationslager-Gedenkstätte. Du siehst Baracken. Du siehst Krematorium. Es ist erschütternd.",nt:"Kostenlos Gedenkstätte. Führung ca. 15 Euro. Oranienburg 45 Min von Berlin. U-Bahn + Bus. Tagsüber. Respekt nötig."},
  {id:136,n:"Strausberg Nord — lake town in Brandenburg",a:"Strausberg",v:["nature", "beautiful"],d:136,s:"The S5 ends at a quiet lake town with a ferry you can ride with your BVG ticket",st:"Ride the S5 all the way east and you end up in Strausberg — a small Brandenburg town on Straussee lake. There\'s a historic lakeside ferry (Strausberger Fähre) that\'s been running since 1894 and accepts your BVG ticket. Swim in the lake, walk the shore, eat cake in the old town. It feels like a holiday for the price of a train ticket.",ef:"Lake kiosk in summer. Small Bäckerei in the town. The S-Bahn station area has a supermarket for the return trip.",im:"This ferry has crossed the lake since 1894. Kaisers, wars, communism, reunification — the ferry just kept going. You ride it for €0 extra with your monthly pass.",t:"🚇 S5 to Strausberg or Strausberg Nord (end of line, 55 min from Alexanderplatz). Walk to the lake. The ferry runs from the Altstadt side. BVG ABC ticket required (or Deutschlandticket). Free swimming, free walking.",c:["end_of_line", "lakes", "romantic_water", "rides"],r:"g",nn:"Strausberg Nord — See-Stadt in Brandenburg — Brandenburg",ns:"Stadt am See — wo Berlin-Leute Wochenende machen",nst:"Strausberg ist See-Stadt. Menschen fahren dort Eis fahren. Es ist nicht Berlin aber es ist Flucht-Ort.",nt:"Kostenlos zu gucken. Boot fahren möglich. 1 Stunde von Berlin. Bahn oder Auto. Sommer schön. Winter auch."},
  {id:137,n:"Rudow — the quiet border crossing",a:"Neukölln",v:["history", "quiet"],d:137,s:"The U7\'s southern end — where West Berlin touched the Wall",st:"Rudow was a West Berlin border village. The U7 ended here because the Wall was just beyond. The Schönefeld border crossing was nearby. Now it\'s a quiet residential area with allotment gardens and the surreal experience of standing where the city simply stopped for 28 years.",im:"1985. You ride the U7 to the last stop. You get out. Beyond the gardens: the Wall, the death strip, East Germany. You turn around and ride back. There\'s nowhere else to go.",t:"🚇 U7 to Rudow (end of line, 35 min from Hermannplatz). Walk south toward the old border area. Allotment gardens, quiet streets, a village feeling inside a city. The memorial markers are subtle.",c:["end_of_line", "history_big"],r:"g",nn:"Rudow — die stille Grenzübergangstelle — Neukölln",ns:"Grenzübergang zwischen Süd und Süd — geteilte Stadt immer noch sichtbar",nst:"Rudow war Grenzübergang. Jetzt ist es normal. Aber Straße wurde getrennt. Geschichte ist subtil.",nt:"Kostenlos. Neukölln süd. U-Bahn Rudow. Zu Fuß. Gedenkstellen suchen. Grenze immer noch in Köpfen."},
  {id:138,n:"Kunstquartier Bethanien",a:"Kreuzberg",v:["art", "free"],d:138,s:"A massive former hospital turned free art complex",st:"This 1847 hospital on Mariannenplatz is now one of Berlin\'s biggest free art spaces — studios, galleries, project rooms, a theatre, all open to the public. The courtyard alone is worth the visit. Rotating exhibitions, often political, always free. The building itself is monumental.",im:"1847. Patients in iron beds, nuns in the corridors. Now artists in the wards, installations where surgery happened. The building heals differently now.",t:"🚇 U1/U8 Kottbusser Tor, walk 5 min to Mariannenplatz 2. Free entry. Multiple exhibition spaces — check what\'s on. The courtyard and café are always accessible.",c:["art", "history_big"],r:"g",nn:"Kunstquartier Bethanien — Kreuzberg",ns:"Künstler-Oase — Krankenhaus wurde Atelier",nst:"Bethanien war Krankenhaus. Jetzt ist Kunstquartier. Künstler haben Ateliers. Du kannst hineingehen. Kreativität überall.",nt:"Kostenlos zum Gucken. Künstler manchmal offen. Kreuzberg. Zu Fuß. Café drin. Kunstliebhaber müssen hin."},
  {id:139,n:"ZK/U — Zentrum für Kunst und Urbanistik",a:"Moabit",v:["art", "hidden"],d:139,s:"An old railway depot turned art lab — free, weird, and important",st:"A former railway freight depot in Moabit now housing artist residencies, exhibitions, and urban research projects. The building is enormous and industrial. Events range from sound art to urban farming workshops. The garden and outdoor area are open and strange.",im:"Freight trains loaded here. Goods for the city. Now the goods are ideas — artists from 20 countries making work about how cities should be.",t:"🚇 U9 Birkenstraße or S-Bahn Westhafen, walk 8 min to Siemensstraße 27. Free events regularly. Check their programme — some events are extraordinary.",c:["art", "abandoned"],r:"g",nn:"ZK/U — Zentrum für Kunst und Urbanistik — Moabit",ns:"Laboratorium für Stadtkunst — Stadt wird Kunstwerk",nst:"ZK/U denkt über Stadt nach. Was ist Stadt? Wie machen Kunst darin? Projekte überall.",nt:"Kostenlos zu gucken. Events manchmal Eintritt. Moabit. Zu Fuß. Interessant für Kunstdenker. Moabit auch schön rum."},
  {id:140,n:"ACUD Gallery & Kunsthaus KuLe",a:"Mitte",v:["art", "local"],d:140,s:"Two tiny artist-run spaces hiding in Mitte courtyards",st:"ACUD on Veteranenstraße and KuLe on Auguststraße are both artist-run, both free, both hiding in plain sight. ACUD has a gallery, cinema, club, and theatre in one building. KuLe is a Hausprojekt — a collectively run building with exhibition space on the ground floor. Together they represent what Mitte used to be before the money arrived.",im:"1990. The Wall just fell. Squatters took empty buildings and made galleries, cinemas, theatres. ACUD and KuLe are survivors — still here, still free, still artist-run.",t:"🚇 U8 Rosenthaler Platz. ACUD: Veteranenstraße 21. KuLe: Auguststraße 10. Both free. Check openings — they\'re small but the shows can be remarkable.",c:["art"],r:"g",nn:"ACUD Galerie & Kunsthaus KuLe — Mitte",ns:"Kleine Galerien voller Mut — neuer Kunstort",nst:"ACUD und KuLe sind kleine Galerien. Junge Künstler. Neue Ideen. Es ist Anfang von Kunstwelt.",nt:"Kostenlos oder Spende. Mitte nah. Zu Fuß. Öffnungszeiten variabel. Künstler arbeiten oft drin."},
  {id:141,n:"Kotti-Shop project space",a:"Kreuzberg",v:["art", "local"],d:141,s:"A glass-box gallery at Kottbusser Tor — free art in the chaos",st:"A tiny glass-walled project space right on Kottbusser Tor — one of Berlin\'s most chaotic intersections. Inside: curated contemporary art. Outside: the roar of the city. The contrast is the point. Free, artist-run, and deeply Kreuzberg.",im:"Kotti never sleeps. Traffic, music, arguments, laughter. And in a glass box on the corner: someone\'s art, quiet and strange, visible to everyone who walks past.",t:"🚇 U1/U8 Kottbusser Tor. Adalbertstraße 4. Free. The space is small — sometimes one work fills it entirely. Open hours vary, check bpigs.com for current shows.",c:["art"],r:"g",nn:"Kotti-Shop Projekttraum — Kreuzberg",ns:"Shop der ist Museum — Konsum wird Kunstwerk",nst:"Kotti-Shop ist altes Shop jetzt Kunstort. Denkt über Konsum. Über Nachbarschaft. Kunstinstallationen.",nt:"Kostenlos. Kreuzberg. Zu Fuß. Öffnungszeiten Variabel. Interessant für Konzeptkunst-Fans."},
  {id:142,n:"Panke Gallery",a:"Wedding",v:["art", "hidden"],d:142,s:"Sound art and experimental shows in a Wedding courtyard",st:"In a courtyard on Gerichtstraße in Wedding, Panke Gallery focuses on sound art, new media, and experimental work. Free entry, regular openings with music and performances. Part of the wave of artist-run spaces that moved to Wedding when Mitte and Kreuzberg got expensive.",im:"The artists follow the cheap rent. First Mitte, then Prenzlauer Berg, then Kreuzberg, now Wedding. The art is always one neighbourhood ahead of the money.",t:"🚇 U6 Wedding or U9 Amrumer Straße. Gerichtstraße 23. Free. Check programme at panke.gallery — openings often have live sound performances.",c:["art"],r:"g",nn:"Panke Galerie — Wedding",ns:"Kunstort in altem Warenhaus — Wedding wird chic",nst:"Panke Galerie ist in altem Geschäft. Künstler zeigen Arbeiten. Es ist Wedding-Kunstrevolution.",nt:"Kostenlos oder Spende. Wedding. Zu Fuß. Öffnungszeiten. Künstler freundlich. Kaffee gut."},
  {id:143,n:"Kreuzberg Pavillon",a:"Kreuzberg",v:["art", "weird"],d:143,s:"A storefront gallery that exists for one night only — every Saturday",st:"A storefront window on Naunynstraße that hosts a new exhibition every Saturday from 8pm to 1am — then takes it down. One night only, every time. You see the art from the sidewalk. Wheelchair accessible, free, experimental. The most radical gallery format in Berlin.",im:"Saturday night. A new show appears in a window. By Sunday morning it\'s gone. The artists had five hours. You had five hours. That\'s it. Art as event, not object.",t:"🚇 U1/U8 Kottbusser Tor. Naunynstraße 53. Saturdays 8pm–1am only. Free. Check kreuzbergpavillon.tumblr.com for what\'s showing this week.",c:["art", "night"],r:"g",nn:"Kreuzberg Pavillon — Kreuzberg",ns:"Kunstpavillon voller Proteste — Kreuzberg ist politisch",nst:"Kreuzberg Pavillon zeigt Kunstwerk über Politik. Protest. Geschichte. Kreuzberg Kultur.",nt:"Kostenlos. Kreuzberg. Zu Fuß. Öffnungszeiten. Interessant für Politische Kunst-Fans."},
  {id:144,n:"Club der Polnischen Versager",a:"Mitte",v:["art", "weird"],d:144,s:"A Polish-German cultural club hiding on Ackerstraße — readings, art, chaos",st:"The Club of Polish Losers is a tiny cultural space run by Polish artists and writers in Mitte. Readings, performances, exhibitions, discussions — often bilingual, always free or cheap, reliably strange. One of Berlin\'s most authentic cross-cultural meeting points.",im:"Berlin and Warsaw have always been entangled — war, migration, art, love. This tiny club is where that conversation happens now, over bad wine and good poetry.",t:"🚇 U8 Rosenthaler Platz. Ackerstraße 169. Free or donation. Check their programme — events are irregular but always interesting.",c:["art"],r:"g",nn:"Club der Polnischen Versager — Mitte",ns:"Bar wo Künstler trinken — Versagen ist Kunstform",nst:"Dieser Club hat Name von Buch über Polen in Berlin. Bar mit Charakter. Künstler hängen ab hier.",nt:"Kostenlos Eintritt. Getränke normal-Preis. Mitte. Zu Fuß. Abends beste Zeit. Underground-Vibes."},
  {id:145,n:"Kommunale Galerie — borrow real art for your flat",a:"Charlottenburg",v:["art", "free"],d:145,s:"A free gallery where you can literally borrow original artworks to take home",st:"A public gallery in Charlottenburg-Wilmersdorf with rotating contemporary exhibitions — always free. But the real secret is the Artothek: a lending library of original artworks by Berlin-based artists. You can borrow a real painting or print and hang it in your flat. Art on your wall, for free.",im:"Imagine a library, but instead of books you borrow paintings. You carry a framed artwork home on the U-Bahn. Your flat has a real piece by a Berlin artist on the wall. You return it in three months and pick a new one.",t:"🚇 U3/U7 Fehrbelliner Platz, or bus 101/115. Hohenzollerndamm 176. Free entry. Tue–Fri 10–17, Wed until 19, weekends 11–17. Ask about the Artothek at the desk.",c:["art"],r:"g",nn:"Kommunale Galerie — leihen echte Kunstwerk für deine Wohnung — Charlottenburg",ns:"Kunstwerk ausleihen nicht kaufen — Demokratie für Kunstliebhaber",nst:"Diese Galerie verleiht echte Kunstwerk. Du darfst zu Hause hängen. Umsonst. Nachher zurückgeben. Kunst für alle.",nt:"Kostenlos. Charlottenburg. Zu Fuß. Umsonst ausleihen. Kunstliebhaber-Traum. Demokratische Kunstidee."},
  {id:146,n:"BPIGS art walk — free gallery crawl",a:"Various",v:["art", "free"],d:146,s:"Use the BPIGS map to build your own free gallery crawl",st:"Berlin has over 100 free artist-run project spaces — more than any other city. BPIGS (Berlin Independents Guide at bpigs.com) maps them all. Pick a neighbourhood, find 4-5 spaces within walking distance, and build your own gallery crawl. Each space is usually one room. Most are free. Many have opening nights with free drinks.",im:"No other city works like this. Artists rent cheap spaces, show their work, invite the neighbourhood. You walk in off the street. No ticket, no guard, no gift shop. Just art and the person who made it.",t:"Visit bpigs.com for the interactive map. Best neighbourhoods for density: Wedding (Gerichtstraße area), Mitte (Auguststraße/Linienstraße), Kreuzberg (Kottbusser Tor area), Neukölln (Maybachufer area). Saturday afternoons are best — many spaces open simultaneously.",c:["art"],r:"g",nn:"BPIGS Kunstspaziergang — kostenlos Galerien — Kreuzberg",ns:"Gallerie-Tour gratis — Kunstwelt ist offen",nst:"BPIGS organisiert freie Kunstgänge. Du machst mit. Galerien sind offen. Künstler reden. Es ist Kunstgemeinschaft.",nt:"Kostenlos. Kreuzberg. Zu Fuß. Termine fragen. Kunstliebhaber müssen hin. Andere Künstler treffen."},
  {id:147,n:"Spreewald — canoe through a living forest",a:"Spreewald",v:["nature", "vast"],d:147,s:"A labyrinth of 300+ water channels through ancient forest — free dike walks, cheap canoe rental",st:"An hour south of Berlin, the Spree splits into over 300 channels winding through forest, meadows, and tiny Sorbian villages. The Sorbs — a Slavic minority — have lived here for over 1,000 years and built this landscape by hand. You can rent a canoe cheaply or walk the endless dike paths for free. Lübbenau is the starting point — a small harbour town with pickles, pumpkin oil, and a fairy-tale old town.",ef:"Lübbenau has proper Spreewald restaurants serving Gurkensuppe and Sorbian dishes. Stock up before heading into the canals — nothing once you\'re in the water.",sf:"Pension zum Grünen Strand der Spree (Lehde) or Spreewald-Camping at the canal edge. Several farmhouses rent rooms — book ahead in summer.",im:"A Sorbian family 500 years ago, navigating these same channels by wooden boat, delivering hay and firewood. The postman here used a punt until 2005. No roads. Just water, trees, and silence.",t:"🚇 RE2 from Berlin Hbf to Lübbenau (1h10, Deutschlandticket). Walk 15 min to the Spreehafen. Canoe rental from ~€10/2h. Free: walk the dike paths along the channels — Lehde village is 30 min on foot and feels like another century. Pack a picnic.",c:["day_trips", "nature", "romantic_water"],r:"g",nn:"Spreewald — Boot durch lebenden Wald — Brandenburg",ns:"Kanäle im Wald — Natur ist Labyrinth",nst:"Spreewald ist Lagunen zwischen Bäumen. Du bootfährst und merkst: das ist nicht Berlin mehr. Das ist Natur.",nt:"Bootsverleih ca. 15-20 Euro pro Stunde. 1,5 Stunden von Berlin mit Auto. Sommer beste. Geführte Touren auch."},
  {id:148,n:"Beelitz-Heilstätten — abandoned sanatorium in the forest",a:"Beelitz",v:["weird", "nature"],d:148,s:"60 ruined hospital buildings in the woods — trees growing through roofs, free to explore from outside",st:"In 1898 Berlin built a vast sanatorium complex in the forest at Beelitz to treat tuberculosis. 60 buildings. Hitler recovered here in 1916 after being wounded at the Somme. The Soviets used it as a military hospital until 1995. Now most buildings are abandoned — trees growing through roofs, corridors open to sky. Walking the perimeter paths is extraordinary and completely free. There\'s also a paid treetop walkway (Baumkronenpfad, ~€12.50) if you have the budget.",ef:"Village bakery in Beelitz town (10 min walk from station). The sanatorium has a small café in summer. Otherwise bring food — there\'s nothing at the site itself.",im:"A wounded soldier in 1916 — the future dictator — lying in a bed here, staring at these same trees through the window. Then Soviet soldiers in the same beds, 30 years later. Then silence. Then trees through the windows.",t:"🚇 RE7 from Berlin Hbf to Beelitz-Heilstätten (45 min, Deutschlandticket). Walk 10 min. Free: walk the perimeter paths through the forest — the ruins are visible and atmospheric from outside. Optional: Baumkronenpfad treetop walkway ~€12.50 (320m long, 23m high).",c:["day_trips", "abandoned", "nature"],r:"y",nn:"Beelitz-Heilstätten — verlassenes Sanatorium im Wald — Brandenburg",ns:"Ruinen von Krank-Haus — Natur übernimmt Medizin",nst:"Beelitz sind verlassene Sanatorien. Gebäude halb fallen. Natur wächst. Es ist Traum und Albtraum.",nt:"Kostenlos von außen. Führung ca. 12 Euro. 1 Stunde von Berlin. Zu Fuß mit Guide. Urbex-Fans. Spooky."},
  {id:149,n:"Potsdam — Sanssouci Park & palaces",a:"Potsdam",v:["beautiful", "history"],d:149,s:"Frederick the Great\'s palace and 300 hectares of gardens — the park is completely free",st:"Sanssouci is Frederick the Great\'s summer palace from 1747 — the Prussian Versailles. But the real treasure is the park: 300 hectares of gardens, follies, temples, and smaller palaces, all connected by paths through ancient trees. The park is completely free. The New Palace, the Chinese House, the Roman Baths, the Orangery — all free to walk around. Only the palace interiors have entry fees.",ef:"Mövenpick Café in Sanssouci park (overpriced but convenient). Dutch Quarter has better independent cafés 15 min walk away. Lidl near Potsdam Hauptbahnhof for picnic supplies.",im:"Frederick the Great — philosopher, flute player, military genius — designed these terraces himself. He wanted a place \'without care\' (sans souci). He\'s buried here, next to his beloved dogs, because he preferred their company to humans.",t:"🚇 S7 to Potsdam Hbf (35 min from Berlin Hbf) or RE1 (25 min). Then bus 695 to Schloss Sanssouci, or walk 25 min through the town. Park is free, open dawn to dusk. Allow a full day. The vineyard terraces at sunset are extraordinary.",c:["day_trips", "parks", "history_big", "romantic_water"],r:"g",nn:"Potsdam — Sanssouci Park & Schlösser — Brandenburg",ns:"Schlösser-Stadt neben Berlin — Königliches Traum-Land",nst:"Potsdam war Königs-Stadt. Schlösser überall. Parks überall. Es ist andere Welt. Aber nur 20 Minuten von Berlin.",nt:"Eintritt ca. 15 Euro Schloss. Park kostenlos. 45 Minuten von Berlin mit Bahn. S7. Ganz Tag ideal. Touristisch aber lohnt sich."},
  {id:150,n:"Wandlitzsee — swim where the DDR elite hid",a:"Wandlitz",v:["nature", "history"],d:150,s:"A forest lake with a secret — the DDR\'s top leaders lived hidden in the woods nearby",st:"Wandlitzsee is a beautiful, clean forest lake north of Berlin with free swimming and a path around the shore. But the real story: in the woods nearby is the Waldsiedlung — a gated compound where the DDR\'s Politburo lived in luxury while preaching equality. Honecker, Mielke, all of them. Hidden from their own people. The compound is now partly accessible and has a small exhibition.",im:"The most powerful men in East Germany, living behind walls in the forest, with Western goods, swimming pools, and servants — while telling 17 million people that everyone was equal. The hypocrisy still hangs in the air.",t:"🚇 Heidekrautbahn (RB27) from Berlin-Karow to Wandlitzsee (35 min, Deutschlandticket). Walk 5 min to the lake. Free swimming, path around the lake. Waldsiedlung: 15 min walk north — check opening hours for the exhibition.",c:["day_trips", "swimming", "lakes", "history_big", "scary"],r:"g",nn:"Wandlitzsee — schwimmen wo DDR-Elite sich versteckten — Brandenburg",ns:"See für Diktatoren — jetzt für alle offen",nst:"Wandlitzsee war Geheimnis von DDR-Politikern. Villen überall. Jetzt ist öffentlich. Du badest wo Macht badete.",nt:"Kostenlos oder Strandbad. Brandenburg nördlich. 1 Stunde von Berlin. Zu Fuß. Boot fahren. Sommer schön."},
  {id:151,n:"Buckow — Brecht\'s lakeside escape in the \'Märkische Schweiz\'",a:"Buckow",v:["beautiful", "quiet"],d:151,s:"Hills, lakes, and Brecht\'s summer house in Brandenburg\'s \'little Switzerland\'",st:"An hour east of Berlin, the flat Brandenburg landscape suddenly crumples into hills, gorges, and lakes — the Märkische Schweiz (Brandenburg Switzerland). Buckow sits on Schermützelsee lake, surrounded by beech forest. Brecht and Helene Weigel had their summer house here. The town is tiny, the lake is swimmable, and the surrounding trails through the Naturpark feel like the Alps in miniature.",ef:"Fischrestaurant am Schermützelsee — simple lake fish, eaten outside. Buckow has a few good cafés on the market square.",sf:"Seehof Buckow on the lake is the classic stay — small hotel, rooms from €70. Camping at Strandbad Schermützelsee for tents. Book ahead in summer.",im:"Brecht sitting on the terrace in 1953, looking at the lake, writing the Buckow Elegies after the workers\' uprising was crushed. The beauty of the place and the ugliness of the regime, side by side.",t:"🚇 RE1 to Müncheberg (40 min from Ostkreuz), then bus 928 to Buckow (30 min). Or S5 to Strausberg then bus 928. Brecht-Weigel-Haus: small fee. Free: swim in the lake, hike the Schlucht (gorge trail), walk the town. Pack food — options are limited.",c:["day_trips", "nature", "famous_dead", "romantic_water"],r:"g",nn:"Buckow — Brecht\'s Flucht-See in der \'Märkischen Schweiz\' — Brandenburg",ns:"Wo Brecht schrieb — See für Genie",nst:"Buckow ist kleines See-Dorf. Brecht kam hier zum Schreiben. Heute ist es ruhig. Du fragst dich: schreib ich hier auch Genie-Stücke?",nt:"Kostenlos. Brandenburg südlich. 1,5 Stunden von Berlin. Auto oder Bus. See schön. Brecht Museum auch."},
  {id:152,n:"Brandenburg an der Havel — island old town on the water",a:"Brandenburg an der Havel",v:["history", "beautiful"],d:152,s:"A thousand-year-old island town with medieval churches, canals, and barely any tourists",st:"Brandenburg an der Havel is older than Berlin and far more beautiful in places. The old town sits on an island between branches of the Havel river. Romanesque cathedral from 1165. Medieval brick churches. Half-timbered houses. Canals with small bridges. Practically no tourists despite being an hour from Berlin. The town gave the state of Brandenburg its name.",ef:"Café am Packhof near the Dominsel, or the old town Markt has bakeries. Brandenburg is a real town — proper lunch options on the main street.",im:"1165. Monks building a cathedral on a river island in the marshes. 860 years later, the cathedral still stands, and you can sit in the same cloister and hear the same river.",t:"🚇 RE1 from Berlin Hbf to Brandenburg Hbf (1h, Deutschlandticket). Walk 15 min to the island old town (Dominsel). Cathedral and cloister: small fee. Free: walk the old town, the riverbanks, and the Neustädtischer Markt. Quiet even on weekends.",c:["day_trips", "history_big", "romantic_water"],r:"g",nn:"Brandenburg an der Havel — Insel-Altstadt am Wasser — Brandenburg",ns:"Alte Stadt auf Insel — Mittelalter ist nicht tot",nst:"Brandenburg hat alte Dom. Gassen über Wasser. Es ist wie Amsterdam aber älter und weniger touristisch.",nt:"Kostenlos. Brandenburg west. 1,5 Stunden von Berlin. Bahn oder Auto. Boot fahren. Geschichte überall."},
  {id:153,n:"Rheinsberg — Tucholsky\'s lake, Frederick\'s first palace",a:"Rheinsberg",v:["beautiful", "quiet"],d:153,s:"A fairy-tale palace on a lake where a young prince dreamed and a writer fell in love",st:"Rheinsberg is where the young Frederick the Great spent his happiest years before becoming king — playing music, reading philosophy, hosting friends at a small palace on a lake. 200 years later, Kurt Tucholsky wrote \'Rheinsberg: A Picture Book for Lovers\' about a couple\'s weekend here. The town is tiny, the lake is pristine, the palace gardens are free, and the whole thing feels like a painting.",ef:"Café am Markt in Rheinsberg town. The Schlosshotel Rheinsberg has a restaurant but it\'s expensive. Market square bakeries are your best option.",sf:"Hotel am See Rheinsberg (lake views, from €85). Camping Grienericksee for tents. Several private rooms via Airbnb in the town — cheaper than the hotel.",im:"A young prince in 1736, finally away from his brutal father, playing the flute in a palace by a lake. The happiest years of his life. Then he became king and never felt free again.",t:"🚇 RE5 to Löwenberg, then RB54 to Rheinsberg (1h40 total from Berlin Hbf, Deutschlandticket). Palace gardens: free. Palace interior: small fee. Free: walk the lake shore, swim in Grienericksee, wander the tiny town. Bring food or eat at the old market square.",c:["day_trips", "romantic_water", "history_big", "famous_dead"],r:"g",nn:"Rheinsberg — Tucholsky\'s See, Friedrichs erstes Schloss — Brandenburg",ns:"Schriftsteller-See mit König-Schloss — Kultur und Macht zusammen",nst:"Rheinsberg hat See. Schloss von König Friedrich. Tucholsky schrieb hier. Geschichte und Literatur vermischt.",nt:"Schloss ca. 8 Euro. See kostenlos. Brandenburg nördlich. 2 Stunden von Berlin. Bahn. Wochenende ideal."},
  {id:154,n:"Liepnitzsee — Berlin\'s secret perfect lake",a:"Wandlitz",v:["nature", "quiet"],d:154,s:"A crystal-clear forest lake with an island — possibly the most beautiful lake near Berlin",st:"Liepnitzsee is a deep, clear lake hidden in the forest north of Berlin. No roads reach it — you walk 20 minutes through trees to get there. An island in the middle has a small beach you can swim to. The water is so clean you can see the bottom at 5 meters. On weekdays you might be alone. This is the lake Berliners whisper about.",ef:"Seasonal lake kiosk in summer. A small café at the Strandbad. Otherwise bring food — the forest has nothing.",sf:"Camping Liepnitzsee (tent pitches directly on the water). Several guesthouses in Wandlitz town, 3km away.",im:"No buildings. No cars. No shops. Just water, forest, and an island. The kind of place that makes you forget cities exist. People have been swimming here for thousands of years.",t:"🚇 S2 to Bernau, then bus 894 to Wandlitz, walk 20 min through forest. Or Heidekrautbahn RB27 to Wandlitzsee, then 30 min walk. No facilities — bring everything. Free. The island swim is ~200m.",c:["day_trips", "swimming", "lakes", "nature"],r:"y",nn:"Liepnitzsee — Berlins geheimer perfekter See — Brandenburg",ns:"See den nur locals kennen — Traum-Strand",nst:"Liepnitzsee ist See den Touristen vergessen. Wasser sauber. Strand schmal. Es ist perfekt weil wenig Menschen.",nt:"Kostenlos. Brandenburg nördlich. 45 Minuten von Berlin. Auto oder Bus. Sommer geheim halten. Picknick ideal."},
  {id:155,n:"Haus Schwarzenberg",a:"Mitte",v:["art", "history"],d:155,s:"Berlin\'s last rebel courtyard — street art, hidden museums, and a story about saving lives",st:"Behind Rosenthaler Straße 39 — across from the Apple Store — hides a courtyard covered in murals, stickers, and installations. It changes constantly. But the real story is deeper: inside is the Blindenwerkstatt Otto Weidt, a free museum about a brush-maker who hid Jewish workers in his factory during the Holocaust. He bribed, forged, and lied to keep them alive. The courtyard is what remains of 1990s squatter Berlin — artists took empty buildings and made culture. This one survived.",im:"Otto Weidt in 1943, hiding Jewish workers behind a false wall in his workshop while Gestapo officers inspected the front room. Blind and deaf workers making brushes. Weidt gambling his life every day. The workshop is still there, exactly as it was.",t:"🚇 U8 Rosenthaler Platz or S-Bahn Hackescher Markt. Rosenthaler Straße 39, walk through the passage. Courtyard: free, always open. Otto Weidt Museum: free, Tue-Sun. The street art changes — go twice and see different walls.",c:["art", "scary", "history_big", "instagram"],r:"g",nn:"Haus Schwarzenberg — Mitte",ns:"Künstler-Haus mit Geschichte — Kultur überlebt alles",nst:"Haus Schwarzenberg war Nazi-Archiv. Jetzt ist Kunstort. Künstler arbeiten. Geschichte ist sichtbar in Räumen.",nt:"Kostenlos zum Gucken. Mitte. Zu Fuß. Café günstig. Kunstinstallationen überall. Näher gucken lohnt sich."},
  {id:156,n:"East Side Gallery",a:"Friedrichshain",v:["art", "history"],d:156,s:"1.3 km of the Berlin Wall covered in murals — the longest open-air gallery on earth",st:"After the Wall fell in 1989, over 100 artists from around the world painted the east side of a 1.3 km stretch that was left standing along the Spree. The famous kiss between Brezhnev and Honecker. The Trabant crashing through concrete. These aren\'t decorations — they were painted in the euphoria of a world changing overnight. The wall is weathered now, some parts restored, but walking the full length with the Spree on one side and the city on the other still hits.",im:"November 1989. The Wall is open. Within weeks, artists arrive with paint. They cover the concrete that imprisoned people for 28 years with color, rage, joy, and hope. The guards\' side becomes the world\'s biggest canvas.",t:"🚇 S-Bahn Ostbahnhof or Warschauer Straße. Walk the full 1.3 km — start from Ostbahnhof heading east. Free, always open. Best early morning before crowds. The Spree-side path is quieter.",c:["art", "history_big", "instagram"],r:"g",nn:"East Side Gallery — Friedrichshain",ns:"Längste Kunstwerk-Mauer der Welt — Künstler haben Angst gezeigt",nst:"East Side Gallery ist 1,3 Kilometer lange Mauer-Kunstwerk. Jedes Gemälde hat Botschaft. \'My God, help me survive this deadly love\' — und du weißt: Mauer ist weg.",nt:"Kostenlos. Friedrichshain südlich. Zu Fuß lang. Frühjahr/Herbst beste Lichter. Künstler malen manchmal noch."},
  {id:157,n:"Holzmarkt 25 — the Spree village",a:"Friedrichshain",v:["local", "weird"],d:157,s:"A self-built creative village on the Spree — bars, food, music, and a different idea of how cities could work",st:"On a prime stretch of Spree riverbank between Jannowitzbrücke and Ostbahnhof, a community bought the land and built their own village. Wooden structures, shipping containers, a restaurant in a boat, a climbing wall, a nightclub, and a playground — all self-organized. No chain stores. No corporate landlord. In a city being swallowed by investors, Holzmarkt is what happens when people fight back and win.",im:"Developers wanted luxury apartments here. Instead, a cooperative raised millions, bought the land, and built a village by hand. Every crooked beam is a middle finger to speculation.",t:"🚇 S-Bahn Jannowitzbrücke or Ostbahnhof, walk 3 min to the Spree. Holzmarktstraße 25. Free entry. Walk through, sit by the water, eat something. Open daily. Best in summer evenings.",c:["romantic_water", "art"],r:"g",nn:"Holzmarkt 25 — das Spree-Dorf — Friedrichshain",ns:"Schwimmende Dörfer-Häuser — Freiheit auf Wasser",nst:"Holzmarkt 25 sind Häuser auf Flößen. Künstler. Musiker. Freie Geister. Es ist Traum von anderem Leben.",nt:"Kostenlos zum Gucken. Getränke kaufen wenn bleibst. Friedrichshain Ost. Zu Fuß. Abends beste. Live-Musik oft."},
  {id:158,n:"Neu-Venedig — canals through garden cottages",a:"Köpenick",v:["hidden", "beautiful"],d:158,s:"A miniature Venice of tree-lined canals and tiny bridges in southeast Berlin",st:"In the far southeast, where the Müggelspree splits into small channels, a neighbourhood of garden cottages sits on tiny canal islands connected by wooden bridges. Built in the 1920s as weekend escapes for working-class Berliners, the houses have their own boat docks and the canals are lined with willows. Almost nobody from outside the area knows it exists.",im:"A factory worker in 1925, saving for months to buy a small plot on a canal. Building a tiny cottage with his own hands. Rowing home on Friday evenings. His great-grandchildren still live here.",t:"🚇 S3 to Wilhelmshagen (40 min from Alexanderplatz), walk 15 min south to the canal area. Free. Walk the paths along Müggelspree and its channels. Quietest on weekday mornings.",c:["romantic_water", "hidden", "instagram"],r:"g",nn:"Neu-Venedig — Kanäle zwischen Gartenhütten — Köpenick",ns:"Miniatur-Stadt mit Kanälen — Träumer-Viertel",nst:"Neu-Venedig sind hundert kleine Häuser mit Kanälen. Wie Alice im Wunderland. Leute wohnen hier echt.",nt:"Kostenlos zu gucken. Köpenick südlich. Zu Fuß. Boot fahren möglich. Sommer schön. Ruhig und surreal."},
  {id:159,n:"Modersohnbrücke at golden hour",a:"Friedrichshain",v:["beautiful", "local"],d:159,s:"The bridge where young Berlin watches the sunset — viral for a reason",st:"A railway overpass between Friedrichshain and Kreuzberg that became Berlin\'s unofficial sunset gathering point. Every warm evening, people sit on the railing and steps watching trains pass below while the sky turns gold over the Fernsehturm. No admission, no event — just people and light.",im:"A hundred people sitting on a bridge, not looking at phones, watching the sun go down behind the TV tower. Trains underneath. The whole city turning gold. Nobody planned this. It just happened.",t:"🚇 S-Bahn Ostkreuz, walk 5 min west. Or U1 Schlesisches Tor, walk north. The bridge spans S-Bahn tracks on Modersohnstraße. Free. Best 30 min before sunset.",c:["instagram", "romantic_water"],r:"g",nn:"Modersohnbrücke bei goldener Stunde — Friedrichshain",ns:"Brücke wo Sonne schön wird — Fotografie-Magnet",nst:"Bei Sonnenuntergang wird Modersohnbrücke Kunstwerk. Licht tanzt auf Wasser. Du merkst: Moment ist perfekt.",nt:"Kostenlos. Friedrichshain nah. Zu Fuß. Foto-Stativ ideal. Golden hour ist eine Stunde vor Sonnenuntergang. Wetter-abhängig."},
  {id:160,n:"Rixdorf — the Bohemian village inside Neukölln",a:"Neukölln",v:["hidden", "history"],d:160,s:"Cobblestones, a forge, and a 300-year-old village square hiding in the middle of Neukölln",st:"Before Neukölln swallowed it, Rixdorf was its own village — and part of it still feels like one. Around Richardplatz, cobblestone lanes lead to a working blacksmith\'s forge, half-timbered cottages, and a Bohemian church. In 1737, King Friedrich Wilhelm I invited persecuted Bohemian Protestants to settle here. Their village, Böhmisch-Rixdorf, still has a distinct character. The Christmas market here is one of Berlin\'s most atmospheric — tiny, candlelit, on the old village square.",im:"Bohemian refugees in 1737, fleeing religious persecution, arriving in this village outside Berlin. Building a church, a school, a new life. 300 years later, the village square is still here — surrounded by Neukölln\'s kebab shops and Spätis.",t:"🚇 U7 Karl-Marx-Straße, walk 5 min east to Richardplatz. Free. The forge is sometimes open — check the sign. The December Christmas market on the square is unmissable.",c:["history_big", "hidden"],r:"g",nn:"Rixdorf — das Böhmische Dorf im Neukölln — Neukölln",ns:"Dörfliches Vierteli mitten in Stadt — Zeit-Loch",nst:"Rixdorf ist kleines Dorf-Viertel. Gasse eng. Häuser alt. Es ist wie Traum aus 1920er Jahre.",nt:"Kostenlos. Neukölln. Zu Fuß. Café überall. Künstler mögen. Ruhig und verrückt. Geschichte überall."}
,
  {id:108,n:"DDR Museum (Ostkreuz)",a:"Friedrichshain",v:["history","weird","local"],d:12,s:"Former East German spy headquarters — now a raw historical museum",st:"The Stasi offices (secret police) are preserved as a museum showing surveillance techniques and propaganda. It\'s eerie to walk through the interrogation rooms and filing systems; a reminder of totalitarian control.",im:"Time-travel: The Stasi operated here until 1990, monitoring millions of East Germans.",t:"Paid entry (€15). U-Bahn to Ostkreuz. Audioguide recommended.",c:["history_big","scary"],r:"g",nn:"Gedenkstätte Deutsche Teilung",ns:"Ehemalige Stasi-Zentrale — jetzt Museum für Spionage",nst:"Besuchen Sie die erhaltenen Büros der Geheimpolizei.",nt:"Eintritt erforderlich. U-Bahn nach Ostkreuz."}

,{id:189,n:"Markt macht Musik at Hermannplatz",a:"Neukölln",v:["music", "market"],d:20,s:"Free live tunes rocking Berlin's weekly markets!",st:"Locals turn veggie stalls into a stage where buskers jam folk, jazz, and Balkan beats under the sun. It's pure neighborhood magic, beer in hand, dancing between the crowds. Feel Berlin's pulse in the everyday chaos.",im:"Imagine strumming along to a fiddle solo as shoppers haggle over fresh pretzels nearby.",t:"U8 to Hermannplatz, first Thursday Apr-Sep from 13:00. Totally free, bring cash for market snacks. Best in summer evenings.",c:["music", "markets"],r:"g",nn:"Markt macht Musik am Hermannplatz",ns:"Kostenlose Live-Musik rockt die Wochenmärkte!",nst:"Locals verwandeln Gemüsestände in Bühnen, wo Busker Folk, Jazz und Balkan-Beats unter der Sonne jammen. Reine Nachbarschaftsmagie, Bier in der Hand, tanzen zwischen den Massen. Spür Berlins Puls im Alltagschaos.",nt:"U8 nach Hermannplatz, jeden ersten Donnerstag Apr-Sep ab 13:00. Kostenlos, Bargeld für Markt-Snacks mitbringen. Beste Sommerabende."},
{id:190,n:"Drachenberg Hill",a:"Grunewald",v:["hidden", "views"],d:25,s:"Secret sibling to Teufelsberg with epic wide-open skies!",st:"Climb this rubble hill for a picnic perch gazing over Berlin's green sprawl. Fewer crowds than the big towers, just wind-whipped trees and that endless horizon vibe. Sunset turns it into a private sky theater.",im:"Picture yourself sprawled on a blanket, city lights flickering awake below as the sun dips.",t:"S7 to Grunewald then hike up (20min), free anytime. Golden hour magic, pack a thermos.",c:["hikes", "sunsets"],r:"g",nn:"Drachenberg",ns:"Geheimes Geschwisterchen zu Teufelsberg mit epischen weiten Himmeln!",nst:"Klettere diesen Schuttberg für ein Picknick-Platz mit Blick über Berlins grüne Weite. Weniger Trubel als bei den großen Türmen, nur windgepeitschte Bäume und dieser endlose Horizont-Vibe. Sonnenuntergang macht's zum privaten Himmels-Theater.",nt:"S7 nach Grunewald dann hochwandern (20min), jederzeit kostenlos. Goldene Stunde magisch, Thermos mitnehmen."},
{id:191,n:"Tränenpalast (Palace of Tears)",a:"Mitte",v:["history", "hidden"],d:15,s:"Emotional free dive into Berlin's divided past!",st:"Step into this tiny museum where Cold War tears flowed at the border crossing. Hushed rooms echo with stories of goodbyes and spies. It's a quick, gut-punch reminder of the Wall's human cost.",im:"Hear the phantom echoes of farewells in the stark checkpoint hall.",t:"U6 to Friedrichstraße, free entry daily 11-18h. Rainy day gem, 30min visit.",c:["museums", "coldwar"],r:"g",nn:"Tränenpalast",ns:"Emotionale kostenlose Reise in Berlins geteilte Vergangenheit!",nst:"Trete in dieses kleine Museum ein, wo am Grenzübergang Kalter-Krieg-Tränen flossen. Stille Räume hallen mit Geschichten von Abschieden und Spionen wider. Schneller, herzzerreißender Reminder an die menschlichen Kosten der Mauer.",nt:"U6 nach Friedrichstraße, täglich 11-18h kostenlos. Regenwetter-Perle, 30min Besuch."},
{id:192,n:"\"Dead Chicken Alley\" Mural Lane",a:"Mitte",v:["streetart", "hidden"],d:10,s:"Micro-alley exploding with gritty murals and stickers!",st:"Squeeze into this narrow passage near Hackesche Höfe for a sticker-bombed wonderland. Walls pulse with wild tags, stencils, and secret gallery vibes. It's Berlin's raw creative underbelly in bite-size form.",im:"Feel the buzz as you trace glowing neon tags under a flickering streetlamp.",t:"S5/S7 to Hackescher Markt, walk to Auguststraße lane. Free 24/7, dawn/dusk for mood.",c:["streetart"],r:"g",nn:"\"Dead Chicken Alley\"",ns:"Micro-Gasse explodiert mit gritty Murals und Stickern!",nst:"Zwänge dich in diesen schmalen Pfad nahe Hackesche Höfe für ein sticker-bombtes Wonderland. Wände pulsieren mit wilden Tags, Stencils und secret Gallery-Vibes. Berlins rohe kreative Unterwelt in Bissen-Format.",nt:"S5/S7 nach Hackescher Markt, zu Auguststraße-Gasse laufen. Kostenlos 24/7, Dämmerung für Stimmung."},
