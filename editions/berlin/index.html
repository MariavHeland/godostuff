{id:193,n:"Weißer See Cold Dip",a:"Pankow",v:["swim", "lakes"],d:25,s:"Urban lake plunge for instant Berlin adventure!",st:"Slip into these crisp waters ringed by whispering pines, far from tourist splashes. Locals brave the chill for that euphoric post-swim glow. It's wild swimming with a side of city skyline peeks.",im:"Dive in, emerge shivering, world sharp and alive amid the forest hush.",t:"Tram M10/S8 to Weißer See, multiple entry points free. Summer mornings, towel essential.",c:["swim", "nature"],r:"g",nn:"Weißer See",ns:"Urbaner See-Sprung für instant Berlin-Abenteuer!",nst:"Rutsche in diese kühlen Gewässer umringt von flüsternden Kiefern, fernab touristischer Spritzer. Locals trotzen der Kälte für den euphorischen Post-Schwimm-Glow. Wildschwimmen mit Stadt-Skyline-Blick.",nt:"Tram M10/S8 nach Weißer See, mehrere Einstiege kostenlos. Sommer-Morgen, Handtuch essenziell."},
{id:194,n:"Schleseisches Tor Street Art Warehouses",a:"Friedrichshain",v:["streetart", "industrial"],d:15,s:"Laid-back graffiti paradise dodging gentrification!",st:"Wander walls crammed with massive murals on forgotten warehouses towards Oberbaumbrücke. It's a street art fever dream of colors clashing in the fading industrial light. Pure, unpolished Berlin soul.",im:"Stand dwarfed by a 10-story beast mural breathing fire across rusted bricks.",t:"U1 to Schleseisches Tor, walk to bridge. Free anytime, weekends alive with buskers.",ef:"Almost free and worth it: Späti beer nearby, €1-2.",c:["streetart"],r:"g",nn:"Schleseisches Tor Graffiti-Warehouses",ns:"Entspanntes Graffiti-Paradies trotzt Gentrifizierung!",nst:"Schlendere an Wänden voller massiver Murals auf vergessenen Warehouses Richtung Oberbaumbrücke. Street-Art-Fiebertraum mit Farben, die im verblassenden Industrie-Licht kollidieren. Reine, unpolierten Berlin-Seele.",nt:"U1 nach Schleseisches Tor, zur Brücke laufen. Jederzeit kostenlos, Wochenenden mit Buskern lebendig."},
{id:195,n:"Blu Leviathan Mural by Watergate",a:"Kreuzberg",v:["streetart", "iconic"],d:20,s:"Monstrous Blu masterpiece devouring the skyline!",st:"Gaze up at this colossal sea beast swallowing humans on the wall by thumping Watergate club. Painted in 2007, it's Berlin's mural king staring you down across Oberbaumbrücke. Night lights make it surreal.",im:"Lock eyes with the beast's hungry maw as club bass rumbles below.",t:"U1 to Oberbaumstraße, cross bridge left side. Free 24/7, evening for drama.",c:["streetart"],r:"g",nn:"Blu Leviathan Mural bei Watergate",ns:"Monströses Blu-Meisterwerk frisst den Skyline!",nst:"Starre hoch auf dieses kolossale Meeresungeheuer, das Menschen auf der Wand beim Watergate-Club verschlingt. 2007 gemalt, Berlins Mural-König starrt dich über Oberbaumbrücke an. Nachtlichter machen's surreal.",nt:"U1 nach Oberbaumstraße, Brücke überqueren linke Seite. Kostenlos 24/7, Abend für Drama."},
{id:196,n:"ROA Nature Morte Mural",a:"Kreuzberg",v:["streetart", "murals"],d:15,s:"ROA's dead critters haunting Skalitzer Straße!",st:"Hunt this massive black-and-white mural of decaying animals stacked in eerie silence. Belgian artist ROA turns urban walls into nature's grim gallery. Cross under U-Bahn tracks for the full spooky reveal.",im:"Shiver as skeletal beasts loom over rushing traffic like forgotten omens.",t:"U8 to Schönleinstraße, Skalitzer Str. near Lausitzer Platz. Free, daylight best.",c:["streetart"],r:"g",nn:"ROA Nature Morte Mural",ns:"ROAs tote Viecher heischen auf Skalitzer Straße!",nst:"Jage dieses massive Schwarz-Weiß-Mural von verrottenden Tieren gestapelt in unheimlicher Stille. Belgier ROA macht urbane Wände zur grimmigen Natur-Galerie. Unter U-Bahn-Tracks queren für volles spooky Reveal.",nt:"U8 nach Schönleinstraße, Skalitzer Str. bei Lausitzer Platz. Kostenlos, Tageslicht am besten."}

  ,{id:214,n:"Badeschiff — Alt-Treptow",a:"Treptow",v:["hidden","beautiful","local"],d:1,s:"Floating pool where Berlin swims in summer",st:"A 30-meter barge converted into a swimming pool floating on the Spree with lifeguards. In summer it's a beach bar with electronic beats; in winter, a cocoon covers it with saunas inside.",im:"Sky-blue water, Fernsehturm rising across, the Oberbaum Bridge glowing at night. You're swimming in the city.",t:"Eichenstraße in Treptow. Summer: swim + beach bar open. Winter: saunas and lounge bar. Bring towel.",c:[],r:"g",nn:"Badeschiff — Alt-Treptow",ns:"Das schwimmende Becken im Spree",nst:"Ein Kahn im Wasser, umgebaut zum Becken. Im Sommer Strandbar mit elektronischen Beats, im Winter Saunen unter einer Kuppel. Du sitzt im Wasser und siehst die Fernsehturm.",nt:"Eichenstraße in Treptow. Sommer zum Schwimmen und Trinken offen. Winter Saunen. Handtuch mitbringen."}

{id:215,n:"Klunkerkranich — Neukölln Arcaden rooftop",a:"Neukölln",v:["local","free entry","beautiful"],d:2,s:"Free rooftop bar before 4pm, views of all Berlin at sunset",st:"Sit on the roof of a shopping mall parking garage. Vines, plants, mismatched furniture. Free until 4pm on weekdays. After: €2–10 depending on the time.",im:"Sun setting behind the Fernsehturm. Tables crammed with students and locals. You forget you're on a car park.",t:"Neukölln Arcaden, 6th floor. Take the elevator down. Arrive before 4pm for free. Get there at 6pm weekends and queue — it fills fast.",c:[],r:"g",nn:"Klunkerkranich — Neukölln Arcaden",ns:"Das Dachbar ohne Eintritt bis 16 Uhr",nst:"Auf dem Dach eines Parkhauses sitzt du mit Blick über die ganze Stadt. Kostenlos bis 16 Uhr. Danach ein paar Euro.",nt:"Neukölln Arcaden, 6. Stock. Mit dem Aufzug hoch. Vor 16 Uhr kommt man kostenlos rein."}

{id:216,n:"Liepnitzsee — the secret perfect lake",a:"Wandlitz",v:["hidden","beautiful","swimming"],d:30,s:"Where DDR elite swam in private — now clear water and few tourists",st:"The clearest lake near Berlin. Woods come down to the water. Small boathouses and a quiet shore. The water is so clean you can see your feet.",im:"Trees straight into the water. Early morning mist. Locals arrive with coffee and newspapers.",t:"S-Bahn to Wandlitz, then bus or a 15-minute walk. A 7km walk loops the lake. Bring swimsuit — there's a small beach on the north shore.",c:[],r:"g",nn:"Liepnitzsee",ns:"Der klare See, wo die Nomenklatura schwammen",nst:"Das kristallarklare Wasser. Wald bis zum Strand. Du siehst deine Füße im See. Die DDR-Elite schwamm hier privat.",nt:"S-Bahn nach Wandlitz, dann Bus oder 15 Minuten laufen. Eine 7-km-Schleife um den See. Badeanzug mitbringen."}

{id:217,n:"Behmbrücke at dusk — Wedding to Prenzlauer Berg crossing",a:"Wedding",v:["sunset","beautiful","quiet"],d:1,s:"Bridge where you can see the whole city light up at golden hour",st:"Crosses the Panke river between Wedding and Prenzlauer Berg. On the bridge at 6pm in summer: Fernsehturm glows, Humboldthain park on one side, the old red-brick rooftops on the other.",im:"The light hits everything at once. Joggers and couples. The city turning pink.",t:"Behmstraße in Wedding. Free, always open. Best 30 minutes before sunset. No tourists.",c:[],r:"g",nn:"Behmbrücke — Wedding",ns:"Die Brücke zum Sonnenuntergang",nst:"Von der Brücke siehst du die ganze Stadt im Licht. Humboldthain auf der einen Seite, die roten Dächer auf der anderen.",nt:"Behmstraße in Wedding. Kostenlos. 30 Minuten vor Sonnenuntergang kommen. Keine Touristen."}

{id:218,n:"Halensee — Charlottenburg lake with quiet beach",a:"Charlottenburg",v:["swimming","quiet","local"],d:2,s:"A lake where Berliners actually swim, not tourists",st:"Small lake between Charlottenburg and Wilmersdorf forests. A sandy beach, boat rentals, a beer garden on the shore. Mostly locals.",im:"Pine trees, shallow water good for kids, the smell of fresh water and sunscreen.",t:"U-Bahn Halensee. The beach is on the south shore. Bring swimsuit. There's a kiosk and chairs for rent.",c:[],r:"g",nn:"Halensee — Charlottenburg",ns:"Der kleine See für Berliner Schwimmer",nst:"Ein See zwischen den Wäldern. Sandstrand, Bootsvermietung, Biergarten am Ufer. Nur Berliner.",nt:"U-Bahn Halensee. Strand auf der Südseite. Badeanzug mitbringen. Kiosk und Liegestühle."}

{id:219,n:"Haus der Wannsee-Konferenz — where Holocaust was planned",a:"Wannsee",v:["history","quiet","free entry"],d:45,s:"The villa where the Final Solution was decided, January 20, 1942",st:"A quiet house on a lake, with gardens overlooking the water. Inside: the exact room where 15 Nazi leaders coordinated the deportation and murder of all European Jews.",im:"Sunlight through tall windows. The table where it happened. The garden outside, peaceful and oblivious.",t:"S-Bahn to Nikolassee, 15-minute walk or bus 114. Free entry. Permanent exhibition downstairs. Allow 90 minutes minimum. Almost no tourists ever go here.",c:[],r:"g",nn:"Haus der Wannsee-Konferenz",ns:"Die Villa am See, wo das Unfassbare geplant wurde",nst:"Ein ruhiges Haus am Wasser. Im Zimmer nebenan: der Tisch, der Tisch. 15 Nazi-Offiziere einigten sich hier auf den Mord an acht Millionen Menschen.",nt:"S-Bahn nach Nikolassee, dann 15 Minuten Fuß oder Bus 114. Kostenlos. Ausstellung unten. 90 Minuten minimum. Fast keine Touristen gehen dorthin."}

{id:220,n:"Sachsenhausen angle — the triangle layout of horror",a:"Oranienburg",v:["history","quiet"],d:180,s:"30 min from Berlin: where the blueprint for all camps was drawn",st:"Built in 1936 as a model. The guards learned to run concentration camps here. Then they taught other camps. The triangle-shaped layout was deliberate — designed so guards could see every prisoner. Walk it and feel it.",im:"Empty barracks foundations. The watchtowers at each corner still standing. The execution pit. A crematorium. Rational cruelty made physical.",t:"S-Bahn RB12/RB13 to Oranienburg (50 min), then 20-minute walk. Allow 3 hours minimum. The path through is 2.5km. Audio guide available. Almost no tourists.",c:[],r:"g",nn:"Sachsenhausen-Gedenkstätte",ns:"Das Konzentrationslager nach Plan — die Dreiecks-Logik",nst:"1936 gebaut als Vorbild. Die Wachen lernten hier, andere Lager zu führen. Das Dreieck war Absicht — jeder Gefangene sichtbar von oben.",nt:"S-Bahn RB12 nach Oranienburg (50 Min), dann 20 Min Fuß. 3 Stunden einplanen. Audio-Führung kostenlos. Fast niemand kommt hin."}

{id:221,n:"Olympic Village 1936 — ruins in the forest",a:"Wustermark",v:["history","weird","forgotten"],d:120,s:"4,000 athletes stayed here, then Hitler used it for war. Now it rots.",st:"14km west of Berlin, on the forest edge. 136 bungalows built for athletes. By 2019, 120 had crumbled. Trees grow through windows. Murals fading.",im:"A modernist ghost town. Architecture still beautiful, still empty. Birds nesting in the bedrooms.",t:"S-Bahn to Elstal, then 2km walk into the forest. Most buildings are fenced off, but you can walk the grounds and see from the perimeter. Restore projects ongoing but slow.",c:[],r:"g",nn:"Olympisches Dorf 1936",ns:"Die verlassene Athleten-Stadt im Wald",nst:"4000 Athleten wohnten hier. Dann Krieg. Jetzt fällt es in sich zusammen. Bäume wachsen durch die Fenster.",nt:"S-Bahn nach Elstal, dann 2km Fuß. Die Gebäude sind abgesperrt, aber der Gelände ist frei. Sehen, wie Geschichte verfallt."}

{id:205,n:"Spreewald by punt — Lehde village only reachable by water",a:"Lübbenau",v:["beautiful","quiet","hidden"],d:180,s:"UNESCO wetland: two hours punting through tunnels of trees to a water village",st:"Wooden boats with a single pole. A maze of canals. Villages built on stilts connected by bridges. 19th-century cottages in the open-air museum at Lehde.",im:"Green tunnel. The pole dripping. Silence except water. A wooden house slides past. You are in another century.",t:"Train from Berlin to Lübbenau (direct, 1 hour 15 min). Book a punting tour (€15–20). The 2-hour option ends at Lehde. Bring hat — sun reflects off water.",c:[],r:"g",nn:"Spreewald — Lehde",ns:"Das Wasser-Dorf im Urwald",nst:"Flachboote durch Grüntunnel. Häuser auf Stelzen. Ein offenes Museum der Sorben am Wasser.",nt:"Zug von Berlin nach Lübbenau (direkt, 75 Min). Kahnfahrt buchen. 2 Stunden bis Lehde. Hut mitbringen — die Sonne spiegelt sich."}

{id:206,n:"Humboldthain Flak Tower — views + rose garden below",a:"Wedding",v:["history","beautiful","views"],d:2,s:"WWII bunker you can climb for panoramic Berlin views, rose garden below",st:"The flak tower is concrete and 55 meters tall. 100 steps to the top. Views north to the suburbs, south blocked by summer trees (winter is better). Below: a rose garden planted where a church stood.",im:"The concrete weathered grey. The view sudden and huge. Roses below, then the city spreading flat.",t:"U-Bahn to Gesundbrunnen. Volkspark Humboldthain is free. The rose garden is on the east side. Berliner Unterwelten runs summer tours inside the bunker (€10).",c:[],r:"g",nn:"Humboldthain Flakturm — Wedding",ns:"Der Bunker zum Hochklettern",nst:"Beton, 55 Meter hoch. 100 Stufen. Aussicht über Berlin. Unter den Rosen, wo eine Kirche stand.",nt:"U-Bahn zu Gesundbrunnen. Park kostenlos. Sommer: Bunker-Touren mit Berliner Unterwelten (€10)."}

{id:207,n:"Checkpoint Charlie's real crossing box — at Allied Museum",a:"Dahlem",v:["history","hidden"],d:90,s:"The actual wooden hut is here. The replica you see is just theater.",st:"The original guardhouse — a simple wooden box where border guards sat — is preserved in the Allied Museum in Dahlem. The tourist site has a replica. This is the real thing.",im:"A small wooden booth, faded. Where Americans and East Germans faced off. Where escape attempts happened.",t:"U-Bahn to Oskar-Helene-Heim or Dahlem-Dorf. Allied Museum is free. Allow 2 hours. The checkpoint hut is in the courtyard. Almost nobody goes to the museum itself — they go to the fake one.",c:[],r:"g",nn:"Checkpoint Charlie Wache — Dahlem",ns:"Die echte Hütte ist hier",nst:"Die originale Holzhütte von 1989 steht im Alliierten-Museum. Die Touristenfalle hat eine Replika.",nt:"U-Bahn nach Dahlem-Dorf. Museum kostenlos. Die Hütte ist im Hof. Niemand geht zum echten hin."}

{id:208,n:"Bernauer Straße Memorial — why it's better than East Side Gallery",a:"Mitte",v:["history","free entry","powerful"],d:2,s:"Where the Wall cut through a street. See the metal band showing exactly where it was.",st:"The Wall runs through. A 1.3km open-air exhibition. A metal band marks exactly where the barbed wire was. You stand on one side. The death strip was this wide. Houses still show bullet holes.",im:"The thin line on the ground. Bullet scars in brick. The emptiness where the Wall was. Real geography, not a painting.",t:"U-Bahn to Bernauer Straße. Free. The Documentation Centre has a 45-minute film and archive (€7). The outdoor section is all free and open 24/7.",c:[],r:"g",nn:"Bernauer Straße Gedenkstätte",ns:"Der Grund für die Mauer — durch eine Straße",nst:"Die Mauer läuft durch die Straße. Ein Metallband zeigt genau, wo der Draht war. Du stehst drauf.",nt:"U-Bahn Bernauer Straße. Kostenlos und offen 24/7. Dokumentationszentrum hat einen Film (€7)."}

{id:209,n:"1936 Olympic Village in the Forst — actually collapsed 1945",a:"Wustermark",v:["history","weird"],d:120,s:"Where Hitler's athletes lived becomes a Soviet training camp, then rots",st:"After the Nazis, Soviets took it for sports training. Buildings stripped. By 1992 it was abandoned. Vandals took everything moveable. 120 of 136 bungalows have failed.",im:"Modern architecture slowly returning to forest. Not grim — oddly peaceful.",t:"Same as above: S-Bahn to Elstal, then walk. Phone +49-3321-40750 for restricted building access (some tours available).,c:[],r:"g",nn:"Olympisches Dorf 1936",ns:"Nazis — Sowjets — Wald",nst:"Erst Hitler-Athleten, dann Sowjet-Sportler, dann niemand. Jetzt fällt alles um.",nt:"S-Bahn nach Elstal. Touren auf Anfrage verfügbar."}

{id:210,n:"Pergamon Museum — the closure and what it means",a:"Mitte",v:["history","art"],d:2,s:"Main building closed until 2027. The Ishtar Gate won't return until the 2030s.",st:"The Pergamon Altar and Ishtar Gate — two of the world's greatest sculptures — are being slowly disassembled for restoration. The main building is dark. Only the south wing occasionally opens.",im:"The biggest gap in Berlin's museum landscape. The absence is the story now.",t:"Museum Island. The only option in 2026 is Pergamonmuseum Das Panorama across the canal (€14, free under 18). A 360-degree projection of ancient Pergamon, 80 original sculptures. Book timed entry.",c:[],r:"g",nn:"Pergamonmuseum — die Schließung",ns:"Das größte Loch in Berlins Museumswelt",nst:"Pergamon-Altar und Ischtar-Tor werden auseinandergenommen bis 2027. Die Hallen sind dunkel.",nt:"Inselmuseen. 2026: nur Das Panorama über die Brücke (€14). 360-Grad-Film."}

{id:211,n:"Turkish Market Maybachufer — Tuesday & Friday only",a:"Kreuzberg",v:["local","markets","free entry"],d:2,s:"Kreuzkölln's real market: fresh produce, street food, locals",st:"Runs along the canal on Tuesdays and Fridays. Vegetables, spices, Turkish bread. Street food stalls. Families shopping, not tourists.",im:"The smell of cumin and fresh bread. Voices in Turkish and Kurdish. Pots of pickled vegetables.",t:"U-Bahn to Kottbusser Tor. Tuesdays 12pm–6:30pm, Fridays 12pm–6:30pm. Most vendors are there by 1pm.",c:[],r:"g",nn:"Türkischer Markt Maybachufer",ns:"Diens- und Freitags, echte Berliner Markt",nst:"Entlang des Kanals. Gemüse, Gewürze, Brot. Straßenessen. Nur Berliner, keine Touristen.",nt:"U-Bahn Kottbusser Tor. Diens- u. Freitags 12-18:30. Die meisten ab 13 Uhr."}

{id:212,n:"Moabit neighborhood walk — quiet, green, underrated",a:"Moabit",v:["local","quiet","hidden"],d:60,s:"Shaken off its rough 90s reputation. Good food, low rents, actual green.",st:"The area around Kulturfabrik Moabit. Arminius Markthalle is excellent. No tourists. Actual trees and quiet streets. The Spree runs along the north edge.",im:"Willow trees by the water. A neighborhood that didn't gentrify, just got better.",t:"U/S-Bahn Moabit. Walk north toward the Spree. Explore Arminius Markthalle, then walk the canal path west. Lunch at a local spot. Nobody's here.",c:[],r:"g",nn:"Moabit Spaziergang",ns:"Der Kiez, der kein Tourist kennt",nst:"Zwischen Spree und Ringbahn. Gute Restaurants. Niedrige Mieten. Keine Touristen. Tatsächlich grün.",nt:"U-Bahn Moabit. Nord zum Spree laufen. Arminius Markethalle. Kanalweg spazieren. Mittag dort."}

{id:213,n:"Weißensee neighborhood — Prenzlauer Berg vibes, half the price",a:"Weißensee",v:["local","quiet"],d:60,s:"A lake district with village vibes, 20 minutes from Mitte, nobody goes",st:"Calm, clean, low tourist pressure. A lake in the middle. Prenzlauer Berg-style cafes and boutiques, but Berliners actually live there.",im:"Tree-lined streets. The Weißer See reflecting the light. A place that doesn't feel like Berlin, it feels like home.",t:"S-Bahn to Weißensee. Walk around the lake (3km). Explore Florastraße for cafes and shops. It's quiet most days.",c:[],r:"g",nn:"Weißensee Spaziergang",ns:"Prenzlauer Berg zum halben Preis",nst:"Ein See im Kiez. Ruhig. Grün. Die gleichen Cafes wie Prenzlauer Berg, aber wirkliche Berliner wohnen hier.",nt:"S-Bahn Weißensee. Um den See laufen. Florastraße erkunden. Ruhig fast täglich."}

{id:197,n:"Lichtenberg — real East Berlin, not a museum",a:"Lichtenberg",v:["local","history","hidden"],d:120,s:"Where East Berlin actually lived. Soviet-era housing, Asian markets, underground clubs",st:"Prefab Soviet apartment blocks. The Dong Xuan Center is Berlin's biggest Asian market. Weekend flea markets in industrial spaces. Underground music venues in old factories.",im:"Brutalist housing blocks from the 1960s still intact. People hanging laundry. The smell of pho and dumplings. No tourists.",t:"S-Bahn to Lichtenberg. Dong Xuan Center: weekends, Saturday–Sunday 10am–6pm. Walk south to explore the neighborhood. Lots of hole-in-the-wall restaurants.",c:[],r:"g",nn:"Lichtenberg Kiez-Spaziergang",ns:"Das echte Ost-Berlin",nst:"Plattenbau-Blocks aus den 1960ern. Der Dong Xuan Markt — größter Asien-Markt Berlins. Underground in alten Fabriken.",nt:"S-Bahn Lichtenberg. Dong Xuan: Samstag–Sonntag 10-18 Uhr. Süd spazieren."}

{id:198,n:"Boxhagener Platz Sunday Market — vinyl, vintage, locals",a:"Friedrichshain",v:["markets","local"],d:3,s:"Sunday flea market where Berliners sell their old stuff to other Berliners",st:"Sundays 9am–4pm. Vinyl records, vintage clothes, used books. A community market, not touristy. Food stalls. People sitting on the curb.",im:"The smell of old records and coffee. People digging through bins. A real neighborhood economy.",t:"U-Bahn to Ostbahnhof, then 10-minute walk. Early is better (9am). By noon it's crowded but still authentic.",c:[],r:"g",nn:"Boxhagener Platz Markt — Sonntags",ns:"Der Berliner-Markt für Berliner",nst:"Sonntags: alte Platten, Kleidung, Bücher. Keine Touristen. Echte Nachbarschaft.",nt:"U-Bahn Ostbahnhof. Sonntag 9-16 Uhr. Früh kommen ist besser."}

{id:199,n:"Arkonaplatz Sunday Market — art, design, coffee",a:"Wedding",v:["markets","local","art"],d:2,s:"Sunday market where local artists and designers sell directly",st:"Sundays only. Handmade jewelry, prints, plants, coffee. A creative market. No chain vendors. Very neighborhood.",im:"Long tables under the trees. Artists sitting beside their work. The smell of filter coffee.",t:"U/S-Bahn to Wedding. Arkonaplatz on Sundays 10am–4pm. It's small — 30–40 stalls. Come early or go late, midday is packed.",c:[],r:"g",nn:"Arkonaplatz Markt — Sonntags",ns:"Der Künstler-Markt",nst:"Sonntags: Schmuck, Drucke, Pflanzen, Kaffee. Echte Künstler. Keine Ketten.",nt:"U-Bahn Wedding. Sonntag 10-16 Uhr. Klein aber fein."}

{id:200,n:"Blumengroßmarkt at 5am — the real flower wholesale market",a:"Wedding",v:["early morning","local","hidden"],d:2,s:"Arrive at 5am to see Berlin's florists and restaurants buying flowers",st:"This is not a public market. But if you show up between 5am and 6am, you can walk through and watch the real business happen.",im:"Trolleys full of cut flowers. Wholesalers shouting prices. The smell of lilies and roses. A working world.",t:"Beusselstraße in Wedding. 5am–6am is the window. You won't buy anything, but you'll see how the city works.",c:[],r:"g",nn:"Blumengroßmarkt — Wedding",ns:"5 Uhr morgens im Blumen-Großhandel",nst:"Wagen voller Schnittblumen. Großhändler schreien Preise. Die echte Arbeit der Stadt.",nt:"Beusselstraße Wedding. 5-6 Uhr morgens. Du kaufst nichts, aber siehst wie es läuft."}

{id:201,n:"Tempelhof field — cycl­ing, kites, empty sky",a:"Neukölln",v:["free entry","local","beautiful"],d:2,s:"The world's biggest park: 387 hectares. An abandoned airport you can own for a day.",st:"The runway is 3.8km long. Cyclists, rollerbladers, people flying massive kites. It's free, always open, and feels like the future.",im:"The flat horizon. The sky enormous. A kite diving. You pedaling across concrete where planes landed.",t:"U-Bahn to Tempelhof. Gate is on Tempelhofer Damm side. Rent bikes at the entrance (€3–5/hour). Bring a kite or a bottle of wine and sit in the middle of nothing.",c:[],r:"g",nn:"Tempelhofer Feld",ns:"Der größte Park der Welt — eine Flugpiste zum Radfahren",nst:"387 Hektar. Eine verlassene Flugpiste. Rad, Drachen, Himmel.",nt:"U-Bahn Tempelhof. Eingang Tempelhofer Damm. Räder mieten (€3-5/h). Drachen mitbringen oder Wein."}

{id:202,n:"Rheinsberg — Frederick's first palace, lake town, garden",a:"Brandenburg",v:["history","beautiful"],d:240,s:"Frederick the Great's first love — he called it his rehearsal room",st:"A Rococo palace where the Crown Prince spent his happiest years before Sanssouci. On Lake Grienerick. The gardens are still perfect. The lake is clear and swimmable.",im:"Pink stucco palace. The lake beyond. Gardens sloping to the water. The same light Frederick saw.",t:"Train RE1 to Rheinsberg (1.5 hours). Palace opens 10am–6pm (€8). Audio guide included. Walk the gardens and swim in the lake if you want.",c:[],r:"g",nn:"Schloss Rheinsberg — Brandenburg",ns:"Friedrichs erstes Schloss am See",nst:"Das rosane Barockschloss. Am See. Der Garten zum Wasser. Wo Frederick sein Glück fand.",nt:"Zug RE1 nach Rheinsberg (90 Min). Schloss 10-18 Uhr (€8). Audiofü­hrer dabei."}

{id:203,n:"Buckow — Brecht's lake escape in Märkische Schweiz",a:"Brandenburg",v:["history","beautiful","swimming"],d:120,s:"Playwright Brecht and wife spent summers in a house by the lake, 1952–1956",st:"The Schermützelsee is clear. The Brecht-Weigel Haus is a museum (summers only). But the real thing is the lake, the woods, the silence.",im:"A house with a studio overlooking the water. The lake so clear you see your feet. The woods very quiet.",t:"S-Bahn RB26 to Müncheberg, bus 928 to Buckow Strand (total 90 min). Swim in the lake. The Brecht house is only open April–October.",c:[],r:"g",nn:"Buckow — Brecht-Haus am See",ns:"Der Dramatiker am klaren See",nst:"Brecht und Frau verbrachten Sommer hier. Der See ist kristallklar. Wald ringsum.",nt:"S-Bahn RB26 zu Müncheberg, Bus 928 nach Buckow (90 Min). Schwimmen im See."}

{id:204,n:"Brandenburg an der Havel — medieval island town, red-brick churches",a:"Brandenburg",v:["beautiful","quiet"],d:180,s:"45 minutes from Berlin: three islands connected by water, Gothic churches, beer gardens",st:"An old town split across three islands in the Havel River. Red-brick medieval churches. The river quiet around you. Cafes on the bank.",im:"Gothic spires reflected. The river flowing between islands. Bells from the cathedral.",t:"RE1 train from Berlin Hauptbahnhof (45 min). Walk or rent a bike to explore all three islands. The riverside promenade near the Millennium Bridge is the best spot for a drink.",c:[],r:"g",nn:"Brandenburg an der Havel",ns:"Drei Inseln im Fluss, Gotik und Stille",nst:"Drei Inseln im Havel. Rote Backsteinkirchen. Das Flüsschen um dich herum.",nt:"RE1 Zug (45 Min). Rad mieten zum Erkunden. Flussseite am besten."}

,{id:161,n:"Schermützelsee — swim where Brecht swam",a:"Buckow",v:["nature","beautiful","quiet"],d:151,s:"The lake Brecht walked to on summer mornings — still clean, still free",st:"The Schermützelsee is the largest of Buckow's chain of glacial lakes, ringed by beech forest that runs straight into the water. Brecht came here in the summers of the early 1950s to escape the DDR's cultural demands. He swam early, before the town woke up. The water is cold and clear enough to see the bottom. A public beach on the north shore has no fence and no entrance fee — the way it always was.",ef:"Same lake restaurants on the shore. The Buckow market square has a bakery open from 7am.",sf:"Seehof Buckow (lake hotel, €70+). Strandbad camping for tents. Quiet guesthouses on Bertolt-Brecht-Straße in the town.",im:"It's 1952. Brecht walks down through the trees at 7am. The lake is completely still. He's been writing since 5. This is the reward.",t:"Take S5 to Strausberg Nord, then bus 928 to Buckow. Public beach on the north shore — no fee. Arrive before noon in summer. The walk around the full lake takes 90 minutes through forest.",c:["parks","romantic_water"]}
,{id:162,n:"Buckower Kleinbahn — the narrow-gauge railway to nowhere",a:"Buckow",v:["weird","history"],d:155,s:"A Victorian narrow-gauge railway that runs 6km through flat fields — the destination is irrelevant",st:"Built in 1898 to connect Buckow to the outside world, the Buckower Kleinbahn runs 6 kilometres of narrow track through flat Brandenburg farmland. The train is tiny — one or two antique carriages behind a small locomotive. The destination is Müncheberg, a perfectly ordinary small town. That's not the point. The point is the journey: slow, rural, swaying through an unchanged landscape on a train that shouldn't still exist.",ef:"Müncheberg has a Bäcker on the main street. Buckow market square cafés for the return. The train ride itself is the thing — not the destination.",im:"It's 1910. A farmer loads crates of vegetables. The locomotive hisses. Buckow hasn't seen a car yet.",t:"Runs April to October, weekends only. Cheap fare. Return train runs too. Müncheberg has a ruined Gothic church worth a brief look.",c:[]}
,{id:163,n:"Holländisches Viertel — the Dutch Quarter",a:"Potsdam",v:["beautiful","history","local"],d:55,s:"134 red-brick Dutch houses built for craftsmen who mostly never came",st:"Friedrich Wilhelm I wanted Dutch craftsmen to settle in Potsdam. When not enough came willingly, he built them a neighbourhood that looked like home. 134 Dutch-style gabled brick houses, laid out in four streets between 1733 and 1742. Most of the invited craftsmen never arrived. The houses filled with whoever needed them. Today it's the most intact Dutch neighbourhood outside the Netherlands — galleries, small cafés, original brickwork, almost no tour groups.",ef:"The Dutch Quarter itself has good independent cafés — Café Heider on Friedrich-Ebert-Straße is a Potsdam institution since 1878.",im:"It's 1740. A Dutch glassblower stands in the doorway, wondering if he made the right choice.",t:"Walk all four parallel streets — takes 30 minutes. Saturday market on the square. Potsdam Hauptbahnhof to tram 92 or 96, four stops. Best light in late afternoon.",c:["history_big"]}
,{id:164,n:"Russische Kolonie Alexandrowka",a:"Potsdam",v:["hidden","history","beautiful"],d:60,s:"A complete Russian village built in Prussia in 1826 — descendants still live there",st:"After the Napoleonic Wars, Friedrich Wilhelm III kept 12 Russian singers who had performed for him. To house them, he built an entire Russian village — log houses, vegetable gardens, a chapel. An orthodox church on a hill above. The soldiers' descendants still live in some of the houses. It's UNESCO World Heritage. Most Potsdam visitors walk straight past it on the way to Sanssouci.",ef:"Pack a picnic — nothing near Alexandrowka. Dutch Quarter cafés are 20 minutes walk. Lidl near Hauptbahnhof.",im:"It's 1830. A Russian soldier sits outside his log house in the Prussian sun, writing a letter home that will take six weeks to arrive.",t:"Tram 96 from Hauptbahnhof, one stop past the main palace. Free to walk the paths. The Alexander Nevsky church on the hill is usually open. 15 minutes walk from Sanssouci.",c:["history_big"]}
,{id:165,n:"Cecilienhof — where the Cold War was born",a:"Potsdam",v:["history"],d:65,s:"The conference table where Stalin, Truman and Churchill divided the postwar world",st:"In July and August 1945, three delegations met in this half-timbered palace on a lake north of Potsdam and drew the map of the second half of the 20th century. The Potsdam Conference. Stalin had brought hundreds. Truman had just learned the atomic bomb worked. Churchill lost an election halfway through and had to leave. The conference room is unchanged — the table, the chairs, the ashtrays, the flags. You can stand where it happened.",ef:"Hotel Bayrisches Haus nearby has a restaurant but it\'s pricey. Bus 692 back to Hauptbahnhof has multiple options. Bring a packed lunch.",im:"It's August 1945. Three men who've never fully trusted each other sit across a round table. Outside, Germany is rubble. They're deciding what comes next.",t:"€8 entry, part of the Prussian palaces complex. Bus 692 from Potsdam Hauptbahnhof. Combine with Babelsberg Park nearby — same bus direction.",c:["history_big","scary"]}
,{id:166,n:"Babelsberg Park — Sanssouci's forgotten twin",a:"Potsdam",v:["beautiful","nature","quiet"],d:50,s:"Same royal ambition, same landscape beauty — half the crowd of Sanssouci",st:"On the opposite bank of the Havel from Sanssouci, Babelsberg Park spreads across a hill above the river. Same era, same English landscape style, same extravagant investment in scenery. But no tour buses. Gothic towers, meadows running down to water, the long Havel view. Kaiser Wilhelm I considered this home — not Sanssouci. He died here. The park is free and in summer almost empty compared to its famous neighbour.",ef:"No food in Babelsberg Park. S7 back to Potsdam Hauptbahnhof for restaurants or Filmpark Babelsberg area has a café in season.",im:"It's 1880. The Kaiser walks alone in the early morning, 83 years old, watching the mist come off the Havel.",t:"S7 to Babelsberg, 10-minute uphill walk. Free to enter the park. The Flatowturm can be climbed in summer. Morning is best — almost nobody there before 10am.",c:["parks","romantic_water"]}
,{id:167,n:"Baumkronenpfad Beelitz — walking above the ruins",a:"Beelitz",v:["weird","nature","beautiful"],d:148,s:"A steel walkway suspended in the treetops, crossing directly over the roofless sanatorium below",st:"The same abandoned hospital complex at Beelitz now has a 320-metre elevated walkway threading through the tree canopy, passing directly above the ruins. From up here you see what you miss at ground level: the full scale of the complex, the symmetry of the collapsed roofs, the trees growing up through the wards, the chimneys with birds nesting in them. It's the ruins from the fourth floor, but there is no fourth floor.",ef:"Same advice as the sanatorium next door — Beelitz town bakery or bring your own. No food at the treetop walk.",im:"It's 1945. A Soviet military hospital is treating soldiers in this forest. The wards are full. Nobody imagines it empty.",t:"€10 entry, April to October. Combine with free exploration of the outer buildings. RE7 or RB33 from Berlin Südkreuz to Beelitz-Heilstätten station — 45 minutes. Last entry one hour before closing.",c:["abandoned","high_spots"]}
,{id:168,n:"Berliner Unterwelten — the city beneath the city",a:"Gesundbrunnen",v:["history","weird","scary"],d:34,s:"WWII civilian bunkers directly under the S-Bahn — original gas doors, original benches, 90 minutes underground",st:"Beneath Gesundbrunnen station lies one of Berlin's best-kept secrets. The Berliner Unterwelten organisation runs guided tours of WWII air-raid shelters that remain exactly as they were — the gas-proof steel doors, the wooden benches, the ventilation hand-pumps, the medical alcoves. In the final months of the war, tens of thousands of civilians lived underground here for weeks at a time while the city above burned. The cold is constant. So is the silence.",im:"It's February 1945. The ceiling shakes. Someone's child is crying in the corner. Nobody looks up.",t:"Book online — tours sell out in summer. Several tour options, 90 minutes to 2 hours. Tour 1 (WWII bunker) is the most accessible starting point. Meet at Gesundbrunnen S/U-Bahn station north exit. Wear a jacket — it stays around 10°C year-round.",c:["history_big","scary"]}
,{id:169,n:"Plötzensee — the execution shed",a:"Moabit",v:["history","scary"],d:45,s:"The room where the Nazis killed 2,891 people — hooks still on the wall",st:"Between 1933 and 1945, 2,891 people were executed at Plötzensee prison — mostly by guillotine, some by hanging from meathooks on an iron bar. After the July 20, 1944 assassination attempt on Hitler, 89 conspirators were brought here over several months and killed. The execution shed is preserved exactly as it was. The hooks are still mounted. The scale of the room — how small it is — makes the numbers concrete in a way that statistics don't.",im:"It's September 1944. Eight men from the conspiracy are brought in together. The shed is small. It takes nine minutes.",t:"Free entry, open daily. Tram 6 to Beusselstraße or bus 123. 10-minute walk through a residential neighbourhood. Inside the grounds of the still-functioning prison — follow the signs.",c:["history_big","scary","famous_dead"]}
,{id:170,n:"Jagdschloss Grunewald — Berlin's oldest palace",a:"Grunewald",v:["hidden","history","beautiful"],d:45,s:"A 1542 hunting palace on a dark lake in the forest — the oldest royal building in Berlin",st:"On the east bank of the Grunewaldsee, a small Renaissance palace has stood since 1542. It was built as a hunting lodge when this was just deep forest. It's Berlin's oldest surviving royal building — older than the city's status as a capital, older than most of what people think of as Berlin. A small museum inside holds Lucas Cranach paintings. But you come for the setting: white walls reflected in a dark lake, forest in every direction, deer in the surrounding park in winter.",im:"It's 1560. The Elector comes here to hunt and to escape the court at Cölln. The city doesn't exist yet.",t:"Museum €5, exterior and lake path free. U3 to Krumme Lanke then bus 115 to Am Grunewaldsee. Morning is best for deer. Combine with the Grunewald forest circular walk.",c:["famous_dead","parks"]}
,{id:171,n:"Allied Museum — Cold War in a cinema",a:"Dahlem",v:["history","hidden"],d:66,s:"Former US Forces cinema in the American sector — original Checkpoint Charlie booth outside",st:"In 1994 the last Allied troops left Berlin. Before they left, someone had the good sense to preserve everything. The Allied Museum occupies the former US Forces cinema in Dahlem — the deepest part of the American sector. In the car park: a genuine original Checkpoint Charlie guardhouse. Inside: the Hastings aircraft used during the Berlin Airlift, original CIA tunnel documents, a full Berlin Wall segment, and the personal effects of soldiers who spent decades in a city that might have become a battlefield at any moment.",im:"It's 1961. An American captain stationed in Dahlem watches the Wall go up on the news. He's ten minutes from it by car.",t:"Free entry, Tuesday to Sunday. U3 to Oskar-Helene-Heim. 10-minute walk. Combine with Domäne Dahlem working farm museum a few streets away.",c:["history_big"]}
,{id:172,n:"Botanischer Garten — one of the world's largest",a:"Steglitz",v:["beautiful","nature","quiet"],d:55,s:"43 hectares, 20,000 plant species, the largest glass greenhouse ever built — almost no tourists",st:"The Berlin Botanical Garden is one of the five largest in the world. Over 20,000 plant species across 43 hectares. The Great Tropical Greenhouse — built in 1907 — is the largest glass greenhouse ever constructed: 25 metres high, full of century-old palms and equatorial humidity. In January when the city is flat grey, people come here to sit under the glass and remember what warmth feels like. There is almost no tourist infrastructure — it's just a serious botanical garden.",im:"It's 1910. A botanist has been given this greenhouse and a century to fill it. She starts with palms.",t:"€7 entry (€3.50 for gardens only, greenhouses separate). U9 or S1 to Botanischer Garten. Open year-round including winter. Victoria water lily pond flowers in July and August — the leaves are 2 metres across.",c:["parks"]}
,{id:173,n:"Oberschöneweide — the ignored monument",a:"Schöneweide",v:["history","hidden","weird"],d:55,s:"2km of Peter Behrens factory architecture — the birthplace of industrial design, completely overlooked",st:"Between 1896 and 1914, Peter Behrens designed a sequence of factories for AEG along the Wilhelminenhofstraße in Schöneweide that became the founding text of modern industrial architecture. These buildings — the turbine halls, transformer stations, the workers' housing — defined how factories would look for the next century. They're still there. Most are used for storage or as university buildings. Architectural historians make pilgrimages. Everyone else takes the S-Bahn straight past.",im:"It's 1909. Behrens is also designing the AEG Turbine Factory in Wedding at the same time. He employs three assistants: Walter Gropius, Ludwig Mies van der Rohe, Le Corbusier.",t:"Tram 63 or 67 from Schöneweide S-Bahn. Walk the length of Wilhelminenhofstraße from the river end. The HTW campus occupies many buildings and is walkable. Combine with the Kaisersteg footbridge.",c:["history_big","abandoned"]}
,{id:174,n:"Straussee — cold lake, Victorian tram",a:"Strausberg",v:["nature","beautiful","local"],d:55,s:"50 minutes by S-Bahn, a glacial lake, and the oldest electric tram in Germany still running",st:"Strausberg is close enough to feel suburban, far enough to feel like Brandenburg. The town sits on the Straussee — a proper glacial lake, cold and clear, with a sandy public beach and no entrance fee. Between the S-Bahn station and the lake runs the Strausberger Straßenbahn: a heritage tram dating to 1889, still the main transport link, still using infrastructure that's over 130 years old. You arrive by modern S-Bahn, transfer to a Victorian tram, and go swimming in a lake that's been the same since the last Ice Age.",ef:"Lake kiosk open in summer. Bakery on the main street. Strausberg is small — the supermarket near the S-Bahn is your best option.",im:"It's 1905. The tram is new. The lake is exactly as cold as it is today.",t:"S5 to Strausberg (about 50 minutes from Ostbahnhof). Heritage tram from station to the lake. Public beach is free. Water stays cold all summer — that's the appeal.",c:["parks","romantic_water"]}
,{id:175,n:"Brandenburg Dom — cathedral on its own river island",a:"Brandenburg an der Havel",v:["history","beautiful","quiet"],d:80,s:"Gothic cathedral founded 1165, on a river island — this predates Berlin by centuries",st:"On a small island in the middle of the Havel River, the Brandenburg Cathedral has stood since 1165. It was here before Berlin existed as a city. Romanesque foundation, Gothic superstructure, original crypt still intact, medieval tiles still on the floor. The Dominsel — the island it occupies — is surrounded by arms of the Havel with swans and rowboats. The town that grew up around it still follows its 10th-century street layout.",ef:"Café am Domhof just outside the cathedral. The Altstädtischer Markt has a bakery and a simple restaurant. Brandenburg has more options than most day-trip towns.",im:"It's 1165. The island is chosen because it can be defended. The first stones are cut. Berlin will not exist for another 80 years.",t:"RE1 from Berlin Hauptbahnhof (45 minutes, about €12-15 return on a Brandenburg day ticket). Cathedral entry €4, island walk free. The three surviving medieval city gates are a 10-minute walk from the Dom.",c:["history_big"]}
,{id:176,n:"Brandenburg Medieval Gates — three survivors",a:"Brandenburg an der Havel",v:["hidden","history"],d:80,s:"Three intact medieval city gates in a town almost nobody from Berlin visits",st:"Brandenburg an der Havel has three surviving medieval city gates — the Steintorturm, the Mühlentorturm, and the Rathenower Tor — framing a town centre where the street layout hasn't changed since the 13th century. The Altstädtischer Markt has kept its proportions and its Roland statue (1474). On a weekday you can walk through these streets for an hour and see almost no tourists. The town is 45 minutes from Berlin. Very few Berliners have ever been.",ef:"Same as above — old town market square cafés. The medieval centre is compact and walkable, food is easy to find.",im:"It's 1474. The Roland is carved and erected to declare Brandenburg's independence as a free trading city. It's still in the same spot.",t:"Combine with the Dom on the Dominsel (10-minute walk). RE1 from Berlin Hauptbahnhof. Free to walk. The Stadtmuseum has free Sunday entry.",c:["history_big"]}

,{id:177,n:"Schloss Oranienburg — Brandenburg's oldest baroque palace",a:"Oranienburg",v:["history","beautiful"],d:50,s:"Germany's oldest surviving baroque palace — built 1651, completely ignored by tourists",st:"In 1651, Elector Friedrich Wilhelm built a summer palace at Oranienburg for his wife Luise Henriette of Orange. It became the first baroque palace in Brandenburg — the model that Sanssouci and all the others would eventually follow. It's beautifully restored, cheap to enter, and almost entirely empty of visitors. Everyone who comes to Oranienburg comes for Sachsenhausen and goes straight back. The palace is a 5-minute walk from the station.",ef:"Café inside the palace or the bakeries on the main street. Combine with Sachsenhausen for a full day — same Rewe near the station.",im:"It's 1651. The construction workers have never built baroque before. The Dutch princess arrives and looks critically at what they've managed.",t:"S1 to Oranienburg (50 minutes). Palace is 5 minutes walk from the station. €4 entry. Open Tuesday to Sunday. Combine with Sachsenhausen (30-minute walk or bus) to make a full day.",c:["history_big"]}
,{id:178,n:"Lehde — the village you can only reach by boat",a:"Spreewald",v:["hidden","nature","beautiful"],d:155,s:"A tiny village deep in the Spreewald canals — no roads, only water",st:"Inside the Spreewald biosphere reserve, 15 minutes by punt from Lübbenau, is a village with no roads. Lehde is an island settlement — maybe 100 inhabitants — where every house is reached by canoe or punt. The gardens meet the water. The paths between houses are the canals. There's an open-air museum of Sorbian farmhouses and a café. The Sorbian minority have spoken their own language and kept their customs here since the 6th century.",ef:"Lehde has one small café. Lübbenau (15 min by boat) has full restaurants. Sorbian Gurkensuppe is the thing to eat here.",sf:"Several guesthouses and farmhouses in Lehde itself — you stay on the island. Spreewald-Camping for tents. Book weeks ahead in July/August.",im:"It's 1900. The postman paddles his letters from house to house. There is no other way to do it.",t:"RE1 or RE2 from Berlin to Lübbenau (1 hour 20 minutes). Hire a punt or canoe in Lübbenau — Lehde is 15 minutes paddling. The Freilandmuseum in Lehde is free on certain days. Combine with the main Spreewald canal tour.",c:["parks","romantic_water"]}

<p className="text-sm mt-2" style={{color:"#555",lineHeight:1.5}}>{lang==="native"&&p.ns?p.ns:p.s}</p>
<div className="flex gap-1.5 mt-2 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-2 py-0.5 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</button>);

const PlaceDetail=({place:p,onClose,onNext,onPrev,lang})=>(
<div style={{position:"fixed",inset:0,zIndex:1000,backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat",overflowY:"auto"}}>
<div className="px-5 pt-6 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex justify-between items-center mb-4">
<button onClick={onClose} className="text-sm font-bold" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← Back</button>
<div className="flex gap-2">
<button onClick={onPrev} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>←</button>
<button onClick={onNext} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>→</button></div></div>
<h1 className="text-2xl font-black" style={{color:"#1a1a2e"}}>{lang==="native"&&p.nn?p.nn:p.n}</h1>
{lang==="native"&&p.nn&&<p className="text-sm font-medium" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-sm mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p>
{PLACE_IMAGES[p.id]&&<div className="mt-4 rounded-xl overflow-hidden" style={{maxHeight:"400px"}}>
<img src={`images/${PLACE_IMAGES[p.id]}`} alt={p.n} style={{width:"100%",maxHeight:"360px",objectFit:"contain",display:"block",borderRadius:"8px"}}/>
<p className="text-xs mt-1" style={{color:"#aaa",textAlign:"center"}}>AI-generated illustration</p></div>}
<div className="mt-4 p-4 rounded-xl" style={{background:"#f8f8ff"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#1a1a2e"}}>The Story</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nst?p.nst:p.st}</p></div>
{p.im&&<div className="mt-3 p-4 rounded-xl" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#a78bfa"}}>Imagine This</h3>
<p className="text-sm" style={{color:"#b8b0d0",lineHeight:1.7,fontStyle:"italic"}}>{p.im}</p></div>}
{p.t&&<div className="mt-3 p-4 rounded-xl" style={{background:"#f0fdf4"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#166534"}}>{lang==="native"?"Tips / "+LANG_NAME:"Tips"}</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nt?p.nt:p.t}</p>
{p.ef&&<p className="text-xs mt-3 pt-3" style={{color:"#555",lineHeight:1.7,borderTop:"1px solid #dcfce7"}}>🍔 {p.ef}</p>}
{p.sf&&<p className="text-xs mt-2" style={{color:"#555",lineHeight:1.7}}>🏠 {p.sf}</p>}
<a href={`https://maps.google.com/?q=${encodeURIComponent(p.n+', '+CITY_EN)}`} target="_blank" rel="noopener noreferrer"
  className="mt-3 flex items-center gap-2 text-sm font-bold"
  style={{color:"#166534",textDecoration:"none",display:"inline-flex",marginTop:"10px"}}>
  🗺 Get directions
</a>
</div>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TBGS={"places":"url('../../textures/tex12.png') center/cover no-repeat","collections":"url('../../textures/tex13.png') center/cover no-repeat","missions":"url('../../textures/tex14.png') center/cover no-repeat","plan":"url('../../textures/tex15.png') center/cover no-repeat","phrases":"url('../../textures/tex16.png') center/cover no-repeat","default":"url('../../textures/tex12.png') center/cover no-repeat"};function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
{/* dark scrim over photo */}
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Berlin Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Berlin Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
