const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TBGS={"places":"url('../../textures/tex10.webp') center/cover fixed no-repeat","collections":"url('../../textures/tex11.webp') center/cover fixed no-repeat","missions":"url('../../textures/tex12.webp') center/cover fixed no-repeat","plan":"url('../../textures/tex13.webp') center/cover fixed no-repeat","phrases":"url('../../textures/tex14.webp') center/cover fixed no-repeat","default":"url('../../textures/tex10.webp') center/cover fixed no-repeat"};function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length,{id:39,n:"Dalebrook Tidal Pools — Hidden Swimming Holes",a:"St James",v:["hidden","free entry","beautiful","quiet"],d:25,s:"Rock pools tucked between pastel Victorian bathing boxes where locals swim in crystal water away from tourist crowds.",st:"Between St James and Kalk Bay, Dalebrook offers a secret world of interconnected tidal pools cradled by ancient rock formations. Unlike crowded Camps Bay, these pools remain largely unknown to tourists. The water is cold and crystalline, fed by the Atlantic, and the pools fill naturally at high tide. Colorful Victorian-era bathing boxes—striped in pastels—line the shore, each one a private changing room from another era. At low tide, rock pools teem with starfish, anemones, and small fish. The walk down involves scrambling over rocks; locals come here for an early-morning ritual before work, or for sunset swims when the light turns everything golden. The pools are genuinely free; no gates, no fees, no crowds.",im:"A swimmer in one teal-blue tidal pool, Victorian bathing boxes striped cream-and-blue behind, mountain light hitting the wet rocks.",t:"Park at St James Beach car park. Walk south along the shore toward Kalk Bay; pools are 5-10 minutes' walk. Go at low-to-mid tide for best access. Bring water shoes for rocky scramble. Very cold water—suit up. Best at dawn before crowds.",c:[],r:"g",nn:"Dalebrook Tidal Pools",ns:"Piscinas de agua fría escondidas entre casetas victorianas de baño pastel",nst:"Piscinas naturales entre rocas antiguas; agua cristalina alimentada por el Atlántico; casetas de baño victorianas rayas; nado rituales de locales al amanecer.",nt:"Estacione en St James Beach. Camine 5-10 min hacia el sur. Marea baja-media ideal. Agua muy fría; traje recomendado."}
,{id:40,n:"Kirstenbosch Back Slopes — Fynbos Solitude",a:"Newlands",v:["hidden","nature","free entry","beautiful"],d:90,s:"Leave the manicured gardens; scramble up into protected fynbos slopes where endemic plants bloom and the city falls away entirely.",st:"Most visitors experience Kirstenbosch National Botanical Garden from the main lawns—picnics, concerts, crowds. But the back slopes, accessible only on foot, are a different world. Here, the mountain's true fynbos ecosystem—proteas, ericas, restios, silver trees—grows wild and untouched. The slopes climb steeply through this natural garden; no paths, no grooming, just the mountain in its authentic state. You emerge through vegetation into clearings where you can see from Table Mountain to False Bay. Silence is profound; birdsong is the only sound. The slopes are less known because they require fitness and navigation; most tourists stay on the lawn. Locals come here to escape completely.",im:"A hiker stands among tall proteas in full yellow bloom, looking out over Cape Town's spread below, mist clinging to the far mountains.",t:"Enter Kirstenbosch main gate (admission required for the main garden, but back slopes accessible via hiking trails). Go early morning. Bring water and sun protection. Trails can be unmarked; consider a local guide. 2-3 hour round trip from top lawns.",c:[],r:"g",nn:"Kirstenbosch Back Slopes",ns:"Laderas de fynbos protegido con proteáceas silvestres y vistas del Atlántico",nst:"Pendientes empinadas con fynbos auténtico—proteas, ericas, árboles plateados—sin caminos marcados; silencio profundo; vistas de Table Mountain a False Bay.",nt:"Entrada Kirstenbosch (requiere entrada, pero laderas accesibles via senderos). Madrugada. Agua y protección solar. Senderos sin marcar; considera guía local. 2-3h round trip."}
,{id:41,n:"Magik Forest — Urban Green Escape",a:"Durbanville",v:["hidden","quiet","free entry","beautiful"],d:60,s:"A series of tree-lined trails winding through a forgotten forest on Durbanville's edge—ferns, streams, silence.",st:"Magik Forest is a pocket of preserved bush bordered by Durbanville, Bellville, and Welgemoed. Few tourists know it exists; even some long-time residents have never heard of it. The trails wind through a tunnel of trees, over footbridges spanning small streams, past ferns and wildflowers. The air is cool and green even on hot days. This isn't a formal park; there are no facilities, vendors, or infrastructure—just forest. The silence is profound, broken only by birds and water. Locals use it for morning walks and evening jogs. It's genuinely free and untouched. The trails loop and connect, allowing different route lengths. On weekends, you might see a handful of people; on weekdays, you're often alone.",im:"Tall trees form a green arch over a narrow footbridge spanning a small stream, ferns framing both sides in deep shadow.",t:"From Durbanville, look for the Magik Forest Trail head (minimal signage; ask locals or navigate via GPS). No facilities. Go with water and sun protection. Early morning or late afternoon avoids midday heat. Very peaceful on weekdays.",c:[],r:"g",nn:"Magik Forest",ns:"Bosque olvidado con senderos de árboles, arroyos y silencio profundo",nst:"Bolsillo de bosque preservado; túneles de árboles, puentes sobre arroyos, helechos; silencio profundo; sin infraestructura turística; rituales de locales al amanecer.",nt:"Desde Durbanville, busca Trail head (señalización mínima; pregunta a locales). Sin facilidades. Agua y protección solar. Madrugada o atardecer evita calor del mediodía."}
,{id:42,n:"Bo-Kaap Back Alleys — Walls as Stories",a:"Bo-Kaap",v:["hidden","culture","free entry","weird"],d:40,s:"Wander the narrow lanes behind the famous rainbow houses where real locals still live and walls tell stories of resistance and reclamation.",st:"Every tourist photographs Bo-Kaap's famous colorful houses on Wale Street. But turn into the back alleys—Dorp, Pentz, Shortmarket—and you enter the living, breathing Bo-Kaap where local families have fought to stay for generations. Here, street art is not curated for photos; it's political, layered, constantly evolving. Murals depict anti-apartheid resistance, African cultural pride, climate activism, and local heroes. Artists paint over tourist-friendly images with provocative statements. The alleyways are narrow, intimate, and full of character. You'll encounter local residents, children playing, the smell of spices from family kitchens, the sound of Arabic and English mixed in conversation. This is the real Bo-Kaap—not the Instagram version.",im:"A narrow alley in shadow, walls covered with layered street art in blues, reds, and yellows, a young local walking past a political mural.",t:"Enter from Wale Street and turn into Dorp, Pentz, or Shortmarket lanes. There's no 'official' route—just wander. Be respectful; this is residential. Support local art by purchasing from street vendors. Visit mid-morning to meet locals. If unsure, book a tour with local guides who explain the real history and meaning.",c:[],r:"g",nn:"Bo-Kaap Back Alleys",ns:"Callejones atrás de las casas arco iris donde locales aún viven y luchan",nst:"Callejones estrechos—Dorp, Pentz, Shortmarket—donde arte político, lucha anti-apartheid, orgullo africano; familias locales que lucharon por quedarse; no curado para turismo.",nt:"Entra desde Wale Street a Dorp, Pentz, o Shortmarket. Sin ruta 'oficial'—solo pasea. Respetuoso; es residencial. Apoya arte local. Madrugada para conocer locales. O tour con guías locales."}
,{id:43,n:"Salt River Estuary — Industrial Beauty and Waterbirds",a:"Salt River",v:["hidden","nature","free entry","quiet"],d:35,s:"A working-class waterfront where herons fish in shallow estuaries and the city's gritty side meets surprising natural beauty.",st:"Salt River is not on the postcard circuit. It's an industrial, working-class neighborhood with a harbor where fishing boats still operate. But the estuary—where the Salt River flows into the Atlantic—is a surprising wetland ecosystem. Herons, egrets, and other wading birds hunt in shallow pools. The water reflects sky and distant mountains. Locals fish here; workers repair boats. There's a rawness and authenticity absent from polished tourist areas. Walk the harbor road at dusk and you see fishermen returning with the day's catch, light hitting the water at angles that photographers dream about. The smell is salt and fish and industrial history. It's gritty, real, and beautiful in an unsentimental way.",im:"A grey heron stands motionless in shallow estuary water, industrial cranes blurred in background, mountain ridge sharp against evening sky.",t:"Take the coastal road from Green Point toward the harbor. Park near the waterfront. Walk the harbor edge at dusk for best light. No facilities, but small shops and cafes nearby. Go midweek to avoid crowds. Bring binoculars for birdwatching.",c:[],r:"g",nn:"Salt River Estuary",ns:"Estuario industrial donde garzas pescan en agua poco profunda",nst:"Vecindario de clase trabajadora; estuario donde río desemboca; humedal con garzas, garzetas; pescadores retornan con captura; luz en ángulos de atardecer; gritería y autenticidad.",nt:"Carretera costera desde Green Point hacia puerto. Estaciona cerca de waterfront. Pasea en atardecer para mejor luz. Sin facilidades, pero tiendas y cafés cerca. Miércoles evita multitudes."}
,{id:44,n:"Milnerton Flea Market — Saturday Morning Ritual",a:"Milnerton",v:["free entry","local","weird","quiet"],d:45,s:"A sprawling Saturday market where locals buy secondhand treasures, vintage vinyl, and street food from neighborhood stallholders.",st:"Every Saturday morning, Milnerton Flea Market springs to life in a parking lot near the beach. It's not Instagram-clean; it's chaotic, packed with locals hunting vintage finds, records, clothing, art, plants, and street food. Vendors are locals—musicians selling records, artists selling prints, families clearing out attics. The energy is authentically local; most attendees are Cape Town residents, not tourists. You'll hear Afrikaans, Xhosa, English, and other languages mixed together. Food vendors sell traditional Cape food, curry, coffee. The market runs roughly 7am-2pm on Saturdays. It's weathered and unpretentious; the opposite of curated tourist markets.",im:"A vendor's stall piled high with vinyl records and vintage posters, Saturday morning sunlight, shoppers browsing intently, the beach visible in the distance.",t:"Go Saturday morning, 7am-2pm. Take the coastal road to Milnerton. Parking is challenging; arrive early or use nearby beach lots. Bring cash; not all vendors take card. Wear comfortable shoes; it's a lot of walking. Bring a bag for treasures. Great for secondhand books, vinyl, clothing, art.",c:[],r:"g",nn:"Milnerton Flea Market",ns:"Mercado de sábado donde locales compran tesoros vintage y discos de vinilo",nst:"Caos organizado; locales buscando vintage, discos, ropa, arte, plantas; vendedores locales; música, ropa, comida callejera tradicional; sábados 7am-2pm; autenticamente local.",nt:"Sábados 7am-2pm. Camino costero a Milnerton. Estacionamiento difícil; llega temprano. Efectivo; no todas tarjetas. Zapatos cómodos. Bolsa para tesoros. Excelente para libros, vinilo, ropa."}
,{id:45,n:"Woodstock Street Art Evolution — Guerrilla Murals and Studios",a:"Woodstock",v:["hidden","culture","weird","free entry"],d:50,s:"Beyond the famous pieces, explore back alleys and active artist studios where street art constantly evolves in response to politics and community.",st:"Woodstock's reputation for street art is well-known, but most tourists see the same 4-5 famous murals. The real story is in the back lanes and side streets where artists constantly paint new work, collaborate on murals, and maintain active studio spaces. The Warehouse district—old factory buildings—now houses artist collectives, galleries, and working studios. You can watch artists at work, see work-in-progress murals, and understand the living creative scene. Street art here isn't static; it evolves, layers, and responds to current events. Galleries are informal; many studios welcome visitors. The neighborhood mixes working-class residents with artists and creative entrepreneurs. Walk slowly; turn into every alley; strike up conversations.",im:"Inside a ground-floor artist studio, spray cans organized on shelves, a half-finished mural visible on the wall behind, a local artist mixing colors.",t:"Start at Main Road Woodstock and explore side streets: Trill, Levis, Victoria. Pop into studios and galleries—most welcome visitors. Visit Thursday-Saturday for maximum artist activity. End with coffee at a local cafe. Go midweek to avoid crowds and have genuine conversations with artists.",c:[],r:"g",nn:"Woodstock Street Art",ns:"Callejones donde artistas pintan murales activos y estudios revelan creatividad contemporánea",nst:"Más allá de piezas famosas; callejones atrás donde artistas colaboran, pintan, mantienen estudios activos; distrito de almacenes ahora colectivos artísticos; arte no es estático.",nt:"Main Road Woodstock, calles laterales: Trill, Levis, Victoria. Entra a estudios y galerías. Jueves-sábado para máxima actividad artística. Café local después. Evita multitudes."}
,{id:46,n:"Signal Hill at Dawn — City Waking Up",a:"Walmer Estate",v:["beautiful","quiet","free entry","hidden"],d:30,s:"Drive up Signal Hill before sunrise, park in the dark, watch the city and Table Mountain emerge from shadow as light spreads across False Bay.",st:"Signal Hill is a short drive from the city center, but almost no tourists make the effort. At night, you drive up a winding road, park, and wait in darkness. Then the sun touches Table Mountain first, turning it rose-gold. The city below is still dark. Gradually, light spreads across False Bay to the east, touching Hottentot's Holland Mountains. The whole 360-degree horizon transforms in minutes. You're alone or with a handful of locals and photographers. The moment before sunrise—the anticipation—is profound. You understand why this city has inspired poets and artists. The wind picks up; the city wakes below. One perfect moment, then the day begins.",im:"Table Mountain silhouetted against a pre-dawn indigo sky with the first touch of rose light on its peak, the city below still in shadow, False Bay luminous.",t:"Drive to Walmer Estate and find Signal Hill Road; park at the summit. Go 15-20 minutes before sunrise (check local times). Bring warm clothes; it's cold at 5am. Go alone or with one other person for the best experience. Bring coffee in a thermos. Stay for breakfast light.",c:[],r:"g",nn:"Signal Hill at Dawn",ns:"Colina donde la ciudad y Table Mountain emergen de sombra al amanecer",nst:"Subida antes de salida del sol; espera en oscuridad; Table Mountain toca con luz oro-rosa primero; ciudad abajo aún oscura; Bahía Falsa se enciende; momento profundo.",nt:"Walmer Estate, Signal Hill Road. 15-20 min antes salida del sol. Ropa abrigada; hace frío a las 5am. Solo u otra persona. Café en termos. Quédate para luz de desayuno."}
,{id:47,n:"Kenilworth Racecourse Trails — Horse Paths Through Estates",a:"Kenilworth",v:["hidden","quiet","nature","free entry"],d:45,s:"Riding trails through tree-lined estates and hidden green lanes where you can experience the mountain slopes as locals do—on horseback.",st:"The Kenilworth Racecourse is known to some, but the extensive trail network through surrounding estates is secret. Stables at Kenilworth offer horse rentals, and the trails wind through tree-lined lanes, past estates and smallholdings, up into the mountain foothills. This is how locals—and their families for generations—have explored these slopes. You ride through quiet green lanes where cars rarely go. The altitude gain offers views across False Bay. The pace is slow; you see birds, plants, stone walls. It's intimate, peaceful, and genuinely local. Many trails are on private property, maintained by the riding community. Non-riders can sometimes join guided walks on the same paths.",im:"A rider on a bay horse moves slowly along a tree-lined lane, mountains rising steeply on one side, estate fences on the other, dappled light.",t:"Kenilworth Stables offer hourly rentals and trail rides. Book in advance. If you can't ride, ask about guided walking trails on estate paths. Early morning or late afternoon rides avoid midday heat. Bring water and sun protection. The trails feel like stepping back in time.",c:[],r:"g",nn:"Kenilworth Racecourse Trails",ns:"Senderos ecuestres a través de fincas y callejones verdes arbolados",nst:"Red de senderos extensos; callejones verdes arbolados; vistas False Bay; velocidad lenta; pájaros, plantas, muros de piedra; íntimo, tranquilo, genuinamente local.",nt:"Establos ofrecen alquiler horario y paseos guiados. Reserva anticipada. Si no montas, pregunta por caminatas guiadas. Madrugada o atardecer evita calor. Agua y protección solar."}
,{id:48,n:"Zeitz MOCAA Hidden Walkways — Architecture and Views",a:"Silo District",v:["hidden","history","beautiful","weird"],d:60,s:"Beyond the famous museum, climb hidden stairways and walkways on the historic grain silo offering unexpected perspectives and architectural storytelling.",st:"Everyone visits the Zeitz Museum of Contemporary Art, housed in a converted grain silo. But few venture beyond the gallery spaces to explore the hidden walkways and stairways that wind through the structure. These passages, cut through the silo's 57 meters of stacked grain tubes, reveal the building's industrial history. You emerge onto narrow walkways high above the waterfront, seeing harbor views from unexpected angles. The architecture is raw, honest, beautiful—concrete, metal, light. Former grain chutes become light tunnels. The scale is overwhelming. This feels like exploring a cathedral made of industry. The museum admission includes access, but these passages are rarely crowded. It's a different experience from the exhibition halls.",im:"A narrow concrete walkway cut through the silo's interior, industrial beams visible, harbor light streaming through an aperture, a solitary figure standing in shadow.",t:"Visit the Zeitz MOCAA (museum admission required). Ask staff about accessing the walkways—not everyone knows they're open to visitors. Go midweek morning for solitude. The walkways are not wheelchair accessible in all areas. Bring comfortable shoes; there's a lot of stairs. The experience is worth the effort.",c:[],r:"g",nn:"Zeitz MOCAA Walkways",ns:"Pasarelas escondidas en el silo historic revelando vistas y historia industrial",nst:"Pasajes cortados a través de 57m de tubos de grano apilados; revelan historia industrial; vistas puerto desde ángulos inesperados; arquitectura honesta; como catedral industrial.",nt:"Zeitz MOCAA (entrada museo requerida). Pregunta staff sobre pasarelas. Miércoles madrugada para soledad. No totalmente accesible en sillas ruedas. Zapatos cómodos; muchas escaleras."}
,{id:49,n:"Muizenberg Back Beach — Surfer's Secret Stretch",a:"Muizenberg",v:["hidden","quiet","beautiful","free entry"],d:40,s:"South of the famous rainbow beach huts lies a quieter stretch of sand where surfers gather at dawn and the break peels off without crowds.",st:"Muizenberg is famous for its colorful Victorian beach huts, but turn south from that tourist area and you find a different beach. This stretch—quieter, less photographed, working-class in character—is where the real surfers gather at dawn. The break here is consistent and manageable; the water feels genuinely local. You'll see surfers of all ages—teenagers learning, adults reclaiming their relationship with the ocean, older locals who've been riding these waves for decades. There's a cafe culture here too; small coffee spots and chip shops where surfers grab breakfast before or after sessions. The beach feels lived-in, not performed for cameras. The light at dawn is extraordinary—the sun touches the water at an angle that creates perfect conditions for photography and soul-searching.",im:"A surfer paddles out into the early morning Atlantic light, the face of the wave catching pink dawn light, beach huts blurred in the distance.",t:"Park beyond the main Muizenberg Beach area, toward the southern end. Arrive early (5:30am) to see the dawn surfers and experience the water's energy. Bring a warm jacket; it's cold before sunrise. Grab coffee from a local spot. The experience is free; the community is welcoming if you're respectful.",c:[],r:"g",nn:"Muizenberg Back Beach",ns:"Playa tranquila donde surfers se reúnen al amanecer sin multitudes",nst:"Al sur del área turística; menos fotografiada; carácter clase trabajadora; break consistente; surfers de todas edades; café local; luz de amanecer extraordinaria.",nt:"Estaciona sur de Muizenberg Beach. Llega temprano (5:30am). Ropa abrigada; frío antes de salida. Café local. Experiencia libre; comunidad acogedora si respetuoso."}
,{id:50,n:"Iziko South African Museum Curio Rooms — Cabinet of Curiosities",a:"Company's Garden",v:["hidden","history","weird","quiet"],d:45,s:"Skip the main galleries and explore the museum's forgotten back rooms where colonial-era artifacts and curiosities fill glass cabinets like a Victorian naturalist's dream.",st:"The Iziko South African Museum is well-known, but most visitors follow the main exhibition route. But push through doors and you find back rooms filled with display cases of colonial-era curiosities, botanical specimens, zoological collections, and artifacts never formally catalogued. It's like stepping into a Victorian naturalist's curiosity cabinet. Glass cases hold taxidermied birds, pressed plants, colonial coins, sketches. The lighting is dim; dust motes float through rays of light. These rooms exist in a strange time warp—preserved, rarely updated, barely visited. The smell is old paper, wood, and preservation chemicals. It's unsettling and fascinating—a window into how colonizers saw and hoarded the natural world.",im:"Inside a glass cabinet: taxidermied birds, pressed plant specimens, colonial artifacts arranged in careful rows, dim museum light creating shadows.",t:"Enter the main museum. Ask staff politely about back collection rooms (they may require a staff member present). Go on weekday mornings when crowds are thin. These rooms are not officially on the main tour; be respectful. The experience reveals colonial history unfiltered.",c:[],r:"g",nn:"Iziko South African Museum Curio Rooms",ns:"Salas atrás donde reliquias coloniales y curiosidades llenan vidrieras como gabinete de naturalista victoriano",nst:"Salas atrás; casos de vidrio con pájaros disecados, especímenes prensados, monedas coloniales, bocetos; luz tenue; polvo; olor papel viejo; ventana a historia colonial sin filtrar.",nt:"Pregunta staff educadamente. Miércoles madrugada. Respeta; no oficialmente en tour. Revela historia colonial sin filtrar."}
)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Cape Town Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Cape Town Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
