<script>
const P = [{id:1,n:"Robben Island — Prison and Resistance",a:"Robben Island (Ferry)",v:["history","hidden","sacred"],d:45,s:"A UNESCO World Heritage site and former political prison where Nelson Mandela spent 18 of 27 years imprisoned, now a museum of resistance and freedom.",st:"Robben Island exists in humanity's collective consciousness as a symbol of oppression overcome through resistance. For nearly four centuries—from the 1600s onward—the island served as a place of exile and imprisonment. Political prisoners, including Nelson Mandela (imprisoned 1962-1982), were held in harsh conditions in single cells. Mandela labored in the limestone quarry; the dust damaged his lungs permanently. Other famous prisoners include Walter Sisulu, Ahmed Kathrada, and countless anti-apartheid activists. The island also held lepers and the mentally ill. Visiting the island is an emotional experience: seeing Mandela's small cell, the quarry where political prisoners labored, the cramped prison facilities. Former political prisoners and guards now lead tours, offering personal testimony. The island represents both the brutality of apartheid and the triumph of the human spirit through resistance.",im:"A visitor stands in a small prison cell, barely wider than the prisoner's extended arms, the walls austere, light minimal, the quarry visible through a window.",t:"Accessible by ferry from the V&A Waterfront (45 minutes). Tours include ferry, guided tour, and museum visit (4-5 hours total). Booking in advance essential. Tours led by former prisoners and staff are most powerful. Go with respectful intention. Weather can be rough; bring warm clothes.",c:[],r:"g",nn:"Robben Island",ns:"Sitio patrimonio donde Mandela fue encarcelado 18 de 27 años",nst:"Cuatro siglos de encarcelamiento político; símbolo de opresión y resistencia; tours guiados por ex-prisioneros ofrecen testimonio personal transformador.",nt:"Ferry desde V&A Waterfront (45 min). Paseos incluyen ferry, guía, museo (4-5h). Reserva anticipada esencial. Guías ex-prisioneros. Clima áspero; ropa abrigada."},{id:2,n:"Table Mountain — Iconic Landmark",a:"Table Mountain",v:["nature","views","beautiful"],d:45,s:"A flat-topped mountain 1,086 meters high dominating Cape Town's landscape, accessible by cable car offering 360-degree views of city and coastline.",st:"Table Mountain rises dramatically from the Cape Town landscape, visible from nearly every vantage point in the city. The mountain is home to unique fynbos vegetation found nowhere else on Earth—a biodiversity hotspot with thousands of plant species. Ascending by cable car takes 8 minutes; ascending by foot takes 1-2 hours depending on trail. The cable car rotates 360 degrees during ascent, offering changing perspectives. From the top, Cape Town spreads below: the Twelve Apostles mountain range, the city grid, the Atlantic and Indian Ocean meeting, Robben Island in the distance. The mountain is sacred to indigenous Khoi people; respecting this significance enhances the experience. Clear days offer views 60km in all directions; cloudy days create mysterious atmospheres.",im:"The cable car ascends toward the flat summit as Cape Town miniaturizes below, the city's lights visible if ascending at dusk, the mountain's edges dropping sheer to the landscape below.",t:"Cable car from the base on Table Mountain Road (6 minutes from city center by car). Admission required. Hours vary by season. Rotating cable car offers optimal views. Go early for clear visibility; afternoon clouds often obscure views. Hiking trails available but require preparation. Respect the mountain as sacred to Khoi people.",c:[],r:"g",nn:"Table Mountain",ns:"Montaña de 1086m que domina paisaje de Ciudad del Cabo",nst:"Montaña icónica ascendible por teleférico (8 min) u senderismo (1-2h); sagrada para pueblos Khoi; biodiversidad única de plantas fynbos.",nt:"Teleférico desde Table Mountain Road. Entrada requerida. Horas varían por estación. Vistas a 60km en días claros. Respete como sagrado para Khoi."},{id:3,n:"District Six Museum — Apartheid Dispossession",a:"District Six",v:["history","culture","hidden"],d:35,s:"A museum documenting the forced removals of 60,000 residents from the vibrant District Six neighborhood during apartheid, preserved through community memory.",st:"District Six was once Cape Town's most vibrant, multicultural neighborhood—home to jazz clubs, restaurants, temples, mosques, and a thriving community of mixed-race, Indian, and Black residents. In 1966, the apartheid government declared District Six a 'white' area and forcibly removed all non-white residents. Families were given days to leave; homes were demolished; a community was erased from the map. Today, the area remains largely empty despite being 'white' under apartheid—a ghost of removed community. The museum, housed in a converted church and adjoining building, preserves memory through artifacts, photographs, personal testimonies, and interactive exhibits. Former residents share stories of their lost homes, the sense of belonging, and the ongoing trauma of dispossession. The museum is not academic but deeply emotional, centered on community recovery and justice.",im:"A large photograph shows a vibrant street scene from District Six before demolition: storefronts, pedestrians, the energy of a living community, now lost.",t:"Located in District Six area. Admission required (modest cost). Open Mondays-Saturdays, closed Sundays. Allow 1-2 hours. Many exhibits feature personal testimony from former residents. Emotional experience; allow space for feelings. The museum prioritizes community voices. Go with respectful intention.",c:[],r:"g",nn:"District Six Museum",ns:"Museo documentando expulsiones forzadas de apartheid",nst:"60,000 residentes fueron expulsados en 1966 de vecindario vibrante y multicultural; museo preserva memoria comunitaria y testimonio personal.",nt:"Ubicado en District Six. Entrada requerida (modesta). Lunes-sábados, cerrado domingos. Permita 1-2 horas. Testimonios personales. Experiencia emocional. Intención respetuosa."},{id:4,n:"Cape Point and Cape of Good Hope — Geographic Extremity",a:"Cape Point",v:["nature","views","beautiful"],d:45,s:"The meeting point of the Atlantic and Indian Oceans at the southern tip of Africa, accessible by scenic drive through a national park with dramatic cliffs and wildlife.",st:"Cape Point represents a geographical extremity: not the southernmost point of Africa (that's Cape Agulhas), but the dramatic meeting of two oceans creating treacherous waters. Sailors feared Cape Point for centuries; the dramatic cliffs, powerful currents, and sudden storms made navigation hazardous. Portuguese explorers, rounding the Cape seeking a sea route to Asia, called it the 'Cape of Storms' before the name was optimistically changed to 'Cape of Good Hope.' The drive to Cape Point passes through Table Mountain National Park, offering views of fynbos vegetation, grazing wildlife (antelopes, ostrich), and dramatically sculpted landscapes. The lighthouse at Cape Point offers 360-degree views. The ocean below crashes with visible power. Standing at the point, you feel the geography's power: two oceans, two continents (Africa the closest to Asia), the planet's immensity made tangible.",im:"Massive cliffs drop sheer to the ocean where powerful waves crash against rocks, two distinct ocean colors visible where the currents meet, a lighthouse standing sentinel on the point.",t:"Located 60km south of Cape Town in Table Mountain National Park. Accessible by car (1 hour) or organized tour. Admission to park required. The drive is scenic regardless of weather. Wear layers—wind can be intense. The lighthouse offers best views. Bring water and sunscreen. Hiking trails available.",c:[],r:"g",nn:"Cape Point",ns:"Extremidad geográfica donde Océano Atlántico e Índico se encuentran",nst:"Punta extrema; navegantes temían las aguas turbulentas; nombre original 'Cabo de Tormentas' cambió a 'Cabo de Buena Esperanza' optimistamente.",nt:"60km sur de Ciudad del Cabo en Parque Nacional Table Mountain. Accesible por auto (1h) o tour organizado. Entrada al parque requerida. Capas de ropa; viento intenso."},{id:5,n:"Langa Township — Community and Resilience",a:"Langa Township",v:["local","culture","history"],d:35,s:"One of Cape Town's oldest townships, home to 40,000 residents, with rich culture, street art, shebeens (informal bars), and community-led tourism initiatives.",st:"Langa Township was established in 1923 as a residential area for Black African workers. During apartheid, townships were segregated spaces where non-white residents were forced to live, separated from white-majority areas. Langa has a distinct culture: vibrant street art murals, informal economy, churches, shebeens (small bars), restaurants serving traditional food, and tight-knit community bonds forged through shared struggle. The township is not a museum or tourist attraction but a living community. Respectful tourism can support local entrepreneurs. Community guides share stories of struggle, resistance, and contemporary life. Walking the township with a guide, you encounter the resilience of communities that survived apartheid's violence and continue building dignity. The experience challenges stereotypes and reveals the humanity, humor, and strength of township residents.",im:"Colorful murals cover buildings in the township; a vendor sells street food at a corner; children play soccer in a clearing; the community bustles with life and color.",t:"Located 20km southeast of downtown. Best visited with a registered community guide or tour operator (not alone). Allow 2-3 hours. Respect privacy; ask before photographing residents. Support local businesses. Guides may show you shebeens, street vendors, churches, and homes. Go with open mind and genuine interest.",c:[],r:"g",nn:"Langa Township",ns:"Municipio antiguo con 40,000 residentes, arte callejero, y cultura vibrante",nst:"Establecido en 1923 para trabajadores africanos; durante apartheid fue espacio segregado; hoy comunidad resiliente con cultura vibrante.",nt:"20km sureste de centro. Mejor con guía comunitario registrado. Permita 2-3 horas. Respete privacidad. Pregunte antes de fotografiar. Apoye negocios locales."},{id:6,n:"Khayelitsha Township — South Africa's Largest Township",a:"Khayelitsha",v:["local","culture","hidden"],d:40,s:"South Africa's largest township with 400,000+ residents, created during apartheid's forced removals, now a thriving community with markets, culture, and resilience.",st:"Khayelitsha ('New Home' in Xhosa) was created in 1985 when the apartheid government forcibly removed residents from other areas and relocated them to this distant township. The name reflects both hope and irony—a 'new home' created through violence. Today, Khayelitsha is South Africa's largest township with over 400,000 residents. The community includes formal housing, informal settlements, a vibrant economy, markets, churches, and cultural organizations. Walking through Khayelitsha with a community guide reveals the complexity of township life: poverty and entrepreneurship existing together, tight community bonds, street entrepreneurs selling everything from clothing to food, graffiti art documenting community identity. The experience challenges stereotypes about poverty and reveals agency, creativity, and resilience. Supporting community-led tourism initiatives ensures tourism benefits residents directly.",im:"A market street bustles with vendors selling clothing, food, and goods; storefronts advertise services; the street packed with life and commerce; colorful awnings providing shade.",t:"Located 35km south of downtown (45 minutes by car). Visit only with registered community guide or tour operator. Allow 2-3 hours. Markets and community activities most vibrant mid-week and Saturday mornings. Respect residents' privacy. Support local guides and businesses. Photography only with permission.",c:[],r:"g",nn:"Khayelitsha Township",ns:"Municipio más grande de Sudáfrica con 400,000+ residentes",nst:"Creado en 1985 por expulsiones forzadas del apartheid; hoy comunidad próspera con mercados, cultura, y resiliencia de 400,000 personas.",nt:"35km sur de centro (45 min auto). Solo con guía comunitario registrado. Permita 2-3 horas. Mercados vibrantes miércoles-sábado mañana. Respete privacidad. Apoye locales."},{id:7,n:"Victoria & Alfred Waterfront — Modern Cape Town",a:"V&A Waterfront",v:["architecture","food","local"],d:30,s:"A working harbor and shopping destination with restaurants, markets, shops, and ferry terminals offering waterfront dining and entertainment.",st:"The V&A Waterfront (Victoria & Alfred Waterfront) represents contemporary Cape Town: a working harbor transformed into an entertainment destination. The harbor retains working fishing boats, but now surrounded by upscale restaurants, shops, and attractions. The waterfront is popular with both tourists and locals: people dining overlooking the water, shopping, taking ferries to Robben Island, watching buskers perform. The location offers stunning views of Table Mountain and the city. The transformation reflects broader patterns of waterfront gentrification—revitalizing deteriorated areas but pricing out working-class residents. The waterfront is undeniably beautiful and vibrant, but represents wealth concentration. It's a complex space: tourist destination, working harbor, symbol of modern South Africa.",im:"Upscale restaurants line the waterfront with diners enjoying meals overlooking the harbor; fishing boats dock alongside yachts; Table Mountain glows at sunset.",t:"Located in central Cape Town adjacent to downtown. Easily accessible by foot or short drive. Admission free to waterfront areas; individual shops and restaurants charge. Open year-round. Very safe during daytime and early evening. Restaurants range from casual to high-end. Go at sunset for best light and atmosphere.",c:[],r:"g",nn:"Victoria & Alfred Waterfront",ns:"Puerto de trabajo y destino de compras con restaurantes y entretenimiento",nst:"Puerto revitalizado con restaurantes y tiendas; refleja gentrificación waterfront y concentración de riqueza en Sudáfrica.",nt:"Centro Ciudad del Cabo adyacente a centro. Fácil acceso. Entrada gratuita áreas públicas. Abierto todo año. Seguro día y tarde temprana. Restaurantes variados."},{id:8,n:"South African Museum — Culture and Natural History",a:"The Company's Garden",v:["history","culture","art"],d:40,s:"A museum documenting South African natural history, indigenous peoples (San and Khoi), and contemporary culture, often with critical perspective on colonialism.",st:"The South African Museum situates South Africa within global history: the earliest human inhabitants were the San people (hunter-gatherers) and Khoi people (pastoralists); later, Bantu peoples migrated south; Portuguese explorers arrived in 1488; colonization and conquest followed. The museum's exhibits address difficult histories: the indigenous genocide, slavery, colonialism, and apartheid. Many contemporary museums are reassessing how they present history—challenging colonial narratives that erased or demonized indigenous peoples. The SAM's collections include San rock art reproductions, early colonial artifacts, ethnographic materials from diverse South African cultures, and contemporary installations addressing social issues. The museum sits in the Company's Garden, a space with its own colonial history—originally established to supply Dutch East India Company ships.",im:"A gallery displays San rock art reproductions—ochre handprints, animals, and abstract designs—surrounded by interpretive text explaining spiritual beliefs.",t:"Located in the Company's Garden in downtown Cape Town. Admission required (modest cost). Open daily. Allow 2-3 hours. Many exhibits address difficult histories respectfully. The gardens surrounding are pleasant. Thoughtful visitor engagement deepens understanding.",c:[],r:"g",nn:"South African Museum",ns:"Museo de historia natural y culturas de pueblo de Sudáfrica",nst:"Documenta pueblos San y Khoi originales, migración Bantu, colonialismo, apartheid; perspectiva crítica sobre narrativas coloniales.",nt:"Jardín de la Compañía en centro. Entrada requerida (modesta). Abierto diariamente. Permita 2-3 horas. Exhibiciones abordan historias difíciles. Jardines agradables."},{id:9,n:"Castle of Good Hope — Fortress of Control",a:"The Castle",v:["history","architecture","hidden"],d:30,s:"A 17th-century fortress built by the Dutch East India Company, the oldest building in South Africa, representing European colonial power and control.",st:"The Castle of Good Hope, built 1666-1679, is South Africa's oldest building. The fortress was constructed to control the Cape, project power, and protect Dutch East India Company interests. The castle's thick stone walls, towers, and garrison housed military personnel, supplies, and weaponry. The castle also contained dungeons where enslaved people, political prisoners, and prisoners of war were held. Walking the castle grounds, you encounter both architectural achievement and historical violence. Museums within the castle document military history, but also increasingly address the enslaved and imprisoned people. The castle represents the beginnings of colonialism that would devastate indigenous peoples and introduce slavery. Today it's a functioning museum and historical site, though its history of violence remains.",im:"The fortress's thick stone walls rise from a moat, the pentagonal design visible from above, cannons positioned on ramparts, the flags of colonial powers flying.",t:"Located in downtown Cape Town. Walking distance from center or short taxi ride. Admission required (modest cost). Open daily. Allow 1-2 hours. The fortress's architecture is impressive. Museums address military history and increasingly colonial violence. The setting remains imposing.",c:[],r:"g",nn:"Castle of Good Hope",ns:"Fortaleza de 1666 que representa poder colonial europeo",nst:"Edificio más antiguo de Sudáfrica; construido para controlar Cabo, alojó prisioneros y esclavizados; arquitectura impresionante pero historia de violencia.",nt:"Centro Ciudad del Cabo. Caminata desde centro o taxi corto. Entrada requerida (modesta). Abierto diariamente. Permita 1-2 horas. Arquitectura impresionante. Museos abordan violencia."},{id:10,n:"Constantia Valley — Wine Region",a:"Constantia",v:["nature","food","beautiful"],d:45,s:"Cape Town's primary wine region with vineyards dating to the 1680s, wine estates, restaurants, and mountain scenery.",st:"The Constantia Valley, about 30km south of downtown, is South Africa's oldest wine region. Vines were planted here in the 1680s by early Dutch settlers. The valley's climate and soil create excellent conditions for viticulture. Modern Constantia includes dozens of wine estates—from historic properties producing world-class wines to newer ventures. Visiting involves driving through vineyards, visiting wine tasting rooms, enjoying meals at estate restaurants, and experiencing the rural landscape that contrasts sharply with urban Cape Town. The experience reflects both South African winemaking excellence and historical complicity: many estates were built on enslaved labor; some newer estates address this history while others remain silent. Wine tourism can be elegant but also reflects class and racial divisions in contemporary South Africa.",im:"Vineyards stretch across rolling hills with Table Mountain visible in the distance; a tasting room overlooks the vines; visitors swirl and sip wine.",t:"Located 30km south of downtown (30-45 minutes by car). Most easily visited by organized wine tour or rental car. Many estates offer tastings (often with fee waived with purchase). Restaurants range from casual to high-end. Go mid-week to avoid crowds. Respect the working landscape.",c:[],r:"g",nn:"Constantia Valley",ns:"Región vinícola antigua desde 1680s con viñedos y bodegas",nst:"Región vinífera más antigua de Sudáfrica; viñedos desde 1680; refleja excelencia vitícola y complicidad histórica con trabajo esclavizado.",nt:"30km sur de centro (30-45 min auto). Tours de vino organizado o auto alquilado. Muchas bodegas ofrecen catas (con tarifa eliminada con compra). Restaurantes variados."},{id:11,n:"Camps Bay Beach — Affluent Beach Town",a:"Camps Bay",v:["beautiful","local","views"],d:30,s:"An upscale beach neighborhood with white sand, turquoise water, palm trees, and the dramatic Twelve Apostles mountains as a backdrop.",st:"Camps Bay is Cape Town's most picturesque beach: white sand, turquoise Atlantic water, and the Twelve Apostles mountain range rising dramatically behind. The neighborhood is affluent and popular with tourists. The beachfront promenade has excellent restaurants, cafés, and bars. The atmosphere is relaxed and sophisticated. Walking along the beach offers views of Table Mountain to one side and the Twelve Apostles to the other. The water is cold (Atlantic coast even in summer), but swimmers brave it. Sunset at Camps Bay is iconic—the light turning the mountains gold and orange. The neighborhood represents wealth and beauty but also class disparities visible in South African context.",im:"The Twelve Apostles mountains rise behind a pristine beach where swimmers play in turquoise water, palm trees frame the scene, sunset light turning mountains orange.",t:"Located on the Atlantic Coast, 15 minutes from downtown by car. Easily accessible by taxi or organized tour. Free beach access. Restaurants and cafés throughout. Swimming possible but water is cold year-round. Go in summer (December-February) for warmth. Sunset is best light.",c:[],r:"g",nn:"Camps Bay Beach",ns:"Playa de barrio opulento con arena blanca y montañas dramáticas",nst:"Playa más pintoresca de Ciudad del Cabo; montañas Twelve Apostles dramáticas; agua turquesa; atmósfera lujosa pero reflejando disparidades de clase.",nt:"Costa Atlántica, 15 min de centro en auto. Acceso playa gratuito. Restaurantes y cafés. Nado posible pero agua fría todo año. Verano mejor. Atardecer es luz ideal."},{id:12,n:"Boulders Beach — Penguin Colony",a:"Simon's Town",v:["nature","hidden","beautiful"],d:35,s:"A small beach protected by massive boulders, home to a penguin colony where African penguins nest and swim.",st:"Boulders Beach, near Simon's Town, is one of South Africa's most charming destinations. The beach is small and protected by massive granite boulders. Most remarkably, the beach is home to a breeding colony of African penguins—the only penguin species found on the African continent. In the 1980s, only two breeding pairs remained; through conservation efforts, the population has grown to nearly 3,000 birds. Visitors can walk paths among the boulders, observing penguins nesting, waddling, and swimming. The penguins are habituated to humans and unconcerned with observers. Watching penguins dive into the water, chase fish, and return to shore offers intimate wildlife experience. The beach itself is beautiful: white sand, turquoise water, and the characteristic Cape landscape. This is one of the few places on Earth where you can see wild penguins in Africa.",im:"African penguins waddle along the beach and dive into turquoise water near massive granite boulders, tourists observing from designated pathways.",t:"Located 25km south in Simon's Town (30-40 minutes from downtown by car). Admission required (modest cost). Open daily. Allow 1-2 hours. The penguin colony is the main attraction. Go early to avoid crowds. The beach is pristine and photogenic. Bring binoculars for better penguin observation.",c:[],r:"g",nn:"Boulders Beach",ns:"Playa pequeña con colonia de pingüinos africanos",nst:"Colonia de reproducción de pingüinos africanos (única especie africana); 3000 pájaros habituados a humanos; experiencia de vida silvestre íntima.",nt:"Simon's Town, 25km sur (30-40 min auto). Entrada requerida (modesta). Abierto diariamente. Permita 1-2 horas. Colonia pingüino es atracción principal. Temprano para multitudes."},{id:13,n:"Twelve Apostles Mountain Range — Scenic Backdrop",a:"Atlantic Seaboard",v:["nature","views","beautiful"],d:30,s:"A dramatic mountain range running parallel to Cape Town's Atlantic coast, with hiking trails offering panoramic views of the mountains and ocean.",st:"The Twelve Apostles is a mountain range running 10km along the Atlantic coast with 12 distinctive peaks (though counting them differs depending on perspective). The mountains are visible from numerous locations across Cape Town but are best experienced on hiking trails that offer intimate engagement with the landscape. Hiking trails range from easy coastal walks to challenging mountain climbs. The mountains rise steeply from the water, creating dramatic profiles. The fynbos vegetation clings to slopes; from higher elevations, views encompass both the Atlantic Ocean and the African mainland. On clear days, the views are extraordinary; cloudy days create mysterious atmospheres. The Apostles represent the drama and beauty of Cape Town's geography.",im:"Twelve rocky peaks rise steeply from the ocean, the Atlantic waves crashing at their base, clouds occasionally obscuring the summits, the mountain faces dramatic and sculptured.",t:"Visible from multiple locations; best experienced via hiking trails near Camps Bay or Llandudno. Various trailheads accessible by car. Trails range 2-6 hours depending on route. Start early to complete hikes before afternoon. Bring water, sunscreen, and good shoes. Weather can change rapidly. The views reward effort.",c:[],r:"g",nn:"Twelve Apostles Mountain Range",ns:"Cadena montañosa de 10km con 12 picos distintivos",nst:"Picos dramáticos sobre océano Atlántico; vegetación fynbos; vistas desde elevación abarcan océano y tierra africana.",nt:"Visible desde múltiples ubicaciones; mejor en senderos de senderismo. Varios inicios de caminos. Senderos 2-6 horas. Temprano para completar antes tarde. Agua, protector, calzado."},{id:14,n:"Slave Lodge Museum — Enslaved Histories",a:"The Castle",v:["history","hidden","culture"],d:30,s:"A museum documenting the lives and experiences of enslaved people in the Cape, housed in a building that was part of the Castle complex.",st:"The Slave Lodge Museum preserves the histories of the estimated 60,000+ enslaved people brought to the Cape between 1652 and 1833. The building was originally the lodging place for enslaved domestic servants of the Dutch East India Company. The museum's exhibits move chronologically and thematically: the capture and forced journey across the ocean; labor and living conditions; resistance and escape; the impact of slavery on family structures; and the legal end of slavery in 1833. The museum centers on the experiences and perspectives of enslaved people—their resilience, resistance, love, and humanity—often erased from colonial narratives. The museum's work contributes to recovering suppressed histories essential to understanding South Africa. The emotional weight of confronting slavery's violence and the enslaved people's humanity is profound.",im:"Shackles, chains, and artifacts of enslavement are displayed alongside personal objects—combs, beads, toys—that reveal the humanity of enslaved people.",t:"Located near the Castle in downtown Cape Town. Admission required (modest cost). Open daily. Allow 1-2 hours. The museum prioritizes enslaved people's perspectives. Emotional experience. Many contemporary visitors find engagement with slavery histories transformative.",c:[],r:"g",nn:"Slave Lodge Museum",ns:"Museo documentando vidas de pueblos esclavizados en Cabo",nst:"60,000+ personas esclavizadas traídas 1652-1833; museo preserva sus historias, resistencia, y humanidad a menudo borradas de narrativas.",nt:"Cerca Castle en centro. Entrada requerida (modesta). Abierto diariamente. Permita 1-2 horas. Perspectivas de pueblos esclavizados. Experiencia emocional."},{id:15,n:"Kirstenbosch National Botanical Garden — Garden and Picnic Destination",a:"Kirstenbosch",v:["nature","beautiful","food"],d:45,s:"A 36-hectare botanical garden on the slopes of Table Mountain showcasing South African flora, with picnic areas, walking trails, and summer sunset concerts.",st:"Kirstenbosch, established in 1913, is one of the world's most beautiful botanical gardens. The garden sits on Table Mountain's eastern slopes with views across the city and beyond. Rather than exotic plants, Kirstenbosch focuses exclusively on South African flora—documenting the incredible diversity of the country's botanical heritage. The gardens range from lush forest sections to fynbos-dominated areas to succulents and grasslands. Walking trails crisscross the garden; visitors can spend hours exploring. The garden is particularly popular for picnicking: locals bring blankets, food, and drinks, spending afternoons on the grass. In summer, the Picnic Concerts series hosts live music performances on the lawn. The experience is leisurely, social, and deeply connected to South African landscape and culture.",im:"Picnickers sprawl on grass with Table Mountain rising behind, a musician performing on a stage, the garden's varied plantings in bloom, the summer light golden.",t:"Located on Table Mountain's eastern slopes, 10-15 minutes from downtown by car. Admission required (modest cost). Open daily. Allow 2-4 hours minimum. Picnic culture is central; bring food/blankets. Summer sunset concerts are popular. The garden is crowded on weekends. Go midweek for more peaceful experience. Excellent walking trails.",c:[],r:"g",nn:"Kirstenbosch National Botanical Garden",ns:"Jardín de 36 hectáreas con flora sudafricana única",nst:"Jardín enfocado exclusivamente en flora sudafricana; piknics en verano con conciertos; experiencia social conectada a paisaje sudafricano.",nt:"Laderas Table Mountain, 10-15 min de centro. Entrada requerida (modesta). Abierto diariamente. Permita 2-4 horas. Cultura picnic central. Conciertos verano. Fin de semana concurrido."},{id:16,n:"Bo-Kaap Neighborhood — Colorful Streets and Culture",a:"Bo-Kaap",v:["culture","architecture","local"],d:25,s:"A historic neighborhood with colorful townhouses, Muslim heritage, street art, galleries, and restaurants representing Cape Malay culture and identity.",st:"The Bo-Kaap ('above the Cape') neighborhood is defined by its colorful historic townhouses painted in vibrant hues—blues, yellows, pinks, greens. The neighborhood is predominantly Muslim, reflecting Cape Malay heritage dating to the 17th century when enslaved and political prisoners from Southeast Asia were brought to the Cape. The Bo-Kaap has a distinct cultural identity: mosques, Cape Malay food, Qur'anic schools, and tight community bonds. Street art murals celebrate local heroes and cultural pride. The neighborhood is gentrifying; rising rents threaten long-term residents. Walking the Bo-Kaap's steep streets offers cultural immersion: the sights, sounds, and smells of Cape Malay culture. The neighborhood represents South Africa's multicultural heritage and contemporary tensions around gentrification and cultural preservation.",im:"A steep street lined with colorful townhouses in contrasting colors; murals celebrate local heritage; shops and cafés spill onto sidewalks; the vibrant street bustles with life.",t:"Located above downtown Cape Town. Walk from downtown (steep climb) or take short taxi ride. Admission free to streets and neighborhood. Numerous galleries, cafés, and restaurants. Go early in day to avoid afternoon heat from climbing streets. Photography is usually welcome but ask permission for portraits.",c:[],r:"g",nn:"Bo-Kaap Neighborhood",ns:"Barrio con casas coloridas y herencia cultural musulmana",nst:"Casas pintadas vibrantemente; herencia Cape Malay desde siglo XVII; gentrificación amenaza residentes históricos; identidad cultural distinta.",nt:"Arriba de centro Ciudad del Cabo. Caminata desde centro (subida empinada) o taxi. Entrada gratuita. Galerías, cafés, restaurantes numerosos. Temprano para calor. Fotografía bienvenida."},{id:17,n:"Company's Garden — Historic Public Space",a:"Company's Garden",v:["history","nature","hidden"],d:20,s:"A historic garden in downtown Cape Town originally planted by the Dutch East India Company to supply ships, now a public space with museums and heritage.",st:"The Company's Garden, established 1652, was created to supply fresh produce to ships of the Dutch East India Company. The garden's establishment marked the beginning of European colonization and violence against indigenous peoples. Today the garden remains a public space with walking paths, museums, historic monuments, and greenery. The garden's transformation from colonial utility to public heritage site reflects evolving South African identity. Walking through the garden, you pass monuments to colonial and apartheid figures, newer monuments acknowledging indigenous peoples, and structures documenting various historical periods. The garden is a palimpsest of South African history—layered, contradictory, and contested.",im:"A historic garden with formal pathways, museums in colonial buildings, monuments and statues among the vegetation, the urban landscape visible beyond garden boundaries.",t:"Located in downtown Cape Town, easily walkable from most central areas. Admission free to garden; museums charge small fees. Open daily. Allow 1-2 hours to explore. The garden is pleasant for walking despite its complex history. Museums within address history thoughtfully.",c:[],r:"g",nn:"Company's Garden",ns:"Jardín histórico establecido en 1652 por Compañía Holandesa",nst:"Establecido para abastecer barcos; marca inicio colonización y violencia contra pueblos indígenas; hoy espacio público con museos.",nt:"Centro Ciudad del Cabo, caminata desde mayoría áreas. Entrada gratuita jardín; museos con tarifa. Abierto diariamente. Permita 1-2 horas. Agradable para caminar."},{id:18,n:"Imizamo Yethu Township — Community-Based Tourism",a:"Hout Bay",v:["local","culture","hidden"],d:30,s:"A township on Hout Bay's mountainside, home to 10,000 residents, with community-led tourism initiatives offering authentic cultural experiences.",st:"Imizamo Yethu ('Our Efforts' in Xhosa) is a township that grew organically as workers migrated to the Hout Bay area. Unlike some townships, Imizamo Yethu has developed community-based tourism initiatives where residents directly benefit. Community guides lead visitors through the township, explain history and contemporary life, and introduce local entrepreneurs. Visitors might visit a shebeen (informal bar), eat traditional food, see informal businesses, and hear stories of resilience. The initiative represents tourism approached with respect and benefit-sharing: money goes directly to community members rather than external operators. Walking Imizamo Yethu with a community guide is profoundly different from exploitative 'poverty tourism'—you encounter humans with agency, dignity, and humor.",im:"A narrow pathway winds between colorful informal structures; residents greet visitors; a shebeen's interior is intimate; street entrepreneurs display goods.",t:"Located in Hout Bay, 30 minutes south of downtown (30-40 minutes by car or organized tour). Visit only with registered community guide. Allow 2-3 hours. Support community guides and local businesses. Ask permission before photographing. Go with respect and genuine interest.",c:[],r:"g",nn:"Imizamo Yethu Township",ns:"Municipio con iniciativas turísticas dirigidas por comunidad",nst:"Turismo basado en comunidad; guías comunitarios conducen; dinero va directo a residentes; experiencia auténtica con dignidad.",nt:"Hout Bay, 30 min sur de centro. Solo con guía comunitario registrado. Permita 2-3 horas. Apoye guías y negocios locales. Fotografía con permiso. Respeto genuino."},{id:19,n:"Chapman's Peak Drive — Dramatic Coastal Scenic Drive",a:"Chapman's Peak",v:["nature","views","beautiful"],d:45,s:"A spectacular 9km coastal drive carved into cliffs between Hout Bay and Noordhoek, with dramatic ocean views and hiking trail access.",st:"Chapman's Peak Drive, completed in 1922, is one of the world's most scenic coastal drives. The road winds along cliff faces high above the Atlantic Ocean, offering continuous dramatic views. The cliffs rise hundreds of meters; the ocean below crashes against rocks. The drive takes about 20 minutes if you don't stop, but most visitors stop multiple times for photographs and to absorb the landscape. There's a modest toll for the drive. The scenic pullouts allow safe stopping and photography. Hiking trails from the drive offer even closer engagement with the landscape. On clear days, the views are extraordinary; cloudy days create mysterious atmospheres. Chapman's Peak represents the Cape's dramatic geology and power.",im:"A road clings to cliff faces as the Atlantic Ocean drops away thousands of feet below, the coastline receding in curves, the sky massive above.",t:"Located between Hout Bay and Noordhoek (20-30 minutes from downtown by car). Toll required (modest cost). Takes 20 minutes to drive; most people spend 1-2 hours with stops. Multiple pullouts for photography. Hiking trails available. Go on clear day for best views. Safe driving required—narrow road with dramatic drops.",c:[],r:"g",nn:"Chapman's Peak Drive",ns:"Paseo costero de 9km a través acantilados dramáticos",nst:"Completado en 1922, uno de los paseos costeros más escénicos del mundo; acantilados 300+ metros; vistas continuas del Atlántico.",nt:"Entre Hout Bay y Noordhoek (20-30 min de centro). Peaje requerido (modesto). 20 min conducir; mayoría 1-2 horas con paradas. Múltiples miradores. Senderos."},{id:20,n:"Hout Bay Fishing Village — Working Harbor",a:"Hout Bay",v:["local","food","hidden"],d:25,s:"A working fishing village and harbor with fresh fish markets, seafood restaurants, and harbor views in a semi-developed beach suburb.",st:"Hout Bay is a working fishing community, though increasingly gentrified. The harbor bustles with fishing boats, fish markets, and seafood restaurants. The scale is smaller and more authentic than V&A Waterfront, though increasingly touristy. Fresh fish can be purchased directly from fishermen or at restaurants. The harbor is a living marketplace where fish are bought and sold, boats are repaired, and fishing culture persists despite pressure from tourism and environmental changes. The surrounding neighborhood has become more upscale with boutique hotels and restaurants, but the fishing harbor retains working character. Walking through Hout Bay, you encounter both authentic fishing culture and tourism infrastructure.",im:"Fishing boats dock at the harbor while vendors display fresh catch on ice; restaurants overlook the water; mountains rise behind the bay.",t:"Located 30km south of downtown (30-40 minutes by car). Accessible by organized tour or private transport. Free to walk the harbor. Fish markets operate most days. Restaurants range from casual to upscale. Go early morning to see fishing boats unloading catch. The sunset over the bay is beautiful.",c:[],r:"g",nn:"Hout Bay",ns:"Pueblo pesquero de trabajo con mercados de pesca fresca",nst:"Comunidad pesquera viva aunque gentrificada creciente; mercado de pesca, restaurantes de mariscos, cultura de pesca persiste.",nt:"30km sur de centro (30-40 min auto). Accesible por tour u auto. Acceso gratuito puerto. Mercados pescado funcionan mayoría días. Temprano para descargas."},{id:21,n:"Norval Foundation Art Gallery",a:"Steenberg",v:["art","architecture","hidden"],d:30,s:"A contemporary art museum in a converted manor house with African modern and contemporary art collections and an acclaimed restaurant.",st:"The Norval Foundation, opened 2017, showcases contemporary African art in a beautifully designed space in the affluent Steenberg area. The foundation has collected important works by African artists. The building, a converted manor house, maintains historic character while accommodating modern gallery spaces. The foundation's commitment to contemporary African art rather than colonial or apartheid-era art represents a conscious curatorial choice to center African perspectives. The affiliated restaurant is acclaimed. The surrounding Steenberg area is wealthy and somewhat removed from central Cape Town. Visiting involves a journey to the periphery, but the art collection and setting justify the travel.",im:"Contemporary African artwork hangs in a historic manor house converted to gallery; the space is light-filled; the restaurant overlooks gardens.",t:"Located in Steenberg, 20km from downtown (20-30 minutes by car). Admission required (modest cost). Open daily except Mondays. Allow 2-3 hours. The restaurant is excellent for lunch or dinner. The area is quiet and affluent. The art collection is strong.",c:[],r:"g",nn:"Norval Foundation",ns:"Galería de arte contemporáneo africano en casa manor convertida",nst:"Abierto 2017; colecciones de arte africano moderno y contemporáneo; centra perspectivas africanas sobre narrativas coloniales.",nt:"Steenberg, 20km de centro (20-30 min auto). Entrada requerida (modesta). Abierto diariamente excepto lunes. Permita 2-3 horas. Restaurante excelente."},{id:22,n:"Kayaking in Table Bay — Water-Based Perspective",a:"Table Bay",v:["nature","views","hidden"],d:35,s:"Guided kayaking trips in Table Bay offering unique water-level perspectives of Cape Town, Table Mountain, and potentially marine wildlife encounters.",st:"Kayaking in Table Bay offers a different perspective of Cape Town—from the water rather than land. The bay is protected from the Atlantic's worst waves, making it accessible for relatively beginner kayakers. Paddling provides intimate encounters with the landscape: Table Mountain rising from the water, the Harbour Bridge visible, the shoreline revealing buildings and structures from unusual angles. On good days, you might encounter marine life: dolphins, seals, occasionally whales. The experience is physical but meditative, connecting body to water and landscape. Kayaking represents a less common way of engaging with Cape Town's geography.",im:"Kayakers paddle calm water with Table Mountain rising dramatically above, the city skyline visible to one side, the perspective intimate from water level.",t:"Located in Table Bay, accessed from downtown or V&A Waterfront. Guided tours available (2-3 hours). Booking required. Beginner-friendly with guides. Go on calm days for best experience. Bring water and sunscreen. The perspective is rewarding.",c:[],r:"g",nn:"Kayaking en Table Bay",ns:"Tours en kayak ofrecen perspectiva de agua de Ciudad del Cabo",nst:"Desde agua, Table Mountain y puerto se ven diferentemente; encuentros posibles con vida marina; experiencia meditativa e íntima.",nt:"Table Bay desde centro o V&A Waterfront. Tours guiados (2-3h). Reserva requerida. Principiante-amigable. Días calmos. Agua y protector solar."},{id:23,n:"Iziko South African Museum — Indigenous and Colonial Histories",a:"The Company's Garden",v:["history","culture","art"],d:35,s:"A major museum documenting indigenous San and Khoi peoples, colonial contact and colonization, and complex South African histories.",st:"The Iziko South African Museum (housed in the Company's Garden) documents South Africa's histories with particular focus on indigenous peoples. The San people were the earliest inhabitants, living as hunter-gatherers. The Khoi pastoralists arrived later. When Europeans arrived in 1652, they initiated colonization that devastated indigenous populations through violence, disease, and dispossession. The museum's contemporary approach centers indigenous perspectives rather than colonial narratives. Exhibits address indigenous agency, resistance, and cultural continuity despite colonialism's violence. The museum represents important work of decolonizing historical narratives. Walking through the museum contributes to understanding South Africa's foundations and acknowledging indigenous peoples' centrality.",im:"A gallery displays San rock art alongside explanatory text about spiritual beliefs; another exhibit shows tools and weapons of Khoi pastoralists with their cultural context.",t:"Located in Company's Garden downtown. Admission required (modest cost). Open daily. Allow 2-3 hours. The museum is intellectually rigorous and emotionally engaging. Contemporary understanding of indigenous histories informs presentation.",c:[],r:"g",nn:"Iziko South African Museum",ns:"Museo documentando pueblos indígenas San y Khoi",nst:"Centra perspectivas indígenas; abordar violencia colonización, agencia indígena, continuidad cultural a pesar de colonialismo.",nt:"Jardín Compañía centro. Entrada requerida (modesta). Abierto diariamente. Permita 2-3 horas. Riguroso intelectualmente. Históricamente contemporáneo."},{id:24,n:"Muizenberg Beach and Bathing Boxes — Nostalgic Beach Culture",a:"Muizenberg",v:["culture","local","beautiful"],d:30,s:"A historic beach with colorful Victorian-era bathing boxes, vintage pier, and retro beach culture representing earlier era of South African coastal life.",st:"Muizenberg Beach, about 30km south of downtown, is characterized by brightly painted Victorian bathing boxes—small structures where bathers once changed clothes. The boxes, in colors ranging from pink to blue to yellow, create an iconic and photogenic scene. The historic pier extends into the water. The beach culture is nostalgic and retro, representing an earlier era of South African seaside entertainment. The beach itself is long and sandy with reasonably calm water. The area has become trendy for day-trippers, boutique restaurants, and alternative culture. Walking Muizenberg, you encounter both nostalgic vintage charm and contemporary gentrification.",im:"Colorful Victorian bathing boxes line the beach in rows—pink, blue, yellow, green—with bathers and photographers enjoying the nostalgic scene.",t:"Located 30km south of downtown (30-40 minutes by car). Accessible by train from downtown on the scenic coastal line. Free beach access. Restaurants and cafés throughout. The bathing boxes are photogenic any time. Go on weekend for most lively atmosphere. The vintage pier offers different perspectives.",c:[],r:"g",nn:"Muizenberg Beach",ns:"Playa histórica con casetas de baño victorianas coloridas",nst:"Casetas victorianas del siglo XIX en colores brillantes; cultura playa nostálgica y retro; representan era anterior de vida costera.",nt:"30km sur de centro (30-40 min auto). Accesible por tren línea costera escénica. Acceso playa gratuito. Restaurantes y cafés. Fin de semana más animado."},{id:25,n:"Mitchells Plain Neighborhood — Apartheid-Designated Township",a:"Mitchells Plain",v:["history","local","hidden"],d:25,s:"A large township established as a 'Coloured' area under apartheid, now a thriving community with markets, culture, and resilience despite historical trauma.",st:"Mitchells Plain was created by the apartheid government in the 1970s-1980s as a 'Coloured Group Area'—a designated racial zone. The government forced hundreds of thousands of mixed-race residents from other areas to this distant township. The forced removal was traumatic; family and community bonds were severed. Today, Mitchells Plain is South Africa's largest 'Coloured' township with over 600,000 residents. The community has built vibrant culture: markets, restaurants, churches, schools, and social organizations. Walking Mitchells Plain with a community guide reveals resilience despite ongoing challenges: the architectural monotony of original planned township, newer informal structures reflecting organic growth, street life, and community bonds. The experience challenges stereotypes and reveals agency and creativity in building community despite systemic oppression.",im:"A street market bustles with vendors selling clothing, food, and goods; the street crowded with shoppers; colorful shop signs; street life vibrant.",t:"Located southeast of downtown (25-35 minutes by car). Visit only with registered community guide or tour operator. Allow 2-3 hours. Markets most vibrant mid-week and Saturdays. Respect residents' privacy. Photography only with permission. Go with genuine interest and respect.",c:[],r:"g",nn:"Mitchells Plain Township",ns:"Municipio apartheid-designado con 600,000 residentes resilientes",nst:"Creado en 1970s-1980s para expulsar residentes mixtos; trauma histórico; hoy comunidad vibrante con mercados, cultura, resiliencia.",nt:"Sureste de centro (25-35 min auto). Solo con guía comunitario registrado. Permita 2-3 horas. Mercados vibrantesmiércoles/sábado. Privacidad respetuosa."},{id:26,n:"Zeitz MOCAA — Contemporary Art Museum",a:"Silo District",v:["art","architecture","hidden"],d:30,s:"A cutting-edge contemporary art museum in a converted grain elevator silo, showcasing African contemporary art with striking modern architecture.",st:"The Zeitz Museum of Contemporary Art Africa (MOCAA), opened 2017, is housed in a converted grain elevator silo at the V&A Waterfront. The architecture is striking: the cylindrical silo form retained, internally excavated to create dramatic gallery spaces. The museum is dedicated to contemporary African art, particularly work by African artists exploring contemporary social and political issues. The collection and exhibitions are intellectually rigorous. The interior atrium is vast and awe-inspiring. The conversion of industrial structure to cultural institution represents Cape Town's transformation. The museum charges admission but represents important centering of African artistic voices in global art world.",im:"The interior of the grain silo has been excavated, creating a massive atrium with galleries cantilevered into the space, light pouring from above.",t:"Located at V&A Waterfront Silo District. Walking distance from waterfront. Admission required (substantial cost). Open daily except Mondays. Allow 2-3 hours. The architecture itself is worth seeing. Exhibitions are typically excellent. The gift shop is curated. Book tickets in advance.",c:[],r:"g",nn:"Zeitz MOCAA",ns:"Museo de arte contemporáneo africano en silo grain convertido",nst:"Abierto 2017; arquitectura deslumbrante; centrado en arte africano contemporáneo; centros voces artísticas africanas en mundo de arte.",nt:"V&A Waterfront Silo District. Caminata desde cais. Entrada requerida (sustancial). Abierto diariamente excepto lunes. Permita 2-3 horas. Arquitectura vale la pena."},{id:27,n:"Soweto Swing Golf Range — South African Sport",a:"Mitchells Plain",v:["local","hidden"],d:20,s:"A community-based golf driving range providing recreational opportunity and employment in township context, reflecting South African sport and community.",st:"Soweto Swing is a community-based golf range that emerged in Mitchells Plain as a social enterprise. Golf is typically an elite sport in South Africa; this facility makes golf accessible to township residents. The range is a gathering place: people hitting balls, socializing, experiencing sport and recreation. The facility represents entrepreneurship and community building within townships. Visiting Soweto Swing with a community guide offers perspective on how communities create opportunities despite systemic constraints. The experience is humbling and reveals human creativity.",im:"People of various ages hit golf balls at a driving range; the street visible beyond; community gathering around sport.",t:"Located in Mitchells Plain. Visit only with community guide. Allow 1-2 hours. Bring cash to hit balls. The social aspect is as important as the golf. Go with genuine interest in community enterprise.",c:[],r:"g",nn:"Soweto Swing Golf Range",ns:"Rango de golf comunitario en contexto township",nst:"Golf típicamente elite en Sudáfrica; esta instalación lo hace accesible a residentes township; representa emprendimiento comunitario.",nt:"Mitchells Plain. Solo con guía comunitario. Permita 1-2 horas. Traiga efectivo. Aspecto social importante. Interés genuino en empresa comunitaria."},{id:28,n:"Green Point Common — Urban Park and Waterfront",a:"Green Point",v:["nature","views","local"],d:25,s:"An urban park with ocean views, running paths, sports facilities, and public space reflecting contemporary Cape Town's recreational culture.",st:"Green Point Common is a public open space where Cape Town residents gather for recreation: jogging, picnicking, sports, and simply enjoying the outdoors. The park offers ocean views, grass, trees, and a sense of community. The space represents public good—land held for community use rather than private development. The surrounding area has gentrified significantly; the park represents one of the few accessible public spaces. Walking or sitting in Green Point Common, you encounter locals in everyday life: joggers, families, friends socializing. The park's existence reflects ongoing tension in Cape Town between public and private space, access and inequality.",im:"Local residents jog and walk in the park with ocean views beyond; families spread blankets; the space filled with weekend activity.",t:"Located in Green Point near the V&A Waterfront. Walk from waterfront. Free access. Open year-round. Good for casual strolling and people-watching. The ocean views are pleasant. Safe during daylight hours.",c:[],r:"g",nn:"Green Point Common",ns:"Parque urbano con vistas al océano y espacios comunitarios",nst:"Espacio público donde residentes se reúnen para recreación; refleja tensión entre acceso público y gentrificación creciente.",nt:"Green Point cerca V&A Waterfront. Caminata desde cais. Acceso gratuito. Abierto todo año. Buen para paseo casual. Vistas océano agradables."},{id:29,n:"Sunset at Signal Hill — Romantic Overlook",a:"Signal Hill",v:["views","beautiful","romantic"],d:15,s:"A small hill with 360-degree views of Cape Town, particularly beautiful at sunset, offering romantic overlook of the city's lights and mountains.",st:"Signal Hill offers one of Cape Town's most romantic vantage points: 360-degree views of the city, harbor, mountains, and ocean. At sunset, the light transforms the landscape: the sky turning orange and purple, the city lights beginning to twinkle, Table Mountain glowing. The small park at the summit is peaceful and contemplative. It's a popular spot for sunset viewing, so expect company, but the expansive views accommodate many people. The experience is best shared: watching the light change, the city transform from daylight to night, the landscape's majesty revealed from this vantage point.",im:"The sun descends toward the horizon as the city's lights begin to glow; Table Mountain silhouetted against the sky; the harbor twinkling below.",t:"Located on Signal Hill, easily accessible by car or short taxi ride from downtown. Park at summit. Free access. Open until dark. Allow 30-45 minutes for sunset viewing. Bring a light jacket as wind can be present. Photography excellent at sunset.",c:[],r:"g",nn:"Signal Hill",ns:"Colina con vistas 360 grados, especialmente bella al atardecer",nst:"Punto de vista romántico; puesta de sol transforma paisaje: cielo naranja y púrpura, luces ciudad centellean.",nt:"Signal Hill, fácil acceso auto o taxi. Estacionamiento en cumbre. Acceso gratuito. Abierto hasta oscuridad. Chaqueta ligera. Fotografía excelente."},{id:30,n:"Winelands Day Trip — Stellenbosch and Paarl",a:"Winelands (Day Trip)",v:["food","nature","architecture"],d:480,s:"Historic wine towns 50km from Cape Town with wine estates, restaurants, Dutch Cape architecture, and mountain scenery.",st:"The Winelands—particularly Stellenbosch and Paarl—represent South African wine country with a cosmopolitan European feel. The towns have Dutch Cape architecture, wine estates producing world-class wines, upscale restaurants, and luxury accommodations. The landscape is beautiful: vineyards stretching across valleys with mountains framing views. Wine tourism is popular but reflects wealth concentration: wine estates were built on enslaved labor; contemporary wine tourism caters to affluent international visitors. Visiting requires acknowledging both the landscape's beauty and the historical violence underlying the wine economy. The towns themselves are charming; the wine is excellent; the experience is sophisticated but complex in terms of South African history.",im:"Vineyards stretch across rolling hills; a stone wine estate building overlooks vines; outdoor wine tasting area with mountain views beyond.",t:"Located 50km northeast of Cape Town (1 hour by car). Most easily visited by organized wine tour or rental car. Wine tasting at estates typically charged (fee sometimes waived with purchase). Restaurants upscale. Go mid-week to avoid weekend crowds. The drive is scenic.",c:[],r:"g",nn:"Winelands",ns:"Pueblos vinícolas históricos con bodegas y arquitectura Cape Holandesa",nst:"Stellenbosch y Paarl; paisaje hermoso; turismo vinícola refleja concentración riqueza e historia de trabajo esclavizado.",nt:"50km noreste (1h auto). Tours vino organizado u auto alquilado. Cata en bodegas típicamente cobrada. Restaurantes lujosos. Entre semana evita multitud."},{id:31,n:"Signal Hill",s:"Klim na die top vir gratis uitsigte oor die stad en Tafelberg. Perfek vir sonsondergang met parkeerplek naby die kanon. Adres: Signal Hill Rd, Cape Town.",a:"Signal Hill Rd, Green Point, Cape Town",st:"Ek het eendag my fiets soontoe geneem en die hele stad onder my sien uitrol terwyl die son sak. Die wind waai liggies en jy hoor die stad se gedruis ver onder.",im:"Die soutsee-lug meng met die geur van vygies en die son bak die klip warm onder jou voete.",t:"Park by die lower cannon parking area Maandag-Vrydag voor 4pm vir gratis toegang, vermy naweke se drukte.",nst:"Ek het eendag my fiets soontoe geneem en die hele stad onder my sien uitrol terwyl die son sak. Die wind waai liggies en jy hoor die stad se gedruis ver onder.",nt:"Park by die lower cannon parking area Maandag-Vrydag voor 4pm vir g <div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
<div className="mt-5">
<p className="text-xs font-bold mb-2" style={{color:"#888",letterSpacing:"0.08em",textTransform:"uppercase"}}>City Moods</p>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} style={{borderRadius:10,overflow:"hidden",aspectRatio:"2/3",background:"#eee"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>)}</div></div>
