  {id:45,n:"Table Mountain Platteklip Gorge Route — Hike vs Cable Car",a:"Table Mountain",v:["high_spots","scary","beautiful"],d:180,s:"The intense hiking route (Platteklip Gorge) to Table Mountain\'s top—an alternative to the cable car with dramatic views.",st:"Table Mountain can be summited by cable car (touristy) or by hiking Platteklip Gorge (intense). Platteklip is a 2.5-hour scramble: steep, rocky, exposed, with chains for sections. The reward is standing on top having earned it, and the hike itself offers views the cable car doesn\'t provide. It\'s not technical climbing—anyone fit can do it. It\'s a pilgrimage for Cape Town locals.",im:"A hiker ascending a steep rocky gorge, chains visible for handholds, the city visible far below, the effort visible on faces.",t:"Start early (6-7am) to avoid afternoon winds and crowds. Wear good hiking boots (essential). Bring lots of water (2+ liters). The hike is 5+ hours return (including top time). Weather must be clear—high winds can make it dangerous. Go with someone experienced or a guide.",c:["high_spots","scary"],r:"g",nn:"Table Mountain Platteklip Gorge",ns:"Ruta de senderismo intenso versus teleférico",nst:"Escalada empinada, rocosa, expuesta. Los lugareños la hacen. Vista ganada.",nt:"Madrugada (6-7h). Botas de senderismo. 2+ litros agua. 5+ horas. Clima claro. Evita vientos."},
  {id:46,n:"Bo-Kaap Cooking Class — Hands-On Cape Malay Cuisine",a:"Bo-Kaap",v:["food","neighborhoods","beautiful"],d:180,s:"A hands-on cooking class in the colorful Bo-Kaap neighborhood learning Cape Malay cuisine from local cooks.",st:"Bo-Kaap is the historic Cape Malay neighborhood with colorful houses. The food tradition is unique: Cape Malay—a fusion of Indonesian, Indian, and African cooking. Taking a cooking class here (usually in someone\'s home) teaches you to make curries, breads, and dishes that tell the story of diaspora and cultural fusion. It\'s intimate and authentic.",im:"Someone stirring a fragrant curry in a home kitchen, spices visible on the counter, the colorful neighborhood visible through the window.",t:"Book through local tour operators or ask at accommodation. Classes typically cost 600-1,000 ZAR. They include ingredients, cooking, and eating. Classes are 3-4 hours. Go with an open mind and respect for the cultural context. It\'s one of the most authentic food experiences in Cape Town.",c:["food","neighborhoods"],r:"g",nn:"Bo-Kaap Cooking Class",ns:"Clase de cocina Cape Malay en Bo-Kaap",nst:"Cocina Cape Malay—fusión de tradiciones culinarias de la diáspora.",nt:"Reserva con operadores locales. 600-1,000 ZAR. 3-4 horas. Mente abierta. Auténtico."},
  {id:47,n:"Kirstenbosch Summer Concerts — Music in a Botanical Garden",a:"Kirstenbosch",v:["music","beautiful","local"],d:120,s:"Every Sunday in summer (Nov-March), world-class musicians perform in Kirstenbosch Botanical Garden—picnics on the lawns allowed.",st:"Kirstenbosch is one of the world\'s most beautiful botanical gardens, set at the foot of Table Mountain. In summer, Sunday concerts feature international and local musicians—jazz, classical, world music. People bring picnics and wine, sitting on the grass with the mountain as backdrop. It\'s civilized and celebratory. It\'s very Cape Town.",im:"Thousands of people sitting on a vast lawn in a botanical garden, a stage at one end, Table Mountain towering beyond, the sun setting.",t:"Concerts are Sundays, November through March, usually starting at 5:30pm. Entry is 120-180 ZAR. Bring picnic, wine, blanket. Arrive early (3-4pm) for good lawn space. It\'s popular—can be crowded. The experience matters more than the music.",c:["music","beautiful","local"],r:"g",nn:"Kirstenbosch Summer Concerts",ns:"Conciertos de verano en jardín botánico",nst:"Músicos mundiales en jardín con montaña como telón de fondo.",nt:"Domingos nov-marzo, 17:30h. 120-180 ZAR. Pícnic, vino, manta. Llega temprano. Popular."},
  {id:48,n:"Boulders Beach Penguin Colony — Adorable & Awkward",a:"Boulders Beach",v:["swimming","nature","beautiful"],d:45,s:"A beach with a resident colony of African penguins living among the boulders—touristy but genuinely special.",st:"Boulders Beach, near Simon\'s Town, has a small colony of African penguins. They\'re adorable on land (waddling, awkward) and graceful in water. The beach is small and protected by huge boulders. Swimming alongside penguins is surreal. The penguins are habituated to humans and unbothered. It\'s touristy but authentic—these are wild penguins choosing to live here.",im:"Penguins waddling across the sand, some diving into the water, people swimming in the same water, the boulders huge and dramatic.",t:"Located in Simon\'s Town, about 30km south of Cape Town. Admission is modest (80 ZAR). The beach is safe for swimming—penguins are harmless. Go early morning to avoid crowds. The drive south is scenic.",c:["swimming","nature","beautiful"],r:"g",nn:"Boulders Beach Penguins",ns:"Colonia de pingüinos en playa de rocas",nst:"Pingüinos africanos viviendo entre las rocas, extraño y especial.",nt:"Simon\'s Town, 30km sur. 80 ZAR. De mañana temprano. Conducción escénica."},
  {id:49,n:"Chapman\'s Peak Drive — Scenic Mountain Road",a:"Chapman\'s Peak",v:["beautiful","high_spots","day_trips"],d:120,s:"One of the world\'s most spectacular coastal drives through mountains, with views of cliffs, ocean, and hidden beaches.",st:"Chapman\'s Peak Drive is a 9km toll road carved through mountain to the coast. The views are extraordinary: ocean on both sides, cliffs hundreds of meters high, tiny beaches accessible only by this road. It\'s called one of the most beautiful drives in the world. It can be closed in winter due to rockfalls. When open, it\'s essential.",im:"A narrow road hugging a cliff face, the ocean far below on both sides, the road carved impossibly into the mountain.",t:"Toll is about 80 ZAR per car. The drive takes 30-45 minutes without stops. Go slowly—there are pullouts for viewing and photography. Weather can change quickly—check conditions. Best in good weather. It\'s a destination in itself, not just a drive.",c:["beautiful","high_spots"],r:"g",nn:"Chapman\'s Peak Drive",ns:"Ruta costera espectacular a través de montañas",nst:"9km de ruta con vistas extraordinarias de acantilados y océano.",nt:"Peaje 80 ZAR. 30-45 min. Ve lentamente. Clima puede cambiar. Buen tiempo."},
  {id:50,n:"Woodstock & Maboneng — Arts District Transformation",a:"Woodstock",v:["art","neighborhoods","weird"],d:120,s:"An historically disadvantaged neighborhood transforming into a creative hub with galleries, studios, restaurants, and street art.",st:"Woodstock was industrial, poor, crime-ridden. It\'s now a vibrant arts district. Galleries show contemporary art. Studios open their doors. Restaurants range from experimental to traditional. Street art covers the streets. The transformation is real but contested—gentrification alongside cultural authenticity. It\'s worth experiencing to understand modern Cape Town.",im:"A street corner with colorful street art, gallery windows displaying art, a café full of people, creative energy visible.",t:"Located in central Cape Town, easily accessible by car or Uber. Galleries are mostly open weekends. Restaurants and cafés open weekdays too. Allow 3-4 hours for proper exploration. It\'s safe during the day. Go with openness to the complexity of gentrification.",c:["art","neighborhoods","weird"],r:"g",nn:"Woodstock & Maboneng",ns:"Barrio transformándose en centro de artes",nst:"Industrial a hub creativo. Galerías, estudios, restaurantes, arte callejero.",nt:"Centro Cape Town. Coches o Uber. Galerías fin de semana. Permita 3-4 horas."},
  {id:51,n:"Long Street — Historic & Chaotic",a:"City Center",v:["neighborhoods","history","food"],d:90,s:"The oldest street in Cape Town, once the main commercial thoroughfare, now a mix of historic buildings, shops, bars, and street life.",st:"Long Street is Cape Town\'s most historic street. It runs from the Waterfront up to the mountain. Historic buildings mix with modern shops, bars, restaurants, and street vendors. At night it\'s lively and chaotic. During the day it\'s a cultural melting pot. The street shows Cape Town\'s history and present simultaneously.",im:"A crowded street lined with historic architecture mixed with modern storefronts, people walking and socializing, street vendors visible.",t:"Walk the entire length—it takes 30-45 minutes. Stop in cafés and shops. Go in daytime for shopping, evening for bar culture. Street vendors sell everything. It\'s safe during the day, crowded but fine at night. Food is available everywhere. Budget accordingly.",c:["neighborhoods","history","food"],r:"g",nn:"Long Street",ns:"Calle más vieja de Cape Town—histórica y caótica",nst:"De la Waterfront a la montaña. Historia y presente simultáneamente.",nt:"Camina toda la extensión (30-45 min). Cafés y tiendas. De día compras, noche bares. Vendedores. Seguro de día."},
  {id:52,n:"V&A Waterfront — Shopping & Dining Hub",a:"Waterfront",v:["shopping","food","neighborhoods"],d:120,s:"A renovated waterfront shopping complex with restaurants, shops, museums, and harbor views—touristy but worth a few hours.",st:"The V&A (Victoria & Alfred) Waterfront is the major tourist destination. It\'s a upscale shopping and dining complex on the harbor. It has everything: international brands, local shops, excellent restaurants, museums, and harbor views. It\'s designed for tourists and serves that function well. Most Capetonians avoid it for the crowds, but it\'s worth visiting.",im:"A bustling waterfront complex with shops, restaurants, boats in the harbor, Table Mountain visible in the background.",t:"Located at the harbor. Easily accessible by Uber or on foot from City Center. Free to walk around. Shops and restaurants cater to all budgets (budget: 100-200 ZAR for casual meal; upscale: 300-500 ZAR). Allow 2-3 hours. Go mid-week to avoid crowds.",c:["shopping","food"],r:"g",nn:"V&A Waterfront",ns:"Centro de compras y comida en el puerto",nst:"Complejo renovado con tiendas, restaurantes, museos, vistas al puerto.",nt:"Puerto. Acceso Uber o a pié. Libre paseo. Budgets variados. 2-3 horas."},
  {id:53,n:"Cape Point & Cape of Good Hope — Geographic Drama",a:"Cape Point",v:["high_spots","beautiful","day_trips"],d:180,s:"Two promontories where the Atlantic and Indian Oceans are said to meet—a dramatic coastal landscape and hiking destination.",st:"Cape Point is where two ocean currents meet, creating distinctive water color changes. The Cape of Good Hope (often confused with Cape Point) is nearby—both offer dramatic coastlines, hiking trails, and spectacular views. It\'s one of South Africa\'s most visited natural attractions. The drive through the Cape Peninsula adds to the experience.",im:"A dramatic cliff edge looking down at two different colored ocean currents meeting below, the coast extending in both directions.",t:"Located in Table Mountain National Park. Entry is 450 ZAR for the park. Multiple hiking trails of varying difficulty. The funicular to the top is 300 ZAR. Allow half day (3-4 hours minimum). Bring water and sun protection. Weather can be dramatic—winds are strong. It\'s worth the visit.",c:["high_spots","beautiful"],r:"g",nn:"Cape Point y Cabo de Buena Esperanza",ns:"Dos promontorios donde océanos parecen encontrarse",nst:"Lugar donde corrientes del Atlántico e Índico crean cambios de color.",nt:"Parque Nacional. 450 ZAR. Senderos variados. 3-4 horas. Agua. Viento fuerte."},
  {id:54,n:"Muizenberg Beach & Surf Culture — Laid-Back Coastal Vibe",a:"Muizenberg",v:["swimming","sport","local"],d:120,s:"A historic beach town south of Cape Town known for surfing, colorful beach huts, and a relaxed local atmosphere.",st:"Muizenberg was Cape Town\'s first beach destination, now quieter than Camps Bay but more authentic. The beach has consistent waves for surfers. Colorful wooden beach huts line the shore. The town has backpacker hostels, restaurants, and local shops. It feels like a beach town rather than a tourist destination.",im:"A line of painted wooden beach huts in a row, surfers in the water, the beach relatively quiet, a laid-back vibe.",t:"Located 30km south of Cape Town. Train from Cape Town station (scenic and cheap, 20-30 ZAR) or taxi/Uber. Accommodation ranges from backpacker hostels (100-200 ZAR) to small hotels. Surfing lessons available (300-600 ZAR). It\'s a place to stay overnight, not just visit.",c:["swimming","sport","local"],r:"g",nn:"Muizenberg Beach",ns:"Pueblo costero histórico con cultura de surf",nst:"Playas con olas consistentes. Cabañas pintadas. Atmósfera local.",nt:"30km sur. Tren (20-30 ZAR) o Uber. Alojamiento 100-600 ZAR. Lecciones de surf."},
  {id:55,n:"District Six Museum — Apartheid Narrative",a:"District Six",v:["history","scary","free_culture"],d:60,s:"A museum documenting the forced removal of 60,000 residents from District Six neighborhood during apartheid.",st:"District Six was a vibrant, mixed-race neighborhood. In 1966, the apartheid government declared it a White Area and forcibly removed 60,000 residents. The neighborhood was demolished. Today it\'s mostly empty. The museum tells the stories of dispossession and resistance. It\'s difficult but essential to understanding South Africa\'s recent history.",im:"A display case with personal artifacts—keys, photos, letters—from removed residents, with contextual information.",t:"Located in the empty space where District Six once stood. Admission is modest (80 ZAR). Open Mondays through Saturdays, 9am-4:30pm, closed Sundays. Allow 1-2 hours. Go with an open heart and mind for difficult history.",c:["history","free_culture"],r:"y",nn:"District Six Museum",ns:"Museo documentando desalojo forzado durante apartheid",nst:"60,000 residentes removidos en 1966. Historias de despojo y resistencia.",nt:"Entrada modesta (80 ZAR). Lunes-sábado 9h-16:30h. Permita 1-2 horas. Mente abierta."},
  {id:56,n:"Camps Bay Beach & Sunset — Glamorous Coastal Spot",a:"Camps Bay",v:["beautiful","sunset","swimming"],d:45,s:"An upscale beach neighborhood with palm trees, a promenade, restaurants, and dramatic sunset views of Table Mountain.",st:"Camps Bay is Cape Town\'s glamour beach. It has a palm-tree-lined promenade, upscale restaurants and cafés, and a beach used by wealthy Capetonians and tourists. The view of Table Mountain across the bay is iconic. The atmosphere is sophisticated and sophisticated. It\'s expensive but beautiful.",im:"A beach with palm trees, outdoor restaurants with people dining, Table Mountain visible across the bay, sunset light.",t:"Located on the coast west of the city. Uber or car. Restaurants range from 150-400 ZAR. Parking can be tricky in peak times. Go for sunset (around 5-6pm). Swimming is safe. It\'s worth spending an evening here.",c:["beautiful","sunset"],r:"g",nn:"Camps Bay Beach",ns:"Playa glamurosa con palmeras y vista de Table Mountain",nst:"Barrio costero de lujo para Capetonians ricos y turistas.",nt:"Oeste de la ciudad. Uber. Restaurantes 150-400 ZAR. Atardecer 17-18h. Nado seguro."},
  {id:57,n:"Lion\'s Head Sunset Hike — Shorter Alternative to Table Mountain",a:"Lion\'s Head",v:["high_spots","beautiful","sunset"],d:90,s:"A 2-3 hour hike with scrambling sections to a distinctive peak with 360-degree sunset views—busier than Table Mountain but manageable.",st:"Lion\'s Head is Table Mountain\'s neighbor, distinctive because of its lion-shaped silhouette. The hike is 2-3 hours with some scrambling using chains. It\'s less crowded than Table Mountain but more crowded than Platteklip. The views at sunset are extraordinary. It\'s a very popular local hike.",im:"Hundreds of people on a rocky peak watching the sunset, the city spread below, the ocean in the distance.",t:"Start around 3-4pm to arrive at sunset. Wear good shoes. Bring water. It\'s a fixed path with chains. The descent in darkness is challenging but manageable if you have a headlamp. Go with a group or guide if unsure. Weather must be clear.",c:["high_spots","beautiful"],r:"g",nn:"Lion\'s Head Sunset Hike",ns:"Senderismo de 2-3 horas con vistas de puesta de sol",nst:"Montaña con forma de león. Vistas extraordinarias al atardecer.",nt:"Comienza 15-16h para atardecer. Buen calzado. Agua. Cadenas. Linterna para descenso."},
  {id:58,n:"Company\'s Garden — Urban Garden & History",a:"City Center",v:["parks","free_culture","history"],d:45,s:"A 350-year-old formal garden in the city center, originally grown to supply ships—now a peaceful public space with historical significance.",st:"Company\'s Garden was established in 1652 by the Dutch East India Company to grow fresh produce for ships. Today it\'s a formal garden in the city center—a respite from urban chaos. The garden tells the history of Cape Town\'s colonial beginning and its transformation. Walking here is calming and educational.",im:"Formal garden paths with hedges, trees, and flowers, city buildings visible beyond, a few people sitting on benches.",t:"Located in the City Center, next to the castle. Free entry. Open daily, sunrise to sunset. Allow 1 hour. It\'s a peaceful escape. Bring a book or just sit. The surrounding area has museums and cafés.",c:["parks","free_culture","history"],r:"g",nn:"Company\'s Garden",ns:"Jardín formal de 350 años en el centro urbano",nst:"Creado en 1652 por Compañía Holandesa de Indias Orientales.",nt:"Centro, cerca del castillo. Entrada libre. Diariamente, salida a puesta. Permita 1 hora."},
  {id:59,n:"Constantia Wine Valley — Cape Wines & Estates",a:"Constantia",v:["food","beautiful","day_trips"],d:240,s:"A wine region south of Cape Town with estates producing excellent wines and restaurants—day-trip worthy for wine lovers.",st:"Constantia is one of South Africa\'s most famous wine regions, producing excellent whites and reds. Wine estates are open for tastings and lunches. The landscape is beautiful—mountains, vineyards, restored manor houses. It\'s become increasingly touristy but remains genuine. The wines are excellent.",im:"A wine tasting room in a historic manor house, wine bottles visible, vineyards visible through windows.",t:"Located 30-40 minutes south of Cape Town by car or Uber. Most estates are open for tastings (usually 200-300 ZAR per tasting). Lunches at restaurants can be expensive (250-500 ZAR) but excellent. Allow half day minimum (4-6 hours including travel). Book tours if you don\'t want to drive.",c:["food","beautiful","day_trips"],r:"g",nn:"Constantia Wine Valley",ns:"Región vinícola con bodegas y restaurantes",nst:"Una de las regiones vinícolas más famosas de Sudáfrica.",nt:"30-40 min sur. Degustaciones 200-300 ZAR. Almuerzos 250-500 ZAR. Media día."},
  {id:60,n:"Signal Hill Sunset — Intimate Viewpoint",a:"Signal Hill",v:["beautiful","sunset","local"],d:45,s:"A lesser-known sunset spot with views over the city and ocean—quieter than Lion\'s Head with similar rewards.",st:"Signal Hill is less famous than Lion\'s Head or Table Mountain, which means it\'s quieter. The sunset views are excellent: the city, the harbor, the ocean, and the mountains all visible. It\'s a short walk from the city center. Locals know it; tourists often don\'t. It\'s peaceful.",im:"A small group of people watching sunset from a hilltop, the city lights beginning to twinkle below.",t:"Short walk from City Center (20-30 min) or quick Uber. Free. Go 30 minutes before sunset. It\'s popular but less crowded than major tourist spots. Bring something to sit on. Safe in daylight and early evening. The descent is easy.",c:["beautiful","sunset","local"],r:"g",nn:"Signal Hill Sunset",ns:"Mirador menos conocido para puesta de sol",nst:"Vistas excelentes, menos turístico que otras opciones.",nt:"Centro, 20-30 min a pié. Libre. 30 min antes atardecer. Seguro. Descenso fácil."},
  {id:61,n:"Robben Island Ferry & Prison Tour — Historical Necessity",a:"Robben Island",v:["history","scary","greatest_hits"],d:180,s:"Nelson Mandela was imprisoned for 18 years on this island. The ferry trip and prison tour are essential South African historical experience.",st:"Robben Island, 12km off the coast, was a political prison for centuries. Nelson Mandela spent 18 of his 27 prison years here. The island is now a museum and UNESCO World Heritage site. The tour is sobering and moving. Former prisoners often guide tours, sharing personal experiences. It\'s one of South Africa\'s most important historical sites.",im:"A ferry approaching the island, the prison buildings visible, the ocean surrounding, the isolation palpable.",t:"Ferries leave from Nelson Mandela Gateway at the Waterfront. Admission is about 450 ZAR (ferry + tour). Tours are guided and structured—you don\'t explore alone. Allow 3-4 hours. Ferries are weather-dependent (sometimes cancelled in rough seas). Book ahead in peak season. Bring layers—it can be windy.",c:["history","greatest_hits"],r:"y",nn:"Isla Robben",ns:"Prisión política donde Mandela pasó 18 años",nst:"Sitio de patrimonio mundial. Experiencia histórica esencial.",nt:"Ferry desde Waterfront. 450 ZAR. Tours guiados. 3-4 horas. Capas. Reserva."},
  {id:62,n:"Neighbourgoods Market — Weekend Food & Community",a:"Woodstock",v:["markets","food","local"],d:120,s:"A weekend market in Woodstock with local producers, food stalls, crafts, and a community vibe—authentic Cape Town.",st:"Neighbourgoods Market is different from tourist markets. It\'s a community market where local producers sell: breads, cheeses, organic vegetables, preserves, crafts. The food stalls serve current cuisine prepared on-site. It\'s where Capetonians come, not primarily tourists. The vibe is authentic and friendly.",im:"Crowded market stalls with local producers, people eating, socializing, colorful produce and crafts on display.",t:"Saturdays and Sundays, 9am-2pm, in Woodstock. Entry is free. Food costs vary (bread 20-40 ZAR, meals 80-150 ZAR). Go early for best selection. It\'s crowded but enjoyable. Use Uber or car—parking can be tight. This is how Capetonians shop and socialize.",c:["markets","food","local"],r:"g",nn:"Neighbourgoods Market",ns:"Mercado comunitario con productores locales",nst:"Lugar donde Capetonians compran comida real, no turístico.",nt:"Sábados-domingos 9h-14h. Entrada libre. Comida 20-150 ZAR. Temprano. Uber."},
  {id:63,n:"Greenmarket Square — Historic Central Plaza",a:"City Center",v:["markets","history","neighborhoods"],d:60,s:"A historic plaza in the city center with daily markets selling crafts, souvenirs, and food—touristy but part of Cape Town\'s heart.",st:"Greenmarket Square is the oldest market square in Cape Town. Historic buildings surround it. Daily markets sell crafts, souvenirs, art, and food. It\'s touristy but also authentic—vendors are local, prices are negotiable, and the energy is real. Street musicians perform. It\'s a good place to feel the city center energy.",im:"A historic plaza lined with colonial buildings, stalls filled with crafts, people shopping and eating, street musicians performing.",t:"Located in the City Center. Free to walk around. Vendors sell everything from 20 ZAR up. Negotiate prices. Street food is available (50-100 ZAR). Go during the day (9am-5pm). It\'s crowded and lively. Safe if you\'re aware of surroundings.",c:["markets","history"],r:"g",nn:"Greenmarket Square",ns:"Plaza histórica con mercados diarios",nst:"Plaza más antigua con vendedores locales, artesanía, comida.",nt:"Centro. Entrada libre. Negocia precios. Comida 50-100 ZAR. De día. Consciente."},
  {id:64,n:"Hout Bay & Seal Island — Fishing Village Charm",a:"Hout Bay",v:["swimming","beautiful","neighborhoods"],d:120,s:"A working fishing village with fresh seafood restaurants, a harbor tour to see seals, and a local beach vibe.",st:"Hout Bay is one of Cape Town\'s most picturesque spots. It\'s a working fishing village with boats, a seafood market, and excellent restaurants. Boat tours visit nearby Seal Island to see Cape fur seals. The village has charm without being overly touristic. It\'s 20 minutes from the city center.",im:"A harbor filled with fishing boats, fresh fish at market stalls, people eating seafood at waterfront restaurants.",t:"Located south of the city. Uber or car (20-30 min). Harbor is free to walk around. Boat tours are about 400 ZAR. Seafood restaurants cost 150-300 ZAR. Allow 3-4 hours. Go early morning when fishing boats return (before 9am) for best energy.",c:["swimming","beautiful","neighborhoods"],r:"g",nn:"Hout Bay",ns:"Pueblo pesquero con restaurantes de mariscos",nst:"Aldea de trabajo con encanto, tours a Seal Island.",nt:"20-30 min sur. Uber. Libre pasear. Tours 400 ZAR. Mariscos 150-300 ZAR. Madrugada."},
  {id:65,n:"False Bay & Dyer Island — Shark Cage Diving (If You Dare)",a:"Gansbaai (Day Trip)",v:["scary","sport","weird"],d:300,s:"An optional extreme experience: great white shark cage diving in False Bay—thrilling, regulated, and controversial.",st:"Great white sharks live in False Bay. Shark cage diving operations take tourists in small cages to see them up close. It\'s thrilling, regulated, and controversial (some argue it conditions sharks to approach boats). If you\'re interested in extreme experiences, it exists. Not everyone approves, but it\'s available.",im:"A small cage in the ocean, a massive shark approaching, the cage between predator and prey.",t:"Tours depart from Gansbaai (1.5 hours from Cape Town by car or tours). Cost is about 1,500-2,000 ZAR. Tours are 4-5 hours. You don\'t need diving certification. It\'s genuinely intense. Not for everyone. Consider environmental implications.",c:["scary","sport","weird"],r:"g",nn:"Cage Diving Sharks",ns:"Experiencia extrema—buceo en jaula con tiburones blancos",nst:"Tiburones blancos en False Bay. Emocionante, regulado, controvertido.",nt:"Gansbaai (1,5 h). 1,500-2,000 ZAR. 4-5 horas. Intenso. Considera implicaciones ambientales."},
  {id:66,n:"Clifton Beaches — Glamorous Seaside Culture",a:"Clifton",v:["swimming","beautiful","local"],d:90,s:"Four small, exclusive beaches with expensive real estate, beautiful people, and excellent beachfront restaurants.",st:"Clifton has four small beaches, each progressively more protected from wind and rough seas. The real estate is South Africa\'s most expensive. The beaches are beautiful and well-maintained. People come to be seen. The restaurants are excellent but expensive. It\'s a window into wealthy Cape Town.",im:"A small beach lined with expensive waterfront apartments, beautiful people, upscale restaurants, the water calm and turquoise.",t:"Located on the Atlantic coast. Uber is easiest. Restaurants range from 200-600 ZAR. Parking is expensive and limited. Go in summer (Nov-Feb) when weather is best. It\'s not for budget travelers, but interesting to visit and observe.",c:["swimming","beautiful"],r:"g",nn:"Clifton Beaches",ns:"Playas exclusivas con cultura glamurosa",nst:"Cuatro playas pequeñas, bienes raíces más caro de Sudáfrica.",nt:"Costa Atlántica. Uber. Restaurantes 200-600 ZAR. Verano. Observa."},
  {id:67,n:"Two Oceans Aquarium — Ocean Education",a:"Waterfront",v:["free_culture","swimming","weird"],d:60,s:"An excellent aquarium at the Waterfront showcasing South African marine life and ocean ecosystems.",st:"The Two Oceans Aquarium is one of South Africa\'s best museums. It showcases marine life from the Atlantic and Indian Oceans. The exhibits are well-designed and educational. It\'s good for understanding South Africa\'s marine biodiversity.",im:"A large tank with kelp forest, fish swimming, visitors watching with wonder.",t:"Located at the Waterfront. Admission is about 250 ZAR. Open daily, 9:30am-6pm. Allow 2-3 hours. It\'s popular, so go mid-week if possible. Food is available at the Waterfront.",c:["free_culture","swimming"],r:"g",nn:"Two Oceans Aquarium",ns:"Acuario con vida marina sudafricana",nst:"Acuario educativo mostrando ecosistemas oceánicos.",nt:"Waterfront. 250 ZAR. Abierto 9:30h-18h. Permita 2-3 horas. Miércoles mejor."},
  {id:68,n:"Zeitz MOCAA — Modern Contemporary Art",a:"Silo District",v:["art","architecture","weird"],d:60,s:"A stunning contemporary art museum housed in a converted grain silo with modern galleries and a rooftop bar.",st:"The Zeitz Museum of Contemporary Art Africa (MOCAA) is housed in a converted grain silo. The conversion is architecturally striking. The collection focuses on African contemporary art. It\'s world-class. The rooftop bar has views. It\'s one of Cape Town\'s most important recent additions.",im:"The distinctive grain silo architecture, inside a dramatic void space rises, contemporary art displayed on white walls.",t:"Located in the Silo District. Admission is about 200 ZAR. Open Tuesdays through Sundays, 10am-6pm. Allow 2-3 hours. The rooftop bar is a nice spot for a drink with views. It\'s worth visiting if interested in contemporary art.",c:["art","architecture"],r:"g",nn:"Zeitz MOCAA",ns:"Museo de arte contemporáneo en silo convertido",nst:"Conversión arquitectónica impresionante. Arte africano contemporáneo.",nt:"Distrito Silo. 200 ZAR. Martes-domingo 10h-18h. Permita 2-3 horas. Barra."}

<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
const TBGS={"places":"https://mariavheland.github.io/godostuff/textures/tex18.png","collections":"https://mariavheland.github.io/godostuff/textures/tex13.png","missions":"https://mariavheland.github.io/godostuff/textures/tex13.png","plan":"https://mariavheland.github.io/godostuff/textures/tex13.png","phrases":"https://mariavheland.github.io/godostuff/textures/tex18.png","default":"https://mariavheland.github.io/godostuff/textures/tex18.png"};if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:"url('https://mariavheland.github.io/godostuff/textures/tex16.png') center/cover no-repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Cape Town Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Cape Town Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
