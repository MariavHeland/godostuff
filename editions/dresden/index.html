  {name:'Kunsthofpassage',area:'Neustadt',desc:'Ein versteckter Durchgang mit surrealen Architekturelementen wie umgedrehten Häusern und Wasserfall-Regenrinnen, der Locals als kreativer Geheimtipp dient. Erreichbar mit Tram 3 oder 8 bis Alaunstraße; Locals lieben die fotogenen Details bei langsamem Erkunden. Free.',tags:['street art','hidden','free','local'],lat:51.059,lng:13.745},
  {name:'Luisenhof Viewpoint',area:'Weißer Hirsch',desc:'Der 'Balkon Dresdens' mit Panoramablick über die Elbe und Dächer, ein langsamer Spazierort für Locals fernab des Trubels. Bus 65 vom Zentrum bringt dich hin; Locals schätzen die ruhige Natur und Geschichte seit 125 Jahren. Free access to viewpoint.',tags:['viewpoint','hidden','free','local'],lat:51.072,lng:13.802},
  {name:'Lingnerpark',area:'Blasewitz',desc:'Ein versteckter Park mit japanischem Garten und Elbblick, wo Locals picknicken und entspannen. Tram 4 bis Lingnerallee; beliebt für die ruhigen Pfade und Rosenbeete im Slow-Travel-Stil. Free.',tags:['park','hidden','free','local'],lat:51.032,lng:13.802},
  {name:'Standseilbahn Dresden',area:'Loschwitz',desc:'Die älteste Standseilbahn Europas führt zu versteckten Hügeln mit Stadtblick, ein lokales Highlight für neugierige Spaziergänge. Bus 63; Locals nutzen sie für entspannte Ausblicke ohne Touristenmassen. Very cheap (few euros round trip).',tags:['viewpoint','hidden','local','cheap'],lat:51.038,lng:13.81},
  {name:'Yenidze Courtyard',area:'Plauen',desc:'Geheimer Innenhof der ehemaligen Zigarettenfabrik mit orientalischem Flair und Street-Art-Elementen, ein lokales Versteck. Tram 7 bis Yenidze; Locals lieben die mystische Atmosphäre bei Sonnenuntergang. Free.',tags:['courtyard','street art','hidden','free'],lat:51.042,lng:13.718},
  {name:'Brühlsche Terrasse Secret Paths',area:'Altstadt',desc:'Versteckte Pfade und Treppen mit versteckten Ausblicken über die Elbe, bekannt bei Locals für ruhige Momente. Tram 1/2 bis Theaterplatz, dann zu Fuß; der unspektakuläre Teil jenseits der Touristenpfade ist magisch. Free.',tags:['viewpoint','hidden','free','local'],lat:51.055,lng:13.739},
  {name:'Neustadt Street Art Alleys',area:'Neustadt',desc:'Enge Gassen mit frischem Street Art von lokalen Künstlern, ein Labyrinth für Curios. Bus 62 oder Tram 6 bis Rothenburger Straße; Locals entdecken hier neue Werke bei Spaziergängen. Free.',tags:['street art','hidden','free','local'],lat:51.062,lng:13.748},
  {name:'Hechtviertel Park',area:'Hechtviertel',desc:'Kleiner Nachbarschaftspark mit Wildwuchs und Bänken, wo Locals die Sonne genießen. Tram 11 bis Elbepark; der unpolierte Charme macht ihn zum Slow-Travel-Favoriten. Free.',tags:['park','local','free','hidden'],lat:51.068,lng:13.732},
  {name:'Kaditz Market Courtyards',area:'Kaditz',desc:'Hinterhöfe um den Wochenmarkt mit Street-Art und Community-Vibes, lebendig samstags. Bus 70 bis Kaditz Markt; Locals schätzen die authentischen Gespräche und Gratis-Duftproben. Free.',tags:['market','courtyard','local','free'],lat:51.08,lng:13.686},
  {name:'Pillnitz Hidden Gardens',area:'Pillnitz (outer)',desc:'Geheime Gartenteile des Schlosses mit Elbblick, weniger besucht als der Hauptpark. S-Bahn S1 bis Pillnitz; Locals wandern hier langsam durch Obstbäume. Free gardens.',tags:['park','viewpoint','hidden','free'],lat:50.917,lng:13.868},

:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;

<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>

):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>

</div></div>}
