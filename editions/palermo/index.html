  {id:1,n:"Ballarò Market — Ballarò",a:"Ballarò",v:["local", "history"],d:2,s:"Screaming vendors, dangling octopus, pure chaos",st:"Medieval market unchanged 500 years. Vendors yell in Sicilian, fish glistens. Arancini €1. Real Palermo.",im:"1500: Arab traders set up. 2024: Same chaos, better phones.",t:"Go 7am-11am. Small bills. Don\'t photograph without asking.",c:["local_only", "history_big"],r:"g",nn:"Mercato del Ballarò — Ballarò",ns:"Venditori che gridano, polpi pendenti, caos puro",nst:"Mercato medievale immutato 500 anni. Venditori gridano, pesce luccica. Arancini €1. Vero Palermo.",nt:"Vai 7-11. Banconote piccole. Non fotografare senza chiedere."},
  {id:2,n:"Vucciria Market — Vucciria",a:"Vucciria",v:["local", "free"],d:1,s:"Film-famous market labyrinth screaming in Sicilian",st:"Maze of alleys. Pasta vendors hand-roll fusilli. Panelle (fried chickpea) €0.80. Sensory overload. You get lost. You love it.",im:"1600s: Actors improvised here. 2024: Tourists improvise getting lost.",t:"Backpack. Cash only. 9am best light before crowds.",c:["local_only", "history_big"],r:"g",nn:"Mercato Vucciria — Vucciria",ns:"Labirinto di mercato famoso nel film che urla in siciliano",nst:"Labirinto di vicoli. Venditori di pasta arrotolano a mano. Panelle €0.80. Sovraccarico sensoriale. Ti perdi. Ti ama.",nt:"Zaino. Solo contanti. 9 luce migliore."},
  {id:3,n:"Cappuccini Catacombs — Vergine",a:"Vergine",v:["scary", "history"],d:3,s:"8,000 mummified corpses dressed in rags hanging on walls",st:"Underground chapel. Skeletons on walls labeled by name/profession. Unsettling. Eerie silence. Deeply weird. Not for lunch before.",im:"1600s: Wealthy chose mummification. 2024: They\'re still hanging.",t:"Guide €5. Claustrophobes reconsider.",c:["scary", "history_big"],r:"y",nn:"Catacombe dei Cappuccini — Vergine",ns:"8.000 cadaveri mummificati vestiti di stracci appesi ai muri",nst:"Cappella sotterranea. Scheletri su muri etichettati. Inquietante. Silenzio strano. Non prima di pranzo.",nt:"Guida €5. Claustrofobici riconsiderano."},

  {id:90,n:"Monreale Cathedral (Alt 8) — Monreale",a:"Monreale",v:["history", "beautiful"],d:40,s:"13,000 sqm Byzantine mosaics in mountaintop cathedral",st:"Bus €2 up mountain. Norman cathedral (1174). Entire walls gold mosaics. Christ Pantocrator stares from apse. Overwhelming. Hilltop café views.",im:"1174: Normans spend fortune on gold. Still costs you to see.",t:"€2 bus. Early morning, light before noon. Water.",c:["history_big", "architecture"],r:"g",nn:"Cattedrale di Monreale (Alt 8) — Monreale",ns:"13.000 mq di mosaici bizantini in cattedrale in cima montagna",nst:"Autobus €2 su montagna. Cattedrale normanna (1174). Muri interi mosaici oro. Cristo Pantocrator dall\'abside. Travolgente.",nt:"€2 autobus. Mattina presto, luce prima mezzogiorno. Acqua."},
  {id:91,n:"Ballarò Market (Alt 9) — Ballarò",a:"Ballarò",v:["local", "history"],d:2,s:"Screaming vendors, dangling octopus, pure chaos",st:"Medieval market unchanged 500 years. Vendors yell in Sicilian, fish glistens. Arancini €1. Real Palermo.",im:"1500: Arab traders set up. 2024: Same chaos, better phones.",t:"Go 7am-11am. Small bills. Don\'t photograph without asking.",c:["local_only", "history_big"],r:"g",nn:"Mercato del Ballarò (Alt 9) — Ballarò",ns:"Venditori che gridano, polpi pendenti, caos puro",nst:"Mercato medievale immutato 500 anni. Venditori gridano, pesce luccica. Arancini €1. Vero Palermo.",nt:"Vai 7-11. Banconote piccole. Non fotografare senza chiedere."},
  {id:92,n:"Vucciria Market (Alt 9) — Vucciria",a:"Vucciria",v:["local", "free"],d:1,s:"Film-famous market labyrinth screaming in Sicilian",st:"Maze of alleys. Pasta vendors hand-roll fusilli. Panelle (fried chickpea) €0.80. Sensory overload. You get lost. You love it.",im:"1600s: Actors improvised here. 2024: Tourists improvise getting lost.",t:"Backpack. Cash only. 9am best light before crowds.",c:["local_only", "history_big"],r:"g",nn:"Mercato Vucciria (Alt 9) — Vucciria",ns:"Labirinto di mercato famoso nel film che urla in siciliano",nst:"Labirinto di vicoli. Venditori di pasta arrotolano a mano. Panelle €0.80. Sovraccarico sensoriale. Ti perdi. Ti ama.",nt:"Zaino. Solo contanti. 9 luce migliore."},
  {id:93,n:"Cappuccini Catacombs (Alt 9) — Vergine",a:"Vergine",v:["scary", "history"],d:3,s:"8,000 mummified corpses dressed in rags hanging on walls",st:"Underground chapel. Skeletons on walls labeled by name/profession. Unsettling. Eerie silence. Deeply weird. Not for lunch before.",im:"1600s: Wealthy chose mummification. 2024: They\'re still hanging.",t:"Guide €5. Claustrophobes reconsider.",c:["scary", "history_big"],r:"y",nn:"Catacombe dei Cappuccini (Alt 9) — Vergine",ns:"8.000 cadaveri mummificati vestiti di stracci appesi ai muri",nst:"Cappella sotterranea. Scheletri su muri etichettati. Inquietante. Silenzio strano. Non prima di pranzo.",nt:"Guida €5. Claustrofobici riconsiderano."},
  {id:94,n:"Mondello Beach (Alt 9) — Mondello",a:"Mondello",v:["beautiful", "nature"],d:20,s:"Beach tram from city. Golden sand, clear water.",st:"Tram €1.40. Italian families chaotically sunbathing. Gelato, aperitivo bars. Swimming with nonna. Arancini shacks. Summer energy infectious.",im:"1900s: Railway connects beach. 2024: Same tram runs.",t:"Midweek for fewer crowds. Sunscreen.",c:["parks", "nature"],r:"g",nn:"Spiaggia di Mondello (Alt 9) — Mondello",ns:"Spiaggia collegata da tram. Sabbia dorata, acqua limpida.",nst:"Tram €1,40. Famiglie italiane prendono sole caoticamente. Gelato, aperitivo. Estate contagiosa.",nt:"Mercoledì per meno folle. Crema solare."},
  {id:95,n:"Teatro Massimo (Alt 9) — Massimo",a:"Massimo",v:["beautiful", "history"],d:1,s:"Opera house where Godfather was filmed",st:"Neoclassical theater (1897). Red velvet seats, gilded boxes, frescoed ceilings. Decayed 25 years, restored 2000. Grand staircase alone makes it worth it.",im:"1900: Elite arrive in carriages. 1974: Godfather climbed here. 2024: You walk same steps.",t:"€10 tours. 9am-6pm. Book ahead for performances.",c:["history_big", "architecture"],r:"g",nn:"Teatro Massimo (Alt 9) — Massimo",ns:"Teatro dell\'opera dove è stato girato Il Padrino",nst:"Teatro neoclassico (1897). Sedili velluto rosso, palchi dorati. Restaurato 2000. Grande scala merita.",nt:"€10 tour. 9-18. Prenota per spettacoli."},
  {id:96,n:"Kalsa Quarter Ruins (Alt 9) — Kalsa",a:"Kalsa",v:["hidden", "history"],d:1,s:"Bombed-out WWII district gorgeously decaying",st:"Collapsing Renaissance palaces, bombed churches. Locals live in ruins. Street art covers bullet holes. Beautiful, haunting, real Palermo underneath postcard.",im:"1943: Allied bombs. 1980s: Artists move in. 2024: Regenerating.",t:"Walk in daylight first. Support local cafés.",c:["history_big", "street_art"],r:"g",nn:"Quartiere Kalsa (Alt 9) — Kalsa",ns:"Distretto WWII bombardato che si deteriora bellamente",nst:"Palazzi rinascimentali che crollano. Localasiti vivono in rovine. Arte di strada copre i fori. Bellezza inquietante.",nt:"Cammina di giorno. Supporta caffè locali."},
  {id:97,n:"Arab-Norman Churches Trail (Alt 9) — Various",a:"Various",v:["history", "beautiful"],d:2,s:"Sicily\'s 12th-century Islamic-Christian fusion",st:"Martorana (golden mosaics), San Cataldo (tiny dome), Pantocrator (intricate ceilings). Byzantine, Arab, Christian in one room. Profound.",im:"1150: Normans and Arabs build together. 2024: You stand in their harmony.",t:"€2 each. Go early. Sunlight = magic.",c:["history_big", "architecture"],r:"g",nn:"Chiese Arabo-Normanne (Alt 9) — Various",ns:"Fusione islamico-cristiana del XII secolo della Sicilia",nst:"Martorana (mosaici dorati), San Cataldo (cupola piccola), Pantocrator. Tutti in una stanza. Profondo.",nt:"€2 ciascuno. Vai presto. Luce sole = magia."},

,{id:112,n:"Monte Pellegrino — East Slope",a:"Monte Pellegrino",v:["beautiful","quiet","high_spots"],d:20,s:"The mountain overlooks the city, sunrise hits it like gold leaf on bone.",st:"At 606 meters, Monte Pellegrino dominates the skyline. But most tourists take a bus to the top and snap a selfie. The locals climb it. The east-facing slope catches the first light. At dawn, the city is pewter below you, the sea is ink, and the mountain glows. No crowds, no vendors, just stone and breath.",im:"Standing on the east shoulder at 5:45am. The city below still has its lights on. The horizon line where sky becomes sea becomes land.",t:"Park at the base (Mondello side). Marked trail starts near the sanctuary. 45 min to good viewpoint. Bring water. Go midweek. June-August: start by 6am or heat will kill you.",c:["high_spots","sunrise"],r:"g",nn:"Monte Pellegrino — Versante Est",ns:"La montagna che circonda la città, ascesa senza folla.",nst:"Mentre la maggior parte dei turisti prende un autobus, i locali salgono. Il versante orientale cattura la prima luce. All\'alba, la città è ancora grigia sotto, il mare è inchiostro, e il monte brilla. Nessuna folla, nessun venditore, solo pietra e respiro.",nt:"Parcheggio alla base. Sentiero segnalato. 45 minuti buona vista. Acqua. Infrasettimanale. Giugno-agosto: partire alle 6 del mattino."},
{id:113,n:"Mondello Beach — Off-Season Mornings",a:"Mondello",v:["swimming","quiet"],d:12,s:"Locals call it ruined by tourism. But go at 6am in October and it\'s just you and the fishermen.",st:"Mondello is a short bus ride from the city, and yes, it\'s packed with day-trippers in August. But in the quieter months—October through May—and specifically before 9am, it\'s a working beach where fishermen are still hauling nets and the water is clear. Shallow enough for swimming, warm enough until November.",im:"5:45am, October morning. Three fishing boats. You\'re the only person in the water. The city lights reflect off the sea.",t:"AMAT bus 806 from Central Station, 30 min. Park at small lot near rocky south end (fewer crowds). October-May best. Bring something warm. Local bar opens 6:30am if you want espresso after.",c:["swimming"],r:"g",nn:"Mondello — Mattina al di Fuori Stagione",ns:"Spiaggia trasformata da turismo, ma alle 6 del mattino a ottobre è tua.",nst:"Mondello è a pochi minuti di autobus. Sì, affollatissima in agosto. Ma nei mesi tranquilli—ottobre-maggio—e specificamente prima delle 9, è una spiaggia che lavora. I pescatori ancora tirano reti. Acqua chiara. Abbastanza calda fino a novembre.",nt:"AMAT 806 da Centrale, 30 min. Parcheggio a sud (meno folla). Ottobre-maggio meglio. Portare qualcosa di caldo. Bar locale alle 6:30 se vuoi espresso dopo."},
{id:114,n:"La Martorana — Afternoon Light",a:"Ballarò",v:["history","beautiful","famous"],d:2,s:"Byzantine mosaics lit from one angle at 3pm that glow like they\'re still warm from the kiln.",st:"La Martorana (the Church of Santa Maria dell\'Ammiragliato) contains some of the most stunning Norman-Byzantine mosaics in Sicily. But the light matters. At 3pm on most days, the low sun angle illuminates the gold background of the mosaics so they seem to emit light. The church is half-empty at this time—morning rush is long gone, evening groups haven\'t arrived.",im:"3:15pm. Golden hour light hits the dome mosaic. The gold background glows as if freshly laid, still wet.",t:"Close Sundays, tight hours. Open 10am-1pm, 3:30-5:30pm weekdays. €2.50 entry. Go 3-3:30pm for the specific light. Small, quick, 20 min inside. Ballarò neighborhood is worth the walk before or after.",c:["greatest_hits","history_big","beautiful"],r:"g",nn:"La Martorana — Luce Pomeridiana",ns:"Mosaici bizantini che brillano d\'oro alle 3 del pomeriggio.",nst:"La Martorana contiene i mosaici normanni-bizantini più straordinari della Sicilia. Ma la luce importa. Alle 3 del pomeriggio, l\'angolo basso del sole illumina lo sfondo d\'oro dei mosaici così che sembrino emanare luce. La chiesa è mezza vuota.",nt:"Chiuso domeniche, orari stretti. 10-13, 15:30-17:30 infrasettimanale. €2,50. Vai 15-15:30 per la luce specifica. Piccola, 20 minuti dentro. Ballarò vale la passeggiata prima o dopo."},
{id:115,n:"Orto Botanico — Aquatic Section",a:"Kalsa",v:["beautiful","quiet","green","free entry"],d:5,s:"The botanical garden is tourist-known but the aquatic section—where bamboo meets water—feels like a 19th-century painting.",st:"The botanical garden is decent and worth an afternoon. But tourists crowd the main paths. The aquatic section at the far end, where water plants grow dense and bamboo creates green tunnels, is genuinely quiet. You can sit on the benches there for 30 minutes and see maybe three people. The light is green and strange.",im:"Green water, bamboo reflection, no sound but the occasional bird and your own breath.",t:"€10 entry. 9am-8pm (winter 9-5pm). Via Lincoln street entrance is less crowded than main entrance. Go right at fork, follow signs to Orto Aquatico. Bring a book. Genuinely still. Park is full of species plaques if you nerd about botany.",c:["parks","quiet"],r:"g",nn:"Orto Botanico — Sezione Acquatica",ns:"L\'orto botanico ha sezioni turistiche e una parte acquatica dove la gente non va.",nst:"L\'orto botanico è decente. Ma i turisti affollano i sentieri principali. La sezione acquatica in fondo, dove le piante acquatiche crescono dense e il bambù crea tunnel verdi, è genuinamente tranquilla. Puoi sedere ai panchetti per 30 minuti e vedrai forse tre persone.",nt:"€10. 9-20 invernale 9-17. Ingresso via Lincoln meno affollato. Vai a destra, segui per Orto Aquatico. Portare un libro. Genuinamente tranquillo."},
{id:116,n:"Cefalù — Cliff Sunsets (Day Trip)",a:"Day Trip",v:["beautiful","sunset","day_trips"],d:90,s:"A town two hours by train where the beach sits at the foot of a cliff and sunset reflects off the cliff face golden until dark.",st:"Cefalù is a postcard village—too many tourists during the day. But stay past 6pm. Most day-trippers have left by train. The beach is an arc of sand at the base of a medieval fortress perched on a rock. At sunset, the golden hour light bounces off the cliff so the whole beach stays warm and glowing even after the sun hits the horizon. Eat at a waterfront restaurant. Wait for the light to change.",im:"6:50pm. The cliff glows gold. The water is silver. The boats are silhouettes. The restaurant lights start coming on.",t:"Trains from Centrale (Trenitalia), 2 hours, €8-15. Stay until 8pm at least. Eat panelle and arancini from street stalls before dinner if hungry. Last trains 8-9pm. Waterfront restaurants are tourist-marked but the light is real regardless.",c:["day_trips","sunset","beautiful"],r:"g",nn:"Cefalù — Tramonto sulla Scogliera",ns:"Villaggio di cartolina due ore di treno dove il tramonto si riflette sulla roccia.",nst:"Cefalù è un villaggio di cartolina—troppi turisti di giorno. Ma resta dopo le 18. La maggior parte è partita col treno. La spiaggia è un arco di sabbia ai piedi di una fortezza medievale su una roccia. Al tramonto, la luce dell\'ora d\'oro rimbalza sulla scogliera così tutta la spiaggia resta calda e dorata.",nt:"Treni da Centrale, 2 ore, €8-15. Resta fino alle 20 almeno. Mangia panelle e arancini da venditori prima di cena. Ultimi treni 20-21."},
{id:117,n:"Palazzo Mirto — Aristocratic Interior",a:"Kalsa",v:["history","beautiful","weird"],d:4,s:"A 1700s palace where every room is a different universe: Turkish coffee room, frescoed bedrooms, courtyard smelling of lemon.",st:"Most tourists hit Palazzo Normanno or the Opera House. Palazzo Mirto is a preserved aristocratic home where you walk through furnished rooms—not restored, not recreated, actually left. The Turkish smoking room has low cushioned seats and painted ceilings. The chapel has gold and frescoes. The courtyard has a fountain and lemon trees. You feel like you interrupted something.",im:"Stepping into the Turkish room. Dim light, low ceilings, painted walls, cushioned benches, the smell of old fabric and lemon wafting from the courtyard.",t:"€6 entry. Closed Sundays. 10am-6pm other days (often closes 1-4pm for lunch). Via Merlo 2, Kalsa. Small group size keeps it calm. Spend 45 min here, not an afternoon.",c:["history_big","beautiful"],r:"g",nn:"Palazzo Mirto — Interno Aristocratico",ns:"Palazzo del 1700 dove ogni stanza è un universo diverso.",nst:"La maggior parte dei turisti colpisce Palazzo Normanno. Palazzo Mirto è una casa aristocratica conservata dove cammini in stanze arredate. Non restaurata, non ricreata, effettivamente lasciata. La stanza di fumo turca ha sedili bassi. La cappella ha oro e affreschi.",nt:"€6. Chiuso domeniche. 10-18 altri giorni (spesso chiuso 13-16 per pausa). Via Merlo 2, Kalsa. Piccolo gruppo. 45 minuti, non un pomeriggio."},
{id:118,n:"Addaura Beach — Locals\' Swimming Spot",a:"Addaura",v:["swimming","quiet","local"],d:15,s:"A fishing village beach 15 minutes north where locals actually go swim and nobody tries to sell you anything.",st:"Mondello is overrun. Addaura is a working fishing area on the northern coast. Small beach, locals only, no deckchairs or beach clubs. The water is clear. There\'s a bar that serves coffee and panini. Fishermen repair nets in the afternoon. It\'s the place where Palermo goes to actually swim, not to be seen swimming.",im:"2pm. Three locals in the water. Fishermen mending nets on the sand. A small bar in the background, red umbrellas, espresso cups.",t:"AMAT bus 225 from Central (30 min). Go early before the few locals arrive if you want more space. Water clear May-October. Bring cash. Bar opens 6am, closes around 6pm. Wednesday is fish auction day in the morning if you want to see that.",c:["swimming","local_only"],r:"g",nn:"Spiaggia Addaura — Posto da Nuotatori Locali",ns:"Villaggio di pescatori 15 minuti nord dove i locali vanno veramente a nuotare.",nst:"Mondello è strapiena. Addaura è una zona di pesca che funziona sulla costa nord. Piccola spiaggia, solo locali, senza sdraio. L\'acqua è trasparente. C\'è un bar che serve caffè e panini. Pescatori riparano reti al pomeriggio.",nt:"AMAT 225 da Centrale, 30 min. Vai presto prima dei pochi locali. Acqua chiara maggio-ottobre. Portare contanti. Bar 6-18. Mercoledì asta pesce al mattino."},
{id:119,n:"Tina Bastiania — Fresh Pasta Workshop",a:"Ballarò",v:["local","food","weird"],d:3,s:"A 72-year-old woman teaches fresh pasta in her home kitchen for €15, yelling in Sicilian the entire time.",st:"Tina runs her kitchen the way her mother and grandmother ran theirs. No English. No marketing. She teaches handmade busiate (Sicilian pasta) in the mornings for €15. You make 6-8 pieces. She yells at you (lovingly) when you fold it wrong. You eat what you made with her simple sauce. It takes 2 hours. You leave with pasta-under-your-fingernails and an understanding of why Sicilian food tastes like it does.",im:"Tina\'s kitchen, 9am. Your hands dusted with semolina. Tina\'s voice loud and theatrical. Locals in and out buying caciocavallo (cheese). The smell of boiling pasta and her sauce.",t:"Must arrange in advance through local host (Airbnb, Withlocals, or direct—word of mouth). €15. Ballarò neighborhood, early morning. She doesn\'t have a website. She has a kitchen. Bring an appetite and patience with hand-teaching. The experience matters more than the skill outcome.",c:["local_only","food"],r:"g",nn:"Tina Bastiania — Laboratorio di Pasta Fresca",ns:"Donna di 72 anni insegna pasta fresca a casa sua per €15, urlando in siciliano.",nst:"Tina gestisce la sua cucina come sua madre e nonna. Nessun inglese. Nessun marketing. Insegna busiate fatte a mano al mattino per €15. Fai 6-8 pezzi. Tina ti urla (amorevolmente) quando lo pieghi male. Mangi quello che hai fatto con il suo sugo semplice.",nt:"Deve essere organizzato in anticipo tramite ospite locale. €15. Ballarò, mattina. Ha una cucina. Portare appetito e pazienza."},
{id:120,n:"Santuario di Santa Rosalia — Inside the Cave",a:"Monte Pellegrino",v:["history","weird","beautiful"],d:18,s:"Inside a cave hollowed out of the mountain is a saint\'s shrine that glows in candlelight of 500 years of devotion.",st:"Santa Rosalia is the patron saint of Palermo and died in a cave on Monte Pellegrino in 1166. The cave is still there, still active. You descend into the mountain and find a shrine covered in flowers, candles, plaques from people asking for help. Women still bring their daughters here. The air is stone and wax and centuries. The shrine is lit almost entirely by candlelight from visitors.",im:"Inside the cave. Dim, candlelit, smells of wax and stone. Your eyes adjusting to the light. The shrine ahead glowing gold from candles.",t:"Bus 806 to Mondello or walk from central (steep 45 min). Entry free. Sanctuary is inside the mountain, always open, always cool. Bring a light jacket. If you want to understand Palermo\'s soul, this is the clearest window into it.",c:["history_big","beautiful","weird"],r:"g",nn:"Santuario di Santa Rosalia — Dentro la Grotta",ns:"Dentro una grotta scavata nella montagna è un santuario che brilla alla luce delle candele di 500 anni di devozione.",nst:"Santa Rosalia è la santa patrona di Palermo e morì in una grotta su Monte Pellegrino nel 1166. La grotta è ancora lì, ancora attiva. Discendi nella montagna e trovi un santuario coperto di fiori, candele, targhe. Donne portano ancora le figlie qui.",nt:"Bus 806 a Mondello o a piedi da centrale (ripido 45 min). Ingresso libero. Santuario dentro la montagna, sempre aperto, sempre fresco. Portare una leggera giacca."},
{id:121,n:"Biblioteca Centrale — Rooftop Sunset View",a:"Kalsa",v:["free entry","quiet","high_spots"],d:5,s:"A university library with a rooftop that overlooks the city and almost nobody knows to go up there.",st:"The Central Library of Sicily sits in a modern building in Kalsa. The rooftop has a 360-degree view of Palermo—the harbor, the mountains, the neighborhoods spreading out in all directions. It\'s open to the public, free, and almost completely empty. You can sit there for an hour and see maybe one other person. Bring a book. Watch the light change.",im:"5pm, rooftop alone. The city below, the harbor to the north, mountains to the south. The light starting to turn golden.",t:"Via Alloro, Kalsa. Free entry. Building hours typically 9am-8pm. Ask at the desk to access rooftop. No ticket, no signature. Just go. The few security guards don\'t care. Best 4-6pm for light. Summer brings heat, so autumn/spring is better.",c:["high_spots","quiet"],r:"g",nn:"Biblioteca Centrale — Veduta Tramonto Tetto",ns:"Una biblioteca universitaria con un tetto che domina la città e quasi nessuno sa di salire.",nst:"La Biblioteca Centrale della Sicilia si trova in un edificio moderno a Kalsa. Il tetto ha una vista a 360 gradi di Palermo—il porto, le montagne, i quartieri che si allargano in tutte le direzioni. È aperta al pubblico, gratuita, e quasi completamente vuota.",nt:"Via Alloro, Kalsa. Ingresso gratuito. Orario edifizio tipicamente 9-20. Chiedi alla reception di accedere al tetto. Nessun biglietto. Meglio 16-18 per la luce."},
{id:122,n:"Mondino — Morning Fruit Market",a:"Vucciria",v:["markets","food","local"],d:1,s:"The fruit auction market where Palermo restaurants get their produce, open 5-9am, free to watch.",st:"While tourists sleep, wholesale fruit and vegetable traders gather at Mondino. Boxes of lemons, oranges, eggplants, tomatoes. Vendors shout prices in Sicilian. Restaurants buy for the day. The noise is beautiful. The smell is citrus and earth. It\'s authentically crowded—not with tourists, with work. Grab an espresso from a bar vendor. Watch the choreography of commerce.",im:"6:30am. Chaos. Boxes being moved. Vendors yelling. A woman with a clipboard ticking off orders. The smell of fresh citrus overwhelming.",t:"Vucciria area, early morning only. Hours 5-9am approximately. No entry fee. Just show up. Cash only at the bars. Wear something you don\'t mind getting dirt on. Come hungry—the pasta-makers are already cooking their first batch.",c:["markets","food","early_morning"],r:"g",nn:"Mondino — Mercato Frutta al Mattino",ns:"Il mercato dell\'asta della frutta dove i ristoranti di Palermo prendono il loro prodotto, 5-9 mattino.",nst:"Mentre i turisti dormono, i commercianti di frutta e verdura all\'ingrosso si riuniscono a Mondino. Scatole di limoni, arance, melanzane, pomodori. Venditori urlano prezzi in siciliano. I ristoranti comprano per la giornata. Il rumore è bellissimo.",nt:"Area Vucciria, solo mattina. Circa 5-9. Nessuna tassa di ingresso. Basta venire. Solo contanti ai bar. Indossa qualcosa che non ti dispiace sporcare."},
{id:123,n:"Mondello — Rocky South Point",a:"Mondello",v:["swimming","beautiful","sunset"],d:14,s:"The beach\'s southern tip where fishermen pull boats onto rocks, water is deep enough to dive, sunset hits rocks like a furnace.",st:"Mondello Beach is beautiful but crowded. The southern rocky point (past the main sandy beach) is where locals enter the water. The rocks are limestone, weathered smooth. The seabed drops quickly to deep water. It\'s safer and better for jumping and diving than the sandy area. At sunset, the rocks glow and the water is clear and gold. It\'s maybe 5 minutes past the tourist part, but it feels completely different.",im:"4:30pm on the rocks. The water is clear sapphire. The rocks are warm under your feet. Two fishermen in the distance hauling nets.",t:"AMAT bus 806, 30 min from Central. Walk south along the beach past the crowded area. Rocky point is natural and free. Water November-May can be cold, June-October ideal. Bring water shoes if you\'re tender-footed. Sunset best May-August.",c:["swimming","beautiful","sunset"],r:"g",nn:"Mondello — Punta Rocciosa Sud",ns:"La punta meridionale della spiaggia dove i pescatori tirano barche sulle rocce.",nst:"La spiaggia di Mondello è bella ma affollata. La punta rocciosa meridionale è dove i locali entrano in acqua. Le rocce sono calcarenite, levigate dal tempo. Il fondale marino scende rapidamente in acque profonde. È più sicuro e migliore per saltare che l\'area sabbiosa.",nt:"AMAT 806, 30 min da Centrale. Cammina a sud lungo la spiaggia oltre l\'area affollata. Punta rocciosa è naturale e gratuita. Novembre-maggio acqua fredda, giugno-ottobre ideale."}

<h1 className="text-2xl font-black" style={{color:"#1a1a2e"}}>{lang==="native"&&p.nn?p.nn:p.n}</h1>
{lang==="native"&&p.nn&&<p className="text-sm font-medium" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-sm mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p>
{PLACE_IMAGES[p.id]&&<div className="mt-4 rounded-xl overflow-hidden" style={{maxHeight:"400px"}}>
<img src={`images/${PLACE_IMAGES[p.id]}`} alt={p.n} style={{width:"100%",maxHeight:"360px",objectFit:"contain",display:"block",borderRadius:"8px"}}/>
<p className="text-xs mt-1" style={{color:"#aaa",textAlign:"center"}}>AI-generated illustration</p></div>}
<div className="mt-4 p-4 rounded-xl" style={{background:"#f8f8ff"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#1a1a2e"}}>The Story</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nst?p.nst:p.st}</p></div>
{p.im&&<div className="mt-3 p-4 rounded-xl" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#a78bfa"}}>Imagine This</h3>
<p className="text-sm" style={{color:"#b8b0d0",lineHeight:1.7,fontStyle:"italic"}}>{p.im}</p></div>}
{p.t&&<div className="mt-3 p-4 rounded-xl" style={{background:"#f0fdf4"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#166534"}}>{lang==="native"?"Tips / "+LANG_NAME:"Tips"}</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nt?p.nt:p.t}</p>
<a href={`https://maps.google.com/?q=${encodeURIComponent(p.n+', '+CITY_EN)}`} target="_blank" rel="noopener noreferrer"
  className="mt-3 flex items-center gap-2 text-sm font-bold"
  style={{color:"#166534",textDecoration:"none",display:"inline-flex",marginTop:"10px"}}>
  🗺 Get directions
</a>
</div>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
const TBGS={"places":"https://mariavheland.github.io/godostuff/textures/tex05.png","collections":"https://mariavheland.github.io/godostuff/textures/tex08.png","missions":"https://mariavheland.github.io/godostuff/textures/tex08.png","plan":"https://mariavheland.github.io/godostuff/textures/tex08.png","phrases":"https://mariavheland.github.io/godostuff/textures/tex05.png","default":"https://mariavheland.github.io/godostuff/textures/tex05.png"};if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
{/* dark scrim over photo */}
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:`url(\'${TBGS[tab]||TBGS.default}\') center/cover no-repeat`}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Palermo Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Palermo Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
