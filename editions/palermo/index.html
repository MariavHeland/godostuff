const P = [,
  {name:'Giardino di Villa Sperlinga',area:'Sperlinga',desc:'Un piccolo giardino nascosto dietro le mura di Villa Sperlinga, perfetto per una pausa slow tra palme e panchine ombreggiate, dove i locali si riuniscono per chiacchierare al tramonto. Raggiungibile con bus 101 da Piazza Castelnuovo, fermata Sperlinga. I palermitani lo adorano per la sua pace autentica, lontano dal caos. Free.',tags:['park','hidden','local','free'],lat:38.1275,lng:13.3502},
  {name:'Belvedere di Monte Pellegrino',area:'Monte Pellegrino',desc:'Un viewpoint segreto su un sentiero minore del monte, con panorami mozzafiato su Palermo e il mare, ideale per slow hiking. Bus 812 da Piazza Politeama fino alla base, poi 20 minuti a piedi. Locali lo usano per picnic privati e foto uniche. Free.',tags:['viewpoint','hidden','local','free'],lat:38.1333,lng:13.3333},
  {name:'Cortile di Palazzo Alliata di Villafranca',area:'Centro Storico',desc:'Cortile barocco nascosto accessibile solo su invito locale o eventi gratuiti, con fontane e atmosfera nobiliare. Chiedi ai residenti in Via del Celso; bus 101 o 104. I palermitani lo condividono su Instagram per la sua magia dimenticata. Free during open days.',tags:['courtyard','hidden','local','free'],lat:38.1167,lng:13.36},
  {name:'Mercato di Ballarò Angolo Nascosto',area:'Ballarò (Albergheria)',desc:'Il vicolo dietro la piazza principale di Ballarò con banchi di street food e spezie che solo i locals conoscono, vivo di voci e colori autentici. Bus 101 fermata Ballarò. Adorato per i prezzi bassissimi e l'energia comunitaria. Free to wander, food €1-3.',tags:['market','local','street art','cheap'],lat:38.1105,lng:13.3442},
  {name:'Parco della Favorita Sentiero Libero',area:'Favorita',desc:'Sentiero ombroso e poco battuto nel grande parco, con laghetti e fauna locale per una passeggiata contemplativa. Bus 812 da Via Libertà. Locals ci vanno per jog slow e relax con cane. Free.',tags:['park','hidden','local','free'],lat:38.105,lng:13.312},
  {name:'Murales di Borgo Vecchio',area:'Borgo Vecchio',desc:'Serie di street art underground su palazzi fatiscenti, raffiguranti vita palermitana, scovati da influencer locali su TikTok. Bus 106 da Politeama. I giovani locals lo visitano per foto creative e vibe autentica. Free.',tags:['street art','hidden','local','free'],lat:38.122,lng:13.37},
  {name:'Piazza Marina Giardino Segreto',area:'Kalsa',desc:'Angolo verde nascosto in Piazza Marina con ficus secolari e panchine per osservare la vita lenta del quartiere. Bus 809 o tram 1. Famiglie locali lo usano per merende improvvisate. Free.',tags:['park','hidden','local','free'],lat:38.1125,lng:13.381},
  {name:'Terrazza di Capuchin Convento',area:'Capuchin',desc:'Vista panoramica dalla terrazza del convento, accessibile gratuitamente nei giorni feriali, su tetti e campanili. Bus 327 da Piazza Independenza. Monache e locals pregano qui in pace. Free.',tags:['viewpoint','hidden','local','free'],lat:38.13,lng:13.355},
  {name:'Cortile di Casa Professa',area:'Tribunali',desc:'Cortile gesuitico segreto con mosaici e storia viva, condiviso in gruppi FB locali per visite spontanee. Bus 104. I devoti palermitani ci vanno per momenti di riflessione. Free.',tags:['courtyard','hidden','local','free'],lat:38.118,lng:13.365},
  {name:'Spiazzo Street Art Brancaccio',area:'Brancaccio',desc:'Murales giganti anti-mafia in un quartiere periferico, potenti e raw, scoperti da blog slow travel. Bus 646 da Stazione Centrale. Community locale li difende come simbolo di riscatto. Free.',tags:['street art','local','hidden','free'],lat:38.095,lng:13.395},
  {id:1,n:"Ballarò Market — Ballarò",a:"Ballarò",v:["local", "history"],d:2,s:"Screaming vendors, dangling octopus, pure chaos",st:"Medieval market unchanged 500 years. Vendors yell in Sicilian, fish glistens. Arancini €1. Real Palermo.",im:"1500: Arab traders set up. 2024: Same chaos, better phones.",t:"Go 7am-11am. Small bills. Don\'t photograph without asking.",c:["local_only", "history_big"],r:"g",nn:"Mercato del Ballarò — Ballarò",ns:"Venditori che gridano, polpi pendenti, caos puro",nst:"Mercato medievale immutato 500 anni. Venditori gridano, pesce luccica. Arancini €1. Vero Palermo.",nt:"Vai 7-11. Banconote piccole. Non fotografare senza chiedere."},
  {id:2,n:"Vucciria Market — Vucciria",a:"Vucciria",v:["local", "free"],d:1,s:"Film-famous market labyrinth screaming in Sicilian",st:"Maze of alleys. Pasta vendors hand-roll fusilli. Panelle (fried chickpea) €0.80. Sensory overload. You get lost. You love it.",im:"1600s: Actors improvised here. 2024: Tourists improvise getting lost.",t:"Backpack. Cash only. 9am best light before crowds.",c:["local_only", "history_big"],r:"g",nn:"Mercato Vucciria — Vucciria",ns:"Labirinto di mercato famoso nel film che urla in siciliano",nst:"Labirinto di vicoli. Venditori di pasta arrotolano a mano. Panelle €0.80. Sovraccarico sensoriale. Ti perdi. Ti ama.",nt:"Zaino. Solo contanti. 9 luce migliore."},
  {id:3,n:"Cappuccini Catacombs — Vergine",a:"Vergine",v:["scary", "history"],d:3,s:"8,000 mummified corpses dressed in rags hanging on walls",st:"Underground chapel. Skeletons on walls labeled by name/profession. Unsettling. Eerie silence. Deeply weird. Not for lunch before.",im:"1600s: Wealthy chose mummification. 2024: They\'re still hanging.",t:"Guide €5. Claustrophobes reconsider.",c:["scary", "history_big"],r:"y",nn:"Catacombe dei Cappuccini — Vergine",ns:"8.000 cadaveri mummificati vestiti di stracci appesi ai muri",nst:"Cappella sotterranea. Scheletri su muri etichettati. Inquietante. Silenzio strano. Non prima di pranzo.",nt:"Guida €5. Claustrofobici riconsiderano."},
  {id:4,n:"Mondello Beach — Mondello (20km)",a:"Mondello",v:["beautiful", "nature"],d:20,s:"Beach tram from city. Golden sand, clear water.",st:"Tram €1.40. Italian families chaotically sunbathing. Gelato, aperitivo bars. Swimming with nonna. Arancini shacks. Summer energy infectious.",im:"1900s: Railway connects beach. 2024: Same tram runs.",t:"Midweek for fewer crowds. Sunscreen.",c:["parks", "nature"],r:"g",nn:"Spiaggia di Mondello — Mondello (20km)",ns:"Spiaggia collegata da tram. Sabbia dorata, acqua limpida.",nst:"Tram €1,40. Famiglie italiane prendono sole caoticamente. Gelato, aperitivo. Estate contagiosa.",nt:"Mercoledì per meno folle. Crema solare."},
  {id:5,n:"Teatro Massimo — Massimo",a:"Massimo",v:["beautiful", "history"],d:1,s:"Opera house where Godfather was filmed",st:"Neoclassical theater (1897). Red velvet seats, gilded boxes, frescoed ceilings. Decayed 25 years, restored 2000. Grand staircase alone makes it worth it.",im:"1900: Elite arrive in carriages. 1974: Godfather climbed here. 2024: You walk same steps.",t:"€10 tours. 9am-6pm. Book ahead for performances.",c:["history_big", "architecture"],r:"g",nn:"Teatro Massimo — Massimo",ns:"Teatro dell\'opera dove è stato girato Il Padrino",nst:"Teatro neoclassico (1897). Sedili velluto rosso, palchi dorati. Restaurato 2000. Grande scala merita.",nt:"€10 tour. 9-18. Prenota per spettacoli."},
  {id:6,n:"Kalsa Quarter Ruins — Kalsa",a:"Kalsa",v:["hidden", "history"],d:1,s:"Bombed-out WWII district gorgeously decaying",st:"Collapsing Renaissance palaces, bombed churches. Locals live in ruins. Street art covers bullet holes. Beautiful, haunting, real Palermo underneath postcard.",im:"1943: Allied bombs. 1980s: Artists move in. 2024: Regenerating.",t:"Walk in daylight first. Support local cafés.",c:["history_big", "street_art"],r:"g",nn:"Quartiere Kalsa — Kalsa",ns:"Distretto WWII bombardato che si deteriora bellamente",nst:"Palazzi rinascimentali che crollano. Localasiti vivono in rovine. Arte di strada copre i fori. Bellezza inquietante.",nt:"Cammina di giorno. Supporta caffè locali."},
  {id:7,n:"Arab-Norman Churches Trail — Various",a:"Various",v:["history", "beautiful"],d:2,s:"Sicily\'s 12th-century Islamic-Christian fusion",st:"Martorana (golden mosaics), San Cataldo (tiny dome), Pantocrator (intricate ceilings). Byzantine, Arab, Christian in one room. Profound.",im:"1150: Normans and Arabs build together. 2024: You stand in their harmony.",t:"€2 each. Go early. Sunlight = magic.",c:["history_big", "architecture"],r:"g",nn:"Chiese Arabo-Normanne — Varie",ns:"Fusione islamico-cristiana del XII secolo della Sicilia",nst:"Martorana (mosaici dorati), San Cataldo (cupola piccola), Pantocrator. Tutti in una stanza. Profondo.",nt:"€2 ciascuno. Vai presto. Luce sole = magia."},
  {id:8,n:"Orto Botanico (Botanical Garden) — Borgo",a:"Borgo Vecchio",v:["beautiful", "quiet"],d:2,s:"Hidden botanical oasis where time stopped 1789",st:"Founded 1789. Walled garden with palms, Victorian glasshouses, zero tourists. Secret escape for Palermo kids. 10,000 plants worldwide feel.",im:"1789: Botanists collect specimens. 2024: Still collecting, still quiet.",t:"€10. Noon best—nobody there. Water.",c:["parks", "quiet"],r:"g",nn:"Orto Botanico — Borgo",ns:"Oasi botanica nascosta dove il tempo si fermò 1789",nst:"Fondato 1789. Giardino murato con palme. Zero turisti. Scena dai tropici.",nt:"€10. Mezzogiorno nessuno. Acqua."},
  {id:9,n:"Cefalù Medieval Town — Day Trip (170km)",a:"Cefalù",v:["beautiful", "history"],d:170,s:"Postcard fishing village with 12th-century cathedral",st:"Train 2.5 hours. Medieval town on rocky headland. Norman cathedral, winding alleys, pebble beach. Fishermen mend nets. Feel 1200.",im:"1131: Normans build cathedral. 2024: Climb 178 steps same view.",t:"€15 train. Stay overnight €30. Headland sunset.",c:["history_big", "architecture"],r:"g",nn:"Cefalù Medievale — Gita (170km)",ns:"Villaggio di pescatori con cattedrale del XII secolo",nst:"Treno 2,5 ore. Città medievale su promontorio. Cattedrale normanna, vicoli, spiaggia. Pescatori riparano reti.",nt:"€15 treno. Perno €30. Tramonto promontorio."},
  {id:10,n:"Monreale Cathedral — Day Trip (40km)",a:"Monreale",v:["history", "beautiful"],d:40,s:"13,000 sqm Byzantine mosaics in mountaintop cathedral",st:"Bus €2 up mountain. Norman cathedral (1174). Entire walls gold mosaics. Christ Pantocrator stares from apse. Overwhelming. Hilltop café views.",im:"1174: Normans spend fortune on gold. Still costs you to see.",t:"€2 bus. Early morning, light before noon. Water.",c:["history_big", "architecture"],r:"g",nn:"Cattedrale di Monreale — Gita (40km)",ns:"13.000 mq di mosaici bizantini in cattedrale in cima montagna",nst:"Autobus €2 su montagna. Cattedrale normanna (1174). Muri interi mosaici oro. Cristo Pantocrator dall\'abside. Travolgente.",nt:"€2 autobus. Mattina presto, luce prima mezzogiorno. Acqua."},

<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Palermo Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
