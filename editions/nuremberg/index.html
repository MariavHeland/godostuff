const P = [
  {id:1,n:"Kaiserburg Imperial Castle — Altstadt",a:"Altstadt",v:["history","beautiful","high_spots"],d:45,s:"The medieval castle above the city — official residence of every Holy Roman Emperor for 500 years",st:"Kaiserburg was the most important castle in the Holy Roman Empire from 1050 to 1571. Every emperor was required to hold his first Imperial Diet here. The outer courtyard and the view over the old town are free.",im:"Time-travel: the Holy Roman Emperor arriving at this castle with a court of 1,000 nobles, 1500",t:"Courtyard free. Interior charges (€7 includes Palas and Deep Well).",c:["history_big"],r:"g",nn:"Kaiserburg — Altstadt",ns:"Die mittelalterliche Burg — offizielle Residenz jedes Heiligen Römischen Kaisers",nst:"Die Kaiserburg war von 1050 bis 1571 die wichtigste Burg im Heiligen Römischen Reich.",nt:"Innenhof gratis. Innenräume gegen Gebühr (7 €)."},
  {id:2,n:"Hauptmarkt Medieval Square — Altstadt",a:"Altstadt",v:["beautiful","history","local"],d:20,s:"The medieval market square with the Schöner Brunnen — free all year round",st:"The Hauptmarkt has been Nuremberg\'s central square since the 14th century. The Schöner Brunnen (Beautiful Fountain) with its golden ring, the Gothic Frauenkirche, and the daily market make it perpetually alive.",im:"Time-travel: the Hauptmarkt as a Jewish ghetto before the Emperor expelled the community, 1349",t:"Always free. Daily market Mon–Sat.",c:["history_big"],r:"g",nn:"Hauptmarkt — Altstadt",ns:"Der mittelalterliche Marktplatz mit dem Schöner Brunnen",nst:"Der Hauptmarkt ist seit dem 14. Jahrhundert Nürnbergs Zentralplatz.",nt:"Immer gratis. Tagesmarkt Mo–Sa."},
  {id:3,n:"Documentation Centre Nazi Rally Grounds — Zabo",a:"Zabo",v:["history","scary","local"],d:90,s:"Europe\'s best documentation of the Nazi period — inside Speer\'s unfinished Congress Hall",st:"Albert Speer began the Congress Hall in 1935 — it would have been the largest building in the world. It was never finished. Today it houses a permanent exhibition on how the Nazis came to power. Essential, unflinching, extremely well done.",im:"Time-travel: 700,000 people gathered on the parade ground, watching the Führer speak, 1937",t:"Entry fee (€7). Open daily. Allow 2 hours.",c:["scary"],r:"g",nn:"Dokumentationszentrum Reichsparteitagsgelände — Zabo",ns:"Europas beste Dokumentation der NS-Zeit",nst:"Albert Speer begann die Kongresshalle 1935. Heute beherbergt sie eine Dauerausstellung.",nt:"Eintritt (7 €). Täglich geöffnet. 2 Stunden einplanen."},
  {id:4,n:"Trials Courtroom 600 — Altstadt",a:"Altstadt",v:["history","scary","architecture"],d:60,s:"The actual courtroom where the Nuremberg Trials were held — still operational",st:"Courtroom 600 in the Nuremberg Palace of Justice hosted the International Military Tribunal from 1945–1946. It still functions as a court. The accompanying exhibition tells the story of international law.",im:"Time-travel: Göring, Hess, Ribbentrop sitting in the dock in this very room, November 1945",t:"Exhibition entry (€6). Courtroom visible from above when court not in session.",c:["history_big"],r:"g",nn:"Schwurgerichtssaal 600 — Altstadt",ns:"Der Gerichtssaal der Nürnberger Prozesse — noch in Betrieb",nst:"Saal 600 beherbergte das Internationale Militärtribunal 1945–1946.",nt:"Ausstellung (6 €). Gerichtssaal von oben sichtbar."},
  {id:5,n:"Albrecht Dürer House — Altstadt",a:"Altstadt",v:["history","art","architecture"],d:40,s:"The home of Germany\'s greatest Renaissance artist — walk through Dürer\'s actual studio",st:"Albrecht Dürer lived in this house from 1509 until his death in 1528. The rooms are furnished as they were in his lifetime. The actor in costume playing his wife Agnes is an unexpected delight.",im:"Time-travel: Dürer at work in this studio, printing woodcuts that spread across Europe, 1515",t:"Entry €6. Open daily.",c:["art"],r:"g",nn:"Albrecht-Dürer-Haus — Altstadt",ns:"Das Zuhause von Deutschlands größtem Renaissancekünstler",nst:"Albrecht Dürer lebte 1509–1528 in diesem Haus.",nt:"Eintritt 6 €. Täglich geöffnet."},
  {id:6,n:"Handwerkerhof Craftsmen\'s Courtyard — Altstadt",a:"Altstadt",v:["local","art","architecture"],d:30,s:"A medieval courtyard of working craft studios — potters, jewellers, glassblowers, and lacemakers",st:"The Handwerkerhof is a reconstruction of a medieval craftsmen\'s quarter built into the Königstor (King\'s Gate). The workshops are real — you can watch and buy directly. Free to enter the courtyard.",im:"Time-travel: the medieval guilds of Nuremberg among the most powerful in the Empire, 1450",t:"Free to enter courtyard. Open daily, morning–early evening.",c:["courtyards"],r:"g",nn:"Handwerkerhof — Altstadt",ns:"Ein mittelalterlicher Handwerkerhof in der Königstormauer",nst:"Der Handwerkerhof ist ein Nachbau eines mittelalterlichen Handwerkerviertels.",nt:"Innenhof kostenlos. Täglich morgens bis frühabends geöffnet."},
  {id:7,n:"St. Johannis Cemetery — St. Johannis",a:"St. Johannis",v:["history","beautiful","quiet"],d:30,s:"Germany\'s oldest Lutheran burial ground — Dürer, Hans Sachs, and Peter Henle all rest here",st:"St. Johannisfriedhof was established in 1518 and contains the graves of the most important figures of the Reformation era. Albrecht Dürer\'s grave is at plot 649. The epitaphs carved by master craftsmen are extraordinary.",im:"Time-travel: the citizens of Reformation Nuremberg burying their dead outside the city walls, 1520",t:"Free. Open daily. Map at the entrance shows famous graves.",c:["famous_dead"],r:"g",nn:"St. Johannis-Friedhof — St. Johannis",ns:"Deutschlands ältester lutherischer Friedhof — hier ruhen Dürer, Sachs und Henle",nst:"Der Friedhof wurde 1518 angelegt und enthält Gräber der bedeutendsten Reformationsgestalten.",nt:"Gratis. Täglich geöffnet. Karte am Eingang."},
  {id:8,n:"Gostenhof Street Art Walk — Gostenhof",a:"Gostenhof",v:["street_art","local","art"],d:30,s:"Nuremberg\'s immigrant and creative quarter — the best street art in Franconia",st:"GoHo (Gostenhof) is Nuremberg\'s most mixed and vibrant neighbourhood. Turkish bakeries, student bars, and an extraordinary concentration of street murals. Walk Gostenhofer Hauptstraße and the surrounding lanes.",im:"Time-travel: Gostenhof as a workers\' district of metal factories before the artists arrived, 1970",t:"Free always. Best walked on weekday afternoons.",c:["street_art"],r:"g",nn:"Gostenhof Street Art — Gostenhof",ns:"Nürnbergs Einwanderer- und Kreativviertel — die beste Straßenkunst in Franken",nst:"GoHo (Gostenhof) ist Nürnbergs gemischtestes Viertel.",nt:"Immer gratis."},
  {id:9,n:"Maxfeld Wochenmärkte — Maxfeld",a:"Maxfeld",v:["local","free","hidden"],d:25,s:"The weekly markets of Maxfeld district — the real Nuremberg under the tourist surface",st:"The Maxfeld neighbourhood holds small weekly markets on Tuesday and Friday mornings. Local farmers, Turkish and Greek food stalls, and very little English spoken. Bratwurst is half the price of the old town.",im:"Time-travel: Maxfeld as a garden suburb where bourgeoisie kept weekend allotments, 1900",t:"Free. Tuesdays and Fridays, 7am–1pm.",c:["local_only"],r:"g",nn:"Maxfeld Wochenmärkte — Maxfeld",ns:"Die Wochenmärkte des Maxfeld-Viertels — das echte Nürnberg",nst:"Das Maxfeld-Viertel hält dienstags und freitags Wochenmärkte ab.",nt:"Gratis. Di und Fr, 7–13 Uhr."},
  {id:10,n:"Nuremberg Reichswald Forest — Zabo",a:"Zabo",v:["nature","local","quiet"],d:60,s:"The 7000-hectare city forest — cycling, running, silence of the Empire\'s former hunting ground",st:"The Reichswald was the hunting ground of the Holy Roman Emperors for 500 years. Today it is Nuremberg\'s municipal forest, crossed by 200 km of marked trails. Free cycling and hiking from the tram terminus.",im:"Time-travel: the Emperor\'s hunting party riding into this forest, game controlled for the imperial table, 1500",t:"Free. Tram line 9 to Zerzabelshof, then walk into the forest.",c:["parks"],r:"g",nn:"Nürnberger Reichswald — Zabo",ns:"Der 7000-Hektar-Stadtwald — Fahrrad, Joggen, Stille",nst:"Der Reichswald war das Jagdgebiet der Heiligen Römischen Kaiser.",nt:"Gratis. Straßenbahn Linie 9 nach Zerzabelshof."},
  {id:11,n:"Pegnitz Riverside Walk — Wöhrd",a:"Wöhrd",v:["nature","beautiful","local"],d:30,s:"Walk the Pegnitz river through the old city — islands, medieval mills, and weir gardens",st:"The Pegnitz splits into two channels inside the old town, creating a string of islands. The riverside walk passes the Henkersteg (Hangman\'s Bridge), the Insel Schütt park, and the Trödelmarkt flea market bridge.",im:"Time-travel: the Pegnitz powering medieval tanning, papermilling, and grinding industries, 1550",t:"Free always. Best route from Weinmarkt to the Trödelmarkt.",c:["romantic_water"],r:"g",nn:"Pegnitz-Uferweg — Wöhrd",ns:"Spaziergang entlang der Pegnitz durch die Altstadt",nst:"Die Pegnitz teilt sich in der Altstadt in zwei Arme auf und bildet eine Inselkette.",nt:"Immer gratis."},
  {id:12,n:"Trödelmarkt Bridge Market — Altstadt",a:"Altstadt",v:["local","history","free"],d:25,s:"An antiques and junk market on the medieval bridge over the Pegnitz — every Saturday morning",st:"The Trödelmarkt is held on two islands in the Pegnitz connected by the Fleischbrücke. Books, vinyl, silverware, Bavarian antiques, and all manner of junk. The bridge itself dates to 1598.",im:"Time-travel: the same bridge as Nuremberg\'s main meat market, surrounded by butcher stalls, 1600",t:"Free. Saturdays, 8am–3pm.",c:["local_only"],r:"g",nn:"Trödelmarkt — Altstadt",ns:"Ein Antiquitäten- und Trödelmarkt auf der mittelalterlichen Brücke über die Pegnitz",nst:"Der Trödelmarkt findet auf zwei Inseln in der Pegnitz statt.",nt:"Gratis. Samstags 8–15 Uhr."},
  {id:13,n:"Fürth Old Town Day Trip — Fürth",a:"Fürth",v:["history","hidden","local"],d:60,s:"Nuremberg\'s twin city 12 minutes away — best-preserved Gründerzeit architecture in Bavaria",st:"Fürth was an independent city for centuries, developing differently from Nuremberg. Its 19th-century townhouses, Jewish history, and quiet old town are extraordinary. Henry Kissinger was born here. Take the U1.",im:"Time-travel: Fürth and Nuremberg as fierce commercial rivals — the first German railway ran between them, 1835",t:"Free to walk. U1 from Nuremberg (12 min, standard ticket).",c:["history_big"],r:"g",nn:"Fürther Altstadt — Fürth",ns:"Nürnbergs Zwillingsstadt — die best erhaltene Gründerzeitarchitektur Bayerns",nst:"Fürth war jahrhundertelang eine unabhängige Stadt.",nt:"Gratis zu Fuß. U1 ab Nürnberg (12 min)."},
  {id:14,n:"Erlangen Botanical Garden — Erlangen",a:"Erlangen",v:["nature","hidden","quiet"],d:60,s:"University botanical garden 20 km north — free entry, extraordinary collection, almost no tourists",st:"The Erlangen Botanical Garden has been tended by the university since 1828. Greenhouses, a rock garden, medicinal plants, and formal baroque garden sections. Locals use it as a park. Free entry.",im:"Time-travel: first Erlangen professors teaching plant anatomy to students in this garden, 1828",t:"Free. Open daily. S-Bahn to Erlangen (20 min), then 10 min walk.",c:["parks"],r:"g",nn:"Erlanger Botanischer Garten — Erlangen",ns:"Universitätsbotanischer Garten 20 km nördlich — kostenlos, außergewöhnliche Sammlung",nst:"Der Erlanger Botanische Garten wird seit 1828 von der Universität gepflegt.",nt:"Gratis. Täglich geöffnet. S-Bahn nach Erlangen (20 min)."},
  {id:15,n:"St. Sebald Church — Altstadt",a:"Altstadt",v:["architecture","history","beautiful"],d:20,s:"Nuremberg\'s oldest church — Peter Vischer\'s bronze shrine is a German Renaissance masterpiece",st:"St. Sebaldus is a 13th-century Romanesque basilica with Gothic additions. Peter Vischer\'s bronze shrine of St Sebald (1519) is one of the finest works of German Renaissance metalwork. Free to enter.",im:"Time-travel: Peter Vischer and his five sons casting the bronze shrine in their workshop, 1508–1519",t:"Free. Open daily.",c:["architecture"],r:"g",nn:"St.-Sebaldus-Kirche — Altstadt",ns:"Nürnbergs älteste Kirche — der Bronzeschrein des Hl. Sebald",nst:"Die St.-Sebaldus-Kirche ist eine romanische Basilika aus dem 13. Jahrhundert.",nt:"Gratis. Täglich geöffnet."},
  {id:16,n:"Stadtpark — Maxfeld",a:"Maxfeld",v:["nature","local","beautiful"],d:30,s:"Nuremberg\'s main city park — pond, sculptures, outdoor chess, and excellent shade",st:"The Stadtpark was laid out in the English landscape style in 1893. The large pond reflects the surrounding trees. Local chess players occupy permanent stone boards daily.",im:"Time-travel: Nuremberg\'s industrial bourgeoisie promenading here on Sunday afternoons, 1900",t:"Free. Open daily.",c:["parks"],r:"g",nn:"Stadtpark — Maxfeld",ns:"Nürnbergs Hauptstadtpark — Teich, Skulpturen, Freiluftschach",nst:"Der Stadtpark wurde 1893 im englischen Landschaftsstil angelegt.",nt:"Gratis. Täglich geöffnet."},
  {id:17,n:"Fembohaus City Museum — Altstadt",a:"Altstadt",v:["architecture","history","hidden"],d:40,s:"Nuremberg\'s finest merchant palace — a 1598 Renaissance house with an extraordinary city model",st:"The Fembohaus was built in 1598 as the home of a Dutch merchant. The attic room contains an 18th-century model of Nuremberg, with every house and church detailed in miniature.",im:"Time-travel: the Fembo merchant family receiving clients in this ornate room, their wealth on display, 1620",t:"Entry €6. Open daily except Mon.",c:["history_big"],r:"g",nn:"Fembohaus — Altstadt",ns:"Nürnbergs feinster Kaufmannspalast — ein Renaissance-Haus von 1598",nst:"Das Fembohaus wurde 1598 als Wohnsitz eines niederländischen Kaufmanns gebaut.",nt:"Eintritt 6 €. Täglich außer Mo."},
  {id:18,n:"Lochgefängnis Medieval Dungeon — Altstadt",a:"Altstadt",v:["scary","history","hidden"],d:40,s:"The original medieval prison cells under the Rathaus — torture chamber included",st:"The Lochgefängnis is accessed through the Altes Rathaus. The prison has 12 cells, interrogation chambers, and instruments of torture from the 14th–18th centuries. It is extremely well preserved.",im:"Time-travel: a Nuremberg criminal being lowered into these cells in absolute darkness, 1600",t:"Entry fee (€3.50). Open daily April–Oct.",c:["scary"],r:"g",nn:"Lochgefängnis — Altstadt",ns:"Die mittelalterlichen Gefängniszellen unter dem Rathaus",nst:"Das Lochgefängnis ist über das Alte Rathaus zugänglich.",nt:"Eintrittspreis (3,50 €). April–Okt täglich."},
  {id:19,n:"Henkersteg Hangman\'s Bridge — Wöhrd",a:"Wöhrd",v:["history","beautiful","weird"],d:15,s:"The Hangman\'s Bridge — a covered medieval wooden bridge to the executioner\'s island home",st:"The Henkersteg is a small covered wooden bridge that gave the city hangman access to his house on the Pegnitz island. Nuremberg\'s executioner was a city employee who lived here.",im:"Time-travel: the hangman returning home over this private bridge after a public execution, 1750",t:"Free, always accessible.",c:["romantic_water"],r:"g",nn:"Henkersteg — Wöhrd",ns:"Die Henkerbrücke — eine überdachte mittelalterliche Holzbrücke",nst:"Der Henkersteg ist eine kleine überdachte Holzbrücke.",nt:"Gratis, immer zugänglich."},
  {id:20,n:"Fürth Jewish Museum — Fürth",a:"Fürth",v:["history","local","hidden"],d:50,s:"The history of one of Bavaria\'s most important Jewish communities — Kissinger\'s hometown",st:"Fürth\'s Jewish community was one of the largest in the Holy Roman Empire. The museum occupies a former Jewish school and documents the community\'s 300-year history.",im:"Time-travel: the Fürth Jewish community at its peak — 3,000 people, 6 synagogues, a full world, 1900",t:"Entry fee (€5). Open Tue–Sun. U1 from Nuremberg.",c:["history_big"],r:"g",nn:"Jüdisches Museum Franken — Fürth",ns:"Die Geschichte einer der wichtigsten jüdischen Gemeinden Bayerns",nst:"Fürths jüdische Gemeinde war eine der größten im Heiligen Römischen Reich.",nt:"Eintritt (5 €). Di–So. U1 ab Nürnberg."},
  {id:21,n:"Nuremberg Zoo — Zabo",a:"Zabo",v:["nature","local","free"],d:60,s:"One of Germany\'s largest zoos — famous for its dolphin programme and African savannah",st:"The Nuremberg Zoo is known for its naturalistic enclosures. The African savannah houses giraffes and elephants. The dolphin habitat is free with entry.",im:"Time-travel: the zoo opening in 1912 in the Reichswald, the first zoo outside a German city centre",t:"Entry fee (€16.50). Half-day works well.",c:["parks"],r:"g",nn:"Tiergarten Nürnberg — Zabo",ns:"Einer der größten Zoos Deutschlands",nst:"Der Nürnberger Tiergarten ist bekannt für seine naturgetreuen Gehege.",nt:"Eintritt (16,50 €). Halbtag einplanen."},
  {id:22,n:"Wöhrd Island River Swim — Wöhrd",a:"Wöhrd",v:["nature","local","hidden"],d:30,s:"A quiet stretch of the Pegnitz where students swim in summer — almost no tourists",st:"The Wöhrd island in the Pegnitz has a stretch of shallow river bank used for summer swimming. Very local, very quiet. Children play in the current; adults read on the grass.",im:"Time-travel: the island as a public execution ground in the medieval period, before the trees grew",t:"Free. Summer only. Walk east from Altstadt along the Pegnitz.",c:["local_only"],r:"g",nn:"Wöhrd Insel Schwimmen — Wöhrd",ns:"Eine ruhige Pegnitz-Stelle, wo Studenten im Sommer schwimmen",nst:"Die Wöhrd-Insel in der Pegnitz hat eine Flachwasserstelle.",nt:"Gratis. Nur im Sommer."},
  {id:23,n:"Erlangen Huguenot Town — Erlangen",a:"Erlangen",v:["history","hidden","architecture"],d:45,s:"A perfect baroque grid town built for Protestant refugees — Erlangen\'s secret gem",st:"When Louis XIV revoked religious freedom in 1685, Protestant Huguenots fled to Protestant states. Erlangen was built for them: a perfect baroque grid laid out in 1686. The market square and Margrave\'s Palace are extraordinary.",im:"Time-travel: 1,200 Huguenot refugees arriving and building this planned town, 1686",t:"Free to walk. S-Bahn from Nuremberg (20 min).",c:["history_big"],r:"g",nn:"Erlanger Hugenottenstadt — Erlangen",ns:"Eine perfekte Barockstadt für protestantische Flüchtlinge",nst:"Als Ludwig XIV. 1685 die Religionsfreiheit widerrief, flohen Hugenotten nach Erlangen.",nt:"Gratis zu Fuß. S-Bahn ab Nürnberg (20 min)."},
  {id:24,n:"St. Lorenz Church — Altstadt",a:"Altstadt",v:["architecture","beautiful","history"],d:20,s:"The Gothic masterpiece of Nuremberg — Veit Stoss\'s Annunciation sculpture hangs inside",st:"St. Lorenz is a 13th-century Gothic basilica. Veit Stoss\'s limewood Annunciation sculpture (1517) hangs in the choir. The rose window is extraordinary. Free to enter.",im:"Time-travel: Veit Stoss carving this linden wood sculpture in his workshop nearby, 1516",t:"Free. Open daily.",c:["architecture"],r:"g",nn:"St.-Lorenz-Kirche — Altstadt",ns:"Das gotische Meisterwerk Nürnbergs",nst:"St. Lorenz ist eine gotische Basilika. Die hängende Verkündigungsskulptur ist im Chor.",nt:"Gratis. Täglich geöffnet."},
  {id:25,n:"Gostenhof Turkish Market — Gostenhof",a:"Gostenhof",v:["local","free","hidden"],d:25,s:"The informal Turkish market in GoHo — produce, spices, and Nuremberg\'s most diverse food",st:"Gostenhofer Hauptstraße has a concentration of Turkish, Greek, and Middle Eastern food shops that function as an informal daily market. Every morning vendors set up outside. Very local.",im:"Time-travel: Gostenhof as the destination of first Turkish Gastarbeiter arriving in Nuremberg, 1960",t:"Free. Open mornings daily.",c:["local_only"],r:"g",nn:"Gostenhof Türkischer Markt — Gostenhof",ns:"Der informelle türkische Markt in GoHo",nst:"Die Gostenhofer Hauptstraße hat eine Konzentration türkischer und orientalischer Geschäfte.",nt:"Gratis. Täglich morgens."},
  {id:26,n:"Kaiserburg Imperial Castle — Altstadt #26",a:"Altstadt",v:["history","beautiful","high_spots"],d:45,s:"The medieval castle above the city — official residence of every Holy Roman Emperor for 500 years",st:"Kaiserburg was the most important castle in the Holy Roman Empire from 1050 to 1571. Every emperor was required to hold his first Imperial Diet here. The outer courtyard and the view over the old town are free.",im:"Time-travel: the Holy Roman Emperor arriving at this castle with a court of 1,000 nobles, 1500",t:"Courtyard free. Interior charges (€7 includes Palas and Deep Well).",c:["history_big"],r:"g",nn:"Kaiserburg — Altstadt #26",ns:"Die mittelalterliche Burg — offizielle Residenz jedes Heiligen Römischen Kaisers",nst:"Die Kaiserburg war von 1050 bis 1571 die wichtigste Burg im Heiligen Römischen Reich.",nt:"Innenhof gratis. Innenräume gegen Gebühr (7 €)."},
  {id:27,n:"Hauptmarkt Medieval Square — Altstadt #27",a:"Altstadt",v:["beautiful","history","local"],d:12,s:"The medieval market square with the Schöner Brunnen — free all year round",st:"The Hauptmarkt has been Nuremberg\'s central square since the 14th century. The Schöner Brunnen (Beautiful Fountain) with its golden ring, the Gothic Frauenkirche, and the daily market make it perpetually alive.",im:"Time-travel: the Hauptmarkt as a Jewish ghetto before the Emperor expelled the community, 1349",t:"Always free. Daily market Mon–Sat.",c:["high_spots"],r:"g",nn:"Hauptmarkt — Altstadt #27",ns:"Der mittelalterliche Marktplatz mit dem Schöner Brunnen",nst:"Der Hauptmarkt ist seit dem 14. Jahrhundert Nürnbergs Zentralplatz.",nt:"Immer gratis. Tagesmarkt Mo–Sa."},
  {id:28,n:"Documentation Centre Nazi Rally Grounds — Zabo #28",a:"Zabo",v:["history","scary","local"],d:6,s:"Europe\'s best documentation of the Nazi period — inside Speer\'s unfinished Congress Hall",st:"Albert Speer began the Congress Hall in 1935 — it would have been the largest building in the world. It was never finished. Today it houses a permanent exhibition on how the Nazis came to power. Essential, unflinching, extremely well done.",im:"Time-travel: 700,000 people gathered on the parade ground, watching the Führer speak, 1937",t:"Entry fee (€7). Open daily. Allow 2 hours.",c:["parks"],r:"g",nn:"Dokumentationszentrum Reichsparteitagsgelände — Zabo #28",ns:"Europas beste Dokumentation der NS-Zeit",nst:"Albert Speer begann die Kongresshalle 1935. Heute beherbergt sie eine Dauerausstellung.",nt:"Eintritt (7 €). Täglich geöffnet. 2 Stunden einplanen."},
  {id:29,n:"Trials Courtroom 600 — Altstadt #29",a:"Altstadt",v:["history","scary","architecture"],d:52,s:"The actual courtroom where the Nuremberg Trials were held — still operational",st:"Courtroom 600 in the Nuremberg Palace of Justice hosted the International Military Tribunal from 1945–1946. It still functions as a court. The accompanying exhibition tells the story of international law.",im:"Time-travel: Göring, Hess, Ribbentrop sitting in the dock in this very room, November 1945",t:"Exhibition entry (€6). Courtroom visible from above when court not in session.",c:["courtyards"],r:"g",nn:"Schwurgerichtssaal 600 — Altstadt #29",ns:"Der Gerichtssaal der Nürnberger Prozesse — noch in Betrieb",nst:"Saal 600 beherbergte das Internationale Militärtribunal 1945–1946.",nt:"Ausstellung (6 €). Gerichtssaal von oben sichtbar."},
  {id:30,n:"Albrecht Dürer House — Altstadt #30",a:"Altstadt",v:["history","art","architecture"],d:22,s:"The home of Germany\'s greatest Renaissance artist — walk through Dürer\'s actual studio",st:"Albrecht Dürer lived in this house from 1509 until his death in 1528. The rooms are furnished as they were in his lifetime. The actor in costume playing his wife Agnes is an unexpected delight.",im:"Time-travel: Dürer at work in this studio, printing woodcuts that spread across Europe, 1515",t:"Entry €6. Open daily.",c:["romantic_water"],r:"g",nn:"Albrecht-Dürer-Haus — Altstadt #30",ns:"Das Zuhause von Deutschlands größtem Renaissancekünstler",nst:"Albrecht Dürer lebte 1509–1528 in diesem Haus.",nt:"Eintritt 6 €. Täglich geöffnet."},
  {id:31,n:"Handwerkerhof Craftsmen\'s Courtyard — Altstadt #31",a:"Altstadt",v:["local","art","architecture"],d:20,s:"A medieval courtyard of working craft studios — potters, jewellers, glassblowers, and lacemakers",st:"The Handwerkerhof is a reconstruction of a medieval craftsmen\'s quarter built into the Königstor (King\'s Gate). The workshops are real — you can watch and buy directly. Free to enter the courtyard.",im:"Time-travel: the medieval guilds of Nuremberg among the most powerful in the Empire, 1450",t:"Free to enter courtyard. Open daily, morning–early evening.",c:["scary"],r:"g",nn:"Handwerkerhof — Altstadt #31",ns:"Ein mittelalterlicher Handwerkerhof in der Königstormauer",nst:"Der Handwerkerhof ist ein Nachbau eines mittelalterlichen Handwerkerviertels.",nt:"Innenhof kostenlos. Täglich morgens bis frühabends geöffnet."},
  {id:32,n:"St. Johannis Cemetery — St. Johannis #32",a:"St. Johannis",v:["history","beautiful","quiet"],d:19,s:"Germany\'s oldest Lutheran burial ground — Dürer, Hans Sachs, and Peter Henle all rest here",st:"St. Johannisfriedhof was established in 1518 and contains the graves of the most important figures of the Reformation era. Albrecht Dürer\'s grave is at plot 649. The epitaphs carved by master craftsmen are extraordinary.",im:"Time-travel: the citizens of Reformation Nuremberg burying their dead outside the city walls, 1520",t:"Free. Open daily. Map at the entrance shows famous graves.",c:["famous_dead"],r:"g",nn:"St. Johannis-Friedhof — St. Johannis #32",ns:"Deutschlands ältester lutherischer Friedhof — hier ruhen Dürer, Sachs und Henle",nst:"Der Friedhof wurde 1518 angelegt und enthält Gräber der bedeutendsten Reformationsgestalten.",nt:"Gratis. Täglich geöffnet. Karte am Eingang."},
  {id:33,n:"Gostenhof Street Art Walk — Gostenhof #33",a:"Gostenhof",v:["street_art","local","art"],d:13,s:"Nuremberg\'s immigrant and creative quarter — the best street art in Franconia",st:"GoHo (Gostenhof) is Nuremberg\'s most mixed and vibrant neighbourhood. Turkish bakeries, student bars, and an extraordinary concentration of street murals. Walk Gostenhofer Hauptstraße and the surrounding lanes.",im:"Time-travel: Gostenhof as a workers\' district of metal factories before the artists arrived, 1970",t:"Free always. Best walked on weekday afternoons.",c:["street_art"],r:"g",nn:"Gostenhof Street Art — Gostenhof #33",ns:"Nürnbergs Einwanderer- und Kreativviertel — die beste Straßenkunst in Franken",nst:"GoHo (Gostenhof) ist Nürnbergs gemischtestes Viertel.",nt:"Immer gratis."},
  {id:34,n:"Maxfeld Wochenmärkte — Maxfeld #34",a:"Maxfeld",v:["local","free","hidden"],d:52,s:"The weekly markets of Maxfeld district — the real Nuremberg under the tourist surface",st:"The Maxfeld neighbourhood holds small weekly markets on Tuesday and Friday mornings. Local farmers, Turkish and Greek food stalls, and very little English spoken. Bratwurst is half the price of the old town.",im:"Time-travel: Maxfeld as a garden suburb where bourgeoisie kept weekend allotments, 1900",t:"Free. Tuesdays and Fridays, 7am–1pm.",c:["abandoned"],r:"g",nn:"Maxfeld Wochenmärkte — Maxfeld #34",ns:"Die Wochenmärkte des Maxfeld-Viertels — das echte Nürnberg",nst:"Das Maxfeld-Viertel hält dienstags und freitags Wochenmärkte ab.",nt:"Gratis. Di und Fr, 7–13 Uhr."},
  {id:35,n:"Nuremberg Reichswald Forest — Zabo #35",a:"Zabo",v:["nature","local","quiet"],d:11,s:"The 7000-hectare city forest — cycling, running, silence of the Empire\'s former hunting ground",st:"The Reichswald was the hunting ground of the Holy Roman Emperors for 500 years. Today it is Nuremberg\'s municipal forest, crossed by 200 km of marked trails. Free cycling and hiking from the tram terminus.",im:"Time-travel: the Emperor\'s hunting party riding into this forest, game controlled for the imperial table, 1500",t:"Free. Tram line 9 to Zerzabelshof, then walk into the forest.",c:["free_museum"],r:"g",nn:"Nürnberger Reichswald — Zabo #35",ns:"Der 7000-Hektar-Stadtwald — Fahrrad, Joggen, Stille",nst:"Der Reichswald war das Jagdgebiet der Heiligen Römischen Kaiser.",nt:"Gratis. Straßenbahn Linie 9 nach Zerzabelshof."},
  {id:36,n:"Pegnitz Riverside Walk — Wöhrd #36",a:"Wöhrd",v:["nature","beautiful","local"],d:48,s:"Walk the Pegnitz river through the old city — islands, medieval mills, and weir gardens",st:"The Pegnitz splits into two channels inside the old town, creating a string of islands. The riverside walk passes the Henkersteg (Hangman\'s Bridge), the Insel Schütt park, and the Trödelmarkt flea market bridge.",im:"Time-travel: the Pegnitz powering medieval tanning, papermilling, and grinding industries, 1550",t:"Free always. Best route from Weinmarkt to the Trödelmarkt.",c:["local_only"],r:"g",nn:"Pegnitz-Uferweg — Wöhrd #36",ns:"Spaziergang entlang der Pegnitz durch die Altstadt",nst:"Die Pegnitz teilt sich in der Altstadt in zwei Arme auf und bildet eine Inselkette.",nt:"Immer gratis."},
  {id:37,n:"Trödelmarkt Bridge Market — Altstadt #37",a:"Altstadt",v:["local","history","free"],d:52,s:"An antiques and junk market on the medieval bridge over the Pegnitz — every Saturday morning",st:"The Trödelmarkt is held on two islands in the Pegnitz connected by the Fleischbrücke. Books, vinyl, silverware, Bavarian antiques, and all manner of junk. The bridge itself dates to 1598.",im:"Time-travel: the same bridge as Nuremberg\'s main meat market, surrounded by butcher stalls, 1600",t:"Free. Saturdays, 8am–3pm.",c:["architecture"],r:"g",nn:"Trödelmarkt — Altstadt #37",ns:"Ein Antiquitäten- und Trödelmarkt auf der mittelalterlichen Brücke über die Pegnitz",nst:"Der Trödelmarkt findet auf zwei Inseln in der Pegnitz statt.",nt:"Gratis. Samstags 8–15 Uhr."},
  {id:38,n:"Fürth Old Town Day Trip — Fürth #38",a:"Fürth",v:["history","hidden","local"],d:39,s:"Nuremberg\'s twin city 12 minutes away — best-preserved Gründerzeit architecture in Bavaria",st:"Fürth was an independent city for centuries, developing differently from Nuremberg. Its 19th-century townhouses, Jewish history, and quiet old town are extraordinary. Henry Kissinger was born here. Take the U1.",im:"Time-travel: Fürth and Nuremberg as fierce commercial rivals — the first German railway ran between them, 1835",t:"Free to walk. U1 from Nuremberg (12 min, standard ticket).",c:["history_big"],r:"g",nn:"Fürther Altstadt — Fürth #38",ns:"Nürnbergs Zwillingsstadt — die best erhaltene Gründerzeitarchitektur Bayerns",nst:"Fürth war jahrhundertelang eine unabhängige Stadt.",nt:"Gratis zu Fuß. U1 ab Nürnberg (12 min)."},
  {id:39,n:"Erlangen Botanical Garden — Erlangen #39",a:"Erlangen",v:["nature","hidden","quiet"],d:10,s:"University botanical garden 20 km north — free entry, extraordinary collection, almost no tourists",st:"The Erlangen Botanical Garden has been tended by the university since 1828. Greenhouses, a rock garden, medicinal plants, and formal baroque garden sections. Locals use it as a park. Free entry.",im:"Time-travel: first Erlangen professors teaching plant anatomy to students in this garden, 1828",t:"Free. Open daily. S-Bahn to Erlangen (20 min), then 10 min walk.",c:["high_spots"],r:"g",nn:"Erlanger Botanischer Garten — Erlangen #39",ns:"Universitätsbotanischer Garten 20 km nördlich — kostenlos, außergewöhnliche Sammlung",nst:"Der Erlanger Botanische Garten wird seit 1828 von der Universität gepflegt.",nt:"Gratis. Täglich geöffnet. S-Bahn nach Erlangen (20 min)."},
  {id:40,n:"St. Sebald Church — Altstadt #40",a:"Altstadt",v:["architecture","history","beautiful"],d:42,s:"Nuremberg\'s oldest church — Peter Vischer\'s bronze shrine is a German Renaissance masterpiece",st:"St. Sebaldus is a 13th-century Romanesque basilica with Gothic additions. Peter Vischer\'s bronze shrine of St Sebald (1519) is one of the finest works of German Renaissance metalwork. Free to enter.",im:"Time-travel: Peter Vischer and his five sons casting the bronze shrine in their workshop, 1508–1519",t:"Free. Open daily.",c:["parks"],r:"g",nn:"St.-Sebaldus-Kirche — Altstadt #40",ns:"Nürnbergs älteste Kirche — der Bronzeschrein des Hl. Sebald",nst:"Die St.-Sebaldus-Kirche ist eine romanische Basilika aus dem 13. Jahrhundert.",nt:"Gratis. Täglich geöffnet."},
  {id:41,n:"Stadtpark — Maxfeld #41",a:"Maxfeld",v:["nature","local","beautiful"],d:32,s:"Nuremberg\'s main city park — pond, sculptures, outdoor chess, and excellent shade",st:"The Stadtpark was laid out in the English landscape style in 1893. The large pond reflects the surrounding trees. Local chess players occupy permanent stone boards daily.",im:"Time-travel: Nuremberg\'s industrial bourgeoisie promenading here on Sunday afternoons, 1900",t:"Free. Open daily.",c:["courtyards"],r:"g",nn:"Stadtpark — Maxfeld #41",ns:"Nürnbergs Hauptstadtpark — Teich, Skulpturen, Freiluftschach",nst:"Der Stadtpark wurde 1893 im englischen Landschaftsstil angelegt.",nt:"Gratis. Täglich geöffnet."},
  {id:42,n:"Fembohaus City Museum — Altstadt #42",a:"Altstadt",v:["architecture","history","hidden"],d:7,s:"Nuremberg\'s finest merchant palace — a 1598 Renaissance house with an extraordinary city model",st:"The Fembohaus was built in 1598 as the home of a Dutch merchant. The attic room contains an 18th-century model of Nuremberg, with every house and church detailed in miniature.",im:"Time-travel: the Fembo merchant family receiving clients in this ornate room, their wealth on display, 1620",t:"Entry €6. Open daily except Mon.",c:["romantic_water"],r:"g",nn:"Fembohaus — Altstadt #42",ns:"Nürnbergs feinster Kaufmannspalast — ein Renaissance-Haus von 1598",nst:"Das Fembohaus wurde 1598 als Wohnsitz eines niederländischen Kaufmanns gebaut.",nt:"Eintritt 6 €. Täglich außer Mo."},
  {id:43,n:"Lochgefängnis Medieval Dungeon — Altstadt #43",a:"Altstadt",v:["scary","history","hidden"],d:6,s:"The original medieval prison cells under the Rathaus — torture chamber included",st:"The Lochgefängnis is accessed through the Altes Rathaus. The prison has 12 cells, interrogation chambers, and instruments of torture from the 14th–18th centuries. It is extremely well preserved.",im:"Time-travel: a Nuremberg criminal being lowered into these cells in absolute darkness, 1600",t:"Entry fee (€3.50). Open daily April–Oct.",c:["scary"],r:"g",nn:"Lochgefängnis — Altstadt #43",ns:"Die mittelalterlichen Gefängniszellen unter dem Rathaus",nst:"Das Lochgefängnis ist über das Alte Rathaus zugänglich.",nt:"Eintrittspreis (3,50 €). April–Okt täglich."},
  {id:44,n:"Henkersteg Hangman\'s Bridge — Wöhrd #44",a:"Wöhrd",v:["history","beautiful","weird"],d:10,s:"The Hangman\'s Bridge — a covered medieval wooden bridge to the executioner\'s island home",st:"The Henkersteg is a small covered wooden bridge that gave the city hangman access to his house on the Pegnitz island. Nuremberg\'s executioner was a city employee who lived here.",im:"Time-travel: the hangman returning home over this private bridge after a public execution, 1750",t:"Free, always accessible.",c:["famous_dead"],r:"g",nn:"Henkersteg — Wöhrd #44",ns:"Die Henkerbrücke — eine überdachte mittelalterliche Holzbrücke",nst:"Der Henkersteg ist eine kleine überdachte Holzbrücke.",nt:"Gratis, immer zugänglich."},
  {id:45,n:"Fürth Jewish Museum — Fürth #45",a:"Fürth",v:["history","local","hidden"],d:18,s:"The history of one of Bavaria\'s most important Jewish communities — Kissinger\'s hometown",st:"Fürth\'s Jewish community was one of the largest in the Holy Roman Empire. The museum occupies a former Jewish school and documents the community\'s 300-year history.",im:"Time-travel: the Fürth Jewish community at its peak — 3,000 people, 6 synagogues, a full world, 1900",t:"Entry fee (€5). Open Tue–Sun. U1 from Nuremberg.",c:["street_art"],r:"g",nn:"Jüdisches Museum Franken — Fürth #45",ns:"Die Geschichte einer der wichtigsten jüdischen Gemeinden Bayerns",nst:"Fürths jüdische Gemeinde war eine der größten im Heiligen Römischen Reich.",nt:"Eintritt (5 €). Di–So. U1 ab Nürnberg."},
  {id:46,n:"Nuremberg Zoo — Zabo #46",a:"Zabo",v:["nature","local","free"],d:19,s:"One of Germany\'s largest zoos — famous for its dolphin programme and African savannah",st:"The Nuremberg Zoo is known for its naturalistic enclosures. The African savannah houses giraffes and elephants. The dolphin habitat is free with entry.",im:"Time-travel: the zoo opening in 1912 in the Reichswald, the first zoo outside a German city centre",t:"Entry fee (€16.50). Half-day works well.",c:["abandoned"],r:"g",nn:"Tiergarten Nürnberg — Zabo #46",ns:"Einer der größten Zoos Deutschlands",nst:"Der Nürnberger Tiergarten ist bekannt für seine naturgetreuen Gehege.",nt:"Eintritt (16,50 €). Halbtag einplanen."},
  {id:47,n:"Wöhrd Island River Swim — Wöhrd #47",a:"Wöhrd",v:["nature","local","hidden"],d:37,s:"A quiet stretch of the Pegnitz where students swim in summer — almost no tourists",st:"The Wöhrd island in the Pegnitz has a stretch of shallow river bank used for summer swimming. Very local, very quiet. Children play in the current; adults read on the grass.",im:"Time-travel: the island as a public execution ground in the medieval period, before the trees grew",t:"Free. Summer only. Walk east from Altstadt along the Pegnitz.",c:["free_museum"],r:"g",nn:"Wöhrd Insel Schwimmen — Wöhrd #47",ns:"Eine ruhige Pegnitz-Stelle, wo Studenten im Sommer schwimmen",nst:"Die Wöhrd-Insel in der Pegnitz hat eine Flachwasserstelle.",nt:"Gratis. Nur im Sommer."},
  {id:48,n:"Erlangen Huguenot Town — Erlangen #48",a:"Erlangen",v:["history","hidden","architecture"],d:43,s:"A perfect baroque grid town built for Protestant refugees — Erlangen\'s secret gem",st:"When Louis XIV revoked religious freedom in 1685, Protestant Huguenots fled to Protestant states. Erlangen was built for them: a perfect baroque grid laid out in 1686. The market square and Margrave\'s Palace are extraordinary.",im:"Time-travel: 1,200 Huguenot refugees arriving and building this planned town, 1686",t:"Free to walk. S-Bahn from Nuremberg (20 min).",c:["local_only"],r:"g",nn:"Erlanger Hugenottenstadt — Erlangen #48",ns:"Eine perfekte Barockstadt für protestantische Flüchtlinge",nst:"Als Ludwig XIV. 1685 die Religionsfreiheit widerrief, flohen Hugenotten nach Erlangen.",nt:"Gratis zu Fuß. S-Bahn ab Nürnberg (20 min)."},
  {id:49,n:"St. Lorenz Church — Altstadt #49",a:"Altstadt",v:["architecture","beautiful","history"],d:6,s:"The Gothic masterpiece of Nuremberg — Veit Stoss\'s Annunciation sculpture hangs inside",st:"St. Lorenz is a 13th-century Gothic basilica. Veit Stoss\'s limewood Annunciation sculpture (1517) hangs in the choir. The rose window is extraordinary. Free to enter.",im:"Time-travel: Veit Stoss carving this linden wood sculpture in his workshop nearby, 1516",t:"Free. Open daily.",c:["architecture"],r:"g",nn:"St.-Lorenz-Kirche — Altstadt #49",ns:"Das gotische Meisterwerk Nürnbergs",nst:"St. Lorenz ist eine gotische Basilika. Die hängende Verkündigungsskulptur ist im Chor.",nt:"Gratis. Täglich geöffnet."},
  {id:50,n:"Gostenhof Turkish Market — Gostenhof #50",a:"Gostenhof",v:["local","free","hidden"],d:40,s:"The informal Turkish market in GoHo — produce, spices, and Nuremberg\'s most diverse food",st:"Gostenhofer Hauptstraße has a concentration of Turkish, Greek, and Middle Eastern food shops that function as an informal daily market. Every morning vendors set up outside. Very local.",im:"Time-travel: Gostenhof as the destination of first Turkish Gastarbeiter arriving in Nuremberg, 1960",t:"Free. Open mornings daily.",c:["history_big"],r:"g",nn:"Gostenhof Türkischer Markt — Gostenhof #50",ns:"Der informelle türkische Markt in GoHo",nst:"Die Gostenhofer Hauptstraße hat eine Konzentration türkischer und orientalischer Geschäfte.",nt:"Gratis. Täglich morgens."},

  {id:56,n:"Handwerkerhof Craftsmen\'s Courtyard — Altstadt #56",a:"Altstadt",v:["local","art","architecture"],d:31,s:"A medieval courtyard of working craft studios — potters, jewellers, glassblowers, and lacemakers",st:"The Handwerkerhof is a reconstruction of a medieval craftsmen\'s quarter built into the Königstor (King\'s Gate). The workshops are real — you can watch and buy directly. Free to enter the courtyard.",im:"Time-travel: the medieval guilds of Nuremberg among the most powerful in the Empire, 1450",t:"Free to enter courtyard. Open daily, morning–early evening.",c:["famous_dead"],r:"g",nn:"Handwerkerhof — Altstadt #56",ns:"Ein mittelalterlicher Handwerkerhof in der Königstormauer",nst:"Der Handwerkerhof ist ein Nachbau eines mittelalterlichen Handwerkerviertels.",nt:"Innenhof kostenlos. Täglich morgens bis frühabends geöffnet."},
  {id:57,n:"St. Johannis Cemetery — St. Johannis #57",a:"St. Johannis",v:["history","beautiful","quiet"],d:19,s:"Germany\'s oldest Lutheran burial ground — Dürer, Hans Sachs, and Peter Henle all rest here",st:"St. Johannisfriedhof was established in 1518 and contains the graves of the most important figures of the Reformation era. Albrecht Dürer\'s grave is at plot 649. The epitaphs carved by master craftsmen are extraordinary.",im:"Time-travel: the citizens of Reformation Nuremberg burying their dead outside the city walls, 1520",t:"Free. Open daily. Map at the entrance shows famous graves.",c:["street_art"],r:"g",nn:"St. Johannis-Friedhof — St. Johannis #57",ns:"Deutschlands ältester lutherischer Friedhof — hier ruhen Dürer, Sachs und Henle",nst:"Der Friedhof wurde 1518 angelegt und enthält Gräber der bedeutendsten Reformationsgestalten.",nt:"Gratis. Täglich geöffnet. Karte am Eingang."},
  {id:58,n:"Gostenhof Street Art Walk — Gostenhof #58",a:"Gostenhof",v:["street_art","local","art"],d:33,s:"Nuremberg\'s immigrant and creative quarter — the best street art in Franconia",st:"GoHo (Gostenhof) is Nuremberg\'s most mixed and vibrant neighbourhood. Turkish bakeries, student bars, and an extraordinary concentration of street murals. Walk Gostenhofer Hauptstraße and the surrounding lanes.",im:"Time-travel: Gostenhof as a workers\' district of metal factories before the artists arrived, 1970",t:"Free always. Best walked on weekday afternoons.",c:["abandoned"],r:"g",nn:"Gostenhof Street Art — Gostenhof #58",ns:"Nürnbergs Einwanderer- und Kreativviertel — die beste Straßenkunst in Franken",nst:"GoHo (Gostenhof) ist Nürnbergs gemischtestes Viertel.",nt:"Immer gratis."},
  {id:59,n:"Maxfeld Wochenmärkte — Maxfeld #59",a:"Maxfeld",v:["local","free","hidden"],d:42,s:"The weekly markets of Maxfeld district — the real Nuremberg under the tourist surface",st:"The Maxfeld neighbourhood holds small weekly markets on Tuesday and Friday mornings. Local farmers, Turkish and Greek food stalls, and very little English spoken. Bratwurst is half the price of the old town.",im:"Time-travel: Maxfeld as a garden suburb where bourgeoisie kept weekend allotments, 1900",t:"Free. Tuesdays and Fridays, 7am–1pm.",c:["free_museum"],r:"g",nn:"Maxfeld Wochenmärkte — Maxfeld #59",ns:"Die Wochenmärkte des Maxfeld-Viertels — das echte Nürnberg",nst:"Das Maxfeld-Viertel hält dienstags und freitags Wochenmärkte ab.",nt:"Gratis. Di und Fr, 7–13 Uhr."},
  {id:60,n:"Nuremberg Reichswald Forest — Zabo #60",a:"Zabo",v:["nature","local","quiet"],d:22,s:"The 7000-hectare city forest — cycling, running, silence of the Empire\'s former hunting ground",st:"The Reichswald was the hunting ground of the Holy Roman Emperors for 500 years. Today it is Nuremberg\'s municipal forest, crossed by 200 km of marked trails. Free cycling and hiking from the tram terminus.",im:"Time-travel: the Emperor\'s hunting party riding into this forest, game controlled for the imperial table, 1500",t:"Free. Tram line 9 to Zerzabelshof, then walk into the forest.",c:["local_only"],r:"g",nn:"Nürnberger Reichswald — Zabo #60",ns:"Der 7000-Hektar-Stadtwald — Fahrrad, Joggen, Stille",nst:"Der Reichswald war das Jagdgebiet der Heiligen Römischen Kaiser.",nt:"Gratis. Straßenbahn Linie 9 nach Zerzabelshof."},
  {id:61,n:"Pegnitz Riverside Walk — Wöhrd #61",a:"Wöhrd",v:["nature","beautiful","local"],d:5,s:"Walk the Pegnitz river through the old city — islands, medieval mills, and weir gardens",st:"The Pegnitz splits into two channels inside the old town, creating a string of islands. The riverside walk passes the Henkersteg (Hangman\'s Bridge), the Insel Schütt park, and the Trödelmarkt flea market bridge.",im:"Time-travel: the Pegnitz powering medieval tanning, papermilling, and grinding industries, 1550",t:"Free always. Best route from Weinmarkt to the Trödelmarkt.",c:["architecture"],r:"g",nn:"Pegnitz-Uferweg — Wöhrd #61",ns:"Spaziergang entlang der Pegnitz durch die Altstadt",nst:"Die Pegnitz teilt sich in der Altstadt in zwei Arme auf und bildet eine Inselkette.",nt:"Immer gratis."},
  {id:62,n:"Trödelmarkt Bridge Market — Altstadt #62",a:"Altstadt",v:["local","history","free"],d:53,s:"An antiques and junk market on the medieval bridge over the Pegnitz — every Saturday morning",st:"The Trödelmarkt is held on two islands in the Pegnitz connected by the Fleischbrücke. Books, vinyl, silverware, Bavarian antiques, and all manner of junk. The bridge itself dates to 1598.",im:"Time-travel: the same bridge as Nuremberg\'s main meat market, surrounded by butcher stalls, 1600",t:"Free. Saturdays, 8am–3pm.",c:["history_big"],r:"g",nn:"Trödelmarkt — Altstadt #62",ns:"Ein Antiquitäten- und Trödelmarkt auf der mittelalterlichen Brücke über die Pegnitz",nst:"Der Trödelmarkt findet auf zwei Inseln in der Pegnitz statt.",nt:"Gratis. Samstags 8–15 Uhr."},
  {id:63,n:"Fürth Old Town Day Trip — Fürth #63",a:"Fürth",v:["history","hidden","local"],d:15,s:"Nuremberg\'s twin city 12 minutes away — best-preserved Gründerzeit architecture in Bavaria",st:"Fürth was an independent city for centuries, developing differently from Nuremberg. Its 19th-century townhouses, Jewish history, and quiet old town are extraordinary. Henry Kissinger was born here. Take the U1.",im:"Time-travel: Fürth and Nuremberg as fierce commercial rivals — the first German railway ran between them, 1835",t:"Free to walk. U1 from Nuremberg (12 min, standard ticket).",c:["high_spots"],r:"g",nn:"Fürther Altstadt — Fürth #63",ns:"Nürnbergs Zwillingsstadt — die best erhaltene Gründerzeitarchitektur Bayerns",nst:"Fürth war jahrhundertelang eine unabhängige Stadt.",nt:"Gratis zu Fuß. U1 ab Nürnberg (12 min)."},
  {id:64,n:"Erlangen Botanical Garden — Erlangen #64",a:"Erlangen",v:["nature","hidden","quiet"],d:49,s:"University botanical garden 20 km north — free entry, extraordinary collection, almost no tourists",st:"The Erlangen Botanical Garden has been tended by the university since 1828. Greenhouses, a rock garden, medicinal plants, and formal baroque garden sections. Locals use it as a park. Free entry.",im:"Time-travel: first Erlangen professors teaching plant anatomy to students in this garden, 1828",t:"Free. Open daily. S-Bahn to Erlangen (20 min), then 10 min walk.",c:["parks"],r:"g",nn:"Erlanger Botanischer Garten — Erlangen #64",ns:"Universitätsbotanischer Garten 20 km nördlich — kostenlos, außergewöhnliche Sammlung",nst:"Der Erlanger Botanische Garten wird seit 1828 von der Universität gepflegt.",nt:"Gratis. Täglich geöffnet. S-Bahn nach Erlangen (20 min)."},
  {id:65,n:"St. Sebald Church — Altstadt #65",a:"Altstadt",v:["architecture","history","beautiful"],d:32,s:"Nuremberg\'s oldest church — Peter Vischer\'s bronze shrine is a German Renaissance masterpiece",st:"St. Sebaldus is a 13th-century Romanesque basilica with Gothic additions. Peter Vischer\'s bronze shrine of St Sebald (1519) is one of the finest works of German Renaissance metalwork. Free to enter.",im:"Time-travel: Peter Vischer and his five sons casting the bronze shrine in their workshop, 1508–1519",t:"Free. Open daily.",c:["courtyards"],r:"g",nn:"St.-Sebaldus-Kirche — Altstadt #65",ns:"Nürnbergs älteste Kirche — der Bronzeschrein des Hl. Sebald",nst:"Die St.-Sebaldus-Kirche ist eine romanische Basilika aus dem 13. Jahrhundert.",nt:"Gratis. Täglich geöffnet."},
  {id:66,n:"Stadtpark — Maxfeld #66",a:"Maxfeld",v:["nature","local","beautiful"],d:26,s:"Nuremberg\'s main city park — pond, sculptures, outdoor chess, and excellent shade",st:"The Stadtpark was laid out in the English landscape style in 1893. The large pond reflects the surrounding trees. Local chess players occupy permanent stone boards daily.",im:"Time-travel: Nuremberg\'s industrial bourgeoisie promenading here on Sunday afternoons, 1900",t:"Free. Open daily.",c:["romantic_water"],r:"g",nn:"Stadtpark — Maxfeld #66",ns:"Nürnbergs Hauptstadtpark — Teich, Skulpturen, Freiluftschach",nst:"Der Stadtpark wurde 1893 im englischen Landschaftsstil angelegt.",nt:"Gratis. Täglich geöffnet."},
  {id:67,n:"Fembohaus City Museum — Altstadt #67",a:"Altstadt",v:["architecture","history","hidden"],d:22,s:"Nuremberg\'s finest merchant palace — a 1598 Renaissance house with an extraordinary city model",st:"The Fembohaus was built in 1598 as the home of a Dutch merchant. The attic room contains an 18th-century model of Nuremberg, with every house and church detailed in miniature.",im:"Time-travel: the Fembo merchant family receiving clients in this ornate room, their wealth on display, 1620",t:"Entry €6. Open daily except Mon.",c:["scary"],r:"g",nn:"Fembohaus — Altstadt #67",ns:"Nürnbergs feinster Kaufmannspalast — ein Renaissance-Haus von 1598",nst:"Das Fembohaus wurde 1598 als Wohnsitz eines niederländischen Kaufmanns gebaut.",nt:"Eintritt 6 €. Täglich außer Mo."},
  {id:68,n:"Lochgefängnis Medieval Dungeon — Altstadt #68",a:"Altstadt",v:["scary","history","hidden"],d:14,s:"The original medieval prison cells under the Rathaus — torture chamber included",st:"The Lochgefängnis is accessed through the Altes Rathaus. The prison has 12 cells, interrogation chambers, and instruments of torture from the 14th–18th centuries. It is extremely well preserved.",im:"Time-travel: a Nuremberg criminal being lowered into these cells in absolute darkness, 1600",t:"Entry fee (€3.50). Open daily April–Oct.",c:["famous_dead"],r:"g",nn:"Lochgefängnis — Altstadt #68",ns:"Die mittelalterlichen Gefängniszellen unter dem Rathaus",nst:"Das Lochgefängnis ist über das Alte Rathaus zugänglich.",nt:"Eintrittspreis (3,50 €). April–Okt täglich."},
  {id:69,n:"Henkersteg Hangman\'s Bridge — Wöhrd #69",a:"Wöhrd",v:["history","beautiful","weird"],d:18,s:"The Hangman\'s Bridge — a covered medieval wooden bridge to the executioner\'s island home",st:"The Henkersteg is a small covered wooden bridge that gave the city hangman access to his house on the Pegnitz island. Nuremberg\'s executioner was a city employee who lived here.",im:"Time-travel: the hangman returning home over this private bridge after a public execution, 1750",t:"Free, always accessible.",c:["street_art"],r:"g",nn:"Henkersteg — Wöhrd #69",ns:"Die Henkerbrücke — eine überdachte mittelalterliche Holzbrücke",nst:"Der Henkersteg ist eine kleine überdachte Holzbrücke.",nt:"Gratis, immer zugänglich."},
  {id:70,n:"Fürth Jewish Museum — Fürth #70",a:"Fürth",v:["history","local","hidden"],d:53,s:"The history of one of Bavaria\'s most important Jewish communities — Kissinger\'s hometown",st:"Fürth\'s Jewish community was one of the largest in the Holy Roman Empire. The museum occupies a former Jewish school and documents the community\'s 300-year history.",im:"Time-travel: the Fürth Jewish community at its peak — 3,000 people, 6 synagogues, a full world, 1900",t:"Entry fee (€5). Open Tue–Sun. U1 from Nuremberg.",c:["abandoned"],r:"g",nn:"Jüdisches Museum Franken — Fürth #70",ns:"Die Geschichte einer der wichtigsten jüdischen Gemeinden Bayerns",nst:"Fürths jüdische Gemeinde war eine der größten im Heiligen Römischen Reich.",nt:"Eintritt (5 €). Di–So. U1 ab Nürnberg."},
  {id:71,n:"Nuremberg Zoo — Zabo #71",a:"Zabo",v:["nature","local","free"],d:26,s:"One of Germany\'s largest zoos — famous for its dolphin programme and African savannah",st:"The Nuremberg Zoo is known for its naturalistic enclosures. The African savannah houses giraffes and elephants. The dolphin habitat is free with entry.",im:"Time-travel: the zoo opening in 1912 in the Reichswald, the first zoo outside a German city centre",t:"Entry fee (€16.50). Half-day works well.",c:["free_museum"],r:"g",nn:"Tiergarten Nürnberg — Zabo #71",ns:"Einer der größten Zoos Deutschlands",nst:"Der Nürnberger Tiergarten ist bekannt für seine naturgetreuen Gehege.",nt:"Eintritt (16,50 €). Halbtag einplanen."},
  {id:72,n:"Wöhrd Island River Swim — Wöhrd #72",a:"Wöhrd",v:["nature","local","hidden"],d:11,s:"A quiet stretch of the Pegnitz where students swim in summer — almost no tourists",st:"The Wöhrd island in the Pegnitz has a stretch of shallow river bank used for summer swimming. Very local, very quiet. Children play in the current; adults read on the grass.",im:"Time-travel: the island as a public execution ground in the medieval period, before the trees grew",t:"Free. Summer only. Walk east from Altstadt along the Pegnitz.",c:["local_only"],r:"g",nn:"Wöhrd Insel Schwimmen — Wöhrd #72",ns:"Eine ruhige Pegnitz-Stelle, wo Studenten im Sommer schwimmen",nst:"Die Wöhrd-Insel in der Pegnitz hat eine Flachwasserstelle.",nt:"Gratis. Nur im Sommer."},
  {id:73,n:"Erlangen Huguenot Town — Erlangen #73",a:"Erlangen",v:["history","hidden","architecture"],d:10,s:"A perfect baroque grid town built for Protestant refugees — Erlangen\'s secret gem",st:"When Louis XIV revoked religious freedom in 1685, Protestant Huguenots fled to Protestant states. Erlangen was built for them: a perfect baroque grid laid out in 1686. The market square and Margrave\'s Palace are extraordinary.",im:"Time-travel: 1,200 Huguenot refugees arriving and building this planned town, 1686",t:"Free to walk. S-Bahn from Nuremberg (20 min).",c:["architecture"],r:"g",nn:"Erlanger Hugenottenstadt — Erlangen #73",ns:"Eine perfekte Barockstadt für protestantische Flüchtlinge",nst:"Als Ludwig XIV. 1685 die Religionsfreiheit widerrief, flohen Hugenotten nach Erlangen.",nt:"Gratis zu Fuß. S-Bahn ab Nürnberg (20 min)."},
  {id:74,n:"St. Lorenz Church — Altstadt #74",a:"Altstadt",v:["architecture","beautiful","history"],d:29,s:"The Gothic masterpiece of Nuremberg — Veit Stoss\'s Annunciation sculpture hangs inside",st:"St. Lorenz is a 13th-century Gothic basilica. Veit Stoss\'s limewood Annunciation sculpture (1517) hangs in the choir. The rose window is extraordinary. Free to enter.",im:"Time-travel: Veit Stoss carving this linden wood sculpture in his workshop nearby, 1516",t:"Free. Open daily.",c:["history_big"],r:"g",nn:"St.-Lorenz-Kirche — Altstadt #74",ns:"Das gotische Meisterwerk Nürnbergs",nst:"St. Lorenz ist eine gotische Basilika. Die hängende Verkündigungsskulptur ist im Chor.",nt:"Gratis. Täglich geöffnet."},
  {id:75,n:"Gostenhof Turkish Market — Gostenhof #75",a:"Gostenhof",v:["local","free","hidden"],d:11,s:"The informal Turkish market in GoHo — produce, spices, and Nuremberg\'s most diverse food",st:"Gostenhofer Hauptstraße has a concentration of Turkish, Greek, and Middle Eastern food shops that function as an informal daily market. Every morning vendors set up outside. Very local.",im:"Time-travel: Gostenhof as the destination of first Turkish Gastarbeiter arriving in Nuremberg, 1960",t:"Free. Open mornings daily.",c:["high_spots"],r:"g",nn:"Gostenhof Türkischer Markt — Gostenhof #75",ns:"Der informelle türkische Markt in GoHo",nst:"Die Gostenhofer Hauptstraße hat eine Konzentration türkischer und orientalischer Geschäfte.",nt:"Gratis. Täglich morgens."},
  {id:76,n:"Kaiserburg Imperial Castle — Altstadt #76",a:"Altstadt",v:["history","beautiful","high_spots"],d:27,s:"The medieval castle above the city — official residence of every Holy Roman Emperor for 500 years",st:"Kaiserburg was the most important castle in the Holy Roman Empire from 1050 to 1571. Every emperor was required to hold his first Imperial Diet here. The outer courtyard and the view over the old town are free.",im:"Time-travel: the Holy Roman Emperor arriving at this castle with a court of 1,000 nobles, 1500",t:"Courtyard free. Interior charges (€7 includes Palas and Deep Well).",c:["parks"],r:"g",nn:"Kaiserburg — Altstadt #76",ns:"Die mittelalterliche Burg — offizielle Residenz jedes Heiligen Römischen Kaisers",nst:"Die Kaiserburg war von 1050 bis 1571 die wichtigste Burg im Heiligen Römischen Reich.",nt:"Innenhof gratis. Innenräume gegen Gebühr (7 €)."},
  {id:77,n:"Hauptmarkt Medieval Square — Altstadt #77",a:"Altstadt",v:["beautiful","history","local"],d:27,s:"The medieval market square with the Schöner Brunnen — free all year round",st:"The Hauptmarkt has been Nuremberg\'s central square since the 14th century. The Schöner Brunnen (Beautiful Fountain) with its golden ring, the Gothic Frauenkirche, and the daily market make it perpetually alive.",im:"Time-travel: the Hauptmarkt as a Jewish ghetto before the Emperor expelled the community, 1349",t:"Always free. Daily market Mon–Sat.",c:["courtyards"],r:"g",nn:"Hauptmarkt — Altstadt #77",ns:"Der mittelalterliche Marktplatz mit dem Schöner Brunnen",nst:"Der Hauptmarkt ist seit dem 14. Jahrhundert Nürnbergs Zentralplatz.",nt:"Immer gratis. Tagesmarkt Mo–Sa."},
  {id:78,n:"Documentation Centre Nazi Rally Grounds — Zabo #78",a:"Zabo",v:["history","scary","local"],d:43,s:"Europe\'s best documentation of the Nazi period — inside Speer\'s unfinished Congress Hall",st:"Albert Speer began the Congress Hall in 1935 — it would have been the largest building in the world. It was never finished. Today it houses a permanent exhibition on how the Nazis came to power. Essential, unflinching, extremely well done.",im:"Time-travel: 700,000 people gathered on the parade ground, watching the Führer speak, 1937",t:"Entry fee (€7). Open daily. Allow 2 hours.",c:["romantic_water"],r:"g",nn:"Dokumentationszentrum Reichsparteitagsgelände — Zabo #78",ns:"Europas beste Dokumentation der NS-Zeit",nst:"Albert Speer begann die Kongresshalle 1935. Heute beherbergt sie eine Dauerausstellung.",nt:"Eintritt (7 €). Täglich geöffnet. 2 Stunden einplanen."},
  {id:79,n:"Trials Courtroom 600 — Altstadt #79",a:"Altstadt",v:["history","scary","architecture"],d:21,s:"The actual courtroom where the Nuremberg Trials were held — still operational",st:"Courtroom 600 in the Nuremberg Palace of Justice hosted the International Military Tribunal from 1945–1946. It still functions as a court. The accompanying exhibition tells the story of international law.",im:"Time-travel: Göring, Hess, Ribbentrop sitting in the dock in this very room, November 1945",t:"Exhibition entry (€6). Courtroom visible from above when court not in session.",c:["scary"],r:"g",nn:"Schwurgerichtssaal 600 — Altstadt #79",ns:"Der Gerichtssaal der Nürnberger Prozesse — noch in Betrieb",nst:"Saal 600 beherbergte das Internationale Militärtribunal 1945–1946.",nt:"Ausstellung (6 €). Gerichtssaal von oben sichtbar."},
  {id:80,n:"Albrecht Dürer House — Altstadt #80",a:"Altstadt",v:["history","art","architecture"],d:7,s:"The home of Germany\'s greatest Renaissance artist — walk through Dürer\'s actual studio",st:"Albrecht Dürer lived in this house from 1509 until his death in 1528. The rooms are furnished as they were in his lifetime. The actor in costume playing his wife Agnes is an unexpected delight.",im:"Time-travel: Dürer at work in this studio, printing woodcuts that spread across Europe, 1515",t:"Entry €6. Open daily.",c:["famous_dead"],r:"g",nn:"Albrecht-Dürer-Haus — Altstadt #80",ns:"Das Zuhause von Deutschlands größtem Renaissancekünstler",nst:"Albrecht Dürer lebte 1509–1528 in diesem Haus.",nt:"Eintritt 6 €. Täglich geöffnet."},
  {id:81,n:"Handwerkerhof Craftsmen\'s Courtyard — Altstadt #81",a:"Altstadt",v:["local","art","architecture"],d:51,s:"A medieval courtyard of working craft studios — potters, jewellers, glassblowers, and lacemakers",st:"The Handwerkerhof is a reconstruction of a medieval craftsmen\'s quarter built into the Königstor (King\'s Gate). The workshops are real — you can watch and buy directly. Free to enter the courtyard.",im:"Time-travel: the medieval guilds of Nuremberg among the most powerful in the Empire, 1450",t:"Free to enter courtyard. Open daily, morning–early evening.",c:["street_art"],r:"g",nn:"Handwerkerhof — Altstadt #81",ns:"Ein mittelalterlicher Handwerkerhof in der Königstormauer",nst:"Der Handwerkerhof ist ein Nachbau eines mittelalterlichen Handwerkerviertels.",nt:"Innenhof kostenlos. Täglich morgens bis frühabends geöffnet."},

  {id:86,n:"Pegnitz Riverside Walk — Wöhrd #86",a:"Wöhrd",v:["nature","beautiful","local"],d:10,s:"Walk the Pegnitz river through the old city — islands, medieval mills, and weir gardens",st:"The Pegnitz splits into two channels inside the old town, creating a string of islands. The riverside walk passes the Henkersteg (Hangman\'s Bridge), the Insel Schütt park, and the Trödelmarkt flea market bridge.",im:"Time-travel: the Pegnitz powering medieval tanning, papermilling, and grinding industries, 1550",t:"Free always. Best route from Weinmarkt to the Trödelmarkt.",c:["history_big"],r:"g",nn:"Pegnitz-Uferweg — Wöhrd #86",ns:"Spaziergang entlang der Pegnitz durch die Altstadt",nst:"Die Pegnitz teilt sich in der Altstadt in zwei Arme auf und bildet eine Inselkette.",nt:"Immer gratis."},
  {id:87,n:"Trödelmarkt Bridge Market — Altstadt #87",a:"Altstadt",v:["local","history","free"],d:40,s:"An antiques and junk market on the medieval bridge over the Pegnitz — every Saturday morning",st:"The Trödelmarkt is held on two islands in the Pegnitz connected by the Fleischbrücke. Books, vinyl, silverware, Bavarian antiques, and all manner of junk. The bridge itself dates to 1598.",im:"Time-travel: the same bridge as Nuremberg\'s main meat market, surrounded by butcher stalls, 1600",t:"Free. Saturdays, 8am–3pm.",c:["high_spots"],r:"g",nn:"Trödelmarkt — Altstadt #87",ns:"Ein Antiquitäten- und Trödelmarkt auf der mittelalterlichen Brücke über die Pegnitz",nst:"Der Trödelmarkt findet auf zwei Inseln in der Pegnitz statt.",nt:"Gratis. Samstags 8–15 Uhr."},
  {id:88,n:"Fürth Old Town Day Trip — Fürth #88",a:"Fürth",v:["history","hidden","local"],d:23,s:"Nuremberg\'s twin city 12 minutes away — best-preserved Gründerzeit architecture in Bavaria",st:"Fürth was an independent city for centuries, developing differently from Nuremberg. Its 19th-century townhouses, Jewish history, and quiet old town are extraordinary. Henry Kissinger was born here. Take the U1.",im:"Time-travel: Fürth and Nuremberg as fierce commercial rivals — the first German railway ran between them, 1835",t:"Free to walk. U1 from Nuremberg (12 min, standard ticket).",c:["parks"],r:"g",nn:"Fürther Altstadt — Fürth #88",ns:"Nürnbergs Zwillingsstadt — die best erhaltene Gründerzeitarchitektur Bayerns",nst:"Fürth war jahrhundertelang eine unabhängige Stadt.",nt:"Gratis zu Fuß. U1 ab Nürnberg (12 min)."},
  {id:89,n:"Erlangen Botanical Garden — Erlangen #89",a:"Erlangen",v:["nature","hidden","quiet"],d:45,s:"University botanical garden 20 km north — free entry, extraordinary collection, almost no tourists",st:"The Erlangen Botanical Garden has been tended by the university since 1828. Greenhouses, a rock garden, medicinal plants, and formal baroque garden sections. Locals use it as a park. Free entry.",im:"Time-travel: first Erlangen professors teaching plant anatomy to students in this garden, 1828",t:"Free. Open daily. S-Bahn to Erlangen (20 min), then 10 min walk.",c:["courtyards"],r:"g",nn:"Erlanger Botanischer Garten — Erlangen #89",ns:"Universitätsbotanischer Garten 20 km nördlich — kostenlos, außergewöhnliche Sammlung",nst:"Der Erlanger Botanische Garten wird seit 1828 von der Universität gepflegt.",nt:"Gratis. Täglich geöffnet. S-Bahn nach Erlangen (20 min)."},
  {id:90,n:"St. Sebald Church — Altstadt #90",a:"Altstadt",v:["architecture","history","beautiful"],d:44,s:"Nuremberg\'s oldest church — Peter Vischer\'s bronze shrine is a German Renaissance masterpiece",st:"St. Sebaldus is a 13th-century Romanesque basilica with Gothic additions. Peter Vischer\'s bronze shrine of St Sebald (1519) is one of the finest works of German Renaissance metalwork. Free to enter.",im:"Time-travel: Peter Vischer and his five sons casting the bronze shrine in their workshop, 1508–1519",t:"Free. Open daily.",c:["romantic_water"],r:"g",nn:"St.-Sebaldus-Kirche — Altstadt #90",ns:"Nürnbergs älteste Kirche — der Bronzeschrein des Hl. Sebald",nst:"Die St.-Sebaldus-Kirche ist eine romanische Basilika aus dem 13. Jahrhundert.",nt:"Gratis. Täglich geöffnet."},
  {id:91,n:"Stadtpark — Maxfeld #91",a:"Maxfeld",v:["nature","local","beautiful"],d:28,s:"Nuremberg\'s main city park — pond, sculptures, outdoor chess, and excellent shade",st:"The Stadtpark was laid out in the English landscape style in 1893. The large pond reflects the surrounding trees. Local chess players occupy permanent stone boards daily.",im:"Time-travel: Nuremberg\'s industrial bourgeoisie promenading here on Sunday afternoons, 1900",t:"Free. Open daily.",c:["scary"],r:"g",nn:"Stadtpark — Maxfeld #91",ns:"Nürnbergs Hauptstadtpark — Teich, Skulpturen, Freiluftschach",nst:"Der Stadtpark wurde 1893 im englischen Landschaftsstil angelegt.",nt:"Gratis. Täglich geöffnet."},
  {id:92,n:"Fembohaus City Museum — Altstadt #92",a:"Altstadt",v:["architecture","history","hidden"],d:41,s:"Nuremberg\'s finest merchant palace — a 1598 Renaissance house with an extraordinary city model",st:"The Fembohaus was built in 1598 as the home of a Dutch merchant. The attic room contains an 18th-century model of Nuremberg, with every house and church detailed in miniature.",im:"Time-travel: the Fembo merchant family receiving clients in this ornate room, their wealth on display, 1620",t:"Entry €6. Open daily except Mon.",c:["famous_dead"],r:"g",nn:"Fembohaus — Altstadt #92",ns:"Nürnbergs feinster Kaufmannspalast — ein Renaissance-Haus von 1598",nst:"Das Fembohaus wurde 1598 als Wohnsitz eines niederländischen Kaufmanns gebaut.",nt:"Eintritt 6 €. Täglich außer Mo."},
  {id:93,n:"Lochgefängnis Medieval Dungeon — Altstadt #93",a:"Altstadt",v:["scary","history","hidden"],d:17,s:"The original medieval prison cells under the Rathaus — torture chamber included",st:"The Lochgefängnis is accessed through the Altes Rathaus. The prison has 12 cells, interrogation chambers, and instruments of torture from the 14th–18th centuries. It is extremely well preserved.",im:"Time-travel: a Nuremberg criminal being lowered into these cells in absolute darkness, 1600",t:"Entry fee (€3.50). Open daily April–Oct.",c:["street_art"],r:"g",nn:"Lochgefängnis — Altstadt #93",ns:"Die mittelalterlichen Gefängniszellen unter dem Rathaus",nst:"Das Lochgefängnis ist über das Alte Rathaus zugänglich.",nt:"Eintrittspreis (3,50 €). April–Okt täglich."},
  {id:94,n:"Henkersteg Hangman\'s Bridge — Wöhrd #94",a:"Wöhrd",v:["history","beautiful","weird"],d:50,s:"The Hangman\'s Bridge — a covered medieval wooden bridge to the executioner\'s island home",st:"The Henkersteg is a small covered wooden bridge that gave the city hangman access to his house on the Pegnitz island. Nuremberg\'s executioner was a city employee who lived here.",im:"Time-travel: the hangman returning home over this private bridge after a public execution, 1750",t:"Free, always accessible.",c:["abandoned"],r:"g",nn:"Henkersteg — Wöhrd #94",ns:"Die Henkerbrücke — eine überdachte mittelalterliche Holzbrücke",nst:"Der Henkersteg ist eine kleine überdachte Holzbrücke.",nt:"Gratis, immer zugänglich."},
  {id:95,n:"Fürth Jewish Museum — Fürth #95",a:"Fürth",v:["history","local","hidden"],d:9,s:"The history of one of Bavaria\'s most important Jewish communities — Kissinger\'s hometown",st:"Fürth\'s Jewish community was one of the largest in the Holy Roman Empire. The museum occupies a former Jewish school and documents the community\'s 300-year history.",im:"Time-travel: the Fürth Jewish community at its peak — 3,000 people, 6 synagogues, a full world, 1900",t:"Entry fee (€5). Open Tue–Sun. U1 from Nuremberg.",c:["free_museum"],r:"g",nn:"Jüdisches Museum Franken — Fürth #95",ns:"Die Geschichte einer der wichtigsten jüdischen Gemeinden Bayerns",nst:"Fürths jüdische Gemeinde war eine der größten im Heiligen Römischen Reich.",nt:"Eintritt (5 €). Di–So. U1 ab Nürnberg."},
  {id:96,n:"Nuremberg Zoo — Zabo #96",a:"Zabo",v:["nature","local","free"],d:7,s:"One of Germany\'s largest zoos — famous for its dolphin programme and African savannah",st:"The Nuremberg Zoo is known for its naturalistic enclosures. The African savannah houses giraffes and elephants. The dolphin habitat is free with entry.",im:"Time-travel: the zoo opening in 1912 in the Reichswald, the first zoo outside a German city centre",t:"Entry fee (€16.50). Half-day works well.",c:["local_only"],r:"g",nn:"Tiergarten Nürnberg — Zabo #96",ns:"Einer der größten Zoos Deutschlands",nst:"Der Nürnberger Tiergarten ist bekannt für seine naturgetreuen Gehege.",nt:"Eintritt (16,50 €). Halbtag einplanen."},
  {id:97,n:"Wöhrd Island River Swim — Wöhrd #97",a:"Wöhrd",v:["nature","local","hidden"],d:47,s:"A quiet stretch of the Pegnitz where students swim in summer — almost no tourists",st:"The Wöhrd island in the Pegnitz has a stretch of shallow river bank used for summer swimming. Very local, very quiet. Children play in the current; adults read on the grass.",im:"Time-travel: the island as a public execution ground in the medieval period, before the trees grew",t:"Free. Summer only. Walk east from Altstadt along the Pegnitz.",c:["architecture"],r:"g",nn:"Wöhrd Insel Schwimmen — Wöhrd #97",ns:"Eine ruhige Pegnitz-Stelle, wo Studenten im Sommer schwimmen",nst:"Die Wöhrd-Insel in der Pegnitz hat eine Flachwasserstelle.",nt:"Gratis. Nur im Sommer."},
  {id:98,n:"Erlangen Huguenot Town — Erlangen #98",a:"Erlangen",v:["history","hidden","architecture"],d:19,s:"A perfect baroque grid town built for Protestant refugees — Erlangen\'s secret gem",st:"When Louis XIV revoked religious freedom in 1685, Protestant Huguenots fled to Protestant states. Erlangen was built for them: a perfect baroque grid laid out in 1686. The market square and Margrave\'s Palace are extraordinary.",im:"Time-travel: 1,200 Huguenot refugees arriving and building this planned town, 1686",t:"Free to walk. S-Bahn from Nuremberg (20 min).",c:["history_big"],r:"g",nn:"Erlanger Hugenottenstadt — Erlangen #98",ns:"Eine perfekte Barockstadt für protestantische Flüchtlinge",nst:"Als Ludwig XIV. 1685 die Religionsfreiheit widerrief, flohen Hugenotten nach Erlangen.",nt:"Gratis zu Fuß. S-Bahn ab Nürnberg (20 min)."},
  {id:99,n:"St. Lorenz Church — Altstadt #99",a:"Altstadt",v:["architecture","beautiful","history"],d:54,s:"The Gothic masterpiece of Nuremberg — Veit Stoss\'s Annunciation sculpture hangs inside",st:"St. Lorenz is a 13th-century Gothic basilica. Veit Stoss\'s limewood Annunciation sculpture (1517) hangs in the choir. The rose window is extraordinary. Free to enter.",im:"Time-travel: Veit Stoss carving this linden wood sculpture in his workshop nearby, 1516",t:"Free. Open daily.",c:["high_spots"],r:"g",nn:"St.-Lorenz-Kirche — Altstadt #99",ns:"Das gotische Meisterwerk Nürnbergs",nst:"St. Lorenz ist eine gotische Basilika. Die hängende Verkündigungsskulptur ist im Chor.",nt:"Gratis. Täglich geöffnet."},
  {id:100,n:"Gostenhof Turkish Market — Gostenhof #100",a:"Gostenhof",v:["local","free","hidden"],d:23,s:"The informal Turkish market in GoHo — produce, spices, and Nuremberg\'s most diverse food",st:"Gostenhofer Hauptstraße has a concentration of Turkish, Greek, and Middle Eastern food shops that function as an informal daily market. Every morning vendors set up outside. Very local.",im:"Time-travel: Gostenhof as the destination of first Turkish Gastarbeiter arriving in Nuremberg, 1960",t:"Free. Open mornings daily.",c:["parks"],r:"g",nn:"Gostenhof Türkischer Markt — Gostenhof #100",ns:"Der informelle türkische Markt in GoHo",nst:"Die Gostenhofer Hauptstraße hat eine Konzentration türkischer und orientalischer Geschäfte.",nt:"Gratis. Täglich morgens."},
  {id:101,n:"Kaiserburg Imperial Castle — Altstadt #101",a:"Altstadt",v:["history","beautiful","high_spots"],d:10,s:"The medieval castle above the city — official residence of every Holy Roman Emperor for 500 years",st:"Kaiserburg was the most important castle in the Holy Roman Empire from 1050 to 1571. Every emperor was required to hold his first Imperial Diet here. The outer courtyard and the view over the old town are free.",im:"Time-travel: the Holy Roman Emperor arriving at this castle with a court of 1,000 nobles, 1500",t:"Courtyard free. Interior charges (€7 includes Palas and Deep Well).",c:["courtyards"],r:"g",nn:"Kaiserburg — Altstadt #101",ns:"Die mittelalterliche Burg — offizielle Residenz jedes Heiligen Römischen Kaisers",nst:"Die Kaiserburg war von 1050 bis 1571 die wichtigste Burg im Heiligen Römischen Reich.",nt:"Innenhof gratis. Innenräume gegen Gebühr (7 €)."},
  {id:102,n:"Hauptmarkt Medieval Square — Altstadt #102",a:"Altstadt",v:["beautiful","history","local"],d:19,s:"The medieval market square with the Schöner Brunnen — free all year round",st:"The Hauptmarkt has been Nuremberg\'s central square since the 14th century. The Schöner Brunnen (Beautiful Fountain) with its golden ring, the Gothic Frauenkirche, and the daily market make it perpetually alive.",im:"Time-travel: the Hauptmarkt as a Jewish ghetto before the Emperor expelled the community, 1349",t:"Always free. Daily market Mon–Sat.",c:["romantic_water"],r:"g",nn:"Hauptmarkt — Altstadt #102",ns:"Der mittelalterliche Marktplatz mit dem Schöner Brunnen",nst:"Der Hauptmarkt ist seit dem 14. Jahrhundert Nürnbergs Zentralplatz.",nt:"Immer gratis. Tagesmarkt Mo–Sa."},
  {id:103,n:"Documentation Centre Nazi Rally Grounds — Zabo #103",a:"Zabo",v:["history","scary","local"],d:11,s:"Europe\'s best documentation of the Nazi period — inside Speer\'s unfinished Congress Hall",st:"Albert Speer began the Congress Hall in 1935 — it would have been the largest building in the world. It was never finished. Today it houses a permanent exhibition on how the Nazis came to power. Essential, unflinching, extremely well done.",im:"Time-travel: 700,000 people gathered on the parade ground, watching the Führer speak, 1937",t:"Entry fee (€7). Open daily. Allow 2 hours.",c:["scary"],r:"g",nn:"Dokumentationszentrum Reichsparteitagsgelände — Zabo #103",ns:"Europas beste Dokumentation der NS-Zeit",nst:"Albert Speer begann die Kongresshalle 1935. Heute beherbergt sie eine Dauerausstellung.",nt:"Eintritt (7 €). Täglich geöffnet. 2 Stunden einplanen."},
  {id:104,n:"Trials Courtroom 600 — Altstadt #104",a:"Altstadt",v:["history","scary","architecture"],d:29,s:"The actual courtroom where the Nuremberg Trials were held — still operational",st:"Courtroom 600 in the Nuremberg Palace of Justice hosted the International Military Tribunal from 1945–1946. It still functions as a court. The accompanying exhibition tells the story of international law.",im:"Time-travel: Göring, Hess, Ribbentrop sitting in the dock in this very room, November 1945",t:"Exhibition entry (€6). Courtroom visible from above when court not in session.",c:["famous_dead"],r:"g",nn:"Schwurgerichtssaal 600 — Altstadt #104",ns:"Der Gerichtssaal der Nürnberger Prozesse — noch in Betrieb",nst:"Saal 600 beherbergte das Internationale Militärtribunal 1945–1946.",nt:"Ausstellung (6 €). Gerichtssaal von oben sichtbar."},
  {id:105,n:"Albrecht Dürer House — Altstadt #105",a:"Altstadt",v:["history","art","architecture"],d:22,s:"The home of Germany\'s greatest Renaissance artist — walk through Dürer\'s actual studio",st:"Albrecht Dürer lived in this house from 1509 until his death in 1528. The rooms are furnished as they were in his lifetime. The actor in costume playing his wife Agnes is an unexpected delight.",im:"Time-travel: Dürer at work in this studio, printing woodcuts that spread across Europe, 1515",t:"Entry €6. Open daily.",c:["street_art"],r:"g",nn:"Albrecht-Dürer-Haus — Altstadt #105",ns:"Das Zuhause von Deutschlands größtem Renaissancekünstler",nst:"Albrecht Dürer lebte 1509–1528 in diesem Haus.",nt:"Eintritt 6 €. Täglich geöffnet."}

</div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);

const filtered=useMemo(()=>P.filter(p=>{

if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
