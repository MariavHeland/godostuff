<script>
const P = [
  {id:1,n:"Fürst-Pückler-Park Branitz — Branitz",a:"Branitz",v:["nature","beautiful","history"],d:15,s:"The most eccentric landscape garden in Germany — including a pyramid lake tomb",st:"Prince Pückler spent his entire fortune creating this English landscape park in the 1840s. He is buried inside a pyramid rising from an artificial lake. The park is free.",im:"Time-travel: Pückler directing the movement of 20,000 trees by hand, 1850",t:"Enter from Branitz village. The pyramid is the highlight — find it.",c:["parks"],r:"g",nn:"Fürst-Pückler-Park Branitz — Branitz",ns:"Der exzentrischste Landschaftspark Deutschlands — mit einer Pyramide als Seetumulus",nst:"Fürst Pückler verbrauchte sein gesamtes Vermögen für diesen englischen Landschaftspark.",nt:"Von Branitz eintreten. Die Pyramide ist das Highlight — sie finden."},
  {id:2,n:"Pyramidentumulus — Branitz",a:"Branitz",v:["weird","history","hidden"],d:20,s:"A pyramid rising from an artificial lake — the tomb of Prince Pückler, built 1856",st:"Pückler had himself buried inside a pyramid rising from water he created artificially. He had it built while alive and watched it from his window. It\'s still exactly as he left it.",im:"Time-travel: Pückler watching his own pyramid from the palace window, 1858",t:"Walk to the lake edge. The pyramid is not accessible — view from shore.",c:["famous_dead"],r:"g",nn:"Pyramidentumulus — Branitz",ns:"Eine Pyramide erhebt sich aus einem künstlichen See — das Grab von Fürst Pückler, 1856",nst:"Pückler ließ sich in einer Pyramide im von ihm künstlich erschaffenen Wasser begraben.",nt:"Zum Seeufer gehen. Die Pyramide nicht begehbar — vom Ufer betrachten."},
  {id:3,n:"Staatstheater Cottbus — Altstadt",a:"Altstadt",v:["architecture","beautiful"],d:5,s:"Art Nouveau theatre from 1908 — the most beautiful Jugendstil building in Brandenburg",st:"Designed by Bernhard Sehring and opened in 1908, this theatre is considered one of the most important Jugendstil buildings east of Berlin. The exterior is always available.",im:"Time-travel: the opening night of the theatre in 1908 — the whole town in formal dress",t:"Exterior always free. Matinée performances sometimes have student discounts.",c:["architecture"],r:"g",nn:"Staatstheater Cottbus — Altstadt",ns:"Jugendstil-Theater aus dem Jahr 1908 — das schönste Jugendstilgebäude in Brandenburg",nst:"Vom Bernhard Sehring entworfen, gilt dieses Theater als eines der wichtigsten Jugendstilgebäude östlich Berlins.",nt:"Außenbereich immer kostenlos. Matinée-Vorstellungen manchmal mit Studentenrabatt."},
  {id:4,n:"Altmarkt — Altstadt",a:"Altstadt",v:["history","local"],d:5,s:"The old market square with fountain — where Cottbus has gathered since the 12th century",st:"The Cottbus market square dates from 1156. The Samson fountain in the centre is an 18th century original. Saturday markets still happen. The square faces the tower of Oberkirche.",im:"Time-travel: medieval market day in Cottbus, 1300 — wool, grain, fish, noise",t:"Saturday market from 9am. The fountain is free to photograph.",c:["local_only"],r:"g",nn:"Altmarkt — Altstadt",ns:"Der alte Marktplatz mit Brunnen — wo Cottbus seit dem 12. Jh. zusammenkommt",nst:"Der Cottbuser Marktplatz stammt von 1156. Der Samsonbrunnen in der Mitte ist ein Original des 18. Jh.",nt:"Samstagmarkt ab 9 Uhr. Der Brunnen ist kostenlos zu fotografieren."},
  {id:5,n:"Spremberger Turm — Altstadt",a:"Altstadt",v:["history","beautiful"],d:5,s:"The medieval gate tower of Cottbus — 14th century, the last survivor of the city walls",st:"The Spremberger Turm is the oldest structure in Cottbus, dating to the 14th century. It marks the southern entrance to the old town. The tower rises five storeys with the original stonework intact.",im:"Time-travel: guards collecting tolls at this gate in 1350",t:"Walk around the tower. Entry to the interior on weekends.",c:["history_big"],r:"g",nn:"Spremberger Turm — Altstadt",ns:"Der mittelalterliche Torturm von Cottbus — 14. Jh., letzter Überlebender der Stadtmauer",nst:"Der Spremberger Turm ist das älteste Bauwerk in Cottbus, datiert ins 14. Jh.",nt:"Um den Turm herumgehen. Innenangang an Wochenenden."},
  {id:6,n:"Wendish Museum — Sorbisches Viertel",a:"Sorbisches Viertel",v:["history","local","free"],d:10,s:"Museum of the Sorbian Slavic minority — Cottbus is the cultural capital of a people most Germans forget",st:"The Sorbs are a Slavic people who have lived in this region since the 6th century. Cottbus is their largest city. The museum documents the language, dress, and customs of this forgotten minority.",im:"Time-travel: Sorbian families maintaining their language and customs under German rule, 1900",t:"The museum exterior and courtyard are free. Small entry for the exhibits.",c:["free_museum"],r:"g",nn:"Sorbisches Museum — Sorbisches Viertel",ns:"Museum der sorbischen slawischen Minderheit — Cottbus ist die Kulturhauptstadt eines Volkes, das die meisten Deutschen vergessen",nst:"Die Sorben sind ein slawisches Volk, das seit dem 6. Jh. in dieser Region lebt.",nt:"Museum-Außenbereich und -Hof kostenlos. Kleiner Eintritt für die Ausstellungen."},
  {id:7,n:"Oberkirche St. Nikolai — Altstadt",a:"Altstadt",v:["history","beautiful"],d:5,s:"The great Gothic church of Cottbus — 14th century tower visible from the whole city",st:"The Nikolaikirche has dominated the Cottbus skyline since the 14th century. The interior was damaged in WWII and is now bare and powerful. The tower can be climbed on weekends.",im:"Time-travel: the church tower serving as an observation post in 1945, the city burning below",t:"Free to enter. Tower climb on weekends for a small fee.",c:["history_big"],r:"g",nn:"Oberkirche St. Nikolai — Altstadt",ns:"Die große gotische Kirche von Cottbus — Turm aus dem 14. Jh. von der ganzen Stadt sichtbar",nst:"Die Nikolaikirche dominiert Cottbus Skyline seit dem 14. Jh. Innen kahl und kraftvoll.",nt:"Kostenlos einzutreten. Turmbesteigung Wochenends für kleinen Eintritt."},
  {id:8,n:"Schloss Branitz (Exterior) — Branitz",a:"Branitz",v:["history","beautiful"],d:15,s:"The Pückler family country house — where the eccentric prince lived while making his garden",st:"Pückler\'s actual home is modest compared to his garden. He sold everything to build the park. The house is now a museum but the exterior and terrace are free.",im:"Time-travel: Pückler writing travel letters in this house while broke but content, 1855",t:"Exterior and terrace free. Museum inside has small charge.",c:["architecture"],r:"g",nn:"Schloss Branitz (Außen) — Branitz",ns:"Das Landhaus der Pückler-Familie — wo der exzentrische Fürst lebte, während er seinen Garten schuf",nst:"Pücklers eigentliches Haus ist bescheiden verglichen mit seinem Garten. Er verkaufte alles für den Park.",nt:"Außenbereich und Terrasse kostenlos. Museum innen mit kleinem Eintritt."},
  {id:9,n:"Puschkinpark — Neustadt",a:"Neustadt",v:["nature","local","quiet"],d:10,s:"GDR-era park named for Pushkin — mature trees, old benches, locals with dogs",st:"Named during the Soviet period, this park has a quiet dignity to it. The old GDR benches are still the originals. Pensioners play chess here. The roses bloom all summer.",im:"Time-travel: GDR youth performing official Pushkin recitations in this park, 1965",t:"Free. The rose garden peaks in June.",c:["parks"],r:"g",nn:"Puschkinpark — Neustadt",ns:"DDR-Park benannt nach Puschkin — alte Bäume, alte Bänke, Einheimische mit Hunden",nst:"In der Sowjetzeit benannt. Rentner spielen hier Schach. Die Rosen blühen den ganzen Sommer.",nt:"Kostenlos. Der Rosengarten erreicht im Juni seinen Höhepunkt."},
  {id:10,n:"Sorbian Street Murals — Sorbisches Viertel",a:"Sorbisches Viertel",v:["street_art","local","hidden"],d:10,s:"Murals celebrating Sorbian culture on the walls of the Sorbisches Viertel",st:"Recent murals painted by Sorbian artists depict traditional costumes, folk tales, and the Wendish language. The neighbourhood still has Sorbian-language street signs alongside German.",im:"Time-travel: Sorbian women in traditional Easter costumes walking this same street, 1910",t:"Walk the Sorbisches Viertel north of the Altmarkt. The murals are free to see.",c:["street_art"],r:"g",nn:"Sorbische Wandbilder — Sorbisches Viertel",ns:"Wandbilder zu sorbischer Kultur an den Hauswänden des Sorbischen Viertels",nst:"Neuere Wandbilder von sorbischen Künstlern zeigen traditionelle Kostüme und Volksmärchen.",nt:"Sorbisches Viertel nördlich des Altmarkts abgehen. Wandbilder kostenlos zu sehen."},
  {id:11,n:"Cottbus Heritage Tram — Altstadt",a:"Altstadt",v:["history","local","weird"],d:5,s:"One of the last surviving tram networks in eastern Germany — take it for the whole city",st:"Cottbus\'s tram network has run since 1903. Riding it end to end is a 40-minute tour of the entire city for €2. The trams are an archive of the city\'s geography.",im:"Time-travel: the inaugural tram journey in Cottbus, 1903, crowds lining the route",t:"Buy a day ticket. Ride every line end to end once.",c:["local_only"],r:"g",nn:"Cottbuser Straßenbahn — Altstadt",ns:"Eines der letzten erhaltenen Straßenbahnnetze in Ostdeutschland — damit die ganze Stadt erkunden",nst:"Das Cottbuser Straßenbahnnetz fährt seit 1903. Von Anfang bis Ende ist eine 40-minütige Stadttour.",nt:"Tageskarte kaufen. Jede Linie einmal von Ende zu Ende fahren."},
  {id:12,n:"Stadtmauer Remnants — Altstadt",a:"Altstadt",v:["history","hidden"],d:8,s:"Sections of the 14th century city wall still visible in back gardens and cellar walls",st:"Most of Cottbus\'s medieval wall was demolished in the 18th century. Short sections are embedded in later buildings. The longest visible section is on Klosterstraße.",im:"Time-travel: the full medieval wall encircling Cottbus in 1400",t:"Walk Klosterstraße and look at the old walls incorporated into houses.",c:["history_big"],r:"g",nn:"Stadtmauerreste — Altstadt",ns:"Abschnitte der Stadtmauer aus dem 14. Jh. noch in Hinterhöfen und Kellerwänden sichtbar",nst:"Der größte Teil der mittelalterlichen Mauer wurde im 18. Jh. abgerissen.",nt:"Klosterstraße abgehen und die alten Mauern in Häusern eingebaut betrachten."},
  {id:13,n:"Klosterkirche — Altstadt",a:"Altstadt",v:["history","quiet"],d:8,s:"The old Franciscan friary church — now used for concerts and community events",st:"The Franciscans arrived in Cottbus in the 13th century. Their church is the oldest building in the city centre. Now used for cultural events, but the interior can be seen during events.",im:"Time-travel: Franciscan friars conducting evening prayer in this church, 1350",t:"Check the events board outside for free concerts.",c:["history_big"],r:"g",nn:"Klosterkirche — Altstadt",ns:"Die alte Franziskanerklosterkirche — jetzt für Konzerte und Gemeinschaftsveranstaltungen genutzt",nst:"Die Franziskaner kamen im 13. Jh. nach Cottbus. Ihre Kirche ist das älteste Gebäude im Stadtzentrum.",nt:"Das Veranstaltungsbrett außen für kostenlose Konzerte prüfen."},
  {id:14,n:"Münzturm Remnant — Altstadt",a:"Altstadt",v:["history","hidden"],d:5,s:"The old mint tower — a stub of the medieval fortification hidden in a back lane",st:"The Münzturm was part of the medieval fortification system. What remains is a small tower fragment hidden between later buildings. Almost no visitors.",im:"Time-travel: coin makers working in the mint adjoining this tower, 1400",t:"Find it off Münzstraße. It has no information sign.",c:["abandoned"],r:"g",nn:"Münzturmrest — Altstadt",ns:"Der alte Münzturm — ein Stumpf der mittelalterlichen Befestigung versteckt in einer Hintergasse",nst:"Der Münzturm war Teil der mittelalterlichen Befestigungsanlage.",nt:"Von der Münzstraße finden. Er hat kein Informationsschild."},
  {id:15,n:"Branitzer Heide Walk — Branitz",a:"Branitz",v:["nature","hidden","quiet"],d:20,s:"Heath land south of Branitz Park — heather, pines, silence, and the feeling of vastness",st:"Beyond the formal park, the heath and pine forest continues for kilometres. No paths are marked. This is the Brandenburg landscape in its raw form.",im:"Time-travel: Pückler riding on horseback through this heath to survey his land, 1845",t:"Continue south from the park entrance. The forest opens onto heathland.",c:["parks"],r:"g",nn:"Branitzer Heide — Branitz",ns:"Heide südlich des Branitzer Parks — Heidekraut, Kiefern, Stille und das Gefühl der Weite",nst:"Jenseits des formalen Parks erstrecken sich Heide und Kiefernwald kilometerweit.",nt:"Vom Parkeingang nach Süden weitergehen. Der Wald öffnet sich zur Heide."},
  {id:16,n:"Cottbus Ostee View — Stadtring",a:"Stadtring",v:["nature","beautiful","hidden"],d:20,s:"The emerging Cottbus inland sea — a former open-cast mine turning into a giant lake",st:"The Cottbuser Ostsee is one of Europe\'s largest artificial lakes, created from a decommissioned lignite mine. Still being filled. The shoreline is raw and strange.",im:"Time-travel: 2019 — the mine draining its last coal, water slowly beginning to rise",t:"Accessible from the eastern edge of the city. Free.",c:["weird"],r:"g",nn:"Cottbuser Ostsee — Stadtring",ns:"Das entstehende Cottbuser Binnenmeer — ein ehemaliger Braunkohletagebau verwandelt sich in einen Riesensee",nst:"Der Cottbuser Ostsee ist einer der größten Kunstseen Europas, aus einem stillgelegten Tagebau entstanden.",nt:"Vom östlichen Stadtrand zugänglich. Kostenlos."},
  {id:17,n:"Sachsendorfer Wiesen — Neustadt",a:"Neustadt",v:["nature","local","free"],d:10,s:"Wildflower meadows along the Spree — the Cottbus locals come here on summer evenings",st:"The meadows along the Spree south of the city are a local secret. Wildflowers in spring. Swimming possible in summer. Nobody from outside the city knows this.",im:"Time-travel: factory workers cycling to these meadows for Sunday picnics, 1950",t:"Cycle south along the Spree from the city. 15 minutes.",c:["parks"],r:"g",nn:"Sachsendorfer Wiesen — Neustadt",ns:"Wildblumenwiesen entlang der Spree — die Cottbuser kommen hierher an Sommerabenden",nst:"Die Wiesen entlang der Spree südlich der Stadt sind ein lokales Geheimnis.",nt:"Entlang der Spree vom Stadtzentrum nach Süden radeln. 15 Minuten."},
  {id:18,n:"Stadtpark — Altstadt",a:"Altstadt",v:["nature","local"],d:5,s:"The central park of Cottbus — bandstand, old trees, the rhythms of city life",st:"The Stadtpark occupies the old fortification zone between the medieval city and 19th century expansion. The old trees are magnificent in autumn.",im:"Time-travel: Cottbus citizens promenading in Sunday best in this park, 1905",t:"Free. Bandstand concerts in summer.",c:["parks"],r:"g",nn:"Stadtpark — Altstadt",ns:"Der Zentralpark von Cottbus — Musikpavillon, alte Bäume, der Rhythmus des Stadtlebens",nst:"Der Stadtpark liegt im alten Festungsbereich zwischen mittelalterlicher Stadt und 19. Jh. Erweiterung.",nt:"Kostenlos. Pavillonkonzerte im Sommer."},
  {id:19,n:"Spremberger Straße Walk — Altstadt",a:"Altstadt",v:["local","history"],d:5,s:"The old main commercial street — Jugendstil facades, GDR remnants, lived-in city",st:"Spremberger Straße mixes Wilhelmine facades, GDR-era renovations and modern shopfronts. Walking it end to end is a 150-year history of a city trying to be something.",im:"Time-travel: this street during the GDR, half empty, Trabis parked, queues at the baker",t:"Just walk it. Coffee at any local café is under €2.",c:["local_only"],r:"g",nn:"Spremberger Straße — Altstadt",ns:"Die alte Haupteinkaufsstraße — Jugendstil-Fassaden, DDR-Überreste, gelebte Stadt",nst:"Spremberger Straße mischt wilhelminische Fassaden, DDR-Sanierungen und moderne Ladenfronten.",nt:"Einfach entlanggehen. Kaffee in jedem lokalen Café unter 2 €."},
  {id:20,n:"Branitz Water Garden — Branitz",a:"Branitz",v:["nature","beautiful","quiet"],d:18,s:"The network of lakes and channels Pückler created by hand in Branitz Park",st:"Pückler employed hundreds of workers to dig the lake system. Water was diverted by hand over years. The channels and islands give the park the feeling of a drowned landscape.",im:"Time-travel: workers digging the lake channels with shovels and wheelbarrows, 1850",t:"Follow the blue waymarks in the park for the full lake circuit.",c:["romantic_water"],r:"g",nn:"Branitzer Wasserpark — Branitz",ns:"Das Netz aus Seen und Kanälen, das Pückler von Hand geschaffen hat",nst:"Pückler beschäftigte Hunderte Arbeiter für das Seesystem. Wasser wurde über Jahre von Hand umgeleitet.",nt:"Den blauen Wegzeichen im Park für den vollen Seerundweg folgen."},
  {id:21,n:"Sorbisches Quarter Streets — Sorbisches Viertel",a:"Sorbisches Viertel",v:["history","local","hidden"],d:8,s:"The streets where Sorbian culture still lives — bilingual signs, folk art, community halls",st:"The Sorbian community in Cottbus has its own schools, radio station and theatre. Walk the quarter and you\'ll see bilingual (German/Wendish) street signs on some streets.",im:"Time-travel: a Sorbian market with folk costumes in this quarter, Easter 1910",t:"Look for the bilingual street signs. Free to wander.",c:["local_only"],r:"g",nn:"Sorbisches Viertel Straßen — Sorbisches Viertel",ns:"Die Straßen, in denen sorbische Kultur noch lebt — zweisprachige Schilder, Volkskunst, Gemeinschaftshäuser",nst:"Die Sorben in Cottbus haben eigene Schulen, ein Radio und ein Theater.",nt:"Zweisprachige Straßenschilder suchen. Kostenlos zu erkunden."},
  {id:22,n:"Berger Felder — Stadtring",a:"Stadtring",v:["nature","free","quiet"],d:15,s:"The fields east of the city — vast Brandenburg sky, larks singing, no buildings",st:"The agricultural land east of Cottbus preserves the original scale of the landscape. Walk 20 minutes from the city edge and you reach pure Brandenburg flatness and sky.",im:"Time-travel: Sorbian farmers working these same fields in horse-drawn carts, 1900",t:"Cycle out along Sandower Straße. Flat and easy.",c:["parks"],r:"g",nn:"Berger Felder — Stadtring",ns:"Die Felder östlich der Stadt — weiter Brandenburger Himmel, singende Lerchen, keine Gebäude",nst:"Das Agrarland östlich von Cottbus bewahrt das ursprüngliche Landschaftsmaß.",nt:"Entlang der Sandower Straße radeln. Flach und einfach."},
  {id:23,n:"Old Post Office — Altstadt",a:"Altstadt",v:["architecture","hidden"],d:5,s:"Wilhelmine post office from 1897 — elaborate brick Gothic that makes you stop",st:"The old Hauptpost is a confident piece of late 19th century Prussian civic architecture. It still operates as a post office, which somehow makes it more moving.",im:"Time-travel: telegrams being dispatched from this building to the fronts, 1914",t:"Exterior always visible. Post office hours on weekdays.",c:["architecture"],r:"g",nn:"Altes Postamt — Altstadt",ns:"Wilhelminisches Postamt aus dem Jahr 1897 — aufwändige Backsteingotik, die zum Anhalten bringt",nst:"Das alte Hauptpostamt ist ein selbstbewusstes Stück preußischer Bürgerarchitektur von 1897.",nt:"Außenbereich immer sichtbar. Postamtzeiten Werktage."},
  {id:24,n:"Lebuser Vorstadt — Stadtring",a:"Stadtring",v:["local","hidden"],d:10,s:"The pre-war suburb that was never demolished — peeling plaster, old trees, real Cottbus",st:"While the centre was rebuilt, the Lebuser Vorstadt was left untouched. Wilhelmine apartment buildings with original details. A quiet residential quarter where the 20th century passed slowly.",im:"Time-travel: this suburb in 1950, East German families living exactly as before the war",t:"Walk in from the Bahnhof direction. No sights — just architecture and life.",c:["local_only"],r:"g",nn:"Lebuser Vorstadt — Stadtring",ns:"Der Vorkriegs-Vorort, der nie abgerissen wurde — abblätternder Putz, alte Bäume, echtes Cottbus",nst:"Während das Zentrum umgebaut wurde, blieb die Lebuser Vorstadt unberührt.",nt:"Vom Bahnhof eingehen. Keine Sehenswürdigkeiten — nur Architektur und Leben."},
  {id:25,n:"Spree River Walk — Neustadt",a:"Neustadt",v:["nature","quiet","beautiful"],d:10,s:"The Spree through Cottbus — small, slow, and nothing like Berlin\'s version of the same river",st:"The Spree rises near Cottbus before it flows north to Berlin. Here it is a small meadow river, maybe 15 metres wide. Walking along it south of the city is completely free.",im:"Time-travel: the Spree in Cottbus 200 years ago — the same width, the same pace, unchanged",t:"Follow the bank south from the Stadtmitte. No fee anywhere.",c:["romantic_water"],r:"g",nn:"Spree-Uferweg — Neustadt",ns:"Die Spree durch Cottbus — klein, langsam, nichts wie Berlins Version desselben Flusses",nst:"Die Spree entspringt in der Nähe von Cottbus, bevor sie nach Berlin fließt. Hier ist sie 15 m breit.",nt:"Das Südufer vom Stadtmittelpunkt aus folgen. Nirgendwo Eintritt."},
  {id:26,n:"Wilhelmsmühle Canal — Altstadt",a:"Altstadt",v:["beautiful","hidden","local"],d:10,s:"A storybook mill neighbourhood with a canal, weeping willows and painted gabled houses — nobody from outside Cottbus knows this",st:"The Wilhelmsmühle sits where the old millstream branches from the Spree. The wooden gabled mill building, the canal overhung with willows, the reflections in the water. A 10-minute walk from the Altmarkt.",im:"Time-travel: the miller working the Wilhelmsmühle in 1850, grain boats arriving from the Lausitz",t:"Free. Walk west from the Altmarkt along the canal toward Sandower Straße.",c:["romantic_water"],r:"g",nn:"Wilhelmsmühle Kanal — Altstadt",ns:"Ein märchenhaftes Mühlenviertel mit Kanal, Trauerweiden und bemalten Giebelhäusern",nst:"Die Wilhelmsmühle liegt dort, wo der alte Mühlbach von der Spree abzweigt. Holzgiebelgebäude, Weiden, Spiegelungen.",nt:"Kostenlos. Vom Altmarkt westlich dem Kanal folgen."},
  {id:27,n:"Uferstraße — Oldest Street — Altstadt",a:"Altstadt",v:["history","hidden","local"],d:10,s:"Cottbus\'s oldest street — medieval tanner houses along the Spree, the city that the Altmarkt doesn\'t show you",st:"Uferstraße runs along the Spree bank and dates to the medieval city. The tanner houses that backed onto the water are still partly standing. The industrial archaeology visible in the stonework.",im:"Time-travel: Sorbian tanners steeping hides in the Spree here in the 14th century, the leather trade that made Cottbus",t:"Free. Walk from the Spremberger Turm south along the river.",c:["history_big"],r:"g",nn:"Uferstraße — Altstadt",ns:"Cottbus\' älteste Straße — mittelalterliche Gerberhäuser an der Spree",nst:"Die Uferstraße verläuft entlang des Spree-Ufers und stammt aus der mittelalterlichen Stadt. Die Gerberhäuser sind noch teilweise erhalten.",nt:"Kostenlos. Vom Spremberger Turm südwärts am Fluss entlanggehen."},
  {id:28,n:"Sorbian Cultural Trail — Sorbisches Viertel",a:"Sorbisches Viertel",v:["history","local","hidden"],d:20,s:"Cottbus is the capital of Sorbian culture in Germany — a Slavic people who have lived here for 1,400 years",st:"The Sorbs are a West Slavic minority in Lusatia who preserved their language through Prussian, German and East German rule. The Sorbian street signs, the House of Sorbs on August-Bebel-Straße, and the folk costumes in shop windows.",im:"Time-travel: Sorbian villagers entering Cottbus for the Easter procession in 1900, the city still largely Sorbian-speaking",t:"Free. Walk August-Bebel-Straße. The Wendish Museum has a small entry fee.",c:["local_only"],r:"g",nn:"Sorbischer Kulturweg — Sorbisches Viertel",ns:"Cottbus ist die Hauptstadt der sorbischen Kultur in Deutschland — ein slawisches Volk seit 1.400 Jahren",nst:"Die Sorben sind eine westslawische Minderheit in der Lausitz. Sorbische Straßenschilder, Haus der Sorben, Volkstrachten.",nt:"Kostenlos. August-Bebel-Straße erkunden. Wendisches Museum kleiner Eintritt."},
  {id:29,n:"Lobster Symbol Hunt — Altstadt",a:"Altstadt",v:["weird","local","hidden"],d:15,s:"The Cottbus coat of arms has a lobster — find the hidden lobster symbols all over the Altstadt",st:"The lobster (Hummer) is on the Cottbus coat of arms and appears as a motif across the city — carved on buildings, painted on pub signs, embedded in iron railings. Locals have been spotting them for decades. Nobody knows all of them.",im:"Time-travel: the medieval city council choosing the lobster as their symbol in the 14th century, nobody quite knowing why",t:"Free. Start at the Altmarkt and radiate out. Count them all.",c:["weird"],r:"g",nn:"Hummersuche — Altstadt",ns:"Das Cottbuser Wappen hat einen Hummer — findet die versteckten Hummersymbole in der ganzen Altstadt",nst:"Der Hummer ist auf dem Cottbuser Wappen und taucht überall auf — in Gebäuden gemeißelt, auf Wirtshausschildern gemalt.",nt:"Kostenlos. Vom Altmarkt aus starten. Zählt sie alle."},
  {id:30,n:"Fürst-Pückler-Park Branitz — Branitz #30",a:"Branitz",v:["nature","beautiful","history"],d:45,s:"The most eccentric landscape garden in Germany — including a pyramid lake tomb",st:"Prince Pückler spent his entire fortune creating this English landscape park in the 1840s. He is buried inside a pyramid rising from an artificial lake. The park is free.",im:"Time-travel: Pückler directing the movement of 20,000 trees by hand, 1850",t:"Enter from Branitz village. The pyramid is the highlight — find it.",c:["history_big"],r:"g",nn:"Fürst-Pückler-Park Branitz — Branitz #30",ns:"Der exzentrischste Landschaftspark Deutschlands — mit einer Pyramide als Seetumulus",nst:"Fürst Pückler verbrauchte sein gesamtes Vermögen für diesen englischen Landschaftspark.",nt:"Von Branitz eintreten. Die Pyramide ist das Highlight — sie finden."},
  {id:31,n:"Pyramidentumulus — Branitz #31",a:"Branitz",v:["weird","history","hidden"],d:12,s:"A pyramid rising from an artificial lake — the tomb of Prince Pückler, built 1856",st:"Pückler had himself buried inside a pyramid rising from water he created artificially. He had it built while alive and watched it from his window. It\'s still exactly as he left it.",im:"Time-travel: Pückler watching his own pyramid from the palace window, 1858",t:"Walk to the lake edge. The pyramid is not accessible — view from shore.",c:["high_spots"],r:"g",nn:"Pyramidentumulus — Branitz #31",ns:"Eine Pyramide erhebt sich aus einem künstlichen See — das Grab von Fürst Pückler, 1856",nst:"Pückler ließ sich in einer Pyramide im von ihm künstlich erschaffenen Wasser begraben.",nt:"Zum Seeufer gehen. Die Pyramide nicht begehbar — vom Ufer betrachten."},
  {id:32,n:"Staatstheater Cottbus — Altstadt #32",a:"Altstadt",v:["architecture","beautiful"],d:6,s:"Art Nouveau theatre from 1908 — the most beautiful Jugendstil building in Brandenburg",st:"Designed by Bernhard Sehring and opened in 1908, this theatre is considered one of the most important Jugendstil buildings east of Berlin. The exterior is always available.",im:"Time-travel: the opening night of the theatre in 1908 — the whole town in formal dress",t:"Exterior always free. Matinée performances sometimes have student discounts.",c:["parks"],r:"g",nn:"Staatstheater Cottbus — Altstadt #32",ns:"Jugendstil-Theater aus dem Jahr 1908 — das schönste Jugendstilgebäude in Brandenburg",nst:"Vom Bernhard Sehring entworfen, gilt dieses Theater als eines der wichtigsten Jugendstilgebäude östlich Berlins.",nt:"Außenbereich immer kostenlos. Matinée-Vorstellungen manchmal mit Studentenrabatt."},
  {id:33,n:"Altmarkt — Altstadt #33",a:"Altstadt",v:["history","local"],d:52,s:"The old market square with fountain — where Cottbus has gathered since the 12th century",st:"The Cottbus market square dates from 1156. The Samson fountain in the centre is an 18th century original. Saturday markets still happen. The square faces the tower of Oberkirche.",im:"Time-travel: medieval market day in Cottbus, 1300 — wool, grain, fish, noise",t:"Saturday market from 9am. The fountain is free to photograph.",c:["courtyards"],r:"g",nn:"Altmarkt — Altstadt #33",ns:"Der alte Marktplatz mit Brunnen — wo Cottbus seit dem 12. Jh. zusammenkommt",nst:"Der Cottbuser Marktplatz stammt von 1156. Der Samsonbrunnen in der Mitte ist ein Original des 18. Jh.",nt:"Samstagmarkt ab 9 Uhr. Der Brunnen ist kostenlos zu fotografieren."},
  {id:34,n:"Spremberger Turm — Altstadt #34",a:"Altstadt",v:["history","beautiful"],d:22,s:"The medieval gate tower of Cottbus — 14th century, the last survivor of the city walls",st:"The Spremberger Turm is the oldest structure in Cottbus, dating to the 14th century. It marks the southern entrance to the old town. The tower rises five storeys with the original stonework intact.",im:"Time-travel: guards collecting tolls at this gate in 1350",t:"Walk around the tower. Entry to the interior on weekends.",c:["romantic_water"],r:"g",nn:"Spremberger Turm — Altstadt #34",ns:"Der mittelalterliche Torturm von Cottbus — 14. Jh., letzter Überlebender der Stadtmauer",nst:"Der Spremberger Turm ist das älteste Bauwerk in Cottbus, datiert ins 14. Jh.",nt:"Um den Turm herumgehen. Innenangang an Wochenenden."},
  {id:35,n:"Wendish Museum — Sorbisches Viertel #35",a:"Sorbisches Viertel",v:["history","local","free"],d:20,s:"Museum of the Sorbian Slavic minority — Cottbus is the cultural capital of a people most Germans forget",st:"The Sorbs are a Slavic people who have lived in this region since the 6th century. Cottbus is their largest city. The museum documents the language, dress, and customs of this forgotten minority.",im:"Time-travel: Sorbian families maintaining their language and customs under German rule, 1900",t:"The museum exterior and courtyard are free. Small entry for the exhibits.",c:["scary"],r:"g",nn:"Sorbisches Museum — Sorbisches Viertel #35",ns:"Museum der sorbischen slawischen Minderheit — Cottbus ist die Kulturhauptstadt eines Volkes, das die meisten Deutschen vergessen",nst:"Die Sorben sind ein slawisches Volk, das seit dem 6. Jh. in dieser Region lebt.",nt:"Museum-Außenbereich und -Hof kostenlos. Kleiner Eintritt für die Ausstellungen."},
  {id:36,n:"Oberkirche St. Nikolai — Altstadt #36",a:"Altstadt",v:["history","beautiful"],d:19,s:"The great Gothic church of Cottbus — 14th century tower visible from the whole city",st:"The Nikolaikirche has dominated the Cottbus skyline since the 14th century. The interior was damaged in WWII and is now bare and powerful. The tower can be climbed on weekends.",im:"Time-travel: the church tower serving as an observation post in 1945, the city burning below",t:"Free to enter. Tower climb on weekends for a small fee.",c:["famous_dead"],r:"g",nn:"Oberkirche St. Nikolai — Altstadt #36",ns:"Die große gotische Kirche von Cottbus — Turm aus dem 14. Jh. von der ganzen Stadt sichtbar",nst:"Die Nikolaikirche dominiert Cottbus Skyline seit dem 14. Jh. Innen kahl und kraftvoll.",nt:"Kostenlos einzutreten. Turmbesteigung Wochenends für kleinen Eintritt."},
  {id:37,n:"Schloss Branitz (Exterior) — Branitz #37",a:"Branitz",v:["history","beautiful"],d:13,s:"The Pückler family country house — where the eccentric prince lived while making his garden",st:"Pückler\'s actual home is modest compared to his garden. He sold everything to build the park. The house is now a museum but the exterior and terrace are free.",im:"Time-travel: Pückler writing travel letters in this house while broke but content, 1855",t:"Exterior and terrace free. Museum inside has small charge.",c:["street_art"],r:"g",nn:"Schloss Branitz (Außen) — Branitz #37",ns:"Das Landhaus der Pückler-Familie — wo der exzentrische Fürst lebte, während er seinen Garten schuf",nst:"Pücklers eigentliches Haus ist bescheiden verglichen mit seinem Garten. Er verkaufte alles für den Park.",nt:"Außenbereich und Terrasse kostenlos. Museum innen mit kleinem Eintritt."},
  {id:38,n:"Puschkinpark — Neustadt #38",a:"Neustadt",v:["nature","local","quiet"],d:52,s:"GDR-era park named for Pushkin — mature trees, old benches, locals with dogs",st:"Named during the Soviet period, this park has a quiet dignity to it. The old GDR benches are still the originals. Pensioners play chess here. The roses bloom all summer.",im:"Time-travel: GDR youth performing official Pushkin recitations in this park, 1965",t:"Free. The rose garden peaks in June.",c:["abandoned"],r:"g",nn:"Puschkinpark — Neustadt #38",ns:"DDR-Park benannt nach Puschkin — alte Bäume, alte Bänke, Einheimische mit Hunden",nst:"In der Sowjetzeit benannt. Rentner spielen hier Schach. Die Rosen blühen den ganzen Sommer.",nt:"Kostenlos. Der Rosengarten erreicht im Juni seinen Höhepunkt."},
  {id:39,n:"Sorbian Street Murals — Sorbisches Viertel #39",a:"Sorbisches Viertel",v:["street_art","local","hidden"],d:11,s:"Murals celebrating Sorbian culture on the walls of the Sorbisches Viertel",st:"Recent murals painted by Sorbian artists depict traditional costumes, folk tales, and the Wendish language. The neighbourhood still has Sorbian-language street signs alongside German.",im:"Time-travel: Sorbian women in traditional Easter costumes walking this same street, 1910",t:"Walk the Sorbisches Viertel north of the Altmarkt. The murals are free to see.",c:["free_museum"],r:"g",nn:"Sorbische Wandbilder — Sorbisches Viertel #39",ns:"Wandbilder zu sorbischer Kultur an den Hauswänden des Sorbischen Viertels",nst:"Neuere Wandbilder von sorbischen Künstlern zeigen traditionelle Kostüme und Volksmärchen.",nt:"Sorbisches Viertel nördlich des Altmarkts abgehen. Wandbilder kostenlos zu sehen."},
  {id:40,n:"Cottbus Heritage Tram — Altstadt #40",a:"Altstadt",v:["history","local","weird"],d:48,s:"One of the last surviving tram networks in eastern Germany — take it for the whole city",st:"Cottbus\'s tram network has run since 1903. Riding it end to end is a 40-minute tour of the entire city for €2. The trams are an archive of the city\'s geography.",im:"Time-travel: the inaugural tram journey in Cottbus, 1903, crowds lining the route",t:"Buy a day ticket. Ride every line end to end once.",c:["local_only"],r:"g",nn:"Cottbuser Straßenbahn — Altstadt #40",ns:"Eines der letzten erhaltenen Straßenbahnnetze in Ostdeutschland — damit die ganze Stadt erkunden",nst:"Das Cottbuser Straßenbahnnetz fährt seit 1903. Von Anfang bis Ende ist eine 40-minütige Stadttour.",nt:"Tageskarte kaufen. Jede Linie einmal von Ende zu Ende fahren."},
  {id:41,n:"Stadtmauer Remnants — Altstadt #41",a:"Altstadt",v:["history","hidden"],d:52,s:"Sections of the 14th century city wall still visible in back gardens and cellar walls",st:"Most of Cottbus\'s medieval wall was demolished in the 18th century. Short sections are embedded in later buildings. The longest visible section is on Klosterstraße.",im:"Time-travel: the full medieval wall encircling Cottbus in 1400",t:"Walk Klosterstraße and look at the old walls incorporated into houses.",c:["architecture"],r:"g",nn:"Stadtmauerreste — Altstadt #41",ns:"Abschnitte der Stadtmauer aus dem 14. Jh. noch in Hinterhöfen und Kellerwänden sichtbar",nst:"Der größte Teil der mittelalterlichen Mauer wurde im 18. Jh. abgerissen.",nt:"Klosterstraße abgehen und die alten Mauern in Häusern eingebaut betrachten."},
  {id:42,n:"Klosterkirche — Altstadt #42",a:"Altstadt",v:["history","quiet"],d:39,s:"The old Franciscan friary church — now used for concerts and community events",st:"The Franciscans arrived in Cottbus in the 13th century. Their church is the oldest building in the city centre. Now used for cultural events, but the interior can be seen during events.",im:"Time-travel: Franciscan friars conducting evening prayer in this church, 1350",t:"Check the events board outside for free concerts.",c:["history_big"],r:"g",nn:"Klosterkirche — Altstadt #42",ns:"Die alte Franziskanerklosterkirche — jetzt für Konzerte und Gemeinschaftsveranstaltungen genutzt",nst:"Die Franziskaner kamen im 13. Jh. nach Cottbus. Ihre Kirche ist das älteste Gebäude im Stadtzentrum.",nt:"Das Veranstaltungsbrett außen für kostenlose Konzerte prüfen."},
  {id:43,n:"Münzturm Remnant — Altstadt #43",a:"Altstadt",v:["history","hidden"],d:10,s:"The old mint tower — a stub of the medieval fortification hidden in a back lane",st:"The Münzturm was part of the medieval fortification system. What remains is a small tower fragment hidden between later buildings. Almost no visitors.",im:"Time-travel: coin makers working in the mint adjoining this tower, 1400",t:"Find it off Münzstraße. It has no information sign.",c:["high_spots"],r:"g",nn:"Münzturmrest — Altstadt #43",ns:"Der alte Münzturm — ein Stumpf der mittelalterlichen Befestigung versteckt in einer Hintergasse",nst:"Der Münzturm war Teil der mittelalterlichen Befestigungsanlage.",nt:"Von der Münzstraße finden. Er hat kein Informationsschild."},
  {id:44,n:"Branitzer Heide Walk — Branitz #44",a:"Branitz",v:["nature","hidden","quiet"],d:42,s:"Heath land south of Branitz Park — heather, pines, silence, and the feeling of vastness",st:"Beyond the formal park, the heath and pine forest continues for kilometres. No paths are marked. This is the Brandenburg landscape in its raw form.",im:"Time-travel: Pückler riding on horseback through this heath to survey his land, 1845",t:"Continue south from the park entrance. The forest opens onto heathland.",c:["parks"],r:"g",nn:"Branitzer Heide — Branitz #44",ns:"Heide südlich des Branitzer Parks — Heidekraut, Kiefern, Stille und das Gefühl der Weite",nst:"Jenseits des formalen Parks erstrecken sich Heide und Kiefernwald kilometerweit.",nt:"Vom Parkeingang nach Süden weitergehen. Der Wald öffnet sich zur Heide."},
  {id:45,n:"Cottbus Ostee View — Stadtring #45",a:"Stadtring",v:["nature","beautiful","hidden"],d:32,s:"The emerging Cottbus inland sea — a former open-cast mine turning into a giant lake",st:"The Cottbuser Ostsee is one of Europe\'s largest artificial lakes, created from a decommissioned lignite mine. Still being filled. The shoreline is raw and strange.",im:"Time-travel: 2019 — the mine draining its last coal, water slowly beginning to rise",t:"Accessible from the eastern edge of the city. Free.",c:["courtyards"],r:"g",nn:"Cottbuser Ostsee — Stadtring #45",ns:"Das entstehende Cottbuser Binnenmeer — ein ehemaliger Braunkohletagebau verwandelt sich in einen Riesensee",nst:"Der Cottbuser Ostsee ist einer der größten Kunstseen Europas, aus einem stillgelegten Tagebau entstanden.",nt:"Vom östlichen Stadtrand zugänglich. Kostenlos."},
  {id:46,n:"Sachsendorfer Wiesen — Neustadt #46",a:"Neustadt",v:["nature","local","free"],d:7,s:"Wildflower meadows along the Spree — the Cottbus locals come here on summer evenings",st:"The meadows along the Spree south of the city are a local secret. Wildflowers in spring. Swimming possible in summer. Nobody from outside the city knows this.",im:"Time-travel: factory workers cycling to these meadows for Sunday picnics, 1950",t:"Cycle south along the Spree from the city. 15 minutes.",c:["romantic_water"],r:"g",nn:"Sachsendorfer Wiesen — Neustadt #46",ns:"Wildblumenwiesen entlang der Spree — die Cottbuser kommen hierher an Sommerabenden",nst:"Die Wiesen entlang der Spree südlich der Stadt sind ein lokales Geheimnis.",nt:"Entlang der Spree vom Stadtzentrum nach Süden radeln. 15 Minuten."},
  {id:47,n:"Stadtpark — Altstadt #47",a:"Altstadt",v:["nature","local"],d:6,s:"The central park of Cottbus — bandstand, old trees, the rhythms of city life",st:"The Stadtpark occupies the old fortification zone between the medieval city and 19th century expansion. The old trees are magnificent in autumn.",im:"Time-travel: Cottbus citizens promenading in Sunday best in this park, 1905",t:"Free. Bandstand concerts in summer.",c:["scary"],r:"g",nn:"Stadtpark — Altstadt #47",ns:"Der Zentralpark von Cottbus — Musikpavillon, alte Bäume, der Rhythmus des Stadtlebens",nst:"Der Stadtpark liegt im alten Festungsbereich zwischen mittelalterlicher Stadt und 19. Jh. Erweiterung.",nt:"Kostenlos. Pavillonkonzerte im Sommer."},
  {id:48,n:"Spremberger Straße Walk — Altstadt #48",a:"Altstadt",v:["local","history"],d:10,s:"The old main commercial street — Jugendstil facades, GDR remnants, lived-in city",st:"Spremberger Straße mixes Wilhelmine facades, GDR-era renovations and modern shopfronts. Walking it end to end is a 150-year history of a city trying to be something.",im:"Time-travel: this street during the GDR, half empty, Trabis parked, queues at the baker",t:"Just walk it. Coffee at any local café is under €2.",c:["famous_dead"],r:"g",nn:"Spremberger Straße — Altstadt #48",ns:"Die alte Haupteinkaufsstraße — Jugendstil-Fassaden, DDR-Überreste, gelebte Stadt",nst:"Spremberger Straße mischt wilhelminische Fassaden, DDR-Sanierungen und moderne Ladenfronten.",nt:"Einfach entlanggehen. Kaffee in jedem lokalen Café unter 2 €."},
  {id:49,n:"Branitz Water Garden — Branitz #49",a:"Branitz",v:["nature","beautiful","quiet"],d:18,s:"The network of lakes and channels Pückler created by hand in Branitz Park",st:"Pückler employed hundreds of workers to dig the lake system. Water was diverted by hand over years. The channels and islands give the park the feeling of a drowned landscape.",im:"Time-travel: workers digging the lake channels with shovels and wheelbarrows, 1850",t:"Follow the blue waymarks in the park for the full lake circuit.",c:["street_art"],r:"g",nn:"Branitzer Wasserpark — Branitz #49",ns:"Das Netz aus Seen und Kanälen, das Pückler von Hand geschaffen hat",nst:"Pückler beschäftigte Hunderte Arbeiter für das Seesystem. Wasser wurde über Jahre von Hand umgeleitet.",nt:"Den blauen Wegzeichen im Park für den vollen Seerundweg folgen."},
  {id:50,n:"Sorbisches Quarter Streets — Sorbisches Viertel #50",a:"Sorbisches Viertel",v:["history","local","hidden"],d:19,s:"The streets where Sorbian culture still lives — bilingual signs, folk art, community halls",st:"The Sorbian community in Cottbus has its own schools, radio station and theatre. Walk the quarter and you\'ll see bilingual (German/Wendish) street signs on some streets.",im:"Time-travel: a Sorbian market with folk costumes in this quarter, Easter 1910",t:"Look for the bilingual street signs. Free to wander.",c:["abandoned"],r:"g",nn:"Sorbisches Viertel Straßen — Sorbisches Viertel #50",ns:"Die Straßen, in denen sorbische Kultur noch lebt — zweisprachige Schilder, Volkskunst, Gemeinschaftshäuser",nst:"Die Sorben in Cottbus haben eigene Schulen, ein Radio und ein Theater.",nt:"Zweisprachige Straßenschilder suchen. Kostenlos zu erkunden."},
  {id:51,n:"Berger Felder — Stadtring #51",a:"Stadtring",v:["nature","free","quiet"],d:37,s:"The fields east of the city — vast Brandenburg sky, larks singing, no buildings",st:"The agricultural land east of Cottbus preserves the original scale of the landscape. Walk 20 minutes from the city edge and you reach pure Brandenburg flatness and sky.",im:"Time-travel: Sorbian farmers working these same fields in horse-drawn carts, 1900",t:"Cycle out along Sandower Straße. Flat and easy.",c:["free_museum"],r:"g",nn:"Berger Felder — Stadtring #51",ns:"Die Felder östlich der Stadt — weiter Brandenburger Himmel, singende Lerchen, keine Gebäude",nst:"Das Agrarland östlich von Cottbus bewahrt das ursprüngliche Landschaftsmaß.",nt:"Entlang der Sandower Straße radeln. Flach und einfach."},
  {id:52,n:"Old Post Office — Altstadt #52",a:"Altstadt",v:["architecture","hidden"],d:43,s:"Wilhelmine post office from 1897 — elaborate brick Gothic that makes you stop",st:"The old Hauptpost is a confident piece of late 19th century Prussian civic architecture. It still operates as a post office, which somehow makes it more moving.",im:"Time-travel: telegrams being dispatched from this building to the fronts, 1914",t:"Exterior always visible. Post office hours on weekdays.",c:["local_only"],r:"g",nn:"Altes Postamt — Altstadt #52",ns:"Wilhelminisches Postamt aus dem Jahr 1897 — aufwändige Backsteingotik, die zum Anhalten bringt",nst:"Das alte Hauptpostamt ist ein selbstbewusstes Stück preußischer Bürgerarchitektur von 1897.",nt:"Außenbereich immer sichtbar. Postamtzeiten Werktage."},
  {id:53,n:"Lebuser Vorstadt — Stadtring #53",a:"Stadtring",v:["local","hidden"],d:6,s:"The pre-war suburb that was never demolished — peeling plaster, old trees, real Cottbus",st:"While the centre was rebuilt, the Lebuser Vorstadt was left untouched. Wilhelmine apartment buildings with original details. A quiet residential quarter where the 20th century passed slowly.",im:"Time-travel: this suburb in 1950, East German families living exactly as before the war",t:"Walk in from the Bahnhof direction. No sights — just architecture and life.",c:["architecture"],r:"g",nn:"Lebuser Vorstadt — Stadtring #53",ns:"Der Vorkriegs-Vorort, der nie abgerissen wurde — abblätternder Putz, alte Bäume, echtes Cottbus",nst:"Während das Zentrum umgebaut wurde, blieb die Lebuser Vorstadt unberührt.",nt:"Vom Bahnhof eingehen. Keine Sehenswürdigkeiten — nur Architektur und Leben."},
  {id:54,n:"Spree River Walk — Neustadt #54",a:"Neustadt",v:["nature","quiet","beautiful"],d:40,s:"The Spree through Cottbus — small, slow, and nothing like Berlin\'s version of the same river",st:"The Spree rises near Cottbus before it flows north to Berlin. Here it is a small meadow river, maybe 15 metres wide. Walking along it south of the city is completely free.",im:"Time-travel: the Spree in Cottbus 200 years ago — the same width, the same pace, unchanged",t:"Follow the bank south from the Stadtmitte. No fee anywhere.",c:["history_big"],r:"g",nn:"Spree-Uferweg — Neustadt #54",ns:"Die Spree durch Cottbus — klein, langsam, nichts wie Berlins Version desselben Flusses",nst:"Die Spree entspringt in der Nähe von Cottbus, bevor sie nach Berlin fließt. Hier ist sie 15 m breit.",nt:"Das Südufer vom Stadtmittelpunkt aus folgen. Nirgendwo Eintritt."},
  {id:55,n:"Wilhelmsmühle Canal — Altstadt #55",a:"Altstadt",v:["beautiful","hidden","local"],d:17,s:"A storybook mill neighbourhood with a canal, weeping willows and painted gabled houses — nobody from outside Cottbus knows this",st:"The Wilhelmsmühle sits where the old millstream branches from the Spree. The wooden gabled mill building, the canal overhung with willows, the reflections in the water. A 10-minute walk from the Altmarkt.",im:"Time-travel: the miller working the Wilhelmsmühle in 1850, grain boats arriving from the Lausitz",t:"Free. Walk west from the Altmarkt along the canal toward Sandower Straße.",c:["high_spots"],r:"g",nn:"Wilhelmsmühle Kanal — Altstadt #55",ns:"Ein märchenhaftes Mühlenviertel mit Kanal, Trauerweiden und bemalten Giebelhäusern",nst:"Die Wilhelmsmühle liegt dort, wo der alte Mühlbach von der Spree abzweigt. Holzgiebelgebäude, Weiden, Spiegelungen.",nt:"Kostenlos. Vom Altmarkt westlich dem Kanal folgen."},
  {id:56,n:"Uferstraße — Oldest Street — Altstadt #56",a:"Altstadt",v:["history","hidden","local"],d:50,s:"Cottbus\'s oldest street — medieval tanner houses along the Spree, the city that the Altmarkt doesn\'t show you",st:"Uferstraße runs along the Spree bank and dates to the medieval city. The tanner houses that backed onto the water are still partly standing. The industrial archaeology visible in the stonework.",im:"Time-travel: Sorbian tanners steeping hides in the Spree here in the 14th century, the leather trade that made Cottbus",t:"Free. Walk from the Spremberger Turm south along the river.",c:["parks"],r:"g",nn:"Uferstraße — Altstadt #56",ns:"Cottbus\' älteste Straße — mittelalterliche Gerberhäuser an der Spree",nst:"Die Uferstraße verläuft entlang des Spree-Ufers und stammt aus der mittelalterlichen Stadt. Die Gerberhäuser sind noch teilweise erhalten.",nt:"Kostenlos. Vom Spremberger Turm südwärts am Fluss entlanggehen."},
  {id:57,n:"Sorbian Cultural Trail — Sorbisches Viertel #57",a:"Sorbisches Viertel",v:["history","local","hidden"],d:46,s:"Cottbus is the capital of Sorbian culture in Germany — a Slavic people who have lived here for 1,400 years",st:"The Sorbs are a West Slavic minority in Lusatia who preserved their language through Prussian, German and East German rule. The Sorbian street signs, the House of Sorbs on August-Bebel-Straße, and the folk costumes in shop windows.",im:"Time-travel: Sorbian villagers entering Cottbus for the Easter procession in 1900, the city still largely Sorbian-speaking",t:"Free. Walk August-Bebel-Straße. The Wendish Museum has a small entry fee.",c:["courtyards"],r:"g",nn:"Sorbischer Kulturweg — Sorbisches Viertel #57",ns:"Cottbus ist die Hauptstadt der sorbischen Kultur in Deutschland — ein slawisches Volk seit 1.400 Jahren",nst:"Die Sorben sind eine westslawische Minderheit in der Lausitz. Sorbische Straßenschilder, Haus der Sorben, Volkstrachten.",nt:"Kostenlos. August-Bebel-Straße erkunden. Wendisches Museum kleiner Eintritt."},
  {id:58,n:"Lobster Symbol Hunt — Altstadt #58",a:"Altstadt",v:["weird","local","hidden"],d:49,s:"The Cottbus coat of arms has a lobster — find the hidden lobster symbols all over the Altstadt",st:"The lobster (Hummer) is on the Cottbus coat of arms and appears as a motif across the city — carved on buildings, painted on pub signs, embedded in iron railings. Locals have been spotting them for decades. Nobody knows all of them.",im:"Time-travel: the medieval city council choosing the lobster as their symbol in the 14th century, nobody quite knowing why",t:"Free. Start at the Altmarkt and radiate out. Count them all.",c:["romantic_water"],r:"g",nn:"Hummersuche — Altstadt #58",ns:"Das Cottbuser Wappen hat einen Hummer — findet die versteckten Hummersymbole in der ganzen Altstadt",nst:"Der Hummer ist auf dem Cottbuser Wappen und taucht überall auf — in Gebäuden gemeißelt, auf Wirtshausschildern gemalt.",nt:"Kostenlos. Vom Altmarkt aus starten. Zählt sie alle."},
  {id:59,n:"Fürst-Pückler-Park Branitz — Branitz #59",a:"Branitz",v:["nature","beautiful","history"],d:39,s:"The most eccentric landscape garden in Germany — including a pyramid lake tomb",st:"Prince Pückler spent his entire fortune creating this English landscape park in the 1840s. He is buried inside a pyramid rising from an artificial lake. The park is free.",im:"Time-travel: Pückler directing the movement of 20,000 trees by hand, 1850",t:"Enter from Branitz village. The pyramid is the highlight — find it.",c:["scary"],r:"g",nn:"Fürst-Pückler-Park Branitz — Branitz #59",ns:"Der exzentrischste Landschaftspark Deutschlands — mit einer Pyramide als Seetumulus",nst:"Fürst Pückler verbrauchte sein gesamtes Vermögen für diesen englischen Landschaftspark.",nt:"Von Branitz eintreten. Die Pyramide ist das Highlight — sie finden."},
  {id:60,n:"Pyramidentumulus — Branitz #60",a:"Branitz",v:["weird","history","hidden"],d:31,s:"A pyramid rising from an artificial lake — the tomb of Prince Pückler, built 1856",st:"Pückler had himself buried inside a pyramid rising from water he created artificially. He had it built while alive and watched it from his window. It\'s still exactly as he left it.",im:"Time-travel: Pückler watching his own pyramid from the palace window, 1858",t:"Walk to the lake edge. The pyramid is not accessible — view from shore.",c:["famous_dead"],r:"g",nn:"Pyramidentumulus — Branitz #60",ns:"Eine Pyramide erhebt sich aus einem künstlichen See — das Grab von Fürst Pückler, 1856",nst:"Pückler ließ sich in einer Pyramide im von ihm künstlich erschaffenen Wasser begraben.",nt:"Zum Seeufer gehen. Die Pyramide nicht begehbar — vom Ufer betrachten."},
  {id:61,n:"Staatstheater Cottbus — Altstadt #61",a:"Altstadt",v:["architecture","beautiful"],d:19,s:"Art Nouveau theatre from 1908 — the most beautiful Jugendstil building in Brandenburg",st:"Designed by Bernhard Sehring and opened in 1908, this theatre is considered one of the most important Jugendstil buildings east of Berlin. The exterior is always available.",im:"Time-travel: the opening night of the theatre in 1908 — the whole town in formal dress",t:"Exterior always free. Matinée performances sometimes have student discounts.",c:["street_art"],r:"g",nn:"Staatstheater Cottbus — Altstadt #61",ns:"Jugendstil-Theater aus dem Jahr 1908 — das schönste Jugendstilgebäude in Brandenburg",nst:"Vom Bernhard Sehring entworfen, gilt dieses Theater als eines der wichtigsten Jugendstilgebäude östlich Berlins.",nt:"Außenbereich immer kostenlos. Matinée-Vorstellungen manchmal mit Studentenrabatt."},
  {id:62,n:"Altmarkt — Altstadt #62",a:"Altstadt",v:["history","local"],d:33,s:"The old market square with fountain — where Cottbus has gathered since the 12th century",st:"The Cottbus market square dates from 1156. The Samson fountain in the centre is an 18th century original. Saturday markets still happen. The square faces the tower of Oberkirche.",im:"Time-travel: medieval market day in Cottbus, 1300 — wool, grain, fish, noise",t:"Saturday market from 9am. The fountain is free to photograph.",c:["abandoned"],r:"g",nn:"Altmarkt — Altstadt #62",ns:"Der alte Marktplatz mit Brunnen — wo Cottbus seit dem 12. Jh. zusammenkommt",nst:"Der Cottbuser Marktplatz stammt von 1156. Der Samsonbrunnen in der Mitte ist ein Original des 18. Jh.",nt:"Samstagmarkt ab 9 Uhr. Der Brunnen ist kostenlos zu fotografieren."},
  {id:63,n:"Spremberger Turm — Altstadt #63",a:"Altstadt",v:["history","beautiful"],d:42,s:"The medieval gate tower of Cottbus — 14th century, the last survivor of the city walls",st:"The Spremberger Turm is the oldest structure in Cottbus, dating to the 14th century. It marks the southern entrance to the old town. The tower rises five storeys with the original stonework intact.",im:"Time-travel: guards collecting tolls at this gate in 1350",t:"Walk around the tower. Entry to the interior on weekends.",c:["free_museum"],r:"g",nn:"Spremberger Turm — Altstadt #63",ns:"Der mittelalterliche Torturm von Cottbus — 14. Jh., letzter Überlebender der Stadtmauer",nst:"Der Spremberger Turm ist das älteste Bauwerk in Cottbus, datiert ins 14. Jh.",nt:"Um den Turm herumgehen. Innenangang an Wochenenden."},
  {id:64,n:"Wendish Museum — Sorbisches Viertel #64",a:"Sorbisches Viertel",v:["history","local","free"],d:22,s:"Museum of the Sorbian Slavic minority — Cottbus is the cultural capital of a people most Germans forget",st:"The Sorbs are a Slavic people who have lived in this region since the 6th century. Cottbus is their largest city. The museum documents the language, dress, and customs of this forgotten minority.",im:"Time-travel: Sorbian families maintaining their language and customs under German rule, 1900",t:"The museum exterior and courtyard are free. Small entry for the exhibits.",c:["local_only"],r:"g",nn:"Sorbisches Museum — Sorbisches Viertel #64",ns:"Museum der sorbischen slawischen Minderheit — Cottbus ist die Kulturhauptstadt eines Volkes, das die meisten Deutschen vergessen",nst:"Die Sorben sind ein slawisches Volk, das seit dem 6. Jh. in dieser Region lebt.",nt:"Museum-Außenbereich und -Hof kostenlos. Kleiner Eintritt für die Ausstellungen."},
  {id:65,n:"Oberkirche St. Nikolai — Altstadt #65",a:"Altstadt",v:["history","beautiful"],d:5,s:"The great Gothic church of Cottbus — 14th century tower visible from the whole city",st:"The Nikolaikirche has dominated the Cottbus skyline since the 14th century. The interior was damaged in WWII and is now bare and powerful. The tower can be climbed on weekends.",im:"Time-travel: the church tower serving as an observation post in 1945, the city burning below",t:"Free to enter. Tower climb on weekends for a small fee.",c:["architecture"],r:"g",nn:"Oberkirche St. Nikolai — Altstadt #65",ns:"Die große gotische Kirche von Cottbus — Turm aus dem 14. Jh. von der ganzen Stadt sichtbar",nst:"Die Nikolaikirche dominiert Cottbus Skyline seit dem 14. Jh. Innen kahl und kraftvoll.",nt:"Kostenlos einzutreten. Turmbesteigung Wochenends für kleinen Eintritt."},
  {id:66,n:"Schloss Branitz (Exterior) — Branitz #66",a:"Branitz",v:["history","beautiful"],d:53,s:"The Pückler family country house — where the eccentric prince lived while making his garden",st:"Pückler\'s actual home is modest compared to his garden. He sold everything to build the park. The house is now a museum but the exterior and terrace are free.",im:"Time-travel: Pückler writing travel letters in this house while broke but content, 1855",t:"Exterior and terrace free. Museum inside has small charge.",c:["history_big"],r:"g",nn:"Schloss Branitz (Außen) — Branitz #66",ns:"Das Landhaus der Pückler-Familie — wo der exzentrische Fürst lebte, während er seinen Garten schuf",nst:"Pücklers eigentliches Haus ist bescheiden verglichen mit seinem Garten. Er verkaufte alles für den Park.",nt:"Außenbereich und Terrasse kostenlos. Museum innen mit kleinem Eintritt."},
  {id:67,n:"Puschkinpark — Neustadt #67",a:"Neustadt",v:["nature","local","quiet"],d:15,s:"GDR-era park named for Pushkin — mature trees, old benches, locals with dogs",st:"Named during the Soviet period, this park has a quiet dignity to it. The old GDR benches are still the originals. Pensioners play chess here. The roses bloom all summer.",im:"Time-travel: GDR youth performing official Pushkin recitations in this park, 1965",t:"Free. The rose garden peaks in June.",c:["high_spots"],r:"g",nn:"Puschkinpark — Neustadt #67",ns:"DDR-Park benannt nach Puschkin — alte Bäume, alte Bänke, Einheimische mit Hunden",nst:"In der Sowjetzeit benannt. Rentner spielen hier Schach. Die Rosen blühen den ganzen Sommer.",nt:"Kostenlos. Der Rosengarten erreicht im Juni seinen Höhepunkt."},
  {id:68,n:"Sorbian Street Murals — Sorbisches Viertel #68",a:"Sorbisches Viertel",v:["street_art","local","hidden"],d:49,s:"Murals celebrating Sorbian culture on the walls of the Sorbisches Viertel",st:"Recent murals painted by Sorbian artists depict traditional costumes, folk tales, and the Wendish language. The neighbourhood still has Sorbian-language street signs alongside German.",im:"Time-travel: Sorbian women in traditional Easter costumes walking this same street, 1910",t:"Walk the Sorbisches Viertel north of the Altmarkt. The murals are free to see.",c:["parks"],r:"g",nn:"Sorbische Wandbilder — Sorbisches Viertel #68",ns:"Wandbilder zu sorbischer Kultur an den Hauswänden des Sorbischen Viertels",nst:"Neuere Wandbilder von sorbischen Künstlern zeigen traditionelle Kostüme und Volksmärchen.",nt:"Sorbisches Viertel nördlich des Altmarkts abgehen. Wandbilder kostenlos zu sehen."},
  {id:69,n:"Cottbus Heritage Tram — Altstadt #69",a:"Altstadt",v:["history","local","weird"],d:32,s:"One of the last surviving tram networks in eastern Germany — take it for the whole city",st:"Cottbus\'s tram network has run since 1903. Riding it end to end is a 40-minute tour of the entire city for €2. The trams are an archive of the city\'s geography.",im:"Time-travel: the inaugural tram journey in Cottbus, 1903, crowds lining the route",t:"Buy a day ticket. Ride every line end to end once.",c:["courtyards"],r:"g",nn:"Cottbuser Straßenbahn — Altstadt #69",ns:"Eines der letzten erhaltenen Straßenbahnnetze in Ostdeutschland — damit die ganze Stadt erkunden",nst:"Das Cottbuser Straßenbahnnetz fährt seit 1903. Von Anfang bis Ende ist eine 40-minütige Stadttour.",nt:"Tageskarte kaufen. Jede Linie einmal von Ende zu Ende fahren."},
  {id:70,n:"Stadtmauer Remnants — Altstadt #70",a:"Altstadt",v:["history","hidden"],d:26,s:"Sections of the 14th century city wall still visible in back gardens and cellar walls",st:"Most of Cottbus\'s medieval wall was demolished in the 18th century. Short sections are embedded in later buildings. The longest visible section is on Klosterstraße.",im:"Time-travel: the full medieval wall encircling Cottbus in 1400",t:"Walk Klosterstraße and look at the old walls incorporated into houses.",c:["romantic_water"],r:"g",nn:"Stadtmauerreste — Altstadt #70",ns:"Abschnitte der Stadtmauer aus dem 14. Jh. noch in Hinterhöfen und Kellerwänden sichtbar",nst:"Der größte Teil der mittelalterlichen Mauer wurde im 18. Jh. abgerissen.",nt:"Klosterstraße abgehen und die alten Mauern in Häusern eingebaut betrachten."},
  {id:71,n:"Klosterkirche — Altstadt #71",a:"Altstadt",v:["history","quiet"],d:22,s:"The old Franciscan friary church — now used for concerts and community events",st:"The Franciscans arrived in Cottbus in the 13th century. Their church is the oldest building in the city centre. Now used for cultural events, but the interior can be seen during events.",im:"Time-travel: Franciscan friars conducting evening prayer in this church, 1350",t:"Check the events board outside for free concerts.",c:["scary"],r:"g",nn:"Klosterkirche — Altstadt #71",ns:"Die alte Franziskanerklosterkirche — jetzt für Konzerte und Gemeinschaftsveranstaltungen genutzt",nst:"Die Franziskaner kamen im 13. Jh. nach Cottbus. Ihre Kirche ist das älteste Gebäude im Stadtzentrum.",nt:"Das Veranstaltungsbrett außen für kostenlose Konzerte prüfen."},
  {id:72,n:"Münzturm Remnant — Altstadt #72",a:"Altstadt",v:["history","hidden"],d:14,s:"The old mint tower — a stub of the medieval fortification hidden in a back lane",st:"The Münzturm was part of the medieval fortification system. What remains is a small tower fragment hidden between later buildings. Almost no visitors.",im:"Time-travel: coin makers working in the mint adjoining this tower, 1400",t:"Find it off Münzstraße. It has no information sign.",c:["famous_dead"],r:"g",nn:"Münzturmrest — Altstadt #72",ns:"Der alte Münzturm — ein Stumpf der mittelalterlichen Befestigung versteckt in einer Hintergasse",nst:"Der Münzturm war Teil der mittelalterlichen Befestigungsanlage.",nt:"Von der Münzstraße finden. Er hat kein Informationsschild."},
  {id:73,n:"Branitzer Heide Walk — Branitz #73",a:"Branitz",v:["nature","hidden","quiet"],d:18,s:"Heath land south of Branitz Park — heather, pines, silence, and the feeling of vastness",st:"Beyond the formal park, the heath and pine forest continues for kilometres. No paths are marked. This is the Brandenburg landscape in its raw form.",im:"Time-travel: Pückler riding on horseback through this heath to survey his land, 1845",t:"Continue south from the park entrance. The forest opens onto heathland.",c:["street_art"],r:"g",nn:"Branitzer Heide — Branitz #73",ns:"Heide südlich des Branitzer Parks — Heidekraut, Kiefern, Stille und das Gefühl der Weite",nst:"Jenseits des formalen Parks erstrecken sich Heide und Kiefernwald kilometerweit.",nt:"Vom Parkeingang nach Süden weitergehen. Der Wald öffnet sich zur Heide."},
  {id:74,n:"Cottbus Ostee View — Stadtring #74",a:"Stadtring",v:["nature","beautiful","hidden"],d:53,s:"The emerging Cottbus inland sea — a former open-cast mine turning into a giant lake",st:"The Cottbuser Ostsee is one of Europe\'s largest artificial lakes, created from a decommissioned lignite mine. Still being filled. The shoreline is raw and strange.",im:"Time-travel: 2019 — the mine draining its last coal, water slowly beginning to rise",t:"Accessible from the eastern edge of the city. Free.",c:["abandoned"],r:"g",nn:"Cottbuser Ostsee — Stadtring #74",ns:"Das entstehende Cottbuser Binnenmeer — ein ehemaliger Braunkohletagebau verwandelt sich in einen Riesensee",nst:"Der Cottbuser Ostsee ist einer der größten Kunstseen Europas, aus einem stillgelegten Tagebau entstanden.",nt:"Vom östlichen Stadtrand zugänglich. Kostenlos."},
  {id:75,n:"Sachsendorfer Wiesen — Neustadt #75",a:"Neustadt",v:["nature","local","free"],d:26,s:"Wildflower meadows along the Spree — the Cottbus locals come here on summer evenings",st:"The meadows along the Spree south of the city are a local secret. Wildflowers in spring. Swimming possible in summer. Nobody from outside the city knows this.",im:"Time-travel: factory workers cycling to these meadows for Sunday picnics, 1950",t:"Cycle south along the Spree from the city. 15 minutes.",c:["free_museum"],r:"g",nn:"Sachsendorfer Wiesen — Neustadt #75",ns:"Wildblumenwiesen entlang der Spree — die Cottbuser kommen hierher an Sommerabenden",nst:"Die Wiesen entlang der Spree südlich der Stadt sind ein lokales Geheimnis.",nt:"Entlang der Spree vom Stadtzentrum nach Süden radeln. 15 Minuten."},
  {id:76,n:"Stadtpark — Altstadt #76",a:"Altstadt",v:["nature","local"],d:11,s:"The central park of Cottbus — bandstand, old trees, the rhythms of city life",st:"The Stadtpark occupies the old fortification zone between the medieval city and 19th century expansion. The old trees are magnificent in autumn.",im:"Time-travel: Cottbus citizens promenading in Sunday best in this park, 1905",t:"Free. Bandstand concerts in summer.",c:["local_only"],r:"g",nn:"Stadtpark — Altstadt #76",ns:"Der Zentralpark von Cottbus — Musikpavillon, alte Bäume, der Rhythmus des Stadtlebens",nst:"Der Stadtpark liegt im alten Festungsbereich zwischen mittelalterlicher Stadt und 19. Jh. Erweiterung.",nt:"Kostenlos. Pavillonkonzerte im Sommer."},
  {id:77,n:"Spremberger Straße Walk — Altstadt #77",a:"Altstadt",v:["local","history"],d:10,s:"The old main commercial street — Jugendstil facades, GDR remnants, lived-in city",st:"Spremberger Straße mixes Wilhelmine facades, GDR-era renovations and modern shopfronts. Walking it end to end is a 150-year history of a city trying to be something.",im:"Time-travel: this street during the GDR, half empty, Trabis parked, queues at the baker",t:"Just walk it. Coffee at any local café is under €2.",c:["architecture"],r:"g",nn:"Spremberger Straße — Altstadt #77",ns:"Die alte Haupteinkaufsstraße — Jugendstil-Fassaden, DDR-Überreste, gelebte Stadt",nst:"Spremberger Straße mischt wilhelminische Fassaden, DDR-Sanierungen und moderne Ladenfronten.",nt:"Einfach entlanggehen. Kaffee in jedem lokalen Café unter 2 €."},
  {id:78,n:"Branitz Water Garden — Branitz #78",a:"Branitz",v:["nature","beautiful","quiet"],d:29,s:"The network of lakes and channels Pückler created by hand in Branitz Park",st:"Pückler employed hundreds of workers to dig the lake system. Water was diverted by hand over years. The channels and islands give the park the feeling of a drowned landscape.",im:"Time-travel: workers digging the lake channels with shovels and wheelbarrows, 1850",t:"Follow the blue waymarks in the park for the full lake circuit.",c:["history_big"],r:"g",nn:"Branitzer Wasserpark — Branitz #78",ns:"Das Netz aus Seen und Kanälen, das Pückler von Hand geschaffen hat",nst:"Pückler beschäftigte Hunderte Arbeiter für das Seesystem. Wasser wurde über Jahre von Hand umgeleitet.",nt:"Den blauen Wegzeichen im Park für den vollen Seerundweg folgen."},
  {id:79,n:"Sorbisches Quarter Streets — Sorbisches Viertel #79",a:"Sorbisches Viertel",v:["history","local","hidden"],d:11,s:"The streets where Sorbian culture still lives — bilingual signs, folk art, community halls",st:"The Sorbian community in Cottbus has its own schools, radio station and theatre. Walk the quarter and you\'ll see bilingual (German/Wendish) street signs on some streets.",im:"Time-travel: a Sorbian market with folk costumes in this quarter, Easter 1910",t:"Look for the bilingual street signs. Free to wander.",c:["high_spots"],r:"g",nn:"Sorbisches Viertel Straßen — Sorbisches Viertel #79",ns:"Die Straßen, in denen sorbische Kultur noch lebt — zweisprachige Schilder, Volkskunst, Gemeinschaftshäuser",nst:"Die Sorben in Cottbus haben eigene Schulen, ein Radio und ein Theater.",nt:"Zweisprachige Straßenschilder suchen. Kostenlos zu erkunden."},
  {id:80,n:"Berger Felder — Stadtring #80",a:"Stadtring",v:["nature","free","quiet"],d:27,s:"The fields east of the city — vast Brandenburg sky, larks singing, no buildings",st:"The agricultural land east of Cottbus preserves the original scale of the landscape. Walk 20 minutes from the city edge and you reach pure Brandenburg flatness and sky.",im:"Time-travel: Sorbian farmers working these same fields in horse-drawn carts, 1900",t:"Cycle out along Sandower Straße. Flat and easy.",c:["parks"],r:"g",nn:"Berger Felder — Stadtring #80",ns:"Die Felder östlich der Stadt — weiter Brandenburger Himmel, singende Lerchen, keine Gebäude",nst:"Das Agrarland östlich von Cottbus bewahrt das ursprüngliche Landschaftsmaß.",nt:"Entlang der Sandower Straße radeln. Flach und einfach."},
  {id:81,n:"Old Post Office — Altstadt #81",a:"Altstadt",v:["architecture","hidden"],d:27,s:"Wilhelmine post office from 1897 — elaborate brick Gothic that makes you stop",st:"The old Hauptpost is a confident piece of late 19th century Prussian civic architecture. It still operates as a post office, which somehow makes it more moving.",im:"Time-travel: telegrams being dispatched from this building to the fronts, 1914",t:"Exterior always visible. Post office hours on weekdays.",c:["courtyards"],r:"g",nn:"Altes Postamt — Altstadt #81",ns:"Wilhelminisches Postamt aus dem Jahr 1897 — aufwändige Backsteingotik, die zum Anhalten bringt",nst:"Das alte Hauptpostamt ist ein selbstbewusstes Stück preußischer Bürgerarchitektur von 1897.",nt:"Außenbereich immer sichtbar. Postamtzeiten Werktage."},
  {id:82,n:"Lebuser Vorstadt — Stadtring #82",a:"Stadtring",v:["local","hidden"],d:43,s:"The pre-war suburb that was never demolished — peeling plaster, old trees, real Cottbus",st:"While the centre was rebuilt, the Lebuser Vorstadt was left untouched. Wilhelmine apartment buildings with original details. A quiet residential quarter where the 20th century passed slowly.",im:"Time-travel: this suburb in 1950, East German families living exactly as before the war",t:"Walk in from the Bahnhof direction. No sights — just architecture and life.",c:["romantic_water"],r:"g",nn:"Lebuser Vorstadt — Stadtring #82",ns:"Der Vorkriegs-Vorort, der nie abgerissen wurde — abblätternder Putz, alte Bäume, echtes Cottbus",nst:"Während das Zentrum umgebaut wurde, blieb die Lebuser Vorstadt unberührt.",nt:"Vom Bahnhof eingehen. Keine Sehenswürdigkeiten — nur Architektur und Leben."},
  {id:83,n:"Spree River Walk — Neustadt #83",a:"Neustadt",v:["nature","quiet","beautiful"],d:21,s:"The Spree through Cottbus — small, slow, and nothing like Berlin\'s version of the same river",st:"The Spree rises near Cottbus before it flows north to Berlin. Here it is a small meadow river, maybe 15 metres wide. Walking along it south of the city is completely free.",im:"Time-travel: the Spree in Cottbus 200 years ago — the same width, the same pace, unchanged",t:"Follow the bank south from the Stadtmitte. No fee anywhere.",c:["scary"],r:"g",nn:"Spree-Uferweg — Neustadt #83",ns:"Die Spree durch Cottbus — klein, langsam, nichts wie Berlins Version desselben Flusses",nst:"Die Spree entspringt in der Nähe von Cottbus, bevor sie nach Berlin fließt. Hier ist sie 15 m breit.",nt:"Das Südufer vom Stadtmittelpunkt aus folgen. Nirgendwo Eintritt."},
  {id:84,n:"Wilhelmsmühle Canal — Altstadt #84",a:"Altstadt",v:["beautiful","hidden","local"],d:7,s:"A storybook mill neighbourhood with a canal, weeping willows and painted gabled houses — nobody from outside Cottbus knows this",st:"The Wilhelmsmühle sits where the old millstream branches from the Spree. The wooden gabled mill building, the canal overhung with willows, the reflections in the water. A 10-minute walk from the Altmarkt.",im:"Time-travel: the miller working the Wilhelmsmühle in 1850, grain boats arriving from the Lausitz",t:"Free. Walk west from the Altmarkt along the canal toward Sandower Straße.",c:["famous_dead"],r:"g",nn:"Wilhelmsmühle Kanal — Altstadt #84",ns:"Ein märchenhaftes Mühlenviertel mit Kanal, Trauerweiden und bemalten Giebelhäusern",nst:"Die Wilhelmsmühle liegt dort, wo der alte Mühlbach von der Spree abzweigt. Holzgiebelgebäude, Weiden, Spiegelungen.",nt:"Kostenlos. Vom Altmarkt westlich dem Kanal folgen."},
  {id:85,n:"Uferstraße — Oldest Street — Altstadt #85",a:"Altstadt",v:["history","hidden","local"],d:51,s:"Cottbus\'s oldest street — medieval tanner houses along the Spree, the city that the Altmarkt doesn\'t show you",st:"Uferstraße runs along the Spree bank and dates to the medieval city. The tanner houses that backed onto the water are still partly standing. The industrial archaeology visible in the stonework.",im:"Time-travel: Sorbian tanners steeping hides in the Spree here in the 14th century, the leather trade that made Cottbus",t:"Free. Walk from the Spremberger Turm south along the river.",c:["street_art"],r:"g",nn:"Uferstraße — Altstadt #85",ns:"Cottbus\' älteste Straße — mittelalterliche Gerberhäuser an der Spree",nst:"Die Uferstraße verläuft entlang des Spree-Ufers und stammt aus der mittelalterlichen Stadt. Die Gerberhäuser sind noch teilweise erhalten.",nt:"Kostenlos. Vom Spremberger Turm südwärts am Fluss entlanggehen."},
  {id:86,n:"Sorbian Cultural Trail — Sorbisches Viertel #86",a:"Sorbisches Viertel",v:["history","local","hidden"],d:34,s:"Cottbus is the capital of Sorbian culture in Germany — a Slavic people who have lived here for 1,400 years",st:"The Sorbs are a West Slavic minority in Lusatia who preserved their language through Prussian, German and East German rule. The Sorbian street signs, the House of Sorbs on August-Bebel-Straße, and the folk costumes in shop windows.",im:"Time-travel: Sorbian villagers entering Cottbus for the Easter procession in 1900, the city still largely Sorbian-speaking",t:"Free. Walk August-Bebel-Straße. The Wendish Museum has a small entry fee.",c:["abandoned"],r:"g",nn:"Sorbischer Kulturweg — Sorbisches Viertel #86",ns:"Cottbus ist die Hauptstadt der sorbischen Kultur in Deutschland — ein slawisches Volk seit 1.400 Jahren",nst:"Die Sorben sind eine westslawische Minderheit in der Lausitz. Sorbische Straßenschilder, Haus der Sorben, Volkstrachten.",nt:"Kostenlos. August-Bebel-Straße erkunden. Wendisches Museum kleiner Eintritt."},
  {id:87,n:"Lobster Symbol Hunt — Altstadt #87",a:"Altstadt",v:["weird","local","hidden"],d:39,s:"The Cottbus coat of arms has a lobster — find the hidden lobster symbols all over the Altstadt",st:"The lobster (Hummer) is on the Cottbus coat of arms and appears as a motif across the city — carved on buildings, painted on pub signs, embedded in iron railings. Locals have been spotting them for decades. Nobody knows all of them.",im:"Time-travel: the medieval city council choosing the lobster as their symbol in the 14th century, nobody quite knowing why",t:"Free. Start at the Altmarkt and radiate out. Count them all.",c:["free_museum"],r:"g",nn:"Hummersuche — Altstadt #87",ns:"Das Cottbuser Wappen hat einen Hummer — findet die versteckten Hummersymbole in der ganzen Altstadt",nst:"Der Hummer ist auf dem Cottbuser Wappen und taucht überall auf — in Gebäuden gemeißelt, auf Wirtshausschildern gemalt.",nt:"Kostenlos. Vom Altmarkt aus starten. Zählt sie alle."},
  {id:88,n:"Fürst-Pückler-Park Branitz — Branitz #88",a:"Branitz",v:["nature","beautiful","history"],d:12,s:"The most eccentric landscape garden in Germany — including a pyramid lake tomb",st:"Prince Pückler spent his entire fortune creating this English landscape park in the 1840s. He is buried inside a pyramid rising from an artificial lake. The park is free.",im:"Time-travel: Pückler directing the movement of 20,000 trees by hand, 1850",t:"Enter from Branitz village. The pyramid is the highlight — find it.",c:["local_only"],r:"g",nn:"Fürst-Pückler-Park Branitz — Branitz #88",ns:"Der exzentrischste Landschaftspark Deutschlands — mit einer Pyramide als Seetumulus",nst:"Fürst Pückler verbrauchte sein gesamtes Vermögen für diesen englischen Landschaftspark.",nt:"Von Branitz eintreten. Die Pyramide ist das Highlight — sie finden."},
  {id:89,n:"Pyramidentumulus — Branitz #89",a:"Branitz",v:["weird","history","hidden"],d:29,s:"A pyramid rising from an artificial lake — the tomb of Prince Pückler, built 1856",st:"Pückler had himself buried inside a pyramid rising from water he created artificially. He had it built while alive and watched it from his window. It\'s still exactly as he left it.",im:"Time-travel: Pückler watching his own pyramid from the palace window, 1858",t:"Walk to the lake edge. The pyramid is not accessible — view from shore.",c:["architecture"],r:"g",nn:"Pyramidentumulus — Branitz #89",ns:"Eine Pyramide erhebt sich aus einem künstlichen See — das Grab von Fürst Pückler, 1856",nst:"Pückler ließ sich in einer Pyramide im von ihm künstlich erschaffenen Wasser begraben.",nt:"Zum Seeufer gehen. Die Pyramide nicht begehbar — vom Ufer betrachten."},
  {id:90,n:"Staatstheater Cottbus — Altstadt #90",a:"Altstadt",v:["architecture","beautiful"],d:10,s:"Art Nouveau theatre from 1908 — the most beautiful Jugendstil building in Brandenburg",st:"Designed by Bernhard Sehring and opened in 1908, this theatre is considered one of the most important Jugendstil buildings east of Berlin. The exterior is always available.",im:"Time-travel: the opening night of the theatre in 1908 — the whole town in formal dress",t:"Exterior always free. Matinée performances sometimes have student discounts.",c:["history_big"],r:"g",nn:"Staatstheater Cottbus — Altstadt #90",ns:"Jugendstil-Theater aus dem Jahr 1908 — das schönste Jugendstilgebäude in Brandenburg",nst:"Vom Bernhard Sehring entworfen, gilt dieses Theater als eines der wichtigsten Jugendstilgebäude östlich Berlins.",nt:"Außenbereich immer kostenlos. Matinée-Vorstellungen manchmal mit Studentenrabatt."},
  {id:91,n:"Altmarkt — Altstadt #91",a:"Altstadt",v:["history","local"],d:40,s:"The old market square with fountain — where Cottbus has gathered since the 12th century",st:"The Cottbus market square dates from 1156. The Samson fountain in the centre is an 18th century original. Saturday markets still happen. The square faces the tower of Oberkirche.",im:"Time-travel: medieval market day in Cottbus, 1300 — wool, grain, fish, noise",t:"Saturday market from 9am. The fountain is free to photograph.",c:["high_spots"],r:"g",nn:"Altmarkt — Altstadt #91",ns:"Der alte Marktplatz mit Brunnen — wo Cottbus seit dem 12. Jh. zusammenkommt",nst:"Der Cottbuser Marktplatz stammt von 1156. Der Samsonbrunnen in der Mitte ist ein Original des 18. Jh.",nt:"Samstagmarkt ab 9 Uhr. Der Brunnen ist kostenlos zu fotografieren."},
  {id:92,n:"Spremberger Turm — Altstadt #92",a:"Altstadt",v:["history","beautiful"],d:23,s:"The medieval gate tower of Cottbus — 14th century, the last survivor of the city walls",st:"The Spremberger Turm is the oldest structure in Cottbus, dating to the 14th century. It marks the southern entrance to the old town. The tower rises five storeys with the original stonework intact.",im:"Time-travel: guards collecting tolls at this gate in 1350",t:"Walk around the tower. Entry to the interior on weekends.",c:["parks"],r:"g",nn:"Spremberger Turm — Altstadt #92",ns:"Der mittelalterliche Torturm von Cottbus — 14. Jh., letzter Überlebender der Stadtmauer",nst:"Der Spremberger Turm ist das älteste Bauwerk in Cottbus, datiert ins 14. Jh.",nt:"Um den Turm herumgehen. Innenangang an Wochenenden."},
  {id:93,n:"Wendish Museum — Sorbisches Viertel #93",a:"Sorbisches Viertel",v:["history","local","free"],d:45,s:"Museum of the Sorbian Slavic minority — Cottbus is the cultural capital of a people most Germans forget",st:"The Sorbs are a Slavic people who have lived in this region since the 6th century. Cottbus is their largest city. The museum documents the language, dress, and customs of this forgotten minority.",im:"Time-travel: Sorbian families maintaining their language and customs under German rule, 1900",t:"The museum exterior and courtyard are free. Small entry for the exhibits.",c:["courtyards"],r:"g",nn:"Sorbisches Museum — Sorbisches Viertel #93",ns:"Museum der sorbischen slawischen Minderheit — Cottbus ist die Kulturhauptstadt eines Volkes, das die meisten Deutschen vergessen",nst:"Die Sorben sind ein slawisches Volk, das seit dem 6. Jh. in dieser Region lebt.",nt:"Museum-Außenbereich und -Hof kostenlos. Kleiner Eintritt für die Ausstellungen."},
