  {id:94,n:"Oberkirche St. Nikolai — Altstadt #94",a:"Altstadt",v:["history","beautiful"],d:44,s:"The great Gothic church of Cottbus — 14th century tower visible from the whole city",st:"The Nikolaikirche has dominated the Cottbus skyline since the 14th century. The interior was damaged in WWII and is now bare and powerful. The tower can be climbed on weekends.",im:"Time-travel: the church tower serving as an observation post in 1945, the city burning below",t:"Free to enter. Tower climb on weekends for a small fee.",c:["romantic_water"],r:"g",nn:"Oberkirche St. Nikolai — Altstadt #94",ns:"Die große gotische Kirche von Cottbus — Turm aus dem 14. Jh. von der ganzen Stadt sichtbar",nst:"Die Nikolaikirche dominiert Cottbus Skyline seit dem 14. Jh. Innen kahl und kraftvoll.",nt:"Kostenlos einzutreten. Turmbesteigung Wochenends für kleinen Eintritt."},
  {id:95,n:"Schloss Branitz (Exterior) — Branitz #95",a:"Branitz",v:["history","beautiful"],d:28,s:"The Pückler family country house — where the eccentric prince lived while making his garden",st:"Pückler\'s actual home is modest compared to his garden. He sold everything to build the park. The house is now a museum but the exterior and terrace are free.",im:"Time-travel: Pückler writing travel letters in this house while broke but content, 1855",t:"Exterior and terrace free. Museum inside has small charge.",c:["scary"],r:"g",nn:"Schloss Branitz (Außen) — Branitz #95",ns:"Das Landhaus der Pückler-Familie — wo der exzentrische Fürst lebte, während er seinen Garten schuf",nst:"Pücklers eigentliches Haus ist bescheiden verglichen mit seinem Garten. Er verkaufte alles für den Park.",nt:"Außenbereich und Terrasse kostenlos. Museum innen mit kleinem Eintritt."},
  {id:96,n:"Puschkinpark — Neustadt #96",a:"Neustadt",v:["nature","local","quiet"],d:41,s:"GDR-era park named for Pushkin — mature trees, old benches, locals with dogs",st:"Named during the Soviet period, this park has a quiet dignity to it. The old GDR benches are still the originals. Pensioners play chess here. The roses bloom all summer.",im:"Time-travel: GDR youth performing official Pushkin recitations in this park, 1965",t:"Free. The rose garden peaks in June.",c:["famous_dead"],r:"g",nn:"Puschkinpark — Neustadt #96",ns:"DDR-Park benannt nach Puschkin — alte Bäume, alte Bänke, Einheimische mit Hunden",nst:"In der Sowjetzeit benannt. Rentner spielen hier Schach. Die Rosen blühen den ganzen Sommer.",nt:"Kostenlos. Der Rosengarten erreicht im Juni seinen Höhepunkt."},
  {id:97,n:"Sorbian Street Murals — Sorbisches Viertel #97",a:"Sorbisches Viertel",v:["street_art","local","hidden"],d:17,s:"Murals celebrating Sorbian culture on the walls of the Sorbisches Viertel",st:"Recent murals painted by Sorbian artists depict traditional costumes, folk tales, and the Wendish language. The neighbourhood still has Sorbian-language street signs alongside German.",im:"Time-travel: Sorbian women in traditional Easter costumes walking this same street, 1910",t:"Walk the Sorbisches Viertel north of the Altmarkt. The murals are free to see.",c:["street_art"],r:"g",nn:"Sorbische Wandbilder — Sorbisches Viertel #97",ns:"Wandbilder zu sorbischer Kultur an den Hauswänden des Sorbischen Viertels",nst:"Neuere Wandbilder von sorbischen Künstlern zeigen traditionelle Kostüme und Volksmärchen.",nt:"Sorbisches Viertel nördlich des Altmarkts abgehen. Wandbilder kostenlos zu sehen."},
  {id:98,n:"Cottbus Heritage Tram — Altstadt #98",a:"Altstadt",v:["history","local","weird"],d:50,s:"One of the last surviving tram networks in eastern Germany — take it for the whole city",st:"Cottbus\'s tram network has run since 1903. Riding it end to end is a 40-minute tour of the entire city for €2. The trams are an archive of the city\'s geography.",im:"Time-travel: the inaugural tram journey in Cottbus, 1903, crowds lining the route",t:"Buy a day ticket. Ride every line end to end once.",c:["abandoned"],r:"g",nn:"Cottbuser Straßenbahn — Altstadt #98",ns:"Eines der letzten erhaltenen Straßenbahnnetze in Ostdeutschland — damit die ganze Stadt erkunden",nst:"Das Cottbuser Straßenbahnnetz fährt seit 1903. Von Anfang bis Ende ist eine 40-minütige Stadttour.",nt:"Tageskarte kaufen. Jede Linie einmal von Ende zu Ende fahren."},
  {id:99,n:"Stadtmauer Remnants — Altstadt #99",a:"Altstadt",v:["history","hidden"],d:9,s:"Sections of the 14th century city wall still visible in back gardens and cellar walls",st:"Most of Cottbus\'s medieval wall was demolished in the 18th century. Short sections are embedded in later buildings. The longest visible section is on Klosterstraße.",im:"Time-travel: the full medieval wall encircling Cottbus in 1400",t:"Walk Klosterstraße and look at the old walls incorporated into houses.",c:["free_museum"],r:"g",nn:"Stadtmauerreste — Altstadt #99",ns:"Abschnitte der Stadtmauer aus dem 14. Jh. noch in Hinterhöfen und Kellerwänden sichtbar",nst:"Der größte Teil der mittelalterlichen Mauer wurde im 18. Jh. abgerissen.",nt:"Klosterstraße abgehen und die alten Mauern in Häusern eingebaut betrachten."},
  {id:100,n:"Klosterkirche — Altstadt #100",a:"Altstadt",v:["history","quiet"],d:7,s:"The old Franciscan friary church — now used for concerts and community events",st:"The Franciscans arrived in Cottbus in the 13th century. Their church is the oldest building in the city centre. Now used for cultural events, but the interior can be seen during events.",im:"Time-travel: Franciscan friars conducting evening prayer in this church, 1350",t:"Check the events board outside for free concerts.",c:["local_only"],r:"g",nn:"Klosterkirche — Altstadt #100",ns:"Die alte Franziskanerklosterkirche — jetzt für Konzerte und Gemeinschaftsveranstaltungen genutzt",nst:"Die Franziskaner kamen im 13. Jh. nach Cottbus. Ihre Kirche ist das älteste Gebäude im Stadtzentrum.",nt:"Das Veranstaltungsbrett außen für kostenlose Konzerte prüfen."},
  {id:101,n:"Münzturm Remnant — Altstadt #101",a:"Altstadt",v:["history","hidden"],d:47,s:"The old mint tower — a stub of the medieval fortification hidden in a back lane",st:"The Münzturm was part of the medieval fortification system. What remains is a small tower fragment hidden between later buildings. Almost no visitors.",im:"Time-travel: coin makers working in the mint adjoining this tower, 1400",t:"Find it off Münzstraße. It has no information sign.",c:["architecture"],r:"g",nn:"Münzturmrest — Altstadt #101",ns:"Der alte Münzturm — ein Stumpf der mittelalterlichen Befestigung versteckt in einer Hintergasse",nst:"Der Münzturm war Teil der mittelalterlichen Befestigungsanlage.",nt:"Von der Münzstraße finden. Er hat kein Informationsschild."},
  {id:102,n:"Branitzer Heide Walk — Branitz #102",a:"Branitz",v:["nature","hidden","quiet"],d:19,s:"Heath land south of Branitz Park — heather, pines, silence, and the feeling of vastness",st:"Beyond the formal park, the heath and pine forest continues for kilometres. No paths are marked. This is the Brandenburg landscape in its raw form.",im:"Time-travel: Pückler riding on horseback through this heath to survey his land, 1845",t:"Continue south from the park entrance. The forest opens onto heathland.",c:["history_big"],r:"g",nn:"Branitzer Heide — Branitz #102",ns:"Heide südlich des Branitzer Parks — Heidekraut, Kiefern, Stille und das Gefühl der Weite",nst:"Jenseits des formalen Parks erstrecken sich Heide und Kiefernwald kilometerweit.",nt:"Vom Parkeingang nach Süden weitergehen. Der Wald öffnet sich zur Heide."},
  {id:103,n:"Cottbus Ostee View — Stadtring #103",a:"Stadtring",v:["nature","beautiful","hidden"],d:54,s:"The emerging Cottbus inland sea — a former open-cast mine turning into a giant lake",st:"The Cottbuser Ostsee is one of Europe\'s largest artificial lakes, created from a decommissioned lignite mine. Still being filled. The shoreline is raw and strange.",im:"Time-travel: 2019 — the mine draining its last coal, water slowly beginning to rise",t:"Accessible from the eastern edge of the city. Free.",c:["high_spots"],r:"g",nn:"Cottbuser Ostsee — Stadtring #103",ns:"Das entstehende Cottbuser Binnenmeer — ein ehemaliger Braunkohletagebau verwandelt sich in einen Riesensee",nst:"Der Cottbuser Ostsee ist einer der größten Kunstseen Europas, aus einem stillgelegten Tagebau entstanden.",nt:"Vom östlichen Stadtrand zugänglich. Kostenlos."},
  {id:104,n:"Sachsendorfer Wiesen — Neustadt #104",a:"Neustadt",v:["nature","local","free"],d:23,s:"Wildflower meadows along the Spree — the Cottbus locals come here on summer evenings",st:"The meadows along the Spree south of the city are a local secret. Wildflowers in spring. Swimming possible in summer. Nobody from outside the city knows this.",im:"Time-travel: factory workers cycling to these meadows for Sunday picnics, 1950",t:"Cycle south along the Spree from the city. 15 minutes.",c:["parks"],r:"g",nn:"Sachsendorfer Wiesen — Neustadt #104",ns:"Wildblumenwiesen entlang der Spree — die Cottbuser kommen hierher an Sommerabenden",nst:"Die Wiesen entlang der Spree südlich der Stadt sind ein lokales Geheimnis.",nt:"Entlang der Spree vom Stadtzentrum nach Süden radeln. 15 Minuten."},
  {id:105,n:"Stadtpark — Altstadt #105",a:"Altstadt",v:["nature","local"],d:10,s:"The central park of Cottbus — bandstand, old trees, the rhythms of city life",st:"The Stadtpark occupies the old fortification zone between the medieval city and 19th century expansion. The old trees are magnificent in autumn.",im:"Time-travel: Cottbus citizens promenading in Sunday best in this park, 1905",t:"Free. Bandstand concerts in summer.",c:["courtyards"],r:"g",nn:"Stadtpark — Altstadt #105",ns:"Der Zentralpark von Cottbus — Musikpavillon, alte Bäume, der Rhythmus des Stadtlebens",nst:"Der Stadtpark liegt im alten Festungsbereich zwischen mittelalterlicher Stadt und 19. Jh. Erweiterung.",nt:"Kostenlos. Pavillonkonzerte im Sommer."}

,{id:115,n:"Brandenburgisches Apothekenmuseum",a:"Altstadt",v:["hidden"],d:15,s:"Germany's 2nd largest pharmacy museum in a historic building.",st:"Explore centuries of apothecary history with rare tools and potions in this under-visited gem near Altmarkt.",im:"Step into a time capsule of bubbling elixirs and antique mortars.",t:"Free entry; peek through windows if closed.",c:["museums"],r:"g",nn:"Käthe-Kollwitz-Park",ns:"Deutschlands 2. größtes Apothekenmuseum in historischem Gebäude.",nst:"Entdecke Jahrhunderte der Apothekengeschichte mit seltenen Werkzeugen und Tränken in diesem unterschätzten Juwel nahe Altmarkt.",nt:"Kostenloser Eintritt; durch Fenster schauen wenn geschlossen."},
{id:116,n:"Käthe-Kollwitz-Park",a:"Neustadt",v:["hidden"],d:20,s:"Quiet park honoring the famous artist amid greenery.",st:"Tucked away, this serene green space features subtle nods to Käthe Kollwitz, perfect for a peaceful escape from tourist spots.",im:"Wander shaded paths with sculptures evoking human emotion.",t:"Bring a book; ideal for picnics.",c:["parks"],r:"g",nn:"Käthe-Kollwitz-Park",ns:"Ruhiger Park zur berühmten Künstlerin inmitten von Grün.",nst:"Versteckt gelegen, bietet dieser ruhige Grünraum subtile Anspielungen auf Käthe Kollwitz, ideal für einen friedlichen Rückzugsort.",nt:"Buch mitnehmen; perfekt für Picknicks."},
{id:117,n:"Weltspiegel Kino",a:"Altstadt",v:["hidden"],d:10,s:"Brandenburg's oldest cinema, a Jugendstil treasure.",st:"Germany's 2nd oldest still-operating movie theater hides architectural beauty and film history.",im:"Admire the ornate facade glowing under evening lights.",t:"Check facade anytime; free exterior view.",c:["architecture"],r:"g",nn:"Weltspiegel Kino",ns:"Ältestes Kino Brandenburgs, ein Jugendstil-Schatz.",nst:"Deutschlands 2. ältestes noch betriebenes Kino verbirgt architektonische Schönheit und Filmgeschichte.",nt:"Fassade jederzeit anschauen; kostenloser Außenblick."},
{id:118,n:"Cottbuser Postkutscher Denkmal",a:"Altstadt",v:["hidden"],d:5,s:"Iconic statue of the city's cheerful coachman.",st:"This beloved local mascot perches on the old city wall, symbolizing Cottbus's postal heritage—locals' secret favorite.",im:"Spot the grinning figure overlooking the streets.",t:"Quick photo stop; hunt nearby lobster symbols.",c:["statues"],r:"g",nn:"Cottbuser Postkutscher Denkmal",ns:"Ikone des fröhlichen Kutschers der Stadt.",nst:"Diese beliebte lokale Maskottchen-Figur thront an der alten Stadtmauer und symbolisiert Cottbus' Postgeschichte – ein Insider-Favorit.",nt:"Schneller Fotostopp; suche nahegelegene Hummersymbole."}];

<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Cottbus Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Cottbus Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
