  {id:101,n:"Hunterian Museum Oddities — Lincoln\'s Inn Fields",a:"Holborn",v:["weird", "hidden", "history"],d:101,s:"Medical museum of preserved specimens and surgical instruments—18th-century collection of oddities and intrigue",st:"Glass cases hold human specimens. Surgical instruments from centuries past. It\'s medical history\'s strangest artifacts. Unsettling. Educational. Darkly beautiful.",im:"It\'s 1800. A surgeon collects specimens. Medical knowledge advances on preserved tissue. Now you see the weird foundation of modern medicine.",t:"Glass cases hold human specimens. Surgical instruments from centuries past. It\'s medical history\'s strangest artifacts. Unsettling. Educational. Darkly beautiful.\",im:\"It\'s 1800. A surgeon collects specimens. Medical knowledge advances on preserved tissue. Now you see the weird foundation of modern medicine.\",t:\"Free entry. Tuesday-Saturday 10am-5pm. Holborn. Not for squeamish. Deeply interesting. Quiet. Academic atmosphere. Plan 2 hours.",c:["weird", "hidden", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:102,n:"Sir John Soane\'s Museum Home Library — Lincoln\'s Inn Fields",a:"Holborn",v:["history", "beautiful", "hidden"],d:102,s:"Architect\'s private house-museum packed with antiquities, sculptures, paintings—organized chaos of collector\'s obsession",st:"A house that is a museum. Rooms crammed with treasures. Sculptures beside paintings beside coins. It\'s overwhelming and beautiful. A mind\'s collection visible.",im:"It\'s 1800. An architect obsesses. Collects. Organizes. His house becomes a cabinet of wonders. Now you see his world entire.",t:"A house that is a museum. Rooms crammed with treasures. Sculptures beside paintings beside coins. It\'s overwhelming and beautiful. A mind\'s collection visible.\",im:\"It\'s 1800. An architect obsesses. Collects. Organizes. His house becomes a cabinet of wonders. Now you see his world entire.\",t:\"Free entry (book ahead). Tuesday-Saturday 10am-5pm. Holborn. Feel like you\'re in his home. Personal. Intimate. Transformative experience.",c:["history_big", "beautiful", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:103,n:"Little Venice Canals — Paddington",a:"Paddington",v:["beautiful", "quiet", "local"],d:103,s:"Narrow boats and tree-lined canals in West London—Venice-style waterways where locals live floating",st:"Trees hang over water. Narrow boats painted bright. A neighborhood floats. It\'s Venice in London. Quiet water. Green. People live here by choice.",im:"It\'s 1820. Canals built for commerce. Now artistic souls moor boats and live poetically on water.",t:"Trees hang over water. Narrow boats painted bright. A neighborhood floats. It\'s Venice in London. Quiet water. Green. People live here by choice.\",im:\"It\'s 1820. Canals built for commerce. Now artistic souls moor boats and live poetically on water.\",t:\"Free walk. Paddington. Cafés nearby. Boat tours available (£10). Sunset magical. Weekday quiet. Photography stunning.",c:["beautiful", "quiet", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:104,n:"Eltham Palace Art Deco Interiors — Eltham",a:"Eltham",v:["history", "beautiful", "weird"],d:104,s:"Medieval palace with 1930s Art Deco mansion tacked on—contradiction that becomes beautiful harmony",st:"Medieval stone. Modern Art Deco. 1930s luxury. A rich family added a modern wing. It shouldn\'t work. It does. History layered.",im:"It\'s 1930. New money builds an Art Deco palace beside medieval walls. Two worlds collide. They coexist.",t:"Medieval stone. Modern Art Deco. 1930s luxury. A rich family added a modern wing. It shouldn\'t work. It does. History layered.\",im:\"It\'s 1930. New money builds an Art Deco palace beside medieval walls. Two worlds collide. They coexist.\",t:\"£15 entry. English Heritage site. South London. Gardens stunning. Interiors sumptuous. Plan 3 hours. Tea available.",c:["history_big", "beautiful", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:105,n:"Kew Gardens Treetop Walk — Kew",a:"Kew",v:["nature", "beautiful", "high_spots"],d:105,s:"Elevated walkway through tree canopy—see London\'s oldest botanical garden from above the trees",st:"Enter the canopy. Walk among leaves. See birds at their level. The garden transforms from above. Beauty from perspective shift.",im:"It\'s 2008. A bridge is built into trees. Visitors walk where squirrels live. The garden changes perspective.",t:"Enter the canopy. Walk among leaves. See birds at their level. The garden transforms from above. Beauty from perspective shift.\",im:\"It\'s 2008. A bridge is built into trees. Visitors walk where squirrels live. The garden changes perspective.\",t:\"Extra fee with entry. Kew Gardens. Southwest London. Stunning photos. Kids love it. Peaceful. Plan hour. Weather-dependent.",c:["nature", "beautiful", "high_spots"],r:"g",nn:"",ns:"",nst:"",nt:""}

  {id:108,n:"Leake Street Graffiti Tunnel",a:"Waterloo",v:["art","free","weird"],d:15,s:"Legal graffiti tunnel under railway arches — Banksy\'s home territory",st:"Leake Street is a legal graffiti space under railway arches where artists create constantly. The walls change weekly. It\'s raw, energetic, and free to view or contribute (if skilled).",im:"Time-travel: Banksy helped open it as a legal space; he famously painted here.",t:"Free to walk and photograph.",c:["street_art","weird"],r:"g",nn:"Leake Street Graffiti",ns:"Túnel de graffiti legal — territorio de Banksy",nst:"Explora el arte callejero legal de Leake Street.",nt:"Gratis. Waterloo."},
  {id:109,n:"Shoreditch Street Art Walking",a:"East London",v:["art","free","local"],d:15,s:"Evolving street art district where murals change weekly",st:"Shoreditch and Brick Lane are constantly painted and repainted. The scene is raw, political, and authentic. Walk in the early morning to see artists at work.",im:"Time-travel: Shoreditch was rough; street art gentrified it in the 2000s.",t:"Free to walk. Brick Lane cafes/shops have costs.",c:["street_art","local_only"],r:"g",nn:"Shoreditch Street Art",ns:"Distrito de arte callejero en constante evolución",nst:"Camina Brick Lane viendo murales frescos.",nt:"Gratis paseo."}
  {id:106,n:"Tower Bridge at 6am — Tower Bridge",a:"Tower Bridge",v:["famous","beautiful","history_big"],d:15,s:"The iconic bridge in dawn light — empty, perfect, yourself and London's most famous image.",st":"Tower Bridge is mobbed by noon. Come at 6am. The bridge is empty. The light is perfect. The Thames below reflects everything. This is what London looks like before the tourists arrive.","im":"Bridge in perfect light. River reflecting. Empty street. Silence. A jogger passing.","t":"Free to view exterior. Bridge interior €11.50 if interested. 6–8am best.","c":["greatest_hits","beautiful","history_big"],"r":"g","nn":"Tower Bridge um 6 Uhr — Tower Bridge","ns":"Die ikonische Brücke im Morgenlicht — leer, perfekt, du und Londons berühmtestes Bild","nst":"Tower Bridge ist mittags überlaufen. Komm um 6 Uhr.","nt":"Kostenlos von außen. Innenseite €11,50. 6–8 Uhr beste."},
  {id:107,n:"Thames River Walking — Riverbank",a:"Riverbank",v:["beautiful","local","quiet"],d:25,s:"10km of walking both sides of the Thames through London — never stopping, always changing, the city's spine.",st":"The Thames path runs 10km through London. You can walk from Westminster to Tower Bridge and beyond. The city reveals itself from the water side.","im":"River flowing. City on both sides. Bridges spanning. People running. The Thames connecting everything.","t":"Free walk. Both embankments accessible. Allow 2–3 hours. Anytime is good.","c":["beautiful","local","quiet"],"r":"g","nn":"Themse Flusswanderung — Flussufer","ns":"10 km Fußweg beide Seiten der Themse durch London — nie gestoppt, immer verändernd","nst":"Der Themse-Pfad verläuft 10 km durch London.","nt":"Kostenlos zum Gehen. Beide Ufer zugänglich. 2–3 Stunden. Jederzeit gut."},
  {id:108,n:"British Museum Early Entry — Museu",a:"Museu",v:["nerd_pilgrimage","history","museum"],d:10,s:"One of the world's greatest collections — arrive 8:30am when it opens, you have 30 min alone.",st":"The British Museum opens at 9am. Arrive at 8:45am when gates open. You have 30 minutes before crowds. The collection is extraordinary. World history in one building.","im":"Vast gallery. Sculptures. Ancient texts. You and silence. Extraordinary objects.","t":"Free entry (donation suggested). Opens 9am. Morning quietest. Allow 3+ hours.","c":["nerd_pilgrimage","history","museum"],"r":"g","nn":"Britisches Museum Früheintritt — Museu","ns":"Eine der größten Sammlungen der Welt — 8:30 Uhr ankommen, wenn es öffnet","nst":"Das Britische Museum öffnet um 9 Uhr.","nt":"Kostenlos (Spende vorgeschlagen). 9 Uhr öffnet. Morgens stillster."},
  {id:109,n:"Stacks at Tower Records — Tower Bridge",a:"Tower Bridge",v:["weird","local","hidden"],d:15,s:"Wander the hidden vinyl record shops near Tower Bridge — collector culture still alive.",st":"Old vinyl shops still exist near Tower Bridge. Record collectors come here. It's a hidden community of people who still collect physical music.","im":"Stacks of vinyl. A collector flipping through records. The sound of needles on vinyl in the background.","t":"Free to browse. Records €5–30 depending on rarity. Weekday mornings quietest. 11am–5pm.","c":["weird","local","hidden"],"r":"g","nn":"Stöcke bei Tower Records — Tower Bridge","ns":"Wandern Sie die versteckten Plattenladen in der Nähe von Tower Bridge — Sammlerkultur lebt noch","nst":"Alte Plattenläden existieren noch in der Nähe von Tower Bridge.","nt":"Kostenlos zum Durchsuchen. Platten €5–30 je nach Seltenheit."},
  {id:110,n:"London Markets — Various",a:"Markets",v:["markets","local","food"],d:20,s:"Borough Market, Portobello, Brick Lane — where Londoners actually buy food and vintage.",st":"London has markets that are genuinely local. Borough Market on Thursdays/Fridays is where people buy food. Portobello on Saturdays is antiques. Brick Lane on Sundays is vintage. Each is different. Each is authentic.","im":"Market stall. Person buying vegetables. Real commerce. No tourist feel.","t":"Free walk. €5–20 per item. Various days. Weekday afternoons quietest.","c":["markets","local","food"],"r":"g","nn":"Londoner Märkte — Verschiedene","ns":"Borough Market, Portobello, Brick Lane — wo Londoner tatsächlich Essen und Vintage kaufen","nst":"London hat Märkte, die echte Einheimische sind.","nt":"Kostenlos zum Gehen. €5–20 pro Artikel. Verschiedene Tage."},
  {id:111,n:"London Pubs — Various",a:"Various",v:["local","drinking","cultural"],d:30,s:"Real pubs where locals drink real ale — wood interiors, local conversations, community.",st":"London's proper pubs (not chains) are where locals actually go. They have real ale, wood interiors, and people talking. They're the opposite of the tourist pubs.","im":"Wood-paneled pub. A pint being poured. People talking. Quiet laughter.","t":"Pint €5–8. Food €8–15. Lunch or early evening. Weekdays best.","c":["local","drinking","cultural"],"r":"g","nn":"Londoner Pubs — Verschiedene","ns":"Echte Pubs, wo Einheimische echtes Bier trinken — Holzinnenräume, lokale Gespräche","nst":"Londons echte Pubs (nicht Ketten) sind, wo Einheimische tatsächlich hingehen.","nt":"Pint €5–8. Essen €8–15. Mittag oder früh abends. Werktage beste."},
  {id:112,n:"London Cycling Path Network — City Network",a:"Network",v:["cycling","local","infrastructure"],d:30,s:"Over 400km of cycling paths connecting everything — locals bike everywhere in London.",st":"London has 400+ km of cycling paths. Locals bike to work, to shops, everywhere. The infrastructure is surprisingly good for such a big city.","im":"Bike path. Commuter cyclist. City connected by bikes.","t":"Bike rental €12–20/day or use Citybike scheme (€2 per trip). Maps at rental shops.","c":["cycling","local"],"r":"g","nn":"Londoner Radwegnetz — Stadtnetz","ns":"Über 400 km Radwege verbinden alles — Einheimische fahren überall in London Rad","nst":"London hat 400+ km Radwege.","nt":"Fahrrad-Verleih €12–20/Tag oder Citybike-Schema (€2 pro Fahrt)."},
  {id:113,n:"London Bookshops — Various",a:"Various",v:["weird","local","nerd_pilgrimage"],d:20,s:"Specialized bookshops where readers actually gather — Foyles, Waterstones, independent shops.",st":"London still has independent bookshops. Foyles (the legendary one) still exists. People actually browse. It's reader culture.","im":"Bookshop full of books. A person reading in a corner. The smell of paper. Quiet intensity.","t":"Free to browse. Books €10–30. Morning quietest. 10am–6pm daily.","c":["weird","local","nerd_pilgrimage"],"r":"g","nn":"Londoner Buchhandlungen — Verschiedene","ns":"Spezialisierte Buchhandlungen, wo Leser tatsächlich versammeln — Foyles, Waterstones","nst":"London hat immer noch unabhängige Buchhandlungen. Foyles existiert immer noch.","nt":"Kostenlos zum Durchsuchen. Bücher €10–30. Morgens stillster."},
  {id:114,n:"South Bank Walk — South Bank",a:"South Bank",v:["beautiful","local","culture"],d:20,s:"The Thames south side from Tower Bridge to Westminster — museums, cafes, the city revealing itself.",st":"The South Bank is where London lives. Museums, galleries, theaters, cafes. It's all there. Locals spend time here. It's beautiful and alive.","im":"River path. People sitting. Museums visible. City spanning. Life visible.","t":"Free walk. Museums €5–15 if interested. Cafes €3–8. Anytime is good. Evenings are lovely.","c":["beautiful","local","culture"],"r":"g","nn":"South Bank Spaziergang — South Bank","ns":"Die Themse-Südseite von Tower Bridge zu Westminster — Museen, Cafes, die Stadt","nst":"Die South Bank ist, wo London lebt.","nt":"Kostenlos zum Gehen. Museen €5–15. Cafes €3–8. Jederzeit gut."},
  {id:115,n:"London Parks — Hyde, Regent, St James\'s",a:"Parks",v:["parks","beautiful","local"],d:20,s:"Three royal parks connected by walking paths — 500 hectares of green in the middle of the city.",st":"Hyde Park, Regent's Park, St James's Park are connected. You can walk 5km through green space in the middle of London. Locals use these daily.","im":"Green space in city. People walking. Water visible. Complete peace in the middle of chaos.","t":"Free walk. 5km takes 1.5 hours. Anytime is good. Morning is quietest.","c":["parks","beautiful","local"],"r":"g","nn":"Londoner Parks — Hyde, Regent, St James\'s","ns":"Drei königliche Parks verbunden durch Fußwege — 500 Hektar Grün in der Stadtmitte","nst":"Hyde Park, Regent's Park, St James's Park sind verbunden.","nt":"Kostenlos zum Gehen. 5 km dauert 1,5 Stunden. Jederzeit gut. Morgens stillster."},
  {id:116,n:"London Cafe Culture — Various",a:"Various",v:["local","food","cultural"],d:20,s:"Independent cafes where people actually work and hang out — coffee, wifi, community.",st":"London has genuine independent cafe culture. People sit for hours with laptops and coffee. They know each other. It's community.","im":"Cafe full of people on laptops. Coffee being made. Quiet energy. People working or reading.","t":"Coffee €3–5. Pastry €3–6. Open 8am–6pm daily. Weekday afternoons quietest.","c":["local","food","cultural"],"r":"g","nn":"Londoner Cafe Kultur — Verschiedene","ns":"Unabhängige Cafes, wo Menschen tatsächlich arbeiten — Kaffee, Wifi, Gemeinschaft","nst":"London hat echte unabhängige Cafe-Kultur.","nt":"Kaffee €3–5. Gebäck €3–6. 8–18 Uhr täglich. Werktag nachmittags stillster."},
  {id:117,n:"London Bakeries — Brick Lane, Borough",a:"Brick Lane",v:["food","local","markets"],d:15,s:"Authentic bakeries from immigrant communities — Indian naan, Jewish bagels, Turkish pastries.",st":"London has bakeries from every culture. Brick Lane has Indian bakeries. Borough Market has Jewish bagels. Turkish bakeries everywhere. It's food diversity.","im":"Baker pulling bread from oven. Fresh pastry. Steam. The smell of different breads.","t":"€2–5 per item. Open 6am–6pm usually. Morning fresh. Weekday mornings quietest.","c":["food","local","markets"],"r":"g","nn":"Londoner Bäckereien — Brick Lane, Borough","ns":"Authentische Bäckereien von Einwanderergemeinden — indische Naan, jüdische Bagels","nst":"London hat Bäckereien aus jeder Kultur.","nt:"€2–5 pro Artikel. 6–18 Uhr normalerweise. Morgens frisch. Werktag morgens stillster."},
{id:301, n:"Tower of London — The Crown Jewels at 9am", a:"Tower of London", v:["famous","history"], d:180, s:"The Crown Jewels at opening before lines form. 9am, 45 minutes alone with monarchy\'s symbols. Book skip-the-line tickets.", st:"Tower of London opened 1066. It still holds the Crown Jewels. The Jewels are in a vault with glass walls and moving walkways. You cannot linger — the walkway moves you through in 15 minutes. But 9am, right at opening, the queue is short and you move quickly. The Koh-i-Noor diamond is there. The Crown is there. St Edward\'s Crown (used in coronations) is there. The symbols matter more than the objects. The objects are protected by six inches of glass and you are 12 inches away. At 10am the crowds arrive and the walkway slows. By 11am you are packed with 200 people. Come at 9am.", im:"Walking past glass vault. Jewels lit specific. Crown, sceptre, orb. Six inches away, unreachable. Lights and diamond catching light.", t:"£33.90 standard entry. Book skip-the-line online (saves 1 hour). Daily 9am–5:30pm (opens 9am). Tower Hill tube directly. Come at 9am sharp. The Crown Jewels take 15 min walk-through. The Tower itself (walls, buildings, armory) takes another 90 minutes if you wander. Budget 3 hours total. The Raven story is true — they do live here.", c:["greatest_hits","famous","history"], r:"g", nn:"Tower of London — Crown Jewels", ns:"Crown Jewels na pagbubukas bago mag-form ang mga linya. 9am, 45 minuto nag-iisa. Book skip-the-line tickets.", nst:"Tower of London bumukas 1066. Isinasangkot pa rin ang Crown Jewels. Ang mga hiyas ay nasa vault na may glass walls. Hindi mo maaaring mag-antala — ang walkway ay gumagalaw sa iyo sa loob ng 15 minuto.

Pero 9am, kaagad sa pagbubukas, ang pila ay maikli at mabilis kang gumagalaw. Ang Koh-i-Noor diamante ay nandoon. Ang Crown ay nandoon. Ang mga simbolo ay mas mahalaga kaysa sa mga bagay.", nt:"£33,90 standard entry. Book skip-the-line online. Araw-araw 9am–5:30pm. Tower Hill tube direkta. Halika sa 9am sharp."},
{id:302, n:"Westminster Abbey — Royal Burials and Architecture", a:"Westminster", v:["famous","history"], d:120, s:"1,000 years of burials. Mary Queen of Scots, Elizabeth I, Darwin, Dickens. The arches point upward like a prayer in stone.", st:"Westminster Abbey was founded in 1066 (same year as Tower of London). The Gothic architecture is a technical marvel — the ribbed vaults point upward and the eye follows. Kings and queens are buried here. Scientists and poets are buried here. The floor itself is a map of history. You walk over tombs without knowing it. The light comes through the rose windows and fills the space. The atmosphere is genuinely reverent — not because of religion but because of the weight of history. The Abbey is less crowded than St Paul\'s. The architecture is less ornate but more spiritual. Come early or come at evensong (5pm Tue–Thu) when the choir is singing — the experience changes completely.", im:"Inside vaulted space. Stone arches point up. Rose window light fills. Tombs beneath feet. Silence and centuries.", t:"£29 entry. Daily 9:30am–3:30pm (closed Sundays). Evensong 5pm (free, not a ticket, just open doors). Westminster tube to Parliament. Come early for quiet. Evensong (Tue–Thu 5pm) is free but you must arrive by 4:45pm and stand in back. The view from this Abbey of the Palace of Westminster (Parliament) visible across the square.", c:["greatest_hits","famous","history"], r:"g", nn:"Westminster Abbey", ns:"1.000 taon ng mga burial. Mary Queen of Scots, Elizabeth I, Darwin, Dickens.", nst:"Westminster Abbey ay itinayo noong 1066 (parehong taon ng Tower of London). Ang Gothic architecture ay isang teknikal na kahanga-hanga — ang mga ribbed vaults ay tumutok paakyat at ang mata ay sumusunod.

Ang liwanag ay dumadating sa pamamagitan ng mga rose window at napupuno ang espasyo. Ang atmosfera ay tunay na mapagpapahalaga — hindi dahil sa relihiyon kundi dahil sa bigat ng kasaysayan.", nt:"£29 entry. Araw-araw 9:30am–3:30pm (sarado Linggo). Evensong 5pm (libre)."},
{id:303, n:"St Paul\'s Cathedral — The Dome You Have To See", a:"City of London", v:["famous","history"], d:90, s:"Sir Christopher Wren\'s dome. Survived WWII bombing. 528 steps to the Golden Gallery. The light at the top changes how you see London.", st:"St Paul\'s Cathedral was built 1697 by Christopher Wren after the Great Fire of 1666. The dome is the point — it is 111 meters high. It survived WWII bombing. Nazi bombers tried to hit it; they failed. The climb is 528 steps and the reward is the Golden Gallery at the top — a walkway around the outside of the dome with 360° views of London. The climb gets progressively harder. The Whispering Gallery (257 steps) is where the stone itself whispers sound. The Stone Gallery (376 steps) is where you can see the dome as architecture. The Golden Gallery (528 steps) is where you exit outside. Each level changes the experience. Come early and take your time — the view is worth the climb.", im:"Climbing spiral stairs inside stone dome. Higher and higher. Windows showing increasingly larger views of London. At top, completely exposed. Wind and light. City tiny below.", t:"£20 adults (dome only). Daily 8:30am–4:30pm (closes earlier some days for services). St Paul\'s tube. Book online or come early (8:45am opening). The climb is steep — bring water, take breaks. Elderly or fitness concerns — the Whispering Gallery (257 steps) is still excellent and much easier.", c:["greatest_hits","famous","history","high_spots"], r:"g", nn:"St Paul\'s Cathedral", ns:"Ang dome ni Sir Christopher Wren. Nagsurba sa WWII bombarding. 528 hakbang sa Golden Gallery.", nst:"St Paul\'s Cathedral ay itinayo 1697 ng Christopher Wren pagkatapos ng Great Fire ng 1666. Ang dome ay ang punto — ito ay 111 metro ang taas. Nagsurba ng WWII bombing.

Ang pag-akyat ay 528 hakbang at ang gantimpala ay ang Golden Gallery sa tuktok — isang lakbayin sa paligid ng labas ng dome na may 360° view ng London.", nt:"£20 adult (dome lamang). Araw-araw 8:30am–4:30pm. St Paul\'s tube."},
{id:304, n:"Tower Bridge — Walk Across the Glass Floor", a:"Tower Bridge", v:["famous","views"], d:60, s:"Most photographed bridge in Europe. Walk across a glass floor 42 meters above the Thames. The river visible beneath your feet. Vertigo.", st:"Tower Bridge looks like a castle. It is actually a drawbridge built 1894. You can walk the high-level footbridge — the glass floor is the point. You are 42 meters above the Thames. The glass is strong but the feeling of walking above water is real. The bridge still operates — if you are there at the right time you see the bascules open for a ship to pass. The low-level walkway shows the mechanics of the bridge (the hydraulics, the original 1890s machinery). The upper level shows the view. Come at dusk when the light is gold and the Thames is calm. The bridge is beautiful in photographs but the experience of walking it is completely different.", im:"Walking on glass. River visible 42 meters below. Other side of Thames approaching. Light catching water. Vertigo and beauty.", t:"£15 adults. Daily 9:30am–6pm (times vary seasonally). Book online skip-the-line. Tower Bridge tube directly. Come at dusk (5–6pm depending on season) for best light. Check opening times — the bridge still operates and sometimes closes. The exhibit inside (history of bridge, mechanics) is worth 30 min but the walk is the point.", c:["greatest_hits","famous","views"], r:"g", nn:"Tower Bridge", ns:"Pinakasikat na tulay sa Europe. Lakbayin sa buong bahagi ng glass floor 42 metro sa itaas ng Thames.", nst:"Tower Bridge ay mukhang isang kastilyo. Ito ay talagang isang drawbridge na itinayo 1894. Maaari mong lakbayin ang mataas na antas ng footbridge — ang glass floor ay ang punto. Ikaw ay 42 metro sa itaas ng Thames.

Ang tulay ay gumagana pa rin — kung nandoon ka sa tamang oras makikita mo ang bascules bumubukas para sa isang barko na dumaan. Ang karanasan ng pagbilang sa ito ay ganap na magkaiba.", nt:"£15 adult. Araw-araw 9:30am–18:00 (iba ang oras depende sa season)."},
{id:305, n:"Big Ben (Elizabeth Tower) — Parliamentary Bells at the Hour", a:"Westminster", v:["famous","history"], d:30, s:"334 steps inside the clock tower. Stand next to the bell when it strikes the hour. The vibration moves through your body. The sound is physical.", st:"Big Ben is technically the name of the bell, not the tower. The tower is Elizabeth Tower (renamed 2022). The climb is 334 steps up a tight spiral staircase. The reward is standing next to the Great Bell when it strikes the hour. The bell weighs 13.7 tons. When it rings, the vibration is felt more than heard. Your body resonates. The tour is timed — you must be at the bell at a specific time. The mechanism is visible (the clockwork, the gears). The windows show Westminster and the Thames. The experience is the physical sensation of the bell ringing while you stand inside the tower.", im:"Standing next to an enormous bronze bell. Suddenly it moves. Sound and vibration simultaneously. 13.7 tons of metal at work.", t:"£15 adults. Tours only with advance online booking (popular, book ahead). Parliament.uk website for tour times. Westminster tube. Age 11+ only (11–16 require an adult). The climb is narrow and steep — not accessible for mobility issues. The bell rings at 3pm, 6pm, 9pm, midnight — you must time your tour to match.", c:["greatest_hits","famous","history"], r:"g", nn:"Big Ben (Elizabeth Tower)", ns:"334 na hakbang sa loob ng clock tower. Tumayo sa tabi ng kampana kapag umuugnay ang oras. Ang vibration ay dumadaloy sa iyong katawan.", nst:"Big Ben ay teknikal na ang pangalan ng kampana, hindi ng tower. Ang tower ay Elizabeth Tower (pinalit ng pangalan 2022). Ang pag-akyat ay 334 hakbang sa isang makpit na spiral staircase.

Ang gantimpala ay tumayo sa tabi ng Great Bell kapag umuugnay ang oras. Ang kampana ay tumitimbang ng 13.7 tonelada. Kapag tumunog ito, ang vibration ay nararamdaman nang higit sa marinig.", nt:"£15 adult. Tours lamang na may advance na online booking. Parliament.uk website para sa oras ng tour."},
{id:306, n:"British Museum — The Rosetta Stone and Elgin Marbles", a:"Bloomsbury", v:["famous","museum"], d:240, s:"8 million artifacts. Two that changed history: Rosetta Stone (unlocked Egyptian hieroglyphics). Elgin Marbles (Greek perfection). See them. Debate later.", st:"The British Museum holds humanity\'s greatest hits in one building. The Rosetta Stone unlocked the Egyptian language — without it we could not read hieroglyphics. The Elgin Marbles are Greek sculptures so technically perfect they seem alive. Both are controversial (questions of who owns them, where they belong) but historically essential. The museum is enormous and cannot be done in one visit. Pick one wing and go deep. The Egyptian wing is strongest. The Greek sculptures are strongest. Do not try to see everything. The experience is the objects, not the completeness. The reading room (where Marx worked) is available to sit in if you book ahead. The Great Court (open space surrounded by galleries) is worth sitting in.", im:"Inside vast halls. Glass cases with objects 2,000+ years old. Hieroglyphics carved in stone. Greek limbs in perfect proportion. Time visible.", t:"Free general admission (donations requested). Hours 10am–5:30pm (Fri until 8:30pm). Great Russell Street, Bloomsbury. British Museum tube. Book online to skip queues (free, but timed entry). Come mid-week or Fri evening for quieter. Fri after 6pm is less crowded. Do not try to see everything — pick one culture and spend 2 hours.", c:["greatest_hits","famous","museum"], r:"g", nn:"British Museum", ns:"8 milyong artifact. Dalawa na nagbago ng kasaysayan: Rosetta Stone. Elgin Marbles.", nst:"Ang British Museum ay nagsasagawa ng pinakamagandang mga hit ng sangkatauhan sa iisang gusali. Ang Rosetta Stone ay nag-unlock ng Egyptian wika — nang wala ito hindi natin mababasa ang mga hieroglyphic.

Ang Elgin Marbles ay Greek na mga eskultura kaya teknikal na perpekto na mukhang buhay. Ang museum ay napakalaki at hindi maaaring gawin sa isang pagbisita.", nt:"Libreng pangkalahatang admission (hinihiling ang mga donasyon). Oras 10am–5:30pm (Biyernes hanggang 8:30pm)."},
{id:307, n:"National Gallery — 2,300 Paintings, Start With Room 1", a:"Trafalgar Square", v:["famous","museum"], d:240, s:"Too big to comprehend. Start at room 1 and stop when you are tired. Vermeer, Van Gogh, Constable, Turner, Raphael all here. Pick your era and dive.", st:"The National Gallery has 2,300 paintings and it is free. You cannot see them all. You cannot see them in one visit. The trick is not trying. Start in room 1 (Italian, 13th–14th century). Let the painting sink in. Move through chronologically or jump around. The Impressionism section (Monet, Renoir, Van Gogh) is crowded but excellent. The Dutch Golden Age section (Rembrandt, Vermeer) is less crowded and just as good. The British section (Turner, Constable) shows how landscape changed painting. The museum is designed so that you can wander without getting lost. Sit in front of one painting for 30 minutes if you want. The painting will unfold. That is the museum\'s point.", im:"Standing before a Vermeer. Woman at a table. Light through a window. Detail so specific you can taste the moment.", t:"Free general admission (donations). Hours 10am–6pm (Wed until 9pm). Trafalgar Square. National Gallery tube (Charing Cross also close). Wednesday evenings (after 6pm) less crowded. Book time slot online (free, helps with planning). Audio guide £5 but not necessary. Sit down. Move slowly. One painting is better than a hundred.", c:["greatest_hits","famous","museum"], r:"g", nn:"National Gallery", ns:"2.300 mga painting, magsimula sa Room 1. Vermeer, Van Gogh, Constable, Turner, Raphael lahat nandito.", nst:"Ang National Gallery ay may 2.300 painting at ito ay libre. Hindi mo makikita ang lahat nila. Hindi mo makikita ang mga ito sa isang pagbisita. Ang trick ay hindi sinisikap.

Simulan sa room 1 (Italian, 13–14 siglo). Hayaan ang painting na lumubog sa loob. Lumipat nang chronological o tumalon. Ang Impressionism section ay puno pero excellent.", nt:"Libreng pangkalahatang admission (donasyon). Oras 10am–18:00 (Mierkules hanggang 21:00)."},
{id:308, n:"Tate Modern — Art in a Power Station", a:"South Bank", v:["famous","museum","weird"], d:180, s:"Gallery inside a decommissioned power plant. The turbine hall is seven stories high. Contemporary art in industrial space. Free.", st:"Tate Modern is in Bankside Power Station, a building built 1947 and decommissioned in 1981. The conversion is architectural — the turbine hall is seven stories of empty space now filled with large installations. The building is part of the art. The view from the top (free Level 7) shows all of London. The permanent collection is free. The special exhibitions cost £20+. The experience is moving through industrial space and seeing contemporary art in the context of that space. The power plant aesthetic (concrete, iron, space) makes modern art feel honest. Museums are supposed to feel modern; power plants are supposed to feel industrial. The collision works.", im:"Inside empty turbine hall. Ceiling seven stories up. Art installation filling the space. Industrial and clean. Massive and human at once.", t:"Free entry to permanent collection and building. Special exhibitions £20+. Daily 10am–6pm (Sun until 6pm). South Bank tube or London Bridge. Come at opening (10am) or late (5pm onward) for fewer crowds. Level 7 (free, open stairs) has views and is quiet. The Thames walk around the building (free) is beautiful. The Millennium Bridge connects here to St Paul\'s.", c:["greatest_hits","famous","museum","weird"], r:"g", nn:"Tate Modern", ns:"Gallery sa loob ng decommissioned na power plant. Ang turbine hall ay pitong kwento ang taas.", nst:"Ang Tate Modern ay nasa Bankside Power Station, isang gusali na itinayo 1947 at inaactual 1981. Ang conversion ay arkitektura — ang turbine hall ay pitong kwento ng walang espasyo na puno ngayon ng malalaking installation.

Ang gusali ay bahagi ng sining. Ang view mula sa tuktok (libreng Level 7) ay nagpapakita ng lahat ng London.", nt:"Libreng entry sa permanent na koleksyon at gusali. Special exhibitions £20+. Araw-araw 10am–18:00."},
{id:309, n:"Shakespeare\'s Globe Theatre — A Reconstruction That Works", a:"South Bank", v:["famous","theatre","history"], d:90, s:"Rebuilt 1997 based on 1599 original. Theatre where he performed. Actors still perform. You can stand in the pit where audiences once stood.", st:"Shakespeare\'s Globe was built 1599 on the South Bank. It was destroyed in a fire 1613. The modern reconstruction was built in 1997 based on historical research. It is not exact but it is close. The theatre still performs plays (mostly Shakespeare). You can stand in the pit (the groundlings section) and watch from the audience position of 1599. The experience is different from a modern theatre — no amplification, actors project to the back, the audience is surrounded by actors. The wooden gallery has the best sight lines but standing in the pit (£5–15 tickets) is the authentic experience. You will be uncomfortable and cold in winter. That is historically accurate.", im:"Inside wooden theatre. Stage at end. Actors projected above. Crowds around the stage. Open to the sky. Groundlings standing in straw and mud. Energy.", t:"£17–38 depending on seating (pit is cheapest). Performances Apr–Oct (seasonally). Box office phone or visit in person. 21 New Globe Walk, South Bank. London Bridge or Southwark tube. The exhibition hall (museum) is worth entering (£15) even if no performance that day. The Thames walk around the building is free.", c:["greatest_hits","famous","theatre","history"], r:"g", nn:"Shakespeare\'s Globe Theatre", ns:"Ikinabuo 1997 base sa 1599 original. Theatre kung saan siya nag-perform. Ang mga aktor ay nag-perform pa rin.", nst:"Ang Shakespeare\'s Globe ay itinayo 1599 sa South Bank. Ito ay nawasak sa isang apoy 1613. Ang modernong reconstruction ay itinayo sa 1997 base sa historical research. Hindi ito tumpak ngunit ito ay malapit.

Ang theatre ay nag-perform pa rin ng mga laro (karamihan Shakespeare). Maaari kang tumayo sa pit (ang groundlings section) at manood mula sa audience na posisyon ng 1599.", nt:"£17–38 depende sa seating (pit ay pinakamura). Mga pagtatanghal Apr–Oct."},
{id:310, n:"Kew Gardens — 300 Acres of Living Botanical Collection", a:"Kew", v:["famous","parks","nature"], d:240, s:"14,000 plant species. Walking is the point — the Palm House, the Temperate House, the riverside. Come when one thing is blooming, come back when another is. Different each season.", st:"Kew Royal Botanic Garden is 300 acres on the Thames. It is a living encyclopedia. 14,000 plant species from every climate. The Palm House is a greenhouse with tropical plants — hot and humid and overwhelming sensory. The Temperate House is plants from milder zones. The Treetop Walkway is a canopy-level walk. The Japanese Garden is peaceful. The Orangery is where potted plants winter. The experience is not rushing through but sitting and letting plants teach you. The gardens change by season. Spring (daffodils, cherry blossoms) is famous and crowded. Summer (roses) is beautiful and crowded. Autumn (colors) is less crowded and luminous. Winter (structure visible, fewer tourists) is calm and clear.", im:"Walking through a greenhouse. Humidity. Tropical plants overhead. Air warm and thick. Stepping outside to English landscape. Contrast.", t:"£16.50 adults. Daily 10am–4:15pm (varies by season). Kew Gardens tube directly. Come early (10:15am) for quiet. Come mid-week for fewer tourists. April–May and September best for both beauty and relative calm. The Treetop Walkway (no extra cost) is worth the climb. Bring water — 300 acres is long walking.", c:["greatest_hits","famous","parks","nature","day_trips"], r:"g", nn:"Kew Gardens", ns:"300 ektarya ng buhay na botanical na koleksyon. 14.000 species ng halaman. Ang paglalakad ay ang punto.", nst:"Ang Kew Royal Botanic Garden ay 300 ektarya sa Thames. Ito ay isang buhay na encyclopedia. 14.000 species ng halaman mula sa bawat klima. Ang Palm House ay isang greenhouse na may tropical plant — mainit at humid at overwhelming na sensory.

Ang karanasan ay hindi magmadali sa pamamagitan ngunit umupo at hayaan ang mga halaman na magturo sa iyo.", nt:"£16,50 adult. Araw-araw 10am–4:15pm (nag-iiba depende sa season)."},
{id:311, n:"St James\'s Park — The Most Royal Park in London", a:"Westminster", v:["famous","parks","romantic_water"], d:90, s:"92 acres. Pelicans. The Mall leading to Buckingham Palace. Sunset from the bridge over the lake is perfect. Ducks, swans, geese, and guards in bearskins walking past.", st:"St James\'s Park is the oldest of London\'s Royal Parks (named for the hospital dedicated to Saint James the Apostle). The park has pelicans — they have lived here since 1664 when they were a gift from the King of Moravia. The views are specific. From the bridge over the lake, you can see Buckingham Palace through the trees. In summer the trees are full and the palace is almost hidden. In winter the palace is visible. The park is where you see actual Londoners, not tourists. The deckchairs are out in summer (hire one for £2–3, sit and watch). The waterfowl are genuinely wild — the pelicans, ducks, geese, all living in the park. The guards (in bearskins, red coats) walk through to/from the Palace and it is strange seeing military march through a civilian park.", im:"Sitting on deckchair overlooking lake. Palace visible through trees. Pelican diving. Guard marching past in bearskin. Surreal and peaceful.", t:"Free entry. Always open (dawn to dusk). Victoria or St James\'s Park tube. Come mid-afternoon (2–4pm) for quiet. Summer better for color, winter better for views and peace. The Mall (walkway from park toward Buckingham Palace) is free to walk. Buckingham Palace is visible from the park but is not open to public (state visits and Changing of Guard still happen).", c:["greatest_hits","famous","parks","romantic_water"], r:"g", nn:"St James\'s Park", ns:"92 ektarya. Mga pelican. Ang Mall na nakaharap sa Buckingham Palace. Sunset mula sa tulay sa itaas ng lawa ay perpekto.", nst:"Ang St James\'s Park ay ang pinakamatanda ng Royal Parks ng London (pinangalan pagkatapos ng ospital na nakatuon sa Saint James the Apostle). Ang park ay may mga pelican — sila ay nabuhay dito simula 1664 kung kailan sila ay isang regalo mula sa King ng Moravia.

Ang mga view ay partikular. Mula sa tulay sa itaas ng lawa, makikita mo ang Buckingham Palace sa pamamagitan ng mga puno.", nt:"Libreng entry. Palaging bukas (umaga hanggang takip-silim). Victoria o St James\'s Park tube."},
{id:312, n:"Buckingham Palace — Changing of the Guard at 11:30am", a:"Westminster", v:["famous","ceremony"], d:45, s:"The official residence is not open to public (except limited summer days). But the Changing of the Guard happens at 11:30am Mon/Wed/Fri/Sun. The ceremony is 45 minutes and is free and public.", st:"Buckingham Palace is where the British Monarch lives. The palace is not open to public except Aug–Sept (limited, tickets required, about 19 days per year). But the Changing of the Guard ceremony is public and free. The ceremony happens at 11:30am on specific days (Mon/Wed/Fri/Sun, varies seasonally). The soldiers in red coats and bearskin hats march from Wellington Barracks. The ceremony involves marching, standing, drill, flags, and music. It is theatrical and strange — the real soldiers performing a ceremony that hasn\'t changed in 400 years while tourists photograph. The ceremony is about continuity and rules and the strange survival of tradition. The experience is watching the ceremony from the wrought-iron gates (crowded) or from the side streets where fewer people gather and you see the march approaching.", im:"Soldiers in red and bearskin hats. Marching in perfect formation. Flags snapping. Horses. Gates opening. Tourism and tradition performing together.", t:"Free. Ceremony 11:30am (Mon/Wed/Fri/Sun, check times online as they vary). Victoria tube or Green Park tube. Come 11am for decent viewing spot at the gates. The side streets (Stable Yard Road) are less crowded. The ceremony is 45 min. The palace itself is only open Aug–Sept if visiting the interior is important to you. The changing happens rain or shine.", c:["greatest_hits","famous","ceremony"], r:"g", nn:"Buckingham Palace", ns:"Ang opisyal na rehidensya ay hindi bukas sa publiko (maliban sa limitadong tag-init na araw). Ngunit ang Pagbabago ng Guard ay nangyayari sa 11:30am.", nst:"Ang Buckingham Palace ay kung saan naninirahan ang British Monarch. Ang palasyo ay hindi bukas sa publiko maliban sa Aug–Sept (limitado, kinakailangan ang mga tiket, tungkol sa 19 araw bawat taon).

Ngunit ang Pagbabago ng Guard ceremony ay publiko at libre. Ang seremonya ay nangyayari sa 11:30am sa mga partikular na araw (Mon/Wed/Fri/Sun, nag-iiba depende sa season).", nt:"Libre. Ceremony 11:30am (Mon/Wed/Fri/Sun, tingnan ang oras online)."},
{id:313, n:"Camden Market — Countercultural Heart of London", a:"Camden", v:["famous","markets"], d:120, s:"Thousands of stalls selling vintage, crafts, street food. The market where London\'s alternative scene lives. Saturday is best. Vendors are the attraction.", st:"Camden Market is not touristy in the way that Covent Garden is. It is genuinely where London\'s counter-culture and alternative scene gathers. The stalls are vintage, handmade, weird, music-focused, and real. The vendors are part of the show — they are musicians, artists, people with something to say. The market is old (1970s origin, continuing). Saturdays are crowded and busy but full of actual commerce. Sundays are bit quieter. Weekdays are nearly empty. The food stalls are genuinely good and cheap. The music and energy is the atmosphere. The main market is around the canal. The outdoor stall sections extend for blocks. The experience is getting lost in stalls and finding something unexpected.", im:"Crowds moving through tight aisles. Music from multiple directions. Smell of food, leather, incense. Stall vendors calling. Tattooed teenagers. Musicians playing. Chaos and community.", t:"Free to enter (shopping is separate cost). Saturday 10am–6pm, Sunday 10am–5pm, weekdays 10am–5:30pm (hours vary by vendor). Camden Town tube. Saturday best. Bring cash — many vendors don\'t take cards. The food stalls and music venues around the market are worth exploring. The canal walk around the market is free and beautiful.", c:["greatest_hits","famous","markets"], r:"g", nn:"Camden Market", ns:"Libu-libong stall na nagbebenta ng vintage, crafts, street food. Ang merkado kung saan nanirirahan ang London\'s alternative scene.", nst:"Ang Camden Market ay hindi touristy sa paraan ng Covent Garden. Ito ay tunay na kung saan ang London\'s counter-culture at alternative scene ay nagsasagulo. Ang mga stall ay vintage, gawa sa kamay, kakaiba, nakatuon sa musika, at totoong.

Ang mga vendor ay bahagi ng palabas — sila ay musikero, artist, mga taong may kung ano-ano sa pagsasabi. Ang market ay luma (1970s origin, patuloy).", nt:"Libre ang pagpasok (ang pamimili ay hiwalay na halaga). Sabado 10am–18:00, Linggo 10am–5pm."},
{id:314, n:"Borough Market — Food Market That Actually Feeds London", a:"South Bank", v:["famous","markets","food"], d:120, s:"1,000-year-old market. Still functioning market (not a tourist show). Real food. Thursday–Saturday. Come at 11am when vendors are set up and crowds are minimal.", st:"Borough Market has been in the same location (London Bridge area) since at least 1014. It was a produce market for 1,000 years. Now it is food stalls mixed with produce. The experience is completely different at different times. Early morning (6am–9am) is buyers and chefs and food professionals. Mid-morning (11am–12pm) is when stalls are set up and crowds are starting. Afternoon (12pm–3pm) is crowded with tourists and office workers buying lunch. The experience is best 11am–12pm — stalls are set, vendors are present, crowds are manageable. The food is genuinely good (British cheese, Spanish jamón, Thai street food, etc.). Come to eat. The market is working market, not a performance.", im:"Stall of bread. Stall of olives. Stall of hot food. Crowds moving slowly. Smells layering — bread, cheese, oil, spices. Real commerce.", t:"Free to wander (food costs vary, £5–15 per item). Thursday–Saturday 11am–5pm (hours vary). Wednesday 11am–3pm (reduced vendors). Sunday 10am–4pm. London Bridge tube. Wednesday least crowded. Thursday–Saturday mid-morning (11am–12pm) best for experience. Bring cash. The food here is good enough to be worth the cost. The surrounding area (Southwark, Borough) has pubs and streets worth exploring.", c:["greatest_hits","famous","markets","food"], r:"g", nn:"Borough Market", ns:"1.000-taong-lumang merkado. Patuloy na gumagana na merkado (hindi isang tourist show). Tunay na pagkain.", nst:"Ang Borough Market ay nasa parehong lokasyon (London Bridge area) simula sa kahit kailan 1014. Ito ay isang produce market para sa 1.000 taon. Ngayon ito ay food stall na pinagsama sa produce.

Ang karanasan ay ganap na magkakaiba sa iba't ibang oras. Madaling umaga (6am–9am) ay mga bumibili at chef at food professional. Umaga ang oras (11am–12pm) ay kapag ang mga stall ay naka-setup at nagsisimula ang mga multo.", nt:"Libreng paglibot (ang pagkain ay nag-iiba sa halaga, £5–15 bawat item). Biyernes–Sabado 11am–5pm."},
{id:315, n:"Portobello Road Market — Antiques and Saturday Energy", a:"Notting Hill", v:["famous","markets"], d:180, s:"Antique dealers on Saturday. The whole street is market from Notting Hill Gate to Golborne Road. Best at 9am before crowds. Vintage clothing, records, furniture, chaos.", st:"Portobello Road is famous as a market street. It functions as antique dealers and street stalls on Saturday (the big market day). The experience is walking the full length of the street (about 2 km) and watching the dealers set up. The north end (Golborne Road) is the grittier section with cheaper stalls and genuine bargains. The south end (near Notting Hill Gate) is more upscale and more touristy. The middle is a mix. Come early (8am–9am, setup time) when vendors are arranging but crowds haven\'t arrived. By 10am the market is full. By noon it is packed. The rhythm of the market is 8am–noon. After noon it becomes a tourist crush. The neighborhood (Notting Hill) is wealthy and beautiful but the market day is when it has character.", im:"Street closed to cars. Tables of vintage goods. Dealers arranging jewelry and records. Early light. Quiet crowds starting to arrive.", t:"Free to walk. Saturday market day 8am–6pm (best 8am–noon). Antiques vendors set up Thu–Sat but Saturday is the main day. Notting Hill Gate tube. Come 8am–9am for real market experience, 10am–noon for full market, 1pm+ for crowds and chaos. Bring cash (many vendors don\'t take cards). The Notting Hill neighborhood is worth exploring before/after market — cafes, bookshops, galleries.", c:["greatest_hits","famous","markets"], r:"g", nn:"Portobello Road Market", ns:"Antique dealer sa Sabado. Ang buong kalye ay merkado mula Notting Hill Gate hanggang Golborne Road.", nst:"Ang Portobello Road ay kilala bilang isang market street. Ito ay gumagana bilang antique dealer at street stall sa Sabado (ang malaking market day). Ang karanasan ay paglalakad ng buong haba ng kalye (tungkol sa 2 km) at paninood sa mga dealer na nagseset up.

Ang north end (Golborne Road) ay ang mas gritty na seksyon na may mas murang stall at tunay na bargain.", nt:"Libreng paglalakad. Sabado market day 8am–6pm (best 8am–noon)."},
{id:316, n:"Covent Garden — Street Performers and Market Archaeology", a:"Covent Garden", v:["famous","markets"], d:120, s:"Historic market hall (1830). Now covered market with stalls and tourists. But the street performers (in the portico, free, live) are the real show.", st:"Covent Garden was a vegetable market. Then it was a flower market (immortalized in My Fair Lady). Now it is a covered market with stalls, restaurants, and shops. The historic market hall is still there (1830 design, iron and glass architecture). The experience is not the stalls (most are tourist shops) but the street performers. In the portico of the market hall, performers play music and dance daily. The performances are free (tips collected). The performers are often genuinely skilled musicians and dancers. The space amplifies sound naturally (the arched ceiling) and the performances become special because of the space. The market hall itself is worth seeing for the architecture — the iron frame and glass roof is beautiful engineering.", im:"Inside covered market hall. Arched iron and glass ceiling. Street performer (violin or dance). Crowds gathered, tips in a hat. Sound reverberating through the space.", t:"Free to enter and wander. Stalls and shops have variable hours. Street performances daily, especially 12pm–2pm and 4pm–6pm (times vary). Covent Garden tube. Come 1pm–2pm for best performer energy. The market hall itself is interesting to walk through even without shopping. The surrounding streets (Neal Street, Monmouth Street) have indie shops and cafes. Do not pay for the tourist performances (the ones that charge) — the free portico performances are better.", c:["greatest_hits","famous","markets"], r:"g", nn:"Covent Garden", ns:"Historikal na market hall (1830). Ngayon ay covered market na may stall at tourist. Pero ang mga street performer ay ang tunay na palabas.", nst:"Ang Covent Garden ay isang vegetable market. Pagkatapos ito ay isang flower market (immortalized sa My Fair Lady). Ngayon ito ay isang covered market na may stall, restaurants, at tindahan.

Ang karanasan ay hindi ang stall (karamihan ay tourist shop) ngunit ang mga street performer. Sa portico ng market hall, ang mga performer ay tumutugtog ng musika at sumasayaw araw-araw.", nt:"Libreng pagpasok at pag-libot. Ang mga performance ay araw-araw, lalo na 12pm–2pm at 4pm–6pm."},
{id:317, n:"Museum of London — The City Built on Archaeology", a:"Barbican", v:["famous","museum","history"], d:120, s:"Three million objects covering 2,000 years. Arranged in chronological layers — the Roman London, Medieval London, Great Fire, Industrial, Modern — all in one building.", st:"The Museum of London tells London\'s history through objects. The building is built around surviving Roman mosaic. The collection goes back to 100 AD (when the Romans arrived). Each era has a section. The Roman section shows pottery and coins and jewelry from 2,000 years ago still in the ground where they were dropped. The Medieval section shows how the city developed. The Great Fire section (1666) explains what happened. The Industrial section shows how London became a global city. The museum does not pretend to be comprehensive — it is thematic. The experience is understanding how cities layer on top of each other. What is modern London is built on Medieval London is built on Roman London is built on pre-Roman London. The archaeology is literally beneath the buildings you walk past.", im:"Glass case. Roman pottery. Next case. Medieval coins. Next section. Photographs from 1900. Time layering. City built on city.", t:"Free entry. Daily 10am–6pm. Barbican tube (exit following signs). The museum is inside the Barbican estate (Brutalist architecture from 1960s, worth exploring). The Great Fire exhibition is strongest. The Roman section is eye-opening. Do not rush — the museum is designed for slow walking. The gift shop (free to browse) has excellent books on London history.", c:["greatest_hits","famous","museum","history"], r:"g", nn:"Museum of London", ns:"Tatlong milyong bagay na sumasaklaw sa 2.000 taon. Naka-arrange sa chronological na mga layer.", nst:"Ang Museum of London ay nagsasabi ng kasaysayan ng London sa pamamagitan ng mga bagay. Ang gusali ay itinayo sa paligid ng nakasurviving Roman mosaic. Ang koleksyon ay bumabalik sa 100 AD (kung kailan dumating ang mga Romano).

Bawat era ay may seksyon. Ang Roman section ay nagpapakita ng pottery at barya at hiyas mula 2.000 taon na ang nakakalat pa rin sa lupa.", nt:"Libreng entry. Araw-araw 10am–6pm. Barbican tube."},
{id:318, n:"Piccadilly Circus — Neon at Night (Skip the Day)", a:"Piccadilly Circus", v:["famous"], d:15, s:"Neon advertising signs, crowds, energy. Skip the daytime (chaos of tourists). Come 9pm when the neon is lit, crowds are thinning, the lights matter. 15 minutes.", st:"Piccadilly Circus is famous because of the neon signs. By day it is just a crowded intersection. By night (9pm onward) the signs light and the circle becomes a different place. The screens are all LED now (they replaced the iconic Coca-Cola sign and others with digital billboards, losing some of the charm). But the neon signs that remain are worth seeing when lit. The fountain is still there. The crowd is still there. But the light changes the experience. Come at 9pm, spend 15 minutes, move on. The point is the light, not the place.", im:"Neon light reflecting off wet pavement. Signs glowing. Crowds but thinned out. Night. Colour. Modern London.", t:"Free. Anytime. Piccadilly Circus tube. The daytime (10am–7pm) is not worth it — just crowds and photos. 9pm–11pm is the experience. The surrounding streets have restaurants and bars. The area is central to London and close to other attractions. Do not spend more than 30 minutes — it is the light, not the destination.", c:["greatest_hits","famous"], r:"g", nn:"Piccadilly Circus", ns:"Neon advertising signs, multo, enerhiya. Iwanan ang araw (gulo ng turista).", nst:"Ang Piccadilly Circus ay kilala dahil sa mga neon sign. Sa araw ito ay isang madidiwang intersection. Sa gabi (9pm paakyat) ang mga sign ay liwanag at ang bilog ay nagiging ibang lugar.

Ang mga screen ay LED na ngayon (palit nila ang iconic Coca-Cola sign at iba sa digital billboard, lumalaki ang charm).", nt:"Libre. Anumang oras. Piccadilly Circus tube. Ang daytime ay hindi ito nagkakahalaga — gulo at larawan."},
{id:319, n:"V&A Museum (Victoria and Albert) — Design in Every Form", a:"South Kensington", v:["famous","museum"], d:240, s:"The greatest design museum. 2.3 million objects from fashion to architecture to sculpture to furniture. Impossible to see in one visit. Pick one area and go deep.", st:"The V&A (Victoria and Albert) is the largest decorative arts museum in the world. The collection is staggering. You can spend two hours in the ceramics section and not finish. You can spend two hours in the textiles section and not finish. You can spend hours in fashion and still want more. The museum is organized by material and time period. The building itself is Victorian (1857) and the architecture is ornate and worth experiencing. The experience is not completeness but focused depth. Pick a collection that interests you (fashion, jewelry, Indian design, Islamic art, weapons, etc.) and spend 2–3 hours there. The museum is free and the permanent collection is not crowded if you wander the lesser-known sections. The British Galleries are strongest but less crowded if you go upstairs.", im:"Display case of intricate jewelry. Next case. Clothing from different centuries. Next. Furniture. Each object specific and beautiful. Museum of 2.3 million decisions.", t:"Free general admission (special exhibitions £20+). Daily 10am–5:45pm (Fri until 10pm). South Kensington tube. Come 10:15am or after 4pm for quietest. Friday evenings (after 6pm) less crowded. Pick one gallery instead of trying to see everything. The café and restaurant are good for breaks. The gift shop is excellent for design books.", c:["greatest_hits","famous","museum"], r:"g", nn:"V&A Museum (Victoria and Albert)", ns:"Ang pinakamagandang design museum. 2.3 milyong bagay mula fashion hanggang architecture.", nst:"Ang V&A (Victoria and Albert) ay ang pinakamalaking decorative arts museum sa mundo. Ang koleksyon ay nakakamangha. Maaari mong gastusin ang dalawang oras sa ceramics section at hindi matapos.

Maaari mong gastusin ang dalawang oras sa textiles section at hindi matapos. Maaari mong gastusin ang oras sa fashion at nais pa rin ng higit pa.", nt:"Libreng pangkalahatang admission (special exhibitions £20+). Araw-araw 10am–5:45pm (Biyernes hanggang 10pm)."},
{id:320, n:"Battersea Power Station — Industrial Monument", a:"Battersea", v:["famous","weird","history"], d:60, s:"1930s brick power station. 200 meters tall. Iconic skyline marker. Recently renovated, now mixed-use development, but the building is stunning from the river.", st:"Battersea Power Station is a 1930s building designed to produce electricity. It is 200 meters tall with four chimneys. It was the largest power station in the world when built. It is on the Thames so it was always a landmark. Pink Floyd used it for the Animals album cover (1977). For decades it was abandoned, then vandalized, then fought over. Recent renovation turned it into a shopping/residential complex. The building itself is stunning — red brick, specific geometry, visible from both sides of the Thames. The experience is best viewed from the Thames Path or from the riverside. Come at sunset when the light hits the brick. The renovation is contemporary inside but the exterior is preserved. The river walk around it is free and beautiful.", im:"Looking across the Thames. Massive brick structure. Red in late light. Four chimneys. Industrial and beautiful. Power Station as monument.", t:"Free to view from outside (the river path). The interior is now a shopping mall (£0 entry, but shopping at premium prices). Thames Path South is a free walk along the river that passes the station. Battersea Power Station tube (new station). The riverside approach is better than street approach. Come at sunset for the best light. The station itself is best from the opposite side of the Thames (better angle). Vauxhall Gardens nearby are worth exploring too.", c:["greatest_hits","weird","history"], r:"g", nn:"Battersea Power Station", ns:"1930s brick power station. 200 metro ang taas. Iconic skyline na marker.", nst:"Ang Battersea Power Station ay isang 1930s na gusali na dinisenyo upang lumikha ng koryente. Ito ay 200 metro ang taas na may apat na mga chimney. Ito ang pinakamalaking power station sa mundo kung ang itinayo.

Ang Pink Floyd ay gumamit nito para sa Animals album cover (1977). Sampung dekada ito ay naging abandoned, pagkatapos ay vandalized, pagkatapos ay naglaban.", nt:"Libre upang tingnan mula sa labas (ang river path). Ang interior ay ngayon isang shopping mall."},
{id:321, n:"Regent Street — The Curve and the Design", a:"Piccadilly/Oxford Street", v:["famous","architecture"], d:60, s:"Nash\'s 19th century street design. The gentle curve. Balconaded facades. Window shopping at 6pm when the light is gold. The street is a design object.", st:"Regent Street was designed by John Nash in 1820 as a showcase for London design. The street has a deliberate curve (not straight, which makes it feel like it is opening). The facades are balconaded (specific architectural style). The intention was to create a street that is beautiful in itself, not just a place for commerce. Now it is crowded with shops and tourists, but the architecture is still there if you look up. The experience is not shopping but walking and noticing the geometry. Walk at evening (6pm–7pm) when the light is golden. Walk slowly. Look up at the facades. The curve becomes apparent. The design reveals itself. The street is still doing what Nash intended — making you feel like you are in a specific place, shaped by architecture.", im:"Walking down the street. Facades on both sides. Slight curve ahead. Light golden. Shops and people but architecture visible. Curve defining space.", t:"Free to walk. Shops have hours (typically 10am–8pm). Evening (6–7pm) better light. Piccadilly Circus at south end, Oxford Circus at north end. The walk between them is 20 minutes and the architecture is the point. The side streets (Heddon Street, Carnaby Street) branch off and are worth exploring. The street is most beautiful in evening light when crowds are thinning.", c:["greatest_hits","famous","architecture"], r:"g", nn:"Regent Street", ns:"Nash\'s 19th century street design. Ang malambot na kurba. Balconaded na mga facade.", nst:"Ang Regent Street ay dinisenyo ng John Nash noong 1820 bilang isang showcase para sa London design. Ang kalye ay may dalaang kurba (hindi tuwid, na ginagawa itong pakiramdam na ito ay nabubukas).

Ang mga facade ay balconaded (partikular na arkitektura na istilo). Ang layunin ay lumikha ng isang kalye na maganda sa sarili nito, hindi lamang isang lugar para sa komersyo.", nt:"Libreng paglalakad. Ang mga tindahan ay may oras (karaniwang 10am–8pm). Gabi (6–7pm) mas magandang liwanag."},
{id:322, n:"Hampstead Heath — North London\'s Elevated London", a:"Hampstead", v:["famous","parks","views"], d:120, s:"320 acres. Walking distance from Hampstead village. At Parliament Hill you can see St Paul\'s, Tower Bridge, London spread beneath. Free. Genuinely London\'s viewpoint.", st:"Hampstead Heath is 320 acres of open land on the north side of London. It is not designed — it is left semi-wild. The paths are natural. The spaces are genuine open areas with no buildings. Parliament Hill (the highest point in the area) is a short climb and the reward is a 360° view of London from the north — the whole city spreads south and you see every significant building (St Paul\'s, Tower of London, the distant Shard, the curve of the Thames). The Heath is a place where Londoners actually walk, not tourists. Early morning is quiet. Afternoon is families. The ponds are open-water swimming (seasonal, free). The neighborhood of Hampstead around the Heath is charming and full of independent shops and cafes. The experience is escape from London while still in London.", im:"Standing on Parliament Hill. London spreads south. St Paul\'s dome visible. Tower Bridge tiny. Entire city mapped beneath you.", t:"Free. Hampstead tube. Parliament Hill entry is main entrance. The walk to Parliament Hill from tube is 15 min. Come early morning (8–10am) for quiet and clean views. The ponds are summer swimming (June–Sept, seasonal closures). The Hampstead neighborhood north of the Heath (Flask Walk, Church Row) is worth wandering before/after.", c:["greatest_hits","famous","parks","views"], r:"g", nn:"Hampstead Heath", ns:"320 ektarya. Tagang lakad mula Hampstead village. Sa Parliament Hill makikita mo ang St Paul\'s, Tower Bridge, London na kumakalat sa ilalim.", nst:"Ang Hampstead Heath ay 320 ektarya ng bukas na lupa sa hilagang panig ng London. Hindi ito dinisenyo — ito ay iniwan nang semi-wild. Ang mga landas ay natural. Ang mga puwesto ay tunay na bukas na mga lugar walang mga gusali.

Parliament Hill (ang pinakamataas na punto sa lugar) ay isang maikling pag-akyat at ang gantimpala ay isang 360° view ng London mula sa hilaga.", nt:"Libre. Hampstead tube. Parliament Hill entry ay pangunahing entrance."},
{id:323, n:"Millennium Bridge — The Wobble Bridge to St Paul\'s", a:"South Bank", v:["famous","architecture","views"], d:30, s:"Footbridge from Tate Modern to St Paul\'s Cathedral. On opening day (June 10, 2000) the bridge swayed and was closed immediately. Now it is safe and famous for the near-disaster.", st:"The Millennium Bridge is a footbridge connecting the Tate Modern (south side of Thames) to St Paul\'s Cathedral (north side). On opening day, over 90,000 people walked it and the bridge swayed. The lateral swaying was enough to be noticed. The bridge was closed the same day. The cause was pedestrian synchronization (people walking in step). It was redesigned and reopened. Now it is safe and famous for the near-catastrophe. The experience is the walk across — midway you can stop and look both directions (Tate Modern behind, St Paul\'s ahead). The bridge is designed to feel like it is floating (the cables are designed minimally). The views are specific. The walk takes 5 minutes. Come at golden hour (dusk) when the light on both ends is warm.", im:"Standing midway on bridge. Tate Modern and Thames behind. St Paul\'s dome ahead. Suspended between both. Light catching water.", t:"Free. Always open (24 hours, but safe to cross daytime). Millennium Bridge connects Tate Modern and St Paul\'s directly. Come 5–6pm for golden hour light. The bridge is beautiful from both directions — walk it, then walk back the long way (10 min extra) to experience the return angle.", c:["greatest_hits","famous","architecture","views"], r:"g", nn:"Millennium Bridge", ns:"Footbridge mula Tate Modern papunta St Paul\'s Cathedral. Sa opening day, ang tulay ay napangalas at kaagad na isinara.", nst:"Ang Millennium Bridge ay isang footbridge na nag-uugnay sa Tate Modern (timog na panig ng Thames) sa St Paul\'s Cathedral (hilagang panig). Sa opening day, mahigit 90.000 katao ang lumakad nito at ang tulay ay napangalas.

Ang lateral swaying ay sapat na mapansin. Ang tulay ay isinara ang parehong araw. Ang dahilan ay pedestrian synchronization (mga taong tumatakbo nang hakbang).", nt:"Libre. Palaging bukas (24 oras, ngunit ligtas na tumalon daytime)."},
{id:324, n:"The Shard — Rooftop Views 310 Meters High", a:"South Bank", v:["famous","high_spots","views"], d:60, s:"Western Europe\'s tallest building. 310 meters. The viewing gallery is at 255m. You see England spread beneath. Overpriced (£32) but the view is real.", st:"The Shard is a glass-clad building completed in 2012. It is 310 meters tall and visible from everywhere in London. The viewing gallery (level 69–72) is 255 meters high. The experience is being high enough that London\'s scale becomes apparent — the hills, the river curves, the way the city spreads. The glass walls are angled so you are not completely enclosed. The audio guide is included and points out the visible landmarks. The price is high but there are no other buildings as tall in London. The views are real. Come at dusk (5–6pm) when the sun is golden and the city lights are starting. The light is best then.", im:"Looking out from 255 meters. Entire city spread beneath. River Thames curving. Hills in the distance. Sky enormous. City reduced to map.", t:"£32 adults. Daily 10am–10pm (hours vary seasonally). Book online for slight discount. London Bridge tube (directly below). Come 5–6pm for golden hour. The lower viewing level (outdoor, 256m) is part of the experience — exposed to air and wind and real height. The lift is rapid (40 seconds to the top).", c:["greatest_hits","famous","high_spots","views"], r:"g", nn:"The Shard", ns:"Pinakamataas na gusali sa Western Europe. 310 metro. Ang viewing gallery ay 255m.", nst:"Ang Shard ay isang glass-clad na gusali na natapos noong 2012. Ito ay 310 metro ang taas at visible mula saanman sa London. Ang viewing gallery (level 69–72) ay 255 metro ang taas.

Ang karanasan ay mataas na sapat upang ang sukat ng London ay nagiging malinaw — ang mga burol, ang paraan ng kupit ng ilog, ang paraan ng kupit ng lungsod.", nt:"£32 adult. Araw-araw 10am–10pm (iba ang oras depende sa season)."},
