<script>
const P = [{id:1,n:"Brick Lane Murals — Shoreditch",a:"Shoreditch",v:["street_art", "hidden"],d:1,s:"Ever-changing street art on a gritty brick wall — the best illegal gallery in London",st:"Walk down Brick Lane and watch the walls transform. New murals appear overnight. Artists spray legally here at night — you\'re seeing real talent from the moment their work hits brick. The whole street pulses with color.",im:"It\'s 3 AM. A crew with cans moving fast. They\'re painting a massive phoenix across the brick. By morning, thousands will see it. By next week, it\'ll be covered.",t:"Walk down Brick Lane and watch the walls transform. New murals appear overnight. Artists spray legally here at night — you\'re seeing real talent from the moment their work hits brick. The whole street pulses with color.\",im:\"It\'s 3 AM. A crew with cans moving fast. They\'re painting a massive phoenix across the brick. By morning, thousands will see it. By next week, it\'ll be covered.\",t:\"Free entry. Best between Bethnal Green Road and Osborn Street. Go in daylight to photograph. Street food vendors nearby. The wall changes constantly — no two visits are the same.",c:["street_art", "local_only", "free_museum"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:2,n:"Glimpse Brewery — Hackney Wick",a:"Hackney",v:["local", "hidden"],d:2,s:"Artist-run brewery where the walls ARE the gallery and beer tastes like rebellion",st:"Industrial space filled with murals, sculptures, and installations. Artists live and work here. You\'re in someone\'s home studio drinking craft beer. It\'s raw, real, unapologetic. The energy is pure creative chaos.",im:"It\'s 2010. Squatters claim the building. Within months, it\'s a thriving arts hub. Paint flies. Installations grow. Community happens.",t:"Industrial space filled with murals, sculptures, and installations. Artists live and work here. You\'re in someone\'s home studio drinking craft beer. It\'s raw, real, unapologetic. The energy is pure creative chaos.\",im:\"It\'s 2010. Squatters claim the building. Within months, it\'s a thriving arts hub. Paint flies. Installations grow. Community happens.\",t:\"Check opening times online first — irregular hours. Go on a Friday evening. Bring cash. Art, beer, live music. A 10-minute walk from Hackney Central.",c:["architecture", "local_only", "street_art"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:3,n:"Nunhead Cemetery — Peckham",a:"Peckham",v:["history", "quiet", "beautiful"],d:3,s:"Victorian death garden with 40,000 graves, ivy-swallowed chapels, and absolute silence",st:"Walk through 52 acres of gothic beauty. Ornate tombs crumbling under moss and ivy. The chapel is hollow and overgrown. You hear only footsteps and birds. It\'s like stepping into a Dracula film set.",im:"It\'s 1840. A funeral procession winds through fresh paths. Marble angels gleam. Families in black. In 150 years, nature will reclaim it all.",t:"Walk through 52 acres of gothic beauty. Ornate tombs crumbling under moss and ivy. The chapel is hollow and overgrown. You hear only footsteps and birds. It\'s like stepping into a Dracula film set.\",im:\"It\'s 1840. A funeral procession winds through fresh paths. Marble angels gleam. Families in black. In 150 years, nature will reclaim it all.\",t:\"Free entry. Saturday and Sunday tours at 2pm (£5 suggested donation). Wear sturdy shoes — graves everywhere. Bring a camera for the gothic architecture. South of Peckham Rye, near Nunhead station.",c:["history_big", "quiet", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:4,n:"Bermondsey Wall East — Bermondsey",a:"Bermondsey",v:["hidden", "quiet", "history"],d:4,s:"Medieval riverside where Tudor smugglers unloaded, now a dog walker\'s secret",st:"A quiet walk along the Thames. Medieval stones in the wall. Views of the water. Warehouses converted to lofts. Old taverns. The river whispers history. You\'re walking where ships docked 500 years ago.",im:"It\'s midnight, 1520. A boat pulls to the wall. Smugglers unload. Everyone pretends they didn\'t see. By morning, spice has become gold.",t:"A quiet walk along the Thames. Medieval stones in the wall. Views of the water. Warehouses converted to lofts. Old taverns. The river whispers history. You\'re walking where ships docked 500 years ago.\",im:\"It\'s midnight, 1520. A boat pulls to the wall. Smugglers unload. Everyone pretends they didn\'t see. By morning, spice has become gold.\",t:\"Free walk. Start at Wapping and head east. Perfect with coffee from a local café. Low tide reveals more of the ancient wall. Quiet on weekdays. 15 minutes from Tower Bridge.",c:["history_big", "quiet", "romantic_water"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:5,n:"The George Tavern — Whitechapel",a:"Whitechapel",v:["history", "local"],d:5,s:"Rough pub where dockers drank — same sticky floors, same working-class soul",st:"Step into 1950s East London and never leave. Sticky floors. Yellowed wood. The jukebox still works. Locals prop the bar. Pints cost less than you\'d expect. It\'s time travel with real ale.",im:"It\'s 1952. Dockers from the river fill the pub. Cigarette smoke. Loud laughter. Betting slips on the table. Entirely male. Entirely unapologetic.",t:"Step into 1950s East London and never leave. Sticky floors. Yellowed wood. The jukebox still works. Locals prop the bar. Pints cost less than you\'d expect. It\'s time travel with real ale.\",im:\"It\'s 1952. Dockers from the river fill the pub. Cigarette smoke. Loud laughter. Betting slips on the table. Entirely male. Entirely unapologetic.\",t:\"Proper working pub — cash preferred. Monday-Thursday quiet. Friday-Saturday packed with locals and visitors seeking authenticity. Corner of Cable Street and Royal Mint. Pints under £6.",c:["history_big", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:6,n:"Floating Concrete Benches — South Bank",a:"Southwark",v:["weird", "free"],d:6,s:"Bizarre concrete blocks jutting from the Thames — are they art or accident?",st:"Walk past the National Theatre. Find strange geometric concrete shapes emerging from the water. Nobody knows who installed them. They\'ve been here for years. Tourists walk past. Locals sit on them.",im:"They appeared one night. Nobody claimed responsibility. Now they\'re iconic. Maybe that\'s the art.",t:"Walk past the National Theatre. Find strange geometric concrete shapes emerging from the water. Nobody knows who installed them. They\'ve been here for years. Tourists walk past. Locals sit on them.\",im:\"They appeared one night. Nobody claimed responsibility. Now they\'re iconic. Maybe that\'s the art.\",t:\"Free. Between National Theatre and Hungerford Bridge. Tides come in — plan your visit. Mysterious and oddly beautiful. Bring a friend and debate what it means.",c:["architecture", "weird", "free_museum"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:7,n:"St Pancras Old Church — Camden",a:"Camden",v:["history", "hidden", "quiet"],d:7,s:"Medieval church that survived the Blitz, buried under modern London noise",st:"Walk through the graveyard. Medieval graves. Headstones covered in moss. The church is still active. Few tourists find it. You\'re in sacred ground that predates everything around it.",im:"It\'s 1170. Stone is being laid. A community gathers. Centuries pass. Wars. Plagues. Rebuilds. The church holds.",t:"Walk through the graveyard. Medieval graves. Headstones covered in moss. The church is still active. Few tourists find it. You\'re in sacred ground that predates everything around it.\",im:\"It\'s 1170. Stone is being laid. A community gathers. Centuries pass. Wars. Plagues. Rebuilds. The church holds.\",t:\"Free. Most days open 10am-4pm. Monday-Friday quieter. Graveyard accessible anytime. A 5-minute walk from King\'s Cross. Bring flowers if the mood strikes.",c:["history_big", "quiet", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:8,n:"The Viaduct — Clerkenwell",a:"Clerkenwell",v:["architecture", "hidden"],d:8,s:"Victorian iron viaduct where the Farringdon line runs — walk underneath ancient engineering",st:"Cast-iron pillars stretch overhead. Victorian engineering. Trains rumble above you. Graffiti tags ancient metal. It\'s loud and beautiful. Raw industrial London.",im:"It\'s 1875. Steam trains. Engineers designed this to last. Iron rivets holding weight. Still working 150 years later.",t:"Cast-iron pillars stretch overhead. Victorian engineering. Trains rumble above you. Graffiti tags ancient metal. It\'s loud and beautiful. Raw industrial London.\",im:\"It\'s 1875. Steam trains. Engineers designed this to last. Iron rivets holding weight. Still working 150 years later.\",t:\"Free. Walk under it from Farringdon. Best at dawn or dusk when fewer people crowd the pavements. Wear something dark — it\'s grimy. The pillars are graffitied beautifully.",c:["architecture", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:9,n:"Mount Pleasant Sorting Office Underground — Clerkenwell",a:"Clerkenwell",v:["hidden", "history"],d:9,s:"Secret underground railway built to move mail — tunnels still run under London streets",st:"A hidden network exists beneath your feet. Mail trains rumbled through tunnels. Now they\'re mostly abandoned. You can\'t ride them anymore, but the surface building is a marvel of 1920s design.",im:"It\'s 1927. A pneumatic tube fires letters under the city. Zero traffic. Perfect logistics. Then trucks. Then email. The tubes sleep.",t:"A hidden network exists beneath your feet. Mail trains rumbled through tunnels. Now they\'re mostly abandoned. You can\'t ride them anymore, but the surface building is a marvel of 1920s design.\",im:\"It\'s 1927. A pneumatic tube fires letters under the city. Zero traffic. Perfect logistics. Then trucks. Then email. The tubes sleep.\",t:\"The building itself is visible and iconic — check out the exterior architecture on Farringdon Road. Tours occasionally run but are rare — follow heritage London accounts for announcements. The concept is the magic.",c:["history_big", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:10,n:"Wapping Wall Stairs — Wapping",a:"Wapping",v:["history", "quiet", "romantic_water"],d:10,s:"Medieval riverside steps where smugglers landed goods under moonlight",st:"Stone stairs descend to the Thames. Medieval. Weathered. Sometimes water covers them. Pirates and smugglers used these exact steps. You\'re walking where fortunes traded hands in darkness.",im:"It\'s 1690. Midnight. A boat pulls up. Spice, silk, stolen goods. The stairs witness everything. Nobody talks. By dawn, cargo becomes wealth.",t:"Stone stairs descend to the Thames. Medieval. Weathered. Sometimes water covers them. Pirates and smugglers used these exact steps. You\'re walking where fortunes traded hands in darkness.\",im:\"It\'s 1690. Midnight. A boat pulls up. Spice, silk, stolen goods. The stairs witness everything. Nobody talks. By dawn, cargo becomes wealth.\",t:\"Free. Find them near St. Katharine Docks. Tides matter — visit at low tide to see the full stairs. Quiet on weekday mornings. Bring a camera — light on wet stone is magical.",c:["history_big", "quiet", "romantic_water"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:11,n:"Redchurch Street Overground Line — Shoreditch",a:"Shoreditch",v:["architecture", "hidden"],d:11,s:"Abandoned Victorian overground viaduct towering above the street like a ghost",st:"Look up. Massive brick viaduct soars overhead. Victorian engineering. Trains don\'t run here anymore. It\'s haunting. It\'s beautiful. It\'s pure architectural romance.",im:"It\'s 1869. Steam trains rattle overhead. Shops open below. Market traders set up. Now the trains are gone. The viaduct remains.",t:"Look up. Massive brick viaduct soars overhead. Victorian engineering. Trains don\'t run here anymore. It\'s haunting. It\'s beautiful. It\'s pure architectural romance.\",im:\"It\'s 1869. Steam trains rattle overhead. Shops open below. Market traders set up. Now the trains are gone. The viaduct remains.\",t:\"Free walk. Start on Redchurch Street, head north. Bring a wide-angle camera. The scale is massive. Best light at golden hour. Quieter early morning.",c:["architecture", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:12,n:"Kyoto Gardens — Hackney",a:"Hackney",v:["beautiful", "quiet", "free"],d:12,s:"Tiny Japanese garden hidden in a housing estate — absolute zen in East London",st:"Stone lanterns. Raked gravel. A bamboo fence. Cherry blossoms in spring. It\'s impossibly serene. A woman created this as a memorial. It shouldn\'t exist here. It does.",im:"It\'s 1998. A woman plants the first stone. She\'s grieving. Over years, a garden grows. Cherry blossoms bloom. Visitors come silently.",t:"Stone lanterns. Raked gravel. A bamboo fence. Cherry blossoms in spring. It\'s impossibly serene. A woman created this as a memorial. It shouldn\'t exist here. It does.\",im:\"It\'s 1998. A woman plants the first stone. She\'s grieving. Over years, a garden grows. Cherry blossoms bloom. Visitors come silently.\",t:\"Free. In Hackney, between Laburnum Street and Amhurst Park. Early morning is silent. Saturday afternoons get busier. Wear soft shoes. Bring water. The peace is real.",c:["beautiful", "quiet", "free_museum"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:13,n:"Peckham Rye Park Viewpoint — Peckham",a:"Peckham",v:["beautiful", "high_spots", "free"],d:13,s:"Hilltop park where William Blake saw angels — views of the whole city below",st:"Climb to high ground. London spreads beneath you. Dome of St. Paul\'s. City towers. Parks green. Blake stood here and claimed angels descended. Mystic or visionary? The view will decide you.",im:"It\'s 1803. William Blake walks the hill. Light hits strange. Angels descend. Or trees. Or his mind breaking. He saw magic here.",t:"Climb to high ground. London spreads beneath you. Dome of St. Paul\'s. City towers. Parks green. Blake stood here and claimed angels descended. Mystic or visionary? The view will decide you.\",im:\"It\'s 1803. William Blake walks the hill. Light hits strange. Angels descend. Or trees. Or his mind breaking. He saw magic here.\",t:\"Free. Open park. Spring is best — rhododendrons bloom. Climb to the highest point for full views. Bring a sketch pad if Blake\'s spirit moved you. 20 minutes from Peckham station.",c:["history_big", "high_spots", "free_museum"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:14,n:"Millwall Inner Dock — Isle of Dogs",a:"Isle of Dogs",v:["quiet", "romantic_water"],d:14,s:"Desolate dock basin where ships once loaded — now a time-capsule of industrial London",st:"Industrial warehouses reflected in black water. No boats. Silence. A few fishermen. It\'s post-apocalyptic. It\'s beautiful. It\'s forgotten.",im:"It\'s 1970. Cranes swinging. Ships loading. Dockers shouting. Chaos and purpose. Now: silence and stillness.",t:"Industrial warehouses reflected in black water. No boats. Silence. A few fishermen. It\'s post-apocalyptic. It\'s beautiful. It\'s forgotten.\",im:\"It\'s 1970. Cranes swinging. Ships loading. Dockers shouting. Chaos and purpose. Now: silence and stillness.\",t:\"Free walk. Accessible from South Dock. Early morning best. Wear dark clothes — the water absorbs light. Bring coffee. The emptiness speaks.",c:["quiet", "romantic_water", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:15,n:"Greenwich Foot Tunnel — Greenwich",a:"Greenwich",v:["hidden", "history", "weird"],d:15,s:"1902 pedestrian tunnel under the Thames — tiled walls, no tourists, pure Edwardian funk",st:"Descend 50 steps. Glazed tiles. Curved walls. Walk under the river. The tunnel breathes history. Your footsteps echo. You\'re 15 meters below shipping traffic. It\'s surreal and intimate.",im:"It\'s 1902. The tunnel opens. First pedestrians step down. Nothing but water above them. Engineering triumph. Faith in progress.",t:"Descend 50 steps. Glazed tiles. Curved walls. Walk under the river. The tunnel breathes history. Your footsteps echo. You\'re 15 meters below shipping traffic. It\'s surreal and intimate.\",im:\"It\'s 1902. The tunnel opens. First pedestrians step down. Nothing but water above them. Engineering triumph. Faith in progress.\",t:\"Free. The entrance/exit marks are clear. 15-minute walk total. Quieter on weekday mornings. The tiles are fragile — don\'t touch walls. Bring a light — echoes are eerie in dim light.",c:["hidden", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:16,n:"Hampstead Heath — Hampstead",a:"Hampstead",v:["beautiful", "parks", "free"],d:16,s:"Ancient heath where London spreads 360 degrees below — poets have gasped here for centuries",st:"Climb Parliament Hill. The city opens beneath you. Green fields. Ponds. Sky massive. Keats walked here. Shelley. You\'re in the lungs of London. The view rewrites something in your chest.",im:"It\'s 1816. Keats climbs to the summit. He\'s 21. The view shocks him. He writes about it. 200 years later, you see the same view.",t:"Climb Parliament Hill. The city opens beneath you. Green fields. Ponds. Sky massive. Keats walked here. Shelley. You\'re in the lungs of London. The view rewrites something in your chest.\",im:\"It\'s 1816. Keats climbs to the summit. He\'s 21. The view shocks him. He writes about it. 200 years later, you see the same view.\",t:\"Free entry. Open daily. Parliament Hill viewpoint is the must-see. Bring a picnic. Spring and autumn are perfect. Multiple ponds for swimming (historic bathing areas). 30 minutes from central London.",c:["beautiful", "parks", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:17,n:"Islington Bookshops — Islington",a:"Islington",v:["local", "quiet"],d:17,s:"Three independent bookshops on one street — genuine literary culture still alive",st:"Walk Upper Street. Bookshops cluster like mushrooms. Real staff. Real recommendations. No corporate algorithm. Readers finding each other through paper and ink.",im:"It\'s any year between 1985 and 2025. People come here to be around books and book-lovers. It persists.",t:"Walk Upper Street. Bookshops cluster like mushrooms. Real staff. Real recommendations. No corporate algorithm. Readers finding each other through paper and ink.\",im:\"It\'s any year between 1985 and 2025. People come here to be around books and book-lovers. It persists.\",t:\"Free browsing. Budget £10-50 depending on what calls to you. Each shop has distinct personality. Go mid-week morning for unhurried browsing. Cafés nearby.",c:["local_only", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:18,n:"Canonbury Square — Islington",a:"Islington",v:["beautiful", "quiet", "history"],d:18,s:"Georgian square where poets lived — Georgian terraces untouched by time",st:"Step through the gate into the 1820s. Elegant townhouses. Private garden. Pigeons. Silence. This is London\'s village within the city. Everett lived here. Orwell lived here. You\'re surrounded by literary ghosts.",im:"It\'s 1948. George Orwell lives on the square. He writes Animal Farm here. The garden is his escape from surveillance, from the world collapsing into totalitarianism.",t:"Step through the gate into the 1820s. Elegant townhouses. Private garden. Pigeons. Silence. This is London\'s village within the city. Everett lived here. Orwell lived here. You\'re surrounded by literary ghosts.\",im:\"It\'s 1948. George Orwell lives on the square. He writes Animal Farm here. The garden is his escape from surveillance, from the world collapsing into totalitarianism.\",t:\"Free to walk around the exterior. The garden itself is private. Quiet weekday mornings. A 10-minute walk from King\'s Cross. Bring a book and pretend you belong.",c:["history_big", "beautiful", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:19,n:"Brixton Windmill — Brixton",a:"Brixton",v:["history", "hidden"],d:19,s:"1816 windmill still standing in South London — a ghost of agricultural life",st:"Stone tower. Sails long gone. It grinds grain no longer. Now it\'s a monument. A physical thing from a time when Brixton was countryside. Fields surrounded it. Now concrete. The windmill remembers.",im:"It\'s 1816. Sails turn. Wind powers grinding. Grain becomes flour. The mill feeds London. It\'s essential. It\'s alive.",t:"Stone tower. Sails long gone. It grinds grain no longer. Now it\'s a monument. A physical thing from a time when Brixton was countryside. Fields surrounded it. Now concrete. The windmill remembers.\",im:\"It\'s 1816. Sails turn. Wind powers grinding. Grain becomes flour. The mill feeds London. It\'s essential. It\'s alive.\",t:\"Free exterior viewing anytime. Interior tours limited — check ahead online. Located in Windmill Gardens. Small park around it. Early morning is peaceful. Bring a camera for light hitting old stone.",c:["history_big", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:20,n:"Brixton Water Lane — Brixton",a:"Brixton",v:["street_art", "local_only"],d:20,s:"Narrow lane exploding with murals — artists paint legal, vibe flows raw",st:"Walls burst with color. Huge faces. Abstract shapes. Messages. It\'s chaotic and organized. Professional artists work here with permission. The community celebrates itself on brick.",im:"It\'s 2010. A lane is dying. Developers circle. Artists move in. They paint murals. Community gathers. The lane lives again.",t:"Walls burst with color. Huge faces. Abstract shapes. Messages. It\'s chaotic and organized. Professional artists work here with permission. The community celebrates itself on brick.\",im:\"It\'s 2010. A lane is dying. Developers circle. Artists move in. They paint murals. Community gathers. The lane lives again.\",t:\"Free walk. Off Coldharbour Lane. Early morning light best for photos. Street food vendors weekend afternoons. The vibe is welcoming — all welcome to watch and enjoy. Quieter weekday mornings.",c:["street_art", "local_only", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:21,n:"Iversden House Undercroft — City",a:"City",v:["hidden", "architecture"],d:21,s:"Medieval vaulted undercroft 10 meters below London streets — access the dark medieval city",st:"Descend into stone tunnels. Medieval arches. The City of London sits on layers. This is the bottom. Torches cast shadows. You\'re in the underbelly. It\'s visceral.",im:"It\'s 1250. Merchants store goods in these vaults. Stone keeps them cool. Darkness protects them. The same air, now, 750 years later.",t:"Descend into stone tunnels. Medieval arches. The City of London sits on layers. This is the bottom. Torches cast shadows. You\'re in the underbelly. It\'s visceral.\",im:\"It\'s 1250. Merchants store goods in these vaults. Stone keeps them cool. Darkness protects them. The same air, now, 750 years later.\",t:\"Free but rarely open — check City of London visitor center first. Located near St. John Ambulance Hall. Tours occasionally run. The access is tight — not for claustrophobes. It\'s worth the effort.",c:["hidden", "history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:22,n:"St. Bartholomew-the-Great — City",a:"City",v:["history", "beautiful", "quiet"],d:22,s:"Norman church from 1123 — the oldest church in London, easy to miss, impossible to forget",st:"Walk through the gatehouse. Medieval courtyard. The church is Norman stone. Rough. Real. Time pooled here. Prayer has happened in this exact spot for 900 years.",im:"It\'s 1123. Norman workers finish the walls. The first mass echoes. Centuries layer. Plague arrives. War. Bombing. The church holds.",t:"Walk through the gatehouse. Medieval courtyard. The church is Norman stone. Rough. Real. Time pooled here. Prayer has happened in this exact spot for 900 years.\",im:\"It\'s 1123. Norman workers finish the walls. The first mass echoes. Centuries layer. Plague arrives. War. Bombing. The church holds.\",t:\"Free entry — donations welcome. Monday-Friday 8:30am-5pm, Saturdays 10:30am-1:30pm, Sundays 8:30am-1pm. Quiet weekday mornings. In the City near Smithfield. Bring flowers if moved.",c:["history_big", "beautiful", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:23,n:"Postman\'s Park — City",a:"City",v:["quiet", "history"],d:23,s:"Hidden park dedicated to everyday heroes — plaques honoring strangers who died saving others",st:"Walk past glazed tiles. Each one commemorates someone. Jane Beynon. Buried in a snowdrift. Helped a stranger. Died. Forgotten except here. Hundreds of tiny sacrifices. Pure human love.",im:"It\'s 1887. A child falls in a drain. A woman jumps in. Saves the child. Gets caught. Dies. A plaque appears. She\'s remembered.",t:"Walk past glazed tiles. Each one commemorates someone. Jane Beynon. Buried in a snowdrift. Helped a stranger. Died. Forgotten except here. Hundreds of tiny sacrifices. Pure human love.\",im:\"It\'s 1887. A child falls in a drain. A woman jumps in. Saves the child. Gets caught. Dies. A plaque appears. She\'s remembered.\",t:\"Free. Open Monday-Friday 8am-7pm (some Saturdays). Small and hidden between buildings. Bring tissues. Read the plaques slowly. It\'s meditative. Café nearby.",c:["quiet", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:24,n:"Smithfield Market — City",a:"City",v:["history", "local"],d:24,s:"Working meat market since 1638 — arrive at dawn to see London feed itself",st:"Arrive before 6am. Workers move meat carcasses. Fast. Organized. Professional. It\'s visceral and real. No filters. London\'s meat flows here. It\'s brutal and honest.",im:"It\'s any morning for 380 years. The market opens in darkness. Workers arrive. Business begins. The city wakes hungry.",t:"Arrive before 6am. Workers move meat carcasses. Fast. Organized. Professional. It\'s visceral and real. No filters. London\'s meat flows here. It\'s brutal and honest.\",im:\"It\'s any morning for 380 years. The market opens in darkness. Workers arrive. Business begins. The city wakes hungry.\",t:\"Free to watch. Arrive 4:30-6:30am for the action. Wear layers — it\'s cold. Sturdy shoes — it\'s wet. Café nearby for coffee after watching. Not for the squeamish, but deeply real.",c:["history_big", "local_only"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:25,n:"Covent Garden Piazza Underground Spaces — Covent Garden",a:"Covent Garden",v:["hidden", "architecture"],d:25,s:"Hidden vaults and passages beneath the market — secret London layered under tourist London",st:"Most visitors see the market above. Few know the engineering below. Vaults. Passages. The infrastructure holding up the show. Descend and see the skeleton.",im:"It\'s 1880. Builders construct vaults beneath. They\'re engineering London to hold itself. Foundation work. Invisible but essential.",t:"Most visitors see the market above. Few know the engineering below. Vaults. Passages. The infrastructure holding up the show. Descend and see the skeleton.\",im:\"It\'s 1880. Builders construct vaults beneath. They\'re engineering London to hold itself. Foundation work. Invisible but essential.\",t:\"Some areas accessible during market walks. Not always open to public — check with market staff. Fascinating architecture even from above. Golden hour light on stone is beautiful.",c:["hidden", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:26,n:"The Shard\'s Walking Route — Southwark",a:"Southwark",v:["high_spots", "architecture"],d:26,s:"Walk around the Shard\'s base — glass pyramid reflects light and sky into geometry",st:"Walk all around it. Watch reflections shift. Glass plays with light. Pedestrians distorted in the surface. The building is a living mirror. It\'s modern and strange and beautiful.",im:"It\'s 2012. The Shard completes. It\'s unlike anything London has built. It catches light like nothing else. It divides the city. Some hate it. Some love it. Now it\'s iconic.",t:"Walk all around it. Watch reflections shift. Glass plays with light. Pedestrians distorted in the surface. The building is a living mirror. It\'s modern and strange and beautiful.\",im:\"It\'s 2012. The Shard completes. It\'s unlike anything London has built. It catches light like nothing else. It divides the city. Some hate it. Some love it. Now it\'s iconic.\",t:\"Free walk around the base. Any time, any weather. Light changes everything — visit multiple times. Bring a camera. Early morning shadows are dramatic. Avoid tourist crowds by going early.",c:["architecture", "high_spots"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:27,n:"St. John the Baptist — Wapping",a:"Wapping",v:["history", "quiet"],d:27,s:"Medieval church where executions were announced — local survivors worship still",st:"Stone walls. Quiet. Weathered pews. Plaques. The church has absorbed centuries. You can feel the weight of it. It\'s not grand. It\'s human-scaled. It\'s permanent.",im:"It\'s 1660. Pirates are announced as hanged. The names are read here. The community mourns or celebrates. The church records everything. Stone remembers.",t:"Stone walls. Quiet. Weathered pews. Plaques. The church has absorbed centuries. You can feel the weight of it. It\'s not grand. It\'s human-scaled. It\'s permanent.\",im:\"It\'s 1660. Pirates are announced as hanged. The names are read here. The community mourns or celebrates. The church records everything. Stone remembers.\",t:\"Free. Limited hours — check ahead. Weekday mornings quietest. A 10-minute walk from Wapping station. Bring respect and soft footsteps. The energy is contemplative.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:28,n:"Murals of Leake Street Tunnel — Southwark",a:"Southwark",v:["street_art", "local_only"],d:28,s:"100-meter legal graffiti tunnel — street art chaos sanctioned by the council",st:"Dark tunnel lit only by color. Paintings layer upon paintings. Aerosol ghosts. Faces. Abstracts. It\'s anarchic and permitted. Legal and street. It\'s the best of both worlds.",im:"It\'s 2008. The tunnel opens for artists. First painters arrive. They claim it. Community forms. Artists come from everywhere. Art explodes.",t:"Dark tunnel lit only by color. Paintings layer upon paintings. Aerosol ghosts. Faces. Abstracts. It\'s anarchic and permitted. Legal and street. It\'s the best of both worlds.\",im:\"It\'s 2008. The tunnel opens for artists. First painters arrive. They claim it. Community forms. Artists come from everywhere. Art explodes.\",t:\"Free. Accessible anytime. Bring a camera and friends. The vibe is friendly — artists work openly. Updates constantly — no two visits identical. South of the Thames, near Waterloo.",c:["street_art", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:29,n:"Dalston High Street Murals — Hackney",a:"Hackney",v:["street_art", "local_only"],d:29,s:"Entire street becoming open-air gallery — Turkish and Indian communities paint identity",st:"High Street transformed. Every wall is art. Cultural pride. Community energy. It\'s vibrant and real. You\'re not in a museum. You\'re in someone\'s neighborhood becoming visible.",im:"It\'s 2010. Artists approach shopkeepers. Can we paint? Yes. Permission granted. Color explodes. The street glows with identity.",t:"High Street transformed. Every wall is art. Cultural pride. Community energy. It\'s vibrant and real. You\'re not in a museum. You\'re in someone\'s neighborhood becoming visible.\",im:\"It\'s 2010. Artists approach shopkeepers. Can we paint? Yes. Permission granted. Color explodes. The street glows with identity.\",t:\"Free walk. Dalston Lane area. Street food vendors on weekends. Go on Saturday when the neighborhood is most alive. Bring a camera. Talk to residents — they love sharing stories.",c:["street_art", "local_only", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:30,n:"Greenwich Royal Observatory Shadow Line — Greenwich",a:"Greenwich",v:["history", "high_spots"],d:30,s:"Prime Meridian itself — straddling 0 degrees longitude, map of the world here",st:"Stand with one foot in each hemisphere. The Prime Meridian runs beneath you. Lines on a map became real. Time itself started here. It\'s mental and physical at once.",im:"It\'s 1884. Nations gather. They decide: this spot. This line. The world agrees. Longitude finds home.",t:"Stand with one foot in each hemisphere. The Prime Meridian runs beneath you. Lines on a map became real. Time itself started here. It\'s mental and physical at once.\",im:\"It\'s 1884. Nations gather. They decide: this spot. This line. The world agrees. Longitude finds home.\",t:\"Paid entry to Observatory (£10+). The outdoor Prime Meridian is technically free to see. Prime Meridian Path is outdoor access. Climb to the top for views. Clear days offer sweeping vistas.",c:["history_big", "high_spots"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:31,n:"Brunel Museum — Rotherhithe",a:"Rotherhithe",v:["history", "hidden"],d:31,s:"Preserved shaft of the first underwater Thames tunnel — 1843 engineering miracle",st:"Descend into a Victorian engine room. Massive pumps. Raw engineering. Brunel dug beneath the Thames. It leaked. It flooded. People died. But he succeeded. This is where genius lives.",im:"It\'s 1843. The first tunnel beneath the Thames opens. It\'s considered impossible. Brunel proved everyone wrong. The city celebrates.",t:"Descend into a Victorian engine room. Massive pumps. Raw engineering. Brunel dug beneath the Thames. It leaked. It flooded. People died. But he succeeded. This is where genius lives.\",im:\"It\'s 1843. The first tunnel beneath the Thames opens. It\'s considered impossible. Brunel proved everyone wrong. The city celebrates.\",t:\"Small admission fee (£5-7). Limited hours — check ahead. Off-the-beaten-path location. Early 19th-century industrial vibe. Bring comfortable shoes. The tunnel access is tight. Worth it.",c:["history_big", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:32,n:"Stables Market — Camden",a:"Camden",v:["local_only", "street_art"],d:32,s:"Former horse stables reimagined as market — vintage, graffiti, vintage sellers",st:"Wander through converted stables. Street art explodes overhead. Vendors sell old records, vintage clothes, handmade goods. It\'s cluttered and alive. Real community. Real commerce.",im:"It\'s 1850. Horses fill these stables. They carry London. Now people fill them. They carry culture.",t:"Wander through converted stables. Street art explodes overhead. Vendors sell old records, vintage clothes, handmade goods. It\'s cluttered and alive. Real community. Real commerce.\",im:\"It\'s 1850. Horses fill these stables. They carry London. Now people fill them. They carry culture.\",t:\"Free entry. Weekends busiest. Budget for browsing and small purchases. Good food vendors. Go early morning for less crowds. Weekday mornings quieter. Street art updates constantly.",c:["local_only", "street_art"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:33,n:"Regent\'s Canal Towpath Walk — Camden/King\'s Cross",a:"Camden",v:["quiet", "beautiful", "romantic_water"],d:33,s:"Industrial waterway transformed into one of London\'s most peaceful corridors",st:"Walk alongside barges. Narrow boats. Reflections. Ducks. Urban water that feels removed from the city. It\'s a time slip. Quiet. Contemplative. Real Londoners live on boats here.",im:"It\'s 1820. Barges carry goods. The canal is industry. Now artists live on boats. Poetry happens here.",t:"Walk alongside barges. Narrow boats. Reflections. Ducks. Urban water that feels removed from the city. It\'s a time slip. Quiet. Contemplative. Real Londoners live on boats here.\",im:\"It\'s 1820. Barges carry goods. The canal is industry. Now artists live on boats. Poetry happens here.\",t:\"Free walk. 8.5 miles total but perfect in sections. Start at Camden Lock or King\'s Cross. Best early morning or evening. Bring water. Multiple cafés along the route. Each season changes it.",c:["quiet", "beautiful", "romantic_water"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:34,n:"Petticoat Lane Market — Aldgate",a:"City",v:["history", "local"],d:34,s:"1200-year-old market still operating — clothes, textiles, street commerce eternal",st:"Vendors shout. Racks of clothes. Bargains shouted. It\'s chaotic. It\'s traditional. It\'s real commerce. No algorithms. Face to face. Negotiation.",im:"It\'s 1300. Traders sell cloth. Same street. Same energy. Centuries pass. The market persists.",t:"Vendors shout. Racks of clothes. Bargains shouted. It\'s chaotic. It\'s traditional. It\'s real commerce. No algorithms. Face to face. Negotiation.\",im:\"It\'s 1300. Traders sell cloth. Same street. Same energy. Centuries pass. The market persists.\",t:\"Free to walk. Sundays best (closed most Sundays but summer Sundays active). Weekday mornings quiet. Budget £5-20 for browsing. Bring cash. Haggle welcomed. Nearby bagel shops legendary.",c:["history_big", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:35,n:"Old Spitalfields Market — Spitalfields",a:"City",v:["history", "local_only"],d:35,s:"1682 market in Georgian square — vintage, crafts, community still trading",st:"Victorian iron and glass structure. Stalls pile goods. Traders know their customers. It\'s intimate market commerce. The square is Georgian perfection. Timeless.",im:"It\'s 1690. Huguenot weavers sell cloth in this market. Now tourists and locals mix. The market survives.",t:"Victorian iron and glass structure. Stalls pile goods. Traders know their customers. It\'s intimate market commerce. The square is Georgian perfection. Timeless.\",im:\"It\'s 1690. Huguenot weavers sell cloth in this market. Now tourists and locals mix. The market survives.\",t:\"Free entry. Thursday-Sunday best for vendors. Weekday mornings quiet. Bring £10-50. Eat street food. Explore Fournier Street nearby — beautiful Georgian facades.",c:["history_big", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:36,n:"Gillespie Park Nature Reserve — Islington",a:"Islington",v:["nature", "free", "hidden"],d:36,s:"Hidden wetland reserve in the city — birds, water, wild green tucked between houses",st:"Descend into another world. Water. Reeds. Birds everywhere. It shouldn\'t exist here. It does. Nature persists in the city. You hear bird calls. You forget concrete exists.",im:"It\'s 1996. Naturalists create a wetland from derelict land. Birds come. People come. The city\'s lungs expand.",t:"Descend into another world. Water. Reeds. Birds everywhere. It shouldn\'t exist here. It does. Nature persists in the city. You hear bird calls. You forget concrete exists.\",im:\"It\'s 1996. Naturalists create a wetland from derelict land. Birds come. People come. The city\'s lungs expand.\",t:\"Free. Open Wednesday-Sunday. Bring binoculars for birds. Early morning has most activity. Bring water. Trails are muddy in wet weather. A true urban nature escape.",c:["nature", "free_museum", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:37,n:"Highgate Cemetery East — Highgate",a:"Highgate",v:["history", "quiet", "beautiful"],d:37,s:"Victorian burial ground with Marx, Christina Rossetti — Gothic and melancholy",st:"Walk through Victorian graves. Ornate monuments. Moss covers everything. It\'s peaceful. It\'s atmospheric. Death is visible and acceptable here. Famous people rest beside forgotten neighbors.",im:"It\'s 1850. Graves multiply. The city grows. The dead take up space. The living accept this. The cemetery becomes a living museum.",t:"Walk through Victorian graves. Ornate monuments. Moss covers everything. It\'s peaceful. It\'s atmospheric. Death is visible and acceptable here. Famous people rest beside forgotten neighbors.\",im:\"It\'s 1850. Graves multiply. The city grows. The dead take up space. The living accept this. The cemetery becomes a living museum.\",t:\"£4 entry (East side). West side requires guided tour. Early mornings quiet. Spring brings flowers on graves. Bring a camera. Wear dark clothes. Respect silence.",c:["history_big", "quiet", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:38,n:"The Leaded-Light Windows — St. James Church, Piccadilly",a:"West End",v:["history", "beautiful", "architecture"],d:38,s:"Christopher Wren church with stained glass that survived bombing — light as faith",st:"Light pours through stained glass. Medieval scenes. Contemporary designs. The window is a story. Bombs fell around it. It survived. Now light makes meaning.",im:"It\'s 1940. Bombs fall on London. This window should shatter. It doesn\'t. Survival feels like grace.",t:"Light pours through stained glass. Medieval scenes. Contemporary designs. The window is a story. Bombs fell around it. It survived. Now light makes meaning.\",im:\"It\'s 1940. Bombs fall on London. This window should shatter. It doesn\'t. Survival feels like grace.\",t:\"Free entry. Open most days 8am-6pm. Quiet mornings best. Light is best mid-morning when sun angles through. Bring reverence. It\'s a working church. Respect that.",c:["history_big", "beautiful", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:39,n:"Leighton House — Kensington",a:"Kensington",v:["beautiful", "history"],d:39,s:"Victorian artist\'s mansion with Arab Hall of hand-painted tiles — aesthetic excess",st:"Step into an artist\'s vision. Tiles from the Middle East. Paintings. Sculptures. Every surface intentional. It\'s beautiful and strange and completely uncompromising. Pure vision.",im:"It\'s 1880. An artist builds his dream home. Every room is a statement. He lives surrounded by his taste. He dares to be specific.",t:"Step into an artist\'s vision. Tiles from the Middle East. Paintings. Sculptures. Every surface intentional. It\'s beautiful and strange and completely uncompromising. Pure vision.\",im:\"It\'s 1880. An artist builds his dream home. Every room is a statement. He lives surrounded by his taste. He dares to be specific.\",t:\"£10 entry. Wednesday-Sunday 10am-5:30pm. Small but intense. Wear good shoes — lots of stairs. Photography limited in some areas. The Arab Hall alone is worth the visit.",c:["beautiful", "history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:40,n:"Kyoto Garden — Kensington",a:"Kensington",v:["beautiful", "quiet", "free"],d:40,s:"Japanese garden in Holland Park — peace disguised as landscape design",st:"Stone lanterns. A stream. Bamboo. It\'s meditative. It\'s far from Kensington noise. You hear water. You breathe differently. Authentic Japanese aesthetic in West London.",im:"It\'s 1991. Japanese craftspeople build this garden. They bring their sense of beauty. Peace is constructed here.",t:"Stone lanterns. A stream. Bamboo. It\'s meditative. It\'s far from Kensington noise. You hear water. You breathe differently. Authentic Japanese aesthetic in West London.\",im:\"It\'s 1991. Japanese craftspeople build this garden. They bring their sense of beauty. Peace is constructed here.\",t:\"Free. Open April-September primarily (limited winter access). Bring a book. Go early morning. Quiet weekday mornings most peaceful. Light on water is magical. Photography welcome.",c:["beautiful", "quiet", "free_museum"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:41,n:"Achillion Estate Murals — Peckham",a:"Peckham",v:["street_art", "local_only", "beautiful"],d:41,s:"1930s housing estate transformed by murals — art renovates the everyday",st:"Brutalist estate blocks covered in color. Artists painted it legal. The buildings themselves are architectural history. The murals add voice. Community reclaims space.",im:"It\'s 2010. Artists approach the council. Can we paint the estate? Yes. Paint arrives. Color happens. The estate becomes gallery.",t:"Brutalist estate blocks covered in color. Artists painted it legal. The buildings themselves are architectural history. The murals add voice. Community reclaims space.\",im:\"It\'s 2010. Artists approach the council. Can we paint the estate? Yes. Paint arrives. Color happens. The estate becomes gallery.\",t:\"Free walk. South London, Peckham area. Daytime best. Go on weekend when residents are out. Respectful photography. The estate is people\'s home — visit courteously.",c:["street_art", "local_only", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:42,n:"River Lea Path — Hackney Marshes",a:"Hackney",v:["nature", "quiet", "free"],d:42,s:"Waterway corridor where London\'s industrial past runs — green and strange",st:"Walk along the Lea. Marshland. Birds. Graffitied warehouses. It\'s liminal. It\'s beautiful. Industrial heritage layered with nature. You\'re in London\'s margins.",im:"It\'s 1800. The Lea powers mills. Industry hums. Now nature reclaims. The river remembers.",t:"Walk along the Lea. Marshland. Birds. Graffitied warehouses. It\'s liminal. It\'s beautiful. Industrial heritage layered with nature. You\'re in London\'s margins.\",im:\"It\'s 1800. The Lea powers mills. Industry hums. Now nature reclaims. The river remembers.\",t:\"Free. Path runs for miles. Start at Hackney Marshes. Early morning peaceful. Bring binoculars for birds. Wear outdoor shoes — muddy sections exist. A real escape within the city.",c:["nature", "quiet", "free_museum"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:43,n:"Tavistock Square Peace Garden — Bloomsbury",a:"Bloomsbury",v:["quiet", "history"],d:43,s:"Georgian square with peace monument — Bloomsbury\'s intellectual and political heart",st:"Woolf walked here. Forster. Keynes. The group lived and debated in these squares. Now a peace garden. It\'s literary and political and contemplative all at once.",im:"It\'s 1920. The Bloomsbury Group debates art, love, politics. They\'re changing culture. These squares know their conversations.",t:"Woolf walked here. Forster. Keynes. The group lived and debated in these squares. Now a peace garden. It\'s literary and political and contemplative all at once.\",im:\"It\'s 1920. The Bloomsbury Group debates art, love, politics. They\'re changing culture. These squares know their conversations.\",t:\"Free. Open daily. Quiet mornings best. Bring a book — Bloomsbury authors everywhere. The square itself is meditation. Sit on a bench. Let London slow.",c:["quiet", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:44,n:"Bunhill Burial Ground — City",a:"City",v:["history", "quiet", "architecture"],d:44,s:"Dissenter cemetery where radicals, artists, writers rest — rebels buried together",st:"William Blake here. Daniel Defoe. Thousands of Dissenters. People who wouldn\'t conform. Now they rest together. It\'s political and peaceful. Nonconformists finding home.",im:"It\'s 1800. Blake is buried here. He made the world strange. The ground accepts him.",t:"William Blake here. Daniel Defoe. Thousands of Dissenters. People who wouldn\'t conform. Now they rest together. It\'s political and peaceful. Nonconformists finding home.\",im:\"It\'s 1800. Blake is buried here. He made the world strange. The ground accepts him.\",t:\"Free entry. Open weekdays, limited weekends. Quiet. Peaceful. Bring flowers for any grave that calls. Read the plaques. Every stone is a story of non-conformity.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:45,n:"St. Paul\'s Cathedral Crypt — City",a:"City",v:["history", "architecture"],d:45,s:"Underground cathedral spaces where Wren and Wellington rest — death cathedral",st:"Descend into the crypt. Stone vaults. Tombs. Sculptures of the dead. It\'s solemn. It\'s impressive. It\'s the skeleton holding up the cathedral.",im:"It\'s 1697. Wren\'s funeral. His body descends. Now he\'s part of what he built. Forever.",t:"Descend into the crypt. Stone vaults. Tombs. Sculptures of the dead. It\'s solemn. It\'s impressive. It\'s the skeleton holding up the cathedral.\",im:\"It\'s 1697. Wren\'s funeral. His body descends. Now he\'s part of what he built. Forever.\",t:\"£18 entry includes crypt. Wednesday-Sunday 8:30am-4pm. Photography limited in crypt. Bring respect. The scale is overwhelming. The names are heavy.",c:["history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:46,n:"Barbican Brutalist Maze — City",a:"City",v:["architecture", "weird"],d:46,s:"1970s concrete utopia — maze of interconnected towers and hidden spaces",st:"Walk through the brutalist dream. Towers connect via bridges. Concrete. Water features. Sculptures. It\'s dystopian and beautiful. Some love it. Some hate it. Few are neutral.",im:"It\'s 1969. Architects design the future. Concrete pours. Dreams of community happen. The dream is beautiful and strange.",t:"Walk through the brutalist dream. Towers connect via bridges. Concrete. Water features. Sculptures. It\'s dystopian and beautiful. Some love it. Some hate it. Few are neutral.\",im:\"It\'s 1969. Architects design the future. Concrete pours. Dreams of community happen. The dream is beautiful and strange.\",t:\"Free walking. Barbican Estate is residential — respectful walking only. Get a map — it\'s genuinely maze-like. Early morning best. Architecture tourists welcome on public routes. Cafés in the complex.",c:["architecture", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:47,n:"Dennis Severs\' House — Spitalfields",a:"City",v:["history", "weird", "beautiful"],d:47,s:"Time capsule house where you become a time traveler — candlelit Georgian world",st:"Step into 1750. Candles. Candied fruit. No electricity. The past is tactile and real. You\'re intruding on someone\'s home. Objects are chaos. It\'s beautiful and strange.",im:"It\'s 1750. A silk weaver lives here with his family. He\'s poor. His home is this. Now you see his exact world.",t:"Step into 1750. Candles. Candied fruit. No electricity. The past is tactile and real. You\'re intruding on someone\'s home. Objects are chaos. It\'s beautiful and strange.\",im:\"It\'s 1750. A silk weaver lives here with his family. He\'s poor. His home is this. Now you see his exact world.\",t:\"£12-15 entry. Silent walks only. Hours limited. Book ahead. Wear dark clothes — blending helps. It\'s intimate. It\'s powerful. No rushing. Be respectful.",c:["history_big", "weird", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:48,n:"Painted Hall Greenwich — Greenwich",a:"Greenwich",v:["history", "beautiful", "architecture"],d:48,s:"Baroque masterpiece — Nelson\'s body lies beneath painted ceilings of heaven",st:"Look up. Painted ceilings swirl. It\'s overwhelming. Nelson rests below. Art and history collide. The scale is immense. Your eyes don\'t know where to rest.",im:"It\'s 1700. Artists paint the ceiling. It takes years. Heroes. Gods. Power. The room becomes overwhelming on purpose.",t:"Look up. Painted ceilings swirl. It\'s overwhelming. Nelson rests below. Art and history collide. The scale is immense. Your eyes don\'t know where to rest.\",im:\"It\'s 1700. Artists paint the ceiling. It takes years. Heroes. Gods. Power. The room becomes overwhelming on purpose.\",t:\"£12 entry. Daily 10am-5pm. Bring a neck pillow — you\'ll stare upward. Photography allowed. Early morning has fewer crowds. The baroque excess is intentional.",c:["history_big", "beautiful", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:49,n:"Cemeteries Walk — West Norwood",a:"South London",v:["history", "beautiful", "quiet"],d:49,s:"Victorian cemetery with Egyptian monuments — necropolis of London\'s forgotten rich",st:"Monuments tower. Egyptian obelisks. Elaborate tombs. It\'s beautiful and melancholy. People spent fortunes on death. Now it\'s overgrown and peaceful.",im:"It\'s 1850. The wealthy build tombs. They\'ll be remembered forever. Now squirrels live in the monuments. Nature wins.",t:"Monuments tower. Egyptian obelisks. Elaborate tombs. It\'s beautiful and melancholy. People spent fortunes on death. Now it\'s overgrown and peaceful.\",im:\"It\'s 1850. The wealthy build tombs. They\'ll be remembered forever. Now squirrels live in the monuments. Nature wins.\",t:\"Free. Gates open daily. Bring a map — it\'s massive. Sunrise and sunset best light. Early morning quiet. Overgrown in places — wear sturdy shoes. It\'s a real escape.",c:["history_big", "beautiful", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:50,n:"Crossrail Place Roof Garden — Canary Wharf",a:"Isle of Dogs",v:["beautiful", "high_spots", "free"],d:50,s:"Rooftop garden with glass canopy — 360-degree views from above the city",st:"Ascend to the glass house. Views open around you. Plants grow. Light filters. It\'s serene above the financial district. Quiet and green above concrete.",im:"It\'s 2019. A garden blooms above the city. People remember nature exists.",t:"Ascend to the glass house. Views open around you. Plants grow. Light filters. It\'s serene above the financial district. Quiet and green above concrete.\",im:\"It\'s 2019. A garden blooms above the city. People remember nature exists.\",t:\"Free entry. Monday-Sunday 8am-10pm. Any time is good. Weather changes the experience. Seating available. Bring a book. Escape the bustle below.",c:["beautiful", "high_spots", "free_museum"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:51,n:"Geffrye Museum Gardens — Shoreditch",a:"Shoreditch",v:["beautiful", "history", "free"],d:51,s:"Museum gardens showing 400 years of English design — walking through centuries of home",st:"Almshouses become museum. Gardens show each era. Medieval. Georgian. Victorian. Modern. It\'s a timeline of style. Each garden teaches. Beautiful and educational without forcing.",im:"It\'s 1715. Almshouses for poor craftsmen. Gardens provide food and respite. Now gardens teach beauty.",t:"Almshouses become museum. Gardens show each era. Medieval. Georgian. Victorian. Modern. It\'s a timeline of style. Each garden teaches. Beautiful and educational without forcing.\",im:\"It\'s 1715. Almshouses for poor craftsmen. Gardens provide food and respite. Now gardens teach beauty.\",t:\"Free entry to gardens (museum has fee). Gardens open Tuesday-Sunday 11am-5pm. Perfect spring/summer. Early morning peaceful. Bring a camera. Each period garden is stunning.",c:["beautiful", "history_big", "free_museum"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:52,n:"Peckham Rye — Peckham",a:"Peckham",v:["history", "beautiful", "parks"],d:52,s:"Park where Blake saw angels — open space where visions became art",st:"Open fields. Trees. The same view Blake claimed turned him into mystic. Whether angels or vision or madness — something happened here. The ground is still alive.",im:"It\'s 1803. William Blake climbs the hill. Light changes. He claims angels descend. Did they? Only Blake knows.",t:"Open fields. Trees. The same view Blake claimed turned him into mystic. Whether angels or vision or madness — something happened here. The ground is still alive.\",im:\"It\'s 1803. William Blake climbs the hill. Light changes. He claims angels descend. Did they? Only Blake knows.\",t:\"Free. Open daily. Best on clear days. Spring with wildflowers is beautiful. Bring a sketch pad if moved. The hill view is sweeping. Easy walk from Peckham station.",c:["history_big", "beautiful", "parks"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:53,n:"Leadenhall Market — City",a:"City",v:["history", "architecture"],d:53,s:"Victorian covered market with ironwork — Roman settlement beneath the flags",st:"Vaulted ceiling of cast iron. Ornate. Victorian. It\'s beautiful market architecture. Walk the cobbles. Below you: Roman remains. Time layered visibly.",im:"It\'s 1881. The market opens. Ornate iron. Gas light. Poultry and game traders. Now tourists and the elegant. The bones are ancient.",t:"Vaulted ceiling of cast iron. Ornate. Victorian. It\'s beautiful market architecture. Walk the cobbles. Below you: Roman remains. Time layered visibly.\",im:\"It\'s 1881. The market opens. Ornate iron. Gas light. Poultry and game traders. Now tourists and the elegant. The bones are ancient.\",t:\"Free to explore. Restaurants and shops inside. Any time is good. Photography welcome. Check at the center for Roman artifact information. It\'s a sensory feast.",c:["history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:54,n:"The Elephant and Castle Roundabout Underpass — Elephant and Castle",a:"South London",v:["weird", "architecture", "street_art"],d:54,s:"Dystopian underpass with street art — descent into subterranean London",st:"Walk under the roundabout. Dark. Tunnel. Graffiti. Street art. It\'s underground London. Raw. Unpolished. Real. It shouldn\'t be beautiful. It is.",im:"It\'s 1960s. Engineers build the underpass. It\'s practical. Now artists claim it. It becomes something else.",t:"Walk under the roundabout. Dark. Tunnel. Graffiti. Street art. It\'s underground London. Raw. Unpolished. Real. It shouldn\'t be beautiful. It is.\",im:\"It\'s 1960s. Engineers build the underpass. It\'s practical. Now artists claim it. It becomes something else.\",t:\"Free walk. Daytime best for safety. Street art changes constantly. Bring a camera. Respectful attitude needed. It\'s a real working underpass, not a tourist attraction.",c:["weird", "architecture", "street_art"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:55,n:"Abney Park — Stoke Newington",a:"Hackney",v:["history", "beautiful", "quiet"],d:55,s:"Victorian cemetery and arboretum — 2,500 graves beneath 2,500 trees",st:"Walk through a forest of history. Graves everywhere. Trees everywhere. They\'ve grown together. It\'s beautiful and contemplative. Nature and death in perfect balance.",im:"It\'s 1840. The cemetery opens with grand dreams. Trees planted. Burials begin. Over time, nature and human history entangle.",t:"Walk through a forest of history. Graves everywhere. Trees everywhere. They\'ve grown together. It\'s beautiful and contemplative. Nature and death in perfect balance.\",im:\"It\'s 1840. The cemetery opens with grand dreams. Trees planted. Burials begin. Over time, nature and human history entangle.\",t:\"Free. Open daily. Early morning most peaceful. Bring binoculars for birds. The scale is massive — walking guide available. Quiet weekdays. Spring and autumn beautiful. A true escape.",c:["history_big", "beautiful", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:56,n:"Leake Street Graffiti Tunnel — Waterloo",a:"Waterloo",v:["street_art", "hidden", "local"],d:56,s:"Legal graffiti zone under railway arches — where London\'s best street artists own the walls",st:"Enter a tunnel that echoes with spray cans. Every surface is art. Artists in real-time. Stencils. Pieces. Tags. It\'s raw, it\'s legal, it\'s where the scene actually lives. Tags appear and vanish in weeks.",im:"It\'s 2008. Banksy gets permission. The tunnel opens. Chaos becomes canvas. Artists claim it. Community grows.",t:"Enter a tunnel that echoes with spray cans. Every surface is art. Artists in real-time. Stencils. Pieces. Tags. It\'s raw, it\'s legal, it\'s where the scene actually lives. Tags appear and vanish in weeks.\",im:\"It\'s 2008. Banksy gets permission. The tunnel opens. Chaos becomes canvas. Artists claim it. Community grows.\",t:\"Free entry. Open 24/7. Bring a mask if you paint. Go early for photos before crowds. Weekends packed. Underneath Waterloo Bridge. Best light in morning.",c:["street_art", "free_museum", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:57,n:"Primrose Hill Sunrise Summit — Primrose Hill",a:"Primrose Hill",v:["beautiful", "quiet", "high_spots"],d:57,s:"Roll down a hill at dawn with the entire city glowing below you",st:"Climb to the top as sun breaks. London spreads out—all the way to the hills. St. Paul\'s glimmers. You see the whole shape of the city. It\'s yours. Then joggers arrive. But for now, it\'s silent.",im:"It\'s 1066. A Norman keeps watch from this hill. Now, 900 years later, a teenager sees the same view. Same light. Different London.",t:"Climb to the top as sun breaks. London spreads out—all the way to the hills. St. Paul\'s glimmers. You see the whole shape of the city. It\'s yours. Then joggers arrive. But for now, it\'s silent.\",im:\"It\'s 1066. A Norman keeps watch from this hill. Now, 900 years later, a teenager sees the same view. Same light. Different London.\",t:\"Free. Open daily. Go 6-7am before crowds. Wear something warm. Lie in the grass. Bring a camera. Best in spring. North of Regent\'s Park, near Chalk Farm station.",c:["high_spots", "quiet", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:58,n:"Hampstead Heath Wild Ponds — Hampstead",a:"Hampstead",v:["nature", "hidden", "quiet"],d:58,s:"Secret bathing ponds hidden in forest where Londoners have swum for 300 years",st:"Deep in Hampstead Heath, water reflects sky. Three ponds—separate men\'s, women\'s, and mixed. Swimmers glide. It\'s cold. It\'s ritual. It\'s been happening since the 1600s. Towels on the bank. People who know.",im:"It\'s 1750. A woman hides in forest to swim in secret. Now it\'s legal, it\'s official. Still feels like a secret escape.",t:"Deep in Hampstead Heath, water reflects sky. Three ponds—separate men\'s, women\'s, and mixed. Swimmers glide. It\'s cold. It\'s ritual. It\'s been happening since the 1600s. Towels on the bank. People who know.\",im:\"It\'s 1750. A woman hides in forest to swim in secret. Now it\'s legal, it\'s official. Still feels like a secret escape.\",t:\"Free to watch. Paid membership to swim (£5-10/entry). Lifeguards present. Wetsuit welcome year-round. Cold in winter. Changing rooms basic. Bring a towel. North London, easy walk from Hampstead station.",c:["nature", "hidden", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:59,n:"Waterloo Bridge at Sunset — Waterloo",a:"Waterloo",v:["beautiful", "high_spots", "romantic_water"],d:59,s:"Best angle in London—watch sunset paint the whole Thames gold while seagulls circle",st:"Stand mid-bridge. West light explodes. The Thames turns into fire. Buildings glow. Seagulls pierce the quiet. You\'ve got maybe 15 minutes of gold. Then it\'s gone. Then stars.",im:"It\'s 1942. Bombs fall elsewhere. This bridge stands. An evacuee watches sunset from safety. Now you do too.",t:"Stand mid-bridge. West light explodes. The Thames turns into fire. Buildings glow. Seagulls pierce the quiet. You\'ve got maybe 15 minutes of gold. Then it\'s gone. Then stars.\",im:\"It\'s 1942. Bombs fall elsewhere. This bridge stands. An evacuee watches sunset from safety. Now you do too.\",t:\"Free. Open always. Go 30 mins before sunset. Check weather. Bring a hoodie. Arrive early for space. Photographers everywhere at golden hour. No railings to block shots.",c:["high_spots", "beautiful", "romantic_water"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:60,n:"Roman Wall Fragment at Tower of London — Tower Hamlets",a:"Tower Hamlets",v:["history", "hidden", "architecture"],d:60,s:"Two thousand-year-old Roman wall still standing — touched by emperors",st:"Outside Tower of London, run your fingers on stone from 200 AD. Romans built this. Your hands touch their hands. It\'s embedded in the modern wall. That\'s two millennia. Quiet. Real. Ancient.",im:"",t:"Outside Tower of London, run your fingers on stone from 200 AD. Romans built this. Your hands touch their hands. It\'s embedded in the modern wall. That\'s two millennia. Quiet. Real. Ancient.\",im:\"\",t:\"Free to view from outside. Part of Tower of London complex. Easily visible from street. Touch it. Photograph it. Historical plaque explains. Near Tower Bridge, east side.",c:["history_big", "hidden", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:61,n:"St. Bartholomew the Great Cloisters — Smithfield",a:"Smithfield",v:["history", "quiet", "architecture"],d:61,s:"Norman church from 1123 hiding in Plain Sight — oldest building in London still in use",st:"Push through a gate in the City. Suddenly, medieval. Cloisters. Stonework. The church is 900 years old. Quiet. A few tourists. Usually silence. This is where London began.",im:"It\'s 1150. A monk walks these same stones. He\'s copying manuscripts. The light through the windows hasn\'t changed.",t:"Push through a gate in the City. Suddenly, medieval. Cloisters. Stonework. The church is 900 years old. Quiet. A few tourists. Usually silence. This is where London began.\",im:\"It\'s 1150. A monk walks these same stones. He\'s copying manuscripts. The light through the windows hasn\'t changed.\",t:\"Free entry to cloisters. Church services welcome visitors. Entry on Small Street. Smithfield area, near Farringdon. Early morning empty.",c:["history_big", "quiet", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:62,n:"Shoreditch Rooftop Bars (Free Entry Sunsets) — Shoreditch",a:"Shoreditch",v:["hidden", "local", "high_spots"],d:62,s:"Rooftop bars with free entry before 8pm—watch sunset with East London\'s creative crowd",st:"Climb stairs. Suddenly sky. City rolls out. Young artists. Designers. Musicians. Craft cocktails. But before 8pm, you\'re in. No cover. Just buy a drink. The light is gold. The crowd is real.",im:"",t:"Climb stairs. Suddenly sky. City rolls out. Young artists. Designers. Musicians. Craft cocktails. But before 8pm, you\'re in. No cover. Just buy a drink. The light is gold. The crowd is real.\",im:\"\",t:\"Free entry before 8pm. Drinks £5-8. Atmosphere changes after dark. Go early (5-7pm) for best light and fewer crowds. Shoreditch High Street area has multiple rooftop spots.",c:["local_only", "high_spots", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:63,n:"Greenwich Foot Tunnel Secret Return — Greenwich",a:"Greenwich",v:["hidden", "weird", "history"],d:63,s:"Walk under the Thames in a tiled Victorian tunnel—nobody knows it\'s here",st:"Descend stairs. Enter a tunnel. White tiles glow. You\'re under the river. The curve above is water. It\'s eerie. It\'s beautiful. Nobody talks. Just footsteps echoing. On the other side, you emerge in Greenwich.",im:"It\'s 1902. The tunnel opens. First pedestrians cross. They\'ve never walked under a river. The technology feels futuristic. Now it\'s ancient. You do the same walk.",t:"Descend stairs. Enter a tunnel. White tiles glow. You\'re under the river. The curve above is water. It\'s eerie. It\'s beautiful. Nobody talks. Just footsteps echoing. On the other side, you emerge in Greenwich.\",im:\"It\'s 1902. The tunnel opens. First pedestrians cross. They\'ve never walked under a river. The technology feels futuristic. Now it\'s ancient. You do the same walk.\",t:\"Free. Open 24/7. Entrance on Isle of Dogs side. Smooth walkway. Echo is wild. Takes 5 mins to cross. Surprising emptiness. Go off-hours for the feeling.",c:["hidden", "history_big", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:64,n:"Kew Gardens Wild Areas (Free Outer Grounds) — Kew",a:"Kew",v:["nature", "beautiful", "quiet"],d:64,s:"Pay to go in, but the surrounding meadows and woodlands are free—explore like you own them",st:"Beyond the paid section, meadows roll. Trees line paths. Nobody here. Just you and Thames views. It\'s wild. It\'s green. It\'s the reason Kew exists—the land itself, not the attractions.",im:"It\'s 1759. A botanist walks land. Collects specimens. Now the land is preserved. It grows. Strangers like you walk freely.",t:"Beyond the paid section, meadows roll. Trees line paths. Nobody here. Just you and Thames views. It\'s wild. It\'s green. It\'s the reason Kew exists—the land itself, not the attractions.\",im:\"It\'s 1759. A botanist walks land. Collects specimens. Now the land is preserved. It grows. Strangers like you walk freely.\",t:\"Free to explore surroundings. Paid section is £17. Best to combine both. Bring a picnic. Meadows wildest in May-June. Southwest London. Kew Bridge station.",c:["nature", "beautiful", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:65,n:"Richmond Deer Park Dawn Watch — Richmond",a:"Richmond",v:["nature", "beautiful", "quiet"],d:65,s:"Watch 600 wild deer emerge from mist at sunrise—feels like stepping into a fairy tale",st:"Arrive before dawn. Mist rises. Suddenly shapes. Deer. Hundreds of them. Moving through trees. A stag calls. Your breath steams. You\'re in a wild place, inside London. It\'s impossible. It\'s real.",im:"It\'s 1625. King Charles hunts here. Now the deer are safe. You watch instead of hunt. Different London. Same deer.",t:"Arrive before dawn. Mist rises. Suddenly shapes. Deer. Hundreds of them. Moving through trees. A stag calls. Your breath steams. You\'re in a wild place, inside London. It\'s impossible. It\'s real.\",im:\"It\'s 1625. King Charles hunts here. Now the deer are safe. You watch instead of hunt. Different London. Same deer.\",t:\"Free entry (fee at gate, usually £3). Open dawn to dusk. Go 5:30am in summer, 7am in winter. Bring binoculars. Rain makes it better. Southwest London. Richmond tube station.",c:["nature", "quiet", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:66,n:"Epping Forest Deep Trails — Epping Forest",a:"Epping Forest",v:["nature", "hidden", "quiet"],d:66,s:"6,000 acres of ancient forest where Londoners vanish—feels like a different country",st:"Deep in the forest, noise disappears. Trees tower. It\'s oak and beech from centuries past. You\'re not in London anymore. You\'re in forest. The air is old. The quiet is thick. Time stops.",im:"It\'s 1000 AD. A medieval hunter tracks deer. Now you walk the same trees. The forest remembers.",t:"Deep in the forest, noise disappears. Trees tower. It\'s oak and beech from centuries past. You\'re not in London anymore. You\'re in forest. The air is old. The quiet is thick. Time stops.\",im:\"It\'s 1000 AD. A medieval hunter tracks deer. Now you walk the same trees. The forest remembers.\",t:\"Free. Open always. Go weekday for solitude. Trails marked but easy to wander. Bring water and a map. North London. Easy train from Liverpool Street.",c:["nature", "quiet", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:67,n:"Crystal Palace Dinosaurs Secret Picnic Ground — Crystal Palace",a:"Crystal Palace",v:["weird", "beautiful", "free"],d:67,s:"Giant stone dinosaurs from 1854 lurking in overgrown park—Victorian mad science come to life",st:"Walk through park. Suddenly a dinosaur. Concrete. Massive. Wrong. Ancient imagining of what dinosaurs looked like. They\'re terrifying and beautiful. Vines creep. Locals picnic beside them. It\'s surreal.",im:"It\'s 1854. Victorian scientist\'s dreams. He builds monsters from stone and theory. Now kids climb on them. Nature reclaims them.",t:"Walk through park. Suddenly a dinosaur. Concrete. Massive. Wrong. Ancient imagining of what dinosaurs looked like. They\'re terrifying and beautiful. Vines creep. Locals picnic beside them. It\'s surreal.\",im:\"It\'s 1854. Victorian scientist\'s dreams. He builds monsters from stone and theory. Now kids climb on them. Nature reclaims them.\",t:\"Free. Open daily. Go afternoon for light through trees. 30+ dinosaurs scattered. Bring a picnic. South London. Crystal Palace station. Photo opportunities endless.",c:["weird", "beautiful", "free_museum"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:68,n:"Hidden Jewish Ghetto Alley — Aldgate",a:"Aldgate",v:["history", "hidden", "local"],d:68,s:"Walk through alleys where 100,000 Eastern European Jews built community in tiny streets",st:"Narrow lanes. Old buildings. Plaques mark history. Synagogues. Community centers. The neighborhood changed—gentrified—but the ghetto endures in plaques and memory. It\'s real history on real streets.",im:"",t:"Narrow lanes. Old buildings. Plaques mark history. Synagogues. Community centers. The neighborhood changed—gentrified—but the ghetto endures in plaques and memory. It\'s real history on real streets.\",im:\"\",t:\"Free walk. East London, Aldgate area. Multiple plaques mark sites. Brick Lane nearby has galleries and bagel shops. Early morning quieter. Historical society has tours.",c:["history_big", "local_only", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:69,n:"Free Comedy Nights (Stand-Up Comedy Club Free Nights) — Soho",a:"Soho",v:["local", "night", "free"],d:69,s:"Watch comedians develop new material for free—you\'re in a real comedy lab",st:"Dark club. Cheap drinks. A comedian takes the mic. New material. Raw. Funny. Failing sometimes. You\'re part of the development. You laugh. They learn. It\'s real theater.",im:"",t:"Dark club. Cheap drinks. A comedian takes the mic. New material. Raw. Funny. Failing sometimes. You\'re part of the development. You laugh. They learn. It\'s real theater.\",im:\"\",t:\"Usually Tuesday-Thursday free entry (buy a drink). Check Comedy Store or Soho Theatre websites. Arrive early. Seats limited. Soho, near Tottenham Court Road. Mixed quality but real energy.",c:["local_only", "night", "free_museum"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:70,n:"Blitz Shelter Walk (Civil Defence Shelters Tour) — Aldwych",a:"Aldwych",v:["history", "hidden", "scary"],d:70,s:"Underground bunker where 8,000 people slept during bombing—walls still show blast damage",st:"Descend into darkness. Narrow tunnels. Sleeping alcoves. Air raid markings. Names scratched on walls. The tunnels remember terror. You feel it. Cold stone. Confined space. This is real survival history.",im:"It\'s 1940. Bombs fall above. Families shelter here. The shaking. The fear. Now it\'s quiet. Now it\'s history.",t:"Descend into darkness. Narrow tunnels. Sleeping alcoves. Air raid markings. Names scratched on walls. The tunnels remember terror. You feel it. Cold stone. Confined space. This is real survival history.\",im:\"It\'s 1940. Bombs fall above. Families shelter here. The shaking. The fear. Now it\'s quiet. Now it\'s history.\",t:\"Free to view some sections. Guided tours available (£10). Check opening times. Central London. Aldwych station (partially closed). Access varies. Book ahead.",c:["history_big", "hidden", "scary"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:71,n:"Plague Pit Memorial (Golden Lane Cemetery) — Barbican",a:"Barbican",v:["history", "quiet", "scary"],d:71,s:"Stand on ground where 40,000 plague victims were dumped in mass graves",st:"Walk into green space. Plaques mark the ground. Beneath your feet: 40,000 bodies. The plague of 1665. Mass death. Quick burials. Now it\'s quiet. Grass grows. You stand on their graves.",im:"It\'s 1665. Death carts arrive nightly. Bodies stack. Lime poured. The city is dying. Now it\'s rebuilt. Now it\'s forgotten. Except for plaques.",t:"Walk into green space. Plaques mark the ground. Beneath your feet: 40,000 bodies. The plague of 1665. Mass death. Quick burials. Now it\'s quiet. Grass grows. You stand on their graves.\",im:\"It\'s 1665. Death carts arrive nightly. Bodies stack. Lime poured. The city is dying. Now it\'s rebuilt. Now it\'s forgotten. Except for plaques.\",t:\"Free. Open to public. Barbican area. Plaques explain. Go quiet morning. Respectful silence. Central London. Aldersgate station. Small space—easy to miss.",c:["history_big", "scary", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:72,n:"Jack the Ripper Alley (Whitechapel Streets) — Whitechapel",a:"Whitechapel",v:["history", "hidden", "scary"],d:72,s:"Walk the exact streets where 1888 murders happened—real crime scene tourism in real alleys",st:"Narrow streets. Warehouses. Victorian brick. This is where he hunted. Real streets. Real victims. Real mystery. Modern London looks through historical eyes. It\'s eerie. It\'s educational. It\'s real.",im:"",t:"Narrow streets. Warehouses. Victorian brick. This is where he hunted. Real streets. Real victims. Real mystery. Modern London looks through historical eyes. It\'s eerie. It\'s educational. It\'s real.\",im:\"\",t:\"Free walk. Whitechapel area. Multiple walking tour companies (£10-15). Self-guided easy. Many books available. Evening tours popular. Central East London. Whitechapel station.",c:["history_big", "scary", "hidden"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:73,n:"Free Museums\' Secret Rooms (After-Hours Collections) — South Kensington",a:"South Kensington",v:["free", "hidden", "history"],d:73,s:"British Museum and V&A have \'hidden\' collections rarely visited—walk past most people to find them",st:"Most visitors swarm the same galleries. You go up. You find quiet rooms. Ancient objects. Few people. You have time. The museum slows down. You see detail.",im:"It\'s 1880. A curator arranges artifacts. Now strangers walk by without looking. But you stop. You look.",t:"Most visitors swarm the same galleries. You go up. You find quiet rooms. Ancient objects. Few people. You have time. The museum slows down. You see detail.\",im:\"It\'s 1880. A curator arranges artifacts. Now strangers walk by without looking. But you stop. You look.\",t:\"Free entry (donations requested). Go weekday afternoons. Upper floors quieter. Central London. South Kensington tube. Bring a notebook.",c:["free_museum", "history_big", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:74,n:"Hackney Wick Warehouse Parties (Legal Open Studio Nights) — Hackney",a:"Hackney",v:["local", "night", "street_art"],d:74,s:"Artists\' studios throw all-night raves—illegal feeling, legal reality, pure East London energy",st:"Enter a warehouse. Artists have claimed space. DJ plays. People dance. Installations glow. It\'s raw. It\'s community. It\'s where London\'s actual culture happens after dark.",im:"It\'s 2000. Squatters claim empty building. Years later, it\'s legal. Art happens. Community thrives.",t:"Enter a warehouse. Artists have claimed space. DJ plays. People dance. Installations glow. It\'s raw. It\'s community. It\'s where London\'s actual culture happens after dark.\",im:\"It\'s 2000. Squatters claim empty building. Years later, it\'s legal. Art happens. Community thrives.\",t:\"Check schedules online (Facebook, Instagram). Tickets £5-10. Usually Friday nights. Arrive late. Go with friends. Hackney Wick area, near station. Energy is everything.",c:["local_only", "night", "street_art"],r:"g",nn:"",ns:"",nst:"",nt:""},
