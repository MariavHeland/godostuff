,{id:106,n:"Gruž Green Market",a:"Gruž",v:["local", "market"],d:0,s:"Busiest farmer's and fish market in the city—where locals actually shop",st:"The main Gruž green market pulses with energy every morning. Vendors hawk fresh Adriatic fish, seasonal vegetables, and local cheeses. It's the real heartbeat of Dubrovnik, untouched by Old Town tourism.",im:"Imagine haggling over a pile of just-caught sardines while Croatian grandmothers in headscarves squeeze tomatoes beside you.",t:"Located in Gruž district (transportation hub). Best 6–10 AM. Free to wander. Buy fruit by the handful (€2). Bus or 20-min walk from Old Town.",c:["market", "food"],r:"g",nn:"Zelena pijaca Gruž",ns:"Najveće tržnico voća i ribe u gradu—gdje kupuju lokalni",nst:"Glavna zelena pijaca u Gruču pulsa energijom svakog jutra. Prodavači nude svježe jadranske ribe, sezonsko povrće i lokalne sireve. Pravo srce Dubrovnika, netaknuto turizmom Starog grada.",nt:"Nalazi se u četvrti Gruž (transportni čvor). Najbolje 6–10 ujutro. Besplatno za šetnju. Kupite voće po šaci (€2). Autobus ili 20-minutna šetnja od Starog grada."},
{id:107,n:"Red History Museum + TUP Cultural Space",a:"Gruž",v:["alternative", "art", "history"],d:0,s:"Counter-culture hub: communist-era museum and former factory turned concert/art venue",st:"Gruž is Dubrovnik's alternative arts district. The Red History Museum showcases life under Yugoslav communism with themed exhibitions by Croatian artists. Nearby, TUP—a converted factory—hosts underground concerts, art workshops, and exhibitions that feel worlds away from the cruise-ship crowds.",im:"Picture yourself in a gritty ex-factory space watching a live band, surrounded by local artists and zero tourists.",t:"Gruž district, 15–20 min by bus from Old Town or 30 min walk. Red History Museum has entry fee (check current price). TUP events vary—check their schedule online. Cheap bars and cafes nearby (€4–6 pints at Dubrovnik Beer Company).",c:["art", "history", "nightlife"],r:"g",nn:"Muzej Crvene istorije + TUP",ns:"Kontra-kulturni centar: muzej iz komunističke ere i bivša fabrika sada galerija",nst:"Gruž je alternativna umjetnička četvrt Dubrovnika. Muzej Crvene istorije prikazuje život pod jugoslavenskim komunizmom s izložbama hrvatskih umjetnika. Nedaleko, TUP—pretvoren tvornica—domaćin je underground koncerata, radionica i izložbi daleko od turista.",nt:"Četvrt Gruž, 15–20 min autobusom od Starog grada ili 30 min pješice. Muzej ima ulaznu naknadu. TUP eventi variraju—provjerite raspored online. Jeftini barovi i kafići blizu (€4–6 piva u Dubrovnik Beer Company)."},
{id:108,n:"Mokošica Residential District & Ombla River Views",a:"Mokošica",v:["local", "nature", "hidden"],d:7,s:"Quiet riverside suburb 7km north with mountain backdrop, marina views, and zero tourists",st:"Mokošica sits on the banks of the Ombla River, surrounded by soaring mountains and overlooking the Dubrovnik Bridge. About 8,000 locals live here in a working residential rhythm. It's where Dubrovnik actually lives, not performs.",im:"Imagine sitting by the river at dusk, watching the bridge lights reflect in the water while mountains frame the horizon—no selfie sticks in sight.",t:"7km north of Old City. Regular bus service connects to city centre. Free to explore. Walk the riverbanks, visit the nearby ACI Marina in Komolac. Best visited mid-afternoon or early evening. Bring a picnic from Gruž market.",c:["nature", "river", "local"],r:"g",nn:"Mokošica",ns:"Tiha predgrađa 7km sjever s pogledom na rijeku i planine—bez turista",nst:"Mokošica se nalazi na obalama rijeke Omble, okružena uzdignutim planinama i s pogledom na Dubrovnički most. Oko 8000 lokalaca živi ovdje u radnom ritmu. Gdje Dubrovnik zapravo živi, ne glumi.",nt:"7km sjever od Starog grada. Redoviti autobusni prijevoz do centra. Besplatno za istraživanje. Šetajte obalama rijeke, posjetite obližnju ACI Marinu u Komolcu. Najbolje posjetiti popodne ili rano večer. Donesi piknik iz Gruža."},
{id:109,n:"Babin Kuk Sunset Viewpoint & Elaphiti Islands Panorama",a:"Babin Kuk (Lapad Peninsula)",v:["viewpoint", "sunset", "free"],d:3,s:"Upscale peninsula with the best sunset vistas in Dubrovnik and Elaphiti Islands panoramas—free to walk",st:"Babin Kuk is swathed in greenery on the northwestern Lapad peninsula. While luxury hotels and beach bars dot the area, the public paths and viewpoints are free. The sunsets here are legendary—the Elaphiti Islands glow golden across the Adriatic.",im:"Picture yourself standing on a cliff at golden hour, the Elaphiti Islands silhouetted against a burning sky, the Adriatic turning molten.",t:"Located on Lapad peninsula, 3km northwest of Old City. Bus or 30-min walk. Free to access viewpoints and walking paths. Best at sunset (6–7 PM in summer). Bring a bottle of local wine from a grocery store (€3–5). Avoid peak tourist hours (4–6 PM).",c:["viewpoint", "sunset", "nature"],r:"g",nn:"Babin Kuk",ns:"Najljepši zalasci sunca u Dubrovniku s pogledom na Elafitske otoke",nst:"Babin Kuk je obasut zelenilom na sjeverozapadnom poluotoku Lapad. Iako luksuzni hoteli i beach barovi točkaju područje, javne staze i vidikovci su besplatni. Zalasci sunca ovdje su legendarni—Elafitski otoci sjaje zlatno preko Jadrana.",nt:"Nalazi se na poluotoku Lapad, 3km sjeverozapadno od Starog grada. Autobus ili 30-minutna šetnja. Besplatno pristupiti vidikovcima i stazama. Najbolje pri zalasku sunca (18–19 sati ljeti). Donesi bocu lokalnog vina iz trgovine (€3–5). Izbjegni vrhunce turista (16–18 sati)."},
{id:110,n:"Molunat Village Day Trip",a:"Molunat (peninsula, short ferry/bus ride)",v:["village", "beach", "offbeat"],d:15,s:"Residential peninsula village with pebble beaches and a slow-travel vibe—rated 4.4 on TripAdvisor but rarely crowded",st:"Molunat is a working village on a peninsula, a short bus or ferry ride from Old Town. Pebble beaches line the coast, and the atmosphere is authentically Croatian—locals outnumber tourists 10 to 1. It's where Dubrovnik's residents go to escape Dubrovnik.",im:"Imagine a quiet pebble beach where an old fisherman mends nets while you swim in crystalline water, no cruise ships on the horizon.",t:"Short bus or ferry ride from Dubrovnik (check schedules). Free beaches. Bring a picnic from Gruž market or eat at local konobas (€8–12 mains). Best mid-week, off-season. Combine with Cavtat or Mlini villages for a full day loop.",c:["beach", "village", "local"],r:"g",nn:"Molunat",ns:"Tiho selo na poluotoku s plaćama i lokalnom atmosferom",nst:"Molunat je radno selo na poluotoku, kratka autobusna ili trajektna vožnja od Starog grada. Šljunčane plaće oblikuju obalu, a atmosfera je autentično hrvatska—lokalni nadmašuju turiste 10 prema 1. Gdje Dubrovničani odlaze da pobjegnu od Dubrovnika.",nt:"Kratka autobusna ili trajektna vožnja od Dubrovnika (provjeri raspored). Besplatne plaće. Donesi piknik iz Gruža ili jedi u lokalnim konobama (€8–12 glavnih jela). Najbolje tijekom tjedna, izvan sezone. Kombiniraj s Cavtatom ili Mlini selima za cijeli dan."},
{id:111,n:"Cavtat & Mlini Villages Loop",a:"Cavtat/Mlini (south of Dubrovnik, day trip)",v:["village", "offbeat", "local"],d:20,s:"Two charming coastal villages south of Dubrovnik—chat with locals, explore war history, swim in quiet coves",st:"Cavtat and Mlini are working fishing villages with pastel houses tumbling toward the sea. The Abandoned Hotel Belvedere ruins near Mlini tell stories of the 1990s war. Locals still fish from the same spots their grandparents did. It's slow travel at its finest.",im:"Picture yourself sitting in a waterfront taverna with a local fisherman, sharing rakija and stories while the sun sets over the Adriatic.",t:"20km south of Dubrovnik. Bus or local taxi (€10–15). Free to explore villages and beaches. Eat at family-run konobas (€10–15 mains). Visit Abandoned Hotel Belvedere for urban exploration and war history (free, but research the backstory first). Best mid-week. Combine with Molunat for a full day.",c:["village", "history", "beach"],r:"g",nn:"Cavtat i Mlini",ns:"Dva šarmantna obalna sela—razgovori s lokalcima, istraži povijest rata",nst:"Cavtat i Mlini su radna ribarska sela s pastelnim kućama koje padaju prema moru. Ruševine napuštenog Hotela Belvedere blizu Mlinija govore priče iz rata 1990-ih. Lokalni i dalje love s istih mjesta gdje su lovili njihovi djed i baka. Spora putovanja u svojoj najboljem obliku.",nt:"20km južno od Dubrovnika. Autobus ili lokalni taksi (€10–15). Besplatno za istraživanje sela i plaća. Jedi u obiteljskim konobama (€10–15 glavnih jela). Posjetite napušteni Hotel Belvedere za urbanu eksploraciju i povijest rata (besplatno, ali prvo istraži pozadinu). Najbolje tijekom tjedna. Kombiniraj s Molunatom za cijeli dan."},
{id:112,n:"Dubrovnik Beer Company Brewery",a:"Gruž",v:["brewery", "local", "food"],d:0,s:"City's best craft brewery—local hangout with cheap pints (€4–6) and authentic vibe",st:"Dubrovnik Beer Company is where locals actually drink. It's a working brewery in Gruž with a casual bar atmosphere, zero pretension, and some of the best craft beer in the city. Pints are €4–6, a fraction of Old Town prices. The crowd is 90% Croatian.",im:"Imagine nursing a cold local IPA at a wooden bar while Croatian construction workers and artists debate football—no tourists in sight.",t:"Located in Gruž district. Bus or 20-min walk from Old Town. Open daily (check hours). Pints €4–6. Food available (snacks/charcuterie). Best evenings after 6 PM. Cash preferred but cards accepted.",c:["brewery", "bar", "local"],r:"g",nn:"Dubrovnik Beer Company",ns:"Najbolja pivovara u gradu—lokalni bar s jeftinama pivama",nst:"Dubrovnik Beer Company je gdje lokalni zapravo piju. Radi se o radnoj pivovari u Gruču s casual bar atmosferom, bez pretenzija, i neke od najbolje craft pive u gradu. Piva su €4–6, dio cijene Starog grada. Publika je 90% hrvatska.",nt:"Nalazi se u četvrti Gruž. Autobus ili 20-minutna šetnja od Starog grada. Otvoreno svakodnevno (provjeri sate). Piva €4–6. Hrana dostupna (grickalice/mesne proizvode). Najbolje večeri nakon 18 sati. Gotovina je poželjnija, ali kartice su prihvaćene."}];

style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Dubrovnik Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
