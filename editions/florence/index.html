  {id:1,n:"Piazzale Michelangelo (Sunset View) — Piazzale",a:"Piazzale",v:["beautiful", "high_spots"],d:1,s:"Viewpoint across the Arno showing Florence\'s full silhouette—sunset here is obligatory, the light is unmatchable.",st:"The city spreads below. Duomo dominates. The Arno curves. Red roofs. As sunset approaches, light turns golden, then orange, then red. Couples lean on railings. The moment is suspended. It\'s beautiful and crowded both.",im:"It\'s anytime. The city has always looked beautiful from above.",t:"The city spreads below. Duomo dominates. The Arno curves. Red roofs. As sunset approaches, light turns golden, then orange, then red. Couples lean on railings. The moment is suspended. It\'s beautiful and crowded both.\",im:\"It\'s anytime. The city has always looked beautiful from above.\",t:\"Free. Go 30 minutes before sunset. Arrive early for space. Bring someone to share with. Stay until dark. This is a ritual.",c:["high_spots", "beautiful"],r:"g",nn:"Piazzale Michelangelo (Sunset View)",ns:"Piazzale Michelangelo (Sunset View) è una gioia italiana.",nst:"Piazzale Michelangelo (Sunset View) respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},

  {id:6,n:"Santo Spirito Square (Night Vibes) — Santo Spirito",a:"Santo Spirito",v:["beautiful", "night", "local_only"],d:6,s:"A square that transforms at night—locals gather, musicians play, the real Florence emerges.",st:"By day: normal square with church and cafés. By night: families, musicians, travelers mixing. The energy changes. You feel the city\'s rhythm. The basilica is lit. The moment is genuine.",im:"It\'s evening. Florence residents gather as they have for centuries.",t:"By day: normal square with church and cafés. By night: families, musicians, travelers mixing. The energy changes. You feel the city\'s rhythm. The basilica is lit. The moment is genuine.\",im:\"It\'s evening. Florence residents gather as they have for centuries.\",t:\"Go after sunset (7pm onwards). Free. Bring money for drink/food at café. The vibe is authentically local. Stay late to feel the full transformation.",c:["night", "beautiful"],r:"g",nn:"Santo Spirito Square (Night Vibes)",ns:"Santo Spirito Square (Night Vibes) è una gioia italiana.",nst:"Santo Spirito Square (Night Vibes) respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:7,n:"San Lorenzo Market Area (Leather & Chaos) — San Lorenzo",a:"San Lorenzo",v:["local_only", "beautiful"],d:7,s:"A market where locals shop for leather, produce, daily goods—crowded and real, not curated for tourists.",st:"Vendors shout. Leather stalls line streets. The smell is intense—leather, garlic, life. It\'s chaotic and beautiful. You\'re part of commerce that\'s fundamental. The energy is kinetic.",im:"It\'s anytime. People have shopped at this market for 500+ years.",t:"Vendors shout. Leather stalls line streets. The smell is intense—leather, garlic, life. It\'s chaotic and beautiful. You\'re part of commerce that\'s fundamental. The energy is kinetic.\",im:\"It\'s anytime. People have shopped at this market for 500+ years.\",t:\"Go mornings. Free to browse. Leather €20-100+. Produce €2-8. Cash preferred. Respect vendors. Don\'t photograph without asking.",c:["local_only", "beautiful"],r:"g",nn:"San Lorenzo Market Area (Leather & Chaos)",ns:"San Lorenzo Market Area (Leather & Chaos) è una gioia italiana.",nst:"San Lorenzo Market Area (Leather & Chaos) respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:8,n:"Palazzo Vecchio Free Courtyard — Piazza della Signoria",a:"Piazza della Signoria",v:["history", "beautiful"],d:8,s:"The courtyard of a palace is free to enter—Renaissance frescoes, sculptures, the power of a city visible in stone.",st:"The courtyard is open to sky. Sculptures stand. Frescoes line walls. It\'s designed to impress. You feel the weight of power and art combined. It\'s accessible and free.",im:"It\'s 1500. A Florence ruler shows his power through art.",t:"The courtyard is open to sky. Sculptures stand. Frescoes line walls. It\'s designed to impress. You feel the weight of power and art combined. It\'s accessible and free.\",im:\"It\'s 1500. A Florence ruler shows his power through art.\",t:\"Free entry to courtyard. Interior €10-15 if interested. The courtyard alone is worth seeing. Go early morning for light and few people.",c:["history_big", "beautiful"],r:"g",nn:"Palazzo Vecchio Free Courtyard",ns:"Palazzo Vecchio Free Courtyard è una gioia italiana.",nst:"Palazzo Vecchio Free Courtyard respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:9,n:"Uffizi Free First Sundays — Uffizi",a:"Uffizi",v:["art", "free"],d:9,s:"One of the world\'s best art museums is free the first Sunday of every month—Botticelli, Leonardo, centuries of art for zero euros.",st:"Crowds are thick—everyone figured out the deal. But you see the art. The light through museum windows. Centuries of human creation. It\'s free and it\'s glorious.",im:"It\'s the morning of the first Sunday. People line up before opening. It\'s a ritual of democratic access.",t:"Crowds are thick—everyone figured out the deal. But you see the art. The light through museum windows. Centuries of human creation. It\'s free and it\'s glorious.\",im:\"It\'s the morning of the first Sunday. People line up before opening. It\'s a ritual of democratic access.\",t:\"Free first Sundays. Arrive early (doors open 8:30am). Go expecting crowds. Pick one or two sections, don\'t try to do it all. Afternoon might be less crowded.",c:["art", "free"],r:"g",nn:"Uffizi Free First Sundays",ns:"Uffizi Free First Sundays è una gioia italiana.",nst:"Uffizi Free First Sundays respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:10,n:"Ponte Vecchio Secret Corridor — Ponte Vecchio",a:"Ponte Vecchio",v:["history", "weird"],d:10,s:"A secret corridor runs above the bridge—built so the Medici ruler could walk unseen—you walk the bridge and imagine the hidden passage above.",st:"The bridge is lined with shop and tourists. But above, hidden in plain sight, is a passage. The architecture is clever. You realize the bridge is more than bridge—it\'s political infrastructure.",im:"It\'s 1500s. The Medici ruler wants to move unseen. Architecture makes it possible.",t:"The bridge is lined with shop and tourists. But above, hidden in plain sight, is a passage. The architecture is clever. You realize the bridge is more than bridge—it\'s political infrastructure.\",im:\"It\'s 1500s. The Medici ruler wants to move unseen. Architecture makes it possible.\",t:\"The corridor is visible but not open to public (interior €10 if available). Walk the bridge and look up. Understand the hidden architecture. Free to walk and imagine.",c:["history_big", "weird"],r:"g",nn:"Ponte Vecchio Secret Corridor",ns:"Ponte Vecchio Secret Corridor è una gioia italiana.",nst:"Ponte Vecchio Secret Corridor respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},
  {id:11,n:"Rose Garden (May Blooms Only) — Rose Garden",a:"Rose Garden",v:["nature", "beautiful"],d:11,s:"A garden of 500+ rose varieties that blooms May only—if you time it right, explosions of color and smell.",st:"The garden is organized by variety. Colors range from white to deep red. The smell is overwhelming—roses everywhere. It\'s a temporary paradise. By June, blooms fade. By winter, dormancy.",im:"It\'s May. A rose blooms for one moment in a year. This moment is now.",t:"The garden is organized by variety. Colors range from white to deep red. The smell is overwhelming—roses everywhere. It\'s a temporary paradise. By June, blooms fade. By winter, dormancy.\",im:\"It\'s May. A rose blooms for one moment in a year. This moment is now.\",t:\"Open May only. €3-5 entry. Go mid-morning for light. Bring a camera. The smell alone is worth the trip. Time your Florence visit for May if possible.",c:["nature", "beautiful"],r:"g",nn:"Rose Garden (May Blooms Only)",ns:"Rose Garden (May Blooms Only) è una gioia italiana.",nst:"Rose Garden (May Blooms Only) respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},

  {id:13,n:"Basilica San Marco (Simple Beauty) — San Marco",a:"San Marco",v:["history", "beautiful"],d:13,s:"A basilica with less fanfare than others—Giotto frescoes, quiet spaces, the spiritual Florence beneath the tourism.",st:"The interior is simple and elegant. Light through windows. Frescoes tell biblical stories. The space invites contemplation. You feel the weight of faith without the crowds.",im:"It\'s 1300s. A painter creates images to help people pray.",t:"The interior is simple and elegant. Light through windows. Frescoes tell biblical stories. The space invites contemplation. You feel the weight of faith without the crowds.\",im:\"It\'s 1300s. A painter creates images to help people pray.\",t:\"€5 entry. Go early morning (before 9am) for quiet and light. Photography usually allowed. Spend 30 minutes minimum. The interior rewards slow looking.",c:["history_big", "beautiful"],r:"g",nn:"Basilica San Marco (Simple Beauty)",ns:"Basilica San Marco (Simple Beauty) è una gioia italiana.",nst:"Basilica San Marco (Simple Beauty) respira storia. Generazioni hanno camminato qui. Ora tu. È esperienza che cambia.",nt:"Ascolta i locali. Arriva presto. Respira lentamente. Lasciati sorprendere."},

,
  {id:106,n:"Boboli Gardens (Free Hours)",a:"Oltrarno",v:["beautiful","free","quiet"],d:15,s:"Massive Renaissance gardens behind Pitti Palace — a free outdoor museum",st:"The Boboli is massive and mostly free on certain days/hours. Frescoed grottos, amphitheater seating, and perfect vantage points over Florence. Florentines come here to think; it\'s meditative.",im:"Time-travel: Designed in 1550 for the Medici family.",t:"Check website for free hours. Often free on certain Sundays. South bank (Oltrarno).",c:["parks","romantic_water"],r:"g",nn:"Giardini Boboli",ns:"Giardini rinascimentali enormi di Palazzo Pitti",nst:"Passeggia tra le sculture e le fontane rinascimentali.",nt:"Verificare sito per ore gratuite. Domeniche gratuite spesso."},
  {id:107,n:"Piazzale Michelangelo Sunset",a:"Oltrarno",v:["beautiful","free","night"],d:20,s:"Panoramic overlook of the city at golden hour — the postcard view is free",st:"Piazzale Michelangelo offers the textbook view of Florence: Duomo, Arno, tile roofs glowing. It\'s packed at sunset, but arrive early, claim a spot, and watch the city transform from gold to purple to dark. Bring wine.",im:"Time-travel: The piazza was laid out in 1869 during Florence\'s urban modernization.",t:"Free. South side of Arno. Walk or bus 12/13. Arrive before sunset.",c:["high_spots","romantic_water"],r:"g",nn:"Piazzale Michelangelo",ns:"Panorama spettacolare della città al tramonto",nst:"Goditi la vista dorata di Firenze dal tramonto.",nt:"Gratuito. Sud dell\'Arno. Arriva prima del tramonto."}
,{id:108,n:"Ponte Vecchio — Golden Hour Evening",a:"Arno",v:["beautiful","famous"],d:2,s:"The bridge is crowded but at 7pm when tour groups are eating dinner, the Arno glows gold and the bridge is yours.",st:"Ponte Vecchio is medieval, working bridge where goldsmiths have had shops for 500 years. During the day it's packed. But 7pm in summer, when the tour groups have gone to dinner, the light turns everything gold. The Arno becomes molten. The bridge empty except for lovers.",im:"7:15pm. The bridge glows. The Arno is liquid gold. One couple taking photos. No crowd.",t:"Walk across anytime. 7-8pm best for light. Go without expectations during day, but return at dusk. Gellato shops nearby if hungry.",c:["greatest_hits","beautiful","sunset"],r:"g",nn:"Ponte Vecchio — Ora d'Oro Serale",ns:"Il ponte è affollato ma alle 7 di sera quando i gruppi turistici cenano, l'Arno brilla d'oro e il ponte è tuo.",nst:"Ponte Vecchio è un ponte medievale che funziona dove gli orafi hanno negozi da 500 anni. Durante il giorno è affollatissimo. Ma alle 19 in estate, quando i gruppi turistici sono andati a cena, la luce diventa tutto oro.",nt:"Attraversa in qualsiasi momento. 7-20 meglio per la luce. Va senza aspettative durante il giorno, ma ritorna al crepuscolo."},
{id:109,n:"Oltrarno — Left Bank Living",a:"Oltrarno",v:["local","beautiful","quiet"],d:3,s:"The south bank where Florentines live their actual lives, not the north bank where tourists script theirs.",st:"Cross the Ponte Vecchio and forget about it. Oltrarno is where actual Florence happens. Narrow streets, artisan workshops (metalworkers, bookbinders, leather workers), tiny enotecas with €3 wine, locals eating lunch. It's genu inely different from the tourist Florence north of the river.",im:"2pm, side street in Oltrarno. A leatherworker at a window. An old man eating alone. A cat sleeping. Silence except for one fountain.",t:"Walk from Ponte Vecchio. Get genuinely lost. Pop into workshops. Eat at tiny hole-in-the-wall ristorantes for €10. No photographs required.",c:["local_only","beautiful","quiet"],r:"g",nn:"Oltrarno — Vita Riva Sinistra",ns:"La riva sud dove i fiorentini vivono le loro vite vere, non la riva nord dove i turisti scrivono le loro.",nst:"Attraversa il Ponte Vecchio e scordatene. Oltrarno è dove accade la vera Firenze. Strade strette, laboratori artigianali, piccole enoteche con vino a €3, locali che mangiano a pranzo.",nt:"Cammina dal Ponte Vecchio. Perditi deliberatamente. Entra in botteghe. Mangia in piccoli ristorantini per €10."},
{id:110,n:"Cappella Brancacci — Masaccio Frescoes",a:"Oltrarno",v:["history","beautiful","weird"],d:3,s:"A small chapel where one artist invented Renaissance painting in 1426 and you can see exactly the moment it happened.",st:"Masaccio painted the Tribute Money in 1426. Before him, art was flat. After him, art had depth, light, shadow, proportion. He was 21. He died at 26. In this small chapel, you can stand 6 feet from the moment art changed. The frescoes are cracked and fading but the innovation is still visible.",im:"Standing below Masaccio's Trinity. The perspective. The light. The difference.",t:"Oltrarno, small chapel, €5 entry. 10am-5pm. No crowds. 20 min is plenty. This is art history made visible.",c:["history_big","beautiful"],r:"g",nn:"Cappella Brancacci — Affreschi di Masaccio",ns:"Una piccola cappella dove un artista inventò la pittura rinascimentale nel 1426 e puoi vedere esattamente il momento in cui accadde.",nst:"Masaccio dipinse il Tributo Denaro nel 1426. Prima di lui, l'arte era piatta. Dopo di lui, l'arte aveva profondità, luce, ombra, proporzione. Aveva 21 anni. Morì a 26. In questa piccella cappella, puoi stare a 6 piedi dal momento in cui l'arte cambiò.",nt:"Oltrarno, piccella cappella, €5 entrata. 10-17. Nessuna folla. 20 min è più che sufficiente."},
  {id:111,n:"The Duomo (Cathedral of Santa Maria del Fiore)",a:"Centro",v:["famous","beautiful","history"],d:45,s:"The dome nobody believed could be built without support — Brunelleschi solved it in 1436 and the structure still defies gravity.",st:"The red-tiled dome is the first thing you see in Florence. Stand directly below the interior cupola and look up — you're inside an architectural invention that changed everything. The frescoes by Vasari and Zuccari spiral down the interior. The geometry is perfect.\n\nClimb the 414 steps if you have knees. The view from inside the dome is the city rendered in miniature, the Arno a silver ribbon, the hills holding everything.\n\nBe there early. The line forms before opening.",im:"Standing inside the dome, neck bent back, surrounded by Renaissance genius painted and built.",t:"Free entry to cathedral interior. €6 dome (414 steps, 45 min climb). €2.50 bell tower (82 steps, easier). €2 crypt. €2 museum. Buy combined ticket (€12-15) to visit dome + bell tower + museum + baptistry + crypt. Morning visits much shorter queues — arrive by 8am. Climb dome before 11am for best light inside. No bags over 30x20x10cm allowed.",c:["greatest_hits","history_big","beautiful"],r:"g",nn:"La Cattedrale di Santa Maria del Fiore (Il Duomo)",ns:"La cupola che Brunelleschi costruì senza supporti — un'impresa di genio ancora incredibile a vederla.",nst:"La cupola rossa domina Firenze da ogni angolo. Stai sotto e guarda su — sei dentro un'invenzione architettonica che ha cambiato la storia. I dipinti di Vasari e Zuccari spiraleggiano verso l'alto. La geometria è perfetta.\n\nSe le tue ginocchia lo consentono, sali i 414 gradini. La vista dal cuore della cupola è la città in miniatura, l'Arno un nastro d'argento.",nt:"Gratuito all'interno della cattedrale. €6 cupola (414 gradini, 45 min). Arriva presto, le file si formano prima dell'apertura. Sali di mattina, prima delle 11, per la miglior luce."},
  {id:112,n:"Uffizi Gallery",a:"Centro",v:["famous","art"],d:120,s:"The single most important collection of Renaissance painting in the world — Botticelli, Leonardo, Raphael, Caravaggio under one roof.",st:"The gallery is arranged chronologically. You watch the Renaissance happen. Room 8–9: Botticelli's Birth of Venus and Primavera — you finally see why everyone talks about them. Room 15: Leonardo's Annunciation — the angel is mid-arrival, revolutionary in its movement.\n\nThe light hits paintings differently than reproductions suggest. The colors are wrong in photographs. The brushwork is visible. The scale is real.\n\nDo not try to see everything. Choose three rooms. Sit. Look closely.",im:"Botticelli's Venus stepping onto shells, the detail of her skin and hair rendered in tempera, her pose balanced between vulnerability and power.",t:"€11-20 depending on exhibitions. Book online (usually €3 extra but guarantees entry within 15 min of chosen time). Advance booking essential — same-day tickets sell out by mid-morning. Visit early morning (8:30am opening) or after 4pm for fewer crowds. Allow minimum 2–3 hours for essential rooms. Audioguide €6. No large bags.",c:["greatest_hits","art"],r:"g",nn:"Galleria degli Uffizi",ns:"La più importante collezione di pittura rinascimentale del mondo — Botticelli, Leonardo, Raffaello, Caravaggio.",nst:"La galleria è organizzata cronologicamente. Osservi il Rinascimento accadere. La Nascita di Venere di Botticelli — finalmente capisci perché tutti ne parlano. L'Annunciazione di Leonardo — l'angelo è in movimento, rivoluzionario.\n\nNon tentare di vedere tutto. Scegli tre sale. Siedi. Guarda da vicino.",nt:"€11-20. Prenota online in anticipo (essenziale, i biglietti same-day si esauriscono a metà mattina). Accedi di prima mattina (8:30am) o dopo le 16 per meno folla. Minimo 2-3 ore."}];

<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:`url(\'${TBGS[tab]||TBGS.default}\') center/cover no-repeat`}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Florence Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Florence Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
