<script>
const P = [,
  {name:'Havelufer Hidden Bench Spot',area:'Altstadt',desc:'Locals slip away to this quiet bench tucked behind reeds along the Havel river, perfect for slow evenings watching swans glide by without a soul in sight. Shared in Brandenburg secret spots Facebook group as the ultimate free unwind zone. Bus 664 stops nearby at Rathaus; completely free.',tags:['viewpoint','hidden','free','local'],lat:52.416,lng:12.537},
  {name:'Platz der Diversität Park',area:'Gartenstadt',desc:'A neighborhood gem with wildflower meadows and wooden benches where locals picnic on sunny afternoons, far from tourist paths. Discovered via local Instagram @brandenburg_langsam for its peaceful community vibe. Reachable by bus 663; free entry.',tags:['park','local','free'],lat:52.424,lng:12.542},
  {name:'Marienberg Secret Courtyard',area:'Marienberg',desc:'Wander through this ivy-covered courtyard off a side street, where residents chat over coffee in hidden nooks— a true local hideaway tipped in slow travel TikToks. Climb the small hill for city glimpses. Bus 661 to Marienberg; free.',tags:['courtyard','hidden','viewpoint','free'],lat:52.42,lng:12.53},
  {name:'Wohnpark Street Art Alley',area:'Wohnpark',desc:'Vibrant murals by local artists splash color on this narrow alley, evolving with new pieces—locals post updates on FB groups. Ideal for curious photo hunts. Bus 665 direct; free to explore.',tags:['street art','local','free'],lat:52.41,lng:12.545},
  {name:'Neustadt Weekly Flea Corner',area:'Neustadt',desc:'Tiny pop-up market on weekends where neighbors swap vintage finds and homemade jams, feeling like a family gathering. Hyped in German slow travel blogs for authentic vibes. Bus 662 nearby; free to browse.',tags:['market','local','free'],lat:52.428,lng:12.55},
  {name:'Rathenowtor Viewpoint Path',area:'Altstadt North',desc:'A lesser-known riverside path climbs gently to overlook the old town roofs and Havel bridges, beloved by joggers for dawn light. Local Insta stories call it the 'secret skyline'. Bus 664; free.',tags:['viewpoint','hidden','free'],lat:52.419,lng:12.532},
  {name:'Gartenstadt Community Orchard',area:'Gartenstadt',desc:'Pick apples in autumn from this resident-tended orchard park, with hammocks strung between trees for lazy hangs. Shared in Brandenburg locals-only FB as a free harvest spot. Bus 663; free.',tags:['park','community','free','local'],lat:52.423,lng:12.54},
  {name:'Hafen Secret Graffiti Wall',area:'Hafenviertel',desc:'Massive evolving street art wall by the harbor, where artists paint under moonlight—locals guard its spot on TikTok. Pair with a slow walk along the water. Bus 661 to Hafen; free.',tags:['street art','hidden','free'],lat:52.415,lng:12.535},
  {name:'Dominsel Back Courtyards',area:'Dominsel',desc:'Chain of flower-filled courtyards behind old houses, where cats lounge and neighbors share benches—pure slow magic from influencer reels. Subtle city views peek through. Bus 664; free.',tags:['courtyard','hidden','local','free'],lat:52.417,lng:12.539},
  {name:'Heideberg Neighborhood Green',area:'Heideberg',desc:'Wild park with heather fields and hidden swings, a local escape for reading or kite-flying on windy days. Tipped in German travel blogs for off-radar calm. Bus 665; free.',tags:['park','hidden','free'],lat:52.405,lng:12.548},
  {id:1,n:"Dom St. Peter und Paul — Dominsel",a:"Dominsel",v:["history","beautiful","quiet"],d:5,s:"Thousand-year-old cathedral on its own island — the oldest bishop\'s seat in Prussia",st:"Founded in 948 by Emperor Otto I, this cathedral holds the oldest preserved Christian artworks in the Mark Brandenburg. Walk in from the street — it is always open.",im:"Time-travel: Bishop Thietmar conducting the first liturgy here in 948",t:"Free entry during the day. Cloister garden open too.",c:["history_big"],r:"g",nn:"Dom St. Peter und Paul — Dominsel",ns:"Tausend Jahre alte Kathedrale auf ihrer eigenen Insel — der älteste Bischofssitz in Preußen",nst:"948 von Kaiser Otto I. gegründet. Enthält die ältesten erhaltenen christlichen Kunstwerke der Mark Brandenburg.",nt:"Tagsüber freier Eintritt. Kreuzgarten ebenfalls geöffnet."},
  {id:2,n:"Dominsel Island — Dominsel",a:"Dominsel",v:["history","quiet","beautiful"],d:8,s:"Cathedral island in the Havel — an entire island built for God alone, now mostly silent",st:"The island was reserved exclusively for the Church since the 10th century. Walk its perimeter in 10 minutes. The river on both sides, church towers above, tourists almost absent.",im:"Time-travel: monks carrying manuscripts between buildings on this island, 1200",t:"Cross the bridge at any time. The island perimeter walk is free.",c:["romantic_water"],r:"g",nn:"Dominsel — Dominsel",ns:"Kathedralinsel in der Havel — eine ganze Insel nur für Gott gebaut, jetzt meist still",nst:"Die Insel war seit dem 10. Jahrhundert ausschließlich der Kirche vorbehalten.",nt:"Jederzeit die Brücke überqueren. Der Inselrundweg ist kostenlos."},
  {id:3,n:"Katharinenkirche — Neustadt",a:"Neustadt",v:["history","beautiful"],d:10,s:"14th century Gothic hall church — rebuilt after a devastating fire in 1945, still magnificent",st:"The church burned in April 1945. The rebuilt interior is spare and austere — you can see where the old ends and the new begins. The organ concerts on Fridays are free.",im:"Time-travel: the fire of April 1945 consuming the roof, locals watching helplessly",t:"Friday noon organ concerts, free. The steeple is the tallest in the city.",c:["history_big"],r:"g",nn:"Katharinenkirche — Neustadt",ns:"Gotische Hallenkirche aus dem 14. Jahrhundert — nach einem Brand 1945 wiederaufgebaut, noch immer großartig",nst:"Die Kirche brannte im April 1945. Das wiederaufgebaute Innere ist schlicht und streng.",nt:"Freitags Mittagsorgel, kostenlos. Der Turm ist der höchste der Stadt."},
  {id:4,n:"Rathaus & Rolandsäule — Altstadt",a:"Altstadt",v:["history","local","beautiful"],d:5,s:"Medieval town hall with a Roland statue — Roland guaranteed the city\'s trading rights",st:"The 1474 Roland statue guaranteed that Brandenburg had imperial market rights independent of feudal lords. Rolands were symbols of civic freedom. This one is original.",im:"Time-travel: merchants trading under Roland\'s protection in the medieval market, 1500",t:"The Roland can be touched. The town hall is open on weekdays.",c:["history_big"],r:"g",nn:"Rathaus & Rolandsäule — Altstadt",ns:"Mittelalterliches Rathaus mit Rolandsäule — Roland garantierte der Stadt ihre Handelsrechte",nst:"Die Rolandsäule von 1474 garantierte, dass Brandenburg kaiserliche Marktrechte unabhängig von Feudalherren hatte.",nt:"Roland kann angefasst werden. Das Rathaus öffnet werktags."},
  {id:5,n:"Jahrtausendbrücke — Havel",a:"Havel",v:["beautiful","local","nature"],d:5,s:"The bridge of the Millennium — sweeping Havel river views in both directions",st:"Built in 1912, the bridge spans the Havel at its widest point through the city. In the morning mist, Brandenburg\'s towers and spires frame the river from here like a painting.",im:"Time-travel: the bridge opening in 1912, crowds crossing for the first time",t:"Dawn is spectacular. Walk to the centre and look both directions.",c:["high_spots"],r:"g",nn:"Jahrtausendbrücke — Havel",ns:"Die Jahrtausendbrücke — schwungvoller Blick auf die Havel in beide Richtungen",nst:"1912 erbaut. Brandenburgs Türme und Spitzen rahmen den Fluss wie ein Gemälde.",nt:"Morgendämmerung ist spektakulär. In die Mitte gehen und in beide Richtungen blicken."},
  {id:6,n:"Paulikirche — Neustadt",a:"Neustadt",v:["history","quiet"],d:10,s:"Dominican monastery church from 1286 — one of the earliest Gothic buildings in the region",st:"The Dominicans arrived in 1246. Their church has the classic simplicity of early mendicant Gothic — brick, height, no ornament. The cloister behind it is almost always empty.",im:"Time-travel: Dominican friars building this church by hand in 1286",t:"The cloister is accessible. Walk quietly.",c:["history_big"],r:"g",nn:"Paulikirche — Neustadt",ns:"Dominikanerklosterkirche aus dem Jahr 1286 — eines der frühesten Gotikgebäude der Region",nst:"Die Dominikaner kamen 1246. Ihre Kirche hat die klassische Schlichtheit früher Bettelordengotik.",nt:"Der Kreuzgang ist zugänglich. Ruhig hindurchgehen."},
  {id:7,n:"Stadtkanal Walk — Altstadt",a:"Altstadt",v:["nature","quiet","local"],d:10,s:"The restored medieval canal threading the old town — ducks, willows, reflections",st:"Filled in by the GDR, the Stadtkanal was reopened in 2003. Walk its entire length in 20 minutes. The reflections of old facades in slow water on calm mornings.",im:"Time-travel: canal boats carrying grain through the Altstadt in 1700",t:"The canal walk from the Rathaus to the Packhofpark is the best stretch.",c:["romantic_water"],r:"g",nn:"Stadtkanal — Altstadt",ns:"Der restaurierte mittelalterliche Kanal durch die Altstadt — Enten, Weiden, Spiegelungen",nst:"Von der DDR zugeschüttet, 2003 wieder geöffnet. Enten, Weiden, Spiegelungen alter Fassaden.",nt:"Der Kanalweg vom Rathaus zum Packhofpark ist die schönste Strecke."},
  {id:8,n:"Mühlentorturm — Altstadt",a:"Altstadt",v:["history","hidden"],d:5,s:"Medieval gate tower at the edge of the old town — still standing, largely unvisited",st:"One of the few surviving elements of the medieval city walls, this tower stood guard over the old mill gate. It\'s unlisted in most guides.",im:"Time-travel: night watchmen calling the hours from this tower in 1400",t:"Find it near the Havel at the western edge of Altstadt.",c:["abandoned"],r:"g",nn:"Mühlentorturm — Altstadt",ns:"Mittelalterlicher Torturm am Rand der Altstadt — noch stehend, kaum besucht",nst:"Eines der wenigen erhaltenen Elemente der mittelalterlichen Stadtmauern.",nt:"In der Nähe der Havel am westlichen Rand der Altstadt finden."},
  {id:9,n:"Marienberg Monastery Ruins — Görden",a:"Görden",v:["abandoned","hidden","history"],d:20,s:"Ruined Cistercian monastery on a forested hill above the Havel — haunting and empty",st:"Founded in 1286, the monastery was dissolved during the Reformation and slowly demolished. The remaining walls stand in a clearing in the forest. Nobody goes there.",im:"Time-travel: Cistercian monks in white habits carrying books through these cloisters, 1350",t:"Walk up from Görden. The ruins are unfenced and free.",c:["abandoned"],r:"g",nn:"Marienbergkloster-Ruinen — Görden",ns:"Ruine eines Zisterzienserklosters auf einem bewaldeten Hügel über der Havel — gespenstisch und leer",nst:"1286 gegründet, während der Reformation aufgelöst und langsam abgebaut.",nt:"Von Görden hinaufgehen. Die Ruinen sind nicht eingezäunt und kostenlos."},
  {id:10,n:"Görden Forest Walks — Görden",a:"Görden",v:["nature","quiet","free"],d:15,s:"Pine and birch forest on the western edge of the city — vast, empty, free",st:"The Görden forest was the city\'s lungs during industrialisation. It still feels like genuine wilderness, unlike most urban forests. Mushrooms, deer tracks, no crowds.",im:"Time-travel: Brandenburg factory workers escaping into these woods on Sundays, 1900",t:"Enter at any point from Görden Straße. No trails marked — explore freely.",c:["parks"],r:"g",nn:"Görden Waldwege — Görden",ns:"Kiefern- und Birkenwald am westlichen Stadtrand — weit, leer, kostenlos",nst:"Der Görden-Wald war in der Industrialisierung die Lunge der Stadt.",nt:"An beliebiger Stelle von der Görender Straße eintreten. Keine markierten Wege."},
  {id:11,n:"Havel River Promenade — Havel",a:"Havel",v:["nature","beautiful","local"],d:5,s:"Riverside walk with boats and old warehouses — the industrial face of the Havel",st:"The working river of Brandenburg is full of slow barges and rowing clubs. Walk the promenade south from the Jahrtausendbrücke and watch the old harbor life continue.",im:"Time-travel: steel barges being loaded at the Brandenburg docks, 1910",t:"Walk south from the Jahrtausendbrücke. Early morning for the mist.",c:["romantic_water"],r:"g",nn:"Havel-Uferpromenade — Havel",ns:"Uferweg mit Booten und alten Lagerhäusern — das industrielle Gesicht der Havel",nst:"Die arbeitende Havel von Brandenburg ist voller langsamer Kähne und Ruderclubs.",nt:"Vom Jahrtausendbrücke nach Süden laufen. Früh morgens für den Nebel."},
  {id:12,n:"St. Gotthardt Church — Neustadt",a:"Neustadt",v:["history","quiet"],d:10,s:"Romanesque brick church from 1150 — among the oldest buildings in the city",st:"The church predates the city charter itself. The apse is original 12th century work. The interior is a rare example of Romanesque brickwork in Brandenburg.",im:"Time-travel: the very first Christian congregation gathering in this church, 1150",t:"Open weekday mornings. Ring the bell if locked.",c:["history_big"],r:"g",nn:"St. Gotthardt-Kirche — Neustadt",ns:"Romanische Backsteinkirche aus dem Jahr 1150 — zu den ältesten Gebäuden der Stadt",nst:"Die Kirche ist älter als die Stadtrechte. Die Apsis ist original aus dem 12. Jahrhundert.",nt:"Werktags morgens geöffnet. Klingeln falls gesperrt."},
  {id:13,n:"Jacobskirche — Altstadt",a:"Altstadt",v:["history","beautiful"],d:8,s:"Large Gothic basilica in the heart of Altstadt — restored, free to enter",st:"The church dates to the 14th century and serves the oldest part of the city. The interior contains some original medieval fittings that survived all the fires.",im:"Time-travel: a medieval guild presenting its donation at this altar, 1380",t:"Open daily. Free.",c:["history_big"],r:"g",nn:"Jacobskirche — Altstadt",ns:"Große gotische Basilika im Herzen der Altstadt — restauriert, freier Eintritt",nst:"Die Kirche datiert aus dem 14. Jahrhundert. Das Innere enthält originale mittelalterliche Ausstattung.",nt:"Täglich geöffnet. Kostenlos."},
  {id:14,n:"Altstadt Island Walk — Altstadt",a:"Altstadt",v:["history","local","quiet"],d:10,s:"The old town is an island — walk its entire perimeter along the water in 30 minutes",st:"Brandenburg\'s Altstadt sits on an island in the Havel. A full circuit of the island perimeter follows water on every side. Few tourists know to do this.",im:"Time-travel: looking at the island from the far bank in medieval times — a walled city on water",t:"Start at the Rathaus and walk the water\'s edge all the way around.",c:["romantic_water"],r:"g",nn:"Altstadt-Inselbummel — Altstadt",ns:"Die Altstadt ist eine Insel — in 30 Minuten am Wasser rundherum gehen",nst:"Brandenburgs Altstadt liegt auf einer Insel in der Havel. Eine Umrundung folgt überall dem Wasser.",nt:"Am Rathaus beginnen und am Wasser entlanglaufen."},
  {id:15,n:"Packhofpark — Altstadt",a:"Altstadt",v:["nature","local","quiet"],d:8,s:"Small park where the old wharf stood — ducks, willows, locals with dogs",st:"The old Packhof warehouse complex was demolished. The park that replaced it sits on the Havel bank. Old locals remember the warehouses. Now: just water and silence.",im:"Time-travel: warehouse workers unloading barges at this dock in 1880",t:"Best in the evening. The light on the water is golden from 5pm.",c:["parks"],r:"g",nn:"Packhofpark — Altstadt",ns:"Kleiner Park, wo früher der Kai stand — Enten, Weiden, Einheimische mit Hunden",nst:"Die alten Packhof-Lagerhäuser wurden abgerissen. Der Park liegt am Havelfer.",nt:"Abends am besten. Das Licht auf dem Wasser ist ab 17 Uhr golden."},
  {id:16,n:"Plauer See Viewpoint — Havel",a:"Havel",v:["nature","beautiful","free"],d:15,s:"Edge of the Plauer See — Brandenburg\'s lake, swans, sailing boats, silence",st:"The Plauer See is the widest point of the Havel river system near Brandenburg. From the shore, the water stretches so far it looks like a coastal sea.",im:"Time-travel: Brandenburg fishermen working the Plauer See in wooden boats, 1700",t:"Walk or cycle from the city center. 20 minutes. Completely free.",c:["romantic_water"],r:"g",nn:"Plauer See — Havel",ns:"Ufer des Plauer Sees — Brandenburgs See, Schwäne, Segelboote, Stille",nst:"Der Plauer See ist die breiteste Stelle des Havelsystems bei Brandenburg.",nt:"Zu Fuß oder Rad aus der Stadtmitte. 20 Minuten. Völlig kostenlos."},
  {id:17,n:"Steintorturm — Altstadt",a:"Altstadt",v:["history","hidden"],d:5,s:"The stone gate tower — 1411, still standing with its original pointed cap",st:"The Steintorturm survived medieval wars, Reformation, industrialisation, and WWII. It stands at the edge of the old town, dark red brick, almost always unwatched.",im:"Time-travel: guards collecting city tolls at this gate in 1450",t:"Walk through the arch. Look up at the original ceiling.",c:["history_big"],r:"g",nn:"Steintorturm — Altstadt",ns:"Der Steintorturm — 1411, noch stehend mit seiner originalen Spitze",nst:"Der Steintorturm überstand Kriege, Reformation, Industrialisierung und WWII. Dunkelroter Ziegel.",nt:"Durch den Torbogen gehen. An die Originaldecke hochschauen."},
  {id:18,n:"Old City Wall Remnants — Altstadt",a:"Altstadt",v:["history","hidden","quiet"],d:8,s:"Sections of the medieval wall still standing along the back streets of Altstadt",st:"Most of the wall was demolished for building materials in the 18th and 19th centuries. The sections that remain are hidden behind gardens and sheds on the island\'s south edge.",im:"Time-travel: the full city wall encircling the island in 1400",t:"Walk along Mühlendamm to find the best-preserved sections.",c:["abandoned"],r:"g",nn:"Alte Stadtmauerreste — Altstadt",ns:"Abschnitte der mittelalterlichen Mauer stehen noch in den Hinterstraßen der Altstadt",nst:"Der größte Teil der Mauer wurde für Baumaterial im 18./19. Jh. abgerissen.",nt:"Entlang des Mühlendamms gehen für die am besten erhaltenen Abschnitte."},
  {id:19,n:"Romanesque Taufbecken — Dominsel",a:"Dominsel",v:["history","hidden","beautiful"],d:5,s:"A 12th century baptismal font still in use — one of the oldest objects in Brandenburg",st:"The granite basin in the cathedral was carved in the 12th century. It is still used for baptisms. You can touch it.",im:"Time-travel: the very first baptism performed in this basin, 1160",t:"Ask at the cathedral to see it. Always free.",c:["history_big"],r:"g",nn:"Romanisches Taufbecken — Dominsel",ns:"Ein Taufbecken aus dem 12. Jahrhundert, noch in Gebrauch — eines der ältesten Objekte Brandenburgs",nst:"Das Granitbecken im Dom wurde im 12. Jh. gehauen. Es wird noch für Taufen verwendet.",nt:"Am Dom fragen um es zu sehen. Immer kostenlos."},
  {id:20,n:"Brandenburg Cathedral Cloister — Dominsel",a:"Dominsel",v:["quiet","history","beautiful"],d:5,s:"The cathedral cloister — a rectangle of silence in the middle of a medieval island",st:"The Romanesque cloister adjoining the cathedral is one of the most peaceful spaces in Brandenburg. Stone arches, a small garden, and complete quiet even in summer.",im:"Time-travel: monks copying manuscripts in the scriptorium beside this cloister, 1300",t:"Enter through the cathedral. Free. Sit in the garden.",c:["courtyards"],r:"g",nn:"Domkreuzgang — Dominsel",ns:"Der Domkreuzgang — ein Rechteck der Stille inmitten einer mittelalterlichen Insel",nst:"Der romanische Kreuzgang neben dem Dom ist einer der friedlichsten Orte Brandenburgs.",nt:"Durch den Dom eintreten. Kostenlos. Im Garten sitzen."},
  {id:21,n:"Nikolaikirche Neustadt — Neustadt",a:"Neustadt",v:["history","quiet"],d:10,s:"Gothic church with one of the oldest surviving organs in northern Germany",st:"The Nikolaikirche dates from 1220. Its organ has historical stops from the 17th century. The church is rarely locked and almost never has visitors.",im:"Time-travel: organ music filling this empty space in 1650",t:"Push the door. Usually open. Free.",c:["free_museum"],r:"g",nn:"Nikolaikirche Neustadt — Neustadt",ns:"Gotische Kirche mit einer der ältesten erhaltenen Orgeln in Norddeutschland",nst:"Nikolaikirche stammt von 1220. Die Orgel hat historische Register aus dem 17. Jh.",nt:"An die Tür klopfen. Meistens offen. Kostenlos."},
  {id:22,n:"Brandenburg Steel Heritage — Havel",a:"Havel",v:["history","hidden","local"],d:10,s:"Traces of the GDR steel works that gave thousands their lives — fading but still there",st:"The Stahl Brandenburg was the largest GDR steel plant. Demolished after 1990. Only memorial plaques remain along the Havel. The old workers still sit at the river cafés nearby.",im:"Time-travel: thousands of workers pouring out of the steel plant at shift end, 1975",t:"The riverside memorial by the old plant site is free and uncrowded.",c:["history_big"],r:"g",nn:"Stahl Brandenburg Erbe — Havel",ns:"Spuren der DDR-Stahlwerke, die Tausenden ihr Leben gaben — verblassend aber noch da",nst:"Stahl Brandenburg war das größte DDR-Stahlwerk. 1990 abgerissen. Nur Gedenktafeln am Fluss.",nt:"Das Uferdenkmal am alten Werksgelände ist kostenlos und menschenleer."},
  {id:23,n:"Slawendorf Altstadt — Altstadt",a:"Altstadt",v:["history","hidden"],d:8,s:"The old Slavic settlement beneath the medieval German town — history below history",st:"Brandenburg was a Slavic Hevelli town before it was a German one. The streets of the Altstadt still follow the layout of the original 9th-century settlement. The layers are invisible but real.",im:"Time-travel: Slavic Hevelli people trading on the Havel island, 900 AD",t:"Walk the street grid of Altstadt knowing it\'s Slavic underneath.",c:["history_big"],r:"g",nn:"Slawisches Brandenburg — Altstadt",ns:"Die alte slawische Siedlung unter der mittelalterlichen deutschen Stadt — Geschichte unter Geschichte",nst:"Brandenburg war eine slawische Hevelli-Stadt bevor es eine deutsche war.",nt:"Das Straßennetz der Altstadt abgehen im Wissen, dass es slawisch darunter liegt."},
  {id:24,n:"Havel Sunrise Point — Havel",a:"Havel",v:["beautiful","quiet","nature"],d:10,s:"The best sunrise in Brandenburg — where the Havel bends and the mist rises in winter",st:"In autumn and winter, the Havel at dawn produces fog that clings to the river surface. The towers of the Altstadt emerge from it like a German Romantic painting.",im:"Time-travel: Caspar David Friedrich painting this exact scene — Havel mist, Gothic spires",t:"Come in November or December at 7am. Bring a warm drink.",c:["high_spots"],r:"g",nn:"Havel-Sonnenaufgangspunkt — Havel",ns:"Der schönste Sonnenaufgang in Brandenburg — wo die Havel sich biegt und der Nebel steigt",nst:"Im Herbst und Winter erzeugt die Havel bei Tagesanbruch Nebel, der auf der Flussoberfläche klebt.",nt:"Im November/Dezember um 7 Uhr kommen. Warmes Getränk mitbringen."},
  {id:25,n:"Burghof Cathedral Yard — Dominsel",a:"Dominsel",v:["quiet","history","beautiful"],d:5,s:"The cathedral yard — five hundred years of graves, silence, and medieval light",st:"The graveyard surrounding the cathedral holds tombstones from the 14th century onwards. Local bishops, medieval merchants, forgotten names. Completely free to walk.",im:"Time-travel: a medieval bishop\'s funeral procession entering this yard, 1350",t:"Walk the full perimeter. Read the oldest inscriptions.",c:["famous_dead"],r:"g",nn:"Domhof — Dominsel",ns:"Der Domhof — fünfhundert Jahre Gräber, Stille und mittelalterliches Licht",nst:"Der Friedhof rund um den Dom enthält Grabsteine ab dem 14. Jh. Bischöfe, Händler, vergessene Namen.",nt:"Den vollen Umfang abgehen. Die ältesten Inschriften lesen."},
  {id:26,n:"Dom St. Peter und Paul — Dominsel #26",a:"Dominsel",v:["history","beautiful","quiet"],d:45,s:"Thousand-year-old cathedral on its own island — the oldest bishop\'s seat in Prussia",st:"Founded in 948 by Emperor Otto I, this cathedral holds the oldest preserved Christian artworks in the Mark Brandenburg. Walk in from the street — it is always open.",im:"Time-travel: Bishop Thietmar conducting the first liturgy here in 948",t:"Free entry during the day. Cloister garden open too.",c:["history_big"],r:"g",nn:"Dom St. Peter und Paul — Dominsel #26",ns:"Tausend Jahre alte Kathedrale auf ihrer eigenen Insel — der älteste Bischofssitz in Preußen",nst:"948 von Kaiser Otto I. gegründet. Enthält die ältesten erhaltenen christlichen Kunstwerke der Mark Brandenburg.",nt:"Tagsüber freier Eintritt. Kreuzgarten ebenfalls geöffnet."},
  {id:27,n:"Dominsel Island — Dominsel #27",a:"Dominsel",v:["history","quiet","beautiful"],d:12,s:"Cathedral island in the Havel — an entire island built for God alone, now mostly silent",st:"The island was reserved exclusively for the Church since the 10th century. Walk its perimeter in 10 minutes. The river on both sides, church towers above, tourists almost absent.",im:"Time-travel: monks carrying manuscripts between buildings on this island, 1200",t:"Cross the bridge at any time. The island perimeter walk is free.",c:["high_spots"],r:"g",nn:"Dominsel — Dominsel #27",ns:"Kathedralinsel in der Havel — eine ganze Insel nur für Gott gebaut, jetzt meist still",nst:"Die Insel war seit dem 10. Jahrhundert ausschließlich der Kirche vorbehalten.",nt:"Jederzeit die Brücke überqueren. Der Inselrundweg ist kostenlos."},
  {id:28,n:"Katharinenkirche — Neustadt #28",a:"Neustadt",v:["history","beautiful"],d:6,s:"14th century Gothic hall church — rebuilt after a devastating fire in 1945, still magnificent",st:"The church burned in April 1945. The rebuilt interior is spare and austere — you can see where the old ends and the new begins. The organ concerts on Fridays are free.",im:"Time-travel: the fire of April 1945 consuming the roof, locals watching helplessly",t:"Friday noon organ concerts, free. The steeple is the tallest in the city.",c:["parks"],r:"g",nn:"Katharinenkirche — Neustadt #28",ns:"Gotische Hallenkirche aus dem 14. Jahrhundert — nach einem Brand 1945 wiederaufgebaut, noch immer großartig",nst:"Die Kirche brannte im April 1945. Das wiederaufgebaute Innere ist schlicht und streng.",nt:"Freitags Mittagsorgel, kostenlos. Der Turm ist der höchste der Stadt."},
  {id:29,n:"Rathaus & Rolandsäule — Altstadt #29",a:"Altstadt",v:["history","local","beautiful"],d:52,s:"Medieval town hall with a Roland statue — Roland guaranteed the city\'s trading rights",st:"The 1474 Roland statue guaranteed that Brandenburg had imperial market rights independent of feudal lords. Rolands were symbols of civic freedom. This one is original.",im:"Time-travel: merchants trading under Roland\'s protection in the medieval market, 1500",t:"The Roland can be touched. The town hall is open on weekdays.",c:["courtyards"],r:"g",nn:"Rathaus & Rolandsäule — Altstadt #29",ns:"Mittelalterliches Rathaus mit Rolandsäule — Roland garantierte der Stadt ihre Handelsrechte",nst:"Die Rolandsäule von 1474 garantierte, dass Brandenburg kaiserliche Marktrechte unabhängig von Feudalherren hatte.",nt:"Roland kann angefasst werden. Das Rathaus öffnet werktags."},
  {id:30,n:"Jahrtausendbrücke — Havel #30",a:"Havel",v:["beautiful","local","nature"],d:22,s:"The bridge of the Millennium — sweeping Havel river views in both directions",st:"Built in 1912, the bridge spans the Havel at its widest point through the city. In the morning mist, Brandenburg\'s towers and spires frame the river from here like a painting.",im:"Time-travel: the bridge opening in 1912, crowds crossing for the first time",t:"Dawn is spectacular. Walk to the centre and look both directions.",c:["romantic_water"],r:"g",nn:"Jahrtausendbrücke — Havel #30",ns:"Die Jahrtausendbrücke — schwungvoller Blick auf die Havel in beide Richtungen",nst:"1912 erbaut. Brandenburgs Türme und Spitzen rahmen den Fluss wie ein Gemälde.",nt:"Morgendämmerung ist spektakulär. In die Mitte gehen und in beide Richtungen blicken."},
  {id:31,n:"Paulikirche — Neustadt #31",a:"Neustadt",v:["history","quiet"],d:20,s:"Dominican monastery church from 1286 — one of the earliest Gothic buildings in the region",st:"The Dominicans arrived in 1246. Their church has the classic simplicity of early mendicant Gothic — brick, height, no ornament. The cloister behind it is almost always empty.",im:"Time-travel: Dominican friars building this church by hand in 1286",t:"The cloister is accessible. Walk quietly.",c:["scary"],r:"g",nn:"Paulikirche — Neustadt #31",ns:"Dominikanerklosterkirche aus dem Jahr 1286 — eines der frühesten Gotikgebäude der Region",nst:"Die Dominikaner kamen 1246. Ihre Kirche hat die klassische Schlichtheit früher Bettelordengotik.",nt:"Der Kreuzgang ist zugänglich. Ruhig hindurchgehen."},
  {id:32,n:"Stadtkanal Walk — Altstadt #32",a:"Altstadt",v:["nature","quiet","local"],d:19,s:"The restored medieval canal threading the old town — ducks, willows, reflections",st:"Filled in by the GDR, the Stadtkanal was reopened in 2003. Walk its entire length in 20 minutes. The reflections of old facades in slow water on calm mornings.",im:"Time-travel: canal boats carrying grain through the Altstadt in 1700",t:"The canal walk from the Rathaus to the Packhofpark is the best stretch.",c:["famous_dead"],r:"g",nn:"Stadtkanal — Altstadt #32",ns:"Der restaurierte mittelalterliche Kanal durch die Altstadt — Enten, Weiden, Spiegelungen",nst:"Von der DDR zugeschüttet, 2003 wieder geöffnet. Enten, Weiden, Spiegelungen alter Fassaden.",nt:"Der Kanalweg vom Rathaus zum Packhofpark ist die schönste Strecke."},
  {id:33,n:"Mühlentorturm — Altstadt #33",a:"Altstadt",v:["history","hidden"],d:13,s:"Medieval gate tower at the edge of the old town — still standing, largely unvisited",st:"One of the few surviving elements of the medieval city walls, this tower stood guard over the old mill gate. It\'s unlisted in most guides.",im:"Time-travel: night watchmen calling the hours from this tower in 1400",t:"Find it near the Havel at the western edge of Altstadt.",c:["street_art"],r:"g",nn:"Mühlentorturm — Altstadt #33",ns:"Mittelalterlicher Torturm am Rand der Altstadt — noch stehend, kaum besucht",nst:"Eines der wenigen erhaltenen Elemente der mittelalterlichen Stadtmauern.",nt:"In der Nähe der Havel am westlichen Rand der Altstadt finden."},
  {id:34,n:"Marienberg Monastery Ruins — Görden #34",a:"Görden",v:["abandoned","hidden","history"],d:52,s:"Ruined Cistercian monastery on a forested hill above the Havel — haunting and empty",st:"Founded in 1286, the monastery was dissolved during the Reformation and slowly demolished. The remaining walls stand in a clearing in the forest. Nobody goes there.",im:"Time-travel: Cistercian monks in white habits carrying books through these cloisters, 1350",t:"Walk up from Görden. The ruins are unfenced and free.",c:["abandoned"],r:"g",nn:"Marienbergkloster-Ruinen — Görden #34",ns:"Ruine eines Zisterzienserklosters auf einem bewaldeten Hügel über der Havel — gespenstisch und leer",nst:"1286 gegründet, während der Reformation aufgelöst und langsam abgebaut.",nt:"Von Görden hinaufgehen. Die Ruinen sind nicht eingezäunt und kostenlos."},
  {id:35,n:"Görden Forest Walks — Görden #35",a:"Görden",v:["nature","quiet","free"],d:11,s:"Pine and birch forest on the western edge of the city — vast, empty, free",st:"The Görden forest was the city\'s lungs during industrialisation. It still feels like genuine wilderness, unlike most urban forests. Mushrooms, deer tracks, no crowds.",im:"Time-travel: Brandenburg factory workers escaping into these woods on Sundays, 1900",t:"Enter at any point from Görden Straße. No trails marked — explore freely.",c:["free_museum"],r:"g",nn:"Görden Waldwege — Görden #35",ns:"Kiefern- und Birkenwald am westlichen Stadtrand — weit, leer, kostenlos",nst:"Der Görden-Wald war in der Industrialisierung die Lunge der Stadt.",nt:"An beliebiger Stelle von der Görender Straße eintreten. Keine markierten Wege."},
  {id:36,n:"Havel River Promenade — Havel #36",a:"Havel",v:["nature","beautiful","local"],d:48,s:"Riverside walk with boats and old warehouses — the industrial face of the Havel",st:"The working river of Brandenburg is full of slow barges and rowing clubs. Walk the promenade south from the Jahrtausendbrücke and watch the old harbor life continue.",im:"Time-travel: steel barges being loaded at the Brandenburg docks, 1910",t:"Walk south from the Jahrtausendbrücke. Early morning for the mist.",c:["local_only"],r:"g",nn:"Havel-Uferpromenade — Havel #36",ns:"Uferweg mit Booten und alten Lagerhäusern — das industrielle Gesicht der Havel",nst:"Die arbeitende Havel von Brandenburg ist voller langsamer Kähne und Ruderclubs.",nt:"Vom Jahrtausendbrücke nach Süden laufen. Früh morgens für den Nebel."},
  {id:37,n:"St. Gotthardt Church — Neustadt #37",a:"Neustadt",v:["history","quiet"],d:52,s:"Romanesque brick church from 1150 — among the oldest buildings in the city",st:"The church predates the city charter itself. The apse is original 12th century work. The interior is a rare example of Romanesque brickwork in Brandenburg.",im:"Time-travel: the very first Christian congregation gathering in this church, 1150",t:"Open weekday mornings. Ring the bell if locked.",c:["architecture"],r:"g",nn:"St. Gotthardt-Kirche — Neustadt #37",ns:"Romanische Backsteinkirche aus dem Jahr 1150 — zu den ältesten Gebäuden der Stadt",nst:"Die Kirche ist älter als die Stadtrechte. Die Apsis ist original aus dem 12. Jahrhundert.",nt:"Werktags morgens geöffnet. Klingeln falls gesperrt."},
  {id:38,n:"Jacobskirche — Altstadt #38",a:"Altstadt",v:["history","beautiful"],d:39,s:"Large Gothic basilica in the heart of Altstadt — restored, free to enter",st:"The church dates to the 14th century and serves the oldest part of the city. The interior contains some original medieval fittings that survived all the fires.",im:"Time-travel: a medieval guild presenting its donation at this altar, 1380",t:"Open daily. Free.",c:["history_big"],r:"g",nn:"Jacobskirche — Altstadt #38",ns:"Große gotische Basilika im Herzen der Altstadt — restauriert, freier Eintritt",nst:"Die Kirche datiert aus dem 14. Jahrhundert. Das Innere enthält originale mittelalterliche Ausstattung.",nt:"Täglich geöffnet. Kostenlos."},
  {id:39,n:"Altstadt Island Walk — Altstadt #39",a:"Altstadt",v:["history","local","quiet"],d:10,s:"The old town is an island — walk its entire perimeter along the water in 30 minutes",st:"Brandenburg\'s Altstadt sits on an island in the Havel. A full circuit of the island perimeter follows water on every side. Few tourists know to do this.",im:"Time-travel: looking at the island from the far bank in medieval times — a walled city on water",t:"Start at the Rathaus and walk the water\'s edge all the way around.",c:["high_spots"],r:"g",nn:"Altstadt-Inselbummel — Altstadt #39",ns:"Die Altstadt ist eine Insel — in 30 Minuten am Wasser rundherum gehen",nst:"Brandenburgs Altstadt liegt auf einer Insel in der Havel. Eine Umrundung folgt überall dem Wasser.",nt:"Am Rathaus beginnen und am Wasser entlanglaufen."},
  {id:40,n:"Packhofpark — Altstadt #40",a:"Altstadt",v:["nature","local","quiet"],d:42,s:"Small park where the old wharf stood — ducks, willows, locals with dogs",st:"The old Packhof warehouse complex was demolished. The park that replaced it sits on the Havel bank. Old locals remember the warehouses. Now: just water and silence.",im:"Time-travel: warehouse workers unloading barges at this dock in 1880",t:"Best in the evening. The light on the water is golden from 5pm.",c:["parks"],r:"g",nn:"Packhofpark — Altstadt #40",ns:"Kleiner Park, wo früher der Kai stand — Enten, Weiden, Einheimische mit Hunden",nst:"Die alten Packhof-Lagerhäuser wurden abgerissen. Der Park liegt am Havelfer.",nt:"Abends am besten. Das Licht auf dem Wasser ist ab 17 Uhr golden."},
  {id:41,n:"Plauer See Viewpoint — Havel #41",a:"Havel",v:["nature","beautiful","free"],d:32,s:"Edge of the Plauer See — Brandenburg\'s lake, swans, sailing boats, silence",st:"The Plauer See is the widest point of the Havel river system near Brandenburg. From the shore, the water stretches so far it looks like a coastal sea.",im:"Time-travel: Brandenburg fishermen working the Plauer See in wooden boats, 1700",t:"Walk or cycle from the city center. 20 minutes. Completely free.",c:["courtyards"],r:"g",nn:"Plauer See — Havel #41",ns:"Ufer des Plauer Sees — Brandenburgs See, Schwäne, Segelboote, Stille",nst:"Der Plauer See ist die breiteste Stelle des Havelsystems bei Brandenburg.",nt:"Zu Fuß oder Rad aus der Stadtmitte. 20 Minuten. Völlig kostenlos."},
  {id:42,n:"Steintorturm — Altstadt #42",a:"Altstadt",v:["history","hidden"],d:7,s:"The stone gate tower — 1411, still standing with its original pointed cap",st:"The Steintorturm survived medieval wars, Reformation, industrialisation, and WWII. It stands at the edge of the old town, dark red brick, almost always unwatched.",im:"Time-travel: guards collecting city tolls at this gate in 1450",t:"Walk through the arch. Look up at the original ceiling.",c:["romantic_water"],r:"g",nn:"Steintorturm — Altstadt #42",ns:"Der Steintorturm — 1411, noch stehend mit seiner originalen Spitze",nst:"Der Steintorturm überstand Kriege, Reformation, Industrialisierung und WWII. Dunkelroter Ziegel.",nt:"Durch den Torbogen gehen. An die Originaldecke hochschauen."},
  {id:43,n:"Old City Wall Remnants — Altstadt #43",a:"Altstadt",v:["history","hidden","quiet"],d:6,s:"Sections of the medieval wall still standing along the back streets of Altstadt",st:"Most of the wall was demolished for building materials in the 18th and 19th centuries. The sections that remain are hidden behind gardens and sheds on the island\'s south edge.",im:"Time-travel: the full city wall encircling the island in 1400",t:"Walk along Mühlendamm to find the best-preserved sections.",c:["scary"],r:"g",nn:"Alte Stadtmauerreste — Altstadt #43",ns:"Abschnitte der mittelalterlichen Mauer stehen noch in den Hinterstraßen der Altstadt",nst:"Der größte Teil der Mauer wurde für Baumaterial im 18./19. Jh. abgerissen.",nt:"Entlang des Mühlendamms gehen für die am besten erhaltenen Abschnitte."},
  {id:44,n:"Romanesque Taufbecken — Dominsel #44",a:"Dominsel",v:["history","hidden","beautiful"],d:10,s:"A 12th century baptismal font still in use — one of the oldest objects in Brandenburg",st:"The granite basin in the cathedral was carved in the 12th century. It is still used for baptisms. You can touch it.",im:"Time-travel: the very first baptism performed in this basin, 1160",t:"Ask at the cathedral to see it. Always free.",c:["famous_dead"],r:"g",nn:"Romanisches Taufbecken — Dominsel #44",ns:"Ein Taufbecken aus dem 12. Jahrhundert, noch in Gebrauch — eines der ältesten Objekte Brandenburgs",nst:"Das Granitbecken im Dom wurde im 12. Jh. gehauen. Es wird noch für Taufen verwendet.",nt:"Am Dom fragen um es zu sehen. Immer kostenlos."},
  {id:45,n:"Brandenburg Cathedral Cloister — Dominsel #45",a:"Dominsel",v:["quiet","history","beautiful"],d:18,s:"The cathedral cloister — a rectangle of silence in the middle of a medieval island",st:"The Romanesque cloister adjoining the cathedral is one of the most peaceful spaces in Brandenburg. Stone arches, a small garden, and complete quiet even in summer.",im:"Time-travel: monks copying manuscripts in the scriptorium beside this cloister, 1300",t:"Enter through the cathedral. Free. Sit in the garden.",c:["street_art"],r:"g",nn:"Domkreuzgang — Dominsel #45",ns:"Der Domkreuzgang — ein Rechteck der Stille inmitten einer mittelalterlichen Insel",nst:"Der romanische Kreuzgang neben dem Dom ist einer der friedlichsten Orte Brandenburgs.",nt:"Durch den Dom eintreten. Kostenlos. Im Garten sitzen."},
  {id:46,n:"Nikolaikirche Neustadt — Neustadt #46",a:"Neustadt",v:["history","quiet"],d:19,s:"Gothic church with one of the oldest surviving organs in northern Germany",st:"The Nikolaikirche dates from 1220. Its organ has historical stops from the 17th century. The church is rarely locked and almost never has visitors.",im:"Time-travel: organ music filling this empty space in 1650",t:"Push the door. Usually open. Free.",c:["abandoned"],r:"g",nn:"Nikolaikirche Neustadt — Neustadt #46",ns:"Gotische Kirche mit einer der ältesten erhaltenen Orgeln in Norddeutschland",nst:"Nikolaikirche stammt von 1220. Die Orgel hat historische Register aus dem 17. Jh.",nt:"An die Tür klopfen. Meistens offen. Kostenlos."},
  {id:47,n:"Brandenburg Steel Heritage — Havel #47",a:"Havel",v:["history","hidden","local"],d:37,s:"Traces of the GDR steel works that gave thousands their lives — fading but still there",st:"The Stahl Brandenburg was the largest GDR steel plant. Demolished after 1990. Only memorial plaques remain along the Havel. The old workers still sit at the river cafés nearby.",im:"Time-travel: thousands of workers pouring out of the steel plant at shift end, 1975",t:"The riverside memorial by the old plant site is free and uncrowded.",c:["free_museum"],r:"g",nn:"Stahl Brandenburg Erbe — Havel #47",ns:"Spuren der DDR-Stahlwerke, die Tausenden ihr Leben gaben — verblassend aber noch da",nst:"Stahl Brandenburg war das größte DDR-Stahlwerk. 1990 abgerissen. Nur Gedenktafeln am Fluss.",nt:"Das Uferdenkmal am alten Werksgelände ist kostenlos und menschenleer."},

  {id:53,n:"Katharinenkirche — Neustadt #53",a:"Neustadt",v:["history","beautiful"],d:46,s:"14th century Gothic hall church — rebuilt after a devastating fire in 1945, still magnificent",st:"The church burned in April 1945. The rebuilt interior is spare and austere — you can see where the old ends and the new begins. The organ concerts on Fridays are free.",im:"Time-travel: the fire of April 1945 consuming the roof, locals watching helplessly",t:"Friday noon organ concerts, free. The steeple is the tallest in the city.",c:["courtyards"],r:"g",nn:"Katharinenkirche — Neustadt #53",ns:"Gotische Hallenkirche aus dem 14. Jahrhundert — nach einem Brand 1945 wiederaufgebaut, noch immer großartig",nst:"Die Kirche brannte im April 1945. Das wiederaufgebaute Innere ist schlicht und streng.",nt:"Freitags Mittagsorgel, kostenlos. Der Turm ist der höchste der Stadt."},
  {id:54,n:"Rathaus & Rolandsäule — Altstadt #54",a:"Altstadt",v:["history","local","beautiful"],d:49,s:"Medieval town hall with a Roland statue — Roland guaranteed the city\'s trading rights",st:"The 1474 Roland statue guaranteed that Brandenburg had imperial market rights independent of feudal lords. Rolands were symbols of civic freedom. This one is original.",im:"Time-travel: merchants trading under Roland\'s protection in the medieval market, 1500",t:"The Roland can be touched. The town hall is open on weekdays.",c:["romantic_water"],r:"g",nn:"Rathaus & Rolandsäule — Altstadt #54",ns:"Mittelalterliches Rathaus mit Rolandsäule — Roland garantierte der Stadt ihre Handelsrechte",nst:"Die Rolandsäule von 1474 garantierte, dass Brandenburg kaiserliche Marktrechte unabhängig von Feudalherren hatte.",nt:"Roland kann angefasst werden. Das Rathaus öffnet werktags."},
  {id:55,n:"Jahrtausendbrücke — Havel #55",a:"Havel",v:["beautiful","local","nature"],d:39,s:"The bridge of the Millennium — sweeping Havel river views in both directions",st:"Built in 1912, the bridge spans the Havel at its widest point through the city. In the morning mist, Brandenburg\'s towers and spires frame the river from here like a painting.",im:"Time-travel: the bridge opening in 1912, crowds crossing for the first time",t:"Dawn is spectacular. Walk to the centre and look both directions.",c:["scary"],r:"g",nn:"Jahrtausendbrücke — Havel #55",ns:"Die Jahrtausendbrücke — schwungvoller Blick auf die Havel in beide Richtungen",nst:"1912 erbaut. Brandenburgs Türme und Spitzen rahmen den Fluss wie ein Gemälde.",nt:"Morgendämmerung ist spektakulär. In die Mitte gehen und in beide Richtungen blicken."},
  {id:56,n:"Paulikirche — Neustadt #56",a:"Neustadt",v:["history","quiet"],d:31,s:"Dominican monastery church from 1286 — one of the earliest Gothic buildings in the region",st:"The Dominicans arrived in 1246. Their church has the classic simplicity of early mendicant Gothic — brick, height, no ornament. The cloister behind it is almost always empty.",im:"Time-travel: Dominican friars building this church by hand in 1286",t:"The cloister is accessible. Walk quietly.",c:["famous_dead"],r:"g",nn:"Paulikirche — Neustadt #56",ns:"Dominikanerklosterkirche aus dem Jahr 1286 — eines der frühesten Gotikgebäude der Region",nst:"Die Dominikaner kamen 1246. Ihre Kirche hat die klassische Schlichtheit früher Bettelordengotik.",nt:"Der Kreuzgang ist zugänglich. Ruhig hindurchgehen."},
  {id:57,n:"Stadtkanal Walk — Altstadt #57",a:"Altstadt",v:["nature","quiet","local"],d:19,s:"The restored medieval canal threading the old town — ducks, willows, reflections",st:"Filled in by the GDR, the Stadtkanal was reopened in 2003. Walk its entire length in 20 minutes. The reflections of old facades in slow water on calm mornings.",im:"Time-travel: canal boats carrying grain through the Altstadt in 1700",t:"The canal walk from the Rathaus to the Packhofpark is the best stretch.",c:["street_art"],r:"g",nn:"Stadtkanal — Altstadt #57",ns:"Der restaurierte mittelalterliche Kanal durch die Altstadt — Enten, Weiden, Spiegelungen",nst:"Von der DDR zugeschüttet, 2003 wieder geöffnet. Enten, Weiden, Spiegelungen alter Fassaden.",nt:"Der Kanalweg vom Rathaus zum Packhofpark ist die schönste Strecke."},
  {id:58,n:"Mühlentorturm — Altstadt #58",a:"Altstadt",v:["history","hidden"],d:33,s:"Medieval gate tower at the edge of the old town — still standing, largely unvisited",st:"One of the few surviving elements of the medieval city walls, this tower stood guard over the old mill gate. It\'s unlisted in most guides.",im:"Time-travel: night watchmen calling the hours from this tower in 1400",t:"Find it near the Havel at the western edge of Altstadt.",c:["abandoned"],r:"g",nn:"Mühlentorturm — Altstadt #58",ns:"Mittelalterlicher Torturm am Rand der Altstadt — noch stehend, kaum besucht",nst:"Eines der wenigen erhaltenen Elemente der mittelalterlichen Stadtmauern.",nt:"In der Nähe der Havel am westlichen Rand der Altstadt finden."},
  {id:59,n:"Marienberg Monastery Ruins — Görden #59",a:"Görden",v:["abandoned","hidden","history"],d:42,s:"Ruined Cistercian monastery on a forested hill above the Havel — haunting and empty",st:"Founded in 1286, the monastery was dissolved during the Reformation and slowly demolished. The remaining walls stand in a clearing in the forest. Nobody goes there.",im:"Time-travel: Cistercian monks in white habits carrying books through these cloisters, 1350",t:"Walk up from Görden. The ruins are unfenced and free.",c:["free_museum"],r:"g",nn:"Marienbergkloster-Ruinen — Görden #59",ns:"Ruine eines Zisterzienserklosters auf einem bewaldeten Hügel über der Havel — gespenstisch und leer",nst:"1286 gegründet, während der Reformation aufgelöst und langsam abgebaut.",nt:"Von Görden hinaufgehen. Die Ruinen sind nicht eingezäunt und kostenlos."},
  {id:60,n:"Görden Forest Walks — Görden #60",a:"Görden",v:["nature","quiet","free"],d:22,s:"Pine and birch forest on the western edge of the city — vast, empty, free",st:"The Görden forest was the city\'s lungs during industrialisation. It still feels like genuine wilderness, unlike most urban forests. Mushrooms, deer tracks, no crowds.",im:"Time-travel: Brandenburg factory workers escaping into these woods on Sundays, 1900",t:"Enter at any point from Görden Straße. No trails marked — explore freely.",c:["local_only"],r:"g",nn:"Görden Waldwege — Görden #60",ns:"Kiefern- und Birkenwald am westlichen Stadtrand — weit, leer, kostenlos",nst:"Der Görden-Wald war in der Industrialisierung die Lunge der Stadt.",nt:"An beliebiger Stelle von der Görender Straße eintreten. Keine markierten Wege."},
  {id:61,n:"Havel River Promenade — Havel #61",a:"Havel",v:["nature","beautiful","local"],d:5,s:"Riverside walk with boats and old warehouses — the industrial face of the Havel",st:"The working river of Brandenburg is full of slow barges and rowing clubs. Walk the promenade south from the Jahrtausendbrücke and watch the old harbor life continue.",im:"Time-travel: steel barges being loaded at the Brandenburg docks, 1910",t:"Walk south from the Jahrtausendbrücke. Early morning for the mist.",c:["architecture"],r:"g",nn:"Havel-Uferpromenade — Havel #61",ns:"Uferweg mit Booten und alten Lagerhäusern — das industrielle Gesicht der Havel",nst:"Die arbeitende Havel von Brandenburg ist voller langsamer Kähne und Ruderclubs.",nt:"Vom Jahrtausendbrücke nach Süden laufen. Früh morgens für den Nebel."},
  {id:62,n:"St. Gotthardt Church — Neustadt #62",a:"Neustadt",v:["history","quiet"],d:53,s:"Romanesque brick church from 1150 — among the oldest buildings in the city",st:"The church predates the city charter itself. The apse is original 12th century work. The interior is a rare example of Romanesque brickwork in Brandenburg.",im:"Time-travel: the very first Christian congregation gathering in this church, 1150",t:"Open weekday mornings. Ring the bell if locked.",c:["history_big"],r:"g",nn:"St. Gotthardt-Kirche — Neustadt #62",ns:"Romanische Backsteinkirche aus dem Jahr 1150 — zu den ältesten Gebäuden der Stadt",nst:"Die Kirche ist älter als die Stadtrechte. Die Apsis ist original aus dem 12. Jahrhundert.",nt:"Werktags morgens geöffnet. Klingeln falls gesperrt."},
  {id:63,n:"Jacobskirche — Altstadt #63",a:"Altstadt",v:["history","beautiful"],d:15,s:"Large Gothic basilica in the heart of Altstadt — restored, free to enter",st:"The church dates to the 14th century and serves the oldest part of the city. The interior contains some original medieval fittings that survived all the fires.",im:"Time-travel: a medieval guild presenting its donation at this altar, 1380",t:"Open daily. Free.",c:["high_spots"],r:"g",nn:"Jacobskirche — Altstadt #63",ns:"Große gotische Basilika im Herzen der Altstadt — restauriert, freier Eintritt",nst:"Die Kirche datiert aus dem 14. Jahrhundert. Das Innere enthält originale mittelalterliche Ausstattung.",nt:"Täglich geöffnet. Kostenlos."},
  {id:64,n:"Altstadt Island Walk — Altstadt #64",a:"Altstadt",v:["history","local","quiet"],d:49,s:"The old town is an island — walk its entire perimeter along the water in 30 minutes",st:"Brandenburg\'s Altstadt sits on an island in the Havel. A full circuit of the island perimeter follows water on every side. Few tourists know to do this.",im:"Time-travel: looking at the island from the far bank in medieval times — a walled city on water",t:"Start at the Rathaus and walk the water\'s edge all the way around.",c:["parks"],r:"g",nn:"Altstadt-Inselbummel — Altstadt #64",ns:"Die Altstadt ist eine Insel — in 30 Minuten am Wasser rundherum gehen",nst:"Brandenburgs Altstadt liegt auf einer Insel in der Havel. Eine Umrundung folgt überall dem Wasser.",nt:"Am Rathaus beginnen und am Wasser entlanglaufen."},
  {id:65,n:"Packhofpark — Altstadt #65",a:"Altstadt",v:["nature","local","quiet"],d:32,s:"Small park where the old wharf stood — ducks, willows, locals with dogs",st:"The old Packhof warehouse complex was demolished. The park that replaced it sits on the Havel bank. Old locals remember the warehouses. Now: just water and silence.",im:"Time-travel: warehouse workers unloading barges at this dock in 1880",t:"Best in the evening. The light on the water is golden from 5pm.",c:["courtyards"],r:"g",nn:"Packhofpark — Altstadt #65",ns:"Kleiner Park, wo früher der Kai stand — Enten, Weiden, Einheimische mit Hunden",nst:"Die alten Packhof-Lagerhäuser wurden abgerissen. Der Park liegt am Havelfer.",nt:"Abends am besten. Das Licht auf dem Wasser ist ab 17 Uhr golden."},
  {id:66,n:"Plauer See Viewpoint — Havel #66",a:"Havel",v:["nature","beautiful","free"],d:26,s:"Edge of the Plauer See — Brandenburg\'s lake, swans, sailing boats, silence",st:"The Plauer See is the widest point of the Havel river system near Brandenburg. From the shore, the water stretches so far it looks like a coastal sea.",im:"Time-travel: Brandenburg fishermen working the Plauer See in wooden boats, 1700",t:"Walk or cycle from the city center. 20 minutes. Completely free.",c:["romantic_water"],r:"g",nn:"Plauer See — Havel #66",ns:"Ufer des Plauer Sees — Brandenburgs See, Schwäne, Segelboote, Stille",nst:"Der Plauer See ist die breiteste Stelle des Havelsystems bei Brandenburg.",nt:"Zu Fuß oder Rad aus der Stadtmitte. 20 Minuten. Völlig kostenlos."},
  {id:67,n:"Steintorturm — Altstadt #67",a:"Altstadt",v:["history","hidden"],d:22,s:"The stone gate tower — 1411, still standing with its original pointed cap",st:"The Steintorturm survived medieval wars, Reformation, industrialisation, and WWII. It stands at the edge of the old town, dark red brick, almost always unwatched.",im:"Time-travel: guards collecting city tolls at this gate in 1450",t:"Walk through the arch. Look up at the original ceiling.",c:["scary"],r:"g",nn:"Steintorturm — Altstadt #67",ns:"Der Steintorturm — 1411, noch stehend mit seiner originalen Spitze",nst:"Der Steintorturm überstand Kriege, Reformation, Industrialisierung und WWII. Dunkelroter Ziegel.",nt:"Durch den Torbogen gehen. An die Originaldecke hochschauen."},
  {id:68,n:"Old City Wall Remnants — Altstadt #68",a:"Altstadt",v:["history","hidden","quiet"],d:14,s:"Sections of the medieval wall still standing along the back streets of Altstadt",st:"Most of the wall was demolished for building materials in the 18th and 19th centuries. The sections that remain are hidden behind gardens and sheds on the island\'s south edge.",im:"Time-travel: the full city wall encircling the island in 1400",t:"Walk along Mühlendamm to find the best-preserved sections.",c:["famous_dead"],r:"g",nn:"Alte Stadtmauerreste — Altstadt #68",ns:"Abschnitte der mittelalterlichen Mauer stehen noch in den Hinterstraßen der Altstadt",nst:"Der größte Teil der Mauer wurde für Baumaterial im 18./19. Jh. abgerissen.",nt:"Entlang des Mühlendamms gehen für die am besten erhaltenen Abschnitte."},
  {id:69,n:"Romanesque Taufbecken — Dominsel #69",a:"Dominsel",v:["history","hidden","beautiful"],d:18,s:"A 12th century baptismal font still in use — one of the oldest objects in Brandenburg",st:"The granite basin in the cathedral was carved in the 12th century. It is still used for baptisms. You can touch it.",im:"Time-travel: the very first baptism performed in this basin, 1160",t:"Ask at the cathedral to see it. Always free.",c:["street_art"],r:"g",nn:"Romanisches Taufbecken — Dominsel #69",ns:"Ein Taufbecken aus dem 12. Jahrhundert, noch in Gebrauch — eines der ältesten Objekte Brandenburgs",nst:"Das Granitbecken im Dom wurde im 12. Jh. gehauen. Es wird noch für Taufen verwendet.",nt:"Am Dom fragen um es zu sehen. Immer kostenlos."},
  {id:70,n:"Brandenburg Cathedral Cloister — Dominsel #70",a:"Dominsel",v:["quiet","history","beautiful"],d:53,s:"The cathedral cloister — a rectangle of silence in the middle of a medieval island",st:"The Romanesque cloister adjoining the cathedral is one of the most peaceful spaces in Brandenburg. Stone arches, a small garden, and complete quiet even in summer.",im:"Time-travel: monks copying manuscripts in the scriptorium beside this cloister, 1300",t:"Enter through the cathedral. Free. Sit in the garden.",c:["abandoned"],r:"g",nn:"Domkreuzgang — Dominsel #70",ns:"Der Domkreuzgang — ein Rechteck der Stille inmitten einer mittelalterlichen Insel",nst:"Der romanische Kreuzgang neben dem Dom ist einer der friedlichsten Orte Brandenburgs.",nt:"Durch den Dom eintreten. Kostenlos. Im Garten sitzen."},
  {id:71,n:"Nikolaikirche Neustadt — Neustadt #71",a:"Neustadt",v:["history","quiet"],d:26,s:"Gothic church with one of the oldest surviving organs in northern Germany",st:"The Nikolaikirche dates from 1220. Its organ has historical stops from the 17th century. The church is rarely locked and almost never has visitors.",im:"Time-travel: organ music filling this empty space in 1650",t:"Push the door. Usually open. Free.",c:["free_museum"],r:"g",nn:"Nikolaikirche Neustadt — Neustadt #71",ns:"Gotische Kirche mit einer der ältesten erhaltenen Orgeln in Norddeutschland",nst:"Nikolaikirche stammt von 1220. Die Orgel hat historische Register aus dem 17. Jh.",nt:"An die Tür klopfen. Meistens offen. Kostenlos."},
  {id:72,n:"Brandenburg Steel Heritage — Havel #72",a:"Havel",v:["history","hidden","local"],d:11,s:"Traces of the GDR steel works that gave thousands their lives — fading but still there",st:"The Stahl Brandenburg was the largest GDR steel plant. Demolished after 1990. Only memorial plaques remain along the Havel. The old workers still sit at the river cafés nearby.",im:"Time-travel: thousands of workers pouring out of the steel plant at shift end, 1975",t:"The riverside memorial by the old plant site is free and uncrowded.",c:["local_only"],r:"g",nn:"Stahl Brandenburg Erbe — Havel #72",ns:"Spuren der DDR-Stahlwerke, die Tausenden ihr Leben gaben — verblassend aber noch da",nst:"Stahl Brandenburg war das größte DDR-Stahlwerk. 1990 abgerissen. Nur Gedenktafeln am Fluss.",nt:"Das Uferdenkmal am alten Werksgelände ist kostenlos und menschenleer."},
  {id:73,n:"Slawendorf Altstadt — Altstadt #73",a:"Altstadt",v:["history","hidden"],d:10,s:"The old Slavic settlement beneath the medieval German town — history below history",st:"Brandenburg was a Slavic Hevelli town before it was a German one. The streets of the Altstadt still follow the layout of the original 9th-century settlement. The layers are invisible but real.",im:"Time-travel: Slavic Hevelli people trading on the Havel island, 900 AD",t:"Walk the street grid of Altstadt knowing it\'s Slavic underneath.",c:["architecture"],r:"g",nn:"Slawisches Brandenburg — Altstadt #73",ns:"Die alte slawische Siedlung unter der mittelalterlichen deutschen Stadt — Geschichte unter Geschichte",nst:"Brandenburg war eine slawische Hevelli-Stadt bevor es eine deutsche war.",nt:"Das Straßennetz der Altstadt abgehen im Wissen, dass es slawisch darunter liegt."},
  {id:74,n:"Havel Sunrise Point — Havel #74",a:"Havel",v:["beautiful","quiet","nature"],d:29,s:"The best sunrise in Brandenburg — where the Havel bends and the mist rises in winter",st:"In autumn and winter, the Havel at dawn produces fog that clings to the river surface. The towers of the Altstadt emerge from it like a German Romantic painting.",im:"Time-travel: Caspar David Friedrich painting this exact scene — Havel mist, Gothic spires",t:"Come in November or December at 7am. Bring a warm drink.",c:["history_big"],r:"g",nn:"Havel-Sonnenaufgangspunkt — Havel #74",ns:"Der schönste Sonnenaufgang in Brandenburg — wo die Havel sich biegt und der Nebel steigt",nst:"Im Herbst und Winter erzeugt die Havel bei Tagesanbruch Nebel, der auf der Flussoberfläche klebt.",nt:"Im November/Dezember um 7 Uhr kommen. Warmes Getränk mitbringen."},
  {id:75,n:"Burghof Cathedral Yard — Dominsel #75",a:"Dominsel",v:["quiet","history","beautiful"],d:11,s:"The cathedral yard — five hundred years of graves, silence, and medieval light",st:"The graveyard surrounding the cathedral holds tombstones from the 14th century onwards. Local bishops, medieval merchants, forgotten names. Completely free to walk.",im:"Time-travel: a medieval bishop\'s funeral procession entering this yard, 1350",t:"Walk the full perimeter. Read the oldest inscriptions.",c:["high_spots"],r:"g",nn:"Domhof — Dominsel #75",ns:"Der Domhof — fünfhundert Jahre Gräber, Stille und mittelalterliches Licht",nst:"Der Friedhof rund um den Dom enthält Grabsteine ab dem 14. Jh. Bischöfe, Händler, vergessene Namen.",nt:"Den vollen Umfang abgehen. Die ältesten Inschriften lesen."},
  {id:76,n:"Dom St. Peter und Paul — Dominsel #76",a:"Dominsel",v:["history","beautiful","quiet"],d:27,s:"Thousand-year-old cathedral on its own island — the oldest bishop\'s seat in Prussia",st:"Founded in 948 by Emperor Otto I, this cathedral holds the oldest preserved Christian artworks in the Mark Brandenburg. Walk in from the street — it is always open.",im:"Time-travel: Bishop Thietmar conducting the first liturgy here in 948",t:"Free entry during the day. Cloister garden open too.",c:["parks"],r:"g",nn:"Dom St. Peter und Paul — Dominsel #76",ns:"Tausend Jahre alte Kathedrale auf ihrer eigenen Insel — der älteste Bischofssitz in Preußen",nst:"948 von Kaiser Otto I. gegründet. Enthält die ältesten erhaltenen christlichen Kunstwerke der Mark Brandenburg.",nt:"Tagsüber freier Eintritt. Kreuzgarten ebenfalls geöffnet."},
  {id:77,n:"Dominsel Island — Dominsel #77",a:"Dominsel",v:["history","quiet","beautiful"],d:27,s:"Cathedral island in the Havel — an entire island built for God alone, now mostly silent",st:"The island was reserved exclusively for the Church since the 10th century. Walk its perimeter in 10 minutes. The river on both sides, church towers above, tourists almost absent.",im:"Time-travel: monks carrying manuscripts between buildings on this island, 1200",t:"Cross the bridge at any time. The island perimeter walk is free.",c:["courtyards"],r:"g",nn:"Dominsel — Dominsel #77",ns:"Kathedralinsel in der Havel — eine ganze Insel nur für Gott gebaut, jetzt meist still",nst:"Die Insel war seit dem 10. Jahrhundert ausschließlich der Kirche vorbehalten.",nt:"Jederzeit die Brücke überqueren. Der Inselrundweg ist kostenlos."},
  {id:78,n:"Katharinenkirche — Neustadt #78",a:"Neustadt",v:["history","beautiful"],d:43,s:"14th century Gothic hall church — rebuilt after a devastating fire in 1945, still magnificent",st:"The church burned in April 1945. The rebuilt interior is spare and austere — you can see where the old ends and the new begins. The organ concerts on Fridays are free.",im:"Time-travel: the fire of April 1945 consuming the roof, locals watching helplessly",t:"Friday noon organ concerts, free. The steeple is the tallest in the city.",c:["romantic_water"],r:"g",nn:"Katharinenkirche — Neustadt #78",ns:"Gotische Hallenkirche aus dem 14. Jahrhundert — nach einem Brand 1945 wiederaufgebaut, noch immer großartig",nst:"Die Kirche brannte im April 1945. Das wiederaufgebaute Innere ist schlicht und streng.",nt:"Freitags Mittagsorgel, kostenlos. Der Turm ist der höchste der Stadt."},

  {id:84,n:"Marienberg Monastery Ruins — Görden #84",a:"Görden",v:["abandoned","hidden","history"],d:12,s:"Ruined Cistercian monastery on a forested hill above the Havel — haunting and empty",st:"Founded in 1286, the monastery was dissolved during the Reformation and slowly demolished. The remaining walls stand in a clearing in the forest. Nobody goes there.",im:"Time-travel: Cistercian monks in white habits carrying books through these cloisters, 1350",t:"Walk up from Görden. The ruins are unfenced and free.",c:["local_only"],r:"g",nn:"Marienbergkloster-Ruinen — Görden #84",ns:"Ruine eines Zisterzienserklosters auf einem bewaldeten Hügel über der Havel — gespenstisch und leer",nst:"1286 gegründet, während der Reformation aufgelöst und langsam abgebaut.",nt:"Von Görden hinaufgehen. Die Ruinen sind nicht eingezäunt und kostenlos."},
  {id:85,n:"Görden Forest Walks — Görden #85",a:"Görden",v:["nature","quiet","free"],d:29,s:"Pine and birch forest on the western edge of the city — vast, empty, free",st:"The Görden forest was the city\'s lungs during industrialisation. It still feels like genuine wilderness, unlike most urban forests. Mushrooms, deer tracks, no crowds.",im:"Time-travel: Brandenburg factory workers escaping into these woods on Sundays, 1900",t:"Enter at any point from Görden Straße. No trails marked — explore freely.",c:["architecture"],r:"g",nn:"Görden Waldwege — Görden #85",ns:"Kiefern- und Birkenwald am westlichen Stadtrand — weit, leer, kostenlos",nst:"Der Görden-Wald war in der Industrialisierung die Lunge der Stadt.",nt:"An beliebiger Stelle von der Görender Straße eintreten. Keine markierten Wege."},
  {id:86,n:"Havel River Promenade — Havel #86",a:"Havel",v:["nature","beautiful","local"],d:10,s:"Riverside walk with boats and old warehouses — the industrial face of the Havel",st:"The working river of Brandenburg is full of slow barges and rowing clubs. Walk the promenade south from the Jahrtausendbrücke and watch the old harbor life continue.",im:"Time-travel: steel barges being loaded at the Brandenburg docks, 1910",t:"Walk south from the Jahrtausendbrücke. Early morning for the mist.",c:["history_big"],r:"g",nn:"Havel-Uferpromenade — Havel #86",ns:"Uferweg mit Booten und alten Lagerhäusern — das industrielle Gesicht der Havel",nst:"Die arbeitende Havel von Brandenburg ist voller langsamer Kähne und Ruderclubs.",nt:"Vom Jahrtausendbrücke nach Süden laufen. Früh morgens für den Nebel."},
  {id:87,n:"St. Gotthardt Church — Neustadt #87",a:"Neustadt",v:["history","quiet"],d:40,s:"Romanesque brick church from 1150 — among the oldest buildings in the city",st:"The church predates the city charter itself. The apse is original 12th century work. The interior is a rare example of Romanesque brickwork in Brandenburg.",im:"Time-travel: the very first Christian congregation gathering in this church, 1150",t:"Open weekday mornings. Ring the bell if locked.",c:["high_spots"],r:"g",nn:"St. Gotthardt-Kirche — Neustadt #87",ns:"Romanische Backsteinkirche aus dem Jahr 1150 — zu den ältesten Gebäuden der Stadt",nst:"Die Kirche ist älter als die Stadtrechte. Die Apsis ist original aus dem 12. Jahrhundert.",nt:"Werktags morgens geöffnet. Klingeln falls gesperrt."},
  {id:88,n:"Jacobskirche — Altstadt #88",a:"Altstadt",v:["history","beautiful"],d:23,s:"Large Gothic basilica in the heart of Altstadt — restored, free to enter",st:"The church dates to the 14th century and serves the oldest part of the city. The interior contains some original medieval fittings that survived all the fires.",im:"Time-travel: a medieval guild presenting its donation at this altar, 1380",t:"Open daily. Free.",c:["parks"],r:"g",nn:"Jacobskirche — Altstadt #88",ns:"Große gotische Basilika im Herzen der Altstadt — restauriert, freier Eintritt",nst:"Die Kirche datiert aus dem 14. Jahrhundert. Das Innere enthält originale mittelalterliche Ausstattung.",nt:"Täglich geöffnet. Kostenlos."},
  {id:89,n:"Altstadt Island Walk — Altstadt #89",a:"Altstadt",v:["history","local","quiet"],d:45,s:"The old town is an island — walk its entire perimeter along the water in 30 minutes",st:"Brandenburg\'s Altstadt sits on an island in the Havel. A full circuit of the island perimeter follows water on every side. Few tourists know to do this.",im:"Time-travel: looking at the island from the far bank in medieval times — a walled city on water",t:"Start at the Rathaus and walk the water\'s edge all the way around.",c:["courtyards"],r:"g",nn:"Altstadt-Inselbummel — Altstadt #89",ns:"Die Altstadt ist eine Insel — in 30 Minuten am Wasser rundherum gehen",nst:"Brandenburgs Altstadt liegt auf einer Insel in der Havel. Eine Umrundung folgt überall dem Wasser.",nt:"Am Rathaus beginnen und am Wasser entlanglaufen."},
  {id:90,n:"Packhofpark — Altstadt #90",a:"Altstadt",v:["nature","local","quiet"],d:44,s:"Small park where the old wharf stood — ducks, willows, locals with dogs",st:"The old Packhof warehouse complex was demolished. The park that replaced it sits on the Havel bank. Old locals remember the warehouses. Now: just water and silence.",im:"Time-travel: warehouse workers unloading barges at this dock in 1880",t:"Best in the evening. The light on the water is golden from 5pm.",c:["romantic_water"],r:"g",nn:"Packhofpark — Altstadt #90",ns:"Kleiner Park, wo früher der Kai stand — Enten, Weiden, Einheimische mit Hunden",nst:"Die alten Packhof-Lagerhäuser wurden abgerissen. Der Park liegt am Havelfer.",nt:"Abends am besten. Das Licht auf dem Wasser ist ab 17 Uhr golden."},
  {id:91,n:"Plauer See Viewpoint — Havel #91",a:"Havel",v:["nature","beautiful","free"],d:28,s:"Edge of the Plauer See — Brandenburg\'s lake, swans, sailing boats, silence",st:"The Plauer See is the widest point of the Havel river system near Brandenburg. From the shore, the water stretches so far it looks like a coastal sea.",im:"Time-travel: Brandenburg fishermen working the Plauer See in wooden boats, 1700",t:"Walk or cycle from the city center. 20 minutes. Completely free.",c:["scary"],r:"g",nn:"Plauer See — Havel #91",ns:"Ufer des Plauer Sees — Brandenburgs See, Schwäne, Segelboote, Stille",nst:"Der Plauer See ist die breiteste Stelle des Havelsystems bei Brandenburg.",nt:"Zu Fuß oder Rad aus der Stadtmitte. 20 Minuten. Völlig kostenlos."},
  {id:92,n:"Steintorturm — Altstadt #92",a:"Altstadt",v:["history","hidden"],d:41,s:"The stone gate tower — 1411, still standing with its original pointed cap",st:"The Steintorturm survived medieval wars, Reformation, industrialisation, and WWII. It stands at the edge of the old town, dark red brick, almost always unwatched.",im:"Time-travel: guards collecting city tolls at this gate in 1450",t:"Walk through the arch. Look up at the original ceiling.",c:["famous_dead"],r:"g",nn:"Steintorturm — Altstadt #92",ns:"Der Steintorturm — 1411, noch stehend mit seiner originalen Spitze",nst:"Der Steintorturm überstand Kriege, Reformation, Industrialisierung und WWII. Dunkelroter Ziegel.",nt:"Durch den Torbogen gehen. An die Originaldecke hochschauen."},
  {id:93,n:"Old City Wall Remnants — Altstadt #93",a:"Altstadt",v:["history","hidden","quiet"],d:17,s:"Sections of the medieval wall still standing along the back streets of Altstadt",st:"Most of the wall was demolished for building materials in the 18th and 19th centuries. The sections that remain are hidden behind gardens and sheds on the island\'s south edge.",im:"Time-travel: the full city wall encircling the island in 1400",t:"Walk along Mühlendamm to find the best-preserved sections.",c:["street_art"],r:"g",nn:"Alte Stadtmauerreste — Altstadt #93",ns:"Abschnitte der mittelalterlichen Mauer stehen noch in den Hinterstraßen der Altstadt",nst:"Der größte Teil der Mauer wurde für Baumaterial im 18./19. Jh. abgerissen.",nt:"Entlang des Mühlendamms gehen für die am besten erhaltenen Abschnitte."},
  {id:94,n:"Romanesque Taufbecken — Dominsel #94",a:"Dominsel",v:["history","hidden","beautiful"],d:50,s:"A 12th century baptismal font still in use — one of the oldest objects in Brandenburg",st:"The granite basin in the cathedral was carved in the 12th century. It is still used for baptisms. You can touch it.",im:"Time-travel: the very first baptism performed in this basin, 1160",t:"Ask at the cathedral to see it. Always free.",c:["abandoned"],r:"g",nn:"Romanisches Taufbecken — Dominsel #94",ns:"Ein Taufbecken aus dem 12. Jahrhundert, noch in Gebrauch — eines der ältesten Objekte Brandenburgs",nst:"Das Granitbecken im Dom wurde im 12. Jh. gehauen. Es wird noch für Taufen verwendet.",nt:"Am Dom fragen um es zu sehen. Immer kostenlos."},
  {id:95,n:"Brandenburg Cathedral Cloister — Dominsel #95",a:"Dominsel",v:["quiet","history","beautiful"],d:9,s:"The cathedral cloister — a rectangle of silence in the middle of a medieval island",st:"The Romanesque cloister adjoining the cathedral is one of the most peaceful spaces in Brandenburg. Stone arches, a small garden, and complete quiet even in summer.",im:"Time-travel: monks copying manuscripts in the scriptorium beside this cloister, 1300",t:"Enter through the cathedral. Free. Sit in the garden.",c:["free_museum"],r:"g",nn:"Domkreuzgang — Dominsel #95",ns:"Der Domkreuzgang — ein Rechteck der Stille inmitten einer mittelalterlichen Insel",nst:"Der romanische Kreuzgang neben dem Dom ist einer der friedlichsten Orte Brandenburgs.",nt:"Durch den Dom eintreten. Kostenlos. Im Garten sitzen."},
  {id:96,n:"Nikolaikirche Neustadt — Neustadt #96",a:"Neustadt",v:["history","quiet"],d:7,s:"Gothic church with one of the oldest surviving organs in northern Germany",st:"The Nikolaikirche dates from 1220. Its organ has historical stops from the 17th century. The church is rarely locked and almost never has visitors.",im:"Time-travel: organ music filling this empty space in 1650",t:"Push the door. Usually open. Free.",c:["local_only"],r:"g",nn:"Nikolaikirche Neustadt — Neustadt #96",ns:"Gotische Kirche mit einer der ältesten erhaltenen Orgeln in Norddeutschland",nst:"Nikolaikirche stammt von 1220. Die Orgel hat historische Register aus dem 17. Jh.",nt:"An die Tür klopfen. Meistens offen. Kostenlos."},
  {id:97,n:"Brandenburg Steel Heritage — Havel #97",a:"Havel",v:["history","hidden","local"],d:47,s:"Traces of the GDR steel works that gave thousands their lives — fading but still there",st:"The Stahl Brandenburg was the largest GDR steel plant. Demolished after 1990. Only memorial plaques remain along the Havel. The old workers still sit at the river cafés nearby.",im:"Time-travel: thousands of workers pouring out of the steel plant at shift end, 1975",t:"The riverside memorial by the old plant site is free and uncrowded.",c:["architecture"],r:"g",nn:"Stahl Brandenburg Erbe — Havel #97",ns:"Spuren der DDR-Stahlwerke, die Tausenden ihr Leben gaben — verblassend aber noch da",nst:"Stahl Brandenburg war das größte DDR-Stahlwerk. 1990 abgerissen. Nur Gedenktafeln am Fluss.",nt:"Das Uferdenkmal am alten Werksgelände ist kostenlos und menschenleer."},
  {id:98,n:"Slawendorf Altstadt — Altstadt #98",a:"Altstadt",v:["history","hidden"],d:19,s:"The old Slavic settlement beneath the medieval German town — history below history",st:"Brandenburg was a Slavic Hevelli town before it was a German one. The streets of the Altstadt still follow the layout of the original 9th-century settlement. The layers are invisible but real.",im:"Time-travel: Slavic Hevelli people trading on the Havel island, 900 AD",t:"Walk the street grid of Altstadt knowing it\'s Slavic underneath.",c:["history_big"],r:"g",nn:"Slawisches Brandenburg — Altstadt #98",ns:"Die alte slawische Siedlung unter der mittelalterlichen deutschen Stadt — Geschichte unter Geschichte",nst:"Brandenburg war eine slawische Hevelli-Stadt bevor es eine deutsche war.",nt:"Das Straßennetz der Altstadt abgehen im Wissen, dass es slawisch darunter liegt."},
  {id:99,n:"Havel Sunrise Point — Havel #99",a:"Havel",v:["beautiful","quiet","nature"],d:54,s:"The best sunrise in Brandenburg — where the Havel bends and the mist rises in winter",st:"In autumn and winter, the Havel at dawn produces fog that clings to the river surface. The towers of the Altstadt emerge from it like a German Romantic painting.",im:"Time-travel: Caspar David Friedrich painting this exact scene — Havel mist, Gothic spires",t:"Come in November or December at 7am. Bring a warm drink.",c:["high_spots"],r:"g",nn:"Havel-Sonnenaufgangspunkt — Havel #99",ns:"Der schönste Sonnenaufgang in Brandenburg — wo die Havel sich biegt und der Nebel steigt",nst:"Im Herbst und Winter erzeugt die Havel bei Tagesanbruch Nebel, der auf der Flussoberfläche klebt.",nt:"Im November/Dezember um 7 Uhr kommen. Warmes Getränk mitbringen."},
  {id:100,n:"Burghof Cathedral Yard — Dominsel #100",a:"Dominsel",v:["quiet","history","beautiful"],d:23,s:"The cathedral yard — five hundred years of graves, silence, and medieval light",st:"The graveyard surrounding the cathedral holds tombstones from the 14th century onwards. Local bishops, medieval merchants, forgotten names. Completely free to walk.",im:"Time-travel: a medieval bishop\'s funeral procession entering this yard, 1350",t:"Walk the full perimeter. Read the oldest inscriptions.",c:["parks"],r:"g",nn:"Domhof — Dominsel #100",ns:"Der Domhof — fünfhundert Jahre Gräber, Stille und mittelalterliches Licht",nst:"Der Friedhof rund um den Dom enthält Grabsteine ab dem 14. Jh. Bischöfe, Händler, vergessene Namen.",nt:"Den vollen Umfang abgehen. Die ältesten Inschriften lesen."},
  {id:101,n:"Dom St. Peter und Paul — Dominsel #101",a:"Dominsel",v:["history","beautiful","quiet"],d:10,s:"Thousand-year-old cathedral on its own island — the oldest bishop\'s seat in Prussia",st:"Founded in 948 by Emperor Otto I, this cathedral holds the oldest preserved Christian artworks in the Mark Brandenburg. Walk in from the street — it is always open.",im:"Time-travel: Bishop Thietmar conducting the first liturgy here in 948",t:"Free entry during the day. Cloister garden open too.",c:["courtyards"],r:"g",nn:"Dom St. Peter und Paul — Dominsel #101",ns:"Tausend Jahre alte Kathedrale auf ihrer eigenen Insel — der älteste Bischofssitz in Preußen",nst:"948 von Kaiser Otto I. gegründet. Enthält die ältesten erhaltenen christlichen Kunstwerke der Mark Brandenburg.",nt:"Tagsüber freier Eintritt. Kreuzgarten ebenfalls geöffnet."},
  {id:102,n:"Dominsel Island — Dominsel #102",a:"Dominsel",v:["history","quiet","beautiful"],d:19,s:"Cathedral island in the Havel — an entire island built for God alone, now mostly silent",st:"The island was reserved exclusively for the Church since the 10th century. Walk its perimeter in 10 minutes. The river on both sides, church towers above, tourists almost absent.",im:"Time-travel: monks carrying manuscripts between buildings on this island, 1200",t:"Cross the bridge at any time. The island perimeter walk is free.",c:["romantic_water"],r:"g",nn:"Dominsel — Dominsel #102",ns:"Kathedralinsel in der Havel — eine ganze Insel nur für Gott gebaut, jetzt meist still",nst:"Die Insel war seit dem 10. Jahrhundert ausschließlich der Kirche vorbehalten.",nt:"Jederzeit die Brücke überqueren. Der Inselrundweg ist kostenlos."},
  {id:103,n:"Katharinenkirche — Neustadt #103",a:"Neustadt",v:["history","beautiful"],d:11,s:"14th century Gothic hall church — rebuilt after a devastating fire in 1945, still magnificent",st:"The church burned in April 1945. The rebuilt interior is spare and austere — you can see where the old ends and the new begins. The organ concerts on Fridays are free.",im:"Time-travel: the fire of April 1945 consuming the roof, locals watching helplessly",t:"Friday noon organ concerts, free. The steeple is the tallest in the city.",c:["scary"],r:"g",nn:"Katharinenkirche — Neustadt #103",ns:"Gotische Hallenkirche aus dem 14. Jahrhundert — nach einem Brand 1945 wiederaufgebaut, noch immer großartig",nst:"Die Kirche brannte im April 1945. Das wiederaufgebaute Innere ist schlicht und streng.",nt:"Freitags Mittagsorgel, kostenlos. Der Turm ist der höchste der Stadt."},
  {id:104,n:"Rathaus & Rolandsäule — Altstadt #104",a:"Altstadt",v:["history","local","beautiful"],d:29,s:"Medieval town hall with a Roland statue — Roland guaranteed the city\'s trading rights",st:"The 1474 Roland statue guaranteed that Brandenburg had imperial market rights independent of feudal lords. Rolands were symbols of civic freedom. This one is original.",im:"Time-travel: merchants trading under Roland\'s protection in the medieval market, 1500",t:"The Roland can be touched. The town hall is open on weekdays.",c:["famous_dead"],r:"g",nn:"Rathaus & Rolandsäule — Altstadt #104",ns:"Mittelalterliches Rathaus mit Rolandsäule — Roland garantierte der Stadt ihre Handelsrechte",nst:"Die Rolandsäule von 1474 garantierte, dass Brandenburg kaiserliche Marktrechte unabhängig von Feudalherren hatte.",nt:"Roland kann angefasst werden. Das Rathaus öffnet werktags."},
  {id:105,n:"Jahrtausendbrücke — Havel #105",a:"Havel",v:["beautiful","local","nature"],d:22,s:"The bridge of the Millennium — sweeping Havel river views in both directions",st:"Built in 1912, the bridge spans the Havel at its widest point through the city. In the morning mist, Brandenburg\'s towers and spires frame the river from here like a painting.",im:"Time-travel: the bridge opening in 1912, crowds crossing for the first time",t:"Dawn is spectacular. Walk to the centre and look both directions.",c:["street_art"],r:"g",nn:"Jahrtausendbrücke — Havel #105",ns:"Die Jahrtausendbrücke — schwungvoller Blick auf die Havel in beide Richtungen",nst:"1912 erbaut. Brandenburgs Türme und Spitzen rahmen den Fluss wie ein Gemälde.",nt:"Morgendämmerung ist spektakulär. In die Mitte gehen und in beide Richtungen blicken."}

<p className="text-xs mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p></div>

<h1 className="text-2xl font-black" style={{color:"#1a1a2e"}}>{lang==="native"&&p.nn?p.nn:p.n}</h1>

<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</div></div>);

const MissionCard=({m,idx})=>(

const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
