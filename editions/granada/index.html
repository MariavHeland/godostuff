  {id:1,n:"Albaicín Moorish Quarter Maze — Albaicín",a:"Albaicín",v:["history", "beautiful"],d:1,s:"A 1,000-year-old Moorish neighborhood where narrow streets climb steeply and every corner opens to new views.",st:"You climb stairs barely shoulder-wide. Houses have red tile roofs. Geraniums spill from balconies. It\'s sensory overload—colors, smells, textures. Medieval Granada is unchanged, just lived-in.",im:"It\'s 1500. Muslims still lived here but Spain was closing in. Now Christians visit their neighborhood. Some things stay the same.",t:"You climb stairs barely shoulder-wide. Houses have red tile roofs. Geraniums spill from balconies. It\'s sensory overload—colors, smells, textures. Medieval Granada is unchanged, just lived-in.\",im:\"It\'s 1500. Muslims still lived here but Spain was closing in. Now Christians visit their neighborhood. Some things stay the same.\",t:\"Free. Get lost intentionally. Go early morning (7-9am) before tourists. Buy coffee from a small cafe. Chat with residents. This is soul.",c:["history_big", "beautiful"],r:"g",nn:"Albaicín Moorish Quarter Maze",ns:"Albaicín Moorish Quarter Maze es tesoro español.",nst:"Albaicín Moorish Quarter Maze respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:2,n:"Mirador San Nicolás Sunset — Albaicín",a:"Albaicín",v:["beautiful", "quiet"],d:2,s:"A viewpoint where everyone comes for sunset but the magic is real—Alhambra glows pink, Sierra Nevada turns purple, the moment is holy.",st:"You stand on a plaza. The Alhambra rises opposite. As sun sets, the fortress turns pink, then gold, then purple. Everyone watches silently. It\'s a religious moment without religion.",im:"It\'s 700 years. The Alhambra has been burning with sunset light for centuries. Now you see it. The light never changes. You do.",t:"You stand on a plaza. The Alhambra rises opposite. As sun sets, the fortress turns pink, then gold, then purple. Everyone watches silently. It\'s a religious moment without religion.\",im:\"It\'s 700 years. The Alhambra has been burning with sunset light for centuries. Now you see it. The light never changes. You do.\",t:\"Free. Go 30 minutes before sunset. Find a spot (they\'re everywhere). Bring a date or a friend. Bring silence. Stay until dark. This is Granada\'s reason for existing.",c:["beautiful", "high_spots"],r:"g",nn:"Mirador San Nicolás Sunset",ns:"Mirador San Nicolás Sunset es tesoro español.",nst:"Mirador San Nicolás Sunset respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:3,n:"Sacromonte Cave Houses and Flamenco — Sacromonte",a:"Sacromonte",v:["weird", "night"],d:3,s:"A hillside neighborhood where people literally live in caves—add live flamenco and gypsy culture still thriving.",st:"The houses are carved into the hill. Whitewashed fronts hide deep caves. People actually live here, not as tourists but as residents. Flamenco happens nightly. It\'s authentic desperation and joy mixed.",im:"It\'s 1600. Gitanos (Roma) settle here because no one else wanted the caves. Four centuries later, they\'re still here, still dancing.",t:"The houses are carved into the hill. Whitewashed fronts hide deep caves. People actually live here, not as tourists but as residents. Flamenco happens nightly. It\'s authentic desperation and joy mixed.\",im:\"It\'s 1600. Gitanos (Roma) settle here because no one else wanted the caves. Four centuries later, they\'re still here, still dancing.\",t:\"Free walking. Flamenco shows €20-40, usually starts 10pm. It\'s touristy but real—the dancers are Gitano. Go late (after 11pm) for authenticity. It\'s sketchy at night, go with people.",c:["weird", "night"],r:"y",nn:"Sacromonte Cave Houses and Flamenco",ns:"Sacromonte Cave Houses and Flamenco es tesoro español.",nst:"Sacromonte Cave Houses and Flamenco respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:4,n:"Carrera del Darro River Walk — Albaicín",a:"Albaicín",v:["beautiful", "romantic_water"],d:4,s:"A cobblestone path following a river through the old quarter—perfect walk where water and history are inseparable.",st:"The river flows beside you. Bridges cross it. Cafes sit on the banks. Mountains in distance. It\'s European perfection—water, history, beauty coexisting.",im:"It\'s 700 years. The river has been flowing through Granada forever. People have walked beside it forever.",t:"The river flows beside you. Bridges cross it. Cafes sit on the banks. Mountains in distance. It\'s European perfection—water, history, beauty coexisting.\",im:\"It\'s 700 years. The river has been flowing through Granada forever. People have walked beside it forever.\",t:\"Free. Start anywhere, follow the water. It\'s mostly flat. Takes 90 minutes to walk the full length. Stop at cafes. Swim if you want. It\'s life.",c:["romantic_water", "beautiful"],r:"g",nn:"Carrera del Darro River Walk",ns:"Carrera del Darro River Walk es tesoro español.",nst:"Carrera del Darro River Walk respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:5,n:"Realejo Jewish Quarter — Realejo",a:"Realejo",v:["history", "beautiful"],d:5,s:"Where Jews lived for 500 years before expulsion in 1492—now it\'s artsy, bohemian, reclaiming that history.",st:"The streets are narrow, hip. Galleries, vintage shops, bars. A plague marks where a synagogue was. The neighborhood doesn\'t dwell on loss—it celebrates culture. It\'s defiant joy.",im:"It\'s 1490. Jews live in this quarter. Then they\'re expelled. Spain loses them. Now Granada remembers them in coffee shops and galleries.",t:"The streets are narrow, hip. Galleries, vintage shops, bars. A plague marks where a synagogue was. The neighborhood doesn\'t dwell on loss—it celebrates culture. It\'s defiant joy.\",im:\"It\'s 1490. Jews live in this quarter. Then they\'re expelled. Spain loses them. Now Granada remembers them in coffee shops and galleries.\",t:\"Free walking. Galleries and museums €5-10. Cafes €3-8. Spend a half day. Eat at a small restaurant (€15-30). The energy is creative, queer-friendly, alive.",c:["history_big", "local_only"],r:"g",nn:"Realejo Jewish Quarter",ns:"Realejo Jewish Quarter es tesoro español.",nst:"Realejo Jewish Quarter respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:6,n:"Free Tapas Culture — Centro",a:"Centro",v:["local", "beautiful"],d:6,s:"Order a drink, get free food with it—Granada\'s gift to travelers where happiness is a small beer and a free bocadillo.",st:"You order a small beer (€2). The bar gives you a small plate of jamón, cheese, calamari. You order another drink. Another plate. It\'s the opposite of expensive tourism. It\'s abundance.",im:"It\'s 1980. A bar decides to give free food with drinks. It became culture. Now every bar does it. Generosity became tradition.",t:"You order a small beer (€2). The bar gives you a small plate of jamón, cheese, calamari. You order another drink. Another plate. It\'s the opposite of expensive tourism. It\'s abundance.\",im:\"It\'s 1980. A bar decides to give free food with drinks. It became culture. Now every bar does it. Generosity became tradition.\",t:\"Drinks €2-4 with free food. Go to any bar off the main tourist streets. Lunch around 2pm or dinner after 8pm. Budget €10-20 for a full meal of multiple drinks.",c:["local_only", "free_museum"],r:"g",nn:"Free Tapas Culture",ns:"Free Tapas Culture es tesoro español.",nst:"Free Tapas Culture respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:7,n:"Carmen Gardens Secret Patios — Albaicín",a:"Albaicín",v:["beautiful", "hidden"],d:7,s:"Private gardens behind anonymous doors—courtyards filled with flowers, fountains, silence. Some welcome visitors. Some guard secrets.",st:"You pass a door on a street. Behind it, a paradise. A courtyard with a fountain. Flowers everywhere. Someone\'s garden, but open to strangers on certain afternoons. It\'s generosity made visible.",im:"It\'s 500 years. A family built a garden behind a door. Four centuries later, strangers enjoy it. Time doesn\'t erase beauty.",t:"You pass a door on a street. Behind it, a paradise. A courtyard with a fountain. Flowers everywhere. Someone\'s garden, but open to strangers on certain afternoons. It\'s generosity made visible.\",im:\"It\'s 500 years. A family built a garden behind a door. Four centuries later, strangers enjoy it. Time doesn\'t erase beauty.\",t:\"Some carmens charge €5-10 entry, some are free (but hours are limited). Ask locals which are open. Go in afternoon. It\'s worth the search. They\'re labyrinthine little heavens.",c:["beautiful", "hidden"],r:"g",nn:"Carmen Gardens Secret Patios",ns:"Carmen Gardens Secret Patios es tesoro español.",nst:"Carmen Gardens Secret Patios respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:8,n:"Huerta de San Vicente Lorca\'s House Museum — South",a:"South",v:["history", "hidden"],d:8,s:"The house where poet Garcia Lorca spent summers—preserved exactly, including his bedroom, his desk, his last safe space before execution.",st:"The house is modest, beautiful. His room is simple. You see how he lived. Then you remember he was murdered by fascists. The space becomes sacred. Silence fills it.",im:"It\'s 1936. Lorca is hiding. Then he\'s found and killed. The house survives. Now it whispers.",t:"The house is modest, beautiful. His room is simple. You see how he lived. Then you remember he was murdered by fascists. The space becomes sacred. Silence fills it.\",im:\"It\'s 1936. Lorca is hiding. Then he\'s found and killed. The house survives. Now it whispers.\",t:\"€5 entry. Guided tours in Spanish/English, €10 total. South of the center (bus 3 or 4). Takes 60-90 minutes. Go alone or with someone you trust. This is meditative, not touristy.",c:["history_big", "hidden"],r:"g",nn:"Huerta de San Vicente Lorca\'s House Museum",ns:"Huerta de San Vicente Lorca\'s House Museum es tesoro español.",nst:"Huerta de San Vicente Lorca\'s House Museum respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:9,n:"Paseo de los Tristes Evening Walk — Albaicín",a:"Albaicín",v:["beautiful", "night"],d:9,s:"A pedestrian promenade where locals stroll at dusk—the Alhambra glows above, cafes fill, everyone\'s beautiful and young.",st:"The paseo flows with people. It\'s social, alive, flirtatious. The Alhambra provides a backdrop. Everyone\'s promenading like they\'re in a 1950s film. It\'s Spain at its most romantic.",im:"It\'s any evening. Same paseo. Same ritual. Same human need to be seen and to see.",t:"The paseo flows with people. It\'s social, alive, flirtatious. The Alhambra provides a backdrop. Everyone\'s promenading like they\'re in a 1950s film. It\'s Spain at its most romantic.\",im:\"It\'s any evening. Same paseo. Same ritual. Same human need to be seen and to see.\",t:\"Free walk. Cafes along the way (€3-10). Best 7-9pm when light is gold and crowds are perfect. Join the paseo. Be part of the tradition.",c:["night", "beautiful"],r:"g",nn:"Paseo de los Tristes Evening Walk",ns:"Paseo de los Tristes Evening Walk es tesoro español.",nst:"Paseo de los Tristes Evening Walk respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:10,n:"Alhambra Exterior Free Areas — Alhambra",a:"Alhambra",v:["history", "beautiful"],d:10,s:"Most of the Alhambra palace grounds are free to enter—the exterior is stunning and often overlooked because tourists rush to pay for interiors.",st:"The buildings from outside are magnificent. The gardens are real. You walk among 700-year-old stones without crowds or queues. The view toward the city is perfect. The exterior IS the palace.",im:"It\'s 1350. A sultan walks these paths. Now you walk them. The stones remember.",t:"The buildings from outside are magnificent. The gardens are real. You walk among 700-year-old stones without crowds or queues. The view toward the city is perfect. The exterior IS the palace.\",im:\"It\'s 1350. A sultan walks these paths. Now you walk them. The stones remember.\",t:\"Free entry to exterior/gardens. €15-20 for interior palace (book ahead). Go early morning for light and solitude. The free areas take 90 minutes.",c:["history_big", "beautiful"],r:"g",nn:"Alhambra Exterior Free Areas",ns:"Alhambra Exterior Free Areas es tesoro español.",nst:"Alhambra Exterior Free Areas respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:11,n:"Generalife Gardens Cypress Walkways — Alhambra",a:"Alhambra",v:["beautiful", "quiet"],d:11,s:"The sister palace of Alhambra with gardens designed for seclusion and beauty—water channels, cypress, silence.",st:"The gardens are designed for meditation. Water flows down slopes. Cypress stand like guards. You walk in geometric quiet. It\'s the opposite of busy—it\'s intentional calm.",im:"It\'s 1300. A sultan wants a garden for thinking. They design this. Now you think in his thinking space.",t:"The gardens are designed for meditation. Water flows down slopes. Cypress stand like guards. You walk in geometric quiet. It\'s the opposite of busy—it\'s intentional calm.\",im:\"It\'s 1300. A sultan wants a garden for thinking. They design this. Now you think in his thinking space.\",t:\"€7-10 entry (or €15 with palace entry). It\'s on the same grounds. Takes 90 minutes to slowly walk. Go late afternoon when crowds thin and light turns gold.",c:["beautiful", "quiet"],r:"g",nn:"Generalife Gardens Cypress Walkways",ns:"Generalife Gardens Cypress Walkways es tesoro español.",nst:"Generalife Gardens Cypress Walkways respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:12,n:"Mirador de San Miguel Alto Highest Point — Albaicín",a:"Albaicín",v:["high_spots", "beautiful"],d:12,s:"The highest viewpoint in the Albaicín—more intense than San Nicolás, less crowded, straight-down view of the city below.",st:"You\'re above everything. The Albaicín spreads below like a map. The Alhambra is visible. The mountains frame everything. It\'s disorienting and perfect.",im:"It\'s 500 years. The view has been this good forever. Now you see it.",t:"You\'re above everything. The Albaicín spreads below like a map. The Alhambra is visible. The mountains frame everything. It\'s disorienting and perfect.\",im:\"It\'s 500 years. The view has been this good forever. Now you see it.\",t:\"Free. It\'s a 20-minute hike from the center. Steep. Brings water. Go early morning or late afternoon. The crowds at San Nicolás miss this one.",c:["high_spots", "beautiful"],r:"g",nn:"Mirador de San Miguel Alto Highest Point",ns:"Mirador de San Miguel Alto Highest Point es tesoro español.",nst:"Mirador de San Miguel Alto Highest Point respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:13,n:"University Quarter Nightlife — Universidad",a:"Universidad",v:["night", "local"],d:13,s:"Where students party—bars packed with locals aged 18-30, everyone loud and joyful and purely Spanish.",st:"The streets fill with students. Bars overflow. No tourists, all locals. Spanish is the only language. It\'s young, fun, un-self-conscious. It\'s how Granada actually lives.",im:"It\'s any Thursday night. Same students, same bars, same magic of youth and freedom.",t:"The streets fill with students. Bars overflow. No tourists, all locals. Spanish is the only language. It\'s young, fun, un-self-conscious. It\'s how Granada actually lives.\",im:\"It\'s any Thursday night. Same students, same bars, same magic of youth and freedom.\",t:\"Drinks €2-4. Tapas free. Go after 11pm. Go with people. It\'s more fun in groups. Budget €15-30 for a full night. It\'s the real Granada nightlife.",c:["night", "local_only"],r:"g",nn:"University Quarter Nightlife",ns:"University Quarter Nightlife es tesoro español.",nst:"University Quarter Nightlife respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:14,n:"Plaza Nueva Center — Centro",a:"Centro",v:["beautiful", "local"],d:14,s:"A perfect Renaissance plaza where locals meet, tourists arrive, water flows—the heart of Granada where everything converges.",st:"The plaza is beautiful, organized, alive. People sit on benches. Tourists consult maps. Water flows from the fountain. It\'s functional perfection. Everyone passes through.",im:"It\'s 1500. A plaza is built. Four centuries later it still works. Some designs are eternal.",t:"The plaza is beautiful, organized, alive. People sit on benches. Tourists consult maps. Water flows from the fountain. It\'s functional perfection. Everyone passes through.\",im:\"It\'s 1500. A plaza is built. Four centuries later it still works. Some designs are eternal.\",t:\"Free. It\'s the center. Cafes around it (€3-10). Sit for an hour. Watch the mix of tourists and locals. You\'ll see Granada passing by.",c:["beautiful", "local_only"],r:"g",nn:"Plaza Nueva Center",ns:"Plaza Nueva Center es tesoro español.",nst:"Plaza Nueva Center respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:15,n:"Bib-Rambla Market and Juggling — Centro",a:"Centro",v:["weird", "local"],d:15,s:"A plaza surrounded by Renaissance buildings where street musicians juggle, juggle, and juggle some more—organized chaos.",st:"The plaza is packed with street performers. Jugglers, musicians, people selling things. It\'s sensory overload in the best way. It\'s alive. It\'s performance without pretense.",im:"It\'s been a market for 800 years. Now it\'s entertainment too. Markets evolve but the idea stays the same.",t:"The plaza is packed with street performers. Jugglers, musicians, people selling things. It\'s sensory overload in the best way. It\'s alive. It\'s performance without pretense.\",im:\"It\'s been a market for 800 years. Now it\'s entertainment too. Markets evolve but the idea stays the same.\",t:\"Free to watch. Toss coins to performers (€1-5). Sit at a cafe (€3-8). Spend an hour. It\'s pure joy.",c:["weird", "local_only"],r:"g",nn:"Bib-Rambla Market and Juggling",ns:"Bib-Rambla Market and Juggling es tesoro español.",nst:"Bib-Rambla Market and Juggling respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:16,n:"Cuesta del Chapiz Alley Art and Murals — Albaicín",a:"Albaicín",v:["street_art", "beautiful"],d:16,s:"A narrow alley covered in street art, graffiti, political messages—walls speaking a language without words.",st:"Every surface is painted. Fresh art overlaps old. It\'s constantly evolving. The quality varies from amateur to magnificent. It\'s all real. It\'s all honest.",im:"It\'s 2005. Artists start painting the alley. Now it\'s a rolling gallery.",t:"Every surface is painted. Fresh art overlaps old. It\'s constantly evolving. The quality varies from amateur to magnificent. It\'s all real. It\'s all honest.\",im:\"It\'s 2005. Artists start painting the alley. Now it\'s a rolling gallery.\",t:\"Free walk. Go midweek for quiet. Take photos. Talk to artists if you see them working. Understand that street art is rebellion and beauty together.",c:["street_art", "beautiful"],r:"g",nn:"Cuesta del Chapiz Alley Art and Murals",ns:"Cuesta del Chapiz Alley Art and Murals es tesoro español.",nst:"Cuesta del Chapiz Alley Art and Murals respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},

,{id:121,n:"Sacromonte Cave Neighborhood Night Wander",a:"Sacromonte",v:["hidden", "atmospheric"],d:25,s:"Wander cave-lined paths under moonlight with distant flamenco echoes.",st:"Twilight descends as you climb Sacromonte's rugged paths, passing whitewashed cave homes glowing softly. Gypsy legends whisper through the air, mixed with faint guitar strums from hidden zambra shows. It's Granada's wild, untamed soul pulsing after dark.",im:"Imagine silhouetted caves against starry skies, a lone flamenco cry echoing across the hill.",t:"Start from Paseo de los Tristes, hike up 20 mins via Cuesta de los Chinos; free always, best 9pm-11pm post-dinner; stick to main paths, go with company.",c:["neighborhoods", "nightlife"],r:"g",nn:"Paseo nocturno por cuevas de Sacromonte",ns:"Recorre caminos de cuevas bajo la luna con ecos de flamenco lejanos.",nst:"El crepúsculo cae mientras subes los senderos escarpados de Sacromonte, pasando casas-cueva encaladas que brillan suavemente. Leyendas gitanas susurran en el aire, mezcladas con trinos de guitarra de zambras ocultas. Es el alma salvaje e indómita de Granada latiendo en la oscuridad.",nt:"Empieza en Paseo de los Tristes, sube 20 min por Cuesta de los Chinos; gratis siempre, mejor 21h-23h después de cenar; quédate en caminos principales, ve acompañado."},
{id:122,n:"Río Darro Paseo de los Tristes to Fuente del Avellano Trails",a:"Albaicín",v:["hidden", "nature"],d:30,s:"River walk morphs into secret woodland paths above the city.",st:"Stroll the Darro's babbling edge amid ancient bridges, then veer uphill into olive-shaded trails. City lights twinkle below as you escape into cool forest hush. Perfect for whispered adventures or quiet reflection.",im:"Picture Alhambra's glow filtering through cypress branches as the path wildens.",t:"From Plaza Nueva, follow river 10 mins to trails; free, anytime but golden hour magic; sturdy shoes for uphill bits.",c:["walks", "nature"],r:"g",nn:"Senderos del Río Darro de Paseo de los Tristes a Fuente del Avellano",ns:"Paseo ribereño que se transforma en senderos boscosos secretos sobre la ciudad.",nst:"Pasea junto al borboteo del Darro entre puentes antiguos, luego desvía uphill a senderos sombreados de olivos. Las luces de la ciudad titilan abajo mientras escapas al silencio fresco del bosque. Perfecto para aventuras susurradas o reflexión tranquila.",nt:"Desde Plaza Nueva, sigue el río 10 min hasta los senderos; gratis, cualquier hora pero la magia de la hora dorada; zapatos resistentes para las subidas."},
{id:123,n:"Fuente del Avellano to Llano de la Perdiz Loop",a:"Alhambra Surrounds",v:["hidden", "hike"],d:45,s:"Easy loop hike linking Alhambra viewpoints and wild meadows.",st:"Wind through pine-scented paths past hidden fountains, circling back via Silla del Moro vistas. Vega plains unfold endlessly, dotted with grazing sheep. Feels like stumbling into Granada's forgotten backyard.",im:"Envision panoramic Alhambra framed by wildflowers on breezy hilltops.",t:"Bus to Fuente del Avellano (C34 line), loop 1-2hrs; free, mornings best to beat heat; water essential.",c:["hikes", "views"],r:"g",nn:"Ruta circular Fuente del Avellano a Llano de la Perdiz",ns:"Fácil circular uniendo miradores de Alhambra y prados salvajes.",nst:"Serpentea por senderos de pino perfumados junto a fuentes ocultas, volviendo vía vistas de Silla del Moro. La vega se extiende infinita, salpicada de ovejas pastando. Como tropezar en el patio trasero olvidado de Granada.",nt:"Bus a Fuente del Avellano (línea C34), circular 1-2h; gratis, mañanas mejores contra el calor; agua imprescindible."},
{id:124,n:"Ruta del Colesterol Riverside Path",a:"Zaidín",v:["local", "riverside"],d:40,s:"Locals' secret riverside stroll far from tourist crowds.",st:"Trace the Genil's lazy flow past community gardens and joggers, soaking everyday Granada life. Bridges arch over to quiet benches, birds flitting in reeds. Pure, unfiltered neighborhood rhythm.",im:"Feel the Genil breeze while locals chat on graffiti-tagged benches.",t:"Start Zaidín sports center, walk toward Cenes de la Vega; free, weekends lively; flat path, family-friendly.",c:["walks", "local"],r:"g",nn:"Ruta del Colesterol por el Río Genil",ns:"Paseo ribereño secreto de los locales lejos de turistas.",nst:"Sigue el perezoso flujo del Genil pasando huertos comunitarios y corredores, empapándote de la vida cotidiana granadina. Puentes arquean a bancos tranquilos, pájaros revoloteando en juncos. Ritmo puro e sin filtrar del barrio.",nt:"Empieza en centro deportivo Zaidín, camina hacia Cenes de la Vega; gratis, fines de semana animados; camino plano, apto familias.",ef:"Grab cheap bocadillos at Zaidín markets nearby."},

<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Granada Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Granada Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
