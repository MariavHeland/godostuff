<script>
const P = [,
  {name:'Kröpeliner Tor Vorstadt Courtyards',area:'Kröpeliner-Tor-Vorstadt',desc:'Wander through the hidden courtyards (Hinterhöfe) of this vibrant Gründerzeit neighborhood, where locals sip coffee in secret gardens tucked behind colorful facades. Take bus 25 or 27 from the main station to reach the heart of it. Rostock residents cherish these quiet oases for their authentic, unhurried vibe away from tourist crowds. Free to explore.',tags:['hidden','courtyard','local','free'],lat:54.0895,lng:12.0932},
  {name:'Schmarrenberg Park',area:'Lichtenhagen',desc:'This neighborhood park offers a serene escape with wild meadows and old oak trees where locals picnic on sunny afternoons. Bus 28 stops nearby at Schmarrenbergstraße. It's loved for its raw, untamed nature feel right in the city, perfect for slow walks and birdwatching. Completely free.',tags:['park','local','free'],lat:54.1021,lng:12.0789},
  {name:'Toitenwinkel Viewpoint',area:'Stadtmitte',desc:'Climb to this overlooked hilltop for sweeping views over Rostock's rooftops and the Warnow River, a spot locals use for sunset yoga. Accessible via tram 5 or 6 to Am Toitenwinkel. The magic lies in its peaceful solitude and panoramic city whispers. Free entry.',tags:['viewpoint','hidden','local','free'],lat:54.094,lng:12.1025},
  {name:'Lütten Klein Market Square',area:'Lütten Klein',desc:'A tiny local market on weekends where farmers sell fresh produce and homemade jams in this residential corner—far from tourist traps. Bus 19 drops you right at the square. Locals flock here for the genuine chats and seasonal finds like wild herb bundles. Free to browse, cheap buys under 5€.',tags:['market','local','free'],lat:54.1105,lng:12.0654},
  {name:'Biitower Street Art Alley',area:'Biitower',desc:'Discover vibrant murals and graffiti in this industrial alley turned canvas, featuring local artists' takes on Baltic myths. Bus 27 to Biitower stop. Rostockers love snapping photos here for its raw urban energy and ever-changing art. Totally free.',tags:['street art','hidden','local','free'],lat:54.0856,lng:12.1101},
  {name:'Vierzehnheiligen Community Garden',area:'Vierzehnheiligen',desc:'A communal green space where neighbors tend veggie patches and share harvests—peek into Rostock's community spirit. Tram 1 or bus 15 nearby. It's a slow travel gem for quiet mornings amid blooming flowers and friendly hellos. Free access.',tags:['park','community','local','free'],lat:54.0952,lng:12.0876},
  {name:'Reutershagen Hidden Rooftop View',area:'Reutershagen',desc:'Locals know this quiet residential viewpoint from an old water tower offering bird's-eye sights of suburban Rostock. Bus 29 to Reutershagen Zentrum. Perfect for contemplative sits with a thermos, feeling the city's hidden pulse. Free.',tags:['viewpoint','hidden','local','free'],lat:54.1158,lng:12.0923},
  {name:'Evergenhof Courtyard Oasis',area:'Evergenhof',desc:'Step into this secret courtyard with ivy-covered walls and benches where locals read or play chess in the shade. Bus 25 passes close by. The charm is in its timeless tranquility, a slice of old Rostock life. Free to linger.',tags:['courtyard','hidden','local','free'],lat:54.0889,lng:12.0998},
  {name:'Dierkower Weg Street Art Wall',area:'Dierkow',desc:'A long wall bursting with colorful street art depicting local sea tales, popular among skaters and photographers. Bus 36 to Dierkower Weg. Locals adore it for the creative vibe and impromptu gatherings. Free.',tags:['street art','local','free'],lat:54.0782,lng:12.0847},
  {name:'Marientor Park Nook',area:'Marientor',desc:'Tucked in this neighborhood park is a wildflower meadow and pond where locals walk dogs and daydream. Tram 5 to Marientor. It's cherished for its unpretentious beauty and frog symphonies in spring. Free.',tags:['park','local','free'],lat:54.0923,lng:12.0965},
  {id:1,n:"Marienkirche — Altstadt",a:"Altstadt",v:["history","beautiful"],d:5,s:"Gothic brick church with a 15th century astronomical clock still ticking",st:"The Marienkirche is the oldest building in Rostock, dating to 1230. The astronomical clock (1472) shows not only time but the movement of planets and religious calendar dates. It still runs.",im:"Time-travel: the clockmaker installing the astronomical mechanism in 1472, gear by gear",t:"Free to enter. The clock runs at 12:05 daily — worth timing your visit for it.",c:["history_big"],r:"g",nn:"Marienkirche — Altstadt",ns:"Gotische Backsteinkirche mit einer astronomischen Uhr aus dem 15. Jh., die noch tickt",nst:"Die Marienkirche ist das älteste Gebäude Rostocks aus dem Jahr 1230. Die astronomische Uhr (1472) zeigt Planetenbewegungen.",nt:"Kostenlos zu betreten. Die Uhr läuft täglich um 12:05 — Besuch darauf abstimmen."},
  {id:2,n:"Warnemünde Beach — Warnemünde",a:"Warnemünde",v:["nature","beautiful","local"],d:15,s:"The Baltic beach town 15 minutes from Rostock — lighthouse, beach, real fishing community",st:"Warnemünde is a proper fishing village that became a Baltic resort. The beach stretches for kilometres. The old Alter Strom canal runs parallel with fishing boats and fish-smoking restaurants.",im:"Time-travel: Warnemünde as a working fishing village in 1900, before tourism, boats everywhere",t:"S-Bahn from Rostock Hauptbahnhof, 15 minutes. Always free.",c:["romantic_water"],r:"g",nn:"Warnemünde Strand — Warnemünde",ns:"Der Ostsee-Badeort 15 Minuten von Rostock — Leuchtturm, Strand, echte Fischergemeinschaft",nst:"Warnemünde ist ein echter Fischerort, der zum Ostseebad wurde. Strand erstreckt sich kilometerweit.",nt:"S-Bahn vom Rostocker Hauptbahnhof, 15 Minuten. Immer kostenlos."},
  {id:3,n:"Kröpeliner Tor — Altstadt",a:"Altstadt",v:["history","beautiful"],d:5,s:"The medieval gate tower of Rostock — best preserved of the original 22 gates",st:"The Kröpeliner Tor dates from the 13th century and is one of the best-preserved medieval city gates in northern Germany. The area around it is where students gather.",im:"Time-travel: traders passing through this gate paying city toll in 1350",t:"Always visible. Small museum inside on weekends.",c:["history_big"],r:"g",nn:"Kröpeliner Tor — Altstadt",ns:"Der mittelalterliche Torturm von Rostock — am besten erhalten von den ursprünglich 22 Toren",nst:"Das Kröpeliner Tor stammt aus dem 13. Jh. und ist eines der besterhaltenen mittelalterlichen Stadttore Norddeutschlands.",nt:"Immer sichtbar. Kleines Museum innen Wochenends."},
  {id:4,n:"Universitätsplatz — KTV",a:"KTV",v:["history","beautiful","local"],d:5,s:"The historic university square — Baroque fountain, market days, student life since 1419",st:"Rostock University was founded in 1419, making it the oldest in northern Europe. The main square has a Baroque fountain and gives the city its intellectual edge. The weekly market fills it on Tuesdays.",im:"Time-travel: the university founding in 1419 — the first students arriving by ship from Lübeck",t:"Tuesday market. Fountain is 17th century. Free always.",c:["history_big"],r:"g",nn:"Universitätsplatz — KTV",ns:"Der historische Universitätsplatz — Barockbrunnen, Markttage, Studentenleben seit 1419",nst:"Rostocks Universität wurde 1419 gegründet, die älteste in Nordeuropa. Dienstags Markt.",nt:"Dienstagmarkt. Brunnen aus dem 17. Jh. Immer kostenlos."},
  {id:5,n:"Alter Strom — Warnemünde",a:"Warnemünde",v:["local","beautiful","history"],d:15,s:"The old canal running through Warnemünde — fishing boats, fish smokers, the real Baltic life",st:"The Alter Strom is a narrow canal parallel to the beach, lined with fishing boats, fish restaurants, and smoked fish stalls. The fishing families have worked here for generations.",im:"Time-travel: Warnemünde fishermen bringing in herring catch along this canal in 1930",t:"Free to walk. Buy smoked fish. Come for breakfast or late afternoon.",c:["local_only"],r:"g",nn:"Alter Strom — Warnemünde",ns:"Der alte Kanal durch Warnemünde — Fischerboote, Räuchereien, das echte Ostseeleben",nst:"Der Alter Strom ist ein schmaler Kanal parallel zum Strand, gesäumt von Fischerbooten und Räucherfischständen.",nt:"Kostenlos zu gehen. Räucherfisch kaufen. Zum Frühstück oder späten Nachmittag kommen."},
  {id:6,n:"Petrikirche Tower — Altstadt",a:"Altstadt",v:["beautiful","high_spots","history"],d:8,s:"117 metre tower with a lift — the best view of Rostock and the Baltic sea",st:"The Petrikirche tower is the only high viewpoint in Rostock. The lift goes to 117 metres. On clear days you can see across the Bay of Mecklenburg. The church itself is free.",im:"Time-travel: look-out sailors in the Middle Ages watching for ships from this tower",t:"Church free. Lift: small fee. Worth it.",c:["high_spots"],r:"g",nn:"Petrikirche Turm — Altstadt",ns:"117 Meter Turm mit Aufzug — der beste Blick auf Rostock und die Ostsee",nst:"Der Petrikirchturm ist der einzige Hochaussichtspunkt in Rostock.",nt:"Kirche kostenlos. Aufzug kleiner Eintritt. Lohnenswert."},
  {id:7,n:"Neuer Markt — Altstadt",a:"Altstadt",v:["history","local","architecture"],d:5,s:"The main town square of Rostock with the magnificent striped Gothic Rathaus",st:"The Neuer Markt is Rostock\'s civic heart. The Rathaus has seven Gothic towers and a Baroque facade added in 1727. The market runs here daily. The surrounding buildings date from the 14th century.",im:"Time-travel: a Hanseatic merchant guild meeting on this square, 1450, trade deals struck",t:"Free. Market every weekday morning. The Rathaus facade is extraordinary.",c:["architecture"],r:"g",nn:"Neuer Markt — Altstadt",ns:"Der Hauptstadtplatz von Rostock mit dem prachtvollen gestreiften gotischen Rathaus",nst:"Der Neue Markt ist Rostocks bürgerliches Herz. Das Rathaus hat sieben gotische Türme und eine Barockfassade von 1727.",nt:"Kostenlos. Wochentagsmarkt morgens. Die Rathausfassade ist außergewöhnlich."},
  {id:8,n:"Botanical Garden — Botanical",a:"Botanical",v:["nature","quiet","free"],d:10,s:"University botanical garden — 8000 plant species, greenhouses, free to enter",st:"The University of Rostock\'s botanical garden is free and one of the oldest in Germany. The greenhouses hold tropical plants. In spring the flowering meadows are extraordinary.",im:"Time-travel: 19th century university botanists cataloguing the first specimen for this garden, 1867",t:"Always free. Spring for the flowers. Greenhouses open on weekdays.",c:["parks"],r:"g",nn:"Botanischer Garten — Botanical",ns:"Universitätsbotanischer Garten — 8000 Pflanzenarten, Gewächshäuser, kostenlos zu betreten",nst:"Der Botanische Garten der Universität Rostock ist kostenlos und einer der ältesten Deutschlands.",nt:"Immer kostenlos. Frühling für die Blumen. Gewächshäuser werktags geöffnet."},
  {id:9,n:"Warnemünde Lighthouse — Warnemünde",a:"Warnemünde",v:["beautiful","history"],d:15,s:"The 1898 lighthouse at the mouth of the harbour — guided Baltic ships for 130 years",st:"The red brick lighthouse at the harbour entrance has guided ships into the Warnow river since 1898. It is 37 metres tall. The surrounding promenade is always free.",im:"Time-travel: the lighthouse keeper trimming the lamp wick in 1910, a ship signalling from the Baltic",t:"Exterior and promenade free. Lighthouse interior sometimes open.",c:["history_big"],r:"g",nn:"Warnemünder Leuchtturm — Warnemünde",ns:"Der Leuchtturm von 1898 an der Hafeneinfahrt — führte Ostsee-Schiffe 130 Jahre lang",nst:"Der Backstein-Leuchtturm an der Hafeneinfahrt hat seit 1898 Schiffe in die Warnow geführt.",nt:"Außenbereich und Promenade kostenlos. Leuchtturm manchmal innen geöffnet."},
  {id:10,n:"Stadthafen — Stadthafen",a:"Stadthafen",v:["history","local","beautiful"],d:8,s:"The city harbour with old warehouses and the Hanse Sail festival in August",st:"The Stadthafen is Rostock\'s old maritime heart. Historic warehouses, ship repair docks, and a free outdoor museum of old ships. In August, the Hanse Sail brings hundreds of tall ships.",im:"Time-travel: Hanseatic trading ships loading Rostock grain for Lübeck and Riga, 1500",t:"Free to walk. Old ships visible from the quay.",c:["history_big"],r:"g",nn:"Stadthafen — Stadthafen",ns:"Der Stadthafen mit alten Lagerhäusern und dem Hansesegel-Festival im August",nst:"Der Stadthafen ist Rostocks altes maritimes Herz. Im August bringt das Hansesegel Hunderte Segelschiffe.",nt:"Kostenlos zu gehen. Alte Schiffe von der Mole sichtbar."},
  {id:11,n:"KTV Quarter Walk — KTV",a:"KTV",v:["local","hidden","beautiful"],d:10,s:"Kröpeliner-Tor-Vorstadt — the alternative quarter where Rostock is actually young and alive",st:"KTV is where Rostock\'s students, artists and counterculture live. Renovated Gründerzeit apartment buildings, independent cafés, record shops, murals. The street art is constantly changing.",im:"Time-travel: GDR Rostock youth gathering illegally in KTV apartments to listen to Western music, 1985",t:"Walk Barnstorfer Weg and Goethstraße. Best in the evening.",c:["local_only"],r:"g",nn:"KTV-Viertel — KTV",ns:"Kröpeliner-Tor-Vorstadt — das alternative Viertel, wo Rostock wirklich jung und lebendig ist",nst:"KTV ist Rostocks Studenten-, Künstler- und Gegenkulturengebiet.",nt:"Barnstorfer Weg und Goethstraße abgehen. Am besten abends."},
  {id:12,n:"Hopfenmarkt — Altstadt",a:"Altstadt",v:["history","quiet","hidden"],d:5,s:"The old hop market — an intact medieval square that tourists walk past without seeing",st:"The Hopfenmarkt is a tiny square that was the hop-trading centre of Rostock during the Hanseatic period. The surrounding buildings date from the 15th century. Almost never photographed.",im:"Time-travel: hop merchants weighing bales for the Rostock brewing trade, 1500",t:"Find it off Kröpeliner Straße. No signs point to it.",c:["history_big"],r:"g",nn:"Hopfenmarkt — Altstadt",ns:"Der alte Hopfenmarkt — ein intakter mittelalterlicher Platz, an dem Touristen vorbeigehen ohne zu sehen",nst:"Der Hopfenmarkt war das Hopfenhandelszentrum Rostocks in der Hansezeit.",nt:"Von der Kröpeliner Straße finden. Keine Schilder weisen darauf hin."},
  {id:13,n:"Old City Wall Sections — Altstadt",a:"Altstadt",v:["history","hidden"],d:8,s:"The longest surviving section of Rostock\'s medieval Hanseatic city walls",st:"Rostock had some of the most complete city walls in northern Germany — 22 towers and 4 gates. Most was demolished. The longest surviving stretch is along the Wallanlage park to the west.",im:"Time-travel: the complete wall circuit of Rostock in 1400, the city safely inside its ring",t:"Walk the Wallanlage park on the western side. Free.",c:["history_big"],r:"g",nn:"Alte Stadtmauerabschnitte — Altstadt",ns:"Der längste erhaltene Abschnitt von Rostocks mittelalterlichen Hansestadtmauern",nst:"Rostock hatte einige der vollständigsten Stadtmauern in Norddeutschland. Der längste Rest liegt am Wallanlagepark.",nt:"Wallanlagepark auf der Westseite abgehen. Kostenlos."},
  {id:14,n:"Kuhtor — Altstadt",a:"Altstadt",v:["history","hidden","weird"],d:5,s:"The cow gate — the only surviving inner city gate, where cattle were driven in for slaughter",st:"The Kuhtor was the gate through which cattle were driven from the fields into the city for butchering. The name means Cow Gate. It is modest, medieval, and tucked in a back street.",im:"Time-travel: cattle being driven through this gate in 1400, the smell of the medieval city",t:"Find it behind the Marienkirche. No crowds.",c:["history_big"],r:"g",nn:"Kuhtor — Altstadt",ns:"Das Kuhtor — das einzige erhaltene innere Stadttor, durch das Vieh zur Schlachtung getrieben wurde",nst:"Der Kuhtor war das Tor, durch das Vieh zum Schlachten in die Stadt getrieben wurde.",nt:"Hinter der Marienkirche finden. Keine Menschenmengen."},
  {id:15,n:"Barnstorfer Anlagen — KTV",a:"KTV",v:["nature","local","quiet"],d:10,s:"The green belt between KTV and the city — where students run and the city breathes",st:"The Barnstorfer Anlagen is a park that runs along the edge of KTV. Old trees, a small stream, and a feeling of being in a village rather than a city.",im:"Time-travel: Rostock professors taking their constitutional walks in this park, 1890",t:"Free. The main path from Kröpeliner-Tor to Barnstorf is 2km.",c:["parks"],r:"g",nn:"Barnstorfer Anlagen — KTV",ns:"Der Grüngürtel zwischen KTV und der Stadt — wo Studenten rennen und die Stadt atmet",nst:"Die Barnstorfer Anlagen ist ein Park am Rand von KTV. Alte Bäume, ein kleiner Bach, Dorfgefühl.",nt:"Kostenlos. Der Hauptweg von Kröpeliner-Tor bis Barnstorf ist 2 km."},
  {id:16,n:"St. Nikolai Church — Altstadt",a:"Altstadt",v:["history","quiet"],d:8,s:"The sailor\'s church — where Rostock fishermen and mariners prayed before going to sea",st:"St. Nikolai was the church of the maritime community — fishermen, sailors, and merchants all prayed here before voyages. The interior is simple and powerful.",im:"Time-travel: Rostock sailors praying here before a long Baltic voyage, 1600, the sea waiting",t:"Free to enter. Open most days.",c:["history_big"],r:"g",nn:"St. Nikolaikirche — Altstadt",ns:"Die Seemannskirche — wo Rostocks Fischer und Seeleute vor dem Auslaufen beteten",nst:"St. Nikolai war die Kirche der maritimen Gemeinschaft — Fischer, Seeleute, Kaufleute beteten hier.",nt:"Kostenlos zu betreten. Meistens geöffnet."},
  {id:17,n:"Mönchentor — Altstadt",a:"Altstadt",v:["history","hidden"],d:5,s:"The Monks\' Gate — the second surviving medieval city gate of Rostock",st:"The Mönchentor stood at the entrance to the Dominican monastery area of the city. It is smaller and more modestly preserved than the Kröpeliner Tor. Few visitors find it.",im:"Time-travel: Dominican monks passing through this gate to their monastery in 1350",t:"Find it on Mönchenstraße. Unmarked on most tourist maps.",c:["abandoned"],r:"g",nn:"Mönchentor — Altstadt",ns:"Das Mönchstor — das zweite erhaltene mittelalterliche Stadttor Rostocks",nst:"Das Mönchentor stand am Eingang zum Dominikanerklosterbereich der Stadt.",nt:"An der Mönchenstraße finden. Auf den meisten Touristenkarten nicht vermerkt."},
  {id:18,n:"Warnow Riverbank — Stadthafen",a:"Stadthafen",v:["nature","beautiful","local"],d:10,s:"The Warnow river estuary — where river becomes sea, the city\'s working waterfront",st:"The Warnow widens into an estuary as it approaches the Baltic. The city quay faces it. Old container ships, sailing boats, and the occasional cruise liner share the water.",im:"Time-travel: GDR shipbuilding yard in full operation on this river, 1970, the sound of metal on metal",t:"Walk the quay from Stadthafen south. Free.",c:["romantic_water"],r:"g",nn:"Warnow-Ufer — Stadthafen",ns:"Das Warnowestuarium — wo Fluss zum Meer wird, Rostocks arbeitendes Wasserfront",nst:"Die Warnow weitet sich zu einem Ästuar, wenn sie sich der Ostsee nähert.",nt:"Kai von Stadthafen nach Süden abgehen. Kostenlos."},
  {id:19,n:"Schifffahrtsmuseum Exterior — Stadthafen",a:"Stadthafen",v:["history","local"],d:8,s:"The maritime museum — old ships moored outside free to photograph",st:"The Schifffahrtsmuseum has several historic ships moored at the harbour that are free to photograph from the quay. The museum collection is indoors and has a small fee.",im:"Time-travel: Rostock shipbuilders launching a new vessel on the Warnow in 1920",t:"Ships visible from the quay free. Museum inside has entry fee.",c:["history_big"],r:"g",nn:"Schifffahrtsmuseum Außen — Stadthafen",ns:"Das Schifffahrtsmuseum — alte Schiffe draußen kostenlos zu fotografieren",nst:"Das Schifffahrtsmuseum hat mehrere historische Schiffe am Hafen, die kostenlos vom Kai zu fotografieren sind.",nt:"Schiffe vom Kai kostenlos sichtbar. Museum innen kostenpflichtig."},
  {id:20,n:"Warnemünde Promenade — Warnemünde",a:"Warnemünde",v:["beautiful","local","nature"],d:15,s:"The beach promenade of Warnemünde — Baltic wind, white sand, the smell of the sea",st:"The Warnemünde beach promenade runs for 3 kilometres. In summer it is the most human place on the Baltic. In winter it is one of the most dramatic — empty, windswept, alive.",im:"Time-travel: Baltic Sea resort visitors in 1910, bathing machines and parasols on the same beach",t:"Free. Winter is extraordinary.",c:["romantic_water"],r:"g",nn:"Warnemünder Promenade — Warnemünde",ns:"Die Strandpromenade von Warnemünde — Ostseewind, weißer Sand, Meeresgeruch",nst:"Die Warnemünder Strandpromenade verläuft über 3 Kilometer.",nt:"Kostenlos. Winter ist außergewöhnlich."},
  {id:21,n:"Teepott Exterior — Warnemünde",a:"Warnemünde",v:["architecture","weird","history"],d:15,s:"The iconic GDR wave-roof pavilion — built 1968, still standing, still strange",st:"The Teepott is a hyperbolic paraboloid concrete pavilion built in 1968 as an East German seaside restaurant. The wave-form roof was an audacious piece of GDR modernism. It still operates as a café.",im:"Time-travel: East German tourists sitting in this futuristic café, 1972, looking at the Baltic through the glass",t:"Exterior always free. Café inside for drinks.",c:["architecture"],r:"g",nn:"Teepott Außen — Warnemünde",ns:"Der ikonische DDR-Wellendach-Pavillon — 1968 erbaut, noch stehend, noch seltsam",nst:"Der Teepott ist ein hyperbolischer Paraboloid-Betonpavillon aus dem Jahr 1968 als DDR-Ostseerestaurant.",nt:"Außenbereich immer kostenlos. Café innen für Getränke."},
  {id:22,n:"Rostock Mauerweg — Altstadt",a:"Altstadt",v:["history","hidden","nature"],d:10,s:"The walk along the old fortification zone — turned into a green park circuit",st:"The Mauerweg follows the line of the demolished city walls through a linear park. You can walk the entire circuit of the old city boundary in 40 minutes. Green, quiet, and revealing.",im:"Time-travel: the demolition of the city walls in 1820, workers brick by brick removing centuries of defence",t:"Free. Start at Kröpeliner Tor and follow the green line.",c:["parks"],r:"g",nn:"Rostock Mauerweg — Altstadt",ns:"Der Weg entlang der alten Festungszone — in eine Grünparkschleife verwandelt",nst:"Der Mauerweg folgt der Linie der abgerissenen Stadtmauern durch einen Linearpark.",nt:"Kostenlos. Am Kröpeliner Tor beginnen und der grünen Linie folgen."},
  {id:23,n:"Neue Synagoge Memorial — Altstadt",a:"Altstadt",v:["history","quiet"],d:8,s:"The memorial where the Rostock synagogue stood before Kristallnacht — stones in the pavement",st:"The Neue Synagoge was burned on Kristallnacht, November 9-10, 1938. The site is now marked by a memorial in the pavement. The Jewish community that worshipped here for decades is gone.",im:"Time-travel: Kristallnacht 1938 — the synagogue burning, neighbours watching from windows",t:"Always visible. Free.",c:["history_big"],r:"g",nn:"Neue Synagoge Mahnmal — Altstadt",ns:"Das Mahnmal, wo die Rostocker Synagoge vor der Kristallnacht stand — Steine im Pflaster",nst:"Die Neue Synagoge wurde in der Kristallnacht 1938 verbrannt. Die Stelle ist jetzt im Pflaster markiert.",nt:"Immer sichtbar. Kostenlos."},
  {id:24,n:"Baltic Sea View from Pier — Warnemünde",a:"Warnemünde",v:["beautiful","nature","quiet"],d:15,s:"Stand at the end of the Warnemünde pier and watch ships arrive from the open Baltic",st:"The two piers at Warnemünde frame the harbour entrance. Walking to the end of the western pier puts you at the edge between the open Baltic and the sheltered Warnow estuary. Ships pass metres away.",im:"Time-travel: 18th century sailing ships arriving from Lübeck and Riga through these same harbour posts",t:"Free. Winter storms make this spectacular. Be careful on rough days.",c:["high_spots"],r:"g",nn:"Ostseeblick von der Mole — Warnemünde",ns:"Am Ende der Warnemünder Mole stehen und Schiffe aus der offenen Ostsee ankommen sehen",nst:"Die zwei Molen in Warnemünde rahmen die Hafeneinfahrt. Schiffe fahren Meter entfernt vorbei.",nt:"Kostenlos. Winterstürme machen es spektakulär. Bei rauem Wetter vorsichtig sein."},
  {id:25,n:"IGA Rostock Park — Botanical",a:"Botanical",v:["nature","free","beautiful"],d:10,s:"The 2003 International Garden Show site — now a free public park with lakes and sculpture",st:"The IGA 2003 transformed a derelict industrial site into a large park with lakes, themed gardens, and sculpture trails. Now permanently open and free.",im:"Time-travel: the 2003 Garden Show opening — Rostock celebrating its place on the international map",t:"Free. The lakeside circuit is 4km.",c:["parks"],r:"g",nn:"IGA Rostock Park — Botanical",ns:"Das Gelände der Internationalen Gartenschau 2003 — jetzt öffentlicher Park mit Seen und Skulpturen",nst:"Die IGA 2003 verwandelte ein brachliegendes Industriegelände in einen großen Park mit Seen.",nt:"Kostenlos. Der Seerundweg ist 4 km."},
  {id:26,n:"Marienkirche — Altstadt #26",a:"Altstadt",v:["history","beautiful"],d:45,s:"Gothic brick church with a 15th century astronomical clock still ticking",st:"The Marienkirche is the oldest building in Rostock, dating to 1230. The astronomical clock (1472) shows not only time but the movement of planets and religious calendar dates. It still runs.",im:"Time-travel: the clockmaker installing the astronomical mechanism in 1472, gear by gear",t:"Free to enter. The clock runs at 12:05 daily — worth timing your visit for it.",c:["history_big"],r:"g",nn:"Marienkirche — Altstadt #26",ns:"Gotische Backsteinkirche mit einer astronomischen Uhr aus dem 15. Jh., die noch tickt",nst:"Die Marienkirche ist das älteste Gebäude Rostocks aus dem Jahr 1230. Die astronomische Uhr (1472) zeigt Planetenbewegungen.",nt:"Kostenlos zu betreten. Die Uhr läuft täglich um 12:05 — Besuch darauf abstimmen."},
  {id:27,n:"Warnemünde Beach — Warnemünde #27",a:"Warnemünde",v:["nature","beautiful","local"],d:12,s:"The Baltic beach town 15 minutes from Rostock — lighthouse, beach, real fishing community",st:"Warnemünde is a proper fishing village that became a Baltic resort. The beach stretches for kilometres. The old Alter Strom canal runs parallel with fishing boats and fish-smoking restaurants.",im:"Time-travel: Warnemünde as a working fishing village in 1900, before tourism, boats everywhere",t:"S-Bahn from Rostock Hauptbahnhof, 15 minutes. Always free.",c:["high_spots"],r:"g",nn:"Warnemünde Strand — Warnemünde #27",ns:"Der Ostsee-Badeort 15 Minuten von Rostock — Leuchtturm, Strand, echte Fischergemeinschaft",nst:"Warnemünde ist ein echter Fischerort, der zum Ostseebad wurde. Strand erstreckt sich kilometerweit.",nt:"S-Bahn vom Rostocker Hauptbahnhof, 15 Minuten. Immer kostenlos."},
  {id:28,n:"Kröpeliner Tor — Altstadt #28",a:"Altstadt",v:["history","beautiful"],d:6,s:"The medieval gate tower of Rostock — best preserved of the original 22 gates",st:"The Kröpeliner Tor dates from the 13th century and is one of the best-preserved medieval city gates in northern Germany. The area around it is where students gather.",im:"Time-travel: traders passing through this gate paying city toll in 1350",t:"Always visible. Small museum inside on weekends.",c:["parks"],r:"g",nn:"Kröpeliner Tor — Altstadt #28",ns:"Der mittelalterliche Torturm von Rostock — am besten erhalten von den ursprünglich 22 Toren",nst:"Das Kröpeliner Tor stammt aus dem 13. Jh. und ist eines der besterhaltenen mittelalterlichen Stadttore Norddeutschlands.",nt:"Immer sichtbar. Kleines Museum innen Wochenends."},
  {id:29,n:"Universitätsplatz — KTV #29",a:"KTV",v:["history","beautiful","local"],d:52,s:"The historic university square — Baroque fountain, market days, student life since 1419",st:"Rostock University was founded in 1419, making it the oldest in northern Europe. The main square has a Baroque fountain and gives the city its intellectual edge. The weekly market fills it on Tuesdays.",im:"Time-travel: the university founding in 1419 — the first students arriving by ship from Lübeck",t:"Tuesday market. Fountain is 17th century. Free always.",c:["courtyards"],r:"g",nn:"Universitätsplatz — KTV #29",ns:"Der historische Universitätsplatz — Barockbrunnen, Markttage, Studentenleben seit 1419",nst:"Rostocks Universität wurde 1419 gegründet, die älteste in Nordeuropa. Dienstags Markt.",nt:"Dienstagmarkt. Brunnen aus dem 17. Jh. Immer kostenlos."},
  {id:30,n:"Alter Strom — Warnemünde #30",a:"Warnemünde",v:["local","beautiful","history"],d:22,s:"The old canal running through Warnemünde — fishing boats, fish smokers, the real Baltic life",st:"The Alter Strom is a narrow canal parallel to the beach, lined with fishing boats, fish restaurants, and smoked fish stalls. The fishing families have worked here for generations.",im:"Time-travel: Warnemünde fishermen bringing in herring catch along this canal in 1930",t:"Free to walk. Buy smoked fish. Come for breakfast or late afternoon.",c:["romantic_water"],r:"g",nn:"Alter Strom — Warnemünde #30",ns:"Der alte Kanal durch Warnemünde — Fischerboote, Räuchereien, das echte Ostseeleben",nst:"Der Alter Strom ist ein schmaler Kanal parallel zum Strand, gesäumt von Fischerbooten und Räucherfischständen.",nt:"Kostenlos zu gehen. Räucherfisch kaufen. Zum Frühstück oder späten Nachmittag kommen."},
  {id:31,n:"Petrikirche Tower — Altstadt #31",a:"Altstadt",v:["beautiful","high_spots","history"],d:20,s:"117 metre tower with a lift — the best view of Rostock and the Baltic sea",st:"The Petrikirche tower is the only high viewpoint in Rostock. The lift goes to 117 metres. On clear days you can see across the Bay of Mecklenburg. The church itself is free.",im:"Time-travel: look-out sailors in the Middle Ages watching for ships from this tower",t:"Church free. Lift: small fee. Worth it.",c:["scary"],r:"g",nn:"Petrikirche Turm — Altstadt #31",ns:"117 Meter Turm mit Aufzug — der beste Blick auf Rostock und die Ostsee",nst:"Der Petrikirchturm ist der einzige Hochaussichtspunkt in Rostock.",nt:"Kirche kostenlos. Aufzug kleiner Eintritt. Lohnenswert."},
  {id:32,n:"Neuer Markt — Altstadt #32",a:"Altstadt",v:["history","local","architecture"],d:19,s:"The main town square of Rostock with the magnificent striped Gothic Rathaus",st:"The Neuer Markt is Rostock\'s civic heart. The Rathaus has seven Gothic towers and a Baroque facade added in 1727. The market runs here daily. The surrounding buildings date from the 14th century.",im:"Time-travel: a Hanseatic merchant guild meeting on this square, 1450, trade deals struck",t:"Free. Market every weekday morning. The Rathaus facade is extraordinary.",c:["famous_dead"],r:"g",nn:"Neuer Markt — Altstadt #32",ns:"Der Hauptstadtplatz von Rostock mit dem prachtvollen gestreiften gotischen Rathaus",nst:"Der Neue Markt ist Rostocks bürgerliches Herz. Das Rathaus hat sieben gotische Türme und eine Barockfassade von 1727.",nt:"Kostenlos. Wochentagsmarkt morgens. Die Rathausfassade ist außergewöhnlich."},
  {id:33,n:"Botanical Garden — Botanical #33",a:"Botanical",v:["nature","quiet","free"],d:13,s:"University botanical garden — 8000 plant species, greenhouses, free to enter",st:"The University of Rostock\'s botanical garden is free and one of the oldest in Germany. The greenhouses hold tropical plants. In spring the flowering meadows are extraordinary.",im:"Time-travel: 19th century university botanists cataloguing the first specimen for this garden, 1867",t:"Always free. Spring for the flowers. Greenhouses open on weekdays.",c:["street_art"],r:"g",nn:"Botanischer Garten — Botanical #33",ns:"Universitätsbotanischer Garten — 8000 Pflanzenarten, Gewächshäuser, kostenlos zu betreten",nst:"Der Botanische Garten der Universität Rostock ist kostenlos und einer der ältesten Deutschlands.",nt:"Immer kostenlos. Frühling für die Blumen. Gewächshäuser werktags geöffnet."},
  {id:34,n:"Warnemünde Lighthouse — Warnemünde #34",a:"Warnemünde",v:["beautiful","history"],d:52,s:"The 1898 lighthouse at the mouth of the harbour — guided Baltic ships for 130 years",st:"The red brick lighthouse at the harbour entrance has guided ships into the Warnow river since 1898. It is 37 metres tall. The surrounding promenade is always free.",im:"Time-travel: the lighthouse keeper trimming the lamp wick in 1910, a ship signalling from the Baltic",t:"Exterior and promenade free. Lighthouse interior sometimes open.",c:["abandoned"],r:"g",nn:"Warnemünder Leuchtturm — Warnemünde #34",ns:"Der Leuchtturm von 1898 an der Hafeneinfahrt — führte Ostsee-Schiffe 130 Jahre lang",nst:"Der Backstein-Leuchtturm an der Hafeneinfahrt hat seit 1898 Schiffe in die Warnow geführt.",nt:"Außenbereich und Promenade kostenlos. Leuchtturm manchmal innen geöffnet."},
  {id:35,n:"Stadthafen — Stadthafen #35",a:"Stadthafen",v:["history","local","beautiful"],d:11,s:"The city harbour with old warehouses and the Hanse Sail festival in August",st:"The Stadthafen is Rostock\'s old maritime heart. Historic warehouses, ship repair docks, and a free outdoor museum of old ships. In August, the Hanse Sail brings hundreds of tall ships.",im:"Time-travel: Hanseatic trading ships loading Rostock grain for Lübeck and Riga, 1500",t:"Free to walk. Old ships visible from the quay.",c:["free_museum"],r:"g",nn:"Stadthafen — Stadthafen #35",ns:"Der Stadthafen mit alten Lagerhäusern und dem Hansesegel-Festival im August",nst:"Der Stadthafen ist Rostocks altes maritimes Herz. Im August bringt das Hansesegel Hunderte Segelschiffe.",nt:"Kostenlos zu gehen. Alte Schiffe von der Mole sichtbar."},
  {id:36,n:"KTV Quarter Walk — KTV #36",a:"KTV",v:["local","hidden","beautiful"],d:48,s:"Kröpeliner-Tor-Vorstadt — the alternative quarter where Rostock is actually young and alive",st:"KTV is where Rostock\'s students, artists and counterculture live. Renovated Gründerzeit apartment buildings, independent cafés, record shops, murals. The street art is constantly changing.",im:"Time-travel: GDR Rostock youth gathering illegally in KTV apartments to listen to Western music, 1985",t:"Walk Barnstorfer Weg and Goethstraße. Best in the evening.",c:["local_only"],r:"g",nn:"KTV-Viertel — KTV #36",ns:"Kröpeliner-Tor-Vorstadt — das alternative Viertel, wo Rostock wirklich jung und lebendig ist",nst:"KTV ist Rostocks Studenten-, Künstler- und Gegenkulturengebiet.",nt:"Barnstorfer Weg und Goethstraße abgehen. Am besten abends."},
  {id:37,n:"Hopfenmarkt — Altstadt #37",a:"Altstadt",v:["history","quiet","hidden"],d:52,s:"The old hop market — an intact medieval square that tourists walk past without seeing",st:"The Hopfenmarkt is a tiny square that was the hop-trading centre of Rostock during the Hanseatic period. The surrounding buildings date from the 15th century. Almost never photographed.",im:"Time-travel: hop merchants weighing bales for the Rostock brewing trade, 1500",t:"Find it off Kröpeliner Straße. No signs point to it.",c:["architecture"],r:"g",nn:"Hopfenmarkt — Altstadt #37",ns:"Der alte Hopfenmarkt — ein intakter mittelalterlicher Platz, an dem Touristen vorbeigehen ohne zu sehen",nst:"Der Hopfenmarkt war das Hopfenhandelszentrum Rostocks in der Hansezeit.",nt:"Von der Kröpeliner Straße finden. Keine Schilder weisen darauf hin."},
  {id:38,n:"Old City Wall Sections — Altstadt #38",a:"Altstadt",v:["history","hidden"],d:39,s:"The longest surviving section of Rostock\'s medieval Hanseatic city walls",st:"Rostock had some of the most complete city walls in northern Germany — 22 towers and 4 gates. Most was demolished. The longest surviving stretch is along the Wallanlage park to the west.",im:"Time-travel: the complete wall circuit of Rostock in 1400, the city safely inside its ring",t:"Walk the Wallanlage park on the western side. Free.",c:["history_big"],r:"g",nn:"Alte Stadtmauerabschnitte — Altstadt #38",ns:"Der längste erhaltene Abschnitt von Rostocks mittelalterlichen Hansestadtmauern",nst:"Rostock hatte einige der vollständigsten Stadtmauern in Norddeutschland. Der längste Rest liegt am Wallanlagepark.",nt:"Wallanlagepark auf der Westseite abgehen. Kostenlos."},
  {id:39,n:"Kuhtor — Altstadt #39",a:"Altstadt",v:["history","hidden","weird"],d:10,s:"The cow gate — the only surviving inner city gate, where cattle were driven in for slaughter",st:"The Kuhtor was the gate through which cattle were driven from the fields into the city for butchering. The name means Cow Gate. It is modest, medieval, and tucked in a back street.",im:"Time-travel: cattle being driven through this gate in 1400, the smell of the medieval city",t:"Find it behind the Marienkirche. No crowds.",c:["high_spots"],r:"g",nn:"Kuhtor — Altstadt #39",ns:"Das Kuhtor — das einzige erhaltene innere Stadttor, durch das Vieh zur Schlachtung getrieben wurde",nst:"Der Kuhtor war das Tor, durch das Vieh zum Schlachten in die Stadt getrieben wurde.",nt:"Hinter der Marienkirche finden. Keine Menschenmengen."},
  {id:40,n:"Barnstorfer Anlagen — KTV #40",a:"KTV",v:["nature","local","quiet"],d:42,s:"The green belt between KTV and the city — where students run and the city breathes",st:"The Barnstorfer Anlagen is a park that runs along the edge of KTV. Old trees, a small stream, and a feeling of being in a village rather than a city.",im:"Time-travel: Rostock professors taking their constitutional walks in this park, 1890",t:"Free. The main path from Kröpeliner-Tor to Barnstorf is 2km.",c:["parks"],r:"g",nn:"Barnstorfer Anlagen — KTV #40",ns:"Der Grüngürtel zwischen KTV und der Stadt — wo Studenten rennen und die Stadt atmet",nst:"Die Barnstorfer Anlagen ist ein Park am Rand von KTV. Alte Bäume, ein kleiner Bach, Dorfgefühl.",nt:"Kostenlos. Der Hauptweg von Kröpeliner-Tor bis Barnstorf ist 2 km."},
  {id:41,n:"St. Nikolai Church — Altstadt #41",a:"Altstadt",v:["history","quiet"],d:32,s:"The sailor\'s church — where Rostock fishermen and mariners prayed before going to sea",st:"St. Nikolai was the church of the maritime community — fishermen, sailors, and merchants all prayed here before voyages. The interior is simple and powerful.",im:"Time-travel: Rostock sailors praying here before a long Baltic voyage, 1600, the sea waiting",t:"Free to enter. Open most days.",c:["courtyards"],r:"g",nn:"St. Nikolaikirche — Altstadt #41",ns:"Die Seemannskirche — wo Rostocks Fischer und Seeleute vor dem Auslaufen beteten",nst:"St. Nikolai war die Kirche der maritimen Gemeinschaft — Fischer, Seeleute, Kaufleute beteten hier.",nt:"Kostenlos zu betreten. Meistens geöffnet."},
  {id:42,n:"Mönchentor — Altstadt #42",a:"Altstadt",v:["history","hidden"],d:7,s:"The Monks\' Gate — the second surviving medieval city gate of Rostock",st:"The Mönchentor stood at the entrance to the Dominican monastery area of the city. It is smaller and more modestly preserved than the Kröpeliner Tor. Few visitors find it.",im:"Time-travel: Dominican monks passing through this gate to their monastery in 1350",t:"Find it on Mönchenstraße. Unmarked on most tourist maps.",c:["romantic_water"],r:"g",nn:"Mönchentor — Altstadt #42",ns:"Das Mönchstor — das zweite erhaltene mittelalterliche Stadttor Rostocks",nst:"Das Mönchentor stand am Eingang zum Dominikanerklosterbereich der Stadt.",nt:"An der Mönchenstraße finden. Auf den meisten Touristenkarten nicht vermerkt."},
  {id:43,n:"Warnow Riverbank — Stadthafen #43",a:"Stadthafen",v:["nature","beautiful","local"],d:6,s:"The Warnow river estuary — where river becomes sea, the city\'s working waterfront",st:"The Warnow widens into an estuary as it approaches the Baltic. The city quay faces it. Old container ships, sailing boats, and the occasional cruise liner share the water.",im:"Time-travel: GDR shipbuilding yard in full operation on this river, 1970, the sound of metal on metal",t:"Walk the quay from Stadthafen south. Free.",c:["scary"],r:"g",nn:"Warnow-Ufer — Stadthafen #43",ns:"Das Warnowestuarium — wo Fluss zum Meer wird, Rostocks arbeitendes Wasserfront",nst:"Die Warnow weitet sich zu einem Ästuar, wenn sie sich der Ostsee nähert.",nt:"Kai von Stadthafen nach Süden abgehen. Kostenlos."},
  {id:44,n:"Schifffahrtsmuseum Exterior — Stadthafen #44",a:"Stadthafen",v:["history","local"],d:10,s:"The maritime museum — old ships moored outside free to photograph",st:"The Schifffahrtsmuseum has several historic ships moored at the harbour that are free to photograph from the quay. The museum collection is indoors and has a small fee.",im:"Time-travel: Rostock shipbuilders launching a new vessel on the Warnow in 1920",t:"Ships visible from the quay free. Museum inside has entry fee.",c:["famous_dead"],r:"g",nn:"Schifffahrtsmuseum Außen — Stadthafen #44",ns:"Das Schifffahrtsmuseum — alte Schiffe draußen kostenlos zu fotografieren",nst:"Das Schifffahrtsmuseum hat mehrere historische Schiffe am Hafen, die kostenlos vom Kai zu fotografieren sind.",nt:"Schiffe vom Kai kostenlos sichtbar. Museum innen kostenpflichtig."},
  {id:45,n:"Warnemünde Promenade — Warnemünde #45",a:"Warnemünde",v:["beautiful","local","nature"],d:18,s:"The beach promenade of Warnemünde — Baltic wind, white sand, the smell of the sea",st:"The Warnemünde beach promenade runs for 3 kilometres. In summer it is the most human place on the Baltic. In winter it is one of the most dramatic — empty, windswept, alive.",im:"Time-travel: Baltic Sea resort visitors in 1910, bathing machines and parasols on the same beach",t:"Free. Winter is extraordinary.",c:["street_art"],r:"g",nn:"Warnemünder Promenade — Warnemünde #45",ns:"Die Strandpromenade von Warnemünde — Ostseewind, weißer Sand, Meeresgeruch",nst:"Die Warnemünder Strandpromenade verläuft über 3 Kilometer.",nt:"Kostenlos. Winter ist außergewöhnlich."},

  {id:48,n:"Neue Synagoge Memorial — Altstadt #48",a:"Altstadt",v:["history","quiet"],d:43,s:"The memorial where the Rostock synagogue stood before Kristallnacht — stones in the pavement",st:"The Neue Synagoge was burned on Kristallnacht, November 9-10, 1938. The site is now marked by a memorial in the pavement. The Jewish community that worshipped here for decades is gone.",im:"Time-travel: Kristallnacht 1938 — the synagogue burning, neighbours watching from windows",t:"Always visible. Free.",c:["local_only"],r:"g",nn:"Neue Synagoge Mahnmal — Altstadt #48",ns:"Das Mahnmal, wo die Rostocker Synagoge vor der Kristallnacht stand — Steine im Pflaster",nst:"Die Neue Synagoge wurde in der Kristallnacht 1938 verbrannt. Die Stelle ist jetzt im Pflaster markiert.",nt:"Immer sichtbar. Kostenlos."},
  {id:49,n:"Baltic Sea View from Pier — Warnemünde #49",a:"Warnemünde",v:["beautiful","nature","quiet"],d:6,s:"Stand at the end of the Warnemünde pier and watch ships arrive from the open Baltic",st:"The two piers at Warnemünde frame the harbour entrance. Walking to the end of the western pier puts you at the edge between the open Baltic and the sheltered Warnow estuary. Ships pass metres away.",im:"Time-travel: 18th century sailing ships arriving from Lübeck and Riga through these same harbour posts",t:"Free. Winter storms make this spectacular. Be careful on rough days.",c:["architecture"],r:"g",nn:"Ostseeblick von der Mole — Warnemünde #49",ns:"Am Ende der Warnemünder Mole stehen und Schiffe aus der offenen Ostsee ankommen sehen",nst:"Die zwei Molen in Warnemünde rahmen die Hafeneinfahrt. Schiffe fahren Meter entfernt vorbei.",nt:"Kostenlos. Winterstürme machen es spektakulär. Bei rauem Wetter vorsichtig sein."},
  {id:50,n:"IGA Rostock Park — Botanical #50",a:"Botanical",v:["nature","free","beautiful"],d:40,s:"The 2003 International Garden Show site — now a free public park with lakes and sculpture",st:"The IGA 2003 transformed a derelict industrial site into a large park with lakes, themed gardens, and sculpture trails. Now permanently open and free.",im:"Time-travel: the 2003 Garden Show opening — Rostock celebrating its place on the international map",t:"Free. The lakeside circuit is 4km.",c:["history_big"],r:"g",nn:"IGA Rostock Park — Botanical #50",ns:"Das Gelände der Internationalen Gartenschau 2003 — jetzt öffentlicher Park mit Seen und Skulpturen",nst:"Die IGA 2003 verwandelte ein brachliegendes Industriegelände in einen großen Park mit Seen.",nt:"Kostenlos. Der Seerundweg ist 4 km."},
  {id:51,n:"Marienkirche — Altstadt #51",a:"Altstadt",v:["history","beautiful"],d:17,s:"Gothic brick church with a 15th century astronomical clock still ticking",st:"The Marienkirche is the oldest building in Rostock, dating to 1230. The astronomical clock (1472) shows not only time but the movement of planets and religious calendar dates. It still runs.",im:"Time-travel: the clockmaker installing the astronomical mechanism in 1472, gear by gear",t:"Free to enter. The clock runs at 12:05 daily — worth timing your visit for it.",c:["high_spots"],r:"g",nn:"Marienkirche — Altstadt #51",ns:"Gotische Backsteinkirche mit einer astronomischen Uhr aus dem 15. Jh., die noch tickt",nst:"Die Marienkirche ist das älteste Gebäude Rostocks aus dem Jahr 1230. Die astronomische Uhr (1472) zeigt Planetenbewegungen.",nt:"Kostenlos zu betreten. Die Uhr läuft täglich um 12:05 — Besuch darauf abstimmen."},
  {id:52,n:"Warnemünde Beach — Warnemünde #52",a:"Warnemünde",v:["nature","beautiful","local"],d:50,s:"The Baltic beach town 15 minutes from Rostock — lighthouse, beach, real fishing community",st:"Warnemünde is a proper fishing village that became a Baltic resort. The beach stretches for kilometres. The old Alter Strom canal runs parallel with fishing boats and fish-smoking restaurants.",im:"Time-travel: Warnemünde as a working fishing village in 1900, before tourism, boats everywhere",t:"S-Bahn from Rostock Hauptbahnhof, 15 minutes. Always free.",c:["parks"],r:"g",nn:"Warnemünde Strand — Warnemünde #52",ns:"Der Ostsee-Badeort 15 Minuten von Rostock — Leuchtturm, Strand, echte Fischergemeinschaft",nst:"Warnemünde ist ein echter Fischerort, der zum Ostseebad wurde. Strand erstreckt sich kilometerweit.",nt:"S-Bahn vom Rostocker Hauptbahnhof, 15 Minuten. Immer kostenlos."},
  {id:53,n:"Kröpeliner Tor — Altstadt #53",a:"Altstadt",v:["history","beautiful"],d:46,s:"The medieval gate tower of Rostock — best preserved of the original 22 gates",st:"The Kröpeliner Tor dates from the 13th century and is one of the best-preserved medieval city gates in northern Germany. The area around it is where students gather.",im:"Time-travel: traders passing through this gate paying city toll in 1350",t:"Always visible. Small museum inside on weekends.",c:["courtyards"],r:"g",nn:"Kröpeliner Tor — Altstadt #53",ns:"Der mittelalterliche Torturm von Rostock — am besten erhalten von den ursprünglich 22 Toren",nst:"Das Kröpeliner Tor stammt aus dem 13. Jh. und ist eines der besterhaltenen mittelalterlichen Stadttore Norddeutschlands.",nt:"Immer sichtbar. Kleines Museum innen Wochenends."},
  {id:54,n:"Universitätsplatz — KTV #54",a:"KTV",v:["history","beautiful","local"],d:49,s:"The historic university square — Baroque fountain, market days, student life since 1419",st:"Rostock University was founded in 1419, making it the oldest in northern Europe. The main square has a Baroque fountain and gives the city its intellectual edge. The weekly market fills it on Tuesdays.",im:"Time-travel: the university founding in 1419 — the first students arriving by ship from Lübeck",t:"Tuesday market. Fountain is 17th century. Free always.",c:["romantic_water"],r:"g",nn:"Universitätsplatz — KTV #54",ns:"Der historische Universitätsplatz — Barockbrunnen, Markttage, Studentenleben seit 1419",nst:"Rostocks Universität wurde 1419 gegründet, die älteste in Nordeuropa. Dienstags Markt.",nt:"Dienstagmarkt. Brunnen aus dem 17. Jh. Immer kostenlos."},
  {id:55,n:"Alter Strom — Warnemünde #55",a:"Warnemünde",v:["local","beautiful","history"],d:39,s:"The old canal running through Warnemünde — fishing boats, fish smokers, the real Baltic life",st:"The Alter Strom is a narrow canal parallel to the beach, lined with fishing boats, fish restaurants, and smoked fish stalls. The fishing families have worked here for generations.",im:"Time-travel: Warnemünde fishermen bringing in herring catch along this canal in 1930",t:"Free to walk. Buy smoked fish. Come for breakfast or late afternoon.",c:["scary"],r:"g",nn:"Alter Strom — Warnemünde #55",ns:"Der alte Kanal durch Warnemünde — Fischerboote, Räuchereien, das echte Ostseeleben",nst:"Der Alter Strom ist ein schmaler Kanal parallel zum Strand, gesäumt von Fischerbooten und Räucherfischständen.",nt:"Kostenlos zu gehen. Räucherfisch kaufen. Zum Frühstück oder späten Nachmittag kommen."},
  {id:56,n:"Petrikirche Tower — Altstadt #56",a:"Altstadt",v:["beautiful","high_spots","history"],d:31,s:"117 metre tower with a lift — the best view of Rostock and the Baltic sea",st:"The Petrikirche tower is the only high viewpoint in Rostock. The lift goes to 117 metres. On clear days you can see across the Bay of Mecklenburg. The church itself is free.",im:"Time-travel: look-out sailors in the Middle Ages watching for ships from this tower",t:"Church free. Lift: small fee. Worth it.",c:["famous_dead"],r:"g",nn:"Petrikirche Turm — Altstadt #56",ns:"117 Meter Turm mit Aufzug — der beste Blick auf Rostock und die Ostsee",nst:"Der Petrikirchturm ist der einzige Hochaussichtspunkt in Rostock.",nt:"Kirche kostenlos. Aufzug kleiner Eintritt. Lohnenswert."},
  {id:57,n:"Neuer Markt — Altstadt #57",a:"Altstadt",v:["history","local","architecture"],d:19,s:"The main town square of Rostock with the magnificent striped Gothic Rathaus",st:"The Neuer Markt is Rostock\'s civic heart. The Rathaus has seven Gothic towers and a Baroque facade added in 1727. The market runs here daily. The surrounding buildings date from the 14th century.",im:"Time-travel: a Hanseatic merchant guild meeting on this square, 1450, trade deals struck",t:"Free. Market every weekday morning. The Rathaus facade is extraordinary.",c:["street_art"],r:"g",nn:"Neuer Markt — Altstadt #57",ns:"Der Hauptstadtplatz von Rostock mit dem prachtvollen gestreiften gotischen Rathaus",nst:"Der Neue Markt ist Rostocks bürgerliches Herz. Das Rathaus hat sieben gotische Türme und eine Barockfassade von 1727.",nt:"Kostenlos. Wochentagsmarkt morgens. Die Rathausfassade ist außergewöhnlich."},
  {id:58,n:"Botanical Garden — Botanical #58",a:"Botanical",v:["nature","quiet","free"],d:33,s:"University botanical garden — 8000 plant species, greenhouses, free to enter",st:"The University of Rostock\'s botanical garden is free and one of the oldest in Germany. The greenhouses hold tropical plants. In spring the flowering meadows are extraordinary.",im:"Time-travel: 19th century university botanists cataloguing the first specimen for this garden, 1867",t:"Always free. Spring for the flowers. Greenhouses open on weekdays.",c:["abandoned"],r:"g",nn:"Botanischer Garten — Botanical #58",ns:"Universitätsbotanischer Garten — 8000 Pflanzenarten, Gewächshäuser, kostenlos zu betreten",nst:"Der Botanische Garten der Universität Rostock ist kostenlos und einer der ältesten Deutschlands.",nt:"Immer kostenlos. Frühling für die Blumen. Gewächshäuser werktags geöffnet."},
  {id:59,n:"Warnemünde Lighthouse — Warnemünde #59",a:"Warnemünde",v:["beautiful","history"],d:42,s:"The 1898 lighthouse at the mouth of the harbour — guided Baltic ships for 130 years",st:"The red brick lighthouse at the harbour entrance has guided ships into the Warnow river since 1898. It is 37 metres tall. The surrounding promenade is always free.",im:"Time-travel: the lighthouse keeper trimming the lamp wick in 1910, a ship signalling from the Baltic",t:"Exterior and promenade free. Lighthouse interior sometimes open.",c:["free_museum"],r:"g",nn:"Warnemünder Leuchtturm — Warnemünde #59",ns:"Der Leuchtturm von 1898 an der Hafeneinfahrt — führte Ostsee-Schiffe 130 Jahre lang",nst:"Der Backstein-Leuchtturm an der Hafeneinfahrt hat seit 1898 Schiffe in die Warnow geführt.",nt:"Außenbereich und Promenade kostenlos. Leuchtturm manchmal innen geöffnet."},
  {id:60,n:"Stadthafen — Stadthafen #60",a:"Stadthafen",v:["history","local","beautiful"],d:22,s:"The city harbour with old warehouses and the Hanse Sail festival in August",st:"The Stadthafen is Rostock\'s old maritime heart. Historic warehouses, ship repair docks, and a free outdoor museum of old ships. In August, the Hanse Sail brings hundreds of tall ships.",im:"Time-travel: Hanseatic trading ships loading Rostock grain for Lübeck and Riga, 1500",t:"Free to walk. Old ships visible from the quay.",c:["local_only"],r:"g",nn:"Stadthafen — Stadthafen #60",ns:"Der Stadthafen mit alten Lagerhäusern und dem Hansesegel-Festival im August",nst:"Der Stadthafen ist Rostocks altes maritimes Herz. Im August bringt das Hansesegel Hunderte Segelschiffe.",nt:"Kostenlos zu gehen. Alte Schiffe von der Mole sichtbar."},
  {id:61,n:"KTV Quarter Walk — KTV #61",a:"KTV",v:["local","hidden","beautiful"],d:5,s:"Kröpeliner-Tor-Vorstadt — the alternative quarter where Rostock is actually young and alive",st:"KTV is where Rostock\'s students, artists and counterculture live. Renovated Gründerzeit apartment buildings, independent cafés, record shops, murals. The street art is constantly changing.",im:"Time-travel: GDR Rostock youth gathering illegally in KTV apartments to listen to Western music, 1985",t:"Walk Barnstorfer Weg and Goethstraße. Best in the evening.",c:["architecture"],r:"g",nn:"KTV-Viertel — KTV #61",ns:"Kröpeliner-Tor-Vorstadt — das alternative Viertel, wo Rostock wirklich jung und lebendig ist",nst:"KTV ist Rostocks Studenten-, Künstler- und Gegenkulturengebiet.",nt:"Barnstorfer Weg und Goethstraße abgehen. Am besten abends."},
  {id:62,n:"Hopfenmarkt — Altstadt #62",a:"Altstadt",v:["history","quiet","hidden"],d:53,s:"The old hop market — an intact medieval square that tourists walk past without seeing",st:"The Hopfenmarkt is a tiny square that was the hop-trading centre of Rostock during the Hanseatic period. The surrounding buildings date from the 15th century. Almost never photographed.",im:"Time-travel: hop merchants weighing bales for the Rostock brewing trade, 1500",t:"Find it off Kröpeliner Straße. No signs point to it.",c:["history_big"],r:"g",nn:"Hopfenmarkt — Altstadt #62",ns:"Der alte Hopfenmarkt — ein intakter mittelalterlicher Platz, an dem Touristen vorbeigehen ohne zu sehen",nst:"Der Hopfenmarkt war das Hopfenhandelszentrum Rostocks in der Hansezeit.",nt:"Von der Kröpeliner Straße finden. Keine Schilder weisen darauf hin."},
  {id:63,n:"Old City Wall Sections — Altstadt #63",a:"Altstadt",v:["history","hidden"],d:15,s:"The longest surviving section of Rostock\'s medieval Hanseatic city walls",st:"Rostock had some of the most complete city walls in northern Germany — 22 towers and 4 gates. Most was demolished. The longest surviving stretch is along the Wallanlage park to the west.",im:"Time-travel: the complete wall circuit of Rostock in 1400, the city safely inside its ring",t:"Walk the Wallanlage park on the western side. Free.",c:["high_spots"],r:"g",nn:"Alte Stadtmauerabschnitte — Altstadt #63",ns:"Der längste erhaltene Abschnitt von Rostocks mittelalterlichen Hansestadtmauern",nst:"Rostock hatte einige der vollständigsten Stadtmauern in Norddeutschland. Der längste Rest liegt am Wallanlagepark.",nt:"Wallanlagepark auf der Westseite abgehen. Kostenlos."},
  {id:64,n:"Kuhtor — Altstadt #64",a:"Altstadt",v:["history","hidden","weird"],d:49,s:"The cow gate — the only surviving inner city gate, where cattle were driven in for slaughter",st:"The Kuhtor was the gate through which cattle were driven from the fields into the city for butchering. The name means Cow Gate. It is modest, medieval, and tucked in a back street.",im:"Time-travel: cattle being driven through this gate in 1400, the smell of the medieval city",t:"Find it behind the Marienkirche. No crowds.",c:["parks"],r:"g",nn:"Kuhtor — Altstadt #64",ns:"Das Kuhtor — das einzige erhaltene innere Stadttor, durch das Vieh zur Schlachtung getrieben wurde",nst:"Der Kuhtor war das Tor, durch das Vieh zum Schlachten in die Stadt getrieben wurde.",nt:"Hinter der Marienkirche finden. Keine Menschenmengen."},
  {id:65,n:"Barnstorfer Anlagen — KTV #65",a:"KTV",v:["nature","local","quiet"],d:32,s:"The green belt between KTV and the city — where students run and the city breathes",st:"The Barnstorfer Anlagen is a park that runs along the edge of KTV. Old trees, a small stream, and a feeling of being in a village rather than a city.",im:"Time-travel: Rostock professors taking their constitutional walks in this park, 1890",t:"Free. The main path from Kröpeliner-Tor to Barnstorf is 2km.",c:["courtyards"],r:"g",nn:"Barnstorfer Anlagen — KTV #65",ns:"Der Grüngürtel zwischen KTV und der Stadt — wo Studenten rennen und die Stadt atmet",nst:"Die Barnstorfer Anlagen ist ein Park am Rand von KTV. Alte Bäume, ein kleiner Bach, Dorfgefühl.",nt:"Kostenlos. Der Hauptweg von Kröpeliner-Tor bis Barnstorf ist 2 km."},
  {id:66,n:"St. Nikolai Church — Altstadt #66",a:"Altstadt",v:["history","quiet"],d:26,s:"The sailor\'s church — where Rostock fishermen and mariners prayed before going to sea",st:"St. Nikolai was the church of the maritime community — fishermen, sailors, and merchants all prayed here before voyages. The interior is simple and powerful.",im:"Time-travel: Rostock sailors praying here before a long Baltic voyage, 1600, the sea waiting",t:"Free to enter. Open most days.",c:["romantic_water"],r:"g",nn:"St. Nikolaikirche — Altstadt #66",ns:"Die Seemannskirche — wo Rostocks Fischer und Seeleute vor dem Auslaufen beteten",nst:"St. Nikolai war die Kirche der maritimen Gemeinschaft — Fischer, Seeleute, Kaufleute beteten hier.",nt:"Kostenlos zu betreten. Meistens geöffnet."},
  {id:67,n:"Mönchentor — Altstadt #67",a:"Altstadt",v:["history","hidden"],d:22,s:"The Monks\' Gate — the second surviving medieval city gate of Rostock",st:"The Mönchentor stood at the entrance to the Dominican monastery area of the city. It is smaller and more modestly preserved than the Kröpeliner Tor. Few visitors find it.",im:"Time-travel: Dominican monks passing through this gate to their monastery in 1350",t:"Find it on Mönchenstraße. Unmarked on most tourist maps.",c:["scary"],r:"g",nn:"Mönchentor — Altstadt #67",ns:"Das Mönchstor — das zweite erhaltene mittelalterliche Stadttor Rostocks",nst:"Das Mönchentor stand am Eingang zum Dominikanerklosterbereich der Stadt.",nt:"An der Mönchenstraße finden. Auf den meisten Touristenkarten nicht vermerkt."},
  {id:68,n:"Warnow Riverbank — Stadthafen #68",a:"Stadthafen",v:["nature","beautiful","local"],d:14,s:"The Warnow river estuary — where river becomes sea, the city\'s working waterfront",st:"The Warnow widens into an estuary as it approaches the Baltic. The city quay faces it. Old container ships, sailing boats, and the occasional cruise liner share the water.",im:"Time-travel: GDR shipbuilding yard in full operation on this river, 1970, the sound of metal on metal",t:"Walk the quay from Stadthafen south. Free.",c:["famous_dead"],r:"g",nn:"Warnow-Ufer — Stadthafen #68",ns:"Das Warnowestuarium — wo Fluss zum Meer wird, Rostocks arbeitendes Wasserfront",nst:"Die Warnow weitet sich zu einem Ästuar, wenn sie sich der Ostsee nähert.",nt:"Kai von Stadthafen nach Süden abgehen. Kostenlos."},
  {id:69,n:"Schifffahrtsmuseum Exterior — Stadthafen #69",a:"Stadthafen",v:["history","local"],d:18,s:"The maritime museum — old ships moored outside free to photograph",st:"The Schifffahrtsmuseum has several historic ships moored at the harbour that are free to photograph from the quay. The museum collection is indoors and has a small fee.",im:"Time-travel: Rostock shipbuilders launching a new vessel on the Warnow in 1920",t:"Ships visible from the quay free. Museum inside has entry fee.",c:["street_art"],r:"g",nn:"Schifffahrtsmuseum Außen — Stadthafen #69",ns:"Das Schifffahrtsmuseum — alte Schiffe draußen kostenlos zu fotografieren",nst:"Das Schifffahrtsmuseum hat mehrere historische Schiffe am Hafen, die kostenlos vom Kai zu fotografieren sind.",nt:"Schiffe vom Kai kostenlos sichtbar. Museum innen kostenpflichtig."},
  {id:70,n:"Warnemünde Promenade — Warnemünde #70",a:"Warnemünde",v:["beautiful","local","nature"],d:53,s:"The beach promenade of Warnemünde — Baltic wind, white sand, the smell of the sea",st:"The Warnemünde beach promenade runs for 3 kilometres. In summer it is the most human place on the Baltic. In winter it is one of the most dramatic — empty, windswept, alive.",im:"Time-travel: Baltic Sea resort visitors in 1910, bathing machines and parasols on the same beach",t:"Free. Winter is extraordinary.",c:["abandoned"],r:"g",nn:"Warnemünder Promenade — Warnemünde #70",ns:"Die Strandpromenade von Warnemünde — Ostseewind, weißer Sand, Meeresgeruch",nst:"Die Warnemünder Strandpromenade verläuft über 3 Kilometer.",nt:"Kostenlos. Winter ist außergewöhnlich."},
  {id:71,n:"Teepott Exterior — Warnemünde #71",a:"Warnemünde",v:["architecture","weird","history"],d:26,s:"The iconic GDR wave-roof pavilion — built 1968, still standing, still strange",st:"The Teepott is a hyperbolic paraboloid concrete pavilion built in 1968 as an East German seaside restaurant. The wave-form roof was an audacious piece of GDR modernism. It still operates as a café.",im:"Time-travel: East German tourists sitting in this futuristic café, 1972, looking at the Baltic through the glass",t:"Exterior always free. Café inside for drinks.",c:["free_museum"],r:"g",nn:"Teepott Außen — Warnemünde #71",ns:"Der ikonische DDR-Wellendach-Pavillon — 1968 erbaut, noch stehend, noch seltsam",nst:"Der Teepott ist ein hyperbolischer Paraboloid-Betonpavillon aus dem Jahr 1968 als DDR-Ostseerestaurant.",nt:"Außenbereich immer kostenlos. Café innen für Getränke."},
  {id:72,n:"Rostock Mauerweg — Altstadt #72",a:"Altstadt",v:["history","hidden","nature"],d:11,s:"The walk along the old fortification zone — turned into a green park circuit",st:"The Mauerweg follows the line of the demolished city walls through a linear park. You can walk the entire circuit of the old city boundary in 40 minutes. Green, quiet, and revealing.",im:"Time-travel: the demolition of the city walls in 1820, workers brick by brick removing centuries of defence",t:"Free. Start at Kröpeliner Tor and follow the green line.",c:["local_only"],r:"g",nn:"Rostock Mauerweg — Altstadt #72",ns:"Der Weg entlang der alten Festungszone — in eine Grünparkschleife verwandelt",nst:"Der Mauerweg folgt der Linie der abgerissenen Stadtmauern durch einen Linearpark.",nt:"Kostenlos. Am Kröpeliner Tor beginnen und der grünen Linie folgen."},
  {id:73,n:"Neue Synagoge Memorial — Altstadt #73",a:"Altstadt",v:["history","quiet"],d:10,s:"The memorial where the Rostock synagogue stood before Kristallnacht — stones in the pavement",st:"The Neue Synagoge was burned on Kristallnacht, November 9-10, 1938. The site is now marked by a memorial in the pavement. The Jewish community that worshipped here for decades is gone.",im:"Time-travel: Kristallnacht 1938 — the synagogue burning, neighbours watching from windows",t:"Always visible. Free.",c:["architecture"],r:"g",nn:"Neue Synagoge Mahnmal — Altstadt #73",ns:"Das Mahnmal, wo die Rostocker Synagoge vor der Kristallnacht stand — Steine im Pflaster",nst:"Die Neue Synagoge wurde in der Kristallnacht 1938 verbrannt. Die Stelle ist jetzt im Pflaster markiert.",nt:"Immer sichtbar. Kostenlos."},
  {id:74,n:"Baltic Sea View from Pier — Warnemünde #74",a:"Warnemünde",v:["beautiful","nature","quiet"],d:29,s:"Stand at the end of the Warnemünde pier and watch ships arrive from the open Baltic",st:"The two piers at Warnemünde frame the harbour entrance. Walking to the end of the western pier puts you at the edge between the open Baltic and the sheltered Warnow estuary. Ships pass metres away.",im:"Time-travel: 18th century sailing ships arriving from Lübeck and Riga through these same harbour posts",t:"Free. Winter storms make this spectacular. Be careful on rough days.",c:["history_big"],r:"g",nn:"Ostseeblick von der Mole — Warnemünde #74",ns:"Am Ende der Warnemünder Mole stehen und Schiffe aus der offenen Ostsee ankommen sehen",nst:"Die zwei Molen in Warnemünde rahmen die Hafeneinfahrt. Schiffe fahren Meter entfernt vorbei.",nt:"Kostenlos. Winterstürme machen es spektakulär. Bei rauem Wetter vorsichtig sein."},
