  {id:77,n:"Warnemünde Beach — Warnemünde #77",a:"Warnemünde",v:["nature","beautiful","local"],d:27,s:"The Baltic beach town 15 minutes from Rostock — lighthouse, beach, real fishing community",st:"Warnemünde is a proper fishing village that became a Baltic resort. The beach stretches for kilometres. The old Alter Strom canal runs parallel with fishing boats and fish-smoking restaurants.",im:"Time-travel: Warnemünde as a working fishing village in 1900, before tourism, boats everywhere",t:"S-Bahn from Rostock Hauptbahnhof, 15 minutes. Always free.",c:["courtyards"],r:"g",nn:"Warnemünde Strand — Warnemünde #77",ns:"Der Ostsee-Badeort 15 Minuten von Rostock — Leuchtturm, Strand, echte Fischergemeinschaft",nst:"Warnemünde ist ein echter Fischerort, der zum Ostseebad wurde. Strand erstreckt sich kilometerweit.",nt:"S-Bahn vom Rostocker Hauptbahnhof, 15 Minuten. Immer kostenlos."},
  {id:78,n:"Kröpeliner Tor — Altstadt #78",a:"Altstadt",v:["history","beautiful"],d:43,s:"The medieval gate tower of Rostock — best preserved of the original 22 gates",st:"The Kröpeliner Tor dates from the 13th century and is one of the best-preserved medieval city gates in northern Germany. The area around it is where students gather.",im:"Time-travel: traders passing through this gate paying city toll in 1350",t:"Always visible. Small museum inside on weekends.",c:["romantic_water"],r:"g",nn:"Kröpeliner Tor — Altstadt #78",ns:"Der mittelalterliche Torturm von Rostock — am besten erhalten von den ursprünglich 22 Toren",nst:"Das Kröpeliner Tor stammt aus dem 13. Jh. und ist eines der besterhaltenen mittelalterlichen Stadttore Norddeutschlands.",nt:"Immer sichtbar. Kleines Museum innen Wochenends."},
  {id:79,n:"Universitätsplatz — KTV #79",a:"KTV",v:["history","beautiful","local"],d:21,s:"The historic university square — Baroque fountain, market days, student life since 1419",st:"Rostock University was founded in 1419, making it the oldest in northern Europe. The main square has a Baroque fountain and gives the city its intellectual edge. The weekly market fills it on Tuesdays.",im:"Time-travel: the university founding in 1419 — the first students arriving by ship from Lübeck",t:"Tuesday market. Fountain is 17th century. Free always.",c:["scary"],r:"g",nn:"Universitätsplatz — KTV #79",ns:"Der historische Universitätsplatz — Barockbrunnen, Markttage, Studentenleben seit 1419",nst:"Rostocks Universität wurde 1419 gegründet, die älteste in Nordeuropa. Dienstags Markt.",nt:"Dienstagmarkt. Brunnen aus dem 17. Jh. Immer kostenlos."},
  {id:80,n:"Alter Strom — Warnemünde #80",a:"Warnemünde",v:["local","beautiful","history"],d:7,s:"The old canal running through Warnemünde — fishing boats, fish smokers, the real Baltic life",st:"The Alter Strom is a narrow canal parallel to the beach, lined with fishing boats, fish restaurants, and smoked fish stalls. The fishing families have worked here for generations.",im:"Time-travel: Warnemünde fishermen bringing in herring catch along this canal in 1930",t:"Free to walk. Buy smoked fish. Come for breakfast or late afternoon.",c:["famous_dead"],r:"g",nn:"Alter Strom — Warnemünde #80",ns:"Der alte Kanal durch Warnemünde — Fischerboote, Räuchereien, das echte Ostseeleben",nst:"Der Alter Strom ist ein schmaler Kanal parallel zum Strand, gesäumt von Fischerbooten und Räucherfischständen.",nt:"Kostenlos zu gehen. Räucherfisch kaufen. Zum Frühstück oder späten Nachmittag kommen."},
  {id:81,n:"Petrikirche Tower — Altstadt #81",a:"Altstadt",v:["beautiful","high_spots","history"],d:51,s:"117 metre tower with a lift — the best view of Rostock and the Baltic sea",st:"The Petrikirche tower is the only high viewpoint in Rostock. The lift goes to 117 metres. On clear days you can see across the Bay of Mecklenburg. The church itself is free.",im:"Time-travel: look-out sailors in the Middle Ages watching for ships from this tower",t:"Church free. Lift: small fee. Worth it.",c:["street_art"],r:"g",nn:"Petrikirche Turm — Altstadt #81",ns:"117 Meter Turm mit Aufzug — der beste Blick auf Rostock und die Ostsee",nst:"Der Petrikirchturm ist der einzige Hochaussichtspunkt in Rostock.",nt:"Kirche kostenlos. Aufzug kleiner Eintritt. Lohnenswert."},
  {id:82,n:"Neuer Markt — Altstadt #82",a:"Altstadt",v:["history","local","architecture"],d:34,s:"The main town square of Rostock with the magnificent striped Gothic Rathaus",st:"The Neuer Markt is Rostock\'s civic heart. The Rathaus has seven Gothic towers and a Baroque facade added in 1727. The market runs here daily. The surrounding buildings date from the 14th century.",im:"Time-travel: a Hanseatic merchant guild meeting on this square, 1450, trade deals struck",t:"Free. Market every weekday morning. The Rathaus facade is extraordinary.",c:["abandoned"],r:"g",nn:"Neuer Markt — Altstadt #82",ns:"Der Hauptstadtplatz von Rostock mit dem prachtvollen gestreiften gotischen Rathaus",nst:"Der Neue Markt ist Rostocks bürgerliches Herz. Das Rathaus hat sieben gotische Türme und eine Barockfassade von 1727.",nt:"Kostenlos. Wochentagsmarkt morgens. Die Rathausfassade ist außergewöhnlich."},
  {id:83,n:"Botanical Garden — Botanical #83",a:"Botanical",v:["nature","quiet","free"],d:39,s:"University botanical garden — 8000 plant species, greenhouses, free to enter",st:"The University of Rostock\'s botanical garden is free and one of the oldest in Germany. The greenhouses hold tropical plants. In spring the flowering meadows are extraordinary.",im:"Time-travel: 19th century university botanists cataloguing the first specimen for this garden, 1867",t:"Always free. Spring for the flowers. Greenhouses open on weekdays.",c:["free_museum"],r:"g",nn:"Botanischer Garten — Botanical #83",ns:"Universitätsbotanischer Garten — 8000 Pflanzenarten, Gewächshäuser, kostenlos zu betreten",nst:"Der Botanische Garten der Universität Rostock ist kostenlos und einer der ältesten Deutschlands.",nt:"Immer kostenlos. Frühling für die Blumen. Gewächshäuser werktags geöffnet."},
  {id:84,n:"Warnemünde Lighthouse — Warnemünde #84",a:"Warnemünde",v:["beautiful","history"],d:12,s:"The 1898 lighthouse at the mouth of the harbour — guided Baltic ships for 130 years",st:"The red brick lighthouse at the harbour entrance has guided ships into the Warnow river since 1898. It is 37 metres tall. The surrounding promenade is always free.",im:"Time-travel: the lighthouse keeper trimming the lamp wick in 1910, a ship signalling from the Baltic",t:"Exterior and promenade free. Lighthouse interior sometimes open.",c:["local_only"],r:"g",nn:"Warnemünder Leuchtturm — Warnemünde #84",ns:"Der Leuchtturm von 1898 an der Hafeneinfahrt — führte Ostsee-Schiffe 130 Jahre lang",nst:"Der Backstein-Leuchtturm an der Hafeneinfahrt hat seit 1898 Schiffe in die Warnow geführt.",nt:"Außenbereich und Promenade kostenlos. Leuchtturm manchmal innen geöffnet."},
  {id:85,n:"Stadthafen — Stadthafen #85",a:"Stadthafen",v:["history","local","beautiful"],d:29,s:"The city harbour with old warehouses and the Hanse Sail festival in August",st:"The Stadthafen is Rostock\'s old maritime heart. Historic warehouses, ship repair docks, and a free outdoor museum of old ships. In August, the Hanse Sail brings hundreds of tall ships.",im:"Time-travel: Hanseatic trading ships loading Rostock grain for Lübeck and Riga, 1500",t:"Free to walk. Old ships visible from the quay.",c:["architecture"],r:"g",nn:"Stadthafen — Stadthafen #85",ns:"Der Stadthafen mit alten Lagerhäusern und dem Hansesegel-Festival im August",nst:"Der Stadthafen ist Rostocks altes maritimes Herz. Im August bringt das Hansesegel Hunderte Segelschiffe.",nt:"Kostenlos zu gehen. Alte Schiffe von der Mole sichtbar."},
  {id:86,n:"KTV Quarter Walk — KTV #86",a:"KTV",v:["local","hidden","beautiful"],d:10,s:"Kröpeliner-Tor-Vorstadt — the alternative quarter where Rostock is actually young and alive",st:"KTV is where Rostock\'s students, artists and counterculture live. Renovated Gründerzeit apartment buildings, independent cafés, record shops, murals. The street art is constantly changing.",im:"Time-travel: GDR Rostock youth gathering illegally in KTV apartments to listen to Western music, 1985",t:"Walk Barnstorfer Weg and Goethstraße. Best in the evening.",c:["history_big"],r:"g",nn:"KTV-Viertel — KTV #86",ns:"Kröpeliner-Tor-Vorstadt — das alternative Viertel, wo Rostock wirklich jung und lebendig ist",nst:"KTV ist Rostocks Studenten-, Künstler- und Gegenkulturengebiet.",nt:"Barnstorfer Weg und Goethstraße abgehen. Am besten abends."},
  {id:87,n:"Hopfenmarkt — Altstadt #87",a:"Altstadt",v:["history","quiet","hidden"],d:40,s:"The old hop market — an intact medieval square that tourists walk past without seeing",st:"The Hopfenmarkt is a tiny square that was the hop-trading centre of Rostock during the Hanseatic period. The surrounding buildings date from the 15th century. Almost never photographed.",im:"Time-travel: hop merchants weighing bales for the Rostock brewing trade, 1500",t:"Find it off Kröpeliner Straße. No signs point to it.",c:["high_spots"],r:"g",nn:"Hopfenmarkt — Altstadt #87",ns:"Der alte Hopfenmarkt — ein intakter mittelalterlicher Platz, an dem Touristen vorbeigehen ohne zu sehen",nst:"Der Hopfenmarkt war das Hopfenhandelszentrum Rostocks in der Hansezeit.",nt:"Von der Kröpeliner Straße finden. Keine Schilder weisen darauf hin."},
  {id:88,n:"Old City Wall Sections — Altstadt #88",a:"Altstadt",v:["history","hidden"],d:23,s:"The longest surviving section of Rostock\'s medieval Hanseatic city walls",st:"Rostock had some of the most complete city walls in northern Germany — 22 towers and 4 gates. Most was demolished. The longest surviving stretch is along the Wallanlage park to the west.",im:"Time-travel: the complete wall circuit of Rostock in 1400, the city safely inside its ring",t:"Walk the Wallanlage park on the western side. Free.",c:["parks"],r:"g",nn:"Alte Stadtmauerabschnitte — Altstadt #88",ns:"Der längste erhaltene Abschnitt von Rostocks mittelalterlichen Hansestadtmauern",nst:"Rostock hatte einige der vollständigsten Stadtmauern in Norddeutschland. Der längste Rest liegt am Wallanlagepark.",nt:"Wallanlagepark auf der Westseite abgehen. Kostenlos."},
  {id:89,n:"Kuhtor — Altstadt #89",a:"Altstadt",v:["history","hidden","weird"],d:45,s:"The cow gate — the only surviving inner city gate, where cattle were driven in for slaughter",st:"The Kuhtor was the gate through which cattle were driven from the fields into the city for butchering. The name means Cow Gate. It is modest, medieval, and tucked in a back street.",im:"Time-travel: cattle being driven through this gate in 1400, the smell of the medieval city",t:"Find it behind the Marienkirche. No crowds.",c:["courtyards"],r:"g",nn:"Kuhtor — Altstadt #89",ns:"Das Kuhtor — das einzige erhaltene innere Stadttor, durch das Vieh zur Schlachtung getrieben wurde",nst:"Der Kuhtor war das Tor, durch das Vieh zum Schlachten in die Stadt getrieben wurde.",nt:"Hinter der Marienkirche finden. Keine Menschenmengen."},
  {id:90,n:"Barnstorfer Anlagen — KTV #90",a:"KTV",v:["nature","local","quiet"],d:44,s:"The green belt between KTV and the city — where students run and the city breathes",st:"The Barnstorfer Anlagen is a park that runs along the edge of KTV. Old trees, a small stream, and a feeling of being in a village rather than a city.",im:"Time-travel: Rostock professors taking their constitutional walks in this park, 1890",t:"Free. The main path from Kröpeliner-Tor to Barnstorf is 2km.",c:["romantic_water"],r:"g",nn:"Barnstorfer Anlagen — KTV #90",ns:"Der Grüngürtel zwischen KTV und der Stadt — wo Studenten rennen und die Stadt atmet",nst:"Die Barnstorfer Anlagen ist ein Park am Rand von KTV. Alte Bäume, ein kleiner Bach, Dorfgefühl.",nt:"Kostenlos. Der Hauptweg von Kröpeliner-Tor bis Barnstorf ist 2 km."},
  {id:91,n:"St. Nikolai Church — Altstadt #91",a:"Altstadt",v:["history","quiet"],d:28,s:"The sailor\'s church — where Rostock fishermen and mariners prayed before going to sea",st:"St. Nikolai was the church of the maritime community — fishermen, sailors, and merchants all prayed here before voyages. The interior is simple and powerful.",im:"Time-travel: Rostock sailors praying here before a long Baltic voyage, 1600, the sea waiting",t:"Free to enter. Open most days.",c:["scary"],r:"g",nn:"St. Nikolaikirche — Altstadt #91",ns:"Die Seemannskirche — wo Rostocks Fischer und Seeleute vor dem Auslaufen beteten",nst:"St. Nikolai war die Kirche der maritimen Gemeinschaft — Fischer, Seeleute, Kaufleute beteten hier.",nt:"Kostenlos zu betreten. Meistens geöffnet."},
  {id:92,n:"Mönchentor — Altstadt #92",a:"Altstadt",v:["history","hidden"],d:41,s:"The Monks\' Gate — the second surviving medieval city gate of Rostock",st:"The Mönchentor stood at the entrance to the Dominican monastery area of the city. It is smaller and more modestly preserved than the Kröpeliner Tor. Few visitors find it.",im:"Time-travel: Dominican monks passing through this gate to their monastery in 1350",t:"Find it on Mönchenstraße. Unmarked on most tourist maps.",c:["famous_dead"],r:"g",nn:"Mönchentor — Altstadt #92",ns:"Das Mönchstor — das zweite erhaltene mittelalterliche Stadttor Rostocks",nst:"Das Mönchentor stand am Eingang zum Dominikanerklosterbereich der Stadt.",nt:"An der Mönchenstraße finden. Auf den meisten Touristenkarten nicht vermerkt."},
  {id:93,n:"Warnow Riverbank — Stadthafen #93",a:"Stadthafen",v:["nature","beautiful","local"],d:17,s:"The Warnow river estuary — where river becomes sea, the city\'s working waterfront",st:"The Warnow widens into an estuary as it approaches the Baltic. The city quay faces it. Old container ships, sailing boats, and the occasional cruise liner share the water.",im:"Time-travel: GDR shipbuilding yard in full operation on this river, 1970, the sound of metal on metal",t:"Walk the quay from Stadthafen south. Free.",c:["street_art"],r:"g",nn:"Warnow-Ufer — Stadthafen #93",ns:"Das Warnowestuarium — wo Fluss zum Meer wird, Rostocks arbeitendes Wasserfront",nst:"Die Warnow weitet sich zu einem Ästuar, wenn sie sich der Ostsee nähert.",nt:"Kai von Stadthafen nach Süden abgehen. Kostenlos."},
  {id:94,n:"Schifffahrtsmuseum Exterior — Stadthafen #94",a:"Stadthafen",v:["history","local"],d:50,s:"The maritime museum — old ships moored outside free to photograph",st:"The Schifffahrtsmuseum has several historic ships moored at the harbour that are free to photograph from the quay. The museum collection is indoors and has a small fee.",im:"Time-travel: Rostock shipbuilders launching a new vessel on the Warnow in 1920",t:"Ships visible from the quay free. Museum inside has entry fee.",c:["abandoned"],r:"g",nn:"Schifffahrtsmuseum Außen — Stadthafen #94",ns:"Das Schifffahrtsmuseum — alte Schiffe draußen kostenlos zu fotografieren",nst:"Das Schifffahrtsmuseum hat mehrere historische Schiffe am Hafen, die kostenlos vom Kai zu fotografieren sind.",nt:"Schiffe vom Kai kostenlos sichtbar. Museum innen kostenpflichtig."},
  {id:95,n:"Warnemünde Promenade — Warnemünde #95",a:"Warnemünde",v:["beautiful","local","nature"],d:9,s:"The beach promenade of Warnemünde — Baltic wind, white sand, the smell of the sea",st:"The Warnemünde beach promenade runs for 3 kilometres. In summer it is the most human place on the Baltic. In winter it is one of the most dramatic — empty, windswept, alive.",im:"Time-travel: Baltic Sea resort visitors in 1910, bathing machines and parasols on the same beach",t:"Free. Winter is extraordinary.",c:["free_museum"],r:"g",nn:"Warnemünder Promenade — Warnemünde #95",ns:"Die Strandpromenade von Warnemünde — Ostseewind, weißer Sand, Meeresgeruch",nst:"Die Warnemünder Strandpromenade verläuft über 3 Kilometer.",nt:"Kostenlos. Winter ist außergewöhnlich."},
  {id:96,n:"Teepott Exterior — Warnemünde #96",a:"Warnemünde",v:["architecture","weird","history"],d:7,s:"The iconic GDR wave-roof pavilion — built 1968, still standing, still strange",st:"The Teepott is a hyperbolic paraboloid concrete pavilion built in 1968 as an East German seaside restaurant. The wave-form roof was an audacious piece of GDR modernism. It still operates as a café.",im:"Time-travel: East German tourists sitting in this futuristic café, 1972, looking at the Baltic through the glass",t:"Exterior always free. Café inside for drinks.",c:["local_only"],r:"g",nn:"Teepott Außen — Warnemünde #96",ns:"Der ikonische DDR-Wellendach-Pavillon — 1968 erbaut, noch stehend, noch seltsam",nst:"Der Teepott ist ein hyperbolischer Paraboloid-Betonpavillon aus dem Jahr 1968 als DDR-Ostseerestaurant.",nt:"Außenbereich immer kostenlos. Café innen für Getränke."},
  {id:97,n:"Rostock Mauerweg — Altstadt #97",a:"Altstadt",v:["history","hidden","nature"],d:47,s:"The walk along the old fortification zone — turned into a green park circuit",st:"The Mauerweg follows the line of the demolished city walls through a linear park. You can walk the entire circuit of the old city boundary in 40 minutes. Green, quiet, and revealing.",im:"Time-travel: the demolition of the city walls in 1820, workers brick by brick removing centuries of defence",t:"Free. Start at Kröpeliner Tor and follow the green line.",c:["architecture"],r:"g",nn:"Rostock Mauerweg — Altstadt #97",ns:"Der Weg entlang der alten Festungszone — in eine Grünparkschleife verwandelt",nst:"Der Mauerweg folgt der Linie der abgerissenen Stadtmauern durch einen Linearpark.",nt:"Kostenlos. Am Kröpeliner Tor beginnen und der grünen Linie folgen."},
  {id:98,n:"Neue Synagoge Memorial — Altstadt #98",a:"Altstadt",v:["history","quiet"],d:19,s:"The memorial where the Rostock synagogue stood before Kristallnacht — stones in the pavement",st:"The Neue Synagoge was burned on Kristallnacht, November 9-10, 1938. The site is now marked by a memorial in the pavement. The Jewish community that worshipped here for decades is gone.",im:"Time-travel: Kristallnacht 1938 — the synagogue burning, neighbours watching from windows",t:"Always visible. Free.",c:["history_big"],r:"g",nn:"Neue Synagoge Mahnmal — Altstadt #98",ns:"Das Mahnmal, wo die Rostocker Synagoge vor der Kristallnacht stand — Steine im Pflaster",nst:"Die Neue Synagoge wurde in der Kristallnacht 1938 verbrannt. Die Stelle ist jetzt im Pflaster markiert.",nt:"Immer sichtbar. Kostenlos."},
  {id:99,n:"Baltic Sea View from Pier — Warnemünde #99",a:"Warnemünde",v:["beautiful","nature","quiet"],d:54,s:"Stand at the end of the Warnemünde pier and watch ships arrive from the open Baltic",st:"The two piers at Warnemünde frame the harbour entrance. Walking to the end of the western pier puts you at the edge between the open Baltic and the sheltered Warnow estuary. Ships pass metres away.",im:"Time-travel: 18th century sailing ships arriving from Lübeck and Riga through these same harbour posts",t:"Free. Winter storms make this spectacular. Be careful on rough days.",c:["high_spots"],r:"g",nn:"Ostseeblick von der Mole — Warnemünde #99",ns:"Am Ende der Warnemünder Mole stehen und Schiffe aus der offenen Ostsee ankommen sehen",nst:"Die zwei Molen in Warnemünde rahmen die Hafeneinfahrt. Schiffe fahren Meter entfernt vorbei.",nt:"Kostenlos. Winterstürme machen es spektakulär. Bei rauem Wetter vorsichtig sein."},
  {id:100,n:"IGA Rostock Park — Botanical #100",a:"Botanical",v:["nature","free","beautiful"],d:23,s:"The 2003 International Garden Show site — now a free public park with lakes and sculpture",st:"The IGA 2003 transformed a derelict industrial site into a large park with lakes, themed gardens, and sculpture trails. Now permanently open and free.",im:"Time-travel: the 2003 Garden Show opening — Rostock celebrating its place on the international map",t:"Free. The lakeside circuit is 4km.",c:["parks"],r:"g",nn:"IGA Rostock Park — Botanical #100",ns:"Das Gelände der Internationalen Gartenschau 2003 — jetzt öffentlicher Park mit Seen und Skulpturen",nst:"Die IGA 2003 verwandelte ein brachliegendes Industriegelände in einen großen Park mit Seen.",nt:"Kostenlos. Der Seerundweg ist 4 km."},
  {id:101,n:"Marienkirche — Altstadt #101",a:"Altstadt",v:["history","beautiful"],d:10,s:"Gothic brick church with a 15th century astronomical clock still ticking",st:"The Marienkirche is the oldest building in Rostock, dating to 1230. The astronomical clock (1472) shows not only time but the movement of planets and religious calendar dates. It still runs.",im:"Time-travel: the clockmaker installing the astronomical mechanism in 1472, gear by gear",t:"Free to enter. The clock runs at 12:05 daily — worth timing your visit for it.",c:["courtyards"],r:"g",nn:"Marienkirche — Altstadt #101",ns:"Gotische Backsteinkirche mit einer astronomischen Uhr aus dem 15. Jh., die noch tickt",nst:"Die Marienkirche ist das älteste Gebäude Rostocks aus dem Jahr 1230. Die astronomische Uhr (1472) zeigt Planetenbewegungen.",nt:"Kostenlos zu betreten. Die Uhr läuft täglich um 12:05 — Besuch darauf abstimmen."},
  {id:102,n:"Warnemünde Beach — Warnemünde #102",a:"Warnemünde",v:["nature","beautiful","local"],d:19,s:"The Baltic beach town 15 minutes from Rostock — lighthouse, beach, real fishing community",st:"Warnemünde is a proper fishing village that became a Baltic resort. The beach stretches for kilometres. The old Alter Strom canal runs parallel with fishing boats and fish-smoking restaurants.",im:"Time-travel: Warnemünde as a working fishing village in 1900, before tourism, boats everywhere",t:"S-Bahn from Rostock Hauptbahnhof, 15 minutes. Always free.",c:["romantic_water"],r:"g",nn:"Warnemünde Strand — Warnemünde #102",ns:"Der Ostsee-Badeort 15 Minuten von Rostock — Leuchtturm, Strand, echte Fischergemeinschaft",nst:"Warnemünde ist ein echter Fischerort, der zum Ostseebad wurde. Strand erstreckt sich kilometerweit.",nt:"S-Bahn vom Rostocker Hauptbahnhof, 15 Minuten. Immer kostenlos."},
  {id:103,n:"Kröpeliner Tor — Altstadt #103",a:"Altstadt",v:["history","beautiful"],d:11,s:"The medieval gate tower of Rostock — best preserved of the original 22 gates",st:"The Kröpeliner Tor dates from the 13th century and is one of the best-preserved medieval city gates in northern Germany. The area around it is where students gather.",im:"Time-travel: traders passing through this gate paying city toll in 1350",t:"Always visible. Small museum inside on weekends.",c:["scary"],r:"g",nn:"Kröpeliner Tor — Altstadt #103",ns:"Der mittelalterliche Torturm von Rostock — am besten erhalten von den ursprünglich 22 Toren",nst:"Das Kröpeliner Tor stammt aus dem 13. Jh. und ist eines der besterhaltenen mittelalterlichen Stadttore Norddeutschlands.",nt:"Immer sichtbar. Kleines Museum innen Wochenends."},
  {id:104,n:"Universitätsplatz — KTV #104",a:"KTV",v:["history","beautiful","local"],d:29,s:"The historic university square — Baroque fountain, market days, student life since 1419",st:"Rostock University was founded in 1419, making it the oldest in northern Europe. The main square has a Baroque fountain and gives the city its intellectual edge. The weekly market fills it on Tuesdays.",im:"Time-travel: the university founding in 1419 — the first students arriving by ship from Lübeck",t:"Tuesday market. Fountain is 17th century. Free always.",c:["famous_dead"],r:"g",nn:"Universitätsplatz — KTV #104",ns:"Der historische Universitätsplatz — Barockbrunnen, Markttage, Studentenleben seit 1419",nst:"Rostocks Universität wurde 1419 gegründet, die älteste in Nordeuropa. Dienstags Markt.",nt:"Dienstagmarkt. Brunnen aus dem 17. Jh. Immer kostenlos."},
  {id:105,n:"Alter Strom — Warnemünde #105",a:"Warnemünde",v:["local","beautiful","history"],d:22,s:"The old canal running through Warnemünde — fishing boats, fish smokers, the real Baltic life",st:"The Alter Strom is a narrow canal parallel to the beach, lined with fishing boats, fish restaurants, and smoked fish stalls. The fishing families have worked here for generations.",im:"Time-travel: Warnemünde fishermen bringing in herring catch along this canal in 1930",t:"Free to walk. Buy smoked fish. Come for breakfast or late afternoon.",c:["street_art"],r:"g",nn:"Alter Strom — Warnemünde #105",ns:"Der alte Kanal durch Warnemünde — Fischerboote, Räuchereien, das echte Ostseeleben",nst:"Der Alter Strom ist ein schmaler Kanal parallel zum Strand, gesäumt von Fischerbooten und Räucherfischständen.",nt:"Kostenlos zu gehen. Räucherfisch kaufen. Zum Frühstück oder späten Nachmittag kommen."}

return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
{/* dark scrim over photo */}
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Rostock Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Rostock Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
