const P = [,
  {name:'St. Hanshaugen Park Viewpoint',area:'St. Hanshaugen',desc:'This easy-access park offers panoramic city views with zero effort, loved by locals for its relaxed vibe, green lawns, and summer gatherings. Take bus 21 or 46 to St. Hanshaugen stop. Completely free, perfect for slow picnics or quiet contemplation.',tags:['viewpoint','park','local','free'],lat:59.917,lng:10.755},
  {name:'Botanical Garden Trails',area:'Tøyen',desc:'A surprisingly vast, peaceful garden with winding paths for low-energy wanders, where locals escape the city buzz for quiet mornings amid rare plants. Bus 60 or tram 12 to Botanisk Hage. Free entry year-round, ideal for mindful slow travel.',tags:['park','local','free','hidden'],lat:59.916,lng:10.76},
  {name:'Akerselva Riverside Path',area:'Grünerløkka to Bjørvika',desc:'Follow the river through forests, waterfalls, and old factories—a free multi-neighborhood journey locals cherish for its hidden wild feel in the city. Bus 54 along parts of the route. Free, with audio guide app for deeper discovery.',tags:['park','local','free','hidden'],lat:59.91,lng:10.76},
  {name:'Peer Gynt Sculpture Park',area:'Løren',desc:'20 outdoor sculptures from Ibsen's Peer Gynt tucked in an industrial spot, a local secret for art lovers seeking quiet contemplation amid nature. Tram 17 to Løren. Free access, off-the-radar gem for slow explorers.',tags:['street art','park','local','free'],lat:59.93,lng:10.8},
  {name:'Ekeberg Hidden Trails',area:'Ekeberg',desc:'Beyond main sculptures, secret paths with ancient petroglyphs and fjord overlooks draw locals for serene hikes and personal reflection. Bus 34 or 74 to Ekeberg. Free, emphasizing nature's subtle wonders over crowds.',tags:['viewpoint','park','local','free'],lat:59.89,lng:10.78},
  {name:'Tjuvholmen Courtyards',area:'Tjuvholmen',desc:'Secret waterfront courtyards with modern art and calm nooks, where Oslo locals linger for coffee breaks away from Aker Brygge bustle. Tram 12 to Nationaltheatret, then walk. Free public spaces fostering curious discovery.',tags:['courtyard','street art','local','free'],lat:59.908,lng:10.725},
  {name:'Grünerløkka Street Art Alleys',area:'Grünerløkka',desc:'Narrow lanes bursting with evolving murals and tags, a living canvas locals track for fresh finds during casual neighborhood strolls. Tram 11 or 12 to Grünerløkka. Free urban exploration for the street art curious.',tags:['street art','local','free'],lat:59.92,lng:10.765},
  {name:'Mathallen Community Market',area:'Vulkan',desc:'Local food hall with free wandering among stalls and pop-up events, where residents gather for casual tastings and chats. Bus 54 to Vulkan. Free entry, cheap bites—heart of neighborhood slow food culture.',tags:['market','community','local','cheap'],lat:59.925,lng:10.76},
  {name:'Indre By Small Galleries',area:'Sentrum',desc:'Cluster of tiny free-entry galleries in backstreets, offering museum vibes without tickets—locals pop in spontaneously for emerging art. Walk from Jernbanetorget or bus 30. Free, serendipitous cultural hideaways.',tags:['street art','community','local','free'],lat:59.912,lng:10.74},
  {name:'Nordmarka Edge Paths',area:'Sogn',desc:'Quiet forest fringes near the city with easy viewpoints over rooftops, beloved by locals for free woodland escapes without full hikes. Bus 25 to Sognsveien. Free nature immersion, hidden urban-forest blend.',tags:['viewpoint','park','local','free'],lat:59.95,lng:10.75},

style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Oslo Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
