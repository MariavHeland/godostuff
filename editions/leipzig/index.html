<script>
const P = [
  {id:1,n:"Spinnerei Cotton Mill Art District — Plagwitz",a:"Plagwitz",v:["weird", "beautiful"],d:1,s:"A former cotton mill converted into 100+ artist studios—walk through a functioning creative district where art is made daily.",st:"Industrial brick buildings. Inside, galleries, studios, cafes. You walk past an open studio door and an artist is literally painting. Someone\'s selling handmade jewelry from a room that was a factory floor. The smell is paint, coffee, ambition. It\'s raw and real.",im:"It\'s 1995. The mill closes. Artists squat the buildings. They paint, create, refuse to leave. Twenty years later it\'s officially tolerated, then celebrated. Now it\'s Leipzig\'s heart.",t:"Industrial brick buildings. Inside, galleries, studios, cafes. You walk past an open studio door and an artist is literally painting. Someone\'s selling handmade jewelry from a room that was a factory floor. The smell is paint, coffee, ambition. It\'s raw and real.\",im:\"It\'s 1995. The mill closes. Artists squat the buildings. They paint, create, refuse to leave. Twenty years later it\'s officially tolerated, then celebrated. Now it\'s Leipzig\'s heart.\",t:\"Free to walk around. €5-10 for gallery entries. Weekday mornings are quieter. Go on a sunny afternoon for the light. Take the S3 tram to Plagwitz. Spend 3-4 hours. Eat at one of the cafes inside—everything is cheap and good.",c:["street_art", "local_only"],r:"g",nn:"Thomaskirche",ns:"Wo Johann Sebastian Bach Musik schrieb, die die Welt veränderte.",nst:"Bach war Kantor hier von 1723 bis 1750. Er schrieb die Matthäus-Passion hier. Die Kirche ist gotisch, das Konzert der Welt ist modern. Freitags gibt es Konzerte.",nt:"Thomaskirchhof. Kostenlos zu besuchen. Konzerte kosten €10-15. Friday Night Concerts sind berühmt. Komm früh an für Plätze."},
  {id:2,n:"Karl-Liebknecht-Straße Nightlife Strip — Südvorstadt",a:"Südvorstadt",v:["night", "weird"],d:2,s:"The longest street of continuous bars in Europe—walk two blocks and visit five countries worth of music genres.",st:"KarLi is chaos. Reggae bar next to techno club next to Irish pub next to jazz lounge. People spill onto the street. Polyglot conversations. The street is pure debauchery and joy mixed together. Every 50 meters is a different vibe.",im:"It\'s 1990. The wall just fell. Suddenly young people can move freely. They come to KarLi and celebrate by dancing for 20 years straight.",t:"KarLi is chaos. Reggae bar next to techno club next to Irish pub next to jazz lounge. People spill onto the street. Polyglot conversations. The street is pure debauchery and joy mixed together. Every 50 meters is a different vibe.\",im:\"It\'s 1990. The wall just fell. Suddenly young people can move freely. They come to KarLi and celebrate by dancing for 20 years straight.\",t:\"Drinks €4-6. Open late, really late. Go after 11pm when it\'s packed. Go with friends—it\'s more fun in groups. Budget €30-50 for a full night. Take a taxi home or plan to walk 15 minutes to the nearest tram.",c:["night", "local_only"],r:"y",nn:"Markt",ns:"Der alte Handelsplatz, wo Händler aus ganz Sachsen zusammenkamen.",nst:"Der Markt ist umgeben von historischen Gebäuden. Das Altes Rathaus steht dominant. Heute sind es Restaurants und Shops. Der Platz pulst mit Leben.",nt:"Zentral. Kostenlos spazieren. Viele Cafés und Restaurants. Kunsthandwerkermärkte manchmal am Wochenende."},
  {id:3,n:"Nikolaikirche Monday Revolution Church — Zentrum",a:"Zentrum",v:["history", "beautiful"],d:3,s:"The church where 70,000 people gathered on a Monday in 1989 and changed history—the DDR wasn\'t ready for prayer.",st:"The church is light inside, peaceful. Medieval structure. But you\'re standing where revolution began as a prayer movement. The walls absorbed the courage of 70,000 people demanding freedom. It\'s not a museum—it\'s a place where peaceful power happened.",im:"It\'s October 9, 1989. Tanks surround the city. Inside this church, people pray. Outside, 70,000 more people gather. The government doesn\'t shoot. The wall comes down in weeks. Prayer defeated tanks.",t:"The church is light inside, peaceful. Medieval structure. But you\'re standing where revolution began as a prayer movement. The walls absorbed the courage of 70,000 people demanding freedom. It\'s not a museum—it\'s a place where peaceful power happened.\",im:\"It\'s October 9, 1989. Tanks surround the city. Inside this church, people pray. Outside, 70,000 more people gather. The government doesn\'t shoot. The wall comes down in weeks. Prayer defeated tanks.\",t:\"Free. Open daily. There\'s a small exhibit about the Monday Demonstrations. Go on a weekday to feel the quiet power. English plaques explain everything. Sit in a pew. Understand what happened here.",c:["history_big", "beautiful"],r:"g",nn:"Völkerschlachtdenkmal",ns:"Ein kolossales Monument für die Schlacht, die Napoleon besiegte.",nst:"1813 besiegten die Prussener und Russen Napoleon hier. Das Denkmal ist massiv – 91 Meter hoch. Der Aufzug bringt dich nach oben für eine Aussicht auf Leipzig.",nt:"Südseite der Stadt. €9 Eintritt. Aufzug läuft. 500+ Stufen wenn du zu Fuß gehst. Beste Aussicht bei gutem Wetter. Museumscafé am Fuße."},
  {id:4,n:"Plagwitz Industrial Canal Kayak Paddle — Plagwitz",a:"Plagwitz",v:["nature", "beautiful"],d:4,s:"Paddle a kayak through the old industrial waterways where factories once boomed—now it\'s green water, red brick, and total silence.",st:"The paddle is gentle. The canal is narrow, reflecting buildings on both sides. Graffiti art on walls. Overgrown factories slowly being reclaimed. You\'re floating through a transition space—between industrial past and artistic future. It\'s peaceful and haunted at once.",im:"It\'s 1910. Factories pour smoke. Barges carry goods. Now it\'s 2026 and only silence remains. The water remembers, even if the city forgot.",t:"The paddle is gentle. The canal is narrow, reflecting buildings on both sides. Graffiti art on walls. Overgrown factories slowly being reclaimed. You\'re floating through a transition space—between industrial past and artistic future. It\'s peaceful and haunted at once.\",im:\"It\'s 1910. Factories pour smoke. Barges carry goods. Now it\'s 2026 and only silence remains. The water remembers, even if the city forgot.\",t:\"€15-25 per kayak. Rental places near the Plagwitzer Straße. Best April-October. Go midweek for fewer people. It\'s about 90 minutes including rental and paddle. Beginner-friendly, no experience needed.",c:["nature", "beautiful"],r:"g",nn:"Plagwitz Industrial Canal Kayak Paddle — Plagwitz",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:5,n:"Völkerschlachtdenkmal Monument — Südvorstadt",a:"Südvorstadt",v:["history", "high_spots"],d:5,s:"Climb a 91-meter monument to the battle that saved Europe in 1813—the view from top is Leipzig spread like a map beneath you.",st:"The monument is massive, intimidating, designed to feel powerful. You climb 500 stairs inside. Each step you rise above the city. At the top, Leipzig appears in every direction. You understand why they built this here—a military vantage point turned into triumph.",im:"It\'s 1913. A century after the battle, they finish this monument to remember that 600,000 people died on this field. Now it\'s a symbol of European freedom.",t:"The monument is massive, intimidating, designed to feel powerful. You climb 500 stairs inside. Each step you rise above the city. At the top, Leipzig appears in every direction. You understand why they built this here—a military vantage point turned into triumph.\",im:\"It\'s 1913. A century after the battle, they finish this monument to remember that 600,000 people died on this field. Now it\'s a symbol of European freedom.\",t:\"€8 entry, €6 with student ID. Take tram 15 to the monument. Open daily 10am-6pm usually. Go early to avoid crowds. The climb is steep but manageable. The view justifies every step. Bring water.",c:["history_big", "high_spots"],r:"g",nn:"Völkerschlachtdenkmal Monument — Südvorstadt",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:6,n:"Connewitz Punk Quarter Street Walls — Connewitz",a:"Connewitz",v:["street_art", "weird"],d:6,s:"A neighborhood where the walls are legally painted and constantly changing—graffiti is official culture here.",st:"Every surface is art. Murals, tags, stencils, pieces overlapping. It\'s loud and aggressive and beautiful. The neighborhood is real—laundromats, corner stores, people living their lives around epic wall art. It\'s not a tourist attraction, it\'s how people live.",im:"It\'s 1995. Young artists started tagging these walls as rebellion. Twenty years later, the city made it official. Now resistance is the law.",t:"Every surface is art. Murals, tags, stencils, pieces overlapping. It\'s loud and aggressive and beautiful. The neighborhood is real—laundromats, corner stores, people living their lives around epic wall art. It\'s not a tourist attraction, it\'s how people live.\",im:\"It\'s 1995. Young artists started tagging these walls as rebellion. Twenty years later, the city made it official. Now resistance is the law.\",t:\"Free to walk around. It\'s south of the center—take tram 7 or 8. Go during the day, not at night alone. The neighborhood is safe but feels edgy by design. Bring your camera. Talk to people—they\'ll explain the pieces.",c:["street_art", "local_only"],r:"y",nn:"Connewitz Punk Quarter Street Walls Straße — Connewitz",ns:"Gassen voller Leben—wo echt Köln/München/etc. ist.",nst:"Die Straße ist lebendig. Läden, Restaurants, Menschen überall. Du wandelst und absorberst Atmosphäre. Es ist Stadt pur.",nt:"Kostenlos spazieren. Restaurants €10-30. Cafés €3-7. Beste Zeit: Wochenende. Shopping und Essen zusammen. Sehr authentisch."},
  {id:7,n:"Clara-Zetkin-Park Lake — Zentrum",a:"Zentrum",v:["beautiful", "quiet"],d:7,s:"A man-made lake in a massive park where Leipzigers actually swim, sail, and pretend work doesn\'t exist.",st:"The lake is clean, surrounded by green. People in small boats. Someone\'s reading on the grass. A family is having a picnic. It\'s normal and beautiful. The park is huge—you could spend a full day here and never feel crowded.",im:"It\'s 1820. A lake appears in what was farmland. Suddenly Leipzig has water. Now it\'s where everyone comes when they need to remember what peace feels like.",t:"The lake is clean, surrounded by green. People in small boats. Someone\'s reading on the grass. A family is having a picnic. It\'s normal and beautiful. The park is huge—you could spend a full day here and never feel crowded.\",im:\"It\'s 1820. A lake appears in what was farmland. Suddenly Leipzig has water. Now it\'s where everyone comes when they need to remember what peace feels like.\",t:\"Free. Open always. Go on a sunny day. Pack a book and stay for 3 hours. Rent a boat (€15-30) or just swim. Best June-August. Bring sunscreen and a friend.",c:["nature", "parks"],r:"g",nn:"Clara-Zetkin-Park Lake Park — Zentrum",ns:"Grün und Bäume—wo Stadt atmet.",nst:"Der Park ist groß mit Bäumen und Plätzen zum Sitzen. Menschen joggen, Kinder spielen, Paare küssen. Es ist Natur in Stadt.",nt:"Kostenlos. Überall zugänglich. Beste Zeit: Sommer ab 18 Uhr. Biergärten oder Cafés oft im Park. Picnic-freundlich. Entspannung pur."},
  {id:8,n:"Bach\'s Thomaskirche and Organ — Zentrum",a:"Zentrum",v:["history", "beautiful"],d:8,s:"Where Johann Sebastian Bach composed and directed for 27 years—sit in the church and hear an organ concert on his actual stage.",st:"The organ is massive, ancient, alive. A musician sits at the console. The first note hits and the entire church resonates. It\'s not a concert, it\'s communion. Bach\'s hands once touched these same keys. The physics of music and faith become visible.",im:"It\'s 1745. Bach is 60 years old, nearly blind, composing the most complex music ever written in this room. The organ supports his vision. He leaves. The organ remembers.",t:"The organ is massive, ancient, alive. A musician sits at the console. The first note hits and the entire church resonates. It\'s not a concert, it\'s communion. Bach\'s hands once touched these same keys. The physics of music and faith become visible.\",im:\"It\'s 1745. Bach is 60 years old, nearly blind, composing the most complex music ever written in this room. The organ supports his vision. He leaves. The organ remembers.\",t:\"Free to enter the church. Organ concerts €12-15 (frequent, especially in summer). Go for a concert, not just the space. Check schedules. Monday-Friday afternoons are quietest. Wednesdays there\'s usually a concert. Bring your entire self.",c:["history_big", "architecture"],r:"g",nn:"Thomaskirche — Zentrum",ns:"Bach sang hier—und die Echos sind immer noch zu hören.",nst:"Die Thomaskirche ist wo Johann Sebastian Bach Musik-Direktor war. Die Kirche ist Gotik pur. Innen sind die Fenster Licht. Bach-Werke erfüllen den Raum am Sonntagmorgen. Du sitzt und lässt die Musik in dich gehen.",nt:"Kostenlos eintritt. Konzerte Freitag/Samstag ab 18 Uhr (€10-15). Sonntagmorgen Chor um 9:30 Uhr. Im Zentrum nahe Markt. Orgel ist eine der ältesten Deutschlands."},
  {id:9,n:"Zoo Leipzig Tropical Hall — Zentrum",a:"Zentrum",v:["nature", "beautiful"],d:9,s:"Leipzig\'s zoo is famous for one thing: the tropical hall is like walking into the Amazon without leaving the city.",st:"You enter heat and humidity. Vines hang overhead. Water flows. Exotic birds call. It\'s 30 meters of pure tropical immersion. You\'re sweating. Your phone steams up. For 20 minutes you actually forget you\'re in Germany.",im:"It\'s 1950. A zoo director dreams of bringing the jungle to Leipzig. Now kids from the city can see the Amazon without leaving home. It\'s 70 years later and people still feel wonder.",t:"You enter heat and humidity. Vines hang overhead. Water flows. Exotic birds call. It\'s 30 meters of pure tropical immersion. You\'re sweating. Your phone steams up. For 20 minutes you actually forget you\'re in Germany.\",im:\"It\'s 1950. A zoo director dreams of bringing the jungle to Leipzig. Now kids from the city can see the Amazon without leaving home. It\'s 70 years later and people still feel wonder.\",t:\"€20 entry for full zoo. Just visit the tropical hall section (€8-10 if available separately). Open daily. Midweek mornings are least crowded. It\'s a 45-minute visit minimum. Take the tropical hall hike then leave—you got what you came for.",c:["nature", "beautiful"],r:"g",nn:"Leipziger Zoo — Süden",ns:"2. ältester Zoo Deutschlands—wo Gorillas und Elefanten frei sind.",nst:"Der Leipziger Zoo ist geräumig und natürlich. Gorillas haben riesige Gehege. Giraffen grasen. Der Zoo versucht, die Tiere glücklich zu machen. Du siehst echtes Verhalten. Es ist respektvoll.",nt:"€22 Eintritt (€15 ermäßigt). April-Oktober 9-18 Uhr, Winter 9-17 Uhr. U-Bahn Zoo. Restaurants im Zoo. Kinderspielplatz vorhanden."},
  {id:10,n:"Bayerischer Bahnhof Historic Train Station and Beer Garden — Süd",a:"Süd",v:["history", "local"],d:10,s:"An 1844 train terminus turned beer garden—drink beer under massive glass sheds where trains once pulled in and changed the world.",st:"The architecture is perfect Victorian-industrial. Arching glass and metal. Now it\'s a beer garden. Long wooden tables. Local beer. Pretzels. People having loud conversations in Saxon dialect. It\'s beer culture in its purest German form.",im:"It\'s 1844. The railway arrives. Everything changes. Now it\'s 2026 and people drink under those same arches, unaware they\'re sitting in the spot that connected their city to the world.",t:"The architecture is perfect Victorian-industrial. Arching glass and metal. Now it\'s a beer garden. Long wooden tables. Local beer. Pretzels. People having loud conversations in Saxon dialect. It\'s beer culture in its purest German form.\",im:\"It\'s 1844. The railway arrives. Everything changes. Now it\'s 2026 and people drink under those same arches, unaware they\'re sitting in the spot that connected their city to the world.\",t:\"Free to enter, beer €4-6. Food €8-15. Open daily, usually until midnight. Go on a warm evening at 6pm-8pm for aperitivo. Go alone or with rowdy friends—everyone here is having fun. Cash preferred.",c:["local_only", "architecture"],r:"g",nn:"Bayerischer Bahnhof Historic Train Station and Beer Garden Garten — Süd",ns:"Botanisch oder geometrisch—Natur als Kunst.",nst:"Der Garten ist gepflanzt mit Kunst. Blumen überall, Fountains, Statuen. Im Sommer Blüten. Du wandelst wie in Gemälde.",nt:"€5-10 Eintritt. Täglich 9-18 Uhr (Winter kürzer). Beste Zeit: Frühling/Sommer wenn Blüten. Audioguide oft kostenlos. Café im Garten."},
  {id:11,n:"Cospudener See Lake Beach — South",a:"South",v:["nature", "beautiful"],d:11,s:"15 minutes south of Leipzig is a massive lake with a beach that feels like you drove to the Baltic without leaving Saxony.",st:"The lake is clear. The beach is real sand. It\'s summer and you\'re swimming in a quarry that flooded. Now it\'s a real lake with trees around it. Families, teenagers, older people in swimsuits. It\'s purely German beach culture with none of the pretense.",im:"It\'s 1950. Coal miners dug this hole. Now it\'s a lake. Now it\'s a memory of summer weekends.",t:"The lake is clear. The beach is real sand. It\'s summer and you\'re swimming in a quarry that flooded. Now it\'s a real lake with trees around it. Families, teenagers, older people in swimsuits. It\'s purely German beach culture with none of the pretense.\",im:\"It\'s 1950. Coal miners dug this hole. Now it\'s a lake. Now it\'s a memory of summer weekends.\",t:\"Free. Open May-September best. Take tram to the end of the line, then a 10-minute walk. Or bike there (€20-30 rental). Budget a full day. Bring snacks and sunscreen. The water is cold but refreshing.",c:["nature", "parks"],r:"g",nn:"Cospudener See Lake Beach See — South",ns:"Wasser zum Schauen oder zum Baden—Freude.",nst:"Der See ist Ruhe und Raum. Segelboote, Schwäne, Menschen auf Bänken. Du sitzt und denkst. Es ist friedlich.",nt:"Kostenlos. Überall zugänglich. Baden Sommer möglich (freie Seite). Cafés/Restaurants am Ufer €4-10. Beste Zeit: Sommer mittag/abend."},
  {id:12,n:"Schaubühne Lindenfels Theater Performance — Zentrum",a:"Zentrum",v:["night", "weird"],d:12,s:"An experimental theater in a small venue where avant-garde performances happen—weird, challenging, sometimes brilliant.",st:"The venue is tiny, intimate, no stage/audience separation. A performance starts. It\'s not traditional theater—it\'s physical, abstract, sometimes you\'re not sure what\'s happening. Then it hits you. You\'ll either love it or hate it, but you won\'t forget it.",im:"It\'s 2000. Young artists start performances in this space. Now it\'s a cultural institution. Art still hasn\'t been domesticated.",t:"The venue is tiny, intimate, no stage/audience separation. A performance starts. It\'s not traditional theater—it\'s physical, abstract, sometimes you\'re not sure what\'s happening. Then it hits you. You\'ll either love it or hate it, but you won\'t forget it.\",im:\"It\'s 2000. Young artists start performances in this space. Now it\'s a cultural institution. Art still hasn\'t been domesticated.\",t:\"€12-18 per show. Performances vary—check schedules online. Usually Thursdays-Saturdays. Book ahead. Go with an open mind. You might not understand it. That\'s part of the point.",c:["night", "weird"],r:"g",nn:"Schaubühne Lindenfels Theater Performance Oper — Zentrum",ns:"Klassische Musik und Eleganz—wo Kunst lebt.",nst:"Die Oper ist elegant. Plüsch-Sessel, Kronleuchter, Musik erfüllt alles. Du sitzt und hörst Meisterwerke. Es ist Luxus.",nt:"Tickets €15-100+. Konzerte täglich außer Montag. Touren ohne Performance €8-10. Reservierung empfohlen. Restaurant/Café im Gebäude."},
  {id:13,n:"Karl Heine Canal Paddle Walk — Zentrum",a:"Zentrum",v:["nature", "beautiful"],d:13,s:"Walk or paddle alongside a historic canal where 19th-century factories lined the water—now it\'s overgrown, wild, and free.",st:"The canal is 26km of water cutting through the city and countryside. Walking alongside, you see how industry shaped the landscape. Abandoned buildings half-hidden by trees. A graffiti bridge. Water reflecting sky. It\'s like walking through a slow-motion industrial transformation.",im:"It\'s 1880. This canal powers a hundred factories. Workers move goods. Smoke rises. Now it\'s 2026 and nature is reclaiming what humans took.",t:"The canal is 26km of water cutting through the city and countryside. Walking alongside, you see how industry shaped the landscape. Abandoned buildings half-hidden by trees. A graffiti bridge. Water reflecting sky. It\'s like walking through a slow-motion industrial transformation.\",im:\"It\'s 1880. This canal powers a hundred factories. Workers move goods. Smoke rises. Now it\'s 2026 and nature is reclaiming what humans took.\",t:\"Free walk or paddle. If walking, start at the Plagwitz locks and go 5-10km. If paddling, rent kayaks (€15-25). Best April-October. Full day experience. Pack snacks, water, sunscreen.",c:["nature", "beautiful"],r:"g",nn:"Karl Heine Canal Paddle Walk — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:14,n:"Colditz Castle Day Trip — Day Trip",a:"Day Trip",v:["history", "beautiful"],d:14,s:"45 minutes by bus is a 1000-year-old castle where WWII prisoners plotted escapes—it\'s still standing, still stunning.",st:"The castle rises on a hill above the Mulde River. Medieval towers, Renaissance courtyard. Inside, exhibits show prisoner escape attempts. One guy sawed through bars for months. Another hid in a tunnel. The place feels like occupied history—war, cleverness, hope.",im:"It\'s 1943. A prisoner carves \'I WILL ESCAPE\' into the wall. They never do. But they keep trying. The will survives. The castle remembers.",t:"The castle rises on a hill above the Mulde River. Medieval towers, Renaissance courtyard. Inside, exhibits show prisoner escape attempts. One guy sawed through bars for months. Another hid in a tunnel. The place feels like occupied history—war, cleverness, hope.\",im:\"It\'s 1943. A prisoner carves \'I WILL ESCAPE\' into the wall. They never do. But they keep trying. The will survives. The castle remembers.\",t:\"€10 entry. Take a bus from Leipzig (45 min, €15 round trip). The castle is walkable from town. Spend 3-4 hours. Bring a picnic. The view from the tower is worth the climb. Go on a weekday to feel less crowded.",c:["history_big", "architecture"],r:"g",nn:"Colditz Castle Day Trip Schloss — Day Trip",ns:"Mittelalter-Mauern und Geschichte—wo Ritter lebten.",nst:"Das Schloss sitzt auf Berg oder in Stadt. Alte Mauern, Türme, enge Gassen. Du siehst Räume wo Adel lebte. Es ist vergangenheit.",nt:"€6-12 Eintritt. Täglich 9-17 Uhr (Sommer bis 18 Uhr). Führungen gelegentlich +€3. Aussicht oft spektakulär. Plan 1-2 Stunden."},
  {id:15,n:"Hauptbahnhof Shopping Area Hidden Cafes — Zentrum",a:"Zentrum",v:["hidden", "local"],d:15,s:"The train station has underground passages with tiny local cafes—find them and you\'ve found where Leipzigers actually drink coffee.",st:"Below the main floor are narrow passages. Small cafes with 4-5 tables. Real coffee, not chain coffee. A man reading a newspaper that\'s decades old. A woman doing a crossword. It\'s 6am and life is happening in the basement of a train station.",im:"It\'s 1950. People pass through this station to go to the rest of the world. Some stop in the basement for coffee. Those small moments connect a city to itself.",t:"Below the main floor are narrow passages. Small cafes with 4-5 tables. Real coffee, not chain coffee. A man reading a newspaper that\'s decades old. A woman doing a crossword. It\'s 6am and life is happening in the basement of a train station.\",im:\"It\'s 1950. People pass through this station to go to the rest of the world. Some stop in the basement for coffee. Those small moments connect a city to itself.\",t:\"Free to explore. Coffee €2-4. It\'s right beneath the main Hauptbahnhof in the basement level. Open early mornings until mid-afternoon. Go at 7am when it\'s packed with locals.",c:["local_only", "hidden"],r:"g",nn:"Hauptbahnhof Shopping Area Hidden Cafes — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:16,n:"DDR Museum Traces Around the City — Various",a:"Various",v:["history", "hidden"],d:16,s:"Beyond the main museum, find physical traces of the DDR era embedded in the city—a fence border, old guard post, preserved propaganda.",st:"Walk the city looking for DDR remnants. A section of wall still standing. Faded propaganda slogans on building sides. A guard post on a corner. These aren\'t in a museum—they\'re where they happened. It\'s real history underfoot.",im:"It\'s 1989. The system collapses. Officials try to erase evidence. But some of it survives. A wall remains. A slogan fades but doesn\'t disappear. Thirty years later, people follow the traces.",t:"Walk the city looking for DDR remnants. A section of wall still standing. Faded propaganda slogans on building sides. A guard post on a corner. These aren\'t in a museum—they\'re where they happened. It\'s real history underfoot.\",im:\"It\'s 1989. The system collapses. Officials try to erase evidence. But some of it survives. A wall remains. A slogan fades but doesn\'t disappear. Thirty years later, people follow the traces.\",t:\"Free self-guided tour. Start at the Stasi memorial (€8 entry optional). Walk the city center looking for preserved sites. Tourist office provides a map. Best with someone who knows the history—stories matter here.",c:["history_big", "hidden"],r:"g",nn:"DDR Museum Traces Around the City Museum — Various",ns:"Museum mit Sammlungen und Geschichte.",nst:"Du betrittst das Museum und siehst Kunstwerke, Artefakte, alte Dinge. Jedes Objekt erzählt eine Geschichte. Es ist Vergangenheit bewahrt für Gegenwart.",nt:"€6-12 Eintritt. Täglich 10-18 Uhr (Montag oft geschlossen). Audioguide kostenlos oder €3. Café im Gebäude. Plan 2 Stunden."},
  {id:17,n:"Gründerzeit Merchant Quarter Architecture — Zentrum",a:"Zentrum",v:["beautiful", "history"],d:17,s:"Walk through blocks of 19th-century merchant townhouses—ornate facades, courtyards, the whole neighborhood is architectural theater.",st:"The buildings are elaborate, decorated, designed by merchants who wanted the world to know they had money. Each facade is different. Courtyards hide behind ordinary doorways. The architecture tells stories of ambition, competition, wealth transformation.",im:"It\'s 1890. A merchant builds a house. It takes 2 years and costs what a small town costs. He wants people to know he arrived. The building still screams his arrival.",t:"The buildings are elaborate, decorated, designed by merchants who wanted the world to know they had money. Each facade is different. Courtyards hide behind ordinary doorways. The architecture tells stories of ambition, competition, wealth transformation.\",im:\"It\'s 1890. A merchant builds a house. It takes 2 years and costs what a small town costs. He wants people to know he arrived. The building still screams his arrival.\",t:\"Free walk. It\'s in the Zentrum, walkable from Markt. Spend 60-90 minutes. Go slowly. Look up. Go through courtyards if you can see them. Some have cafes—stop for coffee.",c:["architecture", "history_big"],r:"g",nn:"Gründerzeit Merchant Quarter Architecture — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:18,n:"Kunsthofpassage Graffiti Courtyard — Südvorstadt",a:"Südvorstadt",v:["street_art", "beautiful"],d:18,s:"An ordinary apartment courtyard where the walls transform into animal murals and political statements—a hidden gallery 20 meters from the street.",st:"You walk into an ordinary Leipzig entrance. Then the courtyard opens—walls covered in bright murals. A giant rabbit. A portrait of a revolutionary. Stars and symbols. It\'s not a museum, it\'s how tenants here chose to live. The art is changing, alive.",im:"It\'s 2000. Artists decided their courtyard didn\'t have to be grey. They painted. The city allowed it. Now families live in the most colorful courtyard in Leipzig.",t:"You walk into an ordinary Leipzig entrance. Then the courtyard opens—walls covered in bright murals. A giant rabbit. A portrait of a revolutionary. Stars and symbols. It\'s not a museum, it\'s how tenants here chose to live. The art is changing, alive.\",im:\"It\'s 2000. Artists decided their courtyard didn\'t have to be grey. They painted. The city allowed it. Now families live in the most colorful courtyard in Leipzig.\",t:\"Free. It\'s in Südvorstadt, south of the center. No sign—you have to know to look. Walk through the courtyard slowly. Respect that people live here. Take photos. Leave no trace.",c:["street_art", "beautiful"],r:"g",nn:"Kunsthofpassage Graffiti Courtyard — Südvorstadt",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:19,n:"Markthalle Weekly Market — Zentrum",a:"Zentrum",v:["local", "beautiful"],d:19,s:"Saturday mornings the market explodes with vegetables, flowers, cheese, bread, honey—real food from real farmers.",st:"Vendors yell. Colors overwhelm. Smells are intense—strawberries, garlic, fresh bread. Elderly women in tracksuits squeeze tomatoes. A man sells 15 types of honey. It\'s organized chaos, purely local, no tourists.",im:"It\'s Saturday, 8am. The farmers arrived before dawn. Now they\'re surrounded by people who know exactly what they want. This happens every Saturday, has for a hundred years.",t:"Vendors yell. Colors overwhelm. Smells are intense—strawberries, garlic, fresh bread. Elderly women in tracksuits squeeze tomatoes. A man sells 15 types of honey. It\'s organized chaos, purely local, no tourists.\",im:\"It\'s Saturday, 8am. The farmers arrived before dawn. Now they\'re surrounded by people who know exactly what they want. This happens every Saturday, has for a hundred years.\",t:\"Open Saturday 8am-2pm mainly. Cash preferred. Get there early (9am) for best selection. Buy things to cook that afternoon—that\'s the whole point. Budget €20-40 for a week\'s vegetables.",c:["local_only", "nature"],r:"g",nn:"Marktplatz — Zentrum",ns:"Der Platz, wo Leipzigs Geschichte geschrieben wurde—seit 1000 Jahren.",nst:"Der Marktplatz ist Leipzigs Herz. Das Rathaus ist Renaissance-Meisterwerk. Der Platz ist Fußgänger-Zone, voll mit Restaurants und Cafés. Im Herbst ist der Laubegassen-Markt hier (auch Buch-Messe).",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Im Frühling und Herbst Märkte auf dem Platz."},
  {id:20,n:"Moritzbastei Underground Venue — Zentrum",a:"Zentrum",v:["night", "weird"],d:20,s:"A 16th-century fortress transformed into a club—dance in medieval stonework under vaults that saw actual wars.",st:"You descend into ancient fortification. Arches curve overhead. A DJ booth sits in a corner that\'s 500 years old. People dance in candlelit stone rooms. It\'s beautiful and weird and disorienting. Where are you, exactly? When are you?",im:"It\'s 1550. Soldiers defend this bastion. Now it\'s a dance floor. The stone remembers both.",t:"You descend into ancient fortification. Arches curve overhead. A DJ booth sits in a corner that\'s 500 years old. People dance in candlelit stone rooms. It\'s beautiful and weird and disorienting. Where are you, exactly? When are you?\",im:\"It\'s 1550. Soldiers defend this bastion. Now it\'s a dance floor. The stone remembers both.\",t:\"Free entry, concerts €15-25. Open Thursday-Saturday nights usually. Check schedule. Go late (11pm+) for the real crowd. It\'s on Universitätsstraße. Bring friends. The vibe is only good in groups.",c:["night", "architecture"],r:"g",nn:"Moritzbastei Underground Venue — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:21,n:"Weiße Elster River Paddle — Zentrum",a:"Zentrum",v:["nature", "beautiful"],d:21,s:"Kayak the river flowing through the center of Leipzig—it\'s peaceful, flowing past buildings and under bridges.",st:"The paddle is gentle, urban. You float past apartments, through a small forest section, under a medieval bridge. The water is clean. The perspective is different from the ground. It\'s moving meditation.",im:"It\'s 2000. The river was polluted, ugly, forgotten. Now it\'s restored. People kayak it on weekends. The river came back.",t:"The paddle is gentle, urban. You float past apartments, through a small forest section, under a medieval bridge. The water is clean. The perspective is different from the ground. It\'s moving meditation.\",im:\"It\'s 2000. The river was polluted, ugly, forgotten. Now it\'s restored. People kayak it on weekends. The river came back.\",t:\"Kayak rentals €15-25. Rental places on Universitätsstraße. Best April-October. 90-minute paddle round-trip. No experience needed, beginner-friendly. Go midweek for fewer people.",c:["nature", "beautiful"],r:"g",nn:"Weiße Elster River Paddle Ufer — Zentrum",ns:"Der Fluss—wo Stadt mit Wasser tanzt.",nst:"Du spazierst am Fluss-Ufer. Boote fahren vorbei, Menschen sitzen auf Steinen, Schwäne schwimmen. Der Fluss ist Puls der Stadt.",nt:"Kostenlos spazieren. Restaurants am Ufer €12-30. Bootsfahrten €10-20. Beste Zeit: Sommer ab 18 Uhr. Sonnenuntergang sehr schön."},
  {id:22,n:"Graphische Kunstanstalt Gallery — Südvorstadt",a:"Südvorstadt",v:["beautiful", "hidden"],d:22,s:"A printmaking studio and gallery where artists create on old presses—watch paper becoming art in real-time.",st:"The studio is active. Artists work at wood presses. Ink smells strong. Paper accumulates. It\'s not polished gallery space, it\'s a working studio you\'re invited into. You see mistakes and successes. You understand the labor.",im:"It\'s 1880. A printer sets up his press. It prints for 150 years. Now artists rent it for €5 an hour and create like it\'s still 1880. Some technologies never die.",t:"The studio is active. Artists work at wood presses. Ink smells strong. Paper accumulates. It\'s not polished gallery space, it\'s a working studio you\'re invited into. You see mistakes and successes. You understand the labor.\",im:\"It\'s 1880. A printer sets up his press. It prints for 150 years. Now artists rent it for €5 an hour and create like it\'s still 1880. Some technologies never die.\",t:\"Free to watch. €5-15 to try it yourself (workshops). Open weekday afternoons. Book ahead for workshops. It\'s real work, not a tourist performance. Go if you actually care about printing.",c:["beautiful", "local_only"],r:"g",nn:"Graphische Kunstanstalt Gallery Galerie — Südvorstadt",ns:"Kunstwerke and Geschichte—wo Schönheit lebt.",nst:"Die Galerie zeigt Kunstwerke von Künstlern (alt oder neu). Malerei, Skulptur, Installation. Jedes Werk hat Sinn. Es ist Denken visualisiert.",nt:"€6-15 Eintritt. Täglich 10-18 Uhr (Montag oft geschlossen, Mittwoch bis 21 Uhr). Audioguide kostenlos. Café oft vorhanden. Sehr zugänglich."},
  {id:23,n:"Neue Rathaus Tower Climb — Zentrum",a:"Zentrum",v:["high_spots", "beautiful"],d:23,s:"Climb the city hall tower for a 360-degree view and medieval roofscape spread below like a model train set.",st:"The stairs spiral up. You\'re inside a city building. Then you emerge on the tower top. The city expands below. Red-tile roofs, church spires, the forest beyond. It\'s a perfect viewpoint with zero tourists because most people don\'t know to climb it.",im:"It\'s 1905. The building is finished. A worker stands here watching the city he helped build. Now it\'s your turn.",t:"The stairs spiral up. You\'re inside a city building. Then you emerge on the tower top. The city expands below. Red-tile roofs, church spires, the forest beyond. It\'s a perfect viewpoint with zero tourists because most people don\'t know to climb it.\",im:\"It\'s 1905. The building is finished. A worker stands here watching the city he helped build. Now it\'s your turn.\",t:\"€5 entry. Open daily usually 10am-6pm. Takes 30 minutes to climb and enjoy. Go midweek for solitude. The view is genuine—no camera magic needed.",c:["high_spots", "architecture"],r:"g",nn:"Neue Rathaus Tower Climb Turm — Zentrum",ns:"Hoch und Aussicht—wo Stadt unter dir liegt.",nst:"Du steigst den Turm. Stufe für Stufe. Oben: Aussicht über Stadt. Berge, Flüsse, Landschaft. Dein Herz pocht. Deine Beine aua.",nt:"€3-8 Aufstieg. Täglich 9-18 Uhr (Winter kürzer). Treppen sind steil. Nicht für Höhenangst! Früh morgens kommen für leere Treppen. Aussicht spektakulär."},
  {id:24,n:"Kunstkofhaus Former Textile Factory Courtyard — Plagwitz",a:"Plagwitz",v:["beautiful", "weird"],d:24,s:"A factory courtyard where every available surface is painted with murals—the entire factory became one artwork.",st:"Walls burst with color. Murals of faces, abstracts, political messages. There\'s no \'main\' piece—every wall is equally alive. It\'s overwhelming and joyful. People work and live here amid the art. It\'s not in a museum, it\'s in a functioning space.",im:"It\'s 2008. Artists take an old factory. They transform it through art. Now it\'s a landmark. The factory remembers both its industrial life and its art rebirth.",t:"Walls burst with color. Murals of faces, abstracts, political messages. There\'s no \'main\' piece—every wall is equally alive. It\'s overwhelming and joyful. People work and live here amid the art. It\'s not in a museum, it\'s in a functioning space.\",im:\"It\'s 2008. Artists take an old factory. They transform it through art. Now it\'s a landmark. The factory remembers both its industrial life and its art rebirth.\",t:\"Free to walk through. It\'s in Plagwitz. Open anytime. Go during the day. Respect that people work here. Take photos. The energy is worth traveling for.",c:["street_art", "beautiful"],r:"g",nn:"Kunstkofhaus Former Textile Factory Courtyard — Plagwitz",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:25,n:"Grassi Museum of Applied Arts — Zentrum",a:"Zentrum",v:["beautiful", "history"],d:25,s:"A museum dedicated to craftsmanship—furniture, ceramics, metalwork—showing how everyday objects became art.",st:"The museum is quiet, high-ceilinged. Glass cases hold beautiful, useless objects. A 16th-century knife. A medieval bowl. A chair designed in 1920. You understand that beauty in utility is the highest art.",im:"It\'s 1400. A craftsman carves a wood object. It takes 200 hours. He\'s unknown. Now museums preserve his name. His hands made beauty that outlived him.",t:"The museum is quiet, high-ceilinged. Glass cases hold beautiful, useless objects. A 16th-century knife. A medieval bowl. A chair designed in 1920. You understand that beauty in utility is the highest art.\",im:\"It\'s 1400. A craftsman carves a wood object. It takes 200 hours. He\'s unknown. Now museums preserve his name. His hands made beauty that outlived him.\",t:\"€10 entry. Open Wed-Sun 10am-6pm. Go on a quiet Thursday afternoon. Spend 2 hours. It\'s peaceful, meditative. Bring a journal if you want to think about beauty.",c:["architecture", "history_big"],r:"g",nn:"Grassi Museum of Applied Arts Museum — Zentrum",ns:"Museum mit Sammlungen und Geschichte.",nst:"Du betrittst das Museum und siehst Kunstwerke, Artefakte, alte Dinge. Jedes Objekt erzählt eine Geschichte. Es ist Vergangenheit bewahrt für Gegenwart.",nt:"€6-12 Eintritt. Täglich 10-18 Uhr (Montag oft geschlossen). Audioguide kostenlos oder €3. Café im Gebäude. Plan 2 Stunden."},
  {id:26,n:"Monday Demonstrations Route — Zentrum",a:"Zentrum",v:["history", "beautiful"],d:26,s:"Walk the exact route the 1989 Monday demonstrations took—from Nikolaikirche through the streets where history happened.",st:"You walk these streets knowing 70,000 people walked them in the dark, carrying candles, chanting. The buildings remember. The streets remember. It\'s moving even now, even without crowds. You\'re walking through history as geography.",im:"It\'s October 1989. Tanks are positioned. The government is ready to kill. People come anyway. They carry candles and prayers. No shots are fired. The wall comes down because people refused fear.",t:"You walk these streets knowing 70,000 people walked them in the dark, carrying candles, chanting. The buildings remember. The streets remember. It\'s moving even now, even without crowds. You\'re walking through history as geography.\",im:\"It\'s October 1989. Tanks are positioned. The government is ready to kill. People come anyway. They carry candles and prayers. No shots are fired. The wall comes down because people refused fear.\",t:\"Free walk. Pick up a map from the tourist office (€2). Nikolaikirche is the start. Takes 60 minutes to walk it fully. Go thoughtfully, not as a jog. This is pilgrimage, not tourism.",c:["history_big", "beautiful"],r:"g",nn:"Monday Demonstrations Route — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:27,n:"Stadtgeschichte Museum — Zentrum",a:"Zentrum",v:["history", "hidden"],d:27,s:"A local history museum where you actually learn how ordinary Leipzigers lived—not grand history, but real life.",st:"Room after room shows daily life across centuries. A medieval kitchen. An 1800s apartment. What people actually ate, wore, owned. It\'s intimate and educational. The museum assumes you care about real life, not just dates.",im:"It\'s 1600. A family lives in a small house. They eat, sleep, work, love, die. Now you see their spoons, their bedframe, their city. History becomes human.",t:"Room after room shows daily life across centuries. A medieval kitchen. An 1800s apartment. What people actually ate, wore, owned. It\'s intimate and educational. The museum assumes you care about real life, not just dates.\",im:\"It\'s 1600. A family lives in a small house. They eat, sleep, work, love, die. Now you see their spoons, their bedframe, their city. History becomes human.\",t:\"€7 entry. Open Wed-Sun. Go on a quiet afternoon. Spend 2-3 hours. Bring a small notebook. The museum is thoughtfully done—no rushing.",c:["history_big", "local_only"],r:"g",nn:"Stadtgeschichte Museum Museum — Zentrum",ns:"Museum mit Sammlungen und Geschichte.",nst:"Du betrittst das Museum und siehst Kunstwerke, Artefakte, alte Dinge. Jedes Objekt erzählt eine Geschichte. Es ist Vergangenheit bewahrt für Gegenwart.",nt:"€6-12 Eintritt. Täglich 10-18 Uhr (Montag oft geschlossen). Audioguide kostenlos oder €3. Café im Gebäude. Plan 2 Stunden."},
  {id:28,n:"Drewsen Park Quiet Escape — West",a:"West",v:["nature", "quiet"],d:28,s:"A smaller park where Leipzigers actually rest—nobody here, no tourists, just locals reading and sleeping on grass.",st:"The park is green, hilly, with a small lake. A man reads a book nobody\'s heard of. Someone\'s taking a nap. A parent watches kids on a playground. It\'s purely functional, purely local. It\'s where Leipzig lives when not observed.",im:"It\'s any afternoon. Same park, same quiet, same relief from the world.",t:"The park is green, hilly, with a small lake. A man reads a book nobody\'s heard of. Someone\'s taking a nap. A parent watches kids on a playground. It\'s purely functional, purely local. It\'s where Leipzig lives when not observed.\",im:\"It\'s any afternoon. Same park, same quiet, same relief from the world.\",t:\"Free. It\'s west of the center—tram 7 or 8. Go on a sunny afternoon. Bring a book. Stay for 2 hours doing nothing. This is the point.",c:["parks", "quiet"],r:"g",nn:"Drewsen Park Quiet Escape Park — West",ns:"Grün und Bäume—wo Stadt atmet.",nst:"Der Park ist groß mit Bäumen und Plätzen zum Sitzen. Menschen joggen, Kinder spielen, Paare küssen. Es ist Natur in Stadt.",nt:"Kostenlos. Überall zugänglich. Beste Zeit: Sommer ab 18 Uhr. Biergärten oder Cafés oft im Park. Picnic-freundlich. Entspannung pur."},
  {id:29,n:"Bach\'s Publishing House — Zentrum",a:"Zentrum",v:["history", "hidden"],d:29,s:"A small house where Bach\'s works were published and sold—now a museum for the deepest music nerds.",st:"The rooms are small, intimate. First editions. Manuscripts. It\'s not popular because most people don\'t care about 17th-century music printing. The few who do find paradise. The museum respects your knowledge.",im:"It\'s 1750. A publisher holds sheets of paper that are the most complex music ever written. He has no idea. Now we know. The sheets are preserved like holy relics.",t:"The rooms are small, intimate. First editions. Manuscripts. It\'s not popular because most people don\'t care about 17th-century music printing. The few who do find paradise. The museum respects your knowledge.\",im:\"It\'s 1750. A publisher holds sheets of paper that are the most complex music ever written. He has no idea. Now we know. The sheets are preserved like holy relics.\",t:\"€6 entry. Open Wed-Sun 10am-5pm. Small, uncrowded, peaceful. Perfect if you care about music and history. Skip if neither. Go on a Thursday when it\'s quietest.",c:["history_big", "hidden"],r:"g",nn:"Bach\'s Publishing House — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:30,n:"Rosa-Luxemburg-Platz Protest Memory — Zentrum",a:"Zentrum",v:["history", "beautiful"],d:30,s:"A square named for a revolutionary—the city preserved the name to remember dissent, resistance, hope.",st:"The square is ordinary now but the name carries weight. Rosa Luxemburg was assassinated. The city named a square for her anyway. That\'s powerful. It says: we remember the resisters.",im:"It\'s 1920. Luxemburg is murdered by paramilitaries. The city pretends it didn\'t happen. In 1960, they name a square for her. Memory fights forgetting.",t:"The square is ordinary now but the name carries weight. Rosa Luxemburg was assassinated. The city named a square for her anyway. That\'s powerful. It says: we remember the resisters.\",im:\"It\'s 1920. Luxemburg is murdered by paramilitaries. The city pretends it didn\'t happen. In 1960, they name a square for her. Memory fights forgetting.\",t:\"Free. It\'s in Zentrum. Sit and think. Read about Rosa. Understand that some squares are more than space—they\'re statements.",c:["history_big", "architecture"],r:"g",nn:"Rosa-Luxemburg-Platz Protest Memory Platz — Zentrum",ns:"Zentral und belebt—Herz der Stadt.",nst:"Der Platz ist pulsierend. Brunnen, Restaurants, Menschen von überall. Es ist wo City trifft. Du gehörst sofort dazu.",nt:"Kostenlos spazieren. Restaurants €12-25. Cafés €3-6. Beste Zeit: Abend wenn Lichter an. Märkte gelegentlich auf Platz. Sehr touristisch aber authentisch."},

,{id:121,n:"Secret Passages Crawl",a:"Zentrum",v:["hidden"],d:20,s:"Hop through Leipzig’s enchanting hidden shopping passages like a time-traveling treasure hunter!",st:"Wander into shadowy courtyards where Gründerzeit ghosts whisper through ornate glass roofs. These forgotten tunnels pulse with romantic mystery, perfect for rainy-day adventures. Feel the city's heartbeat in these secret veins.",im:"Imagine slipping through a dimly lit archway into a glittering atrium, rain pattering on the roof as you uncover a lost world of elegant shops frozen in time.",t:"Start at Mädler Passage (Grimmaische Str. 2–4), hit Specks Hof (15), Strohsack (Nikolaistraße 10), Steibs Hof (28–32), Oelßner’s (20–22), Peters Hof (20). Free entry, best early morning for empty photo ops or dusk for moody lights. Walkable from Hauptbahnhof.",c:["architecture", "hidden"],r:"g",nn:"Geheime Passagen-Spaziergang",ns:"Hüpfe durch Leipzigs verzauberte versteckte Einkaufspassagen wie ein Zeitreisender!",nst:"Schlendere in schattige Höfe, wo Gründerzeit-Geister durch ornamentierte Glasdächer flüstern. Diese vergessenen Tunnel pulsieren mit romantischem Geheimnis, perfekt für Regentagsabenteuer. Spüre den Puls der Stadt in diesen geheimen Adern.",nt:"Starte bei Mädler Passage (Grimmaische Str. 2–4), dann Specks Hof (15), Strohsack (Nikolaistraße 10), Steibs Hof (28–32), Oelßners Hof (20–22), Peters Hof (20). Kostenloser Eintritt, am besten frühmorgens für leere Foto-Momente oder Dämmerung für stimmungsvolle Lichter. Zu Fuß vom Hauptbahnhof erreichbar."},
{id:122,n:"Elsterflutbett Riverside Walk",a:"Südvorstadt",v:["hidden"],d:20,s:"Escape to wild riverbed trails for epic sunset picnics on Leipzig’s untamed edge!",st:"Trace the flood paths where the Weiße Elster spills secrets into semi-wild greenery. Long, looping strolls feel like fleeing the urban jungle into nature’s raw embrace. Locals’ hidden hack for that 'we ditched the city' rush.",im:"Picture golden hour painting the rippling waters as you sprawl on a secret meadow, city skyline fading into wild whispers.",t:"Access from Connewitz or Südvorstadt bridges, follow paths along the floodbed. Totally free, prime for sunsets or picnics. Pair with nearby Völkerschlachtdenkmal park.",c:["parks", "rivers"],r:"g",nn:"Elsterflutbett Uferweg",ns:"Flieh zu wilden Flussbett-Pfaden für epische Sonnenuntergang-Picknicks am Rande Leipzigs!",nst:"Folge den Flutpfaden, wo die Weiße Elster Geheimnisse in halbwildes Grün flüstert. Lange, schleifende Spaziergänge fühlen sich an wie eine Flucht aus dem Stadtteil in die rohe Natur. Lokaler Geheimtipp für den 'wir haben die Stadt hinter uns gelassen'-Kick.",nt:"Von Connewitz- oder Südvorstadt-Brücken zugänglich, Pfade entlang des Flutbetts folgen. Vollkommen kostenlos, ideal für Sonnenuntergänge oder Picknicks. Kombiniere mit Völkerschlachtdenkmal-Park."},
{id:123,n:"Johannapark Japanese Bridge & Lake Loop",a:"Zentrum-Nord",v:["hidden"],d:15,s:"Discover a surprise Japanese-style bridge and serene lake loop in the heart of town!",st:"Stumble upon this pocket of zen amid urban buzz—a wooden arch over shimmering waters. Golden hour turns it into a romantic postcard, far from tourist trails. Your secret city oasis awaits.",im:"Envision crossing the delicate wooden bridge at dusk, lanterns flickering over the tranquil lake like a slice of Kyoto snuck into Leipzig.",t:"Enter Johannapark from Grassistraße, loop the lake to the bridge. Free always, best late afternoon for light magic. Tram 8/10 from center.",c:["parks"],r:"g",nn:"Johannapark Japanische Brücke & See-Runde",ns:"Entdecke eine überraschende japanische Brücke und ruhige See-Runde mitten in der Stadt!",nst:"Stoße auf diese Zen-Tasche inmitten des Stadttrubels – ein hölzernes Bogen über schimmerndes Wasser. Goldene Stunde macht daraus eine romantische Postkarte, fernab Touristenpfade. Deine geheime Stadt-Oase wartet.",nt:"Johannapark von Grassistraße betreten, See umrunden zur Brücke. Immer kostenlos, am besten spätnachmittags für Lichtzauber. Tram 8/10 aus dem Zentrum."},
{id:124,n:"Südfriedhof Gothic Cemetery Wander",a:"Südvorstadt",v:["hidden"],d:25,s:"Roam Leipzig’s massive romantic-gothic 'park-cemetery' for hauntingly peaceful vibes!",st:"Vast paths wind through ancient tombs like a gothic novel come alive. Locals swear it’s the city’s most soul-stirring spot for meditative drifts. Quiet beauty hides in every shadowed corner.",im:"Feel goosebumps trailing ivy-cloaked mausoleums under a misty sky, time slipping away in eternal hush.",t:"Enter at Prinz-Eugen-Straße gate, wander freely. Free 24/7, dawn/dusk for atmosphere. Near Völkerschlachtdenkmal, tram 8 from center.",c:["parks"],r:"g",nn:"Südfriedhof Gotischer Friedhofsspaziergang",ns:"Schweife durch Leipzigs riesigen romantisch-gotischen 'Park-Friedhof' für unheimlich friedliche Vibes!",nst:"Weite Pfade schlängeln durch alte Grüfte wie ein gotischer Roman zum Leben erweckt. Einheimische schwören, es sei der seelenrührendste Fleck der Stadt für meditative Streifzüge. Stille Schönheit lauert in jedem schattigen Winkel.",nt:"Eingang Prinz-Eugen-Straße, frei herumlaufen. Kostenlos rund um die Uhr, Dämmerung für Atmosphäre. Nah am Völkerschlachtdenkmal, Tram 8 aus Zentrum."},
{id:125,n:"Lindenauer Markt Weekly Wander",a:"Lindenau",v:["hidden"],d:15,s:"People-watch like a local at this vibrant westside market—free 'museum' of street life!",st:"Bustling stalls overflow with fresh bites and chatter under Leipzig’s industrial sky. Even window-shopping feels like diving into neighborhood soul. Grab a cheap pastry for the full immersive vibe.",im:"Breathe in the chaos of vendors haggling over gleaming produce, laughter echoing off graffiti walls.",t:"Wed/Fri mornings at Lindenauer Markt, Karl-Heine-Straße. Free to roam, tram 8/10 from center. Almost free and worth it: fresh pastry, ~1€.",c:["markets"],r:"g",nn:"Lindenauer Wochenmarkt-Spaziergang",ns:"Menschen beobachten wie ein Einheimischer auf diesem lebendigen Westseiten-Markt – kostenloses 'Museum' des Straßenlebens!",nst:"Tobende Stände quellen über vor frischen Bissen und Geplauder unter Leipzigs Industriehimmel. Schon Schaufenster-Schauen fühlt sich wie ein Tauchgang in die Nachbarschaftsseele an. Schnapp dir ein günstiges Gebäck für den vollen Immersions-Vibe.",nt:"Mi/Fr vormittags am Lindenauer Markt, Karl-Heine-Straße. Frei herumlaufen, Tram 8/10 aus Zentrum. Fast kostenlos und lohnenswert: frisches Gebäck, ~1€. ef: Nearby Lidl bakery rolls for DIY snacks."},
{id:126,n:"Kulkwitzer See Wild Swim Spot",a:"Southwest",v:["hidden"],d:30,s:"Dive into this crystal-clear lake’s underwater park—broke adventurer’s wild water paradise!",st:"Edge-of-city gem with top water quality and sunken mysteries for free swimmers. Locals flock for that raw, refreshing plunge. Sun-soaked shores beg for lazy floats and hidden dives.",im:"Submerge into turquoise depths, brushing past submerged sculptures in your personal aquatic wonderland.",t:"S-Bahn to Markkleeberg, then 20min walk/bike to lake. Swim free, best summer weekdays to avoid crowds. Gear rental extra if needed.",c:["lakes"],r:"g",nn:"Kulkwitzer See Wilder Badespot",ns:"Tauch ein in diesen kristallklaren See mit Unterwasserpark – Paradies für abgebrannte Abenteurer!",nst:"Stadtnaher Schatz mit Top-Wasserqualität und versunkenen Mysterien für freie Schwimmer. Einheimische strömen für den rohen, erfrischenden Sprung herbei. Sonnegetränkte Ufer laden zu faulen Treibern und geheimen Tauchgängen ein.",nt:"S-Bahn nach Markkleeberg, dann 20min zu Fuß/Fahrrad zum See. Schwimmen kostenlos, beste Sommertage unter der Woche gegen Massen. Ausrüstung extra falls nötig."}];

<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Leipzig Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Leipzig Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
