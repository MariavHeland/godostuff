<script>
const P = [
  {id:1,n:"Bukchon Hanok Village Backalleys",a:"Bukchon",v:["hidden", "history"],d:10,s:"Skip the main streets — the real village is in the narrow passages between wooden houses",st:"Before Instagram discovered Bukchon, this hillside village was just quiet residential hanok homes built in the Joseon era. Today the backalleys remain untouched, connecting dozens of hundred-year-old wooden houses with tile roofs and stone walls. You walk through time here.",im:"A woman in traditional dress feeds cats on a stone doorstep in morning light, while a neighbor hangs persimmons to dry on a rack.",t:"Metro Line 3 to Anguk station, exit 2. Free to walk. Best 7am-8am before crowds arrive. Expect uneven stone paths. Two hours to explore properly.",c:["history_big"],r:"g",nn:"북촌 한옥 마을",ns:"조용한 골목에서 느끼는 옛날 서울",nst:"북촌은 조선시대부터 지어진 목조 가옥들로 이루어진 작은 마을입니다. 대부분의 관광객은 유명한 길만 가지만, 진짜 북촌은 좁은 골목길 사이에 있습니다. 여기서는 100년 된 목조 건물들이 그대로 남아 있고, 주민들의 일상이 계속됩니다.",nt:"3호선 안국역 2번 출구에서 가면 됩니다. 무료입니다. 아침 7시에 가는 것이 가장 좋습니다. 2시간이 필요합니다."},
  {id:2,n:"Ikseon-dong Bar Alley",a:"Ikseon-dong",v:["hidden", "weird", "night"],d:8,s:"A block of hanok homes converted into tiny bars where Seoul's creatives and expats hide",st:"This narrow alley was discovered by young bartenders in 2018 and has stayed small on purpose. Each bar occupies a single hanok room, maybe seating six people at a cramped counter. Soju bottles line wooden shelves, lanterns hang from old beams, and nobody tries too hard. It is exactly what happened when minimalist bar culture met a 1950s residential street.",im:"A jazz record crackles through a tiny speaker while a bartender in a wool sweater shakes cocktails one drink at a time in front of three regular patrons.",t:"Metro Line 1 or 3 to Jongno 3-ga, walk east 10 minutes. Bars open 6pm-2am. Budget 15,000-30,000 KRW per drink. No signs, locals will point you.",c:["local_only"],r:"y",nn:"익선동 바골목",ns:"조용한 한옥 골목의 숨겨진 바들",nst:"익선동은 한옥 집들이 작은 바로 개조된 골목입니다. 2018년경부터 서울의 젊은 바텐더들이 발견했고, 지금도 작고 조용합니다. 각 바는 한옥 한 칸 정도의 크기이고, 최대 6명 정도만 앉을 수 있습니다. 이 거리의 분위기는 과장되지 않은 자연스러움 자체입니다.",nt:"1호선이나 3호선 종로3가역에서 가면 됩니다. 오후 6시부터 새벽 2시까지 영업합니다. 음료는 15,000-30,000원 정도입니다."},
  {id:3,n:"Euljiro Printing and Metalwork District",a:"Euljiro",v:["history", "weird", "local"],d:12,s:"A 1970s metal-working street that time forgot, where blacksmiths and printers still work",st:"Euljiro is Seoul's oldest industrial corridor, built in the 1960s-70s. It is lined with metal shops, letterpress print studios, and foundries. Most streets in Seoul got redeveloped, but here nothing changed. Neon signs still glow over cramped storefronts selling brass fittings, copper plates, and handmade type. The machines inside sound like 1975.",im:"A man in an apron hammers a sheet of copper by hand, sparks flying, while the smell of hot metal and old oil fills the narrow street.",t:"Metro Line 2 to Dongdaemun History and Culture Park, exit 5. Walk west 5 minutes. Free to walk. Open 9am-6pm mostly. Best on weekdays. Two hours to explore.",c:["history_big"],r:"g",nn:"을지로 금속 및 인쇄 지구",ns:"1970년대가 그대로 남은 공업 거리",nst:"을지로는 1960-70년대 지어진 서울의 가장 오래된 공업 지구입니다. 금속 가게, 활판인쇄소, 주물소들이 줄지어 있습니다. 서울의 대부분의 거리는 재개발되었지만, 을지로는 변하지 않았습니다. 여전히 오래된 네온사인이 반짝이고, 손수 만든 타입 활자와 구리판을 파는 가게들이 있습니다.",nt:"2호선 동대문 역사 문화공원역에서 가면 됩니다. 서쪽으로 5분 정도 걸어가면 됩니다. 무료입니다. 평일에 가는 것이 가장 좋습니다."},
  {id:4,n:"Mullae-dong Art Studio District",a:"Mullae",v:["weird", "local", "beautiful"],d:10,s:"Seoul's Brooklyn: a former factory zone where artists squatted and built a creative village",st:"Mullae-dong was a metalwork factory zone until artists began occupying empty warehouses in the late 2000s. Now it is galleries, cafes, and studios inside brick industrial buildings. The vibe is graffiti, exposed pipes, and gallery openings at night. It is intentionally undiscovered and stays that way because locals protect it.",im:"An artist in a leather apron welds a metal sculpture in a warehouse loft while another sits at a coffee counter beneath a 20-meter brick wall with a mural.",t:"Metro Line 2 to Mullae, exit 4. Walk southwest 10 minutes. Free to walk. Galleries open 11am-6pm. Coffee shops open 8am. One afternoon minimum.",c:["street_art"],r:"y",nn:"물래동 예술 스튜디오 지구",ns:"서울의 가장 창의적인 공업지역",nst:"물래동은 2000년대 후반까지 금속 공장 지역이었습니다. 그 후 예술가들이 버려진 창고를 차지하기 시작했고, 지금은 갤러리, 카페, 스튜디오로 가득합니다. 벽화, 노출된 파이프, 밤의 갤러리 오픈 같은 것들이 이곳의 특징입니다.",nt:"2호선 물래역 4번 출구에서 가면 됩니다. 남서쪽으로 10분 정도 걸어가면 됩니다. 무료입니다. 갤러리는 오전 11시부터 오후 6시까지 영업합니다."},
  {id:5,n:"Namsan Beacon Fires Hill Walk",a:"Namsan",v:["free", "history", "quiet"],d:20,s:"A forested hill with ancient beacon fire towers and 360-degree Seoul views, completely free",st:"Namsan was where Joseon dynasty soldiers lit signal fires to communicate across the kingdom. The towers are gone, but the hill is still covered in pine forest and hiking paths. Sunrise here means you watch Seoul wake up from above, the city coming alive in layers below. The solitude is profound at dawn.",im:"The sun breaks through pine trees while the city lights switch off like candles being snuffed, and the fortress walls of the old city emerge in gray stone below.",t:"Metro Line 3 to Chungmuro, exit 2. Walk uphill 20 minutes to reach the summit path. Free. No facilities. Bring water. Best 5:30am-7:30am. One to two hours.",c:["history_big"],r:"g",nn:"남산 봉수대 길",ns:"서울을 내려다보는 자유로운 산책로",nst:"남산은 조선시대 군인들이 신호불을 밝히던 산입니다. 봉수대는 사라졌지만, 산은 여전히 소나무 숲으로 덮여 있고, 하이킹 길이 많습니다. 새벽에 올라가면 서울이 깨어나는 장면을 위에서 볼 수 있습니다.",nt:"3호선 충무로역 2번 출구에서 올라가면 됩니다. 정상까지 20분 정도 걸립니다. 무료입니다."},
  {id:6,n:"Gyeongbokgung Palace at Dawn",a:"Gwanghwamun",v:["history", "quiet", "beautiful"],d:25,s:"The royal palace of the Joseon kings, walked alone before the tour buses arrive",st:"Gyeongbokgung was built in 1395 and held Joseon power for 500 years. The palace grounds span 40 hectares of gates, halls, and courtyards. Visit at 6am when it opens and you walk through empty buildings, seeing how the palace actually functioned. By 10am it is a sea of organized tour groups.",im:"A woman in a silk hanbok dress walks across the stone courtyard of Geunjeongjeon, the throne hall, while the bronze bells above her stand silent and waiting for a king who never returns.",t:"Metro Line 3 to Gyeongbokgung, exit 5. Opens 9am but go at 6am for an earlier gate. Entry 3,000 KRW. Audio guide included. Two to three hours.",c:["history_big"],r:"y",nn:"경복궁 새벽 방문",ns:"조선의 왕들이 머물던 궁전",nst:"경복궁은 1395년에 지어졌고, 500년 동안 조선의 권력 중심이었습니다. 40헥타르의 넓은 지역에 궁전, 정원, 연못이 있습니다. 새벽 6시에 가면 거의 아무도 없고, 궁전의 진정한 모습을 볼 수 있습니다.",nt:"3호선 경복궁역 5번 출구에서 가면 됩니다. 오전 9시에 열리지만 더 일찍 가고 싶으면 6시에 문을 열도록 요청할 수 있습니다. 입장료는 3,000원입니다."},
  {id:7,n:"Seongsu-dong Disused Factories Turned Cafes",a:"Seongsu",v:["weird", "local", "beautiful"],d:15,s:"Seoul's Brooklyn moment: old textile and machine factories now house coffee roasters and galleries",st:"Seongsu was an industrial zone built in the 1960s for textile mills and machine parts manufacturing. By the 2010s the factories closed and artists moved in. Today a single block has five craft coffee shops inside factory buildings, galleries, and vintage shops. The high ceilings, exposed brick, and industrial bones of the old machines remain visible.",im:"A barista pours single-origin Ethiopian coffee into a ceramic cup made on the floor above, while the original factory name still glows in faded paint on the century-old brick wall behind her.",t:"Metro Line 2 to Seongsu, exit 1. Walk east 5 minutes. Free to wander. Coffee shops 8am-8pm. Sunday brunch is busy. Plan three hours.",c:["local_only"],r:"y",nn:"성수동 공장 전환 카페",ns:"옛날 공장이 변신한 창의적인 공간",nst:"성수동은 1960년대에 지어진 섬유 공장 지역입니다. 2010년대에 공장이 문을 닫으면서 예술가들이 들어왔습니다. 지금은 오래된 공장 건물 안에 커피 로스터, 갤러리, 빈티지 숍이 있습니다.",nt:"2호선 성수역 1번 출구에서 가면 됩니다. 동쪽으로 5분 걸어가면 됩니다. 무료입니다. 카페는 오전 8시부터 오후 8시까지 영업합니다."},
  {id:8,n:"Cheonggyecheon Stream Urban Walk",a:"Jongno",v:["history", "free", "beautiful"],d:60,s:"A 6km restored stream cutting through downtown Seoul, built over in the 1960s and reopened in 2005",st:"Cheonggyecheon was Seoul's main waterway for 600 years. It was covered in concrete in 1963 and became a highway. In 2005 the government removed the highway and exposed the stream again. Now you walk from the mountains of Bukhansan all the way to the Han River following water and native plants. The stream corridor is the city's cool lung.",im:"Water moves over smooth stones while kingfishers dive for fish and a child in a pink coat crouches to touch the current, the city noise fading to only the sound of running water.",t:"Metro Line 2 to City Hall, exit 5. Stream starts at Gwanghwamun. Walk south anytime. Free. Varies 8am-11pm by season. Full walk is 6 hours, but sections are perfect for 30 minutes.",c:["parks"],r:"g",nn:"청계천 산책로",ns:"서울 중심을 흐르는 복원된 시내",nst:"청계천은 600년 동안 서울의 주요 수로였습니다. 1963년에 콘크리트로 덮여 도로가 되었습니다. 2005년 정부가 도로를 제거하고 다시 개방했습니다. 지금은 북한산 산에서부터 한강까지 물을 따라 걸을 수 있습니다.",nt:"2호선 시청역 5번 출구에서 가면 됩니다. 광화문에서 시작합니다. 언제든지 무료로 걸을 수 있습니다."},
  {id:9,n:"Naksan Park and Old City Wall Walk",a:"Jongno",v:["history", "free", "beautiful"],d:18,s:"A hilltop park with restored sections of the 600-year-old fortress wall that protected Joseon Seoul",st:"The wall that surrounded Joseon-era Seoul is nearly gone, demolished by occupying powers and urban development. But Naksan Park preserves the eastern section. You walk along the original stone wall, 6 meters tall in places, past gates and beacon towers. The city sprawls below, unchanged from what medieval sentries saw.",im:"A jogger passes the moss-covered stone wall as afternoon light slants across ancient bricks, and a family photographs themselves with the city skyline visible between the wall and treetops.",t:"Metro Line 1 or 4 to Dongdaemun, exit 8. Walk to Naksan Park entrance. Free. Open sunrise-sunset. One to two hours on the wall. Best late afternoon.",c:["history_big"],r:"g",nn:"낙산공원 성곽길",ns:"조선시대 성벽의 옛날 모습",nst:"조선시대 서울을 둘러싼 성벽은 대부분 사라졌습니다. 그러나 낙산공원에는 동쪽 구간이 남아 있습니다. 600년 된 돌로 만든 성벽을 따라 걸을 수 있습니다.",nt:"1호선이나 4호선 동대문역 8번 출구에서 낙산공원으로 가면 됩니다. 무료입니다. 해 뜨는 시간부터 해 지는 시간까지 열려 있습니다."},
  {id:10,n:"Ihwa Mural Village",a:"Jongno",v:["history", "street_art", "beautiful"],d:12,s:"A hillside village covered in murals and street art, rising from Naksan Park",st:"Ihwa sits on the slope below Naksan where the city wall protected a residential neighborhood. In 2006 it became an art village, with local artists and the community painting the steep alleyways. Hundreds of murals now cover the walls. It is both a tourist photo spot and genuinely creative.",im:"Two children walk past a five-story-tall mural of a woman's face painted on a residential building, while flowers grow from window boxes on the building next to it.",t:"Metro Line 4 to Hyehwa, exit 2. Climb the stairs 15 minutes to the village. Free. Open anytime. One to two hours. Avoid midday crowds.",c:["street_art"],r:"g",nn:"이화 벽화 마을",ns:"골목을 채운 예술과 벽화",nst:"이화는 낙산공원 아래 비탈에 있습니다. 2006년부터 예술 마을로 변했고, 지역 예술가들이 골목을 칠했습니다. 지금은 수백 개의 벽화가 있습니다.",nt:"4호선 혜화역 2번 출구에서 계단을 15분 올라가면 됩니다. 무료입니다."},
  {id:11,n:"Haengjung-dong Market",a:"Jongno",v:["local", "free"],d:8,s:"A tiny neighborhood market where locals buy vegetables, where time moved slowly since 1960",st:"Haengjung-dong is a single-block market built in 1960 for residential vegetables and street food. It is free from corporate touches and tourist language. Vendors sit at the same stalls their parents ran. You buy vegetables from grandmother vendors and eat tteokbokki at communal standing tables. This is how Seoul fed itself before department stores.",im:"An elderly woman arranges persimmons in neat rows on a stall while the smell of red pepper paste and simmering tteokbokki drifts through the covered market and creates a haze.",t:"Metro Line 1 to Jongno 5-ga, walk east 5 minutes. Open 9am-6pm mostly. Free to walk. Eat for 3,000-8,000 KRW. 30 minutes.",c:["local_only"],r:"g",nn:"행정동 시장",ns:"서울 주민들의 일상이 남아 있는 시장",nst:"행정동은 1960년에 지어진 작은 시장입니다. 지금도 할머니 상인들이 같은 자리에서 장을 봅니다. 여기서 야채를 사고 떡볶이를 먹을 수 있습니다.",nt:"1호선 종로5가역에서 동쪽으로 5분 걸어가면 됩니다. 오전 9시부터 오후 6시까지 영업합니다."},
  {id:12,n:"Mapo Bridge and Hangang River Parks",a:"Mapo",v:["free", "beautiful", "quiet"],d:30,s:"Vast riverside parks with bike paths, beaches, and sunset views over the Han River",st:"The Han River is Seoul's green spine, 41km of parks and paths. The Mapo section includes sandy beaches, picnic areas, and bike rentals. Families, joggers, and cyclists move slowly along tree-lined paths while the water stays calm. Sunset turns the water gold. This is Seoul at rest.",im:"A couple sits on a blanket watching the sun lower while orange light reflects off the water, and in the background the city glows with early evening neon and office lights.",t:"Metro Line 2 to Mapo-gu Office, exit 1. Walk to riverside. Free to enter. Bike rental 2,000 KRW/hour. Open dawn-midnight. Two to four hours.",c:["parks", "romantic_water"],r:"g",nn:"마포 대교와 한강 공원",ns:"서울이 쉬는 곳",nst:"한강은 서울의 녹색 척추입니다. 마포 구간에는 모래 해변, 소풍 구역, 자전거 대여소가 있습니다. 이곳은 서울이 쉬는 곳입니다.",nt:"2호선 마포구청역 1번 출구에서 강으로 가면 됩니다. 무료입니다. 자전거 대여는 시간당 2,000원입니다."},
  {id:13,n:"War Memorial of Korea",a:"Yongsan",v:["history", "free", "local"],d:20,s:"A massive free museum of Korean military history: 30,000 artifacts, war machines, and stories",st:"The War Memorial covers Korea's entire military history from ancient times to the Korean War. The building alone is enormous, holding tanks, planes, naval vessels, and personal equipment of soldiers. The Korean War section is especially dense. No typical museum audio — you read Korea's perspective on its own wars. This is substantial and heavy.",im:"A diorama shows soldiers in frozen positions during winter, while the sound of wind and distant gunfire plays, and the faces of ordinary men in wool uniforms stare ahead toward an enemy you cannot see.",t:"Metro Line 1 to Samgakji, exit 12. Walk 10 minutes. Free entry. Closed Mondays. Open 10am-6pm. Plan four hours minimum.",c:["history_big"],r:"g",nn:"전쟁 기념관",ns:"한국 군사 역사의 대규모 박물관",nst:"전쟁 기념관은 한국의 모든 군사 역사를 다룹니다. 건물은 거대하고, 탱크, 비행기, 해군 함선, 군인의 개인 물건 등을 소장하고 있습니다. 특히 한국 전쟁 구간은 매우 밀도가 높습니다.",nt:"1호선 삼각지역 12번 출구에서 가면 됩니다. 10분 정도 걸어가면 됩니다. 무료입니다. 월요일 휴무입니다. 오전 10시부터 오후 6시까지 열려 있습니다."},
  {id:14,n:"Insadong Traditional Craft Street",a:"Insadong",v:["history", "local"],d:12,s:"A pedestrian street of traditional art galleries, antique shops, and tea houses",st:"Insadong is a narrow pedestrian street lined with art galleries, traditional crafts shops, and old tea houses. It has become partially touristy but the east side still holds antique book dealers, calligraphy studios, and genuine craftspeople. The street is old Seoul preserved but slightly commercialized.",im:"An old man sits in a tea house window practicing calligraphy with a brush made from horse hair, the ink black and concentrated, while tourists pass by looking at overpriced paintings.",t:"Metro Line 1 to Jongno 3-ga, exit 5. Street is car-free. Open anytime. Galleries 10am-6pm. Tea houses 10am-10pm. Two hours.",c:["local_only"],r:"y",nn:"인사동 전통 공예 거리",ns:"전통 미술과 수공예의 거리",nst:"인사동은 미술 갤러리, 전통 공예점, 다과집이 있는 보행자 거리입니다. 관광객들로 조금 붐비지만, 동쪽에는 여전히 오래된 책 딜러, 서예 스튜디오, 진정한 장인들이 있습니다.",nt:"1호선 종로3가역 5번 출구에서 가면 됩니다. 거리는 자동차가 없습니다. 갤러리는 오전 10시부터 오후 6시까지 열려 있습니다."},
  {id:15,n:"Seoul Station 1925 Building",a:"Jung",v:["history", "architecture"],d:8,s:"A colonial-era train station from 1925 designed by Japanese architects, now restored",st:"Seoul Station opened in 1925 during Japanese occupation and was designed in the Beaux-Arts style. The building survived 100 years and was restored to its original cream and red brick aesthetic. You can walk through the original ticket halls, see the waiting rooms, and feel the scale of a colonial-era transportation hub. The building itself is the monument.",im:"A woman in a gray coat crosses the polished marble floor beneath the massive coffered ceiling while steam from a waiting train drifts past classical columns.",t:"Metro Line 1 to Seoul Station. Station opens 5am-midnight. Free to enter and explore ground floor. Climb one flight for better views. 30 minutes.",c:["architecture"],r:"g",nn:"서울역 1925년 건물",ns:"100년 된 기차역의 건축",nst:"서울역은 1925년에 일본 건축가가 설계한 식민지 시대의 건물입니다. Beaux-Arts 양식으로 지어졌고, 최근에 복원되었습니다. 이제 원래 크림색과 적색 벽돌로 복원되어 있습니다.",nt:"1호선 서울역에서 바로 갈 수 있습니다. 역은 오전 5시부터 자정까지 열려 있습니다. 무료입니다."},
  {id:16,n:"Dongdaemun Design Plaza",a:"Dongdaemun",v:["beautiful", "architecture"],d:10,s:"A futuristic curved building by Zaha Hadid, free to walk around, costs nothing to see the design",st:"The Dongdaemun Design Plaza opened in 2014 as a showcase for Korean design and fashion. Designed by the late Zaha Hadid, it is a continuous curved structure with no corners, undulating like a landscape. The exterior is free to photograph and walk around. Inside exhibitions cost money, but the building itself is the exhibition.",im:"The curved white and silver exterior catches late afternoon sun, creating flowing shadows that change every meter, while a child runs along the building perimeter unable to find where one side ends.",t:"Metro Line 2 to Dongdaemun History and Culture Park, exit 1. Open anytime outside. Free exterior. Inside exhibitions 10am-8pm. 30 minutes outside.",c:["architecture"],r:"g",nn:"동대문 디자인 플라자",ns:"자하 하디드가 설계한 미래식 건물",nst:"동대문 디자인 플라자는 2014년에 한국 디자인과 패션을 선보이기 위해 지어졌습니다. 자하 하디드가 설계했고, 모서리가 없는 연속 곡선 구조입니다.",nt:"2호선 동대문 역사 문화공원역 1번 출구에서 가면 됩니다. 바깥쪽은 무료입니다. 내부 전시회는 오전 10시부터 오후 8시까지 열려 있습니다."},
  {id:17,n:"Changdeokgung Secret Garden",a:"Jongno",v:["history", "beautiful", "quiet"],d:20,s:"UNESCO palace with a secret garden of ponds and pavilions used by concubines and royals",st:"Changdeokgung was the second royal palace of Joseon, built in 1405. The Secret Garden, the Biwon, was the private space for concubines and family. It contains ponds, pavilions, gardens, and walking paths hidden from the public eye for 500 years. The garden is smaller and more intimate than the main palace. Guided tours only, limited daily.",im:"A narrow wooden bridge spans a still pond surrounded by ancient pine trees, while a woman in period dress walks the bridge in silence and birds call from the canopy.",t:"Metro Line 1, 3, or 5 to Anguk, exit 3. Garden requires guided tour. Reserve online. Tours 10am-4pm. Entry 25,000 KRW. 90 minutes guided. English tours available.",c:["history_big"],r:"y",nn:"창덕궁 비원",ns:"왕족이 살던 비밀 정원",nst:"창덕궁은 1405년에 지어진 조선의 두 번째 궁전입니다. 비원은 왕족과 후궁들의 비공개 공간이었습니다. 연못, 정자, 정원, 산책로가 있습니다.",nt:"1호선, 3호선, 5호선 안국역 3번 출구에서 가면 됩니다. 정원은 안내 투어만 가능합니다. 예약이 필요합니다. 투어는 오전 10시부터 오후 4시까지입니다."},
  {id:18,n:"Mangwon Market",a:"Mangwon",v:["local", "free"],d:8,s:"A neighborhood grocery market where locals buy fish, vegetables, and food vendors serve classics",st:"Mangwon is a small covered market in a quiet residential area where neighborhood families come to buy food. Fish vendors shout prices, vegetable stalls pile produce high, and food vendors operate from cramped storefronts. You eat tteokbokki or kimbap standing at a counter with locals. No tourists in sight. This is where Seoul actually eats.",im:"A woman carries a woven basket filled with fresh perilla leaves and persimmons while a vendor next to her cleans fish with her bare hands, ice shavings flying.",t:"Metro Line 6 to Mangwon, exit 2. Walk north 5 minutes. Open 9am-7pm mostly. Free to walk. Eat for 5,000-10,000 KRW. 30 minutes.",c:["local_only"],r:"g",nn:"망원 시장",ns:"서울 주민들이 사는 장을 보는 시장",nst:"망원은 조용한 주택 지역의 작은 시장입니다. 이웃 가족들이 음식을 사러 옵니다. 생선 상인들이 가격을 외치고, 야채 가판대가 높이 쌓여 있습니다.",nt:"6호선 망원역 2번 출구에서 북쪽으로 5분 가면 됩니다. 오전 9시부터 오후 7시까지 열려 있습니다. 무료입니다."},
  {id:19,n:"Yeouido Park Cherry Blossoms",a:"Yeouido",v:["beautiful", "seasonal"],d:12,s:"A wide riverside park lined with 1,800 cherry blossom trees that bloom for one week in April",st:"Yeouido is an island in the Han River with a 8.4km riverside park. In early April, 1,800 cherry trees bloom simultaneously for seven to ten days. The scene is overwhelming: pink petals fall like snow, paths are crowded but joyful, and families sit under trees with picnic food. This is Seoul's most celebrated seasonal event. Go at dawn before crowds.",im:"Pink petals fall gently while a child holds their face up to feel them on their skin, and couples sit beneath drooping branches photographing themselves in the morning light.",t:"Metro Line 5 to Yeouido Park, exit 2. Peak bloom April 5-15. Open dawn-midnight. Free. Completely full 10am-8pm. Go 6am-9am. Two hours.",c:["parks", "romantic_water"],r:"g",nn:"여의도 공원 벚꽃",ns:"4월에만 볼 수 있는 벚꽃",nst:"여의도는 한강의 섬으로, 8.4km의 공원이 있습니다. 4월 초에 1,800그루의 벚나무가 동시에 피어 7-10일간 지속됩니다. 장면은 압도적입니다: 분홍색 꽃잎이 눈처럼 내립니다.",nt:"5호선 여의도공원역 2번 출구에서 가면 됩니다. 절정기는 4월 5일부터 15일입니다. 무료입니다."},
  {id:20,n:"Inwangsan Shamanist Rock Shrines",a:"Jongno",v:["hidden", "weird", "history"],d:12,s:"A hillside with ancient rock formations and small shamanist shrines built directly into the stone",st:"Inwangsan is an ancient sacred mountain within Seoul where shamanic practices have occurred for centuries. Small shrines and altars are carved into the rock face. Prayer rags and offerings hang from trees. The spiritual presence feels distinct from Buddhist temples. This is pre-Buddhist Korea still alive on a hilltop.",im:"A woman in white cloth ties a prayer rag to a tree branch below a carved rock shrine, while incense smoke drifts upward and the city noise fades entirely.",t:"Metro Line 1 to Jonggak, exit 1. Walk northwest through residential area 15 minutes to mountain entrance. Free. Open dawn-dusk. Steep terrain. One and a half to two hours. Bring water.",c:["history_big"],r:"g",nn:"인왕산 무속 암자",ns:"영혼의 산으로 알려진 곳",nst:"인왕산은 서울 내 고대 신성한 산으로, 수백 년 동안 무속 행위가 일어난 곳입니다. 작은 신사와 제단이 바위에 새겨져 있습니다. 기도 천과 제물이 나무에 매달려 있습니다.",nt:"1호선 종각역 1번 출구에서 주택 지역을 통해 북서쪽으로 15분 걸어가면 됩니다. 무료입니다."},
  {id:21,n:"Bugaksan Mountain and City Wall Hike",a:"Jongno",v:["free", "history", "beautiful"],d:20,s:"A steep mountain hike along the preserved northern city wall with panoramic Seoul views",st:"Bugaksan is the northern peak of Seoul that dominates the city's north-south view. A hiking trail runs along the restored city wall, climbing steeply through forest. The wall is 600 years old and visible in sections. At the summit, the city spreads beneath you in all directions. The wall sections are among the best preserved in Korea.",im:"A hiker sits on ancient stone blocks of the wall, worn smooth by centuries of feet, looking south across the city while wind moves through pine needles and afternoon light turns everything gold.",t:"Metro Line 3 to Gyeongbokgung, exit 3. Walk to Bulguksa gate entrance. Permits required on weekdays (get at gate). Free. Trail begins 8am. Four to five hours round trip. Bring water and sun protection.",c:["history_big"],r:"g",nn:"북악산 성곽 하이크",ns:"서울의 북쪽을 보는 산 하이킹",nst:"북악산은 서울의 북쪽 봉우리로, 산 위에서 서울을 볼 수 있습니다. 등산로는 복원된 성곽을 따라 가고, 가파르게 올라갑니다. 성곽은 600년 되었습니다.",nt:"3호선 경복궁역 3번 출구에서 불국사 입구로 걸어가면 됩니다. 허가가 필요합니다 (무료). 무료입니다."},
  {id:22,n:"Seodaemun Prison History Museum",a:"Seodaemun",v:["history"],d:15,s:"A former Japanese colonial prison where Korean independence fighters were held and tortured",st:"Seodaemun Prison was built by Japan in 1908 during occupation. Thousands of Korean independence activists were imprisoned and executed here. The cells, torture chambers, and gallows remain as exhibits. It is a grim memorial to the colonial period. Many visitors find it emotionally heavy. The building does not shy from showing the brutality of history.",im:"A narrow interrogation room contains only a chair, a small table, and dried bloodstains on the concrete floor under a high barred window, sunlight filtering through in a single shaft.",t:"Metro Line 3 to Seodaemun, exit 5. Walk 10 minutes uphill. Entry 4,000 KRW. Open 9:30am-6pm. Closed Mondays. Plan two hours.",c:["history_big"],r:"y",nn:"서대문 감옥 역사 박물관",ns:"독립 운동가들이 갇혔던 감옥",nst:"서대문 감옥은 1908년 일본이 지은 식민지 시대의 감옥입니다. 수천 명의 한국 독립 운동가들이 여기에 감금되고 처형되었습니다.",nt:"3호선 서대문역 5번 출구에서 가면 됩니다. 입장료는 4,000원입니다. 월요일 휴무입니다."},
  {id:23,n:"Bosingak Bell Pavilion",a:"Jongno",v:["history", "quiet"],d:5,s:"A 750-year-old bell tower in the middle of downtown that still rings to mark time",st:"The Bosingak bell was cast in 1263 and has rung continuously for 750 years. It marked dawn and dusk for Joseon citizens. Today it stands in the middle of a busy intersection but maintains its function. The bell rings at 10am daily. You can stand inside the wooden pavilion and feel the tone resonate through your body. It is unchanged.",im:"The massive bronze bell hangs in silence, suspended by wooden beams, ancient cracks visible in its surface where 750 years of striking has worn grooves into the metal.",t:"Metro Line 1 to Jonggak, exit 1. Bell towers above intersection. Free. Exterior viewable anytime. Rings 10am daily. Five minutes.",c:["history_big"],r:"g",nn:"보신각 종",ns:"750년 된 종",nst:"보신각 종은 1263년에 주조되었고 750년 동안 울려 왔습니다. 조선 시대 시민들의 새벽과 황혼을 알렸습니다.",nt:"1호선 종각역 1번 출구에서 가면 됩니다. 무료입니다. 오전 10시에 울립니다."},
  {id:24,n:"Noryangjin Fish Market Midnight Tuna Auction",a:"Dongjak",v:["weird", "night", "local"],d:8,s:"A wholesale fish market where the tuna auction happens at 3am and you can watch real commerce",st:"Noryangjin is Seoul's main fish market, operating since 1927. The wholesale tuna auction happens at 2am-4am daily. Auctioneers shout prices in rapid-fire Korean, massive frozen tuna lay on the floor being inspected, and buyers bid in gestures invisible to outsiders. The energy is completely alive at 3am. You can eat fresh sushi at the market afterward.",im:"A 150-kilogram frozen tuna lies on ice under harsh lights while three buyers crouch to examine its cross-section, whispering to each other as an auctioneer counts down the bidding.",t:"Metro Line 1 to Noryangjin, exit 1. Market is open 24 hours. Auctions happen 2am-4am. Arrive by 1:30am. Free to watch. Sushi afterward 5,000-20,000 KRW per plate. Two hours.",c:["local_only"],r:"g",nn:"노량진 생선 시장 야간 경매",ns:"밤 3시 참치 경매를 보는 시장",nst:"노량진은 서울의 주요 생선 시장으로, 1927년부터 운영되고 있습니다. 도매 참치 경매는 오전 2시-4시에 매일 일어납니다.",nt:"1호선 노량진역 1번 출구에서 가면 됩니다. 시장은 24시간 열려 있습니다. 경매는 오전 2시-4시에 일어납니다. 오전 1시 30분까지 도착하세요. 무료입니다."},
  {id:25,n:"Gwangjang Market",a:"Jongno",v:["local", "free"],d:10,s:"The oldest covered market in Seoul, famous for bindaetteok (bean pancakes) and authentic street food",st:"Gwangjang Market opened in 1905 during Japanese occupation and remains one of Seoul's most authentic markets. Narrow aisles are packed with textile stalls, restaurants, and food vendors. Bindaetteok, a savory green bean pancake, is the signature food. Tourists who find it become obsessed. The market has not changed its essential character in 120 years.",im:"An elderly woman stands at a shallow oil pan making bindaetteok, folding and flipping a bean pancake while a queue of customers waits, the smell of sesame oil and mung bean overwhelming.",t:"Metro Line 1 to Jongno 5-ga, exit 8. Market open 10am-8pm. Stalls vary. Bindaetteok costs 3,000-5,000 KRW. Busy 11am-3pm. Two hours.",c:["local_only"],r:"g",nn:"광장 시장",ns:"서울에서 가장 오래된 시장",nst:"광장 시장은 1905년에 개장했고, 서울에서 가장 진정성 있는 시장입니다. 좁은 골목은 섬유 가판대, 식당, 음식점으로 가득합니다. 빈대떡이 유명합니다.",nt:"1호선 종로5가역 8번 출구에서 가면 됩니다. 시장은 오전 10시부터 오후 8시까지 열려 있습니다. 빈대떡은 3,000-5,000원입니다."},
  {id:26,n:"Tapgol Park",a:"Jongno",v:["history", "quiet"],d:8,s:"The birthplace of Korean independence: where the 1919 Declaration of Independence was read",st:"Tapgol Park is where the Korean independence movement began. On March 1, 1919, Korean activists gathered here to read the Declaration of Independence from Japan. The empire arrested thousands. A small monument and pavilion mark the spot. It is a quiet park, not commercialized, where history changed.",im:"An elderly man sits alone on a stone bench in the empty park, looking at a monument while morning light illuminates his face and the granite inscription he cannot read.",t:"Metro Line 1 to Jongno 3-ga, exit 5. Park is open 24 hours. Free. Pavilion interior sometimes locked. 20 minutes.",c:["history_big"],r:"g",nn:"탑골 공원",ns:"한국 독립 운동의 발상지",nst:"탑골 공원은 한국 독립 운동이 시작된 곳입니다. 1919년 3월 1일, 한국 활동가들이 여기 모여 일본으로부터의 독립 선언문을 읽었습니다.",nt:"1호선 종로3가역 5번 출구에서 가면 됩니다. 공원은 24시간 열려 있습니다. 무료입니다."},
  {id:27,n:"Bongeunsa Temple",a:"Yongsan",v:["history", "quiet", "beautiful"],d:10,s:"A Buddhist temple in Gangnam built in 794, preserved and peaceful despite urban surroundings",st:"Bongeunsa Temple was founded in 794 during the Unified Silla period. It is a functioning Buddhist temple where monks live and practice. The temple grounds contain a main hall, meditation halls, and ancient trees. Unlike temples in tourist zones, Bongeunsa remains a real place of worship. Early morning brings monks chanting and visitors meditating.",im:"A monk in gray robes strikes a large wooden bell slowly while incense rises and other monks sit in a row facing a gold Buddha statue, visible through a wooden screen.",t:"Metro Line 2 to Samseong, exit 5. Walk northeast 15 minutes. Temple open 6am-6pm. Free to enter. Avoid loud hours. Best 6am-8am. One hour.",c:["history_big"],r:"g",nn:"봉은사 사찰",ns:"도시 안의 조용한 불교 사찰",nst:"봉은사 사찰은 794년 통일 신라 시대에 지어졌습니다. 현재 승려들이 살고 수행합니다. 사찰 경내에는 주요 전각, 명상 전각, 고대 나무들이 있습니다.",nt:"2호선 삼성역 5번 출구에서 북동쪽으로 15분 걸어가면 됩니다. 사찰은 오전 6시부터 오후 6시까지 열려 있습니다. 무료입니다."},
  {id:28,n:"Olympic Park Rose Garden and Sculpture",a:"Songpa",v:["free", "beautiful", "quiet"],d:12,s:"A 44-hectare park built for the 1988 Olympics with rose gardens, sculptures, and free entry",st:"Olympic Park was built for the 1988 Seoul Olympics. The 44-hectare space contains sculpture gardens, walking paths, and seasonal rose gardens. It is often empty compared to other Seoul parks. The sculptures are serious contemporary art, not park decoration. Rose season (May-June) is overwhelming: 6,000 roses in a single garden.",im:"A woman walks alone past a massive bronze sculpture of twisted forms while rose petals fall around her and the sky reflects in a still pool below the art.",t:"Metro Line 5 to Oryongdo, exit 1. Park entrance is visible. Open 6am-midnight. Free. Rose season May-June. Plan two to three hours.",c:["parks"],r:"g",nn:"올림픽공원 장미 정원",ns:"1988년 올림픽을 위해 지어진 공원",nst:"올림픽공원은 1988년 서울 올림픽을 위해 지어졌습니다. 44헥타르의 공간에는 조각 정원, 산책로, 계절 장미 정원이 있습니다.",nt:"5호선 오룡도역 1번 출구에서 가면 됩니다. 공원 입구가 보입니다. 오전 6시부터 자정까지 열려 있습니다. 무료입니다."},
  {id:29,n:"Suseo Stream Quiet Suburban Walk",a:"Songpa",v:["quiet", "free", "nature"],d:20,s:"A restored suburban stream with bike paths, unused by tourists, where Seoul residents actually exercise",st:"Suseo Stream is one of Seoul's restored waterways, a tributary of the Hangang River. The path follows the water through suburbs where families bike and joggers run. No souvenir shops, no tour buses, no crowds. This is where Seoul exercises in the morning and evening. The water is clean, the path is tree-lined, and the pace is slow.",im:"A couple on bikes rides slowly while their young child runs ahead on the path, and the stream moves quietly beside them, reflecting the canopy of tall trees above.",t:"Metro Line 8 to Suseo, exit 1. Stream path starts nearby. Free. Open anytime. Best early morning or evening. Two to four hours depending on distance.",c:["parks", "nature"],r:"g",nn:"수서천 조용한 산책로",ns:"시민들이 운동하는 조용한 냇물",nst:"수서천은 서울의 복원된 수로 중 하나이며, 한강의 지류입니다. 경로는 수로를 따라 시내를 통과합니다. 기념품 가게, 관광 버스, 군중이 없습니다. 이곳은 서울 주민들이 운동하는 곳입니다.",nt:"8호선 수서역 1번 출구에서 가면 됩니다. 냇물 경로가 가까이 있습니다. 무료입니다."},
  {id:30,n:"N Seoul Tower Exterior and Namsan Forest Walk",a:"Namsan",v:["beautiful", "free", "scenic"],d:15,s:"A tall communications tower with a free exterior plaza and surrounding forest walk with city views",st:"N Seoul Tower sits atop Namsan mountain. Paying to go inside costs money, but the base plaza is free and overlooks the city in all directions. The surrounding forest has walking paths that connect through pine trees and past hiking trails. You see the tower as part of nature, not as a tourist attraction. The forest walk is the real experience.",im:"The sun sets behind the tower while the city lights gradually illuminate below, and a jogger runs past, silhouetted against the orange sky and the red beacon light on the tower's top.",t:"Metro Line 3 to Chungmuro, exit 2. Walk up to tower base 20 minutes. Free plaza. Open sunrise-10pm. Avoid 6pm-8pm. One to two hours.",c:["parks"],r:"g",nn:"N 서울 타워 외부와 남산 숲길",ns:"도시를 보는 무료 숲 산책로",nst:"N 서울 타워는 남산 위에 있습니다. 안에 들어가려면 돈이 들지만, 기저 광장은 무료이고 도시를 내려다봅니다. 주변 숲에는 소나무 사이의 산책로가 있습니다.",nt:"3호선 충무로역 2번 출구에서 올라가면 됩니다. 20분 정도 걸어가면 됩니다. 무료입니다. 오후 6시-8시는 피하세요."}
,
  {id:31,n:"Seonyudo Park Island Quiet Escape",a:"Yeongdeungpo-gu",v:["quiet", "beautiful", "free entry"],d:90,s:"A hidden island sanctuary where Seoul's water treatment plant became a wildflower meadow — no cars, no crowds, just peace",st:"Seonyudo is the kind of place locals keep to themselves. A former industrial site transformed into meadowland, it sits alone in the Han River accessible only by a single footbridge. On weekday afternoons, you'll find maybe three people here — the sound of grass moving, water beneath you, the smell of green growing in unexpected places. The sunsets flatten the city across the water and make you feel like you've left Seoul entirely.",im:"Tall grass bends against your legs as wildflowers blur past, Han River light turning gold across abandoned flower beds, a woman reading alone on a bench watching nothing happen.",t:"Subway Line 2 to Hapjeong Station, exit 3. 10-min walk or take a bus across the footbridge. Free, open dawn to dusk. Bring a blanket, no food stalls here.","c":[],"r":"g","nn":"선유도공원","ns":"서울 한복판 조용한 섬","nst":"한강 위에 떠있는 옛 정수장이 지금은 야생화 들판으로 변했습니다. 걷는 동안 차 소리가 안 들립니다. 무언가를 기다리거나, 생각할 때 오는 곳입니다. 저녁노을이 한강에 반사되고, 시간이 느려집니다.","nt":"2호선 합정역 3번 출구. 인도교 건너 접근. 무료입니다. 오후 평일이 가장 한가합니다."},
  {id:32,n:"Seongbuk-dong Literary Hillside Alley",a:"Seongbuk-gu",v:["history", "quiet", "beautiful"],d:120,s:"Seoul's oldest intellectual neighborhood where writers and artists have lived since the 1930s — teahouses hidden in fortress walls and old-money hanok gardens",st:"Seongbuk-dong sits on the side of Bugaksan Mountain like Seoul remembers itself. The streets slope and twist between high stone walls, villas that whisper old money, and lantern-lit teahouses where novelists drank tea while inventing Korean literature. You walk past Kansong Art Museum tucked into a garden, a temple in an old restaurant building, cafes named after single words. The air tastes like ink and jasmine.",im:"Afternoon light filtering through 90-year-old cafe windows onto the smell of persimmons drying on wooden racks, stone walls daubed with moss, a cat sleeping on a hanbok shop step.",t:"Subway Line 4 to Hansung University Station, exits 5–6. Walk uphill slowly. Coffee and tea cafes cost 5,000-10,000 won. Best visited 10am-4pm on weekdays.","c":["history_big"],"r":"g","nn":"성북동 문학의 언덕","ns":"서울에서 가장 오래된 지식인 거리","nst":"1930년대부터 소설가와 화가들이 살던 동네입니다. 좁은 골목길 따라 100년 된 찻집과 옛 저택들이 있습니다. 하나하나 다른 이름의 카페들을 돌아다니는 즐거움이 있습니다.","nt":"4호선 한성대입구역 5,6번 출구. 천천히 언덕을 올라갑니다. 카페는 5,000~10,000원."},
  {id:33,n:"Namsangol Hanok Village Free Gates at Dusk",a:"Jung-gu",v:["history", "beautiful", "free entry"],d:60,s:"Five authentic Joseon-era houses reassembled under Namsan Mountain — visit after 5pm when daytrippers leave and you own the stone courtyards",st:"Namsangol wasn't built new — Seoul disassembled five historical hanok from around the city and rebuilt them here in the 1990s, each one a brick-by-brick memory. In daylight it's pleasant. But come at 5pm and something shifts. Tourists have left. The gardens fill with early evening light, shadows deepen in the wooden rooms, and you hear only your own footsteps on the courtyard stones. The museum stays open until 9pm.",im:"The smell of old wood and red clay, late sun turning the tile roofs amber, a tour group's voices fading down the hill, leaving you alone with five century-old buildings.",t:"Subway Lines 3/4 Chungmuro Station, exit 3. 5-min walk. Free entry (paid activities available). Open 9am-9pm March-Oct, 9am-8pm Nov-Feb. Closed Tuesdays.","c":["history_big"],"r":"g","nn":"남산골 한옥마을","ns":"해질녘 실제 조선 시대 집들","nst":"서울 곳곳에서 옮겨온 다섯 채의 한옥을 여기에 다시 지었습니다. 오후 5시 이후에 가면 관광객이 줄어들고, 석양이 기와를 노란색으로 물듭니다. 돌 마당에서 자신의 발자국 소리만 들립니다.","nt":"3, 4호선 충무로역 3번 출구. 5분 도보. 무료. 화요일 휴관. 해가 질 때 방문하면 다릅니다."},
  {id:34,n:"Ikseondong Hanok Maze & Hidden Boutiques",a:"Jongno-gu",v:["hidden", "beautiful", "local"],d:120,s:"A labyrinth of restored hanok backstreets and indie shops where locals shop, eat, and hide — maze-like enough that every turn surprises you",st:"Ikseondong is a neighborhood that transformed itself while tourists weren't looking. Two minutes from Euljiro 3-ga Station, but the moment you duck into the alleys, all the noise vanishes. Hanok storefronts sell handmade ceramics, vintage books, small-batch coffee roasters. The alleyways actually wind and double back so you lose the grid. Bakeries smell like burnt butter and orange zest. You find cafes with three seats that have three regulars who've been coming for a decade.",im:"The smell of sourdough bleeding into the smell of incense, narrow alley barely wider than two people, hanging laterns turning the afternoon into a film scene.",t:"Subway Line 2 Euljiro 3-ga Station, exit 4. Free to walk (shops and cafes cost extra). Best Thursday-Sunday. No car traffic in the alleyways.","c":[],"r":"g","nn":"익선동 한옥 미로","ns":"그 어디도 아닌 서울의 작은 찻집들","nst":"을지로 3가역에서 2분이지만, 좁은 골목으로 들어가면 모두 달라집니다. 세라믹 가게, 오래된 책방, 맛있는 베이커리들이 숨어 있습니다.","nt":"2호선 을지로3가역 4번 출구. 골목마다 다른 가게들. 목-일요일이 가장 좋습니다."},
  {id:35,n:"Mangwon-dong Traditional Market & Local Vibe",a:"Mapo-gu",v:["local", "free entry", "quiet"],d:90,s:"Where Seoul's neighbors actually shop — a maze of food stalls, bakeries, and tiny restaurants that smell like kimchi ferment and toasted sesame",st:"Mangwon Market is not for tourists hunting 'authentic Seoul.' It's where the people who actually live here buy their breakfast. The aisles are narrow and crammed with hanging fish, pyramids of kimchi, old women calling out prices in voices that have never needed amplification. You weave between metal carts and smell fermentation and the particular mustiness of rice and dried squid. There's a bakery that's been here since 1992, a ramyeon stand where three stools live, a vendor who'll cut you exactly what you need.",im:"The shriek of metal carts mixing with the smell of fermented beans and toasted sesame oil, morning light hitting wet stone floors, vendors in aprons louder than any speaker.",t:"Subway Line 2 Mangwon Station, exit 1. Walk 5 min. Free entry to browse. Most stalls open 6am-5pm. Cash only, most places. Weekday mornings best.","c":[],"r":"g","nn":"망원시장 생활의 맛","ns":"서울 사람들이 정말 사는 시장","nst":"관광객보다 이웃들이 사는 시장입니다. 좁은 골목에 생선, 김치, 콩이 쌓여 있습니다. 저 어느 곳에서도 못 들을 목소리들이 납니다.","nt":"2호선 망원역 1번 출구. 5분 도보. 무료. 오전 6시-오후 5시. 현금 주의."},
  {id:36,n:"Ihwa Mural Village Colorful Backstreets",a:"Jongno-gu",v:["weird", "beautiful", "hidden"],d:60,s:"A maze of residential alleyways transformed into living art where every wall tells a story — locals moving through their daily lives amid the color",st:"Ihwa Mural Village exists in the backstreets of a regular neighborhood where people actually live. It's not a tourist plaza painted for Instagram — it's homes with laundry hanging alongside murals, cafes with three customers who always order the same drink, small galleries tucked between apartments. The street art happened organically, locals painting their neighborhood because it was worth remembering. It feels like you've walked into someone's notebook instead of a theme park.",im:"Bright murals bleeding into the smell of sesame oil from a restaurant, a woman hanging persimmons to dry next to a 10-year-old painting of a cat, colors faded by sun.",t:"Subway Line 4 Dongdaemun Station, exit 7. Take local bus 2, 3, or walk uphill 15 min. Free. Best 9am-4pm weekdays when fewer tourists. Respect residents — this is still a living neighborhood.","c":[],"r":"g","nn":"이화 벽화마을","ns":"주민들의 삶과 색깔이 어우러진 곳","nst":"관광지가 아닙니다. 실제로 사는 주민들의 동네입니다. 집 옆에 벽화가 있고, 빨래가 말려 있습니다.","nt":"4호선 동대문역 7번 출구. 버스 타거나 15분 도보. 주민들을 배려하며 방문하세요."},
  {id:37,n:"Gongneung Greenway Wildflower Trail Free Hiking",a:"Nowon-gu",v:["free entry", "hidden", "beautiful"],d:120,s:"An abandoned railway turned hiking trail where wildflowers grow through old train rails and the city sounds fade behind you — totally free, totally forgotten",st:"Gongneung Greenway is what happens when Seoul surrenders a piece of itself to nature. An old train line between Gongneung 1 and 2 neighborhoods, it became a community forest, and no one really talks about it. You walk on old railway ties, wildflowers erupting from between them, the Han River visible through trees, no crowds because the people who know about it are protecting the secret. It smells like earth after rain and wild mint.",im:"Overgrown train rails visible under wildflower stems, the sound of your own shoes on gravel, city noise disappearing as you go deeper, a heron waiting motionless by the stream.",t:"Subway Line 1 Gongneung Station, exit 1. Walk 10 min to the trailhead. Free. Open dawn to dusk. Bring water. Quietest on weekday mornings.","c":[],"r":"g","nn":"공릉 녹색길","ns":"폐철길에서 피어나는 들꽃","nst":"버려진 기차길이 산책로가 되었습니다. 들꽃들이 옛날 철길을 뚫고 피어납니다. 한강이 보이고, 사람이 거의 없습니다.","nt":"1호선 공릉역 1번 출구. 10분 도보로 등산로 시작. 무료. 평일 아침이 가장 한가합니다."},
  {id:38,n:"Myeonggyeongsa Temple Hidden Garden Seoul",a:"Seongbuk-gu",v:["quiet", "beautiful", "history"],d:90,s:"A small functioning temple hidden in a residential neighborhood garden — open to wanderers, filled with the smell of incense and forgotten flowers",st:"Myeonggyeongsa opened as a temple in converted restaurant buildings where someone decided green was more important than profit. The garden was designed for Seoul's wealthy, but it belongs to anyone quiet enough to find it. Stone lanterns sit among azaleas and forsythia, a small pond reflects sky. You might encounter a monk in morning robes or no one at all. The smell of incense moves through the whole place like a memory of something you've never actually experienced.",im:"Stone lanterns half-hidden in overgrown bushes, the sound of wind in the pines, a single bell note at dusk, forsythia yellow against the temple's red walls.",t:"Subway Line 4 Hansung University Station, exits 5–6. Walk uphill toward temple signs. Free entry. Open dawn-dusk. Call ahead if visiting during ceremonies.","c":["history_big"],"r":"g","nn":"명경사 숨은 정원","ns":"주택지 안의 작은 절 정원","nst":"음식점 건물을 개조한 작은 절입니다. 누군군가 돈보다 초록을 택했습니다. 돌 등불, 진달래, 모란들이 있습니다.","nt":"4호선 한성대입구역에서 언덕을 오릅니다. 무료. 동틀 때부터 해질 때까지."},
  {id:39,n:"Jeongdong Observatory Free High Views",a:"Jung-gu",v:["free entry", "beautiful", "local"],d:45,s:"The 13th floor of Seoul's government building with a café and 360 views over Deoksugung Palace — locals' secret for sunset without paying N Seoul Tower",st:"Seoul Metropolitan Government's Seosomun Building has a public observation deck on the 13th floor that almost no one knows about. It's genuinely free, the views are complete, and you can watch the light change over Deoksugung Palace from the cafe where coffee costs 2,500 won. No one asks you why you're there. You could spend two hours sitting in plastic chairs overlooking the entire eastern palace, watching the evening shift its colors from gold to blue.",im:"The taste of cheap coffee, the specific silence of a government cafe at 5pm, Seoul's light turning geometric across the tile roofs of a 500-year-old palace.",t:"Subway Lines 1/2 City Hall Station, exit 1. Walk 5 min. Free entry to 13th floor. Cafe open 6am-9pm (cafe prices 2,500-8,000 won). Best 4-7pm for light.","c":[],"r":"g","nn":"정동 관측소","ns":"정부청사 13층 무료 카페","nst":"덕수궁을 내려다보는 13층 카페. 무료 입장, 커피는 저렴합니다. 관광객 거의 없습니다.","nt":"1, 2호선 시청역 1번 출구. 무료. 오후 4-7시 햇빛이 가장 좋습니다."},
  {id:40,n:"Buam-dong Steep Mountain Walk & Village",a:"Jongno-gu",v:["quiet", "beautiful", "local"],d:150,s:"A steep neighborhood village clinging to mountainside — narrow lanes, mountain light, the smell of wildflowers, a feeling of Seoul's older self",st:"Buam-dong climbs so steeply that cars mostly give up on it. The neighborhood clings to the side of Inwangsan Mountain like it's holding on. You walk through lanes barely wide enough for delivery scooters, past villas with persimmons drying outside, small cafes that open when they feel like opening. The air moves differently here — cooler, more open, filled with the smell of actual plants instead of traffic. Light hits the stone walls at specific angles that make you understand why writers chose to live here.",im:"The sound of your own breathing going uphill, persimmons drying on wooden racks, mountain shadows across old stone walls, the smell of pine sap and rain-soaked earth.",t:"Subway Line 3 Anguk Station, exit 4. Walk uphill into Buam-dong. Free. No clear marked trail — wandering is the point. Bring water. Best sunrise or late afternoon.","c":["history_big"],"r":"g","nn":"부암동 산길 마을","ns":"산에 붙은 좁은 골목","nst":"차도 포기하는 가파른 동네입니다. 좁은 골목, 산 냄새, 오래된 서울의 감각이 남아 있습니다.","nt":"3호선 안국역 4번 출구. 언덕을 올라갑니다. 무료. 길이 정해지지 않음. 물을 가져가세요."},
  {id:41,n:"Namsan Fortress Wall Sunset Walk",a:"Jung-gu",v:["history", "beautiful", "quiet"],d:90,s:"Following Seoul's ancient defensive wall around Namsan Mountain at dusk — the city's oldest defense line, now a hiking path locals use for evening light",st:"The fortress wall built in the 14th century still snakes around Namsan Mountain like Seoul's oldest memory. It's a hiking path now, and on weekday evenings you'll see maybe a handful of people — older locals doing their walking, a couple photographing light. The wall itself is sometimes in terrible condition, sometimes beautifully restored, the age showing everywhere. Walking it feels like following Seoul backwards in time. The view from the top catches the Han River turning gold as the sun sinks behind the western towers.",im:"Stone wall worn smooth by 600 years of hands and weather, the smell of pine and damp earth, city lights beginning to emerge as the sun disappears, an old woman's silhouette against the evening sky.",t:"Multiple access points around Namsan. Best from Namsan Tower area walking south and west along the wall trail. Free. 2-hour walk. Go at sunset (time varies by season).","c":["history_big"],"r":"g","nn":"남산 성곽 해질녘 산책","ns":"600년 된 서울의 방어벽","nst":"14세기에 지은 방어벽이 지금도 남산을 둘러싸고 있습니다. 옛날 서울의 기억을 따라가는 산책입니다.","nt":"남산타워 근처에서 시작. 무료. 2시간. 해가 질 때가 최고입니다."},
  {id:42,n:"National Folk Museum Free Time-Slip Street",a:"Jongno-gu",v:["history", "free entry", "weird"],d:75,s:"An indoor recreation of 1960s-80s Seoul street life — frozen in time with actual retro shops, barber chairs, and the smell of a Seoul that disappeared 40 years ago",st:"The National Folk Museum has an entire hall dedicated to reconstructing an old Seoul street from the 1960s-80s. It's not theatrical or polished. There's a barber shop with actual chairs, a vintage comic book stand, a tea house with the original stools, all frozen at a specific moment. Walking through it feels like stepping into your grandparents' memory, smelling the air the way it used to smell. The details are strangely moving — how small the barber shop actually is, how low the ceiling, what people thought was normal.",im:"The smell of old wood and shoe polish, rows of old comic books under glass, a child's chalk drawing still on the wall of a toy shop, fluorescent light turning everything slightly yellow-green.",t:"Subway Line 3 Anguk Station, exit 3. 5-min walk to National Folk Museum. Free. Open 9am-6pm (closed Mondays). Plan 1 hour for the street hall.","c":[],"r":"g","nn":"민속박물관 옛날 거리","ns":"1960년대 서울 거리 재현","nst":"1960년대 서울 거리를 박물관 안에 다시 만들었습니다. 이발소, 오락실, 다방이 실제로 있습니다.","nt":"3호선 안국역 3번 출구. 5분 도보. 무료. 월요일 휴무."}
];
