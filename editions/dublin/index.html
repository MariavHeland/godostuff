<script>
const P = [
  {id:1,n:"Literary Pub Crawl and Ghost Writers",a:"Temple Bar",v:["history", "local", "night"],d:1,s:"Where Joyce drank and wrote about drinking",st:"Dublin\'s pub culture shaped its literature. Joyce, Wilde, Beckett all had regular bars. Walk from pub to pub following their footsteps. The drinks taste better when ghosts are watching.",im:"It\'s 1912. Joyce sits in a corner booth. His notebook fills. By now, those words are immortal and the bar still serves the same drink.",t:"Dublin\'s pub culture shaped its literature. Joyce, Wilde, Beckett all had regular bars. Walk from pub to pub following their footsteps. The drinks taste better when ghosts are watching.\",im:\"It\'s 1912. Joyce sits in a corner booth. His notebook fills. By now, those words are immortal and the bar still serves the same drink.\",t:\"Start at The Palace Bar, Fleet Street (Joyce\'s spot). Various pubs accessible by walking. Drinks €5-8. The best literary pub crawl is self-guided and unrushed.",c:["history_big", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:2,n:"Marsh\'s Library and Silent Scholars",a:"Liberties",v:["quiet", "history", "beautiful"],d:2,s:"Dublin\'s first public library still locked and private",st:"1707. Books behind caged shelves. You need to request. It\'s studious. Quiet. The smell of old paper. Scholars used iron cages to protect rare books. Chains hang from shelves.",im:"It\'s 1710. A scholar reads a chained book. By now, the chains remain even though theft is rare. History locked itself in place.",t:"1707. Books behind caged shelves. You need to request. It\'s studious. Quiet. The smell of old paper. Scholars used iron cages to protect rare books. Chains hang from shelves.\",im:\"It\'s 1710. A scholar reads a chained book. By now, the chains remain even though theft is rare. History locked itself in place.\",t:\"Marsh\'s Library, St. Werburgh Street, Liberties (walk from Christ Church). €3.50. Only 15 visitors at a time. Go on a quiet morning. Bring patience. The reading room is sacred.",c:["quiet", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:3,n:"Kilmainham Gaol and 1916 Rebellion Ghosts",a:"Kilmainham",v:["history", "quiet"],d:3,s:"Where rebels were executed and Ireland was born",st:"Easter Rising 1916. Rebels held the post office. Rebels were court-martialed here. Shot. Buried. The gaol holds cells. Stories. The moment independence became inevitable.",im:"It\'s May 1916. Firing squads. The nation holds its breath. One month later, history cannot reverse.",t:"Easter Rising 1916. Rebels held the post office. Rebels were court-martialed here. Shot. Buried. The gaol holds cells. Stories. The moment independence became inevitable.\",im:\"It\'s May 1916. Firing squads. The nation holds its breath. One month later, history cannot reverse.\",t:\"Kilmainham Gaol Museum, Inchicore Road, Kilmainham. €9. The tour is mandatory (guided, 90 min). Book ahead. The execution yard is overwhelming.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:4,n:"Glasnevin Cemetery and Ireland\'s Notable Dead",a:"Glasnevin",v:["history", "quiet", "beautiful"],d:4,s:"160,000 graves and the nation\'s memory kept",st:"Michael Collins. Eamon de Valera. Literary figures. The graves tell Ireland\'s story. A museum at the entrance. The tower visible for miles. Death as monuments.",im:"It\'s 1922. Collins dies in an ambush. By evening, the nation grieves. Now his grave is pilgrimage.",t:"Michael Collins. Eamon de Valera. Literary figures. The graves tell Ireland\'s story. A museum at the entrance. The tower visible for miles. Death as monuments.\",im:\"It\'s 1922. Collins dies in an ambush. By evening, the nation grieves. Now his grave is pilgrimage.\",t:\"Glasnevin Cemetery, Finglas Road, Glasnevin (bus or walk 20 min from center). €12 for tower/museum. Go early morning. The graves are poetry.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:5,n:"Old Library and Book of Kells Crowds",a:"Trinity College",v:["history", "beautiful"],d:5,s:"Medieval illumination that stopped time",st:"The Book of Kells. 9th century. Hand-drawn. Insane detail. Gold. Colors that shouldn\'t exist. The pages are turned daily so the book dies slowly, beautifully. Everyone sees it in crowds. But squint and the medieval world appears.",im:"It\'s 800 AD. A monk holds a brush. Each stroke takes minutes. The letter is perfect. By 1300, the book is complete. Now we stand back amazed at patience.",t:"The Book of Kells. 9th century. Hand-drawn. Insane detail. Gold. Colors that shouldn\'t exist. The pages are turned daily so the book dies slowly, beautifully. Everyone sees it in crowds. But squint and the medieval world appears.\",im:\"It\'s 800 AD. A monk holds a brush. Each stroke takes minutes. The letter is perfect. By 1300, the book is complete. Now we stand back amazed at patience.\",t:\"Trinity College Long Room, Trinity Street, Trinity College. €16. Go before 9:30am or after 4pm to minimize crowds. The book is small—binoculars help. Photography prohibited.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:6,n:"Dublin Castle and the Birth of the Nation",a:"Liberties",v:["history", "beautiful"],d:6,s:"Where Irish independence changed hands in 1922",st:"Built 1204. English seat of power. By 1922, independence fighters took it. Now it\'s a museum. The courtyard is Georgian. The story is Irish. Power transferred in this room.",im:"It\'s December 1922. Michael Collins hands over the castle. The English leave. The Irish arrive. One building contains the handoff.",t:"Built 1204. English seat of power. By 1922, independence fighters took it. Now it\'s a museum. The courtyard is Georgian. The story is Irish. Power transferred in this room.\",im:\"It\'s December 1922. Michael Collins hands over the castle. The English leave. The Irish arrive. One building contains the handoff.\",t:\"Dublin Castle, Dame Street, Liberties (city center). €12 for tour. The State Apartments are opulent. The dining room is where power changed forever.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:7,n:"James Joyce Center and Ulysses Obsession",a:"Phibsborough",v:["history", "local"],d:7,s:"Where June 16th happens every day",st:"Ulysses. June 16, 1904. One day. One book. 783 pages. The Center maps the book to Dublin. Walk Bloomsday routes. Find locations. Obsessive fans do. You can too.",im:"It\'s June 16, 1904. Leopold Bloom walks Dublin. It\'s now. Readers follow. The city is the text.",t:"Ulysses. June 16, 1904. One day. One book. 783 pages. The Center maps the book to Dublin. Walk Bloomsday routes. Find locations. Obsessive fans do. You can too.\",im:\"It\'s June 16, 1904. Leopold Bloom walks Dublin. It\'s now. Readers follow. The city is the text.\",t:\"James Joyce Center, North Great George Street, Phibsborough (metro). €6. Walking tours available (€14, book ahead). Go on Bloomsday (June 16) if possible. The obsession is contagious.",c:["history_big", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:8,n:"Temple Bar and Tourist Reality",a:"Temple Bar",v:["local", "night"],d:8,s:"Where Dublin pretends for visitors and locals pretend to pretend",st:"It\'s a tourist trap. Full. Loud. Expensive. But locals are here too, sitting in corners, ignoring the show. The real Dublin is in the margins of the fake one. If you know to look.",im:"It\'s Saturday night. 500 tourists. 50 locals. Both pretend the other doesn\'t exist.",t:"It\'s a tourist trap. Full. Loud. Expensive. But locals are here too, sitting in corners, ignoring the show. The real Dublin is in the margins of the fake one. If you know to look.\",im:\"It\'s Saturday night. 500 tourists. 50 locals. Both pretend the other doesn\'t exist.\",t:\"Temple Bar district (various spots). Drinks €8-12. Go on a weekday evening (Tuesday-Wednesday). Early morning (7-9am) shows the real Dublin. Photography everywhere.",c:["local_only", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:9,n:"Hidden Courtyard Behind Grattan House",a:"Temple Bar",v:["hidden", "beautiful"],d:9,s:"A Georgian courtyard tourists walk past but miss",st:"A doorway. A passage. A courtyard emerges. Quiet. Sky above. Flowers. Georgian windows. You\'ve stepped out of Dublin into a time pocket.",im:"It\'s 1750. A merchant built this retreat. It\'s now. Tourists pass above unaware.",t:"A doorway. A passage. A courtyard emerges. Quiet. Sky above. Flowers. Georgian windows. You\'ve stepped out of Dublin into a time pocket.\",im:\"It\'s 1750. A merchant built this retreat. It\'s now. Tourists pass above unaware.\",t:\"Grattan House courtyard, Temple Bar area (ask locals for the passage). Free entry. Photography is meditation here. Go on a weekday when it\'s empty.",c:["hidden", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:10,n:"The Liberties and Dublin\'s Medieval Soul",a:"Liberties",v:["history", "local"],d:10,s:"Where Dublin was Dublin before the ring roads",st:"Medieval streets. Some crooked on purpose (taxes were by street width). The Liberties housed weavers, cobblers, workers. Now hipster cafés share the space with old Dublin. The contradiction is honest.",im:"It\'s 1400. A weaver works. It\'s 2020. A programmer works in a café above. The street remembers both.",t:"Medieval streets. Some crooked on purpose (taxes were by street width). The Liberties housed weavers, cobblers, workers. Now hipster cafés share the space with old Dublin. The contradiction is honest.\",im:\"It\'s 1400. A weaver works. It\'s 2020. A programmer works in a café above. The street remembers both.\",t:\"Walk Corn Market Row, Meath Street, Wexford Street, Liberties. Various cafés and pubs (€3-8). This is real Dublin living. Photography captures layers.",c:["history_big", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:11,n:"Guinness Storehouse and Corporate History",a:"Liberties",v:["history", "local"],d:11,s:"When beer became Irish identity",st:"A brewery since 1759. The Storehouse is marketing genius. A seven-story pint glass. At the top: a free pint. Below: the story of stout. It\'s honest about its dishonesty.",im:"It\'s 1759. A man brews beer. By 1922, he\'s defined Ireland. Now tourists pay to understand that definition.",t:"A brewery since 1759. The Storehouse is marketing genius. A seven-story pint glass. At the top: a free pint. Below: the story of stout. It\'s honest about its dishonesty.\",im:\"It\'s 1759. A man brews beer. By 1922, he\'s defined Ireland. Now tourists pay to understand that definition.\",t:\"Guinness Storehouse, St. James\'s Gate, Liberties. €22 (includes pint). The top floor (Gravity Bar) is the real attraction. Go at golden hour. The pint is ceremonial.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:12,n:"Stoneybatter Street and Village Dublin",a:"Stoneybatter",v:["local", "beautiful"],d:12,s:"A street that forgot it\'s in the city",st:"Narrow. Village-like. Independent shops. Bakeries. Cafés. This is where Dublin goes to remember it\'s human. Not big. Not corporate. Just a street being what streets were.",im:"It\'s evening. A woman buys bread. A man buys coffee. Time moves slower here.",t:"Narrow. Village-like. Independent shops. Bakeries. Cafés. This is where Dublin goes to remember it\'s human. Not big. Not corporate. Just a street being what streets were.\",im:\"It\'s evening. A woman buys bread. A man buys coffee. Time moves slower here.\",t:\"Stoneybatter, North Dublin (bus 38 or walk from city center, 20 min). Various shops and cafés (€3-8). This is Dublin without the show. Go on a weekday afternoon.",c:["local_only", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:13,n:"Phoenix Park and Dublin\'s Green Lung",a:"Phoenix Park",v:["nature", "free", "beautiful"],d:13,s:"1,752 acres. Bigger than Central Park. Mostly forgotten",st:"Deer roam. Monuments stand. Mostly empty. Dubliners use it for jogging. Tourists rarely come. A city treasure that the city takes for granted. In summer, people sprawl on grass.",im:"It\'s July. A thousand people lie on grass. Nobody\'s taking selfies. Just life.",t:"Deer roam. Monuments stand. Mostly empty. Dubliners use it for jogging. Tourists rarely come. A city treasure that the city takes for granted. In summer, people sprawl on grass.\",im:\"It\'s July. A thousand people lie on grass. Nobody\'s taking selfies. Just life.\",t:\"Phoenix Park (multiple entry points, Parkgate Street easiest). Free. Bring a bike or go by bus. The whole park is walkable. Go on a summer evening. The deer are wild.",c:["free", "nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:14,n:"Smithfield and Market Memory",a:"Smithfield",v:["history", "local"],d:14,s:"Where Dublin sold horses and now sells lifestyle",st:"Once a livestock market. Now gentrified. But the cobblestones remain. The square is huge. Horse auctions were held here until the 1970s. The market is gone. The space remembers.",im:"It\'s 1950. A man buys a horse. It\'s 2000. A woman buys a latte where the horse stood. The square knows both.",t:"Once a livestock market. Now gentrified. But the cobblestones remain. The square is huge. Horse auctions were held here until the 1970s. The market is gone. The space remembers.\",im:\"It\'s 1950. A man buys a horse. It\'s 2000. A woman buys a latte where the horse stood. The square knows both.\",t:\"Smithfield Square, North Dublin (Luas to Smithfield). Free to walk. Various cafés and shops (€3-12). The space has events most weekends. Photography excellent.",c:["history_big", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:15,n:"Portobello Canal and Waterway Peace",a:"Portobello",v:["quiet", "nature", "free"],d:15,s:"Where Dublin\'s industry became Dublin\'s rest",st:"The canal was commerce once. Barges. Trade. Now it\'s walking path. Swans. Ducks. You move beside the water for miles. It\'s quiet. It\'s free. It\'s Dublin\'s secret lung.",im:"It\'s 1800. A barge passes. It\'s now. A jogger passes. The water is the same.",t:"The canal was commerce once. Barges. Trade. Now it\'s walking path. Swans. Ducks. You move beside the water for miles. It\'s quiet. It\'s free. It\'s Dublin\'s secret lung.\",im:\"It\'s 1800. A barge passes. It\'s now. A jogger passes. The water is the same.\",t:\"Portobello Canal towpath (walk from city center, 20 min). Free. Pedestrian/cyclist only. Bring a book. Walk slowly. The water teaches quiet.",c:["free", "nature", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:16,n:"Rathmines and Middle-Class Dublin Memory",a:"Rathmines",v:["local", "beautiful"],d:16,s:"Where Dublin\'s middle class still happens",st:"Victorian terraces. Tree-lined streets. Independent shops. Cafés where people sit for hours. This is Dublin before gentrification but after slums. A moment frozen in time.",im:"It\'s 1990. Rathmines is just old. It\'s 2020. Rathmines is \'charming.\' Nothing changed but words.",t:"Victorian terraces. Tree-lined streets. Independent shops. Cafés where people sit for hours. This is Dublin before gentrification but after slums. A moment frozen in time.\",im:\"It\'s 1990. Rathmines is just old. It\'s 2020. Rathmines is \'charming.\' Nothing changed but words.\",t:\"Rathmines Road and surrounding streets (bus 14 from center, 15 min). Various shops and cafés (€3-8). Go on a Saturday morning. The character is the point.",c:["beautiful", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:17,n:"Howth Head and Sea Edge Cliffs",a:"Howth",v:["nature", "beautiful"],d:17,s:"Where Dublin remembers it has a coast",st:"A fishing village north of Dublin. Cliffs. Harbor. Fish restaurants. Day trip that feels far. You\'re still in the city but the sea argues otherwise. Seagulls yell constantly.",im:"It\'s morning. Fishing boats dock. Fish smells fill the harbor. It\'s evening. Tourists eat fish and watch the sunset. The harbor holds both.",t:"A fishing village north of Dublin. Cliffs. Harbor. Fish restaurants. Day trip that feels far. You\'re still in the city but the sea argues otherwise. Seagulls yell constantly.\",im:\"It\'s morning. Fishing boats dock. Fish smells fill the harbor. It\'s evening. Tourists eat fish and watch the sunset. The harbor holds both.\",t:\"Howth (DART train from city center, 30 min). Various restaurants (€15-25 for fish). Walk the cliff path (free, 1.5 hours). Go on a clear day. The view extends to Wales.",c:["nature", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:18,n:"Dún Laoghaire Pier and Promenade Culture",a:"Dún Laoghaire",v:["beautiful", "free"],d:18,s:"When Dublin turns into a seaside town",st:"A Victorian pier. Long promenade. Ice cream shops. Old arcades. It\'s retro by accident. Dubliners come here to feel on holiday while staying in the city.",im:"It\'s 1950. A family walks the pier. It\'s now. The family is old but the pier hasn\'t aged.",t:"A Victorian pier. Long promenade. Ice cream shops. Old arcades. It\'s retro by accident. Dubliners come here to feel on holiday while staying in the city.\",im:\"It\'s 1950. A family walks the pier. It\'s now. The family is old but the pier hasn\'t aged.\",t:\"Dún Laoghaire (DART from city center, 25 min). Free pier walk. Ice cream €4. Restaurants expensive (€20+). Go on a sunny afternoon. The pier is timeless.",c:["free", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:19,n:"Hugh Lane Gallery and Irish Art Rebellion",a:"Temple Bar",v:["beautiful", "history"],d:19,s:"A collector who wanted art to be Irish and free",st:"Hugh Lane wanted French Impressionists for Dublin. He died on the Lusitania (1915). His will is disputed. But the gallery exists. Monet, Picasso, Renoir. Irish institution.",im:"It\'s 1915. Lane drowns with his paintings still unclaimed. It\'s now. Dublin has the paintings because he died for them.",t:"Hugh Lane wanted French Impressionists for Dublin. He died on the Lusitania (1915). His will is disputed. But the gallery exists. Monet, Picasso, Renoir. Irish institution.\",im:\"It\'s 1915. Lane drowns with his paintings still unclaimed. It\'s now. Dublin has the paintings because he died for them.\",t:\"Hugh Lane Gallery, Parnell Square, Temple Bar. €15 (or free on Sundays/Thursdays afternoons). The rooftop sculpture garden is unexpected. Go quietly.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:20,n:"Ranelagh and Dublin\'s Gardens",a:"Ranelagh",v:["beautiful", "local", "free"],d:20,s:"A village green that Dublin swallowed but didn\'t digest",st:"A green space. Trees. Benches. Older Dublin sitting. Younger Dublin playing. The village feel survives in South Dublin. It\'s ordinary and essential.",im:"It\'s evening. A man sits alone. A family plays. A couple kisses. The green holds everyone.",t:"A green space. Trees. Benches. Older Dublin sitting. Younger Dublin playing. The village feel survives in South Dublin. It\'s ordinary and essential.\",im:\"It\'s evening. A man sits alone. A family plays. A couple kisses. The green holds everyone.\",t:\"Ranelagh Green (bus 44 from center, 20 min). Free. Walk around. Various cafés facing the green (€3-8). This is Dublin being Dublin. Go on a summer evening.",c:["free", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:21,n:"Phibsborough and Bohemian North Dublin",a:"Independent shops. Bookstores. Vintage clothes. It\'s Bohemia by accident. Rents are cheaper so creatives move. Soon rents rise. Soon they leave. The cycle continues.",v:["local", "beautiful"],d:21,s:"Where artists live because they can\'t afford South Dublin",st:"",im:"It\'s 2010. An artist moves to Phibsborough because it\'s affordable. By 2020, she\'s priced out. Another artist takes her place. The neighborhood remembers both.",t:"\",im:\"It\'s 2010. An artist moves to Phibsborough because it\'s affordable. By 2020, she\'s priced out. Another artist takes her place. The neighborhood remembers both.\",t:\"Walk Phibsborough Road and side streets (bus 10 from center). Various independent shops (€5-15). The character is free. Photography gold. Go on a weekend.",c:["local_only", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:22,n:"Georgian Architecture and Bath Elegance",a:"Phibsborough",v:["architecture", "beautiful"],d:22,s:"When Dublin thought straight lines were morality",st:"Squares and streets laid in perfect geometry. Red brick. Fanlights over doors. 18th-century Dublin thought the world should be ordered. The buildings reflect that thinking. Beauty through control.",im:"It\'s 1750. An architect designs a square. By 1800, the square is built. By now, we see the dream as a museum.",t:"Squares and streets laid in perfect geometry. Red brick. Fanlights over doors. 18th-century Dublin thought the world should be ordered. The buildings reflect that thinking. Beauty through control.\",im:\"It\'s 1750. An architect designs a square. By 1800, the square is built. By now, we see the dream as a museum.\",t:\"Merrion Square and Fitzwilliam Square (free walk). The exteriors are the architecture. Interiors are mostly private. Documentation is enough. Photography is abundant.",c:["architecture", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:23,n:"Wilde\'s Birthplace and Brilliance\'s House",a:"Temple Bar",v:["history", "quiet"],d:23,s:"Where Ireland\'s greatest wit was born (and rejected)",st:"Oscar Wilde. Born 21 Westland Row. The house is small. The man was enormous. He left Ireland. He died in Paris. But his ghost owns Dublin now. We quote him more than we live near him.",im:"It\'s 1854. A baby cries. It\'s 1895. The man is in prison. It\'s now. We read his words and laugh.",t:"Oscar Wilde. Born 21 Westland Row. The house is small. The man was enormous. He left Ireland. He died in Paris. But his ghost owns Dublin now. We quote him more than we live near him.\",im:\"It\'s 1854. A baby cries. It\'s 1895. The man is in prison. It\'s now. We read his words and laugh.\",t:\"21 Westland Row, Temple Bar (walking distance from center). Private now (no entry). The plaque is outside. Walk past and understand: genius doesn\'t need a museum.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:24,n:"Beckett Museum and the Silence We Inherit",a:"Trinity College",v:["history", "quiet"],d:24,s:"Where Samuel Beckett\'s words earn their silence",st:"Beckett. Irish. Wrote in French. About nothing. About suffering. About repetition. The museum holds manuscripts. His silence is audible. You leave changed and unsure why.",im:"It\'s 1950. Beckett writes: \'Nothing to be done.\' By now, the statement contains everything.",t:"Beckett. Irish. Wrote in French. About nothing. About suffering. About repetition. The museum holds manuscripts. His silence is audible. You leave changed and unsure why.\",im:\"It\'s 1950. Beckett writes: \'Nothing to be done.\' By now, the statement contains everything.\",t:\"Beckett Institute, Trinity College (Trinity Street area). €5-10 (varies with exhibits). Go on a quiet afternoon. Bring time. His words are slow.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:25,n:"Viking Triangle and Medieval Dublin Depths",a:"Liberties",v:["history", "weird"],d:25,s:"Where Dubliners discovered they\'re sitting on Vikings",st:"In the 1970s, excavation revealed a Viking settlement. Now a museum. You go below Dublin to see what came before. The city is archaeology. You\'re walking on time.",im:"It\'s 900 AD. A Viking ship arrives. By 1970, his bones emerge. By now, he\'s a tourist attraction.",t:"In the 1970s, excavation revealed a Viking settlement. Now a museum. You go below Dublin to see what came before. The city is archaeology. You\'re walking on time.\",im:\"It\'s 900 AD. A Viking ship arrives. By 1970, his bones emerge. By now, he\'s a tourist attraction.\",t:\"Dublinia (Viking Triangle Museum), High Street, Liberties. €12. The virtual reality experience is immersive. The history is dark. Understand Dublin\'s pre-Christian roots.",c:["history_big", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:26,n:"Christ Church Cathedral and Norman Gravity",a:"Liberties",v:["history", "beautiful"],d:26,s:"A church sinking into the ground it was built on",st:"1172. Norman building. The floor inside is uneven. The church is slowly sinking. They\'ve noticed. They\'re repairing. But it\'s fighting gravity and losing. It\'s beautiful because it\'s failing.",im:"It\'s 1172. A cathedral is built. By now, the earth claims what was built on it. The cathedral fights. The earth always wins.",t:"1172. Norman building. The floor inside is uneven. The church is slowly sinking. They\'ve noticed. They\'re repairing. But it\'s fighting gravity and losing. It\'s beautiful because it\'s failing.\",im:\"It\'s 1172. A cathedral is built. By now, the earth claims what was built on it. The cathedral fights. The earth always wins.\",t:\"Christ Church Cathedral, High Street, Liberties. €8. Walk inside and feel the floor slope. The crypt is medieval and eerie. Go at dusk. The light is old.",c:["history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:27,n:"St. Patrick\'s Cathedral and National Identity",a:"Liberties",v:["history", "beautiful"],d:27,s:"Where Jonathan Swift served and Ireland claims him",st:"Jonathan Swift was Dean here. He\'s buried inside. The cathedral is vast. It\'s a church but feels like a library. The walls hold the reformation. The stone remembers the arguments.",im:"It\'s 1740. Swift writes sermons. They\'re brilliant. By now, we know he was angry and we love him for it.",t:"Jonathan Swift was Dean here. He\'s buried inside. The cathedral is vast. It\'s a church but feels like a library. The walls hold the reformation. The stone remembers the arguments.\",im:\"It\'s 1740. Swift writes sermons. They\'re brilliant. By now, we know he was angry and we love him for it.\",t:\"St. Patrick\'s Cathedral, Patrick Street, Liberties. €9. Swift\'s grave is marked. Read his epitaph (it\'s in Latin and defiant). The interior is peaceful. Photography good.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:28,n:"Huguenot Quarter and Weaver Workshops",a:"Temple Bar",v:["history", "hidden"],d:28,s:"French Protestant refugees built Dublin\'s fabrics",st:"17th century. Huguenots fled France. Dublin welcomed them. They built weaving workshops. The quarter still has the old lanes. You walk where their looms once clattered.",im:"It\'s 1685. A French weaver arrives with his loom. By 1750, Huguenot weavers define Dublin\'s textile trade. By now, the machines are silent.",t:"17th century. Huguenots fled France. Dublin welcomed them. They built weaving workshops. The quarter still has the old lanes. You walk where their looms once clattered.\",im:\"It\'s 1685. A French weaver arrives with his loom. By 1750, Huguenot weavers define Dublin\'s textile trade. By now, the machines are silent.\",t:\"Huguenot Cemetery, Eustace Street, Temple Bar (walk from city center). Free. The graves are French and Irish. Understand Dublin\'s cosmopolitan past.",c:["history_big", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:29,n:"Smithfield and Chimney Stack Heritage",a:"Smithfield",v:["architecture", "history"],d:29,s:"A chimney that rises into Dublin\'s industrial past",st:"The Smithfield Chimney. 214 feet tall. 19th century. Stands alone now. The distillery is gone. The whiskey is gone. The stack remains as monument to heat and production.",im:"It\'s 1850. Whiskey vapors rise. It\'s now. The stack is a memorial to smoke.",t:"The Smithfield Chimney. 214 feet tall. 19th century. Stands alone now. The distillery is gone. The whiskey is gone. The stack remains as monument to heat and production.\",im:\"It\'s 1850. Whiskey vapors rise. It\'s now. The stack is a memorial to smoke.\",t:\"Smithfield Square and surroundings (Smithfield). The chimney is visible. The observation platform opened in 2021 (€6, walk inside to the top). Worth it for the views.",c:["architecture", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:30,n:"Dublin\'s Street Art and Graffiti Rebellion",a:"Liberties",v:["street_art", "local"],d:30,s:"Where illegal art became official culture",st:"Street art. Murals. Political and personal. The city tolerates it now. What started as rebellion is now authorized. But the anger remains. The paint still argues.",im:"It\'s 2005. An artist paints illegally. By 2015, the city commissions murals. The rebellion wins by being absorbed.",t:"Street art. Murals. Political and personal. The city tolerates it now. What started as rebellion is now authorized. But the anger remains. The paint still argues.\",im:\"It\'s 2005. An artist paints illegally. By 2015, the city commissions murals. The rebellion wins by being absorbed.\",t:\"Walk along Blackhall Place and Smithfield area (best concentration). Various walls show evolving art. Photography is the point. Go often—it changes weekly.",c:["street_art", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:31,n:"Custom House and Architectural Ambition",a:"Liberties",v:["architecture", "history"],d:31,s:"An 18th-century building too grand to demolish",st:"1791. James Gandon designed it. Massive dome. Riverfront. It was the seat of colonial power. Rebels burned the papers in 1921. Now it\'s government. The building outlasted empires.",im:"It\'s 1791. A dome rises. It\'s 1921. Rebels burn inside. It\'s now. We admire the architecture and forget the fire.",t:"1791. James Gandon designed it. Massive dome. Riverfront. It was the seat of colonial power. Rebels burned the papers in 1921. Now it\'s government. The building outlasted empires.\",im:\"It\'s 1791. A dome rises. It\'s 1921. Rebels burn inside. It\'s now. We admire the architecture and forget the fire.\",t:\"Custom House Quay, Liberties (walk from city center). Exterior free. Interior tours available (€5, arrange ahead). The dome is visible from everywhere. Photograph it at dusk.",c:["architecture", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:32,n:"O\'Connell Street and Monument Density",a:"Temple Bar",v:["history", "free"],d:32,s:"A street choked with statues of dead Irishmen",st:"The widest street in Dublin. Monuments everywhere. Independence fighters. Literary figures. Historical moments frozen in bronze. It\'s a museum of the dead. That\'s the point.",im:"It\'s 1898. A monument is unveiled. It\'s now. The street holds 50 monuments. Each remembers someone who\'s not here.",t:"The widest street in Dublin. Monuments everywhere. Independence fighters. Literary figures. Historical moments frozen in bronze. It\'s a museum of the dead. That\'s the point.\",im:\"It\'s 1898. A monument is unveiled. It\'s now. The street holds 50 monuments. Each remembers someone who\'s not here.\",t:\"O\'Connell Street, Temple Bar (center of city). Free to walk. Photography everywhere. Go on a clear day. The light hits the monuments beautifully. Understand Irish memory.",c:["history_big", "free"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:33,n:"Grafton Street and Busking Democracy",a:"Temple Bar",v:["local", "free", "beautiful"],d:33,s:"A pedestrian street where anyone with talent can earn",st:"The main shopping street. But it\'s also a stage. Buskers perform. Guitar players. Violinists. Flute players. Some are brilliant. The street is a concert. Free and constant.",im:"It\'s morning. A musician arrives. By noon, a crowd. By evening, another musician. The street never stops.",t:"The main shopping street. But it\'s also a stage. Buskers perform. Guitar players. Violinists. Flute players. Some are brilliant. The street is a concert. Free and constant.\",im:\"It\'s morning. A musician arrives. By noon, a crowd. By evening, another musician. The street never stops.\",t:\"Grafton Street, Temple Bar (walk from city center). Free. Photography of performers requires permission. Go on a Saturday afternoon. The buskers are best then. Bring coins.",c:["free", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:34,n:"Merrion Square and Literary Residents",a:"Temple Bar",v:["history", "beautiful"],d:34,s:"Where Irish writers had addresses and Dublin recognized them",st:"An 18th-century square. Georgian perfection. Plaques mark homes of Wilde, Beckett, others. You stand outside their residences and read their achievements. The square remembers them.",im:"It\'s 1875. A writer lives here and writes. By now, the plaque identifies him. The house remembers.",t:"An 18th-century square. Georgian perfection. Plaques mark homes of Wilde, Beckett, others. You stand outside their residences and read their achievements. The square remembers them.\",im:\"It\'s 1875. A writer lives here and writes. By now, the plaque identifies him. The house remembers.\",t:\"Merrion Square (south side), Temple Bar (walk from city center). Free walk. The exteriors are sufficient. Photography excellent. Read the plaques. Let history speak.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:35,n:"National Library and Archival Silence",a:"Temple Bar",v:["quiet", "history"],d:35,s:"Where Irish memory is preserved in paper and silence",st:"The entire Irish record. Books. Manuscripts. Letters. Stephen Dedalus worked here in Joyce\'s Ulysses. Now researchers and quiet seekers come. The silence is palpable.",im:"It\'s 1900. Joyce is here. It\'s now. You\'re standing where he stood, reading where he read.",t:"The entire Irish record. Books. Manuscripts. Letters. Stephen Dedalus worked here in Joyce\'s Ulysses. Now researchers and quiet seekers come. The silence is palpable.\",im:\"It\'s 1900. Joyce is here. It\'s now. You\'re standing where he stood, reading where he read.\",t:\"National Library of Ireland, Kildare Street, Temple Bar. Free entry to reading rooms (register). Bring quiet. Photography of manuscripts prohibited. The experience is in presence.",c:["quiet", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:36,n:"Aran Islands Pilgrimage Walk",a:"Dún Laoghaire",v:["nature", "history"],d:36,s:"Where Dublin remembers it\'s an island and goes west",st:"Day trip. Ferry from Dún Laoghaire. Three islands. Ancient stone forts. Beaches. You escape Dublin but stay Irish. The islands are what Dublin was before cities happened.",im:"It\'s 1500 AD. A monk prays. It\'s now. Tourists walk. The stones are the same.",t:"Day trip. Ferry from Dún Laoghaire. Three islands. Ancient stone forts. Beaches. You escape Dublin but stay Irish. The islands are what Dublin was before cities happened.\",im:\"It\'s 1500 AD. A monk prays. It\'s now. Tourists walk. The stones are the same.\",t:\"Ferry from Dún Laoghaire (90 min crossing, €20). Bike rental on islands (€8/day). Walk Inishmore. Ancient forts. Photography endless. Go on a clear day. The water is rough otherwise.",c:["nature", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:37,n:"Wicklow Mountains and Escape from City",a:"Ranelagh",v:["nature", "beautiful"],d:37,s:"When Dublin agrees to show you the world beyond",st:"South of Dublin. Mountains. Lakes. Waterfalls. Glendalough monastery. A day trip that replaces your entire week. Nature asserts itself. The city becomes irrelevant.",im:"It\'s morning. A hiker climbs toward clouds. By afternoon, the mountain seems like home. By evening, Dublin is a memory.",t:"South of Dublin. Mountains. Lakes. Waterfalls. Glendalough monastery. A day trip that replaces your entire week. Nature asserts itself. The city becomes irrelevant.\",im:\"It\'s morning. A hiker climbs toward clouds. By afternoon, the mountain seems like home. By evening, Dublin is a memory.\",t:\"Wicklow Mountains (bus tour or rental car from Dublin, 1-1.5 hours). Various hiking paths (free). Glendalough entry €5. Bring water. Bring time. Nature teaches patience.",c:["nature", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:38,n:"Temple Bar Kitchen and Food Redemption",a:"Temple Bar",v:["local", "free"],d:38,s:"When Irish food stops being a cliché",st:"Temple Bar is a tourist trap but good food survives here anyway. Fish and chips. Stew. Coddle. The ingredients tell stories. Dublin\'s working-class meals elevated. Simple and perfect.",im:"It\'s 1950. A woman makes stew. It\'s now. A chef remakes it. The recipe is unchanged. Only the price changed.",t:"Temple Bar is a tourist trap but good food survives here anyway. Fish and chips. Stew. Coddle. The ingredients tell stories. Dublin\'s working-class meals elevated. Simple and perfect.\",im:\"It\'s 1950. A woman makes stew. It\'s now. A chef remakes it. The recipe is unchanged. Only the price changed.\",t:\"Various restaurants in Temple Bar (€12-25 for dinner). The small places are better than the touristy ones. Go on a weekday evening. The ratio of tourists to real people improves.",c:["local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:39,n:"Nahe\'s Coffee Shop and Writer Mythology",a:"Temple Bar",v:["history", "local"],d:39,s:"Where every writer claims they wrote something here",st:"A café. Claims to be where writers worked. Probably false. But the mythology matters. If enough people believe Joyce sat here, he did. Belief is Dublin\'s economy.",im:"It\'s 1912. Joyce sits. It\'s now. We\'re convinced he sat. The belief is the magic.",t:"A café. Claims to be where writers worked. Probably false. But the mythology matters. If enough people believe Joyce sat here, he did. Belief is Dublin\'s economy.\",im:\"It\'s 1912. Joyce sits. It\'s now. We\'re convinced he sat. The belief is the magic.\",t:\"Nahe\'s Coffee Shop, South Great George Street, Temple Bar. Coffee €3. Sit at the back. Write something. Claim immortality through proximity.",c:["history_big", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:40,n:"Irish Music and Fiddle Sessions",a:"Temple Bar",v:["local", "night"],d:40,s:"When tourists and musicians play the same old song",st:"Sessions happen every night. Musicians arrive with fiddles. A song starts. Everyone knows it. Tourists think it\'s spontaneous. It\'s choreographed. But the music is real.",im:"It\'s 8pm. A musician starts. By 8:05, everyone joins. The song is hundreds of years old. By the end, everyone\'s Irish.",t:"Sessions happen every night. Musicians arrive with fiddles. A song starts. Everyone knows it. Tourists think it\'s spontaneous. It\'s choreographed. But the music is real.\",im:\"It\'s 8pm. A musician starts. By 8:05, everyone joins. The song is hundreds of years old. By the end, everyone\'s Irish.\",t:\"Various pubs Temple Bar (The Brazen Head is famous, O\'Donoghue\'s is traditional). Drinks €5-8. Go early (7-8pm) for real musicians. Later becomes tourists playing tourists.",c:["local_only", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:41,n:"Portobello Harbor and Royal Canal Walk",a:"Portobello",v:["nature", "free"],d:41,s:"Where Dublin built waterways for commerce and got parks",st:"The Royal Canal. Built for boats and trade. Now a pedestrian path. Miles of walking. Bridges. Trees. The canal connects Dublin to the countryside. Water as connection.",im:"It\'s 1800. A barge passes. It\'s now. A jogger passes. The water remembers both.",t:"The Royal Canal. Built for boats and trade. Now a pedestrian path. Miles of walking. Bridges. Trees. The canal connects Dublin to the countryside. Water as connection.\",im:\"It\'s 1800. A barge passes. It\'s now. A jogger passes. The water remembers both.\",t:\"Royal Canal Greenway (various access points). Free walking. Start near Portobello. Walk east or west for hours. Bring a book. The path teaches slow travel.",c:["free", "nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:42,n:"Pearse Street and Rebellion Ghosts",a:"Temple Bar",v:["history", "quiet"],d:42,s:"Where the General Post Office still stands from 1916",st:"The Easter Rising. 1916. Rebels occupied the GPO. They were executed. Now it\'s a post office and a museum. You buy stamps and history. Both are real.",im:"It\'s May 1916. A young rebel posts a letter before the firing squad. By now, the stamp is immortal.",t:"The Easter Rising. 1916. Rebels occupied the GPO. They were executed. Now it\'s a post office and a museum. You buy stamps and history. Both are real.\",im:\"It\'s May 1916. A young rebel posts a letter before the firing squad. By now, the stamp is immortal.\",t:\"General Post Office, O\'Connell Street, Temple Bar. Free interior (post office). Museum fee €3-5 (varies). Go on a quiet morning. Feel the weight.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:43,n:"Stoneybatter and Artisan Bakeries",a:"Stoneybatter",v:["local", "beautiful"],d:43,s:"Where bread became philosophy",st:"Sourdough culture. Artisan bakers. The neighborhood smells like good decisions. These aren\'t just bakers. They\'re archaeologists of fermentation. The bread tells its own story.",im:"It\'s 6am. A baker removes bread from an oven. By 7am, people wait for warm loaves. The bread is still talking.",t:"Sourdough culture. Artisan bakers. The neighborhood smells like good decisions. These aren\'t just bakers. They\'re archaeologists of fermentation. The bread tells its own story.\",im:\"It\'s 6am. A baker removes bread from an oven. By 7am, people wait for warm loaves. The bread is still talking.\",t:\"Bread 41, Stoneybatter (various locations). Loaves €4-6. Go early (6am opening). The bread is warmest fresh. Photography mandatory.",c:["local_only", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:44,n:"Literary Pub The Palace Bar",a:"Temple Bar",v:["history", "local", "night"],d:44,s:"Joyce\'s regular haunt where ghosts still drink",st:"A corner booth. Joyce sat there. Now tourists sit there hoping to absorb brilliance. It doesn\'t work that way. But the pub is real. The history is real. The drink tastes the same.",im:"It\'s 1912. Joyce drinks. It\'s now. We drink hoping to become him. The bar smiles at our delusion.",t:"A corner booth. Joyce sat there. Now tourists sit there hoping to absorb brilliance. It doesn\'t work that way. But the pub is real. The history is real. The drink tastes the same.\",im:\"It\'s 1912. Joyce drinks. It\'s now. We drink hoping to become him. The bar smiles at our delusion.\",t:\"The Palace Bar, Fleet Street, Temple Bar. Guinness €5. Go on a quiet afternoon. Sit in the corner booth. Order what Joyce ordered. Pretend briefly.",c:["history_big", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:45,n:"Howth Harbour and Fish Restaurant Culture",a:"Howth",v:["beautiful", "local"],d:45,s:"Where fish was caught this morning and eaten tonight",st:"A fishing village. Still. Boats dock. Fish is unloaded. Restaurants wait. You eat the day\'s catch. The journey from sea to plate takes hours. That\'s quality.",im:"It\'s 6am. A fisherman catches fish. It\'s 7pm. You eat it. The immediacy is Dublin.",t:"A fishing village. Still. Boats dock. Fish is unloaded. Restaurants wait. You eat the day\'s catch. The journey from sea to plate takes hours. That\'s quality.\",im:\"It\'s 6am. A fisherman catches fish. It\'s 7pm. You eat it. The immediacy is Dublin.\",t:\"Howth Harbour (DART train from center, 30 min). Various restaurants on quay (€20-30 per meal). Kippers for breakfast (€8-12). Go at sunset. The harbor glows.",c:["beautiful", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:46,n:"Botanic Gardens and Victoriana Preserved",a:"Phibsborough",v:["beautiful", "nature", "free"],d:46,s:"Where Dublin built a paradise for plants in 1795",st:"Victorians and plants. They loved both. The gardens are immaculate. Palm houses. Greenhouses. The Irish climate defeated by Victorian engineering. Now we walk through their obsession.",im:"It\'s 1850. A Victorian woman walks. Plants perfume the air. It\'s now. The same walk, same plants, same obsession.",t:"Victorians and plants. They loved both. The gardens are immaculate. Palm houses. Greenhouses. The Irish climate defeated by Victorian engineering. Now we walk through their obsession.\",im:\"It\'s 1850. A Victorian woman walks. Plants perfume the air. It\'s now. The same walk, same plants, same obsession.\",t:\"National Botanic Gardens, Glasnevin, Phibsborough. €15 (or free on Tuesdays/Sundays 9-11am). Palm house is tropical inside cold Dublin. Go on a clear day. Light matters.",c:["nature", "free"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:47,n:"Irish Whiskey Museum and Poetic Fire",a:"Temple Bar",v:["history", "local"],d:47,s:"Where Ireland explains why it drinks",st:"Four distilleries exist now (more planned). The museum tells the history. From monastery to industry. The reason is in the water. The poetry is in the taste.",im:"It\'s 1400. A monk distills. By now, it\'s science and art combined.",t:"Four distilleries exist now (more planned). The museum tells the history. From monastery to industry. The reason is in the water. The poetry is in the taste.\",im:\"It\'s 1400. A monk distills. By now, it\'s science and art combined.\",t:\"Irish Whiskey Museum, Roe & Co Distillery, Thomas Street, Temple Bar. €20 (includes tasting). Tours available (€25). The tasting is the real experience. Book ahead.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:48,n:"Kilmainham Arts Festival and Community Rebellion",a:"Kilmainham",v:["local", "beautiful"],d:48,s:"A former industrial area that art reclaimed",st:"Galleries. Studios. Artist residencies. Kilmainham is becoming what Christchurch achieved. Spaces where creation happens openly. The area pulses with ambition.",im:"It\'s 1990. A factory is empty. By 2015, it\'s a gallery. By now, it\'s the future.",t:"Galleries. Studios. Artist residencies. Kilmainham is becoming what Christchurch achieved. Spaces where creation happens openly. The area pulses with ambition.\",im:\"It\'s 1990. A factory is empty. By 2015, it\'s a gallery. By now, it\'s the future.\",t:\"Kilmainham Arts Festival (spring/autumn typically). Various galleries (free to most). Walk the area. The murals are everywhere. Photography excellent.",c:["street_art", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:49,n:"Richmond Prison and Historical Weight",a:"Liberties",v:["history", "quiet"],d:49,s:"Where Irish rebels were imprisoned and history changed",st:"A prison. Now a tour venue. The cells remain. The weight remains. You stand where people waited for execution. The space remembers its purpose.",im:"It\'s 1916. A rebel waits. It\'s now. We stand where he stood. History is immediate.",t:"A prison. Now a tour venue. The cells remain. The weight remains. You stand where people waited for execution. The space remembers its purpose.\",im:\"It\'s 1916. A rebel waits. It\'s now. We stand where he stood. History is immediate.\",t:\"Kilmainham Gaol Museum (same as the Rebellion), Inchicore Road. €9. The tour is mandatory. The execution yard is overwhelming. Book ahead. The experience is heavy.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:50,n:"Copper Alley and Viking Remnants",a:"Temple Bar",v:["history", "hidden"],d:50,s:"Where Dublin\'s oldest copper merchants worked and history persists",st:"A narrow lane. Medieval. Still has the feeling. Copper workers were here. Now shops. But the alley remembers what it was through its stones.",im:"It\'s 1300. A copper worker shapes metal. It\'s now. A tourist walks unaware of who was here.",t:"A narrow lane. Medieval. Still has the feeling. Copper workers were here. Now shops. But the alley remembers what it was through its stones.\",im:\"It\'s 1300. A copper worker shapes metal. It\'s now. A tourist walks unaware of who was here.\",t:\"Copper Alley, Temple Bar (walk from city center). Free. The alley is the point. Walk slowly. Let the centuries speak.",c:["history_big", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:51,n:"North Strand and Bombing Memory",a:"Temple Bar",v:["history", "quiet"],d:51,s:"Where Nazis bombed neutral Dublin by accident",st:"May 31, 1941. German bombers. Neutral Ireland. 34 dead. The street was bombed by mistake (the bombs were meant for the docks). Now it\'s just a street. But the memory is held.",im:"It\'s dawn 1941. Bombs fall. A city wakes to war. It\'s now. The street is rebuilt. The memory isn\'t.",t:"May 31, 1941. German bombers. Neutral Ireland. 34 dead. The street was bombed by mistake (the bombs were meant for the docks). Now it\'s just a street. But the memory is held.\",im:\"It\'s dawn 1941. Bombs fall. A city wakes to war. It\'s now. The street is rebuilt. The memory isn\'t.\",t:\"North Strand, Temple Bar area. Free walk. A plaque marks the site. The street is ordinary now. That\'s the point—history is ordinary until we remember it.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:52,n:"Abbey Theatre and National Drama",a:"Temple Bar",v:["history", "beautiful"],d:52,s:"Where Irish theater defined what it means to be Irish",st:"Founded 1904. Yeats. Synge. The plays were revolutionary. They showed Ireland to itself. Riots. Applause. Same theater. Now it\'s institutional. The rebellion is history.",im:"It\'s 1907. A play about Irish rural life causes a riot. It\'s now. The same theater plays it to applauding tourists.",t:"Founded 1904. Yeats. Synge. The plays were revolutionary. They showed Ireland to itself. Riots. Applause. Same theater. Now it\'s institutional. The rebellion is history.\",im:\"It\'s 1907. A play about Irish rural life causes a riot. It\'s now. The same theater plays it to applauding tourists.\",t:\"Abbey Theatre, Liffey Street, Temple Bar. Tickets €20-50 (depending on show). Go for a performance, not just architecture. See what Irish drama became.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:53,n:"Ha\'Penny Bridge and Victorian Vanity",a:"Temple Bar",v:["beautiful", "history"],d:53,s:"A cast-iron bridge that charged Irish workers a ha\'penny",st:"Built 1816. You paid a coin to cross. Now it\'s free and iconic. The bridge is beautiful because it\'s unnecessary—there\'s always another way. Humans paid for beauty.",im:"It\'s 1820. A worker debates: cross and pay or walk far? The bridge means convenience costs. It\'s now. Nobody pays. The bridge remains beautiful.",t:"Built 1816. You paid a coin to cross. Now it\'s free and iconic. The bridge is beautiful because it\'s unnecessary—there\'s always another way. Humans paid for beauty.\",im:\"It\'s 1820. A worker debates: cross and pay or walk far? The bridge means convenience costs. It\'s now. Nobody pays. The bridge remains beautiful.\",t:\"Ha\'Penny Bridge (Liffey Street, Temple Bar). Free crossing. Photography everywhere. Go at golden hour. The light hits the iron perfectly.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:54,n:"Samuel Beckett Bridge and Modern Dublin",a:"Liberties",v:["architecture", "beautiful"],d:54,s:"A bridge shaped like Beckett\'s theater of silence",st:"2009. Named after Beckett. The arch is a harp. The cable-stayed design is elegant. It connects north and south. Modern Dublin respects its writers even as statues.",im:"It\'s 2009. A bridge opens named after a man who wrote about silence. The bridge understands irony.",t:"2009. Named after Beckett. The arch is a harp. The cable-stayed design is elegant. It connects north and south. Modern Dublin respects its writers even as statues.\",im:\"It\'s 2009. A bridge opens named after a man who wrote about silence. The bridge understands irony.\",t:\"Samuel Beckett Bridge (walk from Temple Bar, visible from multiple points). Free crossing. Photography beautiful from underneath. Go at dusk. The light is literary.",c:["architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:55,n:"Teeling Whiskey Distillery and Future Tradition",a:"Liberties",v:["local", "history"],d:55,s:"When Dublin remembers it made whiskey for centuries",st:"New distillery (opened 2015) in the old whiskey quarter. They\'re reviving what was lost. Single pot still whiskey. The craft is returning. Dublin\'s alcohol heritage is writing its future.",im:"It\'s 1800. Whiskey distilleries fill Dublin. It\'s 1960. They\'re gone. It\'s 2015. One reopens. History cycles.",t:"New distillery (opened 2015) in the old whiskey quarter. They\'re reviving what was lost. Single pot still whiskey. The craft is returning. Dublin\'s alcohol heritage is writing its future.\",im:\"It\'s 1800. Whiskey distilleries fill Dublin. It\'s 1960. They\'re gone. It\'s 2015. One reopens. History cycles.\",t:\"Teeling Distillery, Newmarket, Liberties. €20 for tour and tasting. The whiskey is excellent. Book ahead. It\'s popular. Go on a weekday for smaller groups.",c:["history_big", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:56,n:"Secret St. Audoen\'s Church Garden — Temple Bar",a:"Temple Bar",v:["hidden", "history", "quiet"],d:56,s:"Dublin\'s oldest church with a graveyard where sheep graze",st:"St. Audoen\'s is the only medieval parish church still in use in Dublin. But the real magic is the graveyard behind it. Sheep graze between tombstones. Wildflowers grow untended. Time feels stopped. The city roars outside. Inside, it\'s 1500. The contrast is disturbing and beautiful.",im:"It\'s 1500. A priest buries a merchant. Sheep stood in this graveyard then too. They stand here now. The wool changes. The sheep are eternal.",t:"St. Audoen\'s is the only medieval parish church still in use in Dublin. But the real magic is the graveyard behind it. Sheep graze between tombstones. Wildflowers grow untended. Time feels stopped. The city roars outside. Inside, it\'s 1500. The contrast is disturbing and beautiful.\",im:\"It\'s 1500. A priest buries a merchant. Sheep stood in this graveyard then too. They stand here now. The wool changes. The sheep are eternal.\",t:\"St. Audoen\'s Church, High Street, Temple Bar. Free entry to graveyard. Walk through the passage from High Street (unmarked but the locals know). Best 8-9am. Bring a sweater—the wind cuts through old graves.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:57,n:"Marsh\'s Library Hidden Manuscripts — Temple Bar",a:"Temple Bar",v:["history", "quiet", "beautiful"],d:57,s:"Ireland\'s oldest public library where you read chained books in candlelight",st:"Opened 1707. Books are chained to desks. You request a volume. A librarian opens the cases. You sit in a wooden cubicle. The light is low. The air smells of leather and ancient paper. The world outside doesn\'t exist. You\'re reading books no one else has opened in years.",im:"It\'s 1707. A scholar reads by candlelight. He\'s searched for this manuscript for five years. Finally, it\'s in his hands. Time stops.",t:"Opened 1707. Books are chained to desks. You request a volume. A librarian opens the cases. You sit in a wooden cubicle. The light is low. The air smells of leather and ancient paper. The world outside doesn\'t exist. You\'re reading books no one else has opened in years.\",im:\"It\'s 1707. A scholar reads by candlelight. He\'s searched for this manuscript for five years. Finally, it\'s in his hands. Time stops.\",t:\"St. Werburgh Street, Temple Bar. €5 entry. Hours 10am-1pm, 2-5pm Wednesday-Friday, 10am-1pm Saturday. U-Bahn around the corner. Limited visitors. The oldest Irish manuscripts are here. Truly magical.",c:["history_big", "free_museum"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:58,n:"Kilmainham Gaol Ghosts — Inchicore",a:"Inchicore",v:["history", "scary", "famous_dead"],d:58,s:"Where Irish rebels were executed before Independence. Now their cells echo",st:"1916 Rising. Fifteen rebels executed in the prison yard. You walk their cells. You stand where they died. The walls are cold. No ghosts, but the weight of history is physical. The guide\'s voice drops in the execution yard. You understand what freedom cost. The silence after shooting is louder than any gunshot.",im:"It\'s May 1916. A rebel stands against the wall. He doesn\'t know he\'s about to become a martyr. His death will inspire a nation. Right now, he just stands.",t:"1916 Rising. Fifteen rebels executed in the prison yard. You walk their cells. You stand where they died. The walls are cold. No ghosts, but the weight of history is physical. The guide\'s voice drops in the execution yard. You understand what freedom cost. The silence after shooting is louder than any gunshot.\",im:\"It\'s May 1916. A rebel stands against the wall. He doesn\'t know he\'s about to become a martyr. His death will inspire a nation. Right now, he just stands.\",t:\"Kilmainham Gaol, Dublin 8. €8 entry. LUAS Red Line to Kilmainham Station (10min walk). Timed entry (book online, €10). Tours run 9:30am-4pm. Bring respectful silence. This is Ireland\'s birthplace.",c:["history_big", "scary", "famous_dead"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:59,n:"Iveagh Gardens Secret Park — Clonmel Street",a:"Saint Kevin",v:["beautiful", "hidden", "free"],d:59,s:"A Victorian garden so hidden most Dubliners never find it",st:"Few know it exists. Enter through a small gate on Clonmel Street. Cascades, rockeries, a lake, wildflowers. It\'s perfection in miniature. No crowds. No vendors. No tourists. Just gardens, light, and peace. It\'s Dublin\'s best-kept secret. The silence is profound.",im:"It\'s 1885. A gardener plants a rose. He knows only wealthy Dubliners will walk here. He plants anyway. In 140 years, students will hide here to escape exams.",t:"Few know it exists. Enter through a small gate on Clonmel Street. Cascades, rockeries, a lake, wildflowers. It\'s perfection in miniature. No crowds. No vendors. No tourists. Just gardens, light, and peace. It\'s Dublin\'s best-kept secret. The silence is profound.\",im:\"It\'s 1885. A gardener plants a rose. He knows only wealthy Dubliners will walk here. He plants anyway. In 140 years, students will hide here to escape exams.\",t:\"Clonmel Street, Dublin 2 (off Harcourt Street). Free entry. Open 8am-dusk. Take the side gate on Clonmel Street. No signage. The locals guard this place. Respectful visitors only.",c:["parks", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:60,n:"Dublin Castle Underground Secrets — Temple Bar",a:"Temple Bar",v:["history", "hidden", "scary"],d:60,s:"Medieval fortification where Vikings left traces, now beneath tourist crowds",st:"Dublin Castle was built on a Viking fortress. Beneath the tourist-crowded courtyards, you can still see the medieval foundation walls. Book the underground tour. Walk through medieval passages. See where the original Dubliners lived. The air is cold. Your footsteps echo in 900-year-old rooms.",im:"It\'s 900 AD. A Viking builds a wall. It will outlast empires. It will outlast his descendants. It still stands.",t:"Dublin Castle was built on a Viking fortress. Beneath the tourist-crowded courtyards, you can still see the medieval foundation walls. Book the underground tour. Walk through medieval passages. See where the original Dubliners lived. The air is cold. Your footsteps echo in 900-year-old rooms.\",im:\"It\'s 900 AD. A Viking builds a wall. It will outlast empires. It will outlast his descendants. It still stands.\",t:\"Dame Street, Temple Bar. €10.50 entry (underground tour included). Guided tours 10am-4:45pm. Book ahead. U-Bahn St. Stephen\'s Green. The medieval undercroft is the real treasure.",c:["history_big", "scary"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:61,n:"Glasnevin Cemetery Famous Graves — Glasnevin",a:"Glasnevin",v:["history", "quiet", "famous_dead"],d:61,s:"Graves of Irish rebels, poets, and patriots mapped like an open history book",st:"A garden-cemetery with over 1 million bodies. Michael Collins, Yeats, O\'Casey—Irish giants rest here. Pick up a map at entrance. The graves are weathered monuments to Irish struggle and poetry. It\'s peaceful and profound. The tombs tell stories. Walking here is reading Irish history carved in stone.",im:"It\'s 1922. Michael Collins is buried. The Irish state is brand new. His grave becomes a pilgrimage site. A hundred years later, teenagers visit to understand their country.",t:"A garden-cemetery with over 1 million bodies. Michael Collins, Yeats, O\'Casey—Irish giants rest here. Pick up a map at entrance. The graves are weathered monuments to Irish struggle and poetry. It\'s peaceful and profound. The tombs tell stories. Walking here is reading Irish history carved in stone.\",im:\"It\'s 1922. Michael Collins is buried. The Irish state is brand new. His grave becomes a pilgrimage site. A hundred years later, teenagers visit to understand their country.\",t:\"Glasnevin Cemetery, Glasnevin. €8 entry + €3 map. 2.5km north of city center (bus 40, 140 to Glasnevin cemetery gate). Open 9am-5pm. The cemetery tower offers views. Bring respectful shoes. This is holy ground.",c:["history_big", "famous_dead"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:62,n:"Viking Triangle Foundations Walk — Temple Bar",a:"Temple Bar",v:["history", "hidden"],d:62,s:"Streets that follow 1000-year-old Viking street patterns still visible underfoot",st:"Dublin\'s oldest streets (Fishamble, Winetavern, Wood Quay) follow the Viking street plan. You\'re walking on paths that have been walked for a millennium. Beneath the cobbles are Viking houses. The pattern of the streets hasn\'t changed. You\'re walking where Vikings walked. It\'s the city as time machine.",im:"It\'s 1000 AD. A Viking walks Winetavern Street to the quay to trade. A thousand years later, a teenager walks the same path on the way to school.",t:"Dublin\'s oldest streets (Fishamble, Winetavern, Wood Quay) follow the Viking street plan. You\'re walking on paths that have been walked for a millennium. Beneath the cobbles are Viking houses. The pattern of the streets hasn\'t changed. You\'re walking where Vikings walked. It\'s the city as time machine.\",im:\"It\'s 1000 AD. A Viking walks Winetavern Street to the quay to trade. A thousand years later, a teenager walks the same path on the way to school.\",t:\"Start Christchurch Cathedral, Temple Bar area. Free walking. Take the Viking Triangle self-guided tour (map at visitor center). U-Bahn around the corner. Best early morning when streets are empty.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:63,n:"Chester Beatty Library Precious Manuscripts — Temple Bar",a:"Temple Bar",v:["beautiful", "history", "free"],d:63,s:"Medieval manuscripts and ancient scrolls you can see with your own eyes",st:"In a castle wing, this collection holds something incredible: original illuminated manuscripts, ancient papyrus, Arabic calligraphy. Medieval bibles where monks drew tiny perfect letters. The collection is world-class but free. Tourists miss it for the National Museum next door. You won\'t. Stand inches from 2000-year-old books.",im:"It\'s 500 AD. A monk illuminates a letter. He is creating for eternity. He doesn\'t know a millionaire will buy his work 1500 years later. He just creates.",t:"In a castle wing, this collection holds something incredible: original illuminated manuscripts, ancient papyrus, Arabic calligraphy. Medieval bibles where monks drew tiny perfect letters. The collection is world-class but free. Tourists miss it for the National Museum next door. You won\'t. Stand inches from 2000-year-old books.\",im:\"It\'s 500 AD. A monk illuminates a letter. He is creating for eternity. He doesn\'t know a millionaire will buy his work 1500 years later. He just creates.\",t:\"Chester Beatty Library, Dublin Castle, Temple Bar. Free entry. Open 10am-5pm (noon-5pm Sundays). Book online (book ahead Tue-Fri). U-Bahn St. Stephen\'s Green. This is museum-level quality for zero cost.",c:["free_museum", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:64,n:"Tivoli Theatre Murals Spot — North King Street",a:"Smithfield",v:["street_art", "hidden", "local"],d:64,s:"Street art that started as riots in 1916, now it\'s a memorial wall",st:"North King Street is where the 1916 Rising came to brutal end. British soldiers executed civilians. Now the street is covered in murals—faces of the dead, political art, hope. The murals change constantly. Artists tag over each other. It\'s a living memorial. Every color is a conversation about Irish freedom.",im:"It\'s 1916. Soldiers march down the street. Civilians fall. In 100 years, artists will reclaim this space with color. Grief becomes art.",t:"North King Street is where the 1916 Rising came to brutal end. British soldiers executed civilians. Now the street is covered in murals—faces of the dead, political art, hope. The murals change constantly. Artists tag over each other. It\'s a living memorial. Every color is a conversation about Irish freedom.\",im:\"It\'s 1916. Soldiers march down the street. Civilians fall. In 100 years, artists will reclaim this space with color. Grief becomes art.\",t:\"North King Street, Smithfield. Free walking. Luas Red Line to Smithfield. Best 10am-2pm for light. Bring a camera. Bring respect for what happened here.",c:["street_art", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:65,n:"Phoenix Park Deer at Dawn — Cabra",a:"Cabra",v:["nature", "quiet", "free"],d:65,s:"1,700 acres of park with 500 wild deer that most visitors never see",st:"Phoenix Park is massive. Most tourists see the Papal Cross and leave. But arrive at 6am. The deer are out. Hundreds of them, grazing. The park is mist and silence. You\'re in wilderness inside a city. The landscape is timeless. The deer have been here for 300 years. They don\'t acknowledge you. You\'re the visitor in their world.",im:"It\'s 1662. The park is created. Deer are imported. A family of them stands in morning mist. In 360 years, their descendants will still stand here, indifferent to history.",t:"Phoenix Park is massive. Most tourists see the Papal Cross and leave. But arrive at 6am. The deer are out. Hundreds of them, grazing. The park is mist and silence. You\'re in wilderness inside a city. The landscape is timeless. The deer have been here for 300 years. They don\'t acknowledge you. You\'re the visitor in their world.\",im:\"It\'s 1662. The park is created. Deer are imported. A family of them stands in morning mist. In 360 years, their descendants will still stand here, indifferent to history.\",t:\"Phoenix Park entrance on Chesterfield Avenue. Free entry. Bus 37, 39, 120 to the park. Arrive 6-7am for deer and emptiness. Bring binoculars. Bring patience. The deer are wild—keep distance.",c:["nature", "parks", "free"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:66,n:"Grand Canal at Sunset — Portobello",a:"Portobello",v:["beautiful", "quiet", "romantic_water"],d:66,s:"A commercial waterway that became Dublin\'s most romantic walk",st:"Walk the towpath from Portobello Bridge westward. Trees line the water. Old lock-keeper\'s cottages. Small gardens. Swans. The light in late afternoon turns gold. The canal is quiet. You hear water, birds, your footsteps. It\'s impossible to believe you\'re still in Dublin. The city has disappeared.",im:"It\'s 1800. A merchant boat glides down the canal. A woman stands on the bridge. She watches it go. In 200 years, she is dust. The canal is still beautiful.",t:"Walk the towpath from Portobello Bridge westward. Trees line the water. Old lock-keeper\'s cottages. Small gardens. Swans. The light in late afternoon turns gold. The canal is quiet. You hear water, birds, your footsteps. It\'s impossible to believe you\'re still in Dublin. The city has disappeared.\",im:\"It\'s 1800. A merchant boat glides down the canal. A woman stands on the bridge. She watches it go. In 200 years, she is dust. The canal is still beautiful.\",t:\"Portobello Bridge, Portobello (LUAS Green Line to Portobello). Free walking. Best 4-6pm spring/summer. Bring a notebook. The tow path goes 5km to Rialto Bridge. Walk one way, grab a bus back.",c:["romantic_water", "parks"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:67,n:"Free National Gallery First Floors — Merrion Square",a:"Merrion Square",v:["free", "beautiful", "history"],d:67,s:"European masterpieces hanging free in rooms tourists skip",st:"The National Gallery is free. Most tourists don\'t come. The main galleries hold paintings by Caravaggio, Rembrandt, Vermeer. Irish artists like Yeats\'s brother (a painter). You\'ll be alone in rooms with masterpieces. The light is natural. The silence is absolute. It\'s one of Europe\'s great secrets.",im:"It\'s 1864. The gallery opens. Free entry for the people. In 160 years, most people still don\'t know to come.",t:"The National Gallery is free. Most tourists don\'t come. The main galleries hold paintings by Caravaggio, Rembrandt, Vermeer. Irish artists like Yeats\'s brother (a painter). You\'ll be alone in rooms with masterpieces. The light is natural. The silence is absolute. It\'s one of Europe\'s great secrets.\",im:\"It\'s 1864. The gallery opens. Free entry for the people. In 160 years, most people still don\'t know to come.\",t:\"National Gallery, Merrion Square, Dublin 2. Free entry (donations welcome). Open 9:30am-5:30pm (6pm Thursday). U-Bahn St. Stephen\'s Green. Arrive 10am for morning light. The Irish rooms are upstairs—underrated.",c:["free_museum", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:68,n:"Howth Cliff Collapse Drama — Howth",a:"Howth",v:["nature", "beautiful", "scary"],d:68,s:"Red cliffs above sea where Dublin ends and geology speaks",st:"Take the DART to Howth. Walk the cliff path. The sea boils below. The cliffs are dramatic—red stone, carved by waves for millennia. It\'s not a gentle walk. The wind is real. The drop is real. On clear days, you see Wales. The drama is in the geology and your mortality.",im:"It\'s 10,000 years ago. The ice age is ending. Waves crash against newborn cliffs. Humans haven\'t seen them yet. The cliffs are older than memory.",t:"Take the DART to Howth. Walk the cliff path. The sea boils below. The cliffs are dramatic—red stone, carved by waves for millennia. It\'s not a gentle walk. The wind is real. The drop is real. On clear days, you see Wales. The drama is in the geology and your mortality.\",im:\"It\'s 10,000 years ago. The ice age is ending. Waves crash against newborn cliffs. Humans haven\'t seen them yet. The cliffs are older than memory.\",t:\"Howth, North Dublin. DART to Howth (30min from city center). The cliff walk starts at Howth Harbour. 2-hour circuit. Bring wind-resistant clothing. The cliffs are unstable—stay on path. Views of Dublin from above are unbeatable.",c:["nature", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:69,n:"Smithfield Night Markets Street Eats — Smithfield",a:"Smithfield",v:["night", "local", "weird"],d:69,s:"Illegal in spirit but tolerated in reality: Dublin\'s underground street food scene",st:"Friday-Saturday nights, Smithfield becomes a food bazaar. Street vendors appear. Chinese, Mexican, Thai, Irish. Pop-up bars. Musicians. It\'s raw, unregulated, and real Dublin after dark. The Garda (police) don\'t raid anymore. They just watch. This is Dublin\'s nighttime nervous system.",im:"It\'s midnight. A vendor cooks. A queue forms. Someone plays guitar. Dublin is awake. The official restaurants are closed. This is the real feast.",t:"Friday-Saturday nights, Smithfield becomes a food bazaar. Street vendors appear. Chinese, Mexican, Thai, Irish. Pop-up bars. Musicians. It\'s raw, unregulated, and real Dublin after dark. The Garda (police) don\'t raid anymore. They just watch. This is Dublin\'s nighttime nervous system.\",im:\"It\'s midnight. A vendor cooks. A queue forms. Someone plays guitar. Dublin is awake. The official restaurants are closed. This is the real feast.\",t:\"Smithfield Square, Smithfield. Friday-Saturday 9pm-3am (seasonal). Best 11pm-2am. Cash only mostly. €5-12 per meal. Go hungry. The vibe is electric.",c:["local_only", "night"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:70,n:"Brick Lane Street Art Evolution — Smithfield",a:"Smithfield",v:["street_art", "local", "weird"],d:70,s:"A narrow lane that becomes a new gallery every week as artists battle",st:"Artists paint illegally. City cleaners paint white. Artists paint again. It\'s an endless conversation. Some pieces last hours. Some last weeks. The art here is fiercer than in official galleries. It has to be—it might be gone tomorrow. The urgency is in every line.",im:"It\'s 3am. A crew paints a massive piece. By Tuesday, it\'s gone. But they already planned the next one. The battle is eternal.",t:"Artists paint illegally. City cleaners paint white. Artists paint again. It\'s an endless conversation. Some pieces last hours. Some last weeks. The art here is fiercer than in official galleries. It has to be—it might be gone tomorrow. The urgency is in every line.\",im:\"It\'s 3am. A crew paints a massive piece. By Tuesday, it\'s gone. But they already planned the next one. The battle is eternal.\",t:\"Brick Lane, near Smithfield area (various murals throughout Smithfield). Free walking. Tram connections nearby. Best Saturday morning for new pieces. Bring camera. Bring respect for illegal artists.",c:["street_art", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:71,n:"Dun Laoghaire Pier Evening Light — Dun Laoghaire",a:"Dun Laoghaire",v:["beautiful", "romantic_water", "quiet"],d:71,s:"An 1800s seawall where Dublin\'s wealthy walk and the sea meets the sky",st:"Take the DART south 20 minutes. Dun Laoghaire is Dublin\'s maritime suburb. Walk the two long piers. The sea is immense. Light turns pink and gold at sunset. A few locals fish. Mostly it\'s quiet. It\'s one of the most beautiful light shows in Ireland, and tourists ignore it entirely.",im:"It\'s 1859. The pier is brand new. A woman walks with her suitor. The Irish Sea is their future. They don\'t know what history will bring. They just enjoy the light.",t:"Take the DART south 20 minutes. Dun Laoghaire is Dublin\'s maritime suburb. Walk the two long piers. The sea is immense. Light turns pink and gold at sunset. A few locals fish. Mostly it\'s quiet. It\'s one of the most beautiful light shows in Ireland, and tourists ignore it entirely.\",im:\"It\'s 1859. The pier is brand new. A woman walks with her suitor. The Irish Sea is their future. They don\'t know what history will bring. They just enjoy the light.\",t:\"Dun Laoghaire Pier, Co. Dublin. DART to Dun Laoghaire (25min from city center). Free walking. East and West piers each 1km. Best 5-7pm. Bring a sweater. The wind is real. Walk at your own pace. This is meditation time.",c:["romantic_water"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:72,n:"Ancient Ogham Stones at Monasterboice — County Louth",a:"County Louth",v:["history", "weird", "beautiful"],d:72,s:"A day trip to 1500-year-old standing stones carved in a lost language",st:"Drive north an hour to a monastic site. Stone crosses carved by monks. Ogham stones carved in an ancient alphabet no one really knows. The energy is pagan and Christian mixed. Few tourists come. It\'s silent. The stones don\'t explain themselves. You\'re guessing at meaning across 1500 years.",im:"It\'s 500 AD. A monk carves the Ogham stone. He speaks Irish, Latin, and the secret language. His meaning is locked inside the stone forever.",t:"Drive north an hour to a monastic site. Stone crosses carved by monks. Ogham stones carved in an ancient alphabet no one really knows. The energy is pagan and Christian mixed. Few tourists come. It\'s silent. The stones don\'t explain themselves. You\'re guessing at meaning across 1500 years.\",im:\"It\'s 500 AD. A monk carves the Ogham stone. He speaks Irish, Latin, and the secret language. His meaning is locked inside the stone forever.\",t:\"Monasterboice, Co. Louth (1 hour north by car/bus). Bus 100 from Dublin. €3-5 entry. The site is open air. Best in afternoon light. Bring a coat. The history here is tactile.",c:["history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:73,n:"Stephen\'s Green Autumn Gold — Saint Kevin",a:"Saint Kevin",v:["beautiful", "quiet"],d:73,s:"A Victorian park where Dublin slows down in fall and remembers beauty",st:"Stephen\'s Green is always lovely. But in October-November, it becomes otherworldly. Golden leaves. Lower light. Fewer tourists. Locals sit on benches reading. Pigeons settle. The light turns honey-colored. You can sit for hours and just watch color change. It\'s Dublin\'s best meditation spot.",im:"It\'s November 1950. A widow sits on a bench. She sits on the same bench every day. She\'s been coming here for 40 years. The city changes. The park doesn\'t.",t:"Stephen\'s Green is always lovely. But in October-November, it becomes otherworldly. Golden leaves. Lower light. Fewer tourists. Locals sit on benches reading. Pigeons settle. The light turns honey-colored. You can sit for hours and just watch color change. It\'s Dublin\'s best meditation spot.\",im:\"It\'s November 1950. A widow sits on a bench. She sits on the same bench every day. She\'s been coming here for 40 years. The city changes. The park doesn\'t.\",t:\"St Stephen\'s Green, Dublin 2. Free entry. U-Bahn all around (Stephens Green Station). Best 2-4pm October-November. Bring a book. The benches face the park perfectly.",c:["parks", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:74,n:"Tivoli Theatre Broken Seats Memory — Francis Street",a:"Liberties",v:["history", "weird", "quiet"],d:74,s:"An abandoned cinema where teenagers hide and Dublin dreams were born",st:"The Tivoli Theatre was Dublin\'s palace of cinema. Now it\'s closed, broken windows, pigeons nest in balconies. You can peer through glass and see the velvet seats, the balcony, the projection booth. It\'s a time capsule. Urban explorers sneak in. The city allowed this beautiful building to crumble. It haunts you.",im:"It\'s 1946. A couple sits in the dark, holding hands. The screen glows. They don\'t know this place will be abandoned in 70 years.",t:"The Tivoli Theatre was Dublin\'s palace of cinema. Now it\'s closed, broken windows, pigeons nest in balconies. You can peer through glass and see the velvet seats, the balcony, the projection booth. It\'s a time capsule. Urban explorers sneak in. The city allowed this beautiful building to crumble. It haunts you.\",im:\"It\'s 1946. A couple sits in the dark, holding hands. The screen glows. They don\'t know this place will be abandoned in 70 years.\",t:\"Francis Street, Dublin 8, between Meath and New streets. Visible from street. Abandoned but watch from outside only—it\'s structurally unsafe. Bring a camera and sadness. This is Dublin forgetting itself.",c:["history_big", "scary"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:75,n:"Indie Comedy Pubs Late Night — Temple Bar/Liberties",a:"Temple Bar",v:["night", "local", "weird"],d:75,s:"Sunday nights when Dublin\'s comedians destroy tourists with dark Irish wit",st:"Comedy mic nights happen in random pubs. Sundays in Temple Bar area. Tourists expect traditional Irish music. Instead, they get Dublin comedians making fun of tourists, Irish politics, and their own lives. It\'s raw, it\'s fast, it\'s real. You\'ll laugh at things you shouldn\'t. That\'s Irish comedy.",im:"It\'s Sunday midnight. A comedian on stage: \'So tourists come here expecting leprechauns. We give them disappointment.\' The crowd roars. It\'s Dublin in a sentence.",t:"Comedy mic nights happen in random pubs. Sundays in Temple Bar area. Tourists expect traditional Irish music. Instead, they get Dublin comedians making fun of tourists, Irish politics, and their own lives. It\'s raw, it\'s fast, it\'s real. You\'ll laugh at things you shouldn\'t. That\'s Irish comedy.\",im:\"It\'s Sunday midnight. A comedian on stage: \'So tourists come here expecting leprechauns. We give them disappointment.\' The crowd roars. It\'s Dublin in a sentence.\",t:\"Various pubs (check Eventbrite for \'comedy open mic Dublin\'). Temple Bar area best. Usually free entry (buy a drink €5-8). Sundays 8pm-11pm. Arrive early. Bring a sense of humor that can take hits.",c:["night", "local_only"],r:"y",nn:"",ns:"",nst:"",nt:""},
