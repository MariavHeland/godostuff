  {id:76,n:"Kilmainham Gaol Irish History Touchstone — Dublin 8",a:"Kilmainham",v:["history", "quiet"],d:76,s:"The prison where Irish rebels were executed, now the site of pilgrimage for Irish nationalism",st:"Kilmainham held Irish revolutionaries. 1916 rebels were executed in the courtyard. Now it\'s a museum. Walking the cells, you feel the weight of history. The courtyard where executions happened is silent. Every Irish person knows this place. Every visitor should.",im:"It\'s 1916. Rebels are executed here. One by one. The nation hears. Attitudes shift. History turns.",t:"Kilmainham held Irish revolutionaries. 1916 rebels were executed in the courtyard. Now it\'s a museum. Walking the cells, you feel the weight of history. The courtyard where executions happened is silent. Every Irish person knows this place. Every visitor should.\",im:\"It\'s 1916. Rebels are executed here. One by one. The nation hears. Attitudes shift. History turns.\",t:\"Inchicore Road, Kilmainham (Bus 13, 40, 123). €14. Tours available (highly recommended). Book ahead. Emotional. Necessary.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:77,n:"Glasnevin Cemetery Museum Irish Heroes — Dublin 11",a:"Glasnevin",v:["history", "quiet"],d:77,s:"A cemetery where Irish independence figures are buried, with a museum of Ireland\'s political history",st:"Glasnevin is Ireland\'s national cemetery. O\'Connell, Collins, and other independence leaders are buried here. The museum tells their stories. The monuments are intricate stone work. Walking among the graves, you\'re walking through Irish political memory.",im:"It\'s 1850. O\'Connell is buried. The nation mourns. 170 years later, visitors still come to remember.",t:"Glasnevin is Ireland\'s national cemetery. O\'Connell, Collins, and other independence leaders are buried here. The museum tells their stories. The monuments are intricate stone work. Walking among the graves, you\'re walking through Irish political memory.\",im:\"It\'s 1850. O\'Connell is buried. The nation mourns. 170 years later, visitors still come to remember.\",t:\"Finglas Road, Glasnevin (Bus 4, 4A, 9, 9A, or Luas to Glasnevin). €14 museum + cemetery walk. Open daily 10am-5pm. Spend 2 hours minimum.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:78,n:"Marsh\'s Library Oldest Public Library (1701) — Temple Bar",a:"Temple Bar",v:["history", "quiet"],d:78,s:"Ireland\'s oldest public library, 320 years old, with reading cages to prevent theft",st:"Marsh\'s Library is 1701. The interior is unchanged—dark wood, old books, silence. Visitors sit in reading cages (metal bars to prevent theft of books). It\'s time travel. You feel the weight of 320 years of knowledge preserved.",im:"It\'s 1701. A library opens. Books are precious. Cages protect them. 320 years later, those cages still stand.",t:"Marsh\'s Library is 1701. The interior is unchanged—dark wood, old books, silence. Visitors sit in reading cages (metal bars to prevent theft of books). It\'s time travel. You feel the weight of 320 years of knowledge preserved.\",im:\"It\'s 1701. A library opens. Books are precious. Cages protect them. 320 years later, those cages still stand.\",t:\"St Werburgh\'s Lane, Temple Bar (near Christchurch Cathedral). €8. Open Mon-Wed 10am-1pm, 2-5pm. Thu 10am-1pm. Sit in a cage. Read old books.",c:["history_big", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:79,n:"St Michan\'s Church Medieval Mummies — Dublin 7",a:"North Inner City",v:["history", "scary"],d:79,s:"A church with 850-year-old mummified corpses in the crypts—naturally preserved",st:"St Michan\'s has mummies. Not ancient Egyptians—medieval Dubliners. The crypts are dry and cool. Bodies naturally mummified. The hands are visible (leathery, grabbing). It\'s a conversation with death. You\'re 10 feet from people who lived 500 years ago.",im:"It\'s 1200. A person dies. The church crypt preserves them. 800 years later, you can see their face.",t:"St Michan\'s has mummies. Not ancient Egyptians—medieval Dubliners. The crypts are dry and cool. Bodies naturally mummified. The hands are visible (leathery, grabbing). It\'s a conversation with death. You\'re 10 feet from people who lived 500 years ago.\",im:\"It\'s 1200. A person dies. The church crypt preserves them. 800 years later, you can see their face.\",t:\"Church Street, North Inner City (Luas to Four Courts). €5. Crypt tour included. Intense but fascinating. Go with a sense of wonder.",c:["history_big", "scary"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:80,n:"Christ Church Cathedral Crypt Medieval Secrets — Dublin 2",a:"Temple Bar",v:["history", "architecture"],d:80,s:"A 850-year-old cathedral with a crypt containing medieval artifacts and mummified cats",st:"Christ Church\'s crypt is the oldest structure in Dublin. Medieval tombs, artifacts, and preserved cats (used to control rats). Walking the crypt, you touch the ceiling of 1170. The cathedral above is magnificent, but the crypt is the real ghost.",im:"It\'s 1170. A cathedral is built. Centuries accumulate. Now the oldest part is underground. Time has layers.",t:"Christ Church\'s crypt is the oldest structure in Dublin. Medieval tombs, artifacts, and preserved cats (used to control rats). Walking the crypt, you touch the ceiling of 1170. The cathedral above is magnificent, but the crypt is the real ghost.\",im:\"It\'s 1170. A cathedral is built. Centuries accumulate. Now the oldest part is underground. Time has layers.\",t:\"Christchurch Place, Temple Bar (Luas to Christchurch). €14 cathedral + crypt. Open daily 10am-6pm. Spend 1.5 hours. The crypt is cool and dark.",c:["history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:81,n:"Iveagh Gardens Secret Park Hidden Beauty — Dublin 2",a:"Iveagh",v:["hidden", "beautiful"],d:81,s:"Dublin\'s secret park—green, quiet, almost no tourists, less known than Stephens Green but better",st:"Iveagh Gardens are hidden behind iron gates on Clonwilliam Place. Most Dubliners don\'t know it exists. Inside: cascades, meadows, old trees, quiet. It\'s a romantic, secret place. On sunny days, locals gather. It\'s the best free secret in Dublin.",im:"It\'s 1870. A wealthy man builds a garden. It becomes a secret. 150 years later, the secret is still there.",t:"Iveagh Gardens are hidden behind iron gates on Clonwilliam Place. Most Dubliners don\'t know it exists. Inside: cascades, meadows, old trees, quiet. It\'s a romantic, secret place. On sunny days, locals gather. It\'s the best free secret in Dublin.\",im:\"It\'s 1870. A wealthy man builds a garden. It becomes a secret. 150 years later, the secret is still there.\",t:\"Clonwilliam Place, Dublin 2 (Walk from St Stephen\'s Green). €Free. Open daily 8am-dusk. Bring a book. It\'s perfect for reading alone.",c:["parks", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:82,n:"Dublin\'s Victorian Fruit Market Wholesale Soul — Dublin 8",a:"Smithfield",v:["history", "local"],d:82,s:"The actual wholesale fruit and vegetable market that supplies Dublin\'s restaurants and grocers",st:"The fruit market is operating, real commerce. Trucks arrive at 4am. Vendors yell. Cash changes hands. It\'s the circulatory system of Dublin\'s food. Most people never see it. It\'s authentic Dublin—work, voices, community.",im:"It\'s 1890. A market opens. Every day, for 130 years, the same thing: trucks, vendors, fruits arriving from Ireland\'s farms.",t:"The fruit market is operating, real commerce. Trucks arrive at 4am. Vendors yell. Cash changes hands. It\'s the circulatory system of Dublin\'s food. Most people never see it. It\'s authentic Dublin—work, voices, community.\",im:\"It\'s 1890. A market opens. Every day, for 130 years, the same thing: trucks, vendors, fruits arriving from Ireland\'s farms.\",t:\"Smithfield, Dublin 8 (Luas to Smithfield). €Free to walk. Go at 5-6am to see real commerce. Bring coffee. Wear boots (water on the ground).",c:["local_only", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:83,n:"Arbour Hill Military Cemetery 1916 Leaders — Dublin 7",a:"North Inner City",v:["history", "quiet"],d:83,s:"Where the 1916 Easter Rebellion leaders were executed and buried. The most important grave site in Ireland.",st:"Arbour Hill is where 14 rebellion leaders were executed and buried. The graves are marked with simple stones. No monuments. Just names. Standing here, you feel the revolution\'s weight. This is where Irish independence became inevitable.",im:"It\'s 1916. 14 men are executed. They are buried here. In 106 years, the nation stands.",t:"Arbour Hill is where 14 rebellion leaders were executed and buried. The graves are marked with simple stones. No monuments. Just names. Standing here, you feel the revolution\'s weight. This is where Irish independence became inevitable.\",im:\"It\'s 1916. 14 men are executed. They are buried here. In 106 years, the nation stands.\",t:\"Arbour Hill, North Inner City (Luas to Four Courts or Museum). €Free. Open daily. Quiet, solemn, essential.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:84,n:"Casino Marino 18th Century Architectural Gem — Dublin 3",a:"Marino",v:["architecture", "history"],d:84,s:"A miniature 1770s neoclassical mansion designed like a toy palace—built for entertainment",st:"Casino Marino is small perfection. A Georgian miniature. Built in 1770 as a pleasure house. The proportions are ideal. Every detail is intentional. Walking through, you understand 18th-century taste—it\'s precise, beautiful, and slightly absurd.",im:"It\'s 1770. An architect is asked to build small. He builds perfect. The structure takes 20 years. Perfection cannot be rushed.",t:"Casino Marino is small perfection. A Georgian miniature. Built in 1770 as a pleasure house. The proportions are ideal. Every detail is intentional. Walking through, you understand 18th-century taste—it\'s precise, beautiful, and slightly absurd.\",im:\"It\'s 1770. An architect is asked to build small. He builds perfect. The structure takes 20 years. Perfection cannot be rushed.\",t:\"Malahide Road, Marino (Bus 34A or walk from Clontarf). €8. Open daily 10am-5pm. Worth the trip. It\'s intimate and magnificent.",c:["architecture", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:85,n:"Bull Island UNESCO Biosphere Nature Reserve — Dublin 3",a:"Clontarf",v:["nature", "beautiful"],d:85,s:"A 5km artificial island in Dublin Bay—now a nature reserve with birds, wildflowers, and wild dunes",st:"Bull Island was created in 1823 to slow tidal flow. Now it\'s a UNESCO biosphere. Dunes, marshes, thousands of birds. You walk across the island on a 1km wooden causeway. The sea is on both sides. Dublin is visible but feels distant.",im:"It\'s 1823. Engineers build a wall. Water changes. An island is born. Two centuries later, the island is wilder than Dublin.",t:"Bull Island was created in 1823 to slow tidal flow. Now it\'s a UNESCO biosphere. Dunes, marshes, thousands of birds. You walk across the island on a 1km wooden causeway. The sea is on both sides. Dublin is visible but feels distant.\",im:\"It\'s 1823. Engineers build a wall. Water changes. An island is born. Two centuries later, the island is wilder than Dublin.\",t:\"Bull Island, Clontarf (Bus 32, 32X or walk from Clontarf). €Free. Open daily. Bring binoculars. The birds are magnificent.",c:["parks", "nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:86,n:"Poolbeg Lighthouse Walk The Red Towers — Dublin 4",a:"Ringsend",v:["beautiful", "history"],d:86,s:"A 2km walk across Dublin Bay on a sea wall to red and white striped lighthouses",st:"The Poolbeg lighthouse walk is magical. You start at Ringsend. A wall extends into the bay. Midway, two red and white striped lighthouses stand like sentries. The city recedes. You\'re surrounded by water. The walk is meditative and slightly eerie.",im:"It\'s 1840. A lighthouse is built. It has stood watch for 180 years. Thousands now walk to it, knowing it kept sailors safe.",t:"The Poolbeg lighthouse walk is magical. You start at Ringsend. A wall extends into the bay. Midway, two red and white striped lighthouses stand like sentries. The city recedes. You\'re surrounded by water. The walk is meditative and slightly eerie.\",im:\"It\'s 1840. A lighthouse is built. It has stood watch for 180 years. Thousands now walk to it, knowing it kept sailors safe.\",t:\"Ringsend, Dublin 4 (Bus 3, 7, 45). €Free. Open daylight hours. 2km walk (30 minutes). Bring a camera. Go at sunset.",c:["parks", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:87,n:"Dalkey Village and Island Upscale Suburb Beauty — Dublin 5",a:"Dalkey",v:["beautiful", "local"],d:87,s:"An upscale village with village charm, a castle, and ferry to an island with ruins",st:"Dalkey is a wealthy suburb, but it retains village character. A main street with shops and pubs. Dalkey Castle offers tours. Nearby, a short ferry takes you to Dalkey Island (uninhabited, ruins, seals). It\'s a pocket of beauty near the city.",im:"It\'s 1800. A village grows wealthy but stays itself. Two centuries later, it balances both.",t:"Dalkey is a wealthy suburb, but it retains village character. A main street with shops and pubs. Dalkey Castle offers tours. Nearby, a short ferry takes you to Dalkey Island (uninhabited, ruins, seals). It\'s a pocket of beauty near the city.\",im:\"It\'s 1800. A village grows wealthy but stays itself. Two centuries later, it balances both.\",t:\"Dalkey, Dublin 5 (Tram to Dalkey). Castle €8. Ferry to island €5. Main street is free. Go on a sunny day. Eat fish and chips overlooking the water.",c:["beautiful", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:88,n:"Sandymount Strand at Low Tide Joyce\'s Dublin — Dublin 4",a:"Sandymount",v:["beautiful", "history"],d:88,s:"The beach where Joyce set Ulysses\'s opening and where Dublin\'s literary soul meets the bay",st:"Sandymount Strand is the opening of Ulysses. Joyce walked this beach. At low tide, it\'s 1km of hard sand. You can walk toward Howth. The city is to your left. The sea recedes. It\'s where Dublin\'s books touch the Atlantic.",im:"It\'s 1904. A writer walks this beach. He\'ll write about it for the rest of his life. 120 years later, readers walk here, reading his words.",t:"Sandymount Strand is the opening of Ulysses. Joyce walked this beach. At low tide, it\'s 1km of hard sand. You can walk toward Howth. The city is to your left. The sea recedes. It\'s where Dublin\'s books touch the Atlantic.\",im:\"It\'s 1904. A writer walks this beach. He\'ll write about it for the rest of his life. 120 years later, readers walk here, reading his words.\",t:\"Sandymount, Dublin 4 (Tram to Sandymount). €Free. Go at low tide (check tide tables). Walk toward Howth for 1km. Literary pilgrimage.",c:["beautiful", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:89,n:"War Memorial Gardens Lutyens Designed Peace — Dublin 8",a:"Islandbridge",v:["beautiful", "history"],d:89,s:"A 1920s memorial garden designed by a master architect honoring WWI Irish soldiers",st:"War Memorial Gardens were designed by Lutyens (who designed the Cenotaph in London). The garden is geometric, peaceful, beautiful. It\'s for Irish soldiers who died in WWI—a complicated history for Ireland. The design is world-class. The peace is real.",im:"It\'s 1920. Lutyens designs a garden for the dead. Peace is carved in stone and planted trees.",t:"War Memorial Gardens were designed by Lutyens (who designed the Cenotaph in London). The garden is geometric, peaceful, beautiful. It\'s for Irish soldiers who died in WWI—a complicated history for Ireland. The design is world-class. The peace is real.\",im:\"It\'s 1920. Lutyens designs a garden for the dead. Peace is carved in stone and planted trees.\",t:\"South Circular Road, Islandbridge (Bus 51, 78, 79). €Free. Open daily 9am-4:30pm. Sit on the benches. It\'s contemplative.",c:["parks", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:90,n:"Dublin Mountains Way by Bus and Walk — Dublin 16",a:"South Dublin",v:["nature", "beautiful"],d:90,s:"A 20km trail through the Dublin Mountains—you can start by bus and walk back to the city",st:"The Dublin Mountains Way offers multiple entry points. Take a bus to Hellfire Club or Ticknock. Walk down. The mountains are wild—heather, bog, ruins. Views over Dublin and the Irish Sea. You\'re never far from the city, but you\'re in wilderness.",im:"It\'s 1970. A trail is marked. For 50 years, Dubliners use it to escape. The mountains keep them sane.",t:"The Dublin Mountains Way offers multiple entry points. Take a bus to Hellfire Club or Ticknock. Walk down. The mountains are wild—heather, bog, ruins. Views over Dublin and the Irish Sea. You\'re never far from the city, but you\'re in wilderness.\",im:\"It\'s 1970. A trail is marked. For 50 years, Dubliners use it to escape. The mountains keep them sane.\",t:\"Multiple trailheads (Bus 15, 44 to mountains). €Free trail. 6-8 hours for full walk. Bring water. Weather changes fast.",c:["parks", "nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:91,n:"Ticknock Fairy Forest Dark Woods — Dublin 16",a:"South Dublin",v:["nature", "hidden"],d:91,s:"A dark forest in the Dublin Mountains where fairies are claimed to dwell—moody and atmospheric",st:"Ticknock is a forest of conifers. Gloomy, dark, atmospheric. Irish mythology says fairies live here. Whether you believe in fairies, the forest is eerie and beautiful. Streams run through. The air feels different than the city.",im:"It\'s 1900. A fairy story is told about this forest. It\'s still told 120 years later.",t:"Ticknock is a forest of conifers. Gloomy, dark, atmospheric. Irish mythology says fairies live here. Whether you believe in fairies, the forest is eerie and beautiful. Streams run through. The air feels different than the city.\",im:\"It\'s 1900. A fairy story is told about this forest. It\'s still told 120 years later.\",t:\"Ticknock, South Dublin (Bus 15 or 44). €Free. Walk carefully (roots, streams). Go on a cloudy day for maximum atmosphere.",c:["nature", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:92,n:"Dún Laoghaire Pier Sunset Walk — Dublin 4",a:"Dún Laoghaire",v:["beautiful", "local"],d:92,s:"A Victorian pier where Dubliners walk for exercise, sunsets, and the simple act of being by the sea",st:"Dún Laoghaire pier is Dublin\'s soul touching the sea. Victorian construction. Locals walk it daily. Couples hold hands. Kids ride bikes. The East Pier is best—you\'re surrounded by water. At sunset, the whole city glows across the bay.",im:"It\'s 1880. The pier is built. Dubliners discover they love walking toward the sea.",t:"Dún Laoghaire pier is Dublin\'s soul touching the sea. Victorian construction. Locals walk it daily. Couples hold hands. Kids ride bikes. The East Pier is best—you\'re surrounded by water. At sunset, the whole city glows across the bay.\",im:\"It\'s 1880. The pier is built. Dubliners discover they love walking toward the sea.\",t:\"Dún Laoghaire, Dublin 4 (Tram or DART). €Free. Open 24/7. Go at 6pm. The light is perfect.",c:["beautiful", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:93,n:"National Botanic Gardens Glasnevin Plant Library — Dublin 9",a:"Glasnevin",v:["beautiful", "nature"],d:93,s:"19th-century botanical gardens with glasshouses, alpine gardens, and 15,000 plants from everywhere",st:"The National Botanic Gardens are Dublin\'s best-kept secret. Victorian glasshouses, river-side walks, flowers from six continents. In spring, it\'s a chaos of blooms. In winter, the glasshouses are warm and tropical. It\'s a pilgrimage for botanists and romantics.",im:"It\'s 1795. A garden begins. Scientists collect plants from the world. Two centuries later, it\'s a living library.",t:"The National Botanic Gardens are Dublin\'s best-kept secret. Victorian glasshouses, river-side walks, flowers from six continents. In spring, it\'s a chaos of blooms. In winter, the glasshouses are warm and tropical. It\'s a pilgrimage for botanists and romantics.\",im:\"It\'s 1795. A garden begins. Scientists collect plants from the world. Two centuries later, it\'s a living library.\",t:\"Botanic Road, Glasnevin (Bus 4, 4A, 9, or Luas). €10. Open daily 9am-6pm (winter 4pm). Spend 2 hours minimum.",c:["parks", "nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:94,n:"Henrietta Street Museum Georgian Tenements — Dublin 1",a:"North Inner City",v:["history", "architecture"],d:94,s:"A 1740s mansion showing how Dublin\'s poor lived in subdivided townhouses",st:"Henrietta Street was once Dublin\'s richest. By 1800, each mansion housed dozens of families. The museum shows how the poor lived—one family per room, sharing kitchens and toilets. The contrast between the building\'s elegance and its use is powerful.",im:"It\'s 1740. A palace is built. By 1840, it houses 100 people. The beautiful becomes tragic.",t:"Henrietta Street was once Dublin\'s richest. By 1800, each mansion housed dozens of families. The museum shows how the poor lived—one family per room, sharing kitchens and toilets. The contrast between the building\'s elegance and its use is powerful.\",im:\"It\'s 1740. A palace is built. By 1840, it houses 100 people. The beautiful becomes tragic.\",t:\"14 Henrietta Street, Dublin 1 (Luas to Four Courts). €16. Guided tours recommended. Tours tell stories. They hurt and enlighten.",c:["history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:95,n:"14 Henrietta Street Tenement Life History — Dublin 1",a:"North Inner City",v:["history"],d:95,s:"The same street showing how middle-class Dublin also lived in tenement conditions",st:"Number 14 on Henrietta Street tells the story of a single family. Their apartment. Their lives. Personal histories make the tenement real. It\'s not just history—it\'s how people survived.",im:"It\'s 1900. A family lives in one room. Tomorrow and for the next 100 years, that room is their life.",t:"Number 14 on Henrietta Street tells the story of a single family. Their apartment. Their lives. Personal histories make the tenement real. It\'s not just history—it\'s how people survived.\",im:\"It\'s 1900. A family lives in one room. Tomorrow and for the next 100 years, that room is their life.\",t:\"14 Henrietta Street, Dublin 1. €16 (combined with museum). Emotional, intimate, necessary.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:96,n:"EPIC Emigration Museum Irish Stories — Dublin 7",a:"Smithfield",v:["history", "local"],d:96,s:"A museum of Irish emigration—10 million Irish left. This tells their stories",st:"EPIC is interactive and emotional. Personal stories of Irish emigration—to America, Australia, everywhere. Photos, documents, videos. You learn why they left, what they hoped for, what they achieved. It\'s a global Irish history.",im:"It\'s 1847. A family leaves Ireland. They have nothing. Their story becomes the story of a nation spread across the world.",t:"EPIC is interactive and emotional. Personal stories of Irish emigration—to America, Australia, everywhere. Photos, documents, videos. You learn why they left, what they hoped for, what they achieved. It\'s a global Irish history.\",im:\"It\'s 1847. A family leaves Ireland. They have nothing. Their story becomes the story of a nation spread across the world.\",t:\"CHQ Building, Smithfield, Dublin 7. €18. Open daily 10am-6pm. Spend 2-3 hours. Bring tissues.",c:["history_big", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:97,n:"Collins Barracks Free Museum Irish Heritage — Dublin 7",a:"Smithfield",v:["history", "free"],d:97,s:"A military barracks now free museum with furniture, fashion, weapons spanning Irish history",st:"Collins Barracks is free. The collection is massive—furniture, clothing, weapons, vehicles. You can walk for hours. The building is the barracks itself. You\'re standing where Irish soldiers trained. History is everywhere.",im:"It\'s 1700. A barracks opens. Soldiers arrive. Centuries of history happens here. Now civilians walk where soldiers stood.",t:"Collins Barracks is free. The collection is massive—furniture, clothing, weapons, vehicles. You can walk for hours. The building is the barracks itself. You\'re standing where Irish soldiers trained. History is everywhere.\",im:\"It\'s 1700. A barracks opens. Soldiers arrive. Centuries of history happens here. Now civilians walk where soldiers stood.\",t:\"Benburb Street, Smithfield, Dublin 7. €Free. Open Tue-Sun 10am-5pm. Spend 3 hours. The collection is overwhelming.",c:["history_big", "free_museum"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:98,n:"Hugh Lane Gallery Free Irish Art — Dublin 1",a:"North Inner City",v:["art", "free"],d:98,s:"A free art gallery with Irish masters and international contemporary art",st:"Hugh Lane is free admission. The collection is excellent—Irish painters (Yeats, Lavery) and contemporary international artists. The building is beautiful. It\'s Dublin\'s best-kept cultural secret.",im:"It\'s 1908. A gallery opens for Irish art. Free for everyone. In 2024, it\'s still free and still excellent.",t:"Hugh Lane is free admission. The collection is excellent—Irish painters (Yeats, Lavery) and contemporary international artists. The building is beautiful. It\'s Dublin\'s best-kept cultural secret.\",im:\"It\'s 1908. A gallery opens for Irish art. Free for everyone. In 2024, it\'s still free and still excellent.\",t:\"Parnell Square North, Dublin 1 (Tram or walk). €Free. Open Tue-Sun 10am-5pm. Spend 1.5 hours.",c:["free_museum", "art"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:99,n:"Merrion Square Oscar Wilde Statue Literary Walk — Dublin 2",a:"South Inner City",v:["history", "beautiful"],d:99,s:"An elegant square with Oscar Wilde\'s colorful statue and Georgian architecture tour",st:"Merrion Square is Dublin\'s best-preserved Georgian square. The central garden is closed (private), but the perimeter is beautiful. Oscar Wilde\'s statue (painted in bright colors) faces his childhood home. It\'s a literary and architectural pilgrimage.",im:"It\'s 1850. Wilde is born on this square. He\'ll write plays that change the world. The square remembers.",t:"Merrion Square is Dublin\'s best-preserved Georgian square. The central garden is closed (private), but the perimeter is beautiful. Oscar Wilde\'s statue (painted in bright colors) faces his childhood home. It\'s a literary and architectural pilgrimage.\",im:\"It\'s 1850. Wilde is born on this square. He\'ll write plays that change the world. The square remembers.\",t:\"Merrion Square, Dublin 2 (Tram or walk from Grafton St). €Free. Walk the perimeter. Take photos of the Wilde statue. Georgian architecture is perfect.",c:["history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:100,n:"Croppies Acre Memorial Park 1798 Rebels — Dublin 7",a:"North Inner City",v:["history", "quiet"],d:100,s:"A small park and memorial where 1798 rebellion leaders were buried in a mass grave",st:"Croppies Acre is peaceful now. But 1798, rebels were executed and buried here. The monument is simple. The history is profound. Walking here, you touch 226 years of Irish resistance.",im:"It\'s 1798. Rebels are defeated. They\'re buried here. The park forgets for 200 years. Then remembers.",t:"Croppies Acre is peaceful now. But 1798, rebels were executed and buried here. The monument is simple. The history is profound. Walking here, you touch 226 years of Irish resistance.\",im:\"It\'s 1798. Rebels are defeated. They\'re buried here. The park forgets for 200 years. Then remembers.\",t:\"Benburb Street, Dublin 7 (Tram to Benburb/Smithfield). €Free. Walk and sit. Quiet memorial. Respectful.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:101,n:"Drimnagh Castle Moated Medieval Fortress — Dublin 12",a:"South Dublin",v:["history", "architecture"],d:101,s:"Dublin\'s only castle with a moat—still surrounded by water, medieval and protected",st:"Drimnagh Castle is a 15th-century fortress with an actual moat. Rare in Ireland. Walking the moat, you feel medieval. The castle is working—you can see how it functioned. The moat is still full of water. It\'s a perfect little castle.",im:"It\'s 1400. A castle is built with a moat. Water protection. 600 years later, the water still guards it.",t:"Drimnagh Castle is a 15th-century fortress with an actual moat. Rare in Ireland. Walking the moat, you feel medieval. The castle is working—you can see how it functioned. The moat is still full of water. It\'s a perfect little castle.\",im:\"It\'s 1400. A castle is built with a moat. Water protection. 600 years later, the water still guards it.\",t:\"Drimnagh Road, Dublin 12 (Bus 49, 77A). €8. Open Wed-Sun 10am-1pm, 2-5pm. Small and intimate.",c:["history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:102,n:"Belvedere House James Joyce Museum — Dublin 1",a:"North Inner City",v:["history", "local"],d:102,s:"A Georgian house where Joyce lived and worked, now a museum showing his Dublin life",st:"Belvedere House is where Joyce wrote poetry and lived with his family. The rooms are modest. The building is elegant. Walking through, you step into Joyce\'s Dublin. Books, letters, artifacts. It\'s intimate.",im:"It\'s 1900. A young writer lives here. He writes about Dublin. The city becomes his art.",t:"Belvedere House is where Joyce wrote poetry and lived with his family. The rooms are modest. The building is elegant. Walking through, you step into Joyce\'s Dublin. Books, letters, artifacts. It\'s intimate.\",im:\"It\'s 1900. A young writer lives here. He writes about Dublin. The city becomes his art.\",t:\"Great Denmark Street, Dublin 1 (Luas to Cathal Brugha St). €8. Open Tue-Sun 10am-5pm. Small museum. Literary pilgrimage.",c:["history_big", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:103,n:"Rathfarnham Castle Elizabethan Estate — Dublin 14",a:"South Dublin",v:["history", "architecture"],d:103,s:"A 1580s castle with estate grounds, now a museum of medieval life and furniture",st:"Rathfarnham Castle is 1580s, Elizabethan Irish. It\'s been owned by the same family for centuries. The interior shows period furniture. The exterior is formidable. The grounds are extensive. It\'s an estate that survived.",im:"It\'s 1580. A castle is built. For 440 years, the same family lives here. The castle remembers them.",t:"Rathfarnham Castle is 1580s, Elizabethan Irish. It\'s been owned by the same family for centuries. The interior shows period furniture. The exterior is formidable. The grounds are extensive. It\'s an estate that survived.\",im:\"It\'s 1580. A castle is built. For 440 years, the same family lives here. The castle remembers them.\",t:\"Rathfarnham, Dublin 14 (Bus 16 or 17). €12. Open daily 10am-5pm. Spend 1.5 hours in the castle and grounds.",c:["history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:104,n:"Pearse Museum St Enda\'s Park Irish Rebels — Dublin 16",a:"South Dublin",v:["history", "beautiful"],d:104,s:"A 1770s manor where Irish rebels ran a school, now showing Irish independence history",st:"Pearse Museum is the house where Patrick Pearse ran an Irish language school. After 1916, it\'s a memorial. The grounds are beautiful—woodlands, streams. The building is elegant. Walking it, you feel the intellectual roots of Irish independence.",im:"It\'s 1910. A school opens. Young Irish are taught language and pride. 6 years later, some will die for the nation.",t:"Pearse Museum is the house where Patrick Pearse ran an Irish language school. After 1916, it\'s a memorial. The grounds are beautiful—woodlands, streams. The building is elegant. Walking it, you feel the intellectual roots of Irish independence.\",im:\"It\'s 1910. A school opens. Young Irish are taught language and pride. 6 years later, some will die for the nation.\",t:\"Grange Road, Rathfarnham, Dublin 16. €5. Open daily 9am-5:30pm. Spend 1.5 hours. The grounds are worth it.",c:["history_big", "parks"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:105,n:"Sandycove Forty Foot Swimming Cult Ritual — Dublin 4",a:"Sandycove",v:["local", "beautiful"],d:105,s:"An outdoor swimming pool carved into rocks where year-round swimmers gather in ritual",st:"Forty Foot is an outdoor tidal pool. Year-round swimmers gather here—in winter, in ice. It\'s a ritual, a community, a mad beautiful Irish thing. The water is cold. The swimmers are tough. It\'s part protest, part religion.",im:"It\'s 1800. A swimming pool is carved from rocks. In 220 years, hardy swimmers will gather in December. The cold is the point.",t:"Forty Foot is an outdoor tidal pool. Year-round swimmers gather here—in winter, in ice. It\'s a ritual, a community, a mad beautiful Irish thing. The water is cold. The swimmers are tough. It\'s part protest, part religion.\",im:\"It\'s 1800. A swimming pool is carved from rocks. In 220 years, hardy swimmers will gather in December. The cold is the point.\",t:\"Sandycove, Dublin 4 (DART to Sandycove). €Free. Open 24/7. Winter swimmers go daily at 9am. Join them if you\'re brave. Water is 8-12°C.",c:["local_only"],r:"g",nn:"",ns:"",nst:"",nt:""}

  {id:107,n:"Literary Pub Crawl Trail",a:"Westmoreland/Temple Bar",v:["history","local","night"],d:15,s:"Retrace Joyce, Beckett, and Wilde\'s drinking spots — a sober literary tour",st:"Dublin\'s literary icons drank at specific pubs. The Stag\'s Head, Brazen Head, and others are still serving. Order a Guinness and imagine Beckett scribbling at the bar. The city is a living literary map.",im:"Time-travel: James Joyce set Ulysses in Dublin pubs; some still look the same 100+ years later.",t:"Free to visit pubs. Cost is drinks only. Self-guided or paid tours available.",c:["history_big","local_only"],r:"g",nn:"Leabharliom Taibhéil an Óil",ns:"Leabharacad Jonathan Swift spóite sa ospidéal",nst:"Déan treoraigheadh liteartha ar fud an bhaile.",nt:"Saor-labhairt. Costais Guinness ach amháin."},
  {id:108,n:"Guinness Storehouse — Rooftop Gravity Bar",a:"Smithfield",v:["greatest_hits","famous","beautiful"],d:3,s:"The Guinness factory converted into a museum. The rooftop gravity bar has the 360-degree view of Dublin that matters.",st:"The Guinness Storehouse is in the actual factory where Guinness is (was) made. The building is 7 stories of exhibition space about the beer and the advertising. Most people come for the rooftop bar.\n\nAt the top is the Gravity Bar — you stand at a window that wraps 360 degrees around the top of Dublin. The view is extraordinary. Your ticket includes a free Guinness poured at the bar.",im:"Standing at the Gravity Bar at sunset, a glass of cold Guinness in your hand, looking 360 degrees over Dublin rooftops turning gold, the Wicklow Mountains visible on the horizon, the light changing every minute.",t:"Entry €25 (includes Guinness at the bar). Hours 9:30am–7pm (9pm some months). The rooftop is the only part worth the price. The lower floors are tourist stuff. Go at 5pm on a weekday and spend an hour at the rooftop bar. The sunset is perfect. It's touristy but undeniably beautiful.",c:["greatest_hits","famous","beautiful"],r:"g",nn:"Guinness Storehouse — Rooftop Gravity Bar",ns:"La fábrica de Guinness convertida en museo. El bar de gravedad en la azotea tiene la vista 360 grados de Dublín que importa.",nst:"El Guinness Storehouse está en la fábrica real donde se hace Guinness. El edificio es 7 pisos de espacio de exposición sobre la cerveza y la publicidad.\n\nEn la parte superior está el Gravity Bar — estás en una ventana que envuelve 360 grados alrededor de la cima de Dublín. La vista es extraordinaria.",nt:"Entrada €25 (incluye Guinness en el bar). Horarios 9h30-19h (21h algunos meses). La azotea es la única parte que vale la pena. Los pisos inferiores son cosas turísticas. Ve a las 17h de un día entre semana."},
  {id:109,n:"Temple Bar Neighborhood — Skip the Bar",a:"Temple Bar",v:["neighborhoods","beautiful","hidden"],d:2,s:"Temple Bar is the famous nightlife street. Skip the bars. Walk the side streets. The neighborhood is genuinely beautiful architecture.",st:"Temple Bar is world-famous for its loud bars and beer-soaked tourists. Skip that entirely. The streets around Temple Bar have beautiful Georgian architecture, tiny galleries, vintage shops, and quiet cafés.\n\nFall Street, Copper Alley, the lanes between — these are beautiful. The buildings are painted in bright colors. It's Dublin that tourists miss because they're in the bars.",im:"Walking down a narrow lane in Temple Bar lined with bright-painted 18th-century buildings, vintage shop windows, art galleries, and maybe one other person, the sound of bars distant.",t:"Walk the side streets: Fall Street, Copper Alley, Essex Street West, Meeting House Lane. Skip the main Temple Bar street entirely. The neighborhood is free to explore. Stop at a quiet café or gallery. The real Temple Bar is this — not the bars, the streets.",c:["neighborhoods","beautiful","hidden"],r:"g",nn:"Barrio Temple Bar — Salta El Bar",ns:"Temple Bar es la famosa calle de vida nocturna. Salta los bares. Camina por las calles laterales. El barrio tiene genuinamente hermosa arquitectura.",nst:"Temple Bar es mundialmente famoso por sus bares ruidosos y turistas empapados de cerveza. Salta eso completamente. Las calles alrededor de Temple Bar tienen hermosa arquitectura georgiana, galerías diminutas, tiendas vintage, cafés tranquilos.\n\nFall Street, Copper Alley, los callejones entre — son hermosos. Los edificios están pintados en colores brillantes.",nt:"Camina por las calles laterales: Fall Street, Copper Alley, Essex Street West, Meeting House Lane. Salta la calle principal de Temple Bar completamente."}];

<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:`url(\'${TBGS[tab]||TBGS.default}\') center/cover no-repeat`}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Dublin Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Dublin Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
