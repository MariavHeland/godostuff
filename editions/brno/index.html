const P = [
  {id:1,n:"Ossuary Chapel — Sedlec",a:"Sedlec",v:["scary", "history"],d:20,s:"Chapel decorated with 40,000 human bones arranged into art",st:"Medieval plague killed half Europe. Monks stacked 40,000 skeletons into decorative patterns. Skulls form coat-of-arms. Femurs chandelier. Spine decorates arches. It\'s the darkest art museum ever.",im:"1400s: Bodies pile up. Monks layer them. 2024: Still standing, still surreal.",t:"Day trip 40 min. €4 entry. Prepare psychologically. Good bones pun humor required.",c:["scary", "history_big"],r:"y",nn:"Kapsa Kostnice — Sedlec",ns:"Kaple zdobená 40 000 lidských kostí uspořádaných v umění",nst:"Středověká morová rána. Mniši skládají 40 000 kostí. Lebky, stehenní kosti, páteř. Nejtemější umění.",nt:"Výlet 40 minut. €4 vstupné. Psychologicky se připrav. Humor potřebný."},
  {id:2,n:"Špilberk Castle Fortress — Brno Heights",a:"Brno Heights",v:["history", "high_spots"],d:3,s:"Medieval fortress overlooking the city since 1200s",st:"Climb to ramparts. Prison museum inside (torture equipment, cells). Views of entire Brno. Moats 30m deep. Museum €5. Real fortress, not romantic castle.",im:"1200s: Fortified against invaders. Used as WWII Nazi/Soviet prison. 2024: Open for tourists.",t:"2-hour visit. Go early avoid crowds. Cell descriptions hard. Bring water.",c:["history_big", "high_spots"],r:"y",nn:"Hrad Špilberk — Výšiny Brna",ns:"Středověký hrad přehlížející město od 1200let",nst:"Vylez na hradby. Muzeum vězení (tortury, cely). Pohled na Brno. Příkopy 30m. Muzeum €5.",nt:"2 hodiny. Jdi brzy. Popisy jsou těžké. Voda."},
  {id:3,n:"Underground Labyrinth Tour — City Center",a:"City Center",v:["hidden", "scary"],d:1,s:"Medieval tunnels and merchant cellars under the city streets",st:"Guided tour (€5) into 13th-century cellars and tunnels. Merchants stored goods 12m below streets. Smugglers used them. Dark, cramped, creepy. You walk where medieval people walked. Boots recommended.",im:"1300s: Merchants tunnel-trade. 1940s: WWII refugees hide. 2024: You tour their secrets.",t:"Tour daily 11am/2pm/4pm. Book ahead. Claustrophobic? Pass. Flash photo not allowed.",c:["hidden", "scary"],r:"y",nn:"Podzemní Labyrint — Centrum Města",ns:"Středověké tunely a obchodní sklepy pod ulicemi",nst:"Průvodce (€5) do 13. století. Obchodníci skladovali. Pašeráci používali. Tmavě, těsně. Boty doporučeny.",nt:"Průvodce denně. Rezervuj. Klaustrofobní? Passer. Bez blesku."},
  {id:4,n:"Tugendhat Villa UNESCO — Brno",a:"Brno",v:["history", "architecture"],d:4,s:"Bauhaus masterpiece of 1930s modernist design",st:"€10 tour (book ahead). 1930 mansion that changed architecture. Open floor plan, steel, glass. Nazi theft, Soviet use, restoration 2012. It\'s design history.",im:"1930: Built to revolutionize design. 1940s: Nazis steal art. 2024: Restored to glory.",t:"Tour only—book 1 day ahead. 1 hour. Photography no-flash only. Design nerds heaven.",c:["architecture", "history_big"],r:"g",nn:"Vila Tugendhat UNESCO — Brno",ns:"Bauhaus mistrovství z 30. let moderního designu",nst:"€10 průvodce (rezervuj). 1930 vila. Otevřený plán. Ocel, sklo. Historie designu.",nt:"Pouze průvodce—rezervuj den. 1 hodina. Bez blesku. Designéři bude rádi."},

  {id:24,n:"Tugendhat Villa UNESCO  #14 — Brno",a:"Brno",v:["history", "architecture"],d:4,s:"Bauhaus masterpiece of 1930s modernist design",st:"€10 tour (book ahead). 1930 mansion that changed architecture. Open floor plan, steel, glass. Nazi theft, Soviet use, restoration 2012. It\'s design history.",im:"1930: Built to revolutionize design. 1940s: Nazis steal art. 2024: Restored to glory.",t:"Tour only—book 1 day ahead. 1 hour. Photography no-flash only. Design nerds heaven.",c:["architecture", "history_big"],r:"g",nn:"Vila Tugendhat UNESCO  #14 — Brno",ns:"Bauhaus mistrovství z 30. let moderního designu",nst:"€10 průvodce (rezervuj). 1930 vila. Otevřený plán. Ocel, sklo. Historie designu.",nt:"Pouze průvodce—rezervuj den. 1 hodina. Bez blesku. Designéři bude rádi."},
  {id:25,n:"Cathedral of St. Peter  #15 — City Center",a:"City Center",v:["history", "beautiful"],d:1,s:"Gothic cathedral with tower you can climb free",st:"Free entry. 98 meters high. Climb 378 steps (€2). Views of all Brno. Interior: original tiles, Gothic arches. Not touristy—locals attend. Quiet.",im:"1370s: Foundations laid. Towers completed 1500s. 2024: Same Gothic majesty.",t:"Climb early morning before crowds. Go if legs strong—steep steps. Views worth it.",c:["architecture", "history_big"],r:"g",nn:"Katedrála Sv. Petra  #15 — City Center",ns:"Gotická katedrála s věží kterou můžeš lézt zdarma",nst:"Volný vstup. 98 metrů. Vylez 378 schodů (€2). Pohled. Originální dlaždice. Ticho.",nt:"Léz ráno. Jdi pokud nohy silné—prudké schody. Pohled stojí."},
  {id:26,n:"Cabbage Market  #16 — Old Town",a:"Old Town",v:["local", "free"],d:1,s:"Medieval market square where locals actually shop",st:"Open-air market where Czechs buy vegetables (yes, actually—not tourist trap). Café corner €3. Locals chat in Czech. Morning best (6am-noon). Authentic medieval vibes.",im:"Medieval times: Merchants sold here. 2024: Same spot, same locals, same veggies.",t:"Go before 10am. Bring coins. Ask vendors about local produce. Photography welcome.",c:["local_only", "history_big"],r:"g",nn:"Zelný Trh  #16 — Old Town",ns:"Středověké tržiště kde se místní nákupují",nst:"Venkovní trh. Češi kupují zeleninu. Kavárna €3. Ráno (6-12). Autentický středověk.",nt:"Jdi před 10h. Mince. Ptej se. Fotografie vítána."},
  {id:27,n:"Denis Gardens  #17 — Denis Gardens",a:"Denis Gardens",v:["nature", "quiet"],d:5,s:"Victorian gardens where locals walk before tourists wake",st:"19th-century park. Trees, ponds, silence. Teenagers skateboard corners. Free. Benches face water. You sit, think, watch swans. Real escape from city.",im:"1800s: Victorian design. 2024: Still peaceful, still green.",t:"Go morning. Bring book. Skateboard park on edge if you skate. Café in park €3.",c:["parks", "quiet"],r:"g",nn:"Lužánky Park  #17 — Denis Gardens",ns:"Viktoriánské zahrady kde místní procházejí",nst:"Stromů, tůní, ticha. Adolescenti skateboard. Bezplatné. Lavice u vody. Skutečný útěk.",nt:"Ráno. Kniha. Skatepark. Kavárna €3."},
  {id:28,n:"Hotel International Brutalist Tower  #18 — Holesovice",a:"Holesovice",v:["architecture", "weird"],d:4,s:"Soviet-era brutalist hotel that time forgot",st:"1960s brutalist concrete. Maze interior. Restaurant functioning (€8 meals). Communist aesthetic preserved. You can tour (€8) or eat (€12 cocktails, weak). Unintentionally artistic.",im:"1960: Built as Soviet pride. 1990: Abandoned. 2024: Instagram-worthy ruin.",t:"Tour odd hours. Restaurant open lunch/dinner. Strong drinks recommended ironically.",c:["weird", "architecture"],r:"g",nn:"Hotel International Brutalista  #18 — Holesovice",ns:"Sovětské brutalisty hotel který čas zapomněl",nst:"Betonu. Interiér labyrint. Restaurace fungující. Komunistická estetika. Tour (€8).",nt:"Tour podivné hodiny. Restaurace. Silné nápoje doporučeny."},
  {id:29,n:"Moravian Karst  #19 — Moravian Karst",a:"Moravian Karst",v:["nature", "beautiful"],d:25,s:"Underground river caves with stalactite cathedrals",st:"Bus 45 min. Punkva Caves tour (€12). Boat through cave river. Stalactites formations 300,000 years old. Walking trails above ground. Forest beauty.",im:"300,000 years: Water carved caves. Humans found them 200 years ago. 2024: Tours run daily.",t:"Book boat tour (€12). Wear jacket—cave cold (8°C). Walk trails after tour (free). Full day possible.",c:["nature", "parks"],r:"g",nn:"Moravský Kras  #19 — Moravian Karst",ns:"Podzemní řeka s jeskyní s proskleními",nst:"Autobus 45 minut. Jeskyně Punkvy (€12). Loď řekou. Stalaktity 300 000 let. Pěší cesty. Lesní krása.",nt:"Rezervuj loď (€12). Bunda—jaskyne studené. Pěší cesty. Celý den."},
  {id:30,n:"Macocha Abyss Gorge  #20 — Macocha",a:"Macocha",v:["nature", "scary"],d:30,s:"Massive gorge 138 meters deep where the ground literally breaks open",st:"Walking trails above gorge. 138m straight down. Dangerous—stay back. Hiking ropes exist if you\'re brave (mountaineering guide €20). Views terrifying and beautiful. Nature\'s power.",im:"1 million years: Erosion carved it. Medieval: Locals feared it. 2024: Tourists still shocked.",t:"Hike 2-3 hours. Bring water. Don\'t climb without guide—people die. Views free and humbling.",c:["nature", "scary"],r:"g",nn:"Macocha Propast  #20 — Macocha",ns:"Obrovský kaňon 138 metrů hluboký kde se půda rozlamuje",nst:"Pěší cesty. 138m dolů. Nebezpečné. Lana (průvodce €20). Pohled děsivý i krásný.",nt:"Pešina 2-3 hodiny. Voda. Bez průvodce se nelezou. Pohled volný."},
  {id:31,n:"Ossuary Chapel  #21 — Sedlec",a:"Sedlec",v:["scary", "history"],d:20,s:"Chapel decorated with 40,000 human bones arranged into art",st:"Medieval plague killed half Europe. Monks stacked 40,000 skeletons into decorative patterns. Skulls form coat-of-arms. Femurs chandelier. Spine decorates arches. It\'s the darkest art museum ever.",im:"1400s: Bodies pile up. Monks layer them. 2024: Still standing, still surreal.",t:"Day trip 40 min. €4 entry. Prepare psychologically. Good bones pun humor required.",c:["scary", "history_big"],r:"y",nn:"Kapsa Kostnice  #21 — Sedlec",ns:"Kaple zdobená 40 000 lidských kostí uspořádaných v umění",nst:"Středověká morová rána. Mniši skládají 40 000 kostí. Lebky, stehenní kosti, páteř. Nejtemější umění.",nt:"Výlet 40 minut. €4 vstupné. Psychologicky se připrav. Humor potřebný."},

  {id:51,n:"Ossuary Chapel  #41 — Sedlec",a:"Sedlec",v:["scary", "history"],d:20,s:"Chapel decorated with 40,000 human bones arranged into art",st:"Medieval plague killed half Europe. Monks stacked 40,000 skeletons into decorative patterns. Skulls form coat-of-arms. Femurs chandelier. Spine decorates arches. It\'s the darkest art museum ever.",im:"1400s: Bodies pile up. Monks layer them. 2024: Still standing, still surreal.",t:"Day trip 40 min. €4 entry. Prepare psychologically. Good bones pun humor required.",c:["scary", "history_big"],r:"y",nn:"Kapsa Kostnice  #41 — Sedlec",ns:"Kaple zdobená 40 000 lidských kostí uspořádaných v umění",nst:"Středověká morová rána. Mniši skládají 40 000 kostí. Lebky, stehenní kosti, páteř. Nejtemější umění.",nt:"Výlet 40 minut. €4 vstupné. Psychologicky se připrav. Humor potřebný."},
  {id:52,n:"Špilberk Castle Fortress  #42 — Brno Heights",a:"Brno Heights",v:["history", "high_spots"],d:3,s:"Medieval fortress overlooking the city since 1200s",st:"Climb to ramparts. Prison museum inside (torture equipment, cells). Views of entire Brno. Moats 30m deep. Museum €5. Real fortress, not romantic castle.",im:"1200s: Fortified against invaders. Used as WWII Nazi/Soviet prison. 2024: Open for tourists.",t:"2-hour visit. Go early avoid crowds. Cell descriptions hard. Bring water.",c:["history_big", "high_spots"],r:"y",nn:"Hrad Špilberk  #42 — Brno Heights",ns:"Středověký hrad přehlížející město od 1200let",nst:"Vylez na hradby. Muzeum vězení (tortury, cely). Pohled na Brno. Příkopy 30m. Muzeum €5.",nt:"2 hodiny. Jdi brzy. Popisy jsou těžké. Voda."},
  {id:53,n:"Underground Labyrinth Tour  #43 — City Center",a:"City Center",v:["hidden", "scary"],d:1,s:"Medieval tunnels and merchant cellars under the city streets",st:"Guided tour (€5) into 13th-century cellars and tunnels. Merchants stored goods 12m below streets. Smugglers used them. Dark, cramped, creepy. You walk where medieval people walked. Boots recommended.",im:"1300s: Merchants tunnel-trade. 1940s: WWII refugees hide. 2024: You tour their secrets.",t:"Tour daily 11am/2pm/4pm. Book ahead. Claustrophobic? Pass. Flash photo not allowed.",c:["hidden", "scary"],r:"y",nn:"Podzemní Labyrint  #43 — City Center",ns:"Středověké tunely a obchodní sklepy pod ulicemi",nst:"Průvodce (€5) do 13. století. Obchodníci skladovali. Pašeráci používali. Tmavě, těsně. Boty doporučeny.",nt:"Průvodce denně. Rezervuj. Klaustrofobní? Passer. Bez blesku."},
  {id:54,n:"Tugendhat Villa UNESCO  #44 — Brno",a:"Brno",v:["history", "architecture"],d:4,s:"Bauhaus masterpiece of 1930s modernist design",st:"€10 tour (book ahead). 1930 mansion that changed architecture. Open floor plan, steel, glass. Nazi theft, Soviet use, restoration 2012. It\'s design history.",im:"1930: Built to revolutionize design. 1940s: Nazis steal art. 2024: Restored to glory.",t:"Tour only—book 1 day ahead. 1 hour. Photography no-flash only. Design nerds heaven.",c:["architecture", "history_big"],r:"g",nn:"Vila Tugendhat UNESCO  #44 — Brno",ns:"Bauhaus mistrovství z 30. let moderního designu",nst:"€10 průvodce (rezervuj). 1930 vila. Otevřený plán. Ocel, sklo. Historie designu.",nt:"Pouze průvodce—rezervuj den. 1 hodina. Bez blesku. Designéři bude rádi."},
  {id:55,n:"Cathedral of St. Peter  #45 — City Center",a:"City Center",v:["history", "beautiful"],d:1,s:"Gothic cathedral with tower you can climb free",st:"Free entry. 98 meters high. Climb 378 steps (€2). Views of all Brno. Interior: original tiles, Gothic arches. Not touristy—locals attend. Quiet.",im:"1370s: Foundations laid. Towers completed 1500s. 2024: Same Gothic majesty.",t:"Climb early morning before crowds. Go if legs strong—steep steps. Views worth it.",c:["architecture", "history_big"],r:"g",nn:"Katedrála Sv. Petra  #45 — City Center",ns:"Gotická katedrála s věží kterou můžeš lézt zdarma",nst:"Volný vstup. 98 metrů. Vylez 378 schodů (€2). Pohled. Originální dlaždice. Ticho.",nt:"Léz ráno. Jdi pokud nohy silné—prudké schody. Pohled stojí."},
  {id:56,n:"Cabbage Market  #46 — Old Town",a:"Old Town",v:["local", "free"],d:1,s:"Medieval market square where locals actually shop",st:"Open-air market where Czechs buy vegetables (yes, actually—not tourist trap). Café corner €3. Locals chat in Czech. Morning best (6am-noon). Authentic medieval vibes.",im:"Medieval times: Merchants sold here. 2024: Same spot, same locals, same veggies.",t:"Go before 10am. Bring coins. Ask vendors about local produce. Photography welcome.",c:["local_only", "history_big"],r:"g",nn:"Zelný Trh  #46 — Old Town",ns:"Středověké tržiště kde se místní nákupují",nst:"Venkovní trh. Češi kupují zeleninu. Kavárna €3. Ráno (6-12). Autentický středověk.",nt:"Jdi před 10h. Mince. Ptej se. Fotografie vítána."},

  {id:78,n:"Hotel International Brutalist Tower  #68 — Holesovice",a:"Holesovice",v:["architecture", "weird"],d:4,s:"Soviet-era brutalist hotel that time forgot",st:"1960s brutalist concrete. Maze interior. Restaurant functioning (€8 meals). Communist aesthetic preserved. You can tour (€8) or eat (€12 cocktails, weak). Unintentionally artistic.",im:"1960: Built as Soviet pride. 1990: Abandoned. 2024: Instagram-worthy ruin.",t:"Tour odd hours. Restaurant open lunch/dinner. Strong drinks recommended ironically.",c:["weird", "architecture"],r:"g",nn:"Hotel International Brutalista  #68 — Holesovice",ns:"Sovětské brutalisty hotel který čas zapomněl",nst:"Betonu. Interiér labyrint. Restaurace fungující. Komunistická estetika. Tour (€8).",nt:"Tour podivné hodiny. Restaurace. Silné nápoje doporučeny."},
  {id:79,n:"Moravian Karst  #69 — Moravian Karst",a:"Moravian Karst",v:["nature", "beautiful"],d:25,s:"Underground river caves with stalactite cathedrals",st:"Bus 45 min. Punkva Caves tour (€12). Boat through cave river. Stalactites formations 300,000 years old. Walking trails above ground. Forest beauty.",im:"300,000 years: Water carved caves. Humans found them 200 years ago. 2024: Tours run daily.",t:"Book boat tour (€12). Wear jacket—cave cold (8°C). Walk trails after tour (free). Full day possible.",c:["nature", "parks"],r:"g",nn:"Moravský Kras  #69 — Moravian Karst",ns:"Podzemní řeka s jeskyní s proskleními",nst:"Autobus 45 minut. Jeskyně Punkvy (€12). Loď řekou. Stalaktity 300 000 let. Pěší cesty. Lesní krása.",nt:"Rezervuj loď (€12). Bunda—jaskyne studené. Pěší cesty. Celý den."},
  {id:80,n:"Macocha Abyss Gorge  #70 — Macocha",a:"Macocha",v:["nature", "scary"],d:30,s:"Massive gorge 138 meters deep where the ground literally breaks open",st:"Walking trails above gorge. 138m straight down. Dangerous—stay back. Hiking ropes exist if you\'re brave (mountaineering guide €20). Views terrifying and beautiful. Nature\'s power.",im:"1 million years: Erosion carved it. Medieval: Locals feared it. 2024: Tourists still shocked.",t:"Hike 2-3 hours. Bring water. Don\'t climb without guide—people die. Views free and humbling.",c:["nature", "scary"],r:"g",nn:"Macocha Propast  #70 — Macocha",ns:"Obrovský kaňon 138 metrů hluboký kde se půda rozlamuje",nst:"Pěší cesty. 138m dolů. Nebezpečné. Lana (průvodce €20). Pohled děsivý i krásný.",nt:"Pešina 2-3 hodiny. Voda. Bez průvodce se nelezou. Pohled volný."},
  {id:81,n:"Ossuary Chapel  #71 — Sedlec",a:"Sedlec",v:["scary", "history"],d:20,s:"Chapel decorated with 40,000 human bones arranged into art",st:"Medieval plague killed half Europe. Monks stacked 40,000 skeletons into decorative patterns. Skulls form coat-of-arms. Femurs chandelier. Spine decorates arches. It\'s the darkest art museum ever.",im:"1400s: Bodies pile up. Monks layer them. 2024: Still standing, still surreal.",t:"Day trip 40 min. €4 entry. Prepare psychologically. Good bones pun humor required.",c:["scary", "history_big"],r:"y",nn:"Kapsa Kostnice  #71 — Sedlec",ns:"Kaple zdobená 40 000 lidských kostí uspořádaných v umění",nst:"Středověká morová rána. Mniši skládají 40 000 kostí. Lebky, stehenní kosti, páteř. Nejtemější umění.",nt:"Výlet 40 minut. €4 vstupné. Psychologicky se připrav. Humor potřebný."},
  {id:82,n:"Špilberk Castle Fortress  #72 — Brno Heights",a:"Brno Heights",v:["history", "high_spots"],d:3,s:"Medieval fortress overlooking the city since 1200s",st:"Climb to ramparts. Prison museum inside (torture equipment, cells). Views of entire Brno. Moats 30m deep. Museum €5. Real fortress, not romantic castle.",im:"1200s: Fortified against invaders. Used as WWII Nazi/Soviet prison. 2024: Open for tourists.",t:"2-hour visit. Go early avoid crowds. Cell descriptions hard. Bring water.",c:["history_big", "high_spots"],r:"y",nn:"Hrad Špilberk  #72 — Brno Heights",ns:"Středověký hrad přehlížející město od 1200let",nst:"Vylez na hradby. Muzeum vězení (tortury, cely). Pohled na Brno. Příkopy 30m. Muzeum €5.",nt:"2 hodiny. Jdi brzy. Popisy jsou těžké. Voda."},
  {id:83,n:"Underground Labyrinth Tour  #73 — City Center",a:"City Center",v:["hidden", "scary"],d:1,s:"Medieval tunnels and merchant cellars under the city streets",st:"Guided tour (€5) into 13th-century cellars and tunnels. Merchants stored goods 12m below streets. Smugglers used them. Dark, cramped, creepy. You walk where medieval people walked. Boots recommended.",im:"1300s: Merchants tunnel-trade. 1940s: WWII refugees hide. 2024: You tour their secrets.",t:"Tour daily 11am/2pm/4pm. Book ahead. Claustrophobic? Pass. Flash photo not allowed.",c:["hidden", "scary"],r:"y",nn:"Podzemní Labyrint  #73 — City Center",ns:"Středověké tunely a obchodní sklepy pod ulicemi",nst:"Průvodce (€5) do 13. století. Obchodníci skladovali. Pašeráci používali. Tmavě, těsně. Boty doporučeny.",nt:"Průvodce denně. Rezervuj. Klaustrofobní? Passer. Bez blesku."},

  {id:105,n:"Cathedral of St. Peter  #95 — City Center",a:"City Center",v:["history", "beautiful"],d:1,s:"Gothic cathedral with tower you can climb free",st:"Free entry. 98 meters high. Climb 378 steps (€2). Views of all Brno. Interior: original tiles, Gothic arches. Not touristy—locals attend. Quiet.",im:"1370s: Foundations laid. Towers completed 1500s. 2024: Same Gothic majesty.",t:"Climb early morning before crowds. Go if legs strong—steep steps. Views worth it.",c:["architecture", "history_big"],r:"g",nn:"Katedrála Sv. Petra  #95 — City Center",ns:"Gotická katedrála s věží kterou můžeš lézt zdarma",nst:"Volný vstup. 98 metrů. Vylez 378 schodů (€2). Pohled. Originální dlaždice. Ticho.",nt:"Léz ráno. Jdi pokud nohy silné—prudké schody. Pohled stojí."}

,{id:121,n:"Yume Bar Arcade Hangout",a:"City Center",v:["hidden", "quirky"],d:10,s:"Free retro gaming paradise with anime vibes!",st:"Dive into a neon-lit nook where locals mash buttons on classic Pac-Man and Street Fighter machines for zero cost. It's the ultimate late-night pit stop for broke adventurers craving that pixelated rush. Split a drink if you're feeling fancy, but the games are the real star.",im:"Imagine crushing high scores on glowing arcade cabinets while anime posters flicker overhead in the cozy glow.",t:"Tram to Náměstí Svobody or walk from Old Town; free games 24/7, drinks optional ~50 CZK; best after midnight when it's buzzing.",c:["culture"],r:"g",nn:"Yume bar",ns:"Zdarma retro arkáda s anime atmosférou!",nst:"Ponořte se do neonového kouta, kde místní tlačí tlačítka na klasických Pac-Man a Street Fighter strojích zadarmo. Ideální noční zastávka pro dobrodruhy s prázdnou peněženkou. Napijte se, pokud chcete, ale hry jsou hvězda.",nt:"Tramvaj na Náměstí Svobody nebo pěšky ze Starého Města; hry zdarma 24/7, nápoje volitelné ~50 Kč; nejlepší po půlnoci."},
{id:122,n:"Podsvětí Medieval Cellar",a:"Kapucínské náměstí",v:["hidden", "romantic"],d:15,s:"Whispered tales in candlelit fantasy cellars!",st:"Step into Brno's underground realm of stone arches and flickering torches, where medieval vibes transport you to knightly feasts. Linger over one cheap pint amid the weird romantic haze. Perfect for a pub-hunt quest through history's hidden veins.",im:"Picture clinking mugs under low stone ceilings as shadows dance like ancient ghosts.",t:"Near Capuchin Monastery, tram 1/2/8; free entry to peek, drink ~60 CZK; evenings for max atmosphere.",c:["culture"],r:"g",nn:"Podsvětí",ns:"Šepoty v svíčkových středověkých sklepech!",nst:"Vstupte do podzemní říše Brna s kamennými oblouky a blikajícími pochodněmi, kde středověká atmosféra vás přenese k rytířským hostinám. Zůstaňte u jednoho levného piva v podivné romantické mlze. Skvělé pro lov hospod v historických žilách.",nt:"U Kapucínského kláštera, tram 1/2/8; vstup zdarma nakouknout, pití ~60 Kč; večery pro atmosféru."},
{id:123,n:"Středověká Krčma Cellar",a:"Old Town Hall Area",v:["hidden", "weird"],d:15,s:"Time-warp tavern in a real medieval vault!",st:"Descend into this quirky cellar pub by the Old Town Hall, where rough-hewn walls echo with faux-medieval chants. It's a weirdly immersive spot for people-watching over affordable ale. Chain it with nearby cellars for an epic fantasy crawl.",im:"Envision torchlight glinting off tankards as costumed servers weave through stone passages.",t:"Mečířova 5, walk from Zelný trh; free to enter/linger, beer ~50 CZK; anytime, peaks Friday nights.",c:["culture"],r:"g",nn:"Středověká Krčma",ns:"Cestovní stroj v opravdové středověké klenbě!",nst:"Sestupte do této podivné sklepní hospody u Staroměstské radnice, kde hrubé zdi odrážejí středověké zpěvy. Ideální pro pozorování lidí u dostupného piva. Spojte s okolními sklepy pro epický fantasy průvod.",nt:"Mečířova 5, pěšky z Zelný trh; vstup zdarma, pivo ~50 Kč; kdykoli, vrchol pátky."},
{id:124,n:"Rytířská Krčma Knight's Den",a:"Moravian Square",v:["hidden", "romantic"],d:15,s:"Knightly nook for shadowy storytelling!",st:"Tucked near bustling Moravské náměstí, this cellar summons chivalric spirits with its armored decor and dim allure. Sip slowly on the cheap and let the weird vibes spark adventures. A must for Brno's cellar saga.",im:"Feel the chill of stone as lantern light reveals shields and swords on every wall.",t:"Near Moravské náměstí, tram 3/5; free entry, drinks ~55 CZK; best for cozy winter evenings.",c:["culture"],r:"g",nn:"Rytířská Krčma",ns:"Rytířský kout pro temné vyprávění!",nst:"Schovaný u rušného Moravského náměstí, tento sklep přivolává rytířské duchy brněním a temným kouzlem. Pijte pomalu levně a nechte podivné vibrace rozdmýchat dobrodružství. Nezbytné pro brněnskou sklepní ságu.",nt:"U Moravského náměstí, tram 3/5; vstup zdarma, nápoje ~55 Kč; nejlepší v zimních večerech."},
{id:125,n:"Artbar 2. pád Micro-Venue",a:"City Center",v:["hidden", "culture"],d:10,s:"Secret spot for free live jams!",st:"Hunt posters for this tiny underground stage where spontaneous music erupts in intimate chaos. Locals swear by its surprise gigs that feel like crashing a friend's wild party. Pure Brno magic for curious night owls.",im:"Hear guitars wail and voices rise in a sweat-soaked room packed with ecstatic strangers.",t:"Check posters around bars, central location; free entry, check events; evenings/weekends.",c:["culture"],r:"g",nn:"Artbar 2. pád",ns:"Tajný spot pro zdarma živé jam!",nst:"Hledejte plakáty u tohoto malého podzemního jeviště, kde spontánní hudba exploduje v intimním chaosu. Místní přísahají na překvapivé koncerty jako narušení divoké párty. Čistá brněnská kouzla pro noční sovy.",nt:"Plakáty v barech, centrální; vstup zdarma, sledujte eventy; večery/víkendy.",ef:"Almost free and worth it: nearby Oáza denní menu ~110 CZK"},
{id:126,n:"Stará Pekárna Live Spot",a:"City Center",v:["hidden", "culture"],d:10,s:"Old bakery turned free gig haven!",st:"This former bakery now pulses with indie sounds from poster-led events, drawing eclectic crowds for unpretentious vibes. Stumble in on a whim and discover Brno's beating underground heart. Adventure guaranteed.",im:"Breathe in the scent of fresh bread mixed with amp hum as bodies sway in the brick vault.",t:"Vibe-check posters, tram to center; free most nights; check schedules online.",c:["culture"],r:"g",nn:"Stará Pekárna",ns:"Stará pekárna jako zdarma gig raj!",nst:"Bývalá pekárna teď pulzuje indie zvuky z plakátových eventů, přitahuje eklektické davy. Vstupte náhodou a objevte brněnské podzemní srdce. Dobrodružství zaručeno.",nt:"Plakáty, tram do centra; zdarma většinou večer; sledujte program."},
{id:127,n:"U kouřícího králíka Jam Sessions",a:"Old Town",v:["hidden", "culture"],d:15,s:"Smoky den for epic free jams!",st:"Enter the haze of this legendary spot where musicians riff endlessly on open-mic nights. It's a curious haven for improvisers and listeners alike, fueling Brno's creative underbelly. Join the smoke and soul.",im:"Watch fingers fly on guitars amid curling smoke and rapt applause from fellow wanderers.",t:"Near Old Town, walkable; free jam sessions; evenings, esp. Wednesdays.",c:["culture"],r:"g",nn:"U kouřícího králíka",ns:"Kouřový doupě pro epické zdarma jam!",nst:"Vstupte do mlhy legendárního místa, kde hudebníci riffují na open-mic nocích. Přístav pro improvizátory i posluchače, pohánějící brněnské kreativní podbřišek. Přidejte se k dýmu a duši.",nt:"U Starého Města, pěšky; zdarma jam; večery, zejm. středy."},
{id:128,n:"Spot Skater Café",a:"City Center",v:["hidden", "quirky"],d:10,s:"Skate vibes with free open-air tunes!",st:"Chill at this skater haunt where summer brings pop-up concerts in the yard, blending board tricks with beats. Locals love its raw, youthful energy—perfect for offbeat hangs. Shred or spectate!",im:"Feel the sun as ollies sync with bass drops in a graffiti-splashed outdoor arena.",t:"Central, near trams; free entry/concerts in season; daytime hangs, summer nights.",c:["culture"],r:"g",nn:"Spot",ns:"Skate vibrace se zdarma open-air tunami!",nst:"Uvolněte se u skejťáckého doupěte, kde léto přináší pop-up koncerty na dvorku, míchající triky s beaty. Místní milují syrovou mládežnickou energii. Drťte nebo sledujte!",nt:"Centrál, u tramvají; vstup zdarma/koncerty v sezóně; denní chlazení, letní noci."},
{id:129,n:"Hády Ridge Klajdovka Viewpoint",a:"Hády",v:["hidden", "panorama"],d:25,s:"Epic sunset panorama ridge ramble!",st:"Trek this locals-only ridge for sweeping city views that unfold like a panoramic dream. Pack a picnic beer and watch Brno glow golden—pure broke-romantic bliss. Adventure calls from the heights!",im:"Gaze as the sun dips, painting spires and hills in fiery hues from your secret perch.",t:"Bus 100 from center ~20min; free, sunset best; supermarket picnic ~50 CZK.",c:["parks"],r:"g",nn:"Hády hřeben / Klajdovka vyhlídka",ns:"Epická sunset panoráma na hřebenu!",nst:"Vytáhněte na tento místní hřeben pro široké výhledy na město jako panoramatický sen. S sebou pivo a sledujte, jak Brno září zlatě. Romantika pro chudé dobrodruhy!",nt:"Autobus 100 z centra ~20min; zdarma, západ slunce nejlepší; piknik z supermarketu ~50 Kč."},
{id:130,n:"Lužánky Park Wander",a:"Lužánky",v:["hidden", "nature"],d:20,s:"Brno's oldest park for lazy nature vibes!",st:"Lose yourself in this vast green lung, Brno's largest park with winding paths and hidden nooks for ultimate chill. It's the go-to for relaxed escapes amid urban buzz. Breathe deep and wander free.",im:"Recline under ancient trees as birdsong drowns the city hum in leafy seclusion.",t:"Tram 1/6 to Lužánky; fully free; anytime, golden hour magic.",c:["parks"],r:"g",nn:"Lužánky park",ns:"Nejstarší brněnský park pro lenivé přírodní vibrace!",nst:"Ztratíte se v tomto obřím zeleném plicích, největším parku s klikatými cestami a skrytými zákoutími. Top pro relax u městského šumu. Dýchejte a bludejte zdarma.",nt:"Tram 1/6 na Lužánky; úplně zdarma; kdykoli, zlatá hodina kouzlo."}];
