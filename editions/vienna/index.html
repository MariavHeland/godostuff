  {id:60,n:"Belvedere Palace Secret Gardens — Landstrasse",a:"Landstrasse",v:["beautiful", "history"],d:60,s:"Baroque paradise where Klimt\'s \'Kiss\' hangs alongside the real Vienna",st:"Most visit for Klimt\'s \'Kiss\' in the museum. But the gardens are the real treasure. Hedge mazes, cascading fountains, and views of Vienna from above. Sit on the terraces between the Upper and Lower Palaces. The silence is thick. The light is perfect.",im:"It\'s 1724. Prince Eugene rides through on horseback. The gardens are brand new. Every shrub is trimmed precisely. His power is written in geometry and stone. The view of Vienna spreads below like a kingdom.",t:"Most visit for Klimt\'s \'Kiss\' in the museum. But the gardens are the real treasure. Hedge mazes, cascading fountains, and views of Vienna from above. Sit on the terraces between the Upper and Lower Palaces. The silence is thick. The light is perfect.\",im:\"It\'s 1724. Prince Eugene rides through on horseback. The gardens are brand new. Every shrub is trimmed precisely. His power is written in geometry and stone. The view of Vienna spreads below like a kingdom.\",t:\"Prinz-Eugen-Strasse 27, Landstrasse. €16 for palace, €10 for gardens only. U-Bahn U1 Karlsplatz, then tram D. Arrive 3pm for golden light. Gardens stay open later than museums.",c:["history_big", "parks"],r:"g",nn:"Belvedere Palast — Wieden",ns:"Kunst und Barockgärten—Gustav Klimt \'The Kiss\' ist hier.",nst:"Das Belvedere ist zwei Paläste mit Garten dazwischen. Oben (Upper Belvedere) ist Museum mit Österreichischer Kunst—Klimt, Schiele. Das berühmte Gemälde \'Der Kuss\' ist hier. Garten ist barock und gewaltig.",nt:"€16 beide Paläste. Täglich 10-18 Uhr (Mittwoch bis 21 Uhr). U-Bahn Karlsplatz (für Upper), Tram 71 (für Lower). Audioguide kostenlos. Café im Garten. Plan 3 Stunden."},
  {id:61,n:"Ottoman Siege Wall Fragment — Alsergrund",a:"Alsergrund",v:["history", "hidden", "weird"],d:61,s:"A stone wall that stopped the invaders in 1683",st:"Half-buried in a courtyard, this fragment survived when they tore down Vienna\'s medieval walls. It\'s rough, battle-scarred stone. A plaque marks where the Ottomans got closest. Most Viennese never see it. You can touch the same stone the Ottomans did 340 years ago.",im:"It\'s September 1683. Cannons boom. Smoke fills the air. This wall holds. Janissaries fall. The city survives. The wall is forgotten. But it remains.",t:"Half-buried in a courtyard, this fragment survived when they tore down Vienna\'s medieval walls. It\'s rough, battle-scarred stone. A plaque marks where the Ottomans got closest. Most Viennese never see it. You can touch the same stone the Ottomans did 340 years ago.\",im:\"It\'s September 1683. Cannons boom. Smoke fills the air. This wall holds. Janissaries fall. The city survives. The wall is forgotten. But it remains.\",t:\"Türkenstrasse 16, Alsergrund. In the courtyard (Durchhaus), free entry. U-Bahn U6 Gürtel. The plaque is on the right side. Bring a rubbings pencil—you can make a rubbing of the damage marks.",c:["history_big", "scary"],r:"g",nn:"Ottoman Siege Wall Fragment — Alsergrund",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:62,n:"Karlskirche Dome Elevator — Wieden",a:"Wieden",v:["beautiful", "history"],d:62,s:"Climb inside a Baroque dome and touch the frescoes from above",st:"Ride a tiny elevator up the interior of the dome. You\'re inside the frescoes. Inches from 300-year-old paint showing saints and angels. The view down is dizzying. The view of Vienna from the balcony is unbeatable. You\'re inside the building\'s heart.",im:"It\'s 1737. The dome is fresh. Painters climb scaffolds inside the space you\'re standing in. They\'ve been working for months. Their work will be seen by millions but rarely from this angle.",t:"Ride a tiny elevator up the interior of the dome. You\'re inside the frescoes. Inches from 300-year-old paint showing saints and angels. The view down is dizzying. The view of Vienna from the balcony is unbeatable. You\'re inside the building\'s heart.\",im:\"It\'s 1737. The dome is fresh. Painters climb scaffolds inside the space you\'re standing in. They\'ve been working for months. Their work will be seen by millions but rarely from this angle.\",t:\"Karlsplatz, Wieden. €10 elevator, €12 with museum. U-Bahn U1/U2/U4 Karlsplatz. Elevator runs 9am-5pm. Wear comfortable shoes. The climb is tight but the payoff is electric.",c:["architecture", "beautiful"],r:"g",nn:"Karlskirche Dome Elevator Kirche — Wieden",ns:"Gotisch oder barock—wo Glaube in Stein ist.",nst:"Du trittst in die Kirche. Licht kommt durch Fenster. Deckenmalerei, Altäre, Glocken. Es ist heilig und zeitlos. Deine Stimme hallt.",nt:"Kostenlos eintritt. Täglich 8-18 Uhr (manche bis 19 Uhr). Konzerte gelegentlich €10-20. Sehr ruhig und meditativ. Respekt für Beter."},
  {id:63,n:"Flak Tower Friedensturm — Alsergrund",a:"Alsergrund",v:["history", "weird", "local"],d:63,s:"A Nazi-built tower too massive to demolish, now a climbing wall",st:"After WWII, Vienna tried to demolish these concrete bunkers. They couldn\'t. Too hard. So they turned one into a climbing gym and left the others as monuments. You can see them scattered across the city. This one is 40 meters of solid concrete and anger. Climbers now erase the architecture of fear.",im:"It\'s 1945. Soldiers fire from these guns. The Allies bomb below. The tower shakes but holds. In 80 years, teenagers will climb its walls for fun. History becomes playground.",t:"After WWII, Vienna tried to demolish these concrete bunkers. They couldn\'t. Too hard. So they turned one into a climbing gym and left the others as monuments. You can see them scattered across the city. This one is 40 meters of solid concrete and anger. Climbers now erase the architecture of fear.\",im:\"It\'s 1945. Soldiers fire from these guns. The Allies bomb below. The tower shakes but holds. In 80 years, teenagers will climb its walls for fun. History becomes playground.\",t:\"Arne-Carlsson-Park, Alsergrund (near U6 Gürtel). The Flak Tower climbing gym is €15-20 per session. Bring harness + gear or rent. Non-climbers can view from the park for free.",c:["history_big", "scary"],r:"y",nn:"Flak Tower Friedensturm Turm — Alsergrund",ns:"Hoch und Aussicht—wo Stadt unter dir liegt.",nst:"Du steigst den Turm. Stufe für Stufe. Oben: Aussicht über Stadt. Berge, Flüsse, Landschaft. Dein Herz pocht. Deine Beine aua.",nt:"€3-8 Aufstieg. Täglich 9-18 Uhr (Winter kürzer). Treppen sind steil. Nicht für Höhenangst! Früh morgens kommen für leere Treppen. Aussicht spektakulär."},
  {id:64,n:"Prater Giant Wheel Sunset — Leopoldstadt",a:"Leopoldstadt",v:["history", "night", "beautiful"],d:64,s:"1897\'s wooden relic offers the slowest, most romantic 360-degree view",st:"The Riesenrad creaks like it might collapse any second. It probably won\'t. Each cabin is a little room. Horses rotate on ancient mechanisms below. Watch the city turn golden below you. The wheel is so old it feels like you\'re inside a time machine.",im:"It\'s 1897. The wheel is brand new. A couple stands in a cabin. Vienna sprawls endless below. They don\'t know this same view will survive two World Wars. The wheel will still turn a century later.",t:"The Riesenrad creaks like it might collapse any second. It probably won\'t. Each cabin is a little room. Horses rotate on ancient mechanisms below. Watch the city turn golden below you. The wheel is so old it feels like you\'re inside a time machine.\",im:\"It\'s 1897. The wheel is brand new. A couple stands in a cabin. Vienna sprawls endless below. They don\'t know this same view will survive two World Wars. The wheel will still turn a century later.\",t:\"Riesenradplatz 1, Leopoldstadt. €14.50 entry, cash or card. U-Bahn U2 Prater Stern. Go at sunset (6pm in spring). The wheel runs until midnight. Bring a notebook—bring a date.",c:["history_big", "romantic_water"],r:"g",nn:"Prater Giant Wheel Sunset — Leopoldstadt",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:65,n:"Necropolises Beneath St. Stephen\'s — Innere Stadt",a:"Innere Stadt",v:["history", "hidden", "scary"],d:65,s:"Medieval burial chambers under Europe\'s most visited cathedral",st:"Book the 45-minute catacombs tour. You descend into stone chambers where archbishops and nobles were buried for 900 years. Bones rest in stone coffins. The air is cold. The darkness is complete. Your guide uses old lanterns. It feels forbidden.",im:"It\'s 1350. A cardinal dies. Torchbearers descend these steps. His coffin is sealed in the wall. He joins hundreds of his predecessors in the dark. No light reaches his bones for 700 years.",t:"Book the 45-minute catacombs tour. You descend into stone chambers where archbishops and nobles were buried for 900 years. Bones rest in stone coffins. The air is cold. The darkness is complete. Your guide uses old lanterns. It feels forbidden.\",im:\"It\'s 1350. A cardinal dies. Torchbearers descend these steps. His coffin is sealed in the wall. He joins hundreds of his predecessors in the dark. No light reaches his bones for 700 years.\",t:\"Stephansplatz 3, Innere Stadt. Tours €6-8. Guided tours in English daily 10:30am, 2pm, 3:30pm. U-Bahn U1/U3 Stephansplatz. Not recommended for severe claustrophobes. Bring a sweater.",c:["history_big", "scary", "famous_dead"],r:"g",nn:"Necropolises Beneath St. Stephen\'s — Innere Stadt",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:66,n:"Mariahilf Street Market Edge — Mariahilf",a:"Mariahilf",v:["local", "history", "free"],d:66,s:"Where Vienna\'s working-class culture lives in produce stalls and gossip",st:"Mariahilfer Strasse is touristy. But the side streets off it—the real markets—are Vienna\'s living room. Fruit sellers know customers by name. Butchers argue about the best cut. Kids play between stalls. This is how Vienna actually lives when tourists don\'t watch.",im:"It\'s 1950. A housewife hagles with a vendor. They\'ve negotiated prices for 20 years. They know each other\'s families. The market is survival and community tangled together.",t:"Mariahilfer Strasse is touristy. But the side streets off it—the real markets—are Vienna\'s living room. Fruit sellers know customers by name. Butchers argue about the best cut. Kids play between stalls. This is how Vienna actually lives when tourists don\'t watch.\",im:\"It\'s 1950. A housewife hagles with a vendor. They\'ve negotiated prices for 20 years. They know each other\'s families. The market is survival and community tangled together.\",t:\"Mariahilf district, west of Mariahilfer Strasse. Start at Karmelitermarkt (U3 Neubaugasse). Best Tuesday-Saturday 8am-1pm. Bring cash. Buy something—it supports Vienna.",c:["local_only"],r:"g",nn:"Mariahilf Street Market Edge Markt — Mariahilf",ns:"Täglich Farbe und Leben—wo Stadt isst.",nst:"Der Markt ist täglich oder wöchentlich. Obst, Gemüse, Blumen, Käse. Bauern schreien. Menschen bummel. Es ist Farbe und Lärm.",nt:"Kostenlos spazieren. Produkte kosten normal (Obst €2-5, Käse €10-15). Beste Zeit: Morgen 8-12 Uhr. Samstag voller Leute. Sehr authentisch."},
  {id:67,n:"Liechtenstein Museum Secret Wing — Alsergrund",a:"Alsergrund",v:["history", "beautiful", "quiet"],d:67,s:"A private palace collection so small most tourists miss it entirely",st:"Hidden on a side street, this palace holds centuries of European art. Ruby-red walls. Gold frames. The rooms are intimate. You might be alone in rooms worth millions. The chandeliers are impossibly heavy with history. The silence is thick enough to hear your heartbeat.",im:"It\'s 1750. A prince walks through these rooms at night by candlelight. Every painting was commissioned for his eyes alone. He is alone with the wealth of nations.",t:"Hidden on a side street, this palace holds centuries of European art. Ruby-red walls. Gold frames. The rooms are intimate. You might be alone in rooms worth millions. The chandeliers are impossibly heavy with history. The silence is thick enough to hear your heartbeat.\",im:\"It\'s 1750. A prince walks through these rooms at night by candlelight. Every painting was commissioned for his eyes alone. He is alone with the wealth of nations.\",t:\"Fürstengasse 1, Alsergrund. €14 entry. Tram D to Fürstengasse. Closed Mondays. Audio guide included. Plan 1.5 hours. Arrive after 3pm for empty rooms.",c:["history_big", "architecture"],r:"g",nn:"Liechtenstein Museum Secret Wing Museum — Alsergrund",ns:"Museum mit Sammlungen und Geschichte.",nst:"Du betrittst das Museum und siehst Kunstwerke, Artefakte, alte Dinge. Jedes Objekt erzählt eine Geschichte. Es ist Vergangenheit bewahrt für Gegenwart.",nt:"€6-12 Eintritt. Täglich 10-18 Uhr (Montag oft geschlossen). Audioguide kostenlos oder €3. Café im Gebäude. Plan 2 Stunden."},
  {id:68,n:"Red Vienna Public Housing Rows — Favoriten",a:"Favoriten",v:["history", "architecture", "local"],d:68,s:"1920s socialist housing blocks where Vienna built a better world",st:"After WWI, Vienna\'s government built 60,000 apartments for workers. The Karl-Marx-Hof is the most famous—a six-story arc a quarter-mile long. Courtyards bloom inside. A swimming pool, a kindergarten, libraries. It was radical. It still is. Walk through. See how a city cared for its poor.",im:"It\'s 1930. A factory worker signs the lease. His wife stands in the bright apartment. Running water. Electric light. Their own kitchen. In the old city, they would have rented a dark cellar. Here, their daughter will grow up with hope.",t:"After WWI, Vienna\'s government built 60,000 apartments for workers. The Karl-Marx-Hof is the most famous—a six-story arc a quarter-mile long. Courtyards bloom inside. A swimming pool, a kindergarten, libraries. It was radical. It still is. Walk through. See how a city cared for its poor.\",im:\"It\'s 1930. A factory worker signs the lease. His wife stands in the bright apartment. Running water. Electric light. Their own kitchen. In the old city, they would have rented a dark cellar. Here, their daughter will grow up with hope.\",t:\"Karl-Marx-Hof, Engelsplatz, Favoriten. U-Bahn U6 Troststrasse. Free to walk through courtyards. The museum inside is €7. Arrive 9am for residents-only quiet.",c:["history_big", "architecture"],r:"g",nn:"Red Vienna Public Housing Rows — Favoriten",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:69,n:"Karlsplatz Secession View — Wieden",a:"Wieden",v:["beautiful", "architecture"],d:69,s:"The golden Secession temple framed by urban chaos and calm",st:"The Secession building is usually mobbed. But stand across Karlsplatz at the steps facing it. Watch the light change. At sunset, the gold dome glows. At night, the building is almost religious. The dome says: there is beauty in rebellion.",im:"It\'s 1897. Architects unveil their manifesto in gold and curves. It says: forget the past. Build the future. We are Secession. The building shivers with revolution.",t:"The Secession building is usually mobbed. But stand across Karlsplatz at the steps facing it. Watch the light change. At sunset, the gold dome glows. At night, the building is almost religious. The dome says: there is beauty in rebellion.\",im:\"It\'s 1897. Architects unveil their manifesto in gold and curves. It says: forget the past. Build the future. We are Secession. The building shivers with revolution.\",t:\"Karlsplatz steps, opposite the Secession, Wieden. Free viewing spot. U-Bahn U1/U2/U4 Karlsplatz. Best light 5-7pm. Bring a book. Camp here and watch the city change.",c:["architecture", "beautiful"],r:"g",nn:"Karlsplatz Secession View Platz — Wieden",ns:"Zentral und belebt—Herz der Stadt.",nst:"Der Platz ist pulsierend. Brunnen, Restaurants, Menschen von überall. Es ist wo City trifft. Du gehörst sofort dazu.",nt:"Kostenlos spazieren. Restaurants €12-25. Cafés €3-6. Beste Zeit: Abend wenn Lichter an. Märkte gelegentlich auf Platz. Sehr touristisch aber authentisch."},
  {id:70,n:"Gumpendorfer Strasse Late-Night Eats — Neubau",a:"Neubau",v:["local", "night", "weird"],d:70,s:"Where Vienna eats fast and strange at midnight on a Thursday",st:"This street doesn\'t sleep. Döner stands, small restaurants, and late-night cafes line it. At 2am on a weekday, Viennese come here. They know the best spots by word of mouth. The food is cheap, real, and unfiltered. You\'re eating Vienna\'s actual hunger, not its tourist face.",im:"It\'s 2am. A nurse leaves her shift. A student fails his exam. A musician finishes a gig. They all meet at the same döner stand. They don\'t know each other but they share the same hunger and the same street.",t:"This street doesn\'t sleep. Döner stands, small restaurants, and late-night cafes line it. At 2am on a weekday, Viennese come here. They know the best spots by word of mouth. The food is cheap, real, and unfiltered. You\'re eating Vienna\'s actual hunger, not its tourist face.\",im:\"It\'s 2am. A nurse leaves her shift. A student fails his exam. A musician finishes a gig. They all meet at the same döner stand. They don\'t know each other but they share the same hunger and the same street.\",t:\"Gumpendorfer Strasse, Neubau district. Tram 6 or U3 Neubaugasse. Open until 4am most places. Bring cash. Bring an appetite. Go between 1-3am to see the real crowd.",c:["local_only", "night"],r:"g",nn:"Gumpendorfer Strasse Late-Night Eats Straße — Neubau",ns:"Gassen voller Leben—wo echt Köln/München/etc. ist.",nst:"Die Straße ist lebendig. Läden, Restaurants, Menschen überall. Du wandelst und absorberst Atmosphäre. Es ist Stadt pur.",nt:"Kostenlos spazieren. Restaurants €10-30. Cafés €3-7. Beste Zeit: Wochenende. Shopping und Essen zusammen. Sehr authentisch."},
  {id:71,n:"Schönbrunn Gloriette Hilltop Solitude — Hietzing",a:"Hietzing",v:["beautiful", "quiet"],d:71,s:"The view that made emperors feel less lonely",st:"Climb the 40 steps to the Gloriette—a neoclassical screen on a hilltop. Vienna spreads below like a map. On clear days, you see the Danube. The Gloriette was built so the Emperor could see his power from above. Now you can see it for free.",im:"It\'s 1775. The Emperor rides up. He sees his city. He is powerful but lonely. The view helps a little. It will help millions of people for 250 years.",t:"Climb the 40 steps to the Gloriette—a neoclassical screen on a hilltop. Vienna spreads below like a map. On clear days, you see the Danube. The Gloriette was built so the Emperor could see his power from above. Now you can see it for free.\",im:\"It\'s 1775. The Emperor rides up. He sees his city. He is powerful but lonely. The view helps a little. It will help millions of people for 250 years.\",t:\"Schönbrunn Park, Hietzing (main palace entrance). Gloriette is 10-minute walk uphill. Free entry to grounds (€17 for palace). U-Bahn U4 Schönbrunn. Best at 6pm. Bring water. The climb is steep but worth every step.",c:["parks", "beautiful"],r:"g",nn:"Schönbrunn Gloriette Hilltop Solitude — Hietzing",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:72,n:"Danube Island Wilds — Leopoldstadt/Donaustadt",a:"Donaustadt",v:["nature", "hidden", "free"],d:72,s:"A 21km artificial island where Vienna goes feral on weekends",st:"Created to prevent flooding, Donauinsel is now a wild refuge. Pebbled beaches, sandy coves, hidden swimming spots. Reggae bars appear in summer. Techno blasts from boats. But at dawn, it\'s silent. Herons fish. The Danube is wild here. The city is a distant hum.",im:"It\'s 1970. Engineers finish the last ton of gravel. Trees will grow here. The river will run beside them. In 50 years, thousands will swim where only engineers stood.",t:"Created to prevent flooding, Donauinsel is now a wild refuge. Pebbled beaches, sandy coves, hidden swimming spots. Reggae bars appear in summer. Techno blasts from boats. But at dawn, it\'s silent. Herons fish. The Danube is wild here. The city is a distant hum.\",im:\"It\'s 1970. Engineers finish the last ton of gravel. Trees will grow here. The river will run beside them. In 50 years, thousands will swim where only engineers stood.\",t:\"Donauinsel, access from U1 Donaustadt or tram 6. Free to walk/swim. Summer beach bars open 10am. Bring a swimming suit. The water is cold but clean. Go at dawn for solitude.",c:["parks", "nature", "free"],r:"g",nn:"Danube Island Wilds — Leopoldstadt/Donaustadt",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:73,n:"Freyung Courtyard Whispers — Innere Stadt",a:"Innere Stadt",v:["hidden", "quiet", "history"],d:73,s:"A medieval square where merchants once yelled their wares in a thousand languages",st:"Freyung is cobblestones and history. A fountain in the center. In medieval times, this was a trade crossroads—silk, spices, wool from across Europe met here. Now it\'s quiet. Locals sit on the fountain\'s edge. The sound echoes. The space remembers commerce and chaos.",im:"It\'s 1400. Merchants shout. A camel is tied to the fountain. Silks billow. Spice traders argue prices in Italian and Arabic and German. The square thrums with the world\'s hunger for luxury.",t:"Freyung is cobblestones and history. A fountain in the center. In medieval times, this was a trade crossroads—silk, spices, wool from across Europe met here. Now it\'s quiet. Locals sit on the fountain\'s edge. The sound echoes. The space remembers commerce and chaos.\",im:\"It\'s 1400. Merchants shout. A camel is tied to the fountain. Silks billow. Spice traders argue prices in Italian and Arabic and German. The square thrums with the world\'s hunger for luxury.\",t:\"Freyung, Innere Stadt (between Minoritenkirche and Herrengasse). Free walking. U-Bahn U2 Schottenring. Best quiet 8-9am before shops open. Sit at the fountain.",c:["history_big", "architecture"],r:"g",nn:"Freyung Courtyard Whispers — Innere Stadt",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:74,n:"Heiligenstadt Testament House — Alsergrund",a:"Alsergrund",v:["history", "quiet", "weird"],d:74,s:"The cottage where Beethoven raged against his deafness in writing",st:"In 1802, Beethoven rented this small room. He was going deaf. He wrote the Heiligenstadt Testament—a letter to his brothers so raw with pain it\'s almost unbearable to read. The house is small and quiet. You can sit where he sat. You can imagine his rage and despair turning into the most beautiful music ever written.",im:"It\'s 1802. Beethoven stands at the window. He can\'t hear the birds. He can\'t hear the piano. He can only hear the thunder in his mind. He writes in fury and tears.",t:"In 1802, Beethoven rented this small room. He was going deaf. He wrote the Heiligenstadt Testament—a letter to his brothers so raw with pain it\'s almost unbearable to read. The house is small and quiet. You can sit where he sat. You can imagine his rage and despair turning into the most beautiful music ever written.\",im:\"It\'s 1802. Beethoven stands at the window. He can\'t hear the birds. He can\'t hear the piano. He can only hear the thunder in his mind. He writes in fury and tears.\",t:\"Probusgasse 6, Alsergrund. €5 entry. Tram D to Armbrustergasse. Hours 10am-1pm, 2-6pm. Closed Mondays. Bring tissues. His Testament is posted on the wall.",c:["history_big", "famous_dead"],r:"g",nn:"Heiligenstadt Testament House — Alsergrund",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:75,n:"Musikverein Free Rehearsal Spying — Landstrasse",a:"Landstrasse",v:["free", "history", "beautiful"],d:75,s:"Sneak into Vienna\'s most beautiful concert hall during rehearsals (it\'s legal)",st:"The Musikverein\'s Golden Hall is the most acoustically perfect room in Europe. During rehearsal days, you can stand in the back for free and watch orchestras prepare. The music is raw and real. Musicians tune. A conductor stops to fix three bars. You witness genius before it\'s polished.",im:"It\'s 1870. An orchestra rehearses Brahms for the first time. The composer watches from a balcony. The conductor stops. They try again. The notes find each other.",t:"The Musikverein\'s Golden Hall is the most acoustically perfect room in Europe. During rehearsal days, you can stand in the back for free and watch orchestras prepare. The music is raw and real. Musicians tune. A conductor stops to fix three bars. You witness genius before it\'s polished.\",im:\"It\'s 1870. An orchestra rehearses Brahms for the first time. The composer watches from a balcony. The conductor stops. They try again. The notes find each other.\",t:\"Musikvereinplatz 1, Landstrasse. Free rehearsal admission (stand only). Call ahead to confirm rehearsal schedule: +43-1-505-81-40. U-Bahn U1 Karlsplatz. Bring a notebook. Arrive early for standing spots.",c:["free_museum", "history_big"],r:"g",nn:"Musikverein Free Rehearsal Spying Straße — Landstrasse",ns:"Gassen voller Leben—wo echt Köln/München/etc. ist.",nst:"Die Straße ist lebendig. Läden, Restaurants, Menschen überall. Du wandelst und absorberst Atmosphäre. Es ist Stadt pur.",nt:"Kostenlos spazieren. Restaurants €10-30. Cafés €3-7. Beste Zeit: Wochenende. Shopping und Essen zusammen. Sehr authentisch."},
  {id:76,n:"Zentralfriedhof Famous Graves — Simmering",a:"Simmering",v:["history", "quiet"],d:76,s:"Where Beethoven, Mozart, and Brahms rest in stone",st:"Vienna\'s Central Cemetery is a city of the dead. 3 million graves across 240 acres. Follow maps to find Beethoven\'s monument, Mozart\'s cenotaph (his real body is lost), and Brahms\'s tomb. At dusk, you\'re alone with history. The graves are elaborate—some look like churches.",im:"It\'s 1888. The gates open. A funeral procession winds through marble streets. Musicians carry a coffin. The ground is frozen. The city of the dead grows larger.",t:"Vienna\'s Central Cemetery is a city of the dead. 3 million graves across 240 acres. Follow maps to find Beethoven\'s monument, Mozart\'s cenotaph (his real body is lost), and Brahms\'s tomb. At dusk, you\'re alone with history. The graves are elaborate—some look like churches.\",im:\"It\'s 1888. The gates open. A funeral procession winds through marble streets. Musicians carry a coffin. The ground is frozen. The city of the dead grows larger.\",t:\"Zentralfriedhof, Simmeringer Hauptstrasse 232, Simmering (Tram 71). €Free. Maps at entrance. Bring comfortable shoes. Go at 4pm—golden light hits the monuments. It\'s not scary; it\'s peaceful.",c:["history_big", "architecture"],r:"g",nn:"Zentralfriedhof Famous Graves — Simmering",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:77,n:"Narrenturm Medical Museum Oddities — Alsergrund",a:"Alsergrund",v:["weird", "history"],d:77,s:"A 19th-century tower of human oddities preserved in jars",st:"Inside this tower are deformed skeletons, surgical instruments that look like torture devices, wax models of diseases, tumors in bottles. Medicine before anesthesia. Surgery as horror. The Narrenturm was a psychiatric asylum tower—now it\'s a museum of anatomical nightmares. Doctors built this to understand the body. Instead, it terrifies.",im:"It\'s 1842. A doctor holds a deformed skull. \'Science,\' he says. He places it in a glass jar. Future generations will see it. They will shudder.",t:"Inside this tower are deformed skeletons, surgical instruments that look like torture devices, wax models of diseases, tumors in bottles. Medicine before anesthesia. Surgery as horror. The Narrenturm was a psychiatric asylum tower—now it\'s a museum of anatomical nightmares. Doctors built this to understand the body. Instead, it terrifies.\",im:\"It\'s 1842. A doctor holds a deformed skull. \'Science,\' he says. He places it in a glass jar. Future generations will see it. They will shudder.\",t:\"Spitalgasse 2, Alsergrund (near Medical University). €5. Small, intense. Only 30 visitors at a time. Go early. It\'s claustrophobic and brilliant.",c:["history_big", "scary"],r:"g",nn:"Narrenturm Medical Museum Oddities Museum — Alsergrund",ns:"Museum mit Sammlungen und Geschichte.",nst:"Du betrittst das Museum und siehst Kunstwerke, Artefakte, alte Dinge. Jedes Objekt erzählt eine Geschichte. Es ist Vergangenheit bewahrt für Gegenwart.",nt:"€6-12 Eintritt. Täglich 10-18 Uhr (Montag oft geschlossen). Audioguide kostenlos oder €3. Café im Gebäude. Plan 2 Stunden."},
  {id:78,n:"Third Man Sewer Tour Location — Innere Stadt",a:"Innere Stadt",v:["history", "hidden"],d:78,s:"Where the Third Man film\'s climax actually happens",st:"The movie ends with a chase through Vienna\'s sewers. That\'s real—the sewers are actually used in the film. You can visit the Hauptkanalisation (main sewer system). Some tours take you down where Orson Welles ran. The water echoes. Rats scatter. It smells like 1949.",im:"It\'s 1949. A man in a white suit runs through the dark. Water splashes. The camera follows. Vienna\'s guts become cinema.",t:"The movie ends with a chase through Vienna\'s sewers. That\'s real—the sewers are actually used in the film. You can visit the Hauptkanalisation (main sewer system). Some tours take you down where Orson Welles ran. The water echoes. Rats scatter. It smells like 1949.\",im:\"It\'s 1949. A man in a white suit runs through the dark. Water splashes. The camera follows. Vienna\'s guts become cinema.\",t:\"Tours depart from Karlsplatz U-Bahn station. €20. Book ahead. Wear waterproof shoes. The sewers are real, the history is real, the film magic lingers.",c:["history_big"],r:"g",nn:"Third Man Sewer Tour Location — Innere Stadt",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:79,n:"Palmenhaus Botanical Bar — Burggarten",a:"Innere Stadt",v:["beautiful", "local"],d:79,s:"A 19th-century greenhouse where you drink coffee among tropical plants",st:"Built for the Austro-Hungarian Empire, this iron-and-glass greenhouse holds 3,000 plants. Palm trees rise 12 meters. Ferns drip moisture. You sit at a café table, coffee in hand, surrounded by a jungle. The glass roof is steamed. Outside is winter Vienna. Inside is Borneo.",im:"It\'s 1907. An Empress walks here in the morning mist. A fern touches her dress. She remembers colonial lands she\'ll never see.",t:"Built for the Austro-Hungarian Empire, this iron-and-glass greenhouse holds 3,000 plants. Palm trees rise 12 meters. Ferns drip moisture. You sit at a café table, coffee in hand, surrounded by a jungle. The glass roof is steamed. Outside is winter Vienna. Inside is Borneo.\",im:\"It\'s 1907. An Empress walks here in the morning mist. A fern touches her dress. She remembers colonial lands she\'ll never see.\",t:\"Burggarten, Hofburg entrance, Innere Stadt (U2 Karlsplatz). €7 café entry. Coffee €3.50. Open daily 10am-6pm. Go in winter—the contrast is magical.",c:["parks", "local_only"],r:"g",nn:"Palmenhaus Botanical Bar Garten — Burggarten",ns:"Botanisch oder geometrisch—Natur als Kunst.",nst:"Der Garten ist gepflanzt mit Kunst. Blumen überall, Fountains, Statuen. Im Sommer Blüten. Du wandelst wie in Gemälde.",nt:"€5-10 Eintritt. Täglich 9-18 Uhr (Winter kürzer). Beste Zeit: Frühling/Sommer wenn Blüten. Audioguide oft kostenlos. Café im Garten."},
  {id:80,n:"Prater Hauptallee Chestnut Avenue — Leopoldstadt",a:"Leopoldstadt",v:["beautiful", "history"],d:80,s:"A 5km tree-tunnel where emperors rode and lovers walked",st:"The Prater\'s main avenue is lined with 4,000 chestnut trees. In spring, white blossoms hang like snow. In summer, it\'s a cathedral of green. You can rent bikes and ride the whole length, or walk and get lost. The avenue was cleared for hunts centuries ago. Now it\'s peaceful.",im:"It\'s 1770. The Emperor rides here on horseback. Citizens clear the path. The trees form a green tunnel to infinity.",t:"The Prater\'s main avenue is lined with 4,000 chestnut trees. In spring, white blossoms hang like snow. In summer, it\'s a cathedral of green. You can rent bikes and ride the whole length, or walk and get lost. The avenue was cleared for hunts centuries ago. Now it\'s peaceful.\",im:\"It\'s 1770. The Emperor rides here on horseback. Citizens clear the path. The trees form a green tunnel to infinity.\",t:\"Prater Hauptallee, Leopoldstadt. Free. Bike rentals nearby (€5 per hour). Go in May for the blossoms. At dawn, you\'ll have it to yourself.",c:["parks", "nature"],r:"g",nn:"Prater Hauptallee Chestnut Avenue — Leopoldstadt",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:81,n:"Gasometer Converted Gas Tanks — Simmering",a:"Simmering",v:["weird", "architecture"],d:81,s:"Four 1950s gas tanks turned into residential apartments with a city inside",st:"Imagine a brick cylinder 70 meters tall. Now imagine it\'s hollowed out and filled with apartments, offices, a library, a kindergarten, a shopping center. The Gasometer were industrial relics. Artists imagined them as vertical cities. Now 5,000 people live and work inside four towers. The architecture is radical.",im:"It\'s 1995. The first resident moves into the hollow cylinder. Above, Vienna\'s sky. Around, curved walls that have held gas for 50 years. Now they hold lives.",t:"Imagine a brick cylinder 70 meters tall. Now imagine it\'s hollowed out and filled with apartments, offices, a library, a kindergarten, a shopping center. The Gasometer were industrial relics. Artists imagined them as vertical cities. Now 5,000 people live and work inside four towers. The architecture is radical.\",im:\"It\'s 1995. The first resident moves into the hollow cylinder. Above, Vienna\'s sky. Around, curved walls that have held gas for 50 years. Now they hold lives.\",t:\"Guglgasse 6, Simmering (U3 Gasometer). Free to walk around. Some spaces have cafés. Go at night—the exteriors light up like alien spaceships.",c:["architecture", "local_only"],r:"g",nn:"Gasometer Converted Gas Tanks — Simmering",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:82,n:"Karl-Marx-Hof Longest Building in the World — Leopoldstadt",a:"Leopoldstadt",v:["architecture", "history"],d:82,s:"A 1,100-meter apartment block—socialism in one building",st:"Completed in 1930, Karl-Marx-Hof is 1.1 kilometers long. It was social housing—communal spaces, courtyards, a cooperative store inside. The design was revolutionary. Now it\'s a UNESCO site. The interior courtyards connect like a village. You can walk the entire length without leaving shelter.",im:"It\'s 1930. The ribbon is cut. Workers and their families move into the future. This building is their promise.",t:"Completed in 1930, Karl-Marx-Hof is 1.1 kilometers long. It was social housing—communal spaces, courtyards, a cooperative store inside. The design was revolutionary. Now it\'s a UNESCO site. The interior courtyards connect like a village. You can walk the entire length without leaving shelter.\",im:\"It\'s 1930. The ribbon is cut. Workers and their families move into the future. This building is their promise.\",t:\"Stromstrasse 35, Leopoldstadt (U6 Floridsdorf). Free to walk through courtyards. The scale is overwhelming. Bring a camera.",c:["architecture", "history_big"],r:"g",nn:"Karl-Marx-Hof Longest Building in the World — Leopoldstadt",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:83,n:"Sigmund Freud\'s Neighborhood Walks — Alsergrund",a:"Alsergrund",v:["history", "quiet"],d:83,s:"Where Freud walked and the unconscious was invented",st:"Freud lived and worked in Alsergrund for nearly 50 years. His apartment is a museum, but more interesting is walking the neighborhood. He walked these streets daily, thinking. The Danube Canal flows nearby. Coffee houses where he sat still exist. You\'re walking where the 20th century\'s most powerful ideas were born.",im:"It\'s 1895. A man walks slowly, thinking about dreams. Vienna surrounds him. Ideas form that will reshape how humans understand themselves.",t:"Freud lived and worked in Alsergrund for nearly 50 years. His apartment is a museum, but more interesting is walking the neighborhood. He walked these streets daily, thinking. The Danube Canal flows nearby. Coffee houses where he sat still exist. You\'re walking where the 20th century\'s most powerful ideas were born.\",im:\"It\'s 1895. A man walks slowly, thinking about dreams. Vienna surrounds him. Ideas form that will reshape how humans understand themselves.\",t:\"Freud\'s apartment at Berggasse 19, Alsergrund (U6 Alserstrasse). €15. Neighborhood walks are free—follow a map from the apartment and explore nearby coffee houses.",c:["history_big", "local_only"],r:"g",nn:"Sigmund Freud\'s Neighborhood Walks Viertel — Alsergrund",ns:"Ein Dorf in Stadt—wo normale Menschen leben.",nst:"Das Viertel ist Wohn-Platz mit Läden und Restaurants. Nicht touristisch, echte Leute. Du bist Fremder aber willkommen. Es ist Gemeinschaft.",nt:"Kostenlos spazieren. Restaurants €8-20. Cafés €2-5. Sehr günstig und authentisch. Nicht schön aber real. U-Bahn oder Tram nötig oft."},
  {id:84,n:"Hernals Turkish Market Neighborhood Soul — Währing",a:"Währing",v:["local", "hidden"],d:84,s:"A working-class market where Turkish, Kurdish, Arab, and Viennese cultures blend daily",st:"Hernals is Vienna\'s multicultural heart. The market sprawls—spice vendors, meat hanging in windows, Arabic coffee being made, children playing in multiple languages. It\'s not touristic. Locals shop here for real food. The energy is raw and alive. This is modern Vienna that guidebooks ignore.",im:"It\'s 2010. Three generations of immigrants shop side-by-side. The market speaks ten languages. The city evolves silently here.",t:"Hernals is Vienna\'s multicultural heart. The market sprawls—spice vendors, meat hanging in windows, Arabic coffee being made, children playing in multiple languages. It\'s not touristic. Locals shop here for real food. The energy is raw and alive. This is modern Vienna that guidebooks ignore.\",im:\"It\'s 2010. Three generations of immigrants shop side-by-side. The market speaks ten languages. The city evolves silently here.\",t:\"Währinger Strasse, Währing (Tram 9). Free to walk. Food is cheap (€2-5 per item). Go on Saturday morning when it\'s most crowded. Bring cash.",c:["local_only"],r:"g",nn:"Hernals Turkish Market Neighborhood Soul Markt — Währing",ns:"Täglich Farbe und Leben—wo Stadt isst.",nst:"Der Markt ist täglich oder wöchentlich. Obst, Gemüse, Blumen, Käse. Bauern schreien. Menschen bummel. Es ist Farbe und Lärm.",nt:"Kostenlos spazieren. Produkte kosten normal (Obst €2-5, Käse €10-15). Beste Zeit: Morgen 8-12 Uhr. Samstag voller Leute. Sehr authentisch."},
  {id:85,n:"Wilhelminenberg Castle Viewpoint — Währing",a:"Währing",v:["beautiful", "history"],d:85,s:"A suburban castle with a view of the entire city and the Danube",st:"This neo-Gothic castle sits on a hill outside the city center. Walk through a forest to reach it. The castle is now a school, but the grounds are open. The terrace offers a 360-degree view—Vienna spreads in all directions, the Danube winds through it, the forest surrounds everything. It feels like you\'ve escaped the city from within the city.",im:"It\'s 1880. A nobleman builds a castle outside the growing city. He doesn\'t know that one day, a million people will live below him. He just wants the view.",t:"This neo-Gothic castle sits on a hill outside the city center. Walk through a forest to reach it. The castle is now a school, but the grounds are open. The terrace offers a 360-degree view—Vienna spreads in all directions, the Danube winds through it, the forest surrounds everything. It feels like you\'ve escaped the city from within the city.\",im:\"It\'s 1880. A nobleman builds a castle outside the growing city. He doesn\'t know that one day, a million people will live below him. He just wants the view.\",t:\"Savoyenstrasse 2, Währing (Bus 40A or walk from Tram 37). €Free. Café on terrace. Go at sunset. The light turns everything golden.",c:["parks", "architecture"],r:"g",nn:"Wilhelminenberg Castle Viewpoint Schloss — Währing",ns:"Mittelalter-Mauern und Geschichte—wo Ritter lebten.",nst:"Das Schloss sitzt auf Berg oder in Stadt. Alte Mauern, Türme, enge Gassen. Du siehst Räume wo Adel lebte. Es ist vergangenheit.",nt:"€6-12 Eintritt. Täglich 9-17 Uhr (Sommer bis 18 Uhr). Führungen gelegentlich +€3. Aussicht oft spektakulär. Plan 1-2 Stunden."},
  {id:86,n:"Schwarzenbergplatz Soviet Memorial — Innere Stadt",a:"Innere Stadt",v:["history"],d:86,s:"A massive stone monument to Soviet soldiers, still standing in Vienna\'s elegant square",st:"In 1945, Soviet troops liberated Vienna. The Nazis were gone. But the Soviets stayed. This memorial was built to honor them—a 12-meter obelisk of red granite in Schwarzenbergplatz. Vienna is elegant here. But the Soviet memorial is imposing, straight, unsmiling. It\'s a reminder that freedom came with occupation.",im:"It\'s 1945. The Nazis flee. Soviet tanks roll into Vienna. A soldier plants his flag. He is a liberator and an occupier. History doesn\'t have simple endings.",t:"In 1945, Soviet troops liberated Vienna. The Nazis were gone. But the Soviets stayed. This memorial was built to honor them—a 12-meter obelisk of red granite in Schwarzenbergplatz. Vienna is elegant here. But the Soviet memorial is imposing, straight, unsmiling. It\'s a reminder that freedom came with occupation.\",im:\"It\'s 1945. The Nazis flee. Soviet tanks roll into Vienna. A soldier plants his flag. He is a liberator and an occupier. History doesn\'t have simple endings.\",t:\"Schwarzenbergplatz, Innere Stadt (U1 Karlsplatz). Free. The square is beautiful at night when fountains light up around the monument.",c:["history_big"],r:"g",nn:"Schwarzenbergplatz Soviet Memorial Platz — Innere Stadt",ns:"Zentral und belebt—Herz der Stadt.",nst:"Der Platz ist pulsierend. Brunnen, Restaurants, Menschen von überall. Es ist wo City trifft. Du gehörst sofort dazu.",nt:"Kostenlos spazieren. Restaurants €12-25. Cafés €3-6. Beste Zeit: Abend wenn Lichter an. Märkte gelegentlich auf Platz. Sehr touristisch aber authentisch."},
  {id:87,n:"Augarten Porcelain Factory Tour — Leopoldstadt",a:"Leopoldstadt",v:["history", "architecture"],d:87,s:"Where Vienna\'s imperial porcelain has been hand-painted for 300 years",st:"The Augarten Porcelain Factory is one of Europe\'s oldest. Artisans still hand-paint intricate designs on white porcelain. You can watch them work—brushes moving with impossible precision. The designs are Baroque, delicate, impossible to mass-produce. Each piece is a small artwork that takes hours.",im:"It\'s 1718. A craftsman dips his brush in blue paint. The Emperor will eat from this plate. He paints a flower. The flowers will last 300 years.",t:"The Augarten Porcelain Factory is one of Europe\'s oldest. Artisans still hand-paint intricate designs on white porcelain. You can watch them work—brushes moving with impossible precision. The designs are Baroque, delicate, impossible to mass-produce. Each piece is a small artwork that takes hours.\",im:\"It\'s 1718. A craftsman dips his brush in blue paint. The Emperor will eat from this plate. He paints a flower. The flowers will last 300 years.\",t:\"Obere Augartenstrasse 1, Leopoldstadt (Tram 2). €Free to watch (shop items €20-500). Tours available. Go Wednesday or Thursday when production happens.",c:["architecture", "history_big"],r:"g",nn:"Augarten Porcelain Factory Tour Garten — Leopoldstadt",ns:"Botanisch oder geometrisch—Natur als Kunst.",nst:"Der Garten ist gepflanzt mit Kunst. Blumen überall, Fountains, Statuen. Im Sommer Blüten. Du wandelst wie in Gemälde.",nt:"€5-10 Eintritt. Täglich 9-18 Uhr (Winter kürzer). Beste Zeit: Frühling/Sommer wenn Blüten. Audioguide oft kostenlos. Café im Garten."},
  {id:88,n:"Vienna Woods Stadtwanderweg 1 Trail — Multiple districts",a:"Döbling",v:["nature", "beautiful"],d:88,s:"A 21km circular hike through the forest that Vienna never leaves",st:"The Vienna Woods (Wienerwald) surround the city. Stadtwanderweg 1 is the most famous trail—it loops around the suburbs. You walk through beech forests, past vineyards, through villages. The city is always in the distance. You\'re hiking but never far from civilization. The Austrian Alps begin here.",im:"It\'s 1880. A Viennese family walks this trail on a Sunday. The city hums in the distance. They are in nature but the smell of the city never quite leaves.",t:"The Vienna Woods (Wienerwald) surround the city. Stadtwanderweg 1 is the most famous trail—it loops around the suburbs. You walk through beech forests, past vineyards, through villages. The city is always in the distance. You\'re hiking but never far from civilization. The Austrian Alps begin here.\",im:\"It\'s 1880. A Viennese family walks this trail on a Sunday. The city hums in the distance. They are in nature but the smell of the city never quite leaves.\",t:\"Multiple trailheads: start near U4 Heiligenstadt or follow the brown hiking signs. €Free. 6-8 hours walking. Bring water and food. Multiple cafés along the way.",c:["parks", "nature"],r:"g",nn:"Vienna Woods Stadtwanderweg 1 Trail Viertel — Multiple districts",ns:"Ein Dorf in Stadt—wo normale Menschen leben.",nst:"Das Viertel ist Wohn-Platz mit Läden und Restaurants. Nicht touristisch, echte Leute. Du bist Fremder aber willkommen. Es ist Gemeinschaft.",nt:"Kostenlos spazieren. Restaurants €8-20. Cafés €2-5. Sehr günstig und authentisch. Nicht schön aber real. U-Bahn oder Tram nötig oft."},
  {id:89,n:"Lobau Wetlands Danube Nature Reserve — Donaustadt",a:"Donaustadt",v:["nature", "hidden"],d:89,s:"A UNESCO biosphere where the Danube floods into marshes and becomes wild",st:"The Danube floods periodically. The Lobau is a sprawling wetland where that flood creates a temporary habitat. Herons, egrets, kingfishers, otters. Wooden boardwalks let you walk above the water without disturbing it. In spring, it\'s a chaos of nesting birds. In autumn, migration. The city feels very far away.",im:"It\'s 1870. Water rises. The Danube breaks free. The city built walls, but here the water still remembers how to flood.",t:"The Danube floods periodically. The Lobau is a sprawling wetland where that flood creates a temporary habitat. Herons, egrets, kingfishers, otters. Wooden boardwalks let you walk above the water without disturbing it. In spring, it\'s a chaos of nesting birds. In autumn, migration. The city feels very far away.\",im:\"It\'s 1870. Water rises. The Danube breaks free. The city built walls, but here the water still remembers how to flood.\",t:\"Lobau, Donaustadt (U1 Grosse Pöchlarn plus walk, or boat from Reichsbrücke). €Free boardwalks. Go with binoculars. May is best for birds.",c:["parks", "nature"],r:"g",nn:"Lobau Wetlands Danube Nature Reserve — Donaustadt",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:90,n:"Nussdorf Wine Village Historic Vineyard — Döbling",a:"Döbling",v:["history", "beautiful"],d:90,s:"Where Vienna\'s last vineyards survive and wine taverns have stood for centuries",st:"Vienna was once a major wine region. The vineyards vanished. But in Nussdorf, on hillsides north of the city, vines still grow. Historic wine taverns (Buschenschanks) open seasonally. You drink new wine, eat traditional foods, watch the city below. It feels like a village from another century.",im:"It\'s 1800. A vintner tends his vines. Vienna spreads below. Grapes will become wine. Wine will become tradition.",t:"Vienna was once a major wine region. The vineyards vanished. But in Nussdorf, on hillsides north of the city, vines still grow. Historic wine taverns (Buschenschanks) open seasonally. You drink new wine, eat traditional foods, watch the city below. It feels like a village from another century.\",im:\"It\'s 1800. A vintner tends his vines. Vienna spreads below. Grapes will become wine. Wine will become tradition.\",t:\"Nussdorf, Döbling (Tram 37 or Bus 37A to Krapfenwaldl). Wine taverns open September-November. €10-15 per bottle. Traditional food €5-12.",c:["history_big", "local_only"],r:"g",nn:"Nussdorf Wine Village Historic Vineyard — Döbling",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:91,n:"Am Steinhof Otto Wagner Church — Penzing",a:"Penzing",v:["architecture", "history"],d:91,s:"A modernist masterpiece built for a psychiatric hospital in 1907",st:"Otto Wagner designed this church for Am Steinhof, an asylum built outside the city. The church is pure Art Nouveau—geometric, clean lines, copper roof gone green with age. The interiors are minimalist by 1907 standards. It\'s set in a sprawling complex of pavilions designed to treat the mentally ill with radical compassion.",im:"It\'s 1907. Wagner believes architecture can heal. He builds a church without ornament. The space itself is the therapy.",t:"Otto Wagner designed this church for Am Steinhof, an asylum built outside the city. The church is pure Art Nouveau—geometric, clean lines, copper roof gone green with age. The interiors are minimalist by 1907 standards. It\'s set in a sprawling complex of pavilions designed to treat the mentally ill with radical compassion.\",im:\"It\'s 1907. Wagner believes architecture can heal. He builds a church without ornament. The space itself is the therapy.\",t:\"Baumgartner Höhe 1, Penzing (Bus 48A or U6 Gumpendorfer Strasse). €8 entrance. Tours available. The entire complex is worth exploring. Go mid-morning for soft light.",c:["architecture", "history_big"],r:"g",nn:"Am Steinhof Otto Wagner Church — Penzing",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:92,n:"Wiener Werkbundsiedlung Modernist Houses — Penzing",a:"Penzing",v:["architecture", "beautiful"],d:92,s:"A 1932 experimental housing estate where Vienna\'s greatest architects each designed one house",st:"The Werkbund Siedlung is an open-air museum of modernism. Each architect got a single-family plot. Some houses are stark cubes. Others have curves. Some are pink, some are white. Walking through it, you see 20 different visions of the future, all built at once. The neighborhood is lived-in—people actually live in these modernist dreams.",im:"It\'s 1932. Architects gather. \'Show us the future,\' the city says. Each builds his vision. The future looks like thirty different futures.",t:"The Werkbund Siedlung is an open-air museum of modernism. Each architect got a single-family plot. Some houses are stark cubes. Others have curves. Some are pink, some are white. Walking through it, you see 20 different visions of the future, all built at once. The neighborhood is lived-in—people actually live in these modernist dreams.\",im:\"It\'s 1932. Architects gather. \'Show us the future,\' the city says. Each builds his vision. The future looks like thirty different futures.\",t:\"Wörkstrasse-area, Penzing (U6 Gumpendorfer Strasse, then tram/walk). €Free to walk around. Self-guided tour maps available online. Go on a Saturday when residents are out.",c:["architecture"],r:"g",nn:"Wiener Werkbundsiedlung Modernist Houses — Penzing",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:93,n:"Café Hawelka Oldest Bohemian Café — Innere Stadt",a:"Innere Stadt",v:["local", "history"],d:93,s:"A 1930s café where artists, writers, and rebels still gather like it\'s still the revolution",st:"Hawelka has been operating since 1939. The interior is unchanged—dark wood, smoke-stained walls (though smoking is now limited), newspapers everywhere. This is where Vienna\'s artistic underground met during the Cold War. Writers, painters, musicians. Now it\'s a tourist spot, but arrive early and you\'ll catch the actual locals.",im:"It\'s 1968. A poet sits in the corner. He\'s writing revolution. The café is full of revolution. Austria is quiet. The revolution is happening here.",t:"Hawelka has been operating since 1939. The interior is unchanged—dark wood, smoke-stained walls (though smoking is now limited), newspapers everywhere. This is where Vienna\'s artistic underground met during the Cold War. Writers, painters, musicians. Now it\'s a tourist spot, but arrive early and you\'ll catch the actual locals.\",im:\"It\'s 1968. A poet sits in the corner. He\'s writing revolution. The café is full of revolution. Austria is quiet. The revolution is happening here.\",t:\"Dorotheergasse 6, Innere Stadt. Coffee €3, pastries €5. Closed Tuesday. Arrive 9am for the real crowd. The bathrooms are famously dirty—it\'s part of the charm.",c:["history_big", "local_only"],r:"g",nn:"Café Hawelka Oldest Bohemian Café — Innere Stadt",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:94,n:"Karlsplatz Underground Passages Labyrinth — Wieden",a:"Wieden",v:["hidden", "architecture"],d:94,s:"A network of connected passages under Karlsplatz built for the 1883 World Expo",st:"Under Karlsplatz is a complex system of archways, tunnels, and underground chambers. Some connect train stations. Some go nowhere—they were built for Otto Wagner\'s original metro vision. You can walk through them if you know where to enter. It feels like exploring a secret Vienna buried and forgotten.",im:"It\'s 1883. Engineers dig. They build passages for a vision of the future. Some passages are used for 140 years. Some are forgotten immediately. Now explorers find them and feel like archaeologists.",t:"Under Karlsplatz is a complex system of archways, tunnels, and underground chambers. Some connect train stations. Some go nowhere—they were built for Otto Wagner\'s original metro vision. You can walk through them if you know where to enter. It feels like exploring a secret Vienna buried and forgotten.\",im:\"It\'s 1883. Engineers dig. They build passages for a vision of the future. Some passages are used for 140 years. Some are forgotten immediately. Now explorers find them and feel like archaeologists.\",t:\"Karlsplatz U-Bahn station, Wieden. Some passages are accessible from station passages. Not officially a tour site—explore carefully. Bring a flashlight.",c:["architecture", "history_big"],r:"g",nn:"Karlsplatz Underground Passages Labyrinth Platz — Wieden",ns:"Zentral und belebt—Herz der Stadt.",nst:"Der Platz ist pulsierend. Brunnen, Restaurants, Menschen von überall. Es ist wo City trifft. Du gehörst sofort dazu.",nt:"Kostenlos spazieren. Restaurants €12-25. Cafés €3-6. Beste Zeit: Abend wenn Lichter an. Märkte gelegentlich auf Platz. Sehr touristisch aber authentisch."},
  {id:95,n:"Spittelberg Quarter Cobblestone Village — Neubau",a:"Neubau",v:["beautiful", "local"],d:95,s:"A narrow cobblestone neighborhood where time moves slower",st:"Spittelberg is Vienna\'s surviving village within the city. Narrow lanes, small houses, galleries in basements, wine shops on corners. On Friday and Saturday nights, it transforms—galleries open, wine bars fill, the streets become a street fair. But weekdays, it\'s quiet. Locals walk dogs. Artists drink coffee in corners.",im:"It\'s 1850. A village on Vienna\'s edge. In 170 years, the city will grow around it. The village will survive.",t:"Spittelberg is Vienna\'s surviving village within the city. Narrow lanes, small houses, galleries in basements, wine shops on corners. On Friday and Saturday nights, it transforms—galleries open, wine bars fill, the streets become a street fair. But weekdays, it\'s quiet. Locals walk dogs. Artists drink coffee in corners.\",im:\"It\'s 1850. A village on Vienna\'s edge. In 170 years, the city will grow around it. The village will survive.\",t:\"Spittelbergergasse, Neubau (U3 Zieglergasse or walk from Museumsquartier). Free. Wine €5-10 per glass. Open daily.",c:["local_only", "architecture"],r:"g",nn:"Spittelberg Quarter Cobblestone Village — Neubau",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:96,n:"Bermuda Triangle Nightlife District Core — Innere Stadt",a:"Innere Stadt",v:["local", "night"],d:96,s:"A three-block area that becomes Vienna\'s deepest nightlife after midnight",st:"The Bermuda Triangle is bounded by three streets—Rabensteig, Salzgries, Judengasse. By day, it\'s quiet bars and small galleries. By midnight, it erupts. Students, locals, tourists spill into the streets. Bars stay open until 6am. The energy is relentless. By 4am, it\'s pure chaos and joy.",im:"It\'s 3am. The city sleeps. The Triangle doesn\'t. Bass shakes buildings. A thousand conversations overlap. This is Vienna that doesn\'t sleep.",t:"The Bermuda Triangle is bounded by three streets—Rabensteig, Salzgries, Judengasse. By day, it\'s quiet bars and small galleries. By midnight, it erupts. Students, locals, tourists spill into the streets. Bars stay open until 6am. The energy is relentless. By 4am, it\'s pure chaos and joy.\",im:\"It\'s 3am. The city sleeps. The Triangle doesn\'t. Bass shakes buildings. A thousand conversations overlap. This is Vienna that doesn\'t sleep.\",t:\"Innere Stadt, near Schwedenplatz. Free to walk. Bars €5-8 per drink. Go after midnight. Go with friends.",c:["local_only"],r:"g",nn:"Bermuda Triangle Nightlife District Core Viertel — Innere Stadt",ns:"Ein Dorf in Stadt—wo normale Menschen leben.",nst:"Das Viertel ist Wohn-Platz mit Läden und Restaurants. Nicht touristisch, echte Leute. Du bist Fremder aber willkommen. Es ist Gemeinschaft.",nt:"Kostenlos spazieren. Restaurants €8-20. Cafés €2-5. Sehr günstig und authentisch. Nicht schön aber real. U-Bahn oder Tram nötig oft."},
  {id:97,n:"Volksgarten Rose Garden Secret — Innere Stadt",a:"Innere Stadt",v:["beautiful", "quiet"],d:97,s:"A garden of 3,000 rose varieties that locals keep secret",st:"The Volksgarten\'s rose garden is one of Europe\'s largest. In June and July, thousands of roses bloom—colors, scents, varieties tourists never see. It\'s part of the Volksgarten park, which most people hurry through. But here, you can sit for hours among flowers. Austrian composers wrote about this place.",im:"It\'s 1900. A composer sits on a bench. Roses bloom. He writes. The music comes from the colors.",t:"The Volksgarten\'s rose garden is one of Europe\'s largest. In June and July, thousands of roses bloom—colors, scents, varieties tourists never see. It\'s part of the Volksgarten park, which most people hurry through. But here, you can sit for hours among flowers. Austrian composers wrote about this place.\",im:\"It\'s 1900. A composer sits on a bench. Roses bloom. He writes. The music comes from the colors.\",t:\"Volksgarten, Innere Stadt (U2 Volksgarten U-Bahn stop). €Free. Open daily 6am-sunset. Go June or July. Bring a book.",c:["parks", "beautiful"],r:"g",nn:"Volksgarten Rose Garden Secret Garten — Innere Stadt",ns:"Botanisch oder geometrisch—Natur als Kunst.",nst:"Der Garten ist gepflanzt mit Kunst. Blumen überall, Fountains, Statuen. Im Sommer Blüten. Du wandelst wie in Gemälde.",nt:"€5-10 Eintritt. Täglich 9-18 Uhr (Winter kürzer). Beste Zeit: Frühling/Sommer wenn Blüten. Audioguide oft kostenlos. Café im Garten."},
  {id:98,n:"Josephinum Wax Anatomical Models — Alsergrund",a:"Alsergrund",v:["weird", "history"],d:98,s:"1780s wax models of internal organs so detailed medical students thought they were real",st:"In the 1780s, anatomists couldn\'t perform public dissections during classes. So they commissioned Italian artists to create life-size wax models of human bodies opened up. Organs, muscles, bones—in perfect wax detail. Medical students studied these models. They\'re still here. Staring at them now, they\'re beautiful and horrifying.",im:"It\'s 1785. A student walks into the room. The wax figures are arranged like dissections. He steps closer. His hands shake. This is how he\'ll learn anatomy without a body.",t:"In the 1780s, anatomists couldn\'t perform public dissections during classes. So they commissioned Italian artists to create life-size wax models of human bodies opened up. Organs, muscles, bones—in perfect wax detail. Medical students studied these models. They\'re still here. Staring at them now, they\'re beautiful and horrifying.\",im:\"It\'s 1785. A student walks into the room. The wax figures are arranged like dissections. He steps closer. His hands shake. This is how he\'ll learn anatomy without a body.\",t:\"Josephinum, Währinger Strasse 25, Alsergrund (U6 Alserstrasse). €5. Open Tuesday-Thursday, appointment preferred. It\'s small and intense.",c:["history_big", "scary"],r:"g",nn:"Josephinum Wax Anatomical Models — Alsergrund",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:99,n:"Arsenal Military History Museum — Landstrasse",a:"Landstrasse",v:["history"],d:99,s:"A massive fortress-museum of weapons, uniforms, and Habsburg military power",st:"The Arsenal is a fortress-within-Vienna. Built in 1856 as a weapons factory, it\'s now a museum. Cannons, tanks, small arms, uniforms from every era. The building itself is military architecture—walls meant to resist siege. Inside, you walk through the Austro-Hungarian empire\'s military dreams and nightmares.",im:"It\'s 1900. Soldiers parade with rifles. The Empire is vast. The weapons are ready. No one knows this will all end in 1918.",t:"The Arsenal is a fortress-within-Vienna. Built in 1856 as a weapons factory, it\'s now a museum. Cannons, tanks, small arms, uniforms from every era. The building itself is military architecture—walls meant to resist siege. Inside, you walk through the Austro-Hungarian empire\'s military dreams and nightmares.\",im:\"It\'s 1900. Soldiers parade with rifles. The Empire is vast. The weapons are ready. No one knows this will all end in 1918.\",t:\"Ghegastrasse 4, Landstrasse (U3 Schlachthausgasse). €12. Massive collection. Bring 3 hours. Go mid-morning when it\'s quietest.",c:["history_big"],r:"g",nn:"Arsenal Military History Museum Museum — Landstrasse",ns:"Museum mit Sammlungen und Geschichte.",nst:"Du betrittst das Museum und siehst Kunstwerke, Artefakte, alte Dinge. Jedes Objekt erzählt eine Geschichte. Es ist Vergangenheit bewahrt für Gegenwart.",nt:"€6-12 Eintritt. Täglich 10-18 Uhr (Montag oft geschlossen). Audioguide kostenlos oder €3. Café im Gebäude. Plan 2 Stunden."},
  {id:100,n:"Heeresbäckerei Abandoned Military Bakery — Penzing",a:"Penzing",v:["hidden", "abandoned"],d:100,s:"A sprawling WWI military bakery complex, partially abandoned and slowly being reclaimed",st:"The Austro-Hungarian army fed its soldiers with bread baked here. The complex has ovens, barracks, storage rooms. After the wars, it was repurposed, then slowly abandoned. Parts are now creative spaces. Parts are empty. Walls are tagged. The building remembers when it fed millions.",im:"It\'s 1916. A soldier enters the bakery. It smells of bread. His gun is heavy. Tomorrow he returns to war. Tonight he eats.",t:"The Austro-Hungarian army fed its soldiers with bread baked here. The complex has ovens, barracks, storage rooms. After the wars, it was repurposed, then slowly abandoned. Parts are now creative spaces. Parts are empty. Walls are tagged. The building remembers when it fed millions.\",im:\"It\'s 1916. A soldier enters the bakery. It smells of bread. His gun is heavy. Tomorrow he returns to war. Tonight he eats.\",t:\"Maygasse, Penzing (Tram 49 to Maygasse). €Free to walk around. Parts are private/off-limits. Explore carefully. It\'s being slowly gentrified.",c:["history_big", "local_only"],r:"g",nn:"Heeresbäckerei Abandoned Military Bakery — Penzing",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:101,n:"Friedhof der Namenlosen Cemetery of the Nameless — Landstrasse",a:"Landstrasse",v:["history", "quiet"],d:101,s:"A cemetery of the poor and forgotten where the Danube once washed bodies ashore",st:"The Cemetery of the Nameless exists because bodies were pulled from the Danube. Suicides, drowning victims, the homeless who died alone. They were buried here without names, without families to mourn them. Now it\'s a place of quiet respect. Each grave is marked. Each body had a story lost to history.",im:"It\'s 1850. A body floats down the Danube. It\'s retrieved. No one claims it. It\'s buried here. A wooden marker is placed. The wind erases the name.",t:"The Cemetery of the Nameless exists because bodies were pulled from the Danube. Suicides, drowning victims, the homeless who died alone. They were buried here without names, without families to mourn them. Now it\'s a place of quiet respect. Each grave is marked. Each body had a story lost to history.\",im:\"It\'s 1850. A body floats down the Danube. It\'s retrieved. No one claims it. It\'s buried here. A wooden marker is placed. The wind erases the name.\",t:\"Friedhof der Namenlosen, Landstrasse, south bank of the Danube (U1 Kaiserebersdorf or walk from the water). €Free. Quiet and solemn. Go alone if possible.",c:["history_big", "quiet"],r:"g",nn:"Friedhof der Namenlosen Cemetery of the Nameless Straße — Landstrasse",ns:"Gassen voller Leben—wo echt Köln/München/etc. ist.",nst:"Die Straße ist lebendig. Läden, Restaurants, Menschen überall. Du wandelst und absorberst Atmosphäre. Es ist Stadt pur.",nt:"Kostenlos spazieren. Restaurants €10-30. Cafés €3-7. Beste Zeit: Wochenende. Shopping und Essen zusammen. Sehr authentisch."},
  {id:102,n:"Türkenschanzpark Hidden Pond — Währing",a:"Währing",v:["hidden", "nature"],d:102,s:"A forest park with an unexpected small lake and hiking trails",st:"Türkenschanzpark is Vienna\'s hidden nature escape. It has forests, meadows, a small pond, and hiking trails that locals know and tourists miss. In summer, people swim in the pond. In autumn, it\'s silent. The park is named after Turkish trenches from a 17th-century siege. History is buried here.",im:"It\'s 1683. Turkish soldiers dig trenches. They will lose this war. But their trenches become the shape of a park 300 years later.",t:"Türkenschanzpark is Vienna\'s hidden nature escape. It has forests, meadows, a small pond, and hiking trails that locals know and tourists miss. In summer, people swim in the pond. In autumn, it\'s silent. The park is named after Turkish trenches from a 17th-century siege. History is buried here.\",im:\"It\'s 1683. Turkish soldiers dig trenches. They will lose this war. But their trenches become the shape of a park 300 years later.\",t:\"Türkenschanzstrasse, Währing (Tram 37 to Höhe Türkenschanze). €Free. Bring a swimming suit for summer. Go on weekdays for quiet.",c:["parks", "nature", "hidden"],r:"g",nn:"Türkenschanzpark Hidden Pond Park — Währing",ns:"Grün und Bäume—wo Stadt atmet.",nst:"Der Park ist groß mit Bäumen und Plätzen zum Sitzen. Menschen joggen, Kinder spielen, Paare küssen. Es ist Natur in Stadt.",nt:"Kostenlos. Überall zugänglich. Beste Zeit: Sommer ab 18 Uhr. Biergärten oder Cafés oft im Park. Picnic-freundlich. Entspannung pur."},
  {id:103,n:"Otto Wagner Stadtbahn Stations Art Nouveau — Multiple",a:"Multiple districts",v:["architecture", "history"],d:103,s:"Six 1890s metro stations designed as standalone masterpieces by Vienna\'s greatest architect",st:"Otto Wagner designed the original Vienna metro (Stadtbahn). Each station is unique—iron railings like plants, copper roofs, skylights. They\'re still in use. Most commuters never look up. But the stations are functioning art galleries. Karlsplatz, Kettenbrückengasse, Peacockgasse—each is different.",im:"It\'s 1898. Wagner designs a station. He doesn\'t design just a shelter. He designs a gateway to the modern future.",t:"Otto Wagner designed the original Vienna metro (Stadtbahn). Each station is unique—iron railings like plants, copper roofs, skylights. They\'re still in use. Most commuters never look up. But the stations are functioning art galleries. Karlsplatz, Kettenbrückengasse, Peacockgasse—each is different.\",im:\"It\'s 1898. Wagner designs a station. He doesn\'t design just a shelter. He designs a gateway to the modern future.\",t:\"Multiple stations across Vienna. Free to visit. Pick 3-4 and spend 10 minutes in each. Karlsplatz is most impressive. Go early morning before crowds.",c:["architecture", "history_big"],r:"g",nn:"Otto Wagner Stadtbahn Stations Art Nouveau — Multiple",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:104,n:"Schönbrunn Gloriette Free Hilltop — Hietzing",a:"Hietzing",v:["beautiful", "free"],d:104,s:"A baroque monument at the top of Schönbrunn\'s hill with Vienna views and zero tourists",st:"Most people pay €17 to see the Schönbrunn Palace. Few know the Gloriette is free. Walk up the hill to this neoclassical monument. Vienna spreads below. On clear days, mountains. The Gloriette was built so the Emperor could look at his empire from above. Now you can.",im:"It\'s 1780. The Emperor stands here. He sees his power. It\'s vast and fragile.",t:"Most people pay €17 to see the Schönbrunn Palace. Few know the Gloriette is free. Walk up the hill to this neoclassical monument. Vienna spreads below. On clear days, mountains. The Gloriette was built so the Emperor could look at his empire from above. Now you can.\",im:\"It\'s 1780. The Emperor stands here. He sees his power. It\'s vast and fragile.\",t:\"Schönbrunn Schlosspark, Hietzing (U4 Schönbrunn). €Free. 20-minute walk uphill. Best at sunset. Bring water.",c:["parks", "free_museum"],r:"g",nn:"Schönbrunn Gloriette Free Hilltop — Hietzing",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."}
