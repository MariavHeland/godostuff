  {id:107,n:"Schönbrunn Palace Gardens Free Walk",a:"West",v:["beautiful","free","quiet"],d:20,s:"Massive baroque gardens — 1,441 hectares of manicured perfection",st:"The Schönbrunn gardens are free to explore (palace interior is paid). Hundreds of benches, fountains, and manicured hedges. Locals bring wine and books; tourists circle the palace.",im:"Time-travel: Built 1749 as Maria Theresa\'s summer palace.",t:"Free. Tram U4 to Schönbrunn.",c:["parks","romantic_water"],r:"g",nn:"Schönbrunn Garten Spaziergang",ns:"Jardines barrocos masivos — 1.441 hectáreas",nst:"Pasea los jardines perfectos de Schönbrunn.",nt:"Gratis. Tranvía U4 a Schönbrunn."},
  {id:108,n:"Stephansdom Cathedral Exterior",a:"Centrum",v:["beautiful","history","free"],d:5,s:"Gothic cathedral with iconic diamond-patterned roof tiles",st:"Stephansdom\'s exterior is free to photograph and admire. The famous roof with its black-and-gold tile pattern is architectural theater. Interior is paid.",im:"Time-travel: Construction started 1147; it\'s Vienna\'s spiritual core.",t:"Free exterior. Paid interior. Stephansplatz.",c:["architecture","history_big"],r:"g",nn:"Stephansdom Aussenseite",ns:"Catedral gótica con patrón icónico de tejas",nst:"Fotografía la fachada de la catedral.",nt:"Gratis exterior. Stephansplatz."}

,{id:118,n:"Jubiläumswarte Lookout Tower",a:"Ottakring (Wilhelminenberg)",v:["hidden"],d:20,s:"Climb this secret locals' tower for epic skyline panoramas!",st:"Tucked on Wilhelminenberg's edge, this free tower lures hikers craving Vienna's vast vista without the crowds. Sunset paints the city gold as you ascend spiral stairs, whispering tales of forgotten hikes. Pure adventurous escape in the Vienna Woods' shadow.",im:"Imagine cresting the top as the sun dips, the entire twinkling skyline unfolding like a private postcard.",t:"U4 to Ottakring then 37 tram or hike up; free entry, open daily; best at sunset. Bring headlamp for dusk.",c:["parks", "viewpoints"],r:"g",nn:"Jubiläumswarte Aussichtsturm",ns:"Klettere diesen geheimen Turm der Locals für epische Skyline-Blicke!",nst:"Versteckt am Wilhelminenberg, lockt dieser freie Turm Wanderer, die ein weites Panorama ohne Massen wollen. Sonnenuntergang vergoldet die Stadt, während du die Wendeltreppe erklimmst, mit Geschichten vergessener Pfade. Reiner abenteuerlicher Rückzugsort im Schatten der Wiener Wälder.",nt:"U4 nach Ottakring dann 37er Tram oder zu Fuß hoch; freier Eintritt, täglich offen; am besten bei Sonnenuntergang. Lampe für Dämmerung mitnehmen."},
{id:119,n:"Japanese Garden in Setagayapark",a:"Döbling (Hohe Warte)",v:["hidden"],d:15,s:"Tiny zen garden teleport—calm, romantic, utterly serene!",st:"This pocket paradise in Döbling feels worlds away, with cherry blossoms and koi ponds crafting instant peace. Weekday mornings, it's your private Japanese dream amid Vienna's bustle. Perfect for whispering secrets or quiet reflection.",im:"Picture yourself on an empty bench, bonsai whispering in the breeze, city stress melting into pond ripples.",t:"Tram 37 to Hohe Warte; free, always open; weekday mornings for solitude.",c:["parks"],r:"g",nn:"Japanischer Garten im Setagayapark",ns:"Kleiner Zen-Garten-Teleport—ruhig, romantisch, total entspannt!",nst:"Dieses Taschenparadies in Döbling fühlt sich wie eine andere Welt an, mit Kirschblüten und Karpfenteichen für sofortige Ruhe. Wochentagsmorgens ist es dein privater japanischer Traum inmitten des Wiener Trubels. Ideal für geflüsterte Geheimnisse oder stille Besinnung.",nt:"Tram 37 nach Hohe Warte; kostenlos, immer offen; Wochentagsmorgens für Einsamkeit."},
{id:120,n:"Raimundhof Courtyard Passages",a:"Mariahilf (6th district)",v:["hidden"],d:10,s:"Pastel courtyard with secret street-cut-throughs—rainy-day magic!",st:"Wander these hidden passages in the 6th, where soft pastels glow under rainy skies, linking streets like a cozy maze. Romantic photo ops abound in this locals' shortcut wonder. Feels like stumbling into a storybook village.",im:"Envision dodging light rain through arched doorways, emerging into a sun-dappled pastel haven.",t:"Near Mariahilfer Straße, enter from Raimundgasse 13; free, 24/7; rainy days for moody vibes.",c:["architecture"],r:"g",nn:"Raimundhof Innenhof und Gänge",ns:"Pastell-Hof mit geheimen Straßendurchgängen—Regenwetter-Zauber!",nst:"Schweife durch diese versteckten Gänge im 6. Bezirk, wo sanfte Pastelltöne unter regnerischem Himmel leuchten und Straßen wie ein gemütliches Labyrinth verbinden. Romantische Fotochancen in diesem Locals-Wunder. Fühlt sich wie ein Bilderbuch-Dorf an.",nt:"Bei Mariahilfer Straße, Eingang Raimundgasse 13; kostenlos, 24/7; regnerische Tage für stimmungsvolle Vibes."},
{id:121,n:"Schottendurchhaus Passage",a:"Innere Stadt (near Schottenring)",v:["hidden"],d:5,s:"Classic secret courtyard shortcut—atmospheric inner-city wormhole!",st:"Slip through this quick passage connecting 7th/8th districts, courtyards unfolding like hidden layers of old Vienna. Quick but packed with eerie charm, it's a local hack for dodging crowds. Pure time-travel thrill.",im:"Feel the chill of ancient stones as sunlight filters through, revealing a forgotten courtyard oasis.",t:"Near Schottenring U2/U4; free passage, always accessible; anytime for surprise discovery.",c:["architecture"],r:"g",nn:"Schottendurchhaus Durchgang",ns:"Klassischer geheimer Hof-Durchgang—atmosphärischer Innenstadt-Wurmloch!",nst:"Schlüpfe durch diesen schnellen Gang zwischen 7./8. Bezirk, Innenhöfe entfalten sich wie verborgene Schichten des alten Wien. Kurz, aber voller unheimlicher Charme, ein Local-Trick gegen Massen. Reiner Zeitreise-Kick.",nt:"Bei Schottenring U2/U4; freier Durchgang, immer zugänglich; jederzeit für Überraschungs-Entdeckung."},
{id:122,n:"Ferstel Passage",a:"Innere Stadt",v:["hidden"],d:8,s:"Ornate 19th-century arcade—film-set date walk for free!",st:"This elegant passage with lavish courtyards feels ripped from a vintage movie, arches glowing with historic allure. Stroll hand-in-hand through Vienna's gilded underbelly, soaking imperial vibes. Ultimate romantic wander without spending a cent.",im:"Step into golden light bouncing off frescoed ceilings, like starring in your own period drama.",t:"Herrengasse 14, near U3 Herrengasse; free, daily; evenings for ambient glow.",c:["architecture"],r:"g",nn:"Ferstel-Passage",ns:"Verzierter 19.-Jh.-Arkade—Filmset-Date-Spaziergang umsonst!",nst:"Diese elegante Passage mit prächtigen Höfen wirkt wie aus einem Vintage-Film gerissen, Bögen glühen vor historischem Reiz. Schlendere Händchen haltend durch Wiens vergoldeten Unterleib, imperiales Flair saugend. Ultimativer romantischer Streifzug ohne Cent.",nt:"Herrengasse 14, bei U3 Herrengasse; kostenlos, täglich; Abends für stimmungsvolles Leuchten."},
{id:123,n:"Kaiserwasser Wild Swimming",a:"Kaisermühlen (Donaustadt)",v:["hidden"],d:25,s:"Locals' calm Danube swim with skyline peeks—summer bliss!",st:"Dive into this serene arm of the Danube, where calm waters reflect Vienna's towers amid lazy floats. Post-work locals chill here, turning urban escape into watery heaven. Free thrill with city views.",im:"Float weightless, skyscrapers piercing the horizon as gentle currents carry you.",t:"U1/U2 to Kaisermühlen; free swimming, summer only; weekdays for quiet.",c:["outdoors"],r:"g",nn:"Kaiserwasser Wildschwimmen",ns:"Locals' ruhiges Donau-Schwimmen mit Skyline-Blicken—Sommerseligkeit!",nst:"Tauche in diesen sanften Donauarm ein, wo ruhige Wasser Wiens Türme spiegeln bei trägen Schwimmzügen. Feierabend-Locals entspannen hier, urbane Flucht in wässriges Paradies verwandelnd. Kostenloser Kick mit Stadtblick.",nt:"U1/U2 nach Kaisermühlen; freies Schwimmen, nur Sommer; Wochentags für Ruhe."},
{id:124,n:"\"Second Prater\" Fairground Ruins",a:"Favoriten (Laaer Wald, 10th district)",v:["hidden"],d:18,s:"Frozen-in-time mini-fairground—broke explorers' weird delight!",st:"Away from tourist Prater, this eerie old-school relic in Laaer Wald rusts with faded carousels and ghostly vibes. Poke around abandoned rides for nostalgic chills. Ultimate offbeat playground.",im:"Creep through overgrown paths to a creaky Ferris wheel silhouette against twilight.",t:"U1 to Keplerplatz, walk to Laaer Wald; free exterior explore, 24/7; dawn/dusk for mood.",ef:"Almost free and worth it: nearby Würstelstand sausages, ~€4.",c:["abandoned"],r:"g",nn:"\"Zweiter Prater\" Vergnügungspark-Ruinen",ns:"Eingefrorener Mini-Vergnügungspark—Broke-Explorers' skurriler Spaß!",nst:"Weg vom Touristen-Prater, dieses unheimliche Oldschool-Relikt in Laaer Wald verrostet mit verblassten Karussells und geisterhaften Vibes. Stochere um verlassene Attraktionen für nostalgische Schauer. Ultimativer Offbeat-Spielplatz.",nt:"U1 nach Keplerplatz, zu Fuß nach Laaer Wald; freie Außenexploration, 24/7; Dämmerung für Stimmung."},
{id:125,n:"Wienerbergteich Pond Escape",a:"Favoriten (Wienerberg)",v:["hidden"],d:22,s:"Surprising city pond with hills—cheap date lounging spot!",st:"Nestled urbanly, this calm teich offers hilly walks and watery lounges, a hidden gem for picnics. Ducks glide as skyline fades, blending nature's hush with city pulse. Serene steal.",im:"Lounge by reed-fringed shores, hills rolling green under vast blue.",t:"U1 to Gußhausstraße, bus 65; free, daily; anytime, golden hour best.",c:["parks"],r:"g",nn:"Wienerbergteich Teich-Ausbruch",ns:"Überraschender Stadtteich mit Hügeln—günstiger Date-Lounge-Fleck!",nst:"Städtisch eingebettet, bietet dieser ruhige Teich hügelige Spaziergänge und seichte Lounges, ein verstecktes Juwel für Picknicks. Enten gleiten, Skyline verblasst, Naturflüstern mischt sich mit Stadtpuls. Serener Diebstahl.",nt:"U1 nach Gußhausstraße, Bus 65; kostenlos, täglich; jederzeit, goldene Stunde top."}];

<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Vienna Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
