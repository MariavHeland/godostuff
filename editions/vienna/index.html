<script>
const P = [
  {id:1,n:"Durchhäuser Courtyard Chain",a:"Innere Stadt",v:["hidden", "history"],d:1,s:"Courtyards that survived the war",st:"Walk through the doorways and find chains of hidden courtyards dating to the 1800s. Each passage opens to another secret world. Locals cut through here daily, but tourists miss them entirely.",im:"It\'s 1870. Tailors, cobblers, and printers work in the courtyards. Laundry hangs between buildings. Children play where no streetlight reaches.",t:"Walk through the doorways and find chains of hidden courtyards dating to the 1800s. Each passage opens to another secret world. Locals cut through here daily, but tourists miss them entirely.\",im:\"It\'s 1870. Tailors, cobblers, and printers work in the courtyards. Laundry hangs between buildings. Children play where no streetlight reaches.\",t:\"Start at Singerstrasse 14, Innere Stadt. Walk through the gateway—no charge, always open. Passageways lead to Riemergasse.",c:["history_big", "architecture"],r:"g",nn:"Durchhäuser-Hofkette",ns:"Versteckte Innenhöfe aus dem 19. Jahrhundert, die die Kriege überlebt haben.",nst:"Spaziere durch die Durchhäuser und entdecke eine Kette von Innenhöfen, die sich bis ins Jahr 1800 zurückverfolgen lassen. Jeder Durchgang öffnet sich zu einer anderen verborgenen Welt. Einheimische gehen hier täglich durch, doch Touristen verpassen sie ganz.",nt:"Beginne an der Singerstraße 14, Innere Stadt. Gehe durch das Tor – kostenlos, immer offen. Die Durchgänge führen zur Riemergasse."},
  {id:2,n:"Café Central Coffee House Culture",a:"Innere Stadt",v:["history", "local", "quiet"],d:2,s:"Where Trotsky played chess and Vienna argued politics",st:"Trotsky sat in this coffee house during WWI, planning revolution over coffee. Now it\'s a tourist spot, but arrive early and you\'ll see regulars in their chairs for hours, reading newspapers like it\'s still 1920.",im:"It\'s 1914. The espresso machine hisses. A lawyer argues philosophy. A chess player studies his board for an hour without moving. Newspapers from Prague and Budapest pile on side tables.",t:"Trotsky sat in this coffee house during WWI, planning revolution over coffee. Now it\'s a tourist spot, but arrive early and you\'ll see regulars in their chairs for hours, reading newspapers like it\'s still 1920.\",im:\"It\'s 1914. The espresso machine hisses. A lawyer argues philosophy. A chess player studies his board for an hour without moving. Newspapers from Prague and Budapest pile on side tables.\",t:\"Herrengasse 14, Innere Stadt. Entry free if you buy coffee (€3.50). Arrive before 10am for the real Vienna feel. Pastries €4-7.",c:["history_big", "local_only"],r:"g",nn:"Café Central",ns:"Der Ort, wo Trotzki Schach spielte und Wien Politik diskutierte.",nst:"Trotzki saß in diesem Kaffeehaus während des Ersten Weltkriegs und plante Revolutionen bei Kaffee. Heute ist es ein Touristenspot, aber wenn du früh ankommst, siehst du Stammgäste, die stundenlang in ihren Stühlen sitzen und Zeitung lesen, als wäre es immer noch 1920.",nt:"Herrengasse 14, Innere Stadt. Eintritt frei, wenn du Kaffee kaufst (€3,50). Vor 10 Uhr ankommmen für echtes Wien-Feeling. Gebäck €4-7."},
  {id:3,n:"Hundertwasser Village",a:"Leopoldstadt",v:["weird", "beautiful", "local"],d:3,s:"Wavy buildings that break every architectural rule",st:"Friedensreich Hundertwasser designed this neighborhood to look alive and organic. Crooked windows, uneven floors, trees growing through the roofs. It\'s like living inside an acid trip made solid.",im:"Imagine stepping into a fairy tale where the houses breathe. Gold and green tiles spiral. Chimneys look like they grew from the earth. Windows sit where they please.",t:"Friedensreich Hundertwasser designed this neighborhood to look alive and organic. Crooked windows, uneven floors, trees growing through the roofs. It\'s like living inside an acid trip made solid.\",im:\"Imagine stepping into a fairy tale where the houses breathe. Gold and green tiles spiral. Chimneys look like they grew from the earth. Windows sit where they please.\",t:\"Kegelgasse 34-38, Leopoldstadt (U1 to Donaustadt). Free to walk. Hundertwasser Museum next door €15. Photos are why you came.",c:["architecture", "local_only"],r:"g",nn:"Hundertwasser-Dorf",ns:"Welliges Wohnen: Gebäude, die jede architektonische Regel brechen.",nst:"Friedensreich Hundertwasser gestaltete dieses Viertel so, als würde es leben. Schiefe Fenster, unebene Böden, Bäume, die durch die Dächer wachsen. Es ist wie das Leben in einem Säuretrip aus Stein.",nt:"Kegelgasse 34-38, Leopoldstadt (U1 zu Donaustadt). Kostenlos zum Spazieren. Hundertwasser-Museum daneben €15. Fotos machen – deswegen bist du hier."},
  {id:4,n:"Danube Canal Street Art Stretch",a:"Leopoldstadt",v:["beautiful", "local", "free"],d:4,s:"Illegal art transformed into open-air gallery",st:"Vienna\'s edgiest street art lines the Danube Canal. Works change weekly. Stencils, paste-ups, wild colors. This is where Vienna\'s illegal art scene lives openly, half-legal, fully energetic.",im:"It\'s dawn. An artist spray-paints a massive portrait. Another adds layers to a weeks-old piece. By night, the whole canal glows with color.",t:"Vienna\'s edgiest street art lines the Danube Canal. Works change weekly. Stencils, paste-ups, wild colors. This is where Vienna\'s illegal art scene lives openly, half-legal, fully energetic.\",im:\"It\'s dawn. An artist spray-paints a massive portrait. Another adds layers to a weeks-old piece. By night, the whole canal glows with color.\",t:\"Walk from Karmeliterplatz U-Bahn towards Schwedenplatz (20 min walk). Free. Best light at golden hour. Bring a camera.",c:["street_art", "local_only"],r:"g",nn:"Donaukanal-Streetart",ns:"Illegale Kunst, die zu einer Open-Air-Galerie wurde.",nst:"Wiens kantigste Streetart säumt den Donaukanal. Die Werke wechseln wöchentlich. Schablonen, Klebstoff-Kunstwerke, wilde Farben. Dies ist der Ort, wo Wiens illegale Kunstszene offen lebt – halblegalisiert, voll energiegeladen.",nt:"Spaziere von Karmeliterplatz U-Bahn zur Schwedenplatz (20 Minuten zu Fuß). Kostenlos. Bestes Licht bei goldener Stunde. Bring eine Kamera mit."},
  {id:5,n:"Naschmarkt Food Underground",a:"Wieden",v:["local", "free", "night"],d:5,s:"Where Vienna eats when nobody\'s watching",st:"By day it\'s the tourist market. By night, locals fill tiny stalls eating Vietnamese, Turkish, Thai. Prices are real. No Instagram poses. Just hungry people and good food.",im:"It\'s 11pm. The market is packed. Cigarette smoke and spice. A Turkish woman hands you a paper bag of grilled meatballs. You eat standing up, sauce on your hands.",t:"By day it\'s the tourist market. By night, locals fill tiny stalls eating Vietnamese, Turkish, Thai. Prices are real. No Instagram poses. Just hungry people and good food.\",im:\"It\'s 11pm. The market is packed. Cigarette smoke and spice. A Turkish woman hands you a paper bag of grilled meatballs. You eat standing up, sauce on your hands.\",t:\"Naschmarkt 1-3, Wieden (U4 to Kettenbrückengasse). Free entry. Stalls €5-12. Open until late on weekends.",c:["local_only", "free"],r:"g",nn:"Naschmarkt",ns:"Wo Wien isst, wenn niemand hinschaut.",nst:"Tagsüber ist es ein Touristenmarkt. Nachts füllen Einheimische winzige Stände mit vietnamesischem, türkischem, Thai-Essen. Preise sind real. Keine Instagram-Posen. Nur hungrige Menschen und gutes Essen.",nt:"U6 zu Naschmarkt. Tagsüber voll, nachts authentisch. Kleine Portionen, faire Preise. Bring kleine Scheine mit."},
  {id:6,n:"Soviet Memorial at Schwarzenbergplatz",a:"Innere Stadt",v:["history", "quiet"],d:6,s:"The Cold War monument Viennese pretend not to see",st:"A massive Soviet tank points toward the West. It\'s been here since 1945. Vienna negotiated neutrality but couldn\'t remove it. Now it sits in plain sight, the city\'s darkest secret.",im:"It\'s 1945. Soviet soldiers roll tanks into Vienna. The city holds its breath. The tank becomes a warning and a wound.",t:"A massive Soviet tank points toward the West. It\'s been here since 1945. Vienna negotiated neutrality but couldn\'t remove it. Now it sits in plain sight, the city\'s darkest secret.\",im:\"It\'s 1945. Soviet soldiers roll tanks into Vienna. The city holds its breath. The tank becomes a warning and a wound.\",t:\"Schwarzenbergplatz, Innere Stadt (U4 to Karlsplatz). Free. Visible from the street. Step into the plaza and feel the weight of history.",c:["history_big"],r:"g",nn:"Soviet Memorial at Schwarzenbergplatz Platz — Zentrum",ns:"Zentral und belebt—Herz der Stadt.",nst:"Der Platz ist pulsierend. Brunnen, Restaurants, Menschen von überall. Es ist wo City trifft. Du gehörst sofort dazu.",nt:"Kostenlos spazieren. Restaurants €12-25. Cafés €3-6. Beste Zeit: Abend wenn Lichter an. Märkte gelegentlich auf Platz. Sehr touristisch aber authentisch."},
  {id:7,n:"Freud\'s Apartment and Ghosts",a:"Alsergrund",v:["history", "quiet"],d:7,s:"Where dreams were invented",st:"Sigmund Freud lived here for 47 years. You can see his study, his desk, the couch (replica). The walls hold the birth of psychoanalysis. Exit through the shop filled with Freud merchandise.",im:"It\'s 1900. Freud sits with a patient on the couch. He listens. He writes. He invents the language of the mind.",t:"Sigmund Freud lived here for 47 years. You can see his study, his desk, the couch (replica). The walls hold the birth of psychoanalysis. Exit through the shop filled with Freud merchandise.\",im:\"It\'s 1900. Freud sits with a patient on the couch. He listens. He writes. He invents the language of the mind.\",t:\"Berggasse 19, Alsergrund (U6 to Währinger Strasse). €15. Expect crowds. Go on weekday mornings. Audio guide included.",c:["history_big"],r:"g",nn:"Freud\'s Apartment and Ghosts — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:8,n:"Jugendstil Apartment Building Tour",a:"Innere Stadt",v:["beautiful", "history"],d:8,s:"Vienna\'s Art Nouveau explosion in one walk",st:"Turn-of-century architects went wild here. Golden ornaments, green tiles, faces sculpted into facades. These buildings nearly didn\'t survive WWII. Now they\'re UNESCO protected.",im:"It\'s 1900. An architect dreams of curves instead of lines. Gold replaces gray. The building becomes art.",t:"Turn-of-century architects went wild here. Golden ornaments, green tiles, faces sculpted into facades. These buildings nearly didn\'t survive WWII. Now they\'re UNESCO protected.\",im:\"It\'s 1900. An architect dreams of curves instead of lines. Gold replaces gray. The building becomes art.\",t:\"Start at Karlsplatz (Karlskirche stop). Walk to Otto Wagner\'s Majolica House at Linke Wienzeile 40. Free walk. Windows are the gallery.",c:["architecture", "history_big"],r:"g",nn:"Jugendstil Apartment Building Tour — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:9,n:"Stephansdom Catacombs (Secret Below)",a:"Innere Stadt",v:["history", "quiet"],d:9,s:"Plague pits beneath the city\'s most famous church",st:"Under Stephansdom are charnel houses and mass graves from the 17th-century plague. 11,000 bodies lie stacked in the darkness. The church sits on its own dead.",im:"It\'s 1680. Plague ravages Vienna. Priests throw bodies into pits. The church above continues its prayers.",t:"Under Stephansdom are charnel houses and mass graves from the 17th-century plague. 11,000 bodies lie stacked in the darkness. The church sits on its own dead.\",im:\"It\'s 1680. Plague ravages Vienna. Priests throw bodies into pits. The church above continues its prayers.\",t:\"Stephansplatz 3, Innere Stadt. €5 for catacombs tour (not guaranteed daily). Check ahead. 30 min guided visit. Claustrophobic and unforgettable.",c:["history_big"],r:"g",nn:"Stephansdom Catacombs Dom — Zentrum",ns:"Massiv und gotisch—wo Himmel und Erde sich treffen.",nst:"Der Dom ist gigantisch. Zwei Türme zum Himmel. Gotische Bögen, Fenster-Licht, Altäre mit Gold. Du bist winzig. Es ist übernatürlich.",nt:"Kostenlos eintritt. €3-5 Turm-Aufstieg. Täglich 6-22 Uhr. Konzerte €10-25. Sehr touristisch. Früh morgens kommen für Ruhe."},
  {id:10,n:"Kapuzinerkirche and the Dead Emperors",a:"Innere Stadt",v:["history", "quiet"],d:10,s:"Where Habsburg emperors decompose",st:"The Capuchin Church holds the Imperial Crypt. 140 Habsburgs lie in ornate tombs. You walk past emperors and empresses stacked in death. The church doesn\'t hide it.",im:"It\'s 1519. The first emperor arrives in his tomb. By 1918, the dynasty is stacked here, waiting for resurrection that won\'t come.",t:"The Capuchin Church holds the Imperial Crypt. 140 Habsburgs lie in ornate tombs. You walk past emperors and empresses stacked in death. The church doesn\'t hide it.\",im:\"It\'s 1519. The first emperor arrives in his tomb. By 1918, the dynasty is stacked here, waiting for resurrection that won\'t come.\",t:\"Neuer Markt, Innere Stadt (U1/U3 to Stephansplatz). €5.50 entry. Respectfully quiet. Take time with the tombs.",c:["history_big"],r:"g",nn:"Kapuzinerkirche and the Dead Emperors Kirche — Zentrum",ns:"Gotisch oder barock—wo Glaube in Stein ist.",nst:"Du trittst in die Kirche. Licht kommt durch Fenster. Deckenmalerei, Altäre, Glocken. Es ist heilig und zeitlos. Deine Stimme hallt.",nt:"Kostenlos eintritt. Täglich 8-18 Uhr (manche bis 19 Uhr). Konzerte gelegentlich €10-20. Sehr ruhig und meditativ. Respekt für Beter."},
  {id:11,n:"Kunsthistorisches Museum Back Galleries",a:"Innere Stadt",v:["beautiful", "history", "local"],d:11,s:"Where the real art hides from tourists",st:"Everyone sees the main galleries. The back galleries hold smaller paintings, sculptures, medieval armor. Come here to see art instead of crowds. A local\'s secret.",im:"You\'re alone in a hall of Dutch masters. Vermeer\'s light falls on your face. No phone cameras. No groups. Just you and immortality.",t:"Everyone sees the main galleries. The back galleries hold smaller paintings, sculptures, medieval armor. Come here to see art instead of crowds. A local\'s secret.\",im:\"You\'re alone in a hall of Dutch masters. Vermeer\'s light falls on your face. No phone cameras. No groups. Just you and immortality.\",t:\"Maria-Theresien-Platz, Innere Stadt (U2 to Museumsquartier). €18. Go on Tuesday after 6pm. Back galleries empty by 7pm.",c:["local_only"],r:"g",nn:"Kunsthistorisches Museum — Innere Stadt",ns:"Eines der größten Kunstmuseen der Welt—Meisterwerke auf Meisterwerke.",nst:"Das KHM zeigt Kunstschätze aus Mittelalter bis 19. Jahrhundert. Gemälde von Brueghel, Dürer, Caravaggio, Rembrandt. Die Sammlung ist enorm. Das Gebäude selbst ist Kunstwerk.",nt:"€18 Eintritt. Täglich 10-18 Uhr (Mittwoch bis 21 Uhr, Montag geschlossen). U-Bahn Museumsquartier. Audioguide kostenlos. Café im Obergeschoss. Plan 2-3 Stunden."},
  {id:12,n:"Marx-Hof and Red Vienna",a:"Alsergrund",v:["history", "architecture", "local"],d:12,s:"Fortress housing from Vienna\'s socialist dream",st:"In the 1930s, Vienna built housing for workers that looked like a castle. 1,400 apartments in one massive block. It housed 5,000 people. The city tried utopia. Politics destroyed it.",im:"It\'s 1927. Workers move into their fortress. Clean water. Sunlight. No slums. Then the tanks come.",t:"In the 1930s, Vienna built housing for workers that looked like a castle. 1,400 apartments in one massive block. It housed 5,000 people. The city tried utopia. Politics destroyed it.\",im:\"It\'s 1927. Workers move into their fortress. Clean water. Sunlight. No slums. Then the tanks come.\",t:\"Karl-Marx-Hof, Alsergrund (U6 to Währinger Strasse). Free to walk. 380-meter frontage. Photos tell the story of Vienna\'s heart.",c:["architecture", "history_big"],r:"g",nn:"Marx-Hof and Red Vienna — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:13,n:"Zentralfriedhof Cemetery Culture",a:"Simmering",v:["history", "quiet"],d:13,s:"A city of the dead bigger than the living",st:"Europe\'s third-largest cemetery. 330,000 graves. Beethoven, Brahms, Schubert. Massive monuments. Mozart too (well, supposedly—nobody knows his real grave). It\'s a city unto itself.",im:"It\'s dusk. Candles flicker on graves. A woman tends her family\'s plot like it\'s a garden. Stone angels watch. The dead are visited here more than they lived.",t:"Europe\'s third-largest cemetery. 330,000 graves. Beethoven, Brahms, Schubert. Massive monuments. Mozart too (well, supposedly—nobody knows his real grave). It\'s a city unto itself.\",im:\"It\'s dusk. Candles flicker on graves. A woman tends her family\'s plot like it\'s a garden. Stone angels watch. The dead are visited here more than they lived.\",t:\"Simmeringer Hauptstrasse 234, Simmering (streetcar 71 from city center, 45 min). Free entry. Map at gate €0.50. Bring flowers. Go on All Souls\' Day to see the culture.",c:["history_big"],r:"g",nn:"Zentralfriedhof Cemetery Culture — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:14,n:"House of Music (Soundwalk Inside)",a:"Innere Stadt",v:["beautiful", "local"],d:14,s:"Mozart and Strauss encoded into the building",st:"The Philharmonic building where Vienna\'s orchestras live. Walk the stairwell and hear each floor is a different acoustic. The architecture conducts you through sound like you\'re inside a symphony.",im:"It\'s 1870. A composer climbs these stairs hearing echoes. The building becomes an instrument.",t:"The Philharmonic building where Vienna\'s orchestras live. Walk the stairwell and hear each floor is a different acoustic. The architecture conducts you through sound like you\'re inside a symphony.\",im:\"It\'s 1870. A composer climbs these stairs hearing echoes. The building becomes an instrument.\",t:\"Musikvereinsplatz 1, Innere Stadt (U1/U2 to Karlsplatz). Concerts most nights (€10-80). Free to walk the lobby. Listen with your eyes closed.",c:["history_big"],r:"g",nn:"House of Music — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:15,n:"Prater Park and the Atomic Wheel",a:"Leopoldstadt",v:["history", "beautiful"],d:15,s:"Where empires fell from the sky",st:"The Ferris wheel survived WWII while the city burned. It\'s been turning since 1897. From the top, you see Vienna\'s ring where walls once guarded the empire. History in every direction.",im:"It\'s 1945. The Riesenrad turns slowly. The city below is rubble. The wheel survives. Life continues.",t:"The Ferris wheel survived WWII while the city burned. It\'s been turning since 1897. From the top, you see Vienna\'s ring where walls once guarded the empire. History in every direction.\",im:\"It\'s 1945. The Riesenrad turns slowly. The city below is rubble. The wheel survives. Life continues.\",t:\"Prater 90, Leopoldstadt (U2 to Praterstrasse). Wheel €15. Go at sunset. Best views of the city\'s bones from above.",c:["history_big"],r:"g",nn:"Prater Park and the Atomic Wheel Park — Zentrum",ns:"Grün und Bäume—wo Stadt atmet.",nst:"Der Park ist groß mit Bäumen und Plätzen zum Sitzen. Menschen joggen, Kinder spielen, Paare küssen. Es ist Natur in Stadt.",nt:"Kostenlos. Überall zugänglich. Beste Zeit: Sommer ab 18 Uhr. Biergärten oder Cafés oft im Park. Picnic-freundlich. Entspannung pur."},
  {id:16,n:"Secession Building and Klimt\'s Work",a:"Wieden",v:["beautiful", "history"],d:16,s:"Art nouveau temple where scandal was golden",st:"A white cube with a gold dome. Inside, Gustav Klimt painted the Beethoven Frieze. The painting was \'immoral\' once. Now it\'s sacred. The building whispers about the fight between art and censorship.",im:"It\'s 1902. Klimt unveils nudes and gold. Austria gasps. The city\'s soul cracks open.",t:"A white cube with a gold dome. Inside, Gustav Klimt painted the Beethoven Frieze. The painting was \'immoral\' once. Now it\'s sacred. The building whispers about the fight between art and censorship.\",im:\"It\'s 1902. Klimt unveils nudes and gold. Austria gasps. The city\'s soul cracks open.\",t:\"Friedrichstrasse 12, Wieden (U4 to Kettenbrückengasse). €15. The frieze is hypnotic. Go slow. Read about the scandal. It matters.",c:["history_big", "architecture"],r:"g",nn:"Secession Building and Klimt\'s Work — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:17,n:"Danube Tower and Soviet View",a:"Leopoldstadt",v:["history", "quiet"],d:17,s:"Spy against the Cold War from Vienna\'s peak",st:"Built in 1964 during the Cold War. A surveillance tower. Now tourists ride it to see the city, but locals remember when it watched the border. The view doesn\'t care about history.",im:"It\'s 1967. A spy climbs the tower. The Danube flows east. Iron Curtain hums beyond the horizon.",t:"Built in 1964 during the Cold War. A surveillance tower. Now tourists ride it to see the city, but locals remember when it watched the border. The view doesn\'t care about history.\",im:\"It\'s 1967. A spy climbs the tower. The Danube flows east. Iron Curtain hums beyond the horizon.\",t:\"Donauturm, Donaucity-Strasse 11, Leopoldstadt (U6 to Alte Donau). €15. Two rotating restaurants. The city spreads out like an old map.",c:["history_big"],r:"g",nn:"Danube Tower and Soviet View Turm — Zentrum",ns:"Hoch und Aussicht—wo Stadt unter dir liegt.",nst:"Du steigst den Turm. Stufe für Stufe. Oben: Aussicht über Stadt. Berge, Flüsse, Landschaft. Dein Herz pocht. Deine Beine aua.",nt:"€3-8 Aufstieg. Täglich 9-18 Uhr (Winter kürzer). Treppen sind steil. Nicht für Höhenangst! Früh morgens kommen für leere Treppen. Aussicht spektakulär."},
  {id:18,n:"St. Stephen\'s Cathedral Interior Climb",a:"Innere Stadt",v:["history", "beautiful"],d:18,s:"Stairs into the medieval sky",st:"343 steps up the south tower. Your legs burn. Then you emerge into the space between earth and heaven. Vienna shrinks below. The city becomes a prayer.",im:"It\'s 1400. A stone worker places the last brick. The cathedral reaches for God.",t:"343 steps up the south tower. Your legs burn. Then you emerge into the space between earth and heaven. Vienna shrinks below. The city becomes a prayer.\",im:\"It\'s 1400. A stone worker places the last brick. The cathedral reaches for God.\",t:\"Stephansplatz 3, Innere Stadt. €5.50. Bring water. People with heart conditions should skip. The view makes you understand why cathedrals were built.",c:["history_big", "architecture"],r:"g",nn:"Stephansdom — Innere Stadt",ns:"Die Nadel zum Himmel—Wiens Herz und Wahrzeichen.",nst:"Der Stephansdom ist Wiens größte Kirche. Gotische Spitzbögen, riesiges Dach mit farbigen Ziegeln (rot-weiß-rot Flaggenfarben). Du gehst rein und bist überwältigt. Das Innere hat eine vierzackige Orgel.",nt:"Kostenlos eintritt. €4,50 Krypta, €4,50 Turm (343 Stufen). Täglich 8-22 Uhr. Im Zentrum Stephansplatz. Konzerte täglich 18 Uhr (€15-25). Café nebenan."},
  {id:19,n:"Albertina Print Room Secrets",a:"Innere Stadt",v:["history", "quiet"],d:19,s:"Where Dürer and da Vinci wait in climate control",st:"The Imperial Palace\'s secret: one of the world\'s greatest print collections. Rotate exhibits show master drawings. You\'ll see the hand of genius on paper. Not just images—fingerprints of masters.",im:"It\'s 1450. A German woodcutter carves lines. Each line is a lifetime of craft.",t:"The Imperial Palace\'s secret: one of the world\'s greatest print collections. Rotate exhibits show master drawings. You\'ll see the hand of genius on paper. Not just images—fingerprints of masters.\",im:\"It\'s 1450. A German woodcutter carves lines. Each line is a lifetime of craft.\",t:\"Albertinaplatz 1, Innere Stadt (U1/U2/U4 to Stephansplatz). €17. Go on Thursday evenings when crowds thin. Photography prohibited—that forces you to look.",c:["history_big"],r:"g",nn:"Albertina Print Room Secrets — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:20,n:"Ruprechtskirche (Oldest Church Crypt)",a:"Innere Stadt",v:["history", "quiet"],d:20,s:"Vienna\'s earliest Christian bones",st:"Built around 850 AD. The oldest church in Vienna. Romanesque interior. A crypt you can\'t quite see into. Candles flicker. Medieval Vienna breathes underneath your feet.",im:"It\'s 850. A monk blesses the ground. Centuries of prayers pile on top of each other.",t:"Built around 850 AD. The oldest church in Vienna. Romanesque interior. A crypt you can\'t quite see into. Candles flicker. Medieval Vienna breathes underneath your feet.\",im:\"It\'s 850. A monk blesses the ground. Centuries of prayers pile on top of each other.\",t:\"Ruprechtsplatz 1, Innere Stadt (U1 to Schwedenplatz). Free. Quiet. Atmospheric. Go when Vienna is sleeping.",c:["history_big", "quiet"],r:"g",nn:"Ruprechtskirche Kirche — Zentrum",ns:"Gotisch oder barock—wo Glaube in Stein ist.",nst:"Du trittst in die Kirche. Licht kommt durch Fenster. Deckenmalerei, Altäre, Glocken. Es ist heilig und zeitlos. Deine Stimme hallt.",nt:"Kostenlos eintritt. Täglich 8-18 Uhr (manche bis 19 Uhr). Konzerte gelegentlich €10-20. Sehr ruhig und meditativ. Respekt für Beter."},
  {id:21,n:"Passage Through Herrengasse",a:"Innere Stadt",v:["history", "hidden"],d:21,s:"Where politics happened without tourists",st:"Narrow passages connect Stephansplatz to other worlds. Used by officials for centuries. Walking here you\'re walking where decisions were made. The stones know power.",im:"It\'s 1805. An official rushes through with urgent letters. Napoleon\'s armies approach. The passages echo with whispered decisions.",t:"Narrow passages connect Stephansplatz to other worlds. Used by officials for centuries. Walking here you\'re walking where decisions were made. The stones know power.\",im:\"It\'s 1805. An official rushes through with urgent letters. Napoleon\'s armies approach. The passages echo with whispered decisions.\",t:\"Herrengasse, Innere Stadt (between Stephansplatz and Hofburg). Free. Walk through all the courtyards. Each door opens differently.",c:["history_big"],r:"g",nn:"Passage Through Herrengasse — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:22,n:"Palffy Palace Secret Garden",a:"Innere Stadt",v:["hidden", "beautiful"],d:22,s:"A courtyard most Viennese never find",st:"A palace courtyard that opens from the street into silence. Baroque fountains. Ivy climbs stone. Birds sing. You\'ve stepped from the city into another century. Empty most days.",im:"It\'s 1700. A nobleman walks here to escape court politics. Fountains mask conversations.",t:"A palace courtyard that opens from the street into silence. Baroque fountains. Ivy climbs stone. Birds sing. You\'ve stepped from the city into another century. Empty most days.\",im:\"It\'s 1700. A nobleman walks here to escape court politics. Fountains mask conversations.\",t:\"Josefsplatz 5, Innere Stadt. Free. Push the door. It\'s always open. Sit on a bench. The city is muffled.",c:["hidden"],r:"g",nn:"Palffy Palace Secret Garden Palast — Zentrum",ns:"König-Haus—wo Macht und Schönheit zusammenkommen.",nst:"Der Palast ist königlich. Zimmer nach Zimmer nach Zimmer. Fußböden sind Kunstholz. Decken haben Malerei. Möbel sind antik. Es ist Reichtum.",nt:"€10-15 Eintritt. Täglich 9-17 Uhr (Winter 10-16 Uhr). Audioguide kostenlos. Gartenpass oft extra. Plan 2-3 Stunden ein."},
  {id:23,n:"Schönbrunn Palace Hidden Rooms",a:"Meidling",v:["history", "beautiful"],d:23,s:"Habsburg excess and child genius moments",st:"1,441 rooms. You see maybe 40 on a tour. But the palace breathes in unseen spaces. Mozart played for Marie Antoinette here as a child. The palace watched empires collapse from its windows.",im:"It\'s 1762. A 6-year-old Mozart sits at the harpsichord. Marie Antoinette listens. The Habsburg world still believes in forever.",t:"1,441 rooms. You see maybe 40 on a tour. But the palace breathes in unseen spaces. Mozart played for Marie Antoinette here as a child. The palace watched empires collapse from its windows.\",im:\"It\'s 1762. A 6-year-old Mozart sits at the harpsichord. Marie Antoinette listens. The Habsburg world still believes in forever.\",t:\"Schönbrunner Schloss-Strasse 47, Meidling (U4 to Schönbrunn). €18 (grounds free). Go early. The gardens at dawn are empty. Worth the trip.",c:["history_big", "architecture"],r:"g",nn:"Schloss Schönbrunn — Hietzing",ns:"Habsburgs Sommersitz—1441 Zimmer von Macht und Eleganz.",nst:"Schloss Schönbrunn ist massiver Palast. 1441 Zimmer! Du besuchst nur 40 davon. Die Gärten sind größer—Brunnnen, Maze, Tiergarten. Es ist Reichtum-Symbol. Kapelle ist prachtvoll.",nt:"€18 Palast, €7,50 Garten, €27 zusammen. Täglich 8-18 Uhr (Winter bis 17 Uhr). U-Bahn Schönbrunn. Audioguide kostenlos. Restaurants im Garten. Plan 3-4 Stunden ein."},
  {id:24,n:"Hofburg Palace Invisible Rooms",a:"Innere Stadt",v:["history", "hidden"],d:24,s:"The empire\'s heart still beating",st:"A palace so massive you can\'t see its edges from inside. Hundreds of rooms. Some still locked. Austrian emperors walked these halls for 700 years. Now tourists walk in their footsteps while missing 90% of the building.",im:"It\'s 1880. An emperor walks to his private chambers. Servants bow. The palace is a village unto itself.",t:"A palace so massive you can\'t see its edges from inside. Hundreds of rooms. Some still locked. Austrian emperors walked these halls for 700 years. Now tourists walk in their footsteps while missing 90% of the building.\",im:\"It\'s 1880. An emperor walks to his private chambers. Servants bow. The palace is a village unto itself.\",t:\"Michaelerplatz 1, Innere Stadt (U1/U3 to Stephansplatz). €18. Rent an audio guide. Wander the courtyards—more interesting than the rooms.",c:["history_big", "architecture"],r:"g",nn:"Hofburg — Innere Stadt",ns:"Kaisers Winterpalast—die Residenz von 600 Jahren.",nst:"Die Hofburg ist Winterpalast. 2600 Zimmer insgesamt (größer als Versailles). Du siehst die privaten Zimmer, die Reitschule (Lipizzaner Schimmel), die Kunstsammlungen. Es ist Macht-Symbol.",nt:"€18 Palast-Museums, €10-50 Reitschule-Vorstellung. Täglich 9-17 Uhr (Montag geschlossen). Im Zentrum neben Stephansdom. Verschiedene Sammlungen haben unterschiedliche Öffnungszeiten. Reservierung für Reitschule."},
  {id:25,n:"Belvedere Palace and the Egon Schiele Moment",a:"Wieden",v:["beautiful", "history"],d:25,s:"Where modern Austria began on canvas",st:"Two baroque palaces connected by gardens. Klimt\'s Kiss lives here. Egon Schiele\'s twisted souls. These paintings hurt to look at. They show Vienna breaking open. The palace contains the empire\'s nervous breakdown.",im:"It\'s 1911. Schiele paints tortured bodies. Vienna is uncomfortable. The canvas is honest.",t:"Two baroque palaces connected by gardens. Klimt\'s Kiss lives here. Egon Schiele\'s twisted souls. These paintings hurt to look at. They show Vienna breaking open. The palace contains the empire\'s nervous breakdown.\",im:\"It\'s 1911. Schiele paints tortured bodies. Vienna is uncomfortable. The canvas is honest.\",t:\"Prinz-Eugen-Strasse 27, Wieden (Tram D to Schloss Belvedere). €18. Arrive when it opens (10am). Photography allowed. Take your time with the Schieles.",c:["history_big", "beautiful"],r:"g",nn:"Belvedere Palast — Wieden",ns:"Kunst und Barockgärten—Gustav Klimt \'The Kiss\' ist hier.",nst:"Das Belvedere ist zwei Paläste mit Garten dazwischen. Oben (Upper Belvedere) ist Museum mit Österreichischer Kunst—Klimt, Schiele. Das berühmte Gemälde \'Der Kuss\' ist hier. Garten ist barock und gewaltig.",nt:"€16 beide Paläste. Täglich 10-18 Uhr (Mittwoch bis 21 Uhr). U-Bahn Karlsplatz (für Upper), Tram 71 (für Lower). Audioguide kostenlos. Café im Garten. Plan 3 Stunden."},
  {id:26,n:"Leopold Museum and Vienna\'s Raw Edge",a:"Neubau",v:["beautiful", "weird"],d:26,s:"Expressionism that makes galleries uncomfortable",st:"Egon Schiele\'s tortured paintings. Oskar Kokoschka\'s nightmares. Early 20th-century Vienna looks like a fever dream here. The paintings show a city coming apart before it actually did.",im:"It\'s 1908. An artist paints his own pain. The brush doesn\'t lie. Beauty breaks into something raw.",t:"Egon Schiele\'s tortured paintings. Oskar Kokoschka\'s nightmares. Early 20th-century Vienna looks like a fever dream here. The paintings show a city coming apart before it actually did.\",im:\"It\'s 1908. An artist paints his own pain. The brush doesn\'t lie. Beauty breaks into something raw.\",t:\"Museumsplatz 1, Neubau (U2 to Museumsquartier). €16. Go in the afternoon when crowds thin. The Schiele room will haunt you.",c:["architecture"],r:"g",nn:"Leopold Museum and Vienna\'s Raw Edge Museum — Zentrum",ns:"Museum mit Sammlungen und Geschichte.",nst:"Du betrittst das Museum und siehst Kunstwerke, Artefakte, alte Dinge. Jedes Objekt erzählt eine Geschichte. Es ist Vergangenheit bewahrt für Gegenwart.",nt:"€6-12 Eintritt. Täglich 10-18 Uhr (Montag oft geschlossen). Audioguide kostenlos oder €3. Café im Gebäude. Plan 2 Stunden."},
  {id:27,n:"Neubau Street Art and Café Culture",a:"Neubau",v:["local", "beautiful"],d:27,s:"Where Vienna\'s young live and create",st:"Mariahilfer Strasse\'s cooler twin. Smaller cafés. Better artists. Street walls are a gallery that changes weekly. This neighborhood is where Vienna invents itself now.",im:"It\'s a Saturday. An artist spray-paints. A café fills with creatives. Vienna\'s future happens here.",t:"Mariahilfer Strasse\'s cooler twin. Smaller cafés. Better artists. Street walls are a gallery that changes weekly. This neighborhood is where Vienna invents itself now.\",im:\"It\'s a Saturday. An artist spray-paints. A café fills with creatives. Vienna\'s future happens here.\",t:\"Walk Lerchenfelder Strasse, Neubau (U2 to Lerchenfelder Strasse). Cafés everywhere €3-5 for coffee. Most art is free. This is real Vienna.",c:["street_art", "local_only"],r:"g",nn:"Neubau Street Art and Café Culture Straße — Zentrum",ns:"Gassen voller Leben—wo echt Köln/München/etc. ist.",nst:"Die Straße ist lebendig. Läden, Restaurants, Menschen überall. Du wandelst und absorberst Atmosphäre. Es ist Stadt pur.",nt:"Kostenlos spazieren. Restaurants €10-30. Cafés €3-7. Beste Zeit: Wochenende. Shopping und Essen zusammen. Sehr authentisch."},
  {id:28,n:"Museumsquartier and the Quiet Courtyards",a:"Neubau",v:["beautiful", "local"],d:28,s:"An art complex that is itself a gathering",st:"Museums surround vast courtyards. But here\'s the secret: most visitors stay on the main path. Sit in the side courtyards. Watch Vienna\'s youth debate life over cheap beer. Art isn\'t just inside.",im:"It\'s dusk. Students cover the courtyard. Someone plays guitar. Vienna\'s future debates the present.",t:"Museums surround vast courtyards. But here\'s the secret: most visitors stay on the main path. Sit in the side courtyards. Watch Vienna\'s youth debate life over cheap beer. Art isn\'t just inside.\",im:\"It\'s dusk. Students cover the courtyard. Someone plays guitar. Vienna\'s future debates the present.\",t:\"Museumsplatz 1, Neubau (U2 to Museumsquartier). Free entry to courtyards. Museums cost €12-18. Bring a book. Stay until sunset.",c:["local_only"],r:"g",nn:"Museumsquartier and the Quiet Courtyards Museum — Zentrum",ns:"Museum mit Sammlungen und Geschichte.",nst:"Du betrittst das Museum und siehst Kunstwerke, Artefakte, alte Dinge. Jedes Objekt erzählt eine Geschichte. Es ist Vergangenheit bewahrt für Gegenwart.",nt:"€6-12 Eintritt. Täglich 10-18 Uhr (Montag oft geschlossen). Audioguide kostenlos oder €3. Café im Gebäude. Plan 2 Stunden."},
  {id:29,n:"Figlmüller Schnitzel and Tourist Irony",a:"Wieden",v:["local", "free"],d:29,s:"The only tourist trap that\'s honest",st:"Schnitzel bigger than your head. It\'s cliché Vienna. But go anyway. Watch tourists realize Vienna isn\'t the waltz. It\'s this. Honest food. Simple joy. No pretense.",im:"It\'s 1905. A woman serves schnitzel. A man eats. Nothing changes.",t:"Schnitzel bigger than your head. It\'s cliché Vienna. But go anyway. Watch tourists realize Vienna isn\'t the waltz. It\'s this. Honest food. Simple joy. No pretense.\",im:\"It\'s 1905. A woman serves schnitzel. A man eats. Nothing changes.\",t:\"Wollzeile 5, Wieden (U1/U3 to Stephansplatz). €16 for the schnitzel. Go at 11:45am for lunch service. Join the queue. It moves.",c:["local_only"],r:"g",nn:"Figlmüller Schnitzel and Tourist Irony — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:30,n:"Bermuda Triangle Nightlife (Hidden Pubs)",a:"Innere Stadt",v:["night", "local"],d:30,s:"Where Viennese pretend tourists don\'t exist",st:"Three blocks of tiny bars. Tiny means full. No tourist traps. Locals drinking schnapps at 2am. The pubs have names nobody remembers. You find them by accident and return forever.",im:"It\'s midnight. A hole-in-the-wall is packed. A man plays accordion. Nobody\'s documenting it.",t:"Three blocks of tiny bars. Tiny means full. No tourist traps. Locals drinking schnapps at 2am. The pubs have names nobody remembers. You find them by accident and return forever.\",im:\"It\'s midnight. A hole-in-the-wall is packed. A man plays accordion. Nobody\'s documenting it.\",t:\"Area around Judengasse and Seitenstettengasse, Innere Stadt. Bars open 6pm-late. €3.50 for beer. Cash only in most. Get lost. That\'s the point.",c:["night", "local_only"],r:"y",nn:"Bermuda Triangle Nightlife — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:31,n:"Gumpendorfer Strasse Market and Real Vienna",a:"Margareten",v:["local", "free"],d:31,s:"Where Margareten buys its breakfast",st:"Not a tourist market. A neighborhood street where people get vegetables and coffee. Sit in a café and watch Vienna that isn\'t performing for anyone. This is what the city actually does.",im:"It\'s morning. A woman buys tomatoes. A man drinks coffee. Vienna happens in ordinary light.",t:"Not a tourist market. A neighborhood street where people get vegetables and coffee. Sit in a café and watch Vienna that isn\'t performing for anyone. This is what the city actually does.\",im:\"It\'s morning. A woman buys tomatoes. A man drinks coffee. Vienna happens in ordinary light.\",t:\"Gumpendorfer Strasse, Margareten (U4 to Kettenbrückengasse). Walk the whole length. Cafés and shops €3-12. Morning is best.",c:["local_only"],r:"g",nn:"Gumpendorfer Strasse Market and Real Vienna Markt — Zentrum",ns:"Täglich Farbe und Leben—wo Stadt isst.",nst:"Der Markt ist täglich oder wöchentlich. Obst, Gemüse, Blumen, Käse. Bauern schreien. Menschen bummel. Es ist Farbe und Lärm.",nt:"Kostenlos spazieren. Produkte kosten normal (Obst €2-5, Käse €10-15). Beste Zeit: Morgen 8-12 Uhr. Samstag voller Leute. Sehr authentisch."},
  {id:32,n:"Gürtel and the Sunday Flea Market",a:"Josefstadt",v:["local", "free"],d:32,s:"Where Vienna\'s past trades hands on Saturday mornings",st:"The circular railway\'s outer ring. On Saturdays, vendors set up. Vintage postcards. Nazi memorabilia (weirdly). Stolen goods maybe. Vienna\'s junk tells Vienna\'s stories.",im:"It\'s Saturday dawn. A vendor arranges photographs. Each photo is someone\'s forgotten life.",t:"The circular railway\'s outer ring. On Saturdays, vendors set up. Vintage postcards. Nazi memorabilia (weirdly). Stolen goods maybe. Vienna\'s junk tells Vienna\'s stories.\",im:\"It\'s Saturday dawn. A vendor arranges photographs. Each photo is someone\'s forgotten life.\",t:\"Gürtel (the whole ring), multiple districts (streetcars from any part). Free to browse. Haggle expected. Go early (7am) for best stuff.",c:["local_only"],r:"g",nn:"Gürtel and the Sunday Flea Market Markt — Zentrum",ns:"Täglich Farbe und Leben—wo Stadt isst.",nst:"Der Markt ist täglich oder wöchentlich. Obst, Gemüse, Blumen, Käse. Bauern schreien. Menschen bummel. Es ist Farbe und Lärm.",nt:"Kostenlos spazieren. Produkte kosten normal (Obst €2-5, Käse €10-15). Beste Zeit: Morgen 8-12 Uhr. Samstag voller Leute. Sehr authentisch."},
  {id:33,n:"Hernals and the Hidden Vienna",a:"Hernals",v:["local", "quiet"],d:33,s:"The 17th district where tourists never reach",st:"Beyond the famous ring. Real Vienna. Neighborhoods where old people sit on benches and young people haven\'t arrived yet. Green spaces. Quiet. The Vienna that doesn\'t know it matters.",im:"It\'s afternoon. An old man sits on a bench. No tourists. No cameras. Vienna breathes.",t:"Beyond the famous ring. Real Vienna. Neighborhoods where old people sit on benches and young people haven\'t arrived yet. Green spaces. Quiet. The Vienna that doesn\'t know it matters.\",im:\"It\'s afternoon. An old man sits on a bench. No tourists. No cameras. Vienna breathes.\",t:\"Take tram 41 or 42 to Hernals from the center (20 min). Walk Hernalser Hauptstrasse. Cafés €3-5. This is the real deal.",c:["local_only", "quiet"],r:"g",nn:"Hernals and the Hidden Vienna — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:34,n:"Prater Garden and Wiese Culture",a:"Leopoldstadt",v:["beautiful", "local", "free"],d:34,s:"Where Vienna spreads out on grass",st:"The green lung beyond the Ferris wheel. Miles of paths. People on blankets. Street musicians. Couples. Families. No tourism industry here. Just Vienna living.",im:"It\'s summer. Thousands lie on grass. The sun is shared. Nobody\'s alone.",t:"The green lung beyond the Ferris wheel. Miles of paths. People on blankets. Street musicians. Couples. Families. No tourism industry here. Just Vienna living.\",im:\"It\'s summer. Thousands lie on grass. The sun is shared. Nobody\'s alone.\",t:\"Hauptallee, Leopoldstadt (U2 to Praterstrasse). Free. Bring a blanket. Bring beer. Bring friends. Go on a Saturday.",c:["free", "local_only"],r:"g",nn:"Prater Garden and Wiese Culture Garten — Zentrum",ns:"Botanisch oder geometrisch—Natur als Kunst.",nst:"Der Garten ist gepflanzt mit Kunst. Blumen überall, Fountains, Statuen. Im Sommer Blüten. Du wandelst wie in Gemälde.",nt:"€5-10 Eintritt. Täglich 9-18 Uhr (Winter kürzer). Beste Zeit: Frühling/Sommer wenn Blüten. Audioguide oft kostenlos. Café im Garten."},
  {id:35,n:"Margareten Cemetery and Graves of Radicals",a:"Margareten",v:["history", "quiet"],d:35,s:"Where Vienna\'s revolutionaries sleep under stone",st:"A neighborhood cemetery. But this one holds graves of workers who died in the 1934 uprising. Marked graves. Names. You can visit Vienna\'s rebellion here.",im:"It\'s 1934. Workers build barricades. Some die. They get graves. The state pretends they didn\'t exist.",t:"A neighborhood cemetery. But this one holds graves of workers who died in the 1934 uprising. Marked graves. Names. You can visit Vienna\'s rebellion here.\",im:\"It\'s 1934. Workers build barricades. Some die. They get graves. The state pretends they didn\'t exist.\",t:\"Margaretenfriedhof, Margaretenstrasse 145, Margareten (U4 to Karlsplatz, walk 20 min). Free. Find the workers\' monument. Sit. Remember.",c:["history_big"],r:"g",nn:"Margareten Cemetery and Graves of Radicals — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:36,n:"Freihausviertel and Fire Building Colors",a:"Wieden",v:["beautiful", "local"],d:36,s:"Where Mozart lived (and the building is orange)",st:"The house is bright orange. Mozart wrote The Marriage of Figaro here in 1786. The neighborhood rebuilt around it. Modern Vienna surrounds where genius happened. The house knew something we forgot.",im:"It\'s 1786. Mozart sits at his desk. Music pours out. Outside, Vienna walks past unaware.",t:"The house is bright orange. Mozart wrote The Marriage of Figaro here in 1786. The neighborhood rebuilt around it. Modern Vienna surrounds where genius happened. The house knew something we forgot.\",im:\"It\'s 1786. Mozart sits at his desk. Music pours out. Outside, Vienna walks past unaware.\",t:\"Domgasse 5, Wieden (U1/U3 to Stephansplatz). €12 entry. The apartment is small. That\'s the point. Genius doesn\'t need space.",c:["history_big"],r:"g",nn:"Freihausviertel and Fire Building Colors Viertel — Zentrum",ns:"Ein Dorf in Stadt—wo normale Menschen leben.",nst:"Das Viertel ist Wohn-Platz mit Läden und Restaurants. Nicht touristisch, echte Leute. Du bist Fremder aber willkommen. Es ist Gemeinschaft.",nt:"Kostenlos spazieren. Restaurants €8-20. Cafés €2-5. Sehr günstig und authentisch. Nicht schön aber real. U-Bahn oder Tram nötig oft."},
  {id:37,n:"Altes AKH University Hospital Ruins",a:"Alsergrund",v:["history", "weird"],d:37,s:"Medical theater where suffering was studied",st:"Austria\'s oldest hospital. Still used but parts abandoned. The medical amphitheaters remain. Doctors watched students watch patients. Pain was public. Education came from observable agony.",im:"It\'s 1800. A surgeon demonstrates on a patient. Students crowd the balcony. The patient screams. Medical knowledge is built on screams.",t:"Austria\'s oldest hospital. Still used but parts abandoned. The medical amphitheaters remain. Doctors watched students watch patients. Pain was public. Education came from observable agony.\",im:\"It\'s 1800. A surgeon demonstrates on a patient. Students crowd the balcony. The patient screams. Medical knowledge is built on screams.\",t:\"Spitalgasse 2, Alsergrund (U6 to Währinger Strasse). Parts are closed. Walk the courtyard. History is visible in the architecture.",c:["history_big"],r:"g",nn:"Altes AKH University Hospital Ruins — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:38,n:"Danube River Strand and Swimming Culture",a:"Leopoldstadt",v:["nature", "local", "free"],d:38,s:"Where Vienna becomes a beach town",st:"The Danube has been dammed off into safe swimming zones. Viennese flock here in summer. No ocean needed. The city becomes a water place. Cheap beer. Grass. Sky.",im:"It\'s July. Thousands lie on the Danube banks. The city feels like vacation while being home.",t:"The Danube has been dammed off into safe swimming zones. Viennese flock here in summer. No ocean needed. The city becomes a water place. Cheap beer. Grass. Sky.\",im:\"It\'s July. Thousands lie on the Danube banks. The city feels like vacation while being home.\",t:\"Donauinsel (Danube Island) accessible from U2 (Donaumarina stop). Free entry. Bring a towel. Go on weekends for the scene.",c:["free", "nature"],r:"g",nn:"Danube River Strand and Swimming Culture Ufer — Zentrum",ns:"Der Fluss—wo Stadt mit Wasser tanzt.",nst:"Du spazierst am Fluss-Ufer. Boote fahren vorbei, Menschen sitzen auf Steinen, Schwäne schwimmen. Der Fluss ist Puls der Stadt.",nt:"Kostenlos spazieren. Restaurants am Ufer €12-30. Bootsfahrten €10-20. Beste Zeit: Sommer ab 18 Uhr. Sonnenuntergang sehr schön."},
  {id:39,n:"Augarten Palace and Porcelain Spies",a:"Leopoldstadt",v:["history", "beautiful"],d:39,s:"Where the empire made delicate things",st:"Vienna porcelain came from here. The palace is baroque. The porcelain factory still works. You can watch artists paint flowers on plates while standing in a room where emperors once walked.",im:"It\'s 1750. A porcelain artist paints. Each brushstroke is craft. The plate will outlive empires.",t:"Vienna porcelain came from here. The palace is baroque. The porcelain factory still works. You can watch artists paint flowers on plates while standing in a room where emperors once walked.\",im:\"It\'s 1750. A porcelain artist paints. Each brushstroke is craft. The plate will outlive empires.\",t:\"Obere Augartenstrasse 1, Leopoldstadt (U2 to Taborstrasse). Palace free. Porcelain tours €18. Watch artists work. Buy a plate you can\'t afford.",c:["history_big", "architecture"],r:"g",nn:"Augarten Palace and Porcelain Spies Palast — Zentrum",ns:"König-Haus—wo Macht und Schönheit zusammenkommen.",nst:"Der Palast ist königlich. Zimmer nach Zimmer nach Zimmer. Fußböden sind Kunstholz. Decken haben Malerei. Möbel sind antik. Es ist Reichtum.",nt:"€10-15 Eintritt. Täglich 9-17 Uhr (Winter 10-16 Uhr). Audioguide kostenlos. Gartenpass oft extra. Plan 2-3 Stunden ein."},
  {id:40,n:"Spittelberg Christmas Market (Off-Season Walking)",a:"Neubau",v:["local", "beautiful"],d:40,s:"Baroque streets that hide in plain sight",st:"Narrow 18th-century lanes. Restored old buildings. In winter there\'s a Christmas market (touristy). But walk here in spring when flowers bloom. Quiet cobbles. Locals only. The market\'s real magic happens when tourists aren\'t looking.",im:"It\'s April. Flowers bloom in window boxes. A woman waters her garden. The street is a painting.",t:"Narrow 18th-century lanes. Restored old buildings. In winter there\'s a Christmas market (touristy). But walk here in spring when flowers bloom. Quiet cobbles. Locals only. The market\'s real magic happens when tourists aren\'t looking.\",im:\"It\'s April. Flowers bloom in window boxes. A woman waters her garden. The street is a painting.\",t:\"Spittelberg area, Neubau (U2 to Lerchenfelder Strasse). Free to walk. Cafés open. Go on a weekday afternoon. Photography gold.",c:["beautiful", "local_only"],r:"g",nn:"Spittelberg Christmas Market Markt — Zentrum",ns:"Täglich Farbe und Leben—wo Stadt isst.",nst:"Der Markt ist täglich oder wöchentlich. Obst, Gemüse, Blumen, Käse. Bauern schreien. Menschen bummel. Es ist Farbe und Lärm.",nt:"Kostenlos spazieren. Produkte kosten normal (Obst €2-5, Käse €10-15). Beste Zeit: Morgen 8-12 Uhr. Samstag voller Leute. Sehr authentisch."},
  {id:41,n:"Technisches Museum and the Cold War",a:"Penzing",v:["history", "weird"],d:41,s:"Where Austria made things and spies took photos",st:"Vienna manufactured everything from trains to weapons. The museum has the cool stuff. And oddly, the Cold War section shows Vienna as neutral but surrounded. Technology and paranoia in one room.",im:"It\'s 1960. An Austrian engineer builds a machine. Spies photograph it from across the border.",t:"Vienna manufactured everything from trains to weapons. The museum has the cool stuff. And oddly, the Cold War section shows Vienna as neutral but surrounded. Technology and paranoia in one room.\",im:\"It\'s 1960. An Austrian engineer builds a machine. Spies photograph it from across the border.\",t:\"Mariahilfer Strasse 212, Penzing (U6 to Gumpendorfer Strasse). €16. The train section is hypnotic. The Cold War stuff is dark. Go for both.",c:["history_big"],r:"g",nn:"Technisches Museum and the Cold War Museum — Zentrum",ns:"Museum mit Sammlungen und Geschichte.",nst:"Du betrittst das Museum und siehst Kunstwerke, Artefakte, alte Dinge. Jedes Objekt erzählt eine Geschichte. Es ist Vergangenheit bewahrt für Gegenwart.",nt:"€6-12 Eintritt. Täglich 10-18 Uhr (Montag oft geschlossen). Audioguide kostenlos oder €3. Café im Gebäude. Plan 2 Stunden."},
  {id:42,n:"Josefstadt Theater and Crown Jewel",a:"Josefstadt",v:["history", "beautiful"],d:42,s:"Where Beethoven premiered and nobody mentions it",st:"Vienna has three major opera houses. This one is the oldest (1788). It\'s where real theater happens now. Smaller. Intimate. Actors sweat on stage. You see their eyes.",im:"It\'s 1788. A new theater opens. Vienna thinks it\'s small. It\'s about to become immortal.",t:"Vienna has three major opera houses. This one is the oldest (1788). It\'s where real theater happens now. Smaller. Intimate. Actors sweat on stage. You see their eyes.\",im:\"It\'s 1788. A new theater opens. Vienna thinks it\'s small. It\'s about to become immortal.\",t:\"Josefstädter Strasse 26, Josefstadt (U2 to Josefstädter Strasse). Tickets €15-80. Go on preview nights (€10). The theater itself is the performance.",c:["history_big"],r:"g",nn:"Josefstadt Theater and Crown Jewel Oper — Zentrum",ns:"Klassische Musik und Eleganz—wo Kunst lebt.",nst:"Die Oper ist elegant. Plüsch-Sessel, Kronleuchter, Musik erfüllt alles. Du sitzt und hörst Meisterwerke. Es ist Luxus.",nt:"Tickets €15-100+. Konzerte täglich außer Montag. Touren ohne Performance €8-10. Reservierung empfohlen. Restaurant/Café im Gebäude."},
  {id:43,n:"Währinger Strasse and the Revolutionary Walk",a:"Alsergrund",v:["history", "local"],d:43,s:"Where students fought Nazis and nobody won",st:"Long street where Vienna\'s intellectual revolution happened. Café Landtmann is here. Freud lived nearby. But also: where the Nazis marched. Where students resisted. History in sidewalk cracks.",im:"It\'s 1938. A Nazi column marches. A student throws a flyer. The street holds both moments.",t:"Long street where Vienna\'s intellectual revolution happened. Café Landtmann is here. Freud lived nearby. But also: where the Nazis marched. Where students resisted. History in sidewalk cracks.\",im:\"It\'s 1938. A Nazi column marches. A student throws a flyer. The street holds both moments.\",t:\"Währinger Strasse from U6 Währinger Strasse. Walk the whole length. Sit at Landtmann. Coffee €4. Memories free.",c:["history_big", "local_only"],r:"g",nn:"Währinger Strasse and the Revolutionary Walk Straße — Zentrum",ns:"Gassen voller Leben—wo echt Köln/München/etc. ist.",nst:"Die Straße ist lebendig. Läden, Restaurants, Menschen überall. Du wandelst und absorberst Atmosphäre. Es ist Stadt pur.",nt:"Kostenlos spazieren. Restaurants €10-30. Cafés €3-7. Beste Zeit: Wochenende. Shopping und Essen zusammen. Sehr authentisch."},
  {id:44,n:"Karl-Marx-Hof Red Vienna Tour",a:"Alsergrund",v:["history", "architecture", "local"],d:44,s:"Where the future was built in stone",st:"The largest public housing block in Austria. Built in 1930 for workers. A fortress of hope. Then fascism. Then war. Now it\'s an apartment building where Vienna\'s past is someone\'s home.",im:"It\'s 1930. Workers move into palaces built for them. Socialism becomes concrete and pride.",t:"The largest public housing block in Austria. Built in 1930 for workers. A fortress of hope. Then fascism. Then war. Now it\'s an apartment building where Vienna\'s past is someone\'s home.\",im:\"It\'s 1930. Workers move into palaces built for them. Socialism becomes concrete and pride.\",t:\"Karl-Marx-Hof, Alsergrund (U6 to Währinger Strasse). Free to walk. 380-meter facade. Photo from Währinger Strasse. Bring a wide lens.",c:["architecture", "history_big"],r:"g",nn:"Karl-Marx-Hof Red Vienna Tour — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:45,n:"Karmelitermarkt Neighborhood and Hidden Jewels",a:"Leopoldstadt",v:["local", "history"],d:45,s:"Where Leopoldstadt remembers before and after",st:"A neighborhood that lost almost everyone in 1938-1945. Now it\'s rebuilding. Market Thursdays. Young people. Cafés. But the absence is still visible if you know to look for it.",im:"It\'s 1920. A family shops. It\'s 1945. The family is gone. The market remembers.",t:"A neighborhood that lost almost everyone in 1938-1945. Now it\'s rebuilding. Market Thursdays. Young people. Cafés. But the absence is still visible if you know to look for it.\",im:\"It\'s 1920. A family shops. It\'s 1945. The family is gone. The market remembers.\",t:\"Karmelitermarkt, Leopoldstadt (U2 to Karmeliterplatz). Market Thursdays. Cafés open daily. Walk slowly. Pay attention to the memorial plaques.",c:["history_big", "local_only"],r:"g",nn:"Karmelitermarkt Neighborhood and Hidden Jewels Markt — Zentrum",ns:"Täglich Farbe und Leben—wo Stadt isst.",nst:"Der Markt ist täglich oder wöchentlich. Obst, Gemüse, Blumen, Käse. Bauern schreien. Menschen bummel. Es ist Farbe und Lärm.",nt:"Kostenlos spazieren. Produkte kosten normal (Obst €2-5, Käse €10-15). Beste Zeit: Morgen 8-12 Uhr. Samstag voller Leute. Sehr authentisch."},
  {id:46,n:"Donaukanal Park Promenade Walk",a:"Leopoldstadt",v:["nature", "free", "beautiful"],d:46,s:"The canal that divides Vienna\'s souls",st:"An artificial canal cutting through the city. Parks line it. Walking this is walking Vienna from its gritty side. Graffiti meets nature. Youth culture meets old Vienna. The walk shows the contradiction.",im:"You walk between worlds. Industrial past. Green future. The city breaks open.",t:"An artificial canal cutting through the city. Parks line it. Walking this is walking Vienna from its gritty side. Graffiti meets nature. Youth culture meets old Vienna. The walk shows the contradiction.\",im:\"You walk between worlds. Industrial past. Green future. The city breaks open.\",t:\"Start at Urania (U1 to Schwedenplatz). Walk east toward Reichsbrücke. Free. Takes 45 minutes. Bring a camera for the street art.",c:["free", "nature"],r:"g",nn:"Donaukanal Park Promenade Walk Park — Zentrum",ns:"Grün und Bäume—wo Stadt atmet.",nst:"Der Park ist groß mit Bäumen und Plätzen zum Sitzen. Menschen joggen, Kinder spielen, Paare küssen. Es ist Natur in Stadt.",nt:"Kostenlos. Überall zugänglich. Beste Zeit: Sommer ab 18 Uhr. Biergärten oder Cafés oft im Park. Picnic-freundlich. Entspannung pur."},
  {id:47,n:"Wurstelstand and Vienna\'s Street Food Scene",a:"Innere Stadt",v:["local", "free"],d:47,s:"Where Vienna eats standing up at midnight",st:"Tiny stands selling sausages and beer. Open late. No seating. You\'re standing shoulder to shoulder with drunk Viennese at 1am eating the best food of your life. It\'s democratic. It\'s real.",im:"It\'s 2am. A drunk man eats a sausage. An old woman eats one too. Nobody talks. The sausage is communion.",t:"Tiny stands selling sausages and beer. Open late. No seating. You\'re standing shoulder to shoulder with drunk Viennese at 1am eating the best food of your life. It\'s democratic. It\'s real.\",im:\"It\'s 2am. A drunk man eats a sausage. An old woman eats one too. Nobody talks. The sausage is communion.\",t:\"Multiple stands around the city (Gürtel ring has the most). Corner of Währinger and Währinger Strasse is famous. €5-8 per sausage. Cash only. Go late.",c:["local_only", "free"],r:"y",nn:"Wurstelstand and Vienna\'s Street Food Scene Straße — Zentrum",ns:"Gassen voller Leben—wo echt Köln/München/etc. ist.",nst:"Die Straße ist lebendig. Läden, Restaurants, Menschen überall. Du wandelst und absorberst Atmosphäre. Es ist Stadt pur.",nt:"Kostenlos spazieren. Restaurants €10-30. Cafés €3-7. Beste Zeit: Wochenende. Shopping und Essen zusammen. Sehr authentisch."},
  {id:48,n:"Stephansplatz Around the Cathedral",a:"Innere Stadt",v:["history", "beautiful"],d:48,s:"Vienna\'s crossroads before the crossroads existed",st:"The cathedral rises. Around it, Vienna\'s centuries layer. Medieval buildings. Baroque additions. Café tables. Street musicians. This is where Vienna started. Still is.",im:"It\'s 1000 AD. A cathedral rises. It\'s 1900 AD. A woman drinks coffee watching it. It\'s now. You stand watching centuries.",t:"The cathedral rises. Around it, Vienna\'s centuries layer. Medieval buildings. Baroque additions. Café tables. Street musicians. This is where Vienna started. Still is.\",im:\"It\'s 1000 AD. A cathedral rises. It\'s 1900 AD. A woman drinks coffee watching it. It\'s now. You stand watching centuries.\",t:\"Stephansplatz, Innere Stadt. Free to visit. Sit at a café (€5-10). Watch the cathedral change light throughout the day. No entry needed to feel it.",c:["history_big"],r:"g",nn:"Stephansplatz Around the Cathedral Dom — Zentrum",ns:"Massiv und gotisch—wo Himmel und Erde sich treffen.",nst:"Der Dom ist gigantisch. Zwei Türme zum Himmel. Gotische Bögen, Fenster-Licht, Altäre mit Gold. Du bist winzig. Es ist übernatürlich.",nt:"Kostenlos eintritt. €3-5 Turm-Aufstieg. Täglich 6-22 Uhr. Konzerte €10-25. Sehr touristisch. Früh morgens kommen für Ruhe."},
  {id:49,n:"Hoffmann\'s House and Design Dreams",a:"Neubau",v:["architecture", "beautiful"],d:49,s:"Where every doorknob was a philosophy",st:"Josef Hoffmann designed this house to be perfect. Every detail. Every angle. The house is a manifesto. It\'s also lived in. That\'s the conflict: can philosophy be a home?",im:"It\'s 1913. A designer argues about a doorknob. It will last 100 years. Does it matter? Yes.",t:"Josef Hoffmann designed this house to be perfect. Every detail. Every angle. The house is a manifesto. It\'s also lived in. That\'s the conflict: can philosophy be a home?\",im:\"It\'s 1913. A designer argues about a doorknob. It will last 100 years. Does it matter? Yes.\",t:\"Bergergasse 1, Neubau (U2 to Lerchenfelder Strasse). Free to see outside. Interior by appointment only (€15, arrange in advance). Walk around it. Feel the intention.",c:["architecture"],r:"g",nn:"Hoffmann\'s House and Design Dreams — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:50,n:"Naschmarkt Evening Light",a:"Wieden",v:["beautiful", "local"],d:50,s:"Golden hour turns market into a painting",st:"Come at 5pm. The sun hits the market low. Spices glow. Fruits turn ruby. Vendors pack up. The market becomes what tourists miss. Light and simplicity.",im:"It\'s sunset. Spices burn gold. A vendor covers his stand. The day ends. The beauty was always there.",t:"Come at 5pm. The sun hits the market low. Spices glow. Fruits turn ruby. Vendors pack up. The market becomes what tourists miss. Light and simplicity.\",im:\"It\'s sunset. Spices burn gold. A vendor covers his stand. The day ends. The beauty was always there.\",t:\"Naschmarkt, Wieden (U4 to Kettenbrückengasse). Come at 5-6pm spring-autumn. Bring a camera. Bring a friend. Bring silence.",c:["beautiful"],r:"g",nn:"Naschmarkt — Wieden",ns:"Wiens Lebensmittel-Markt—Farbe, Geruch, echte Sachen.",nst:"Der Naschmarkt ist täglich Markt mit Obst, Gemüse, Fisch, Käse, Brot. Es riecht nach Erde und Gewürz. Menschen aus Welt kaufen hier. Es ist nicht touristisch—es ist wirklich.",nt:"Täglich 6-19 Uhr (Samstag bis 17 Uhr, Sonntag geschlossen). U-Bahn Karlsplatz oder Kettenbrückengasse. Restaurants/Cafés ringsum €5-15. Flohmarkt Samstag."},
  {id:51,n:"Wienzeile Façade Competition",a:"Wieden",v:["architecture", "beautiful"],d:51,s:"Two architects proved beauty fights itself",st:"Linke Wienzeile 38-40 and 40. Two art nouveau buildings facing each other. Otto Wagner made one austere. A rival made the other ornate. They\'re arguing in stone. The street is the debate.",im:"It\'s 1899. Two architects compete. Vienna watches. Both are right and wrong simultaneously.",t:"Linke Wienzeile 38-40 and 40. Two art nouveau buildings facing each other. Otto Wagner made one austere. A rival made the other ornate. They\'re arguing in stone. The street is the debate.\",im:\"It\'s 1899. Two architects compete. Vienna watches. Both are right and wrong simultaneously.\",t:\"Linke Wienzeile, Wieden (U4 to Kettenbrückengasse). Walk between them. See how each answers the same question differently. Free. Educational. Beautiful.",c:["architecture"],r:"g",nn:"Wienzeile Façade Competition — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:52,n:"Kahlenberg Viewpoint and Forest Silence",a:"Döbling",v:["nature", "quiet", "beautiful"],d:52,s:"Where Vienna becomes a map below",st:"A hill outside the city. Views stretch across the Danube plain. On clear days, you see the city shrink. You understand: Vienna is small. The landscape is enormous. But Vienna acts like it owns both.",im:"It\'s 1683. Ottoman armies camp below. Vienna prays on this hill. The city survives. The hill watches everything.",t:"A hill outside the city. Views stretch across the Danube plain. On clear days, you see the city shrink. You understand: Vienna is small. The landscape is enormous. But Vienna acts like it owns both.\",im:\"It\'s 1683. Ottoman armies camp below. Vienna prays on this hill. The city survives. The hill watches everything.\",t:\"Kahlenberger Strasse 2, Döbling (39A bus to Kahlenberg). Free. Walk the 19 steps to the cross. Bring binoculars. Come at dawn. Come alone.",c:["nature", "quiet"],r:"g",nn:"Kahlenberg Viewpoint and Forest Silence — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:53,n:"Hoher Markt and the Roman Wall Ghost",a:"Innere Stadt",v:["history", "hidden"],d:53,s:"Where Roman Vienna lives under a plaza",st:"A medieval plaza. But underneath: Roman ruins. A garrison. An empire. They paved over Rome. Now there\'s a museum below showing what the plaza forgot. Vienna\'s memory is buried.",im:"It\'s 180 AD. Roman soldiers stand here. It\'s 1900. Archaeologists dig. It\'s now. History is two meters down.",t:"A medieval plaza. But underneath: Roman ruins. A garrison. An empire. They paved over Rome. Now there\'s a museum below showing what the plaza forgot. Vienna\'s memory is buried.\",im:\"It\'s 180 AD. Roman soldiers stand here. It\'s 1900. Archaeologists dig. It\'s now. History is two meters down.\",t:\"Hoher Markt, Innere Stadt (U1/U3 to Stephansplatz). Roman Museum underground €5. The plaza is beautiful. The past is underground. Both matter.",c:["history_big"],r:"g",nn:"Hoher Markt and the Roman Wall Ghost Markt — Zentrum",ns:"Täglich Farbe und Leben—wo Stadt isst.",nst:"Der Markt ist täglich oder wöchentlich. Obst, Gemüse, Blumen, Käse. Bauern schreien. Menschen bummel. Es ist Farbe und Lärm.",nt:"Kostenlos spazieren. Produkte kosten normal (Obst €2-5, Käse €10-15). Beste Zeit: Morgen 8-12 Uhr. Samstag voller Leute. Sehr authentisch."},
  {id:54,n:"Kunsthalle Wien and Contemporary Bite",a:"Neubau",v:["beautiful", "local"],d:54,s:"Where Vienna argues with now",st:"Vienna has centuries. This place is about today. Contemporary art. Provocative. Sometimes trash. Sometimes transcendent. The building is a white cube in Museumsquartier. Inside is Vienna\'s present tense.",im:"It\'s today. An artist challenges. Austria watches. The conversation continues.",t:"Vienna has centuries. This place is about today. Contemporary art. Provocative. Sometimes trash. Sometimes transcendent. The building is a white cube in Museumsquartier. Inside is Vienna\'s present tense.\",im:\"It\'s today. An artist challenges. Austria watches. The conversation continues.\",t:\"Museumsplatz 1, Neubau (U2 to Museumsquartier). €15. Go on Thursday evening when young Vienna crowds the café. The art is secondary.",c:["architecture"],r:"g",nn:"Kunsthalle Wien and Contemporary Bite Galerie — Zentrum",ns:"Kunstwerke and Geschichte—wo Schönheit lebt.",nst:"Die Galerie zeigt Kunstwerke von Künstlern (alt oder neu). Malerei, Skulptur, Installation. Jedes Werk hat Sinn. Es ist Denken visualisiert.",nt:"€6-15 Eintritt. Täglich 10-18 Uhr (Montag oft geschlossen, Mittwoch bis 21 Uhr). Audioguide kostenlos. Café oft vorhanden. Sehr zugänglich."},
  {id:55,n:"Grinzing Wine Village and Tourist Trap Redemption",a:"Döbling",v:["local", "beautiful"],d:55,s:"Tourist trap that somehow stays real",st:"Heurigers (wine taverns) crowd a neighborhood of vineyards. Tourist buses park. But locals still come to their regular place. Sit in a courtyard. Drink new wine. Eat simple food. The tourists are irrelevant if you arrive early.",im:"It\'s autumn. New wine just made. A man drinks from a glass. His grandfather drank from the same glass in the same place. Vienna continues.",t:"Heurigers (wine taverns) crowd a neighborhood of vineyards. Tourist buses park. But locals still come to their regular place. Sit in a courtyard. Drink new wine. Eat simple food. The tourists are irrelevant if you arrive early.\",im:\"It\'s autumn. New wine just made. A man drinks from a glass. His grandfather drank from the same glass in the same place. Vienna continues.\",t:\"Grinzing (tram 38 from center, 20 min). Arrive 6-7pm weekdays. Heurige charge €1-3 per glass. Bring cash. Ask locals which Heurige. Go there.",c:["local_only"],r:"g",nn:"Grinzing Wine Village and Tourist Trap Redemption — Zentrum",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:56,n:"Minoritenkirche Crypt — Innere Stadt",a:"Innere Stadt",v:["history", "hidden", "quiet"],d:56,s:"Italian church hiding beneath Vienna\'s oldest square",st:"Descend into the vaulted crypt where Habsburg nobles rested. The church itself dates to 1339. Above, tourists rush through the piazza. Below, you\'re in medieval Vienna. Candlelight reflects off stone tombs. Time stops.",im:"It\'s 1350. A merchant\'s wife descends these steps for her funeral mass. Torches flicker. The ceiling is so low you crouch. Prayers echo off crypts that will hold bodies for 600 more years.",t:"Descend into the vaulted crypt where Habsburg nobles rested. The church itself dates to 1339. Above, tourists rush through the piazza. Below, you\'re in medieval Vienna. Candlelight reflects off stone tombs. Time stops.\",im:\"It\'s 1350. A merchant\'s wife descends these steps for her funeral mass. Torches flicker. The ceiling is so low you crouch. Prayers echo off crypts that will hold bodies for 600 more years.\",t:\"Minoritenplatz 2A, Innere Stadt. Entry free. Open 9am-6pm weekdays. The crypt is accessed through the main church. Ring the bell if closed.",c:["history_big", "famous_dead"],r:"g",nn:"Minoritenkirche Crypt Kirche — Innere Stadt",ns:"Gotisch oder barock—wo Glaube in Stein ist.",nst:"Du trittst in die Kirche. Licht kommt durch Fenster. Deckenmalerei, Altäre, Glocken. Es ist heilig und zeitlos. Deine Stimme hallt.",nt:"Kostenlos eintritt. Täglich 8-18 Uhr (manche bis 19 Uhr). Konzerte gelegentlich €10-20. Sehr ruhig und meditativ. Respekt für Beter."},
  {id:57,n:"Augarten Baroque Symmetry — Leopoldstadt",a:"Leopoldstadt",v:["beautiful", "history", "free"],d:57,s:"Royal palace gardens where Vienna\'s oldest porcelain was fired",st:"Walk the perfectly straight tree-lined alleys of this Baroque dream. Fountains, sculptures, and silence. There\'s a porcelain factory on the grounds still making china. Few tourists find this place. It\'s free. The light here is golden at sunset.",im:"It\'s 1704. The Emperor\'s architects align the trees perfectly. A courtier walks these gravel paths, knowing every tree was planted for his eyes. Birds sing the same songs they always have.",t:"Walk the perfectly straight tree-lined alleys of this Baroque dream. Fountains, sculptures, and silence. There\'s a porcelain factory on the grounds still making china. Few tourists find this place. It\'s free. The light here is golden at sunset.\",im:\"It\'s 1704. The Emperor\'s architects align the trees perfectly. A courtier walks these gravel paths, knowing every tree was planted for his eyes. Birds sing the same songs they always have.\",t:\"Obere Augartenstrasse, Leopoldstadt. Free entry. Tram 5 to Augartenstrasse. Best at dawn or dusk. Bring a blanket. The porcelain museum inside costs €8.",c:["parks", "architecture"],r:"g",nn:"Augarten Baroque Symmetry Garten — Leopoldstadt",ns:"Botanisch oder geometrisch—Natur als Kunst.",nst:"Der Garten ist gepflanzt mit Kunst. Blumen überall, Fountains, Statuen. Im Sommer Blüten. Du wandelst wie in Gemälde.",nt:"€5-10 Eintritt. Täglich 9-18 Uhr (Winter kürzer). Beste Zeit: Frühling/Sommer wenn Blüten. Audioguide oft kostenlos. Café im Garten."},
  {id:58,n:"Jewish Quarter Judenplatz — Innere Stadt",a:"Innere Stadt",v:["history", "quiet", "weird"],d:58,s:"Medieval Jewish Vienna frozen in underground foundations",st:"The square is innocent now. Families sit on benches. But beneath your feet are the foundations of a medieval synagogue destroyed in 1421. Glass memorials show the outline of 3,000 murdered lives. The memorial is austere and haunting. Names of Austrian concentration camp victims are carved into the ground.",im:"It\'s 1420. A rabbi leads prayers. Candlelight bounces off stone walls. No one knows that in 500 years, these walls will be torn down and the space will become a memorial to absence.",t:"The square is innocent now. Families sit on benches. But beneath your feet are the foundations of a medieval synagogue destroyed in 1421. Glass memorials show the outline of 3,000 murdered lives. The memorial is austere and haunting. Names of Austrian concentration camp victims are carved into the ground.\",im:\"It\'s 1420. A rabbi leads prayers. Candlelight bounces off stone walls. No one knows that in 500 years, these walls will be torn down and the space will become a memorial to absence.\",t:\"Judenplatz 8, Innere Stadt. Free to walk. U-Bahn U2 Stephansplatz. The Jewish Museum in the square is €10. Stand silent at the memorial.",c:["history_big", "scary", "famous_dead"],r:"g",nn:"Jewish Quarter Judenplatz Platz — Innere Stadt",ns:"Zentral und belebt—Herz der Stadt.",nst:"Der Platz ist pulsierend. Brunnen, Restaurants, Menschen von überall. Es ist wo City trifft. Du gehörst sofort dazu.",nt:"Kostenlos spazieren. Restaurants €12-25. Cafés €3-6. Beste Zeit: Abend wenn Lichter an. Märkte gelegentlich auf Platz. Sehr touristisch aber authentisch."},
  {id:59,n:"Donaukanal Graffiti Mile — Leopoldstadt/Alsergrund",a:"Leopoldstadt",v:["street_art", "hidden", "local"],d:59,s:"A 7km open-air gallery where Vienna\'s youth writes the future",st:"Follow the Donaukanal from Friedensbrücke to Vorgartenstrasse. The walls are alive. Constantly changing. Some pieces take weeks to complete. Others get covered overnight. This is real street culture—not sanitized for tourists. Tags, political art, love declarations, abstract dreams.",im:"It\'s midnight. A crew brings spray cans. They\'ve planned this piece for two weeks. Colors bloom on concrete. By dawn, half the city will see their work. Their names will be known to other writers for years.",t:"Follow the Donaukanal from Friedensbrücke to Vorgartenstrasse. The walls are alive. Constantly changing. Some pieces take weeks to complete. Others get covered overnight. This is real street culture—not sanitized for tourists. Tags, political art, love declarations, abstract dreams.\",im:\"It\'s midnight. A crew brings spray cans. They\'ve planned this piece for two weeks. Colors bloom on concrete. By dawn, half the city will see their work. Their names will be known to other writers for years.\",t:\"Start Friedensbrücke (U-Bahn U6). Walk along the canal north. Bring a camera. Friday-Sunday evenings are most active. Respect artists—don\'t touch wet paint. Free.",c:["street_art", "local_only"],r:"g",nn:"Donaukanal Graffiti Mile — Leopoldstadt/Alsergrund",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
