<script>
const P = [
  {id:1,n:"The Bund — Shanghai's Historic Waterfront",a:"Huangpu District",v:["history", "beautiful", "architecture", "views"],d:45,s:"A mile-long promenade of colonial-era European architecture overlooking the Huangpu River, transformed from a muddy trading post into a symbol of Shanghai's rise.",st:"When European traders arrived in the 1840s, the Bund was a swampy riverbank where vessels could barely moor. By the 1920s, Shanghai's famous 'Paris of the East' was born—British banks, French restaurants, and American luxury hotels lined this stretch. Walk past the 1923 Custom House with its iconic clock tower, the 1916 Hong Kong & Shanghai Bank building with its ornate Greek marble halls, and imagine the jazz-filled evenings when the Cathay Hotel hosted Hollywood stars. The riverfront was dynamically transformed during the 2010 Expo; today it's where modern Shanghai gazes upon Pudong's futuristic skyline.",im:"A misty dawn in 1920: tuxedoed businessmen stepping from a Rolls-Royce into the marble lobby of the Cathay Hotel, their silhouettes framed by art-deco columns as servants in white gloves await—this was Shanghai's golden hour of foreign wealth and intrigue.",t:"Walk the full 1.5 km promenade at sunrise or sunset for clearer views. Avoid peak hours (11am-3pm). The M10 subway line stops at Nanjing Road East; walk south toward the river. Ferries depart from Bund Tourist Tunnel station.",c:[],r:"g",nn:"外滩",ns:"上海标志性的欧洲风格河滨建筑群",nst:"1840年代起，外滩从泥滩逐渐发展成上海国际大都市的象征。如今这里保存了30多座建筑群，见证了上海从开埠到繁荣的整个历史。",nt:"乘坐地铁10号线抵达南京路东站，向南步行即可抵达河滨。日出或日落时游览视野最佳。"},
  {id:2,n:"City God Temple — Ancient Sacred Market",a:"Huangpu District",v:["history", "local", "hidden", "architecture"],d:30,s:"A 600-year-old Taoist temple in the heart of the old Chinese quarter, surrounded by a bustling traditional marketplace where silk merchants and fortune-tellers still conduct business.",st:"The City God Temple was first built in 1373 and rebuilt after fires and wars repeatedly razed it—its resilience mirrored Shanghai's own. Inside, locals burn incense before the deity Yu, protector of the city. The temple courtyard fills with the aroma of joss sticks and the clatter of divination blocks. Around it sprawls the Yu Garden Bazaar, a warren of two-story wooden stalls dating to the 1780s where merchants hawk silks, jade, and antique scrolls. This living museum is where Shanghai's old China persists: elderly women purchase herbs in tiny apothecaries, children grab sticky rice dumplings from street vendors, and traditional Chinese opera drifts from hidden teahouses.",im:"A merchant's hand unfurling a bolt of Song Dynasty-patterned silk in a candlelit shop where the same family has traded textiles for four generations—dust motes dance in narrow beams of afternoon light, and the smell of aged paper and indigo fills the cramped stall.",t:"Located on Fangbang Road. Best visited on weekday mornings when crowds are thinner. The temple's main hall opens 9am-5pm daily. Expect crowded, narrow lanes; stay alert to pickpockets in bazaar. Nearby Yu Garden is worth a separate 2-hour visit.",c:[],r:"g",nn:"城隍庙",ns:"六百年历史的道教寺庙，周围是传统街市",nst:"建于1373年的城隍庙见证了上海的历史沧桑。周边的豫园集市是传统手工艺品、丝绸和古董的聚集地。",nt:"位于方浜路。建议工作日上午游览，避开人潮。每日9时至17时开放。"},
  {id:3,n:"Yu Garden — Suzhou-Style Masterpiece",a:"Huangpu District",v:["beautiful", "history", "architecture", "art"],d:90,s:"A 400-year-old classical Chinese garden featuring intricate pavilions, limestone rockeries, and lotus ponds—a rare surviving example of Ming Dynasty landscape design.",st:"Built in 1577 by Pan Yunduan, a Ming Dynasty official, Yu Garden was designed to 'bring the universe into a small garden.' Every stone was hand-selected, every arch calculated to frame a perfect view. The garden suffered through centuries: Qing occupation, Japanese invasion, Cultural Revolution. Yet the stones remember. Walk the twisting corridors where nine-turn bridges take you from the Hall of Jade Magnificence to the Fishery Pavilion overlooking koi-filled waters. The garden's designers understood something essential: restraint creates infinity. Every turn reveals a new composition—a curved roof against clouds, a pool reflecting symmetrical buildings, a century-old tree framed by a moon-gate doorway.",im:"A scholar in 1577 standing alone in morning mist, watching a crane lift off from the garden pool—his brush will paint this moment on silk, and his brush strokes will guide visitors' eyes along the same path for the next 450 years.",t:"Enter from South Lane (Nanmen). Opens 8:30am-10pm daily. Very crowded—arrive by 7:30am to beat tour groups. The garden rewards slow exploration; allow at least 2 hours. Audio guides available in English. Photography is allowed but light is best mid-morning.",c:[],r:"g",nn:"豫园",ns:"四百年历史的古典园林，精致的亭阁和池塘",nst:"1577年建造的豫园是明代园林设计的珍品。通过蜿蜒的走廊和精心设计的框景，园林设计者将整个宇宙浓缩在方寸之间。",nt:"从南门进入。每日8时30分至22时开放。清晨7时30分前抵达可避开旅游团。建议停留2小时以上。"},
  {id:4,n:"Jing'an Temple — Modern Zen Amid Skyscrapers",a:"Jing'an District",v:["history", "beautiful", "architecture"],d:45,s:"A 1,600-year-old Buddhist temple reconstructed in 2010, striking an unusual balance between ancient meditation practice and contemporary architecture.",st:"Founded in 247 CE, Jing'an Temple has been destroyed and rebuilt sixteen times—a metaphor for Shanghai itself. The latest incarnation, completed in 2010, is a stunning 99-meter-tall pagoda clad in copper that glows amber at sunset. Inside, monks chant sutras in a hall that somehow feels both sacred and modern. The surrounding neighborhood, Jing'an, boasts luxury malls and five-star hotels, yet the temple maintains its meditative core. Stand in the main hall, incense smoke curling toward the ceiling, and feel the strange peace of ancient ritual thriving in one of Asia's most frenetic cities.",im:"A monk in grey robes, aged 80, rings the temple bell at dawn precisely as his predecessors did 400 years ago, while construction cranes swing beyond the temple walls, building the future Shanghai.",t:"Located on Nanjing West Road. Subway Line 2, 7, or 13 to Jing'an Temple Station. Temple opens 8am-5pm. Entry is free for visitors; respectful dress required (covered shoulders and knees). Photography allowed in gardens but not during active worship.",c:[],r:"g",nn:"静安寺",ns:"1600年历史的佛教寺庙，融合现代建筑与古老传统",nst:"静安寺建于247年，历经重建。2010年重建的99米铜制塔在日落时闪闪发光，与周围摩天大楼形成独特对比。",nt:"位于南京西路。可乘坐地铁2、7、13号线至静安寺站。每日8时至17时开放。进寺参观需穿着得体。"},
  {id:5,n:"Longhua Ancient Temple — Dawn Bell Ceremony",a:"Huangpu District",v:["history", "local", "beautiful"],d:60,s:"Shanghai's oldest temple, dating to 977 CE, famous for its dawn bell ceremony and octagonal pagoda that has survived earthquakes, wars, and revolutions.",st:"At 4:30 am on temple festival days, pilgrims gather in the darkness waiting for the first bell. When struck, 108 times—representing the 108 human afflictions—the bronze bell's resonance seems to cleanse the air itself. Longhua Temple's pagoda, built in 977 CE, is the only remaining structure predating Shanghai's rise as a colonial port. It has endured the 1855 Small Sword Rebellion, Japanese bombing, and decades of state neglect. The temple courtyard smells of earth, ancient wood, and incense. Around the pagoda's base, worn stones bear carved Buddhist motifs from the Song Dynasty. Pilgrims still come—not just tourists, but residents seeking blessing before a business deal or a hospital surgery.",im:"In pre-dawn darkness, a 73-year-old woman in a quilted jacket kneels before the temple altar with flowers and fruits, whispering a prayer for her grandson's exam results—the same prayer her grandmother whispered here seventy years ago.",t:"Located on Longhua Road. Subway Line 8 to Longhua Road Station. Bell ceremony on lunar festival days (check calendar). Regular visits 8am-4pm. The pagoda interior is off-limits but the surrounding temple grounds are accessible. Photography respectfully allowed.",c:[],r:"g",nn:"龙华寺",ns:"977年建成的上海最古老的寺庙，以清晨撞钟仪式而闻名",nst:"龙华寺的塔是上海开埠前仅存的建筑。每个节日清晨，敲108下钟声，代表108种人生烦恼的超脱。",nt:"位于龙华路。乘坐地铁8号线至龙华路站。撞钟仪式在农历节日举行。日常开放时间8时至16时。"},
  {id:6,n:"Oriental Pearl Tower — Vertiginous Modernity",a:"Pudong",v:["views", "architecture", "beautiful"],d:90,s:"A 468-meter tower completed in 1995 that defined Shanghai's modern skyline—visit the observation levels for dizzying 360-degree vistas of the city.",st:"When the Oriental Pearl Tower was completed in 1995, it was Asia's tallest structure. Critics called it gaudy: two massive spheres connected by a stem, like a lollipop. But stand at 263 meters on the main observation deck and you understand its audacity. Shanghai spreads beneath you—the river's curve, the Bund's colonial facades dwarfed by Pudong's glass towers, the industrial graveyard of Huangpu becoming parkland. The tower's designer, Jiang Huancheng, wanted visitors to feel suspended between earth and sky. At night, the spheres glow neon pink and purple. Take the express elevator to the upper sphere (348m) for an experience that feels like floating above the city. Below, the base houses a museum of Shanghai's transformation from fishing village to megacity.",im:"A businessman in 1995 standing in the empty observation sphere before it officially opens, looking down at Shanghai for the first time from this height—his silhouette small against endless windows, the future city stretching infinitely beneath him.",t:"Located in Lujiazui, Pudong. Subway Line 2 to Lujiazui Station. Open 8am-11pm daily. The main observation deck is most impressive; the base has a museum and aquarium. Avoid midday sun for photography; early morning light is superior. Express elevator queues can be long; visit off-season or early morning.",c:[],r:"g",nn:"东方明珠电视塔",ns:"468米高的现代塔楼，俯瞰整个上海",nst:"1995年完成的东方明珠电视塔是上海现代化的象征。从塔顶眺望，整个城市铺展在脚下。",nt:"位于陆家嘴，浦东。乘坐地铁2号线至陆家嘴站。每日8时至23时开放。清晨光线最佳。"},
  {id:7,n:"Shanghai Museum — Art and Antiquities Masterpiece",a:"Huangpu District",v:["art", "history", "beautiful"],d:120,s:"A world-class museum showcasing Chinese bronze vessels, ceramics, calligraphy, and furniture across five millennia—one of China's finest collections.",st:"The Shanghai Museum's building, opened in 1996, is itself an artwork: a traditional bronze ding (ritual vessel) shape topped by a modern crown. Inside, 120,000 objects tell China's story. The Bronze Gallery contains vessels from the Shang Dynasty inscribed with oracle bones and ritual meanings—items that were already ancient when Greek philosophers were writing. The Ceramics Gallery traces 8,000 years of kiln masters perfecting their craft. Stand before a Song Dynasty vase, and you're seeing the pinnacle of porcelain: paper-thin white celadon that catches light like captured mist. The Calligraphy Gallery houses works by Tang poets whose brushstrokes feel like meditation made visible. Few museums anywhere better convey the continuous thread of human creativity.",im:"A Song Dynasty potter, hands stained indigo from cobalt glaze, examining a just-fired vase by candlelight—knowing this bowl will outlast empires, will be admired by strangers a thousand years hence.",t:"Located on Renmin Avenue, Huangpu District. Subway Line 1 or 2 to People's Square Station. Open 9am-5pm, closed Mondays. Admission RMB 12. Allow 3-4 hours minimum. English audio guide highly recommended. Photography without flash allowed in most galleries.",c:[],r:"g",nn:"上海博物馆",ns:"收藏五千年中国古代艺术品的顶级博物馆",nst:"上海博物馆收藏了12万件中国古代文物，包括商代青铜器、瓷器、书法和家具。是中国艺术文化的集大成之作。",nt:"位于人民大道。乘坐地铁1、2号线至人民广场站。每日9时至17时开放，周一休馆。建议留出3-4小时浏览。"},
  {id:8,n:"Tianzifang — Artsy Alleyway Village",a:"Huangpu District",v:["art", "local", "hidden"],d:90,s:"A preserved alleyway neighborhood filled with galleries, tea houses, antique shops, and artist studios—a pocket of bohemian Shanghai nestled between the modern grid.",st:"Tianzifang shouldn't exist in modern Shanghai, yet there it is: a warren of 1920s lane houses where artists have colonized old workers' quarters. Walk through the shikumen alleys—those distinctive two-story structures with stone-framed doors—and you time-travel. A gallery occupies what was once a silk merchant's storage room. A tea house serves in what was a communal kitchen. Artists' studios spill onto the lanes; painters exhibit canvases in tiny rooms where natural light filters through paper windows. It's not undiscovered—there are tourists and souvenir shops—but a genuine creative community endures here. Chat with a photographer in her studio, sip oolong in a family-run teahouse run by the same family for 20 years, and understand that Shanghai's future is not only vertical glass towers but also these horizontal worlds of human scale.",im:"A painter's studio at 6pm, afternoon light falling across half-finished canvases, while outside the alley a young couple photographs each other against a graffitied wall—the past and future of Shanghai breathing in the same space.",t:"Located on Taiyang Road, Huangpu District. Subway Line 10 to Dapu Road Station, then 10-minute walk. Open all day; best visited on weekday afternoons. The alley is narrow; avoid weekends if you dislike crowds. Respect artists' privacy; ask permission before photographing studios.",c:[],r:"g",nn:"田子坊",ns:"1920年代的老弄堂，现已成为艺术家聚集地",nst:"田子坊的老弄堂里有艺术工作室、画廊、茶馆。这是保留下来的上海旧时风貌与现代艺术创意的结合。",nt:"位于太阳路。乘坐地铁10号线至大普路站，步行10分钟可达。工作日下午人少。周末游客众多。"},
  {id:9,n:"Waibaidu Bridge — Architectural Heritage",a:"Huangpu District",v:["history", "architecture", "beautiful"],d:20,s:"Shanghai's oldest steel bridge, built in 1907, now beautifully restored—a feat of early 20th-century engineering linking Puxi and Pudong.",st:"When the Waibaidu Bridge opened in 1907, it was the longest steel bridge in Asia. An American engineer designed it; British investors financed it. The bridge's curved steel arch is a ballet of engineering—thousands of rivets hold together a span that feels impossibly delicate yet has borne millions of feet. For over a century, commuters, refugees, invaders, and dreamers have crossed this bridge. Japanese soldiers marched across during occupation; revolutionaries used it as a rendezvous point. Today, photographers flock here at sunset, when the bridge's shadow falls perfectly across the Huangpu River. The bridge connects two Shanghais: the colonial past on the Bund (Puxi side) and the futuristic skyline of Pudong. Stand at the center and you literally stand between old and new.",im:"A rickshaw puller in 1910, legs pumping over the bridge's deck, beneath a foreign flag, pulling an English businessman toward the warehouses of the Bund—a moment of imperial commerce frozen on steel.",t:"Crosses the Huangpu River between Bund (North-East) and Pudong (South-West). Best viewed and walked during golden hour (sunset). The bridge walkway is pedestrian-friendly and rarely crowded. Photography position: center of bridge facing either direction.",c:[],r:"g",nn:"外白渡桥",ns:"1907年建成的亚洲最早的钢铁大桥",nst:"外白渡桥连接浦西和浦东，见证了上海一个多世纪的沧桑。桥上的工业美学令众多摄影师为之倾心。",nt:"跨越黄浦江。日落时游览效果最佳。桥面宽敞，行人众多时请注意安全。"},
  {id:10,n:"Juyongguan Underground City — Cold War Relic",a:"Day Trips",v:["history", "hidden"],d:180,s:"A vast underground bunker complex built in the 1960s as a nuclear fallout shelter—a ghostly time capsule of Cold War paranoia.",st:"In 1965, at the height of Sino-Soviet tensions and fears of nuclear war, Shanghai's government secretly began excavating beneath the city. Over the course of years, workers carved an underground network of tunnels, storage chambers, and barracks. The Underground City spans 6.7 square miles and could theoretically house 700,000 people. Today, most remains inaccessible, but a small section is open to visitors. Walk through dim corridors lined with shops built but never open, a vegetable garden frozen in time, bedrooms carved from living rock. It feels like a city abandoned mid-construction, waiting for an invasion that never came. The walls still bear faded Cultural Revolution slogans. The air is cool, timeless. This is urban archaeology—a city built on top of a city built on top of fear.",im:"A young soldier in 1966, standing alone in a finished but empty shopping arcade carved from stone, looking at mock storefronts, knowing he may never see the sun again if war comes—the fluorescent lights hum, casting shadows on bare walls.",t:"Located beneath Huangpu District. Access requires joining a tour (hotels can arrange). Tours depart daily 9am-5pm. Wear warm clothing; temperatures stay around 12°C. The site is not easily accessible independently; guided tours are mandatory. Approximately 2-hour tours available.",c:[],r:"g",nn:"地下城",ns:"1960年代建成的冷战时期防核武器避难所",nst:"地下城可容纳70万人，是冷战时期的产物。今天部分开放参观，时光在此凝固。",nt:"位于黄浦区地下。需参加导游团参观。每日9时至17时出发。内部温度约12摄氏度，需穿暖和衣物。"},
  {id:11,n:"M50 Creative Park — Industrial Repurposing",a:"Putuo District",v:["art", "local", "architecture"],d:90,s:"A sprawling complex of former textile mills and factories converted into artist studios, galleries, and creative spaces—Shanghai's largest artist colony.",st:"The buildings here date to the 1920s-1950s, when Shanghai's textile industry employed hundreds of thousands. Smokestacks rose above the Suzhou Creek. Then globalization hollowed the industry. In the early 2000s, artists—priced out of central Shanghai—discovered these cavernous, light-flooded spaces with soaring ceilings and original machinery. Today, 150+ artist studios occupy the red-brick warehouses. Walk through labyrinthine corridors where a sculptor shares studio space with a documentary filmmaker; where an oil painter's workspace overlooks textile looms that haven't moved in 50 years. The texture is raw: exposed brick, industrial skylights, the echoes of looms' rhythms still haunting the air.",im:"A weaver's loom from the 1930s, unmoved and silent, standing in a gallery where contemporary photographs hang on whitewashed walls—past and present machines of making, both now monuments to human creativity.",t:"Located on Moganshan Road, Putuo District. Subway Line 1, 3, or 4 to nearby stations. Open generally 10am-6pm; individual galleries have varying hours. Most studios welcome visitors but respect working artists' time. Photography usually permitted with permission.",c:[],r:"g",nn:"50号美术馆",ns:"被改造成艺术工作室的旧纺织厂建筑群",nst:"M50创意园是上海最大的艺术家聚居地。150多个艺术工作室占据了1920-1950年代的老仓库。",nt:"位于莫干山路。乘坐地铁1、3、4号线至附近站点。通常10时至18时开放。进入工作室前请尊重艺术家。"},
  {id:12,n:"Former French Concession — Leafy Elegance",a:"Huangpu District",v:["history", "beautiful", "local"],d:120,s:"A tree-lined neighborhood of low-rise villas, lane houses, and tree-shaded streets—the most charming surviving colonial district in Shanghai.",st:"From 1849 to 1943, this neighborhood belonged to France. French colonizers planted sycamores and established Parisian-style blocks. The streets still bear French names (rendered in Chinese): Julu Road (Rue Julien), Wulumuqi Road (Rue Moulière). Walk Wulumuqi Road and you feel transported: tree canopies overhead, early-20th-century villas behind wrought-iron gates, a café smell of croissants drifting from restored houses. Sun Yat-sen, the revolutionary who overthrew the Qing Dynasty, lived here in exile. Coco Chanel spent years in this district. The neighborhood resisted demolition through sheer charm. Today, it's become trendy: boutique hotels, coffee shops, galleries. But walk the side lanes at dawn, and you find the old concession's true character—quiet, tree-dappled, human-scaled, with echoes of a romantic past.",im:"A French diplomat's wife in 1930, parasol aloft, walking beneath sycamore trees with her terrier, the smell of oleander mixing with distant jazz from a hidden club—her life in Shanghai a golden parenthesis before history resumes.",t:"Covers much of Huangpu District. Subway Line 1 to Huangpi Road Station or Line 10 to Julu Road Station. Best explored on foot; the neighborhood spans several kilometers. Wulumuqi Road and Julu Road are primary arteries. Pick a quiet side lane and wander; the architecture rewards slow exploration.",c:[],r:"g",nn:"法租界",ns:"法国租界遗留的树荫街道和别墅区",nst:"法租界保留了1849-1943年法国统治的痕迹。树荫街道、欧洲风格别墅、咖啡馆的香气都保存至今。",nt:"覆盖黄浦区大部分地区。乘坐地铁1号线至黄陂路站或10号线至巨鹿路站。步行探索最佳。"},
  {id:13,n:"Confucius Temple — Scholarly Sanctuary",a:"Minhang District",v:["history", "architecture", "local"],d:60,s:"A restored 15th-century Confucian temple featuring courtyards, meditation halls, and classical gardens—a peaceful refuge for studying ancient philosophy.",st:"Founded in 1534 during the Ming Dynasty, this temple was dedicated to Confucius, the sage whose philosophy shaped Chinese civilization. The main hall houses a statue of Confucius himself, though the temple's soul lies in its courtyards. Stone tablets inscribed with Confucian texts line the paths. A library once held thousands of manuscripts. During the Cultural Revolution, the temple was nearly destroyed; only recently has restoration returned it to functional beauty. Sit in the meditation garden where Confucian scholars once contemplated virtue and ritual. The temple exists in a timeless zone—noisy Shanghai just beyond the walls, yet here, ancient principles of harmony and order still govern the space. Few visitors find this temple; it remains a place where locals come for genuine reflection.",im:"A Ming Dynasty scholar, brush in hand, copying the Analects of Confucius in the temple library, candlelight moving across ancient pages, knowing his careful work will shape how millions understand virtue.",t:"Located in Minhang District on Longhua Road. Subway Line 8 to Huajing Road, then taxi or 15-minute walk. Open 9am-5pm. Admission minimal. Respectful dress required. The temple is less crowded than major sites; morning visits are serene. Photography allowed in most areas.",c:[],r:"g",nn:"文庙",ns:"15世纪建成的儒家庙宇，修复后重新开放",nst:"文庙建于1534年，供奉孔子。经过文化大革命的摧残，近年恢复了原有风貌。是修身养性的好去处。",nt:"位于闵行区龙华路。乘坐地铁8号线至华泾路站。每日9时至17时开放。需穿着得体。"},
  {id:14,n:"Suzhou Creek Waterfront — Industrial Archaeology",a:"Huangpu District",v:["history", "local", "art"],d:90,s:"A revitalized creek-side promenade where 19th-century warehouses now house galleries, cafés, and creative spaces—a pilgrimage route for artists and urban explorers.",st:"Suzhou Creek was Shanghai's industrial lifeline. Textile mills, sugar warehouses, soap factories clustered along its banks. The water ran black with effluent and dyes. Coolies hauled bales on wooden boats. Then industry moved away, leaving behind empty warehouses and toxic memory. In the past decade, artists and entrepreneurs reclaimed the creek's edge. A warehouse becomes a photography gallery. An old dock becomes an open-air wine bar. The water, cleaned up, now reflects restored red-brick facades. Walk the creek path, crossing low pedestrian bridges, and you walk through a palimpsest of urban transformation. The old Shanghai of labor and industry lives in the architecture; the new Shanghai of art and leisure lives in the reuse. It's a honest conversation between past and future, etched in brick.",im:"A young photographer in 2000, standing alone on a rotting dock at dawn, looking at derelict warehouses reflected in black water—imagining what could be, though the city planners have not yet dreamed it.",t:"Suzhou Creek runs east-west through Putuo and Huangpu districts. Best accessed from various subway stations along Lines 1, 2, 3, 8. The northern path (Putuo side) has the most galleries and restaurants. Allow 2-3 hours for a leisurely walk. Morning light best for photography.",c:[],r:"g",nn:"苏州河滨",ns:"工业遗迹转变为艺术空间的河滨步道",nst:"苏州河曾是上海的工业中心。今天老仓库变成了美术馆、咖啡馆。过去与现在的对话在红砖上清晰可见。",nt:"苏州河穿过普陀和黄浦区。沿线多个地铁站可到达。北岸（普陀一侧）有更多美术馆和餐厅。步行需2-3小时。"},
  {id:15,n:"Jade Buddha Temple — Serene Meditation",a:"Putuo District",v:["history", "beautiful", "local"],d:60,s:"One of Shanghai's most important Buddhist temples, housing precious jade Buddha statues and hosting thousands of pilgrims during lunar festivals.",st:"In 1882, a Burmese merchant brought two jade Buddha statues to Shanghai aboard a ship. A temple was built to house them. The main hall holds the Jade Buddha himself—1.95 meters tall, carved from a single block of jade stone, brought from Shan State in Burma. The Buddha's face exhibits serene compassion; his robe is carved with such delicacy that stone becomes fabric. Around him, monks chant daily. On Chinese New Year, thousands of pilgrims press into the temple, incense smoke so thick it clouds the halls. The atmosphere oscillates between tranquility and chaos—in the inner sanctum, profound silence; in the courtyards, the crush of humanity seeking blessing. The temple's vegetarian restaurant serves exceptional food; funds support the monastic order. This is a working temple, not a museum—a living institution where Buddhism persists in modern Shanghai.",im:"A monk, aged sixty, with a serene face, lighting incense before the jade Buddha—his grandfather's grandfather performed this same action in this temple 120 years ago, and he knows his grandson's grandson may do the same.",t:"Located on Anyuan Road, Putuo District. Subway Line 2 to Jing'an Temple Station, then walk. Or Line 7 to Changshou Road. Open 8:30am-5pm. Vegetarian restaurant open 11am-2pm. Arrive early to avoid crowds. Respectful dress required; shoes must be removed in main hall.",c:[],r:"g",nn:"玉佛寺",ns:"上海重要的佛教寺庙，收藏珍贵的玉佛",nst:"玉佛寺建于1882年，收藏两尊缅甸玉佛。主佛由一块玉石雕成，显现无比宁静的表情。",nt:"位于安远路。乘坐地铁2号线至静安寺站或7号线至长寿路站。每日8时30分至17时开放。素食餐厅11时至14时营业。"},
  {id:16,n:"Shanghai Old Street — Qing Dynasty Commerce",a:"Huangpu District",v:["history", "local", "food"],d:45,s:"A preserved shopping street from the Qing Dynasty featuring traditional architecture and classic Shanghai snacks—a glimpse of pre-modern commercial life.",st:"Shanghai Old Street (Lao Jie) was the commercial heart of Shanghai during the late Qing Dynasty. Its wooden-frame buildings with tile roofs and carved eaves represent 18th-19th century commercial architecture. The street has been recently renovated but preserves authenticity: narrow lanes, small shopfronts, traditional craft studios. You can watch artisans make silk lanterns, traditional medicines, wooden toys—skills nearly lost. The street's restaurants serve authentic Shanghai cuisine: xiaolongbao (soup dumplings), jianbing (flatbread), soy-braised meat. An elderly woman still makes hand-pulled noodles the way her grandmother did. It's touristy now, but the bones are real; walk early morning when tour groups haven't arrived, and you feel the street's true character.",im:"A silk lantern maker, aged 75, sitting at his workbench in the same shop where his father worked, painstakingly tying bamboo strips and gluing silk—his hands know this craft so well they don't need eyes to guide them.",t:"Located near Yu Garden area on Fangbang Road. Subway Line 10 to Xiaolongbao Station. Open 10am-10pm. Best visited mornings or off-season. Restaurants often have long waits during lunch and dinner. Photography generally welcomed; be respectful to artisans.",c:[],r:"g",nn:"上海老街",ns:"清代商业街，保留了传统建筑和经典小吃",nst:"老街是清代上海的商业中心。虽然已翻新，但仍保持传统风貌。手工艺人仍在制作绸灯笼和传统食品。",nt:"位于方浜路。乘坐地铁10号线至小笼包站。每日10时至22时开放。早晨游客较少。午餐时段排队人多。"},
  {id:17,n:"Pudong Skyline — Vertical Ambition",a:"Pudong",v:["views", "architecture", "beautiful"],d:180,s:"Shanghai's gleaming downtown, home to the Shanghai Tower (632m), Jin Mao Tower, and the Shanghai World Financial Center—the world's densest concentration of supertall buildings.",st:"Thirty-five years ago, Pudong was farmland. Today, it's a forest of supertall buildings competing for height, creating a vertical city unprecedented in human history. The Shanghai Tower, completed in 2015, is 632 meters—the second-tallest building on Earth. Inside, 128 floors spiral upward; the observation deck at 546 meters offers views across all Shanghai. The building's engineers rotated each section slightly to reduce wind pressure; climbers report less swaying at the peak than in conventional skyscrapers. Around it, the Jin Mao Tower (1998) looks quaint at 420 meters. The Shanghai World Financial Center dominates the skyline's center. Architects debate whether this vertical concentration is visionary or dystopian. Visitors gasp. The scale overwhelms. Walk among these towers at night and you feel simultaneously insignificant and exalted—a human body dwarfed by human achievement.",im:"A construction worker in 1990, standing in a Pudong rice field at sunset, watching earthmovers scrape a foundation, knowing his grandchildren will work in these towers that do not yet exist.",t:"Located in Pudong, Lujiazui financial district. Subway Line 2 to Lujiazui Station. Shanghai Tower open 8am-11pm; observation deck at 546m highest and most impressive. Tickets around RMB 180. Best views at sunset. Allow 3-4 hours. Photography excellent from the tower and street level.",c:[],r:"g",nn:"浦东天际线",ns:"世界上最密集的摩天大楼群",nst:"35年前浦东还是农田。今天这里有世界最高的建筑群，包括632米高的上海中心。",nt:"位于浦东陆家嘴金融区。乘坐地铁2号线至陆家嘴站。上海中心观景台开放时间8时至23时。最佳观景时间是日落。"},
  {id:18,n:"Chongming Island — Rural Shanghai",a:"Day Trips",v:["nature", "local"],d:240,s:"A vast alluvial island at the Yangtze River's mouth where farms, gardens, and wetlands persist—a rural world entirely within Shanghai's municipality.",st:"Chongming Island rose from the Yangtze River's silt over the past 1,000 years. It is the world's youngest island, still growing—the Yangtze adds new land daily. Until the mid-2000s, the island was impoverished; farmers grew vegetables and kept ducks. Today, it's Shanghai's deliberate ecological preserve—mandated to remain agricultural and wetland, resisting development that consumes the rest of the city. Drive through Chongming and you see rice paddies, fish farms, orchards. Migratory birds rest here. The soil smells of earth and growth—a complete sensory reversal from Pudong's sterile air. The island's restaurants serve extraordinary fresh vegetables and grass-fed meat. Stay overnight and wake to roosters; fall asleep watching an actual sunrise over fields, not buildings. Chongming Island is Shanghai's secret: proof that within the megacity's skin, agrarian life still pulses.",im:"An old farmer, age 70, standing in his rice field, watching cranes descend at sunset—his family has farmed this island for six generations, and he is teaching his grandson that food comes from soil, not packages.",t:"Located north of Shanghai in the Yangtze River's mouth. Accessible by taxi, bus from downtown (1.5 hours), or bicycle ferry. Most visitors stay overnight in farmstays or agritourism resorts. Best visited spring (migratory birds) or autumn (harvest season). Roads are excellent; bicycle rental available.",c:[],r:"g",nn:"崇明岛",ns:"长江口的农业岛屿，充满田园风光",nst:"崇明岛是世界最年轻的岛屿，仍在长江淤泥中不断生长。岛上有农田、鱼塘、果园，是城市中的绿洲。",nt:"位于上海北部。可乘坐出租车或长途车到达（1.5小时）。最好住在农场民宿。春季看候鸟，秋季看收获。"},
  {id:19,n:"Zhujiajiao — Water Town Classic",a:"Day Trips",v:["beautiful", "local", "history"],d:180,s:"An ancient water town 30km from Shanghai featuring canals, stone bridges, and Ming Dynasty architecture—a glimpse of pre-modern Chinese commerce.",st:"Zhujiajiao has thrived for 1,700 years as a trading post on canals connecting the Yangtze River to the sea. When Shanghai became industrialized, Zhujiajiao remained frozen in time—Ming Dynasty bridges, Qing shops, family compounds intact. Today, boats still navigate its narrow canals. Walking the town, you cross stone arches built in the 1600s, step into shops where the proprietor's family has sold tea for 300 years, eat lunch on a waterfront deck above boats gliding below. The town was nearly demolished in the 1970s for development; preservation efforts saved it. Now it's Shanghai's most authentic remaining water town—not gentrified like some competitors, not overdeveloped. The air smells of water and wooden buildings and time.",im:"A merchant in 1750, negotiating the price of silk with a riverboat captain, the deal sealed with tea and handshake on a dock—the same dock still stands, the same tea is still served there.",t:"Located 30km northwest of Shanghai. Accessible by regular bus (45 minutes) or organized day tours. Entry fee around RMB 100. Allow 4-6 hours to properly explore. Stay overnight to appreciate the town after tourists depart. Boat rides available; local restaurants serve excellent river-caught fish.",c:[],r:"g",nn:"朱家角",ns:"1700年历史的水上古镇",nst:"朱家角拥有保存完好的明清建筑、石桥和河道。是了解前现代中国商业的窗口。",nt:"距上海30公里。乘坐长途车45分钟可达。门票约100元。建议停留4-6小时或过夜。可乘坐游船体验。"},
  {id:20,n:"Shanghai Tower 632m Observation Deck",a:"Pudong",v:["views", "architecture"],d:120,s:"The observation deck of the world's second-tallest building, offering unobstructed 360-degree views from 546 meters—a thrilling ascent into the clouds.",st:"The Shanghai Tower's observation deck opens at 546 meters—high enough that clouds pass below you on humid days. The ascent in the express elevator takes 55 seconds, rising at 10 meters per second. Your ears pop; your stomach lightens. Then you're there, surrounded by glass, the entire city spread beneath you. The tower's architecture becomes clear from above: its twisting form reducing wind stress, the gardens on the 5th floor visible like green jewels, the Huangpu River curving through the city like a brown silk ribbon. On a clear day, you see 50km in all directions. You can identify the Bund's colonial facades, Longhua Pagoda in the distance, the countryside beyond. The glass observation deck includes glass floor panels where the truly brave can stand and look directly down 546 meters—the vulnerability is visceral, thrilling.",im:"A child aged 6, pressing her palms against the glass, looking straight down at miniature cars moving in streets far below, understanding for the first time the true scale of cities and her own smallness.",t:"Entrance in Pudong, Lujiazui. Subway Line 2. Express elevator rapid ascent. Allow 2-3 hours total. Best visited during golden hour (sunset) for photography. Clear days offer the best views. Binoculars provided at observation deck. Cafés available at 549m level.",c:[],r:"g",nn:"上海中心632米观景台",ns:"世界第二高楼的观景台，俯瞰整个城市",nst:"观景台位于546米高度。乘坐高速电梯55秒抵达。晴天可看到50公里外的景观。",nt:"位于浦东陆家嘴。乘坐地铁2号线。建议停留2-3小时。日落时光线最佳。"},
  {id:21,n:"Shanghai Jewish Refugees Museum — WWII Sanctuary",a:"Huangpu District",v:["history", "hidden"],d:90,s:"A museum documenting the 20,000 Jewish refugees who found sanctuary in Shanghai during WWII—a unique and moving historical testament.",st:"Between 1933 and 1945, Shanghai accepted 20,000 European Jews fleeing Nazi persecution. It was one of the few places on Earth that didn't require visas. The refugees arrived in Shanghai with nothing, created a vibrant community in a designated zone near the Bund, and rebuilt their lives while Europe burned. The museum occupies a renovated 1927 building that housed Jewish refugees. Photographs show the Hongkew district transformed: synagogues, schools, newspapers, theaters—an entire society in microcosm. Survivors' testimonies play in the galleries. You walk through rooms where families crammed into tiny apartments, where a orchestra performed classical music to maintain sanity, where children attended school and fell in love. Many refugees stayed after 1945, becoming permanent Shanghai residents. This is a story of remarkable human resilience—and of a Chinese city that, indirectly, saved thousands of lives through open admission policies.",im:"A young Jewish violinist in 1943, playing Bach in a tiny Shanghai apartment while bombs fell elsewhere in Asia, the music a defiant assertion that culture survives, that the human spirit endures.",t:"Located on Changyang Road in Hongkew District. Subway Line 3, 8 to Dalian Road Station. Open 9am-5pm, closed Mondays. Admission RMB 50. Audio guide in English highly recommended. The museum is profoundly moving; allow 1.5-2 hours. Photography generally allowed.",c:[],r:"g",nn:"上海犹太难民纪念馆",ns:"记录二战期间犹太难民的博物馆",nst:"1933-1945年间，2万欧洲犹太人在上海避难。这是世界上独一无二的历史见证。",nt:"位于长阳路。乘坐地铁3、8号线至大连路站。每日9时至17时开放，周一休馆。门票50元。建议留出1.5-2小时参观。"},
  {id:22,n:"Huangpu River Evening Cruise — Twilight Passage",a:"Huangpu District",v:["views", "beautiful"],d:120,s:"A sunset boat cruise along the Huangpu River between the colonial Bund and Pudong's futuristic skyline—a journey through Shanghai's temporal geography.",st:"Board a sightseeing boat at sunset and the river becomes a stage. The sun falls behind the Bund's colonial architecture, turning its facades gold. The boat drifts past warehouses that once stored tea and silk, now converted into restaurants where diners watch the same river that fed their grandparents' commerce. As darkness falls, Pudong's lights ignite—the Oriental Pearl Tower glows pink, the Shanghai Tower's crown illuminates, millions of windows become constellations. The boat passes beneath the Waibaidu Bridge, crosses where coolies once hauled cargo, where invading armies once imposed their will. Below deck, restaurants serve dinner; on deck, passengers lean against railings, watching the temporal transition from colonial past to digital future, embodied in architecture, compressed into an hour's float. It's Shanghai's story in moving water and changing light.",im:"A couple in 1920, standing on this exact stretch of river on a steamship, watching the European traders' establishments rise—their descendant's descendant will stand here in 2026, watching digital buildings rise, the river eternally bearing witness.",t:"Multiple departure points: Bund Tourist Terminal, Nanpu Bridge area. Evening cruises depart 5:30pm-8pm. Journey lasts 1-2 hours depending on route. Tickets RMB 100-200. Book in advance. The 1.5-hour sunset cruise is optimal. Dinner packages available; otherwise bring snacks. Bring camera for photography; the light is exceptional.",c:[],r:"g",nn:"黄浦江夜游",ns:"黄昏时乘船游览黄浦江两岸风景",nst:"乘船观赏浦西老建筑与浦东现代摩天楼的对比。日落时光线最美。",nt:"外滩游客码头和南浦大桥附近有多个出发点。傍晚5时30分至20时出发。航程1-2小时。门票100-200元。"},
  {id:23,n:"Shanghai Science and Technology Museum — Interactive Learning",a:"Pudong",v:["art", "beautiful"],d:120,s:"A state-of-the-art science museum with interactive exhibits on technology, natural history, and innovation—excellent for families and curious minds.",st:"Opened in 2001, the Shanghai Science and Technology Museum is one of Asia's most visited science institutions. Its architecture itself educates: a spherical structure with organic curves suggesting biological growth. Inside, the Natural History section features preserved dinosaur specimens and geological wonders. The Robotics Hall showcases industrial and social robots—some interactive, demonstrating how AI is transforming work. The Technology Hall explains nanotechnology, clean energy, and computing evolution through hands-on displays. The planetarium shows the universe at 50x scale. What distinguishes this museum is its refusal to be didactic; visitors learn through play, exploration, and experimentation. Children manipulate gears and levers; adults contemplate AI ethics. The museum embodies Shanghai's self-image: a city simultaneously ancient and ultra-modern, honoring history while embracing the future.",im:"A seven-year-old girl, turning a large copper gear that meshes with others, experiencing for the first time the physics of leverage and mechanical advantage—her eyes wide with understanding, the invisible becoming visible.",t:"Located on Century Avenue, Pudong. Subway Line 2 to Century Avenue Station. Open 9am-5:15pm, closed Mondays. Admission RMB 60. Allow 3-4 hours minimum. English signage good. Interactive exhibits engaging for all ages. Photography allowed except in planetarium shows.",c:[],r:"g",nn:"上海科技馆",ns:"现代化的科技馆，有互动展品和自然历史",nst:"2001年开放的亚洲顶级科技馆。通过互动展览展示技术进步和自然科学。特别适合家庭参观。",nt:"位于世纪大道。乘坐地铁2号线至世纪大道站。每日9时至17时15分开放，周一休馆。门票60元。"},
  {id:24,n:"Wutong Road Plane Trees — Urban Canopy",a:"Huangpu District",v:["beautiful", "local"],d:30,s:"A historic avenue lined with century-old plane trees creating a natural cathedral—a serene walking path beloved by locals and largely unknown to tourists.",st:"Wutong Road was planted with plane trees in 1922 when Shanghai was beautifying its French Concession streets. Today, the trees are 100+ years old, their trunks as thick as a person is tall, their canopies forming a continuous roof of dappled shade. The street is quiet—residential, narrow, intimate. In spring, the trees flower pale pink. In autumn, they turn golden. Year-round, the air beneath them feels cooler, the light more forgiving. Local residents walk here for exercise; children play in the scattered shadows. Few tourists discover this street, which is precisely why it retains authenticity. It is Shanghai at human scale—not the vertical ambition of the towers, but the horizontal comfort of a neighborhood where time moves differently. Sit on a bench beneath these ancient trees and understand what preservation means: not museums, but living streets where the past provides shade for the present.",im:"An elderly woman, aged 85, walking this same street where she played as a child 80 years ago, the trees taller now but otherwise unchanged—her footsteps following the same path her younger self once followed.",t:"Located in Huangpu District, running from Changshu Road to Yuyuan Road. Subway Line 1 or 10 nearby. Open access; walk anytime. Best in spring (blossoms) or autumn (colors). Early morning ideal for peaceful experience; avoid midday heat and evening rush.",c:[],r:"g",nn:"乌铜路法国梧桐树",ns:"百年老树形成的自然廊道",nst:"1922年种植的法国梧桐已有百年历史。树荫下的街道是本地人最爱的散步路线。",nt:"位于黄浦区。附近有地铁1、10号线。全天开放。春季有花，秋季有色。清晨游客最少。"},
  {id:25,n:"Dongjiadu Cathedral — European Faith in Shanghai",a:"Huangpu District",v:["history", "architecture", "beautiful"],d:45,s:"A stunning 19th-century Gothic cathedral featuring red-brick architecture and intricate stained glass—a testament to European Christian missions in China.",st:"Built in 1853 and extensively renovated, Dongjiadu Cathedral represents the missionary's dream: bringing European Christianity to Shanghai. Its Gothic spires, red brick, and stained-glass windows feel transported from European cities. Inside, soaring arches direct eyes upward. The stained glass—some original, some restored—depicts Christian saints and biblical scenes in warm colors. The cathedral has survived wars, revolutions, and cultural upheaval. During the Cultural Revolution, it was desecrated; restoration in recent decades has recovered its dignity. Today, Chinese Catholics and foreign residents attend Sunday mass. Walking inside, you feel the cathedral's strange liminality: utterly European in aesthetics, yet deeply embedded in Shanghai's actual history. It represents an era when Western powers assumed they could remake Asia in their image—yet the cathedral persists because local Chinese communities adopted Christianity as genuinely theirs.",im:"A priest in 1860, kneeling before the altar, aware that outside the walls foreign armies are occupying the city, yet inside this sacred space, faith endures unchanged.",t:"Located on Dongjiadu Road near the Bund. Subway Line 2 to East Nanjing Road, then walk. Open generally 9am-5pm; visiting hours vary for mass times. Respectful dress required; women may need head coverings during services. Photography allowed outside; restricted inside during services.",c:[],r:"g",nn:"董家渡天主教堂",ns:"19世纪哥特式教堂，见证欧洲信仰在上海的传播",nst:"建于1853年的天主教堂融合了哥特式建筑风格。经历战争和文革，近年得到修复。",nt:"位于董家渡路。乘坐地铁2号线至东南京路站。通常9时至17时开放。参观需穿着得体。"},
  {id:26,n:"Fenyang Road Art Scene — Emerging Galleries",a:"Huangpu District",v:["art", "hidden", "local"],d:60,s:"A rapidly emerging art district with independent galleries, artist studios, and experimental spaces—Shanghai's cutting edge contemporary art scene.",st:"Fenyang Road, in the former French Concession, has transformed from a nondescript residential street into Shanghai's most dynamic art district. Independent galleries occupy converted villas. Artist studios spill onto sidewalks. Here you find experimental work—video installations, performance art, conceptual pieces—far more radical than the established galleries. A gallery director describes her mission: showing work that questions, provokes, and challenges. The scene is small enough to know most artists, large enough to sustain itself. It's Shanghai's contemporary art future being drafted now. Walk Fenyang Road on a Friday evening when galleries host openings and the street becomes a salon. Collectors, artists, students, and curious wanderers mingle. This is where Shanghai's creative energy currently concentrates, distinct from the tourist art of the major museums.",im:"A young artist, age 26, unveiling a controversial installation in a converted villa, nervous about criticism, trusting that art's purpose is to discomfort, not comfort.",t:"Located in Huangpu District (former French Concession area). Subway Line 1 or 10 to nearby stations. Galleries vary in opening hours; most open 11am-6pm Tuesday-Sunday. Evening openings during special events (check schedules). Walk the street; galleries' designs themselves are educational.",c:[],r:"g",nn:"奋阳路艺术区",ns:"上海新兴艺术区，有独立美术馆和艺术工作室",nst:"奋阳路正在成为上海最具活力的当代艺术地区。小型美术馆、艺术工作室聚集于此。",nt:"位于黄浦区。乘坐地铁1、10号线至附近站点。画廊多在周二至周日11时至18时开放。"},
  {id:27,n:"Maoming South Road Food Street — Culinary Microcosm",a:"Huangpu District",v:["food", "local"],d:90,s:"A pedestrian street packed with restaurants, snack stalls, and tea houses representing Shanghai's diverse food culture—a gastronomic journey across the city's culinary traditions.",st:"Maoming South Road is where Shanghai eats. The street is lined shoulder-to-shoulder with establishments ranging from 50-year-old family noodle shops to modern fusion restaurants. Here, locals queue for xiaolongbao (soup dumplings) at 7:30am. By evening, diners fill tiny tables eating jianbing (flatbread) and drinking jasmine tea. The smell is intoxicating: soy sauce, sesame oil, roasting meat, steamed rice. Food vendors call out specials in Shanghai dialect. Older women jostle young office workers at counters. Families claim tables. The street represents Shanghai's food philosophy: no dish too humble to perfect, no ingredient too common to honor. Try everything. Ask locals for recommendations; they love sharing favorites. The food is authentic Shanghai without pretense—the reverse of fine-dining restaurants elsewhere in the city.",im:"A vendor at a soup dumpling stall, age 68, folding pleats into dumpling wrappers with mechanical grace—the same motion her mother taught her 50 years ago, passed down from grandmother to mother to daughter.",t:"Located in Huangpu District off Huaihai Road. Subway Line 1 to Huangpi Road Station, walk east. Open dawn-late night. Arrive with appetite; portions are large. Bring cash for small vendors. Early lunch (11am-1pm) or early dinner (5-6pm) best for finding seats.",c:[],r:"g",nn:"茂名南路美食街",ns:"汇集上海美食的街道，有小笼包、面食等传统小吃",nst:"茂名南路是上海人吃饭的地方。大早上排队吃小笼包，晚上吃煎饼。真正的上海食文化。",nt:"位于黄浦区。乘坐地铁1号线至黄陂路站。全天开放。建议带现金。早餐和晚餐时段最旺。"},
  {id:28,n:"Longhua Flower Festival — Seasonal Pilgrimage",a:"Huangpu District",v:["beautiful", "local", "nature"],d:240,s:"An annual temple flower festival drawing thousands of pilgrims—a celebration of Buddhism, horticulture, and traditional Chinese culture.",st:"Each Lunar New Year, Longhua Temple hosts a two-week flower festival. The temple grounds transform: ancient plum blossoms line walkways, orchids perfume halls, peonies tower in ceramic pots arranged in patterns reflecting Buddhist symbolism. Pilgrims arrive with families, burn incense, make offerings. Vendors sell flower-themed souvenirs, traditional snacks, flowers for temple offerings. The festival has been celebrated for centuries; a 1920s photograph shows the same temple, the same blossoms, crowds in Qing Dynasty clothing. Walking the festival, you feel layers of time: the 977-year-old temple, the 400-year-old festival tradition, the contemporary pilgrims, the eternal flowers. The experience is simultaneously profound—respectful meditation before temple sculptures—and festive—children running, vendors hawking, joy evident. It encapsulates Shanghai's spiritual life, its horticultural heritage, its continuous cultural practice.",im:"A grandmother, aged 80, walking through the festival with her granddaughter, aged 8, carrying flowers to offer at the Buddha—speaking of her own grandmother's pilgrimage to this festival eighty years prior.",t:"Occurs annually around Lunar New Year (dates vary; check calendar). Based at Longhua Temple on Longhua Road. Festival lasts 2 weeks. Open dawn to dusk. Expect significant crowds; arrive early morning. Subway Line 8 to Longhua Road. Photography welcome. Bring comfortable shoes for walking.",c:[],r:"g",nn:"龙华花卉节",ns:"农历新年期间的寺庙花卉节",nst:"龙华寺每年农历新年举办花卉节。寺内梅花、兰花、牡丹盛开，吸引数万信徒和游客朝拜。",nt:"每年农历新年举办，约2周。龙华寺龙华路。清晨人少。乘坐地铁8号线至龙华路站。"},
  {id:29,n:"Sheshan Basilica — Sacred Mountain",a:"Day Trips",v:["history", "beautiful", "architecture"],d:120,s:"A 19th-century Catholic basilica perched atop a hill in southwestern Shanghai—a pilgrimage site blending European ecclesiastical architecture with Chinese landscape.",st:"The Sheshan Basilica was built in 1925 on the only hill within 50km of Shanghai, making it an unusual prominence in the river delta's flatness. The basilica's twin spires rise 40 meters above the hilltop, creating a beacon visible across the plain. Inside, the altar occupies a position commanding views across Shanghai below. The basilica represents a merger of cultures: European Romanesque architecture and interior design, yet set upon a sacred mountain in the Chinese tradition—mountains have always been sites of spiritual significance in Chinese philosophy. Today, Catholic pilgrims ascend the hill for veneration; cultural tourists ascend for vistas and photography. The climb is only 100 meters elevation gain but feels more elevated—the isolation, the views, the cool air atop the hill create a liminal spiritual space. The basilica's position is its power: a European chapel announcing itself from the only high point in the Shanghai plain.",im:"A priest in 1925, standing atop the completed basilica's roof, looking across the flatlands of Shanghai, understanding that this structure will be seen by millions of eyes for generations, a permanent landmark on the landscape.",t:"Located in Songjiang District, 50km southwest of downtown. Accessible by organized tour or private transport (1-hour drive). Best visited mid-morning or early afternoon for light and fewer crowds. The climb to the basilica involves 102 stone steps. Respectful dress required inside. Photography freely allowed on grounds.",c:[],r:"g",nn:"佘山圣殿",ns:"19世纪建成的天主教堂，位于上海周围唯一的山顶",nst:"佘山圣殿1925年建成。两座钟塔高40米，是上海平原上的地标。融合欧洲建筑与中国地理。",nt:"位于松江区。距市中心50公里。自驾1小时可达。登顶需走102级台阶。参观需穿着得体。"},
  {id:30,n:"Shanghai Hairtail Fish Market — Pre-Dawn Abundance",a:"Huangpu District",v:["local", "food", "hidden"],d:90,s:"A wholesale fish market operating before dawn where boats unload the night's catch—a glimpse of Shanghai's maritime culture and culinary infrastructure.",st:"At 4am, before the city wakes, fishing boats unload at the Hairtail Fish Market on the Huangpu River. The wharf fills with ice, fish, and the screams of vendors negotiating prices. Hairtail fish—a silver-fleshed, delicate fish—are piled into wooden crates, their eyes still reflecting the fishing boats' deck lights. Restaurant buyers inspect fish, sniff for freshness, haggle in Shanghai dialect. The market is a sensory overload: the smell of brine and ice, the chaos of commerce, the speed and expertise of traders who know fish by sight and touch. By 7am, the boats are unloaded; by 9am, the market closes until tomorrow's dawn. The market reveals Shanghai's essential reality: a city sustained by daily logistics of food, supply, market. The fish sold here will nourish the city today; new fish will arrive tomorrow. Few tourists see this market; those who do witness Shanghai's unglamorous engine—the work that sustains millions.",im:"A fish buyer, age 55, selecting individual hairtail from a crate at 5am, her hand moving with absolute certainty, knowing the difference between yesterday's catch and today's, between restaurants' needs and his own knowledge.",t:"Located on the Huangpu River waterfront, Huangpu District. Access at dawn only (3:30-7am). Arrive by taxi or organized early-morning food tour. The market is working; visitors are tolerated but should respect the operation. Wear warm clothes; riverside air is cold before dawn. Photography permitted but focus on the activity, not individual vendors.",c:[],r:"g",nn:"带鱼市场",ns:"凌晨渔船卸货的批发鱼市",nst:"凌晨4时，渔船在黄浦江边卸货。带鱼在冰块中堆积，商人们用方言讨价还价。这是上海物资的日常基础。",nt:"位于黄浦江沿岸。仅在凌晨3时30分至7时营业。乘坐出租车或参加导游团。清晨河边很冷。"}
,
  {id:31,n:"Bund Waterfront Walk at Sunrise — Colonial Architecture",a:"Huangpu",v:["beautiful","sunrise","history"],d:5,s:"The Bund is Shanghai's colonial waterfront with 19th-century buildings on one side and the modern skyline across the river—at sunrise it's quiet and golden.",st:"The Bund is where Shanghai was built by traders. The buildings are colonial European architecture. At sunrise, the light is gold.",im:"Walking the Bund at dawn. Historic buildings behind. Modern skyline across the river. The light gold. Few people. The contrast of old and new.",t:"Walk anytime, best 6–7am before crowds. Start at the north and walk south. Free. Cafes throughout. The view changes with light.",c:["beautiful","sunrise","history"],r:"g",nn:"外滩漫步",ns:"The Bund is Shanghai's colonial waterfront with 19th-century buildings.",nst:"The Bund is where Shanghai was built by traders.",nt:"Walk anytime, best 6–7am before crowds."},
  {id:32,n:"Yu Garden (Yuyuan) — Classical Chinese Garden",a:"Huangpu",v:["beautiful","history","greatest_hits"],d:5,s:"Yu Garden is a 500-year-old classical Chinese garden—ornate rockery, pavilions, and pools—the design is the philosophy of beauty in nature.",st:"Yu Garden is one of China's most famous gardens. The design uses classical principles. Every view is carefully composed.",im:"Inside the garden. Curved bridges. Rockery. A pool with koi. Pavilions framing views. Every angle designed. The geometry of nature.",t:"Entry 40 CNY. Open 8:30am–5pm daily. Go early morning (8:30–9:30am) for fewer crowds. Located in Old City. Allow 1.5–2 hours. Bring water.",c:["beautiful","history","greatest_hits"],r:"g",nn:"豫园",ns:"Classical Chinese garden with rockery, pavilions, and pools.",nst:"Yu Garden is one of China's most famous gardens.",nt:"Entry 40 CNY. Open 8:30am–5pm daily."},
  {id:33,n:"French Concession — Tree-Lined Streets and Cafes",a:"Huangpu",v:["neighborhoods","beautiful","local"],d:20,s:"The French Concession is a neighborhood with tree-lined streets, colonial villas, boutiques, and cafes—it feels like a separate city within Shanghai.",st:"The French Concession was a foreign settlement. The streets are lined with plane trees. The architecture is European. Locals have reclaimed it as a sophisticated neighbourhood.",im:"A tree-lined street. Cafe tables on sidewalk. Old buildings. The light filtered through leaves. Few cars. The pace slow.",t:"Walk Huaihai Road and side streets. No entrance fee. Shops and cafes everywhere. Rent a bike for 10–20 CNY. Go afternoon 3–6pm. Allow 2–3 hours.",c:["neighborhoods","beautiful"],r:"g",nn:"法租界",ns:"Tree-lined streets with colonial villas, boutiques, and cafes.",nst:"The French Concession is a neighborhood with tree-lined streets.",nt:"Walk Huaihai Road and side streets. Rent a bike 10–20 CNY."},
  {id:34,n:"Shanghai Tower Observation Deck — Highest in China",a:"Lujiazui",v:["greatest_hits","beautiful","high_spots"],d:20,s:"Shanghai Tower is the tallest building in China—the observation deck shows the city, the river, and the scale of Shanghai's transformation.",st:"Shanghai Tower is 632 metres tall. The observation deck on the 118th floor offers 360-degree views of the city and beyond.",im:"Looking from the observation deck. The city spread beneath. The river winding. The skyline endless. The scale immense. The view total.",t:"Entry 180–220 CNY depending on deck. Located in Lujiazui financial district. Open 8am–10:30pm daily. Go sunset for best light. Book online for discounts.",c:["greatest_hits","beautiful"],r:"g",nn:"上海塔",ns:"Highest building in China with observation deck showing the entire city.",nst:"Shanghai Tower is 632 metres tall.",nt:"Entry 180–220 CNY. Located in Lujiazui. Open 8am–10:30pm daily."},
  {id:35,n:"Tianzifang Basement Artist Studios — Real Work Space",a:"Huangpu District",v:["weird","art"],d:90,s:"Below street level, artists' workshops where you watch painters, sculptors, and ceramicists making work.",st:"Tianzifang is a network of artist studios in a converted warehouse. Go down. In the basement, you find actual working artists—sculptors working in concrete, painters in natural light, a woman selling handmade ceramics.",im:"Hands moving clay on a wheel, dust catching light from a basement window, the sound of a chisel on stone echoing.",t:"Metro Line 10 to Jing'an Temple. Walk east to Tianzifang. Studios open 10am-6pm. Free to enter, tip artists if you buy.",c:["weird","neighbourhoods"],r:"g",nn:"田子坊地下艺术工作室",ns:"真实的艺术家工作空间",nst:"地下室里有真正工作的艺术家—雕塑家、画家、陶艺家。",nt:"10号线静安寺站。向东走到田子坊。工作室上午10点至下午6点营业。"},
  {id:36,n:"Yuyuan Garden Midnight Opening — No Tourists",a:"Huangpu District",v:["beautiful","quiet"],d:60,s:"The famous garden opens for night visitors at 10pm—locals only, cameras silent, the sound of water.",st:"At 10pm, the gates open to a different crowd—mostly Shanghai locals and serious photographers. The pavilions are lit, the water is black and reflective, and you can hear the actual sound of the garden—water moving, wind in bamboo.",im:"Pavilion lights reflected in dark water, shadow of a visitor passing through a doorway, the smell of ancient wood.",t:"Metro Line 10 to Yuyuan. Special night visits Friday-Sunday 7pm-11pm. Book ahead by phone. Entry 80 yuan.",c:["beautiful","quiet"],r:"y",nn:"豫园午夜开放",ns:"没有游客的夜晚",nst:"豫园花园是一个500年前的古典花园。午夜开放给当地人。",nt:"10号线豫园站。特殊夜间访问周五至周日晚上7点至11点。提前电话预订。"},
  {id:37,n:"Waibaidu Bridge Dusk Light — Bridge Photographers' Spot",a:"Huangpu District",v:["beautiful","history"],d:45,s:"Shanghai's first bridge (1908), iconic steel arch—light turns it molten gold at dusk.",st:"Waibaidu Bridge is Shanghai's most photographed bridge—the old steel arch connecting Puxi and Pudong. At dusk (5:30-6:30pm), the light hits the iron at a specific angle, turning the entire structure golden. Local photographers know this time exactly.",im:"Iron turning golden in the last light, traffic below still moving, the Bund behind glowing.",t:"Metro Line 10 to Henan Road. Walk north to bridge. Free, open always. Visit 5pm-6:30pm for light.",c:["beautiful","history_big"],r:"g",nn:"外白渡桥黄昏光线",ns:"光线变成金色的桥",nst:"外白渡桥是上海最著名的桥。黄昏时，光线将整个结构变成金色。",nt:"10号线河南路站。向北走到桥。免费，随时开放。下午5点至6点30分访问以获得最佳光线。"},
  {id:38,n:"Longtang Shikumen Walking Tour — Maze of Courtyard Homes",a:"Jing'an District",v:["architecture","history"],d:120,s:"Explore the maze of connected courtyard homes (shikumen) where families lived in 4-story tenements.",st:"Shikumen are Shanghai's signature architecture—brick buildings with arched doorways designed for urban density. Entire neighborhoods are connected longtang (lane) systems—endless corridors where neighbors share walls and windows look into opposite buildings. Residents still live here.",im:"Narrow lanes too tight for sunlight, hanging laundry above, voices echoing between buildings, the smell of cooking and incense.",t:"Jing'an District near Wujiang Road. Walk early morning (7-9am) to avoid families. Free, public spaces. Best preserved longtang: Tianzifang, Xintiandi.",c:["architecture","history_big","neighbourhoods"],r:"g",nn:"弄堂石库门步行游",ns:"迷宫般的四层住宅",nst:"石库门是上海特有的建筑。整个街区通过连接的弄堂系统连接。",nt:"静安区武江路附近。早上7点至9点步行以避免家庭。免费、公共空间。"},
  {id:39,n:"Zhujiajiao Water Town Day Trip — 2000 Years Old",a:"Day Trips",v:["day_trips","history","nature"],d:240,s:"Ancient canal town 1 hour from Shanghai, home to 300,000 people living like it's still the Ming Dynasty.",st:"Zhujiajiao is a real town, not a preserved village. The 2000-year-old canals still function. Families live in homes built 400 years ago. Boats navigate the water. Vendors sell vegetables from boats. No tour groups dominate.",im:"A sampan pulling up to a window, a woman tossing vegetables through, the boat moving silently through water narrower than a street.",t:"Minxin Line train from downtown Shanghai (1 hour). Exit at Zhujiajiao station. Walk to water. Free. Allow 4-5 hours. Bring cash.",c:["day_trips","history_big","neighbourhoods"],r:"y",nn:"朱家角水镇2000年古镇",ns:"古老的运河古镇",nst:"朱家角是一个真实的古镇，有2000年的历史。运河仍然起作用。",nt:"上海市区地铁线（1小时）。在朱家角站下车。向水边走。免费。预留4-5小时。"},
  {id:40,n:"Jing'an Temple Night Incense — No Tourists",a:"Jing'an District",v:["quiet","history","free"],d:45,s:"Buddhist temple in the middle of Shanghai, night visitors for meditation, thick incense smoke.",st:"Jing'an Temple sits on a traffic island in downtown Shanghai. By day it's barely visible. At night (9-10pm) locals come to light incense, meditate, and leave. The incense hangs so thick you breathe it. The only sound is distant traffic and occasional bells.",im:"Thick incense smoke visible in the temple lights, a silhouette kneeling before an altar, the smell coating your lungs.",t:"Metro Line 2/7 to Jing'an Temple station. Temple open 9am-10pm. Incense available (10 yuan). Go after 9pm for peace.",c:["quiet","history_big","free"],r:"g",nn:"静安寺夜间香火",ns:"没有游客的晚间冥想",nst:"静安寺位于上海市中心的交通岛上。晚上当地人来点香、冥想、离开。",nt:"2/7号线静安寺站。寺庙上午9点至晚上10点开放。香火可用（10元）。晚上9点后去以获得平静。"},
  {id:41,n:"Bund Waterfront 6am Walking Path",a:"Huangpu District",v:["beautiful","free"],d:60,s:"Walk the full 1.5km waterfront path before 7am when the Bund becomes a jogger's road.",st:"The Bund is Shanghai's iconic waterfront—but the magic happens before tourist hours. At 6am, the path is clear. You see the light changing on the water, the Pudong skyline reflecting, a few joggers passing, and the architecture reading more honestly without crowds.",im:"Early light on water, your reflection in a building's window as you pass, joggers breathing heavily as they pass, the city waking slowly.",t:"Metro Line 2 to Nanjing Road. Head to the Bund's north end. Walk south along the water. Free, open always. Go 6-7am.",c:["beautiful","free"],r:"g",nn:"外滩上午6点步行路径",ns:"游客前的滨水步道",nst:"走完整个1.5公里的滨水路径。早上光线在水上改变。",nt:"2号线南京路站。向外滩走。沿着水向南走。免费、随时开放。早上6点至7点去。"},
  {id:42,n:"Fuxing Park Old Tree Zone — Century-Old Plane Trees",a:"Huangpu District",v:["parks","beautiful"],d:45,s:"A formal park planted 200 years ago with plane trees so large they create a tunnel of shade.",st:"Fuxing Park is a former French concession garden. The plane trees (sycamore) are 200 years old. Their canopies are so thick and overlapping that walking the central path feels like moving through a green tunnel. The park is almost always half-empty.",im:"Dappled light through leaves so thick you can't see sky, the sound of your shoes on the gravel path, the temperature 10 degrees cooler than the street.",t:"Metro Line 1 to Huangpi Road. Park free, open 6am-6pm. Walk central avenue. Bring water.",c:["parks","beautiful"],r:"g",nn:"复兴公园老树林",ns:"百年老树",nst:"复兴公园是一个法租界花园。200年树龄的飞机树创造了阴影隧道。",nt:"1号线淮坪路站。公园免费，上午6点至下午6点开放。中央大道。带水。"},
  {id:43,n:"M50 Creative Park Artist Studios — Converted Factory Hallways",a:"Putuo District",v:["weird","art"],d:120,s:"Massive converted textile factory with 100+ artist studios, hallways revealing work in progress.",st:"M50 is a 50,000-square-meter textile factory converted into artist lofts. You walk endless hallways of studio after studio—painters, sculptors, photographers, designers. Many artists keep their doors open. You see work unfinished. It smells like paint and wood.",im:"Footsteps echoing in long hallway, doors opening to faces concentrating on work, the smell of turpentine and primer.",t:"Metro Line 13 to Changping Road. Walk to Moganshan Road. M50 open 10am-6pm, weekends only. Free to walk, respect artists.",c:["weird","art"],r:"g",nn:"M50创意园艺术工作室",ns:"转换后的工厂走廊",nst:"M50是一个纺织工厂，改建为艺术工作室。100多个艺术家工作室。",nt:"13号线长平路站。向莫干山路走。M50上午10点至下午6点开放，仅周末。"},

{PLACE_IMAGES[p.id]&&<div className="mt-4 rounded-xl overflow-hidden" style={{maxHeight:"400px"}}>
<img src={`images/${PLACE_IMAGES[p.id]}`} alt={p.n} style={{width:"100%",maxHeight:"360px",objectFit:"contain",display:"block",borderRadius:"8px"}}/>
<p className="text-xs mt-1" style={{color:"#aaa",textAlign:"center"}}>AI-generated illustration</p></div>}
<div className="mt-4 p-4 rounded-xl" style={{background:"#f8f8ff"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#1a1a2e"}}>The Story</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nst?p.nst:p.st}</p></div>
{p.im&&<div className="mt-3 p-4 rounded-xl" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#a78bfa"}}>Imagine This</h3>
<p className="text-sm" style={{color:"#b8b0d0",lineHeight:1.7,fontStyle:"italic"}}>{p.im}</p></div>}
{p.t&&<div className="mt-3 p-4 rounded-xl" style={{background:"#f0fdf4"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#166534"}}>{lang==="native"?"Tips / "+LANG_NAME:"Tips"}</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nt?p.nt:p.t}</p>
<a href={`https://maps.google.com/?q=${encodeURIComponent(p.n+', '+CITY_EN)}`} target="_blank" rel="noopener noreferrer"
  className="mt-3 flex items-center gap-2 text-sm font-bold"
  style={{color:"#166534",textDecoration:"none",display:"inline-flex",marginTop:"10px"}}>
  🗺 Get directions
</a>
</div>}
{p.ef&&<p className="text-xs mt-3 pt-3" style={{color:"#555",lineHeight:1.7,borderTop:"1px solid #dcfce7"}}>🍔 {p.ef}</p>}
{p.sf&&<p className="text-xs mt-2" style={{color:"#555",lineHeight:1.7}}>🏠 {p.sf}</p>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
<div className="mt-5">
<p className="text-xs font-bold mb-2" style={{color:"#888",letterSpacing:"0.08em",textTransform:"uppercase"}}>City Moods</p>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} style={{borderRadius:10,overflow:"hidden",aspectRatio:"2/3",background:"#eee"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>)}</div></div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
const TBGS={"places":"https://mariavheland.github.io/godostuff/textures/tex11.png","collections":"https://mariavheland.github.io/godostuff/textures/tex10.png","missions":"https://mariavheland.github.io/godostuff/textures/tex10.png","plan":"https://mariavheland.github.io/godostuff/textures/tex10.png","phrases":"https://mariavheland.github.io/godostuff/textures/tex11.png","default":"https://mariavheland.github.io/godostuff/textures/tex11.png"};if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:"url('https://mariavheland.github.io/godostuff/textures/tex13.png') center/cover no-repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Shanghai Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Shanghai Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
