const P = [
  {id:1,n:"Ehrenfeld Street Art District (Massive Murals) — Ehrenfeld",a:"Ehrenfeld",v:["street_art", "weird"],d:1,s:"Industrial neighborhood covered in large-scale street art—galleries, studio spaces, the city\'s creative heart.",st:"Murals cover entire building sides. Scale is immense. Quality is high. The neighborhood openly creative. Galleries everywhere. It\'s gritty but becoming polished. Creativity is the point.",im:"It\'s 2000s. Young artists move into cheap neighborhoods. The city happens.",t:"Murals cover entire building sides. Scale is immense. Quality is high. The neighborhood openly creative. Galleries everywhere. It\'s gritty but becoming polished. Creativity is the point.\",im:\"It\'s 2000s. Young artists move into cheap neighborhoods. The city happens.\",t:\"Free walking. Go afternoon for light. Photography encouraged. Galleries often free (€5-10 suggested). Cafés throughout. This is authentic artist space.",c:["street_art", "art"],r:"g",nn:"Kölner Dom",ns:"Gotische Kathedrale, die zwei Weltkriege überstanden hat.",nst:"Der Dom ist Kölns Herz und Seele. Gothische Spitzbögen, farbiges Licht durch Fenster. Du kannst die Stufen hinaufklettern für die beste Aussicht auf den Rhein und die Stadt.",nt:"Domkloster 4. Eintritt €3,50 für Dom, €3,50 extra für Aufstieg. Beste Zeit: früh morgens. Bring festes Schuhwerk für die Stufen mit."},
  {id:2,n:"Belgisches Viertel (Café Culture) — Belgisches",a:"Belgisches",v:["local_only", "beautiful"],d:2,s:"Neighborhood of small streets, independent shops, cafés, galleries—the anti-commercial heart of Cologne.",st:"Streets are narrow. Shops tiny and specific. Cafés line corners. It\'s organized for living, not consuming. You see locals being normal. It feels like a village inside a city.",im:"It\'s 1970. Younger people move here because rent is cheap. They stay because it\'s community.",t:"Streets are narrow. Shops tiny and specific. Cafés line corners. It\'s organized for living, not consuming. You see locals being normal. It feels like a village inside a city.\",im:\"It\'s 1970. Younger people move here because rent is cheap. They stay because it\'s community.\",t:\"Walk freely. Cafés €3-8 for coffee. Shops independent and interesting. Go afternoon. Bring time. This neighborhood rewards wandering.",c:["local_only", "beautiful"],r:"g",nn:"Altstadt",ns:"Fachwerkhäuser und Kneipen, wo das echte Köln lebt.",nst:"Die Altstadt wurde im Krieg zerstört und mit historischer Genauigkeit wieder aufgebaut. Enge Gassen, rote Dächern, Restaurants überall. Bestelle ein Kölsch und du bist Teil Kölns.",nt:"Rund um die Großmarktstraße. Kostenlos spazieren. Kölsch kostet etwa €1,20-2,00. Probiere Halve Hahn (Roggenbrötchen mit Käse und Aufschnitt)."},
  {id:3,n:"Südstadt (Diverse, Hip Neighborhood) — Südstadt",a:"Südstadt",v:["local_only", "weird", "beautiful"],d:3,s:"Neighborhood being transformed—old buildings, new residents, restaurants from everywhere, chaos and culture mixing.",st:"Architecture older German. People diverse. Restaurants varied—Thai, Turkish, German, everything. Streets lived-in. Change is visible and ongoing. It\'s genuine and energetic.",im:"It\'s 2010s. Immigrants and young Germans move in. The neighborhood becomes something new.",t:"Architecture older German. People diverse. Restaurants varied—Thai, Turkish, German, everything. Streets lived-in. Change is visible and ongoing. It\'s genuine and energetic.\",im:\"It\'s 2010s. Immigrants and young Germans move in. The neighborhood becomes something new.\",t:\"Walk freely. Restaurants €8-20. Cafés €3-8. Go evening. The food is diverse and authentic. No tourism infrastructure—it\'s real.",c:["local_only", "weird"],r:"g",nn:"Rheinufer",ns:"Spaziergang am Fluss, der die Stadt prägt.",nst:"Das Rheinufer ist eine lange, wunderschöne Promenade. Im Sommer sitzen Menschen auf Stufen und schauen auf das Wasser. Es gibt Museen, Bars und den Blick auf die andere Seite.",nt:"Start bei Deutzer Brücke oder Hohenzollernbrücke. Kostenlos. Perfekt für Abenduntergänge. Viele Strandbarren (Rheinstände) im Sommer."},
  {id:4,n:"Rheinauhafen (Modern Architecture on Dock) — Rheinauhafen",a:"Rheinauhafen",v:["architecture", "beautiful"],d:4,s:"Old dock repurposed with modern architecture—glass buildings, open space, the contrast of old and new.",st:"Buildings designed boldly. Waterfront open. It\'s clean and new but not sterile. People actually work here. The Rhine flows beside. It\'s architecture as poetry.",im:"It\'s 2000s. The dock is being transformed. Progress is visible.",t:"Buildings designed boldly. Waterfront open. It\'s clean and new but not sterile. People actually work here. The Rhine flows beside. It\'s architecture as poetry.\",im:\"It\'s 2000s. The dock is being transformed. Progress is visible.\",t:\"Free to walk. Museums and galleries €5-10. Restaurants €12-25. Go afternoon or evening. The space beautiful for walking and sitting. Bring camera.",c:["architecture", "beautiful"],r:"g",nn:"Rheinauhafen — Deutz",ns:"Modernes Architektur am Wasser, wo die alte Industrie neu geboren wurde.",nst:"Der Rheinauhafen ist Kölns neuestes Wahrzeichen. Moderne Gebäude mit Glas und Stahl ragen über das Wasser. Du spazierst zwischen Museen, Restaurants und Arbeitsplätzen. Die Architektur ist mutig und unverschämt. Der Rhein fließt daneben wie eh und je.",nt:"Kostenlos zu spazieren. Museen €5-10. Restaurants €12-25. Beste Zeit: Nachmittag oder Abend. Fotografieren erwünscht."},
  {id:5,n:"Roman Ruins Underground (Praetorium Museum) — Altstadt",a:"Altstadt",v:["history", "weird"],d:5,s:"Roman ruins buried under medieval city—go underground and see 2000-year-old stone.",st:"Stone walls remain. Museum built around them. You see how city was built in layers. Romans first, medieval on top, modern above. It\'s geological time compressed.",im:"It\'s 70 AD. A Roman garrison commands the Rhine. They don\'t know a city will grow on top.",t:"Stone walls remain. Museum built around them. You see how city was built in layers. Romans first, medieval on top, modern above. It\'s geological time compressed.\",im:\"It\'s 70 AD. A Roman garrison commands the Rhine. They don\'t know a city will grow on top.\",t:\"€6-8 entry. Underground galleries. Takes 45 minutes. Go midday when groups less likely. Guide informative. This is serious archaeology.",c:["history_big", "weird"],r:"g",nn:"Prätorium — Altstadt",ns:"Römische Geschichte unter deinen Füßen, wo die Legionäre marschierten.",nst:"Tief unter dem Dom liegt das Prätorium, das Kommandozentrum der römischen Besatzung. Im Museum siehst du Mosaiken, Steininschriften und Waffen. Du stehst im gleichen Raum, wo römische Kommandanten 2000 Jahre ago Befehle gaben.",nt:"Unter dem Praetorium. €3,50 Eintritt. Beste Zeit: morgens, vor Touristen. Kleine Räume, intimates Gefühl."},
  {id:6,n:"Cologne Cathedral Rooftop Area — Altstadt",a:"Altstadt",v:["history", "beautiful", "high_spots"],d:6,s:"The Cathedral dominates visually—the rooftop views aren\'t as tall as other climbs but the vantage is unique.",st:"From the rooftop areas, you see the Rhine and the city. The Cathedral is all-encompassing. The scale is immense. Looking from this height, you understand the Cathedral\'s dominance.",im:"It\'s 1300s. The Cathedral rises. Over centuries, it becomes the city\'s identity.",t:"From the rooftop areas, you see the Rhine and the city. The Cathedral is all-encompassing. The scale is immense. Looking from this height, you understand the Cathedral\'s dominance.\",im:\"It\'s 1300s. The Cathedral rises. Over centuries, it becomes the city\'s identity.\",t:\"€5-7 entry for rooftop areas. Takes 30 minutes for climb and viewing. The view is worth it. The Cathedral interior is worth seeing too (€5-8).",c:["high_spots", "architecture"],r:"g",nn:"Kölner Dom — Aufstieg",ns:"533 Stufen zum Himmel — und die Aussicht ist Wahnsinn.",nst:"Du steigst in den Südturm des Doms. Stufe für Stufe. Oben angekommen siehst du den ganzen Rhein, die Brücken, die Stadt wie ein Spielzeugmodell. Dein Herz pocht. Der Wind weht. Du stehst über Köln.",nt:"€3,50 für den Aufstieg. 533 Stufen. Festes Schuhwerk nötig. Früh morgens kommen für leere Stufen und klare Aussicht. Nicht für Menschen mit Höhenangst!"},
  {id:7,n:"Fischmarkt Old Town (Medieval Streets) — Altstadt",a:"Altstadt",v:["history", "beautiful"],d:7,s:"Old town market square with medieval buildings rebuilt after WWII—history reconstruction visible in architecture.",st:"The buildings look old but many are from 1950s-60s. They\'re designed to match medieval aesthetics. The market function continues. You see reconstruction and continuity both.",im:"It\'s 1945. The city is bombed to rubble. A decision is made to rebuild authentically.",t:"The buildings look old but many are from 1950s-60s. They\'re designed to match medieval aesthetics. The market function continues. You see reconstruction and continuity both.\",im:\"It\'s 1945. The city is bombed to rubble. A decision is made to rebuild authentically.\",t:\"Free to walk. Market stalls weekdays morning. Restaurants around square €10-25. Go morning for market energy, evening for atmosphere. The façades are interesting architecturally.",c:["history_big", "beautiful"],r:"g",nn:"Alter Fischmarkt — Altstadt",ns:"Mittelalterliche Gassen, wo Köln seine alte Seele noch trägt.",nst:"Der Fischmarkt ist die älteste Ecke Kölns. Enge Gassen, Fachwerkhäuser mit roten Dächern, Restaurants und Kneipen überall. Du kannst anfühlen, dass Menschen hier seit 800 Jahren leben.",nt:"Zwischen Kardinal-Frings-Straße und Unter Taschenmacher. Kostenlos spazieren. Kölsch €1,50-2,00. Pfaffennüsse und Halve Hahn probieren."},
  {id:8,n:"Agnesviertel (Hidden Quarter) — Agnesviertel",a:"Agnesviertel",v:["local_only", "hidden", "beautiful"],d:8,s:"A small neighborhood filled with galleries, cafés, artists—quiet but creative, locals\' Cologne.",st:"Streets are narrow. Galleries open onto sidewalks. Cafés full of people working. The intellectual life of the neighborhood is visible. It\'s small and feels intimate.",im:"It\'s 1970. Artists move here. The neighborhood slowly becomes known for culture.",t:"Streets are narrow. Galleries open onto sidewalks. Cafés full of people working. The intellectual life of the neighborhood is visible. It\'s small and feels intimate.\",im:\"It\'s 1970. Artists move here. The neighborhood slowly becomes known for culture.\",t:\"Walk freely. Galleries free-€10. Cafés €3-8. Go afternoon. The vibe is creative but not aggressive. Bring time. The neighborhood rewards slow walking.",c:["local_only", "hidden"],r:"g",nn:"Agnesviertel — Kunstneighborhood",ns:"Künstler, Vintage-Läden und Geheimtipps in einer stillen Ecke.",nst:"Das Agnesviertel ist Kölns Künstlerversteck. Kleine Galerien, Boutiquen, Cafés in alten Häusern. Du findest Kunstwerke an Wänden, echte Künstler in Ateliers. Es ist hipster ohne Arroganz.",nt:"Nördlich vom Dom, ruhig und authentisch. Galerien kostenlos oder €5. Cafés €3-7. Mittwochs haben viele Galerien Openings."},
  {id:9,n:"Deutz Riverbank Views — Deutz",a:"Deutz",v:["beautiful", "views"],d:9,s:"Looking back at Cologne from the east bank—the Cathedral rises, the skyline is striking, a different perspective.",st:"You\'re across the Rhine. The city rises on the opposite bank. The Cathedral dominates. The light is different from the main side. You see the city as strangers see it.",im:"It\'s anytime. The view from here is how most people photograph the city.",t:"You\'re across the Rhine. The city rises on the opposite bank. The Cathedral dominates. The light is different from the main side. You see the city as strangers see it.\",im:\"It\'s anytime. The view from here is how most people photograph the city.\",t:\"Walk or bike along riverbank. Free. Go afternoon for light on the buildings. Bring camera. The view is professional-photography quality.",c:["beautiful", "high_spots"],r:"g",nn:"Deutz Rheinufer — Panorama",ns:"Fluss-Ufer mit Altstadt-Blick—perfekt für Sonnenuntergang.",nst:"Du sitzt auf Steinen und guckst auf Dom und Altstadt. Der Rhein fließt. Segelboote. Abends Gold-Licht auf Steinen. Magisch.",nt:"Kostenlos. Strandbarren (Bars) €3-5. Beste Zeit: Abend 18-20 Uhr. Sehr beliebte Stelle—komm nicht samstags."},
  {id:10,n:"Rheinpark Cable Car — Deutz",a:"Deutz",v:["beautiful", "high_spots"],d:10,s:"A cable car across the Rhine with a park on both sides—you traverse water while elevated, views are unobstructed.",st:"The cable car rises. The Rhine spreads below. The city is on one side, parks on the other. The moment suspended is meditative. You\'re part of the infrastructure and the landscape.",im:"It\'s 1957. A cable car is built. People marvel at crossing water without a bridge.",t:"The cable car rises. The Rhine spreads below. The city is on one side, parks on the other. The moment suspended is meditative. You\'re part of the infrastructure and the landscape.\",im:\"It\'s 1957. A cable car is built. People marvel at crossing water without a bridge.\",t:\"€3-5 cable car return. Parks free to explore. Go afternoon for light. The crossing is brief (10 minutes) but worth it. The parks are lovely.",c:["high_spots", "beautiful"],r:"g",nn:"Deutz Rheinufer — Panorama",ns:"Fluss-Ufer mit Altstadt-Blick—perfekt für Sonnenuntergang.",nst:"Du sitzt auf Steinen und guckst auf Dom und Altstadt. Der Rhein fließt. Segelboote. Abends Gold-Licht auf Steinen. Magisch.",nt:"Kostenlos. Strandbarren (Bars) €3-5. Beste Zeit: Abend 18-20 Uhr. Sehr beliebte Stelle—komm nicht samstags."},
  {id:11,n:"NS Documentation Center (EL-DE Haus) — Altstadt",a:"Altstadt",v:["history", "scary"],d:11,s:"A Gestapo prison and headquarters—documentation of WWII, underground cells, history made tangible.",st:"The building is functional. Inside, exhibits explain Gestapo operations. The cells are visible and small. The weight is immense. History is not glorified; it\'s explained. The reality is heavy.",im:"It\'s 1942. This building is the center of terror. People arrive and disappear.",t:"The building is functional. Inside, exhibits explain Gestapo operations. The cells are visible and small. The weight is immense. History is not glorified; it\'s explained. The reality is heavy.\",im:\"It\'s 1942. This building is the center of terror. People arrive and disappear.\",t:\"€5-8 entry. Takes 1.5-2 hours. Go respectfully. This is essential history. The guides are knowledgeable. Bring tissues if emotional.",c:["history_big", "scary"],r:"y",nn:"Altstadt — Fachwerk-Herz",ns:"Zerstört und wiederaufgebaut—Kölns Seele.",nst:"Die Altstadt wurde 1945 zerstört. Jetzt ist sie rekonstruiert mit Genauigkeit. Rote Dächern, enge Gassen, Restaurants überall. Du sitzt mit Kölsch und gehörst dazu.",nt:"Kostenlos spazieren. Kölsch €1,50-2. Fischbrötchen €4-6. Halve Hahn probieren. Wochenende sind voller Musik-Festivals."},
  {id:12,n:"Flora Botanical Garden (Free Entry) — Flora",a:"Flora",v:["beautiful", "parks", "free"],d:12,s:"One of Germany\'s best botanical gardens, completely free—hundreds of plant species, walking paths, peaceful.",st:"The garden is vast. Plant sections organized logically. Greenhouses showcase tropical plants. It\'s manicured but also wild. You could spend hours. The garden is quiet even when busy.",im:"It\'s anytime. Gardeners work knowing they\'re creating something permanent.",t:"The garden is vast. Plant sections organized logically. Greenhouses showcase tropical plants. It\'s manicured but also wild. You could spend hours. The garden is quiet even when busy.\",im:\"It\'s anytime. Gardeners work knowing they\'re creating something permanent.\",t:\"Free entry. 30 acres to explore. Go spring for blooms or autumn for color. Bring water. The garden rewards wandering. This is democracy—beauty for everyone.",c:["parks", "free"],r:"g",nn:"Flora Botanischer Garten — Südstadt",ns:"Tropische Pflanzen ohne Reise—Gewächshäuser Wahnsinn.",nst:"Der Flora-Garten ist groß mit Glashäusern voller Pflanzen aus der Welt. Palmen, Orchideen, Farne. Innen ist Tropenluft. Eintritt frei!",nt:"Kostenlos! Täglich 8-18 Uhr. Südlich Zentrum. Sehr kinderfreundlich. Café im Park. Beste Ort für kostenloses Ausflug."},
  {id:13,n:"Nippes Neighborhood Market — Nippes",a:"Nippes",v:["local_only", "beautiful"],d:13,s:"A neighborhood market where locals shop—produce, flowers, regional products—the real Cologne shopping.",st:"Vendors call prices. It\'s organized chaos. The smell is intense—produce and life. It\'s authentically local even with some tourists. You feel the daily rhythm.",im:"It\'s anytime in the last 100 years. The market is where food comes from.",t:"Vendors call prices. It\'s organized chaos. The smell is intense—produce and life. It\'s authentically local even with some tourists. You feel the daily rhythm.\",im:\"It\'s anytime in the last 100 years. The market is where food comes from.\",t:\"Go mornings. Free to browse. Food/flowers €2-10. Cash preferred. Sit in outdoor café (€3-8). Feel the daily pulse of Cologne.",c:["local_only", "beautiful"],r:"g",nn:"Nippes Markt-Viertel — Local",ns:"Markt, Cafés, echte Menschen—nicht für Touristen.",nst:"Nippes ist Wohn-Viertel für normale Kölner. Markt am Mittwoch/Samstag. Kneipen mit Stammgästen. Du bist Fremder aber willkommen.",nt:"Kostenlos spazieren. Essen €8-12. Bier €2-3. Sehr authentisch, nicht restauriert. U-Bahn Nippes."},
  {id:14,n:"Mülheim Industrial Art Spaces — Mülheim",a:"Mülheim",v:["art", "weird"],d:14,s:"Old industrial buildings repurposed as art galleries and studios—the transformation of industrial to creative visible.",st:"Buildings are raw concrete and brick. Inside, art installations. Outside, sculptures. The transformation is honest—nothing is hidden. You see both the building\'s past and current use.",im:"It\'s 2000s. An industrial building closes. Artists move in. It becomes creative space.",t:"Buildings are raw concrete and brick. Inside, art installations. Outside, sculptures. The transformation is honest—nothing is hidden. You see both the building\'s past and current use.\",im:\"It\'s 2000s. An industrial building closes. Artists move in. It becomes creative space.\",t:\"Free to walk around. Galleries €5-15. Go afternoon for light. The vibe is raw and authentic. Bring camera. The contrast of old and new is striking.",c:["art", "weird"],r:"g",nn:"Mülheim Industrie-Kunst — Alternative",ns:"Alte Fabrik als Kunsthof—Künstler machen Lärm.",nst:"Mülheim ist ehemalige Industrie, jetzt Künstler-Zentrum. Ateliers offen, Performances, Installations. Laut und wild.",nt:"Kostenlos spazieren. Künstler-Ateliers €2-5. Konzerte €5-15. Best Time: Freitag/Samstag. U-Bahn Mülheim."},
  {id:15,n:"Mediapark Modern Development — Mediapark",a:"Mediapark",v:["architecture", "weird"],d:15,s:"A modern development of gleaming buildings and plazas—contrasts starkly with historic Cologne, worth visiting for architectural perspective.",st:"Buildings are glass and steel. Plazas are spacious. It\'s a different city in the same space. The contrast with the old town is disorienting. Modern architecture on the site of industrial past.",im:"It\'s 1990s. A decision is made to develop modern media facilities. The site transforms.",t:"Buildings are glass and steel. Plazas are spacious. It\'s a different city in the same space. The contrast with the old town is disorienting. Modern architecture on the site of industrial past.\",im:\"It\'s 1990s. A decision is made to develop modern media facilities. The site transforms.\",t:\"Free to walk. Some buildings/plazas private; others public. Go midday for light. Bring camera. The architecture is interesting regardless of opinion.",c:["architecture", "weird"],r:"g",nn:"MediaPark — Modern",ns:"Neue Architektur—wo Fernsehen stattfindet.",nst:"MediaPark ist moderneste Ecke Kölns. TV-Studios, Büros, glatte Gebäude. Es ist Zukunft.",nt:"Kostenlos spazieren. Restaurants €12-25. Café €4-7. Tagsüber arbeitest Menschen, Abend ist leer. U-Bahn MediaPark."},
  {id:16,n:"Claudius Therme (Thermal Spa, Public Access) — Bergisch Gladbach",a:"Bergisch Gladbach",v:["nature", "beautiful"],d:16,s:"Thermal springs with spa and public areas—warm water, wellness culture, you can swim and soak without expensive spa.",st:"The water is warm and clear. The space is clean and organized. You float, supported by salt content. The atmosphere is calm. It\'s wellness accessible.",im:"It\'s anytime. Humans have always sought warm water for healing.",t:"The water is warm and clear. The space is clean and organized. You float, supported by salt content. The atmosphere is calm. It\'s wellness accessible.\",im:\"It\'s anytime. Humans have always sought warm water for healing.\",t:\"€18-25 entry for day pass. Go off-peak hours (weekday afternoon) for quiet. Bring water. Towel rental available. The experience is meditative.",c:["nature", "beautiful"],r:"g",nn:"Claudius Therme — Bergisch Gladbach",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:17,n:"Bonn Day Trip (By Train) — Bonn",a:"Bonn",v:["history", "beautiful"],d:17,s:"A smaller city 30 minutes by train—former West German capital, museums, different pace from Cologne.",st:"The city is smaller and calmer. Beethoven was born here. Government buildings from Cold War era visible. You feel history differently in Bonn—less overwhelming than Cologne.",im:"It\'s 1949. Bonn becomes the capital of West Germany. The city\'s importance rises temporarily.",t:"The city is smaller and calmer. Beethoven was born here. Government buildings from Cold War era visible. You feel history differently in Bonn—less overwhelming than Cologne.\",im:\"It\'s 1949. Bonn becomes the capital of West Germany. The city\'s importance rises temporarily.\",t:\"Train from Cologne (30 minutes, €3-5). Walk old town freely. Museums €5-10. Spend afternoon. The city is beautiful and less crowded than Cologne.",c:["history_big", "beautiful"],r:"g",nn:"Bonn Day Trip — Bonn",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:18,n:"Brühl Castles Day Trip — Brühl",a:"Brühl",v:["history", "beautiful"],d:18,s:"Two baroque palaces 30 minutes away—rococo excess, palace gardens, architecture as drama.",st:"The palaces are extravagant. Frescoes cover ceilings. Gardens surround. It\'s designed to impress with wealth and power. The scale is immense. You feel small in the grand spaces.",im:"It\'s 1700s. A prince-bishop builds palaces to show his importance.",t:"The palaces are extravagant. Frescoes cover ceilings. Gardens surround. It\'s designed to impress with wealth and power. The scale is immense. You feel small in the grand spaces.\",im:\"It\'s 1700s. A prince-bishop builds palaces to show his importance.\",t:\"Train from Cologne (30 minutes, €3-5). €10-12 entry per palace. Tours available. Go afternoon for light. Spend full day. The palaces are worth seeing.",c:["history_big", "architecture"],r:"g",nn:"Brühl Castles Day Trip Schloss — Brühl",ns:"Mittelalter-Mauern und Geschichte—wo Ritter lebten.",nst:"Das Schloss sitzt auf Berg oder in Stadt. Alte Mauern, Türme, enge Gassen. Du siehst Räume wo Adel lebte. Es ist vergangenheit.",nt:"€6-12 Eintritt. Täglich 9-17 Uhr (Sommer bis 18 Uhr). Führungen gelegentlich +€3. Aussicht oft spektakulär. Plan 1-2 Stunden."},
  {id:19,n:"Drachenfels by S-Bahn (Rhine Valley) — Drachenfels",a:"Drachenfels",v:["nature", "beautiful"],d:19,s:"A romantic Rhine valley town with a hill, castle ruins, cable car—completely different landscape 45 minutes away.",st:"The Rhine is lush. Vineyards climb hillsides. The hill rises dramatically. Castle ruins crown it. The landscape is picturesque and real. You feel transported to a medieval fantasy.",im:"It\'s anytime in history. The Rhine valley has always been beautiful.",t:"The Rhine is lush. Vineyards climb hillsides. The hill rises dramatically. Castle ruins crown it. The landscape is picturesque and real. You feel transported to a medieval fantasy.\",im:\"It\'s anytime in history. The Rhine valley has always been beautiful.\",t:\"S-Bahn from Cologne (45 minutes, €8-10). Walk the town. Cable car to castle ruins (€5-7). Spend full day. Bring camera. The landscape is postcard-perfect.",c:["nature", "beautiful"],r:"g",nn:"Drachenfels by S-Bahn — Drachenfels",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:20,n:"Kölsch Beer Culture (Hidden Pubs) — Various",a:"Various",v:["local_only", "night"],d:20,s:"Kölsch beer is Cologne\'s identity—experience it in neighborhood pubs where locals actually drink, not tourist beer halls.",st:"A small glass of pale beer. The taste is specific. The pub is small and local. Conversations happen. You\'re part of a tradition—Kölsch has been brewed here for 400+ years.",im:"It\'s anytime. A Cologne resident has a Kölsch after work. It\'s what you do.",t:"A small glass of pale beer. The taste is specific. The pub is small and local. Conversations happen. You\'re part of a tradition—Kölsch has been brewed here for 400+ years.\",im:\"It\'s anytime. A Cologne resident has a Kölsch after work. It\'s what you do.\",t:\"Ask locals for their favorite pub. Most free entry. Beer €2-4 per glass (tiny glasses, you drink many). Go evening. The culture is genuine. The beer is excellent.",c:["local_only", "night"],r:"g",nn:"Kölsch Beer Culture — Various",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:21,n:"Melaten Cemetery Historic Graves — Melaten",a:"Melaten",v:["history", "beautiful"],d:21,s:"A cemetery with notable graves and medieval architecture",st:"The graves tell stories. Dates and names. Walking here is contemplative. It\'s a city of the dead organized beautifully.",im:"It\'s anytime. Death is part of every story.",t:"The graves tell stories. Dates and names. Walking here is contemplative. It\'s a city of the dead organized beautifully.\",im:\"It\'s anytime. Death is part of every story.\",t:\"Free. Open daily. Go afternoon. The history rewards slow walking. Bring respect.",c:["history_big", "beautiful"],r:"g",nn:"Melaten Friedhof — History",ns:"Alter Friedhof mit Kunstwerken—Tod als Schönheit.",nst:"Der Melaten Friedhof ist kunsthistorisch wichtig. Grabmal-Skulpturen, alte Bäume. Es ist traurig aber schön. Friedrich Dürrenmatt, Gereon Klug liegen hier.",nt:"Kostenlos. Täglich 8-18 Uhr (Winter 8-17 Uhr). Plan 45 Minuten ein. Sehr ruhig."},
  {id:22,n:"Cathedral Tower Climb 533 Steps — Altstadt",a:"Altstadt",v:["high_spots", "history"],d:22,s:"Climb the Cathedral tower for views and the exertion experience",st:"533 steps. Your legs feel them. The view rewards the effort. You\'re above the city. Vertigo and joy.",im:"It\'s 1300. A tower rises. By now, you can climb it.",t:"533 steps. Your legs feel them. The view rewards the effort. You\'re above the city. Vertigo and joy.\",im:\"It\'s 1300. A tower rises. By now, you can climb it.\",t:\"€3-5 entry. Takes 1.5 hours with rest. Go early morning. The view is worth every step.",c:["high_spots", "history_big"],r:"g",nn:"Altstadt — Fachwerk-Herz",ns:"Zerstört und wiederaufgebaut—Kölns Seele.",nst:"Die Altstadt wurde 1945 zerstört. Jetzt ist sie rekonstruiert mit Genauigkeit. Rote Dächern, enge Gassen, Restaurants überall. Du sitzt mit Kölsch und gehörst dazu.",nt:"Kostenlos spazieren. Kölsch €1,50-2. Fischbrötchen €4-6. Halve Hahn probieren. Wochenende sind voller Musik-Festivals."},
  {id:23,n:"Roman-Germanic Museum Collections — Altstadt",a:"Altstadt",v:["history", "art"],d:23,s:"Museum of Roman artifacts and Germanic culture from the region",st:"Objects from 2000 years ago. Glass, pottery, tools. You understand what came before.",im:"It\'s 70 AD. A Roman garrison settles. They document their lives.",t:"Objects from 2000 years ago. Glass, pottery, tools. You understand what came before.\",im:\"It\'s 70 AD. A Roman garrison settles. They document their lives.\",t:\"€6-10 entry. Takes 1.5 hours. Go midweek. The collection spans cultures.",c:["history_big", "art"],r:"g",nn:"Altstadt — Fachwerk-Herz",ns:"Zerstört und wiederaufgebaut—Kölns Seele.",nst:"Die Altstadt wurde 1945 zerstört. Jetzt ist sie rekonstruiert mit Genauigkeit. Rote Dächern, enge Gassen, Restaurants überall. Du sitzt mit Kölsch und gehörst dazu.",nt:"Kostenlos spazieren. Kölsch €1,50-2. Fischbrötchen €4-6. Halve Hahn probieren. Wochenende sind voller Musik-Festivals."},
  {id:24,n:"Kolumba Museum Architecture Modern — Altstadt",a:"Altstadt",v:["architecture", "beautiful"],d:24,s:"A museum building itself is architectural art, modern and medieval",st:"The building surprises. Contemporary design wraps medieval ruins. It\'s art about containment. The conflict is beautiful.",im:"It\'s 2000s. A ruin is honored by design.",t:"The building surprises. Contemporary design wraps medieval ruins. It\'s art about containment. The conflict is beautiful.\",im:\"It\'s 2000s. A ruin is honored by design.\",t:\"€5-8 entry. Takes 1 hour. Go afternoon. The architecture is the main event.",c:["architecture", "beautiful"],r:"g",nn:"Altstadt — Fachwerk-Herz",ns:"Zerstört und wiederaufgebaut—Kölns Seele.",nst:"Die Altstadt wurde 1945 zerstört. Jetzt ist sie rekonstruiert mit Genauigkeit. Rote Dächern, enge Gassen, Restaurants überall. Du sitzt mit Kölsch und gehörst dazu.",nt:"Kostenlos spazieren. Kölsch €1,50-2. Fischbrötchen €4-6. Halve Hahn probieren. Wochenende sind voller Musik-Festivals."},
  {id:25,n:"4711 Eau de Cologne Original House — Altstadt",a:"Altstadt",v:["history", "beautiful"],d:25,s:"The house where the original Eau de Cologne was created",st:"The perfume origin. The building is beautiful. You smell history. It\'s olfactory tourism.",im:"It\'s 1709. A scent is invented. It spreads worldwide.",t:"The perfume origin. The building is beautiful. You smell history. It\'s olfactory tourism.\",im:\"It\'s 1709. A scent is invented. It spreads worldwide.\",t:\"Free to enter. €5-20 for perfume. Go any time. The smell is the point.",c:["history_big", "beautiful"],r:"g",nn:"Altstadt — Fachwerk-Herz",ns:"Zerstört und wiederaufgebaut—Kölns Seele.",nst:"Die Altstadt wurde 1945 zerstört. Jetzt ist sie rekonstruiert mit Genauigkeit. Rote Dächern, enge Gassen, Restaurants überall. Du sitzt mit Kölsch und gehörst dazu.",nt:"Kostenlos spazieren. Kölsch €1,50-2. Fischbrötchen €4-6. Halve Hahn probieren. Wochenende sind voller Musik-Festivals."},
  {id:26,n:"St. Maria im Kapitol Romanesque Church — Altstadt",a:"Altstadt",v:["history", "beautiful"],d:26,s:"A Romanesque church with clover-leaf design, medieval and grand",st:"The interior is vast. Stone vaults soar. Light through windows. You feel small and part of something immense.",im:"It\'s 1000 AD. A church is built to last.",t:"The interior is vast. Stone vaults soar. Light through windows. You feel small and part of something immense.\",im:\"It\'s 1000 AD. A church is built to last.\",t:\"Free entry. Go any time. Photography usually allowed. The stone work is exceptional.",c:["history_big", "beautiful"],r:"g",nn:"Altstadt — Fachwerk-Herz",ns:"Zerstört und wiederaufgebaut—Kölns Seele.",nst:"Die Altstadt wurde 1945 zerstört. Jetzt ist sie rekonstruiert mit Genauigkeit. Rote Dächern, enge Gassen, Restaurants überall. Du sitzt mit Kölsch und gehörst dazu.",nt:"Kostenlos spazieren. Kölsch €1,50-2. Fischbrötchen €4-6. Halve Hahn probieren. Wochenende sind voller Musik-Festivals."},
  {id:27,n:"Severinsviertel Old Quarter Streets — Severinsviertel",a:"Severinsviertel",v:["history", "local_only"],d:27,s:"Medieval narrow streets where artisans and locals still live",st:"Streets narrow. Buildings lean. It\'s worn and real. No tourism infrastructure. You\'re in someone\'s neighborhood.",im:"It\'s 1400s. A craftsperson lives here. The same narrow streets exist today.",t:"Streets narrow. Buildings lean. It\'s worn and real. No tourism infrastructure. You\'re in someone\'s neighborhood.\",im:\"It\'s 1400s. A craftsperson lives here. The same narrow streets exist today.\",t:\"Walk freely. Free. Go afternoon. Cafés and shops normal local prices. The authenticity is genuine.",c:["history_big", "local_only"],r:"g",nn:"Severinsviertel — Hidden",ns:"Alte Gassen mit Indie-Läden—südlich Altstadt.",nst:"Severinstorviertel ist versteckter Platz. Kleine Läden, Kunstgalerien, Restaurants nicht touristisch. Es ist Geheimtipp.",nt:"Kostenlos spazieren. Restaurants €12-25. Cafés €3-6. Südlich Altstadt. Sehr schön, wenig touristen."},
  {id:28,n:"Eigelstein Multicultural Quarter Diverse — Eigelstein",a:"Eigelstein",v:["local_only", "weird"],d:28,s:"A neighborhood transformed by immigration, diverse restaurants and shops",st:"The street is alive. Smells everywhere. Languages mixed. Change is visible and ongoing. It\'s energetic and real.",im:"It\'s 2000s. Diverse communities create new neighborhood identity.",t:"The street is alive. Smells everywhere. Languages mixed. Change is visible and ongoing. It\'s energetic and real.\",im:\"It\'s 2000s. Diverse communities create new neighborhood identity.\",t:\"Walk freely. Restaurants €8-20. Go afternoon or evening. The diversity is the point.",c:["local_only", "weird"],r:"g",nn:"Eigelstein Multicultural — Diverse",ns:"Straßenmarkt und Restaurants aus der Welt—neues Köln.",nst:"Eigelstein Straße ist bunt. Köfte-Läden, Falafel-Stände, Döner überall. Neue Menschen, neue Kulturen. Es ist Köln im Wandel.",nt:"Kostenlos spazieren. Essen €4-8. Bier €2. Sehr günstig, sehr laut, sehr lebendig. U-Bahn Eigelstein."},
  {id:29,n:"Stadtgarten Jazz Park Music — Zülpicher",a:"Zülpicher",v:["parks", "night"],d:29,s:"A park hosting jazz and live music events, cultural gathering spot",st:"Music carries. Crowds gather. The park transforms at night. Culture visible and felt.",im:"It\'s evening. Music makes strangers into community.",t:"Music carries. Crowds gather. The park transforms at night. Culture visible and felt.\",im:\"It\'s evening. Music makes strangers into community.\",t:\"Free to park. Events €10-30. Go evening for events. The vibe is alive.",c:["parks", "night"],r:"g",nn:"Stadtgarten Jazz Park Music Garten — Zülpicher",ns:"Botanisch oder geometrisch—Natur als Kunst.",nst:"Der Garten ist gepflanzt mit Kunst. Blumen überall, Fountains, Statuen. Im Sommer Blüten. Du wandelst wie in Gemälde.",nt:"€5-10 Eintritt. Täglich 9-18 Uhr (Winter kürzer). Beste Zeit: Frühling/Sommer wenn Blüten. Audioguide oft kostenlos. Café im Garten."},
  {id:30,n:"Rautenstrauch-Joest Ethnographic Museum — Cologne",a:"Cologne",v:["art", "history"],d:30,s:"Museum of world cultures and artifacts from diverse regions",st:"Objects from everywhere. You learn how others live. The breadth is humbling. Art and anthropology combined.",im:"It\'s now. Museums preserve the world\'s diversity.",t:"Objects from everywhere. You learn how others live. The breadth is humbling. Art and anthropology combined.\",im:\"It\'s now. Museums preserve the world\'s diversity.\",t:\"€8-12 entry. Takes 2 hours. Go midweek. The collection is exceptional and educational.",c:["art", "history_big"],r:"g",nn:"Rautenstrauch-Joest Ethnographic Museum Museum — Cologne",ns:"Museum mit Sammlungen und Geschichte.",nst:"Du betrittst das Museum und siehst Kunstwerke, Artefakte, alte Dinge. Jedes Objekt erzählt eine Geschichte. Es ist Vergangenheit bewahrt für Gegenwart.",nt:"€6-12 Eintritt. Täglich 10-18 Uhr (Montag oft geschlossen). Audioguide kostenlos oder €3. Café im Gebäude. Plan 2 Stunden."},

  {id:31,n:"Kunstbunker WWII Bunker Gallery — Cologne",a:"Cologne",v:["history", "weird"],d:31,s:"An underground WWII bunker converted to an art gallery",st:"Stone walls. History visible. Art hangs below. The contrast is striking. You\'re in war converted to culture.",im:"It\'s 1945. A bunker is a refuge. By 2000s, it\'s a gallery.",t:"Stone walls. History visible. Art hangs below. The contrast is striking. You\'re in war converted to culture.\",im:\"It\'s 1945. A bunker is a refuge. By 2000s, it\'s a gallery.\",t:\"€5-8 entry. Takes 1 hour. Tours available. The history is heavy and present.",c:["history_big", "weird"],r:"g",nn:"Kunstbunker WWII Bunker Gallery Galerie — Cologne",ns:"Kunstwerke and Geschichte—wo Schönheit lebt.",nst:"Die Galerie zeigt Kunstwerke von Künstlern (alt oder neu). Malerei, Skulptur, Installation. Jedes Werk hat Sinn. Es ist Denken visualisiert.",nt:"€6-15 Eintritt. Täglich 10-18 Uhr (Montag oft geschlossen, Mittwoch bis 21 Uhr). Audioguide kostenlos. Café oft vorhanden. Sehr zugänglich."},
  {id:32,n:"Zülpicher Straße Student Nightlife — Zülpicher",a:"Zülpicher",v:["night", "local_only"],d:32,s:"A street of student bars where young people gather at night",st:"Loud and energetic. Music everywhere. Crowds young and drunk happily. It\'s the city\'s youth culture visible.",im:"It\'s night. Students gather. The street becomes theirs.",t:"Loud and energetic. Music everywhere. Crowds young and drunk happily. It\'s the city\'s youth culture visible.\",im:\"It\'s night. Students gather. The street becomes theirs.\",t:\"Free to walk. Bars €3-8 per drink. Go evening onwards. The energy is infectious.",c:["night", "local_only"],r:"g",nn:"Zülpicher Straße Student Nightlife — Zülpicher",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:33,n:"Kwartier Latäng Bohemian Streets — Kwartier",a:"Kwartier",v:["local_only", "beautiful"],d:33,s:"Small medieval streets with galleries, cafés, creative vibe",st:"Shops specific and small. Galleries everywhere. Cafés full of creative types. It\'s bohemia visible.",im:"It\'s 1970s onwards. Artists move to cheap neighborhoods.",t:"Shops specific and small. Galleries everywhere. Cafés full of creative types. It\'s bohemia visible.\",im:\"It\'s 1970s onwards. Artists move to cheap neighborhoods.\",t:\"Walk freely. Galleries €5-15. Cafés €3-8. Go afternoon. The vibe is creative.",c:["local_only", "beautiful"],r:"g",nn:"Kwartier Latäng Bohemian Streets Straße — Kwartier",ns:"Gassen voller Leben—wo echt Köln/München/etc. ist.",nst:"Die Straße ist lebendig. Läden, Restaurants, Menschen überall. Du wandelst und absorberst Atmosphäre. Es ist Stadt pur.",nt:"Kostenlos spazieren. Restaurants €10-30. Cafés €3-7. Beste Zeit: Wochenende. Shopping und Essen zusammen. Sehr authentisch."},
  {id:34,n:"Aachen by Train Day Trip — Aachen",a:"Aachen",v:["history", "beautiful"],d:34,s:"A city 1 hour away, Charlemagne\'s capital, thermal spas",st:"The city is smaller and different. Charlemagne\'s history visible. The thermal culture European. It feels foreign even though it\'s close.",im:"It\'s 800 AD. Charlemagne chooses Aachen. It becomes the center.",t:"The city is smaller and different. Charlemagne\'s history visible. The thermal culture European. It feels foreign even though it\'s close.\",im:\"It\'s 800 AD. Charlemagne chooses Aachen. It becomes the center.\",t:\"Train from Cologne (1 hour, €10-15). Walk old town free. Museums €5-10. Spend full day. The history is weight-bearing.",c:["history_big", "beautiful"],r:"g",nn:"Aachen by Train Day Trip — Aachen",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:35,n:"Brühl Castles Rococo Palaces — Brühl",a:"Brühl",v:["history", "beautiful"],d:35,s:"Two baroque palaces 30 minutes away with lavish decoration",st:"Palaces are excessive. Frescoes cover ceilings. Gardens surround. It\'s wealth made visible and tangible.",im:"It\'s 1700. A prince-bishop builds to show power.",t:"Palaces are excessive. Frescoes cover ceilings. Gardens surround. It\'s wealth made visible and tangible.\",im:\"It\'s 1700. A prince-bishop builds to show power.\",t:\"Train from Cologne (30 minutes, €3-5). €10-12 per palace. Tours available. Spend full day. The palaces are remarkable.",c:["history_big", "beautiful"],r:"g",nn:"Brühl Castles Rococo Palaces Palast — Brühl",ns:"König-Haus—wo Macht und Schönheit zusammenkommen.",nst:"Der Palast ist königlich. Zimmer nach Zimmer nach Zimmer. Fußböden sind Kunstholz. Decken haben Malerei. Möbel sind antik. Es ist Reichtum.",nt:"€10-15 Eintritt. Täglich 9-17 Uhr (Winter 10-16 Uhr). Audioguide kostenlos. Gartenpass oft extra. Plan 2-3 Stunden ein."},
  {id:36,n:"Drachenfels Cable Car Rhine — Drachenfels",a:"Drachenfels",v:["nature", "beautiful"],d:36,s:"A hilltop with cable car, castle ruins, Rhine valley views",st:"The landscape is romantic. Rhine below. Vineyards on slopes. Castle ruins crown. It\'s postcard perfect.",im:"It\'s anytime. The Rhine valley has always attracted people.",t:"The landscape is romantic. Rhine below. Vineyards on slopes. Castle ruins crown. It\'s postcard perfect.\",im:\"It\'s anytime. The Rhine valley has always attracted people.\",t:\"S-Bahn from Cologne (45 minutes, €8-10). Cable car €7-10. Spend full day. The views are worth it.",c:["nature", "beautiful"],r:"g",nn:"Drachenfels Cable Car Rhine — Drachenfels",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:37,n:"Müller Areal Street Art — Müller",a:"Müller",v:["street_art", "weird"],d:37,s:"Another street art district with murals and galleries",st:"Walls are canvases. Art everywhere. It\'s creative and energetic. The scale is immense.",im:"It\'s now. Artists claim space.",t:"Walls are canvases. Art everywhere. It\'s creative and energetic. The scale is immense.\",im:\"It\'s now. Artists claim space.\",t:\"Free walking. Go afternoon for light. Photography encouraged. Cafés scattered.",c:["street_art", "art"],r:"g",nn:"Ehrenfeld Murals — Ehrenfeld",ns:"Ganze Gebäudefassaden sind Kunstwerk—das ist Ehrenfelds Rebellion.",nst:"Ehrenfeld ist Kölns Kunstrevolution. Riesige Murals bedecken Hauswände. Künstler aus der ganzen Welt malen hier. Du siehst in jeder Straße neue Werke. Die Stadt legitimiert die Künstler, und die Stadt wird lebendiger.",nt:"Südöstlich vom Dom. Kostenlose Wanderung. Fotografiert alles. Viele kleine Galerien und Cafés unter €10. Authentische, nicht-touristische Ecke."},
  {id:38,n:"Innenstadt Historic Center Walks — Altstadt",a:"Altstadt",v:["history", "beautiful"],d:38,s:"The historic center streets showing layer upon layer of history",st:"Stone changes with age. Medieval and modern coexist. You walk through time. The palimpsest visible.",im:"It\'s 2000 years. Each century leaves marks.",t:"Stone changes with age. Medieval and modern coexist. You walk through time. The palimpsest visible.\",im:\"It\'s 2000 years. Each century leaves marks.\",t:\"Walk freely. Free. Go morning or afternoon. Photography excellent. The history is visible in stones.",c:["history_big", "beautiful"],r:"g",nn:"Altstadt — Fachwerk-Herz",ns:"Zerstört und wiederaufgebaut—Kölns Seele.",nst:"Die Altstadt wurde 1945 zerstört. Jetzt ist sie rekonstruiert mit Genauigkeit. Rote Dächern, enge Gassen, Restaurants überall. Du sitzt mit Kölsch und gehörst dazu.",nt:"Kostenlos spazieren. Kölsch €1,50-2. Fischbrötchen €4-6. Halve Hahn probieren. Wochenende sind voller Musik-Festivals."},

  {id:40,n:"Carnival Museum Culture — Cologne",a:"Cologne",v:["history", "local_only"],d:40,s:"Museum documenting Cologne\'s famous Carnival tradition",st:"Costumes and floats. Photos of celebration. You learn the tradition\'s depth. It\'s serious and joyful.",im:"It\'s centuries. Carnival marks the calendar.",t:"Costumes and floats. Photos of celebration. You learn the tradition\'s depth. It\'s serious and joyful.\",im:\"It\'s centuries. Carnival marks the calendar.\",t:\"€5-8 entry. Takes 1 hour. Go anytime. The tradition is weight-bearing culturally.",c:["history_big", "local_only"],r:"g",nn:"Carnival Museum Culture Museum — Cologne",ns:"Museum mit Sammlungen und Geschichte.",nst:"Du betrittst das Museum und siehst Kunstwerke, Artefakte, alte Dinge. Jedes Objekt erzählt eine Geschichte. Es ist Vergangenheit bewahrt für Gegenwart.",nt:"€6-12 Eintritt. Täglich 10-18 Uhr (Montag oft geschlossen). Audioguide kostenlos oder €3. Café im Gebäude. Plan 2 Stunden."},

  {id:49,n:"Flora Garden Seasonal Blooms — Flora",a:"Flora",v:["parks", "nature"],d:49,s:"The garden changes with seasons, each visit completely different",st:"Plants transform. Spring to summer to autumn to winter. The cycle is visible. You understand seasons. Impermanence beautiful.",im:"It\'s now. Gardens mark time.",t:"Plants transform. Spring to summer to autumn to winter. The cycle is visible. You understand seasons. Impermanence beautiful.\",im:\"It\'s now. Gardens mark time.\",t:\"Free entry. Go any season. Each visit reveals something. Photography excellent. The change is the point.",c:["parks", "nature"],r:"g",nn:"Flora Botanischer Garten — Südstadt",ns:"Tropische Pflanzen ohne Reise—Gewächshäuser Wahnsinn.",nst:"Der Flora-Garten ist groß mit Glashäusern voller Pflanzen aus der Welt. Palmen, Orchideen, Farne. Innen ist Tropenluft. Eintritt frei!",nt:"Kostenlos! Täglich 8-18 Uhr. Südlich Zentrum. Sehr kinderfreundlich. Café im Park. Beste Ort für kostenloses Ausflug."},

  {id:106,n:"Kunsthofpassage Singing Drainpipes",a:"Ehrenfeld",v:["weird","art","hidden"],d:20,s:"Artist courtyard maze with surreal street art and eerie drainpipes",st:"Kunsthofpassage is a series of interconnected artist courtyards with painted walls, sculptures, and water features. The famous \"singing drainpipes\" create haunting sounds during rain. It\'s playful, weird, and completely free.",im:"Time-travel: Created by artists in the 1990s; constantly evolving.",t:"Free. Walk courtyards any time. Cafes/bars inside.",c:["street_art","weird"],r:"g",nn:"Kunsthofpassage",ns:"Laberinto artístico con drenajes cantores",nst:"Explora los patios llenos de arte surrealista.",nt:"Gratis. Acceso público."},

,{id:117,n:"Odonien Scrapyard Venue",a:"Ehrenfeld",v:["hidden"],d:20,s:"Artist-run junkyard wonderland with flea markets and quirky events!",st:"Wander through this chaotic scrapyard paradise where artists turn trash into treasure. Locals flock here for daytime flea markets and open-air films amid rusty relics. It's Cologne's secret spot for offbeat creativity without the crowds.",im:"Imagine rummaging through colorful junk sculptures under the sun, stumbling on a hidden film screening as graffiti walls whisper urban tales.",t:"U-Bahn to Venloer Str./Geldernstr., walk 10min; free daytime wander, events usually free/low-cost; best afternoons or weekends for markets.",c:["street art", "markets"],r:"g",nn:"Odonien",ns:"Künstlerisches Schrottplatz-Wunderland mit Flohmärkten und Events!",nst:"Schlendere durch diesen chaotischen Schrottplatz-Paradies, wo Künstler Müll in Schätze verwandeln. Locals kommen für Tagesflohmärkte und Open-Air-Filme inmitten rostiger Relikte. Es ist Kölns geheimes Fleckchen für skurrile Kreativität ohne Massen.",nt:"U-Bahn nach Venloer Str./Geldernstr., 10min zu Fuß; tagsüber kostenlos, Events meist gratis/günstig; nachmittags oder Wochenenden für Märkte ideal."},
{id:118,n:"Südbrücke to Poller Wiesen Rhine Loop",a:"Südstadt",v:["hidden"],d:20,s:"Epic local Rhine walk with massive skyline views and picnic spots!",st:"Cross the Südbrücke for killer city panoramas, stroll riverside meadows at Poller Wiesen, loop back via Severinsbrücke. It's a chill, under-the-radar path feeling worlds away from tourist hustle. Perfect for sunset vibes with a picnic.",im:"Picture golden hour light bathing the Dom across the Rhine as you lounge on lush meadows, bridge arches framing your private cityscape.",t:"Tram 12/15 to Südbrücke, walk loop ~5km; completely free; best at sunset or golden hour for photos.",c:["riverside", "views"],r:"g",nn:"Südbrücke-Pollerde-Wiesen-Rheinrunde",ns:"Epische lokale Rheinwanderung mit Skyline-Blicken und Picknickplätzen!",nst:"Überquere die Südbrücke für Hammer-Stadtpanoramen, schlendere Wiesen am Poller Wiesen, zurück über Severinsbrücke. Ein entspannter, unterschätzter Pfad fernab vom Touristentrubel. Ideal für Sonnenuntergang mit Picknick.",nt:"Tram 12/15 zur Südbrücke, ~5km Rundweg; komplett gratis; Sonnenuntergang oder Goldene Stunde für Fotos top."},
{id:119,n:"Marienburg Villa Streets",a:"Marienburg",v:["hidden"],d:20,s:"Elegant villa quarter for romantic architecture spotting!",st:"Stroll quiet lanes lined with grand villas, peeking into lush gardens and ornate facades. This posh yet peaceful neighborhood feels like a hidden gem of old-world charm. People-watch from benches as locals sip coffee in serenity.",im:"Envision wandering tree-shaded paths past ivy-cloaked mansions, catching glimpses of secret gardens like stepping into a forgotten European postcard.",t:"Tram 7/12 to Marienburg; free self-guided walk; anytime, but mornings for quietest vibes.",c:["architecture", "strolls"],r:"g",nn:"Marienburg Villenstraßen",ns:"Elegantes Villenviertel zum Architektur-Spott!",nst:"Schlendere ruhige Gassen mit prächtigen Villen, lug in üppige Gärten und ornamentierte Fassaden. Dieses schicke, friedliche Viertel fühlt sich wie ein verstecktes Juwel alten Charmes an. Beobachte Locals beim Kaffeetrinken von Bänken aus.",nt:"Tram 7/12 nach Marienburg; kostenloser Selbstführungsspaziergang; morgens am ruhigsten."},
{id:120,n:"Wildpark Dünnwald",a:"Dünnwald",v:["hidden"],d:20,s:"Free 'reverse zoo' with wildlife roaming naturally!",st:"Hike forested paths where deer, wild boars, and birds roam free in huge enclosures mimicking wild habitats. It's a serene escape with feeding spots and observation towers. Locals love this underrated nature hit just outside the city buzz.",im:"Feel the thrill of spotting a family of deer grazing mere meters away through the trees, as if you've stumbled into a secret forest kingdom.",t:"Bus 723/753 from Chorweiler Nord; free entry; weekdays for fewer crowds, dawn/dusk for animal activity.",c:["wildlife", "nature"],r:"g",nn:"Wildpark Dünnwald",ns:"Kostenloser 'Umgekehrt-Zoo' mit wilder Tierwelt!",nst:"Wandere Waldpfade, wo Rehe, Wildschweine und Vögel frei in großen Gehegen leben. Ein ruhiges Refugium mit Futterstellen und Aussichtstürmen. Locals schwärmen von diesem unterschätzten Natur-Highlight am Stadtrand.",nt:"Bus 723/753 ab Chorweiler Nord; freier Eintritt; Wochentags weniger voll, Dämmerung für Tiere aktiv."},
{id:121,n:"Römerturm Roman Tower",a:"Altstadt-Süd",v:["hidden"],d:20,s:"Quick peek at ancient Roman city wall remnants!",st:"Spot this sturdy 4th-century tower standing defiant amid modern streets, once part of Cologne's massive fortifications. It's a bite-sized history blast for ancient Rome fans. Snap pics and ponder the legions that marched here millennia ago.",im:"Stand before the weathered stone tower rising unexpectedly from urban chaos, channeling echoes of Roman soldiers patrolling the Rhine frontier.",t:"Tram 1/7 to Römerturm stop; free exterior view; anytime, great photo op.",c:["history", "roman"],r:"g",nn:"Römerturm",ns:"Schneller Blick auf römische Stadtmauer-Reste!",nst:"Entdecke diesen massiven 4.-Jh.-Turm inmitten moderner Straßen, Teil der alten Kölner Befestigungen. Perfekter Mini-History-Hit für Römer-Fans. Mach Fotos und sinne über Legionäre vor 2000 Jahren nach.",nt:"Tram 1/7 zum Römerturm; freier Außenblick; jederzeit, super Foto-Spot."},
{id:122,n:"St. Gereon's Basilica",a:"Altstadt-Nord",v:["hidden"],d:20,s:"Decagonal church with Roman ruins peeking through!",st:"Marvel at this unique 10-sided basilica blending Romanesque grandeur with visible ancient walls underneath. Rainy day wander inside reveals frescoes and quirky architecture. Locals tip it as a peaceful architectural gem.",im:"Gaze up at the soaring decagonal dome, sunlight filtering through stained glass onto Roman stones whispering 4th-century secrets.",t:"U-Bahn Appeltor, 5min walk; free entry; open daily, mornings quietest.",c:["churches", "roman"],r:"g",nn:"St. Gereons Basilika",ns:"Zehnseitige Kirche mit römischer Unterwelt!",nst:"Bewundere diese einzigartige 10-eckige Basilika mit romanischer Pracht und sichtbaren antiken Mauern darunter. Innen bei Regen Fresken und skurrile Architektur. Locals empfehlen es als ruhigen Baustein.",nt:"U-Bahn Appeltor, 5min Fußweg; freier Eintritt; täglich offen, morgens ruhig."},

<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TBGS={"places":"url('../../textures/tex15.webp') center/cover fixed no-repeat","collections":"url('../../textures/tex16.webp') center/cover fixed no-repeat","missions":"url('../../textures/tex17.webp') center/cover fixed no-repeat","plan":"url('../../textures/tex18.webp') center/cover fixed no-repeat","phrases":"url('../../textures/tex1.webp') center/cover fixed no-repeat","default":"url('../../textures/tex15.webp') center/cover fixed no-repeat"};function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
{/* dark scrim over photo */}
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Cologne Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Cologne Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
