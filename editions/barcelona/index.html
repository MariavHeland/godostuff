  {id:1,n:"Hidden Courtyard, Santa Maria del Pi — Gothic Quarter",a:"Gothic Quarter",v:["hidden", "history"],d:1,s:"Medieval courtyards so secret locals forget—stumble through unmarked doors and you\'re in 1400.",st:"You push through a wooden door on a side street and suddenly the noise fades. Gothic courtyard opens—arches dripping with ivy, stone worn smooth by centuries. Light filters through buildings above, casting shadow patterns.",im:"It\'s 1432. A merchant counts coins in the courtyard while masons repair siege damage.",t:"You push through a wooden door on a side street and suddenly the noise fades. Gothic courtyard opens—arches dripping with ivy, stone worn smooth by centuries. Light filters through buildings above, casting shadow patterns.\",im:\"It\'s 1432. A merchant counts coins in the courtyard while masons repair siege damage.\",t:\"Enter from Carrer del Pi or side streets. Go early morning for empty courtyards. Free. Wear sturdy shoes.",c:["history_big", "courtyards"],r:"g",nn:"Hidden Courtyard, Santa Maria del Pi",ns:"Hidden Courtyard, Santa Maria del Pi és tresor català.",nst:"Hidden Courtyard, Santa Maria del Pi respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},

  {id:5,n:"Sant Pau Art Nouveau Hospital — Sant Pau",a:"Sant Pau",v:["beautiful", "history", "hidden"],d:5,s:"A hospital so gorgeous you\'d want to get sick there—abandoned, art nouveau, haunted by patients who walked its tiled halls.",st:"Corridors stretch endlessly, tile work catching light in every color. Wards branch off—beds still visible through broken windows. The architecture is carefully planned, ornate. You feel the architect\'s care.",im:"It\'s 1955. A nurse moves between beds in perfect silence.",t:"Corridors stretch endlessly, tile work catching light in every color. Wards branch off—beds still visible through broken windows. The architecture is carefully planned, ornate. You feel the architect\'s care.\",im:\"It\'s 1955. A nurse moves between beds in perfect silence.\",t:\"Guided tours €15-20. Free grounds if you stay outside. Metro to Sant Pau. Check hours before going.",c:["history_big", "architecture"],r:"g",nn:"Sant Pau Art Nouveau Hospital",ns:"Sant Pau Art Nouveau Hospital és tresor català.",nst:"Sant Pau Art Nouveau Hospital respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:6,n:"Montjuïc Cemetery Secret Paths — Montjuïc",a:"Montjuïc",v:["history", "beautiful", "quiet"],d:6,s:"Enormous cemetery where you get lost between graves of revolutionaries, poets, nameless—hauntingly beautiful, almost nobody visits.",st:"Paths wind between tombs in every conceivable style. Elaborate monuments with marble angels, simple stone crosses, family vaults carved into cliff faces. Light filters through cypress trees. Each grave tells a life fragment.",im:"It\'s 1936. A Republican soldier is buried by underground network, his name never official.",t:"Paths wind between tombs in every conceivable style. Elaborate monuments with marble angels, simple stone crosses, family vaults carved into cliff faces. Light filters through cypress trees. Each grave tells a life fragment.\",im:\"It\'s 1936. A Republican soldier is buried by underground network, his name never official.\",t:\"Metro to Parallel, then bus or cable car. €5 entry. Go afternoon when light is golden. Bring notebook.",c:["history_big", "famous_dead"],r:"g",nn:"Montjuïc Cemetery Secret Paths",ns:"Montjuïc Cemetery Secret Paths és tresor català.",nst:"Montjuïc Cemetery Secret Paths respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:7,n:"Barceloneta Fisherman Alleys — Barceloneta",a:"Barceloneta",v:["local_only", "history", "beautiful"],d:7,s:"Narrow medieval alleys where fishermen still live—this is not tourism, it\'s a working village inside a city.",st:"Alleys so tight you can touch both walls. Laundry hangs like colorful flags. You smell fish, garlic, salt air, someone\'s dinner cooking. Cats sleep in doorways. Old men sit on chairs watching the street. It feels like stepping into another era.",im:"It\'s 1890. A fisherman hauls nets through these same alleys. The sea is closer then.",t:"Alleys so tight you can touch both walls. Laundry hangs like colorful flags. You smell fish, garlic, salt air, someone\'s dinner cooking. Cats sleep in doorways. Old men sit on chairs watching the street. It feels like stepping into another era.\",im:\"It\'s 1890. A fisherman hauls nets through these same alleys. The sea is closer then.\",t:\"Walk from Barceloneta beach toward back streets. Early morning (6-8am) shows real life. Stay respectful. Free to explore.",c:["local_only", "history_big"],r:"g",nn:"Barceloneta Fisherman Alleys",ns:"Barceloneta Fisherman Alleys és tresor català.",nst:"Barceloneta Fisherman Alleys respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:8,n:"Gràcia Neighborhood Hidden Squares — Gràcia",a:"Gràcia",v:["local_only", "beautiful", "hidden"],d:8,s:"Tiny village squares hidden in a city neighborhood—cafés, locals, no tourists—the anti-Barcelona Barcelona.",st:"Each square is its own universe. Plaça del Sol fills with people at sunset. Plaça de la Virreina has an old church and street musicians. Buildings are low, streets narrow, pace human-scaled. You see people actually living.",im:"It\'s 1960. These squares are the center of a small town unaware it\'s been absorbed into a mega-city.",t:"Each square is its own universe. Plaça del Sol fills with people at sunset. Plaça de la Virreina has an old church and street musicians. Buildings are low, streets narrow, pace human-scaled. You see people actually living.\",im:\"It\'s 1960. These squares are the center of a small town unaware it\'s been absorbed into a mega-city.\",t:\"Metro to Fontana or Lesseps. Wander. Sit in a square for an hour. Cheap pintxos and vermouth. Go early evening (6-8pm).",c:["local_only", "courtyards"],r:"g",nn:"Gràcia Neighborhood Hidden Squares",ns:"Gràcia Neighborhood Hidden Squares és tresor català.",nst:"Gràcia Neighborhood Hidden Squares respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:9,n:"Born Medieval Streets — Born",a:"Born",v:["history", "beautiful"],d:9,s:"Medieval street layout so well preserved you\'re literally walking the same routes as 14th-century merchants.",st:"Narrow streets angle and curve without logic. Gothic buildings lean together overhead. Shadows and sudden openings to small plazas. The smell of medieval stone, now mixed with coffee and wine. Every corner has a story in architecture.",im:"It\'s 1380. A merchant hurries through these streets carrying silks from the East.",t:"Narrow streets angle and curve without logic. Gothic buildings lean together overhead. Shadows and sudden openings to small plazas. The smell of medieval stone, now mixed with coffee and wine. Every corner has a story in architecture.\",im:\"It\'s 1380. A merchant hurries through these streets carrying silks from the East.\",t:\"Metro to Jaume I. Wander at will. Visit Santa Maria del Mar church (free entry to courtyard). Go early morning.",c:["history_big", "architecture"],r:"g",nn:"Born Medieval Streets",ns:"Born Medieval Streets és tresor català.",nst:"Born Medieval Streets respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:10,n:"Park Güell Free Zone — Gràcia",a:"Gràcia",v:["beautiful", "hidden", "nature"],d:10,s:"Most people don\'t know Park Güell has a completely free section—same Gaudí magic, zero crowds.",st:"The free zone (upper terraces) has the same unhinged architectural beauty. Locals picnic here. Families lie on the grass. The paid section below is packed; up here it\'s almost empty.",im:"It\'s 1910. Gaudí is tinkering with another impossible idea.",t:"The free zone (upper terraces) has the same unhinged architectural beauty. Locals picnic here. Families lie on the grass. The paid section below is packed; up here it\'s almost empty.\",im:\"It\'s 1910. Gaudí is tinkering with another impossible idea.\",t:\"Walk from metro Lesseps or Fontana uphill. Free section requires no ticket. Go early morning (before 9am).",c:["high_spots", "architecture"],r:"g",nn:"Park Güell Free Zone",ns:"Park Güell Free Zone és tresor català.",nst:"Park Güell Free Zone respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:11,n:"Montjuïc Magic Fountain (Free Viewpoint) — Montjuïc",a:"Montjuïc",v:["beautiful", "night", "history"],d:11,s:"A giant fountain that dances to music and lights at night—gorgeously tacky and absolutely mesmerizing.",st:"Water shoots up, twists, falls. Colored lights shift—blues, reds, greens. Music swells. Hundreds watch, mouths open. It\'s kitsch and magic mixed. The backdrop is the illuminated National Museum.",im:"It\'s 1929. Engineers test the fountain for the first time—chaos and wonder as water behaves impossibly.",t:"Water shoots up, twists, falls. Colored lights shift—blues, reds, greens. Music swells. Hundreds watch, mouths open. It\'s kitsch and magic mixed. The backdrop is the illuminated National Museum.\",im:\"It\'s 1929. Engineers test the fountain for the first time—chaos and wonder as water behaves impossibly.\",t:\"Free to watch. Shows Wed-Sun at 8-10pm (times vary). Arrive early. Best from terraces above. Bring someone to talk to.",c:["high_spots", "night"],r:"g",nn:"Montjuïc Magic Fountain (Free Viewpoint)",ns:"Montjuïc Magic Fountain (Free Viewpoint) és tresor català.",nst:"Montjuïc Magic Fountain (Free Viewpoint) respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:12,n:"Civil War Air Raid Shelters (Refugi 307) — Poble Sec",a:"Poble Sec",v:["history", "weird"],d:12,s:"Tunnel system carved under the city where 2,000 people hid from bombs—scars and scratches still visible on walls.",st:"Tunnels are narrow and dark. Your eyes adjust. Carved names and dates appear on walls. Display panels show families huddled here. The walls are solid rock. You almost hear the echoes of sirens.",im:"It\'s March 1938. Sirens wail. People flood into tunnels as bombers approach.",t:"Tunnels are narrow and dark. Your eyes adjust. Carved names and dates appear on walls. Display panels show families huddled here. The walls are solid rock. You almost hear the echoes of sirens.\",im:\"It\'s March 1938. Sirens wail. People flood into tunnels as bombers approach.\",t:\"Guided tours only (€3.50-5). Book ahead. Metro to Parallel. 45-minute tour. Bring a light. Not for claustrophobics.",c:["history_big", "scary"],r:"y",nn:"Civil War Air Raid Shelters (Refugi 307)",ns:"Civil War Air Raid Shelters (Refugi 307) és tresor català.",nst:"Civil War Air Raid Shelters (Refugi 307) respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:13,n:"Tibidabo Views & Church — Tibidabo",a:"Tibidabo",v:["beautiful", "high_spots", "weird"],d:13,s:"Decaying amusement park plus iconic church on Barcelona\'s highest point—the city becomes a map spread below.",st:"The church is white and neoclassical. The old amusement park sits in varying states of decay. The view is immense—the whole city fans out, the Mediterranean beyond. On clear days you see to Montserrat.",im:"It\'s 1899. The first pilgrims arrive at this new church.",t:"The church is white and neoclassical. The old amusement park sits in varying states of decay. The view is immense—the whole city fans out, the Mediterranean beyond. On clear days you see to Montserrat.\",im:\"It\'s 1899. The first pilgrims arrive at this new church.\",t:\"Tram + cable car (€7 return) or bus. Church free inside. Amusement park €10-15. Go late afternoon for golden light.",c:["high_spots", "architecture"],r:"g",nn:"Tibidabo Views & Church",ns:"Tibidabo Views & Church és tresor català.",nst:"Tibidabo Views & Church respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:14,n:"Horta Labyrinth Garden — Horta",a:"Horta",v:["beautiful", "history", "hidden"],d:14,s:"18th-century hedge maze where you actually get lost—fairy tale place making you feel like you\'re in another era.",st:"Tall hedges form passages that twist and confuse. Every corner reveals a new section—fountains, statuary, hidden glades. The lower gardens are geometric perfection. It\'s lush and quiet. You hear water, birds, your footsteps.",im:"It\'s 1802. A nobleman and his wife walk these paths by lamplight.",t:"Tall hedges form passages that twist and confuse. Every corner reveals a new section—fountains, statuary, hidden glades. The lower gardens are geometric perfection. It\'s lush and quiet. You hear water, birds, your footsteps.\",im:\"It\'s 1802. A nobleman and his wife walk these paths by lamplight.\",t:\"Metro to Mundet. €5 entry. Open Tues-Sun. Go in spring when everything blooms. Arrive early; fills by mid-afternoon.",c:["history_big", "parks"],r:"g",nn:"Horta Labyrinth Garden",ns:"Horta Labyrinth Garden és tresor català.",nst:"Horta Labyrinth Garden respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:15,n:"Pedralbes Monastery — Pedralbes",a:"Pedralbes",v:["history", "beautiful", "quiet"],d:15,s:"Gothic monastery cloister so perfectly preserved you\'re inside the 14th century—one of Europe\'s most beautiful religious spaces.",st:"The cloister is a perfect square, arcaded on all sides. Stone columns support pointed arches. Orange trees grow in the center. Light and shadow play across pavement. Chapels open off the cloister—each a jewel of religious art.",im:"It\'s 1347. A nun walks the cloister in prayer.",t:"The cloister is a perfect square, arcaded on all sides. Stone columns support pointed arches. Orange trees grow in the center. Light and shadow play across pavement. Chapels open off the cloister—each a jewel of religious art.\",im:\"It\'s 1347. A nun walks the cloister in prayer.\",t:\"Metro to Reina Elisenda. €5-7 entry. Go midweek morning for quiet. The museum upstairs has lesser-known medieval art.",c:["history_big", "architecture"],r:"g",nn:"Pedralbes Monastery",ns:"Pedralbes Monastery és tresor català.",nst:"Pedralbes Monastery respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:16,n:"Olympic Ruins (1992 Games) — Montjuïc",a:"Montjuïc",v:["weird", "history"],d:16,s:"Abandoned Olympic facilities—architecture of a moment when Barcelona thought it could be something else, slowly crumbling.",st:"The main stadium still stands, enormous and empty. Other buildings decay—swimming pools with no water, climbing walls no one uses. Pigeons have claimed the seats. Nature slowly reclaims architecture.",im:"It\'s 1992. Thousands roar in the stadium. Athletes sprint. The city believes it\'s transformed forever.",t:"The main stadium still stands, enormous and empty. Other buildings decay—swimming pools with no water, climbing walls no one uses. Pigeons have claimed the seats. Nature slowly reclaims architecture.\",im:\"It\'s 1992. Thousands roar in the stadium. Athletes sprint. The city believes it\'s transformed forever.\",t:\"Cable car or bus to Montjuïc. €15 for stadium tour, or free to see from outside. Go late afternoon for melancholy light.",c:["history_big", "architecture"],r:"g",nn:"Olympic Ruins (1992 Games)",ns:"Olympic Ruins (1992 Games) és tresor català.",nst:"Olympic Ruins (1992 Games) respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},

  {id:106,n:"MNAC Rooftop & Gardens",a:"Montjuïc",v:["beautiful","art","free"],d:15,s:"Free rooftop bar at art museum with city views — sunset from a secret terrace",st:"The National Art Museum of Catalonia (MNAC) has a hidden rooftop terrace open to the public with panoramic city vistas. The stone terraces around the building offer quiet corners where few tourists venture.",im:"Time-travel: MNAC opened in 1934, housed in the stunning Palau Nacional.",t:"Free rooftop access. Montjuïc cable car or Funicular. Sunset hours best.",c:["high_spots","art"],r:"g",nn:"Terrassa MNAC",ns:"Terrassa lliure al museu d\'art amb vistes a la ciutat",nst:"Gaudeix de les vistes panoràmiques des de la terrassa del museu.",nt:"Accés lliure a la terrassa. Telefèric de Montjuïc. Posta de sol millor."},
  {id:107,n:"Bunkers del Carmel (Bunkers Viewpoint)",a:"Carmel",v:["history","beautiful","free"],d:20,s:"Abandoned Spanish Civil War bunkers with 360° city views — a historical hideaway",st:"These shell-pocked bunkers were built in 1938 to defend against bombing; now they\'re a free panoramic viewpoint. Climb through the structures to find the best vistas; locals come here for sunset picnics.",im:"Time-travel: Built during the Spanish Civil War, these bunkers witness Barcelona\'s 20th-century trauma.",t:"Free. Walk from Lesseps metro or bus. Bring water, it\'s a climb.",c:["high_spots","history_big"],r:"g",nn:"Búnquers del Carmel",ns:"Búnquers abandonats de la Guerra Civil amb vistes 360°",nst:"Pujai pel búnquer historic per vistes completes de Barcelona.",nt:"Lliure. Caminada des de Lesseps. Porteu aigua."},
  {id:108,n:"Montjuïc Free Museums (Fundació Joan Miró)",a:"Montjuïc",v:["art","free","beautiful"],d:12,s:"World-class modern art for free or cheap — Miró\'s surreal universe on a budget",st:"Check MNAC and the Joan Miró Foundation for free-entry hours (often Sunday afternoons). Montjuïc becomes a cultural refuge with gardens, museums, and viewpoints. Bring a wine bottle and settle in a garden.",im:"Time-travel: Montjuïc was Barcelona\'s 1929 World\'s Fair site; culture developed here over decades.",t:"Check museum websites for free/pay-what-you-wish hours. Usually Sun afternoons free.",c:["free_museum","art"],r:"g",nn:"Fundació Joan Miró Accés Lliure",ns:"Art modern de classe mundial gratis",nst:"Explora el museu Miró durant les hores gratuïtes.",nt:"Comprova el web del museu. Diumenge després gratuït."}

,{id:118,n:"Mirador de Migdia",a:"Montjuïc",v:["hidden", "viewpoint"],d:20,s:"Wild pine-scented sunset hideaway locals swear by—mostly empty magic!",st:"Wander into whispering pines where the city sprawls below like a glittering toy set. Feel the hush of a secret spot few stumble upon, with golden light painting Montjuïc's wild edges. It's that rare Barcelona breath of untamed freedom.",im:"Imagine sinking into soft pine needles as the sun dips, turning the distant sea to fire and the skyline to silhouette poetry.",t:"Hike up from Montjuïc escalators or bus to Paral·lel (Metro L2/L3); free always, best at golden hour sunset. Windy—bring a layer!",c:["viewpoints", "hikes"],r:"g",nn:"Mirador de Migdia",ns:"¡Refugio salvaje de atardecer perfumado a pino que los locales adoran—¡vacío casi siempre!",nst:"Pasea entre pinos susurrantes donde la ciudad se extiende abajo como un juguete brillante. Siente el silencio de un rincón secreto que pocos encuentran, con luz dorada pintando los bordes salvajes de Montjuïc. Es esa rara bocanada de libertad barcelonesa indómita.",nt:"Sube a pie desde las escaleras de Montjuïc o bus a Paral·lel (Metro L2/L3); siempre gratis, mejor a la hora dorada del atardecer. ¡Ventoso—trae una capa!"},
{id:119,n:"Hike up to Tibidabo",a:"Tibidabo",v:["hidden", "hike"],d:25,s:"Sweaty free adventure trail tourists skip—summit glory awaits!",st:"Pound the hidden paths from Vallvidrera, lungs burning as forests swallow the city noise. Emerge triumphant at Tibidabo's peak, earning views that feel like your personal conquest. Locals grin knowing you've dodged the tram crowds.",im:"Picture cresting the final ridge, sweat-streaked and alive, with Barcelona's mosaic unfurling under your feet like a hard-won treasure map.",t:"Start FGC Baixador de Vallvidrera, follow trails up (1-2hrs); free, go early morning weekdays to avoid heat. Sturdy shoes essential!",c:["hikes", "viewpoints"],r:"g",nn:"Subida a pie a Tibidabo",ns:"¡Aventura gratis y sudada que los turistas evitan—¡gloria en la cima te espera!",nst:"Golpea los senderos ocultos desde Vallvidrera, pulmones ardiendo mientras los bosques tragan el ruido de la ciudad. Emerge triunfante en la cima de Tibidabo, ganando vistas que parecen tu conquista personal. Los locales sonríen sabiendo que has evitado las multitudes del tranvía.",nt:"Empieza en FGC Baixador de Vallvidrera, sigue los senderos arriba (1-2h); gratis, ve temprano por la mañana entre semana para evitar el calor. ¡Zapatos resistentes imprescindibles!"},
{id:120,n:"Carrer dels Mirallers Art Studios",a:"Born",v:["hidden", "street art"],d:15,s:"El Born's tiny workshop maze—peek into artists' secret worlds!",st:"Duck into narrow alleys where paint-splattered doors hide buzzing studios and craft benches. Chat with creators over coffee steam, feeling the pulse of real Born bohemia. It's a rabbit warren of inspiration minus the tourist polish.",im:"Envision leaning into a doorway, watching a potter's wheel spin clay into life amid the scent of fresh varnish and street murmurs.",t:"Metro Jaume I (L4), wander from Carrer dels Mirallers; free, daytime weekdays best. Watch pockets—nearby Sant Pere can be pickpocket-y.",c:["streets", "art"],r:"g",nn:"Estudios de arte en Carrer dels Mirallers",ns:"¡Laberinto de talleres diminutos en El Born—¡asoma al mundo secreto de los artistas!",nst:"Entra en callejones estrechos donde puertas salpicadas de pintura esconden estudios zumbantes y bancos de artesanía. Charla con creadores sobre vapor de café, sintiendo el pulso de la bohemia real del Born. Es un laberinto de inspiración sin el pulido turístico.",nt:"Metro Jaume I (L4), deambula desde Carrer dels Mirallers; gratis, mejor entre semana de día. ¡Cuidado con carteristas—cerca de Sant Pere puede ser riesgoso!"},
{id:121,n:"Teatre Grec & Grec Garden",a:"Montjuïc",v:["hidden", "ruins"],d:18,s:"Ancient amphitheater ghost—wander empty stone seats like a time traveler!",st:"Climb crumbling steps of this Greek-style theater carved into Montjuïc's flank, echoes of ancient cheers in the air. Lounge in the wild garden fringe where performers once dazzled, now yours alone. Sunset turns it mythic.",im:"Feel the stones warm under you as shadows stretch across tiered seats, the city twinkling like stars in a coliseum dream.",t:"Montjuïc escalators or bus 150; free outside events, best quiet mornings or off-season. No shows? Total secret takeover.",c:["ruins", "gardens"],r:"g",nn:"Teatre Grec y Jardín Grec",ns:"¡Fantasma de anfiteatro antiguo—¡deambula asientos de piedra vacíos como viajero del tiempo!",nst:"Sube escalones desmoronados de este teatro estilo griego tallado en el flanco de Montjuïc, ecos de aplausos antiguos en el aire. Reposa en el borde salvaje del jardín donde performers deslumbraban, ahora solo tuyo. El atardecer lo vuelve mítico.",nt:"Escaleras de Montjuïc o bus 150; gratis fuera de eventos, mejor mañanas tranquilas o fuera de temporada. ¿Sin shows? ¡Toma total secreta!"},
{id:122,n:"Avinguda Mare de Montserrat Street Views",a:"Montjuïc",v:["hidden", "viewpoint"],d:12,s:"Low-key avenue panorama—city vistas without the hype!",st:"Stroll this unpretentious avenue where everyday life frames epic city sweeps. Locals pause here for quiet skyline gazes, far from selfie sticks. It's Barcelona's subtle scenic hack.",im:"Catch your breath mid-stride as the urban grid rolls out below, framed by casual apartment balconies and whispering winds.",t:"Metro Espanya (L1/L3), walk up Avinguda Mare de Montserrat; free anytime, golden hour for glow. Easy add-on to MNAC.",c:["streets", "viewpoints"],r:"g",nn:"Vistas callejeras en Avinguda Mare de Montserrat",ns:"¡Panorama de avenida discreta—¡vistas urbanas sin bombo!",nst:"Pasea por esta avenida sin pretensiones donde la vida cotidiana enmarca barridos épicos de la ciudad. Los locales se detienen aquí para miradas tranquilas al skyline, lejos de palos de selfie. Es el hack escénico sutil de Barcelona.",nt:"Metro Espanya (L1/L3), camina por Avinguda Mare de Montserrat; gratis siempre, hora dorada para el resplandor. ¡Fácil añadido al MNAC!"},
{id:123,n:"Parc del Guinardó & Mirador de Horta",a:"Horta-Guinardó",v:["hidden", "park"],d:22,s:"Terraced hilltop oasis—sea-to-Sagrada views in pine paradise!",st:"Meander dirt paths and stairways through lush terraces built from metro dirt, uncovering lookout gems. Gaze over sea, Sagrada Família, and skyline from stone platforms amid sculptures. Far from Güell's crowds, pure local zen.",im:"Perch on a rugged stone overlook, pines rustling as the entire city-scape pulses alive from mountains to Mediterranean shimmer.",t:"Metro Mundet (L3) or bus 92; free, weekdays for solitude. Pack water—hilly paths.",c:["parks", "viewpoints"],r:"g",nn:"Parc del Guinardó y Mirador de Horta",ns:"¡Oasis de colina aterrazada—¡vistas mar-a-Sagrada en paraíso de pinos!",nst:"Deambula por caminos de tierra y escaleras entre terrazas exuberantes construidas con tierra de metro, descubriendo miradores joya. Mira sobre mar, Sagrada Família y skyline desde plataformas de piedra entre esculturas. Lejos de multitudes de Güell, zen local puro.",nt:"Metro Mundet (L3) o bus 92; gratis, entre semana para soledad. Lleva agua¡—caminos empinados."},
{id:124,n:"Mirador de Sarrià (Mirador dels Xiprers)",a:"Sarrià",v:["hidden", "viewpoint"],d:18,s:"Serene garden hill nook—Collserola greens meet sea blues!",st:"Nestled in Sarrià's peaceful hills, this cypress-shaded mirador blends forest calm with urban sweep. Read or daydream as greenery frames the sea and skyline in perfect harmony. Ultimate chill escape for horizon huggers.",im:"Sink into a bench amid cypresses, book forgotten as Collserola's wild green melts into Barcelona's glittering blue horizon.",t:"FGC Sarrià (S1/S2/S6), short walk up; free, anytime but dawn/dusk magic. Quiet neighborhood—respect locals.",c:["viewpoints", "gardens"],r:"g",nn:"Mirador de Sarrià (Mirador dels Xiprers)",ns:"¡Rincón sereno de colina ajardinada—¡verdes de Collserola encuentran azules del mar!",nst:"Anidado en las colinas pacíficas de Sarrià, este mirador sombreado de cipreses mezcla calma forestal con barrido urbano. Lee o sueña despierto mientras el verde enmarca el mar y skyline en armonía perfecta. Escape definitivo para abrazadores del horizonte.",nt:"FGC Sarrià (S1/S2/S6), corto paseo arriba; gratis, siempre pero magia al alba/anochecer. Barrio tranquilo¡—respeta a los locales."},
{id:125,n:"Pasaje de Sert",a:"Eixample",v:["hidden"],d:10,s:"Eixample's vine-draped secret passage—oasis shadows dance!",st:"Slip into this mid-city refuge where antique balconies drip with climbing greenery. Afternoon light weaves magical shadows over charming architecture, turning a quick walk into evocative poetry. Urban poetry pocket.",im:"Step under leafy arches as sunbeams filter through vines, casting lace patterns on faded walls like a living gallery.",t:"Metro Passeig de Gràcia (L2/L3/L4), near Pg. de Gràcia 81; free, afternoons for light play. Quick hidden detour.",c:["streets", "architecture"],r:"g",nn:"Pasaje de Sert",ns:"¡Pasaje secreto cubierto de enredaderas en Eixample—¡sombras de oasis bailan!",nst:"Deslízate en este refugio céntrico donde balcones antiguos gotean vegetación trepadora. La luz de la tarde teje sombras mágicas sobre arquitectura encantadora, convirtiendo un paseo rápido en poesía evocadora. Bolsa de poesía urbana.",nt:"Metro Passeig de Gràcia (L2/L3/L4), cerca Pg. de Gràcia 81; gratis, tardes para juego de luces. ¡Detour oculto rápido!"},
{id:126,n:"Plaça d’Osca Bar-Hopping Square",a:"Sants",v:["hidden"],d:15,s:"Sants locals' bar square—DIY nightlife zero cover!",st:"Dive into this unassuming plaza where neighborhood bars spill laughter and cheap brews. Pick any spot for vermut or caña amid real chatter, feeling Barcelona's heartbeat sans tourist traps. Pure people-watching gold.",im:"Clink glasses at a sticky bar table, locals' stories swirling as the square fills with evening easy vibes.",t:"Metro Plaça d’Osca (L1); free hangs, evenings from 7pm. Budget brews ~€2-3.",c:["squares", "nightlife"],r:"g",ef:"Menú del día nearby weekdays ~€10-12 for lunch fuel.",nn:"Plaça d’Osca para bares",ns:"¡Plaza de bares de locales en Sants—¡noche DIY sin entrada!",nst:"Sumérgete en esta plaza sin pretensiones donde bares de barrio derraman risas y birras baratas. Elige cualquier sitio para vermut o caña entre charla real, sintiendo el latido de Barcelona sin trampas turísticas. Oro puro para ver gente.",nt:"Metro Plaça d’Osca (L1); colgar gratis, tardes desde 19h. Birras económicas ~2-3€."}
  ,{id:127, n:"Ocata Beach — Badalona", a:"Badalona", v:["hidden","beautiful","quiet"], d:30, s:"A 35-minute train ride north finds a low-key Catalan beach where locals spend whole afternoons, not tourists.", st:"Sun-warmed sand stretches wide and flat, beach volleyball nets punctuate the shoreline, chiringuitos serve fresh seafood at wooden tables where people call out scores in Catalan. Saturday mornings have a neighborhood-market feel—families in for the day.", im:"Salt air, gentle Mediterranean waves, the clink of vermouth glasses, someone calls out a volleyball score in Catalan, the beach radio playing softly.", t:"L2 Renfe Rodalies from Passeig de Gràcia to Ocata station (30 min, €4). Services every 15 min. Arrive by 10am weekends. Chiringuitos open 11am. Free entry.", c:[], r:"g", nn:"Platja d'Ocata", ns:"Un tren que et porta a la platja que els locals estimen, sense turistes.", nst:"La sorra és còmoda, la gent parla català, els xiringuitos fan peix a la brasa mentre els nens juguen a voleibol i la música de la ràdio suena al fons.", nt:"Línia L2 Renfe des de Passeig de Gràcia fins a Ocata (30 min, €4). Arribar antes de les 10 del matí els dissabtes. Xiringuitos obren a les 11."}

  ,{id:128, n:"Castelldefels Beach — Castelldefels", a:"Castelldefels", v:["beautiful","quiet","free entry"], d:45, s:"Barcelona's widest beach, rarely crowded, with a castle-topped village above and pine trees backing the sand.", st:"The beach stretches endlessly in both directions, backed by pine forest, locals in small clusters along the shore. Medieval castle sits watchful above the village streets. Summer weekday mornings are wonderfully empty.", im:"Fine golden sand, warm wind carrying pine scent, the castle silhouette against afternoon sun, a single local couple walking the waterline.", t:"R2N Renfe from Plaça de Catalunya to Castelldefels station (45 min, €5). Walk 10 min downhill to beach. June-September best. Free entry, no crowds.", c:[], r:"g", nn:"Platja de Castelldefels", ns:"La platja més ampla de Barcelona però sense la multitud que l'acompanya al Born.", nst:"Sorra fina, boscos de pi al fons, el castell observa des del puig, els dies entre setmana són tranquils i la gent local es dispersa al llarg de la costa.", nt:"R2N Renfe des de Plaça de Catalunya fins a Castelldefels (45 min, €5). Camina 10 minuts cap avall fins a la platja. Millor juny-setembre. Entrada gratuïta."}

  ,{id:129, n:"Colònia Güell Crypt — Santa Coloma de Cervelló", a:"Santa Coloma de Cervelló", v:["history","beautiful","weird"], d:90, s:"Gaudí's actual laboratory before Sagrada Família—a 1908 crypt in an 1890s textile workers' village 45 minutes south, UNESCO World Heritage.", st:"The crypt is underground and cool, filled with parabolic columns Gaudí designed using inverted funicular geometry—invisible engineering that makes the space feel suspended. Industrial workers' village above gives way to contemplative sacred geometry below. Few tourists know it exists.", im:"Stepping into shadow from bright Catalan sun, cool stone, the peculiar slant of those columns holding weight you can't quite see, ancient and futuristic at once.", t:"Take Renfe R5/R50 from Sants station to Santa Coloma de Cervelló (40 min, €4). Walk 10 min to site. Mon-Fri 10am-5pm, Sat-Sun 10am-3pm. €7. Closed Jan 1, 6, 25-26.", c:[], r:"y", nn:"Cripta de la Colònia Güell", ns:"El laboratori secret de Gaudí, anterior a la Sagrada Família, dins d'una colònia tèxtil dels 1890s.", nst:"Sota terra i fresca, plena de columnes parabòliques que Gaudí va dissenyar usant una geometria invertida que es sent suspesa. Els pobles de treballadors industrials donen pas a una geometria sagrada contemplativa que pocs turistes coneixen.", nt:"Renfe R5/R50 des de Sants fins a Santa Coloma de Cervelló (40 min, €4). Camina 10 min. Dilluns-divendres 10-17h, dissabte-diumenge 10-15h. €7."}

  ,{id:130, n:"Castellers Training — El Clot", a:"El Clot", v:["local","weird","history"], d:60, s:"Watch UNESCO-recognized human tower builders in real training sessions—coordinated acrobatics that look impossible but have been happening since medieval times.", st:"Tuesdays, Thursdays, and Fridays at their Clot headquarters, teams of 40+ build towers by climbing on each other, the whole structure swaying, spotters shouting in Catalan, drums beating steadily. It's chaotic and utterly focused at once. The bar upstairs fills with locals sipping beer.", im:"The base trembles as climbers layer up, rope creaking, someone calling depth charges, the smell of effort and effort, a kid at ground level looking up at 8-person height.", t:"L1 metro to Clot. Carrer de Bilbao 212. Training: Tue 7:30pm, Thu 8pm, Fri 9pm (Feb-Nov, summer break Aug). Free to watch from bar. Arrive early.", c:[], r:"y", nn:"Castellers de Barcelona", ns:"Els constructors de torres humans UNESCO que s'entrenen en sessions reals—acròbates coordinats que semblen impossibles però duran des de l'edat mitjana.", nst:"Dimarts, dijous i divendres a la seu de Clot, equips de 40+ construeixen torres escalant-se entre ells, tota l'estructura oscil·lant, els vigilants cridant en català, els tambors batent constantment. És caòtic i totalment enfocat al mateix temps.", nt:"L1 al Clot. Carrer Bilbao 212. Entrenament: dimarts 19:30h, dijous 20h, divendres 21h (febrer-novembre). Gratis a mirar des del bar."}

  ,{id:131, n:"Mercat de l'Abaceria — Gràcia", a:"Gràcia", v:["local","history","free entry"], d:45, s:"The 1892 working-class market of Gràcia village—many stall-holders are grandchildren of the original vendors, same family recipes for 130 years.", st:"Three arched naves with exposed metal and brick, wooden stalls, vendors calling out in Catalan. Tuesday and Saturday mornings packed with locals buying for the week. The café upstairs watches the whole market. Everything smells like fresh meat and soap.", im:"Metal exposed beams arching overhead, vendors in aprons calling prices, someone's grandmother recognizing a regular customer from two stalls away, the smell of fresh sausage.", t:"FGC train from Plaça de Lesseps to Gràcia stop, or walk from Vila de Gràcia metro. Travessera de Gràcia street. Tue & Sat mornings best. Free to browse, cheap to eat. 7am-2:30pm.", c:[], r:"g", nn:"Mercat de l'Abaceria", ns:"El mercat de classe treballadora de Gràcia del 1892—moltes parades pertanyen als néts dels venedors originals, les mateixes receptes familiars 130 anys.", nst:"Tres naus amb arcs de ferro exposat i maó, parades de fusta, venedors cridant en català. Els dimarts i dissabtes al matí plens de locals comprant per a la setmana. El cafè de dalt mira tot el mercat.", nt:"FGC des de Plaça de Lesseps fins a Gràcia. Carrer Travessera de Gràcia. Dimarts i dissabtes al matí millor. Gratis mirar, barat menjar. 7-14:30h."}

  ,{id:132, n:"Palau de la Música Catalana — Eixample", a:"Eixample", v:["beautiful","history"], d:60, s:"Domènech's 1908 UNESCO concert hall—not Gaudí—where moderniste stained glass wraps the whole ceiling, glowing light like being inside a jewel.", st:"Built for the Orfeó Català choir, the interior is a Catalan modernism masterpiece—wrought iron, tilework, mosaics, and that skylight dome of amber and blue glass. Evening concerts fill the place with chandelier light. The foyer is a public museum. Locals come for serious classical music.", im:"Walking under that glowing skylight dome—amber and blue tiles filtering afternoon sun into 10,000 tiny light pieces, ornate iron railings catching the glow, feeling like you've stepped into stained glass.", t:"L3 metro to Urquinaona. Carrer Palau de la Música, 4. Tours daily 10am-3:30pm €20, or attend evening concerts €25-60. Booking essential. Phone +34 93 295 72 00.", c:[], r:"y", nn:"Palau de la Música Catalana", ns:"La sala de concerts modernista del 1908 de Domènech—no Gaudí—on el vidre de color del sostre il·lumina tot la nit com estar dins d'una joia.", nst:"Construït per al cor Orfeó Català, l'interior és una obra mestra del modernisme català—ferro forjat, rajoleria, mosaics, i aquest domu de vidre ambar i blau. Els concerts vespertins omplen el lloc de llum de llàntia.", nt:"L3 fins a Urquinaona. Carrer Palau de la Música 4. Tours diaris 10-15:30h €20, o concerts vespertins €25-60. Reserva essencial."}

  ,{id:133, n:"Casa Vicens — Gràcia", a:"Gràcia", v:["history","beautiful"], d:75, s:"Gaudí's first house (1883-1885)—small, obsessed with green and white ceramic tile geometry, tells you everything about where his brain was heading.", st:"Built in Gràcia before he got famous, it's cramped and intense, every room a puzzle of green/white tiles in geometric patterns. The courtyard is a prayer in azulejos. You feel the young architect's obsession. Ground floor still has the original grocery store ironwork.", im:"Stepping into rooms where every surface is covered in geometric tile—green and white diamonds and crosses, the courtyard a closed world of color and pattern, sunlight through the tiles casting grid shadows.", t:"L3 metro to Lesseps or Fontana. Gaudí 24, Gràcia. Daily 10am-8pm. €18 full. Top floor has rooftop view. Entrance includes audioguide in Catalan/Spanish/English. +34 93 219 75 89.", c:[], r:"g", nn:"Casa Vicens", ns:"La primera casa de Gaudí (1883-1885)—petita, obsessionada amb la geometria de rajoleria verda i blanca, et diu tot sobre on anava el seu cervell.", nst:"Construïda a Gràcia abans de fer-se famós, és estreta i intensa, cada habitació un trencaclosques de rajoles verdes/blanques en patrons geomètrics. El pati és una pregària en azulejos.", nt:"L3 a Lesseps o Fontana. Gaudí 24, Gràcia. Diaris 10-20h. €18. Planta superior amb vista de terrat. +34 93 219 75 89."}

  ,{id:134, n:"Recinte Modernista Sant Pau — Sant Pau", a:"Sant Pau", v:["beautiful","history","weird"], d:120, s:"World's largest Art Nouveau complex—27 buildings in a garden city designed by Domènech (not Gaudí), UNESCO site, closed as hospital in 2009, now a museum.", st:"Underground galleries connect all 27 pavilions—you walk through 1km of covered tunnels linking wards, operating rooms, living quarters. The whole complex is built like a city, with streets above ground and secrets below. Restoration revealed original tile work and mosaics. Garden courtyards between buildings feel lost-in-time.", im:"Walking through cool underground tile corridors lined with small tiled plaques naming old wards, emerging into sunlit courtyards with fountains and art-nouveau benches, then back underground again.", t:"L5 metro to Sant Pau / Dos de Maig. Santa Creu i Sant Pau 167. Wed-Sun 10am-2pm, guided tours 11am, 12:15pm, 1:30pm in Catalan/Spanish. €15. +34 93 556 50 01.", c:[], r:"y", nn:"Recinte Modernista Sant Pau", ns:"El complex modernista més gran del món—27 edificis en una ciutat-jardí dissenyada per Domènech, lloc UNESCO, tancat com a hospital el 2009, ara museu.", nst:"Les galeries subterrànies connecten els 27 pavellons—camines per 1 km de túnels coberts que enllaçen quiròfans, sales de viure, salons. Tot el complex està construït com una ciutat, amb carrers a dalt i secrets a sota.", nt:"L5 a Sant Pau/Dos de Maig. Santa Creu i Sant Pau 167. Dimecres-diumenge 10-14h, tours 11, 12:15, 13:30h. €15. +34 93 556 50 01."}

  ,{id:135, n:"Casa Vicens — Gràcia", a:"Gràcia", v:["history","beautiful"], d:75, s:"Gaudí's first house (1883-1885)—small, obsessed with green and white ceramic tile geometry, tells you everything about where his brain was heading.", st:"Built in Gràcia before he got famous, it's cramped and intense, every room a puzzle of green/white tiles in geometric patterns. The courtyard is a prayer in azulejos. You feel the young architect's obsession. Ground floor still has the original grocery store ironwork.", im:"Stepping into rooms where every surface is covered in geometric tile—green and white diamonds and crosses, the courtyard a closed world of color and pattern, sunlight through the tiles casting grid shadows.", t:"L3 metro to Lesseps or Fontana. Gaudí 24, Gràcia. Daily 10am-8pm. €18 full. Top floor has rooftop view. Entrance includes audioguide in Catalan/Spanish/English. +34 93 219 75 89.", c:[], r:"g", nn:"Casa Vicens", ns:"La primera casa de Gaudí (1883-1885)—petita, obsessionada amb la geometria de rajoleria verda i blanca, et diu tot sobre on anava el seu cervell.", nst:"Construïda a Gràcia abans de fer-se famós, és estreta i intensa, cada habitació un trencaclosques de rajoles verdes/blanques en patrons geomètrics. El pati és una pregària en azulejos.", nt:"L3 a Lesseps o Fontana. Gaudí 24, Gràcia. Diaris 10-20h. €18. Planta superior amb vista de terrat. +34 93 219 75 89."}

  ,{id:136, n:"Bunkers del Carmel — Carmel", a:"Carmel", v:["hidden","history","beautiful"], d:45, s:"Spanish Civil War anti-aircraft bunkers at 262 meters, 360° sunset views over Sagrada Família, Montjuïc, beaches—free, locals' secret, police close before actual sunset.", st:"Concrete bunkers built in trenches for anti-aircraft guns, now open ground with views that seem to show every Barcelona neighborhood. Locals climb up late afternoon. The light before sunset is golden. Come before 5:30pm in winter, 7:30pm in summer.", im:"Standing at the bunker edge, Barcelona stretching in all directions—the Sagrada Família spire catching afternoon gold, the mountain ridge behind, the sea shimmer, a cold wind.", t:"L3 metro to Lesseps, then walk up Avinguda Corolleu to Passeig de la Rovira park (20 min climb). Or bus H6. Free. IMPORTANT: Police close the site before sunset. Visit 2-3 hours before sunset.", c:[], r:"g", nn:"Bunkers del Carmel", ns:"Búnquers de la Guerra Civil espanyola a 262 metres, vistes de 360° sobre Sagrada Família, Montjuïc, platges—gratis, secret dels locals, policia tanca abans del capvespre.", nst:"Búnquers de formigó construïts en trinxeres per a armes antiaèries, ara sòl obert amb vistes que semblen mostrar tots els barris de Barcelona. Els locals pugen a última hora de la tarda. La llum abans del capvespre és dorada.", nt:"L3 a Lesseps, després camina per Avinguda Corolleu fins al parc Passeig Rovira (20 min pujada). O autobús H6. Gratis. IMPORTANT: Policia tanca el lloc abans del capvespre."}

  ,{id:137, n:"Cardona Salt Mountain — Cardona", a:"Cardona", v:["weird","beautiful","history"], d:120, s:"800-meter salt mountain 50 minutes train south—you descend into cathedral-like salt tunnels, medieval castle above, surreal landscape of white.", st:"The mountain is a white cone visible for kilometers across farmland. Underground, salt crystals catch light in vaulted chambers where 700 years of mining created caverns tall as churches. Cardona castle sits atop watching over the saline world. Salt works still operate underneath.", im:"Descending cool stone stairs into white crystal caverns where light bounces like underwater caves, the silence huge and white, then stepping back into Catalan sun with a salt-covered hand.", t:"Renfe R4 from Sants to Cardona station (50 min, €6). Walk 15 min to Montanya de Sal. Mar-Oct daily 10am-5:30pm, Nov-Feb Sat-Sun 11am-4:30pm. €12. Guided tour +€3. +34 93 869 27 75.", c:[], r:"y", nn:"Muntanya de Sal de Cardona", ns:"Muntanya de sal de 800 metres 50 minuts tren al sud—descendeixes en túnels de sal tipus catedral, castell medieval a dalt, paisatge surrealista de blanc.", nst:"La muntanya és un con blanc visible quilòmetres a través dels camps. Sota terra, els cristalls de sal capturen la llum en cambres volta on 700 anys de mineria van crear cavernes altes com esglésies.", nt:"Renfe R4 des de Sants a Cardona (50 min, €6). Camina 15 min a Muntanya de Sal. Març-octubre diaris 10-17:30h, novembre-febrer dissabte-diumenge 11-16:30h. €12."}

  ,{id:138, n:"Poblenou Cemetery — Poblenou", a:"Poblenou", v:["history","quiet","weird"], d:60, s:"Industrial workers' cemetery in the former textile district—crumbling moderniste vaults, graves stacked 5 stories high, names of entire families carved in limestone.", st:"Rows of elaborate tombs, some collapsing, painted doors hanging open on dark chambers below ground. The gates say Cementerio Poblenou. It's an open-air museum of working-class Barcelona dying in the 19th and 20th centuries. Very few visitors. The afternoon light makes the white stone glow.", im:"Standing at a vault doorway, darkness below, your name on stone, carved flowers and angels watching from limestone faces, birds nesting in broken corners, the hush of a place nobody visits.", t:"L4 metro to Llacuna, then walk Carrer Pujades downhill past the Poblenou neighborhood. Cemetery entrance free, open dawn-dusk. Maps at entrance. Best late afternoon.", c:[], r:"g", nn:"Cementiri de Poblenou", ns:"Cementiri de treballadors industrials al district tèxtil anterior—bòvedes modernistes ruïnoses, tombes apilades 5 pisos alt, noms de famílies senceres gravades en calç.", nst:"Fileres de tombes elaborades, algunes derrumba-se, portes pintades penjant obertes a cambres fosques sota terra. Els portals diuen Cementerio Poblenou. Un museu a l'aire lliure de Barcelona treballadora morint-se al segle XIX i XX.", nt:"L4 a Llacuna, després camina Carrer Pujades aigua avall pel barri de Poblenou. Entrada gratuit, obert alba-crepuscle. Millor última hora de la tarda."}

  ,{id:139, n:"Sitges Day Trip — Sitges", a:"Sitges", v:["beautiful","local","history"], d:180, s:"Bohemian coastal town 40 minutes south—narrow streets, art galleries, Catalan restaurants, long beaches, quirky museums, the Barcelona crowd's escape.", st:"Sitges is compact and walkable—white buildings with iron balconies, winding side streets that open onto the Mediterranean. Two main beaches are sandy and packed on weekends but you can find quiet coves nearby. The town itself never stops being charming, summer or winter. Locals come for the pace.", im:"Walking narrow Carrer Principal where galleries sell local ceramics and paintings, turning a corner onto a beach view, the salt-smell and the sight of fishing boats, the whole place humming with easy pace.", t:"Renfe R2N or R2 from Passeig de Gràcia (40 min, €3.50). Trains run every 30 min. Beach free. Galleries and museums €3-8. Restaurants €10-25. Bring swimsuit. Walk on arrival, it's small. Good weekday mornings.", c:[], r:"g", nn:"Sitges", ns:"Poble boemi de costa 40 minuts al sud—carrers estrets, galeries d'art, restaurants catalans, platges llargues, museus excèntrics, l'escapada de la multitud de Barcelona.", nst:"Sitges és compacte i passejable—edificis blancs amb balcons de ferro, carrers secundaris serpenteigs que s'obren al Mediterrani. Les dues platges principals són de sorra i plenes els caps de setmana però pots trobar cales tranquil·les a prop.", nt:"Renfe R2N o R2 des de Passeig de Gràcia (40 min, €3.50). Trens cada 30 min. Plataforma gratuïta. Galeries i museus €3-8. Restaurants €10-25. Porta banyador."}

  ,{id:140, n:"Horta District — Horta", a:"Horta", v:["local","quiet","history"], d:60, s:"Authentic working-class Barcelona neighborhood few tourists reach—corner cafés, multigenerational families, Catalan spoken everywhere, zero tourism infrastructure.", st:"Horta is suburban in feel but stays neighborhoody. Plaça de la Llorja is the center where people gather for coffee and gossip. Small markets, family shops, apartment blocks with green shutters. The whole place has a lived-in feel that's disappeared from the Gothic Quarter decades ago.", im:"Sitting at a corner café, an abuela recognizing a regular from the next table, a vendor closing up the market with deliberate, practiced moves, Catalan conversations overlapping from apartments above.", t:"L3 metro to Horta. Walk Carrer de Horta south toward Plaça de la Llorja. All cafés and restaurants are cheap, €3-8 meals. Best mid-morning or 6pm. No tickets, just show up. Feels like stepping back 30 years in Barcelona time.", c:[], r:"g", nn:"Barri de Horta", ns:"Barri autèntic de classe treballadora de Barcelona que pocs turistes arriben—cafès de xamfrà, famílies multigeneracionals, català parlat arreu.", nst:"Horta té sensació suburbana però es manté veïnal. Plaça de la Llorja és el centre on la gent es reuneix per a cafè i xafaraderia. Petits mercats, botigues familiars, blocs d'apartaments amb porticons verds.", nt:"L3 a Horta. Camina Carrer de Horta cap al sud vers Plaça de la Llorja. Tots els cafès i restaurants són barats, €3-8 menges. Millor mid-morning o 18h. Sense entrades, només es presenta."}

  ,{id:141, n:"Mercat de Santa Caterina — La Ribera", a:"La Ribiera", v:["beautiful","local"], d:45, s:"1848 market with a 2005 redesign by Miralles—200,000 ceramic hexagons in 67 colors cover the wavy roof, looks like fruit made solid.", st:"The wavy wooden ceiling decorated with colored ceramic hexagons representing vegetables and fruit—200,000 of them, each slightly different. Below is a working market of meat, fish, produce, and gourmet vendors. Way less crowded than Boqueria. The whole upper level has a bar and restaurant where locals eat standing up.", im:"Looking up at the wavy rainbow roof of ceramic tiles, each one like a tiny colored stone, the market light streaming through, a fish vendor below calling prices, the smell of fresh catch.", t:"L4 metro to Jaume I. Mercat Santa Caterina, La Ribiera. Mon-Sat 7:30am-2:30pm, Tue-Fri also 5-8pm. Free to browse, cheap eats. Bar and restaurant on upper level €8-15. Standing room or high tables.", c:[], r:"g", nn:"Mercat de Santa Caterina", ns:"Mercat de 1848 amb redisseny 2005 de Miralles—200.000 hexàgons de ceràmica en 67 colors cobreixen el sostre ondulat, sembla fruit fet sòlid.", nst:"El sostre de fusta ondulat decorat amb hexàgons de ceràmica de color representant verdures i fruita—200.000 d'ells, cada un lleugerament diferent. A sota hi ha un mercat de carns, peix, producte i venedors gourmet.", nt:"L4 a Jaume I. Mercat Santa Caterina, La Ribiera. Dilluns-dissabte 7:30-14:30h, dimarts-divendres també 17-20h. Gratis mirar, menjars barats. Bar i restaurant planta superior €8-15."}

  ,{id:142, n:"Sagrada Família First Entry — Eixample", a:"Eixample", v:["history","beautiful","weird"], d:120, s:"Gaudí's unfinished masterpiece—30 minutes before 9am opening finds you inside before the tour buses, morning light blue-green through east stained glass.", st:"The basilica opens at 9am. If you book a 9:15am ticket and arrive at 8:50am, you'll be inside as morning light fills it. The eastern transept glows with blue and green glass. It's overwhelming and quiet before the crowds. The ceiling spirals. The columns branch like trees.", im:"Standing in cool stone light where blue-green morning sun pours through stained glass, thousands of tiny lights on the floor, your head back at branches of columns disappearing upward, the whoosh of your own breathing huge.", t:"L2/L5 metro to Sagrada Família. Carrer Mallorca 401. Book tickets in advance online €28. Target 9:15am time slot. Be inside by 8:45am. Audio guide included. Allow 90 min minimum. Best Mon/Tue/Wed.", c:[], r:"y", nn:"Sagrada Família", ns:"La meravella incompleta de Gaudí—30 minuts antes de l'obertura de 9am et trobes dins des que els autobusos de turisme arriben.", nst:"La basílica oberta a les 9am. Si reserves una entrada de 9:15am i arribes a les 8:50am, estaràs dins mentre la llum del matí l'omple. El transsepte oriental brilla amb vidre blau i verd. És aclaparador i tranquil abans de les multitud.", nt:"L2/L5 a Sagrada Família. Carrer Mallorca 401. Reserva entrades online €28. Objectiu 9:15am hora. Dins a les 8:45am. Audioguia inclosa. Permet 90 min mínim. Millor dilluns/dimarts/dimecres."}

  ,{id:143, n:"Park Güell Free Zones — Gràcia", a:"Gràcia", v:["beautiful","free entry","quiet"], d:90, s:"Two-thirds of Park Güell is free—the paid zone (€14) is touristy, but the woodland paths above and the terraces below are yours for nothing, same views.", st:"Most tourists pay €14 to see the colorful tile work and famous viewpoint. But the real magic is in the 2/3 that's just natural park—cypress trees, stone terraces, old gardens, wild plants. Dawn is perfect. You get all the city views without the selfie sticks.", im:"Walking shaded paths under cypress where the city appears through the trees, no crowds, the stone terrace under your feet cool and old, morning light in the valley below, Barcelona looking small.", t:"L3 metro to Lesseps, then walk uphill through residential streets (15 min) or take bus 24, 31, H6 to park entrance. Free zones always open. Park at first light is magical. Bring water, it's uphill.", c:[], r:"g", nn:"Parc Güell Zones Gratuïtes", ns:"Dos terços del Parc Güell són gratis—la zona de pagament (€14) és turística, però els camins de bosc dalt i les terrasses a sota són teus sense res, mateixes vistes.", nst:"La majoria de turistes paguen €14 per veure les obres de rajola colorades i el mirall famós. Però la veritable màgia és en el 2/3 que és només parc natural—xiprers, terrasses de pedra, jardins vells, plantes silvestres.", nt:"L3 a Lesseps, després camina aigua avall pels carrers residencials (15 min) o pren l'autobús 24, 31, H6 fins a entrada parc. Zones gratuïtes sempre obertes. Parc a la llum del matí és màgic."}

  ,{id:144, n:"La Boqueria at 7am — Las Ramblas", a:"Las Ramblas", v:["local","weird","history"], d:60, s:"The famous market is flooded with tourists by 10am, but at 7am it's still a working market—fishmongers opening boxes, vendors setting up, fish water running on the tiles.", st:"7am is the real market hour. Fish vendors are opening ice boxes and arranging silvery fish on beds of ice. Butchers are hanging meat, produce vendors stacking oranges, the whole place choreographed like a dance. By 8am, the first tourists arrive. By 9am, it's a souvenir trap.", im:"The smell of ice and fish, slick white tiles still wet from hoses, a fishmonger's knife flashing as he ices down sea bass, your feet navigating around boxes, Catalan vendors calling orders at each other.", t:"L3 metro to Liceu. La Boqueria market, Las Ramblas. Arrive 6:45am, gates open at 7am. Vendors are setting up 7-8am, leave by 8:30am before tourist crowd. Breakfast bars inside open 7:30am. €0 entry, food €3-8.", c:[], r:"y", nn:"La Boqueria a les 7am", ns:"El mercat famós està inundat de turistes a les 10am, però a les 7am és encara un mercat treballador—pescaders obrint caixes, venedors establint-se.", nst:"Les 7am és l'hora real del mercat. Els pescaders estan obrint caixes de gel i arranjant peix argentat en llits de gel. Els carnissers penjant carn, venedors de producte apilant taronges.", nt:"L3 a Liceu. Mercat La Boqueria, Las Ramblas. Arribar 6:45am, portes obertes 7am. Venedors establint-se 7-8am, sortir 8:30am antes de multitud turística. Bars de descans obren 7:30am. €0 entrada."}

  ,{id:145, n:"Montserrat Monastery — Montserrat", a:"Montserrat", v:["history","beautiful","quiet"], d:180, s:"Benedictine monks singing Vespers at 6:45pm in a monastery perched on a jagged rock mountain 45 minutes northwest—boys' choir, 80 monks, 1,000 years of chants.", st:"The monastery sits on top of a rock formation that looks like nature broke the rules. At 6:45pm, the Escolania boys' choir and the monks sing Vespers and Salve Regina in the basilica. The sound echoes off stone. It's ancient and living. You're sitting in silence with Spanish families and a few pilgrims.", im:"The basilica is stone and shadow, candlelight, then 30 young voices rise in Latin harmony, the sound bouncing off walls built in the 1500s, your chest tight with the beauty of it.", t:"Renfe R5 from Sants to Monestir de Montserrat station (50 min, €6). Cogwheel rack railway to monastery top (€9.15 return). Basilica free. Vespers 6:45pm daily (times vary seasonally). Arrive early, it fills. Guesthouses available for overnight.", c:[], r:"y", nn:"Monestir de Montserrat", ns:"Monjos benedictins cantant Vespres a les 18:45h en un monestir perxat en una muntanya de roca serrada 45 minuts al nord-oest—cor de nens, 80 monjos, 1.000 anys de càntics.", nst:"El monestir seu dalt d'una formació rocosa que sembla que la natura trencar les regles. A les 18:45h, l'Escolania cor de nens i els monjos canten Vespres i Salve Regina a la basílica. El so rebota en pedra.", nt:"Renfe R5 des de Sants a Monestir de Montserrat (50 min, €6). Ferrocarril de cremallera fins al cim del monestir (€9.15 retorn). Basílica gratuïta. Vespres 18:45h diaris. Arribar aviat, es completa."}

  ,{id:146, n:"El Born Archaeological Site — Born", a:"El Born", v:["history","weird","quiet"], d:60, s:"Medieval Barcelona destroyed in 1714 by Spanish siege—the excavated streets are frozen in time, buildings where medieval families lived now underground museums.", st:"The El Born Cultural Center sits over buried medieval Barcelona. You descend into cool stone rooms where streets have been excavated and left as-is. Pottery shards, foundations of homes, the smell of earth. It's a walk through 14th-century life interrupted by war. Almost no tourists know about it.", im:"Standing in an underground medieval street, your hand on rough stone walls, pottery pieces in the dust, sunlight from the museum above filtering down, the texture of 600-year-old life.", t:"L4 metro to Jaume I. Plaça Comercial 12, El Born. Tue-Sun 10am-7pm, Mon closed. €7. Excellent audioguide included. Allow 60 min minimum. Very cool if you like history over crowds.", c:[], r:"g", nn:"Jaciment Arqueològic de Santa Clara-El Born", ns:"Barcelona medieval destruït el 1714 pel setge espanyol—els carrers excavats estan congelats en el temps, edificis on les famílies medievals vivien ara museus sota terra.", nst:"El Centre Cultural El Born seu sobre Barcelona medieval enterrada. Descendeixes en cambres de pedra freda on els carrers han estat excavats i deixats com estan. Fragments de ceràmica, fonaments de cases, la flaire de terra.", nt:"L4 a Jaume I. Plaça Comercial 12, El Born. Dimarts-diumenge 10-19h, dilluns tancat. €7. Audioguia excel·lent inclosa. Permet 60 min mínim."}

  ,{id:147, n:"Sants Market Days — Sants", a:"Sants", v:["local","history","free entry"], d:45, s:"Barcelona's first neighborhood (1822)—an entire barrio of working families, market Wednesday and Saturday mornings, zero tourists, pure Barcelona.", st:"Sants is the oldest residential neighborhood in Barcelona, and it still feels like it. The market is a rectangle of vendors calling out prices, locals with shopping bags coming back for 100 years of family stall holders. The bar next to the market entrance serves coffee from 6am. The whole place smells like garlic and soap.", im:"Walking through rows of vegetables and fish, a grandmother in a winter coat at the same vendor she's been buying from for 40 years, the vendor's hands moving with practiced speed, voices in Catalan filling the space.", t:"L2 metro to Sants Estació, walk south to Carrer de Sants. Market hours Wed & Sat 7am-2pm. Free to browse, cheap to eat. Bars around market €2 coffee. Best mid-morning when locals are shopping. Come for authenticity, not Instagram.", c:[], r:"g", nn:"Mercat de Sants", ns:"El primer barri de Barcelona (1822)—un barri sencer de famílies treballadores, mercat dimecres i dissabte matins, zero turistes, Barcelona pura.", nst:"Sants és el barri residencial més vell de Barcelona, i encara se sent així. El mercat és un rectangle de venedors cridant preus, locals amb bossetes de compra tornant per a 100 anys de venedors de parades familiars.", nt:"L2 a Sants Estació, camina cap al sud a Carrer Sants. Hores mercat dimecres i dissabte 7-14h. Gratis mirar, barat menjar. Bars al voltant mercat €2 cafè."}

  ,{id:148, n:"Montseny Monastery — Montseny", a:"Montseny", v:["history","quiet","beautiful"], d:150, s:"Medieval monastery at the top of a forest mountain 50 minutes north—cable car to top, Benedictine monks still sing daily, 100% off-the-beaten-track.", st:"Montseny Mountain rises 1,700 meters above Barcelona's plains. At the peak sits a 10th-century monastery. You take a cable car to near the top, then hike the last bit through beech forest. Benedictine monks still live there. The air is cold and clean. Cell phone service stops partway up.", im:"Standing at the monastery entrance, the whole Barcelona basin spreading out thousands of feet below, a cold wind, the bell tower dark stone against gray sky, silence broken only by wind and distant monks' chanting.", t:"Rodalies R2 from Plaça de Catalunya to Montseny station (50 min, €4), then bus 19 to cable car station. Cable car €7.50 return. Hike 20 min to monastery. Very challenging. Go Tue-Sun 9am-5pm. Closed Mondays. No restaurants on mountain—bring water/snacks.", c:[], r:"y", nn:"Monestir de Montseny", ns:"Monestir medieval a la cima d'una muntanya de bosc 50 minuts al nord—cable car a la cima, monjos benedictins encara canten diari, 100% fora dels camins tròpecs.", nst:"La Muntanya de Montseny s'alça 1.700 metres per sobre dels plans de Barcelona. A la cima seu un monestir del segle X. Prens un cable car prop de la cima, després camina el darrer bit a través del bosc de faig. Monjos benedictins viuen encara allà.", nt:"Rodalies R2 des de Plaça de Catalunya a Montseny (50 min, €4), llavors autobús 19 a estació cable car. Cable car €7.50 retorn. Camina 20 min a monestir. Molt desafiador. Oberta dimarts-diumenge 9-17h."}

  ,{id:149, n:"Vermut Culture — Poble Sec", a:"Poble Sec", v:["local","weird","history"], d:60, s:"Carrer de Blai in Poble Sec has 20+ vermut bars where old men have been ordering the same glass for 50 years—this is how Barcelona drinks at 1pm on a Saturday.", st:"Vermut is a Barcelona tradition at noon. Carrer de Blai is its headquarters. You'll find old-timers at the bar, vermouth on tap, olives and anchovies on the counter, and a culture that hasn't changed since the Franco era. Locals drink standing up in 20 minutes then leave. It's a ritual.", im:"Standing at a bar counter, the bartender pouring vermut from a tap into a small glass, ice and lemon, the clink of glasses around you, old men in caps talking Catalan, the smell of vermouth and salt-cured fish.", t:"L3 metro to Poble Sec, walk downhill to Carrer de Blai. Bars open 11am-2pm for vermut service. €3-4 per glass. Arrive 12-1pm for full experience. It's mainly local, no tourists. Order 'un vermut amb glaç i llimó' (vermut with ice and lemon). Zero pretense.", c:[], r:"g", nn:"Cultura del Vermut — Carrer de Blai", ns:"Carrer de Blai a Poble Sec té 20+ bares de vermut on homes vells han estat demanant el mateix got per 50 anys—així és com Barcelona beu a les 13h els dissabtes.", nst:"El vermut és una tradició de Barcelona al migdia. Carrer de Blai és la seva seu. Trobaràs gent gran a la barra, vermut a l'aixeta, olives i anxoves al mostrador, i una cultura que no ha canviat des de l'era Franco.", nt:"L3 a Poble Sec, camina cap a baix a Carrer Blai. Bares obren 11-14h per servei vermut. €3-4 per got. Arribar 12-13h per a experiència completa. Principalment locals, sense turistes. Comanda 'un vermut amb glaç i llimó'."}



  ,{id:127, n:"Ocata Beach — Badalona", a:"Badalona", v:["hidden","beautiful","quiet"], d:30, s:"A 35-minute train ride north finds a low-key Catalan beach where locals spend whole afternoons, not tourists.", st:"Sun-warmed sand stretches wide and flat, beach volleyball nets punctuate the shoreline, chiringuitos serve fresh seafood at wooden tables where people call out scores in Catalan. Saturday mornings have a neighborhood-market feel—families in for the day.", im:"Salt air, gentle Mediterranean waves, the clink of vermouth glasses, someone calls out a volleyball score in Catalan, the beach radio playing softly.", t:"L2 Renfe Rodalies from Passeig de Gràcia to Ocata station (30 min, €4). Services every 15 min. Arrive by 10am weekends. Chiringuitos open 11am. Free entry.", c:[], r:"g", nn:"Platja d'Ocata", ns:"Un tren que et porta a la platja que els locals estimen, sense turistes.", nst:"La sorra és còmoda, la gent parla català, els xiringuitos fan peix a la brasa mentre els nens juguen a voleibol i la música de la ràdio suena al fons.", nt:"Línia L2 Renfe des de Passeig de Gràcia fins a Ocata (30 min, €4). Arribar antes de les 10 del matí els dissabtes. Xiringuitos obren a les 11."}

  
  ,{id:128, n:"Castelldefels Beach — Castelldefels", a:"Castelldefels", v:["beautiful","quiet","free entry"], d:45, s:"Barcelona's widest beach, rarely crowded, with a castle-topped village above and pine trees backing the sand.", st:"The beach stretches endlessly in both directions, backed by pine forest, locals in small clusters along the shore. Medieval castle sits watchful above the village streets. Summer weekday mornings are wonderfully empty.", im:"Fine golden sand, warm wind carrying pine scent, the castle silhouette against afternoon sun, a single local couple walking the waterline.", t:"R2N Renfe from Plaça de Catalunya to Castelldefels station (45 min, €5). Walk 10 min downhill to beach. June-September best. Free entry, no crowds.", c:[], r:"g", nn:"Platja de Castelldefels", ns:"La platja més ampla de Barcelona però sense la multitud que l'acompanya al Born.", nst:"Sorra fina, boscos de pi al fons, el castell observa des del puig, els dies entre setmana són tranquils i la gent local es dispersa al llarg de la costa.", nt:"R2N Renfe des de Plaça de Catalunya fins a Castelldefels (45 min, €5). Camina 10 minuts cap avall fins a la platja. Millor juny-setembre. Entrada gratuïta."}

  
  ,{id:129, n:"Colònia Güell Crypt — Santa Coloma de Cervelló", a:"Santa Coloma de Cervelló", v:["history","beautiful","weird"], d:90, s:"Gaudí's actual laboratory before Sagrada Família—a 1908 crypt in an 1890s textile workers' village 45 minutes south, UNESCO World Heritage.", st:"The crypt is underground and cool, filled with parabolic columns Gaudí designed using inverted funicular geometry—invisible engineering that makes the space feel suspended. Industrial workers' village above gives way to contemplative sacred geometry below. Few tourists know it exists.", im:"Stepping into shadow from bright Catalan sun, cool stone, the peculiar slant of those columns holding weight you can't quite see, ancient and futuristic at once.", t:"Take Renfe R5/R50 from Sants station to Santa Coloma de Cervelló (40 min, €4). Walk 10 min to site. Mon-Fri 10am-5pm, Sat-Sun 10am-3pm. €7. Closed Jan 1, 6, 25-26.", c:[], r:"y", nn:"Cripta de la Colònia Güell", ns:"El laboratori secret de Gaudí, anterior a la Sagrada Família, dins d'una colònia tèxtil dels 1890s.", nst:"Sota terra i fresca, plena de columnes parabòliques que Gaudí va dissenyar usant una geometria invertida que es sent suspesa. Els pobles de treballadors industrials donen pas a una geometria sagrada contemplativa que pocs turistes coneixen.", nt:"Renfe R5/R50 des de Sants fins a Santa Coloma de Cervelló (40 min, €4). Camina 10 min. Dilluns-divendres 10-17h, dissabte-diumenge 10-15h. €7."}

  
  ,{id:130, n:"Castellers Training — El Clot", a:"El Clot", v:["local","weird","history"], d:60, s:"Watch UNESCO-recognized human tower builders in real training sessions—coordinated acrobatics that look impossible but have been happening since medieval times.", st:"Tuesdays, Thursdays, and Fridays at their Clot headquarters, teams of 40+ build towers by climbing on each other, the whole structure swaying, spotters shouting in Catalan, drums beating steadily. It's chaotic and utterly focused at once. The bar upstairs fills with locals sipping beer.", im:"The base trembles as climbers layer up, rope creaking, someone calling depth charges, the smell of effort and effort, a kid at ground level looking up at 8-person height.", t:"L1 metro to Clot. Carrer de Bilbao 212. Training: Tue 7:30pm, Thu 8pm, Fri 9pm (Feb-Nov, summer break Aug). Free to watch from bar. Arrive early.", c:[], r:"y", nn:"Castellers de Barcelona", ns:"Els constructors de torres humans UNESCO que s'entrenen en sessions reals—acròbates coordinats que semblen impossibles però duran des de l'edat mitjana.", nst:"Dimarts, dijous i divendres a la seu de Clot, equips de 40+ construeixen torres escalant-se entre ells, tota l'estructura oscil·lant, els vigilants cridant en català, els tambors batent constantment. És caòtic i totalment enfocat al mateix temps.", nt:"L1 al Clot. Carrer Bilbao 212. Entrenament: dimarts 19:30h, dijous 20h, divendres 21h (febrer-novembre). Gratis a mirar des del bar."}

  
  ,{id:131, n:"Mercat de l'Abaceria — Gràcia", a:"Gràcia", v:["local","history","free entry"], d:45, s:"The 1892 working-class market of Gràcia village—many stall-holders are grandchildren of the original vendors, same family recipes for 130 years.", st:"Three arched naves with exposed metal and brick, wooden stalls, vendors calling out in Catalan. Tuesday and Saturday mornings packed with locals buying for the week. The café upstairs watches the whole market. Everything smells like fresh meat and soap.", im:"Metal exposed beams arching overhead, vendors in aprons calling prices, someone's grandmother recognizing a regular customer from two stalls away, the smell of fresh sausage.", t:"FGC train from Plaça de Lesseps to Gràcia stop, or walk from Vila de Gràcia metro. Travessera de Gràcia street. Tue & Sat mornings best. Free to browse, cheap to eat. 7am-2:30pm.", c:[], r:"g", nn:"Mercat de l'Abaceria", ns:"El mercat de classe treballadora de Gràcia del 1892—moltes parades pertanyen als néts dels venedors originals, les mateixes receptes familiars 130 anys.", nst:"Tres naus amb arcs de ferro exposat i maó, parades de fusta, venedors cridant en català. Els dimarts i dissabtes al matí plens de locals comprant per a la setmana. El cafè de dalt mira tot el mercat.", nt:"FGC des de Plaça de Lesseps fins a Gràcia. Carrer Travessera de Gràcia. Dimarts i dissabtes al matí millor. Gratis mirar, barat menjar. 7-14:30h."}

  
  ,{id:132, n:"Palau de la Música Catalana — Eixample", a:"Eixample", v:["beautiful","history"], d:60, s:"Domènech's 1908 UNESCO concert hall—not Gaudí—where moderniste stained glass wraps the whole ceiling, glowing light like being inside a jewel.", st:"Built for the Orfeó Català choir, the interior is a Catalan modernism masterpiece—wrought iron, tilework, mosaics, and that skylight dome of amber and blue glass. Evening concerts fill the place with chandelier light. The foyer is a public museum. Locals come for serious classical music.", im:"Walking under that glowing skylight dome—amber and blue tiles filtering afternoon sun into 10,000 tiny light pieces, ornate iron railings catching the glow, feeling like you've stepped into stained glass.", t:"L3 metro to Urquinaona. Carrer Palau de la Música, 4. Tours daily 10am-3:30pm €20, or attend evening concerts €25-60. Booking essential. Phone +34 93 295 72 00.", c:[], r:"y", nn:"Palau de la Música Catalana", ns:"La sala de concerts modernista del 1908 de Domènech—no Gaudí—on el vidre de color del sostre il·lumina tot la nit com estar dins d'una joia.", nst:"Construït per al cor Orfeó Català, l'interior és una obra mestra del modernisme català—ferro forjat, rajoleria, mosaics, i aquest domu de vidre ambar i blau. Els concerts vespertins omplen el lloc de llum de llàntia.", nt:"L3 fins a Urquinaona. Carrer Palau de la Música 4. Tours diaris 10-15:30h €20, o concerts vespertins €25-60. Reserva essencial."}

  
  ,{id:133, n:"Casa Vicens — Gràcia", a:"Gràcia", v:["history","beautiful"], d:75, s:"Gaudí's first house (1883-1885)—small, obsessed with green and white ceramic tile geometry, tells you everything about where his brain was heading.", st:"Built in Gràcia before he got famous, it's cramped and intense, every room a puzzle of green/white tiles in geometric patterns. The courtyard is a prayer in azulejos. You feel the young architect's obsession. Ground floor still has the original grocery store ironwork.", im:"Stepping into rooms where every surface is covered in geometric tile—green and white diamonds and crosses, the courtyard a closed world of color and pattern, sunlight through the tiles casting grid shadows.", t:"L3 metro to Lesseps or Fontana. Gaudí 24, Gràcia. Daily 10am-8pm. €18 full. Top floor has rooftop view. Entrance includes audioguide in Catalan/Spanish/English. +34 93 219 75 89.", c:[], r:"g", nn:"Casa Vicens", ns:"La primera casa de Gaudí (1883-1885)—petita, obsessionada amb la geometria de rajoleria verda i blanca, et diu tot sobre on anava el seu cervell.", nst:"Construïda a Gràcia abans de fer-se famós, és estreta i intensa, cada habitació un trencaclosques de rajoles verdes/blanques en patrons geomètrics. El pati és una pregària en azulejos.", nt:"L3 a Lesseps o Fontana. Gaudí 24, Gràcia. Diaris 10-20h. €18. Planta superior amb vista de terrat. +34 93 219 75 89."}

  
  ,{id:134, n:"Recinte Modernista Sant Pau — Sant Pau", a:"Sant Pau", v:["beautiful","history","weird"], d:120, s:"World's largest Art Nouveau complex—27 buildings in a garden city designed by Domènech (not Gaudí), UNESCO site, closed as hospital in 2009, now a museum.", st:"Underground galleries connect all 27 pavilions—you walk through 1km of covered tunnels linking wards, operating rooms, living quarters. The whole complex is built like a city, with streets above ground and secrets below. Restoration revealed original tile work and mosaics. Garden courtyards between buildings feel lost-in-time.", im:"Walking through cool underground tile corridors lined with small tiled plaques naming old wards, emerging into sunlit courtyards with fountains and art-nouveau benches, then back underground again.", t:"L5 metro to Sant Pau / Dos de Maig. Santa Creu i Sant Pau 167. Wed-Sun 10am-2pm, guided tours 11am, 12:15pm, 1:30pm in Catalan/Spanish. €15. +34 93 556 50 01.", c:[], r:"y", nn:"Recinte Modernista Sant Pau", ns:"El complex modernista més gran del món—27 edificis en una ciutat-jardí dissenyada per Domènech, lloc UNESCO, tancat com a hospital el 2009, ara museu.", nst:"Les galeries subterrànies connecten els 27 pavellons—camines per 1 km de túnels coberts que enllaçen quiròfans, sales de viure, salons. Tot el complex està construït com una ciutat, amb carrers a dalt i secrets a sota.", nt:"L5 a Sant Pau/Dos de Maig. Santa Creu i Sant Pau 167. Dimecres-diumenge 10-14h, tours 11, 12:15, 13:30h. €15. +34 93 556 50 01."}

  
  ,{id:135, n:"Casa Vicens — Gràcia", a:"Gràcia", v:["history","beautiful"], d:75, s:"Gaudí's first house (1883-1885)—small, obsessed with green and white ceramic tile geometry, tells you everything about where his brain was heading.", st:"Built in Gràcia before he got famous, it's cramped and intense, every room a puzzle of green/white tiles in geometric patterns. The courtyard is a prayer in azulejos. You feel the young architect's obsession. Ground floor still has the original grocery store ironwork.", im:"Stepping into rooms where every surface is covered in geometric tile—green and white diamonds and crosses, the courtyard a closed world of color and pattern, sunlight through the tiles casting grid shadows.", t:"L3 metro to Lesseps or Fontana. Gaudí 24, Gràcia. Daily 10am-8pm. €18 full. Top floor has rooftop view. Entrance includes audioguide in Catalan/Spanish/English. +34 93 219 75 89.", c:[], r:"g", nn:"Casa Vicens", ns:"La primera casa de Gaudí (1883-1885)—petita, obsessionada amb la geometria de rajoleria verda i blanca, et diu tot sobre on anava el seu cervell.", nst:"Construïda a Gràcia abans de fer-se famós, és estreta i intensa, cada habitació un trencaclosques de rajoles verdes/blanques en patrons geomètrics. El pati és una pregària en azulejos.", nt:"L3 a Lesseps o Fontana. Gaudí 24, Gràcia. Diaris 10-20h. €18. Planta superior amb vista de terrat. +34 93 219 75 89."}

  
  ,{id:136, n:"Bunkers del Carmel — Carmel", a:"Carmel", v:["hidden","history","beautiful"], d:45, s:"Spanish Civil War anti-aircraft bunkers at 262 meters, 360° sunset views over Sagrada Família, Montjuïc, beaches—free, locals' secret, police close before actual sunset.", st:"Concrete bunkers built in trenches for anti-aircraft guns, now open ground with views that seem to show every Barcelona neighborhood. Locals climb up late afternoon. The light before sunset is golden. Come before 5:30pm in winter, 7:30pm in summer.", im:"Standing at the bunker edge, Barcelona stretching in all directions—the Sagrada Família spire catching afternoon gold, the mountain ridge behind, the sea shimmer, a cold wind.", t:"L3 metro to Lesseps, then walk up Avinguda Corolleu to Passeig de la Rovira park (20 min climb). Or bus H6. Free. IMPORTANT: Police close the site before sunset. Visit 2-3 hours before sunset.", c:[], r:"g", nn:"Bunkers del Carmel", ns:"Búnquers de la Guerra Civil espanyola a 262 metres, vistes de 360° sobre Sagrada Família, Montjuïc, platges—gratis, secret dels locals, policia tanca abans del capvespre.", nst:"Búnquers de formigó construïts en trinxeres per a armes antiaèries, ara sòl obert amb vistes que semblen mostrar tots els barris de Barcelona. Els locals pugen a última hora de la tarda. La llum abans del capvespre és dorada.", nt:"L3 a Lesseps, després camina per Avinguda Corolleu fins al parc Passeig Rovira (20 min pujada). O autobús H6. Gratis. IMPORTANT: Policia tanca el lloc abans del capvespre."}
