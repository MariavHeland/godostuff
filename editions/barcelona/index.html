  {id:1,n:"Hidden Courtyard, Santa Maria del Pi — Gothic Quarter",a:"Gothic Quarter",v:["hidden", "history"],d:1,s:"Medieval courtyards so secret locals forget—stumble through unmarked doors and you\'re in 1400.",st:"You push through a wooden door on a side street and suddenly the noise fades. Gothic courtyard opens—arches dripping with ivy, stone worn smooth by centuries. Light filters through buildings above, casting shadow patterns.",im:"It\'s 1432. A merchant counts coins in the courtyard while masons repair siege damage.",t:"You push through a wooden door on a side street and suddenly the noise fades. Gothic courtyard opens—arches dripping with ivy, stone worn smooth by centuries. Light filters through buildings above, casting shadow patterns.\",im:\"It\'s 1432. A merchant counts coins in the courtyard while masons repair siege damage.\",t:\"Enter from Carrer del Pi or side streets. Go early morning for empty courtyards. Free. Wear sturdy shoes.",c:["history_big", "courtyards"],r:"g",nn:"Hidden Courtyard, Santa Maria del Pi",ns:"Hidden Courtyard, Santa Maria del Pi és tresor català.",nst:"Hidden Courtyard, Santa Maria del Pi respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},

  {id:5,n:"Sant Pau Art Nouveau Hospital — Sant Pau",a:"Sant Pau",v:["beautiful", "history", "hidden"],d:5,s:"A hospital so gorgeous you\'d want to get sick there—abandoned, art nouveau, haunted by patients who walked its tiled halls.",st:"Corridors stretch endlessly, tile work catching light in every color. Wards branch off—beds still visible through broken windows. The architecture is carefully planned, ornate. You feel the architect\'s care.",im:"It\'s 1955. A nurse moves between beds in perfect silence.",t:"Corridors stretch endlessly, tile work catching light in every color. Wards branch off—beds still visible through broken windows. The architecture is carefully planned, ornate. You feel the architect\'s care.\",im:\"It\'s 1955. A nurse moves between beds in perfect silence.\",t:\"Guided tours €15-20. Free grounds if you stay outside. Metro to Sant Pau. Check hours before going.",c:["history_big", "architecture"],r:"g",nn:"Sant Pau Art Nouveau Hospital",ns:"Sant Pau Art Nouveau Hospital és tresor català.",nst:"Sant Pau Art Nouveau Hospital respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:6,n:"Montjuïc Cemetery Secret Paths — Montjuïc",a:"Montjuïc",v:["history", "beautiful", "quiet"],d:6,s:"Enormous cemetery where you get lost between graves of revolutionaries, poets, nameless—hauntingly beautiful, almost nobody visits.",st:"Paths wind between tombs in every conceivable style. Elaborate monuments with marble angels, simple stone crosses, family vaults carved into cliff faces. Light filters through cypress trees. Each grave tells a life fragment.",im:"It\'s 1936. A Republican soldier is buried by underground network, his name never official.",t:"Paths wind between tombs in every conceivable style. Elaborate monuments with marble angels, simple stone crosses, family vaults carved into cliff faces. Light filters through cypress trees. Each grave tells a life fragment.\",im:\"It\'s 1936. A Republican soldier is buried by underground network, his name never official.\",t:\"Metro to Parallel, then bus or cable car. €5 entry. Go afternoon when light is golden. Bring notebook.",c:["history_big", "famous_dead"],r:"g",nn:"Montjuïc Cemetery Secret Paths",ns:"Montjuïc Cemetery Secret Paths és tresor català.",nst:"Montjuïc Cemetery Secret Paths respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:7,n:"Barceloneta Fisherman Alleys — Barceloneta",a:"Barceloneta",v:["local_only", "history", "beautiful"],d:7,s:"Narrow medieval alleys where fishermen still live—this is not tourism, it\'s a working village inside a city.",st:"Alleys so tight you can touch both walls. Laundry hangs like colorful flags. You smell fish, garlic, salt air, someone\'s dinner cooking. Cats sleep in doorways. Old men sit on chairs watching the street. It feels like stepping into another era.",im:"It\'s 1890. A fisherman hauls nets through these same alleys. The sea is closer then.",t:"Alleys so tight you can touch both walls. Laundry hangs like colorful flags. You smell fish, garlic, salt air, someone\'s dinner cooking. Cats sleep in doorways. Old men sit on chairs watching the street. It feels like stepping into another era.\",im:\"It\'s 1890. A fisherman hauls nets through these same alleys. The sea is closer then.\",t:\"Walk from Barceloneta beach toward back streets. Early morning (6-8am) shows real life. Stay respectful. Free to explore.",c:["local_only", "history_big"],r:"g",nn:"Barceloneta Fisherman Alleys",ns:"Barceloneta Fisherman Alleys és tresor català.",nst:"Barceloneta Fisherman Alleys respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:8,n:"Gràcia Neighborhood Hidden Squares — Gràcia",a:"Gràcia",v:["local_only", "beautiful", "hidden"],d:8,s:"Tiny village squares hidden in a city neighborhood—cafés, locals, no tourists—the anti-Barcelona Barcelona.",st:"Each square is its own universe. Plaça del Sol fills with people at sunset. Plaça de la Virreina has an old church and street musicians. Buildings are low, streets narrow, pace human-scaled. You see people actually living.",im:"It\'s 1960. These squares are the center of a small town unaware it\'s been absorbed into a mega-city.",t:"Each square is its own universe. Plaça del Sol fills with people at sunset. Plaça de la Virreina has an old church and street musicians. Buildings are low, streets narrow, pace human-scaled. You see people actually living.\",im:\"It\'s 1960. These squares are the center of a small town unaware it\'s been absorbed into a mega-city.\",t:\"Metro to Fontana or Lesseps. Wander. Sit in a square for an hour. Cheap pintxos and vermouth. Go early evening (6-8pm).",c:["local_only", "courtyards"],r:"g",nn:"Gràcia Neighborhood Hidden Squares",ns:"Gràcia Neighborhood Hidden Squares és tresor català.",nst:"Gràcia Neighborhood Hidden Squares respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:9,n:"Born Medieval Streets — Born",a:"Born",v:["history", "beautiful"],d:9,s:"Medieval street layout so well preserved you\'re literally walking the same routes as 14th-century merchants.",st:"Narrow streets angle and curve without logic. Gothic buildings lean together overhead. Shadows and sudden openings to small plazas. The smell of medieval stone, now mixed with coffee and wine. Every corner has a story in architecture.",im:"It\'s 1380. A merchant hurries through these streets carrying silks from the East.",t:"Narrow streets angle and curve without logic. Gothic buildings lean together overhead. Shadows and sudden openings to small plazas. The smell of medieval stone, now mixed with coffee and wine. Every corner has a story in architecture.\",im:\"It\'s 1380. A merchant hurries through these streets carrying silks from the East.\",t:\"Metro to Jaume I. Wander at will. Visit Santa Maria del Mar church (free entry to courtyard). Go early morning.",c:["history_big", "architecture"],r:"g",nn:"Born Medieval Streets",ns:"Born Medieval Streets és tresor català.",nst:"Born Medieval Streets respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:10,n:"Park Güell Free Zone — Gràcia",a:"Gràcia",v:["beautiful", "hidden", "nature"],d:10,s:"Most people don\'t know Park Güell has a completely free section—same Gaudí magic, zero crowds.",st:"The free zone (upper terraces) has the same unhinged architectural beauty. Locals picnic here. Families lie on the grass. The paid section below is packed; up here it\'s almost empty.",im:"It\'s 1910. Gaudí is tinkering with another impossible idea.",t:"The free zone (upper terraces) has the same unhinged architectural beauty. Locals picnic here. Families lie on the grass. The paid section below is packed; up here it\'s almost empty.\",im:\"It\'s 1910. Gaudí is tinkering with another impossible idea.\",t:\"Walk from metro Lesseps or Fontana uphill. Free section requires no ticket. Go early morning (before 9am).",c:["high_spots", "architecture"],r:"g",nn:"Park Güell Free Zone",ns:"Park Güell Free Zone és tresor català.",nst:"Park Güell Free Zone respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:11,n:"Montjuïc Magic Fountain (Free Viewpoint) — Montjuïc",a:"Montjuïc",v:["beautiful", "night", "history"],d:11,s:"A giant fountain that dances to music and lights at night—gorgeously tacky and absolutely mesmerizing.",st:"Water shoots up, twists, falls. Colored lights shift—blues, reds, greens. Music swells. Hundreds watch, mouths open. It\'s kitsch and magic mixed. The backdrop is the illuminated National Museum.",im:"It\'s 1929. Engineers test the fountain for the first time—chaos and wonder as water behaves impossibly.",t:"Water shoots up, twists, falls. Colored lights shift—blues, reds, greens. Music swells. Hundreds watch, mouths open. It\'s kitsch and magic mixed. The backdrop is the illuminated National Museum.\",im:\"It\'s 1929. Engineers test the fountain for the first time—chaos and wonder as water behaves impossibly.\",t:\"Free to watch. Shows Wed-Sun at 8-10pm (times vary). Arrive early. Best from terraces above. Bring someone to talk to.",c:["high_spots", "night"],r:"g",nn:"Montjuïc Magic Fountain (Free Viewpoint)",ns:"Montjuïc Magic Fountain (Free Viewpoint) és tresor català.",nst:"Montjuïc Magic Fountain (Free Viewpoint) respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:12,n:"Civil War Air Raid Shelters (Refugi 307) — Poble Sec",a:"Poble Sec",v:["history", "weird"],d:12,s:"Tunnel system carved under the city where 2,000 people hid from bombs—scars and scratches still visible on walls.",st:"Tunnels are narrow and dark. Your eyes adjust. Carved names and dates appear on walls. Display panels show families huddled here. The walls are solid rock. You almost hear the echoes of sirens.",im:"It\'s March 1938. Sirens wail. People flood into tunnels as bombers approach.",t:"Tunnels are narrow and dark. Your eyes adjust. Carved names and dates appear on walls. Display panels show families huddled here. The walls are solid rock. You almost hear the echoes of sirens.\",im:\"It\'s March 1938. Sirens wail. People flood into tunnels as bombers approach.\",t:\"Guided tours only (€3.50-5). Book ahead. Metro to Parallel. 45-minute tour. Bring a light. Not for claustrophobics.",c:["history_big", "scary"],r:"y",nn:"Civil War Air Raid Shelters (Refugi 307)",ns:"Civil War Air Raid Shelters (Refugi 307) és tresor català.",nst:"Civil War Air Raid Shelters (Refugi 307) respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:13,n:"Tibidabo Views & Church — Tibidabo",a:"Tibidabo",v:["beautiful", "high_spots", "weird"],d:13,s:"Decaying amusement park plus iconic church on Barcelona\'s highest point—the city becomes a map spread below.",st:"The church is white and neoclassical. The old amusement park sits in varying states of decay. The view is immense—the whole city fans out, the Mediterranean beyond. On clear days you see to Montserrat.",im:"It\'s 1899. The first pilgrims arrive at this new church.",t:"The church is white and neoclassical. The old amusement park sits in varying states of decay. The view is immense—the whole city fans out, the Mediterranean beyond. On clear days you see to Montserrat.\",im:\"It\'s 1899. The first pilgrims arrive at this new church.\",t:\"Tram + cable car (€7 return) or bus. Church free inside. Amusement park €10-15. Go late afternoon for golden light.",c:["high_spots", "architecture"],r:"g",nn:"Tibidabo Views & Church",ns:"Tibidabo Views & Church és tresor català.",nst:"Tibidabo Views & Church respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:14,n:"Horta Labyrinth Garden — Horta",a:"Horta",v:["beautiful", "history", "hidden"],d:14,s:"18th-century hedge maze where you actually get lost—fairy tale place making you feel like you\'re in another era.",st:"Tall hedges form passages that twist and confuse. Every corner reveals a new section—fountains, statuary, hidden glades. The lower gardens are geometric perfection. It\'s lush and quiet. You hear water, birds, your footsteps.",im:"It\'s 1802. A nobleman and his wife walk these paths by lamplight.",t:"Tall hedges form passages that twist and confuse. Every corner reveals a new section—fountains, statuary, hidden glades. The lower gardens are geometric perfection. It\'s lush and quiet. You hear water, birds, your footsteps.\",im:\"It\'s 1802. A nobleman and his wife walk these paths by lamplight.\",t:\"Metro to Mundet. €5 entry. Open Tues-Sun. Go in spring when everything blooms. Arrive early; fills by mid-afternoon.",c:["history_big", "parks"],r:"g",nn:"Horta Labyrinth Garden",ns:"Horta Labyrinth Garden és tresor català.",nst:"Horta Labyrinth Garden respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:15,n:"Pedralbes Monastery — Pedralbes",a:"Pedralbes",v:["history", "beautiful", "quiet"],d:15,s:"Gothic monastery cloister so perfectly preserved you\'re inside the 14th century—one of Europe\'s most beautiful religious spaces.",st:"The cloister is a perfect square, arcaded on all sides. Stone columns support pointed arches. Orange trees grow in the center. Light and shadow play across pavement. Chapels open off the cloister—each a jewel of religious art.",im:"It\'s 1347. A nun walks the cloister in prayer.",t:"The cloister is a perfect square, arcaded on all sides. Stone columns support pointed arches. Orange trees grow in the center. Light and shadow play across pavement. Chapels open off the cloister—each a jewel of religious art.\",im:\"It\'s 1347. A nun walks the cloister in prayer.\",t:\"Metro to Reina Elisenda. €5-7 entry. Go midweek morning for quiet. The museum upstairs has lesser-known medieval art.",c:["history_big", "architecture"],r:"g",nn:"Pedralbes Monastery",ns:"Pedralbes Monastery és tresor català.",nst:"Pedralbes Monastery respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},
  {id:16,n:"Olympic Ruins (1992 Games) — Montjuïc",a:"Montjuïc",v:["weird", "history"],d:16,s:"Abandoned Olympic facilities—architecture of a moment when Barcelona thought it could be something else, slowly crumbling.",st:"The main stadium still stands, enormous and empty. Other buildings decay—swimming pools with no water, climbing walls no one uses. Pigeons have claimed the seats. Nature slowly reclaims architecture.",im:"It\'s 1992. Thousands roar in the stadium. Athletes sprint. The city believes it\'s transformed forever.",t:"The main stadium still stands, enormous and empty. Other buildings decay—swimming pools with no water, climbing walls no one uses. Pigeons have claimed the seats. Nature slowly reclaims architecture.\",im:\"It\'s 1992. Thousands roar in the stadium. Athletes sprint. The city believes it\'s transformed forever.\",t:\"Cable car or bus to Montjuïc. €15 for stadium tour, or free to see from outside. Go late afternoon for melancholy light.",c:["history_big", "architecture"],r:"g",nn:"Olympic Ruins (1992 Games)",ns:"Olympic Ruins (1992 Games) és tresor català.",nst:"Olympic Ruins (1992 Games) respira passió. Generacions han caminat aquí. Ara tu. És experiència que canvia.",nt:"Escolta els locals. Arriba de bon matí. Respira lentament. Deixa\'t sorprendre."},

  {id:106,n:"MNAC Rooftop & Gardens",a:"Montjuïc",v:["beautiful","art","free"],d:15,s:"Free rooftop bar at art museum with city views — sunset from a secret terrace",st:"The National Art Museum of Catalonia (MNAC) has a hidden rooftop terrace open to the public with panoramic city vistas. The stone terraces around the building offer quiet corners where few tourists venture.",im:"Time-travel: MNAC opened in 1934, housed in the stunning Palau Nacional.",t:"Free rooftop access. Montjuïc cable car or Funicular. Sunset hours best.",c:["high_spots","art"],r:"g",nn:"Terrassa MNAC",ns:"Terrassa lliure al museu d\'art amb vistes a la ciutat",nst:"Gaudeix de les vistes panoràmiques des de la terrassa del museu.",nt:"Accés lliure a la terrassa. Telefèric de Montjuïc. Posta de sol millor."},
  {id:107,n:"Bunkers del Carmel (Bunkers Viewpoint)",a:"Carmel",v:["history","beautiful","free"],d:20,s:"Abandoned Spanish Civil War bunkers with 360° city views — a historical hideaway",st:"These shell-pocked bunkers were built in 1938 to defend against bombing; now they\'re a free panoramic viewpoint. Climb through the structures to find the best vistas; locals come here for sunset picnics.",im:"Time-travel: Built during the Spanish Civil War, these bunkers witness Barcelona\'s 20th-century trauma.",t:"Free. Walk from Lesseps metro or bus. Bring water, it\'s a climb.",c:["high_spots","history_big"],r:"g",nn:"Búnquers del Carmel",ns:"Búnquers abandonats de la Guerra Civil amb vistes 360°",nst:"Pujai pel búnquer historic per vistes completes de Barcelona.",nt:"Lliure. Caminada des de Lesseps. Porteu aigua."},
  {id:108,n:"Montjuïc Free Museums (Fundació Joan Miró)",a:"Montjuïc",v:["art","free","beautiful"],d:12,s:"World-class modern art for free or cheap — Miró\'s surreal universe on a budget",st:"Check MNAC and the Joan Miró Foundation for free-entry hours (often Sunday afternoons). Montjuïc becomes a cultural refuge with gardens, museums, and viewpoints. Bring a wine bottle and settle in a garden.",im:"Time-travel: Montjuïc was Barcelona\'s 1929 World\'s Fair site; culture developed here over decades.",t:"Check museum websites for free/pay-what-you-wish hours. Usually Sun afternoons free.",c:["free_museum","art"],r:"g",nn:"Fundació Joan Miró Accés Lliure",ns:"Art modern de classe mundial gratis",nst:"Explora el museu Miró durant les hores gratuïtes.",nt:"Comprova el web del museu. Diumenge després gratuït."},
  {id:109,n:"Swimming Pool — Piscina de Bernat Picornell",a:"Montjüïc",v:["swimming","local","free_entry"],d:15,s:"Where Barcelona's serious swimmers go. An Olympic training pool with open lanes on weekends.",st:"Piscina de Bernat Picornell was built for 1992 Olympics. The main pool is 50m. On Saturdays, lap swimmers fill the lanes. Cold, serious, working-class Barcelona.\n\nThe views over the city from the deck are extraordinary.",im:"Plunging into cold water, the echoey hall, the sound of other swimmers, the lane lines blurred below, the city framed in the high windows.",t:"Saturdays & Sundays 10am–2pm. Entry €4.50. Bring a cap (required). Montjüïc bus L192. Arrive early. No tourists. Just swimmers.",c:["swimming","local","free_entry"],r:"g",nn:"Piscina Olímpica — Bernat Picornell",ns:"Donde nadan los barceloneses serios. Piscina de entrenamiento olímpico.",nst:"La Piscina de Bernat Picornell fue construida para los Juegos Olímpicos de 1992. La piscina principal tiene 50m.\n\nLas vistas sobre la ciudad desde la cubierta son extraordinarias.",nt:"Sábados y domingos 10h-14h. Entrada €4,50. Trae un gorro (requerido). Bus Montjüïc L192. Llega temprano."},
  {id:110,n:"Sagrada Familia — Right Time",a:"Eixample",v:["greatest_hits","famous","architecture"],d:8,s:"Gaudí's basilica is real — soaring columns, impossible angles, light through stained glass you've never seen. Go at dawn.",st:"Sagrada Familia is in every guidebook because it deserves to be. The interior is extraordinary — columns that branch like trees, light that changes every minute, the scale is disorienting.\n\nThe secret is timing. Go at 9am Tuesday when it opens. You have 45 minutes alone.",im:"Standing in the center of the nave at 9:15am. The light from the east facade is pink and gold. The columns reach so high your neck hurts. Completely alone.",t:"Entry €29. Book online 2–3 weeks ahead. Open 9am daily. Go Tuesday–Thursday mornings. Audio guide is excellent.",c:["greatest_hits","famous","architecture"],r:"g",nn:"Sagrada Familia — El Momento Correcto",ns:"La basílica inconclusa de Gaudí es real — columnas, ángulos imposibles, luz a través de vidrios de colores.",nst:"Sagrada Familia está en cada guía porque merece estarlo. El interior es extraordinario — columnas que se ramifican como árboles.\n\nEl secreto es el timing. Ve a las 9h un martes cuando abre.",nt:"Entrada €29. Reserva en línea 2-3 semanas antes. Abierto 9h diariamente. Ve martes-jueves mañanas."},
  {id:111,n:"Mercat de Sant Josep — Market Life",a:"Raval",v:["markets","early_morning","food"],d:5,s:"La Boqueria's less famous sibling where locals shop — vegetables, fish at a third of the tourist price.",st:"Sant Josep is the working market. Opens at 6am. By 7am it's crowded with locals. Fishmongers gut sea creatures. Vegetable sellers arrange displays. It smells like salt and cilantro.\n\nThe prepared foods section is exceptional — roasted chickens, escalivada, meatballs. A coffee and breakfast from the counter costs €3.",im:"The smell of fish and fresh vegetables, the shout of prices, someone reaching past you for garlic, the weight of a paper bag of oranges.",t:"6am–2pm weekdays, 6am–3pm weekends. Go 7–8am. Cash mostly. Don't photograph without asking. Back stairs lead to older butchers.",c:["markets","early_morning","local"],r:"g",nn:"Mercat de Sant Josep — Vida de Mercado",ns:"La hermana menos famosa de La Boqueria donde realmente compran los locales.",nst:"Sant Josep es el mercado de trabajo. Abre a las 6h. A las 7h está lleno de locales. Pescaderos limpian. Vendedores de verduras arreglan exhibiciones.\n\nLa sección de comidas preparadas es excepcional.",nt:"6h-14h laborables, 6h-15h fines de semana. Ve 7-8h. Principalmente efectivo. No fotografíes sin permiso."},
  {id:112,n:"Montjüïc Cable Car — Sunrise",a:"Montjüïc",v:["high_spots","beautiful","quiet"],d:10,s:"The red cable car up the mountain. Take it at sunrise. The city is still asleep below. The Mediterranean behind it.",st:"The Telefèric del Port runs from the waterfront at Drassanes up to Montjüïc. At 6:30am when it opens, maybe five people are riding. City lights still on. Sun turning the sky pink.\n\nYou rise over the industrial port, over Raval rooftops, toward the green mountain. Takes 10 minutes.",im:"Suspended 50 meters above the waterfront, watching the city wake up beneath, the harbor lightening from purple to gold.",t:"6:30am–9:45pm daily. Single ticket €18. Telefèric del Port station at Drassanes. Go weekday mornings. Combine with a walk of Montjüïc fortress at dawn.",c:["high_spots","beautiful","quiet"],r:"g",nn:"Teleférico de Montjüïc — Amanecer",ns:"El teleférico rojo por la montaña. Súbelo al amanecer. La ciudad aún duerme debajo.",nst:"El Telefèric del Port sube desde el frente del agua en Drassanes hasta Montjüïc. A las 6h30 cuando abre, tal vez cinco personas están montando.\n\nSúbete sobre el puerto industrial antiguo, sobre los tejados de Raval, hacia la montaña verde.",nt:"6h30-21h45 diariamente. Boleto individual €18. Estación Telefèric del Port en Drassanes. Ve mañanas entre semana."},
  {id:113,n:"Gràcia Neighborhood — Village Inside City",a:"Gràcia",v:["neighborhoods","beautiful","local"],d:8,s:"The only Barcelona neighborhood that doesn't feel like Barcelona. Independent shops. Real residents. No tourists except ones wandering lost.",st:"Gràcia is a village that got surrounded by a city. Has its own squares, its own bars, its own culture. Residents here are fiercely local. The metro doesn't reach into the heart of it.\n\nPlaza del Sol and Plaza de la Virreina are where neighbors sit. Tiny bookshops, old hardware stores owned 30 years, galleries hidden on side streets.",im:"Sitting at a table on Plaza del Sol at 11pm Thursday with a glass of wine, locals on other tables not looking at their phones, the plaza lit by cafe lights and the plaza fountain.",t:"FGC train to Lesseps, or walk from Fontana metro. Enter from the east and lose yourself. Stop at Cal Pep for vermouth at noon. No attractions — just be there.",c:["neighborhoods","beautiful","local"],r:"g",nn:"Barrio de Gràcia — Pueblo Dentro de Ciudad",ns:"El único barrio de Barcelona que no se siente como Barcelona. Tiendas independientes. Residentes reales.",nst:"Gràcia es un pueblo que se vio rodeado por una ciudad. Tiene sus propias plazas, sus propios bares, su propia cultura. Los residentes aquí son ferozmente locales.\n\nPlaza del Sol y Plaza de la Virreina son donde se sientan los vecinos.",nt:"Tren FGC a estación Lesseps, o camina desde metro Fontana. Entra por el este y piérdete. Detente en Cal Pep para vermut al mediodía."},
  {id:114,n:"Park Güell — Golden Hour",a:"Gràcia",v:["greatest_hits","famous","beautiful"],d:10,s:"Gaudí's park is genuinely beautiful. Crowds ruin it until 6pm. Book an evening slot. Go alone. You'll understand why he built it.",st:"Park Güell is Gaudí's dream. The terrace overlooks the entire city with the Mediterranean beyond. The mosaic work is obsessive, specific, beautiful. The paths wind through a forest of tile and stone.\n\nMost visitors come at 2pm. It's a packed photo zone. Come at 6:30pm Thursday. You have the park almost to yourself for the hour before sunset. Light is golden. City turning pink.",im:"Standing on the main terrace at 7:15pm. The sun is at the horizon. The city is lit gold. The sea is turning purple. One other person standing 100 meters away.",t:"Entry €14. Book online (evening slots 6–8pm release 60 days ahead). Enter 6:30pm, exit 8pm. Park Güell store has excellent coffee €1.50. Combine with a walk of Gràcia neighborhood.",c:["greatest_hits","famous","beautiful"],r:"g",nn:"Park Güell — Hora Dorada",ns:"El parque de Gaudí es genuinamente hermoso. Las multitudes lo arruinan hasta las 18h. Reserva una tarifa vespertina.",nst:"Park Güell es el sueño de Gaudí. La terraza domina toda la ciudad con el Mediterráneo más allá. El trabajo de mosaico es obsesivo, específico, hermoso.\n\nLa mayoría de visitantes vienen a las 14h. Ven a las 18h30 un jueves.",nt:"Entrada €14. Reserva en línea (franjas vespertinas 18-20h se liberan 60 días antes). Entra a las 18h30, sal a las 20h."},
  {id:115,n:"Casa Vicens — Hidden Gaudí",a:"Gràcia",v:["architecture","weird","beautiful"],d:9,s:"Gaudí's first house, restored 2017. Nobody knows about it. Obsessive, strange, and beautiful in ways Sagrada Familia can't be.",st:"Casa Vicens was Gaudí's first major work, 1883. A townhouse wrapped in ceramic tiles — no straight lines, windows that look like they're melting, a roof that moves up and down. Cramped, which makes it more powerful. You're inside Gaudí's brain.\n\nThe restoration was meticulous. Every tile documented. The garden is tiny but perfect. So strange it's impossible to stop looking.",im:"Standing in the main salon surrounded by curved walls covered in glazed tiles, the patterns so busy your eyes can't rest, a window frame that looks molten, the smell of old tile and restoration chemicals.",t:"Entry €18. Hours 10am–8pm daily. The neighborhood is Gràcia — quiet, local, no tourists. Go on a weekday morning. You'll be mostly alone. The café serves decent coffee. Audio guide is good.",c:["architecture","weird","beautiful"],r:"g",nn:"Casa Vicens — Gaudí Oculto",ns:"La primera casa de Gaudí, restaurada en 2017. Nadie lo sabe. Obsesivo, extraño, hermoso.",nst:"Casa Vicens fue el primer trabajo importante de Gaudí, construido en 1883. Es una casa adosada envuelta en azulejos de cerámica — sin líneas rectas, ventanas que parecen que se están derritiendo.\n\nLa restauración fue meticulosa. Cada azulejo fue documentado.",nt:"Entrada €18. Horarios 10h-20h diariamente. El barrio es Gràcia — tranquilo, local, sin turistas. Ve en la mañana de un día entre semana."},
  {id:116,n:"Free Museum — MNAC Sundays",a:"Montjüïc",v:["free_entry","art","museums"],d:10,s:"The National Art Museum of Catalonia. Free entry 5–8pm Sundays. The building itself is more beautiful than half the art inside.",st:"The National Art Museum sits at the top of Montjüïc in a belle époque palace. The main staircase is wider than a street. The halls are vast. The collection is good but honestly the building is why you come.\n\nOn Sunday evening, locals bring families. It's not quiet, but not a photo zone either. People are actually looking at the art.",im:"Walking up the main staircase at 5pm Sunday with 20 other people, afternoon light coming through tall windows, your footsteps echoing, the palace revealing itself room by room.",t:"Free 5–8pm every Sunday. Entry 3–5pm is €12. Hours 10am–8pm Tues–Sat, 10am–9pm Sun. Take funicular up Montjüïc from Parallel metro. Bring wine or beer (allowed in courtyard).",c:["free_entry","art","museums"],r:"g",nn:"MNAC — Domingos Gratis",ns:"El Museo Nacional de Arte de Cataluña. Entrada gratuita de 17-20h los domingos. El edificio mismo es más hermoso que la mitad del arte adentro.",nst:"El Museo Nacional de Arte se sienta en la cima de Montjüïc en un palacio belle époque. La escalera principal es más ancha que una calle.\n\nEl domingo por la noche, los locales traen a sus familias.",nt:"Gratis 17-20h cada domingo. Entrada 15-17h es €12. Horarios 10h-20h de martes a sábado, 10h-21h domingo."},
  {id:117,n:"Day Trip — Montserrat Monastery",a:"Montserrat",v:["day_trips","history_big","weird"],d:50,s:"A monastery built into a boulder field 1,000 meters up a mountain. The stones are the color of rust. The monks are still here.",st:"Montserrat is 50km from Barcelona. The monastery was founded 12th century in the middle of a field of enormous boulders. The rock formations are geological oddities — massive stones stacked in ways that look like they'll tumble but never do.\n\nYou can train there 1 hour, hike the monastery and surrounding peaks, eat with the monks in the dining hall (they eat in silence while a brother reads scripture), and train back by 8pm.",im:"Standing at the top of a cliff looking down at clouds, the monastery behind you, the boulders below rust-red in afternoon light, and the Mediterranean visible 50km away.",t:"Train from Plaça de Catalunya to Montserrat Central (R5 line, 1 hour, €15 round trip). Monastery entry is free. Hiking is free. Lunch €10. Go on a weekday. Crowds enormous on weekends.",c:["day_trips","history_big","weird"],r:"g",nn:"Excursión — Monasterio de Montserrat",ns:"Un monasterio construido dentro de un campo de piedra a 1.000 metros de altura. Las piedras son del color del óxido.",nst:"Montserrat está a 50km de Barcelona. El monasterio fue fundado en el siglo XII en medio de un campo de enormes cantos rodados. Las formaciones de roca son oddities geológicas.\n\nPuedes tomar el tren allá en 1 hora, caminar el monasterio, comer con los monjes, y tomar el tren de vuelta.",nt:"Tren desde Plaça de Catalunya a estación Montserrat Central (línea R5, 1 hora, €15 ida y vuelta). La entrada al monasterio es gratuita. Senderismo gratuito. Almuerzo €10. Ve en un día entre semana."}];

<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:`url(\'${TBGS[tab]||TBGS.default}\') center/cover no-repeat`}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Barcelona Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Barcelona Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
