<script>
const P = [{id:1,n:"Old Quarter — Mediaeval Maze and Street Specialization",a:"Old City",v:["history","hidden","local"],d:30,s:"Ancient quarter with narrow streets, each historically specializing in one product, creating a living time capsule.",st:"Hanoi's Old Quarter is where the city was born: narrow streets radiating from the Red River, each street historically dedicated to a single trade. Hang Mà was silk, Hang Gai was silk (again), Hang Ngang was spices, Hang Trong was drum-making. This specialization continues partly today: Hang Bong sells tinware; Hang Dao sells textiles; Hang Giay sells shoes. Walking these streets is sensory overload: motorbikes weave between pedestrians; shop owners sit on tiny plastic chairs; laundry hangs between buildings; the smell of street food and incense mingles. The architecture is French-influenced shop-houses: narrow ground-floor storefronts with living quarters above, built during the colonial era. Many streets are barely wide enough for two people; cars cannot navigate them. The Old Quarter feels ancient despite the modern chaos: you're walking paths worn by centuries of commerce. It's touristy now, but the character persists beneath the souvenir shops.",im:"A motorbike navigates a narrow street barely wider than its handlebars, passing shop-houses where three generations of one family sell the same goods.",t:"Centered on Hoan Kiem Lake. Best explored on foot; wear comfortable shoes. Early morning (6-8am) is quieter before tourist crowds. Expect chaos: traffic, noise, crowds. No personal space. Many streets are pedestrian-friendly or closed to cars during daytime. Allow 2-3 hours minimum to scratch the surface.",c:[],r:"g",nn:"Phố Cổ",ns:"Khu phố cổ đầy ắp lịch sử",nst:"Phố cổ Hà Nội với những con đường hẹp lịch sử. Mỗi đường phố chuyên về một loại hàng hóa.",nt:"Đi bộ khám phá. Sáng sớm yên tĩnh hơn. Chuẩn bị cho sự hỗn loạn lalu lintas."},{id:2,n:"Hoan Kiem Lake — Sacred Water and Green Space",a:"Old City",v:["nature","beautiful","local"],d:15,s:"Urban lake in the heart of Hanoi with a historic turtle tower, legends, and a walking path.",st:"Hoan Kiem Lake (Lake of the Returned Sword) sits at Hanoi's heart, a serene water body ringed by paths and green space. According to legend, a giant turtle rose from these waters to return a magic sword to a 10th-century emperor, enabling him to defeat invaders. The lake is sacred: a small tower (Turtle Tower) sits on an island, though the turtle itself is now likely dead (the lake once hosted a giant turtle; it passed away decades ago, preserved in a temple). Locals exercise on the paths: jogging, tai chi, badminton. The lake is a respite from the city's intensity. On humid Hanoi days, the breeze off the water is precious. At dusk, the city lights reflect on the surface; it's romantic, peaceful. The lake connects north and south halves of the Old Quarter; almost every tourist itinerary includes a lap.",im:"At dawn, dozens of locals perform tai chi in slow motion on the shore, while the water remains perfectly still and the city sleeps.",t:"Free access. Walking path is 1.7km around the lake; allow 30 minutes to 1 hour at a leisurely pace. Early morning (6-8am) best for exercise culture and calm. Busier evenings with families. Jade Island Temple on northeast side is worth ascending.",c:[],r:"g",nn:"Hồ Hoàn Kiếm",ns:"Hồ nước thiêng lặng yên",nst:"Hồ nước ở trung tâm Hà Nội với tháp rùa huyền thoại và đường đi bộ xung quanh.",nt:"Miễn phí. Đi bộ quanh hồ 30 phút. Sáng sớm yên tĩnh. Buổi tối có gia đình."},{id:3,n:"Temple of Literature — Ancient Education",a:"Old City",v:["history","architecture","hidden"],d:20,s:"11th-century temple complex dedicated to Confucius, Vietnam's first university, with elegant courtyards and stelae.",st:"The Temple of Literature (Van Mieu) is Vietnam's most important educational monument. Founded in 1070, it served as the country's first university for centuries, training the intellectual elite. The complex is a masterpiece of Vietnamese architecture: courtyards open to the sky, with stone buildings arranged in perfect symmetry. Five courtyards represent the five cardinal directions (a Confucian concept). The Courtyard of Stelae is extraordinary: 82 stone tortoise-backed pillars, each carved with the names and achievements of scholars who passed the imperial examinations. Walking among them, you're surrounded by centuries of intellectual achievement. The Temple honors Confucius with appropriate reverence; incense curls through the main sanctuary. The architecture embodies harmony and order—reflecting Confucian values. Unlike many tourist sites in Hanoi that are chaotic, this temple maintains a contemplative atmosphere. It's sacred space in a profane city.",im:"A carved stele records the name of a scholar who passed the imperial exam 600 years ago, his achievement immortalized in stone.",t:"North of the Old Quarter. Open 8am-5pm daily. Entrance fee moderate. Allow 1-2 hours. Tours guide you through the significance of each courtyard. Photography excellent. Most peaceful in early morning. Respectful dress encouraged.",c:[],r:"g",nn:"Văn Miếu",ns:"Đền thờ và trường đại học cổ",nst:"Đền thờ Khổng Tử từ thế kỷ 11. Đại học đầu tiên của Việt Nam với sân chim và bia đá.",nt:"Bắc phố cổ. Mở 8-17h. Vé vào khá. Sáng sớm yên tĩnh hơn."},{id:4,n:"Ho Chi Minh Mausoleum — Communist Pilgrimage",a:"West City",v:["history","architecture","hidden"],d:20,s:"Monumental mausoleum housing Ho Chi Minh's preserved body, reflecting communist reverence and state power.",st:"Uncle Ho's resting place is a massive structure in a vast plaza: a concrete pyramid dominating the landscape. Inside, the embalmed body of Ho Chi Minh lies in a glass case, viewed in reverent silence by queuing visitors. The experience is surreal: Western visitors often find the mausoleum jarring, a confrontation with a different ideology's approach to immortality. For many Vietnamese, particularly older generations, Ho Chi Minh is a father figure—the revolution's visionary. The mausoleum expresses communist monumentalism: scale, power, and the state's dominion. Photography is forbidden inside; the atmosphere is hushed, almost religious. The complex also includes museums dedicated to Ho's life. The entire experience is deeply political: you're witnessing how a nation honors its founding communist leader. The contrast with Western reverence for presidents is notable.",im:"Visitors file slowly past a glass case containing the preserved body of Ho Chi Minh, their expressions ranging from reverent to uncomfortable.",t:"West of Old Quarter. Open Tuesday-Thursday, Saturday, Sunday 8-11am (mausoleum); afternoons/Fridays show different exhibits. Strict dress code: covered shoulders, knees, no shorts (hats off for men). Queues long; go very early. Free admission. Respectful demeanor required. Photography forbidden inside.",c:[],r:"g",nn:"Lăng Hồ Chí Minh",ns:"Lăng thờ cho lãnh tụ cách mạng",nst:"Đài tưởng niệm lớn lao chứa thi thể bảo quản của Hồ Chí Minh. Biểu tượng cộng hòa.",nt:"Mở sáng sớm 8-11h. Áo phủ vai, quần dài bắt buộc. Cực kỳ trang trọng. Cấm chụp ảnh bên trong."},{id:5,n:"One Pillar Pagoda — Buddhist Symbolism",a:"West City",v:["history","architecture","beautiful"],d:10,s:"11th-century Buddhist temple on a single stone pillar, symbol of Buddhist devotion rising from the mundane.",st:"One Pillar Pagoda is Vietnam's most iconic Buddhist structure: a small temple balanced on a single pillar rising from a pool of water. Built in 1049, it symbolizes enlightenment—the lotus flower emerging from mud and water toward the sky. The architectural metaphor is profound: the pillar represents the journey from the earthly (water) to the spiritual (sky and temple). The pagoda itself is tiny, barely fitting three people, yet it's instantly recognizable. Unfortunately, the structure has been damaged multiple times; the current version is a 1954 reconstruction after French colonial destruction. The setting was once a serene pond surrounded by nature; now it's surrounded by Hanoi's urban sprawl. Despite this, standing before it, the spiritual intention persists. Buddhist pilgrims visit regularly; incense smoke curls around the pillar. It's a profound location in an unlikely setting.",im:"A small wooden pagoda balanced on a single stone pillar, rising from water like a prayer made manifest.",t:"West of center, near the Mausoleum complex. Open 8am-5pm. Free or minimal fee. Allow 15-20 minutes. Respectful behavior expected. Early morning less crowded. Photography excellent from a distance. The pool and surrounding gardens add to the experience.",c:[],r:"g",nn:"Chùa Một Cột",ns:"Chùa Phật giáo trên một cột",nst:"Chùa từ thế kỷ 11 được xây trên một cột đá. Biểu tượng phật giáo Việt Nam.",nt:"Miễn phí. Sáng sớm ít người. Tôn trọng nơi tôn giáo. Ảnh từ xa tốt hơn."},{id:6,n:"Hanoi Opera House — Colonial Grandeur",a:"City Center",v:["architecture","modern","beautiful"],d:15,s:"French colonial-era opera house, architectural gem in yellow ochre, now hosting performances and tours.",st:"The Hanoi Opera House was built in 1911 during the height of French colonialism as a symbol of European culture imposed on Indochina. The building is stunning: neoclassical architecture with yellow ochre facade, mansard roof, and interior grandeur. Walking inside, you're transported to Belle Époque Paris: ornate balconies, crystal chandeliers, red velvet seats. The colonizers built this splendor not for Vietnamese elites but for their own enjoyment. Ironically, the colonized people now inhabit this space: Vietnamese artists perform; Vietnamese audiences attend. The building represents colonialism's contradictory legacy—oppression expressed through beauty. The exterior is Instagram gold; the interior is genuinely impressive. Tours reveal the architectural sophistication; performances show how Vietnam has reclaimed the space.",im:"Sunlight reflects off the yellow ochre facade of the opera house, a building designed for colonizers, now home to Vietnamese artists.",t:"City center, near Hoan Kiem Lake. Open for tours 8:30am-noon daily. Entrance fee moderate. Performances typically evenings (check schedule). Arrive early for tours; limited spots. Formal attire expected for performances. Photography excellent from exterior.",c:[],r:"g",nn:"Nhà hát Lớn",ns:"Nhà hát kiến trúc thuộc địa",nst:"Nhà hát kiến trúc Pháp từ năm 1911. Kiệt tác kiến trúc lâu đời ở Hà Nội.",nt:"Mở cho tham quan buổi sáng. Vé vào khá. Biểu diễn buổi tối. Chụp ảnh ngoại thất tuyệt vời."},{id:7,n:"Street Food Tour — Culinary Adventure",a:"Old City",v:["food","local","hidden"],d:20,s:"Guided evening food tours through Hanoi streets sampling pho, banh mi, spring rolls, and street vendor specialties.",st:"Hanoi's street food is legendary, and eating it requires an introduction. Organized food tours guide you to vendors where locals eat, not tourist traps. You might stop at a vendor selling nothing but pho (rice noodle soup) from 6am to noon; another selling only banh mi (Vietnamese sandwich); another specializing in spring rolls; another in grilled seafood. Each vendor has perfected one dish over decades. Your guide translates, explains ingredients and techniques, and handles ordering. You eat standing up or on tiny plastic chairs at folding tables, elbow-to-elbow with locals. The experience is chaotic, authentic, and delicious. Street food is cheap (a full meal costs a dollar or two) and safe if eating where crowds indicate turnover. Many tours operate at dusk/evening, when the streets transform into outdoor dining rooms. The chaos, noise, and flavor form a symphony.",im:"A vendor ladles steaming pho into a bowl while you sit on a plastic stool at a folding table, and a motorbike whooshes past your elbow.",t:"Tours operate primarily 6-8:30pm. Book through hotels or tour agencies. Guides essential (language, knowledge, safety). Tours typically cover 4-6 stops over 2-3 hours. Cost 20-40 USD. Comfortable walking shoes essential. Dress down; street food is messy. Come hungry; portions small but numerous.",c:[],r:"g",nn:"Ăn đường phố",ns:"Ẩm thực đường phố nổi tiếng",nst:"Ăn các món ăn đặc biệt của Hà Nội. Phở, bánh mì, cuốn và hải sản nướng.",nt:"Tham gia tour hướng dẫn buổi tối. Hướng dẫn viên rất cần thiết. Ăn uống rẻ và ngon. Ghế nhựa nhỏ là chuẩn."},{id:8,n:"War Remnants Museum — Difficult History",a:"South City",v:["history","hidden","art"],d:30,s:"Sobering museum documenting the American War (Vietnam War) and its impacts through photographs and artifacts.",st:"The War Remnants Museum presents the Vietnam War from the Vietnamese perspective—the American aggression, the suffering inflicted, the chemical weapons (Agent Orange) used. The museum is graphic: photographs of napalm burns, deformed children born to Agent Orange exposure, weapons and war machinery. For American visitors, it's confronting: the war they may have learned as a 'conflict with unclear purposes' is presented as an invasion resisted heroically. The museum employs Vietnamese terminology: 'American War' not 'Vietnam War,' 'American aggression' for the invasion. The tone is didactic, not apologetic. There are no displays showing Vietnamese violence; it's a one-sided history. Still, it's essential viewing: you encounter the war's human cost, particularly the impacts of chemical weapons that continue affecting Vietnamese people today. The museum can be emotionally draining; visitors often exit in somber mood.",im:"Photographs of children scarred by napalm and deformities from Agent Orange line walls—impossible to turn away from suffering.",t:"South of center, Reunification Palace area. Open 8am-5pm, closed Mondays. Entrance fee minimal. Allow 2-3 hours minimum. The museum is emotionally intense; take breaks if needed. Photography allowed except for certain exhibits. English signage throughout. Respectful demeanor appropriate.",c:[],r:"g",nn:"Bảo tàng Tội ác Chiến tranh",ns:"Bảo tàng chiến tranh Việt Mỹ",nst:"Bảo tàng tài liệu chiến tranh Việt Nam từ góc độ Việt. Tài liệu về chất độc da cam.",nt:"Mở 8-17h, đóng thứ 2. Vé vào rẻ. Buổi dài. Nội dung cay đắng. Chuẩn bị cảm xúc."},{id:9,n:"Hoa Lo Prison (Hanoi Hilton) — Colonial Brutality",a:"Old City",v:["history","hidden","architecture"],d:15,s:"19th-century French colonial prison, now a museum, where Vietnamese revolutionaries and later US pilots were held.",st:"Hoa Lo Prison was built by the French in 1896 to house political prisoners and criminals. Vietnamese revolutionaries were tortured and imprisoned here; some were executed. The prison became infamous for its brutality: overcrowding, disease, and intentional cruelty. During the American War, captured US pilots were also held here (Americans called it 'Hanoi Hilton'). The museum presents both perspectives: French colonial oppression and the imprisonment of American pilots. Walking the cells, you understand the desperation: shackles embedded in floors, barely room to lie down, no light. The guillotine room is particularly graphic—executions occurred regularly. The museum doesn't shy away from difficult history, though the narrative is primarily Vietnamese (American pilots are presented as occupiers, not heroes). The prison is a stark reminder of colonialism's violence.",im:"Iron shackles embedded in a stone floor suggest the legs of hundreds who were chained to this cell, never to leave alive.",t:"Old Quarter, central location. Open 8am-5pm, closed Mondays. Entrance fee minimal. Allow 1.5-2 hours. Tours available. Photography allowed. Emotionally heavy; the conditions were brutal. English explanations available. Respectful silence appreciated.",c:[],r:"g",nn:"Nhà tù Hỏa Lò",ns:"Nhà tù thực dân Pháp",nst:"Nhà tù từ thế kỷ 19. Giữ các tù chính trị và sau đó các phi công Mỹ.",nt:"Phố cổ. Mở 8-17h. Vé vào rẻ. Buổi nặng cảm xúc. Tôn trọng im lặng."},{id:10,n:"Water Puppetry Show — Traditional Performance",a:"Old City",v:["art","local","hidden"],d:15,s:"Traditional Vietnamese theatrical art form with wooden puppets performing on water to live music.",st:"Water puppetry is uniquely Vietnamese, evolving from rural villages where puppeteers performed for farmers. Puppets are carved wooden figures manipulated by puppeteers standing behind a screen in water. The performance tells stories of village life, myths, and nature: a frog fishing, a phoenix rising, a dragon dancing. The accompanying music is traditional Vietnamese: bamboo flutes, drums, and strings. The effect is magical: puppets seemingly move of their own volition on the water. The art form was nearly lost during the American War; it's been revived and is now primarily performed for tourists. Still, the artistry is genuine, the tradition alive. A performance is cultural immersion: you're witnessing an art form unique to Vietnam, performed with pride. Evening shows are atmospheric: the dim theater, the water, the music, and the skill of the puppeteers create a enchanting experience.",im:"A wooden phoenix bursts from water in a explosion of spray, while drums pound and a flute cries above the chaos.",t:"Multiple venues throughout Hanoi; most shows are at tourist-focused theaters. Evening performances best (6-7:30pm). Tickets 60,000-100,000 VND. Shows last 45 minutes to 1 hour. Book in advance for front-row seats. Photography allowed in most venues. The artistry is genuine despite the touristy setting.",c:[],r:"g",nn:"Múa rối nước",ns:"Nghệ thuật múa rối trên nước",nst:"Hình thức nghệ thuật truyền thống Việt Nam. Rối gỗ biểu diễn trên nước.",nt:"Buổi tối tuyệt vời nhất. Vé 60-100 ngàn đồng. Đặt chỗ trước. Chụp ảnh được phép."},{id:11,n:"Tra Co Beach (Day Trip) — Coastal Escape",a:"Day Trips",v:["nature","hidden","beautiful"],d:60,s:"Beach village 120km northeast of Hanoi, quiet alternative to crowded resorts.",st:"Tra Co Beach is a 2-hour drive northeast, reaching a simple coastal village where few international tourists venture. The beach is quiet: locals swim; fishermen cast nets; children play. There are no major resorts, no beach clubs—just sand, water, and a few small restaurants. The simplicity is its appeal: you're observing a fishing village, not visiting a tourist destination. Seafood is fresh and cheap; fish are grilled on the beach. The water is shallow for a long distance, making swimming easy. The drive passes through rice paddies and small towns, giving context to rural Vietnam. Many visitors rent a motorbike and driver for the day, stopping at interesting villages en route. The beach itself is not spectacular (compared to central Vietnamese beaches), but the authenticity and peace make it rewarding. It's a half-day or full-day excursion, often combined with Ha Long Bay for multi-day coastal trips.",im:"A fishing family hauls a net from the sea while children scatter at their feet, a scene unchanged for generations.",t:"120km northeast, 2-2.5 hour drive from Hanoi. Organized tours available; alternatively hire a car and driver. Allow 6-8 hours for full day trip. Bring sun protection; no shade. Late morning best for swimming. Restaurants are casual; minimal English spoken. Pack extra cash.",c:[],r:"g",nn:"Bãi Cát Cô",ns:"Bãi biển yên tĩnh gần Hà Nội",nst:"Bãi biển làng ngư dân, 120km từ Hà Nội. Đơn giản, không có resort.",nt:"2 giờ lái xe. Một ngày hoặc nửa ngày. Hải sản tươi. Yên tĩnh và chân thực."},{id:12,n:"Perfume Pagoda (Day Trip) — Pilgrimage and Caves",a:"Day Trips",v:["nature","history","hidden"],d:60,s:"Sacred Buddhist site with caves and grottos 50km south, accessed by river boat and hiking.",st:"Perfume Pagoda is not one pagoda but a complex of temples and caves in a limestone mountain 50km south. The approach is boat travel up a scenic river through karst landscapes, then hiking to cave entrances. Inside the main cave, a temple is carved into the rock. Incense smoke (giving the 'perfume' name) curls through chambers where Buddhist pilgrims pray. The setting is dramatic: massive rock formations, lush forest, and sacred atmosphere. The boat ride is beautiful—traditional wooden boats propelled by boatmen, narrow water passages between cliffs. The hike is moderate (45 minutes) and rewarded with views. This is a pilgrimage site: thousands of Vietnamese (particularly during Tet and spring) ascend to pray for blessings. Tourists are also welcome, though they're minority on-site. The spiritual intensity is palpable.",im:"Inside a vast cave, incense smoke swirls in shafts of light, and a Buddhist pilgrim kneels before an altar in stone shadows.",t:"50km south from Hanoi, 2-3 hours by car. Organized day tours include transport, boat, and guide. Alternatively hire car and driver. Allow 6-8 hours. Hiking boots recommended. Bring water and sun protection. The boat and hike are best in dry season (October-April). Photography excellent throughout.",c:[],r:"g",nn:"Chùa Hương",ns:"Chùa phật giáo với hang động",nst:"Địa điểm tôn giáo Phật giáo với hang động và điều, 50km nam Hà Nội.",nt:"Ngày viếng. Du thuyền sông đẹp. Đi bộ vừa phải. Mùa khô tốt nhất."},{id:13,n:"Tran Quoc Pagoda — Ancient Buddhism",a:"North City",v:["history","architecture","beautiful"],d:15,s:"7th-century pagoda on an island in the Red River, Vietnam's oldest Buddhist temple.",st:"Tran Quoc Pagoda, built in the 6th century (though a 17th-century reconstruction), is Vietnam's oldest Buddhist temple. Located on a small peninsula jutting into the Red River, it's approached via a narrow causeway. The pagoda is a tiered structure with intricate wooden details and stone carvings. Inside, Buddhist monks maintain the spiritual tradition: chanting, meditation, and prayer occur daily. The setting is serene: river breezes, surrounding water, and the relative isolation (despite Hanoi surrounding it) create contemplation. Pilgrims visit regularly; the temple is actively used, not merely a museum. Walking the grounds, you encounter both the spiritual practice and the historical layers: renovations from different eras, inscriptions in classical Vietnamese, and the slow accumulation of centuries. The pagoda represents how Buddhism persists in Vietnam despite state atheism—the faith survives, quietly, in these sacred spaces.",im:"A monk walks the narrow causeway to the pagoda as sunset lights the Red River beyond, and temple bells echo across the water.",t:"North of downtown, near the Red River. Open daily. Entrance fee minimal or free. Allow 30-45 minutes. Early morning best for peaceful atmosphere. Photography allowed in most areas. Respectful dress expected. Active temple; respect worship if occurring.",c:[],r:"g",nn:"Chùa Trấn Quốc",ns:"Chùa phật giáo cổ nhất Việt Nam",nst:"Chùa từ thế kỷ 7, trên đảo trong sông Hồng. Chùa phật giáo cổ nhất Việt Nam.",nt:"Miễn phí hoặc vé rẻ. Sáng sớm yên tĩnh. Tôn trọng tín đồ. Ảnh tuyệt vời."},{id:14,n:"Cyclo (Pedicab) Ride Through Hanoi — Urban Transport Experience",a:"Old City",v:["local","hidden","culture"],d:20,s:"Traditional human-powered tricycle rides through Hanoi streets, experiencing the city from a slow perspective.",st:"A cyclo is a bicycle-powered tricycle: two wheels in front supporting a passenger seat, pedaled by a driver sitting behind. Once the main transport in Hanoi, they're now primarily for tourists, though a few locals still use them. The experience of riding a cyclo is distinctly Vietnamese: you're at eye level with street life, moving slowly enough to observe details, exposed to the heat and chaos. The drivers know the city intimately; they navigate alleys and side streets inaccessible to cars. A cyclo ride is nostalgic—you're experiencing transport from an earlier era. Many drivers speak some English; they're happy to point out sites or deliver you to specific locations. Cyclo rides are cheap (50,000-100,000 VND for an hour) but the cultural experience is priceless. Evening rides are cooler and more pleasant.",im:"Pedaling slowly through a narrow alley, you pass a family cooking dinner on the street, children playing, laundry hanging—urban life unhurried.",t:"Cyclos available at major tourist spots and hotels. Negotiate price before boarding. Allow 45-60 minutes for a standard ride. Evening better (cooler). Drivers may seek tips (10-20% expected). Photography excellent from cyclo. Many drivers will wait while you explore sites.",c:[],r:"g",nn:"Xe cyclo",ns:"Phương tiện truyền thống",nst:"Xe đạp ba bánh được đạp bằng chân. Trải nghiệm Hà Nội cổ.",nt:"Thương lượng giá trước. 45-60 phút. Buổi tối mát mẻ hơn. Ảnh tuyệt vời."},{id:15,n:"Art Street Markets and Galleries — Contemporary Vietnamese Art",a:"Old City",v:["art","local","modern"],d:15,s:"Art markets and galleries featuring contemporary Vietnamese artists, paintings, sculptures, and crafts.",st:"Hanoi has a thriving art scene, particularly in neighborhoods like Hoan Kiem and outer areas like Thao Dien. Art markets (most active weekends) feature young Vietnamese artists selling paintings, sculptures, and crafts. The work ranges from traditional Vietnamese themes (water puppets, street scenes, historical figures) to contemporary abstract and political art. Galleries throughout the city show more established artists. The art reflects Vietnam's wrestling with modernity, tradition, and its complicated past. Political art addressing the war, colonialism, and contemporary social issues is increasingly visible. Photography is not always permitted in galleries; ask before shooting. Many artists are happy to discuss their work; English-speaking guides enhance appreciation. Buying directly from artists supports them far more than purchasing in shops.",im:"A young artist displays a painting of the Hanoi street market—chaos rendered with vibrant colors and meticulous detail.",t:"Art markets primarily weekends in public parks and streets (Hoan Kiem area). Galleries open weekdays and weekends. Allow 1-2 hours for browsing. Bring cash (many artists prefer it). Prices range from cheap to expensive. Tours guide you through the scene's significance.",c:[],r:"g",nn:"Thị trường tranh và phòng trưng bày",ns:"Thị trường tranh và phòng trưng bày",nst:"Những thị trường tranh với nghệ sĩ trẻ Việt. Tranh từ truyền thống đến hiện đại.",nt:"Chủ yếu cuối tuần. Tiền mặt tốt hơn. Hỏi trước chụp ảnh. Giá rẻ đến đắt."},{id:16,n:"French Quarter (Ancien Quartier Français) — Colonial Legacy",a:"South City",v:["architecture","history","hidden"],d:25,s:"French colonial-era neighborhood with tree-lined streets, villas, and French-influenced architecture.",st:"South of the Old Quarter lies the French Quarter, designed by colonial administrators as a modern European neighborhood. Wide tree-lined boulevards, villas with courtyards, and institutional buildings reflect Parisian planning imposed on Vietnam. The architecture is French colonial: pastel-colored villas, shuttered windows, wrought-iron balconies. Many buildings now house government offices, museums, or have been converted to hotels. Walking the streets, you understand the spatial segregation of colonialism: the French created their own neighborhood, separate from Vietnamese quarters. The trees (planted over a century ago) provide shade in summer heat. The quiet is striking compared to the Old Quarter's chaos: fewer motorbikes, wider streets, less density. Some buildings are beautifully maintained; others are aging. The neighborhood represents how colonialism imposed European ideals of urban planning onto an Asian city.",im:"A yellow villa with shuttered windows sits behind high walls and a tree-shaded street, French aesthetics persisting in Hanoi.",t:"South of downtown, easily accessible by metro or taxi. Most sites are exterior viewing (many buildings are offices/private). Walking the streets takes 1-2 hours. Cafés along the streets are pleasant for breaks. Architecture photography excellent. Less crowded than Old Quarter; feel of a different Hanoi.",c:[],r:"g",nn:"Khu Pháp Quý",ns:"Khu quân nước Pháp",nst:"Khu phố pháp hóa từ thời thuộc địa Pháp. Nhà xanh và cây xanh.",nt:"Bắc nam. Đi bộ 1-2 giờ. Yên tĩnh hơn phố cổ. Ảnh tuyệt vời."},{id:17,n:"Ba Mau Lake and Green Space — Wetland Sanctuary",a:"North City",v:["nature","local","hidden"],d:20,s:"Wetland lake with birdwatching, walking paths, and escape from urban intensity.",st:"Ba Mau Lake (Three Colors Lake) is a wetland in north Hanoi, a sanctuary for migratory birds and an escape from the city's intensity. The lake is ringed with walking paths through water hyacinths and reeds. Birdwatchers can spot herons, eagles, and countless other species. The locals—fishermen, joggers, and families—use the lake as respite. The water is shallow, with traditional fishing practices visible: nets cast and retrieved in choreographed motion. The area is relatively undeveloped; it remains wild despite Hanoi's expansion. The early morning is best: mist rises from the water, birds are active, and few tourists are present. It's a meditative experience—a green space where urban noise fades and natural rhythms dominate.",im:"A fisherman casts a net in an arc of water, and heron watches from the reeds, indifferent to the city beyond the horizon.",t:"North of downtown. Less touristy than other sites. Open to public; free access. Early morning best for birds and quiet. Allow 1-2 hours for walking. Bring binoculars for birdwatching. Bring water; limited facilities. Photography excellent.",c:[],r:"g",nn:"Hồ Ba Mẫu",ns:"Hồ chim và tự nhiên",nst:"Hồ lầm lầm ở phía bắc Hà Nội. Nơi ẩn nấp tuyệt vời từ thành phố.",nt:"Sáng sớm tốt nhất. Miễn phí. Mang kính lưỡng chiếu. Ảnh tuyệt vời."},{id:18,n:"Thang Long Water Puppetry Museum — Preserving Tradition",a:"Old City",v:["art","history","hidden"],d:20,s:"Museum dedicated to water puppetry art with exhibits of puppets, history, and traditional techniques.",st:"Beyond performing at shows, water puppetry has a museum dedicated to its preservation and documentation. The museum houses traditional puppets, stage equipment, and historical documents. Exhibits explain the carving process, the music, and how this uniquely Vietnamese art form developed. You see the puppets up close: intricate wooden carvings painted and aged to patina. The museum also documents the near-extinction of the art during the American War and its revival afterward. Though less immersive than a live performance, the museum provides deeper context. Some exhibits show how puppets are created; watching a master carver (if present) is enlightening. The museum is less touristy than performance venues; you encounter genuine enthusiasm from staff about preserving this tradition.",im:"A carved wooden puppet of a phoenix, details painted and gilded, sits in a glass case—centuries of tradition in wood.",t:"Old Quarter location. Open 9am-5pm, closed Mondays. Entrance fee modest. Allow 1 hour minimum. Tours available. Photography usually allowed. English signage present. The passion for preservation is evident.",c:[],r:"g",nn:"Bảo tàng Múa Rối Nước",ns:"Bảo tàng nghệ thuật rối nước",nst:"Bảo tàng giữ lại nghệ thuật rối nước. Rối gỗ, lịch sử, kỹ thuật.",nt:"Phố cổ. Mở 9-17h. Vé vào khá. Ảnh thường được phép. Tình yêu đẹp."},{id:19,n:"Quan An Com Tam Restaurant and District — Local Dining",a:"South City",v:["food","local","hidden"],d:15,s:"Working-class district with affordable restaurants serving Com Tam (broken rice), Vietnamese staple comfort food.",st:"Quan An is not a tourist district; it's a neighborhood where working-class Hanoians eat, work, and live. The specialty is Com Tam: broken rice cooked with chicken, fish, or pork, served with dipping sauces. It's cheap (under a dollar), filling, and beloved by locals. The restaurants are simple: plastic chairs, no decorations, and fast turnover. Eating here is a cultural experience: you're observing Vietnamese daily life, not tourist performance. The language barrier is higher; few staff speak English. The energy is authentic—people are hungry and focused on eating, not on hospitality theater. It's a glimpse of Hanoi for its residents: practical, affordable, communal.",im:"A young construction worker sits on a plastic stool, rice in one hand, spoon in the other, eating quickly before returning to work.",t:"South/west of city center. Accessible by taxi or motorbike. Restaurants open 6am-8pm (peak lunch and dinner). Most cash-only. Language app helpful for ordering. Phrasebook or translation app essential. Photo-taking may not be welcome; ask first. Come with appetite.",c:[],r:"g",nn:"Quán ăn com tấm",ns:"Nhà hàng địa phương rẻ tiền",nst:"Khu quán ăn bình dân. Com Tấm - cơm bị nứt, đặc sản Hà Nội.",nt:"Ghế nhựa. Không có phục vụ. Tiền mặt. Nhanh chóng. Chân thực."},{id:20,n:"Kham Thien Street (Brothel District) — Hidden History",a:"Old City",v:["history","hidden","local"],d:10,s:"Historic street in Old Quarter, once a red-light district, now rapidly gentrifying but retaining echoes of history.",st:"Kham Thien Street was (and informally still is) Hanoi's de facto sex work district. Old colonial buildings line narrow streets where historically women worked in brothels. The street is now gentrifying: modern shops and cafés are appearing, young people claim the space for nightlife. But traces of its history remain: certain buildings retain their old character; some storefronts show the area's shadowy past. Walking the street, you encounter Hanoi's complicated social history: poverty, colonialism, sex work, and modernization intersecting in one narrow street. Vietnamese tours often skip this neighborhood (it's 'inappropriate'), but travelers curious about Hanoi's less-sanitized history should explore. It's not dangerous, but it requires sensitivity to the people still living and working here.",im:"An old colonial building with ornate details sits between modern shops, its windows dark, history palpable in the aging facade.",t:"Old Quarter, near Hoan Kiem Lake. Walk with respect; the area is residential/working. Daytime best. Photography best at a distance; don't photograph individuals without consent. Guides familiar with the area provide historical context most directly.",c:[],r:"g",nn:"Phố Khâm Thiên",ns:"Phố có lịch sử phức tạp",nst:"Phố cũ từ thời thuộc địa. Vùng đèn đỏ lịch sử của Hà Nội.",nt:"Phố cổ. Tôn trọng cư dân. Ảnh từ xa. Hướng dẫn viên hữu ích."},{id:21,n:"Hanoi Sunrise Over the Red River — Dawn Meditation",a:"North City",v:["nature","beautiful","local"],d:15,s:"Watching sunrise from a riverside location, experiencing the city's awakening and the Red River's transformation.",st:"One of Hanoi's most transcendent experiences is watching sunrise over the Red River from a riverside café or bridge. Early morning (5:30-6:30am), the city is quiet; the river is calm. As light increases, the water transforms from black to grey to golden. Fishermen cast nets; birds begin calling; the city stirs. It's meditative and restorative—a moment of peace in a loud city.",im:"A fisherman's net arcs above still water as the sun appears at the horizon, turning the river gold.",t:"Accessible from multiple river points. Early morning 5-7am. Bring a camera; light is extraordinary. Bring light layers; mornings are cool.",c:[],r:"g",nn:"Mặt trời mọc trên Sông Hồng",ns:"Mặt trời mọc trên sông",nst:"Hình ảnh mặt trời mọc trên sông Hồng. Yên tĩnh lạ kỳ.",nt:"Sáng sớm 5-7 giờ. Ảnh tuyệt vời. Yên tĩnh."},{id:22,n:"Hang Mua Cave (Day Trip) — Karst Mountains",a:"Day Trips",v:["nature","views","hidden"],d:60,s:"Cave and mountain in Ninh Binh, 100km south, with boat rides through karst landscape.",st:"Ninh Binh is one of Vietnam's most beautiful areas: limestone karst mountains rise from emerald water. Hang Mua (Mua Cave) is a popular day trip from Hanoi. The experience involves hiring a boat to navigate narrow waterways between towering cliffs, then climbing to a cave entrance. The climb is steep (500+ steps) but the views are magnificent. The surrounding landscape is dramatic: water reflects grey stone; mountains seem to float in mist. Many travelers spend a full day here, boating and exploring.",im:"A boat slides beneath a limestone cliff so massive it seems to dwarf human existence.",t:"100km south, 2 hour drive. Organized tours available. Allow 8-10 hours including drive. Hiking steep; wear good shoes. Bring water and sun protection. Photography excellent.",c:[],r:"g",nn:"Hang Mua",ns:"Hang động ở Ninh Bình",nst:"Hang động và núi đá vôi. Cảnh quan tuyệt vời.",nt:"100km nam. 8-10 giờ. Đi bộ vất vả. Ảnh tuyệt vời."},{id:23,n:"Silk Street Markets — Traditional Weaving",a:"Old City",v:["local","art","hidden"],d:15,s:"Specialized street selling silk fabrics and traditional Vietnamese textiles from weavers.",st:"Hang Gai Street specializes in silk and traditional fabrics. Vendors sell rolls of fabric in every color; tailors offer custom clothing. The skill required to weave and dye silk is evident. Watching vendors work, you understand Vietnamese textile traditions. Quality varies; negotiate prices.",im:"Bolts of silk in jewel tones hang from shop fronts, catching light like liquid color.",t:"Old Quarter. Open 9am-6pm. Allow 1 hour. Photography welcome. Bargain for custom tailoring. Quality fabrics relatively expensive.",c:[],r:"g",nn:"Phố Hàng Gai",ns:"Phố lụa truyền thống",nst:"Phố bán lụa và vải truyền thống Việt Nam.",nt:"Phố cổ. Mở 9-18h. Lụa đẹp. Giá cao."},{id:24,n:"Long Bien Bridge — Historic and Symbolic",a:"North City",v:["history","architecture","hidden"],d:10,s:"100-year-old iron bridge spanning the Red River, iconic symbol of Hanoi, named after French engineers.",st:"Long Bien Bridge, completed in 1902, is one of Southeast Asia's oldest bridges. Built by the French, it's an iconic Hanoi landmark. The bridge has survived wars, including bombing during the American War. Walking or cycling across the bridge, you see the Hanoi below and feel the weight of history. Local vendors sell food from carts on the bridge; fishermen cast nets below. The bridge is busy with motorbikes and pedestrians. It's a functional structure that has become symbolic of Hanoi's resilience.",im:"A century-old iron structure carries thousands of motorbikes daily, the Red River far below reflecting the gray sky.",t:"Accessible on foot or by bike. Open anytime. Allow 30 minutes for crossing and observing. Best early morning or late afternoon. Photography excellent from the bridge.",c:[],r:"g",nn:"Cầu Long Biên",ns:"Cầu sắt lịch sử",nst:"Cầu sắt từ 1902. Biểu tượng của Hà Nội.",nt:"Mở 24h. 30 phút. Sáng sớm hoặc tối. Ảnh tuyệt vời."},{id:25,n:"Tet Holiday Season — Vietnamese Lunar New Year",a:"City Center",v:["local","culture","hidden"],d:10,s:"Experience Hanoi during Tet, Vietnam's most important holiday, with family celebrations and city transformation.",st:"Tet (Lunar New Year) is Vietnam's most important holiday. Hanoi transforms: streets decorated with flowers; families gather for meals; temples fill with worshippers. Many businesses close; the city is quieter but more festive. Decorations are elaborate: kumquat trees symbolize prosperity. Traveling during Tet means witnessing deep cultural traditions. However, many tourist attractions close; accommodation is expensive. The experience is cultural immersion, not typical tourism.",im:"A family sits around a table laden with symbolic foods, incense burning, prayers offered for the new year.",t:"Dates vary (late January to mid-February). Plan well in advance; accommodation books out. Many museums and sites close during Tet. Street celebrations are free and open. The atmosphere is celebratory and communal.",c:[],r:"g",nn:"Tết Nguyên Đán",ns:"Tết, Năm Mới Lunar",nst:"Tết là lễ quan trọng nhất Việt Nam. Thành phố thay đổi hoàn toàn.",nt:"Tháng 1-2. Đặt phòng sớm. Nhiều nơi đóng cửa. Yêu cầu tham dự."},{id:26,n:"Linh Phuong Pagoda — Peaceful Mountain Temple",a:"North City",v:["history","nature","hidden"],d:20,s:"Hilltop pagoda with views and gardens, less touristy than central temples, active place of worship.",st:"Linh Phuong Pagoda sits on a hilltop north of central Hanoi. The climb reveals views of the surrounding area. The pagoda is less touristed than central sites; locals come here to pray. The gardens are peaceful; incense curls through the air. The temple embodies Vietnamese Buddhism in practice—not a museum but a living faith.",im:"An elderly Buddhist nun tends flowers in the pagoda garden, the city far below invisible from this hilltop sanctuary.",t:"North of downtown, accessible by taxi. Allow 1-2 hours. Small entrance donation. Respectful dress. Photography respect locals' privacy.",c:[],r:"g",nn:"Chùa Linh Phương",ns:"Chùa Phật giáo trên đồi",nst:"Chùa trên đồi với vườn. Ít du khách hơn.",nt:"Bắc phố. Taxi. 1-2 giờ. Tôn trọng. Ảnh hạn chế."},{id:27,n:"Dong Xuan Market — Largest Covered Market",a:"Old City",v:["local","food","hidden"],d:20,s:"Massive indoor market selling everything from clothing to electronics, primarily for local shoppers.",st:"Dong Xuan Market is overwhelmingly large: four stories of stalls selling clothes, fabrics, electronics, and food. It's primarily for locals, not tourists. The energy is chaotic; finding anything requires patience. The ground floor specializes in fresh food: seafood, vegetables, and prepared items. Upper floors are textiles and goods. The experience is authentic commerce—no performance for tourists, just business and haggling.",im:"Shoppers navigate narrow aisles stacked with merchandise reaching to the ceiling, calling out prices and negotiating.",t:"Old Quarter, north gate. Open 6am-7pm. Busiest morning. Chaotic; wear comfortable shoes. Language app helpful. Allow 1-2 hours.",c:[],r:"g",nn:"Chợ Đông Xuân",ns:"Chợ lớn nhất Hà Nội",nst:"Chợ khổng lồ, bốn tầng. Bán tất cả hàng hóa.",nt:"Phố cổ. Sáng sớm. Rối loạn. Ứng dụng dịch bổ trợ."},{id:28,n:"Sofitel Legend Metropole Hotel — French Colonial Luxury",a:"City Center",v:["architecture","history","hidden"],d:15,s:"Historic luxury hotel from 1901, symbol of French colonial elegance, accessible for tea and tours.",st:"The Sofitel Legend Metropole is Hanoi's most elegant colonial building. Built in 1901, it hosted dignitaries, politicians, and celebrities. The architecture is impeccable: wrought iron, marble, and wood detailing. Though the hotel is expensive for overnight stays, you can visit for tea, lunch, or architectural tours. The lobby itself is worth seeing: paintings, antiques, and the weight of history. Walking the corridors, you feel the colonial past. The hotel represents how colonialism created spaces of beauty alongside oppression.",im:"Marble columns support a soaring lobby where a pianist plays classical music, transporting you to another era.",t:"City center, near Hoan Kiem Lake. Open to visitors. Tea and lunch available at reasonable prices. Allow 1-2 hours. Photography welcome in public areas. Dress appropriately; it's an upscale venue.",c:[],r:"g",nn:"โรงแรม Sofitel Metropole",ns:"โรงแรมอาณานิคมสวยงาม",nst:"โรงแรมจากปี 1901 สัญลักษณ์ความหรูหรา ของฝรั่งเศส",nt:"กลางเมือง ชา และกำลังคิด โอเค ราคา."},{id:29,n:"Pottery Village of Bat Trang (Day Trip) — Craft Traditions",a:"Day Trips",v:["art","local","hidden"],d:45,s:"Village 15km east specializing in pottery, with workshops and kilns where traditional ceramic skills persist.",st:"Bat Trang is a pottery village where families have made ceramic wares for centuries. Workshops line the narrow streets; you can watch potters on wheels, painters decorating vessels, and kilns firing the finished pieces. Many workshops sell directly; prices are lower than Hanoi shops. The process is traditional: hand-throwing, hand-painting, wood-fired kilns. Spending an afternoon here supports artisans directly. Some workshops offer brief pottery classes.",im:"A potter's hands shape clay into a perfect sphere, muscle memory guiding the creation of hundreds of vessels.",t:"15km east, 30-45 minutes. Organized tours available; alternatively hire a cyclo or bike. Allow 3-4 hours. Photography excellent. Supporting potters by purchasing directly appreciated.",c:[],r:"g",nn:"Làng gốm Bát Tràng",ns:"Làng gốm truyền thống",nst:"Làng gốm cách 15km. Gia đình làm gốm hàng thế kỷ.",nt:"30-45 phút. 3-4 giờ. Ảnh tuyệt vời. Mua từ thợ."},{id:30,n:"Water Puppetry Boat Workshop — Craftsmanship Behind the Art",a:"Old City",v:["art","hidden","local"],d:15,s:"Workshop where traditional wooden puppets are carved and painted, offering insights into the craft.",st:"Beyond watching water puppet performances, visiting a workshop reveals the skill required to create puppets. Master carvers shape wood; painters add details; puppeteers practice control. Some workshops offer brief workshops where tourists carve or paint a simple puppet. The work is meticulous; appreciation grows when you understand the labor involved. Supporting workshops directly rather than just attending performances sustains the tradition.",im:"An old master carver's hands, scarred and experienced, shape wood into a phoenix that seems ready to fly.",t:"Various locations in Old Quarter. Allow 1-2 hours. Some offer participation; book in advance. Photography usually welcome. Small entrance fee or expectation to purchase. Supporting the craft appreciated.",c:[],r:"g",nn:"Xưởng múa rối nước",ns:"Xưởng chế tác rối",nst:"Xưởng nơi các rối gỗ được tạo tác. Kỹ thuật truyền thống.",nt:"Phố cổ. 1-2 giờ. Đặt phòng sắp xếp tham gia. Ảnh thường được phép."},{id:31,n:"Cầu Long Biên — Viewpoint Cầu Sông Hồng",s:"Built by French engineers in 1902, this rusty iron bridge survived wars and floods, now a gritty spot for epic city views from above.",a:"North City",st:"Locals cross daily on motorbikes dodging rusty beams while sunset paints the Red River orange. Fishermen cast nets below as trains rumble past every 30 minutes.",im:"Salt air mixes with diesel fumes as the bridge vibrates under rumbling trucks.",t:"Walk from Tran Nhat Duat street at dusk, stand mid-bridge for 360 views, buses 47 or 86 drop nearby at Phuc Xa.",nst:"Cầu do kỹ sư Pháp xây năm 1902, sống sót qua chiến tranh lũ lụt, nay là điểm ngắm thành phố tuyệt vời từ trên cao. Dân địa phương chạy xe máy tránh dầm sắt gỉ khi hoàng hôn nhuộm sông Hồng cam. Ngư dân thả lưới bên dưới lúc tàu hỏa chạy ù ù cứ 30 phút.",nt:"Đi bộ từ phố Trần Nhật Duật lúc chập tối, đứng giữa cầu ngắm 360 độ, xe buýt 47 hoặc 86 thả gần Phúc Xá."},{id:33,n:"Xe Buýt 09 — Scenic West Lake Loop",s:"Bus 09 circles West Lake through tree-lined streets passing embassies, pagodas and lotus ponds for cheap scenic ride.",a:"North City",st:"Route starts Giap Bat depot, skirts Ho Tay with views of villas and banh cuon stalls, ends back south after 2 hours.",im:"Window frames lotus blooms and honking scooters zipping past lakeside cafes.",t:"Board at Giap Bat bus station 7am for full loop, pay 9k VND cash to driver, sit right side for lake views.",nst:"Xe 09 vòng hồ Tây qua phố rợp bóng cây, đại sứ quán, chùa tháp ao sen cho chuyến ngắm cảnh rẻ tiền. Bắt đầu bến Giáp Bát, lướt Ho Tây ngắm biệt thự quán bánh cuốn, về nam sau 2 giờ.",nt:"Lên bến Giáp Bát lúc 7h sáng vòng đầy đủ, trả 9k tiền mặt tài xế, ngồi bên phải ngắm hồ."},{id:34,n:"Xe Buýt 33 — Red River Riverside Views",s:"Bus 33 hugs Red River dike from Old Quarter to Gia Lam, passing bridges, villages and ferry points with open views.",a:"North City",st:"Rumbles past Long Bien Bridge, rural fields pop up mid-route, locals chat loudly while crossing to airport side.",im:"Mudflat smells rise with river wind as paddy greens flash by.",t:"Catch at Long Bien station route 33 northbound 8am, 12k VND, get off Yen Phu for river walk extension.",nst:"Xe 33 ôm đê sông Hồng từ Phố Cổ ra Gia Lâm, qua cầu làng phà với tầm nhìn thoáng. Rầm rập Long Biên, đồng quê chen giữa, dân địa phương tám chuyện ồn ào sang bên sân bay.",nt:"Bắt bến Long Biên tuyến 33 hướng bắc 8h sáng, 12k VND, xuống Yên Phú nối đi bộ sông."},{id:35,n:"Công Viên Lý Thái Tổ — Hoan Kiem Green Lung",s:"Sprawling park beside Hoan Kiem Lake with banyan trees, lotus ponds and elderly dancers, total free access.",a:"Old City",st:"Moms picnic under 100-year banyans while teens skateboard paths at dusk. Lake breezes carry drumbeats from nearby Ngoc Son Temple.",im:"Damp grass scent blends with street pho steam rising nearby.",t:"Enter from Ly Thai To street any time, join free aerobics 5pm daily, benches line full lake loop.",nst:"Công viên rộng cạnh hồ Hoàn Kiếm với đa si ao sen cụ già nhảy múa, vào tự do hoàn toàn. Mẹ ngồi picnic đa trăm năm, thiếu niên trượt ván lúc tối. Gió hồ mang nhịp trống đền Ngọc Sơn.",nt:"Vào từ phố Lý Thái Tổ bất cứ lúc nào, tham gia thể dục miễn phí 5h chiều hằng ngày, ghế dài vòng hồ."},{id:36,n:"Chợ Đồng Xuân — Dawn Wholesale Buzz",s:"Massive covered market open free from 5am for locals buying produce, fabrics in chaotic pre-dawn energy.",a:"Old City",st:"Porters haul 50kg rice sacks at 4am while aunties haggle over mangoes. By 7am streets clog with delivery motos.",im:"Fish brine and durian stink assault as carts squeak past.",t:"Sneak in side door Hang Dao 5:30am weekdays, stick to ground floor food zone, out by 7am tourist rush.",nst:"Chợ mái vòm khổng lồ mở miễn phí từ 5h sáng dân mua sắm nông sản vải vóc hỗn loạn bình minh. Phu xe vác bao gạo 50kg lúc 4h, dì mặc cả xoài. 7h phố tắc xe máy giao hàng.",nt:"Lẻn cửa phụ Hàng Đào 5:30 sáng thường ngày, bám tầng trệt khu thực phẩm, ra trước 7h du lịch đông."},{id:37,n:"Bảo Tàng Dân Tộc Học — Ethnic Village Free Days",s:"Open-air museum with 200-year houses from 54 ethnic groups, free first Sunday monthly at Cau Giay address.",a:"North City",st:"Wander Hmong stilt houses and Yao totem poles where kids fly kites on fields. Sundays locals grill corn nearby.",im:"Smoke from mock village fires carries chili spice.",t:"Bus 50 to Nguyen Van Huyen entrance first Sunday 9am-5pm free, weekdays 40k but skip for budget.",nst:"Bảo tàng ngoài trời nhà sàn trăm năm 54 dân tộc, miễn phí chủ nhật đầu tháng tại Cầu Giấy. Lang thang nhà H'Mông cột nghiêu Yao, trẻ thả diều đồng. CN dân nướng ngô gần đó.",nt:"Xe 50 đến Nguyễn Văn Huyện chủ nhật đầu 9h-17h miễn phí, ngày thường 40k nhưng bỏ qua tiết kiệm."},{id:39,n:"Quận Ba Đình Chợ Sẻ — Working Class Maze",s:"Neighborhood around Ba Dinh market with wet markets, repair shops and beer hoi corners off tourist radar.",a:"West City",st:"Mechanics fix scooter engines streetside while market ladies steam banh bao at 6am. Evening groups clink bia hoi glasses.",im:"Oil grease and steamed bun yeast waft through narrow gaps.",t:"Bus 22 to Ba Dinh market 27 Le Hong Phong, explore alleys north, haggle fish 30k/kg mornings.",nst:"Khu Ba Đình chợ Sẻ chợ ướt tiệm sửa bia hơi tránh radar du lịch. Thợ máy sửa xe đường, dì hấp bánh bao 6h sáng. Tối nhóm cụng bia hơi.",nt:"Xe 22 đến chợ Ba Đình 27 Lê Hồng Phong, khám phá hẻm bắc, mặc cả cá 30k/kg sáng."},{id:40,n:"Ngõ 167 Tây Sơn — Intellectual Backstreets",s:"Quiet alleys near Hanoi University with book stalls, pho carts and student vibes in Dong Da district.",a:"South City",st:"Students cram for exams at 24h pho joints while grandmas sell jackfruit sticky rice. Night markets pop 9pm.",im:"Pages turning and bubble tea sweetness linger in humid air.",t:"Walk from 167 Tay Son ngõ entrance evenings, bus 02 stops nearby, try che hat sen 15k roadside.",nst:"Hẻm yên 167 Tây Sơn gần ĐH Hà Nội sạp sách xe phở sinh viên Đống Đa. Học sinh cày thi quán phở 24h, bà bán xôi mít. Chợ đêm 9h.",nt:"Đi bộ lối vào ngõ 167 Tây Sơn tối, xe 02 dừng gần, thử chè hạt sen 15k ven đường."}];

<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
<div className="mt-5">
<p className="text-xs font-bold mb-2" style={{color:"#888",letterSpacing:"0.08em",textTransform:"uppercase"}}>City Moods</p>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} style={{borderRadius:10,overflow:"hidden",aspectRatio:"2/3",background:"#eee"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>)}</div></div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TBGS={"places":"url('../../textures/tex2.png') center/cover no-repeat","collections":"url('../../textures/tex1.png') center/cover no-repeat","missions":"url('../../textures/tex4.png') center/cover no-repeat","plan":"url('../../textures/tex3.png') center/cover no-repeat","phrases":"url('../../textures/tex2.png') center/cover no-repeat","default":"url('../../textures/tex2.png') center/cover no-repeat"};function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Hanoi Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Hanoi Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
