<script>
const P = [
  {id:1,n:"Balat and Fener Greek Neighborhood",a:"Balat",v:["hidden", "history", "beautiful"],d:15,s:"Two centuries-old neighborhoods where Greeks and Jews once lived, now crumbling and untouched by tourism",st:"Balat and Fener were the Greek and Jewish quarters for 500 years. The neighborhoods are steep hills of narrow cobbled streets, old wooden houses painted blue and red, and Byzantine churches now used as storehouses. Most buildings are decaying. Fewer tourists arrive here than anywhere in Istanbul. You see the actual history, not a reconstructed version.",im:"A blue wooden house sits on a steep hill with vines growing up its weathered walls, while an old woman watches from a doorway and the sound of the city below fades to complete stillness.",t:"Metro T4 to Balat. Walk through neighborhood anytime. Free. Best early morning 7am-8am. Two to three hours exploring.",c:["history_big"],r:"g",nn:"Balat ve Fener Yunan Mahallesi",ns:"İstanbul'un eski Yunan ve Yahudi mahallesi",nst:"Balat ve Fener, 500 yıl boyunca Greklerin ve Yahudilerin yaşadığı yerlerdir. Mahalleler dar cobbled sokaklar, eski ahşap evler ve Bizans kiliselerinden oluşur. Çoğu bina yıkılıyor. İstanbul'daki diğer yerlere kıyasla daha az turist vardır.",nt:"Metro T4 Balat istasyonuna gidin. Mahallede dolaşın. Bedava. Sabah 7-8 saat en iyi. 2-3 saat."},
  {id:2,n:"Galata Bridge Fishing at Dawn",a:"Galata",v:["quiet", "beautiful", "history"],d:8,s:"The century-old bridge over the Golden Horn where hundreds of fishermen cast lines at sunrise",st:"The Galata Bridge has a lower fishing deck where hundreds of men cast lines into the Golden Horn before dawn. The water beneath them is said to be overfished, but the ritual continues unchanged since the 1950s. Fishermen sit side by side, coffee from small vendors, and the city wakes behind them. It is the real Istanbul.",im:"Fishermen sit on a wooden bench with their lines in the water at sunrise while the silhouettes of mosques emerge on the hills above them and a ferry passes slowly underneath.",t:"Metro to Eminent, exit 1. Walk to Galata Bridge. Lower deck open 5am-10am. Free to watch. Best 5:30am-7am. One hour.",c:["history_big"],r:"g",nn:"Galata Köprüsü Sabah Balık Avı",ns:"Yüzlerce balıkçının sabah çıkıntıda attığı köprü",nst:"Galata Köprüsü, Altın Boynuz'u geçen yüzüncü yüzyıl köprüsüdür. Alt balık avı güvertesinde yüzlerce kişi tan yerinde hat atar. Balıkçılar yan yana otururlar, küçük satıcılardan kahve alırlar.",nt:"Metro Eminent istasyonuna gidin, çıkış 1. Galata Köprüsü'ne yürüyün. Alt güverte 5-10 saat açık. Bedava. En iyi 5:30-7 saat."},
  {id:3,n:"Istiklal Avenue at 6am",a:"Beyoglu",v:["quiet", "history"],d:10,s:"Istanbul's famous shopping street completely empty at dawn, revealing the architecture underneath the crowds",st:"Istiklal Avenue is packed with tourists and locals during the day. At 6am it is completely empty. The street stretches for 1.4 kilometers and is lined with historic buildings: art galleries, old theaters, cafes that have operated for 100 years. You see the bones of the street without the noise. By 9am it fills again.",im:"A woman sweeps the empty street at dawn while the facades of 19th-century buildings glow in the first light and a cat sleeps undisturbed on the marble pavement.",t:"Metro T1 to Taksim. Avenue begins at Taksim Square. Open anytime. Best 6am-8am. One to two hours walking the length.",c:["architecture"],r:"g",nn:"İstiklal Caddesi Saat 6'de",ns:"İstanbul'un ünlü alışveriş caddesi sabah boş",nst:"İstiklal Caddesi gündüz turist ve yerlilerle dolu. Sabah 6'de tamamen boş. Cadde 1.4 kilometre uzunluğunda ve tarihi binalarla dolu. Sanat galerileri, eski tiyatrolar, 100 yıldır çalışan kafeler.",nt:"Metro T1 Taksim istasyonuna gidin. Cadde Taksim Meydanı'ndan başlar. Herhangi bir zaman açık. En iyi 6-8 saat."},
  {id:4,n:"Cihangir Neighborhood Creative Quarter",a:"Cihangir",v:["weird", "local", "beautiful"],d:12,s:"An expat and creative quarter with boutique cafes, vintage shops, and Bosphorus views from every corner",st:"Cihangir is a hillside neighborhood of narrow streets, small cafes, art studios, and second-hand bookshops. Expats and Turkish creatives live here. It is intentionally artistic and somewhat precious, but genuinely so. You find independent coffee roasters, small galleries, and people reading books in cafes. The Bosphorus is visible from multiple vantage points.",im:"An artist sits in a cafe window with sketchbook in hand, looking out toward the Bosphorus while boats pass and the Golden Horn below creates layers of water and distance.",t:"Metro T1 to Taksim, exit 1. Walk south downhill 10 minutes. Neighborhood open anytime. Cafes 8am-midnight. Best afternoon or morning. Two to three hours.",c:["local_only"],r:"y",nn:"Cihangir Mahallesinde Yaratıcı Çeyrek",ns:"Sanat ve tasarım merkezli mahalle, Boğaziçi manzarası ile",nst:"Cihangir, dar sokaklar, küçük kafeler, sanat stüdyoları ve ikinci el kitapçılardan oluşan bir tepesidir. Göçmenler ve Türk yaratıcılar burada yaşıyorlar. İsteyerek sanatsal ve biraz değerli, ama gerçekten öyle.",nt:"Metro T1 Taksim istasyonuna gidin, çıkış 1. Mahalle aşağı 10 dakika yürü. Her zaman açık. Kafeler 8-12 saat."},
  {id:5,n:"Uskudar Asian Side Mosques and Ferry Life",a:"Uskudar",v:["local", "history", "quiet"],d:15,s:"The Asian side of Istanbul where locals live, old mosques line the waterfront, and ferry traffic is constant",st:"Most tourists stay on the European side. Uskudar is the real Istanbul: working-class neighborhoods, small mosques from the Ottoman period, waterfront cafes where elderly men play backgammon, and ferries arriving constantly. The pace is slow. The streets are residential. You see how Istanbul actually functions.",im:"An elderly man sits at a waterfront cafe with a glass of tea while a ferry passes behind him and the European side gleams across the water, and he watches neither, focused on his backgammon game.",t:"Ferries from European side depart constantly 6am-11pm. Cost 2.6 TL. Uskudar waterfront open anytime. Best late afternoon. Two to three hours.",c:["local_only"],r:"g",nn:"Üsküdar Asya Tarafı Camiler",ns:"İstanbul'un gerçek tarafı, Asyada",nst:"Çoğu turist Avrupa tarafında kalır. Üsküdar gerçek İstanbul: işçi sınıfı mahalleleri, eski Osmanlı camileri, yaşlı erkeklerin tavla oynadığı sahil kafeleri. Hız yavaş. Sokaklar yerleşim.",nt:"Tekneler Avrupa tarafından sabit kalkıyor 6-11 saat. Maliyeti 2,6 TL. Üsküdar sahil her zaman açık."},
  {id:6,n:"Kadikoy Market and Moda Waterfront",a:"Kadikoy",v:["local", "beautiful"],d:12,s:"A large neighborhood market on the Asian side where locals buy daily food, plus a waterfront of old cafes and wooden piers",st:"Kadikoy is a working-class neighborhood with a sprawling market, fish stalls, produce vendors, and restaurants serving Istanbul food. The waterfront area of Moda is a long promenade with old wooden buildings, fishermen, and locals sitting for hours. It feels miles away from European Istanbul despite being across the water.",im:"A vendor shaves ice by hand for an icy drink while behind him fish vendors shout prices and locals push past each other in a narrow market corridor, the smell of salt and fish overwhelming.",t:"Ferry from European side to Kadikoy 15 minutes. Market 8am-8pm. Waterfront open anytime. Best 5pm-8pm. Two to three hours.",c:["local_only"],r:"g",nn:"Kadıköy Pazarı ve Moda Sahili",ns:"Asya tarafında yerel pazarlar ve sahil",nst:"Kadıköy, yerlilerin günlük yemek satın aldığı büyük bir mahalledir. Moda kıyısı, uzun bir paseo, eski ahşap binalar, balıkçılar. Avrupa İstanbul'undan mil uzakta hisseder.",nt:"Teknesi Kadıköy 15 dakika. Pazar 8-20 saat. Sahil her zaman açık. En iyi 17-20 saat."},
  {id:7,n:"Miniaturk Miniature Turkey Park",a:"Eyup",v:["weird", "free"],d:10,s:"A vast outdoor park with miniature replicas of every famous Turkish landmark, absurdly comprehensive",st:"Miniaturk is a park containing hundreds of scale models of Turkish monuments: the Hagia Sophia in miniature, Cappadocia's fairy chimneys, Topkapi Palace small enough to walk around in minutes. It is absurd and earnest simultaneously. You see the whole of Turkish history in one afternoon. Many come for the kitsch, but it is genuinely educational.",im:"A child holds a doll up to a miniature Hagia Sophia while their parent reads the historical plaque, and dozens of other tourists wander through the outdoor park examining tiny versions of major monuments.",t:"Metro to Eyup. Walk to park 20 minutes. Entry 150 TL. Open 9am-7pm daily. Two to three hours.",c:["weird"],r:"y",nn:"Miniaturk Miniklik Türkiye",ns:"Türk anıtlarının küçültülmüş kopyaları",nst:"Miniaturk, yüzlerce Türk anıtının ölçekli modellerini içeren bir parktur. Hagia Sophia, Kapadokya, Topkapi Sarayı miniature. Saçma ve samimi aynı anda.",nt:"Metro Eyup istasyonuna gidin. Parka 20 dakika yürüyün. Giriş 150 TL. Günlük 9-19 saat açık."},
  {id:8,n:"Pierre Loti Cafe and Golden Horn View",a:"Eyup",v:["beautiful", "quiet", "romantic_water"],d:10,s:"A famous old cafe on a hilltop overlooking the Golden Horn, accessible by cable car, serving tea and history",st:"Pierre Loti is a small cafe on a steep hill in Eyup. You take a cable car up to reach it. From the terrace you see the entire Golden Horn sprawled below: mosques, the bridges, the water winding through the city. The cafe has operated for over 100 years. The setting is more memorable than the food.",im:"An elderly couple sits at a small table overlooking the Golden Horn at sunset, their glasses of tea untouched, simply watching the light change on the water and the mosques light up below them.",t:"Metro to Eyup. Cable car to Pierre Loti 5 TL. Cafe 8am-11pm. Tea 10 TL. Best sunset 4pm-6pm. One to two hours.",c:["romantic_water"],r:"y",nn:"Pierre Loti Kahvesi",ns:"Altın Boynuz manzarasıyla bir kahve",nst:"Pierre Loti, Eyup'teki dik bir tepenin tepesinde küçük bir kafedir. Kablo vagonuyla çıkarsınız. Terasından bütün Altın Boynuz görülür: camiler, köprüler, şehrin içinde akan su. Kafe 100 yıldan fazla süredir çalışıyor.",nt:"Metro Eyup istasyonuna gidin. Kablo araba Pierre Loti 5 TL. Kafe 8-23 saat. Çay 10 TL. En iyi gün batımı 16-18 saat."},
  {id:9,n:"Dolmabahce Palace Exterior and Waterfront Walk",a:"Besiktas",v:["history", "beautiful"],d:12,s:"A massive 19th-century Ottoman palace where the last sultans lived, viewed from the waterfront walk",st:"Dolmabahce Palace is an enormous palace built in the 1850s with European and Ottoman architecture. The exterior alone is breathtaking. You cannot afford to go inside, but the waterfront walk along the palace is free. You see the facade, the gardens, and the scale of Ottoman power. The setting on the Bosphorus is dramatic.",im:"A woman walks along the waterfront while the massive white palace rises beside her, its countless windows and columns creating a rhythm against the sky and the Bosphorus behind her flowing constantly.",t:"Metro T1 to Besiktas. Walk waterfront south. Palace viewable from street. Free exterior. Inside tour 100 TL (not required). One to two hours.",c:["architecture"],r:"g",nn:"Dolmabahçe Sarayı Dış Cephe",ns:"Osmanlı sultanlarının yaşadığı dev saray",nst:"Dolmabahçe Sarayı, 1850'lerde inşa edilen devasa bir saraydır. Dış cephe nefes kesicidir. Waterfront yürüyüşü ücretsizdir. Sarayın cephesini, bahçelerini görsünüz.",nt:"Metro T1 Besiktas istasyonuna gidin. Sahil yürüyüşü güney. Saray sokaktan görülebilir. Dış cephe bedava."},
  {id:10,n:"Pera Museum Orientalist Paintings",a:"Beyoglu",v:["beautiful", "quiet"],d:8,s:"A museum of Orientalist paintings showing European obsessions with the Ottoman world, free on Thursdays",st:"The Pera Museum has a collection of 19th-century Orientalist paintings by European artists depicting Ottoman life, harem scenes, and mosque interiors. The paintings reveal European fantasy about Istanbul more than historical reality. The museum is small, quiet, and the paintings are dramatic. First visit is free Thursday 12pm-10pm. Budget one hour.",im:"A large painting shows a woman in Ottoman dress reclining while European eyes imagined her as exotic and sensual, revealing more about the painter than the subject.",t:"Metro T1 to Taksim, exit 1. Walk east 5 minutes. Entry 100 TL free Thursdays. Open 12pm-10pm. Two hours.",c:["beautiful"],r:"y",nn:"Pera Müzesi Oryantalist Resimleri",ns:"Avrupa'nın Osmanlı Dünyası hakkındaki fikirlerini gösteren resimler",nst:"Pera Müzesi, Avrupa sanatçılarının Osmanlı yaşamını, harem sahnelerini tasvir eden 19. yüzyıl Oryantalist resimleri koleksiyonudur. Resimler Avrupa fantezisini İstanbul hakkında gösterir.",nt:"Metro T1 Taksim istasyonuna gidin, çıkış 1. Doğu 5 dakika yürüyün. Giriş 100 TL perşembe ücretsiz."},
  {id:11,n:"Karakoy Waterfront and Panagia Kamariotissa Church",a:"Karakoy",v:["history", "quiet"],d:8,s:"The old harbor district with historic buildings and an abandoned Greek church now visible from the waterfront",st:"Karakoy is an old port neighborhood with narrow streets, historic stone buildings, and fish markets. The Panagia Kamariotissa is an old Greek Orthodox church, now deconsecrated and empty. You can view the exterior and sometimes look inside. The waterfront district retains its working-class maritime character.",im:"An abandoned church with faded paint sits empty while the waterfront bustles with fish merchants and modern Istanbul moves past, the church standing still as a memory.",t:"Metro to Karakoy. Waterfront open anytime. Church viewable from outside. Free. One to two hours.",c:["history_big"],r:"g",nn:"Karakoy Sahili ve Kilisesi",ns:"Eski liman mahallesi, Yunan kilisesi kalıntıları",nst:"Karakoy, dar sokaklar, tarihi taş binalar ve balık pazarları olan eski bir liman mahallesidir. Panagia Kamariotissa, eski bir Ortodoks kilisesidir, şimdi boş.",nt:"Metro Karakoy istasyonuna gidin. Sahil her zaman açık. Kilise dışarıdan görülebilir. Bedava."},
  {id:12,n:"Princes Islands Ferry Ride and Buyukada",a:"Princes Islands",v:["beautiful", "quiet"],d:25,s:"Car-free islands in the Sea of Marmara reachable by ferry, with horse carriages and bike rentals",st:"The Princes Islands are reached by ferry from Besiktas. Buyukada is the largest. Cars are forbidden. Transportation is by horse carriage, bicycle, or foot. The island has Victorian mansions, Greek chapels, pine trees, and waterfront restaurants. Time moves differently here. You can do a day trip or stay overnight.",im:"A wooden horse carriage moves slowly down an empty street lined with old mansions while a cyclist passes and the sound of hooves on pavement echoes in the quiet.",t:"Ferry from Besiktas 75 minutes. Daily ferries 8:30am-5:30pm. Ferry cost 25 TL. Horse carriage rental 100 TL per hour. Bikes 30 TL per day. Full day trip or overnight.",c:["romantic_water"],r:"y",nn:"Prenses Adaları Teknesi",ns:"Arabası olmayan adalar, at arabalarıyla",nst:"Prens Adaları, Besiktas'tan teknesiyle ulaşılabilen Marmara Denizi'nde adalarıdır. Arabalar yasaktır. Ulaşım at arabasıyla, bisikletle veya yürümeyle sağlanır.",nt:"Besiktas'tan tekne 75 dakika. Günlük tekneler 8:30-17:30. Tekne maliyeti 25 TL."},
  {id:13,n:"Eyup Sultan Mosque and Cemetery",a:"Eyup",v:["history", "quiet"],d:10,s:"The oldest mosque in Istanbul, built in 1458, and the adjoining cemetery where Ottoman notables rest",st:"Eyup Sultan Mosque is the first major mosque you encounter in Istanbul historically. It was completed in 1458, shortly after the conquest. The cemetery beside it contains graves of Ottoman sultans, scholars, and soldiers. The atmosphere is peaceful, spiritual, and completely free of tourists. Locals pray; visitors observe quietly.",im:"A woman in traditional dress prays at a grave while pigeons fly among the headstones and old cypress trees shade the rows of stone markers preserving 500 years of Ottoman history.",t:"Metro T4 to Eyup. Mosque open 9am-5pm. Cemetery anytime. Free. One to two hours.",c:["history_big"],r:"g",nn:"Eyüp Sultan Camii",ns:"İstanbul'un en eski camii, 1458'de inşa edildi",nst:"Eyüp Sultan Camii, İstanbul'da tarihsel olarak ilk ana camidir. 1458'de, fetihten kısa süre sonra tamamlandı. Yanındaki mezarlık, Osmanlı sultanlarının, âlimlerinin ve askerlerinin grave boyunca uzanır.",nt:"Metro T4 Eyup istasyonuna gidin. Cami 9-17 saat açık. Mezarlık her zaman açık. Bedava."},
  {id:14,n:"Rahmi Koc Museum Industrial Artifacts",a:"Besiktas",v:["weird", "history"],d:12,s:"A quirky museum of submarines, planes, vintage cars, and industrial machines, free for residents",st:"The Rahmi Koc Museum is housed in an old Ottoman building on the waterfront. Inside are submarines you can walk through, vintage cars, old planes, and industrial machinery. It is more industrial warehouse than organized museum, which is part of the charm. Free for residents with ID. Tourists pay 100 TL. Entry is genuinely educational about Turkish industrial history.",im:"A man walks through the interior of a submarine while light from a small porthole illuminates his face and the cramped quarters of the vessel, and kids press their faces against the glass outside.",t:"Metro T1 to Besiktas. Museum at waterfront. Entry 100 TL. Open 10am-5pm. Closed Mondays. Two to three hours.",c:["history_big"],r:"y",nn:"Rahmi Koç Müzesi",ns:"Denizaltı, uçak ve eski araba müzesi",nst:"Rahmi Koç Müzesi, sahil üzerinde eski bir Osmanlı binasında bulunur. İçinde yürüyebileceğiniz denizaltılar, eski araba, eski uçaklar ve endüstriyel makineler vardır.",nt:"Metro T1 Besiktas istasyonuna gidin. Müze sahil üzerinde. Giriş 100 TL. Saat 10-17 açık. Pazartesi kapalı."},
  {id:15,n:"Chora Church Byzantine Mosaics",a:"Fatih",v:["history", "beautiful"],d:10,s:"The finest Byzantine mosaics in the world, recently restored and reopened as a museum",st:"Chora Church contains the finest Byzantine mosaics ever created. The walls are covered with intricate scenes from the life of Christ and Mary. The church was converted to a mosque, then a warehouse, then a museum. Recently restored, the mosaics glow again. The artistry is overwhelming. Many consider it the finest artwork in Istanbul.",im:"A massive mosaic of Christ as Pantocrator faces the visitor, with Byzantine gold background making the figure glow, while smaller mosaics around it show intricate biblical scenes in pieces of colored stone and glass.",t:"Metro T4 to Edirnekapi. Walk 10 minutes. Entry 100 TL. Open 9am-6pm. Closed Mondays. One to two hours.",c:["history_big"],r:"y",nn:"Kariye Kilisesi Bizans Mozaikler",ns:"Dünyadaki en güzel Bizans mozaikler",nst:"Kariye Kilisesi, dünyadaki en güzel Bizans mozaiklerini içerir. Duvarlar Mesih ve Meryem'in yaşamından sahne ile kaplanmıştır. Kilisenin yakın zamanda restore edildi.",nt:"Metro T4 Edirnekapi istasyonuna gidin. 10 dakika yürüyün. Giriş 100 TL. Saat 9-18 açık. Pazartesi kapalı."},
  {id:16,n:"Yedikule Fortress and Land Walls",a:"Yedikule",v:["history", "free"],d:15,s:"The original city walls that protected Constantinople, 13km of stone mostly free to walk",st:"Yedikule Fortress marks the southern end of Istanbul's ancient land walls. The walls stretch 13 kilometers from here to the Black Sea. They are the most impressive city walls in the world. You can walk sections free. The fortress itself has towers and a museum. The wall is where Constantinople held off invasions for 1,000 years.",im:"A section of ancient wall stretches across hills while vegetation grows on the surface and the city spreads beyond it, the stone itself faded to a weathered gray.",t:"Metro T1 to Aksaray. Walk south 15 minutes. Fortress entry 50 TL. Wall sections are free to walk. Full wall is 13km but sections are perfect for 1-2 hours. Best dawn to early morning.",c:["history_big"],r:"y",nn:"Yedikule Kalesi",ns:"İstanbul'u koruyan eski şehir duvarları",nst:"Yedikule Kalesi, İstanbul'un antik kara duvarlarının güney ucunu işaretler. Duvarlar buradan Karadeniz'e 13 kilometre boyunca uzanır. Dünyanın en etkileyici şehir duvarlarıdır.",nt:"Metro T1 Aksaray istasyonuna gidin. Güney 15 dakika yürüyün. Kale giriş 50 TL. Duvar bölümleri bedava."},
  {id:17,n:"Zeyrek Quarter UNESCO Byzantine District",a:"Zeyrek",v:["history", "hidden"],d:12,s:"A steep maze of medieval streets with Ottoman houses and remnants of Byzantine churches, almost no tourists",st:"Zeyrek is a UNESCO-protected district of steep streets, old Ottoman houses with carved wood and stone, and Byzantine church remains. It is among Istanbul's most authentic neighborhoods. Few tourists reach it. You walk narrow passages where daily life continues: laundry hanging, children playing, elders sitting. This is where Ottoman Istanbul survives.",im:"A narrow stone alley climbs steeply while washing hangs between buildings and a woman sits on her doorstep shelling beans, the only sound the echo of your footsteps.",t:"Metro T1 to Aksaray. Walk east 10 minutes. Neighborhood open anytime. Free. Best morning. Two hours.",c:["history_big"],r:"g",nn:"Zeyrek Mahallesi",ns:"Ortaçağ sokaklarının hemen hemen turist olmayan",nst:"Zeyrek, dik sokaklar, oymalı ahşap ve taş bulunan eski Osmanlı evleri ve Bizans kilisesi kalıntıları olan UNESCO tarafından korunan bir bölgedir.",nt:"Metro T1 Aksaray istasyonuna gidin. Doğu 10 dakika yürüyün. Mahalle her zaman açık. Bedava."},
  {id:18,n:"Vefa Bozacisi Boza Shop Since 1876",a:"Fatih",v:["history", "local"],d:5,s:"The oldest boza shop in Istanbul, operating since 1876, where even Ataturk drank boza",st:"Vefa Bozacisi is a tiny shop serving boza, a traditional fermented grain drink, for 150 years. The interior is unchanged: marble counter, old mirrors, ancient cash register. Locals and tourists squeeze in to drink from small glasses. Boza is acquired taste: thick, slightly sweet, vaguely fermented. Ataturk drank here. The shop is a time capsule.",im:"A man in modern clothes stands at an ancient marble counter drinking from a small glass while the proprietor, unchanged in his white apron, pours boza from a century-old spoon.",t:"Metro T1 to Beyazit. Walk north 5 minutes. Shop 8am-11pm daily. Boza costs 10 TL. 20 minutes.",c:["local_only"],r:"g",nn:"Vefa Bozacısı",ns:"1876'den beri boza satış, Atatürk'ün içtiği yer",nst:"Vefa Bozacısı, 150 yıl boyunca boza (geleneksel fermantasyon tahıl içeceği) sunan küçük bir dükkanıdır. İç mekan değiştirilmemiştir: mermer sayaç, eski aynalar.",nt:"Metro T1 Beyazit istasyonuna gidin. Kuzey 5 dakika yürüyün. Dükkan günlük 8-23 saat. Boza maliyeti 10 TL."},
  {id:19,n:"Sahaflar Book Bazaar Used Books and Manuscripts",a:"Beyazit",v:["hidden", "quiet"],d:8,s:"A centuries-old book bazaar tucked behind the Grand Bazaar, selling used books, maps, and rare manuscripts",st:"The Sahaflar Book Bazaar is a small courtyard of second-hand book vendors, manuscripts dealers, and old map sellers. The bazaar dates back centuries. You find Ottoman manuscripts, antique prints, leather-bound books, and documents in multiple languages. It is quiet and overlooked. Locals who collect books know it; tourists miss it entirely.",im:"An elderly book dealer sits amid stacks of old volumes, carefully turning pages of a manuscript while dust particles float in the afternoon light from a small courtyard window.",t:"Metro T1 to Beyazit. Sahaflar is near the Grand Bazaar entrance. Open 9am-7pm. Free to browse. Books vary in price. One to two hours.",c:["local_only"],r:"g",nn:"Sahaflar Kitap Pazarı",ns:"Yüzlerce yıllık kitap pazarı, eski el yazmaları",nst:"Sahaflar Kitap Pazarı, eski kitap satıcıları, el yazması satıcıları ve eski harita satıcılarının küçük bir avlusudur. Pazarın yüzlerce yıllık tarihi vardır.",nt:"Metro T1 Beyazit istasyonuna gidin. Sahaflar Grand Bazaar giriş yakınında. Saat 9-19 açık. Tarama ücretsiz."},
  {id:20,n:"Kapalibedesten Inner Grand Bazaar",a:"Beyazit",v:["history", "local"],d:12,s:"The oldest part of the Grand Bazaar, a covered market from the 1500s, where locals actually shop",st:"Most tourists see the outer Grand Bazaar. The Kapalibedesten is the inner sanctum, built in the 1500s. It is smaller, older, and less touristy. Vendors sell bolts of fabric, spices, gold, and household goods to local customers. The acoustics of the covered space create an overwhelming hum. This is where the bazaar originally functioned.",im:"A woman examines gold jewelry while a spice vendor weighs saffron on a metal scale and the overhead dome creates a echo of haggling and conversation.",t:"Metro T1 to Beyazit. Bazaar opens 9am-7pm. Free to walk. No entry fee. Two hours minimum.",c:["history_big"],r:"g",nn:"Kapalı Çarşı İç Bedesten",ns:"Grand Bazaar'ın en eski bölümü, 1500'lerden",nst:"Çoğu turist dış Grand Bazaar görür. Kapalı Bedesten 1500'lerde inşa edilen iç kutsal içeridir. Daha küçük, daha eski ve daha az turistik.",nt:"Metro T1 Beyazit istasyonuna gidin. Bazaar 9-19 saat açık. Bedava. İki saat minimum."},
  {id:21,n:"Emirgan Park Tulips and Ottoman Pavilions",a:"Emirgan",v:["beautiful", "free"],d:12,s:"A free park on the Bosphorus with three Ottoman pavilions and thousands of tulips blooming in April",st:"Emirgan Park is a large public park on the European side of the Bosphorus. Three old Ottoman wooden pavilions stand in the landscaped grounds. In April and May, 200,000 tulips bloom in the gardens. In off-season it is simply a pleasant place to walk. Free to enter. Beautiful in every season.",im:"Tulips in dozens of colors sweep across hillsides in waves while visitors sit on benches and the Bosphorus water visible between trees creates layers of distance.",t:"Metro T2 to Levent. Bus to Emirgan Park 15 minutes. Entry free. Open 7am-6pm. Peak bloom April 5-30. Two hours.",c:["parks"],r:"g",nn:"Emirgan Park",ns:"Boğaziçi'nde ücretsiz park, Osmanlı pavilyonları",nst:"Emirgan Parkı, Boğaziçi'nin Avrupa tarafında bir kamu parkıdır. Üç eski Osmanlı ahşap pavilyon peyzaj arazisinde durur. Nisan ve Mayıs aylarında, 200,000 lale bahçelerde açılır.",nt:"Metro T2 Levent istasyonuna gidin. Otobüs Emirgan Parkı 15 dakika. Giriş ücretsiz. Saat 7-18 açık."},
  {id:22,n:"Bebek Waterfront Neighborhoods and Bosphorus Walking",a:"Bebek",v:["beautiful", "quiet", "local"],d:15,s:"A residential waterfront neighborhood where locals walk the Bosphorus shore, residential and authentic",st:"Bebek is a quiet neighborhood on the Bosphorus where local residents walk the waterfront. It is not touristy. You see elderly couples, joggers, and families sitting on benches watching the water. The pace is slow. The view of the Asian shore is constant. It is how Istanbul lives when tourists are elsewhere.",im:"An elderly man sits alone on a bench watching boats pass while his hand-rolled cigarette smoke drifts upward and the Bosphorus continues its eternal flow behind him.",t:"Metro T2 to Besiktas. Bus to Bebek 10 minutes. Waterfront open anytime. Free. Best late afternoon. Two hours.",c:["parks", "romantic_water"],r:"g",nn:"Bebek Sahili",ns:"Boğaziçi sahilinde yerel mahalle",nst:"Bebek, Boğaziçi'nde yerel sakinlerin yaşadığı sakin bir mahalledir. Turist değil. Yaşlı çiftler, koşucular ve aileler görsünüz.",nt:"Metro T2 Besiktas istasyonuna gidin. Otobüs Bebek 10 dakika. Sahil her zaman açık. Bedava."},
  {id:23,n:"Anadolu Hisari Fortress Asian Side",a:"Anadolu Hisari",v:["history", "free"],d:10,s:"The fortress Mehmed II built on the Asian side before taking Constantinople from the European side",st:"Anadolu Hisari is a fortress built by Mehmed II in 1395 on the Asian shore of the Bosphorus. It was one of two fortresses (the other on the European side) built to control the strait before the final assault on Constantinople. The fortress walls overlook the Bosphorus. Walking the grounds is free. The strategic importance is immediately clear.",im:"Stone fortress walls rise from the waterfront while boats pass below and the European shore gleams across the narrow water, showing exactly why this location was chosen for siege control.",t:"Metro to Anadolu Hisari or take ferry to Anadolu Hisari pier. Free to walk exterior. Open anytime. One hour.",c:["history_big"],r:"g",nn:"Anadolu Hisarı",ns:"Mehmed tarafından inşa edilen kale",nst:"Anadolu Hisarı, Mehmed II tarafından 1395'de Boğaziçi'nin Asya sahilinde inşa edilen bir kalesidir. İstanbul'u almadan önce iki kale (biri Avrupa tarafında) inşa etti.",nt:"Anadolu Hisarı'na metro veya tekne ile gidin. Dış yürüyüş bedava."},
  {id:24,n:"Rumeli Hisari European Fortress with Views",a:"Rumeli Hisari",v:["history", "beautiful"],d:10,s:"Mehmed II's other fortress on the European side, with views of the Bosphorus and entry fee",st:"Rumeli Hisari was built by Mehmed II between 1451-1452 on the European shore opposite Anadolu Hisari. The fortress is larger and better preserved than its counterpart. Inside you can walk the walls and climb towers. The views of the Bosphorus are stunning. Entry costs money but the experience is worth it.",im:"A woman stands in a fortress tower looking out across the Bosphorus toward the Asian shore, while boats move continuously beneath her and the city spreads on both sides.",t:"Metro T2 to Rumeli Hisari, exit 1. Fortress entrance at bottom of hill. Entry 60 TL. Open 9am-7pm. One to two hours.",c:["history_big"],r:"y",nn:"Rumeli Hisarı",ns:"Mehmed II tarafından Avrupa tarafında inşa edilen kale",nst:"Rumeli Hisarı, Mehmed II tarafından 1451-1452 arasında Avrupa sahilinde inşa edildi. Kale, karşıtından daha büyük ve daha iyi korunmuştur.",nt:"Metro T2 Rumeli Hisarı istasyonuna gidin, çıkış 1. Giriş 60 TL. Saat 9-19 açık."},
  {id:25,n:"Tarihi Sultanahmet Kofte Restaurant",a:"Sultanahmet",v:["local", "history"],d:5,s:"The oldest meatball restaurant in Turkey, operating since 1920, serving just meatballs and bread",st:"Tarihi Sultanahmet Kofte is Istanbul's most famous meatball restaurant. It opens at lunch and serves only kofte (meatballs), bread, and drinks. The recipe is unchanged since 1920. You stand at a counter or sit at communal tables. It is institution, not ambiance. Locals queue before opening.",im:"A man stands at a counter eating a meatball sandwich while the proprietor continues making fresh meatballs from meat that has been prepared the same way for 100 years.",t:"Metro T1 to Sultanahmet, exit 1. Restaurant on Divan Yolu Street. Open 11am-5pm. Meatballs cost 5-10 TL. 20 minutes.",c:["local_only"],r:"g",nn:"Tarihi Sultanahmet Köftesi",ns:"Türkiye'nin en eski köfte dükkanı",nst:"Tarihi Sultanahmet Köftesi, İstanbul'un en ünlü köfte restoranıdır. Öğle yemeğinde açılır ve sadece köfte, ekmek ve içecek sunar. Reçete 1920'den beri değiştirilmemiştir.",nt:"Metro T1 Sultanahmet istasyonuna gidin, çıkış 1. Restoran Divan Yolu Street'de. Saat 11-17 açık. Köfte 5-10 TL."},
  {id:26,n:"Galata Tower at Night From Outside",a:"Galata",v:["beautiful", "night"],d:5,s:"A 14th-century tower lighting up at night, stunning from the streets below, avoid paying for interior",st:"The Galata Tower was built in 1348 and is illuminated at night. Paying to go inside is not required. The tower is even more impressive from the street looking up. At night it glows against the dark sky. The surrounding neighborhood (Galata) is also worth exploring. The exterior view is free and sufficient.",im:"The illuminated tower rises into the night sky while the surrounding city glows with lights from cafes, restaurants, and street lamps, creating a scene of layered Istanbul beauty.",t:"Metro T1 to Galata Tower area. Tower visible anytime. Free exterior. Best nighttime. 30 minutes to one hour.",c:["architecture"],r:"g",nn:"Galata Kulesi Gece",ns:"Gece aydınlatılan 14. yüzyıl kulesi",nst:"Galata Kulesi 1348'de inşa edildi ve gece aydınlatılır. İçeri gitmeye ödeme gerekmez. Kule sokaktan yukarıya bakıldığında daha etkileyicidir.",nt:"Metro T1 Galata Kulesi bölgesine gidin. Kule her zaman görülebilir. Dış bedava. En iyi gece saati."},
  {id:27,n:"Surp Pırgiç Armenian Hospital Grounds",a:"Yedikule",v:["hidden", "history"],d:8,s:"The grounds of an Armenian hospital built in the 1800s, now quiet and accessible to visitors",st:"Surp Pırgiç is a large Armenian hospital complex built in the 1800s in Yedikule. The grounds contain multiple buildings, a chapel, and gardens. It was a center of Armenian culture. Much is now vacant, but it remains accessible and atmospheric. The isolation and silence are striking.",im:"An empty courtyard of the hospital complex with arched passageways around it and an abandoned building casting long shadows in afternoon light, the silence of the space almost audible.",t:"Metro T1 to Aksaray. Walk south to Yedikule area. Hospital grounds open 10am-5pm. Free entry. One to two hours.",c:["history_big"],r:"g",nn:"Surp Pırgiç Ermeni Hastanesi",ns:"1800'lerde inşa edilen Ermeni hastane",nst:"Surp Pırgiç, 1800'lerde Yedikule'de inşa edilen geniş bir Ermeni hastane kompleksidir. Araziye birden fazla bina, bir şapel ve bahçeler bulunur.",nt:"Metro T1 Aksaray istasyonuna gidin. Yedikule bölgesine güney yürüyün. Hastane sahası 10-17 saat açık. Bedava giriş."},
  {id:28,n:"Moda Pier and Kadikoy Evening Walk",a:"Kadikoy",v:["beautiful", "romantic_water"],d:10,s:"An old wooden pier in Kadikoy on the Asian side, the best representation of Istanbul's waterfront essence",st:"The Moda Pier is a long wooden structure extending into the Sea of Marmara. At sunset or evening, locals sit on benches, fishermen cast lines, and couples walk slowly. The pier feels like old Istanbul unchanged. The view back toward the European side is stunning. It is one of the most authentic Istanbul experiences.",im:"Couples sit on a wooden bench facing the water while the sun lowers and the European shore lights up in the distance, and time seems to slow on the wooden pier.",t:"Ferry from European side to Kadikoy 15 minutes. Walk to Moda pier 10 minutes. Open anytime. Best sunset 4pm-6pm. One to two hours.",c:["romantic_water"],r:"g",nn:"Moda Iskelesi",ns:"Eski ahşap iskelesi, İstanbul'un özü",nst:"Moda İskelesi, Marmara Denizi'ne uzanan uzun ahşap bir yapıdır. Akşam veya gece, yerliler banklar üzerinde oturur, balıkçılar hat atarlar.",nt:"Avrupa tarafından Kadıköy'e tekne 15 dakika. Moda iskelesi 10 dakika yürüyün."},
  {id:29,n:"Tahtakale Copper Market Real Crafts",a:"Eminonu",v:["local", "history"],d:10,s:"The real copper and metalwork market, unlike the tourist Grand Bazaar, where actual craftspeople work",st:"Tahtakale is the wholesale market for copper, brass, and metalwork. Vendors sell to shops and craftspeople, not tourists. You see actual production: copper being shaped, solder being applied, and items being finished. It is loud, hot, and full of working craftspeople. This is commerce, not spectacle.",im:"A metalworker in protective gear shapes a copper bowl on a lathe while sparks fly and an apprentice watches, and the sound of hammers echoes through a narrow street of metal shops.",t:"Metro T1 to Eminonu, exit 1. Market open 9am-6pm. Free to walk. Best weekday mornings. One to two hours.",c:["local_only"],r:"g",nn:"Tahtakale Bakır Pazarı",ns:"Gerçek bakır ve metal işi pazarı",nst:"Tahtakale, bakır, pirinç ve metal işi için toptan pazarıdır. Satıcılar dükkanlar ve sanatçılarla satış yapar, turist değil. Gerçek üretim görsünüz: bakır şekillendirilmesi, lehim uygulaması.",nt:"Metro T1 Eminonu istasyonuna gidin, çıkış 1. Pazar 9-18 saat açık. Bedava. En iyi hafta içi sabahları."},
  {id:30,n:"Haydarpasa Station 1909 German Building",a:"Uskudar",v:["history", "beautiful"],d:8,s:"A 1909 Ottoman train terminal designed by German architects, being restored, viewable from outside",st:"Haydarpasa Station was built in 1909 by a German company for Ottoman railways. The building is ornate, red-brick, and sits on the Bosphorus waterfront. Trains no longer operate from here. The station is under restoration but viewable from outside. The architecture is stunning. It represents the final years of Ottoman engineering power.",im:"A massive red-brick building with towers and ornate details overlooks the Bosphorus while restoration equipment surrounds it and scaffolding shows work in progress on a century-old structure.",t:"Ferry from European side to Uskudar 15 minutes. Station visible from ferry. Walk waterfront to view exterior. Free. One hour.",c:["architecture"],r:"g",nn:"Haydarpaşa Garı",ns:"1909 Alman mimarlarının tasarladığı istasyon",nst:"Haydarpaşa Garı, 1909'da Osmanlı demiryolları için Alman şirketi tarafından inşa edildi. Bina gösterişli, kırmızı tuğlası, Boğaziçi kıyısında bulunur.",nt:"Teknesi Uskudar'a 15 dakika. İstasyon tekne seyahatinden görülebilir. Dış yüzü görmek için sahil yürüyün. Bedava."},
  {id:31,n:"Hagia Sophia Dawn Prayer Call",a:"Sultanahmet",v:["history"],d:20,s:"Arrive before dawn, hear the call to prayer echo through the dome",st:"Standing inside as the call reverberates through the space",im:"Voice echoing in vast space, light beginning to spread",t:"Arrive 30 minutes before dawn. Stand respectfully.",c:["history_big"],r:"g",nn:"聖索菲亞大教堂",ns:"黎明祷告聲響",nst:"站在內部，聽祷告聲在空間中回響",nt:"黎明前30分鐘到達。"},
  {id:32,n:"Bosphorus Sunset Cruise Golden Horn",a:"Bosphorus",v:["romantic_water"],d:30,s:"Evening ferry ride along the strait, sunset lighting water gold",st:"Standing on deck, watching Istanbul spread on both sides",im:"Water turning gold, minarets silhouetted, two continents visible",t:"Buy ferry ticket (cheap). Go 5-7pm. Stand outside.",c:["romantic_water"],r:"g",nn:"博斯普魯斯海峽日落巡航",ns:"金色的金角灣發光",nst:"站在甲板上，看伊斯坦布爾展開",nt:"買渡輪票。下午5-7點去。"},
  {id:33,n:"Balat Neighborhood Street Art Murals",a:"Balat",v:["street_art"],d:45,s:"Old Armenian quarter becoming artist hub, colored houses",st:"Wandering the narrow streets, discovering murals",im:"Colorful painted houses, street art mixing cultures",t:"Go morning for light. Take photos. Eat at local cafés.",c:["street_art"],r:"g",nn:"巴拉特社區",ns:"街頭藝術壁畫蜿蜒小巷",nst:"在狹窄街道上漫步，發現壁畫",nt:"早上去找光線。拍照。"},
  {id:34,n:"Grand Bazaar 5am Before Opening",a:"Fatih",v:["local"],d:30,s:"The famous bazaar completely empty at 5am before shops open",st:"Walking the corridors alone, seeing the space without crowds",im:"Empty vendor stalls, warehouse quiet, the chaos before it starts",t:"Arrive by 4:45am with a guide if possible.",c:["local_only"],r:"g",nn:"大巴扎",ns:"早上5點摊主開門前",nst:"獨自走走廊，看沒有人群的空間",nt:"凌晨4點45分到達。"},
  {id:35,n:"Eyup Sultan Mosque Cable Car Dusk",a:"Eyup",v:["history"],d:45,s:"Cable car up a sacred hill to a mosque overlooking the Golden Horn",st:"Riding the cable car at dusk, walking to the mosque",im:"City spreading below, minarets touching sky, dusk purple",t:"Take metro then cable car. Go 5-7pm. Modest dress.",c:["history_big"],r:"g",nn:"埃尤普蘇丹清真寺",ns:"纜車神聖山丘黃昏",nst:"乘坐纜車到寺廟，當光線消退時",nt:"乘坐地鐵然後纜車。下午5-7點去。"},
  {id:36,n:"Pierre Loti Café Sunset Overlook",a:"Eyup",v:["romantic_water"],d:45,s:"Clifftop café where a French poet wrote, sunset over Golden Horn",st:"Sitting with tea, watching the sunset light the entire city",im:"Golden Horn spread below, city lights coming on",t:"Walk or cable car to top. Sunset time essential.",c:["romantic_water"],r:"y",nn:"皮埃爾·洛蒂咖啡館",ns:"詩人的日落景色",nst:"坐著喝茶，看日落點亮整個城市",nt:"走到頂部或纜車。日落時間很重要。"},
  {id:37,n:"Cafékultura Hidden Courtyard",a:"Beyoglu",v:["hidden"],d:30,s:"Small café hidden in a side street, books and art, locals only",st:"Discovering the courtyard, sitting with a book",im:"Walls lined with books, art hanging, the quiet unexpected",t:"Go during the day. Cash only. Ask locals for direction.",c:["free_museum"],r:"g",nn:"書籍和藝術隱蔽的庭院",ns:"只有當地人知道的咖啡館",nst:"發現庭院，坐在書籍旁邊",nt:"白天去。只收現金。"},
  {id:38,n:"Galata Tower Sunrise Climb",a:"Galata",v:["high_spots"],d:20,s:"Climb the tower at 6am before crowds, city lights fading into dawn",st:"Climbing the stairs, reaching the top as first light spreads",im:"City lights fading, sky changing colors, the city waking",t:"Arrive by 5:45am. Climb the stairs. Allow 60 minutes.",c:["high_spots"],r:"g",nn:"加拉塔塔",ns:"日出爬塔第一縷光線",nst:"爬樓梯，當第一縷光線展開時到達頂部",nt:"凌晨5點45分到達。爬樓梯。"},
  {id:39,n:"Belgrade Forest Biking Escape",a:"Belgrade",v:["nature"],d:180,s:"Forest reserve 30km outside Istanbul, bike trails, lakes",st:"Biking trails, discovering quiet lakes, escaping the city",im:"Forest towering, water still and clear, the city forgotten",t:"Rent bikes downtown. Take minibus to start. Allow full day.",c:["nature"],r:"y",nn:"貝爾格萊德森林",ns:"自行車逃脫北方森林",nst:"沿著步道自行車，發現安靜的湖泊",nt:"從市中心租自行車。日間旅行。"},
  {id:40,n:"Topkapi Palace Harem Women's Quarters",a:"Sultanahmet",v:["history"],d:30,s:"The Harem hidden inside the palace, private rooms",st:"Walking through private chambers, understanding Ottoman women",im:"Ornate rooms, intricate tilework, the sound of water fountains",t:"Separate ticket required. Go morning. Photography limited.",c:["history_big"],r:"y",nn:"托普卡帕宮後宮",ns:"宮殿內的女性居住區",nst:"走過私人房間，了解奧斯曼婦女的生活",nt:"需要單獨門票。早上去。"},
  {id:301,n:"Blue Mosque at dawn",a:"Sultanahmet",v:["famous","beautiful","history"],d:45,s:"The mosque with six minarets and blue İznik tiles — most beautiful in the hour before tourists arrive.",st:"The Blue Mosque (Sultanahmet Camii) was completed in 1616 and immediately became Istanbul\'s defining structure. The dome is immense. The minarets rise symmetrically. Inside, the tiles are everywhere — 20,000 of them, hand-painted, the blue so vivid it seems lit from within.

Go at 6:30am before the tour groups. The call to prayer echoes through the empty space. Light comes through the high windows. You are essentially alone with the architecture. By 8am the crowds have begun. By 9am it\'s packed.",im:"Standing in the center of the mosque at dawn, light from the windows illuminating the tiles, the dome above, no crowds.",t:"Sultanahmet. Open daily. Free entry during prayer times, small fee (₺50) other times. Modest dress required (women: covered shoulders, knees; men: covered knees). Go 6:30-7:30am. Tram T1 to Sultanahmet.",c:["greatest_hits","beautiful","history"],r:"g",nn:"藍色清真寺 曙光時",ns:"具有六個尖塔和藍色İznik瓷磚的清真寺 — 遊客到達前最美。",nst:"藍色清真寺（蘇丹艾哈邁德清真寺）於1616年完成。穹頂巨大。尖塔對稱上升。內部到處都是瓷磚 — 20,000塊，手繪。

早上6:30到達，在旅遊團之前。祈禱的呼聲迴蕩通過空的空間。",nt:"蘇丹艾哈邁德。每天開放。祈禱時間免費進入。早上6:30-7:30。電車T1至蘇丹艾哈邁德。"},

  {id:305,n:"Süleymaniye Mosque Dawn Light",a:"Fatih",v:['famous', 'history'],d:30,s:"Ottoman dome catches first light at sunrise, creating ethereal shadows across prayer halls.",st:"Climb to Süleymaniye at 6am. Dome flooded with orange and pink light. Interior empty. You can see dust particles floating in beams.\n\nSit by a window for twenty minutes. Watch light move across the marble. Listen to the call to prayer echo off stone.",im:"Inside the dome, light streaming through high windows, prayer carpets in shadow.",t:"Metro to Vezneciler. Walk uphill 10 min. Arrive 6am-6:30am. Free. Dress respectfully. Stay 45 min.",c:["greatest_hits", 'history_big', 'beautiful'],r:"g",nn:"Süleymaniye Camii",ns:"Ottoman dome sunrise light",nst:"6am dome light. Dust rays visible.",nt:"Vezneciler metro. 6am arrival."},
  {id:306,n:"Balat Street Breakfast Maze",a:"Balat",v:['famous', 'local'],d:45,s:"Labyrinth of narrow lanes in old Greek quarter where locals actually drink coffee and eat.",st:"Get lost in Balat at 7:30am. Lane after lane of crooked buildings, laundry hanging, cats everywhere. Stop at a cafe where no tourists sit. Order Turkish coffee. Watch neighborhood wake up.\n\nWalk through where vendors are setting up. Smell fresh bread mixing with pipe smoke and street flowers.",im:"Narrow cobbled lanes, pastel shutters, smell of coffee and fresh bread.",t:"Tram T1 to Balat. Arrive 7:30am. Walk without plan. Breakfast at locals cafe. 2 hours.",c:["greatest_hits", 'local_only'],r:"g",nn:"Balat Sokakları",ns:"Old Greek quarter lanes",nst:"7:30am breakfast maze.",nt:"Tram T1 to Balat."},
  {id:307,n:"Cistern Beneath Streets Reflection",a:"Sultanahmet",v:['famous', 'weird'],d:35,s:"Underground Roman palace under city streets with 336 columns and haunting reflection pool.",st:"Descend into Basilica Cistern at 10am when crowded, then wait until midday when tour groups leave. Underground lake reflects columns that seem endless. Walk slow. Eyes adjusting.\n\nColumns are salvaged from older ruins. Some have medusa heads. Water is murky and still. Sound echoes strangely in darkness.",im:"Underground cavern, ancient columns in water, sound bouncing off stone.",t:"Walk from Sultanahmet. Entry 30 lira. Go 10am, stay until 1pm. Allow 1 hour. Wear layers.",c:["greatest_hits", 'history_big'],r:"g",nn:"Yerebatan Sarnıcı",ns:"Underground palace columns",nst:"Roman cistern reflection lake.",nt:"Sultanahmet walk. 30 lira entry."},
  {id:308,n:"Pierre Loti Sunset Tea Clifftop",a:"Eyüp",v:['famous', 'romantic_water'],d:50,s:"Clifftop café where Pierre Loti wrote, watching Golden Horn turn copper at dusk.",st:"Climb to Pierre Loti at 4:30pm. Sit at wooden table overlooking whole Golden Horn. Order Turkish tea. Watch light change for two hours as sun drops behind European hills.\n\nBy 6:30pm water is copper and pink. Mosques below light up. Watching city transform from daylight to evening.",im:"Clifftop table, Golden Horn spreading below, mosques beginning to illuminate.",t:"Cable car to Eyüp. Walk or second cable car to café. Arrive 4:30pm. Tea 30 lira. 2 hours.",c:["greatest_hits", 'beautiful', 'romantic_water'],r:"g",nn:"Pierre Loti Kahvesi",ns:"Clifftop sunset views",nst:"4:30pm Golden Horn sunset.",nt:"Eyüp cable car. 30 lira tea."},
  {id:309,n:"Spice Bazaar Spice Wall Pyramids",a:"Eminönü",v:['famous', 'local'],d:25,s:"Centuries-old market with spices stacked in perfect pyramids, smell alone worth the trip.",st:"Walk into Spice Bazaar at 8am when vendors are opening. Smell hits first—cardamom, cinnamon, saffron layering. Vendors arrange spices in perfect pyramids. Light comes in dusty beams.\n\nTalk to vendor about what they recommend. Most will give tiny tastes. By time you leave, hands smell like twenty countries.",im:"Stacked spice pyramids, dust in light beams, vendors weighing and pouring.",t:"Tram to Eminönü. Walk to Spice Bazaar. Arrive 8am-9am. Spend 45 min. Bring cash. Buy small bags.",c:["greatest_hits", 'local_only'],r:"g",nn:"Mısır Çarşısı",ns:"Spice pyramid colors",nst:"8am spice vendor setup.",nt:"Eminönü tram. 8am arrival."},
  {id:310,n:"Ortaköy Afternoon Boating Mosque",a:"Ortaköy",v:['famous', 'beautiful'],d:40,s:"Waterfront village with tiny mosque, street food, boats launching into Bosporus strait.",st:"Arrive at Ortaköy at 2pm. Waterfront already alive but not yet packed. Watch boats launch from wooden dock. Bosporus current creates constant motion and sound.\n\nSit at small table by water. Order fish sandwich. Watch ferries cross between continents. Mosque rises just above water—perfect light for photos at 3:30pm.",im:"Waterfront mosque, small boats launching, Bosporus current visible.",t:"Bus 40T to Ortaköy. Arrive 2pm. Fish sandwich 50 lira. Sit by water 1.5 hours.",c:["greatest_hits", 'beautiful', 'romantic_water'],r:"g",nn:"Ortaköy",ns:"Waterfront mosque boats",nst:"2pm Bosporus waterfront.",nt:"40T bus to Ortaköy. Fish 50 lira."},
  {id:311,n:"Topkapi Palace Harem Intimacy",a:"Sultanahmet",v:['famous', 'history'],d:45,s:"Palace where sultans lived—intimate rooms, hidden courtyards, scale of power in tile.",st:"Enter Topkapi at 9:15am right after opening. Harem is cool and quiet. Rooms have intimate ceilings covered in detailed tile work. Tiny windows look onto hidden gardens. Feel lives that happened here.\n\nWalk through sultans' private chambers. Proportions shift—ceilings lower, rooms smaller. Each detail was chosen carefully.",im:"Ornate tile work, small windows, palace chambers with intricate ceilings.",t:"Walk from Sultanahmet. Entry 40 lira. Go 9:15am. Spend 2 hours. Harem needs extra ticket.",c:["greatest_hits", 'history_big'],r:"g",nn:"Topkapi Sarayı",ns:"Harem palace chambers",nst:"9:15am palace opening.",nt:"Sultanahmet walk. 40 lira."},
  {id:312,n:"Camlica Hill Panorama Dusk Glow",a:"Üsküdar",v:['famous', 'high_spots'],d:30,s:"Highest point overlooking Istanbul—at dusk both sides illuminate simultaneously.",st:"Cable car to Camlica at 5pm. Park with tea cafés. By 5:30pm light turns gold. Below, Bosporus appears and disappears between buildings. Domes light up from east and west.\n\nStay until 7pm. City transitions from day to electric lights. Watch both continents glow together.",im:"Panorama view of two continents, illuminated mosques, Bosporus below.",t:"Metro to Üsküdar. Cable car to Camlica. Arrive 5pm. Tea 25 lira. Stay until 7pm.",c:["greatest_hits", 'high_spots', 'beautiful'],r:"g",nn:"Çamlıca Tepesi",ns:"Panorama both continents",nst:"5pm cable car ascent.",nt:"Üsküdar metro. Cable car to top."},
  {id:313,n:"Karakoy Print Shops Hand Craft",a:"Karakoy",v:['famous', 'local'],d:35,s:"Hidden alley filled with old print shops where craftsmen hand-tint vintage maps.",st:"Walk to Karakoy around noon. Slip into Tersane Caddesi—narrow street that feels like fifty years ago. Print shops line both sides. Old men hand-tint vintage maps. Smell turpentine and paper.\n\nStop at shop. Watch craftsman work. Ask questions. Most will show work and talk for hours. Buy vintage Istanbul map for 50 lira.",im:"Narrow alleyway, print racks, craftsmen at tables with pigments.",t:"Metro to Karakoy. Walk to Tersane. Noon arrival. Spend 1.5 hours. Bring cash for prints.",c:["greatest_hits", 'local_only'],r:"g",nn:"Karakoy Tersane Sokak",ns:"Print shop craftsmen",nst:"Noon vintage map shops.",nt:"Karakoy metro. Tersane alley."},
  {id:314,n:"Maiden's Tower Sunset Boat Isolation",a:"Eminönü",v:['famous', 'romantic_water'],d:45,s:"Small lighthouse island in middle of strait, boat-only access, perfectly framed by sunset.",st:"Take boat to Maiden's Tower at 4pm. Tower sits alone in water surrounded by traffic. By sunset time tower is golden and water reflects pink.\n\nStay on island 15 minutes. Feeling is isolated despite being in middle of busy strait. Then boat returns.",im:"Tower rising from water, Bosporus traffic around it, sunset glow on stone.",t:"Walk to Eminönü pier. Boat departures every 30 min. Cost 15 lira. Go 4pm for sunset.",c:["greatest_hits", 'beautiful', 'romantic_water'],r:"g",nn:"Kız Kulesi",ns:"Tower island sunset",nst:"4pm boat departure.",nt:"Eminönü pier. 15 lira boat."},
  {id:315,n:"Vefa Bookstore Corner Tea Reading",a:"Fatih",v:['famous', 'local'],d:40,s:"Historic neighborhood café surrounded by books, unchanged since 1950s, writers gather here.",st:"Walk to Vefa at 2pm. Tiny bookstore café. Walls lined with books. Smell old paper and tea. Regulars sit reading for hours. Wooden furniture worn smooth by decades of use.\n\nOrder tea. Sit in corner. Read. Time moves differently here. Writers and thinkers have sat in this exact spot.",im:"Book-lined walls, wooden furniture worn, afternoon light through window.",t:"Metro to Vezneciler. Walk to Vefa. Afternoon time. Tea 15 lira. 1.5-2 hours to enjoy.",c:["greatest_hits", 'local_only'],r:"g",nn:"Vefa Kütüphanesi",ns:"Bookstore tea corner",nst:"2pm book café sitting.",nt:"Vezneciler metro. Vefa tea."},
  {id:316,n:"Golden Horn Sunrise Paddle Water",a:"Eminönü",v:['famous', 'beautiful'],d:60,s:"Paddle kayak at dawn before city wakes, watching mosques light up from water.",st:"Rent kayak 5:30am. Paddle out onto water. Sun rising across opposite shore. Silhouette becoming light. Mosques begin to glow. Water calm and dark at first.\n\nPaddle slowly. Sound echoes off water and stone. By 6:30am light is everywhere and first commuters appear on shore. Return before 7am.",im:"Kayak on water, dawn sky turning pink, mosques silhouetted then illuminated.",t:"Kayak rental at Eminönü. Arrive 5:30am. Paddle 1.5 hours. Cost ~150 lira. Arrange in advance.",c:["greatest_hits", 'beautiful', 'romantic_water'],r:"g",nn:"Altın Horn Kanosu",ns:"Sunrise paddle golden light",nst:"5:30am kayak launch.",nt:"Eminönü kayak rental."}];

{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>

<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}
