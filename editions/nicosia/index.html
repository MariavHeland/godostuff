<script type="text/babel">
const {useState,useEffect,useMemo}=React;
const LANG_NAME="Greek";

const P = [
  {id:1,n:"Venetian Walls Walk — Walled City",a:"Walled City",v:["history","beautiful","local"],d:40,s:"Walk the complete circuit of the 16th-century Venetian walls — the best-preserved in the world",st:"The Venetian walls of Nicosia were built 1567–1570, a perfectly circular fortification with 11 heart-shaped bastions. You can walk the entire 4.5 km circuit on top of the walls for free. The divided city is visible from every point.",im:"Time-travel: Venetian engineers demolishing medieval churches to build new walls in time, 1567",t:"Free always. Enter from any of the 3 gates. Full circuit takes 45 minutes.",c:["history_big"],r:"g",nn:"Ενετικά Τείχη — Τειχισμένη Πόλη",ns:"Περίπατος στα βενετικά τείχη του 16ου αιώνα",nst:"Τα βενετικά τείχη χτίστηκαν το 1567–1570, ένα τέλεια κυκλικό οχυρό.",nt:"Πάντα δωρεάν. Είσοδος από οποιαδήποτε από τις 3 πύλες."},
  {id:2,n:"Büyük Han Great Inn — Walled City",a:"Walled City",v:["history","architecture","hidden"],d:30,s:"The finest Ottoman caravanserai in Cyprus — a working cultural centre inside a 1572 inn",st:"The Great Inn was built in 1572 by the Ottomans as a caravanserai for merchants. Today the courtyard houses craft workshops and a café. The architecture — 68 rooms around an octagonal fountain — is extraordinary.",im:"Time-travel: caravans arriving at dusk, merchants unloading spices and silk in this courtyard, 1590",t:"Free to enter the courtyard. Open daily.",c:["courtyards"],r:"g",nn:"Μπουγιούκ Χαν — Τειχισμένη Πόλη",ns:"Το πιο εντυπωσιακό οθωμανικό καραβανσεράι στην Κύπρο",nst:"Χτίστηκε το 1572 από τους Οθωμανούς ως καραβανσεράι για εμπόρους.",nt:"Ελεύθερη είσοδος στην αυλή. Ανοιχτό καθημερινά."},
  {id:3,n:"Ledra Street Crossing — Nicosia Buffer Zone",a:"Nicosia Buffer Zone",v:["history","weird","local"],d:30,s:"Walk through the crossing point between Greek and Turkish Cyprus — divided city, united street",st:"The Ledra Street crossing opened in 2008. With a valid passport you can walk between the two sides in seconds. The UN buffer zone — the Green Line — runs through the heart of Nicosia past abandoned houses.",im:"Time-travel: the barricades going up on this street in 1974, neighbours suddenly separated by sandbags",t:"Free with passport. Open daily. You can cross and return.",c:["history_big"],r:"g",nn:"Πέρασμα Οδού Λήδρας — Νεκρή Ζώνη",ns:"Διέλθετε από το σύνορο μεταξύ ελληνικής και τουρκικής Κύπρου",nst:"Το πέρασμα Λήδρας άνοιξε το 2008.",nt:"Δωρεάν με διαβατήριο. Ανοιχτό καθημερινά."},
  {id:4,n:"Buffer Zone Ghost Buildings — Nicosia Buffer Zone",a:"Nicosia Buffer Zone",v:["abandoned","weird","history"],d:20,s:"Look into the UN buffer zone from rooftops — a ghost street frozen since 1974",st:"Several buildings along the buffer zone offer views into no-man\'s-land. The Shacolas Tower Observatory gives the clearest view of both sides and the abandoned ground floor buildings below.",im:"Time-travel: these streets full of shoppers and café tables, the day before the division, July 1974",t:"Shacolas Observatory: small fee (€2). Street views free from rooftop cafés.",c:["abandoned"],r:"g",nn:"Εγκαταλελειμμένα Κτήρια — Νεκρά Ζώνη",ns:"Κοιτάξτε μέσα στη νεκρή ζώνη — μια φαντασματική οδός παγωμένη από το 1974",nst:"Κτήρια κατά μήκος της νεκρής ζώνης προσφέρουν θέα στη no-man\'s-land.",nt:"Παρατηρητήριο: μικρό τέλος (2 €). Δρόμος δωρεάν."},
  {id:5,n:"Laiki Yitonia Quarter — Laiki Yitonia",a:"Laiki Yitonia",v:["local","architecture","beautiful"],d:25,s:"The restored traditional quarter inside the Famagusta Gate — craft shops, old houses, cats",st:"Laiki Yitonia (the popular neighbourhood) was restored in the 1980s as a pedestrian quarter with Ottoman and colonial-era houses. It is walkable, full of Cypriot craft shops, and free.",im:"Time-travel: this quarter as a working-class neighbourhood of craftsmen and market traders, 1900",t:"Free to walk. Shops open Mon–Sat.",c:["courtyards"],r:"g",nn:"Λαϊκή Γειτονιά — Λαϊκή Γειτονιά",ns:"Η αποκατεστημένη παραδοσιακή συνοικία",nst:"Η Λαϊκή Γειτονιά αποκαταστάθηκε τη δεκαετία του 1980.",nt:"Δωρεάν περπάτημα. Καταστήματα Δε–Σα."},
  {id:6,n:"Famagusta Gate — Walled City",a:"Walled City",v:["history","architecture","beautiful"],d:15,s:"The most imposing of the three Venetian city gates — a perfect arched tunnel through 10 metres of wall",st:"The Famagusta Gate was built in 1567 as the main eastern entrance to the city. The vaulted passage is 10 metres long. The interior chamber is used for exhibitions and concerts.",im:"Time-travel: Venetian soldiers guarding this gate against Ottoman advance, 1570",t:"Free. Interior open when exhibitions run.",c:["architecture"],r:"g",nn:"Πύλη Αμμοχώστου — Τειχισμένη Πόλη",ns:"Η πιο επιβλητική από τις τρεις βενετικές πύλες",nst:"Η Πύλη Αμμοχώστου χτίστηκε το 1567.",nt:"Δωρεάν. Εσωτερικό ανοιχτό κατά εκθέσεις."},
  {id:7,n:"Athalassa National Forest Park — Athalassa",a:"Athalassa",v:["nature","local","quiet"],d:60,s:"A 1400-hectare forest park inside the city — lakes, flamingos, cycling tracks, and silence",st:"Athalassa is one of Europe\'s largest urban forest parks. Two lakes attract flamingos and migrating birds. Cycling trails circle the lakes. Almost no tourists visit. Locals jog and picnic here year-round.",im:"Time-travel: this area as dry scrubland before one million trees were planted here, 1960",t:"Free. Open daily. Bus from Nicosia centre (40 min).",c:["parks"],r:"g",nn:"Δασικό Πάρκο Αθαλάσσας — Αθαλάσσα",ns:"Ένα πάρκο 1400 εκταρίων εντός της πόλης — λίμνες, φλαμίνγκο, ποδηλατοδρόμοι",nst:"Η Αθαλάσσα είναι ένα από τα μεγαλύτερα αστικά δάση της Ευρώπης.",nt:"Δωρεάν. Ανοιχτό καθημερινά."},
  {id:8,n:"Agios Ioannis Cathedral — Walled City",a:"Walled City",v:["history","architecture","beautiful"],d:15,s:"Nicosia\'s oldest standing church — Byzantine frescoes covering every wall and ceiling",st:"The Cathedral of Agios Ioannis was built in 1662. Inside, 18th-century frescoes cover every surface: the Last Judgement, the Apocalypse, and the history of Cyprus.",im:"Time-travel: the archbishop commissioning these frescoes to rival the Ottoman mosques, 1720",t:"Free. Open Mon–Fri morning, closed midday.",c:["architecture"],r:"g",nn:"Καθεδρικός Ναός Αγίου Ιωάννη — Τειχισμένη Πόλη",ns:"Η παλαιότερη εκκλησία της Λευκωσίας — βυζαντινές τοιχογραφίες",nst:"Ο Καθεδρικός Ναός Αγίου Ιωάννη κτίστηκε το 1662.",nt:"Δωρεάν. Δε–Πα πρωί, κλειστό μεσημέρι."},
  {id:9,n:"Cyprus Handicraft Centre — Engomi",a:"Engomi",v:["local","art","history"],d:30,s:"Government craft workshops teaching traditional Cypriot lace-making, weaving and pottery",st:"The Cyprus Handicraft Centre preserves traditional techniques under threat of extinction. Artisans work in open workshops: lefkaritika lace-making, silverwork, and basket weaving. Free to watch and browse.",im:"Time-travel: Cypriot women teaching daughters lace patterns that go back to Byzantine times, 1850",t:"Free. Open Mon–Fri during working hours.",c:["free_museum"],r:"g",nn:"Κυπριακές Χειροτεχνίες — Ενγκόμι",ns:"Κυβερνητικά εργαστήρια που διδάσκουν παραδοσιακή κυπριακή δαντέλα",nst:"Το Κέντρο Κυπριακών Χειροτεχνιών διατηρεί παραδοσιακές τεχνικές.",nt:"Δωρεάν. Δε–Πα κατά τις εργάσιμες ώρες."},
  {id:10,n:"Municipal Garden — Larnaca Road",a:"Larnaca Road",v:["local","nature","quiet"],d:20,s:"The city\'s oldest park with a small zoo, outdoor theatre, and afternoon chess players",st:"The Municipal Garden was laid out in 1940. A small zoo with deer and peacocks entertains children. Old men play tavli (backgammon) every afternoon.",im:"Time-travel: British colonial officers picnicking here while the old city baked in the heat, 1940",t:"Free. Open daily. Zoo free.",c:["parks"],r:"g",nn:"Δημοτικός Κήπος — Οδός Λάρνακας",ns:"Το παλαιότερο πάρκο της πόλης με μικρό ζωολογικό κήπο",nst:"Ο Δημοτικός Κήπος χαράχθηκε το 1940.",nt:"Δωρεάν. Ανοιχτό καθημερινά."},
  {id:11,n:"Dervis Pasha Mansion — Pafos Gate",a:"Pafos Gate",v:["history","architecture","hidden"],d:20,s:"The only surviving Ottoman mansion in the old city — a glimpse into pre-1974 mixed Nicosia",st:"The Dervis Pasha mansion is a two-storey Ottoman house from the 18th century, now a museum. The collection shows how Greek and Turkish Cypriot domestic life was intertwined before partition.",im:"Time-travel: the Ottoman editor Dervis Pasha writing his newspaper in this courtyard, 1800",t:"Small entry fee (€3). Open Tue–Fri.",c:["history_big"],r:"g",nn:"Έπαυλη Ντερβίς Πασά — Πύλη Πάφου",ns:"Η μοναδική σωζόμενη οθωμανική έπαυλη στην παλιά πόλη",nst:"Η έπαυλη Ντερβίς Πασά είναι ένα διώροφο οθωμανικό σπίτι από τον 18ο αιώνα.",nt:"Μικρό τέλος (3 €). Ανοιχτό Τρ–Πα."},
  {id:12,n:"Faneromeni Church Square — Walled City",a:"Walled City",v:["local","history","beautiful"],d:15,s:"The main square of the Greek Cypriot quarter — shaded, with a church, market and social life",st:"Faneromeni Square is the heart of the walled city for local Greeks. The neoclassical church, completed in 1886, faces a bustling morning market. Elderly couples sit in the shade throughout the afternoon.",im:"Time-travel: this square as the centre of Cypriot Greek life before independence, 1950",t:"Free always. Market in mornings, Mon–Sat.",c:["local_only"],r:"g",nn:"Πλατεία Φανερωμένης — Τειχισμένη Πόλη",ns:"Η κεντρική πλατεία της ελληνοκυπριακής συνοικίας",nst:"Η πλατεία Φανερωμένης είναι η καρδιά της τειχισμένης πόλης.",nt:"Πάντα δωρεάν."},
  {id:13,n:"Strovolos Saturday Market — Strovolos",a:"Strovolos",v:["local","free","hidden"],d:30,s:"The sprawling suburban market where Nicosia residents actually shop — fruit, fish and noise",st:"The Strovolos Saturday market is where Nicosia families do their weekly shopping: piles of halloumi, fresh coriander, preserved olives, and citrus from the Mesaoria plain. Few tourists ever find it.",im:"Time-travel: the village of Strovolos as a separate community before the city reached it, 1950",t:"Free. Saturdays only. Bus from centre (20 min).",c:["local_only"],r:"g",nn:"Λαϊκή Αγορά Στροβόλου — Στρόβολος",ns:"Η εκτεταμένη λαϊκή αγορά — φρούτα, ψάρι και θόρυβος",nst:"Η λαϊκή Στροβόλου είναι εκεί που οι οικογένειες κάνουν τις εβδομαδιαίες αγορές.",nt:"Δωρεάν. Μόνο Σάββατα."},
  {id:14,n:"Selimiye Mosque (Aya Sofya) — Walled City",a:"Walled City",v:["history","architecture","beautiful"],d:20,s:"A Gothic cathedral converted to a mosque — Gothic arches and Ottoman minarets in one building",st:"The Cathedral of Saint Sophia was built 1209–1326 in French Gothic style. After the Ottoman conquest of 1571, minarets were added and it became the Selimiye Mosque. Both architectural eras are visible simultaneously.",im:"Time-travel: the Ottoman commander ordering the Christian images covered inside this cathedral, 1571",t:"Free to visit when not in prayer. Remove shoes. Cross via Ledra crossing.",c:["architecture"],r:"g",nn:"Τζαμί Σελιμιγιέ — Τειχισμένη Πόλη",ns:"Γοτθικός καθεδρικός ναός μετατραπείς σε τζαμί",nst:"Κτίστηκε 1209–1326 σε γαλλικό γοτθικό ρυθμό. Μετατράπηκε σε τζαμί το 1571.",nt:"Δωρεάν εκτός ώρας προσευχής. Βγάλτε παπούτσια."},
  {id:15,n:"Chrysaliniotissa Arts Quarter — Walled City",a:"Walled City",v:["local","art","hidden"],d:25,s:"The oldest neighbourhood in the walled city — craftsmen, artists, and the oldest church in Nicosia",st:"Chrysaliniotissa is a semi-restored quarter of traditional houses, workshops, and the 15th-century Chrysaliniotissa Church. Artists have colonised the old houses. The neighbourhood feels transitional — not yet gentrified.",im:"Time-travel: this as the workshop district for generations of Nicosia craftsmen, 1900",t:"Free always.",c:["street_art"],r:"g",nn:"Χρυσαλινιώτισσα — Τειχισμένη Πόλη",ns:"Η παλαιότερη γειτονιά — τεχνίτες, καλλιτέχνες, η παλαιότερη εκκλησία",nst:"Η Χρυσαλινιώτισσα είναι μια ημι-αποκατεστημένη συνοικία.",nt:"Πάντα δωρεάν."},
  {id:16,n:"Bandabulya Market Hall — Walled City",a:"Walled City",v:["local","history","architecture"],d:20,s:"The Ottoman covered market — halloumi sellers, coffee traders, and high vaulted arches",st:"The Bandabulya is an Ottoman-era covered market hall. It is more atmospheric than busy — a few cheese and meat vendors, a coffee stall, and the high vaulted arches of the original building.",im:"Time-travel: the market full of traders selling Syrian silk, Egyptian cotton, and Cypriot carob, 1800",t:"Free. Open Mon–Sat mornings.",c:["history_big"],r:"g",nn:"Μπαντάμπουλια — Τειχισμένη Πόλη",ns:"Η οθωμανική στεγασμένη αγορά",nst:"Το Μπαντάμπουλια είναι μια οθωμανική στεγασμένη αγορά.",nt:"Δωρεάν. Δε–Σα πρωί."},
  {id:17,n:"Phaneromeni Library — Walled City",a:"Walled City",v:["hidden","architecture","quiet"],d:15,s:"The oldest public library in Cyprus — still operating in its original 1893 building",st:"The Phaneromeni Library was established in 1893 and still operates from its original neoclassical building. An extraordinary survival: card catalogues, old Greek periodicals, and absolute silence.",im:"Time-travel: the library opening to an excited literate population, the first public books in Nicosia, 1893",t:"Free. Open Mon–Fri.",c:["free_museum"],r:"g",nn:"Βιβλιοθήκη Φανερωμένης — Τειχισμένη Πόλη",ns:"Η παλαιότερη δημόσια βιβλιοθήκη της Κύπρου",nst:"Η Βιβλιοθήκη Φανερωμένης ιδρύθηκε το 1893.",nt:"Δωρεάν. Δε–Πα."},
  {id:18,n:"Pafos Gate Bastion — Pafos Gate",a:"Pafos Gate",v:["history","architecture","local"],d:20,s:"The western gate of the Venetian walls where the buffer zone meets the city",st:"The Pafos Gate area is where the UN Buffer Zone reaches the western wall. The gate itself is a massive Venetian arch. The neighbourhood is a hybrid — some restored, some abandoned, very few tourists.",im:"Time-travel: the city council debating development beyond this gate as the city modernised, 1950",t:"Free. Walk the bastion walls for a close look at both sides of the city.",c:["history_big"],r:"g",nn:"Πύλη Πάφου — Πύλη Πάφου",ns:"Η δυτική πύλη όπου η νεκρή ζώνη συναντά την πόλη",nst:"Η Πύλη Πάφου βρίσκεται εκεί που η Νεκρά Ζώνη φτάνει στο δυτικό τείχος.",nt:"Δωρεάν. Περπατήστε τα τείχη."},
  {id:19,n:"Agios Antonios Arts District — Larnaca Road",a:"Larnaca Road",v:["local","art","hidden"],d:30,s:"Nicosia\'s small arts district — independent galleries, coffee bars, and young Cypriot designers",st:"The Agios Antonios area outside the walls has become Nicosia\'s creative neighbourhood. Small independent galleries, design studios, and the best coffee in the city. It feels like a Mediterranean Prenzlauer Berg.",im:"Time-travel: this as an unremarkable suburb before young Nicosians started opening studios here, 2010",t:"Free to walk. Galleries open afternoons. Best Thur–Sat evenings.",c:["street_art"],r:"g",nn:"Περιοχή Αγίου Αντωνίου — Οδός Λάρνακας",ns:"Η μικρή καλλιτεχνική συνοικία της Λευκωσίας",nst:"Η περιοχή Αγίου Αντωνίου έχει γίνει η δημιουργική γειτονιά.",nt:"Δωρεάν. Γκαλερί απογεύματα. Καλύτερα Πεμ–Σα."},
  {id:20,n:"Athalassa Lake Flamingos — Athalassa",a:"Athalassa",v:["nature","local","hidden"],d:40,s:"Winter flamingos on a lake inside the city — one of Cyprus\'s best bird-watching spots",st:"The smaller lake at Athalassa is a flamingo stop-over on the East African–West Asian flyway. From October to March, hundreds of flamingos feed here. An extraordinary sight 10 minutes from the city centre.",im:"Time-travel: the flamingos arriving on this lake centuries before the city existed, as they always have",t:"Free. Open daily. Best October–March, early morning.",c:["parks"],r:"g",nn:"Φλαμίνγκο Λίμνης Αθαλάσσας — Αθαλάσσα",ns:"Χειμερινά φλαμίνγκο στη λίμνη εντός της πόλης",nst:"Η μικρή λίμνη στην Αθαλάσσα είναι σταθμός φλαμίνγκο.",nt:"Δωρεάν. Καλύτερα Οκτ–Μαρ, πρωί."},
  {id:21,n:"Eleftheria Square — Walled City",a:"Walled City",v:["architecture","beautiful","local"],d:15,s:"Nicosia\'s new civic gateway — Zaha Hadid\'s bridge sculptures spanning the Venetian moat",st:"Eleftheria Square was redesigned by Zaha Hadid (completed 2021). The white bridge-sculptures span the old Venetian moat and connect the modern city to the walls. Free to walk day or night.",im:"Time-travel: the old Venetian moat used as a bus terminal for 50 years before this redesign, 1970",t:"Free always.",c:["architecture"],r:"g",nn:"Πλατεία Ελευθερίας — Τειχισμένη Πόλη",ns:"Η νέα αστική πύλη — γέφυρες-γλυπτά της Ζάχα Χαντίντ πάνω από την τάφρο",nst:"Η Πλατεία Ελευθερίας ανασχεδιάστηκε από τη Ζάχα Χαντίντ το 2021.",nt:"Πάντα δωρεάν."},
  {id:22,n:"Buyuk Hamam Ottoman Bath — Walled City",a:"Walled City",v:["history","architecture","weird"],d:20,s:"A working Ottoman bathhouse in a 14th-century Lusignan church — you can bathe for €12",st:"The Great Hamam was built inside the 14th-century Church of St George of the Latins after the Ottoman conquest. Cross-ribbed Gothic vaults rise above marble bathing platforms. Still operating as a hamam.",im:"Time-travel: Ottoman builders installing the heated marble platform beneath Gothic vaults, 1571",t:"Entry €12 for hamam experience. Exterior and courtyard free.",c:["history_big"],r:"g",nn:"Μπουγιούκ Χαμάμ — Τειχισμένη Πόλη",ns:"Ένα λειτουργικό οθωμανικό χαμάμ σε εκκλησία του 14ου αιώνα",nst:"Γοτθικές καμάρες πάνω από μαρμάρινες πλατφόρμες μπάνιου.",nt:"Είσοδος 12 € για χαμάμ. Εξωτερικό δωρεάν."},
  {id:23,n:"Cyprus Museum — Strovolos",a:"Strovolos",v:["history","architecture","local"],d:20,s:"Cyprus\'s national museum — the finest collection of Cypriot antiquities anywhere",st:"The Cyprus Museum was founded in 1882 and holds the finest collection of Cypriot antiquities. The neoclassical building and courtyard are impressive. The Aphrodite of Soloi and Bronze Age collections are extraordinary.",im:"Time-travel: British archaeologists excavating Bronze Age tombs and bringing everything here, 1890",t:"Entry €4.50. Courtyard/exterior free.",c:["free_museum"],r:"g",nn:"Μουσείο Κύπρου — Στρόβολος",ns:"Το εθνικό μουσείο με την πιο σπουδαία συλλογή κυπριακών αρχαιοτήτων",nst:"Το Μουσείο Κύπρου ιδρύθηκε το 1882.",nt:"Είσοδος 4,50 €. Εξωτερικό δωρεάν."},
  {id:24,n:"Pafos Gate Moat Garden — Pafos Gate",a:"Pafos Gate",v:["nature","hidden","local"],d:20,s:"The restored Venetian moat below the Paphos Gate — now a wild garden with cats and historians",st:"The dry moat of the Venetian walls around the Pafos Gate has been partially restored as a garden path. Walk it at dusk. The scale of the fortification engineering becomes clear at ground level.",im:"Time-travel: the moat as a first line of defence against the Ottoman fleet, 1570",t:"Free. Access from the road below the Pafos Gate walls.",c:["history_big"],r:"g",nn:"Κήπος Τάφρου Πάφου — Πύλη Πάφου",ns:"Η αποκατεστημένη ενετική τάφρος — τώρα ένας κήπος",nst:"Η ξηρά τάφρος γύρω από την Πύλη Πάφου έχει αποκατασταθεί.",nt:"Δωρεάν."},
  {id:25,n:"Agia Napa Forest Walk — Athalassa",a:"Athalassa",v:["nature","quiet","hidden"],d:50,s:"A pine forest 20 minutes from the city — silence, birds, and monastery ruins",st:"The Athalassa forest contains mature pine plantations, a small reservoir, and the ruins of the Agia Napa monastery chapel. Walking trails loop through the forest. An extraordinary urban escape.",im:"Time-travel: foresters planting these pines on barren rock in the first reforestation scheme, 1950",t:"Free. Open daily. Follow footpath signs from Athalassa park.",c:["parks"],r:"g",nn:"Δάσος Αγίας Νάπας — Αθαλάσσα",ns:"Ένα πευκόδασος 20 λεπτά από την πόλη — σιωπή, πουλιά, μοναστηριακά ερείπια",nst:"Το δάσος Αθαλάσσας περιέχει ώριμες φυτείες πεύκων και ερείπια μοναστηριού.",nt:"Δωρεάν. Ανοιχτό καθημερινά."},
  {id:26,n:"Venetian Walls Walk — Walled City #26",a:"Walled City",v:["history","beautiful","local"],d:45,s:"Walk the complete circuit of the 16th-century Venetian walls — the best-preserved in the world",st:"The Venetian walls of Nicosia were built 1567–1570, a perfectly circular fortification with 11 heart-shaped bastions. You can walk the entire 4.5 km circuit on top of the walls for free. The divided city is visible from every point.",im:"Time-travel: Venetian engineers demolishing medieval churches to build new walls in time, 1567",t:"Free always. Enter from any of the 3 gates. Full circuit takes 45 minutes.",c:["history_big"],r:"g",nn:"Ενετικά Τείχη — Τειχισμένη Πόλη #26",ns:"Περίπατος στα βενετικά τείχη του 16ου αιώνα",nst:"Τα βενετικά τείχη χτίστηκαν το 1567–1570, ένα τέλεια κυκλικό οχυρό.",nt:"Πάντα δωρεάν. Είσοδος από οποιαδήποτε από τις 3 πύλες."},
  {id:27,n:"Büyük Han Great Inn — Walled City #27",a:"Walled City",v:["history","architecture","hidden"],d:12,s:"The finest Ottoman caravanserai in Cyprus — a working cultural centre inside a 1572 inn",st:"The Great Inn was built in 1572 by the Ottomans as a caravanserai for merchants. Today the courtyard houses craft workshops and a café. The architecture — 68 rooms around an octagonal fountain — is extraordinary.",im:"Time-travel: caravans arriving at dusk, merchants unloading spices and silk in this courtyard, 1590",t:"Free to enter the courtyard. Open daily.",c:["high_spots"],r:"g",nn:"Μπουγιούκ Χαν — Τειχισμένη Πόλη #27",ns:"Το πιο εντυπωσιακό οθωμανικό καραβανσεράι στην Κύπρο",nst:"Χτίστηκε το 1572 από τους Οθωμανούς ως καραβανσεράι για εμπόρους.",nt:"Ελεύθερη είσοδος στην αυλή. Ανοιχτό καθημερινά."},
  {id:28,n:"Ledra Street Crossing — Nicosia Buffer Zone #28",a:"Nicosia Buffer Zone",v:["history","weird","local"],d:6,s:"Walk through the crossing point between Greek and Turkish Cyprus — divided city, united street",st:"The Ledra Street crossing opened in 2008. With a valid passport you can walk between the two sides in seconds. The UN buffer zone — the Green Line — runs through the heart of Nicosia past abandoned houses.",im:"Time-travel: the barricades going up on this street in 1974, neighbours suddenly separated by sandbags",t:"Free with passport. Open daily. You can cross and return.",c:["parks"],r:"g",nn:"Πέρασμα Οδού Λήδρας — Νεκρή Ζώνη #28",ns:"Διέλθετε από το σύνορο μεταξύ ελληνικής και τουρκικής Κύπρου",nst:"Το πέρασμα Λήδρας άνοιξε το 2008.",nt:"Δωρεάν με διαβατήριο. Ανοιχτό καθημερινά."},
  {id:29,n:"Buffer Zone Ghost Buildings — Nicosia Buffer Zone #29",a:"Nicosia Buffer Zone",v:["abandoned","weird","history"],d:52,s:"Look into the UN buffer zone from rooftops — a ghost street frozen since 1974",st:"Several buildings along the buffer zone offer views into no-man\'s-land. The Shacolas Tower Observatory gives the clearest view of both sides and the abandoned ground floor buildings below.",im:"Time-travel: these streets full of shoppers and café tables, the day before the division, July 1974",t:"Shacolas Observatory: small fee (€2). Street views free from rooftop cafés.",c:["courtyards"],r:"g",nn:"Εγκαταλελειμμένα Κτήρια — Νεκρά Ζώνη #29",ns:"Κοιτάξτε μέσα στη νεκρή ζώνη — μια φαντασματική οδός παγωμένη από το 1974",nst:"Κτήρια κατά μήκος της νεκρής ζώνης προσφέρουν θέα στη no-man\'s-land.",nt:"Παρατηρητήριο: μικρό τέλος (2 €). Δρόμος δωρεάν."},
  {id:30,n:"Laiki Yitonia Quarter — Laiki Yitonia #30",a:"Laiki Yitonia",v:["local","architecture","beautiful"],d:22,s:"The restored traditional quarter inside the Famagusta Gate — craft shops, old houses, cats",st:"Laiki Yitonia (the popular neighbourhood) was restored in the 1980s as a pedestrian quarter with Ottoman and colonial-era houses. It is walkable, full of Cypriot craft shops, and free.",im:"Time-travel: this quarter as a working-class neighbourhood of craftsmen and market traders, 1900",t:"Free to walk. Shops open Mon–Sat.",c:["romantic_water"],r:"g",nn:"Λαϊκή Γειτονιά — Λαϊκή Γειτονιά #30",ns:"Η αποκατεστημένη παραδοσιακή συνοικία",nst:"Η Λαϊκή Γειτονιά αποκαταστάθηκε τη δεκαετία του 1980.",nt:"Δωρεάν περπάτημα. Καταστήματα Δε–Σα."},
  {id:31,n:"Famagusta Gate — Walled City #31",a:"Walled City",v:["history","architecture","beautiful"],d:20,s:"The most imposing of the three Venetian city gates — a perfect arched tunnel through 10 metres of wall",st:"The Famagusta Gate was built in 1567 as the main eastern entrance to the city. The vaulted passage is 10 metres long. The interior chamber is used for exhibitions and concerts.",im:"Time-travel: Venetian soldiers guarding this gate against Ottoman advance, 1570",t:"Free. Interior open when exhibitions run.",c:["scary"],r:"g",nn:"Πύλη Αμμοχώστου — Τειχισμένη Πόλη #31",ns:"Η πιο επιβλητική από τις τρεις βενετικές πύλες",nst:"Η Πύλη Αμμοχώστου χτίστηκε το 1567.",nt:"Δωρεάν. Εσωτερικό ανοιχτό κατά εκθέσεις."},
  {id:32,n:"Athalassa National Forest Park — Athalassa #32",a:"Athalassa",v:["nature","local","quiet"],d:19,s:"A 1400-hectare forest park inside the city — lakes, flamingos, cycling tracks, and silence",st:"Athalassa is one of Europe\'s largest urban forest parks. Two lakes attract flamingos and migrating birds. Cycling trails circle the lakes. Almost no tourists visit. Locals jog and picnic here year-round.",im:"Time-travel: this area as dry scrubland before one million trees were planted here, 1960",t:"Free. Open daily. Bus from Nicosia centre (40 min).",c:["famous_dead"],r:"g",nn:"Δασικό Πάρκο Αθαλάσσας — Αθαλάσσα #32",ns:"Ένα πάρκο 1400 εκταρίων εντός της πόλης — λίμνες, φλαμίνγκο, ποδηλατοδρόμοι",nst:"Η Αθαλάσσα είναι ένα από τα μεγαλύτερα αστικά δάση της Ευρώπης.",nt:"Δωρεάν. Ανοιχτό καθημερινά."},
  {id:33,n:"Agios Ioannis Cathedral — Walled City #33",a:"Walled City",v:["history","architecture","beautiful"],d:13,s:"Nicosia\'s oldest standing church — Byzantine frescoes covering every wall and ceiling",st:"The Cathedral of Agios Ioannis was built in 1662. Inside, 18th-century frescoes cover every surface: the Last Judgement, the Apocalypse, and the history of Cyprus.",im:"Time-travel: the archbishop commissioning these frescoes to rival the Ottoman mosques, 1720",t:"Free. Open Mon–Fri morning, closed midday.",c:["street_art"],r:"g",nn:"Καθεδρικός Ναός Αγίου Ιωάννη — Τειχισμένη Πόλη #33",ns:"Η παλαιότερη εκκλησία της Λευκωσίας — βυζαντινές τοιχογραφίες",nst:"Ο Καθεδρικός Ναός Αγίου Ιωάννη κτίστηκε το 1662.",nt:"Δωρεάν. Δε–Πα πρωί, κλειστό μεσημέρι."},
  {id:34,n:"Cyprus Handicraft Centre — Engomi #34",a:"Engomi",v:["local","art","history"],d:52,s:"Government craft workshops teaching traditional Cypriot lace-making, weaving and pottery",st:"The Cyprus Handicraft Centre preserves traditional techniques under threat of extinction. Artisans work in open workshops: lefkaritika lace-making, silverwork, and basket weaving. Free to watch and browse.",im:"Time-travel: Cypriot women teaching daughters lace patterns that go back to Byzantine times, 1850",t:"Free. Open Mon–Fri during working hours.",c:["abandoned"],r:"g",nn:"Κυπριακές Χειροτεχνίες — Ενγκόμι #34",ns:"Κυβερνητικά εργαστήρια που διδάσκουν παραδοσιακή κυπριακή δαντέλα",nst:"Το Κέντρο Κυπριακών Χειροτεχνιών διατηρεί παραδοσιακές τεχνικές.",nt:"Δωρεάν. Δε–Πα κατά τις εργάσιμες ώρες."},
  {id:35,n:"Municipal Garden — Larnaca Road #35",a:"Larnaca Road",v:["local","nature","quiet"],d:11,s:"The city\'s oldest park with a small zoo, outdoor theatre, and afternoon chess players",st:"The Municipal Garden was laid out in 1940. A small zoo with deer and peacocks entertains children. Old men play tavli (backgammon) every afternoon.",im:"Time-travel: British colonial officers picnicking here while the old city baked in the heat, 1940",t:"Free. Open daily. Zoo free.",c:["free_museum"],r:"g",nn:"Δημοτικός Κήπος — Οδός Λάρνακας #35",ns:"Το παλαιότερο πάρκο της πόλης με μικρό ζωολογικό κήπο",nst:"Ο Δημοτικός Κήπος χαράχθηκε το 1940.",nt:"Δωρεάν. Ανοιχτό καθημερινά."},
  {id:36,n:"Dervis Pasha Mansion — Pafos Gate #36",a:"Pafos Gate",v:["history","architecture","hidden"],d:48,s:"The only surviving Ottoman mansion in the old city — a glimpse into pre-1974 mixed Nicosia",st:"The Dervis Pasha mansion is a two-storey Ottoman house from the 18th century, now a museum. The collection shows how Greek and Turkish Cypriot domestic life was intertwined before partition.",im:"Time-travel: the Ottoman editor Dervis Pasha writing his newspaper in this courtyard, 1800",t:"Small entry fee (€3). Open Tue–Fri.",c:["local_only"],r:"g",nn:"Έπαυλη Ντερβίς Πασά — Πύλη Πάφου #36",ns:"Η μοναδική σωζόμενη οθωμανική έπαυλη στην παλιά πόλη",nst:"Η έπαυλη Ντερβίς Πασά είναι ένα διώροφο οθωμανικό σπίτι από τον 18ο αιώνα.",nt:"Μικρό τέλος (3 €). Ανοιχτό Τρ–Πα."},
  {id:37,n:"Faneromeni Church Square — Walled City #37",a:"Walled City",v:["local","history","beautiful"],d:52,s:"The main square of the Greek Cypriot quarter — shaded, with a church, market and social life",st:"Faneromeni Square is the heart of the walled city for local Greeks. The neoclassical church, completed in 1886, faces a bustling morning market. Elderly couples sit in the shade throughout the afternoon.",im:"Time-travel: this square as the centre of Cypriot Greek life before independence, 1950",t:"Free always. Market in mornings, Mon–Sat.",c:["architecture"],r:"g",nn:"Πλατεία Φανερωμένης — Τειχισμένη Πόλη #37",ns:"Η κεντρική πλατεία της ελληνοκυπριακής συνοικίας",nst:"Η πλατεία Φανερωμένης είναι η καρδιά της τειχισμένης πόλης.",nt:"Πάντα δωρεάν."},
  {id:38,n:"Strovolos Saturday Market — Strovolos #38",a:"Strovolos",v:["local","free","hidden"],d:39,s:"The sprawling suburban market where Nicosia residents actually shop — fruit, fish and noise",st:"The Strovolos Saturday market is where Nicosia families do their weekly shopping: piles of halloumi, fresh coriander, preserved olives, and citrus from the Mesaoria plain. Few tourists ever find it.",im:"Time-travel: the village of Strovolos as a separate community before the city reached it, 1950",t:"Free. Saturdays only. Bus from centre (20 min).",c:["history_big"],r:"g",nn:"Λαϊκή Αγορά Στροβόλου — Στρόβολος #38",ns:"Η εκτεταμένη λαϊκή αγορά — φρούτα, ψάρι και θόρυβος",nst:"Η λαϊκή Στροβόλου είναι εκεί που οι οικογένειες κάνουν τις εβδομαδιαίες αγορές.",nt:"Δωρεάν. Μόνο Σάββατα."},
  {id:39,n:"Selimiye Mosque (Aya Sofya) — Walled City #39",a:"Walled City",v:["history","architecture","beautiful"],d:10,s:"A Gothic cathedral converted to a mosque — Gothic arches and Ottoman minarets in one building",st:"The Cathedral of Saint Sophia was built 1209–1326 in French Gothic style. After the Ottoman conquest of 1571, minarets were added and it became the Selimiye Mosque. Both architectural eras are visible simultaneously.",im:"Time-travel: the Ottoman commander ordering the Christian images covered inside this cathedral, 1571",t:"Free to visit when not in prayer. Remove shoes. Cross via Ledra crossing.",c:["high_spots"],r:"g",nn:"Τζαμί Σελιμιγιέ — Τειχισμένη Πόλη #39",ns:"Γοτθικός καθεδρικός ναός μετατραπείς σε τζαμί",nst:"Κτίστηκε 1209–1326 σε γαλλικό γοτθικό ρυθμό. Μετατράπηκε σε τζαμί το 1571.",nt:"Δωρεάν εκτός ώρας προσευχής. Βγάλτε παπούτσια."},
  {id:40,n:"Chrysaliniotissa Arts Quarter — Walled City #40",a:"Walled City",v:["local","art","hidden"],d:42,s:"The oldest neighbourhood in the walled city — craftsmen, artists, and the oldest church in Nicosia",st:"Chrysaliniotissa is a semi-restored quarter of traditional houses, workshops, and the 15th-century Chrysaliniotissa Church. Artists have colonised the old houses. The neighbourhood feels transitional — not yet gentrified.",im:"Time-travel: this as the workshop district for generations of Nicosia craftsmen, 1900",t:"Free always.",c:["parks"],r:"g",nn:"Χρυσαλινιώτισσα — Τειχισμένη Πόλη #40",ns:"Η παλαιότερη γειτονιά — τεχνίτες, καλλιτέχνες, η παλαιότερη εκκλησία",nst:"Η Χρυσαλινιώτισσα είναι μια ημι-αποκατεστημένη συνοικία.",nt:"Πάντα δωρεάν."},
  {id:41,n:"Bandabulya Market Hall — Walled City #41",a:"Walled City",v:["local","history","architecture"],d:32,s:"The Ottoman covered market — halloumi sellers, coffee traders, and high vaulted arches",st:"The Bandabulya is an Ottoman-era covered market hall. It is more atmospheric than busy — a few cheese and meat vendors, a coffee stall, and the high vaulted arches of the original building.",im:"Time-travel: the market full of traders selling Syrian silk, Egyptian cotton, and Cypriot carob, 1800",t:"Free. Open Mon–Sat mornings.",c:["courtyards"],r:"g",nn:"Μπαντάμπουλια — Τειχισμένη Πόλη #41",ns:"Η οθωμανική στεγασμένη αγορά",nst:"Το Μπαντάμπουλια είναι μια οθωμανική στεγασμένη αγορά.",nt:"Δωρεάν. Δε–Σα πρωί."},
  {id:42,n:"Phaneromeni Library — Walled City #42",a:"Walled City",v:["hidden","architecture","quiet"],d:7,s:"The oldest public library in Cyprus — still operating in its original 1893 building",st:"The Phaneromeni Library was established in 1893 and still operates from its original neoclassical building. An extraordinary survival: card catalogues, old Greek periodicals, and absolute silence.",im:"Time-travel: the library opening to an excited literate population, the first public books in Nicosia, 1893",t:"Free. Open Mon–Fri.",c:["romantic_water"],r:"g",nn:"Βιβλιοθήκη Φανερωμένης — Τειχισμένη Πόλη #42",ns:"Η παλαιότερη δημόσια βιβλιοθήκη της Κύπρου",nst:"Η Βιβλιοθήκη Φανερωμένης ιδρύθηκε το 1893.",nt:"Δωρεάν. Δε–Πα."},
  {id:43,n:"Pafos Gate Bastion — Pafos Gate #43",a:"Pafos Gate",v:["history","architecture","local"],d:6,s:"The western gate of the Venetian walls where the buffer zone meets the city",st:"The Pafos Gate area is where the UN Buffer Zone reaches the western wall. The gate itself is a massive Venetian arch. The neighbourhood is a hybrid — some restored, some abandoned, very few tourists.",im:"Time-travel: the city council debating development beyond this gate as the city modernised, 1950",t:"Free. Walk the bastion walls for a close look at both sides of the city.",c:["scary"],r:"g",nn:"Πύλη Πάφου — Πύλη Πάφου #43",ns:"Η δυτική πύλη όπου η νεκρή ζώνη συναντά την πόλη",nst:"Η Πύλη Πάφου βρίσκεται εκεί που η Νεκρά Ζώνη φτάνει στο δυτικό τείχος.",nt:"Δωρεάν. Περπατήστε τα τείχη."},
  {id:44,n:"Agios Antonios Arts District — Larnaca Road #44",a:"Larnaca Road",v:["local","art","hidden"],d:10,s:"Nicosia\'s small arts district — independent galleries, coffee bars, and young Cypriot designers",st:"The Agios Antonios area outside the walls has become Nicosia\'s creative neighbourhood. Small independent galleries, design studios, and the best coffee in the city. It feels like a Mediterranean Prenzlauer Berg.",im:"Time-travel: this as an unremarkable suburb before young Nicosians started opening studios here, 2010",t:"Free to walk. Galleries open afternoons. Best Thur–Sat evenings.",c:["famous_dead"],r:"g",nn:"Περιοχή Αγίου Αντωνίου — Οδός Λάρνακας #44",ns:"Η μικρή καλλιτεχνική συνοικία της Λευκωσίας",nst:"Η περιοχή Αγίου Αντωνίου έχει γίνει η δημιουργική γειτονιά.",nt:"Δωρεάν. Γκαλερί απογεύματα. Καλύτερα Πεμ–Σα."},
  {id:45,n:"Athalassa Lake Flamingos — Athalassa #45",a:"Athalassa",v:["nature","local","hidden"],d:18,s:"Winter flamingos on a lake inside the city — one of Cyprus\'s best bird-watching spots",st:"The smaller lake at Athalassa is a flamingo stop-over on the East African–West Asian flyway. From October to March, hundreds of flamingos feed here. An extraordinary sight 10 minutes from the city centre.",im:"Time-travel: the flamingos arriving on this lake centuries before the city existed, as they always have",t:"Free. Open daily. Best October–March, early morning.",c:["street_art"],r:"g",nn:"Φλαμίνγκο Λίμνης Αθαλάσσας — Αθαλάσσα #45",ns:"Χειμερινά φλαμίνγκο στη λίμνη εντός της πόλης",nst:"Η μικρή λίμνη στην Αθαλάσσα είναι σταθμός φλαμίνγκο.",nt:"Δωρεάν. Καλύτερα Οκτ–Μαρ, πρωί."},
  {id:46,n:"Eleftheria Square — Walled City #46",a:"Walled City",v:["architecture","beautiful","local"],d:19,s:"Nicosia\'s new civic gateway — Zaha Hadid\'s bridge sculptures spanning the Venetian moat",st:"Eleftheria Square was redesigned by Zaha Hadid (completed 2021). The white bridge-sculptures span the old Venetian moat and connect the modern city to the walls. Free to walk day or night.",im:"Time-travel: the old Venetian moat used as a bus terminal for 50 years before this redesign, 1970",t:"Free always.",c:["abandoned"],r:"g",nn:"Πλατεία Ελευθερίας — Τειχισμένη Πόλη #46",ns:"Η νέα αστική πύλη — γέφυρες-γλυπτά της Ζάχα Χαντίντ πάνω από την τάφρο",nst:"Η Πλατεία Ελευθερίας ανασχεδιάστηκε από τη Ζάχα Χαντίντ το 2021.",nt:"Πάντα δωρεάν."},
  {id:47,n:"Buyuk Hamam Ottoman Bath — Walled City #47",a:"Walled City",v:["history","architecture","weird"],d:37,s:"A working Ottoman bathhouse in a 14th-century Lusignan church — you can bathe for €12",st:"The Great Hamam was built inside the 14th-century Church of St George of the Latins after the Ottoman conquest. Cross-ribbed Gothic vaults rise above marble bathing platforms. Still operating as a hamam.",im:"Time-travel: Ottoman builders installing the heated marble platform beneath Gothic vaults, 1571",t:"Entry €12 for hamam experience. Exterior and courtyard free.",c:["free_museum"],r:"g",nn:"Μπουγιούκ Χαμάμ — Τειχισμένη Πόλη #47",ns:"Ένα λειτουργικό οθωμανικό χαμάμ σε εκκλησία του 14ου αιώνα",nst:"Γοτθικές καμάρες πάνω από μαρμάρινες πλατφόρμες μπάνιου.",nt:"Είσοδος 12 € για χαμάμ. Εξωτερικό δωρεάν."},
  {id:48,n:"Cyprus Museum — Strovolos #48",a:"Strovolos",v:["history","architecture","local"],d:43,s:"Cyprus\'s national museum — the finest collection of Cypriot antiquities anywhere",st:"The Cyprus Museum was founded in 1882 and holds the finest collection of Cypriot antiquities. The neoclassical building and courtyard are impressive. The Aphrodite of Soloi and Bronze Age collections are extraordinary.",im:"Time-travel: British archaeologists excavating Bronze Age tombs and bringing everything here, 1890",t:"Entry €4.50. Courtyard/exterior free.",c:["local_only"],r:"g",nn:"Μουσείο Κύπρου — Στρόβολος #48",ns:"Το εθνικό μουσείο με την πιο σπουδαία συλλογή κυπριακών αρχαιοτήτων",nst:"Το Μουσείο Κύπρου ιδρύθηκε το 1882.",nt:"Είσοδος 4,50 €. Εξωτερικό δωρεάν."},
  {id:49,n:"Pafos Gate Moat Garden — Pafos Gate #49",a:"Pafos Gate",v:["nature","hidden","local"],d:6,s:"The restored Venetian moat below the Paphos Gate — now a wild garden with cats and historians",st:"The dry moat of the Venetian walls around the Pafos Gate has been partially restored as a garden path. Walk it at dusk. The scale of the fortification engineering becomes clear at ground level.",im:"Time-travel: the moat as a first line of defence against the Ottoman fleet, 1570",t:"Free. Access from the road below the Pafos Gate walls.",c:["architecture"],r:"g",nn:"Κήπος Τάφρου Πάφου — Πύλη Πάφου #49",ns:"Η αποκατεστημένη ενετική τάφρος — τώρα ένας κήπος",nst:"Η ξηρά τάφρος γύρω από την Πύλη Πάφου έχει αποκατασταθεί.",nt:"Δωρεάν."},
  {id:50,n:"Agia Napa Forest Walk — Athalassa #50",a:"Athalassa",v:["nature","quiet","hidden"],d:40,s:"A pine forest 20 minutes from the city — silence, birds, and monastery ruins",st:"The Athalassa forest contains mature pine plantations, a small reservoir, and the ruins of the Agia Napa monastery chapel. Walking trails loop through the forest. An extraordinary urban escape.",im:"Time-travel: foresters planting these pines on barren rock in the first reforestation scheme, 1950",t:"Free. Open daily. Follow footpath signs from Athalassa park.",c:["history_big"],r:"g",nn:"Δάσος Αγίας Νάπας — Αθαλάσσα #50",ns:"Ένα πευκόδασος 20 λεπτά από την πόλη — σιωπή, πουλιά, μοναστηριακά ερείπια",nst:"Το δάσος Αθαλάσσας περιέχει ώριμες φυτείες πεύκων και ερείπια μοναστηριού.",nt:"Δωρεάν. Ανοιχτό καθημερινά."},
  {id:51,n:"Venetian Walls Walk — Walled City #51",a:"Walled City",v:["history","beautiful","local"],d:17,s:"Walk the complete circuit of the 16th-century Venetian walls — the best-preserved in the world",st:"The Venetian walls of Nicosia were built 1567–1570, a perfectly circular fortification with 11 heart-shaped bastions. You can walk the entire 4.5 km circuit on top of the walls for free. The divided city is visible from every point.",im:"Time-travel: Venetian engineers demolishing medieval churches to build new walls in time, 1567",t:"Free always. Enter from any of the 3 gates. Full circuit takes 45 minutes.",c:["high_spots"],r:"g",nn:"Ενετικά Τείχη — Τειχισμένη Πόλη #51",ns:"Περίπατος στα βενετικά τείχη του 16ου αιώνα",nst:"Τα βενετικά τείχη χτίστηκαν το 1567–1570, ένα τέλεια κυκλικό οχυρό.",nt:"Πάντα δωρεάν. Είσοδος από οποιαδήποτε από τις 3 πύλες."},
  {id:52,n:"Büyük Han Great Inn — Walled City #52",a:"Walled City",v:["history","architecture","hidden"],d:50,s:"The finest Ottoman caravanserai in Cyprus — a working cultural centre inside a 1572 inn",st:"The Great Inn was built in 1572 by the Ottomans as a caravanserai for merchants. Today the courtyard houses craft workshops and a café. The architecture — 68 rooms around an octagonal fountain — is extraordinary.",im:"Time-travel: caravans arriving at dusk, merchants unloading spices and silk in this courtyard, 1590",t:"Free to enter the courtyard. Open daily.",c:["parks"],r:"g",nn:"Μπουγιούκ Χαν — Τειχισμένη Πόλη #52",ns:"Το πιο εντυπωσιακό οθωμανικό καραβανσεράι στην Κύπρο",nst:"Χτίστηκε το 1572 από τους Οθωμανούς ως καραβανσεράι για εμπόρους.",nt:"Ελεύθερη είσοδος στην αυλή. Ανοιχτό καθημερινά."},
  {id:53,n:"Ledra Street Crossing — Nicosia Buffer Zone #53",a:"Nicosia Buffer Zone",v:["history","weird","local"],d:46,s:"Walk through the crossing point between Greek and Turkish Cyprus — divided city, united street",st:"The Ledra Street crossing opened in 2008. With a valid passport you can walk between the two sides in seconds. The UN buffer zone — the Green Line — runs through the heart of Nicosia past abandoned houses.",im:"Time-travel: the barricades going up on this street in 1974, neighbours suddenly separated by sandbags",t:"Free with passport. Open daily. You can cross and return.",c:["courtyards"],r:"g",nn:"Πέρασμα Οδού Λήδρας — Νεκρή Ζώνη #53",ns:"Διέλθετε από το σύνορο μεταξύ ελληνικής και τουρκικής Κύπρου",nst:"Το πέρασμα Λήδρας άνοιξε το 2008.",nt:"Δωρεάν με διαβατήριο. Ανοιχτό καθημερινά."},
  {id:54,n:"Buffer Zone Ghost Buildings — Nicosia Buffer Zone #54",a:"Nicosia Buffer Zone",v:["abandoned","weird","history"],d:49,s:"Look into the UN buffer zone from rooftops — a ghost street frozen since 1974",st:"Several buildings along the buffer zone offer views into no-man\'s-land. The Shacolas Tower Observatory gives the clearest view of both sides and the abandoned ground floor buildings below.",im:"Time-travel: these streets full of shoppers and café tables, the day before the division, July 1974",t:"Shacolas Observatory: small fee (€2). Street views free from rooftop cafés.",c:["romantic_water"],r:"g",nn:"Εγκαταλελειμμένα Κτήρια — Νεκρά Ζώνη #54",ns:"Κοιτάξτε μέσα στη νεκρή ζώνη — μια φαντασματική οδός παγωμένη από το 1974",nst:"Κτήρια κατά μήκος της νεκρής ζώνης προσφέρουν θέα στη no-man\'s-land.",nt:"Παρατηρητήριο: μικρό τέλος (2 €). Δρόμος δωρεάν."},
  {id:55,n:"Laiki Yitonia Quarter — Laiki Yitonia #55",a:"Laiki Yitonia",v:["local","architecture","beautiful"],d:39,s:"The restored traditional quarter inside the Famagusta Gate — craft shops, old houses, cats",st:"Laiki Yitonia (the popular neighbourhood) was restored in the 1980s as a pedestrian quarter with Ottoman and colonial-era houses. It is walkable, full of Cypriot craft shops, and free.",im:"Time-travel: this quarter as a working-class neighbourhood of craftsmen and market traders, 1900",t:"Free to walk. Shops open Mon–Sat.",c:["scary"],r:"g",nn:"Λαϊκή Γειτονιά — Λαϊκή Γειτονιά #55",ns:"Η αποκατεστημένη παραδοσιακή συνοικία",nst:"Η Λαϊκή Γειτονιά αποκαταστάθηκε τη δεκαετία του 1980.",nt:"Δωρεάν περπάτημα. Καταστήματα Δε–Σα."},
  {id:56,n:"Famagusta Gate — Walled City #56",a:"Walled City",v:["history","architecture","beautiful"],d:31,s:"The most imposing of the three Venetian city gates — a perfect arched tunnel through 10 metres of wall",st:"The Famagusta Gate was built in 1567 as the main eastern entrance to the city. The vaulted passage is 10 metres long. The interior chamber is used for exhibitions and concerts.",im:"Time-travel: Venetian soldiers guarding this gate against Ottoman advance, 1570",t:"Free. Interior open when exhibitions run.",c:["famous_dead"],r:"g",nn:"Πύλη Αμμοχώστου — Τειχισμένη Πόλη #56",ns:"Η πιο επιβλητική από τις τρεις βενετικές πύλες",nst:"Η Πύλη Αμμοχώστου χτίστηκε το 1567.",nt:"Δωρεάν. Εσωτερικό ανοιχτό κατά εκθέσεις."},
  {id:57,n:"Athalassa National Forest Park — Athalassa #57",a:"Athalassa",v:["nature","local","quiet"],d:19,s:"A 1400-hectare forest park inside the city — lakes, flamingos, cycling tracks, and silence",st:"Athalassa is one of Europe\'s largest urban forest parks. Two lakes attract flamingos and migrating birds. Cycling trails circle the lakes. Almost no tourists visit. Locals jog and picnic here year-round.",im:"Time-travel: this area as dry scrubland before one million trees were planted here, 1960",t:"Free. Open daily. Bus from Nicosia centre (40 min).",c:["street_art"],r:"g",nn:"Δασικό Πάρκο Αθαλάσσας — Αθαλάσσα #57",ns:"Ένα πάρκο 1400 εκταρίων εντός της πόλης — λίμνες, φλαμίνγκο, ποδηλατοδρόμοι",nst:"Η Αθαλάσσα είναι ένα από τα μεγαλύτερα αστικά δάση της Ευρώπης.",nt:"Δωρεάν. Ανοιχτό καθημερινά."},
  {id:58,n:"Agios Ioannis Cathedral — Walled City #58",a:"Walled City",v:["history","architecture","beautiful"],d:33,s:"Nicosia\'s oldest standing church — Byzantine frescoes covering every wall and ceiling",st:"The Cathedral of Agios Ioannis was built in 1662. Inside, 18th-century frescoes cover every surface: the Last Judgement, the Apocalypse, and the history of Cyprus.",im:"Time-travel: the archbishop commissioning these frescoes to rival the Ottoman mosques, 1720",t:"Free. Open Mon–Fri morning, closed midday.",c:["abandoned"],r:"g",nn:"Καθεδρικός Ναός Αγίου Ιωάννη — Τειχισμένη Πόλη #58",ns:"Η παλαιότερη εκκλησία της Λευκωσίας — βυζαντινές τοιχογραφίες",nst:"Ο Καθεδρικός Ναός Αγίου Ιωάννη κτίστηκε το 1662.",nt:"Δωρεάν. Δε–Πα πρωί, κλειστό μεσημέρι."},
  {id:59,n:"Cyprus Handicraft Centre — Engomi #59",a:"Engomi",v:["local","art","history"],d:42,s:"Government craft workshops teaching traditional Cypriot lace-making, weaving and pottery",st:"The Cyprus Handicraft Centre preserves traditional techniques under threat of extinction. Artisans work in open workshops: lefkaritika lace-making, silverwork, and basket weaving. Free to watch and browse.",im:"Time-travel: Cypriot women teaching daughters lace patterns that go back to Byzantine times, 1850",t:"Free. Open Mon–Fri during working hours.",c:["free_museum"],r:"g",nn:"Κυπριακές Χειροτεχνίες — Ενγκόμι #59",ns:"Κυβερνητικά εργαστήρια που διδάσκουν παραδοσιακή κυπριακή δαντέλα",nst:"Το Κέντρο Κυπριακών Χειροτεχνιών διατηρεί παραδοσιακές τεχνικές.",nt:"Δωρεάν. Δε–Πα κατά τις εργάσιμες ώρες."},
  {id:60,n:"Municipal Garden — Larnaca Road #60",a:"Larnaca Road",v:["local","nature","quiet"],d:22,s:"The city\'s oldest park with a small zoo, outdoor theatre, and afternoon chess players",st:"The Municipal Garden was laid out in 1940. A small zoo with deer and peacocks entertains children. Old men play tavli (backgammon) every afternoon.",im:"Time-travel: British colonial officers picnicking here while the old city baked in the heat, 1940",t:"Free. Open daily. Zoo free.",c:["local_only"],r:"g",nn:"Δημοτικός Κήπος — Οδός Λάρνακας #60",ns:"Το παλαιότερο πάρκο της πόλης με μικρό ζωολογικό κήπο",nst:"Ο Δημοτικός Κήπος χαράχθηκε το 1940.",nt:"Δωρεάν. Ανοιχτό καθημερινά."},
  {id:61,n:"Dervis Pasha Mansion — Pafos Gate #61",a:"Pafos Gate",v:["history","architecture","hidden"],d:5,s:"The only surviving Ottoman mansion in the old city — a glimpse into pre-1974 mixed Nicosia",st:"The Dervis Pasha mansion is a two-storey Ottoman house from the 18th century, now a museum. The collection shows how Greek and Turkish Cypriot domestic life was intertwined before partition.",im:"Time-travel: the Ottoman editor Dervis Pasha writing his newspaper in this courtyard, 1800",t:"Small entry fee (€3). Open Tue–Fri.",c:["architecture"],r:"g",nn:"Έπαυλη Ντερβίς Πασά — Πύλη Πάφου #61",ns:"Η μοναδική σωζόμενη οθωμανική έπαυλη στην παλιά πόλη",nst:"Η έπαυλη Ντερβίς Πασά είναι ένα διώροφο οθωμανικό σπίτι από τον 18ο αιώνα.",nt:"Μικρό τέλος (3 €). Ανοιχτό Τρ–Πα."},
  {id:62,n:"Faneromeni Church Square — Walled City #62",a:"Walled City",v:["local","history","beautiful"],d:53,s:"The main square of the Greek Cypriot quarter — shaded, with a church, market and social life",st:"Faneromeni Square is the heart of the walled city for local Greeks. The neoclassical church, completed in 1886, faces a bustling morning market. Elderly couples sit in the shade throughout the afternoon.",im:"Time-travel: this square as the centre of Cypriot Greek life before independence, 1950",t:"Free always. Market in mornings, Mon–Sat.",c:["history_big"],r:"g",nn:"Πλατεία Φανερωμένης — Τειχισμένη Πόλη #62",ns:"Η κεντρική πλατεία της ελληνοκυπριακής συνοικίας",nst:"Η πλατεία Φανερωμένης είναι η καρδιά της τειχισμένης πόλης.",nt:"Πάντα δωρεάν."},
  {id:63,n:"Strovolos Saturday Market — Strovolos #63",a:"Strovolos",v:["local","free","hidden"],d:15,s:"The sprawling suburban market where Nicosia residents actually shop — fruit, fish and noise",st:"The Strovolos Saturday market is where Nicosia families do their weekly shopping: piles of halloumi, fresh coriander, preserved olives, and citrus from the Mesaoria plain. Few tourists ever find it.",im:"Time-travel: the village of Strovolos as a separate community before the city reached it, 1950",t:"Free. Saturdays only. Bus from centre (20 min).",c:["high_spots"],r:"g",nn:"Λαϊκή Αγορά Στροβόλου — Στρόβολος #63",ns:"Η εκτεταμένη λαϊκή αγορά — φρούτα, ψάρι και θόρυβος",nst:"Η λαϊκή Στροβόλου είναι εκεί που οι οικογένειες κάνουν τις εβδομαδιαίες αγορές.",nt:"Δωρεάν. Μόνο Σάββατα."},
  {id:64,n:"Selimiye Mosque (Aya Sofya) — Walled City #64",a:"Walled City",v:["history","architecture","beautiful"],d:49,s:"A Gothic cathedral converted to a mosque — Gothic arches and Ottoman minarets in one building",st:"The Cathedral of Saint Sophia was built 1209–1326 in French Gothic style. After the Ottoman conquest of 1571, minarets were added and it became the Selimiye Mosque. Both architectural eras are visible simultaneously.",im:"Time-travel: the Ottoman commander ordering the Christian images covered inside this cathedral, 1571",t:"Free to visit when not in prayer. Remove shoes. Cross via Ledra crossing.",c:["parks"],r:"g",nn:"Τζαμί Σελιμιγιέ — Τειχισμένη Πόλη #64",ns:"Γοτθικός καθεδρικός ναός μετατραπείς σε τζαμί",nst:"Κτίστηκε 1209–1326 σε γαλλικό γοτθικό ρυθμό. Μετατράπηκε σε τζαμί το 1571.",nt:"Δωρεάν εκτός ώρας προσευχής. Βγάλτε παπούτσια."},
  {id:65,n:"Chrysaliniotissa Arts Quarter — Walled City #65",a:"Walled City",v:["local","art","hidden"],d:32,s:"The oldest neighbourhood in the walled city — craftsmen, artists, and the oldest church in Nicosia",st:"Chrysaliniotissa is a semi-restored quarter of traditional houses, workshops, and the 15th-century Chrysaliniotissa Church. Artists have colonised the old houses. The neighbourhood feels transitional — not yet gentrified.",im:"Time-travel: this as the workshop district for generations of Nicosia craftsmen, 1900",t:"Free always.",c:["courtyards"],r:"g",nn:"Χρυσαλινιώτισσα — Τειχισμένη Πόλη #65",ns:"Η παλαιότερη γειτονιά — τεχνίτες, καλλιτέχνες, η παλαιότερη εκκλησία",nst:"Η Χρυσαλινιώτισσα είναι μια ημι-αποκατεστημένη συνοικία.",nt:"Πάντα δωρεάν."},
  {id:66,n:"Bandabulya Market Hall — Walled City #66",a:"Walled City",v:["local","history","architecture"],d:26,s:"The Ottoman covered market — halloumi sellers, coffee traders, and high vaulted arches",st:"The Bandabulya is an Ottoman-era covered market hall. It is more atmospheric than busy — a few cheese and meat vendors, a coffee stall, and the high vaulted arches of the original building.",im:"Time-travel: the market full of traders selling Syrian silk, Egyptian cotton, and Cypriot carob, 1800",t:"Free. Open Mon–Sat mornings.",c:["romantic_water"],r:"g",nn:"Μπαντάμπουλια — Τειχισμένη Πόλη #66",ns:"Η οθωμανική στεγασμένη αγορά",nst:"Το Μπαντάμπουλια είναι μια οθωμανική στεγασμένη αγορά.",nt:"Δωρεάν. Δε–Σα πρωί."},
  {id:67,n:"Phaneromeni Library — Walled City #67",a:"Walled City",v:["hidden","architecture","quiet"],d:22,s:"The oldest public library in Cyprus — still operating in its original 1893 building",st:"The Phaneromeni Library was established in 1893 and still operates from its original neoclassical building. An extraordinary survival: card catalogues, old Greek periodicals, and absolute silence.",im:"Time-travel: the library opening to an excited literate population, the first public books in Nicosia, 1893",t:"Free. Open Mon–Fri.",c:["scary"],r:"g",nn:"Βιβλιοθήκη Φανερωμένης — Τειχισμένη Πόλη #67",ns:"Η παλαιότερη δημόσια βιβλιοθήκη της Κύπρου",nst:"Η Βιβλιοθήκη Φανερωμένης ιδρύθηκε το 1893.",nt:"Δωρεάν. Δε–Πα."},
  {id:68,n:"Pafos Gate Bastion — Pafos Gate #68",a:"Pafos Gate",v:["history","architecture","local"],d:14,s:"The western gate of the Venetian walls where the buffer zone meets the city",st:"The Pafos Gate area is where the UN Buffer Zone reaches the western wall. The gate itself is a massive Venetian arch. The neighbourhood is a hybrid — some restored, some abandoned, very few tourists.",im:"Time-travel: the city council debating development beyond this gate as the city modernised, 1950",t:"Free. Walk the bastion walls for a close look at both sides of the city.",c:["famous_dead"],r:"g",nn:"Πύλη Πάφου — Πύλη Πάφου #68",ns:"Η δυτική πύλη όπου η νεκρή ζώνη συναντά την πόλη",nst:"Η Πύλη Πάφου βρίσκεται εκεί που η Νεκρά Ζώνη φτάνει στο δυτικό τείχος.",nt:"Δωρεάν. Περπατήστε τα τείχη."},
  {id:69,n:"Agios Antonios Arts District — Larnaca Road #69",a:"Larnaca Road",v:["local","art","hidden"],d:18,s:"Nicosia\'s small arts district — independent galleries, coffee bars, and young Cypriot designers",st:"The Agios Antonios area outside the walls has become Nicosia\'s creative neighbourhood. Small independent galleries, design studios, and the best coffee in the city. It feels like a Mediterranean Prenzlauer Berg.",im:"Time-travel: this as an unremarkable suburb before young Nicosians started opening studios here, 2010",t:"Free to walk. Galleries open afternoons. Best Thur–Sat evenings.",c:["street_art"],r:"g",nn:"Περιοχή Αγίου Αντωνίου — Οδός Λάρνακας #69",ns:"Η μικρή καλλιτεχνική συνοικία της Λευκωσίας",nst:"Η περιοχή Αγίου Αντωνίου έχει γίνει η δημιουργική γειτονιά.",nt:"Δωρεάν. Γκαλερί απογεύματα. Καλύτερα Πεμ–Σα."},
  {id:70,n:"Athalassa Lake Flamingos — Athalassa #70",a:"Athalassa",v:["nature","local","hidden"],d:53,s:"Winter flamingos on a lake inside the city — one of Cyprus\'s best bird-watching spots",st:"The smaller lake at Athalassa is a flamingo stop-over on the East African–West Asian flyway. From October to March, hundreds of flamingos feed here. An extraordinary sight 10 minutes from the city centre.",im:"Time-travel: the flamingos arriving on this lake centuries before the city existed, as they always have",t:"Free. Open daily. Best October–March, early morning.",c:["abandoned"],r:"g",nn:"Φλαμίνγκο Λίμνης Αθαλάσσας — Αθαλάσσα #70",ns:"Χειμερινά φλαμίνγκο στη λίμνη εντός της πόλης",nst:"Η μικρή λίμνη στην Αθαλάσσα είναι σταθμός φλαμίνγκο.",nt:"Δωρεάν. Καλύτερα Οκτ–Μαρ, πρωί."},
  {id:71,n:"Eleftheria Square — Walled City #71",a:"Walled City",v:["architecture","beautiful","local"],d:26,s:"Nicosia\'s new civic gateway — Zaha Hadid\'s bridge sculptures spanning the Venetian moat",st:"Eleftheria Square was redesigned by Zaha Hadid (completed 2021). The white bridge-sculptures span the old Venetian moat and connect the modern city to the walls. Free to walk day or night.",im:"Time-travel: the old Venetian moat used as a bus terminal for 50 years before this redesign, 1970",t:"Free always.",c:["free_museum"],r:"g",nn:"Πλατεία Ελευθερίας — Τειχισμένη Πόλη #71",ns:"Η νέα αστική πύλη — γέφυρες-γλυπτά της Ζάχα Χαντίντ πάνω από την τάφρο",nst:"Η Πλατεία Ελευθερίας ανασχεδιάστηκε από τη Ζάχα Χαντίντ το 2021.",nt:"Πάντα δωρεάν."},
  {id:72,n:"Buyuk Hamam Ottoman Bath — Walled City #72",a:"Walled City",v:["history","architecture","weird"],d:11,s:"A working Ottoman bathhouse in a 14th-century Lusignan church — you can bathe for €12",st:"The Great Hamam was built inside the 14th-century Church of St George of the Latins after the Ottoman conquest. Cross-ribbed Gothic vaults rise above marble bathing platforms. Still operating as a hamam.",im:"Time-travel: Ottoman builders installing the heated marble platform beneath Gothic vaults, 1571",t:"Entry €12 for hamam experience. Exterior and courtyard free.",c:["local_only"],r:"g",nn:"Μπουγιούκ Χαμάμ — Τειχισμένη Πόλη #72",ns:"Ένα λειτουργικό οθωμανικό χαμάμ σε εκκλησία του 14ου αιώνα",nst:"Γοτθικές καμάρες πάνω από μαρμάρινες πλατφόρμες μπάνιου.",nt:"Είσοδος 12 € για χαμάμ. Εξωτερικό δωρεάν."},
  {id:73,n:"Cyprus Museum — Strovolos #73",a:"Strovolos",v:["history","architecture","local"],d:10,s:"Cyprus\'s national museum — the finest collection of Cypriot antiquities anywhere",st:"The Cyprus Museum was founded in 1882 and holds the finest collection of Cypriot antiquities. The neoclassical building and courtyard are impressive. The Aphrodite of Soloi and Bronze Age collections are extraordinary.",im:"Time-travel: British archaeologists excavating Bronze Age tombs and bringing everything here, 1890",t:"Entry €4.50. Courtyard/exterior free.",c:["architecture"],r:"g",nn:"Μουσείο Κύπρου — Στρόβολος #73",ns:"Το εθνικό μουσείο με την πιο σπουδαία συλλογή κυπριακών αρχαιοτήτων",nst:"Το Μουσείο Κύπρου ιδρύθηκε το 1882.",nt:"Είσοδος 4,50 €. Εξωτερικό δωρεάν."},
  {id:74,n:"Pafos Gate Moat Garden — Pafos Gate #74",a:"Pafos Gate",v:["nature","hidden","local"],d:29,s:"The restored Venetian moat below the Paphos Gate — now a wild garden with cats and historians",st:"The dry moat of the Venetian walls around the Pafos Gate has been partially restored as a garden path. Walk it at dusk. The scale of the fortification engineering becomes clear at ground level.",im:"Time-travel: the moat as a first line of defence against the Ottoman fleet, 1570",t:"Free. Access from the road below the Pafos Gate walls.",c:["history_big"],r:"g",nn:"Κήπος Τάφρου Πάφου — Πύλη Πάφου #74",ns:"Η αποκατεστημένη ενετική τάφρος — τώρα ένας κήπος",nst:"Η ξηρά τάφρος γύρω από την Πύλη Πάφου έχει αποκατασταθεί.",nt:"Δωρεάν."},
  {id:75,n:"Agia Napa Forest Walk — Athalassa #75",a:"Athalassa",v:["nature","quiet","hidden"],d:11,s:"A pine forest 20 minutes from the city — silence, birds, and monastery ruins",st:"The Athalassa forest contains mature pine plantations, a small reservoir, and the ruins of the Agia Napa monastery chapel. Walking trails loop through the forest. An extraordinary urban escape.",im:"Time-travel: foresters planting these pines on barren rock in the first reforestation scheme, 1950",t:"Free. Open daily. Follow footpath signs from Athalassa park.",c:["high_spots"],r:"g",nn:"Δάσος Αγίας Νάπας — Αθαλάσσα #75",ns:"Ένα πευκόδασος 20 λεπτά από την πόλη — σιωπή, πουλιά, μοναστηριακά ερείπια",nst:"Το δάσος Αθαλάσσας περιέχει ώριμες φυτείες πεύκων και ερείπια μοναστηριού.",nt:"Δωρεάν. Ανοιχτό καθημερινά."},
  {id:76,n:"Venetian Walls Walk — Walled City #76",a:"Walled City",v:["history","beautiful","local"],d:27,s:"Walk the complete circuit of the 16th-century Venetian walls — the best-preserved in the world",st:"The Venetian walls of Nicosia were built 1567–1570, a perfectly circular fortification with 11 heart-shaped bastions. You can walk the entire 4.5 km circuit on top of the walls for free. The divided city is visible from every point.",im:"Time-travel: Venetian engineers demolishing medieval churches to build new walls in time, 1567",t:"Free always. Enter from any of the 3 gates. Full circuit takes 45 minutes.",c:["parks"],r:"g",nn:"Ενετικά Τείχη — Τειχισμένη Πόλη #76",ns:"Περίπατος στα βενετικά τείχη του 16ου αιώνα",nst:"Τα βενετικά τείχη χτίστηκαν το 1567–1570, ένα τέλεια κυκλικό οχυρό.",nt:"Πάντα δωρεάν. Είσοδος από οποιαδήποτε από τις 3 πύλες."},
  {id:77,n:"Büyük Han Great Inn — Walled City #77",a:"Walled City",v:["history","architecture","hidden"],d:27,s:"The finest Ottoman caravanserai in Cyprus — a working cultural centre inside a 1572 inn",st:"The Great Inn was built in 1572 by the Ottomans as a caravanserai for merchants. Today the courtyard houses craft workshops and a café. The architecture — 68 rooms around an octagonal fountain — is extraordinary.",im:"Time-travel: caravans arriving at dusk, merchants unloading spices and silk in this courtyard, 1590",t:"Free to enter the courtyard. Open daily.",c:["courtyards"],r:"g",nn:"Μπουγιούκ Χαν — Τειχισμένη Πόλη #77",ns:"Το πιο εντυπωσιακό οθωμανικό καραβανσεράι στην Κύπρο",nst:"Χτίστηκε το 1572 από τους Οθωμανούς ως καραβανσεράι για εμπόρους.",nt:"Ελεύθερη είσοδος στην αυλή. Ανοιχτό καθημερινά."},
  {id:78,n:"Ledra Street Crossing — Nicosia Buffer Zone #78",a:"Nicosia Buffer Zone",v:["history","weird","local"],d:43,s:"Walk through the crossing point between Greek and Turkish Cyprus — divided city, united street",st:"The Ledra Street crossing opened in 2008. With a valid passport you can walk between the two sides in seconds. The UN buffer zone — the Green Line — runs through the heart of Nicosia past abandoned houses.",im:"Time-travel: the barricades going up on this street in 1974, neighbours suddenly separated by sandbags",t:"Free with passport. Open daily. You can cross and return.",c:["romantic_water"],r:"g",nn:"Πέρασμα Οδού Λήδρας — Νεκρή Ζώνη #78",ns:"Διέλθετε από το σύνορο μεταξύ ελληνικής και τουρκικής Κύπρου",nst:"Το πέρασμα Λήδρας άνοιξε το 2008.",nt:"Δωρεάν με διαβατήριο. Ανοιχτό καθημερινά."},
  {id:79,n:"Buffer Zone Ghost Buildings — Nicosia Buffer Zone #79",a:"Nicosia Buffer Zone",v:["abandoned","weird","history"],d:21,s:"Look into the UN buffer zone from rooftops — a ghost street frozen since 1974",st:"Several buildings along the buffer zone offer views into no-man\'s-land. The Shacolas Tower Observatory gives the clearest view of both sides and the abandoned ground floor buildings below.",im:"Time-travel: these streets full of shoppers and café tables, the day before the division, July 1974",t:"Shacolas Observatory: small fee (€2). Street views free from rooftop cafés.",c:["scary"],r:"g",nn:"Εγκαταλελειμμένα Κτήρια — Νεκρά Ζώνη #79",ns:"Κοιτάξτε μέσα στη νεκρή ζώνη — μια φαντασματική οδός παγωμένη από το 1974",nst:"Κτήρια κατά μήκος της νεκρής ζώνης προσφέρουν θέα στη no-man\'s-land.",nt:"Παρατηρητήριο: μικρό τέλος (2 €). Δρόμος δωρεάν."},
  {id:80,n:"Laiki Yitonia Quarter — Laiki Yitonia #80",a:"Laiki Yitonia",v:["local","architecture","beautiful"],d:7,s:"The restored traditional quarter inside the Famagusta Gate — craft shops, old houses, cats",st:"Laiki Yitonia (the popular neighbourhood) was restored in the 1980s as a pedestrian quarter with Ottoman and colonial-era houses. It is walkable, full of Cypriot craft shops, and free.",im:"Time-travel: this quarter as a working-class neighbourhood of craftsmen and market traders, 1900",t:"Free to walk. Shops open Mon–Sat.",c:["famous_dead"],r:"g",nn:"Λαϊκή Γειτονιά — Λαϊκή Γειτονιά #80",ns:"Η αποκατεστημένη παραδοσιακή συνοικία",nst:"Η Λαϊκή Γειτονιά αποκαταστάθηκε τη δεκαετία του 1980.",nt:"Δωρεάν περπάτημα. Καταστήματα Δε–Σα."},
  {id:81,n:"Famagusta Gate — Walled City #81",a:"Walled City",v:["history","architecture","beautiful"],d:51,s:"The most imposing of the three Venetian city gates — a perfect arched tunnel through 10 metres of wall",st:"The Famagusta Gate was built in 1567 as the main eastern entrance to the city. The vaulted passage is 10 metres long. The interior chamber is used for exhibitions and concerts.",im:"Time-travel: Venetian soldiers guarding this gate against Ottoman advance, 1570",t:"Free. Interior open when exhibitions run.",c:["street_art"],r:"g",nn:"Πύλη Αμμοχώστου — Τειχισμένη Πόλη #81",ns:"Η πιο επιβλητική από τις τρεις βενετικές πύλες",nst:"Η Πύλη Αμμοχώστου χτίστηκε το 1567.",nt:"Δωρεάν. Εσωτερικό ανοιχτό κατά εκθέσεις."},
  {id:82,n:"Athalassa National Forest Park — Athalassa #82",a:"Athalassa",v:["nature","local","quiet"],d:34,s:"A 1400-hectare forest park inside the city — lakes, flamingos, cycling tracks, and silence",st:"Athalassa is one of Europe\'s largest urban forest parks. Two lakes attract flamingos and migrating birds. Cycling trails circle the lakes. Almost no tourists visit. Locals jog and picnic here year-round.",im:"Time-travel: this area as dry scrubland before one million trees were planted here, 1960",t:"Free. Open daily. Bus from Nicosia centre (40 min).",c:["abandoned"],r:"g",nn:"Δασικό Πάρκο Αθαλάσσας — Αθαλάσσα #82",ns:"Ένα πάρκο 1400 εκταρίων εντός της πόλης — λίμνες, φλαμίνγκο, ποδηλατοδρόμοι",nst:"Η Αθαλάσσα είναι ένα από τα μεγαλύτερα αστικά δάση της Ευρώπης.",nt:"Δωρεάν. Ανοιχτό καθημερινά."},
  {id:83,n:"Agios Ioannis Cathedral — Walled City #83",a:"Walled City",v:["history","architecture","beautiful"],d:39,s:"Nicosia\'s oldest standing church — Byzantine frescoes covering every wall and ceiling",st:"The Cathedral of Agios Ioannis was built in 1662. Inside, 18th-century frescoes cover every surface: the Last Judgement, the Apocalypse, and the history of Cyprus.",im:"Time-travel: the archbishop commissioning these frescoes to rival the Ottoman mosques, 1720",t:"Free. Open Mon–Fri morning, closed midday.",c:["free_museum"],r:"g",nn:"Καθεδρικός Ναός Αγίου Ιωάννη — Τειχισμένη Πόλη #83",ns:"Η παλαιότερη εκκλησία της Λευκωσίας — βυζαντινές τοιχογραφίες",nst:"Ο Καθεδρικός Ναός Αγίου Ιωάννη κτίστηκε το 1662.",nt:"Δωρεάν. Δε–Πα πρωί, κλειστό μεσημέρι."},
  {id:84,n:"Cyprus Handicraft Centre — Engomi #84",a:"Engomi",v:["local","art","history"],d:12,s:"Government craft workshops teaching traditional Cypriot lace-making, weaving and pottery",st:"The Cyprus Handicraft Centre preserves traditional techniques under threat of extinction. Artisans work in open workshops: lefkaritika lace-making, silverwork, and basket weaving. Free to watch and browse.",im:"Time-travel: Cypriot women teaching daughters lace patterns that go back to Byzantine times, 1850",t:"Free. Open Mon–Fri during working hours.",c:["local_only"],r:"g",nn:"Κυπριακές Χειροτεχνίες — Ενγκόμι #84",ns:"Κυβερνητικά εργαστήρια που διδάσκουν παραδοσιακή κυπριακή δαντέλα",nst:"Το Κέντρο Κυπριακών Χειροτεχνιών διατηρεί παραδοσιακές τεχνικές.",nt:"Δωρεάν. Δε–Πα κατά τις εργάσιμες ώρες."},
  {id:85,n:"Municipal Garden — Larnaca Road #85",a:"Larnaca Road",v:["local","nature","quiet"],d:29,s:"The city\'s oldest park with a small zoo, outdoor theatre, and afternoon chess players",st:"The Municipal Garden was laid out in 1940. A small zoo with deer and peacocks entertains children. Old men play tavli (backgammon) every afternoon.",im:"Time-travel: British colonial officers picnicking here while the old city baked in the heat, 1940",t:"Free. Open daily. Zoo free.",c:["architecture"],r:"g",nn:"Δημοτικός Κήπος — Οδός Λάρνακας #85",ns:"Το παλαιότερο πάρκο της πόλης με μικρό ζωολογικό κήπο",nst:"Ο Δημοτικός Κήπος χαράχθηκε το 1940.",nt:"Δωρεάν. Ανοιχτό καθημερινά."},
  {id:86,n:"Dervis Pasha Mansion — Pafos Gate #86",a:"Pafos Gate",v:["history","architecture","hidden"],d:10,s:"The only surviving Ottoman mansion in the old city — a glimpse into pre-1974 mixed Nicosia",st:"The Dervis Pasha mansion is a two-storey Ottoman house from the 18th century, now a museum. The collection shows how Greek and Turkish Cypriot domestic life was intertwined before partition.",im:"Time-travel: the Ottoman editor Dervis Pasha writing his newspaper in this courtyard, 1800",t:"Small entry fee (€3). Open Tue–Fri.",c:["history_big"],r:"g",nn:"Έπαυλη Ντερβίς Πασά — Πύλη Πάφου #86",ns:"Η μοναδική σωζόμενη οθωμανική έπαυλη στην παλιά πόλη",nst:"Η έπαυλη Ντερβίς Πασά είναι ένα διώροφο οθωμανικό σπίτι από τον 18ο αιώνα.",nt:"Μικρό τέλος (3 €). Ανοιχτό Τρ–Πα."},
  {id:87,n:"Faneromeni Church Square — Walled City #87",a:"Walled City",v:["local","history","beautiful"],d:40,s:"The main square of the Greek Cypriot quarter — shaded, with a church, market and social life",st:"Faneromeni Square is the heart of the walled city for local Greeks. The neoclassical church, completed in 1886, faces a bustling morning market. Elderly couples sit in the shade throughout the afternoon.",im:"Time-travel: this square as the centre of Cypriot Greek life before independence, 1950",t:"Free always. Market in mornings, Mon–Sat.",c:["high_spots"],r:"g",nn:"Πλατεία Φανερωμένης — Τειχισμένη Πόλη #87",ns:"Η κεντρική πλατεία της ελληνοκυπριακής συνοικίας",nst:"Η πλατεία Φανερωμένης είναι η καρδιά της τειχισμένης πόλης.",nt:"Πάντα δωρεάν."},
  {id:88,n:"Strovolos Saturday Market — Strovolos #88",a:"Strovolos",v:["local","free","hidden"],d:23,s:"The sprawling suburban market where Nicosia residents actually shop — fruit, fish and noise",st:"The Strovolos Saturday market is where Nicosia families do their weekly shopping: piles of halloumi, fresh coriander, preserved olives, and citrus from the Mesaoria plain. Few tourists ever find it.",im:"Time-travel: the village of Strovolos as a separate community before the city reached it, 1950",t:"Free. Saturdays only. Bus from centre (20 min).",c:["parks"],r:"g",nn:"Λαϊκή Αγορά Στροβόλου — Στρόβολος #88",ns:"Η εκτεταμένη λαϊκή αγορά — φρούτα, ψάρι και θόρυβος",nst:"Η λαϊκή Στροβόλου είναι εκεί που οι οικογένειες κάνουν τις εβδομαδιαίες αγορές.",nt:"Δωρεάν. Μόνο Σάββατα."},
  {id:89,n:"Selimiye Mosque (Aya Sofya) — Walled City #89",a:"Walled City",v:["history","architecture","beautiful"],d:45,s:"A Gothic cathedral converted to a mosque — Gothic arches and Ottoman minarets in one building",st:"The Cathedral of Saint Sophia was built 1209–1326 in French Gothic style. After the Ottoman conquest of 1571, minarets were added and it became the Selimiye Mosque. Both architectural eras are visible simultaneously.",im:"Time-travel: the Ottoman commander ordering the Christian images covered inside this cathedral, 1571",t:"Free to visit when not in prayer. Remove shoes. Cross via Ledra crossing.",c:["courtyards"],r:"g",nn:"Τζαμί Σελιμιγιέ — Τειχισμένη Πόλη #89",ns:"Γοτθικός καθεδρικός ναός μετατραπείς σε τζαμί",nst:"Κτίστηκε 1209–1326 σε γαλλικό γοτθικό ρυθμό. Μετατράπηκε σε τζαμί το 1571.",nt:"Δωρεάν εκτός ώρας προσευχής. Βγάλτε παπούτσια."},
  {id:90,n:"Chrysaliniotissa Arts Quarter — Walled City #90",a:"Walled City",v:["local","art","hidden"],d:44,s:"The oldest neighbourhood in the walled city — craftsmen, artists, and the oldest church in Nicosia",st:"Chrysaliniotissa is a semi-restored quarter of traditional houses, workshops, and the 15th-century Chrysaliniotissa Church. Artists have colonised the old houses. The neighbourhood feels transitional — not yet gentrified.",im:"Time-travel: this as the workshop district for generations of Nicosia craftsmen, 1900",t:"Free always.",c:["romantic_water"],r:"g",nn:"Χρυσαλινιώτισσα — Τειχισμένη Πόλη #90",ns:"Η παλαιότερη γειτονιά — τεχνίτες, καλλιτέχνες, η παλαιότερη εκκλησία",nst:"Η Χρυσαλινιώτισσα είναι μια ημι-αποκατεστημένη συνοικία.",nt:"Πάντα δωρεάν."},
  {id:91,n:"Bandabulya Market Hall — Walled City #91",a:"Walled City",v:["local","history","architecture"],d:28,s:"The Ottoman covered market — halloumi sellers, coffee traders, and high vaulted arches",st:"The Bandabulya is an Ottoman-era covered market hall. It is more atmospheric than busy — a few cheese and meat vendors, a coffee stall, and the high vaulted arches of the original building.",im:"Time-travel: the market full of traders selling Syrian silk, Egyptian cotton, and Cypriot carob, 1800",t:"Free. Open Mon–Sat mornings.",c:["scary"],r:"g",nn:"Μπαντάμπουλια — Τειχισμένη Πόλη #91",ns:"Η οθωμανική στεγασμένη αγορά",nst:"Το Μπαντάμπουλια είναι μια οθωμανική στεγασμένη αγορά.",nt:"Δωρεάν. Δε–Σα πρωί."},
  {id:92,n:"Phaneromeni Library — Walled City #92",a:"Walled City",v:["hidden","architecture","quiet"],d:41,s:"The oldest public library in Cyprus — still operating in its original 1893 building",st:"The Phaneromeni Library was established in 1893 and still operates from its original neoclassical building. An extraordinary survival: card catalogues, old Greek periodicals, and absolute silence.",im:"Time-travel: the library opening to an excited literate population, the first public books in Nicosia, 1893",t:"Free. Open Mon–Fri.",c:["famous_dead"],r:"g",nn:"Βιβλιοθήκη Φανερωμένης — Τειχισμένη Πόλη #92",ns:"Η παλαιότερη δημόσια βιβλιοθήκη της Κύπρου",nst:"Η Βιβλιοθήκη Φανερωμένης ιδρύθηκε το 1893.",nt:"Δωρεάν. Δε–Πα."},
  {id:93,n:"Pafos Gate Bastion — Pafos Gate #93",a:"Pafos Gate",v:["history","architecture","local"],d:17,s:"The western gate of the Venetian walls where the buffer zone meets the city",st:"The Pafos Gate area is where the UN Buffer Zone reaches the western wall. The gate itself is a massive Venetian arch. The neighbourhood is a hybrid — some restored, some abandoned, very few tourists.",im:"Time-travel: the city council debating development beyond this gate as the city modernised, 1950",t:"Free. Walk the bastion walls for a close look at both sides of the city.",c:["street_art"],r:"g",nn:"Πύλη Πάφου — Πύλη Πάφου #93",ns:"Η δυτική πύλη όπου η νεκρή ζώνη συναντά την πόλη",nst:"Η Πύλη Πάφου βρίσκεται εκεί που η Νεκρά Ζώνη φτάνει στο δυτικό τείχος.",nt:"Δωρεάν. Περπατήστε τα τείχη."},
  {id:94,n:"Agios Antonios Arts District — Larnaca Road #94",a:"Larnaca Road",v:["local","art","hidden"],d:50,s:"Nicosia\'s small arts district — independent galleries, coffee bars, and young Cypriot designers",st:"The Agios Antonios area outside the walls has become Nicosia\'s creative neighbourhood. Small independent galleries, design studios, and the best coffee in the city. It feels like a Mediterranean Prenzlauer Berg.",im:"Time-travel: this as an unremarkable suburb before young Nicosians started opening studios here, 2010",t:"Free to walk. Galleries open afternoons. Best Thur–Sat evenings.",c:["abandoned"],r:"g",nn:"Περιοχή Αγίου Αντωνίου — Οδός Λάρνακας #94",ns:"Η μικρή καλλιτεχνική συνοικία της Λευκωσίας",nst:"Η περιοχή Αγίου Αντωνίου έχει γίνει η δημιουργική γειτονιά.",nt:"Δωρεάν. Γκαλερί απογεύματα. Καλύτερα Πεμ–Σα."},
  {id:95,n:"Athalassa Lake Flamingos — Athalassa #95",a:"Athalassa",v:["nature","local","hidden"],d:9,s:"Winter flamingos on a lake inside the city — one of Cyprus\'s best bird-watching spots",st:"The smaller lake at Athalassa is a flamingo stop-over on the East African–West Asian flyway. From October to March, hundreds of flamingos feed here. An extraordinary sight 10 minutes from the city centre.",im:"Time-travel: the flamingos arriving on this lake centuries before the city existed, as they always have",t:"Free. Open daily. Best October–March, early morning.",c:["free_museum"],r:"g",nn:"Φλαμίνγκο Λίμνης Αθαλάσσας — Αθαλάσσα #95",ns:"Χειμερινά φλαμίνγκο στη λίμνη εντός της πόλης",nst:"Η μικρή λίμνη στην Αθαλάσσα είναι σταθμός φλαμίνγκο.",nt:"Δωρεάν. Καλύτερα Οκτ–Μαρ, πρωί."},
  {id:96,n:"Eleftheria Square — Walled City #96",a:"Walled City",v:["architecture","beautiful","local"],d:7,s:"Nicosia\'s new civic gateway — Zaha Hadid\'s bridge sculptures spanning the Venetian moat",st:"Eleftheria Square was redesigned by Zaha Hadid (completed 2021). The white bridge-sculptures span the old Venetian moat and connect the modern city to the walls. Free to walk day or night.",im:"Time-travel: the old Venetian moat used as a bus terminal for 50 years before this redesign, 1970",t:"Free always.",c:["local_only"],r:"g",nn:"Πλατεία Ελευθερίας — Τειχισμένη Πόλη #96",ns:"Η νέα αστική πύλη — γέφυρες-γλυπτά της Ζάχα Χαντίντ πάνω από την τάφρο",nst:"Η Πλατεία Ελευθερίας ανασχεδιάστηκε από τη Ζάχα Χαντίντ το 2021.",nt:"Πάντα δωρεάν."},
  {id:97,n:"Buyuk Hamam Ottoman Bath — Walled City #97",a:"Walled City",v:["history","architecture","weird"],d:47,s:"A working Ottoman bathhouse in a 14th-century Lusignan church — you can bathe for €12",st:"The Great Hamam was built inside the 14th-century Church of St George of the Latins after the Ottoman conquest. Cross-ribbed Gothic vaults rise above marble bathing platforms. Still operating as a hamam.",im:"Time-travel: Ottoman builders installing the heated marble platform beneath Gothic vaults, 1571",t:"Entry €12 for hamam experience. Exterior and courtyard free.",c:["architecture"],r:"g",nn:"Μπουγιούκ Χαμάμ — Τειχισμένη Πόλη #97",ns:"Ένα λειτουργικό οθωμανικό χαμάμ σε εκκλησία του 14ου αιώνα",nst:"Γοτθικές καμάρες πάνω από μαρμάρινες πλατφόρμες μπάνιου.",nt:"Είσοδος 12 € για χαμάμ. Εξωτερικό δωρεάν."},
  {id:98,n:"Cyprus Museum — Strovolos #98",a:"Strovolos",v:["history","architecture","local"],d:19,s:"Cyprus\'s national museum — the finest collection of Cypriot antiquities anywhere",st:"The Cyprus Museum was founded in 1882 and holds the finest collection of Cypriot antiquities. The neoclassical building and courtyard are impressive. The Aphrodite of Soloi and Bronze Age collections are extraordinary.",im:"Time-travel: British archaeologists excavating Bronze Age tombs and bringing everything here, 1890",t:"Entry €4.50. Courtyard/exterior free.",c:["history_big"],r:"g",nn:"Μουσείο Κύπρου — Στρόβολος #98",ns:"Το εθνικό μουσείο με την πιο σπουδαία συλλογή κυπριακών αρχαιοτήτων",nst:"Το Μουσείο Κύπρου ιδρύθηκε το 1882.",nt:"Είσοδος 4,50 €. Εξωτερικό δωρεάν."},
  {id:99,n:"Pafos Gate Moat Garden — Pafos Gate #99",a:"Pafos Gate",v:["nature","hidden","local"],d:54,s:"The restored Venetian moat below the Paphos Gate — now a wild garden with cats and historians",st:"The dry moat of the Venetian walls around the Pafos Gate has been partially restored as a garden path. Walk it at dusk. The scale of the fortification engineering becomes clear at ground level.",im:"Time-travel: the moat as a first line of defence against the Ottoman fleet, 1570",t:"Free. Access from the road below the Pafos Gate walls.",c:["high_spots"],r:"g",nn:"Κήπος Τάφρου Πάφου — Πύλη Πάφου #99",ns:"Η αποκατεστημένη ενετική τάφρος — τώρα ένας κήπος",nst:"Η ξηρά τάφρος γύρω από την Πύλη Πάφου έχει αποκατασταθεί.",nt:"Δωρεάν."},
  {id:100,n:"Agia Napa Forest Walk — Athalassa #100",a:"Athalassa",v:["nature","quiet","hidden"],d:23,s:"A pine forest 20 minutes from the city — silence, birds, and monastery ruins",st:"The Athalassa forest contains mature pine plantations, a small reservoir, and the ruins of the Agia Napa monastery chapel. Walking trails loop through the forest. An extraordinary urban escape.",im:"Time-travel: foresters planting these pines on barren rock in the first reforestation scheme, 1950",t:"Free. Open daily. Follow footpath signs from Athalassa park.",c:["parks"],r:"g",nn:"Δάσος Αγίας Νάπας — Αθαλάσσα #100",ns:"Ένα πευκόδασος 20 λεπτά από την πόλη — σιωπή, πουλιά, μοναστηριακά ερείπια",nst:"Το δάσος Αθαλάσσας περιέχει ώριμες φυτείες πεύκων και ερείπια μοναστηριού.",nt:"Δωρεάν. Ανοιχτό καθημερινά."},
  {id:101,n:"Venetian Walls Walk — Walled City #101",a:"Walled City",v:["history","beautiful","local"],d:10,s:"Walk the complete circuit of the 16th-century Venetian walls — the best-preserved in the world",st:"The Venetian walls of Nicosia were built 1567–1570, a perfectly circular fortification with 11 heart-shaped bastions. You can walk the entire 4.5 km circuit on top of the walls for free. The divided city is visible from every point.",im:"Time-travel: Venetian engineers demolishing medieval churches to build new walls in time, 1567",t:"Free always. Enter from any of the 3 gates. Full circuit takes 45 minutes.",c:["courtyards"],r:"g",nn:"Ενετικά Τείχη — Τειχισμένη Πόλη #101",ns:"Περίπατος στα βενετικά τείχη του 16ου αιώνα",nst:"Τα βενετικά τείχη χτίστηκαν το 1567–1570, ένα τέλεια κυκλικό οχυρό.",nt:"Πάντα δωρεάν. Είσοδος από οποιαδήποτε από τις 3 πύλες."},
