<script>
const P = [,
  {name:'Pythonos Street Graffiti Alley',area:'Old City Center',desc:'This small pedestrian alley in central Nicosia is completely covered in vibrant graffiti that locals treat as an open-air modern art gallery, perfect for quiet contemplation away from tourist crowds. Greek-speaking Instagram users share it as their secret spot for photos and slow urban discovery. Free to visit; reachable by bus 3 or 5 from Eleftheria Square.',tags:['street art','hidden','free','local'],lat:35.173,lng:33.361},
  {name:'Eleftheria Square Moat Park',area:'Neos Lefkosias',desc:'Tucked into the dry moat of the Venetian Walls, this multi-level public park blends old fortifications with modern design, offering hidden green spaces where locals picnic and watch the city lights. Cypriot slow travel bloggers praise its peaceful benches and unexpected viewpoints over the divide. Completely free; bus 4 stops nearby.',tags:['park','viewpoint','free','local'],lat:35.174,lng:33.364},
  {name:'Swimming Birds Courtyard',area:'Old City',desc:'Behind a graffiti-covered concrete wall lies this secret courtyard café-bar, a local hangout for chilled evenings with friends savoring cheap eliopita olive pies amid art deco vibes. Greek Facebook groups buzz about its hidden entrance and community feel. Entry free, drinks from €2; walkable from bus 1 along Ermou.',tags:['courtyard','hidden','local','cheap'],lat:35.172,lng:33.362},
  {name:'isnotgallery Quarter Courtyards',area:'Chrysaliniotissa',desc:'Wander the narrow lanes around this contemporary art hub to find tucked-away courtyards with local pottery studios and emerging artist spaces that feel like a creative neighborhood secret. Local influencers on TikTok highlight free pop-up exhibits and chats with creators. Free access; bus 7 to nearby Agiou Ioannou.',tags:['courtyard','street art','hidden','free'],lat:35.171,lng:33.36},
  {name:'Taht-el-Kale Street Art Walls',area:'Taht-el-Kale',desc:'Eastern Old City walls explode with raw graffiti reflecting Cyprus's layered history, a spot Greek social media locals claim for its authentic, unpolished edge far from guided tours. Perfect for slow walks discovering political murals. Free; bus 5 from city center.',tags:['street art','hidden','free','local'],lat:35.17,lng:33.365},
  {name:'Ermou Street Hidden Crossroad',area:'Laiki Geitonia',desc:'At the crossroads of Hectoros, Famagusta, and Minoos off Ermou, locals slip into Instagram-famous micro-squares with vine-draped benches and quiet chats, evading the main shopping drag. Greek travel blogs call it the heart of everyday Nicosia life. Free; directly on bus 3 route.',tags:['hidden','courtyard','free','local'],lat:35.1735,lng:33.363},
  {name:'Venetian Walls Eastern Viewpoint',area:'Old City Walls',desc:'Climb to this lesser-known rampart section for panoramic city views over rooftops and the Green Line, a free secret shared in Cypriot slow travel communities for sunset contemplation. Locals love its solitude and historical whispers. Free; bus 4 to Eleftheria, short walk.',tags:['viewpoint','hidden','free','local'],lat:35.175,lng:33.366},
  {name:'Chrysaliniotissa Neighborhood Park',area:'Chrysaliniotissa',desc:'A tiny locals-only green pocket with olive trees and chess-playing elders, hidden amid artisan workshops—Greek Facebook groups post it as the coziest spot for reading or people-watching. Feels like stepping into a family backyard. Free; bus 7 stop close by.',tags:['park','hidden','free','local'],lat:35.1705,lng:33.359},
  {name:'Famagusta Gate Back Alleys',area:'Near Famagusta Gate',desc:'Winding alleys behind the grand gate reveal street art-splashed walls and pop-up community murals, a creative outlet for young locals as per Instagram stories. Ideal for curious explorers seeking un-touristy vibes. Free; bus 5 direct.',tags:['street art','hidden','free','local'],lat:35.169,lng:33.367},
  {name:'Old Town Sensory Courtyards',area:'Old Town Alleys',desc:'Narrow passages off Ledras hide charming courtyards with laundry lines, cats, and whiffs of home cooking—locals' ultimate slow stroll for sensory immersion shared on Greek blogs. Pure neighborhood magic without a euro spent. Free; bus 1 or 3.',tags:['courtyard','hidden','free','local'],lat:35.1725,lng:33.3615},
  {id:1,n:"Venetian Walls Walk — Walled City",a:"Walled City",v:["history","beautiful","local"],d:40,s:"Walk the complete circuit of the 16th-century Venetian walls — the best-preserved in the world",st:"The Venetian walls of Nicosia were built 1567–1570, a perfectly circular fortification with 11 heart-shaped bastions. You can walk the entire 4.5 km circuit on top of the walls for free. The divided city is visible from every point.",im:"Time-travel: Venetian engineers demolishing medieval churches to build new walls in time, 1567",t:"Free always. Enter from any of the 3 gates. Full circuit takes 45 minutes.",c:["history_big"],r:"g",nn:"Ενετικά Τείχη — Τειχισμένη Πόλη",ns:"Περίπατος στα βενετικά τείχη του 16ου αιώνα",nst:"Τα βενετικά τείχη χτίστηκαν το 1567–1570, ένα τέλεια κυκλικό οχυρό.",nt:"Πάντα δωρεάν. Είσοδος από οποιαδήποτε από τις 3 πύλες."},
  {id:2,n:"Büyük Han Great Inn — Walled City",a:"Walled City",v:["history","architecture","hidden"],d:30,s:"The finest Ottoman caravanserai in Cyprus — a working cultural centre inside a 1572 inn",st:"The Great Inn was built in 1572 by the Ottomans as a caravanserai for merchants. Today the courtyard houses craft workshops and a café. The architecture — 68 rooms around an octagonal fountain — is extraordinary.",im:"Time-travel: caravans arriving at dusk, merchants unloading spices and silk in this courtyard, 1590",t:"Free to enter the courtyard. Open daily.",c:["courtyards"],r:"g",nn:"Μπουγιούκ Χαν — Τειχισμένη Πόλη",ns:"Το πιο εντυπωσιακό οθωμανικό καραβανσεράι στην Κύπρο",nst:"Χτίστηκε το 1572 από τους Οθωμανούς ως καραβανσεράι για εμπόρους.",nt:"Ελεύθερη είσοδος στην αυλή. Ανοιχτό καθημερινά."},
  {id:3,n:"Ledra Street Crossing — Nicosia Buffer Zone",a:"Nicosia Buffer Zone",v:["history","weird","local"],d:30,s:"Walk through the crossing point between Greek and Turkish Cyprus — divided city, united street",st:"The Ledra Street crossing opened in 2008. With a valid passport you can walk between the two sides in seconds. The UN buffer zone — the Green Line — runs through the heart of Nicosia past abandoned houses.",im:"Time-travel: the barricades going up on this street in 1974, neighbours suddenly separated by sandbags",t:"Free with passport. Open daily. You can cross and return.",c:["history_big"],r:"g",nn:"Πέρασμα Οδού Λήδρας — Νεκρή Ζώνη",ns:"Διέλθετε από το σύνορο μεταξύ ελληνικής και τουρκικής Κύπρου",nst:"Το πέρασμα Λήδρας άνοιξε το 2008.",nt:"Δωρεάν με διαβατήριο. Ανοιχτό καθημερινά."},
  {id:4,n:"Buffer Zone Ghost Buildings — Nicosia Buffer Zone",a:"Nicosia Buffer Zone",v:["abandoned","weird","history"],d:20,s:"Look into the UN buffer zone from rooftops — a ghost street frozen since 1974",st:"Several buildings along the buffer zone offer views into no-man\'s-land. The Shacolas Tower Observatory gives the clearest view of both sides and the abandoned ground floor buildings below.",im:"Time-travel: these streets full of shoppers and café tables, the day before the division, July 1974",t:"Shacolas Observatory: small fee (€2). Street views free from rooftop cafés.",c:["abandoned"],r:"g",nn:"Εγκαταλελειμμένα Κτήρια — Νεκρά Ζώνη",ns:"Κοιτάξτε μέσα στη νεκρή ζώνη — μια φαντασματική οδός παγωμένη από το 1974",nst:"Κτήρια κατά μήκος της νεκρής ζώνης προσφέρουν θέα στη no-man\'s-land.",nt:"Παρατηρητήριο: μικρό τέλος (2 €). Δρόμος δωρεάν."},
  {id:5,n:"Laiki Yitonia Quarter — Laiki Yitonia",a:"Laiki Yitonia",v:["local","architecture","beautiful"],d:25,s:"The restored traditional quarter inside the Famagusta Gate — craft shops, old houses, cats",st:"Laiki Yitonia (the popular neighbourhood) was restored in the 1980s as a pedestrian quarter with Ottoman and colonial-era houses. It is walkable, full of Cypriot craft shops, and free.",im:"Time-travel: this quarter as a working-class neighbourhood of craftsmen and market traders, 1900",t:"Free to walk. Shops open Mon–Sat.",c:["courtyards"],r:"g",nn:"Λαϊκή Γειτονιά — Λαϊκή Γειτονιά",ns:"Η αποκατεστημένη παραδοσιακή συνοικία",nst:"Η Λαϊκή Γειτονιά αποκαταστάθηκε τη δεκαετία του 1980.",nt:"Δωρεάν περπάτημα. Καταστήματα Δε–Σα."},
  {id:6,n:"Famagusta Gate — Walled City",a:"Walled City",v:["history","architecture","beautiful"],d:15,s:"The most imposing of the three Venetian city gates — a perfect arched tunnel through 10 metres of wall",st:"The Famagusta Gate was built in 1567 as the main eastern entrance to the city. The vaulted passage is 10 metres long. The interior chamber is used for exhibitions and concerts.",im:"Time-travel: Venetian soldiers guarding this gate against Ottoman advance, 1570",t:"Free. Interior open when exhibitions run.",c:["architecture"],r:"g",nn:"Πύλη Αμμοχώστου — Τειχισμένη Πόλη",ns:"Η πιο επιβλητική από τις τρεις βενετικές πύλες",nst:"Η Πύλη Αμμοχώστου χτίστηκε το 1567.",nt:"Δωρεάν. Εσωτερικό ανοιχτό κατά εκθέσεις."},
  {id:7,n:"Athalassa National Forest Park — Athalassa",a:"Athalassa",v:["nature","local","quiet"],d:60,s:"A 1400-hectare forest park inside the city — lakes, flamingos, cycling tracks, and silence",st:"Athalassa is one of Europe\'s largest urban forest parks. Two lakes attract flamingos and migrating birds. Cycling trails circle the lakes. Almost no tourists visit. Locals jog and picnic here year-round.",im:"Time-travel: this area as dry scrubland before one million trees were planted here, 1960",t:"Free. Open daily. Bus from Nicosia centre (40 min).",c:["parks"],r:"g",nn:"Δασικό Πάρκο Αθαλάσσας — Αθαλάσσα",ns:"Ένα πάρκο 1400 εκταρίων εντός της πόλης — λίμνες, φλαμίνγκο, ποδηλατοδρόμοι",nst:"Η Αθαλάσσα είναι ένα από τα μεγαλύτερα αστικά δάση της Ευρώπης.",nt:"Δωρεάν. Ανοιχτό καθημερινά."},
  {id:8,n:"Agios Ioannis Cathedral — Walled City",a:"Walled City",v:["history","architecture","beautiful"],d:15,s:"Nicosia\'s oldest standing church — Byzantine frescoes covering every wall and ceiling",st:"The Cathedral of Agios Ioannis was built in 1662. Inside, 18th-century frescoes cover every surface: the Last Judgement, the Apocalypse, and the history of Cyprus.",im:"Time-travel: the archbishop commissioning these frescoes to rival the Ottoman mosques, 1720",t:"Free. Open Mon–Fri morning, closed midday.",c:["architecture"],r:"g",nn:"Καθεδρικός Ναός Αγίου Ιωάννη — Τειχισμένη Πόλη",ns:"Η παλαιότερη εκκλησία της Λευκωσίας — βυζαντινές τοιχογραφίες",nst:"Ο Καθεδρικός Ναός Αγίου Ιωάννη κτίστηκε το 1662.",nt:"Δωρεάν. Δε–Πα πρωί, κλειστό μεσημέρι."},
  {id:9,n:"Cyprus Handicraft Centre — Engomi",a:"Engomi",v:["local","art","history"],d:30,s:"Government craft workshops teaching traditional Cypriot lace-making, weaving and pottery",st:"The Cyprus Handicraft Centre preserves traditional techniques under threat of extinction. Artisans work in open workshops: lefkaritika lace-making, silverwork, and basket weaving. Free to watch and browse.",im:"Time-travel: Cypriot women teaching daughters lace patterns that go back to Byzantine times, 1850",t:"Free. Open Mon–Fri during working hours.",c:["free_museum"],r:"g",nn:"Κυπριακές Χειροτεχνίες — Ενγκόμι",ns:"Κυβερνητικά εργαστήρια που διδάσκουν παραδοσιακή κυπριακή δαντέλα",nst:"Το Κέντρο Κυπριακών Χειροτεχνιών διατηρεί παραδοσιακές τεχνικές.",nt:"Δωρεάν. Δε–Πα κατά τις εργάσιμες ώρες."},
  {id:10,n:"Municipal Garden — Larnaca Road",a:"Larnaca Road",v:["local","nature","quiet"],d:20,s:"The city\'s oldest park with a small zoo, outdoor theatre, and afternoon chess players",st:"The Municipal Garden was laid out in 1940. A small zoo with deer and peacocks entertains children. Old men play tavli (backgammon) every afternoon.",im:"Time-travel: British colonial officers picnicking here while the old city baked in the heat, 1940",t:"Free. Open daily. Zoo free.",c:["parks"],r:"g",nn:"Δημοτικός Κήπος — Οδός Λάρνακας",ns:"Το παλαιότερο πάρκο της πόλης με μικρό ζωολογικό κήπο",nst:"Ο Δημοτικός Κήπος χαράχθηκε το 1940.",nt:"Δωρεάν. Ανοιχτό καθημερινά."},
  {id:11,n:"Dervis Pasha Mansion — Pafos Gate",a:"Pafos Gate",v:["history","architecture","hidden"],d:20,s:"The only surviving Ottoman mansion in the old city — a glimpse into pre-1974 mixed Nicosia",st:"The Dervis Pasha mansion is a two-storey Ottoman house from the 18th century, now a museum. The collection shows how Greek and Turkish Cypriot domestic life was intertwined before partition.",im:"Time-travel: the Ottoman editor Dervis Pasha writing his newspaper in this courtyard, 1800",t:"Small entry fee (€3). Open Tue–Fri.",c:["history_big"],r:"g",nn:"Έπαυλη Ντερβίς Πασά — Πύλη Πάφου",ns:"Η μοναδική σωζόμενη οθωμανική έπαυλη στην παλιά πόλη",nst:"Η έπαυλη Ντερβίς Πασά είναι ένα διώροφο οθωμανικό σπίτι από τον 18ο αιώνα.",nt:"Μικρό τέλος (3 €). Ανοιχτό Τρ–Πα."},
  {id:12,n:"Faneromeni Church Square — Walled City",a:"Walled City",v:["local","history","beautiful"],d:15,s:"The main square of the Greek Cypriot quarter — shaded, with a church, market and social life",st:"Faneromeni Square is the heart of the walled city for local Greeks. The neoclassical church, completed in 1886, faces a bustling morning market. Elderly couples sit in the shade throughout the afternoon.",im:"Time-travel: this square as the centre of Cypriot Greek life before independence, 1950",t:"Free always. Market in mornings, Mon–Sat.",c:["local_only"],r:"g",nn:"Πλατεία Φανερωμένης — Τειχισμένη Πόλη",ns:"Η κεντρική πλατεία της ελληνοκυπριακής συνοικίας",nst:"Η πλατεία Φανερωμένης είναι η καρδιά της τειχισμένης πόλης.",nt:"Πάντα δωρεάν."},
  {id:13,n:"Strovolos Saturday Market — Strovolos",a:"Strovolos",v:["local","free","hidden"],d:30,s:"The sprawling suburban market where Nicosia residents actually shop — fruit, fish and noise",st:"The Strovolos Saturday market is where Nicosia families do their weekly shopping: piles of halloumi, fresh coriander, preserved olives, and citrus from the Mesaoria plain. Few tourists ever find it.",im:"Time-travel: the village of Strovolos as a separate community before the city reached it, 1950",t:"Free. Saturdays only. Bus from centre (20 min).",c:["local_only"],r:"g",nn:"Λαϊκή Αγορά Στροβόλου — Στρόβολος",ns:"Η εκτεταμένη λαϊκή αγορά — φρούτα, ψάρι και θόρυβος",nst:"Η λαϊκή Στροβόλου είναι εκεί που οι οικογένειες κάνουν τις εβδομαδιαίες αγορές.",nt:"Δωρεάν. Μόνο Σάββατα."},
  {id:14,n:"Selimiye Mosque (Aya Sofya) — Walled City",a:"Walled City",v:["history","architecture","beautiful"],d:20,s:"A Gothic cathedral converted to a mosque — Gothic arches and Ottoman minarets in one building",st:"The Cathedral of Saint Sophia was built 1209–1326 in French Gothic style. After the Ottoman conquest of 1571, minarets were added and it became the Selimiye Mosque. Both architectural eras are visible simultaneously.",im:"Time-travel: the Ottoman commander ordering the Christian images covered inside this cathedral, 1571",t:"Free to visit when not in prayer. Remove shoes. Cross via Ledra crossing.",c:["architecture"],r:"g",nn:"Τζαμί Σελιμιγιέ — Τειχισμένη Πόλη",ns:"Γοτθικός καθεδρικός ναός μετατραπείς σε τζαμί",nst:"Κτίστηκε 1209–1326 σε γαλλικό γοτθικό ρυθμό. Μετατράπηκε σε τζαμί το 1571.",nt:"Δωρεάν εκτός ώρας προσευχής. Βγάλτε παπούτσια."},
  {id:15,n:"Chrysaliniotissa Arts Quarter — Walled City",a:"Walled City",v:["local","art","hidden"],d:25,s:"The oldest neighbourhood in the walled city — craftsmen, artists, and the oldest church in Nicosia",st:"Chrysaliniotissa is a semi-restored quarter of traditional houses, workshops, and the 15th-century Chrysaliniotissa Church. Artists have colonised the old houses. The neighbourhood feels transitional — not yet gentrified.",im:"Time-travel: this as the workshop district for generations of Nicosia craftsmen, 1900",t:"Free always.",c:["street_art"],r:"g",nn:"Χρυσαλινιώτισσα — Τειχισμένη Πόλη",ns:"Η παλαιότερη γειτονιά — τεχνίτες, καλλιτέχνες, η παλαιότερη εκκλησία",nst:"Η Χρυσαλινιώτισσα είναι μια ημι-αποκατεστημένη συνοικία.",nt:"Πάντα δωρεάν."},
  {id:16,n:"Bandabulya Market Hall — Walled City",a:"Walled City",v:["local","history","architecture"],d:20,s:"The Ottoman covered market — halloumi sellers, coffee traders, and high vaulted arches",st:"The Bandabulya is an Ottoman-era covered market hall. It is more atmospheric than busy — a few cheese and meat vendors, a coffee stall, and the high vaulted arches of the original building.",im:"Time-travel: the market full of traders selling Syrian silk, Egyptian cotton, and Cypriot carob, 1800",t:"Free. Open Mon–Sat mornings.",c:["history_big"],r:"g",nn:"Μπαντάμπουλια — Τειχισμένη Πόλη",ns:"Η οθωμανική στεγασμένη αγορά",nst:"Το Μπαντάμπουλια είναι μια οθωμανική στεγασμένη αγορά.",nt:"Δωρεάν. Δε–Σα πρωί."},
  {id:17,n:"Phaneromeni Library — Walled City",a:"Walled City",v:["hidden","architecture","quiet"],d:15,s:"The oldest public library in Cyprus — still operating in its original 1893 building",st:"The Phaneromeni Library was established in 1893 and still operates from its original neoclassical building. An extraordinary survival: card catalogues, old Greek periodicals, and absolute silence.",im:"Time-travel: the library opening to an excited literate population, the first public books in Nicosia, 1893",t:"Free. Open Mon–Fri.",c:["free_museum"],r:"g",nn:"Βιβλιοθήκη Φανερωμένης — Τειχισμένη Πόλη",ns:"Η παλαιότερη δημόσια βιβλιοθήκη της Κύπρου",nst:"Η Βιβλιοθήκη Φανερωμένης ιδρύθηκε το 1893.",nt:"Δωρεάν. Δε–Πα."},
  {id:18,n:"Pafos Gate Bastion — Pafos Gate",a:"Pafos Gate",v:["history","architecture","local"],d:20,s:"The western gate of the Venetian walls where the buffer zone meets the city",st:"The Pafos Gate area is where the UN Buffer Zone reaches the western wall. The gate itself is a massive Venetian arch. The neighbourhood is a hybrid — some restored, some abandoned, very few tourists.",im:"Time-travel: the city council debating development beyond this gate as the city modernised, 1950",t:"Free. Walk the bastion walls for a close look at both sides of the city.",c:["history_big"],r:"g",nn:"Πύλη Πάφου — Πύλη Πάφου",ns:"Η δυτική πύλη όπου η νεκρή ζώνη συναντά την πόλη",nst:"Η Πύλη Πάφου βρίσκεται εκεί που η Νεκρά Ζώνη φτάνει στο δυτικό τείχος.",nt:"Δωρεάν. Περπατήστε τα τείχη."},
  {id:19,n:"Agios Antonios Arts District — Larnaca Road",a:"Larnaca Road",v:["local","art","hidden"],d:30,s:"Nicosia\'s small arts district — independent galleries, coffee bars, and young Cypriot designers",st:"The Agios Antonios area outside the walls has become Nicosia\'s creative neighbourhood. Small independent galleries, design studios, and the best coffee in the city. It feels like a Mediterranean Prenzlauer Berg.",im:"Time-travel: this as an unremarkable suburb before young Nicosians started opening studios here, 2010",t:"Free to walk. Galleries open afternoons. Best Thur–Sat evenings.",c:["street_art"],r:"g",nn:"Περιοχή Αγίου Αντωνίου — Οδός Λάρνακας",ns:"Η μικρή καλλιτεχνική συνοικία της Λευκωσίας",nst:"Η περιοχή Αγίου Αντωνίου έχει γίνει η δημιουργική γειτονιά.",nt:"Δωρεάν. Γκαλερί απογεύματα. Καλύτερα Πεμ–Σα."},
  {id:20,n:"Athalassa Lake Flamingos — Athalassa",a:"Athalassa",v:["nature","local","hidden"],d:40,s:"Winter flamingos on a lake inside the city — one of Cyprus\'s best bird-watching spots",st:"The smaller lake at Athalassa is a flamingo stop-over on the East African–West Asian flyway. From October to March, hundreds of flamingos feed here. An extraordinary sight 10 minutes from the city centre.",im:"Time-travel: the flamingos arriving on this lake centuries before the city existed, as they always have",t:"Free. Open daily. Best October–March, early morning.",c:["parks"],r:"g",nn:"Φλαμίνγκο Λίμνης Αθαλάσσας — Αθαλάσσα",ns:"Χειμερινά φλαμίνγκο στη λίμνη εντός της πόλης",nst:"Η μικρή λίμνη στην Αθαλάσσα είναι σταθμός φλαμίνγκο.",nt:"Δωρεάν. Καλύτερα Οκτ–Μαρ, πρωί."},
  {id:21,n:"Eleftheria Square — Walled City",a:"Walled City",v:["architecture","beautiful","local"],d:15,s:"Nicosia\'s new civic gateway — Zaha Hadid\'s bridge sculptures spanning the Venetian moat",st:"Eleftheria Square was redesigned by Zaha Hadid (completed 2021). The white bridge-sculptures span the old Venetian moat and connect the modern city to the walls. Free to walk day or night.",im:"Time-travel: the old Venetian moat used as a bus terminal for 50 years before this redesign, 1970",t:"Free always.",c:["architecture"],r:"g",nn:"Πλατεία Ελευθερίας — Τειχισμένη Πόλη",ns:"Η νέα αστική πύλη — γέφυρες-γλυπτά της Ζάχα Χαντίντ πάνω από την τάφρο",nst:"Η Πλατεία Ελευθερίας ανασχεδιάστηκε από τη Ζάχα Χαντίντ το 2021.",nt:"Πάντα δωρεάν."},
  {id:22,n:"Buyuk Hamam Ottoman Bath — Walled City",a:"Walled City",v:["history","architecture","weird"],d:20,s:"A working Ottoman bathhouse in a 14th-century Lusignan church — you can bathe for €12",st:"The Great Hamam was built inside the 14th-century Church of St George of the Latins after the Ottoman conquest. Cross-ribbed Gothic vaults rise above marble bathing platforms. Still operating as a hamam.",im:"Time-travel: Ottoman builders installing the heated marble platform beneath Gothic vaults, 1571",t:"Entry €12 for hamam experience. Exterior and courtyard free.",c:["history_big"],r:"g",nn:"Μπουγιούκ Χαμάμ — Τειχισμένη Πόλη",ns:"Ένα λειτουργικό οθωμανικό χαμάμ σε εκκλησία του 14ου αιώνα",nst:"Γοτθικές καμάρες πάνω από μαρμάρινες πλατφόρμες μπάνιου.",nt:"Είσοδος 12 € για χαμάμ. Εξωτερικό δωρεάν."},
  {id:23,n:"Cyprus Museum — Strovolos",a:"Strovolos",v:["history","architecture","local"],d:20,s:"Cyprus\'s national museum — the finest collection of Cypriot antiquities anywhere",st:"The Cyprus Museum was founded in 1882 and holds the finest collection of Cypriot antiquities. The neoclassical building and courtyard are impressive. The Aphrodite of Soloi and Bronze Age collections are extraordinary.",im:"Time-travel: British archaeologists excavating Bronze Age tombs and bringing everything here, 1890",t:"Entry €4.50. Courtyard/exterior free.",c:["free_museum"],r:"g",nn:"Μουσείο Κύπρου — Στρόβολος",ns:"Το εθνικό μουσείο με την πιο σπουδαία συλλογή κυπριακών αρχαιοτήτων",nst:"Το Μουσείο Κύπρου ιδρύθηκε το 1882.",nt:"Είσοδος 4,50 €. Εξωτερικό δωρεάν."},
  {id:24,n:"Pafos Gate Moat Garden — Pafos Gate",a:"Pafos Gate",v:["nature","hidden","local"],d:20,s:"The restored Venetian moat below the Paphos Gate — now a wild garden with cats and historians",st:"The dry moat of the Venetian walls around the Pafos Gate has been partially restored as a garden path. Walk it at dusk. The scale of the fortification engineering becomes clear at ground level.",im:"Time-travel: the moat as a first line of defence against the Ottoman fleet, 1570",t:"Free. Access from the road below the Pafos Gate walls.",c:["history_big"],r:"g",nn:"Κήπος Τάφρου Πάφου — Πύλη Πάφου",ns:"Η αποκατεστημένη ενετική τάφρος — τώρα ένας κήπος",nst:"Η ξηρά τάφρος γύρω από την Πύλη Πάφου έχει αποκατασταθεί.",nt:"Δωρεάν."},
  {id:25,n:"Agia Napa Forest Walk — Athalassa",a:"Athalassa",v:["nature","quiet","hidden"],d:50,s:"A pine forest 20 minutes from the city — silence, birds, and monastery ruins",st:"The Athalassa forest contains mature pine plantations, a small reservoir, and the ruins of the Agia Napa monastery chapel. Walking trails loop through the forest. An extraordinary urban escape.",im:"Time-travel: foresters planting these pines on barren rock in the first reforestation scheme, 1950",t:"Free. Open daily. Follow footpath signs from Athalassa park.",c:["parks"],r:"g",nn:"Δάσος Αγίας Νάπας — Αθαλάσσα",ns:"Ένα πευκόδασος 20 λεπτά από την πόλη — σιωπή, πουλιά, μοναστηριακά ερείπια",nst:"Το δάσος Αθαλάσσας περιέχει ώριμες φυτείες πεύκων και ερείπια μοναστηριού.",nt:"Δωρεάν. Ανοιχτό καθημερινά."},
  {id:26,n:"Liberty Monument — Walled City",a:"Walled City",v:["history","weird","free"],d:5,s:"1973 EOKA liberation monument where bronze prisoners emerge from stone chains — so-bad-it\'s-great public art",st:"The Liberty Monument on the Podocattaro Bastion shows a woman breaking chains as EOKA fighters and civilians emerge from prison below. The symbolism is maximalist. The setting on the Venetian walls is extraordinary.",im:"Time-travel: the monument\'s unveiling in 1973, the year before the Turkish invasion that would divide the city",t:"Free. On the Venetian walls near the Pafos Gate end.",c:["history_big"],r:"g",nn:"Μνημείο Ελευθερίας — Τειχισμένη Πόλη",ns:"Μνημείο ΕΟΚΑ του 1973 όπου χάλκινοι αιχμάλωτοι αναδύονται από πέτρινες αλυσίδες",nst:"Το Μνημείο Ελευθερίας στο Προμαχώνα Ποδοκάτταρο δείχνει μια γυναίκα να σπάζει αλυσίδες καθώς μαχητές ΕΟΚΑ αναδύονται από φυλακή.",nt:"Δωρεάν. Στα ενετικά τείχη κοντά στην Πύλη της Πάφου."},
  {id:27,n:"Yuri Gagarin Bust — Walled City",a:"Walled City",v:["weird","hidden","history"],d:5,s:"A Soviet-era bust of the first cosmonaut in a Nicosia municipal park — why is this here? That\'s the whole point",st:"The Municipal Gardens have a bronze bust of Yuri Gagarin with a Russian inscription, donated by the Soviet Union in 1961. Cyprus was non-aligned. The cold war was everywhere. Nobody seems to notice it anymore.",im:"Time-travel: the Soviet delegation presenting this bust to the Cypriot government in 1961, Cold War diplomacy as bronze",t:"Free. Municipal Gardens near the Eleftheria Square end. Look for the Russian text.",c:["weird"],r:"g",nn:"Προτομή Γιούρι Γκαγκάριν — Τειχισμένη Πόλη",ns:"Σοβιετική προτομή του πρώτου κοσμοναύτη σε δημοτικό πάρκο — γιατί βρίσκεται εδώ;",nst:"Ο Δημοτικός Κήπος έχει μια χάλκινη προτομή του Γκαγκάριν με ρωσική επιγραφή, δωρεά της Σοβιετικής Ένωσης το 1961.",nt:"Δωρεάν. Δημοτικοί Κήποι κοντά στην Πλατεία Ελευθερίας."},
  {id:28,n:"Leventis Municipal Museum — Laiki Yitonia",a:"Laiki Yitonia",v:["history","free","hidden"],d:15,s:"Free city history museum inside a traditional townhouse — 9,000 years of Nicosia in beautiful small rooms",st:"The Leventis Museum covers Nicosia from Neolithic settlement to the present. The building itself is a restored traditional Cypriot house. The collection is small, excellent and free. Award-winning and almost empty.",im:"Time-travel: the Lusignan rulers of medieval Nicosia in this same district, 1300 — this neighbourhood unchanged in plan",t:"Free. 17 Ippokratous Street, Laiki Yitonia. Closed Mondays.",c:["free_museum"],r:"g",nn:"Δημοτικό Μουσείο Λεβέντη — Λαϊκή Γειτονιά",ns:"Δωρεάν μουσείο ιστορίας της πόλης — 9.000 χρόνια Λευκωσίας σε όμορφα μικρά δωμάτια",nst:"Το Μουσείο Λεβέντη καλύπτει τη Λευκωσία από τη νεολιθική εποχή μέχρι σήμερα. Βραβευμένο και σχεδόν άδειο.",nt:"Δωρεάν. Ιπποκράτους 17, Λαϊκή Γειτονιά. Κλειστό Δευτέρες."},
  {id:29,n:"Cyprus Police Museum — Pafos Gate",a:"Pafos Gate",v:["weird","history","hidden"],d:15,s:"The colonial-era police museum inside Police HQ — uniforms, vehicles and Cypriot crime history since 1878",st:"The Cyprus Police Museum began as a colonial curiosity cabinet in the British era. Now it has 140 years of Cypriot law enforcement history — uniforms, weapons seized, court documents and a 1930s police car. Free and almost unknown.",im:"Time-travel: the British colonial police force establishing order in Nicosia in 1879, new uniforms, strange island",t:"Free. Inside Police Headquarters on Evangelou Floraki Street.",c:["free_museum"],r:"g",nn:"Αστυνομικό Μουσείο Κύπρου — Πύλη Πάφου",ns:"Το αποικιακό αστυνομικό μουσείο εντός της Αστυνομικής Διεύθυνσης — στολές, οχήματα και ιστορία εγκλήματος",nst:"Το Αστυνομικό Μουσείο Κύπρου ξεκίνησε ως αποικιακό περιέργειο βρετανικής εποχής. 140 χρόνια κυπριακής ιστορίας.",nt:"Δωρεάν. Εντός της Αστυνομικής Διεύθυνσης, οδός Ευαγγέλου Φλωράκη."},
  {id:30,n:"Pedieos Linear Park Walk — Engomi",a:"Engomi",v:["nature","local","free"],d:60,s:"A 10km riverside greenway through the city — Nicosia\'s secret long walk, barely a tourist in sight",st:"The Pedieos river has been converted into a 10km linear park from the Municipal Gardens to the suburbs. Cycling and walking path, planted with local trees. On weekday mornings it is almost empty. The city\'s best free walk.",im:"Time-travel: the Pedieos as Nicosia\'s working river in the medieval period, city walls reflected in its water",t:"Free. Enter from the Municipal Gardens near the old town. Full walk 2-3 hours.",c:["parks"],r:"g",nn:"Γραμμικό Πάρκο Πεδιαίου — Εγκωμή",ns:"Μια πράσινη διαδρομή 10 χλμ κατά μήκος του ποταμού — η μυστική μεγάλη βόλτα της Λευκωσίας",nst:"Ο Πεδιαίος έχει μετατραπεί σε γραμμικό πάρκο 10 χλμ από τους Δημοτικούς Κήπους μέχρι τα προάστια.",nt:"Δωρεάν. Είσοδος από τους Δημοτικούς Κήπους. Πλήρης βόλτα 2-3 ώρες."},
  {id:31,n:"Agios Sozomenos Abandoned Village — Larnaca Road",a:"Larnaca Road",v:["abandoned","history","weird"],d:30,s:"A ghost village 10km outside Nicosia — abandoned in 1974, the church still standing, empty since",st:"Agios Sozomenos was a mixed village abandoned during the 1974 conflict. The Gothic church of Saint Sozomenos from the Lusignan era is still intact among the ruins. Wild plants grow through the village. No one is there.",im:"Time-travel: the village in 1973, the last year of normal life, families walking this square before everything changed",t:"Free. Drive or taxi 10km from Nicosia toward Latsia. Ask for the Lusignan church.",c:["abandoned"],r:"g",nn:"Εγκαταλελειμμένο χωριό Αγίου Σωζομένου — Οδός Λάρνακας",ns:"Ένα φάντασμα χωριό 10 χλμ έξω από τη Λευκωσία — εγκαταλελειμμένο το 1974",nst:"Ο Άγιος Σωζόμενος ήταν ένα μεικτό χωριό που εγκαταλείφθηκε κατά τη σύγκρουση του 1974. Η γοτθική εκκλησία παραμένει άθικτη.",nt:"Δωρεάν. Αυτοκίνητο ή ταξί 10 χλμ από Λευκωσία προς Λατσιά."},
  {id:32,n:"Venetian Walls Walk — Walled City #32",a:"Walled City",v:["history","beautiful","local"],d:45,s:"Walk the complete circuit of the 16th-century Venetian walls — the best-preserved in the world",st:"The Venetian walls of Nicosia were built 1567–1570, a perfectly circular fortification with 11 heart-shaped bastions. You can walk the entire 4.5 km circuit on top of the walls for free. The divided city is visible from every point.",im:"Time-travel: Venetian engineers demolishing medieval churches to build new walls in time, 1567",t:"Free always. Enter from any of the 3 gates. Full circuit takes 45 minutes.",c:["history_big"],r:"g",nn:"Ενετικά Τείχη — Τειχισμένη Πόλη #32",ns:"Περίπατος στα βενετικά τείχη του 16ου αιώνα",nst:"Τα βενετικά τείχη χτίστηκαν το 1567–1570, ένα τέλεια κυκλικό οχυρό.",nt:"Πάντα δωρεάν. Είσοδος από οποιαδήποτε από τις 3 πύλες."},
  {id:33,n:"Büyük Han Great Inn — Walled City #33",a:"Walled City",v:["history","architecture","hidden"],d:12,s:"The finest Ottoman caravanserai in Cyprus — a working cultural centre inside a 1572 inn",st:"The Great Inn was built in 1572 by the Ottomans as a caravanserai for merchants. Today the courtyard houses craft workshops and a café. The architecture — 68 rooms around an octagonal fountain — is extraordinary.",im:"Time-travel: caravans arriving at dusk, merchants unloading spices and silk in this courtyard, 1590",t:"Free to enter the courtyard. Open daily.",c:["high_spots"],r:"g",nn:"Μπουγιούκ Χαν — Τειχισμένη Πόλη #33",ns:"Το πιο εντυπωσιακό οθωμανικό καραβανσεράι στην Κύπρο",nst:"Χτίστηκε το 1572 από τους Οθωμανούς ως καραβανσεράι για εμπόρους.",nt:"Ελεύθερη είσοδος στην αυλή. Ανοιχτό καθημερινά."},
  {id:34,n:"Ledra Street Crossing — Nicosia Buffer Zone #34",a:"Nicosia Buffer Zone",v:["history","weird","local"],d:6,s:"Walk through the crossing point between Greek and Turkish Cyprus — divided city, united street",st:"The Ledra Street crossing opened in 2008. With a valid passport you can walk between the two sides in seconds. The UN buffer zone — the Green Line — runs through the heart of Nicosia past abandoned houses.",im:"Time-travel: the barricades going up on this street in 1974, neighbours suddenly separated by sandbags",t:"Free with passport. Open daily. You can cross and return.",c:["parks"],r:"g",nn:"Πέρασμα Οδού Λήδρας — Νεκρή Ζώνη #34",ns:"Διέλθετε από το σύνορο μεταξύ ελληνικής και τουρκικής Κύπρου",nst:"Το πέρασμα Λήδρας άνοιξε το 2008.",nt:"Δωρεάν με διαβατήριο. Ανοιχτό καθημερινά."},
  {id:35,n:"Buffer Zone Ghost Buildings — Nicosia Buffer Zone #35",a:"Nicosia Buffer Zone",v:["abandoned","weird","history"],d:52,s:"Look into the UN buffer zone from rooftops — a ghost street frozen since 1974",st:"Several buildings along the buffer zone offer views into no-man\'s-land. The Shacolas Tower Observatory gives the clearest view of both sides and the abandoned ground floor buildings below.",im:"Time-travel: these streets full of shoppers and café tables, the day before the division, July 1974",t:"Shacolas Observatory: small fee (€2). Street views free from rooftop cafés.",c:["courtyards"],r:"g",nn:"Εγκαταλελειμμένα Κτήρια — Νεκρά Ζώνη #35",ns:"Κοιτάξτε μέσα στη νεκρή ζώνη — μια φαντασματική οδός παγωμένη από το 1974",nst:"Κτήρια κατά μήκος της νεκρής ζώνης προσφέρουν θέα στη no-man\'s-land.",nt:"Παρατηρητήριο: μικρό τέλος (2 €). Δρόμος δωρεάν."},
  {id:36,n:"Laiki Yitonia Quarter — Laiki Yitonia #36",a:"Laiki Yitonia",v:["local","architecture","beautiful"],d:22,s:"The restored traditional quarter inside the Famagusta Gate — craft shops, old houses, cats",st:"Laiki Yitonia (the popular neighbourhood) was restored in the 1980s as a pedestrian quarter with Ottoman and colonial-era houses. It is walkable, full of Cypriot craft shops, and free.",im:"Time-travel: this quarter as a working-class neighbourhood of craftsmen and market traders, 1900",t:"Free to walk. Shops open Mon–Sat.",c:["romantic_water"],r:"g",nn:"Λαϊκή Γειτονιά — Λαϊκή Γειτονιά #36",ns:"Η αποκατεστημένη παραδοσιακή συνοικία",nst:"Η Λαϊκή Γειτονιά αποκαταστάθηκε τη δεκαετία του 1980.",nt:"Δωρεάν περπάτημα. Καταστήματα Δε–Σα."},
  {id:37,n:"Famagusta Gate — Walled City #37",a:"Walled City",v:["history","architecture","beautiful"],d:20,s:"The most imposing of the three Venetian city gates — a perfect arched tunnel through 10 metres of wall",st:"The Famagusta Gate was built in 1567 as the main eastern entrance to the city. The vaulted passage is 10 metres long. The interior chamber is used for exhibitions and concerts.",im:"Time-travel: Venetian soldiers guarding this gate against Ottoman advance, 1570",t:"Free. Interior open when exhibitions run.",c:["scary"],r:"g",nn:"Πύλη Αμμοχώστου — Τειχισμένη Πόλη #37",ns:"Η πιο επιβλητική από τις τρεις βενετικές πύλες",nst:"Η Πύλη Αμμοχώστου χτίστηκε το 1567.",nt:"Δωρεάν. Εσωτερικό ανοιχτό κατά εκθέσεις."},
  {id:38,n:"Athalassa National Forest Park — Athalassa #38",a:"Athalassa",v:["nature","local","quiet"],d:19,s:"A 1400-hectare forest park inside the city — lakes, flamingos, cycling tracks, and silence",st:"Athalassa is one of Europe\'s largest urban forest parks. Two lakes attract flamingos and migrating birds. Cycling trails circle the lakes. Almost no tourists visit. Locals jog and picnic here year-round.",im:"Time-travel: this area as dry scrubland before one million trees were planted here, 1960",t:"Free. Open daily. Bus from Nicosia centre (40 min).",c:["famous_dead"],r:"g",nn:"Δασικό Πάρκο Αθαλάσσας — Αθαλάσσα #38",ns:"Ένα πάρκο 1400 εκταρίων εντός της πόλης — λίμνες, φλαμίνγκο, ποδηλατοδρόμοι",nst:"Η Αθαλάσσα είναι ένα από τα μεγαλύτερα αστικά δάση της Ευρώπης.",nt:"Δωρεάν. Ανοιχτό καθημερινά."},
  {id:39,n:"Agios Ioannis Cathedral — Walled City #39",a:"Walled City",v:["history","architecture","beautiful"],d:13,s:"Nicosia\'s oldest standing church — Byzantine frescoes covering every wall and ceiling",st:"The Cathedral of Agios Ioannis was built in 1662. Inside, 18th-century frescoes cover every surface: the Last Judgement, the Apocalypse, and the history of Cyprus.",im:"Time-travel: the archbishop commissioning these frescoes to rival the Ottoman mosques, 1720",t:"Free. Open Mon–Fri morning, closed midday.",c:["street_art"],r:"g",nn:"Καθεδρικός Ναός Αγίου Ιωάννη — Τειχισμένη Πόλη #39",ns:"Η παλαιότερη εκκλησία της Λευκωσίας — βυζαντινές τοιχογραφίες",nst:"Ο Καθεδρικός Ναός Αγίου Ιωάννη κτίστηκε το 1662.",nt:"Δωρεάν. Δε–Πα πρωί, κλειστό μεσημέρι."},
  {id:40,n:"Cyprus Handicraft Centre — Engomi #40",a:"Engomi",v:["local","art","history"],d:52,s:"Government craft workshops teaching traditional Cypriot lace-making, weaving and pottery",st:"The Cyprus Handicraft Centre preserves traditional techniques under threat of extinction. Artisans work in open workshops: lefkaritika lace-making, silverwork, and basket weaving. Free to watch and browse.",im:"Time-travel: Cypriot women teaching daughters lace patterns that go back to Byzantine times, 1850",t:"Free. Open Mon–Fri during working hours.",c:["abandoned"],r:"g",nn:"Κυπριακές Χειροτεχνίες — Ενγκόμι #40",ns:"Κυβερνητικά εργαστήρια που διδάσκουν παραδοσιακή κυπριακή δαντέλα",nst:"Το Κέντρο Κυπριακών Χειροτεχνιών διατηρεί παραδοσιακές τεχνικές.",nt:"Δωρεάν. Δε–Πα κατά τις εργάσιμες ώρες."},
  {id:41,n:"Municipal Garden — Larnaca Road #41",a:"Larnaca Road",v:["local","nature","quiet"],d:11,s:"The city\'s oldest park with a small zoo, outdoor theatre, and afternoon chess players",st:"The Municipal Garden was laid out in 1940. A small zoo with deer and peacocks entertains children. Old men play tavli (backgammon) every afternoon.",im:"Time-travel: British colonial officers picnicking here while the old city baked in the heat, 1940",t:"Free. Open daily. Zoo free.",c:["free_museum"],r:"g",nn:"Δημοτικός Κήπος — Οδός Λάρνακας #41",ns:"Το παλαιότερο πάρκο της πόλης με μικρό ζωολογικό κήπο",nst:"Ο Δημοτικός Κήπος χαράχθηκε το 1940.",nt:"Δωρεάν. Ανοιχτό καθημερινά."},
  {id:42,n:"Dervis Pasha Mansion — Pafos Gate #42",a:"Pafos Gate",v:["history","architecture","hidden"],d:48,s:"The only surviving Ottoman mansion in the old city — a glimpse into pre-1974 mixed Nicosia",st:"The Dervis Pasha mansion is a two-storey Ottoman house from the 18th century, now a museum. The collection shows how Greek and Turkish Cypriot domestic life was intertwined before partition.",im:"Time-travel: the Ottoman editor Dervis Pasha writing his newspaper in this courtyard, 1800",t:"Small entry fee (€3). Open Tue–Fri.",c:["local_only"],r:"g",nn:"Έπαυλη Ντερβίς Πασά — Πύλη Πάφου #42",ns:"Η μοναδική σωζόμενη οθωμανική έπαυλη στην παλιά πόλη",nst:"Η έπαυλη Ντερβίς Πασά είναι ένα διώροφο οθωμανικό σπίτι από τον 18ο αιώνα.",nt:"Μικρό τέλος (3 €). Ανοιχτό Τρ–Πα."},
  {id:43,n:"Faneromeni Church Square — Walled City #43",a:"Walled City",v:["local","history","beautiful"],d:52,s:"The main square of the Greek Cypriot quarter — shaded, with a church, market and social life",st:"Faneromeni Square is the heart of the walled city for local Greeks. The neoclassical church, completed in 1886, faces a bustling morning market. Elderly couples sit in the shade throughout the afternoon.",im:"Time-travel: this square as the centre of Cypriot Greek life before independence, 1950",t:"Free always. Market in mornings, Mon–Sat.",c:["architecture"],r:"g",nn:"Πλατεία Φανερωμένης — Τειχισμένη Πόλη #43",ns:"Η κεντρική πλατεία της ελληνοκυπριακής συνοικίας",nst:"Η πλατεία Φανερωμένης είναι η καρδιά της τειχισμένης πόλης.",nt:"Πάντα δωρεάν."},
  {id:44,n:"Strovolos Saturday Market — Strovolos #44",a:"Strovolos",v:["local","free","hidden"],d:39,s:"The sprawling suburban market where Nicosia residents actually shop — fruit, fish and noise",st:"The Strovolos Saturday market is where Nicosia families do their weekly shopping: piles of halloumi, fresh coriander, preserved olives, and citrus from the Mesaoria plain. Few tourists ever find it.",im:"Time-travel: the village of Strovolos as a separate community before the city reached it, 1950",t:"Free. Saturdays only. Bus from centre (20 min).",c:["history_big"],r:"g",nn:"Λαϊκή Αγορά Στροβόλου — Στρόβολος #44",ns:"Η εκτεταμένη λαϊκή αγορά — φρούτα, ψάρι και θόρυβος",nst:"Η λαϊκή Στροβόλου είναι εκεί που οι οικογένειες κάνουν τις εβδομαδιαίες αγορές.",nt:"Δωρεάν. Μόνο Σάββατα."},
  {id:45,n:"Selimiye Mosque (Aya Sofya) — Walled City #45",a:"Walled City",v:["history","architecture","beautiful"],d:10,s:"A Gothic cathedral converted to a mosque — Gothic arches and Ottoman minarets in one building",st:"The Cathedral of Saint Sophia was built 1209–1326 in French Gothic style. After the Ottoman conquest of 1571, minarets were added and it became the Selimiye Mosque. Both architectural eras are visible simultaneously.",im:"Time-travel: the Ottoman commander ordering the Christian images covered inside this cathedral, 1571",t:"Free to visit when not in prayer. Remove shoes. Cross via Ledra crossing.",c:["high_spots"],r:"g",nn:"Τζαμί Σελιμιγιέ — Τειχισμένη Πόλη #45",ns:"Γοτθικός καθεδρικός ναός μετατραπείς σε τζαμί",nst:"Κτίστηκε 1209–1326 σε γαλλικό γοτθικό ρυθμό. Μετατράπηκε σε τζαμί το 1571.",nt:"Δωρεάν εκτός ώρας προσευχής. Βγάλτε παπούτσια."},
  {id:46,n:"Chrysaliniotissa Arts Quarter — Walled City #46",a:"Walled City",v:["local","art","hidden"],d:42,s:"The oldest neighbourhood in the walled city — craftsmen, artists, and the oldest church in Nicosia",st:"Chrysaliniotissa is a semi-restored quarter of traditional houses, workshops, and the 15th-century Chrysaliniotissa Church. Artists have colonised the old houses. The neighbourhood feels transitional — not yet gentrified.",im:"Time-travel: this as the workshop district for generations of Nicosia craftsmen, 1900",t:"Free always.",c:["parks"],r:"g",nn:"Χρυσαλινιώτισσα — Τειχισμένη Πόλη #46",ns:"Η παλαιότερη γειτονιά — τεχνίτες, καλλιτέχνες, η παλαιότερη εκκλησία",nst:"Η Χρυσαλινιώτισσα είναι μια ημι-αποκατεστημένη συνοικία.",nt:"Πάντα δωρεάν."},
  {id:47,n:"Bandabulya Market Hall — Walled City #47",a:"Walled City",v:["local","history","architecture"],d:32,s:"The Ottoman covered market — halloumi sellers, coffee traders, and high vaulted arches",st:"The Bandabulya is an Ottoman-era covered market hall. It is more atmospheric than busy — a few cheese and meat vendors, a coffee stall, and the high vaulted arches of the original building.",im:"Time-travel: the market full of traders selling Syrian silk, Egyptian cotton, and Cypriot carob, 1800",t:"Free. Open Mon–Sat mornings.",c:["courtyards"],r:"g",nn:"Μπαντάμπουλια — Τειχισμένη Πόλη #47",ns:"Η οθωμανική στεγασμένη αγορά",nst:"Το Μπαντάμπουλια είναι μια οθωμανική στεγασμένη αγορά.",nt:"Δωρεάν. Δε–Σα πρωί."},
  {id:48,n:"Phaneromeni Library — Walled City #48",a:"Walled City",v:["hidden","architecture","quiet"],d:7,s:"The oldest public library in Cyprus — still operating in its original 1893 building",st:"The Phaneromeni Library was established in 1893 and still operates from its original neoclassical building. An extraordinary survival: card catalogues, old Greek periodicals, and absolute silence.",im:"Time-travel: the library opening to an excited literate population, the first public books in Nicosia, 1893",t:"Free. Open Mon–Fri.",c:["romantic_water"],r:"g",nn:"Βιβλιοθήκη Φανερωμένης — Τειχισμένη Πόλη #48",ns:"Η παλαιότερη δημόσια βιβλιοθήκη της Κύπρου",nst:"Η Βιβλιοθήκη Φανερωμένης ιδρύθηκε το 1893.",nt:"Δωρεάν. Δε–Πα."},
  {id:49,n:"Pafos Gate Bastion — Pafos Gate #49",a:"Pafos Gate",v:["history","architecture","local"],d:6,s:"The western gate of the Venetian walls where the buffer zone meets the city",st:"The Pafos Gate area is where the UN Buffer Zone reaches the western wall. The gate itself is a massive Venetian arch. The neighbourhood is a hybrid — some restored, some abandoned, very few tourists.",im:"Time-travel: the city council debating development beyond this gate as the city modernised, 1950",t:"Free. Walk the bastion walls for a close look at both sides of the city.",c:["scary"],r:"g",nn:"Πύλη Πάφου — Πύλη Πάφου #49",ns:"Η δυτική πύλη όπου η νεκρή ζώνη συναντά την πόλη",nst:"Η Πύλη Πάφου βρίσκεται εκεί που η Νεκρά Ζώνη φτάνει στο δυτικό τείχος.",nt:"Δωρεάν. Περπατήστε τα τείχη."},
  {id:50,n:"Agios Antonios Arts District — Larnaca Road #50",a:"Larnaca Road",v:["local","art","hidden"],d:10,s:"Nicosia\'s small arts district — independent galleries, coffee bars, and young Cypriot designers",st:"The Agios Antonios area outside the walls has become Nicosia\'s creative neighbourhood. Small independent galleries, design studios, and the best coffee in the city. It feels like a Mediterranean Prenzlauer Berg.",im:"Time-travel: this as an unremarkable suburb before young Nicosians started opening studios here, 2010",t:"Free to walk. Galleries open afternoons. Best Thur–Sat evenings.",c:["famous_dead"],r:"g",nn:"Περιοχή Αγίου Αντωνίου — Οδός Λάρνακας #50",ns:"Η μικρή καλλιτεχνική συνοικία της Λευκωσίας",nst:"Η περιοχή Αγίου Αντωνίου έχει γίνει η δημιουργική γειτονιά.",nt:"Δωρεάν. Γκαλερί απογεύματα. Καλύτερα Πεμ–Σα."},
  {id:51,n:"Athalassa Lake Flamingos — Athalassa #51",a:"Athalassa",v:["nature","local","hidden"],d:18,s:"Winter flamingos on a lake inside the city — one of Cyprus\'s best bird-watching spots",st:"The smaller lake at Athalassa is a flamingo stop-over on the East African–West Asian flyway. From October to March, hundreds of flamingos feed here. An extraordinary sight 10 minutes from the city centre.",im:"Time-travel: the flamingos arriving on this lake centuries before the city existed, as they always have",t:"Free. Open daily. Best October–March, early morning.",c:["street_art"],r:"g",nn:"Φλαμίνγκο Λίμνης Αθαλάσσας — Αθαλάσσα #51",ns:"Χειμερινά φλαμίνγκο στη λίμνη εντός της πόλης",nst:"Η μικρή λίμνη στην Αθαλάσσα είναι σταθμός φλαμίνγκο.",nt:"Δωρεάν. Καλύτερα Οκτ–Μαρ, πρωί."},
  {id:52,n:"Eleftheria Square — Walled City #52",a:"Walled City",v:["architecture","beautiful","local"],d:19,s:"Nicosia\'s new civic gateway — Zaha Hadid\'s bridge sculptures spanning the Venetian moat",st:"Eleftheria Square was redesigned by Zaha Hadid (completed 2021). The white bridge-sculptures span the old Venetian moat and connect the modern city to the walls. Free to walk day or night.",im:"Time-travel: the old Venetian moat used as a bus terminal for 50 years before this redesign, 1970",t:"Free always.",c:["abandoned"],r:"g",nn:"Πλατεία Ελευθερίας — Τειχισμένη Πόλη #52",ns:"Η νέα αστική πύλη — γέφυρες-γλυπτά της Ζάχα Χαντίντ πάνω από την τάφρο",nst:"Η Πλατεία Ελευθερίας ανασχεδιάστηκε από τη Ζάχα Χαντίντ το 2021.",nt:"Πάντα δωρεάν."},
  {id:53,n:"Buyuk Hamam Ottoman Bath — Walled City #53",a:"Walled City",v:["history","architecture","weird"],d:37,s:"A working Ottoman bathhouse in a 14th-century Lusignan church — you can bathe for €12",st:"The Great Hamam was built inside the 14th-century Church of St George of the Latins after the Ottoman conquest. Cross-ribbed Gothic vaults rise above marble bathing platforms. Still operating as a hamam.",im:"Time-travel: Ottoman builders installing the heated marble platform beneath Gothic vaults, 1571",t:"Entry €12 for hamam experience. Exterior and courtyard free.",c:["free_museum"],r:"g",nn:"Μπουγιούκ Χαμάμ — Τειχισμένη Πόλη #53",ns:"Ένα λειτουργικό οθωμανικό χαμάμ σε εκκλησία του 14ου αιώνα",nst:"Γοτθικές καμάρες πάνω από μαρμάρινες πλατφόρμες μπάνιου.",nt:"Είσοδος 12 € για χαμάμ. Εξωτερικό δωρεάν."},
  {id:54,n:"Cyprus Museum — Strovolos #54",a:"Strovolos",v:["history","architecture","local"],d:43,s:"Cyprus\'s national museum — the finest collection of Cypriot antiquities anywhere",st:"The Cyprus Museum was founded in 1882 and holds the finest collection of Cypriot antiquities. The neoclassical building and courtyard are impressive. The Aphrodite of Soloi and Bronze Age collections are extraordinary.",im:"Time-travel: British archaeologists excavating Bronze Age tombs and bringing everything here, 1890",t:"Entry €4.50. Courtyard/exterior free.",c:["local_only"],r:"g",nn:"Μουσείο Κύπρου — Στρόβολος #54",ns:"Το εθνικό μουσείο με την πιο σπουδαία συλλογή κυπριακών αρχαιοτήτων",nst:"Το Μουσείο Κύπρου ιδρύθηκε το 1882.",nt:"Είσοδος 4,50 €. Εξωτερικό δωρεάν."},
  {id:55,n:"Pafos Gate Moat Garden — Pafos Gate #55",a:"Pafos Gate",v:["nature","hidden","local"],d:6,s:"The restored Venetian moat below the Paphos Gate — now a wild garden with cats and historians",st:"The dry moat of the Venetian walls around the Pafos Gate has been partially restored as a garden path. Walk it at dusk. The scale of the fortification engineering becomes clear at ground level.",im:"Time-travel: the moat as a first line of defence against the Ottoman fleet, 1570",t:"Free. Access from the road below the Pafos Gate walls.",c:["architecture"],r:"g",nn:"Κήπος Τάφρου Πάφου — Πύλη Πάφου #55",ns:"Η αποκατεστημένη ενετική τάφρος — τώρα ένας κήπος",nst:"Η ξηρά τάφρος γύρω από την Πύλη Πάφου έχει αποκατασταθεί.",nt:"Δωρεάν."},
  {id:56,n:"Agia Napa Forest Walk — Athalassa #56",a:"Athalassa",v:["nature","quiet","hidden"],d:40,s:"A pine forest 20 minutes from the city — silence, birds, and monastery ruins",st:"The Athalassa forest contains mature pine plantations, a small reservoir, and the ruins of the Agia Napa monastery chapel. Walking trails loop through the forest. An extraordinary urban escape.",im:"Time-travel: foresters planting these pines on barren rock in the first reforestation scheme, 1950",t:"Free. Open daily. Follow footpath signs from Athalassa park.",c:["history_big"],r:"g",nn:"Δάσος Αγίας Νάπας — Αθαλάσσα #56",ns:"Ένα πευκόδασος 20 λεπτά από την πόλη — σιωπή, πουλιά, μοναστηριακά ερείπια",nst:"Το δάσος Αθαλάσσας περιέχει ώριμες φυτείες πεύκων και ερείπια μοναστηριού.",nt:"Δωρεάν. Ανοιχτό καθημερινά."},
  {id:57,n:"Liberty Monument — Walled City #57",a:"Walled City",v:["history","weird","free"],d:17,s:"1973 EOKA liberation monument where bronze prisoners emerge from stone chains — so-bad-it\'s-great public art",st:"The Liberty Monument on the Podocattaro Bastion shows a woman breaking chains as EOKA fighters and civilians emerge from prison below. The symbolism is maximalist. The setting on the Venetian walls is extraordinary.",im:"Time-travel: the monument\'s unveiling in 1973, the year before the Turkish invasion that would divide the city",t:"Free. On the Venetian walls near the Pafos Gate end.",c:["high_spots"],r:"g",nn:"Μνημείο Ελευθερίας — Τειχισμένη Πόλη #57",ns:"Μνημείο ΕΟΚΑ του 1973 όπου χάλκινοι αιχμάλωτοι αναδύονται από πέτρινες αλυσίδες",nst:"Το Μνημείο Ελευθερίας στο Προμαχώνα Ποδοκάτταρο δείχνει μια γυναίκα να σπάζει αλυσίδες καθώς μαχητές ΕΟΚΑ αναδύονται από φυλακή.",nt:"Δωρεάν. Στα ενετικά τείχη κοντά στην Πύλη της Πάφου."},
  {id:58,n:"Yuri Gagarin Bust — Walled City #58",a:"Walled City",v:["weird","hidden","history"],d:50,s:"A Soviet-era bust of the first cosmonaut in a Nicosia municipal park — why is this here? That\'s the whole point",st:"The Municipal Gardens have a bronze bust of Yuri Gagarin with a Russian inscription, donated by the Soviet Union in 1961. Cyprus was non-aligned. The cold war was everywhere. Nobody seems to notice it anymore.",im:"Time-travel: the Soviet delegation presenting this bust to the Cypriot government in 1961, Cold War diplomacy as bronze",t:"Free. Municipal Gardens near the Eleftheria Square end. Look for the Russian text.",c:["parks"],r:"g",nn:"Προτομή Γιούρι Γκαγκάριν — Τειχισμένη Πόλη #58",ns:"Σοβιετική προτομή του πρώτου κοσμοναύτη σε δημοτικό πάρκο — γιατί βρίσκεται εδώ;",nst:"Ο Δημοτικός Κήπος έχει μια χάλκινη προτομή του Γκαγκάριν με ρωσική επιγραφή, δωρεά της Σοβιετικής Ένωσης το 1961.",nt:"Δωρεάν. Δημοτικοί Κήποι κοντά στην Πλατεία Ελευθερίας."},
  {id:59,n:"Leventis Municipal Museum — Laiki Yitonia #59",a:"Laiki Yitonia",v:["history","free","hidden"],d:46,s:"Free city history museum inside a traditional townhouse — 9,000 years of Nicosia in beautiful small rooms",st:"The Leventis Museum covers Nicosia from Neolithic settlement to the present. The building itself is a restored traditional Cypriot house. The collection is small, excellent and free. Award-winning and almost empty.",im:"Time-travel: the Lusignan rulers of medieval Nicosia in this same district, 1300 — this neighbourhood unchanged in plan",t:"Free. 17 Ippokratous Street, Laiki Yitonia. Closed Mondays.",c:["courtyards"],r:"g",nn:"Δημοτικό Μουσείο Λεβέντη — Λαϊκή Γειτονιά #59",ns:"Δωρεάν μουσείο ιστορίας της πόλης — 9.000 χρόνια Λευκωσίας σε όμορφα μικρά δωμάτια",nst:"Το Μουσείο Λεβέντη καλύπτει τη Λευκωσία από τη νεολιθική εποχή μέχρι σήμερα. Βραβευμένο και σχεδόν άδειο.",nt:"Δωρεάν. Ιπποκράτους 17, Λαϊκή Γειτονιά. Κλειστό Δευτέρες."},
  {id:60,n:"Cyprus Police Museum — Pafos Gate #60",a:"Pafos Gate",v:["weird","history","hidden"],d:49,s:"The colonial-era police museum inside Police HQ — uniforms, vehicles and Cypriot crime history since 1878",st:"The Cyprus Police Museum began as a colonial curiosity cabinet in the British era. Now it has 140 years of Cypriot law enforcement history — uniforms, weapons seized, court documents and a 1930s police car. Free and almost unknown.",im:"Time-travel: the British colonial police force establishing order in Nicosia in 1879, new uniforms, strange island",t:"Free. Inside Police Headquarters on Evangelou Floraki Street.",c:["romantic_water"],r:"g",nn:"Αστυνομικό Μουσείο Κύπρου — Πύλη Πάφου #60",ns:"Το αποικιακό αστυνομικό μουσείο εντός της Αστυνομικής Διεύθυνσης — στολές, οχήματα και ιστορία εγκλήματος",nst:"Το Αστυνομικό Μουσείο Κύπρου ξεκίνησε ως αποικιακό περιέργειο βρετανικής εποχής. 140 χρόνια κυπριακής ιστορίας.",nt:"Δωρεάν. Εντός της Αστυνομικής Διεύθυνσης, οδός Ευαγγέλου Φλωράκη."},
  {id:61,n:"Pedieos Linear Park Walk — Engomi #61",a:"Engomi",v:["nature","local","free"],d:39,s:"A 10km riverside greenway through the city — Nicosia\'s secret long walk, barely a tourist in sight",st:"The Pedieos river has been converted into a 10km linear park from the Municipal Gardens to the suburbs. Cycling and walking path, planted with local trees. On weekday mornings it is almost empty. The city\'s best free walk.",im:"Time-travel: the Pedieos as Nicosia\'s working river in the medieval period, city walls reflected in its water",t:"Free. Enter from the Municipal Gardens near the old town. Full walk 2-3 hours.",c:["scary"],r:"g",nn:"Γραμμικό Πάρκο Πεδιαίου — Εγκωμή #61",ns:"Μια πράσινη διαδρομή 10 χλμ κατά μήκος του ποταμού — η μυστική μεγάλη βόλτα της Λευκωσίας",nst:"Ο Πεδιαίος έχει μετατραπεί σε γραμμικό πάρκο 10 χλμ από τους Δημοτικούς Κήπους μέχρι τα προάστια.",nt:"Δωρεάν. Είσοδος από τους Δημοτικούς Κήπους. Πλήρης βόλτα 2-3 ώρες."},
  {id:62,n:"Agios Sozomenos Abandoned Village — Larnaca Road #62",a:"Larnaca Road",v:["abandoned","history","weird"],d:31,s:"A ghost village 10km outside Nicosia — abandoned in 1974, the church still standing, empty since",st:"Agios Sozomenos was a mixed village abandoned during the 1974 conflict. The Gothic church of Saint Sozomenos from the Lusignan era is still intact among the ruins. Wild plants grow through the village. No one is there.",im:"Time-travel: the village in 1973, the last year of normal life, families walking this square before everything changed",t:"Free. Drive or taxi 10km from Nicosia toward Latsia. Ask for the Lusignan church.",c:["famous_dead"],r:"g",nn:"Εγκαταλελειμμένο χωριό Αγίου Σωζομένου — Οδός Λάρνακας #62",ns:"Ένα φάντασμα χωριό 10 χλμ έξω από τη Λευκωσία — εγκαταλελειμμένο το 1974",nst:"Ο Άγιος Σωζόμενος ήταν ένα μεικτό χωριό που εγκαταλείφθηκε κατά τη σύγκρουση του 1974. Η γοτθική εκκλησία παραμένει άθικτη.",nt:"Δωρεάν. Αυτοκίνητο ή ταξί 10 χλμ από Λευκωσία προς Λατσιά."},
  {id:63,n:"Venetian Walls Walk — Walled City #63",a:"Walled City",v:["history","beautiful","local"],d:19,s:"Walk the complete circuit of the 16th-century Venetian walls — the best-preserved in the world",st:"The Venetian walls of Nicosia were built 1567–1570, a perfectly circular fortification with 11 heart-shaped bastions. You can walk the entire 4.5 km circuit on top of the walls for free. The divided city is visible from every point.",im:"Time-travel: Venetian engineers demolishing medieval churches to build new walls in time, 1567",t:"Free always. Enter from any of the 3 gates. Full circuit takes 45 minutes.",c:["street_art"],r:"g",nn:"Ενετικά Τείχη — Τειχισμένη Πόλη #63",ns:"Περίπατος στα βενετικά τείχη του 16ου αιώνα",nst:"Τα βενετικά τείχη χτίστηκαν το 1567–1570, ένα τέλεια κυκλικό οχυρό.",nt:"Πάντα δωρεάν. Είσοδος από οποιαδήποτε από τις 3 πύλες."},
  {id:64,n:"Büyük Han Great Inn — Walled City #64",a:"Walled City",v:["history","architecture","hidden"],d:33,s:"The finest Ottoman caravanserai in Cyprus — a working cultural centre inside a 1572 inn",st:"The Great Inn was built in 1572 by the Ottomans as a caravanserai for merchants. Today the courtyard houses craft workshops and a café. The architecture — 68 rooms around an octagonal fountain — is extraordinary.",im:"Time-travel: caravans arriving at dusk, merchants unloading spices and silk in this courtyard, 1590",t:"Free to enter the courtyard. Open daily.",c:["abandoned"],r:"g",nn:"Μπουγιούκ Χαν — Τειχισμένη Πόλη #64",ns:"Το πιο εντυπωσιακό οθωμανικό καραβανσεράι στην Κύπρο",nst:"Χτίστηκε το 1572 από τους Οθωμανούς ως καραβανσεράι για εμπόρους.",nt:"Ελεύθερη είσοδος στην αυλή. Ανοιχτό καθημερινά."},
  {id:65,n:"Ledra Street Crossing — Nicosia Buffer Zone #65",a:"Nicosia Buffer Zone",v:["history","weird","local"],d:42,s:"Walk through the crossing point between Greek and Turkish Cyprus — divided city, united street",st:"The Ledra Street crossing opened in 2008. With a valid passport you can walk between the two sides in seconds. The UN buffer zone — the Green Line — runs through the heart of Nicosia past abandoned houses.",im:"Time-travel: the barricades going up on this street in 1974, neighbours suddenly separated by sandbags",t:"Free with passport. Open daily. You can cross and return.",c:["free_museum"],r:"g",nn:"Πέρασμα Οδού Λήδρας — Νεκρή Ζώνη #65",ns:"Διέλθετε από το σύνορο μεταξύ ελληνικής και τουρκικής Κύπρου",nst:"Το πέρασμα Λήδρας άνοιξε το 2008.",nt:"Δωρεάν με διαβατήριο. Ανοιχτό καθημερινά."},
  {id:66,n:"Buffer Zone Ghost Buildings — Nicosia Buffer Zone #66",a:"Nicosia Buffer Zone",v:["abandoned","weird","history"],d:22,s:"Look into the UN buffer zone from rooftops — a ghost street frozen since 1974",st:"Several buildings along the buffer zone offer views into no-man\'s-land. The Shacolas Tower Observatory gives the clearest view of both sides and the abandoned ground floor buildings below.",im:"Time-travel: these streets full of shoppers and café tables, the day before the division, July 1974",t:"Shacolas Observatory: small fee (€2). Street views free from rooftop cafés.",c:["local_only"],r:"g",nn:"Εγκαταλελειμμένα Κτήρια — Νεκρά Ζώνη #66",ns:"Κοιτάξτε μέσα στη νεκρή ζώνη — μια φαντασματική οδός παγωμένη από το 1974",nst:"Κτήρια κατά μήκος της νεκρής ζώνης προσφέρουν θέα στη no-man\'s-land.",nt:"Παρατηρητήριο: μικρό τέλος (2 €). Δρόμος δωρεάν."},
  {id:67,n:"Laiki Yitonia Quarter — Laiki Yitonia #67",a:"Laiki Yitonia",v:["local","architecture","beautiful"],d:5,s:"The restored traditional quarter inside the Famagusta Gate — craft shops, old houses, cats",st:"Laiki Yitonia (the popular neighbourhood) was restored in the 1980s as a pedestrian quarter with Ottoman and colonial-era houses. It is walkable, full of Cypriot craft shops, and free.",im:"Time-travel: this quarter as a working-class neighbourhood of craftsmen and market traders, 1900",t:"Free to walk. Shops open Mon–Sat.",c:["architecture"],r:"g",nn:"Λαϊκή Γειτονιά — Λαϊκή Γειτονιά #67",ns:"Η αποκατεστημένη παραδοσιακή συνοικία",nst:"Η Λαϊκή Γειτονιά αποκαταστάθηκε τη δεκαετία του 1980.",nt:"Δωρεάν περπάτημα. Καταστήματα Δε–Σα."},
  {id:68,n:"Famagusta Gate — Walled City #68",a:"Walled City",v:["history","architecture","beautiful"],d:53,s:"The most imposing of the three Venetian city gates — a perfect arched tunnel through 10 metres of wall",st:"The Famagusta Gate was built in 1567 as the main eastern entrance to the city. The vaulted passage is 10 metres long. The interior chamber is used for exhibitions and concerts.",im:"Time-travel: Venetian soldiers guarding this gate against Ottoman advance, 1570",t:"Free. Interior open when exhibitions run.",c:["history_big"],r:"g",nn:"Πύλη Αμμοχώστου — Τειχισμένη Πόλη #68",ns:"Η πιο επιβλητική από τις τρεις βενετικές πύλες",nst:"Η Πύλη Αμμοχώστου χτίστηκε το 1567.",nt:"Δωρεάν. Εσωτερικό ανοιχτό κατά εκθέσεις."},
  {id:69,n:"Athalassa National Forest Park — Athalassa #69",a:"Athalassa",v:["nature","local","quiet"],d:15,s:"A 1400-hectare forest park inside the city — lakes, flamingos, cycling tracks, and silence",st:"Athalassa is one of Europe\'s largest urban forest parks. Two lakes attract flamingos and migrating birds. Cycling trails circle the lakes. Almost no tourists visit. Locals jog and picnic here year-round.",im:"Time-travel: this area as dry scrubland before one million trees were planted here, 1960",t:"Free. Open daily. Bus from Nicosia centre (40 min).",c:["high_spots"],r:"g",nn:"Δασικό Πάρκο Αθαλάσσας — Αθαλάσσα #69",ns:"Ένα πάρκο 1400 εκταρίων εντός της πόλης — λίμνες, φλαμίνγκο, ποδηλατοδρόμοι",nst:"Η Αθαλάσσα είναι ένα από τα μεγαλύτερα αστικά δάση της Ευρώπης.",nt:"Δωρεάν. Ανοιχτό καθημερινά."},
  {id:70,n:"Agios Ioannis Cathedral — Walled City #70",a:"Walled City",v:["history","architecture","beautiful"],d:49,s:"Nicosia\'s oldest standing church — Byzantine frescoes covering every wall and ceiling",st:"The Cathedral of Agios Ioannis was built in 1662. Inside, 18th-century frescoes cover every surface: the Last Judgement, the Apocalypse, and the history of Cyprus.",im:"Time-travel: the archbishop commissioning these frescoes to rival the Ottoman mosques, 1720",t:"Free. Open Mon–Fri morning, closed midday.",c:["parks"],r:"g",nn:"Καθεδρικός Ναός Αγίου Ιωάννη — Τειχισμένη Πόλη #70",ns:"Η παλαιότερη εκκλησία της Λευκωσίας — βυζαντινές τοιχογραφίες",nst:"Ο Καθεδρικός Ναός Αγίου Ιωάννη κτίστηκε το 1662.",nt:"Δωρεάν. Δε–Πα πρωί, κλειστό μεσημέρι."},
  {id:71,n:"Cyprus Handicraft Centre — Engomi #71",a:"Engomi",v:["local","art","history"],d:32,s:"Government craft workshops teaching traditional Cypriot lace-making, weaving and pottery",st:"The Cyprus Handicraft Centre preserves traditional techniques under threat of extinction. Artisans work in open workshops: lefkaritika lace-making, silverwork, and basket weaving. Free to watch and browse.",im:"Time-travel: Cypriot women teaching daughters lace patterns that go back to Byzantine times, 1850",t:"Free. Open Mon–Fri during working hours.",c:["courtyards"],r:"g",nn:"Κυπριακές Χειροτεχνίες — Ενγκόμι #71",ns:"Κυβερνητικά εργαστήρια που διδάσκουν παραδοσιακή κυπριακή δαντέλα",nst:"Το Κέντρο Κυπριακών Χειροτεχνιών διατηρεί παραδοσιακές τεχνικές.",nt:"Δωρεάν. Δε–Πα κατά τις εργάσιμες ώρες."},
  {id:72,n:"Municipal Garden — Larnaca Road #72",a:"Larnaca Road",v:["local","nature","quiet"],d:26,s:"The city\'s oldest park with a small zoo, outdoor theatre, and afternoon chess players",st:"The Municipal Garden was laid out in 1940. A small zoo with deer and peacocks entertains children. Old men play tavli (backgammon) every afternoon.",im:"Time-travel: British colonial officers picnicking here while the old city baked in the heat, 1940",t:"Free. Open daily. Zoo free.",c:["romantic_water"],r:"g",nn:"Δημοτικός Κήπος — Οδός Λάρνακας #72",ns:"Το παλαιότερο πάρκο της πόλης με μικρό ζωολογικό κήπο",nst:"Ο Δημοτικός Κήπος χαράχθηκε το 1940.",nt:"Δωρεάν. Ανοιχτό καθημερινά."},
  {id:73,n:"Dervis Pasha Mansion — Pafos Gate #73",a:"Pafos Gate",v:["history","architecture","hidden"],d:22,s:"The only surviving Ottoman mansion in the old city — a glimpse into pre-1974 mixed Nicosia",st:"The Dervis Pasha mansion is a two-storey Ottoman house from the 18th century, now a museum. The collection shows how Greek and Turkish Cypriot domestic life was intertwined before partition.",im:"Time-travel: the Ottoman editor Dervis Pasha writing his newspaper in this courtyard, 1800",t:"Small entry fee (€3). Open Tue–Fri.",c:["scary"],r:"g",nn:"Έπαυλη Ντερβίς Πασά — Πύλη Πάφου #73",ns:"Η μοναδική σωζόμενη οθωμανική έπαυλη στην παλιά πόλη",nst:"Η έπαυλη Ντερβίς Πασά είναι ένα διώροφο οθωμανικό σπίτι από τον 18ο αιώνα.",nt:"Μικρό τέλος (3 €). Ανοιχτό Τρ–Πα."},
  {id:74,n:"Faneromeni Church Square — Walled City #74",a:"Walled City",v:["local","history","beautiful"],d:14,s:"The main square of the Greek Cypriot quarter — shaded, with a church, market and social life",st:"Faneromeni Square is the heart of the walled city for local Greeks. The neoclassical church, completed in 1886, faces a bustling morning market. Elderly couples sit in the shade throughout the afternoon.",im:"Time-travel: this square as the centre of Cypriot Greek life before independence, 1950",t:"Free always. Market in mornings, Mon–Sat.",c:["famous_dead"],r:"g",nn:"Πλατεία Φανερωμένης — Τειχισμένη Πόλη #74",ns:"Η κεντρική πλατεία της ελληνοκυπριακής συνοικίας",nst:"Η πλατεία Φανερωμένης είναι η καρδιά της τειχισμένης πόλης.",nt:"Πάντα δωρεάν."},
  {id:75,n:"Strovolos Saturday Market — Strovolos #75",a:"Strovolos",v:["local","free","hidden"],d:18,s:"The sprawling suburban market where Nicosia residents actually shop — fruit, fish and noise",st:"The Strovolos Saturday market is where Nicosia families do their weekly shopping: piles of halloumi, fresh coriander, preserved olives, and citrus from the Mesaoria plain. Few tourists ever find it.",im:"Time-travel: the village of Strovolos as a separate community before the city reached it, 1950",t:"Free. Saturdays only. Bus from centre (20 min).",c:["street_art"],r:"g",nn:"Λαϊκή Αγορά Στροβόλου — Στρόβολος #75",ns:"Η εκτεταμένη λαϊκή αγορά — φρούτα, ψάρι και θόρυβος",nst:"Η λαϊκή Στροβόλου είναι εκεί που οι οικογένειες κάνουν τις εβδομαδιαίες αγορές.",nt:"Δωρεάν. Μόνο Σάββατα."},
  {id:76,n:"Selimiye Mosque (Aya Sofya) — Walled City #76",a:"Walled City",v:["history","architecture","beautiful"],d:53,s:"A Gothic cathedral converted to a mosque — Gothic arches and Ottoman minarets in one building",st:"The Cathedral of Saint Sophia was built 1209–1326 in French Gothic style. After the Ottoman conquest of 1571, minarets were added and it became the Selimiye Mosque. Both architectural eras are visible simultaneously.",im:"Time-travel: the Ottoman commander ordering the Christian images covered inside this cathedral, 1571",t:"Free to visit when not in prayer. Remove shoes. Cross via Ledra crossing.",c:["abandoned"],r:"g",nn:"Τζαμί Σελιμιγιέ — Τειχισμένη Πόλη #76",ns:"Γοτθικός καθεδρικός ναός μετατραπείς σε τζαμί",nst:"Κτίστηκε 1209–1326 σε γαλλικό γοτθικό ρυθμό. Μετατράπηκε σε τζαμί το 1571.",nt:"Δωρεάν εκτός ώρας προσευχής. Βγάλτε παπούτσια."},
  {id:77,n:"Chrysaliniotissa Arts Quarter — Walled City #77",a:"Walled City",v:["local","art","hidden"],d:26,s:"The oldest neighbourhood in the walled city — craftsmen, artists, and the oldest church in Nicosia",st:"Chrysaliniotissa is a semi-restored quarter of traditional houses, workshops, and the 15th-century Chrysaliniotissa Church. Artists have colonised the old houses. The neighbourhood feels transitional — not yet gentrified.",im:"Time-travel: this as the workshop district for generations of Nicosia craftsmen, 1900",t:"Free always.",c:["free_museum"],r:"g",nn:"Χρυσαλινιώτισσα — Τειχισμένη Πόλη #77",ns:"Η παλαιότερη γειτονιά — τεχνίτες, καλλιτέχνες, η παλαιότερη εκκλησία",nst:"Η Χρυσαλινιώτισσα είναι μια ημι-αποκατεστημένη συνοικία.",nt:"Πάντα δωρεάν."},
  {id:78,n:"Bandabulya Market Hall — Walled City #78",a:"Walled City",v:["local","history","architecture"],d:11,s:"The Ottoman covered market — halloumi sellers, coffee traders, and high vaulted arches",st:"The Bandabulya is an Ottoman-era covered market hall. It is more atmospheric than busy — a few cheese and meat vendors, a coffee stall, and the high vaulted arches of the original building.",im:"Time-travel: the market full of traders selling Syrian silk, Egyptian cotton, and Cypriot carob, 1800",t:"Free. Open Mon–Sat mornings.",c:["local_only"],r:"g",nn:"Μπαντάμπουλια — Τειχισμένη Πόλη #78",ns:"Η οθωμανική στεγασμένη αγορά",nst:"Το Μπαντάμπουλια είναι μια οθωμανική στεγασμένη αγορά.",nt:"Δωρεάν. Δε–Σα πρωί."},
  {id:79,n:"Phaneromeni Library — Walled City #79",a:"Walled City",v:["hidden","architecture","quiet"],d:10,s:"The oldest public library in Cyprus — still operating in its original 1893 building",st:"The Phaneromeni Library was established in 1893 and still operates from its original neoclassical building. An extraordinary survival: card catalogues, old Greek periodicals, and absolute silence.",im:"Time-travel: the library opening to an excited literate population, the first public books in Nicosia, 1893",t:"Free. Open Mon–Fri.",c:["architecture"],r:"g",nn:"Βιβλιοθήκη Φανερωμένης — Τειχισμένη Πόλη #79",ns:"Η παλαιότερη δημόσια βιβλιοθήκη της Κύπρου",nst:"Η Βιβλιοθήκη Φανερωμένης ιδρύθηκε το 1893.",nt:"Δωρεάν. Δε–Πα."},
  {id:80,n:"Pafos Gate Bastion — Pafos Gate #80",a:"Pafos Gate",v:["history","architecture","local"],d:29,s:"The western gate of the Venetian walls where the buffer zone meets the city",st:"The Pafos Gate area is where the UN Buffer Zone reaches the western wall. The gate itself is a massive Venetian arch. The neighbourhood is a hybrid — some restored, some abandoned, very few tourists.",im:"Time-travel: the city council debating development beyond this gate as the city modernised, 1950",t:"Free. Walk the bastion walls for a close look at both sides of the city.",c:["history_big"],r:"g",nn:"Πύλη Πάφου — Πύλη Πάφου #80",ns:"Η δυτική πύλη όπου η νεκρή ζώνη συναντά την πόλη",nst:"Η Πύλη Πάφου βρίσκεται εκεί που η Νεκρά Ζώνη φτάνει στο δυτικό τείχος.",nt:"Δωρεάν. Περπατήστε τα τείχη."},
  {id:81,n:"Agios Antonios Arts District — Larnaca Road #81",a:"Larnaca Road",v:["local","art","hidden"],d:11,s:"Nicosia\'s small arts district — independent galleries, coffee bars, and young Cypriot designers",st:"The Agios Antonios area outside the walls has become Nicosia\'s creative neighbourhood. Small independent galleries, design studios, and the best coffee in the city. It feels like a Mediterranean Prenzlauer Berg.",im:"Time-travel: this as an unremarkable suburb before young Nicosians started opening studios here, 2010",t:"Free to walk. Galleries open afternoons. Best Thur–Sat evenings.",c:["high_spots"],r:"g",nn:"Περιοχή Αγίου Αντωνίου — Οδός Λάρνακας #81",ns:"Η μικρή καλλιτεχνική συνοικία της Λευκωσίας",nst:"Η περιοχή Αγίου Αντωνίου έχει γίνει η δημιουργική γειτονιά.",nt:"Δωρεάν. Γκαλερί απογεύματα. Καλύτερα Πεμ–Σα."},
  {id:82,n:"Athalassa Lake Flamingos — Athalassa #82",a:"Athalassa",v:["nature","local","hidden"],d:27,s:"Winter flamingos on a lake inside the city — one of Cyprus\'s best bird-watching spots",st:"The smaller lake at Athalassa is a flamingo stop-over on the East African–West Asian flyway. From October to March, hundreds of flamingos feed here. An extraordinary sight 10 minutes from the city centre.",im:"Time-travel: the flamingos arriving on this lake centuries before the city existed, as they always have",t:"Free. Open daily. Best October–March, early morning.",c:["parks"],r:"g",nn:"Φλαμίνγκο Λίμνης Αθαλάσσας — Αθαλάσσα #82",ns:"Χειμερινά φλαμίνγκο στη λίμνη εντός της πόλης",nst:"Η μικρή λίμνη στην Αθαλάσσα είναι σταθμός φλαμίνγκο.",nt:"Δωρεάν. Καλύτερα Οκτ–Μαρ, πρωί."},
  {id:83,n:"Eleftheria Square — Walled City #83",a:"Walled City",v:["architecture","beautiful","local"],d:27,s:"Nicosia\'s new civic gateway — Zaha Hadid\'s bridge sculptures spanning the Venetian moat",st:"Eleftheria Square was redesigned by Zaha Hadid (completed 2021). The white bridge-sculptures span the old Venetian moat and connect the modern city to the walls. Free to walk day or night.",im:"Time-travel: the old Venetian moat used as a bus terminal for 50 years before this redesign, 1970",t:"Free always.",c:["courtyards"],r:"g",nn:"Πλατεία Ελευθερίας — Τειχισμένη Πόλη #83",ns:"Η νέα αστική πύλη — γέφυρες-γλυπτά της Ζάχα Χαντίντ πάνω από την τάφρο",nst:"Η Πλατεία Ελευθερίας ανασχεδιάστηκε από τη Ζάχα Χαντίντ το 2021.",nt:"Πάντα δωρεάν."},
  {id:84,n:"Buyuk Hamam Ottoman Bath — Walled City #84",a:"Walled City",v:["history","architecture","weird"],d:43,s:"A working Ottoman bathhouse in a 14th-century Lusignan church — you can bathe for €12",st:"The Great Hamam was built inside the 14th-century Church of St George of the Latins after the Ottoman conquest. Cross-ribbed Gothic vaults rise above marble bathing platforms. Still operating as a hamam.",im:"Time-travel: Ottoman builders installing the heated marble platform beneath Gothic vaults, 1571",t:"Entry €12 for hamam experience. Exterior and courtyard free.",c:["romantic_water"],r:"g",nn:"Μπουγιούκ Χαμάμ — Τειχισμένη Πόλη #84",ns:"Ένα λειτουργικό οθωμανικό χαμάμ σε εκκλησία του 14ου αιώνα",nst:"Γοτθικές καμάρες πάνω από μαρμάρινες πλατφόρμες μπάνιου.",nt:"Είσοδος 12 € για χαμάμ. Εξωτερικό δωρεάν."},
  {id:85,n:"Cyprus Museum — Strovolos #85",a:"Strovolos",v:["history","architecture","local"],d:21,s:"Cyprus\'s national museum — the finest collection of Cypriot antiquities anywhere",st:"The Cyprus Museum was founded in 1882 and holds the finest collection of Cypriot antiquities. The neoclassical building and courtyard are impressive. The Aphrodite of Soloi and Bronze Age collections are extraordinary.",im:"Time-travel: British archaeologists excavating Bronze Age tombs and bringing everything here, 1890",t:"Entry €4.50. Courtyard/exterior free.",c:["scary"],r:"g",nn:"Μουσείο Κύπρου — Στρόβολος #85",ns:"Το εθνικό μουσείο με την πιο σπουδαία συλλογή κυπριακών αρχαιοτήτων",nst:"Το Μουσείο Κύπρου ιδρύθηκε το 1882.",nt:"Είσοδος 4,50 €. Εξωτερικό δωρεάν."},
  {id:86,n:"Pafos Gate Moat Garden — Pafos Gate #86",a:"Pafos Gate",v:["nature","hidden","local"],d:7,s:"The restored Venetian moat below the Paphos Gate — now a wild garden with cats and historians",st:"The dry moat of the Venetian walls around the Pafos Gate has been partially restored as a garden path. Walk it at dusk. The scale of the fortification engineering becomes clear at ground level.",im:"Time-travel: the moat as a first line of defence against the Ottoman fleet, 1570",t:"Free. Access from the road below the Pafos Gate walls.",c:["famous_dead"],r:"g",nn:"Κήπος Τάφρου Πάφου — Πύλη Πάφου #86",ns:"Η αποκατεστημένη ενετική τάφρος — τώρα ένας κήπος",nst:"Η ξηρά τάφρος γύρω από την Πύλη Πάφου έχει αποκατασταθεί.",nt:"Δωρεάν."},
  {id:87,n:"Agia Napa Forest Walk — Athalassa #87",a:"Athalassa",v:["nature","quiet","hidden"],d:51,s:"A pine forest 20 minutes from the city — silence, birds, and monastery ruins",st:"The Athalassa forest contains mature pine plantations, a small reservoir, and the ruins of the Agia Napa monastery chapel. Walking trails loop through the forest. An extraordinary urban escape.",im:"Time-travel: foresters planting these pines on barren rock in the first reforestation scheme, 1950",t:"Free. Open daily. Follow footpath signs from Athalassa park.",c:["street_art"],r:"g",nn:"Δάσος Αγίας Νάπας — Αθαλάσσα #87",ns:"Ένα πευκόδασος 20 λεπτά από την πόλη — σιωπή, πουλιά, μοναστηριακά ερείπια",nst:"Το δάσος Αθαλάσσας περιέχει ώριμες φυτείες πεύκων και ερείπια μοναστηριού.",nt:"Δωρεάν. Ανοιχτό καθημερινά."},
  {id:88,n:"Liberty Monument — Walled City #88",a:"Walled City",v:["history","weird","free"],d:34,s:"1973 EOKA liberation monument where bronze prisoners emerge from stone chains — so-bad-it\'s-great public art",st:"The Liberty Monument on the Podocattaro Bastion shows a woman breaking chains as EOKA fighters and civilians emerge from prison below. The symbolism is maximalist. The setting on the Venetian walls is extraordinary.",im:"Time-travel: the monument\'s unveiling in 1973, the year before the Turkish invasion that would divide the city",t:"Free. On the Venetian walls near the Pafos Gate end.",c:["abandoned"],r:"g",nn:"Μνημείο Ελευθερίας — Τειχισμένη Πόλη #88",ns:"Μνημείο ΕΟΚΑ του 1973 όπου χάλκινοι αιχμάλωτοι αναδύονται από πέτρινες αλυσίδες",nst:"Το Μνημείο Ελευθερίας στο Προμαχώνα Ποδοκάτταρο δείχνει μια γυναίκα να σπάζει αλυσίδες καθώς μαχητές ΕΟΚΑ αναδύονται από φυλακή.",nt:"Δωρεάν. Στα ενετικά τείχη κοντά στην Πύλη της Πάφου."},
  {id:89,n:"Yuri Gagarin Bust — Walled City #89",a:"Walled City",v:["weird","hidden","history"],d:39,s:"A Soviet-era bust of the first cosmonaut in a Nicosia municipal park — why is this here? That\'s the whole point",st:"The Municipal Gardens have a bronze bust of Yuri Gagarin with a Russian inscription, donated by the Soviet Union in 1961. Cyprus was non-aligned. The cold war was everywhere. Nobody seems to notice it anymore.",im:"Time-travel: the Soviet delegation presenting this bust to the Cypriot government in 1961, Cold War diplomacy as bronze",t:"Free. Municipal Gardens near the Eleftheria Square end. Look for the Russian text.",c:["free_museum"],r:"g",nn:"Προτομή Γιούρι Γκαγκάριν — Τειχισμένη Πόλη #89",ns:"Σοβιετική προτομή του πρώτου κοσμοναύτη σε δημοτικό πάρκο — γιατί βρίσκεται εδώ;",nst:"Ο Δημοτικός Κήπος έχει μια χάλκινη προτομή του Γκαγκάριν με ρωσική επιγραφή, δωρεά της Σοβιετικής Ένωσης το 1961.",nt:"Δωρεάν. Δημοτικοί Κήποι κοντά στην Πλατεία Ελευθερίας."},
  {id:90,n:"Leventis Municipal Museum — Laiki Yitonia #90",a:"Laiki Yitonia",v:["history","free","hidden"],d:12,s:"Free city history museum inside a traditional townhouse — 9,000 years of Nicosia in beautiful small rooms",st:"The Leventis Museum covers Nicosia from Neolithic settlement to the present. The building itself is a restored traditional Cypriot house. The collection is small, excellent and free. Award-winning and almost empty.",im:"Time-travel: the Lusignan rulers of medieval Nicosia in this same district, 1300 — this neighbourhood unchanged in plan",t:"Free. 17 Ippokratous Street, Laiki Yitonia. Closed Mondays.",c:["local_only"],r:"g",nn:"Δημοτικό Μουσείο Λεβέντη — Λαϊκή Γειτονιά #90",ns:"Δωρεάν μουσείο ιστορίας της πόλης — 9.000 χρόνια Λευκωσίας σε όμορφα μικρά δωμάτια",nst:"Το Μουσείο Λεβέντη καλύπτει τη Λευκωσία από τη νεολιθική εποχή μέχρι σήμερα. Βραβευμένο και σχεδόν άδειο.",nt:"Δωρεάν. Ιπποκράτους 17, Λαϊκή Γειτονιά. Κλειστό Δευτέρες."},
  {id:91,n:"Cyprus Police Museum — Pafos Gate #91",a:"Pafos Gate",v:["weird","history","hidden"],d:29,s:"The colonial-era police museum inside Police HQ — uniforms, vehicles and Cypriot crime history since 1878",st:"The Cyprus Police Museum began as a colonial curiosity cabinet in the British era. Now it has 140 years of Cypriot law enforcement history — uniforms, weapons seized, court documents and a 1930s police car. Free and almost unknown.",im:"Time-travel: the British colonial police force establishing order in Nicosia in 1879, new uniforms, strange island",t:"Free. Inside Police Headquarters on Evangelou Floraki Street.",c:["architecture"],r:"g",nn:"Αστυνομικό Μουσείο Κύπρου — Πύλη Πάφου #91",ns:"Το αποικιακό αστυνομικό μουσείο εντός της Αστυνομικής Διεύθυνσης — στολές, οχήματα και ιστορία εγκλήματος",nst:"Το Αστυνομικό Μουσείο Κύπρου ξεκίνησε ως αποικιακό περιέργειο βρετανικής εποχής. 140 χρόνια κυπριακής ιστορίας.",nt:"Δωρεάν. Εντός της Αστυνομικής Διεύθυνσης, οδός Ευαγγέλου Φλωράκη."},
  {id:92,n:"Pedieos Linear Park Walk — Engomi #92",a:"Engomi",v:["nature","local","free"],d:10,s:"A 10km riverside greenway through the city — Nicosia\'s secret long walk, barely a tourist in sight",st:"The Pedieos river has been converted into a 10km linear park from the Municipal Gardens to the suburbs. Cycling and walking path, planted with local trees. On weekday mornings it is almost empty. The city\'s best free walk.",im:"Time-travel: the Pedieos as Nicosia\'s working river in the medieval period, city walls reflected in its water",t:"Free. Enter from the Municipal Gardens near the old town. Full walk 2-3 hours.",c:["history_big"],r:"g",nn:"Γραμμικό Πάρκο Πεδιαίου — Εγκωμή #92",ns:"Μια πράσινη διαδρομή 10 χλμ κατά μήκος του ποταμού — η μυστική μεγάλη βόλτα της Λευκωσίας",nst:"Ο Πεδιαίος έχει μετατραπεί σε γραμμικό πάρκο 10 χλμ από τους Δημοτικούς Κήπους μέχρι τα προάστια.",nt:"Δωρεάν. Είσοδος από τους Δημοτικούς Κήπους. Πλήρης βόλτα 2-3 ώρες."},
