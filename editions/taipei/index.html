const P = [
  {id:1,n:"Chiang Kai-shek Memorial Hall — Taiwan's grandest monument",a:"Zhongshan",v:["history", "architecture", "views"],d:60,s:"An imposing white marble hall built in 1980 honoring Chiang Kai-shek, featuring a massive bronze statue and hourly guard-changing ceremony.",st:"Walking through the cavernous 2,700-square-meter hall, I felt the weight of history pressing down from the vaulted ceiling. The hall's symmetrical neoclassical design was meant to inspire awe—and it works. Completed in 1980, it cost $350 million and stands as one of the world's largest traditional Chinese structures. The central statue of Chiang Kai-shek sits in contemplation, dressed in formal military uniform. The hourly changing of the guard, performed by soldiers in pristine uniforms, has become an iconic Taipei ritual. Each ceremony lasts 10 minutes and showcases a peculiar military choreography that draws curious crowds.",im:"Two honor guards in white dress uniforms, their movements synchronized like clockwork, lift their rifles in salute beneath soaring crimson pillars while the massive statue of Chiang Kai-shek watches from his marble throne.",t:"MRT Blue Line to Chiang Kai-shek Memorial Hall Station. Free admission. Best visited early morning or late afternoon. Guard ceremony at :00 and :30.",c:[],r:"g",nn:"中正紀念堂",ns:"台灣最宏偉的紀念堂，擁有龐大銅像和壯觀的衛兵交接儀式。",nst:"這座白色大理石大廳完成於1980年，是世界上最大的傳統中式建築之一。每小時一次的衛兵交接儀式已成為台北的標誌性活動。",nt:"乘坐捷運藍線到中正紀念堂站。免費參觀。上午或下午較佳。衛兵交接每整點和半點進行。"},
  {id:2,n:"Shilin Night Market — the bustling heart of street food culture",a:"Shilin",v:["food", "local", "night"],d:120,s:"Taiwan's most famous night market, sprawling across several blocks with over 500 stalls selling everything from stinky tofu to bubble tea.",st:"The sensory overload hits you immediately—the acrid smoke of grilled squid mixing with the sweet aroma of caramelizing sauce, vendors shouting prices, teenagers laughing in clusters. Shilin Night Market has been operating since 1909 and attracts 60,000 visitors daily. I navigated through the maze of stalls, watching old men flip oyster omelettes with practiced ease, seeing teenagers queue for 40 minutes for famous mango smoothies. The market's unofficial street food hierarchy is taken seriously here—everyone has opinions on which popcorn chicken stall reigns supreme. The crowds thin only after midnight.",im:"A vendor's weathered hands scoop steaming stinky tofu pieces into a paper cone while the night market glows with neon signs and the crowd flows like molten gold through the narrow alleys.",t:"MRT Red Line to Jiantan Station. Best visited after 6 PM, especially Thursday-Sunday. Go hungry. Bring small cash denominations.",c:[],r:"g",nn:"士林夜市",ns:"台灣最著名的夜市，有500多個攤位販賣街頭小食。",nst:"士林夜市自1909年營業至今，每天吸引6萬訪客。這裡有官方的街頭美食等級制度，人們對雞排攤位的選擇意見重大。",nt:"乘捷運紅線到劍潭站。下午6點後訪問最佳，尤其是週四至週日。帶現金小額鈔票。"},
  {id:3,n:"Taipei 101 — the icon piercing the sky",a:"Xinyi",v:["architecture", "views", "beautiful"],d:90,s:"A 508-meter supertall skyscraper completed in 2004, with an observation deck offering 360-degree views of the city.",st:"The elevator ascends 88 floors in 37 seconds. At the observation deck, Taipei sprawls beneath me like a circuit board illuminated at dusk, with the Tamsui River glinting gold and the mountains forming a protective backdrop. Designed by C.Y. Lee with bamboo as inspiration, the tower's proportions reference the number 8—considered auspicious in Chinese culture. Each segment is meant to look like a stalk of bamboo climbing toward heaven. On clear days, you can see all the way to the Taiwan Strait. I watched the sunset transform the city from gray to pink to deep purple, and realized this building isn't just about height—it's about perspective.",im:"The observation deck at sunset, with city lights beginning to sparkle below while distant mountains fade into indigo silhouettes and the entire metropolis becomes a glowing web.",t:"MRT Red/Nangang Line to Taipei 101/World Trade Center Station. Ticket: NT$600 for both observation decks. Go in late afternoon for sunset. The 88th floor gift shop is overpriced.",c:[],r:"g",nn:"台北101",ns:"完成於2004年的508米超高摩天大樓，設有觀景台。",nst:"電梯37秒內升至88樓。以竹子為靈感設計，每個分段代表竹子的一節。設計師李祖原融入了8這個幸運數字。",nt:"乘捷運紅線或南港線到台北101/世貿中心站。票價新台幣600元。下午晚時上去看日落最佳。"},
  {id:4,n:"Jiufen Old Street — lantern-lit village of nostalgia",a:"Jiufen",v:["history", "hidden", "local", "food"],d:120,s:"A historic hillside village preserved as a tourist attraction, famous for teahouses, red lanterns, and old-world charm.",st:"The narrow street climbs steeply, lined on both sides with wooden storefronts and red paper lanterns that glow at night. Jiufen was a tea-trading hub during the Japanese occupation (1895-1945), when merchants brought tea down from the mountains. Today, the street feels like stepping into a time capsule—though perhaps a carefully curated one. I ducked into a century-old teahouse where an elderly owner explained the art of gongfu tea, pouring tiny cups with ritualistic precision. The village inspired Miyazaki's \"Spirited Away\"—though locals debate this. Taro balls and peanut roll snacks are sold from every window, and the crowds can be overwhelming.",im:"Red paper lanterns casting amber light on weathered wooden eaves as steam rises from teapot spouts and tourists in narrow lanes create a living portrait of old Taiwan.",t:"Bus from Taipei Main Station (30 min, NT$15). Best visited on weekday mornings to avoid crushing crowds. Teahouses charge NT$150-300 for tea service. Steep cobblestone paths can be slippery.",c:[],r:"g",nn:"九份老街",ns:"保存完好的山區老村落，以茶館、紅燈籠和懷舊魅力著稱。",nst:"九份曾是日據時代（1895-1945）的茶葉交易樞紐。至今村街仍保留百年茶館，老闆以儀式般的精準倒茶。",nt:"從台北車站搭公車（30分鐘，新台幣15元）。平日上午訪問避免人潮。茶館收費新台幣150-300元。"},
  {id:5,n:"Dandingshan Mountain — verdant escape above the city",a:"Neihu",v:["nature", "views", "hidden"],d:90,s:"A 740-meter peak offering hiking trails and panoramic views of Taipei, easily accessible by MRT.",st:"The hiking trail begins innocuously enough but quickly transitions from urban park to genuine forest. The air thickens with moisture and the scent of earth. Within 40 minutes, I'd climbed above the smog layer and could see the entire Taipei basin spread out like a relief map. The summit is modest—just a platform with a few benches—but the perspective shift is profound. Nearby Elephant Mountain gets most of the tourist attention, but Dandingshan remains refreshingly quiet, populated mostly by older Taiwanese doing their morning constitutional. The trail is well-maintained with handrails.",im:"A lone hiker silhouetted against mist-shrouded mountains in the distance, the sprawling city far below disappearing into a haze of urban humidity.",t:"MRT Brown Line to Neihu Station, then bus or 15-min walk to trailhead. Hike takes 1.5-2 hours roundtrip. Start early to beat afternoon heat. Bring water.",c:[],r:"g",nn:"蛋蛋山",ns:"740米高峰，提供登山步道和台北全景。",nst:"步道從城市公園逐漸過渡為真正的森林。40分鐘內爬升至霧層上方，可俯瞰整個台北盆地。",nt:"乘捷運褐線到內湖站。往返需1.5-2小時。早起避開午後熱度。帶水。"},
  {id:6,n:"Yangminshan National Park — sulfurous moonscape in the north",a:"Beitou",v:["nature", "beautiful", "views"],d:120,s:"A volcanic national park with hot springs, hiking trails, and otherworldly geothermal landscapes.",st:"The park's sulfur vents release ghoulish yellow clouds that smell like ancient eggs. Walking the trails at dusk, the ground beneath my feet still radiates heat from the volcanic activity. Yangminshan's geology is active—the land here is literally still being shaped by forces underground. The park encompasses seven peaks and multiple hiking routes of varying difficulty. On clear days, you can see as far as the Pacific. I visited the Qingtian Valley where fumaroles (vents releasing geothermal steam) create an alien landscape. Local residents have harnessed the geothermal heat for hot springs since the Japanese colonial period.",im:"Wisps of yellow sulfurous steam rising from barren volcanic rock at golden hour, with the distant city barely visible through the haze below.",t:"Bus from Jiantan MRT Station (20 min). Multiple trailheads. Yangminshan Old Street has restaurants and souvenir shops. Bring sturdy shoes for uneven volcanic terrain.",c:[],r:"g",nn:"陽明山國家公園",ns:"火山國家公園，擁有溫泉、登山步道和地熱景觀。",nst:"公園的硫磺噴氣口釋放幽靈般的黃色雲霧。七座山峰和多條難度不同的登山路線。晴天時可遠眺太平洋。",nt:"從劍潭捷運站搭公車（20分鐘）。多個登山口。穿著牢固登山鞋。"},
  {id:7,n:"Temple of the Supreme Way — syncretic spirituality in old Taipei",a:"Dadaocheng",v:["history", "architecture", "local"],d:45,s:"A 220-year-old Taoist-Buddhist temple showcasing the spiritual eclecticism typical of Taiwanese folk religion.",st:"The temple was founded in 1804 during the Qing Dynasty, and the air inside is thick with incense smoke from a thousand daily offerings. The architecture blends Buddhist, Taoist, and Confucian symbolism with the ease of a syncretic tradition. I watched worshippers place jade tokens on altars, their prayers whispered to deities I didn't recognize but understood instinctively. The temple survived bombing during WWII and was meticulously restored. The main hall's ceiling is an explosion of gold leaf and hand-painted panels. Outside, the surrounding Dadaocheng neighborhood still functions as it did in the 1800s—a district of traditional herb shops, cloth merchants, and family businesses that have operated for generations.",im:"A elderly woman's weathered hands arranging fresh flowers before a golden altar while incense coils rise like prayers toward a painted ceiling.",t:"MRT Red Line to Taipei Main Station, walk 10 min north. Free admission. Respectfully observe worship protocols. Photography restricted in inner sanctum.",c:[],r:"g",nn:"道教廟",ns:"220年歷史的道教-佛教廟宇，展現台灣民間信仰的包容性。",nst:"廟宇建於1804年清朝時期，空氣中充滿香火。建築融合佛教、道教和儒家象徵。在二戰中倖存並經過精心修復。",nt:"乘捷運紅線到台北車站，向北步行10分鐘。免費參觀。尊重信仰儀式。內殿禁止拍照。"},
  {id:8,n:"Lin-An Taige Book Store — cathedral of literature",a:"Songshan",v:["hidden", "art", "architecture"],d:60,s:"A six-story independent bookstore designed like a gothic cathedral, filled with over 100,000 books.",st:"The bookstore opened in 2015 in what was once an electronics market, and its designer, Wad, created a literary fantasy. The central atrium stretches upward through all six floors, creating the impression of standing inside a massive book. Wooden beams crisscross overhead like the supporting structure of thought itself. The design deliberately references European religious architecture—this is a cathedral to literature. Books are organized in thematic areas with whimsical names. I found myself getting lost for hours, discovering unexpected connections between subjects. The store hosts reading events, interviews, and workshops. It's become a pilgrimage site for book lovers across Asia.",im:"The soaring atrium viewed from above, with geometric wooden beams crisscrossing and stacks of colorful book spines glowing in the warm interior light.",t:"MRT Yellow/Purple Line to Taipei Nanjing Fuxing Station. Admission: NT$200 (refundable with purchase). Multiple cafes throughout the store. Plan 2-3 hours minimum.",c:[],r:"g",nn:"誠品書店",ns:"六層獨立書店，設計如哥德式教堂，擁有10萬多本書。",nst:"書店2015年開幕，設計師創造了文學幻想空間。中央中庭貫穿所有六層樓。書籍按主題區域組織。",nt:"乘捷運黃/紫線到台北南京復興站。入場費新台幣200元。多家咖啡館。預留2-3小時。"},
  {id:9,n:"Tamsui Fishermen's Wharf — where sky meets water",a:"Tamsui",v:["beautiful", "views", "local"],d:120,s:"A renovated harbor area with riverside parks, seafood restaurants, and dramatic sunset views over the Taiwan Strait.",st:"Tamsui has been a port for centuries—first a Spanish stronghold, then Dutch, then Japanese. Today's wharf is mostly recreational, with a promenade that fills with lovers and joggers at sunset. I sat on the waterfront watching container ships navigate the Tamsui River while street musicians played beneath an old banyan tree. The fishermen's market behind the wharf still operates early morning, though fewer traditional fishing boats arrive each year. Red-painted lover's locks cover the bridge railings—a modern Chinese tradition. The adjacent Old Street preserves shophouses from the Japanese colonial era, now housing contemporary cafes and galleries. The sunset light turns the river to gold.",im:"A solitary fisherman casting his net against a golden sunset, the silhouette of old colonial buildings visible across the water.",t:"MRT Red Line to Tamsui Station (45 min from downtown). Walk along the red bicycle path. Restaurants range from food carts to upscale seafood venues. Best visited late afternoon through sunset.",c:[],r:"g",nn:"淡水漁人碼頭",ns:"翻新港區，擁有河濱公園和淡水河上空的壯觀日落景色。",nst:"淡水幾世紀來一直是港口，曾為西班牙和荷蘭據點。今日碼頭主要用於休閒。日落時刻最美。",nt:"乘捷運紅線到淡水站（距市中心45分鐘）。沿紅色單車道步行。從晚午至日落訪問最佳。"},
  {id:10,n:"Taipei Fine Arts Museum — temple of contemporary vision",a:"Zhongshan",v:["art", "architecture", "beautiful"],d:90,s:"A museum dedicated to contemporary and traditional Taiwanese art, housed in a modernist building opened in 1983.",st:"The building itself is the art—clean lines and geometric forms that seem to flow across the landscape. The permanent collection focuses on post-1950s Taiwanese art, documenting the island's cultural evolution. Temporary exhibitions rotate every few months, and the curatorial vision consistently challenges Western assumptions about Asian contemporary practice. I spent time in front of a multimedia installation that explored water and memory, and found myself meditating on the connection between personal and collective history. The museum's architecture deliberately rejects the fortress-like museum model, instead creating open plazas that blur boundaries between inside and out. Many exhibitions are free.",im:"The museum's angular roofline silhouetted against a bright sky, with people scattered across white plaza platforms in geometric arrangements.",t:"MRT Red/Brown Line to Taipei Fine Arts Museum Station (direct access). Admission varies by exhibition (NT$150-300, some free). Closed Mondays. Photography policies vary by exhibition.",c:[],r:"g",nn:"台北美術館",ns:"專注於當代和傳統台灣藝術的博物館，1983年開幕。",nst:"建築本身就是藝術——清潔線條和幾何形式。收藏重點為1950年後台灣藝術。臨時展覽定期輪換。",nt:"乘捷運紅/褐線到台北美術館站。入場費視展覽而定。週一閉館。攝影政策因展覽而異。"},
  {id:11,n:"Beitou Hot Spring Museum — water, history, and relaxation",a:"Beitou",v:["history", "hidden", "local"],d:120,s:"A museum in a restored 1913 Japanese-era hot spring resort, documenting the culture and geology of Taiwan's most famous thermal destination.",st:"The building itself is a museum piece—a timber structure from the Meiji Restoration period with traditional Japanese baths still functional on the ground floor. I descended into the steaming bath chambers and felt the sulfurous water envelop me—the water temperature stays at a constant 48°C year-round. The museum's upper floors exhibit bathing culture from the Japanese colonial era through modern times. Beitou's hot springs were discovered in 1894 and rapidly became a leisure destination for Japanese colonists. The area attracted artists, writers, and businessmen seeking healing and escape. Today, the neighborhood maintains dozens of small bath houses, some simple and traditional, others sleek and contemporary. The geothermal phenomenon remains as impressive as ever.",im:"Wooden beams and latticed screens casting shadows into misty bath chambers where steam rises from perfectly still, mineral-rich water.",t:"MRT Red Line to Beitou Station, then local bus (5 min). Admission: NT$250 includes bath access. Reserve ahead in winter months. Bring towel or rent one (NT$100).",c:[],r:"g",nn:"北投溫泉博物館",ns:"1913年日據時代溫泉度假村復原，展示台灣最著名溫泉的文化和地質。",nst:"建築本身是博物館級別——明治維新時期木製結構，底樓仍有日式浴池可用。溫泉1894年被發現，迅速成為日本殖民者的休閒地。",nt:"乘捷運紅線到北投站，再搭本地巴士（5分鐘）。入場費新台幣250元含浴池使用。冬季提前預約。"},
  {id:12,n:"Taipei Confucius Temple — 300-year-old sanctuary of virtue",a:"Datong",v:["history", "architecture", "local"],d:60,s:"Taiwan's most important Confucian temple, built in 1666 and still actively used for ritual ceremonies.",st:"Walking through the gate, you step back in time. The temple's architecture follows strict Confucian principles—symmetrical, hierarchical, balanced. The main hall contains a tablet inscribed with Confucius's name rather than a statue, which aligns with Confucian philosophy emphasizing respect over representation. The temple has survived centuries—the original structure dates to 1666 during the Ming loyalist kingdom period. Annual ceremonies on Confucius's birthday (September 28) attract thousands, with ritual music performed on ancient instruments. The gardens are meticulously maintained, with ancient trees that have witnessed dynasties. I sat in the quietness of the side halls and felt the weight of philosophical tradition. The surrounding neighborhood remains residential and authentic, unlike many temple districts that become shopping centers.",im:"Incense coils hanging in the darkened main hall, their smoke rising toward painted ceiling panels depicting classical scholars.",t:"MRT Red Line to Taipei Main Station, walk 10 min. Free admission. Open daily 8:30 AM-5 PM. Ceremony on September 28. Respectful behavior expected.",c:[],r:"g",nn:"台北孔廟",ns:"台灣最重要的儒廟，1666年建立，仍積極用於儀式。",nst:"建築遵循嚴格的儒家原則——對稱、分級、平衡。主殿含有孔子名字牌匾而非雕像。年度儀式在孔子生日（9月28日）吸引數千人。",nt:"乘捷運紅線到台北車站，步行10分鐘。免費參觀。每日上午8:30-下午5點開放。尊重禮儀。"},
  {id:13,n:"Huashan 1914 Creative Park — art in an old distillery",a:"Zhongshan",v:["art", "hidden", "architecture"],d:90,s:"A converted Japanese-era distillery (established 1914) now housing art galleries, performance spaces, and creative studios.",st:"The complex occupies 67,000 square meters of red-brick warehouses and production facilities. When the distillery closed, artists and curators saw potential. The first art installation in 2007 sparked the transformation into one of Asia's most dynamic creative venues. I wandered through galleries where everything from digital art to traditional painting occupied the same space. The brick buildings' industrial bones are carefully preserved—you can still see the original machinery in some galleries. The space hosts experimental theater, electronic music performances, and artist residencies. On weekends, the plaza fills with food vendors and young Taiwanese discussing aesthetics over expensive coffee. It's a fascinating collision between heritage preservation and contemporary culture.",im:"Sunlight streaking through tall industrial windows onto brick walls where contemporary art installations glow against historical manufacturing equipment.",t:"MRT Red Line to Zhongshan Station. Most galleries free admission. Performance tickets NT$300-800. Closed Mondays. Good weekend destination with cafes and bars.",c:[],r:"g",nn:"華山1914文創園區",ns:"日據時代酒廠改建（1914年創立），現為藝廊和創意工作室。",nst:"佔地67,000平方米的紅磚倉庫。2007年藝術裝置激發了轉變成亞洲最動態創意場所。原機械在某些畫廊仍可見。",nt:"乘捷運紅線到中山站。大多畫廊免費入場。演出票新台幣300-800元。週一閉館。"},
  {id:14,n:"Ketagalan Boulevard — living history of indigenous Taiwan",a:"Zhongshan",v:["history", "architecture", "art"],d:45,s:"A ceremonial boulevard anchored by the Presidential Building, with indigenous art installations and historical markers.",st:"The boulevard stretches 670 meters and hosts Taiwan's major national celebrations. But what makes it compelling are the recent additions—indigenous art installations and explanatory plaques about Taiwan's aboriginal peoples and their 5,000-year history predating the Han Chinese settlement. The Presidential Building itself, completed in 1912 under Japanese rule, showcases the island's colonial legacy. The name 'Ketagalan' honors the original Austronesian people of the Taipei basin. I walked the boulevard during the National Day celebrations and saw the mixing of modern Taiwan with acknowledgment of its deeper indigenous roots. The street design creates a liminal space between governance and public culture.",im:"The Presidential Building framed at the end of a wide boulevard with flags rippling in the tropical breeze and indigenous artworks catching afternoon light.",t:"MRT Yellow Line to Taipei 101/World Trade Center Station. Free access to boulevard. View Presidential Building from outside (interior closed to public). Best during National Day (October 10) or major festivals.",c:[],r:"g",nn:"凱撒琿大道",ns:"儀式性大道，以總統府為中心，有原住民藝術裝置。",nst:"大道長670米，舉辦台灣主要國慶慶典。最近的增補包括原住民藝術裝置和歷史標記。",nt:"乘捷運黃線到台北101/世貿中心站。大道免費參觀。10月10日國慶時最佳。"},
  {id:15,n:"Red House Theater — queer culture and performance art",a:"Ximending",v:["art", "night", "hidden"],d:60,s:"A historic theater (built 1908) that has become the center of Taipei's queer culture and experimental performance.",st:"The Red House is a octagonal brick structure built during the Japanese occupation, originally a market. During the Cold War, it became an entertainment venue. In recent decades, it's transformed into the epicenter of Taiwan's LGBTQ+ cultural scene. The theater programming emphasizes experimental work, queer performance art, and boundary-pushing theater. When I visited during a performance, the audience demographic ranged from elderly traditionalists to Gen Z activists—a conversation about what contemporary Taiwan values. The building's architecture is charming, and the surrounding Ximending district throbs with youth culture, street fashion, and independent shops. The Red House's presence here signals Taiwan's relatively progressive stance on LGBTQ+ rights—the island was the first in Asia to legalize same-sex marriage.",im:"The crimson-painted octagonal facade glowing at dusk as crowds of young people in streetwear gather outside, the neon signs of the surrounding entertainment district reflecting off wet pavement.",t:"MRT Blue Line to Ximending Station. Show tickets NT$400-800. Check schedule in advance as programming varies. Arrive early for good seating. The surrounding neighborhood is worth exploring.",c:[],r:"g",nn:"紅樓劇場",ns:"1908年建的歷史劇院，已成為台北酷兒文化中心。",nst:"八邊形紅磚建築，日據時期原為市場。近十年轉變為台灣LGBTQ+文化中心。演出強調實驗性和邊界突破。",nt:"乘捷運藍線到西門町站。演出票新台幣400-800元。提前查看時程。周圍街區值得探索。"},
  {id:16,n:"Chingshan 1900 — a teahouse that survived a century",a:"Datong",v:["food", "history", "local"],d:90,s:"An atmospheric teahouse in operation since 1896 (not quite 1900, but close), serving traditional dim sum and tea in a preserved 1920s interior.",st:"The teahouse occupies a narrow building with ornate wooden lattice screens and a marble counter worn smooth by a century of elbows. Morning 'yum cha' is tradition here—elderly men in undershirts reading newspapers while cart ladies navigate tight spaces with steaming bamboo baskets. I watched a chef from the neighboring dim sum kitchen hand-fold wontons with the speed of someone who has done the same motion ten thousand times. The tea list is exceptional, featuring aged oolongs that cost more than luxury watches. The whole experience is priced for locals, not tourists—a dim sum and tea rarely exceeds NT$150. The building's facade is protected heritage architecture. It's impossible to know how many significant conversations have happened in these wooden booths.",im:"A weathered hand lifting the lid of a porcelain teapot while ancient wooden rafters cast shadows overhead and the aroma of jasmine mingles with dim sum steam.",t:"MRT Red Line to Taipei Main Station, walk 5 min. Best visited during yum cha hours: 6-10:30 AM. Very popular, expect crowds. Small cash transactions; credit cards rare.",c:[],r:"g",nn:"清山1900茶館",ns:"自1896年營業的大氣茶館，提供傳統點心和茶水。",nst:"狹窄建築內有精美木製格屏和磨光大理石吧台。早晨傳統飲茶時間客人眾多。茶葉單優質，老烏龍茶昂貴。",nt:"乘捷運紅線到台北車站，步行5分鐘。早上6-10:30點飲茶時間最佳。帶現金。"},
  {id:17,n:"Elephant Mountain — night city glow from rocky peak",a:"Songshan",v:["views", "nature", "hidden"],d:90,s:"A modest 183-meter peak with carved elephant sculptures and panoramic night views of Taipei 101.",st:"The path is steep and rocky, taking perhaps 30 minutes to ascend if you're not daydreaming. The peak itself is crowded with photographers at dusk, all seeking the same shot of Taipei 101 glowing against darkening sky. But the experience is still worth it—standing at the summit as the city transforms from day to night, watching millions of lights flicker on in perfect synchronization is almost spiritual. The carved elephant sculptures are quirky and affectionate. Local runners use the trails as training routes. I descended after dark, carefully navigating stone steps while city lights guided my steps.",im:"Taipei 101 blazing with white light against a twilight sky as the city below transforms into a constellation of urban stars.",t:"MRT Brown Line to Nanggang Station, walk 20 min to trailhead. Trail is steep and can be treacherous in rain. Visit late afternoon. Very crowded on clear weekend evenings.",c:[],r:"g",nn:"象山",ns:"183米高峰，有象形雕刻和台北101全景。",nst:"路徑陡峭多石，約30分鐘可達。頂峰在黃昏時攝影師眾多。夜景時一覽眾山小。",nt:"乘捷運褐線到南港站，步行20分鐘。路徑陡峭，雨天危險。下午晚時訪問。晴朗週末非常擁擠。"},
  {id:18,n:"Taiwan National Museum — nation in objects",a:"Chongshan",v:["history", "architecture", "art"],d:120,s:"Taiwan's premier museum with extensive collections covering pre-history through contemporary culture.",st:"The permanent galleries trace Taiwan's human occupation from Austronesian hunter-gatherers (8,000 years ago) through Dutch and Spanish colonization, Qing China, Japanese occupation, and modern nationhood. The design choices are politically loaded—how you tell history shapes national identity. I spent hours examining jade artifacts from indigenous peoples, porcelain from the Ming dynasty, and photographs documenting Taiwan's 20th-century transformation. The museum recently expanded interpretation of indigenous perspectives and colonial critique. The building itself, completed in 1972, is a modernist statement in concrete and glass. Multiple temporary exhibitions offer contemporary commentary. Audio guides available in English.",im:"Display cases glowing with spotlit jade and porcelain artifacts while museum visitors stand motionless, absorbed in the weight of time made tangible.",t:"MRT Red Line to Taiwan Museum Station. Admission: NT$100. Open 10 AM-6 PM, closed Mondays. Allow 3-4 hours minimum. Photography permitted in most galleries.",c:[],r:"g",nn:"台灣國家博物館",ns:"台灣首屈一指博物館，收藏前史至當代文化。",nst:"永久展覽追溯台灣人類占領8000年歷史。包含南島民族、荷蘭西班牙殖民、清朝、日本佔領和現代。",nt:"乘捷運紅線到台灣博物館站。入場費新台幣100元。上午10點-下午6點開放。預留3-4小時。"},
  {id:19,n:"Maokong Teahouse Trail — hillside tea culture experience",a:"Wenshan",v:["food", "nature", "local", "views"],d:180,s:"A scenic hiking route through tea plantations with traditional teahouses offering forest bathing and fresh oolong.",st:"The town of Maokong sits on a hillside where the conditions are perfect for growing oolong tea—elevation, morning mist, and acidic soil. Cable car or hiking trail lead upward through increasingly dense vegetation. The teahouses are not commercialized tourist traps but actual working tea farmers' extensions—open to visitors but primarily serving locals conducting tea business. I settled into a simple wooden structure overlooking the plantations and watched the owner brew a 30-year-old oolong, explaining how the leaves 'wake up' with successive infusions. The aroma was floral and complex. Teahouses charge NT$200-400 per person and typically include small snacks. The hiking is moderate difficulty with many scenic viewpoints. The experience connects directly to Taiwan's agricultural heritage.",im:"Tea plantations rolling down a mountainside in orderly rows as mist rises from the valleys and a single teahouse glows warmly in the distance.",t:"MRT Green Line to Zhinan Temple Station, then bus (30 min) or cable car. Cable car NT$100. Trail is 6-8 km depending on route. Wear hiking shoes. Most teahouses offer rest and refreshment.",c:[],r:"g",nn:"貓空茶館步道",ns:"穿過茶園的風景登山步道，傳統茶館提供森林浴和新鮮烏龍茶。",nst:"貓空小鎮海拔適合烏龍茶種植。纜車或登山步道向上通過茂密植被。茶館是實際工作茶農的延伸。",nt:"乘捷運綠線到指南宮站，再搭公車（30分鐘）或纜車。纜車新台幣100元。步道6-8公里。穿登山鞋。"},
  {id:20,n:"Taipei Story House — colonial villa turned cultural hub",a:"Xinyi",v:["history", "hidden", "architecture"],d:60,s:"A stunning 1921 colonial mansion with European-influenced architecture now operating as a cultural venue and gallery.",st:"The three-story house was built by a Japanese businessman and showcases Meiji-era architectural sensibilities adapted for tropical Taiwan. The exterior combines European classical elements with Japanese tile work. Interior rooms are furnished with period pieces and rotating exhibitions. I climbed narrow wooden stairs that creaked with age, emerging into rooms with high ceilings and large windows designed to catch breezes. The house survived WWII and the subsequent urban development that demolished most colonial structures. Today it operates as a living museum offering tea service, exhibitions, and cultural events. The surrounding neighborhood has modernized around it, making the house feel like a time capsule in the fast city. The garden, though small, maintains tropical plants typical of Japanese colonial horticulture.",im:"Afternoon light streaming through tall colonial windows onto wooden floors, casting geometric shadows while artifacts rest in careful stillness.",t:"MRT Red Line to Taipei City Hall Station, walk 10 min. Admission: NT$150. Open 10 AM-5 PM, closed Mondays. Tea service available (NT$250). Limited interior photography.",c:[],r:"g",nn:"台北故事館",ns:"1921年殖民別墅，具歐洲風格建築，現為文化場所和畫廊。",nst:"三層樓由日本商人建造，融合歐洲古典和日本磁磚工藝。高天花板和大窗戶設計引風。",nt:"乘捷運紅線到台北市政府站，步行10分鐘。入場費新台幣150元。上午10點-下午5點開放。茶水服務。"},
  {id:21,n:"Taipei Guest House — art deco presidential residence",a:"Zhongshan",v:["architecture", "history", "hidden"],d:75,s:"A 1910 art deco mansion once used by colonial governors and presidents, now a museum with elegant period rooms.",st:"The building's geometric facade and interior spaces showcase the height of early-20th-century taste. When presidential ceremonies or state dinners occurred here, dignitaries walked the same polished corridors I did. The architecture speaks of colonial confidence—this was meant to project power and culture. The furniture is original art deco, the crystal chandeliers still functional, the timber details meticulously maintained. A guide explained that this building witnessed the transfer of power from Japan to the Republic of China in 1945. Later, it hosted important Cold War discussions. The upstairs bedrooms retain period authenticity. It's a building where history becomes tangible through objects and space. Few tourists find this place, despite its proximity to major attractions.",im:"An art deco chandelier casting geometric light across a polished parquet floor while mahogany furniture sits in hushed stillness.",t:"MRT Red Line to Xinyi Station, walk 10 min. Admission: NT$100. Open 10 AM-5 PM, closed Sundays and Mondays. Guided tours recommended. Photography limited.",c:[],r:"g",nn:"台北賓館",ns:"1910年藝術裝飾別墅，曾為殖民總督和總統官邸。",nst:"建築的幾何立面和內部空間展示早期20世紀品味。原為日本殖民統治者住所，1945年後為總統官邸。",nt:"乘捷運紅線到信義站，步行10分鐘。入場費新台幣100元。建議參加導遊。攝影受限。"},
  {id:22,n:"Nanjing East Road — designer shopping in tree-lined boulevard",a:"Songshan",v:["architecture", "beautiful", "local"],d:90,s:"A modernized shopping boulevard with luxury boutiques, cafes, and preserved Japanese-era buildings.",st:"The street has been progressively modernized over decades, but efforts have been made to preserve architectural character. Walking it, I noticed the mixture—sleek contemporary storefronts alongside older building facades carefully restored. The street fills with office workers during lunch hours, young women shopping, and tourists seeking upscale goods. The intersection with Fuxing Road marks a particularly attractive quarter with tree-lined sidewalks. Many buildings date to the Japanese colonial or early ROC periods. The street feels distinctly Taipei—cosmopolitan but not entirely Westernized, wealthy but not ostentatious. Cafes offer everything from traditional Taiwanese fare to contemporary fusion.",im:"Tree-lined sidewalk with dappled sunlight falling on luxury storefronts and well-dressed pedestrians, the street stretching toward distant office towers.",t:"MRT Red/Purple Line to Nanjing Fuxing Station. Extensive shopping options (prices reflect upmarket positioning). Excellent restaurants and cafes throughout. Best during business hours when the street is most animated.",c:[],r:"g",nn:"南京東路",ns:"現代化購物大道，設計師精品、咖啡館和保留的日據建築。",nst:"街道經過數十年現代化，但努力保留建築特色。混合了當代店面和修復的舊建築立面。",nt:"乘捷運紅/紫線到南京復興站。購物選擇眾多。優秀餐廳和咖啡館。營業時間最佳。"},
  {id:23,n:"Pingxi Old Street — lantern-lit village frozen in time",a:"Pingxi",v:["hidden", "history", "local"],d:150,s:"A preserved coal mining town accessible by heritage railway, famous for releasing sky lanterns and experiencing Japanese-era architecture.",st:"The narrow street parallels a small river, buildings crowded directly adjacent to the rail line that still carries occasional trains. Walking the street, you step across tracks multiple times, trains passing so close you could touch them. The village was a thriving coal mining center until the 1980s, then became a tourist attraction. But unlike heavily commercialized heritage sites, Pingxi maintains genuine residences alongside shops. Traditional restaurants serve miners' food—hearty, cheap. The sky lantern tradition is beautiful but crowded on weekends. I visited on a quiet weekday and felt the genuine ghostliness of economic abandonment and revival. The surrounding mountains are mining-scarred but recovering. The heritage railway journey itself is pleasant, winding through increasingly rural landscape.",im:"A train passing through the narrow village street while glowing lanterns hang above and passengers lean from train windows to watch.",t:"Train from Taipei Main Station on Pingxi Line (45 min, NT$50). Train stations at both ends of old street. Sky lantern release NT$50-150 per lantern. Visit weekdays to avoid crowds. Bring cash.",c:[],r:"g",nn:"平溪老街",ns:"保留的煤礦鎮，以天燈聞名，體驗日據建築。",nst:"窄街平行小河，建築緊鄰仍在運行的鐵路線。村落曾是繁榮的煤礦中心，1980年代後成為旅遊景點。",nt:"從台北車站搭平溪線列車（45分鐘，新台幣50元）。在老街兩端有火車站。天燈新台幣50-150元。平日訪問避免人潮。"},
  {id:24,n:"Taipei 228 Memorial — confronting political trauma",a:"Chongshan",v:["history", "architecture", "hidden"],d:75,s:"A museum and memorial park dedicated to the 1947 February 28 Incident, when tens of thousands died in political violence.",st:"The 228 Incident is a scar on Taiwan's modern history—the KMT government's brutal crackdown on local protests killed between 18,000 and 28,000 people. For decades, the event was censored and denied. The memorial center (opened 1998) represents Taiwan's reckoning with its past. The museum's presentation is respectful and detailed, including video testimony from survivors. The layout guides you through historical context, personal stories, and political aftermath. The memorial park outside contains a sculpture that speaks without words. I found myself in contemplation about how societies process collective trauma. The location of the memorial near the Imperial Palace suggests intentional symbolic positioning. Most international visitors don't know about this event, though it fundamentally shaped Taiwan's path toward democracy.",im:"A stark memorial sculpture against trees and sky, with the names of the dead inscribed, people pausing in reflection.",t:"MRT Red Line to Taiwan Museum Station, walk 10 min. Admission: NT$100. Open 10 AM-5 PM, closed Mondays. Allow 1-2 hours. Respectful behavior essential. Bilingual information available.",c:[],r:"g",nn:"台北228紀念館",ns:"1947年二二八事件紀念館，數萬人在政治暴力中喪生。",nst:"1947年事件是台灣現代歷史的傷疤。政府鎮壓抗議導致1.8-2.8萬人死亡。紀念中心展示尊重且詳盡。",nt:"乘捷運紅線到台灣博物館站，步行10分鐘。入場費新台幣100元。尊重禮儀。雙語資訊。"},
  {id:25,n:"Danshui Iron Fort — coastal fortification with views",a:"Tamsui",v:["history", "views", "hidden"],d:90,s:"A 19th-century military fort overlooking the Taiwan Strait, offering historical perspective and expansive water views.",st:"Built in 1884 during the Qing Dynasty, the fort was designed to defend against French naval attacks. The architecture is purely military—thick walls, narrow embrasures, strategic positioning. I walked the perimeter and imagined the anxiety of those stationed here, watching the strait for potential invasion. The fort's condition is well-maintained through recent restoration. Sunset here is remarkable—the light turns the strait molten gold and the distant mountains fade into silhouette. The fort's isolation is part of its appeal; it requires intentional effort to reach, so crowds are manageable. Exhibits inside (in Chinese) explain the military history. The surrounding area remains rural and undeveloped, preserving the historical context.",im:"Stone fortification walls at golden hour with the Taiwan Strait glittering beyond and the silhouette of distant mountains across the water.",t:"MRT Red Line to Tamsui Station, then bus (20 min) or taxi. Admission: NT$80. Open 9 AM-5 PM, closed Mondays. Steep access stairs. Bring water. Best visited late afternoon.",c:[],r:"g",nn:"淡水砲台",ns:"19世紀軍事堡壘，俯瞰台灣海峽。",nst:"建於1884年清朝時期，設計用於防守法國海軍攻擊。純軍事建築——厚牆、狹窄槍口、戰略位置。",nt:"乘捷運紅線到淡水站，再搭公車（20分鐘）。入場費新台幣80元。上午9點-下午5點。陡峭樓梯。帶水。"},
  {id:26,n:"Chiang Ching-kuo Memorial House — political leader's domestic space",a:"Shilin",v:["history", "hidden", "architecture"],d:60,s:"The former residential house of Taiwan's leader Chiang Ching-kuo, preserved as a museum showing personal and political dimensions.",st:"The house is modest by leadership standards—a Japanese-era building modified for contemporary use. Walking the rooms, you see the intersection of personal life and political power. Family photographs on dressers sit alongside official documents. The dining room shows how Chiang lived while governing. The preserved kitchen has a simple, functional design. The garden is small but carefully maintained. Unlike grand presidential palaces, this house reveals the humanness of political figures. Chiang Ching-kuo led Taiwan during the Cold War and the period of democratization in the late 1980s. The museum's presentation is straightforward, allowing visitors to form their own assessments. It's a less-visited site, so you experience it in relative quiet. The neighboring houses maintain residential character, situating the memorial within ordinary Taipei.",im:"An intimate domestic room with period furniture, family photographs, and a simple desk where state documents once sat.",t:"MRT Red Line to Jiantan Station, walk 15 min. Admission: NT$100. Open 10 AM-5 PM, closed Mondays. Allow 45 minutes. Guided tours available (reservations recommended).",c:[],r:"g",nn:"蔣經國故居",ns:"台灣領導人蔣經國的前住宅，保存為博物館。",nst:"日據時期建築經修改。房間展示個人和政治交點。蔣經國在冷戰期間領導台灣。",nt:"乘捷運紅線到劍潭站，步行15分鐘。入場費新台幣100元。建議參加導遊。"},
  {id:27,n:"Jingshan Elementary School Remains — earthquake memorial",a:"Nankang",v:["history", "hidden", "nature"],d:60,s:"The preserved remains of a school destroyed in the 1999 earthquake, now a memorial and archaeological site.",st:"On September 21, 1999, a magnitude 7.6 earthquake devastated central Taiwan, killing 2,400 people. In one school near the epicenter, over 100 children and teachers died. The government decided to preserve the wreckage rather than rebuild—a choice that transformed it into a profound memorial. Walking among the crumpled concrete and twisted metal, the weight of loss becomes tangible. Nature has begun reclaiming the space; plants grow through the rubble. It's simultaneously haunting and beautiful. The site operates as a geological museum with earthquake exhibits and a memorial garden. Visitors walk carefully, respectfully aware that they're moving through a grave. Few tourists venture here; it's mostly visited by school groups and geology students. The experience confronts you with the fragility of human structures.",im:"Rubble and twisted metal covered partially with vines, nature slowly reclaiming a space of tragedy while sunlight filters through broken walls.",t:"Bus from Taipei (1.5 hours). Limited public transit; car rental recommended. Admission: NT$150. Open Tuesday-Sunday, 9 AM-5 PM. Respectful dress and behavior essential. Allow 1-2 hours.",c:[],r:"g",nn:"景山小學遺址",ns:"1999年地震摧毀的學校遺址，現為紀念館和考古遺址。",nst:"1999年9月21日，規模7.6地震摧毀中台灣，2,400人喪生。學校附近逾100名兒童和教師死亡。政府決定保留廢墟作為紀念。",nt:"從台北搭公車（1.5小時）。入場費新台幣150元。建議租車。尊重禮儀。"},
  {id:28,n:"Taipei Zoo — tropical wildlife in urban setting",a:"Wenshan",v:["nature", "beautiful", "local"],d:180,s:"One of Asia's largest zoos with extensive tropical and subtropical animal collections in a forested hillside setting.",st:"The zoo occupies a forested hillside that organizes exhibits by geographic region. Unlike traditional European zoos with cages, this facility emphasizes habitat-appropriate environments. I watched red pandas in a cool mountain zone, then transitioned to tropical heat for big cats. The design choices suggest thought about animal welfare. The zoo's cable car system transports you up the hillside, offering perspectives on the surrounding landscape. The koala exhibit attracts crowds, but patience reveals individual animals' personalities. It's a full-day destination—I was still discovering exhibits after five hours. Many local families come here; it's where Taipei parents introduce children to wildlife. The forest setting provides natural shade and a sense of immersion beyond typical urban zoo experience.",im:"A leopard resting in dappled sunlight in a naturalistic rocky habitat while visitors observe from an elevated platform through dense foliage.",t:"MRT Red Line to Zoo Station (terminus). Admission: NT$600 adults, NT$300 children. Open 9:30 AM-5 PM daily. Cable car recommended for full experience. Bring sunscreen. Very popular on weekends.",c:[],r:"g",nn:"台北動物園",ns:"亞洲最大動物園之一，位於森林山坡地帶。",nst:"佔據森林山坡，按地理區域組織展覽。強調棲息地適當環境。纜車系統將訪客運上山坡。",nt:"乘捷運紅線到動物園站（終點）。入場費新台幣600元成人。上午9:30-下午5點開放。建議搭纜車。帶防曬。"},
  {id:29,n:"Shuang Xi Park — secret green space above the city",a:"Xinyi",v:["nature", "hidden", "beautiful", "views"],d:90,s:"A hillside park with forest paths, natural ponds, and views of the entire Taipei basin from elevated vantage points.",st:"The park is easily missed from street level—you must intentionally discover it. Once inside, the urban world disappears beneath a canopy of subtropical forest. The walking paths are well-maintained and moderately challenging, gaining significant elevation. Natural ponds (shuang xi means 'two streams') provide stopping points for reflection. From the highest points, you can see across Taipei's entire sprawl, the Tamsui River, and mountains beyond. The park feels more isolated than similar urban green spaces, perhaps because tourists overlook it. I encountered families, joggers, and elderly Taiwanese doing morning tai chi. The biodiversity is impressive—birds, insects, plants adapted to Taiwan's humid subtropical climate. In afternoon, the light filters through the canopy in golden shafts.",im:"Forest path with ferns unfurling beside a natural stream, sunlight creating patterns on the rich green foliage above.",t:"MRT Red Line to Taipei City Hall Station, walk 20 min to nearest entrance. Free admission. Park open dawn to dusk. Multiple trail options (1-2 hours to summit). Bring water and insect repellent.",c:[],r:"g",nn:"雙溪公園",ns:"山坡公園，有森林步道、天然池塘和台北盆地景色。",nst:"公園易於被忽略，進入後都市世界消失在林間。步道維護良好，升高顯著。自然池塘提供停歇點。",nt:"乘捷運紅線到台北市政府站，步行20分鐘。免費參觀。天明至日暮開放。備水和防蟲液。"},
  {id:30,n:"Taipei Botanical Garden — ordered beauty of plant cultivation",a:"Zhongshan",v:["beautiful", "nature", "art"],d:120,s:"A scientific and aesthetic botanical garden featuring plant collections organized by habitat and horticultural themes.",st:"The garden was established in 1896 during the Japanese colonial period as a space for agricultural experimentation and public education. Today it balances those original missions—specimens are organized for both scientific study and aesthetic contemplation. The orchid greenhouse maintains conditions for tropical epiphytes, the water garden showcases aquatic plants adapted to Taiwan's wetlands, the subtropical forest section recreates natural ecosystems. I spent time in the rose garden where hybrid varieties were labeled with their parentage and cultivation history. The garden employs sophisticated propagation techniques visible in the nursery sections. Walking the paths feels like a conversation between human design and botanical reality. The garden is quieter than comparable urban parks, frequented more by serious plant enthusiasts than casual tourists.",im:"Orchids in full bloom suspended from overhead structures in a misty greenhouse, their intricate petals illuminated by filtered tropical light.",t:"MRT Red Line to Taiwan Museum Station, walk 10 min. Admission: NT$30. Open 8 AM-5 PM, closed Mondays. Bring camera for botanical photography. Peaceful morning visits recommended.",c:[],r:"g",nn:"台北植物園",ns:"科學和美學結合的植物園，按棲息地組織。",nst:"1896年日據時期建立，作為農業實驗和公眾教育空間。兼衡原始使命和現代科學。",nt:"乘捷運紅線到台灣博物館站，步行10分鐘。入場費新台幣30元。上午8點-下午5點開放。安靜早晨訪問最佳。"}
,
  {id:31,n:"Jiufen Old Street — Tea and Snacks at Night",a:"Mountain Town",v:["local","markets","beautiful"],d:30,s:"A narrow pedestrian street in the hillside town of Jiufen with tea shops, snack vendors, and lantern light—completely crowded but completely genuine.",st:"Jiufen Old Street is a mountain town neighbourhood that became famous through film. The street is narrow, the buildings are old, and vendors sell tea, snacks, and souvenirs. It's touristy but authentic at the same time.",im:"Walking the crowded street at night. Red lanterns. The smell of grilled squid and tea. People everywhere. Vendor voices. Lights.",t:"Take the train to Jiufen Old Street station. Walk uphill to the street. Open always, but best 5pm–10pm when lit. Expect crowds. Budget 100–200 TWD for food and tea.",c:["local","markets"],r:"g",nn:"九份老街",ns:"一條狹窄的行人街道，茶館和小食攤販",nst:"九份老街是一個山區社區，通過電影而聞名。街道狹窄，建築古老",nt:"乘坐火車前往九份老街車站。上山走到街道"},
  {id:32,n:"Elephant Mountain Sunset — City Views from Rock Peak",a:"City Centre",v:["beautiful","hiking","sunset"],d:15,s:"A short, steep hike to a rocky peak overlooking Taipei 101 and the entire basin—the view at sunset is why locals come back.",st:"Elephant Mountain is a small rocky peak inside the city. The hike is only 15 minutes but steep. At the top, you see Taipei 101, the city spread below, and mountains beyond. The sunset here is spectacular.",im:"Standing on rock. The city below. Taipei 101 lit from the side. The sky changing colors. A few other hikers. The scale of the city.",t:"Take MRT to Songshan station. Walk uphill to the trailhead. The hike is 15 minutes one way. Wear proper shoes. Go 5pm for sunset. Free. Return by dark as trails have no lighting.",c:["beautiful","hiking","sunset"],r:"y",nn:"象山",ns:"一條短而陡峭的登山道到一個岩石山峰，俯瞰台北101",nst:"象山是城市內的一個小岩石山峰。登山只需15分鐘但很陡",nt:"乘坐捷運前往松山站。上山走到登山道起點"},
  {id:33,n:"Beitou Hot Springs — Thermal Water in Mountain Valley",a:"North",v:["swimming","quiet","beautiful"],d:45,s:"Natural thermal springs in a mountain valley north of Taipei—locals bathe in the warm water, the valley is quiet, and you can soak for free in public areas.",st:"Beitou is a neighbourhood built around natural hot springs. The valley smells of sulfur. Public bathing areas exist where locals and visitors soak in naturally warm water.",im:"Warm water. Steam rising. Mountains around. A few people soaking. The smell of sulfur. Cool mountain air above.",t:"Take MRT to Beitou station. Walk to public bathing areas (some free, some 40–100 TWD). Bring a towel and swimsuit. Hot water temperature 40–50C. Best 3–5pm before evening crowds.",c:["swimming","quiet"],r:"g",nn:"北投溫泉",ns:"台北北方山谷中的天然溫泉",nst:"北投是一個圍繞天然溫泉建造的社區。山谷聞起來有硫磺味道",nt:"乘坐捷運前往北投站。步行到公共沐浴區"},
  {id:34,n:"Taipei 101 Sunset and City Lights — Greatest Hits",a:"City Centre",v:["greatest_hits","beautiful","sunset","high_spots"],d:5,s:"Taipei 101 at sunset and after dark shows the city transforming—the observation deck is crowded but honest about why: the view is genuinely extraordinary.",st:"Taipei 101 is Taiwan's most recognizable landmark. The observation deck on the 88th floor shows 360-degree views of the city, mountains, and basin. At sunset, the light is gold. After dark, the city lights below are electric.",im:"Standing at the window. The city sprawled beneath in all directions. The light changing from gold to purple to black. The lights switching on. The scale impossible.",t:"Take MRT to Taipei 101 station. Tickets 450–700 TWD depending on deck height. Open 9am–10pm daily. Go 5pm for sunset, stay for night lights. Advance booking recommended.",c:["greatest_hits","beautiful","sunset"],r:"g",nn:"台北101",ns:"台北101是台灣最容易辨認的地標",nst:"台北101是台灣最知名的地標。88樓的觀景台可以360度俯瞰城市",nt:"乘坐捷運前往台北101站。票價取決於甲板高度"},
  {id:35,n:"Taipei 101 — Landmark Tower and Observatory",a:"Xinyi",v:["beautiful"],d:30,s:"Tallest building in Taiwan (508m) — observation decks with 360-degree city views and the iconic structure",st:"Take the elevator to the 88th floor observation deck (or 91st for premium). The views span the entire city and out to the mountains. On clear days, you see beyond the city. The building itself is an engineering marvel. The speed of the elevator is remarkable. Go at sunset for city lights views.",im:"The city spread out endlessly below. Mountains in the distance. The sunset turning the sky pink and orange. City lights twinkling as darkness falls. The building structure visible from inside. The sense of standing on the top of Taiwan.",t:"680 TWD entry for 88th floor (~$21). Xinyi area. 1-2 hours. Open daily 9am-10pm (closed during typhoons). Go 1-2 hours before sunset. Fast elevators (39 seconds to 88th floor). Photography excellent. This is Taiwan\'s iconic attraction. Go at sunrise or sunset for best photos.",c:["greatest_hits"],r:"g",nn:"台北101",ns:"Taipei 101 — 台北101 塔地標和觀景台",nst:"乘坐电梯前往88楼观景台。景色遍布整个城市。",nt:"680 台幣。辛义区。1-2小时。最好在日落前1-2小时。"},
  {id:36,n:"Longshan Temple — Historic Buddhist Temple",a:"Wanhua",v:["beautiful"],d:30,s:"Ancient temple (built 1738) with ornate traditional Chinese architecture — active worship and local devotion",st:"Enter the temple and see intricate carvings, gilded details, and red lanterns. Devotees are worshipping. The air is thick with incense. The architecture is ornate and detailed. It\'s a functioning temple, not a museum. The energy of living faith is present. Go early morning to see rituals.",im:"Ornate wooden carvings and gilded details. Red lanterns hanging. Incense smoke. Devotees praying and leaving offerings. Bells and chants. The layered architecture and decoration. The spiritual intensity.",t:"Free entry. Wanhua area (easily accessible by MRT). 45-60 minutes. Best 6am-9am for rituals and fewer crowds. Modest dress required. Photography allowed (be respectful). This is one of Taiwan\'s most important temples. The surrounding neighborhood has good street food.",c:["greatest_hits"],r:"g",nn:"龍山寺",ns:"Longshan Temple — 龍山寺歷史悠久的佛教寺廟",nst:"进入寺庙，看到复杂的雕刻和镀金细节。",nt:"免费入场。万华区。最好早上6-9点。"},
  {id:37,n:"Shilin Night Market — Food and Shopping Extravaganza",a:"Shilin",v:["beautiful"],d:30,s:"Taiwan\'s largest night market — street food, clothing, games, and the beating heart of Taipei\'s evening culture",st:"Enter the maze-like market. The smell of grilled meat, fried snacks, and spices fills the air. Vendors call out. Games and activities line the streets. Teenagers and families pack the market. It\'s organized chaos. The food is the main draw. This is where Taiwan eats at night.",im:"Stalls of grilled meat and fried snacks. Crowds of people. Bright lights. Vendors calling out. The smell of food cooking. Games and activities. The organized chaos. The mix of tourists and locals. The energy is infectious.",t:"Free to walk. Market entrance free (food and shopping cost money). Shilin area (accessible by MRT). Best 6pm-11pm (peak times are 8-10pm). Budget 200-400 TWD (~$6-13) for a meal of various foods. Photography friendly. This is the quintessential Taiwan night market. Go hungry.",c:["greatest_hits"],r:"g",nn:"士林夜市",ns:"Shilin Night Market — 士林夜市食品和購物狂歡",nst:"进入迷宫般的市场。烤肉、炸小食和香料的味道充满空气。",nt:"免费进入。最好晚上6-23。预算200-400台币。"},
  {id:38,n:"National Palace Museum — World-Class Art Collection",a:"Shilin",v:["beautiful"],d:30,s:"One of the world\'s greatest art museums — over 690,000 pieces of Chinese art and artifacts (most housed in vault)",st:"Walk through galleries of extraordinary Chinese art and artifacts. The collection spans millennia. From ancient bronze vessels to exquisite paintings. The craftsmanship and artistry are beyond compare. It\'s not massive (many pieces are in climate-controlled vaults), but what\'s displayed is extraordinary.",im:"Ancient bronze vessels with perfect patina. Jade carvings of intricate detail. Paintings on silk from ancient masters. Calligraphy spanning dynasties. The sense of walking through Chinese cultural history. The mastery of craft visible in every object.",t:"350 TWD entry (~$11). Shilin area (accessible by MRT). 2-3 hours minimum. Open Tue-Sun 9am-5pm. Photography not allowed inside (is outside). Audio guides available. Guides recommended for context. This is one of the world\'s greatest museums. Plan time.",c:["greatest_hits"],r:"g",nn:"故宮博物院",ns:"National Palace Museum — 故宮博物院世界級藝術收藏",nst:"走过走廊充满了非凡的中国艺术和古器。",nt:"350台币。士林区。2-3小时。最好10-12。"},
  {id:39,n:"Elephant Mountain Trail — Urban Hiking with City Views",a:"Xinyi",v:["beautiful"],d:30,s:"Short hiking trail (1 hour) with panoramic views of Taipei city and Taipei 101 — popular at sunset",st:"The trail is easy, just 1 hour to summit. The views are extraordinary. You see the entire city from above, with Taipei 101 rising to your left. Taipei Dome stadium is visible. The mountains frame the city. Sunsets are magical; hundreds of people gather on the summit at dusk.",im:"The city skyline below. Taipei 101 gleaming in afternoon light. Mountains all around. The sunset sky changing color. Hundreds of people on the summit at sunset. The sense of urban hiking accessible from the city center.",t:"Free. Xinyi area (accessible by MRT, short walk). 1-1.5 hours for trail. Open dawn to dusk. Best 2-3 hours before sunset. Wear comfortable shoes. Bring water. Photography is excellent, especially at golden hour. This is the best city view in Taipei and very accessible.",c:["greatest_hits"],r:"g",nn:"象山",ns:"Elephant Mountain Trail — 象山步道城市登山視野",nst:"在山顶看到整个城市的俯视图。",nt:"免费。信义区。1-1.5小时。日落前2-3小时最好。"},
  {id:40,n:"Yongkang Street Beef Noodles — Din Tai Fung & Street Classics",a:"Daan",v:["food"],d:60,s:"The original street for Taiwan\'s most iconic dish. Din Tai Fung dumpling house, five beef noodle shops, tea cafes all on one block.",st:"Yongkang Street is a short pedestrian lane where food history was made. The original Din Tai Fung dumpling restaurant is here. Multiple beef noodle shops compete on the same block.",im:"A narrow street lined with restaurant storefronts, crowds of people, steam rising from noodle bowls, red lanterns hanging",t:"MRT to Chongshan Station. Walk to Yongkang Street. Arrive 11:30am for lunch (1-2pm crowds). Budget 100-150 TWD per meal. Bring cash.",c:["food","greatest_hits"],r:"g",nn:"永康街",ns:"牛肉麵和鼎泰豐",nst:"台湾最具标志性菜肴的原始街道。鼎泰豐、五家牛肉麵店",nt:"中山站下车。永康街。上午11:30去。100-150台币"},
  {id:41,n:"Beitou Library — Greenest Building on Earth",a:"Beitou",v:["architecture","green"],d:30,s:"A public library powered entirely by geothermal energy, surrounded by forest, designed as a living architecture showcase",st:"The Beitou Library is built on a slope in a forest. The building is wood and glass. Thermal water beneath heats and cools it.",im:"A modern building made of dark wood, surrounded by forest, glass walls showing the interior reading rooms, the structure integrated into nature",t:"MRT to Beitou Station. Walk uphill 15 minutes. Library open 10am-9pm. Free entry. Bring a book to read in the forest.",c:["architecture","nature"],r:"g",nn:"北投圖書館",ns:"地球上最綠色的建築",nst:"一座以地热能完全供电的公共图书馆，被森林包围",nt:"北投站下车。上山15分钟。下午10点-9点。免费进入"},
  {id:42,n:"Maokong Gondola + Tea Houses — Mountain Tea Ceremony",a:"Zhishan",v:["nature","food"],d:180,s:"A cable car ride through tea plantations to mountain teahouses. Tea ceremony in the clouds overlooking Taipei below.",st:"The gondola rises through tea plants. At the top, teahouses serve rare mountain oolong tea with traditional ceremony.",im:"Inside a moving gondola, tea plantations visible below, mountains in distance, landing at a wooden teahouse with large windows overlooking the valley",t:"MRT to Jiangnan Station. Take shuttle bus to Gondola Station. Gondola 100 TWD round trip. Teahouses: 500-800 TWD for tea ceremony. Allow 3-4 hours.",c:["nature","food"],r:"g",nn:"貓空纜車",ns:"山茶館和茶道",nst:"一条穿过茶园的索道。山顶茶馆提供稀有乌龙茶和传统茶道",nt:"江南站下车。乘坐班车到缆车站。往返100台币。茶馆500-800台币"},
  {id:43,n:"Huashan 1914 Creative Park — Converted Distillery Galleries",a:"Zhongshan",v:["art","weird"],d:120,s:"A Japanese-era distillery converted into artist studios, galleries, performance spaces, indie market. Young Taipei creative scene.",st:"Huashan was built as a distillery in 1914. Now it\'s an arts venue: galleries, studios, cafes, street food, markets.",im:"Red brick industrial buildings, art installations in courtyards, people exploring gallery spaces, street art, markets in open squares",t:"MRT to Taipei Main Station. 10-minute walk. Galleries open 10am-6pm (closed Mondays). Free entry. Artist studios visible during open hours.",c:["art","weird"],r:"g",nn:"華山1914創意園區",ns:"改裝蒸餾廠藝廊",nst:"一个日本时代的蒸馏厂改为艺术家工作室、画廊、表演空间",nt:"台北主站下车。10分钟步行。画廊10am-6pm。免费进入"},
  {id:44,n:"Jiufen Teahouse Evening — Traditional Ceremony Uphill",a:"Jiufen",v:["beautiful","night"],d:90,s:"Old Jiufen teahouse serving rare teas with traditional ceremony. Sit on a balcony overlooking the mountain town lit at night.",st:"Jiufen teahouses are different from Jiufen Street below. They serve serious tea to serious tea people. The ceremony takes time.",im:"Inside a wooden teahouse, traditional tea equipment on a low table, a view of the valley town lit below with lanterns, night sky",t:"MRT to Jiufen. Walk to teahouses on side streets (ask locals). Reservation recommended (some closed weekdays). Tea ceremony 600-1000 TWD.",c:["beautiful","night"],r:"g",nn:"九份茶馆",ns:"傳統茶道儀式",nst:"九份茶馆提供稀有茶叶和传统茶道。俯瞰夜间山镇",nt:"九份站下车。步行到茶馆。预约建议。600-1000台币"},
  {id:45,n:"Yangminshan National Park — Sulfur Vents & Mountain Hikes",a:"Beitou",v:["nature","hiking"],d:240,s:"A volcanic mountain park with hiking trails, sulfur vents (the smell is intense), wildflowers, and views toward Taiwan\'s coast",st:"Yangminshan is a working volcanic system. Vents release sulfur gas. Trails wind past the vents. The air smells of rotten eggs.",im:"A rocky landscape with steam vents, yellow sulfur deposits, sparse vegetation adapted to the heat, hikers walking carefully",t:"MRT to Jiantan Station. Shuttle bus or hike from there. Multiple trail options (1-4 hours). Bring water. Wear proper hiking shoes. Avoid hiking alone.",c:["nature","hiking"],r:"g",nn:"陽明山",ns:"硫磺噴口和山地登山",nst:"一个活火山公园，登山道、硫磺喷口、野花和台湾海岸景色",nt:"剑潭站下车。班车或从那里登山。多条步道。带水。登山靴"},
  {id:46,n:"Songshan Cultural Park — Multiple Museums in One Complex",a:"Songshan",v:["art","history"],d:120,s:"A large cultural space hosting design museum, photography museum, craft museum — rotating exhibitions. Young creative Taipei.",st:"Songshan Cultural Park is a modern building complex. Multiple museums operate independently. Architecture itself is a draw.",im:"Modern glass and concrete building with multiple levels, people walking through galleries with artwork and design pieces",t:"MRT to Nanjing Fuxing Station. Free entry to park. Museum admission varies (200-350 TWD). Open 10am-6pm, closed Mondays.",c:["art","history"],r:"g",nn:"松山文化園區",ns:"一個綜合體內的多個博物館",nst:"一个拥有设计博物馆、摄影博物馆、手工艺博物馆的文化园区",nt:"南京复兴站下车。公园免费入场。博物馆200-350台币"},
  {id:47,n:"Ximending — Youth District & Street Fashion",a:"Wanhua",v:["weird","shopping"],d:120,s:"The trendiest youth shopping district in Taiwan. Street fashion, indie boutiques, vintage stores, young crowds. Constantly evolving.",st:"Ximending is where Taipei teenagers shop. The streets are packed on weekends. Fashion changes fast. Trends start here.",im:"A crowded pedestrian shopping district, colorful storefronts, young people with dyed hair and alternative fashion, street vendors",t:"MRT to Ximending Station. Free to walk. Shops vary in price (budget 500-1500 TWD for shopping). Best weekdays to avoid crowds.",c:["weird","shopping"],r:"g",nn:"西門町",ns:"青年地區和街頭時尚",nst:"台湾最时尚的青年购物地区。街头时尚、独立精品店、复古商店",nt:"西门町站下车。免费步行。周末避免人群"},
  {id:48,n:"National Palace Museum Rare Objects Room — Hidden Masterpieces",a:"Shilin",v:["art","hidden"],d:30,s:"A special vault room displaying 100 rarest pieces from the museum\'s 690,000-item collection. Not widely known.",st:"The museum\'s best pieces rotate in a climate-controlled vault room. The craftsmanship here is incomparable.",im:"A room with museum glass cases, each holding a piece of extraordinary Chinese art, the lighting designed to reveal details",t:"National Palace Museum entry 350 TWD. Ask staff where the rare objects room is located (not always labeled). 20-30 minutes inside.",c:["art","hidden"],r:"g",nn:"故宮博物院","珍品室",ns:"隱藏的傑作",nst:"一个特殊的保险库室，展示博物馆690,000件藏品中最稀有的100件",nt:"故宫门票350台币。问工作人员珍品室位置。20-30分钟"},
  {id:49,n:"Dihua Street Old District — Dried Goods, Tea & Fabric",a:"Dadaocheng",v:["markets","history"],d:90,s:"A preserved business street from 1900s: ginseng, dried mushrooms, tea leaves, textiles. Wholesale prices for tourists who ask nicely.",st:"Dihua Street is a wholesale market that dates back a century. Vendors know their products deeply.",im:"A narrow street lined with old shop fronts, dried goods piled in windows, vendors sorting merchandise, the smell of tea and spices",t:"MRT to Taipei Main Station or Zhongshan. Walk to Dihua Street (north of city center). Open 10am-6pm. Bring bags. Negotiate prices.",c:["markets","history_big"],r:"g",nn:"迪化街",ns:"乾貨、茶葉和布料",nst:"一条保存的1900年代街道：人参、干蘑菇、茶叶、纺织品",nt:"台北主站或中山站。步行到迪化街。上午10点-下午6点。现金"},
  {id:50,n:"Treasure Hill Artist Village — Vertical Houses & Studios",a:"Daan",v:["art","weird"],d:60,s:"Densely-packed hillside village of artist studios built vertically on a slope. Studios open for visits. Very Taiwan quirky.",st:"Treasure Hill is a maze of stairs and houses. Artists have colonized the buildings. Studios are open and welcoming.",im:"Narrow stairways between colorful buildings, art displayed in windows, studios visible through open doors, the chaotic beauty of vertical housing",t:"MRT to Guting Station. Walk uphill to Treasure Hill. No admission fee. Studios open 2-6pm weekdays, 12-6pm weekends.",c:["art","weird"],r:"g",nn:"寶藏巖","藝術村",ns:"垂直房屋和工作室",nst:"坡地上垂直建造的艺术家工作室。工作室对访客开放",nt:"古亭站下车。步行上山到Treasure Hill。免费进入。周末12-6pm"},
  {id:51,n:"Taipei 101 from Outside at Various Times — Photography Angles",a:"Xinyi",v:["beautiful","photography"],d:45,s:"Taipei 101 is best photographed from outside: from Elephant Mountain at sunset, from nearby parks at night, from highways during day",st:"The building changes appearance throughout the day and seasons. Sunset light is golden. Night light is electric.",im:"Taipei 101 glowing at sunset, golden light hitting the tower, or illuminated against a night sky, the building\'s structure lit from within",t:"Free from outside. Elephant Mountain best sunset views (1 hour hike). Riverside parks good for reflection shots. Highways have scenic pullouts.",c:["beautiful"],r:"g",nn:"台北101","摄影角度",ns:"從外面拍攝台北101",nst:"台北101从外面最好拍摄：从象山日落时、附近公园夜晚、公路白天",nt:"象山日落最好。河滨公园。公路观景点。免费"},
  {id:52,n:"Raohe Night Market — Smaller, More Local Than Shilin",a:"Songshan",v:["markets","food"],d:60,s:"Smaller night market than Shilin with more locals, less tourists. The food is excellent and prices are cheap.",st:"Raohe is a working night market. Local families come here. Tourists are present but not overwhelming.",im:"A night market street with stalls, the smell of grilling meat and fried foods, crowds of people, neon signs, lanterns",t:"MRT to Songshan Station. Market appears 4pm, busy 6-10pm. Budget 150-300 TWD for food. Very casual. No dress code.",c:["markets","food"],r:"g",nn:"饒河夜市",ns:"更小、更本地比士林",nst:"比士林更小的夜市，更多本地人，少游客。食物极好且价格便宜",nt:"松山站下车。下午4点出现，下午6-10点繁忙。150-300台币"},
  {id:53,n:"Tamsui Sunset — Riverside Town & Fisherman\'s Wharf",a:"Tamsui",v:["beautiful","romantic_water"],d:90,s:"A riverside town where the Tamsui River meets the sea. Walk the old street, eat at the wharf as sunset hits the water.",st:"Tamsui is a historic trading port. The river is wide. The light at sunset hits the water like gold.",im:"Walking by a river at sunset, the light golden, old buildings reflected in water, the sky changing colors, boats in the harbor",t:"MRT to Tamsui Station. Walk the old street (Zhuwei area) and wharf. Arrive 4pm for sunset. Dinner at wharf restaurants. Budget 400-800 TWD.",c:["beautiful","romantic_water"],r:"g",nn:"淡水","夕陽",ns:"河邊城鎮和漁人碼頭",nst:"淡水河与大海相交的河边城镇。日落时沿码头用餐",nt:"淡水站下车。步行旧街和码头。下午4点看日落。400-800台币"},
  {id:54,n:"Wistaria Tea House — Taiwanese Tea Ceremony Tradition",a:"Dadaocheng",v:["tea","history"],d:120,s:"An old tea house serving traditional Taiwanese oolong tea with full ceremony ritual. Generations-old family business.",st:"Wistaria has served tea since 1983 in a space that feels timeless. The owner knows every tea personally.",im:"Inside a traditional tea house, wooden interior, traditional tea equipment, steam from hot water, the tea master preparing a pot with care",t:"Dadaocheng area. Reservation recommended. Tea ceremony 800-1500 TWD. Closed Mondays. Allow 1.5-2 hours.",c:["tea","history_big"],r:"g",nn:"紫藤花茶館",ns:"台灣茶道傳統",nst:"一家历代传统台湾乌龙茶馆。茶道仪式。世代家族企业",nt:"大稻埕地区。预约建议。茶道800-1500台币。周一关闭"},
  {id:55,n:"Zhongshan Creative District — Indie Shops & Galleries",a:"Zhongshan",v:["art","shopping"],d:90,s:"A neighborhood of independent designers, tiny galleries, vintage shops, and coffee roasters. Very creative young Taiwan.",st:"Zhongshan is where designers set up shop. The storefronts change often. Each shop is a creative statement.",im:"A street with small boutique storefronts, art in windows, people walking slowly, cafes with small tables, the neighborhood artisanal",t:"MRT to Zhongshan Station. Walk Zhongshan North Road (various exits). Shops open 11am-9pm. Budget freely depending on interests.",c:["art","shopping"],r:"g",nn:"中山創意園區","設計師街",ns:"獨立商店和畫廊",nst:"设计师、小画廊、复古店、咖啡烘焙师的社区。年轻台湾创意",nt:"中山站下车。沿中山北路行走。店铺11am-9pm。自由预算"},
  {id:56,n:"Zhishan Garden — Restored Traditional Garden Design",a:"Zhongshan",v:["parks","beautiful"],d:60,s:"A carefully restored Taiwanese garden with traditional pavilions, water features, and 1920s architectural details",st:"Zhishan Garden demonstrates traditional Chinese garden design principles applied to a Taiwanese space.",im:"A garden with water features, a wooden pavilion reflected in water, stone bridges, landscaped paths winding through plants",t:"Zhongshan area (near National Taiwan University). Admission: 50 TWD. Open 9:30am-5pm, closed Mondays. 45-60 minutes.",c:["parks","beautiful"],r:"g",nn:"芝山公園","傳統花園",ns:"恢復的傳統花園設計",nst:"精心修复的台湾花园，传统亭阁、水景、1920年代建筑细节",nt:"中山地区。门票50台币。9:30am-5pm。45-60分钟"},
  {id:57,n:"Beitou Geothermal Valley — Sulfur Vents & Hot Spring Source",a:"Beitou",v:["nature","weird"],d:30,s:"Walk directly to the source of Beitou\'s hot springs: a valley of active sulfur vents, the water steaming from the ground",st:"The geothermal valley shows you where the heat comes from. Steam rises. The water is hot enough to cook eggs.",im:"A valley with multiple vents, steam rising, yellow and orange mineral deposits around vents, sulfur smell, the source visible",t:"From Beitou Station, walk north 20 minutes to the valley. Free. Open always. Very active — avoid alone. Best early morning.",c:["nature","weird"],r:"g",nn:"北投地熱谷","硫磺溫泉源頭",ns:"硫磺噴口和溫泉源頭",nst:"直接走向北投温泉的源头：活硫磺喷口的山谷，水从地面蒸出",nt:"北投站，向北步行20分钟。免费。始终开放。早上最好"}

  {id:1,title:"Imperial Taipei: Power and Pageantry",desc:"Visit the grand monuments of Taiwan's political heritage. Start at the Chiang Kai-shek Memorial Hall to experience hourly guard ceremonies. Then explore the Presidential Building and Ketagalan Boulevard to understand how Taiwan marks national identity. End at the 228 Memorial to confront the complex realities of Taiwan's path to democracy.",places:[1, 14, 24],time:"4 hours"},
  {id:2,title:"Night Market Odyssey: Street Food Legend",desc:"Experience Taiwan's most famous night market culture. Start at Shilin Night Market for iconic street foods and crushing crowds. Hunt for the best stinky tofu, popcorn chicken, and bubble tea. Return to a central teahouse like Chingshan 1900 to process the experience with proper tea service and reflection.",places:[2, 16],time:"5 hours"},
  {id:3,title:"Taipei's Vertical Life: Sky and Earth",desc:"Experience the city from above and below. Ascend Taipei 101 for bird's-eye views. Then visit Elephant Mountain or Dandingshan for hiking and alternative perspectives. Conclude at the Taipei Zoo to see how nature manifests in the urban environment.",places:[3, 17, 5, 28],time:"6 hours"},
  {id:4,title:"Colonial Taipei: Architecture of Power",desc:"Trace the layers of Taipei's colonial history. Visit the Taipei Guest House (art deco elegance), Taiwan Story House (1921 mansion), and explore preserved Dadaocheng neighborhood temples and shophouses. Understand how foreign powers shaped the city's physical form.",places:[7, 20, 21],time:"4 hours"},
  {id:5,title:"Contemporary Art & Underground Culture",desc:"Discover Taipei's thriving arts scene. Explore Huashan 1914's converted distillery galleries. Visit the Red House Theater for queer culture and experimental performance. Browse Lin-An Taige Book Store's literary cathedral. Understand Taiwan's progressive contemporary culture.",places:[8, 13, 15],time:"5 hours"},
  {id:6,title:"Geothermal Wonders: Taiwan's Volcanic Soul",desc:"Experience Taiwan's geological drama. Hike through Yangminshan National Park's sulfurous vents. Soak in Beitou Hot Spring Museum's thermal waters. Feel the land still creating itself beneath your feet.",places:[6, 11],time:"4 hours"},
  {id:7,title:"Spiritual Taipei: Religion and Philosophy",desc:"Understand Taiwan's syncretic spirituality. Visit the ancient Taipei Confucius Temple with its 300-year lineage. Explore the Temple of the Supreme Way's fusion of Buddhist-Taoist practice. Witness how philosophy and worship blend in Taiwanese culture.",places:[12, 7],time:"3 hours"},
  {id:8,title:"Riverside Romance: Tamsui to the Sea",desc:"Follow the Tamsui River to the coast. Visit the Fishermen's Wharf for sunset over the strait. Explore Danshui Iron Fort's military history. Walk the riverside promenade in the glow of reflected light. Experience the maritime dimension of Taipei.",places:[9, 25],time:"4 hours"},
  {id:9,title:"Tea Culture Immersion: Plant to Ritual",desc:"Journey through Taiwan's tea obsession. Take cable car to Maokong Teahouse Trail to see where tea grows. Spend time in a working teahouse understanding brewing rituals. Return to downtown for tea museum (in Beitou). Grasp tea as philosophy, agriculture, and culture.",places:[19, 11],time:"6 hours"},
