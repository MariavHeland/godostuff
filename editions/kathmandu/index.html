<script>
const P = [
  {id:1,n:"Swayambhunath — golden monkey temple on the hill",a:"Central Kathmandu",v:["history", "art", "views", "local"],d:120,s:"A 5th-century Buddhist stupa with 365 steps leading to a plateau with golden dome, monkeys, and panoramic city views.",st:"The name 'Swayambhunath' means 'self-created' in Sanskrit, referring to the stupa's mythical appearance. The steep climb of 365 steps (one for each day of the year) ascends toward the sacred plateau. I climbed with aged pilgrims, young couples, and tourists. The monkeys are aggressive and numerous—they steal sunglasses, cameras, and food. The main stupa gleams gold and white against the Kathmandu sky. The surrounding plateau is crowded with smaller shrines, prayer wheels, and devotional activity. From the summit, Kathmandu Valley spreads below—a patchwork of development, agriculture, and sacred spaces. The site has been central to Nepalese Buddhism for over 1,500 years. The afternoon light transforms everything to shades of gold. The walk down is treacherous; the stone steps are worn smooth and narrow.",im:"You stand at the plateau. The golden dome catches morning light. Incense smoke rises in spirals. Monkeys shriek and bound across the ornamental spires. Buddhist chanting drifts from the shrine room. The wind carries prayer flags' flutter. Pilgrims circumambulate—their footsteps marking the stone path worn smooth over centuries.",t:"15 min walk west from central Kathmandu or taxi to base. Donation: NPR 200. Allow 2-3 hours. Wear comfortable shoes for climbing. Monkeys: keep bags secure, don't make eye contact.",c:[],r:"g",nn:"स्वयम्भुनाथ",ns:"365 चरणहरु सहितको 5 औं शताब्दीको बौद्ध स्तूप, सुनको गुम्बद र बानरहरु।",nst:"'स्वयम्भुनाथ' संस्कृत मा 'आत्म-निर्मित' को अर्थ हो। 365 चरण पवित्र पठारतिर ऊर्ध्वमुखी हुन्छन्। साइट 1,500 वर्षको लागि नेपाली बौद्ध धर्मको केन्द्रबिन्दु भएको छ।",nt:"केन्द्रीय काठमाडौँबाट पश्चिमतर्फ 15 मिनटको हिँडाइ वा ट्याक्सी। दान: NPR 200। 2-3 घन्टा। आरामदायक जुत्ता लगाउनुस्। बानरहरु: झोली सुरक्षित राख।"},
  {id:2,n:"Pashupatinath — holiest Hindu temple in South Asia",a:"Eastern Kathmandu",v:["history", "religion", "local", "hidden"],d:180,s:"A UNESCO World Heritage temple complex dedicated to Lord Shiva, featuring cremation ghats on the Bagmati River.",st:"Walking toward Pashupatinath, you enter a space where life and death coexist visibly. The temple sits on the Bagmati River's banks, where Hindu bodies are cremated. The main temple is reserved for Hindus (visitors observe from restricted areas), but the surrounding complex is accessible. I witnessed funeral processions bringing bodies wrapped in white cloth, chanting prayers, the transition from life to ash performed in public. The temple architecture is masterful—intricate carvings, golden finials, steep-roofed main shrine built in the 1400s. Sadhus (holy men) sit in meditation. Pilgrims arrive in constant streams for religious purposes, not tourism. The river itself is considered sacred though it carries the city's waste. The experience is profound and challenging—mortality made visible and ritualized. Photography restrictions are strict around cremation areas.",im:"The golden temple spire reflected in the Bagmati River as funeral smoke rises from ghats, sadhus in ochre robes sitting in contemplation.",t:"Bus or taxi to east Kathmandu (20 min from downtown). Donation: NPR 1000. Photography restricted near cremations. Respectful dress essential. Guides available for hire. Early morning most peaceful.",c:[],r:"g",nn:"पशुपतिनाथ",ns:"दक्षिण एशियाको सबैभन्दा पवित्र हिन्दू मन्दिर, बाग्मती नदीमा दाह कर्मस्थल।",nst:"पशुपतिनाथ एक ऐतिहासिक स्थान जहाँ जीवन र मृत्यु दृश्यमान् सहअस्तित्व। मुख्य मन्दिर हिन्दूहरुको लागि सुरक्षित (आगन्तुकहरु प्रतिबंधित क्षेत्र)। बाग्मती नदी पवित्र मानिन्छ।",nt:"पूर्वी काठमाडौँमा बस वा ट्याक्सी (20 मिनट)। दान: NPR 1000। आरामदायक कपडा आवश्यक। पहिचान उपलब्ध। सबैभन्दा शान्तिमय सबेर।"},
  {id:3,n:"Boudhanath Stupa — Buddhist pilgrimage center",a:"East Kathmandu",v:["history", "art", "religion", "views"],d:90,s:"A massive white stupa with an enormous mandala-shaped base, central pilgrimage destination for Tibetan Buddhists.",st:"The stupa dominates its landscape—white dome rising above a circular marketplace circumambulated constantly by Buddhist pilgrims. The stupa was rebuilt after the 1934 earthquake, and pilgrims have been visiting continuously since. Circumambulation (walking clockwise around the stupa) is a primary devotional practice. I joined the flow of monks in maroon robes, elderly Tibetans with prayer beads, young families rotating prayer wheels. The marketplace surrounding the stupa sells Buddhist religious items, thangka paintings, jewelry. The air rings with prayer wheels spinning. Monasteries occupy the surrounding buildings. Evenings are most active—monks chanting in monasteries create a profound soundscape. The stupa's mandala shape is intended to represent the cosmos—the base square is earth, the dome sky, the spire the axis connecting worlds. It's simultaneously a commercial marketplace and sacred space.",im:"The vast white dome of Boudhanath Stupa at dusk as pilgrims circumambulate and butter lamps glow, chanting monks' voices filling the air.",t:"15 min bus or taxi northeast from downtown. Free access. Best visited late afternoon through evening when monks chant. Respectful circumambulation: always walk clockwise. Photography allowed. Donations appreciated.",c:[],r:"g",nn:"बौद्धनाथ",ns:"विशाल सफेद स्तूप विशाल मण्डला-आकार आधार, बौद्ध तीर्थयात्रा केन्द्र।",nst:"स्तूप 1934 को भूकम्प पछि पुनर्निर्मित। तीर्थयात्रीहरु लगातार आएको छन्। परिक्रमा (दक्षिणावर्त हिँडाइ) प्राथमिक भक्तिमय अभ्यास हो।",nt:"शहरको उत्तरपूर्वमा 15 मिनटको बस वा ट्याक्सी। सन्ध्याकाल भक्षण। सम्मानपूर्वक परिक्रमा: सधैँ दक्षिणावर्त हिँड। दान प्रशंसा।"},
  {id:4,n:"Durbar Square — ancient plaza of political power",a:"Central Kathmandu",v:["history", "architecture", "art", "local"],d:120,s:"A UNESCO World Heritage plaza surrounded by temples, palaces, and carved windows from the Malla kingdom era.",st:"Durbar Square was the ceremonial heart of Kathmandu's three Malla kingdoms for centuries. The 2015 earthquake damaged much of the architecture, and reconstruction continues. Yet the remaining structures showcase the height of Nepalese architectural achievement—intricately carved wooden windows (jharokha), temple spires covered in carved details, stone courtyards. The main palace complex occupies one side; temples fill the square. I walked between structures observing craft details that took years to complete. The square was once the literal seat of political power—it's where coronations occurred, where the Malla kings demonstrated their wealth and religious devotion through temple construction. The surrounding neighborhoods maintain old Kathmandu character—narrow lanes, traditional brick houses, small temples. The square is crowded with tourists, but early morning offers respite. The earthquake damage is both tragedy and reminder of Nepal's geological precariousness.",im:"You step into the plaza. The light is golden—filtered through carved wooden window screens. The smell of marigold garlands mingles with incense. Pigeons explode and resettle. The multi-tiered temples tower overhead, every bracket and lintel cut with precision. You hear temple bells, vendors calling, pilgrims chanting. The worn stone beneath your feet tells of centuries of footsteps.",t:"Central location, walkable or short taxi ride. Entry: NPR 1000 for tourist ticket. Open daily sunrise to sunset. Guides available. Photography allowed. Best at dawn.",c:[],r:"g",nn:"दरबार चौक",ns:"UNESCO विश्व धरोहर चौक मन्दिर, महलहरु, नक्काशी साथ।",nst:"दरबार चौक शताब्दीको लागि काठमाडौँको तीन मल्ल राज्यको समारोहात्मक हृदय थियो। 2015 को भूकम्पले धेरै क्षति गरेको थियो। संरचनाहरु नेपाली आर्किटेक्चरको शिखर प्रदर्शन गर्दछन्।",nt:"केन्द्रीय स्थान, हिँडिएको वा छोटो ट्याक्सी। प्रवेश: NPR 1000। दैनिक सूर्योदय सूर्यास्त। पहिचान उपलब्ध। फोटोग्राफी अनुमति। भोर सबैभन्दा अच्छो।"},
  {id:5,n:"Thamel — tourist district and cultural marketplace",a:"Central Kathmandu",v:["local", "food", "art", "night"],d:90,s:"A dense neighborhood of narrow lanes filled with guesthouses, shops, restaurants, and bars catering to tourists.",st:"Thamel is Kathmandu's interface with the international world. The narrow lanes are cramped with competing signs—restaurant menus in multiple languages, shop windows displaying everything from traditional thangas to cheap souvenirs. The air smells of hashish, spices, and exhaust. Guesthouses have proliferated since the 1970s when overland travel routes brought Western travelers. Today it's overwhelmingly commercialized, yet maintains some genuine local businesses (restaurants, shops) alongside tourist exploitation. I stayed in a guesthouse and observed the nightly rhythm—backpackers gathering in restaurants, the street becoming louder and livelier as evening progressed. Prices reflect tourism's inflation—you pay tourist prices for everything. Yet deeper into Thamel's side alleys are less commercialized areas where everyday life continues. The district is simultaneously artificial (created for tourists) and authentic (locals work, live, and shop here).",im:"Narrow cobblestone lane crowded with international restaurant signs, tourists and locals mixing, colorful shop fronts glowing in evening light.",t:"Central Kathmandu, walkable from most places. Hotels range from budget hostels to mid-range guesthouses. Restaurants, shops, bars throughout. Walking maps essential. Beware of theft.",c:[],r:"g",nn:"थामेल",ns:"पर्यटक-केन्द्रित पडोल संकीर्ण गलीहरु, दुकानहरु, रेस्टुरेन्ट भरिएको।",nst:"थामेल काठमाडौँको अन्तर्राष्ट्रिय संसारसँग इन्टरफेस हो। 1970 देखि यात्रीहरु आएको छन्। आज अत्यधिक वाणिज्यक लेकिन केही मूल व्यवसाय प्रयोगशीलता आचरण गर्दछन्।",nt:"केन्द्रीय काठमाडौँ। होटलहरु बजेट होस्टेल सिद्ध्यान्तमा। अनेक रेस्टुरेन्ट, दुकानहरु। चोरी सावधान।"},
  {id:6,n:"Kathmandu Durbar Museum — royal palace interior",a:"Central Kathmandu",v:["history", "architecture", "hidden"],d:75,s:"The former royal palace of the Malla kings, now a museum preserving interior spaces and royal artifacts.",st:"The museum allows visitors inside the actual palace where Malla kings governed. The rooms are arranged chronologically, decorated with period furnishings and royal regalia. The architecture is pristine—carefully restored carved wood details, painted ceilings depicting deities, sacred geometric patterns. Each room served specific royal functions—receiving chambers, private quarters, religious spaces. I walked through spaces where political decisions were made, imagining the pageantry and ceremony that once filled these rooms. The museum's interpretation emphasizes political history while preserving architectural authenticity. The central courtyard is open to sky and surrounded by galleries. The transition from public ceremonial spaces to private quarters reveals how royal power was staged. The palace represents a moment before Nepal's loss of political independence to Britain and India.",im:"Interior courtyard with carved wooden columns, intricate painted ceiling panels depicting celestial beings, filtered sunlight creating geometry on stone floors.",t:"Durbar Square location. Entry: NPR 300. Open 10:30 AM-4 PM daily (closed Tuesdays). Guides available. Photography allowed in most areas. Allow 1-2 hours.",c:[],r:"g",nn:"काठमाडौँ दरबार संग्रहालय",ns:"मल्ल राजाहरु को पूर्व राजमहल, अन्तःस्थान र राजकीय कलाकृति संरक्षण।",nst:"संग्रहालय मल्ल राजाहरु शासन गरेको वास्तविक महल भित्र आने अनुमति दिन्छ। कोठाहरु कालक्रमसँग व्यवस्थित छन्, अवधि साज-सज्जा र राजकीय वेशभूषा सहित।",nt:"दरबार चौक स्थान। प्रवेश: NPR 300। सकाले 10:30 पूर्वाह्न-4 अपराह्न (मंगलवार बन्द)। पहिचान उपलब्ध। फोटोग्राफी अनुमत।"},
  {id:7,n:"Taleju Temple — highest point in city access",a:"Central Kathmandu",v:["history", "views", "hidden", "religion"],d:60,s:"A towering five-tiered temple in Durbar Square (top level restricted), offering elevated city views from lower platforms.",st:"Taleju Temple rises 35 meters above the square—the tallest structure in the immediate area. The temple is dedicated to Taleju, a protective deity of Kathmandu's Malla kings. The lower platforms are accessible to visitors; the top three tiers are reserved for Hindu devotees only. I climbed the first platforms and gained significant elevation. The views show Kathmandu's density—packed buildings spreading toward mountains. The temple's architecture represents the culmination of Nepalese pagoda design—multiple tiers with progressively smaller roofs, intricate carvings on beams and finals. The temple was rebuilt after the 1934 earthquake. Standing at the elevated point, you sense why it was strategically important—control of this high ground symbolized political power. The surrounding square spreads below, revealing the urban geometry of medieval Kathmandu.",im:"Multi-tiered golden temple roof rising above city buildings, the spire topped with gleaming finial catching afternoon light.",t:"Durbar Square. Accessible to non-Hindus on lower platforms only. NPR 1000 ticket covers access. Photography allowed from accessible areas. Guides explain restrictions. Afternoon visits recommended.",c:[],r:"g",nn:"तालेजु मन्दिर",ns:"दरबार चौकमा पाँच तहको ऊँचो मन्दिर (शीर्ष स्तर प्रतिबंधित)।",nst:"तालेजु मन्दिर 35 मीटर ऊपर उठ्छ—तात्कालीन क्षेत्रमा सबैभन्दा उच्च संरचना। काठमाडौँको मल्ल राजाहरु को रक्षा देवीलाई समर्पित। 1934 को भूकम्प पश्चात पुनर्निर्मित।",nt:"दरबार चौक। हिन्दूहरु बाहेक अन्यहरु निचला प्ल्याटफर्ममा पहुँच। NPR 1000। दोपहर यात्रा सिफारिस गरिएको।"},
  {id:8,n:"Jagannath Temple — oldest pagoda in Nepal",a:"Central Kathmandu",v:["history", "architecture", "hidden", "art"],d:60,s:"A three-tiered temple dedicated to Jagannath, featuring some of the finest stone carving in Nepal.",st:"The temple is believed to date from the 12th century, making it one of Nepal's oldest surviving structures. The three tiers decrease in size as they ascend—a classic pagoda proportion. The foundation is stone; the upper tiers are wood. The carved details are extraordinary—every surface seems decorated with narrative scenes from Hindu epics, geometric patterns, deity sculptures. The stone carving represents techniques perfected over generations. The temple remains actively used for worship; I observed pilgrims leaving offerings. The temple's proximity to the palace suggests its religious importance. Unlike some temples that became primarily tourist attractions, Jagannath maintains genuine devotional function. The surrounding neighborhood preserves medieval character—narrow lanes, old bhawan (traditional mansion) structures, small shrines at corner intersections. The temple is less visited than nearby shrines, offering a quieter experience.",im:"You approach the entrance. Incense and oil lamps create a haze. Fresh marigold garlands hang heavy with scent. The three-tiered roof curves against the sky. You hear water trickling from a stone spout. The wood is dark and old—centuries of devotional wear visible in every surface. Bells hang from ornamental chains. An elderly pilgrim sits in shadow, murmuring prayers. This is active, living devotion.",t:"Durbar Square area, walking distance from main tourist zones. Free entry. Open daily. Limited signage; easy to miss. Respectful behavior expected. Early morning most peaceful.",c:[],r:"g",nn:"जगन्नाथ मन्दिर",ns:"नेपालको सबैभन्दा पुरानो पेगोडा, महीन पत्थर नक्काशी सहित।",nst:"मन्दिर 12 औं शताब्दीको मान्यता गरिएको हो। तीन स्तर आकारमा घट्दै जान्छन्। नक्काशी विवरण असाधारण—हर सतह हिन्दू महाकाव्य दृश्य से सजिएको।",nt:"दरबार चौक क्षेत्र, पैदल दूरी। मुक्त प्रवेश। दैनिक। सीमित संकेत; मिस गर्न सजिलो। सबेरै सबैभन्दा शान्तिमय।"},
  {id:9,n:"Patan Durbar Square — sister city's royal plaza",a:"South Kathmandu (Patan)",v:["history", "architecture", "local"],d:90,s:"A UNESCO World Heritage plaza in the ancient city of Patan, featuring temples, palaces, and artistic craftsmanship.",st:"Patan was one of three capitals in the Kathmandu Valley (along with Kathmandu and Bhaktapur) during the Malla period. The city maintained political independence until Nepal's unification. Today it's functionally part of greater Kathmandu but preserves distinct character. The Durbar Square is surrounded by temples and the former royal palace. The architecture is refined—less grandiose than Kathmandu's but more delicate. The city is famous for craftsmanship; many of Nepal's most skilled artisans live here. Metalwork, thangka painting, and stonework reach high technical levels. The square is less crowded than Kathmandu's, allowing more contemplative experience. I watched craftspeople working in small shops, their techniques unchanged for centuries. The surrounding neighborhoods maintain traditional architecture. Patan feels more intimate than Kathmandu—less tourist infrastructure, more everyday life.",im:"You stand in the plaza. The smell of metalwork—hot copper and bronze—drifts from nearby workshops. Temple spires catch afternoon light. You hear the *thunk-thunk* of a hammer on metal from a stonemason's workshop. Stone benches are worn by centuries of sitting. Pigeons wheel overhead. The narrow lanes lead deeper—beyond the plaza, neighborhood life continues undisturbed, laundry drying between buildings, children playing.",t:"Bus or taxi south from Kathmandu (20 min). Entry: NPR 500 for tourists. Open daily sunrise to sunset. Craft workshops throughout city offer demonstrations. Guide services available.",c:[],r:"g",nn:"पाटन दरबार चौक",ns:"प्राचीन पाटन शहरको UNESCO विश्व धरोहर चौक, कलात्मक कारीगरीसहित।",nst:"पाटन मल्ल अवधिमा तीन राजधानीहरु मध्ये एक थियो। शहर राजनीतिक स्वतन्त्रता राख्यो। आज यो ग्रेटर काठमाडौँको भाग हो।",nt:"काठमाडौँ दक्षिण बस वा ट्याक्सी (20 मिनट)। प्रवेश: NPR 500। दैनिक सूर्योदय सूर्यास्त। कलाकर्म कार्यशाला प्रदर्शन। पहिचान सेवा उपलब्ध।"},
  {id:10,n:"Bhaktapur Durbar Square — preserving medieval town",a:"East Valley (Bhaktapur)",v:["history", "architecture", "local", "hidden"],d:180,s:"A medieval town maintained as living heritage, with palace, temples, and traditional neighborhoods organized around a central plaza.",st:"Bhaktapur is the least developed of the three Malla capitals and therefore most architecturally preserved. The town plan is medieval—tight lanes radiating from the central square, buildings five stories high but narrow, windows and doors dominating facades. The 2015 earthquake caused damage here as well, but restoration prioritized maintaining authentic character. I walked the main square in morning when local activities were visible—water carriers, vegetable vendors, residents moving through spaces. Unlike Kathmandu and Patan, Bhaktapur explicitly charges tourists for entry and restricts vehicle traffic, preserving pedestrian experience. The craft traditions remain strong—potters' square features dozens of artisans producing clay. Thangka painters work in small studios. The surrounding neighborhoods resist commercialization. The town feels genuinely lived-in rather than preserved for display. Electricity poles and modern necessities are visible but don't overwhelm. The experience is closest to understanding what Kathmandu Valley towns felt like centuries ago.",im:"Medieval plaza surrounded by five-story buildings with ornate windows, artisans working in open-air studios, narrow lanes disappearing into shadowed distances.",t:"Bus east from Kathmandu (1.5 hours). Entry: NPR 1500 daily ticket. No vehicles in old town. Guides available. Photography allowed. Allow full day for immersion. Pottery demonstrations free to watch.",c:[],r:"g",nn:"भक्तपुर दरबार चौक",ns:"मध्ययुगीन शहर जीवन्त धरोहरको रूपमा संरक्षित।",nst:"भक्तपुर तीन मल्ल राजधानी मध्ये सबैभन्दा कम विकसित। शहर योजना मध्ययुगीन—केन्द्रीय चौक विकिरण गलीहरु। 2015 को भूकम्प क्षति गरेको लेकिन पुनर्स्थापन मूल वर्ण राखेको।",nt:"काठमाडौँ पूर्व बस (1.5 घन्टा)। प्रवेश: NPR 1500। कुनै गाडी पुरानो शहरमा। पहिचान उपलब्ध। पूर्ण दिन। मृत्तिका प्रदर्शन निरीक्षण मुक्त।"},
  {id:11,n:"National Museum of Nepal — nation's artifacts",a:"Central Kathmandu",v:["history", "hidden", "art"],d:90,s:"Nepal's primary museum with collections covering art, history, and culture from ancient kingdoms through modern era.",st:"The museum occupies a palatial building and is divided into different galleries. The art section features sculptures, paintings, and manuscripts from various periods. Sections emphasize Nepal's religious syncretism—Hindu and Buddhist objects displayed together showing coexistence. The historical sections document Nepal's evolution from ancient kingdoms through Malla periods to modern nation-state. The collections are presented with limited English explanation; audio guides help. The museum represents how Nepal understands its own history—emphasizing cultural continuity and regional importance. Many objects show Nepal's role as cultural bridge between India and Tibet. The presentation style is traditional (glass cases, minimal interpretation) rather than contemporary. The building itself is worth experiencing—the architecture and grounds suggest refined taste. Few tourists visit compared to religious sites; the museum feels undiscovered.",im:"Museum gallery with sculptures and paintings arranged on white walls, filtered natural light from high windows creating contemplative atmosphere.",t:"Chhauni area, northwest of downtown. Bus or taxi (20 min from center). Admission: NPR 300. Open 10 AM-5 PM, closed Mondays. Photography charges extra. Allow 2-3 hours.",c:[],r:"g",nn:"नेपाल राष्ट्रिय संग्रहालय",ns:"नेपालको प्राथमिक संग्रहालय कला, इतिहास, संस्कृति संग्रह।",nst:"संग्रहालय राजसी भवन अधिकृत। कला अनुभाग मूर्तिकला, चित्रकला, विभिन्न अवधिको पाण्डुलिपि। नेपालको धार्मिक समन्वय—हिन्दू बौद्ध वस्तु सहअस्तित्व।",nt:"छाउनी क्षेत्र, उत्तरपश्चिम। बस वा ट्याक्सी। प्रवेश: NPR 300। 10 पूर्वाह्न-5 अपराह्न, सोमवार बन्द। फोटोग्राफी अतिरिक्त शुल्क।"},
  {id:12,n:"Kumari House — home of the living goddess",a:"Central Kathmandu",v:["history", "religion", "hidden", "local"],d:60,s:"The palace of the Kumari (living goddess child), a sacred tradition where a young girl is worshipped as deity.",st:"The Kumari is a prepubescent girl selected through ritualistic process to be the incarnation of the Hindu goddess Durga. She lives in a palace in Durbar Square and receives visitors and worshippers. The palace is a traditional bhawan with intricately carved windows. Visitors are limited to specific viewing areas; glimpses of the Kumari are brief and ceremonial. The tradition is centuries old and remains widely accepted in Nepal. The Kumari serves until menstruation, at which point she returns to normal life with pension and cultural status. The practice raises contemporary questions about childhood, autonomy, and tradition. Yet the Kumari herself appears serene in photographs and descriptions. The tradition demonstrates Nepal's continued integration of sacred and political spheres. The palace's architecture is exceptional—some of the finest carving in Kathmandu.",im:"You stand in the courtyard below. Afternoon light falls through ornate wooden window screens, casting geometric shadows on the red brick. A crowd of devotees waits—some praying, some whispering. Incense smoke curls upward. At an upper window, a flash of red silk. The Kumari appears briefly—a child in divine isolation, looking down at the world. The air holds sacred stillness.",t:"Durbar Square, walking distance from most tourist areas. Admission: NPR 200. Hours vary; typically 9-11:30 AM, 1-4 PM. Closed during festivals. Photography strictly prohibited. Behavior must be respectful.",c:[],r:"g",nn:"कुमारी घर",ns:"कुमारीको (जीवन्त देवी बालिका) महल, पवित्र परम्परा।",nst:"कुमारी एक प्रयौवन बालिका जो देवी दुर्गा को अवतार मान्यता। अनुष्ठानिक प्रक्रिया मार्फत चयन। महल दरबार चौकमा। परम्परा शताब्दी पुरानो।",nt:"दरबार चौक। प्रवेश: NPR 200। घण्टा भिन्न; सामान्यतः 9-11:30 पूर्वाह्न, 1-4 अपराह्न। त्यौहार बन्द। फोटोग्राफी सख्ती प्रतिबंधित। सम्मानपूर्ण व्यवहार।"},
  {id:13,n:"Asan Bazaar — spice and commerce marketplace",a:"Central Kathmandu",v:["food", "local", "hidden"],d:75,s:"A centuries-old wholesale market famous for spices, grains, and traditional goods, operating continuously since the Malla period.",st:"Asan Bazaar's narrow lanes are packed with wholesalers selling spices, grains, oils, and traditional medicines. The air is thick with aroma—turmeric, cumin, coriander, dried chilis. Shopkeepers sit behind piles of goods, calling out prices. The market operates at dawn when wholesale buyers arrive from surrounding villages. I visited early morning and witnessed the intensity—vendors efficiently weighing goods, negotiating prices, loading purchases. The market preserves medieval commerce patterns—no fixed prices, negotiation expected. Photography is discouraged (vendors view photos as competitive threat). The lanes are barely wider than two people. Water drips from upper stories. The market's chaos is overwhelming but authentic. Unlike tourist bazaars, this is where Kathmandu residents buy their spices. Prices are low; commerce is serious. The market has functioned continuously for centuries in roughly the same location.",im:"You step into the lane. Your senses overload—turmeric, cumin, fenugreek, cardamom, chili powder. The smell is thick, almost visible. Burlap sacks pile ceiling-high. Vendors call prices and banter in Newari. The narrow passage creates a tunnel—light filtered through overhead structures. You brush past baskets of dried chilies, ginger, garlic. The floors are slick with spice dust. This is scent made tangible.",t:"Central Kathmandu, walking distance. Best visited very early morning (6-9 AM). Limited English; bring translation app. Small cash transactions. Avoid photography. Watch bags carefully.",c:[],r:"g",nn:"असन बजार",ns:"मसाला र वाणिज्य बजार शताब्दी पुरानो, मल्ल अवधिदेखि निरन्तर।",nst:"असन बजार संकीर्ण गलीहरु थोक विक्रेताहरु, मसालहरु, अनाज, तेल। हवा सुगन्धमय। दुकानदार पीछे बैठ्छन् सामान। बाजार सबेर चलन्छ।",nt:"केन्द्रीय काठमाडौँ, पैदल दूरी। सबेर 6-9 पूर्वाह्न सर्वोत्तम। सीमित अंग्रेजी। छोटा नगद। फोटोग्राफी बच। झोली घड़ी।"},
  {id:14,n:"Monkey Temple see: Swayambhunath",a:"Alternative names",v:["hidden"],d:0,s:"This is an alternative entry point.",st:"See Swayambhunath entry.",im:"See place 1.",t:"See place 1.",c:[],r:"g",nn:"बानर मन्दिर",ns:"स्वयम्भुनाथको वैकल्पिक नाम",nst:"स्थान 1 देखहेर",nt:"स्थान 1 देखहेर"},
  {id:15,n:"Kopeshwar Mahadev Temple — ancient Shiva shrine",a:"West Kathmandu",v:["history", "religion", "hidden"],d:90,s:"An ancient temple dedicated to Shiva, featuring intricate stone carving and remaining virtually unchanged through centuries.",st:"The temple's origins are disputed—some inscriptions suggest 6th century, others later—but it's definitely ancient. The main tower is made of stacked stone carved with narrative reliefs and decorative motifs. The architectural style is pre-Malla, suggesting continuity from even earlier kingdoms. The temple remains actively used—flowers and offerings cover the altars. The setting is semi-rural, having escaped urban development. The surrounding area maintains traditional character. I visited during a minor ceremony and felt like an accidental witness to genuine practice rather than tourism. The temple's age and preservation make it archaeologically significant. Few tourists find the site; it remains primarily for pilgrims. The stone carving, though weathered, shows the skill of ancient craftspeople.",im:"The temple tower rises from green hills. Stone reliefs are weathered soft by centuries—their details blur into texture. You run your hand across the surface, feeling time. Fresh marigold flowers pile at the base. Oil lamps flicker. The air is cool, untouched by city sounds. Only birdsong and occasional chanting reach here. The rural landscape breathes around the sacred stone.",t:"West of downtown, bus or taxi (30 min). Admission: NPR 100-200 (donation basis). Open daily. Guides rarely available; mainly pilgrimage site. Photography allowed respectfully.",c:[],r:"g",nn:"कोपेश्वर महादेव",ns:"शिव को समर्पित प्राचीन मन्दिर, महीन पत्थर नक्काशी साथ।",nst:"मन्दिर मूल विवादित—कुछ शिलालेख 6 औं शताब्दी। निश्चित रूप से प्राचीन। मुख्य टावर नक्काशी विवरण। सक्रिय रूप से प्रयुक्त।",nt:"पश्चिमी काठमाडौँ, बस वा ट्याक्सी (30 मिनट)। प्रवेश: NPR 100-200। दैनिक। दान आधार। सम्मानपूर्ण फोटोग्राफी।"},
  {id:16,n:"Garden of Dreams — restored Raj-era park",a:"Thamel",v:["beautiful", "hidden", "art", "nature"],d:60,s:"A beautifully restored early 20th-century Neoclassical garden featuring fountains, sculptures, and landscaped spaces.",st:"The garden was built in 1920 by a wealthy merchant and fell into decay after his death. In 2007, it was restored to approximate original conditions based on historical photographs. The garden features classical European-influenced design—geometric beds, ornamental pools, stone sculptures, symmetrical pathways. The restoration attempted historical accuracy while adapting for contemporary visitors (cafes, bathrooms). The result is hybrid—authentic enough to feel genuine, modern enough for comfort. I spent afternoon here and experienced the garden as an escape from Kathmandu's intensity. The garden design emphasizes contemplation—quiet spaces, water features, shade. The restoration preserved some authentic vegetation while replanting where original species were lost. The garden demonstrates restoration challenges—how to make old places functional without destroying authenticity. It's expensive for Nepal (NPR 300) and attracts tourists, yet maintains genuine beauty.",im:"Symmetrical garden pathways with geometric flower beds, ornamental pool reflecting sky, classical stone sculptures positioned in composed landscape.",t:"Thamel area, walking distance for many hotels. Admission: NPR 300. Open daily 9 AM-dusk. Cafe and restaurant on grounds. Photography allowed. Allow 1-2 hours.",c:[],r:"g",nn:"स्वप्न बाग",ns:"पुनर्स्थापित राज-युग उद्यान, फव्वारा, मूर्तिकला साथ।",nst:"बाग 1920 में निर्मित। 2007 में पुनर्स्थापित मूल शर्तमा आधार पर। शास्त्रीय यूरोपीय डिजाइन। पुनर्स्थापन ऐतिहासिक सटीकता प्रयास।",nt:"थामेल क्षेत्र, पैदल दूरी। प्रवेश: NPR 300। दैनिक 9 पूर्वाह्न-सन्ध्या। कैफे साइट। फोटोग्राफी अनुमति। 1-2 घन्टा।"},
  {id:17,n:"Godavari Park — botanical gardens south of valley",a:"South Valley (Godavari)",v:["nature", "beautiful", "hidden"],d:120,s:"A botanical park with extensive plant collections, greenhouses, and hiking trails in the southern hills.",st:"Godavari is cooler than Kathmandu (slight elevation gain) and serves as botanical research center. The formal gardens feature organized plant collections organized by habitat and function. The greenhouse protects tropical plants from mountain winters. Hiking trails ascend from the park into forested hills. The setting combines human cultivation with natural landscape. I spent time in the orchid greenhouse where humidity mimics tropical climate. The park employs botanists who explain plant ecology and conservation. It's less touristy than central Kathmandu attractions, attracting students and local families. The drive south from Kathmandu passes through increasingly rural landscape, showing valley's agricultural character. The park demonstrates how botanical science functions at local level. The trails reward with views over the valley.",im:"Greenhouse interior with orchids on display shelves, humid air, verdant foliage creating layered green depths.",t:"Drive or bus south from Kathmandu (45 min to Godavari area). Admission: NPR 150. Open daily 10 AM-5 PM. Guides available. Trails require moderate fitness. Bring water.",c:[],r:"g",nn:"गोदावरी पार्क",ns:"दक्षिण घाटीमा बोटानिकल पार्क, हिमालय उद्यान संलग्न।",nst:"गोदावरी काठमाडौँ भन्दा ठन्डो (हल्का उन्नयन लाभ)। बोटानिकल अनुसन्धान केन्द्र। औपचारिक बाग संयंत्र संग्रह।",nt:"काठमाडौँ दक्षिणमा ड्राइभ वा बस (45 मिनट)। प्रवेश: NPR 150। दैनिक 10 पूर्वाह्न-5 अपराह्न। पहिचान उपलब्ध। पानी लाओ।"},
  {id:18,n:"Narayanhiti Palace Museum — royal palace turned museum",a:"Central Kathmandu",v:["history", "architecture", "hidden"],d:90,s:"The former royal palace, now a museum showcasing royal life and Nepal's monarchy history.",st:"The palace served as the residence of Nepal's kings from 1963 until 2008 when the monarchy was abolished and democracy established. The museum preserves royal spaces—reception halls, dining rooms, private quarters, throne rooms. The architecture represents mid-20th-century design adapted for Himalayan palace needs—wide open spaces, high ceilings for cooling, thick walls for insulation. The exhibits document royal ceremonies and daily life. One room is preserved exactly as left when the royal family departed. The museum represents Nepal's complex political transitions—from absolute monarchy to democracy over several decades. The building itself is less ornate than might be expected (contemporary minimalism rather than baroque excess). The experience is respectful; the presentation doesn't question monarchy but documents historical fact. The palace grounds are extensive with gardens.",im:"Palace interior with throne room, high ceilings, formal furniture arranged for ceremony, the space feeling simultaneously intimate and distant.",t:"North of Thamel area, bus or taxi (15 min). Admission: NPR 500. Open 9 AM-4 PM, closed Mondays. Photography restricted in some areas. Guides available. Allow 2 hours.",c:[],r:"g",nn:"नारायणहिती पैलेस संग्रहालय",ns:"पूर्व राजमहल, अब संग्रहालय राजकीय जीवन सहित।",nst:"महल 1963 देखि राजाहरु को निवास। 2008 में राजतन्त्र समाप्त। संग्रहालय राजकीय स्थान संरक्षित। नेपाल जटिल राजनीतिक संक्रमण प्रतिनिधित्व।",nt:"थामेलको उत्तर, बस वा ट्याक्सी (15 मिनट)। प्रवेश: NPR 500। 9 पूर्वाह्न-4 अपराह्न। पहिचान उपलब्ध। 2 घन्टा।"},
  {id:19,n:"Swapna Bagaicha — Rani Pokhari Island Garden",a:"East Kathmandu",v:["nature", "hidden", "beautiful"],d:90,s:"A renovated royal garden on an island featuring landscaping and botanical collections.",st:"Rani Pokhari (Queen's Pond) is a sacred tank dedicated to the Hindu goddess. The surrounding garden is landscaped with flower beds, pathways, and recreational facilities. The garden was restored recently and presents a designed nature aesthetic. Island access requires viewing from the shore or special permission. The garden demonstrates how Kathmandu integrates water features into urban design. The tank itself is surrounded by a wall and a temple at the cardinal points. The garden development modernized the space while attempting to honor religious significance. It's a peaceful area in the city, popular with joggers and elderly residents. The botanical plantings are organized but not regimented. The space serves as both religious site and public park.",im:"Island garden visible across sacred tank water, landscaped plants in composed arrangement, temple structures at cardinal points around the water.",t:"East of downtown, near Rani Pokhari. Bus or short taxi ride. Free viewing from shore; island access restricted. Open daily. Photography allowed from public areas. Meditation spot.",c:[],r:"g",nn:"रानी पोखरी बाग",ns:"पवित्र टंकी चारों ओर राजकीय बाग, हिन्दू देवी समर्पित।",nst:"रानी पोखरी हिन्दू देवी समर्पित पवित्र टंकी। बाग हाल पुनर्स्थापित। शहर जल सुविधा एकीकृत प्रदर्शन।",nt:"पूर्वी काठमाडौँ, रानी पोखरी निकट। बस वा छोटा ट्याक्सी। तट से मुक्त दृश्य। दैनिक। दोष फोटोग्राफी।"},
  {id:20,n:"Kathmandu Valley Rim Walk — trekking circuit around valley",a:"Valley periphery",v:["nature", "views", "hidden"],d:480,s:"A multi-day trekking route circumnavigating the Kathmandu Valley, passing through villages and offering mountain views.",st:"The Kathmandu Valley Rim Walk is a 220-km circuit that can be completed in 7-10 days depending on pace and side trips. The walk keeps to the valley's rim while dipping into villages and rural areas. Unlike major Himalayan treks (Everest, Annapurna), the Rim Walk offers modest elevation gain and easier access. The path winds through rhododendron forests, past traditional settlements, alongside agricultural fields. Each day offers descent into valleys and ascent back to rims. Night stays are in village guesthouses, eating local food, interacting with communities. The trek provides perspective on how Kathmandu Valley sits—a specific geographic and cultural region with distinct boundaries. The views from high points show the valley's geography and surrounding mountains. It's less touristed than major trekking routes; guides and porters are available but not essential. The walk reveals rural Nepal in depth.",im:"You trek the rim. Forest canopy filters the light to gold. Your feet crunch on leaf-fall. Birdsong echoes through the canopy. Breaking through the trees, the valley spreads impossibly below—terraced fields in shades of green, Kathmandu's sprawl beyond, mountains floating on the horizon. The air cools as altitude shifts. Your lungs work harder. The rhythm of walking quiets thought.",t:"Start from Kathmandu, arrange with trekking company. Self-guided also possible with detailed maps. Budget 7-10 days. Guides RM3000-5000 for full circuit. Best seasons: October-November, March-April.",c:[],r:"g",nn:"काठमाडौँ घाटीको किनारा पैदल पथ",ns:"घाटी परिक्रमा गर्ने बहु-दिवसीय ट्रेकिङ मार्ग।",nst:"काठमाडौँ घाटी किनारा पैदल 220-किमी सर्किट। 7-10 दिन पूरा गर्न सकिन्छ। मामूली उन्नयन लाभ। रोडोडेन्ड्रोन जङ्गल पास।",nt:"काठमाडौँ बाट सुरु गर। 7-10 दिन बजेट। पहिचान RM3000-5000। सर्वोत्तम मौसम: अक्टोबर-नवम्बर, मार्च-अप्रेल।"},
  {id:21,n:"Kirtipur — hill town south of valley",a:"South Kathmandu",v:["local", "history", "hidden", "views"],d:90,s:"A hilltop town with traditional Newari architecture, terraced fields, and views of Kathmandu Valley.",st:"Kirtipur is perched on a hill south of Kathmandu but feels rural and removed. The town maintains traditional Newari settlement patterns—narrow lanes, three-story traditional buildings, temples serving as neighborhood anchors. The university campus occupies surrounding areas. The town remains relatively undeveloped, preserving agricultural landscape. I walked through neighborhoods observing daily life—women drying chilis on rooftops, children playing in courtyards, elderly residents sitting in doorways. The views from the hilltop show the valley's extent. The surrounding terraced fields demonstrate traditional agriculture. Kirtipur resists the modernization affecting Kathmandu, though modern facilities gradually arrive. The town is accessible but far enough that tourists rarely arrive. It provides perspective on how Kathmandu Valley towns functioned before globalization transformed everything.",im:"Crimson chilies blaze on every rooftop—laid out to dry in the sun. You smell them from blocks away. Houses stack vertically on the steep hillside, connected by narrow alleyways. The light hits the white-painted walls unevenly. Mountain views open suddenly from courtyards. Below the town, terraced fields step down in perfect geometry. The silence is profound—just wind through chilies, distant voices.",t:"South from Kathmandu, bus (30 min) to Kirtipur. Hire local guide through guesthouses. No formal tourist infrastructure. Respectful observation of daily life essential. Photography ask permission.",c:[],r:"g",nn:"किर्तिपुर",ns:"पारंपरिक नेवार वास्तुकला, सीढ़ीदार खेत, काठमाडौँ घाटी दृश्य।",nst:"किर्तिपुर पहाड़ी दक्षिणमा स्थित। पारंपरिक नेवार निपटान पैटर्न राखता। शहर अविकसित रहता। आधुनिकीकरण प्रतिरोध करता।",nt:"काठमाडौँ दक्षिणमा बस (30 मिनट)। स्थानीय गाइड किराया लें। कोई औपचारिक पर्यटक ढांचा। दैनिक जीवन सम्मानपूर्ण अवलोकन। फोटोग्राफी अनुमति माँगें।"},
  {id:22,n:"Thapathali — riverside neighborhood transformation",a:"Southwest Kathmandu",v:["history", "hidden", "local"],d:75,s:"A riverside neighborhood with heritage buildings showing industrial heritage and contemporary regeneration.",st:"Thapathali historically was a manufacturing center where artisan families produced brass and metalware. The neighborhood remains a hub for metalwork and traditional crafts, though modern factories and commerce have transformed character. I walked narrow lanes past workshops where men still craft brass vessels using techniques centuries old. The riverside provides cooling and water; the neighborhood's geometry aligns with that resource. Some buildings are centuries old; others are modern additions. The neighborhood is in transition—traditional crafts declining as economic opportunities change, yet artisans persist. The Bagmati River's condition has improved (water quality still concerning). Thapathali represents urban evolution where heritage and modernity negotiate. Few tourists visit; it remains a working neighborhood rather than heritage museum.",im:"The lane is narrow—workshops press from both sides. You smell metal and oil. Artisans sit at benches, hammering, filing, polishing. Finished brass vessels catch light in storefronts—water pots, ritual vessels, decorative pieces gleaming. The river smell drifts from the Bagmati. Beneath your feet, the ground is worn smooth by generations of craftspeople. Old buildings abut new—the neighborhood hasn't fully modernized, hasn't fully stayed traditional.",t:"South from downtown, taxi or bus (20 min). Walking neighborhood, hire local guide for context. Photography ask permission. Respectful observation of working artisans.",c:[],r:"g",nn:"थपाथली",ns:"नदीतटीय पड़ोस पारंपरिक शिल्प और परिवर्तन।",nst:"थपाथली ऐतिहासिक रूप से विनिर्माण केंद्र। धातु शिल्प हब रहता। नदीतटीय स्थिति निर्धारण। परिवर्तन में संक्रमण।",nt:"काठमाडौँ दक्षिण, ट्याक्सी वा बस (20 मिनट)। स्थानीय गाइड किराया लें। फोटोग्राफी अनुमति माँगें। कारीगर सम्मान।"},
  {id:23,n:"Changu Narayan — hilltop temple village",a:"Northeast Valley",v:["history", "architecture", "views", "hidden"],d:150,s:"A ancient temple complex on a hilltop with views of the valley and surrounding mountains.",st:"Changu Narayan is believed to be the oldest temple in the Kathmandu Valley, with inscriptions dating to 464 AD. The temple sits on a hilltop with panoramic views. The main shrine is dedicated to Vishnu. The temple complex includes multiple smaller shrines and structures created over centuries. The walk to reach Changu Narayan winds through terraced fields and forest. The community still functions as a working village—residents tend fields, children attend schools, temples maintain active worship. The 2015 earthquake damaged the temple; reconstruction efforts continue. The site combines archaeological significance with living function. The views from the hilltop show the valley's extent and surrounding mountains. The quiet atmosphere (fewer tourists than major sites) allows contemplation.",im:"The ancient wooden temple rises against the sky. Wind moves through the ornamental spires. Your lungs pull thin air at this altitude. From the hilltop, the entire valley spreads—terraced fields below in perfect geometry, Kathmandu's urban sprawl, mountains floating impossibly distant. The silence is broken only by wind and prayer bells. You feel the centuries the temple has stood here, holding the valley in view.",t:"Northeast from Kathmandu, bus to Bhaktapur area, then walk or taxi (1.5-2 hours from downtown). Admission: NPR 500. Open daily. Guides help explain inscriptions and history. Photography allowed.",c:[],r:"g",nn:"चाङ्गु नारायण",ns:"पहाड़ी मन्दिर गाँव, काठमाडौँ घाटी सबसे पुरानी मन्दिर।",nst:"चाङ्गु नारायण काठमाडौँ घाटी सबसे पुरानी मन्दिर। शिलालेख 464 ईस्वी। विष्णु समर्पित। घाटी के विस्तार के विचार।",nt:"काठमाडौँ उत्तरपूर्व, भक्तपुर क्षेत्र बस (1.5-2 घन्टा)। प्रवेश: NPR 500। दैनिक। पहिचान उपलब्ध। फोटोग्राफी अनुमति।"},
  {id:24,n:"Nagarkot — hill station for mountain views",a:"Northeast Valley Rim",v:["views", "nature", "beautiful", "hidden"],d:120,s:"A hilltop village at 2,175 meters offering panoramic Himalayan views and cool climate.",st:"Nagarkot is traditionally a pilgrimage site and increasingly a tourist destination. The elevation provides cool nights (welcomed by visitors escaping Kathmandu's heat). The main attraction is sunrise views of the Himalayan range—on clear mornings, a succession of peaks are illuminated from the east. The village is small, with few permanent residents, though guesthouses have proliferated. Some guesthouses offer excellent standards; others are basic. The walk to Nagarkot from surrounding villages offers hiking through forests. The sunset and sunrise rituals—crowds gathering at observation points with cameras—have become pilgrimage-like. The view depends entirely on weather; monsoon season obscures mountains. The experience of elevation and cooling is physiologically noticeable. The surrounding forest is habitat for wildlife (birds especially). The village is transitioning from traditional settlement to tourist destination.",im:"Mountain sunrise casting golden light across snow-covered peaks stretching across horizon, silhouettes of tourists with cameras in foreground.",t:"Bus from Kathmandu (2 hours) to Nagarkot. Guesthouses range RM500-2000 per night. Sunrise viewing free from many locations. Hikes throughout area. Bring warm layers; altitude and night are cool.",c:[],r:"g",nn:"नागरकोट",ns:"पहाड़ी गाँव 2,175 मीटर, हिमालय दृश्य सहित।",nst:"नागरकोट परंपरागत तीर्थयात्रा स्थल। उन्नयन ठंडी रातें। मुख्य आकर्षण हिमालय सूर्यास्त दृश्य। गाँव छोटा, अतिथिभवन बढ़ा।",nt:"काठमाडौँ से बस (2 घन्टा)। अतिथिभवन RM500-2000। सूर्योदय देखना। ट्रेकिंग क्षेत्र। गर्म परतें लाएँ।"},
  {id:25,n:"Dhulikhel — ancient trading town east of valley",a:"East Valley Edge",v:["history", "local", "hidden", "architecture"],d:120,s:"An ancient town on the trade route to Tibet, preserving traditional architecture and serving as agricultural market center.",st:"Dhulikhel sits on the ancient trade route connecting Kathmandu to Tibet. The town maintained commercial importance through centuries but has diminished as trade patterns changed. The main bazaar preserves traditional shophouses—ground floors for commerce, upper stories for residence. The town remains a gathering place for surrounding villages' agricultural commerce. I visited on market day and witnessed transactions of grains, vegetables, animals. The pace is deliberate; negotiations take time. Temples are integrated into street corners. The surrounding landscape is predominantly agricultural. The town resists the tourism focus of Kathmandu; visitors are minimal. It provides a view of how Kathmandu Valley towns functioned as trading centers before becoming tourist destinations. Recent development threatens to change character.",im:"The market exhales the smell of fruits, vegetables, dried herbs. Vendors arrange produce with careful attention. You hear negotiation in Newari—rhythmic, musical. Some townspeople wear traditional dress, others modern clothes—generations coexisting in the same street. Sunlight falls between buildings. The cobbled street is worn from centuries of commerce. The rhythm here is older than the city around it.",t:"East from Kathmandu, bus (1.5-2 hours). Market most active mornings. Hotels simple; few tourist facilities. Guides available through local contacts. Photography ask permission.",c:[],r:"g",nn:"धुलीखेल",ns:"तिब्बत को व्यापार मार्ग पर प्राचीन शहर।",nst:"धुलीखेल तिब्बत व्यापार मार्ग पर। शताब्दी के माध्यम से व्यावसायिक महत्व। परंपरागत वास्तुकला संरक्षित। कृषि बाजार केंद्र।",nt:"काठमाडौँ पूर्व, बस (1.5-2 घन्टा)। बाजार सबेर सक्रिय। सरल होटल। फोटोग्राफी अनुमति माँगें।"},
  {id:26,n:"Bishnumati River Walk — urban waterway rehabilitation",a:"West Kathmandu",v:["nature", "hidden", "beautiful"],d:90,s:"A riverside park and walk along the Bishnumati River showing environmental rehabilitation efforts.",st:"The Bishnumati River historically was polluted—the city's waste flowed into it. Recent efforts have attempted rehabilitation through park construction, waste management improvements, and community engagement. The walking paths follow the river's course. Some sections are pleasant; others show continued degradation. The project is incomplete; full rehabilitation will require sustained effort. Yet the intention—to restore urban waterways—is evident. I walked sections that felt like parks, others that felt like disaster zones. The experience revealed the challenges of urban environmental management—the river's recovery depends on upstream cities controlling waste and protecting watershed. The walk provides perspective on Kathmandu's environmental challenges and some emerging solutions. Local communities use the river for water despite pollution; economic pressures outweigh health concerns.",im:"The river flows through the urban landscape. In cleared sections, planted vegetation softens the banks. Your ears catch water sound—a rarity in Kathmandu. But debris still chokes the river in places—plastic, trash, the city's weight. The contrast is jarring. Rehabilitation work is visible—evidence of care fighting indifference. The smell shifts—from green to polluted and back. This is a river being reclaimed, painfully.",t:"West Kathmandu, accessible from several points downtown. Free access. Guided walks available through environmental organizations. Pollution levels require hand-washing after contact. Early morning quietest.",c:[],r:"g",nn:"बिष्णुमती नदी पैदल",ns:"नदी के साथ पैदल पथ, पर्यावरण पुनर्वास प्रदर्शन।",nst:"बिष्णुमती नदी ऐतिहासिक रूप से प्रदूषित। पुनर्वास प्रयास पार्क निर्माण। नदी का उद्धार पूर्वचलन शहरों पर निर्भर।",nt:"पश्चिम काठमाडौँ, कई बिंदु से सुलभ। मुक्त पहुंच। पर्यावरण संगठन पहिचान। प्रदूषण स्तर हाथ धोने की आवश्यकता।"},
  {id:27,n:"Kathesimbhu Stupa — Swayambhunath equivalent near Thamel",a:"Central Kathmandu",v:["religion", "history", "hidden"],d:60,s:"A smaller Buddhist stupa replica of Swayambhunath, located within walking distance of central Kathmandu.",st:"Kathesimbhu was constructed to provide a closer pilgrimage site for devotees who couldn't easily access the larger Swayambhunath. The architecture mimics the larger site—white dome, prayer wheels, circumambulation path. Pilgrims and devotees use it for daily practice. The site is less crowded than Swayambhunath, maintaining quieter atmosphere. The monastery adjacent provides educational services. Prayer ceremonies occur regularly. The site demonstrates Buddhism's practical adaptation—rather than requiring all devotees to climb the distant hill, a closer option was created. The spiritual significance is equivalent despite the smaller scale. The surrounding residential neighborhood continues normal activity nearby. The stupa's presence structures the neighborhood's spiritual geography.",im:"The white dome rises modestly. Prayer wheels spin—*clickclick* from pilgrims' hands. You can circumambulate the stupa in minutes, but pilgrims move slowly, focused. The adjacent monastery hums quietly—monks chanting, feet padding across courtyards. Bells ring occasionally. Beyond the sacred space, residential buildings press close—laundry drying, children playing. The sacred and mundane exist in the same breath here.",t:"Central Kathmandu, walking distance from Thamel. Free entry (donations appreciated). Open daily for circumambulation and prayer. Photography allowed. Respectful behavior expected.",c:[],r:"g",nn:"काठेसिम्भु स्तूप",ns:"स्वयम्भुनाथ की छोटी प्रतिकृति, थामेल के निकट।",nst:"काठेसिम्भु निकटतर तीर्थयात्रा स्थल प्रदान करने के लिए बनाया गया। बड़े स्थल की वास्तुकला नकल। छोटे पैमाने पर समतुल्य आध्यात्मिक महत्व।",nt:"केन्द्रीय काठमाडौँ, थामेल पैदल दूरी। मुक्त प्रवेश। दैनिक परिक्रमा और प्रार्थना। फोटोग्राफी अनुमति। सम्मानपूर्ण व्यवहार।"},
  {id:28,n:"Rani Pokhari Temple — goddess tank sacred site",a:"East Kathmandu",v:["religion", "history", "local"],d:75,s:"A sacred tank dedicated to the Hindu goddess, surrounded by temples at cardinal points and island shrine.",st:"Rani Pokhari (Queen's Tank) is believed to be built by a king to console his grieving queen. The tank is considered sacred—water is holy, the site is pilgrimage destination. Four temples occupy cardinal points around the tank (north, south, east, west). A small island shrine sits in the center. The surrounding area was modernized, but the tank and its temples remain spiritual center. During festival times (particularly during Hindu new year), thousands gather for ceremonial bathing. The water quality is poor (city waste), yet devotion transcends practical concern. The tank's management represents typical challenges—maintaining sacred significance while managing contemporary urban needs. The neighborhood surrounding the tank is residential and commercial. The experience simultaneously observes historical reverence and contemporary neglect.",im:"The sacred tank holds stillness in the city's chaos. Temple structures mark the cardinal points like compass needles. An island shrine sits unreachable in the center. Devotees gather on the banks—some in prayer, some watching the water. The smell of flowers and ritual oil rises. All around, the city presses in—buildings, traffic, commerce. But at the water's edge, the sacred remains intact, preserved by faith.",t:"East Kathmandu location. Access free from surrounding public areas. Full access to tank restricted. Temple viewing from outside permitted. Photography allowed. Respectful observation essential.",c:[],r:"g",nn:"रानी पोखरी मन्दिर",ns:"हिन्दू देवी को समर्पित पवित्र टंकी।",nst:"रानी पोखरी राजा द्वारा उदास रानी को सांत्वना देने के लिए निर्मित। पवित्र टंकी—पानी पवित्र है। तीर्थयात्रा गंतव्य।",nt:"पूर्वी काठमाडौँ स्थान। आसपास सार्वजनिक क्षेत्र से मुक्त पहुंच। टंकी पूर्ण पहुंच प्रतिबंधित। मन्दिर देखना बाहर से अनुमति। फोटोग्राफी अनुमति।"},
  {id:29,n:"Tansen — historic hill town west of Kathmandu",a:"West Valley Edge",v:["history", "local", "hidden", "architecture"],d:240,s:"A centuries-old hilltop town famous for metalwork and traditional architecture, accessible as day-trip from Kathmandu.",st:"Tansen (also Thaneswar) sits on a hilltop west of Kathmandu Valley. The town is famous for metalware (bronze, copper, dhaka fabric production). The narrow streets wind along the hilltop, maintaining medieval town organization. Traditional Newari and Magar architecture preserves character. The town served as administrative center during Malla periods. The main bazaar remains vibrant with commerce. Views across the valley toward Kathmandu and distant mountains reward effort. The community remains primarily local; tourism is minimal. I watched metalworkers crafting vessels using centuries-old techniques. The town's prosperity derives from craft production and agricultural trade. Walking the streets feels like time travel—the scale is human, the pace is deliberate. Guesthouses offer basic accommodation.",im:"The town climbs steeply. Every street is a struggle upward. You hear hammer-on-metal echoing between buildings. Traditional architecture—the windows, the door frames—speaks of centuries. Metalwork shops spill into the lanes, finished vessels gleaming. The climb leaves you breathless. Then, at an opening, the Ridi Valley falls away below—vast and green. Mountains float on the horizon, close enough to feel real.",t:"West from Kathmandu, bus (2-3 hours) to Tansen. Guesthouses simple but adequate. Day-trips possible. Craft demonstrations available. Hiking in surrounding hills. Photography ask permission.",c:[],r:"g",nn:"टनसेन",ns:"धातु कार्य के लिए प्रसिद्ध पहाड़ी शहर।",nst:"टनसेन मल्ल अवधि के दौरान प्रशासनिक केंद्र। मुख्य बाजार जीवंत व्यापार। धातु कार्यशीलता का केंद्र।",nt:"काठमाडौँ पश्चिम, बस (2-3 घन्टा)। अतिथिभवन सरल। दिन यात्रा संभव। कला प्रदर्शन। ट्रेकिंग। फोटोग्राफी माँगें।"},
  {id:30,n:"Namche Bazaar Trek Base — high altitude acclimatization town",a:"Solu-Khumbu Region (3 days from Kathmandu)",v:["nature", "adventure", "hidden", "views"],d:480,s:"A vibrant Sherpa trading hub at 3,440 meters, serving as gateway to Everest treks and Sagarmatha views.",st:"Namche Bazaar is the commercial and cultural heart of the Khumbu region. The horseshoe-shaped town clings to a mountainside, the architecture reflecting Sherpa culture. The main bazaar fills with traders, porters, trekkers, and climbers. The Saturday market brings vendors from surrounding villages. The town's prosperity depends on trekking and climbing economies. I visited for acclimatization before higher treks. The views of peaks are stunning; the air is thin. Basic infrastructure exists—restaurants, guesthouses, shops—but at altitude-adjusted prices. The culture is distinctly Sherpa; Buddhism pervades. The surrounding mountains dwarf human presence. The town represents the interface between traditional mountain culture and modern globalized adventure economy. The climb to Namche from lower elevations tests acclimatization; many visitors experience altitude sickness.",im:"Mountain town clinging to steep terrain, colorful prayer flags strung across town, peaks visible in multiple directions, thin air and bright sunlight.",t:"Fly from Kathmandu to Lukla (30 min flight), then trek 5-6 hours to Namche. Guesthouses available (RM300-1000 per night). Guides and porters necessary for higher climbs. Best seasons: spring, autumn. Altitude sickness precautions essential.",c:[],r:"g",nn:"नामचे बजार",ns:"3,440 मीटर पर शेर्पा व्यापार केंद्र, एवरेस्ट ट्रेकिंग द्वार।",nst:"नामचे बजार कुंभु क्षेत्र का व्यावसायिक केंद्र। घोड़े के आकार का शहर। शेर्पा संस्कृति प्रतिबिंबित। शनिवार बाजार।",nt:"काठमाडौँ से लुक्ला उड़ान (30 मिनट), फिर ट्रेक (5-6 घन्टा)। अतिथिभवन उपलब्ध। पहिचान आवश्यक। सर्वोत्तम मौसम: वसंत, शरद। ऊंचाई बीमारी सावधानी।"}
,
  {id:31, n:"Bagmati River Sacred Bathing — Pashupatinath", a:"East", v:["sacred","ritual","spiritual"], d:30, s:"Hindus come at dawn to bathe in the sacred river—the ritual is ancient—the sound of mantras fills the air—you can sit and watch respectfully.", st:"The Bagmati flows through Kathmandu. At dawn, pilgrims come. They wade in. The priests chant. The smell of incense. The ritual is continuous for 1,000 years.", im:"A pilgrim wading. Incense smoke. A priest chanting. The river in the mist.", t:"Pashupatinath Temple area. 5-7am. Dress modestly. Respectful observation only. Ask permission before photographing.", c:["sacred","ritual"], r:"g", nn:"Bagmati River Sacred Bathing — Pashupatinath", ns:"Hindus kommen at dawn zur heiligen Flussbehandlung.", nst:"Der Bagmati fließt durch Kathmandu.", nt:"Pashupatinath Temple area. 5-7 Uhr."},
  {id:32, n:"Swayambhunath Temple at Sunrise — Hills", a:"Hills", v:["sacred","beautiful","ancient"], d:35, s:"2,000-year-old stupa on a hill—monkeys living here—at sunrise, monks do a circumambulation walk—the prayer wheels spin.", st:"A stone dome covered in gold. Monkeys live here. At sunrise, monks walk around it, turning prayer wheels. The city wakes below.", im:"A golden dome catching sunrise. Monks in robes walking. Monkeys playing.", t:"West Kathmandu. Cable car or walk (45 min). 200 rupees. Go 5:30am for monks.", c:["sacred","history_big"], r:"g", nn:"Swayambhunath Temple at Sunrise", ns:"2.000-jähriger stupa auf einem Hügel.", nst:"Eine Steinkuppel, die in Gold bedeckt ist.", nt:"West-Kathmandu. Seilbahn oder Spaziergang."},
  {id:33, n:"Durbar Square Temples and Palaces — Historic Center", a:"Old City", v:["greatest_hits","history_big"], d:8, s:"UNESCO site—ancient temples and palaces—restored after 2015 earthquake—the architecture is intricate wood and stone—the scale is extraordinary.", st:"Centuries of architecture. Wooden temples with intricate carving. Palaces. The earthquake damaged it, but it\'s been restored. The craftsmanship is visible in every detail. It deserves its place.\n\nIt earned it.", im:"A temple spire carved in wood. The detail work extraordinary. Tourists and pilgrims mixing.", t:"Durbar Square, city center. Open 6am-6pm. 1,000 rupees (3-day pass). Best early morning before crowds.", c:["greatest_hits","history_big","sacred"], r:"g", nn:"Durbar Square Temples", ns:"UNESCO-Stätte—alte Tempel und Paläste.", nst:"Jahrhundert-Architektur. Holztempel mit kompliziertem Schnitzen.", nt:"Durbar Square, Stadtzentrum."},
  {id:34, n:"Kathmandu Thamel Alley Market at 7am — Old City", a:"Old City", v:["food","market","vibrant"], d:12, s:"Narrow alley market—vendors opening—the smell of fresh momo being steamed—the street is alive and loud.", st:"A narrow alley. Vendors setting up. Momos (dumplings) being steamed. The smell is extraordinary. This is how Kathmandu eats at the start of the day.", im:"A vendor\'s hands folding dumplings. Steam rising. The crowd pressing.", t:"Thamel, old city. 6-9am best. Go before tourists. Bring cash (Nepali rupees).", c:["markets","food","local_only"], r:"g", nn:"Kathmandu Thamel Alley Market", ns:"Enge Marktrasse—Verkäufer öffnen.", nst:"Eine enge Gasse. Verkäufer setzen sich hin.", nt:"Thamel, Altstadt. 6-9 Uhr best."},
  {id:35, n:"Nagarkot Sunrise Hike — Valley Overlook", a:"North", v:["beautiful","day_trips","sunrise"], d:60, s:"One hour drive and short hike—you stand at 2,000m—at sunrise the Himalayas appear above the clouds—you can see the valley entire.", st:"A viewpoint above Kathmandu. At sunrise, if the clouds cooperate, you see the Himalayan range. The valley is below. The light is golden. It\'s extraordinary.", im:"The sun rising over white mountains. The valley shadow descending below.", t:"Drive or bus 1 hour to Nagarkot. Hotel sunrise views (book ahead). Or hike from Bhaktapur (2 hours). 100-500 rupees depending on route.", c:["day_trips","high_spots"], r:"g", nn:"Nagarkot Sunrise Hike", ns:"Eine Stunde Fahrt und kurze Wanderung.", nst:"Ein Aussichtspunkt über Kathmandu.", nt:"Fahren oder Bus 1 Stunde bis Nagarkot."},
  {id:36,n:"Boudhanath Stupa — Pilgrimage Site",a:"Boudha",v:["beautiful"],d:30,s:"Massive mandala-shaped stupa with prayer wheels and Buddhist pilgrimage energy — monks and devotees circumambulate",st:"This is one of the largest stupas in the world. Pilgrims walk clockwise around it, spinning prayer wheels. The eyes painted on the stupa\'s front face watch over the valley. Monasteries surround it. The constant rotation of pilgrims is meditative and profound.",im:"The white dome rising above the square. The painted eyes. Prayer flags fluttering. Monks in maroon robes. Pilgrims moving in circles. Incense and bells. The constancy of devotion.",t:"Free to walk around. Boudha area (northeast of center). Best early morning 5am-7am or evening 4pm-6pm. Respectful clothing required. Circumambulate clockwise. The nearby cafés are excellent for watching pilgrims.",c:["greatest_hits"],r:"g",nn:"बौद्धनाथ स्तूप",ns:"Boudhanath Stupa — বৌদ্ধনাথ স্তূপ মহান মন্দির",nst:"यह दुनिया के सबसे बड़े स्तूपों में से एक है।",nt:"मुफ़्त। बौद का क्षेत्र। सुबह जल्दी 5-7।"},
  {id:37,n:"Pashupatinath Temple — Hindu Sacred Site",a:"Pashupatinath",v:["beautiful"],d:30,s:"Sacred Hindu temple complex dedicated to Shiva — cremation ghats on the Bagmati River, ritual sites, and spiritual intensity",st:"This is deeply sacred. On the banks of the Bagmati River, bodies are cremated daily. Pilgrims come to bathe and pray. The temple complex is atmospheric and solemn. Non-Hindus cannot enter the main temple, but you can view from outside. The intensity is palpable.",im:"Smoke from funeral pyres. The sound of prayers and bells. Pilgrims bathing in the river. The golden spires of the temple. Sadhus (holy men) in saffron robes. The sacred Bagmati River.",t:"1,000 NPR entry (~$7.50). Pashupatinath area (east of city). Best early morning (5am-7am) before crowds and for best lighting. Photography restricted at cremation sites (be respectful). Bring water; it\'s intense.",c:["greatest_hits"],r:"g",nn:"पशुपतिनाथ मंदिर",ns:"Pashupatinath Temple — पशुपतिनाथ मंदिर शिव के लिए",nst:"यह गहराई से पवित्र है। बगमती नदी के किनारे।",nt:"1,000 NPR। पशुपतिनाथ क्षेत्र। सुबह जल्दी।"},
  {id:38,n:"Durbar Square — Historic Palace Complex",a:"Kathmandu Durbar Square",v:["beautiful"],d:30,s:"UNESCO site with ancient palaces, temples, and plazas — the historic heart of Kathmandu",st:"The 1793 earthquake destroyed much, but the main palace structures remain. Walk through multiple squares with temples and idols. The Kumari House (residence of the living goddess) is nearby. The architecture is ornate and carved wood everywhere. It\'s crowds, but it\'s history.",im:"Ornate carved wooden palaces. Red brick temples. Courtyards filled with devotees. Pigeons everywhere. The Kumari peering from a window. Ancient stone carvings. The chaotic energy of a sacred public space.",t:"1,500 NPR entry (~$11). Central Kathmandu. 1.5-2 hours. Best early morning 6am-8am. Photography allowed. Many tourists; early morning is quieter. Guides available for cultural context. The square can be overwhelming; take breaks.",c:["greatest_hits"],r:"g",nn:"दरबार चौराह",ns:"Durbar Square — दरबार चौराह कात्मांडू का ऐतिहासिक केंद्र",nst:"यूनेस्को की विश्व धरोहर स्थल। आर्यआत्मक वास्तुकला।",nt:"1,500 NPR। केंद्रीय काठमांडू। 1.5-2 घंटे। सुबह 6-8।"},
  {id:39,n:"Swayambhunath (Monkey Temple) — Hilltop Stupa",a:"Swayambhunath",v:["beautiful"],d:30,s:"Ancient stupa on a hilltop with 365 steps to climb — monkeys, prayer flags, and 360-degree city views",st:"Climb the 365 steps (they represent the 365 days of the year). The monkeys are notorious for stealing glasses and zippers; watch your belongings. At the top, the stupa is surrounded by prayer flags. The views of the Kathmandu Valley are extraordinary. It\'s a serious climb.",im:"The long staircase climbing upward. Monkeys playing around you. Prayer flags fluttering in the wind. The golden stupa gleaming at the top. The valley spread out below. Sunset light on the mountains beyond.",t:"Free entry. Swayambhunath area (west of city). Best early morning 6am-8am (fewer monkeys, better light). Wear comfortable shoes; 365 steps is a significant climb. Bring water. Photography is excellent but watch your belongings from monkeys.",c:["greatest_hits"],r:"g",nn:"स्वयंभूनाथ",ns:"Swayambhunath Stupa — स्वयंभूनाथ बंदर मंदिर",nst:"365 सीढ़ियां चढ़ें। बंदर कांच चोरी करने के लिए कुख्यात हैं।",nt:"मुफ़्त। स्वयंभूनाथ क्षेत्र। सुबह जल्दी। 365 सीढ़ियां।"},
  {id:40,n:"Thamel Neighborhood — Tourist Heart and Backpacker Hub",a:"Thamel",v:["beautiful"],d:30,s:"Busy tourist district with restaurants, shops, travel agencies, and trekking guides — Nepal\'s tourist headquarters",st:"Thamel is chaotic and touristy, but it\'s the hub. You find guides for treks, book flights, eat everything from momos to Western food, and meet other travelers. It\'s colorful, friendly, and crowded. It\'s not authentic Kathmandu, but it\'s a working gateway.",im:"Narrow streets packed with tourists and locals. Shop signs in multiple languages. Rooftop restaurants with prayer flags. Trekking agency signs. The mix of cultures and languages. The constant buzz of commerce and conversation.",t:"Free to walk. Thamel area (central). Best early morning or 5pm-8pm (for people-watching and dining). Shops and restaurants abundant. Guides and trekking bookings available (compare prices). Stay in main streets; use common sense for safety.",c:["greatest_hits"],r:"g",nn:"थामेल",ns:"Thamel Neighborhood — थामेल पर्यटक जिला",nst:"थामेल गंदगी भरा और पर्यटक-केंद्रित है।",nt:"मुफ़्त चलना। थामेल क्षेत्र। सुबह या 17-20।"},
{id:11,n:"Boudhanath Stupa — Morning Kora Ritual",a:"Boudhanath",v:["history","religious","local"],d:90,s:"World's largest Buddhist stupa—circumambulated by pilgrims at dawn, radiating spiritual power.",st:"Boudhanath is one of world's largest Buddhist stupas. White dome, golden spire. Walking kora at dawn, you join pilgrims: monks, devotees, families.",im:"A pilgrim in 1400, walking the kora, ritual uninterrupted across six centuries.",t:"Located in Boudhanath, northeast Kathmandu. Local bus or taxi (20 min). Entry donation ₹200-500. Open 24/7 (dawn ideal 5-7am). Circumambulate clockwise. Allow 1-2 hours.",c:["history","religious","local"],r:"g",nn:"बोधनाथ स्तूप",ns:"विश्व का सबसे बड़ा बौद्ध स्तूप",nst:"बोधनाथ प्रात:काल में परिक्रमा।",nt:"बोधनाथ में काठमांडू घाटी में।"},
{id:12,n:"Patan Durbar Square — Architectural Masterpiece",a:"Patan",v:["history","architecture","beautiful"],d:120,s:"Ancient plaza with ornate temples and palaces—more architecturally cohesive than Kathmandu Durbar.",st:"Patan Durbar Square is UNESCO site: temples, palaces, stupas in plaza. Architecture exquisite: intricate wooden windows, carved stone, golden ornaments.",im:"An artisan in 1550, carving wooden windows for Patan palace.",t:"Located in Patan, 5km south of Kathmandu. Local bus (20 min). Entry fee ₹1000. Open 6am-sunset. Photography excellent. Allow 2-3 hours.",c:["history","architecture","beautiful"],r:"g",nn:"पाटन दरबार स्क्वायर",ns:"वास्तुकला मास्टरपीस",nst:"पाटन दरबार वर्ग काठमांडू से अधिक सुंदर।",nt:"पाटन में 5 किमी दक्षिण काठमांडू।"},
{id:13,n:"Pashupatinath Cremation Ghats — Sacred Mortality",a:"Pashupatinath",v:["history","religious","scary"],d:90,s:"Ancient temple and cremation site on Bagmati River—Hindu death rituals performed openly daily.",st:"Pashupatinath is one of Hinduism's holiest temples. Temple sits beside Bagmati River; ghats are cremation sites. Hindu tradition: bodies cremated, ashes scattered.",im:"A widow in 1850, grieving beside cremation ghat, ritual continuing.",t:"Located on Bagmati River, northeast Kathmandu (2km from center). Taxi or local bus. Free entry (donation ₹200+). Open 24/7. Dress modestly. Respectful photography only. Allow 1-2 hours.",c:["history","religious","scary"],r:"g",nn:"पशुपतिनाथ",ns:"पवित्र अग्नि संस्कार स्थल",nst:"पशुपतिनाथ मृत्यु अनुष्ठान।",nt:"बागमती नदी पर पशुपतिनाथ।"},
{id:14,n:"Swayambhunath at Dawn — Golden Stupa Sunrise",a:"Swayambhunath",v:["history","religious","high_spots"],d:90,s:"Ancient hilltop Buddhist stupa accessible by 365 steps—commanding valley views at dawn.",st:"Swayambhunath ('self-created' stupa) sits atop hill overlooking Kathmandu Valley. 365 steps climb from base. Golden spire dominates hilltop.",im:"A Buddhist pilgrim in 1500, climbing to Swayambhunath, viewing same valley.",t:"Located atop Swayambhunath hill, west Kathmandu. Taxi (20 min) or local bus then 365-step climb (15-20 min). Entry fee ₹200. Open 5am-sunset. Best at dawn. Monkeys present: keep distance. Allow 2-3 hours.",c:["history","religious","high_spots"],r:"g",nn:"स्वयंभूनाथ",ns:"स्वर्ण स्तूप सूर्योदय",nst:"स्वयंभूनाथ 365 सीढ़ियों पर।",nt:"स्वयंभूनाथ पश्चिम काठमांडू।"},
{id:15,n:"Garden of Dreams — Oasis in Old City",a:"Kathmandu Center",v:["parks","hidden","beautiful"],d:75,s:"Contemporary restoration of historical garden—serene urban oasis with peaceful walkways.",st:"Garden of Dreams is located in old Kathmandu. Garden was designed 1920s during Rana dynasty era; recently restored (2006).",im:"A Rana-era nobleman in 1920, strolling through newly-completed garden.",t:"Located in central Kathmandu. Taxi or local bus. Entry fee ₹400. Open 9am-sunset. Photography excellent. Cafeteria on-site. Allow 1-2 hours.",c:["parks","hidden","beautiful"],r:"g",nn:"स्वप्न का बाग",ns:"नई शहर में मन की शान्ति",nst:"स्वप्न का बाग 1920 दशक में डिज़ाइन।",nt:"काठमांडू केंद्र में।"},
{id:16,n:"Thamel Beyond Tourist Strip — Local Creativity",a:"Thamel",v:["neighbourhoods","local"],d:90,s:"Beyond tourist-focused Thamel main streets—side lanes where locals live and work authentically.",st:"Thamel is Kathmandu's main tourist district. Main streets are touristy. Yet side streets are entirely different: local residential neighborhoods, small shops serving locals.",im:"A shopkeeper in 1980, operating neighborhood store before tourism transformed Thamel.",t:"Located in Thamel, central Kathmandu. Walk main streets then deliberately enter side lanes. Best explored on foot. Bring camera. Allow 2-3 hours.",c:["neighbourhoods","local"],r:"g",nn:"थामेल पर्यटकों की पट्टी से परे",ns:"स्थानीय रचनात्मकता",nst:"थामेल मुख्य पर्यटक जिले के पीछे।",nt:"थामेल काठमांडू मध्य में।"},
{id:17,n:"Asan Tole Spice Market — Aromatic Commerce",a:"Asan Tole",v:["market","food","local"],d:90,s:"Ancient market square selling spices, grains, oils, medicinal herbs—where locals shop.",st:"Asan Tole is Kathmandu's oldest marketplace. Surrounded by four- and five-story buildings. Market specializes: spices, grains, oils, dried goods, medicinal herbs.",im:"A spice merchant in 1850, selling from Asan Tole, same market 175 years hence.",t:"Located in old Kathmandu city center. Local bus or taxi. Open morning-evening (busiest 9-11am). Bring cash. Crowded; secure valuables. Allow 1-2 hours.",c:["market","food","local"],r:"g",nn:"असान टोल मसाला बाजार",ns:"सुगंधित वाणिज्य",nst:"असान टोल काठमांडू का सबसे पुराना।",nt:"असान टोल पुरानी काठमांडू शहर।"},
{id:18,n:"Nagarkot Sunrise — Valley Panorama",a:"Nagarkot",v:["day_trips","high_spots","nature"],d:120,s:"Hill station 32km east offering Himalayan and valley views—stunning at sunrise.",st:"Nagarkot is hill station east of Kathmandu. Elevation (2000m) provides spectacular views. Clear days reveal Himalayan peaks.",im:"A mountaineer in 1900, observing Himalayan peaks from Nagarkot.",t:"Located 32km east of Kathmandu (2 hours by car/bus). Guesthouses available. Entry free. Open 24/7. Best in clear season (autumn, early spring). Sunrise requires overnight stay. Allow overnight plus morning.",c:["day_trips","high_spots","nature"],r:"g",nn:"नागरकोट",ns:"हिमालयी दृश्य",nst:"नागरकोट सूर्योदय काठमांडू घाटी।",nt:"नागरकोट काठमांडू से 32 किमी।"},
{id:19,n:"Momo Stall Culture — Dumpling Devotion",a:"Multiple Locations",v:["food","local"],d:60,s:"Specialized dumpling stalls serving momos—Himalayan dumpling perfected through generational expertise.",st:"Momos are Himalayan dumplings: wheat wrapper filled with meat/vegetables, steamed or fried. Traditional shops prepare everything daily.",im:"A momo maker in 1970, rolling wrappers by hand, teaching children.",t:"Located throughout Kathmandu. Thamel, old city, neighborhood corners. Open typically 10am-8pm. Cost ₹150-250. Allow 30-45 minutes.",c:["food","local"],r:"g",nn:"मोमो स्टॉल संस्कृति",ns:"हिमालयी डम्पलिंग",nst:"मोमो नेपाली खाना संस्कृति।",nt:"काठमांडू में विभिन्न स्थानों पर।"},
{id:20,n:"Bhaktapur Day Trip — Medieval City Preserved",a:"Bhaktapur",v:["day_trips","history","neighbourhoods"],d:180,s:"Ancient Newari city 15km east—largely vehicle-free streets preserving medieval urban layout.",st:"Bhaktapur is medieval Newari city: one-hour drive east. City is largely vehicle-free; streets are pedestrian-dominated. Architecture is preserved.",im:"A resident in 1700, living in Bhaktapur, same city inhabited today.",t:"Located 15km east of Kathmandu (45-60 min by car/bus). Taxi or tour. Entry fee ₹1500. Open 6am-sunset. Allow 4-6 hours.",c:["day_trips","history","neighbourhoods"],r:"g",nn:"भक्तपुर",ns:"संरक्षित मध्यकालीन शहर",nst:"भक्तपुर पूर्व की ओर 15 किमी।",nt:"भक्तपुर काठमांडू से 45-60 मिनट।"},
{id:21,n:"Altitude Adjustment Ritual — Respecting Mountains",a:"Kathmandu Valley",v:["hidden","weird"],d:30,s:"Understanding and managing altitude sickness—essential preparation for Kathmandu.",st:"Kathmandu sits at 1,300+ meters elevation. Visitors from sea level often experience altitude symptoms. Understanding altitude is part of experience.",im:"A trekker in 1950, arriving in Kathmandu, struggling with altitude.",t:"Plan first 24-48 hours adjusting. Stay at reasonable altitude initially. Drink 3-4 liters water daily. Avoid alcohol and heavy exercise. Most adjustment occurs within 3-5 days.",c:["hidden","weird"],r:"g",nn:"ऊंचाई का अनुकूलन",ns:"पर्वतों के सम्मान",nst:"काठमांडू 1,300 मीटर ऊपर।",nt:"पहले 24-48 घंटे आराम करें।"},
  {id:41,n:"Thamel\'s back lanes at dawn — The city before the trekking shops open",a:"Central",v:["local", "spiritual", "quiet"],d:60,s:"The tourist district of Thamel is loud and commercial by day but its back lanes in the early morning — before the outdoo...",st:"The tourist district of Thamel is loud and commercial by day but its back lanes in the early morning — before the outdoor gear shops and cafés open — reveal an older neighbourhood of temples, courtyards, water spouts and residents going about their morning rituals.",im:"Standing at Thamel\'s back lanes at dawn, taking in the scene.",t:"Visit Thamel\'s back lanes at dawn and take your time.",c:["history_big", "neighbourhoods"],r:"g"},
  {id:42,n:"Roof of a cheap guesthouse — Best free viewpoint in the city",a:"Central",v:["history", "views"],d:60,s:"Many of Kathmandu\'s older guesthouses have accessible rooftop terraces with views over the old city\'s tiered rooftops ...",st:"Many of Kathmandu\'s older guesthouses have accessible rooftop terraces with views over the old city\'s tiered rooftops toward the Himalayan peaks on clear mornings. The best time is 6–8am before cloud builds. Ask your guesthouse or a nearby cheap hotel if you can access the roof.",im:"Standing at Roof of a cheap guesthouse, taking in the scene.",t:"October–November and February–March give the clearest mountain views.",c:["history_big", "high_spots", "free_culture"],r:"g"},
  {id:43,n:"Chiya (milk tea) at a roadside stall — The city\'s social adhesive",a:"Central",v:["nature", "food"],d:60,s:"Nepalese chiya — sweet, milky, spiced tea boiled together in a pot — is served in small glasses at roadside stalls throu...",st:"Nepalese chiya — sweet, milky, spiced tea boiled together in a pot — is served in small glasses at roadside stalls throughout the city for almost nothing. Stand at a stall, order a glass and watch the street. It is the social ritual that holds the city together and the best way to have a spontaneous conversation.",im:"Standing at Chiya (milk tea) at a roadside stall, taking in the scene.",t:"Visit Chiya (milk tea) at a roadside stall and take your time.",c:["food", "scary"],r:"g"},
  {id:44,n:"Bodhnath to Kopan Monastery walk — Urban edge, monastery hill",a:"Central",v:["nature", "local", "views", "quiet"],d:90,s:"Walk north from Boudhanath through the gradually thinning city to Kopan Monastery on a hill above the valley. The walk t...",st:"Walk north from Boudhanath through the gradually thinning city to Kopan Monastery on a hill above the valley. The walk takes about 40 minutes and passes through a neighbourhood of Tibetan refugees, small farms and quiet lanes before climbing to the monastery with its views over the whole valley.",im:"Standing at Bodhnath to Kopan Monastery walk, taking in the scene.",t:"The monastery welcomes respectful visitors. Meditation retreats are bookable in advance.",c:["nature", "high_spots", "neighbourhoods", "scary"],r:"g"},
  {id:45,n:"Kumari Chowk and the living goddess — Child deity in a carved palace",a:"Central",v:["quiet"],d:60,s:"The Kumari Chowk in the old city is the home of the Kumari — a young girl selected as the living incarnation of the godd...",st:"The Kumari Chowk in the old city is the home of the Kumari — a young girl selected as the living incarnation of the goddess Taleju. She occasionally appears at an upper-floor window. The carved wooden courtyard surrounding her home is extraordinary. Stand quietly and wait.",im:"Standing at Kumari Chowk and the living goddess, taking in the scene.",t:"Photography of the Kumari herself is strictly prohibited. Respectful silence is expected.",c:["greatest_hits", "history_big"],r:"g"},
  {id:46,n:"Durbar Marg at dusk — Old money, new money, street food",a:"Central",v:["nature", "food"],d:60,s:"The wide boulevard leading to the royal palace gates is where Kathmandu\'s elite have always promenaded. At dusk the str...",st:"The wide boulevard leading to the royal palace gates is where Kathmandu\'s elite have always promenaded. At dusk the street fills with a specific mix of diplomats, old Rana families, NGO workers and street food vendors. Walk it slowly and notice how many different Kathmandus exist on a single street.",im:"Standing at Durbar Marg at dusk, taking in the scene.",t:"Visit Durbar Marg at dusk and take your time.",c:["history_big", "food"],r:"g"},
