  {id:47,n:"Earthquake memorial sites in the old city — Recent history in rubble and rebuilding",a:"Central",v:["history", "art", "architecture", "quiet"],d:60,s:"The 2015 earthquake killed nearly 9,000 people and destroyed hundreds of heritage buildings. Walk the old city and notic...",st:"The 2015 earthquake killed nearly 9,000 people and destroyed hundreds of heritage buildings. Walk the old city and notice the sites still being rebuilt, the temporary structures beside ancient walls and the plaques marking what was lost. Kathmandu is a city simultaneously living in its medieval past and its very recent trauma.",im:"Standing at Earthquake memorial sites in the old city, taking in the scene.",t:"Be sensitive. Some families are still recovering and some sites are still actively grieved.",c:["history_big", "free_culture"],r:"g"},
const P = [
{id:48, n:"Nagarkot Sunrise Hike — The honest version", a:"Nagarkot", v:["beautiful","famous"], d:4,
s:"Yes, the view is spectacular. Yes, it\'s also 3am start, shared with 200 other people, and the town will pitch sunrise packages you don\'t need.",
st:"The hike itself is worth it—steep forest trail, proper mountain cold, actual effort. You get the panorama at 6:15am. But Nagarkot town is a tourist funnel: aggressive hotel hawkers, inflated prices, fake sunrise locations. Do it: trek from Changunarayan instead, or catch sunrise from a monastery quieter than town.\n\nUncrowded alternative: start from Sundarijal dam at 4am, longer but you own the moment.",
im:"First light hitting the Himalayan wall. Your breath clouds in freeze. Rhododendrons black silhouettes. Then pink. Then gold on snow you can name.",
t:"Get out by 3am if you want solitude. Hire a local guide (Rs500, keeps you safe on steps). Bring real layers—altitude hits harder at dawn. Don\'t book with your hotel; hire in Thamel for 1/3 the price.",
c:["day_trips","high_spots","nature"], r:"g",
nn:"नागरकोट सूर्योदय पैदल", ns:"दृश्य सच है। भीड़ भी है।",
nst:"जंगल का रास्ता खड़ा है—सही प्रयास। लेकिन नगरकोट शहर एक पर्यटक漏斗: आक्रामक होटल दलाल, बढ़े हुए दाम। चंगु नारायण से शुरू करें।\n\nअकेले जाने के लिए: सुंडरीजल बांध से 4am।",
nt:"3am से पहले निकलो। 500 रुपये में स्थानीय गाइड। असली परतें लाओ। होटल के साथ बुकिंग मत करो।"},

{id:49, n:"Bhaktapur Medieval City — Pottery and pace", a:"Bhaktapur", v:["history","quiet","local"], d:5,
s:"Bhaktapur moves slower. The medieval squares feel lived-in because people still live there. You can lose yourself in actual neighborhoods, not just photo spots.",
st:"Durbar Square is stunning—Vatsala Temple, Taleju Temple, the Peacock Window all genuine. But walk out: Pottery Square (Kumaleshor) has wheels spinning today, not in museums. Go at 8am before tour buses. Visit Nyatapola Temple (five-story pagoda, 365 steps, views get real). The city is hilly and sprawling; this matters. You\'ll walk far but empty backstreets feel like yours alone.\n\nTip: Most tourists clone one route. Stay for dinner—local momos are half Kathmandu prices and twice the fat.",
im:"Terracotta dust on a potter\'s hands. A kid running through a courtyard that held a king 400 years ago. Sunlight through carved wooden windows creating moving shadows on stone.",
t:"Start early (7am), lunch there, leave before 4pm crowds. Skip the museum ticket (Rs500)—the city is the museum. Hire a pottery square guide (Rs300) to understand the craft. Bring water; you will climb.",
c:["day_trips","history_big","markets","neighbourhoods"], r:"g",
nn:"भक्तपुर मध्यकालीन शहर", ns:"पुरानी गलियों में अपना समय खो दो।",
nst:"दरबार चौक चमकता है—लेकिन बाहर निकलो। कुमालेश्वर में आज पहियां घूमते हैं। 8am से पहले जाओ। न्यातपोला मंदिर 5-मंजिला है, 365 सीढ़ियां हैं। शहर खड़ा है; यह मायने रखता है। शाम के लिए रुको।",
nt:"7am शुरू करो। वहीं खाना खाओ। 4pm से पहले जाओ। संग्रहालय टिकट स्किप करो। मिट्टी के चौक पर गाइड किराए पर लो।"},

{id:50, n:"Panauti Ancient Pilgrimage Town — Indus Valley survivor", a:"Panauti", v:["history","quiet"], d:5,
s:"Panauti is one of Nepal\'s oldest towns, a real pilgrimage center that predates tourism. The Indreshwar Temple is the oldest pagoda still standing. You\'re walking into actual history, not a photo set.",
st:"The temple—built 1294—has a restored interior, original carvings, genuine pilgrims. The town sits where two rivers meet; locals bathe there for real reasons, not for the \'vibe.\' It\'s 35km east but feels remote: thin tourist presence, actual markets, kids playing in courtyards. The Panauti River Gorge walk is spectacular if you hire a guide (Rs600 for 3 hours). The museum is basic but honest—small, real artifacts, no gloss.\n\nCrowds peak 10am-2pm on weekends. Go midweek.",
im:"Stone worn smooth by pilgrims\' hands over 700 years. A woman in indigo sari pouring river water over her head at dawn. The gorge below—terrifying and beautiful.",
t:"Hire a local guide at the temple (ask a vendor). Bring lunch from town—restaurants are thin. Allow 5 hours minimum. Go midweek. Altitude is low; heat matters in summer. Dhulikhel is 20km away; combine visits.",
c:["day_trips","history_big"], r:"g",
nn:"पनौती प्राचीन तीर्थ स्थान", ns:"1294 का मंदिर अभी भी खड़ा है।",
nst:"इंद्रेश्वर मंदिर 1294 में बना था—असली तीर्थ यात्री यहां आते हैं। पनौती नदी का कण्ठ 700 साल का मार्ग है। भीड़ 10am-2pm सप्ताहांत में आती है। बीच के दिन जाओ।",
nt:"मंदिर पर स्थानीय गाइड किराए पर लो। खाना शहर से लाओ। 5 घंटे दो। धुलीखेल 20km दूर है।"},

{id:51, n:"Dhulikhel Trader\'s Rest — Silk Road nostalgia", a:"Dhulikhel", v:["history","quiet","local"], d:4,
s:"Dhulikhel was a major trading post on the silk road. It still has that ancient merchant town feeling—open courtyards, old inns, temples that served caravans.",
st:"The main bazaar (Narayanhiti) keeps that trading-post density: fabric shops, metalworkers, spice vendors side by side. The Narayanhiti Temple sits at the center—dating to 1654, it anchors what was a merchant square. Walking the old town edges, you pass temples to Bhagwati, Shiva, Vishnu—the gods of commerce and safe passage.\n\nDhulikhel isn\'t preserved like Bhaktapur. It\'s still working. Kids in school uniforms navigate past trekking shops. That realness is the point.",
im:"A fabric merchant holding indigo cloth against afternoon light. Tiny temple bells echoing off stone buildings. The road out of town heading east toward mountains.",
t:"Go midweek, stay 3 hours, eat dal bhat at a proper dhaba (Rs150). Skip restaurants. The Gauri Shankar Mandir on the ridge—30min walk up, quiet, real views. Hire a guide for history (Rs400). Don\'t feel like you need to stay overnight; good day trip from Kathmandu.",
c:["day_trips","history_big","neighbourhoods"], r:"g",
nn:"धुलीखेल व्यापारी का विश्राम", ns:"रेशम मार्ग की याद।",
nst:"धुलीखेल व्यापार केंद्र था। मुख्य बाज़ार अभी भी वह घनत्व रखता है। नारायणहिती मंदिर 1654 का है। यह अभी भी काम करने वाला है।",
nt:"सप्ताहांत छोड़ दो। धाबा पर दाल भात खाओ। गौरी शंकर मंदिर 30min ऊपर है। गाइड किराए पर लो।"},

{id:52, n:"Pashupatinath Dawn Cremation Ghats — The honest ritual", a:"Pashupatinath", v:["history","weird"], d:2,
s:"Pashupatinath at dawn is overwhelming and real: it\'s one of the holiest Hindu temple complexes, and bodies are cremated in plain sight daily.",
st:"Arrive 5am. The ghats are barely waking—a priest walking to ritual, smoke from last night\'s pyre still settling. There will be a cremation happening. You will see it: the wrapped body, the oil, the fire. Families are grieving nearby.\n\nThis is not a spectacle to film. It\'s sacred, specific, and you\'re a witness. The sound: bells, mantras, river. The smell: sandalwood and burning. Your presence as a tourist is acknowledged but ancillary. Respect the boundaries—no photos of the bereaved family, no phone noise, no curiosity that becomes an audience.\n\nThere are sadhus (holy men) in saffron. Offer them chai (Rs20). They\'ll talk; they live here.",
im:"The body wrapped in white cloth, family walking the corpse to the ghat. Fire catching the face you\'ll never see. The river beyond carrying ashes. A priest chanting in a language older than your country.",
t:"Go alone or with one person. Arrive 5-6am. Wear respectful clothes. Talk quietly or not at all. There will be people asking for donations—they\'re genuine, not scams, but donations are optional. If you find it overwhelming, that means it\'s working.",
c:["history_big","scary","weird"], r:"g",
nn:"पशुपतिनाथ भोर दाह संस्कार", ns:"असली और अभिभूत करने वाला।",
nst:"5am आ। पहला पाइरा अभी जल रहा है। लाश सफेद कपड़े में लपेटी है। परिवार पास खड़ा है। यह दृश्य नहीं है—यह पवित्र है। बेल, मंत्र, नदी। खुशबू: चंदन और आग।\n\nसाधु हैं। उन्हें चाय दो। वे यहां रहते हैं।",
nt:"अकेले या एक साथ आ। 5-6am। सम्मान के कपड़े। चुप बात करो। दान के लिए पूछेंगे—यह असली है।"},

{id:53, n:"Swayambhunath at Sunrise — Real monkey temple logistics", a:"Swayambhunath", v:["beautiful","history","famous"], d:2,
s:"The golden stupa is genuinely beautiful at dawn light. The chaos is genuine too: feral monkeys, souvenir sellers, and tourists who will push you.",
st:"Get there at 5:30am. You\'ll be alone with monks doing kora (ritual circumambulation) and the actual religious function. The monkeys are aggressive—one stole my phone case, another tried a backpack. Carry nothing loose. They\'re unpredictable but not dangerous if you don\'t threaten them.\n\nThe stairs are steep (365 of them, though who counts). Your thighs will know. The views down—Kathmandu Valley, Boudhanath Stupa visible on clear days, the city waking below—are worth it. Stay until 7am, before tour buses. Then leave. Peak crowd is 9am-3pm.",
im:"Monkeys silhouetted against the golden finial. The valley turning pink then blue below. A monk passing with incense, bells chiming as he walks.",
t:"5:30am. Bring water, no phone strap, no loose pockets. Skip the souvenir kits—Rs500 for candles you don\'t need. There\'s a small monastery on-site with chai (Rs30) and actual monks. Talk to them instead of the shopkeepers. The museum inside the stupa base is Rs200 and worth 15 minutes.",
c:["greatest_hits","high_spots","history_big"], r:"g",
nn:"स्वयंभूनाथ सूर्योदय", ns:"सोने का स्तूप। बंदरों का अराजकता।",
nst:"5:30am आओ। भिक्षु कोरा करते हैं। बंदर आक्रामक हैं—कुछ चीजें चोरी करेंगे। ढीला कुछ मत रखो। सीढ़ियां खड़ी हैं (365)। दृश्य नीचे—काठमाडौँ घाटी, बौद्धनाथ स्पष्ट दिन में दिखता है।\n\n7am तक रुको। 9am-3pm भीड़ है।",
nt:"5:30am। पानी लाओ। फोन पट्टी मत रखो। स्मृति चिन्ह किट स्किप करो। मठ में चाय है। संग्रहालय Rs200।"},

{id:54, n:"Boudhanath Stupa Evening Kora — The working pilgrimage", a:"Boudhanath", v:["history","local","beautiful"], d:2,
s:"Boudhanath at dusk is when pilgrims are walking, not tourists gawking. It\'s the largest stupa in Nepal and the most lived-in spiritual space in Kathmandu.",
st:"The stupa is massive—built in the 5th century, possibly older. Pilgrims circle it clockwise, counting 108 rotations, or some do one lap. Tibetan families. Expats seeking something. Monks with strings of beads. The energy is actual devotion, not tourism.\n\nArrive 4pm. Watch until 6:30pm when light dies and the prayer lights come on. The sound: bells, the shuffle of feet on stone, mantras being chanted by people who mean it. There\'s a Tibetan monastery attached (Kopan) if you want to sit with real students later.\n\nThere are cafes circling the base. The chai is actual chai, not for tourists. Sit and watch—you\'ll understand something by staying quiet.",
im:"The enormous white dome, lit gold at dusk. A Tibetan woman in full traditional dress circumambulating. Prayer flags catching the last light. The enormous eyes of Buddha painted on all four sides watching.",
t:"Go 4-6:30pm on weekdays—weekends are thick. Bring Rs300 for chai and maybe a small butter lamp (Rs25). Respect the pilgrims by staying on the path. Don\'t approach the monastery unless invited. Download a meditation app beforehand if you need anchoring.",
c:["free_culture","greatest_hits","history_big"], r:"g",
nn:"बौद्धनाथ स्तूप संध्या कोरा", ns:"5वीं सदी का ध्यान।",
nst:"स्तूप विशाल है—5वीं सदी का। तीर्थयात्री 108 घुमाव या एक पूरा। दृश्य: घंटियां, पैरों की आवाज़, मंत्र। प्रकाश डूबता है 6:30pm तक प्रार्थना लैंप आते हैं।\n\nकोपान मठ जुड़ा है। अगर चाहो तो बैठ जाओ।",
nt:"4-6:30pm सप्ताहांत छोड़कर। Rs300 चाय के लिए। लैंप Rs25। पथ पर रहो।"},

{id:55, n:"Durbar Square Triple Hit — Patan, Bhaktapur, Kathmandu (the honest tour)", a:"Multiple", v:["history","beautiful"], d:7,
s:"Nepal has three durbar squares. All are 15th-17th century palaces and temples. All were damaged in the 2015 earthquake. Visiting all three reveals something: how empires read architecture and power differently.",
st:"Kathmandu Durbar is the busiest, most wrecked, most reconstructed. The Taleju temple is still closed (earthquake damage ongoing). Go 7am before crowds. The Jagannath Temple (oldest pagoda) survived intact. The Kumari House is the most interesting—a child goddess still lives inside.\n\nPatan Durbar is the most beautiful—smaller, better-preserved temples, better carvings. Less crowded. The museum is Rs200 and actually good. Go midday, stay 3 hours.\n\nBhaktapur Durbar is the least wrecked but feels most medieval. You can walk from the square into actual neighborhoods where people live. Spend a full afternoon.\n\nTourists usually do one. If you have time, doing all three teaches you how power looked at different moments.",
im:"Stone so old it\'s black with age and wear. A temple that survived 700 years and an earthquake. A child in a gilded window. Tourists being herded past something sacred.",
t:"Buy a combined ticket (Rs2000, three days) instead of separate ones (total Rs2500). Hire a guide ONCE for the first square (Rs1000 for Patan, they\'re best), ask them to skip the script and tell you what\'s unusual about carvings. Avoid guides attached to hotels—they have commission agendas. Go Tuesday-Thursday to avoid crowds.",
c:["greatest_hits","history_big","neighbourhoods"], r:"g",
nn:"दरबार चौक तिहरा", ns:"तीन साम्राज्य, तीन शैलियां।",
nst:"काठमाडौँ सबसे व्यस्त है—2015 भूकंप क्षति अभी भी यहां है। तालेजु मंदिर बंद है। 7am जाओ। जगन्नाथ मंदिर पुराना और सही रहा।\n\nपाटन सबसे सुंदर है—छोटा, बेहतर पोल चिन्हित। संग्रहालय Rs200।\n\nभक्तपुर सबसे मध्यकालीन है। चौक से पड़ोस में चलो जहां लोग रहते हैं।",
nt:"संयुक्त टिकट Rs2000 (3 दिन)। गाइड एक बार किराए पर लो। होटल-जुड़े गाइड स्किप करो। मंगलवार-गुरुवार।"},

{id:56, n:"Kumari Living Goddess — The girl in the gilded box", a:"Kathmandu Durbar Square", v:["weird","history"], d:1,
s:"The Kumari is a real child who lives in a house in Durbar Square, treated as a goddess. When she menstruates, she stops being a goddess and is replaced. This is not mythology—it happens now.",
st:"The current Kumari is a girl (age changes, usually 8-12) selected through ritual observation by priests. She lives in a carved palace, appears on the window occasionally, and Nepali families visit for blessing. You can stand outside the window and wait for her to appear—she will, usually in afternoon light, sometimes with handlers nervous about tourists.\n\nThis feels uncomfortable because it is. A girl is elevated to deity and confined. When she menstruates, the divinity ends and she\'s returned to normal life. Psychologically this is complex. But asking \'is this ethical?\' while standing there watching her is the wrong question—she exists, and her existence tells you something about power, childhood, and belief systems that are not yours to resolve.\n\nGo quietly. If you see her, don\'t photograph.",
im:"A girl\'s face in a window above tourists\' heads. Elaborate clothes and makeup. The silence when people realize she\'s watching them watch her.",
t:"Don\'t expect to see her—it\'s chance. Go 3-5pm when she\'s most likely at the window. There are no \'visiting hours.\' Don\'t try to talk to her. If you\'re uncomfortable, you can skip it. If you go, understand what you\'re seeing.",
c:["history_big","weird"], r:"g",
nn:"कुमारी जीवित देवी", ns:"एक लड़की और देवत्व।",
nst:"कुमारी एक वास्तविक बच्ची है जो दरबार चौक के घर में रहती है, देवी के रूप में। जब उसे माहवारी आती है, वह देवी नहीं रहती। यह पौराणिकता नहीं है—यह अभी होता है।\n\nवर्तमान कुमारी एक लड़की है (आमतौर पर 8-12 साल)। वह घर में रहती है, खिड़की पर कभी-कभी दिखती है। तुम बाहर खड़े हो सकते हो।",
nt:"उसे देखने की उम्मीद मत करो। 3-5pm। दृश्य न लो। चुप रहो।"},

{id:57, n:"Asan Tole at Dawn — Spice market alive", a:"Asan Tole", v:["markets","local"], d:1,
s:"Asan Tole is Kathmandu\'s oldest spice market, still functioning as it did 300 years ago. At dawn it\'s before tourists, when actual commerce happens.",
st:"Vendors are setting up 5am. Spices in enormous aluminum buckets—turmeric, cardamom, cinnamon, cloves, pepper, cumin. The smell is absolute: you cannot smell clearly after 30 seconds. The vendors shout prices and quantities in Nepali and Hindi. You\'re watching a market that hasn\'t fundamentally changed despite internet and apps.\n\nThere\'s a Annapurna Temple at the center (goddess of plenty). The temple is always open, always has pilgrims. The vendors treat it like a part of work, not a photo opportunity.\n\nBy 8am the tourist guides start arriving. The market gets narrower and more performative. Go early, stay 90 minutes, buy chai from a vendor (Rs15), sit and watch.",
im:"Turmeric dust floating in early light. The yellow-orange coating on everything. A vendor\' bare feet on a stone that hasn\'t moved in 200 years. The temple bell clanging through it all.",
t:"Go 5:30-7am. Bring cash (ATMs nearby on Raja Path). Don\'t try to photograph vendors—ask first, they usually say yes if you buy something. Bring a small cloth for your face (the spice dust is real). Buy small amounts of spices you actually want, not collections. Chai costs Rs15, momo Rs30.",
c:["free_culture","markets"], r:"g",
nn:"असन टोल भोर", ns:"3 सदी का मसाला बाजार।",
nst:"असन तोल काठमाडौँ का सबसे पुराना मसाला बाजार है। 5am बिक्रेताओं को सेट करने के समय आओ। सुगंध पूर्ण है। अन्नपूर्णा मंदिर केंद्र में है। 8am से पर्यटक आते हैं।",
nt:"5:30-7am। नकद लाओ। बिक्रेताओं को फोटो मत लो—पहले पूछो। कपड़ा लाओ। छोटी मात्रा खरीदो।"},

{id:58, n:"Indra Chowk Market — Gods and goods", a:"Old City", v:["markets","weird","local"], d:1,
s:"Indra Chowk is another ancient market, famous for its sex-worker pilgrims in a temple dedicated to the god of sex. It\'s weird, real, and no one talks about it.",
st:"There\'s a temple in the center dedicated to Indra, who appears in the Rigveda 250 times and whose mythology includes disguise and transgression. Sex workers have traditionally visited this temple, historically and now. They wear traditional clothes, make offerings, and pilgrims treat them with respect in this context—they\'re worshippers.\n\nThe market itself is textiles and religious items. You\'ll see women in full traditional Nepali dress (gold, red, black) shopping for ritual cloth. It\'s genuinely mixed: tourist shops, actual vendors, temples, and a functioning market.\n\nThis is a place where gender and commerce and religion are not separated into neat categories. That\'s why it\'s interesting.",
im:"Red and gold cloth hanging in stacks. Women in elaborate traditional dress examining fabric. A temple bell. Incense. The kind of crowded chaos that feels like it\'s been the same for centuries.",
t:"Go 8-11am. Bring small cash. Don\'t expect explanations—ask vendors directly about the temple if curious, they\'ll explain. The Maju Deval (temple tower) next door is oldest in the city. Combine with Asan Tole (10min walk south).",
c:["free_culture","markets","weird"], r:"g",
nn:"इंद्र चौक बाजार", ns:"देवता और सामान।",
nst:"इंद्र चौक एक और प्राचीन बाजार है। केंद्र में इंद्र को समर्पित मंदिर है (वेदों में 250 बार दिखता है, लिंग और रूपांतरण से जुड़ा)। सेक्स वर्कर ऐतिहासिक रूप से और अब भी इस मंदिर में जाते हैं। वे परंपरागत कपड़े पहनते हैं, अर्चन करते हैं। तीर्थयात्री उन्हें सम्मान से व्यवहार करते हैं।",
nt:"8-11am। नकद लाओ। मंदिर के बारे में पूछो। माजु देवल अगल दरवाजे पर है। असन तोल से 10 मिनट।"},

{id:59, n:"Earthquake Reconstruction Sites — Honest damage and repair", a:"Old City", v:["scary","history"], d:2,
s:"The 2015 earthquake killed 9,000 people and destroyed thousands of buildings. The reconstruction is ongoing, honest, and sometimes heartbreaking.",
st:"Dharahara Tower—the city\'s old landmark—collapsed with 70 people inside. It\'s rebuilt now, open for climbs again, but if you know the history it feels different. The stairs took 50 people out who could get to the exits.\n\nThere are buildings still wrapped in scaffolding. There are temples reconstructed incorrectly (new timber, wrong colors) while experts argue about authenticity. There are empty lots where buildings stood, now used as parking.\n\nThe Earthquake Museum (Rs200, in Bhaktapur) is small but serious—photos, personal objects, a timeline of what collapsed when. It\'s not sensational; it\'s factual and therefore more impactful.\n\nWalking the old city, you see both: reconstruction that respects history, and reconstruction that just needs to make money. Both are real responses to disaster.",
im:"A temple wrapped in blue plastic and bamboo scaffolding. A new reconstruction next to an old untouched temple. Children playing in a space where a building used to be. The way people don\'t mention it but know to avoid certain routes because they remember.",
t:"Ask locals which sites are safe to visit. Some are still unstable. The Earthquake Museum is worth the trip to Bhaktapur (it\'s near Durbar Square). Be aware that talking about the earthquake might bring up things for people who survived it—listen more than ask. The disaster is fresh.",
c:["free_culture","history_big","scary"], r:"g",
nn:"भूकंप पुनर्निर्माण स्थल", ns:"क्षति और मरम्मत।",
nst:"2015 का भूकंप 9,000 मारा। धारहरा टावर ढह गया—70 लोग अंदर थे। अब यह दोबारा खुला है, लेकिन सीढ़ियों को 50 निकाले जा सके। अभी भी इमारतें तैयारी में हैं। मंदिर गलत तरीके से दोबारा बनाए गए हैं।",
nt:"स्थानीयों से पूछो कौन से सुरक्षित हैं। कुछ अभी अस्थिर हैं। भूकंप संग्रहालय Rs200। लोगों को सुनो, पूछो मत।"},

{id:60, n:"Kopan Monastery — Tibetan Buddhism classroom", a:"Bodhnath Edge", v:["history","free_culture","quiet"], d:3,
s:"Kopan is a functioning monastery where Tibetan monks and Western students live together studying Buddhism. You can attend teachings, sit in on classes, or just walk the grounds and be quiet.",
st:"Founded in 1971, it\'s one of Nepal\'s most serious Buddhist institutions. Westerners come for weeks or months to study. Tibetan monks debate philosophy in courtyards. The main hall has actual religious function, not tourism.\n\nYou don\'t need to be Buddhist to visit. There\'s a guesthouse on-site (Rs1500/night if you want to stay). There are teaching sessions open to visitors, usually 10am and 3pm (check ahead). The views from the monastery—down to Boudhanath Stupa, across the valley—are substantial.\n\nIf you show up quiet and respectful, people will talk to you. Monks are curious about Western perspectives. You might end up in a 2-hour conversation about the nature of mind with someone who\'s been meditating since 1974.",
im:"Young monks in maroon robes sweeping red dust. Prayer wheels spinning. Mantras being chanted in a language you don\'t know. The Boudhanath Stupa visible below in afternoon light.",
t:"Go 10am or 3pm for teachings (they sometimes change, call ahead: +977 1 4490733). Bring a small donation (Rs500 appropriate). Walk respectfully. Photography is restricted—ask before shooting. If you want to stay overnight, book ahead. The guesthouse kitchen serves vegetarian meals (Rs300-500).",
c:["free_culture","history_big"], r:"g",
nn:"कोपान मठ", ns:"तिब्बती बौद्ध धर्म कक्षा।",
nst:"कोपान 1971 में स्थापित किया गया। तिब्बती भिक्षु और पश्चिमी छात्र एक साथ रहते हैं। मुख्य हॉल वास्तविक धार्मिक कार्य है। दृश्य—बौद्धनाथ स्तूप तक—पर्याप्त हैं।",
nt:"10am या 3pm शिक्षण के लिए आओ। फोन करो पहले। छोटा दान करो। फोटोग्राफी प्रतिबंधित है।"},

{id:61, n:"Thamel Beyond Tourist Strip — Real neighborhoods exist", a:"Thamel", v:["local","neighbourhoods"], d:3,
s:"Thamel is famous for \'tourist strip,\' but most of it is actual neighborhood where Kathmandu people live, work, and ignore visitors.",
st:"Everyone goes to Freak Street or Pie Alley or whatever the current trend is. Walk north or east into streets where there are no restaurants, no \'authentic\' signage, just houses, tiny shops, schools, old temples. You\'ll find a street vendor selling yak meat buns (Rs30, genuinely good). A barber shop. A place where trekking workers are selling ropes to other vendors. A family shrine that\'s 200 years old but ordinary.\n\nWalk slowly enough to see which shops have been there forever and which are new. Talk to shopkeepers (they appreciate it). Ask where the neighborhood mosque or temple or gurudwara is.\n\nThamel contains multitudes. Most tourists see 5% of it.",
im:"A woman in traditional Newari dress buying vegetables from a street vendor. A schoolkid in uniform running home. Laundry hanging between buildings. A shrine completely unremarkable except for carved wood that\'s 300 years old.",
t:"Get a basic map (or use offline Google Maps, street names are inconsistent). Wander north from JB Road at dawn (6:30am) before the tourist shops open. Talk to anyone. The restaurants you think you found: most have been there 5+ years and aren\'t actually hidden. Focus on what locals use—ubiquitous small shops, dairies, hardware stores.",
c:["free_culture","neighbourhoods"], r:"g",
nn:"थामेल पर्यटक पट्टी के परे", ns:"वास्तविक पड़ोस मौजूद हैं।",
nst:"थामेल पर्यटकों के लिए प्रसिद्ध है, लेकिन अधिकांश काठमाडौँ लोग रहते हैं, काम करते हैं। उत्तर या पूर्व में चलो जहां कोई रेस्तरां नहीं है। घर, दुकानें, स्कूल, मंदिर।",
nt:"धीरे चलो। 6:30am जब दुकानें खुली नहीं हैं। स्थानीयों से पूछो।"},

{id:62, n:"Nagarjun Forest Hike — Suburban wilderness", a:"Nagarjun", v:["nature","quiet"], d:4,
s:"Nagarjun is a forested ridge just outside Kathmandu where you can hike for 3 hours and actually feel alone, despite being 15 minutes from the city.",
st:"The hike climbs steeply through pine and rhododendron forest. There\'s a small cave temple (Nagarjun Gufa) at the top. The views back to Kathmandu are sharp on clear days; you see the city\'s actual shape and size. The forest is real—monkeys, birds, actual quiet.\n\nStart from the northern edge (Jamacho, or near the dam). The trail is steep but maintained. Bring water. On the way down you might see wild boar or monitor lizards. The casual temples and shrines along the way are active—pilgrims use them.\n\nThis is a neighborhood hike. Locals use it. By going at dawn (6am) you\'ll be alone.",
im:"Forest canopy so thick noon is dim. The sound of your breathing and birds. A sudden drop-off showing the entire valley below. Silence that feels like something physical.",
t:"Start 6am from Jamacho trailhead (Rs200 entry if there\'s a gate attendant). Bring Rs500 for chai at the cave temple (it\'s run by locals). Water is essential—bring 2 liters. The descent is harder on knees than the climb. Done by 11am.",
c:["day_trips","nature"], r:"g",
nn:"नागार्जुन वन पैदल", ns:"शहर के किनारे पर जंगल।",
nst:"नागार्जुन काठमाडौँ के बाहर एक वन पर्वत है। 3 घंटे में चलो और अकेले महसूस करो। चढ़ाई खड़ी है पाइन और रोडोडेंड्रोन के माध्यम से। शीर्ष पर नागार्जुन गुफा है। दृश्य—काठमाडौँ वापस—तेज हैं।",
nt:"6am शुरू करो जमाछो से। Rs200 प्रवेश। Rs500 मंदिर पर चाय के लिए। 2 लीटर पानी। 11am तक।"},

{id:63, n:"Shivapuri Ridge Trek — Valley circuit edge", a:"Shivapuri", v:["nature","beautiful","high_spots"], d:5,
s:"Shivapuri ridge runs north of Kathmandu and offers a full-day trek with consistent mountain views and less tourist traffic than typical Kathmandu hikes.",
st:"Start early from Sundarijal (the dam and reservoir you see in early morning guides). The trail climbs through forest, then opens to ridge walking with views of the Himalayas on clear days. Shivapuri Temple (a small shrine) sits at about 2400m. The return route varies—you can loop back or retrace.\n\nThis hike is known locally; you\'ll see Kathmandu residents, school groups, actual pilgrims. The difficulty is moderate—5 hours up, 3-4 hours down. Bring food, water is available at the temple.\n\nOn clear days (October-November, March-April) you see Langtang, Ganesh Himal, and on very clear days, the Everest massif to the east. Most days are not clear, but the forest itself is worth it.",
im:"Ridge walking where you can see the valley floor behind you and mountains ahead. Cloud moving through trees. Prayer flags at the temple appearing suddenly. The silence of altitude.",
t:"Hire a guide in Thamel (Rs800 for the day) or go with a friend who knows it. Start 6am from Sundarijal (Rs50 gate fee). Bring dal bhat or energy food. The descent is where injuries happen—go slow. Weather changes fast—bring a jacket even on sunny mornings.",
c:["day_trips","high_spots","nature"], r:"g",
nn:"शिवपुरी रिज ट्रेक", ns:"घाटी के किनारे।",
nst:"शिवपुरी काठमाडौँ के उत्तर में चलता है। सुंडरीजल बांध से शुरू करो। जंगल के माध्यम से चढ़ाई, फिर रिज चलना। दृश्य स्पष्ट दिनों में हिमालय हैं। शिवपुरी मंदिर 2400m पर है।",
nt:"थामेल में गाइड किराए पर लो। 6am से शुरू करो। खाना और पानी लाओ। वंश में चोटें होती हैं—धीरे जाओ।"},

{id:64, n:"Rato Machhendranath Festival — The god that walks the city", a:"Patan", v:["weird","history","local"], d:1,
s:"Rato Machhendranath is a rain god moved through Patan on a massive wooden chariot over weeks in spring. It\'s worship as logistics, not spectacle.",
st:"The festival (Rato Jatra) happens March-April, depending on calendar. A massive wooden structure—sometimes 15 meters tall—is built from scratch each year. Dozens of men pull it through streets. The god statue sits inside. It takes weeks to move him across the city.\n\nCommunities along the route receive the god\'s blessing (and gifts—food distributed as prasad). It\'s a working tradition, not a tourist attraction repackaged. Most tourists don\'t know it exists.\n\nIf you\'re in Patan during March-April and see a massive wooden structure being built or moved, ask what it is. Expect to understand about 30% of what\'s happening; you\'ll still feel the weight of the thing moving through a city that\'s been doing this for centuries.",
im:"A wooden tower bigger than buildings being pulled by ropes. Hundreds of people pushing, singing. The idol inside, unseen but present. Dust and weight and effort.",
t:"Check if it\'s happening when you visit (ask tourism office). Go to Patan if the festival is in progress. You don\'t need tickets—it\'s public. Bring water. Stay out of the way of the ropes and pulling crews. Local families will explain if you look confused.",
c:["history_big","weird"], r:"g",
nn:"राto मच्छेंद्रनाथ उत्सव", ns:"देवता जो शहर को चलता है।",
nst:"राto मच्छेंद्रनाथ एक बारिश देव है जो पाटन के माध्यम से विशाल लकड़ी के रथ पर चलता है। रto जात्रा मार्च-अप्रैल में होती है। विशाल लकड़ी की संरचना हर साल नई बनाई जाती है। दर्जनों आदमी इसे खींचते हैं। वह शहर भर में सप्ताह लेता है।",
nt:"मार्च-अप्रैल में जांचो। पाटन जाओ। कोई टिकट नहीं। रस्सियों से दूर रहो।"},

{id:65, n:"Bagmati River Dawn Bath — Sacred water, real pollution", a:"Pashupatinath", v:["scary","romantic_water","history"], d:1,
s:"The Bagmati is Nepal\'s holiest river. It\'s also heavily polluted. People bathe in it for spiritual reasons, knowing the contradictions.",
st:"At Pashupatinath, pilgrims wade in the Bagmati at dawn. They\'re not unaware of pollution—they navigate both: the sacred function of the river and its material reality. You see it: the water is gray, debris floats, chemical smell. Pilgrims bathe anyway, or bathe despite. The act holds both truths.\n\nThis is not a \'before pollution\' moment or a moment to judge. It\'s a reality where belief and material fact coexist without resolution. The river is holy. The river is poisoned. Both are true. People act within that complexity.\n\nWatch from the ghat, don\'t participate if you\'re not comfortable. The pilgrims don\'t need witnesses; they\'re there for reasons that predate tourism.",
im:"Gray water. A woman submerging herself completely. Trash caught in an eddy. Incense smoke. A priest pouring river water. The contradiction all happening at once.",
t:"Go 5-6am. Bring water from somewhere else to drink. Don\'t put your hands in the river unless you\'re prepared for the consequences (bacteria, chemicals). This is not a safe place to swim. Watch and understand what you\'re seeing without judgment.",
c:["history_big","romantic_water","scary"], r:"g",
nn:"बागमती नदी भोर स्नान", ns:"पवित्र पानी, असली प्रदूषण।",
nst:"बागमती नेपाल की सबसे पवित्र नदी है। यह भी भारी प्रदूषित है। लोग आध्यात्मिक कारणों के लिए इसमें स्नान करते हैं। पानी स्पष्ट नहीं है। मलबा तैरता है। लोग फिर भी स्नान करते हैं।\n\nयह दोनों सत्य है: पवित्र और जहरीला।",
nt:"5-6am आओ। अपना पानी लाओ। नदी में हाथ मत डालो। कोई सुरक्षित पूल नहीं है।"},

{id:66, n:"Jagannath Temple — The oldest pagoda still standing", a:"Kathmandu Durbar Square", v:["history","beautiful"], d:1,
s:"Jagannath Temple is the oldest pagoda in Nepal still in use—built in 1563. It\'s on the edge of Durbar Square, often overlooked because Taleju gets the attention.",
st:"The temple is three stories, wood construction, and carved so intricately that photos can\'t capture it. Every surface is image: Maithuna figures (couples in embrace, sexual positions) which serve a theological function (representing energy and bliss in meditation systems). It\'s not pornography; it\'s sacred sexuality.\n\nThe temple survived the 2015 earthquake intact. It functions daily—pilgrims come, priests perform rituals, bells are rung. It\'s not a museum.\n\nThe Maithuna carvings will make you uncomfortable if you\'re not expecting them. That\'s the point of the discomfort—sacred traditions in Nepal don\'t separate sexuality from spirituality the way Western Christianity does. The carved couples are not hidden; they\'re on the main temple in the main plaza.",
im:"Wood so carved it\'s almost lace. A couple carved embracing. Gold leaf catching light. The absolute intricacy of every surface bearing image. Tourists walking past not seeing what they\'re looking at.",
t:"Go 7-9am or 4-6pm to avoid crowds. There\'s no entry fee (it\'s still a working temple, not a monument). Study the carvings—use binoculars if you have them. If sexual imagery bothers you, consider what that reveals about your own beliefs versus the temple\'s.",
c:["history_big"], r:"g",
nn:"जगन्नाथ मंदिर", ns:"अभी भी खड़ा सबसे पुराना पगोडा।",
nst:"जगन्नाथ मंदिर 1563 में बना है। तीन मंजिला है, लकड़ी निर्माण, तराशी हुई। हर सतह को तस्वीरें हैं: मैथुन आकृतियां (दंपति गले लगे हुए) जो आध्यात्मिक कार्य करती हैं। पवित्र कामुकता।\n\n2015 भूकंप में यह बरकरार रहा।",
nt:"7-9am या 4-6pm जाओ। कोई प्रवेश शुल्क नहीं। खुदाई का अध्ययन करो।"},

{id:67, n:"Patan Museum Courtyard — Nepal\'s best museum space", a:"Patan", v:["history","beautiful","free_culture"], d:1,
s:"The Patan Museum is technically a paid ticket (Rs200), but the real experience is the courtyard: a restored royal palace where you can sit in the afternoon light with actual artifacts nearby.",
st:"The palace was built in the 18th century. It was damaged in 2015, then meticulously restored. The courtyard has a central pond (empty now, restored aesthetically). Ancient stone sculptures line the edges—Ganeshas, Shivas, Buddhist figures. The carved wooden doors are original.\n\nYou can sit on the benches and watch light move across stone for hours. The museum inside has good collection (sculptures, paintings), but the space itself is the artifact.\n\nWhen it\'s not crowded (weekday afternoons), you can be almost alone with centuries of collected sacred objects arranged in a courtyard that\'s real and restored and honest about both states.\n\nThis is where you understand why the earthquake was so destabilizing—not because of deaths (though 9,000 is devastation), but because of loss of spaces like this that carry centuries of particular human care.",
im:"A Buddha head in stone, smooth from touches. Light creating sharp shadows through carved windows. The empty restored pond. A pigeon on a sculpture. The quiet.",
t:"Go Tuesday-Thursday 10am-4pm for smallest crowds. Rs200 entry. Sit for 45 minutes, do nothing but watch light. Bring a notebook if you\'re inclined to sit longer. The museum guide can explain objects if you ask; most visitors don\'t ask.",
c:["free_culture","history_big"], r:"g",
nn:"पाटन संग्रहालय आंगन", ns:"नेपाल का सबसे अच्छा संग्रहालय स्थान।",
nst:"पाटन संग्रहालय 18वीं सदी का शाही महल है। 2015 में क्षतिग्रस्त, फिर सावधानीपूर्वक पुनर्निर्मित। आंगन में केंद्रीय तालाब (अब खाली, पुनर्निर्मित)। प्राचीन पत्थर की मूर्तियां किनारों पर हैं। लकड़ी के दरवाजे मूल हैं।",
nt:"मंगलवार-गुरुवार 10am-4pm। Rs200। 45 मिनट बैठो।"}
];

const LANG_NAME="नेपाली";
const CITY_EN="Kathmandu";

const LangToggle=({lang,setLang})=>(
<div className="lang-toggle">
<button className={`lang-btn ${lang==="en"?"active":""}`} onClick={()=>setLang("en")}>EN</button>

</div>);

const PhrasesCard=()=>(
PHRASES.length>0&&<div className="rounded-2xl p-4 mt-3" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-3" style={{color:"#a78bfa"}}>🗣️ Useful {LANG_NAME} Phrases</h3>

<div><span className="text-xs font-bold" style={{color:"white"}}>{ph.native}</span>
<span className="text-xs ml-2" style={{color:"#8b7fb8"}}>— {ph.en}</span></div></div>)}</div></div>);

const EntryGate=({onAccept})=>(
<div style={{minHeight:"100vh",background:"linear-gradient(180deg,rgba(10,8,30,0.72) 0%,rgba(10,8,30,0.20) 45%,rgba(10,8,30,0.10) 100%),url('images/06_aerial.webp') center 75%/cover no-repeat",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 24px",textAlign:"center"}}>
<h1 className="text-sm font-bold tracking-widest" style={{color:"rgba(255,255,255,0.6)",textTransform:"uppercase",letterSpacing:"3px"}}>Go Do Stuff</h1>

<p className="text-sm mt-2" style={{color:"#b8b0d0",lineHeight:1.5,textShadow:"0 1px 8px rgba(0,0,0,0.9)"}}>Activities are free.<br/><span style={{fontSize:"11px",opacity:0.7}}>Travel & food recommendations: low budget.</span></p>
<p className="text-xs mt-2" style={{color:"#a5b4fc",textShadow:"0 1px 6px rgba(0,0,0,0.9)"}}>🌍 Bilingual: English + {LANG_NAME}</p>
<p className="text-xs mt-6 px-4" style={{color:"#c8c0e0",lineHeight:1.6,maxWidth:340,textShadow:"0 1px 8px rgba(0,0,0,0.95)"}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>Free. Curated. No tourist traps.</p>
<div className="rounded-2xl p-6 mt-8 mx-4 text-left" style={{background:"rgba(10,10,30,0.72)",border:"1px solid rgba(255,255,255,0.15)",maxWidth:380}}>
<h2 className="text-base font-bold mb-3" style={{color:"white"}}>Before you start</h2>
<p className="text-sm leading-relaxed" style={{color:"#c8c0e0"}}>This app is a creative guide to hidden places. Content is curated for curiosity — not as instructions.</p>
<p className="text-xs leading-relaxed mt-1" style={{color:"#9990b8",fontStyle:"italic"}}>जिम्मेदारीपूर्वक यात्रा गरी स्थानीय संस्कृति सम्मान गरें।</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#c8c0e0"}}>Some locations include natural environments, heights, water, or areas that may be restricted or unsafe. You explore at your own risk.</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#c8c0e0"}}>Always follow local laws, respect private property, and check current conditions before visiting any place.</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#e8c0f0"}}>If you are under 18, please explore responsibly.</p>
</div>
<button onClick={onAccept} className="mt-6 w-full py-4 rounded-xl text-sm font-bold text-white" style={{background:"linear-gradient(135deg,#6366F1,#8B5CF6)",border:"none",cursor:"pointer",maxWidth:380,fontSize:"15px"}}>I understand — let me explore<br/><span style={{fontSize:"12px",opacity:0.85}}>अन्वेषण सुरु गर</span></button>
</div>);

const PlaceCard=({place:p,idx,onOpen,lang})=>(
<button onClick={()=>onOpen(p)} className="text-left w-full rounded-2xl p-4 fade-up" style={{background:"white",border:"1.5px solid #e4e4ed",cursor:"pointer",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div style={{flex:1}}>
<h3 className="text-base font-bold" style={{color:"#1a1a2e",lineHeight:1.3}}>{lang==="native"&&p.nn?p.nn:p.n}</h3>
{lang==="native"&&p.nn&&<p className="text-xs" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-xs mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p></div>
<span className="text-xs font-bold px-2 py-1 rounded-full ml-2 flex-shrink-0" style={{background:p.r==="g"?"#dcfce7":"#fef9c3",color:p.r==="g"?"#166534":"#854d0e"}}>{p.r==="g"?"Green":"Yellow"}</span></div>
<p className="text-sm mt-2" style={{color:"#555",lineHeight:1.5}}>{lang==="native"&&p.ns?p.ns:p.s}</p>
<div className="flex gap-1.5 mt-2 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-2 py-0.5 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</button>);

const PlaceDetail=({place:p,onClose,onNext,onPrev,lang})=>(
<div style={{position:"fixed",inset:0,zIndex:1000,background:"url('https://mariavheland.github.io/godostuff/textures/tex07.png') center/cover no-repeat",overflowY:"auto"}}>
<div className="px-5 pt-6 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex justify-between items-center mb-4">
<button onClick={onClose} className="text-sm font-bold" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← Back</button>
<div className="flex gap-2">
<button onClick={onPrev} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>←</button>
<button onClick={onNext} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>→</button></div></div>
<h1 className="text-2xl font-black" style={{color:"#1a1a2e"}}>{lang==="native"&&p.nn?p.nn:p.n}</h1>
{lang==="native"&&p.nn&&<p className="text-sm font-medium" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-sm mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p>
{PLACE_IMAGES[p.id]&&<div className="mt-4 rounded-xl overflow-hidden" style={{maxHeight:"400px"}}>
<img src={`images/${PLACE_IMAGES[p.id]}`} alt={p.n} style={{width:"100%",maxHeight:"360px",objectFit:"contain",display:"block",borderRadius:"8px"}}/>
<p className="text-xs mt-1" style={{color:"#aaa",textAlign:"center"}}>AI-generated illustration</p></div>}
<div className="mt-4 p-4 rounded-xl" style={{background:"#f8f8ff"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#1a1a2e"}}>The Story</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nst?p.nst:p.st}</p></div>
{p.im&&<div className="mt-3 p-4 rounded-xl" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#a78bfa"}}>Imagine This</h3>
<p className="text-sm" style={{color:"#b8b0d0",lineHeight:1.7,fontStyle:"italic"}}>{p.im}</p></div>}
{p.t&&<div className="mt-3 p-4 rounded-xl" style={{background:"#f0fdf4"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#166534"}}>{lang==="native"?"Tips / "+LANG_NAME:"Tips"}</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nt?p.nt:p.t}</p>
<a href={`https://maps.google.com/?q=${encodeURIComponent(p.n+', '+CITY_EN)}`} target="_blank" rel="noopener noreferrer"
  className="mt-3 flex items-center gap-2 text-sm font-bold"
  style={{color:"#166534",textDecoration:"none",display:"inline-flex",marginTop:"10px"}}>
  🗺 Get directions
</a>
</div>}
{p.ef&&<p className="text-xs mt-3 pt-3" style={{color:"#555",lineHeight:1.7,borderTop:"1px solid #dcfce7"}}>🍔 {p.ef}</p>}
{p.sf&&<p className="text-xs mt-2" style={{color:"#555",lineHeight:1.7}}>🏠 {p.sf}</p>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
<div className="mt-5">
<p className="text-xs font-bold mb-2" style={{color:"#888",letterSpacing:"0.08em",textTransform:"uppercase"}}>City Moods</p>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} style={{borderRadius:10,overflow:"hidden",aspectRatio:"2/3",background:"#eee"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>)}</div></div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
const TBGS={"places":"https://mariavheland.github.io/godostuff/textures/tex04.png","collections":"https://mariavheland.github.io/godostuff/textures/tex18.png","missions":"https://mariavheland.github.io/godostuff/textures/tex18.png","plan":"https://mariavheland.github.io/godostuff/textures/tex18.png","phrases":"https://mariavheland.github.io/godostuff/textures/tex04.png","default":"https://mariavheland.github.io/godostuff/textures/tex04.png"};if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:"url('https://mariavheland.github.io/godostuff/textures/tex07.png') center/cover no-repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Kathmandu Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
