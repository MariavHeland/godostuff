const P = [
  {id:1,n:"Abanotubani Sulfur Baths",a:"Abanotubani",v:["hidden", "history", "beautiful", "weird"],d:1,s:"Subterranean baths where hot sulfur water rises from the earth and humans soak in 1500-year-old ritual",st:"Descend stairs. The smell hits. The heat wraps. You soak in water older than empires. Locals know every bath\'s personality.",im:"It\'s 500 AD. A merchant bathes. The water heals. The ritual continues unchanged into your moment.",t:"Descend stairs. The smell hits. The heat wraps. You soak in water older than empires. Locals know every bath\'s personality.\",im:\"It\'s 500 AD. A merchant bathes. The water heals. The ritual continues unchanged into your moment.\",t:\"Abanotubani baths, multiple locations. Metekhi area. Entrance fee varies. Private baths nicer than shared. Go early morning for calm.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:2,n:"Narikala Fortress Ruins from the Hill",a:"Sololaki",v:["history", "beautiful", "nature"],d:2,s:"A fortress crumbling from the 4th century watching Tbilisi below like a patient ghost",st:"Walk ruins. Stone whispers siege. War. Peace. The walls hold 1600 years of occupation and resistance.",im:"It\'s 400 AD. Builders construct walls. They don\'t know the walls will last until you stand inside them.",t:"Walk ruins. Stone whispers siege. War. Peace. The walls hold 1600 years of occupation and resistance.\",im:\"It\'s 400 AD. Builders construct walls. They don\'t know the walls will last until you stand inside them.\",t:\"Narikala Fortress, Sololaki district. Cable car access or hike up stone paths. Free to walk ruins. Best sunset. Bring water.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:3,n:"Fabrika Creative Spaces",a:"Vake",v:["local", "art", "hidden", "weird"],d:3,s:"An old bakery factory transformed into artist studios, galleries, cafés where Georgia\'s young makers work visibly",st:"Multiple floors. Studios open. Art happening. Concerts. Exhibitions. The space breathes creative chaos.",im:"It\'s 2000s. Artists discovered the factory. They occupied. They stayed. It became culture\'s home.",t:"Multiple floors. Studios open. Art happening. Concerts. Exhibitions. The space breathes creative chaos.\",im:\"It\'s 2000s. Artists discovered the factory. They occupied. They stayed. It became culture\'s home.\",t:\"Fabrika, Sanavardo 42, Vake area. Walk freely. Studios vary in access. Café open daily. Check event schedule. Weekends busiest.",c:["art", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:4,n:"17-Story Building Murals",a:"Saburtalo",v:["street_art", "beautiful", "weird"],d:4,s:"A tower so covered in massive murals that the building itself became the message",st:"One of the world\'s largest murals. Seven stories of paint. Political. Personal. The building screams.",im:"It\'s 2010s. Artists claim a building. They paint fury. They paint hope. The building transforms.",t:"One of the world\'s largest murals. Seven stories of paint. Political. Personal. The building screams.\",im:\"It\'s 2010s. Artists claim a building. They paint fury. They paint hope. The building transforms.\",t:\"Murals in Saburtalo district (various buildings). Walking tour helpful to locate largest pieces. Photography excellent. Constantly evolving art.",c:["street_art"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:5,n:"Dry Bridge Antique Market",a:"Avlabari",v:["local", "hidden", "weird", "beautiful"],d:5,s:"An outdoor market where old Soviet things and ancient treasures spread on a bridge like a time machine",st:"Vendors. Chaos. Soviet badges. Icons. Weapons. Military uniforms. History you can touch and negotiate.",im:"It\'s 1990. The Soviet Union collapses. People sell what it left. Memories become currency.",t:"Vendors. Chaos. Soviet badges. Icons. Weapons. Military uniforms. History you can touch and negotiate.\",im:\"It\'s 1990. The Soviet Union collapses. People sell what it left. Memories become currency.\",t:\"Dry Bridge Market, Avlabari district. Weekends best (Saturday-Sunday). Cash only. Arrive early for selections. Haggling expected. Photography negotiable.",c:["local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:6,n:"Metekhi Church Horse and King",a:"Sololaki",v:["history", "beautiful", "quiet"],d:6,s:"A frozen moment—a bronze king on a horse eternally greeting the city he saved",st:"King David stands. His horse rears. The church behind him. The city sprawls below. It\'s permanence made sculpture.",im:"It\'s 1000 AD. David rules. He builds. He defends. The kingdom holds. The moment never ends.",t:"King David stands. His horse rears. The church behind him. The city sprawls below. It\'s permanence made sculpture.\",im:\"It\'s 1000 AD. David rules. He builds. He defends. The kingdom holds. The moment never ends.\",t:\"Metekhi Church/Statue, Old Town center. Free outdoor viewing. Church open for prayer/tourism. Photography excellent at sunset. Always accessible.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:7,n:"Peace Bridge Contemporary Design",a:"Vera",v:["architecture", "beautiful", "modern"],d:7,s:"A glass arc spanning the river that looks like a spaceship landed on Tbilisi and decided to stay",st:"Modern. Organic. It glows at night. Pedestrians cross between tradition and future. Architecture as symbol.",im:"It\'s 2010. The bridge opens. People marvel. It\'s Georgian architecture saying yes to modernity.",t:"Modern. Organic. It glows at night. Pedestrians cross between tradition and future. Architecture as symbol.\",im:\"It\'s 2010. The bridge opens. People marvel. It\'s Georgian architecture saying yes to modernity.\",t:\"Peace Bridge (Metekhi side), year-round accessible. Free to walk. Best sunset/night when illuminated. Panoramic views below.",c:["architecture", "modern"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:8,n:"Old Town Balconied Houses",a:"Sololaki",v:["history", "architecture", "beautiful"],d:8,s:"Buildings that lean and creak with wooden balconies carved so intricately they look like lace",st:"Walk narrow lanes. Look up. Each balcony is handwork. Generations carved these. The buildings refuse demolition.",im:"It\'s 1800s. A carpenter builds a balcony. His hands shape wood. The work will outlast empires.",t:"Walk narrow lanes. Look up. Each balcony is handwork. Generations carved these. The buildings refuse demolition.\",im:\"It\'s 1800s. A carpenter builds a balcony. His hands shape wood. The work will outlast empires.\",t:\"Old Town (Sololaki), Shardeni street area. Free to walk. Photography prohibited on people without consent. Watch your step. Narrow lanes.",c:["history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:9,n:"Soviet Mosaics Hidden in Public Spaces",a:"Chugureti",v:["history", "hidden", "beautiful", "weird"],d:9,s:"Mosaic murals from Soviet era hidden in subway stations and building entries—Communist art nobody erased",st:"The regime fell. The art stayed. Geometric. Idealistic. Haunting. It whispers of a world that evaporated.",im:"It\'s 1970. An artist installs a mosaic. The state approves the message. The art lasts. The state vanishes.",t:"The regime fell. The art stayed. Geometric. Idealistic. Haunting. It whispers of a world that evaporated.\",im:\"It\'s 1970. An artist installs a mosaic. The state approves the message. The art lasts. The state vanishes.\",t:\"Soviet mosaics throughout city, especially subway stations. Metromet public art tours available. Photography allowed. Deeply evocative. Historical guides help.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:10,n:"Botanical Garden Secret Pathways",a:"Vake",v:["nature", "hidden", "beautiful", "quiet"],d:10,s:"A garden where trails descend and reveal tropical plants in hidden clearings despite Georgian latitude",st:"Walk down. The city disappears. Exotic plants thrive. You forget Tbilisi. The garden rewrites geography.",im:"It\'s any season. A gardener plants something impossible. It thrives. The garden becomes sanctuary.",t:"Walk down. The city disappears. Exotic plants thrive. You forget Tbilisi. The garden rewrites geography.\",im:\"It\'s any season. A gardener plants something impossible. It thrives. The garden becomes sanctuary.\",t:\"Tbilisi Botanical Garden, Vake district. Entry fee. Multiple trails. Best spring-summer. Hiking feasible. Very peaceful. Photography welcome.",c:["nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:11,n:"Mtatsminda Funicular Night Rides",a:"Mtatsminda",v:["night", "beautiful", "local"],d:11,s:"A cable car ascending a mountain at night where Tbilisi glitters below and the city looks infinite",st:"Ride up. The city lights bloom below. Arrive on a hilltop. The amusement park glows. You\'re above everything.",im:"It\'s any night. The city glows. Someone rides the funicular. They arrive above. They see their city from heaven.",t:"Ride up. The city lights bloom below. Arrive on a hilltop. The amusement park glows. You\'re above everything.\",im:\"It\'s any night. The city glows. Someone rides the funicular. They arrive above. They see their city from heaven.\",t:\"Mtatsminda Funicular, Metromet tram connection. Takes 2 mins to ascend. Amusement park and viewpoint at top. Open daily. Affordable.",c:["night", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:12,n:"Sioni Cathedral Wine Smell",a:"Sololaki",v:["history", "quiet", "beautiful"],d:12,s:"A 6th-century church that smells like ancient stone and where candles flicker for centuries of prayers",st:"Enter. Incense. Stone. The space holds prayer physically. Tourists and believers share the air. Time thickens.",im:"It\'s 600 AD. A church stands. People pray. Then others. Then others. The prayers accumulate in the stone.",t:"Enter. Incense. Stone. The space holds prayer physically. Tourists and believers share the air. Time thickens.\",im:\"It\'s 600 AD. A church stands. People pray. Then others. Then others. The prayers accumulate in the stone.\",t:\"Sioni Cathedral, Old Town, Shardeni street. Free entry. Respectful dress. Photography inside sometimes restricted. Quiet observation welcome. Peaceful.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:13,n:"Vino Underground Wine Bar",a:"Sololaki",v:["hidden", "local", "weird", "night"],d:13,s:"A basement wine cave where Georgian winemakers pour natural wines and tell stories about fermentation like poetry",st:"Descend underground. Wine pours. Stories unfold. Georgia\'s liquid history arrives in your glass.",im:"It\'s any evening. A winemaker pours. She tells the story of the grapes. The taste becomes narrative.",t:"Descend underground. Wine pours. Stories unfold. Georgia\'s liquid history arrives in your glass.\",im:\"It\'s any evening. A winemaker pours. She tells the story of the grapes. The taste becomes narrative.\",t:\"Vino/wine bars throughout Old Town. Check local listings. Menus in Georgian (ask English). Cash welcome. Locals know best spots. Intimate.",c:["local_only", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:14,n:"Zurab Tsereteli Art Park",a:"Saburtalo",v:["art", "beautiful", "weird"],d:14,s:"An outdoor sculpture garden where Georgia\'s most prolific artist displays 50-foot-tall figures impossibly",st:"Walk among giants. Stone. Metal. The figures overwhelm. They\'re whimsical and heavy simultaneously.",im:"It\'s 1980s. An artist dreams huge. He builds. Giants appear. The park becomes his obsession.",t:"Walk among giants. Stone. Metal. The figures overwhelm. They\'re whimsical and heavy simultaneously.\",im:\"It\'s 1980s. An artist dreams huge. He builds. Giants appear. The park becomes his obsession.\",t:\"Zurab Tsereteli Museum/Park, Saburtalo district. Entry fee. Multiple installations. Photography excellent. Plan 2–3 hours. Beautiful walkway.",c:["art"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:15,n:"Synagogue Courtyard Hidden History",a:"Sololaki",v:["history", "hidden", "beautiful", "quiet"],d:15,s:"A Jewish community center where centuries of faith remain visible in architecture and quiet spaces",st:"Enter a courtyard. The building surrounds you. Generations worshipped here. The walls remember.",im:"It\'s 500 years. A community builds. They pray. They survive. The building stands unchanged.",t:"Enter a courtyard. The building surrounds you. Generations worshipped here. The walls remember.\",im:\"It\'s 500 years. A community builds. They pray. They survive. The building stands unchanged.\",t:\"Tbilisi Synagogue (Metekhi/Old Town area). Respectful visiting welcome. Prayer times observed. Check hours. Photography sometimes restricted. Cultural site.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:16,n:"Sameba Cathedral Modern Faith",a:"Chugureti",v:["architecture", "beautiful", "history"],d:16,s:"A 21st-century cathedral so massive and modern it looks like Georgia rebuilt itself in stone",st:"Walk inside. The scale shocks. Modern architecture honoring ancient faith. The dome holds sky.",im:"It\'s 1995. Georgia builds after war. They build a cathedral. It says: we survive. We believe. We continue.",t:"Walk inside. The scale shocks. Modern architecture honoring ancient faith. The dome holds sky.\",im:\"It\'s 1995. Georgia builds after war. They build a cathedral. It says: we survive. We believe. We continue.\",t:\"Sameba Cathedral, Chugureti district. Free entry. Respectful dress. Photography varying restrictions. Arrival from metro/taxi. Massive and moving.",c:["architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:17,n:"Sundukiani Street Markets Morning",a:"Chugureti",v:["local", "beautiful", "free"],d:17,s:"A street where vendors sell vegetables, herbs, bread—the daily transaction that holds Georgian life",st:"Early morning. Vendors arrange. Smells. Colors. Locals know everyone. It\'s market as community.",im:"It\'s dawn. A woman arranges herbs. She\'s been here 40 years. Her customers arrive daily. The market is her territory.",t:"Early morning. Vendors arrange. Smells. Colors. Locals know everyone. It\'s market as community.\",im:\"It\'s dawn. A woman arranges herbs. She\'s been here 40 years. Her customers arrive daily. The market is her territory.\",t:\"Sundukiani Street market, Chugureti district. Early morning best (7am–11am). Cash only. Photography ask first. Friendly locals. Very authentic.",c:["local_only", "free"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:18,n:"Printing Press Museum Underground",a:"Sololaki",v:["history", "hidden", "weird"],d:18,s:"A Soviet-era secret printing press hidden underground where dissidents printed truth when the state forbade it",st:"Descend. The machines remain. Paper. Ink. The illegal voice. Underground resistance made physical.",im:"It\'s 1980s. Activists print. Agents search. They hide in darkness. They resist with words.",t:"Descend. The machines remain. Paper. Ink. The illegal voice. Underground resistance made physical.\",im:\"It\'s 1980s. Activists print. Agents search. They hide in darkness. They resist with words.\",t:\"Tbilisi Printing Press Museum, Old Town area. Guided tours required. Book ahead. Limited hours. Photography restricted. Historically intense. Moving.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:19,n:"Avlabari Bridge Street Musicians",a:"Avlabari",v:["local", "beautiful", "music"],d:19,s:"A bridge where street musicians gather and ancient Georgian polyphony echoes under city traffic",st:"Walk across. Sound rises. A cappella singing in traditional style. The voices are earth and spirit fused.",im:"It\'s 2000 years. Georgians sang this way. They sing now. The songs are unbroken.",t:"Walk across. Sound rises. A cappella singing in traditional style. The voices are earth and spirit fused.\",im:\"It\'s 2000 years. Georgians sang this way. They sing now. The songs are unbroken.\",t:\"Avlabari Bridge (near Old Town), year-round musicians. Best evenings. Photography ask before recording. Tips welcomed. Authentic Georgian music.",c:["local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:20,n:"Underground Parking Murals",a:"Vera",v:["street_art", "hidden", "beautiful", "weird"],d:20,s:"A parking garage transformed into an art installation because why should underground be ugly",st:"Drive or walk. Murals cover every space. Color. Pattern. The mundane became sacred.",im:"It\'s 2010s. An artist looked at parking. They thought, no. They painted. The space became gallery.",t:"Drive or walk. Murals cover every space. Color. Pattern. The mundane became sacred.\",im:\"It\'s 2010s. An artist looked at parking. They thought, no. They painted. The space became gallery.\",t:\"Parking garage murals (multiple locations, check local art sites). Free to walk through. Photography excellent. Often evolving. Discovery fun.",c:["street_art"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:21,n:"Wine District Tasting Rooms",a:"Vake",v:["local", "beautiful", "food"],d:21,s:"Rooms where Georgian winemakers offer unlimited tastings and the wine is always personal story",st:"Pour. Taste. Listen. Each wine tells about terroir and family. You taste history in fermentation.",im:"It\'s 8000 years. Georgians invented wine. They ferment in clay. They taste. They continue.",t:"Pour. Taste. Listen. Each wine tells about terroir and family. You taste history in fermentation.\",im:\"It\'s 8000 years. Georgians invented wine. They ferment in clay. They taste. They continue.\",t:\"Wine tasting rooms throughout Vake and Saburtalo. Check local guides. Tastings often free with purchase. Menus in English. Educational staff.",c:["local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:22,n:"Mtkvari River Ferry Path",a:"Avlabari",v:["nature", "hidden", "beautiful"],d:22,s:"A riverside path where ferries still operate and you can walk water\'s edge completely",st:"River runs. Walk beside. Bridges cross. Fishermen rest. The river holds the city in its flow.",im:"It\'s ancient. The river flows. Civilizations rise. The river continues. You walk beside eternity.",t:"River runs. Walk beside. Bridges cross. Fishermen rest. The river holds the city in its flow.\",im:\"It\'s ancient. The river flows. Civilizations rise. The river continues. You walk beside eternity.\",t:\"Mtkvari River paths, multiple access points. Free. Year-round accessible. Best sunrise/sunset. Photography beautiful. Walking pleasant and long.",c:["nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:23,n:"Shardeni Street Old Town Stroll",a:"Sololaki",v:["history", "beautiful", "local"],d:23,s:"A winding street where every corner reveals a cafe, a shop, a balcony, a story centuries deep",st:"Walk slowly. The street is the destination. Architecture surrounds you. Time plays with speed.",im:"It\'s 1800. A merchant walks this street. 1950. A student walks. 2024. You walk. The street is eternal.",t:"Walk slowly. The street is the destination. Architecture surrounds you. Time plays with speed.\",im:\"It\'s 1800. A merchant walks this street. 1950. A student walks. 2024. You walk. The street is eternal.\",t:\"Shardeni Street, Old Town. Pedestrian-only area. Cafés and shops line path. Photography excellent. Respectful of residents. Evening walks romantic.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:24,n:"Chardeni Street Performance Stage",a:"Sololaki",v:["local", "music", "night", "beautiful"],d:24,s:"An informal stage where street musicians and performers appear nightly and the audience is whoever stops",st:"Music happens. People gather. The moment is unplanned. Everyone present becomes part of performance.",im:"It\'s night. A musician arrives. They play. People stop. The moment is theirs. It continues.",t:"Music happens. People gather. The moment is unplanned. Everyone present becomes part of performance.\",im:\"It\'s night. A musician arrives. They play. People stop. The moment is theirs. It continues.\",t:\"Chardeni Street area, Old Town. Evening best (7pm–11pm). Free to listen. Tips appreciated. Photography ask. Authentic performances. Magical.",c:["local_only", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:25,n:"Botanical Garden Hidden Waterfall",a:"Vake",v:["nature", "hidden", "beautiful", "quiet"],d:25,s:"A cascade of water in the garden where you can stand under it and forget Tbilisi exists",st:"Hike deep into the garden. The waterfall appears. Mist. Sound. You\'re transported to wilderness inside city.",im:"It\'s any season. Water falls. A hiker arrives. For a moment, they\'re not in the city. The moment is complete.",t:"Hike deep into the garden. The waterfall appears. Mist. Sound. You\'re transported to wilderness inside city.\",im:\"It\'s any season. Water falls. A hiker arrives. For a moment, they\'re not in the city. The moment is complete.\",t:\"Botanical Garden waterfalls, Vake district. Entry fee. Multiple trails. Waterfall location requires exploration or asking staff. Photography welcome.",c:["nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:26,n:"Peace Bridge Nighttime Glow",a:"Vera",v:["night", "beautiful", "architecture"],d:26,s:"The bridge lights up and transforms from architecture into a luminous organism",st:"Night arrives. Lights activate. The structure glows. It\'s futuristic. It\'s beautiful. It\'s Georgia\'s statement.",im:"It\'s night. The lights appear. Someone sees it for the first time. They stop. The moment changes them.",t:"Night arrives. Lights activate. The structure glows. It\'s futuristic. It\'s beautiful. It\'s Georgia\'s statement.\",im:\"It\'s night. The lights appear. Someone sees it for the first time. They stop. The moment changes them.\",t:\"Peace Bridge, access from either side of river. Best 8pm–midnight. Free. Photography excellent. Brings locals and tourists equally.",c:["architecture", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:27,n:"Tsminda Sameba on Cliff",a:"Mtatsminda",v:["history", "beautiful", "nature"],d:27,s:"An impossible church on a cliff edge where faith and architecture defy gravity",st:"Hike up. The church appears. Stone building on stone cliff. It looks like monks levitated it",im:"It\'s medieval. A monk climbed the mountain. He built here. The building holds 1000 years.",t:"Hike up. The church appears. Stone building on stone cliff. It looks like monks levitated it\",im:\"It\'s medieval. A monk climbed the mountain. He built here. The building holds 1000 years.\",t:\"Tsminda Sameba (near Tbilisi). Requires hiking from Mtatsminda area or guided tour. Strenuous. Photography stunning. Plan full day. Worthwhile.",c:["history_big", "nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:28,n:"Shevchenko Park Intellectual Refuge",a:"Chugureti",v:["quiet", "beautiful", "local", "free"],d:28,s:"A park where intellectuals read and sit and the pace of thought is visible",st:"Benches. Trees. People deep in books or conversation. The park permits slowness. Time expands.",im:"It\'s afternoon. A philosopher sits. They think. The park holds the thought. The space is sacred.",t:"Benches. Trees. People deep in books or conversation. The park permits slowness. Time expands.\",im:\"It\'s afternoon. A philosopher sits. They think. The park holds the thought. The space is sacred.\",t:\"Shevchenko Park, Chugureti district. Free entry. Benches throughout. Peaceful mornings best. Photography respectful. Very intellectual atmosphere.",c:["quiet", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:29,n:"Abanotubani Courtyard Life",a:"Abanotubani",v:["history", "hidden", "beautiful", "local"],d:29,s:"Between the baths, courtyards where families live and the old Tbilisi tradition persists unchanged",st:"Walk the narrow ways. Locals know. Courtyards open. Kids play. The old city continues in these spaces.",im:"It\'s 1900. A family lives here. 2024. Their descendants live the same life. Continuity unbroken.",t:"Walk the narrow ways. Locals know. Courtyards open. Kids play. The old city continues in these spaces.\",im:\"It\'s 1900. A family lives here. 2024. Their descendants live the same life. Continuity unbroken.\",t:\"Abanotubani courtyards, hidden in old bath district. Walk respectfully. Photography ask residents. Very authentic. Few tourists venture here.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:30,n:"Metromet Soviet Design",a:"Vera",v:["architecture", "history", "beautiful"],d:30,s:"A subway system where stations are underground galleries and every platform is retro-futuristic art",st:"Ride the metro. Each station distinct. Mosaics. Lights. Soviet optimism frozen in tile and concrete.",im:"It\'s 1960s. Engineers build the metro. They dream of the future. The metro carries that dream still.",t:"Ride the metro. Each station distinct. Mosaics. Lights. Soviet optimism frozen in tile and concrete.\",im:\"It\'s 1960s. Engineers build the metro. They dream of the future. The metro carries that dream still.\",t:\"Tbilisi Metro system, start at Metekhi station. Travel line exploring architecture. Entry fee nominal. Underground galleries. Photography allowed.",c:["architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:31,n:"Narsari Park Book Readings",a:"Saburtalo",v:["local", "quiet", "beautiful"],d:31,s:"A literary park where Georgian authors sometimes read and the audience is fellow lovers of words",st:"Sit. Listen. Words arrive. The park focuses on language. It\'s community of imagination.",im:"It\'s evening. A poet reads. People listen deeply. Words move through air. Language becomes prayer.",t:"Sit. Listen. Words arrive. The park focuses on language. It\'s community of imagination.\",im:\"It\'s evening. A poet reads. People listen deeply. Words move through air. Language becomes prayer.\",t:\"Narsari Park, Saburtalo district. Check cultural calendar for readings. Free to attend. Bring cushion for seating. Georgian language often, sometimes English.",c:["local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:32,n:"Old Silk Road Bazaar Traces",a:"Sololaki",v:["history", "hidden", "beautiful"],d:32,s:"Streets that still follow the ancient trade routes where merchants once exchanged ideas and spices",st:"Walk the pattern. Feel the history. These streets are centuries of commerce compressed into stone.",im:"It\'s 1000 AD. A merchant arrives with spices. Cloth. Ideas. The city grows around trade.",t:"Walk the pattern. Feel the history. These streets are centuries of commerce compressed into stone.\",im:\"It\'s 1000 AD. A merchant arrives with spices. Cloth. Ideas. The city grows around trade.\",t:\"Old Town lanes (Shardeni, Metekhi area). Walk aimlessly following geometry. History guides your feet. No tour needed. Discovery organic.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:33,n:"Tsinandali Wine Cellars",a:"Saburtalo",v:["history", "local", "food"],d:33,s:"A historical wine-producing district where traditional clay vessels (qvevri) ferment wine unchanged for millennia",st:"Tour available. See ancient methods. Taste wine born from earth and patience. Tradition made liquid.",im:"It\'s 8000 years. A Georgian buries clay. It holds fermented wine. The method continues unbroken.",t:"Tour available. See ancient methods. Taste wine born from earth and patience. Tradition made liquid.\",im:\"It\'s 8000 years. A Georgian buries clay. It holds fermented wine. The method continues unbroken.\",t:\"Tsinandali region (outside Tbilisi, day trip possible). Tours available. Wine tastings included. Pottery museum. Photography excellent. Educational.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:34,n:"Metekhi Square Morning Animation",a:"Sololaki",v:["local", "beautiful", "free"],d:34,s:"A town square that awakens daily with vendors, musicians, pilgrims making it the city\'s heartbeat",st:"Morning arrives. The square populates. Energy rises. Locals meet. Tourists blend in. The city announces itself.",im:"It\'s dawn. The square stirs. Merchants arrive. Musicians tune. A new day begins in the same spot.",t:"Morning arrives. The square populates. Energy rises. Locals meet. Tourists blend in. The city announces itself.\",im:\"It\'s dawn. The square stirs. Merchants arrive. Musicians tune. A new day begins in the same spot.\",t:\"Metekhi Square, Old Town center. Year-round accessible. Morning energy best (7am–10am). Photography free. Sitting welcome. Cafés surround.",c:["local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:35,n:"Abchazi Street Soviet Nostalgia",a:"Vera",v:["history", "hidden", "weird", "local"],d:35,s:"A street lined with shops selling Soviet memorabilia where the past is merchandise and memory",st:"Walk. Find pins. Uniforms. Posters. The Cold War became collectible. People hunt nostalgia.",im:"It\'s 1990. The Soviet Union falls. What remains? Objects. Stories. A street sells them.",t:"Walk. Find pins. Uniforms. Posters. The Cold War became collectible. People hunt nostalgia.\",im:\"It\'s 1990. The Soviet Union falls. What remains? Objects. Stories. A street sells them.\",t:\"Abchazi Street, Vera district. Shop hours vary. Cash preferred. Photography often allowed. Vendors enjoy stories. Unique souvenirs. Local character.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:36,n:"Sulkhan-Saba Monastery Ridge Trail",a:"Nadzaladevi",v:["history", "nature", "beautiful"],d:36,s:"A monastery perched on a ridge where monks once copied manuscripts and now silence speaks",st:"Hike to the monastery. The stone appears. Ancient. Monks built here facing the gods. The space sanctifies.",im:"It\'s 500 AD. A monk climbs to build. Isolation calls him. He builds toward heaven.",t:"Hike to the monastery. The stone appears. Ancient. Monks built here facing the gods. The space sanctifies.\",im:\"It\'s 500 AD. A monk climbs to build. Isolation calls him. He builds toward heaven.\",t:\"Sulkhan-Saba Monastery, outside Tbilisi (requires hiking or guided tour). Accessible from Nadzaladevi area. Photography respectful. Plan 4–6 hours.",c:["history_big", "nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:37,n:"Didube Market Chaos",a:"Didube",v:["local", "weird", "beautiful", "free"],d:37,s:"A sprawling marketplace where anything appears and everything negotiates and the real Tbilisi breathes",st:"Enter the market. Chaos. Colors. Smells. People buying. Selling. Trading. It\'s unfiltered reality.",im:"It\'s daily. The market appears. Trade happens. Human commerce in its purest form. Needs meet wants.",t:"Enter the market. Chaos. Colors. Smells. People buying. Selling. Trading. It\'s unfiltered reality.\",im:\"It\'s daily. The market appears. Trade happens. Human commerce in its purest form. Needs meet wants.\",t:\"Didube Market, Didube district. Morning-afternoon best (8am–2pm). Cash only. Haggling expected. Photography ask. Very authentic. Crowded.",c:["local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:38,n:"Sioni Bath House Privacy",a:"Abanotubani",v:["hidden", "local", "quiet", "weird"],d:38,s:"A private bath where you rent the space and the sulfur water becomes your private ritual",st:"Enter alone. Soak. The heat envelops. You\'re cleansed. Private bathing tradition survives.",im:"It\'s centuries. A person bathes alone. The water heals. The ritual continues in isolation.",t:"Enter alone. Soak. The heat envelops. You\'re cleansed. Private bathing tradition survives.\",im:\"It\'s centuries. A person bathes alone. The water heals. The ritual continues in isolation.\",t:\"Abanotubani private bath houses, multiple options. Entrance fee reasonable. Book ahead for specific times. Towels provided. Photography prohibited.",c:["local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:39,n:"Gonio Fortress Riverside",a:"Didube",v:["history", "nature", "beautiful"],d:39,s:"An ancient fortress where wars were won and now the river flows past indifferent to history",st:"Walk the fortress walls. The river defines strategy. Stone holds memory. Nature continues unchanged.",im:"It\'s 1500. Soldiers hold the walls. The river flows. Now it all persists in peaceful stalemate.",t:"Walk the fortress walls. The river defines strategy. Stone holds memory. Nature continues unchanged.\",im:\"It\'s 1500. Soldiers hold the walls. The river flows. Now it all persists in peaceful stalemate.\",t:\"Gonio Fortress (outside Tbilisi, requires day trip south). Tours available. Photography permitted. Riverside walks beautiful. Historical significance deep.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:40,n:"Sioni Street After-Hours Clubs",a:"Sololaki",v:["night", "local", "weird", "hidden"],d:40,s:"A street where illegal clubs open after midnight and the underground dance culture pulses",st:"Night falls. Doors open. Music. People. The underground claims space. It\'s democracy of the darkness.",im:"It\'s night. A DJ arrives. Music begins. An underground community claims space for itself.",t:"Night falls. Doors open. Music. People. The underground claims space. It\'s democracy of the darkness.\",im:\"It\'s night. A DJ arrives. Music begins. An underground community claims space for itself.\",t:\"Sioni Street area, Old Town. Evening/night exploration. Underground venues (check locals for current spots). Photography often prohibited. Respect venue rules.",c:["night", "local_only"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:41,n:"Narikala Cable Car Views",a:"Sololaki",v:["beautiful", "nature", "quiet"],d:41,s:"A cable car ascending to the fortress where the city reveals itself panel by panel",st:"Ride up. The view unfolds. Fortress grows. The city shrinks below. Perspective shifts with altitude.",im:"It\'s any time. Someone rides the cable car. Halfway, they understand: they\'re moving between worlds.",t:"Ride up. The view unfolds. Fortress grows. The city shrinks below. Perspective shifts with altitude.\",im:\"It\'s any time. Someone rides the cable car. Halfway, they understand: they\'re moving between worlds.\",t:\"Narikala cable car, operates from Old Town area. Short ride (3 mins). Affordable. Fortress access at top. Multiple ascent/descent options.",c:["nature", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:42,n:"Avchala Copper Monastery Ridgetop",a:"Nadzaladevi",v:["history", "beautiful", "quiet", "nature"],d:42,s:"A monastery on a ridge with copper dome that glints sun and where monks built at the world\'s edge",st:"Hike to the top. The monastery appears. Copper gleams. The view stretches to mountains. Faith met landscape.",im:"It\'s medieval. A monk places copper on the dome. The sun hits. The signal goes to the valley below.",t:"Hike to the top. The monastery appears. Copper gleams. The view stretches to mountains. Faith met landscape.\",im:\"It\'s medieval. A monk places copper on the dome. The sun hits. The signal goes to the valley below.\",t:\"Avchala Monastery, accessible from Nadzaladevi/hiking area. Requires effort. Photography stunning from vantage. Peaceful monastery space. Remote.",c:["history_big", "nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:43,n:"Vernissage Soviet Sculpture Park",a:"Vera",v:["history", "art", "weird", "beautiful"],d:43,s:"An outdoor museum where Soviet sculptures stand like monuments to a world that vanished",st:"Walk among statues. Ideology frozen in bronze. The sculptures ask questions about permanence and change.",im:"It\'s 1960. A sculptor creates. The state approves. Now the statue stands orphaned. It asks what it meant.",t:"Walk among statues. Ideology frozen in bronze. The sculptures ask questions about permanence and change.\",im:\"It\'s 1960. A sculptor creates. The state approves. Now the statue stands orphaned. It asks what it meant.\",t:\"Vernissage Art Market (former sculpture park), Vera district. Multiple locations. Some sculptures relocated. Check current locations. Photography free. Moving.",c:["art", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:44,n:"Batoni Street Craftspeople\'s Alleys",a:"Sololaki",v:["local", "hidden", "beautiful"],d:44,s:"Side streets where craftspeople have worked for generations in spaces that time forgot",st:"Walk the alleys. Smell wood and metal. Watch makers at work. The trades are visible and alive.",im:"It\'s 1800. A craftsman establishes his shop. 2024. His descendant works the same trade. Continuity breathes.",t:"Walk the alleys. Smell wood and metal. Watch makers at work. The trades are visible and alive.\",im:\"It\'s 1800. A craftsman establishes his shop. 2024. His descendant works the same trade. Continuity breathes.\",t:\"Batoni Street area and adjacent alleys, Old Town. Walk slowly. Respect working artists. Photography ask first. Very authentic. Few tourists.",c:["local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:45,n:"Metekhi Bridge Evening Congregation",a:"Sololaki",v:["local", "beautiful", "night", "free"],d:45,s:"A bridge where locals gather at dusk and the city\'s energy transfers to human gathering",st:"Bridge fills with people. Locals. Musicians. Vendors. Evening happens here. It\'s free theater.",im:"It\'s dusk. People arrive. The bridge becomes stage. The city watches itself.",t:"Bridge fills with people. Locals. Musicians. Vendors. Evening happens here. It\'s free theater.\",im:\"It\'s dusk. People arrive. The bridge becomes stage. The city watches itself.\",t:\"Metekhi Bridge (road bridge), Old Town. Year-round gathering. Best 6pm–9pm. Free. Sitting available. Photography candid allowed. Social energy high.",c:["local_only", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:46,n:"Vake Park Tai Chi Dawn",a:"Vake",v:["local", "quiet", "nature", "beautiful"],d:46,s:"A park where elderly locals move through tai chi as the city wakes beneath them",st:"Dawn. Practitioners arrive. Slow movement. Breath. The park becomes meditation. New day begins centered.",im:"It\'s 5am. Practitioners move like water. The city stirs. Two rituals occur simultaneously.",t:"Dawn. Practitioners arrive. Slow movement. Breath. The park becomes meditation. New day begins centered.\",im:\"It\'s 5am. Practitioners move like water. The city stirs. Two rituals occur simultaneously.\",t:\"Vake Park, various morning hours. Best 6am–7am. Free to observe. Join if welcome by group. Photography respectful. Meditative energy.",c:["nature", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:47,n:"Mtkvari River Island Summer Swimming",a:"Avlabari",v:["nature", "local", "beautiful", "free"],d:47,s:"A summer swimming spot where locals dive from rocks and the river becomes public space",st:"River access points. Swimmers. Heat breaking. It\'s refreshment and community fused.",im:"It\'s summer. Heat rises. Someone jumps. Others follow. The river claims humans temporarily.",t:"River access points. Swimmers. Heat breaking. It\'s refreshment and community fused.\",im:\"It\'s summer. Heat rises. Someone jumps. Others follow. The river claims humans temporarily.\",t:\"Mtkvari River swimming areas (Avlabari and Vera districts). Summer season June–Aug best. Free. Check current safety status. Photography casual.",c:["nature", "free"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:48,n:"Mtatsminda Theater History",a:"Mtatsminda",v:["history", "hidden", "beautiful"],d:48,s:"An old open-air theater on a hillside where Georgian plays performed to starlit audiences for decades",st:"The stage remains. Seats overlook the city. Performance memories linger. It\'s poetry waiting to restart.",im:"It\'s 1950s. The stage glows. The city below watches. Theater and landscape merge.",t:"The stage remains. Seats overlook the city. Performance memories linger. It\'s poetry waiting to restart.\",im:\"It\'s 1950s. The stage glows. The city below watches. Theater and landscape merge.\",t:\"Mtatsminda theater area (check current restoration status). Hillside location stunning. Photography excellent. Sometimes operational. Check local calendar.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:49,n:"Saburtalo Green Spaces Refuge",a:"Saburtalo",v:["nature", "quiet", "beautiful", "free"],d:49,s:"A residential neighborhood with unexpected parks where families claim green space as their own",st:"Walk between buildings. Parks appear. Trees. Playgrounds. The neighborhood refuses to be urban entirely.",im:"It\'s any season. A parent brings a child. The park receives them. The green space heals.",t:"Walk between buildings. Parks appear. Trees. Playgrounds. The neighborhood refuses to be urban entirely.\",im:\"It\'s any season. A parent brings a child. The park receives them. The green space heals.\",t:\"Saburtalo parks (multiple locations), residential walkway comfortable. Free. Weekday mornings quietest. Photography casual. Peaceful neighborhood feel.",c:["nature", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:50,n:"Chardeni Street Musician Apprentices",a:"Sololaki",v:["local", "music", "beautiful"],d:50,s:"Where young musicians learn from street masters and the trade passes through performance",st:"A musician plays. A student watches. Learning happens in public. Tradition travels through sound.",im:"It\'s any evening. A master plays. A student absorbs. The music continues when the master rests.",t:"A musician plays. A student watches. Learning happens in public. Tradition travels through sound.\",im:\"It\'s any evening. A master plays. A student absorbs. The music continues when the master rests.\",t:\"Chardeni Street, Old Town. Evening performances (6pm–11pm). Photography with permission. Tips appreciated. Authentic Georgian music. Generational passing.",c:["local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:51,n:"Botanical Garden Evening Walk",a:"Vake",v:["nature", "quiet", "beautiful"],d:51,s:"When the garden transitions to night and light catches leaf and flower differently",st:"Walk as dusk arrives. The garden transforms. Colors deepen. Sounds shift. It\'s the same place made new.",im:"It\'s dusk. Shadows lengthen. The garden becomes mystery. Day visitors leave. The space breathes differently.",t:"Walk as dusk arrives. The garden transforms. Colors deepen. Sounds shift. It\'s the same place made new.\",im:\"It\'s dusk. Shadows lengthen. The garden becomes mystery. Day visitors leave. The space breathes differently.\",t:\"Botanical Garden, evening entry available. June–Sept best for extended twilight. Entry fee. Photography magical. Paths well-maintained. Very peaceful.",c:["nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:52,n:"Abanotubani Minaret Call to Prayer",a:"Abanotubani",v:["history", "quiet", "beautiful"],d:52,s:"Ablution fountain and mosque where call to prayer echoes between baths and fortress walls",st:"Stand nearby. The sound rises. History layers. Faiths coexist. The call sanctifies the air.",im:"It\'s centuries. The call sounds. Muslims pray. Georgians bathe. The city holds all.",t:"Stand nearby. The sound rises. History layers. Faiths coexist. The call sanctifies the air.\",im:\"It\'s centuries. The call sounds. Muslims pray. Georgians bathe. The city holds all.\",t:\"Metekhi Mosque/minaret area, Abanotubani district. Respectful viewing allowed. Prayer times observed. Photography respectful. Open to visitors. Peaceful.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:53,n:"Nardvani Street Beer Culture",a:"Vera",v:["local", "night", "weird", "beautiful"],d:53,s:"A street where beer bars crowd and locals celebrate small victories and friendship over Georgian beer",st:"Enter a bar. People gather. Beer flows. Laughter. It\'s working-class joy in amber liquid.",im:"It\'s evening. A worker sits. The day\'s labor done. Beer arrives. The moment is his.",t:"Enter a bar. People gather. Beer flows. Laughter. It\'s working-class joy in amber liquid.\",im:\"It\'s evening. A worker sits. The day\'s labor done. Beer arrives. The moment is his.\",t:\"Nardvani Street area, Vera district. Evening-night best (7pm–11pm). Multiple bars/cafés. Cash welcome. Photography casual. Authentic local hangout.",c:["local_only", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:54,n:"Tsminda Sameba Sunset View",a:"Mtatsminda",v:["beautiful", "nature", "quiet"],d:54,s:"A peak where sunset paints the landscape and Georgia reveals itself in color and scale",st:"Climb to viewpoint. Sun descends. Mountains glow. The scale of beauty becomes apparent.",im:"It\'s sunset. The light arrives. For 20 minutes, the world is fire and gold. Then it fades.",t:"Climb to viewpoint. Sun descends. Mountains glow. The scale of beauty becomes apparent.\",im:\"It\'s sunset. The light arrives. For 20 minutes, the world is fire and gold. Then it fades.\",t:\"Tsminda Sameba viewpoint (requires hiking or guided tour). Best clear evenings. Plan 4–6 hours total trip. Photography extraordinary. Worthwhile journey.",c:["nature", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:55,n:"Old Town Nightfall Transformation",a:"Sololaki",v:["beautiful", "night", "history", "quiet"],d:55,s:"When stone streets empty and lights reveal architecture and shadows tell stories the day hid",st:"Walk after 10pm. The crowds vanish. Stone glows. You hear footsteps echo centuries. It\'s medieval.",im:"It\'s night. The modern city sleeps. The old city awakens. Two Tbilisis exist in the same space.",t:"Walk after 10pm. The crowds vanish. Stone glows. You hear footsteps echo centuries. It\'s medieval.\",im:\"It\'s night. The modern city sleeps. The old city awakens. Two Tbilisis exist in the same space.\",t:\"Old Town (Sololaki), night walking after 10pm. Safe walks on main streets. Photography magical. Nightfall 8pm–10pm depending on season. Romantic.",c:["history_big", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:56,n:"Narikala Fortress Sunset Throne",a:"Old Town",v:["history", "beautiful", "high_spots"],d:56,s:"Ancient fortress walls where you sit above the city as it turns golden",st:"Climb to the top. The Mtkvari River winds below. Old Town glows. Modern Tbilisi across it. You\'re between eras.",im:"It\'s 4th century. A warrior stands here, defending. Now you stand, watching empires fall in real time.",t:"Climb to the top. The Mtkvari River winds below. Old Town glows. Modern Tbilisi across it. You\'re between eras.\",im:\"It\'s 4th century. A warrior stands here, defending. Now you stand, watching empires fall in real time.\",t:\"Old Town, walk up to fortress. €3 entry. Best hour before sunset. Bring water, camera. Narrow stairs.",c:["history_big", "high_spots"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:57,n:"Abanotubani Sulfur Bath Night Ritual",a:"Old Town",v:["weird", "hidden", "night"],d:57,s:"Ancient sulfur pools where locals soak at midnight—it feels like ancient Rome",st:"Stone-built baths from the 1400s. Steaming water. Locals strip. No tourists. It\'s 500 years of ritual in one evening.",im:"It\'s midnight. You descend stone steps into steam. Locals nod. You\'re in a time machine made of sulfur.",t:"Stone-built baths from the 1400s. Steaming water. Locals strip. No tourists. It\'s 500 years of ritual in one evening.\",im:\"It\'s midnight. You descend stone steps into steam. Locals nod. You\'re in a time machine made of sulfur.\",t:\"Abanotubani district, Old Town. €3–5 per bath. Go after 10pm for locals only. Bring swimsuit. Pure Georgian culture.",c:["history_big", "night", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:58,n:"Mtatsminda Park Cable Car to Panorama",a:"Mtatsminda",v:["beautiful", "high_spots", "night"],d:58,s:"Cable car climbs a mountain; at the top, a small amusement park and sweeping city views",st:"You float in a cable car above the city. At the summit: a Ferris wheel, old rides, Tbilisi glowing below.",im:"It\'s dusk. The cable car creaks upward. The city shrinks. You rise above it all, a bird for five minutes.",t:"You float in a cable car above the city. At the summit: a Ferris wheel, old rides, Tbilisi glowing below.\",im:\"It\'s dusk. The cable car creaks upward. The city shrinks. You rise above it all, a bird for five minutes.\",t:\"Cable car at Metekhi Church base. €1 up, €1 down (or €1.50 both). Park open evenings. Ferris wheel €2.",c:["high_spots", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:59,n:"Jvari Monastery Cliffside Prayer",a:"Mtskheta",v:["history", "beautiful", "quiet"],d:59,s:"Church perched on a cliff overlooking where two rivers meet—5th century faith carved into stone",st:"Marshrutka from Tbilisi (20 min). Climb stone stairs. A church on a peak. Wind. Prayer. The confluence of rivers below.",im:"It\'s 500 AD. Monks build this on a cliff edge. Now pilgrims hike. The rivers still merge below. Time loops.",t:"Marshrutka from Tbilisi (20 min). Climb stone stairs. A church on a peak. Wind. Prayer. The confluence of rivers below.\",im:\"It\'s 500 AD. Monks build this on a cliff edge. Now pilgrims hike. The rivers still merge below. Time loops.\",t:\"Marshrutka from metro (1 Lari, ~€0.35). Climb 45 min or take minibus partway. Entry free. Bring water.",c:["history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:60,n:"Turtle Lake Cable Car Summer Swim",a:"Turtle Lake",v:["nature", "hidden", "beautiful"],d:60,s:"Alpine lake in the mountains above Tbilisi where cable car deposits you for lakeside swimming",st:"Float in a creaking cable car above pines. Land at a mountain lake. Swim. Eat khachapuri. Return to the city below.",im:"It\'s July. You\'re in a cable car rising through clouds. Breaking through: an alpine lake, impossible in Georgia.",t:"Float in a creaking cable car above pines. Land at a mountain lake. Swim. Eat khachapuri. Return to the city below.\",im:\"It\'s July. You\'re in a cable car rising through clouds. Breaking through: an alpine lake, impossible in Georgia.\",t:\"Cable car from terminal. €1 return. Lake has restaurants. Summers only really. Bring swimsuit.",c:["nature", "parks"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:61,n:"Metekhi Church Horse Guardian",a:"Old Town",v:["history", "beautiful", "quiet"],d:61,s:"Statue of a Georgian warrior on horseback overlooking the river—ancient legend in bronze",st:"A rider on a horse looks out at the city. At its feet, the Mtkvari flows. It\'s been here since 1947 but feels ancient.",im:"It\'s the 1600s. A warrior rides this exact path. Now his bronze double watches over his city.",t:"A rider on a horse looks out at the city. At its feet, the Mtkvari flows. It\'s been here since 1947 but feels ancient.\",im:\"It\'s the 1600s. A warrior rides this exact path. Now his bronze double watches over his city.\",t:\"Metekhi Square, Old Town. Free. Church inside (€1 donation). Excellent photo spot. Cable car base nearby.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:62,n:"Rike Park Hidden River Beaches",a:"Rike",v:["nature", "hidden", "free"],d:62,s:"Small parks along the Mtkvari where locals sit on river rocks and watch bridges glow",st:"The river runs green. You sit on stones. The Peace Bridge glows at night. Modern Tbilisi hums above.",im:"It\'s evening. You\'re on a rock in a river in a capital city. People above walk past. You\'re hidden by water.",t:"The river runs green. You sit on stones. The Peace Bridge glows at night. Modern Tbilisi hums above.\",im:\"It\'s evening. You\'re on a rock in a river in a capital city. People above walk past. You\'re hidden by water.\",t:\"Rike Park, along Mtkvari River. Free. Accessible from Old Town. Best at dusk. Bring snacks.",c:["parks", "romantic_water", "free"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:63,n:"Betlemi Church Hilltop Bells",a:"Betlemi",v:["history", "beautiful", "quiet"],d:63,s:"Small monastery on a hill where bells ring and clouds part—monastery mystery play",st:"Climb to a tiny church. The city spreads below. Bells ring on the hour. Monks. Pigeons. A moment outside time.",im:"It\'s 1000 AD. A monk rings the bell. The call echoes across valleys. Now the same bell rings. History repeats.",t:"Climb to a tiny church. The city spreads below. Bells ring on the hour. Monks. Pigeons. A moment outside time.\",im:\"It\'s 1000 AD. A monk rings the bell. The call echoes across valleys. Now the same bell rings. History repeats.\",t:\"Betlemi area, accessible by metro or taxi (€1–2). Climb is steep. Church open mornings. Bring respect.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:64,n:"Dedaena Park Free Concert Evenings",a:"Dedaena",v:["free", "night", "beautiful"],d:64,s:"Park where free concerts happen in summer—locals gather on grass for free music",st:"Summer evenings. Local musicians. Tbilisi families spread blankets. No tickets. Wine. Music. Community.",im:"It\'s summer. A woman plays guitar. Strangers become neighbors for an evening. Art requires no payment.",t:"Summer evenings. Local musicians. Tbilisi families spread blankets. No tickets. Wine. Music. Community.\",im:\"It\'s summer. A woman plays guitar. Strangers become neighbors for an evening. Art requires no payment.\",t:\"Dedaena Park. Free entry and performances (roughly June–August). Check schedule ahead. Bring blanket.",c:["free_museum", "night", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:65,n:"Sioni Cathedral Wine Cellar History",a:"Old Town",v:["history", "weird", "hidden"],d:65,s:"Cathedral with ancient wine cellars beneath where Georgians stored sacred wines",st:"Stone church. Inside: ancient cellars. Wine has been made here for 1500 years below the prayers above.",im:"It\'s 500 AD. A monk pours wine. The same cellar, the same ritual, continues now. Wine as prayer.",t:"Stone church. Inside: ancient cellars. Wine has been made here for 1500 years below the prayers above.\",im:\"It\'s 500 AD. A monk pours wine. The same cellar, the same ritual, continues now. Wine as prayer.\",t:\"Sioni Cathedral, Old Town. €2 entry. Cellar tours available. Bring cash. Learn Georgia\'s wine soul.",c:["history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:66,n:"Marjanishvili Street Art Walking Museum",a:"Marjanishvili",v:["street_art", "beautiful", "local"],d:66,s:"Soviet-era avenue where street artists have transformed gray buildings into an open-air museum",st:"Wide avenue. Communist-era gray concrete blocks. Now covered in murals. Art over history. Progress visible.",im:"It\'s 1985. Gray blocks. Soviet soldiers. Now young artists paint dreams on these same walls. Transformation visible.",t:"Wide avenue. Communist-era gray concrete blocks. Now covered in murals. Art over history. Progress visible.\",im:\"It\'s 1985. Gray blocks. Soviet soldiers. Now young artists paint dreams on these same walls. Transformation visible.\",t:\"Marjanishvili area. Free to walk. Metro-accessible. Photography-friendly. Best on weekdays.",c:["street_art", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:67,n:"Vera District Warehouse Art Scene",a:"Vera",v:["street_art", "weird", "hidden"],d:67,s:"Industrial warehouses in a gritty district where underground artists make magic",st:"Warehouses tagged top-to-bottom. Artists paint openly. Experimental. No rules. It\'s Tbilisi\'s real creative heart.",im:"It\'s night. A crew spray-paints a phoenix. Police don\'t come. It\'s the space where art happens before galleries.",t:"Warehouses tagged top-to-bottom. Artists paint openly. Experimental. No rules. It\'s Tbilisi\'s real creative heart.\",im:\"It\'s night. A crew spray-paints a phoenix. Police don\'t come. It\'s the space where art happens before galleries.\",t:\"Vera district (northeast of center). Free to explore. Go during daylight first time. Instagram paradise.",c:["street_art", "weird", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:68,n:"Sundial Tower Ancient Astronomy",a:"Old Town",v:["history", "weird", "hidden"],d:68,s:"Medieval tower with a functioning sundial—proof Georgians understood sky science in the 1600s",st:"A tower. Shadows tell time. Carved centuries ago. No electricity. Still works. Medieval tech.",im:"It\'s 1650. An astronomer sets the dial. Clouds move. Shadows shift. The sun\'s language, decoded.",t:"A tower. Shadows tell time. Carved centuries ago. No electricity. Still works. Medieval tech.\",im:\"It\'s 1650. An astronomer sets the dial. Clouds move. Shadows shift. The sun\'s language, decoded.\",t:\"Old Town, Metekhi area. Free to view. Small, easy to miss. Go midday to see shadow movements.",c:["history_big", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:69,n:"Botanical Garden Waterfall Tea Ceremony",a:"Botanical",v:["nature", "beautiful", "quiet"],d:69,s:"Garden with a 50-meter waterfall where locals make tea on rocks by the cascade",st:"Descend into green. The waterfall roars. Locals boil water on portable stoves. Tea ceremony by nature.",im:"It\'s ancient time. A traveler finds water. Now you do the same, sipping tea by a cascade.",t:"Descend into green. The waterfall roars. Locals boil water on portable stoves. Tea ceremony by nature.\",im:\"It\'s ancient time. A traveler finds water. Now you do the same, sipping tea by a cascade.\",t:\"Botanical Garden south of city (taxi €2–3 or minibus). €1.50 entry. Bring money for tea/snacks.",c:["nature", "parks", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:70,n:"Caravan Serai Silk Road Ghost",a:"Old Town",v:["history", "weird", "scary"],d:70,s:"Medieval trading post where Silk Road merchants once slept—ruins with merchant stories",st:"Stone building. Carved doorways. Merchants from Persia, China, India slept here. Now ghosts and tourists.",im:"It\'s 1500. A Persian merchant trades silk for spices. Now their dust settles here, invisible trade.",t:"Stone building. Carved doorways. Merchants from Persia, China, India slept here. Now ghosts and tourists.\",im:\"It\'s 1500. A Persian merchant trades silk for spices. Now their dust settles here, invisible trade.\",t:\"Old Town near Metekhi. Free to view exterior, small museum inside (€1–2). Ancient energy.",c:["history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:71,n:"April 9 Memorial Park Quiet Respect",a:"Vake",v:["history", "quiet", "scary"],d:71,s:"Park dedicated to 1989 Soviet massacre—a solemn space that holds an entire nation\'s pain",st:"A quiet space. Names of the dead. Flowers. It\'s 1989 when Soviet tanks crushed a peaceful march. Memory lives here.",im:"It\'s April 9, 1989. Tanks roll through Tbilisi. A mother weeps. Now that mother\'s flowers sit in this park.",t:"A quiet space. Names of the dead. Flowers. It\'s 1989 when Soviet tanks crushed a peaceful march. Memory lives here.\",im:\"It\'s April 9, 1989. Tanks roll through Tbilisi. A mother weeps. Now that mother\'s flowers sit in this park.\",t:\"April 9 Park, downtown. Free. Always open. Respectful silence required. Flowers often fresh.",c:["history_big", "scary"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:72,n:"Fabrika Hostel Artist Collective",a:"Fabrika",v:["street_art", "weird", "local"],d:72,s:"Hostel-turned-art-hub where street artists and musicians collide in a Soviet factory",st:"Soviet textile factory converted. Now: street art, live music, theater, artist studios. Chaos and genius.",im:"It\'s 1980. Looms spin cloth. Now artists spray walls. Same building, different dreams.",t:"Soviet textile factory converted. Now: street art, live music, theater, artist studios. Chaos and genius.\",im:\"It\'s 1980. Looms spin cloth. Now artists spray walls. Same building, different dreams.\",t:\"Fabrika area. Free to wander (hostel guests get more access). Cafes on-site. Check event calendar. Bring creativity.",c:["street_art", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:73,n:"Sameba Cathedral White Stone Beacon",a:"Sameba",v:["history", "beautiful", "quiet"],d:73,s:"Modern cathedral in white stone (built 1995) that dominates the skyline—new faith monument",st:"Huge. White. Gold domes. Built by hand by believers. It\'s post-Soviet faith made visible. Inside: incense and prayer.",im:"It\'s 1990. Georgians decide to rebuild faith. Stone by stone, this cathedral rises. A nation prays itself back.",t:"Huge. White. Gold domes. Built by hand by believers. It\'s post-Soviet faith made visible. Inside: incense and prayer.\",im:\"It\'s 1990. Georgians decide to rebuild faith. Stone by stone, this cathedral rises. A nation prays itself back.\",t:\"Sameba Cathedral area. Free entry. Modest dress required. Incense thick. Open daily. Metro-accessible.",c:["history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:74,n:"Shardeni Street Wine Bar Cellar Scene",a:"Old Town",v:["local", "hidden", "night"],d:74,s:"Tiny wine bar in Old Town where locals drink natural wine in a 400-year-old basement",st:"Stone stairs descend. Candlelight. Georgian wine from tiny producers. No tourists know about this.",im:"It\'s 1600. A merchant stores wine. Now you drink it, tasting centuries of care.",t:"Stone stairs descend. Candlelight. Georgian wine from tiny producers. No tourists know about this.\",im:\"It\'s 1600. A merchant stores wine. Now you drink it, tasting centuries of care.\",t:\"Old Town, Shardeni street area. Small venue (€3–5 per glass). Go evenings. Ask locals for the hidden entrance.",c:["local_only", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:75,n:"Cavalry Hill Equestrian Monument",a:"Freedom Square",v:["history", "beautiful", "high_spots"],d:75,s:"Bronze statue of a warrior on horseback riding toward freedom—independence symbol",st:"A rider charges upward forever. Sword raised. It\'s Georgia\'s hope in bronze. Best lit at night.",im:"It\'s 1991. Georgia breaks free from Soviet grip. This rider charges. Now it\'s lit for all to see.",t:"A rider charges upward forever. Sword raised. It\'s Georgia\'s hope in bronze. Best lit at night.\",im:\"It\'s 1991. Georgia breaks free from Soviet grip. This rider charges. Now it\'s lit for all to see.\",t:\"Freedom Square area. Free. Best at dusk when lit. Photo spot. Nearby cafes for wind-down.",c:["history_big", "high_spots"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:76,n:"Kinoteatri Secret Theater Tunnel",a:"Downtown",v:["hidden", "weird", "architecture"],d:76,s:"Old Soviet cinema where underground passages connect to other buildings—maze-like history",st:"1950s cinema. Underground tunnels below. Originally Soviet propaganda theater. Now an art space with secret routes.",im:"It\'s 1960. Propaganda films flicker. Now artists reclaim these tunnels. Hidden history under streets.",t:"1950s cinema. Underground tunnels below. Originally Soviet propaganda theater. Now an art space with secret routes.\",im:\"It\'s 1960. Propaganda films flicker. Now artists reclaim these tunnels. Hidden history under streets.\",t:\"Downtown area. Check online for events. Tours sporadic. €2–3 admission. Very cool architecture.",c:["architecture", "weird", "history_big"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:77,n:"Sulphur Bath House \'Abanotubani\' Public Pools",a:"Old Town",v:["nature", "weird", "hidden"],d:77,s:"Free sulfur foot pools where locals soak after work—healing water, no tourists",st:"Stone basins filled with sulfur-hot water. Locals sit submerged to the waist. Conversation. Healing. Ancient ritual.",im:"It\'s 1400. A healer fills these pools. Pilgrims soak. Now you do, healing by water alone.",t:"Stone basins filled with sulfur-hot water. Locals sit submerged to the waist. Conversation. Healing. Ancient ritual.\",im:\"It\'s 1400. A healer fills these pools. Pilgrims soak. Now you do, healing by water alone.\",t:\"Abanotubani district. Free foot pools (donation appreciated). Private baths €3–5. Go late afternoon.",c:["nature", "weird", "free"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:78,n:"Metchi Village Hidden Valley Day Trip",a:"Metchi",v:["nature", "history", "quiet"],d:78,s:"Mountain village where time stopped and Georgians live like they did in 1950",st:"2-hour marshrutka to a valley. Stone houses. Sheep. No internet. A grandmother speaks no English. Pure Georgia.",im:"It\'s 1950. A village lives. Now you step into that time. Mountains. Prayer. Family. No change.",t:"2-hour marshrutka to a valley. Stone houses. Sheep. No internet. A grandmother speaks no English. Pure Georgia.\",im:\"It\'s 1950. A village lives. Now you step into that time. Mountains. Prayer. Family. No change.\",t:\"Marshrutka from Didube station (€1–2). Full day trip. Bring cash. Homestay meals available (€5–10).",c:["nature", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:79,n:"Peace Bridge Modern Icon Glow",a:"Rike",v:["architecture", "beautiful", "night"],d:79,s:"Glowing bow-tie bridge spanning the Mtkvari—built 2010 as a symbol of peace",st:"Modern. Glass. Lit from inside. It glows at night like a spacecraft landed in Old Town. Stunning.",im:"It\'s night. A bridge made of light bows across water. You walk between worlds—ancient and modern.",t:"Modern. Glass. Lit from inside. It glows at night like a spacecraft landed in Old Town. Stunning.\",im:\"It\'s night. A bridge made of light bows across water. You walk between worlds—ancient and modern.\",t:\"Peace Bridge, accessible from Rike Park or Old Town. Free. Walk at night for full effect. Photo essential.",c:["architecture", "high_spots"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:80,n:"Kala Akademia Georgian Cuisine School",a:"Downtown",v:["local", "beautiful", "hidden"],d:80,s:"Cooking class where you make khachapuri and khash—Georgian soul food decoded",st:"A Georgian grandmother teaches you recipes passed down 500 years. You cook. You eat. You understand the country.",im:"It\'s 1800. A woman bakes khachapuri. The same recipe, the same hands (now yours). Continuity.",t:"A Georgian grandmother teaches you recipes passed down 500 years. You cook. You eat. You understand the country.\",im:\"It\'s 1800. A woman bakes khachapuri. The same recipe, the same hands (now yours). Continuity.\",t:\"Check online for class schedules. €20–30 for 2-hour session. Includes meal. By reservation.",c:["local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:81,n:"Metekhi Equestrian Show Summer Nights",a:"Old Town",v:["weird", "beautiful", "night"],d:81,s:"Live horse performance and stunt show on ancient square—medieval skill meets modern crowd",st:"Horses. Riders. Medieval stunts. You\'re watching 1500s warfare turned into evening entertainment.",im:"It\'s 1600. Warriors practice. Now skilled riders perform. The square remembers both.",t:"Horses. Riders. Medieval stunts. You\'re watching 1500s warfare turned into evening entertainment.\",im:\"It\'s 1600. Warriors practice. Now skilled riders perform. The square remembers both.\",t:\"Metekhi Square. Shows most nights (check schedule). €5-10. Arrive early for good view.",c:["night", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:82,n:"Wine Region Kakheti Day Marshrutka Escape",a:"Kakheti",v:["nature", "hidden", "local"],d:82,s:"Wine country by shared van—vineyards, ancient cellars, and qvevri-buried wine in earth",st:"Marshrutka (shared minibus). Vineyard to vineyard. Locals drink wine they grew. Family wineries.",im:"It\'s harvest season. A grandpa treads grapes. His great-grandchild watches. The wine connects them.",t:"Marshrutka (shared minibus). Vineyard to vineyard. Locals drink wine they grew. Family wineries.\",im:\"It\'s harvest season. A grandpa treads grapes. His great-grandchild watches. The wine connects them.\",t:\"Marshrutka from metro (€2-3). Full day. Bring appetite. Wine €2-5 per bottle. Homestay meals available.",c:["nature", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:83,n:"Sighnaghi Honeymoon Town Hilltop Views",a:"Sighnaghi",v:["beautiful", "history", "quiet"],d:83,s:"Fortress town perched on a mountain overlooking wine country—love-soaked balconies",st:"Town on a cliff. Balconies overlook vineyards. Couples hold hands. It\'s romance made visible.",im:"It\'s 1700. A lover waits on a balcony. Now lovers wait on the same balcony. Some places breed love.",t:"Town on a cliff. Balconies overlook vineyards. Couples hold hands. It\'s romance made visible.\",im:\"It\'s 1700. A lover waits on a balcony. Now lovers wait on the same balcony. Some places breed love.\",t:\"Marshrutka from Tbilisi (1.5 hours). Small town. Hotels cheap. Wine flowing. Very romantic.",c:["history_big", "romantic_water"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:84,n:"Ushguli Mountain Village Stone Towers",a:"Ushguli",v:["nature", "history", "weird"],d:84,s:"Highest inhabited village in Georgia with medieval stone towers—mountain time capsule",st:"High altitude. Stone houses. Towers for defense. It\'s medieval mountain life still lived.",im:"It\'s 1300. Warriors build towers. Now families live in them. Time slowed by altitude.",t:"High altitude. Stone houses. Towers for defense. It\'s medieval mountain life still lived.\",im:\"It\'s 1300. Warriors build towers. Now families live in them. Time slowed by altitude.\",t:\"Long day trip (requires guide/tour). €50-100. Hire locally. Bring stamina. Unforgettable.",c:["nature", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:85,n:"Gergeti Trinity Monastery Cloud Climb",a:"Stepantsminda",v:["history", "beautiful", "high_spots"],d:85,s:"Monastery perched at 2200m where you climb above clouds to reach faith",st:"Hike through clouds. Arrive at a church touching the sky. Prayers float in thin air.",im:"It\'s 600 AD. A monk climbs this mountain seeking heaven. Now you climb the same path.",t:"Hike through clouds. Arrive at a church touching the sky. Prayers float in thin air.\",im:\"It\'s 600 AD. A monk climbs this mountain seeking heaven. Now you climb the same path.\",t:\"Tour from Tbilisi (half-day). Hike 1.5 hours. €30-50 including transport. Bring water.",c:["history_big", "high_spots"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:86,n:"Varzia Cave Monastery Carved into Cliff",a:"Varzia",v:["history", "scary", "weird"],d:86,s:"Entire monastery carved into a mountain—rooms, churches, tunnels all rock-made",st:"Enter a cave. It\'s a city inside stone. Rooms carved by hand. 13 stories deep.",im:"It\'s 1180. Monks carve. Each strike shapes home. Now you walk through their carved dreams.",t:"Enter a cave. It\'s a city inside stone. Rooms carved by hand. 13 stories deep.\",im:\"It\'s 1180. Monks carve. Each strike shapes home. Now you walk through their carved dreams.\",t:\"Tour from Tbilisi (day trip). €40-60. Guide required. Bring water and awe.",c:["history_big", "scary", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:87,n:"Uplistsikhe Pagan Fortress Underground City",a:"Uplistsikhe",v:["history", "scary", "weird"],d:87,s:"Pre-Christian fortress carved into earth—pagan temples and secret tunnels beneath Silk Road",st:"Climb into stone. Rooms carved downward. A pagan city hiding from Christian invaders.",im:"It\'s 500 BC. A pagan worships in a carved temple. Now archaeologists reveal the secret.",t:"Climb into stone. Rooms carved downward. A pagan city hiding from Christian invaders.\",im:\"It\'s 500 BC. A pagan worships in a carved temple. Now archaeologists reveal the secret.\",t:\"Marshrutka from Tbilisi (1 hour). €2 entry. Self-guided or hire guide. Bring flashlight.",c:["history_big", "scary"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:88,n:"Borjomi Mineral Springs Spa Soviet Remnants",a:"Borjomi",v:["weird", "history", "beautiful"],d:88,s:"Soviet-era spa town with thermal springs—1960s Caucasus decadence frozen in time",st:"Grand 1960s spa buildings. Thermal pools. Mineral water. Soviet elegance that didn\'t fade.",im:"It\'s 1965. Soviets build a spa. Now it stands, slightly faded but still healing.",t:"Grand 1960s spa buildings. Thermal pools. Mineral water. Soviet elegance that didn\'t fade.\",im:\"It\'s 1965. Soviets build a spa. Now it stands, slightly faded but still healing.\",t:\"Marshrutka from Tbilisi (2 hours). Spa access €5-20. Hotels cheap. Very surreal beauty.",c:["history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:89,n:"Panteon Church Rotunda Ancient Calm",a:"Old Town",v:["history", "quiet", "beautiful"],d:89,s:"Round church built on a Roman temple foundation—layers of faith in one stone structure",st:"Enter a circle. Stone dome. Christian church built where pagans worshipped. Faith evolves.",im:"It\'s 1 AD. A pagan prays. It\'s 500 AD. A Christian prays. Same stone. Different gods.",t:"Enter a circle. Stone dome. Christian church built where pagans worshipped. Faith evolves.\",im:\"It\'s 1 AD. A pagan prays. It\'s 500 AD. A Christian prays. Same stone. Different gods.\",t:\"Panteon, Old Town. €1-2 entry. Very small. Very quiet. Go early morning.",c:["history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:90,n:"Tbilisi Cable Car to Narikala Night Glow",a:"Narikala",v:["beautiful", "night", "high_spots"],d:90,s:"New cable car descending from fortress—views of the entire city glowing below",st:"Float above Tbilisi. City lights below. You\'re suspended between past and present.",im:"It\'s dusk. You ascend in a cable car. The city transforms into light. You\'re rising toward heaven.",t:"Float above Tbilisi. City lights below. You\'re suspended between past and present.\",im:\"It\'s dusk. You ascend in a cable car. The city transforms into light. You\'re rising toward heaven.\",t:\"Cable car base at Metekhi. €1 round trip. Best evening/night. City unfolds below.",c:["high_spots", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:91,n:"Sulfur Spring Waterfall Hike Green Valley",a:"Abastumani",v:["nature", "hidden", "quiet"],d:91,s:"Mountain town with hiking to natural sulfur waterfalls—health and beauty in stone",st:"Hike to a waterfall. Water smells of minerals. It heals. You soak in mountain medicine.",im:"It\'s ancient time. A traveler finds this spring. Now you do. The healing is real.",t:"Hike to a waterfall. Water smells of minerals. It heals. You soak in mountain medicine.\",im:\"It\'s ancient time. A traveler finds this spring. Now you do. The healing is real.\",t:\"Marshrutka from Tbilisi (2.5 hours). Hiking free. Lodging available. Bring swimsuit and patience.",c:["nature", "parks"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:92,n:"Soviet Mosaic Walking Art Tour Downtown",a:"Vake",v:["street_art", "weird", "history"],d:92,s:"Communist-era mosaics still decorating Soviet buildings—public art made permanent",st:"Walk and look up. Mosaics cover walls. Soldiers. Athletes. Workers. Soviet dreams in tile.",im:"It\'s 1970. Artists create mosaics for the people. Now you marvel at the permanence.",t:"Walk and look up. Mosaics cover walls. Soldiers. Athletes. Workers. Soviet dreams in tile.\",im:\"It\'s 1970. Artists create mosaics for the people. Now you marvel at the permanence.\",t:\"Vake and downtown areas. Free to walk and view. Maps available online. Best in daylight.",c:["street_art", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},

<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Tbilisi Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
