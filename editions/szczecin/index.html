  {id:96,n:"Odra Sunset at Quay — Odra #96",a:"Odra",v:["beautiful","quiet","nature"],d:7,s:"Watching the Oder at sunset from the old port quay — the sky turns over the flat Pomeranian horizon",st:"Szczecin\'s quay faces west across the Oder. The sunsets here are spectacular — the flat Pomeranian plain means the sky fills the entire view as the sun sinks over Germany.",im:"Time-travel: German dockworkers watching the same sunset from these quays in 1930, the river unchanged",t:"Free. Best in July and August after 8pm.",c:["local_only"],r:"g",nn:"Zachód słońca nad Odrą — Odra #96",ns:"Obserwowanie Odry o zachodzie słońca ze starego nabrzeża — niebo obraca się nad płaskim pomorskim horyzontem",nst:"Szczecińskie nabrzeże jest skierowane na zachód przez Odrę. Zachody słońca są tu spektakularne.",nt:"Bezpłatnie. Najlepiej w lipcu i sierpniu po 20:00."},
  {id:97,n:"Kamienny Park — Pogodno #97",a:"Pogodno",v:["local","nature","quiet"],d:47,s:"Stone Park — a hidden park in a residential neighbourhood, locals only",st:"Kamienny Park is a small park in the residential Pogodno district that almost no visitor to Szczecin ever finds. Old trees, benches, real neighbourhood life.",im:"Time-travel: children from the German garden suburb playing in this park in 1930",t:"Free. Find it off ulica Słowiańska.",c:["architecture"],r:"g",nn:"Kamienny Park — Pogodno #97",ns:"Park Kamienny — ukryty park w dzielnicy mieszkalnej, tylko dla miejscowych",nst:"Park Kamienny to mały park w mieszkalnym Pogodnie, którego prawie żaden turysta w Szczecinie nigdy nie odnajduje.",nt:"Bezpłatnie. Znaleźć przy ulicy Słowiańskiej."},
  {id:98,n:"Old German Merchant Quarter Streets — Śródmieście #98",a:"Śródmieście",v:["architecture","history","hidden"],d:19,s:"The surviving 19th century German streets of Śródmieście — what the old Stettin looked like",st:"Szczecin\'s Śródmieście preserves substantial sections of the 19th century German merchant city. Streets of Wilhelmine apartment buildings with original details. An accidental open-air museum.",im:"Time-travel: German Stettin at the height of its prosperity, 1910, the streets busy with commerce",t:"Free. Walk Aleja Wojska Polskiego and the streets around it.",c:["history_big"],r:"g",nn:"Stare ulice kupieckie — Śródmieście #98",ns:"Ocalałe ulice niemieckiego handlarskiego XIX w. w Śródmieściu — jak wyglądał stary Szczecin",nst:"Śródmieście Szczecina zachowało znaczące odcinki XIX-wiecznego niemieckiego miasta kupieckiego.",nt:"Bezpłatnie. Alejada Wojska Polskiego i okoliczne ulice."},
  {id:99,n:"Szczecin Watergate — Stare Miasto #99",a:"Stare Miasto",v:["history","hidden","quiet"],d:54,s:"The small surviving watergate from the old port — a fragment of medieval Stettin",st:"One of the medieval water gates that controlled access from the Oder to the city still stands near the castle. Mostly forgotten, marked with no tourist sign, still there.",im:"Time-travel: fishing boats entering through this watergate in 1500, the medieval city above them",t:"Find it near the castle riverside. Unmarked.",c:["high_spots"],r:"g",nn:"Brama Wodna — Stare Miasto #99",ns:"Mała zachowana brama wodna ze starego portu — fragment średniowiecznego Szczecina",nst:"Jedna z średniowiecznych bram wodnych kontrolujących dostęp z Odry do miasta wciąż stoi przy zamku.",nt:"Znaleźć przy nabrzeżu zamkowym. Nieoznaczona."},
  {id:100,n:"Pogodno Garden Suburb Walk — Pogodno #100",a:"Pogodno",v:["architecture","local","beautiful"],d:23,s:"Walking Pogodno — the garden suburb that Germany built and Poland inhabits",st:"Pogodno was designed in the 1920s as an ideal garden suburb — houses set back from tree-lined streets, gardens before every door. Now Polish, but architecturally the same as it was built. A fascinating cultural transfer.",im:"Time-travel: Polish settlers moving into German garden suburb houses in 1946, cautious and amazed",t:"Walk freely. Best in spring when the trees blossom.",c:["parks"],r:"g",nn:"Spacer po Pogodnie — Pogodno #100",ns:"Spacer po Pogodnie — podmiejski ogród, który Niemcy zbudowali, a Polacy zamieszkują",nst:"Pogodno zaprojektowane w latach 20. XX w. jako idealnie podmiejski ogród. Teraz polskie, architektonicznie wciąż takie samo.",nt:"Spacer swobodny. Najlepiej wiosną gdy drzewa kwitną."},
  {id:101,n:"Wały Chrobrego Promenade — Wały Chrobrego #101",a:"Wały Chrobrego",v:["beautiful","history","local"],d:10,s:"The monumental riverside terrace overlooking the Oder — Szczecin\'s most dramatic public space",st:"The Hakenterrasse (now Wały Chrobrego) was built by the Germans 1902–1921 as a monumental statement. Three enormous civic buildings on a raised terrace face the Oder. One of the finest urban set-pieces in Poland.",im:"Time-travel: the Hakenterrasse opening in 1921, German Stettin at its imperial height",t:"Always free. Best at sunset.",c:["courtyards"],r:"g",nn:"Wały Chrobrego — Wały Chrobrego #101",ns:"Monumentalny taras nadrzeczny z widokiem na Odrę — najbardziej dramatyczna przestrzeń publiczna Szczecina",nst:"Hakenterrasse (dziś Wały Chrobrego) zbudowano przez Niemców w 1902–1921 jako monumentalne świadectwo.",nt:"Zawsze bezpłatnie. Najlepiej o zachodzie słońca."},
  {id:102,n:"Zamek Książąt Pomorskich — Stare Miasto #102",a:"Stare Miasto",v:["history","beautiful"],d:19,s:"The castle of the Pomeranian dukes — 400 years of rulers, now a cultural centre",st:"The castle was the seat of the Griffins — the ruling dynasty of Pomerania — from the 12th century. After WWII it was a ruin. Now restored, with a spectacular bell tower.",im:"Time-travel: the Griffin duke holding court in this castle in 1600, merchants from the Baltic present",t:"Courtyard free. Castle interior small fee.",c:["romantic_water"],r:"g",nn:"Zamek Książąt Pomorskich — Stare Miasto #102",ns:"Zamek książąt pomorskich — 400 lat władców, teraz centrum kultury",nst:"Zamek był siedzibą Gryfitów — dynastii rządzącej Pomorzem od XII w. Po II wojnie w ruinie, teraz odrestaurowany.",nt:"Dziedziniec bezpłatny. Zamek wewnątrz mała opłata."},
  {id:103,n:"Katedra Świętego Jakuba — Stare Miasto #103",a:"Stare Miasto",v:["history","beautiful","quiet"],d:11,s:"Gothic cathedral with a bullet-scarred tower — the tallest church in Szczecin",st:"St. James Cathedral dates from 1187. The tower was damaged in WWII and rebuilt. Inside: the largest church organ in Poland. The bullet scars on the exterior have been left as a historical document.",im:"Time-travel: the Cathedral tower on fire in 1945, the city burning around it",t:"Free to enter. The bullet marks are on the southwest tower.",c:["scary"],r:"g",nn:"Katedra Świętego Jakuba — Stare Miasto #103",ns:"Gotycka katedra z wieżą podziurawioną kulami — najwyższy kościół Szczecina",nst:"Katedra Świętego Jakuba pochodzi z 1187 r. Wieża zniszczona w 1945 i odbudowana.",nt:"Bezpłatny wstęp. Ślady kul na wieży południowo-zachodniej."},
  {id:104,n:"Brama Portowa — Stare Miasto #104",a:"Stare Miasto",v:["history","beautiful"],d:29,s:"The 18th century Baroque city gate — the most refined architecture in old Stettin",st:"The Brama Portowa (Harbor Gate) was built in 1725 in the Baroque style. It survived WWII largely intact. The reliefs and decorations are extraordinarily detailed.",im:"Time-travel: Prussian merchant ships passing through Stettin harbor gate, 1760",t:"Free to pass through. Both sides worth examining.",c:["famous_dead"],r:"g",nn:"Brama Portowa — Stare Miasto #104",ns:"Barokowa brama miejska z XVIII w. — najbardziej wyrafinowana architektura starego Szczecina",nst:"Brama Portowa zbudowana w 1725 r. w stylu barokowym. Przeżyła II wojnę w większości nienaruszona.",nt:"Bezpłatne przejście. Obie strony warte oglądania."},
  {id:105,n:"Stare Miasto Exploration — Stare Miasto #105",a:"Stare Miasto",v:["history","hidden","local"],d:22,s:"Szczecin\'s old town — rebuilt after total WWII destruction, still finding itself",st:"Szczecin\'s old town was 65% destroyed in WWII. The rebuilding was incomplete and irregular — some areas were razed, some rebuilt faithfully, some replaced with communist blocks. The result is a fascinating palimpsest.",im:"Time-travel: 1946 — Polish settlers arriving in the ruined German city, unsure of what was theirs",t:"Free. Walk Stare Miasto between the castle and the cathedral.",c:["street_art"],r:"g",nn:"Stare Miasto — Stare Miasto #105",ns:"Stare Miasto Szczecina — odbudowane po całkowitym zniszczeniu w II wojnie, wciąż szukające siebie",nst:"Stare Miasto Szczecina zostało zniszczone w 65% w II wojnie. Odbudowa była niekompletna.",nt:"Bezpłatnie. Spacer po Starym Mieście między zamkiem a katedrą."}

,{id:52,n:"Plac Orła Białego",a:"Stare Miasto",v:["hidden"],d:0,s:"Medieval square with unhurried atmosphere and historic fountain",st:"Once called Rynek Koński (Horse Market) until 1945, this irregular-shaped plaza was the main market of Upper Town. The White Eagle Fountain, carved from sandstone and activated in 1732, was the first segment of Szczecin's water system. Today it's a favorite local gathering spot.",im:"Imagine sitting on a bench in a quiet medieval square, watching locals pass by, with the sound of the sandstone fountain echoing off historic townhouses.",t:"Visit early morning or late afternoon to avoid crowds. The irregular shape tells the story of demolished buildings on the southern side.",c:["squares", "history", "fountains"],r:"g",nn:"Plac Orła Białego",ns:"Średniowieczny plac z spokojną atmosferą i historyczną fontanną",nst:"Zwany do 1945 roku Rynkiem Końskim, był głównym rynkiem Górnego Miasta. Fontanna Orła Białego z piaskowca, uruchomiona w 1732 roku, była pierwszym fragmentem szczecińskiego wodociągu. Dziś to ulubione miejsce spotkań mieszkańców.",nt:"Odwiedź wcześnie rano lub późnym wieczorem, aby uniknąć tłumów. Nieregularny kształt placu opowiada historię wyburzonych kamienic."},
{id:53,n:"Bulwary Szczecińskie (Szczecin Quays)",a:"Odra",v:["hidden"],d:0,s:"Riverside promenade filled with locals, sometimes scented with chocolate from nearby Gryf factory",st:"Accessible from the left bank of the Odra via the Long Bridge (Most Długi), these quays are where Szczecin residents come to rest and enjoy the river. The unique atmosphere is occasionally perfumed by the nearby Gryf chocolate factory.",im:"Imagine walking along the water's edge, the scent of chocolate drifting through the air, watching locals relax on the riverbank.",t:"Best visited on warm days. The chocolate aroma is strongest when the factory is operating.",c:["riverfront", "promenades", "local-life"],r:"g",nn:"Bulwary Szczecińskie",ns:"Nadrzeczna promenada pełna mieszkańców, czasami pachnąca czekoladą z pobliskiej fabryki Gryf",nst:"Dostępne z lewego brzegu Odry przez Most Długi, bulwary to miejsce, gdzie szczecinianie przychodzą odpocząć i cieszyć się rzeką. Wyjątkową atmosferę czasami wzbogaca zapach z pobliskiej fabryki czekolady Gryf.",nt:"Najlepiej odwiedzić w ciepłe dni. Zapach czekolady jest najsilniejszy, gdy fabryka pracuje."},
{id:54,n:"Las Arkoński & Jezioro Szmaragdowe",a:"Pogodno",v:["hidden"],d:0,s:"Green Szczecin's 'floating garden' – extensive forest and emerald lake network",st:"Part of Szczecin's 'floating garden' concept, this area combines the vast Arkoński Forest with the Emerald Lake and numerous rivers, parks, and small squares. It represents the city's commitment to green spaces and natural beauty.",im:"Imagine wandering through dense forest, emerging at a pristine emerald-colored lake, surrounded by the sounds of nature rather than traffic.",t:"Best explored by bike or on foot. Bring a map or use GPS as trails can be winding.",c:["parks", "nature", "lakes", "forests"],r:"g",nn:"Las Arkoński i Jezioro Szmaragdowe",ns:"Zielony Szczecin – rozległy las i sieć jezior",nst:"Część koncepcji 'pływającego ogrodu' Szczecina, ten obszar łączy rozległy Las Arkoński z Jeziorem Szmaragdowym i licznymi rzekami, parkami i skwerkami. Reprezentuje zaangażowanie miasta w zielone przestrzenie i naturalne piękno.",nt:"Najlepiej zwiedzać na rowerze lub pieszo. Weź mapę lub używaj GPS, ścieżki mogą być kręte."}];

const TripPlanner=({onOpenPlace,lang})=>{

for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TBGS={"places":"url('../../textures/tex2.png') center/cover no-repeat","collections":"url('../../textures/tex3.png') center/cover no-repeat","missions":"url('../../textures/tex4.png') center/cover no-repeat","plan":"url('../../textures/tex5.png') center/cover no-repeat","phrases":"url('../../textures/tex6.png') center/cover no-repeat","default":"url('../../textures/tex2.png') center/cover no-repeat"};function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
{/* dark scrim over photo */}
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>

<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Szczecin Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Szczecin Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
