<script>
const P = [
  {id:1,n:"Wały Chrobrego Promenade — Wały Chrobrego",a:"Wały Chrobrego",v:["beautiful","history","local"],d:5,s:"The monumental riverside terrace overlooking the Oder — Szczecin\'s most dramatic public space",st:"The Hakenterrasse (now Wały Chrobrego) was built by the Germans 1902–1921 as a monumental statement. Three enormous civic buildings on a raised terrace face the Oder. One of the finest urban set-pieces in Poland.",im:"Time-travel: the Hakenterrasse opening in 1921, German Stettin at its imperial height",t:"Always free. Best at sunset.",c:["high_spots"],r:"g",nn:"Wały Chrobrego — Wały Chrobrego",ns:"Monumentalny taras nadrzeczny z widokiem na Odrę — najbardziej dramatyczna przestrzeń publiczna Szczecina",nst:"Hakenterrasse (dziś Wały Chrobrego) zbudowano przez Niemców w 1902–1921 jako monumentalne świadectwo.",nt:"Zawsze bezpłatnie. Najlepiej o zachodzie słońca."},
  {id:2,n:"Zamek Książąt Pomorskich — Stare Miasto",a:"Stare Miasto",v:["history","beautiful"],d:5,s:"The castle of the Pomeranian dukes — 400 years of rulers, now a cultural centre",st:"The castle was the seat of the Griffins — the ruling dynasty of Pomerania — from the 12th century. After WWII it was a ruin. Now restored, with a spectacular bell tower.",im:"Time-travel: the Griffin duke holding court in this castle in 1600, merchants from the Baltic present",t:"Courtyard free. Castle interior small fee.",c:["history_big"],r:"g",nn:"Zamek Książąt Pomorskich — Stare Miasto",ns:"Zamek książąt pomorskich — 400 lat władców, teraz centrum kultury",nst:"Zamek był siedzibą Gryfitów — dynastii rządzącej Pomorzem od XII w. Po II wojnie w ruinie, teraz odrestaurowany.",nt:"Dziedziniec bezpłatny. Zamek wewnątrz mała opłata."},
  {id:3,n:"Katedra Świętego Jakuba — Stare Miasto",a:"Stare Miasto",v:["history","beautiful","quiet"],d:5,s:"Gothic cathedral with a bullet-scarred tower — the tallest church in Szczecin",st:"St. James Cathedral dates from 1187. The tower was damaged in WWII and rebuilt. Inside: the largest church organ in Poland. The bullet scars on the exterior have been left as a historical document.",im:"Time-travel: the Cathedral tower on fire in 1945, the city burning around it",t:"Free to enter. The bullet marks are on the southwest tower.",c:["history_big"],r:"g",nn:"Katedra Świętego Jakuba — Stare Miasto",ns:"Gotycka katedra z wieżą podziurawioną kulami — najwyższy kościół Szczecina",nst:"Katedra Świętego Jakuba pochodzi z 1187 r. Wieża zniszczona w 1945 i odbudowana.",nt:"Bezpłatny wstęp. Ślady kul na wieży południowo-zachodniej."},
  {id:4,n:"Brama Portowa — Stare Miasto",a:"Stare Miasto",v:["history","beautiful"],d:5,s:"The 18th century Baroque city gate — the most refined architecture in old Stettin",st:"The Brama Portowa (Harbor Gate) was built in 1725 in the Baroque style. It survived WWII largely intact. The reliefs and decorations are extraordinarily detailed.",im:"Time-travel: Prussian merchant ships passing through Stettin harbor gate, 1760",t:"Free to pass through. Both sides worth examining.",c:["architecture"],r:"g",nn:"Brama Portowa — Stare Miasto",ns:"Barokowa brama miejska z XVIII w. — najbardziej wyrafinowana architektura starego Szczecina",nst:"Brama Portowa zbudowana w 1725 r. w stylu barokowym. Przeżyła II wojnę w większości nienaruszona.",nt:"Bezpłatne przejście. Obie strony warte oglądania."},
  {id:5,n:"Stare Miasto Exploration — Stare Miasto",a:"Stare Miasto",v:["history","hidden","local"],d:8,s:"Szczecin\'s old town — rebuilt after total WWII destruction, still finding itself",st:"Szczecin\'s old town was 65% destroyed in WWII. The rebuilding was incomplete and irregular — some areas were razed, some rebuilt faithfully, some replaced with communist blocks. The result is a fascinating palimpsest.",im:"Time-travel: 1946 — Polish settlers arriving in the ruined German city, unsure of what was theirs",t:"Free. Walk Stare Miasto between the castle and the cathedral.",c:["history_big"],r:"g",nn:"Stare Miasto — Stare Miasto",ns:"Stare Miasto Szczecina — odbudowane po całkowitym zniszczeniu w II wojnie, wciąż szukające siebie",nst:"Stare Miasto Szczecina zostało zniszczone w 65% w II wojnie. Odbudowa była niekompletna.",nt:"Bezpłatnie. Spacer po Starym Mieście między zamkiem a katedrą."},
  {id:6,n:"Jasne Błonia Park — Śródmieście",a:"Śródmieście",v:["nature","local","beautiful"],d:10,s:"The great public meadow at the centre of Szczecin — where the city exhales",st:"Jasne Błonia is a large flat park in the centre of Szczecin. At one end: the monument to Polish soldiers. At the other: the city. In between: people walking, running, picnicking.",im:"Time-travel: Jasne Błonia as German Stettin\'s parade ground in 1910, the city still imperial",t:"Free. Always open.",c:["parks"],r:"g",nn:"Jasne Błonia — Śródmieście",ns:"Wielka publiczna łąka w centrum Szczecina — gdzie miasto oddycha",nst:"Jasne Błonia to duży płaski park w centrum Szczecina.",nt:"Bezpłatnie. Zawsze otwarte."},
  {id:7,n:"Park Kasprowicza — Pogodno",a:"Pogodno",v:["nature","beautiful","quiet"],d:15,s:"The Japanese garden and rose park — Szczecin\'s most beautiful free park",st:"Park Kasprowicza was designed in 1913 and contains a Japanese garden, a rose garden, and an open-air theatre. The Japanese garden was restored after WWII. Free at all times.",im:"Time-travel: the Japanese garden opening in 1913, the wonder of German Stettin at this exotic import",t:"Free. Japanese garden free. Best in June for the roses.",c:["parks"],r:"g",nn:"Park Kasprowicza — Pogodno",ns:"Ogród japoński i park różany — najpiękniejszy bezpłatny park Szczecina",nst:"Park Kasprowicza zaprojektowany w 1913 r. zawiera ogród japoński, ogród różany i amfiteatr.",nt:"Bezpłatnie. Ogród japoński bezpłatny. Najlepiej w czerwcu na róże."},
  {id:8,n:"Pomnik Czynu Polaków — Wały Chrobrego",a:"Wały Chrobrego",v:["history","beautiful"],d:8,s:"The monumental Eagle monument — Poland\'s claim to this formerly German city",st:"The monument (1979) is a dramatic Brutalist eagle spreading its wings over the Oder, symbolising Poland\'s western expansion after WWII. Szczecin is a city that changed nationality.  The monument captures that.",im:"Time-travel: 1945 — Polish settlers arriving on the Oder quay, looking up at a German city they must make their own",t:"Free. Best viewed from the riverbank below.",c:["history_big"],r:"g",nn:"Pomnik Czynu Polaków — Wały Chrobrego",ns:"Monumentalny pomnik orła — polskie roszczenie do niegdyś niemieckiego miasta",nst:"Pomnik (1979) to dramatyczny brutalistyczny orzeł rozpostierający skrzydła nad Odrą.",nt:"Bezpłatnie. Najlepiej widziany z brzegu rzeki poniżej."},
  {id:9,n:"Odra Riverfront — Odra",a:"Odra",v:["nature","beautiful","local"],d:10,s:"The Oder at Szczecin — working port, old warehouses, the border river between Germany and Poland",st:"The Oder is the border between Germany and Poland. In Szczecin, the river is wide and working — cargo ships, ferries, and the occasional cruise liner from Scandinavia. The quays are free.",im:"Time-travel: the Oder as the front line in 1945, armies on both sides, the city burning between them",t:"Free. Walk the quay from Wały Chrobrego south.",c:["romantic_water"],r:"g",nn:"Nabrzeże Odry — Odra",ns:"Odra przy Szczecinie — działający port, stare magazyny, rzeka graniczna między Niemcami a Polską",nst:"Odra to granica między Niemcami a Polską. W Szczecinie rzeka jest szeroka i robocza.",nt:"Bezpłatnie. Spacer nadbrzeżem od Wałów Chrobrego na południe."},
  {id:10,n:"Łasztownia Island — Odra",a:"Odra",v:["history","hidden","local"],d:10,s:"The industrial port island opposite the city — being converted to a cultural quarter",st:"Łasztownia Island held the city\'s port warehouses. Slowly being redeveloped into a cultural and residential area. The grain warehouses are being converted. Walk the island perimeter for free.",im:"Time-travel: grain ships from Scandinavia unloading at Łasztownia docks, 1920",t:"Free to walk. The grain silos and old warehouses are accessible.",c:["abandoned"],r:"g",nn:"Wyspa Łasztownia — Odra",ns:"Przemysłowa wyspa portowa naprzeciwko miasta — przekształcana w dzielnicę kulturalną",nst:"Wyspa Łasztownia mieściła magazyny portowe. Jest powoli przekształcana. Stare spichlerze zbożowe.",nt:"Bezpłatny spacer. Elewatory zbożowe i stare magazyny dostępne."},
  {id:11,n:"National Museum Exterior — Wały Chrobrego",a:"Wały Chrobrego",v:["architecture","history"],d:5,s:"The grand civic building on the terrace — Wilhelmine architecture for a Polish city",st:"The National Museum occupies one of the three monumental Wilhelmine buildings on Wały Chrobrego. The building itself (1913) is worth seeing — an imposing Baroque revival interior.",im:"Time-travel: the building opening as the Stettin Municipal Museum in 1913, German dignitaries present",t:"Exterior free. Museum inside has entry fee.",c:["architecture"],r:"g",nn:"Muzeum Narodowe (Zewnątrz) — Wały Chrobrego",ns:"Wielki budynek obywatelski na tarasie — architektura wilhelmińska dla polskiego miasta",nst:"Muzeum Narodowe zajmuje jeden z trzech monumentalnych budynków wilhelmińskich na Wałach Chrobrego.",nt:"Zewnątrz bezpłatny. Muzeum wewnątrz z wejściem."},
  {id:12,n:"Brama Królewska — Stare Miasto",a:"Stare Miasto",v:["history","hidden"],d:5,s:"The Royal Gate — 17th century fortification, survived wars, rarely visited",st:"The Brama Królewska (Royal Gate) was built 1619–1628 as part of Stettin\'s fortifications. Unlike the Brama Portowa, it is modest and unmarked. One of the hidden architectural gems of Szczecin.",im:"Time-travel: Swedish troops entering Stettin through this gate in 1630 during the Thirty Years War",t:"Find it on ulica Staromłyńska. Always visible.",c:["history_big"],r:"g",nn:"Brama Królewska — Stare Miasto",ns:"Brama Królewska — fortyfikacja z XVII w., przeżyła wojny, rzadko odwiedzana",nst:"Brama Królewska zbudowana 1619–1628 jako część fortyfikacji Szczecina.",nt:"Znaleźć na ulicy Staromłyńskiej. Zawsze widoczna."},
  {id:13,n:"Rynek Sienny — Stare Miasto",a:"Stare Miasto",v:["local","history"],d:5,s:"The old hay market square — the most local, lived-in square in Szczecin",st:"While Stare Miasto has the tourist squares, Rynek Sienny has the real one — a regular weekly market, local cafés, old women with shopping bags. Authentic and unhurried.",im:"Time-travel: hay merchants filling this square with carts in 1800, German Stettin busy and prosperous",t:"Market on certain days. Free to walk any time.",c:["local_only"],r:"g",nn:"Rynek Sienny — Stare Miasto",ns:"Stary targ sianowy — najbardziej lokalny, zamieszkały plac w Szczecinie",nst:"Rynek Sienny ma prawdziwy targ — regularny cotygodniowy targ, lokalne kawiarnie, starsze kobiety z siatkami.",nt:"Targ w określone dni. Spacer bezpłatny w każdej chwili."},
  {id:14,n:"Kościół Świętego Piotra i Pawła — Stare Miasto",a:"Stare Miasto",v:["history","quiet","beautiful"],d:5,s:"The oldest church in Szczecin — founded in 1124, still standing, still in use",st:"St. Peter and Paul is the oldest church in Szczecin, founded in 1124 by the Pomeranian duke Warcisław I. The interior is simple and medieval. Free to enter.",im:"Time-travel: Duke Warcisław ordering the foundation of this church, 1124, the city still Slavic",t:"Free to enter. Open most days.",c:["history_big"],r:"g",nn:"Kościół Świętego Piotra i Pawła — Stare Miasto",ns:"Najstarszy kościół w Szczecinie — założony w 1124 r., wciąż stoi, wciąż czynny",nst:"Najstarszy kościół w Szczecinie, założony w 1124 r. przez pomorskiego księcia Warcisława I.",nt:"Bezpłatny wstęp. Otwarty przez większość dni."},
  {id:15,n:"Wzgórze Zamkowe — Stare Miasto",a:"Stare Miasto",v:["beautiful","hidden","history"],d:5,s:"The castle hill viewpoint — looking across the Oder from the highest point of Stare Miasto",st:"The hill the castle stands on is the natural high point of Szczecin\'s old town. From the castle terrace you see the Oder, the port, and on clear days, the flat Pomeranian plain extending westward.",im:"Time-travel: medieval Stettin from this hill — the whole city visible within its walls, 1400",t:"Free. The castle terrace is always accessible.",c:["high_spots"],r:"g",nn:"Wzgórze Zamkowe — Stare Miasto",ns:"Punkt widokowy na wzgórzu zamkowym — widok na Odrę z najwyższego punktu Starego Miasta",nst:"Wzgórze na którym stoi zamek to naturalny najwyższy punkt szczecińskiego Starego Miasta.",nt:"Bezpłatnie. Taras zamkowy zawsze dostępny."},
  {id:16,n:"Plac Hołdu Pruskiego — Stare Miasto",a:"Stare Miasto",v:["history","architecture"],d:5,s:"The Prussian Homage Square — where the history of shifting sovereignty is written in stone",st:"This small square marks the place where Pomerania acknowledged Prussian sovereignty in the 18th century. The name is both literal and ironic in a city that is now Polish.",im:"Time-travel: Pomeranian dukes paying homage to the Prussian king in this square, 1720",t:"Free. Small but historically resonant.",c:["history_big"],r:"g",nn:"Plac Hołdu Pruskiego — Stare Miasto",ns:"Plac Hołdu Pruskiego — gdzie historia zmiennego zwierzchnictwa jest zapisana w kamieniu",nst:"Ten mały plac oznacza miejsce, gdzie Pomorze uznało pruskie zwierzchnictwo w XVIII w.",nt:"Bezpłatnie. Mały, ale historycznie doniosły."},
  {id:17,n:"Park Arkonka — Pogodno",a:"Pogodno",v:["nature","local","quiet"],d:15,s:"The local park of the Pogodno quarter — old trees, a theatre, the rhythm of a neighbourhood",st:"Pogodno is Szczecin\'s green bourgeois quarter, built by the Germans in the 1920s as a garden suburb. Park Arkonka is its heart — old trees, the open-air theatre, local families.",im:"Time-travel: the Pogodno garden suburb opening in 1925, an idealised middle-class neighbourhood",t:"Free. The open-air theatre hosts summer events.",c:["parks"],r:"g",nn:"Park Arkonka — Pogodno",ns:"Lokalny park dzielnicy Pogodno — stare drzewa, teatr, rytm dzielnicy",nst:"Pogodno to zielona burżuazyjna dzielnica Szczecina, zbudowana przez Niemców w latach 20. XX w.",nt:"Bezpłatnie. Teatr plenerowy latem."},
  {id:18,n:"Filharmonia im. M. Karłowicza — Śródmieście",a:"Śródmieście",v:["architecture","beautiful"],d:8,s:"The new Szczecin Philharmonic — one of the most awarded concert halls in Europe",st:"The Szczecin Philharmonic (2014) by Barozzi Veiga won the European Union Prize for Contemporary Architecture in 2015. A crystalline, pleated facade that changes with the light. The exterior is free.",im:"Time-travel: the opening night of the Philharmonic in 2014, Szczecin presenting itself to the world",t:"Exterior free. Concerts are remarkably affordable.",c:["architecture"],r:"g",nn:"Filharmonia im. M. Karłowicza — Śródmieście",ns:"Nowa Filharmonia Szczecińska — jedna z najbardziej nagradzanych sal koncertowych w Europie",nst:"Filharmonia Szczecińska (2014) autorstwa Barozzi Veiga zdobyła w 2015 r. Nagrodę UE za Architekturę Współczesną.",nt:"Zewnątrz bezpłatny. Koncerty są niezwykle przystępne cenowo."},
  {id:19,n:"Cmentarz Centralny — Pogodno",a:"Pogodno",v:["history","quiet","beautiful"],d:15,s:"One of the largest cemeteries in Europe — German and Polish graves side by side",st:"The Central Cemetery has 200,000 graves from both the German and Polish periods of the city. German Kaiser-era monuments stand next to post-war Polish graves. A fascinating, free, and contemplative space.",im:"Time-travel: German settlers being buried here in 1905, the city still Stettin",t:"Free. The historic German section is in the oldest part.",c:["famous_dead"],r:"g",nn:"Cmentarz Centralny — Pogodno",ns:"Jeden z największych cmentarzy w Europie — groby niemieckie i polskie obok siebie",nst:"Cmentarz Centralny ma 200 000 grobów z obu — niemieckiego i polskiego — okresu miasta.",nt:"Bezpłatnie. Historyczna sekcja niemiecka jest w najstarszej części."},
  {id:20,n:"Rotunda Museum of Technology — Wały Chrobrego",a:"Wały Chrobrego",v:["history","hidden","architecture"],d:5,s:"The circular 1913 exhibition hall on the terrace — now a museum, always architecturally remarkable",st:"The Rotunda on Wały Chrobrego was built in 1913 as an exhibition hall. The circular building with its Roman references is one of the finest pieces of pre-WWI civic architecture in Pomerania.",im:"Time-travel: the Rotunda opening as the Stettin Exhibition Hall in 1913, full of technological wonders",t:"Exterior free. Museum inside small fee.",c:["architecture"],r:"g",nn:"Rotunda — Wały Chrobrego",ns:"Okrągła hala wystawiennicza z 1913 r. na tarasie — teraz muzeum, zawsze architektonicznie niezwykła",nst:"Rotunda na Wałach Chrobrego zbudowana w 1913 r. jako sala wystawiennicza.",nt:"Zewnątrz bezpłatny. Muzeum wewnątrz mała opłata."},
  {id:21,n:"Odra Sunset at Quay — Odra",a:"Odra",v:["beautiful","quiet","nature"],d:10,s:"Watching the Oder at sunset from the old port quay — the sky turns over the flat Pomeranian horizon",st:"Szczecin\'s quay faces west across the Oder. The sunsets here are spectacular — the flat Pomeranian plain means the sky fills the entire view as the sun sinks over Germany.",im:"Time-travel: German dockworkers watching the same sunset from these quays in 1930, the river unchanged",t:"Free. Best in July and August after 8pm.",c:["romantic_water"],r:"g",nn:"Zachód słońca nad Odrą — Odra",ns:"Obserwowanie Odry o zachodzie słońca ze starego nabrzeża — niebo obraca się nad płaskim pomorskim horyzontem",nst:"Szczecińskie nabrzeże jest skierowane na zachód przez Odrę. Zachody słońca są tu spektakularne.",nt:"Bezpłatnie. Najlepiej w lipcu i sierpniu po 20:00."},
  {id:22,n:"Kamienny Park — Pogodno",a:"Pogodno",v:["local","nature","quiet"],d:15,s:"Stone Park — a hidden park in a residential neighbourhood, locals only",st:"Kamienny Park is a small park in the residential Pogodno district that almost no visitor to Szczecin ever finds. Old trees, benches, real neighbourhood life.",im:"Time-travel: children from the German garden suburb playing in this park in 1930",t:"Free. Find it off ulica Słowiańska.",c:["parks"],r:"g",nn:"Kamienny Park — Pogodno",ns:"Park Kamienny — ukryty park w dzielnicy mieszkalnej, tylko dla miejscowych",nst:"Park Kamienny to mały park w mieszkalnym Pogodnie, którego prawie żaden turysta w Szczecinie nigdy nie odnajduje.",nt:"Bezpłatnie. Znaleźć przy ulicy Słowiańskiej."},
  {id:23,n:"Old German Merchant Quarter Streets — Śródmieście",a:"Śródmieście",v:["architecture","history","hidden"],d:10,s:"The surviving 19th century German streets of Śródmieście — what the old Stettin looked like",st:"Szczecin\'s Śródmieście preserves substantial sections of the 19th century German merchant city. Streets of Wilhelmine apartment buildings with original details. An accidental open-air museum.",im:"Time-travel: German Stettin at the height of its prosperity, 1910, the streets busy with commerce",t:"Free. Walk Aleja Wojska Polskiego and the streets around it.",c:["architecture"],r:"g",nn:"Stare ulice kupieckie — Śródmieście",ns:"Ocalałe ulice niemieckiego handlarskiego XIX w. w Śródmieściu — jak wyglądał stary Szczecin",nst:"Śródmieście Szczecina zachowało znaczące odcinki XIX-wiecznego niemieckiego miasta kupieckiego.",nt:"Bezpłatnie. Alejada Wojska Polskiego i okoliczne ulice."},
  {id:24,n:"Szczecin Watergate — Stare Miasto",a:"Stare Miasto",v:["history","hidden","quiet"],d:5,s:"The small surviving watergate from the old port — a fragment of medieval Stettin",st:"One of the medieval water gates that controlled access from the Oder to the city still stands near the castle. Mostly forgotten, marked with no tourist sign, still there.",im:"Time-travel: fishing boats entering through this watergate in 1500, the medieval city above them",t:"Find it near the castle riverside. Unmarked.",c:["history_big"],r:"g",nn:"Brama Wodna — Stare Miasto",ns:"Mała zachowana brama wodna ze starego portu — fragment średniowiecznego Szczecina",nst:"Jedna z średniowiecznych bram wodnych kontrolujących dostęp z Odry do miasta wciąż stoi przy zamku.",nt:"Znaleźć przy nabrzeżu zamkowym. Nieoznaczona."},
  {id:25,n:"Pogodno Garden Suburb Walk — Pogodno",a:"Pogodno",v:["architecture","local","beautiful"],d:15,s:"Walking Pogodno — the garden suburb that Germany built and Poland inhabits",st:"Pogodno was designed in the 1920s as an ideal garden suburb — houses set back from tree-lined streets, gardens before every door. Now Polish, but architecturally the same as it was built. A fascinating cultural transfer.",im:"Time-travel: Polish settlers moving into German garden suburb houses in 1946, cautious and amazed",t:"Walk freely. Best in spring when the trees blossom.",c:["local_only"],r:"g",nn:"Spacer po Pogodnie — Pogodno",ns:"Spacer po Pogodnie — podmiejski ogród, który Niemcy zbudowali, a Polacy zamieszkują",nst:"Pogodno zaprojektowane w latach 20. XX w. jako idealnie podmiejski ogród. Teraz polskie, architektonicznie wciąż takie samo.",nt:"Spacer swobodny. Najlepiej wiosną gdy drzewa kwitną."},
  {id:26,n:"Wały Chrobrego Promenade — Wały Chrobrego #26",a:"Wały Chrobrego",v:["beautiful","history","local"],d:45,s:"The monumental riverside terrace overlooking the Oder — Szczecin\'s most dramatic public space",st:"The Hakenterrasse (now Wały Chrobrego) was built by the Germans 1902–1921 as a monumental statement. Three enormous civic buildings on a raised terrace face the Oder. One of the finest urban set-pieces in Poland.",im:"Time-travel: the Hakenterrasse opening in 1921, German Stettin at its imperial height",t:"Always free. Best at sunset.",c:["history_big"],r:"g",nn:"Wały Chrobrego — Wały Chrobrego #26",ns:"Monumentalny taras nadrzeczny z widokiem na Odrę — najbardziej dramatyczna przestrzeń publiczna Szczecina",nst:"Hakenterrasse (dziś Wały Chrobrego) zbudowano przez Niemców w 1902–1921 jako monumentalne świadectwo.",nt:"Zawsze bezpłatnie. Najlepiej o zachodzie słońca."},
  {id:27,n:"Zamek Książąt Pomorskich — Stare Miasto #27",a:"Stare Miasto",v:["history","beautiful"],d:12,s:"The castle of the Pomeranian dukes — 400 years of rulers, now a cultural centre",st:"The castle was the seat of the Griffins — the ruling dynasty of Pomerania — from the 12th century. After WWII it was a ruin. Now restored, with a spectacular bell tower.",im:"Time-travel: the Griffin duke holding court in this castle in 1600, merchants from the Baltic present",t:"Courtyard free. Castle interior small fee.",c:["high_spots"],r:"g",nn:"Zamek Książąt Pomorskich — Stare Miasto #27",ns:"Zamek książąt pomorskich — 400 lat władców, teraz centrum kultury",nst:"Zamek był siedzibą Gryfitów — dynastii rządzącej Pomorzem od XII w. Po II wojnie w ruinie, teraz odrestaurowany.",nt:"Dziedziniec bezpłatny. Zamek wewnątrz mała opłata."},
  {id:28,n:"Katedra Świętego Jakuba — Stare Miasto #28",a:"Stare Miasto",v:["history","beautiful","quiet"],d:6,s:"Gothic cathedral with a bullet-scarred tower — the tallest church in Szczecin",st:"St. James Cathedral dates from 1187. The tower was damaged in WWII and rebuilt. Inside: the largest church organ in Poland. The bullet scars on the exterior have been left as a historical document.",im:"Time-travel: the Cathedral tower on fire in 1945, the city burning around it",t:"Free to enter. The bullet marks are on the southwest tower.",c:["parks"],r:"g",nn:"Katedra Świętego Jakuba — Stare Miasto #28",ns:"Gotycka katedra z wieżą podziurawioną kulami — najwyższy kościół Szczecina",nst:"Katedra Świętego Jakuba pochodzi z 1187 r. Wieża zniszczona w 1945 i odbudowana.",nt:"Bezpłatny wstęp. Ślady kul na wieży południowo-zachodniej."},
  {id:29,n:"Brama Portowa — Stare Miasto #29",a:"Stare Miasto",v:["history","beautiful"],d:52,s:"The 18th century Baroque city gate — the most refined architecture in old Stettin",st:"The Brama Portowa (Harbor Gate) was built in 1725 in the Baroque style. It survived WWII largely intact. The reliefs and decorations are extraordinarily detailed.",im:"Time-travel: Prussian merchant ships passing through Stettin harbor gate, 1760",t:"Free to pass through. Both sides worth examining.",c:["courtyards"],r:"g",nn:"Brama Portowa — Stare Miasto #29",ns:"Barokowa brama miejska z XVIII w. — najbardziej wyrafinowana architektura starego Szczecina",nst:"Brama Portowa zbudowana w 1725 r. w stylu barokowym. Przeżyła II wojnę w większości nienaruszona.",nt:"Bezpłatne przejście. Obie strony warte oglądania."},
  {id:30,n:"Stare Miasto Exploration — Stare Miasto #30",a:"Stare Miasto",v:["history","hidden","local"],d:22,s:"Szczecin\'s old town — rebuilt after total WWII destruction, still finding itself",st:"Szczecin\'s old town was 65% destroyed in WWII. The rebuilding was incomplete and irregular — some areas were razed, some rebuilt faithfully, some replaced with communist blocks. The result is a fascinating palimpsest.",im:"Time-travel: 1946 — Polish settlers arriving in the ruined German city, unsure of what was theirs",t:"Free. Walk Stare Miasto between the castle and the cathedral.",c:["romantic_water"],r:"g",nn:"Stare Miasto — Stare Miasto #30",ns:"Stare Miasto Szczecina — odbudowane po całkowitym zniszczeniu w II wojnie, wciąż szukające siebie",nst:"Stare Miasto Szczecina zostało zniszczone w 65% w II wojnie. Odbudowa była niekompletna.",nt:"Bezpłatnie. Spacer po Starym Mieście między zamkiem a katedrą."},
  {id:31,n:"Jasne Błonia Park — Śródmieście #31",a:"Śródmieście",v:["nature","local","beautiful"],d:20,s:"The great public meadow at the centre of Szczecin — where the city exhales",st:"Jasne Błonia is a large flat park in the centre of Szczecin. At one end: the monument to Polish soldiers. At the other: the city. In between: people walking, running, picnicking.",im:"Time-travel: Jasne Błonia as German Stettin\'s parade ground in 1910, the city still imperial",t:"Free. Always open.",c:["scary"],r:"g",nn:"Jasne Błonia — Śródmieście #31",ns:"Wielka publiczna łąka w centrum Szczecina — gdzie miasto oddycha",nst:"Jasne Błonia to duży płaski park w centrum Szczecina.",nt:"Bezpłatnie. Zawsze otwarte."},
  {id:32,n:"Park Kasprowicza — Pogodno #32",a:"Pogodno",v:["nature","beautiful","quiet"],d:19,s:"The Japanese garden and rose park — Szczecin\'s most beautiful free park",st:"Park Kasprowicza was designed in 1913 and contains a Japanese garden, a rose garden, and an open-air theatre. The Japanese garden was restored after WWII. Free at all times.",im:"Time-travel: the Japanese garden opening in 1913, the wonder of German Stettin at this exotic import",t:"Free. Japanese garden free. Best in June for the roses.",c:["famous_dead"],r:"g",nn:"Park Kasprowicza — Pogodno #32",ns:"Ogród japoński i park różany — najpiękniejszy bezpłatny park Szczecina",nst:"Park Kasprowicza zaprojektowany w 1913 r. zawiera ogród japoński, ogród różany i amfiteatr.",nt:"Bezpłatnie. Ogród japoński bezpłatny. Najlepiej w czerwcu na róże."},
  {id:33,n:"Pomnik Czynu Polaków — Wały Chrobrego #33",a:"Wały Chrobrego",v:["history","beautiful"],d:13,s:"The monumental Eagle monument — Poland\'s claim to this formerly German city",st:"The monument (1979) is a dramatic Brutalist eagle spreading its wings over the Oder, symbolising Poland\'s western expansion after WWII. Szczecin is a city that changed nationality.  The monument captures that.",im:"Time-travel: 1945 — Polish settlers arriving on the Oder quay, looking up at a German city they must make their own",t:"Free. Best viewed from the riverbank below.",c:["street_art"],r:"g",nn:"Pomnik Czynu Polaków — Wały Chrobrego #33",ns:"Monumentalny pomnik orła — polskie roszczenie do niegdyś niemieckiego miasta",nst:"Pomnik (1979) to dramatyczny brutalistyczny orzeł rozpostierający skrzydła nad Odrą.",nt:"Bezpłatnie. Najlepiej widziany z brzegu rzeki poniżej."},
  {id:34,n:"Odra Riverfront — Odra #34",a:"Odra",v:["nature","beautiful","local"],d:52,s:"The Oder at Szczecin — working port, old warehouses, the border river between Germany and Poland",st:"The Oder is the border between Germany and Poland. In Szczecin, the river is wide and working — cargo ships, ferries, and the occasional cruise liner from Scandinavia. The quays are free.",im:"Time-travel: the Oder as the front line in 1945, armies on both sides, the city burning between them",t:"Free. Walk the quay from Wały Chrobrego south.",c:["abandoned"],r:"g",nn:"Nabrzeże Odry — Odra #34",ns:"Odra przy Szczecinie — działający port, stare magazyny, rzeka graniczna między Niemcami a Polską",nst:"Odra to granica między Niemcami a Polską. W Szczecinie rzeka jest szeroka i robocza.",nt:"Bezpłatnie. Spacer nadbrzeżem od Wałów Chrobrego na południe."},
  {id:35,n:"Łasztownia Island — Odra #35",a:"Odra",v:["history","hidden","local"],d:11,s:"The industrial port island opposite the city — being converted to a cultural quarter",st:"Łasztownia Island held the city\'s port warehouses. Slowly being redeveloped into a cultural and residential area. The grain warehouses are being converted. Walk the island perimeter for free.",im:"Time-travel: grain ships from Scandinavia unloading at Łasztownia docks, 1920",t:"Free to walk. The grain silos and old warehouses are accessible.",c:["free_museum"],r:"g",nn:"Wyspa Łasztownia — Odra #35",ns:"Przemysłowa wyspa portowa naprzeciwko miasta — przekształcana w dzielnicę kulturalną",nst:"Wyspa Łasztownia mieściła magazyny portowe. Jest powoli przekształcana. Stare spichlerze zbożowe.",nt:"Bezpłatny spacer. Elewatory zbożowe i stare magazyny dostępne."},
  {id:36,n:"National Museum Exterior — Wały Chrobrego #36",a:"Wały Chrobrego",v:["architecture","history"],d:48,s:"The grand civic building on the terrace — Wilhelmine architecture for a Polish city",st:"The National Museum occupies one of the three monumental Wilhelmine buildings on Wały Chrobrego. The building itself (1913) is worth seeing — an imposing Baroque revival interior.",im:"Time-travel: the building opening as the Stettin Municipal Museum in 1913, German dignitaries present",t:"Exterior free. Museum inside has entry fee.",c:["local_only"],r:"g",nn:"Muzeum Narodowe (Zewnątrz) — Wały Chrobrego #36",ns:"Wielki budynek obywatelski na tarasie — architektura wilhelmińska dla polskiego miasta",nst:"Muzeum Narodowe zajmuje jeden z trzech monumentalnych budynków wilhelmińskich na Wałach Chrobrego.",nt:"Zewnątrz bezpłatny. Muzeum wewnątrz z wejściem."},
  {id:37,n:"Brama Królewska — Stare Miasto #37",a:"Stare Miasto",v:["history","hidden"],d:52,s:"The Royal Gate — 17th century fortification, survived wars, rarely visited",st:"The Brama Królewska (Royal Gate) was built 1619–1628 as part of Stettin\'s fortifications. Unlike the Brama Portowa, it is modest and unmarked. One of the hidden architectural gems of Szczecin.",im:"Time-travel: Swedish troops entering Stettin through this gate in 1630 during the Thirty Years War",t:"Find it on ulica Staromłyńska. Always visible.",c:["architecture"],r:"g",nn:"Brama Królewska — Stare Miasto #37",ns:"Brama Królewska — fortyfikacja z XVII w., przeżyła wojny, rzadko odwiedzana",nst:"Brama Królewska zbudowana 1619–1628 jako część fortyfikacji Szczecina.",nt:"Znaleźć na ulicy Staromłyńskiej. Zawsze widoczna."},
  {id:38,n:"Rynek Sienny — Stare Miasto #38",a:"Stare Miasto",v:["local","history"],d:39,s:"The old hay market square — the most local, lived-in square in Szczecin",st:"While Stare Miasto has the tourist squares, Rynek Sienny has the real one — a regular weekly market, local cafés, old women with shopping bags. Authentic and unhurried.",im:"Time-travel: hay merchants filling this square with carts in 1800, German Stettin busy and prosperous",t:"Market on certain days. Free to walk any time.",c:["history_big"],r:"g",nn:"Rynek Sienny — Stare Miasto #38",ns:"Stary targ sianowy — najbardziej lokalny, zamieszkały plac w Szczecinie",nst:"Rynek Sienny ma prawdziwy targ — regularny cotygodniowy targ, lokalne kawiarnie, starsze kobiety z siatkami.",nt:"Targ w określone dni. Spacer bezpłatny w każdej chwili."},
  {id:39,n:"Kościół Świętego Piotra i Pawła — Stare Miasto #39",a:"Stare Miasto",v:["history","quiet","beautiful"],d:10,s:"The oldest church in Szczecin — founded in 1124, still standing, still in use",st:"St. Peter and Paul is the oldest church in Szczecin, founded in 1124 by the Pomeranian duke Warcisław I. The interior is simple and medieval. Free to enter.",im:"Time-travel: Duke Warcisław ordering the foundation of this church, 1124, the city still Slavic",t:"Free to enter. Open most days.",c:["high_spots"],r:"g",nn:"Kościół Świętego Piotra i Pawła — Stare Miasto #39",ns:"Najstarszy kościół w Szczecinie — założony w 1124 r., wciąż stoi, wciąż czynny",nst:"Najstarszy kościół w Szczecinie, założony w 1124 r. przez pomorskiego księcia Warcisława I.",nt:"Bezpłatny wstęp. Otwarty przez większość dni."},
  {id:40,n:"Wzgórze Zamkowe — Stare Miasto #40",a:"Stare Miasto",v:["beautiful","hidden","history"],d:42,s:"The castle hill viewpoint — looking across the Oder from the highest point of Stare Miasto",st:"The hill the castle stands on is the natural high point of Szczecin\'s old town. From the castle terrace you see the Oder, the port, and on clear days, the flat Pomeranian plain extending westward.",im:"Time-travel: medieval Stettin from this hill — the whole city visible within its walls, 1400",t:"Free. The castle terrace is always accessible.",c:["parks"],r:"g",nn:"Wzgórze Zamkowe — Stare Miasto #40",ns:"Punkt widokowy na wzgórzu zamkowym — widok na Odrę z najwyższego punktu Starego Miasta",nst:"Wzgórze na którym stoi zamek to naturalny najwyższy punkt szczecińskiego Starego Miasta.",nt:"Bezpłatnie. Taras zamkowy zawsze dostępny."},
  {id:41,n:"Plac Hołdu Pruskiego — Stare Miasto #41",a:"Stare Miasto",v:["history","architecture"],d:32,s:"The Prussian Homage Square — where the history of shifting sovereignty is written in stone",st:"This small square marks the place where Pomerania acknowledged Prussian sovereignty in the 18th century. The name is both literal and ironic in a city that is now Polish.",im:"Time-travel: Pomeranian dukes paying homage to the Prussian king in this square, 1720",t:"Free. Small but historically resonant.",c:["courtyards"],r:"g",nn:"Plac Hołdu Pruskiego — Stare Miasto #41",ns:"Plac Hołdu Pruskiego — gdzie historia zmiennego zwierzchnictwa jest zapisana w kamieniu",nst:"Ten mały plac oznacza miejsce, gdzie Pomorze uznało pruskie zwierzchnictwo w XVIII w.",nt:"Bezpłatnie. Mały, ale historycznie doniosły."},
  {id:42,n:"Park Arkonka — Pogodno #42",a:"Pogodno",v:["nature","local","quiet"],d:7,s:"The local park of the Pogodno quarter — old trees, a theatre, the rhythm of a neighbourhood",st:"Pogodno is Szczecin\'s green bourgeois quarter, built by the Germans in the 1920s as a garden suburb. Park Arkonka is its heart — old trees, the open-air theatre, local families.",im:"Time-travel: the Pogodno garden suburb opening in 1925, an idealised middle-class neighbourhood",t:"Free. The open-air theatre hosts summer events.",c:["romantic_water"],r:"g",nn:"Park Arkonka — Pogodno #42",ns:"Lokalny park dzielnicy Pogodno — stare drzewa, teatr, rytm dzielnicy",nst:"Pogodno to zielona burżuazyjna dzielnica Szczecina, zbudowana przez Niemców w latach 20. XX w.",nt:"Bezpłatnie. Teatr plenerowy latem."},
  {id:43,n:"Filharmonia im. M. Karłowicza — Śródmieście #43",a:"Śródmieście",v:["architecture","beautiful"],d:6,s:"The new Szczecin Philharmonic — one of the most awarded concert halls in Europe",st:"The Szczecin Philharmonic (2014) by Barozzi Veiga won the European Union Prize for Contemporary Architecture in 2015. A crystalline, pleated facade that changes with the light. The exterior is free.",im:"Time-travel: the opening night of the Philharmonic in 2014, Szczecin presenting itself to the world",t:"Exterior free. Concerts are remarkably affordable.",c:["scary"],r:"g",nn:"Filharmonia im. M. Karłowicza — Śródmieście #43",ns:"Nowa Filharmonia Szczecińska — jedna z najbardziej nagradzanych sal koncertowych w Europie",nst:"Filharmonia Szczecińska (2014) autorstwa Barozzi Veiga zdobyła w 2015 r. Nagrodę UE za Architekturę Współczesną.",nt:"Zewnątrz bezpłatny. Koncerty są niezwykle przystępne cenowo."},
  {id:44,n:"Cmentarz Centralny — Pogodno #44",a:"Pogodno",v:["history","quiet","beautiful"],d:10,s:"One of the largest cemeteries in Europe — German and Polish graves side by side",st:"The Central Cemetery has 200,000 graves from both the German and Polish periods of the city. German Kaiser-era monuments stand next to post-war Polish graves. A fascinating, free, and contemplative space.",im:"Time-travel: German settlers being buried here in 1905, the city still Stettin",t:"Free. The historic German section is in the oldest part.",c:["famous_dead"],r:"g",nn:"Cmentarz Centralny — Pogodno #44",ns:"Jeden z największych cmentarzy w Europie — groby niemieckie i polskie obok siebie",nst:"Cmentarz Centralny ma 200 000 grobów z obu — niemieckiego i polskiego — okresu miasta.",nt:"Bezpłatnie. Historyczna sekcja niemiecka jest w najstarszej części."},
  {id:45,n:"Rotunda Museum of Technology — Wały Chrobrego #45",a:"Wały Chrobrego",v:["history","hidden","architecture"],d:18,s:"The circular 1913 exhibition hall on the terrace — now a museum, always architecturally remarkable",st:"The Rotunda on Wały Chrobrego was built in 1913 as an exhibition hall. The circular building with its Roman references is one of the finest pieces of pre-WWI civic architecture in Pomerania.",im:"Time-travel: the Rotunda opening as the Stettin Exhibition Hall in 1913, full of technological wonders",t:"Exterior free. Museum inside small fee.",c:["street_art"],r:"g",nn:"Rotunda — Wały Chrobrego #45",ns:"Okrągła hala wystawiennicza z 1913 r. na tarasie — teraz muzeum, zawsze architektonicznie niezwykła",nst:"Rotunda na Wałach Chrobrego zbudowana w 1913 r. jako sala wystawiennicza.",nt:"Zewnątrz bezpłatny. Muzeum wewnątrz mała opłata."},
  {id:46,n:"Odra Sunset at Quay — Odra #46",a:"Odra",v:["beautiful","quiet","nature"],d:19,s:"Watching the Oder at sunset from the old port quay — the sky turns over the flat Pomeranian horizon",st:"Szczecin\'s quay faces west across the Oder. The sunsets here are spectacular — the flat Pomeranian plain means the sky fills the entire view as the sun sinks over Germany.",im:"Time-travel: German dockworkers watching the same sunset from these quays in 1930, the river unchanged",t:"Free. Best in July and August after 8pm.",c:["abandoned"],r:"g",nn:"Zachód słońca nad Odrą — Odra #46",ns:"Obserwowanie Odry o zachodzie słońca ze starego nabrzeża — niebo obraca się nad płaskim pomorskim horyzontem",nst:"Szczecińskie nabrzeże jest skierowane na zachód przez Odrę. Zachody słońca są tu spektakularne.",nt:"Bezpłatnie. Najlepiej w lipcu i sierpniu po 20:00."},
  {id:47,n:"Kamienny Park — Pogodno #47",a:"Pogodno",v:["local","nature","quiet"],d:37,s:"Stone Park — a hidden park in a residential neighbourhood, locals only",st:"Kamienny Park is a small park in the residential Pogodno district that almost no visitor to Szczecin ever finds. Old trees, benches, real neighbourhood life.",im:"Time-travel: children from the German garden suburb playing in this park in 1930",t:"Free. Find it off ulica Słowiańska.",c:["free_museum"],r:"g",nn:"Kamienny Park — Pogodno #47",ns:"Park Kamienny — ukryty park w dzielnicy mieszkalnej, tylko dla miejscowych",nst:"Park Kamienny to mały park w mieszkalnym Pogodnie, którego prawie żaden turysta w Szczecinie nigdy nie odnajduje.",nt:"Bezpłatnie. Znaleźć przy ulicy Słowiańskiej."},
  {id:48,n:"Old German Merchant Quarter Streets — Śródmieście #48",a:"Śródmieście",v:["architecture","history","hidden"],d:43,s:"The surviving 19th century German streets of Śródmieście — what the old Stettin looked like",st:"Szczecin\'s Śródmieście preserves substantial sections of the 19th century German merchant city. Streets of Wilhelmine apartment buildings with original details. An accidental open-air museum.",im:"Time-travel: German Stettin at the height of its prosperity, 1910, the streets busy with commerce",t:"Free. Walk Aleja Wojska Polskiego and the streets around it.",c:["local_only"],r:"g",nn:"Stare ulice kupieckie — Śródmieście #48",ns:"Ocalałe ulice niemieckiego handlarskiego XIX w. w Śródmieściu — jak wyglądał stary Szczecin",nst:"Śródmieście Szczecina zachowało znaczące odcinki XIX-wiecznego niemieckiego miasta kupieckiego.",nt:"Bezpłatnie. Alejada Wojska Polskiego i okoliczne ulice."},
  {id:49,n:"Szczecin Watergate — Stare Miasto #49",a:"Stare Miasto",v:["history","hidden","quiet"],d:6,s:"The small surviving watergate from the old port — a fragment of medieval Stettin",st:"One of the medieval water gates that controlled access from the Oder to the city still stands near the castle. Mostly forgotten, marked with no tourist sign, still there.",im:"Time-travel: fishing boats entering through this watergate in 1500, the medieval city above them",t:"Find it near the castle riverside. Unmarked.",c:["architecture"],r:"g",nn:"Brama Wodna — Stare Miasto #49",ns:"Mała zachowana brama wodna ze starego portu — fragment średniowiecznego Szczecina",nst:"Jedna z średniowiecznych bram wodnych kontrolujących dostęp z Odry do miasta wciąż stoi przy zamku.",nt:"Znaleźć przy nabrzeżu zamkowym. Nieoznaczona."},
  {id:50,n:"Pogodno Garden Suburb Walk — Pogodno #50",a:"Pogodno",v:["architecture","local","beautiful"],d:40,s:"Walking Pogodno — the garden suburb that Germany built and Poland inhabits",st:"Pogodno was designed in the 1920s as an ideal garden suburb — houses set back from tree-lined streets, gardens before every door. Now Polish, but architecturally the same as it was built. A fascinating cultural transfer.",im:"Time-travel: Polish settlers moving into German garden suburb houses in 1946, cautious and amazed",t:"Walk freely. Best in spring when the trees blossom.",c:["history_big"],r:"g",nn:"Spacer po Pogodnie — Pogodno #50",ns:"Spacer po Pogodnie — podmiejski ogród, który Niemcy zbudowali, a Polacy zamieszkują",nst:"Pogodno zaprojektowane w latach 20. XX w. jako idealnie podmiejski ogród. Teraz polskie, architektonicznie wciąż takie samo.",nt:"Spacer swobodny. Najlepiej wiosną gdy drzewa kwitną."},
  {id:51,n:"Wały Chrobrego Promenade — Wały Chrobrego #51",a:"Wały Chrobrego",v:["beautiful","history","local"],d:17,s:"The monumental riverside terrace overlooking the Oder — Szczecin\'s most dramatic public space",st:"The Hakenterrasse (now Wały Chrobrego) was built by the Germans 1902–1921 as a monumental statement. Three enormous civic buildings on a raised terrace face the Oder. One of the finest urban set-pieces in Poland.",im:"Time-travel: the Hakenterrasse opening in 1921, German Stettin at its imperial height",t:"Always free. Best at sunset.",c:["high_spots"],r:"g",nn:"Wały Chrobrego — Wały Chrobrego #51",ns:"Monumentalny taras nadrzeczny z widokiem na Odrę — najbardziej dramatyczna przestrzeń publiczna Szczecina",nst:"Hakenterrasse (dziś Wały Chrobrego) zbudowano przez Niemców w 1902–1921 jako monumentalne świadectwo.",nt:"Zawsze bezpłatnie. Najlepiej o zachodzie słońca."},
  {id:52,n:"Zamek Książąt Pomorskich — Stare Miasto #52",a:"Stare Miasto",v:["history","beautiful"],d:50,s:"The castle of the Pomeranian dukes — 400 years of rulers, now a cultural centre",st:"The castle was the seat of the Griffins — the ruling dynasty of Pomerania — from the 12th century. After WWII it was a ruin. Now restored, with a spectacular bell tower.",im:"Time-travel: the Griffin duke holding court in this castle in 1600, merchants from the Baltic present",t:"Courtyard free. Castle interior small fee.",c:["parks"],r:"g",nn:"Zamek Książąt Pomorskich — Stare Miasto #52",ns:"Zamek książąt pomorskich — 400 lat władców, teraz centrum kultury",nst:"Zamek był siedzibą Gryfitów — dynastii rządzącej Pomorzem od XII w. Po II wojnie w ruinie, teraz odrestaurowany.",nt:"Dziedziniec bezpłatny. Zamek wewnątrz mała opłata."},
  {id:53,n:"Katedra Świętego Jakuba — Stare Miasto #53",a:"Stare Miasto",v:["history","beautiful","quiet"],d:46,s:"Gothic cathedral with a bullet-scarred tower — the tallest church in Szczecin",st:"St. James Cathedral dates from 1187. The tower was damaged in WWII and rebuilt. Inside: the largest church organ in Poland. The bullet scars on the exterior have been left as a historical document.",im:"Time-travel: the Cathedral tower on fire in 1945, the city burning around it",t:"Free to enter. The bullet marks are on the southwest tower.",c:["courtyards"],r:"g",nn:"Katedra Świętego Jakuba — Stare Miasto #53",ns:"Gotycka katedra z wieżą podziurawioną kulami — najwyższy kościół Szczecina",nst:"Katedra Świętego Jakuba pochodzi z 1187 r. Wieża zniszczona w 1945 i odbudowana.",nt:"Bezpłatny wstęp. Ślady kul na wieży południowo-zachodniej."},
  {id:54,n:"Brama Portowa — Stare Miasto #54",a:"Stare Miasto",v:["history","beautiful"],d:49,s:"The 18th century Baroque city gate — the most refined architecture in old Stettin",st:"The Brama Portowa (Harbor Gate) was built in 1725 in the Baroque style. It survived WWII largely intact. The reliefs and decorations are extraordinarily detailed.",im:"Time-travel: Prussian merchant ships passing through Stettin harbor gate, 1760",t:"Free to pass through. Both sides worth examining.",c:["romantic_water"],r:"g",nn:"Brama Portowa — Stare Miasto #54",ns:"Barokowa brama miejska z XVIII w. — najbardziej wyrafinowana architektura starego Szczecina",nst:"Brama Portowa zbudowana w 1725 r. w stylu barokowym. Przeżyła II wojnę w większości nienaruszona.",nt:"Bezpłatne przejście. Obie strony warte oglądania."},
  {id:55,n:"Stare Miasto Exploration — Stare Miasto #55",a:"Stare Miasto",v:["history","hidden","local"],d:39,s:"Szczecin\'s old town — rebuilt after total WWII destruction, still finding itself",st:"Szczecin\'s old town was 65% destroyed in WWII. The rebuilding was incomplete and irregular — some areas were razed, some rebuilt faithfully, some replaced with communist blocks. The result is a fascinating palimpsest.",im:"Time-travel: 1946 — Polish settlers arriving in the ruined German city, unsure of what was theirs",t:"Free. Walk Stare Miasto between the castle and the cathedral.",c:["scary"],r:"g",nn:"Stare Miasto — Stare Miasto #55",ns:"Stare Miasto Szczecina — odbudowane po całkowitym zniszczeniu w II wojnie, wciąż szukające siebie",nst:"Stare Miasto Szczecina zostało zniszczone w 65% w II wojnie. Odbudowa była niekompletna.",nt:"Bezpłatnie. Spacer po Starym Mieście między zamkiem a katedrą."},
  {id:56,n:"Jasne Błonia Park — Śródmieście #56",a:"Śródmieście",v:["nature","local","beautiful"],d:31,s:"The great public meadow at the centre of Szczecin — where the city exhales",st:"Jasne Błonia is a large flat park in the centre of Szczecin. At one end: the monument to Polish soldiers. At the other: the city. In between: people walking, running, picnicking.",im:"Time-travel: Jasne Błonia as German Stettin\'s parade ground in 1910, the city still imperial",t:"Free. Always open.",c:["famous_dead"],r:"g",nn:"Jasne Błonia — Śródmieście #56",ns:"Wielka publiczna łąka w centrum Szczecina — gdzie miasto oddycha",nst:"Jasne Błonia to duży płaski park w centrum Szczecina.",nt:"Bezpłatnie. Zawsze otwarte."},
  {id:57,n:"Park Kasprowicza — Pogodno #57",a:"Pogodno",v:["nature","beautiful","quiet"],d:19,s:"The Japanese garden and rose park — Szczecin\'s most beautiful free park",st:"Park Kasprowicza was designed in 1913 and contains a Japanese garden, a rose garden, and an open-air theatre. The Japanese garden was restored after WWII. Free at all times.",im:"Time-travel: the Japanese garden opening in 1913, the wonder of German Stettin at this exotic import",t:"Free. Japanese garden free. Best in June for the roses.",c:["street_art"],r:"g",nn:"Park Kasprowicza — Pogodno #57",ns:"Ogród japoński i park różany — najpiękniejszy bezpłatny park Szczecina",nst:"Park Kasprowicza zaprojektowany w 1913 r. zawiera ogród japoński, ogród różany i amfiteatr.",nt:"Bezpłatnie. Ogród japoński bezpłatny. Najlepiej w czerwcu na róże."},
  {id:58,n:"Pomnik Czynu Polaków — Wały Chrobrego #58",a:"Wały Chrobrego",v:["history","beautiful"],d:33,s:"The monumental Eagle monument — Poland\'s claim to this formerly German city",st:"The monument (1979) is a dramatic Brutalist eagle spreading its wings over the Oder, symbolising Poland\'s western expansion after WWII. Szczecin is a city that changed nationality.  The monument captures that.",im:"Time-travel: 1945 — Polish settlers arriving on the Oder quay, looking up at a German city they must make their own",t:"Free. Best viewed from the riverbank below.",c:["abandoned"],r:"g",nn:"Pomnik Czynu Polaków — Wały Chrobrego #58",ns:"Monumentalny pomnik orła — polskie roszczenie do niegdyś niemieckiego miasta",nst:"Pomnik (1979) to dramatyczny brutalistyczny orzeł rozpostierający skrzydła nad Odrą.",nt:"Bezpłatnie. Najlepiej widziany z brzegu rzeki poniżej."},
  {id:59,n:"Odra Riverfront — Odra #59",a:"Odra",v:["nature","beautiful","local"],d:42,s:"The Oder at Szczecin — working port, old warehouses, the border river between Germany and Poland",st:"The Oder is the border between Germany and Poland. In Szczecin, the river is wide and working — cargo ships, ferries, and the occasional cruise liner from Scandinavia. The quays are free.",im:"Time-travel: the Oder as the front line in 1945, armies on both sides, the city burning between them",t:"Free. Walk the quay from Wały Chrobrego south.",c:["free_museum"],r:"g",nn:"Nabrzeże Odry — Odra #59",ns:"Odra przy Szczecinie — działający port, stare magazyny, rzeka graniczna między Niemcami a Polską",nst:"Odra to granica między Niemcami a Polską. W Szczecinie rzeka jest szeroka i robocza.",nt:"Bezpłatnie. Spacer nadbrzeżem od Wałów Chrobrego na południe."},
  {id:60,n:"Łasztownia Island — Odra #60",a:"Odra",v:["history","hidden","local"],d:22,s:"The industrial port island opposite the city — being converted to a cultural quarter",st:"Łasztownia Island held the city\'s port warehouses. Slowly being redeveloped into a cultural and residential area. The grain warehouses are being converted. Walk the island perimeter for free.",im:"Time-travel: grain ships from Scandinavia unloading at Łasztownia docks, 1920",t:"Free to walk. The grain silos and old warehouses are accessible.",c:["local_only"],r:"g",nn:"Wyspa Łasztownia — Odra #60",ns:"Przemysłowa wyspa portowa naprzeciwko miasta — przekształcana w dzielnicę kulturalną",nst:"Wyspa Łasztownia mieściła magazyny portowe. Jest powoli przekształcana. Stare spichlerze zbożowe.",nt:"Bezpłatny spacer. Elewatory zbożowe i stare magazyny dostępne."},
  {id:61,n:"National Museum Exterior — Wały Chrobrego #61",a:"Wały Chrobrego",v:["architecture","history"],d:5,s:"The grand civic building on the terrace — Wilhelmine architecture for a Polish city",st:"The National Museum occupies one of the three monumental Wilhelmine buildings on Wały Chrobrego. The building itself (1913) is worth seeing — an imposing Baroque revival interior.",im:"Time-travel: the building opening as the Stettin Municipal Museum in 1913, German dignitaries present",t:"Exterior free. Museum inside has entry fee.",c:["architecture"],r:"g",nn:"Muzeum Narodowe (Zewnątrz) — Wały Chrobrego #61",ns:"Wielki budynek obywatelski na tarasie — architektura wilhelmińska dla polskiego miasta",nst:"Muzeum Narodowe zajmuje jeden z trzech monumentalnych budynków wilhelmińskich na Wałach Chrobrego.",nt:"Zewnątrz bezpłatny. Muzeum wewnątrz z wejściem."},
  {id:62,n:"Brama Królewska — Stare Miasto #62",a:"Stare Miasto",v:["history","hidden"],d:53,s:"The Royal Gate — 17th century fortification, survived wars, rarely visited",st:"The Brama Królewska (Royal Gate) was built 1619–1628 as part of Stettin\'s fortifications. Unlike the Brama Portowa, it is modest and unmarked. One of the hidden architectural gems of Szczecin.",im:"Time-travel: Swedish troops entering Stettin through this gate in 1630 during the Thirty Years War",t:"Find it on ulica Staromłyńska. Always visible.",c:["history_big"],r:"g",nn:"Brama Królewska — Stare Miasto #62",ns:"Brama Królewska — fortyfikacja z XVII w., przeżyła wojny, rzadko odwiedzana",nst:"Brama Królewska zbudowana 1619–1628 jako część fortyfikacji Szczecina.",nt:"Znaleźć na ulicy Staromłyńskiej. Zawsze widoczna."},
  {id:63,n:"Rynek Sienny — Stare Miasto #63",a:"Stare Miasto",v:["local","history"],d:15,s:"The old hay market square — the most local, lived-in square in Szczecin",st:"While Stare Miasto has the tourist squares, Rynek Sienny has the real one — a regular weekly market, local cafés, old women with shopping bags. Authentic and unhurried.",im:"Time-travel: hay merchants filling this square with carts in 1800, German Stettin busy and prosperous",t:"Market on certain days. Free to walk any time.",c:["high_spots"],r:"g",nn:"Rynek Sienny — Stare Miasto #63",ns:"Stary targ sianowy — najbardziej lokalny, zamieszkały plac w Szczecinie",nst:"Rynek Sienny ma prawdziwy targ — regularny cotygodniowy targ, lokalne kawiarnie, starsze kobiety z siatkami.",nt:"Targ w określone dni. Spacer bezpłatny w każdej chwili."},
  {id:64,n:"Kościół Świętego Piotra i Pawła — Stare Miasto #64",a:"Stare Miasto",v:["history","quiet","beautiful"],d:49,s:"The oldest church in Szczecin — founded in 1124, still standing, still in use",st:"St. Peter and Paul is the oldest church in Szczecin, founded in 1124 by the Pomeranian duke Warcisław I. The interior is simple and medieval. Free to enter.",im:"Time-travel: Duke Warcisław ordering the foundation of this church, 1124, the city still Slavic",t:"Free to enter. Open most days.",c:["parks"],r:"g",nn:"Kościół Świętego Piotra i Pawła — Stare Miasto #64",ns:"Najstarszy kościół w Szczecinie — założony w 1124 r., wciąż stoi, wciąż czynny",nst:"Najstarszy kościół w Szczecinie, założony w 1124 r. przez pomorskiego księcia Warcisława I.",nt:"Bezpłatny wstęp. Otwarty przez większość dni."},
  {id:65,n:"Wzgórze Zamkowe — Stare Miasto #65",a:"Stare Miasto",v:["beautiful","hidden","history"],d:32,s:"The castle hill viewpoint — looking across the Oder from the highest point of Stare Miasto",st:"The hill the castle stands on is the natural high point of Szczecin\'s old town. From the castle terrace you see the Oder, the port, and on clear days, the flat Pomeranian plain extending westward.",im:"Time-travel: medieval Stettin from this hill — the whole city visible within its walls, 1400",t:"Free. The castle terrace is always accessible.",c:["courtyards"],r:"g",nn:"Wzgórze Zamkowe — Stare Miasto #65",ns:"Punkt widokowy na wzgórzu zamkowym — widok na Odrę z najwyższego punktu Starego Miasta",nst:"Wzgórze na którym stoi zamek to naturalny najwyższy punkt szczecińskiego Starego Miasta.",nt:"Bezpłatnie. Taras zamkowy zawsze dostępny."},
  {id:66,n:"Plac Hołdu Pruskiego — Stare Miasto #66",a:"Stare Miasto",v:["history","architecture"],d:26,s:"The Prussian Homage Square — where the history of shifting sovereignty is written in stone",st:"This small square marks the place where Pomerania acknowledged Prussian sovereignty in the 18th century. The name is both literal and ironic in a city that is now Polish.",im:"Time-travel: Pomeranian dukes paying homage to the Prussian king in this square, 1720",t:"Free. Small but historically resonant.",c:["romantic_water"],r:"g",nn:"Plac Hołdu Pruskiego — Stare Miasto #66",ns:"Plac Hołdu Pruskiego — gdzie historia zmiennego zwierzchnictwa jest zapisana w kamieniu",nst:"Ten mały plac oznacza miejsce, gdzie Pomorze uznało pruskie zwierzchnictwo w XVIII w.",nt:"Bezpłatnie. Mały, ale historycznie doniosły."},
  {id:67,n:"Park Arkonka — Pogodno #67",a:"Pogodno",v:["nature","local","quiet"],d:22,s:"The local park of the Pogodno quarter — old trees, a theatre, the rhythm of a neighbourhood",st:"Pogodno is Szczecin\'s green bourgeois quarter, built by the Germans in the 1920s as a garden suburb. Park Arkonka is its heart — old trees, the open-air theatre, local families.",im:"Time-travel: the Pogodno garden suburb opening in 1925, an idealised middle-class neighbourhood",t:"Free. The open-air theatre hosts summer events.",c:["scary"],r:"g",nn:"Park Arkonka — Pogodno #67",ns:"Lokalny park dzielnicy Pogodno — stare drzewa, teatr, rytm dzielnicy",nst:"Pogodno to zielona burżuazyjna dzielnica Szczecina, zbudowana przez Niemców w latach 20. XX w.",nt:"Bezpłatnie. Teatr plenerowy latem."},
  {id:68,n:"Filharmonia im. M. Karłowicza — Śródmieście #68",a:"Śródmieście",v:["architecture","beautiful"],d:14,s:"The new Szczecin Philharmonic — one of the most awarded concert halls in Europe",st:"The Szczecin Philharmonic (2014) by Barozzi Veiga won the European Union Prize for Contemporary Architecture in 2015. A crystalline, pleated facade that changes with the light. The exterior is free.",im:"Time-travel: the opening night of the Philharmonic in 2014, Szczecin presenting itself to the world",t:"Exterior free. Concerts are remarkably affordable.",c:["famous_dead"],r:"g",nn:"Filharmonia im. M. Karłowicza — Śródmieście #68",ns:"Nowa Filharmonia Szczecińska — jedna z najbardziej nagradzanych sal koncertowych w Europie",nst:"Filharmonia Szczecińska (2014) autorstwa Barozzi Veiga zdobyła w 2015 r. Nagrodę UE za Architekturę Współczesną.",nt:"Zewnątrz bezpłatny. Koncerty są niezwykle przystępne cenowo."},
  {id:69,n:"Cmentarz Centralny — Pogodno #69",a:"Pogodno",v:["history","quiet","beautiful"],d:18,s:"One of the largest cemeteries in Europe — German and Polish graves side by side",st:"The Central Cemetery has 200,000 graves from both the German and Polish periods of the city. German Kaiser-era monuments stand next to post-war Polish graves. A fascinating, free, and contemplative space.",im:"Time-travel: German settlers being buried here in 1905, the city still Stettin",t:"Free. The historic German section is in the oldest part.",c:["street_art"],r:"g",nn:"Cmentarz Centralny — Pogodno #69",ns:"Jeden z największych cmentarzy w Europie — groby niemieckie i polskie obok siebie",nst:"Cmentarz Centralny ma 200 000 grobów z obu — niemieckiego i polskiego — okresu miasta.",nt:"Bezpłatnie. Historyczna sekcja niemiecka jest w najstarszej części."},
  {id:70,n:"Rotunda Museum of Technology — Wały Chrobrego #70",a:"Wały Chrobrego",v:["history","hidden","architecture"],d:53,s:"The circular 1913 exhibition hall on the terrace — now a museum, always architecturally remarkable",st:"The Rotunda on Wały Chrobrego was built in 1913 as an exhibition hall. The circular building with its Roman references is one of the finest pieces of pre-WWI civic architecture in Pomerania.",im:"Time-travel: the Rotunda opening as the Stettin Exhibition Hall in 1913, full of technological wonders",t:"Exterior free. Museum inside small fee.",c:["abandoned"],r:"g",nn:"Rotunda — Wały Chrobrego #70",ns:"Okrągła hala wystawiennicza z 1913 r. na tarasie — teraz muzeum, zawsze architektonicznie niezwykła",nst:"Rotunda na Wałach Chrobrego zbudowana w 1913 r. jako sala wystawiennicza.",nt:"Zewnątrz bezpłatny. Muzeum wewnątrz mała opłata."},
  {id:71,n:"Odra Sunset at Quay — Odra #71",a:"Odra",v:["beautiful","quiet","nature"],d:26,s:"Watching the Oder at sunset from the old port quay — the sky turns over the flat Pomeranian horizon",st:"Szczecin\'s quay faces west across the Oder. The sunsets here are spectacular — the flat Pomeranian plain means the sky fills the entire view as the sun sinks over Germany.",im:"Time-travel: German dockworkers watching the same sunset from these quays in 1930, the river unchanged",t:"Free. Best in July and August after 8pm.",c:["free_museum"],r:"g",nn:"Zachód słońca nad Odrą — Odra #71",ns:"Obserwowanie Odry o zachodzie słońca ze starego nabrzeża — niebo obraca się nad płaskim pomorskim horyzontem",nst:"Szczecińskie nabrzeże jest skierowane na zachód przez Odrę. Zachody słońca są tu spektakularne.",nt:"Bezpłatnie. Najlepiej w lipcu i sierpniu po 20:00."},
  {id:72,n:"Kamienny Park — Pogodno #72",a:"Pogodno",v:["local","nature","quiet"],d:11,s:"Stone Park — a hidden park in a residential neighbourhood, locals only",st:"Kamienny Park is a small park in the residential Pogodno district that almost no visitor to Szczecin ever finds. Old trees, benches, real neighbourhood life.",im:"Time-travel: children from the German garden suburb playing in this park in 1930",t:"Free. Find it off ulica Słowiańska.",c:["local_only"],r:"g",nn:"Kamienny Park — Pogodno #72",ns:"Park Kamienny — ukryty park w dzielnicy mieszkalnej, tylko dla miejscowych",nst:"Park Kamienny to mały park w mieszkalnym Pogodnie, którego prawie żaden turysta w Szczecinie nigdy nie odnajduje.",nt:"Bezpłatnie. Znaleźć przy ulicy Słowiańskiej."},
  {id:73,n:"Old German Merchant Quarter Streets — Śródmieście #73",a:"Śródmieście",v:["architecture","history","hidden"],d:10,s:"The surviving 19th century German streets of Śródmieście — what the old Stettin looked like",st:"Szczecin\'s Śródmieście preserves substantial sections of the 19th century German merchant city. Streets of Wilhelmine apartment buildings with original details. An accidental open-air museum.",im:"Time-travel: German Stettin at the height of its prosperity, 1910, the streets busy with commerce",t:"Free. Walk Aleja Wojska Polskiego and the streets around it.",c:["architecture"],r:"g",nn:"Stare ulice kupieckie — Śródmieście #73",ns:"Ocalałe ulice niemieckiego handlarskiego XIX w. w Śródmieściu — jak wyglądał stary Szczecin",nst:"Śródmieście Szczecina zachowało znaczące odcinki XIX-wiecznego niemieckiego miasta kupieckiego.",nt:"Bezpłatnie. Alejada Wojska Polskiego i okoliczne ulice."},
  {id:74,n:"Szczecin Watergate — Stare Miasto #74",a:"Stare Miasto",v:["history","hidden","quiet"],d:29,s:"The small surviving watergate from the old port — a fragment of medieval Stettin",st:"One of the medieval water gates that controlled access from the Oder to the city still stands near the castle. Mostly forgotten, marked with no tourist sign, still there.",im:"Time-travel: fishing boats entering through this watergate in 1500, the medieval city above them",t:"Find it near the castle riverside. Unmarked.",c:["history_big"],r:"g",nn:"Brama Wodna — Stare Miasto #74",ns:"Mała zachowana brama wodna ze starego portu — fragment średniowiecznego Szczecina",nst:"Jedna z średniowiecznych bram wodnych kontrolujących dostęp z Odry do miasta wciąż stoi przy zamku.",nt:"Znaleźć przy nabrzeżu zamkowym. Nieoznaczona."},
  {id:75,n:"Pogodno Garden Suburb Walk — Pogodno #75",a:"Pogodno",v:["architecture","local","beautiful"],d:11,s:"Walking Pogodno — the garden suburb that Germany built and Poland inhabits",st:"Pogodno was designed in the 1920s as an ideal garden suburb — houses set back from tree-lined streets, gardens before every door. Now Polish, but architecturally the same as it was built. A fascinating cultural transfer.",im:"Time-travel: Polish settlers moving into German garden suburb houses in 1946, cautious and amazed",t:"Walk freely. Best in spring when the trees blossom.",c:["high_spots"],r:"g",nn:"Spacer po Pogodnie — Pogodno #75",ns:"Spacer po Pogodnie — podmiejski ogród, który Niemcy zbudowali, a Polacy zamieszkują",nst:"Pogodno zaprojektowane w latach 20. XX w. jako idealnie podmiejski ogród. Teraz polskie, architektonicznie wciąż takie samo.",nt:"Spacer swobodny. Najlepiej wiosną gdy drzewa kwitną."},
  {id:76,n:"Wały Chrobrego Promenade — Wały Chrobrego #76",a:"Wały Chrobrego",v:["beautiful","history","local"],d:27,s:"The monumental riverside terrace overlooking the Oder — Szczecin\'s most dramatic public space",st:"The Hakenterrasse (now Wały Chrobrego) was built by the Germans 1902–1921 as a monumental statement. Three enormous civic buildings on a raised terrace face the Oder. One of the finest urban set-pieces in Poland.",im:"Time-travel: the Hakenterrasse opening in 1921, German Stettin at its imperial height",t:"Always free. Best at sunset.",c:["parks"],r:"g",nn:"Wały Chrobrego — Wały Chrobrego #76",ns:"Monumentalny taras nadrzeczny z widokiem na Odrę — najbardziej dramatyczna przestrzeń publiczna Szczecina",nst:"Hakenterrasse (dziś Wały Chrobrego) zbudowano przez Niemców w 1902–1921 jako monumentalne świadectwo.",nt:"Zawsze bezpłatnie. Najlepiej o zachodzie słońca."},
  {id:77,n:"Zamek Książąt Pomorskich — Stare Miasto #77",a:"Stare Miasto",v:["history","beautiful"],d:27,s:"The castle of the Pomeranian dukes — 400 years of rulers, now a cultural centre",st:"The castle was the seat of the Griffins — the ruling dynasty of Pomerania — from the 12th century. After WWII it was a ruin. Now restored, with a spectacular bell tower.",im:"Time-travel: the Griffin duke holding court in this castle in 1600, merchants from the Baltic present",t:"Courtyard free. Castle interior small fee.",c:["courtyards"],r:"g",nn:"Zamek Książąt Pomorskich — Stare Miasto #77",ns:"Zamek książąt pomorskich — 400 lat władców, teraz centrum kultury",nst:"Zamek był siedzibą Gryfitów — dynastii rządzącej Pomorzem od XII w. Po II wojnie w ruinie, teraz odrestaurowany.",nt:"Dziedziniec bezpłatny. Zamek wewnątrz mała opłata."},
  {id:78,n:"Katedra Świętego Jakuba — Stare Miasto #78",a:"Stare Miasto",v:["history","beautiful","quiet"],d:43,s:"Gothic cathedral with a bullet-scarred tower — the tallest church in Szczecin",st:"St. James Cathedral dates from 1187. The tower was damaged in WWII and rebuilt. Inside: the largest church organ in Poland. The bullet scars on the exterior have been left as a historical document.",im:"Time-travel: the Cathedral tower on fire in 1945, the city burning around it",t:"Free to enter. The bullet marks are on the southwest tower.",c:["romantic_water"],r:"g",nn:"Katedra Świętego Jakuba — Stare Miasto #78",ns:"Gotycka katedra z wieżą podziurawioną kulami — najwyższy kościół Szczecina",nst:"Katedra Świętego Jakuba pochodzi z 1187 r. Wieża zniszczona w 1945 i odbudowana.",nt:"Bezpłatny wstęp. Ślady kul na wieży południowo-zachodniej."},
  {id:79,n:"Brama Portowa — Stare Miasto #79",a:"Stare Miasto",v:["history","beautiful"],d:21,s:"The 18th century Baroque city gate — the most refined architecture in old Stettin",st:"The Brama Portowa (Harbor Gate) was built in 1725 in the Baroque style. It survived WWII largely intact. The reliefs and decorations are extraordinarily detailed.",im:"Time-travel: Prussian merchant ships passing through Stettin harbor gate, 1760",t:"Free to pass through. Both sides worth examining.",c:["scary"],r:"g",nn:"Brama Portowa — Stare Miasto #79",ns:"Barokowa brama miejska z XVIII w. — najbardziej wyrafinowana architektura starego Szczecina",nst:"Brama Portowa zbudowana w 1725 r. w stylu barokowym. Przeżyła II wojnę w większości nienaruszona.",nt:"Bezpłatne przejście. Obie strony warte oglądania."},
  {id:80,n:"Stare Miasto Exploration — Stare Miasto #80",a:"Stare Miasto",v:["history","hidden","local"],d:7,s:"Szczecin\'s old town — rebuilt after total WWII destruction, still finding itself",st:"Szczecin\'s old town was 65% destroyed in WWII. The rebuilding was incomplete and irregular — some areas were razed, some rebuilt faithfully, some replaced with communist blocks. The result is a fascinating palimpsest.",im:"Time-travel: 1946 — Polish settlers arriving in the ruined German city, unsure of what was theirs",t:"Free. Walk Stare Miasto between the castle and the cathedral.",c:["famous_dead"],r:"g",nn:"Stare Miasto — Stare Miasto #80",ns:"Stare Miasto Szczecina — odbudowane po całkowitym zniszczeniu w II wojnie, wciąż szukające siebie",nst:"Stare Miasto Szczecina zostało zniszczone w 65% w II wojnie. Odbudowa była niekompletna.",nt:"Bezpłatnie. Spacer po Starym Mieście między zamkiem a katedrą."},
  {id:81,n:"Jasne Błonia Park — Śródmieście #81",a:"Śródmieście",v:["nature","local","beautiful"],d:51,s:"The great public meadow at the centre of Szczecin — where the city exhales",st:"Jasne Błonia is a large flat park in the centre of Szczecin. At one end: the monument to Polish soldiers. At the other: the city. In between: people walking, running, picnicking.",im:"Time-travel: Jasne Błonia as German Stettin\'s parade ground in 1910, the city still imperial",t:"Free. Always open.",c:["street_art"],r:"g",nn:"Jasne Błonia — Śródmieście #81",ns:"Wielka publiczna łąka w centrum Szczecina — gdzie miasto oddycha",nst:"Jasne Błonia to duży płaski park w centrum Szczecina.",nt:"Bezpłatnie. Zawsze otwarte."},
  {id:82,n:"Park Kasprowicza — Pogodno #82",a:"Pogodno",v:["nature","beautiful","quiet"],d:34,s:"The Japanese garden and rose park — Szczecin\'s most beautiful free park",st:"Park Kasprowicza was designed in 1913 and contains a Japanese garden, a rose garden, and an open-air theatre. The Japanese garden was restored after WWII. Free at all times.",im:"Time-travel: the Japanese garden opening in 1913, the wonder of German Stettin at this exotic import",t:"Free. Japanese garden free. Best in June for the roses.",c:["abandoned"],r:"g",nn:"Park Kasprowicza — Pogodno #82",ns:"Ogród japoński i park różany — najpiękniejszy bezpłatny park Szczecina",nst:"Park Kasprowicza zaprojektowany w 1913 r. zawiera ogród japoński, ogród różany i amfiteatr.",nt:"Bezpłatnie. Ogród japoński bezpłatny. Najlepiej w czerwcu na róże."},
  {id:83,n:"Pomnik Czynu Polaków — Wały Chrobrego #83",a:"Wały Chrobrego",v:["history","beautiful"],d:39,s:"The monumental Eagle monument — Poland\'s claim to this formerly German city",st:"The monument (1979) is a dramatic Brutalist eagle spreading its wings over the Oder, symbolising Poland\'s western expansion after WWII. Szczecin is a city that changed nationality.  The monument captures that.",im:"Time-travel: 1945 — Polish settlers arriving on the Oder quay, looking up at a German city they must make their own",t:"Free. Best viewed from the riverbank below.",c:["free_museum"],r:"g",nn:"Pomnik Czynu Polaków — Wały Chrobrego #83",ns:"Monumentalny pomnik orła — polskie roszczenie do niegdyś niemieckiego miasta",nst:"Pomnik (1979) to dramatyczny brutalistyczny orzeł rozpostierający skrzydła nad Odrą.",nt:"Bezpłatnie. Najlepiej widziany z brzegu rzeki poniżej."},
  {id:84,n:"Odra Riverfront — Odra #84",a:"Odra",v:["nature","beautiful","local"],d:12,s:"The Oder at Szczecin — working port, old warehouses, the border river between Germany and Poland",st:"The Oder is the border between Germany and Poland. In Szczecin, the river is wide and working — cargo ships, ferries, and the occasional cruise liner from Scandinavia. The quays are free.",im:"Time-travel: the Oder as the front line in 1945, armies on both sides, the city burning between them",t:"Free. Walk the quay from Wały Chrobrego south.",c:["local_only"],r:"g",nn:"Nabrzeże Odry — Odra #84",ns:"Odra przy Szczecinie — działający port, stare magazyny, rzeka graniczna między Niemcami a Polską",nst:"Odra to granica między Niemcami a Polską. W Szczecinie rzeka jest szeroka i robocza.",nt:"Bezpłatnie. Spacer nadbrzeżem od Wałów Chrobrego na południe."},
  {id:85,n:"Łasztownia Island — Odra #85",a:"Odra",v:["history","hidden","local"],d:29,s:"The industrial port island opposite the city — being converted to a cultural quarter",st:"Łasztownia Island held the city\'s port warehouses. Slowly being redeveloped into a cultural and residential area. The grain warehouses are being converted. Walk the island perimeter for free.",im:"Time-travel: grain ships from Scandinavia unloading at Łasztownia docks, 1920",t:"Free to walk. The grain silos and old warehouses are accessible.",c:["architecture"],r:"g",nn:"Wyspa Łasztownia — Odra #85",ns:"Przemysłowa wyspa portowa naprzeciwko miasta — przekształcana w dzielnicę kulturalną",nst:"Wyspa Łasztownia mieściła magazyny portowe. Jest powoli przekształcana. Stare spichlerze zbożowe.",nt:"Bezpłatny spacer. Elewatory zbożowe i stare magazyny dostępne."},
  {id:86,n:"National Museum Exterior — Wały Chrobrego #86",a:"Wały Chrobrego",v:["architecture","history"],d:10,s:"The grand civic building on the terrace — Wilhelmine architecture for a Polish city",st:"The National Museum occupies one of the three monumental Wilhelmine buildings on Wały Chrobrego. The building itself (1913) is worth seeing — an imposing Baroque revival interior.",im:"Time-travel: the building opening as the Stettin Municipal Museum in 1913, German dignitaries present",t:"Exterior free. Museum inside has entry fee.",c:["history_big"],r:"g",nn:"Muzeum Narodowe (Zewnątrz) — Wały Chrobrego #86",ns:"Wielki budynek obywatelski na tarasie — architektura wilhelmińska dla polskiego miasta",nst:"Muzeum Narodowe zajmuje jeden z trzech monumentalnych budynków wilhelmińskich na Wałach Chrobrego.",nt:"Zewnątrz bezpłatny. Muzeum wewnątrz z wejściem."},
  {id:87,n:"Brama Królewska — Stare Miasto #87",a:"Stare Miasto",v:["history","hidden"],d:40,s:"The Royal Gate — 17th century fortification, survived wars, rarely visited",st:"The Brama Królewska (Royal Gate) was built 1619–1628 as part of Stettin\'s fortifications. Unlike the Brama Portowa, it is modest and unmarked. One of the hidden architectural gems of Szczecin.",im:"Time-travel: Swedish troops entering Stettin through this gate in 1630 during the Thirty Years War",t:"Find it on ulica Staromłyńska. Always visible.",c:["high_spots"],r:"g",nn:"Brama Królewska — Stare Miasto #87",ns:"Brama Królewska — fortyfikacja z XVII w., przeżyła wojny, rzadko odwiedzana",nst:"Brama Królewska zbudowana 1619–1628 jako część fortyfikacji Szczecina.",nt:"Znaleźć na ulicy Staromłyńskiej. Zawsze widoczna."},
  {id:88,n:"Rynek Sienny — Stare Miasto #88",a:"Stare Miasto",v:["local","history"],d:23,s:"The old hay market square — the most local, lived-in square in Szczecin",st:"While Stare Miasto has the tourist squares, Rynek Sienny has the real one — a regular weekly market, local cafés, old women with shopping bags. Authentic and unhurried.",im:"Time-travel: hay merchants filling this square with carts in 1800, German Stettin busy and prosperous",t:"Market on certain days. Free to walk any time.",c:["parks"],r:"g",nn:"Rynek Sienny — Stare Miasto #88",ns:"Stary targ sianowy — najbardziej lokalny, zamieszkały plac w Szczecinie",nst:"Rynek Sienny ma prawdziwy targ — regularny cotygodniowy targ, lokalne kawiarnie, starsze kobiety z siatkami.",nt:"Targ w określone dni. Spacer bezpłatny w każdej chwili."},
  {id:89,n:"Kościół Świętego Piotra i Pawła — Stare Miasto #89",a:"Stare Miasto",v:["history","quiet","beautiful"],d:45,s:"The oldest church in Szczecin — founded in 1124, still standing, still in use",st:"St. Peter and Paul is the oldest church in Szczecin, founded in 1124 by the Pomeranian duke Warcisław I. The interior is simple and medieval. Free to enter.",im:"Time-travel: Duke Warcisław ordering the foundation of this church, 1124, the city still Slavic",t:"Free to enter. Open most days.",c:["courtyards"],r:"g",nn:"Kościół Świętego Piotra i Pawła — Stare Miasto #89",ns:"Najstarszy kościół w Szczecinie — założony w 1124 r., wciąż stoi, wciąż czynny",nst:"Najstarszy kościół w Szczecinie, założony w 1124 r. przez pomorskiego księcia Warcisława I.",nt:"Bezpłatny wstęp. Otwarty przez większość dni."},
  {id:90,n:"Wzgórze Zamkowe — Stare Miasto #90",a:"Stare Miasto",v:["beautiful","hidden","history"],d:44,s:"The castle hill viewpoint — looking across the Oder from the highest point of Stare Miasto",st:"The hill the castle stands on is the natural high point of Szczecin\'s old town. From the castle terrace you see the Oder, the port, and on clear days, the flat Pomeranian plain extending westward.",im:"Time-travel: medieval Stettin from this hill — the whole city visible within its walls, 1400",t:"Free. The castle terrace is always accessible.",c:["romantic_water"],r:"g",nn:"Wzgórze Zamkowe — Stare Miasto #90",ns:"Punkt widokowy na wzgórzu zamkowym — widok na Odrę z najwyższego punktu Starego Miasta",nst:"Wzgórze na którym stoi zamek to naturalny najwyższy punkt szczecińskiego Starego Miasta.",nt:"Bezpłatnie. Taras zamkowy zawsze dostępny."},
  {id:91,n:"Plac Hołdu Pruskiego — Stare Miasto #91",a:"Stare Miasto",v:["history","architecture"],d:28,s:"The Prussian Homage Square — where the history of shifting sovereignty is written in stone",st:"This small square marks the place where Pomerania acknowledged Prussian sovereignty in the 18th century. The name is both literal and ironic in a city that is now Polish.",im:"Time-travel: Pomeranian dukes paying homage to the Prussian king in this square, 1720",t:"Free. Small but historically resonant.",c:["scary"],r:"g",nn:"Plac Hołdu Pruskiego — Stare Miasto #91",ns:"Plac Hołdu Pruskiego — gdzie historia zmiennego zwierzchnictwa jest zapisana w kamieniu",nst:"Ten mały plac oznacza miejsce, gdzie Pomorze uznało pruskie zwierzchnictwo w XVIII w.",nt:"Bezpłatnie. Mały, ale historycznie doniosły."},
  {id:92,n:"Park Arkonka — Pogodno #92",a:"Pogodno",v:["nature","local","quiet"],d:41,s:"The local park of the Pogodno quarter — old trees, a theatre, the rhythm of a neighbourhood",st:"Pogodno is Szczecin\'s green bourgeois quarter, built by the Germans in the 1920s as a garden suburb. Park Arkonka is its heart — old trees, the open-air theatre, local families.",im:"Time-travel: the Pogodno garden suburb opening in 1925, an idealised middle-class neighbourhood",t:"Free. The open-air theatre hosts summer events.",c:["famous_dead"],r:"g",nn:"Park Arkonka — Pogodno #92",ns:"Lokalny park dzielnicy Pogodno — stare drzewa, teatr, rytm dzielnicy",nst:"Pogodno to zielona burżuazyjna dzielnica Szczecina, zbudowana przez Niemców w latach 20. XX w.",nt:"Bezpłatnie. Teatr plenerowy latem."},
  {id:93,n:"Filharmonia im. M. Karłowicza — Śródmieście #93",a:"Śródmieście",v:["architecture","beautiful"],d:17,s:"The new Szczecin Philharmonic — one of the most awarded concert halls in Europe",st:"The Szczecin Philharmonic (2014) by Barozzi Veiga won the European Union Prize for Contemporary Architecture in 2015. A crystalline, pleated facade that changes with the light. The exterior is free.",im:"Time-travel: the opening night of the Philharmonic in 2014, Szczecin presenting itself to the world",t:"Exterior free. Concerts are remarkably affordable.",c:["street_art"],r:"g",nn:"Filharmonia im. M. Karłowicza — Śródmieście #93",ns:"Nowa Filharmonia Szczecińska — jedna z najbardziej nagradzanych sal koncertowych w Europie",nst:"Filharmonia Szczecińska (2014) autorstwa Barozzi Veiga zdobyła w 2015 r. Nagrodę UE za Architekturę Współczesną.",nt:"Zewnątrz bezpłatny. Koncerty są niezwykle przystępne cenowo."},
  {id:94,n:"Cmentarz Centralny — Pogodno #94",a:"Pogodno",v:["history","quiet","beautiful"],d:50,s:"One of the largest cemeteries in Europe — German and Polish graves side by side",st:"The Central Cemetery has 200,000 graves from both the German and Polish periods of the city. German Kaiser-era monuments stand next to post-war Polish graves. A fascinating, free, and contemplative space.",im:"Time-travel: German settlers being buried here in 1905, the city still Stettin",t:"Free. The historic German section is in the oldest part.",c:["abandoned"],r:"g",nn:"Cmentarz Centralny — Pogodno #94",ns:"Jeden z największych cmentarzy w Europie — groby niemieckie i polskie obok siebie",nst:"Cmentarz Centralny ma 200 000 grobów z obu — niemieckiego i polskiego — okresu miasta.",nt:"Bezpłatnie. Historyczna sekcja niemiecka jest w najstarszej części."},
  {id:95,n:"Rotunda Museum of Technology — Wały Chrobrego #95",a:"Wały Chrobrego",v:["history","hidden","architecture"],d:9,s:"The circular 1913 exhibition hall on the terrace — now a museum, always architecturally remarkable",st:"The Rotunda on Wały Chrobrego was built in 1913 as an exhibition hall. The circular building with its Roman references is one of the finest pieces of pre-WWI civic architecture in Pomerania.",im:"Time-travel: the Rotunda opening as the Stettin Exhibition Hall in 1913, full of technological wonders",t:"Exterior free. Museum inside small fee.",c:["free_museum"],r:"g",nn:"Rotunda — Wały Chrobrego #95",ns:"Okrągła hala wystawiennicza z 1913 r. na tarasie — teraz muzeum, zawsze architektonicznie niezwykła",nst:"Rotunda na Wałach Chrobrego zbudowana w 1913 r. jako sala wystawiennicza.",nt:"Zewnątrz bezpłatny. Muzeum wewnątrz mała opłata."},
