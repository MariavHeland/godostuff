const P = [
  {id:1,n:"Nairobi National Park — Urban Wildlife Reserve",a:"Nairobi National Park",v:["nature", "hidden", "wildlife"],d:45,s:"One of Africa's few urban wildlife reserves with lions, zebras, giraffes, and rhinos visible from the city skyline in the background.",st:"Nairobi National Park, established in 1946, is unique: a wildlife reserve surrounded by a major African city. The park contains diverse ecosystems: grasslands, acacia forests, rocky outcrops, and the Nairobi River. Large predators—lions, leopards, cheetahs—hunt here; herbivores—zebras, giraffes, buffalo, antelopes—graze openly. Early morning safari drives offer the best wildlife viewing and wildlife photography. The dramatic element is the city skyline visible in the distance: you're watching wild animals against Nairobi's urban backdrop, an unusual juxtaposition. The park is smaller than other Kenyan reserves but remarkably biodiverse. It's accessible for day-trippers from the city, making it a convenient introduction to Kenyan wildlife.",im:"A lion crosses the savanna grasslands as the Nairobi skyline rises on the horizon; acacia trees dot the landscape; the contradiction of wild and urban visible.",t:"Located south of downtown Nairobi (20 minutes by car). Entry fee required. Open dawn to dusk. Best wildlife viewing is early morning (6-9am). Safari vehicles can be rented with drivers. Go on a weekday to avoid weekend crowds. Bring binoculars and camera.",c:[],r:"g",nn:"Nairobi National Park",ns:"Hifadhi ya kinyama ya jijini na kilicho kadhaa milimani",nst:"Hifadhi ya kinyama inayojamba kwa jiji; simba, kiboko, twiga, na nyani vidogo; mtazamo wa jijini unaingia.",nt:"Kusini juu ya kati (20 dakika gari). Ada ya kuingia inahitajika. Jua na jioni hadi magharibi. Sehemu nzuri ni asubuhi. Magari ya safari inaweza kukamatia."},
  {id:2,n:"Giraffe Centre — Endangered Species Sanctuary",a:"Langata",v:["wildlife", "nature", "hidden"],d:30,s:"A sanctuary for endangered Rothschild's giraffes where visitors can feed giraffes by hand from an elevated platform, supporting conservation.",st:"The Giraffe Centre cares for endangered Rothschild's giraffes. Once, thousands of these giraffes roamed East Africa; habitat loss reduced them to several hundred. The center's conservation program breeds giraffes and releases them to protected areas. Visitors can interact with giraffes from an elevated feeding platform: holding out food pellets, watching the giraffe's long tongue extend to take them. The experience is intimate and moving—the giraffe's gentle nature, the intelligence in its eyes, the realization of how endangered these creatures are. The center educates about conservation challenges and the need to protect remaining habitats. Supporting the center directly funds conservation work.",im:"A giraffe's long neck extends to mouth level as a visitor holds out food; the giraffe's tongue curls around the offering; the moment intimate and unforgettable.",t:"Located in Langata, south of downtown Nairobi (20-30 minutes by car). Admission fee required. Allow 1-2 hours. Go early morning when giraffes are most active. Bring cash for the feeding pellets. Photography is excellent. The center also operates a giraffe research facility.",c:[],r:"g",nn:"Giraffe Centre",ns:"Kituo cha kifo cheguzi twiga zenye hatari sana",nst:"Twiga wa Rothschild wenye hatari inayokamatia; wageni wanaweza kumkamata mtunda moja kwa mkono.",nt:"Langata, kusini juu ya kati (20-30 dakika gari). Ada inahitajika. Permita 1-2 saa. Asubuhi kumbukata. Peleti zaidi kwa kumkamata twiga."},
  {id:3,n:"National Museum of Kenya",a:"Museum Hill",v:["history", "art", "culture"],d:40,s:"Kenya's premier museum documenting natural history, paleontology (including Lucy's fossil relative), art, and cultural heritage.",st:"The National Museum of Kenya houses extensive collections: paleontological specimens documenting human evolution and prehistoric Kenya; ethnographic materials from Kenya's 40+ ethnic groups; contemporary Kenyan art; and natural history specimens. The museum's paleontology collection includes fossils of ancient hominins—humans' evolutionary ancestors. Natural history galleries showcase Kenya's extraordinary biodiversity: the mammals, birds, reptiles, and insects found across the country's varied ecosystems. The ethnographic galleries document how Kenya's diverse communities have lived—traditional crafts, languages, spiritual beliefs, and material cultures. The museum provides essential context for understanding Kenya's history, natural heritage, and cultural diversity.",im:"A display case shows fossil skulls of ancient hominins arranged chronologically, revealing evolutionary progression; explanatory text documents the scientific narrative.",t:"Located on Museum Hill in central Nairobi. Metro or taxi accessible. Admission required (modest cost). Open daily. Allow 2-3 hours. The paleontology section is particularly strong. English labels throughout. Excellent gift shop and café.",c:[],r:"g",nn:"National Museum of Kenya",ns:"Mkutanombongo mahimu wa Kenya yenye ukumbufu na hadithi",nst:"Mkutano huu una nchi ya wanadamu kwa majani; fossils ya kuna sana; walimu wenye sana.",nt:"Museum Hill katikati ya Nairobi. Metro au teksi inayoweza kutumia. Ada inahitajika. Abubuzi kila siku. Permita 2-3 saa. Paleontolojia sehemu kubwa."},
  {id:4,n:"Nairobi Street Art Scene — Contemporary Urban Culture",a:"Kamukunji and Eastleigh",v:["art", "local", "hidden"],d:25,s:"Nairobi's vibrant street art scene with murals, graffiti, and contemporary visual culture in neighborhoods like Kamukunji and Eastleigh.",st:"Nairobi's street art culture has exploded in recent years. Young artists paint murals on buildings in various neighborhoods—Kamukunji, Eastleigh, Kibera—addressing social issues, celebrating Kenyan culture, and creating urban beauty. The art is political and personal: images of independence heroes, contemporary activists, cultural pride, social commentary on inequality and environmental issues. Walking neighborhoods with active street art, you encounter vibrant contemporary culture being created in real-time. Some murals are ephemeral—painted over, fading—representing the transient nature of street art. Street art tours led by local artists offer deeper insight into the meanings, the artists, and the communities creating this culture.",im:"A massive mural covers a building wall: a portrait of a Kenyan independence hero rendered in bold colors, surrounding buildings also painted with artistic work.",t:"Located throughout Nairobi in various neighborhoods. Best explored with a local street art tour guide. Allow 2-3 hours. Go during daylight. The tours support local artists. Photography appreciated by many artists. Respect private property and ask before photographing commercial/residential spaces.",c:[],r:"g",nn:"Nairobi Street Art Scene",ns:"Sanaa ya barabara na inchi ya sasa inayojumlisha Nairobi",nst:"Waanzi kuona sasa wanachora juu ya nyumba; sanaa inajumlisha ukamilifu, kufa, na kujikumbuka kama jamii.",nt:"Jujuu kwa Kamukunji na Eastleigh. Pamoja na mwenye kuzida. Permita 2-3 saa. Mchana tu. Kusanya ajali ukitaka kupigia picha."},
  {id:5,n:"David Sheldrick Wildlife Trust — Elephant Orphanage",a:"Langata",v:["wildlife", "nature", "hidden"],d:35,s:"A sanctuary caring for orphaned elephants whose mothers were killed by poachers, with daily public feeding times and rescue/rehabilitation programs.",st:"The David Sheldrick Wildlife Trust cares for orphaned elephants—young animals whose mothers were killed by poachers. The trust provides 24-hour care, specialized feeding, veterinary treatment, and eventually reintroduction to protected areas. Visitors can watch the daily public feeding (usually 11am-noon) where orphaned elephants are brought to interact with caretakers and visitors. Seeing baby elephants—some only weeks old, traumatized by witnessing their mothers' deaths—playing, being cared for, and gradually healing is profoundly moving. The work addresses poaching's devastating impact on elephant populations. Supporting the trust through entrance fees funds conservation and anti-poaching efforts. The experience connects emotional response to orphaned elephants with broader conservation urgency.",im:"A baby elephant, a few months old, approaches visitors during feeding time, its trunk exploratory, caretakers guiding the interaction, visitors deeply moved.",t:"Located in Langata, south of Nairobi (20-30 minutes by car). Admission fee required (substantial, supporting care). Daily feeding at 11am-noon. Allow 1-2 hours. Go early to arrive before crowds. Bring cash if possible (supports the program directly). Photography allowed. The experience is emotionally powerful.",c:[],r:"g",nn:"David Sheldrick Wildlife Trust",ns:"Mahukumu ya tembo wenye yatimakazi walifu na wakamatia",nst:"Mahakama anayetunza tembo wazeeni walifu; wakamatia wa wazazi wenye maajabu; kusangana kila siku na tembo wajeuni.",nt:"Langata, kusini juu ya Nairobi. Ada inahitajika. Kumkamata kila siku 11h-12h. Permita 1-2 saa. Asubuhi tu. Kumkamata tembo wezeeni."},
  {id:6,n:"Nairobi Railway Station — Colonial Heritage Architecture",a:"Downtown Nairobi",v:["history", "architecture", "hidden"],d:20,s:"A grand Edwardian railway station built by the British in 1899, representing Kenya's colonial history and transportation heritage.",st:"Nairobi's railway station, completed in 1899, is a magnificent Edwardian structure. The British built the railway to facilitate colonial extraction of resources and establish administrative control. The station's architecture—with its high ceilings, ornate detailing, and grand scale—announces European power. Walking through the station, you encounter both historical grandeur and contemporary reality: trains still depart, the building functions as transit hub, but the grandeur is faded. The station represents colonialism's physical infrastructure: beautiful but built through coercion, extraction, and violence. Contemporary efforts document this complex history, resisting simple nostalgia for 'colonial architecture' while acknowledging the building's actual significance.",im:"The railway station's grand facade glows in afternoon light; passengers move through the terminal; the ornate interior visible through tall windows.",t:"Located in downtown Nairobi. Walking distance from city center. Accessible to visitors (though security may limit areas). Allow 30-45 minutes to explore. Photography usually permitted in public areas. Go during daytime for safety and visibility.",c:[],r:"g",nn:"Nairobi Railway Station",ns:"Kituo cha reli cha Edwadi kilichojengwa na Wabritani mwaka 1899",nst:"Jengo linajumlisha umeme wa Wabritani; inatumika leo lakini ukali wa kukolonea inakumbuka.",nt:"Katikati ya Nairobi. Kwa miguu kutoka kati. Kutembelea inaweza kwa wote. Permita 30-45 dakika. Picha kawaida inakubali. Mchana tu."},
  {id:7,n:"Karen Blixen House — Colonial Literary Legacy",a:"Karen",v:["history", "hidden", "culture"],d:30,s:"The former home of Danish author Karen Blixen (who wrote 'Out of Africa'), preserved as a museum documenting colonial Kenya through her perspective.",st:"Karen Blixen (pen name Isak Dinesen) lived in Kenya 1914-1931 and wrote the famous memoir 'Out of Africa' about her experiences. Her house, preserved as a museum, offers insight into colonial Kenya's aesthetics and power structures. The house is beautifully furnished, surrounded by gardens, and represents European settler lifestyle. The museum provides Blixen's narrative, but contemporary interpretation also includes critical perspective: Blixen's work romanticized colonialism; she benefited from colonial systems that dispossessed Kenyans. Walking the house and gardens, you encounter the elegant lifestyle colonialism created for European settlers and the silenced Kenyan voices in Blixen's narrative.",im:"A colonial-era bedroom with period furniture, high ceilings, and large windows overlooking manicured gardens; the setting elegant and historically layered.",t:"Located in Karen neighborhood, south of Nairobi (20-30 minutes by car). Admission fee required. Open daily. Allow 1-2 hours. The house and gardens are beautifully maintained. Photography allowed in most areas. The museum shop has books about Blixen and Kenya.",c:[],r:"g",nn:"Karen Blixen House",ns:"Nyumba ya mwanzi Karen Blixen yenye hadithi ya koloni",nst:"Nyumba ya Dane Karen Blixen; inaandika 'Out of Africa'; museumi inajumlisha mtazamo wa koloni.",nt:"Karen, kusini juu ya Nairobi. Ada inahitajika. Abubuzi kila siku. Permita 1-2 saa. Nyumba na bustani vizuri. Picha inakubali."},
  {id:8,n:"Masai Mara National Reserve — Safari Experience (Day Trip)",a:"Masai Mara (Day Trip)",v:["nature", "wildlife", "sacred"],d:480,s:"Kenya's most famous wildlife reserve, home to the Great Migration of wildebeest, lions, elephants, and Maasai cultural heritage.",st:"Masai Mara is one of Africa's most extraordinary ecosystems. In the dry season (July-October), millions of wildebeest migrate from Tanzania's Serengeti, crossing crocodile-filled rivers in a spectacular wildlife event. The reserve hosts the highest concentration of predators in Africa: lions, leopards, cheetahs, hyenas hunt alongside massive herbivore populations. The landscape is savanna grassland with acacia trees. The reserve is also Maasai ancestral land; the Maasai people coexist with wildlife. Visiting requires respecting Maasai cultural presence—not treating the landscape as empty wilderness but as Maasai homeland. Responsible tourism supports both wildlife conservation and Maasai communities. Early morning and evening safari drives offer the best wildlife viewing.",im:"Thousands of wildebeest pour across a river as crocodiles lie in wait; lions watch from nearby; the landscape teeming with life and predator-prey drama.",t:"Located 270km west of Nairobi (4-5 hours by car). Accessible by domestic flight (1 hour) or overland drive. Most visitors stay overnight to experience sunrise/sunset game drives. Accommodation ranges from budget to luxury. Entry fees required. Best season is July-October (Great Migration). Go with reputable operators who benefit local Maasai.",c:[],r:"g",nn:"Masai Mara National Reserve",ns:"Hifadhi ya kinyama na ardhi ya Wamasai wenye hadithi",nst:"Hadithi ya nusu milioni wildebeest; simba, chui, cheta; ardhi ya Wamasai inakumbuka.",nt:"270km kulia juu ya Nairobi. Ndege (1h) au gari (4-5h). Kwa usiku kwa ajali. Kumkamata asubuhi na jioni. Julio-Oktoba heri sana."},
  {id:9,n:"Kibera — Largest Slum and Community Reality",a:"Kibera",v:["local", "culture", "hidden"],d:30,s:"Africa's largest slum neighborhood, home to over 1 million residents, requiring respectful community-based tourism and support for grassroots initiatives.",st:"Kibera is often described as Africa's largest slum—a sprawling neighborhood of approximately 1 million residents living in dense, informal settlements. The area emerged as a squatter settlement; residents were denied official ownership and services. Kibera faces challenges: limited water and sanitation, limited electricity, inadequate healthcare and education. Yet Kibera is not simply a place of poverty; it's a thriving community with street vendors, small shops, churches, schools, and strong social networks. Respectful tourism involves visiting with community guides from Kibera who offer authentic perspective, counter stereotypes, and direct income to residents. Tours might include visits to community organizations, social enterprises, schools, or homes of residents willing to share. The experience is humbling and reveals human agency and resilience within systemic constraint.",im:"Narrow pathways wind between informal structures; vendors sell goods from small shops; children play in lanes; community life bustles.",t:"Located southwest of downtown Nairobi (accessible by taxi). Visit only with registered community guide or tour operator. Allow 2-3 hours. Go during daylight. Respect privacy and ask permission before photographing residents. Support community guides and enterprises. Go with genuine interest and humility.",c:[],r:"g",nn:"Kibera",ns:"Kijiji kinene sana na kumkamata kwa watu wenye hatari",nst:"Nusu milioni watu wanakaa; kumkamata kwa kumkamata na kusagana; kumkamata kwa heshima tu.",nt:"Kulia kusini juu ya kati. Pamoja na mwenye kuchangia jamii. Permita 2-3 saa. Mchana tu. Husika kwa kumkamata."},
  {id:10,n:"Nairobi Central Park — Urban Green Space",a:"Downtown Nairobi",v:["nature", "local", "hidden"],d:25,s:"A 15-hectare public park in downtown Nairobi with walking trails, diverse bird species, and peaceful green space amid urban density.",st:"Nairobi Central Park, formerly City Park, was redesigned and reopened to provide public green space. The park contains forests, walking trails, and a small wetland. Despite being surrounded by dense urban development, the park harbors significant biodiversity: over 300 bird species have been recorded, plus mammals, reptiles, and insects. The park serves locals as a recreation space—joggers, walkers, families on weekends. The park's commitment to public access and conservation represents counter-narrative to privatization of urban space. Walking the park on a weekday morning, you encounter local Nairobi residents engaging with nature.",im:"A forested trail winds through green vegetation; birds call overhead; urban buildings visible beyond the tree line; the space peaceful and surprising.",t:"Located in downtown Nairobi. Walking distance or short drive from city center. Admission fee required (modest). Open daily. Allow 1-2 hours for a peaceful walk. Early morning best for bird watching and exercise. The trails are easy to moderate.",c:[],r:"g",nn:"Nairobi Central Park",ns:"Bustani ya jiji yenye hazina ya ndege na uoto",nst:"Hektari 15 katikati juu ya Nairobi; ndege 300 juu; kumkamata kwa watu wenye ndoto.",nt:"Nairobi kati. Mwendo au gari fupi. Ada inahitajika. Abubuzi kila siku. Permita 1-2 saa. Asubuhi nzuri kwa ndege."},
  {id:11,n:"Nairobi Arboretum — Tree Sanctuary",a:"Nairobi",v:["nature", "beautiful", "hidden"],d:30,s:"A 33-hectare tree sanctuary featuring native and exotic species, walking trails, bird watching, and peaceful natural setting.",st:"The Nairobi Arboretum, established in 1907, preserves and documents Kenya's diverse tree species and serves as research center for forestry. The arboretum contains over 350 tree species: indigenous Kenyan species and introduced species. Walking the arboretum, you experience Kenya's botanical diversity. The tall trees create shaded cool spaces—refuges from the city's heat and intensity. Bird watching is excellent; the trees attract numerous species. The arboretum serves both conservation and recreational functions: educating about Kenya's forest heritage while providing public access to natural spaces. The peaceful atmosphere and botanical focus create contemplative experience distinct from other Nairobi attractions.",im:"Tall trees create a forest canopy overhead; filtered light creates dappled paths; birds call; the urban world feels distant.",t:"Located in Nairobi (accessible by taxi or car). Admission fee required (modest). Open daily. Allow 1-2 hours for a leisurely walk. Morning visits offer best bird watching and cooler temperatures. The trails are easy. Bring water and binoculars for bird watching.",c:[],r:"g",nn:"Nairobi Arboretum",ns:"Bustani ya miti yenye ndege na kumkamata",nst:"Miti 350 inakaa; ndege katika miti; kumkamata kwa watu wenye ndoto.",nt:"Nairobi. Teksi au gari. Ada inahitajika. Abubuzi kila siku. Permata 1-2 saa. Asubuhi nzuri kwa ndege."},
  {id:12,n:"Nairobi Stock Exchange — Economic Hub",a:"Downtown Nairobi",v:["history", "architecture", "local"],d:20,s:"East Africa's oldest and largest stock exchange, representing Kenya's role as economic hub, with modern trading floors and financial institutions.",st:"The Nairobi Stock Exchange, established in 1954 during the colonial period, represents Kenya's emergence as East Africa's economic center. The exchange facilitates trading of securities, investment funds, and government bonds. The modern trading floor uses electronic systems; the building architecture reflects contemporary financial sector. The exchange's existence and prominence reflect Kenya's colonial history (infrastructure built to serve colonial extraction), post-colonial positioning (Kenya as regional economic power), and contemporary reality (investment and finance concentrated in Nairobi). Visiting or learning about the exchange provides context for understanding Nairobi's role in East African and African economics. Tours may be available for those interested in understanding financial systems and Kenya's economic structure.",im:"A modern trading floor with electronic displays showing stock prices; financial professionals monitor markets; the pace fast and focused.",t:"Located in downtown Nairobi. Limited public access; tours may require advance arrangements. Allow 30-45 minutes. Photography may be restricted. Go with genuine interest in understanding Kenya's economy.",c:[],r:"g",nn:"Nairobi Stock Exchange",ns:"Soko la hisa ya Uraia unaojumlisha kiuchumi",nst:"Soko la 1954; inakaa kiuchumi wa Afrika Mashariki; kumkamata kwa watu wenye ndoto.",nt:"Katikati ya Nairobi. Kumkamata inaweza kuwajali. Permita 30-45 dakika. Hati zingine zinaweza kukamatia."},
  {id:13,n:"Westlands Shopping District — Contemporary Urban Culture",a:"Westlands",v:["local", "architecture", "food"],d:30,s:"An upscale neighborhood with shopping centers, restaurants, galleries, and representing contemporary Nairobi's cosmopolitan culture.",st:"Westlands is Nairobi's most developed and affluent neighborhood—a place of shopping centers, upscale restaurants, galleries, and international hotels. The neighborhood contrasts sharply with Kibera or other areas: manicured, wealthy, cosmopolitan. Westlands represents contemporary Nairobi's aspirations and class divisions. Walking Westlands, you encounter the global middle and upper class: international franchises, expensive cars, English-language signage, international cuisine. The neighborhood offers insight into Nairobi's economic and social stratification: wealth concentration and inequality made visible through urban geography. Shopping, dining, and gallery visiting are possible here, though the experience reflects privilege and exclusion.",im:"Modern shopping centers with international brands; upscale restaurants with outdoor seating; manicured landscapes; the neighborhood clean and wealthy.",t:"Located northwest of downtown Nairobi (20-30 minutes by car). Easily accessible by taxi. Free to walk and explore. Shopping and dining at various price points within the wealthy range. The neighborhood is safe and cosmopolitan. Go to understand Nairobi's economic divides.",c:[],r:"g",nn:"Westlands",ns:"Kumkamata ya jiji yenye kumkamata na kumkamata",nst:"Jiji linajumlisha kumkamata ya Nairobi; kilichonihitaji kumkamata na kumkamata.",nt:"Kulia kulia juu ya kati. Teksi inaweza kuja. Kumkamata kwa wote. Kumkamata ya jiji."},
  {id:14,n:"Nairobi War Cemetery — Historical Military Site",a:"Parklands",v:["history", "hidden", "architecture"],d:25,s:"A well-maintained cemetery for Commonwealth soldiers killed in East Africa during World War II, representing colonial and military history.",st:"The Nairobi War Cemetery preserves graves of Commonwealth soldiers who died in East Africa during World War II. The cemetery is beautifully maintained with rows of headstones in a peaceful garden setting. The stones record names, units, dates of death, and ages—many soldiers were in their early twenties. The cemetery documents World War II's global reach: the war was fought in East Africa as Italy controlled Abyssinia and Somaliland. The cemetery represents both human loss and colonial military structures. Walking the cemetery, you encounter history made tangible: individual deaths aggregated into historical events. The cemetery also reflects colonialism's racial hierarchies; some sections honor European soldiers while other sections are segregated.",im:"Rows of white headstones in neat formations; each stone bearing a name and date; the garden peaceful and contemplative; the scale revealing war's vastness.",t:"Located in Parklands, north of downtown (15-20 minutes by car). Free admission. Open daily. Allow 30-45 minutes. Respectful behavior required. Photography permitted. The maintenance and care are exemplary.",c:[],r:"g",nn:"Nairobi War Cemetery",ns:"Kaburi la milite yenye kumkamata na kumkamata",nst:"Kaburi la wanajeshi wa Wabritani; kumkamata ya Dunia Pili; kumkamata juu ya kumkamata.",nt:"Parklands, kulia juu. Kumkamata gratuita. Abubuzi kila siku. Permita 30-45 dakika. Heshima inahitajika."},
  {id:15,n:"Maasai Market — Street Vendors and Crafts",a:"Multiple Locations",v:["local", "culture", "food"],d:20,s:"A sprawling outdoor market with street vendors selling crafts, textiles, jewelry, and goods representing Kenyan and East African artisan culture.",st:"The Maasai Market is not a single location but rather a collection of street markets throughout Nairobi where vendors sell crafts, textiles, jewelry, and goods. The market represents grassroots economy: vendors are individual artists, craftspeople, and traders selling directly to customers. The goods reflect Kenyan artisan traditions: beaded jewelry, carved wooden items, colorful textiles, leather goods. The market is chaotic, vibrant, and authentic—a space where local commerce happens. Bargaining is expected and part of the culture. The market offers opportunities to support artisans directly and acquire authentic Kenyan crafts. The energy and colors of the market provide vivid experience of Nairobi's street culture.",im:"A street vendor arranges colorful beaded jewelry on a table; surrounding tables display carved wood, textiles, and crafts; hundreds of vendors fill the market.",t:"Markets located throughout Nairobi; main concentration often near Nairobi Central Park or along streets in downtown. Best visited during daylight hours (8am-5pm). Bring cash for bargaining. Respect vendors' space and ask before photographing. The experience is overwhelming but rewarding. Bargaining is expected and respectful.",c:[],r:"g",nn:"Maasai Market",ns:"Soko la harusi na kumkamata za sanaa",nst:"Soko la juu linajumlisha maajabu na kumkamata za Wamasai na Wafriki Mashariki.",nt:"Soko juu ya Nairobi. Mchana (8h-17h) nzuri. Kumkamata kwa kumkamata. Heshima kwa wauzaji. Kumkamata inahitajika."},
  {id:16,n:"Hell's Gate National Park — Geothermal Landscape (Day Trip)",a:"Hell's Gate (Day Trip)",v:["nature", "geology", "beautiful"],d:360,s:"A unique national park 90km northwest with dramatic canyon, hot springs, geothermal power station, and hiking trails.",st:"Hell's Gate National Park, located on Kenya's Rift Valley, features a dramatic gorge with steep red cliffs rising from the valley floor. The park's distinctive feature is geothermal activity: hot springs, steam vents, and a geothermal power station generate much of Kenya's electricity. The landscape is dramatic and otherworldly: red earth, sparse vegetation, and geological forces made visible. Visitors can hike through the gorge, encounter wildlife (zebras, antelopes, buffalo), and observe geothermal features. The combination of natural beauty and evidence of human energy production (the power station) creates interesting juxtaposition. The park is accessible as a day trip from Nairobi.",im:"A narrow gorge with sheer red cliffs rises hundreds of meters on both sides; a stream runs through the bottom; steam vents visible, the landscape geologically active.",t:"Located 90km northwest of Nairobi (1.5-2 hours by car). Entry fee required. Open daily. Hiking trails of various difficulty. Allow 4-6 hours including travel time. Bring water, sunscreen, and good shoes. Early morning is best for wildlife and avoiding heat.",c:[],r:"g",nn:"Hell's Gate National Park",ns:"Hifadhi yenye joto la kumkamata na kumkamata",nst:"Kumkamata ya Rift Valley; kufa moto; kumkamata ya juu.",nt:"90km kulia juu. 1.5-2h gari. Ada inahitajika. Abubuzi kila siku. Permita 4-6h. Nzuri asubuhi."},
  {id:17,n:"Uhuru Park — Independence Monument",a:"Downtown Nairobi",v:["history", "local", "architecture"],d:20,s:"A public park with monuments to Kenya's independence movement, including a statue of Jomo Kenyatta, representing national identity.",st:"Uhuru Park commemorates Kenya's independence from British colonial rule, achieved in 1963. The park features monuments including a statue of Jomo Kenyatta, Kenya's first president. The park serves as gathering space for celebrations on Kenya's Independence Day (December 12). The monuments assert Kenyan sovereignty and national identity. Walking the park, you encounter history made material: statues, plaques, and spaces dedicated to independence struggle and post-independence nation-building. The park is popular with locals—joggers, families, political demonstrations—making it an active space of civil society.",im:"A large statue of Jomo Kenyatta dominates the park; Kenyan flags fly; the park green and well-maintained; locals enjoying the space.",t:"Located in downtown Nairobi. Walking distance from city center. Free admission. Open daily. Allow 30 minutes. The monuments are the main attraction. Safe during daytime. Go to understand Kenya's postcolonial identity.",c:[],r:"g",nn:"Uhuru Park",ns:"Bustani ya kumkamata ya Kenya na kumkamata",nst:"Kumkamata ya kumkamata 1963; kumkamata ya Kenyatta; kumkamata ya kilichonihitaji.",nt:"Katikati ya Nairobi. Mwendo mwendo. Kumkamata gratuita. Abubuzi kila siku. Permita 30 dakika."},
  {id:18,n:"Nairobi Museum of Modern Art",a:"Westlands",v:["art", "culture", "hidden"],d:30,s:"A contemporary art museum showcasing Kenyan and African modern and contemporary art, with rotating exhibitions.",st:"The Nairobi Museum of Modern Art (or various smaller contemporary galleries) showcase Kenyan and African contemporary artists. The work often addresses social issues—inequality, identity, colonialism's legacy, environmental concerns. Contemporary African art is internationally recognized but often underrepresented; supporting local galleries and museums helps center African artistic voices. The galleries range from small independent spaces to larger institutions. Visiting contributes to understanding Kenya's creative culture and supporting artists.",im:"A gallery displays abstract paintings and installations; the work exploring contemporary Kenyan experiences and global artistic trends.",t:"Located in various neighborhoods (particularly Westlands and downtown). Admission typically modest or free. Hours vary. Allow 1-2 hours. Photography often permitted (ask ahead). Go with interest in contemporary African art.",c:[],r:"g",nn:"Nairobi Museum of Modern Art",ns:"Museumi ya sanaa ya kisasa ya Kenya na Afrika",nst:"Sanaa inajumlisha kumkamata ya kumkamata na kumkamata.",nt:"Westlands na kati. Ada inahitajika kawaida. Abubuzi inatofautiana. Permita 1-2 saa. Picha kawaida."},
  {id:19,n:"Langata Giraffe Centre Trail",a:"Langata",v:["nature", "wildlife", "beautiful"],d:25,s:"A walking trail through fynbos-like habitat south of Nairobi with wildlife viewing and botanical interest, connecting to Giraffe Centre.",st:"The area surrounding the Giraffe Centre includes walking trails through native habitat. The landscape is characterized by acacia trees, grasslands, and thorny vegetation. Walking offers opportunities to see birds, antelopes, and occasionally larger mammals. The trails are moderate difficulty and accessible to most visitors. The botanical environment is interesting: adapted to East African climate with water-conserving characteristics. Combining Giraffe Centre with surrounding trail walking offers more complete ecological experience than Giraffe Centre alone.",im:"A walking path winds through acacia trees; birds call overhead; the landscape open and grassy; distant views of surrounding areas.",t:"Located in Langata, south of Nairobi (20-30 minutes by car). Access through Giraffe Centre or nearby parks. Trails are well-marked. Allow 1-2 hours for a moderate walk. Go early morning for best wildlife viewing and cooler temperatures.",c:[],r:"g",nn:"Langata Giraffe Centre Trail",ns:"Njia ya kumkamata kwa kumkamata na kumkamata ya twiga",nst:"Njia inaonyesha kumkamata na kumkamata ya ardhi; ndege na antelope kawaida.",nt:"Langata, kusini. Ada inahitajika. Njia za kumkamata. Permita 1-2 saa. Asubuhi nzuri."},
  {id:20,n:"Kenyatta International Convention Centre — Modern Architecture",a:"Downtown Nairobi",v:["architecture", "modern", "hidden"],d:20,s:"A modernist landmark building completed in 1973, representing Kenya's post-independence architectural ambitions with distinctive cylindrical design.",st:"The Kenyatta International Convention Centre (KICC), completed in 1973, is an iconic modernist structure. The building's distinctive cylindrical form was considered revolutionary; its height made it Nairobi's tallest building for many years. The building represents post-independence Kenya's optimism and architectural ambitions. Walking around or inside the building (depending on access), you encounter impressive modernist design. The building functions as conference center and cultural venue. It represents a moment in Kenyan history when architectural forms expressed national aspirations.",im:"The cylindrical glass and steel structure rises prominently from downtown; the distinctive form visible from many angles across the city.",t:"Located in downtown Nairobi. Walking distance from city center. Exterior viewing is free; interior access may require attending an event or having a guide. Allow 15-30 minutes to appreciate the architecture. The design is considered significant in modernist architecture history.",c:[],r:"g",nn:"Kenyatta International Convention Centre",ns:"Jengo la kumkamata linajumlisha kumkamata ya kumkamata",nst:"Jengo linalojumlisha kumkamata ya kumkamata 1973; kumkamata ya kumkamata.",nt:"Katikati ya Nairobi. Mwendo kutoka kati. Kumkamata ya nje gratuita. Permata 15-30 dakika."},
  {id:21,n:"Nairobi Reptile Park",a:"Nairobi",v:["wildlife", "nature", "hidden"],d:30,s:"A facility housing various reptile species native to Kenya, with educational programs about reptile ecology and conservation.",st:"The Nairobi Reptile Park houses numerous reptile species: snakes, lizards, crocodiles, and tortoises found in Kenya and East Africa. The park serves both educational and conservation functions: teaching about reptiles' ecological roles and supporting conservation of threatened species. Walking through the park, you encounter reptiles in semi-naturalistic enclosures. Staff provide information about species characteristics, habitats, and threats. Reptiles are often feared and misunderstood; the park aims to shift perspectives and build appreciation for these animals' importance.",im:"A large crocodile rests in water; nearby, a colorful lizard climbs; various snakes are displayed in terrariums with natural substrate.",t:"Located in Nairobi (accessible by taxi or car). Admission fee required (modest). Open daily. Allow 1-2 hours. Educational staff available. Photography usually permitted. Good for families and those interested in herpetology.",c:[],r:"g",nn:"Nairobi Reptile Park",ns:"Bustani ya kumkamata yenye kupiga na kumkamata",nst:"Kupiga na kumkamata ya Kenya; kumkamata ya kumkamata.",nt:"Nairobi. Teksi au gari. Ada inahitajika. Abubuzi kila siku. Permita 1-2 saa."},
  {id:22,n:"Nairobi Gallery Routes — Art Galleries and Studios",a:"Various Locations",v:["art", "culture", "hidden"],d:30,s:"Self-guided or group routes through contemporary art galleries and artist studios showcasing Kenyan and East African artists.",st:"Nairobi has a vibrant contemporary art scene with galleries in various neighborhoods. Galleries showcase Kenyan artists working in painting, sculpture, photography, video, and installation. Many galleries are artist-run or support emerging artists. Gallery routes and art walks offer curated experiences through multiple galleries. The art often addresses contemporary Kenyan social issues, cultural identity, and aesthetic explorations. Supporting galleries and buying art directly supports artists. Group gallery walks led by curators or artists offer deeper insight into artistic practice and contemporary art discourse.",im:"A gallery wall displays colorful paintings; visitors study the work intently; the artist visible in an adjacent studio space working.",t:"Galleries located throughout Nairobi (particularly Westlands, downtown, Karura Forest area). Gallery walks can be self-guided or organized. Admission typically free or modest. Hours vary. Allow 2-3 hours for multiple gallery visits. Go Thursday evenings for openings and social atmosphere.",c:[],r:"g",nn:"Nairobi Gallery Routes",ns:"Rota ya kumkamata kwa kumkamata ya Kenya",nst:"Kumkamata za kisasa za Kenya na Afrika; kumkamata ya kumkamata.",nt:"Juu ya Nairobi. Njia inaweza kuwa inajifunza. Ada kawaida gratuita. Permita 2-3 saa. Kamis akwama kwa uwazi."},
  {id:23,n:"Karura Forest Reserve — Urban Forest Sanctuary",a:"Karura",v:["nature", "beautiful", "hidden"],d:40,s:"A 2,000-hectare forest reserve within metropolitan Nairobi with waterfalls, walking trails, biodiversity, and historical caves.",st:"Karura Forest Reserve is a remarkable urban oasis—a 2,000-hectare indigenous forest surrounded by the sprawling city. The forest contains numerous ecological zones, waterfalls, streams, and wildlife. Walking trails range from easy to challenging. Karura has significant cultural and historical importance to Kikuyu people: sacred sites, caves, and spiritual significance persist. The forest has undergone environmental degradation from human encroachment; conservation efforts work to restore and protect it. Walking Karura, you encounter a deeply biodiverse ecosystem: towering indigenous trees, bird calls, peaceful streams. The forest provides psychological and physical respite from urban intensity. The juxtaposition of pristine forest within a city of millions is remarkable.",im:"A waterfall cascades over rocks in the forest; surrounding vegetation dense and green; a walking path winds through the forest floor.",t:"Located within Nairobi (accessible by taxi or car). Admission fee required. Open daily but hours vary. Allow 2-4 hours for a walk. Go with a guide for safety and to learn forest ecology and cultural history. Bring water. The forest is beautiful year-round.",c:[],r:"g",nn:"Karura Forest Reserve",ns:"Msitu wa kumkamata na kumkamata katikati juu ya Nairobi",nst:"Msitu wa kumkamata; kumkamata ya Kikuyu; kumkamata ya kumkamata.",nt:"Nairobi. Teksi au gari. Ada inahitajika. Abubuzi kila siku. Permata 2-4 saa. Pamoja na mwenye kuchangia."},
  {id:24,n:"Nairobi Dinner and Dance Shows — Cultural Entertainment",a:"Various Venues",v:["culture", "local", "food"],d:30,s:"Evening entertainment venues featuring Kenyan dance, music, and traditional food, offering cultural immersion in festive setting.",st:"Several venues throughout Nairobi offer dinner and dance shows featuring Kenyan and East African music, dance, and food. Performers in traditional costumes dance; live bands play; visitors dine on Kenyan cuisine. The shows are somewhat touristy but offer introduction to Kenyan cultural expressions. The food is authentic; the energy is festive. Shows vary in quality and authenticity; some prioritize spectacle over genuine cultural representation. Seeking shows that employ local artists and support cultural practitioners ensures tourism benefits communities. The experience offers evening entertainment and cultural exposure.",im:"Dancers in vibrant traditional clothing perform on stage; diners eat and watch; the venue energetic and festive; musicians play live traditional music.",t:"Venues located throughout Nairobi (particularly downtown and Westlands). Advance booking recommended. Admission includes dinner. Allow 3-4 hours. Photography usually permitted. Go to experience Kenyan cultural performances and cuisine.",c:[],r:"g",nn:"Nairobi Dinner and Dance Shows",ns:"Kumkamata ya kumkamata na kumkamata ya kumkamata",nst:"Kumkamata ya kumkamata na kumkamata ya kumkamata; kumkamata ya kumkamata.",nt:"Juu ya Nairobi. Mahitaji ya kumkamata. Ada inajumlisha kumkamata. Permata 3-4 saa. Picha kawaida."},
  {id:25,n:"Nairobi International School — Expat Community Insight",a:"Various Areas",v:["local", "hidden", "architecture"],d:20,s:"International schools in Nairobi serving expatriate and elite Kenyan families, revealing socioeconomic divisions and educational infrastructure.",st:"Nairobi hosts numerous international schools serving expatriate families and elite Kenyans. These schools (including Nairobi International School, Kenya High School, Nairobi Preparatory School) represent wealth concentration and global elite networks. The schools offer curricula often based on international standards (British, American, International Baccalaureate). The existence and prominence of international schools reflects Kenya's position in global capitalism and the presence of expatriate communities. Walking past or learning about international schools offers perspective on class divisions and educational inequality in Kenya: international schools serve the wealthy and globally-connected; public schools often lack basic resources.",im:"A school campus features modern buildings, manicured grounds, and expensive sports facilities; the contrast with surrounding neighborhoods stark.",t:"Located throughout Nairobi (particularly in affluent neighborhoods). Campus visits may require permission. Allow 30 minutes to observe exterior. The schools themselves are not primary attractions but provide insight into Nairobi's socioeconomic structure.",c:[],r:"g",nn:"Nairobi International School",ns:"Kumkamata ya kumkamata ya kumkamata",nst:"Kumkamata ya kumkamata ya kumkamata; kumkamata ya kumkamata.",nt:"Juu ya Nairobi. Kumkamata inaweza kuwajali. Permata 30 dakika. Kumkamata ya kumkamata."},
  {id:26,n:"Nairobi's Colonial Architecture Walking Tour",a:"Downtown and Surrounding",v:["history", "architecture", "hidden"],d:30,s:"A walking tour through downtown Nairobi examining colonial-era buildings, Victorian architecture, and post-colonial development.",st:"Walking Nairobi's downtown reveals architectural layers: colonial-era buildings (railway station, government buildings) standing alongside post-colonial structures and contemporary developments. Colonial architecture announces European power and governance; many buildings reflect racial hierarchies (separate entrances, segregated spaces). Post-colonial buildings represent Kenya's independent design and national aspirations. Contemporary development often demolishes older structures, erasing history. A thoughtful walking tour examines colonial architecture critically—not nostalgically preserving colonialism but understanding its material legacies and contradictions.",im:"Colonial buildings with Victorian and Edwardian styling stand alongside modern glass structures; the architectural juxtaposition visible on single street.",t:"Downtown Nairobi is walkable for those comfortable with urban environments. Tours available through tourism offices or hotels. Allow 1-2 hours. Go during daytime for safety. Wear comfortable shoes. The architecture tells Kenya's historical narrative.",c:[],r:"g",nn:"Colonial Architecture Walking Tour",ns:"Njia ya kumkamata kwa kumkamata ya kumkamata",nst:"Kumkamata ya kumkamata linajumlisha kumkamata ya kumkamata.",nt:"Katikati ya Nairobi. Njia inaweza kuwa inatumika. Permata 1-2 saa. Mchana tu. Calzado cómodo."},
  {id:27,n:"Ngong Hills — Hiking and Views",a:"Ngong",v:["nature", "views", "beautiful"],d:45,s:"A mountain range south of Nairobi offering hiking trails with panoramic views of the Great Rift Valley and surrounding landscape.",st:"The Ngong Hills, rising about 2,000 meters, offer dramatic scenery and hiking opportunities. The hills are named after Maasai warriors (ngong means 'knees'—the peaks resemble knees). On clear days, you can see across the Rift Valley to Tanzania. The hiking trails offer moderate to challenging climbs. The views from the summits are expansive and rewarding. The hills hold spiritual significance for the Maasai and other communities. Hiking requires respect for the land as sacred and culturally significant, not merely recreational. Early morning hikes offer the best views and cooler temperatures.",im:"The Ngong Hills rise dramatically; from the summit, the vast landscape spreads in all directions; the Great Rift Valley visible in the distance.",t:"Located south of Nairobi (30-40 minutes by car). Access points with parking areas. Hiking trails well-marked. Allow 3-4 hours for a summit hike. Go early morning for views and cooler temperatures. Bring water and good hiking shoes. Go with a guide for cultural context.",c:[],r:"g",nn:"Ngong Hills",ns:"Milima yenye kumkamata na kumkamata",nst:"Milima inajumlisha kumkamata ya Maasai; kumkamata ya kumkamata.",nt:"Kusini juu. 30-40 dakika gari. Kumkamata njia. Permata 3-4 saa. Asubuhi nzuri. Pamoja na mwenye kuchangia."},
  {id:28,n:"Nairobi Safari Park — Alternative Zoo Experience",a:"Nairobi",v:["wildlife", "nature", "local"],d:40,s:"A wildlife facility combining zoo animals with drive-through safari experience, allowing close observation of large animals without leaving Nairobi.",st:"Nairobi Safari Park offers a middle ground between traditional zoos and wild safari reserves. The facility has drive-through sections where you observe animals from your vehicle while remaining safe. The animals include lions, giraffes, zebras, rhinos, and other East African species. The experience is less wild than a true reserve but more interactive than most zoos. The park serves conservation and educational functions. The experience is more artificial than natural safari but offers wildlife observation for those unable or unwilling to undertake multi-day safaris.",im:"Giraffes approach the vehicle during a drive-through; visitors in the car observe the animals at close range; the animals unbothered by the vehicle.",t:"Located outside Nairobi (30-40 minutes by car). Admission fee required. Open daily. Your own vehicle or guided tour available. Allow 2-3 hours. Early morning best for wildlife activity. The experience is family-friendly.",c:[],r:"g",nn:"Nairobi Safari Park",ns:"Bustani ya kumkamata yenye kumkamata ya kumkamata",nst:"Kumkamata ya kumkamata; kumkamata ya kumkamata.",nt:"Juu juu ya Nairobi. 30-40 dakika gari. Ada inahitajika. Abubuzi kila siku. Permata 2-3 saa. Asubuhi nzuri."},
  {id:29,n:"Nairobi Street Food Tour — Culinary Culture",a:"Various Neighborhoods",v:["food", "local", "culture"],d:25,s:"Guided tours through Nairobi's street food scene sampling local dishes, learning culinary traditions, and engaging with food vendors.",st:"Street food is central to Nairobi's food culture. Vendors throughout the city sell prepared food: chapati (flatbread), samosas, nyama choma (grilled meat), ugali (cornmeal staple), various soups and vegetables. Street food reflects Kenyan culinary traditions and cultural mixing (Indian, Swahili, Kikuyu influences). Street food tours led by local guides involve tasting multiple dishes, learning about ingredients and preparation, and engaging directly with vendors. The tours support informal economy where most Nairobi residents earn livelihoods. Eating street food requires openness and trust in vendors' food safety practices.",im:"A vendor prepares chapati on a griddle; nearby, another vendor grills meat skewers; customers eat while standing; the street alive with food commerce.",t:"Tours available through tourism offices and hotels. Allow 2-3 hours. Go during typical meal times (breakfast, lunch, evening). Bring cash for vendors. Taste multiple dishes. The food is affordable and delicious. Trust in the process.",c:[],r:"g",nn:"Nairobi Street Food Tour",ns:"Njia ya kumkamata kwa kumkamata ya kumkamata",nst:"Kumkamata ya kumkamata; kumkamata ya kumkamata.",nt:"Njia inapatikana kwa kumkamata. Permata 2-3 saa. Sehemu za kumkamata. Traiga effekte. Kumkamata na kumkamata."},
  {id:30,n:"Nairobi Sunset from City Viewpoint",a:"Downtown Nairobi",v:["views", "beautiful", "local"],d:15,s:"Finding an elevated viewpoint (rooftop bar, building outlook) to watch Nairobi's sunset as the city's lights begin to glow.",st:"Watching the sunset over Nairobi from an elevated vantage point offers perspective on the city's vastness. As the sun descends, the light transforms Nairobi's landscape into shades of orange and gold. As darkness falls, the city's lights gradually glow—streetlights, building lights, vehicle lights creating a network of human occupation. The view reveals the city's scale: neighborhoods extending in all directions, the sprawl of development, the landscape's geography. Several rooftop bars and hotel viewpoints offer sunset experiences. The moment is contemplative and beautiful.",im:"The sun descends toward the horizon as Nairobi spreads below in silhouette; the sky turns orange and purple; city lights begin to glow.",t:"Rooftop bars and hotels throughout Nairobi (Westlands, downtown) offer sunset views. Allow 1 hour. Go 30 minutes before sunset to find seating and observe light change. Most venues serve food and beverages. The experience is popular but magical.",c:[],r:"g",nn:"Nairobi Sunset View",ns:"Kumkamata ya kumkamata juu ya Nairobi",nst:"Kumkamata ya kumkamata; jiji inajumlisha kumkamata.",nt:"Kumkamata ya kumkamata kwa kumkamata. Permata 1 saa. 30 dakika kabla kumkamata. Kumkamata ya kumkamata."}
,
  {id:31,n:"Oloolua Nature Trail — Waterfall and Forest Cave",a:"Karen",v:["beautiful","day_trips","swimming"],d:45,s:"A walking trail through forest in Karen neighbourhood leading to a hidden waterfall, a cave, and a historical monument—completely off the tourist maps.",st:"Oloolua Nature Trail is in Karen, a leafy neighbourhood on Nairobi's south side. The trail winds through upland forest with massive trees, eventually reaching a waterfall and a cave.",im:"Walking through forest. Tall trees blocking direct sunlight. The sound of water ahead. A small waterfall. A cave entrance. The air cool and fresh.",t:"Located in Karen neighbourhood. Take a Grab south and ask to go to Oloolua Nature Trail entrance. Entry fee: approximately 500 KES. Open daily 8am–5pm.",c:["beautiful","day_trips"],r:"y",nn:"Njia ya Kawaida ya Asili ya Oloolua",ns:"Njia ya matembezi kupitia msitu katika eneo la Karen inayoongeza kwa maji yanayoanguka.",nst:"Njia ya Kawaida ya Asili ya Oloolua iko katika Karen, eneo lenye matunda jingine kwenye upande wa kusini wa Nairobi.",nt:"Iko katika eneo la Karen. Chukua Grab kusini na omba uende kwa kuingia kwa Njia ya Kawaida ya Oloolua."},
  {id:32,n:"Karura Forest Reserve — Urban Forest Escape",a:"North of Centre",v:["beautiful","quiet","hidden"],d:30,s:"An upland forest on the outskirts of Nairobi where locals jog, walk, and find complete quiet—it feels like leaving the city, and it's twenty minutes from the centre.",st:"Karura Forest is a protected upland forest on Nairobi's northern edge. It covers thousands of hectares and locals use it for jogging, walking, meditation.",im:"Walking through forest. The trees tall and thick. Diffused light. A river crossing. Quiet. A jogger passing. Birds. The city completely inaudible.",t:"Located north of Nairobi centre in Ngong Road. Take a Grab to 'Karura Forest entrance.' Entry fee: approximately 400 KES. Open daily 8am–5pm.",c:["beautiful","quiet"],r:"g",nn:"Hifadhi ya Msitu wa Karura",ns:"Msitu wenye matunda jingine upande wa kaskazini wa Nairobi ambapo wageni wanatembea na kupata utulivu kamili.",nst:"Karura Forest ni msitu uliohifadhiwa upande wa kaskazini wa Nairobi. Inakabidhi elfu za hectares na casa iliharibiwa lakini sasa inarekebwa.",nt:"Iko kaskazini mwa Nairobi katika Ngong Road. Gharama ya kuingia: karibu 400 KES."},
  {id:33,n:"Ngong Hills Day Hike — Views of the Rift Valley",a:"South of Centre",v:["beautiful","day_trips","hiking"],d:90,s:"Part of the Great Rift Valley, the Ngong Hills offer panoramic views of the escarpment and valley—a day hike that feels like leaving Africa's city entirely.",st:"Ngong Hills are four distinct peaks on the south side of Nairobi, part of the Great Rift Valley escarpment. On clear days, the view from the top extends across the Rift Valley.",im:"Standing on a peak. The Rift Valley spread beneath you. Escarpments and distant plains. The light clear and vast. A few other hikers. Complete exposure.",t:"Located south of Nairobi. Take a Grab to 'Ngong Hills entrance' (about 30 minutes from centre). Entry fee: approximately 300 KES. Go early morning, 7am–1pm.",c:["beautiful","day_trips"],r:"y",nn:"Mlima wa Ngong",ns:"Sehemu ya Great Rift Valley, Ngong Hills inatoa mwonekano pancho wa valley.",nst:"Ngong Hills ni miundo minne tofauti kwenye upande wa kusini wa Nairobi, sehemu ya Great Rift Valley escarpment.",nt:"Iko kusini mwa Nairobi. Chukua Grab kwa 'Ngong Hills entrance' (karibu dakika 30 kutoka katikati)."},
  {id:34,n:"Beit è Selam — World's 50 Best Restaurant",a:"Nairobi",v:["greatest_hits","beautiful","local"],d:10,s:"Listed in World's 50 Best Discovery Restaurants, Beit è Selam serves contemporary East African cuisine in an intimate space—the food and atmosphere justify the accolade.",st:"Beit è Selam is a small restaurant that appeared on World's 50 Best Discovery Restaurants list. It's not fancy or trying to be—it's just very good food.",im:"Inside the restaurant. Simple tables. Good lighting on plates. A chef concentrating. A couple enjoying their meal. The food beautiful and carefully plated.",t:"Located in Nairobi's central area. Reserve ahead via email or phone. Dinner service 6:30pm–10pm Tuesday–Sunday. Closed Mondays. Mains approximately 1,200–1,600 KES.",c:["greatest_hits","beautiful"],r:"g",nn:"ቤት ሴላም",ns:"በዓለም ዋጋ 50 ምርጥ ሬስቶሮ ዋቢ ውስጥ ተዘርዝሮ፣ ቤት ሴላም ዘመናዊ ምስራቅ አፍሪቃ ምግብ ያሰራል።",nst:"ቤት ሴላም ዓለም ዋጋ 50 ምርጥ ሬስቶሮ ዋቢ ውስጥ የተገለጸ ትንሽ ሬስቶሮ ነው።",nt:"በናይሮቢ ማዕከላዊ ቦታ ውስጥ ይገኛል።"},
  {id:35,n:"Nairobi National Park — Urban Wildlife Sanctuary",a:"Outside City",v:["beautiful"],d:30,s:"National park within sight of the city skyline — lions, giraffes, and zebras with skyscrapers in the background",st:"Drive into the park and see wild animals with the city skyline behind them. It\'s surreal and beautiful. A real wildlife experience, not a zoo. Early morning is best for seeing predators. The contrast between nature and urban development is striking. It\'s a full day experience.",im:"Lions, giraffes, and zebras in grassland. The city skyline in the distance. The early morning light. The dry savanna landscape. The incredible wildlife density. The juxtaposition of city and wild.",t:"90 KES entry (~$0.70) for residents, higher for tourists. Outside city (30-minute drive). 3-4 hours minimum. Hire a guide/driver (essential). Best 6am-9am for wildlife sightings. Bring binoculars and water. Photography is excellent. This is one of Africa\'s most accessible wildlife experiences.",c:["greatest_hits"],r:"g",nn:"ናይሮቢ ብሔራዊ ፓርክ",ns:"Nairobi National Park — ናይሮቢ ብሔራዊ ፓርክ ከተማ እንስሳት መጠበቂያ",nst:"ወደ ፓርኩ ያሽከረክሩ እና የዱር እንስሳትን ከተማው አድማስ ጋር ይመልከቱ።",nt:"90 KES (ነዋሪዎች). ከተማ ውጭ (30 ደቂቃ ድራይቭ)። 3-4 ሰዓት።"},
  {id:36,n:"David Sheldrick Trust Elephant Orphanage — Baby Elephants",a:"Nairobi National Park Area",v:["beautiful"],d:30,s:"Orphanage for baby elephants — hand-raised animals and feeding times with close interaction",st:"Visit during morning feeding time and watch baby elephants being bottle-fed by caretakers. You can get very close. It\'s emotional to see these animals being cared for after losing their mothers. The organization does serious conservation work. Photography is allowed and encouraged.",im:"Baby elephants with their caretakers. The gentle trunks reaching for bottles. The playful behavior. The care and attention lavished on each animal. The sense of rescue and rehabilitation. The joy on visitors\' faces.",t:"2,000 KES (~$15) entry. Nairobi National Park area. Feeding time 11am daily (arrive early). 1.5-2 hours. Photography allowed. Wear closed shoes (elephant dust). This is one of Kenya\'s most emotional attractions. Booking ahead is recommended. The trust\'s work is genuinely impactful.",c:["greatest_hits"],r:"g",nn:"ዴቪድ ሼልደሪክ ክምችት",ns:"David Sheldrick Trust — ዴቪድ ሼልደሪክ ክምችት ጥንቁር ዝሉ",nst:"የወተት ምግብ ሰዓት ላይ ጎብኙ እና ከታሪያ ክንዚ ተሰማርተኝ ዝሉ የታዩ።",nt:"2,000 KES (~$15)። ከ 11 ዓ.ም ሂድ።"},
  {id:37,n:"Giraffe Centre — Feeding Gentle Giants",a:"Karen",v:["beautiful"],d:30,s:"Giraffe sanctuary where you can hand-feed endangered Rothschild giraffes from a platform",st:"Climb to a platform at giraffe neck height. Feed them leaves and pellets from your hand. Their long purple tongues reach out. The giraffes are gentle. You get remarkably close to these animals. The center does serious conservation work. It\'s an intimate wildlife experience.",im:"Giraffes\' long necks stretching toward you. Their big eyes and long lashes. The purple tongue. Your hand offering food. The gentleness of these massive animals. The connection between human and animal.",t:"2,500 KES (~$19) entry. Karen area (30 minutes from city). 1-1.5 hours. Hand-feeding included. Open 9am-5:30pm. Photography allowed. Wear long sleeves (giraffe tails are prickly). This is an ethical wildlife experience; the center is a genuine conservation organization.",c:["greatest_hits"],r:"g",nn:"ጂራፈ ክምችት",ns:"Giraffe Centre — ጂራፌ ታዋቂ መመገቢያ ተቋም",nst:"ወደ ጂራፌ ወንድ ቁመት ላይ ወጡ። ከእጅዎ ግንዶችን ያጤኑ።",nt:"2,500 KES (~$19)። ካረን ስፍራ (30 ደቂቃ)። 1-1.5 ሰዓት።"},
  {id:38,n:"Karen Blixen Museum — Colonial Heritage House",a:"Karen",v:["beautiful"],d:30,s:"Home of \"Out of Africa\" author Karen Blixen — colonial plantation house and literary history",st:"This is the house where Karen Blixen lived on her coffee plantation. The colonial architecture is preserved. The rooms are filled with her possessions. The garden is beautiful. It\'s a window into the colonial era (with all its complexities). The museum is respectfully presented.",im:"Colonial house architecture. Period furnishings. Karen\'s possessions and photographs. The coffee plantation grounds. The garden with old trees. The literary connections. The sense of a colonial life preserved.",t:"1,000 KES (~$7.50) entry. Karen area. 1-1.5 hours. Guided tours available. Best 10am-2pm. Photography allowed. The museum is educational without glorifying colonialism. It\'s a serious historical site. Combine with the Giraffe Centre (nearby).",c:["greatest_hits"],r:"g",nn:"ካሬን ብሊክሴን ሙዝየም",ns:"Karen Blixen Museum — ካሬን ብሊክሴን ሙዝየም ቤተ-ምህረት",nst:"\"Out of Africa\" ደራሲ ግる ብሊክሴን ቤት። ወቅታዊ ቀልጣፋ ህንፃ።",nt:"1,000 KES (~$7.50)። ካረን ስፍራ። 1-1.5 ሰዓት।"},
  {id:39,n:"Kazuri Beads — Fair Trade Bead Workshop",a:"Karen",v:["beautiful"],d:30,s:"Women\'s cooperative producing handmade beads — workshop tours and fair-trade shopping",st:"Tour the workshop and watch women making beads by hand. The cooperative provides jobs and income for Kenyan women. You can buy beads, jewelry, and crafts directly, and the profit goes to the workers. It\'s authentic fair-trade commerce. The women are friendly and proud of their work.",im:"Women at tables making beads by hand. Colorful beads in piles. The focus and skill. The pride in the work. The conversation and laughter among workers. The genuine commerce and connection.",t:"500 KES entry (~$3.75) for tour. Karen area (near Giraffe Centre). 45-60 minutes. Shop for handmade jewelry and crafts. Open 9am-5pm (closed Sundays). Photography allowed. This is genuine fair-trade; profit goes directly to workers. A meaningful souvenir opportunity.",c:["greatest_hits"],r:"g",nn:"ካዙሪ ሮጭ",ns:"Kazuri Beads — ካዙሪ ሮጭ ሴት ተባባሪ ምርት",nst:"ወርክሾፑን ይጎብኙ እና ሴቶች ሮጭ ይሠሩ።",nt:"500 KES (~$3.75)። ካረን ስፍራ። 45-60 ደቂቃ።"}];
const PHRASES = [{native:"Jambo",en:"Hello (to visitor)"}
  {id:40,n:"Nairobi National Park Morning Safari — Skyline Backdrop",a:"Nairobi National Park",v:["nature","day_trips","greatest_hits"],d:180,s:"A morning safari game drive where you see lions, zebras, and giraffes with Nairobi's skyline visible in the distance—unique contrast.",st:"Nairobi National Park is one of the only national parks in the world where you see wildlife with a city skyline in the background. Early morning game drives (departing 6-7am) offer the best wildlife viewing and light. You\'ll see lions, zebras, giraffes, buffalo, antelope. It\'s Africa and modernity simultaneously.",im:"A giraffe walking across savanna with Nairobi\'s towers visible on the distant skyline, the sun rising, the contrast surreal.",t:"Book game drives through your hotel or tour operator. Cost is about 150-250 USD per person. Drives leave early (6-7am). Bring binoculars and a camera. Wear khaki/neutral colors. The park is about 20 minutes south of the city center. Allow 3-4 hours for the safari.",c:["nature","day_trips","greatest_hits"],r:"g",nn:"Safari Parque Nacional Nairobi",ns:"Safari al amanecer con rascacielos de fondo",nst:"Parque donde ves vida silvestre con horizonte urbano. Contraste único.",nt:"Reserva tours. 150-250 USD. Salida 6-7h. Prismáticos. Colores neutros. 3-4 horas."},
  {id:41,n:"David Sheldrick Elephant Orphanage — 11am Feeding Only",a:"Langata",v:["nature","beautiful","local"],d:60,s:"A sanctuary for orphaned elephants—visitors can watch baby elephants feeding at 11am sharp (only time visitors allowed).",st:"The David Sheldrick Wildlife Trust rescues orphaned baby elephants. The sanctuary cares for them until they\'re old enough for release. Visitors are allowed only at 11am to watch feeding time. You see baby elephants (some days up to 20) drinking milk from bottles and interacting. It\'s heartwarming and real—not a show, just a feeding routine.",im:"A baby elephant drinking from a bottle held by a caretaker, other elephants playing, visitors watching quietly.",t:"Located in Langata, south of Nairobi. Admission is about 50-100 USD. Entry is strictly at 11am (not flexible—gates close after that). The visit lasts 1-1.5 hours. It\'s worth making your day schedule around this timing. Arrive 10:45am. Photography allowed. Very popular—arrive early.",c:["nature","beautiful"],r:"g",nn:"Santuario de Elefantes",ns:"Orfanatorio de elefantes a 11h solo",nst:"Tiempo de alimentación observando bebés de elefante. Conmovedor y real.",nt:"Langata, sur. 50-100 USD. Estrictamente 11h. 1-1,5 h. Llega 10:45h. Popular."},
  {id:42,n:"Giraffe Centre — Feeding Giraffes by Hand",a:"Langata",v:["nature","beautiful","local"],d:45,s:"A conservation center where you stand on a platform at giraffe-head height and feed them by hand—intimate and surprising.",st:"The Giraffe Centre is a working research center. From an elevated feeding platform, you stand at giraffe-head height and hand-feed them pellets. The giraffes are gentle, curious, and their experience is real (not trained for tourists—they\'re just used to humans). You can feel their rough tongues. It\'s intimate and moving.",im:"A giraffe\'s face inches away, eating from someone\'s hand, the giraffe\'s eyes visible, the moment intimate.",t:"Located near the Elephant Orphanage. Admission is about 30-50 USD. Open daily, 9am-5pm. Allow 1 hour. Feeding time is around 3-4pm (ask on arrival for best time). Children are welcome. It\'s gentle and safe. Very popular—arrive early.",c:["nature","beautiful"],r:"g",nn:"Centro de Jirafas",ns:"Alimenta jirafas a mano desde plataforma elevada",nst:"Centro de conservación. Jirafas gentiles y curiosas. Experencia íntima.",nt:"Cerca Orfanatorio. 30-50 USD. 9h-17h. Permita 1 h. Alimentación 15-16h. Popular."},
  {id:43,n:"Karen Blixen Museum — Colonial Writer\'s Home",a:"Karen",v:["history","architecture","beautiful"],d:60,s:"The preserved colonial-era home of author Karen Blixen (\"Out of Africa\"), with period furnishings and a garden setting.",st:"Karen Blixen wrote \'Out of Africa\' from this house. The home, built in 1912, is preserved as it was. Period furnishings, bookshelves with her works, photographs, and memorabilia tell her story. The setting, in the lush Karen neighborhood, connects you to colonial Kenya and a fascinating woman. The museum is small but rich.",im:"A colonial home with period furnishings, windows overlooking a garden, bookshelves with leather-bound volumes.",t:"Located in Karen, south of Nairobi. Admission is about 20-30 USD. Open daily, 9:30am-5pm. Allow 1-2 hours. The neighborhood is worth exploring. A restaurant in the house serves tea. It\'s peaceful and intellectual.",c:["history","architecture"],r:"g",nn:"Casa de Karen Blixen",ns:"Casa colonial de la autora de \'Fuera de África\'",nst:"Casa de 1912 preservada donde escribió su obra maestra.",nt:"Karen, sur. 20-30 USD. 9:30h-17h. Permita 1-2 h. Té. Tranquilo."},
  {id:44,n:"Kazuri Beads Cooperative — Women\'s Economic Empowerment",a:"Langata",v:["free_culture","weird","local"],d:60,s:"A women\'s cooperative making beaded jewelry, where you can watch artisans work, learn beading, and purchase directly.",st:"Kazuri Beads employs over 300 women in Nairobi making traditional Kenyan beaded jewelry. The workshop is open to visitors. You see women making beads (molded ceramic, strung by hand), design items, package for export. You can buy directly from artisans. The cooperative is not tourism-focused but allows visitors. It\'s authentic and empowering.",im:"A workshop space with women at tables making beads, stringing, creating patterns, colorful beads in piles.",t:"Located in Langata. Admission is free (donations appreciated). Open Mondays-Fridays, 9:30am-5pm; Saturdays 9:30am-1pm. Allow 1-2 hours. Buying directly supports the women (items cost 5-50 USD). Tours available but not required. Respectful photography.",c:["free_culture","weird"],r:"g",nn:"Cooperativa Kazuri",ns:"Cooperativa de mujeres haciendo joyería de cuentas",nst:"300+ mujeres crean joyas. Compra directa apoya a artesanas.",nt:"Langata. Entrada libre. Lunes-viernes 9:30h-17h, sábados 9:30h-13h. Permita 1-2 h."},
  {id:45,n:"Karura Forest — Urban Hiking & Waterfall",a:"Karura",v:["nature","parks","local"],d:120,s:"An urban forest with hiking trails, waterfalls, and endemic plants—Nairobi\'s green lung used by locals and visitors.",st:"Karura Forest is a 1,000-hectare protected forest within Nairobi. Trails wind through indigenous forest with waterfalls, bridges, and wildlife. It\'s where Nairobians come to hike and breathe. The canopy is thick, the air is cool, the experience is surprising—wilderness within the city.",im:"A hiking trail through lush forest, a waterfall visible, the canopy creating shade, a few hikers visible.",t:"Located north of Nairobi. Entry is about 30 KES (small fee). Open daily, 6am-6pm. Guides are recommended (available at entrance, cost varies). Allow 2-3 hours for a good hike. It\'s safe during park hours. Bring water. The forest is a pilgrimage for nature-loving Nairobians.",c:["nature","parks"],r:"g",nn:"Bosque Karura",ns:"Bosque urbano de 1,000 hectáreas con senderos y cascadas",nst:"Pulmón verde de Nairobi con cascadas y flora endémica.",nt:"Norte de Nairobi. 30 KES. 6h-18h. Guías recomendados. 2-3 horas. Agua. Seguro."},
  {id:46,n:"Maasai Market — Tourist Market with Masai Culture",a:"Various",v:["markets","neighborhoods","weird"],d:90,s:"A famous curio market with jewelry, artifacts, and crafts—touristy but worth experiencing Maasai and Kenyan craftsmanship.",st:"The Maasai Market rotates locations (Tuesdays and Thursdays in different areas). It\'s the main place for tourist shopping: Maasai jewelry, shields, spears, sculptures, textiles. It\'s crowded, touristy, and energetic. Prices are negotiable. Many items are authentic Maasai craftsmanship; others are mass-produced. It\'s the quintessential Nairobi tourist experience.",im:"A crowded market with colorful goods: jewelry, shields, sculptures, vendors calling out, tourists bargaining.",t:"Locations change—ask at your hotel. Usually Tuesdays and Thursdays. Arrive mid-morning for best selection and crowds. Bring cash (items cost 5-100 USD). Negotiate—prices are flexible. Allow 1-2 hours. It\'s safe but crowded. Go with an open mind about shopping.",c:["markets","neighborhoods","weird"],r:"g",nn:"Mercado Maasai",ns:"Mercado de artesanías, joyería, y artefactos",nst:"Martes y jueves en ubicaciones diferentes. Auténtico y turístico.",nt:"Ubica en tu hotel. Media mañana. Dinero. Negocia. Permita 1-2 h. Abierto."},
  {id:47,n:"National Museum of Kenya — Natural & Cultural History",a:"Nairobi",v:["history","art","free_culture"],d:90,s:"Kenya\'s largest museum with fossils, pre-colonial artifacts, and contemporary Kenyan art—comprehensive cultural overview.",st:"The National Museum is Kenya\'s primary institution for natural and cultural heritage. Collections include: paleontological specimens (the \'Turkana Boy\' fossil is famous), pre-colonial artifacts, ethnographic materials, and contemporary art. It\'s well-organized and educational. It tells Kenya\'s story from deep history to present.",im:"A museum gallery with display cases, fossils visible, ethnographic artifacts, visitors quietly studying.",t:"Located in central Nairobi. Admission is about 20 USD. Open daily, 9:30am-5:30pm. Allow 2-3 hours for a meaningful visit (can be rushed in 1 hour). There\'s a restaurant on-site. The museum is air-conditioned and comfortable.",c:["history","art","free_culture"],r:"g",nn:"Museo Nacional de Kenia",ns:"Museo de historia natural y cultural",nst:"Colecciones de paleontología, artefactos precoloniales, arte contemporáneo.",nt:"Centro Nairobi. 20 USD. 9:30h-17:30h. Permita 2-3 h. Restaurante."},
  {id:48,n:"Bomas of Kenya — Living Cultural Museum",a:"Kiambu",v:["culture","local","day_trips"],d:240,s:"A cultural center with recreated villages, traditional ceremonies, daily performances—"˜living museum"˜ of Kenyan ethnic diversity.",st:"The Bomas (from Swahili for enclosure) display the traditional architecture and culture of Kenya\'s 42 ethnic groups. Visitors see recreated villages, watch performances of traditional music and dance, and meet craftspeople. It\'s more structured than organic, but it\'s an efficient way to see Kenyan cultural diversity.",im:"A traditional Maasai manyatta (enclosure) with thorn-fence walls, visitors inside, performers in traditional dress.",t:"Located in Kiambu, 30-40 minutes outside Nairobi. Admission is about 25-30 USD. Open daily, 9am-6pm. Performances typically at 10:30am, 2pm, 4pm (verify on arrival). Allow 3-4 hours. Go with cultural sensitivity—it\'s an anthropological display.",c:["culture","local","day_trips"],r:"g",nn:"Bomas de Kenia",ns:"Museo cultural viviente con 42 grupos étnicos",nst:"Aldeas recreadas, performances, artesanía tradicional.",nt:"Kiambu, 30-40 min. 25-30 USD. 9h-18h. Performances 10:30h, 14h, 16h. 3-4 horas."},
  {id:49,n:"K1 Klubhouse & Westlands Nightlife — Modern Nairobi Social Scene",a:"Westlands",v:["neighborhoods","music","weird"],d:120,s:"Trendy nightclub and lounge in Westlands representing modern Nairobi nightlife—upscale, energetic, contemporary.",st:"K1 Klubhouse is one of Nairobi\'s most popular nightspots. The nightlife in Westlands represents modern Nairobi: upscale, international, DJ-driven music. It\'s where Nairobi\'s young professional class gathers. It\'s expensive and cosmopolitan—very different from tourist attractions.",im:"A nightclub interior with modern lighting, people dancing, DJ booth, upscale aesthetic.",t:"Located in Westlands. Entry is about 20-50 USD. Open nightly from 10pm. Drinks are expensive (8-15 USD). Go after 10pm. It\'s a social scene. Dress code is smart casual to upscale. It\'s safe and organized. Go to experience contemporary Nairobi nightlife.",c:["neighborhoods","music","weird"],r:"g",nn:"K1 Klubhouse",ns:"Club nocturno moderno en Westlands",nst:"Donde Nairobi joven se reúne. Moderno, caro, internacional.",nt:"Westlands. 20-50 USD. Desde 22h. Bebidas 8-15 USD. Código de vestimenta smart casual."},
  {id:50,n:"Nairobi Railway Museum — Transport Heritage",a:"Museum Hill",v:["history","architecture","local"],d:60,s:"Preserved colonial-era railway cars and locomotives—history of Kenya\'s railway development and British colonial transport.",st:"The railway was built by the British to extract resources from Uganda. The museum preserves that history in vintage cars and locomotives. You can walk through restored carriages and see the architecture of colonial-era trains. It\'s niche but historically interesting.",im:"Vintage railway cars lined up, their paint peeling, colonial-era design visible, visitors walking alongside.",t:"Located on Museum Hill. Admission is about 15-20 USD. Open daily, 9am-4:30pm. Allow 1-2 hours. The museum is small but worthwhile if interested in transport history or colonialism. It\'s less crowded than other attractions.",c:["history","architecture"],r:"g",nn:"Museo del Ferrocarril",ns:"Coches y locomotoras de era colonial preservados",nst:"Historia del desarrollo del ferrocarril en la época colonial británica.",nt:"Museum Hill. 15-20 USD. 9h-16:30h. Permita 1-2 h. Menos concurrido."},
  {id:51,n:"Uhuru Gardens — Independence & Relaxation",a:"Nairobi",v:["parks","history","local"],d:45,s:"A public park commemorating Kenyan independence with gardens, monuments, and a peaceful atmosphere used by locals.",st:"Uhuru Park is where Kenya\'s independence is commemorated. The park has gardens, monuments, and quiet spaces. It\'s used by Nairobians as a public green space—joggers, families, couples. It\'s peaceful and accessible. Less touristy than other sites but part of Nairobi.",im:"A manicured public park with monuments, a few joggers and families, the city visible in the distance.",t:"Located in central Nairobi. Free entry. Open daily during daylight hours. Go during the day. It\'s a place for a walk or rest. Allow 30 minutes-1 hour. It\'s safe and pleasant.",c:["parks","history","local"],r:"g",nn:"Jardines Uhuru",ns:"Parque público conmemorando independencia",nst:"Espacio verde donde Nairobis descansan y corren. Accesible. Tranquilo.",nt:"Centro Nairobi. Libre. Permita 30 min-1 h. De día. Seguro."},
  {id:52,n:"Village Market & Shopping — Modern Retail Culture",a:"Westlands",v:["shopping","neighborhoods","weird"],d:90,s:"A high-end shopping mall representing Nairobi\'s modern retail culture—international brands, restaurants, and upscale Kenyans.",st:"Village Market is Nairobi\'s premier shopping destination. It\'s where wealthy Nairobians shop: designer brands, restaurants, bookstores. It\'s thoroughly contemporary and international. It shows modern Nairobi\'s aspirations and consumer culture. It\'s worth visiting to understand the city.",im:"A modern shopping mall interior, expensive boutiques, well-dressed shoppers, contemporary aesthetic.",t:"Located in Westlands. Free to browse. Stores and restaurants cater to upscale clientele (meals 15-40 USD, items at international prices). Go during the day. It\'s safe and comfortable. It\'s not budget-friendly but interesting culturally.",c:["shopping","neighborhoods"],r:"g",nn:"Village Market",ns:"Centro comercial de lujo representando Nairobi moderno",nst:"Marcas internacionales, restaurantes. Donde compra Nairobi rico.",nt:"Westlands. Libre pasear. Comidas 15-40 USD. De día. Seguro."},
  {id:53,n:"Java House Coffee Culture — Café Society",a:"Various",v:["food","free_culture","local"],d:45,s:"Java House is Nairobi\'s iconic café chain where educated Kenyans work, meet, discuss—experiencing Kenya\'s café culture.",st:"Java House is to Nairobi what Starbucks is to the US, but more interesting. It\'s where young professionals, entrepreneurs, and students gather. The cafés are well-designed with free WiFi. The coffee is good. People come to work, meet, discuss ideas. It\'s a window into contemporary Nairobi professional culture.",im:"A modern café interior with professionals on laptops, people meeting, coffee cups, a friendly, intellectual atmosphere.",t:"Locations throughout Nairobi. Admission is free (buy a coffee: 3-5 USD). Open daily, usually 6:30am-7pm. Sit and observe. Bring a laptop if you want to work. It\'s safe, air-conditioned, and pleasant. Allow 1-2 hours for a real café experience.",c:["food","free_culture"],r:"g",nn:"Java House",ns:"Cadena icónica de cafés donde se reúne Nairobi educado",nst:"Donde jóvenes profesionales trabajan, se reúnen, discuten ideas.",nt:"Múltiples ubicaciones. Libre (café 3-5 USD). 6:30h-19h. Portátil. Seguro. 1-2 h."},
  {id:54,n:"Nyama Choma Spots — Grilled Meat Culture",a:"Various",v:["food","local","weird"],d:60,s:"Casual outdoor restaurants where goat, beef, and chicken are grilled fresh over charcoal—authentic Kenyan meat culture.",st:"Nyama choma is Kenya\'s national dish: meat grilled over open charcoal. Small restaurants throughout Nairobi specialize in this. You order meat by weight, it\'s grilled in front of you, and you eat. The experience is social and casual. The food is excellent and cheap. It\'s where Kenyans eat, not tourists (except for the adventurous).",im:"An outdoor restaurant with meat grilling over charcoal, people eating with their hands, beer bottles on tables, a casual social scene.",t:"Nyama choma spots are scattered throughout the city, especially in Eastlands and working-class neighborhoods. Go for lunch or early evening. Prices are very cheap (5-10 USD for a meal). Arrive when meat is being grilled for best quality. Go with a local if possible. It\'s safe but basic.",c:["food","local","weird"],r:"g",nn:"Nyama Choma",ns:"Carne a la parrilla sobre carbón—cultura de carne keniana",nst:"Plato nacional. Se come en restaurantes casuales al aire libre.",nt:"Esparcido por la ciudad. Almuerzo o early evening. 5-10 USD. Llega cuando asa carne."},
  {id:55,n:"Carnivore Restaurant — Carnivorous Experience",a:"Nairobi",v:["food","weird","beautiful"],d:120,s:"A famous restaurant specializing in game meat (ostrich, camel, kudu) and unusual proteins grilled tableside.",st:"Carnivore Restaurant is Nairobi\'s most famous dining experience. Servers bring meat on swords to your table, grilling it tableside: ostrich, camel, kudu, antelope, and conventional meats. The menu is unusual and adventurous. It\'s theatrical, expensive, and an experience. It\'s where tourists and affluent Kenyans go.",im:"A tableside grilling scene, meat on swords, servers in traditional dress, flames and smoke, the experience theatrical.",t:"Located in Nairobi (ask your hotel for address). Lunch or dinner. Cost is about 40-60 USD per person including drinks. Make reservations. It\'s popular. Dress code is smart casual. Go for the experience. It\'s not cheap but it\'s a Nairobi institution.",c:["food","weird","beautiful"],r:"g",nn:"Restaurante Carnívoro",ns:"Carnes de caza asadas (avestruz, camello, kudu)",nst:"Experiencia teatral y gastronómica de carnes poco comunes.",nt:"Reserva. 40-60 USD. Almuerzo o cena. Código smart casual. Experiencia teatral."},
