<script>
const P = [{id:1,n:"Nairobi National Park — Urban Wildlife Reserve",a:"Nairobi National Park",v:["nature","hidden","wildlife"],d:45,s:"One of Africa's few urban wildlife reserves with lions, zebras, giraffes, and rhinos visible from the city skyline in the background.",st:"Nairobi National Park, established in 1946, is unique: a wildlife reserve surrounded by a major African city. The park contains diverse ecosystems: grasslands, acacia forests, rocky outcrops, and the Nairobi River. Large predators—lions, leopards, cheetahs—hunt here; herbivores—zebras, giraffes, buffalo, antelopes—graze openly. Early morning safari drives offer the best wildlife viewing and wildlife photography. The dramatic element is the city skyline visible in the distance: you're watching wild animals against Nairobi's urban backdrop, an unusual juxtaposition. The park is smaller than other Kenyan reserves but remarkably biodiverse. It's accessible for day-trippers from the city, making it a convenient introduction to Kenyan wildlife.",im:"A lion crosses the savanna grasslands as the Nairobi skyline rises on the horizon; acacia trees dot the landscape; the contradiction of wild and urban visible.",t:"Located south of downtown Nairobi (20 minutes by car). Entry fee required. Open dawn to dusk. Best wildlife viewing is early morning (6-9am). Safari vehicles can be rented with drivers. Go on a weekday to avoid weekend crowds. Bring binoculars and camera.",c:[],r:"g",nn:"Nairobi National Park",ns:"Hifadhi ya kinyama ya jijini na kilicho kadhaa milimani",nst:"Hifadhi ya kinyama inayojamba kwa jiji; simba, kiboko, twiga, na nyani vidogo; mtazamo wa jijini unaingia.",nt:"Kusini juu ya kati (20 dakika gari). Ada ya kuingia inahitajika. Jua na jioni hadi magharibi. Sehemu nzuri ni asubuhi. Magari ya safari inaweza kukamatia."},{id:2,n:"Giraffe Centre — Endangered Species Sanctuary",a:"Langata",v:["wildlife","nature","hidden"],d:30,s:"A sanctuary for endangered Rothschild's giraffes where visitors can feed giraffes by hand from an elevated platform, supporting conservation.",st:"The Giraffe Centre cares for endangered Rothschild's giraffes. Once, thousands of these giraffes roamed East Africa; habitat loss reduced them to several hundred. The center's conservation program breeds giraffes and releases them to protected areas. Visitors can interact with giraffes from an elevated feeding platform: holding out food pellets, watching the giraffe's long tongue extend to take them. The experience is intimate and moving—the giraffe's gentle nature, the intelligence in its eyes, the realization of how endangered these creatures are. The center educates about conservation challenges and the need to protect remaining habitats. Supporting the center directly funds conservation work.",im:"A giraffe's long neck extends to mouth level as a visitor holds out food; the giraffe's tongue curls around the offering; the moment intimate and unforgettable.",t:"Located in Langata, south of downtown Nairobi (20-30 minutes by car). Admission fee required. Allow 1-2 hours. Go early morning when giraffes are most active. Bring cash for the feeding pellets. Photography is excellent. The center also operates a giraffe research facility.",c:[],r:"g",nn:"Giraffe Centre",ns:"Kituo cha kifo cheguzi twiga zenye hatari sana",nst:"Twiga wa Rothschild wenye hatari inayokamatia; wageni wanaweza kumkamata mtunda moja kwa mkono.",nt:"Langata, kusini juu ya kati (20-30 dakika gari). Ada inahitajika. Permita 1-2 saa. Asubuhi kumbukata. Peleti zaidi kwa kumkamata twiga."},{id:3,n:"National Museum of Kenya",a:"Museum Hill",v:["history","art","culture"],d:40,s:"Kenya's premier museum documenting natural history, paleontology (including Lucy's fossil relative), art, and cultural heritage.",st:"The National Museum of Kenya houses extensive collections: paleontological specimens documenting human evolution and prehistoric Kenya; ethnographic materials from Kenya's 40+ ethnic groups; contemporary Kenyan art; and natural history specimens. The museum's paleontology collection includes fossils of ancient hominins—humans' evolutionary ancestors. Natural history galleries showcase Kenya's extraordinary biodiversity: the mammals, birds, reptiles, and insects found across the country's varied ecosystems. The ethnographic galleries document how Kenya's diverse communities have lived—traditional crafts, languages, spiritual beliefs, and material cultures. The museum provides essential context for understanding Kenya's history, natural heritage, and cultural diversity.",im:"A display case shows fossil skulls of ancient hominins arranged chronologically, revealing evolutionary progression; explanatory text documents the scientific narrative.",t:"Located on Museum Hill in central Nairobi. Metro or taxi accessible. Admission required (modest cost). Open daily. Allow 2-3 hours. The paleontology section is particularly strong. English labels throughout. Excellent gift shop and café.",c:[],r:"g",nn:"National Museum of Kenya",ns:"Mkutanombongo mahimu wa Kenya yenye ukumbufu na hadithi",nst:"Mkutano huu una nchi ya wanadamu kwa majani; fossils ya kuna sana; walimu wenye sana.",nt:"Museum Hill katikati ya Nairobi. Metro au teksi inayoweza kutumia. Ada inahitajika. Abubuzi kila siku. Permita 2-3 saa. Paleontolojia sehemu kubwa."},{id:4,n:"Nairobi Street Art Scene — Contemporary Urban Culture",a:"Kamukunji and Eastleigh",v:["art","local","hidden"],d:25,s:"Nairobi's vibrant street art scene with murals, graffiti, and contemporary visual culture in neighborhoods like Kamukunji and Eastleigh.",st:"Nairobi's street art culture has exploded in recent years. Young artists paint murals on buildings in various neighborhoods—Kamukunji, Eastleigh, Kibera—addressing social issues, celebrating Kenyan culture, and creating urban beauty. The art is political and personal: images of independence heroes, contemporary activists, cultural pride, social commentary on inequality and environmental issues. Walking neighborhoods with active street art, you encounter vibrant contemporary culture being created in real-time. Some murals are ephemeral—painted over, fading—representing the transient nature of street art. Street art tours led by local artists offer deeper insight into the meanings, the artists, and the communities creating this culture.",im:"A massive mural covers a building wall: a portrait of a Kenyan independence hero rendered in bold colors, surrounding buildings also painted with artistic work.",t:"Located throughout Nairobi in various neighborhoods. Best explored with a local street art tour guide. Allow 2-3 hours. Go during daylight. The tours support local artists. Photography appreciated by many artists. Respect private property and ask before photographing commercial/residential spaces.",c:[],r:"g",nn:"Nairobi Street Art Scene",ns:"Sanaa ya barabara na inchi ya sasa inayojumlisha Nairobi",nst:"Waanzi kuona sasa wanachora juu ya nyumba; sanaa inajumlisha ukamilifu, kufa, na kujikumbuka kama jamii.",nt:"Jujuu kwa Kamukunji na Eastleigh. Pamoja na mwenye kuzida. Permita 2-3 saa. Mchana tu. Kusanya ajali ukitaka kupigia picha."},{id:5,n:"David Sheldrick Wildlife Trust — Elephant Orphanage",a:"Langata",v:["wildlife","nature","hidden"],d:35,s:"A sanctuary caring for orphaned elephants whose mothers were killed by poachers, with daily public feeding times and rescue/rehabilitation programs.",st:"The David Sheldrick Wildlife Trust cares for orphaned elephants—young animals whose mothers were killed by poachers. The trust provides 24-hour care, specialized feeding, veterinary treatment, and eventually reintroduction to protected areas. Visitors can watch the daily public feeding (usually 11am-noon) where orphaned elephants are brought to interact with caretakers and visitors. Seeing baby elephants—some only weeks old, traumatized by witnessing their mothers' deaths—playing, being cared for, and gradually healing is profoundly moving. The work addresses poaching's devastating impact on elephant populations. Supporting the trust through entrance fees funds conservation and anti-poaching efforts. The experience connects emotional response to orphaned elephants with broader conservation urgency.",im:"A baby elephant, a few months old, approaches visitors during feeding time, its trunk exploratory, caretakers guiding the interaction, visitors deeply moved.",t:"Located in Langata, south of Nairobi (20-30 minutes by car). Admission fee required (substantial, supporting care). Daily feeding at 11am-noon. Allow 1-2 hours. Go early to arrive before crowds. Bring cash if possible (supports the program directly). Photography allowed. The experience is emotionally powerful.",c:[],r:"g",nn:"David Sheldrick Wildlife Trust",ns:"Mahukumu ya tembo wenye yatimakazi walifu na wakamatia",nst:"Mahakama anayetunza tembo wazeeni walifu; wakamatia wa wazazi wenye maajabu; kusangana kila siku na tembo wajeuni.",nt:"Langata, kusini juu ya Nairobi. Ada inahitajika. Kumkamata kila siku 11h-12h. Permita 1-2 saa. Asubuhi tu. Kumkamata tembo wezeeni."},{id:6,n:"Nairobi Railway Station — Colonial Heritage Architecture",a:"Downtown Nairobi",v:["history","architecture","hidden"],d:20,s:"A grand Edwardian railway station built by the British in 1899, representing Kenya's colonial history and transportation heritage.",st:"Nairobi's railway station, completed in 1899, is a magnificent Edwardian structure. The British built the railway to facilitate colonial extraction of resources and establish administrative control. The station's architecture—with its high ceilings, ornate detailing, and grand scale—announces European power. Walking through the station, you encounter both historical grandeur and contemporary reality: trains still depart, the building functions as transit hub, but the grandeur is faded. The station represents colonialism's physical infrastructure: beautiful but built through coercion, extraction, and violence. Contemporary efforts document this complex history, resisting simple nostalgia for 'colonial architecture' while acknowledging the building's actual significance.",im:"The railway station's grand facade glows in afternoon light; passengers move through the terminal; the ornate interior visible through tall windows.",t:"Located in downtown Nairobi. Walking distance from city center. Accessible to visitors (though security may limit areas). Allow 30-45 minutes to explore. Photography usually permitted in public areas. Go during daytime for safety and visibility.",c:[],r:"g",nn:"Nairobi Railway Station",ns:"Kituo cha reli cha Edwadi kilichojengwa na Wabritani mwaka 1899",nst:"Jengo linajumlisha umeme wa Wabritani; inatumika leo lakini ukali wa kukolonea inakumbuka.",nt:"Katikati ya Nairobi. Kwa miguu kutoka kati. Kutembelea inaweza kwa wote. Permita 30-45 dakika. Picha kawaida inakubali. Mchana tu."},{id:7,n:"Karen Blixen House — Colonial Literary Legacy",a:"Karen",v:["history","hidden","culture"],d:30,s:"The former home of Danish author Karen Blixen (who wrote 'Out of Africa'), preserved as a museum documenting colonial Kenya through her perspective.",st:"Karen Blixen (pen name Isak Dinesen) lived in Kenya 1914-1931 and wrote the famous memoir 'Out of Africa' about her experiences. Her house, preserved as a museum, offers insight into colonial Kenya's aesthetics and power structures. The house is beautifully furnished, surrounded by gardens, and represents European settler lifestyle. The museum provides Blixen's narrative, but contemporary interpretation also includes critical perspective: Blixen's work romanticized colonialism; she benefited from colonial systems that dispossessed Kenyans. Walking the house and gardens, you encounter the elegant lifestyle colonialism created for European settlers and the silenced Kenyan voices in Blixen's narrative.",im:"A colonial-era bedroom with period furniture, high ceilings, and large windows overlooking manicured gardens; the setting elegant and historically layered.",t:"Located in Karen neighborhood, south of Nairobi (20-30 minutes by car). Admission fee required. Open daily. Allow 1-2 hours. The house and gardens are beautifully maintained. Photography allowed in most areas. The museum shop has books about Blixen and Kenya.",c:[],r:"g",nn:"Karen Blixen House",ns:"Nyumba ya mwanzi Karen Blixen yenye hadithi ya koloni",nst:"Nyumba ya Dane Karen Blixen; inaandika 'Out of Africa'; museumi inajumlisha mtazamo wa koloni.",nt:"Karen, kusini juu ya Nairobi. Ada inahitajika. Abubuzi kila siku. Permita 1-2 saa. Nyumba na bustani vizuri. Picha inakubali."},{id:8,n:"Masai Mara National Reserve — Safari Experience (Day Trip)",a:"Masai Mara (Day Trip)",v:["nature","wildlife","sacred"],d:480,s:"Kenya's most famous wildlife reserve, home to the Great Migration of wildebeest, lions, elephants, and Maasai cultural heritage.",st:"Masai Mara is one of Africa's most extraordinary ecosystems. In the dry season (July-October), millions of wildebeest migrate from Tanzania's Serengeti, crossing crocodile-filled rivers in a spectacular wildlife event. The reserve hosts the highest concentration of predators in Africa: lions, leopards, cheetahs, hyenas hunt alongside massive herbivore populations. The landscape is savanna grassland with acacia trees. The reserve is also Maasai ancestral land; the Maasai people coexist with wildlife. Visiting requires respecting Maasai cultural presence—not treating the landscape as empty wilderness but as Maasai homeland. Responsible tourism supports both wildlife conservation and Maasai communities. Early morning and evening safari drives offer the best wildlife viewing.",im:"Thousands of wildebeest pour across a river as crocodiles lie in wait; lions watch from nearby; the landscape teeming with life and predator-prey drama.",t:"Located 270km west of Nairobi (4-5 hours by car). Accessible by domestic flight (1 hour) or overland drive. Most visitors stay overnight to experience sunrise/sunset game drives. Accommodation ranges from budget to luxury. Entry fees required. Best season is July-October (Great Migration). Go with reputable operators who benefit local Maasai.",c:[],r:"g",nn:"Masai Mara National Reserve",ns:"Hifadhi ya kinyama na ardhi ya Wamasai wenye hadithi",nst:"Hadithi ya nusu milioni wildebeest; simba, chui, cheta; ardhi ya Wamasai inakumbuka.",nt:"270km kulia juu ya Nairobi. Ndege (1h) au gari (4-5h). Kwa usiku kwa ajali. Kumkamata asubuhi na jioni. Julio-Oktoba heri sana."},{id:9,n:"Kibera — Largest Slum and Community Reality",a:"Kibera",v:["local","culture","hidden"],d:30,s:"Africa's largest slum neighborhood, home to over 1 million residents, requiring respectful community-based tourism and support for grassroots initiatives.",st:"Kibera is often described as Africa's largest slum—a sprawling neighborhood of approximately 1 million residents living in dense, informal settlements. The area emerged as a squatter settlement; residents were denied official ownership and services. Kibera faces challenges: limited water and sanitation, limited electricity, inadequate healthcare and education. Yet Kibera is not simply a place of poverty; it's a thriving community with street vendors, small shops, churches, schools, and strong social networks. Respectful tourism involves visiting with community guides from Kibera who offer authentic perspective, counter stereotypes, and direct income to residents. Tours might include visits to community organizations, social enterprises, schools, or homes of residents willing to share. The experience is humbling and reveals human agency and resilience within systemic constraint.",im:"Narrow pathways wind between informal structures; vendors sell goods from small shops; children play in lanes; community life bustles.",t:"Located southwest of downtown Nairobi (accessible by taxi). Visit only with registered community guide or tour operator. Allow 2-3 hours. Go during daylight. Respect privacy and ask permission before photographing residents. Support community guides and enterprises. Go with genuine interest and humility.",c:[],r:"g",nn:"Kibera",ns:"Kijiji kinene sana na kumkamata kwa watu wenye hatari",nst:"Nusu milioni watu wanakaa; kumkamata kwa kumkamata na kusagana; kumkamata kwa heshima tu.",nt:"Kulia kusini juu ya kati. Pamoja na mwenye kuchangia jamii. Permita 2-3 saa. Mchana tu. Husika kwa kumkamata."},{id:10,n:"Nairobi Central Park — Urban Green Space",a:"Downtown Nairobi",v:["nature","local","hidden"],d:25,s:"A 15-hectare public park in downtown Nairobi with walking trails, diverse bird species, and peaceful green space amid urban density.",st:"Nairobi Central Park, formerly City Park, was redesigned and reopened to provide public green space. The park contains forests, walking trails, and a small wetland. Despite being surrounded by dense urban development, the park harbors significant biodiversity: over 300 bird species have been recorded, plus mammals, reptiles, and insects. The park serves locals as a recreation space—joggers, walkers, families on weekends. The park's commitment to public access and conservation represents counter-narrative to privatization of urban space. Walking the park on a weekday morning, you encounter local Nairobi residents engaging with nature.",im:"A forested trail winds through green vegetation; birds call overhead; urban buildings visible beyond the tree line; the space peaceful and surprising.",t:"Located in downtown Nairobi. Walking distance or short drive from city center. Admission fee required (modest). Open daily. Allow 1-2 hours for a peaceful walk. Early morning best for bird watching and exercise. The trails are easy to moderate.",c:[],r:"g",nn:"Nairobi Central Park",ns:"Bustani ya jiji yenye hazina ya ndege na uoto",nst:"Hektari 15 katikati juu ya Nairobi; ndege 300 juu; kumkamata kwa watu wenye ndoto.",nt:"Nairobi kati. Mwendo au gari fupi. Ada inahitajika. Abubuzi kila siku. Permita 1-2 saa. Asubuhi nzuri kwa ndege."},{id:11,n:"Nairobi Arboretum — Tree Sanctuary",a:"Nairobi",v:["nature","beautiful","hidden"],d:30,s:"A 33-hectare tree sanctuary featuring native and exotic species, walking trails, bird watching, and peaceful natural setting.",st:"The Nairobi Arboretum, established in 1907, preserves and documents Kenya's diverse tree species and serves as research center for forestry. The arboretum contains over 350 tree species: indigenous Kenyan species and introduced species. Walking the arboretum, you experience Kenya's botanical diversity. The tall trees create shaded cool spaces—refuges from the city's heat and intensity. Bird watching is excellent; the trees attract numerous species. The arboretum serves both conservation and recreational functions: educating about Kenya's forest heritage while providing public access to natural spaces. The peaceful atmosphere and botanical focus create contemplative experience distinct from other Nairobi attractions.",im:"Tall trees create a forest canopy overhead; filtered light creates dappled paths; birds call; the urban world feels distant.",t:"Located in Nairobi (accessible by taxi or car). Admission fee required (modest). Open daily. Allow 1-2 hours for a leisurely walk. Morning visits offer best bird watching and cooler temperatures. The trails are easy. Bring water and binoculars for bird watching.",c:[],r:"g",nn:"Nairobi Arboretum",ns:"Bustani ya miti yenye ndege na kumkamata",nst:"Miti 350 inakaa; ndege katika miti; kumkamata kwa watu wenye ndoto.",nt:"Nairobi. Teksi au gari. Ada inahitajika. Abubuzi kila siku. Permata 1-2 saa. Asubuhi nzuri kwa ndege."},{id:12,n:"Nairobi Stock Exchange — Economic Hub",a:"Downtown Nairobi",v:["history","architecture","local"],d:20,s:"East Africa's oldest and largest stock exchange, representing Kenya's role as economic hub, with modern trading floors and financial institutions.",st:"The Nairobi Stock Exchange, established in 1954 during the colonial period, represents Kenya's emergence as East Africa's economic center. The exchange facilitates trading of securities, investment funds, and government bonds. The modern trading floor uses electronic systems; the building architecture reflects contemporary financial sector. The exchange's existence and prominence reflect Kenya's colonial history (infrastructure built to serve colonial extraction), post-colonial positioning (Kenya as regional economic power), and contemporary reality (investment and finance concentrated in Nairobi). Visiting or learning about the exchange provides context for understanding Nairobi's role in East African and African economics. Tours may be available for those interested in understanding financial systems and Kenya's economic structure.",im:"A modern trading floor with electronic displays showing stock prices; financial professionals monitor markets; the pace fast and focused.",t:"Located in downtown Nairobi. Limited public access; tours may require advance arrangements. Allow 30-45 minutes. Photography may be restricted. Go with genuine interest in understanding Kenya's economy.",c:[],r:"g",nn:"Nairobi Stock Exchange",ns:"Soko la hisa ya Uraia unaojumlisha kiuchumi",nst:"Soko la 1954; inakaa kiuchumi wa Afrika Mashariki; kumkamata kwa watu wenye ndoto.",nt:"Katikati ya Nairobi. Kumkamata inaweza kuwajali. Permita 30-45 dakika. Hati zingine zinaweza kukamatia."},{id:13,n:"Westlands Shopping District — Contemporary Urban Culture",a:"Westlands",v:["local","architecture","food"],d:30,s:"An upscale neighborhood with shopping centers, restaurants, galleries, and representing contemporary Nairobi's cosmopolitan culture.",st:"Westlands is Nairobi's most developed and affluent neighborhood—a place of shopping centers, upscale restaurants, galleries, and international hotels. The neighborhood contrasts sharply with Kibera or other areas: manicured, wealthy, cosmopolitan. Westlands represents contemporary Nairobi's aspirations and class divisions. Walking Westlands, you encounter the global middle and upper class: international franchises, expensive cars, English-language signage, international cuisine. The neighborhood offers insight into Nairobi's economic and social stratification: wealth concentration and inequality made visible through urban geography. Shopping, dining, and gallery visiting are possible here, though the experience reflects privilege and exclusion.",im:"Modern shopping centers with international brands; upscale restaurants with outdoor seating; manicured landscapes; the neighborhood clean and wealthy.",t:"Located northwest of downtown Nairobi (20-30 minutes by car). Easily accessible by taxi. Free to walk and explore. Shopping and dining at various price points within the wealthy range. The neighborhood is safe and cosmopolitan. Go to understand Nairobi's economic divides.",c:[],r:"g",nn:"Westlands",ns:"Kumkamata ya jiji yenye kumkamata na kumkamata",nst:"Jiji linajumlisha kumkamata ya Nairobi; kilichonihitaji kumkamata na kumkamata.",nt:"Kulia kulia juu ya kati. Teksi inaweza kuja. Kumkamata kwa wote. Kumkamata ya jiji."},{id:14,n:"Nairobi War Cemetery — Historical Military Site",a:"Parklands",v:["history","hidden","architecture"],d:25,s:"A well-maintained cemetery for Commonwealth soldiers killed in East Africa during World War II, representing colonial and military history.",st:"The Nairobi War Cemetery preserves graves of Commonwealth soldiers who died in East Africa during World War II. The cemetery is beautifully maintained with rows of headstones in a peaceful garden setting. The stones record names, units, dates of death, and ages—many soldiers were in their early twenties. The cemetery documents World War II's global reach: the war was fought in East Africa as Italy controlled Abyssinia and Somaliland. The cemetery represents both human loss and colonial military structures. Walking the cemetery, you encounter history made tangible: individual deaths aggregated into historical events. The cemetery also reflects colonialism's racial hierarchies; some sections honor European soldiers while other sections are segregated.",im:"Rows of white headstones in neat formations; each stone bearing a name and date; the garden peaceful and contemplative; the scale revealing war's vastness.",t:"Located in Parklands, north of downtown (15-20 minutes by car). Free admission. Open daily. Allow 30-45 minutes. Respectful behavior required. Photography permitted. The maintenance and care are exemplary.",c:[],r:"g",nn:"Nairobi War Cemetery",ns:"Kaburi la milite yenye kumkamata na kumkamata",nst:"Kaburi la wanajeshi wa Wabritani; kumkamata ya Dunia Pili; kumkamata juu ya kumkamata.",nt:"Parklands, kulia juu. Kumkamata gratuita. Abubuzi kila siku. Permita 30-45 dakika. Heshima inahitajika."},{id:15,n:"Maasai Market — Street Vendors and Crafts",a:"Multiple Locations",v:["local","culture","food"],d:20,s:"A sprawling outdoor market with street vendors selling crafts, textiles, jewelry, and goods representing Kenyan and East African artisan culture.",st:"The Maasai Market is not a single location but rather a collection of street markets throughout Nairobi where vendors sell crafts, textiles, jewelry, and goods. The market represents grassroots economy: vendors are individual artists, craftspeople, and traders selling directly to customers. The goods reflect Kenyan artisan traditions: beaded jewelry, carved wooden items, colorful textiles, leather goods. The market is chaotic, vibrant, and authentic—a space where local commerce happens. Bargaining is expected and part of the culture. The market offers opportunities to support artisans directly and acquire authentic Kenyan crafts. The energy and colors of the market provide vivid experience of Nairobi's street culture.",im:"A street vendor arranges colorful beaded jewelry on a table; surrounding tables display carved wood, textiles, and crafts; hundreds of vendors fill the market.",t:"Markets located throughout Nairobi; main concentration often near Nairobi Central Park or along streets in downtown. Best visited during daylight hours (8am-5pm). Bring cash for bargaining. Respect vendors' space and ask before photographing. The experience is overwhelming but rewarding. Bargaining is expected and respectful.",c:[],r:"g",nn:"Maasai Market",ns:"Soko la harusi na kumkamata za sanaa",nst:"Soko la juu linajumlisha maajabu na kumkamata za Wamasai na Wafriki Mashariki.",nt:"Soko juu ya Nairobi. Mchana (8h-17h) nzuri. Kumkamata kwa kumkamata. Heshima kwa wauzaji. Kumkamata inahitajika."},{id:16,n:"Hell's Gate National Park — Geothermal Landscape (Day Trip)",a:"Hell's Gate (Day Trip)",v:["nature","geology","beautiful"],d:360,s:"A unique national park 90km northwest with dramatic canyon, hot springs, geothermal power station, and hiking trails.",st:"Hell's Gate National Park, located on Kenya's Rift Valley, features a dramatic gorge with steep red cliffs rising from the valley floor. The park's distinctive feature is geothermal activity: hot springs, steam vents, and a geothermal power station generate much of Kenya's electricity. The landscape is dramatic and otherworldly: red earth, sparse vegetation, and geological forces made visible. Visitors can hike through the gorge, encounter wildlife (zebras, antelopes, buffalo), and observe geothermal features. The combination of natural beauty and evidence of human energy production (the power station) creates interesting juxtaposition. The park is accessible as a day trip from Nairobi.",im:"A narrow gorge with sheer red cliffs rises hundreds of meters on both sides; a stream runs through the bottom; steam vents visible, the landscape geologically active.",t:"Located 90km northwest of Nairobi (1.5-2 hours by car). Entry fee required. Open daily. Hiking trails of various difficulty. Allow 4-6 hours including travel time. Bring water, sunscreen, and good shoes. Early morning is best for wildlife and avoiding heat.",c:[],r:"g",nn:"Hell's Gate National Park",ns:"Hifadhi yenye joto la kumkamata na kumkamata",nst:"Kumkamata ya Rift Valley; kufa moto; kumkamata ya juu.",nt:"90km kulia juu. 1.5-2h gari. Ada inahitajika. Abubuzi kila siku. Permita 4-6h. Nzuri asubuhi."},{id:17,n:"Uhuru Park — Independence Monument",a:"Downtown Nairobi",v:["history","local","architecture"],d:20,s:"A public park with monuments to Kenya's independence movement, including a statue of Jomo Kenyatta, representing national identity.",st:"Uhuru Park commemorates Kenya's independence from British colonial rule, achieved in 1963. The park features monuments including a statue of Jomo Kenyatta, Kenya's first president. The park serves as gathering space for celebrations on Kenya's Independence Day (December 12). The monuments assert Kenyan sovereignty and national identity. Walking the park, you encounter history made material: statues, plaques, and spaces dedicated to independence struggle and post-independence nation-building. The park is popular with locals—joggers, families, political demonstrations—making it an active space of civil society.",im:"A large statue of Jomo Kenyatta dominates the park; Kenyan flags fly; the park green and well-maintained; locals enjoying the space.",t:"Located in downtown Nairobi. Walking distance from city center. Free admission. Open daily. Allow 30 minutes. The monuments are the main attraction. Safe during daytime. Go to understand Kenya's postcolonial identity.",c:[],r:"g",nn:"Uhuru Park",ns:"Bustani ya kumkamata ya Kenya na kumkamata",nst:"Kumkamata ya kumkamata 1963; kumkamata ya Kenyatta; kumkamata ya kilichonihitaji.",nt:"Katikati ya Nairobi. Mwendo mwendo. Kumkamata gratuita. Abubuzi kila siku. Permita 30 dakika."},{id:18,n:"Nairobi Museum of Modern Art",a:"Westlands",v:["art","culture","hidden"],d:30,s:"A contemporary art museum showcasing Kenyan and African modern and contemporary art, with rotating exhibitions.",st:"The Nairobi Museum of Modern Art (or various smaller contemporary galleries) showcase Kenyan and African contemporary artists. The work often addresses social issues—inequality, identity, colonialism's legacy, environmental concerns. Contemporary African art is internationally recognized but often underrepresented; supporting local galleries and museums helps center African artistic voices. The galleries range from small independent spaces to larger institutions. Visiting contributes to understanding Kenya's creative culture and supporting artists.",im:"A gallery displays abstract paintings and installations; the work exploring contemporary Kenyan experiences and global artistic trends.",t:"Located in various neighborhoods (particularly Westlands and downtown). Admission typically modest or free. Hours vary. Allow 1-2 hours. Photography often permitted (ask ahead). Go with interest in contemporary African art.",c:[],r:"g",nn:"Nairobi Museum of Modern Art",ns:"Museumi ya sanaa ya kisasa ya Kenya na Afrika",nst:"Sanaa inajumlisha kumkamata ya kumkamata na kumkamata.",nt:"Westlands na kati. Ada inahitajika kawaida. Abubuzi inatofautiana. Permita 1-2 saa. Picha kawaida."},{id:19,n:"Langata Giraffe Centre Trail",a:"Langata",v:["nature","wildlife","beautiful"],d:25,s:"A walking trail through fynbos-like habitat south of Nairobi with wildlife viewing and botanical interest, connecting to Giraffe Centre.",st:"The area surrounding the Giraffe Centre includes walking trails through native habitat. The landscape is characterized by acacia trees, grasslands, and thorny vegetation. Walking offers opportunities to see birds, antelopes, and occasionally larger mammals. The trails are moderate difficulty and accessible to most visitors. The botanical environment is interesting: adapted to East African climate with water-conserving characteristics. Combining Giraffe Centre with surrounding trail walking offers more complete ecological experience than Giraffe Centre alone.",im:"A walking path winds through acacia trees; birds call overhead; the landscape open and grassy; distant views of surrounding areas.",t:"Located in Langata, south of Nairobi (20-30 minutes by car). Access through Giraffe Centre or nearby parks. Trails are well-marked. Allow 1-2 hours for a moderate walk. Go early morning for best wildlife viewing and cooler temperatures.",c:[],r:"g",nn:"Langata Giraffe Centre Trail",ns:"Njia ya kumkamata kwa kumkamata na kumkamata ya twiga",nst:"Njia inaonyesha kumkamata na kumkamata ya ardhi; ndege na antelope kawaida.",nt:"Langata, kusini. Ada inahitajika. Njia za kumkamata. Permita 1-2 saa. Asubuhi nzuri."},{id:20,n:"Kenyatta International Convention Centre — Modern Architecture",a:"Downtown Nairobi",v:["architecture","modern","hidden"],d:20,s:"A modernist landmark building completed in 1973, representing Kenya's post-independence architectural ambitions with distinctive cylindrical design.",st:"The Kenyatta International Convention Centre (KICC), completed in 1973, is an iconic modernist structure. The building's distinctive cylindrical form was considered revolutionary; its height made it Nairobi's tallest building for many years. The building represents post-independence Kenya's optimism and architectural ambitions. Walking around or inside the building (depending on access), you encounter impressive modernist design. The building functions as conference center and cultural venue. It represents a moment in Kenyan history when architectural forms expressed national aspirations.",im:"The cylindrical glass and steel structure rises prominently from downtown; the distinctive form visible from many angles across the city.",t:"Located in downtown Nairobi. Walking distance from city center. Exterior viewing is free; interior access may require attending an event or having a guide. Allow 15-30 minutes to appreciate the architecture. The design is considered significant in modernist architecture history.",c:[],r:"g",nn:"Kenyatta International Convention Centre",ns:"Jengo la kumkamata linajumlisha kumkamata ya kumkamata",nst:"Jengo linalojumlisha kumkamata ya kumkamata 1973; kumkamata ya kumkamata.",nt:"Katikati ya Nairobi. Mwendo kutoka kati. Kumkamata ya nje gratuita. Permata 15-30 dakika."},{id:21,n:"Nairobi Reptile Park",a:"Nairobi",v:["wildlife","nature","hidden"],d:30,s:"A facility housing various reptile species native to Kenya, with educational programs about reptile ecology and conservation.",st:"The Nairobi Reptile Park houses numerous reptile species: snakes, lizards, crocodiles, and tortoises found in Kenya and East Africa. The park serves both educational and conservation functions: teaching about reptiles' ecological roles and supporting conservation of threatened species. Walking through the park, you encounter reptiles in semi-naturalistic enclosures. Staff provide information about species characteristics, habitats, and threats. Reptiles are often feared and misunderstood; the park aims to shift perspectives and build appreciation for these animals' importance.",im:"A large crocodile rests in water; nearby, a colorful lizard climbs; various snakes are displayed in terrariums with natural substrate.",t:"Located in Nairobi (accessible by taxi or car). Admission fee required (modest). Open daily. Allow 1-2 hours. Educational staff available. Photography usually permitted. Good for families and those interested in herpetology.",c:[],r:"g",nn:"Nairobi Reptile Park",ns:"Bustani ya kumkamata yenye kupiga na kumkamata",nst:"Kupiga na kumkamata ya Kenya; kumkamata ya kumkamata.",nt:"Nairobi. Teksi au gari. Ada inahitajika. Abubuzi kila siku. Permita 1-2 saa."},{id:22,n:"Nairobi Gallery Routes — Art Galleries and Studios",a:"Various Locations",v:["art","culture","hidden"],d:30,s:"Self-guided or group routes through contemporary art galleries and artist studios showcasing Kenyan and East African artists.",st:"Nairobi has a vibrant contemporary art scene with galleries in various neighborhoods. Galleries showcase Kenyan artists working in painting, sculpture, photography, video, and installation. Many galleries are artist-run or support emerging artists. Gallery routes and art walks offer curated experiences through multiple galleries. The art often addresses contemporary Kenyan social issues, cultural identity, and aesthetic explorations. Supporting galleries and buying art directly supports artists. Group gallery walks led by curators or artists offer deeper insight into artistic practice and contemporary art discourse.",im:"A gallery wall displays colorful paintings; visitors study the work intently; the artist visible in an adjacent studio space working.",t:"Galleries located throughout Nairobi (particularly Westlands, downtown, Karura Forest area). Gallery walks can be self-guided or organized. Admission typically free or modest. Hours vary. Allow 2-3 hours for multiple gallery visits. Go Thursday evenings for openings and social atmosphere.",c:[],r:"g",nn:"Nairobi Gallery Routes",ns:"Rota ya kumkamata kwa kumkamata ya Kenya",nst:"Kumkamata za kisasa za Kenya na Afrika; kumkamata ya kumkamata.",nt:"Juu ya Nairobi. Njia inaweza kuwa inajifunza. Ada kawaida gratuita. Permita 2-3 saa. Kamis akwama kwa uwazi."},{id:23,n:"Karura Forest Reserve — Urban Forest Sanctuary",a:"Karura",v:["nature","beautiful","hidden"],d:40,s:"A 2,000-hectare forest reserve within metropolitan Nairobi with waterfalls, walking trails, biodiversity, and historical caves.",st:"Karura Forest Reserve is a remarkable urban oasis—a 2,000-hectare indigenous forest surrounded by the sprawling city. The forest contains numerous ecological zones, waterfalls, streams, and wildlife. Walking trails range from easy to challenging. Karura has significant cultural and historical importance to Kikuyu people: sacred sites, caves, and spiritual significance persist. The forest has undergone environmental degradation from human encroachment; conservation efforts work to restore and protect it. Walking Karura, you encounter a deeply biodiverse ecosystem: towering indigenous trees, bird calls, peaceful streams. The forest provides psychological and physical respite from urban intensity. The juxtaposition of pristine forest within a city of millions is remarkable.",im:"A waterfall cascades over rocks in the forest; surrounding vegetation dense and green; a walking path winds through the forest floor.",t:"Located within Nairobi (accessible by taxi or car). Admission fee required. Open daily but hours vary. Allow 2-4 hours for a walk. Go with a guide for safety and to learn forest ecology and cultural history. Bring water. The forest is beautiful year-round.",c:[],r:"g",nn:"Karura Forest Reserve",ns:"Msitu wa kumkamata na kumkamata katikati juu ya Nairobi",nst:"Msitu wa kumkamata; kumkamata ya Kikuyu; kumkamata ya kumkamata.",nt:"Nairobi. Teksi au gari. Ada inahitajika. Abubuzi kila siku. Permata 2-4 saa. Pamoja na mwenye kuchangia."},{id:24,n:"Nairobi Dinner and Dance Shows — Cultural Entertainment",a:"Various Venues",v:["culture","local","food"],d:30,s:"Evening entertainment venues featuring Kenyan dance, music, and traditional food, offering cultural immersion in festive setting.",st:"Several venues throughout Nairobi offer dinner and dance shows featuring Kenyan and East African music, dance, and food. Performers in traditional costumes dance; live bands play; visitors dine on Kenyan cuisine. The shows are somewhat touristy but offer introduction to Kenyan cultural expressions. The food is authentic; the energy is festive. Shows vary in quality and authenticity; some prioritize spectacle over genuine cultural representation. Seeking shows that employ local artists and support cultural practitioners ensures tourism benefits communities. The experience offers evening entertainment and cultural exposure.",im:"Dancers in vibrant traditional clothing perform on stage; diners eat and watch; the venue energetic and festive; musicians play live traditional music.",t:"Venues located throughout Nairobi (particularly downtown and Westlands). Advance booking recommended. Admission includes dinner. Allow 3-4 hours. Photography usually permitted. Go to experience Kenyan cultural performances and cuisine.",c:[],r:"g",nn:"Nairobi Dinner and Dance Shows",ns:"Kumkamata ya kumkamata na kumkamata ya kumkamata",nst:"Kumkamata ya kumkamata na kumkamata ya kumkamata; kumkamata ya kumkamata.",nt:"Juu ya Nairobi. Mahitaji ya kumkamata. Ada inajumlisha kumkamata. Permata 3-4 saa. Picha kawaida."},{id:25,n:"Nairobi International School — Expat Community Insight",a:"Various Areas",v:["local","hidden","architecture"],d:20,s:"International schools in Nairobi serving expatriate and elite Kenyan families, revealing socioeconomic divisions and educational infrastructure.",st:"Nairobi hosts numerous international schools serving expatriate families and elite Kenyans. These schools (including Nairobi International School, Kenya High School, Nairobi Preparatory School) represent wealth concentration and global elite networks. The schools offer curricula often based on international standards (British, American, International Baccalaureate). The existence and prominence of international schools reflects Kenya's position in global capitalism and the presence of expatriate communities. Walking past or learning about international schools offers perspective on class divisions and educational inequality in Kenya: international schools serve the wealthy and globally-connected; public schools often lack basic resources.",im:"A school campus features modern buildings, manicured grounds, and expensive sports facilities; the contrast with surrounding neighborhoods stark.",t:"Located throughout Nairobi (particularly in affluent neighborhoods). Campus visits may require permission. Allow 30 minutes to observe exterior. The schools themselves are not primary attractions but provide insight into Nairobi's socioeconomic structure.",c:[],r:"g",nn:"Nairobi International School",ns:"Kumkamata ya kumkamata ya kumkamata",nst:"Kumkamata ya kumkamata ya kumkamata; kumkamata ya kumkamata.",nt:"Juu ya Nairobi. Kumkamata inaweza kuwajali. Permata 30 dakika. Kumkamata ya kumkamata."},{id:26,n:"Nairobi's Colonial Architecture Walking Tour",a:"Downtown and Surrounding",v:["history","architecture","hidden"],d:30,s:"A walking tour through downtown Nairobi examining colonial-era buildings, Victorian architecture, and post-colonial development.",st:"Walking Nairobi's downtown reveals architectural layers: colonial-era buildings (railway station, government buildings) standing alongside post-colonial structures and contemporary developments. Colonial architecture announces European power and governance; many buildings reflect racial hierarchies (separate entrances, segregated spaces). Post-colonial buildings represent Kenya's independent design and national aspirations. Contemporary development often demolishes older structures, erasing history. A thoughtful walking tour examines colonial architecture critically—not nostalgically preserving colonialism but understanding its material legacies and contradictions.",im:"Colonial buildings with Victorian and Edwardian styling stand alongside modern glass structures; the architectural juxtaposition visible on single street.",t:"Downtown Nairobi is walkable for those comfortable with urban environments. Tours available through tourism offices or hotels. Allow 1-2 hours. Go during daytime for safety. Wear comfortable shoes. The architecture tells Kenya's historical narrative.",c:[],r:"g",nn:"Colonial Architecture Walking Tour",ns:"Njia ya kumkamata kwa kumkamata ya kumkamata",nst:"Kumkamata ya kumkamata linajumlisha kumkamata ya kumkamata.",nt:"Katikati ya Nairobi. Njia inaweza kuwa inatumika. Permata 1-2 saa. Mchana tu. Calzado cómodo."},{id:27,n:"Ngong Hills — Hiking and Views",a:"Ngong",v:["nature","views","beautiful"],d:45,s:"A mountain range south of Nairobi offering hiking trails with panoramic views of the Great Rift Valley and surrounding landscape.",st:"The Ngong Hills, rising about 2,000 meters, offer dramatic scenery and hiking opportunities. The hills are named after Maasai warriors (ngong means 'knees'—the peaks resemble knees). On clear days, you can see across the Rift Valley to Tanzania. The hiking trails offer moderate to challenging climbs. The views from the summits are expansive and rewarding. The hills hold spiritual significance for the Maasai and other communities. Hiking requires respect for the land as sacred and culturally significant, not merely recreational. Early morning hikes offer the best views and cooler temperatures.",im:"The Ngong Hills rise dramatically; from the summit, the vast landscape spreads in all directions; the Great Rift Valley visible in the distance.",t:"Located south of Nairobi (30-40 minutes by car). Access points with parking areas. Hiking trails well-marked. Allow 3-4 hours for a summit hike. Go early morning for views and cooler temperatures. Bring water and good hiking shoes. Go with a guide for cultural context.",c:[],r:"g",nn:"Ngong Hills",ns:"Milima yenye kumkamata na kumkamata",nst:"Milima inajumlisha kumkamata ya Maasai; kumkamata ya kumkamata.",nt:"Kusini juu. 30-40 dakika gari. Kumkamata njia. Permata 3-4 saa. Asubuhi nzuri. Pamoja na mwenye kuchangia."},{id:28,n:"Nairobi Safari Park — Alternative Zoo Experience",a:"Nairobi",v:["wildlife","nature","local"],d:40,s:"A wildlife facility combining zoo animals with drive-through safari experience, allowing close observation of large animals without leaving Nairobi.",st:"Nairobi Safari Park offers a middle ground between traditional zoos and wild safari reserves. The facility has drive-through sections where you observe animals from your vehicle while remaining safe. The animals include lions, giraffes, zebras, rhinos, and other East African species. The experience is less wild than a true reserve but more interactive than most zoos. The park serves conservation and educational functions. The experience is more artificial than natural safari but offers wildlife observation for those unable or unwilling to undertake multi-day safaris.",im:"Giraffes approach the vehicle during a drive-through; visitors in the car observe the animals at close range; the animals unbothered by the vehicle.",t:"Located outside Nairobi (30-40 minutes by car). Admission fee required. Open daily. Your own vehicle or guided tour available. Allow 2-3 hours. Early morning best for wildlife activity. The experience is family-friendly.",c:[],r:"g",nn:"Nairobi Safari Park",ns:"Bustani ya kumkamata yenye kumkamata ya kumkamata",nst:"Kumkamata ya kumkamata; kumkamata ya kumkamata.",nt:"Juu juu ya Nairobi. 30-40 dakika gari. Ada inahitajika. Abubuzi kila siku. Permata 2-3 saa. Asubuhi nzuri."},{id:29,n:"Nairobi Street Food Tour — Culinary Culture",a:"Various Neighborhoods",v:["food","local","culture"],d:25,s:"Guided tours through Nairobi's street food scene sampling local dishes, learning culinary traditions, and engaging with food vendors.",st:"Street food is central to Nairobi's food culture. Vendors throughout the city sell prepared food: chapati (flatbread), samosas, nyama choma (grilled meat), ugali (cornmeal staple), various soups and vegetables. Street food reflects Kenyan culinary traditions and cultural mixing (Indian, Swahili, Kikuyu influences). Street food tours led by local guides involve tasting multiple dishes, learning about ingredients and preparation, and engaging directly with vendors. The tours support informal economy where most Nairobi residents earn livelihoods. Eating street food requires openness and trust in vendors' food safety practices.",im:"A vendor prepares chapati on a griddle; nearby, another vendor grills meat skewers; customers eat while standing; the street alive with food commerce.",t:"Tours available through tourism offices and hotels. Allow 2-3 hours. Go during typical meal times (breakfast, lunch, evening). Bring cash for vendors. Taste multiple dishes. The food is affordable and delicious. Trust in the process.",c:[],r:"g",nn:"Nairobi Street Food Tour",ns:"Njia ya kumkamata kwa kumkamata ya kumkamata",nst:"Kumkamata ya kumkamata; kumkamata ya kumkamata.",nt:"Njia inapatikana kwa kumkamata. Permata 2-3 saa. Sehemu za kumkamata. Traiga effekte. Kumkamata na kumkamata."},{id:30,n:"Nairobi Sunset from City Viewpoint",a:"Downtown Nairobi",v:["views","beautiful","local"],d:15,s:"Finding an elevated viewpoint (rooftop bar, building outlook) to watch Nairobi's sunset as the city's lights begin to glow.",st:"Watching the sunset over Nairobi from an elevated vantage point offers perspective on the city's vastness. As the sun descends, the light transforms Nairobi's landscape into shades of orange and gold. As darkness falls, the city's lights gradually glow—streetlights, building lights, vehicle lights creating a network of human occupation. The view reveals the city's scale: neighborhoods extending in all directions, the sprawl of development, the landscape's geography. Several rooftop bars and hotel viewpoints offer sunset experiences. The moment is contemplative and beautiful.",im:"The sun descends toward the horizon as Nairobi spreads below in silhouette; the sky turns orange and purple; city lights begin to glow.",t:"Rooftop bars and hotels throughout Nairobi (Westlands, downtown) offer sunset views. Allow 1 hour. Go 30 minutes before sunset to find seating and observe light change. Most venues serve food and beverages. The experience is popular but magical.",c:[],r:"g",nn:"Nairobi Sunset View",ns:"Kumkamata ya kumkamata juu ya Nairobi",nst:"Kumkamata ya kumkamata; jiji inajumlisha kumkamata.",nt:"Kumkamata ya kumkamata kwa kumkamata. Permata 1 saa. 30 dakika kabla kumkamata. Kumkamata ya kumkamata."},{id:31,n:"Kenyatta International Convention Centre Rooftop (KICC Helipad) — Free City Viewpoint",s:"Climb to the helipad on top of this 1973 landmark for 360° free views of downtown Nairobi, Uhuru Park, and skyline towers like Nyayo House and Times Tower.",a:"Harambee Avenue, Nairobi CBD",st:"Last week I took my cousin up there on a clear afternoon; we saw Parliament, the GPO, and even distant Ngong Hills while chatting with a security guard who shared stories of past protests viewed from above.",im:"Wind whips your face as horns blare below and the sun glints off glass towers.",t:"Enter main lobby weekdays before 4 PM, ask security for rooftop access (free for Kenyans, small tip KSh 200 for guide), avoid weekends when closed.",nst:"Wikiendi iliyopita nilimpeleka binamu wangu huko juu alasiri ya hewa safi; tuliona Bunge, GPO, na hata Ngong Hills mbali wakati tunazungumza na mlinzi aliyeshiriki hadithi za maandamano ya zamani kutoka juu.",nt:"Ingia lobi kuu wiki kazi kabla ya saa 4 jioni, muulize usalama ruhusa ya dari ya juu (bure kwa Wanakenya, kidogo tip KSh 200 kwa mwongozi), epuka wikendi inapofungwa."},{id:32,n:"Jevanjee Gardens — Free Downtown Park",s:"A quiet public garden in the CBD with benches, fountains, and shade trees, perfect for people-watching near City Market.",a:"Taifa Road, Nairobi CBD",st:"I sat here last Sunday reading while matatu conductors shouted routes; an old man selling peanuts shared how it was a protest spot in the 80s.",im:"Mango trees drip sticky sap onto stone benches amid diesel exhaust and vendor calls.",t:"Enter from Taifa Road any day, grab free benches near the fountain, watch for pickpockets but it's safe midday with crowds.",nst:"Nilikaa hapa Jumapili iliyopita nikisoma wakati makondakta wa matatu wakipiga kelele njia; mzee anayeuza karanga alishiriki jinsi ilivyokuwa mahali pa maandamano miaka ya 80.",nt:"Ingia kutoka Taifa Road siku yoyote, chukua benchi bure karibu na chemchemi, tazama wizi lakini ni salama adhuhuri na umati."},{id:33,n:"City Market — Free Vibrant Market",s:"Bustling open-air market selling fresh produce, crafts, and street food, free to wander and soak in local life.",a:"Muindi Mbingu Street, Nairobi CBD",st:"Two months ago I haggled for avocados here; a vendor mom let my kid taste free mango slices while telling me her family's farm story in Murang'a.",im:"Piles of ripe pineapples release sweet juice scents mixed with sizzling nyama choma smoke.",t:"Walk in from City Hall Way mornings, buy veggies for KSh 20, avoid eating raw salads unless peeled on spot.",nst:"Miezi miwili iliyopita nilinunua parachichi hapa; mama muuzaji alimruhusu mtoto wangu kuonja parachichi bila malipo akanieleza hadithi ya shamba la familia yake Murang'a.",nt:"Tembea ndani kutoka City Hall Way asubuhi, nunua mboga KSh 20, epuka saladi mbichi isipokuwa zimechujwa mahali."},{id:34,n:"National Archives of Kenya — Free History Museum",s:"Free public archives with old photos, documents, and artifacts on Kenya's past, in a colonial building near Hilton.",a:"Moi Avenue, Nairobi CBD",st:"I spent an hour inside last rainy afternoon flipping through 1960s independence photos; a researcher explained how they digitized faded Mau Mau trial records.",im:"Yellowed paper crinkles under fingers with musty ink smells in cool vaulted halls.",t:"Enter free Mon-Fri 8:30 AM, ask for photo exhibits at front desk, no bags allowed inside.",nst:"Nilitumia saa moja ndani alasiri ya mvua iliyopita nikibadilisha picha za uhuru 1960s; mtafiti alieleza jinsi walivyobadilisha rekodi za kesi za Mau Mau zilizochakaa.",nt:"Ingia bure Jumatatu-Jumaa 8:30 AM, muulize maonyesho ya picha kwenye dawati la mbele, hakuna mifuko ndani."},{id:35,n:"Matatu Route 33 (Kenyatta Ave to Kawangware) — Scenic Local Bus Route",s:"Matatu 33 runs along Kenyatta Avenue past KICC and Uhuru Park, offering city views then dips into lively Kawangware suburb.",a:"Kenyatta Avenue from CBD to Kawangware",st:"Rode it last Saturday to visit a friend; squeezed between students, watched skyline shrink to roadside chapati stalls and kids playing.",im:"Bass-heavy gengetone blasts from speakers as potholes jolt seats and fried plantain aromas waft in.",t:"Board at Kenyatta Ave near GPO for KSh 50, shout 'Kawangware stage' to stop, hold bag tight in crowds.",nst:"Nilisafiri nayo Jumamosi iliyopita kumtembelea rafiki; nikakazwa kati ya wanafunzi, nikatazama skyline ikapungua hadi maduka ya chapati pembeni ya barabara na watoto wakicheza.",nt:"Pandisha Kenyatta Ave karibu GPO kwa KSh 50, piga kelele 'Kawangware stage' kuishushia, shikilia begi vizuri katika umati."},{id:36,n:"Kawangware Neighbourhood — Off-Beat Local Hood",s:"Dense, authentic suburb west of CBD with street food, tiny shops, and real Nairobi hustle, far from tourist paths.",a:"Kawangware, off Ngong Road",st:"Wandered here evening last month for mutura; bar owner poured free chang'aa shot and pointed out murals by local youth group.",im:"Sizzling goat intestines pop on charcoal grills amid laughter and boda boda revs.",t:"Enter from Ngong Road near Kawangware Stage, eat at Mama Mboga's for KSh 30, go before 8 PM as it quiets.",nst:"Nilizurura hapa jioni mwezi uliopita kwa mutura; mmiliki wa baa alinimwaga shot ya chang'aa bila malipo akanielekeza mural za kikundi cha vijana wa eneo.",nt:"Ingia kutoka Ngong Road karibu Kawangware Stage, kula kwa Mama Mboga KSh 30, nenda kabla ya 8 PM inaponyamaza."}];

if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Nairobi Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Nairobi Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
