  {id:1,n:"La Concha Beach — La Concha",a:"La Concha",v:["beautiful", "local"],d:0,s:"Crescent beach where all San Sebastián hangs out",st:"Perfect crescent of golden sand and turquoise water. Surrounded by green mountains. Bakeries deliver warm pastries to swimmers. Every weekend, the beach throbs with energy.",im:"1850s: Tourists discover. 2024: Locals still claim it at 6am.",t:"Go early 7am before crowds. Water cold but healing. Bring breakfast.",c:["parks", "local_only"],r:"g",nn:"Hondartza La Concha — La Concha",ns:"Hondartza kruzentua non dena San Sebastiandarra",nst:"Kruzentua perfektua barne-hondartzako harri berde. Dago. Bakeriak bidaltzen dituzte beroak nola dagoen.",nt:"Goizean 7an. Ura hotza baina sendatzailea. Ontzia eramana."},
  {id:2,n:"Monte Urgull Fortress — Old Town",a:"Old Town",v:["history", "high_spots"],d:2,s:"Medieval fortress towering over old town",st:"Walls, cannons, cemetery, views down to beaches. 45-minute climb through pine woods. Locals run here at dawn. Castle museum shows Basque resistance.",im:"1500s: Basques fortify against Spain. 2024: You climb same stones.",t:"Start 8am, finish before heat. Views make it worth. Cemetery poignant.",c:["high_spots", "history_big"],r:"g",nn:"Kalean Urgull — Txoko Zaharra",ns:"Gaztelua medievala zahar-kalean",nst:"Hormak, kanoia, osamendia, ikuspegiak hondartzara. 45 minutuko igoera pinu batera.",nt:"Hasi 8ean. Osamendia gogotsu. Ikuspegiak sendatu dituzte."},
  {id:3,n:"Parte Vieja Pintxos Route — Old Town",a:"Old Town",v:["local", "free"],d:0,s:"Crawl through old town eating tiny Basque tapas",st:"Wooden bar counters piled with toothpick-spiked delicacies. Txuleta (steak), jamón ibérico, anchovies, tortillas. Each bite €1-2. Basque pintxo culture is religion.",im:"1800s: Bar culture born here. 2024: Still the best eating in Spain.",t:"Start 7pm after sunset. Tour 5-8 bars. Pace yourself. Txakoli wine cheap.",c:["local_only", "food"],r:"g",nn:"Arrantzale kalean pintxoak — Txoko Zaharra",ns:"Zehar kalean jaten pintxoak",nst:"Zapar-kontuak pintxoen pean. Txuleta, jamona, anzugela. Bakoitza €1-2. Pintxo kultura dena.",nt:"Hasi 7etan. Zazpi barra. Ozpileta. Txakoli merkea."},
  {id:4,n:"Monte Igueldo Amusement Park — West Heights",a:"Heights",v:["weird", "beautiful"],d:3,s:"Vintage amusement park dangling 300m above the city",st:"Cable car up. Wooden roller coaster from 1912. Funhouse mirrors, bumper cars. Views of three provinces from top. Retro chaos. €2 per ride.",im:"1912: Built for nobility. 2024: Still wooden, still thrilling.",t:"Go at dusk. Cable car scenic. Rides cheap and creaky. Worth every euro.",c:["weird", "high_spots"],r:"g",nn:"Eguraldia Monte Igueldo — Mendebaldean",ns:"Zahar parkea 300m behealde",nst:"Telefabrika gora. Zolagarroa 1912tik. Ispilua, autoak. Hiru probintziaren ikuspegiak. Zaharrako kaosa. €2 geldia.",nt:"Goitzean. Telefabrika ikusgarria. Gelidak merkea. Txokolatea gora."},

  {id:26,n:"Kursaal Convention Center  (#16) — Waterfront",a:"Waterfront",v:["weird", "architecture"],d:1,s:"Modern glass cube that looks like it landed from space",st:"1999 building looks alien. Concerts, films, exhibitions. You can walk through lobby free. Reflections in water. Teenagers photograph here. Stunning design.",im:"1999: Architect reimagines convention center. Pure future.",t:"Free to enter lobby. Exhibitions vary. Cinema €8.",c:["architecture", "weird"],r:"g",nn:"Kursaal Etxea  (#16) — Waterfront",ns:"Beira-kristala kalean landing nola",nst:"1999aren eraikina alien-a nola. Kontzertua, filma, erakusketa. Librean biltzen. Islapena uran. Diseinua aztoita.",nt:"Librean lobbyan. Erakusketa aldatzen. Zinema €8."},
  {id:27,n:"Paseo Nuevo Coastal Path  (#17) — Coast",a:"Coast",v:["beautiful", "nature"],d:4,s:"Seaside walk carved into cliffs, waves crashing below",st:"Pedestrian path 1.5km along cliff top. Waves crash below. Smell salt. See seabirds. Connects beaches. Local joggers. Sunset walk essential.",im:"1928: Path built for promenades. 2024: Still the most romantic walk.",t:"Any time good. Sunset best. Café halfway. 30 min easy walk.",c:["parks", "romantic_water"],r:"g",nn:"Paseo Berria Kantabrian  (#17) — Coast",ns:"Kantabrian bidean harrizko gainian, olatuak behean",nst:"Bidea 1,5km gaina harrizko. Olatuak behean. Ingurua itsasoa. Hegazti, korronteak. Lokaila sortu behar.",nt:"Edozein ordutan. Goiza ongian. Kafea erdian. 30 minutua."},
  {id:28,n:"Hondarribia Medieval Town  (#18) — Hondarribia",a:"Hondarribia",v:["history", "beautiful"],d:30,s:"Fortified town where France, Spain, and sea collide",st:"30km east on coast. Medieval walls, cobbled streets, guarded gates. Sits on border—you can see France. Fish restaurants line harbor. Day trip essential.",im:"1500s: Wars on borders. 2024: Peaceful, postcard-perfect.",t:"Bus 1 hour (€3). Stay for seafood dinner. Wander walls at sunset.",c:["history_big", "architecture"],r:"g",nn:"Hondarribia Gaztelan  (#18) — Hondarribia",ns:"Gaztelau non Frantzia, Espainia, itsasoa elkartu",nst:"30km ekialdean kostean. Hormak, kaleak, ateak. Frantzia ikusi. Arrantzale tabernak. Eguneko askua arloa.",nt:"Autobusa 1 ora (€3). Arraina arraina. Hormak sasoia."},
  {id:29,n:"Getaria Coastal Town  (#19) — Getaria",a:"Getaria",v:["history", "beautiful"],d:45,s:"Fishing village where the explorer was born. Steep cobbled streets plunge to harbor. Locals fish. Wine region above (white Txakoli). Grilled fish €12.",st:"Txiki itsasabakarra, noiz jatorria. Kaleak mendean. Arrantzaleak direla. Txakoli arbera. Arraina grillean €12.",im:"1476: Elcano born here. 1522: Returns from circling the world. Streets unchanged.",t:"Train 50 min (€8). Eat fresh grilled fish facing harbor. One day full.",c:["history_big", "local_only"],r:"g",nn:"Getaria Kantabrian  (#19) — Getaria",ns:"Txiki itsasabakarra non Juan Sebastián Elkano",nst:"",nt:"Trena 50 min (€8). Arraina beroak. Eguneran osoa."},
  {id:30,n:"Biarritz Day Trip  (#20) — Biarritz",a:"Biarritz",v:["beautiful", "history"],d:40,s:"French beach town where surfers and socialites meet",st:"Cross border, 45 min train (€4). Cliffs, surfer culture, Belle Époque villas. Beach different vibe than Spanish side. French pastries. Worth the border crossing.",im:"1900s: Nobility discovered beaches. 2024: Surfers claimed them.",t:"Train from San Sebastián. Stay overnight if you can. Pastries for lunch.",c:["history_big", "nature"],r:"g",nn:"Biarritz Frantzia  (#20) — Biarritz",ns:"Frantziako hondartzaren herria non surfer eta gentilek",nst:"Muga gainean, trena 45 min (€4). Harrizko, surfer, Belle Époque. Kantabriko osoa. Frantziako pastela. Muga garrantzitsua.",nt:"Trena San Sebastiandik. Perno ohez. Pastela."},
  {id:31,n:"La Concha Beach  (#21) — La Concha",a:"La Concha",v:["beautiful", "local"],d:0,s:"Crescent beach where all San Sebastián hangs out",st:"Perfect crescent of golden sand and turquoise water. Surrounded by green mountains. Bakeries deliver warm pastries to swimmers. Every weekend, the beach throbs with energy.",im:"1850s: Tourists discover. 2024: Locals still claim it at 6am.",t:"Go early 7am before crowds. Water cold but healing. Bring breakfast.",c:["parks", "local_only"],r:"g",nn:"Hondartza La Concha  (#21) — La Concha",ns:"Hondartza kruzentua non dena San Sebastiandarra",nst:"Kruzentua perfektua barne-hondartzako harri berde. Dago. Bakeriak bidaltzen dituzte beroak nola dagoen.",nt:"Goizean 7an. Ura hotza baina sendatzailea. Ontzia eramana."},

  {id:55,n:"Zurriola Surf Beach  (#45) — East Beach",a:"East Beach",v:["nature", "beautiful"],d:2,s:"Waves for surfers, rocks for jumpers",st:"Wilder, rougher than La Concha. Surfers actual skills. Rock pools to jump in. University students congregation. Water cold. Vibe authentic.",im:"1980s: Surfers discover Basque coast. 2024: They never left.",t:"Watch surfers before 11am. Rocks slippery—wear shoes. Bring snorkel.",c:["nature", "local_only"],r:"g",nn:"Hondartzean Zurriola  (#45) — East Beach",ns:"Olatuak nahiak, harrizko saltoajeak",nst:"Bihurrena La Conchak baino. Surfilleak egizko. Harrizko pilaketa. Unibertsitaria. Ura hotza. Sentzuak osoa.",nt:"Surfillakak begiratu 11 baino. Harriak slidatua—oparial eramana. Buceo."},
  {id:56,n:"Kursaal Convention Center  (#46) — Waterfront",a:"Waterfront",v:["weird", "architecture"],d:1,s:"Modern glass cube that looks like it landed from space",st:"1999 building looks alien. Concerts, films, exhibitions. You can walk through lobby free. Reflections in water. Teenagers photograph here. Stunning design.",im:"1999: Architect reimagines convention center. Pure future.",t:"Free to enter lobby. Exhibitions vary. Cinema €8.",c:["architecture", "weird"],r:"g",nn:"Kursaal Etxea  (#46) — Waterfront",ns:"Beira-kristala kalean landing nola",nst:"1999aren eraikina alien-a nola. Kontzertua, filma, erakusketa. Librean biltzen. Islapena uran. Diseinua aztoita.",nt:"Librean lobbyan. Erakusketa aldatzen. Zinema €8."},
  {id:57,n:"Paseo Nuevo Coastal Path  (#47) — Coast",a:"Coast",v:["beautiful", "nature"],d:4,s:"Seaside walk carved into cliffs, waves crashing below",st:"Pedestrian path 1.5km along cliff top. Waves crash below. Smell salt. See seabirds. Connects beaches. Local joggers. Sunset walk essential.",im:"1928: Path built for promenades. 2024: Still the most romantic walk.",t:"Any time good. Sunset best. Café halfway. 30 min easy walk.",c:["parks", "romantic_water"],r:"g",nn:"Paseo Berria Kantabrian  (#47) — Coast",ns:"Kantabrian bidean harrizko gainian, olatuak behean",nst:"Bidea 1,5km gaina harrizko. Olatuak behean. Ingurua itsasoa. Hegazti, korronteak. Lokaila sortu behar.",nt:"Edozein ordutan. Goiza ongian. Kafea erdian. 30 minutua."},
  {id:58,n:"Hondarribia Medieval Town  (#48) — Hondarribia",a:"Hondarribia",v:["history", "beautiful"],d:30,s:"Fortified town where France, Spain, and sea collide",st:"30km east on coast. Medieval walls, cobbled streets, guarded gates. Sits on border—you can see France. Fish restaurants line harbor. Day trip essential.",im:"1500s: Wars on borders. 2024: Peaceful, postcard-perfect.",t:"Bus 1 hour (€3). Stay for seafood dinner. Wander walls at sunset.",c:["history_big", "architecture"],r:"g",nn:"Hondarribia Gaztelan  (#48) — Hondarribia",ns:"Gaztelau non Frantzia, Espainia, itsasoa elkartu",nst:"30km ekialdean kostean. Hormak, kaleak, ateak. Frantzia ikusi. Arrantzale tabernak. Eguneko askua arloa.",nt:"Autobusa 1 ora (€3). Arraina arraina. Hormak sasoia."},
  {id:59,n:"Getaria Coastal Town  (#49) — Getaria",a:"Getaria",v:["history", "beautiful"],d:45,s:"Fishing village where the explorer was born. Steep cobbled streets plunge to harbor. Locals fish. Wine region above (white Txakoli). Grilled fish €12.",st:"Txiki itsasabakarra, noiz jatorria. Kaleak mendean. Arrantzaleak direla. Txakoli arbera. Arraina grillean €12.",im:"1476: Elcano born here. 1522: Returns from circling the world. Streets unchanged.",t:"Train 50 min (€8). Eat fresh grilled fish facing harbor. One day full.",c:["history_big", "local_only"],r:"g",nn:"Getaria Kantabrian  (#49) — Getaria",ns:"Txiki itsasabakarra non Juan Sebastián Elkano",nst:"",nt:"Trena 50 min (€8). Arraina beroak. Eguneran osoa."},
  {id:60,n:"Biarritz Day Trip  (#50) — Biarritz",a:"Biarritz",v:["beautiful", "history"],d:40,s:"French beach town where surfers and socialites meet",st:"Cross border, 45 min train (€4). Cliffs, surfer culture, Belle Époque villas. Beach different vibe than Spanish side. French pastries. Worth the border crossing.",im:"1900s: Nobility discovered beaches. 2024: Surfers claimed them.",t:"Train from San Sebastián. Stay overnight if you can. Pastries for lunch.",c:["history_big", "nature"],r:"g",nn:"Biarritz Frantzia  (#50) — Biarritz",ns:"Frantziako hondartzaren herria non surfer eta gentilek",nst:"Muga gainean, trena 45 min (€4). Harrizko, surfer, Belle Époque. Kantabriko osoa. Frantziako pastela. Muga garrantzitsua.",nt:"Trena San Sebastiandik. Perno ohez. Pastela."},

  {id:86,n:"Kursaal Convention Center  (#76) — Waterfront",a:"Waterfront",v:["weird", "architecture"],d:1,s:"Modern glass cube that looks like it landed from space",st:"1999 building looks alien. Concerts, films, exhibitions. You can walk through lobby free. Reflections in water. Teenagers photograph here. Stunning design.",im:"1999: Architect reimagines convention center. Pure future.",t:"Free to enter lobby. Exhibitions vary. Cinema €8.",c:["architecture", "weird"],r:"g",nn:"Kursaal Etxea  (#76) — Waterfront",ns:"Beira-kristala kalean landing nola",nst:"1999aren eraikina alien-a nola. Kontzertua, filma, erakusketa. Librean biltzen. Islapena uran. Diseinua aztoita.",nt:"Librean lobbyan. Erakusketa aldatzen. Zinema €8."},

,{id:115,n:"San Telmo Museum",a:"Old Town",v:["hidden"],d:0,s:"Oldest museum in Basque Country, free entry to permanent collection",st:"Inaugurated in 1902, San Telmo Museum reopened in 2011 after a five-year renovation and expansion. It houses Basque cultural heritage and art.",im:"Explore centuries of Basque history in a beautifully restored space without paying admission.",t:"Check opening hours in advance. Located near Monte Urgull in the Old Town.",c:["museums", "culture"],r:"g",nn:"Museo San Telmo",ns:"El museo más antiguo de Euskadi con entrada gratuita a la colección permanente",nst:"Inaugurado en 1902, el Museo San Telmo reabrió en 2011 tras cinco años de rehabilitación y ampliación. Alberga patrimonio cultural y arte vasco.",nt:"Verifica los horarios con anticipación. Ubicado cerca del Monte Urgull en la Parte Vieja."},
{id:116,n:"Miramar Palace Gardens",a:"La Concha",v:["hidden"],d:2,s:"Free public gardens at historic royal palace with bay views",st:"The Miramar Palace grounds offer manicured gardens and panoramic views of La Concha Bay, accessible to the public without charge.",im:"Stroll through elegant gardens overlooking one of Europe's most beautiful beaches.",t:"Best visited in late morning. Bring a camera for stunning vistas.",c:["parks", "gardens"],r:"g",nn:"Jardines del Palacio de Miramar",ns:"Jardines públicos gratuitos en palacio histórico con vistas a la bahía",nst:"Los jardines del Palacio de Miramar ofrecen jardines cuidados y vistas panorámicas de la Bahía de La Concha, accesibles al público sin cargo.",nt:"Mejor visitado a media mañana. Lleva cámara para vistas espectaculares."},
{id:117,n:"Cristina Enea Park",a:"East Side",v:["hidden"],d:3,s:"Peaceful wooded park with sculptures and walking trails, completely free",st:"A verdant escape featuring native trees, contemporary art installations, and quiet paths away from tourist crowds.",im:"Discover local art and nature in a serene setting where few tourists venture.",t:"Ideal for morning walks. Bring water and comfortable shoes.",c:["parks", "art"],r:"g",nn:"Parque Cristina Enea",ns:"Parque arbolado tranquilo con esculturas y senderos, completamente gratuito",nst:"Un refugio verde con árboles nativos, instalaciones de arte contemporáneo y senderos tranquilos lejos de las multitudes turísticas.",nt:"Ideal para paseos matutinos. Lleva agua y zapatos cómodos."}];

style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — San Sebastián Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
