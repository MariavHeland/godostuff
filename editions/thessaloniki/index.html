,{id:121,n:"Haunted House on Vasilissis Olgas 263",a:"Vasilissis Olgas",v:["hidden", "haunted"],d:20,s:"Creepy local legend spot for spine-tingling urban exploration!",st:"Whispers of ghosts echo through this abandoned mansion, fueling Thessaloniki's juiciest folklore. Tucked on a boulevard of grand old villas, it's the perfect eerie pause on a shadowy stroll. Dare to peek through the windows and feel the chills?",im:"Imagine standing before cracked walls at dusk, heart racing as shadows dance inside, wondering if the spirits are watching.",t:"Walk or bus along Vasilissis Olgas avenue from city center (10-15 min from Aristotelous); free entry (exterior only); best at twilight for max vibes. Respect fences, no trespassing.",c:["urban_explore", "history"],r:"g",nn:"«Περιφερειακό Σπίτι» στη Λεωφ. Βασιλίσσης Όλγας 263",ns:"Φριχτό σημείο θρύλου για ανατριχιαστική εξερεύνηση πόλης!",nst:"Ψίθυροι φαντασμάτων αντηχούν σε αυτό το εγκαταλελειμμένο αρχοντικό, τροφοδοτώντας τον πιο ζουμερό λαϊκό μύθο της Θεσσαλονίκης. Κρυμμένο σε λεωφόρο παλιών βιλών, ιδανικό για στοχευμένη βόλτα. Τόλμα να κρυφοκοιτάξεις από τα παράθυρα και νιώσε ρίγη;",nt:"Περπάτησε ή λεωφορείο κατά μήκος Λεωφ. Βασιλίσσης Όλγας από κέντρο (10-15 λεπτά από Αριστοτέλους); δωρεάν (μόνο εξωτερικά); καλύτερα στο λυκαυγές για ένταση. Σεβασμός σε φράχτες, απαγορεύεται είσοδος."},
{id:122,n:"Kastra / Trigonion Tower area",a:"Ano Poli",v:["viewpoint", "sunset"],d:25,s:"Epic free castle walls for gulf sunsets like a local!",st:"Climb these ancient city walls for sweeping Thermaic Gulf panoramas that rival any paid lookout. Locals perch on cliffs with beers, turning it into a casual sky-watching party. Hunt for hidden benches and let the golden hour magic unfold.",im:"Picture yourself on rugged stone battlements, beer in hand, as the sun dips into the sea, painting Mt. Olympus in fiery hues.",t:"Hike up from Ano Poli (15 min steep walk); totally free; golden hour or sunset daily. Wear comfy shoes for uneven paths.",c:["viewpoint", "history"],r:"g",nn:"Καστρα / Πύργος Τριγωνίου",ns:"Επικά δωρεάν τείχη κάστρου για ηλιοβασιλέματα όπως ντόπιοι!",nst:"Ανέβα αυτά τα αρχαία τείχη για πανοραμικές θέες Θερμαϊκού που συναγωνίζονται κάθε πληρωμένο σημείο. Ντόπιοι κάθεται σε βράχους με μπύρες, μετατρέποντας σε πάρτι παρατήρησης ουρανού. Ψάξε κρυμμένα παγκάκια και άσε τη μαγεία της χρυσής ώρας να ξετυλιχτεί.",nt:"Περπάτημα από Άνω Πόλη (15 λεπτά ανηφορικό); πλήρως δωρεάν; χρυσή ώρα ή ηλιοβασίλεμα καθημερινά. Άνετα παπούτσια για ανώμαλους δρόμους."},
{id:123,n:"Seich Sou Forest",a:"Ano Toumpa",v:["hiking", "nature"],d:40,s:"Secret urban forest trails with killer city vistas!",st:"Escape into this lush green lung of Thessaloniki, where winding paths lead through pine-scented woods to breathtaking overlooks. It's the locals' hidden hack for fresh air without leaving town. Spot deer at dawn and city lights twinkling below by night.",im:"Envision trekking shaded trails, emerging to a vista of twinkling Thessaloniki sprawled like a jewel below misty peaks.",t:"Start at end of Perraivou St. via footbridge (bus to Ano Toumpa); free entry; anytime, dawn/dusk for wildlife. Paths moderate, bring water.",c:["hiking", "nature"],r:"g",nn:"Δάσος Σέιχ Σου",ns:"Κρυφά αστικά μονοπάτια δάσους με φονικές θέες πόλης!",nst:"Δραπέτευσε σε αυτόν τον καταπράσινο πνεύμονα της Θεσσαλονίκης, όπου στριφογυριστά μονοπάτια οδηγούν μέσα από πευκόδασος σε εκπληκτικές θέες. Είναι το μυστικό κόλπο ντόπιων για καθαρό αέρα χωρίς να φύγεις από πόλη. Άγρια ζώα στην αυγή και φώτα πόλης να τρεμοπαίζουν.",nt:"Ξεκίνα τέλος οδού Περαιβού μέσω γεφυράκι (λεωφορείο Άνω Τούμπα); δωρεάν; οποτεδήποτε, αυγή/δύση για άγρια. Μέτρια μονοπάτια, νερό μαζί."},
{id:124,n:"Thermi Dam",a:"Thermi",v:["nature", "daytrip"],d:60,s:"Wild nature reserve dam for serene picnics and walks!",st:"Venture to this tucked-away reservoir ringed by hills, a peaceful oasis buzzing with birds and butterflies. Perfect for a half-day nature immersion with zero crowds. Pack a blanket and let the calm wash over you amid rustling reeds.",im:"Feel the tranquility as you picnic by shimmering waters, eagles soaring overhead against a canvas of rolling green hills.",t:"Bus/taxi from city center to Thermi (30-45 min), then short walk; free; weekdays mornings best. Almost free and worth it: local taverna meze €5-8 nearby.",c:["nature", "picnic"],r:"g",nn:"Φράγμα Θέρμης",ns:"Άγρια φυσική δεξαμενή για ήρεμα πικνίκ και βόλτες!",nst:"Εξερεύνησε αυτή την κρυμμένη δεξαμενή περικυκλωμένη από λόφους, ειδυλλιακή όαση με πουλιά και πεταλούδες. Ιδανικό για ημιημερή φύση χωρίς πλήθη. Στρώσε κουβέρτα και άσε ηρεμία να σε πλύνει ανάμεσα σε καλαμιές.",nt:"Λεωφορείο/ταξί από κέντρο σε Θέρμη (30-45 λεπτά), μετά κοντινή βόλτα; δωρεάν; πρωινά καθημερινές καλύτερα. Σχεδόν δωρεάν: τοπικό ταβερνάκι μεζέ €5-8 κοντά. sf: Budget hostels in Thermi €25/night."},
{id:125,n:"Ouziel Quarters",a:"Central Thessaloniki",v:["history", "walk"],d:15,s:"Locals' historic hood for a chill history stroll!",st:"Wander these atmospheric old streets where Thessaloniki's layered past peeks from every corner. Charming facades and hidden tales make it a low-key gem for curious explorers. Chat with residents for insider stories over coffee.",im:"Stroll sun-dappled alleys, uncovering faded signs and vine-covered walls whispering centuries of city secrets.",t:"Near central markets, walk from Modiano (5-10 min); free; anytime. ef: Graze Kapani Market snacks €2-4.",c:["history", "walk"],r:"g",nn:"Συνοικίες Ουζιέλ",ns:"Ιστορική γειτονιά ντόπιων για χαλαρή βόλτα ιστορίας!",nst:"Περπάτησε αυτούς τους ατμοσφαιρικούς παλιούς δρόμους όπου το παρελθόν της Θεσσαλονίκης κρυφοκοιτάζει κάθε γωνιά. Γοητευτικές πρόσοψες και κρυμμένες ιστορίες το κάνουν κρυφό διαμάντι. Μίλα με κατοίκους για insider ιστορίες.",nt:"Κοντά κεντρικές αγορές, από Μοδιάνο (5-10 λεπτά); δωρεάν; οποτεδήποτε. ef: Γκραικιάρ σνακ Αγοράς Καπάνι €2-4."},
{id:126,n:"Frangomahala",a:"Port area",v:["upcoming", "culture"],d:20,s:"Hip revival of Thessaloniki's swanky old-world quarter!",st:"Once the ritzy haunt of international elites, this labyrinth now pulses with trendy cafes and street art in historic shells. Wander grand villas and peek into creative hubs for a taste of boho-chic Thessaloniki. Sunset views over the gulf seal the vibe.",im:"Lose yourself in tangled streets, cafe chatter mixing with sea breezes, as faded mansions glow in evening light.",t:"Above port near Venizelou Blvd (walk from Ladadika 10 min); free streets/wander; evenings for buzz. Almost free and worth it: Coffee €2-3.",c:["culture", "walk"],r:"g",nn:"Φραγκομαχαλάς",ns:"Hip αναβίωση της παλιάς πολυτελούς συνοικίας Θεσσαλονίκης!",nst:"Παλιά καπνιστήριο ελίτ, τώρα σφύζει από trendy καφετέριες και street art σε ιστορικά κτίρια. Περπάτησε μεγάλες βίλες και δες δημιουργικούς χώρους για boho Θεσσαλονίκη. Ηλιοβασίλεμα στον κόλπο κλειδώνει την ατμόσφαιρα.",nt:"Πάνω από λιμάνι κοντά Λεωφ. Βενιζέλου (από Λαδάδικα 10 λεπτά); δωρεάν δρόμοι/βόλτα; βράδια για κίνηση. Σχεδόν δωρεάν: Καφές €2-3."},
{id:127,n:"DIY Street-Art Walk",a:"Port to Waterfront",v:["street_art", "walk"],d:30,s:"Instagram-fueled mural hunt through gritty urban canvas!",st:"Thessaloniki's bold street art scene explodes on walls from port warehouses to seaside drifts. Hop murals like a treasure hunt, each piece telling rebellious tales. Capture your own edgy shots amid buzzing local life.",im:"Snap vibrant giants splashed across crumbling facades, colors popping against salty sea air and passing ships.",t:"Start port/Ladadika, drift east along waterfront (self-guided via Insta); free; daylight for details. ef: Gyros stands €3 nearby.",c:["street_art", "walk"],r:"g",nn:"DIY Βόλτα Street Art",ns:"Instagram κυνήγι τοίχων σε αστικό καμβά!",nst:"Η τολμηρή street art σκηνή Θεσσαλονίκης εκρήγνυται σε τοίχους από λιμάνι μέχρι παραλιακά. Hop τοιχογραφίες σαν θησαυρός, κάθε έργο rebel ιστορίες. Τράβα edgy φωτογραφίες ανάμεσα σε ντόπιους.",nt:"Ξεκίνα λιμάνι/Λαδάδικα, ανατολικά κατά παραλία (self-guided Insta); δωρεάν; μέρα για λεπτομέρειες. ef: Σταντ γύρος €3 κοντά."}];

<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Thessaloniki Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
