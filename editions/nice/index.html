,{id:121,n:"Temple of Love (Le Temple de l’Amour)",a:"Saint-Maurice",v:["hidden", "romantic"],d:20,s:"Whimsical bandstand built for a count's wife—pure Riviera romance on a budget!",st:"Tucked in Parc Chambrun, this pavilion whispers old-world love stories amid lush greenery. Imagine the Count of Chambrun commissioning it just for his beloved—timeless charm without the crowds. A quiet escape where history feels like a secret shared just with you.",im:"Stand beneath the ornate pavilion as golden light filters through leaves, the sea breeze carrying echoes of forgotten dances.",t:"Free entry always; tram to 'Chambrun' stop, 15-min walk from center. Best at dusk for dreamy vibes. Almost free and worth it: nearby café coffee, ~2€.",c:["parks", "romantic"],r:"g",nn:"Temple de l’Amour",ns:"Kiosque romantique construit pour l’amour d’un comte—romantisme rivierain à petit prix !",nst:"Nichée dans le Parc Chambrun, cette pergola murmure des histoires d’amour d’antan au milieu d’une verdure luxuriante. Imaginez le comte de Chambrun la faire construire rien que pour sa bien-aimée—charme intemporel loin des foules. Une échappée paisible où l’histoire semble un secret partagé rien qu’avec vous.",nt:"Entrée gratuite toujours ; tram jusqu’à 'Chambrun', 15 min à pied du centre. Idéal au crépuscule pour une ambiance féerique. Presque gratuit et vaut le coup : café voisin, ~2€."},
{id:122,n:"Monastery Garden of Cimiez (Jardin du Monastère de Cimiez)",a:"Cimiez",v:["hidden"],d:25,s:"Secret garden hideaway inside Cimiez's monastery—golden hour magic away from tourist trails!",st:"Beyond the main paths lies a tucked-away oasis of peace, blooming with serenity. Locals whisper it's the real gem of Cimiez, perfect for contemplative strolls. Uncover this hidden nook where time slows and the world fades.",im:"Wander the leafy driveway's end to discover wildflowers framing ancient stone walls, sunlight dancing like fireflies.",t:"Free access daily; bus 15/17 to Cimiez, follow signs to monastery. Go at golden hour when empty. Note: museum nearby ~free on 1st Sun/month.",c:["parks", "historic"],r:"g",nn:"Jardin du Monastère de Cimiez",ns:"Jardin secret dans le monastère de Cimiez—magie de l’heure dorée loin des sentiers battus !",nst:"Au-delà des allées principales se cache une oasis de paix fleurie de sérénité. Les locaux chuchotent que c’est le vrai joyau de Cimiez, parfait pour des promenades méditatives. Découvrez ce recoin caché où le temps ralentit et le monde s’efface.",nt:"Accès gratuit quotidien ; bus 15/17 jusqu’à Cimiez, suivez les panneaux vers le monastère. Allez à l’heure dorée quand c’est vide. Note : musée proche gratuit le 1er dimanche/mois."},
{id:123,n:"Le 109 Street Art Zone",a:"Le 109",v:["streetart"],d:30,s:"Open-air urban gallery in gritty industrial spot—street art scavenger hunt for urban explorers!",st:"Transformed warehouse zone bursts with vibrant murals and tags from local legends. Wander like a treasure hunter amid raw concrete and bold colors. This creative playground feels like Nice's edgy underbelly revealed.",im:"Snap pics of massive murals towering over you, colors popping against faded industrial walls like a living comic book.",t:"Free always; tram Line 2 to 'Magnan', 10-min walk. Daylight best for photos; self-guided. Ef: Grab cheap socca from nearby stand, ~3€.",c:["streetart"],r:"g",nn:"Le 109",ns:"Galerie urbaine en plein air dans un spot industriel brut—chasse au street art pour explorateurs urbains !",nst:"Zone d’entrepôts transformée explose de fresques vibrantes et tags de légendes locales. Errez comme un chasseur de trésors au milieu de béton brut et couleurs audacieuses. Ce terrain de jeu créatif ressemble à l’envers edgy de Nice révélé.",nt:"Gratuit toujours ; tram Ligne 2 à 'Magnan', 10 min à pied. Lumière du jour idéale pour photos ; autodidacte. Ef : Socca bon marché au stand voisin, ~3€."},
{id:124,n:"Libération Neighborhood Roam",a:"Libération",v:["local"],d:40,s:"Live-like-a-local in underrated market + old station vibes—authentic Nice without the hordes!",st:"Buzzing market stalls overflow with fresh finds, while faded station tracks evoke gritty history. Redditors rave about this unpolished gem for real Niçois energy. Blend in with locals grabbing breakfast bites amid urban hum.",im:"Haggle at dawn market stalls as vendors shout deals, steam rising from hot pissaladière under your nose.",t:"Free roam; tram to 'Libération' stop. Early morning for market frenzy. Ef: Assemble picnic from stalls—bread/olives ~5€.",c:["markets", "local"],r:"g",nn:"Quartier Libération",ns:"Vie de local dans le marché underrated + vibes gare ancienne—Nice authentique sans hordes !",nst:"Étalages de marché bourdonnants débordent de trouvailles fraîches, tandis que les voies de gare fanées évoquent une histoire gritty. Les redditors adorent ce joyau brut pour l’énergie niçoise réelle. Mélangez-vous aux locaux pour des petits-déjs au milieu du bourdonnement urbain.",nt:"Balade gratuite ; tram à 'Libération'. Matin tôt pour la frénésie du marché. Ef : Pique-nique assemblé aux étals—pain/olives ~5€."},
{id:125,n:"Terra Amata Palaeontology Museum Site",a:"Quai des Docks",v:["hidden"],d:25,s:"400,000-year-old human traces in a gritty dockside excavation—prehistory thrill for free!",st:"Right on the dig site, this museum unveils humanity's ancient footprints amid industrial harbor vibes. Far from polished tours, it's raw discovery of Nice's deep past. Feel like an archaeologist unearthing secrets by the sea.",im:"Peer into open pits where stone tools and fire hearths lie exactly as early humans left them 400k years ago.",t:"Free entry (check site); tram Line 2 to 'Docks'. Weekdays quieter. Cool but not free: full museum exhibits, ~5€.",c:["historic", "museums"],r:"g",nn:"Terra Amata",ns:"Traces humaines vieilles de 400 000 ans sur site d’excavation portuaire—frisson préhistorique gratuit !",nst:"Juste sur le site de fouilles, ce musée révèle les empreintes ancestrales de l’humanité au milieu des vibes portuaires industrielles. Loin des visites polies, c’est une découverte brute du passé profond de Nice. Ressentez-vous comme un archéologue déterrant des secrets au bord de la mer.",nt:"Entrée gratuite (vérifiez sur place) ; tram Ligne 2 à 'Docks'. Jours ouvrables plus calmes. Cool mais pas gratuit : expositions complètes du musée, ~5€."}];

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Nice Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
