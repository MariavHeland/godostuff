<script>
const P = [{id:1,n:"Piața Mare — the great square",a:"Old Town Upper",v:["beautiful","history","local"],d:30,s:"The baroque heart of a medieval Saxon city still running on slow time",st:"Sibiu was built by Saxon colonists in the 12th century and Piața Mare was their commercial centre. The pastel facades, the Council Tower, and the sheer scale of the square for a city this small all speak to how wealthy and self-confident this community once was. Today the terraces fill up, children chase pigeons, and the square does exactly what a great European square should.",im:"It is 1500 and you are a Saxon merchant in one of the richest cities north of the Danube. You stand in this square surrounded by guild halls and churches, watching caravans arrive from the east.",t:"The square is the centre of everything — walk from anywhere in the old town. Sit at a terrace, order a coffee, and spend an hour watching the square work.",c:[],r:"g",nn:"Piața Mare",ns:"Inima barocă a orașului saxon medieval",nst:"Construită de coloniștii sași în secolul al XII-lea, Piața Mare era centrul comercial al unuia dintre cele mai bogate orașe nord-dunărene.",nt:"Centrul orașului vechi — accesibil pe jos din orice direcție."},{id:2,n:"Piața Mică — the little square",a:"Old Town Upper",v:["beautiful","history","hidden"],d:20,s:"Cobblestones, eye-windows and the Bridge of Lies in a square that feels unchanged for 500 years",st:"Piața Mică sits just below Piața Mare, connected by a covered passage. Its sloping cobblestones, the old houses with their distinctive dormer windows shaped like hooded eyelids, and the cast-iron Bridge of Lies at one end make it the most atmospheric corner of Sibiu. Less visited than the main square, yet more genuinely medieval.",im:"The dormer windows stare down at you like half-closed eyes. Every house in this square has them. They watch. They have been watching since the 1400s.",t:"Walk through Pasajul Scărilor from the south side of Piața Mare. Free, always open.",c:[],r:"g",nn:"Piața Mică",ns:"Piatra de pavaj, ochii și Podul Minciunilor",nst:"Piața Mică se află chiar sub Piața Mare. Ferestrele mansardei, în formă de ochi, privesc în jos spre vizitatori de secole.",nt:"Accesibilă prin Pasajul Scărilor de pe latura sudică a Pieței Mari."},{id:3,n:"Podul Minciunilor — Bridge of Lies",a:"Old Town Upper",v:["history","local","beautiful"],d:10,s:"The oldest cast-iron bridge in Romania, where legend says liars will be exposed",st:"Built in 1859, this was the first cast-iron bridge in Romania. It connects Piața Mică to Strada Ocnei and gets its name from a local legend: merchants would lie about their wares here, and the bridge would groan and collapse beneath a liar. It has not collapsed yet, which says something about Sibiu.",im:"You stand on the bridge. You think of something you have been avoiding saying. The iron does not move.",t:"Find it at the end of Piața Mică where the square drops toward Strada Ocnei. Free, always accessible.",c:[],r:"g",nn:"Podul Minciunilor",ns:"Cel mai vechi pod din fier turnat din România",nst:"Construit în 1859, primul pod din fier turnat din România. Legenda spune că minciunile spuse pe pod îl vor prăbuși.",nt:"La capătul Pieței Mici, unde piața coboară spre Strada Ocnei."},{id:4,n:"Turnul Sfatului — Council Tower",a:"Old Town Upper",v:["history","beautiful","views"],d:25,s:"Climb 53 metres for rooftop views over red tiles and the Carpathian foothills",st:"The Council Tower dates to the 13th century and once guarded the passage between the upper and lower towns. Its current form with the baroque roof is from the 18th century. Climb the steep interior stairs to the top platform for a panoramic view of Sibiu's terracotta roofline against the Fagaras Mountains on the horizon.",im:"From the top you count the rooftops. Every one is terracotta red. The mountains are blue in the distance. The square below is a toy.",t:"Entrance on the Piața Mică side. Small admission fee. Stairs are steep and narrow — not suitable for those with limited mobility.",c:[],r:"g",nn:"Turnul Sfatului",ns:"53 de metri pentru panorame peste acoperișurile roșii",nst:"Turnul datează din secolul al XIII-lea. Urcă scările abrupte pentru o priveliște panoramică a Sibiului cu Munții Făgăraș în fundal.",nt:"Intrare pe latura Pieței Mici. Taxă mică de intrare. Scări abrupte și înguste."},{id:5,n:"Ochii din Sibiu — the eyes of Sibiu",a:"Old Town Upper",v:["hidden","beautiful","local"],d:20,s:"Dormer windows shaped like lidded eyes that stare down from every rooftop",st:"This is not a building or a monument — it is an observation. Walk any street in Sibiu's old town and look up. The attic dormer windows are shaped like half-open eyelids with a curved hood above and a rectangular lower lip. They seem to watch every street. They are unique to Sibiu and have become the city's most recognisable symbol.",im:"You are being watched. But not by cameras. By windows that have been looking down at this street since the 18th century.",t:"Walk Strada Ocnei, Strada Cetății and around Piața Mică to see the best examples. Free, always visible.",c:[],r:"g",nn:"Ochii Sibiului",ns:"Ferestrele mansardă în formă de ochi care privesc de pe acoperișuri",nst:"Ferestrele mansardei în formă de ochi sunt simbolul cel mai recunoscut al Sibiului. Plimbați-vă pe Strada Ocnei și priviți în sus.",nt:"Vizibile pe orice stradă din orașul vechi. Cele mai bune exemple pe Strada Ocnei și Strada Cetății."},{id:6,n:"Catedrala Evanghelică — Lutheran Cathedral",a:"Old Town Upper",v:["history","beautiful","architecture"],d:30,s:"The largest Gothic church in Transylvania, with the tomb of Vlad the Impaler's son",st:"The Lutheran Cathedral of Saint Mary was built over two centuries and completed in the 15th century. At 73 metres, its tower dominates the Sibiu skyline. Inside: an impressive baroque organ, medieval tombstones including that of Mihnea cel Rău — the son of Vlad the Impaler — and the quiet of a church that has been in use for 500 years. Climb the tower for the best views in the city.",im:"You are standing where Vlad's son was buried after being stabbed in the street outside. The organ pipes rise 12 metres. The vaulting is 500 years old.",t:"On Piața Huet behind the Town Hall. Small fee for tower access. Check opening hours as services may restrict entry.",c:["history_big"],r:"g",nn:"Catedrala Evanghelică",ns:"Cea mai mare biserică gotică din Transilvania",nst:"Construită pe parcursul a două secole, cu turnul de 73 m și mormântul lui Mihnea cel Rău, fiul lui Vlad Țepeș.",nt:"Pe Piața Huet, în spatele primăriei. Taxă mică pentru accesul la turn."},{id:7,n:"Muzeul Brukenthal — national art museum",a:"Old Town Upper",v:["history","art","architecture"],d:60,s:"One of the oldest museums in Europe, in a grand baroque palace on the main square",st:"Baron Samuel von Brukenthal, Habsburg governor of Transylvania, opened his art collection to the public in 1817 — one of the first museums in southeastern Europe. The palace on Piața Mare houses old masters, Flemish paintings, Romanian art and decorative arts. For a city of 150,000, the quality of the collection is remarkable.",im:"A Habsburg governor builds a baroque palace and fills it with European paintings in the 18th century. In a Saxon city. In Transylvania. The collection is real.",t:"Located directly on Piața Mare. Closed Mondays. Buy a combined ticket to access multiple Brukenthal buildings across the city.",c:[],r:"g",nn:"Muzeul Național Brukenthal",ns:"Unul dintre cele mai vechi muzee din Europa",nst:"Baronul Samuel von Brukenthal și-a deschis colecția de artă pentru public în 1817. Palatul baroc de pe Piața Mare adăpostește capodopere europene.",nt:"Pe Piața Mare. Închis lunea. Bilet combinat disponibil pentru mai multe clădiri Brukenthal."},{id:8,n:"Pasajul Scărilor — the stairway passage",a:"Old Town Upper",v:["hidden","history","local"],d:5,s:"A covered medieval passageway cut through the city wall, connecting the two squares",st:"Sibiu has several covered passages — pasaje — cut through the old town walls, used since the Middle Ages by merchants and residents moving between the upper and lower parts of the city. Pasajul Scărilor is the most used, connecting Piața Mare to Piața Mică via a short vaulted stairway. It feels quietly ancient even when crowded.",im:"You step from the bright square into a covered tunnel. The stone vaulting is above you. A few steps down and you emerge in a different square. Medieval shortcut.",t:"Entrance on the south side of Piața Mare. Short walk-through, always open and free.",c:[],r:"g",nn:"Pasajul Scărilor",ns:"Un pasaj medieval acoperit prin zidul orașului",nst:"Unul dintre pasajele acoperite ale Sibiului, care leagă Piața Mare de Piața Mică printr-o scară boltită.",nt:"Intrare pe latura sudică a Pieței Mari. Scurt pasaj, deschis și gratuit."},{id:9,n:"Zidul Cetății — the medieval walls",a:"Old Town Lower",v:["history","hidden","local"],d:30,s:"Walking the remains of one of the most fortified medieval cities in Transylvania",st:"Sibiu was ringed by three rows of walls, towers and bastions — each guild was responsible for defending its own tower. Large sections survive in the lower town, including the Potters Tower, Carpenters Tower and Arquebusiers Tower. Walking the surviving stretch along Strada Cetății gives a sense of the city's extraordinary military investment in the 14th and 15th centuries.",im:"Every craft guild had its own tower to defend. The coopers, the potters, the carpenters, the musketeers. Each tower still stands.",t:"Walk from Piața Mică down Strada Cetății in the lower town. Free and accessible at all times.",c:["history_big"],r:"g",nn:"Zidul Cetății",ns:"Rămășițele celui mai puternic sistem de fortifiare din Transilvania",nst:"Sibiu era înconjurat de trei rânduri de ziduri. Fiecare breaslă era responsabilă pentru apărarea propriului turn.",nt:"Mergeți de la Piața Mică în jos pe Strada Cetății în orașul de jos. Gratuit."},{id:10,n:"Piața Huet — the forgotten square",a:"Old Town Upper",v:["hidden","history","local"],d:15,s:"A cobblestone square behind the cathedral that feels unchanged for centuries",st:"Piața Huet sits behind the Evangelical Cathedral and is named after a Saxon bishop. Surrounded by the cathedral apse, old school buildings and the wall of the old town, it is one of the quietest spots in Sibiu — usually empty except for a few students. The paving stones are ancient and the proportions medieval.",im:"You walk through an arched passage from the main square and find yourself in a smaller world. No terraces, no tourists, just cobblestones and the back of the cathedral.",t:"Walk through the arched passage from Piața Mare on the south side. Always open and free.",c:[],r:"g",nn:"Piața Huet",ns:"Piața cobblestone tăcută în spatele catedralei",nst:"Piața Huet se află în spatele Catedralei Evanghelice, numită după un episcop sas. Este unul dintre cele mai liniștite colțuri din Sibiu.",nt:"Mergeți prin pasajul boltit de pe latura sudică a Pieței Mari."},{id:11,n:"Strada Ocnei — the eye-window street",a:"Old Town Lower",v:["beautiful","history","local"],d:20,s:"The cobblestone descent from the Bridge of Lies to the lower town, watched by rows of eye-windows",st:"Strada Ocnei begins at the Bridge of Lies and descends to the lower town via steep steps and narrow passages. It is lined with old Saxon houses, every one fitted with the distinctive hooded dormer windows. Walking it at dusk, when the street lights come on and the eyes of Sibiu glow from the rooftops, is one of the best experiences the city offers.",im:"You walk downhill on wet cobblestones. Above you on both sides, the eyelid windows watch. The street narrows. The city breathes.",t:"Starts at Podul Minciunilor and descends to the lower town. Best walked slowly — cobblestones can be slippery when wet.",c:[],r:"g",nn:"Strada Ocnei",ns:"Coborârea pavată de la Podul Minciunilor la orașul de jos",nst:"Strada Ocnei coboară de la Podul Minciunilor spre orașul de jos. Seara, ferestrele în formă de ochi luminează de pe acoperișuri.",nt:"Începe la Podul Minciunilor. Pietrișul poate fi alunecos când e umed."},{id:12,n:"Piața Cibin — the weekly market",a:"Old Town Lower",v:["local","hidden","food"],d:30,s:"Local farmers sell cheese, honey and sausages at the oldest market in Sibiu",st:"The Cibin market is held in the lower town near the Cibin river and is where Sibiu's residents actually shop. Local farmers bring vegetables, cheese, sour cream, smoked sausages, honey and seasonal produce. A window into everyday life that exists completely separately from the tourist circuit in the upper town.",im:"A woman from a village 20 kilometres away has been selling her cheese at this market every Saturday since 1988. She does not speak English. The cheese is excellent.",t:"Located in the lower town near the Cibin river. Open daily in the morning, busiest on Saturdays. Cash preferred.",c:[],r:"g",nn:"Piața Cibin",ns:"Piața locală unde sibenii cumpără de fapt",nst:"Piața Cibin este în orașul de jos, lângă râul Cibin. Fermierii locali aduc brânzeturi, miere și cârnați afumați.",nt:"În orașul de jos lângă râul Cibin. Deschis zilnic dimineața, mai aglomerat sâmbăta. Se preferă numerar."},{id:13,n:"Catedrala Ortodoxă — Romanian Orthodox Cathedral",a:"Old Town Upper",v:["history","beautiful","architecture"],d:20,s:"A neo-Byzantine cathedral built in 1906 as a statement of Romanian identity in a Saxon city",st:"The large Romanian Orthodox Cathedral was built between 1902 and 1906, modelled loosely on the Hagia Sophia in Istanbul. Its blue and gold interior with large frescoes reflects the Romanian Orthodox community reasserting its presence in this historically Saxon-dominated city. The contrast between this cathedral and the Gothic Lutheran one three streets away tells the whole story of Transylvanian identity.",im:"Two cathedrals. One Gothic, built by Saxons. One Byzantine, built by Romanians. Three streets apart. Same sky.",t:"On Bulevardul Victoriei, a short walk from Piața Mare. Open daily. Sunday morning services are particularly atmospheric.",c:[],r:"g",nn:"Catedrala Mitropolitană",ns:"O catedrală neo-bizantică din 1906 ca afirmare a identității române",nst:"Construită între 1902-1906, modelată după Hagia Sophia. Interiorul albastru și auriu reflectă prezența comunității ortodoxe române în acest oraș dominat de sași.",nt:"Pe Bulevardul Victoriei. Deschisă zilnic. Slujbele de duminică dimineața sunt deosebite."},{id:14,n:"Parcul Sub Arini — the city park",a:"Sub Arini",v:["local","hidden","nature"],d:30,s:"Sibiu's beloved city park where locals jog, families picnic, and time slows down",st:"Sub Arini is Sibiu's main green space — wide, tree-lined and unhurried. Old silver firs give the park its name. On weekend mornings you will find joggers, elderly couples on benches, children on bicycles and students in the grass. It is the kind of city park that makes you understand why people love living here.",im:"Sunday morning. An elderly man sits on a bench and reads a newspaper. A dog sleeps at his feet. The trees are very old. Nothing is happening. It is perfect.",t:"Short walk south-east from Piața Mare. Free to enter, open at all hours.",c:[],r:"g",nn:"Parcul Sub Arini",ns:"Parcul iubit al Sibiului unde localnicii petrec weekendurile",nst:"Sub Arini este spațiul verde principal al Sibiului, cu brazi vechi, alei și bănci. Weekend-urile aduc familii, alergători și studenți.",nt:"La câteva minute de mers pe jos spre sud-est de Piața Mare. Gratuit, deschis non-stop."},{id:15,n:"Muzeul ASTRA — open-air village museum",a:"Dumbrava",v:["history","nature","local"],d:180,s:"96 hectares of forest with 300 traditional Romanian houses relocated from villages across the country",st:"The ASTRA National Museum Complex in the Dumbrava forest is one of the largest open-air museums in Europe. Over 300 authentic houses, mills, workshops, churches and barns were relocated here from villages across Romania — a vast living atlas of vernacular architecture. Spend a morning walking among water mills, wine presses, painted beehives and Saxon farmsteads. You will not see half of it.",im:"A 200-year-old wooden church from Maramureș stands next to a wind mill from Dobrogea next to a Saxon barn from near Sibiu. All moved here. All real.",t:"Take the local bus or taxi from the centre to Dumbrava forest, about 4 km south. Allow at least 3 hours. Wear comfortable walking shoes.",c:["history_big"],r:"g",nn:"Complexul Național Muzeal ASTRA",ns:"96 de hectare de pădure cu 300 de case tradiționale românești",nst:"Unul dintre cele mai mari muzee în aer liber din Europa. Peste 300 de case, mori, ateliere și biserici aduse din sate din toată România.",nt:"Autobuz local sau taxi din centru spre pădurea Dumbrava, circa 4 km sud. Rezervați cel puțin 3 ore."},{id:16,n:"Pădurea Dumbrava — the forest",a:"Dumbrava",v:["nature","local","hidden"],d:60,s:"The forest south of Sibiu where families walk, the ASTRA museum spreads, and the city breathes",st:"The Dumbrava forest is a large natural area that begins where the city ends. It contains the ASTRA museum, a small zoo, walking trails, a lake and picnic areas. On summer weekends it fills with Sibiu families. In winter it is quiet snow and silence. It is the green lung that makes living in a compact historic city feel possible.",im:"You leave the cobblestones behind. Pine trees begin. The city sound fades. Children run ahead on a forest path.",t:"Bus from Piața Unirii or taxi. ASTRA museum and the zoo both have their own opening times and fees — check separately.",c:[],r:"g",nn:"Pădurea Dumbrava",ns:"Plămânul verde al Sibiului la capătul orașului",nst:"Pădurea Dumbrava conține muzeul ASTRA, o mică grădină zoologică, alei de plimbare și un lac. Weekendurile de vară o umplu cu familii sibiene.",nt:"Autobuz de la Piața Unirii sau taxi. Verificați separat orele de deschidere ale muzeului ASTRA și grădinii zoologice."},{id:17,n:"Biertan — fortified Saxon church",a:"Day Trips",v:["history","beautiful","hidden"],d:120,s:"A UNESCO-listed fortified church rising above a Saxon village that time forgot",st:"The Saxon village of Biertan, 25 km from Sibiu, grew wealthy on wine and trade in the Middle Ages. Its fortified church is one of the most impressive in Transylvania — three concentric rings of defensive walls surround a Gothic church whose sacristy lock mechanism won a prize at the 1900 Paris World Fair. The village below the walls is quiet and almost unchanged.",im:"A lock mechanism so clever it won a prize in Paris in 1900. It is still in the sacristy door. Turn it yourself.",t:"Drive or join a day tour from Sibiu — about 40 minutes by car. No direct bus. Best combined with other Saxon villages along the route.",c:["history_big"],r:"g",nn:"Biertan",ns:"O biserică sătească SAXonă fortificată, sit UNESCO",nst:"La 25 km de Sibiu, Biertan are una dintre cele mai impresionante biserici-cetate din Transilvania. Mecanismul de blocare al sacristiei a câștigat un premiu la Expoziția Universală de la Paris din 1900.",nt:"Mașină sau excursie organizată din Sibiu — circa 40 minute cu mașina. Fără autobuz direct."},{id:18,n:"Viscri — the village Prince Charles loved",a:"Day Trips",v:["hidden","beautiful","history"],d:180,s:"An untouched Saxon village with a UNESCO church, where Prince Charles bought a house and returned every year",st:"Viscri is 65 km from Sibiu and feels three times further in time. The village's unpaved main street, painted houses in blues and greens, and the white fortified church on the hill above have remained almost unchanged for 300 years. Prince Charles of Wales discovered it in the 1990s, bought a house and has returned almost every year since. His presence has helped preserve it rather than ruin it.",im:"The road to the village is not paved. Geese cross it. The church on the hill has been there since the 13th century. Prince Charles sleeps in a small house at the end of the street.",t:"About 65 km from Sibiu by car, partly on unpaved road. No public transport. Day trips bookable from Sibiu. Plan the full day.",c:["history_big"],r:"g",nn:"Viscri",ns:"Satul saxon UNESCO pe care Prințul Charles l-a iubit",nst:"La 65 km de Sibiu, Viscri are o stradă principală nepavată, case colorate și o biserică-cetate albă pe deal. Prințul Charles o vizitează aproape în fiecare an.",nt:"Circa 65 km cu mașina, parțial pe drum neasfaltat. Fără transport public. Excursii de zi disponibile din Sibiu."},{id:19,n:"Sighișoara — the Dracula citadel",a:"Day Trips",v:["history","beautiful","local"],d:240,s:"The best-preserved medieval citadel in Transylvania and birthplace of Vlad the Impaler",st:"Sighișoara is one hour from Sibiu by train or car. Its medieval citadel, a UNESCO World Heritage Site, sits on a hill above the Târnava Mare river. The Clock Tower, the coloured houses, the covered wooden staircase to the hilltop church, and the house where Vlad the Impaler was born are all within a few hundred metres of each other. Do not go on a weekend in summer without booking lunch in advance.",im:"Vlad the Impaler was born in the house on the main street. It is now a restaurant. The Clock Tower has been there since the 14th century. Both are open.",t:"One hour by train from Sibiu — trains run several times daily. The citadel is a short uphill walk from the station.",c:["history_big"],r:"g",nn:"Sighișoara",ns:"Cea mai bine conservată cetate medievală din Transilvania",nst:"Sighișoara, la o oră de Sibiu, este locul nașterii lui Vlad Țepeș. Cetatea sa medievală este sit UNESCO.",nt:"O oră cu trenul din Sibiu. Cetatea e la câteva minute de mers pe jos de la gară."},{id:20,n:"Sanctuarul Libearty — bear sanctuary",a:"Day Trips",v:["nature","local","hidden"],d:180,s:"The largest bear sanctuary in the world — former dancing bears living in a forested reserve",st:"The Libearty Bear Sanctuary near Zărnești, 90 km from Sibiu, shelters over 100 rescued brown bears — former dancing bears from the streets, bears from illegal zoos, bears saved from concrete cages. They live in a large forested enclosure and are observed on guided walks along raised platforms through the trees. The contrast between their past and present is striking and the experience unlike anything else in the region.",im:"A bear that spent 12 years performing in a street circus now sits in a forest and eats apples. That is all that needs to be said.",t:"Pre-booking is essential — guided visits are timed. Drive from Sibiu about 90 minutes via Fagaras. Day tours available from Sibiu and Brașov.",c:[],r:"g",nn:"Sanctuarul de Urși Libearty",ns:"Cel mai mare sanctuar de urși din lume",nst:"Lângă Zărnești, la 90 km de Sibiu, sanctuarul adăpostește peste 100 de urși bruni salvați. Vizite ghidate pe platforme suspendate prin pădure.",nt:"Rezervare obligatorie. Circa 90 minute cu mașina din Sibiu. Excursii de zi disponibile din Sibiu și Brașov."},{id:21,n:"Transfăgărășan — the mountain road",a:"Day Trips",v:["nature","beautiful","hidden"],d:240,s:"One of the world's great mountain roads, built by a dictator and inherited by everyone",st:"In 1974, Nicolae Ceaușescu ordered the construction of Transfăgărășan to showcase Romania's might, with soldiers dying in the process amid rockfalls and avalanches; today locals drive it for weekend picnics, stopping at hidden shepherds' huts for fresh caș cheese and stories of the road's cursed bends[1][2].",im:"The crisp mountain air carries the scent of pine and wild thyme as engines rumble faintly below the endless hairpin turns.",t:"Rent a car in Sibiu early morning in summer to beat traffic and fog; pack a picnic for Bâlea Lake viewpoint.",c:[],r:"g",nn:"Transfăgărășan",ns:"Unul dintre cele mai spectaculoase drumuri de munte din lume",nst:"În 1974, Nicolae Ceaușescu a ordonat construcția Transfăgărășanului pentru a arăta puterea României, cu soldați morți în avalanșe; azi localnicii îl parcurg pentru picnicuri, oprindu-se la colibe de păstori pentru caș proaspăt[1][2].",nt:"Închiriază o mașină din Sibiu dimineața devreme vara să eviți traficul; ia un picnic pentru punctul de belvedere Bâlea."},{id:22,n:"Turnul Dogarilor — Coopers Tower",a:"Old Town Lower",v:["history","hidden","local"],d:15,s:"One of the best-preserved guild towers from Sibiu's medieval fortification system",st:"Built in the 16th century by the coopers' guild to defend against Ottoman raids, Turnul Dogarilor once housed barrels for rainwater collection; a local legend says a cooper's ghost still watches from the battlements during full moons[1][3].",im:"Rough stone walls release a faint musty aroma under the touch of evening breeze.",t:"Climb at dusk for free views over Lower Town; bring a flashlight for the narrow spiral stairs.",c:[],r:"g",nn:"Turnul Dogarilor",ns:"Unul dintre turnurile breslelor din sistemul de fortifiare medieval al Sibiului",nst:"Construit în secolul 16 de breasla dogarilor împotriva raidurilor otomane, Turnul Dogarilor găzduia butoaie pentru apă; legenda spune că fantoma unui dogar veghează de pe creneluri la lună plină[1][3].",nt:"Urcă seara pentru vedere gratuită asupra Orașului de Jos; ia lanternă pentru scara în spirală."},{id:23,n:"Piața Unirii — the everyday square",a:"Old Town Lower",v:["local","hidden","food"],d:20,s:"Sibiu's working-class square — fruit stalls, bus connections, and no tourists",st:"Every morning, farmers from nearby villages unload crates of plums and walnuts onto Piața Unirii's stalls, where babushka-clad women haggle fiercely; it's where Sibiu's factory workers grab fresh bread before the bus to shifts[1][3].",im:"The earthy perfume of ripe fruits and baking bread wafts through the chatter of vendors.",t:"Visit Tuesdays for the best local honey; pay cash and chat to get the freshest picks.",c:[],r:"g",nn:"Piața Unirii",ns:"Piața de zi cu zi a Sibiului — fără turiști",nst:"În fiecare dimineață, fermierii descarcă prune și nuci în Piața Unirii, unde femei cu basma negociază aprins; muncitorii iau pâine proaspătă înainte de autobuz[1][3].",nt:"Vizitează marțea pentru miere locală; plătește cash și vorbește pentru cele mai proaspete."},{id:24,n:"Casa Artelor — the courtyard of arts",a:"Old Town Upper",v:["hidden","beautiful","art"],d:20,s:"A restored Saxon building whose courtyard is one of the most elegant secrets in the old town",st:"Restored in 2010 from a crumbling Saxon house, Casa Artelor courtyard now hosts whispered poetry readings by local artists; elderly neighbors peek over balconies, sharing apricots with visitors who linger too long[3][5].",im:"Soft lantern light dances on ivy-covered walls, filling the air with jasmine sweetness.",t:"Enter via the unmarked blue door off Strada Ocnei; sit on the stone bench for the full effect.",c:[],r:"g",nn:"Casa Artelor",ns:"Curtea arcadată tăcută din inima orașului vechi",nst:"Restaurată în 2010 dintr-o casă sască ruinată, curtea Casei Artelor găzduiește lecturi de poezie; vecinii împart caise cu vizitatorii[3][5].",nt:"Intră pe ușa albastră nemarcată de pe Strada Ocnei; stai pe banca de piatră."},{id:25,n:"Râul Cibin — the city river",a:"Old Town Lower",v:["local","nature","hidden"],d:20,s:"The small river that gave Sibiu its name, running through the lower town past old mill houses",st:"Râul Cibin powered old mill wheels where Saxon millers ground flour until the 1950s; now kids skip stones along its banks while fishermen pull trout at dawn, ignoring the ducks quacking for crumbs[1][3].",im:"Gentle water laps against mossy stones, carrying the cool, mineral tang of the mountains.",t:"Walk the left bank path from Piața Unirii for hidden benches; avoid after heavy rain.",c:[],r:"g",nn:"Râul Cibin",ns:"Râul care a dat numele orașului, curgând prin orașul de jos",nst:"Râul Cibin mișca roți de moară saxe unde morarii măcinau făină până în anii '50; acum pescarii prind păstrăvi la răsărit[1][3].",nt:"Mergi pe poteca din stânga de la Piața Unirii pentru bănci ascunse; evită după ploaie."},{id:26,n:"Piața Gării — the station square",a:"New Town",v:["local","history","hidden"],d:15,s:"The handsome Austro-Hungarian station that reminds you Sibiu was once part of a larger empire",st:"Opened in 1879 under Austro-Hungarian rule, Piața Gării buzzes with locals greeting relatives off trains from Bucharest; a faded 'Hermannstadt' sign lingers above the station clock[1][5].",im:"Diesel fumes mix with coffee from the platform kiosk as announcements echo metallically.",t:"Take bus 1 from here to center for 3 lei; grab a fresh covrigi pretzel from the vendor.",c:[],r:"g",nn:"Piața Gării",ns:"Gara austro-ungară din 1872",nst:"Deschisă în 1879 sub austro-ungari, Piața Gării vuiește cu localnici întâmpinând trenuri din București; semnul 'Hermannstadt' rămâne[1][5].",nt:"Ia autobuzul 1 spre centru cu 3 lei; ia covrigi proaspeți de la vânzător."},{id:27,n:"Turnul Archebuzierilor — Arquebusiers Tower",a:"Old Town Lower",v:["history","hidden","local"],d:15,s:"The musketeers guild tower, part of Sibiu's extraordinary chain of defended bastion walls",st:"Erected in 1627 by arquebusiers drilling volleys from its loopholes during sieges, Turnul Archebuzierilor connected to bastions via underground passages; locals once hid wine there during raids[1][3].",im:"A whisper of gunpowder history lingers in the wind-swept embrasures.",t:"Pair with a Lower Town walk; entry is 5 lei, open till 6pm.",c:[],r:"g",nn:"Turnul Archebuzierilor",ns:"Turnul breslei muschetarilor din sistemul de fortifiare",nst:"Ridicat în 1627 de arquebuzieri care trăgeau din metereze în asedii, Turnul Archebuzierilor lega bastioane prin tuneluri; localnicii ascundeau vin[1][3].",nt:"Combină cu plimbare în Orașul de Jos; intrare 5 lei, deschis până la 18."},{id:28,n:"Muzeul de Istorie — History Museum",a:"Old Town Upper",v:["history","local","art"],d:45,s:"Sibiu's history from Roman Dacia through Saxon colonisation to the present day",st:"Housed in Brukenthal Palace since 1950, Muzeul de Istorie displays Dacian gold coins next to Saxon guild charters; a guide once shared how his grandfather forged fake Habsburg seals here[6].",im:"Polished wood floors gleam under chandeliers, scented with aged leather and wax.",t:"Buy combo ticket with art museum for 30 lei; audio guide in English available.",c:["history_big"],r:"g",nn:"Muzeul de Istorie",ns:"Istoria Sibiului de la Dacia Romană până în prezent",nst:"Găzduit în Palatul Brukenthal din 1950, Muzeul de Istorie arată monede dacice lângă carte saxe; un ghid povesti cum bunicul său falsifica sigilii habsburgice[6].",nt:"Cumpără bilet combo cu muzeul de artă 30 lei; audioghid în engleză disponibil."},{id:29,n:"Hermannstadt — the ghost of the Saxon city",a:"Old Town Upper",v:["history","hidden","local"],d:20,s:"The German name for Sibiu still echoes in street signs, names and the city's remarkable political history",st:"Until 1918, Hermannstadt was the bustling Saxon capital of Transylvania, with German schools and theaters; today, faded 'Nagyszeben' plaques on doors remind Hungarians of shared rule[5][7].",im:"Echoes of German chatter haunt the quiet alleys lined with baroque facades.",t:"Hunt for brass 'Hermannstadt' signs on Piata Mare doors; best in golden hour light.",c:["history_big"],r:"g",nn:"Hermannstadt",ns:"Moștenirea saxonă care încă modelează Sibiul",nst:"Până în 1918, Hermannstadt era capitala sască a Transilvaniei, cu școli germane; plăci 'Nagyszeben' amintesc ungurilor[5][7].",nt:"Caută plăci 'Hermannstadt' de alamă pe uși din Piața Mare; cel mai bine la ora aurie."},{id:30,n:"Piața Mare by night — the square after dark",a:"Old Town Upper",v:["local","beautiful","food"],d:60,s:"Return to the great square at 10pm, order wine, and watch the city stop performing",st:"After 10pm, Piața Mare's tourist crowds thin as locals claim wooden benches with glasses of țuică; street sweepers chat softly while the last festival lights flicker out[3][8].",im:"Cool night air hums with distant laughter and the clink of wine glasses on stone.",t:"Order local Fetească from La Pasaj bar; sit facing the clock tower.",c:[],r:"g",nn:"Piața Mare noaptea",ns:"Piața cea mare după ora 22, când orașul nu mai performează",nst:"După 22, mulțimea turistică se rărește în Piața Mare, localnicii ocupă bănci cu țuică; măturătorii discută liniștit[3][8].",nt:"Comandă Fetească locală de la La Pasaj; stai cu fața spre turnul cu ceas."},{id:31,n:"Pasajul Aurarilor",s:"Narrow medieval alley of ancient goldsmiths, free quiet escape from crowds",a:"Upper Town historic center"},{id:32,n:"Piata Schiller",s:"Artistic square with cultural vibe, lesser-known gem for free exploration",a:"Upper Town near historic sites"},{id:33,n:"Lower Town Streets",s:"Charming back alleys with old houses and local life, free wandering spot",a:"Below city walls"},{id:34,n:"Astra Park",s:"Shaded old town park with fountains and folk dances, peaceful free green space",a:"Near Astra Museum area"},{id:35,n:"Dumbrava Forest Trails",s:"Overlooked peaceful paths for picnics amid nature, free beyond museum",a:"Dumbrava forest outskirts"},{id:36,n:"Village of Sibiel",s:"Hidden rural spot with glass icons heritage, free local discovery",a:"Sibiu County countryside"},{id:37,n:"Church in Cristian",s:"Saxon fortified church nearby, free architectural heritage walk",a:"Near Sibiu, Cristian village"},{id:38,n:"Piata Unirii area streets",s:"Off-beat everyday streets around square, authentic local vibe free",a:"Near station district"}];

<p className="text-sm mt-2" style={{color:"#555",lineHeight:1.5}}>{lang==="native"&&p.ns?p.ns:p.s}</p>
<div className="flex gap-1.5 mt-2 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-2 py-0.5 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</button>);

const PlaceDetail=({place:p,onClose,onNext,onPrev,lang})=>(
<div style={{position:"fixed",inset:0,zIndex:1000,background:"url('../../textures/tex3.png') center/cover no-repeat",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat",overflowY:"auto"}}>
<div className="px-5 pt-6 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex justify-between items-center mb-4">
<button onClick={onClose} className="text-sm font-bold" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← Back</button>
<div className="flex gap-2">
<button onClick={onPrev} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>←</button>
<button onClick={onNext} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>→</button></div></div>
<h1 className="text-2xl font-black" style={{color:"#1a1a2e"}}>{lang==="native"&&p.nn?p.nn:p.n}</h1>
{lang==="native"&&p.nn&&<p className="text-sm font-medium" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-sm mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p>
{PLACE_IMAGES[p.id]&&<div className="mt-4 rounded-xl overflow-hidden" style={{maxHeight:"400px"}}>
<img src={`images/${PLACE_IMAGES[p.id]}`} alt={p.n} style={{width:"100%",maxHeight:"360px",objectFit:"contain",display:"block",borderRadius:"8px"}}/>
<p className="text-xs mt-1" style={{color:"#aaa",textAlign:"center"}}>AI-generated illustration</p></div>}
<div className="mt-4 p-4 rounded-xl" style={{background:"#f8f8ff"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#1a1a2e"}}>The Story</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nst?p.nst:p.st}</p></div>
{p.im&&<div className="mt-3 p-4 rounded-xl" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#a78bfa"}}>Imagine This</h3>
<p className="text-sm" style={{color:"#b8b0d0",lineHeight:1.7,fontStyle:"italic"}}>{p.im}</p></div>}
{p.t&&<div className="mt-3 p-4 rounded-xl" style={{background:"#f0fdf4"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#166534"}}>{lang==="native"?"Tips / "+LANG_NAME:"Tips"}</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nt?p.nt:p.t}</p>
<a href={`https://maps.google.com/?q=${encodeURIComponent(p.n+', '+CITY_EN)}`} target="_blank" rel="noopener noreferrer"
  className="mt-3 flex items-center gap-2 text-sm font-bold"
  style={{color:"#166534",textDecoration:"none",display:"inline-flex",marginTop:"10px"}}>
  🗺 Get directions
</a>
</div>}
{p.ef&&<p className="text-xs mt-3 pt-3" style={{color:"#555",lineHeight:1.7,borderTop:"1px solid #dcfce7"}}>🍔 {p.ef}</p>}
{p.sf&&<p className="text-xs mt-2" style={{color:"#555",lineHeight:1.7}}>🏠 {p.sf}</p>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
<div className="mt-5">
<p className="text-xs font-bold mb-2" style={{color:"#888",letterSpacing:"0.08em",textTransform:"uppercase"}}>City Moods</p>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} style={{borderRadius:10,overflow:"hidden",aspectRatio:"2/3",background:"#eee"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>)}</div></div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Sibiu Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Sibiu Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
