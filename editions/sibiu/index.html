<script>
const P = [
  {id:1,n:"Piața Mare — the great square",a:"Old Town Upper",v:["beautiful", "history", "local"],d:30,s:"The baroque heart of a medieval Saxon city still running on slow time",st:"Sibiu was built by Saxon colonists in the 12th century and Piața Mare was their commercial centre. The pastel facades, the Council Tower, and the sheer scale of the square for a city this small all speak to how wealthy and self-confident this community once was. Today the terraces fill up, children chase pigeons, and the square does exactly what a great European square should.",im:"It is 1500 and you are a Saxon merchant in one of the richest cities north of the Danube. You stand in this square surrounded by guild halls and churches, watching caravans arrive from the east.",t:"The square is the centre of everything — walk from anywhere in the old town. Sit at a terrace, order a coffee, and spend an hour watching the square work.",c:[],r:"g",nn:"Piața Mare",ns:"Inima barocă a orașului saxon medieval",nst:"Construită de coloniștii sași în secolul al XII-lea, Piața Mare era centrul comercial al unuia dintre cele mai bogate orașe nord-dunărene.",nt:"Centrul orașului vechi — accesibil pe jos din orice direcție."},
  {id:2,n:"Piața Mică — the little square",a:"Old Town Upper",v:["beautiful", "history", "hidden"],d:20,s:"Cobblestones, eye-windows and the Bridge of Lies in a square that feels unchanged for 500 years",st:"Piața Mică sits just below Piața Mare, connected by a covered passage. Its sloping cobblestones, the old houses with their distinctive dormer windows shaped like hooded eyelids, and the cast-iron Bridge of Lies at one end make it the most atmospheric corner of Sibiu. Less visited than the main square, yet more genuinely medieval.",im:"The dormer windows stare down at you like half-closed eyes. Every house in this square has them. They watch. They have been watching since the 1400s.",t:"Walk through Pasajul Scărilor from the south side of Piața Mare. Free, always open.",c:[],r:"g",nn:"Piața Mică",ns:"Piatra de pavaj, ochii și Podul Minciunilor",nst:"Piața Mică se află chiar sub Piața Mare. Ferestrele mansardei, în formă de ochi, privesc în jos spre vizitatori de secole.",nt:"Accesibilă prin Pasajul Scărilor de pe latura sudică a Pieței Mari."},
  {id:3,n:"Podul Minciunilor — Bridge of Lies",a:"Old Town Upper",v:["history", "local", "beautiful"],d:10,s:"The oldest cast-iron bridge in Romania, where legend says liars will be exposed",st:"Built in 1859, this was the first cast-iron bridge in Romania. It connects Piața Mică to Strada Ocnei and gets its name from a local legend: merchants would lie about their wares here, and the bridge would groan and collapse beneath a liar. It has not collapsed yet, which says something about Sibiu.",im:"You stand on the bridge. You think of something you have been avoiding saying. The iron does not move.",t:"Find it at the end of Piața Mică where the square drops toward Strada Ocnei. Free, always accessible.",c:[],r:"g",nn:"Podul Minciunilor",ns:"Cel mai vechi pod din fier turnat din România",nst:"Construit în 1859, primul pod din fier turnat din România. Legenda spune că minciunile spuse pe pod îl vor prăbuși.",nt:"La capătul Pieței Mici, unde piața coboară spre Strada Ocnei."},
  {id:4,n:"Turnul Sfatului — Council Tower",a:"Old Town Upper",v:["history", "beautiful", "views"],d:25,s:"Climb 53 metres for rooftop views over red tiles and the Carpathian foothills",st:"The Council Tower dates to the 13th century and once guarded the passage between the upper and lower towns. Its current form with the baroque roof is from the 18th century. Climb the steep interior stairs to the top platform for a panoramic view of Sibiu's terracotta roofline against the Fagaras Mountains on the horizon.",im:"From the top you count the rooftops. Every one is terracotta red. The mountains are blue in the distance. The square below is a toy.",t:"Entrance on the Piața Mică side. Small admission fee. Stairs are steep and narrow — not suitable for those with limited mobility.",c:[],r:"g",nn:"Turnul Sfatului",ns:"53 de metri pentru panorame peste acoperișurile roșii",nst:"Turnul datează din secolul al XIII-lea. Urcă scările abrupte pentru o priveliște panoramică a Sibiului cu Munții Făgăraș în fundal.",nt:"Intrare pe latura Pieței Mici. Taxă mică de intrare. Scări abrupte și înguste."},
  {id:5,n:"Ochii din Sibiu — the eyes of Sibiu",a:"Old Town Upper",v:["hidden", "beautiful", "local"],d:20,s:"Dormer windows shaped like lidded eyes that stare down from every rooftop",st:"This is not a building or a monument — it is an observation. Walk any street in Sibiu's old town and look up. The attic dormer windows are shaped like half-open eyelids with a curved hood above and a rectangular lower lip. They seem to watch every street. They are unique to Sibiu and have become the city's most recognisable symbol.",im:"You are being watched. But not by cameras. By windows that have been looking down at this street since the 18th century.",t:"Walk Strada Ocnei, Strada Cetății and around Piața Mică to see the best examples. Free, always visible.",c:[],r:"g",nn:"Ochii Sibiului",ns:"Ferestrele mansardă în formă de ochi care privesc de pe acoperișuri",nst:"Ferestrele mansardei în formă de ochi sunt simbolul cel mai recunoscut al Sibiului. Plimbați-vă pe Strada Ocnei și priviți în sus.",nt:"Vizibile pe orice stradă din orașul vechi. Cele mai bune exemple pe Strada Ocnei și Strada Cetății."},
  {id:6,n:"Catedrala Evanghelică — Lutheran Cathedral",a:"Old Town Upper",v:["history", "beautiful", "architecture"],d:30,s:"The largest Gothic church in Transylvania, with the tomb of Vlad the Impaler's son",st:"The Lutheran Cathedral of Saint Mary was built over two centuries and completed in the 15th century. At 73 metres, its tower dominates the Sibiu skyline. Inside: an impressive baroque organ, medieval tombstones including that of Mihnea cel Rău — the son of Vlad the Impaler — and the quiet of a church that has been in use for 500 years. Climb the tower for the best views in the city.",im:"You are standing where Vlad's son was buried after being stabbed in the street outside. The organ pipes rise 12 metres. The vaulting is 500 years old.",t:"On Piața Huet behind the Town Hall. Small fee for tower access. Check opening hours as services may restrict entry.",c:["history_big"],r:"g",nn:"Catedrala Evanghelică",ns:"Cea mai mare biserică gotică din Transilvania",nst:"Construită pe parcursul a două secole, cu turnul de 73 m și mormântul lui Mihnea cel Rău, fiul lui Vlad Țepeș.",nt:"Pe Piața Huet, în spatele primăriei. Taxă mică pentru accesul la turn."},
  {id:7,n:"Muzeul Brukenthal — national art museum",a:"Old Town Upper",v:["history", "art", "architecture"],d:60,s:"One of the oldest museums in Europe, in a grand baroque palace on the main square",st:"Baron Samuel von Brukenthal, Habsburg governor of Transylvania, opened his art collection to the public in 1817 — one of the first museums in southeastern Europe. The palace on Piața Mare houses old masters, Flemish paintings, Romanian art and decorative arts. For a city of 150,000, the quality of the collection is remarkable.",im:"A Habsburg governor builds a baroque palace and fills it with European paintings in the 18th century. In a Saxon city. In Transylvania. The collection is real.",t:"Located directly on Piața Mare. Closed Mondays. Buy a combined ticket to access multiple Brukenthal buildings across the city.",c:[],r:"g",nn:"Muzeul Național Brukenthal",ns:"Unul dintre cele mai vechi muzee din Europa",nst:"Baronul Samuel von Brukenthal și-a deschis colecția de artă pentru public în 1817. Palatul baroc de pe Piața Mare adăpostește capodopere europene.",nt:"Pe Piața Mare. Închis lunea. Bilet combinat disponibil pentru mai multe clădiri Brukenthal."},
  {id:8,n:"Pasajul Scărilor — the stairway passage",a:"Old Town Upper",v:["hidden", "history", "local"],d:5,s:"A covered medieval passageway cut through the city wall, connecting the two squares",st:"Sibiu has several covered passages — pasaje — cut through the old town walls, used since the Middle Ages by merchants and residents moving between the upper and lower parts of the city. Pasajul Scărilor is the most used, connecting Piața Mare to Piața Mică via a short vaulted stairway. It feels quietly ancient even when crowded.",im:"You step from the bright square into a covered tunnel. The stone vaulting is above you. A few steps down and you emerge in a different square. Medieval shortcut.",t:"Entrance on the south side of Piața Mare. Short walk-through, always open and free.",c:[],r:"g",nn:"Pasajul Scărilor",ns:"Un pasaj medieval acoperit prin zidul orașului",nst:"Unul dintre pasajele acoperite ale Sibiului, care leagă Piața Mare de Piața Mică printr-o scară boltită.",nt:"Intrare pe latura sudică a Pieței Mari. Scurt pasaj, deschis și gratuit."},
  {id:9,n:"Zidul Cetății — the medieval walls",a:"Old Town Lower",v:["history", "hidden", "local"],d:30,s:"Walking the remains of one of the most fortified medieval cities in Transylvania",st:"Sibiu was ringed by three rows of walls, towers and bastions — each guild was responsible for defending its own tower. Large sections survive in the lower town, including the Potters Tower, Carpenters Tower and Arquebusiers Tower. Walking the surviving stretch along Strada Cetății gives a sense of the city's extraordinary military investment in the 14th and 15th centuries.",im:"Every craft guild had its own tower to defend. The coopers, the potters, the carpenters, the musketeers. Each tower still stands.",t:"Walk from Piața Mică down Strada Cetății in the lower town. Free and accessible at all times.",c:["history_big"],r:"g",nn:"Zidul Cetății",ns:"Rămășițele celui mai puternic sistem de fortifiare din Transilvania",nst:"Sibiu era înconjurat de trei rânduri de ziduri. Fiecare breaslă era responsabilă pentru apărarea propriului turn.",nt:"Mergeți de la Piața Mică în jos pe Strada Cetății în orașul de jos. Gratuit."},
  {id:10,n:"Piața Huet — the forgotten square",a:"Old Town Upper",v:["hidden", "history", "local"],d:15,s:"A cobblestone square behind the cathedral that feels unchanged for centuries",st:"Piața Huet sits behind the Evangelical Cathedral and is named after a Saxon bishop. Surrounded by the cathedral apse, old school buildings and the wall of the old town, it is one of the quietest spots in Sibiu — usually empty except for a few students. The paving stones are ancient and the proportions medieval.",im:"You walk through an arched passage from the main square and find yourself in a smaller world. No terraces, no tourists, just cobblestones and the back of the cathedral.",t:"Walk through the arched passage from Piața Mare on the south side. Always open and free.",c:[],r:"g",nn:"Piața Huet",ns:"Piața cobblestone tăcută în spatele catedralei",nst:"Piața Huet se află în spatele Catedralei Evanghelice, numită după un episcop sas. Este unul dintre cele mai liniștite colțuri din Sibiu.",nt:"Mergeți prin pasajul boltit de pe latura sudică a Pieței Mari."},
  {id:11,n:"Strada Ocnei — the eye-window street",a:"Old Town Lower",v:["beautiful", "history", "local"],d:20,s:"The cobblestone descent from the Bridge of Lies to the lower town, watched by rows of eye-windows",st:"Strada Ocnei begins at the Bridge of Lies and descends to the lower town via steep steps and narrow passages. It is lined with old Saxon houses, every one fitted with the distinctive hooded dormer windows. Walking it at dusk, when the street lights come on and the eyes of Sibiu glow from the rooftops, is one of the best experiences the city offers.",im:"You walk downhill on wet cobblestones. Above you on both sides, the eyelid windows watch. The street narrows. The city breathes.",t:"Starts at Podul Minciunilor and descends to the lower town. Best walked slowly — cobblestones can be slippery when wet.",c:[],r:"g",nn:"Strada Ocnei",ns:"Coborârea pavată de la Podul Minciunilor la orașul de jos",nst:"Strada Ocnei coboară de la Podul Minciunilor spre orașul de jos. Seara, ferestrele în formă de ochi luminează de pe acoperișuri.",nt:"Începe la Podul Minciunilor. Pietrișul poate fi alunecos când e umed."},
  {id:12,n:"Piața Cibin — the weekly market",a:"Old Town Lower",v:["local", "hidden", "food"],d:30,s:"Local farmers sell cheese, honey and sausages at the oldest market in Sibiu",st:"The Cibin market is held in the lower town near the Cibin river and is where Sibiu's residents actually shop. Local farmers bring vegetables, cheese, sour cream, smoked sausages, honey and seasonal produce. A window into everyday life that exists completely separately from the tourist circuit in the upper town.",im:"A woman from a village 20 kilometres away has been selling her cheese at this market every Saturday since 1988. She does not speak English. The cheese is excellent.",t:"Located in the lower town near the Cibin river. Open daily in the morning, busiest on Saturdays. Cash preferred.",c:[],r:"g",nn:"Piața Cibin",ns:"Piața locală unde sibenii cumpără de fapt",nst:"Piața Cibin este în orașul de jos, lângă râul Cibin. Fermierii locali aduc brânzeturi, miere și cârnați afumați.",nt:"În orașul de jos lângă râul Cibin. Deschis zilnic dimineața, mai aglomerat sâmbăta. Se preferă numerar."},
  {id:13,n:"Catedrala Ortodoxă — Romanian Orthodox Cathedral",a:"Old Town Upper",v:["history", "beautiful", "architecture"],d:20,s:"A neo-Byzantine cathedral built in 1906 as a statement of Romanian identity in a Saxon city",st:"The large Romanian Orthodox Cathedral was built between 1902 and 1906, modelled loosely on the Hagia Sophia in Istanbul. Its blue and gold interior with large frescoes reflects the Romanian Orthodox community reasserting its presence in this historically Saxon-dominated city. The contrast between this cathedral and the Gothic Lutheran one three streets away tells the whole story of Transylvanian identity.",im:"Two cathedrals. One Gothic, built by Saxons. One Byzantine, built by Romanians. Three streets apart. Same sky.",t:"On Bulevardul Victoriei, a short walk from Piața Mare. Open daily. Sunday morning services are particularly atmospheric.",c:[],r:"g",nn:"Catedrala Mitropolitană",ns:"O catedrală neo-bizantică din 1906 ca afirmare a identității române",nst:"Construită între 1902-1906, modelată după Hagia Sophia. Interiorul albastru și auriu reflectă prezența comunității ortodoxe române în acest oraș dominat de sași.",nt:"Pe Bulevardul Victoriei. Deschisă zilnic. Slujbele de duminică dimineața sunt deosebite."},
  {id:14,n:"Parcul Sub Arini — the city park",a:"Sub Arini",v:["local", "hidden", "nature"],d:30,s:"Sibiu's beloved city park where locals jog, families picnic, and time slows down",st:"Sub Arini is Sibiu's main green space — wide, tree-lined and unhurried. Old silver firs give the park its name. On weekend mornings you will find joggers, elderly couples on benches, children on bicycles and students in the grass. It is the kind of city park that makes you understand why people love living here.",im:"Sunday morning. An elderly man sits on a bench and reads a newspaper. A dog sleeps at his feet. The trees are very old. Nothing is happening. It is perfect.",t:"Short walk south-east from Piața Mare. Free to enter, open at all hours.",c:[],r:"g",nn:"Parcul Sub Arini",ns:"Parcul iubit al Sibiului unde localnicii petrec weekendurile",nst:"Sub Arini este spațiul verde principal al Sibiului, cu brazi vechi, alei și bănci. Weekend-urile aduc familii, alergători și studenți.",nt:"La câteva minute de mers pe jos spre sud-est de Piața Mare. Gratuit, deschis non-stop."},
  {id:15,n:"Muzeul ASTRA — open-air village museum",a:"Dumbrava",v:["history", "nature", "local"],d:180,s:"96 hectares of forest with 300 traditional Romanian houses relocated from villages across the country",st:"The ASTRA National Museum Complex in the Dumbrava forest is one of the largest open-air museums in Europe. Over 300 authentic houses, mills, workshops, churches and barns were relocated here from villages across Romania — a vast living atlas of vernacular architecture. Spend a morning walking among water mills, wine presses, painted beehives and Saxon farmsteads. You will not see half of it.",im:"A 200-year-old wooden church from Maramureș stands next to a wind mill from Dobrogea next to a Saxon barn from near Sibiu. All moved here. All real.",t:"Take the local bus or taxi from the centre to Dumbrava forest, about 4 km south. Allow at least 3 hours. Wear comfortable walking shoes.",c:["history_big"],r:"g",nn:"Complexul Național Muzeal ASTRA",ns:"96 de hectare de pădure cu 300 de case tradiționale românești",nst:"Unul dintre cele mai mari muzee în aer liber din Europa. Peste 300 de case, mori, ateliere și biserici aduse din sate din toată România.",nt:"Autobuz local sau taxi din centru spre pădurea Dumbrava, circa 4 km sud. Rezervați cel puțin 3 ore."},
  {id:16,n:"Pădurea Dumbrava — the forest",a:"Dumbrava",v:["nature", "local", "hidden"],d:60,s:"The forest south of Sibiu where families walk, the ASTRA museum spreads, and the city breathes",st:"The Dumbrava forest is a large natural area that begins where the city ends. It contains the ASTRA museum, a small zoo, walking trails, a lake and picnic areas. On summer weekends it fills with Sibiu families. In winter it is quiet snow and silence. It is the green lung that makes living in a compact historic city feel possible.",im:"You leave the cobblestones behind. Pine trees begin. The city sound fades. Children run ahead on a forest path.",t:"Bus from Piața Unirii or taxi. ASTRA museum and the zoo both have their own opening times and fees — check separately.",c:[],r:"g",nn:"Pădurea Dumbrava",ns:"Plămânul verde al Sibiului la capătul orașului",nst:"Pădurea Dumbrava conține muzeul ASTRA, o mică grădină zoologică, alei de plimbare și un lac. Weekendurile de vară o umplu cu familii sibiene.",nt:"Autobuz de la Piața Unirii sau taxi. Verificați separat orele de deschidere ale muzeului ASTRA și grădinii zoologice."},
  {id:17,n:"Biertan — fortified Saxon church",a:"Day Trips",v:["history", "beautiful", "hidden"],d:120,s:"A UNESCO-listed fortified church rising above a Saxon village that time forgot",st:"The Saxon village of Biertan, 25 km from Sibiu, grew wealthy on wine and trade in the Middle Ages. Its fortified church is one of the most impressive in Transylvania — three concentric rings of defensive walls surround a Gothic church whose sacristy lock mechanism won a prize at the 1900 Paris World Fair. The village below the walls is quiet and almost unchanged.",im:"A lock mechanism so clever it won a prize in Paris in 1900. It is still in the sacristy door. Turn it yourself.",t:"Drive or join a day tour from Sibiu — about 40 minutes by car. No direct bus. Best combined with other Saxon villages along the route.",c:["history_big"],r:"g",nn:"Biertan",ns:"O biserică sătească SAXonă fortificată, sit UNESCO",nst:"La 25 km de Sibiu, Biertan are una dintre cele mai impresionante biserici-cetate din Transilvania. Mecanismul de blocare al sacristiei a câștigat un premiu la Expoziția Universală de la Paris din 1900.",nt:"Mașină sau excursie organizată din Sibiu — circa 40 minute cu mașina. Fără autobuz direct."},
  {id:18,n:"Viscri — the village Prince Charles loved",a:"Day Trips",v:["hidden", "beautiful", "history"],d:180,s:"An untouched Saxon village with a UNESCO church, where Prince Charles bought a house and returned every year",st:"Viscri is 65 km from Sibiu and feels three times further in time. The village's unpaved main street, painted houses in blues and greens, and the white fortified church on the hill above have remained almost unchanged for 300 years. Prince Charles of Wales discovered it in the 1990s, bought a house and has returned almost every year since. His presence has helped preserve it rather than ruin it.",im:"The road to the village is not paved. Geese cross it. The church on the hill has been there since the 13th century. Prince Charles sleeps in a small house at the end of the street.",t:"About 65 km from Sibiu by car, partly on unpaved road. No public transport. Day trips bookable from Sibiu. Plan the full day.",c:["history_big"],r:"g",nn:"Viscri",ns:"Satul saxon UNESCO pe care Prințul Charles l-a iubit",nst:"La 65 km de Sibiu, Viscri are o stradă principală nepavată, case colorate și o biserică-cetate albă pe deal. Prințul Charles o vizitează aproape în fiecare an.",nt:"Circa 65 km cu mașina, parțial pe drum neasfaltat. Fără transport public. Excursii de zi disponibile din Sibiu."},
  {id:19,n:"Sighișoara — the Dracula citadel",a:"Day Trips",v:["history", "beautiful", "local"],d:240,s:"The best-preserved medieval citadel in Transylvania and birthplace of Vlad the Impaler",st:"Sighișoara is one hour from Sibiu by train or car. Its medieval citadel, a UNESCO World Heritage Site, sits on a hill above the Târnava Mare river. The Clock Tower, the coloured houses, the covered wooden staircase to the hilltop church, and the house where Vlad the Impaler was born are all within a few hundred metres of each other. Do not go on a weekend in summer without booking lunch in advance.",im:"Vlad the Impaler was born in the house on the main street. It is now a restaurant. The Clock Tower has been there since the 14th century. Both are open.",t:"One hour by train from Sibiu — trains run several times daily. The citadel is a short uphill walk from the station.",c:["history_big"],r:"g",nn:"Sighișoara",ns:"Cea mai bine conservată cetate medievală din Transilvania",nst:"Sighișoara, la o oră de Sibiu, este locul nașterii lui Vlad Țepeș. Cetatea sa medievală este sit UNESCO.",nt:"O oră cu trenul din Sibiu. Cetatea e la câteva minute de mers pe jos de la gară."},
  {id:20,n:"Sanctuarul Libearty — bear sanctuary",a:"Day Trips",v:["nature", "local", "hidden"],d:180,s:"The largest bear sanctuary in the world — former dancing bears living in a forested reserve",st:"The Libearty Bear Sanctuary near Zărnești, 90 km from Sibiu, shelters over 100 rescued brown bears — former dancing bears from the streets, bears from illegal zoos, bears saved from concrete cages. They live in a large forested enclosure and are observed on guided walks along raised platforms through the trees. The contrast between their past and present is striking and the experience unlike anything else in the region.",im:"A bear that spent 12 years performing in a street circus now sits in a forest and eats apples. That is all that needs to be said.",t:"Pre-booking is essential — guided visits are timed. Drive from Sibiu about 90 minutes via Fagaras. Day tours available from Sibiu and Brașov.",c:[],r:"g",nn:"Sanctuarul de Urși Libearty",ns:"Cel mai mare sanctuar de urși din lume",nst:"Lângă Zărnești, la 90 km de Sibiu, sanctuarul adăpostește peste 100 de urși bruni salvați. Vizite ghidate pe platforme suspendate prin pădure.",nt:"Rezervare obligatorie. Circa 90 minute cu mașina din Sibiu. Excursii de zi disponibile din Sibiu și Brașov."},
  {id:21,n:"Transfăgărășan — the mountain road",a:"Day Trips",v:["nature", "beautiful", "hidden"],d:240,s:"One of the world's great mountain roads, built by a dictator and inherited by everyone",st:"Nicolae Ceaușescu built the Transfăgărășan road in the 1970s for military reasons — it was dug through the Fagaras Mountains in just three years, at great cost to many lives. It now draws drivers and cyclists from across Europe for the switchbacks, tunnels, mountain lakes and summit views. It is open only July to October. The drive from Sibiu over the pass and back is one of the great half-days in Romania.",im:"This road was built by a dictator who wanted tanks to cross the mountains in 72 hours. It took the lives of many workers. Now you drive it for pleasure. Both things are true.",t:"Drive south on DN1 from Sibiu, then follow signs for the Transfăgărășan. Open July to October only — closed the rest of the year due to snow. Budget half a day.",c:[],r:"g",nn:"Transfăgărășan",ns:"Unul dintre cele mai spectaculoase drumuri de munte din lume",nst:"Construit de Ceaușescu în anii 1970 din motive militare, Transfăgărășanul atrage acum șoferi și cicliști din toată Europa.",nt:"Mergeți spre sud pe DN1 din Sibiu, apoi urmați indicatoarele. Deschis doar iulie-octombrie. Pregătiți jumătate de zi."},
  {id:22,n:"Turnul Dogarilor — Coopers Tower",a:"Old Town Lower",v:["history", "hidden", "local"],d:15,s:"One of the best-preserved guild towers from Sibiu's medieval fortification system",st:"In medieval Sibiu, craft guilds were assigned specific towers in the city walls to maintain and defend. The Coopers Tower — belonging to the barrel-makers guild — is one of the more intact survivors. Walking the lower town walls and finding these towers gives you a concrete sense of how the medieval city organised its own defence through collective civic responsibility.",im:"The barrel-makers guild was responsible for this tower. They had to defend it in case of siege. They drilled. They stored weapons. The tower still stands.",t:"Walk along Strada Cetății in the lower town. Viewable from outside; occasionally open for temporary exhibitions.",c:[],r:"g",nn:"Turnul Dogarilor",ns:"Unul dintre turnurile breslelor din sistemul de fortifiare medieval al Sibiului",nst:"Turnul Dogarilor, aparținând breslei butoiarilor, este unul dintre cele mai bine conservate turnuri medievale ale Sibiului.",nt:"Pe Strada Cetății în orașul de jos. Vizibil din exterior."},
  {id:23,n:"Piața Unirii — the everyday square",a:"Old Town Lower",v:["local", "hidden", "food"],d:20,s:"Sibiu's working-class square — fruit stalls, bus connections, and no tourists",st:"Piața Unirii is one of Sibiu's secondary squares, away from the upper town tourist circuit. It has a fruit market, small stalls and the everyday rhythm of a Romanian provincial city — people waiting for buses, buying plums, arguing about football. It is completely ignored by guidebooks, which makes it interesting.",im:"You are the only person in this square who has a map on their phone. Everyone else knows exactly where they are going. Watch them.",t:"Short walk from the train station. Bus connections to Dumbrava forest and other parts of the city depart from here.",c:[],r:"g",nn:"Piața Unirii",ns:"Piața de zi cu zi a Sibiului — fără turiști",nst:"Piața Unirii are o piață de fructe, tarabe mici și ritmul obișnuit al unui oraș de provincie românesc. Ignorată de ghiduri.",nt:"Scurt mers pe jos de la gară. Conexiuni de autobuz spre pădurea Dumbrava pleacă de aici."},
  {id:24,n:"Casa Artelor — the courtyard of arts",a:"Old Town Upper",v:["hidden", "beautiful", "art"],d:20,s:"A restored Saxon building whose courtyard is one of the most elegant secrets in the old town",st:"The House of Arts is a beautifully restored Saxon building near Piața Mare used for concerts, exhibitions and cultural events. Even when nothing is on, the courtyard is worth stepping into. It is arcaded, proportional and quiet in a way that feels designed for the particular pleasures of doing very little in a beautiful space.",im:"You walk through an unmarked door off a side street and find yourself in an arcaded courtyard. No crowd. No entrance fee. Just a very good building.",t:"Located near Piața Mare on Strada Tribunei. Courtyard is free to enter during the day. Check cultural programme for events.",c:[],r:"g",nn:"Casa Artelor",ns:"Curtea arcadată tăcută din inima orașului vechi",nst:"O clădire sașă frumos restaurată cu o curte arcadată elegantă lângă Piața Mare. Intrarea la curte este gratuită.",nt:"Pe Strada Tribunei, lângă Piața Mare. Curtea este gratuită în timpul zilei."},
  {id:25,n:"Râul Cibin — the city river",a:"Old Town Lower",v:["local", "nature", "hidden"],d:20,s:"The small river that gave Sibiu its name, running through the lower town past old mill houses",st:"The Cibin river is modest — not the Danube or even the Olt — but it runs through the lower town and past the backs of old houses in a way that rewards a slow walk along its banks. Sibiu takes its name from this river. In spring it runs high and clear. The mill houses and old bridges along its course have been here for centuries.",im:"The city is named for this river. You walk along the bank. The houses back onto the water. It has always been this way.",t:"Walk from the Cibin market along the riverbank. Connect onward to the lower town walls and back up to the old town via Strada Ocnei.",c:[],r:"g",nn:"Râul Cibin",ns:"Râul care a dat numele orașului, curgând prin orașul de jos",nst:"Râul Cibin trece prin orașul de jos. Sibiu își ia numele de la acest râu. Malurile sale răsplătesc o plimbare lentă.",nt:"Mergeți de la piața Cibin de-a lungul malului râului. Continuați spre zidurile orașului de jos și înapoi sus pe Strada Ocnei."},
  {id:26,n:"Piața Gării — the station square",a:"New Town",v:["local", "history", "hidden"],d:15,s:"The handsome Austro-Hungarian station that reminds you Sibiu was once part of a larger empire",st:"Sibiu's train station was built in 1872 during the Austro-Hungarian period and its facade still speaks of imperial confidence. The station square and the broad avenue leading from it toward the old town give a sense of the civic investment of the period. Today it is a transit space, but an elegant one — and a good starting point for understanding the city's layered identities.",im:"In 1872 this station connected a Saxon city in the Carpathians to Vienna, Budapest, and the rest of the empire. The trains now go to Bucharest.",t:"Walk from the station to the old town takes about 20 minutes on foot. Taxi stand outside the main entrance. Bus connections from Piața Unirii.",c:[],r:"g",nn:"Piața Gării",ns:"Gara austro-ungară din 1872",nst:"Gara din Sibiu a fost construită în 1872. Fațada sa vorbește încă de încrederea imperială. Astăzi leagă Sibiu de București și Cluj.",nt:"Mersul pe jos până în orașul vechi durează circa 20 de minute. Taxi la ieșirea principală."},
  {id:27,n:"Turnul Archebuzierilor — Arquebusiers Tower",a:"Old Town Lower",v:["history", "hidden", "local"],d:15,s:"The musketeers guild tower, part of Sibiu's extraordinary chain of defended bastion walls",st:"The Arquebusiers Tower belonged to the guild of musketeers — early firearms specialists — and is one of the more intact guild towers in the lower town wall circuit. Finding each of the named towers (coopers, potters, carpenters, arquebusiers) while walking the lower town walls is a satisfying way to understand how medieval civic defence actually worked in practice.",im:"The musketeers guild trained here. They stored their weapons in this tower. In case of siege, they reported here. That was the deal.",t:"Walk along Strada Cetății in the lower town. Find it between the Coopers and Potters towers. Viewable from outside.",c:[],r:"g",nn:"Turnul Archebuzierilor",ns:"Turnul breslei muschetarilor din sistemul de fortifiare",nst:"Turnul Archebuzierilor aparținea breslei muschetarilor. Parte din circuitul de turnuri ale breslelor din zidul orașului de jos.",nt:"Pe Strada Cetății în orașul de jos, între Turnul Dogarilor și Turnul Olarilor."},
  {id:28,n:"Muzeul de Istorie — History Museum",a:"Old Town Upper",v:["history", "local", "art"],d:45,s:"Sibiu's history from Roman Dacia through Saxon colonisation to the present day",st:"The History Museum occupies the old city hall on Piața Mare and traces the story of the city and region from prehistoric times through Roman Dacia, the Saxon colonisation of the 12th century, the guild system, the Ottoman sieges, the Habsburg administration and into the 20th century. The medieval artefacts and guild records are particularly strong.",im:"In the basement there is a Roman altar stone found in the valley. Above it, a Saxon guild contract from 1420. Above that, a Habsburg administrative decree. Three empires in one room.",t:"On Piața Mare. Check current opening hours as they vary by season. Combined Brukenthal ticket may cover entry.",c:["history_big"],r:"g",nn:"Muzeul de Istorie",ns:"Istoria Sibiului de la Dacia Romană până în prezent",nst:"Muzeul de Istorie din fosta primărie de pe Piața Mare prezintă istoria orașului din timpuri preistorice până în secolul XX.",nt:"Pe Piața Mare. Verificați orele de deschidere. Biletul combinat Brukenthal poate include intrarea."},
  {id:29,n:"Hermannstadt — the ghost of the Saxon city",a:"Old Town Upper",v:["history", "hidden", "local"],d:20,s:"The German name for Sibiu still echoes in street signs, names and the city's remarkable political history",st:"Sibiu's German name is Hermannstadt and the city's Saxon identity — though the community has shrunk from 30,000 to a few thousand since 1989 — still shapes the place profoundly. Bilingual Romanian-German street signs appear throughout the old town. The city elected Klaus Johannis, an ethnic Saxon, as its mayor for 14 years before he became President of Romania. The Saxon legacy is not a museum exhibit — it is still running the place.",im:"The city elected an ethnic Saxon German as mayor for 14 years. Then he became President of Romania. The Saxons built this city. Their descendants still govern it.",t:"Not a single location but a lens for the whole city. Look for bilingual Romanian-German street signs throughout the old town.",c:["history_big"],r:"g",nn:"Hermannstadt",ns:"Moștenirea saxonă care încă modelează Sibiul",nst:"Numele german al Sibiului este Hermannstadt. Comunitatea saxonă a scăzut dramatic după 1989, dar moștenirea ei modelează profund orașul.",nt:"Nu un singur loc, ci o perspectivă pentru tot orașul. Căutați indicatoarele stradale bilingve română-germană."},
  {id:30,n:"Piața Mare by night — the square after dark",a:"Old Town Upper",v:["local", "beautiful", "food"],d:60,s:"Return to the great square at 10pm, order wine, and watch the city stop performing",st:"Piața Mare in daylight belongs to tourists and day-trippers. After 9pm something shifts. The tour groups are gone. The terraces are occupied by locals and a smaller, quieter visitor who has stayed on. The square empties slowly. The baroque facades glow in warm light. Order a glass of local red and stay until midnight. This is when Sibiu shows you what it actually is.",im:"It is 11pm. The square is half-empty. The lights are warm. A couple at the next table are arguing quietly in Romanian. The wine is good. You have nowhere to be.",t:"Return to any terrace on Piața Mare after 9pm. Order local wine — Transylvanian red or white. Stay as long as you can.",c:[],r:"g",nn:"Piața Mare noaptea",ns:"Piața cea mare după ora 22, când orașul nu mai performează",nst:"După ora 21, Piața Mare aparține localnicilor. Terasele se liniștesc, grupurile de turiști dispar, vinul e bun.",nt:"Reveniți la orice terasă de pe Piața Mare după ora 21. Comandați vin local transilvănean."}
,
  {id:31,n:"Ocna Sibiului — salt lakes and float therapy",a:"Outside city, 20km south",v:["swimming","weird","beautiful"],d:30,s:"Float motionless in water five times saltier than the sea, where collapsed salt mines became heliothermal lakes.",st:"Ocna Sibiului sits where 19th-century salt mines collapsed and water filled them over decades. The lakes are so concentrated with salt that you cannot sink—your body floats naturally, suspended in water as warm and supportive as a bed. Lake Brâncoveanu is the saltiest. Mud on the lake floor has therapeutic properties locals have known about for a century. The experience is deeply quiet, almost meditative.",im:"You lie on your back in impossibly warm, clear water. Your body rises high on the surface. The sky is enormous above you. You are held.",t:"Train from Sibiu (20 min, cheap) or bus (30 min). The lakes are free; spa facilities cost extra. Best May–September. Bring a towel and water shoes—salt stings if you have cuts.",c:["swimming","day_trips","weird"],r:"g",nn:"Ocna Sibiului — lacurile sărate",ns:"Plutești în apă de cinci ori mai sărată decât marea",nst:"Ocna Sibiului se află unde minele de sare din secolul XIX s-au surpat treptat. Lacurile sunt atât de concentrate în sare încât nu poți să te scufunzi. Apa este caldă și susținătoare ca un pat. Ladul Brâncoveanu este cel mai sărat. Noroiul de pe fundul lacului are proprietăți terapeutice cunoscute de oamenii locali de o sută de ani.",nt:"Tren din Sibiu (20 min) sau autobuz (30 min). Lacurile sunt gratuite; facilitățile spa costă extra. Cel mai bine mai-septembrie. Aduce prosop și încălțări de apă."},
  {id:32,n:"Evangelical Cathedral Tower — the 73-metre climb",a:"Old Town Upper",v:["greatest_hits","history","high_spots"],d:10,s:"192 steps to the top of Romania's second-tallest church tower for a view that stops you cold—red roofscape in every direction, Carpathians on the horizon.",st:"The tower of the Evangelical Cathedral dominates Piața Mare, a 73-metre spike of Gothic ambition built in the 15th century. Climb through four levels of interior chambers—you'll see the brass bells, the wooden mechanisms still moving, the city shrinking below through narrow windows. At the summit, four corner turrets let you walk 360 degrees around the spire, watching the city rotate beneath you.\n\nThis tower once served as a fire watchtower. For centuries, firefighters kept vigil from up here. You understand why when you reach the top—you see everything.",im:"At the top, the wind pushes at your shoulders. All the rooftops are terracotta red. The Carpathians are a blue line on the horizon. You can see the exact curve of the Cibin river.",t:"Small entry fee. Open most days 10am–6pm. The climb is steep, narrow stairs—not for those with vertigo or mobility issues. Windows can be opened for clear photos.",c:["greatest_hits","high_spots","history"],r:"g",nn:"Turnul Catedralei Evanghelice — urcarea de 73 de metri",ns:"192 de trepte la vârf pentru o priveliște care te oprește",nst:"Turnul Catedralei Evanghelice dominează Piața Mare, o țintă gotică de 73 de metri construită în secolul al XV-lea. Urcă prin patru niveluri de camere interioare. La vârf, patru turnuri de colț te lasă să mergi 360 de grade în jurul turlei.",nt:"Taxa mică de intrare. Deschis în majoritatea zilelor 10:00–18:00. Scările sunt abrupte și înguste. Ferestrele pot fi deschise pentru fotografii clare."},
  {id:33,n:"Rasnari — shepherd village market on Saturday mornings",a:"Mărginimea Sibiului region, 20km southwest",v:["day_trips","local","food"],d:40,s:"The World Tourism Organisation's 2022 Best Tourism Village, where shepherds sell cheese from their own sheep every Saturday morning.",st:"Rasnari is the closest village in the Mărginimea Sibiului region and the most developed for visitors, but it hasn't lost its genuine character. On Saturday mornings, the main square fills with locals selling telemea cheese (a squeaky white cheese made that morning), sour milk in bottles, kneaded cheese balls, and urda—a sweet whey product that tastes like ricotta meets caramel. These are shepherds who migrated their flocks to summer pastures two months ago. They return to sell in this square every weekend. Sit, eat warm bread and cheese, and watch the actual rhythms of a working village.",im:"Women in cardigans tend small folding tables covered with white cheeses in plastic containers. The smell of fresh dairy and woodsmoke. The sound of Romanian spoken in a dialect you don't quite catch.",t:"Bus from Sibiu to Rasnari (45 min). Car is easier if renting. Markets run Saturday morning 7am–1pm. Come early for the best selection. Total trip: 3–4 hours including travel.",c:["day_trips","food","local"],r:"g",nn:"Rasnari — piața din sâmbătă a sătenilor ciobani",ns:"Cel mai bun sat turistic conform UNESCO 2022, unde ciobanii vând brânză făcută în acea dimineață",nst:"Rasnari este cel mai apropiat sat din regiunea Mărginimea Sibiului și cel mai dezvoltat pentru vizitatori, dar nu și-a pierdut caracterul autentic. Sâmbătă dimineață, piața principală se umple cu oameni locali care vând brânză de vaci (brânză albă făcută chiar dimineața), lapte acru în sticle, bile de brânză nodată, și urdă.",nt:"Autobuz din Sibiu la Rasnari (45 min). Piețele funcționează sâmbătă dimineață 7:00–13:00. Vino devreme pentru cea mai bună selecție."},
  {id:34,n:"Pharmacy Museum — the 18th-century Vienna apothecary",a:"Old Town Upper",v:["nerd","history","weird"],d:15,s:"An 18th-century Viennese pharmacy transplanted into a Gothic townhouse, with 6,000 pieces: ceramic jars, antique scales, glass retorts, iron presses from five centuries.",st:"The Sibiu Pharmacy Museum lives in a 1569 Gothic townhouse where the pharmacy La Ursul Negru (The Black Bear) operated for over a century. But the real treasure is the 18th-century Viennese apothecary—complete wooden counters, labeled drawers for hundreds of herbs, brass scales, retorts, and implements of chemical magic. The back room honors Samuel Hahnemann, father of homeopathy, with original instruments on display. You are standing in what an Eastern European pharmacy looked like when most people thought diseases came from bad air.",im:"Rows of ceramic jars with handwritten labels. Brass scales balanced on marble. Glass retorts catching afternoon light. The smell of old herbs and wood polish.",t:"Small entry fee. Old Town Upper, easy walk from Piața Mare. Open Tue–Sun, usually 10am–5pm (check hours). The space is small and crowded—go early or on a weekday. Guides are knowledgeable if you ask.",c:["nerd","history","weird"],r:"g",nn:"Muzeul de Istoria Farmaciei — apotecaria din Viena a secolului XVIII",ns:"O farmacie vieneză din secolul XVIII translantată în casă gotică, cu 6000 de piese",nst:"Mureul Farmaciei din Sibiu trăiește într-o casă gotică din 1569 unde farmacia La Ursul Negru a funcționat timp de o sută de ani. Dar adevărata comoară este apotecarul vienez din secolul XVIII.",nt:"Taxă mică de intrare. Oraș vechi, plimbare ușoară de la Piața Mare. Deschis mar–dum 10:00–17:00. Spațiul este mic și aglomerat—du-te devreme."},
  {id:35,n:"Orasul de Jos — the craftsmen's quarter and steep cobblestone lanes",a:"Lower Town",v:["hidden","history","beautiful"],d:15,s:"Medieval lower town where goldsmiths, tanners, and carpenters lived, now narrow cobblestone streets that drop sharply from the upper town, lined with modest but perfectly proportioned houses.",st:"Orasul de Jos—the lower town—is where Sibiu's working classes lived for 600 years while nobles occupied the upper town. The streets are narrower and steeper than above, cobblestoned and worn by centuries of foot traffic. Houses are simpler in decoration but architecturally precise, with tall roofs and gates opening onto hidden courtyards. Today it is quieter, less visited, and more genuinely lived-in than the tourist-heavy upper squares. The eye-windows appear here too, watching from rooftops. Get lost deliberately in these lanes—the reward is stumbling on a corner café, a craft workshop, or a courtyard with laundry and children's toys.",im:"Steep cobblestones dropping under your feet. Narrow house fronts of pale yellow and grey. Laundry on a line between buildings. The sound of a football bouncing somewhere you cannot see.",t:"Start from the south end of Piața Mare or Piața Mică and descend any narrow street that goes downhill. There is no set route—this is the point. Allow 1–2 hours to wander. Several small cafés and restaurants are tucked in corners.",c:["neighbourhoods","history","hidden"],r:"g",nn:"Orașul de Jos — cartierul meșteșugarilor și aleile cu pavaj",ns:"Orașului medieval inferior unde locuiau meștesugari craftspeople, acum cu străzi de piatră care coboară abrupt",nst:"Orașului de Jos este locul unde clasele muncitoare ale Sibiului au trăit timp de 600 de ani. Străzile sunt mai înguste și mai abrupte decât mai sus, pavate cu piatră și uzate de secole. Casele sunt mai simple în decor dar arhitectural precise.",nt:"Pornește de la capătul sudic al Pieței Mari sau Pieței Mici și coboară orice stradă îngustă care merge în jos. Nu există rută stabilită. Permite 1–2 ore pentru a te plimba."}
,
  {id:36,n:"Dumbrava Sibiului — the forest overlook at sunset",a:"3km south of old town, near ASTRA Museum",v:["beautiful","quiet","free entry"],d:20,s:"The forest edge where you can watch the sun sink behind the Carpathians from a hillside overlook—no crowds, just trees, light, and mountain silhouettes.",st:"The Dumbrava forest begins where the city ends, a protected woodland that runs south toward the ASTRA Museum and beyond. Walk to the forest edge along the paths, and find the overlooks where the trees break and the valley opens toward the mountains. The sun sets behind the Fagaras range directly south—the peaks turn purple, then indigo, then black. The light lasts long here, longer than in the city. Very few tourists know this spot. Local families do.",im:"Golden light through tall pines. The valley below is already in shadow. The Carpathian ridge glows orange against a purple sky.",t:"Walk south from Piața Mare toward Dumbrava Sibiului (15 min) or take a short bus ride. Free access. Best in May–September; in winter the sun sets earlier and the forest is dark. Bring a light jacket and comfortable shoes. You can easily walk back into town afterward.",c:["beautiful","high_spots","quiet"],r:"g",nn:"Dumbrava Sibiului — privighetoare la apus",ns:"Marginea păderii unde poti vedea soarele scufundandu-se în Carpații de la o colină",nst:"Pădurea Dumbrava începe acolo unde orașul se termină, o pădure protejată care se extinde spre sud. Apusul soarelui din spatele lanțului Fagaraș—vârfurile se transformă din portocaliu în purpuriu.",nt:"Plimbare vers sud de la Piața Mare (15 min) sau autobuz scurt. Acces gratuit. Cel mai bine mai–septembrie. Aduce o jachetă și pantofi comod."}
,
  {id:37,n:"Brukenthal National Museum — free first Wednesday",a:"Old Town Upper",v:["free entry","history","beautiful"],d:15,s:"Romania's oldest museum (1817) with Old Masters, Renaissance paintings, and furniture from when Sibiu was one of Transylvania's richest cities — free entry every first Wednesday.",st:"The Brukenthal Museum occupies a baroque palace and holds over 2,000 artworks: Flemish paintings, Italian Renaissance, European furniture, rare books. The collection reflects the wealth and taste of the Saxon merchant class that once dominated Sibiu. The building itself is worth the visit—high ceilings, formal rooms, the sense of stepping into 18th-century refinement. First Wednesday of every month, entry is free for everyone.",im:"High baroque rooms with natural light from tall windows. Oil paintings in gilded frames. Polished wooden furniture from centuries past.",t:"First Wednesday of each month: free entry all day. Other days: small fee. Old Town Upper, south edge of Piața Mare. Usually open 10am–6pm (closed Mondays). Allow 2 hours for a proper visit.",c:["free_culture","history","beautiful"],r:"g",nn:"Consiliul Național Brukenthal — cele mai vechi tablouri ale României",ns:"Cel mai vechi muzeu din România (1817) cu maestri vechi și mobilă din epoca când Sibiu era cel mai bogat",nst:"Museul Brukenthal ocupă un palat baroc și conține peste 2000 de lucrări de artă. Prima miercuri a fiecărei luni, intrarea este gratuită pentru toți.",nt:"Prima miercuri a fiecărei luni: intrare gratuită toată ziua. Alte zile: taxă mică. Oraș vechi superior. Deschis 10:00–18:00 (închis luni)."},
{id:38,n:"Piața Cibin — Tuesday and Saturday markets, local vendors",a:"Lower Town Cibin",v:["local","markets","food"],d:20,s:"Where Sibiu's locals actually buy vegetables, bread, and cheese from farmers and bakers — not a tourist market.",st:"Piața Cibin is the working market where neighborhoods shop for produce. Tuesday and Saturday mornings fill with vendors from surrounding villages—farmers with crates of vegetables, bakers with bread fresh from the oven, dairy producers with cheese in small containers. The prices are real, not marked up for tourists. The language is Romanian and regional dialects. You see the actual rhythm of a Central European city actually feeding itself.",im:"Wooden crates of dark red tomatoes. Woven baskets of bread still warm. The smell of fresh herbs—dill, parsley—mixed with yeast.",t:"East side of the lower town, near the river. Tuesday and Saturday morning, 7am–12pm. Easily reached on foot from old town (10 min) or by local bus. Free to wander and look.",c:["markets","food","local"],r:"g",nn:"Piața Cibin — piața țăranilor și a brutarilor",ns:"Unde localnicii din Sibiu cumpără cu adevărat legume, pâine și brânză de la fermieri",nst:"Piața Cibin este piața de lucru unde cartierele cumpără produse alimentare. Marți și sâmbătă dimineața se umple cu vânzători din satele inconjuratoare.",nt:"Est de oraș inferior, lângă râu. Marți și sâmbătă dimineață, 7:00–12:00. Ușor ajungibil pe jos de la orașul vechi (10 min)."},
{id:39,n:"Passage of Stairs (Pasajul Scărilor) — secret tunnel under the bridge",a:"Old Town Upper, between squares",v:["weird","hidden","history"],d:10,s:"A covered passage with stairs that descends from Piața Mare through a wooden-roofed tunnel and emerges at ground level in another square — a medieval shortcut that still confuses visitors.",st:"This passage connects the upper and lower squares through a descending covered tunnel. It was built to allow quick movement between town levels during weather and sieges. The stairs are steep and wooden, the roof is supported by timber beams still visible after 500 years. The passage is narrow and low—tall people duck. You step from sunlit square into shadow, down stairs worn smooth by footsteps, and emerge into different light. It is genuinely disorienting—you have traveled vertically without realizing the distance.",im:"Wooden steps worn in the centre from centuries of feet. The smell of old wood and stone. Light streaming through gaps in the roof. A moment of complete separation from the city above.",t:"Entrance on south side of Piața Mare (opposite the Council Tower). Descends to Piața Mică and the Bridge of Lies area. Free, always accessible. Takes 2 minutes to walk through. The passage is slippery when wet—careful steps.",c:["weird","history","hidden"],r:"g",nn:"Pasajul Scărilor — tunelul secret sub pod",ns:"Un pasaj acoperit cu scări care coboară prin tunel și se deschide în alta piață",nst:"Acest pasaj conectează pătratele superioare și inferioare printr-un tunel acoperit care coboară. A fost construit pentru a permite mișcarea rapidă între nivelurile orașului. Scările sunt abrupte și din lemn. Pasajul este îngust și jos.",nt:"Intrare pe latura sudică a Pieței Mari. Coboară la Piața Mică și zona Podului Minciunilor. Gratuit, întotdeauna accesibil. Durează 2 minute pentru a merge prin. Pasajul este alunecos când e ud."},
{id:40,n:"Sibiel — Museum of Glass Icons in nearby village",a:"Mărginimea Sibiului, 30km southwest",v:["day_trips","history","nerd"],d:50,s:"One of Europe's largest collections of traditional Romanian glass-painted icons — a folk art form that almost died out, preserved here in a dedicated museum.",st:"Sibiel is a small village in the highlands region of Mărginimea Sibiului, famous for a unique Romanian folk tradition: painting religious icons on the back of glass panes so light shines through them. The technique is old and specific—the artist paints in reverse, building up layers from back to front, so the finished icon glows when lit from behind. The museum houses hundreds of these pieces, many dating back to the 18th century. The colors are vivid—reds, blues, golds—and the subjects are exclusively religious: the Madonna, Christ, the saints. This is not tourist art. It is devotional art that kept working rural people spiritually grounded for centuries. The tradition almost died out; this museum saved it.",im:"Light coming through painted glass. A Mary painted in reverse on the back of glass pane, glowing in blues and reds. The colors more vivid than any oil painting.",t:"Car from Sibiu (45 min–1 hour) or bus connections available but limited. Museum usually open daily, check hours in advance. Small entry fee. Allow 1–2 hours in the museum, plus travel. Often combines well with Rasnari market trip if you have a full day.",c:["day_trips","history","nerd"],r:"g",nn:"Sibiel — Museul de Icoane pe Sticlă",ns:"Una dintre cele mai mari colecții europene de icoane tradiționale românești pictate pe sticlă",nst:"Sibiel este un sat mic în regiunea muntoasă a Mărginimea Sibiului, faimos pentru o tradiție unică de folk românesc. Pictorii pictează icoane religioase pe reversul panourilor de sticlă. Tehnica este veche și specifică.",nt:"Mașină din Sibiu (45 min–1 oră). Muzeu deschis în general zilnic. Taxă mică de intrare. Permite 1–2 ore în muzeu."},
{id:41,n:"Strada Ocnei — the eye-window street where locals walk",a:"Old Town Upper",v:["beautiful","local","hidden"],d:10,s:"One street in Sibiu where the eye-windows are densest and most perfect — walk it early morning or late afternoon when golden light hits the facades.",st:"Strada Ocnei runs through the heart of the old town, and virtually every building on this street has the iconic dormer windows shaped like half-closed eyes. Walk this street at dawn or sunset, when the light is low and orange, and the windows seem to really be watching you. The effect is not spooky but meditative—a reminder that you are being observed gently by history. Locals walk this street every day. Tourists stop and photograph. But very few tourists walk it in the right light.",im:"Golden light hitting a row of pale yellow facades. The eye-windows dark and attentive in their frames. Shadows cast by the window hoods.",t:"In the heart of Old Town Upper, connecting Piața Mare to the south. Walk it 6am–8am or 5pm–7pm for the best light. It is busy with both locals and tourists, so you are never alone, but the effect is still moving.",c:["beautiful","local","neighbourhoods"],r:"g",nn:"Strada Ocnei — strada cu ochii",ns:"O stradă unde ochii-ferestre sunt cei mai densi și mai perfecti",nst:"Strada Ocnei merge prin inima orașului vechi și practic fiecare clădire de pe această stradă are ochii-ferestre caracteristici. Mergi pe această stradă la zori sau apus, când lumina este joasă și portocalie.",nt:"În inima orașului vechi superior. Mergi 6:00–8:00 sau 17:00–19:00 pentru cea mai bună lumină."},
{id:42,n:"ASTRA Museum — 96 hectares of traditional Romanian village recreated",a:"Dumbrava forest, 3km south",v:["day_trips","history","weird"],d:25,s:"The largest open-air museum in Romania: over 300 authentic wooden buildings from different regions transplanted into forest, with farming techniques, churches, and craftspeople's workshops unchanged for centuries.",st:"The ASTRA Museum recreates how rural Romania actually worked before industrialization. Over 300 buildings—farmsteads, churches (including one wooden church from 1754), workshops, mills—are arranged across 96 hectares of managed forest. You walk through Transylvanian wooden houses with high straw roofs, then Maramureș wooden homes with different proportions and construction, then houses from the Dobrogea region by the Black Sea. Each region had distinct architecture, and ASTRA shows why: climate, materials available, economic conditions. The buildings are not reconstructions—they are the real thing, moved here brick by brick or beam by beam. Inside are furnishings, tools, and the layout that people actually lived with. There are no theme park shortcuts. You walk for hours between buildings, through forest, and never feel like you are at a museum.",im:"A wooden farmhouse deep in forest, sunlight through the boards. Inside: a straw mattress, iron pots, tools for work that is not done anymore. The silence of old buildings.",t:"Bus or taxi from Sibiu (10 min). Open daily April–October, weekends only November–March. Moderate entry fee. Allow 3–4 hours minimum to do it justice. Wear comfortable shoes—a lot of walking on uneven ground. No restaurants inside, so bring water and snacks.",c:["day_trips","history","nature"],r:"g",nn:"ASTRA — Complexul Muzeal Civilizația Tradițională Românească",ns:"Cel mai mare muzeu în aer liber din România: 300 clădiri autentice ale unor sate tradiționale",nst:"ASTRA recreează cum funcționa rural România înainte de industrializare. Peste 300 de clădiri—ferme, biserici, ateliere, mori—sunt aranjate peste 96 de hectare de pădure. Mergi prin case din lemn transilvane cu acoperișuri înalte de paie.",nt:"Autobuz sau taxi din Sibiu (10 min). Deschis zilnic aprilie–octombrie, doar weekend noiembrie–martie. Taxă moderată. Permite 3–4 ore minimum. Îmbracă pantofi comod."},
{id:43,n:"Piața Mare at dawn — bread vans and early setup",a:"Old Town Upper",v:["local","quiet","beautiful"],d:10,s:"Before tourists arrive, before the square is alive, watch deliveries: bread vans pulling up, café workers setting tables, the square remembering it is a neighborhood square first.",st:"Walk Piața Mare between 6am and 7am before the tour groups arrive. The vans delivering fresh bread from surrounding bakeries are parked at the edges. Café workers are setting out chairs and tables. The light is low and rich gold. The square is genuinely quiet, with only the ambient sound of a city waking up. You see locals actually using the square for what it is—a place to sit and begin the day. No photos being taken. No guidebooks. This is what squares are for.",im:"A bread van reversing into position. Early light on the red roofline. An older man in a cardigan already sitting at a café table, coffee arriving.",t:"Start early from your accommodation. Any café on the square will be opening its doors at 6:30am or 7am. Order coffee and a pastry and sit for 30 minutes. The square transforms rapidly after 8am.",c:["local","quiet","beautiful"],r:"g",nn:"Piața Mare la zori — căruciorele cu pâine și pregătiri de dimineață",ns:"Înainte ca turiștii să vino, privește livrări: căruciorele cu pâine și lucrătorii de cafenea pregătind mese",nst:"Mergi pe Piața Mare între 6:00 și 7:00 dimineață înainte ca grupurile de tur să sosească. Căruciorele de livrare cu pâine proaspătă sunt parcate la margini. Lucrătorii de cafenea pregătesc scaune și mese.",nt:"Pornește devreme din cazare. Orice cafenea pe piață va deschide ușile la 6:30 sau 7:00. Comandă cafea și o prăjitură și stai 30 de minute."},
{id:44,n:"August von Spiess Hunting Museum — rifles and trophies of Austro-Hungarian kings",a:"Old Town Upper",v:["nerd","history","weird"],d:15,s:"Preserved hunting lodge of Colonel August von Spiess, royal keeper of hunts under King Ferdinand I, with Austro-Hungarian rifles, boar tusks, and the memorabilia of 19th-century aristocratic sport.",st:"August von Spiess was the official keeper of royal hunts for King Ferdinand I of Romania in the Austro-Hungarian era. His lodge in Sibiu holds photographs, hunting rifles, preserved animal trophies, and the detailed records of organized hunts in the Carpathian forests. The collection captures a specific moment: when European nobility still understood hunting as both practical and ceremonial, when rifles were crafted individually, when a successful hunt meant something in a small aristocratic society. The museum is small, quirky, and completely specific to a world that no longer exists.",im:"Antique rifles in glass cases. Boar tusks mounted on wood. Sepia photographs of men in hunting costumes posing with their kills.",t:"Small entry fee. Exact location and hours variable—check with the Sibiu tourism center or ask at your accommodation. Usually open afternoons. The museum is intimate and rarely crowded.",c:["nerd","history","weird"],r:"g",nn:"Museul August von Spiess — vânătoare și trofee",ns:"Pavilion de vânătoare cu puști austro-ungare și trofee din timpurile regelui Ferdinand",nst:"August von Spiess a fost păzitorul oficial al vânătorilor regali pentru Regele Ferdinand I. Pavilionul său în Sibiu conține fotografii, puști de vânătoare, trofee de animale conservate.",nt:"Taxă mică de intrare. Locație și ore variabile—verifică cu centrul turistic Sibiu. De obicei deschis după-amiaza."},
{id:45,n:"Cibin River walk at evening — the small river where locals go",a:"Along river, accessible from multiple points",v:["romantic_water","quiet","local"],d:20,s:"Walk along the Cibin where it passes through the city—poplar trees reflected in still water, the city receding, the sound of flowing water replacing traffic.",st:"The Cibin river runs through Sibiu, and the embankment paths are popular with local joggers and evening walkers but almost invisible to tourists. The river is not dramatic—it is a medium-sized Central European river—but it is beautiful in a quiet way. Poplar trees line the banks. In summer, willows hang over the water. Early evening, the light is warm on the water's surface. You can walk for kilometers and never see another tourist. You will see couples, local families, people genuinely enjoying being outside in their own city.",im:"Poplar trees reflected in still, dark water. The river catching golden light. A bicycle leaning against a tree while someone sits and watches the current.",t:"Multiple access points from the lower town. An evening walk takes 45 minutes to an hour. The paths are uneven but walkable. Go in spring or summer for the best light and fewest insects.",c:["romantic_water","local","quiet"],r:"g",nn:"Plimbarea pe malul Cibinului — râul mic unde merg localnicii",ns:"Mergi pe malul Cibinului unde trece prin oraș—copaci de plop reflectați în apă",nst:"Malul râului Cibin este popular cu alergători locali și plimbători de seară dar aproape invizibil turiștilor. Popcii aliniază malurile. În vară, salciile atârnă deasupra apei.",nt:"Puncte de acces multiple de la orașul inferior. O plimbare de seară durează 45 de minute până la o oră. Mergi în primăvară sau vară pentru cea mai bună lumină."}
  ,
  {id:46,n:"Grand Square (Piata Mare) and Brukenthal Museum",a:"Old Town",v:["beautiful"],d:30,s:"Medieval square surrounded by colorful buildings — the Brukenthal Palace houses an excellent art collection",st:"The square is one of the most beautiful in Romania. Colorful facades surround it. The Brukenthal Palace overlooks the square. Inside, a world-class art collection including European old masters and local artists. The square is perfect for sitting and people-watching.",im:"Colorful medieval buildings surrounding the square. The Brukenthal Palace imposing. Outdoor café tables. The architectural harmony. The sense of medieval town planning preserved. The art inside the palace.",t:"25 RON entry to Brukenthal (~$5). Old Town location. 1.5-2 hours for museum. The square is free to walk. Best 10am-2pm. Photography allowed. Sit at a café and spend time. The square is the heart of Sibiu. The palace is worth time.",c:["greatest_hits"],r:"g",nn:"Piata Mare",ns:"Grand Square — Piata Mare și Brukenthal Museum",nst:"Piața Mică (Piata Mare) este uma das piază mai frumoase din România.",nt:"25 RON (~$5). Centrul vechi. 1.5-2 ore."},
  {id:47,n:"Bridge of Lies (Podul Minciunilor) — Gothic Iron Bridge",a:"Old Town",v:["beautiful"],d:30,s:"Ornate iron bridge from 1859 — legend says if you cross holding someone\'s hand and lie, the bridge collapses",st:"Walk across this charming bridge. The legend makes it fun. The ironwork is beautiful. It connects the main plaza to the shopping district. It\'s short, but crossing it is part of the Sibiu experience. The views from the bridge of the old town are lovely.",im:"Ornate iron railings and structure. The views of the old town from the bridge. Couples crossing hand-in-hand. The gothic architecture. The playful legend. The Danube Valley views in the distance.",t:"Free. Old Town location. Best anytime (it\'s always beautiful). Lighting is nice at sunset. Photography is excellent. This is a quick must-do (5 minutes) on the way through town. The legend makes it memorable.",c:["greatest_hits"],r:"g",nn:"Podul Minciunilor",ns:"Bridge of Lies — Podul Minciunilor Punte de Fier Gotica",nst:"Caminhe por esta ponte encantadora. A lenda a torna divertida.",nt:"Grátis. Melhor ao pôr do sol."},
  {id:48,n:"ASTRA Museum (Open-Air Museum) — Traditional Romanian Architecture",a:"Dumbrava (Outside City)",v:["beautiful"],d:30,s:"Large open-air museum with reconstructed traditional houses from different regions of Romania — living history",st:"Take a short trip outside the city. See traditional wooden houses, churches, and mills from different regions of Romania. Craftspeople demonstrate traditional skills. It\'s a working museum; people are making and doing, not just displaying. The setting is peaceful.",im:"Traditional wooden houses with detailed carvings. Water mills and windmills. Craftspeople at work. Regional variations in architecture. The green parkland. The sense of rural Romania preserved.",t:"25 RON entry (~$5). Outside city (short bus ride). 2-3 hours. Open Tue-Sun 9am-5pm. Guides available. Photography allowed. This is an excellent museum of traditional life. Combine with the town museums for a full Sibiu day.",c:["greatest_hits"],r:"g",nn:"ASTRA Muzeum",ns:"Muzeum ASTRA — Deschis în Aer Liber Arhitectură Tradițională Română",nst:"Veja casas de madeira tradicionais de diferentes regiões da Romênia.",nt:"25 RON (~$5). Fora da cidade. 2-3 horas."},
  {id:49,n:"Council Tower (Turnul Sfatului) — Medieval Lookout",a:"Old Town",v:["beautiful"],d:30,s:"Medieval tower from the 15th century — climb the stairs for 360-degree views of Sibiu and the Carpathians",st:"Climb the spiral staircase to the top of the tower. The views are extraordinary. You see the entire old town below, the surrounding countryside, and the Carpathian Mountains in the distance. It\'s a short but rewarding climb.",im:"The spiral staircase climbing upward. The views expanding with each level. The old town spread below. The Carpathian Mountains in the distance. The light changing throughout the day. The sense of medieval watchtower history.",t:"15 RON entry (~$3). Old Town location. 30-45 minutes. Open Tue-Sun 10am-6pm. Narrow staircase; not for those with height phobia. Photography is excellent. The views are the best in Sibiu. Go on a clear day.",c:["greatest_hits"],r:"g",nn:"Turnul Sfatului",ns:"Council Tower — Turnul Sfatului Turnul Medieval",nst:"Suba pelas escadas em espiral até o topo da torre.",nt:"15 RON (~$3). Melhor em dia claro."},
  {id:50,n:"Orthodox Cathedral — Byzantine Splendor",a:"Outside Old Town",v:["beautiful"],d:30,s:"Large Orthodox cathedral with blue and gold exterior — stunning Byzantine architecture and interior murals",st:"This massive cathedral dominates the skyline. The exterior is blue and gold and gleaming. The interior is covered in intricate murals and has soaring spaces. It\'s an active place of worship. The scale and beauty are overwhelming.",im:"The blue and gold exterior gleaming against sky. The soaring interior space. Intricate frescoes and murals. The smell of incense. Candlelight illuminating the details. The quiet reverence. The Byzantine grandeur.",t:"Free entry (donations appreciated). Outside old town area. 30-45 minutes. Open daily (check service times). Photography allowed (be respectful). Modest dress required. This is an active church; respectful visiting expected. The interior is one of Sibiu\'s most beautiful spaces.",c:["greatest_hits"],r:"g",nn:"Catedrala Mitropolitană",ns:"Orthodox Cathedral — Catedrala Mitropolitană Splendoare Bizantină",nst:"Esta catedral maciça domina o horizonte. O exterior é azul e ouro.",nt:"Grátis. 30-45 minutos. Fora da cidade antiga."}];

  {id:1,title:"The Eye-Counter Walk",desc:"Walk from Pia\u021ba Mare through Pia\u021ba Mic\u0103 and down Strada Ocnei. Count every dormer window shaped like a lidded eye that you can spot on the rooftops. Do not look at your phone.",places:[1, 2, 5, 11],time:"1.5 hours"},
  {id:2,title:"Tower Day",desc:"Climb both the Council Tower and the Evangelical Cathedral tower in the same morning. Compare the views from the top of each. Decide which rooftop panorama is better.",places:[4, 6],time:"2 hours"},
  {id:3,title:"The Market Meal",desc:"Buy your entire lunch from the Cibin market \u2014 bread, cheese, tomatoes, maybe a smoked sausage. Carry it to Sub Arini park and eat it on a bench under the trees.",places:[12, 14],time:"2 hours"},
  {id:4,title:"Wall Walk",desc:"Walk the full surviving circuit of the medieval lower town walls from the Bridge of Lies to the end of Strada Cet\u0103\u021bii. Find and photograph all four named guild towers.",places:[3, 9, 22, 27],time:"1.5 hours"},
  {id:5,title:"Saxon Village Day",desc:"Drive to Biertan and Viscri in the same day. Enter both fortified churches. Eat lunch in Biertan. Return to Sibiu for dinner. Do not rush either village.",places:[17, 18],time:"Full day"},
  {id:6,title:"The Museum Morning",desc:"Spend a morning between the Brukenthal Palace on Pia\u021ba Mare and the History Museum. Buy the combined ticket. Find the oldest object in each collection.",places:[7, 28],time:"3 hours"},
  {id:7,title:"ASTRA Half-Day",desc:"Go to the ASTRA open-air museum in Dumbrava forest and spend at least three hours walking among the relocated houses, churches and mills. Find a working watermill and a painted beehive.",places:[15, 16],time:"4 hours"},
  {id:8,title:"Two Cathedrals",desc:"Visit both the Lutheran and the Orthodox cathedrals in the same morning. Two different communities, two different architectural traditions, three streets apart. Stand inside each and think about what you see.",places:[6, 13],time:"1.5 hours"},
  {id:9,title:"The Night Square",desc:"Return to Pia\u021ba Mare at 10pm. Order a glass of local Transylvanian red wine at a terrace. Stay until the square is nearly empty. Do not leave before midnight.",places:[1, 30],time:"2 hours"},

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);

if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};

return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}

</div></div>}

return <div style={{minHeight:"100vh",background:"url('https://mariavheland.github.io/godostuff/textures/tex15.png') center/cover no-repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Sibiu Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">

<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}

{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>

</div>

:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
