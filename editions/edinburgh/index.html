<script>
const P = [
  {id:1,n:"Old Town Closes (Hidden Medieval Alleyways) — Old Town",a:"Old Town",v:["history", "hidden", "beautiful"],d:1,s:"Narrow passageways connecting main streets—entire neighborhoods exist in closes most tourists miss.",st:"Stone walls press close. Stairs climb steeply. Doorways open to hidden courtyards. Light angles oddly. You\'re walking history—medieval life, plague, rebellion, ordinary days compressed into human-scaled streets.",im:"It\'s 1650. A family enters their close for the night. The street outside is muddy and dangerous.",t:"Stone walls press close. Stairs climb steeply. Doorways open to hidden courtyards. Light angles oddly. You\'re walking history—medieval life, plague, rebellion, ordinary days compressed into human-scaled streets.\",im:\"It\'s 1650. A family enters their close for the night. The street outside is muddy and dangerous.\",t:\"Start at Lawnmarket and explore at random. Free. Early morning before tour groups. Go slow. Get lost.",c:["history_big", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:2,n:"Arthur\'s Seat (Volcanic Hike) — Holyrood",a:"Holyrood",v:["nature", "high_spots", "beautiful"],d:2,s:"Ancient volcano right in the city—climb 251 meters and Edinburgh spreads below like a medieval map.",st:"Walk up is steep. Your legs burn. At the top, 360-degree view. The Firth of Forth stretches to the North Sea. You see exactly how Edinburgh grew. Wind is constant. You\'re standing on ancient violent moment.",im:"It\'s 320 million years ago. A volcano erupts. Nothing is permanent.",t:"Walk up is steep. Your legs burn. At the top, 360-degree view. The Firth of Forth stretches to the North Sea. You see exactly how Edinburgh grew. Wind is constant. You\'re standing on ancient violent moment.\",im:\"It\'s 320 million years ago. A volcano erupts. Nothing is permanent.\",t:\"Free. Multiple paths from Holyrood Park. 30-45 minutes depending on route. Go good weather. Bring water. Dress for wind.",c:["high_spots", "nature"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:3,n:"Calton Hill Free Viewpoint — Calton",a:"Calton",v:["beautiful", "high_spots", "history"],d:3,s:"Hill with monuments and 360-degree Edinburgh view—fewer crowds than Arthur\'s Seat, equally good, free monuments.",st:"Stone monuments dot hilltop. The National Monument (unfinished, looks like Greek temple ruins) dominates. From here you see all Edinburgh—castle silhouette, Pentland Hills, the Firth. Light changes constantly.",im:"It\'s 1822. Engineers build the National Monument planning Parthenon-sized. They run out of money. It becomes ruin of ambition.",t:"Stone monuments dot hilltop. The National Monument (unfinished, looks like Greek temple ruins) dominates. From here you see all Edinburgh—castle silhouette, Pentland Hills, the Firth. Light changes constantly.\",im:\"It\'s 1822. Engineers build the National Monument planning Parthenon-sized. They run out of money. It becomes ruin of ambition.\",t:\"Free. Easy walk from city center. Great late afternoon light. Go for sunset. Views unobstructed and vast.",c:["high_spots", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:4,n:"Greyfriars Kirkyard (Ghostly, Literary) — Grassmarket",a:"Grassmarket",v:["history", "scary", "beautiful"],d:4,s:"Cemetery that inspired Harry Potter\'s Dumbledore—haunted graveyard vibes, authentic Scottish history.",st:"Stone graves everywhere. Some readable, some worn smooth. The church looms. History visible—plague victims, children, soldiers. It\'s peaceful and mournful. Light falls differently here. The past isn\'t past.",im:"It\'s 1680. A covenanter is executed in Grassmarket below. He\'s buried here.",t:"Stone graves everywhere. Some readable, some worn smooth. The church looms. History visible—plague victims, children, soldiers. It\'s peaceful and mournful. Light falls differently here. The past isn\'t past.\",im:\"It\'s 1680. A covenanter is executed in Grassmarket below. He\'s buried here.\",t:\"Free entry. Go during daylight. Bring notebook—gravestone inscriptions tell stories. Stay respectful. Go morning.",c:["history_big", "famous_dead"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:5,n:"Edinburgh Vaults (Underground City) — South Bridge",a:"South Bridge",v:["scary", "history", "weird"],d:5,s:"Subterranean vaults built under bridges in the 1800s—originally storage, became homes for poorest, fell into darkness and legend.",st:"Vaults are dark stone. Moisture drips. Cold penetrates. Space is claustrophobic and vast. Markers show where people lived in incomprehensible conditions. The vaults feel heavy with suffering.",im:"It\'s 1890. A family of 6 lives in a 10-foot vault in darkness. Their entire world is stone and cold.",t:"Vaults are dark stone. Moisture drips. Cold penetrates. Space is claustrophobic and vast. Markers show where people lived in incomprehensible conditions. The vaults feel heavy with suffering.\",im:\"It\'s 1890. A family of 6 lives in a 10-foot vault in darkness. Their entire world is stone and cold.\",t:\"Guided tours only (€10-15). Book ahead. 1.5 hours. Not for claustrophobes. Guides excellent. Serious history.",c:["history_big", "scary"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:6,n:"Dean Village (Hidden Valley) — Stockbridge",a:"Stockbridge",v:["beautiful", "hidden", "quiet"],d:6,s:"Neighborhood in a valley where a river runs—feels like a different village, removed from the city above.",st:"You descend stairs and suddenly noise fades. Stone buildings line the river. It\'s quiet and green. Buildings beautiful. You\'ve dropped out of Edinburgh into something smaller and older.",im:"It\'s 1800. Millers operate on this river. The valley is productive and alive.",t:"You descend stairs and suddenly noise fades. Stone buildings line the river. It\'s quiet and green. Buildings beautiful. You\'ve dropped out of Edinburgh into something smaller and older.\",im:\"It\'s 1800. Millers operate on this river. The valley is productive and alive.\",t:\"Enter from Stockbridge or city center (through Waverley Station). Free walk. Spend 30 minutes. Sit by river.",c:["beautiful", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:7,n:"Water of Leith Walkway (Secret River Path) — Various",a:"Various",v:["nature", "quiet", "beautiful"],d:7,s:"Walkway following a river through the city—you walk along water in nature while city noise is background only.",st:"The Leith is small and clear. Banks are green. Sometimes city visible; sometimes completely surrounded by nature. Birds. Water sounds. The path feels remote. You could be 50km away.",im:"It\'s anytime. The river moves; the city endures; the walk connects both.",t:"The Leith is small and clear. Banks are green. Sometimes city visible; sometimes completely surrounded by nature. Birds. Water sounds. The path feels remote. You could be 50km away.\",im:\"It\'s anytime. The river moves; the city endures; the walk connects both.\",t:\"Multiple access points. Free. Walk a section or all (12km full). Best weekday mornings. Bring water. Meditative.",c:["nature", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:8,n:"Stockbridge Colony Houses (Quiet Residential Beauty) — Stockbridge",a:"Stockbridge",v:["beautiful", "quiet", "hidden"],d:8,s:"Neighborhood of small cottages planned in the 1800s to be artistic and bohemian—still quiet, still artsy, still local.",st:"Small stone houses line streets. Studios visible through windows. It\'s residential and creative. Quiet except for neighbors. Street names reflect artistic intention (Painters\' Lane, etc.). You feel like you\'re visiting someone\'s home.",im:"It\'s 1880. Artists move to these cheap houses and make Edinburgh their home.",t:"Small stone houses line streets. Studios visible through windows. It\'s residential and creative. Quiet except for neighbors. Street names reflect artistic intention (Painters\' Lane, etc.). You feel like you\'re visiting someone\'s home.\",im:\"It\'s 1880. Artists move to these cheap houses and make Edinburgh their home.\",t:\"Walk from Stockbridge. Free. Go slowly. Respect residents. The sense of place is fragile. Cafés and restaurants scattered throughout.",c:["beautiful", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:9,n:"Cramond Island Tidal Walk — Cramond",a:"Cramond",v:["nature", "beautiful", "wild"],d:9,s:"Island you can walk to at low tide—surrounded by water, feeling isolated, returning when tide comes in creates urgency and magic.",st:"Sand stretches between island and shore. You cross, island is yours temporarily. Beach, old fort ruins, feeling of being away. Tide moves in. People start retreating. The crossing becomes water. Magic ends. Cycle repeats.",im:"It\'s anytime in human history. Tides have always made islands temporary.",t:"Sand stretches between island and shore. You cross, island is yours temporarily. Beach, old fort ruins, feeling of being away. Tide moves in. People start retreating. The crossing becomes water. Magic ends. Cycle repeats.\",im:\"It\'s anytime in human history. Tides have always made islands temporary.\",t:\"Check tide times before going. Low tide + 2 hours ideal. Free. Get wet feet. Ferry to Cramond or walk (20 minutes). Island is small but genuine.",c:["nature", "wild"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:10,n:"Royal Botanic Garden (Free Entry) — Inverleith",a:"Inverleith",v:["beautiful", "free", "nature"],d:10,s:"One of the world\'s best botanical gardens, completely free—hundreds of plants, perfect walking paths, views down to city.",st:"Garden manicured and wild simultaneously. Plant sections organized logically. View from high point shows all Edinburgh. You could spend hours. The garden is quiet. Other people seem to belong here.",im:"It\'s spring. Plants wake up. Gardeners work knowing they\'re creating something permanent.",t:"Garden manicured and wild simultaneously. Plant sections organized logically. View from high point shows all Edinburgh. You could spend hours. The garden is quiet. Other people seem to belong here.\",im:\"It\'s spring. Plants wake up. Gardeners work knowing they\'re creating something permanent.\",t:\"Free entry. 70 acres to explore. Go spring for blooms or autumn for color. Early morning for quiet. Bring picnic. Café excellent.",c:["parks", "free"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:11,n:"Portobello Beach (Edinburgh\'s Seaside) — Portobello",a:"Portobello",v:["beautiful", "local_only"],d:11,s:"Real beach with real locals—not fancy, just families and teenagers and normal seaside life.",st:"Sand and pebbles. The Firth beyond. On warm days, people swim. On cold days, people walk anyway. Beach is utilitarian and beautiful. You see Edinburgh\'s residents being normal.",im:"It\'s summer 1950. A family has a day at the beach 20 minutes from the city.",t:"Sand and pebbles. The Firth beyond. On warm days, people swim. On cold days, people walk anyway. Beach is utilitarian and beautiful. You see Edinburgh\'s residents being normal.\",im:\"It\'s summer 1950. A family has a day at the beach 20 minutes from the city.\",t:\"Tram or bus to Portobello. Free. Go for normal seaside life. Bring jacket—wind is real. Cold water year-round. Chip shop excellent.",c:["beautiful", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:12,n:"Duddingston Village + Loch — South",a:"South",v:["beautiful", "quiet", "hidden"],d:12,s:"Village feeling separate from Edinburgh—quiet streets, church, loch—transported from time.",st:"Stone buildings. A small green. The loch reflects sky. Swans and ducks. Paths around water. It\'s pastoral and authentic. You could be in Highland village, not minutes from city.",im:"It\'s 1700. This village is self-contained. The city might be another country.",t:"Stone buildings. A small green. The loch reflects sky. Swans and ducks. Paths around water. It\'s pastoral and authentic. You could be in Highland village, not minutes from city.\",im:\"It\'s 1700. This village is self-contained. The city might be another country.\",t:\"Walk from city center (45 minutes) or bus. Free. Go for half-day walk. The Sheep Head Pub excellent. Walk around loch (4km, 1 hour).",c:["beautiful", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:13,n:"Holyrood Park Free Grounds — Holyrood",a:"Holyrood",v:["nature", "free", "beautiful"],d:13,s:"Park where Arthur\'s Seat is located—you can walk for hours in hills and nature without paying.",st:"Green hills roll. Multiple walking paths. Arthur\'s Seat dominates but isn\'t mandatory. Other peaks offer views. It\'s wilder than it looks from below. You feel genuinely in nature despite being in the city.",im:"It\'s 1500. This land has always been here. Humans are temporary.",t:"Green hills roll. Multiple walking paths. Arthur\'s Seat dominates but isn\'t mandatory. Other peaks offer views. It\'s wilder than it looks from below. You feel genuinely in nature despite being in the city.\",im:\"It\'s 1500. This land has always been here. Humans are temporary.\",t:\"Free. Dozens of paths. Get a map or just explore. 2-3 hours for full park walk. Bring water. Good shoes.",c:["parks", "nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:14,n:"Scottish National Gallery (Free Entry) — The Mound",a:"The Mound",v:["free", "art", "beautiful"],d:14,s:"World-class art museum, completely free—Rembrandts, Scottish artists, European masters, all without paying.",st:"High ceilings. Natural light. Quality paintings hung carefully. You feel intelligent just being here. The collection is diverse and excellent. The space is calm. Art costing millions elsewhere is freely available.",im:"It\'s anytime. Great art should be free.",t:"High ceilings. Natural light. Quality paintings hung carefully. You feel intelligent just being here. The collection is diverse and excellent. The space is calm. Art costing millions elsewhere is freely available.\",im:\"It\'s anytime. Great art should be free.\",t:\"Free entry (donation appreciated). Go midweek afternoon for quiet. Spend 1-2 hours. Upper floors less crowded. Café excellent and cheap.",c:["free_museum", "art"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:15,n:"Grassmarket (Once Execution Site, Now Market) — Old Town",a:"Old Town",v:["history", "beautiful"],d:15,s:"Large square where 100+ people were executed, now a market—history heavy but life continuing.",st:"Open space surrounded by buildings. During festivals, it fills. Normally, it\'s a passing-through place. But knowing history, every stone is weighted. People laugh and eat where people screamed.",im:"It\'s 1680. A woman is hanged here. Her crime: religious faith that didn\'t match the kingdom\'s preference.",t:"Open space surrounded by buildings. During festivals, it fills. Normally, it\'s a passing-through place. But knowing history, every stone is weighted. People laugh and eat where people screamed.\",im:\"It\'s 1680. A woman is hanged here. Her crime: religious faith that didn\'t match the kingdom\'s preference.\",t:\"Free to walk. Go during market or festivals for energy. Go quiet afternoons for contemplation. Memorial plaques explain history.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:16,n:"Surgeons\' Hall Museum Area — Hill",a:"Hill",v:["history", "weird", "beautiful"],d:16,s:"Historic medical building and museum—Burke and Hare murders happened here, dark medical history made visible.",st:"Building elegant Georgian. Inside, medical instruments through history. The dark history presented matter-of-factly. You learn medical progress built on grave robbery and murder. Beautiful architecture and horrifying history.",im:"It\'s 1828. A body arrives. The surgeon doesn\'t ask where it came from.",t:"Building elegant Georgian. Inside, medical instruments through history. The dark history presented matter-of-factly. You learn medical progress built on grave robbery and murder. Beautiful architecture and horrifying history.\",im:\"It\'s 1828. A body arrives. The surgeon doesn\'t ask where it came from.\",t:\"Museum €5-7. Go with interest in medical history. Building exterior worth seeing regardless. Late afternoon light good. Area is beautiful Georgian squares.",c:["history_big", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:17,n:"Leith Waterfront (Gentrified But Real) — Leith",a:"Leith",v:["beautiful", "local_only"],d:17,s:"Working port being transformed—ships still dock, restaurants opened, the meeting of old and new.",st:"Historic dock buildings. New apartments. Ships in harbor. Restaurants overlook water. Locals walk dogs. It\'s changing but hasn\'t erased industrial past. Architecture tells both stories.",im:"It\'s 1950. This port was the life of Edinburgh. Ships from everywhere arrived here.",t:"Historic dock buildings. New apartments. Ships in harbor. Restaurants overlook water. Locals walk dogs. It\'s changing but hasn\'t erased industrial past. Architecture tells both stories.\",im:\"It\'s 1950. This port was the life of Edinburgh. Ships from everywhere arrived here.\",t:\"Walk from Waverley Station (20 minutes) or bus. Free exploration. Restaurants €12-25. Go afternoon for light. Bring camera.",c:["beautiful", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:18,n:"Princes Street Gardens (Between Castle & City) — City Center",a:"City Center",v:["beautiful", "parks", "free"],d:18,s:"Massive green space in city center with castle views—free, beautiful, where locals actually rest.",st:"Castle looms above. Green space stretches. Trees provide shade. People picnic. It\'s designed as public space and used that way. The duality of beauty (castle) and access (public garden) is perfect.",im:"It\'s Victorian times. The garden is built as a democratic space.",t:"Castle looms above. Green space stretches. Trees provide shade. People picnic. It\'s designed as public space and used that way. The duality of beauty (castle) and access (public garden) is perfect.\",im:\"It\'s Victorian times. The garden is built as a democratic space.\",t:\"Free entry. Go afternoon. Bring picnic. Find a bench. Sit for hours. Castle views photogenic. Garden is restorative.",c:["parks", "free"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:19,n:"George Heriot\'s School (Fortress School) — Grassmarket",a:"Grassmarket",v:["history", "beautiful", "architecture"],d:19,s:"Castle-like school built in the 1600s—looks impregnable, beautiful courtyards inside, architecture as metaphor.",st:"Exterior is fortress-like. Inside, courtyards and arches. The scale is grandiose. It\'s a building that says \'education is important.\' The architecture makes you stand straighter. You feel history in the stone.",im:"It\'s 1628. The school opens. Education is treated like a fortress—defended and valuable.",t:"Exterior is fortress-like. Inside, courtyards and arches. The scale is grandiose. It\'s a building that says \'education is important.\' The architecture makes you stand straighter. You feel history in the stone.\",im:\"It\'s 1628. The school opens. Education is treated like a fortress—defended and valuable.\",t:\"Sometimes open for tours (check ahead). Free to view exterior. Courtyard visible from angles. Go for architecture. Respect it\'s functioning school.",c:["architecture", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:20,n:"Blackford Hill (Lesser-Known High Point) — Blackford",a:"Blackford",v:["beautiful", "high_spots", "quiet"],d:20,s:"Viewpoint with fewer crowds than Arthur\'s Seat—similar views, same effort, actual quiet possible.",st:"The climb is steady. At the top, panoramic view. Edinburgh spreads. The Pentlands stretch. On clear days you see 20+ kilometers. Few people come here. The view is yours to contemplate.",im:"It\'s anytime. The hills have always watched the city.",t:"The climb is steady. At the top, panoramic view. Edinburgh spreads. The Pentlands stretch. On clear days you see 20+ kilometers. Few people come here. The view is yours to contemplate.\",im:\"It\'s anytime. The hills have always watched the city.\",t:\"Walk from city center (30 minutes) or bus. Free. Go early morning for quiet. Bring water. Less crowded but equally beautiful.",c:["high_spots", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:21,n:"Cowgate Night Streets — Old Town",a:"Old Town",v:["night", "history"],d:21,s:"Medieval street hidden below grade level—pubs, history, the old city beneath modern streets.",st:"The street is narrow and slightly seedy. History is visible in stone. Bars spill light. It\'s atmospheric.",im:"It\'s 1600. This street is at ground level. The city builds up. Now it\'s buried.",t:"The street is narrow and slightly seedy. History is visible in stone. Bars spill light. It\'s atmospheric.\",im:\"It\'s 1600. This street is at ground level. The city builds up. Now it\'s buried.\",t:\"Walk evening or night. Go with locals. Pubs and bars active after 9pm. Free walk.",c:["night", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:22,n:"George Street Clubs & Bars — New Town",a:"New Town",v:["night", "local_only"],d:22,s:"Elegant Georgian street at night—upscale bars, young professionals, Saturday nights are controlled chaos.",st:"The street is beautiful. Bars are busy. It\'s Edinburgh\'s night center. Energy is high.",im:"It\'s 1770. The street is brand new, elegant.",t:"The street is beautiful. Bars are busy. It\'s Edinburgh\'s night center. Energy is high.\",im:\"It\'s 1770. The street is brand new, elegant.\",t:\"Go weekend evenings after 9pm. Walk or enter bars. Drinks €8-12. Feel the pulse.",c:["night", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:23,n:"Real Mary King\'s Close Underground Streets — Old Town",a:"Old Town",v:["history", "scary"],d:23,s:"Actual medieval street sealed beneath modern city—preserved apartments, history frozen, air still cold.",st:"The close is narrow. Old apartments visible. Plaques tell stories of residents. The history is immediate.",im:"It\'s 1645. A street is sealed. It stays frozen for centuries.",t:"The close is narrow. Old apartments visible. Plaques tell stories of residents. The history is immediate.\",im:\"It\'s 1645. A street is sealed. It stays frozen for centuries.\",t:\"Tours only (€12-15). Book ahead. 1 hour tour. Go prepared for history, not haunting.",c:["history_big", "scary"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:24,n:"Leith Shore Bar Scene — Leith",a:"Leith",v:["night", "local_only"],d:24,s:"Waterfront bars where locals gather—evening energy, overlooking harbor, industrial-turned-social.",st:"Bars are busy. Views are over water. It\'s social and atmospheric. The past is visible.",im:"It\'s 1950. Ships dock. Workers gather after shifts.",t:"Bars are busy. Views are over water. It\'s social and atmospheric. The past is visible.\",im:\"It\'s 1950. Ships dock. Workers gather after shifts.\",t:\"Go evening after 6pm. Bars open until late. Drinks €8-10. Walk waterfront.",c:["night", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:25,n:"Arthur\'s Seat Alternative Path — Holyrood",a:"Holyrood",v:["nature", "quiet"],d:25,s:"Different route up the volcano—less crowded than main path, equally stunning views, more solitary.",st:"The path winds differently. Fewer people means quieter. The view is the same. The peace is deeper.",im:"It\'s anytime. The volcano is patient.",t:"The path winds differently. Fewer people means quieter. The view is the same. The peace is deeper.\",im:\"It\'s anytime. The volcano is patient.\",t:\"Multiple paths exist. Explore them. Go weekday morning. Bring water. Get off the main trail.",c:["nature", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:26,n:"Greyfriars Bobby Statue Quietness — Grassmarket",a:"Grassmarket",v:["history", "quiet"],d:26,s:"Small dog statue—famous but find the quiet moment when tourists aren\'t hovering, sit with the story.",st:"The dog is small. The story is larger. In quiet moments, you feel the faithfulness.",im:"It\'s 1860s. A dog waits by a grave for 14 years.",t:"The dog is small. The story is larger. In quiet moments, you feel the faithfulness.\",im:\"It\'s 1860s. A dog waits by a grave for 14 years.\",t:\"Free to view. Go early morning (7-8am) before crowds. Sit on bench. Reflect.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},

{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:`url(\'${TBGS[tab]||TBGS.default}\') center/cover no-repeat`}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Edinburgh Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Edinburgh Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
