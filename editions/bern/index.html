  {id:106,n:"Federal Parliament Building Free Tours",a:"Centrum",v:["history","free","architecture"],d:8,s:"Swiss government\'s stunning palazzo — free guided tours through the chambers",st:"The Bundeshaus (Federal Parliament) offers free tours showing the National Council and Council of States. The building is monumentally Swiss; the interior is all wood, tradition, and order. Tours usually only 45 min but thorough.",im:"Time-travel: Built 1857-1902, it\'s the heart of Swiss democracy.",t:"Free tours. Check schedule ahead (booking may be required). Security screening.",c:["architecture","history_big"],r:"g",nn:"Bundeshaus Führungen",ns:"Visitas guiadas gratuitas a la casa del gobierno suizo",nst:"Recorre los salones donde se toman decisiones suizas.",nt:"Tours gratuitas. Reservar con anticipación."},
  {id:107,n:"Aare River Swimming (Aarebad)",a:"Marzili",v:["nature","free","sport"],d:15,s:"Open-air lido and cold-water swimming in the city — locals\' summer tradition",st:"Marzili is a public swimming area on the Aare where Bern goes to cool off. The water is ice-cold year-round (3-10°C depending on season), but locals leap in like it\'s normal. It\'s a rite of passage and costs almost nothing (€5-10).",im:"Time-travel: Aare swimming culture has existed since the 1800s.",t:"Cost: €5-10. Summer season (June-September mainly). Towel rental available.",c:["parks","sport"],r:"g",nn:"Aarenbad Marzili",ns:"Natación en agua fría en la ciudad — tradición local",nst:"Nada en el Aare glacial como hacen los locales.",nt:"Costo: €5-10. Temporada de verano."}

,{id:106,n:"Kunstmuseum Bern (Museum of Fine Arts)",a:"Downtown",v:["art", "museum"],d:0,s:"800 years of Swiss and European art in Switzerland's oldest art museum",st:"Walk through eight centuries of masterpieces—from medieval works to contemporary installations. The Kunstmuseum Bern holds over 50,000 pieces including works by Picasso, Hodler, and Meret Oppenheim. Free entry on first Sunday of each month; otherwise modest admission.",im:"Standing before a Picasso or Hodler painting, surrounded by Swiss art history spanning from the Middle Ages to today.",t:"Location: Hodlerstrasse 8–12. Open Wed–Sun. Check website for current exhibitions (Franz Gertsch exhibition runs through Jan 2027). First Sunday free entry. Budget 2–3 hours. Nearest tram: Kunstmuseum stop.",c:["art", "museum", "culture"],r:"g",nn:"Kunstmuseum Bern",ns:"800 Jahre Schweizer und europäische Kunst im ältesten Kunstmuseum der Schweiz",nst:"Wandeln Sie durch acht Jahrhunderte von Meisterwerken – von mittelalterlichen Werken bis zu zeitgenössischen Installationen. Das Kunstmuseum Bern beherbergt über 50.000 Werke, darunter Arbeiten von Picasso, Hodler und Meret Oppenheim. Kostenlos am ersten Sonntag des Monats; sonst moderate Eintrittsgebühr.",nt:"Standort: Hodlerstrasse 8–12. Mittwoch–Sonntag geöffnet. Website für aktuelle Ausstellungen prüfen (Franz-Gertsch-Ausstellung bis Januar 2027). Erster Sonntag kostenlos. Planen Sie 2–3 Stunden ein. Nächste Tramhaltestelle: Kunstmuseum."},
{id:107,n:"Zentrum Paul Klee",a:"East (Fruchtland)",v:["art", "museum", "hidden"],d:15,s:"Nearly half of Paul Klee's entire life work in one striking modern building",st:"This museum houses almost 50% of Paul Klee's paintings and works—the world's largest collection. The building itself is an architectural marvel designed by Renzo Piano, set in a peaceful park setting away from the city center. A pilgrimage for art lovers seeking intimate encounters with one of the 20th century's greatest artists.",im:"Wandering through rooms of Klee's whimsical, geometric abstractions—each piece a window into his creative mind—in a light-filled, undulating modern building.",t:"Location: Monument im Fruchtland 3. Tram 9 from city center (15 min). Open Tue–Sun 10am–5pm. Admission ~18CHF (check for discounts). Allow 2–3 hours. Café on-site (pricey; bring snacks). Peaceful grounds for picnicking.",c:["art", "museum", "culture"],r:"g",nn:"Zentrum Paul Klee",ns:"Fast die Hälfte von Paul Klees gesamtem Lebenswerk in einem beeindruckenden modernen Gebäude",nst:"Dieses Museum beherbergt fast 50% von Paul Klees Gemälden und Werken – die weltweit größte Sammlung. Das Gebäude selbst ist ein architektonisches Meisterwerk von Renzo Piano, gelegen in einer ruhigen Parkanlage außerhalb des Stadtzentrums. Eine Pilgerfahrt für Kunstliebhaber, die intime Begegnungen mit einem der größten Künstler des 20. Jahrhunderts suchen.",nt:"Standort: Monument im Fruchtland 3. Tram 9 vom Stadtzentrum (15 Min.). Dienstag–Sonntag 10–17 Uhr geöffnet. Eintritt ca. 18 CHF (Rabatte prüfen). Planen Sie 2–3 Stunden ein. Café vor Ort (teuer; Snacks mitbringen). Ruhige Grünanlagen zum Picknicken."},
{id:108,n:"Kunsthalle Bern (Art Gallery Bern)",a:"Downtown (Helvetiaplatz)",v:["art", "contemporary", "hidden"],d:0,s:"Cutting-edge contemporary art exhibitions in a historic gallery space",st:"The Kunsthalle Bern showcases rotating exhibitions of contemporary art—from emerging Swiss artists to international names. Located on Helvetiaplatz, it's a smaller, more intimate alternative to the main Kunstmuseum, often featuring experimental and provocative work. Perfect for those seeking the pulse of Bern's living art scene.",im:"Stepping into a stark white gallery space where a bold contemporary installation challenges your perspective on art itself.",t:"Location: Helvetiaplatz 1. Open Tue–Sun 10am–5pm (Wed until 9pm). Admission ~15CHF. Check website for current exhibitions. 30–60 min visit. Near Bärenplatz tram stop.",c:["art", "contemporary", "culture"],r:"g",nn:"Kunsthalle Bern",ns:"Avantgardistische zeitgenössische Kunstausstellungen in einem historischen Galerieraum",nst:"Die Kunsthalle Bern zeigt wechselnde Ausstellungen zeitgenössischer Kunst – von aufstrebenden Schweizer Künstlern bis zu internationalen Namen. Gelegen auf dem Helvetiaplatz, ist sie eine kleinere, intimere Alternative zum Hauptkunstmuseum und zeigt oft experimentelle und provokative Werke. Perfekt für diejenigen, die den Puls der lebendigen Kunstszene Berns suchen.",nt:"Standort: Helvetiaplatz 1. Dienstag–Sonntag 10–17 Uhr (Mittwoch bis 21 Uhr). Eintritt ca. 15 CHF. Website für aktuelle Ausstellungen prüfen. 30–60 Min. Besuch. Nähe Bärenplatz-Tramhaltestelle."},
{id:109,n:"Kornhausforum",a:"Downtown (Kornhausplatz)",v:["art", "contemporary", "hidden"],d:0,s:"Free contemporary art space in a historic granary building with experimental edge",st:"Kornhausforum occupies a beautifully restored historic granary (Kornhaus) and hosts free contemporary art exhibitions, performances, and cultural events. It's a community-oriented space that often features local and experimental work. The building itself—with its grand architecture—is worth seeing even if no exhibition appeals.",im:"Climbing the grand staircase of a historic granary to discover an unexpected contemporary art installation in a soaring, light-filled space.",t:"Location: Kornhausplatz 18. Often free entry to exhibitions. Check website for current shows and events. Open hours vary by exhibition. 30–45 min. Café/restaurant on ground floor (moderate prices). Near Kornhausplatz tram stop.",c:["art", "contemporary", "culture", "free"],r:"g",nn:"Kornhausforum",ns:"Kostenloser zeitgenössischer Kunstraum in einem historischen Getreidespeichers mit experimentellem Charakter",nst:"Das Kornhausforum befindet sich in einem wunderschön restaurierten historischen Getreidespeicher (Kornhaus) und zeigt kostenlose zeitgenössische Kunstausstellungen, Performances und Kulturveranstaltungen. Es ist ein gemeinschaftsorientierter Raum, der oft lokale und experimentelle Werke zeigt. Das Gebäude selbst – mit seiner großartigen Architektur – ist auch ohne Ausstellung sehenswert.",nt:"Standort: Kornhausplatz 18. Oft kostenlos Eintritt zu Ausstellungen. Website für aktuelle Shows und Veranstaltungen prüfen. Öffnungszeiten variieren je nach Ausstellung. 30–45 Min. Café/Restaurant im Erdgeschoss (moderate Preise). Nähe Kornhausplatz-Tramhaltestelle."},
{id:110,n:"Museum Cerny (Contemporary Circumpolar Art)",a:"Downtown (Stadtbach)",v:["art", "museum", "hidden"],d:0,s:"Rare museum dedicated to contemporary art from Arctic and circumpolar regions",st:"Museum Cerny is a unique, specialized museum showcasing contemporary circumpolar art—work from Indigenous and Arctic artists across the North. It's one of few institutions globally dedicated to this perspective. The collection offers a window into cultures and artistic voices rarely seen in mainstream European museums.",im:"Discovering powerful contemporary works by Arctic artists—from Inuit sculptors to Sámi textile artists—in an intimate museum setting.",t:"Location: Stadtbachstrasse 8a. Admission modest (~12–15CHF). Open Tue–Sun. Check website for hours and current exhibitions. 45–60 min visit. Small but focused collection. Near Bärenplatz area.",c:["art", "museum", "culture", "indigenous"],r:"g",nn:"Museum Cerny",ns:"Seltenes Museum für zeitgenössische Kunst aus arktischen und zirkumpolaren Regionen",nst:"Das Museum Cerny ist ein einzigartiges, spezialisiertes Museum, das zeitgenössische zirkumpolare Kunst zeigt – Werke von indigenen und arktischen Künstlern aus dem Norden. Es ist eine der wenigen Institutionen weltweit, die sich dieser Perspektive widmet. Die Sammlung bietet einen Blick auf Kulturen und künstlerische Stimmen, die in europäischen Mainstream-Museen selten zu sehen sind.",nt:"Standort: Stadtbachstrasse 8a. Eintritt moderat (ca. 12–15 CHF). Dienstag–Sonntag geöffnet. Website für Öffnungszeiten und aktuelle Ausstellungen prüfen. 45–60 Min. Besuch. Kleine, aber fokussierte Sammlung. Nähe Bärenplatz-Gegend."},
{id:111,n:"Lichtspiel / Kinemathek Bern (Cinema & Film Archive)",a:"Downtown (Sandrain)",v:["cinema", "culture", "hidden"],d:0,s:"Arthouse cinema and film archive screening rare, historic, and experimental films",st:"Kinemathek Bern is a nonprofit cinema and archive dedicated to preserving and screening cinema history—from silent films to experimental work. It's a haven for cinephiles seeking alternatives to mainstream multiplexes. Screenings often include rare prints and restorations you won't find elsewhere.",im:"Sitting in a small, intimate cinema watching a beautifully restored 1920s silent film with live piano accompaniment.",t:"Location: Sandrainstrasse 3. Admission ~12–15CHF per screening. Check website for program (changes weekly). Open evenings and weekends. 90–120 min per film. Café/bar on-site. Near Bärenplatz.",c:["cinema", "culture", "film"],r:"g",nn:"Lichtspiel / Kinemathek Bern",ns:"Arthouse-Kino und Filmarchiv mit seltenen, historischen und experimentellen Filmen",nst:"Die Kinemathek Bern ist ein gemeinnütziges Kino und Archiv, das sich der Bewahrung und Vorführung von Filmgeschichte widmet – von Stummfilmen bis zu experimentellen Werken. Es ist ein Paradies für Cinephilen, die Alternativen zu Mainstream-Multiplexen suchen. Vorführungen beinhalten oft seltene Kopien und Restaurierungen, die Sie anderswo nicht finden.",nt:"Standort: Sandrainstrasse 3. Eintritt ca. 12–15 CHF pro Vorführung. Website für Programm prüfen (wechselt wöchentlich). Abends und am Wochenende geöffnet. 90–120 Min. pro Film. Café/Bar vor Ort. Nähe Bärenplatz."}];

<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TBGS={"places":"url('../../textures/tex13.webp') center/cover fixed no-repeat","collections":"url('../../textures/tex14.webp') center/cover fixed no-repeat","missions":"url('../../textures/tex15.webp') center/cover fixed no-repeat","plan":"url('../../textures/tex16.webp') center/cover fixed no-repeat","phrases":"url('../../textures/tex17.webp') center/cover fixed no-repeat","default":"url('../../textures/tex13.webp') center/cover fixed no-repeat"};function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
{/* dark scrim over photo */}
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Bern Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Bern Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
