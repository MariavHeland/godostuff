<script>
const P = [
  {id:1,n:"Schlosskirche Door — Schloss",a:"Schloss",v:["history","beautiful"],d:5,s:"The door where Luther nailed 95 theses in 1517 — the beginning of the Reformation",st:"The original wooden door was destroyed in the Seven Years War. The current bronze door (1858) carries all 95 theses in Latin. You can read them. This is where the modern world arguably began.",im:"Time-travel: October 31 1517 — Luther at this door, hammer in hand, 95 arguments against Rome",t:"Always free to stand at the door. Enter the church for free.",c:["history_big"],r:"g",nn:"Schlosskirche Tür — Schloss",ns:"Die Tür, an der Luther 1517 seine 95 Thesen nagelte — der Beginn der Reformation",nst:"Die originale Holztür wurde im Siebenjährigen Krieg zerstört. Die Bronzetür (1858) trägt alle 95 Thesen auf Latein.",nt:"Immer kostenlos an der Tür stehen. Kirche kostenlos eintreten."},
  {id:2,n:"Marktplatz — Altstadt",a:"Altstadt",v:["history","local","beautiful"],d:5,s:"The market square where Luther and Melanchthon stand bronze-faced — and where the Reformation was born into public life",st:"The twin statues of Luther and his colleague Melanchthon face each other across the market square. Between them: the Rathaus that witnessed all of it. This square was the arena of the Reformation.",im:"Time-travel: Luther and Melanchthon crossing this square together, arguing theology in public, 1520",t:"Free. The Rathaus interior is open. Walk the square slowly.",c:["history_big"],r:"g",nn:"Marktplatz — Altstadt",ns:"Der Marktplatz, wo Luther und Melanchthon aus Bronze blicken — und wo die Reformation ins öffentliche Leben trat",nst:"Die Doppelstatuen von Luther und Melanchthon stehen einander gegenüber. Dazwischen das Rathaus.",nt:"Kostenlos. Das Rathaus ist offen. Den Platz langsam durchqueren."},
  {id:3,n:"Stadtkirche St. Marien — Altstadt",a:"Altstadt",v:["history","beautiful","quiet"],d:5,s:"The church where Luther preached — original pulpit, original Luther-era altar triptych by Cranach",st:"Luther preached here regularly. The Reformation altarpiece by Lucas Cranach (1547) shows Luther preaching from the pulpit, with the congregation visible below. A painting of a preacher, in the church where he preached.",im:"Time-travel: Luther preaching in this church — voice filling the Gothic nave, congregation transfixed",t:"Free to enter. Stand where Luther stood.",c:["history_big"],r:"g",nn:"Stadtkirche St. Marien — Altstadt",ns:"Die Kirche, in der Luther predigte — originale Kanzel, originaler Cranach-Altar",nst:"Luther predigte hier regelmäßig. Das Reformationsaltarbild von Cranach (1547) zeigt Luther auf der Kanzel.",nt:"Kostenlos einzutreten. Dort stehen, wo Luther stand."},
  {id:4,n:"Luthereiche — Collegienstraße",a:"Collegienstraße",v:["history","hidden","weird"],d:10,s:"An oak tree marking where Luther publicly burned the Pope\'s decree in 1520 — an act of no return",st:"In December 1520, Luther carried the Pope\'s excommunication decree to this spot and burned it publicly in front of students. An oak tree now marks the site. After this there was no going back.",im:"Time-travel: December 1520 — Luther throws the papal decree into fire, students watching, laughing, horrified",t:"Free. The plaque explains everything. The tree is symbolic — not the original.",c:["history_big"],r:"g",nn:"Luthereiche — Collegienstraße",ns:"Eine Eiche, die die Stelle markiert, wo Luther 1520 öffentlich das päpstliche Dekret verbrannte — ein Akt ohne Rückkehr",nst:"Im Dezember 1520 verbrannte Luther das Exkommunikationsdekret an dieser Stelle öffentlich vor Studenten.",nt:"Kostenlos. Die Plakette erklärt alles. Der Baum ist symbolisch — nicht das Original."},
  {id:5,n:"Lutherhaus Courtyard — Lutherplatz",a:"Lutherplatz",v:["history","quiet","beautiful"],d:8,s:"The courtyard of Luther\'s house — an Augustinian monastery courtyard where he lived 35 years",st:"Luther moved into this Augustinian monastery cloister in 1508. He lived here until his death in 1546. He married Katharina von Bora here. The courtyard is as he would have known it.",im:"Time-travel: Luther and Katharina sitting in this courtyard on summer evenings, children running between them",t:"The courtyard is free. Museum inside has entry fee.",c:["courtyards"],r:"g",nn:"Lutherhaus Hof — Lutherplatz",ns:"Der Hof von Luthers Haus — ein Augustinerklosterhof, in dem er 35 Jahre lebte",nst:"Luther zog 1508 in diesen Augustinerklosterhof ein. Er lebte hier bis zu seinem Tod 1546.",nt:"Hof kostenlos. Museum innen mit Eintritt."},
  {id:6,n:"Melanchthon Monument — Altstadt",a:"Altstadt",v:["history","quiet"],d:5,s:"The modest statue of Luther\'s brilliant co-reformer — always overlooked beside his famous partner",st:"Philip Melanchthon was arguably more important intellectually than Luther, but history gave Luther the credit. His statue on the Marktplatz is visited by few. The man beside the statue shaped European education for 200 years.",im:"Time-travel: Melanchthon writing his systematic theology in a small Wittenberg room, 1521, aged 24",t:"Free. Look at his face. He was only 21 when the Reformation started.",c:["famous_dead"],r:"g",nn:"Melanchthon-Denkmal — Altstadt",ns:"Die bescheidene Statue von Luthers brillantem Mitreformator — neben seinem berühmten Partner immer übersehen",nst:"Philip Melanchthon war intellektuell wohl wichtiger als Luther, aber die Geschichte gab Luther den Ruhm.",nt:"Kostenlos. Sein Gesicht ansehen. Er war nur 21 als die Reformation begann."},
  {id:7,n:"Cranach Court — Altstadt",a:"Altstadt",v:["history","beautiful","hidden"],d:8,s:"The printing press courtyard of Lucas Cranach — where Reformation pamphlets were printed by the million",st:"Lucas Cranach the Elder lived in Wittenberg and printed Luther\'s texts. His courtyard is one of the most significant physical sites of the Reformation — from here, images of Luther spread across Europe.",im:"Time-travel: Cranach\'s printing press running day and night, pamphlets flowing out into Germany, 1520",t:"Free to enter the courtyard. Art gallery inside.",c:["history_big"],r:"g",nn:"Cranachhof — Altstadt",ns:"Der Druckereihof von Lucas Cranach — wo Reformationsflugschriften zu Millionen gedruckt wurden",nst:"Lucas Cranach der Ältere lebte in Wittenberg und druckte Luthers Texte. Bilder Luthers verbreiteten sich von hier über Europa.",nt:"Hof kostenlos zu betreten. Kunstgalerie innen."},
  {id:8,n:"Schlosspark — Schloss",a:"Schloss",v:["nature","quiet","beautiful"],d:10,s:"The park behind the castle church — willows, river, and the tower of the 95 Theses visible through trees",st:"The Schlosspark runs along the Elbe bank behind the castle complex. The tower of the Schlosskirche is visible across the park. Completely free, almost always quiet.",im:"Time-travel: Luther walking in this garden, composing sermons, 1530",t:"Free. Walk along the Elbe side.",c:["parks"],r:"g",nn:"Schlosspark — Schloss",ns:"Der Park hinter der Schlosskirche — Weiden, Fluss, Schlosskirchturm durch Bäume sichtbar",nst:"Der Schlosspark verläuft am Elbufer hinter dem Schlosskomplex.",nt:"Kostenlos. An der Elbseite entlanggehen."},
  {id:9,n:"Elbe Promenade — Elbe",a:"Elbe",v:["nature","beautiful","quiet"],d:10,s:"The Elbe at Wittenberg — wide, brown, slow, completely untouched for miles",st:"The Elbe here is a different river from the Dresden Elbe — broader, slower, less dramatic. Walking the bank north from the castle, the city disappears quickly and you are alone with the floodplain.",im:"Time-travel: Elbe floods of 2002 reaching Wittenberg, the promenade under water",t:"Free. Walk north from the Schloss. The meadows extend for miles.",c:["romantic_water"],r:"g",nn:"Elbe-Promenade — Elbe",ns:"Die Elbe bei Wittenberg — breit, braun, langsam, kilometerweit unberührt",nst:"Die Elbe ist hier breiter und langsamer. Nördlich vom Schloss gehend verschwindet die Stadt schnell.",nt:"Kostenlos. Vom Schloss nach Norden gehen. Die Wiesen erstrecken sich kilometerweit."},
  {id:10,n:"Luthergarten — Altstadt",a:"Altstadt",v:["nature","history","hidden"],d:8,s:"500 trees planted by 500 churches worldwide for Luther\'s 500th anniversary — a global forest",st:"In 2017, 500 faith communities from around the world each planted a tree in this garden to mark the 500th anniversary of the Reformation. The garden is labelled with the country of each tree\'s planting community.",im:"Time-travel: delegations from 500 countries planting their trees on Reformation Day 2017",t:"Free. Find the tree from your own country.",c:["parks"],r:"g",nn:"Luthergarten — Altstadt",ns:"500 Bäume von 500 Kirchen weltweit für Luthers 500. Jahrestag gepflanzt — ein globaler Wald",nst:"2017 pflanzte jede von 500 Glaubensgemeinschaften weltweit einen Baum zum 500. Reformationsjubiläum.",nt:"Kostenlos. Den Baum aus dem eigenen Land finden."},
  {id:11,n:"Collegienstraße Cobblestones — Collegienstraße",a:"Collegienstraße",v:["history","beautiful","local"],d:5,s:"The main street Luther walked every day — original cobblestones, unchanged proportions",st:"Collegienstraße connected Luther\'s house to the Stadtkirche, the Marktplatz, and the Schlosskirche. He walked it every day for 35 years. The width and scale of the street is exactly as it was.",im:"Time-travel: Luther walking this cobblestone street to give his morning lectures, 1525",t:"Free. Walk slowly. The buildings on each side date mostly from 16th-18th centuries.",c:["history_big"],r:"g",nn:"Collegienstraße Kopfsteinpflaster — Collegienstraße",ns:"Die Hauptstraße, die Luther täglich entlangging — originales Kopfsteinpflaster, unveränderte Proportionen",nst:"Collegienstraße verband Luthers Haus mit der Stadtkirche, dem Marktplatz und der Schlosskirche.",nt:"Kostenlos. Langsam gehen. Die Gebäude zu beiden Seiten datieren meist vom 16.-18. Jh."},
  {id:12,n:"Elbe Floodplain Meadows — Elbe",a:"Elbe",v:["nature","free","quiet"],d:15,s:"The Elbe floodplain outside Wittenberg — an ancient river ecosystem unchanged for centuries",st:"The Elbe floodplain is one of Europe\'s last intact river ecosystems. Seasonal floods, willows, and rare birds. The meadows are free and extend for kilometres north and south.",im:"Time-travel: these meadows flooding in 1550, Luther watching from the city walls",t:"Walk north along the river from the castle. The meadows start after 10 minutes.",c:["parks"],r:"g",nn:"Elbe-Überflutungswiesen — Elbe",ns:"Die Elbaue außerhalb von Wittenberg — ein uraltes Flussökosystem, jahrhundertelang unverändert",nst:"Die Elbaue ist eines der letzten intakten Flussökosysteme Europas.",nt:"Nördlich entlang des Flusses vom Schloss gehen. Die Wiesen beginnen nach 10 Minuten."},
  {id:13,n:"Melanchthonhaus Courtyard — Lutherplatz",a:"Lutherplatz",v:["history","quiet","hidden"],d:8,s:"Melanchthon\'s house — the best preserved Renaissance domestic building in Wittenberg",st:"Melanchthon\'s house is smaller than Luther\'s, reflecting their personalities. The courtyard garden is free to visit. The building is one of the best examples of a 16th century scholar\'s home in Europe.",im:"Time-travel: Melanchthon tutoring young students in this courtyard, 1540",t:"Courtyard free. Museum inside small entry fee.",c:["history_big"],r:"g",nn:"Melanchthonhaus Hof — Lutherplatz",ns:"Melanchthons Haus — das besterhaltene Renaissancewohngebäude in Wittenberg",nst:"Melanchthons Haus ist kleiner als Luthers und spiegelt ihre Persönlichkeiten wider.",nt:"Hof kostenlos. Museum innen kleiner Eintritt."},
  {id:14,n:"Historic Cemetery — Altstadt",a:"Altstadt",v:["history","quiet","famous_dead"],d:10,s:"The cemetery of Reformation Wittenberg — professors, printers, and reformers side by side",st:"Wittenberg\'s historic cemetery holds the graves of the scholars who built the Reformation alongside Luther and Melanchthon. Some graves date from the 16th century. Free to walk any time.",im:"Time-travel: Reformation scholars being buried here, their colleagues debating theology over the graves",t:"Free. The oldest section is at the back.",c:["famous_dead"],r:"g",nn:"Historischer Friedhof — Altstadt",ns:"Der Reformationsfriedhof Wittenbergs — Professoren, Drucker und Reformatoren Seite an Seite",nst:"Wittenbergs historischer Friedhof enthält die Gräber der Gelehrten, die die Reformation neben Luther aufbauten.",nt:"Kostenlos. Der älteste Abschnitt ist hinten."},
  {id:15,n:"Augusteum Courtyard — Schloss",a:"Schloss",v:["history","architecture","quiet"],d:8,s:"The Renaissance courtyard of the university building adjacent to the castle church",st:"The Augusteum was built as the university library in the 16th century. Luther\'s personal library was kept here. The Renaissance courtyard is free to enter and almost never visited by tourists.",im:"Time-travel: student disputations held in this courtyard, 1530 — Luther possibly watching from a window",t:"Free. Usually open during working hours.",c:["courtyards"],r:"g",nn:"Augusteum Hof — Schloss",ns:"Der Renaissancehof des Universitätsgebäudes neben der Schlosskirche",nst:"Das Augusteum wurde im 16. Jh. als Universitätsbibliothek gebaut. Luthers Privatbibliothek war hier.",nt:"Kostenlos. Normalerweise während der Geschäftszeiten geöffnet."},
  {id:16,n:"Piesteritz Chemical Park Ruin Walk — Elbe",a:"Elbe",v:["weird","abandoned","hidden"],d:15,s:"The GDR chemical industrial complex — half demolished, half preserved, utterly strange",st:"The Piesteritz chemical works were among the GDR\'s largest. After 1990, much was abandoned. The surviving sections are still operational but the abandoned parts are gradually being reclaimed by nature.",im:"Time-travel: GDR workers cycling to the massive chemical plant gates at 6am, 1975",t:"Walk the perimeter from the Elbe side. Exterior free.",c:["abandoned"],r:"g",nn:"Piesteritz Industrieruinen — Elbe",ns:"Der DDR-Chemiepark — halb abgerissen, halb erhalten, völlig seltsam",nst:"Die Piesteritzer Chemiewerke gehörten zu den größten der DDR.",nt:"Den Umfang von der Elbseite abgehen. Außenbereich kostenlos."},
  {id:17,n:"Lutherstadt Wall Fragment — Altstadt",a:"Altstadt",v:["history","hidden"],d:5,s:"A surviving section of the 16th century city wall — hidden in the back streets",st:"Wittenberg\'s medieval walls were mostly demolished in the 19th century. A fragment survives near the Schloss end of the Altstadt. It is unmarked and unlisted in most guides.",im:"Time-travel: the full city wall of Wittenberg in 1517 — Luther lived inside it, the wall defining his world",t:"Walk along the back of Collegienstraße near the Schloss.",c:["history_big"],r:"g",nn:"Stadtmauerfragment — Altstadt",ns:"Ein erhaltener Abschnitt der Stadtmauer aus dem 16. Jh. — versteckt in den Hinterstraßen",nst:"Wittenbergs mittelalterliche Mauern wurden größtenteils im 19. Jh. abgerissen. Ein Fragment überlebt nahe dem Schloss.",nt:"Hinter der Collegienstraße nahe dem Schloss entlanggehen."},
  {id:18,n:"Bunkerberg Viewpoint — Elbe",a:"Elbe",v:["hidden","beautiful","history"],d:15,s:"A grassed WWII bunker hill — the best free view of the Elbe and Wittenberg",st:"A Second World War antiaircraft bunker was covered in earth and grass after 1945. The resulting hill gives the best view of the Elbe floodplain from above. Unmarked on most maps.",im:"Time-travel: antiaircraft crews on this bunker, watching Allied bombers pass over the Elbe, 1944",t:"Walk to the eastern edge of town toward the Elbe. The hill is visible from the path.",c:["high_spots"],r:"g",nn:"Bunkerberg Aussichtspunkt — Elbe",ns:"Ein begraster WWII-Bunkerhügel — der beste kostenlose Blick über die Elbe und Wittenberg",nst:"Ein Zweiter Weltkrieg Flakbunker wurde nach 1945 mit Erde und Gras bedeckt. Gibt besten Blick.",nt:"Zum östlichen Stadtrand zur Elbe gehen. Der Hügel ist vom Weg aus sichtbar."},
  {id:19,n:"Wittenberg Hauptbahnhof — Altstadt",a:"Altstadt",v:["architecture","local"],d:5,s:"The Gründerzeit railway station from 1841 — still beautiful, still functioning, mostly forgotten",st:"Wittenberg\'s station opened in 1841, making it one of the earliest in Germany. The current building dates from the late 19th century and retains its original imperial-era character.",im:"Time-travel: first train arriving at Wittenberg station in 1841, townspeople running to see it",t:"Free to view. Take the train back to Berlin.",c:["architecture"],r:"g",nn:"Wittenberg Hauptbahnhof — Altstadt",ns:"Der Gründerzeit-Bahnhof von 1841 — noch schön, noch funktionierend, meistens vergessen",nst:"Wittenbergs Bahnhof öffnete 1841, als einer der frühesten in Deutschland.",nt:"Kostenlos zu besichtigen. Mit dem Zug zurück nach Berlin fahren."},
  {id:20,n:"Cranach Fountain — Altstadt",a:"Altstadt",v:["history","beautiful"],d:5,s:"The Renaissance fountain on the Marktplatz — original 16th century stonework, still running",st:"The Marktplatz fountain dates from the 16th century. It stood here when Luther was alive. The water still runs. A small constant proof that things can survive centuries of history.",im:"Time-travel: Wittenberg citizens drawing water from this fountain in 1525",t:"Free. Touch it.",c:["architecture"],r:"g",nn:"Cranachbrunnen — Altstadt",ns:"Der Renaissancebrunnen auf dem Marktplatz — originales Steinwerk aus dem 16. Jh., noch in Betrieb",nst:"Der Marktplatzbrunnen datiert aus dem 16. Jh. Er stand hier als Luther lebte.",nt:"Kostenlos. Anfassen."},
  {id:21,n:"Wittenberg Rathaus — Altstadt",a:"Altstadt",v:["history","architecture"],d:5,s:"The Renaissance town hall of 1523 — built in the year Luther was in hiding at the Wartburg",st:"The Rathaus was commissioned in 1523 when Luther was hiding in the Wartburg after the Diet of Worms. The building represents the secular confidence the Reformation gave to civic authorities.",im:"Time-travel: Luther returning to Wittenberg to find this town hall under construction, 1523",t:"Exterior free. Interior open weekdays.",c:["history_big"],r:"g",nn:"Wittenberg Rathaus — Altstadt",ns:"Das Rathaus der Renaissance von 1523 — im Jahr gebaut, als Luther sich auf der Wartburg versteckte",nst:"Das Rathaus wurde 1523 beauftragt, als Luther sich nach dem Wormser Reichstag auf der Wartburg versteckte.",nt:"Außenbereich kostenlos. Inneres werktags geöffnet."},
  {id:22,n:"Stadtkirche Bell Tower View — Altstadt",a:"Altstadt",v:["beautiful","high_spots"],d:5,s:"The twin towers of the Stadtkirche — climb for the oldest rooftop view in Wittenberg",st:"The Stadtkirche\'s towers offer the highest free viewpoint in Wittenberg. You see the castle church tower, the Elbe, and the flat Thuringian landscape extending to the horizon.",im:"Time-travel: Luther climbing these tower steps to look out at the world he was changing, 1520",t:"Small fee for the tower. The view is unique.",c:["high_spots"],r:"g",nn:"Stadtkirche Turmblick — Altstadt",ns:"Die Zwillingstürme der Stadtkirche — besteigen für den ältesten Dachblick in Wittenberg",nst:"Die Stadtkirchtürme bieten den höchsten freien Aussichtspunkt in Wittenberg.",nt:"Kleiner Eintritt für den Turm. Der Blick ist einzigartig."},
  {id:23,n:"Luther\'s Garden — Lutherplatz",a:"Lutherplatz",v:["nature","history","quiet"],d:8,s:"The kitchen garden Katharina von Bora kept behind Luther\'s house — herbs, vegetables, peace",st:"Luther\'s wife Katharina was a practical genius who ran the household, brewed beer, managed the farm, and kept this garden. The reconstructed garden shows what a Reformation household actually grew.",im:"Time-travel: Katharina tending this garden in 1535, Luther writing upstairs, children playing between the beds",t:"Free to walk the garden perimeter. Museum garden free.",c:["parks"],r:"g",nn:"Luthers Garten — Lutherplatz",ns:"Der Küchengarten, den Katharina von Bora hinter Luthers Haus pflegte — Kräuter, Gemüse, Frieden",nst:"Luthers Frau Katharina war eine praktische Meisterin, die den Haushalt führte und diesen Garten pflegte.",nt:"Gartenumfang kostenlos zu gehen. Museumsgarten kostenlos."},
  {id:24,n:"Lutherplatz Courtyard Houses — Lutherplatz",a:"Lutherplatz",v:["architecture","hidden"],d:8,s:"The Renaissance courtyard houses behind Lutherplatz — Reformation period domestic architecture",st:"The blocks immediately around Lutherplatz contain some of the best-preserved 16th century domestic architecture in Germany. The courtyard entrances are often open during the day.",im:"Time-travel: Reformation-era students renting rooms in these courtyard houses, 1530",t:"Push the courtyard doors on Lutherplatz. Most are open.",c:["courtyards"],r:"g",nn:"Lutherplatz Hofhäuser — Lutherplatz",ns:"Die Renaissancehofhäuser hinter dem Lutherplatz — Wohnarchitektur aus der Reformationszeit",nst:"Die Blöcke rund um den Lutherplatz enthalten einige der besterhaltenen Wohnarchitekturen Deutschlands aus dem 16. Jh.",nt:"Hoftor am Lutherplatz drücken. Meistens geöffnet."},
  {id:25,n:"Elbe River Sunrise — Elbe",a:"Elbe",v:["beautiful","quiet","nature"],d:10,s:"The Elbe at dawn — mist rising over the floodplain, cranes calling, Luther\'s towers on the skyline",st:"The Elbe at sunrise in autumn or winter is one of the most beautiful natural spectacles in Saxony-Anhalt. The cathedral tower of the Schlosskirche catches the first light while the river is still dark.",im:"Time-travel: Reformation pilgrims walking along the Elbe toward Wittenberg at dawn, 1520",t:"Come in October or November. Sunrise is around 7:30am.",c:["romantic_water"],r:"g",nn:"Elbe-Sonnenaufgang — Elbe",ns:"Die Elbe bei Tagesanbruch — Nebel steigt über der Aue auf, Kraniche rufen, Luthers Türme am Horizont",nst:"Die Elbe bei Herbst-/Wintersonnenaufgang ist eines der schönsten Naturschauspiele in Sachsen-Anhalt.",nt:"Im Oktober oder November kommen. Sonnenaufgang ca. 7:30 Uhr."},
  {id:26,n:"Schlosskirche Door — Schloss #26",a:"Schloss",v:["history","beautiful"],d:45,s:"The door where Luther nailed 95 theses in 1517 — the beginning of the Reformation",st:"The original wooden door was destroyed in the Seven Years War. The current bronze door (1858) carries all 95 theses in Latin. You can read them. This is where the modern world arguably began.",im:"Time-travel: October 31 1517 — Luther at this door, hammer in hand, 95 arguments against Rome",t:"Always free to stand at the door. Enter the church for free.",c:["history_big"],r:"g",nn:"Schlosskirche Tür — Schloss #26",ns:"Die Tür, an der Luther 1517 seine 95 Thesen nagelte — der Beginn der Reformation",nst:"Die originale Holztür wurde im Siebenjährigen Krieg zerstört. Die Bronzetür (1858) trägt alle 95 Thesen auf Latein.",nt:"Immer kostenlos an der Tür stehen. Kirche kostenlos eintreten."},
  {id:27,n:"Marktplatz — Altstadt #27",a:"Altstadt",v:["history","local","beautiful"],d:12,s:"The market square where Luther and Melanchthon stand bronze-faced — and where the Reformation was born into public life",st:"The twin statues of Luther and his colleague Melanchthon face each other across the market square. Between them: the Rathaus that witnessed all of it. This square was the arena of the Reformation.",im:"Time-travel: Luther and Melanchthon crossing this square together, arguing theology in public, 1520",t:"Free. The Rathaus interior is open. Walk the square slowly.",c:["high_spots"],r:"g",nn:"Marktplatz — Altstadt #27",ns:"Der Marktplatz, wo Luther und Melanchthon aus Bronze blicken — und wo die Reformation ins öffentliche Leben trat",nst:"Die Doppelstatuen von Luther und Melanchthon stehen einander gegenüber. Dazwischen das Rathaus.",nt:"Kostenlos. Das Rathaus ist offen. Den Platz langsam durchqueren."},
  {id:28,n:"Stadtkirche St. Marien — Altstadt #28",a:"Altstadt",v:["history","beautiful","quiet"],d:6,s:"The church where Luther preached — original pulpit, original Luther-era altar triptych by Cranach",st:"Luther preached here regularly. The Reformation altarpiece by Lucas Cranach (1547) shows Luther preaching from the pulpit, with the congregation visible below. A painting of a preacher, in the church where he preached.",im:"Time-travel: Luther preaching in this church — voice filling the Gothic nave, congregation transfixed",t:"Free to enter. Stand where Luther stood.",c:["parks"],r:"g",nn:"Stadtkirche St. Marien — Altstadt #28",ns:"Die Kirche, in der Luther predigte — originale Kanzel, originaler Cranach-Altar",nst:"Luther predigte hier regelmäßig. Das Reformationsaltarbild von Cranach (1547) zeigt Luther auf der Kanzel.",nt:"Kostenlos einzutreten. Dort stehen, wo Luther stand."},
  {id:29,n:"Luthereiche — Collegienstraße #29",a:"Collegienstraße",v:["history","hidden","weird"],d:52,s:"An oak tree marking where Luther publicly burned the Pope\'s decree in 1520 — an act of no return",st:"In December 1520, Luther carried the Pope\'s excommunication decree to this spot and burned it publicly in front of students. An oak tree now marks the site. After this there was no going back.",im:"Time-travel: December 1520 — Luther throws the papal decree into fire, students watching, laughing, horrified",t:"Free. The plaque explains everything. The tree is symbolic — not the original.",c:["courtyards"],r:"g",nn:"Luthereiche — Collegienstraße #29",ns:"Eine Eiche, die die Stelle markiert, wo Luther 1520 öffentlich das päpstliche Dekret verbrannte — ein Akt ohne Rückkehr",nst:"Im Dezember 1520 verbrannte Luther das Exkommunikationsdekret an dieser Stelle öffentlich vor Studenten.",nt:"Kostenlos. Die Plakette erklärt alles. Der Baum ist symbolisch — nicht das Original."},
  {id:30,n:"Lutherhaus Courtyard — Lutherplatz #30",a:"Lutherplatz",v:["history","quiet","beautiful"],d:22,s:"The courtyard of Luther\'s house — an Augustinian monastery courtyard where he lived 35 years",st:"Luther moved into this Augustinian monastery cloister in 1508. He lived here until his death in 1546. He married Katharina von Bora here. The courtyard is as he would have known it.",im:"Time-travel: Luther and Katharina sitting in this courtyard on summer evenings, children running between them",t:"The courtyard is free. Museum inside has entry fee.",c:["romantic_water"],r:"g",nn:"Lutherhaus Hof — Lutherplatz #30",ns:"Der Hof von Luthers Haus — ein Augustinerklosterhof, in dem er 35 Jahre lebte",nst:"Luther zog 1508 in diesen Augustinerklosterhof ein. Er lebte hier bis zu seinem Tod 1546.",nt:"Hof kostenlos. Museum innen mit Eintritt."},
  {id:31,n:"Melanchthon Monument — Altstadt #31",a:"Altstadt",v:["history","quiet"],d:20,s:"The modest statue of Luther\'s brilliant co-reformer — always overlooked beside his famous partner",st:"Philip Melanchthon was arguably more important intellectually than Luther, but history gave Luther the credit. His statue on the Marktplatz is visited by few. The man beside the statue shaped European education for 200 years.",im:"Time-travel: Melanchthon writing his systematic theology in a small Wittenberg room, 1521, aged 24",t:"Free. Look at his face. He was only 21 when the Reformation started.",c:["scary"],r:"g",nn:"Melanchthon-Denkmal — Altstadt #31",ns:"Die bescheidene Statue von Luthers brillantem Mitreformator — neben seinem berühmten Partner immer übersehen",nst:"Philip Melanchthon war intellektuell wohl wichtiger als Luther, aber die Geschichte gab Luther den Ruhm.",nt:"Kostenlos. Sein Gesicht ansehen. Er war nur 21 als die Reformation begann."},
  {id:32,n:"Cranach Court — Altstadt #32",a:"Altstadt",v:["history","beautiful","hidden"],d:19,s:"The printing press courtyard of Lucas Cranach — where Reformation pamphlets were printed by the million",st:"Lucas Cranach the Elder lived in Wittenberg and printed Luther\'s texts. His courtyard is one of the most significant physical sites of the Reformation — from here, images of Luther spread across Europe.",im:"Time-travel: Cranach\'s printing press running day and night, pamphlets flowing out into Germany, 1520",t:"Free to enter the courtyard. Art gallery inside.",c:["famous_dead"],r:"g",nn:"Cranachhof — Altstadt #32",ns:"Der Druckereihof von Lucas Cranach — wo Reformationsflugschriften zu Millionen gedruckt wurden",nst:"Lucas Cranach der Ältere lebte in Wittenberg und druckte Luthers Texte. Bilder Luthers verbreiteten sich von hier über Europa.",nt:"Hof kostenlos zu betreten. Kunstgalerie innen."},
  {id:33,n:"Schlosspark — Schloss #33",a:"Schloss",v:["nature","quiet","beautiful"],d:13,s:"The park behind the castle church — willows, river, and the tower of the 95 Theses visible through trees",st:"The Schlosspark runs along the Elbe bank behind the castle complex. The tower of the Schlosskirche is visible across the park. Completely free, almost always quiet.",im:"Time-travel: Luther walking in this garden, composing sermons, 1530",t:"Free. Walk along the Elbe side.",c:["street_art"],r:"g",nn:"Schlosspark — Schloss #33",ns:"Der Park hinter der Schlosskirche — Weiden, Fluss, Schlosskirchturm durch Bäume sichtbar",nst:"Der Schlosspark verläuft am Elbufer hinter dem Schlosskomplex.",nt:"Kostenlos. An der Elbseite entlanggehen."},
  {id:34,n:"Elbe Promenade — Elbe #34",a:"Elbe",v:["nature","beautiful","quiet"],d:52,s:"The Elbe at Wittenberg — wide, brown, slow, completely untouched for miles",st:"The Elbe here is a different river from the Dresden Elbe — broader, slower, less dramatic. Walking the bank north from the castle, the city disappears quickly and you are alone with the floodplain.",im:"Time-travel: Elbe floods of 2002 reaching Wittenberg, the promenade under water",t:"Free. Walk north from the Schloss. The meadows extend for miles.",c:["abandoned"],r:"g",nn:"Elbe-Promenade — Elbe #34",ns:"Die Elbe bei Wittenberg — breit, braun, langsam, kilometerweit unberührt",nst:"Die Elbe ist hier breiter und langsamer. Nördlich vom Schloss gehend verschwindet die Stadt schnell.",nt:"Kostenlos. Vom Schloss nach Norden gehen. Die Wiesen erstrecken sich kilometerweit."},
  {id:35,n:"Luthergarten — Altstadt #35",a:"Altstadt",v:["nature","history","hidden"],d:11,s:"500 trees planted by 500 churches worldwide for Luther\'s 500th anniversary — a global forest",st:"In 2017, 500 faith communities from around the world each planted a tree in this garden to mark the 500th anniversary of the Reformation. The garden is labelled with the country of each tree\'s planting community.",im:"Time-travel: delegations from 500 countries planting their trees on Reformation Day 2017",t:"Free. Find the tree from your own country.",c:["free_museum"],r:"g",nn:"Luthergarten — Altstadt #35",ns:"500 Bäume von 500 Kirchen weltweit für Luthers 500. Jahrestag gepflanzt — ein globaler Wald",nst:"2017 pflanzte jede von 500 Glaubensgemeinschaften weltweit einen Baum zum 500. Reformationsjubiläum.",nt:"Kostenlos. Den Baum aus dem eigenen Land finden."},
  {id:36,n:"Collegienstraße Cobblestones — Collegienstraße #36",a:"Collegienstraße",v:["history","beautiful","local"],d:48,s:"The main street Luther walked every day — original cobblestones, unchanged proportions",st:"Collegienstraße connected Luther\'s house to the Stadtkirche, the Marktplatz, and the Schlosskirche. He walked it every day for 35 years. The width and scale of the street is exactly as it was.",im:"Time-travel: Luther walking this cobblestone street to give his morning lectures, 1525",t:"Free. Walk slowly. The buildings on each side date mostly from 16th-18th centuries.",c:["local_only"],r:"g",nn:"Collegienstraße Kopfsteinpflaster — Collegienstraße #36",ns:"Die Hauptstraße, die Luther täglich entlangging — originales Kopfsteinpflaster, unveränderte Proportionen",nst:"Collegienstraße verband Luthers Haus mit der Stadtkirche, dem Marktplatz und der Schlosskirche.",nt:"Kostenlos. Langsam gehen. Die Gebäude zu beiden Seiten datieren meist vom 16.-18. Jh."},
  {id:37,n:"Elbe Floodplain Meadows — Elbe #37",a:"Elbe",v:["nature","free","quiet"],d:52,s:"The Elbe floodplain outside Wittenberg — an ancient river ecosystem unchanged for centuries",st:"The Elbe floodplain is one of Europe\'s last intact river ecosystems. Seasonal floods, willows, and rare birds. The meadows are free and extend for kilometres north and south.",im:"Time-travel: these meadows flooding in 1550, Luther watching from the city walls",t:"Walk north along the river from the castle. The meadows start after 10 minutes.",c:["architecture"],r:"g",nn:"Elbe-Überflutungswiesen — Elbe #37",ns:"Die Elbaue außerhalb von Wittenberg — ein uraltes Flussökosystem, jahrhundertelang unverändert",nst:"Die Elbaue ist eines der letzten intakten Flussökosysteme Europas.",nt:"Nördlich entlang des Flusses vom Schloss gehen. Die Wiesen beginnen nach 10 Minuten."},
  {id:38,n:"Melanchthonhaus Courtyard — Lutherplatz #38",a:"Lutherplatz",v:["history","quiet","hidden"],d:39,s:"Melanchthon\'s house — the best preserved Renaissance domestic building in Wittenberg",st:"Melanchthon\'s house is smaller than Luther\'s, reflecting their personalities. The courtyard garden is free to visit. The building is one of the best examples of a 16th century scholar\'s home in Europe.",im:"Time-travel: Melanchthon tutoring young students in this courtyard, 1540",t:"Courtyard free. Museum inside small entry fee.",c:["history_big"],r:"g",nn:"Melanchthonhaus Hof — Lutherplatz #38",ns:"Melanchthons Haus — das besterhaltene Renaissancewohngebäude in Wittenberg",nst:"Melanchthons Haus ist kleiner als Luthers und spiegelt ihre Persönlichkeiten wider.",nt:"Hof kostenlos. Museum innen kleiner Eintritt."},
  {id:39,n:"Historic Cemetery — Altstadt #39",a:"Altstadt",v:["history","quiet","famous_dead"],d:10,s:"The cemetery of Reformation Wittenberg — professors, printers, and reformers side by side",st:"Wittenberg\'s historic cemetery holds the graves of the scholars who built the Reformation alongside Luther and Melanchthon. Some graves date from the 16th century. Free to walk any time.",im:"Time-travel: Reformation scholars being buried here, their colleagues debating theology over the graves",t:"Free. The oldest section is at the back.",c:["high_spots"],r:"g",nn:"Historischer Friedhof — Altstadt #39",ns:"Der Reformationsfriedhof Wittenbergs — Professoren, Drucker und Reformatoren Seite an Seite",nst:"Wittenbergs historischer Friedhof enthält die Gräber der Gelehrten, die die Reformation neben Luther aufbauten.",nt:"Kostenlos. Der älteste Abschnitt ist hinten."},
  {id:40,n:"Augusteum Courtyard — Schloss #40",a:"Schloss",v:["history","architecture","quiet"],d:42,s:"The Renaissance courtyard of the university building adjacent to the castle church",st:"The Augusteum was built as the university library in the 16th century. Luther\'s personal library was kept here. The Renaissance courtyard is free to enter and almost never visited by tourists.",im:"Time-travel: student disputations held in this courtyard, 1530 — Luther possibly watching from a window",t:"Free. Usually open during working hours.",c:["parks"],r:"g",nn:"Augusteum Hof — Schloss #40",ns:"Der Renaissancehof des Universitätsgebäudes neben der Schlosskirche",nst:"Das Augusteum wurde im 16. Jh. als Universitätsbibliothek gebaut. Luthers Privatbibliothek war hier.",nt:"Kostenlos. Normalerweise während der Geschäftszeiten geöffnet."},
  {id:41,n:"Piesteritz Chemical Park Ruin Walk — Elbe #41",a:"Elbe",v:["weird","abandoned","hidden"],d:32,s:"The GDR chemical industrial complex — half demolished, half preserved, utterly strange",st:"The Piesteritz chemical works were among the GDR\'s largest. After 1990, much was abandoned. The surviving sections are still operational but the abandoned parts are gradually being reclaimed by nature.",im:"Time-travel: GDR workers cycling to the massive chemical plant gates at 6am, 1975",t:"Walk the perimeter from the Elbe side. Exterior free.",c:["courtyards"],r:"g",nn:"Piesteritz Industrieruinen — Elbe #41",ns:"Der DDR-Chemiepark — halb abgerissen, halb erhalten, völlig seltsam",nst:"Die Piesteritzer Chemiewerke gehörten zu den größten der DDR.",nt:"Den Umfang von der Elbseite abgehen. Außenbereich kostenlos."},
  {id:42,n:"Lutherstadt Wall Fragment — Altstadt #42",a:"Altstadt",v:["history","hidden"],d:7,s:"A surviving section of the 16th century city wall — hidden in the back streets",st:"Wittenberg\'s medieval walls were mostly demolished in the 19th century. A fragment survives near the Schloss end of the Altstadt. It is unmarked and unlisted in most guides.",im:"Time-travel: the full city wall of Wittenberg in 1517 — Luther lived inside it, the wall defining his world",t:"Walk along the back of Collegienstraße near the Schloss.",c:["romantic_water"],r:"g",nn:"Stadtmauerfragment — Altstadt #42",ns:"Ein erhaltener Abschnitt der Stadtmauer aus dem 16. Jh. — versteckt in den Hinterstraßen",nst:"Wittenbergs mittelalterliche Mauern wurden größtenteils im 19. Jh. abgerissen. Ein Fragment überlebt nahe dem Schloss.",nt:"Hinter der Collegienstraße nahe dem Schloss entlanggehen."},
  {id:43,n:"Bunkerberg Viewpoint — Elbe #43",a:"Elbe",v:["hidden","beautiful","history"],d:6,s:"A grassed WWII bunker hill — the best free view of the Elbe and Wittenberg",st:"A Second World War antiaircraft bunker was covered in earth and grass after 1945. The resulting hill gives the best view of the Elbe floodplain from above. Unmarked on most maps.",im:"Time-travel: antiaircraft crews on this bunker, watching Allied bombers pass over the Elbe, 1944",t:"Walk to the eastern edge of town toward the Elbe. The hill is visible from the path.",c:["scary"],r:"g",nn:"Bunkerberg Aussichtspunkt — Elbe #43",ns:"Ein begraster WWII-Bunkerhügel — der beste kostenlose Blick über die Elbe und Wittenberg",nst:"Ein Zweiter Weltkrieg Flakbunker wurde nach 1945 mit Erde und Gras bedeckt. Gibt besten Blick.",nt:"Zum östlichen Stadtrand zur Elbe gehen. Der Hügel ist vom Weg aus sichtbar."},
  {id:44,n:"Wittenberg Hauptbahnhof — Altstadt #44",a:"Altstadt",v:["architecture","local"],d:10,s:"The Gründerzeit railway station from 1841 — still beautiful, still functioning, mostly forgotten",st:"Wittenberg\'s station opened in 1841, making it one of the earliest in Germany. The current building dates from the late 19th century and retains its original imperial-era character.",im:"Time-travel: first train arriving at Wittenberg station in 1841, townspeople running to see it",t:"Free to view. Take the train back to Berlin.",c:["famous_dead"],r:"g",nn:"Wittenberg Hauptbahnhof — Altstadt #44",ns:"Der Gründerzeit-Bahnhof von 1841 — noch schön, noch funktionierend, meistens vergessen",nst:"Wittenbergs Bahnhof öffnete 1841, als einer der frühesten in Deutschland.",nt:"Kostenlos zu besichtigen. Mit dem Zug zurück nach Berlin fahren."},
  {id:45,n:"Cranach Fountain — Altstadt #45",a:"Altstadt",v:["history","beautiful"],d:18,s:"The Renaissance fountain on the Marktplatz — original 16th century stonework, still running",st:"The Marktplatz fountain dates from the 16th century. It stood here when Luther was alive. The water still runs. A small constant proof that things can survive centuries of history.",im:"Time-travel: Wittenberg citizens drawing water from this fountain in 1525",t:"Free. Touch it.",c:["street_art"],r:"g",nn:"Cranachbrunnen — Altstadt #45",ns:"Der Renaissancebrunnen auf dem Marktplatz — originales Steinwerk aus dem 16. Jh., noch in Betrieb",nst:"Der Marktplatzbrunnen datiert aus dem 16. Jh. Er stand hier als Luther lebte.",nt:"Kostenlos. Anfassen."},
  {id:46,n:"Wittenberg Rathaus — Altstadt #46",a:"Altstadt",v:["history","architecture"],d:19,s:"The Renaissance town hall of 1523 — built in the year Luther was in hiding at the Wartburg",st:"The Rathaus was commissioned in 1523 when Luther was hiding in the Wartburg after the Diet of Worms. The building represents the secular confidence the Reformation gave to civic authorities.",im:"Time-travel: Luther returning to Wittenberg to find this town hall under construction, 1523",t:"Exterior free. Interior open weekdays.",c:["abandoned"],r:"g",nn:"Wittenberg Rathaus — Altstadt #46",ns:"Das Rathaus der Renaissance von 1523 — im Jahr gebaut, als Luther sich auf der Wartburg versteckte",nst:"Das Rathaus wurde 1523 beauftragt, als Luther sich nach dem Wormser Reichstag auf der Wartburg versteckte.",nt:"Außenbereich kostenlos. Inneres werktags geöffnet."},
  {id:47,n:"Stadtkirche Bell Tower View — Altstadt #47",a:"Altstadt",v:["beautiful","high_spots"],d:37,s:"The twin towers of the Stadtkirche — climb for the oldest rooftop view in Wittenberg",st:"The Stadtkirche\'s towers offer the highest free viewpoint in Wittenberg. You see the castle church tower, the Elbe, and the flat Thuringian landscape extending to the horizon.",im:"Time-travel: Luther climbing these tower steps to look out at the world he was changing, 1520",t:"Small fee for the tower. The view is unique.",c:["free_museum"],r:"g",nn:"Stadtkirche Turmblick — Altstadt #47",ns:"Die Zwillingstürme der Stadtkirche — besteigen für den ältesten Dachblick in Wittenberg",nst:"Die Stadtkirchtürme bieten den höchsten freien Aussichtspunkt in Wittenberg.",nt:"Kleiner Eintritt für den Turm. Der Blick ist einzigartig."},
  {id:48,n:"Luther\'s Garden — Lutherplatz #48",a:"Lutherplatz",v:["nature","history","quiet"],d:43,s:"The kitchen garden Katharina von Bora kept behind Luther\'s house — herbs, vegetables, peace",st:"Luther\'s wife Katharina was a practical genius who ran the household, brewed beer, managed the farm, and kept this garden. The reconstructed garden shows what a Reformation household actually grew.",im:"Time-travel: Katharina tending this garden in 1535, Luther writing upstairs, children playing between the beds",t:"Free to walk the garden perimeter. Museum garden free.",c:["local_only"],r:"g",nn:"Luthers Garten — Lutherplatz #48",ns:"Der Küchengarten, den Katharina von Bora hinter Luthers Haus pflegte — Kräuter, Gemüse, Frieden",nst:"Luthers Frau Katharina war eine praktische Meisterin, die den Haushalt führte und diesen Garten pflegte.",nt:"Gartenumfang kostenlos zu gehen. Museumsgarten kostenlos."},
  {id:49,n:"Lutherplatz Courtyard Houses — Lutherplatz #49",a:"Lutherplatz",v:["architecture","hidden"],d:6,s:"The Renaissance courtyard houses behind Lutherplatz — Reformation period domestic architecture",st:"The blocks immediately around Lutherplatz contain some of the best-preserved 16th century domestic architecture in Germany. The courtyard entrances are often open during the day.",im:"Time-travel: Reformation-era students renting rooms in these courtyard houses, 1530",t:"Push the courtyard doors on Lutherplatz. Most are open.",c:["architecture"],r:"g",nn:"Lutherplatz Hofhäuser — Lutherplatz #49",ns:"Die Renaissancehofhäuser hinter dem Lutherplatz — Wohnarchitektur aus der Reformationszeit",nst:"Die Blöcke rund um den Lutherplatz enthalten einige der besterhaltenen Wohnarchitekturen Deutschlands aus dem 16. Jh.",nt:"Hoftor am Lutherplatz drücken. Meistens geöffnet."},

  {id:53,n:"Stadtkirche St. Marien — Altstadt #53",a:"Altstadt",v:["history","beautiful","quiet"],d:46,s:"The church where Luther preached — original pulpit, original Luther-era altar triptych by Cranach",st:"Luther preached here regularly. The Reformation altarpiece by Lucas Cranach (1547) shows Luther preaching from the pulpit, with the congregation visible below. A painting of a preacher, in the church where he preached.",im:"Time-travel: Luther preaching in this church — voice filling the Gothic nave, congregation transfixed",t:"Free to enter. Stand where Luther stood.",c:["courtyards"],r:"g",nn:"Stadtkirche St. Marien — Altstadt #53",ns:"Die Kirche, in der Luther predigte — originale Kanzel, originaler Cranach-Altar",nst:"Luther predigte hier regelmäßig. Das Reformationsaltarbild von Cranach (1547) zeigt Luther auf der Kanzel.",nt:"Kostenlos einzutreten. Dort stehen, wo Luther stand."},
  {id:54,n:"Luthereiche — Collegienstraße #54",a:"Collegienstraße",v:["history","hidden","weird"],d:49,s:"An oak tree marking where Luther publicly burned the Pope\'s decree in 1520 — an act of no return",st:"In December 1520, Luther carried the Pope\'s excommunication decree to this spot and burned it publicly in front of students. An oak tree now marks the site. After this there was no going back.",im:"Time-travel: December 1520 — Luther throws the papal decree into fire, students watching, laughing, horrified",t:"Free. The plaque explains everything. The tree is symbolic — not the original.",c:["romantic_water"],r:"g",nn:"Luthereiche — Collegienstraße #54",ns:"Eine Eiche, die die Stelle markiert, wo Luther 1520 öffentlich das päpstliche Dekret verbrannte — ein Akt ohne Rückkehr",nst:"Im Dezember 1520 verbrannte Luther das Exkommunikationsdekret an dieser Stelle öffentlich vor Studenten.",nt:"Kostenlos. Die Plakette erklärt alles. Der Baum ist symbolisch — nicht das Original."},
  {id:55,n:"Lutherhaus Courtyard — Lutherplatz #55",a:"Lutherplatz",v:["history","quiet","beautiful"],d:39,s:"The courtyard of Luther\'s house — an Augustinian monastery courtyard where he lived 35 years",st:"Luther moved into this Augustinian monastery cloister in 1508. He lived here until his death in 1546. He married Katharina von Bora here. The courtyard is as he would have known it.",im:"Time-travel: Luther and Katharina sitting in this courtyard on summer evenings, children running between them",t:"The courtyard is free. Museum inside has entry fee.",c:["scary"],r:"g",nn:"Lutherhaus Hof — Lutherplatz #55",ns:"Der Hof von Luthers Haus — ein Augustinerklosterhof, in dem er 35 Jahre lebte",nst:"Luther zog 1508 in diesen Augustinerklosterhof ein. Er lebte hier bis zu seinem Tod 1546.",nt:"Hof kostenlos. Museum innen mit Eintritt."},
  {id:56,n:"Melanchthon Monument — Altstadt #56",a:"Altstadt",v:["history","quiet"],d:31,s:"The modest statue of Luther\'s brilliant co-reformer — always overlooked beside his famous partner",st:"Philip Melanchthon was arguably more important intellectually than Luther, but history gave Luther the credit. His statue on the Marktplatz is visited by few. The man beside the statue shaped European education for 200 years.",im:"Time-travel: Melanchthon writing his systematic theology in a small Wittenberg room, 1521, aged 24",t:"Free. Look at his face. He was only 21 when the Reformation started.",c:["famous_dead"],r:"g",nn:"Melanchthon-Denkmal — Altstadt #56",ns:"Die bescheidene Statue von Luthers brillantem Mitreformator — neben seinem berühmten Partner immer übersehen",nst:"Philip Melanchthon war intellektuell wohl wichtiger als Luther, aber die Geschichte gab Luther den Ruhm.",nt:"Kostenlos. Sein Gesicht ansehen. Er war nur 21 als die Reformation begann."},
  {id:57,n:"Cranach Court — Altstadt #57",a:"Altstadt",v:["history","beautiful","hidden"],d:19,s:"The printing press courtyard of Lucas Cranach — where Reformation pamphlets were printed by the million",st:"Lucas Cranach the Elder lived in Wittenberg and printed Luther\'s texts. His courtyard is one of the most significant physical sites of the Reformation — from here, images of Luther spread across Europe.",im:"Time-travel: Cranach\'s printing press running day and night, pamphlets flowing out into Germany, 1520",t:"Free to enter the courtyard. Art gallery inside.",c:["street_art"],r:"g",nn:"Cranachhof — Altstadt #57",ns:"Der Druckereihof von Lucas Cranach — wo Reformationsflugschriften zu Millionen gedruckt wurden",nst:"Lucas Cranach der Ältere lebte in Wittenberg und druckte Luthers Texte. Bilder Luthers verbreiteten sich von hier über Europa.",nt:"Hof kostenlos zu betreten. Kunstgalerie innen."},
  {id:58,n:"Schlosspark — Schloss #58",a:"Schloss",v:["nature","quiet","beautiful"],d:33,s:"The park behind the castle church — willows, river, and the tower of the 95 Theses visible through trees",st:"The Schlosspark runs along the Elbe bank behind the castle complex. The tower of the Schlosskirche is visible across the park. Completely free, almost always quiet.",im:"Time-travel: Luther walking in this garden, composing sermons, 1530",t:"Free. Walk along the Elbe side.",c:["abandoned"],r:"g",nn:"Schlosspark — Schloss #58",ns:"Der Park hinter der Schlosskirche — Weiden, Fluss, Schlosskirchturm durch Bäume sichtbar",nst:"Der Schlosspark verläuft am Elbufer hinter dem Schlosskomplex.",nt:"Kostenlos. An der Elbseite entlanggehen."},
  {id:59,n:"Elbe Promenade — Elbe #59",a:"Elbe",v:["nature","beautiful","quiet"],d:42,s:"The Elbe at Wittenberg — wide, brown, slow, completely untouched for miles",st:"The Elbe here is a different river from the Dresden Elbe — broader, slower, less dramatic. Walking the bank north from the castle, the city disappears quickly and you are alone with the floodplain.",im:"Time-travel: Elbe floods of 2002 reaching Wittenberg, the promenade under water",t:"Free. Walk north from the Schloss. The meadows extend for miles.",c:["free_museum"],r:"g",nn:"Elbe-Promenade — Elbe #59",ns:"Die Elbe bei Wittenberg — breit, braun, langsam, kilometerweit unberührt",nst:"Die Elbe ist hier breiter und langsamer. Nördlich vom Schloss gehend verschwindet die Stadt schnell.",nt:"Kostenlos. Vom Schloss nach Norden gehen. Die Wiesen erstrecken sich kilometerweit."},
  {id:60,n:"Luthergarten — Altstadt #60",a:"Altstadt",v:["nature","history","hidden"],d:22,s:"500 trees planted by 500 churches worldwide for Luther\'s 500th anniversary — a global forest",st:"In 2017, 500 faith communities from around the world each planted a tree in this garden to mark the 500th anniversary of the Reformation. The garden is labelled with the country of each tree\'s planting community.",im:"Time-travel: delegations from 500 countries planting their trees on Reformation Day 2017",t:"Free. Find the tree from your own country.",c:["local_only"],r:"g",nn:"Luthergarten — Altstadt #60",ns:"500 Bäume von 500 Kirchen weltweit für Luthers 500. Jahrestag gepflanzt — ein globaler Wald",nst:"2017 pflanzte jede von 500 Glaubensgemeinschaften weltweit einen Baum zum 500. Reformationsjubiläum.",nt:"Kostenlos. Den Baum aus dem eigenen Land finden."},
  {id:61,n:"Collegienstraße Cobblestones — Collegienstraße #61",a:"Collegienstraße",v:["history","beautiful","local"],d:5,s:"The main street Luther walked every day — original cobblestones, unchanged proportions",st:"Collegienstraße connected Luther\'s house to the Stadtkirche, the Marktplatz, and the Schlosskirche. He walked it every day for 35 years. The width and scale of the street is exactly as it was.",im:"Time-travel: Luther walking this cobblestone street to give his morning lectures, 1525",t:"Free. Walk slowly. The buildings on each side date mostly from 16th-18th centuries.",c:["architecture"],r:"g",nn:"Collegienstraße Kopfsteinpflaster — Collegienstraße #61",ns:"Die Hauptstraße, die Luther täglich entlangging — originales Kopfsteinpflaster, unveränderte Proportionen",nst:"Collegienstraße verband Luthers Haus mit der Stadtkirche, dem Marktplatz und der Schlosskirche.",nt:"Kostenlos. Langsam gehen. Die Gebäude zu beiden Seiten datieren meist vom 16.-18. Jh."},
  {id:62,n:"Elbe Floodplain Meadows — Elbe #62",a:"Elbe",v:["nature","free","quiet"],d:53,s:"The Elbe floodplain outside Wittenberg — an ancient river ecosystem unchanged for centuries",st:"The Elbe floodplain is one of Europe\'s last intact river ecosystems. Seasonal floods, willows, and rare birds. The meadows are free and extend for kilometres north and south.",im:"Time-travel: these meadows flooding in 1550, Luther watching from the city walls",t:"Walk north along the river from the castle. The meadows start after 10 minutes.",c:["history_big"],r:"g",nn:"Elbe-Überflutungswiesen — Elbe #62",ns:"Die Elbaue außerhalb von Wittenberg — ein uraltes Flussökosystem, jahrhundertelang unverändert",nst:"Die Elbaue ist eines der letzten intakten Flussökosysteme Europas.",nt:"Nördlich entlang des Flusses vom Schloss gehen. Die Wiesen beginnen nach 10 Minuten."},
  {id:63,n:"Melanchthonhaus Courtyard — Lutherplatz #63",a:"Lutherplatz",v:["history","quiet","hidden"],d:15,s:"Melanchthon\'s house — the best preserved Renaissance domestic building in Wittenberg",st:"Melanchthon\'s house is smaller than Luther\'s, reflecting their personalities. The courtyard garden is free to visit. The building is one of the best examples of a 16th century scholar\'s home in Europe.",im:"Time-travel: Melanchthon tutoring young students in this courtyard, 1540",t:"Courtyard free. Museum inside small entry fee.",c:["high_spots"],r:"g",nn:"Melanchthonhaus Hof — Lutherplatz #63",ns:"Melanchthons Haus — das besterhaltene Renaissancewohngebäude in Wittenberg",nst:"Melanchthons Haus ist kleiner als Luthers und spiegelt ihre Persönlichkeiten wider.",nt:"Hof kostenlos. Museum innen kleiner Eintritt."},
  {id:64,n:"Historic Cemetery — Altstadt #64",a:"Altstadt",v:["history","quiet","famous_dead"],d:49,s:"The cemetery of Reformation Wittenberg — professors, printers, and reformers side by side",st:"Wittenberg\'s historic cemetery holds the graves of the scholars who built the Reformation alongside Luther and Melanchthon. Some graves date from the 16th century. Free to walk any time.",im:"Time-travel: Reformation scholars being buried here, their colleagues debating theology over the graves",t:"Free. The oldest section is at the back.",c:["parks"],r:"g",nn:"Historischer Friedhof — Altstadt #64",ns:"Der Reformationsfriedhof Wittenbergs — Professoren, Drucker und Reformatoren Seite an Seite",nst:"Wittenbergs historischer Friedhof enthält die Gräber der Gelehrten, die die Reformation neben Luther aufbauten.",nt:"Kostenlos. Der älteste Abschnitt ist hinten."},
  {id:65,n:"Augusteum Courtyard — Schloss #65",a:"Schloss",v:["history","architecture","quiet"],d:32,s:"The Renaissance courtyard of the university building adjacent to the castle church",st:"The Augusteum was built as the university library in the 16th century. Luther\'s personal library was kept here. The Renaissance courtyard is free to enter and almost never visited by tourists.",im:"Time-travel: student disputations held in this courtyard, 1530 — Luther possibly watching from a window",t:"Free. Usually open during working hours.",c:["courtyards"],r:"g",nn:"Augusteum Hof — Schloss #65",ns:"Der Renaissancehof des Universitätsgebäudes neben der Schlosskirche",nst:"Das Augusteum wurde im 16. Jh. als Universitätsbibliothek gebaut. Luthers Privatbibliothek war hier.",nt:"Kostenlos. Normalerweise während der Geschäftszeiten geöffnet."},
  {id:66,n:"Piesteritz Chemical Park Ruin Walk — Elbe #66",a:"Elbe",v:["weird","abandoned","hidden"],d:26,s:"The GDR chemical industrial complex — half demolished, half preserved, utterly strange",st:"The Piesteritz chemical works were among the GDR\'s largest. After 1990, much was abandoned. The surviving sections are still operational but the abandoned parts are gradually being reclaimed by nature.",im:"Time-travel: GDR workers cycling to the massive chemical plant gates at 6am, 1975",t:"Walk the perimeter from the Elbe side. Exterior free.",c:["romantic_water"],r:"g",nn:"Piesteritz Industrieruinen — Elbe #66",ns:"Der DDR-Chemiepark — halb abgerissen, halb erhalten, völlig seltsam",nst:"Die Piesteritzer Chemiewerke gehörten zu den größten der DDR.",nt:"Den Umfang von der Elbseite abgehen. Außenbereich kostenlos."},
  {id:67,n:"Lutherstadt Wall Fragment — Altstadt #67",a:"Altstadt",v:["history","hidden"],d:22,s:"A surviving section of the 16th century city wall — hidden in the back streets",st:"Wittenberg\'s medieval walls were mostly demolished in the 19th century. A fragment survives near the Schloss end of the Altstadt. It is unmarked and unlisted in most guides.",im:"Time-travel: the full city wall of Wittenberg in 1517 — Luther lived inside it, the wall defining his world",t:"Walk along the back of Collegienstraße near the Schloss.",c:["scary"],r:"g",nn:"Stadtmauerfragment — Altstadt #67",ns:"Ein erhaltener Abschnitt der Stadtmauer aus dem 16. Jh. — versteckt in den Hinterstraßen",nst:"Wittenbergs mittelalterliche Mauern wurden größtenteils im 19. Jh. abgerissen. Ein Fragment überlebt nahe dem Schloss.",nt:"Hinter der Collegienstraße nahe dem Schloss entlanggehen."},
  {id:68,n:"Bunkerberg Viewpoint — Elbe #68",a:"Elbe",v:["hidden","beautiful","history"],d:14,s:"A grassed WWII bunker hill — the best free view of the Elbe and Wittenberg",st:"A Second World War antiaircraft bunker was covered in earth and grass after 1945. The resulting hill gives the best view of the Elbe floodplain from above. Unmarked on most maps.",im:"Time-travel: antiaircraft crews on this bunker, watching Allied bombers pass over the Elbe, 1944",t:"Walk to the eastern edge of town toward the Elbe. The hill is visible from the path.",c:["famous_dead"],r:"g",nn:"Bunkerberg Aussichtspunkt — Elbe #68",ns:"Ein begraster WWII-Bunkerhügel — der beste kostenlose Blick über die Elbe und Wittenberg",nst:"Ein Zweiter Weltkrieg Flakbunker wurde nach 1945 mit Erde und Gras bedeckt. Gibt besten Blick.",nt:"Zum östlichen Stadtrand zur Elbe gehen. Der Hügel ist vom Weg aus sichtbar."},
  {id:69,n:"Wittenberg Hauptbahnhof — Altstadt #69",a:"Altstadt",v:["architecture","local"],d:18,s:"The Gründerzeit railway station from 1841 — still beautiful, still functioning, mostly forgotten",st:"Wittenberg\'s station opened in 1841, making it one of the earliest in Germany. The current building dates from the late 19th century and retains its original imperial-era character.",im:"Time-travel: first train arriving at Wittenberg station in 1841, townspeople running to see it",t:"Free to view. Take the train back to Berlin.",c:["street_art"],r:"g",nn:"Wittenberg Hauptbahnhof — Altstadt #69",ns:"Der Gründerzeit-Bahnhof von 1841 — noch schön, noch funktionierend, meistens vergessen",nst:"Wittenbergs Bahnhof öffnete 1841, als einer der frühesten in Deutschland.",nt:"Kostenlos zu besichtigen. Mit dem Zug zurück nach Berlin fahren."},
  {id:70,n:"Cranach Fountain — Altstadt #70",a:"Altstadt",v:["history","beautiful"],d:53,s:"The Renaissance fountain on the Marktplatz — original 16th century stonework, still running",st:"The Marktplatz fountain dates from the 16th century. It stood here when Luther was alive. The water still runs. A small constant proof that things can survive centuries of history.",im:"Time-travel: Wittenberg citizens drawing water from this fountain in 1525",t:"Free. Touch it.",c:["abandoned"],r:"g",nn:"Cranachbrunnen — Altstadt #70",ns:"Der Renaissancebrunnen auf dem Marktplatz — originales Steinwerk aus dem 16. Jh., noch in Betrieb",nst:"Der Marktplatzbrunnen datiert aus dem 16. Jh. Er stand hier als Luther lebte.",nt:"Kostenlos. Anfassen."},
  {id:71,n:"Wittenberg Rathaus — Altstadt #71",a:"Altstadt",v:["history","architecture"],d:26,s:"The Renaissance town hall of 1523 — built in the year Luther was in hiding at the Wartburg",st:"The Rathaus was commissioned in 1523 when Luther was hiding in the Wartburg after the Diet of Worms. The building represents the secular confidence the Reformation gave to civic authorities.",im:"Time-travel: Luther returning to Wittenberg to find this town hall under construction, 1523",t:"Exterior free. Interior open weekdays.",c:["free_museum"],r:"g",nn:"Wittenberg Rathaus — Altstadt #71",ns:"Das Rathaus der Renaissance von 1523 — im Jahr gebaut, als Luther sich auf der Wartburg versteckte",nst:"Das Rathaus wurde 1523 beauftragt, als Luther sich nach dem Wormser Reichstag auf der Wartburg versteckte.",nt:"Außenbereich kostenlos. Inneres werktags geöffnet."},
  {id:72,n:"Stadtkirche Bell Tower View — Altstadt #72",a:"Altstadt",v:["beautiful","high_spots"],d:11,s:"The twin towers of the Stadtkirche — climb for the oldest rooftop view in Wittenberg",st:"The Stadtkirche\'s towers offer the highest free viewpoint in Wittenberg. You see the castle church tower, the Elbe, and the flat Thuringian landscape extending to the horizon.",im:"Time-travel: Luther climbing these tower steps to look out at the world he was changing, 1520",t:"Small fee for the tower. The view is unique.",c:["local_only"],r:"g",nn:"Stadtkirche Turmblick — Altstadt #72",ns:"Die Zwillingstürme der Stadtkirche — besteigen für den ältesten Dachblick in Wittenberg",nst:"Die Stadtkirchtürme bieten den höchsten freien Aussichtspunkt in Wittenberg.",nt:"Kleiner Eintritt für den Turm. Der Blick ist einzigartig."},
  {id:73,n:"Luther\'s Garden — Lutherplatz #73",a:"Lutherplatz",v:["nature","history","quiet"],d:10,s:"The kitchen garden Katharina von Bora kept behind Luther\'s house — herbs, vegetables, peace",st:"Luther\'s wife Katharina was a practical genius who ran the household, brewed beer, managed the farm, and kept this garden. The reconstructed garden shows what a Reformation household actually grew.",im:"Time-travel: Katharina tending this garden in 1535, Luther writing upstairs, children playing between the beds",t:"Free to walk the garden perimeter. Museum garden free.",c:["architecture"],r:"g",nn:"Luthers Garten — Lutherplatz #73",ns:"Der Küchengarten, den Katharina von Bora hinter Luthers Haus pflegte — Kräuter, Gemüse, Frieden",nst:"Luthers Frau Katharina war eine praktische Meisterin, die den Haushalt führte und diesen Garten pflegte.",nt:"Gartenumfang kostenlos zu gehen. Museumsgarten kostenlos."},
  {id:74,n:"Lutherplatz Courtyard Houses — Lutherplatz #74",a:"Lutherplatz",v:["architecture","hidden"],d:29,s:"The Renaissance courtyard houses behind Lutherplatz — Reformation period domestic architecture",st:"The blocks immediately around Lutherplatz contain some of the best-preserved 16th century domestic architecture in Germany. The courtyard entrances are often open during the day.",im:"Time-travel: Reformation-era students renting rooms in these courtyard houses, 1530",t:"Push the courtyard doors on Lutherplatz. Most are open.",c:["history_big"],r:"g",nn:"Lutherplatz Hofhäuser — Lutherplatz #74",ns:"Die Renaissancehofhäuser hinter dem Lutherplatz — Wohnarchitektur aus der Reformationszeit",nst:"Die Blöcke rund um den Lutherplatz enthalten einige der besterhaltenen Wohnarchitekturen Deutschlands aus dem 16. Jh.",nt:"Hoftor am Lutherplatz drücken. Meistens geöffnet."},
  {id:75,n:"Elbe River Sunrise — Elbe #75",a:"Elbe",v:["beautiful","quiet","nature"],d:11,s:"The Elbe at dawn — mist rising over the floodplain, cranes calling, Luther\'s towers on the skyline",st:"The Elbe at sunrise in autumn or winter is one of the most beautiful natural spectacles in Saxony-Anhalt. The cathedral tower of the Schlosskirche catches the first light while the river is still dark.",im:"Time-travel: Reformation pilgrims walking along the Elbe toward Wittenberg at dawn, 1520",t:"Come in October or November. Sunrise is around 7:30am.",c:["high_spots"],r:"g",nn:"Elbe-Sonnenaufgang — Elbe #75",ns:"Die Elbe bei Tagesanbruch — Nebel steigt über der Aue auf, Kraniche rufen, Luthers Türme am Horizont",nst:"Die Elbe bei Herbst-/Wintersonnenaufgang ist eines der schönsten Naturschauspiele in Sachsen-Anhalt.",nt:"Im Oktober oder November kommen. Sonnenaufgang ca. 7:30 Uhr."},
  {id:76,n:"Schlosskirche Door — Schloss #76",a:"Schloss",v:["history","beautiful"],d:27,s:"The door where Luther nailed 95 theses in 1517 — the beginning of the Reformation",st:"The original wooden door was destroyed in the Seven Years War. The current bronze door (1858) carries all 95 theses in Latin. You can read them. This is where the modern world arguably began.",im:"Time-travel: October 31 1517 — Luther at this door, hammer in hand, 95 arguments against Rome",t:"Always free to stand at the door. Enter the church for free.",c:["parks"],r:"g",nn:"Schlosskirche Tür — Schloss #76",ns:"Die Tür, an der Luther 1517 seine 95 Thesen nagelte — der Beginn der Reformation",nst:"Die originale Holztür wurde im Siebenjährigen Krieg zerstört. Die Bronzetür (1858) trägt alle 95 Thesen auf Latein.",nt:"Immer kostenlos an der Tür stehen. Kirche kostenlos eintreten."},
  {id:77,n:"Marktplatz — Altstadt #77",a:"Altstadt",v:["history","local","beautiful"],d:27,s:"The market square where Luther and Melanchthon stand bronze-faced — and where the Reformation was born into public life",st:"The twin statues of Luther and his colleague Melanchthon face each other across the market square. Between them: the Rathaus that witnessed all of it. This square was the arena of the Reformation.",im:"Time-travel: Luther and Melanchthon crossing this square together, arguing theology in public, 1520",t:"Free. The Rathaus interior is open. Walk the square slowly.",c:["courtyards"],r:"g",nn:"Marktplatz — Altstadt #77",ns:"Der Marktplatz, wo Luther und Melanchthon aus Bronze blicken — und wo die Reformation ins öffentliche Leben trat",nst:"Die Doppelstatuen von Luther und Melanchthon stehen einander gegenüber. Dazwischen das Rathaus.",nt:"Kostenlos. Das Rathaus ist offen. Den Platz langsam durchqueren."},
  {id:78,n:"Stadtkirche St. Marien — Altstadt #78",a:"Altstadt",v:["history","beautiful","quiet"],d:43,s:"The church where Luther preached — original pulpit, original Luther-era altar triptych by Cranach",st:"Luther preached here regularly. The Reformation altarpiece by Lucas Cranach (1547) shows Luther preaching from the pulpit, with the congregation visible below. A painting of a preacher, in the church where he preached.",im:"Time-travel: Luther preaching in this church — voice filling the Gothic nave, congregation transfixed",t:"Free to enter. Stand where Luther stood.",c:["romantic_water"],r:"g",nn:"Stadtkirche St. Marien — Altstadt #78",ns:"Die Kirche, in der Luther predigte — originale Kanzel, originaler Cranach-Altar",nst:"Luther predigte hier regelmäßig. Das Reformationsaltarbild von Cranach (1547) zeigt Luther auf der Kanzel.",nt:"Kostenlos einzutreten. Dort stehen, wo Luther stand."},

  {id:80,n:"Lutherhaus Courtyard — Lutherplatz #80",a:"Lutherplatz",v:["history","quiet","beautiful"],d:7,s:"The courtyard of Luther\'s house — an Augustinian monastery courtyard where he lived 35 years",st:"Luther moved into this Augustinian monastery cloister in 1508. He lived here until his death in 1546. He married Katharina von Bora here. The courtyard is as he would have known it.",im:"Time-travel: Luther and Katharina sitting in this courtyard on summer evenings, children running between them",t:"The courtyard is free. Museum inside has entry fee.",c:["famous_dead"],r:"g",nn:"Lutherhaus Hof — Lutherplatz #80",ns:"Der Hof von Luthers Haus — ein Augustinerklosterhof, in dem er 35 Jahre lebte",nst:"Luther zog 1508 in diesen Augustinerklosterhof ein. Er lebte hier bis zu seinem Tod 1546.",nt:"Hof kostenlos. Museum innen mit Eintritt."},
