  {id:82,n:"Cranach Court — Altstadt #82",a:"Altstadt",v:["history","beautiful","hidden"],d:34,s:"The printing press courtyard of Lucas Cranach — where Reformation pamphlets were printed by the million",st:"Lucas Cranach the Elder lived in Wittenberg and printed Luther\'s texts. His courtyard is one of the most significant physical sites of the Reformation — from here, images of Luther spread across Europe.",im:"Time-travel: Cranach\'s printing press running day and night, pamphlets flowing out into Germany, 1520",t:"Free to enter the courtyard. Art gallery inside.",c:["abandoned"],r:"g",nn:"Cranachhof — Altstadt #82",ns:"Der Druckereihof von Lucas Cranach — wo Reformationsflugschriften zu Millionen gedruckt wurden",nst:"Lucas Cranach der Ältere lebte in Wittenberg und druckte Luthers Texte. Bilder Luthers verbreiteten sich von hier über Europa.",nt:"Hof kostenlos zu betreten. Kunstgalerie innen."},
  {id:83,n:"Schlosspark — Schloss #83",a:"Schloss",v:["nature","quiet","beautiful"],d:39,s:"The park behind the castle church — willows, river, and the tower of the 95 Theses visible through trees",st:"The Schlosspark runs along the Elbe bank behind the castle complex. The tower of the Schlosskirche is visible across the park. Completely free, almost always quiet.",im:"Time-travel: Luther walking in this garden, composing sermons, 1530",t:"Free. Walk along the Elbe side.",c:["free_museum"],r:"g",nn:"Schlosspark — Schloss #83",ns:"Der Park hinter der Schlosskirche — Weiden, Fluss, Schlosskirchturm durch Bäume sichtbar",nst:"Der Schlosspark verläuft am Elbufer hinter dem Schlosskomplex.",nt:"Kostenlos. An der Elbseite entlanggehen."},
  {id:84,n:"Elbe Promenade — Elbe #84",a:"Elbe",v:["nature","beautiful","quiet"],d:12,s:"The Elbe at Wittenberg — wide, brown, slow, completely untouched for miles",st:"The Elbe here is a different river from the Dresden Elbe — broader, slower, less dramatic. Walking the bank north from the castle, the city disappears quickly and you are alone with the floodplain.",im:"Time-travel: Elbe floods of 2002 reaching Wittenberg, the promenade under water",t:"Free. Walk north from the Schloss. The meadows extend for miles.",c:["local_only"],r:"g",nn:"Elbe-Promenade — Elbe #84",ns:"Die Elbe bei Wittenberg — breit, braun, langsam, kilometerweit unberührt",nst:"Die Elbe ist hier breiter und langsamer. Nördlich vom Schloss gehend verschwindet die Stadt schnell.",nt:"Kostenlos. Vom Schloss nach Norden gehen. Die Wiesen erstrecken sich kilometerweit."},
  {id:85,n:"Luthergarten — Altstadt #85",a:"Altstadt",v:["nature","history","hidden"],d:29,s:"500 trees planted by 500 churches worldwide for Luther\'s 500th anniversary — a global forest",st:"In 2017, 500 faith communities from around the world each planted a tree in this garden to mark the 500th anniversary of the Reformation. The garden is labelled with the country of each tree\'s planting community.",im:"Time-travel: delegations from 500 countries planting their trees on Reformation Day 2017",t:"Free. Find the tree from your own country.",c:["architecture"],r:"g",nn:"Luthergarten — Altstadt #85",ns:"500 Bäume von 500 Kirchen weltweit für Luthers 500. Jahrestag gepflanzt — ein globaler Wald",nst:"2017 pflanzte jede von 500 Glaubensgemeinschaften weltweit einen Baum zum 500. Reformationsjubiläum.",nt:"Kostenlos. Den Baum aus dem eigenen Land finden."},
  {id:86,n:"Collegienstraße Cobblestones — Collegienstraße #86",a:"Collegienstraße",v:["history","beautiful","local"],d:10,s:"The main street Luther walked every day — original cobblestones, unchanged proportions",st:"Collegienstraße connected Luther\'s house to the Stadtkirche, the Marktplatz, and the Schlosskirche. He walked it every day for 35 years. The width and scale of the street is exactly as it was.",im:"Time-travel: Luther walking this cobblestone street to give his morning lectures, 1525",t:"Free. Walk slowly. The buildings on each side date mostly from 16th-18th centuries.",c:["history_big"],r:"g",nn:"Collegienstraße Kopfsteinpflaster — Collegienstraße #86",ns:"Die Hauptstraße, die Luther täglich entlangging — originales Kopfsteinpflaster, unveränderte Proportionen",nst:"Collegienstraße verband Luthers Haus mit der Stadtkirche, dem Marktplatz und der Schlosskirche.",nt:"Kostenlos. Langsam gehen. Die Gebäude zu beiden Seiten datieren meist vom 16.-18. Jh."},
  {id:87,n:"Elbe Floodplain Meadows — Elbe #87",a:"Elbe",v:["nature","free","quiet"],d:40,s:"The Elbe floodplain outside Wittenberg — an ancient river ecosystem unchanged for centuries",st:"The Elbe floodplain is one of Europe\'s last intact river ecosystems. Seasonal floods, willows, and rare birds. The meadows are free and extend for kilometres north and south.",im:"Time-travel: these meadows flooding in 1550, Luther watching from the city walls",t:"Walk north along the river from the castle. The meadows start after 10 minutes.",c:["high_spots"],r:"g",nn:"Elbe-Überflutungswiesen — Elbe #87",ns:"Die Elbaue außerhalb von Wittenberg — ein uraltes Flussökosystem, jahrhundertelang unverändert",nst:"Die Elbaue ist eines der letzten intakten Flussökosysteme Europas.",nt:"Nördlich entlang des Flusses vom Schloss gehen. Die Wiesen beginnen nach 10 Minuten."},
  {id:88,n:"Melanchthonhaus Courtyard — Lutherplatz #88",a:"Lutherplatz",v:["history","quiet","hidden"],d:23,s:"Melanchthon\'s house — the best preserved Renaissance domestic building in Wittenberg",st:"Melanchthon\'s house is smaller than Luther\'s, reflecting their personalities. The courtyard garden is free to visit. The building is one of the best examples of a 16th century scholar\'s home in Europe.",im:"Time-travel: Melanchthon tutoring young students in this courtyard, 1540",t:"Courtyard free. Museum inside small entry fee.",c:["parks"],r:"g",nn:"Melanchthonhaus Hof — Lutherplatz #88",ns:"Melanchthons Haus — das besterhaltene Renaissancewohngebäude in Wittenberg",nst:"Melanchthons Haus ist kleiner als Luthers und spiegelt ihre Persönlichkeiten wider.",nt:"Hof kostenlos. Museum innen kleiner Eintritt."},
  {id:89,n:"Historic Cemetery — Altstadt #89",a:"Altstadt",v:["history","quiet","famous_dead"],d:45,s:"The cemetery of Reformation Wittenberg — professors, printers, and reformers side by side",st:"Wittenberg\'s historic cemetery holds the graves of the scholars who built the Reformation alongside Luther and Melanchthon. Some graves date from the 16th century. Free to walk any time.",im:"Time-travel: Reformation scholars being buried here, their colleagues debating theology over the graves",t:"Free. The oldest section is at the back.",c:["courtyards"],r:"g",nn:"Historischer Friedhof — Altstadt #89",ns:"Der Reformationsfriedhof Wittenbergs — Professoren, Drucker und Reformatoren Seite an Seite",nst:"Wittenbergs historischer Friedhof enthält die Gräber der Gelehrten, die die Reformation neben Luther aufbauten.",nt:"Kostenlos. Der älteste Abschnitt ist hinten."},
  {id:90,n:"Augusteum Courtyard — Schloss #90",a:"Schloss",v:["history","architecture","quiet"],d:44,s:"The Renaissance courtyard of the university building adjacent to the castle church",st:"The Augusteum was built as the university library in the 16th century. Luther\'s personal library was kept here. The Renaissance courtyard is free to enter and almost never visited by tourists.",im:"Time-travel: student disputations held in this courtyard, 1530 — Luther possibly watching from a window",t:"Free. Usually open during working hours.",c:["romantic_water"],r:"g",nn:"Augusteum Hof — Schloss #90",ns:"Der Renaissancehof des Universitätsgebäudes neben der Schlosskirche",nst:"Das Augusteum wurde im 16. Jh. als Universitätsbibliothek gebaut. Luthers Privatbibliothek war hier.",nt:"Kostenlos. Normalerweise während der Geschäftszeiten geöffnet."},
  {id:91,n:"Piesteritz Chemical Park Ruin Walk — Elbe #91",a:"Elbe",v:["weird","abandoned","hidden"],d:28,s:"The GDR chemical industrial complex — half demolished, half preserved, utterly strange",st:"The Piesteritz chemical works were among the GDR\'s largest. After 1990, much was abandoned. The surviving sections are still operational but the abandoned parts are gradually being reclaimed by nature.",im:"Time-travel: GDR workers cycling to the massive chemical plant gates at 6am, 1975",t:"Walk the perimeter from the Elbe side. Exterior free.",c:["scary"],r:"g",nn:"Piesteritz Industrieruinen — Elbe #91",ns:"Der DDR-Chemiepark — halb abgerissen, halb erhalten, völlig seltsam",nst:"Die Piesteritzer Chemiewerke gehörten zu den größten der DDR.",nt:"Den Umfang von der Elbseite abgehen. Außenbereich kostenlos."},
  {id:92,n:"Lutherstadt Wall Fragment — Altstadt #92",a:"Altstadt",v:["history","hidden"],d:41,s:"A surviving section of the 16th century city wall — hidden in the back streets",st:"Wittenberg\'s medieval walls were mostly demolished in the 19th century. A fragment survives near the Schloss end of the Altstadt. It is unmarked and unlisted in most guides.",im:"Time-travel: the full city wall of Wittenberg in 1517 — Luther lived inside it, the wall defining his world",t:"Walk along the back of Collegienstraße near the Schloss.",c:["famous_dead"],r:"g",nn:"Stadtmauerfragment — Altstadt #92",ns:"Ein erhaltener Abschnitt der Stadtmauer aus dem 16. Jh. — versteckt in den Hinterstraßen",nst:"Wittenbergs mittelalterliche Mauern wurden größtenteils im 19. Jh. abgerissen. Ein Fragment überlebt nahe dem Schloss.",nt:"Hinter der Collegienstraße nahe dem Schloss entlanggehen."},
  {id:93,n:"Bunkerberg Viewpoint — Elbe #93",a:"Elbe",v:["hidden","beautiful","history"],d:17,s:"A grassed WWII bunker hill — the best free view of the Elbe and Wittenberg",st:"A Second World War antiaircraft bunker was covered in earth and grass after 1945. The resulting hill gives the best view of the Elbe floodplain from above. Unmarked on most maps.",im:"Time-travel: antiaircraft crews on this bunker, watching Allied bombers pass over the Elbe, 1944",t:"Walk to the eastern edge of town toward the Elbe. The hill is visible from the path.",c:["street_art"],r:"g",nn:"Bunkerberg Aussichtspunkt — Elbe #93",ns:"Ein begraster WWII-Bunkerhügel — der beste kostenlose Blick über die Elbe und Wittenberg",nst:"Ein Zweiter Weltkrieg Flakbunker wurde nach 1945 mit Erde und Gras bedeckt. Gibt besten Blick.",nt:"Zum östlichen Stadtrand zur Elbe gehen. Der Hügel ist vom Weg aus sichtbar."},
  {id:94,n:"Wittenberg Hauptbahnhof — Altstadt #94",a:"Altstadt",v:["architecture","local"],d:50,s:"The Gründerzeit railway station from 1841 — still beautiful, still functioning, mostly forgotten",st:"Wittenberg\'s station opened in 1841, making it one of the earliest in Germany. The current building dates from the late 19th century and retains its original imperial-era character.",im:"Time-travel: first train arriving at Wittenberg station in 1841, townspeople running to see it",t:"Free to view. Take the train back to Berlin.",c:["abandoned"],r:"g",nn:"Wittenberg Hauptbahnhof — Altstadt #94",ns:"Der Gründerzeit-Bahnhof von 1841 — noch schön, noch funktionierend, meistens vergessen",nst:"Wittenbergs Bahnhof öffnete 1841, als einer der frühesten in Deutschland.",nt:"Kostenlos zu besichtigen. Mit dem Zug zurück nach Berlin fahren."},
  {id:95,n:"Cranach Fountain — Altstadt #95",a:"Altstadt",v:["history","beautiful"],d:9,s:"The Renaissance fountain on the Marktplatz — original 16th century stonework, still running",st:"The Marktplatz fountain dates from the 16th century. It stood here when Luther was alive. The water still runs. A small constant proof that things can survive centuries of history.",im:"Time-travel: Wittenberg citizens drawing water from this fountain in 1525",t:"Free. Touch it.",c:["free_museum"],r:"g",nn:"Cranachbrunnen — Altstadt #95",ns:"Der Renaissancebrunnen auf dem Marktplatz — originales Steinwerk aus dem 16. Jh., noch in Betrieb",nst:"Der Marktplatzbrunnen datiert aus dem 16. Jh. Er stand hier als Luther lebte.",nt:"Kostenlos. Anfassen."},
  {id:96,n:"Wittenberg Rathaus — Altstadt #96",a:"Altstadt",v:["history","architecture"],d:7,s:"The Renaissance town hall of 1523 — built in the year Luther was in hiding at the Wartburg",st:"The Rathaus was commissioned in 1523 when Luther was hiding in the Wartburg after the Diet of Worms. The building represents the secular confidence the Reformation gave to civic authorities.",im:"Time-travel: Luther returning to Wittenberg to find this town hall under construction, 1523",t:"Exterior free. Interior open weekdays.",c:["local_only"],r:"g",nn:"Wittenberg Rathaus — Altstadt #96",ns:"Das Rathaus der Renaissance von 1523 — im Jahr gebaut, als Luther sich auf der Wartburg versteckte",nst:"Das Rathaus wurde 1523 beauftragt, als Luther sich nach dem Wormser Reichstag auf der Wartburg versteckte.",nt:"Außenbereich kostenlos. Inneres werktags geöffnet."},
  {id:97,n:"Stadtkirche Bell Tower View — Altstadt #97",a:"Altstadt",v:["beautiful","high_spots"],d:47,s:"The twin towers of the Stadtkirche — climb for the oldest rooftop view in Wittenberg",st:"The Stadtkirche\'s towers offer the highest free viewpoint in Wittenberg. You see the castle church tower, the Elbe, and the flat Thuringian landscape extending to the horizon.",im:"Time-travel: Luther climbing these tower steps to look out at the world he was changing, 1520",t:"Small fee for the tower. The view is unique.",c:["architecture"],r:"g",nn:"Stadtkirche Turmblick — Altstadt #97",ns:"Die Zwillingstürme der Stadtkirche — besteigen für den ältesten Dachblick in Wittenberg",nst:"Die Stadtkirchtürme bieten den höchsten freien Aussichtspunkt in Wittenberg.",nt:"Kleiner Eintritt für den Turm. Der Blick ist einzigartig."},
  {id:98,n:"Luther\'s Garden — Lutherplatz #98",a:"Lutherplatz",v:["nature","history","quiet"],d:19,s:"The kitchen garden Katharina von Bora kept behind Luther\'s house — herbs, vegetables, peace",st:"Luther\'s wife Katharina was a practical genius who ran the household, brewed beer, managed the farm, and kept this garden. The reconstructed garden shows what a Reformation household actually grew.",im:"Time-travel: Katharina tending this garden in 1535, Luther writing upstairs, children playing between the beds",t:"Free to walk the garden perimeter. Museum garden free.",c:["history_big"],r:"g",nn:"Luthers Garten — Lutherplatz #98",ns:"Der Küchengarten, den Katharina von Bora hinter Luthers Haus pflegte — Kräuter, Gemüse, Frieden",nst:"Luthers Frau Katharina war eine praktische Meisterin, die den Haushalt führte und diesen Garten pflegte.",nt:"Gartenumfang kostenlos zu gehen. Museumsgarten kostenlos."},
  {id:99,n:"Lutherplatz Courtyard Houses — Lutherplatz #99",a:"Lutherplatz",v:["architecture","hidden"],d:54,s:"The Renaissance courtyard houses behind Lutherplatz — Reformation period domestic architecture",st:"The blocks immediately around Lutherplatz contain some of the best-preserved 16th century domestic architecture in Germany. The courtyard entrances are often open during the day.",im:"Time-travel: Reformation-era students renting rooms in these courtyard houses, 1530",t:"Push the courtyard doors on Lutherplatz. Most are open.",c:["high_spots"],r:"g",nn:"Lutherplatz Hofhäuser — Lutherplatz #99",ns:"Die Renaissancehofhäuser hinter dem Lutherplatz — Wohnarchitektur aus der Reformationszeit",nst:"Die Blöcke rund um den Lutherplatz enthalten einige der besterhaltenen Wohnarchitekturen Deutschlands aus dem 16. Jh.",nt:"Hoftor am Lutherplatz drücken. Meistens geöffnet."},
  {id:100,n:"Elbe River Sunrise — Elbe #100",a:"Elbe",v:["beautiful","quiet","nature"],d:23,s:"The Elbe at dawn — mist rising over the floodplain, cranes calling, Luther\'s towers on the skyline",st:"The Elbe at sunrise in autumn or winter is one of the most beautiful natural spectacles in Saxony-Anhalt. The cathedral tower of the Schlosskirche catches the first light while the river is still dark.",im:"Time-travel: Reformation pilgrims walking along the Elbe toward Wittenberg at dawn, 1520",t:"Come in October or November. Sunrise is around 7:30am.",c:["parks"],r:"g",nn:"Elbe-Sonnenaufgang — Elbe #100",ns:"Die Elbe bei Tagesanbruch — Nebel steigt über der Aue auf, Kraniche rufen, Luthers Türme am Horizont",nst:"Die Elbe bei Herbst-/Wintersonnenaufgang ist eines der schönsten Naturschauspiele in Sachsen-Anhalt.",nt:"Im Oktober oder November kommen. Sonnenaufgang ca. 7:30 Uhr."},
  {id:101,n:"Schlosskirche Door — Schloss #101",a:"Schloss",v:["history","beautiful"],d:10,s:"The door where Luther nailed 95 theses in 1517 — the beginning of the Reformation",st:"The original wooden door was destroyed in the Seven Years War. The current bronze door (1858) carries all 95 theses in Latin. You can read them. This is where the modern world arguably began.",im:"Time-travel: October 31 1517 — Luther at this door, hammer in hand, 95 arguments against Rome",t:"Always free to stand at the door. Enter the church for free.",c:["courtyards"],r:"g",nn:"Schlosskirche Tür — Schloss #101",ns:"Die Tür, an der Luther 1517 seine 95 Thesen nagelte — der Beginn der Reformation",nst:"Die originale Holztür wurde im Siebenjährigen Krieg zerstört. Die Bronzetür (1858) trägt alle 95 Thesen auf Latein.",nt:"Immer kostenlos an der Tür stehen. Kirche kostenlos eintreten."},
  {id:102,n:"Marktplatz — Altstadt #102",a:"Altstadt",v:["history","local","beautiful"],d:19,s:"The market square where Luther and Melanchthon stand bronze-faced — and where the Reformation was born into public life",st:"The twin statues of Luther and his colleague Melanchthon face each other across the market square. Between them: the Rathaus that witnessed all of it. This square was the arena of the Reformation.",im:"Time-travel: Luther and Melanchthon crossing this square together, arguing theology in public, 1520",t:"Free. The Rathaus interior is open. Walk the square slowly.",c:["romantic_water"],r:"g",nn:"Marktplatz — Altstadt #102",ns:"Der Marktplatz, wo Luther und Melanchthon aus Bronze blicken — und wo die Reformation ins öffentliche Leben trat",nst:"Die Doppelstatuen von Luther und Melanchthon stehen einander gegenüber. Dazwischen das Rathaus.",nt:"Kostenlos. Das Rathaus ist offen. Den Platz langsam durchqueren."},
  {id:103,n:"Stadtkirche St. Marien — Altstadt #103",a:"Altstadt",v:["history","beautiful","quiet"],d:11,s:"The church where Luther preached — original pulpit, original Luther-era altar triptych by Cranach",st:"Luther preached here regularly. The Reformation altarpiece by Lucas Cranach (1547) shows Luther preaching from the pulpit, with the congregation visible below. A painting of a preacher, in the church where he preached.",im:"Time-travel: Luther preaching in this church — voice filling the Gothic nave, congregation transfixed",t:"Free to enter. Stand where Luther stood.",c:["scary"],r:"g",nn:"Stadtkirche St. Marien — Altstadt #103",ns:"Die Kirche, in der Luther predigte — originale Kanzel, originaler Cranach-Altar",nst:"Luther predigte hier regelmäßig. Das Reformationsaltarbild von Cranach (1547) zeigt Luther auf der Kanzel.",nt:"Kostenlos einzutreten. Dort stehen, wo Luther stand."},
  {id:104,n:"Luthereiche — Collegienstraße #104",a:"Collegienstraße",v:["history","hidden","weird"],d:29,s:"An oak tree marking where Luther publicly burned the Pope\'s decree in 1520 — an act of no return",st:"In December 1520, Luther carried the Pope\'s excommunication decree to this spot and burned it publicly in front of students. An oak tree now marks the site. After this there was no going back.",im:"Time-travel: December 1520 — Luther throws the papal decree into fire, students watching, laughing, horrified",t:"Free. The plaque explains everything. The tree is symbolic — not the original.",c:["famous_dead"],r:"g",nn:"Luthereiche — Collegienstraße #104",ns:"Eine Eiche, die die Stelle markiert, wo Luther 1520 öffentlich das päpstliche Dekret verbrannte — ein Akt ohne Rückkehr",nst:"Im Dezember 1520 verbrannte Luther das Exkommunikationsdekret an dieser Stelle öffentlich vor Studenten.",nt:"Kostenlos. Die Plakette erklärt alles. Der Baum ist symbolisch — nicht das Original."},
  {id:105,n:"Lutherhaus Courtyard — Lutherplatz #105",a:"Lutherplatz",v:["history","quiet","beautiful"],d:22,s:"The courtyard of Luther\'s house — an Augustinian monastery courtyard where he lived 35 years",st:"Luther moved into this Augustinian monastery cloister in 1508. He lived here until his death in 1546. He married Katharina von Bora here. The courtyard is as he would have known it.",im:"Time-travel: Luther and Katharina sitting in this courtyard on summer evenings, children running between them",t:"The courtyard is free. Museum inside has entry fee.",c:["street_art"],r:"g",nn:"Lutherhaus Hof — Lutherplatz #105",ns:"Der Hof von Luthers Haus — ein Augustinerklosterhof, in dem er 35 Jahre lebte",nst:"Luther zog 1508 in diesen Augustinerklosterhof ein. Er lebte hier bis zu seinem Tod 1546.",nt:"Hof kostenlos. Museum innen mit Eintritt."}

  {id:107,n:"Luthergarten “500 Trees”",a:"Centro",v:["free","local","hidden"],d:15,s:"Luthergarten “500 Trees” — a living, international monument with hundreds of planted — free local gem",st:"Luthergarten “500 Trees” — a living, international monument with hundreds of planted trees; good for a quiet, romantic wander and people-watching. Tip: hunt for “partner trees” plaques and pick your f",im:"Time-travel: Historic significance or modern transformation.",t:"Free to visit/explore. Local tips apply.",c:["local_only","hidden"],r:"g",nn:"Wittenberg",ns:"Joya oculta local — Luthergarten “500 Trees” — a",nst:"Luthergarten “500 Trees” — a living, international monument with hundreds of planted trees; good for a quiet, romantic wander and people-watching. Tip",nt:"Acceso gratuito. Consejos locales aplican."},
  {id:108,n:"Cranach Courtyards (Cranach-Höfe)",a:"Centro",v:["free","local","hidden"],d:15,s:"Cranach Courtyards (Cranach-Höfe) — Renaissance courtyards hidden behind street fronts (Market 4 — free local gem",st:"Cranach Courtyards (Cranach-Höfe) — Renaissance courtyards hidden behind street fronts (Market 4 and Schlossstraße 1); you can freely duck into the courtyards for atmosphere, photos, and a “secret pas",im:"Time-travel: Historic significance or modern transformation.",t:"Free to visit/explore. Local tips apply.",c:["local_only","hidden"],r:"g",nn:"Wittenberg",ns:"Joya oculta local — Cranach Courtyards (Cranach-Höfe) — Renaissance",nst:"Cranach Courtyards (Cranach-Höfe) — Renaissance courtyards hidden behind street fronts (Market 4 and Schlossstraße 1); you can freely duck into the co",nt:"Acceso gratuito. Consejos locales aplican."},
  {id:109,n:"Advent Courtyards (Cranach courtyards + church square)",a:"Centro",v:["free","local","hidden"],d:15,s:"Advent Courtyards (Cranach courtyards + church square) — on two Advent weekends, — free local gem",st:"Advent Courtyards (Cranach courtyards + church square) — on two Advent weekends, the Christmas market expands into “Advent courtyards,” which is more intimate/romantic than the main square. Tip: go fo",im:"Time-travel: Historic significance or modern transformation.",t:"Free to visit/explore. Local tips apply.",c:["local_only","hidden"],r:"g",nn:"Wittenberg",ns:"Joya oculta local — Advent Courtyards (Cranach courtyards +",nst:"Advent Courtyards (Cranach courtyards + church square) — on two Advent weekends, the Christmas market expands into “Advent courtyards,” which is more ",nt:"Acceso gratuito. Consejos locales aplican."},
  {id:110,n:"Reformation Day historical market vibe (Oct 31)",a:"Centro",v:["free","local","hidden"],d:15,s:"Reformation Day historical market vibe (Oct 31) — the city runs a — free local gem",st:"Reformation Day historical market vibe (Oct 31) — the city runs a historical market for Reformation Day that turns the center into a time-warp; great for broke travelers because the “show” is the stre",im:"Time-travel: Historic significance or modern transformation.",t:"Free to visit/explore. Local tips apply.",c:["local_only","hidden"],r:"g",nn:"Wittenberg",ns:"Joya oculta local — Reformation Day historical market vibe",nst:"Reformation Day historical market vibe (Oct 31) — the city runs a historical market for Reformation Day that turns the center into a time-warp; great ",nt:"Acceso gratuito. Consejos locales aplican."},
  {id:111,n:"Wine festival on the Market Square (summer)",a:"Centro",v:["free","local","hidden"],d:15,s:"Wine festival on the Market Square (summer) — multiple winegrowers + stage — free local gem",st:"Wine festival on the Market Square (summer) — multiple winegrowers + stage program on the Markt; you can enjoy the music/dancing and people-watch for free. City of Lutherstadt Wittenberg (Events)",im:"Time-travel: Historic significance or modern transformation.",t:"Free to visit/explore. Local tips apply.",c:["local_only","hidden"],r:"g",nn:"Wittenberg",ns:"Joya oculta local — Wine festival on the Market",nst:"Wine festival on the Market Square (summer) — multiple winegrowers + stage program on the Markt; you can enjoy the music/dancing and people-watch for ",nt:"Acceso gratuito. Consejos locales aplican."}
  {id:112,n:"Schlosskirche at 6am — Schloss",a:"Schloss",v:["famous","history_big","beautiful"],d:10,s:"The Castle Church before the pilgrims arrive — bronze door catching dawn light, absolutely silent, completely yours.",st:"Everyone comes to see Luther's 95 Theses door. Come at 6am instead. The church is empty. Light pours through the Gothic windows and lands on the Renaissance altar. You can hear the Elbe from the tower windows. This is not the tourist experience — this is why the place actually matters.

The door is there. The theses are still there. But at this hour you feel what Reformation-era pilgrims felt arriving at dawn to pray, not to sightsee.",im:"Standing alone in the nave at 6am. Candlelight. The floor still cold. Bronze casting morning light copper-gold on the massive door.",t:"Church opens 10am weekdays, 11:30am Sunday. Come the night before and sleep nearby, or catch the 5:47am train from Berlin. Tower climbing ends at 4pm, so do the door first. Entry is free.",c:["greatest_hits","history_big","beautiful"],r:"g",nn:"Schlosskirche um 6 Uhr morgens — Schloss",ns:"Die Schlosskirche vor den Pilgern — Bronzetür im Morgenlicht, absolut still, ganz dir gehörend",nst:"Alle kommen, um Luthers Tür zu sehen. Komm stattdessen um 6 Uhr morgens. Die Kirche ist leer. Licht gießt durch die gotischen Fenster und landet auf dem Renaissancealtar. Man kann die Elbe von den Turmfenstern hören.

Die Tür ist da. Die Thesen sind noch da. Aber zu dieser Stunde fühlst du, was Reformations-Pilger fühlten, wenn sie bei Tagesanbruch ankamen zum Beten, nicht zum Sightseeing.",nt:"Kirche öffnet 10 Uhr Mo-Fr, 11:30 Uhr So. Komm die Nacht davor an und schlaf in der Nähe, oder nimm den 5:47-Uhr-Zug aus Berlin. Turmbesteigung endet 14 Uhr."},
  {id:113,n:"Wörlitzer Park — Dessau",a:"Dessau",v:["day_trips","beautiful","romantic_water"],d:45,s:"The first English landscape park on mainland Europe — 112 hectares of lakes, islands, and ferries Prince Franz built for himself in 1769.",st:"Three kilometers from Wittenberg sits Wörlitzer Park, which UNESCO recognized not for being the oldest or grandest but for being the *first* mainland European garden in the English landscape style. Prince Franz of Anhalt-Dessau returned from Italy obsessed with a specific idea: you could design a landscape the way you design a painting.

The result is extraordinary. 112 hectares of intentional beauty — lakes with islands, bridges, ferries, gondolas, hidden grottos, follies that look like they belong in Romanticism paintings. The whole thing is walkable. The whole thing feels intentional and completely alive at once.

Go in April when the magnolias bloom or in autumn when the reflection game gets insane.",im:"Punting a gondola across the lake at dusk. Trees on islands. The water mirroring everything. No crowds. Just you and the prince's century-old idea that landscapes could be art.",t:"From Wittenberg: bus 304 or 310 directly (1 hour, €3.50 return). The park is free to walk. Gondola tours cost €6–12. Guided tours daily at 1pm are free with the Welterbe Card (€25 for 3 days, covers all regional sites). Combine with Dessau's Bauhaus buildings — bus connection is direct and hourly.",c:["day_trips","beautiful","romantic_water"],r:"g",nn:"Wörlitzer Park — Dessau",ns:"Der erste englische Landschaftspark auf dem europäischen Festland — 112 Hektar Seen, Inseln und Fähren, die Fürst Franz 1769 für sich selbst baute",nst:"Drei Kilometer von Wittenberg entfernt liegt der Wörlitzer Park, den die UNESCO nicht für das Älteste oder Grandioseste erkannte, sondern für das *Erste* Festland-europäische Garten im englischen Landschaftsstil. Fürst Franz von Anhalt-Dessau war besessen von einer Idee: Man könne eine Landschaft so gestalten wie ein Gemälde.

Das Ergebnis ist außergewöhnlich. 112 Hektar beabsichtigte Schönheit — Seen mit Inseln, Brücken, Fähren, Gondeln, versteckte Grotten. Das Ganze ist begehbar. Das Ganze wirkt beabsichtigt und vollständig lebendig zugleich.",nt:"Von Wittenberg: Bus 304 oder 310 direkt (1 Stunde, €3,50 Rückfahrt). Der Park ist kostenlos zu gehen. Gondel-Touren kosten €6–12. Führungen täglich 13 Uhr sind mit der Welterbe Card kostenlos (€25 für 3 Tage)."},
  {id:114,n:"Badestelle Steubnitz — Elbe",a:"Elbe",v:["swimming","local","hidden"],d:20,s:"The locals' Elbe swimming spot — a cleared bank, summer-only, 15 minutes on foot north from the town center.",st:"The Elbe is dangerous for casual swimmers — strong currents, unpredictable shallows. But there is one spot locals know where the bank is lower, the water has been checked, and in summer (June–August) it's swimmable. Steubnitz is small, unglamorous, full of families and cyclists on weekends.

The water is cold even in July. The current is real. But Reformation pilgrims crossed this river. Modern Wittenberg residents still swim in it. If the conditions are right and you're a confident swimmer, the experience of floating in the river that divided Luther's world is something else.",im:"Water colder than expected. Your body adjusting. Downstream, the willows on the far bank. Behind you, the castle towers still visible. No one else in the water. Just you and the current.",t:"Walk north from Schlosskirche for 15 mins toward Pratau. The clearing is marked. Summer only (June–August, water tested twice weekly). No facilities. Go on a weekday to avoid crowds. Check local conditions first — ask at any café.",c:["swimming","local"],r:"y",nn:"Badestelle Steubnitz — Elbe",ns:"Der Elbe-Badesplatz der Einheimischen — eine geräumte Uferseite, nur im Sommer, 15 Minuten Fußweg nördlich vom Stadtzentrum",nst:"Die Elbe ist gefährlich für beiläufige Schwimmer — starke Strömungen, unvorhersehbare Flachstellen. Aber es gibt einen Spot, den Einheimische kennen, wo das Ufer niedriger ist und das Wasser im Sommer schwimmbar ist. Steubnitz ist klein, unglamourös, voll Familien und Radfahrer am Wochenende.",nt:"15 Min Fußweg nach Norden vom Schloss zum Stadtzentrum Richtung Pratau. Nur Sommer (Juni–August). Keine Anlagen. Unter der Woche gehen. Vorher lokale Bedingungen checken."},
  {id:115,n:"Lucas Cranach Print Shop — Markt 4",a:"Altstadt",v:["history","nerd_pilgrimage","hidden"],d:8,s:"The exact spot where Luther's Bible translations were printed — the house where Cranach ran a print shop with his business partner.",st:"Lucas Cranach wasn't just a painter. He was a printer, publisher, and businessman. At Markt 4, Cranach and his partner Christian Döring ran a print shop. This is where Martin Luther's German Bible translation was printed and distributed — the translation that changed the German language forever.

You're standing in the building where the most influential German text of the 16th century was made. The walls are original Renaissance construction. The courtyard behind is accessible and looks almost exactly as it did in the 1530s.",im:"Printing press in the courtyard. Ink on hands. Stacks of fresh Bible pages. The sound of the press. The smell of damp paper.",t:"The building is now a museum (Cranach House). Entry €5–7. Courtyard visible for free if the gate is open. Weekdays and weekends 10am–5pm. The courtyard is genuinely beautiful even if you skip the museum.",c:["nerd_pilgrimage","history","hidden"],r:"g",nn:"Lucas Cranach Druckerei — Markt 4",ns:"Der exakte Ort, wo Luthers Bibelübersetzungen gedruckt wurden — das Haus, wo Cranach eine Druckerei betrieb",nst:"Lucas Cranach war nicht nur Maler. Er war auch Drucker, Verleger und Geschäftsmann. Am Markt 4 betrieben Cranach und sein Partner Christian Döring eine Druckerei. Hier wurden Martin Luthers deutsche Bibelübersetzungen gedruckt und verbreitet — die Übersetzung, die die deutsche Sprache für immer veränderte.",nt:"Das Gebäude ist jetzt ein Museum (Cranach-Haus). Eintritt €5–7. Hof sichtbar kostenlos, wenn das Tor offen ist. Mo–So 10–17 Uhr."},
  {id:116,n:"Melanchthon House — Collegienstraße 60",a:"Altstadt",v:["history","nerd_pilgrimage","quiet"],d:12,s:"Philipp Melanchthon's house — Luther's intellectual partner, the guy who actually organized the Reformation.",st:"Luther gets the fame. Melanchthon built the system. This is his house, preserved and open. Melanchthon was a scholar, a teacher, a diplomat who negotiated with emperors, and the closest intellectual companion Luther had.

The house is smaller and quieter than Luther's, and therefore oddly more intimate. You can see where he wrote. You can see the books (originals). You can see the space where one of the smartest men of the 16th century spent his evenings.

Almost nobody comes here. Luther's house is mobbed. This house is empty.",im:"A scholar's study, candlelit. Books everywhere. Small handwriting on a page. The scratch of a quill. Melanchthon working while Luther was preaching.",t:"Melanchthonhaus: €5 entry. Weekdays and weekends 10am–5pm. It's 5 minutes walk south from the Marktplatz. Combined ticket with Luther House: €10.",c:["nerd_pilgrimage","history","quiet"],r:"g",nn:"Melanchthon-Haus — Collegienstraße 60",ns:"Philipp Melanchthons Haus — Luthers intellektueller Partner, der Mann, der die Reformation eigentlich organisierte",nst:"Luther bekommt den Ruhm. Melanchthon baute das System. Dies ist sein Haus, bewahrt und offen. Melanchthon war ein Gelehrter, Lehrer, ein Diplomat, der mit Kaisern verhandelte.",nt:"Melanchthon-Haus: €5 Eintritt. Mo–So 10–17 Uhr. 5 Minuten Fußweg südlich vom Marktplatz."},
  {id:117,n:"Hundertwasser School — Friedrichstraße",a:"Outskirts",v:["weird","architecture","local"],d:25,s:"The GDR school building reborn as a Hundertwasser masterpiece — wavy lines, bright color, pure joy.",st:"In 1990, a gray GDR-era school building sat on Friedrichstraße like a brutalist tombstone. Students in art class designed what their school should look like instead. Their sketches looked like Hundertwasser.

So they found Friedensreich Hundertwasser, the Viennese artist who hated straight lines and ruled. He redesigned the building. By 1999 it was finished. Now it's the most visually alive school building in Germany — curved walls, organic shapes, a green roof, windows that look like they grew from trees. The front entrance is a color explosion.

Locals come here to take photos. It's luminously happy. It's strange and correct.",im:"Curved walls. Windows that aren't rectangular. A wall that's golden yellow. Another that's turquoise. Everything breathing slightly. This building is alive.",t:"Free to photograph the exterior. Group tours inside if you book ahead (school office: +49 3491 4053 0). It's in the north part of town, 20 minutes walk or a short bus ride. Best light is late afternoon (3–5pm).",c:["weird","architecture","local"],r:"g",nn:"Hundertwasser-Schule — Friedrichstraße",ns:"Das GDR-Schulgebäude wiedergeboren als Hundertwasser-Meisterwerk — wellige Linien, helle Farbe, pure Freude",nst:"1990 war ein graues SED-Schulgebäude wie ein brutalistisches Grabmal da. Schüler im Kunstunterricht gestalten, wie ihre Schule aussehen sollte statt. Sie wirkten wie Hundertwasser.",nt:"Kostenlos von außen fotografieren. Gruppenführungen innen, wenn Sie vorher anmelden (Schulbüro). Im Norden der Stadt, 20 Min Fußweg."},
  {id:118,n:"Elbe Biosphere Reserve — Pratau",a:"Elbe",v:["nature","day_trips","free entry","local"],d:35,s:"The Central Elbe floodplain — 50 kilometers of untouched river ecosystem, crane migration highway, complete silence.",st:"The Elbe between Wittenberg and Magdeburg flows through the Central Elbe Biosphere Reserve — a UNESCO-protected landscape where the river still does what it wants. The floodplain is wild. Oak forests, wetlands, the river changing course annually.

Migrating cranes use this as a highway. In October and November they arrive by the thousands. The sound is like the entire sky is honking. Locals drive out at dawn to see them.

There are no tourist facilities here. No boardwalks. No marked trails. Just a gravel road following the river. You rent a bike in Wittenberg (€8/day) and ride into absolute quiet.",im:"Morning mist over the floodplain. Cranes lifting off the banks. The sound of thousands of wings. The Elbe wide and slow and brown.",t:"Bike rental at Wittenberg train station (Bike & Outdoor Center) or anywhere downtown. Rent for €8/day. Take the gravel road north from Pratau (5km northeast of Wittenberg). October–November for cranes. Summer is green but hotly humid. No facilities — bring water.",c:["nature","day_trips","free entry"],r:"g",nn:"Elbe-Biosphärenreservat — Pratau",ns:"Das Elbetal-Auengebiet — 50 Kilometer unberührter Flussökosysteme, Kranichzugstraße, komplette Stille",nst:"Die Elbe zwischen Wittenberg und Magdeburg fließt durch das Mittlere-Elbe-Biosphärenreservat — eine UNESCO-geschützte Landschaft, wo der Fluss noch tut, was er will. Das Auengebiet ist wild. Eichenwälder, Feuchtgebiete.",nt:"Fahrradverleih am Bahnhof Wittenberg oder überall in der Innenstadt. €8/Tag. Oktober–November für Kraniche. Keine Anlagen — Wasser mitbringen."},
  {id:119,n:"Wittenberg Old Town Ramparts — Stadtmauer",a:"Outskirts",v:["quiet","local","beautiful"],d:30,s:"A walking path along the old city walls — completely traffic-free, locals-only, edges of the old town where nobody tours.",st:"The medieval city walls still stand. The outer ring is now a green belt path. Locals walk here. Cyclists cruise it. Almost no tourists know it exists. The path gives you the entire shape of Reformation-era Wittenberg — what was defended, what was outside, what was precious enough to wall off.

Walk it at dawn and the grass is wet and the light hits the old stone perfectly. Walk it on Saturday morning and you see the actual life of the town happening on the edges.",im:"Tree-lined path. Stone walls half-hidden by ivy. The back gardens of old houses over the wall. Completely quiet. The smell of cut grass in summer.",t:"Start from anywhere on the perimeter. The path is marked. Free. Best in spring (April–May) or autumn (September–October). Morning is best.",c:["quiet","local","beautiful"],r:"g",nn:"Wittenberger Stadtmauer-Weg — Stadtmauer",ns:"Ein Spazierweg entlang der alten Stadtmauern — völlig autofrei, nur Einheimische, an den Rändern der Altstadt",nst:"Die mittelalterlichen Stadtmauern stehen noch. Der äußere Ring ist jetzt ein grüner Gürtelweg. Einheimische gehen hier. Radfahrer fahren. Kaum Touristen wissen, dass es existiert.",nt:"Überall am Umfang starten. Der Weg ist markiert. Kostenlos. Beste Zeit Frühling oder Herbst. Morgens am besten."},
  {id:120,n:"Wittenberg Bakeries at 6am — Multiple locations",a:"Altstadt",v:["local","free entry","quiet"],d:10,s:"The bread ovens of Wittenberg before the day starts — still-warm rolls, the smell that changed the town.",st:"German bakeries open at 5am. Wittenberg's best ones (Bäckerei Neumann on Collegienstraße, Bäckerei Schmidt near the Markt) have customers at 5:30am — locals buying Brötchen for breakfast.

This is the actual Wittenberg. Not the Reformation, not the tours. Just people buying warm bread. The ovens have been running since 3am. The smell is everywhere.

If you stay in Wittenberg overnight, wake up at 5:45am, walk to any bakery, order a Schrippe (pretzel roll), a Laugenbrezel (dark roll), and a coffee. Sit in the bakery for 20 minutes. You'll see more of Wittenberg's life than in three hours of the main square.",im:"Still-warm roll. Steam rising. Butter. The baker nodding at regular customers. The sound of the espresso machine. German morning efficiency.",t:"Any Bäckerei opens 5:30am. Collegienstraße and near Marktplatz are the main streets. Expect €1–3 for bread and coffee. No English, bring euros.",c:["local","quiet","free entry"],r:"g",nn:"Wittenberg Bäckereien um 6 Uhr morgens — Multiple Standorte",ns:"Die Backöfen von Wittenberg vor Tagesanbruch — noch warme Brötchen, der Duft, der die Stadt veränderte",nst:"Deutsche Bäckereien öffnen um 5 Uhr. Die besten von Wittenbergs Bäckereien haben um 5:30 Uhr Kunden — Einheimische, die Brötchen kaufen.",nt:"Jede Bäckerei öffnet 5:30 Uhr. Collegienstraße und Nähe Marktplatz sind Hauptstraßen. €1–3 für Brot und Kaffee."},
  {id:121,n:"Cranach Trail Self-Walk — Altstadt",a:"Altstadt",v:["history","nerd_pilgrimage","free entry"],d:15,s:"Six historic sites connected by Lucas Cranach — painter, businessman, Reformation propagandist in one Renaissance guy.",st:"Cranach was everywhere in Reformation Wittenberg. You can walk a self-guided trail connecting six sites in the town center:

1. Markt 4 (print shop where he published Luther)
2. Schlossstraße 1 (his original workshop, now private)
3. Castle Church (his paintings are here)
4. Town Church (his most famous altarpiece)
5. Luther House (he painted Luther repeatedly)
6. Market Square (Cranach statue and monument)

Each location takes 5–10 minutes. The whole walk takes 90 minutes if you stop and really look. The story you're following is how one artist documented and shaped the Reformation through image. Before Instagram, Cranach was using image to spread ideas.",im:"Standing in front of a Cranach painting of Luther. Then walking to the church where Luther actually preached, three blocks away. The trail collapses distance and time.",t:"Free. Get a walking map at the Wittenberg tourist office (Marktplatz, weekdays 9am–6pm). Or just follow a GPS map you make yourself from these six coordinates. No tour needed.",c:["nerd_pilgrimage","history","free entry"],r:"g",nn:"Cranach-Weg Selbstführung — Altstadt",ns:"Sechs historische Orte verbunden durch Lucas Cranach — Maler, Geschäftsmann, Reformations-Propagandist in einer Person",nst:"Cranach war überall im Reformations-Wittenberg. Du kannst einen selbstgeführten Weg gehen, der sechs Orte in der Innenstadt verbindet.",nt:"Kostenlos. Besorge eine Wanderkarte im Wittenberg Tourismusbüro (Marktplatz, Mo–Fr 9–18 Uhr). Oder mach dir selbst einen GPS-Map aus diesen sechs Koordinaten."},
  {id:122,n:"Elbe Cycle Path to Belgern — Elbe",a:"Elbe",v:["day_trips","cycling","local"],d:60,s:"Flat 30km bike ride north along the Elbe to Belgern — lunch at a riverside café, back by evening.",st:"The Elbe Cycle Path (Elberadweg) is one of Europe's most popular long-distance bike routes. From Wittenberg, you can ride north for 30km in flat terrain alongside the river, reaching the small town of Belgern where the first medieval stone bridge crosses the Elbe.

Belgern has exactly one café with a terrace overlooking the water. Lunch there is €8–12. The return ride is downwind and takes 2.5 hours.

Locals do this casually on weekends. Tourists rarely venture past the Wörlitz Park connection.",im:"Pedaling through flat landscape. River on one side. Wind direction finally in your favor on the return. The Belgern bridge appearing downstream. Water reflections perfect.",t:"Rent a bike in Wittenberg (€8/day). Bring water. The path is marked the entire way. Belgern is 30km (2 hours). Lunch money and lights for return (sunset is early).",c:["day_trips","cycling","local"],r:"g",nn:"Elberadweg nach Belgern — Elbe",ns:"Flache 30-km-Radstrecke nach Norden entlang der Elbe nach Belgern — Mittagessen in einem Flussufer-Café, zurück bis abends",nst:"Der Elberadweg ist einer der beliebtesten Fernradwege Europas. Von Wittenberg kannst du 30 km nach Norden in flachem Gelände entlang des Flusses fahren.",nt:"Fahrrad in Wittenberg mieten (€8/Tag). Wasser mitnehmen. Der Weg ist markiert. Belgern ist 30 km (2 Stunden)."},
  {id:123,n:"Wittenberg Street Art — Side streets",a:"Outskirts",v:["weird","local","hidden"],d:20,s:"Colorful murals and street art on the sides of ordinary apartment buildings — the modern Wittenberg painting itself.",st:"Between the Reformation tourism and the ramparts, Wittenberg has developed a serious street art scene. Murals cover walls on Lutherstraße, Kurstraße, and the side streets north of the Hundertwasser School. They're not political — they're playful, surreal, colorful.

The artists are often local. The murals change. This is the part of Wittenberg that isn't curated for tourists. It's the town painting itself.",im:"Bright colors on gray concrete. A surreal face. A geometric pattern that shouldn't work but does. Modern art on a Soviet-era apartment block.",t:"Free. Best light late afternoon. North of Friedrichstraße has the highest concentration. Bring a camera.",c:["weird","local","hidden"],r:"g",nn:"Wittenberg Street Art — Seitenstraßen",ns:"Farbenfrohe Murals und Street Art an den Seiten von normalen Wohnblöcken — das moderne Wittenberg malt sich selbst",nst:"Zwischen Reformations-Tourismus und Stadtmauern hat Wittenberg eine ernsthafte Street-Art-Szene entwickelt. Wandbilder bedecken Wände an der Lutherstraße, Kurstraße.",nt:"Kostenlos. Bestes Licht spätnachmittags. Nördlich der Friedrichstraße höchste Konzentration."},
  {id:124,n:"Museum of Municipal Collections (Zeughaus) — Altstadt",a:"Altstadt",v:["history","weird","local"],d:12,s:"The actual junk of Wittenberg families — random objects that tell what daily life was like when Luther was alive and after.",st:"The Zeughaus holds Wittenberg's Municipal Collections — not precious things, but ordinary things. A coffee grinder from 1840. A child's wooden toy. A ledger book from a merchant. A Napoleonic soldier's uniform discovered in an attic.

The collection is completely unordered by importance — a Reformation-era gold ring sits next to a 1920s sewing machine. The effect is strange and intimate. You're seeing the actual texture of how people lived.

It's small. 30–45 minutes is enough. It's weird because nothing is labeled as precious. It's all just... stuff that mattered once.",im:"Glass cases. Wooden objects darkened by age. The small things people kept. A pendant. A key. The intimacy of objects touched by dead hands.",t:"€5 entry. Zeughaus, Elbstraße 5. Weekdays and weekends 10am–5pm (closed Mondays). Very few tourists.",c:["history","weird","local"],r:"g",nn:"Museum für Stadtgeschichte (Zeughaus) — Altstadt",ns:"Der echte Kram von Wittenberger Familien — zufällige Objekte, die zeigen, wie das tägliche Leben war",nst:"Das Zeughaus hält Wittenbergs Stadtgeschichte — nicht wertvolle Dinge, sondern gewöhnliche Dinge. Eine Kaffeemühle von 1840. Ein Holzspielzeug eines Kindes.",nt:"€5 Eintritt. Zeughaus, Elbstraße 5. Mo–So 10–17 Uhr (montags geschlossen). Sehr wenige Touristen."}

const PhrasesCard=()=>(

</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Lutherstadt Wittenberg Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
