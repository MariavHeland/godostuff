const P = [
  {id:1,n:"Mediterranean Beach Walk — Urban Shoreline",a:"Beachfront",v:["nature", "views", "local"],d:20,s:"Continuous sandy beaches with promenades, restaurants, and swimming, running the entire length of Tel Aviv.",st:"Tel Aviv's beach is its oxygen. Stretching from north to south, the sandy shore and beachfront promenade (tayelet) is where the city lives its leisure hours. The beaches vary in character: Hilton Beach is cosmopolitan; Banana Beach is LGBTQ-friendly; Gordon Beach is family-oriented; Nordau is bohemian. The Mediterranean is warm enough for swimming April-November; the water is surprisingly clear. The beach culture is distinctly Israeli: mixed religious and secular communities, families alongside business colleagues conducting meetings on lounge chairs, lifeguard stations with bronze statuary, and endless volleyball and matkot (paddle ball) games. The promenade bustles with cafés, ice cream stands, and restaurants. At sunset, the entire city seems to migrate to the beach. The beach is democratic: a billionaire sits next to a student on the same sand.",im:"Volleyball players spike at sunset as the Mediterranean turns golden, and the city's lights begin to twinkle along the shore.",t:"Beaches are free and accessible. Lifeguards patrol in summer. Swimming outside lifeguard hours is risky. Bring a towel and sunscreen; sun is intense. Rentals available for loungers and umbrellas. Cafés serve excellent coffee and salads. Busiest on weekends; go early morning for peace.",c:[],r:"g",nn:"הטיילת",ns:"חוף ים יפה במרכז העיר",nst:"חוף חולי רציף על כל אורך תל אביב. חיים מלאים של תל אביבים בחוף.",nt:"חינם ולנגיש. השמש חזקה מאד. השתמש בקרם הגנה. הספא מלאה ביום שישי."},
  {id:2,n:"Tel Aviv Museum of Art — Design and Modernism",a:"South City",v:["art", "architecture", "hidden"],d:25,s:"Modern art museum with Israeli contemporary works, photography, and design, plus historical Israeli artists.",st:"The Tel Aviv Museum of Art is housed in a striking modernist building (expanded in 2011). The collection spans Israeli art from the 1920s to present: early pioneers who attempted to paint the landscape of a new nation; abstract artists from the 1960s; contemporary installations addressing political tensions and identity. Photography is a particular strength: Israeli photographers documenting daily life, conflict, and culture. The design collection showcases Israeli graphic design and industrial products. Unlike European museums focused on Old Masters, this museum tells a national story—how visual culture develops in a young nation. The exhibitions rotate frequently. The rooftop sculpture terrace offers views of south Tel Aviv. The museum is less crowded than historical museums elsewhere; you can actually stand before artworks without mobs.",im:"A photograph of a young Israeli soldier's face fills a gallery wall, their eyes haunted by responsibility beyond their years.",t:"Located south of city center on Shaul Hamelech Boulevard. Open daily except Mondays; closed Friday afternoons. Entrance fee moderate. Allow 2-3 hours. Café on-site. English signage throughout. Photography allowed in most galleries.",c:[],r:"g",nn:"מוזיאון תל אביב",ns:"מוזיאון אמנות עם יצירות מודרניות",nst:"מוזיאון אמנות עברית מודרנית. קולקציה של אמנים ישראליים מן 1920 עד היום.",nt:"פתוח כל ימי השבוע חוץ שני. מחיר כניסה סביר. קפה בתוך המוזיאום."},
  {id:3,n:"Old Jaffa (Yafo) — Ottoman Charm and Ancient Port",a:"South City",v:["history", "architecture", "hidden"],d:30,s:"Historic port city now a tourist quarter with narrow alleys, galleries, restaurants, and views across Tel Aviv.",st:"Jaffa (Yafo in Hebrew) is where Tel Aviv began—an ancient port that predates the modern city by millennia. Used by crusaders, Ottomans, and traders bringing goods from across the Mediterranean, Jaffa was the gateway to the Holy Land. Today, the old city is a maze of stone alleys, vaulted passages, and restored Ottoman buildings. Art galleries occupy ancient spaces; restaurants cluster around the harbor. The Jaffa sign is iconic—a metal structure on a rooftop overlooking the sea. The artist colony remains vibrant: studios and galleries are intertwined. Jaffa's history is contentious: Palestinian families were displaced when Israel was founded, yet the quarter now hosts both Jewish and Arab businesses and populations. Walking the alleys, history layers upon itself: ancient Roman columns, Ottoman Ottoman architecture, Israeli graffiti, Palestinian flags. It's complexly beautiful, embodying the tensions of the region.",im:"Sunset light hits orange stone buildings as a call to prayer echoes from a nearby mosque, and Jewish and Arab diners sit at adjacent café tables.",t:"South of Tel Aviv city center, walkable or short taxi ride. Most attractions are pedestrian alleys; wear comfortable shoes. Gallery hours vary. Restaurants are tourist-oriented and pricey. The harbor is photogenic. Busiest evenings and weekends. Best visited early morning or late afternoon to avoid crowds.",c:[],r:"g",nn:"יפו הישנה",ns:"עיר יפה עם היסטוריה עתיקה",nst:"עיר נמל אתיקה בעלת היסטוריה עמוקה. כיום שכונת אמנות ומסעדות.",nt:"דרומית לתל אביב. הדרכים אבן צרות. חנויות ומסעדות הן תיירות וגבוהות."},
  {id:4,n:"Bauhaus Buildings — White City Architecture",a:"City Center",v:["architecture", "history", "hidden"],d:20,s:"UNESCO-listed district with 4,000+ Bauhaus and International Style buildings from 1920s-1950s.",st:"Tel Aviv's Bauhaus district is the largest concentration of Bauhaus architecture outside Germany. Between 1920-1950, Jewish architects fleeing Nazi Germany brought Bauhaus principles to Palestine: simple geometric forms, functional design, horizontal lines, curves, and flat roofs. The buildings are painted white or pastel—practical for the intense sun. Walking the streets of Dizengoff, Bialik, and Allenby, you're surrounded by an architectural movement: buildings with clean lines, curved balconies, and modernist innovations. Many buildings are still apartments; residents live in architectural masterpieces. Some buildings have been beautifully restored; others are weathered, waiting for renovation. The UNESCO designation came in 2003, recognizing this as a unique urban laboratory. Bauhaus walking tours are excellent, revealing building details and architectural philosophy. The architecture embodies a utopian belief in modernism's power to improve society.",im:"A curved balcony catches afternoon light on a white building, the lines clean and elegant despite decades of coastal weather.",t:"Main Bauhaus buildings are between Rothschild, Allenby, Dizengoff, and Bialik streets in downtown. Many are private residences; respect privacy when photographing. Walking tours guide you through the architectural styles. Open-air tour maps available at the tourist office. Allow 2-3 hours for self-guided walking.",c:[],r:"g",nn:"בנייני בוהאוס",ns:"בנייה מודרנית בוהאוס",nst:"4000+ בניינים בסגנון בוהאוס. מורשת ארכיטקטוני בלתי יחודית בעולם.",nt:"הצעו בדרך הולכים עם המודרנום בעיניים. הבתים פרטיים; כבדו את הפרטיות."},
  {id:5,n:"Rothschild Boulevard — Tree-Lined History",a:"City Center",v:["history", "architecture", "beautiful"],d:15,s:"First planned boulevard in Tel Aviv with tree-lined promenade, historical buildings, and Independence Hall.",st:"Rothschild Boulevard was the first planned street in Tel Aviv, designed in 1909 as a tree-lined promenade. Today, the massive trees (planted over a century ago) provide shade over a broad central median—a refuge in the urban heat. The boulevard is lined with Bauhaus and early modern buildings. Independence Hall (Beit Dizengoff) sits on the boulevard: the building where Israel's independence was declared in 1948, a pivotal moment in Middle Eastern history. The hall itself is modest—a mansion where 37 people gathered to announce a nation's birth. Now a museum, it's moving for those who understand its significance. The boulevard feels like a European city: tree-shaded, architecturally coherent, leisurely in pace. Cafés line the street; people linger over coffee. It's Tel Aviv's soul in microcosm: tree-covered, beautiful, historically charged, and still thriving.",im:"Dappled sunlight filters through tree leaves onto stone buildings where the entire nation was declared independent less than a century ago.",t:"Central location, easily walkable from downtown. Independence Hall open 9am-5pm (closed Saturdays). Entrance fee minimal. Allow 30 minutes for the hall, 1 hour for boulevard stroll. Cafés are excellent; some have been operating for decades.",c:[],r:"g",nn:"בולבר רוטשילד",ns:"שדרה היסטורית צלולה",nst:"הרחוב הראשון התכנן בתל אביב. בנו עם אלו ענקיים. בנו עצמאות בניין.",nt:"מרכז העיר. מטייליל בברחוב. בקר בבית העצמאות."},
  {id:6,n:"Tel Aviv Port (Namal) — Waterfront Dining and Nightlife",a:"Beachfront",v:["night", "food", "local"],d:20,s:"Renovated port area with restaurants, bars, and nightlife, popular with locals for evening outings.",st:"Namal (the port) was abandoned in the 1960s when a new port was built north of the city. In the 1990s, developers transformed it into a destination: restaurants, bars, clubs, and markets now occupy converted warehouses. The vibe is youthful, energetic, and sophisticated. On warm evenings, thousands gather for dinner and drinks overlooking the sea. The restaurants range from casual to high-end; the cuisine is international with Israeli influences. Nightlife is serious: clubs host DJs and electronic music; bars attract crowds until dawn. The port is Israel's prime entertainment district—where locals celebrate, tourists cluster, and the energy is palpable. It's less ancient and atmospheric than Jaffa but more modern and vibrant. The gentrification is obvious; the old fishing village charm is long gone, replaced by contemporary elegance.",im:"At dusk, the port lights up, and hundreds gather at waterfront tables, wine glasses reflecting the setting sun.",t:"North of downtown, accessible by metro or taxi. Open daily, peak time evenings and weekends. Restaurants book up; reserve ahead. Nightclubs open late (10pm+) and operate until dawn. Dress code varies by venue. Prices are high compared to Tel Aviv standards.",c:[],r:"g",nn:"נמל תל אביב",ns:"אזור נמל מהודר",nst:"נמל שופץ עם מסעדות וברים. בעלי חיים עתירי אנרגיה.",nt:"צפון לעיר. הזמן מקום בהדברים. התחלה בערב. הלילה חי מאד."},
  {id:7,n:"Eretz Israel Museum — Prehistory to Present",a:"North City",v:["history", "art", "hidden"],d:30,s:"Comprehensive museum covering Israeli culture and history from prehistoric times to contemporary era.",st:"The Eretz Israel Museum is actually a complex of pavilions, each dedicated to a different aspect of Israeli culture and history. The Prehistory Pavilion houses tools and artifacts from early human settlements; the Glass Pavilion displays exquisite Islamic glassware; the Textiles Pavilion shows traditional weavings and embroidery; the Ceramics Pavilion contains pottery from various eras. Outdoors, an ancient Tel (archaeological mound) is accessible, revealing layers of civilization built upon each other over millennia. The museum's strength is that it treats all inhabitants as part of the continuum: Palestinian, Jewish, Islamic, Christian—all are acknowledged as contributors to the region's culture. It's not a simple nationalist narrative but a complex, layered one. The setting is beautiful: on Tel Qasile, overlooking the Yarkon River, with gardens and walking paths. Allow several hours; the experience is rich and intellectually demanding.",im:"You stand on an archaeological tel, layers of ancient cities literally beneath your feet, while the modern city hums in the distance.",t:"North of downtown, near the Yarkon River. Open daily except Mondays. Entrance fee moderate. Allow 2-4 hours depending on interest depth. Multiple pavilions and gardens make it a full experience. English-language information available.",c:[],r:"g",nn:"מוזיאון ארץ ישראל",ns:"מוזיאום מקיף של התרבות",nst:"מוזיאום עם מגדלים פרטיים. מטיל פשוטויות לכלי קרמיקה וטקסטיל.",nt:"צפון לעיר. פתוח כל ימי השבוע חוץ שני. מחיר סביר."},
  {id:8,n:"Rabin Square (Kikar Rabin) — Political Heart",a:"City Center",v:["history", "architecture", "hidden"],d:15,s:"Large public square commemorating Prime Minister Yitzhak Rabin, site of massive political gatherings.",st:"Rabin Square is a stark plaza of concrete and memory. Built in 1982, it was the site of massive pro-peace rallies in the 1990s. In 1995, Prime Minister Yitzhak Rabin was assassinated here—a moment that shattered Israeli confidence in peace. Today, the square is a memorial space, slightly empty despite its size, haunted by its history. The square hosts political gatherings, concerts, and public events. A monument and museum within commemorate Rabin and his legacy. Walking the plaza, you feel the weight of unresolved tensions. The architecture is brutalist—concrete, monumental, austere—reflecting the political stakes and pain. It's not a beautiful square, but it's essential: a tangible manifestation of how politics can intersect with human tragedy.",im:"A solitary figure stands in an enormous concrete plaza, dwarfed by its emptiness and the memories it contains.",t:"Downtown, central location. Open daily. Museum open Sunday-Thursday 9am-5pm, Friday 9am-2pm. Entrance fee minimal. Allow 30-45 minutes for plaza and museum. Photography allowed. The plaza can feel bleak; best to visit with context or a guide.",c:[],r:"g",nn:"כיכר רבין",ns:"כיכר פוליטית עם זיכרון",nst:"כיכר גדולה בתוך העיר. אתר הרצח ראשיון בישראל, 1995.",nt:"במרכז העיר. מוזיאום קטן בתוך הכיכר. שקול וחשוב."},
  {id:9,n:"Tel Aviv Neighborhoods: Florentin, Neve Tzedek, Jaffa South",a:"South City",v:["local", "art", "hidden"],d:20,s:"Bohemian neighborhoods with street art, vintage shops, galleries, and alternative culture.",st:"South Tel Aviv—particularly Florentin and Neve Tzedek—is where the city's creative energy concentrates. Narrow streets are painted with murals and graffiti art; independent galleries occupy old buildings; vintage shops sell everything from 1960s furniture to Palestinian embroidery. The neighborhoods are gentrifying rapidly, but character remains: young artists, musicians, activists, and drag performers make these areas home. Neve Tzedek, the oldest neighborhood in Tel Aviv, has been revitalized with boutiques and galleries while maintaining its intimate scale. Florentin is grittier, more countercultural. The energy is young, queer-friendly, and politically progressive. Many LGBT clubs, bars, and safe spaces are located here. The street art changes constantly—political murals criticizing the government appear and disappear; some celebrate LGBTQ+ visibility; others document Palestinian solidarity. It's Tel Aviv's conscience: younger, questioning, and less comfortable with the status quo.",im:"A wall-sized mural shows a woman's face, her eyes filled with resistance, painted over layers of previous street art.",t:"South of downtown, accessible by metro or taxi. Most businesses are afternoon/evening-oriented; shops open late morning. Street art best photographed during daylight. Galleries often charge no admission. Cafés and restaurants are excellent and reasonably priced. Neighborhood walking tours available.",c:[],r:"g",nn:"שכונות דרום תל אביב",ns:"אזורים בוהמים יצירתיים",nst:"פלורנטין וערי צדק עם אמנות רחוב וגלריות. תרבות בוהמית חיה.",nt:"דרומית לעיר. פתוח מאוחר. אמנות רחוב משתנה תמיד. מקום בו צעירים חיים."},
  {id:10,n:"Habima Theater and Opera House — Performing Arts",a:"City Center",v:["art", "architecture", "modern"],d:15,s:"National theater and opera house hosting drama, ballet, and classical music performances.",st:"Habima Theater is Israel's national theater, founded in 1918 in Moscow, relocated to Palestine/Israel and became the cultural anchor of the nation. The building is modernist, purposefully designed for theater. Inside, the atmosphere is hushed, reverential—this is where national cultural narratives are performed. Productions are in Hebrew; visitors without the language experience the performance's emotional core regardless. The adjacent opera house hosts international productions and local Israeli opera and ballet. Both venues are architectural statements: Tel Aviv's commitment to culture and arts is evident in these institutions. Attending a performance is accessible to tourists; many evening shows suit the visitor schedule. The language barrier matters less in physical theater, dance, and opera.",im:"Actors on stage embody a nation's stories—dreams, traumas, hopes—performed in Hebrew that echoes through the theater.",t:"Downtown, central location. Box office open daily. English support available for bookings. Check schedules online for English-suitable performances (ballet, opera, or physical theater). Prices vary by show; advance booking recommended. Casual dress acceptable for most performances.",c:[],r:"g",nn:"תיאטרון הבימה",ns:"תיאטרון לאומי וביתה אופרה",nst:"תיאטרון לאומי עם הצגות דרמה בלט ומוזיקה קלסית.",nt:"במרכז העיר. הצג באנגלית מוגבל. באלט ואופרה טובים ללא שפה."},
  {id:11,n:"Yarkon Park — Urban Green Space",a:"North City",v:["nature", "local", "beautiful"],d:20,s:"Large urban park with cycling, jogging paths, gardens, and riverside walks along the Yarkon River.",st:"Yarkon Park is Tel Aviv's green lung. The Yarkon River, which once defined the city's border, now flows through a park reclaimed from development. Cycling paths wind alongside the water; joggers and walkers populate the trails. The park includes gardens, playgrounds, sports fields, and open-air amphitheaters for concerts. In spring, wildflowers bloom; birdwatchers monitor migratory species. The park is distinctly local—on weekends, families, couples, and fitness enthusiasts fill the paths. There are picnic areas; some bring their own food and drinks. The park connects you to the river, to nature, and to how Israelis relax. It's less manicured than European parks, more ecological. The park is also significant as a shared space: Jewish, Arab, Palestinian, and international residents all use it. It's one of Tel Aviv's few genuinely integrated spaces where political tensions momentarily recede.",im:"Cyclists and joggers move along river paths as herons wade in the shallows and the city's hum is distant.",t:"Accessible throughout the city; multiple entry points. Free to enter. Bike rentals available at several points. Picnic areas have tables and grills. Best visited early morning (cooler) or late afternoon. Bring water. Dogs are welcome on leash.",c:[],r:"g",nn:"פארק יארקון",ns:"פארק עירוני גדול",nst:"פארק ירוק על יד נהר יארקון. מקום בו תל אביביים מתרגעים.",nt:"פתוח לציבור. אופניים לשכירה. שלח ארוחת צהריים. בוקר טוב ערב."},
  {id:12,n:"Carmel Market and Neighboring Alleys — Sensory Overload",a:"City Center",v:["food", "local", "hidden"],d:15,s:"Bustling open-air market with produce, spices, street food, and a surrounding neighborhood of vintage shops.",st:"Carmel Market (Shuk HaCarmel) is chaos: hundreds of vendors selling fruits, vegetables, spices, and ready-made food in a narrow street. Locals and tourists squeeze between stalls, haggling over prices, sampling street food. The market is a cultural cross-section: Mizrahi (Middle Eastern) Jewish vendors alongside Palestinian and Arab merchants, creating a shared economic space. The food is exceptional: fresh juices, falafel, sabich (eggplant sandwich), and spicy olives. The surrounding streets of Mograbi and Nahalat Binyamin contain vintage shops, used bookstores, and restaurants hidden in alleys. On Tuesday and Friday, Nahalat Binyamin becomes an artisan market—craft vendors, jewelry makers, and local designers sell directly. The energy is vibrant, loud, sometimes overwhelming. It's authentic Tel Aviv: loud, slightly chaotic, genuinely multicultural, and endlessly interesting.",im:"A vendor tosses freshly fried falafel into pita bread as customers wave money and shout orders in Hebrew, Arabic, and English simultaneously.",t:"Downtown, easily accessible by metro or foot. Open daily except Saturdays. Busiest morning to early afternoon. Afternoon quieter. Bring small change (many vendors cash-only). Pickpockets possible; watch belongings. Arrive hungry; street food is the attraction.",c:[],r:"g",nn:"שוק הכרמל",ns:"שוק קיום פתוח",nst:"שוק כאוס וחיה עם פירות וירקות וגם מאכלים.",nt:"בוקר ו צהרים טוב. עם כסף קטן. זהירות מנשלים."},
  {id:13,n:"Diaspora Museum (Beit Hatfutsot) — Jewish Diaspora History",a:"North City",v:["history", "art", "hidden"],d:25,s:"Museum dedicated to the history and culture of Jewish diaspora communities worldwide.",st:"The Diaspora Museum tells the story of Jewish communities globally—their lives, struggles, creativity, and contributions. Unlike Holocaust-focused museums, this museum celebrates the richness of Jewish culture across centuries and continents: Moroccan Jews, Indian Jews, Persian Jews, Ashkenazi Jews—each with distinct traditions, music, clothing, and cuisine. Interactive exhibits display documents, photographs, and objects telling individual stories. The museum has no chronology; instead, it organizes history by theme: family life, religious practice, economic patterns, response to persecution. The effect is intimate: you meet individual families and understand that Jewish diaspora is not monolithic. The museum acknowledges that diaspora Jews made profound contributions to host countries: scientists, artists, political thinkers. It's a counternarrative to the Holocaust narrative alone, though that history is present. For those interested in Jewish history and culture, this museum is essential.",im:"A photograph of a Moroccan Jewish wedding shows women in elaborate embroidered kaftans—beauty and culture thriving in a dispersed diaspora.",t:"North of downtown, on Tel Aviv University campus. Open Sunday-Thursday 10am-4pm, Friday 10am-1pm, closed Saturdays. Entrance fee moderate. Allow 2-3 hours. English-language information available. Security screening required (typical for Israeli sites).",c:[],r:"g",nn:"מוזיאון הגלות",ns:"מוזיאום תרבות יהודית גלויות",nst:"מוזיאום הסיפור של יהודים בעולם כולו. תרבות עשירה ומעניינת.",nt:"צפון לעיר. שעות מוגבלות; בדוק מראש. בדיקת ביטחוח נדרשת."},
  {id:14,n:"Bialik House — Writer and Intellectual",a:"City Center",v:["history", "hidden", "architecture"],d:10,s:"Home museum of Chaim Nachman Bialik, founding poet of modern Hebrew literature.",st:"Chaim Nachman Bialik is considered the founding poet of modern Hebrew. His house, designed in the 1920s by architect Yosef Barsky, is a gem of early Tel Aviv architecture. The poet lived here from 1924 until his death in 1939; the house preserves his study, library, and personal effects. Walking through, you meet the man through his books, correspondence, and domestic arrangements. Bialik was not merely a poet but an intellectual force: he translated, edited, wrote essays, and influenced Hebrew education. His poetry addressed Jewish suffering, resilience, and national identity—themes that resonated with a nation being born. The house itself, now a museum, is intimate: you stand in the room where he wrote, surrounded by his books and papers. The museum is small but profound, especially for those interested in Hebrew literature or Jewish intellectual history.",im:"A desk cluttered with papers and pen, the poet's workspace frozen in time, overlooking a street where a nation is being built.",t:"Downtown on Bialik Street. Open Sunday-Thursday 10am-4pm, Friday 10am-2pm, closed Saturdays. Entrance fee minimal. Allow 30-45 minutes. Tours available in English by advance request. Photography allowed.",c:[],r:"g",nn:"בית ביאליק",ns:"בית המשורר בייליק",nst:"בית של המשורר שיסד ספרות עברית מודרנית.",nt:"במרכז העיר. שעות מוגבלות. סיור בהודעה מראש."},
  {id:15,n:"Nightlife: Bars, Clubs, and Late Dining",a:"City Center",v:["night", "food", "local"],d:20,s:"Vibrant nightlife scene with bars, nightclubs, and restaurants operating late into the night.",st:"Tel Aviv nightlife is legendary: the city pulses until dawn. Bars range from dive bars to upscale cocktail lounges; clubs feature world-class DJs and electronic music; late-night restaurants serve food at 3am. The scene is notably LGBTQ-friendly—gay bars, drag shows, and trans-inclusive spaces are normalized. The culture is secular: alcohol flows, dress codes are minimal, and hedonism is socially acceptable. On warm nights, the entire city seems to be out: rooftop bars with panoramic views, beachfront clubs with sand floors, speakeasies hidden behind unmarked doors. The nightlife culture reflects Tel Aviv's character: youthful, hedonistic, inclusive, and unabashedly modern. Most clubs open at 11pm and operate until 6am; expect to pay cover charges. Dress is casual; queuing outside popular venues is normal. The scene attracts international DJs and visitors.",im:"A rooftop bar overlooks the Mediterranean at midnight; dance music pulses; hundreds of people from a hundred countries dance under stars.",t:"Throughout downtown and port areas. Cover charges typical (50-100 shekels). Alcohol is expensive; pre-drink if budget-conscious. Clubs busiest after midnight. Transportation at night (Shabbat taxis) available. Language not a barrier. Age ID required for alcohol (passport necessary).",c:[],r:"g",nn:"חיי לילה",ns:"בארים ומועדונים ודור",nst:"תל אביב חי בלילה. סצנה למפלדים ידי דעה מינית.",nt:"בעיר כולה. מועדונים פתוח מאוחר. עבור פרפר בטעם זהב."},
  {id:16,n:"Secularism in Practice: Shabbat in Tel Aviv",a:"City Center",v:["local", "culture", "hidden"],d:15,s:"Experience Israel's secular society by observing (or ignoring) Shabbat; most businesses open; culture continues.",st:"Unlike Jerusalem, which largely observes Orthodox Jewish Shabbat (Saturday), Tel Aviv is a secular city where Friday evening through Saturday night is a day off, not necessarily religious. Restaurants, cafés, bars, clubs, and most shops remain open. Buses stop Friday evening but resume Saturday night; taxis and Gett app cars operate. The beach is crowded on Saturdays with families and groups. Some areas (Orthodox neighborhoods like Mea Shearim) are restricted; but in Tel Aviv proper, you won't experience the shutdown of Jerusalem. This distinction is crucial: Israel is not uniformly religious. Tel Aviv represents the secular, cosmopolitan alternative. Experiencing Shabbat in Tel Aviv means late Friday dinner, Saturday brunch, and evening nightlife—a day off that involves leisure, not religious observance. For secular travelers, Tel Aviv is liberating; for religious travelers, Jerusalem or Bnei Brak are alternatives.",im:"On Saturday afternoon, hundreds gather on the beach, restaurants fill with diners, and life continues unabated—Shabbat observed as leisure, not restriction.",t:"Experience throughout the city, especially downtown, Carmel Market, and beaches. Friday evening is best for observing the secular 'day off' culture. Restaurants book up; reserve ahead. Saturday is normal commerce day. No restrictions on visitors during Shabbat; enjoy freely.",c:[],r:"g",nn:"שבת בתל אביב",ns:"יום לאומי לנוח",nst:"תל אביב עיר חילונית כאשר שבת הוא יום לאומי לנוח, לא דתי.",nt:"חווה את הילד בחופיות, מסעדות, וחוף. חופש, לא דת."},
  {id:17,n:"LGBTQ+ Heritage: Pride Month and Year-Round Acceptance",a:"South City",v:["local", "night", "hidden"],d:15,s:"World's largest LGBTQ+ pride parade and a thriving year-round queer culture and community.",st:"Tel Aviv Pride is an international event: Tel Aviv hosts the world's largest pride parade proportional to city size (hundreds of thousands in a city of under 500,000). The city is internationally recognized as LGBTQ-friendly—same-sex marriage not recognized in Israel (complex due to the Orthodox religious establishment), but civil rights, anti-discrimination laws, and social acceptance are strong. Year-round, gay bars, drag shows, and LGBTQ spaces populate the city, particularly in South Tel Aviv. Pride Month (June) transforms the city: the parade runs through downtown; cultural events and parties occur daily; the entire city celebrates visibly. The acceptance of LGBTQ+ people in Tel Aviv contrasts sharply with surrounding regions and even with orthodox Jewish areas of Israel. For many international LGBTQ+ travelers, Tel Aviv is a haven: you can exist freely, openly, without fear. The contrast with some Middle Eastern countries cannot be overstated—this freedom is cherished and unique.",im:"The Pride parade flows through downtown: thousands of drag queens, trans people, families, and allies filling the streets with joy and rainbow flags.",t:"Year-round queer culture in south Tel Aviv, particularly Florentin. Pride Month (June) hosts the annual parade. Specific dates and events published months in advance. Parade is free and public. Hotels book up; reserve early if visiting during Pride. The acceptance is visible and genuine; dress and behavior freely without concern.",c:[],r:"g",nn:"תרבות LGBTQ+",ns:"עיר בעד תרבות הומוסקסואלית",nst:"תל אביב מקום לקבל LGBTQ+ בחופש ובכבוד. מצעד גדול בעולם ביוני.",nt:"עיר חופשית למיניות שונה. חופש, קבלה, שמחה."},
  {id:18,n:"Palmach Museum — Independence War and Youth",a:"North City",v:["history", "hidden", "art"],d:20,s:"Museum dedicated to the Palmach—pre-state Israeli militia and its role in 1948 independence war.",st:"The Palmach Museum tells the story of the Palmach (Plugot Machatz, strike companies)—a pre-state Jewish militia founded in 1941 that fought the British Mandate and later formed the core of the Israeli army during the 1948 independence war. The museum uses multimedia and immersive techniques to convey the experiences of Palmach members—young men and women who sacrificed for national independence. The narrative is from the Israeli perspective; the museum presents this history as heroic liberation. Visitors encounter personal stories: letters, photographs, and accounts of individual fighters. The experience is emotional and moving, particularly for those who understand the historical stakes. The museum is not neutral; it tells a particular national story. Arab/Palestinian visitors encounter a narrative that displaces their own history; this tension is inherent to Israeli museums generally. Still, understanding this perspective is crucial for comprehending contemporary Israel.",im:"A letter written by a young fighter to his sister, never sent because he was killed in battle, sits behind glass—personal tragedy on a national stage.",t:"North of downtown, on Tel Aviv University campus. Open Sunday-Thursday 9am-5pm, Friday 9am-1pm, closed Saturdays. Entrance fee moderate. Allow 1.5-2 hours. Tours in English available. Security screening required. The museum is emotionally intense.",c:[],r:"g",nn:"מוזיאון פלמ\"ח",ns:"מוזיאום מלחמת העצמאות",nst:"מוזיאום על הפלמ\"ח, יחידה צבאית לפני המדינה.",nt:"צפון לעיר. היסטוריה ישראלית מהנקודה הישראלית. כובד רגשי."},
  {id:19,n:"Street Art Tours and Galleries — Contemporary Visual Culture",a:"South City",v:["art", "modern", "hidden"],d:15,s:"Guided tours exploring street art and contemporary galleries in neighborhoods like Florentin and Neve Tzedek.",st:"Tel Aviv's street art scene is politically engaged and constantly evolving. Political murals criticize Israeli government policies; solidarity murals support Palestinian cause; other works celebrate LGBTQ+ visibility and cultural diversity. The street art reflects a young, progressive city wrestling with its identity and regional context. Organized tours guide you through the most significant pieces, providing context about the artists and meanings. Gallery districts contain hundreds of galleries displaying contemporary Israeli and international artists. The art is diverse: some highly political, some personal, some abstract. Unlike more conservative art cities, Tel Aviv's galleries embrace activism and provocative work. The scene is accessible; most gallery openings are free and welcoming to tourists.",im:"A massive mural shows a Palestinian child's face, eye-level with passing pedestrians, impossible to ignore.",t:"South Tel Aviv, particularly Florentin and Neve Tzedek. Street art best viewed during daylight. Gallery hours variable; check ahead. Most galleries close Saturdays. Opening receptions typically Thursday evenings (free, crowded, lively). Tours available through tourism offices or hotels.",c:[],r:"g",nn:"סיורי אומנות רחוב",ns:"אמנות עכשוויות ופוליטיות",nst:"אמנות רחוב פוליטית. גלריות עם אמנות מודרנית ודעות חזקות.",nt:"דרום העיר. סיורים מיוחדים זמינים. גלריות פתוחות בערב."},
  {id:20,n:"Rosh Hashanah and Holiday Observance — Seasonal Culture",a:"City Center",v:["local", "culture", "hidden"],d:10,s:"Experience Jewish holidays through cultural events, food traditions, and how Tel Aviv observes the Jewish calendar.",st:"Though Tel Aviv is secular, the Jewish calendar structures the year. Rosh Hashanah (Jewish New Year, September/October) sees family gatherings and special meals. Passover (spring) restricts bread consumption, affecting restaurant menus and grocery stores. Hanukkah (winter) brings light and celebration after the darkest time. Shavuot (early summer) celebrates the giving of Torah. For travelers, these holidays offer windows into Jewish culture and tradition. Holiday observance is visible in restaurants (special menus), shops (holiday merchandise), and street decorations. Some religious sites are closed to visitors during certain holiday hours, but most of the city operates normally. Experiencing a holiday in Tel Aviv means encountering both secular and religious Israelis celebrating in their own ways—family dinners, cultural events, and spiritual reflection coexisting.",im:"On Rosh Hashanah, families gather around tables laden with symbolic foods—pomegranate, honey, fish—blessing the new year.",t:"Calendar-dependent. Check dates before travel. Religious sites have limited visiting hours during holidays. Restaurants adapt menus; reserve tables. Street decorations and holiday markets spring up seasonally. Hotels and museums provide holiday context. Plan around holiday schedules if sensitive to closures.",c:[],r:"g",nn:"חגים יהודיים",ns:"חגים ותרבות",nst:"תל אביב עיר חילונית לכן חגים קלים יותר. אכל מיוחד וחגיגות.",nt:"בדוק את התאריכים. חנויות סגורות בעת חגים. אכול מיוחד בחגים."},
  {id:21,n:"Gordon Pool — Public Swimming Tradition",a:"Beachfront",v:["local", "nature", "hidden"],d:15,s:"Mediterranean seawater public pool enclosed by breakwaters, used by swimmers and locals year-round.",st:"Gordon Pool is a natural saltwater pool formed by breakwaters, creating a protected swimming area on the beach. It's been in use for decades as a public swimming space. The pool is popular with swimmers (particularly in winter when the open sea is too rough) and families. The atmosphere is distinctly local: Israeli swimmers doing laps, elderly folks in the shallow end, and lifeguards monitoring safety. The pool is free, maintained by the municipality. Swimming here connects you to Tel Aviv's beach culture in a more intimate way than the open Mediterranean. The enclosed space provides safety and warmth.",im:"Swimmers in various states of fitness move through the seawater as the Mediterranean beyond the breakwaters churns with waves.",t:"On the beach near Hilton area. Open dawn to dusk. Free access. Bring towel and swimsuit. Lifeguards present. Allow 1-2 hours for swimming.",c:[],r:"g",nn:"בריכת גורדון",ns:"בריכה ציבורית בים",nst:"בריכה במים מלח הים על החוף. מקום מקומי להשחיה.",nt:"חוף. מימן. חינם. משחה אפשר."},
  {id:22,n:"Shuk HaPishpeshim (Flea Market) — Vintage and Bargains",a:"South City",v:["local", "hidden", "art"],d:20,s:"Vintage flea market with used furniture, clothing, antiques, and collectibles, popular with students and collectors.",st:"The Tel Aviv flea market is an institution: vendors selling used furniture, vintage clothing, records, books, and collectibles. The energy is bohemian: young people digging through racks, negotiations happening, musicians busking between stalls. The market has counterculture roots; it's where Tel Aviv's creative class hunts treasures. Prices are negotiable; bargains exist if you dig. The market is authentically local—few tourists. It's a glimpse into how Tel Aviv's working and creative classes live and spend leisure time. Sundays are the busiest day.",im:"A young woman holds up a 1960s dress against her body, checking the fit, while vinyl records spin at a nearby stall.",t:"South Tel Aviv, Jaffa area. Open Thursday evening and Sunday morning. Allow 1-2 hours. Bring cash; many vendors cash-only. Bargaining expected. Photography usually welcome.",c:[],r:"g",nn:"שוק הפישפשים",ns:"שוק צילומים וכלים ישנים",nst:"שוק פשפשים עם רהיטים ישנים וביגוד וינטג'.",nt:"דרום תל אביב, יום ראשון בוקר. זול. מטבע קטן. משא ומתן."},
  {id:23,n:"Tel Aviv University — Campus and Museums",a:"North City",v:["art", "hidden", "modern"],d:20,s:"Major Israeli university campus with museums, archaeological exhibits, and cultural programs.",st:"Tel Aviv University's campus is an urban forest: tree-lined paths, modernist buildings, and cultural institutions. The campus hosts several museums: the Diaspora Museum (mentioned separately), the art museum, and archaeological collections. The campus is open to visitors; walking the grounds is pleasant. Libraries and cafés serve students and visitors. The university represents Israel's intellectual and cultural center. Public lectures and cultural events often welcome visitors. The campus feels like a city within the city.",im:"Students sit under trees, books open, while modernist buildings frame the canopy above.",t:"North of downtown. Open during daylight. Museums have specific hours. Cafés and restaurants throughout. Allow 2-3 hours to explore campus. Photography welcome.",c:[],r:"g",nn:"אוניברסיטת תל אביב",ns:"קמפוס אוניברסיטה",nst:"קמפוס עם מוזיאונים ובתי ספר. מרכז תרבות ישראל.",nt:"צפון העיר. פתוח ביום. מוזיאונים בשעות קבועות."},
  {id:24,n:"Suzanne Dellal Centre — Contemporary Dance",a:"South City",v:["art", "modern", "culture"],d:15,s:"Performance center dedicated to contemporary dance, hosting Israeli and international choreography.",st:"The Suzanne Dellal Centre is one of the world's major contemporary dance venues. Located in a renovated warehouse in south Tel Aviv, it hosts cutting-edge Israeli dance companies and international artists. The venue is beautiful: exposed brick, modern amenities, and excellent acoustics. Attending a performance here connects you to Tel Aviv's thriving cultural scene. Dance transcends language; the physicality communicates meaning. Israeli choreographers have global reputations; watching them in their home city is special. Check schedule for performances.",im:"Dancers move in synchronized chaos, their bodies expressing what words cannot, to a rapt international audience.",t:"South Tel Aviv, District 4. Check website for performance schedule. Tickets vary. Allow 2-3 hours for performance. Casual dress acceptable. English-language programs available.",c:[],r:"g",nn:"מרכז סוזן דלל",ns:"מרכז ריקוד עכשווי",nst:"מרכז ביצוע רקוד עכשוויאי. חברות ישראליות וחברות בינלאומיות.",nt:"דרום תל אביב. בדוק לוח הזמנים. כרטיסים משתנים."},
  {id:25,n:"Manga (Café Culture) — Israeli Coffee Ritual",a:"City Center",v:["local", "food", "culture"],d:10,s:"Iconic café chain representing Tel Aviv's social café culture, where people spend hours over coffee.",st:"Manga and similar cafés are where Tel Aviv social life happens. Israelis linger for hours: reading, talking, working, people-watching. The coffee is excellent; the atmosphere is unhurried. Sitting in a café, you're observing a social ritual: the café as extension of home. Israelis debate politics, discuss art, and conduct business in cafés. It's egalitarian: billionaires sit near students. The energy is vibrant and intellectual. Spending time here, slowly, is cultural immersion more valuable than any tourist attraction.",im:"A group of friends sits for hours, cups empty but still talking, oblivious to time passing.",t:"Multiple locations throughout the city. Open early morning to late evening. Coffee costs 10-20 shekels. No time limit on sitting. WiFi available. Allow 30 minutes to several hours depending on your pace.",c:[],r:"g",nn:"קפה מנגה",ns:"תרבות קפה ישראלית",nst:"קפה איקוני בתל אביב. מקום לשהות שעות עם קפה.",nt:"ברחבי העיר. קפה זול. אין הגבלה זמן. טוב להשתהות."},
  {id:26,n:"Yarkon River Park Extension — Nature in the City",a:"North City",v:["nature", "local", "beautiful"],d:20,s:"Extended parks along the Yarkon River with biking paths, picnic areas, and urban gardens.",st:"The Yarkon River is Tel Aviv's green spine: parks run along its entire length. Biking, jogging, and picnicking are popular. Urban gardens experiment with green space in a dense city. The river itself is not pristine; it's been heavily polluted historically. Yet restoration efforts have improved conditions. Walking the parks, you encounter the city's attempt to maintain nature in an urban context. Weekends are crowded with families and athletes.",im:"Cyclists and joggers move along a river path lined with green, the urban skyline rising beyond, nature and city coexisting.",t:"Accessible from multiple points along the river. Free and open daily. Bike rentals available. Picnic areas have facilities. Allow 1-3 hours depending on section explored.",c:[],r:"g",nn:"פארק נהר יארקון",ns:"פארק נהר בעיר",nst:"פארק ירוק לאורך הנהר. אופניים ופיקניק.",nt:"חינם וידוע. אופניים לשכירה. יום וסוף שבוע עמוס."},
  {id:27,n:"Beit Ariela Library — Community and Knowledge",a:"City Center",v:["modern", "hidden", "culture"],d:15,s:"Central library and cultural center with exhibitions, lectures, and community programs.",st:"Beit Ariela is not just a library but a cultural center: exhibitions showcase contemporary Israeli and international artists; lectures address political, social, and artistic topics; community programs serve diverse populations. The building is modern, welcoming to all. Walking through, you encounter Israeli civil society: people engaging with culture, learning, and discussing. Many lectures and exhibitions are free or low-cost. The library serves as a democratic space in a polarized society.",im:"A group gathers for a lecture; the diversity of faces suggests Israel's internal plurality—Jewish, Arab, religious, secular, old, young.",t:"Downtown, walking distance from Rabin Square. Open daily (closed holidays). Free to enter. Exhibitions and lectures often free. Allow 1-2 hours. English-language events occasional; check schedule.",c:[],r:"g",nn:"ספריית בית אריאלה",ns:"ספרייה וצמתר תרבות",nst:"ספרייה מרכזית עם תערוכות והרצאות. מרכז תרבות קהילתי.",nt:"בעיר מרכזית. מימן וסגור בחגים. הרצאות חינם לעתים."},
  {id:28,n:"Rokach House — Artist Residency and Community",a:"South City",v:["art", "local", "hidden"],d:15,s:"Artist residency and cultural venue hosting contemporary art, performances, and community events.",st:"Rokach House is a converted historic house now operating as an artist residency and community venue. Local and international artists work in the space; exhibitions and performances occur regularly. The atmosphere is creative and welcoming. The venue represents how Tel Aviv transforms old structures into cultural spaces. Walking through, you encounter art in progress, conversations with artists, and community gathering.",im:"An artist works in a studio while visitors browse a neighboring gallery space, the historic building humming with creative energy.",t:"South Tel Aviv, Jaffa area. Check website for exhibitions and events. Allow 1-2 hours. Many events free or low-cost. Photography usually welcome. Community-focused; casual and welcoming.",c:[],r:"g",nn:"בית רוקח",ns:"מגורה אמנים ומרכז תרבות",nst:"מעון אמנים ומרכז תרבות. אמנות עכשוויה ביצועים.",nt:"דרום תל אביב. בדוק לוח הזמנים. הרבה אירועים חינם."},
  {id:29,n:"Meir Park — Urban Green and Gathering Space",a:"City Center",v:["local", "beautiful", "nature"],d:15,s:"Large urban park in downtown with green space, playgrounds, and social gathering areas.",st:"Meir Park is where Tel Avivians gather: families with children, couples, and solitary walkers. The park offers respite from urban intensity. Trees provide shade; grass offers space to sit. Playgrounds serve children; sports areas serve athletes. The park is accessible and democratic: all socioeconomic levels share the space. Evenings are particularly active: people promenade, musicians perform, and informal markets sometimes operate. The park is simple but essential to the city's livability.",im:"Children play while elderly people sit on benches, and the entire demographic spectrum of Tel Aviv shares the grass under urban trees.",t:"Downtown, easily accessible. Free and open daily. Facilities throughout. Allow 30 minutes to several hours. Morning and evening quieter than afternoon.",c:[],r:"g",nn:"פארק מאיר",ns:"פארק עירוני וירוק",nst:"פארק בעיר עם עצים, דשא, ומשחקים.",nt:"עיר מרכזית. חינם. משפחות ויחידים. ערב טוב."},
  {id:30,n:"Sunset from the Beach During Kabbalat Shabbat — Spiritual Secular Moment",a:"Beachfront",v:["beautiful", "local", "culture"],d:20,s:"Experiencing the beach on Friday evening when many Israelis gather for informal Shabbat beginning, mixing spirituality and secularity.",st:"Friday evening on Tel Aviv beaches is special: the work week ends, the sun sets, and Israelis gather on the sand. While not religious (most secular Israelis don't observe Shabbat), there's a spiritual element: the transition from work to rest, the gathering of community, and the beauty of sunset. Some gather in informal groups singing traditional songs; others simply sit and watch the sun sink into the Mediterranean. It's collective without being organized, spiritual without being religious. The experience captures Tel Aviv's unique character: modern, secular, yet with threads of tradition. Sitting on the beach watching the sun set with thousands of Israelis, you understand the city's soul.",im:"Hundreds of people stand in the shallow water, silhouetted against the setting sun, together but individually engaged in the moment.",t:"Any beach, best near central locations. Friday evening, approximately 5-7pm depending on season. Free. Bring towel and swimwear if swimming. Come early for good viewing positions. The atmosphere is welcoming and community-focused.",c:[],r:"g",nn:"שקיעה בחוף ביום שישי",ns:"רגע רוחני חילוני",nst:"חוף בערב שישי. קהילה מתכנסת לשקיעה. רוח ברכה.",nt:"כל חוף. יום ו', 17-19h. חינם. טוב להיות עם כל ישראל."}
];

</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Tel Aviv Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
