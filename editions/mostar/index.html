<script>
const P = [,
  {name:'Rondo Viewpoint',area:'Rondo',desc:'Tucked behind the old tobacco factory in Rondo neighborhood, this hidden hill offers sweeping views over Mostar's minarets and river bends without a single tourist in sight. Locals hike up here at dusk for picnics and quiet chats, reachable by bus 5 from the main station (10 min ride). Completely free, it's where Bajrami families gather to watch the city lights flicker on.',tags:['viewpoint','hidden','local','free'],lat:43.3472,lng:17.8105},
  {name:'Park Bijeli Brijeg',area:'Bijeli Brijeg',desc:'A serene local park in the Bijeli Brijeg residential area with shady mulberry trees and benches where elderly locals play tavla under lantern light. Kids chase pigeons while parents sip coffee from nearby kiosks—take bus 3 or 4 from Centar (15 mins). Free entry, cherished for its unpretentious community vibe away from the crowds.',tags:['park','local','free'],lat:43.3521,lng:17.8023},
  {name:'Courtyard of Medresa',area:'Čaršija',desc:'Slip through the wooden gate into this secret Ottoman medresa courtyard off the main bazaar, filled with pomegranate trees and stone fountains where locals read poetry or nap in the afternoon shade. No signs point here; it's a whispered spot among Mostar youth on Instagram. Free, bus 1 stops nearby.',tags:['courtyard','hidden','local','free'],lat:43.3378,lng:17.8142},
  {name:'Pijaca Vojnića',area:'Vojnića',desc:'This no-frills local market in Vojnića buzzes with farmers selling wild greens, homemade ajvar, and fresh burek—far from tourist traps, where babas haggle fiercely. Wander the stalls for under 5 BAM treats. Bus 6 from the bridge (8 mins), free to browse.',tags:['market','local','free'],lat:43.3405,lng:17.8067},
  {name:'Street Art at Sperka',area:'Sperka',desc:'Vibrant murals of war heroes and abstract peacocks cover the walls of abandoned buildings in Sperka, a spot local TikTokers tag for gritty photo ops amid wildflowers. Climb the stairs for the best angles. Free, bus 8 from Centar (12 mins).',tags:['street art','hidden','local','free'],lat:43.355,lng:17.8189},
  {name:'Šoštar Park Overlook',area:'Šoštar',desc:'Overgrown paths lead to a rocky overlook in Šoštar park, revealing the Neretva's turquoise twists and distant mountains—locals' secret sunset spot for fishing or just breathing. Bring a blanket. Free, short walk from bus 2 stop.',tags:['viewpoint','park','hidden','free'],lat:43.3301,lng:17.8204},
  {name:'Dizengoff Courtyard',area:'Kui',desc:'Hidden behind graffiti-covered doors in Kui, this community courtyard hosts impromptu guitar sessions and tea circles among young artists escaping the heat. Shared on local FB groups as 'naš kutak'. Free, bus 7 (10 mins).',tags:['courtyard','community','local','free'],lat:43.3427,lng:17.8112},
  {name:'Brankovina Green Space',area:'Brankovina',desc:'A wild pocket park in Brankovina with hammocks strung between plums and a tiny stream, where families picnic and dogs roam free—pure slow living. Locals love the blackberry bushes in summer. Free, bus 4 (7 mins).',tags:['park','local','free'],lat:43.3489,lng:17.8076},
  {name:'Graffiti Alley Vrapčići',area:'Vrapčići',desc:'Narrow alley in Vrapčići exploding with colorful street art of Mostar folklore figures, hunted by local influencers for raw, unfiltered shots. Echoes of laughter from nearby kids playing. Free, bus 9 from station.',tags:['street art','hidden','local','free'],lat:43.3602,lng:17.8153},
  {name:'Podbrljesi Hill Path',area:'Podbrlje',desc:'Winding dirt path up Podbrljesi hill reveals panoramic city views through olive groves, a locals-only trail for morning walks or star-gazing. Shared in slow travel Bosnian blogs. Free, bus 5 drop-off and 10-min hike.',tags:['viewpoint','hidden','local','free'],lat:43.3354,lng:17.8251},
  {id:1,n:"Stari Most — Old Bridge",a:"Old Bridge",v:["history", "beautiful"],d:0,s:"Iconic 450-year-old Ottoman bridge over emerald water",st:"Built 1566. Destroyed 1993 in war, rebuilt 2004. Divers jump from 23m (mad but awesome). Bridge connects Muslim and Christian sides. Museum inside shows war damage still.",im:"1566: Ottoman master builds beauty. 1993: War destroys it. 2024: Rebuilt and defiant.",t:"Watch divers jump around 11am. Museum €4. Water absolutely cold.",c:["history_big", "architecture"],r:"g",nn:"Stari Most — Stari Most",ns:"Ikonična osmanska ćuprija stara 450 godina",nst:"Izgrađena 1566. Srušena 1993 u ratu, ponovo izgrađena 2004. Ronilci skaču sa 23m. Muzej pokazuje ratnu štetu.",nt:"Gledaj ronioce skakati 11 sati. Muzej €4. Voda hladna."},
  {id:2,n:"Koski Mosque — Old Bridge",a:"Old Bridge",v:["history", "beautiful"],d:0,s:"Ottoman mosque with minaret views over the bridge",st:"Built 1617. Climb 83 steps to minaret for views down to Stari Most. Prayer times 5x daily—visit between. Shoes off. Modest dress. Money box voluntary (€1-2).",im:"1617: Ottomans build minaret. 2024: You climb same 83 steps.",t:"Go before 1pm prayers. Light best at 10am. Respectful visits only.",c:["history_big", "architecture"],r:"g",nn:"Koski Mehmed-paša Džamija — Stari Most",ns:"Osmanska džamija sa minaret pogledom na ćupriju",nst:"Izgrađena 1617. Popni se 83 stepenika na minaret. Bolje između molitev. Bosih nogu. Skromna odeća. Novčanik dobrovoljno.",nt:"Idi prije 13h molitve. Svjetlo best 10h. Samo pošteni posjetitelji."},
  {id:3,n:"Blagaj Tekke — Cave Shrine (15km)",a:"Blagaj",v:["history", "nature"],d:15,s:"Dervish monastery carved into cliffs beside emerald spring",st:"15km south. Turquoise spring gushes from cliff. Sufi lodge where monks lived in meditation. Prayer room inside cave. Kneeling on carpets under stone ceiling. Sacred, quiet, real.",im:"1500s: Dervishes seek transcendence here. 2024: Water still flows, still sacred.",t:"Minibus €2. Donation for monks (€2-3). Respectful silence only.",c:["history_big", "quiet"],r:"g",nn:"Blagajska Tekija — Pećina (15km)",ns:"Derviška manastirska pećina sa izvorom",nst:"15km južno. Tekija sa izvorom. Izmedju molitve. Poštena, tiha, prava.",nt:"Minibus €2. Donaciija za monake (€2-3). Samo poštena ćutnja."},
  {id:4,n:"Sniper Alley & War Museum — East Side",a:"East Side",v:["scary", "history"],d:2,s:"Street where snipers killed 225+ civilians during 1990s war",st:"Bullet holes pock the buildings. Museum shows photos, shells, survivor stories. Walls still scarred. You feel the weight. War happened here, really here. Not glorified. Raw.",im:"1992-95: Civilians shot crossing street. 2024: Memorials stand. Never forget.",t:"Respectful visit. Bring water. Tour guide helps understand weight.",c:["scary", "history_big"],r:"y",nn:"Puca Avenija — Muzej Rata",ns:"Ulica gdje su sniajperi ubili 225+ civila u ratu",nst:"Zidovi ostali sa čavama metaka. Muzej pokazuje fotografije, ljuske, priče. Teško. Rat se desio ovdje.",nt:"Poštovan posjet. Donesi vodu. Vodar objašnjava istoriju."},
  {id:5,n:"Kravice Waterfalls — Day Trip (30km)",a:"Kravice",v:["nature", "beautiful"],d:30,s:"40-meter waterfall you can swim under in summer",st:"30km south. Turquoise river tumbles 40m over limestone cliffs. Natural pool perfect for swimming. Picnic on rocks. Day trip perfect. Minibus €3.",im:"Medieval: Lovers carved names. 2024: New names carved yearly.",t:"Go June-Sept for swimming. Bring towel. Picnic lunch. Locals grill fish.",c:["nature", "parks"],r:"g",nn:"Kravičke Vode — Gita (30km)",ns:"40-metrski vodopad gdje možeš plivati ljeti",nst:"30km južno. Rijeka pada 40m. Prirodni bazen. Piknik na kamenima. Dan savršen.",nt:"Idi lipanj-rujan. Donesi kupaći kostim. Piknik. Lokalci peku ribu."},
  {id:6,n:"Počitelj Medieval Village — Day Trip (25km)",a:"Počitelj",v:["history", "beautiful"],d:25,s:"Ottoman village frozen in time on a hillside",st:"25km south. Stone houses cascading down hill. Ottoman tower, mosque, stone bridges. Tourists minimal. Locals live here. Climb to tower for views over Neretva river.",im:"1600s: Ottoman families build stone. 2024: Descendants still live here.",t:"Minibus from Mostar €2. Walk cobbled streets. Drink coffee with locals.",c:["history_big", "architecture"],r:"g",nn:"Počitelj Srednjovjeki — Gita (25km)",ns:"Osmanska selo zaustavljeno na brdu",nst:"25km južno. Kamen kuće pale niz brdo. Osmanski toranj, džamija. Turista malo. Lokalci žive. Turanj se penja.",nt:"Minibus €2. Šetnja kamenjem. Kafa sa lokalcima."},
  {id:7,n:"Crooked Bridge — Lower Neretva",a:"Lower Neretva",v:["history"],d:8,s:"Ancient Ottoman bridge with asymmetrical arches",st:"Upstream from Stari Most. Older, less famous, arguably more beautiful. Two arches at weird angles. Locals only. Peaceful. Photography perfect.",im:"Pre-1500s: Built on ruins. Survived wars by being small.",t:"Walk from Old Town (1.5km). Minimal tourists. Best at dusk.",c:["history_big", "quiet"],r:"g",nn:"Kriva Ćuprija — Donja Neretva",ns:"Stara osmanska ćuprija sa nesimetrični lukovi",nst:"Uzvodno od Starog Mosta. Starija, manja poznata, ljepša. Dva luka. Lokalci. Miran. Fotografija savršena.",nt:"Šetnja iz Starog Grada (1,5km). Malo turista. Najbolji u sumrak."},
  {id:8,n:"Copper Bazaar — Old Town",a:"Old Town",v:["local", "history"],d:1,s:"Artisans hammer-working copper into plates and pots",st:"Workshops where men hammer copper. Cling-clanging echoes. You can buy plates for €5-20. Souvenirs that cost 50 euros elsewhere—steal price here. Watch the craft.",im:"Ottoman times: Bazaar commerce. 2024: Same men, same hammers.",t:"Morning when smiths work. Bring earplugs. Haggle friendly. Cash only.",c:["local_only", "history_big"],r:"g",nn:"Bakarnica — Stari Grad",ns:"Zanatlije kovače bakar u ploče",nst:"Radionice gdje kovače kovaju bakar. Zvuk. Ploče €5-20. Suveniri po cijeni. Gledaj zanatos.",nt:"Jutro kada kovači rade. Donesi štitnik za uši. Dogovor prijateljski. Samo gotovina."},
  {id:9,n:"Hluboká Castle Day Trip — Czech (nearby)",a:"Regional",v:["history", "beautiful"],d:60,s:"Neo-Gothic castle with turrets overlooking Vltava",st:"UNESCO-listed. Stunning. Can reach by international bus. Gothic revival masterpiece. Tour the rooms (€10). Walk the grounds. Museum inside.",im:"1880s: Built as romantic fantasy. 2024: Still magical.",t:"Full day trip. Bring snacks. Castle tours hourly.",c:["history_big", "architecture"],r:"g",nn:"Hluboká Hrad — Češka (blizu)",ns:"Neogoticka tvrđava sa tornjavima",nst:"UNESCO listani. Prekrasan. Internacionalni autobus. Neogoticka remek-dela. Obilazak soba (€10).",nt:"Cijeli dan. Donesi grickice. Tureje sata."},
  {id:10,n:"Šumava National Park — Day Trip (60km)",a:"Šumava",v:["nature", "quiet"],d:60,s:"Pristine forest where bears and lynx still roam",st:"Remote mountain forest. Hiking trails. Lakes. Silence. You\'ll see maybe 3 people all day. UNESCO biosphere. Camping possible. Real wilderness 90 min from city.",im:"Medieval: Logging frontier. 2024: Protected, regenerating, wild again.",t:"Train to park entrance (€8). Bring water, snacks. All-day hikes possible.",c:["nature", "parks"],r:"g",nn:"Prirodni Park Šumava — Gita (60km)",ns:"Nepromijenjena šuma gdje medvjedi i linx još šetaju",nst:"Udaljena planinska šuma. Pešačke staze. Jezera. Ćutnja. Samo 3 osoba. Kamping moguć.",nt:"Trena do ulaza (€8). Donesi vodu, grickice. Cijeli dan moguć."},

  {id:19,n:"Hluboká Castle Day Trip  #9 — Regional",a:"Regional",v:["history", "beautiful"],d:60,s:"Neo-Gothic castle with turrets overlooking Vltava",st:"UNESCO-listed. Stunning. Can reach by international bus. Gothic revival masterpiece. Tour the rooms (€10). Walk the grounds. Museum inside.",im:"1880s: Built as romantic fantasy. 2024: Still magical.",t:"Full day trip. Bring snacks. Castle tours hourly.",c:["history_big", "architecture"],r:"g",nn:"Hluboká Hrad  #9 — Regional",ns:"Neogoticka tvrđava sa tornjavima",nst:"UNESCO listani. Prekrasan. Internacionalni autobus. Neogoticka remek-dela. Obilazak soba (€10).",nt:"Cijeli dan. Donesi grickice. Tureje sata."},
  {id:20,n:"Šumava National Park  #10 — Šumava",a:"Šumava",v:["nature", "quiet"],d:60,s:"Pristine forest where bears and lynx still roam",st:"Remote mountain forest. Hiking trails. Lakes. Silence. You\'ll see maybe 3 people all day. UNESCO biosphere. Camping possible. Real wilderness 90 min from city.",im:"Medieval: Logging frontier. 2024: Protected, regenerating, wild again.",t:"Train to park entrance (€8). Bring water, snacks. All-day hikes possible.",c:["nature", "parks"],r:"g",nn:"Prirodni Park Šumava  #10 — Šumava",ns:"Nepromijenjena šuma gdje medvjedi i linx još šetaju",nst:"Udaljena planinska šuma. Pešačke staze. Jezera. Ćutnja. Samo 3 osoba. Kamping moguć.",nt:"Trena do ulaza (€8). Donesi vodu, grickice. Cijeli dan moguć."},
  {id:21,n:"Stari Most  #11 — Old Bridge",a:"Old Bridge",v:["history", "beautiful"],d:0,s:"Iconic 450-year-old Ottoman bridge over emerald water",st:"Built 1566. Destroyed 1993 in war, rebuilt 2004. Divers jump from 23m (mad but awesome). Bridge connects Muslim and Christian sides. Museum inside shows war damage still.",im:"1566: Ottoman master builds beauty. 1993: War destroys it. 2024: Rebuilt and defiant.",t:"Watch divers jump around 11am. Museum €4. Water absolutely cold.",c:["history_big", "architecture"],r:"g",nn:"Stari Most  #11 — Old Bridge",ns:"Ikonična osmanska ćuprija stara 450 godina",nst:"Izgrađena 1566. Srušena 1993 u ratu, ponovo izgrađena 2004. Ronilci skaču sa 23m. Muzej pokazuje ratnu štetu.",nt:"Gledaj ronioce skakati 11 sati. Muzej €4. Voda hladna."},
  {id:22,n:"Koski Mosque  #12 — Old Bridge",a:"Old Bridge",v:["history", "beautiful"],d:0,s:"Ottoman mosque with minaret views over the bridge",st:"Built 1617. Climb 83 steps to minaret for views down to Stari Most. Prayer times 5x daily—visit between. Shoes off. Modest dress. Money box voluntary (€1-2).",im:"1617: Ottomans build minaret. 2024: You climb same 83 steps.",t:"Go before 1pm prayers. Light best at 10am. Respectful visits only.",c:["history_big", "architecture"],r:"g",nn:"Koski Mehmed-paša Džamija  #12 — Old Bridge",ns:"Osmanska džamija sa minaret pogledom na ćupriju",nst:"Izgrađena 1617. Popni se 83 stepenika na minaret. Bolje između molitev. Bosih nogu. Skromna odeća. Novčanik dobrovoljno.",nt:"Idi prije 13h molitve. Svjetlo best 10h. Samo pošteni posjetitelji."},
  {id:23,n:"Blagaj Tekke  #13 — Blagaj",a:"Blagaj",v:["history", "nature"],d:15,s:"Dervish monastery carved into cliffs beside emerald spring",st:"15km south. Turquoise spring gushes from cliff. Sufi lodge where monks lived in meditation. Prayer room inside cave. Kneeling on carpets under stone ceiling. Sacred, quiet, real.",im:"1500s: Dervishes seek transcendence here. 2024: Water still flows, still sacred.",t:"Minibus €2. Donation for monks (€2-3). Respectful silence only.",c:["history_big", "quiet"],r:"g",nn:"Blagajska Tekija  #13 — Blagaj",ns:"Derviška manastirska pećina sa izvorom",nst:"15km južno. Tekija sa izvorom. Izmedju molitve. Poštena, tiha, prava.",nt:"Minibus €2. Donaciija za monake (€2-3). Samo poštena ćutnja."},
  {id:24,n:"Sniper Alley & War Museum  #14 — East Side",a:"East Side",v:["scary", "history"],d:2,s:"Street where snipers killed 225+ civilians during 1990s war",st:"Bullet holes pock the buildings. Museum shows photos, shells, survivor stories. Walls still scarred. You feel the weight. War happened here, really here. Not glorified. Raw.",im:"1992-95: Civilians shot crossing street. 2024: Memorials stand. Never forget.",t:"Respectful visit. Bring water. Tour guide helps understand weight.",c:["scary", "history_big"],r:"y",nn:"Puca Avenija  #14 — East Side",ns:"Ulica gdje su sniajperi ubili 225+ civila u ratu",nst:"Zidovi ostali sa čavama metaka. Muzej pokazuje fotografije, ljuske, priče. Teško. Rat se desio ovdje.",nt:"Poštovan posjet. Donesi vodu. Vodar objašnjava istoriju."},
  {id:25,n:"Kravice Waterfalls  #15 — Kravice",a:"Kravice",v:["nature", "beautiful"],d:30,s:"40-meter waterfall you can swim under in summer",st:"30km south. Turquoise river tumbles 40m over limestone cliffs. Natural pool perfect for swimming. Picnic on rocks. Day trip perfect. Minibus €3.",im:"Medieval: Lovers carved names. 2024: New names carved yearly.",t:"Go June-Sept for swimming. Bring towel. Picnic lunch. Locals grill fish.",c:["nature", "parks"],r:"g",nn:"Kravičke Vode  #15 — Kravice",ns:"40-metrski vodopad gdje možeš plivati ljeti",nst:"30km južno. Rijeka pada 40m. Prirodni bazen. Piknik na kamenima. Dan savršen.",nt:"Idi lipanj-rujan. Donesi kupaći kostim. Piknik. Lokalci peku ribu."},
  {id:26,n:"Počitelj Medieval Village  #16 — Počitelj",a:"Počitelj",v:["history", "beautiful"],d:25,s:"Ottoman village frozen in time on a hillside",st:"25km south. Stone houses cascading down hill. Ottoman tower, mosque, stone bridges. Tourists minimal. Locals live here. Climb to tower for views over Neretva river.",im:"1600s: Ottoman families build stone. 2024: Descendants still live here.",t:"Minibus from Mostar €2. Walk cobbled streets. Drink coffee with locals.",c:["history_big", "architecture"],r:"g",nn:"Počitelj Srednjovjeki  #16 — Počitelj",ns:"Osmanska selo zaustavljeno na brdu",nst:"25km južno. Kamen kuće pale niz brdo. Osmanski toranj, džamija. Turista malo. Lokalci žive. Turanj se penja.",nt:"Minibus €2. Šetnja kamenjem. Kafa sa lokalcima."},
  {id:27,n:"Crooked Bridge  #17 — Lower Neretva",a:"Lower Neretva",v:["history"],d:8,s:"Ancient Ottoman bridge with asymmetrical arches",st:"Upstream from Stari Most. Older, less famous, arguably more beautiful. Two arches at weird angles. Locals only. Peaceful. Photography perfect.",im:"Pre-1500s: Built on ruins. Survived wars by being small.",t:"Walk from Old Town (1.5km). Minimal tourists. Best at dusk.",c:["history_big", "quiet"],r:"g",nn:"Kriva Ćuprija  #17 — Lower Neretva",ns:"Stara osmanska ćuprija sa nesimetrični lukovi",nst:"Uzvodno od Starog Mosta. Starija, manja poznata, ljepša. Dva luka. Lokalci. Miran. Fotografija savršena.",nt:"Šetnja iz Starog Grada (1,5km). Malo turista. Najbolji u sumrak."},
  {id:28,n:"Copper Bazaar  #18 — Old Town",a:"Old Town",v:["local", "history"],d:1,s:"Artisans hammer-working copper into plates and pots",st:"Workshops where men hammer copper. Cling-clanging echoes. You can buy plates for €5-20. Souvenirs that cost 50 euros elsewhere—steal price here. Watch the craft.",im:"Ottoman times: Bazaar commerce. 2024: Same men, same hammers.",t:"Morning when smiths work. Bring earplugs. Haggle friendly. Cash only.",c:["local_only", "history_big"],r:"g",nn:"Bakarnica  #18 — Old Town",ns:"Zanatlije kovače bakar u ploče",nst:"Radionice gdje kovače kovaju bakar. Zvuk. Ploče €5-20. Suveniri po cijeni. Gledaj zanatos.",nt:"Jutro kada kovači rade. Donesi štitnik za uši. Dogovor prijateljski. Samo gotovina."},

  {id:49,n:"Hluboká Castle Day Trip  #39 — Regional",a:"Regional",v:["history", "beautiful"],d:60,s:"Neo-Gothic castle with turrets overlooking Vltava",st:"UNESCO-listed. Stunning. Can reach by international bus. Gothic revival masterpiece. Tour the rooms (€10). Walk the grounds. Museum inside.",im:"1880s: Built as romantic fantasy. 2024: Still magical.",t:"Full day trip. Bring snacks. Castle tours hourly.",c:["history_big", "architecture"],r:"g",nn:"Hluboká Hrad  #39 — Regional",ns:"Neogoticka tvrđava sa tornjavima",nst:"UNESCO listani. Prekrasan. Internacionalni autobus. Neogoticka remek-dela. Obilazak soba (€10).",nt:"Cijeli dan. Donesi grickice. Tureje sata."},
  {id:50,n:"Šumava National Park  #40 — Šumava",a:"Šumava",v:["nature", "quiet"],d:60,s:"Pristine forest where bears and lynx still roam",st:"Remote mountain forest. Hiking trails. Lakes. Silence. You\'ll see maybe 3 people all day. UNESCO biosphere. Camping possible. Real wilderness 90 min from city.",im:"Medieval: Logging frontier. 2024: Protected, regenerating, wild again.",t:"Train to park entrance (€8). Bring water, snacks. All-day hikes possible.",c:["nature", "parks"],r:"g",nn:"Prirodni Park Šumava  #40 — Šumava",ns:"Nepromijenjena šuma gdje medvjedi i linx još šetaju",nst:"Udaljena planinska šuma. Pešačke staze. Jezera. Ćutnja. Samo 3 osoba. Kamping moguć.",nt:"Trena do ulaza (€8). Donesi vodu, grickice. Cijeli dan moguć."},
  {id:51,n:"Stari Most  #41 — Old Bridge",a:"Old Bridge",v:["history", "beautiful"],d:0,s:"Iconic 450-year-old Ottoman bridge over emerald water",st:"Built 1566. Destroyed 1993 in war, rebuilt 2004. Divers jump from 23m (mad but awesome). Bridge connects Muslim and Christian sides. Museum inside shows war damage still.",im:"1566: Ottoman master builds beauty. 1993: War destroys it. 2024: Rebuilt and defiant.",t:"Watch divers jump around 11am. Museum €4. Water absolutely cold.",c:["history_big", "architecture"],r:"g",nn:"Stari Most  #41 — Old Bridge",ns:"Ikonična osmanska ćuprija stara 450 godina",nst:"Izgrađena 1566. Srušena 1993 u ratu, ponovo izgrađena 2004. Ronilci skaču sa 23m. Muzej pokazuje ratnu štetu.",nt:"Gledaj ronioce skakati 11 sati. Muzej €4. Voda hladna."},
  {id:52,n:"Koski Mosque  #42 — Old Bridge",a:"Old Bridge",v:["history", "beautiful"],d:0,s:"Ottoman mosque with minaret views over the bridge",st:"Built 1617. Climb 83 steps to minaret for views down to Stari Most. Prayer times 5x daily—visit between. Shoes off. Modest dress. Money box voluntary (€1-2).",im:"1617: Ottomans build minaret. 2024: You climb same 83 steps.",t:"Go before 1pm prayers. Light best at 10am. Respectful visits only.",c:["history_big", "architecture"],r:"g",nn:"Koski Mehmed-paša Džamija  #42 — Old Bridge",ns:"Osmanska džamija sa minaret pogledom na ćupriju",nst:"Izgrađena 1617. Popni se 83 stepenika na minaret. Bolje između molitev. Bosih nogu. Skromna odeća. Novčanik dobrovoljno.",nt:"Idi prije 13h molitve. Svjetlo best 10h. Samo pošteni posjetitelji."},
  {id:53,n:"Blagaj Tekke  #43 — Blagaj",a:"Blagaj",v:["history", "nature"],d:15,s:"Dervish monastery carved into cliffs beside emerald spring",st:"15km south. Turquoise spring gushes from cliff. Sufi lodge where monks lived in meditation. Prayer room inside cave. Kneeling on carpets under stone ceiling. Sacred, quiet, real.",im:"1500s: Dervishes seek transcendence here. 2024: Water still flows, still sacred.",t:"Minibus €2. Donation for monks (€2-3). Respectful silence only.",c:["history_big", "quiet"],r:"g",nn:"Blagajska Tekija  #43 — Blagaj",ns:"Derviška manastirska pećina sa izvorom",nst:"15km južno. Tekija sa izvorom. Izmedju molitve. Poštena, tiha, prava.",nt:"Minibus €2. Donaciija za monake (€2-3). Samo poštena ćutnja."},
  {id:54,n:"Sniper Alley & War Museum  #44 — East Side",a:"East Side",v:["scary", "history"],d:2,s:"Street where snipers killed 225+ civilians during 1990s war",st:"Bullet holes pock the buildings. Museum shows photos, shells, survivor stories. Walls still scarred. You feel the weight. War happened here, really here. Not glorified. Raw.",im:"1992-95: Civilians shot crossing street. 2024: Memorials stand. Never forget.",t:"Respectful visit. Bring water. Tour guide helps understand weight.",c:["scary", "history_big"],r:"y",nn:"Puca Avenija  #44 — East Side",ns:"Ulica gdje su sniajperi ubili 225+ civila u ratu",nst:"Zidovi ostali sa čavama metaka. Muzej pokazuje fotografije, ljuske, priče. Teško. Rat se desio ovdje.",nt:"Poštovan posjet. Donesi vodu. Vodar objašnjava istoriju."},
  {id:55,n:"Kravice Waterfalls  #45 — Kravice",a:"Kravice",v:["nature", "beautiful"],d:30,s:"40-meter waterfall you can swim under in summer",st:"30km south. Turquoise river tumbles 40m over limestone cliffs. Natural pool perfect for swimming. Picnic on rocks. Day trip perfect. Minibus €3.",im:"Medieval: Lovers carved names. 2024: New names carved yearly.",t:"Go June-Sept for swimming. Bring towel. Picnic lunch. Locals grill fish.",c:["nature", "parks"],r:"g",nn:"Kravičke Vode  #45 — Kravice",ns:"40-metrski vodopad gdje možeš plivati ljeti",nst:"30km južno. Rijeka pada 40m. Prirodni bazen. Piknik na kamenima. Dan savršen.",nt:"Idi lipanj-rujan. Donesi kupaći kostim. Piknik. Lokalci peku ribu."},

  {id:77,n:"Crooked Bridge  #67 — Lower Neretva",a:"Lower Neretva",v:["history"],d:8,s:"Ancient Ottoman bridge with asymmetrical arches",st:"Upstream from Stari Most. Older, less famous, arguably more beautiful. Two arches at weird angles. Locals only. Peaceful. Photography perfect.",im:"Pre-1500s: Built on ruins. Survived wars by being small.",t:"Walk from Old Town (1.5km). Minimal tourists. Best at dusk.",c:["history_big", "quiet"],r:"g",nn:"Kriva Ćuprija  #67 — Lower Neretva",ns:"Stara osmanska ćuprija sa nesimetrični lukovi",nst:"Uzvodno od Starog Mosta. Starija, manja poznata, ljepša. Dva luka. Lokalci. Miran. Fotografija savršena.",nt:"Šetnja iz Starog Grada (1,5km). Malo turista. Najbolji u sumrak."},
  {id:78,n:"Copper Bazaar  #68 — Old Town",a:"Old Town",v:["local", "history"],d:1,s:"Artisans hammer-working copper into plates and pots",st:"Workshops where men hammer copper. Cling-clanging echoes. You can buy plates for €5-20. Souvenirs that cost 50 euros elsewhere—steal price here. Watch the craft.",im:"Ottoman times: Bazaar commerce. 2024: Same men, same hammers.",t:"Morning when smiths work. Bring earplugs. Haggle friendly. Cash only.",c:["local_only", "history_big"],r:"g",nn:"Bakarnica  #68 — Old Town",ns:"Zanatlije kovače bakar u ploče",nst:"Radionice gdje kovače kovaju bakar. Zvuk. Ploče €5-20. Suveniri po cijeni. Gledaj zanatos.",nt:"Jutro kada kovači rade. Donesi štitnik za uši. Dogovor prijateljski. Samo gotovina."},
  {id:79,n:"Hluboká Castle Day Trip  #69 — Regional",a:"Regional",v:["history", "beautiful"],d:60,s:"Neo-Gothic castle with turrets overlooking Vltava",st:"UNESCO-listed. Stunning. Can reach by international bus. Gothic revival masterpiece. Tour the rooms (€10). Walk the grounds. Museum inside.",im:"1880s: Built as romantic fantasy. 2024: Still magical.",t:"Full day trip. Bring snacks. Castle tours hourly.",c:["history_big", "architecture"],r:"g",nn:"Hluboká Hrad  #69 — Regional",ns:"Neogoticka tvrđava sa tornjavima",nst:"UNESCO listani. Prekrasan. Internacionalni autobus. Neogoticka remek-dela. Obilazak soba (€10).",nt:"Cijeli dan. Donesi grickice. Tureje sata."},
  {id:80,n:"Šumava National Park  #70 — Šumava",a:"Šumava",v:["nature", "quiet"],d:60,s:"Pristine forest where bears and lynx still roam",st:"Remote mountain forest. Hiking trails. Lakes. Silence. You\'ll see maybe 3 people all day. UNESCO biosphere. Camping possible. Real wilderness 90 min from city.",im:"Medieval: Logging frontier. 2024: Protected, regenerating, wild again.",t:"Train to park entrance (€8). Bring water, snacks. All-day hikes possible.",c:["nature", "parks"],r:"g",nn:"Prirodni Park Šumava  #70 — Šumava",ns:"Nepromijenjena šuma gdje medvjedi i linx još šetaju",nst:"Udaljena planinska šuma. Pešačke staze. Jezera. Ćutnja. Samo 3 osoba. Kamping moguć.",nt:"Trena do ulaza (€8). Donesi vodu, grickice. Cijeli dan moguć."},
  {id:81,n:"Stari Most  #71 — Old Bridge",a:"Old Bridge",v:["history", "beautiful"],d:0,s:"Iconic 450-year-old Ottoman bridge over emerald water",st:"Built 1566. Destroyed 1993 in war, rebuilt 2004. Divers jump from 23m (mad but awesome). Bridge connects Muslim and Christian sides. Museum inside shows war damage still.",im:"1566: Ottoman master builds beauty. 1993: War destroys it. 2024: Rebuilt and defiant.",t:"Watch divers jump around 11am. Museum €4. Water absolutely cold.",c:["history_big", "architecture"],r:"g",nn:"Stari Most  #71 — Old Bridge",ns:"Ikonična osmanska ćuprija stara 450 godina",nst:"Izgrađena 1566. Srušena 1993 u ratu, ponovo izgrađena 2004. Ronilci skaču sa 23m. Muzej pokazuje ratnu štetu.",nt:"Gledaj ronioce skakati 11 sati. Muzej €4. Voda hladna."},
  {id:82,n:"Koski Mosque  #72 — Old Bridge",a:"Old Bridge",v:["history", "beautiful"],d:0,s:"Ottoman mosque with minaret views over the bridge",st:"Built 1617. Climb 83 steps to minaret for views down to Stari Most. Prayer times 5x daily—visit between. Shoes off. Modest dress. Money box voluntary (€1-2).",im:"1617: Ottomans build minaret. 2024: You climb same 83 steps.",t:"Go before 1pm prayers. Light best at 10am. Respectful visits only.",c:["history_big", "architecture"],r:"g",nn:"Koski Mehmed-paša Džamija  #72 — Old Bridge",ns:"Osmanska džamija sa minaret pogledom na ćupriju",nst:"Izgrađena 1617. Popni se 83 stepenika na minaret. Bolje između molitev. Bosih nogu. Skromna odeća. Novčanik dobrovoljno.",nt:"Idi prije 13h molitve. Svjetlo best 10h. Samo pošteni posjetitelji."},
  {id:83,n:"Blagaj Tekke  #73 — Blagaj",a:"Blagaj",v:["history", "nature"],d:15,s:"Dervish monastery carved into cliffs beside emerald spring",st:"15km south. Turquoise spring gushes from cliff. Sufi lodge where monks lived in meditation. Prayer room inside cave. Kneeling on carpets under stone ceiling. Sacred, quiet, real.",im:"1500s: Dervishes seek transcendence here. 2024: Water still flows, still sacred.",t:"Minibus €2. Donation for monks (€2-3). Respectful silence only.",c:["history_big", "quiet"],r:"g",nn:"Blagajska Tekija  #73 — Blagaj",ns:"Derviška manastirska pećina sa izvorom",nst:"15km južno. Tekija sa izvorom. Izmedju molitve. Poštena, tiha, prava.",nt:"Minibus €2. Donaciija za monake (€2-3). Samo poštena ćutnja."},
  {id:84,n:"Sniper Alley & War Museum  #74 — East Side",a:"East Side",v:["scary", "history"],d:2,s:"Street where snipers killed 225+ civilians during 1990s war",st:"Bullet holes pock the buildings. Museum shows photos, shells, survivor stories. Walls still scarred. You feel the weight. War happened here, really here. Not glorified. Raw.",im:"1992-95: Civilians shot crossing street. 2024: Memorials stand. Never forget.",t:"Respectful visit. Bring water. Tour guide helps understand weight.",c:["scary", "history_big"],r:"y",nn:"Puca Avenija  #74 — East Side",ns:"Ulica gdje su sniajperi ubili 225+ civila u ratu",nst:"Zidovi ostali sa čavama metaka. Muzej pokazuje fotografije, ljuske, priče. Teško. Rat se desio ovdje.",nt:"Poštovan posjet. Donesi vodu. Vodar objašnjava istoriju."},

const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
{/* dark scrim over photo */}
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Mostar Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Mostar Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
