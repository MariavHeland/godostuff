The temple is working — locals come here to worship, not for tourism. Tourists are welcome but you\'re witnessing something real. The scale is intimate. The smoke is overwhelming. The quiet is profound.",im:"Standing in the main hall looking up at incense coils, the smoke layering, statues barely visible through the haze.",t:"District 5 (Cholon, Chinatown), 73 Mai Thi Luu Street. Open daily 8am-5pm. Free entry. Respectful dress required. No photos inside the main hall. About 2km from Ben Thanh Market (taxi €1-2 or bus).",c:["greatest_hits","history_big","quiet"],r:"g",nn:"Chùa Ngọc Hoàng",ns:"Một ngôi đền Việt Nam từ 1909 chứa đầy những bức tượng — trung tâm tinh thần.",nst:"Chùa Ngọc Hoàng nhỏ nhưng có bầu không khí mạnh mẽ. Các cuộn hương treo từ trần chứa đầy không khí khí đặc. Những bức tượng thần linh xếp hàng dọc theo các bức tường.

Đền là nơi hoạt động — người dân địa phương đến đây để thờ phượng. Du khách được chào đón nhưng bạn đang chứng kiến điều gì đó thực.",nt:"Quận 5 (Chợ Lớn, Tàu), 73 Phố Mai Thị Liễu. Mở 8-17 hàng ngày. Miễn phí. Quần áo tôn trọng. Không chụp ảnh ở phòng chính."},
  {id:141,n:"Mekong Delta day trip",a:"Can Tho (180km)",v:["famous","beautiful","nature"],d:480,s:"The river delta where Vietnam grows its food — floating markets, fruit orchards, canals stretching to the horizon.",st:"The Mekong Delta is not a destination you visit for one highlight. It\'s a landscape that functions as a living system. Take a boat early from Can Tho and move through the floating markets where vendors sell fruits, fish, and goods directly from boats. Watch the water reflect everything. Visit fruit orchards on islands and eat whatever is in season — rambutan, mango, papaya.

The scale is vast. The water is everywhere. The light is intense. Bring water and sun protection. The best guides take you to places where tourists rarely go — local villages where the market system actually supplies the nation\'s food.",im:"Sitting in a small motorboat in early morning, floating vendors approaching from all directions, fruits piled high on their boats, the water still.",t:"Buses from HCMC to Can Tho (3-4 hours, ₫200,000-300,000). Boats can be rented there or tours arranged through hotels. Best May-November. Go early (5am) for authentic markets. Bring sun protection. Safety: Boating is generally safe — go with established tour operators.",c:["greatest_hits","beautiful","nature"],r:"g",nn:"Thú Mekong ngày",ns:"Đồng bằng sông Mekong — thị trường nổi, vườn trái cây, kênh.",nst:"Đồng bằng Mekong không phải là điểm đến mà bạn ghé thăm cho một điểm nổi bật. Đó là một cảnh quan hoạt động như một hệ thống sống. Lấy một chiếc thuyền sớm từ Cần Thơ.

Quy mô là rộng lớn. Nước ở khắp nơi. Ánh sáng dữ dội.",nt:"Xe buýt từ TP.HCM đến Cần Thơ (3-4 giờ, ₫200-300k). Thuyền có thể được thuê ở đó. Tốt nhất tháng 5-11."},
  {id:142,n:"Landmark 81 observation deck",a:"Binh Thanh",v:["famous","high_spots","beautiful"],d:60,s:"The tallest building in Vietnam — 81 floors and you can see across the sprawl to where the city ends and the Mekong plain begins.",st:"Landmark 81 opened in 2017 and immediately became the city\'s highest point. The observation deck is on floor 81. The elevator takes 40 seconds. At the top, you see the full geography of Ho Chi Minh City: the Saigon River winding through, the concentration of tall buildings in the center, the sprawl of low-rise neighborhoods stretching to the horizon, and beyond that the flat Mekong Delta plain.

This is not subtle. It\'s the full vertical view of how the city is organized and who lives where. Go at sunset when the light turns the haze golden. Go at night when the lights spread endlessly.",im:"Looking out from the 81st floor as the sun drops, the city lights beginning to glow below, the Mekong plain invisible in the darkness beyond.",t:"Binh Thanh District, Landmark 81 building. Observation deck open 9am-10pm daily. €15-20 entry. Metro Line 1 to Binh Thanh, then taxi (€2-3). Best at sunset or 9-10pm.",c:["greatest_hits","beautiful","high_spots"],r:"g",nn:"Tầng quan sát Landmark 81",ns:"Tòa nhà cao nhất ở Việt Nam — 81 tầng và bạn có thể nhìn thấy.",nst:"Landmark 81 khai trương năm 2017 và ngay lập tức trở thành điểm cao nhất của thành phố. Tầng quan sát ở tầng 81. Thang máy mất 40 giây.

Đây không phải là tinh tế. Đây là tầm nhìn đầy đủ về cách tổ chức thành phố.",nt:"Binh Thanh, Tòa nhà Landmark 81. Tầng quan sát mở 9-22 hàng ngày. €15-20 vé."}
];

<script type="text/babel">
const {useState,useEffect,useMemo}=React;

<div className="lang-toggle">
<button className={`lang-btn ${lang==="en"?"active":""}`} onClick={()=>setLang("en")}>EN</button>

PHRASES.length>0&&<div className="rounded-2xl p-4 mt-3" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-3" style={{color:"#a78bfa"}}>🗣️ Useful {LANG_NAME} Phrases</h3>

<div><span className="text-xs font-bold" style={{color:"white"}}>{ph.native}</span>
<span className="text-xs ml-2" style={{color:"#8b7fb8"}}>— {ph.en}</span></div></div>)}</div></div>);

<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:"url('https://mariavheland.github.io/godostuff/textures/tex17.png') center/cover no-repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Ho Chi Minh City Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Ho Chi Minh City Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
