<script>
const P = [
  {id:1,n:"Bratislava Castle — Palace Overlooking Danube",a:"Castle Hill",v:["history", "beautiful"],d:45,s:"13th-century castle fortress dominating city skyline, rebuilt multiple times, stunning viewpoint",st:"Bratislava Castle commands the hilltop—a pale limestone structure visible from the Danube. Despite medieval origins, multiple rebuilds (Habsburg, Soviet, modern) mean no single period defines it. You climb to ramparts for 360-degree views: the Danube curves below, Vienna\'s spires appear across the border, the city spreads eastward. The castle houses a museum of Slovak history and culture.",im:"It\'s golden hour. You stand on the ramparts; Vienna glows in the distant west.",t:"10 EUR entry. Open Tuesday-Sunday 10am-6pm. Closed Mondays. Cafe on terrace.",c:["history_big"],r:"g",nn:"Bratislavský Hrad — Palác nad Dunajom",ns:"13-v. hrad крепост s panormickym vyhlad",nst:"Bratislavský Hrad vládne kopcu. Svetla vápenec krčka viditeľná z Dunaja. Vystúpiš na hradby pre panorámny výhľad. Dunaj sa vinie dole.",nt:"10 EUR vstup. Otvorené utorok-nedeľa 10:00-18:00. Kaviareň na terase."},
  {id:2,n:"UFO Bridge Observation Deck — Futuristic View",a:"New Town",v:["beautiful", "architecture", "weird"],d:35,s:"1972 bridge with distinctive UFO-shaped restaurant observation deck, best views of Danube",st:"The UFO Bridge looks like a starship landed. An inverted V-frame supports a disc hovering above the Danube. Inside the \'UFO\': a rotating restaurant and observation deck. Views sweep 360 degrees: the old town to the west, New Town sprawling east, the Danube carving through it all. The bridge is functional (cars rumble below) and surreal. It\'s 1970s futurism frozen in concrete.",im:"It\'s evening. The city lights ignite below as you rotate slowly, drink in hand.",t:"Bridge free to walk. Observation deck 5 EUR (includes drink). Restaurant 15-30 EUR per meal.",c:["beautiful"],r:"g",nn:"Most UFO — Pozorovateľ most",ns:"1972 most s UFO tvarovanou reštauráciou s vyhlad",nst:"Most UFO vyzerá ako vesmírna loď pristála. Obrátené V-rámu podpiera kotúčik nad Dunajom. Vnútri UFO: rotujúca reštaurácia. Výhľady obrúčajú sa okolo.",nt:"Most free. Observačný deck 5 EUR. Reštaurácia 15-30 EUR."},
  {id:3,n:"Old Town (Staré Mesto) — Medieval Heart",a:"Old Town",v:["history", "beautiful", "local"],d:15,s:"Compact medieval walled town with narrow streets, colorful buildings, main square, and shops",st:"The Old Town is intimate—you can traverse it in 15 minutes. Narrow cobbled streets wind between pastel buildings (mint, apricot, pale blue). Street musicians play; cafes spill onto squares. The Main Square anchors it, surrounded by palaces and the town hall. Churches poke above rooflines. It feels like stepping into a fairytale, yet locals live here, do laundry, shop at corner stores.",im:"It\'s dusk. You\'re lost in a network of narrow streets, entirely content being lost.",t:"Free to walk. Restaurants and cafes throughout (8-20 EUR meals). No cars allowed. Fully walkable.",c:["local_only"],r:"g",nn:"Staré Mesto — Stredoveké srdce",ns:"Kompaktné stredoveké opevnené mesto s úzkymi ulicami",nst:"Staré Mesto je intimné—prejdieš ho za 15 minút. Úzke uličky medzi pastelovými budovami. Ulični hudobníci hrajú. Kaviarne sú všade.",nt:"Slobodný vstup. Reštaurácie všade (8-20 EUR). Bez áut. Plne pešia."},
  {id:4,n:"Blue Church (Modrý Kostolík) — Art Nouveau Jewel",a:"New Town",v:["beautiful", "architecture", "weird"],d:25,s:"Distinctive pale-blue Art Nouveau church (1913), whimsical design, functioning parish church",st:"The Blue Church is unlike any church you\'ve seen. Pale blue tiles cover the exterior. The design is whimsical—rounded walls, ornate turrets, no sharp angles. Built 1913, it\'s pure Art Nouveau. The interior is intimate: a single nave, ornate wooden furnishings, stained glass. It\'s still a functioning parish church; worshippers bow before the altar while tourists gawk. The dissonance between spiritual and touristic is palpable.",im:"It\'s a quiet Sunday. A wedding party poses outside the blue walls.",t:"Free entry (donations welcome). Open 10am-5pm daily. Photography allowed outside.",c:["beautiful"],r:"g",nn:"Modrý Kostolík — Artová novodeková klenota",ns:"Jedinečná bledomodrá artová nová cirkev (1913) s fantázijným dizajnom",nst:"Modrý kostolík je ako kľúč v budúcnosti. Bledé modré obklady pokrývajú vonkajšinu. Dizajn je fantázijný. Vnútri je intímne s ornamentálnym drevom.",nt:"Slobodný vstup (dary mile vidzané). Otvorené 10:00-17:00. Fotografia mimo."},
  {id:5,n:"Slavín War Memorial — Hilltop Panorama",a:"Slavín Hill",v:["history", "beautiful", "quiet"],d:55,s:"Soviet war memorial atop hill with panoramic views, contains 6,840 WWII grave sites",st:"Slavín rises from a hilltop—a Soviet obelisk with an eternal flame. The memorial honors Soviet soldiers who died liberating Slovakia in 1945. Concentric circles of graves spiral outward. Views from the hilltop sweep the city, the Danube, and into Hungary. It\'s simultaneously beautiful and heavy—a monument to sacrifice, now contested (post-Soviet politics). Locals walk here for views; pilgrims come for remembrance.",im:"It\'s a misty afternoon. The obelisk emerges from fog; the city vanishes below.",t:"Free entry. Always open. Peaceful walking paths. 20min bus from city center. Respectful attire required.",c:["history_big"],r:"g",nn:"Slavín Vojnový Pamätník — Panorama",ns:"Sovietsky vojnový pamätník s hrobmi 6,840 WWII",nst:"Slavín sa zdvíha z kopca—Sovietska obeliska s večným plameňom. Pamätník cti vojakov. Pohľady sa rozprestierajú.",nt:"Slobodný vstup. Otvorené vždy. Rešpektné oblečenie."},
  {id:6,n:"Devin Castle Ruins — River Confluence Fortress",a:"Devin",v:["history", "beautiful", "hidden"],d:120,s:"Medieval castle ruins at the confluence of Danube and Morava rivers, destroyed by Napoleon",st:"Devin Castle rises dramatically where two rivers meet. What remains: fragmentary stone walls and towers. Napoleon\'s army blew it up in 1809; it\'s been romantic ruins ever since. You climb steep paths to reach the site. Views encompass three countries: Slovakia, Austria, Hungary. It\'s windswept, isolated, and magnificently desolate. Locals hike here; tourists photograph the dramatic setting.",im:"It\'s windy. You\'re climbing toward ruins; three countries lay at your feet.",t:"5 EUR entry. Bus 29 from city (30min). Walking trails throughout ruins. Cafe at base.",c:["history_big"],r:"g",nn:"Devinský Hrad — Ruiny pri Dunaji",ns:"Stredoveké ruiny hradu na konfluencii Dunaja a Moravy",nst:"Devinský Hrad sa zdvíha dramaticky kde sa stretávajú dve rieky. Zvyšky: fragmentárne steny. Napoleón ho vyhodil.",nt:"5 EUR vstup. Autobus 29 z mesta (30 min). Pešie trasy."},
  {id:7,n:"Michael\'s Gate Tower — Medieval Survivor",a:"Old Town",v:["history", "architecture"],d:12,s:"14th-century gate tower, sole survivor of city fortifications, with museum inside",st:"Michael\'s Gate is all that remains of the city\'s medieval fortifications. A narrow tower (14th century) rises four stories. Inside: a small museum of city history. You climb stairs to the top: cramped quarters, period furnishings, views of Old Town rooftops. The gate is minor but essential—it\'s a tangible thread to medieval Bratislava.",im:"It\'s afternoon. You\'re winding up narrow stone stairs in a 700-year-old tower.",t:"2 EUR entry. Open 10am-5pm daily. Steep stairs (warning for mobility issues). Tight quarters.",c:["history_big"],r:"g",nn:"Michalská Brána — Stredoveká Veža",ns:"14-v. brána veža, jediná zvyšok opevnenia s múzeom",nst:"Michalská Brána je všetko čo zostáva. Úzka veža (14. storočie). Vnútri: malé múzeum. Liezaš na vrch.",nt:"2 EUR vstup. Otvorené 10:00-17:00. Strmé schody."},
  {id:8,n:"Cumil Sewer Worker Statue — Quirky Icon",a:"Old Town",v:["weird", "hidden", "local"],d:10,s:"Bronze statue of sewer worker emerging from manhole, beloved local symbol with rubbed-shiny nose",st:"Cumil is a sewer worker frozen mid-emergence from a manhole—legs dangling, grinning upward. Installed 1997, this quirky statue has become iconic. Tourists rub his nose for luck (hence it shines). Locals treat it affectionately. It\'s deliberately weird, humanizing mundane labor. Stand here at night: Cumil catches streetlight, looking mischievous. Few cities have such disarming public art.",im:"It\'s evening. Cumil grins from his hole; tourists queue to rub his nose.",t:"Free. Always accessible. Popular photo spot. No facilities nearby.",c:["weird"],r:"g",nn:"Cumil Socha — Zvláštna ikona",ns:"Bronzová socha robotníka čistiacej kanálov s lesklým nosom",nst:"Cumil je čistič kanálov zmrazený pri vyleze z potoka. Nainštalovaný 1997. Turisti trú nos na šťastie. Miestni to milujú.",nt:"Slobodný. Vždy dostupný. Populárne miesto na fotografovanie."},
  {id:9,n:"Main Square (Hlavné Námestie) — Heart of Old Town",a:"Old Town",v:["history", "beautiful", "local"],d:14,s:"Central square surrounded by palaces, town hall with tower, cafes and restaurants",st:"Hlavné Námestie radiates charm. The town hall dominates with a Renaissance tower. Surrounding palaces house cafes; outdoor seating creates an animated plaza. Musicians play; tourists loiter; locals cut through en route to somewhere. Festivals happen here: Christmas markets, summer concerts, political gatherings. The square is the city\'s nerve center—everything happens here or near here.",im:"It\'s sunset. The square glows gold; the town hall tower silhouettes.",t:"Free walking. Cafes/restaurants 8-25 EUR per meal. Full accessibility. Always busy.",c:["local_only"],r:"g",nn:"Hlavné Námestie — Srdce mesta",ns:"Centrálne námestie obkľúčené paláciami a mestnou halou",nst:"Hlavné Námestie žiari kúzlom. Mestná hala dominuje s renesančnou vežou. Kaviarne sú všade. Muzykanti hrajú.",nt:"Slobodný vstup. Kaviarne všade (8-25 EUR). Vždy obsadené."},
  {id:10,n:"Primate\'s Palace — Renaissance Masterpiece",a:"Old Town",v:["architecture", "history", "beautiful"],d:16,s:"18th-century Renaissance palace, once bishops\' seat, now city library and concert venue",st:"The Primate\'s Palace is aristocratic restraint. Pink walls, ornate portal, manicured gardens enclosed by gates. Inside: formal halls, chandeliers, period furnishings. It once housed the archbishop; now it\'s a library and concert venue. You can attend classical performances in the drawing room. The gardens are intimate—hidden from street noise, perfect for reading or reflection.",im:"It\'s a concert evening. You\'re sitting in an 18th-century drawing room, hearing Chopin.",t:"2 EUR entry. Open 10am-5pm Tuesday-Sunday. Concerts some evenings (15-25 EUR). Closed Mondays.",c:["history_big"],r:"g",nn:"Pálac Primasa — Renesančný Majsterpiece",ns:"18-v. renesančný palác, bývalé sídlo biskupa, teraz knižnica",nst:"Pálac Primasa je aristokratické zdrž. Ružové steny, ornamentálny portál, bezpečné záhrady. Vnútri: formálne haly, krištály.",nt:"2 EUR vstup. Otvorené utorok-nedeľa 10:00-17:00. Koncerty (15-25 EUR)."},
  {id:11,n:"Slovak National Theatre — Grand Performance Hall",a:"Old Town",v:["history", "architecture", "beautiful"],d:18,s:"Neoclassical theatre (1886), premier opera and drama venue, ornate interior",st:"The National Theatre is Vienna-style grandeur transplanted to Bratislava. Red velvet seats, gilded balconies, crystal chandeliers. The facade is neoclassical perfection. Inside, performances range from classical opera to contemporary drama. Opening nights draw formal crowds. It\'s a symbol of Slovak cultural pride—built when Slovakia was merely Upper Hungary, now it hosts a sovereign nation\'s cultural life.",im:"It\'s opening night. You\'re in formal attire, ascending velvet stairs to the balcony.",t:"Performances nightly (except Mondays). Tickets 8-40 EUR. Book online. Tours available weekdays.",c:["history_big"],r:"g",nn:"Slovenský Národný Divadlo — Veľká sála",ns:"Neoklasickí divadlo (1886), prvá opera a dráma, ornamentálny interiér",nst:"Národný Divadlo je viedenský lesk presadený do Bratislavy. Cervené sametové sedadlá, pozlátené balkóny, kryštalové lustre.",nt:"Predstavenia každú noc (okrem pondelkov). Lístky 8-40 EUR. Rezervuj online."},
  {id:12,n:"Grassalkovich Palace Gardens — Formal Green Space",a:"New Town",v:["beautiful", "quiet", "nature"],d:32,s:"18th-century palace gardens, formally landscaped, now presidential residence grounds",st:"The Grassalkovich Gardens are European formal landscaping—symmetrical beds, tree-lined paths, fountains. The palace (inaccessible, it\'s the president\'s residence) anchors the gardens. You stroll manicured paths, sitting on benches, watching swans glide in ponds. It\'s serene, protective, slightly exclusive-feeling despite public access. Few tourists venture here; locals bring children and dogs.",im:"It\'s a quiet morning. You\'re alone on a path lined with manicured hedges.",t:"Free entry. Open dawn to dusk. Peaceful walking. No facilities. Dogs on leash welcome.",c:["nature"],r:"g",nn:"Záhrady Palača Grassalkovicha — Formálna Zeleň",ns:"18-v. paláca záhrady, formálne upravené, teraz prezidentskej rezidencia",nst:"Záhrady Grassalkovicha sú európsky formálny dizajn. Symetrické záhony, stromové cesty, fontány. Palác (nedostupný) je sídlo prezidenta.",nt:"Slobodný vstup. Otvorené od svítania do súmraku. Pešie. Psi na páse."},
  {id:13,n:"Danube Riverside Cycling — Scenic Waterfront",a:"Danube",v:["nature", "local", "beautiful"],d:60,s:"Extensive cycling paths along Danube, scenic routes to Austrian border and beyond",st:"Bratislava is the Danube\'s gateway to Central Europe. Cycling paths hug the river—scenic, flat, safe. You pedal from the city westward toward Austria (Vienna is reachable by bike). Eastward, paths follow the Danube into Slovakia. Fishermen cast lines; families cycle; joggers run. The river is alive. You stop at cafes built into the riverside, swimming spots, boat launches.",im:"It\'s warm afternoon. You\'re cycling along the Danube, Vienna visible across the water.",t:"Free to cycle. Bike rentals 10 EUR/day. Riverside cafes (8-20 EUR). Flat, accessible routes.",c:["nature"],r:"g",nn:"Dunajské Cyklovanie — Scenické breh",ns:"Rozsiahle cyklisti dráhy pozdĺž Dunaja",nst:"Bratislava je Dunajová brána do Strednej Európy. Cyklistické dráhy hľadia rieku. Pedáluješ západne smerom k Rakúsku.",nt:"Slobodný velo. Prenájom kôl 10 EUR/deň. Dunajové kaviarne."},
  {id:14,n:"Eurovea Waterfront — Modern Development",a:"New Town",v:["architecture", "modern"],d:25,s:"Contemporary waterfront complex with shops, restaurants, casino, cycling paths",st:"Eurovea is Bratislava\'s attempt at modern urbanism. Glass buildings, shops, restaurants, a casino, and riverside promenade. It feels imported—sleek and international. Yet locals frequent it (shops are affordable, restaurants varied). Cycling paths extend along the riverside. At night, the complex glows. It\'s gentrified but functional—a microcosm of post-Soviet Bratislava reinventing itself.",im:"It\'s evening. You\'re window shopping, watching the Danube flow past glass facades.",t:"Free walking. Shops 10am-8pm. Restaurants 10am-11pm. Cycling access free.",c:["architecture"],r:"g",nn:"Eurovea Nábežie — Moderný vývoj",ns:"Súčasný nábežný kompleks s obchodmi a reštauráciami",nst:"Eurovea je Bratislavský pokus o modernú urbanitu. Sklenené budovy, obchody, reštaurácie. Miestni tu chodia.",nt:"Slobodný vstup. Obchody 10:00-20:00. Reštaurácie 10:00-23:00."},
  {id:15,n:"St Martin\'s Cathedral — Gothic Landmark",a:"Old Town",v:["history", "architecture", "beautiful"],d:20,s:"15th-century Gothic cathedral, coronation church of Hungarian kings, soaring interior",st:"St Martin\'s Cathedral soars above Old Town. The 85-meter spire pierces the skyline. Inside: Gothic vaults, stained glass, elaborate altars. For three centuries, Hungarian kings were crowned here. You kneel on ancient stone; prayers echo in the heights. Despite tourism, spirituality endures. The cathedral is both functioning church and historical monument.",im:"It\'s late afternoon. Golden light floods through stained glass; shadows dance on stone.",t:"Free entry. Open 9am-6pm daily. Climbing tower 3 EUR, 96 steps. Tours available.",c:["history_big"],r:"g",nn:"Dóm sv. Martina — Gotické Orientačný bod",ns:"15-v. gotický dóm, korunovácia kostol, vysoký interiér",nst:"Dóm sv. Martina sa zdvíha nad mestom. 85-metrový kňažok prebúcha obzor. Vnútri: gotické klenby, vitráže. Tu boli korunovaní maďarskí králi.",nt:"Slobodný vstup. Otvorené 9:00-18:00. Lezenie veže 3 EUR."},
  {id:16,n:"Good Shepherd House — Clock Museum",a:"Old Town",v:["weird", "architecture", "beautiful"],d:13,s:"Quirky Baroque house with slanted roof and clock museum, smallest baroque building",st:"The Good Shepherd House is charmingly weird. A Baroque building with a slanted roof (asymmetrical, as if melting), it houses a clock museum. Inside: a dozen rooms displaying timepieces—mechanical clocks, pendulums, hourglasses. The building predates the square, which was expanded around it. It\'s beloved, photographed, and utterly Slovak in its quirky preservation.",im:"It\'s a misty morning. The clock house sits tilted, mysterious in fog.",t:"2 EUR entry. Open 10am-5pm Tuesday-Sunday. Photography limited inside. Closed Mondays.",c:["weird"],r:"g",nn:"Dobre Pastiera Dom — Hodinový Múzeum",ns:"Čudná baroková sieň s šikmou strechou a hodinovým múzeom",nst:"Dobre Pastiera Doma je pútavo čudná. Baroková sieň so šikmou strechou. Vnútri: múzeum hodín. Budova je staršia než námestie.",nt:"2 EUR vstup. Otvorené utorok-nedeľa 10:00-17:00. Fotografia obmedzená."},
  {id:17,n:"Nedbalka Gallery — Slovak Modern Art",a:"Old Town",v:["hidden", "beautiful", "architecture"],d:21,s:"Private mansion turned art gallery showcasing Slovak modern and contemporary works",st:"Nedbalka Gallery is hidden in an Old Town mansion—you could pass without noticing the entrance. Inside: intimate rooms filled with Slovak modern art. Works range from pre-WWII avant-garde to contemporary installations. The gallery is run by a collector\'s family; it feels personal, curated with taste. Few tourists find it; those who do consider themselves lucky. The architecture (wooden staircases, period rooms) enhances the art.",im:"It\'s afternoon. You\'re alone in a room with a 1920s avant-garde painting.",t:"4 EUR entry. Open Wednesday-Sunday 12pm-6pm. Small spaces, quiet. Photography sometimes restricted.",c:["hidden"],r:"g",nn:"Galeria Nedbalka — Slovenská Moderná Umenia",ns:"Privátna sieň premenená na galeria s modelného umeňa",nst:"Galeria Nedbalka je skrytá v mestskej sieni. Vnútri: intímne miestnosti plné umenia. Galeria je vedená rodinou zberateľa.",nt:"4 EUR vstup. Otvorené streda-nedeľa 12:00-18:00. Fotografia obmedzená."},
  {id:18,n:"Chatam Sofer Memorial — Jewish Heritage",a:"Old Town",v:["history", "quiet"],d:19,s:"Memorial to prominent rabbi and scholar, with museum documenting Jewish Bratislava",st:"The Chatam Sofer Memorial honors Rabbi Moses Schreiber (1762-1839), a towering Jewish figure. The museum documents Bratislava\'s once-vibrant Jewish community—photos, ceremonial objects, documents. WWII devastated this community; few descendants remain. The memorial is solemn, educational, essential. It\'s easy to visit quickly but rewards contemplation. The exhibits contextualize Central European Jewish life before catastrophe.",im:"It\'s quiet afternoon. You\'re reading exhibition text, understanding lives erased.",t:"2 EUR entry. Open Sunday-Thursday 2pm-5pm. Closed Fridays and Saturdays. Photography limited.",c:["history_big"],r:"g",nn:"Pamätník Chatam Sofer — Židovské Dedičstvo",ns:"Pamätník na významného rabína s múzeom židovskej Bratislavy",nst:"Pamätník cti rabína Móžiša Schrijera. Múzeum dokumentuje židovskú komunitu Bratislavy. Existuje pred katastrofou WWII.",nt:"2 EUR vstup. Otvorené nedeľa-štvrtok 14:00-17:00. Zatvorené piatky a soboty."},
  {id:19,n:"Sad Janka Krala Park — Oldest Public Park, Central Europe",a:"New Town",v:["nature", "local", "beautiful"],d:40,s:"1856 public park (oldest in Central Europe), forested, walking paths, riverside location",st:"Sad Janka Krala is where Bratislava breathes. Established 1856, it\'s the region\'s oldest public park. Ancient trees provide shade; walking paths wind through woods. A small lake sits peacefully. The Danube curves nearby. Families bring children, joggers circle, old men play chess on benches. It\'s unpretentious, lived-in, and vital to the city\'s livability. Locals come here to escape urban stress.",im:"It\'s a warm afternoon. You\'re reading beneath ancient trees; children play nearby.",t:"Free entry. Open dawn to dusk. Excellent running/walking paths. Rowing available on lake.",c:["nature"],r:"g",nn:"Park Janka Krala — Najstarší verejný park Strednej Európy",ns:"1856 park (najstarší v Strednej Európe), lesnatý, pešie cesty",nst:"Park Janka Krala je kde Bratislava dýcha. Založený 1856, je najstarší park v regióne. Staré stromy tieň. Pešie cesty sa kľučatia.",nt:"Slobodný vstup. Otvorené od svítania do súmraku. Výborné cesty."},
  {id:20,n:"Kamzík TV Tower — Mountain Viewpoint",a:"Kamzík",v:["beautiful", "nature"],d:50,s:"Hillside TV tower with rotating restaurant, panoramic city and Danube views",st:"Kamzík Tower sits on a wooded hilltop, a UFO-like structure (compare to Bratislava Bridge). Inside: a rotating restaurant (you dine 360 degrees), observation deck, gift shop. Views encompass the Danube sprawling, the old town reduced to doll-house scale, the Little Carpathians rising eastward. It\'s touristy but functional. Locals come here for special dinners; tourists come for views.",im:"It\'s sunset. The restaurant slowly rotates; the city glows below.",t:"3 EUR observation deck. Rotating restaurant 15-35 EUR per meal. Bus 37 from city center.",c:["beautiful"],r:"g",nn:"TV Veža Kamzík — Vrch Pohľad",ns:"TV veža s rotujúcou reštauráciou a panorámnym pohľadom",nst:"Veža Kamzík sedí na lesnatom kopci, UFO-podobná štruktúra. Vnútri: rotujúca reštaurácia. Pohľady obopínajú Dunaj.",nt:"3 EUR observačný deck. Reštaurácia 15-35 EUR. Autobus 37."},
  {id:21,n:"Koliba Hill Viewpoint — Forest Panorama",a:"Koliba",v:["nature", "quiet", "beautiful"],d:45,s:"Scenic overlook in forested hills north of city, accessible by hiking or local train",st:"Koliba Hill is a local secret. You climb or ride the funicular to a viewpoint overlooking the city and surrounding forests. It\'s less touristy than Kamzík. Hiking trails branch off into woodlands. The view is pastoral—city, river, distant mountains. Older Bratislavans remember when this area was countryside; now it\'s being developed. Yet it remains peaceful, less commercialized.",im:"It\'s misty afternoon. You\'re alone on a viewpoint, the city muted below.",t:"Free viewpoint. Funicular 3 EUR round trip. Hiking trails free. Few tourists.",c:["nature"],r:"g",nn:"Kopec Koliba — Lesný Pohľad",ns:"Scenický pohľad v lesnatých vrcoch severu mesta",nst:"Kopec Koliba je miestny tajomstvo. Liezaš alebo jazdíš kabínkou na pohľad. Pohľad je semiruder. Úžasné lesné cesty.",nt:"Slobodný pohľad. Kabínka 3 EUR. Pešie cesty zadarmo."},
  {id:22,n:"Aupark Shopping and Entertainment District",a:"Aupark",v:["modern", "local"],d:35,s:"Contemporary shopping mall and entertainment complex with restaurants, cinemas, and shops",st:"Aupark is post-Soviet aspiration realized. Shiny, new, Western-style mall with global brands, local restaurants, cinema. Bratislava residents shop here; it\'s a gathering space for youth and families. It\'s consumerist but functional—Slovakia integrating into European consumer culture. It\'s not romantic, but it\'s real.",im:"It\'s weekend. The mall is full; teenagers cluster in food courts.",t:"Free to walk. Shops 9am-9pm daily. Restaurants 10am-10pm. Cinema tickets 8 EUR.",c:["modern"],r:"g",nn:"Aupark Oblastí Nákupu a Zábava",ns:"Moderný obchodný dom a zábavný komplex",nst:"Aupark je postsovietska aspirácia realizovaná. Lesklý, nový, západný štýl obchodného domu. Bratislavskí obyvatelia tu nakupujú.",nt:"Slobodný vstup. Obchody 9:00-21:00. Reštaurácie 10:00-22:00."},
  {id:23,n:"Ružinov Neighborhood — Residential Quarter",a:"Ružinov",v:["local", "quiet"],d:50,s:"Working-class residential neighborhood with local shops, cafes, authentic atmosphere",st:"Ružinov is where regular Bratislavans live. Soviet-era apartment blocks alternate with local shops and pubs. There\'s no tourists, no English signage. You\'re an outsider here—acknowledged but not catered to. This is authentic post-communist urban living: laundry drying on balconies, grandmothers tending flower boxes, elderly men drinking beer at corner bars. It\'s the inverse of Old Town—real neighborhood life.",im:"It\'s evening. You\'re in a local pub with pensioners, drinking cheap beer.",t:"Free to walk. Local pubs/cafes 2-5 EUR per drink. Authentic restaurants 5-12 EUR.",c:["local_only"],r:"g",nn:"Ružinov Štvrť — Obytná Štvrť",ns:"Pracovnícka obytná štvrť s miestnym nákupom a kávarnami",nst:"Ružinov je kde žijú normálni Bratislávčania. Sovietske byty alternujú s miestnym nákupom. Nie sú turisti, bez anglických znakov.",nt:"Slobodný vstup. Miestne kaviarne 2-5 EUR. Reštaurácie 5-12 EUR."},
  {id:24,n:"Vienna by Train — 1-Hour Day Trip",a:"Vienna",v:["history", "beautiful"],d:90,s:"Austrian capital reachable via direct train in 60 minutes, major European cultural hub",st:"Vienna is an hour away by train—closer than many Bratislava neighborhoods. Trains depart hourly. You emerge in Austria\'s imperial capital: Schönbrunn Palace, St Stephen\'s Cathedral, the Hofburg, elegant cafes serving Sachertorte. Vienna is grander, richer, older. Bratislava residents treat it as a nearby day-trip. It\'s a poignant contrast: two neighboring capitals, vastly different wealth and aesthetics.",im:"It\'s morning. You board the train; 60 minutes later, you\'re in Vienna\'s grand squares.",t:"Train tickets 4 EUR one-way (book online). Hourly service 5am-midnight. Travel time 55-65 minutes.",c:["history_big"],r:"g",nn:"Viedeň Vlakom — 1-Hodinová Výlet",ns:"Rakúska hlavné mesto dosťažné vlakom za 60 minút",nst:"Viedeň je hodinu vlakom. Vlaky odriekajú každú hodinu. Viedeň je impériálna: Schönbrunn, katedrála sv. Štefana. Rakúska je bogatá.",nt:"Vlaková lístka 4 EUR (rezervuj online). Hodinová služba. Čas cesty 55-65 minút."},
  {id:25,n:"Devín Castle Day Hike — River Confluence",a:"Devín",v:["history", "nature", "beautiful"],d:120,s:"Full-day hike to medieval castle ruins at confluence of Danube and Morava rivers",st:"A Devín Castle day hike is achievable from Bratislava. Bus 29 brings you close; the final climb is steep but short. The ruin overlooks where two rivers meet—three countries converge. Hiking down, you follow the Morava riverbank, eventually reaching the Danube. The hike combines history, nature, and geography: you see the landscape as ancient peoples did. It\'s strenuous but rewarding.",im:"It\'s afternoon. You\'re descending from the ruins along a river, exhausted and exhilarated.",t:"Free hiking. Bus 29 5 EUR round-trip. Meals/snacks at cafe near ruins. 5-6 hours total hiking time.",c:["nature"],r:"g",nn:"Výlet na Hrad Devín — Rieková Konfluencia",ns:"Celodenný výstup na hrad na konfluencii riek",nst:"Výlet na Devín je dosťažný z Bratislavy. Autobus 29 ta privezá. Lezenie je strmé ale krátke. Pohľad na tri krajiny.",nt:"Slobodný výstup. Autobus 29 5 EUR. Jedlo v kaviarne. 5-6 hodín chôdze."},
  {id:51,n:"Červený Kameň Castle — Hilltop Fortress",a:"Červený Kameň",v:["history", "beautiful"],d:180,s:"Medieval castle north of Bratislava, accessible day trip, museum and grounds",st:"Červený Kameň sits on a hilltop overlooking the Slovak countryside. A functional castle (not ruins), it houses a museum of weapons, furniture, and noble life. You climb through chambers, admiring views. It\'s less touristy than Devin, more preserved. The approach meanders through villages.",im:"It\'s afternoon. You\'re on the castle battlements; Slovak plains roll away.",t:"10 EUR entry. Bus from city 1 hour. Open 9am-6pm daily. Tours available.",c:["history_big"],r:"g",nn:"Hrad Červený Kameň — Kopec Tvrz",ns:"Stredoveký hrad severu mesta, muzeum a pozemky",nst:"Hrad Červený Kameň sedí na kopci. Funkčný hrad (nie ruiny) s múzeom. Liezaš cez miestnosti.",nt:"10 EUR vstup. Autobus 1 hodinu. Otvorené 9:00-18:00."},
  {id:52,n:"Modra Wine Town — Viticultural Hub",a:"Modra",v:["nature", "local", "hidden"],d:150,s:"Wine-producing town in Little Carpathians, vineyard landscapes, local wine tastings",st:"Modra is where Slovak wine is made. Vineyards carpet surrounding hills. Small winery operations dot the town. You can taste local wine—whites and reds—directly from producers. The town itself is sleepy, charming. Architecture reflects centuries. It\'s a retreat from Bratislava\'s intensity.",im:"It\'s afternoon. You\'re in a winery\'s cellar, tasting Modra\'s signature wines.",t:"Free to walk. Wine tastings 5-10 EUR. Train from Bratislava 45 minutes. Local restaurants.",c:["local_only"],r:"g",nn:"Modra Vinárska Dedina — Viničná centrálna",ns:"Vinárska dedina s vinničnými krajinkami, vinárskeho chutí",nst:"Modra je kde sa vyrába slovenské víno. Vinice pokrývajú kopce. Môžeš ochutnať miestné víno priamo od výrobcov.",nt:"Slobodný vstup. Víno 5-10 EUR. Vlak 45 minút. Reštaurácie."},
  {id:53,n:"Banská Štiavnica UNESCO Mining Town",a:"Banská Štiavnica",v:["history", "beautiful", "quiet"],d:240,s:"UNESCO-protected 13th-century mining town, preserved medieval architecture, mountain setting",st:"Banská Štiavnica is Europe\'s oldest mining town (13th century). Medieval streets twist up mountains. Old miners\' houses with Renaissance details. Mines are partially accessible. The town feels untouched by modernity—preserved, protected, authentic. Few tourists journey this far; those who do find themselves in the past.",im:"It\'s morning. You\'re in a medieval square surrounded by miners\' guild houses.",t:"Free to walk. Mine museum 3 EUR. Bus from Bratislava 2.5 hours. Guesthouses 20-40 EUR/night.",c:["history_big"],r:"g",nn:"Banská Štiavnica YUNESKO Banskí Mesto",ns:"YUNESKO-zastavená 13-v. banskí mesto s stredovekou architektúrou",nst:"Banská Štiavnica je najstaršie banskí mesto Európy. Stredoveké ulice sa kľučatia. Staré baníckych domov s renesančnými detailami.",nt:"Slobodný vstup. Banský múzeum 3 EUR. Autobus 2,5 hodiny."},
  {id:54,n:"Obchodná Street — Shopping Pedestrian Zone",a:"Old Town",v:["local", "beautiful"],d:15,s:"Main shopping street, pedestrian-only, boutiques, cafes, central commercial hub",st:"Obchodná is Bratislava\'s shopping spine. Pedestrians only; boutiques alternate with cafes. It\'s lively, commercial, social. Teenagers congregate here; shoppers hunt deals. It connects Old Town to New Town. It\'s the city\'s beating commercial heart.",im:"It\'s afternoon. The street throngs with shoppers; street musicians play.",t:"Free walking. Shops 9am-8pm. Cafes 8am-9pm. Very accessible.",c:["local_only"],r:"g",nn:"Ulica Obchodná — Nákupná Pešia Zóna",ns:"Hlavná nákupná ulica, pešia-iba, butiky, kaviarne",nst:"Obchodná je Bratislava nákupný chrbtica. Pešiaci iba; butiky striedajú s kaviarňami. Živá, komerčná.",nt:"Slobodný vstup. Obchody 9:00-20:00. Kaviarne 8:00-21:00."},
  {id:55,n:"Hviezdoslavovo Square — Entertainment Center",a:"Old Town",v:["beautiful", "local"],d:16,s:"Tree-shaded square with theaters, restaurants, outdoor seating, cultural hub",st:"Hviezdoslavovo is Bratislava\'s cultural plaza. Theaters line the square. Restaurants with outdoor seating create atmosphere. It\'s where culture and commerce blend. Performances happen; people linger over drinks. It\'s vibrant, accessible, beloved.",im:"It\'s evening. The square glows; people fill the outdoor seating.",t:"Free walking. Restaurants 8-25 EUR per meal. Theater tickets 10-40 EUR.",c:["local_only"],r:"g",nn:"Hviezdoslavovo Námestie — Zábavný Centrum",ns:"Stromový námestie s divadlami, reštauráciami, kultúrny hub",nst:"Hviezdoslavovo je kultúrna plaza Bratislavy. Divadlá obopínajú námestie. Reštaurácie s vonkajšími sedadlami.",nt:"Slobodný vstup. Reštaurácie 8-25 EUR. Divadlo 10-40 EUR."},
  {id:56,n:"Medická Garden — Green Retreat",a:"Downtown",v:["nature", "quiet", "beautiful"],d:25,s:"Historic botanical garden, plant collections, peaceful paths, urban green space",st:"Medická Garden is Bratislava\'s green sanctuary. Botanical sections, sculptures, quiet paths. It\'s smaller than Grassalkovich, more intimate. Few tourists venture here; it\'s a local secret. You can spend hours wandering, reading on benches, observing nature.",im:"It\'s afternoon. You\'re alone on a garden path; birdsong surrounds you.",t:"3 EUR entry. Open 9am-5pm daily. Peaceful, fully accessible.",c:["nature"],r:"g",nn:"Medická Záhrada — Zelená Útočisko",ns:"Historická botanická záhrada s rastlinami, pokojné cesty",nst:"Medická Záhrada je Bratislava zelená svätyňa. Botanické sekcie, sochy, pokojné cesty.",nt:"3 EUR vstup. Otvorené 9:00-17:00. Pokojné, prístupné."},
  {id:57,n:"Craft Beer Bars — Local Brewery Culture",a:"Old Town",v:["local", "night"],d:18,s:"Independent craft beer venues in Old Town, local brews, beer enthusiast community",st:"Bratislava\'s craft beer scene thrives in Old Town basements and converted spaces. Small breweries serve unique, high-quality beers. You chat with brewers, taste flights, join a community. It\'s distinctly Slovakian—pride in local production, attention to quality. Prices are reasonable (3-6 EUR per beer).",im:"It\'s evening. You\'re in a basement bar, tasting a local IPA, chatting with the brewer.",t:"Free entry. Beers 3-6 EUR. Open 5pm-11pm most evenings. Popular with locals.",c:["night", "local_only"],r:"g",nn:"Craft Pivnice — Miestna Pivovná Kultúra",ns:"Nezávislé craft pivo venueá s miestnym pivom",nst:"Bratislava craft pivo scéna sa rozvíja. Malé pivovne. Rozhovor s pivovarmi, ochutnávka.",nt:"Slobodný vstup. Pivo 3-6 EUR. Otvorené 17:00-23:00."},
  {id:58,n:"Danube Riverbank Walks — Scenic Routes",a:"Danube",v:["nature", "beautiful", "quiet"],d:50,s:"Extended walking paths along Danube, peaceful riverside scenery, nature immersion",st:"Bratislava\'s Danube paths are escape routes. You walk eastward toward the countryside, or westward toward Vienna. Fishermen line the banks; boaters launch. The water reflects sky. It\'s meditative. Few tourists venture beyond central sections; locals walk here daily for peace.",im:"It\'s dusk. You\'re walking alone along the Danube; the city fades behind.",t:"Free walking. Safe from dawn to dusk. Very accessible. No facilities beyond city center.",c:["nature"],r:"g",nn:"Dunajské Brehové Prechádzky — Scenické Trasy",ns:"Rozšírené prechádzky pozdĺž Dunaja, mierna scenéria",nst:"Bratislava Dunajové cesty sú trasy úniku. Chodíš východne alebo západne. Rybári obrubujú brehy.",nt:"Slobodný vstup. Bezpečný od rozvidzenia. Žiadne zariadenia."},
  {id:59,n:"Trinitarian Church — Baroque Beauty",a:"Old Town",v:["architecture", "beautiful", "quiet"],d:14,s:"17th-century Baroque church, ornate interior, intimate congregation space",st:"The Trinitarian Church is tiny baroque perfection. Gold altars, frescoed ceiling, intimate pews. It feels like stepping inside a jewel box. It\'s still a functioning parish church; worshippers kneel while tourists whisper. The contrast between sacred space and tourism is poignant.",im:"It\'s morning. Light filters through narrow windows; the space glows.",t:"Free entry. Open 8am-6pm daily. Photography limited. Respectful atmosphere.",c:["beautiful"],r:"g",nn:"Trinitársky Kostolík — Baroková Krása",ns:"17-v. barokový kostol s ornamentálnym interiérom",nst:"Trinitársky Kostol je malý barokový dokonalý. Zlaté oltáre, freskovaný strop. Cítite sa ako vovňutri škatuľke.",nt:"Slobodný vstup. Otvorené 8:00-18:00. Fotografia obmedzená."},
  {id:60,n:"Water Tower Observation Deck",a:"Downtown",v:["architecture", "beautiful"],d:28,s:"Historic water tower with observation platform, city views, architectural landmark",st:"The water tower served practical purposes but has become a viewpoint. You ascend to an observation platform with panoramic city views. The tower itself is interesting architecturally—a remnant of industrial-era infrastructure repurposed for tourism. Views encompass Old Town, the Danube, and distant Little Carpathians.",im:"It\'s afternoon. You\'re at the top, seeing the city compressed beneath you.",t:"4 EUR entry. Open 10am-6pm daily. Limited accessibility (stairs only).",c:["architecture"],r:"g",nn:"Vodená Veža Observačný Deck",ns:"Historická vodená veža s observačnou platformou",nst:"Vodená veža slúžila praktickým účelom ale je teraz pohľad. Liezaš na platformu s panorámnym pohľadom na mesto.",nt:"4 EUR vstup. Otvorené 10:00-18:00. Iba schody."},
  {id:36,n:"Petržalka District — Urban Village",a:"Petržalka",v:["local", "modern"],d:40,s:"Largest residential district with massive Soviet-era housing blocks and local life",st:"Petržalka sprawls across the Danube\'s south bank. Uniform apartment towers house thousands. It\'s concrete, utilitarian, utterly post-communist. Yet it\'s alive—families, shops, cafes serving locals. It\'s authentic urban living divorced from tourist fantasy. Go here to see real Bratislava.",im:"It\'s evening. You\'re in a Soviet tower apartment block, watching locals go about their lives.",t:"Free to walk. Shops/cafes normal prices. Accessible by tram. 20 minutes from Old Town.",c:["local_only"],r:"g",nn:"Mestnosť Petržalka — Mestne Dedina",ns:"Najväčší bytový okres so sovietskymi blokami",nst:"Petržalka sa rozprestiera na j. brehu Dunaja. Jednotné bytové vežičky. Je to betón, úžitkový, úplne postsovietsky.",nt:"Slobodný vstup. Obchody/kaviarne normálne ceny. Dostupný trampom."},
  {id:37,n:"Zoo Bratislava — Animal Collection",a:"Zoo",v:["nature"],d:60,s:"Urban zoo with diverse animal collection, family-friendly attraction",st:"Bratislava Zoo houses hundreds of animals in naturalistic habitats. It\'s family-oriented, educational. You see European fauna (wolves, bears) and exotic species. The zoo funds conservation. It\'s standard European zoo experience—pleasant if conventional.",im:"Children press against glass watching lions; parents photograph peacocks.",t:"10 EUR entry. Open 9am-5pm daily. Restaurant on grounds. Full accessibility.",c:["nature"],r:"g",nn:"Zoo Bratislava — Zbierka Zvierat",ns:"Mestná zoo s rozmanitou zbierkou zvierat",nst:"Zoo Bratislava chová zvieratá v prírodných podmienkach. Je to rodinnú a vzdelávaciu. Vidíš zvieratá a egzotické druhy.",nt:"10 EUR vstup. Otvorené 9:00-17:00. Reštaurácia. Dostupné."},
  {id:38,n:"Slovakia National Museum — Cultural Heritage",a:"Downtown",v:["history"],d:28,s:"Premier museum documenting Slovak history, culture, natural history across millennia",st:"The National Museum spans multiple buildings. Natural history (fossils, minerals), cultural history (costumes, tools), art collections. It\'s comprehensive, well-curated. You can spend an afternoon learning Slovak civilization from prehistory through today.",im:"You\'re examining a prehistoric skull; a curator explains 50,000-year-old settlement patterns.",t:"6 EUR entry per museum. Open 10am-5pm Tuesday-Sunday. Closed Mondays.",c:["history_big"],r:"g",nn:"Slovenský Národný Múzeum — Kultúrne Dedičstvo",ns:"Hlavný múzeum s bývalou históriou a kultúrou",nst:"Národný múzeum je rozdelený do viacerých budov. Prírodná história, kultúrna história, umenie. Je komplexný.",nt:"6 EUR vstup. Otvorené utorok-nedeľa 10:00-17:00."},
  {id:39,n:"Danube Delta — Wetland Ecosystem",a:"Danube Delta",v:["nature", "beautiful"],d:120,s:"Protected wetland where Danube meets tributaries, bird watching, ecological importance",st:"The Danube Delta is ecological paradise. Marshes teem with birdlife. You can boat through channels, binoculars raised. It\'s pristine, fragile, magnificently alive. Guides offer tours. It\'s an hour from Bratislava but feels remote.",im:"It\'s dawn. A heron takes flight from the marsh; mist rises from the water.",t:"Free to access. Guided tours 30 EUR per person. Boat rentals 50 EUR/day. Best April-September.",c:["nature"],r:"g",nn:"Dunajský Delta — Mokraďový Ekosystém",ns:"Chránená mokraď kde sa stretáva Dunaj",nst:"Dunajský Delta je ekologická ráj. Bažiny praskajú zvieraťom. Môžeš jazdiť na lode.",nt:"Slobodný vstup. Vodené zájazdy 30 EUR. Prenájom loďky 50 EUR/deň."},
  {id:40,n:"Svaty Jur Wine Village — Viticultural Town",a:"Svaty Jur",v:["local", "nature"],d:120,s:"Wine-producing village northeast of Bratislava, vineyards, wine tastings, medieval town",st:"Svaty Jur is a working wine village. Vineyards surround the town. You can visit cellars, taste local wines. The medieval architecture is preserved. It\'s more authentic than Modra—less touristy, more lived-in. A day trip combines hiking and wine.",im:"You\'re in a wine cellar tasting a 2019 Veltlínske Zelené with the vintner.",t:"Free to walk. Wine tastings 5-15 EUR. Train from Bratislava 40 minutes.",c:["local_only"],r:"g",nn:"Svaty Jur Vinarsky Mestecok — Vinne Mesto",ns:"Vinarskej mestecko so vinnicami a starou architekturou",nst:"Svaty Jur je pracujúci vinný mestecok. Vinice obopínajú mesto. Navštíviš pivnice, ochutnáš vína.",nt:"Slobodný vstup. Ochutnávanie vín 5-15 EUR. Vlak 40 minút."},
  {id:41,n:"Small Carpathians Mountain Hiking",a:"Small Carpathians",v:["nature", "beautiful"],d:180,s:"Accessible mountain range north of Bratislava, hiking trails, forest scenery, day-trip accessible",st:"The Little Carpathians (Malé Karpaty) rise north of Bratislava. Hiking trails range from easy to strenuous. You ascend through beech forests to ridge views. The range isn\'t alpine but offers peace. A day hike is feasible from the city. Trails are well-marked, villages provide sustenance.",im:"It\'s morning. You\'re on a ridge watching fog lift from the Danube valley below.",t:"Free hiking. Buses to trailheads (5 EUR). Mountain huts 20-30 EUR/night. Maps available.",c:["nature"],r:"g",nn:"Malé Karpaty Horská Túra — Planinská Hájka",ns:"Dostupný horský rozsah so zelením",nst:"Malé Karpaty stúpajú severne od Bratislavy. Horské cesty od ľahkých po náročné. Zdvíhaš sa cez bukom lesmi.",nt:"Slobodná hájka. Autobusi na cesty (5 EUR). Horské chaty 20-30 EUR/noc."},
  {id:42,n:"Slovak Radio Building — Brutalist Architecture",a:"Downtown",v:["architecture", "weird"],d:24,s:"Distinctive inverted pyramid broadcasting building, 1960s architecture, iconic landmark",st:"The Slovak Radio building is a brutalist upside-down pyramid. Built 1967, it\'s unmissable. Locals have opinions—some love its audacity, others find it ugly. Tours available; you can see broadcast studios. It\'s architecturally bold, historically loaded.",im:"You\'re standing before the massive pyramid wondering how it\'s structurally sound.",t:"5 EUR tour. Tours Tuesday-Friday at 10am, 2pm. Book ahead. Phone: +421-2-5727-3333.",c:["architecture"],r:"g",nn:"Slovenska Rozhlas Budova — Brutalistna Architektura",ns:"Jednotná inverzní pyramída budova, 60-te léta",nst:"Budova Slovenskej rozhlasu je brutalistná obrátená pyramída. Vybudovaná 1967. Miestni majú názory.",nt:"5 EUR prehliadka. Prehliadky utorok-piatok. Rezervuj."},
  {id:43,n:"Pribina Square — Historic Center",a:"Old Town",v:["history", "beautiful"],d:15,s:"Historic square with monuments, churches, governmental buildings",st:"Pribina Square anchors Old Town. Statues commemorate historical figures. Surrounding buildings house offices and cultural institutions. It\'s less crowded than Main Square, quieter, more local. Perfect for photos without tourist masses.",im:"You\'re sketching in a quiet corner of the square, pigeons at your feet.",t:"Free walking. Cafes nearby (5-15 EUR). Always accessible.",c:["history_big"],r:"g",nn:"Pribinovo Namestie — Historicke Centrum",ns:"Historické námestie s pamätníkami a kostolmi",nst:"Pribinovo Namestie je kotva mesta. Sochy spomen historických osôb. Menej plné ako hlavné námestie.",nt:"Slobodný vstup. Kaviarne blízko (5-15 EUR). Vždy dostupné."},
  {id:44,n:"Conception Church (Sucharda) — Minimalist Design",a:"New Town",v:["architecture", "beautiful", "quiet"],d:30,s:"Modern 1960s church with minimalist design, peaceful spirituality",st:"This church breaks the mold. Built 1960s, it\'s minimalist—clean lines, light, space. Concrete structure, simple altar. It\'s anti-baroque, contemporary. Services occur; tourists occasionally wander in. It\'s peaceful, modern spirituality.",im:"You\'re sitting in a minimalist chapel; silence is the loudest element.",t:"Free entry. Open 9am-6pm daily. Respectful dress required.",c:["beautiful"],r:"g",nn:"Kostol Zacatia Panny Marka — Minimalistny Dizajn",ns:"Moderný 60-ty léta kostol s minimalistny dizajnom",nst:"Tento kostol je nečakane moderný. Vybudovaný 60-ty léta. Je minimalistny—čisté línie, svetlo.",nt:"Slobodný vstup. Otvorené 9:00-18:00. Rešpektné oblečenie."},
  {id:45,n:"Petrzalka Bridge — Modern Engineering",a:"Danube",v:["architecture", "modern"],d:32,s:"Contemporary cable-stayed bridge spanning Danube, engineering achievement",st:"The Petržalka Bridge is contemporary engineering—sleek, functional, beautiful. It connects Old Town to the residential south bank. Walking or cycling across offers river views. It\'s less iconic than UFO but equally important to city infrastructure.",im:"It\'s dusk. You\'re cycling across the bridge; the Danube glows below.",t:"Free crossing. Fully accessible. Excellent walking/cycling path.",c:["architecture"],r:"g",nn:"Most Apolla — Moderný Most",ns:"Moderný most cez Dunaj s architektúrou",nst:"Petrzalka Most je moderný most—hladký, funkčný, pekný. Spája staré mesto s juhu.",nt:"Slobodný prejazd. Dostupný. Vynikajúca cesta."},
  {id:46,n:"Bratislava Market Hall — Food Central",a:"Downtown",v:["local", "food"],d:20,s:"Historic market hall with produce, meats, regional specialties, food stalls",st:"The market hall is Bratislava\'s food heart. Vendors display produce, meats, cheeses. Food courts offer cheap meals. It\'s chaotic, aromatic, authentic. Locals shop here daily. Few tourists venture in; it\'s genuinely functional.",im:"You\'re eating goulash from a market stall, standing among shoppers.",t:"Free entry. Open 7am-6pm daily. Meals 4-8 EUR. Cash preferred.",c:["local_only"],r:"g",nn:"Tržnica Bratislava — Centra Jedla",ns:"Historická tržnica s lokálnym jedlom",nst:"Tržnica je srdce jedla Bratislavy. Predajcovia, mäso, syry. Jedáleň s lacnými jedlami.",nt:"Slobodný vstup. Otvorené 7:00-18:00. Jedla 4-8 EUR."},
  {id:47,n:"Trnava UNESCO Town — Day Trip",a:"Trnava",v:["history", "beautiful"],d:240,s:"UNESCO historic town 1 hour north, preserved medieval architecture, basilicas",st:"Trnava is history preserved. Medieval streets, numerous churches, Renaissance buildings. It was temporarily Slovakia\'s capital. Few tourists journey here; those who do find authentic Central European charm. A day trip is manageable via bus.",im:"You\'re walking medieval streets; churches chime around you.",t:"Free to walk. Bus from Bratislava 1 hour (5 EUR). Museums 3-5 EUR each.",c:["history_big"],r:"g",nn:"Mestecko Trnava UNESCO — Výlet",ns:"UNESCO mestecko s stredovekou architektúrou",nst:"Trnava je história zachovaná. Stredoveké ulice, kostoly, renesančné budovy.",nt:"Slobodný vstup. Autobus 1 hodinu (5 EUR). Múzeá 3-5 EUR."},
  {id:48,n:"Nalepovo Village — Rural Tranquility",a:"Countryside",v:["nature", "quiet", "hidden"],d:150,s:"Small village north of Bratislava, authentic rural atmosphere, farming life",st:"Nalepovo is sleepy—sheep graze, chickens peck, grandmothers tend gardens. It\'s rural Slovakia untouched by tourism. You can rent a cottage, help with harvest, experience village life. It\'s slow, authentic, deeply peaceful.",im:"You\'re helping with hay bales; the sun sets over fields.",t:"Free to visit. Guesthouses 25-40 EUR/night. Farm experiences available. Bus service limited.",c:["hidden"],r:"g",nn:"Dedina Nalepovo — Vidieck Pokojom",ns:"Malá dedina s autentickú vidieckú atmosféru",nst:"Nalepovo je ospaté. Ovce sa pasú, kuriatka klujú. Autentická dedina.",nt:"Slobodný vstup. Ubytovanie 25-40 EUR/noc. Autobus obmedzený."},
  {id:61,n:"Bratislava City Park — Urban Green Space",a:"Parks",v:["nature", "local"],d:30,s:"Community park with walking paths and local life",st:"This park serves the community. Paths wind through trees. Locals walk, children play. It\'s functional, not fancy.",im:"You\'re sitting on a bench, watching the world pass.",t:"Free entry. Open dawn to dusk.",c:["nature"],r:"g",nn:"Park Bratislava — Mestná Zeleň",ns:"Komunálny park s chodníkmi",nst:"Park slúži komunite. Chodníky sa kľučatia. Miestni chodia.",nt:"Slobodný vstup. Otvorené od zore do zaliezania."},
  {id:62,n:"Bratislava Historical Archive — Document Collection",a:"Downtown",v:["history", "quiet"],d:22,s:"City archive preserving historical documents and maps",st:"The archive holds centuries of city records. Maps, deeds, photographs. Researchers work here daily. It\'s quiet, scholarly, essential to historical understanding.",im:"You\'re examining a 300-year-old map of the city.",t:"3 EUR entry. Open by appointment. Researchers priority.",c:["history_big"],r:"g",nn:"Archív Bratislava — Zbierka Dokumentov",ns:"Mestný archív s historickými dokumentami",nst:"Archív obsahuje záznamy mesta. Mapy, listiny, fotografie.",nt:"3 EUR vstup. Otvorené na základe rezervácie."},
  {id:63,n:"Bratislava Art School Gallery — Student Works",a:"Arts District",v:["hidden", "beautiful"],d:19,s:"Gallery showcasing student and faculty art works",st:"Art school galleries exhibit emerging artists. Work is diverse, often experimental. It\'s accessible, unpretentious, authentic.",im:"You\'re critiquing abstract paintings with a student artist.",t:"Free entry. Open Tuesday-Friday 10am-5pm.",c:["hidden"],r:"g",nn:"Galeria Umenovej Školy — Študentské Diela",ns:"Galéria so študentským a profesorským umením",nst:"Galéria vystavuje začínajúcich umelcov. Práca je rôznorodá.",nt:"Slobodný vstup. Otvorené utorok-piatok 10:00-17:00."},
  {id:64,n:"Bratislava Local Brewery Taproom — Craft Beer",a:"Downtown",v:["local", "night"],d:16,s:"Small brewery serving house beers to local crowd",st:"This brewery makes beer for locals. No tourists, just community. You taste the beer, chat with brewers. It\'s authentic, affordable, communal.",im:"You\'re at the bar, sipping a fresh IPA, talking to the brewer.",t:"Free entry. Beers 3-5 EUR. Open 5pm-11pm daily.",c:["local_only"],r:"g",nn:"Piváreň Bratislava — Craft Pivo",ns:"Malá pivovňa s domácim pivom",nst:"Pivovňa vyrába pivo pre miestnych. Žiadni turisti, iba komunita.",nt:"Slobodný vstup. Pivo 3-5 EUR. Otvorené 17:00-23:00."},
  {id:65,n:"Bratislava Photography Museum — Image Archive",a:"Arts District",v:["history", "beautiful"],d:20,s:"Museum of photography documenting city and regional history through images",st:"Photography reveals history. This museum showcases city evolution through photographs. Images from 100 years ago show transformation. It\'s visual history, moving and clear.",im:"You\'re looking at photographs of the city from 1950, amazed at the changes.",t:"4 EUR entry. Open 10am-5pm Tuesday-Sunday. Closed Mondays.",c:["history_big"],r:"g",nn:"Fotografický Múzeum — Archív Obrázkov",ns:"Múzeum fotografie s archívom mesta",nst:"Fotografia odhaľuje históriu. Múzeum ukazuje vývoj mesta cez fotografie.",nt:"4 EUR vstup. Otvorené utorok-nedeľa 10:00-17:00."},

  {id:124,n:"Bratislava Castle Ramparts at Sunset — Hrad",a:"Hrad",v:["famous","beautiful","history_big"],d:10,s:"The castle overlooking the Danube — come at dusk when the city lights click on below and the castle glows.",st:"Bratislava Castle sits on a hill overlooking the entire city and the Danube. The interior is a museum (fine but standard). Skip it. Instead, walk the outer walls at dusk.

As the sun drops, the Danube lights up. The city below turns gold then blue. The castle is lit from outside. It's dramatic and peaceful and you're alone up there.",im:"The Danube catching the last light. The castle walls glowing. City lights appearing. The old town tiny below. Mountains on the far bank visible in the last light.",t:"Free to walk the walls. Museum inside €8 if interested. Best 5–7pm depending on season. 20 min up from Old Town. Steps are steep.",c:["greatest_hits","beautiful","history_big"],r:"g",nn:"Bratislava-Schloss Wälle bei Sonnenuntergang — Hrad",ns:"Das Schloss über der Donau — komm bei Sonnenuntergang, wenn die Stadtlichter unten leuchten",nst:"Das Bratislava-Schloss sitzt auf einem Hügel über der ganzen Stadt und der Donau. Das Innere ist ein Museum (in Ordnung).",nt:"Kostenlos die Mauern spazieren. Museum innen €8 optional. Beste 17–19 Uhr je nach Jahreszeit."},
  {id:125,n:"Danube Cycling South — Devin",a:"Devin",v:["cycling","day_trips","beautiful"],d:35,s:"15km bike ride along the Danube to Devin Castle — the river on one side, Slovak countryside on the other.",st:"From Bratislava, a dedicated bike path follows the Danube south for 15km to Devin, a small castle on the river bend. The ride is flat and scenic.

Devin is tiny and quiet. There's a small restaurant. You can swim (there are beaches). Return by evening.",im:"Pedaling along the Danube. The river always visible. Devin Castle appearing around a bend. Fields on the far bank. Empty bike path.",t:"Rent from central Bratislava (€8/day). Path is marked. 15km (1.5 hours). Devin has basic services. Come back same day or stay overnight.",c:["cycling","day_trips","beautiful"],r:"g",nn:"Donau-Radfahrt nach Süden — Devin",ns:"15-km-Fahrradstrecke entlang der Donau zu Devin Castle — der Fluss auf einer Seite, slowakisches Land auf der anderen",nst:"Von Bratislava führt ein spezialisierter Fahrradweg die Donau hinab für 15 km nach Devin.",nt:"Miete aus dem Zentrum von Bratislava (€8/Tag). Pfad markiert. 15 km (1,5 Stunden)."},
  {id:126,n:"Bratislava Old Town at 6am — Stare Mesto",a:"Stare Mesto",v:["quiet","beautiful","free entry"],d:5,s:"The main square completely empty at dawn — just pigeons and you and the perfect light on the Renaissance buildings.",st:"Walk the Old Town at 6am. The Michael's Tower. The Main Square. All empty. The light on the buildings is perfect. No tourists. No one.

Bring a camera. Stay 45 minutes. Watch the city wake up. By 8am the crowds arrive. But for one hour it's yours.",im:"Empty square. Pink light on the buildings. A pigeon. The clock tower. Silence. Someone opening a shop somewhere distant.",t:"Free. Walk everywhere. 5:30–7am before crowds. No entrance fees for streets. Just walk.",c:["quiet","beautiful","free entry"],r:"g",nn:"Bratislava Altstadt um 6 Uhr — Stare Mesto",ns:"Der Hauptplatz völlig leer bei Tagesanbruch — nur Tauben, du und perfektes Licht",nst:"Gehe um 6 Uhr durch die Altstadt. Der Michaels-Turm. Der Hauptplatz. Alle leer. Das Licht ist perfekt.",nt:"Kostenlos. Überall spazieren. 5:30–7 Uhr vor Menschenmassen. Keine Eintrittsgebühren für Straßen."},
  {id:127,n:"Grassalkovich Palace (Presidential Palace) — Hviezdoslavov",a:"Centro",v:["architecture","history","quiet"],d:8,s:"The Rococo palace where presidents live — closed to interior but the exterior gardens are public and gorgeous.",st:"Grassalkovich Palace is the official residence of the Slovak President. You can't go inside, but you can walk the grounds. The Rococo architecture is perfect. The gardens are formal and beautiful.

Go on a weekday morning. The gardens are empty. The palace is bright white. It feels like you've found a secret.",im:"White Rococo palace. Formal hedges. Gravel paths. No people. The palace windows closed and mysterious. Pure geometry.",t:"Free. Gardens open 8am–dusk. Hviezdoslavov Platz. 20 min from Old Town. No admission. Weekday mornings are emptiest.",c:["architecture","history","quiet"],r:"g",nn:"Grassalkovich-Palast — Hviezdoslavov",ns:"Der Rokoko-Palast, wo Präsidenten leben — geschlossen innen, aber die äußeren Gärten sind öffentlich",nst:"Der Grassalkovich-Palast ist die offizielle Residenz des slowakischen Präsidenten. Du kannst nicht rein, aber du kannst spazieren.",nt:"Kostenlos. Gärten 8 Uhr–Dämmerung offen. Hviezdoslavov Platz. Wochentag morgens leer."},
  {id:128,n:"Bratislava Tram #7 Tour — Staromestska to Slavin",a:"Outskirts",v:["local","hidden","day_trips"],d:20,s:"Ride the #7 tram to the end — it takes you to Slavin monument overlooking the entire city and back.",st:"Tram 7 is a full loop from central Bratislava out to the Slavin war monument and back. The journey takes 30 minutes and costs €0.60. You pass through neighborhoods, then climb to the monument.

From Slavin you get views of the entire Danube valley. It's where locals go on weekends, not tourists.",im:"Tram rocking gently. The city falling away. Slavin monument appearing. Views of four countries on clear days. A handful of locals with kids.",t:"Tram ticket €0.60 (or day pass €1.50). Departs frequently from main station. Ride to the end (30 mins). Walk around Slavin (30 mins). Return same tram.",c:["local","hidden","day_trips"],r:"g",nn:"Bratislava Straßenbahn #7 Tour — Staromestska nach Slavin",ns:"Fahren Sie mit Straßenbahn #7 zum Ende — sie bringt Sie zum Slavin-Denkmal mit Blick auf die ganze Stadt",nst:"Straßenbahn 7 ist eine Schleife vom Zentrum Bratislavas zum Slavin-Kriegsdenkmal und zurück.",nt:"Straßenbahn-Ticket €0,60 (oder Tageskarte €1,50). Fahrt zum Ende (30 Min). Fußweg um Slavin (30 Min)."},
  {id:129,n:"Slovak National Museum — Vajanského",a:"Centro",v:["history_big","nerd_pilgrimage","quiet"],d:10,s:"Museum of Slovak history from prehistoric times to now — barely anyone goes, the collection is obsessive.",st:"The Slovak National Museum is comprehensive and almost empty. It covers everything from prehistoric Slovakia through Ottoman invasion, Austro-Hungarian rule, communism, and independence.

Walk through. It's thorough. The exhibits about Soviet occupation are particularly poignant. You learn actual Slovak history.",im:"Glass cases of prehistoric tools. Medieval armor. Soviet propaganda posters. Modern art installations. Very few other visitors.",t:"€8 entry. Open 10am–6pm (Wed-Sun, closed Mon-Tue). Vajanského 2. 2 hours is reasonable. Morning is quieter.",c:["history_big","nerd_pilgrimage"],r:"g",nn:"Slowakisches Nationalmuseum — Vajanského",ns:"Museum der slowakischen Geschichte von prähistorisch bis heute — kaum jemand geht, die Sammlung ist obsessiv",nst:"Das Slowakische Nationalmuseum ist umfassend und fast leer. Es deckt alles ab, von prähistorischem Slowakien bis heute.",nt:"€8 Eintritt. 10–18 Uhr (Mi–So, Mo–Di geschlossen). Vajanského 2. 2 Stunden ist angemessen."},
  {id:130,n:"Bratislava Food Markets — Central Market",a:"Centro",v:["markets","local","food"],d:8,s:"The farmers market where Slovakia buys vegetables — Saturday mornings, old women with attitude, incredible fresh produce.",st:"The Central Market (Trhovisko) happens Saturday mornings. It's where Slovak families buy food. Vegetables, cheese, bread, flowers. The vendors are often elderly women who've been there 20 years.

It's completely unscripted. You see real Slovakia. Nobody speaks English. Everything is cheap.",im:"Stalls of vegetables. An old woman tasting a tomato. Cheese counter. The smell of fresh bread. Everyone in Slovak.",t:"Free to walk. Saturday 8am–1pm. Trhovisko area, east of Old Town. Public tram or walk. Everything €1–3 per item.",c:["markets","local"],r:"g",nn:"Bratislava Lebensmittelmärkte — Zentralmarkt",ns:"Der Bauernmarkt, wo die Slowaken Gemüse kaufen — Samstagmorgens, alte Frauen mit Einstellung, unglaublich frisches Gemüse",nst:"Der Zentralmarkt (Trhovisko) findet Samstagmorgens statt. Hier kaufen slowakische Familien Essen.",nt:"Kostenlos zum Gehen. Samstag 8–13 Uhr. Trhovisko-Gebiet, östlich der Altstadt. Alles €1–3 pro Artikel."},
  {id:131,n:"Danube Promenade Walk — Nábr. Arm. Gen. Stefánika",a:"Waterfront",v:["beautiful","local","free entry"],d:12,s:"The riverside walk where locals jog and families stroll — 3km of Danube views, quiet, perfect light at dusk.",st:"The Danube Promenade stretches 3km along the river. Locals jog it. Families push strollers. It's peaceful and wide open.

Go at dusk. The light hits the water perfectly. The old town is visible across the river. You're alone but you feel the city's rhythm.",im:"Danube brown and wide. Someone jogging. The old town reflected. Trees on the embankment. The light turning gold.",t:"Free. Open all hours. Nábr. Arm. Gen. Stefánika. 3km total (1 hour walk). Best 5–8pm.",c:["beautiful","local","free entry"],r:"g",nn:"Donau-Promenade Spaziergang — Nábr. Arm. Gen. Stefánika",ns:"Der Flussuferspaziergang, wo Einheimische joggen und Familien spazieren — 3 km Donau-Blick, ruhig, perfektes Licht",nst:"Die Donau-Promenade erstreckt sich 3 km entlang des Flusses. Einheimische joggen. Familien schieben Kinderwagen.",nt:"Kostenlos. Zu jeder Zeit offen. Nábr. Arm. Gen. Stefánika. 3 km gesamt (1 Stunde Fußweg). Beste 17–20 Uhr."},
  {id:132,n:"Michal's Tower and Jail Museum — Michalska",a:"Stare Mesto",v:["history","architecture","weird"],d:8,s:"The medieval tower with a 16th-century jail underneath — the cells are small and dark and genuinely unsettling.",st:"Michael's Tower is one of Bratislava's most recognizable buildings. Underneath is a jail museum. The jail cells are original and tiny.

It's not theatrical or tourists. It's just authentic. You descend into darkness. The cells are claustrophobic. It gives you a feeling of actual history.",im:"Stone walls. A small barred window. Darkness. The cold of old stone. A prisoner scratching marks on the wall.",t:"€4.50 entry to tower. €3.50 entry to jail museum. Both open 10am–6pm. Can combine tickets. Michalska ulica.",c:["history","architecture","weird"],r:"g",nn:"Michaels-Turm und Gefängnismuseum — Michalska",ns:"Der mittelalterliche Turm mit einem Gefängnis im Keller — die Zellen sind klein und dunkel",nst:"Michaels-Turm ist eines der erkennbarsten Gebäude Bratislavas. Darunter ist ein Gefängnismuseum.",nt:"€4,50 Eintritt zum Turm. €3,50 Eintritt zum Gefängnismuseum. 10–18 Uhr. Michalska ulica."},
  {id:133,n:"Bratislava Ruin Bars — Various Locations",a:"Outskirts",v:["weird","local","hidden"],d:15,s:"Indoor bars set in derelict buildings — stripped concrete, exposed pipes, the aesthetic of post-communist abandonment as nightlife.",st:"Bratislava has a unique bar culture. Some bars are deliberately designed to look like ruins — stripped concrete, exposed wiring, industrial chic. They're called "ruin bars" and they're where young Bratislava goes.

They're fun and weird and completely local. No tourists. Just people having drinks in deliberately unfinished spaces.",im:"Concrete walls. Exposed pipes. Graffiti art. People laughing. Beer bottles. The aesthetic is intentional ruin.",t:"Beer €2–4. Various locations around the city. Popular ones: Klub, Tatra, others. Evening only (9pm–2am). Weekends busiest.",c:["weird","local","hidden"],r:"g",nn:"Bratislava Ruin Bars — Verschiedene Standorte",ns:"Indoor-Bars in verfallenen Gebäuden — nackter Beton, freiliegende Rohre, die Ästhetik der post-kommunistischen Verfallsbar-Nachtleben",nst:"Bratislava hat eine einzigartige Barkultur. Einige Bars sind absichtlich wie Ruinen gestaltet — nackter Beton, freiliegende Leitungen.",nt:"Bier €2–4. Verschiedene Standorte in der Stadt. Abends nur (21–2 Uhr). Wochenende am vollsten."},
  {id:134,n:"Slovak Philharmonic Orchestra Concert — Palác Vechlár",a:"Centro",v:["culture","nerd_pilgrimage","local"],d:5,s:"Cheap classical concerts in a beautiful hall — €5–15 tickets, locals dressed up, completely authentic culture.",st:"The Slovak Philharmonic plays regular concerts in the Palác Vechlár. Tickets are incredibly cheap (€5–15). The hall is beautiful. The orchestra is legitimate professional.

You'll be the only non-local. Families dress up. It's a genuine cultural experience, not a tourist attraction.",im:"An orchestra warming up. The hall filling with Slovaks in nice clothes. The conductor's baton raising. Complete silence.",t:"Tickets €5–15. Box office open 10am–6pm. Concerts usually 7:30pm Tue–Thu. Palác Vechlár, Medená ulica. Check schedule online.",c:["culture","nerd_pilgrimage"],r:"g",nn:"Slowakisches Philharmonie-Orchester Konzert — Palác Vechlár",ns:"Billige klassische Konzerte in einer schönen Halle — €5–15 Eintrittskarten, Einheimische in Anzug, völlig authentische Kultur",nst:"Die Slowakische Philharmonie spielt regelmäßige Konzerte im Palác Vechlár. Eintrittskarten sind unglaublich billig.",nt:"Eintrittskarten €5–15. Kartenbüro 10–18 Uhr. Konzerte normalerweise 19:30 Uhr Di–Do. Palác Vechlár, Medená ulica."},
  {id:135,n:"Bratislava Bakeries at 6am — Multiple Locations",a:"Centro",v:["local","quiet","hidden"],d:8,s:"The early morning ritual — warm bread rolls, coffee, the Slovak version of the Italian cornetto start to the day.",st:"Slovak bakeries (Pekáreň) open at 5am. By 6am locals are buying fresh rolls and coffee. This is how Slovakia starts the day.

Wake early. Go to any bakery. Order a roll (chlieb) and coffee. Stand and drink it. Watch Slovakia appear.","im":"Warm roll. Fresh coffee. Steam. A woman in work clothes. The baker knowing the regulars.",t:"€1–2 for roll and coffee. Any Pekáreň. Open 5am onward. Standing is cheaper than sitting. No English, euros accepted.",c:["local","quiet"],r:"g",nn:"Bratislava Bäckereien um 6 Uhr — Multiple Standorte",ns:"Das frühe Morgenritual — warme Brötchen, Kaffee, die slowakische Version des italienischen Cornetto-Starts",nst:"Slowakische Bäckereien (Pekáreň) öffnen um 5 Uhr. Um 6 Uhr kaufen Einheimische frische Brötchen und Kaffee.",nt:"€1–2 für Brötchen und Kaffee. Jede Pekáreň. Ab 5 Uhr offen. Stehen ist billiger als Sitzen. Kein Englisch, Euro akzeptiert."}
