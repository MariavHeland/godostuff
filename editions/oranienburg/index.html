const P = [
  {id:1,n:"Sachsenhausen Memorial — Sachsenhausen",a:"Sachsenhausen",v:["history","quiet"],d:10,s:"Nazi concentration camp memorial site — free, essential, unforgettable",st:"From 1936 to 1945, over 200,000 people were imprisoned here. The site is now a national memorial. Walking the grounds takes 2–3 hours. This is the kind of history that must be confronted.",im:"Time-travel: 1945 — Soviet forces finding survivors barely alive among thousands of dead",t:"Free entry. Audio guides available. Allow 2-3 hours minimum.",c:["history_big"],r:"g",nn:"Gedenkstätte Sachsenhausen — Sachsenhausen",ns:"NS-Konzentrationslager Gedenkstätte — kostenlos, unverzichtbar, unvergesslich",nst:"Von 1936 bis 1945 wurden hier über 200.000 Menschen inhaftiert. Die Stätte ist jetzt nationales Mahnmal.",nt:"Freier Eintritt. Audioguides verfügbar. Mindestens 2-3 Stunden einplanen."},
  {id:2,n:"Appellplatz — Sachsenhausen",a:"Sachsenhausen",v:["history","quiet"],d:10,s:"The roll call square where prisoners stood for hours in all weather — vast and terrible",st:"Prisoners were assembled here twice daily — morning and evening — sometimes for hours in freezing cold as a form of punishment. The square is still its original size.",im:"Time-travel: 1941 winter — prisoners standing for three hours in subzero temperatures at dawn",t:"Stand in the centre. The scale of what happened here becomes real.",c:["history_big"],r:"g",nn:"Appellplatz — Sachsenhausen",ns:"Der Appell-Platz, wo Gefangene stundenlang bei jedem Wetter standen — riesig und schrecklich",nst:"Gefangene wurden zweimal täglich versammelt — manchmal stundenlang als Strafe.",nt:"In der Mitte stehen. Das Ausmaß des Geschehens wird real."},
  {id:3,n:"Station Z Memorial — Sachsenhausen",a:"Sachsenhausen",v:["history","quiet"],d:10,s:"The camp\'s extermination site — the end of the one-way track through the camp",st:"Station Z was the killing centre of Sachsenhausen — gas chamber, crematorium, execution trench. What remains is preserved exactly as it was found. A place of absolute silence.",im:"Time-travel: Soviet troops discovering Station Z in April 1945 — smoke still rising",t:"This section requires composure. Take your time.",c:["history_big"],r:"g",nn:"Station Z — Sachsenhausen",ns:"Die Vernichtungsanlage des Lagers — das Ende der Einbahnstraße durch das Lager",nst:"Station Z war das Tötungszentrum Sachsenhausens. Was bleibt, ist genau so erhalten wie gefunden.",nt:"Dieser Abschnitt erfordert Fassung. Zeit nehmen."},
  {id:4,n:"Soviet Special Camp Memorial — Sachsenhausen",a:"Sachsenhausen",v:["history","hidden","quiet"],d:10,s:"After the Nazis, the Soviets used the same camp from 1945–1950 — 12,000 died here too",st:"The Soviets converted Sachsenhausen into NKVD Special Camp Nr. 7 immediately after liberation. 60,000 Germans were interned here, many innocent. 12,000 died. This chapter is less known.",im:"Time-travel: German civilians arriving as Soviet prisoners to the same camp just liberated, 1945",t:"The mass graves are in the north of the memorial site. Free.",c:["history_big"],r:"g",nn:"Sowjetisches Sonderlager — Sachsenhausen",ns:"Nach den Nazis nutzten die Sowjets dasselbe Lager von 1945–1950 — 12.000 starben auch hier",nst:"Die Sowjets wandelten Sachsenhausen sofort nach der Befreiung in NKWD-Sonderlager Nr. 7 um.",nt:"Die Massengräber liegen im Norden des Gedenkstättengeländes. Kostenlos."},
  {id:5,n:"Schloss Oranienburg — Schloss",a:"Schloss",v:["history","beautiful"],d:15,s:"The first Baroque palace in Brandenburg — built 1651 for the Great Elector\'s wife Louise Henriette",st:"Princess Louise Henriette of Orange funded and named this palace and the city around it. It is the oldest Baroque palace in Brandenburg. The exterior is free to admire.",im:"Time-travel: Louise Henriette supervising construction of her Dutch-influenced palace, 1655",t:"Exterior free. Museum inside has a small charge.",c:["architecture"],r:"g",nn:"Schloss Oranienburg — Schloss",ns:"Das erste Barockschloss in Brandenburg — 1651 für die Frau des Großen Kurfürsten Louise Henriette erbaut",nst:"Prinzessin Louise Henriette von Oranien finanzierte dieses Schloss und die Stadt drum herum.",nt:"Außenbereich kostenlos. Museum innen hat kleinen Eintritt."},
  {id:6,n:"Schlosspark Oranienburg — Schloss",a:"Schloss",v:["nature","beautiful","quiet"],d:10,s:"Park behind the palace along the Havel — restored Dutch garden with canal features",st:"The park was laid out in the Dutch style — formal hedges, canals, geometric beds — reflecting Louise Henriette\'s homeland. Free to walk at all times.",im:"Time-travel: Louise Henriette walking her Dutch garden, missing the Netherlands, 1660",t:"Always free. The canal section at the back is the quietest.",c:["parks"],r:"g",nn:"Schlosspark Oranienburg — Schloss",ns:"Park hinter dem Schloss an der Havel — restaurierter holländischer Garten mit Kanalmerkmalen",nst:"Der Park wurde im holländischen Stil angelegt — formale Hecken, Kanäle, geometrische Beete.",nt:"Immer kostenlos. Der Kanalabschnitt hinten ist am stillsten."},
  {id:7,n:"Louise Henriette Monument — Altstadt",a:"Altstadt",v:["history","hidden"],d:5,s:"The founder of Oranienburg — remembered in bronze near the palace she built",st:"Princess Louise Henriette of Orange-Nassau gave the city its name, its palace, and its Dutch character. The monument is modest but the story behind it is remarkable.",im:"Time-travel: the princess arriving in Brandenburg for the first time, homesick for the Netherlands",t:"Find it near the palace entrance.",c:["famous_dead"],r:"g",nn:"Louise-Henriette-Denkmal — Altstadt",ns:"Die Gründerin von Oranienburg — in Bronze in der Nähe des Schlosses, das sie erbaute",nst:"Prinzessin Louise Henriette gab der Stadt ihren Namen, ihr Schloss und ihren holländischen Charakter.",nt:"In der Nähe des Schlosseingangs finden."},
  {id:8,n:"Nikolaikirche Oranienburg — Altstadt",a:"Altstadt",v:["history","quiet"],d:10,s:"Baroque church built alongside the palace — the court church of the Oranienburg princes",st:"Built in the 1650s at the same time as the palace. The interior is spare Dutch Reformed style — no decoration, pure proportion. Open most days.",im:"Time-travel: Louise Henriette attending Sunday service here in 1658, court in full regalia",t:"Open weekdays. Free entry.",c:["history_big"],r:"g",nn:"Nikolaikirche — Altstadt",ns:"Barockkirche neben dem Schloss — die Hofkirche der Oranienburger Fürsten",nst:"In den 1650ern gleichzeitig mit dem Schloss gebaut. Das Innere ist reformiert schlicht.",nt:"Werktags geöffnet. Freier Eintritt."},
  {id:9,n:"Havel River Walk — Havel",a:"Havel",v:["nature","beautiful","quiet"],d:8,s:"The Havel through Oranienburg — herons, fishermen, slow water, old trees",st:"The Havel widens into something lake-like near Oranienburg. The bank walk south from the palace is tree-lined and almost empty on weekday mornings.",im:"Time-travel: court barges moving along this stretch of the Havel in 1700",t:"Walk south from the Schloss gardens. The best stretch is the first kilometre.",c:["romantic_water"],r:"g",nn:"Havel-Uferweg — Havel",ns:"Die Havel durch Oranienburg — Reiher, Fischer, langsames Wasser, alte Bäume",nst:"Die Havel weitet sich bei Oranienburg seeartig. Der Uferweg südlich vom Schloss ist baumgesäumt.",nt:"Vom Schlosspark nach Süden gehen. Das beste Stück ist das erste Kilometer."},
  {id:10,n:"Lehnitz Lake — Lehnitz",a:"Lehnitz",v:["nature","quiet","free"],d:15,s:"Wild glacial lake in the pine forests north of Oranienburg — completely undeveloped",st:"Lehnitz lake sits in an old military exclusion zone that protected it from development for decades. The water is clean and cold. A single sandy path rings it through the pines.",im:"Time-travel: 1980 — East German border guards swimming here on their days off, the lake unchanged",t:"Walk or cycle 15 minutes from the Altstadt. Always free. Swim in summer.",c:["parks"],r:"g",nn:"Lehnitzer See — Lehnitz",ns:"Wilder Gletschersee in den Kiefernwäldern nördlich von Oranienburg — vollkommen unerschlossen",nst:"Der Lehnitzer See liegt in einer alten Militärsperrzone, die ihn jahrzehntelang vor Bebauung schützte.",nt:"15 Minuten zu Fuß oder Rad aus der Altstadt. Immer kostenlos. Im Sommer schwimmen."},
  {id:11,n:"Lehnitz Forest — Lehnitz",a:"Lehnitz",v:["nature","quiet","hidden"],d:15,s:"Ancient pine and heather landscape north of the city — no trails, no guides, just forest",st:"The Lehnitz forest is part of the old hunting grounds of the Hohenzollern dynasty. The heather blooms purple in August. The forest floor is entirely soft.",im:"Time-travel: Hohenzollern hunting parties crashing through these pines, 1750",t:"August for the heather bloom. No trails — use a compass.",c:["parks"],r:"g",nn:"Lehnitzer Wald — Lehnitz",ns:"Uralte Kiefern- und Heidelandschaft nördlich der Stadt — keine Wege, keine Guides, nur Wald",nst:"Der Lehnitzer Wald ist Teil der alten Jagdgründe der Hohenzollern. Die Heide blüht lila im August.",nt:"August für die Heidelblüte. Keine Wege — Kompass benutzen."},
  {id:12,n:"Old Town Market Square — Altstadt",a:"Altstadt",v:["local","history"],d:5,s:"The small market square of Oranienburg — weekly market, local cafés, no tourists",st:"Oranienburg\'s market day is Saturday. Farmers come from the surrounding villages. The square is the real civic heart — not the palace or the memorial, but here.",im:"Time-travel: the weekly market in 1910 — stalls selling vegetables and live chickens",t:"Saturday market from 8am. Come for the farmers cheese and vegetables.",c:["local_only"],r:"g",nn:"Marktplatz — Altstadt",ns:"Der kleine Marktplatz von Oranienburg — Wochenmarkt, lokale Cafés, keine Touristen",nst:"Oranienburg hat seinen Markttag samstags. Bauern aus den umliegenden Dörfern kommen.",nt:"Samstagmarkt ab 8 Uhr. Für Käse und Gemüse der Bauern kommen."},
  {id:13,n:"Heinkel Memorial Plaque — Altstadt",a:"Altstadt",v:["history","hidden"],d:5,s:"Where slave laborers built Heinkel aircraft for the Nazi war effort — a plaque is all that remains",st:"The Heinkel aircraft factory in Oranienburg used Sachsenhausen concentration camp prisoners as slave labor. 10,000 prisoners worked here building bombers. A memorial plaque marks the site.",im:"Time-travel: camp prisoners marching from Sachsenhausen to the factory gates at 5am, 1943",t:"The plaque is at the old factory site. Few visitors.",c:["history_big"],r:"g",nn:"Heinkel-Gedenkplakette — Altstadt",ns:"Wo Zwangsarbeiter Heinkel-Flugzeuge für die NS-Kriegsmaschinerie bauten — nur eine Plakette blieb",nst:"Die Heinkel-Fabrik nutzte Sachsenhausener KZ-Häftlinge als Zwangsarbeiter.",nt:"Die Plakette befindet sich am alten Fabrikgelände. Wenige Besucher."},
  {id:14,n:"Edelhofgraben Walk — Schloss",a:"Schloss",v:["nature","hidden","quiet"],d:10,s:"The old moat of the palace turned into a green walk — ducks, frogs, forgotten history",st:"The Edelhofgraben was the original moat of the Schloss. Filled in and planted as a linear park. The water still runs in sections. Best in spring when the frogs are deafening.",im:"Time-travel: the full moat surrounding the Schloss in 1700, boats crossing to the gate",t:"Walk it from the south. Mostly locals with prams.",c:["parks"],r:"g",nn:"Edelhofgraben — Schloss",ns:"Der alte Schlossgraben als Grünweg — Enten, Frösche, vergessene Geschichte",nst:"Der Edelhofgraben war der ursprüngliche Schlossgraben. Zugeschüttet und als Linearpark bepflanzt.",nt:"Von Süden abgehen. Meist Einheimische mit Kinderwagen."},
  {id:15,n:"Havel Boat Watch — Havel",a:"Havel",v:["local","nature","quiet"],d:10,s:"The best spot to watch river traffic on the Havel — old barges, kayaks, rowing clubs",st:"The Havel is a major waterway. From the riverside benches, watch the mixture of cargo barges, sailing boats, kayakers, and the occasional paddle steamer. Unhurried and real.",im:"Time-travel: a steam paddle boat making a grand arrival at Oranienburg, 1920",t:"The benches by the old harbor are free. Best on weekend afternoons.",c:["local_only"],r:"g",nn:"Havel Schiffsbeobachtung — Havel",ns:"Der beste Platz zum Beobachten des Schiffsverkehrs auf der Havel — alte Kähne, Kajaks, Ruderclubs",nst:"Die Havel ist ein wichtiger Wasserweg. Von den Uferbänken den Mix aus Frachtkähnen und Segelbooten beobachten.",nt:"Die Bänke am alten Hafen sind kostenlos. Besten Wochenendnachmittage."},
  {id:16,n:"Cemetery of Nations — Sachsenhausen",a:"Sachsenhausen",v:["history","quiet"],d:10,s:"Mass graves of Sachsenhausen victims — prisoners from 22 nations buried here",st:"After liberation, Allied forces buried thousands of victims from across occupied Europe in these grounds. Prisoners from Poland, France, the Netherlands, Soviet Union, and more. Free, silent, humbling.",im:"Time-travel: 1945 — survivors identifying the nationalities of the dead for burial records",t:"The cemetery is in the memorial grounds. Free.",c:["famous_dead"],r:"g",nn:"Völkerfriedhof — Sachsenhausen",ns:"Massengräber der Sachsenhausen-Opfer — Häftlinge aus 22 Nationen hier begraben",nst:"Nach der Befreiung bestatteten alliierte Kräfte Tausende Opfer aus dem besetzten Europa.",nt:"Der Friedhof liegt auf dem Gedenkstättengelände. Kostenlos."},
  {id:17,n:"Watchtower B (Restored) — Sachsenhausen",a:"Sachsenhausen",v:["history","hidden"],d:10,s:"A reconstructed guard tower with original views across the triangular camp",st:"The restored watchtower gives a guard\'s-eye view of the entire triangular camp layout. The geometry of control is immediately visible from above.",im:"Time-travel: an SS guard watching prisoners from this tower in 1940, rifle across his knees",t:"Accessible within the memorial grounds. Free.",c:["high_spots"],r:"g",nn:"Wachturm B — Sachsenhausen",ns:"Ein rekonstruierter Wachturm mit Originalblick über das dreieckige Lager",nst:"Der rekonstruierte Turm gibt die Sicht des Wächters auf das gesamte dreieckige Lager.",nt:"Im Gedenkstättengelände zugänglich. Kostenlos."},
  {id:18,n:"Barracks 38 and 39 — Sachsenhausen",a:"Sachsenhausen",v:["history","quiet"],d:10,s:"Jewish prisoner barracks preserved as a memorial — overcrowding documented in stark detail",st:"These reconstructed barracks show the daily reality of Jewish prisoners from 1938 onwards — the overcrowding, the prohibition on sunlight, the dehumanising organisation.",im:"Time-travel: Kristallnacht prisoners arriving here in November 1938, thousands in days",t:"Part of the main memorial. Free.",c:["history_big"],r:"g",nn:"Baracken 38 und 39 — Sachsenhausen",ns:"Jüdische Häftlingsbaracken als Mahnmal erhalten — Überbelegung in nüchternem Detail dokumentiert",nst:"Diese rekonstruierten Baracken zeigen die tägliche Realität jüdischer Gefangener ab 1938.",nt:"Teil des Hauptmahnmals. Kostenlos."},
  {id:19,n:"Orangerie Ruins — Schloss",a:"Schloss",v:["abandoned","hidden","history"],d:15,s:"Ruined orangerie of the palace — a greenhouse for the princess\'s tropical plants, now open sky",st:"Louise Henriette had a large orangerie built to maintain Mediterranean plants through Brandenburg winters. It fell into disrepair in the 18th century. The shell remains.",im:"Time-travel: exotic citrus trees in pots being carried back inside for winter, 1670",t:"Behind the Schlosspark. Few visitors.",c:["abandoned"],r:"g",nn:"Orangerie-Ruine — Schloss",ns:"Ruinierte Orangerie des Schlosses — ein Gewächshaus für tropische Pflanzen der Prinzessin, jetzt offen",nst:"Louise Henriette ließ eine große Orangerie bauen für mediterrane Pflanzen.",nt:"Hinter dem Schlosspark. Wenige Besucher."},
  {id:20,n:"Havel Beach — Havel",a:"Havel",v:["nature","local","free"],d:10,s:"Small sandy beach on the Havel — local families, swimmers, the simple pleasure of water",st:"A stretch of sand below the Schlosspark where locals swim in summer. Nothing commercial. Bring your own towel.",im:"Time-travel: children swimming in the Havel on summer holidays in 1950, East Germany",t:"Free. Best in July. Come early for space.",c:["parks"],r:"g",nn:"Havel-Badestrand — Havel",ns:"Kleiner Sandstrand an der Havel — Einheimische Familien, Schwimmer, das einfache Vergnügen des Wassers",nst:"Ein Sandstreifen unterhalb des Schlossparks, wo Einheimische im Sommer schwimmen.",nt:"Kostenlos. Besten im Juli. Früh kommen für Platz."},
  {id:21,n:"Old Oranienburg Station — Altstadt",a:"Altstadt",v:["history","local"],d:5,s:"The Wilhelmine era train station — the gateway that brought the camp prisoners here",st:"Built in 1893 in Prussian brick style. The same station that brought the first prisoners to Sachsenhausen in 1936. The building still functions. Look at it with this knowledge.",im:"Time-travel: the first train of prisoners arriving at this station in 1936, guards waiting",t:"Free to view exterior. The station café is a local institution.",c:["history_big"],r:"g",nn:"Bahnhof Oranienburg — Altstadt",ns:"Der wilhelminische Bahnhof — das Eingangstor, das die Lagerhäftlinge hierher brachte",nst:"1893 im preußischen Backsteinbau gebaut. Derselbe Bahnhof, der 1936 die ersten Häftlinge nach Sachsenhausen brachte.",nt:"Außenbereich kostenlos. Das Bahnhofcafé ist eine lokale Institution."},
  {id:22,n:"Mühlenfließ Trail — Lehnitz",a:"Lehnitz",v:["nature","hidden","quiet"],d:15,s:"A small stream walk through mixed woodland north of the city — no markers, just birdsong",st:"The Mühlenfließ is a small tributary that runs through the forest north of Oranienburg. The path along it is unmarked. Kingfishers, grey herons, the occasional beaver dam.",im:"Time-travel: miller taking flour to Oranienburg along this stream path in 1800",t:"Follow the stream from Lehnitzstraße. No map needed.",c:["parks"],r:"g",nn:"Mühlenfließ-Weg — Lehnitz",ns:"Ein kleiner Bachlauf durch Mischwald nördlich der Stadt — keine Markierungen, nur Vogelgesang",nst:"Das Mühlenfließ ist ein kleiner Zufluss, der durch den Wald nördlich von Oranienburg fließt.",nt:"Den Bach von der Lehnitzstraße aus folgen. Keine Karte nötig."},
  {id:23,n:"Prison Tower — Sachsenhausen",a:"Sachsenhausen",v:["history","weird"],d:10,s:"The infamous Tower A — the \"gate of paradise\" as guards ironically called it",st:"Tower A was the main entrance gate. The name \"gate of paradise\" was used with bitter irony by prisoners. The tower survives and is part of the memorial.",im:"Time-travel: a prisoner walking through this gate for the first time, not knowing they will never leave",t:"Part of the memorial. Free.",c:["scary"],r:"g",nn:"Turm A — Sachsenhausen",ns:"Der berüchtigte Turm A — das von Wächtern ironisch genannte \'Paradiespforte\'",nst:"Turm A war das Haupteingangstor. Der Name \"Paradiespforte\" wurde von Häftlingen bitter-ironisch benutzt.",nt:"Teil des Mahnmals. Kostenlos."},
  {id:24,n:"Bernauer Straße Viewpoint — Altstadt",a:"Altstadt",v:["local","quiet"],d:5,s:"The main street of old Oranienburg — peeling stucco, GDR-era shopfronts, lived-in city",st:"Oranienburg\'s main commercial street has barely changed since reunification. The mix of 1950s GDR shopfronts and older Wilhelmine buildings makes it an unintentional open-air museum.",im:"Time-travel: this street in 1980 East Germany — Trabis, grey shopfronts, waiting queues",t:"Just walk it. Best on a weekday when real life happens.",c:["local_only"],r:"g",nn:"Bernauer Straße — Altstadt",ns:"Die Hauptstraße der alten Oranienburg — abblätternder Putz, DDR-Ladenfronten, gelebte Stadt",nst:"Oranienburg Haupteinkaufsstraße hat sich seit der Wiedervereinigung kaum verändert.",nt:"Einfach entlanggehen. Am besten werktags wenn das echte Leben passiert."},
  {id:25,n:"Havel Sunset Bench — Havel",a:"Havel",v:["beautiful","quiet","nature"],d:5,s:"The bench at the river bend where Oranienburg turns its back on history and faces the water",st:"There is a bend in the Havel south of the Schloss where the city disappears and there is only river, trees, and light. Locals know it. Tourists never find it.",im:"Time-travel: an Oranienburg resident sitting here every evening for 40 years, watching the water change",t:"Walk south from the Schloss. Past the marina. Find the bend.",c:["local_only"],r:"g",nn:"Havel-Sonnenuntergangsbank — Havel",ns:"Die Bank an der Flussbiegung, wo Oranienburg der Geschichte den Rücken kehrt und zum Wasser schaut",nst:"Eine Biegung in der Havel südlich des Schlosses, wo die Stadt verschwindet.",nt:"Vom Schloss nach Süden laufen. Am Yachthafen vorbei. Die Biegung finden."},
  {id:26,n:"Sachsenhausen Memorial — Sachsenhausen #26",a:"Sachsenhausen",v:["history","quiet"],d:45,s:"Nazi concentration camp memorial site — free, essential, unforgettable",st:"From 1936 to 1945, over 200,000 people were imprisoned here. The site is now a national memorial. Walking the grounds takes 2–3 hours. This is the kind of history that must be confronted.",im:"Time-travel: 1945 — Soviet forces finding survivors barely alive among thousands of dead",t:"Free entry. Audio guides available. Allow 2-3 hours minimum.",c:["history_big"],r:"g",nn:"Gedenkstätte Sachsenhausen — Sachsenhausen #26",ns:"NS-Konzentrationslager Gedenkstätte — kostenlos, unverzichtbar, unvergesslich",nst:"Von 1936 bis 1945 wurden hier über 200.000 Menschen inhaftiert. Die Stätte ist jetzt nationales Mahnmal.",nt:"Freier Eintritt. Audioguides verfügbar. Mindestens 2-3 Stunden einplanen."},
  {id:27,n:"Appellplatz — Sachsenhausen #27",a:"Sachsenhausen",v:["history","quiet"],d:12,s:"The roll call square where prisoners stood for hours in all weather — vast and terrible",st:"Prisoners were assembled here twice daily — morning and evening — sometimes for hours in freezing cold as a form of punishment. The square is still its original size.",im:"Time-travel: 1941 winter — prisoners standing for three hours in subzero temperatures at dawn",t:"Stand in the centre. The scale of what happened here becomes real.",c:["high_spots"],r:"g",nn:"Appellplatz — Sachsenhausen #27",ns:"Der Appell-Platz, wo Gefangene stundenlang bei jedem Wetter standen — riesig und schrecklich",nst:"Gefangene wurden zweimal täglich versammelt — manchmal stundenlang als Strafe.",nt:"In der Mitte stehen. Das Ausmaß des Geschehens wird real."},
  {id:28,n:"Station Z Memorial — Sachsenhausen #28",a:"Sachsenhausen",v:["history","quiet"],d:6,s:"The camp\'s extermination site — the end of the one-way track through the camp",st:"Station Z was the killing centre of Sachsenhausen — gas chamber, crematorium, execution trench. What remains is preserved exactly as it was found. A place of absolute silence.",im:"Time-travel: Soviet troops discovering Station Z in April 1945 — smoke still rising",t:"This section requires composure. Take your time.",c:["parks"],r:"g",nn:"Station Z — Sachsenhausen #28",ns:"Die Vernichtungsanlage des Lagers — das Ende der Einbahnstraße durch das Lager",nst:"Station Z war das Tötungszentrum Sachsenhausens. Was bleibt, ist genau so erhalten wie gefunden.",nt:"Dieser Abschnitt erfordert Fassung. Zeit nehmen."},
  {id:29,n:"Soviet Special Camp Memorial — Sachsenhausen #29",a:"Sachsenhausen",v:["history","hidden","quiet"],d:52,s:"After the Nazis, the Soviets used the same camp from 1945–1950 — 12,000 died here too",st:"The Soviets converted Sachsenhausen into NKVD Special Camp Nr. 7 immediately after liberation. 60,000 Germans were interned here, many innocent. 12,000 died. This chapter is less known.",im:"Time-travel: German civilians arriving as Soviet prisoners to the same camp just liberated, 1945",t:"The mass graves are in the north of the memorial site. Free.",c:["courtyards"],r:"g",nn:"Sowjetisches Sonderlager — Sachsenhausen #29",ns:"Nach den Nazis nutzten die Sowjets dasselbe Lager von 1945–1950 — 12.000 starben auch hier",nst:"Die Sowjets wandelten Sachsenhausen sofort nach der Befreiung in NKWD-Sonderlager Nr. 7 um.",nt:"Die Massengräber liegen im Norden des Gedenkstättengeländes. Kostenlos."},
  {id:30,n:"Schloss Oranienburg — Schloss #30",a:"Schloss",v:["history","beautiful"],d:22,s:"The first Baroque palace in Brandenburg — built 1651 for the Great Elector\'s wife Louise Henriette",st:"Princess Louise Henriette of Orange funded and named this palace and the city around it. It is the oldest Baroque palace in Brandenburg. The exterior is free to admire.",im:"Time-travel: Louise Henriette supervising construction of her Dutch-influenced palace, 1655",t:"Exterior free. Museum inside has a small charge.",c:["romantic_water"],r:"g",nn:"Schloss Oranienburg — Schloss #30",ns:"Das erste Barockschloss in Brandenburg — 1651 für die Frau des Großen Kurfürsten Louise Henriette erbaut",nst:"Prinzessin Louise Henriette von Oranien finanzierte dieses Schloss und die Stadt drum herum.",nt:"Außenbereich kostenlos. Museum innen hat kleinen Eintritt."},
  {id:31,n:"Schlosspark Oranienburg — Schloss #31",a:"Schloss",v:["nature","beautiful","quiet"],d:20,s:"Park behind the palace along the Havel — restored Dutch garden with canal features",st:"The park was laid out in the Dutch style — formal hedges, canals, geometric beds — reflecting Louise Henriette\'s homeland. Free to walk at all times.",im:"Time-travel: Louise Henriette walking her Dutch garden, missing the Netherlands, 1660",t:"Always free. The canal section at the back is the quietest.",c:["scary"],r:"g",nn:"Schlosspark Oranienburg — Schloss #31",ns:"Park hinter dem Schloss an der Havel — restaurierter holländischer Garten mit Kanalmerkmalen",nst:"Der Park wurde im holländischen Stil angelegt — formale Hecken, Kanäle, geometrische Beete.",nt:"Immer kostenlos. Der Kanalabschnitt hinten ist am stillsten."},
  {id:32,n:"Louise Henriette Monument — Altstadt #32",a:"Altstadt",v:["history","hidden"],d:19,s:"The founder of Oranienburg — remembered in bronze near the palace she built",st:"Princess Louise Henriette of Orange-Nassau gave the city its name, its palace, and its Dutch character. The monument is modest but the story behind it is remarkable.",im:"Time-travel: the princess arriving in Brandenburg for the first time, homesick for the Netherlands",t:"Find it near the palace entrance.",c:["famous_dead"],r:"g",nn:"Louise-Henriette-Denkmal — Altstadt #32",ns:"Die Gründerin von Oranienburg — in Bronze in der Nähe des Schlosses, das sie erbaute",nst:"Prinzessin Louise Henriette gab der Stadt ihren Namen, ihr Schloss und ihren holländischen Charakter.",nt:"In der Nähe des Schlosseingangs finden."},
  {id:33,n:"Nikolaikirche Oranienburg — Altstadt #33",a:"Altstadt",v:["history","quiet"],d:13,s:"Baroque church built alongside the palace — the court church of the Oranienburg princes",st:"Built in the 1650s at the same time as the palace. The interior is spare Dutch Reformed style — no decoration, pure proportion. Open most days.",im:"Time-travel: Louise Henriette attending Sunday service here in 1658, court in full regalia",t:"Open weekdays. Free entry.",c:["street_art"],r:"g",nn:"Nikolaikirche — Altstadt #33",ns:"Barockkirche neben dem Schloss — die Hofkirche der Oranienburger Fürsten",nst:"In den 1650ern gleichzeitig mit dem Schloss gebaut. Das Innere ist reformiert schlicht.",nt:"Werktags geöffnet. Freier Eintritt."},
  {id:34,n:"Havel River Walk — Havel #34",a:"Havel",v:["nature","beautiful","quiet"],d:52,s:"The Havel through Oranienburg — herons, fishermen, slow water, old trees",st:"The Havel widens into something lake-like near Oranienburg. The bank walk south from the palace is tree-lined and almost empty on weekday mornings.",im:"Time-travel: court barges moving along this stretch of the Havel in 1700",t:"Walk south from the Schloss gardens. The best stretch is the first kilometre.",c:["abandoned"],r:"g",nn:"Havel-Uferweg — Havel #34",ns:"Die Havel durch Oranienburg — Reiher, Fischer, langsames Wasser, alte Bäume",nst:"Die Havel weitet sich bei Oranienburg seeartig. Der Uferweg südlich vom Schloss ist baumgesäumt.",nt:"Vom Schlosspark nach Süden gehen. Das beste Stück ist das erste Kilometer."},
  {id:35,n:"Lehnitz Lake — Lehnitz #35",a:"Lehnitz",v:["nature","quiet","free"],d:11,s:"Wild glacial lake in the pine forests north of Oranienburg — completely undeveloped",st:"Lehnitz lake sits in an old military exclusion zone that protected it from development for decades. The water is clean and cold. A single sandy path rings it through the pines.",im:"Time-travel: 1980 — East German border guards swimming here on their days off, the lake unchanged",t:"Walk or cycle 15 minutes from the Altstadt. Always free. Swim in summer.",c:["free_museum"],r:"g",nn:"Lehnitzer See — Lehnitz #35",ns:"Wilder Gletschersee in den Kiefernwäldern nördlich von Oranienburg — vollkommen unerschlossen",nst:"Der Lehnitzer See liegt in einer alten Militärsperrzone, die ihn jahrzehntelang vor Bebauung schützte.",nt:"15 Minuten zu Fuß oder Rad aus der Altstadt. Immer kostenlos. Im Sommer schwimmen."},
  {id:36,n:"Lehnitz Forest — Lehnitz #36",a:"Lehnitz",v:["nature","quiet","hidden"],d:48,s:"Ancient pine and heather landscape north of the city — no trails, no guides, just forest",st:"The Lehnitz forest is part of the old hunting grounds of the Hohenzollern dynasty. The heather blooms purple in August. The forest floor is entirely soft.",im:"Time-travel: Hohenzollern hunting parties crashing through these pines, 1750",t:"August for the heather bloom. No trails — use a compass.",c:["local_only"],r:"g",nn:"Lehnitzer Wald — Lehnitz #36",ns:"Uralte Kiefern- und Heidelandschaft nördlich der Stadt — keine Wege, keine Guides, nur Wald",nst:"Der Lehnitzer Wald ist Teil der alten Jagdgründe der Hohenzollern. Die Heide blüht lila im August.",nt:"August für die Heidelblüte. Keine Wege — Kompass benutzen."},
  {id:37,n:"Old Town Market Square — Altstadt #37",a:"Altstadt",v:["local","history"],d:52,s:"The small market square of Oranienburg — weekly market, local cafés, no tourists",st:"Oranienburg\'s market day is Saturday. Farmers come from the surrounding villages. The square is the real civic heart — not the palace or the memorial, but here.",im:"Time-travel: the weekly market in 1910 — stalls selling vegetables and live chickens",t:"Saturday market from 8am. Come for the farmers cheese and vegetables.",c:["architecture"],r:"g",nn:"Marktplatz — Altstadt #37",ns:"Der kleine Marktplatz von Oranienburg — Wochenmarkt, lokale Cafés, keine Touristen",nst:"Oranienburg hat seinen Markttag samstags. Bauern aus den umliegenden Dörfern kommen.",nt:"Samstagmarkt ab 8 Uhr. Für Käse und Gemüse der Bauern kommen."},
  {id:38,n:"Heinkel Memorial Plaque — Altstadt #38",a:"Altstadt",v:["history","hidden"],d:39,s:"Where slave laborers built Heinkel aircraft for the Nazi war effort — a plaque is all that remains",st:"The Heinkel aircraft factory in Oranienburg used Sachsenhausen concentration camp prisoners as slave labor. 10,000 prisoners worked here building bombers. A memorial plaque marks the site.",im:"Time-travel: camp prisoners marching from Sachsenhausen to the factory gates at 5am, 1943",t:"The plaque is at the old factory site. Few visitors.",c:["history_big"],r:"g",nn:"Heinkel-Gedenkplakette — Altstadt #38",ns:"Wo Zwangsarbeiter Heinkel-Flugzeuge für die NS-Kriegsmaschinerie bauten — nur eine Plakette blieb",nst:"Die Heinkel-Fabrik nutzte Sachsenhausener KZ-Häftlinge als Zwangsarbeiter.",nt:"Die Plakette befindet sich am alten Fabrikgelände. Wenige Besucher."},
  {id:39,n:"Edelhofgraben Walk — Schloss #39",a:"Schloss",v:["nature","hidden","quiet"],d:10,s:"The old moat of the palace turned into a green walk — ducks, frogs, forgotten history",st:"The Edelhofgraben was the original moat of the Schloss. Filled in and planted as a linear park. The water still runs in sections. Best in spring when the frogs are deafening.",im:"Time-travel: the full moat surrounding the Schloss in 1700, boats crossing to the gate",t:"Walk it from the south. Mostly locals with prams.",c:["high_spots"],r:"g",nn:"Edelhofgraben — Schloss #39",ns:"Der alte Schlossgraben als Grünweg — Enten, Frösche, vergessene Geschichte",nst:"Der Edelhofgraben war der ursprüngliche Schlossgraben. Zugeschüttet und als Linearpark bepflanzt.",nt:"Von Süden abgehen. Meist Einheimische mit Kinderwagen."},
  {id:40,n:"Havel Boat Watch — Havel #40",a:"Havel",v:["local","nature","quiet"],d:42,s:"The best spot to watch river traffic on the Havel — old barges, kayaks, rowing clubs",st:"The Havel is a major waterway. From the riverside benches, watch the mixture of cargo barges, sailing boats, kayakers, and the occasional paddle steamer. Unhurried and real.",im:"Time-travel: a steam paddle boat making a grand arrival at Oranienburg, 1920",t:"The benches by the old harbor are free. Best on weekend afternoons.",c:["parks"],r:"g",nn:"Havel Schiffsbeobachtung — Havel #40",ns:"Der beste Platz zum Beobachten des Schiffsverkehrs auf der Havel — alte Kähne, Kajaks, Ruderclubs",nst:"Die Havel ist ein wichtiger Wasserweg. Von den Uferbänken den Mix aus Frachtkähnen und Segelbooten beobachten.",nt:"Die Bänke am alten Hafen sind kostenlos. Besten Wochenendnachmittage."},
  {id:41,n:"Cemetery of Nations — Sachsenhausen #41",a:"Sachsenhausen",v:["history","quiet"],d:32,s:"Mass graves of Sachsenhausen victims — prisoners from 22 nations buried here",st:"After liberation, Allied forces buried thousands of victims from across occupied Europe in these grounds. Prisoners from Poland, France, the Netherlands, Soviet Union, and more. Free, silent, humbling.",im:"Time-travel: 1945 — survivors identifying the nationalities of the dead for burial records",t:"The cemetery is in the memorial grounds. Free.",c:["courtyards"],r:"g",nn:"Völkerfriedhof — Sachsenhausen #41",ns:"Massengräber der Sachsenhausen-Opfer — Häftlinge aus 22 Nationen hier begraben",nst:"Nach der Befreiung bestatteten alliierte Kräfte Tausende Opfer aus dem besetzten Europa.",nt:"Der Friedhof liegt auf dem Gedenkstättengelände. Kostenlos."},
  {id:42,n:"Watchtower B (Restored) — Sachsenhausen #42",a:"Sachsenhausen",v:["history","hidden"],d:7,s:"A reconstructed guard tower with original views across the triangular camp",st:"The restored watchtower gives a guard\'s-eye view of the entire triangular camp layout. The geometry of control is immediately visible from above.",im:"Time-travel: an SS guard watching prisoners from this tower in 1940, rifle across his knees",t:"Accessible within the memorial grounds. Free.",c:["romantic_water"],r:"g",nn:"Wachturm B — Sachsenhausen #42",ns:"Ein rekonstruierter Wachturm mit Originalblick über das dreieckige Lager",nst:"Der rekonstruierte Turm gibt die Sicht des Wächters auf das gesamte dreieckige Lager.",nt:"Im Gedenkstättengelände zugänglich. Kostenlos."},
  {id:43,n:"Barracks 38 and 39 — Sachsenhausen #43",a:"Sachsenhausen",v:["history","quiet"],d:6,s:"Jewish prisoner barracks preserved as a memorial — overcrowding documented in stark detail",st:"These reconstructed barracks show the daily reality of Jewish prisoners from 1938 onwards — the overcrowding, the prohibition on sunlight, the dehumanising organisation.",im:"Time-travel: Kristallnacht prisoners arriving here in November 1938, thousands in days",t:"Part of the main memorial. Free.",c:["scary"],r:"g",nn:"Baracken 38 und 39 — Sachsenhausen #43",ns:"Jüdische Häftlingsbaracken als Mahnmal erhalten — Überbelegung in nüchternem Detail dokumentiert",nst:"Diese rekonstruierten Baracken zeigen die tägliche Realität jüdischer Gefangener ab 1938.",nt:"Teil des Hauptmahnmals. Kostenlos."},
  {id:44,n:"Orangerie Ruins — Schloss #44",a:"Schloss",v:["abandoned","hidden","history"],d:10,s:"Ruined orangerie of the palace — a greenhouse for the princess\'s tropical plants, now open sky",st:"Louise Henriette had a large orangerie built to maintain Mediterranean plants through Brandenburg winters. It fell into disrepair in the 18th century. The shell remains.",im:"Time-travel: exotic citrus trees in pots being carried back inside for winter, 1670",t:"Behind the Schlosspark. Few visitors.",c:["famous_dead"],r:"g",nn:"Orangerie-Ruine — Schloss #44",ns:"Ruinierte Orangerie des Schlosses — ein Gewächshaus für tropische Pflanzen der Prinzessin, jetzt offen",nst:"Louise Henriette ließ eine große Orangerie bauen für mediterrane Pflanzen.",nt:"Hinter dem Schlosspark. Wenige Besucher."},
  {id:45,n:"Havel Beach — Havel #45",a:"Havel",v:["nature","local","free"],d:18,s:"Small sandy beach on the Havel — local families, swimmers, the simple pleasure of water",st:"A stretch of sand below the Schlosspark where locals swim in summer. Nothing commercial. Bring your own towel.",im:"Time-travel: children swimming in the Havel on summer holidays in 1950, East Germany",t:"Free. Best in July. Come early for space.",c:["street_art"],r:"g",nn:"Havel-Badestrand — Havel #45",ns:"Kleiner Sandstrand an der Havel — Einheimische Familien, Schwimmer, das einfache Vergnügen des Wassers",nst:"Ein Sandstreifen unterhalb des Schlossparks, wo Einheimische im Sommer schwimmen.",nt:"Kostenlos. Besten im Juli. Früh kommen für Platz."},
  {id:46,n:"Old Oranienburg Station — Altstadt #46",a:"Altstadt",v:["history","local"],d:19,s:"The Wilhelmine era train station — the gateway that brought the camp prisoners here",st:"Built in 1893 in Prussian brick style. The same station that brought the first prisoners to Sachsenhausen in 1936. The building still functions. Look at it with this knowledge.",im:"Time-travel: the first train of prisoners arriving at this station in 1936, guards waiting",t:"Free to view exterior. The station café is a local institution.",c:["abandoned"],r:"g",nn:"Bahnhof Oranienburg — Altstadt #46",ns:"Der wilhelminische Bahnhof — das Eingangstor, das die Lagerhäftlinge hierher brachte",nst:"1893 im preußischen Backsteinbau gebaut. Derselbe Bahnhof, der 1936 die ersten Häftlinge nach Sachsenhausen brachte.",nt:"Außenbereich kostenlos. Das Bahnhofcafé ist eine lokale Institution."},
  {id:47,n:"Mühlenfließ Trail — Lehnitz #47",a:"Lehnitz",v:["nature","hidden","quiet"],d:37,s:"A small stream walk through mixed woodland north of the city — no markers, just birdsong",st:"The Mühlenfließ is a small tributary that runs through the forest north of Oranienburg. The path along it is unmarked. Kingfishers, grey herons, the occasional beaver dam.",im:"Time-travel: miller taking flour to Oranienburg along this stream path in 1800",t:"Follow the stream from Lehnitzstraße. No map needed.",c:["free_museum"],r:"g",nn:"Mühlenfließ-Weg — Lehnitz #47",ns:"Ein kleiner Bachlauf durch Mischwald nördlich der Stadt — keine Markierungen, nur Vogelgesang",nst:"Das Mühlenfließ ist ein kleiner Zufluss, der durch den Wald nördlich von Oranienburg fließt.",nt:"Den Bach von der Lehnitzstraße aus folgen. Keine Karte nötig."},
  {id:48,n:"Prison Tower — Sachsenhausen #48",a:"Sachsenhausen",v:["history","weird"],d:43,s:"The infamous Tower A — the \"gate of paradise\" as guards ironically called it",st:"Tower A was the main entrance gate. The name \"gate of paradise\" was used with bitter irony by prisoners. The tower survives and is part of the memorial.",im:"Time-travel: a prisoner walking through this gate for the first time, not knowing they will never leave",t:"Part of the memorial. Free.",c:["local_only"],r:"g",nn:"Turm A — Sachsenhausen #48",ns:"Der berüchtigte Turm A — das von Wächtern ironisch genannte \'Paradiespforte\'",nst:"Turm A war das Haupteingangstor. Der Name \"Paradiespforte\" wurde von Häftlingen bitter-ironisch benutzt.",nt:"Teil des Mahnmals. Kostenlos."},
  {id:49,n:"Bernauer Straße Viewpoint — Altstadt #49",a:"Altstadt",v:["local","quiet"],d:6,s:"The main street of old Oranienburg — peeling stucco, GDR-era shopfronts, lived-in city",st:"Oranienburg\'s main commercial street has barely changed since reunification. The mix of 1950s GDR shopfronts and older Wilhelmine buildings makes it an unintentional open-air museum.",im:"Time-travel: this street in 1980 East Germany — Trabis, grey shopfronts, waiting queues",t:"Just walk it. Best on a weekday when real life happens.",c:["architecture"],r:"g",nn:"Bernauer Straße — Altstadt #49",ns:"Die Hauptstraße der alten Oranienburg — abblätternder Putz, DDR-Ladenfronten, gelebte Stadt",nst:"Oranienburg Haupteinkaufsstraße hat sich seit der Wiedervereinigung kaum verändert.",nt:"Einfach entlanggehen. Am besten werktags wenn das echte Leben passiert."},
  {id:50,n:"Havel Sunset Bench — Havel #50",a:"Havel",v:["beautiful","quiet","nature"],d:40,s:"The bench at the river bend where Oranienburg turns its back on history and faces the water",st:"There is a bend in the Havel south of the Schloss where the city disappears and there is only river, trees, and light. Locals know it. Tourists never find it.",im:"Time-travel: an Oranienburg resident sitting here every evening for 40 years, watching the water change",t:"Walk south from the Schloss. Past the marina. Find the bend.",c:["history_big"],r:"g",nn:"Havel-Sonnenuntergangsbank — Havel #50",ns:"Die Bank an der Flussbiegung, wo Oranienburg der Geschichte den Rücken kehrt und zum Wasser schaut",nst:"Eine Biegung in der Havel südlich des Schlosses, wo die Stadt verschwindet.",nt:"Vom Schloss nach Süden laufen. Am Yachthafen vorbei. Die Biegung finden."},

  {id:55,n:"Schloss Oranienburg — Schloss #55",a:"Schloss",v:["history","beautiful"],d:39,s:"The first Baroque palace in Brandenburg — built 1651 for the Great Elector\'s wife Louise Henriette",st:"Princess Louise Henriette of Orange funded and named this palace and the city around it. It is the oldest Baroque palace in Brandenburg. The exterior is free to admire.",im:"Time-travel: Louise Henriette supervising construction of her Dutch-influenced palace, 1655",t:"Exterior free. Museum inside has a small charge.",c:["scary"],r:"g",nn:"Schloss Oranienburg — Schloss #55",ns:"Das erste Barockschloss in Brandenburg — 1651 für die Frau des Großen Kurfürsten Louise Henriette erbaut",nst:"Prinzessin Louise Henriette von Oranien finanzierte dieses Schloss und die Stadt drum herum.",nt:"Außenbereich kostenlos. Museum innen hat kleinen Eintritt."},
  {id:56,n:"Schlosspark Oranienburg — Schloss #56",a:"Schloss",v:["nature","beautiful","quiet"],d:31,s:"Park behind the palace along the Havel — restored Dutch garden with canal features",st:"The park was laid out in the Dutch style — formal hedges, canals, geometric beds — reflecting Louise Henriette\'s homeland. Free to walk at all times.",im:"Time-travel: Louise Henriette walking her Dutch garden, missing the Netherlands, 1660",t:"Always free. The canal section at the back is the quietest.",c:["famous_dead"],r:"g",nn:"Schlosspark Oranienburg — Schloss #56",ns:"Park hinter dem Schloss an der Havel — restaurierter holländischer Garten mit Kanalmerkmalen",nst:"Der Park wurde im holländischen Stil angelegt — formale Hecken, Kanäle, geometrische Beete.",nt:"Immer kostenlos. Der Kanalabschnitt hinten ist am stillsten."},
  {id:57,n:"Louise Henriette Monument — Altstadt #57",a:"Altstadt",v:["history","hidden"],d:19,s:"The founder of Oranienburg — remembered in bronze near the palace she built",st:"Princess Louise Henriette of Orange-Nassau gave the city its name, its palace, and its Dutch character. The monument is modest but the story behind it is remarkable.",im:"Time-travel: the princess arriving in Brandenburg for the first time, homesick for the Netherlands",t:"Find it near the palace entrance.",c:["street_art"],r:"g",nn:"Louise-Henriette-Denkmal — Altstadt #57",ns:"Die Gründerin von Oranienburg — in Bronze in der Nähe des Schlosses, das sie erbaute",nst:"Prinzessin Louise Henriette gab der Stadt ihren Namen, ihr Schloss und ihren holländischen Charakter.",nt:"In der Nähe des Schlosseingangs finden."},
  {id:58,n:"Nikolaikirche Oranienburg — Altstadt #58",a:"Altstadt",v:["history","quiet"],d:33,s:"Baroque church built alongside the palace — the court church of the Oranienburg princes",st:"Built in the 1650s at the same time as the palace. The interior is spare Dutch Reformed style — no decoration, pure proportion. Open most days.",im:"Time-travel: Louise Henriette attending Sunday service here in 1658, court in full regalia",t:"Open weekdays. Free entry.",c:["abandoned"],r:"g",nn:"Nikolaikirche — Altstadt #58",ns:"Barockkirche neben dem Schloss — die Hofkirche der Oranienburger Fürsten",nst:"In den 1650ern gleichzeitig mit dem Schloss gebaut. Das Innere ist reformiert schlicht.",nt:"Werktags geöffnet. Freier Eintritt."},
  {id:59,n:"Havel River Walk — Havel #59",a:"Havel",v:["nature","beautiful","quiet"],d:42,s:"The Havel through Oranienburg — herons, fishermen, slow water, old trees",st:"The Havel widens into something lake-like near Oranienburg. The bank walk south from the palace is tree-lined and almost empty on weekday mornings.",im:"Time-travel: court barges moving along this stretch of the Havel in 1700",t:"Walk south from the Schloss gardens. The best stretch is the first kilometre.",c:["free_museum"],r:"g",nn:"Havel-Uferweg — Havel #59",ns:"Die Havel durch Oranienburg — Reiher, Fischer, langsames Wasser, alte Bäume",nst:"Die Havel weitet sich bei Oranienburg seeartig. Der Uferweg südlich vom Schloss ist baumgesäumt.",nt:"Vom Schlosspark nach Süden gehen. Das beste Stück ist das erste Kilometer."},
  {id:60,n:"Lehnitz Lake — Lehnitz #60",a:"Lehnitz",v:["nature","quiet","free"],d:22,s:"Wild glacial lake in the pine forests north of Oranienburg — completely undeveloped",st:"Lehnitz lake sits in an old military exclusion zone that protected it from development for decades. The water is clean and cold. A single sandy path rings it through the pines.",im:"Time-travel: 1980 — East German border guards swimming here on their days off, the lake unchanged",t:"Walk or cycle 15 minutes from the Altstadt. Always free. Swim in summer.",c:["local_only"],r:"g",nn:"Lehnitzer See — Lehnitz #60",ns:"Wilder Gletschersee in den Kiefernwäldern nördlich von Oranienburg — vollkommen unerschlossen",nst:"Der Lehnitzer See liegt in einer alten Militärsperrzone, die ihn jahrzehntelang vor Bebauung schützte.",nt:"15 Minuten zu Fuß oder Rad aus der Altstadt. Immer kostenlos. Im Sommer schwimmen."},
  {id:61,n:"Lehnitz Forest — Lehnitz #61",a:"Lehnitz",v:["nature","quiet","hidden"],d:5,s:"Ancient pine and heather landscape north of the city — no trails, no guides, just forest",st:"The Lehnitz forest is part of the old hunting grounds of the Hohenzollern dynasty. The heather blooms purple in August. The forest floor is entirely soft.",im:"Time-travel: Hohenzollern hunting parties crashing through these pines, 1750",t:"August for the heather bloom. No trails — use a compass.",c:["architecture"],r:"g",nn:"Lehnitzer Wald — Lehnitz #61",ns:"Uralte Kiefern- und Heidelandschaft nördlich der Stadt — keine Wege, keine Guides, nur Wald",nst:"Der Lehnitzer Wald ist Teil der alten Jagdgründe der Hohenzollern. Die Heide blüht lila im August.",nt:"August für die Heidelblüte. Keine Wege — Kompass benutzen."},
  {id:62,n:"Old Town Market Square — Altstadt #62",a:"Altstadt",v:["local","history"],d:53,s:"The small market square of Oranienburg — weekly market, local cafés, no tourists",st:"Oranienburg\'s market day is Saturday. Farmers come from the surrounding villages. The square is the real civic heart — not the palace or the memorial, but here.",im:"Time-travel: the weekly market in 1910 — stalls selling vegetables and live chickens",t:"Saturday market from 8am. Come for the farmers cheese and vegetables.",c:["history_big"],r:"g",nn:"Marktplatz — Altstadt #62",ns:"Der kleine Marktplatz von Oranienburg — Wochenmarkt, lokale Cafés, keine Touristen",nst:"Oranienburg hat seinen Markttag samstags. Bauern aus den umliegenden Dörfern kommen.",nt:"Samstagmarkt ab 8 Uhr. Für Käse und Gemüse der Bauern kommen."},
  {id:63,n:"Heinkel Memorial Plaque — Altstadt #63",a:"Altstadt",v:["history","hidden"],d:15,s:"Where slave laborers built Heinkel aircraft for the Nazi war effort — a plaque is all that remains",st:"The Heinkel aircraft factory in Oranienburg used Sachsenhausen concentration camp prisoners as slave labor. 10,000 prisoners worked here building bombers. A memorial plaque marks the site.",im:"Time-travel: camp prisoners marching from Sachsenhausen to the factory gates at 5am, 1943",t:"The plaque is at the old factory site. Few visitors.",c:["high_spots"],r:"g",nn:"Heinkel-Gedenkplakette — Altstadt #63",ns:"Wo Zwangsarbeiter Heinkel-Flugzeuge für die NS-Kriegsmaschinerie bauten — nur eine Plakette blieb",nst:"Die Heinkel-Fabrik nutzte Sachsenhausener KZ-Häftlinge als Zwangsarbeiter.",nt:"Die Plakette befindet sich am alten Fabrikgelände. Wenige Besucher."},
  {id:64,n:"Edelhofgraben Walk — Schloss #64",a:"Schloss",v:["nature","hidden","quiet"],d:49,s:"The old moat of the palace turned into a green walk — ducks, frogs, forgotten history",st:"The Edelhofgraben was the original moat of the Schloss. Filled in and planted as a linear park. The water still runs in sections. Best in spring when the frogs are deafening.",im:"Time-travel: the full moat surrounding the Schloss in 1700, boats crossing to the gate",t:"Walk it from the south. Mostly locals with prams.",c:["parks"],r:"g",nn:"Edelhofgraben — Schloss #64",ns:"Der alte Schlossgraben als Grünweg — Enten, Frösche, vergessene Geschichte",nst:"Der Edelhofgraben war der ursprüngliche Schlossgraben. Zugeschüttet und als Linearpark bepflanzt.",nt:"Von Süden abgehen. Meist Einheimische mit Kinderwagen."},
  {id:65,n:"Havel Boat Watch — Havel #65",a:"Havel",v:["local","nature","quiet"],d:32,s:"The best spot to watch river traffic on the Havel — old barges, kayaks, rowing clubs",st:"The Havel is a major waterway. From the riverside benches, watch the mixture of cargo barges, sailing boats, kayakers, and the occasional paddle steamer. Unhurried and real.",im:"Time-travel: a steam paddle boat making a grand arrival at Oranienburg, 1920",t:"The benches by the old harbor are free. Best on weekend afternoons.",c:["courtyards"],r:"g",nn:"Havel Schiffsbeobachtung — Havel #65",ns:"Der beste Platz zum Beobachten des Schiffsverkehrs auf der Havel — alte Kähne, Kajaks, Ruderclubs",nst:"Die Havel ist ein wichtiger Wasserweg. Von den Uferbänken den Mix aus Frachtkähnen und Segelbooten beobachten.",nt:"Die Bänke am alten Hafen sind kostenlos. Besten Wochenendnachmittage."},
  {id:66,n:"Cemetery of Nations — Sachsenhausen #66",a:"Sachsenhausen",v:["history","quiet"],d:26,s:"Mass graves of Sachsenhausen victims — prisoners from 22 nations buried here",st:"After liberation, Allied forces buried thousands of victims from across occupied Europe in these grounds. Prisoners from Poland, France, the Netherlands, Soviet Union, and more. Free, silent, humbling.",im:"Time-travel: 1945 — survivors identifying the nationalities of the dead for burial records",t:"The cemetery is in the memorial grounds. Free.",c:["romantic_water"],r:"g",nn:"Völkerfriedhof — Sachsenhausen #66",ns:"Massengräber der Sachsenhausen-Opfer — Häftlinge aus 22 Nationen hier begraben",nst:"Nach der Befreiung bestatteten alliierte Kräfte Tausende Opfer aus dem besetzten Europa.",nt:"Der Friedhof liegt auf dem Gedenkstättengelände. Kostenlos."},
  {id:67,n:"Watchtower B (Restored) — Sachsenhausen #67",a:"Sachsenhausen",v:["history","hidden"],d:22,s:"A reconstructed guard tower with original views across the triangular camp",st:"The restored watchtower gives a guard\'s-eye view of the entire triangular camp layout. The geometry of control is immediately visible from above.",im:"Time-travel: an SS guard watching prisoners from this tower in 1940, rifle across his knees",t:"Accessible within the memorial grounds. Free.",c:["scary"],r:"g",nn:"Wachturm B — Sachsenhausen #67",ns:"Ein rekonstruierter Wachturm mit Originalblick über das dreieckige Lager",nst:"Der rekonstruierte Turm gibt die Sicht des Wächters auf das gesamte dreieckige Lager.",nt:"Im Gedenkstättengelände zugänglich. Kostenlos."},
  {id:68,n:"Barracks 38 and 39 — Sachsenhausen #68",a:"Sachsenhausen",v:["history","quiet"],d:14,s:"Jewish prisoner barracks preserved as a memorial — overcrowding documented in stark detail",st:"These reconstructed barracks show the daily reality of Jewish prisoners from 1938 onwards — the overcrowding, the prohibition on sunlight, the dehumanising organisation.",im:"Time-travel: Kristallnacht prisoners arriving here in November 1938, thousands in days",t:"Part of the main memorial. Free.",c:["famous_dead"],r:"g",nn:"Baracken 38 und 39 — Sachsenhausen #68",ns:"Jüdische Häftlingsbaracken als Mahnmal erhalten — Überbelegung in nüchternem Detail dokumentiert",nst:"Diese rekonstruierten Baracken zeigen die tägliche Realität jüdischer Gefangener ab 1938.",nt:"Teil des Hauptmahnmals. Kostenlos."},
  {id:69,n:"Orangerie Ruins — Schloss #69",a:"Schloss",v:["abandoned","hidden","history"],d:18,s:"Ruined orangerie of the palace — a greenhouse for the princess\'s tropical plants, now open sky",st:"Louise Henriette had a large orangerie built to maintain Mediterranean plants through Brandenburg winters. It fell into disrepair in the 18th century. The shell remains.",im:"Time-travel: exotic citrus trees in pots being carried back inside for winter, 1670",t:"Behind the Schlosspark. Few visitors.",c:["street_art"],r:"g",nn:"Orangerie-Ruine — Schloss #69",ns:"Ruinierte Orangerie des Schlosses — ein Gewächshaus für tropische Pflanzen der Prinzessin, jetzt offen",nst:"Louise Henriette ließ eine große Orangerie bauen für mediterrane Pflanzen.",nt:"Hinter dem Schlosspark. Wenige Besucher."},
  {id:70,n:"Havel Beach — Havel #70",a:"Havel",v:["nature","local","free"],d:53,s:"Small sandy beach on the Havel — local families, swimmers, the simple pleasure of water",st:"A stretch of sand below the Schlosspark where locals swim in summer. Nothing commercial. Bring your own towel.",im:"Time-travel: children swimming in the Havel on summer holidays in 1950, East Germany",t:"Free. Best in July. Come early for space.",c:["abandoned"],r:"g",nn:"Havel-Badestrand — Havel #70",ns:"Kleiner Sandstrand an der Havel — Einheimische Familien, Schwimmer, das einfache Vergnügen des Wassers",nst:"Ein Sandstreifen unterhalb des Schlossparks, wo Einheimische im Sommer schwimmen.",nt:"Kostenlos. Besten im Juli. Früh kommen für Platz."},
  {id:71,n:"Old Oranienburg Station — Altstadt #71",a:"Altstadt",v:["history","local"],d:26,s:"The Wilhelmine era train station — the gateway that brought the camp prisoners here",st:"Built in 1893 in Prussian brick style. The same station that brought the first prisoners to Sachsenhausen in 1936. The building still functions. Look at it with this knowledge.",im:"Time-travel: the first train of prisoners arriving at this station in 1936, guards waiting",t:"Free to view exterior. The station café is a local institution.",c:["free_museum"],r:"g",nn:"Bahnhof Oranienburg — Altstadt #71",ns:"Der wilhelminische Bahnhof — das Eingangstor, das die Lagerhäftlinge hierher brachte",nst:"1893 im preußischen Backsteinbau gebaut. Derselbe Bahnhof, der 1936 die ersten Häftlinge nach Sachsenhausen brachte.",nt:"Außenbereich kostenlos. Das Bahnhofcafé ist eine lokale Institution."},
  {id:72,n:"Mühlenfließ Trail — Lehnitz #72",a:"Lehnitz",v:["nature","hidden","quiet"],d:11,s:"A small stream walk through mixed woodland north of the city — no markers, just birdsong",st:"The Mühlenfließ is a small tributary that runs through the forest north of Oranienburg. The path along it is unmarked. Kingfishers, grey herons, the occasional beaver dam.",im:"Time-travel: miller taking flour to Oranienburg along this stream path in 1800",t:"Follow the stream from Lehnitzstraße. No map needed.",c:["local_only"],r:"g",nn:"Mühlenfließ-Weg — Lehnitz #72",ns:"Ein kleiner Bachlauf durch Mischwald nördlich der Stadt — keine Markierungen, nur Vogelgesang",nst:"Das Mühlenfließ ist ein kleiner Zufluss, der durch den Wald nördlich von Oranienburg fließt.",nt:"Den Bach von der Lehnitzstraße aus folgen. Keine Karte nötig."},
  {id:73,n:"Prison Tower — Sachsenhausen #73",a:"Sachsenhausen",v:["history","weird"],d:10,s:"The infamous Tower A — the \"gate of paradise\" as guards ironically called it",st:"Tower A was the main entrance gate. The name \"gate of paradise\" was used with bitter irony by prisoners. The tower survives and is part of the memorial.",im:"Time-travel: a prisoner walking through this gate for the first time, not knowing they will never leave",t:"Part of the memorial. Free.",c:["architecture"],r:"g",nn:"Turm A — Sachsenhausen #73",ns:"Der berüchtigte Turm A — das von Wächtern ironisch genannte \'Paradiespforte\'",nst:"Turm A war das Haupteingangstor. Der Name \"Paradiespforte\" wurde von Häftlingen bitter-ironisch benutzt.",nt:"Teil des Mahnmals. Kostenlos."},
  {id:74,n:"Bernauer Straße Viewpoint — Altstadt #74",a:"Altstadt",v:["local","quiet"],d:29,s:"The main street of old Oranienburg — peeling stucco, GDR-era shopfronts, lived-in city",st:"Oranienburg\'s main commercial street has barely changed since reunification. The mix of 1950s GDR shopfronts and older Wilhelmine buildings makes it an unintentional open-air museum.",im:"Time-travel: this street in 1980 East Germany — Trabis, grey shopfronts, waiting queues",t:"Just walk it. Best on a weekday when real life happens.",c:["history_big"],r:"g",nn:"Bernauer Straße — Altstadt #74",ns:"Die Hauptstraße der alten Oranienburg — abblätternder Putz, DDR-Ladenfronten, gelebte Stadt",nst:"Oranienburg Haupteinkaufsstraße hat sich seit der Wiedervereinigung kaum verändert.",nt:"Einfach entlanggehen. Am besten werktags wenn das echte Leben passiert."},
  {id:75,n:"Havel Sunset Bench — Havel #75",a:"Havel",v:["beautiful","quiet","nature"],d:11,s:"The bench at the river bend where Oranienburg turns its back on history and faces the water",st:"There is a bend in the Havel south of the Schloss where the city disappears and there is only river, trees, and light. Locals know it. Tourists never find it.",im:"Time-travel: an Oranienburg resident sitting here every evening for 40 years, watching the water change",t:"Walk south from the Schloss. Past the marina. Find the bend.",c:["high_spots"],r:"g",nn:"Havel-Sonnenuntergangsbank — Havel #75",ns:"Die Bank an der Flussbiegung, wo Oranienburg der Geschichte den Rücken kehrt und zum Wasser schaut",nst:"Eine Biegung in der Havel südlich des Schlosses, wo die Stadt verschwindet.",nt:"Vom Schloss nach Süden laufen. Am Yachthafen vorbei. Die Biegung finden."},
  {id:76,n:"Sachsenhausen Memorial — Sachsenhausen #76",a:"Sachsenhausen",v:["history","quiet"],d:27,s:"Nazi concentration camp memorial site — free, essential, unforgettable",st:"From 1936 to 1945, over 200,000 people were imprisoned here. The site is now a national memorial. Walking the grounds takes 2–3 hours. This is the kind of history that must be confronted.",im:"Time-travel: 1945 — Soviet forces finding survivors barely alive among thousands of dead",t:"Free entry. Audio guides available. Allow 2-3 hours minimum.",c:["parks"],r:"g",nn:"Gedenkstätte Sachsenhausen — Sachsenhausen #76",ns:"NS-Konzentrationslager Gedenkstätte — kostenlos, unverzichtbar, unvergesslich",nst:"Von 1936 bis 1945 wurden hier über 200.000 Menschen inhaftiert. Die Stätte ist jetzt nationales Mahnmal.",nt:"Freier Eintritt. Audioguides verfügbar. Mindestens 2-3 Stunden einplanen."},
  {id:77,n:"Appellplatz — Sachsenhausen #77",a:"Sachsenhausen",v:["history","quiet"],d:27,s:"The roll call square where prisoners stood for hours in all weather — vast and terrible",st:"Prisoners were assembled here twice daily — morning and evening — sometimes for hours in freezing cold as a form of punishment. The square is still its original size.",im:"Time-travel: 1941 winter — prisoners standing for three hours in subzero temperatures at dawn",t:"Stand in the centre. The scale of what happened here becomes real.",c:["courtyards"],r:"g",nn:"Appellplatz — Sachsenhausen #77",ns:"Der Appell-Platz, wo Gefangene stundenlang bei jedem Wetter standen — riesig und schrecklich",nst:"Gefangene wurden zweimal täglich versammelt — manchmal stundenlang als Strafe.",nt:"In der Mitte stehen. Das Ausmaß des Geschehens wird real."},
  {id:78,n:"Station Z Memorial — Sachsenhausen #78",a:"Sachsenhausen",v:["history","quiet"],d:43,s:"The camp\'s extermination site — the end of the one-way track through the camp",st:"Station Z was the killing centre of Sachsenhausen — gas chamber, crematorium, execution trench. What remains is preserved exactly as it was found. A place of absolute silence.",im:"Time-travel: Soviet troops discovering Station Z in April 1945 — smoke still rising",t:"This section requires composure. Take your time.",c:["romantic_water"],r:"g",nn:"Station Z — Sachsenhausen #78",ns:"Die Vernichtungsanlage des Lagers — das Ende der Einbahnstraße durch das Lager",nst:"Station Z war das Tötungszentrum Sachsenhausens. Was bleibt, ist genau so erhalten wie gefunden.",nt:"Dieser Abschnitt erfordert Fassung. Zeit nehmen."},
  {id:79,n:"Soviet Special Camp Memorial — Sachsenhausen #79",a:"Sachsenhausen",v:["history","hidden","quiet"],d:21,s:"After the Nazis, the Soviets used the same camp from 1945–1950 — 12,000 died here too",st:"The Soviets converted Sachsenhausen into NKVD Special Camp Nr. 7 immediately after liberation. 60,000 Germans were interned here, many innocent. 12,000 died. This chapter is less known.",im:"Time-travel: German civilians arriving as Soviet prisoners to the same camp just liberated, 1945",t:"The mass graves are in the north of the memorial site. Free.",c:["scary"],r:"g",nn:"Sowjetisches Sonderlager — Sachsenhausen #79",ns:"Nach den Nazis nutzten die Sowjets dasselbe Lager von 1945–1950 — 12.000 starben auch hier",nst:"Die Sowjets wandelten Sachsenhausen sofort nach der Befreiung in NKWD-Sonderlager Nr. 7 um.",nt:"Die Massengräber liegen im Norden des Gedenkstättengeländes. Kostenlos."},

  {id:85,n:"Lehnitz Lake — Lehnitz #85",a:"Lehnitz",v:["nature","quiet","free"],d:29,s:"Wild glacial lake in the pine forests north of Oranienburg — completely undeveloped",st:"Lehnitz lake sits in an old military exclusion zone that protected it from development for decades. The water is clean and cold. A single sandy path rings it through the pines.",im:"Time-travel: 1980 — East German border guards swimming here on their days off, the lake unchanged",t:"Walk or cycle 15 minutes from the Altstadt. Always free. Swim in summer.",c:["architecture"],r:"g",nn:"Lehnitzer See — Lehnitz #85",ns:"Wilder Gletschersee in den Kiefernwäldern nördlich von Oranienburg — vollkommen unerschlossen",nst:"Der Lehnitzer See liegt in einer alten Militärsperrzone, die ihn jahrzehntelang vor Bebauung schützte.",nt:"15 Minuten zu Fuß oder Rad aus der Altstadt. Immer kostenlos. Im Sommer schwimmen."},
  {id:86,n:"Lehnitz Forest — Lehnitz #86",a:"Lehnitz",v:["nature","quiet","hidden"],d:10,s:"Ancient pine and heather landscape north of the city — no trails, no guides, just forest",st:"The Lehnitz forest is part of the old hunting grounds of the Hohenzollern dynasty. The heather blooms purple in August. The forest floor is entirely soft.",im:"Time-travel: Hohenzollern hunting parties crashing through these pines, 1750",t:"August for the heather bloom. No trails — use a compass.",c:["history_big"],r:"g",nn:"Lehnitzer Wald — Lehnitz #86",ns:"Uralte Kiefern- und Heidelandschaft nördlich der Stadt — keine Wege, keine Guides, nur Wald",nst:"Der Lehnitzer Wald ist Teil der alten Jagdgründe der Hohenzollern. Die Heide blüht lila im August.",nt:"August für die Heidelblüte. Keine Wege — Kompass benutzen."},
  {id:87,n:"Old Town Market Square — Altstadt #87",a:"Altstadt",v:["local","history"],d:40,s:"The small market square of Oranienburg — weekly market, local cafés, no tourists",st:"Oranienburg\'s market day is Saturday. Farmers come from the surrounding villages. The square is the real civic heart — not the palace or the memorial, but here.",im:"Time-travel: the weekly market in 1910 — stalls selling vegetables and live chickens",t:"Saturday market from 8am. Come for the farmers cheese and vegetables.",c:["high_spots"],r:"g",nn:"Marktplatz — Altstadt #87",ns:"Der kleine Marktplatz von Oranienburg — Wochenmarkt, lokale Cafés, keine Touristen",nst:"Oranienburg hat seinen Markttag samstags. Bauern aus den umliegenden Dörfern kommen.",nt:"Samstagmarkt ab 8 Uhr. Für Käse und Gemüse der Bauern kommen."},
  {id:88,n:"Heinkel Memorial Plaque — Altstadt #88",a:"Altstadt",v:["history","hidden"],d:23,s:"Where slave laborers built Heinkel aircraft for the Nazi war effort — a plaque is all that remains",st:"The Heinkel aircraft factory in Oranienburg used Sachsenhausen concentration camp prisoners as slave labor. 10,000 prisoners worked here building bombers. A memorial plaque marks the site.",im:"Time-travel: camp prisoners marching from Sachsenhausen to the factory gates at 5am, 1943",t:"The plaque is at the old factory site. Few visitors.",c:["parks"],r:"g",nn:"Heinkel-Gedenkplakette — Altstadt #88",ns:"Wo Zwangsarbeiter Heinkel-Flugzeuge für die NS-Kriegsmaschinerie bauten — nur eine Plakette blieb",nst:"Die Heinkel-Fabrik nutzte Sachsenhausener KZ-Häftlinge als Zwangsarbeiter.",nt:"Die Plakette befindet sich am alten Fabrikgelände. Wenige Besucher."},
  {id:89,n:"Edelhofgraben Walk — Schloss #89",a:"Schloss",v:["nature","hidden","quiet"],d:45,s:"The old moat of the palace turned into a green walk — ducks, frogs, forgotten history",st:"The Edelhofgraben was the original moat of the Schloss. Filled in and planted as a linear park. The water still runs in sections. Best in spring when the frogs are deafening.",im:"Time-travel: the full moat surrounding the Schloss in 1700, boats crossing to the gate",t:"Walk it from the south. Mostly locals with prams.",c:["courtyards"],r:"g",nn:"Edelhofgraben — Schloss #89",ns:"Der alte Schlossgraben als Grünweg — Enten, Frösche, vergessene Geschichte",nst:"Der Edelhofgraben war der ursprüngliche Schlossgraben. Zugeschüttet und als Linearpark bepflanzt.",nt:"Von Süden abgehen. Meist Einheimische mit Kinderwagen."},
  {id:90,n:"Havel Boat Watch — Havel #90",a:"Havel",v:["local","nature","quiet"],d:44,s:"The best spot to watch river traffic on the Havel — old barges, kayaks, rowing clubs",st:"The Havel is a major waterway. From the riverside benches, watch the mixture of cargo barges, sailing boats, kayakers, and the occasional paddle steamer. Unhurried and real.",im:"Time-travel: a steam paddle boat making a grand arrival at Oranienburg, 1920",t:"The benches by the old harbor are free. Best on weekend afternoons.",c:["romantic_water"],r:"g",nn:"Havel Schiffsbeobachtung — Havel #90",ns:"Der beste Platz zum Beobachten des Schiffsverkehrs auf der Havel — alte Kähne, Kajaks, Ruderclubs",nst:"Die Havel ist ein wichtiger Wasserweg. Von den Uferbänken den Mix aus Frachtkähnen und Segelbooten beobachten.",nt:"Die Bänke am alten Hafen sind kostenlos. Besten Wochenendnachmittage."},
  {id:91,n:"Cemetery of Nations — Sachsenhausen #91",a:"Sachsenhausen",v:["history","quiet"],d:28,s:"Mass graves of Sachsenhausen victims — prisoners from 22 nations buried here",st:"After liberation, Allied forces buried thousands of victims from across occupied Europe in these grounds. Prisoners from Poland, France, the Netherlands, Soviet Union, and more. Free, silent, humbling.",im:"Time-travel: 1945 — survivors identifying the nationalities of the dead for burial records",t:"The cemetery is in the memorial grounds. Free.",c:["scary"],r:"g",nn:"Völkerfriedhof — Sachsenhausen #91",ns:"Massengräber der Sachsenhausen-Opfer — Häftlinge aus 22 Nationen hier begraben",nst:"Nach der Befreiung bestatteten alliierte Kräfte Tausende Opfer aus dem besetzten Europa.",nt:"Der Friedhof liegt auf dem Gedenkstättengelände. Kostenlos."},
  {id:92,n:"Watchtower B (Restored) — Sachsenhausen #92",a:"Sachsenhausen",v:["history","hidden"],d:41,s:"A reconstructed guard tower with original views across the triangular camp",st:"The restored watchtower gives a guard\'s-eye view of the entire triangular camp layout. The geometry of control is immediately visible from above.",im:"Time-travel: an SS guard watching prisoners from this tower in 1940, rifle across his knees",t:"Accessible within the memorial grounds. Free.",c:["famous_dead"],r:"g",nn:"Wachturm B — Sachsenhausen #92",ns:"Ein rekonstruierter Wachturm mit Originalblick über das dreieckige Lager",nst:"Der rekonstruierte Turm gibt die Sicht des Wächters auf das gesamte dreieckige Lager.",nt:"Im Gedenkstättengelände zugänglich. Kostenlos."},
  {id:93,n:"Barracks 38 and 39 — Sachsenhausen #93",a:"Sachsenhausen",v:["history","quiet"],d:17,s:"Jewish prisoner barracks preserved as a memorial — overcrowding documented in stark detail",st:"These reconstructed barracks show the daily reality of Jewish prisoners from 1938 onwards — the overcrowding, the prohibition on sunlight, the dehumanising organisation.",im:"Time-travel: Kristallnacht prisoners arriving here in November 1938, thousands in days",t:"Part of the main memorial. Free.",c:["street_art"],r:"g",nn:"Baracken 38 und 39 — Sachsenhausen #93",ns:"Jüdische Häftlingsbaracken als Mahnmal erhalten — Überbelegung in nüchternem Detail dokumentiert",nst:"Diese rekonstruierten Baracken zeigen die tägliche Realität jüdischer Gefangener ab 1938.",nt:"Teil des Hauptmahnmals. Kostenlos."},
  {id:94,n:"Orangerie Ruins — Schloss #94",a:"Schloss",v:["abandoned","hidden","history"],d:50,s:"Ruined orangerie of the palace — a greenhouse for the princess\'s tropical plants, now open sky",st:"Louise Henriette had a large orangerie built to maintain Mediterranean plants through Brandenburg winters. It fell into disrepair in the 18th century. The shell remains.",im:"Time-travel: exotic citrus trees in pots being carried back inside for winter, 1670",t:"Behind the Schlosspark. Few visitors.",c:["abandoned"],r:"g",nn:"Orangerie-Ruine — Schloss #94",ns:"Ruinierte Orangerie des Schlosses — ein Gewächshaus für tropische Pflanzen der Prinzessin, jetzt offen",nst:"Louise Henriette ließ eine große Orangerie bauen für mediterrane Pflanzen.",nt:"Hinter dem Schlosspark. Wenige Besucher."},
  {id:95,n:"Havel Beach — Havel #95",a:"Havel",v:["nature","local","free"],d:9,s:"Small sandy beach on the Havel — local families, swimmers, the simple pleasure of water",st:"A stretch of sand below the Schlosspark where locals swim in summer. Nothing commercial. Bring your own towel.",im:"Time-travel: children swimming in the Havel on summer holidays in 1950, East Germany",t:"Free. Best in July. Come early for space.",c:["free_museum"],r:"g",nn:"Havel-Badestrand — Havel #95",ns:"Kleiner Sandstrand an der Havel — Einheimische Familien, Schwimmer, das einfache Vergnügen des Wassers",nst:"Ein Sandstreifen unterhalb des Schlossparks, wo Einheimische im Sommer schwimmen.",nt:"Kostenlos. Besten im Juli. Früh kommen für Platz."},
  {id:96,n:"Old Oranienburg Station — Altstadt #96",a:"Altstadt",v:["history","local"],d:7,s:"The Wilhelmine era train station — the gateway that brought the camp prisoners here",st:"Built in 1893 in Prussian brick style. The same station that brought the first prisoners to Sachsenhausen in 1936. The building still functions. Look at it with this knowledge.",im:"Time-travel: the first train of prisoners arriving at this station in 1936, guards waiting",t:"Free to view exterior. The station café is a local institution.",c:["local_only"],r:"g",nn:"Bahnhof Oranienburg — Altstadt #96",ns:"Der wilhelminische Bahnhof — das Eingangstor, das die Lagerhäftlinge hierher brachte",nst:"1893 im preußischen Backsteinbau gebaut. Derselbe Bahnhof, der 1936 die ersten Häftlinge nach Sachsenhausen brachte.",nt:"Außenbereich kostenlos. Das Bahnhofcafé ist eine lokale Institution."},
  {id:97,n:"Mühlenfließ Trail — Lehnitz #97",a:"Lehnitz",v:["nature","hidden","quiet"],d:47,s:"A small stream walk through mixed woodland north of the city — no markers, just birdsong",st:"The Mühlenfließ is a small tributary that runs through the forest north of Oranienburg. The path along it is unmarked. Kingfishers, grey herons, the occasional beaver dam.",im:"Time-travel: miller taking flour to Oranienburg along this stream path in 1800",t:"Follow the stream from Lehnitzstraße. No map needed.",c:["architecture"],r:"g",nn:"Mühlenfließ-Weg — Lehnitz #97",ns:"Ein kleiner Bachlauf durch Mischwald nördlich der Stadt — keine Markierungen, nur Vogelgesang",nst:"Das Mühlenfließ ist ein kleiner Zufluss, der durch den Wald nördlich von Oranienburg fließt.",nt:"Den Bach von der Lehnitzstraße aus folgen. Keine Karte nötig."},
  {id:98,n:"Prison Tower — Sachsenhausen #98",a:"Sachsenhausen",v:["history","weird"],d:19,s:"The infamous Tower A — the \"gate of paradise\" as guards ironically called it",st:"Tower A was the main entrance gate. The name \"gate of paradise\" was used with bitter irony by prisoners. The tower survives and is part of the memorial.",im:"Time-travel: a prisoner walking through this gate for the first time, not knowing they will never leave",t:"Part of the memorial. Free.",c:["history_big"],r:"g",nn:"Turm A — Sachsenhausen #98",ns:"Der berüchtigte Turm A — das von Wächtern ironisch genannte \'Paradiespforte\'",nst:"Turm A war das Haupteingangstor. Der Name \"Paradiespforte\" wurde von Häftlingen bitter-ironisch benutzt.",nt:"Teil des Mahnmals. Kostenlos."},
  {id:99,n:"Bernauer Straße Viewpoint — Altstadt #99",a:"Altstadt",v:["local","quiet"],d:54,s:"The main street of old Oranienburg — peeling stucco, GDR-era shopfronts, lived-in city",st:"Oranienburg\'s main commercial street has barely changed since reunification. The mix of 1950s GDR shopfronts and older Wilhelmine buildings makes it an unintentional open-air museum.",im:"Time-travel: this street in 1980 East Germany — Trabis, grey shopfronts, waiting queues",t:"Just walk it. Best on a weekday when real life happens.",c:["high_spots"],r:"g",nn:"Bernauer Straße — Altstadt #99",ns:"Die Hauptstraße der alten Oranienburg — abblätternder Putz, DDR-Ladenfronten, gelebte Stadt",nst:"Oranienburg Haupteinkaufsstraße hat sich seit der Wiedervereinigung kaum verändert.",nt:"Einfach entlanggehen. Am besten werktags wenn das echte Leben passiert."},
  {id:100,n:"Havel Sunset Bench — Havel #100",a:"Havel",v:["beautiful","quiet","nature"],d:23,s:"The bench at the river bend where Oranienburg turns its back on history and faces the water",st:"There is a bend in the Havel south of the Schloss where the city disappears and there is only river, trees, and light. Locals know it. Tourists never find it.",im:"Time-travel: an Oranienburg resident sitting here every evening for 40 years, watching the water change",t:"Walk south from the Schloss. Past the marina. Find the bend.",c:["parks"],r:"g",nn:"Havel-Sonnenuntergangsbank — Havel #100",ns:"Die Bank an der Flussbiegung, wo Oranienburg der Geschichte den Rücken kehrt und zum Wasser schaut",nst:"Eine Biegung in der Havel südlich des Schlosses, wo die Stadt verschwindet.",nt:"Vom Schloss nach Süden laufen. Am Yachthafen vorbei. Die Biegung finden."},
  {id:101,n:"Sachsenhausen Memorial — Sachsenhausen #101",a:"Sachsenhausen",v:["history","quiet"],d:10,s:"Nazi concentration camp memorial site — free, essential, unforgettable",st:"From 1936 to 1945, over 200,000 people were imprisoned here. The site is now a national memorial. Walking the grounds takes 2–3 hours. This is the kind of history that must be confronted.",im:"Time-travel: 1945 — Soviet forces finding survivors barely alive among thousands of dead",t:"Free entry. Audio guides available. Allow 2-3 hours minimum.",c:["courtyards"],r:"g",nn:"Gedenkstätte Sachsenhausen — Sachsenhausen #101",ns:"NS-Konzentrationslager Gedenkstätte — kostenlos, unverzichtbar, unvergesslich",nst:"Von 1936 bis 1945 wurden hier über 200.000 Menschen inhaftiert. Die Stätte ist jetzt nationales Mahnmal.",nt:"Freier Eintritt. Audioguides verfügbar. Mindestens 2-3 Stunden einplanen."},
  {id:102,n:"Appellplatz — Sachsenhausen #102",a:"Sachsenhausen",v:["history","quiet"],d:19,s:"The roll call square where prisoners stood for hours in all weather — vast and terrible",st:"Prisoners were assembled here twice daily — morning and evening — sometimes for hours in freezing cold as a form of punishment. The square is still its original size.",im:"Time-travel: 1941 winter — prisoners standing for three hours in subzero temperatures at dawn",t:"Stand in the centre. The scale of what happened here becomes real.",c:["romantic_water"],r:"g",nn:"Appellplatz — Sachsenhausen #102",ns:"Der Appell-Platz, wo Gefangene stundenlang bei jedem Wetter standen — riesig und schrecklich",nst:"Gefangene wurden zweimal täglich versammelt — manchmal stundenlang als Strafe.",nt:"In der Mitte stehen. Das Ausmaß des Geschehens wird real."},
  {id:103,n:"Station Z Memorial — Sachsenhausen #103",a:"Sachsenhausen",v:["history","quiet"],d:11,s:"The camp\'s extermination site — the end of the one-way track through the camp",st:"Station Z was the killing centre of Sachsenhausen — gas chamber, crematorium, execution trench. What remains is preserved exactly as it was found. A place of absolute silence.",im:"Time-travel: Soviet troops discovering Station Z in April 1945 — smoke still rising",t:"This section requires composure. Take your time.",c:["scary"],r:"g",nn:"Station Z — Sachsenhausen #103",ns:"Die Vernichtungsanlage des Lagers — das Ende der Einbahnstraße durch das Lager",nst:"Station Z war das Tötungszentrum Sachsenhausens. Was bleibt, ist genau so erhalten wie gefunden.",nt:"Dieser Abschnitt erfordert Fassung. Zeit nehmen."},
  {id:104,n:"Soviet Special Camp Memorial — Sachsenhausen #104",a:"Sachsenhausen",v:["history","hidden","quiet"],d:29,s:"After the Nazis, the Soviets used the same camp from 1945–1950 — 12,000 died here too",st:"The Soviets converted Sachsenhausen into NKVD Special Camp Nr. 7 immediately after liberation. 60,000 Germans were interned here, many innocent. 12,000 died. This chapter is less known.",im:"Time-travel: German civilians arriving as Soviet prisoners to the same camp just liberated, 1945",t:"The mass graves are in the north of the memorial site. Free.",c:["famous_dead"],r:"g",nn:"Sowjetisches Sonderlager — Sachsenhausen #104",ns:"Nach den Nazis nutzten die Sowjets dasselbe Lager von 1945–1950 — 12.000 starben auch hier",nst:"Die Sowjets wandelten Sachsenhausen sofort nach der Befreiung in NKWD-Sonderlager Nr. 7 um.",nt:"Die Massengräber liegen im Norden des Gedenkstättengeländes. Kostenlos."},
  {id:105,n:"Schloss Oranienburg — Schloss #105",a:"Schloss",v:["history","beautiful"],d:22,s:"The first Baroque palace in Brandenburg — built 1651 for the Great Elector\'s wife Louise Henriette",st:"Princess Louise Henriette of Orange funded and named this palace and the city around it. It is the oldest Baroque palace in Brandenburg. The exterior is free to admire.",im:"Time-travel: Louise Henriette supervising construction of her Dutch-influenced palace, 1655",t:"Exterior free. Museum inside has a small charge.",c:["street_art"],r:"g",nn:"Schloss Oranienburg — Schloss #105",ns:"Das erste Barockschloss in Brandenburg — 1651 für die Frau des Großen Kurfürsten Louise Henriette erbaut",nst:"Prinzessin Louise Henriette von Oranien finanzierte dieses Schloss und die Stadt drum herum.",nt:"Außenbereich kostenlos. Museum innen hat kleinen Eintritt."}

{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Oranienburg Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
