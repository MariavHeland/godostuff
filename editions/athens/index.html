const P = [
  {id:1,n:"Anafiotika Village Within City",a:"Anafiotika",v:["hidden", "beautiful", "history"],d:1,s:"A Cycladic village transplanted into the Acropolis shadow—white-washed houses built by island workers",st:"1920s: Island laborers came to Athens. Built homes like the ones they left behind. White stone. Blue doors. Now it\'s a village in the city. Unchanged.",im:"It\'s 1920. A man builds his house the way his father taught him. Athens is foreign. This house is Anafi. Walking these streets he\'s home.",t:"1920s: Island laborers came to Athens. Built homes like the ones they left behind. White stone. Blue doors. Now it\'s a village in the city. Unchanged.\",im:\"It\'s 1920. A man builds his house the way his father taught him. Athens is foreign. This house is Anafi. Walking these streets he\'s home.\",t:\"Anafiotika, near Plaka/Acropolis. Walk narrow streets. Free entry. Residents live here. Respectful silence required. Morning best (evening tourists pack it). Map helpful for maze.",c:["hidden", "beautiful", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:2,n:"Exarchia Street Art and Anarchist Quarter",a:"Exarchia",v:["street_art", "weird", "local"],d:2,s:"Walls painted with political fury—Athens\' anarchist neighborhood where art is resistance",st:"Exarchia resists. Government, tourism, gentrification. Walls speak. Murals change nightly. Police and protesters dance here. It\'s raw. It\'s real. It\'s dangerous energy.",im:"It\'s 3am. A young woman spray-paints a face. It\'s political. It\'s personal. She won\'t sign it. By morning someone will paint over it. The cycle continues.",t:"Exarchia resists. Government, tourism, gentrification. Walls speak. Murals change nightly. Police and protesters dance here. It\'s raw. It\'s real. It\'s dangerous energy.\",im:\"It\'s 3am. A young woman spray-paints a face. It\'s political. It\'s personal. She won\'t sign it. By morning someone will paint over it. The cycle continues.\",t:\"Exarchia neighborhood (Solonos & Stournari area). Walk carefully. Daytime safer. Photography discreet (some walls off-limits). Avoid evenings. Street art constantly changes. Respect residents\' struggle.",c:["street_art", "weird", "local_only"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:3,n:"Psyrri Neighborhood Awakening",a:"Psyrri",v:["street_art", "local", "beautiful"],d:3,s:"Where Athens\' creative class moved when Plaka got expensive—galleries and studios in run-down buildings",st:"Warehouses became galleries. Factories became studios. Artists priced out moved here. Now it\'s happening again—gentrification following artists. Watch the pattern unfold.",im:"It\'s 2005. An artist rents a warehouse for €200/month. \'I\'ll paint.\' Now the space is worth €2000. She\'s moving to the next neighborhood.",t:"Warehouses became galleries. Factories became studios. Artists priced out moved here. Now it\'s happening again—gentrification following artists. Watch the pattern unfold.\",im:\"It\'s 2005. An artist rents a warehouse for €200/month. \'I\'ll paint.\' Now the space is worth €2000. She\'s moving to the next neighborhood.\",t:\"Psyrri neighborhood (Iroon Polytexneiou area). Free walking. Gallery openings weekends. Cafés cheap. Street art everywhere. Walking/photography free. Less touristy than Plaka.",c:["street_art", "local_only", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:4,n:"Filopappou Hill Free Ancient Views",a:"Filopappou",v:["history", "beautiful", "free"],d:4,s:"Climb a hill with ruins and watch the Acropolis from the side nobody sees",st:"Walk uphill through wildflowers. Ancient stones mark the way. At top: Acropolis at eye level. Lycabettus Hill beyond. It costs nothing. Most tourists pay€30 for the same view.",im:"It\'s dawn. A woman climbs through ruins. At summit, the Acropolis turns gold. She\'s alone. She has the view for herself.",t:"Walk uphill through wildflowers. Ancient stones mark the way. At top: Acropolis at eye level. Lycabettus Hill beyond. It costs nothing. Most tourists pay€30 for the same view.\",im:\"It\'s dawn. A woman climbs through ruins. At summit, the Acropolis turns gold. She\'s alone. She has the view for herself.\",t:\"Filopappou Hill entrance (near Thissio). Free entry. Paths clearly marked. 45 minutes to top. Bring water. Snakes possible (but rare). Best early morning or dusk.",c:["history_big", "beautiful", "free_museum"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:5,n:"Agora Ancient Market Ruins Free Section",a:"Plaka",v:["history", "free"],d:5,s:"Where Socrates taught and argued—ancient agora sits partially free to view from edges",st:"The Agora was Athens\' heart. Market. Democracy. Philosophy. Excavated remains. Walk edges free. Museum costs. But the ground itself tells the story.",im:"It\'s 400 BC. Socrates argues with young men in the agora. They pay no money. The act of thinking is payment enough.",t:"The Agora was Athens\' heart. Market. Democracy. Philosophy. Excavated remains. Walk edges free. Museum costs. But the ground itself tells the story.\",im:\"It\'s 400 BC. Socrates argues with young men in the agora. They pay no money. The act of thinking is payment enough.\",t:\"Ancient Agora, near Thissio. Edges free to view. Museum entrance €10. Walk perimeter free. Stoa of Attalus visible from outside. Early morning quietest.",c:["history_big", "free_museum"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:6,n:"Plaka Hidden Squares and Restaurants",a:"Plaka",v:["hidden", "beautiful", "quiet"],d:6,s:"Behind every corner sits a tiny plaza with a grandmother cooking in a family restaurant",st:"Plaka is touristy. But if you walk small streets you find squares tourists miss. Family restaurants. 40-year-old secrets. Grandmothers who remember regulars.",im:"It\'s 1980. A woman learns to cook from her mother in a tiny restaurant. Now tourists come. She cooks the same way she always has.",t:"Plaka is touristy. But if you walk small streets you find squares tourists miss. Family restaurants. 40-year-old secrets. Grandmothers who remember regulars.\",im:\"It\'s 1980. A woman learns to cook from her mother in a tiny restaurant. Now tourists come. She cooks the same way she always has.\",t:\"Plaka neighborhood (various plazas: Monastiraki, Anafiotika corners). Walk off main streets. Photography free. Restaurants cheap (€8-15 mains). Avoid main drag.",c:["hidden", "beautiful", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:7,n:"Monastiraki Flea Market Sunday Morning",a:"Monastiraki",v:["local", "weird", "free"],d:7,s:"Sundays—vendors spread possessions on streets—you\'re buying someone\'s grandmother\'s life",st:"Sunday morning the market explodes. Everything. Ancient coins (fake). Furniture (broken). Clothes (worn). It\'s chaos. It\'s raw. It\'s where history happens casually.",im:"It\'s 8am Sunday. A vendor arranges plates inherited from her mother. They don\'t fit in her apartment. Someone else wants them. Money changes hands.",t:"Sunday morning the market explodes. Everything. Ancient coins (fake). Furniture (broken). Clothes (worn). It\'s chaos. It\'s raw. It\'s where history happens casually.\",im:\"It\'s 8am Sunday. A vendor arranges plates inherited from her mother. They don\'t fit in her apartment. Someone else wants them. Money changes hands.\",t:\"Monastiraki area, Psyrri border. Market runs Sunday 7am-2pm. Bargaining required. Cash only. Photography free but discreet with vendors. Best 8-10am.",c:["local_only", "weird", "free_museum"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:8,n:"Kerameikos Ancient Cemetery Quiet",a:"Kerameikos",v:["history", "quiet", "beautiful"],d:8,s:"2,400-year-old cemetery where ancient Athenians are buried—walk among them and feel mortality",st:"Graves remain. Epitaphs carved in stone. Families mourned here 2,400 years ago. Same words: love, loss, time. Nothing changes. Time changes everything.",im:"It\'s 400 BC. A widow places flowers on her husband\'s grave. 2,400 years later a visitor does the same gesture. The sorrow is identical.",t:"Graves remain. Epitaphs carved in stone. Families mourned here 2,400 years ago. Same words: love, loss, time. Nothing changes. Time changes everything.\",im:\"It\'s 400 BC. A widow places flowers on her husband\'s grave. 2,400 years later a visitor does the same gesture. The sorrow is identical.\",t:\"Kerameikos Archaeological Museum area. Entry €8. Walk grounds. Stones readable. Museum explains context. Hours 8am-8pm. Morning best for light and quiet.",c:["history_big", "quiet", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:9,n:"Byzantine Church Interiors",a:"Plaka",v:["history", "quiet", "beautiful"],d:9,s:"Dark rooms lit by candles where thousand-year-old prayers still echo",st:"Walk into a Byzantine church and step 1,000 years into darkness. Icons. Incense. Whispered prayers. Time stops. You\'re in ancient Athens and modern faith simultaneously.",im:"It\'s 900 AD. A woman prays. Now it\'s today. A different woman prays in the same space. The prayer is unchanged. The church remembers.",t:"Walk into a Byzantine church and step 1,000 years into darkness. Icons. Incense. Whispered prayers. Time stops. You\'re in ancient Athens and modern faith simultaneously.\",im:\"It\'s 900 AD. A woman prays. Now it\'s today. A different woman prays in the same space. The prayer is unchanged. The church remembers.\",t:\"Various churches (Agia Panagia, Transfiguration Church, Kapnikarea). Free entry. Respectful dress required. Photography often forbidden. Quiet hours observed. Morning or evening best.",c:["history_big", "quiet", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:10,n:"Koukaki Neighborhood Discovery",a:"Koukaki",v:["local", "beautiful", "hidden"],d:10,s:"The neighborhood that\'s becoming the new Plaka—old houses, young energy, authentic still",st:"Gentrification hasn\'t fully arrived. Families still live here. New galleries open. Old shops close slowly. Walk now before it changes. Capture it as it transforms.",im:"It\'s 2015. An artist rents an apartment in Koukaki. €300/month. Now it\'s €800. She can\'t afford it anymore. Change comes fast.",t:"Gentrification hasn\'t fully arrived. Families still live here. New galleries open. Old shops close slowly. Walk now before it changes. Capture it as it transforms.\",im:\"It\'s 2015. An artist rents an apartment in Koukaki. €300/month. Now it\'s €800. She can\'t afford it anymore. Change comes fast.\",t:\"Koukaki neighborhood (around Veikou & Monastiraki border). Walk freely. Small cafés, bookstores, galleries. Quieter than Plaka. Photography free. Mixed locals and tourists.",c:["local_only", "beautiful", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:11,n:"Thissio Riverside Walk",a:"Thissio",v:["beautiful", "quiet", "free"],d:11,s:"Along an ancient river valley, where temples watched water flow and still do",st:"Walk beside the Eridanos. Ancient Athenians watched this same river. It\'s not the same water. It\'s the same flow. The geometry of Athens is water and stone.",im:"It\'s 300 BC. A philosopher walks beside the water. Thoughts flow like the river. Now it\'s you. Same river. Same thinking happens.",t:"Walk beside the Eridanos. Ancient Athenians watched this same river. It\'s not the same water. It\'s the same flow. The geometry of Athens is water and stone.\",im:\"It\'s 300 BC. A philosopher walks beside the water. Thoughts flow like the river. Now it\'s you. Same river. Same thinking happens.\",t:\"Thissio area, riverside walks. Free entry. Early morning best. Quiet spots north of Temple of Hephaestus. Photography free. Bring water. Shaded areas limited.",c:["beautiful", "quiet", "free_museum"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:12,n:"Byzantine and Christian Museum Secret Wing",a:"Vassilissis Sofias",v:["history", "hidden", "quiet"],d:12,s:"Byzantine art that moved from private palaces to public display—wealth in churches turned museums",st:"Icons. Mosaics. Objects used in worship. Museum has them arranged chronologically. Walk and watch faith become art. Art become faith. The boundary blurs.",im:"It\'s 1100 AD. A bishop commissions an icon. It costs a fortune. 900 years later it\'s in a museum under lights. The face still prays.",t:"Icons. Mosaics. Objects used in worship. Museum has them arranged chronologically. Walk and watch faith become art. Art become faith. The boundary blurs.\",im:\"It\'s 1100 AD. A bishop commissions an icon. It costs a fortune. 900 years later it\'s in a museum under lights. The face still prays.\",t:\"Byzantine and Christian Museum, 22 Vassilissis Sofias Avenue. Entry €8. Hours 10am-6pm (closed Mondays). Rarely crowded. Small galleries intimate. Photography forbidden.",c:["history_big", "hidden", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:13,n:"Acropolis Museum Basement Ancient Layers",a:"Acropolis",v:["history", "hidden"],d:13,s:"Below the museum glass floor—the dig site itself where archaeologists still excavate",st:"Modern museum built above ancient city. Glass floor shows excavations. You see diggers\' work. Stone-by-stone uncovering of what was. History being discovered in real time.",im:"It\'s 2000 years ago. A city thrives. It dies. Stone remains. 2000 years later people dig. The city speaks again through fragments.",t:"Modern museum built above ancient city. Glass floor shows excavations. You see diggers\' work. Stone-by-stone uncovering of what was. History being discovered in real time.\",im:\"It\'s 2000 years ago. A city thrives. It dies. Stone remains. 2000 years later people dig. The city speaks again through fragments.\",t:\"Acropolis Museum, 15 Dionysiou Areopagitou Street. Entry €15. Hours 9am-8pm (varies). Glass floor section free to view from ground level.",c:["history_big", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:14,n:"Pangrati Neighborhood Locals Only",a:"Pangrati",v:["local", "free", "beautiful"],d:14,s:"Where actual Athenians live—small bars, family shops, nobody\'s performing for tourists",st:"Pangrati hasn\'t changed. Families run the same shops their parents ran. Restaurants serve the same food to the same people. It\'s Athens being normal.",im:"It\'s 1990. A man enters his neighborhood café. Thirty years later he enters the same café. The owner changed. The coffee didn\'t. The routine did.",t:"Pangrati hasn\'t changed. Families run the same shops their parents ran. Restaurants serve the same food to the same people. It\'s Athens being normal.\",im:\"It\'s 1990. A man enters his neighborhood café. Thirty years later he enters the same café. The owner changed. The coffee didn\'t. The routine did.\",t:\"Pangrati area (Varnakova & surrounding streets). Walk freely. Cafés extremely cheap (€1-2). Photography free. Morning quiet, evening social. No tourist English spoken often.",c:["local_only", "free_museum", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:15,n:"Metaxourgeio Industrial Museum",a:"Metaxourgeio",v:["history", "weird", "local"],d:15,s:"A neighborhood that made silk for Europe—now the factories teach their own history",st:"Metaxourgeio means \'silk workshop.\' Nineteenth-century factories. Now some host artists. Walk and see industrial echoes. Machines. Photographs. Workers\' stories.",im:"It\'s 1890. Workers operate machines spinning thread. It\'s repetitive. It\'s survival. The machines are faster than hands. Hands adapted.",t:"Metaxourgeio means \'silk workshop.\' Nineteenth-century factories. Now some host artists. Walk and see industrial echoes. Machines. Photographs. Workers\' stories.\",im:\"It\'s 1890. Workers operate machines spinning thread. It\'s repetitive. It\'s survival. The machines are faster than hands. Hands adapted.\",t:\"Metaxourgeio neighborhood (various artist spaces). Open hours vary. Check locally. Some free entry, some €5-10. Industrial heritage visible in building shapes.",c:["history_big", "weird", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:16,n:"Acropolis from the Wrong Side",a:"Filopappou",v:["beautiful", "free", "hidden"],d:16,s:"Climb opposite hills and see the Acropolis without crowds—the view everyone misses",st:"Tourist views: crowded monuments. Local views: from hills beyond. Walk up and turn around. The perspective changes everything. Same structure, different meaning.",im:"It\'s 6am. A jogger runs a hill and turns. The Acropolis catches light. She stops. She\'s seen it a thousand times. This time it matters.",t:"Tourist views: crowded monuments. Local views: from hills beyond. Walk up and turn around. The perspective changes everything. Same structure, different meaning.\",im:\"It\'s 6am. A jogger runs a hill and turns. The Acropolis catches light. She stops. She\'s seen it a thousand times. This time it matters.\",t:\"Various hill access points (Filopappou, Lycabettus from north). Free entry. Water essential. Morning best. Photography free. No facilities available.",c:["beautiful", "free_museum", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:17,n:"Kypseli Neighborhood Transformation",a:"Kypseli",v:["local", "weird", "beautiful"],d:17,s:"A 1920s neighborhood where Athenians lived before tourism—still genuinely residential",st:"Early 1900s. Workers\' housing. Good design. Now it\'s gentrifying slowly. Young professionals moving in. Old residents staying. Watch a neighborhood becoming itself differently.",im:"It\'s 1920. A family moves into a new apartment building. Clean. Modern. Today their granddaughter lives in the same building paying 10x more rent.",t:"Early 1900s. Workers\' housing. Good design. Now it\'s gentrifying slowly. Young professionals moving in. Old residents staying. Watch a neighborhood becoming itself differently.\",im:\"It\'s 1920. A family moves into a new apartment building. Clean. Modern. Today their granddaughter lives in the same building paying 10x more rent.\",t:\"Kypseli area (Panepistimio & surrounding). Walk streets freely. Photography free. Cafés mixed old and new. Morning market busy. Quieter than tourist areas.",c:["local_only", "weird", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:18,n:"Free Archaeological Sites Scattered",a:"Various",v:["history", "free", "beautiful"],d:18,s:"Ancient ruins that charge nothing—Doric columns, temple fragments scattered through the city",st:"Athens has so many ruins they made some free. Walk streets and find ancient stones embedded in modern walls. History is literally building the present.",im:"It\'s 2,300 years ago. A temple stands complete. 2,000 years later it\'s ruins. 300 years later its stones are building someone\'s house. Reincarnation.",t:"Athens has so many ruins they made some free. Walk streets and find ancient stones embedded in modern walls. History is literally building the present.\",im:\"It\'s 2,300 years ago. A temple stands complete. 2,000 years later it\'s ruins. 300 years later its stones are building someone\'s house. Reincarnation.\",t:\"Various: Temple of Zeus (exterior free), Arch of Hadrian (free viewing), Roman Agora remains (free edges). Hours dawn-dusk. Maps available at tourist info.",c:["history_big", "free_museum", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:19,n:"Rooftop Bar Views Acropolis Free",a:"Plaka",v:["beautiful", "night", "hidden"],d:19,s:"Climb to a rooftop bar and watch the Acropolis light up without paying museum entry",st:"Museum closes at 8pm. Acropolis lights up. Walk to a rooftop bar. Order a drink (€8-12). See Acropolis lit from close. It\'s cheaper than the museum.",im:"It\'s 9pm. A couple sits on a rooftop. The Acropolis glows. They didn\'t pay to see it. They paid to sit. The view is free if you know where to sit.",t:"Museum closes at 8pm. Acropolis lights up. Walk to a rooftop bar. Order a drink (€8-12). See Acropolis lit from close. It\'s cheaper than the museum.\",im:\"It\'s 9pm. A couple sits on a rooftop. The Acropolis glows. They didn\'t pay to see it. They paid to sit. The view is free if you know where to sit.\",t:\"Various rooftop bars (360 Degrees, Anski rooftop, many others). Plaka area. Entry usually free before 10pm. Drinks €6-12. Best 8-10pm for light.",c:["beautiful", "night", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:20,n:"Agia Panagia Church Interior Icons",a:"Monastiraki",v:["history", "quiet", "beautiful"],d:20,s:"A small church packed with icons so old they\'re almost black—faith made tangible",st:"Tiny church. Icons crowd walls. Incense heavy. Prayers whispered. It\'s Athens before tourists. Before crowds. Before tourism was invented.",im:"It\'s 1850. A woman lights a candle. She prays the same prayer her mother prayed. The icon is the same. The church is the same. Faith continues.",t:"Tiny church. Icons crowd walls. Incense heavy. Prayers whispered. It\'s Athens before tourists. Before crowds. Before tourism was invented.\",im:\"It\'s 1850. A woman lights a candle. She prays the same prayer her mother prayed. The icon is the same. The church is the same. Faith continues.\",t:\"Agia Panagia, Monastiraki area. Free entry. Respectful dress. Photography often forbidden. Hours vary (usually 8am-1pm & 5-8pm). Morning best.",c:["history_big", "quiet", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:21,n:"Neighborhood Markets Fresh Daily",a:"Various",v:["local", "free", "beautiful"],d:21,s:"Morning markets where Athenian grandmothers shop—seasonal produce, vendors who know families by name",st:"Every neighborhood has a market. Vendors change daily but sell the same goods. Tomatoes in summer. Oranges in winter. It\'s rhythm. It\'s home.",im:"It\'s Tuesday morning. A woman buys from the same vegetable vendor for 20 years. He gives her a tomato. \'Today this one is perfect.\' They both know the ritual.",t:"Every neighborhood has a market. Vendors change daily but sell the same goods. Tomatoes in summer. Oranges in winter. It\'s rhythm. It\'s home.\",im:\"It\'s Tuesday morning. A woman buys from the same vegetable vendor for 20 years. He gives her a tomato. \'Today this one is perfect.\' They both know the ritual.\",t:\"Various neighborhood markets (Kypseli, Pangrati, Varnakova). Morning hours (7am-3pm). Photography free. Cash only. Haggling expected. No tourist markup.",c:["local_only", "free_museum", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:22,n:"Stavros Niarchos Foundation Library",a:"Kallithea",v:["beautiful", "modern", "hidden"],d:22,s:"The newest major building in Athens—architecture that looks like a ship floating over antiquity",st:"Modern building. Curved lines. Floating above ancient sites. It\'s contemporary Athens attempting to honor ancient Athens. Walk around. It\'s free. Few tourists go south enough.",im:"It\'s 2018. An architect designs a building that floats. Will the past accept the future? The building exists as a question.",t:"Modern building. Curved lines. Floating above ancient sites. It\'s contemporary Athens attempting to honor ancient Athens. Walk around. It\'s free. Few tourists go south enough.\",im:\"It\'s 2018. An architect designs a building that floats. Will the past accept the future? The building exists as a question.\",t:\"Stavros Niarchos Foundation Library, Kallithea. Free entry to exterior and public areas. Hours 9am-9pm (check). Metro to Kallithea. Quiet spaces inside.",c:["beautiful", "modern", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:23,n:"Varnakova Market Street",a:"Exarchia",v:["local", "free", "beautiful"],d:23,s:"A street that IS a market—vendors shout, neighbors gather, it\'s commerce as theater",st:"Daily market street. Chaos. Sound. Color. Bargaining. It\'s how food was traded before supermarkets. It still happens here. It\'s the same song.",im:"It\'s 8am. Vendors arrange vegetables. They shout prices. Women gather. Money and vegetables change hands. The negotiation is the point.",t:"Daily market street. Chaos. Sound. Color. Bargaining. It\'s how food was traded before supermarkets. It still happens here. It\'s the same song.\",im:\"It\'s 8am. Vendors arrange vegetables. They shout prices. Women gather. Money and vegetables change hands. The negotiation is the point.\",t:\"Varnakova Street, Exarchia area. Morning 7am-2pm best. Photography free. Cash only. No English expected. Walk slowly. Absorb chaos. It\'s a performance.",c:["local_only", "free_museum", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:24,n:"Hidden Courtyards of Old Town",a:"Plaka",v:["hidden", "quiet", "beautiful"],d:24,s:"Behind old doors sit courtyards untouched by time—gardens where neighbors know each other across generations",st:"Walk and find courtyards. Residents gather here. Children play. Women talk. Tourist streets outside. Inside: normal life continues quietly.",im:"It\'s 1950. Neighbors gather in a courtyard. 70 years later the same courtyard. Different neighbors. Same ritual. Community continues.",t:"Walk and find courtyards. Residents gather here. Children play. Women talk. Tourist streets outside. Inside: normal life continues quietly.\",im:\"It\'s 1950. Neighbors gather in a courtyard. 70 years later the same courtyard. Different neighbors. Same ritual. Community continues.\",t:\"Plaka neighborhood (various courtyards). Knock softly if gates are locked. Some semi-public. Daytime only. Photography respectful. Respect residents\' privacy.",c:["hidden", "quiet", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:25,n:"Temple of Hephaestus Best Preserved",a:"Thissio",v:["history", "beautiful", "quiet"],d:25,s:"The most intact ancient Greek temple in existence—Doric columns unchanged for 2,400 years",st:"Complete. Columns intact. Roof missing but structure perfect. Walk around it and feel the geometry of perfection. Greeks knew how to build.",im:"It\'s 450 BC. Workers finish the last column. \'It\'s complete.\' 2,400 years later it still stands. Nothing was added. Nothing was removed.",t:"Complete. Columns intact. Roof missing but structure perfect. Walk around it and feel the geometry of perfection. Greeks knew how to build.\",im:\"It\'s 450 BC. Workers finish the last column. \'It\'s complete.\' 2,400 years later it still stands. Nothing was added. Nothing was removed.\",t:\"Temple of Hephaestus, Agora area (Thissio). Entry €8 (with Agora) or walk perimeter free. Hours 8am-8pm. Early morning light best. Photography free.",c:["history_big", "beautiful", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:26,n:"Ottoman Bath House Remains",a:"Plaka",v:["history", "hidden", "weird"],d:26,s:"A hammam from 400 years of occupation—stone chambers where Athenians steamed while ruled by Turks",st:"Ottoman occupation lasted 400 years. This bath house remains. Stone domes. Empty chambers. Walk in and feel the weight of occupation. Daily life continues under rule.",im:"It\'s 1650. An Athenian enters a hammam. Ottoman soldiers enter after. Separate spaces. Same water. Occupation made routine.",t:"Ottoman occupation lasted 400 years. This bath house remains. Stone domes. Empty chambers. Walk in and feel the weight of occupation. Daily life continues under rule.\",im:\"It\'s 1650. An Athenian enters a hammam. Ottoman soldiers enter after. Separate spaces. Same water. Occupation made routine.\",t:\"Ottoman Bath House (Hamam), Monastiraki area. Exterior visible/walkable free. Some interior access (check hours). Small fee if open. Photography limited.",c:["history_big", "hidden", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:27,n:"Peripeteia Theater Company Spaces",a:"Psyrri",v:["local", "weird", "night"],d:27,s:"Where experimental theater happens in converted spaces—not tourist theater, real work",st:"Small theaters host Greek experimental work. Audiences are locals. Language barrier? Yes. But emotion translates. Walk and watch humans trying something new.",im:"It\'s midnight. An actress performs in a warehouse. 30 people watch. The work is raw. It might never be performed again. That\'s why it matters.",t:"Small theaters host Greek experimental work. Audiences are locals. Language barrier? Yes. But emotion translates. Walk and watch humans trying something new.\",im:\"It\'s midnight. An actress performs in a warehouse. 30 people watch. The work is raw. It might never be performed again. That\'s why it matters.\",t:\"Psyrri neighborhood (various spaces). Check local listings. Performances usually 9pm-midnight. Entry €10-15. Photography forbidden. Greek performances.",c:["local_only", "weird", "night"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:28,n:"Odeon of Herodes Atticus Acoustic Perfection",a:"Acropolis",v:["history", "beautiful"],d:28,s:"An ancient theater where sound engineering 2,000 years ago still works—a whisper carries perfectly",st:"Built 2,000 years ago. Acoustics flawless. A whisper from the stage reaches 5,000 seats. Modern engineers can\'t improve it. Walk and test it.",im:"It\'s 150 AD. An actor speaks softly on stage. Back rows hear every word. The engineer knew something. 2,000 years of work continues.",t:"Built 2,000 years ago. Acoustics flawless. A whisper from the stage reaches 5,000 seats. Modern engineers can\'t improve it. Walk and test it.\",im:\"It\'s 150 AD. An actor speaks softly on stage. Back rows hear every word. The engineer knew something. 2,000 years of work continues.\",t:\"Odeon of Herodes Atticus, Acropolis south. Entry €12 (or with Acropolis). Walk inside and test acoustics (whisper on stage). Hours 8am-8pm. Photography free.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:29,n:"Free Ferry To Island Across Sea",a:"Piraeus",v:["free", "beautiful", "nature"],d:29,s:"Commuter ferry that tourists skip—harbor views and island life for the price of a metro ticket",st:"Locals take ferries to work. Tourists fly. Sit on the 40-minute ferry and watch Greece unfold. Islands appear. Fishermen cast nets. It\'s free with a metro pass.",im:"It\'s morning. A worker boards the ferry with coffee. They\'ve done this 10,000 times. The water looks the same. It\'s always different.",t:"Locals take ferries to work. Tourists fly. Sit on the 40-minute ferry and watch Greece unfold. Islands appear. Fishermen cast nets. It\'s free with a metro pass.\",im:\"It\'s morning. A worker boards the ferry with coffee. They\'ve done this 10,000 times. The water looks the same. It\'s always different.\",t:\"Piraeus Port (metro line 1). Ferries to Aegina, Poros, Salamina (check schedules). Ferry costs €5-10 (or metro pass). Return same day. No reservations needed.",c:["free_museum", "beautiful", "nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:30,n:"Acropolis Museum Free Hours",a:"Acropolis",v:["history", "hidden", "free"],d:30,s:"Every first Sunday of the month—free entry to one of the world\'s great museums",st:"Museum usually €15. First Sunday free. But crowds terrible. Budget time. See the Caryatids. See the Parthenon sculptures. See history organized by experts.",im:"It\'s the first Sunday. A woman enters without paying. \'I came for free.\' She stands before a sculpture 2,400 years old. The cost was €0. The value is infinite.",t:"Museum usually €15. First Sunday free. But crowds terrible. Budget time. See the Caryatids. See the Parthenon sculptures. See history organized by experts.\",im:\"It\'s the first Sunday. A woman enters without paying. \'I came for free.\' She stands before a sculpture 2,400 years old. The cost was €0. The value is infinite.\",t:\"Acropolis Museum, 15 Dionysiou Areopagitou. First Sunday every month free entry. Arrive early (8am). Hours 9am-8pm. Photography forbidden. Expect crowds.",c:["history_big", "hidden", "free_museum"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:31,n:"Lysikrates Monument Square",a:"Plaka",v:["history", "beautiful", "quiet"],d:31,s:"A tiny monument from 334 BC—the oldest surviving building made to honor a theater producer",st:"A man funded a play. Won. Built a monument. It\'s been standing 2,356 years. His moment of pride continues forever. Walk and feel pride made stone.",im:"It\'s 334 BC. A producer stands before his monument. \'I paid for a play. Now I\'m eternal.\' Stone doesn\'t forget.",t:"A man funded a play. Won. Built a monument. It\'s been standing 2,356 years. His moment of pride continues forever. Walk and feel pride made stone.\",im:\"It\'s 334 BC. A producer stands before his monument. \'I paid for a play. Now I\'m eternal.\' Stone doesn\'t forget.\",t:\"Lysikrates Monument Square, Plaka (Vyronos Street area). Free to view. Photography free. Small quiet square. Morning beautiful. Ancient inscription readable.",c:["history_big", "beautiful", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:32,n:"Benaki Museum Hidden Wing",a:"Vassilissis Sofias",v:["history", "hidden", "quiet"],d:32,s:"A collector\'s passion—objects from 3,000 years of Greek life in a mansion museum",st:"One family collected Greek cultural objects obsessively. Now a museum in their old house. Byzantine. Ottoman. Modern Greek. Walk and see one country\'s many lives.",im:"It\'s 1920. A collector buys a Byzantine icon. \'This is Greece.\' Fifty years later his collection defines what Greece means to the world.",t:"One family collected Greek cultural objects obsessively. Now a museum in their old house. Byzantine. Ottoman. Modern Greek. Walk and see one country\'s many lives.\",im:\"It\'s 1920. A collector buys a Byzantine icon. \'This is Greece.\' Fifty years later his collection defines what Greece means to the world.\",t:\"Benaki Museum, 1 Koumbari Street, Vassilissis Sofias. Entry €12. Hours 10am-6pm (closed Tuesdays). Rarely crowded. Photography forbidden.",c:["history_big", "hidden", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:33,n:"Marble Quarries Beyond City",a:"North Athens",v:["history", "weird", "nature"],d:33,s:"Ancient quarries where blocks were carved 2,000 years ago—unfinished columns still embedded in stone",st:"Drive north and find quarries. Columns half-carved. Blocks abandoned. Ancient workers just... stopped. Why? Nobody knows. The work remains incomplete.",im:"It\'s 150 AD. Workers carve. An order cancelled. They stop. The stone waits. It waits 1,900 years. It waits still.",t:"Drive north and find quarries. Columns half-carved. Blocks abandoned. Ancient workers just... stopped. Why? Nobody knows. The work remains incomplete.\",im:\"It\'s 150 AD. Workers carve. An order cancelled. They stop. The stone waits. It waits 1,900 years. It waits still.\",t:\"Penteli Quarries, north of Athens (45 minutes drive). Rare tours available. Check locally. Otherwise view from distance. Photography usually allowed. Remote area. Car needed.",c:["history_big", "weird", "nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:34,n:"Strefi Hill Hidden Neighborhood Views",a:"Exarchia",v:["beautiful", "free", "hidden"],d:34,s:"Climb a rocky hill and Athens sprawls beneath you—streets, monuments, life from above",st:"It\'s not a famous hill. It\'s steep. Most tourists skip it. Walk up. At summit: 360 degrees. You see Athens as a city. The scale matters.",im:"It\'s dawn. A jogger reaches the top. The city wakes below. For 10 minutes it\'s theirs. Then others arrive. They share the view.",t:"It\'s not a famous hill. It\'s steep. Most tourists skip it. Walk up. At summit: 360 degrees. You see Athens as a city. The scale matters.\",im:\"It\'s dawn. A jogger reaches the top. The city wakes below. For 10 minutes it\'s theirs. Then others arrive. They share the view.\",t:\"Strefi Hill, Exarchia area. Free entry. 30-minute climb (steep). Water essential. Early morning best. Photography free. Little development. Rocks rocky.",c:["beautiful", "free_museum", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:35,n:"Hadrian\'s Library Excavated Interior",a:"Monastiraki",v:["history", "beautiful"],d:35,s:"A Roman emperor built a library for Athenians—now only foundations remain but the plan is clear",st:"Hadrian visited Athens. Built a library. Columns still stand. Courtyards still visible. Walk and see Roman engineering supporting Greek culture.",im:"It\'s 132 AD. Hadrian dedicates a library. \'For Athens.\' 1,900 years later tourists walk where words were studied. The space remembers.",t:"Hadrian visited Athens. Built a library. Columns still stand. Courtyards still visible. Walk and see Roman engineering supporting Greek culture.\",im:\"It\'s 132 AD. Hadrian dedicates a library. \'For Athens.\' 1,900 years later tourists walk where words were studied. The space remembers.\",t:\"Hadrian\'s Library, Monastiraki area. Entry €8 (or with Acropolis pass). Hours 8am-8pm. Photography free. Ancient columns intact. Small museum inside.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:36,n:"Dexameni Neighborhood Fountain",a:"Dexameni",v:["beautiful", "quiet", "hidden"],d:36,s:"A neighborhood built around a water reservoir—hidden squares and quiet streets most tourists never see",st:"North-central Athens. Residential. A large dexameni (reservoir) nearby. Quiet streets. Locals only. Cafés know regulars. Walk and be mistaken for a resident.",im:"It\'s evening. A man walks home from work through quiet streets. He\'s done this walk 15,000 times. He could do it blindfolded. It\'s muscle memory.",t:"North-central Athens. Residential. A large dexameni (reservoir) nearby. Quiet streets. Locals only. Cafés know regulars. Walk and be mistaken for a resident.\",im:\"It\'s evening. A man walks home from work through quiet streets. He\'s done this walk 15,000 times. He could do it blindfolded. It\'s muscle memory.\",t:\"Dexameni neighborhood (Omonia area). Walk freely. No tourist infrastructure. Photography free. Quieter than central Athens. Local cafés cheap (€2-5).",c:["beautiful", "quiet", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:37,n:"Athenian Street Art Beyond Exarchia",a:"Various",v:["street_art", "local", "free"],d:37,s:"Murals scattered across every neighborhood—not curated, just happening, layered over years",st:"Athens is a canvas. Walk any street and find art. Some beautiful. Some political. Some just tags. It\'s constant conversation on walls. The city argues with itself.",im:"It\'s 2am. A spray can hisses. A face appears on a wall. By morning someone\'s covered it. By noon another layer. The wall is alive.",t:"Athens is a canvas. Walk any street and find art. Some beautiful. Some political. Some just tags. It\'s constant conversation on walls. The city argues with itself.\",im:\"It\'s 2am. A spray can hisses. A face appears on a wall. By morning someone\'s covered it. By noon another layer. The wall is alive.\",t:\"Walk streets systematically. Photography free. New art appears constantly. Respect political walls (Exarchia). Tourist areas less interesting. Neighborhoods more authentic.",c:["street_art", "local_only", "free_museum"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:38,n:"Perama Cave Archaeological Site",a:"North",v:["history", "weird", "hidden"],d:38,s:"A cave where Neolithic humans lived—artifacts 11,000 years old in glass cases",st:"Outside Athens, a cave. Ancient pottery. Bones. Proof of life 11,000 years ago. Walk the same cave. It\'s overwhelming.",im:"It\'s 9,000 BC. Humans live in this cave. They make pottery. They eat. They die. 11,000 years later their hands are visible in fragments.",t:"Outside Athens, a cave. Ancient pottery. Bones. Proof of life 11,000 years ago. Walk the same cave. It\'s overwhelming.\",im:\"It\'s 9,000 BC. Humans live in this cave. They make pottery. They eat. They die. 11,000 years later their hands are visible in fragments.\",t:\"Perama Cave, north of Athens (45 minutes drive). Guided tours required (€8-10). Hours 9am-6pm. Check bookings. Car essential. Stairs and narrow passages.",c:["history_big", "weird", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:39,n:"Stoa of Attalus Ancient Colonnade",a:"Agora",v:["history", "beautiful"],d:39,s:"A 2,000-year-old covered walkway—rebuilt in 1950s using ancient methods—still protects from sun",st:"Original structure is 2,000 years old. Fell. Rebuilt in the 1950s. Archaeologists reconstructed it exactly. Now tourists walk the same covered walk as ancient Athenians.",im:"It\'s 150 BC. Someone walks under these columns avoiding sun. 2,000 years later another person does exactly the same. The geometry works.",t:"Original structure is 2,000 years old. Fell. Rebuilt in the 1950s. Archaeologists reconstructed it exactly. Now tourists walk the same covered walk as ancient Athenians.\",im:\"It\'s 150 BC. Someone walks under these columns avoiding sun. 2,000 years later another person does exactly the same. The geometry works.\",t:\"Stoa of Attalus, Ancient Agora (Thissio). Entry €8 (with Agora) or free if you walk past. Photography free. Columns 12 meters high. Incredible engineering.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:40,n:"Lykavittos Funicular At Dusk",a:"Lycabettus",v:["beautiful", "night"],d:40,s:"Ride a 140-year-old cable car up a hill and watch Athens light up from the highest point",st:"A funicular climbs. Athens spreads below. Lights come on. The Acropolis glows. It\'s tourist but also genuine. The view justifies the effort.",im:"It\'s 6pm. A couple rides up. The sun drops. City turns gold. Then amber. Then blue. Then lights. The transformation takes 30 minutes.",t:"A funicular climbs. Athens spreads below. Lights come on. The Acropolis glows. It\'s tourist but also genuine. The view justifies the effort.\",im:\"It\'s 6pm. A couple rides up. The sun drops. City turns gold. Then amber. Then blue. Then lights. The transformation takes 30 minutes.\",t:\"Lycabettus Funicular, Lycabettus area. Entry €7-10 (round trip). Hours 9am-midnight (seasonal). Best 5:30-7:30pm for sunset. Restaurant at top (expensive).",c:["beautiful", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:41,n:"Panathenaic Stadium Modern Olympic Site",a:"Pangrati",v:["history", "beautiful"],d:41,s:"The first modern Olympic stadium—built in 1896 on ancient site—still hosts races",st:"Modern Olympics held here. It sits on ancient stadium remains. Walk the track. You\'re on history. Modern sport on ancient ground. The layer cake of time.",im:"It\'s 1896. Modern Olympics happen for the first time on ancient soil. Now athletes jog the same track 130 years later.",t:"Modern Olympics held here. It sits on ancient stadium remains. Walk the track. You\'re on history. Modern sport on ancient ground. The layer cake of time.\",im:\"It\'s 1896. Modern Olympics happen for the first time on ancient soil. Now athletes jog the same track 130 years later.\",t:\"Panathenaic Stadium, Pangrati area. Entry €8-10. Hours 8am-5pm. Walk track. Photography free. Museum inside. Quieter than museums.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:42,n:"Gate of Adrianus Roman Boundary Marker",a:"Plaka",v:["history", "hidden"],d:42,s:"A wall marking where the Roman emperor drew a line—\'Here Athens ends\'—it\'s still standing",st:"Hadrian built this gate to mark the boundary of his Athens improvements. One side Greek. Other side Roman. The line is literal.",im:"It\'s 132 AD. A gate is finished. \'Here Athens ends.\' The gate stands. The idea it represented—that boundaries matter—eventually fails.",t:"Hadrian built this gate to mark the boundary of his Athens improvements. One side Greek. Other side Roman. The line is literal.\",im:\"It\'s 132 AD. A gate is finished. \'Here Athens ends.\' The gate stands. The idea it represented—that boundaries matter—eventually fails.\",t:\"Gate of Adrianus, Plaka/Acropolis border area (Leoforos Amalias). Free to view. Photography free. Ancient inscription readable. Small plaza around it.",c:["history_big", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:43,n:"National Archaeological Museum Wings",a:"Omonia",v:["history", "beautiful", "hidden"],d:43,s:"The world\'s greatest Greek collection in side wings few tourists find—sculptures so perfect they hurt to see",st:"Main hall packed. Side galleries empty. Walk them and find sculptures from 3,000 years. Faces. Bodies. Hands. It\'s the full history of human expression.",im:"It\'s 2,500 years ago. A sculptor completes a figure. He dies. 2,500 years later someone stands before it. The feeling is unchanged. Beauty is immortal.",t:"Main hall packed. Side galleries empty. Walk them and find sculptures from 3,000 years. Faces. Bodies. Hands. It\'s the full history of human expression.\",im:\"It\'s 2,500 years ago. A sculptor completes a figure. He dies. 2,500 years later someone stands before it. The feeling is unchanged. Beauty is immortal.\",t:\"National Archaeological Museum, 44 Patission Street, Omonia. Entry €12. Hours 1pm-8pm Monday, 8am-8pm Tues-Sunday. Photography forbidden. Quiet weekday mornings.",c:["history_big", "beautiful", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:44,n:"Odeion of Pericles Excavation Remains",a:"Agora",v:["history", "hidden"],d:44,s:"Rubble marked with ancient names—a music hall where Pericles held performances now lies in pieces",st:"Burned by Persians. Rebuilt. Burned again. Now just stones. But labeled stones. 2,500 years of history in rubble. Walk and read",im:"It\'s 450 BC. A music performance happens. The building stands. 500 years later it\'s ash. 2,000 years later it\'s labeled ruins.",t:"Burned by Persians. Rebuilt. Burned again. Now just stones. But labeled stones. 2,500 years of history in rubble. Walk and read\",im:\"It\'s 450 BC. A music performance happens. The building stands. 500 years later it\'s ash. 2,000 years later it\'s labeled ruins.\",t:\"Odeion of Pericles, Agora area. Free to view externally. Photography free. Plaques explain context. Most tourists miss it (focus on Temple of Hephaestus).",c:["history_big", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:45,n:"Byzantine Museum Ancient Artifacts",a:"Vassilissis Sofias",v:["history", "quiet"],d:45,s:"1,000 years of Christian art in a museum people think is small but contains galaxies",st:"Icons. Mosaics. Manuscripts. The bridge between ancient pagan and modern Christian. Walk and watch transformation. Culture changes. Beauty remains.",im:"It\'s 600 AD. A monastery completes an icon. 1,400 years later it hangs under lights in a museum. The prayer is still visible.",t:"Icons. Mosaics. Manuscripts. The bridge between ancient pagan and modern Christian. Walk and watch transformation. Culture changes. Beauty remains.\",im:\"It\'s 600 AD. A monastery completes an icon. 1,400 years later it hangs under lights in a museum. The prayer is still visible.\",t:\"Byzantine and Christian Museum, 22 Vassilissis Sofias Avenue. Entry €8. Hours 10am-6pm (closed Mondays). Few crowds. Photography forbidden. Very quiet.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:46,n:"Dipylon Gate Cemetery Entrance Ancient",a:"Kerameikos",v:["history", "quiet", "weird"],d:46,s:"The monumental gate where ancient Athenians buried their dead—still standing after 2,400 years",st:"Gate built to mark sacred ground. Cemetery beyond. People walked through to mourn. Same gate. Same ground. Different mourners. Mortality constant.",im:"It\'s 400 BC. A funeral procession enters through the gate. The dead go forward. The living turn back. Today the gate stands empty but remembering.",t:"Gate built to mark sacred ground. Cemetery beyond. People walked through to mourn. Same gate. Same ground. Different mourners. Mortality constant.\",im:\"It\'s 400 BC. A funeral procession enters through the gate. The dead go forward. The living turn back. Today the gate stands empty but remembering.\",t:\"Dipylon Gate, Kerameikos area. Entry €8 (with museum). Photography free. Gate impressive from outside even if you don\'t enter. Hours 8am-8pm.",c:["history_big", "quiet", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:47,n:"Kapnikarea Church Central Athens",a:"Monastiraki",v:["history", "beautiful", "quiet"],d:47,s:"A Byzantine church that survived Ottoman occupation and modernization—sitting on an ancient sacred site",st:"Built on Greek temple foundations. Survived four religions. Still standing. Bell tower added later. It\'s palimpsest. Layers visible in architecture.",im:"It\'s 950 AD. A church is built on sacred ground. Turks occupy the city. Christians pray quietly. Now tourists pass without noticing it\'s still there.",t:"Built on Greek temple foundations. Survived four religions. Still standing. Bell tower added later. It\'s palimpsest. Layers visible in architecture.\",im:\"It\'s 950 AD. A church is built on sacred ground. Turks occupy the city. Christians pray quietly. Now tourists pass without noticing it\'s still there.\",t:\"Kapnikarea Church, Ermou Street (pedestrian zone), Monastiraki. Free entry. Respectful dress. Photography often forbidden. Hours 8am-1:30pm & 5-8pm.",c:["history_big", "beautiful", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:48,n:"Agora Museum Display Cases",a:"Agora",v:["history", "hidden", "quiet"],d:48,s:"Inside the Stoa museum—objects from ancient agora showing daily life, not monuments",st:"Tourists see temples. Museums show pottery. Here: a woman\'s comb. A child\'s toy. A merchant\'s weights. The actual lives. The humanity.",im:"It\'s 400 BC. A child drops a toy. It\'s lost in dust. 2,400 years later someone finds it. The child\'s hand is invisible but obvious.",t:"Tourists see temples. Museums show pottery. Here: a woman\'s comb. A child\'s toy. A merchant\'s weights. The actual lives. The humanity.\",im:\"It\'s 400 BC. A child drops a toy. It\'s lost in dust. 2,400 years later someone finds it. The child\'s hand is invisible but obvious.\",t:\"Agora Museum (Stoa of Attalus), Agora area. Entry €8. Hours 8am-8pm. Photography forbidden. Small museum. Very quiet. Very human.",c:["history_big", "hidden", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:49,n:"Numismatic Museum Coin Collection",a:"Omonia",v:["history", "hidden", "quiet"],d:49,s:"Thousands of ancient coins showing faces of emperors—money as portraiture as history",st:"A coin is weight and value and face. In a museum thousands of coins show who mattered. Emperors who wanted to be remembered. They were.",im:"It\'s 100 AD. A coin is minted. Someone\'s face on it. It passes through 10,000 hands. Each person holds proof of the emperor\'s existence.",t:"A coin is weight and value and face. In a museum thousands of coins show who mattered. Emperors who wanted to be remembered. They were.\",im:\"It\'s 100 AD. A coin is minted. Someone\'s face on it. It passes through 10,000 hands. Each person holds proof of the emperor\'s existence.\",t:\"Numismatic Museum, 44 Patission Street, Omonia (next to Archaeological Museum). Entry €8. Hours 10am-4pm (closed Monday). Few tourists. Very quiet. Photography forbidden.",c:["history_big", "hidden", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:50,n:"Thisseion Neighborhood Quiet Corner",a:"Thissio",v:["quiet", "beautiful", "free", "local"],d:50,s:"A neighborhood that attracts artists and families—not tourists, but people living deliberately",st:"West of Agora. Temple of Hephaestus nearby but people come for the neighborhood. Cafés. Small shops. Artists\' studios. It\'s genuine.",im:"It\'s morning. A woman sits in a café with a book. She\'s not performing. She\'s just reading. The café exists for her, not for tourists.",t:"West of Agora. Temple of Hephaestus nearby but people come for the neighborhood. Cafés. Small shops. Artists\' studios. It\'s genuine.\",im:\"It\'s morning. A woman sits in a café with a book. She\'s not performing. She\'s just reading. The café exists for her, not for tourists.\",t:\"Thisseion area (around Temple of Hephaestus). Walk freely. Small cafés. Photography free. Morning quiet. Evening social. Art galleries open limited hours.",c:["quiet", "beautiful", "free_museum", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:51,n:"Metaxa Prison Historical Site",a:"Omonia",v:["history", "hidden", "quiet"],d:51,s:"A former political prison where independence fighters were tortured—architecture of oppression still visible",st:"Political prisoners held here. Torture documented. Now a site. The walls remember. Walk and feel weight. History isn\'t abstract. It\'s tangible.",im:"It\'s 1930. Political prisoners sing in darkness. The song carries through stone. 90 years later the same stone carries memory.",t:"Political prisoners held here. Torture documented. Now a site. The walls remember. Walk and feel weight. History isn\'t abstract. It\'s tangible.\",im:\"It\'s 1930. Political prisoners sing in darkness. The song carries through stone. 90 years later the same stone carries memory.\",t:\"Metaxa Prison (check current access). Omonia area. Tour available (€5-10). Photography may be restricted. Quiet respectful visit expected. Hours vary. Call ahead.",c:["history_big", "hidden", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:52,n:"Varvakio Agora Meat Market",a:"Omonia",v:["local", "weird", "beautiful"],d:52,s:"A covered market where butchers have worked for 150 years—raw commerce, blood and negotiation",st:"1870s: market built. Still working. Butchers\' stalls. Haggling. It\'s supply and demand visible. It\'s ugly and beautiful and essential.",im:"It\'s 1890. A butcher cuts meat. 130 years later a different butcher cuts meat in the same space. The work is unchanged. The knife brand changed but the work remains.",t:"1870s: market built. Still working. Butchers\' stalls. Haggling. It\'s supply and demand visible. It\'s ugly and beautiful and essential.\",im:\"It\'s 1890. A butcher cuts meat. 130 years later a different butcher cuts meat in the same space. The work is unchanged. The knife brand changed but the work remains.\",t:\"Varvakio Agora, Omonia area. Open morning hours (7am-3pm). Photography discreet (vendors may not like it). Very much a working market. Not for squeamish.",c:["local_only", "weird", "beautiful"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:53,n:"Acropolis Museum Courtyard Rest",a:"Acropolis",v:["beautiful", "quiet", "hidden"],d:53,s:"The museum\'s interior courtyard—few people know it exists—perfect silence and sight lines",st:"Most visit the galleries. Few rest in the courtyard. Quiet. Acropolis visible above. Carved stone surrounds. You\'re inside knowledge.",im:"It\'s afternoon. A woman sits in the courtyard. The Acropolis watches. She breathes. The moment matters because nothing is rushing.",t:"Most visit the galleries. Few rest in the courtyard. Quiet. Acropolis visible above. Carved stone surrounds. You\'re inside knowledge.\",im:\"It\'s afternoon. A woman sits in the courtyard. The Acropolis watches. She breathes. The moment matters because nothing is rushing.\",t:\"Acropolis Museum courtyard, 15 Dionysiou Areopagitou. Entry €15 (or free first Sunday). Courtyard open during museum hours. Photography free. Very quiet.",c:["beautiful", "quiet", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:54,n:"Kypseli Square Community Gathering",a:"Kypseli",v:["local", "beautiful", "free"],d:54,s:"A neighborhood square where old Athens gathers—not curated, just daily life, Athenians being themselves",st:"Kypseli is gentrifying slowly. This square is where generations meet. Old men. Young families. Vendors. It\'s Athens not performing.",im:"It\'s evening. An old man sits on a bench. His father sat here. His son might sit here. The bench is the continuity.",t:"Kypseli is gentrifying slowly. This square is where generations meet. Old men. Young families. Vendors. It\'s Athens not performing.\",im:\"It\'s evening. An old man sits on a bench. His father sat here. His son might sit here. The bench is the continuity.\",t:\"Kypseli Square, Kypseli area (Panepistimio metro). Walk freely. Coffee €2-3. Bakeries. Neighborhood market morning. Photography free. Respect daily life.",c:["local_only", "beautiful", "free_museum"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:55,n:"Tower of the Winds Ancient Timekeeper",a:"Plaka",v:["history", "beautiful", "hidden"],d:55,s:"A marble tower built 2,000 years ago to tell time using water—engineering poetry",st:"Ancient water clock. Wind vane on top. Human heads carved as wind directions. It\'s practical and beautiful simultaneously. Function as art.",im:"It\'s 100 AD. Engineers finish the tower. It will tell time for 2,000 years. But it also tells poetry. The marble faces are art.",t:"Ancient water clock. Wind vane on top. Human heads carved as wind directions. It\'s practical and beautiful simultaneously. Function as art.\",im:\"It\'s 100 AD. Engineers finish the tower. It will tell time for 2,000 years. But it also tells poetry. The marble faces are art.\",t:\"Tower of the Winds, Monastiraki area (near Roman Agora). Photography free. Exterior visible clearly. Entry €8 (with Hadrian\'s Library). Hours 8am-8pm.",c:["history_big", "beautiful", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:56,n:"Taverna To Steki — Hidden Rembetiko Den",a:"Psyrri",v:["hidden", "local", "music"],d:56,s:"An unmarked basement tavern where Greek musicians play rembetiko at midnight like nobody\'s listening",st:"Descend stairs into warmth and smell of wine and souvlaki. Musicians arrive around midnight. A guitarist. A bouzouki. Then singing that reaches back to Ottoman suffering.",im:"It\'s 1am. A woman sings about a lover who left her. The pain is real. Everyone pretends they\'re not crying. Greek life in song.",t:"Descend stairs into warmth and smell of wine and souvlaki. Musicians arrive around midnight. A guitarist. A bouzouki. Then singing that reaches back to Ottoman suffering.\",im:\"It\'s 1am. A woman sings about a lover who left her. The pain is real. Everyone pretends they\'re not crying. Greek life in song.\",t:\"Psyrri, basement location. No sign. Ask locals for directions. Come midnight+. Cash only. Drink wine. Sing along if brave.",c:["hidden", "local_only", "music"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:57,n:"Temple of Poseidon at Sounion — Cliff-Edge Sunset Ritual",a:"Day Trip",v:["history", "beautiful", "romantic_water"],d:57,s:"A 2,500-year-old temple to the sea god standing on cliffs where sunset burns the Aegean orange",st:"Columns rise from stone. Below, the sea. Poseidon\'s temple catches last light. Generations have stood here watching day end.",im:"It\'s 480 BC. A sailor stands here before a voyage. He prays. It\'s 2024. A tourist stands in the same spot, same anxiety, different fear.",t:"Columns rise from stone. Below, the sea. Poseidon\'s temple catches last light. Generations have stood here watching day end.\",im:\"It\'s 480 BC. A sailor stands here before a voyage. He prays. It\'s 2024. A tourist stands in the same spot, same anxiety, different fear.\",t:\"Bus 1 hour south. €3-5. Arrive 30 min before sunset. Bring water. It\'s exposed and windy. Worth every second.",c:["history_big", "beautiful", "romantic_water"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:58,n:"Aegina Island Day Ferry — Secret Pistachio Island",a:"Day Trip",v:["nature", "beautiful", "quiet"],d:58,s:"A ferry ride away, an island where pistachio trees cover hills and tourist boats can\'t penetrate",st:"40-minute ferry. Smaller boats to the island. Pistachio orchards. Fish tavernas by water. Greek island in miniature.",im:"It\'s 1950. A pistachio farmer picks fruit. It\'s 2024. The same tree produces the same nuts. Seasons don\'t change here.",t:"40-minute ferry. Smaller boats to the island. Pistachio orchards. Fish tavernas by water. Greek island in miniature.\",im:\"It\'s 1950. A pistachio farmer picks fruit. It\'s 2024. The same tree produces the same nuts. Seasons don\'t change here.\",t:\"Ferry from Piraeus port. €8-12 round trip. Arrive early for a good boat. Rent a scooter or walk. Return by evening.",c:["nature", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:59,n:"Daphni Monastery — Byzantine Gold Mosaics",a:"Day Trip",v:["history", "beautiful", "quiet"],d:59,s:"A 1,100-year-old monastery where Byzantine mosaics still glow gold like they absorbed centuries of candlelight",st:"Walk through silence. Mosaics cover walls. Gold leaf catches light impossibly. The Byzantines understood how to make divine feel real.",im:"It\'s 1000 AD. Monks create images that\'ll survive a millennium. They know they\'re making forever.",t:"Walk through silence. Mosaics cover walls. Gold leaf catches light impossibly. The Byzantines understood how to make divine feel real.\",im:\"It\'s 1000 AD. Monks create images that\'ll survive a millennium. They know they\'re making forever.\",t:\"25 km northwest, accessible by bus. €6-8. Go Tuesday-Sunday. Bring respect. Photography sometimes restricted—check first.",c:["history_big", "beautiful", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:60,n:"Marathon Archaeological Site — Where Democracy Survived",a:"Day Trip",v:["history", "quiet", "beautiful"],d:60,s:"The plain where 10,000 Greeks beat 25,000 Persians and saved Western civilization with courage",st:"A plain. A museum. A mound where heroes died. Walk the battlefield. Understand that democracy lived because ordinary people stood together.",im:"It\'s 490 BC. A runner carries news: Greeks won. He\'ll run all the way to Athens and die from joy. Now that run is a sport.",t:"A plain. A museum. A mound where heroes died. Walk the battlefield. Understand that democracy lived because ordinary people stood together.\",im:\"It\'s 490 BC. A runner carries news: Greeks won. He\'ll run all the way to Athens and die from joy. Now that run is a sport.\",t:\"40 km north by bus. €6-8 museum. Hire a local guide if possible. Walk the plain slowly. This is where the world turned.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:61,n:"Rooftop Bar Night Circuit — Acropolis Views From Above",a:"Plaka",v:["night", "beautiful", "local"],d:61,s:"The city\'s best-kept secret: rooftop bars where tourists never find you but the Acropolis glows below",st:"Climb hidden stairs. Suddenly Athens spreads beneath. Acropolis gold. City lights. A small bar that\'s been here forever.",im:"It\'s midnight. The Acropolis is floodlit. A couple kisses. The city watches. Nothing matters but this.",t:"Climb hidden stairs. Suddenly Athens spreads beneath. Acropolis gold. City lights. A small bar that\'s been here forever.\",im:\"It\'s midnight. The Acropolis is floodlit. A couple kisses. The city watches. Nothing matters but this.\",t:\"Plaka area. Ask locals. €5-10 drinks. Come 10pm. Watch the city light up as night deepens. Stay late.",c:["night", "beautiful", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:62,n:"Filopappou Hill Sunset — City Panorama from West",a:"South Athens",v:["beautiful", "quiet", "high_spots"],d:62,s:"A hill 147 meters high where you watch the entire city turn gold as day ends",st:"Climb slowly. Athens reveals itself in layers. The Acropolis rises in the center. Sprawl extends to the sea. Everything becomes smaller from this height.",im:"It\'s 6pm. A woman climbs. At the top, the city is hers. She stands alone but not lonely.",t:"Climb slowly. Athens reveals itself in layers. The Acropolis rises in the center. Sprawl extends to the sea. Everything becomes smaller from this height.\",im:\"It\'s 6pm. A woman climbs. At the top, the city is hers. She stands alone but not lonely.\",t:\"South side, walkable from Acropolis area. Flat paths. €0. Bring a blanket. Arrive 30 min before sunset. Stay until stars.",c:["high_spots", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:63,n:"Anafiotika Village — Ottoman Town Inside Athens",a:"Plaka",v:["history", "beautiful", "quiet"],d:63,s:"A neighborhood that looks like it\'s from the Greek islands, built by refugees under the Acropolis",st:"Narrow streets. Whitewashed houses. Bougainvillea. You\'ve time-traveled to 1922 without leaving the city. Refugees brought their island homes here.",im:"It\'s 1922. A family escapes Turkey with memories. They build homes exactly like the ones they lost, stone by stone. Memory as architecture.",t:"Narrow streets. Whitewashed houses. Bougainvillea. You\'ve time-traveled to 1922 without leaving the city. Refugees brought their island homes here.\",im:\"It\'s 1922. A family escapes Turkey with memories. They build homes exactly like the ones they lost, stone by stone. Memory as architecture.\",t:\"Plaka area, east side near Acropolis. Free. Walk slowly. Respect residents. Photographs from specific angles only.",c:["history_big", "beautiful", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:64,n:"National Garden Hidden Corners — Secret Sanctuary",a:"Center",v:["beautiful", "quiet", "nature"],d:64,s:"A massive garden that tourists speed through but locals know has hidden ponds, trees, silence",st:"Paths twist. Shade pools. A small pond you\'re the only person at. This garden is refuge. A city that learned how to hide green.",im:"It\'s August, 40°C. A woman lies under trees. The city is chaos outside but here, it\'s Eden.",t:"Paths twist. Shade pools. A small pond you\'re the only person at. This garden is refuge. A city that learned how to hide green.\",im:\"It\'s August, 40°C. A woman lies under trees. The city is chaos outside but here, it\'s Eden.\",t:\"Center, walkable from everywhere. Free. Bring water. Go early morning or late afternoon. Find a bench. Sit for an hour.",c:["parks", "beautiful", "nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:65,n:"Strefi Hill Graffiti Sunset — Street Art Amphitheater",a:"Omonoia",v:["street_art", "beautiful", "night"],d:65,s:"A hill entirely covered in street art where the city glows below as artists finish their work",st:"Climb through living gallery. Each wall is art. Each view is better. At the top, the city spreads. Graffiti meets sunset.",im:"It\'s 8pm. An artist finishes. City light bounces off their paint. Perfect timing. Unlikely beauty.",t:"Climb through living gallery. Each wall is art. Each view is better. At the top, the city spreads. Graffiti meets sunset.\",im:\"It\'s 8pm. An artist finishes. City light bounces off their paint. Perfect timing. Unlikely beauty.\",t:\"Omonoia area. Free. Safe enough if you go before dark. Bring a camera. See where Athens\' creativity lives.",c:["street_art", "beautiful", "high_spots"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:66,n:"Exarchia Anarchist Walls — Political Art Alive",a:"Exarchia",v:["street_art", "weird", "local"],d:66,s:"A neighborhood where anarchist ideas are painted on every wall—living political philosophy",st:"Walk slowly. Read the Greek. Even if you don\'t understand words, the anger is clear. The hope is clear. This neighborhood refuses the system.",im:"It\'s now. An artist paints revolution. Police watch. By tomorrow, it might be covered. That\'s the cycle. Art as protest. Protest as art.",t:"Walk slowly. Read the Greek. Even if you don\'t understand words, the anger is clear. The hope is clear. This neighborhood refuses the system.\",im:\"It\'s now. An artist paints revolution. Police watch. By tomorrow, it might be covered. That\'s the cycle. Art as protest. Protest as art.\",t:\"Exarchia neighborhood. Safe during day. Respect the community. This is real politics, not Instagram.",c:["street_art", "local_only", "weird"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:67,n:"Psyrri Murals Walk — Young Artist District",a:"Psyrri",v:["street_art", "beautiful", "local"],d:67,s:"Where Athens\' young muralists prove themselves on walls of a neighborhood that welcomed them",st:"Colors everywhere. Styles evolving. Some walls change weekly. This is where art becomes identity.",im:"It\'s 2018. A young artist paints their first mural. It\'s good. Locals notice. By 2024, they\'re famous. It started here.",t:"Colors everywhere. Styles evolving. Some walls change weekly. This is where art becomes identity.\",im:\"It\'s 2018. A young artist paints their first mural. It\'s good. Locals notice. By 2024, they\'re famous. It started here.\",t:\"Psyrri neighborhood. Walk with intention. Support the cafés. This is real community culture.",c:["street_art", "beautiful", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:68,n:"Metaxourgeio Gallery District — Industrial Art Spaces",a:"Metaxourgeio",v:["art", "weird", "local"],d:68,s:"A former industrial area where abandoned warehouses became galleries—gritty, real, authentically artistic",st:"Raw spaces. Minimal curation. Art breathes here because nobody\'s selling. Just creating.",im:"It\'s 2010. Artists occupy abandoned warehouses. It\'s 2024. It\'s official now but still feels like occupation.",t:"Raw spaces. Minimal curation. Art breathes here because nobody\'s selling. Just creating.\",im:\"It\'s 2010. Artists occupy abandoned warehouses. It\'s 2024. It\'s official now but still feels like occupation.\",t:\"",c:["art", "abandoned", "local_only"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:69,n:"Gazi Industrial Art Center — Former Gas Factory",a:"Gazi",v:["art", "architecture", "local"],d:69,s:"A massive industrial complex converted to arts venue—where machinery became gallery",st:"Giant metal structures. Open floors. Outdoor sculptures. This is what happens when industry becomes culture.",im:"It\'s 1900. Gas is produced here. It\'s 2024. Art is produced. Same buildings, different creation.",t:"Giant metal structures. Open floors. Outdoor sculptures. This is what happens when industry becomes culture.\",im:\"It\'s 1900. Gas is produced here. It\'s 2024. Art is produced. Same buildings, different creation.\",t:\"Gazi neighborhood. Check for exhibitions. Often free entry. Bring friends. Stay late for events.",c:["art", "architecture", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:70,n:"Ancient Agora Hidden Corners — Democracy\'s Marketplace",a:"Plaka",v:["history", "quiet", "beautiful"],d:70,s:"The marketplace where philosophers debated, democrats built systems, ordinary Athenians bought fish",st:"Stone foundations. Temple of Hephaestus rises impossibly preserved. Walk where Socrates walked arguing about truth.",im:"It\'s 350 BC. A man buys vegetables. He votes today. Democracy is casual for him. For us, it\'s still remarkable.",t:"Stone foundations. Temple of Hephaestus rises impossibly preserved. Walk where Socrates walked arguing about truth.\",im:\"It\'s 350 BC. A man buys vegetables. He votes today. Democracy is casual for him. For us, it\'s still remarkable.\",t:\"Plaka, entrance near Acropolis. €10-12. Go early morning before crowds. Walk slowly. This ground holds democracy.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:71,n:"Kerameikos Cemetery — Athens\' Oldest Graves",a:"Centum",v:["history", "scary", "quiet"],d:71,s:"The oldest cemetery in Athens where graves from 3,500 years show how people mourned the dead",st:"Marble stones carved with names. Some graves are temples. Families visited here. Death was architecture here.",im:"It\'s 500 BC. A woman grieves her husband. She commissions a marble stele. It outlasts empires. He\'s remembered on stone.",t:"Marble stones carved with names. Some graves are temples. Families visited here. Death was architecture here.\",im:\"It\'s 500 BC. A woman grieves her husband. She commissions a marble stele. It outlasts empires. He\'s remembered on stone.\",t:\"Centrum. €8-10. Peaceful. Few visitors. Sit among the stones. Read the inscriptions. This is time crystallized.",c:["history_big", "scary", "famous_dead"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:72,n:"Roman Forum Underground Sections — Hidden Roman City",a:"Centrum",v:["history", "hidden", "quiet"],d:72,s:"Below modern Athens, a Roman city still stands, accessible through underground passages",st:"Descend into layers. Roman roads. Roman columns. Roman life beneath your feet, literally.",im:"It\'s 200 AD. A Roman walks these streets. It\'s 2024. Same streets, different feet, same stories.",t:"Descend into layers. Roman roads. Roman columns. Roman life beneath your feet, literally.\",im:\"It\'s 200 AD. A Roman walks these streets. It\'s 2024. Same streets, different feet, same stories.\",t:\"Near the Roman Agora. Some areas are accessible with tickets. Check opening hours. Bring a light.",c:["history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:73,n:"Ottoman-Era Hammam Baths — Turkish Heritage",a:"Centrum",v:["history", "weird", "quiet"],d:73,s:"A Turkish bath from the Ottoman occupation still functioning—steam and history mixed",st:"Undress. Enter heat. Stone, water, centuries. The bath remembers conquerors and the conquered soaking in the same water.",im:"It\'s 1600. An Ottoman official bathes. A Greek slave attends. Power in nakedness becomes insignificant. Water treats all equally.",t:"Undress. Enter heat. Stone, water, centuries. The bath remembers conquerors and the conquered soaking in the same water.\",im:\"It\'s 1600. An Ottoman official bathes. A Greek slave attends. Power in nakedness becomes insignificant. Water treats all equally.\",t:\"Centrum area. Check if still operating—some hammams are now museums. €10-15. Bring a towel. Respect customs.",c:["history_big", "weird", "architecture"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:74,n:"Byzantine Churches Scattered — Faith Preserved",a:"Plaka",v:["history", "beautiful", "quiet"],d:74,s:"Small Byzantine churches hidden throughout Plaka, each one a time capsule of faith and art",st:"Walk streets and find them—small doors, high domes, candlelight. Each church is perfect in miniature.",im:"It\'s 1000 AD. A woman lights a candle for a dead child. It\'s 2024. Another woman lights one. Same candle, same prayer.",t:"Walk streets and find them—small doors, high domes, candlelight. Each church is perfect in miniature.\",im:\"It\'s 1000 AD. A woman lights a candle for a dead child. It\'s 2024. Another woman lights one. Same candle, same prayer.\",t:\"Plaka neighborhood. Many are free. Some require donation. Respect. Wear appropriate clothing. Quiet is sacred here.",c:["history_big", "architecture", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:75,n:"Free Archaeological Days — Museum Hours Matter",a:"Multiple",v:["free_museum", "history", "beautiful"],d:75,s:"First Sunday of the month, Greek museums open free—treasures for no cost",st:"Check schedules. Major museums free. Crowds are intense but worth it. Ancient treasures stop being exclusive.",im:"It\'s the first Sunday. A student can\'t afford museums normally. Today, she walks through millennia free.",t:"Check schedules. Major museums free. Crowds are intense but worth it. Ancient treasures stop being exclusive.\",im:\"It\'s the first Sunday. A student can\'t afford museums normally. Today, she walks through millennia free.\",t:\"Check culture ministry website for exact dates. Arrive early. Some museums still have lines. Plan which one first.",c:["free_museum", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:76,n:"Open-Air Cinema Nights — Summer Movie Culture",a:"Multiple",v:["night", "beautiful", "local"],d:76,s:"Athenians watch movies under stars in rooftop cinemas—culture meets summer",st:"Find a rooftop. Climb stairs. Suddenly you\'re floating above the city watching films. The city lights are part of the show.",im:"It\'s July. A couple watches a film on a rooftop. Below, the Acropolis glows. Above, stars. Between, the moment matters.",t:"Find a rooftop. Climb stairs. Suddenly you\'re floating above the city watching films. The city lights are part of the show.\",im:\"It\'s July. A couple watches a film on a rooftop. Below, the Acropolis glows. Above, stars. Between, the moment matters.\",t:\"Summer only, May-September. Check websites for schedules. €8-12. Go early for good spots. Bring pillows.",c:["night", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:77,n:"Technopolis Free Concerts — Industrial Music Venue",a:"Gazi",v:["music", "free", "local"],d:77,s:"A former gas plant where the city hosts free concerts—metal factory becomes concert hall",st:"Acoustics in spaces never meant for music. Artists performing for Athens. Free. Community.",im:"It\'s 2000. Musicians discover an empty factory. By 2024, it\'s the city\'s heart. Ruins made beautiful.",t:"Acoustics in spaces never meant for music. Artists performing for Athens. Free. Community.\",im:\"It\'s 2000. Musicians discover an empty factory. By 2024, it\'s the city\'s heart. Ruins made beautiful.\",t:\"Gazi neighborhood. Check schedule online. Free. Often excellent artists. Arrive early. Bring friends.",c:["music", "free_museum", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:78,n:"Taverna Culture Thursday Night — Community Dinner",a:"Multiple",v:["local", "night", "free"],d:78,s:"Thursday nights when Athenians gather in neighborhood tavernas for ouzo, food, and life",st:"No tourists. Just Greeks eating, drinking, talking. Community condensed into one night.",im:"It\'s Thursday. A man walks to his regular taverna. They save his table. He orders the same thing. It\'s perfect again.",t:"No tourists. Just Greeks eating, drinking, talking. Community condensed into one night.\",im:\"It\'s Thursday. A man walks to his regular taverna. They save his table. He orders the same thing. It\'s perfect again.\",t:\"Find a taverna in your neighborhood. Go Thursday. €10-15 for dinner and drinks. Sit long. Listen to Greek being spoken.",c:["local_only", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:79,n:"Rembetiko Museum — Rebetiko Music\'s Soul",a:"Centrum",v:["music", "history", "quiet"],d:79,s:"A museum dedicated to rebetiko—the Greek blues born from pain and survival",st:"Listen to original recordings. See instruments. Understand that Greek sorrow is an art form.",im:"It\'s 1950. A woman sings about a man who left. Every woman here has that sorrow. The song is their religion.",t:"Listen to original recordings. See instruments. Understand that Greek sorrow is an art form.\",im:\"It\'s 1950. A woman sings about a man who left. Every woman here has that sorrow. The song is their religion.\",t:\"Centrum. €5-8. Small but profound. Go early. Listen with headphones. Feel it.",c:["music", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:80,n:"Acropolis Museum Back Galleries — Tourist-Free Collections",a:"Acropolis",v:["art", "quiet", "beautiful"],d:80,s:"The Acropolis Museum\'s less-known upper galleries where crowds never reach and art breathes",st:"Most tourists stop at the famous sculptures. Continue. Find rooms of Greek vases, small objects, intimate art.",im:"It\'s 400 BC. A potter makes a small cup. Now it\'s in a back gallery. You\'re the only person seeing their work.",t:"Most tourists stop at the famous sculptures. Continue. Find rooms of Greek vases, small objects, intimate art.\",im:\"It\'s 400 BC. A potter makes a small cup. Now it\'s in a back gallery. You\'re the only person seeing their work.\",t:\"Acropolis Museum. €15-20. Go upstairs when crowds are elsewhere. Spend hours. This museum is vast.",c:["art", "history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:81,n:"Oinochoe Wine Bar Neighborhood Crawl — Authentic Drinking",a:"Psyrri",v:["local", "night", "wine"],d:81,s:"Small wine bars in Psyrri where locals drink Greek wines locals have never heard of",st:"Walk between small bars. Taste wine. Chat with owners. Wine is serious here, not tourism.",im:"It\'s 9pm. An owner pours a wine from a vineyard 3 people know about. You taste history in a glass.",t:"Walk between small bars. Taste wine. Chat with owners. Wine is serious here, not tourism.\",im:\"It\'s 9pm. An owner pours a wine from a vineyard 3 people know about. You taste history in a glass.\",t:\"Psyrri neighborhood. €4-8 per glass. Go Wednesday-Saturday nights. Ask owners. Eat small plates. Stay late.",c:["local_only", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
