  {id:82,n:"Panathenaic Stadium Silent Morning — Olympic Ghost",a:"South Athens",v:["history", "quiet", "beautiful"],d:82,s:"Where the first modern Olympics happened—now an almost-empty stadium you can walk alone",st:"The shape of ancient competition still visible. Sit in the stands. Imagine the roar. Now silence. That contrast is profound.",im:"It\'s 1896. Thousands cheer. It\'s 2024. One person sits silently. The stadium remembers the noise.",t:"The shape of ancient competition still visible. Sit in the stands. Imagine the roar. Now silence. That contrast is profound.\",im:\"It\'s 1896. Thousands cheer. It\'s 2024. One person sits silently. The stadium remembers the noise.\",t:\"South side. €5-8. Go morning weekday. Stadium is emptier then. Walk the track. Sit in VIP. Feel Olympic ghost.",c:["history_big", "architecture", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:83,n:"Plaka Streets at 6am — City Before Humans",a:"Plaka",v:["beautiful", "quiet", "hidden"],d:83,s:"Walking Plaka before tourists wake—streets are yours, shadows are long, Acropolis is gold",st:"Everything is open, nothing is crowded. The neighborhood breathes. You see what it wants to be.",im:"It\'s 6am. A cat walks your path. You\'re the only human. The city is still sleeping.",t:"Everything is open, nothing is crowded. The neighborhood breathes. You see what it wants to be.\",im:\"It\'s 6am. A cat walks your path. You\'re the only human. The city is still sleeping.\",t:\"Plaka. Set an alarm. Walk slowly. Take photos without crowds. Sit at a café and watch day happen.",c:["beautiful", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:84,n:"Temple of Olympian Zeus Silent Corners — Giant Columns",a:"South Athens",v:["history", "beautiful", "quiet"],d:84,s:"The largest temple ever built in Greece—15 columns still stand, showing scale that makes humans small",st:"Walk between columns taller than buildings. Sky between stones. This is what gods were built to house.",im:"It\'s 150 AD. A column is finished. It\'s the biggest human effort. It\'s 2024. It still humbles.",t:"Walk between columns taller than buildings. Sky between stones. This is what gods were built to house.\",im:\"It\'s 150 AD. A column is finished. It\'s the biggest human effort. It\'s 2024. It still humbles.\",t:\"South side of Centrum. €8-10. Go late afternoon when light angles through columns. Bring a book. Sit small.",c:["history_big", "architecture", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:85,n:"National Library Reading Room — Literary Quiet",a:"South Athens",v:["quiet", "history", "beautiful"],d:85,s:"A massive reading room where Greek scholarship lives—silence as volume",st:"Scholars work. Books stack everywhere. This is where Greek culture preserves itself.",im:"It\'s any era. A scholar researches. Greece survives because people care this much.",t:"Scholars work. Books stack everywhere. This is where Greek culture preserves itself.\",im:\"It\'s any era. A scholar researches. Greece survives because people care this much.\",t:\"South side. Check hours. Often free to visit, admission required to use. Beautiful architecture alone. Worth seeing.",c:["history_big", "architecture", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:86,n:"Stavros Niarchos Foundation Cultural Center — Modern Beauty",a:"South Athens",v:["beautiful", "free", "architecture"],d:86,s:"A modern cultural center designed to honor Greek culture—free to explore, stunning architecture",st:"Contemporary building. Library. Opera house. Landscapes. Free to walk around. Culture as public gift.",im:"It\'s 2016. A building opens. Instantly it\'s part of Athens. Designed to belong.",t:"Contemporary building. Library. Opera house. Landscapes. Free to walk around. Culture as public gift.\",im:\"It\'s 2016. A building opens. Instantly it\'s part of Athens. Designed to belong.\",t:\"South side, accessible by metro. Free public spaces. Exhibitions sometimes free. Bring a camera. Architecture is art here.",c:["architecture", "beautiful", "free_museum"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:87,n:"Mesogeion Avenue Late Night Walk — City Pulse",a:"Omonoia",v:["night", "local", "weird"],d:87,s:"A major avenue at 2am showing another Athens—sex workers, night people, the city naked",st:"Safe enough if respectful. This is where Athens lives when it\'s too honest for daylight.",im:"It\'s 2am. Different humans. Different rules. Different Athens.",t:"Safe enough if respectful. This is where Athens lives when it\'s too honest for daylight.\",im:\"It\'s 2am. Different humans. Different rules. Different Athens.\",t:\"Evening walk, not dawn walk. Stay on main avenue. Don\'t photograph people. Be respectful of the community.",c:["night", "local_only"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:88,n:"Athenian Pastry Shop Sunrise Route — Sesame Bread Ritual",a:"Multiple",v:["local", "breakfast", "free"],d:88,s:"Visiting traditional bakeries at 5:30am when Athenians buy warm bread before work",st:"Ovens still warm. Sesame bread just pulled. Smell of yeast and success. Community gathers.",im:"It\'s 5:45am. A woman buys bread. Same baker, same bread, 30 years. It\'s her breakfast, her ritual.",t:"Ovens still warm. Sesame bread just pulled. Smell of yeast and success. Community gathers.\",im:\"It\'s 5:45am. A woman buys bread. Same baker, same bread, 30 years. It\'s her breakfast, her ritual.\",t:\"Find bakeries near your hotel. 5:30am. Cash. Buy a sesame bread. Eat it warm. This is Athens starting day.",c:["local_only", "breakfast"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:89,n:"Fragmentation Cemetery Tour — How Athens Grieves",a:"South Athens",v:["history", "scary", "quiet"],d:89,s:"A cemetery showing how Greeks memorialize—marble mausoleums, fresh flowers, photos on graves",st:"Walk slowly. Read names. Recent graves next to ancient ones. This is where mourning becomes architecture.",im:"It\'s 1990. A woman visits her husband\'s grave. It\'s 2024. Her grandson visits both. Love persists in marble.",t:"Walk slowly. Read names. Recent graves next to ancient ones. This is where mourning becomes architecture.\",im:\"It\'s 1990. A woman visits her husband\'s grave. It\'s 2024. Her grandson visits both. Love persists in marble.\",t:\"South side cemeteries. Free. Respectful walking. Wear appropriate clothes. Go morning.",c:["history_big", "scary"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:90,n:"Neighborhood Grandma Kitchens — Eating Family Meals",a:"Multiple",v:["local", "food", "hidden"],d:90,s:"Tiny restaurants run by grandmothers cooking recipes from 60 years of family tradition",st:"No menu. She points. You eat what she made. Food tastes like home tastes to Greeks.",im:"It\'s 1960. A woman learns to cook from her mother. It\'s 2024. She feeds strangers her family\'s memories.",t:"No menu. She points. You eat what she made. Food tastes like home tastes to Greeks.\",im:\"It\'s 1960. A woman learns to cook from her mother. It\'s 2024. She feeds strangers her family\'s memories.\",t:\"Every neighborhood has one. Ask locals. €8-12. Arrive at lunch. Eat what\'s recommended. You\'ll be adopted.",c:["local_only", "food"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:91,n:"Syntagma Square Changing of Guard — Ceremony Unchanged",a:"Centrum",v:["history", "quiet", "beautiful"],d:91,s:"Every hour, colorfully-dressed soldiers change position with choreography unchanged for 150 years",st:"High knees. Perfect timing. Military precision as art. The ceremony is beautiful because it\'s pointless and perfect.",im:"It\'s 1870. A soldier stands. It\'s 2024. His descendant stands. Same ceremony, different century.",t:"High knees. Perfect timing. Military precision as art. The ceremony is beautiful because it\'s pointless and perfect.\",im:\"It\'s 1870. A soldier stands. It\'s 2024. His descendant stands. Same ceremony, different century.\",t:\"Syntagma Square, Centrum. Free to watch. Go on the hour. The ceremony lasts 10 minutes. Watch the precision.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:92,n:"Hymettus Mountain Morning Bike — Escape Upward",a:"East Athens",v:["nature", "beautiful", "quiet"],d:92,s:"Biking into mountains east of the city—pine forests, views, Athens becoming small below",st:"Climb. The city shrinks. Fresh air. The mountain is escape that takes 30 minutes.",im:"It\'s 8am. A cyclist leaves the city. In 1 hour, the city is a memory. The mountain is everything.",t:"Climb. The city shrinks. Fresh air. The mountain is escape that takes 30 minutes.\",im:\"It\'s 8am. A cyclist leaves the city. In 1 hour, the city is a memory. The mountain is everything.\",t:\"East side starting points. Rent a bike. Bring water. Go early morning when it\'s cool. Return by afternoon.",c:["nature", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:93,n:"Periptero Nighttime Chat — Greek Convenience Store Wisdom",a:"Multiple",v:["local", "night", "weird"],d:93,s:"Athens\' 24-hour kiosks where the owner is a philosopher and customers are family",st:"Greeks gather. Talk about life. A cigarette kiosk becomes a support group.",im:"It\'s 2am. A drunk man buys water. The owner gives him advice. He doesn\'t remember tomorrow but the kindness stays.",t:"Greeks gather. Talk about life. A cigarette kiosk becomes a support group.\",im:\"It\'s 2am. A drunk man buys water. The owner gives him advice. He doesn\'t remember tomorrow but the kindness stays.\",t:\"Every corner has one. Go late night. Buy something. Talk to the owner. This is community in its smallest form.",c:["local_only", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:94,n:"Acropolis Museum Café Upper Floor — 360 Views",a:"Acropolis",v:["beautiful", "quiet", "free"],d:94,s:"A café with a view of the Acropolis from inside looking out—perspective reversed",st:"Sit inside, watch the monument. The city\'s most famous site seen from unusual angle. Coffee costs €3.",im:"It\'s noon. The Acropolis glows. A woman drinks coffee looking at it. She sees it differently than everyone else.",t:"Sit inside, watch the monument. The city\'s most famous site seen from unusual angle. Coffee costs €3.\",im:\"It\'s noon. The Acropolis glows. A woman drinks coffee looking at it. She sees it differently than everyone else.\",t:\"Acropolis Museum (museum entry not required for café). €3-5. Sit long. Watch light change.",c:["beautiful", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:95,n:"Port of Piraeus Sunset Walk — Fisherman\'s Pier",a:"Piraeus",v:["beautiful", "quiet", "romantic_water"],d:95,s:"Walking the fishing pier at sunset watching boats return with day\'s catch, sea life unchanged",st:"Fishermen tie up. Smell of salt and sea. The work is real. The beauty is incidental.",im:"It\'s 6pm. A fisherman unloads octopus. Same job his grandfather did. Same sea. Time hasn\'t changed this.",t:"Fishermen tie up. Smell of salt and sea. The work is real. The beauty is incidental.\",im:\"It\'s 6pm. A fisherman unloads octopus. Same job his grandfather did. Same sea. Time hasn\'t changed this.\",t:\"Piraeus, 20 min by metro. Walk the fisherman\'s pier area. Smell the sea. Eat seafood at a waterfront taverna.",c:["beautiful", "romantic_water"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:96,n:"Thisio Neighborhood Walking — Artist Quarter",a:"Thisio",v:["art", "local", "beautiful"],d:96,s:"Where young artists live and work—galleries hidden in converted spaces, studio doors open",st:"Walk and find art. An open door shows someone creating. No gatekeeping. Just work.",im:"It\'s 2020. An artist opens their studio door. A stranger walks in. Suddenly strangers become audience.",t:"Walk and find art. An open door shows someone creating. No gatekeeping. Just work.\",im:\"It\'s 2020. An artist opens their studio door. A stranger walks in. Suddenly strangers become audience.\",t:\"Thisio neighborhood. Walk slowly. Look for open studio signs. Knock on doors. Most artists are happy to show.",c:["art", "local_only", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:97,n:"Byzantine Empire Coins Museum — Empire\'s Small Evidence",a:"Centrum",v:["history", "quiet", "beautiful"],d:97,s:"A museum of Byzantine coins showing power compressed into metal, empires into small circles",st:"Hold them (if allowed). These coins ruled worlds. Now they\'re small enough to forget.",im:"It\'s 800 AD. An emperor mints a coin. It\'s 2024. The coin outlasts the empire.",t:"Hold them (if allowed). These coins ruled worlds. Now they\'re small enough to forget.\",im:\"It\'s 800 AD. An emperor mints a coin. It\'s 2024. The coin outlasts the empire.\",t:\"Centrum. Limited public access. Check hours. €5-8. Small but precious. Go early morning.",c:["history_big", "architecture"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:98,n:"Marathon Valley Hike — Hero Ground Underfoot",a:"Day Trip",v:["history", "nature", "quiet"],d:98,s:"Hiking the valley where the famous race happened—your feet on the same earth as ancient heroes",st:"Walk 40km of hills. This is what that runner did after the battle. His feet were superhuman. Your feet are just feet. But they walk history.",im:"It\'s 490 BC. A runner collapses saying \'Νενικήκαμεν\' (We won). It\'s 2024. You hike this to understand his exhaustion and joy.",t:"Walk 40km of hills. This is what that runner did after the battle. His feet were superhuman. Your feet are just feet. But they walk history.\",im:\"It\'s 490 BC. A runner collapses saying \'Νενικήκαμεν\' (We won). It\'s 2024. You hike this to understand his exhaustion and joy.\",t:\"North, 40 km day trip. Hiking maps available. Start early. Bring water. Don\'t run.",c:["history_big", "nature"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:99,n:"Plaka Balcony Night Drinking — Above the Crowds",a:"Plaka",v:["beautiful", "night", "quiet"],d:99,s:"A rooftop bar in Plaka where you\'re above the chaos—still in it, but elevated",st:"Crowded streets below. Your balcony quiet. Wine in hand. The city is happening somewhere else.",im:"It\'s 10pm. Below is tourist chaos. You\'re 4 floors up. You\'ve escaped without leaving.",t:"Crowded streets below. Your balcony quiet. Wine in hand. The city is happening somewhere else.\",im:\"It\'s 10pm. Below is tourist chaos. You\'re 4 floors up. You\'ve escaped without leaving.\",t:\"Plaka, multiple rooftop bars. €8-12 drinks. Arrive 9pm before 11pm chaos. Stay late.",c:["night", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:100,n:"Sacred Way to Eleusis — Ancient Pilgrimage Route",a:"Day Trip",v:["history", "beautiful", "quiet"],d:100,s:"Walking the ancient pilgrimage road where Greeks walked for 1,500 years to mystery cult temples",st:"Same stones (partially). Same direction. You\'re walking a prayer route a million people walked before you.",im:"It\'s 100 AD. Pilgrims walk this road for sacred mysteries. It\'s 2024. You walk it for history. Same road, different devotion.",t:"Same stones (partially). Same direction. You\'re walking a prayer route a million people walked before you.\",im:\"It\'s 100 AD. Pilgrims walk this road for sacred mysteries. It\'s 2024. You walk it for history. Same road, different devotion.\",t:\"20 km walk from Athens toward Eleusis. Day trip. Check archaeology site hours. Walking is free. Site entry €10-12.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""}

  {id:101,n:"Anafiotika Cycladic Village",a:"Plaka",v:["beautiful","hidden","history"],d:10,s:"Whitewashed alleys with blue doors hidden under the Acropolis — Athens\' secret island enclave",st:"Tuck yourself into Anafiotika, where narrow cobblestone streets lined with whitewashed Cycladic buildings create the illusion of being on an Aegean island. Go at sunrise for maximum atmosphere; be quiet as residents still live here.",im:"Time-travel: Built by islanders from Anafi in the 1920s-50s who migrated to Athens; they recreated home here.",t:"Free. Enter from Plaka near the Acropolis Museum. Early morning best.",c:["architecture","romantic_water"],r:"g",nn:"Αναφιώτικα",ns:"Λευκοί δρόμοι με μπλε πόρτες — ελληνικό νησιωτικό χωριό",nst:"Ανακαλύψτε τα κυκλαδικά σπίτια κρυμμένα κάτω από την Ακρόπολη.",nt:"Δωρεάν. Είσοδος από την Πλάκα. Πρωί καλύτερο."},
  {id:102,n:"National Library Free Reading Room",a:"Omonia",v:["quiet","history","free"],d:8,s:"Elegant reading room with soaring ceilings — a literary sanctuary open to the public",st:"The Stavros Niarchos Foundation Library offers stunning architecture with a dramatic reading room overlooking the city. Locals use it as a quiet refuge; the light from the glass ceiling creates an almost spiritual atmosphere.",im:"Time-travel: Opened in 2018, the building was designed by Italian architect Renzo Piano.",t:"Free entry to public areas. Quiet atmosphere expected. Ileion/Troon area.",c:["architecture","free_museum"],r:"g",nn:"Εθνική Βιβλιοθήκη Αναγνωστήριο",ns:"Κομψή αίθουσα ανάγνωσης με οροφές",nst:"Κάθεστε και διαβάστε σε αυτό το όμορφο χώρο.",nt:"Δωρεάν είσοδος. Περιοχή Ιλίου/Τρίων."}

,{id:112,n:"Areopagus Hill Slippery Summit",a:"Plaka",v:["hidden", "views"],d:15,s:"Dramatic golden-hour rock perch opposite the Acropolis—pure thrill minus the crowds.",st:"Climb the grippy stone for a front-row seat to Athens' ancient drama, where St. Paul once preached to philosophers. The sunset paints the Parthenon in fiery gold, while city lights flicker awake below. It's raw, rocky romance with zero entry fuss.",im:"Imagine gripping ancient rock as the Acropolis glows orange, wind whispering secrets of trials past.",t:"Metro to Monastiraki, 10-min walk up uneven steps; free always; golden hour or night with headlamp. Wear grippy shoes—super slippery!",c:["hills", "ancient"],r:"g",nn:"Λόφος Αρείου Πάγου",ns:"Δραματική βραχώδης κορυφή απέναντι από την Ακρόπολη—καθαρή συγκίνηση χωρίς πλήθη.",nst:"Ανεβαίνεις την απότομη πέτρα για θέα στην αρχαία δράμα της Αθήνας, όπου ο Απόστολος Παύλος μίλησε σε φιλοσόφους. Το ηλιοβασίλεμα βάφει την Παρθενώνα χρυσό, ενώ τα φώτα της πόλης ανάβουν. Άγρια, βραχώδης ρομαντική εμπειρία χωρίς εισιτήριο.",nt:"Μετρό Μοναστηράκι, 10' περπάτημα σε ανώμαλα σκαλιά· πάντα δωρεάν· χρυσή ώρα ή νύχτα με φακό. Φόρα παπούτσια με grip—πολύ ολισθηρό!"},
{id:113,n:"Syntagma Metro Underground Museum",a:"Syntagma",v:["hidden", "museum"],d:10,s:"Ancient finds and public art glowing under the city's busiest station—time travel for free.",st:"Beneath the hustle, glass cases reveal excavated treasures from Athens' layered past, like pottery shards and statues unearthed during metro digs. Commuters rush by oblivious, but you pause in this subterranean gallery of history. It's the capital's secret timeline, pulsing with modern life above.",im:"Picture ancient relics lit neon under rushing trains, bridging 3,000 years in one glance.",t:"Syntagma metro station, follow signs to displays; always free; anytime, but less crowded off-peak. Combine with guard change upstairs.",c:["museum", "ancient"],r:"g",nn:"Υπόγειο Μουσείο Συντάγματος",ns:"Αρχαία ευρήματα και τέχνη κάτω από τον πιο πολυσύχναστο σταθμό—ταξίδι στον χρόνο δωρεάν.",nst:"Κάτω από τη φασαρία, βιτρίνες αποκαλύπτουν θησαυρούς από το παρελθόν, σαν όστρακα και αγάλματα από εργασίες μετρό. Επιβάτες περνούν αδιάφοροι, εσύ σταματάς σε αυτή την υπόγεια γκαλερί. Μυστική χρονογραμμή της πρωτεύουσας, με ζωή πάνω.",nt:"Σταθμός Συντάγματος, ακολούθησε πινακίδες· πάντα δωρεάν· οποτεδήποτε, λιγότερος κόσμος εκτός αιχμής. Συνδύασε με αλλαγή φρουράς πάνω."},
{id:114,n:"Serafio Sports Complex",a:"Keramikos",v:["hidden", "active"],d:25,s:"Free courts and facilities to sweat off souvlaki in gritty urban playground.",st:"Tucked near ancient graves, this modern complex buzzes with locals spiking volleyballs and shooting hoops under the Athens sun. No tourists, just real sweat and cheers echoing off concrete walls. It's your gritty gateway to feeling like an Athenian athlete.",im:"Feel the thud of basketballs and roar of local games amid ruins' shadow.",t:"Metro Kerameikos, 5-min walk to Pireos 175; free access to courts/gym; mornings best for pickup games. Bring gear.",c:["sports", "urban"],r:"g",nn:"Αθλητικό Πάρκο Σεράφειο",ns:"Δωρεάν γήπεδα να ιδρώσεις σουβλάκια σε αστικό παιδική χαρά.",nst:"Κοντά σε αρχαίους τάφους, βουίζει με ντόπιους σε βόλεϊ και μπάσκετ κάτω από ήλιο. Χωρίς τουρίστες, μόνο ιδρώτας και ζητωκραυγές σε τσιμεντένια τείχη. Η gritty πύλη σου να νιώσεις Αθηναίος αθλητής.",nt:"Μετρό Κεραμεικός, 5' περπάτημα Πειραιώς 175· δωρεάν γήπεδα/γυμναστήριο· πρωί για ματς. Φέρε εξοπλισμό.",ef:"Almost free and worth it: Varvakios Market meats, €5 gyro nearby."},
{id:115,n:"Davelis Cave",a:"Penteli",v:["hidden", "cave"],d:45,s:"Eerie urban-legend cave day trip—go with daylight and a buddy for spooky vibes.",st:"Deep in Penteli's hills, this bandit-haunted cavern drips with mystery and graffiti from rebel pasts. Legends whisper of treasures and ghosts, as cool air hits your face in the shadowy depths. It's Athens' wild underbelly, far from sanitized tours.",im:"Echoes of dripping water and flickering torchlight in rebel hideout shadows.",t:"Bus 240 from Pedion Areos to Penteli, 30-min hike; free entry; daylight only. Buddy up, headlamp essential.",c:["caves", "hiking"],r:"g",nn:"Σπήλαιο Νταβέλη",ns:"Φριχτό σπήλαιο θρύλων—φως μέρας και φίλο για ανατριχίλες.",nst:"Στα βουνά Πεντέλης, σπήλαιο ληστών στάζει μυστικά και γκράφιτι επαναστατών. Θρύλοι ψιθυρίζουν θησαυρούς και φαντάσματα, δροσερός αέρας στα σκοτεινά βάθη. Η άγρια πλευρά της Αθήνας, μακριά από τουριστικά.",nt:"Λεωφορείο 240 από Πεδίον Άρεως σε Πεντέλη, 30' πεζοπορία· δωρεάν· μόνο φως μέρας. Με φίλο, φακό απαραίτητο.",sf:"Cheap stay: Penteli guesthouses ~€40/night."},
{id:116,n:"First Cemetery of Athens",a:"Mets",v:["hidden", "cemetery"],d:20,s:"Marble open-air museum of tombs and sculptures—no queues, pure serene reflection.",st:"Wander shaded paths amid neoclassical masterpieces honoring poets, heroes, and stars like Melina Mercouri. Ornate angels and marble weepers guard eternal rests in this hauntingly beautiful necropolis. It's Athens' quiet tribute to the great departed, steps from jazz vibes.",im:"Sun filtering through cypress trees onto intricate marble sculptures of forgotten legends.",t:"Metro Evangelismos, 15-min walk to Anapafseos St; always free; early morning for peace. Respectful dress.",c:["cemetery", "history"],r:"g",nn:"Πρώτο Νεκροταφείο Αθηνών",ns:"Μαρμάρινο υπαίθριο μουσείο τάφων—χωρίς ουρές, καθαρή γαλήνη.",nst:"Περπάτα σε σκιερές διαδρομές ανάμεσα σε νεοκλασικά αριστουργήματα για ποιητές, ήρωες, Μελίνα Μερκούρη. Άγγελοι και μαρμάρινοι θρήνοι φυλάνε αιώνιες ανάπαυλες. Ήσυχο φόρο τιμής στους μεγάλους, κοντά σε τζαζ.",nt:"Μετρό Ευαγγελισμός, 15' περπάτημα Αναπαύσεως· πάντα δωρεάν· πρωί για ησυχία. Σεβαστικό ντύσιμο.",ef:"Almost free and worth it: Mets tavernas, €10 meze."},
{id:117,n:"Ardittos Hill Trails",a:"Mets",v:["hidden", "hiking"],d:18,s:"Wooded paths with surprise Acropolis and stadium views—local picnic secret.",st:"Snake through century-old cottages and bougainvillea-draped mansions on steep, secret streets. Unexpected panoramas unfold over the Panathenaic's photogenic track and glowing Acropolis. It's Mets' drowsy village escape, alive with hidden courtyards.",im:"Picnic blanket amid wildflowers, Acropolis framed by ancient pines.",t:"Metro Acropolis, walk via Markou Mousourou; free; sunset or dawn. Sturdy shoes for trails.",c:["hills", "views"],r:"g",nn:"Λόφος Αρδηττού",ns:"Δασωμένα μονοπάτια με εκπληκτικές θέες—μυστικό πικνίκ ντόπιων.",nst:"Στριφογυρίστε σε αιωνόβια σπίτια και μπουκαμβίλιες σε απόκρημνους δρόμους. Πανόραμα Παναθηναϊκού και Ακρόπολης ξεδιπλώνεται. Δραστική απόδραση χωριού Mets, με κρυμμένες αυλές.",nt:"Μετρό Ακρόπολη, περπάτημα Μάρκου Μουσούρου· δωρεάν· ηλιοβασίλεμα/ξεκίνημα. Ανθεκτικά παπούτσια."},
{id:118,n:"Kaisariani Monastery Trails",a:"Hymettus",v:["hidden", "monastery"],d:35,s:"11th-century Byzantine gem in pine forests—serene mountain hush.",st:"Nestled on Hymettus slopes, this preserved holy site hums with ancient chants and wild thyme scents. Trails wind through pines to frescoed interiors glowing with history. Far from bustle, it's a soul-soothing pilgrimage into green solitude.",im:"Chanting echoes in fresco-lit chapels, pines swaying outside.",t:"Bus 236 from Syntagma to Kaisariani, 20-min hike; free; weekdays morning. Modest attire.",c:["monastery", "hiking"],r:"g",nn:"Μονή Καισαριανής",ns:"Βυζαντινό κόσμημα σε πευκόδασος—γαλήνια βουβή βουνού.",nst:"Στα πλάγια Υμηττού, ιερός χώρος βουίζει ύμνους και θυμάρι. Μονοπάτια σε πεύκα προς frescoes ιστορίας. Μακριά από φασαρία, ψυχική πιλοπορία σε πράσινη μοναξιά.",nt:"Λεωφορείο 236 από Σύνταγμα σε Καισαριανή, 20' πεζοπορία· δωρεάν· πρωί καθημερινές. Μέτριο ντύσιμο.",sf:"Cheap stay: Hymettus hostels ~€35/night."}];

<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TBGS={"places":"url('../../textures/tex2.png') center/cover no-repeat","collections":"url('../../textures/tex3.png') center/cover no-repeat","missions":"url('../../textures/tex4.png') center/cover no-repeat","plan":"url('../../textures/tex1.png') center/cover no-repeat","phrases":"url('../../textures/tex2.png') center/cover no-repeat","default":"url('../../textures/tex2.png') center/cover no-repeat"};function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
{/* dark scrim over photo */}
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Athens Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Athens Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
