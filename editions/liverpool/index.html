,{id:112,n:"Albert Dock — Waterfront Conversion",a:"Albert Dock",v:["beautiful","history"],d:2,s:"Victorian dock converted to bars, galleries, museums—but the bones of industrial history remain visible.",st:"Built 1846. Warehouses and cranes. Once the heart of shipping. Now galleries, museums, restaurants. The architecture is still industrial but the function is leisure. It works somehow. The water is genuinely beautiful at sunset.",im:"The dock at sunset. Victorian red brick. Reflected light. The water glowing.",t:"Free to walk. Museums €15. Good for evening drinks. Waterfront restaurants are tourist-marked but location is genuine.",c:["beautiful","history"],r:"g",nn:"Albert Dock",ns:"Muelle victoriano convertido a bares, galerías, museos",nst:"Construido 1846. Almacenes y grúas. Ahora galerías, museos, restaurantes. La arquitectura sigue siendo industrial.",nt:"Libre para caminar. Museos €15. Bueno para bebidas por la noche."},;
,
  {id:113,n:"The Beatles Story — Museum Walk",a:"Albert Dock",v:["beautiful","history"],d:60,s:"Museum telling the Beatles' story from Liverpool docks to global fame; it's earnest, not slick.",st:"Walk through. The Cavern Club beginning. Liverpool in the 1960s. The museum doesn't hype—it shows documents, photos, instruments. Few tourists understanding the context. The city made them. You feel it here.",im:"Photographs on walls. A bass guitar behind glass. Black-and-white Liverpool streets.",t:"Go 10am weekdays. Tickets €20. Spend 60 min minimum. Start in the early years section.",c:["greatest_hits"],r:"g",nn:"The Beatles Story",ns:"Musée racontant l\'histoire des Beatles",nst:"Le musée ne surenchérit pas. Des documents, des photos, des instruments. La ville les a créés.",nt:"10h en semaine. Commencez par les premières années."},
  {id:114,n:"Royal Albert Dock — Waterfront Conversion",a:"Albert Dock",v:["beautiful","history"],d:45,s:"Victorian dock converted to galleries, museums, and restaurants; the industrial bones show through.",st:"Walk the waterfront. 1846 construction. Red brick warehouses reflected in water. Museums and galleries inside the buildings. Tate Liverpool on the converted warehouse top floor. The architecture is still industrial. The function is leisure now. It works.",im:"Red brick reflected in water. Victorian crane. People walking along the dock at sunset.",t:"Free to walk. Museums €12-18 each. Go 4pm-6pm when light is golden. Waterfront restaurants are tourist-marked but the view is genuine.",c:["greatest_hits"],r:"g",nn:"Royal Albert Dock",ns:"Dock victorien converti en musées",nst:"1846. Les os industriels sont visibles. Architecture sérieuse.",nt:"16h-18h pour la lumière. Musées €12-18."},
  {id:115,n:"Liverpool Cathedral — Massive Medieval",a:"Downtown",v:["history","beautiful"],d:50,s:"Largest cathedral in the UK; the scale takes your breath away—Gothic ambition in stone.",st:"Walk up the steps. The west facade rises impossibly high. Inside: space so vast your voice echoes. Gothic arches. Stone work over 100 years to build. Few tourists understanding the engineering feat. You feel small.",im:"Stone arches rising. Light through tall windows. The nave stretching far away.",t:"Free entry. Go 10am-12pm weekdays. Climb the tower (€5) for views. 50 min minimum inside.",c:["greatest_hits"],r:"g",nn:"Liverpool Cathedral",ns:"Cathédrale géante gothique",nst:"L\'échelle prend le souffle. Construction gothique ambitieuse.",nt:"10h-12h en semaine. Montée à la tour €5."},
  {id:116,n:"Tate Liverpool — Converted Warehouse Gallery",a:"Albert Dock",v:["beautiful","art","quiet"],d:60,s:"Art museum inside a converted dock warehouse; the building is the artwork too.",st:"Walk in. Concrete warehouse. Now a gallery. Natural light from high windows. Art on white walls. Few crowds. The industrial past is visible in the architecture. The art matters, but the space matters more.",im:"Concrete pillars. White walls. A painting. Natural light from above.",t:"€15 entry. Go 10am-1pm weekdays for quiet. Spend 60 min minimum. Top floor has dock views.",c:["greatest_hits"],r:"g",nn:"Tate Liverpool",ns:"Galerie d\'art dans entrepôt converti",nst:"Le bâtiment est l\'œuvre d\'art. Espace industriel épuré.",nt:"10h-13h en semaine. Étage supérieur vue sur le dock."},
  {id:117,n:"Walker Art Gallery — Pre-Raphaelite Masterpieces",a:"Downtown",v:["beautiful","art","history"],d:75,s:"Pre-Raphaelite paintings in a neoclassical building; some of the best works of the movement.",st:"Walk in. The paintings are serious. Pre-Raphaelites from Dante Gabriel Rossetti, John Everett Millais. The museum is quiet. Few crowds understanding the detail. The neoclassical building has high ceilings, natural light. You feel like you\'re in the Victorian era.",im:"A Pre-Raphaelite painting. Rich colors. Medieval detail. Museum light.",t:"Free entry. Go 10am-5pm weekdays. Allow 75 min minimum. Start with the Pre-Raphaelite gallery.",c:["greatest_hits"],r:"g",nn:"Walker Art Gallery",ns:"Galerie avec chefs-d\'œuvre préraphaélites",nst:"Les peintures sont sérieuses. Espace calme, peu de visiteurs.",nt:"10h-17h en semaine. Commencez par la galerie préraphaélite."},
  {id:118,n:"St George\'s Hall — Victorian Civic Pride",a:"Downtown",v:["history","beautiful"],d:40,s:"Neoclassical concert hall built to show Liverpool's power; the interior is stunning.",st:"Walk in. The Great Hall rises. Stone columns. Marble. The acoustics are perfect—designed for symphony. Liverpool in the 1850s had serious money. You feel it. Tours show the engineering. Few tourists know it exists.",im:"Stone columns rising. High ceiling with details. Light through tall windows.",t:"Free to walk outside. Tours €7-15. Go 11am-3pm weekdays. Tours take 45 min.",c:["greatest_hits"],r:"g",nn:"St George\'s Hall",ns:"Salle néoclassique de fierté victorienne",nst:"Le Grand Hall s\'élève. Marbre et pierre. Acoustique parfaite.",nt:"Tours €7-15. 11h-15h en semaine."},
  {id:119,n:"Sefton Park Palm House — Victorian Glass Cathedral",a:"Sefton Park",v:["beautiful","architecture","quiet"],d:45,s:"Victorian glass conservatory filled with tropical plants; it's a cathedral of iron and glass.",st:"Walk in. The structure rises—glass and iron. Tropical plants everywhere. The air is warm. Victorian engineering showing strength and precision. Few crowds. The space feels like stepping into another century.",im:"Glass dome overhead. Tropical plants. Iron framework. Warm humid air.",t:"€6 entry. Go 10am-3pm weekdays. 45 min minimum. Bring a camera—the light is perfect.",c:["greatest_hits"],r:"g",nn:"Sefton Park Palm House",ns:"Serre victorienne en verre et fer",nst:"Structure de verre et fer victorienne. Plantes tropicales. Espace cathédral.",nt:"€6. 10h-15h en semaine. Lumière parfaite pour photos."},
  {id:120,n:"Anfield Stadium — Football Atmosphere Raw",a:"Anfield",v:["local","history","weird"],d:40,s:"Home of Liverpool FC; the atmosphere in and around the stadium is visceral, real.",st:"Walk around outside on matchday or tour day. The Shankly Gates. The red banners. The Kop stand. Locals are serious about this. It\'s not tourism—it\'s faith. The city breathes football. You feel the history and intensity.",im:"Red banners. The Kop stand rising. People in red walking past.",t:"Tours €20 (non-matchday). Matchday atmosphere free on the streets. Go 2 hours before kickoff. Wear red (or neutral).",c:["greatest_hits"],r:"g",nn:"Anfield Stadium",ns:"Atmosphère de football crue et réelle",nst:"Les portes Shankly. Les bannières rouges. L\'atmosphère est viscérale.",nt:"Tours €20. Jour de match: 2h avant le coup d\'envoi. Portez du rouge."},
  {id:121,n:"Metropolitan Cathedral — Modern Bold Statement",a:"Downtown",v:["architecture","beautiful","history"],d:35,s:"1960s Catholic cathedral designed to be radical; it\'s unlike any cathedral you\'ve seen.",st:"Walk in. Circular design. The roof structure is concrete—bold, modern, almost spaceship-like. Inside: light floods down. It\'s spiritual but not traditional. Built after Vatican II opened. The architecture shows the moment.",im:"Circular interior with light from above. Modern concrete. Spiritual atmosphere without ornament.",t:"Free entry. Go 10am-4pm. Tours available. 35 min minimum.",c:["greatest_hits"],r:"g",nn:"Metropolitan Cathedral",ns:"Cathédrale catholique radicale des années 1960",nst:"Design circulaire. Béton audacieux. Lumière d\'en haut.",nt:"10h-16h. Entrée gratuite."},
  {id:122,n:"Pier Head & Three Graces — Waterfront Icons",a:"Pier Head",v:["beautiful","history"],d:30,s:"Three iconic buildings facing the water; Liverpool's skyline built from shipping wealth.",st:"Walk the promenade. The Three Graces—Royal Liver, Cunard, Port Authority buildings. Early 1900s. Stone and grandeur. The water reflects them. Locals walk past daily. The city was built here. You feel the scale of shipping and empire.",im:"Three stone buildings facing water. Reflected in Mersey. Ferry boats passing.",t:"Free to walk. Go anytime. Best 4pm-6pm for light. Ferry tours available €3.",c:["greatest_hits"],r:"g",nn:"Pier Head & Three Graces",ns:"Trois bâtiments emblématiques de Liverpool",nst:"Début 1900s. Pierre et grandeur. Réflexion dans l\'eau. La ville a été construite ici.",nt:"Promenade gratuite. 16h-18h pour la lumière."}

<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Liverpool Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
