const P = [{id:1,n:"Belleville Murals and Street Art — Belleville",a:"Belleville",v:["street_art", "local_only"],d:1,s:"Entire neighborhood is moving mural — immigrant communities paint identity on brick",st:"Walk and stare upward. Color explodes on walls. Arabic, Chinese, French. Every language. Every culture. The neighborhood paints itself. It\'s alive. It\'s real. It\'s political.",im:"It\'s 2000. Artists come. They claim walls. Communities follow. Color happens. Gentrification arrives anyway. But the murals remain as witness.",t:"Walk and stare upward. Color explodes on walls. Arabic, Chinese, French. Every language. Every culture. The neighborhood paints itself. It\'s alive. It\'s real. It\'s political.\",im:\"It\'s 2000. Artists come. They claim walls. Communities follow. Color happens. Gentrification arrives anyway. But the murals remain as witness.\",t:\"Free walk. Rue Denoyez best for murals. Start early morning. Weekends busier. Small cafés for coffee and croissants. Street food vendors afternoons. Respectful photography appreciated.",c:["street_art", "local_only"],r:"g",nn:"Belleville Murals and Street Art — Belleville",ns:"Un quartier qui crie ses couleurs sur le béton et l\'histoire.",nst:"Levez les yeux. Les couleurs explosent partout — arabe, chinois, français. Chaque langue. Chaque culture. Le quartier se peint lui-même. C\'est vivant. C\'est vrai. C\'est politique. Les artistes revendiquent les murs depuis les années 2000. Les communautés suivent. Malgré la gentrification, les fresques restent comme témoins du passé.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},
  {id:2,n:"La Maroquinerie Concert Venue — Belleville",a:"Belleville",v:["local_only", "history"],d:2,s:"Former leather workshop turned music venue — working-class soul in concert form",st:"Dark venue. Raw acoustics. Musicians perform where craftsmen worked. The walls remember leather-working. Now music vibrates the same stone. Community here is real.",im:"It\'s 1960. Leather workers cut and stitch. Now musicians arrive. The space transforms but keeps its working-class spirit.",t:"Dark venue. Raw acoustics. Musicians perform where craftsmen worked. The walls remember leather-working. Now music vibrates the same stone. Community here is real.\",im:\"It\'s 1960. Leather workers cut and stitch. Now musicians arrive. The space transforms but keeps its working-class spirit.\",t:\"Check concert schedule online. Most shows evening/night. Ticket prices reasonable. Standing room often available. Arrive early for good position. Crowd is mixed and welcoming.",c:["local_only", "history_big"],r:"g",nn:"La Maroquinerie Concert Venue — Belleville",ns:"Une fenêtre ouverte sur l\'âme ouvrière de Paris.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},

  {id:4,n:"Canal Saint-Martin Locks — Canal Saint-Martin",a:"Canal Saint-Martin",v:["beautiful", "romantic_water", "quiet"],d:4,s:"Historic canal with nine locks — water-powered Paris before electricity",st:"Bridges curve over water. Locks rise and fall with boats. It\'s mechanical and beautiful. Trees arch overhead. Parisians picnic on banks. The canal breathes. It\'s alive.",im:"It\'s 1825. The canal opens. Water flows. Commerce floats. Now community gathers. Different flow. Same magic.",t:"Bridges curve over water. Locks rise and fall with boats. It\'s mechanical and beautiful. Trees arch overhead. Parisians picnic on banks. The canal breathes. It\'s alive.\",im:\"It\'s 1825. The canal opens. Water flows. Commerce floats. Now community gathers. Different flow. Same magic.\",t:\"Free walk. Full canal is 4.5km. Best section Rue Louis Blanc to République. Picnic supplies nearby. Boat tours available (€12-20). Early mornings magical. Spring is perfect.",c:["beautiful", "romantic_water", "quiet"],r:"g",nn:"Canal Saint-Martin Locks — Canal Saint-Martin",ns:"La magie mécanique de Paris avant l\'électricité coule toujours.",nst:"Les ponts se courbent au-dessus de l\'eau. Les écluses montent et descendent avec les bateaux. C\'est mécanique et beau. Les arbres s\'arquent au-dessus. Les Parisiens piquent-niquent sur les berges. Le canal respire. Il vit. C\'est une connexion vivante au Paris d\'autrefois.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},
  {id:5,n:"Rue Crémieux Pastel Houses — 12th Arrondissement",a:"Bastille",v:["beautiful", "weird", "hidden"],d:5,s:"Private street of painted artist houses — candy-colored fantasy on a forgotten corner",st:"Turn a corner. Pink. Yellow. Lime green. Houses painted in pastels. It\'s whimsical. It\'s art. It shouldn\'t exist in Paris. It does. It\'s magic.",im:"It\'s 1960. Artists rent tiny houses. They paint them. Nobody stops them. Color explodes. It becomes legend.",t:"Turn a corner. Pink. Yellow. Lime green. Houses painted in pastels. It\'s whimsical. It\'s art. It shouldn\'t exist in Paris. It does. It\'s magic.\",im:\"It\'s 1960. Artists rent tiny houses. They paint them. Nobody stops them. Color explodes. It becomes legend.\",t:\"Free walk. Small private street — respectful access only. Photos okay if discreet. Early morning has no crowds. Locals live here — soft footsteps. It\'s tucked away and precious.",c:["beautiful", "weird", "hidden"],r:"g",nn:"Rue Crémieux Pastel Houses — 12th Arrondissement",ns:"Un quartier qui crie ses couleurs sur le béton et l\'histoire.",nst:"Levez les yeux. Les couleurs explosent partout — arabe, chinois, français. Chaque langue. Chaque culture. Le quartier se peint lui-même. C\'est vivant. C\'est vrai. C\'est politique. Les artistes revendiquent les murs depuis les années 2000. Les communautés suivent. Malgré la gentrification, les fresques restent comme témoins du passé.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},
  {id:6,n:"Musée de Montmartre Gardens — Montmartre",a:"Montmartre",v:["beautiful", "history", "quiet"],d:6,s:"18th-century gardens behind a Montmartre artist house — village Paris survives",st:"Stone cottage. Gardens with grapevines. Sculptures. It\'s a secret village. Montmartre\'s beauty before tourists. You\'re in someone\'s dream of Paris.",im:"It\'s 1780. An artist builds a cottage with gardens. He wants to grow wine. Paint. Love. All happen here. Now you see the dream preserved.",t:"Stone cottage. Gardens with grapevines. Sculptures. It\'s a secret village. Montmartre\'s beauty before tourists. You\'re in someone\'s dream of Paris.\",im:\"It\'s 1780. An artist builds a cottage with gardens. He wants to grow wine. Paint. Love. All happen here. Now you see the dream preserved.\",t:\"€8 entry (gardens). Wednesday-Sunday 10am-6pm. Small and intimate. Early morning magical. Sit in the garden. The view is pure Old Paris. Bring a book.",c:["beautiful", "history_big", "quiet"],r:"g",nn:"Musée de Montmartre Gardens — Montmartre",ns:"Un quartier qui crie ses couleurs sur le béton et l\'histoire.",nst:"Levez les yeux. Les couleurs explosent partout — arabe, chinois, français. Chaque langue. Chaque culture. Le quartier se peint lui-même. C\'est vivant. C\'est vrai. C\'est politique. Les artistes revendiquent les murs depuis les années 2000. Les communautés suivent. Malgré la gentrification, les fresques restent comme témoins du passé.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},
  {id:7,n:"Montmartre Vineyard — Montmartre",a:"Montmartre",v:["history", "hidden", "beautiful"],d:7,s:"Working vineyard in Paris — 2000 bottles annually from hillside grapes",st:"Grapevines on a Paris hillside. Impossible. But they\'re there. Harvest in September. Parisians gather. Wine is made. History and agriculture coexist in the city.",im:"It\'s 1200. Monks planted vines on this hill. Wine flowed for 800 years. Phylloxera killed them. In 1934, they\'re replanted. The dream continues.",t:"Grapevines on a Paris hillside. Impossible. But they\'re there. Harvest in September. Parisians gather. Wine is made. History and agriculture coexist in the city.\",im:\"It\'s 1200. Monks planted vines on this hill. Wine flowed for 800 years. Phylloxera killed them. In 1934, they\'re replanted. The dream continues.\",t:\"Free to view exterior. Occasional harvest celebrations in September. Small wine sales. Check Musée de Montmartre website for events. Bring a camera. The view of Paris is stunning.",c:["history_big", "hidden", "beautiful"],r:"g",nn:"Montmartre Vineyard — Montmartre",ns:"Un lieu authentique où les Parisiens se retrouvent.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},

  {id:102,n:"Parc de Bercy Gardens — Bercy",a:"Bercy",v:["beautiful", "nature", "quiet"],d:102,s:"Contemporary park with multiple gardens—Asian garden, rose garden, secret groves—urban oasis",st:"Wander through themed gardens. Asian plants. Roses. Bamboo. Water features. Each section different. Quiet beauty.",im:"It\'s 1990s. Former industrial site becomes a park. Nature reclaims urban space.",t:"Wander through themed gardens. Asian plants. Roses. Bamboo. Water features. Each section different. Quiet beauty.\",im:\"It\'s 1990s. Former industrial site becomes a park. Nature reclaims urban space.\",t:\"Free. Open daily. Bercy. East Paris. Peaceful. Photography beautiful. Benches abundant. Plan 2 hours.",c:["beautiful", "nature", "quiet"],r:"g",nn:"Parc de Bercy Gardens — Bercy",ns:"Un lieu authentique où les Parisiens se retrouvent.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},

  {id:108,n:"Père-Lachaise Cemetery Walking Tour",a:"East",v:["history","quiet","free"],d:20,s:"The famous dead buried in ornate tombs — a free historical walk among monuments",st:"Père-Lachaise contains Oscar Wilde, Jim Morrison, Balzac, and thousands of graves. It\'s a sculpture garden; locals come to research family history and reflect. Get a map.",im:"Time-travel: Opened 1804; became fashionable when the famous were buried here.",t:"Free. Métro Lines 2/6 to Père Lachaise.",c:["history_big","quiet"],r:"g",nn:"Cimetière Père-Lachaise",ns:"Tumbas ornamentadas de los famosos — caminar gratis",nst:"Camina entre las tumbas de celebridades en Père-Lachaise.",nt:"Gratis. Métro a Père Lachaise."},
  {id:109,n:"Belleville Street Art District",a:"Northeast",v:["art","free","local"],d:15,s:"Raw neighborhood murals constantly evolving — Paris\' real street art scene",st:"Belleville is the anti-Champs-Élysées. Rue Denoyez and alleys are covered in constantly evolving murals. It\'s raw, political, and authentic. Grab a crêpe and wander.",im:"Time-travel: Belleville was poor Jewish/Italian; street art is gentrifying it.",t:"Free. Métro Line 11 to Belleville.",c:["street_art","local_only"],r:"g",nn:"Belleville Street Art",ns:"Murales dinámicas en constante evolución",nst:"Camina Rue Denoyez viendo arte callejero fresco.",nt:"Gratis. Métro a Belleville."},
{id:201, n:"Eiffel Tower at Night — The Light Show", a:"Trocadéro", v:["famous","views","romantic_water"], d:5, s:"After dark. The light show at the top of every hour lasts four minutes. Makes a 300m iron structure look alive. You only need to see once. But you do need to see it.", st:"Eiffel Tower at night is different from day. The light show runs 5 minutes past every hour. Four million lights twinkle for exactly four minutes. From below, you see the iron structure come alive. From Trocadéro (free, grass, wine, all of Paris behind you), you see the light show and the city skyline together. This is the angle. The tower itself is crowded by day, lines intense. At night the base is emptier. The light matters more than the object — it is the light that makes it real.", im:"Looking up at 300m iron tower. Suddenly lights pulse. Four minutes of twinkle and movement. City dark around.", t:"Light show 5–25 minutes after each hour, 9pm–1am (winter shorter). Free to watch from below (Trocadéro, bring wine and blanket). Paid entry €16–28 depending on stairs vs. lift. Tickets online 24 hours ahead. For the light show, the free view is better than the paid. Come by 8:45pm to get good spot at Trocadéro.", c:["greatest_hits","famous","views","romantic_water"], r:"g", nn:"Eiffel Tower la Nuit — Le Spectacle Lumineux", ns:"Après la nuit. Le spectacle lumineux au sommet de chaque heure dure quatre minutes. Change une structure de 300m en quelque chose qui semble vivant.", nst:"Eiffel Tower la nuit est différente du jour. Le spectacle lumineux dure exactement quatre minutes. De ci-dessous, la structure en fer semble vivante. De Trocadéro (gratuit, herbe, vin, tout Paris derrière), tu vois le spectacle lumineux et la skyline ensemble. C\'est l\'angle. C\'est la lumière qui la rend réelle.", nt:"Spectacle lumineux 5–25 minutes après chaque heure, 21–1 (hiver plus court). Gratuit à regarder d\'en bas (Trocadéro, apporte vin et couverture). Entrée payante €16–28."},
{id:202, n:"Louvre at Opening Time", a:"1er Arrondissement", v:["famous","museum"], d:180, s:"The Mona Lisa at 9:15am before crowds. Skip the queue, go straight to room 6 (Denon wing) before 10am. You have minutes.", st:"The Louvre opens at 9am. By 9:20am the lines to the Mona Lisa have begun. By 10am the room is full. The Mona Lisa is small — about 30x21 inches. In a crowded room you cannot see it properly. At 9:15am, the room is often empty. The painting is behind armored glass, lit specifically, impossible to miss. The room guides your eye directly to it. Other Renaissance paintings hang nearby and are genuinely more interesting. The experience is the specificity of how it is displayed — the light, the angle, the isolation. Come for the moment, not the object.", im:"Standing before small painting. Specific light through armored glass. Room empty. Just you and four centuries looking back.", t:"€17 timed entry. Book online 24 hours ahead (they release slots progressively). Entry 9am, queue through Pyramid entrance or Denon side (shorter queue). Straight to Denon wing (Room 6, Level 1). Go directly, do not wander. If you see crowds at Mona Lisa, leave and come back 15 minutes later.", c:["greatest_hits","famous","museum"], r:"g", nn:"Le Louvre à l\'Ouverture", ns:"La Joconde à 9h15 avant les foules. Saute la queue, va directement à la salle 6 (aile Denon) avant 10h.", nst:"Le Louvre ouvre à 9h. À 9h20 les files pour la Joconde ont commencé. À 10h la salle est pleine. La Joconde est petite — environ 30x21 pouces. Dans une salle remplie tu ne peux pas bien la voir.

À 9h15, la salle est souvent vide. Le tableau est derrière du verre blindé, spécifiquement éclairé, impossible à manquer. Les autres peintures Renaissance à proximité sont plus intéressantes.", nt:"€17 entrée chronométrée. Réserve en ligne 24 heures avant. Entrée 9h, file par entrée Pyramide ou côté Denon (plus courte)."},
{id:203, n:"Notre-Dame Cathedral — After Restoration", a:"Île de la Cité", v:["famous","history"], d:60, s:"Just reopened (2024). The restoration is visible. Not the same experience as before the fire, and that makes it more interesting.", st:"The fire was April 15, 2019. The cathedral closed for five years. It reopened December 2024. The restoration is not a recreation — it is a visible conversation between old and new. The wooden roof burned. The new roof is timber but engineered differently, visible to the eye if you know to look. The stonework was cleaned during restoration, so the gothic details are now stark. The stained glass is original (it was removed during restoration). The bells are back. The organ is being restored (ongoing). The experience of Notre-Dame now is of a building in time, not a frozen monument. The crowds have returned but the building feels changed.", im:"Walking inside. Pointed vault above. Light through stained glass. Visible repairs where ancient meets new. Ongoing work evident.", t:"Free entry (reopened Dec 2024). Hours typically 8am–6:45pm (verify online). Île de la Cité, Metro Cité. The interior restoration is visible and worth seeing. Climbing towers available (€10, 387 steps). Best visited mid-morning before crowds. The exterior restoration is ongoing — some scaffolding still visible, which is part of seeing it now.", c:["greatest_hits","famous","history"], r:"g", nn:"Cathédrale Notre-Dame — Après Restauration", ns:"Vient de rouvrir (2024). La restauration est visible. Pas la même expérience qu\'avant l\'incendie.", nst:"L\'incendie était le 15 avril 2019. La cathédrale a fermé pendant cinq ans. Elle a rouvert en décembre 2024. La restauration n\'est pas une récréation — c\'est une conversation visible entre ancien et nouveau. Le toit en bois a brûlé. Le nouveau toit est en bois mais construit différemment, visible à l\'oeil.

La pierre a été nettoyée — les détails gothiques sont désormais nets. Les vitraux sont d\'origine. Les cloches sont revenues. L\'orgue est en restauration.", nt:"Entrée gratuite (réouvert décembre 2024). Heures généralement 8–18h45 (vérifier en ligne). Tours disponibles (€10, 387 marches)."},
{id:204, n:"Sacré-Cœur Basilica at Sunrise", a:"Montmartre", v:["famous","views","history"], d:60, s:"Climb at 5:30am when empty. The basilica opens at 6am. The city appears as you climb. Light hits the dome exactly as you reach the top.", st:"Sacré-Cœur sits at the top of Montmartre on the highest point in Paris. The climb is 237 steps inside the dome. The interior is worth seeing (Byzantine mosaics, specific light, open-air gallery), but sunrise is the point. 5:30am is too early for crowds. The steps are empty. As you climb, Paris emerges below — the Seine, the Eiffel Tower catching first light, the city turning from black to grey to gold. The dome lets you walk a full circle with a 360° view. By 7am the stairs are filling. By 8am it is crowded. Sunrise is 30 minutes of empty space inside the highest building in the city.", im:"Climbing stairs inside a dome. Sky lightening outside. City emerging below. Light gold on stone.", t:"€6 dome entry (churches typically 8am–5pm). Come 5:30am before it opens and wait — stairs open at 6am sharp. Montmartre, near Abbesses Metro. The basilica interior is worth 15 minutes (free). The Sacré-Cœur neighborhood (Montmartre) is worth wandering, but do the climb first before crowds.", c:["greatest_hits","famous","high_spots","views"], r:"g", nn:"Sacré-Cœur au Lever du Soleil", ns:"Grimpe à 5h30 quand c\'est vide. La basilique ouvre à 6h. La ville apparaît en grimpant.", nst:"Sacré-Cœur siège au sommet de Montmartre au point le plus haut de Paris. La montée est 237 marches. L\'intérieur vaut le coup (mosaïques byzantines, lumière spécifique), mais lever du soleil est le point.

5h30 c\'est trop tôt pour les foules. Les marches sont vides. En grimpant, Paris émerge — la Seine, la Tour Eiffel attrapant la première lumière, la ville passant du noir au gris au or.", nt:"€6 entrée dôme. Viens 5h30 avant ouverture et attends — escaliers s\'ouvrent à 6h pile."},
{id:205, n:"Arc de Triomphe — Rooftop Views", a:"8e Arrondissement", v:["famous","high_spots","views"], d:45, s:"From the roof you see Eiffel Tower, Champs-Élysées, Sacré-Cœur, La Défense all at once. One panorama. 284 steps. Worth it.", st:"Arc de Triomphe was built 1836. The roof is 50 meters high. From the top you see down the Champs-Élysées to the Louvre. You see the Eiffel Tower. You see Sacré-Cœur to the north. You see La Défense to the west. You see in every direction and understand Paris\'s geography in one moment. The climb is steep and tight (spiral stairs, armoured for defense in case of rebellion — the original builders thought through everything). The view is worth the climb. The crowds are manageable if you come at 3pm-4pm (tourists are lunching). The stairs are the experience — narrow medieval-feeling spiral in a 19th century monument.", im:"Standing on roof 50m high. Champs-Élysées below stretching to the horizon. City spread beneath. Wind and light.", t:"€13 adults (€7 reduced). Daily 10am–10:30pm. Climb 284 steps (no elevator). Come 3–4pm for quietest. Charles de Gaulle (Étoile) Metro direct. Book online if possible but walk-ups work usually. The monument is about the view, not the building.", c:["greatest_hits","famous","high_spots","views"], r:"g", nn:"Arc de Triomphe — Vue Toit", ns:"Du toit tu vois Tour Eiffel, Champs-Élysées, Sacré-Cœur, La Défense tous à la fois.", nst:"Arc de Triomphe a été construit en 1836. Le toit fait 50 mètres de haut. Du sommet tu vois la Champs-Élysées au Louvre. Tu vois la Tour Eiffel. Tu vois Sacré-Cœur au nord. Tu vois La Défense à l\'ouest. Tu comprends la géographie de Paris en un moment.

La montée est raide et étroite (escaliers en spirale). La vue justifie la montée.", nt:"€13 adultes (€7 réduit). Quotidiennement 10–22h30. Montée 284 marches (pas d\'ascenseur). Viens 3–4h pour le plus calme."},
{id:206, n:"Versailles Palace — The Hall of Mirrors at Opening", a:"Versailles", v:["famous","palaces"], d:240, s:"Versailles opens at 9am. The Hall of Mirrors at 9:15am before groups arrive. 73 meters long. 357 mirrors. Light specific and overwhelming.", st:"Versailles is the palace that swallowed France\'s treasury. Louis XIV moved the court here in 1682 and it never recovered. The Hall of Mirrors is 73 meters of mirrors on one side, windows on the other (so light bounces forever). 357 mirrors. Built when mirrors were expensive and rare. The hall is designed to magnify light and power. At 9:15am (right after opening), the groups have not arrived. The light is fresh. The mirrors are still. By 10am the room is full of people and the light is fragmented. By 11am it is crowded. The palace is enormous — if you come at 9am and go straight to the Hall, you have 20 minutes of quiet before the rush.", im:"73 meters of mirrored light. Window-light bouncing infinite times. Polished marble floor reflecting ceiling. Overwhelming vastness.", t:"€23 palace entry. Daily 9am–6:30pm (gardens open earlier). Book timed entry online 24h ahead. RER C to Versailles Château-Rive Gauche (30 min from central Paris, cheap). Come 9am sharp. Go straight to Hall of Mirrors (Room 6) before moving through other sections. The gardens are enormous and free — worth 2 hours walking.", c:["greatest_hits","famous","palaces","day_trips"], r:"g", nn:"Versailles — Galerie des Glaces à l\'Ouverture", ns:"Versailles ouvre à 9h. La Galerie des Glaces à 9h15 avant les groupes. 73 mètres. 357 miroirs.", nst:"Versailles est le palais qui a avalé la trésorerie de la France. Louis XIV a déménagé la cour ici en 1682 et elle n\'a jamais récupéré. La Galerie fait 73 mètres de miroirs d\'un côté, fenêtres de l\'autre (la lumière rebondit à l\'infini).

À 9h15 (juste après l\'ouverture), les groupes n\'sont pas arrivés. La lumière est fraîche. À 10h la salle est pleine.", nt:"€23 entrée palais. Quotidiennement 9–18h30. Réserve en ligne 24h avant. RER C vers Versailles Château-Rive Gauche."},
{id:207, n:"Sainte-Chapelle — Stained Glass at Dusk", a:"1er Arrondissement", v:["famous","history","views"], d:45, s:"Upper chapel is 40% stained glass. 1,113 individual windows. Built 1248 for a crown of thorns. Comes alive at dusk when light is low and color deepens.", st:"Sainte-Chapelle is smaller than Notre-Dame but technically more ambitious — the upper chapel is almost entirely stained glass. The glass tells biblical stories. Built in 13 months (1248) specifically to house a relic (Crown of Thorns, bought from Crusaders). The light changes the experience completely. At noon, harsh light washes out the color. At dusk (5pm–7pm depending on season), the sun is lower, the light is warm, the colors in the glass deepen from light to rich. The reds become blood-red. The blues become jewel-blue. The effect is intentional — medieval builders understood light. The chapel is small and can get crowded, but the dusk light makes even crowded moments feel intimate.", im:"Inside upper chapel. 40% of walls are stained glass. Light pours through coloured panes. Stone becomes secondary to color and light.", t:"€11.50 timed entry. Daily 9am–7pm (varies seasonally). Book online or walk-ups. Île de la Cité, Metro Cité. Come 5:30pm–6:30pm in spring/summer for dusk light. The chapel is inside a larger complex (Palais de Justice) which is free to walk outside. Combine with Notre-Dame (5 min walk).", c:["greatest_hits","famous","history"], r:"g", nn:"Sainte-Chapelle — Vitraux à la Tombée du Jour", ns:"Chapelle supérieure 40% vitraux. 1.113 fenêtres individuelles. Construit 1248 pour une couronne d\'épines.", nst:"Sainte-Chapelle est plus petite que Notre-Dame mais techniquement plus ambitieuse — la chapelle supérieure est presque entièrement en vitrail. Le verre raconte des histoires bibliques. Construit en 13 mois spécifiquement pour abriter une relique.

La lumière change complètement l\'expérience. À midi, la lumière dure lave la couleur. À la tombée du jour, le soleil est plus bas, la lumière est chaude, les couleurs s\'approfondissent.", nt:"€11,50 entrée chronométrée. Quotidiennement 9–19h (varie). Réserve en ligne."},
{id:208, n:"Rodin Museum — The Thinker in the Garden", a:"7e Arrondissement", v:["famous","museum","parks"], d:90, s:"The Thinker in an actual garden, not a museum box. Bronze sculpture with trees and stone. The museum building is 18th century, the collection intimate.", st:"The Rodin Museum is in a mansion (Hôtel Biron) with a garden where the sculptures sit. The Thinker is not in a white-walled gallery — it sits in a garden with trees, stone paths, other sculptures nearby. You walk around it. The scale is clearer outside. The thought is clearer outside. The museum building itself is beautiful (1730s neoclassical), and the collection inside (Gates of Hell, Kiss, other works) is extraordinary. But the garden is why you come. It is one of the few places in Paris where the art is not separated from nature. The sculpture and garden are one experience.", im:"Walking through garden. Suddenly The Thinker on a pedestal. Trees around it. Stone path beneath. Interior space outside.", t:"€12 garden and museum. €7 garden only (better choice if you have 30 min). Wed–Mon 10am–5:45pm. 77 rue de Varenne, 7e. Metro Varenne. Come early morning (10:15am) or late afternoon (4:30pm) for fewest crowds. The garden is beautiful year-round, but spring (April–May) and autumn (Sept–Oct) are best.", c:["greatest_hits","famous","museum","parks"], r:"g", nn:"Musée Rodin — Le Penseur dans le Jardin", ns:"Le Penseur dans un vrai jardin, pas une boîte de musée. Sculpture en bronze avec arbres et pierre.", nst:"Le Musée Rodin est dans un manoir (Hôtel Biron) avec un jardin où les sculptures s\'assoient. Le Penseur n\'est pas dans une galerie aux murs blancs — il est dans un jardin avec des arbres, des chemins de pierre, d\'autres sculptures à proximité. Le musée est beau (1730s), la collection intérieure extraordinaire.

Mais le jardin est pourquoi tu viens. C\'est l\'un des rares endroits à Paris où l\'art n\'est pas séparé de la nature.", nt:"€12 jardin et musée. €7 jardin uniquement (meilleur choix si 30 min). Mer–lun 10–17h45."},
{id:209, n:"Père Lachaise Cemetery — The Dead City", a:"20e Arrondissement", v:["famous","history","weird"], d:180, s:"48 hectares of 19th century tombs. Balzac, Wilde, Morrison, Piaf. Planned like a city. Narrow stone streets, graves as monuments, chapels small enough to live in.", st:"Père Lachaise is not a cemetery — it is a city for the dead. Built 1804 and designed by a city planner, not a cemetery engineer. The graves are arranged in streets. The monuments are architecture — small chapels, mausoleums, obelisks. The paths are stone and planned. It is walkable. It is navigable. It is beautiful. The most visited grave is Oscar Wilde (people kiss the tomb). Others are more interesting — monuments to families, to trades, to life. The cemetery is large enough that you can be alone in parts of it. The graves are from 200 years of Paris — the evolution of taste, wealth, and mourning visible in stone. Come with a map (available at entrance) and wander.", im:"Walking between stone monuments. Narrow street of graves. Chapels on corners. Names and dates in worn stone. Quiet.", t:"Free entry. Daily 8am–6pm (winter 8am–5:30pm). 16 rue du Repos, 20e. Metro Père Lachaise (direct). Bring comfortable shoes — 48 hectares is a long walk. Come on a weekday for quiet. The map at entrance is essential. Most-visited graves (Wilde, Morrison) are crowded; the best experience is wandering off-path where graves are less known.", c:["greatest_hits","famous","weird","history"], r:"g", nn:"Cimetière du Père Lachaise", ns:"48 hectares de tombes du 19e siècle. Balzac, Wilde, Morrison, Piaf. Planifié comme une ville.", nst:"Père Lachaise n\'est pas un cimetière — c\'est une ville pour les morts. Construit 1804 et planifié par un urbaniste, pas un ingénieur de cimetière. Les tombes sont disposées en rues. Les monuments sont architecturaux — petites chapelles, mausolées, obélisques.

Le cimetière est grand — tu peux être seul dans certains endroits. Les tombes viennent de 200 ans de Paris — l\'évolution du goût, de la richesse, du deuil visible en pierre.", nt:"Entrée gratuite. Quotidiennement 8–18h (hiver 8–17h30). Apporte des chaussures confortables."},
{id:210, n:"Musée de Montmartre — Tiny Museum, Huge History", a:"Montmartre", v:["famous","museum","neighborhoods"], d:90, s:"Small 17th century house. Renoir lived here. The museum covers Montmartre\'s history when it was a village outside Paris.", st:"The Musée de Montmartre is in a small manor house (1690) where Renoir rented a studio. The museum is intimate and focused — not trying to be the Louvre. The collection covers Montmartre\'s specific history: the dance halls (Moulin Rouge, Moulin Bleu), the artists (Picasso, Toulouse-Lautrec, Van Gogh), the cabarets. The house itself is worth seeing (period rooms, original floors). The garden is small and peaceful. The museum is often quiet because tourists go to Sacré-Cœur instead. But Montmartre was a village before it was a tourist destination, and this museum preserves that. The exhibits are specific and well-designed.", im:"Walking through small rooms. Period furniture. Windows to a garden. Light and history concentrated in tight spaces.", t:"€11 entry. Wed–Mon 10am–6pm. 12 rue Cortot, Montmartre. Metro Abbesses. Come before 11am for quiet. The garden is small but worth sitting in. Montmartre neighborhood around it (steep streets, cafes, artists) worth wandering. The Sacré-Cœur is uphill; this museum is downhill and less crowded.", c:["greatest_hits","famous","museum"], r:"g", nn:"Musée de Montmartre", ns:"Petite maison du 17e siècle. Renoir a vécu ici. Le musée couvre l\'histoire de Montmartre quand c\'était un village.", nst:"Le Musée de Montmartre est dans un petit manoir (1690) où Renoir avait un studio. Le musée est intime et concentré — ne tente pas d\'être le Louvre. La collection couvre l\'histoire spécifique de Montmartre: les salles de danse, les artistes.

La maison elle-même vaut le coup (pièces de période, sols d\'origine). Le jardin est petit et calme.", nt:"€11 entrée. Mer–lun 10–18h. 12 rue Cortot. Métro Abbesses. Viens avant 11h pour le calme."},
{id:211, n:"Luxembourg Garden — The Public Living Room", a:"6e Arrondissement", v:["famous","parks","free_entry"], d:120, s:"45 hectares. Built 1612. The layout is exact — not wilderness, not manicured. Gardens as public space meant for sitting, reading, wandering.", st:"The Luxembourg Garden is not a nature reserve or a manicured estate garden. It is a public living room. It was built for Marie de Medici in 1612 and the layout has barely changed. The garden is geometric and open. There are paths but they are not narrow or forced. You can walk or sit. The sculptures are placed with intention. The water features (fountains, pond) are gathering places. The garden is in the middle of the city but it feels removed. The light is filtered through old trees. The space is genuinely peaceful during morning hours (before noon). The afternoon fills with school children and tourists. The experience is different by season and time of day. Come early. Sit. That is the purpose.", im:"Sitting on a metal chair in sunshine. Geometric paths and trees. Water feature distant. People dispersed across grass and paths. Quiet.", t:"Free entry. Daily 7:15am–sunset. 6 rue Médicis, 6e. Metro Odéon. Come 9am–11am for quietest experience and best light. Chairs are free to use (moveable metal chairs scattered throughout). Bring a book. The garden is designed for sitting, not rushing through.", c:["greatest_hits","famous","parks","free_entry"], r:"g", nn:"Jardin du Luxembourg", ns:"45 hectares. Construit 1612. L\'agencement est exact — pas de nature sauvage, pas de jardins manucurés.", nst:"Le Jardin du Luxembourg n\'est pas une réserve naturelle ou un jardin domanial manucuré. C\'est un salon de vie publique. Il a été construit pour Marie de Medici en 1612 et l\'agencement a à peine changé. Le jardin est géométrique et ouvert.

L\'expérience est différente par saison et heure du jour. Viens tôt. Assieds-toi. C\'est l\'objectif.", nt:"Entrée gratuite. Quotidiennement 7h15–coucher du soleil. Viens 9–11h pour l\'expérience la plus calme."},
{id:212, n:"Musée de l\'Orangerie — Water Lilies, Two Hours", a:"1er Arrondissement", v:["famous","museum"], d:120, s:"Monet\'s Water Lilies in an oval room. Eight panels. No one else. Come at 8:45am. You have the room to yourself for two hours.", st:"The Musée de l\'Orangerie is small (one building, one oval room with eight Monet paintings, other galleries). The building is intentional — the Giverny water lily paintings were designed for an oval room and this museum was built to house them. Monet was old and nearly blind when he painted them. They are about texture and color and light, not recognizable form. The room is designed so the light falls on the paintings at a specific angle. At 9am (right after opening), the room is empty. By 10am tourists have arrived. By 11am it is crowded and the light is different. The two-hour window (9am–11am) when the room is quiet and the light is right is the experience. Come for the paintings, but come at the right time.", im:"Inside oval room. Eight enormous water lily panels cover the walls. Light specific and gentle. No other people. Blue-green-gold palette fills your vision.", t:"€11 timed entry. Daily 9am–6pm (closed Tuesdays). Book online or arrive 8:45am for 9am entry. 1 Place de la Concorde, 1er. Metro Concorde. Come at opening (9am). The room is best 9–11am before crowds. Other galleries in building are smaller and quieter throughout.", c:["greatest_hits","famous","museum"], r:"g", nn:"Musée de l\'Orangerie — Nymphéas", ns:"Nymphéas de Monet dans une salle ovale. Huit panneaux. Personne d\'autre. Viens à 8h45. Tu as la salle pour toi pendant deux heures.", nst:"Le Musée de l\'Orangerie est petit (un bâtiment, une salle ovale avec huit peintures de Monet). Le bâtiment est intentionnel — les peintures de nymphéas de Giverny ont été conçues pour une salle ovale et ce musée a été construit pour les abriter.

Monet était vieux et presque aveugle quand il les a peintes. C\'est environ la texture, la couleur et la lumière, pas la forme reconnaissable.", nt:"€11 entrée chronométrée. Quotidiennement 9–18h (fermé mardis). Réserve en ligne ou arrive à 8h45 pour 9h."},
{id:213, n:"Canal Saint-Martin — The Working Waterway", a:"10e Arrondissement", v:["famous","neighborhoods","local"], d:120, s:"2.7 km of canal from République to Parc des Buttes-aux-Cailles. Locals use it. Not restored for tourists. Real water, real path, real people.", st:"Canal Saint-Martin is not the Venice imitation (that is the left bank of the Seine). It is a working canal where barges still move, where locals actually come. Built 1822 as a freight route, now a place where Parisians live. The path along the canal is narrow and specific. You pass restaurants on the water. You see people carrying groceries. You feel the city being used, not performed. The locks are still operational (you can watch boats rise and sink). The bridges are low and force the barges to fold their chimneys. The neighborhood (around Jaurès and République) is immigrant-heavy, genuine, not touristy. The experience is walking the length of the canal and understanding how Paris flows daily.", im:"Walking narrow path. Water beside you. Low bridge ahead. Barge passing, chimney folding. Trees overhanging. Real city.", t:"Free walk. 2.7 km takes 45 min–1 hour depending on stops. Start at Republic Metro, walk north along canal toward Jaurès. Restaurants along canal are cheap and real. The neighborhood around is worth exploring (Rue de Marseille, Rue de la Vieuville). Avoid late night — neighborhood is active but sketchy after 11pm.", c:["greatest_hits","famous","neighborhoods"], r:"g", nn:"Canal Saint-Martin", ns:"2,7 km de canal de République au Parc des Buttes-aux-Cailles. Les locaux l\'utilisent.", nst:"Canal Saint-Martin n\'est pas l\'imitation Venise (c\'est la rive gauche de la Seine). C\'est un vrai canal où les péniches bougent toujours, où les Parisiens viennent vraiment. Construit 1822 comme route de fret, maintenant un endroit où les Parisiens vivent.

Le chemin le long du canal est étroit et spécifique. Tu passes des restaurants sur l\'eau. Tu vois des gens portant des courses. Tu sens la ville être utilisée, pas performée.", nt:"Promenade gratuite. 2,7 km prend 45 min–1h selon les arrêts. Commencer à République Métro, marcher nord le long du canal."},
{id:214, n:"Musée Picasso — Entire Career in One Building", a:"3e Arrondissement", v:["famous","museum"], d:120, s:"5,000 works covering 90 years. Salon of the Marais (17th century mansion). Best modern art collection in one building.", st:"The Picasso Museum is in the Hôtel Salé (1656), a five-story mansion in the Marais. The building is beautiful (17th century, stone, high ceilings). The collection (5,000 works) covers Picasso\'s entire life — the Blue Period, Cubism, the late works. You see how he changed. The museum is organized chronologically, so walking through it is like walking through his mind. By the late rooms you understand why the late works matter. The painting style changed but the intensity did not. The museum does not try to be comprehensive on a single visit — it is ok to skip rooms. The point is the progression, not the total number.", im:"Walking through rooms. Paintings on white walls. 90 years of one mind visible. Color and form changing with each room.", t:"€14 timed entry. Wed–Mon 9:30am–6pm (Thu until 9:30pm). Book online. Hôtel Salé, 5 rue de Thorigny, 3e. Metro Saint-Paul. Come at opening (9:30am) for quietest. Thursday evening after 7pm less crowded. The Marais neighborhood (around museum) is worth exploring afterward — galleries, cafes, shops.", c:["greatest_hits","famous","museum"], r:"g", nn:"Musée Picasso", ns:"5.000 œuvres couvrant 90 ans. Salon du Marais (manoir du 17e siècle).", nst:"Le Musée Picasso est à l\'Hôtel Salé (1656), un manoir de cinq étages dans le Marais. Le bâtiment est beau (17e siècle, pierre, hauts plafonds). La collection (5.000 œuvres) couvre toute la vie de Picasso.

Vous marchez à travers, c\'est comme marcher dans son esprit. À la fin, tu comprends pourquoi les derniers travaux importent.", nt:"€14 entrée chronométrée. Mer–lun 9h30–18h (jeu jusqu\'à 21h30). Réserve en ligne."},
{id:215, n:"Latin Quarter — Walking the Streets of Student Paris", a:"5e Arrondissement", v:["famous","neighborhoods","history"], d:120, s:"The Sorbonne founded 1257. Streets haven\'t changed much. Student life still happens here. Bookshops, cafes, politics, students.", st:"The Latin Quarter (Quartier Latin) is centered around the Sorbonne and the Panthéon. The streets are narrow and chaotic and genuinely inhabited. This is not a museum neighborhood — students live here, they study here, they argue here. The Sorbonne is still a university. The bookshops (Shakespeare and Company, Gibert) are real bookshops, not tourist shops. The cafes (Café de Flore, Les Deux Magots) are expensive and touristy but the side streets have cheap student cafes where the real life happens. Walking through the neighborhood is like walking through centuries of Paris — medieval streets (literally), 18th century buildings, modern students. The experience is wandering without a plan and finding a cafe, finding a bookshop, finding a street.", im:"Narrow medieval street. Students with books. Cafe tables on sidewalk. Bookshops crammed. Sound of argument and laughter and language.", t:"Free to walk. The neighborhood is worth 2–3 hours. Start at Sorbonne, walk toward Panthéon, wander side streets. Cheap eats on Rue de la Huchette and Rue Mouffetard. The Shakespeare and Company bookshop is famous and crowded — try Gibert (multiple locations, real books, real prices) instead. Museo Carnavalet nearby (free) covers Paris history.", c:["greatest_hits","famous","neighborhoods"], r:"g", nn:"Quartier Latin", ns:"La Sorbonne fondée 1257. Les rues n\'ont pas beaucoup changé. La vie étudiante se passe toujours ici.", nst:"Le Quartier Latin est centré sur la Sorbonne et le Panthéon. Les rues sont étroites et chaotiques et genuinement habitées. Ce n\'est pas un quartier de musée — les étudiants vivent ici, étudient ici, argumentent ici.

La Sorbonne est toujours une université. Les librairies sont de vrais magasins, pas des boutiques touristiques.", nt:"Gratuit pour se promener. Le quartier vaut 2–3 heures. Commencer à Sorbonne, marcher vers Panthéon, flâner dans les rues latérales."},
{id:216, n:"Montmartre Vineyards — The Wine and the Village", a:"Montmartre", v:["famous","parks","weird"], d:60, s:"Actual vineyard inside Paris. Two hectares. 2,000 vines. Produces real wine. The sign says Montmartre but it\'s 10 minutes from Sacré-Cœur crowds.", st:"The Clos Montmartre is a real vineyard — two hectares, about 2,000 vines. It produces about 500 bottles of wine per year. The vineyard was planted in 1933 after replanting vines from elsewhere in France. Before that Montmartre had 40 hectares of vineyards. The wine is not exceptional but the existence is extraordinary. You are inside Paris, in the 18th arrondissement, surrounded by city, and there are grapevines. The harvest happens in October. The neighborhood (Montmartre proper, not the Sacré-Cœur tourist section) is calm and genuinely local. Most tourists never see this — they are photographing Sacré-Cœur. You are two Metro stops away and the experience is completely different.", im:"Looking at grapevines. City visible around the edges. Stone wall. Quiet. Grapes on vines. Improbable.", t:"The vineyard is in the middle of a residential street (Rue Saint-Vincent) and is free to see from outside year-round. Inside access during harvest (October) for a fee (€5-10, often part of Fête des Vendanges festival). The neighborhood around is quiet and worth wandering — small cafes, local shops, steep streets. Approach from Lamarck-Caulaincourt Metro. The Sacré-Cœur is nearby but the vibe here is completely different.", c:["greatest_hits","weird","parks"], r:"g", nn:"Vignes de Montmartre", ns:"Vignoble réel à l\'intérieur de Paris. Deux hectares. 2.000 vins. Produit du vin réel.", nst:"Le Clos Montmartre est un vignoble réel — deux hectares, environ 2.000 vins. Il produit environ 500 bouteilles de vin par an. Le vignoble a été planté en 1933 après replantation de vins d\'ailleurs en France.

Vous êtes à l\'intérieur de Paris, entouré de ville, et il y a des cépages. C\'est improbable.", nt:"Le vignoble est au milieu d\'une rue résidentielle (Rue Saint-Vincent) et est gratuit à voir de l\'extérieur toute l\'année. Accès intérieur pendant les vendanges (octobre) moyennant frais."},

<div className="rounded-2xl p-6 mt-8 mx-4 text-left" style={{background:"rgba(10,10,30,0.72)",border:"1px solid rgba(255,255,255,0.15)",maxWidth:380}}>
<h2 className="text-base font-bold mb-3" style={{color:"white"}}>Before you start / Avant de commencer</h2>
<p className="text-sm leading-relaxed" style={{color:"#c8c0e0"}}>This app is a creative guide to hidden places. Content is curated for curiosity — not as instructions.</p>
<p className="text-xs leading-relaxed mt-1" style={{color:"#9990b8",fontStyle:"italic"}}>Cette appli est un guide créatif des lieux cachés. Son contenu est sélectionné par curiosité — pas comme des instructions.</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#c8c0e0"}}>Some locations include natural environments, heights, water, or areas that may be restricted or unsafe. You explore at your own risk and are responsible for your own safety.</p>
<p className="text-xs leading-relaxed mt-1" style={{color:"#9990b8",fontStyle:"italic"}}>Certains lieux incluent des environnements naturels, des hauteurs, de l'eau ou des zones pouvant être restreintes ou dangereuses. Vous explorez à vos risques et êtes responsable de votre propre sécurité.</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#c8c0e0"}}>This app does not provide safety advice. Always follow local laws, respect private property, and check current conditions before visiting any place.</p>
<p className="text-xs leading-relaxed mt-1" style={{color:"#9990b8",fontStyle:"italic"}}>Cette appli ne fournit pas de conseils de sécurité. Respectez toujours les lois locales, la propriété privée et vérifiez les conditions actuelles avant de visiter un lieu.</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#e8c0f0"}}>If you are under 18, please explore responsibly and avoid risky locations on your own.</p>
<p className="text-xs leading-relaxed mt-1" style={{color:"#c890d8",fontStyle:"italic"}}>Si vous avez moins de 18 ans : explorez de façon responsable et évitez les endroits risqués seul(e).</p>
</div>
<button onClick={onAccept} className="mt-6 w-full py-4 rounded-xl text-sm font-bold text-white" style={{background:"linear-gradient(135deg,#6366F1,#8B5CF6)",border:"none",cursor:"pointer",maxWidth:380,fontSize:"15px"}}>I understand — let me explore<br/><span style={{fontSize:"12px",opacity:0.85}}>Je comprends — on y va</span></button>
</div>);

const CITY_EN="Paris";
const PlaceCard=({place:p,idx,onOpen,lang})=>(
<button onClick={()=>onOpen(p)} className="text-left w-full rounded-2xl p-4 fade-up" style={{background:"white",border:"1.5px solid #e4e4ed",cursor:"pointer",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div style={{flex:1}}>
<h3 className="text-base font-bold" style={{color:"#1a1a2e",lineHeight:1.3}}>{lang==="native"&&p.nn?p.nn:p.n}</h3>
{lang==="native"&&p.nn&&<p className="text-xs" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-xs mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p></div>
<span className="text-xs font-bold px-2 py-1 rounded-full ml-2 flex-shrink-0" style={{background:p.r==="g"?"#dcfce7":"#fef9c3",color:p.r==="g"?"#166534":"#854d0e"}}>{p.r==="g"?"Green":"Yellow"}</span></div>
<p className="text-sm mt-2" style={{color:"#555",lineHeight:1.5}}>{lang==="native"&&p.ns?p.ns:p.s}</p>
<div className="flex gap-1.5 mt-2 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-2 py-0.5 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</button>);

const PlaceDetail=({place:p,onClose,onNext,onPrev,lang})=>(
<div style={{position:"fixed",inset:0,zIndex:1000,background:"url('https://mariavheland.github.io/godostuff/textures/tex02.png') center/cover no-repeat",overflowY:"auto"}}>
<div className="px-5 pt-6 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex justify-between items-center mb-4">
<button onClick={onClose} className="text-sm font-bold" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← Back</button>
<div className="flex gap-2">
<button onClick={onPrev} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>←</button>
<button onClick={onNext} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>→</button></div></div>
<h1 className="text-2xl font-black" style={{color:"#1a1a2e"}}>{lang==="native"&&p.nn?p.nn:p.n}</h1>
{lang==="native"&&p.nn&&<p className="text-sm font-medium" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-sm mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p>
{PLACE_IMAGES[p.id]&&<div className="mt-4 rounded-xl overflow-hidden" style={{maxHeight:"400px"}}>
<img src={`images/${PLACE_IMAGES[p.id]}`} alt={p.n} style={{width:"100%",maxHeight:"360px",objectFit:"contain",display:"block",borderRadius:"8px"}}/>
<p className="text-xs mt-1" style={{color:"#aaa",textAlign:"center"}}>AI-generated illustration</p></div>}
<div className="mt-4 p-4 rounded-xl" style={{background:"#f8f8ff"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#1a1a2e"}}>The Story</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nst?p.nst:p.st}</p></div>
{p.im&&<div className="mt-3 p-4 rounded-xl" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#a78bfa"}}>Imagine This</h3>
<p className="text-sm" style={{color:"#b8b0d0",lineHeight:1.7,fontStyle:"italic"}}>{p.im}</p></div>}
{p.t&&<div className="mt-3 p-4 rounded-xl" style={{background:"#f0fdf4"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#166534"}}>{lang==="native"?"Tips / "+LANG_NAME:"Tips"}</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nt?p.nt:p.t}</p>
<a href={`https://maps.google.com/?q=${encodeURIComponent(p.n+', '+CITY_EN)}`} target="_blank" rel="noopener noreferrer"
  className="mt-3 flex items-center gap-2 text-sm font-bold"
  style={{color:"#166534",textDecoration:"none",display:"inline-flex",marginTop:"10px"}}>
  🗺 Get directions
</a>
</div>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
const TBGS={"places":"https://mariavheland.github.io/godostuff/textures/tex13.png","collections":"https://mariavheland.github.io/godostuff/textures/tex11.png","missions":"https://mariavheland.github.io/godostuff/textures/tex11.png","plan":"https://mariavheland.github.io/godostuff/textures/tex11.png","phrases":"https://mariavheland.github.io/godostuff/textures/tex13.png","default":"https://mariavheland.github.io/godostuff/textures/tex13.png"};if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
{/* dark scrim over photo */}
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:`url(\'${TBGS[tab]||TBGS.default}\') center/cover no-repeat`}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Paris Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Paris Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
