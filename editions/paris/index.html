  {id:1,n:"Belleville Murals and Street Art — Belleville",a:"Belleville",v:["street_art", "local_only"],d:1,s:"Entire neighborhood is moving mural — immigrant communities paint identity on brick",st:"Walk and stare upward. Color explodes on walls. Arabic, Chinese, French. Every language. Every culture. The neighborhood paints itself. It\'s alive. It\'s real. It\'s political.",im:"It\'s 2000. Artists come. They claim walls. Communities follow. Color happens. Gentrification arrives anyway. But the murals remain as witness.",t:"Walk and stare upward. Color explodes on walls. Arabic, Chinese, French. Every language. Every culture. The neighborhood paints itself. It\'s alive. It\'s real. It\'s political.\",im:\"It\'s 2000. Artists come. They claim walls. Communities follow. Color happens. Gentrification arrives anyway. But the murals remain as witness.\",t:\"Free walk. Rue Denoyez best for murals. Start early morning. Weekends busier. Small cafés for coffee and croissants. Street food vendors afternoons. Respectful photography appreciated.",c:["street_art", "local_only"],r:"g",nn:"Belleville Murals and Street Art — Belleville",ns:"Un quartier qui crie ses couleurs sur le béton et l\'histoire.",nst:"Levez les yeux. Les couleurs explosent partout — arabe, chinois, français. Chaque langue. Chaque culture. Le quartier se peint lui-même. C\'est vivant. C\'est vrai. C\'est politique. Les artistes revendiquent les murs depuis les années 2000. Les communautés suivent. Malgré la gentrification, les fresques restent comme témoins du passé.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},
  {id:2,n:"La Maroquinerie Concert Venue — Belleville",a:"Belleville",v:["local_only", "history"],d:2,s:"Former leather workshop turned music venue — working-class soul in concert form",st:"Dark venue. Raw acoustics. Musicians perform where craftsmen worked. The walls remember leather-working. Now music vibrates the same stone. Community here is real.",im:"It\'s 1960. Leather workers cut and stitch. Now musicians arrive. The space transforms but keeps its working-class spirit.",t:"Dark venue. Raw acoustics. Musicians perform where craftsmen worked. The walls remember leather-working. Now music vibrates the same stone. Community here is real.\",im:\"It\'s 1960. Leather workers cut and stitch. Now musicians arrive. The space transforms but keeps its working-class spirit.\",t:\"Check concert schedule online. Most shows evening/night. Ticket prices reasonable. Standing room often available. Arrive early for good position. Crowd is mixed and welcoming.",c:["local_only", "history_big"],r:"g",nn:"La Maroquinerie Concert Venue — Belleville",ns:"Une fenêtre ouverte sur l\'âme ouvrière de Paris.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},

  {id:4,n:"Canal Saint-Martin Locks — Canal Saint-Martin",a:"Canal Saint-Martin",v:["beautiful", "romantic_water", "quiet"],d:4,s:"Historic canal with nine locks — water-powered Paris before electricity",st:"Bridges curve over water. Locks rise and fall with boats. It\'s mechanical and beautiful. Trees arch overhead. Parisians picnic on banks. The canal breathes. It\'s alive.",im:"It\'s 1825. The canal opens. Water flows. Commerce floats. Now community gathers. Different flow. Same magic.",t:"Bridges curve over water. Locks rise and fall with boats. It\'s mechanical and beautiful. Trees arch overhead. Parisians picnic on banks. The canal breathes. It\'s alive.\",im:\"It\'s 1825. The canal opens. Water flows. Commerce floats. Now community gathers. Different flow. Same magic.\",t:\"Free walk. Full canal is 4.5km. Best section Rue Louis Blanc to République. Picnic supplies nearby. Boat tours available (€12-20). Early mornings magical. Spring is perfect.",c:["beautiful", "romantic_water", "quiet"],r:"g",nn:"Canal Saint-Martin Locks — Canal Saint-Martin",ns:"La magie mécanique de Paris avant l\'électricité coule toujours.",nst:"Les ponts se courbent au-dessus de l\'eau. Les écluses montent et descendent avec les bateaux. C\'est mécanique et beau. Les arbres s\'arquent au-dessus. Les Parisiens piquent-niquent sur les berges. Le canal respire. Il vit. C\'est une connexion vivante au Paris d\'autrefois.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},

  {id:102,n:"Parc de Bercy Gardens — Bercy",a:"Bercy",v:["beautiful", "nature", "quiet"],d:102,s:"Contemporary park with multiple gardens—Asian garden, rose garden, secret groves—urban oasis",st:"Wander through themed gardens. Asian plants. Roses. Bamboo. Water features. Each section different. Quiet beauty.",im:"It\'s 1990s. Former industrial site becomes a park. Nature reclaims urban space.",t:"Wander through themed gardens. Asian plants. Roses. Bamboo. Water features. Each section different. Quiet beauty.\",im:\"It\'s 1990s. Former industrial site becomes a park. Nature reclaims urban space.\",t:\"Free. Open daily. Bercy. East Paris. Peaceful. Photography beautiful. Benches abundant. Plan 2 hours.",c:["beautiful", "nature", "quiet"],r:"g",nn:"Parc de Bercy Gardens — Bercy",ns:"Un lieu authentique où les Parisiens se retrouvent.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},

  {id:108,n:"Père-Lachaise Cemetery Walking Tour",a:"East",v:["history","quiet","free"],d:20,s:"The famous dead buried in ornate tombs — a free historical walk among monuments",st:"Père-Lachaise contains Oscar Wilde, Jim Morrison, Balzac, and thousands of graves. It\'s a sculpture garden; locals come to research family history and reflect. Get a map.",im:"Time-travel: Opened 1804; became fashionable when the famous were buried here.",t:"Free. Métro Lines 2/6 to Père Lachaise.",c:["history_big","quiet"],r:"g",nn:"Cimetière Père-Lachaise",ns:"Tumbas ornamentadas de los famosos — caminar gratis",nst:"Camina entre las tumbas de celebridades en Père-Lachaise.",nt:"Gratis. Métro a Père Lachaise."},
  {id:109,n:"Belleville Street Art District",a:"Northeast",v:["art","free","local"],d:15,s:"Raw neighborhood murals constantly evolving — Paris\' real street art scene",st:"Belleville is the anti-Champs-Élysées. Rue Denoyez and alleys are covered in constantly evolving murals. It\'s raw, political, and authentic. Grab a crêpe and wander.",im:"Time-travel: Belleville was poor Jewish/Italian; street art is gentrifying it.",t:"Free. Métro Line 11 to Belleville.",c:["street_art","local_only"],r:"g",nn:"Belleville Street Art",ns:"Murales dinámicas en constante evolución",nst:"Camina Rue Denoyez viendo arte callejero fresco.",nt:"Gratis. Métro a Belleville."},
  {id:106,n:"Bassin de la Villette Swimming — 19th Arrondissement",a:"19th Arrondissement",v:["free entry", "beautiful", "local"],d:45,s:"Floating pools where locals actually cool off",st:"Four floating pools of varying depths sit in Paris's largest artificial lake, a shimmering rectangle in the 19th Arrondissement. Free entry, open dawn to dusk in summer. The water is clean, the surrounding café culture is relaxed, and you'll see more locals than tourists.",im:"Cool chlorine water hitting your shoulders as you float under open sky, watching barges drift past the concrete edge.",t:"Go on Wednesday or Sunday in July when the water is warmest. Arrive before 11am to avoid the midday rush. The adjacent Bassin has rental kayaks and paddle boards.",c:[],r:"g",nn:"Baignade Bassin de la Villette",ns:"Piscines flottantes où les locaux se baignent réellement",nst:"Quatre piscines flottantes de profondeurs variées dans le plus grand lac artificiel de Paris, un rectangle scintillant du 19e arrondissement. Entrée gratuite, ouvert de l'aube au crépuscule en été. L'eau est propre, la culture des cafés environnants est décontractée.",nt:"Allez le mercredi ou le dimanche en juillet quand l'eau est plus chaude. Arrivez avant 11h pour éviter la foule de midi."},
  {id:107,n:"Canal Saint-Martin Swimming — 11th Arrondissement",a:"Canal Saint-Martin",v:["local", "beautiful", "free entry"],d:30,s:"Wednesday and Sunday plunges in the city's most Instagrammable waterway",st:"Once a year Paris finally lets you swim in the Canal Saint-Martin—the city's most romantic waterway with its wooden lock gates and leafy towpath. July 6–September 7, Wednesday and Sunday afternoons, when boat traffic stops and the water becomes a public pool for brave locals.",im:"Pushing off into tea-green water while lock gates drip overhead and the city echoes from the bridge above.",t:"Arrive after 2pm when the official swimming sessions begin. Check online for exact times—it's a seasonal thing. The Pont des Arts is the best jumping point. It's cold; start with your feet.",c:[],r:"g",nn:"Baignade Canal Saint-Martin",ns:"Plongeon mercredi et dimanche dans la voie navigable la plus instagrammable de la ville",nst:"Une fois par an, Paris vous permet enfin de nager dans le Canal Saint-Martin—la voie navigable la plus romantique de la ville avec ses portes écluses en bois et son sentier ombragé. 6 juillet - 7 septembre, mercredi et dimanche après-midi.",nt:"Arrivez après 14h quand commencent les sessions de baignade officielles. L'eau est froide; commencez par vos pieds."},
  {id:110,n:"Piscine Joséphine Baker — Right Bank",a:"13th Arrondissement",v:["beautiful", "free entry", "local"],d:30,s:"The floating Art Deco pool on the Seine at sunset",st:"A transparent-bottomed floating pool designed by Dominique Perrault sits on the Seine with the city skyline reflected in its surrounding windows. Free entry for Parisians (check residency requirements). Go in summer when it's open and the light turns golden.",im:"Swimming with the Seine directly below you, sunlight striking the metal grille beneath, the city inverted in the windows.",t:"Summer hours: 7am–10pm. Go at 6pm when the light turns the water amber. Bring a towel; there are no lockers, just the bare pool.",c:[],r:"g",nn:"Piscine Joséphine Baker",ns:"La piscine Art Déco flottante sur la Seine au coucher du soleil",nst:"Une piscine flottante aux vitres transparentes conçue par Dominique Perrault se dresse sur la Seine avec l'horizon de la ville réfléchi dans ses fenêtres environnantes.",nt:"Heures d'été : 7h-22h. Allez à 18h quand la lumière tourne l'eau ambrée."},
  {id:111,n:"Parc de Belleville Golden Hour — Belleville",a:"Belleville",v:["hidden", "beautiful", "local"],d:45,s:"The real sunset spot—locals only, wine in hand",st:"Skip Sacré-Cœur. Parc de Belleville sits 108 meters high on the northeast hill of Paris, with a southwest-facing terrace where locals gather at 8pm with bottles of wine. The Eiffel Tower is a tiny spire in the distance. The light turns the whole city amber.",im:"Spreading your blanket on sun-warm grass, the entire city turning gold beneath you, the Eiffel Tower shrinking as the sun drops.",t:"Go on a clear evening in June around 9pm (latest sunset). Bring wine, not a camera—everyone here is living it, not recording it. The left side of the lawn is quieter.",c:[],r:"g",nn:"Parc de Belleville Coucher de soleil",ns:"Le vrai spot coucher de soleil—locaux uniquement, verre de vin à la main",nst:"Parc de Belleville se dresse à 108 mètres de haut sur la colline nord-est de Paris, avec une terrasse orientée au sud-ouest où les locaux se réunissent à 20h avec des bouteilles de vin.",nt:"Allez un soir dégagé en juin vers 21h (coucher le plus tard). Apportez du vin, pas une caméra."},
  {id:112,n:"Square du Vert-Galant Sunset — Île de la Cité",a:"Île de la Cité",v:["hidden", "beautiful", "quiet"],d:30,s:"The pointed tip of the island where the Seine wraps around you",st:"At the very tip of Île de la Cité, a secret pocket park drops below street level to water level, surrounded by weeping willows and the Seine on three sides. At sunset, the light bounces off the water onto your face and the bridges frame the sky. Nearly empty.",im:"Sitting on the stone bench with water at your feet and the city's light fracturing across ripples.",t:"Enter from Rue du Pont Neuf side, descend the cobbled steps. Go 30 minutes before sunset. Bring a book—no one talks here, everyone reads.",c:[],r:"g",nn:"Square du Vert-Galant Coucher de soleil",ns:"La pointe pointue de l'île où la Seine vous entoure",nst:"À la pointe de Île de la Cité, un petit parc secret se jette au niveau de l'eau, entouré de saules pleureurs et de la Seine sur trois côtés.",nt:"Entrez côté Rue du Pont Neuf, descendez les escaliers pavés. Allez 30 minutes avant le coucher. Apportez un livre."},
  {id:113,n:"Rue Lepic Montmartre Sunset — Montmartre",a:"Montmartre",v:["beautiful", "local", "hidden"],d:20,s:"Where the avenue ends and the sun hits the vineyard directly",st:"Rue Lepic climbing toward Montmartre's old mill ends at a corner café where you can see straight west. At 8:30pm, the setting sun hits the last buildings head-on and the whole street turns orange. Vineyards visible. Small tables, no tourists.",im:"The street narrowing into light, the café awning glowing, the sun splitting the buildings in half.",t:"Corner café La Maison Rose—sit outside, order a pastis. Go on a weekday. The view is best from the eastern side of the street looking west.",c:[],r:"g",nn:"Rue Lepic Coucher de soleil Montmartre",ns:"Où l'avenue se termine et le soleil frappe directement le vignoble",nst:"Rue Lepic montant vers le vieux moulin de Montmartre se termine à un café de coin où vous pouvez voir droit à l'ouest.",nt:"Café La Maison Rose—asseyez-vous dehors, commandez un pastis. Allez un jour de semaine."},
  {id:114,n:"Provins Medieval Town — Île-de-France",a:"Outside Paris (1hr train)",v:["history", "beautiful", "hidden"],d:240,s:"Medieval walled town where the Crusaders once camped",st:"Provins is a UNESCO World Heritage medieval fortress town with intact 12th-century ramparts, half-timbered houses, and underground chalk quarries that were used as ossuary. Take the 1:15 RER train from Paris Gare de l'Est. The upper town feels like stepping into a manuscript illumination. The underground tunnels are cold and specific—book ahead.",im:"Stepping through the town gate into cobbled streets, the weight of 900 years pressing down from the ramparts above.",t:"Go on a Friday morning to avoid Saturday crowds. The Tour de César (Caesar's Tower) entrance fee is €7. Bring a jacket for the tunnels—they stay 10°C year-round. The town center has excellent small restaurants.",c:[],r:"g",nn:"Provins Ville Médiévale",ns:"Ville fortifiée médiévale où les Croisés campaient autrefois",nst:"Provins est une ville forteresse médiévale classée au patrimoine mondial de l'UNESCO avec des remparts intacts du 12e siècle, des maisons à colombages et des carrières de craie souterraines.",nt:"Allez un vendredi matin pour éviter la foule du samedi. Amenez une veste pour les tunnels—ils restent à 10°C toute l'année."},
  {id:115,n:"Chartres Cathedral Stained Glass — Île-de-France",a:"Outside Paris (1hr train)",v:["beautiful", "history", "quiet"],d:180,s:"The most dazzling stained glass in Europe—13th century jewels",st:"Chartres Cathedral is one hour southwest by train from Paris and contains 176 stained glass windows (7,000 square meters) dating from the 12th–16th centuries. The blues and reds are vivid, almost neon—the pigments have never faded. Go alone, early, when the morning light first hits the glass and the cathedral is nearly empty.",im:"Entering the dim nave and suddenly the floor is covered in pools of colored light—crimson, cobalt, emerald—cast by 800-year-old glass.",t:"Take the 6:45am train from Gare de Montparnasse. Arrive at the cathedral by 8:45am, before the tour groups. Bring a pair of binoculars to read the stories in the upper windows. The west rose window at sunrise is the single most beautiful thing in France.",c:[],r:"g",nn:"Cathédrale de Chartres Vitraux",ns:"Les vitraux les plus éblouissants d'Europe—joyaux du 13e siècle",nst:"La Cathédrale de Chartres à une heure de train au sud-ouest de Paris contient 176 vitraux datant des 12e-16e siècles.",nt:"Prenez le train de 6h45 de la gare de Montparnasse. Apportez une paire de jumelles pour lire les histoires des fenêtres supérieures."},
  {id:116,n:"Giverny Monet's Garden — Île-de-France",a:"Outside Paris (1hr train)",v:["beautiful", "history", "quiet"],d:240,s:"Water lilies at dawn before the garden wakes up",st:"Claude Monet's house and gardens at Giverny (45 minutes west by train) still grow the same flowers that inspired his late paintings—wisteria, Japanese bridge, water lily pond. Go on a weekday in May before 9am, when the light is still cool and only other artists are walking the paths. The Japanese bridge is yours alone. The water lilies are small and perfect.",im:"The Japanese bridge arching over still water, the wisteria dripping purple above, mist rising from the pond, a Monet painting you're standing inside.",t:"Train from Gare Saint-Lazare. Arrive by 8:30am. Weekdays in May are key—June is busier. Entry €12. Photography is allowed. The gardens close at 5pm in summer, so you have the entire day. Lunch at Maison Feurey across the road.",c:[],r:"g",nn:"Jardin de Giverny",ns:"Nénuphars à l'aube avant que le jardin ne se réveille",nst:"La maison et les jardins de Claude Monet à Giverny contiennent toujours les mêmes fleurs qui ont inspiré ses peintures tardives.",nt:"Train de Gare Saint-Lazare. Arrivez avant 8h30. Les jours de semaine en mai sont essentiels."},
  {id:117,n:"Vaux-le-Vicomte Château — Île-de-France",a:"Outside Paris (45min train)",v:["history", "beautiful", "quiet"],d:180,s:"The château that got its architect thrown in the Bastille by Louis XIV",st:"Vaux-le-Vicomte is the 17th-century château that scandalized the Sun King. Built by the finance minister Nicolas Fouquet, its grandeur so offended Louis XIV that he threw the architect, Le Vau, and Le Nôtre (who designed the gardens) into prison and then stole their designs for Versailles. The story IS the place. Go on a Monday when no one is there.",im:"The gardens extending in perfect geometry to the horizon, the château catching every sunbeam, the knowing sense that you're standing on the site of a royal tantrum.",t:"Train from Gare de Lyon to Melun, then shuttle bus. Entry €19.50. Go Monday morning when the grounds are silent. The gardens are the best part—walk to the far end of the alley for the view back. The Musée des Équipages (carriage museum) is a hidden gem inside.",c:[],r:"g",nn:"Château de Vaux-le-Vicomte",ns:"Le château dont l'architecte a été jeté à la Bastille par Louis XIV",nst:"Vaux-le-Vicomte est le château du 17e siècle qui scandalisait le Roi Soleil, construit par le ministre des finances Nicolas Fouquet.",nt:"Train de Gare de Lyon à Melun, puis bus de navette. Allez le lundi matin quand les terres sont silencieuses."},
  {id:118,n:"Senlis Medieval Town — Île-de-France",a:"Outside Paris (45min train)",v:["hidden", "beautiful", "quiet"],d:120,s:"The overlooked little sister to Provins—just as beautiful, half the crowds",st:"Senlis is a medieval cathedral town 45 minutes north by train from Paris, less famous than Provins but with the same winding stone lanes and Gothic cathedral. The town feels lived-in, not curated. You can have dinner in a 14th-century building and barely see another tourist. The cathedral's spire is visible for kilometers across the countryside.",im:"Narrow cobbled streets leading toward the cathedral spire, flower boxes on half-timbered houses, the smell of bread from a neighborhood boulangerie.",t:"Train from Gare du Nord or Gare de l'Est to Senlis-Chantilly station, then bus. Walk the entire town—it takes 2 hours. Visit the Musée de la Spire (cathedral tower museum) for views. Dinner at L'Escarpe is exceptional and cheap (€30 menu).",c:[],r:"g",nn:"Senlis Ville Médiévale",ns:"La petite sœur oubliée de Provins—tout aussi belle, moitié moins de foule",nst:"Senlis est une ville-cathédrale médiévale à 45 minutes de train au nord de Paris, avec les mêmes ruelles sinueuses en pierre et une cathédrale gothique.",nt:"Train de Gare du Nord ou Gare de l'Est. Marchez dans toute la ville—cela prend 2 heures. Dîner à L'Escarpe est exceptionnel et bon marché."},
  {id:119,n:"Café de Flore Sartre Corner — Saint-Germain",a:"Saint-Germain",v:["history", "local", "quiet"],d:30,s:"The table where Sartre wrote Being and Nothingness in the afternoons",st:"Café de Flore at the corner of Rue de l'Abbaye was Sartre and Simone de Beauvoir's office in the 1940s. Sartre occupied the same corner table every afternoon, writing Being and Nothingness while drinking coffee. You can sit in that exact spot. The café is crowded now, but the corner banquette, by the window facing the street, is the original table.",im:"Sitting in Sartre's chair, watching the same Paris street he watched while writing continental philosophy, the noise of the café the same white noise of 80 years ago.",t:"Go in the late afternoon, 3–5pm, when it's quieter. Order a noisette (espresso with hot milk). The waiter will know which table. Sit for at least an hour. Read something by Sartre or de Beauvoir. The coffee is ordinary but the location is extraordinary.",c:[],r:"g",nn:"Café de Flore Coin Sartre",ns:"La table où Sartre a écrit L'Être et le Néant l'après-midi",nst:"Le Café de Flore au coin de la Rue de l'Abbaye était le bureau de Sartre et Simone de Beauvoir dans les années 1940.",nt:"Allez en fin d'après-midi, 15h-17h, quand c'est plus calme. Commandez une noisette."},
  {id:120,n:"Curie Museum — Latin Quarter",a:"5th Arrondissement",v:["history", "hidden", "quiet"],d:30,s:"The laboratory where Marie and Pierre Curie discovered radium—and it's free",st:"The Curie Museum is the actual laboratory where Marie and Pierre Curie worked, now preserved as a small museum. The rooms are spare and cold. You can see the bench where they separated the isotope, the blackboards with their notes, the apartment they lived in upstairs. Entry is free. Almost no one knows about it.",im:"Standing in the room where radioactivity was discovered, the furniture unchanged since 1934, Marie's coat still on a peg, the silence of science in the making.",t:"1 Rue Pierre et Marie Curie, 5th Arrondissement. Open 1–5pm, Wednesday–Saturday only, groups only (book online). Go on a Wednesday when school groups are fewer. Bring ID. The museum offers a 30-minute private tour in English if you book 48 hours ahead. Cost: free.",c:[],r:"g",nn:"Musée Curie",ns:"Le laboratoire où Marie et Pierre Curie ont découvert le radium—et c'est gratuit",nst:"Le Musée Curie est le vrai laboratoire où Marie et Pierre Curie ont travaillé, maintenant préservé en petit musée.",nt:"1 Rue Pierre et Marie Curie, 5e Arrondissement. Ouvert 13h-17h, mercredi-samedi uniquement, groupes seulement. Gratuit."},
  {id:121,n:"Marché d'Aligre Early Morning — 12th Arrondissement",a:"12th Arrondissement",v:["local", "free entry", "hidden"],d:45,s:"The real market—arrive at 8am when prices plummet and vendors are clearing",st:"Marché d'Aligre is Paris's most authentic neighborhood market, split between the covered section (fruits, vegetables, fish) and the flea market extension. Arrive at 8am, just as opening chaos peaks. By 1pm, vendors are slashing prices by half. The energy is raw—vendors shout, old men argue over zucchini, you find a vintage Hermès scarf for €2.",im:"The vendor hollering 'Trois pour dix euros!' the smell of fresh strawberries and diesel, elbowing through crowds to grab tomatoes before they're gone, the fountain running in the background.",t:"Tuesday–Sunday, 7am–2pm. Arrive 8–9am for the best energy and produce. Bring cash—flea market vendors often don't take cards. Don't buy flowers here; go to the flower vendor on Rue de Chalons. At 12:30pm, prices drop dramatically. Lunch at La Belle Hortense (wine and books) after.",c:[],r:"g",nn:"Marché d'Aligre Matin",ns:"Le vrai marché—arrivez à 8h quand les prix s'effondrent",nst:"Le Marché d'Aligre est le marché de quartier le plus authentique de Paris, divisé entre la section couverte et l'extension du marché aux puces.",nt:"Mardi-dimanche, 7h-14h. Arrivez 8h-9h pour la meilleure ambiance. Apportez de l'espèce."},
  {id:122,n:"Marché des Enfants Rouges — 3rd Arrondissement",a:"Le Marais",v:["local", "hidden", "beautiful"],d:60,s:"Paris's oldest covered market—eating breakfast in a 400-year-old marketplace",st:"Built in 1629, Marché des Enfants Rouges is the oldest food market in Paris, hidden in a quiet corner of the Marais. Unlike the tourist-packed outdoor markets, this covered arcade still functions as a genuine food market with a twist: half the stalls are cooked food vendors from around the world. You buy a roti or Lebanese kibbeh and eat at shared tables in the middle of the market.",im:"Sitting at a long wooden table eating fragrant spiced chicken, the market bustle around you, the smell of five cuisines at once, morning light slanting through the skylights.",t:"39 Rue de Bretagne, 3rd Arrondissement. Open Tue–Thu 8:30am–1pm and 4–7:30pm, Fri–Sat 8:30am–1pm and 4–8pm, Sun 8:30am–2pm. Go Tuesday morning before 9:30am for solitude. Try the falafel at L'As du Fallafel or the roti at the Indian stall. Arrive early to find seating.",c:[],r:"g",nn:"Marché des Enfants Rouges",ns:"Le plus ancien marché couvert de Paris—prendre le petit-déjeuner dans un marché vieux de 400 ans",nst:"Construit en 1629, le Marché des Enfants Rouges est le plus ancien marché alimentaire de Paris, caché dans un coin tranquille du Marais.",nt:"39 Rue de Bretagne, 3e Arrondissement. Allez mardi matin avant 9h30. Essayez le falafel ou les roti."},
  {id:123,n:"Marché de Belleville North African & Asian — 20th Arrondissement",a:"Belleville",v:["local", "hidden", "beautiful"],d:45,s:"The cheapest, loudest, most unfiltered market in Paris",st:"Marché de Belleville operates Tuesday and Friday mornings under the aerial Métro line on Boulevard de Belleville. It's the least touristy market in Paris—vendors shout in Arabic, Mandarin, Vietnamese, and French. Produce is the cheapest you'll find. The crowd is real—families, grandmothers, first-generation immigrants. No Instagram photos, no pastries, just serious food buying.",im:"The rumble of the Métro overhead, vendors hollering prices in five languages, someone haggling hard over a bundle of cilantro, the smell of unfamiliar spices.",t:"Tuesday or Friday, 7am–2:30pm. Go on a Friday morning at 8am. Bring a cart or bag—lots to carry. Cash preferred. The best stalls are the spice vendor at the center and the dried fruit vendors (pistachios, apricots, dates are half the price of supermarkets). Skip any produce with English labels.",c:[],r:"g",nn:"Marché de Belleville",ns:"Le marché le moins cher, le plus bruyant et le plus non filtré de Paris",nst:"Le Marché de Belleville opère mardi et vendredi matin sous la ligne de Métro aérienne sur le Boulevard de Belleville.",nt:"Mardi ou vendredi, 7h-14h30. Allez vendredi matin à 8h. Apportez un chariot ou un sac."},
  {id:124,n:"Pétanque at Jardin du Luxembourg — 6th Arrondissement",a:"Saint-Germain",v:["local", "free entry", "quiet"],d:45,s:"Watching old men in flat caps throw steel balls under century-old trees",st:"The Luxembourg Gardens have two official pétanque courts on the Rue Guynemer side, shaded by century-old trees. Thursday evenings are the social time—old Parisians gather, bets are made in low voices, games last 40 minutes. You can watch, sit nearby with wine, and understand how locals spend time here. The rules are simple; the skill is invisible until you watch closely.",im:"The hollow click of metal balls on gravel, a player's satisfied nod when his boule lands inches from the target, the evening light through the leaves.",t:"Go on a Thursday evening, 5–7pm, in summer (May–September). Bring wine and a blanket. You won't be allowed to play unless you're already in the local club, but watching is free and endlessly entertaining. The café nearby sells beer. Sit quietly; locals don't like commentary.",c:[],r:"g",nn:"Pétanque au Jardin du Luxembourg",ns:"Regarder les vieux hommes en casquettes plates lancer des boules en acier sous des arbres centenaires",nst:"Le Jardin du Luxembourg a deux terrains de pétanque officiels côté Rue Guynemer, ombragés par des arbres centenaires.",nt:"Allez jeudi soir, 17h-19h, en été. Apportez du vin et une couverture."},
  {id:125,n:"Cinéma en Plein Air La Villette — 19th Arrondissement",a:"19th Arrondissement",v:["free entry", "beautiful", "local"],d:60,s:"Outdoor cinema by the canal, free, hundreds of locals on the grass",st:"Every summer, from mid-July through August, the Parc de la Villette becomes an open-air cinema. Films are projected onto a massive screen over the Bassin de la Villette. Hundreds of locals spread blankets on the grass, open wine bottles, and watch classics and recent releases. Entry is free. The screen reflects perfectly in the water. The Métro runs until 1am.",im:"A thousand people on the grass in darkness, the film glowing massive on the water, someone's dog running past, someone else opening wine, the night humid and full of strangers becoming neighbors.",t:"Mid-July through August. Doors open at 9:30pm, films start at 10pm. Arrive by 9pm to claim grass. Bring a blanket, wine, and snacks (no outside food allowed, but the park has food stalls). Films rotate—check the schedule online. Park the bike by the canal entrance. Stay until credits; the walk back is half the experience.",c:[],r:"g",nn:"Cinéma en Plein Air La Villette",ns:"Cinéma en plein air près du canal, gratuit, des centaines de locaux sur l'herbe",nst:"Chaque été, de mi-juillet à août, le Parc de la Villette devient un cinéma en plein air.",nt:"Mi-juillet à août. Les portes ouvrent à 21h30, les films commencent à 22h. Arrivez à 21h pour réclamer l'herbe."},
  {id:126,n:"Fête de la Musique June 21 — Citywide",a:"All Paris",v:["free entry", "local", "beautiful"],d:420,s:"Free live music everywhere, all night, June 21—thousands of stages, no tickets",st:"On June 21, the summer solstice, Paris becomes one massive music festival. Every street, every park, every metro station, every bar has a stage. Local bands, classical orchestras, DJs, folk singers, everyone performs free. By midnight, the entire city is a concert. There are no tickets, no security, no designated venues—it's completely anarchic and completely magical.",im:"Walking from a string quartet in a quiet alley to a techno stage on the Champs-Élysées, the whole city vibrating with music, strangers dancing together at 2am.",t:"June 21, all day and night. Start around 6pm. The main stages are on Champs-Élysées (pop), Parc de la Villette (world music), Place des Vosges (jazz). Smaller neighborhood stages are better—less crowded. Bring your own wine. By 3am, half the city is dancing. The Métro runs all night (line 1 only). Wear comfortable shoes and expect to walk 20km.",c:[],r:"g",nn:"Fête de la Musique 21 Juin",ns:"Musique live gratuite partout, toute la nuit, 21 juin—milliers de scènes, pas de billets",nst:"Le 21 juin, le solstice d'été, Paris devient un festival de musique géant.",nt:"21 juin, toute la journée et la nuit. Commencez vers 18h. Le métro fonctionne toute la nuit (ligne 1 seulement)."},
  {id:127,n:"Wall of the Federalists (Mur des Fédérés) — Père Lachaise",a:"20th Arrondissement",v:["history", "quiet", "hidden"],d:30,s:"The wall where 147 Communards were shot in 1871—and the city forgot about it",st:"In May 1871, at the end of the Paris Commune, 147 revolutionary fighters were executed against a brick wall in Père Lachaise cemetery and thrown into a mass grave. The wall still stands. A small plaque marks the spot. Almost no tourists know about it. On May 28 each year, flowers appear and old Communists gather, but the rest of the time it's just red brick and silence and history.",im:"Running your hand over the pockmarked brick where bullets struck, the names of the dead carved into adjacent stone, the weight of a failed revolution.",t:"Père Lachaise Cemetery, far northeast corner, near the Rue de Bagnolet entrance. The cemetery is free to enter. Search for 'Mur des Fédérés' on the map they give you at the gate. Bring flowers if you're visiting on May 28. The wall is small and easy to miss—look for the wrought-iron barrier around it. Spend time here; very few do.",c:[],r:"g",nn:"Mur des Fédérés Père Lachaise",ns:"Le mur où 147 Communards ont été fusillés en 1871",nst:"En mai 1871, à la fin de la Commune de Paris, 147 combattants révolutionnaires ont été exécutés contre un mur en brique du cimetière de Père Lachaise.",nt:"Cimetière Père Lachaise, coin nord-est lointain, près de l'entrée Rue de Bagnolet."},
  {id:128,n:"Rungis Wholesale Market Dawn Tour — Île-de-France",a:"Outside Paris (4am)",v:["hidden", "weird", "local"],d:240,s:"The world's largest food market at 4am—13,000 people, 234 hectares, mayhem",st:"Rungis International Market, 12km south of Paris, is the largest wholesale food market in the world. At 4am, it's bedlam—13,000 people, 200 trucks, restaurants buying for dinner, chefs arguing with fishmongers, the whole rhythm of Paris waking up visible in real time. Tours must be booked in advance. You'll see fish that won't reach restaurants for 12 hours, taste fresh juice, understand why Paris eats so well.",im:"The pre-dawn darkness, then suddenly thousands of lights, workers in rubber boots, the smell of salt water and fresh herbs, a chef tasting tomatoes at 4:30am.",t:"Must book tour in advance (Rungis official website). Tours are €10–15. Start from Châtelet-Les Halles Métro, take shuttle bus at 4am. Wear closed-toe shoes and a jacket. Go hungry—the market cafés serve breakfast at 4:45am. The fish pavilion is the most interesting. Stay 2.5 hours. You'll never see produce the same way.",c:[],r:"g",nn:"Marché de Rungis Aube",ns:"Le plus grand marché alimentaire du monde à 4h du matin",nst:"Le Marché International de Rungis, à 12 km au sud de Paris, est le plus grand marché de gros alimentaire du monde.",nt:"Doit être réservé à l'avance. Portez des chaussures fermées et une veste. Allez affamé."},
  {id:129,n:"La Chapelle Neighborhood African Paris — 18th Arrondissement",a:"18th Arrondissement",v:["local", "hidden", "weird"],d:45,s:"The heart of African Paris—food, clothes, music, no tourists",st:"La Chapelle is a working-class neighborhood in the 18th where Senegal, Mali, Côte d'Ivoire, and Congo live and work and eat. Rue de l'Olive and surrounding blocks are dense with African restaurants, tailors, music vendors, beauty supply shops. The food is extraordinary—attiéké, jollof rice, yam fries. The streets smell like palm oil and spices. Tourists don't come here.",im:"Walking into a restaurant where French isn't being spoken, the kitchen visible in back, someone calling out in Wolof, the food arriving steaming and unfamiliar and perfect.",t:"Métro line 4, La Chapelle or Château-Rouge stations. Walk Rue Marcadet and its side streets. Lunch at Chez Khadija or La Kabane (both authentic, cheap, €8 mains). Buy spices at Boutique Mali. Avoid night time. Go on Saturday when the neighborhood is busiest. Nobody hustles you; everyone minds their own.",c:[],r:"g",nn:"La Chapelle Quartier Africain",ns:"Le cœur du Paris africain—nourriture, vêtements, musique, pas de touristes",nst:"La Chapelle est un quartier ouvrier du 18e où vivent et travaillent le Sénégal, le Mali, la Côte d'Ivoire et le Congo.",nt:"Métro ligne 4, stations La Chapelle ou Château-Rouge. Déjeuner chez Khadija ou La Kabane."},
  {id:130,n:"Charonne Neighborhood — 20th Arrondissement",a:"20th Arrondissement",v:["hidden", "local", "quiet"],d:45,s:"The quiet hill where Paris locals live—cobbled streets, no tourists, proper cafés",st:"Charonne is the 20th arrondissement neighborhood that stayed a village. Steep cobbled streets, low-rise buildings, real restaurants and bars where locals gather. The streets don't have names you'll recognize. The Métro isn't as frequent. People live here. You can buy a croissant from a shop that's been there since 1952. The wine is ordinary, the conversation is real.",im:"Walking uphill on cobbles, the city noise falling away, a café with three regulars at the bar, the sound of someone's window opening above.",t:"Métro line 3 or 11, Rue des Pyrénées station. Walk everywhere—the neighborhood is only 1 square km. Café de Charonne is the real locals' bar. L'Instant T is the neighborhood wine bar. Buy bread at Boulangerie Bourgeat (original recipe since 1930s). The side streets off Rue de Turenne are prettiest. Go on a rainy afternoon.",c:[],r:"g",nn:"Quartier de Charonne",ns:"La colline tranquille où vivent les locaux—ruelles pavées, pas de touristes",nst:"Charonne est le quartier du 20e arrondissement qui est resté un village.",nt:"Métro ligne 3 ou 11, station Rue des Pyrénées. Marchez partout."},
  {id:131,n:"Ménilmontant — 11th/20th Arrondissements",a:"11th/20th Arrondissements",v:["hidden", "local", "beautiful"],d:45,s:"The bohemian hill with street art, dive bars, and real artist studios",st:"Ménilmontant climbs the eastern hill of Paris, full of street art, artist studios, vineyards (the last ones remain here), and working-class bars where the local wine is 3 euros. It's trendy now, but still genuine—the Passage des Soupirs runs between houses with yellow and blue facades, hidden from the main street. There's a DIY music venue, a silkscreen print collective, real community gardens.",im:"Climbing steep Rue de Ménilmontant, tags and murals on every surface, a tiny bar's door open, jazz leaking out, someone's clothing drying on a balcony across the alley.",t:"Métro line 2, Ménilmontant station. Start at the Marché de Belleville (Friday morning) at the bottom, then walk up. The Passage des Soupirs (hidden alley north of Rue de Ménilmontant) is the gem. Bar Ourcq is the social bar. L'Essence is the cheap wine place (€2.50 glass). The wall art changes monthly—take photos. Thursday evenings are busiest. Avoid weekends.",c:[],r:"g",nn:"Ménilmontant",ns:"La colline bohème avec de l'art de rue, des bars de plongée et de vrais ateliers d'artistes",nst:"Ménilmontant monte la colline orientale de Paris, pleine d'art de rue et d'ateliers d'artistes.",nt:"Métro ligne 2, station Ménilmontant. Commencez au Marché de Belleville."},
  {id:132,n:"Canal Saint-Martin & Canal de l'Ourcq Cycling Route — Northeast Paris",a:"11th–19th Arrondissements",v:["beautiful", "local", "free entry"],d:120,s:"A 23km flat, safe bike route where locals actually ride, not tourists",st:"The canal paths connecting Canal Saint-Martin (5km) and Canal de l'Ourcq (23km) form a completely flat, car-free route through northeast Paris. The Ourcq runs through neighborhoods locals live in—working-class, interesting, far from tourists. The Bassin de la Villette is the endpoint, surrounded by kayak rentals and waterfront cafés. The whole route is separated from car traffic.",im:"Pedaling through shade trees, the canal on both sides, locals walking dogs, the city noise fading, arriving at the lake with 10,000 other cyclists on a weekend.",t:"Start at Port de l'Arsenal (Métro Bastille) or Bassin de la Villette (Métro Jaurès). Rent Vélib' bikes (€25/day pass). The whole route takes 1.5 hours. Stop at Chez Prune (café overlooking the Saint-Martin locks). The Ourcq route is less touristy—keep going to Parc de la Poudrerie (11km from Villette) for a real local park. Go on a weekday morning.",c:[],r:"g",nn:"Route Canal Saint-Martin & Ourcq Vélo",ns:"Un itinéraire vélo plat et sûr de 23 km où les locaux roulent réellement",nst:"Les chemins des canaux reliant le Canal Saint-Martin (5 km) et le Canal de l'Ourcq (23 km) forment un itinéraire entièrement plat et sans voiture.",nt:"Commencez au Port de l'Arsenal (Métro Bastille) ou Bassin de la Villette. Louez des vélos Vélib'."},
  {id:133,n:"Paris Roller Friday Night Skate — Citywide",a:"All Paris",v:["free entry", "local", "weird"],d:180,s:"3,500 people on skates closing traffic for the night—total mayhem, totally legal",st:"Every Friday at 9:30pm, 3,500 Parisians gather on skates (and skateboards, scooters, inline skates) at Montparnasse station. The police close the entire route. You roll through empty streets from Trocadéro to Eiffel Tower to Louvre to Champs-Élysées, a 22km circuit, protected by motorcycle escorts, finishing at 1am. It's anarchic, free, and the single most Parisian night out.",im:"Rolling down the Champs-Élysées with thousands of strangers, the Louvre passing in darkness, the Arc de Triomphe lit up, the whole city yours.",t:"Every Friday, 9:30pm start (arrive by 8:45pm to register). Bring any kind of wheeled transportation—skates, roller skates, skateboard, scooter. The route changes weekly (check website). Wear protective gear. Speed is moderate (12–15 km/h). You'll see every type of Parisian. The energy is joyful, not aggressive. First-timers are welcomed. No experience needed.",c:[],r:"g",nn:"Paris Roller Vendredi Soir",ns:"3 500 personnes sur patins fermant la circulation la nuit",nst:"Chaque vendredi à 21h30, 3 500 Parisiens se réunissent sur patins à la station Montparnasse.",nt:"Chaque vendredi, départ 21h30 (arrivez à 20h45 pour vous inscrire). Apportez n'importe quel transport roulant."},
  {id:134,n:"Shakespeare and Company Original Location History — Left Bank",a:"Latin Quarter",v:["history", "quiet", "local"],d:45,s:"The bookshop that published Joyce and sheltered Hemingway—the real building, the real story",st:"The original Shakespeare and Company opened in 1919 at 8 Rue Dupuytren (now demolished), not the current tourist spot. The original shop was where Sylvia Beach published James Joyce's Ulysses illegally, where Hemingway slept in the back room, where Fitzgerald and everyone else came. The current shop (37 Rue de la Bûcherie) was opened in 1951 by George Whitman. It's also magical, but tourist-packed. The real story is the first location.",im:"Imagining the cramped, dark shop where Ulysses was first printed, the weight of that literary moment, the smell of old paper and contraband.",t:"The original building is gone, but nearby plaques mark its location. Walk to 8 Rue Dupuytren and stand there—the history is in the cobbles. The current Shakespeare and Company (37 Rue de la Bûcherie) is worth visiting at 8am before crowds, though it's touristy. The Abbey Bookshop (29 Rue de la Parcheminerie) is the real literary spot now—free coffee, run by a Canadian, where actual writers hang out.",c:[],r:"g",nn:"Shakespeare and Company Histoire",ns:"La librairie qui a publié Joyce et abrité Hemingway",nst:"La Shakespeare and Company originale a ouvert en 1919 au 8 Rue Dupuytren (maintenant démoli), pas à l'endroit touristique actuel.",nt:"Le bâtiment original est parti, mais des plaques à proximité marquent son emplacement. La Abbey Bookshop (29 Rue de la Parcheminerie) est le vrai spot littéraire maintenant."},
  {id:135,n:"Musée d'Art Moderne Paris Free Permanent — 16th Arrondissement",a:"16th Arrondissement",v:["free entry", "beautiful", "quiet"],d:60,s:"Modern art from 1906 onward, always free, rarely crowded",st:"The Musée d'Art Moderne de la Ville de Paris holds the permanent collection free year-round—Picasso, Matisse, Kandinsky, and lesser-known works. The rooms are spacious and never crowded. The 1937 mural by Dufy is extraordinary. Entry to permanent galleries is always free; special exhibitions cost €7. The view over the Seine from the terrace is peaceful.",im:"Standing in front of a Picasso you've never seen, the room empty except for you, light streaming through tall windows onto the canvas.",t:"11 Avenue du Président Wilson, 16th Arrondissement. Open 10am–6pm, closed Mondays. Go on a Tuesday morning—you might be alone. The Dufy mural (top floor) is the centerpiece. The café has terrible coffee but good salads. Bring a notebook; the space is contemplative.",c:[],r:"g",nn:"Musée d'Art Moderne Paris",ns:"L'art moderne depuis 1906, toujours gratuit, rarement bondé",nst:"Le Musée d'Art Moderne de la Ville de Paris détient la collection permanente gratuitement toute l'année.",nt:"11 Avenue du Président Wilson, 16e Arrondissement. Ouvert 10h-18h, fermé les lundis."},
  {id:136,n:"Petit Palais Free Museum — 8th Arrondissement",a:"Champs-Élysées",v:["free entry", "beautiful", "quiet"],d:45,s:"Free permanent collection in a 1900 palace across from Grand Palais—nobody knows",st:"Petit Palais holds medieval art, 18th-century paintings, and decorative arts—always free to the permanent collection. Built for the 1900 Exposition Universelle, it's an architectural gem with a glass-roofed courtyard. Tourists are at the Grand Palais across the street; you'll have rooms to yourself. The paintings are museum-quality. Entry is free; you just walk in.",im:"Walking through a 1900 palace in near-solitude, a Fragonard painting on the wall, the glass-roofed courtyard flooding the marble with light.",t:"Avenue Winston Churchill, 8th Arrondissement. Open 10am–6pm, closed Sundays. Go on a Thursday when workers are still here (special exhibitions run Wed–Sun). The courtyard is the best room. The medieval art gallery on the ground floor is small and perfect. No crowds. Free bathrooms.",c:[],r:"g",nn:"Petit Palais Musée Gratuit",ns:"Collection permanente gratuite dans un palais de 1900",nst:"Le Petit Palais détient l'art médiéval, les peintures du 18e siècle et les arts décoratifs—toujours gratuit.",nt:"Avenue Winston Churchill, 8e Arrondissement. Ouvert 10h-18h, fermé le dimanche."},
  {id:137,n:"Eiffel Tower No-Climb Strategy — Trocadéro",a:"1st Arrondissement",v:["beautiful", "free entry", "local"],d:45,s:"Why go up when you can sit below it at night with wine, for free",st:"Everyone climbs the Eiffel Tower. Instead: sit on the Trocadéro steps at 9pm, bring a bottle of wine, watch the city lights come up, and let the Tower be the backdrop to your night. Every hour on the hour, the Tower sparkles for 5 minutes—20,000 bulbs. The Trocadéro lawn is packed with Parisians doing exactly this. You'll spend €5 on wine instead of €30 on a ticket, and the view is better.",im:"The Tower glittering above you, the city spread below you, the sound of thousands of whispered conversations in French, Arabic, English, Chinese.",t:"Trocadéro steps, any evening, 8–11pm. Bring a blanket and wine. The right side of the steps (facing the Tower) has fewer tourists than the left. Go on a weekday evening in June when it's light until 10pm. The lawn is official free real estate. Bring a picnic. The sparkles happen exactly on the hour. Skip the climb entirely.",c:[],r:"g",nn:"Tour Eiffel Vue Trocadéro",ns:"Pourquoi monter quand vous pouvez vous asseoir dessous la nuit avec du vin, gratuitement",nst:"Tout le monde monte à la Tour Eiffel. À la place : asseyez-vous sur les marches du Trocadéro à 21h, apportez une bouteille de vin.",nt:"Marches du Trocadéro, n'importe quel soir, 20h-23h. Apportez une couverture et du vin."},
  {id:138,n:"Musée d'Orsay Clock Room View — 7th Arrondissement",a:"Saint-Germain",v:["beautiful", "quiet", "history"],d:90,s:"The room inside the giant Musée d'Orsay clock—looking out over Paris at 5pm",st:"The Musée d'Orsay is a converted train station. Inside the building is a room actually inside one of the giant Art Nouveau clocks. Book a timed visit to the clock room—it's in the ticket options. You stand inside the mechanism, watching Paris through the clock face. Go at 5pm when the crowds thin and the light turns the Seine and rooftops gold.",im:"Standing inside a giant clock, Paris visible through the hands and numerals, the light turning everything amber, the sound of time ticking around you.",t:"Musée d'Orsay, 1 Rue de la Légion d'Honneur. Book tickets online; the clock room is a separate €18 ticket. Book 5pm slot. Allow 45 minutes total. Monet's late water lilies are in Room 34 (top floor)—go there first, then the clock. The café is overpriced; buy food outside first.",c:[],r:"g",nn:"Musée d'Orsay Salle de l'Horloge",ns:"La salle à l'intérieur de la grande horloge du Musée d'Orsay",nst:"Le Musée d'Orsay est une gare convertie. À l'intérieur du bâtiment se trouve une pièce réellement à l'intérieur de l'une des géantes horloges Art Nouveau.",nt:"Musée d'Orsay, 1 Rue de la Légion d'Honneur. Réservez les billets en ligne; la salle de l'horloge est un billet séparé de 18 €."},
  {id:139,n:"Sainte-Chapelle Upper Chapel Stained Glass — Île de la Cité",a:"1st Arrondissement",v:["beautiful", "history", "quiet"],d:60,s:"1,113 stained glass panels from 1248—the most dazzling religious art in Europe",st:"Sainte-Chapelle is not a church you visit; it's a chapel made entirely of glass. The upper chapel has 1,113 panels of stained glass dating to 1248. The walls are 75% glass. When you enter, the entire space glows in reds, blues, and golds. It was built to house the Crown of Thorns. The light is architectural, not decoration. Go at sunset when the light passes through the glass directly onto you.",im:"Stepping into the upper chapel and every surface glowing—the walls, the floor, your hands—colored light from 800 years ago pouring through medieval glass.",t:"4 Rue de Montmorency, Île de la Cité. Open 9am–7pm daily. Book online to skip lines (€12.50). Go at 5pm in May when sunset hits the west rose window. The lower chapel is plain stone (cheaper option exists), but skip it—the upper chapel is the whole point. Allow 45 minutes. No photos inside. Bring reading glasses to see the detail.",c:[],r:"g",nn:"Sainte-Chapelle Vitraux",ns:"1 113 panneaux de vitraux de 1248",nst:"Sainte-Chapelle n'est pas une église que vous visitez ; c'est une chapelle entièrement en verre.",nt:"4 Rue de Montmorency, Île de la Cité. Ouvert 9h-19h tous les jours. Réservez en ligne."},

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
{/* dark scrim over photo */}
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Paris Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Paris Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
