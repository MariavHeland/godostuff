  {id:1,n:"Belleville Murals and Street Art — Belleville",a:"Belleville",v:["street_art", "local_only"],d:1,s:"Entire neighborhood is moving mural — immigrant communities paint identity on brick",st:"Walk and stare upward. Color explodes on walls. Arabic, Chinese, French. Every language. Every culture. The neighborhood paints itself. It\'s alive. It\'s real. It\'s political.",im:"It\'s 2000. Artists come. They claim walls. Communities follow. Color happens. Gentrification arrives anyway. But the murals remain as witness.",t:"Walk and stare upward. Color explodes on walls. Arabic, Chinese, French. Every language. Every culture. The neighborhood paints itself. It\'s alive. It\'s real. It\'s political.\",im:\"It\'s 2000. Artists come. They claim walls. Communities follow. Color happens. Gentrification arrives anyway. But the murals remain as witness.\",t:\"Free walk. Rue Denoyez best for murals. Start early morning. Weekends busier. Small cafés for coffee and croissants. Street food vendors afternoons. Respectful photography appreciated.",c:["street_art", "local_only"],r:"g",nn:"Belleville Murals and Street Art — Belleville",ns:"Un quartier qui crie ses couleurs sur le béton et l\'histoire.",nst:"Levez les yeux. Les couleurs explosent partout — arabe, chinois, français. Chaque langue. Chaque culture. Le quartier se peint lui-même. C\'est vivant. C\'est vrai. C\'est politique. Les artistes revendiquent les murs depuis les années 2000. Les communautés suivent. Malgré la gentrification, les fresques restent comme témoins du passé.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},
  {id:2,n:"La Maroquinerie Concert Venue — Belleville",a:"Belleville",v:["local_only", "history"],d:2,s:"Former leather workshop turned music venue — working-class soul in concert form",st:"Dark venue. Raw acoustics. Musicians perform where craftsmen worked. The walls remember leather-working. Now music vibrates the same stone. Community here is real.",im:"It\'s 1960. Leather workers cut and stitch. Now musicians arrive. The space transforms but keeps its working-class spirit.",t:"Dark venue. Raw acoustics. Musicians perform where craftsmen worked. The walls remember leather-working. Now music vibrates the same stone. Community here is real.\",im:\"It\'s 1960. Leather workers cut and stitch. Now musicians arrive. The space transforms but keeps its working-class spirit.\",t:\"Check concert schedule online. Most shows evening/night. Ticket prices reasonable. Standing room often available. Arrive early for good position. Crowd is mixed and welcoming.",c:["local_only", "history_big"],r:"g",nn:"La Maroquinerie Concert Venue — Belleville",ns:"Une fenêtre ouverte sur l\'âme ouvrière de Paris.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},

  {id:4,n:"Canal Saint-Martin Locks — Canal Saint-Martin",a:"Canal Saint-Martin",v:["beautiful", "romantic_water", "quiet"],d:4,s:"Historic canal with nine locks — water-powered Paris before electricity",st:"Bridges curve over water. Locks rise and fall with boats. It\'s mechanical and beautiful. Trees arch overhead. Parisians picnic on banks. The canal breathes. It\'s alive.",im:"It\'s 1825. The canal opens. Water flows. Commerce floats. Now community gathers. Different flow. Same magic.",t:"Bridges curve over water. Locks rise and fall with boats. It\'s mechanical and beautiful. Trees arch overhead. Parisians picnic on banks. The canal breathes. It\'s alive.\",im:\"It\'s 1825. The canal opens. Water flows. Commerce floats. Now community gathers. Different flow. Same magic.\",t:\"Free walk. Full canal is 4.5km. Best section Rue Louis Blanc to République. Picnic supplies nearby. Boat tours available (€12-20). Early mornings magical. Spring is perfect.",c:["beautiful", "romantic_water", "quiet"],r:"g",nn:"Canal Saint-Martin Locks — Canal Saint-Martin",ns:"La magie mécanique de Paris avant l\'électricité coule toujours.",nst:"Les ponts se courbent au-dessus de l\'eau. Les écluses montent et descendent avec les bateaux. C\'est mécanique et beau. Les arbres s\'arquent au-dessus. Les Parisiens piquent-niquent sur les berges. Le canal respire. Il vit. C\'est une connexion vivante au Paris d\'autrefois.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},

  {id:102,n:"Parc de Bercy Gardens — Bercy",a:"Bercy",v:["beautiful", "nature", "quiet"],d:102,s:"Contemporary park with multiple gardens—Asian garden, rose garden, secret groves—urban oasis",st:"Wander through themed gardens. Asian plants. Roses. Bamboo. Water features. Each section different. Quiet beauty.",im:"It\'s 1990s. Former industrial site becomes a park. Nature reclaims urban space.",t:"Wander through themed gardens. Asian plants. Roses. Bamboo. Water features. Each section different. Quiet beauty.\",im:\"It\'s 1990s. Former industrial site becomes a park. Nature reclaims urban space.\",t:\"Free. Open daily. Bercy. East Paris. Peaceful. Photography beautiful. Benches abundant. Plan 2 hours.",c:["beautiful", "nature", "quiet"],r:"g",nn:"Parc de Bercy Gardens — Bercy",ns:"Un lieu authentique où les Parisiens se retrouvent.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},
  {id:103,n:"Musée de la Vie Romantique House Museum — Montmartre",a:"Montmartre",v:["history", "beautiful", "quiet"],d:103,s:"Author\'s house museum with courtyard tea room—19th-century bohemian intimate space preserved",st:"A writer\'s home. Gardens. Tea room. It\'s intimate. Quiet. Beautiful. You\'re in someone\'s private world.",im:"It\'s 1820s. A writer lives here. Creates here. Now you visit their world.",t:"A writer\'s home. Gardens. Tea room. It\'s intimate. Quiet. Beautiful. You\'re in someone\'s private world.\",im:\"It\'s 1820s. A writer lives here. Creates here. Now you visit their world.\",t:\"€5 entry. Tuesday-Sunday 10am-6pm. Montmartre. Tea room charming. Small museum. Photography allowed. Plan 1.5 hours.",c:["history_big", "beautiful", "quiet"],r:"g",nn:"Musée de la Vie Romantique House Museum — Montmartre",ns:"Une fenêtre ouverte sur l\'âme ouvrière de Paris.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},
  {id:104,n:"Cité Florale Hidden Flower Streets — Chatelet-Les Halles",a:"Chatelet",v:["hidden", "beautiful", "quiet"],d:104,s:"Secret residential streets with lush gardens hidden in Central Paris—neighbors don\'t know about them",st:"Streets few find. Houses with gardens. Flowers everywhere. It\'s residential peace. It\'s hidden Paris.",im:"It\'s 1900. Houses built in quiet streets. Now they\'re forgotten.",t:"Streets few find. Houses with gardens. Flowers everywhere. It\'s residential peace. It\'s hidden Paris.\",im:\"It\'s 1900. Houses built in quiet streets. Now they\'re forgotten.\",t:\"Free. Open but private. Respect quiet. Photography gentle. Central Paris. Off the map.",c:["hidden", "beautiful", "quiet"],r:"g",nn:"Cité Florale Hidden Flower Streets — Chatelet-Les Halles",ns:"Un lieu authentique où les Parisiens se retrouvent.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."},
  {id:105,n:"La Recyclerie Urban Farm — Stalingrad",a:"Stalingrad",v:["local", "nature", "weird"],d:105,s:"Former railway station turned urban farm and restaurant—vegetables grow where trains once ran",st:"Abandoned station becomes farm. Vegetables in beds. Restaurant above. It\'s beautiful reuse. Community. Sustainability.",im:"It\'s 1850. Trains arrive. Now plants grow on the tracks.",t:"Abandoned station becomes farm. Vegetables in beds. Restaurant above. It\'s beautiful reuse. Community. Sustainability.\",im:\"It\'s 1850. Trains arrive. Now plants grow on the tracks.\",t:\"Free entry. Café/restaurant pricing. Open daily. North Paris. Food from the farm. Photography beautiful. Community vibe.",c:["local_only", "nature", "weird"],r:"g",nn:"La Recyclerie Urban Farm — Stalingrad",ns:"Un lieu authentique où les Parisiens se retrouvent.",nst:"C\'est un endroit où l\'authenticité persiste. Où les locaux viennent vraiment. Où l\'histoire souffle encore. Où les traditions se mélangent avec la modernité. C\'est Paris qui vit, respire, et continue.",nt:"Prenez le temps de flâner. Observez les détails. Parlez aux habitants s\'ils sont ouverts. Respectez les espaces. Visitez sans téléphone en main. Le matin est souvent meilleur que l\'après-midi. Les fins de semaine changent l\'atmosphère. Venez avec une bouteille d\'eau et une bonne paire de chaussures."}

  {id:108,n:"Père-Lachaise Cemetery Walking Tour",a:"East",v:["history","quiet","free"],d:20,s:"The famous dead buried in ornate tombs — a free historical walk among monuments",st:"Père-Lachaise contains Oscar Wilde, Jim Morrison, Balzac, and thousands of graves. It\'s a sculpture garden; locals come to research family history and reflect. Get a map.",im:"Time-travel: Opened 1804; became fashionable when the famous were buried here.",t:"Free. Métro Lines 2/6 to Père Lachaise.",c:["history_big","quiet"],r:"g",nn:"Cimetière Père-Lachaise",ns:"Tumbas ornamentadas de los famosos — caminar gratis",nst:"Camina entre las tumbas de celebridades en Père-Lachaise.",nt:"Gratis. Métro a Père Lachaise."},
  {id:109,n:"Belleville Street Art District",a:"Northeast",v:["art","free","local"],d:15,s:"Raw neighborhood murals constantly evolving — Paris\' real street art scene",st:"Belleville is the anti-Champs-Élysées. Rue Denoyez and alleys are covered in constantly evolving murals. It\'s raw, political, and authentic. Grab a crêpe and wander.",im:"Time-travel: Belleville was poor Jewish/Italian; street art is gentrifying it.",t:"Free. Métro Line 11 to Belleville.",c:["street_art","local_only"],r:"g",nn:"Belleville Street Art",ns:"Murales dinámicas en constante evolución",nst:"Camina Rue Denoyez viendo arte callejero fresco.",nt:"Gratis. Métro a Belleville."},
  {id:110,n:"Eiffel Tower from Trocadéro at Night — Trocadéro",a:"Trocadéro",v:["beautiful"],d:45,s:"View the tower from across the river at night—no crowds, no queue, just the structure lit up against darkness",st:"Night falls. The tower becomes light. Stand at Trocadéro. Other people stand nearby but it\'s peaceful. The tower is enormous. It\'s real.",im:"It\'s 1889. Eiffel designed it for the Exposition. Now it glows. You stand in the dark looking at light.",t:"Free from Trocadéro. Visit 9pm–11pm for best lighting. Bring a jacket—it\'s exposed and windy. No entry ticket needed. Metro Line 6 to Bir-Hakeim, walk up.",c:["greatest_hits","beautiful"],r:"g",nn:"La Tour Eiffel de Trocadéro la Nuit — Trocadéro",ns:"Vue de la tour la nuit — pas de foule, juste la structure illuminée",nst:"La nuit tombe. La tour devient lumière. Vous vous tenez à Trocadéro. C\'est paisible. La tour est énorme. C\'est vrai.",nt:"Gratuit depuis Trocadéro. 21h–23h meilleur éclairage. Apportez une veste. Métro ligne 6 à Bir-Hakeim."},
  {id:111,n:"Louvre: The Clock Room Morning — 1st Arrondissement",a:"1st",v:["history","beautiful"],d:90,s:"Sunrise in the Denon Wing reveals Vermeer and Rembrandt without crowds—arrive at opening",st:"Enter at 9am. The light is perfect. Few people. You stand alone before masterpieces. The clock on the wall is silent. Time stops.",im:"It\'s 1600s. Artists paint. Now their work hangs in perfect morning light. You breathe in the same air they breathed out.",t:"€17 entry. Wednesday–Monday 9am–6pm (closed Tuesdays). Arrive 8:50am at the entrance. Métro Palais-Royal. Bring water. Plan 2 hours minimum.",c:["greatest_hits","history","beautiful"],r:"g",nn:"Louvre: La Salle des Horloges — 1er",ns:"Lumière matinale sur Vermeer et Rembrandt—pas de foules",nst:"Entrez à 9h. La lumière est parfaite. Peu de gens. Vous vous tenez seul devant les chefs-d\'œuvre. C\'est magique.",nt:"€17 entrée. Mercredi–lundi 9h–18h. Arrivez 8h50. Métro Palais-Royal."},
  {id:112,n:"Notre-Dame: The Reconstruction Viewing Area — Île de la Cité",a:"Île de la Cité",v:["history"],d:30,s:"Walk the official reconstruction viewpoint platform—see the before-and-after transformation in real time",st:"The fire was 2019. Now workers rebuild. Stand at the official barrier. You see the frame being restored. The timbers arriving. History in motion.",im:"It\'s 1163. Notre-Dame is built stone by stone. Now it\'s being rebuilt the same way. You watch time move.",t:"Free. Viewpoint at Square Jean-XXIII. Open daily 7am–10pm. Métro Cité or Île de la Cité. No entry inside yet, but the view tells the story.",c:["greatest_hits","history"],r:"g",nn:"Notre-Dame: Plateforme de Reconstruction — Île de la Cité",ns:"Voir la transformation de restauration en temps réel",nst:"Le feu était en 2019. Maintenant les ouvriers reconstruisent. Vous voyez le cadre en restauration. L\'histoire en mouvement.",nt:"Gratuit. Square Jean-XXIII. Ouvert 7h–22h. Métro Cité."},
  {id:113,n:"Sacré-Cœur at Dawn — Montmartre",a:"Montmartre",v:["beautiful","quiet"],d:60,s:"Arrive at the basilica before sunrise—watch the light break over Paris from the steps alone",st:"Dawn breaks. No one is there. The city is still asleep below you. The light moves across the rooftops. The basilica is white and waiting.",im:"It\'s 1875. The basilica is built for pilgrims. Now you\'re here at dawn. You\'re alone with the city waking.",t:"Free entry to basilica at dawn. Arrive 6am. Take Métro Line 2 to Anvers, climb the steps. Bring coffee in a thermos. The dome opens 8:30am (€3 to ascend).",c:["greatest_hits","beautiful","quiet"],r:"g",nn:"Sacré-Cœur à l\'Aube — Montmartre",ns:"Arrive avant le lever du soleil — regardez la lumière se briser sur Paris",nst:"L\'aube se lève. Personne n\'est là. La ville dort encore. La lumière se déplace sur les toits. C\'est blanc et attend.",nt:"Gratuit à l\'aube. Arrivez 6h. Métro ligne 2 Anvers. Apportez du café. Le dôme ouvre 8h30 (€3)."},
  {id:114,n:"Musée d\'Orsay: The Clock Window at 4pm — Left Bank",a:"Left Bank",v:["beautiful","history"],d:90,s:"Stand in the clock window looking out at Paris—light moves across the room at exactly 4pm",st:"The clock is part of the old train station. At 4pm the sun hits it. You stand inside the clock face looking at the city below. Time and view merge.",im:"It\'s 1900. The clock ticks. Trains arrive. Now you\'re inside the clock looking out. The city is below. Time is passing.",t:"€14 entry. Tuesday–Sunday 9:30am–6pm, Thursday until 9:45pm. Arrive 3:45pm for the light. Métro Solférino. The clock is upstairs, Musée d\'Orsay main gallery.",c:["greatest_hits","beautiful","history"],r:"g",nn:"Musée d\'Orsay: La Fenêtre de l\'Horloge — Rive Gauche",ns:"Tenez-vous dans la fenêtre de l\'horloge regardant Paris à 16h",nst:"L\'horloge est partie de l\'ancienne gare. À 16h, le soleil la frappe. Vous vous tenez dans le cadran de l\'horloge.",nt:"€14 entrée. Mardi–dimanche 9h30–18h. Arrivez 15h45. Métro Solférino."},
  {id:115,n:"Sainte-Chapelle: Morning Light Through Glass — Île de la Cité",a:"Île de la Cité",v:["beautiful","history"],d:45,s:"Enter at 9:30am when light streams through the stained glass—the chapel becomes colored air",st:"The chapel is mostly glass. At morning light, the sun hits the windows. Color floods the stone. You\'re standing in light, not looking at light.",im:"It\'s 1248. King Louis IX builds this to hold relics. Now light makes it holy.",t:"€11 entry. 9:30am–5pm daily (extended hours in summer). Métro Cité. No crowds before 10am. Bring sunglasses—the light is intense.",c:["greatest_hits","beautiful","history"],r:"g",nn:"Sainte-Chapelle: Lumière Matinale — Île de la Cité",ns:"Entrez à 9h30 quand la lumière traverse le verre teinté",nst:"La chapelle est surtout du verre. La lumière du matin frappe les vitraux. La couleur inonde la pierre.",nt:"€11 entrée. 9h30–17h. Métro Cité. Pas de foule avant 10h."},
  {id:116,n:"Luxembourg Gardens: Afternoon on a Metal Chair — 6th Arrondissement",a:"6th",v:["beautiful","free entry","quiet"],d:90,s:"Rent a metal chair and sit where Parisians sit—the gardens are for lounging, not rushing",st:"Parisians rent chairs for €1.50. They sit and read. They watch others. They\'re not there to \"do\" anything. They\'re there to sit. Join them.",im:"It\'s 1612. Marie de Medici orders the gardens. Now you sit in a green rectangle of time. Paris breathes around you.",t:"Free entry. Chair rental €1.50. Open 8am until sunset. Métro Odéon or Notre-Dame-des-Champs. Bring a book or notebook. Afternoon is best.",c:["greatest_hits","beautiful","free entry"],r:"g",nn:"Jardin du Luxembourg: Une Chaise l\'Après-midi — 6e",ns:"Loue une chaise métallique et assieds-toi où les Parisiens s\'assoient",nst:"Les Parisiens louent des chaises pour €1,50. Ils s\'assoient et lisent. Ils regardent les autres. C\'est tout.",nt:"Gratuit. Chaise €1,50. Ouvert 8h jusqu\'au coucher. Métro Odéon."},
  {id:117,n:"Panthéon: The Pendulum at Sunset — 5th Arrondissement",a:"5th",v:["history","beautiful"],d:60,s:"Climb to the dome and watch Foucault\'s pendulum swing as light fades—swinging proof of physics",st:"The pendulum swings. It\'s massive. It\'s swung since 1851. You stand above Paris watching it swing. The light changes. You feel small and connected.",im:"It\'s 1851. Foucault proves the Earth spins by watching a pendulum. Now you watch it swing in fading light. Proof made visible.",t:"€9 entry. 10am–6:30pm daily. Métro Maubert-Mutualité. Dome access included. Sunset is 5:30pm–8:30pm depending on season. Plan 90 minutes.",c:["greatest_hits","history","beautiful"],r:"g",nn:"Panthéon: Le Pendule au Coucher — 5e",ns:"Grimpe au dôme et regarde le pendule de Foucault osciller",nst:"Le pendule oscille. C\'est massif. Il oscille depuis 1851. Vous vous tenez au-dessus de Paris le regardant osciller.",nt:"€9 entrée. 10h–18h30. Métro Maubert-Mutualité. Accès au dôme inclus."},
  {id:118,n:"Père Lachaise Cemetery: Morrison\'s Grave Pilgrimage — 20th Arrondissement",a:"20th",v:["history","quiet"],d:120,s:"Find Jim Morrison\'s grave among the famous dead—or just wander and read the lives carved in stone",st:"Père Lachaise has 1 million graves. Morrison is one. But Balzac is here. Oscar Wilde. Chopin. Thousands more. It\'s a city of the dead ordered by stone and flowers.",im:"It\'s 1804. The cemetery opens as a fashionable burial ground. Now pilgrims come. Flowers are left. Candles are lit.",t:"Free entry. 8am–5:30pm (closes earlier in winter). Métro Père Lachaise. Bring a map—it\'s enormous. Plan 2–3 hours minimum.",c:["greatest_hits","history","quiet"],r:"g",nn:"Cimetière Père Lachaise: Tombeau de Morrison — 20e",ns:"Trouve la tombe de Jim Morrison parmi les morts célèbres",nst:"Père Lachaise a 1 million de tombes. Morrison en est une. Mais Balzac est ici. Oscar Wilde. Chopin. C\'est une ville des morts.",nt:"Gratuit. 8h–17h30. Métro Père Lachaise. Apportez une carte. Plan 2–3 heures."},
  {id:119,n:"Les Invalides: Napoleon\'s Tomb at Silence — 7th Arrondissement",a:"7th",v:["history","beautiful"],d:90,s:"Napoleon\'s sarcophagus sits under a golden dome—the most powerful man reduced to a single stone box",st:"The tomb is alone in the dome. Light falls on it. Napoleon is here. The silence is complete. It\'s oddly small. Strangely quiet.",im:"It\'s 1840. Napoleon\'s remains return from St Helena. The dome is built to contain him. Now you stand over the box. History is marble.",t:"€12 entry. 10am–5:30pm (closed Mondays). Métro Invalides. Army Museum included. Plan 2 hours. Afternoon light is better.",c:["greatest_hits","history","beautiful"],r:"g",nn:"Les Invalides: Tombe de Napoléon — 7e",ns:"Le sarcophage de Napoléon repose sous un dôme doré",nst:"La tombe est seule dans le dôme. La lumière tombe sur elle. Napoléon est ici. Le silence est complet.",nt:"€12 entrée. 10h–17h30. Métro Invalides. Musée inclus. Plan 2 heures."},
  {id:120,n:"Palais Royal Gardens: Hidden Courtyard Silence — 1st Arrondissement",a:"1st",v:["beautiful","quiet","free entry"],d:60,s:"Pass through the palace gates into an 18th-century arcade—Paris forgets this place exists",st:"The gardens are surrounded by arcades. Restaurants sit in shadow. Tourists don\'t come here. Parisians walk through at peace. It\'s protected. It\'s enclosed. It\'s beautiful.",im:"It\'s 1780. The palace is completed. Now you walk under the same arches. The light is soft. The sound is muffled.",t:"Free entry. Open 7am–10:30pm. Métro Palais-Royal. Spring and summer are best. Early morning is quieter. Benches under the arcades invite sitting.",c:["greatest_hits","beautiful","quiet","free entry"],r:"g",nn:"Palais Royal: Les Jardins Cachés — 1er",ns:"Passe par les portes du palais dans une arcade du 18e siècle",nst:"Les jardins sont entourés d\'arcades. Restaurants s\'assoient à l\'ombre. Les touristes ne viennent pas ici. C\'est protégé.",nt:"Gratuit. Ouvert 7h–22h30. Métro Palais-Royal. Printemps et été meilleur."},
  {id:121,n:"Shakespeare and Company Bookstore: Reading Nook at Closing — Left Bank",a:"Left Bank",v:["history","quiet"],d:60,s:"Stay until closing—watch staff shelve books in this legendary Left Bank bookshop founded 1919",st:"The shop closes at 10pm. At 9:45pm you\'re still there. Other customers filter out. Staff arrange books. The silence grows. You\'re in literary history.",im:"It\'s 1919. Shakespeare and Company opens. Hemingway, Fitzgerald come here. Now you sit where they sat. The books smell old. The air is thick with time.",t:"Free entry. 10am–10pm daily. Métro Saint-Michel. Books €8–40. Bring a notebook. Stay until 9:45pm to feel the closing ritual.",c:["greatest_hits","history","quiet"],r:"g",nn:"Shakespeare and Company: Nook de Lecture — Rive Gauche",ns:"Reste jusqu\'à la fermeture — regarder le personnel ranger les livres",nst:"La boutique ferme à 22h. À 21h45 vous y êtes encore. Le silence s\'accroît. Vous êtes dans l\'histoire littéraire.",nt:"Gratuit. 10h–22h. Métro Saint-Michel. Livres €8–40."},
  {id:122,n:"Pont Alexandre III at Golden Hour — 8th Arrondissement",a:"8th",v:["beautiful"],d:30,s:"Cross the most ornate bridge in Paris at sunset—light hits the gilded lamps and the river below turns gold",st:"The bridge is decorated with gilt and cherubs. At golden hour the light hits the metal. The river below glows. You\'re walking on ornament. It\'s 19th-century excess preserved.",im:"It\'s 1900. The bridge is built for the Exposition. Now light makes it glow. You cross from one bank to the other. Beauty is the only point.",t:"Free. Anytime is walkable, but 5:30pm–7:30pm is golden hour. Métro Invalides or Champs-Élysées-Clemenceau. 10 minutes to cross.",c:["greatest_hits","beautiful"],r:"g",nn:"Pont Alexandre III à l\'Heure Dorée — 8e",ns:"Traversez le pont le plus orné de Paris au coucher",nst:"Le pont est décoré de dorure et de chérubins. À l\'heure dorée la lumière frappe le métal. Le fleuve brille.",nt:"Gratuit. 17h30–19h30 meilleur. Métro Invalides. 10 minutes pour traverser."},
  {id:123,n:"Tuileries Gardens: The Wheel Bench at Dusk — 1st Arrondissement",a:"1st",v:["beautiful","quiet","free entry"],d:60,s:"Sit on a metal chair facing the ferris wheel at dusk—Paris spreads out from a former palace garden",st:"The Tuileries Palace is gone, burned in 1871. The gardens remain. At dusk the ferris wheel glows. You sit among chairs. Parisians ignore you. Life happens.",im:"It\'s 1664. Louis XIV\'s mother designs the gardens. Now they\'re public. You sit where nobility once walked. The wheel turns. Light falls.",t:"Free. Open 7am–sunset. Métro Tuileries or Concorde. Chair rental €1.50. Dusk is 5pm–7pm depending on season. Bring a friend for a bench chat.",c:["greatest_hits","beautiful","free entry"],r:"g",nn:"Jardin des Tuileries: Banc à la Roue — 1er",ns:"Assieds-toi sur une chaise face à la grande roue",nst:"Le Palais Tuileries est détruit, brûlé en 1871. Les jardins restent. À la tombée du jour la roue brille.",nt:"Gratuit. 7h–coucher. Métro Tuileries. Chaise €1,50."}
,
  {id:124,n:"Giverny — Monet's Garden Where Impressionism Happened Outdoors",a:"Vernon (day trip)",v:["nerd","free_culture"],d:120,s:"Monet's garden and water lily pond 75 minutes by train. The actual place where Impressionism happened outdoors. Go May-June in morning light.",st:"Monet lived in this house for 43 years. He gardened obsessively. The water lilies in the pond became an obsession—he painted them 250 times in different lights. Walking the garden now, you understand his obsession. The water changes color by the hour. The light on the Japanese bridge changes the entire composition. This garden IS the paintings.",im:"Standing on the Japanese bridge looking at water lilies floating, willows hanging over the water, the exact light that's in a Monet painting.",t:"Vernon, 75 min from Paris by train (€20 return). Giverny Museum €11 entry. Open 10am-6pm (April-October only). Go mornings (10-11am) for best light and fewer crowds. May and June are peak blooming. Book morning slot online. Allow 2-3 hours. Bring a sketchbook.",c:["nerd","free_culture"],r:"g",nn:"Giverny — Jardin de Monet Oú L'Impressionnisme S'est Passé",ns:"Le jardin de Monet et l'étang des nénuphars 75 minutes en train",nst:"Monet a vécu dans cette maison pendant 43 ans. Il a jardiné obsessionnellement. Les nénuphars de l'étang sont devenus une obsession.",nt:"Vernon, 75 min de Paris en train. Musée Giverny €11. Matin pour meilleure lumière."},
  {id:125,n:"Atelier Brancusi — Sculptor's Studio Outside Centre Pompidou",a:"Beaubourg",v:["nerd","free_culture"],d:45,s:"Reconstructed studio of Constantin Brancusi with his actual tools, sculptures, works-in-progress. Free. Almost nobody goes in.",st:"Brancusi's studio is a small space filled with massive sculptures, rough marble, tools worn smooth by decades of use. He lived and worked here for 30 years. Everything is exactly as he left it—works in progress on tables, chisels and rasps on shelves, the smell of stone dust still in the air. This is not a museum. This is a working space that happens to be preserved.",im:"Looking at a half-finished marble sculpture, tools scattered nearby, morning light through high windows, the physical evidence of artistic process.",t:"Outside Centre Pompidou, Place Igor Stravinsky (easy to miss—ask guards). Free entry. Open weekday afternoons only (2-6pm, closed Sundays). Photography not allowed inside. Allow 30-45 minutes. The space is small but profound. This is where simplicity and material met.",c:["nerd","free_culture"],r:"g",nn:"L'Atelier Brancusi — Studio du Sculpteur Dehors Pompidou",ns:"Studio reconstruit de Constantin Brancusi avec ses vrais outils, sculptures",nst:"Le studio de Brancusi est un petit espace rempli de sculptures massives, de marbre brut, d'outils polis par des décennies d'utilisation.",nt:"Dehors Centre Pompidou, Place Igor Stravinsky. Entrée gratuite. Après-midi la semaine (14-18h)."},
  {id:126,n:"La Butte Bergeyre Hidden Hilltop — 19th Arrondissement",a:"Belleville",v:["high_spots"],d:60,s:"Secret micro-neighborhood hilltop. Even Parisians don\'t know this exists.",st:"A cobblestone hilltop with wild gardens, small houses with vineyard references, and a complete panorama of Paris spreading below. The neighborhood is so under-the-radar that even Paris guides forget about it. You walk uphill through residential streets that feel like another country. Suddenly the city opens below you.",im:"Wildflowers growing between cobblestones, old stone houses with shuttered windows, panorama of Paris unfolding below, light golden on gardens.",t:"Metro: Line 11 to Jourdain. Walk up Rue de l\'Equerre toward Rue du Mouzaia. The hilltop neighborhood unfolds. Allow 45 min to explore. Best at golden hour. No crowds. No vendors. Just view and memory.",c:["high_spots"],r:"g",nn:"La Butte Bergeyre",ns:"La Butte Bergeyre — colline cachée de Paris.",nst:"Jardin sauvage sur les pavés. Maisons anciennes. Vue de toute Paris. Les Parisiens ne le savent pas.",nt:"Métro Jourdain. Monte à pied. Coucher de soleil dorure. Solitude."},
  {id:127,n:"Galeries Lafayette Rooftop Free Views — 9th Arrondissement",a:"Opera",v:["high_spots"],d:40,s:"Free rooftop above the grand boulevard. Opéra Garnier, Eiffel Tower, Montmartre.",st:"Walk into Galeries Lafayette, find the elevator, go to the rooftop. No ticket required. No purchase necessary. The rooftop terrace is free and open to everyone. The Opéra Garnier is right there, golden dome and all. The Eiffel Tower rises in the distance. Montmartre is behind you. The light turns golden at late afternoon. Tourists crowd the paid viewpoints. You\'re here for free.",im:"Opéra Garnier catching sunset light, the Eiffel Tower in profile, Paris spreading like a map of memory below.",t:"Free. Galeries Lafayette at Opéra. Take any elevator to top floor (9th floor), ask for rooftop. Open until sunset. Late afternoon light best. Bring coffee, stay 45 min. Photography excellent. No one checking for purchases.",c:["high_spots"],r:"g",nn:"Galeries Lafayette Terrasse",ns:"Galeries Lafayette — vue libre sur Paris.",nst:"Toit libre. Opéra d\'or. Tour Eiffel qui scintille. Montmartre derrière. Personne ne te regarde.",nt:"Libre. Ascenseur 9ème. Après-midi doré. 45 minutes de silence et d\'or."},
{id:128, n:"Bois de Boulogne — The Deep Interior", a:"Boulogne-Billancourt", v:["nature","quiet","local","beautiful"], d:150,
s:"The 2,000-hectare forest at Paris\'s edge where pre-dawn joggers disappear into paths nobody photographs, past Bagatelle gardens into genuine wilderness.",
st:"Everyone sees the edges — the Parisian cyclists, the tourist boats on the lake. But the Bois has a deep interior that feels like a different world. Start at Bagatelle gardens early (it\'s quiet at 7am), then leave the garden paths and follow the forest trails deeper in toward the Pré Catelan lake. The paths thin out. You\'ll see old moss-covered walls from demolished estates, Victorian follies half-consumed by ivy, joggers in headlamps moving like ghosts.\n\nThe interior paths loop around artificial lakes where swans drift in mist. You\'re still technically in Paris but the city sound vanishes completely. Go after rain when the forest smells like humus and the light is strange through the wet canopy. Bring a map — the paths are unmarked and loop back on themselves deliberately.",
im:"Wet moss under your feet, the smell of earth and decaying leaves, mist hanging in the trees, a jogger passing silently in the half-light, the sound of water but no visible city.",
t:"Best 6-30am or late afternoon. Metro to Michel-Ange-Molitor or Boulogne-Jean Jaurès, then walk to Bagatelle entrance (Pont de Suresnes). Bagatelle gardens 1.50 EUR entrance. Allow 2-3 hours for full walk. Bring good boots for muddy sections. Paths close at dusk.",
c:["day_trips","nature"], r:"g",
nn:"Bois de Boulogne — L\'Intérieur Profond", ns:"La forêt parisienne où disparaissent les joggers de l\'aube, loin des touristes, dans un silence de feuilles.",
nst:"Tout le monde voit les bords — les cyclistes parisiens, les bateaux touristiques. Mais le Bois a un intérieur profond qui ressemble à un monde différent. Commencez par les jardins de Bagatelle de bonne heure (7h, c\'est tranquille), puis quittez les sentiers et pénétrez plus loin vers le lac Pré Catelan. Les sentiers s\'affinent. Vous verrez les vieux murs couverts de mousse, les jardins délabrés, les cygnes qui dérivent dans le brouillard.\n\nAllez après la pluie quand la forêt sent l\'humus. Apportez une carte — les sentiers ne sont pas balisés.",
nt:"Mieux 6h30-9h ou fin d\'après-midi. Métro Michel-Ange-Molitor. Jardins de Bagatelle 1,50 EUR. Permettez 2-3 heures. Bonnes bottes. Sentiers ferment au crépuscule."},

{id:129, n:"Forêt de Meudon — 1,100 Hectares Above the City", a:"Meudon", v:["nature","forest","quiet","views"], d:120,
s:"The forgotten forest 20 minutes south by RER, where an old observatory sits abandoned at the top and you can walk for hours without hearing Paris.",
st:"Meudon is massive — 1,100 hectares of actual forest that nobody international knows about. Take RER line D to Meudon-Val-Fleury, then walk up through beech and oak woods to the Observatory plateau at 150 meters height. The old astronomical observatory is there, gates locked, but you can walk around it. The views from the plateau stretch across Paris and you\'ll see maybe three other people.\n\nThe trails are well-marked but feel abandoned. There\'s a strange melancholy here — a forest that wants to be wild but exists next to a city. In autumn, the ground is thick with beech mast and the light turns amber through the canopy. In spring, wild garlic covers the forest floor. Walk down through the Hauts de Meudon village after and you\'ll feel like you\'ve emerged from another century.",
im:"The smell of rain on oak leaves, the sound of your boots on a forest path with zero other people, the light changing as clouds move over the plateau, Paris visible but distant and unreal.",
t:"RER D to Meudon-Val-Fleury (20 min from central Paris, 2.65 EUR). Walk 30 min uphill through forest to Observatory. Several marked trails (2-3 hours). Best in early morning or late afternoon in spring and autumn. Bring water — no facilities on forest. Accessible year-round but muddy after rain.",
c:["day_trips","nature"], r:"g",
nn:"Forêt de Meudon", ns:"1 100 hectares de forêt où l\'observatoire regarde depuis 150 mètres.",
nst:"Meudon est énorme — 1 100 hectares de vraie forêt que personne ne connaît. Prenez le RER D jusqu\'à Meudon-Val-Fleury, puis montez à pied à travers les bois de hêtres et de chênes jusqu\'au plateau de l\'Observatoire. Les vues s\'étendent sur Paris. Vous verrez peut-être trois autres personnes. En automne, le sol est épais de faines. En printemps, l\'ail sauvage couvre le sol.",
nt:"RER D à Meudon-Val-Fleury (20 min du centre, 2,65 EUR). Marche 30 min en montée. Plusieurs sentiers balisés (2-3 heures). Mieux au printemps et automne. Apportez de l\'eau."},

{id:130, n:"Forêt de Saint-Germain-en-Laye — The Royal Hunt", a:"Saint-Germain-en-Laye", v:["nature","forest","history","views"], d:180,
s:"The 3,500-hectare royal hunting forest accessible by RER A, where the Grand Terrace overlooks the Seine valley and paths disappear into genuine deep forest.",
st:"This is where French kings hunted. The forest is still arranged like it was in the 17th century — grand alleyways cut through dense woodland for hunting parties on horseback. Now it\'s peaceful and immense. Take RER A to Saint-Germain-en-Laye, then walk through the town to the château entrance, which connects to the forest.\n\nThe Grand Terrace is the famous part — a 2.4-kilometer-long raised walkway with views out over the Seine valley toward distant Paris. But keep walking past the terrace into the forest interior where the alleyways become narrower, the canopy thickens, and you\'re genuinely lost in what feels like wilderness. The Carrefour Royal — where hunting paths intersect — is a pilgrimage site for walkers. There\'s an old hunting lodge (now a café, but closed often) at the heart of the forest. Paths loop for 3-5 hours depending on how deep you want to go.",
im:"The smell of damp earth and beech leaves, the width of ancient royal hunting paths, light filtered through an old-growth oak canopy, silence except for songbirds and your footsteps, the Seine valley spread below when you reach open sky.",
t:"RER A to Saint-Germain-en-Laye (40 min from central Paris, 2.55 EUR). Walk 15 min from station to château/forest entrance (signposted). Grand Terrace walk is 2.4km flat and easy. Forest trails 3-5 hours depending on pace and depth. Best in spring (wildflowers) and autumn (color). Bring a map — trails are marked but confusing. Café near château but unreliable hours.",
c:["day_trips","history_big","nature"], r:"g",
nn:"Forêt de Saint-Germain-en-Laye", ns:"3 500 hectares de forêt de chasse royale — les sentiers royaux existent encore.",
nst:"C\'est ici que les rois de France chassaient. La forêt est toujours arrangée comme elle l\'était au 17ème siècle — grandes allées percées à travers les bois denses. Maintenant c\'est paisible et immense. Prenez le RER A jusqu\'à Saint-Germain-en-Laye. La Grande Terrasse est la partie célèbre — 2,4 kilomètres de promenade surélevée avec des vues sur la vallée de la Seine.\n\nMais continuez à marcher dans l\'intérieur de la forêt où le couvert devient plus épais et vous êtes vraiment perdu. Les allées s\'affinent, le silence est vrai. Il y a un carrefour royal où les sentiers de chasse s\'intersectent.",
nt:"RER A à Saint-Germain-en-Laye (40 min, 2,55 EUR). Marche 15 min depuis la gare. Terrasse 2,4 km plat. Sentiers 3-5 heures. Mieux au printemps et automne. Apportez une carte."},

{id:131, n:"Canal de l\'Ourcq — The 26km Escape", a:"La Villette to Oise Countryside", v:["nature","quiet","long_walk","local"], d:300,
s:"The complete towpath from industrial Parc de la Villette all the way to the countryside: 26 kilometers where the city progressively dissolves into actual farms and forests.",
st:"Most people know the Canal de l\'Ourcq around Parc de la Villette — it\'s where Paris cyclists hang out, where street musicians play, where the city is still on. But if you start at the south end of the park and commit to following the canal path north, the city literally disappears kilometer by kilometer.\n\nThe first 8km feels urban — you pass through the 19th arrondissement, alongside apartment blocks, under bridges, past péniche cafés. But by kilometer 10 you\'re past the périphérique. By kilometer 15 the apartment blocks end. By kilometer 20 you\'re walking alongside actual fields, actual cows, actual French countryside that feels 50 years away from Paris. Small villages appear: Emy-sur-Ourcq, then Dammartin-en-Goële. The path is a working towpath, unmaintained but walkable, with real locks and barges still passing.\n\nTake the full walk if you have the energy. Or walk the first 10-12km to La Courneuve forest entrance and return. The point is getting beyond where tourists know exists.",
im:"The sound changing from city traffic to wind in open fields, the smell of the canal itself (not unpleasant) shifting to hay and earth, the Ourcq river widening as it approaches its source, almost no people after kilometer 15, just the sound of your own footsteps and occasional cyclist passing.",
t:"Start at Bassin de la Villette (Métro Stalingrad). Follow canal north. Completely free. Path accessible dawn to dusk year-round but best in spring and autumn. First 5km is urban but manageable. Kilometers 15-26 are remote — bring water and snacks. Phone your location every 10km to someone. No cafés or services after kilometer 12. Return by the same path or, if continuing to the end near Pont-Arcy, arrange pickup or take a taxi from there (expensive from countryside). Best as a solo/two-person meditative walk.",
c:["day_trips","nature"], r:"g",
nn:"Canal de l\'Ourcq — L\'Évasion Complète", ns:"26 kilomètres du centre de Paris jusqu\'à la campagne — la ville disparaît progressivement.",
nst:"La plupart des gens connaissent le Canal de l\'Ourcq autour du Parc de la Villette — c\'est où les cyclistes parisiens traînent. Mais si vous commencez à l\'extrémité sud du parc et suivez le chemin du canal vers le nord, la ville disparaît littéralement kilomètre par kilomètre.\n\nLes 8 premiers kilomètres se sentent urbains — vous passez sous des ponts, à côté de blocs d\'appartements. Mais au kilomètre 10, vous êtes au-delà de la périphérique. Au kilomètre 15, les blocs d\'appartements se terminent. Au kilomètre 20, vous marchez à côté de vrais champs, de vraies vaches, de vraie campagne française. Les petits villages apparaissent: Emy-sur-Ourcq, puis Dammartin-en-Goële.",
nt:"Commencez au Bassin de la Villette (Métro Stalingrad). Suivez le canal vers le nord. Complètement gratuit. Sentier accessible de l\'aube au crépuscule mais mieux au printemps et automne. Apportez de l\'eau et des provisions. Les premiers 12 km ont des services, après c\'est très reculé."},

{id:132, n:"Coulée Verte to Bois de Vincennes — The Full Green Thread", a:"Bastille to Vincennes", v:["nature","quiet","urban_nature","views"], d:90,
s:"The complete Coulée Verte elevated garden from Bastille through the full walk to the Bois de Vincennes entrance: the less-touristy second half where trees replace tourists.",
st:"Everyone walks the Coulée Verte from Bastille but stops at the Reuilly Gardens. This is where tourists photograph it and leave. But the path continues for another 4.5 kilometers, ascending through increasingly dense vegetation until you\'re walking through a genuine raised forest above the 12th arrondissement.\n\nThe first section (Bastille to Reuilly) is packed. Beautiful, designed, planted deliberately, but crowded with people taking selfies under wisteria. Keep walking. After Reuilly, the crowds evaporate. The path becomes wilder — it\'s still a curated walkway but now it\'s green enough that you forget you\'re in the city. The shade deepens. You pass over the Avenue Daumesnil on an elevated bridge and suddenly you\'re in a tunnel of foliage. Local joggers appear — actual neighborhood people, not tourists.\n\nThe path ends at the edge of the Bois de Vincennes near the Lac de Gravelle entrance. At that point you can enter the forest proper (separate entry fee) or loop back. But doing the complete Coulée Verte in one direction gives you the full progression from urban garden to something that genuinely feels like forest.",
im:"The ambient sound dropping from city to birdsong as you walk elevated above the street, the smell changing from pavement to vegetation, wisteria and climbing roses in May creating a green tunnel, light filtering through increasingly thick canopy, occasional glimpse of the city below framed by branches.",
t:"Start Métro Bastille (Sortie Coulée Verte). The elevated pathway is free and open dawn-dusk. First section (Bastille to Reuilly Gardens) is crowded. Second section (Reuilly to Vincennes entrance) is quiet and takes about 1 hour at a normal pace. Allow 1.5-2 hours for full walk with stops. Best in May-June when plantings are dense. Bring water. If entering Bois de Vincennes at end, that requires separate ticket (6 EUR) and you\'ll need transport back (Métro Château de Vincennes is 5 min walk from the end).",
c:["nature"], r:"g",
nn:"Coulée Verte à Bois de Vincennes", ns:"Le chemin vert complet — la deuxième moitié où les arbres remplacent les touristes.",
nst:"Tout le monde marche la Coulée Verte de Bastille mais s\'arrête aux Jardins de Reuilly. C\'est où les touristes la photographient. Mais le chemin continue pendant 4,5 kilomètres supplémentaires, montant à travers une végétation de plus en plus dense.\n\nLa première section (Bastille à Reuilly) est pleine de monde. La deuxième section devient sauvage — c\'est toujours une promenade aménagée mais assez verte pour que vous oubliiez que vous êtes en ville. Le sentier se termine à l\'entrée du Bois de Vincennes près du Lac de Gravelle. Vous pouvez ensuite entrer dans la forêt proprement dite.",
nt:"Départ Métro Bastille. Promenade surélevée gratuite et ouverte aube-crépuscule. Première section: pleine de monde. Deuxième section: tranquille, 1 heure. Total 1,5-2 heures. Mieux mai-juin. Apportez de l\'eau. Apportez de l\'eau. Métro Château de Vincennes à 5 min."},

{id:133, n:"Forêt de Montmorency — Chestnut Forest & Mushroom Silence", a:"Montmorency / Enghien-les-Bains", v:["nature","forest","quiet","mushroom_season"], d:120,
s:"The 2,000-hectare chestnut and oak forest 30 minutes from Gare du Nord where autumn mushroom season brings locals with baskets and the silence is absolute.",
st:"This forest exists in almost complete obscurity internationally but is where Parisian families go in September to hunt mushrooms (cèpes, chanterelles, girolles). The forest is old-growth, dense, quiet, and smells like earth and possibility. The trees are massive — some chestnuts are 300+ years old and their trunks are wider than you are tall.\n\nYou don\'t need to hunt mushrooms to walk here, but the energy of people doing so — the attention to the ground, the baskets, the knowledge of where things grow — changes the feeling. In autumn (September-October), the forest is thick with foragers. In spring it\'s quieter but the light is strange and delicate. Winter is bare and cathedral-like with the massive trunks visible.\n\nThere\'s a small village of Montmorency at one end and Enghien-les-Bains (famous for its lake and belle époque past) at the other. Walk between them through the forest. The trail is marked loosely but you can get lost, which is partly the point. There are old stone markers from centuries of people walking this route.",
im:"Your feet on a carpet of leaves and moss an inch thick, the smell of damp earth and decay (the good kind that means life), sunlight barely reaching the forest floor, the occasional movement of a squirrel, the sound of nothing but wind in the canopy and your own breathing.",
t:"RER C to Montmorency or Enghien-les-Bains (30 min from central Paris, 3 EUR). Walk from either end through the forest (approximately 7km, 2 hours moderate pace). The forest has no clear single trail but is well-known locally and you won\'t be lost long if you maintain general direction. Bring a compass or phone GPS. No facilities in the forest. Best September-October for mushroom season atmosphere and light. Spring also excellent. Winter is walking through a cathedral of bare trees.",
c:["nature"], r:"g",
nn:"Forêt de Montmorency", ns:"2 000 hectares de châtaigniers — la forêt silencieuse des cueilleurs d\'automne.",
nst:"Cette forêt existe dans l\'obscurité presque complète internationalement mais c\'est où les familles parisiennes vont en septembre chasser les champignons (cèpes, chanterelles, girolles). La forêt est vieille, dense, calme, et sent la terre et les possibilités. Les arbres sont massifs — certains châtaigniers ont plus de 300 ans.\n\nVous n\'avez pas besoin de chasser les champignons pour marcher ici, mais l\'énergie des gens qui le font — l\'attention portée au sol, les paniers, la connaissance de l\'endroit où les choses poussent — change le sentiment. En automne (septembre-octobre), la forêt est épaisse de cueilleurs.",
nt:"RER C à Montmorency ou Enghien-les-Bains (30 min, 3 EUR). Marche entre les deux endroits à travers la forêt (environ 7 km, 2 heures). Aucune structure claire mais bien connu localement. Apportez une boussole. Mieux septembre-octobre."}
];

<script type="text/babel">
const {useState,useEffect,useMemo}=React;

const LangToggle=({lang,setLang})=>(
<div className="lang-toggle">

<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Paris Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
