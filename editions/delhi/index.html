<script>
const P = [
  {id:1,n:"Red Fort — Mughal Sovereignty",a:"Old Delhi",v:["history", "architecture", "beautiful"],d:120,s:"A massive red sandstone fortress built by Mughal Emperor Shah Jahan in 1648—symbol of imperial power and Indian independence.",st:"The Red Fort (Lal Qila) occupies 250 acres of Old Delhi. Shah Jahan, the same emperor who built the Taj Mahal, created this fortress as his capital. The fort's red sandstone walls stretch for 2.4km. Walking through the gates, you enter an imperial world: courtyards, water channels, palaces, throne halls. The Diwan-i-Khas (Hall of Private Audience) features a marble inlaid throne where emperors held private meetings. The Diwan-i-Aam (Hall of Public Audience) allowed common subjects to petition the emperor. The architecture is stunning: calligraphy inscriptions, precious stone inlay, carefully planned sightlines. The fort was looted during the 1947 Partition violence; many treasures were destroyed. Yet the structure endures—a testament to Mughal engineering and imperial ambition. On August 15, 1947, Indian independence was declared from the Red Fort, making it symbolic of freedom from colonial rule. The fort contains museums documenting this history.",im:"Shah Jahan in 1648, standing in the newly-completed fortress, imagining his empire extending for centuries—not knowing that less than 200 years hence, the British would occupy his palace.",t:"Located in Old Delhi. Accessible by Metro Line 6 to Chandni Chowk. Entry fee Rs. 600. Open 9:30am-4:30pm, closed Mondays. Allow 2-3 hours. Photography allowed except in certain halls. The fort is vast; focus on key structures rather than exploring everything.",c:[],r:"g",nn:"लाल किला",ns:"शाहजहां द्वारा 1648 में निर्मित मुगल किला",nst:"लाल किला दिल्ली की राजनीतिक शक्ति का प्रतीक। 250 एकड़ का साम्राज्य। 1947 में स्वतंत्रता की घोषणा की गई।",nt:"पुरानी दिल्ली में स्थित। मेट्रो लाइन 6, चांदनी चौक स्टेशन। प्रवेश शुल्क 600 रुपये।"},
  {id:2,n:"Jama Masjid — Islamic Grandeur",a:"Old Delhi",v:["history", "architecture", "beautiful"],d:90,s:"India's largest mosque, completed in 1656, accommodating 25,000 worshippers—a monument to Mughal architectural achievement.",st:"The Jama Masjid (Friday Mosque) sits adjacent to the Red Fort. Its courtyard covers 415,000 square feet; the prayer hall accommodates 25,000 people. The mosque was built by Shah Jahan using red and white marble. The architecture is symmetrical, serene. Two minarets rise 40 meters, offering views across Old Delhi from their summit. The prayer hall is cool, peaceful; worshippers kneel in precise rows. The mosque broadcasts the call to prayer (adhan) five times daily, filling Old Delhi's lanes with melodious sound. Walking barefoot on the marble floor connects you to centuries of prayer. The mosque's open courtyard has hosted prayers for 370+ years. The contrast is stark: the spiritual space of the mosque surrounded by the commercial chaos of Old Delhi's bazaars. Yet the mosque maintains sanctity; visitors are welcomed; the space prioritizes devotion over tourism.",im:"A worshipper in 1700, kneeling in the mosque's courtyard, performing the same prayers that would be performed by descendants three centuries hence.",t:"Located in Old Delhi, adjacent to Red Fort. Entry free. Photography allowed outside prayer halls; interior photography restricted. Remove shoes or purchase shoe protection. Best visited morning or afternoon, avoiding prayer times. Women should wear modest dress. Allow 1-2 hours.",c:[],r:"g",nn:"जामा मस्जिद",ns:"भारत की सबसे बड़ी मस्जिद",nst:"जामा मस्जिद 1656 में पूरी की गई। 25,000 प्रार्थनार्थियों को समायोजित करती है। शाहजहां द्वारा निर्मित।",nt:"पुरानी दिल्ली में। प्रवेश निःशुल्क। जूते हटाएँ। प्रार्थना समय से बचें।"},
  {id:3,n:"Qutb Minar — Triumph Tower",a:"South Delhi",v:["history", "architecture", "beautiful"],d:120,s:"A 73-meter minaret built in 1193—one of the world's oldest and most impressive minarets, rising from a complex of Islamic structures.",st:"Qutb Minar was built by Qutb-ud-Din Aibak, the first Muslim ruler of Delhi. The minaret rises 73 meters with a stone spiral staircase inside. The exterior is intricately carved red and buff sandstone; each story has a balcony. The minaret's purpose was calling the faithful to prayer; today it's a landmark. The complex surrounding the minaret includes mosques, tombs, and earlier Hindu and Jain temples. The Quwwat-ul-Islam Mosque, within the complex, features a unique iron pillar—825 years old, never rusted, composition unknown. Walking the complex, you encounter layers of Delhi history: Hindu, Jain, Islamic structures coexisting. The minaret's height was revolutionary in its era; climbing the interior stairs (access sometimes restricted) is breathtaking. The complex represents Delhi's religious evolution: a city sacred to multiple faiths across centuries.",im:"A builder in 1193, placing the final stone on the completed minaret, unaware that his work would stand 830+ years hence.",t:"Located in South Delhi, Mehrauli area. Accessible by Metro Line 5 to Qutb Minar station. Entry fee Rs. 600. Open 7am-5pm. Allow 2 hours. Climbing the minaret is sometimes restricted for safety. Photography excellent throughout the complex.",c:[],r:"g",nn:"कुतुब मीनार",ns:"1193 में निर्मित 73 मीटर ऊँचा मीनार",nst:"कुतुब मीनार दिल्ली में इस्लामी वास्तुकला का प्रतीक। परिसर में मस्जिदें, मकबरे और हिंदू मंदिर के अवशेष।",nt:"दक्षिण दिल्ली, मेहरौली। मेट्रो लाइन 5, कुतुब मीनार स्टेशन। प्रवेश शुल्क 600 रुपये।"},
  {id:4,n:"India Gate — Colonial Monument",a:"Central Delhi",v:["history", "architecture", "views"],d:60,s:"A 42-meter triumphal arch built in 1931 to commemorate soldiers—now India's most recognizable symbol and gathering place.",st:"India Gate is a triumphal arch designed by architect Edwin Lutyens, built to honor Indian soldiers who died in World War I. The arch is 42 meters high; its geometry is perfect. Beneath the arch, names of fallen soldiers are inscribed—thousands of men who died for the British empire. The monument is paradoxical: built by the British to honor their soldiers, yet appropriated by Indians as symbol of nationhood after independence. Today, India Gate is where Delhiites gather: families, couples, street vendors, joggers. The surrounding lawns fill with people at sunset. The atmosphere is celebratory, communal. The monument represents transition: from colonial dominion to independent nation. Walking around India Gate, you encounter contemporary Delhi: modernity, commerce, freedom coexisting. The arch frames views: toward Parliament, toward Rajpath (now Rajkpath), toward the city's commercial heart.",im:"An Indian soldier in 1920, recruited by the British, unaware that his war service would be memorialized by a future independent India.",t:"Located in central Delhi, Rajpat area. Easily accessible by Metro or taxi. Entry free. Open 24/7. Best visited early morning or evening. Photography excellent. The surrounding area has restaurants, street food, park access. Allow 1-2 hours.",c:[],r:"g",nn:"इंडिया गेट",ns:"1931 में निर्मित 42 मीटर ऊँचा स्मारक",nst:"इंडिया गेट भारत के सबसे प्रसिद्ध प्रतीकों में से एक। प्रथम विश्व युद्ध के सैनिकों को समर्पित।",nt:"केंद्रीय दिल्ली, राजपथ क्षेत्र। निःशुल्क प्रवेश। 24/7 खुला।"},
  {id:5,n:"Raj Ghat — Gandhi's Final Resting Place",a:"Central Delhi",v:["history", "local"],d:45,s:"A simple platform where Mahatma Gandhi was cremated in 1948—a pilgrimage site representing India's independence and non-violence.",st:"Raj Ghat is the simplest of Delhi's monuments yet among the most powerful. A black marble platform marks the spot where Gandhi was cremated after his assassination on January 30, 1948. No grand architecture, no ornate design—Gandhi's philosophy was simplicity. Thousands visit daily; the atmosphere is meditative, respectful. Many leave flowers, prayers, messages. The site sits beside the Yamuna River where the cremation occurred. Adjacent gardens maintain serene environment. The simplicity is the statement: a man who led 300 million to independence through non-violent resistance, whose final monument is unmarked stone. The site represents what Gandhi represented: truth, non-violence, simplicity. Walking Raj Ghat, you contemplate how an individual can transform a continent through belief and action. The site is crowded yet quiet—a contradiction resolved through collective respect.",im:"Mourners on January 31, 1948, watching Gandhi's pyre burn, realizing that their leader was gone yet his principles persisted.",t:"Located on Rajghat Road along the Yamuna. Accessible by Metro Line 2 or taxi. Entry free. Open 5am-dusk. Photography respectfully. Shoes removed. Allow 30-45 minutes. The site is simple; the experience is contemplative. Many visitors sit in silence.",c:[],r:"g",nn:"राज घाट",ns:"गांधी का अंतिम विश्राम स्थल",nst:"राज घाट वह स्थान है जहाँ गांधी का अंतिम संस्कार हुआ। सरलता गांधी का दर्शन।",nt:"यमुना नदी के किनारे। प्रवेश निःशुल्क। सूर्योदय से सूर्यास्त तक खुला।"},
  {id:6,n:"Humayun's Tomb — Architectural Precursor",a:"East Delhi",v:["history", "architecture", "beautiful"],d:90,s:"A 16th-century tomb designed by Bega and Mirak Mirza—the architectural precursor to the Taj Mahal.",st:"Humayun's Tomb was built in 1565 by Humayun's first wife and chief consort, Bega Begum. The tomb is significant architecturally: it introduced the garden-tomb concept later perfected in the Taj Mahal. The structure is red and white marble; its proportions are graceful. The garden (Charbagh) features symmetrical water channels, plantings, and pathways. Walking the garden, you understand the architectural philosophy: gardens representing paradise, water representing life, symmetry representing cosmic order. The tomb is less visited than the Taj, offering more peaceful experience. The marble work is exquisite; the proportions reward study. The tomb sits in Old Delhi yet maintains serene garden space. The surrounding area includes tombs of other Mughal emperors and nobility. The complex represents Mughal burial traditions: gardens, symmetrical tombs, perpetual celebration of the deceased through permanent architectural memorial.",im:"Bega Begum in 1565, overseeing the final stages of Humayun's tomb, ensuring that her husband's legacy would be preserved in stone.",t:"Located in east Delhi, Nizamuddin area. Accessible by Metro Line 6 to Nizamuddin. Entry fee Rs. 600. Open 6am-6pm. Photography allowed throughout. Allow 1-2 hours. The complex is less crowded than major tourist sites. Early morning offers peaceful experience.",c:[],r:"g",nn:"हुमायूँ का मकबरा",ns:"ताज महल का पूर्ववर्ती 16 वीं शताब्दी का मकबरा",nst:"हुमायूँ का मकबरा ताज महल का वास्तुकला पूर्वज। बाग़-मकबरा संरचना का पहला उदाहरण।",nt:"पूर्वी दिल्ली, निज़ामुद्दीन क्षेत्र। प्रवेश शुल्क 600 रुपये। सूर्योदय से सूर्यास्त।"},
  {id:7,n:"Chandni Chowk — Chaotic Market Heart",a:"Old Delhi",v:["local", "food", "hidden"],d:120,s:"Old Delhi's main commercial street—a maze of shops, food stalls, and crowds representing authentic Delhi commerce and chaos.",st:"Chandni Chowk was designed by Shah Jahan as a wide, planned avenue. Today it's the opposite: narrow, crowded, chaotic—a living market where commerce moves at frantic pace. The street features everything: jewelry shops, fabric merchants, electronic vendors, food stalls. Walking Chandni Chowk, you are jostled, called to by vendors, overwhelmed by sensory input. The atmosphere is hectic; the energy is commercial. Street food is exceptional: kachoris (fried pastries), jalebis (orange sweets), chaat varieties, lassi (yogurt drink), meat kebabs. Vendors operate from tiny stalls; crowds press around. The street represents Old Delhi's essence: not tourist-friendly but authentic commerce where Delhiites actually shop and eat. The chaos is organized: each section specializes (jewelry, clothes, electronics). Visiting requires patience, time, tolerance for crowds, hunger for authentic experience.",im:"A merchant in 1900, selling from the same location on Chandni Chowk, not knowing that descendants would occupy the same shop a century hence.",t:"Located in Old Delhi, adjacent to Red Fort. Accessible by Metro Line 6 to Chandni Chowk. Open early morning till evening. Best visited 8am-11am before peak crowds. Bring cash. Negotiate prices. Photography respectfully; some vendors object. Allow 2-3 hours. Wear comfortable shoes.",c:[],r:"g",nn:"चांदनी चौक",ns:"पुरानी दिल्ली का मुख्य बाजार",nst:"चांदनी चौक शाहजहाँ द्वारा डिज़ाइन किया गया था। आज यह अराजक बाजार है।",nt:"पुरानी दिल्ली। मेट्रो लाइन 6, चांदनी चौक। सकाली 8-11 बजे तक सर्वोत्तम।"},
  {id:8,n:"Lodhi Gardens — Urban Sanctuary",a:"Central Delhi",v:["nature", "beautiful", "local"],d:75,s:"A 90-acre park with medieval tombs, gardens, and walking paths—where Delhiites jog and find refuge from urban chaos.",st:"Lodhi Gardens occupy 90 acres of central Delhi. The park contains tombs of Delhi sultans (Muhammad Shah, Ibrahim Lodi) and scattered ruins from the 15th century. Walking paths wind through gardens; fountains, flowers, trees provide respite. The park is where Delhiites exercise: early morning joggers, noon walkers, evening couples. The tombs are beautiful—domed structures of red sandstone—yet secondary to the park's function as green space. The contrast is striking: medieval monuments surrounded by contemporary Delhiites jogging and meditating. The park demonstrates Delhi's layering: history and modernity occupying same space. The park is peaceful despite Delhi's surrounding intensity. The trees provide shade; the paths encourage wandering. Visiting Lodhi Gardens offers break from Delhi's traffic and noise. The park teaches that cities require breathing room—green space where inhabitants can remember nature.",im:"A Delhiite in 2000, jogging through Lodhi Gardens past medieval tombs, contemplating history while pursuing contemporary fitness.",t:"Located in central Delhi, near Delhi University. Accessible by Metro Line 6 to Jor Bagh. Entry free. Open 5am-8pm. Best visited early morning. Photography excellent. Allow 1-2 hours. The park is peaceful; paths are well-maintained.",c:[],r:"g",nn:"लोधी गार्डन",ns:"मध्यकालीन मकबरों के साथ 90 एकड़ का पार्क",nst:"लोधी गार्डन 15वीं शताब्दी के सुल्तानों के मकबरे हैं। आधुनिक दिल्ली का हरा आश्रय।",nt:"केंद्रीय दिल्ली। मेट्रो लाइन 6, जोर बाग़। प्रवेश निःशुल्क।"},
  {id:9,n:"Delhi National Museum — Treasures Across Time",a:"Central Delhi",v:["art", "history", "beautiful"],d:150,s:"India's premier museum housing artifacts from the Bronze Age to modern era—comprehensive documentation of Indian civilization.",st:"The National Museum holds over 200,000 objects spanning 5,000 years. The Harappan Valley Civilization section features bronze figurines from 2300 BCE. The Mauryan section includes Emperor Ashoka's edicts. The classical Indian sculpture galleries contain masterpieces of Buddhist and Hindu art. The Mughal section features illuminated manuscripts, jade inlay work, imperial costumes. The Indian miniature painting gallery showcases exquisite works from courts of emperors. The museum's curatorial approach is thoughtful: objects are contextualized historically; the narrative follows India's arc. Walking the museum, you experience humanity's material creativity: thousands of craftspeople over millennia creating beauty and utility. The museum's lighting is careful; display spaces are respectful. The sculpture galleries are particularly powerful—the museum houses some of the world's finest ancient Buddhist and Hindu sculptures. Photography is generally allowed without flash. The museum offers educational depth without overwhelming.",im:"An ancient craftsperson in 200 BCE, creating a bronze figurine, not knowing it would be displayed in a future museum for people to admire.",t:"Located in central Delhi, near India Gate. Accessible by Metro or taxi. Entry fee Rs. 600. Open 10am-6pm, closed Mondays. Allow 3-4 hours minimum. English signage is good. Photography allowed without flash. Cafeteria available.",c:[],r:"g",nn:"राष्ट्रीय संग्रहालय",ns:"भारतीय सभ्यता के खजाने को संरक्षित करने वाला संग्रहालय",nst:"राष्ट्रीय संग्रहालय 200,000 से अधिक वस्तुएँ हैं। 5,000 वर्षों की भारतीय सभ्यता।",nt:"केंद्रीय दिल्ली। प्रवेश शुल्क 600 रुपये। 10-18 तक खुला, सोमवार बंद।"},
  {id:10,n:"Rashtrapati Bhavan — Presidential Palace",a:"New Delhi",v:["architecture", "history"],d:120,s:"The official residence of India's President—a sprawling mansion designed by Lutyens representing British imperial architecture.",st:"Rashtrapati Bhavan (President's House) was designed by British architect Edwin Lutyens as the Viceroy's residence during colonial rule. Post-independence, it became the President's official residence. The building is massive: 340 rooms, intricate gardens, the Mughal Garden featuring seasonal flowers. Tours are available on limited days (usually Tuesdays and Wednesdays during specified seasons). The architecture blends British imperial style with Indian elements: domes inspired by Indian architecture, gardens following Mughal principles. The interiors are ornate: marble, tapestries, artworks. Walking through Rashtrapati Bhavan, you understand the scale of colonial authority: the building announces power and permanence. The gardens are equally impressive: seasonal flowers (tulips in spring, marigolds in autumn), careful landscaping, water features. The building is functioning residence; tours access limited areas. The experience offers insight into India's political power structure and imperial architectural heritage.",im:"The Viceroy in 1931, ascending the monumental staircase in Rashtrapati Bhavan, understanding that this palace announces empire to the world.",t:"Located in New Delhi, Rajpath area. Tours on specific days (typically Tuesday-Sunday, October-March). Reservation required through official website. Entry fee around Rs. 150-300. Photography sometimes restricted. Allow 2-3 hours. The gardens are exceptional; timing visit for spring or autumn flowers is rewarding.",c:[],r:"g",nn:"राष्ट्रपति भवन",ns:"भारत के राष्ट्रपति का आधिकारिक निवास",nst:"राष्ट्रपति भवन लुटियंस द्वारा डिज़ाइन किया गया। 340 कमरों का महल। मुगल बाग़।",nt:"नई दिल्ली, राजपथ। सीमित दिनों में दौरा। आधिकारिक वेबसाइट से आरक्षण।"},
  {id:11,n:"Birla House (Gandhi Museum) — Freedom Fighter's Residence",a:"Central Delhi",v:["history", "local"],d:60,s:"The residence where Gandhi spent his final days—a simple house with attached museum documenting his life and assassination.",st:"Birla House was where Gandhi stayed during his final months. The house is modest: simple rooms, personal possessions, basic furnishings. The garden is where Gandhi was assassinated on January 30, 1948. A simple sculpture marks the spot. The museum documents Gandhi's life: photographs, correspondence, personal effects, newspaper accounts of the independence struggle. The house feels preserved as Gandhi left it—personal, intimate. Walking through the rooms, you contemplate the man: his simplicity despite leading 300 million people, his commitment to non-violence despite living in violent times. The house contains a prayer room where Gandhi meditated. The atmosphere is contemplative; visitors typically move quietly through spaces. The museum doesn't glorify; it humanizes. The experience offers understanding of Gandhi beyond mythology—a complex, committed individual wrestling with impossible circumstances. The house represents India's foundational moment: the independence leader's home, the location of his death, now preserved for perpetual remembrance.",im:"Gandhi in January 1948, reading in the prayer room, aware that his health was declining, yet continuing to work for Hindu-Muslim unity.",t:"Located in central Delhi, New Delhi area. Accessible by Metro Line 2 to Patel Chowk. Entry free. Open 10am-5pm, closed Mondays. Photography allowed. Allow 1-2 hours. The space is peaceful; visitors move respectfully. Shoe removal required in certain areas.",c:[],r:"g",nn:"बिड़ला हाउस",ns:"गांधी जी का अंतिम निवास स्थल",nst:"बिड़ला हाउस वह स्थान है जहाँ गांधी ने अपने अंतिम दिन बिताए। गलियारे में उनकी हत्या हुई।",nt:"केंद्रीय दिल्ली। मेट्रो लाइन 2, पटेल चौक। प्रवेश निःशुल्क।"},
  {id:12,n:"Delhi University & North Campus — Intellectual Center",a:"North Delhi",v:["history", "local"],d:90,s:"India's premier university with historic North Campus—featuring colonial and modern architecture, student energy, intellectual traditions.",st:"Delhi University North Campus is India's most prestigious educational institution. The campus features beautiful colonial buildings alongside modern structures. Walking the campus, you encounter students engaged in debates, discussions, self-discovery. The campus has hosted generations of India's intellectual leaders: writers, politicians, scientists, activists. The atmosphere is intellectually alive: bookstores, coffee shops, discussion circles. The campus retains beauty: green spaces, quiet courtyards, libraries. The buildings reflect India's evolution: colonial structures representing British education, modern buildings representing post-independence scholarship. The campus is accessible to visitors; many monuments are open. The North Campus is particularly beautiful: red-brick buildings, tree-lined paths, a sense of tradition and excellence. Visiting the campus offers insight into Indian higher education and intellectual traditions. The campus represents meritocracy: students from across India, all economic backgrounds, competing through entrance exams for limited seats. The campus is where futures are determined through education and intellectual engagement.",im:"A student in 1950, freshly admitted to Delhi University, understanding that education was the path to rebuild independent India.",t:"Located in north Delhi, near Metro stations. Open generally to visitors; check current access. Campus walking self-guided. Photography usually allowed. Allow 2-3 hours for full exploration. Best visited during weekdays when academic activity is visible. The campus has bookstores and cafés for refreshment.",c:[],r:"g",nn:"दिल्ली विश्वविद्यालय",ns:"भारत का शीर्ष विश्वविद्यालय",nst:"दिल्ली विश्वविद्यालय भारत का सबसे प्रतिष्ठित संस्थान। उत्तरी परिसर विशेष रूप से सुंदर।",nt:"उत्तरी दिल्ली। स्वतंत्र परिसर पदयात्रा। 2-3 घंटे।"},
  {id:13,n:"Hazrat Nizamuddin Dargah — Sufi Shrine",a:"Central Delhi",v:["history", "local", "beautiful"],d:90,s:"A revered Sufi saint's shrine—featuring spiritual practices, qawwali (Sufi music) performances, and devotional atmosphere.",st:"The Dargah (shrine) of Hazrat Nizamuddin Auliya, a 14th-century Sufi saint, is a place of pilgrimage and spiritual practice. The shrine's interior is ornate: marble inlay, devotional paintings, flowers adorning the saint's tomb. Pilgrims circumambulate the tomb; musicians sing qawwali (devotional Sufi music) during evening hours. Qawwali is extraordinary: singers perform with intense emotion; the music expresses spiritual longing. The shrine is open to all faiths; many Hindus, Sikhs, Christians visit alongside Muslims. The atmosphere is intensely spiritual: incense, prayers, the sound of devotional music. The shrine area includes small shops selling flowers, incense, religious items. The adjoining bazaar (Nizamuddin Market) is vibrant: old bookstores, traditional tea shops, food vendors. The shrine represents India's religious pluralism: a Muslim saint's tomb attracting diverse devotional communities, Islam as Sufi mysticism rather than ritual formalism. Evening qawwali performances (typically Thursday-Friday) are particularly powerful.",im:"A devotee in 1400, visiting the saint's shrine, praying for spiritual guidance, knowing that descendants would visit the same tomb centuries hence.",t:"Located in central Delhi, Nizamuddin area. Accessible by Metro Line 6. Entry free. Open 24/7. Qawwali performances Thursday-Friday evenings (8pm-11pm typically). Respectful dress required. Remove shoes or use shoe covers. Photography generally allowed but respectfully. Allow 1-2 hours.",c:[],r:"g",nn:"हज़रत निज़ामुद्दीन दरगाह",ns:"14वीं शताब्दी के सूफ़ी संत का मकबरा",nst:"निज़ामुद्दीन दरगाह आध्यात्मिक केंद्र। क़व्वाली संगीत प्रदर्शन। सभी धर्मों द्वारा सम्मानित।",nt:"केंद्रीय दिल्ली, निज़ामुद्दीन क्षेत्र। प्रवेश निःशुल्क। 24/7 खुला।"},
  {id:14,n:"Delhi Zoo — Animal Sanctuary",a:"Central Delhi",v:["nature", "local"],d:120,s:"India's largest zoo housing over 2,000 animals—educational institution balancing conservation and recreation.",st:"Delhi Zoo (National Zoological Park) spans 214 acres in central Delhi. The zoo houses Bengal tigers, lions, rhinoceroses, various bird species, reptiles. The enclosures have improved over decades; modern sections provide naturalistic environments. The zoo serves educational function: children learn about animals, conservation efforts. The zoo raises ethical questions: Is animal captivity justifiable? How do confined animals experience psychological wellbeing? Modern zoos argue education and conservation justify captivity; yet concerns persist. Walking the zoo, you encounter both wonder (seeing animals rarely encountered) and discomfort (awareness of confinement). The zoo is crowded on weekends; weekday mornings offer better experience. Many species are endangered; the zoo participates in breeding programs. The experience reveals humanity's complicated relationship with animals: desire to preserve them conflicting with our tendency to control and confine them.",im:"A Bengal tiger in the zoo, born in captivity, never knowing forests—yet through its existence, awareness of species preservation is raised.",t:"Located in central Delhi, near Delhi Zoo metro station. Accessible by Metro Line 5. Entry fee around Rs. 300-400. Open 9:30am-4:30pm. Weekday mornings quieter. Photography allowed. The zoo is large; focus on specific sections rather than trying to see everything. Allow 3-4 hours.",c:[],r:"g",nn:"दिल्ली चिड़ियाघर",ns:"2,000 से अधिक जानवरों वाला भारत का सबसे बड़ा चिड़ियाघर",nst:"दिल्ली चिड़ियाघर 214 एकड़ में। संरक्षण और शिक्षा का संतुलन।",nt:"केंद्रीय दिल्ली। मेट्रो लाइन 5, चिड़ियाघर स्टेशन। प्रवेश शुल्क 300-400 रुपये।"},
  {id:15,n:"Parliament House (Sansad Bhavan) — Democratic Center",a:"New Delhi",v:["architecture", "modern"],d:60,s:"India's parliament building—where democratic decisions affecting over a billion people are made.",st:"Parliament House is India's legislative seat. The circular building was designed by British architects; post-independence, it became the symbol of democratic governance. The building contains chambers for the Lok Sabha (lower house) and Rajya Sabha (upper house), offices, and meeting rooms. Tours are available when parliament is not in session (usually during recesses). The circular architecture is symbolically significant: parliamentary seating arranged in amphitheater, all members equal. The building's design represents democratic principles: no member elevated above others, all participating in common deliberation. Tours access the chambers, galleries, and historical displays. The experience reveals India's commitment to democratic governance: the physical space where millions' representatives gather to decide the nation's direction. Photography is typically restricted; security is strict. The building represents post-independence India's aspiration toward democratic governance—a contrast with colonial monarchy. Watching parliament in session (if accessible) reveals passionate debates, diverse opinions, the functioning of democratic process.",im:"An Indian parliamentarian in 1950, entering Parliament House for the first time, understanding that this building would be the seat of their nation's democratic future.",t:"Located in New Delhi, near India Gate. Tours available during parliament recess (typically August-September, April-May). Reservation through official website required. Entry free. Photography restricted. Allow 1-2 hours. Security screening necessary.",c:[],r:"g",nn:"संसद भवन",ns:"भारत की संसद का भवन",nst:"संसद भवन जहाँ भारत के लोकतांत्रिक निर्णय लिए जाते हैं। अरबों लोगों को प्रभावित करने वाली कार्रवाइयाँ।",nt:"नई दिल्ली। दौरे संसद की छुट्टियों में। आधिकारिक वेबसाइट से आरक्षण।"},
  {id:16,n:"Jantar Mantar — Astronomical Instruments",a:"Central Delhi",v:["history", "architecture", "hidden"],d:90,s:"An 18th-century astronomical observation site featuring massive stone instruments—a UNESCO World Heritage site documenting celestial science.",st:"Jantar Mantar was built by Maharaja Jai Singh in 1724 as an astronomical observation site. The site contains 13 architectural astronomy instruments: massive structures of stone and marble designed to measure time, calculate seasons, predict eclipses. Walking Jantar Mantar, you encounter geometries that seem abstract until you understand their function: the Samrat Yantra (equinox instrument), the Narivalaya Yantra (sun-seeking instrument), others whose purposes require explanation. The instruments are extraordinary: precise mathematical calculations materialized in stone. The site represents pre-modern scientific advancement: mathematics, astronomy, engineering applied to understand celestial mechanics. Visitors can observe through some instruments (shadows cast by the sun create time measurements). The site is less crowded than major tourist monuments; the experience is contemplative. The instruments are not antiquated curios but sophisticated scientific tools that remain functional. The site represents India's scientific heritage: contributions to mathematics, astronomy, engineering that predated Western science by centuries.",im:"Maharaja Jai Singh in 1724, observing the sun's movement through the Samrat Yantra, calculating the seasons, understanding his role as astronomer-king.",t:"Located in central Delhi, Connaught Place area. Accessible by Metro Line 1 or 2. Entry fee around Rs. 300. Open 9am-6pm. Photography allowed. Allow 1-2 hours. The instruments are best understood with guide explanation; audio guides available. The site is less crowded in early morning.",c:[],r:"g",nn:"जंतर मंतर",ns:"18वीं शताब्दी की खगोलीय प्रेक्षण स्थली",nst:"जंतर मंतर 1724 में महाराजा जय सिंह द्वारा निर्मित। 13 खगोलीय यंत्र। यूनेस्को विरासत स्थल।",nt:"केंद्रीय दिल्ली। प्रवेश शुल्क 300 रुपये। 9-18 तक खुला।"},
  {id:17,n:"Laxminarayan Temple — Modern Hindu Shrine",a:"Central Delhi",v:["history", "beautiful", "local"],d:60,s:"A 20th-century Hindu temple built in 1938—featuring traditional architecture and attracting thousands of devotees daily.",st:"Laxminarayan Temple, also known as Birla Mandir, was completed in 1938 by the Birla industrial family. The temple is dedicated to Lakshmi (goddess of wealth) and Narayan (a form of Vishnu). The architecture is traditional: white marble, intricate carvings, gopuram (temple tower). Inside the sanctum, the deity's image is adorned with flowers and gold. Devotees ring bells, chant mantras, circumambulate the inner sanctum. The temple is one of Delhi's most-visited Hindu shrines. The space is crowded, bustling with prayer and devotion. The marble is cool; the incense perfumes the air. The temple represents modern Hindu devotion: ritual, community, spiritual practice. Walking the temple, you encounter multigenerational worship: children, parents, grandparents praying together, tradition transmitted through families. The temple is open to all faiths; respectful visitors are welcomed. The experience offers insight into contemporary Hindu practice and worship spaces.",im:"A devotee in 1940, worshipping in the newly-completed temple, understanding that this space would be where their descendants would pray.",t:"Located in central Delhi, Connaught Place area. Accessible by Metro Line 1 or 2. Entry free. Open 6am-9pm. Respectful dress required (covered shoulders/knees). Shoe covers available. Photography allowed. Allow 45-60 minutes.",c:[],r:"g",nn:"लक्ष्मीनारायण मंदिर",ns:"1938 में निर्मित आधुनिक हिंदू मंदिर",nst:"लक्ष्मीनारायण मंदिर 1938 में पूरा किया गया। श्वेत संगमरमर से निर्मित। हजारों भक्त दैनिक।",nt:"केंद्रीय दिल्ली। प्रवेश निःशुल्क। 6-21 तक खुला।"},
  {id:18,n:"Bahai House of Worship — Geometric Meditation",a:"South Delhi",v:["architecture", "beautiful"],d:75,s:"A stunning Bahai temple featuring lotus-shaped architecture—representing unity of all religions.",st:"The Bahai House of Worship is architecturally distinctive: a lotus flower constructed of white marble. The building rises 34 meters, featuring 27 lotus-shaped petals forming the outer skin. Inside, the inner sanctum is unadorned—a space for individual prayer and meditation. The Bahai faith emphasizes unity of religions; the temple is open to all faiths for individual prayer. The building is serene: visitors sit silently, meditating or praying. No organized ceremonies occur; the space is for personal spiritual experience. The architecture is extraordinarily beautiful: the lotus shape emerging from the marble, the proportions perfectly calculated, light filtering through marble surfaces. Photography of the interior is restricted; exterior photography is encouraged. Walking around the temple grounds, you encounter the gardens: symmetrical lawns, fountains, seating areas. The experience is peaceful—one of Delhi's most tranquil spaces. The temple's message through architecture: unity, beauty, spirituality transcending religious boundaries.",im:"An architect in 1980, overseeing the temple's completion, understanding that this building would become a meditation space for millions.",t:"Located in South Delhi, Kalkaji area. Accessible by Metro Line 2. Entry free. Open 9:30am-12:30pm and 2pm-5pm. Closed Mondays. Photography restricted inside; exterior freely photographable. Visitors remove shoes. Allow 45-60 minutes.",c:[],r:"g",nn:"बहाई उपासना गृह",ns:"कमल के आकार की वास्तुकला वाला बहाई मंदिर",nst:"बहाई मंदिर श्वेत संगमरमर से बना। सभी धर्मों के लिए खुला। शांतिपूर्ण ध्यान स्थान।",nt:"दक्षिण दिल्ली, कलकाजी। प्रवेश निःशुल्क। 9:30-12:30 और 14-17 तक खुला।"},
  {id:19,n:"Safdarjung Tomb — Symmetrical Monument",a:"Central Delhi",v:["history", "architecture", "beautiful"],d:75,s:"An 18th-century mausoleum featuring gardens and symmetrical architecture—last of Delhi's garden tombs.",st:"Safdarjung Tomb was built in 1754 as the burial monument of Safdarjung, a Mughal nobleman. The tomb is less celebrated than Humayun's or the Taj Mahal, yet equally beautiful. The structure is red sandstone and white marble; proportions are graceful. The garden (charbagh) features symmetrical pathways, water channels, plantings. Walking the garden, you understand Mughal garden philosophy: paradise represented through order, water, flowering plants. The tomb interior is decorated with inlay work. The complex includes smaller monuments and structures. The site is peaceful; fewer visitors than major monuments. The architecture rewards close observation: details carved into stone, proportions demonstrating mathematical precision. The tomb represents later Mughal period: still producing architectural beauty, yet political power already declining. The site represents architectural continuity: gardens and tombs following established traditions despite historical upheaval.",im:"A nobleman in 1754, commissioning his tomb, envisioning eternal rest in a beautiful structure overlooking gardens.",t:"Located in central Delhi, near Safdarjung Airport. Accessible by Metro or taxi. Entry fee around Rs. 600. Open 7am-5pm. Photography allowed. Allow 1-2 hours. The site is peaceful and less crowded than major tourist monuments.",c:[],r:"g",nn:"सफदरजंग का मकबरा",ns:"18वीं शताब्दी का मकबरा",nst:"सफदरजंग का मकबरा 1754 में निर्मित। दिल्ली का अंतिम बाग़-मकबरा। सुंदर वास्तुकला।",nt:"केंद्रीय दिल्ली। प्रवेश शुल्क 600 रुपये। 7-17 तक खुला।"},
  {id:20,n:"Central Delhi Evening Walk — Rajpath Promenade",a:"Central Delhi",v:["views", "local"],d:120,s:"A walking route along Rajpath from India Gate to Rashtrapati Bhavan—experiencing Delhi's ceremonial axis.",st:"Rajpath (now Rajkpath) was designed as Delhi's ceremonial avenue. Walking Rajpath from India Gate toward Rashtrapati Bhavan, you traverse Delhi's civic core. The avenue is wide, lined with trees. Government buildings flank the route. At sunset, the light transforms: the buildings glow, shadows lengthen. Joggers and walkers fill the path. The walk is peaceful despite surrounding traffic. The avenue's geometric precision is evident: straight lines, symmetrical plantings, monumental scale. The promenade offers views of Parliament House, Rashtrapati Bhavan, governmental institutions. Walking Rajpath, you understand Delhi's planning: a city designed to impress, to announce governmental power, to organize urban space through monumental geometry. The evening walk is particularly rewarding: light is golden, crowds thin, the city calms. The walk connects all major government centers: a narrative of Indian governance written in urban space.",im:"A city planner in 1920, designing Rajpath, envisioning processions of imperial might—not knowing that Indian democracy would use the same avenue.",t:"Starts at India Gate, extends toward Rashtrapati Bhavan. Publicly accessible. Best walked late afternoon into evening. Length: 2-3 km. Walking time: 45-90 minutes depending on pace. Entirely free. Photography excellent, especially during golden hour. The walk is safe and pleasant.",c:[],r:"g",nn:"राजपथ संध्या पदयात्रा",ns:"भारत गेट से राष्ट्रपति भवन तक की प्रशासनिक सड़क",nst:"राजपथ दिल्ली का समारोह अक्ष। सरकारी भवन दोनों ओर। सांध्यकालीन सर्वोत्तम।",nt:"भारत गेट से प्रारंभ। संध्याकाल आदर्श। 2-3 किमी। निःशुल्क।"},
  {id:21,n:"Pragati Maidan — Trade & Exhibition Center",a:"Central Delhi",v:["modern", "local"],d:90,s:"A vast exhibition ground hosting trade shows, conventions, and events—where commerce and culture converge.",st:"Pragati Maidan (Field of Progress) is Delhi's primary exhibition venue. The facility hosts dozens of fairs annually: book fairs, trade shows, cultural festivals. The grounds are sprawling: multiple halls, outdoor spaces, food vendors. During major exhibitions, the site fills with crowds, energy, commerce. The India International Trade Fair (November-December) is particularly vibrant: exhibitions from states across India, vendors selling regional crafts, music and dance performances. Visiting during an exhibition offers immersion in Indian commercial culture: vendors negotiating, buyers examining goods, the chaos and energy of commerce. The site without exhibitions is less interesting: simply open grounds. Planning a visit around major exhibitions rewards the effort. Pragati Maidan represents Delhi's aspirations: a cosmopolitan city hosting international commerce and cultural exchange. The facility is modern—a contrast with ancient monuments elsewhere in Delhi.",im:"An entrepreneur in 1970, displaying wares at a trade fair in Pragati Maidan, hoping to build a national business.",t:"Located in central Delhi, near India Gate. Accessible by Metro Line 2 or 6. Entry varies depending on exhibitions (free to several hundred rupees). Exhibition schedules available on official website. Photography policies vary by exhibition. Allow 2-4 hours during exhibitions. Outside exhibitions, the space is less compelling.",c:[],r:"g",nn:"प्रगति मैदान",ns:"व्यापार और प्रदर्शनी केंद्र",nst:"प्रगति मैदान दिल्ली का मुख्य प्रदर्शनी स्थल। वर्ष भर मेले और प्रदर्शनियाँ।",nt:"केंद्रीय दिल्ली। मेट्रो लाइन 2, 6। प्रवेश शुल्क परिवर्तनशील।"},
  {id:22,n:"Sri Venkateswara Temple — South Indian Shrine",a:"South Delhi",v:["history", "beautiful", "local"],d:60,s:"A South Indian temple featuring Dravidian architecture—representing India's religious diversity within Delhi.",st:"Sri Venkateswara Temple brings South Indian architectural and devotional traditions to North India. The temple's gopuram (tower) features the characteristic South Indian style: colorful carved tiers. Inside, the deity is worshipped in South Indian ritual tradition. The temple is vibrant during festivals: thousands arrive for celebrations. Daily worship involves drumming, chanting, ritual bells. The temple's community is primarily South Indian migrants and their descendants—people maintaining cultural traditions far from southern homelands. The temple represents India's internal migration and religious pluralism: South Indian traditions flourishing in North India, communities preserving distinctive identities within larger nation. Visiting the temple offers exposure to South Indian spirituality and culture. The experience is welcoming; visitors of all faiths appreciated. The temple is less crowded than major North Delhi sites; the experience is more intimate.",im:"A South Indian migrant in 1980, worshipping in this temple, connecting to home traditions while building new life in North India.",t:"Located in South Delhi, Kalkaji area. Accessible by Metro Line 2. Entry free. Open 6am-9pm. Respectful dress required. Shoe covers available. Photography allowed in courtyards. Allow 45-60 minutes.",c:[],r:"g",nn:"श्री वेंकटेश्वर मंदिर",ns:"दक्षिण भारतीय द्रविड़ वास्तुकला वाला मंदिर",nst:"श्री वेंकटेश्वर मंदिर दिल्ली में दक्षिण भारतीय परंपरा। द्रविड़ गोपुरम शैली।",nt:"दक्षिण दिल्ली। प्रवेश निःशुल्क। 6-21 तक खुला।"},
  {id:23,n:"Delhi Haat (Folk Market) — Cultural Marketplace",a:"East Delhi",v:["local", "food", "art"],d:120,s:"A curated marketplace featuring crafts, food, and performances from across India—cultural exchange center.",st:"Delhi Haat is an open-air marketplace designed to support rural and folk artisans. The facility features stalls arranged around courtyards: textile weavers, potters, woodcarvers, jewelry makers selling directly to consumers. The marketplace includes food stalls: regional cuisine from across India. Regular cultural performances feature traditional music, dance, theater. Walking Delhi Haat, you encounter India's regional diversity: products from remote villages, artisans demonstrating traditional techniques, the smell of diverse foods, live music. The marketplace supports artisans by providing direct market access; visitors access authentic handcrafted goods without middlemen. The experience is educational: learning regional traditions, understanding artisan livelihoods, appreciating craft skills. The marketplace is less chaotic than street markets; curated, organized. The experience is welcoming to visitors. Performances are typically evening (6pm onward). Visiting during performances combines shopping with cultural entertainment.",im:"A village weaver in 1990, participating in Delhi Haat for the first time, selling textiles directly to consumers from across India.",t:"Located in East Delhi, near INA Market. Accessible by Metro Line 2. Entry fee minimal. Open 10am-9pm. Food stalls open throughout day. Cultural performances typically 6pm-9pm. Photography allowed. Allow 2-3 hours. Bring cash; many artisans prefer cash transactions.",c:[],r:"g",nn:"दिल्ली हाट",ns:"पूरे भारत से कला और लोककला बाजार",nst:"दिल्ली हाट ग्रामीण कारीगरों को समर्थन देता है। क्षेत्रीय कला और खाद्य। सांस्कृतिक प्रदर्शन।",nt:"पूर्वी दिल्ली। प्रवेश शुल्क न्यूनतम। 10-21 तक खुला।"},
  {id:24,n:"Okhla Bird Sanctuary — Wetland Refuge",a:"South Delhi",v:["nature", "beautiful"],d:120,s:"A wetland sanctuary on the Yamuna River supporting migratory birds—nature within the city.",st:"Okhla Bird Sanctuary occupies islands in the Yamuna River where water levels are controlled by barrages. The sanctuary supports over 320 bird species: migratory birds arriving from Central Asia, resident species year-round. Walking the sanctuary's paths, you encounter birdwatchers with binoculars, photographers with long lenses, nature enthusiasts. The best time is winter (November-February) when migratory birds arrive. The experience of watching birds in their natural habitat is meditative: birds unaware of observers, engaged in feeding, courtship, nesting. The sanctuary is buffer against urbanization: a space where nature persists within the city. The river itself is polluted; yet the sanctuary represents effort to preserve ecological space despite urban pressure. Visiting the sanctuary requires hiring a guide; boats navigate the channels. The experience reveals Delhi's relationship with nature: the city encroaching, yet residents fighting to preserve habitat.",im:"A migratory bird in November, arriving at Okhla Sanctuary after traveling thousands of kilometers from Central Asia, finding refuge.",t:"Located in South Delhi, Okhla area. Accessible by Metro or taxi. Entry fee around Rs. 500 including guide. Open 6am-6pm. Best visited early morning for bird activity. Bring binoculars. Photography excellent but challenging (birds are distant). Allow 2-3 hours.",c:[],r:"g",nn:"ओखला पक्षी अभयारण्य",ns:"यमुना नदी पर आर्द्रभूमि पक्षी अभयारण्य",nst:"ओखला 320 पक्षी प्रजातियाँ। शीतकालीन प्रवास। शहर के भीतर प्रकृति।",nt:"दक्षिण दिल्ली। प्रवेश शुल्क 500 रुपये (गाइड सहित)। प्रातः सर्वोत्तम।"},
  {id:25,n:"Coronation Park (Coronation Memorial) — Colonial Legacy",a:"North Delhi",v:["history", "hidden"],d:90,s:"The site of George V's coronation durbar in 1911—now a park with monuments commemorating colonial grandeur.",st:"Coronation Park commemorates the 1911 Delhi Durbar where King George V was crowned and announced the transfer of India's capital from Calcutta to Delhi. The ceremony was elaborate: thousands gathered, imperial pageantry displayed, the British empire announcing permanence. Today the site is a spacious park with monuments and remnants. The former coronation pavilion is gone; monuments remain. Walking the park, you encounter statues of colonial administrators, commemorative plaques, the scale of space suggesting the grandeur of the original ceremony. The park is peaceful, less visited than major monuments. The experience is contemplative: the colonial empire that seemed permanent now replaced by independent Indian state. The park represents colonial history preserved after independence: Indians maintaining history of colonizers, choosing to preserve rather than erase. The park is little-known; visiting offers solitude and historical contemplation.",im:"A British official in 1911, attending the coronation durbar, certain that the empire would persist indefinitely—unaware of independence 36 years hence.",t:"Located in North Delhi, New Delhi area. Accessible by car or Metro (walk). Entry free. Open dawn to dusk. Photography allowed. The park is large; walking the full perimeter requires time. Allow 1-2 hours. Bring water; the area is exposed.",c:[],r:"g",nn:"राज्याभिषेक पार्क",ns:"1911 के जॉर्ज वी के राज्याभिषेक की स्थली",nst:"राज्याभिषेक पार्क 1911 दिल्ली दरबार की जगह। ब्रिटिश साम्राज्य का स्मारक।",nt:"उत्तरी दिल्ली। प्रवेश निःशुल्क। सूर्योदय से सूर्यास्त।"},
  {id:26,n:"Chandni Chowk Food Walk — Culinary Heritage",a:"Old Delhi",v:["food", "local"],d:120,s:"A walking tour through Old Delhi's legendary food stalls—tasting centuries of culinary tradition.",st:"Chandni Chowk's food culture is legendary: jalebi-imarti (orange and white sweets), kachori-sabzi (fried pastry with vegetables), haleem (meat dish), nihari (slow-cooked meat stew), biryani, lassi, milk sweets. Walking the food markets with a guide, you taste specialties that have existed for centuries. Vendors operate from tiny stalls; recipes passed through generations. The food is extraordinary: complex spice combinations, careful technique, flavors refined through centuries. The experience is sensory overload: tastes, smells, the sounds of street commerce. Walking a food trail typically includes 5-8 stops; small tastes at each. The experience is educational: learning about Delhi's food history, Mughal influences, regional traditions. The food reflects Delhi's position: a crossroads of North India, combining Punjabi, Mughlai, Awadhi traditions. Visiting with a knowledgeable guide enhances experience; they know vendors, understand history, provide context. Food walks typically cost 1000-2000 rupees and last 2-3 hours.",im:"A food vendor in 1950, operating the same stall at the same location, making the same recipes—knowing food is how culture persists.",t:"Walking tours available through travel agencies or hotels. Best with organized guide. Early morning or evening optimal. Bring appetite; multiple tastes provided. Cost typically 1000-2000 rupees. Allow 2-3 hours. Cash useful for individual vendors. Photography encouraged.",c:[],r:"g",nn:"चांदनी चौक खाद्य पदयात्रा",ns:"पुरानी दिल्ली के पाक परंपरा का स्वाद",nst:"चांदनी चौक की खाद्य संस्कृति किंवदंती। जलेबी, कचौड़ी, हलीम, निहारी।",nt:"गाइड के साथ दौरा सर्वोत्तम। लागत 1000-2000 रुपये। 2-3 घंटे।"},
  {id:27,n:"Malai Market (Spice Market) — Sensory Bazaar",a:"Old Delhi",v:["local", "food", "hidden"],d:60,s:"Old Delhi's spice wholesale market—where vendors trade spices, dried goods, and essences supplying Delhi's kitchens.",st:"Malai Market is where Delhi's spices congregate. Vendors sell from open sacks: turmeric, cardamom, cinnamon, clove, pepper, coriander, cumin, asafetida, and countless others. The smell is intoxicating: spices layering, each distinct yet combined creating complex aroma. The market is wholesale; prices are low. Many small bags are available for tourists. Walking through, you encounter vendors who know spices expertly: they can identify quality by sight and smell, describe origins, explain culinary uses. The market opens early (6am); wholesale traders arrive first. Morning atmosphere is most authentic. As day progresses, retail tourists arrive. The market supplies Delhi's kitchens: home cooks purchasing spices for daily cooking, restaurant chefs buying in bulk, street vendors sourcing ingredients. The market represents traditional commerce: knowledge-intensive, relationship-based, direct producer-to-consumer interaction.",im:"A spice merchant in 1900, operating from the same location, selling spices from the same regions—tradition persisting through time.",t:"Located in Old Delhi, adjacent to Chandni Chowk. Open early morning to evening. Best visited 6am-10am when wholesale activity peaks. Bring bags for purchases; you'll want to buy. Photography respectfully. Allow 45-60 minutes. Prices are negotiable, though already wholesale.",c:[],r:"g",nn:"मसाला मार्केट",ns:"पुरानी दिल्ली का मसाला थोक बाजार",nst:"मसाला मार्केट दिल्ली के मसालों का केंद्र। दर्जनों मसाले, सुगंध मदमस्त।",nt:"पुरानी दिल्ली। प्रातः 6-10 सर्वोत्तम। खरीदी के लिए बैग लाएँ।"},
  {id:28,n:"Siri Fort — Medieval Ruins",a:"South Delhi",v:["history", "hidden", "nature"],d:90,s:"Ruins of a 13th-century fort wall—remnants of pre-modern Delhi defending against invaders.",st:"Siri Fort was built by Alauddin Khilji in 1303 as a defensive structure. The fort covered vast area; today, mostly ruins remain: partial walls, foundations, archaeological remnants. The fort's strategic location commanded approaches to Delhi. Walking the ruins, you encounter history compressed into stone: medieval military strategy visible in wall placement, defensive positions. The area around the fort is now residential and recreational: parks, sports facilities occupy the space. Some walls remain intact; others are fragmentary. The experience is archaeological: understanding through ruins how cities were structured, defended, organized. The site is peaceful; few tourists visit. Walking the fort's perimeter offers understanding of its vast scale. The ruins teach humility: structures built to last centuries now crumbling, empires that seemed permanent now historical memory.",im:"A soldier in 1303, standing on Siri Fort's walls, defending Delhi against invaders—that same wall now ruins, his efforts now archaeology.",t:"Located in South Delhi, Adchini area. Accessible by Metro or taxi. Entry free. Open to public. Photography allowed. The site is partially integrated into parks; walking is possible. Allow 1-2 hours. Bring water; the area is exposed.",c:[],r:"g",nn:"सीरी किला",ns:"13वीं शताब्दी के किले के अवशेष",nst:"सीरी किला अलाउद्दीन खिलजी द्वारा 1303 में निर्मित। दीवारें आंशिक रूप से सुरक्षित।",nt:"दक्षिण दिल्ली, अदचिनी क्षेत्र। प्रवेश निःशुल्क। पदयात्रा संभव।"},
  {id:29,n:"Swaminathan Temple — Morning Prayers",a:"East Delhi",v:["local", "beautiful"],d:45,s:"A sacred Hindu temple where devotees gather for dawn prayers—intimate spiritual experience.",st:"Swaminathan Temple is a neighborhood temple where local devotees gather for morning prayers. The temple is modest: simple structure, colorful decorations, a sanctum with deity sculptures. At dawn, worshippers arrive: elderly women, young families, office workers before work. The bells ring, incense rises, chants echo. The atmosphere is spiritual, meditative. Visiting at dawn offers authentic experience: not tourist destination but functioning temple where spiritual practice occurs. The devotees are welcoming; visitors sit quietly, respectfully observing. The experience reveals contemporary Hindu practice: ritual, community, spiritual discipline. The temple represents millions of such temples across India: small, neighborhood-based, integral to local spiritual life. Visiting offers insight into religious traditions far from major tourist sites.",im:"An elderly woman, aged 70, entering the temple at dawn as she has for fifty years, performing daily worship ritual.",t:"Located in East Delhi. Accessible by local transport. Entry free. Best visited dawn (5:30am-7am). Respectful dress required. Shoe covers available. Photography allowed respectfully. Allow 30-45 minutes.",c:[],r:"g",nn:"स्वामीनाथन मंदिर",ns:"सुबह की प्रार्थना का मंदिर",nst:"स्वामीनाथन मंदिर पड़ोस का मंदिर। सुबह भक्तों का जमावड़ा। आध्यात्मिक अनुभव।",nt:"पूर्वी दिल्ली। प्रवेश निःशुल्क। सुबह 5:30-7:00 सर्वोत्तम।"},
  {id:30,n:"Yamuna River Monumental Path — Urban Waterfront",a:"Citywide",v:["nature", "local"],d:180,s:"Walking or cycling paths along the Yamuna River—connecting monuments while offering nature and urban observation.",st:"The Yamuna River runs through Delhi; efforts to develop monumental paths along its banks create opportunities for understanding the city's relationship with water. Walking or cycling the paths, you encounter monuments from different eras: medieval structures, Mughal gardens, colonial bridges, modern buildings. The river itself is polluted; yet the path offers respite from urban intensity. Walking the river, you encounter Delhiites exercising, meditating, fishing. The experience is contemplative: the ancient river flowing through the modern city, connecting past and present. Several sections of path are developed; others remain underdeveloped. Planning a route through Raj Ghat, Humayun's Tomb area, and onward offers varied experience. The river perspective reveals Delhi's geography: how the city developed in relation to water, how ancient and modern structures coexist along waterway.",im:"A Delhiite in 2000, jogging along the Yamuna path, the ancient river flowing beside modern city.",t:"Multiple access points along Yamuna. Paths vary in development and maintenance. Best segments: Raj Ghat area, Doon School Bridge area, Kalindi Kunj. Accessible by Metro or taxi to trailheads. Photography excellent. Allow 2-4 hours depending on section walked.",c:[],r:"g",nn:"यमुना नदी पथ",ns:"यमुना नदी के किनारे स्मारक पथ",nst:"यमुना नदी दिल्ली से बहती है। पथ प्राचीन और आधुनिक संरचनाओं को जोड़ते हैं।",nt:"विभिन्न प्रवेश बिंदु। राज घाट क्षेत्र सर्वोत्तम। 2-4 घंटे।"}

  {id:31, n:"Yamuna River Swimming at Dawn — East", a:"East", v:["swimming","beautiful","hidden"], d:35, s:"Locals swim in the Yamuna at designated spots at 5am—the water is sacred to Hindus—the early morning ritual is profound.", st:"Along the Yamuna, specific ghats (steps) are designated for bathing. At 5am, locals wade into the water. The light is dim. The act is ritual. The water is sacred in Hindu practice. Few foreigners see this.", im:"A figure wading into dark water. The city rising beyond. Morning mist on the river.", t:"Kalkaiji Ghat or Salimgarh Ghat. 5-6am. Dress modestly. Remove shoes on the steps.", c:["swimming","sacred"], r:"y", nn:"Yamuna River Swimming at Dawn — East", ns:"Locals swim in the Yamuna at designated spots at 5am.", nst:"Along the Yamuna, specific ghats are designated for bathing.", nt:"Kalkaiji Ghat or Salimgarh Ghat. 5-6am."},
  {id:32, n:"Humayun\'s Tomb at Sunset — East", a:"East", v:["sunset","history","beautiful"], d:25, s:"Red sandstone Mughal tomb—2 acres of gardens—the light at 5:30pm turns the stone crimson and gold.", st:"Built in the 1500s. Red sandstone. Gardens around it. At sunset, the light hits the stone and it turns deep red and gold. The gardens are green. The effect is extraordinary.", im:"Red stone tomb glowing crimson. Gardens dark green below. Sky burning orange.", t:"East Delhi. Open 6am-6pm. 300 rupees. Best 5-6pm. Photography allowed.", c:["high_spots","history_big"], r:"g", nn:"Humayun\'s Tomb at Sunset — East", ns:"Rotes Sandstein-Mogul-Grabmal—2 Hektar Gärten.", nst:"Im 16. Jahrhundert erbaut. Rotes Sandstein.", nt:"Ostdelhil. Offen 6-18 Uhr. 300 Rupien."},
  {id:33, n:"Jama Masjid Early Prayer — Old Delhi", a:"Old Delhi", v:["sacred","history","beautiful"], d:15, s:"India\'s largest mosque—built 1656—at 5am, thousands gather to pray—the call to prayer echoes from the courtyard.", st:"A massive courtyard. Red sandstone. At 5am, the gates open. Thousands enter. They pray facing Mecca. The muezzin\'s voice rises. The collective prayer creates a presence.", im:"Thousands kneeling in unified prayer. The call rising from a minaret.", t:"Jama Masjid, Old Delhi. Open 6am-12pm (then 1:30pm-6:30pm). Photography restricted during prayer. Dress modestly.", c:["sacred","history_big"], r:"g", nn:"Jama Masjid Early Prayer — Old Delhi", ns:"Indiens größte Moschee—erbaut 1656.", nst:"Ein massiver Innenhof. Roter Sandstein.", nt:"Jama Masjid, Altdelhil. Offen 6-12 Uhr."},
  {id:34, n:"Chandni Chowk Street Food at 7am — Old Delhi", a:"Old Delhi", v:["food","market","vibrant"], d:12, s:"Oldest market in Delhi—narrow alley—food vendors opening—the smell of frying, spice, chai—the street is alive before sunrise.", st:"A narrow alley packed with vendors. At 7am, the street is crowded. Vendors setting up. Frying food. The smell is overwhelming. This is how Delhi eats at the start of the day.", im:"A vendor frying samosas. Steam rising. The crowd pressing. The street narrow and full.", t:"Chandni Chowk, Old Delhi. 6-9am best (before tourist rush). Red Fort at one end. Bring cash. Go with a local if possible.", c:["markets","food","local_only"], r:"g", nn:"Chandni Chowk Street Food at 7am", ns:"Ältester Markt in Delhi—enge Gasse.", nst:"Eine enge Gasse voll von Verkäufern.", nt:"Chandni Chowk, Altdelhil. 6-9 Uhr best."},
  {id:35, n:"Qutub Minar Sunrise — South", a:"South", v:["history","beautiful","ancient"], d:40, s:"12th-century stone tower 73 meters tall—the earliest Islamic monument in India—at sunrise the light is amber on the carvings.", st:"Built 1192. Towers above the ruins of an ancient Hindu temple. The carvings are intricate. Climb the stairs (if open). At sunrise, the light is golden on the stone.", im:"A stone tower rising. Light catching carved details. The sun just appearing.", t:"South Delhi. Open 7am-5pm. 300 rupees. Sunrise 6-7am. Bring water.", c:["history_big","high_spots"], r:"g", nn:"Qutub Minar Sunrise — South", ns:"12. Jahrhundert Steinturm 73 Meter hoch.", nst:"Erbaut 1192. Ragt über Ruinen emporhalb.", nt:"Süd-Delhi. Offen 7-17 Uhr. 300 Rupien."},
  {id:36, n:"Delhi Hidden Havelis — Walled City", a:"Old Delhi", v:["history","architecture","hidden"], d:18, s:"Old mansions hidden inside narrow alleys—courtyards with centuries of patina—residents still live in them—you can sometimes enter and see how the merchant class lived.", st:"Old mansions built 300 years ago. Now divided into small homes. The courtyards are small. The walls are carved. Walk the alleys. Sometimes locals invite you in to see the courtyard. The history is in the walls.", im:"A carved wooden doorway. Beyond it, a courtyard with light from above. The walls painted and worn.", t:"Old Delhi alleys near Jama Masjid. Walk at 8-9am. Respectful behavior. Bring camera.", c:["history","architecture","hidden"], r:"y", nn:"Delhi Hidden Havelis — Walled City", ns:"Alte Herrenhäuser in engen Gassen versteckt.", nst:"Alte Herrenhäuser vor 300 Jahren erbaut.", nt:"Altstädter Gassen in der Nähe der Jama Masjid."},
  {id:37, n:"Ridge Forest Walk at 5am — North", a:"North", v:["quiet","parks","beautiful"], d:28, s:"Forest reserve in the city—trails—at dawn, birds singing, almost no people—the Delhi forest feels ancient and apart.", st:"A protected forest within the city. At 5am, birds sing. Monkeys move through trees. No people. The path is dirt. The air smells of earth and leaves. It\'s separate from Delhi.", im:"A dirt path through trees. A bird flying. Light filtering through leaves.", t:"Delhi Ridge Forest, north Delhi. Multiple entry points. 5-7am best. Bring water.", c:["parks","quiet"], r:"g", nn:"Ridge Forest Walk at 5am — North", ns:"Waldreservat in der Stadt—Wege.", nst:"Ein geschützter Wald innerhalb der Stadt.", nt:"Delhi Ridge Forest, Norddelhil."},
  {id:38, n:"Red Fort Early Access Tour — Old Delhi", a:"Old Delhi", v:["history","greatest_hits"], d:15, s:"Mughal fortress built 1638—massive red sandstone walls—book the 7am tour before crowds—the emperor\'s chambers are extraordinary.", st:"Built by Shah Jahan. Red sandstone. The palace within is ornate. The gardens were once perfect. The 7am tour gets you inside before the crowds. The effect is different with few people.\n\nIt earned its place.", im:"Red sandstone walls with intricate carvings. A chamber with mirror work catching morning light.", t:"Chandni Chowk, Old Delhi. Book 7am tour online. 300 rupees (+ tour). Photography allowed.", c:["greatest_hits","history_big"], r:"g", nn:"Red Fort Early Access Tour", ns:"Mogul-Festung erbaut 1638—massive rote Sandsteinmauern.", nst:"Von Shah Jahan erbaut. Roter Sandstein.", nt:"Chandni Chowk, Altdelhil. 7am Führung buchen."}];

<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Delhi Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
