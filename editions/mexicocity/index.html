const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length),
  {id:31,n:"Coyoacán Plaza and Léon Trotsky's House",a:"Coyoacán",v:["history","beautiful","local"],d:25,s:"1950s neighborhood where Trotsky was assassinated, now a thriving plaza with markets, cafes, and real Mexico City life.",st:"Coyoacán sits south of Centro. The plaza is surrounded by stone arcades, filled with locals. On one corner: the house where León Trotsky lived his final days—a small museum where you see the desk where he worked, the ice axe in the wall. Walk the cobbled streets. Buy flowers from vendors. Sit in the plaza and watch families.",im:"Sitting in a shaded plaza, watching couples dance to live music, the smell of flowers and food, the history of the place seeping from the walls.",t:"Take Metro Line 2 to Viveros. The plaza is the center. The Trotsky House is a few blocks away (Casa Museo de León Trotsky). Entry is cheap. Go on a Saturday when the plaza is fullest.",c:["history_big","parks","local_only"],r:"g",nn:"科约阿坎",ns:"托洛茨基被暗杀的1950年代邻居，现在是一个繁华的广场",nst:"科约阿坎坐在镇中心以南。广场被石门廊包围。在一个角落：托洛茨基的房子。",nt:"坐地铁2号线到比维罗斯。广场在中心。托洛茨基博物馆就在几条街外。"},
  {id:32,n:"Roma Norte Tree-lined Streets and Cafes",a:"Roma Norte",v:["beautiful","local","night"],d:5,s:"Wide tree-lined streets with early 20th-century mansions, now bohemian neighborhood with bookstores, galleries, and real cafes.",st:"Roma Norte is where writers and artists live. Walk Calle Álvaro Obregón. The trees are massive. The buildings are art deco and 1920s houses. Cafes spill onto sidewalks. Bookstores in former parlors. Galleries in old mansions. It's slowly gentrifying but still feels like Mexico City, not a theme park.",im:"Walking under old trees, passing ivy-covered mansions, stopping at a cafe where locals read newspapers, the smell of fresh coffee and bread.",t:"Metro: Sevilla or Insurgentes. Walk slowly. It's made for wandering. Go early morning for coffee and fresh pan de muerto. Evenings for mezcal bars. Every street corner is a café.",c:["architecture","history_big","local_only"],r:"g",nn:"罗马北部",ns:"宽阔的树木繁茂的街道和早期20世纪的豪宅",nst:"罗马北部是作家和艺术家住的地方。走奥夫雷贡街。树很大。",nt:"地铁：塞维利亚或英苏金特斯。慢慢走。早上去喝咖啡。傍晚去梅斯卡尔酒吧。"},
  {id:33,n:"Chapultepec Park Castle at Sunset",a:"Chapultepec",v:["beautiful","high_spots","history"],d:10,s:"Massive park on a hill with a castle at the top, locals picnic and bike, sunset from the castle overlooks the entire city.",st:"Chapultepec is 1,695 hectares of park, lake, museums, and forest. The castle sits at the top. Climb up. From the castle, the city spreads in every direction at sunset. Locals bring families, blankets, food. The castle interiors are 19th-century opulence. The park is free. The castle has entry fee but worth it.",im:"Standing on the castle terrace at sunset, the entire sprawling city turning gold and pink, the mountains in distance, the ancient park below.",t:"Metro Line 1 to Chapultepec. Bike rental at the park entrance. Bring snacks. Enter the castle at 9am for smaller crowds. Sunset is 6pm-7pm depending on season. Stay till dark.",c:["high_spots","parks","history_big"],r:"g",nn:"查普尔特佩克城堡",ns:"山顶有城堡的大公园，当地人野餐和骑自行车",nst:"查普尔特佩克是1695公顷的公园、湖泊、博物馆和森林。城堡坐在顶部。",nt:"地铁1号线到查普尔特佩克。自行车租赁在公园入口。日落时来。"},
  {id:34,n:"San Ángel Open Air Market Saturday",a:"San Ángel",v:["local","free","beautiful"],d:20,s:"Saturday morning outdoor art and craft market in a colonial plaza, local artists selling work, very Mexican, zero tourists.",st:"Every Saturday, San Ángel's Plaza San Jacinto transforms. Artists and craftspeople set up stalls. Paintings, sculptures, pottery, jewelry—all local work. The plaza is cobblestone, surrounded by colonial buildings. The market fills by 11am, peaks at 1pm, empties by 4pm. It's chaotic and colorful.",im:"Walking between art stalls, the smell of fresh paint and wood, watching artists talk to buyers, sitting with a coffee watching the plaza fill.",t:"Saturday only, 10am-5pm. Metro Line 2 to Miguel Ángel de Quevedo, then bus or taxi to Plaza San Jacinto. Arrive before noon to see the setup. Cash only at most stalls. Go for lunch at one of the surrounding cantinas.",c:["local_only","parks","art"],r:"g",nn:"圣安赫尔周六市场",ns:"殖民地广场上的周六晨间艺术和手工艺品市场，很墨西哥",nst:"每个星期六，圣安赫尔的圣哈辛托广场转变。艺术家和工艺品制造商设置摊位。",nt:"仅周六，上午10点至下午5点。地铁2号线到米格尔天使。中午前到达。只收现金。"},
  {id:35,n:"Espacio Escultórico Lava Sculptures",a:"Pedregal",v:["weird","beautiful","free"],d:25,s:"Massive concrete sculptures rising from volcanic rock in the Pedregal, a strange, massive art installation that most tourists never find.",st:"Espacio Escultórico is hidden in the Jardines del Pedregal neighborhood. Ten enormous concrete sculptures emerge from a field of volcanic rock. The scale is overwhelming. Kids climb on rocks. Couples take photos. It's free, it's surreal, it's genuinely weird.",im:"Walking through a lunar landscape of black volcanic rock with massive concrete forms rising around you, the sound of wind, complete quiet.",t:"Drive or taxi to the address—it's hard to reach by Metro. Search 'Espacio Escultórico' in maps. Free entry. Bring water and a jacket (the wind can be cold on the rocks). Go at golden hour for surreal light. 1 hour visit minimum.",c:["weird","architecture","free"],r:"g",nn:"雕塑空间",ns:"火山岩中的巨大混凝土雕塑，陌生、巨大的艺术装置",nst:"雕塑空间隐藏在佩德雷加尔花园邻居中。十个巨大的混凝土雕塑出现在火山岩场地。",nt:"开车或打车到地址。搜索'雕塑空间'在地图上。免费进入。带水和夹克。"},
  {id:36,n:"Biblioteca Vasconcelos Megalibrary",a:"Cuauhtémoc",v:["beautiful","architecture","free"],d:5,s:"A 'megalibrary' with books suspended in geometric metal clouds, free entry, stunning architecture, and a rooftop garden.",st:"Biblioteca Vasconcelos feels like the future. Inside: books float on suspended metal shelves—'clouds' is what locals call them. The architecture is minimalist and massive. Rooftop gardens overlook the city. It's free. Locals study here. It's a real library, not a museum.",im:"Walking among suspended books, light pouring through skylights, the geometry of the metal, climbing to the rooftop and the city spreading below.",t:"Metro Line B at San Cosme. Free entry. Bring your ID. Open Tuesday-Sunday 10am-7pm. Go mid-afternoon when it's less crowded. The rooftop is the real prize—sit there for an hour.",c:["architecture","free","parks"],r:"g",nn:"瓦斯康塞洛斯图书馆",ns:"'书在几何金属云中悬浮的'百万图书馆，免费进入，壮观的建筑",nst:"瓦斯康塞洛斯图书馆感觉像未来。里面：书漂浮在悬挂的金属架子上。",nt:"地铁B线在圣卡斯梅。免费进入。带身份证。周二-周日上午10点-下午7点。中午去。"},
  {id:37,n:"Xochimilco Canals Float at Dusk",a:"Xochimilco",v:["beautiful","romantic_water","local"],d:50,s:"Floating gardens and canals—ancient Aztec engineering, boats poled through waterways at dusk, mariachis singing.",st:"Xochimilco is pre-Hispanic. Aztecs engineered floating gardens. You hire a trajinera (a poled boat) and float through canals lined with trees and gardens. Old men pole the boats. Mariachis play. Vendors sell food and beer from other boats. It's touristy and real at the same time. Go at dusk.",im:"Floating on water at dusk, music echoing across the canals, the light turning the water gold, flowers hanging from gardens, the smell of flowers and cooking.",t:"South end of Metro Line 2 to Xochimilco. At the dock, hire a boat—negotiate the price (usually 300-500 pesos per hour for small boat). Go for 2 hours at dusk. Bring snacks or buy from vendors. Best: Tuesday-Friday for fewer tourists.",c:["romantic_water","day_trips","local_only"],r:"y",nn:"霍奇米尔科",ns:"浮动花园和运河，古代阿兹特克工程，黄昏时的船只",nst:"霍奇米尔科是前西班牙时期。阿兹特克人设计了浮动花园。",nt:"地铁2号线南端到霍奇米尔科。在码头租一条船。大约300-500比索每小时。"},
  {id:38,n:"Templo Mayor Archaeological Site",a:"Zócalo",v:["history_big","weird"],d:0,s:"Massive Aztec temple excavated in the center of Mexico City, layers of different civilizations stacked on top of each other.",st:"The Templo Mayor is Mexico's most important archaeological site. The pyramid was buried under the city for 500 years. In the 1970s, construction revealed it. Now you walk between the original stone walls, see the temple structure, the skull rack (tzompantli) where Aztecs displayed the heads of sacrifices. It's heavy history. The museum above ground is excellent.",im:"Standing in the excavated temple, seeing layers of history, the original sacrificial stone, the scale of the Aztec civilization before conquest.",t:"Metro Line 2 to Zócalo. Entry: about 80 pesos. Tuesday-Sunday 9am-5pm. English audio guide available. Spend 2 hours minimum. The museum on top level is crucial—don't skip it. Go early to beat crowds.",c:["history_big","weird"],r:"g",nn:"大神庙",ns:"在墨西哥城中心挖掘的巨大阿兹特克寺庙",nst:"大神庙是墨西哥最重要的考古遗址。金字塔被埋在城市下500年。",nt:"地铁2号线到索卡洛。入场约80比索。周二-周日上午9点-下午5点。"},
  {id:39,n:"Casa Luis Barragán Architectural Masterpiece",a:"Tacubaya",v:["beautiful","architecture","quiet"],d:20,s:"Architect Luis Barragán's former home—minimalist, surreal color palettes, one of the most important 20th-century houses in the world.",st:"Casa Luis Barragán is a pilgrimage site for architecture nerds. Barragán was a genius. His home is small, intensely colored rooms—shocking pinks, yellows, magenta. Light floods in in unexpected ways. Every detail intentional. Tours are limited to 10 people, by reservation only. It feels sacred.",im:"Stepping into a room painted in impossible pink, light striking a yellow wall, the simplicity and intensity of the space, the feeling of genius.",t:"Difficult to reach—taxi is best. Reservations required (often booked weeks ahead). Tours in Spanish and English. 45 minutes. Worth the planning. Cost is minimal (about 120 pesos). Call or email to book.",c:["architecture","history_big"],r:"y",nn:"路易斯巴拉甘之家",ns:"建筑师路易斯巴拉甘的前住宅，极简主义，超现实的调色板",nst:"路易斯巴拉甘之家是建筑极客的朝圣地。巴拉甘是天才。他的房子很小，颜色强烈。",nt:"出租车最好。需要预订。西班牙语和英语导览。45分钟。"},
  {id:40,n:"Bosque de Chapultepec Early Morning",a:"Chapultepec",v:["nature","parks","free"],d:10,s:"Ancient forest, deer still live here, joggers and tai chi groups at dawn, the real green lung of the city.",st:"Before the castle and museums, Chapultepec is a forest. Come at 6am. Old men doing tai chi. Joggers on paths. Deer in the trees (they're wild and bold). Birds everywhere. The forest feels untouched despite the city around it. Sit on benches. Breathe.",im:"Walking forest trails at dawn, the air cool, birds calling, a deer watching from trees, joggers passing silently, complete peace.",t:"Metro Line 1 to Chapultepec. Enter through the main gate and head for the forest trails immediately. Bring water. Go early before the crowds and the heat. The trails are easy. 2 hours is perfect.",c:["nature","parks","free"],r:"g",nn:"查普尔特佩克森林",ns:"古代森林，鹿还住在这里，跑步者和太极群在黎明",nst:"查普尔特佩克在城堡和博物馆之前是一片森林。早上6点来。古老的人做太极。",nt:"地铁1号线到查普尔特佩克。通过主门进入，立即前往森林步道。"},
  {id:41,n:"Mercado de Sonora Witchcraft Market",a:"Merced",v:["weird","local","scary"],d:5,s:"Ancient market selling witchcraft supplies, herbs, live animals, incense—the real supernatural Mexico City.",st:"Mercado de Sonora is not for the faint-hearted. It's the witchcraft market. Stalls sell herbs for spells, amulets, live snakes and roosters, bundles of dried plants for rituals. The air is thick with incense. It's chaotic, intense, deeply Mexican. This is where people come to solve problems the old way.",im:"Walking through narrow aisles thick with incense smoke, seeing dried herbs and animal heads, listening to vendors describe spells, the feeling of being in a different time.",t:"Metro Line 1 to La Merced. The Sonora section is in the larger Merced market complex. Go mid-morning. Wear a backpack in front. Do not photograph people or vendors without permission. Respect the space—this is real, not entertainment.",c:["weird","local_only","scary"],r:"y",nn:"市场索诺拉",ns:"古代市场出售巫术用品、草药、活的动物、香火",nst:"市场索诺拉不是胆小鬼的地方。这是巫术市场。摊位出售草药、护身符、活蛇和公鸡。",nt:"地铁1号线到拉梅塞德。索诺拉部分在较大的梅塞德市场综合体中。"}
];

<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>

{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}

<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}

<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}

</div></div>}

return <div style={{minHeight:"100vh",backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Mexico City Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>

<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>

:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>

return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>

):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}
