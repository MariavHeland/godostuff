const P = [
  {id:1,n:"Uluru (Ayers Rock) — Sacred Aboriginal Site",a:"Uluru-Kata Tjuta (Day Trip)",v:["nature", "history", "sacred"],d:480,s:"Australia's most iconic natural landmark, a massive red sandstone monolith sacred to the Anangu Aboriginal people for over 30,000 years.",st:"Uluru rises from the red desert like the beating heart of Australia's soul. The Anangu people have inhabited this region for more than 30,000 years, and Uluru is central to their spiritual beliefs, songlines, and cultural practices. For millennia, the rock was known only to the Anangu until European contact in the 1870s; colonizers called it Ayers Rock, erasing the true name. The rock's appearance changes dramatically throughout the day: rust-red at dawn, glowing orange at sunset, various shades of brown and purple at different times. The monolith rises 348 meters above the desert and extends equally far underground—it's a geological cathedral. Walking around the base (16km) takes several hours and allows intimate connection with the landscape. Climbing the rock was permitted historically but is now discouraged out of respect for Anangu spiritual beliefs. The surrounding area, Kata Tjuta, contains equally spectacular formations.",im:"Uluru glows in sunrise light, the desert's shadows casting its form in relief, a solitary dingo crossing the red earth below.",t:"Located in the Red Centre, accessible by flying to Cairns from Sydney (3-4 hours) then driving or taking tours to Uluru (5 hours further). Alternatively, fly direct to the Uluru airport. Visit during cooler months (April-September). Respect Anangu cultural protocols: don't climb, photograph respectfully, attend ranger talks. Stay hydrated constantly.",c:[],r:"g",nn:"Uluru",ns:"Sitio sagrado de la gente Anangu, corazón espiritual de Australia",nst:"Durante más de 30,000 años, Uluru es centro de creencias y songlines aborígenes; el monolito rojo se transforma con la luz del día.",nt:"Centro Rojo de Australia. Vole desde Sydney. Visite meses frescos. Respete protocolos Anangu. No escale. Asista a charlas de guardabosques."},
  {id:2,n:"Sydney Opera House",a:"Bennelong",v:["architecture", "history", "art"],d:35,s:"An iconic modernist building completed in 1973, featuring sail-shaped shells, hosting world-class performances in a UNESCO World Heritage site.",st:"The Sydney Opera House emerges from the harbor like sails catching wind. Completed in 1973 after 14 years of controversial construction, it has become synonymous with Sydney and Australia itself. Designed by Danish architect Jørn Utzon, the building represents an architectural revolution: the shell roof design was mathematically innovative, its construction a triumph of engineering. The building houses multiple theaters hosting opera, ballet, theater, and concerts. Walking around the exterior reveals the building's sculptural brilliance from every angle. Watching sunset from the forecourt with the Opera House glowing and the Harbour Bridge framing the scene is one of the world's great visual experiences. The building is best appreciated in person—photographs never capture its majesty.",im:"The Opera House's white shells glow in evening light as ferries pass in the harbor, the Harbour Bridge visible in the distance, the foreground filled with people enjoying the warm evening.",t:"Located at Bennelong Point in the CBD. Walk from Circular Quay or take a short train ride. Admission free for the forecourt area; performances require tickets. Tours available daily (advance booking recommended). Allow at least an hour to explore exterior and forecourt. Arrive early to avoid crowds.",c:[],r:"g",nn:"Sydney Opera House",ns:"Edificio modernista icónico con techos en forma de velas",nst:"Completada en 1973, representa revolución arquitectónica; las formas de concha se convierten en silhueta de Sydney y símbolo australiano global.",nt:"Bennelong Point en CBD. Caminata desde Circular Quay. Entrada gratuita para explanada. Paseos disponibles diariamente. Permita 1+ hora. Llegue temprano."},
  {id:3,n:"Sydney Harbour Bridge",a:"Milsons Point",v:["history", "architecture", "views"],d:30,s:"A 1932 steel arch bridge spanning the harbor, with BridgeClimb experience offering views from the summit 134 meters above water.",st:"The Sydney Harbour Bridge, opened in 1932, is one of the world's engineering marvels: a single steel arch spanning 503 meters connecting Sydney's north and south. The bridge took 8 years to build and was an economic triumph for Depression-era Australia. Walking across the bridge reveals the harbor in layers: the Opera House on one side, the CBD on another, Manly in the distance. The BridgeClimb experience takes adventurous visitors up the bridge's arch to the summit 134 meters above the water—an exhilarating experience with unobstructed 360-degree views. Non-climbers can enjoy free harbor views from the bridge or from walking paths beneath it. The bridge is integral to Sydney's identity; its image appears on currency and countless promotional materials.",im:"The arch of the bridge stretches overhead as climbers ascend, the harbor spreading below in all directions, the Opera House and city skyline framing the water.",t:"Bridge access free for walking/driving. BridgeClimb bookings required (3.5 hours, expensive). Alternatively, visit the South East Pylon for views (modest admission). Go during daylight for best experience. The bridge can be windy and cold even in summer. Wear layers.",c:[],r:"g",nn:"Sydney Harbour Bridge",ns:"Puente de arco de 1932 que abarca el puerto con vistas espectaculares",nst:"Abierto en 1932, es triunfo de ingeniería y maravilla arquitectónica que define visualmente a Sydney.",nt:"Acceso a pie gratuito. BridgeClimb requiere reserva. South East Pylon para vistas. Luz natural. Viento y frío. Use capas de ropa."},
  {id:4,n:"Blue Mountains National Park — World Heritage Site",a:"Blue Mountains (Day Trip)",v:["nature", "views", "hidden"],d:480,s:"A mountain range 90km west of Sydney with dramatic cliff formations, eucalyptus forests, hiking trails, and the famous Three Sisters rock formation.",st:"The Blue Mountains, covered in eucalyptus forests, appear blue from a distance due to oil particles in the air refracting light—a phenomenon that gives the mountains their name and mystery. The range contains dramatic cliff formations, gorges, waterfalls, and landscapes that feel untouched. The mountains are traditionally home to Aboriginal peoples who have lived here for tens of thousands of years. Colonial contact devastated Aboriginal populations, but cultural practices and knowledge persist. The most famous landmark is the Three Sisters rock formation, visible from Echo Point. Visitors can hike into the valleys, explore scenic railways, and feel the vastness of Australia's inland wilderness. The Blue Mountains are where Sydney residents escape to reconnect with nature.",im:"Three towering rock formations rise from a valley, the Three Sisters catching morning light, the valley depths misty and purple, eucalyptus trees climbing the slopes.",t:"Located 90km west of Sydney (2 hours by train or car from CBD). Multiple towns in the Blue Mountains offer accommodation and dining. Numerous marked hiking trails range from easy walks to challenging multi-day hikes. Visit any season; autumn (March-May) has best colors. Bring good hiking shoes and plenty of water. The Echo Point Three Sisters viewpoint is iconic.",c:[],r:"g",nn:"Blue Mountains National Park",ns:"Cadena montañosa 90km oeste de Sydney con formaciones dramáticas",nst:"Bosques de eucalipto azul por distancia; montañas son tradicionalmente hogar de pueblos aborígenes durante decenas de miles de años.",nt:"90km oeste (2h tren/auto). Múltiples pueblos. Senderos marcados. Primavera/otoño ideales. Calzado bueno. Mucha agua. Echo Point es icónico."},
  {id:5,n:"Aboriginal Art Museum — Art Gallery of NSW",a:"The Domain",v:["art", "history", "culture"],d:45,s:"A major art museum with significant collections of Aboriginal art, colonial paintings, and contemporary Australian art in a grand neoclassical building.",st:"The Art Gallery of New South Wales houses one of the world's most important collections of Aboriginal art—works spanning thousands of years of continuous culture. Aboriginal artists created on rock, sand, bark, and bodies long before Western art traditions. Modern Aboriginal art movement, beginning in the 1970s, transformed Aboriginal visual culture into internationally recognized art form. The gallery's Aboriginal collection includes Dot paintings (abstract works with deep spiritual significance), bark paintings, textile works, and contemporary installations. The building itself is grand neoclassical architecture with contemporary additions. Walking through the Aboriginal galleries is an education in Australian culture that predates colonization by 65,000 years. The gallery also shows colonial landscape paintings that often erased Aboriginal presence, making comparative viewing meaningful.",im:"An Aboriginal dot painting glows on the gallery wall—thousands of tiny dots in concentric circles and patterns, the surface shimmering, the work representing songlines and stories.",t:"Located in The Domain near the CBD. Metro or bus access. Admission is modest or free (rotating exhibitions). Open daily except Mondays. Allow 2-3 hours. The Aboriginal collection is the highlight. Excellent café and shop. Guided tours available.",c:[],r:"g",nn:"Art Gallery of NSW",ns:"Museo de arte con colecciones importantes de arte aborigen",nst:"Alberga arte aborigen continuo durante miles de años, desde pintura rupestre a movimiento moderno de punto que transformó cultura visual.",nt:"The Domain cerca CBD. Metró u ónibus. Entrada modesta o gratuita. Abierto diariamente excepto lunes. Permita 2-3 horas. Colección aborigen es lo principal."},
  {id:6,n:"Bondi Beach",a:"Bondi",v:["beautiful", "local", "views"],d:25,s:"Australia's most famous beach with golden sand, powerful waves, and a vibrant beach culture of swimmers, surfers, and sunbathers.",st:"Bondi Beach is more than a beach; it's a symbol of the Australian beach lifestyle. The sweeping arc of golden sand, the powerful Atlantic waves, and the cosmopolitan crowd create an intoxicating atmosphere. Bondi attracts swimmers, surfers, sunbathers, and people who come simply to experience the cultural scene. The beach is patrolled by lifeguards in their distinctive red-and-yellow caps. The surrounding promenade has cafés, restaurants, and shops where you can watch the endless parade of humanity. The beach is undeniably touristy, but it's also where locals come—particularly on summer weekends when it fills with families and friends. The culture is relaxed, laid-back, quintessentially Australian.",im:"Lifeguards in red-and-yellow caps watch the beach from their tower as swimmers brave the blue-green waves, the sand packed with sunbathers and umbrellas.",t:"Easily accessed by train to Bondi Junction, then bus to beach. Or walk from nearby neighborhoods. Free access. Best during summer (December-February) for warmth; water temperature improves. Lifeguard-patrolled areas are safest for swimming. The Bondi to Coogee coastal walk (6km) is iconic. Bring sunscreen and reusable water bottle.",c:[],r:"g",nn:"Bondi Beach",ns:"Playa más famosa de Australia con cultura de surf y sol",nst:"Arco de arena dorada, olas poderosas, atmósfera cosmopolita crean símbolo de estilo de vida australiano de playa.",nt:"Tren a Bondi Junction, luego ónibus. Acceso gratuito. Mejor en verano. Áreas patrulladas son seguras. Paseo costero Bondi-Coogee es icónico. Protector solar."},
  {id:7,n:"Taronga Zoo — animals with Sydney Harbour as their backyard",a:"Mosman Bay",v:["nature", "views", "local"],d:45,s:"Australia's premier zoo with native wildlife, located on a harbor peninsula offering views of the Opera House and Harbour Bridge.",st:"Taronga Zoo hosts Australian wildlife in naturalistic habitats: koalas, kangaroos, wombats, Tasmanian devils, and countless bird species found nowhere else on Earth. The zoo's location on a harbor peninsula is extraordinary—many enclosures frame views of the Opera House and Harbour Bridge, creating juxtapositions of wildlife and urban architecture. The zoo operates with conservation as its primary mission: breeding programs for endangered species, education programs, and habitat restoration efforts. Walking through the zoo, you encounter the incredible diversity of Australian fauna, many of which exist nowhere else. The Sky Safari cable car offers aerial views over the zoo and harbor. The setting itself—a zoo with iconic architecture views—is uniquely Sydney.",im:"A koala sleeps in a eucalyptus tree while the Opera House glows white in the background, the harbor stretching beyond, visitors watching from the viewing platform.",t:"Located in Mosman Bay on the north shore. Ferry from Circular Quay directly to the zoo (10 minutes), or train + bus. Admission required. Open daily. Allow 3-4 hours. The setting is as much attraction as the animals. Bring water and sunscreen. The native Australian animals are the main draw.",c:[],r:"g",nn:"Taronga Zoo",ns:"Zoo principal con fauna nativa australiana en ubicación espectacular",nst:"Alberga vida silvestre australiana con vistas del Ópera House; ubicación en península del puerto crea yuxtaposición única de naturaleza y arquitectura urbana.",nt:"Mosman Bay en costa norte. Ferry desde Circular Quay (10 min) o tren+ónibus. Entrada requerida. Abierto diariamente. Permita 3-4 horas. Traiga agua y protector."},
  {id:8,n:"The Rocks Historic District — Aboriginal and Colonial Heart",a:"The Rocks",v:["history", "architecture", "local"],d:30,s:"Sydney's oldest neighborhood with preserved colonial buildings, sandstone heritage, Indigenous history, galleries, and restaurants in narrow historic streets.",st:"The Rocks is built on land that was home to Aboriginal Eora people for thousands of years before European colonization in 1788. The colonial settlement, established on this rocky peninsula, created a chaotic neighborhood of convicts, soldiers, and free settlers. The narrow streets follow the contours of the land rather than geometric planning. Colonial buildings of sandstone and brick, dating from the 1800s, line the streets. Galleries and museums document both Aboriginal and colonial history. Walking through The Rocks, you experience Sydney's founding moment—though with the caveat that colonial narratives often marginalize Aboriginal perspectives. Contemporary efforts seek to center Aboriginal voices and acknowledge the dispossession that colonization entailed. The Rocks represents a palimpsest: Aboriginal presence, colonialism, gentrification, and tourism layered atop each other.",im:"Narrow cobblestone streets lined with sandstone buildings, outdoor café tables filling the lane, a historic pub's door opening onto the street, tourists and locals mixing.",t:"Located adjacent to Circular Quay. Walk from the Opera House or take short train ride. Many streets are pedestrian-only. Safe during daylight and early evening. Crowded on weekends. The Saturday and Sunday markets are lively. Many restaurants, pubs, and galleries. Aboriginal cultural sites and museums should be visited respectfully.",c:[],r:"g",nn:"The Rocks",ns:"Barrio histórico más antiguo con arenisca colonial y corazón aborigen",nst:"Construido en tierra de pueblo Eora durante miles de años; colonialismo de 1788 creó narrativas que marginalizaron presencia aborigen.",nt:"Adyacente a Circular Quay. Caminata desde Ópera House. Calles peatonales. Seguro luz y tarde temprana. Mercados sábado-domingo. Museos aborígenes con respeto."},
  {id:9,n:"Royal Botanic Garden",a:"The Domain",v:["nature", "beautiful", "views"],d:45,s:"A 30-hectare garden established in 1816 with native and exotic plants, harbor views, walking paths, and a collection of thousands of species.",st:"The Royal Botanic Garden occupies a peninsula of The Domain with views back toward the Opera House and city. The garden was established in 1816 as a food source for the colonial settlement, but evolved into a grand botanical institution. Walking through the gardens reveals both native Australian plants and exotic species from around the world. The Palm Grove, the Tropical Centre, and the Native Vegetation collections each showcase distinct ecosystems. The garden's location offers some of Sydney's finest views—you can sit on the grass looking back at the city you just left, the perspective radically shifted. The garden also serves as a sanctuary for threatened plant species, particularly native orchids and rare Australian flora. It's a place for botanical learning and simple peaceful sitting.",im:"A visitor sits on grass overlooking the harbor, the Opera House to the left, Harbour Bridge to the right, palm trees providing shade, the water glinting below.",t:"Located in The Domain near the CBD. Walk from Circular Quay or take train. Admission is free. Open daily. Allow 1-2 hours minimum. The views are exceptional. Bring water and sunscreen. The Palm Grove is particularly beautiful. Photography is excellent throughout.",c:[],r:"g",nn:"Royal Botanic Garden",ns:"Jardín botánico de 30 hectáreas con vistas al puerto",nst:"Establecido en 1816 como fuente de alimentos colonial, evolucionó a institución botánica con miles de especies nativas y exóticas.",nt:"The Domain cerca CBD. Caminata desde Circular Quay. Entrada gratuita. Abierto diariamente. Permita 1-2 horas mínimo. Vistas excepcionales. Agua y protector."},
  {id:10,n:"Manly Beach — Northern Beaches Icon",a:"Manly",v:["beautiful", "local", "nature"],d:45,s:"A northern beaches destination with white sand, calm waters, promenade, and distinct local community culture distinct from touristy Bondi.",st:"Manly Beach, accessed by a scenic 30-minute ferry ride from Circular Quay, feels distinctly different from Bondi. The beach is wider, the waters calmer, the atmosphere more relaxed. The ferry journey itself is one of Sydney's great experiences—crossing the harbor with views of the city's landmarks receding. Manly has its own thriving local community: families, swimmers, surfers at the neighboring Shelly Beach, and a vibrant shopping and dining precinct. The Corso, a pedestrian mall connecting the ferry terminal to the beach, bustles with shops, cafés, and restaurants. Manly feels less touristy than Bondi while remaining a major destination. The northern beaches culture is distinct from the southern beaches—more laid-back, more local.",im:"The Manly ferry approaches the terminal, the beach curving away, white sand meeting calm water, palm trees lining the shore, locals and visitors mingling on the promenade.",t:"Ferry from Circular Quay (30 minutes scenic journey). The ferry is part of the experience. Beach is free. The Corso connects terminal to beach. Shelly Beach nearby offers snorkeling. Numerous restaurants and cafés throughout. Go on a weekday to avoid crowds. The ferry ride is beautiful regardless of beach visit.",c:[],r:"g",nn:"Manly Beach",ns:"Playa del norte con arena blanca y comunidad local distinta",nst:"Accesible por ferry de 30 minutos, Manly mantiene comunidad local distinta de Bondi; agua más calma, atmósfera más relajada.",nt:"Ferry desde Circular Quay (30 min viaje escénico). Ferry es parte experiencia. Playa gratuita. Shelly Beach para esnórquel. Restaurantes y cafés numerosos."},
  {id:11,n:"Australian Museum — Natural History and Culture",a:"College Street",v:["history", "art", "culture"],d:40,s:"Australia's first museum, established 1827, with natural history collections, Aboriginal artifacts, and cultural exhibits documenting Australian prehistory to present.",st:"The Australian Museum, founded in 1827, is one of the world's oldest institutions of its kind. The museum documents Australian natural history: fossils, minerals, skeletons of extinct megafauna that roamed Australia until about 50,000 years ago. The Aboriginal collection includes sacred objects and artworks—displayed with cultural sensitivity and with acknowledgment that many objects were removed through colonialism. The museum's Touring exhibitions and permanent collections address Australian identity: wildlife, geology, human culture. The building itself, on College Street, is architecturally significant. Walking through the museum is an education in Australian prehistory, Aboriginal culture, and natural history—particularly the megafauna galleries which reveal the incredible biodiversity that once thrived.",im:"A massive skeleton of an extinct marsupial towers in the gallery, articulated bones rising ten meters, surrounding exhibits showing the animals that once roamed the continent.",t:"Located on College Street in the CBD. Train or bus access. Admission required (modest cost). Open daily. Allow 2-3 hours. The Aboriginal collection requires respectful viewing. The fossil collections are exceptional. The building's architecture is also worth appreciating.",c:[],r:"g",nn:"Australian Museum",ns:"Primer museo de Australia con colecciones de historia natural",nst:"Fundado en 1827, documenta prehistoria australiana, cultura aborigen, megafauna extinta, y evolución de identidad australiana.",nt:"College Street en CBD. Tren u ónibus. Entrada requerida. Abierto diariamente. Permita 2-3 horas. Colección aborigen requiere respeto. Fósiles excepcionales."},
  {id:12,n:"Mrs Macquarie's Point — Historic Viewpoint",a:"The Domain",v:["views", "history", "beautiful"],d:20,s:"A small rocky peninsula offering the most photographed views of the Opera House and Harbour Bridge, with historic significance and walking paths.",st:"Named after Elizabeth Macquarie, wife of colonial governor Lachlan Macquarie, this small peninsula has become one of Sydney's most iconic viewpoints. The perspective from Mrs Macquarie's Point frames the Opera House and Harbour Bridge perfectly—this is the 'classic' Sydney photo location. Despite its touristy fame, the point retains genuine beauty and historical significance. The views change throughout the day and seasons, always commanding attention. Walking around the rocky peninsula offers intimate views of the harbor at different angles. The location connects to broader Australian history: colonial governance, women's roles in colonial society, and the transformation of landscape through colonization.",im:"The Opera House and Harbour Bridge frame the composition perfectly, the foreground rocky and weathered, the harbor glinting beyond, dozens of photographers setting up tripods.",t:"Located in The Domain, adjacent to Royal Botanic Garden. Walk from Circular Quay (10 minutes) or train. Free access. Best visited early morning or late afternoon for lighting and to avoid peak crowds. Afternoon light is warm and flattering. Bring a camera. The viewpoint is crowded during midday.",c:[],r:"g",nn:"Mrs Macquarie's Point",ns:"Punto de vista icónico con vistas del Ópera House y Puente",nst:"Ubicación nombrada por esposa de gobernador colonial; vista más fotografiada de Sydney enmarca icónicamente los monumentos.",nt:"The Domain adyacente a Jardín Botánico. Caminata desde Circular Quay (10 min). Acceso gratuito. Mañana temprana o tarde para luz. Tarde es cálida y favorecedora."},
  {id:13,n:"Darling Harbour — Entertainment District",a:"Darling Harbour",v:["architecture", "local", "food"],d:30,s:"A reclaimed harbor district with restaurants, museums, gardens, and entertainment venues in a waterfront pedestrian precinct.",st:"Darling Harbour was once a working industrial port; in the 1980s it was transformed into an entertainment district with restaurants, museums, and public spaces. The transformation represents both opportunity (revitalization of deteriorating area) and concern (gentrification and loss of working waterfront character). Today, Darling Harbour is a popular destination for tourists and locals: the Aquarium, museums, restaurants with harbor views, gardens, and open spaces. Walking around Darling Harbour, you encounter contemporary Sydney: modern architecture, diverse dining, cosmopolitan culture. The harbor's transformation reflects broader patterns of Australian urbanism: waterfront areas transitioning from industrial to recreational use.",im:"Restaurants line the harbor's edge, outdoor seating overlooking the water, the modern architecture of the district rising behind, ferries passing, the evening alive with people.",t:"Located west of CBD. Train, bus, or 10-minute walk from Central. Free access to public areas; individual venues require admission/payment. Open year-round. Allow 2-3 hours to explore. The seafood restaurants are excellent. The area is safe and very pedestrian-friendly. Weekends are very crowded.",c:[],r:"g",nn:"Darling Harbour",ns:"Distrito de entretenimiento en puerto reclamado con restaurants",nst:"Transformado de puerto industrial a distrito de entretenimiento en 1980s; representa revitalización urbana contemporánea y preocupaciones de gentrificación.",nt:"Oeste de CBD. Tren, ónibus, o caminata. Acceso gratuito a áreas públicas. Abierto todo año. Permita 2-3 horas. Restaurantes de mariscos excelentes. Muy concurrido fines de semana."},
  {id:14,n:"Coogee Beach — Coastal Walk Destination",a:"Coogee",v:["beautiful", "local", "nature"],d:30,s:"A southern beaches gem with rock pools, white sand, and the start/end point of the famous Bondi to Coogee coastal walk.",st:"Coogee Beach is a hidden gem compared to the famous Bondi. The beach itself is smaller, surrounded by dramatic rock formations and more sheltered than Bondi's exposed sweep. The rock pools around Coogee offer swimming in smaller, more intimate spaces. The real draw is the Bondi to Coogee coastal walk—a 6km path traversing the entire southern beaches coastline, passing through Tamarama, Bronte, and Clovelly. The walk offers constantly changing perspectives of the coast: high cliffs dropping to turquoise water, hidden beaches accessible only by trail, ocean pools, and local pubs overlooking the sea. Walking the coast, you experience the power and beauty of Australia's eastern shoreline.",im:"A coastal trail hugs the cliff edge as turquoise water crashes against rocks below, hikers navigating the path, the beach visible in the distance beyond the next headland.",t:"Located in the southern beaches. Train to Coogee station, then walk to beach. Free beach access. The Bondi to Coogee walk is typically walked south to north (Coogee to Bondi), ending at crowded Bondi. Allow 2-3 hours for the walk. Go early morning to avoid heat and crowds. Bring water, sunscreen, and good shoes. The walk is scenic but challenging in places.",c:[],r:"g",nn:"Coogee Beach",ns:"Playa de gema escondida con piscinas de roca y caminata costera",nst:"Más íntima que Bondi; punto de inicio/fin del paseo costero de 6km que atraviesa playas del sur con vistas espectaculares de acantilados.",nt:"Playas del sur. Tren a Coogee, luego caminata. Acceso playa gratuito. Paseo costero 6km. Permita 2-3 horas. Mañana temprana. Agua, protector, buen calzado."},
  {id:15,n:"Federation Square and Precinct",a:"Circular Quay",v:["history", "architecture", "local"],d:20,s:"A historic plaza housing the National Library, Parliament House, and cultural institutions in a precinct representing Australian civic identity.",st:"The Federation Square precinct, centered on Parliament House (opened 1901), represents Australian nationhood. The building's neoclassical architecture symbolizes democratic governance. Surrounding the parliament are civic institutions: the National Library, Art Museum, various galleries and museums. The precinct occupies a position of power and meaning in Australian culture: this is where national identity is debated, art is preserved, and collective memory is maintained. Walking through Federation Square, you encounter school groups, tourists, government workers, and citizens engaged with democratic institutions. The area is ceremonial, monumental, and genuinely significant to Australian self-understanding.",im:"Parliament House's grand neoclassical facade dominates the plaza, formal gardens in front, flags flying, visitors climbing the steps, the architecture announcing governmental authority.",t:"Located in the CBD near Circular Quay. Walk from most areas or take train. Most buildings offer free admission to public areas (Parliament tours require booking). Allow 2-3 hours to explore the precinct. The gardens are pleasant for sitting. The combination of institutions creates a destination unto itself.",c:[],r:"g",nn:"Precinto de Federation Square",ns:"Plaza histórica con Parlamento y biblioteca nacional",nst:"Edificios neoclásicos representan identidad nacional australiana; precinto de instituciones cívicas donde identidad nacional se debate y preserva.",nt:"CBD cerca Circular Quay. Caminata desde mayoría de áreas. Entrada gratuita a áreas públicas. Paseos de Parlamento requieren reserva. Permita 2-3 horas."},
  {id:16,n:"Paddington Markets — Weekend Artisan Culture",a:"Paddington",v:["local", "art", "food"],d:20,s:"A weekly Saturday street market in a historic bohemian neighborhood showcasing local artisans, designers, vintage goods, and street food.",st:"Paddington Markets, operating since 1974, are an institution of Sydney's bohemian and artistic culture. Every Saturday, the streets fill with stalls: local artisans sell clothing, jewelry, artwork, vintage goods, and handmade items. The market attracts both sellers and buyers who are deeply invested in creative culture. The surrounding neighborhood of Paddington has a distinct character: Victorian terraced houses, independent shops, galleries, and cafés populated by creative types and older residents. Walking through the market, you encounter the creative energy of Sydney's artistic community. Unlike tourist-oriented markets, Paddington Markets feel authentically connected to local creative practice.",im:"Stalls line a street as vendors display jewelry, artwork, and crafts, shoppers browsing slowly, the Victorian architecture of surrounding buildings framing the scene.",t:"Located in Paddington neighborhood. Train to Paddington station, then walk to the market area. Markets operate Saturdays 10am-4pm. Free admission. Allow 2-3 hours. Bring cash for vendors. The neighborhood shops and cafés are worth exploring beyond the market. Very crowded on Saturday mornings.",c:[],r:"g",nn:"Paddington Markets",ns:"Mercado sabatino con cultura artesanal de barrio bohemio",nst:"Desde 1974, mercado es institución de cultura bohemia y artística; artesanos locales venden arte, joyería, ropa en calles del barrio victoriano.",nt:"Paddington. Tren a Paddington, luego caminata. Sábados 10h-16h. Entrada gratuita. Permita 2-3 horas. Efectivo para vendedores. Muy concurrido sábados."},
  {id:17,n:"Newtown — Inner-City Bohemia",a:"Newtown",v:["local", "art", "food"],d:25,s:"A multicultural, bohemian neighborhood with street art, vintage shops, affordable restaurants, LGBTQ+ culture, and vibrant street life.",st:"Newtown is Sydney's most unapologetically bohemian neighborhood. The streets pulse with creative culture: street art murals, vintage shops, independent bookstores, vegan and international restaurants, record shops, and bars hosting live music. The neighborhood has a strong LGBTQ+ presence and history. Newtown attracts students, artists, musicians, and anyone seeking a lifestyle alternative to Sydney's more affluent areas. Walking down King Street (Newtown's main drag), you encounter genuine community rather than tourism infrastructure. The neighborhood is affordable compared to eastern suburbs, allowing creative types to afford rent. Newtown represents Sydney's counterculture and alternative culture.",im:"King Street buzzes with pedestrians walking between shops, street musicians playing, murals covering building walls, the street lined with independent business signs, cafés with outdoor seating.",t:"Located west of CBD. Train to Newtown station on the line directly from Central Station. The neighborhood is very pedestrian-friendly and safe. Allow 2-3 hours to walk King Street and explore. Go on a weekend when the street is most lively. Excellent and affordable restaurants throughout.",c:[],r:"g",nn:"Newtown",ns:"Barrio bohemio multicultural con arte callejero y vida vibrante",nst:"Barrio intencionadamente bohemio; artistas, estudiantes, músicos crean comunidad auténtica alternativa a zonas más afluentes de Sydney.",nt:"Oeste de CBD. Tren a Newtown directo desde Central. Muy peatonal y seguro. Permita 2-3 horas. Fin de semana más animado. Restaurantes excelentes y económicos."},
  {id:18,n:"Barangaroo Reserve — Reclaimed Waterfront Park",a:"Barangaroo",v:["nature", "views", "local"],d:30,s:"A 7-hectare park on a reclaimed waterfront headland with native plantings, walking trails, harbor views, and public art installations.",st:"Barangaroo Reserve represents the latest evolution of Sydney's waterfront transformation. The site was historically a whaling station, then a working port, then a derelict industrial area. Redevelopment created this public park with native plantings designed to recreate pre-colonial Eora nation vegetation. The park acknowledges Aboriginal history while functioning as a contemporary recreational space. Walking the headland path offers views across the harbor, access to hidden beach coves, and encounters with native flora returning to the landscape. The park's design is thoughtful: acknowledging both Aboriginal significance and contemporary public need. The walking trails offer escape from the city while remaining within the CBD.",im:"A walking path winds through native vegetation with harbor views beyond, native trees and shrubs surrounding the path, the water visible between plantings.",t:"Located at the waterfront north of CBD. Walk from Circular Quay (15 minutes) or take a short train ride. Free admission. Open daily. Allow 1-2 hours. The walking trails are easy to moderate. The views are excellent. A good escape from urban intensity.",c:[],r:"g",nn:"Barangaroo Reserve",ns:"Parque de 7 hectáreas con plantaciones nativas en tierra reclamada",nst:"Sitio histórico transformado; plantaciones nativas recrean vegetación pre-colonial de nación Eora, reconociendo significado aborigen.",nt:"Cais norte de CBD. Caminata desde Circular Quay (15 min). Entrada gratuita. Abierto diariamente. Permita 1-2 horas. Senderos fáciles a moderados. Vistas excelentes."},
  {id:19,n:"Art Gallery of New South Wales — Contemporary Wing",a:"The Domain",v:["art", "architecture", "culture"],d:35,s:"The museum's contemporary art wing with cutting-edge exhibitions and modern art collection showcasing current artistic trends and emerging artists.",st:"While the main AGNSW collection includes important historical works, the contemporary wing showcases current artistic practice and emerging artists. The gallery's contemporary exhibitions often challenge viewers, provoke thought, and explore contemporary social issues. The modern architecture of the contemporary wing contrasts with the grand neoclassical building housing classical collections. Walking through contemporary galleries, you encounter art grappling with climate change, identity, technology, and social justice. The exhibitions change regularly. The gallery's commitment to contemporary work reflects Sydney's role as a living artistic center, not merely a museum of past achievements.",im:"A contemporary art installation fills a gallery space—perhaps a video projection, sculptural work, or interactive piece that challenges conventional viewing and engages the viewer's participation.",t:"Part of the Art Gallery of NSW on The Domain. Same admission and access as main museum. The contemporary wing requires separate ticket sometimes. Open daily except Mondays. Allow 1-2 hours. The exhibitions are the main draw. Excellent bookshop and café.",c:[],r:"g",nn:"AGNSW Ala Contemporánea",ns:"Ala contemporánea con arte actual y artistas emergentes",nst:"Exhibiciones desafían convenciones y exploran temas contemporáneos; galería refleja Sydney como centro artístico vivo.",nt:"The Domain. Misma entrada como museo principal. Abierto diariamente excepto lunes. Permita 1-2 horas. Exposiciones son lo principal. Librería y café excelentes."},
  {id:20,n:"Watsons Bay — Cliffs and Fish Shops",a:"Watsons Bay",v:["nature", "views", "food"],d:40,s:"A coastal suburb with dramatic cliff formations, hidden beaches, seafood restaurants, and the iconic fish and chip shops at the pier.",st:"Watsons Bay, accessible by ferry from Circular Quay, is a working fishing village with a gourmet overlay. The main draw is eating fresh fish and chips at one of the iconic fish shops at the pier while looking out at the harbor. The cliffs surrounding the bay are dramatic—the North Head and South Head headlands frame the water. The Hornby Lighthouse sits on the clifftop offering 360-degree views. Hidden beaches, accessible by walking paths, provide swimming in protected coves. The combination of natural beauty, fishing heritage, and excellent food makes Watsons Bay a quintessential Sydney experience. The ferry journey there is itself worth the visit.",im:"A diner sits at a picnic table eating fish and chips from paper, the harbor sparkling beyond, other tourists and locals eating nearby, the pier bustling with activity.",t:"Watsons Bay accessible by ferry from Circular Quay (12 minutes, scenic). Alternatively, taxi/Uber from CBD (20-30 minutes). Ferry return journey is essential—highly scenic. Fish shops at the pier are famous and crowded (go early or off-peak). Cliffside walking paths offer dramatic views. The area is very safe and very touristy.",c:[],r:"g",nn:"Watsons Bay",ns:"Pueblo de pesca con acantilados dramáticos y tiendas de pescado",nst:"Pueblo de pesca tradicional; comer fish and chips en el pier mirando puerto es experiencia quintesencialmente Sídney.",nt:"Ferry desde Circular Quay (12 min, escénico). Alternativamente taxi/Uber (20-30 min). Retorno en ferry esencial. Tiendas pescado famosas, concurridas. Senderos acantilado dramáticos."},
  {id:21,n:"Aboriginal Cultural Centre Experience",a:"Multiple Locations",v:["history", "culture", "local"],d:30,s:"Interactive cultural centers where Aboriginal guides share stories, art, music, and traditions—respectful engagement with living Aboriginal culture.",st:"Rather than encountering Aboriginal culture only through museum display, cultural centers offer interactive experiences with Aboriginal guides sharing stories, art-making, music, and lived culture. These centers are operated by Aboriginal communities and offer income and control to Indigenous practitioners. Visitors learn about Aboriginal connection to land, spiritual beliefs, artistic traditions, and contemporary Aboriginal life. Experiences range from brief cultural talks to multi-hour workshops. The important distinction is respecting Aboriginal agency and learning from Aboriginal people directly rather than through colonial institutions. Many of these centers exist across Sydney; quality and authenticity vary.",im:"An Aboriginal guide demonstrates boomerang throwing to a group of visitors, explaining the technique's cultural significance, the boomerang spinning through the air in a perfect arc.",t:"Multiple locations throughout Sydney. Book in advance through tourism centers or hotels. Experiences range 1-4 hours. Costs vary. Go with respectful intention—this is not entertainment but cultural education. The guides' knowledge and stories are invaluable. Support Aboriginal enterprises directly.",c:[],r:"g",nn:"Centros Culturales Aborígenes",ns:"Centros donde guías aborígenes comparten historias y tradiciones vivas",nst:"Operados por comunidades aborígenes; visitantes aprenden directamente de practicantes indígenas sobre conexión a tierra y tradiciones.",nt:"Múltiples ubicaciones. Reserve con anticipación. Respeto intencional. No entretenimiento sino educación cultural. Guías ofrecen conocimiento invaluable."},
  {id:22,n:"Kuringai Chase National Park",a:"Kuringai Chase (Day Trip)",v:["nature", "history", "hiking"],d:360,s:"A national park north of Sydney with Aboriginal rock art sites, bushland trails, and significant cultural heritage of the Guringai people.",st:"Kuringai Chase National Park preserves 45 square kilometers of bushland and coastal terrain north of Sydney. The park is named for the Guringai Aboriginal nation whose people inhabited the area for thousands of years. Rock art galleries within the park contain Aboriginal stone carvings and engravings dating back centuries. Walking the park's trails, you encounter not just natural beauty but also the cultural landscape of the Guringai people. Visitor centers explain both natural ecology and Aboriginal history. The park offers hiking trails of varying difficulty, beach access, and picnic areas. Visiting requires respectful engagement: the park is Aboriginal land, protected now but historically violated through colonization.",im:"A rock face displays Aboriginal engravings—kangaroos, fish, human figures carved into the stone, centuries old, the surrounding bushland dense and green.",t:"Located north of Sydney (45 minutes by car). Parking at various trailheads. Admission modest or free. Open daily. Marked trails of varying difficulty. Allow 2-4 hours minimum. Bring water, sunscreen, insect repellent. Go early in day to avoid heat. Respect Aboriginal cultural sites by not touching art or defacing rocks.",c:[],r:"g",nn:"Kuringai Chase National Park",ns:"Parque nacional con arte rupestre aborigen de gente Guringai",nst:"45km² preservan historia de pueblo Guringai; grabados rupestres datan siglos atrás; paisaje cultural requiere respeto en exploración.",nt:"Norte de Sydney (45 min auto). Estacionamientos en senderos. Entrada modesta o gratuita. Abierto diariamente. Senderos marcados. Permita 2-4 horas. Agua, protector solar."},
  {id:23,n:"Darling Harbour Aquarium — Marine Life Immersion",a:"Darling Harbour",v:["nature", "local", "hidden"],d:35,s:"A major aquarium with large tanks showcasing Australian and international marine species, interactive displays, and educational programming about ocean ecosystems.",st:"The Darling Harbour Aquarium houses an extraordinary collection of marine species: from tiny seahorses to massive groper fish, dangerous sharks to gentle stingrays. The aquarium is designed around educational programming: understanding marine ecosystems, conservation challenges, and the incredible diversity of ocean life. Large tanks create immersive experiences: viewing sharks circling overhead, watching a kelp forest exhibit, encountering tropical coral reef species. The aquarium serves an important function educating visitors about threats to marine ecosystems from climate change, pollution, and overfishing. Many Australian species are endemic—found nowhere else—making the aquarium an essential window into marine biodiversity.",im:"A massive tank displays a great white shark circling overhead, the audience standing in an underwater tunnel, the shark's power and alien intelligence evident.",t:"Located at Darling Harbour. Train or bus access. Admission required (substantial cost). Open daily. Allow 2-3 hours. The shark tank and large tanks are highlights. Can be crowded on weekends. Children find the interactive exhibits engaging. The aquarium shop is well-stocked.",c:[],r:"g",nn:"Acuario de Darling Harbour",ns:"Acuario mayor con especies marinas australianas e internacionales",nst:"Tanques inmersivos educan sobre ecosistemas marinos, amenazas de cambio climático; muchas especies son endémicas de Australia.",nt:"Darling Harbour. Tren u ónibus. Entrada requerida (substancial). Abierto diariamente. Permita 2-3 horas. Tanque tiburón es lo principal. Puede estar concurrido."},
  {id:24,n:"Circular Quay — The Hub",a:"Circular Quay",v:["architecture", "views", "local"],d:30,s:"The symbolic heart of Sydney where ferries dock, the Opera House and Harbour Bridge frame the view, and public life centers around water and transit.",st:"Circular Quay is more than a transit hub; it's the symbolic center of Sydney's relationship with water and movement. Ferries arrive and depart constantly, heading to destinations across the harbor and beyond. The quay is ringed by cultural institutions (museums, galleries, theaters) and restaurants. The setting offers some of Sydney's finest views: looking out from the quay, the Opera House and Harbour Bridge frame the harbor perfectly. Walking around Circular Quay at different times reveals constantly changing light and atmosphere. The quay bustles with locals catching ferries to work, tourists arriving for first glimpses, street musicians, vendors, and people simply sitting watching the harbor. It's where Sydney's citizens encounter each other and water transport remains a daily reality rather than novelty.",im:"A ferry loads passengers at the quay as the Opera House glows white and the Harbour Bridge arches overhead, the harbor busy with smaller vessels, the evening light golden.",t:"Central location in CBD. Walk from most areas or take train. Free to explore the quay. The surrounding institutions offer paid entry. Ferries offer affordable transport with scenic views. Go throughout the day to experience different atmospheres. Early morning is quieter; evening is golden light.",c:[],r:"g",nn:"Circular Quay",ns:"Centro simbólico donde muelles de ferri enmarcan Ópera House",nst:"Centro simbólico de relación de Sydney con agua; ferris parten continuamente; instituciones culturales y restaurantes rodean el quay.",nt:"Centro CBD. Caminata desde mayoría áreas. Exploración gratuita del quay. Entradas pagadas instituciones rodean. Ferris ofrecen transporte económico escénico."},
  {id:25,n:"Cacatoo Island — Convict History in Harbor",a:"Circular Quay (Ferry)",v:["history", "hidden", "nature"],d:45,s:"A UNESCO World Heritage site in the harbor, former convict and political prison, now a heritage site with ruins, gardens, and Aboriginal rock art.",st:"Cockatoo Island, a small island in Sydney Harbour, served as a convict prison and later a political prison, reflecting darker chapters of Australian history. The island preserves convict-era buildings, ruins of structures built by prisoners, and gardens that have grown over decades. Aboriginal rock art on the island predates European colonization. Today the island is a heritage site accessible by ferry, preserving history while offering a green space with views back toward Sydney. Walking the island, you encounter the material remains of punishment and imprisonment—the thick stone walls, the isolation of island geography, the evidence of labor imposed on prisoners. The island's transformation from prison to heritage site represents reclamation of historical space.",im:"Ruins of stone buildings stand amid overgrown gardens on the island, the harbor visible beyond, native birds calling in the vegetation, history and nature intertwined.",t:"Accessible by ferry from Circular Quay (15 minutes). Admission required. Ferries run daily. Allow 2-3 hours on the island. Guided tours available with deeper historical context. Bring water and sunscreen. The ruins are atmospheric and historically important.",c:[],r:"g",nn:"Cockatoo Island",ns:"Isla con historia de prisión de convictos y sitio patrimonio",nst:"Prisión de convictos transformada a sitio patrimonio; ruinas de estructuras construidas por prisioneros preservan historia oscura de Australia.",nt:"Acceso por ferry desde Circular Quay (15 min). Entrada requerida. Paseos guiados disponibles. Permita 2-3 horas. Traiga agua y protector solar. Ruinas históricamente importantes."},
  {id:26,n:"Hermitage Foreshore Walk — Hidden Beach and Ruins",a:"Vaucluse",v:["nature", "hidden", "views"],d:30,s:"A scenic clifftop walk between Watsons Bay and Nielsen Park, passing hidden beaches, rock pools, and the ruins of the Hermitage estate.",st:"The Hermitage Foreshore Walk offers one of Sydney's finest coastal experiences without requiring major hiking. The walking track traverses clifftops from Watsons Bay toward Nielsen Park, passing dramatic clifftop vistas, hidden beaches accessible via short descents, and rock pools. The Hermitage estate's ruins—a grand house built in the 1800s now partially in ruins—sit overlooking the cliffs. The walk is moderately challenging but highly rewarding. Going early morning means fewer crowds and the possibility of encountering local wildlife. The walk connects to broader Sydney geography: the Eastern Suburbs extending northward, the harbor narrowing toward the Heads.",im:"A walking path hugs a clifftop as waves crash against rocks far below, a hidden beach visible in a cove, the path winding toward the horizon where more cliffs rise.",t:"Start at Watsons Bay, end at Nielsen Park (or vice versa). 10km walk takes 3-4 hours. Can be done with public transport connections. Wear good hiking shoes. Bring water and sunscreen. The path can be slippery in wet conditions. Go early to avoid heat and crowds. Stunning views throughout.",c:[],r:"g",nn:"Hermitage Foreshore Walk",ns:"Paseo costero con playas ocultas y ruinas de mansión",nst:"Sendero de 10km por acantilados; ruinas de mansión 1800s; playas ocultas accesibles; vistas espectaculares sin senderismo importante.",nt:"Inicio Watsons Bay, fin Nielsen Park (10km, 3-4h). Calzado bueno. Mucha agua y protector. Camino puede ser resbaladizo mojado. Temprano para calor/multitud."},
  {id:27,n:"The Strand Arcade — Vintage Shopping",a:"CBD",v:["architecture", "local", "hidden"],d:20,s:"An ornate Victorian-era shopping arcade built in 1891 with original architecture, independent boutiques, and a collection of vintage shops.",st:"The Strand Arcade, completed in 1891, represents Victorian-era shopping architecture: ornate ceilings, skylit corridors, independent shops occupying small stalls. Unlike modern shopping malls, the Strand preserves the scale and character of 19th-century commerce. Independent boutiques, jewelers, vintage shops, and clothing stores occupy the arcade. The building's architecture is the real attraction: the ornate ironwork, the skylights flooding the corridor with natural light, the decorative tilework. Walking through the Strand feels like stepping into the late 1800s while shopping for contemporary goods. The arcade is cherished by Sydneysiders who value its independent character against the homogenization of modern retail.",im:"A corridor stretches into the distance, ornate ceiling decorative, skylights above creating patterns of light, independent shop fronts lining both sides, a few shoppers browsing.",t:"Located in CBD on Pitt Street. Walk from most areas or train. Free to walk through. Individual shops have varying hours and prices. Allow 30 minutes to 1 hour to explore. The architecture is worth lingering in. No food or major commercial chains maintain the independent character. Photography is usually permitted.",c:[],r:"g",nn:"The Strand Arcade",ns:"Galería comercial victoriana de 1891 con tiendas independientes",nst:"Arquitectura ornamental preserva comercio del siglo XIX; tiendas independientes rechazan homogenización retail moderna.",nt:"CBD, Pitt Street. Caminata desde mayoría áreas. Acceso gratuito. Tiendas tienen horarios variados. Permita 30-60 minutos. Arquitectura vales lingering. Fotografía permitida."},
  {id:28,n:"Nielsen Park — Harbor Swim and Scenic Picnic",a:"Vaucluse",v:["nature", "beautiful", "local"],d:30,s:"A protected harbor beach with golden sand, calm water perfect for swimming, and grassy areas ideal for picnicking with harbor views.",st:"Nielsen Park offers a different beach experience than exposed ocean beaches like Bondi: protected harbor water remains calm even when ocean swells are powerful. The small beach has golden sand, the grass above ideal for picnicking or sitting. The views across the harbor take in the city skyline and distant Heads. The beach is popular with families and swimmers preferring calm water. The walk from Watsons Bay (Hermitage Foreshore Walk) ends here, making it a natural destination. The park surrounds the beach with trees, picnic tables, and toilets. Swimming is safe and the water warmer than ocean beaches.",im:"Families spread picnic blankets on grass overlooking the protected beach where swimmers enjoy calm water, the city skyline visible across the harbor.",t:"Located in Vaucluse. Bus or drive to Nielsen Park. Parking available (modest fee). Free beach access. Ideal for picnicking—bring food and drinks. Swimming is safe and pleasant. The Hermitage Foreshore Walk terminates here. Good for families. Quieter than major beaches.",c:[],r:"g",nn:"Nielsen Park",ns:"Playa protegida de puerto con agua calma y vistas de puerto",nst:"Agua tranquila de puerto protegida; popular con familias; final natural del Hermitage Foreshore Walk.",nt:"Vaucluse. Ónibus o auto. Estacionamiento disponible (modesto). Acceso playa gratuito. Ideal para picnic. Nado seguro y agradable. Más tranquilo que playas principales."},
  {id:29,n:"Bronte Beach — Rockpool Destination",a:"Bronte",v:["beautiful", "local", "nature"],d:25,s:"A small harbor beach surrounded by dramatic rock formations, ocean pools, and part of the popular Bondi to Coogee coastal walk.",st:"Bronte Beach is a small crescent of sand nestled between rocky headlands. The beach is less crowded than Bondi but still offers excellent swimming. The rock formations surrounding the beach are dramatic—dark sandstone sculpted by waves. Ocean pools—naturally formed swimming pools created by rock formations—dot the surrounding area, offering protected swimming. The beach is part of the Bondi to Coogee walk, making it a waypoint on a larger journey. The surrounding area is less developed than Bondi, retaining a neighborhood feel.",im:"A small sandy crescent sits surrounded by dark rock formations, swimmers in the water, an ocean pool visible on one side with bathers, the beach peaceful despite being on famous coastal walk.",t:"Located between Bondi and Coogee on the southern beaches. Train to Bronte station, then walk to beach. Free access. Part of the Bondi to Coogee walk. Ocean pools are excellent for protected swimming. Less crowded than Bondi. Cafés and shops nearby for refreshment.",c:[],r:"g",nn:"Bronte Beach",ns:"Playa pequeña rodeada de formaciones rocosas dramáticas",nst:"Luna creciente de arena entre formaciones rocosas; piscinas oceánicas naturales; punto de parada en paseo costero famoso.",nt:"Entre Bondi y Coogee. Tren a Bronte, luego caminata. Acceso gratuito. Parte paseo Bondi-Coogee. Piscinas oceánicas excelentes. Menos concurrido que Bondi."},
  {id:30,n:"Sydney Tower Eye — City Observation Deck",a:"CBD",v:["views", "architecture"],d:20,s:"An observation tower offering 360-degree views of Sydney and beyond, with the city spread 360 degrees below and an educational experience.",st:"Sydney Tower, completed in 1981, rises 309 meters above the CBD, offering unobstructed 360-degree views. From the observation deck, you see the entire city: beaches stretching north and south, the Blue Mountains on the horizon, the harbor spread below, the outer suburbs extending in every direction. The perspective from above fundamentally changes how you understand Sydney's geography and scale. The tower contains restaurants, bars, and the observation deck. While not as architecturally significant as the Opera House or Harbour Bridge, the view from the tower is undeniably spectacular. Visiting on a clear day offers views extending 80km in all directions.",im:"From the observation deck, Sydney spreads 360 degrees: beaches, harbor, city towers, distant mountains, the scale of the city revealed from above.",t:"Located in CBD near Central Station. Metro/train access. Admission required (expensive). Open daily. Allow 1-2 hours. Go on a clear day for best views. The 360-degree view shows city geography comprehensively. High-speed elevators ascend in seconds.",c:[],r:"g",nn:"Sydney Tower Eye",ns:"Torre de observación a 309m con vistas 360 grados",nst:"Desde cubierta de observación, Sydney se extiende 360 grados; perspectiva desde arriba revela geografía y escala ciudad.",nt:"CBD cerca Central Station. Metró/tren. Entrada requerida (cara). Abierto diariamente. Día claro para mejores vistas. Vistas 360 grados muestran geografía."}
,
  {id:41,n:"Bondi to Coogee Coastal Walk — Cliffs and Beaches",a:"East Beach",v:["beautiful","swimming","hiking"],d:30,s:"The coastal walk from Bondi to Coogee Beach is 6 kilometres of cliffs, rock pools, and small beaches—the light, the water, and the scale are extraordinary.",st:"The Bondi to Coogee walk is one of Australia's best walks. You follow the cliff edge for 6km, passing multiple beaches and rock platforms. The water is turquoise.",im:"Walking the cliff path. Water far below. A cove with swimmers. The coast turning. The light gold. Other walkers but not crowded.",t:"Start at Bondi Beach early morning (7am). Follow signage. Allow 2 hours. Bring water. Swim at any beach along the way. Exit at Coogee Beach. Take a bus back to Bondi.",c:["beautiful","swimming","hiking"],r:"g",nn:"Bondi to Coogee Walk",ns:"Coastal walk from Bondi to Coogee Beach - 6km of cliffs and beaches.",nst:"The Bondi to Coogee walk follows the cliff edge with multiple beaches and rock platforms.",nt:"Start at Bondi Beach early morning. Allow 2 hours. Bring water. Swim at any beach."},
  {id:42,n:"Taronga Zoo — Animals and Harbour Views",a:"North Sydney",v:["beautiful","animals","greatest_hits"],d:20,s:"Taronga Zoo sits directly across the harbour from Sydney CBD with the Opera House and Harbour Bridge as a backdrop—the animals are secondary to the views.",st:"Taronga Zoo is one of the world's best-positioned zoos. The views of Sydney Harbour are as good as the animals. The zoo is well-maintained and ethical.",im:"An enclosure overlooking the harbour. The Opera House visible. The Harbour Bridge. The water. Animals in foreground. The city backdrop.",t:"Ferry from circular Quay (most fun arrival). Entry 50 AUD. Open 9am–5pm daily. Go morning for cooler weather and active animals. Allow 3–4 hours.",c:["beautiful","greatest_hits"],r:"g",nn:"Taronga Zoo",ns:"Zoo overlooking Sydney Harbour with Opera House and Bridge visible.",nst:"Taronga Zoo is perfectly positioned with views of Sydney Harbour.",nt:"Ferry from Circular Quay. Entry 50 AUD. Open 9am–5pm."},
  {id:43,n:"Blue Mountains Day Trip — Mountain Escape",a:"Blue Mountains",v:["day_trips","beautiful","hiking"],d:120,s:"An hour west of Sydney, the Blue Mountains offer valley walks, eucalyptus forests, and dramatic cliff views—a complete escape from the city.",st:"The Blue Mountains are accessible by train (2 hours) from Sydney. Trails wind through eucalyptus forests. The Grose Valley views are spectacular.",im:"Walking a trail. Eucalyptus trees. A valley dropping below. Cliff edge. The haze that gives mountains their blue color. Few other walkers.",t:"Take a train from Central Station to Katoomba (2 hours, about 15 AUD). Walk Echo Point Trail or Prince Henry Cliff Walk. Allow 4–5 hours total.",c:["day_trips","beautiful"],r:"y",nn:"Blue Mountains",ns:"Mountain escape west of Sydney with valley walks and cliff views.",nst:"The Blue Mountains are accessible by train from Sydney.",nt:"Take train from Central Station to Katoomba."},
  {id:44,n:"Manly Beach — Beach Culture at Its Best",a:"North Beach",v:["swimming","beautiful","greatest_hits"],d:40,s:"Manly Beach is Sydney's most accessible great beach—the sand is wide, the water is clean, the promenade has character, and locals have been coming for 100 years.",st:"Manly Beach is one of Sydney's most famous beaches. The sand is wide. The water is clean and warm (November–April). The promenade has bars and cafes.",im:"The beach at afternoon. Swimmers in water. Sand pale. The promenade active with people. The light hitting water and skin. The scale accessible.",t:"Ferry from Circular Quay (30 minutes, most fun way). Or Uber 30 minutes. Entry free. Lifeguards always present. Swim anytime. Cafes and shops throughout.",c:["swimming","beautiful","greatest_hits"],r:"g",nn:"Manly Beach",ns:"Beach culture at its best—wide sand and clean water.",nst:"Manly Beach is one of Sydney's most famous beaches.",nt:"Ferry from Circular Quay (30 minutes)."},
  {id:45,n:"The Rocks Weekend Market — Historic Laneways & Stalls",a:"The Rocks",v:["markets","history"],d:60,s:"Weekend marketplace in a colonial neighborhood with 200+ vendors selling art, crafts, and food in medieval-feeling laneways",st:"The Rocks is Sydney\'s oldest neighborhood. The laneways are narrow stone passages from the 1800s. Weekend markets fill every alley.",im:"A narrow cobblestone lane with market stalls on both sides, artwork hanging, people walking slowly, colonial buildings towering, Australian flag draped",t:"Circular Quay or Wynyard Station. Walk to George St. Markets: Saturday-Sunday 10am-5pm. Bring cash.",c:["markets","history_big"],r:"g",nn:"The Rocks",ns:"历史小巷和市场摊位",nst:"殖民地社区的周末市场，200多个摊位",nt:"Circular Quay或Wynyard。Saturday-Sunday 10am-5pm"},
  {id:46,n:"Taronga Zoo Ferry Arrival — Best Zoo Entrance",a:"North Sydney",v:["beautiful","high_spots"],d:120,s:"The ferry ride to Taronga Zoo is the entrance experience: the Opera House grows as you approach by water",st:"You board a ferry at Circular Quay. As the ferry crosses the harbor, the Opera House and Harbour Bridge frame the zoo entrance.",im:"On a ferry approaching the zoo, the Sydney Opera House visible on left, Harbour Bridge on right, the zoo entrance growing closer, water bright",t:"Ferry from Circular Quay to Taronga Zoo Wharf (12 minutes). Entry 50 AUD. Ferry is 9 AUD but worth it for the experience alone.",c:["beautiful","greatest_hits"],r:"g",nn:"Taronga Zoo",ns:"最好的动物园入口",nst:"渡轮是入口体验，歌剧院从水中生长",nt:"从Circular Quay的渡轮（12分钟）。入场50澳元"},
  {id:47,n:"Paddington Markets — Saturday Vintage & Designers",a:"Paddington",v:["markets","neighbourhoods"],d:90,s:"Saturday-only market in a Victorian neighborhood with local designers, vintage clothes, and young creative people",st:"Paddington Markets is a Saturday institution. 200+ stalls. Designers sell from their own collections. The village is young and artistic.",im:"Rows of market stalls, people browsing vintage clothing racks, colorful artwork displayed, Victorian buildings as backdrop, Saturday afternoon crowds",t:"Subway/Light Rail to Paddington Station. Markets Saturday 10am-5pm only. Walk the neighborhood first (Oxford St). Bring cash.",c:["markets"],r:"g",nn:"Paddington Markets",ns:"周六二手和设计师市场",nst:"维多利亚时代社区的周六市场，本地设计师",nt:"地铁到Paddington Station。周六10am-5pm。现金"},
  {id:48,n:"Surry Hills — Crown Street Food & Galleries",a:"Surry Hills",v:["food","neighbourhoods"],d:120,s:"Crown Street is Sydney\'s cool street: restaurants compete intensely, galleries and wine bars fill every corner",st:"Crown Street changes constantly. New restaurants open. Galleries rotate. Locals gather at favorite spots. It\'s where Sydney\'s creative people live.",im:"A busy street with restaurant fronts, people eating at outdoor tables, gallery windows showing art, morning light on Victorian buildings",t:"Subway/Light Rail to Museum or Kings Cross. Walk Crown St north-south. Lunch or dinner. Galleries open afternoon.",c:["food","neighbourhoods"],r:"g",nn:"Surry Hills",ns:"皇冠街美食和画廊",nst:"悉尼最酷的街道，餐厅竞争激烈，画廊填满每个角落",nt:"地铁到Museum。沿Crown St行走。午餐或晚餐"},
  {id:49,n:"Barangaroo Reserve — Waterfront Park & Sculpture",a:"Barangaroo",v:["parks","beautiful"],d:60,s:"A new 7-hectare headland park with walking trails, views of the harbor, and public sculpture installations",st:"Barangaroo Reserve is a reclaimed waterfront space. Walking paths wind through native plants. Views of the harbor from multiple points.",im:"A walking path along water, native plants on both sides, the harbor visible, modern public sculptures scattered, few crowds",t:"Circular Quay walk north (10 minutes) or Uber to Barangaroo Ave. Free. Open dawn-dusk. Walk the full perimeter (30 minutes).",c:["parks","beautiful"],r:"g",nn:"Barangaroo Reserve",ns:"滨水公园和雕塑",nst:"7公顷的新海滨公园，步行道，港口景观",nt:"Circular Quay步行（10分钟）。免费。日出日落"},
  {id:50,n:"Royal Botanic Garden — Mrs Macquarie\'s Chair Sunset",a:"The Domain",v:["beautiful","parks","greatest_hits"],d:45,s:"Inside the garden is Mrs Macquarie\'s Chair, a carved stone bench with the perfect view of the Opera House and Harbour Bridge",st:"The chair was carved in 1816 for a governor\'s wife. The view from the chair is the most framed shot of the Opera House in Sydney.",im:"A stone chair overlooking water, the Opera House on the far side, the Harbour Bridge visible, sunset light golden, tourists posing by the chair",t:"Botanic Gardens Station or Circular Quay. Enter gardens. Walk to Mrs Macquarie\'s Chair (15 minutes). Sunset is 6-7pm depending on season.",c:["beautiful","parks","greatest_hits"],r:"g",nn:"皇家植物园",ns:"日落时的麦克夸里太太的椅子",nst:"园内有1816年雕刻的石凳，可俯瞰歌剧院",nt:"Botanic Gardens Station。进入花园。走向Mrs Macquarie\'s Chair"},
  {id:51,n:"Newtown King Street — Bohemian Neighborhood Walk",a:"Newtown",v:["weird","neighbourhoods"],d:120,s:"King Street is Sydney\'s bohemian main street: vintage shops, record stores, bookshops, and street art on every wall",st:"Newtown is young, artistic, poor in good ways. King Street has 200+ businesses. Murals cover walls. No chain stores allowed.",im:"A street lined with graffiti murals, vintage shop fronts, bookstores and record shops, young people sitting at cafes, colorful signage",t:"Subway to Newtown Station. Walk entire length of King St (south end to north end is 1 hour). Eat at small restaurants.",c:["weird","neighbourhoods"],r:"g",nn:"Newtown King Street",ns:"波希米亚社区步行",nst:"悉尼的波希米亚主街，二手店，唱片店",nt:"地铁到Newtown Station。沿King St行走"},
  {id:52,n:"North Head Lookout — Elevated Harbor Views",a:"North Head",v:["beautiful","high_spots"],d:30,s:"A clifftop viewpoint 100m above the ocean with views of the harbor entrance, Manly Beach, and the open Pacific",st:"North Head is the edge of Sydney. The cliffs are dramatic. The view stretches to the horizon. Ships enter and exit the harbor below.",im:"Standing on a cliff edge, the ocean far below, multiple beaches visible, ships passing through the harbor mouth, the horizon extending to open Pacific",t:"Ferry to Manly. Walk from Manly Wharf (15 minutes north) to North Head. Or drive to parking area. Free. Best late afternoon.",c:["beautiful","high_spots"],r:"g",nn:"North Head",ns:"俯瞰港口的高架视图",nst:"悬崖顶部视点，俯瞰港口入口",nt:"渡轮到Manly。步行15分钟。免费"},
  {id:53,n:"Bronte Beach Rock Pool — Seasonal Swimming",a:"Bronte",v:["swimming","beautiful"],d:20,s:"A natural rock pool carved from the ocean at Bronte Beach, refilled daily by ocean waves, safe and dramatic",st:"The rock pool is a 50m natural pool. Waves crash outside. Inside, the water is calm. You float protected by the rocks.",im:"A rocky ocean pool, people swimming in still water surrounded by rocks, ocean waves crashing against the outside rocks, Sydney coastline beyond",t:"Subway to Bronte Station (from Coogee). Walk to beach (5 minutes). Pool free, always open. Summer is warm water. Bring togs.",c:["swimming","beautiful"],r:"g",nn:"Bronte Rock Pool",ns:"季节性游泳的岩石池",nst:"在Bronte Beach由海浪填充的天然岩石池",nt:"地铁到Bronte Station。步行到海滩（5分钟）。免费"},
  {id:54,n:"Watsons Bay — Fish & Chips at The Doyle",a:"Watsons Bay",v:["food","swimming"],d:60,s:"A beachside suburb at the harbor mouth. Fish and chips from the legendary Doyle\'s, eaten facing the water.",st:"Watsons Bay is a fishing village that never really developed. The fish comes off boats nearby. Doyle\'s has been there 100 years.",im:"Sitting at a waterfront restaurant, a plate of fish and chips before you, the harbor visible beyond, the Harbour Bridge in distance, locals eating nearby",t:"Ferry from Circular Quay to Watsons Bay (7 minutes, most fun arrival). Doyle\'s is on the waterfront. Bring cash. Queue on weekends.",c:["food","swimming"],r:"g",nn:"Watsons Bay",ns:"鱼和薯条在Doyle\'s",nst:"港口入口的海边郊区，传奇的Doyle\'s鱼薯条",nt:"从Circular Quay的渡轮（7分钟）。现金。周末排队"},
  {id:55,n:"Circular Quay at Sunset — Performance & Light",a:"Circular Quay",v:["beautiful","greatest_hits"],d:30,s:"The center of Sydney\'s visual identity: Opera House, Harbour Bridge, water, and street performers all converge at sunset",st:"Circular Quay is Sydney\'s stage. Street musicians perform. Dancers work. Street artists display. The Opera House glows. The light is gold.",im:"The Opera House lit by sunset, the Harbour Bridge visible, water reflecting orange light, street performers in foreground, crowds watching",t:"Subway to Circular Quay. Arrive 5pm. Stay for sunset (6-7pm depending on season). Stand and watch. It\'s free.",c:["beautiful","greatest_hits"],r:"g",nn:"Circular Quay",ns:"日落时的表演和灯光",nst:"悉尼视觉认同的中心：歌剧院、港桥、水、街头表演者",nt:"地铁到Circular Quay。下午5点。留到日落"},
  {id:56,n:"Darling Harbour — Markets & Aquarium Waterfront",a:"Darling Harbour",v:["markets","neighbourhoods"],d:90,s:"A renovated waterfront precinct with farmers markets, restaurants, the aquarium, and weekend pedestrian energy",st:"Darling Harbour used to be industrial. Now it\'s mostly tourists. But the Wednesday farmers market is real. Local produce, local producers.",im:"A waterfront with boats, market stalls, restaurants with outdoor seating, the aquarium building across water, sunset light",t:"Subway to Darling Harbour or Pyrmont Bay. Markets Wednesday and weekend. Allow 2 hours. Bring bags for produce.",c:["markets","neighbourhoods"],r:"g",nn:"Darling Harbour",ns:"市场和水族馆滨水区",nst:"翻新的滨水区，农民市场，餐厅，水族馆",nt:"地铁到Darling Harbour。周三和周末市场"},
  {id:57,n:"Chinese Garden of Friendship — Zen Calm Inside City",a:"Darling Harbour",v:["parks","beautiful"],d:60,s:"A full-scale traditional Chinese garden inside Sydney, with pavilions, water features, and complete sensory escape from the city",st:"The garden is a gift from Shanghai to Sydney. Every element is intentional. Water, rocks, plants, bridges create balance.",im:"A serene Chinese garden with a pavilion overlooking a lake, trees reflecting in water, an ornamental bridge arching across, bamboo forest",t:"Darling Harbour. Entry 10 AUD. Open 9:30am-5pm. Allow 45 minutes. Bring water. Walk slowly.",c:["parks","beautiful"],r:"g",nn:"中国友谊花园",ns:"城市内禅宗平静",nst:"完整的传统中国花园，亭阁，水功能",nt:"Darling Harbour。入场10澳元。上午9:30-下午5点"},
  {id:58,n:"Art Gallery of NSW — Free/Pay-What-You-Wish",a:"The Domain",v:["free_museum","art"],d:120,s:"Major art museum with Australian and international collections. Entry is by donation, not required.",st:"The gallery has multiple levels. Minimalist to maximalist works. The Australian art collection is world-class.",im:"An art gallery interior, paintings on walls, sculptures in white-walled spaces, people moving slowly between rooms",t:"Art Gallery Rd, The Domain. Subway to St James or Central. Open 10am-5pm. Donation basis (pay what you wish).",c:["free_museum"],r:"g",nn:"新南威尔士美术馆",ns:"免费/随意支付",nst:"主要艺术博物馆，澳大利亚和国际收藏",nt:"Art Gallery Rd。地铁到St James。上午10点-下午5点"},
  {id:59,n:"Cockatoo Island — Prison Ruins & Sleeping Sheds",a:"Cockatoo Island",v:["history","weird"],d:120,s:"A former prison island in the harbor now has ruins, gardens, and overnight stays in historic \"sheds\". Ferry directly from Circular Quay.",st:"Cockatoo Island held convicts, then became a reformatory, then industrial. The ruins are dramatic. Overnight stays available.",im:"Stone ruins of prison buildings, a harbor view, sleeping sheds (small wooden buildings), the city visible across water",t:"Ferry from Circular Quay (20 minutes). Entry 13.50 AUD. Camp overnight or day visit. Walk the full island (2 hours).",c:["history_big","weird"],r:"g",nn:"Cockatoo Island",ns:"监狱废墟和睡眠棚屋",nst:"港口内一个前监狱岛屿，现有废墟、花园",nt:"从Circular Quay渡轮（20分钟）。入场13.50澳元"},
  {id:60,n:"Wendy Whiteley\'s Secret Garden — Hidden Urban Garden",a:"Paddington",v:["beautiful","hidden"],d:30,s:"A tiny secret garden hidden behind a warehouse in Paddington, created and maintained by an artist, completely unexpected beauty",st:"The garden is tucked in an urban spot. It\'s free, open afternoons. Plants grow wild. It feels like a secret.",im:"A lush garden packed into a small urban space, plants overflowing, sculptures and art pieces, a bench, the space secret and beautiful",t:"Paddington: Foveaux St. Small gate entrance, hard to see. Open Wednesday-Sunday 2-5pm. Free. Small.",c:["beautiful","hidden"],r:"g",nn:"Wendy Whiteley\'s Secret Garden",ns:"隐藏的城市花园",nst:"隐藏在Paddington仓库后面的秘密花园",nt:"Foveaux St。周三-周日下午2-5点。免费"},
  {id:61,n:"Sydney Fish Market — Smelt, Catch, Cook Breakfast",a:"Pyrmont",v:["food","markets"],d:90,s:"Daily fish market where fishing boats unload. Buy fresh fish, eat breakfast at stall restaurants, watch boats arrive",st:"The market opens at 7am. Boats unload at 7:30am. The fish smells fresh. Stall restaurants cook what you buy.",im:"A fish market with iced displays, a fishmonger holding a large fish, boats in background, people eating at waterfront tables",t:"Subway to Pyrmont Bay. Open 7am-4pm daily. Arrive early (before 9am). Buy fish. Find a stall to cook it.",c:["food","markets"],r:"g",nn:"悉尼鱼市场",ns:"气味、捕捞、烹饪早餐",nst:"日常鱼市，捕鱼船卸载，现场餐厅烹饪",nt:"地铁到Pyrmont Bay。上午7点-下午4点。早到。买鱼"},
  {id:62,n:"Marrickville Food Scene — Graffiti & Asian Restaurants",a:"Marrickville",v:["food","street_art"],d:120,s:"An industrial neighborhood transformed: street art covers every wall, Vietnamese restaurants are world-class, young creative people live here",st:"Marrickville was a manufacturing center. Now it\'s artists and Asian immigrants. The food is incredible. The street art is everywhere.",im:"A street lined with graffiti murals, Vietnamese noodle shops, young people, street art on every building, colorful storefronts",t:"Subway to Marrickville Station. Walk Marrickville Rd. Restaurants: Hu Tieu My Tho, Kim Long. Bring cash.",c:["food","street_art"],r:"g",nn:"Marrickville Food Scene",ns:"涂鸦和亚洲餐厅",nst:"转变的工业社区，街头艺术覆盖每面墙",nt:"地铁到Marrickville Station。沿Marrickville Rd行走"},
  {id:63,n:"Cabramatta Vietnamese Food — Better Than Saigon",a:"Cabramatta",v:["food","local_only"],d:120,s:"Sydney\'s Vietnamese neighborhood, 3km from the CBD but feels like Ho Chi Minh City. Better food, cheaper, completely authentic.",st:"Cabramatta is 99% Vietnamese. Shop signs are Vietnamese. Restaurants don\'t need translation. Food costs 1/3 of city prices.",im:"A street with Vietnamese shop signs, pho restaurants packed with people, the smell of grilling meat and herbs, locals eating and talking",t:"Subway to Cabramatta Station. Walk Main St north-south. Eat pho breakfast. Bring appetite and cash.",c:["food","local_only"],r:"g",nn:"Cabramatta",ns:"比西贡更好的越南菜",nst:"悉尼的越南社区，食物便宜，完全地道",nt:"地铁到Cabramatta Station。沿Main St行走"},
  {id:64,n:"Opera House Bar Sunset — Inside the Icon",a:"Circular Quay",v:["beautiful","neighbourhoods"],d:60,s:"Inside the Opera House, a bar overlooking the harbor. You can sit inside the building at the place it was designed to be seen from.",st:"The bar is on the Opera House forecourt. The building surrounds you. The view is of the harbor and bridge.",im:"Sitting inside the Opera House looking out, a glass of wine, the harbor beyond, the Harbour Bridge visible, other patrons around",t:"Circular Quay. Bar opens 11am weekdays, 10am weekends. Book a table or arrive early. Expensive drinks but worth the view.",c:["beautiful"],r:"y",nn:"Opera House Bar",ns:"日落时的图标内部",nst:"歌剧院内俯瞰港口的酒吧",nt:"Circular Quay。上午11点开放。预订或早到"},
  {id:65,n:"Palm Beach — Summer Bay & Northern Escape",a:"Palm Beach",v:["swimming","beautiful"],d:240,s:"Sydney\'s northernmost beach: a full day trip, less crowded than city beaches, the filming location of Summer Bay soap opera",st:"Palm Beach is 40km north. The beach is long. The water is clean. Fewer crowds. Barrenjoey Lighthouse is on the headland.",im:"A long sandy beach with few people, a lighthouse on a headland, the beach stretching north to distant cliffs, crystal water",t:"Subway to Wynyard, then bus 190 to Palm Beach (1 hour). Bring picnic. Swim. Walk to lighthouse. Return by bus.",c:["swimming","beautiful"],r:"y",nn:"Palm Beach",ns:"夏湾和北方逃离",nst:"悉尼最北部的海滩，夏湾肥皂剧的拍摄地点",nt:"地铁到Wynyard，然后公交190到Palm Beach"},
  {id:66,n:"La Perouse — Site of First European Contact & Beach",a:"La Perouse",v:["history","swimming"],d:90,s:"The beach where Europeans first landed in 1788. Museum, ruins, local Aboriginal history, and a beautiful small beach.",st:"La Perouse marks the point where the first European fleet arrived. The beach is sheltered. The history is complex.",im:"A small beach sheltered by rocks, an old stone building (museum), Aboriginal heritage site markers, people swimming in calm water",t:"Subway to Circular Quay, then ferry or drive 45 min. Museum open 10am-5pm. Beach always open. Free entry to beach.",c:["history_big","swimming"],r:"g",nn:"La Perouse",ns:"第一次欧洲接触的地点和海滩",nst:"欧洲人1788年首次登陆的海滩，博物馆，遗迹",nt:"地铁到Circular Quay，然后渡轮45分钟。博物馆上午10点-下午5点"},
  {id:67,n:"Manly to Spit Bridge coastal walk — 10km of harbour above the water",a:"Central",v:["views", "quiet"],d:60,s:"A continuous walking track along the northern harbour foreshore through bushland, with views of the harbour, Aboriginal ...",st:"A continuous walking track along the northern harbour foreshore through bushland, with views of the harbour, Aboriginal rock carvings in sandstone and small secluded beaches. At dawn the light on the water and the complete absence of cars makes it feel like the city has been temporarily removed.",im:"Standing at Manly to Spit Bridge coastal walk, taking in the scene.",t:"Free. Take the Manly Ferry from Circular Quay and walk back to Spit Bridge, or reverse. Allow 3–4 hours.",c:["high_spots", "scary", "romantic_water"],r:"g"},
  {id:68,n:"Paddington Reservoir Gardens — Ruins as park",a:"Central",v:["history", "art", "nature"],d:60,s:"A 19th-century underground reservoir on Oxford Street, partially collapsed, converted into a sunken garden where the old...",st:"A 19th-century underground reservoir on Oxford Street, partially collapsed, converted into a sunken garden where the old brick arches and ironwork columns are incorporated into the planting.",im:"Standing at Paddington Reservoir Gardens, taking in the scene.",t:"Free. On Oxford Street in Paddington — easy to walk past without noticing it.",c:["history_big", "nature", "parks", "free_culture", "abandoned"],r:"g"},
  {id:69,n:"Malabar Headland National Park — Urban wilderness on the southern cliffs",a:"Central",v:["nature", "food", "views"],d:60,s:"A recently opened national park on Sydney\'s southern headland with walking trails through coastal heathland, views of t...",st:"A recently opened national park on Sydney\'s southern headland with walking trails through coastal heathland, views of the ocean from dramatic sandstone cliffs and evidence of Aboriginal occupation going back tens of thousands of years.",im:"Standing at Malabar Headland National Park, taking in the scene.",t:"Free. Accessible by bus from the city. Check park access conditions before visiting.",c:["food", "nature", "parks", "high_spots", "scary"],r:"g"},
  {id:70,n:"Carriageworks Farmers Market on Saturday — The city\'s best weekly ritual",a:"Central",v:["food"],d:60,s:"A Saturday morning food market inside a vast heritage-listed railway workshop in Eveleigh — the brick arches, the high c...",st:"A Saturday morning food market inside a vast heritage-listed railway workshop in Eveleigh — the brick arches, the high ceiling and the quality of the producers make it one of the finest markets in Australia.",im:"Standing at Carriageworks Farmers Market on Saturday, taking in the scene.",t:"Entry is free. Opens early Saturday morning. Take the train to Redfern.",c:["food", "markets"],r:"g"},
