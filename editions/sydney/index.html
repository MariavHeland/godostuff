  {id:71,n:"White Rabbit Gallery, Chippendale — The finest collection of contemporary Chinese art outside China",a:"Central",v:["art"],d:60,s:"A private gallery in a converted wool store showing one of the world\'s most significant collections of contemporary Chi...",st:"A private gallery in a converted wool store showing one of the world\'s most significant collections of contemporary Chinese art, built by Judith Neilson and entirely free to visit.",im:"Standing at White Rabbit Gallery, Chippendale, taking in the scene.",t:"Free entry. Closed Mondays and Tuesdays. Check exhibitions before visiting.",c:["free_culture"],r:"g"},
  {id:72,n:"Milk Beach, Vaucluse — The harbour\'s best kept secret",a:"Central",v:["views"],d:60,s:"A tiny, secluded harbour beach at the end of a short trail through bushland in Vaucluse, with views of the harbour entra...",st:"A tiny, secluded harbour beach at the end of a short trail through bushland in Vaucluse, with views of the harbour entrance, the city skyline visible in the distance and cold, clear water.",im:"Standing at Milk Beach, Vaucluse, taking in the scene.",t:"Take a bus to Vaucluse and walk the trail. Free.",c:["high_spots", "scary", "romantic_water"],r:"g"},
  {id:73,n:"Cheap Manly Ferry at dusk — The world\'s best commute",a:"Central",v:["food"],d:60,s:"The 30-minute ferry between Circular Quay and Manly is one of the great free (or nearly free) public transport rides in ...",st:"The 30-minute ferry between Circular Quay and Manly is one of the great free (or nearly free) public transport rides in the world. Take it at dusk when the Opera House catches the last light and the harbour turns golden.",im:"Standing at Cheap Manly Ferry at dusk, taking in the scene.",t:"Regular public transport fare — pay with an Opal card. This is a commuter ferry, not a tourist boat.",c:["food", "free_culture", "romantic_water", "sport"],r:"g"},

{id:75, n:"Wylie\'s Baths, Coogee — Ocean Pool Carved from Rock", a:"Coogee", v:["swimming","history","romantic_water"], d:30,
s:"Swim where Sydneysiders have been swimming for a century. It\'s a proper ocean pool, not a beach.",
st:"Built in 1907 by a bloke named Wylie who got sick of people complaining the beach wasn\'t safe enough. He carved a pool into the rocks. It\'s smaller than Bronte, gentler, and has a totally different vibe—actual locals, families, people who come back every morning.\n\nThe water\'s cold but clean. The heritage building\'s got character. On a good day you\'ll see whales cruising past.",
im:"Wide rocky pool, cream pavilion, swimmers in retro costumes on heritage day.",
t:"Go early before the day-trippers arrive. Bring a towel—no facilities worth noting.",
c:["history_big","romantic_water","swimming"], r:"g",

{id:76, n:"Mahon Pool, Maroubra — Before Breakfast Ritual", a:"Maroubra", v:["swimming","community"], d:30,
s:"The ocean pool where you\'ll actually meet people who live here. Bondi it is not.",
st:"Mahon\'s been holding back the ocean since 1914. It sits between Maroubra and Malabar, not fancy, not famous, but absolutely alive at 6am with the same crowd that\'s been coming for years. Older swimmers, serious swimmers, the kind of people who don\'t care about Instagram.\n\nThe water\'s gorgeous in summer. Year-round swimmers treat it like a church. You\'ll understand why once you\'re in.",

{id:77, n:"Royal National Park — The Honest Day Trip", a:"Sutherland Shire", v:["nature","day_trips","high_spots"], d:120,
s:"Coastal cliffs, proper hiking, and you won\'t feel like you\'re in a theme park. It\'s an actual wild place.",
st:"Royal National Park is 14,000 hectares of headlands, beaches, and walking trails. The most famous route is Garie to Wattamolla, 8km of coastal heaven. Wattamolla\'s a lagoon that feeds into a beach, and there\'s no walk that sees more water in one day.\n\nOn weekends it gets busy—bring a book if you want to eat lunch in peace. The light in the afternoon on Providential Beach will wreck you. Early start, bring water, decent shoes.",
im:"Steep cliffs dropping to turquoise ocean, one lone hiker on sandy beach.",
t:"Start at Garie car park at 7am. The walk takes 3-4 hours. Swim at Wattamolla if the water\'s not rough.",
c:["day_trips","high_spots","nature"], r:"g",
nn:"Royal NP", ns:"Actual wilderness 45 minutes away", nst:"These cliffs, these beaches—they\'re why people came here.", nt:"The walk\'s not that hard, but the wind\'s real. Sunscreen."},

{id:78, n:"Cabramatta Vietnamese Strip — Better Than Anywhere Else", a:"Cabramatta", v:["food","neighbourhoods"], d:60,
s:"Not fusion, not Instagram-friendly. Real Vietnamese food made by people who\'ve been doing it for thirty years.",
st:"Cabramatta\'s Vietnamese food isn\'t a trend. It arrived with families who needed to eat, and now the strip on Main Street and nearby laneways has more authentic pho, banh mi, and bun than anywhere in Sydney. Places like Mekong and Thanh Nga have lines out the door because the broth is boiled for 12 hours and the rice paper\'s made fresh.\n\nGo for lunch. Order what the old blokes are eating. The chaos is the point.",
im:"Crowded laneway, steaming bowls, handwritten signs in Vietnamese, motorbikes parked densely.",
t:"Try Pho Viets for broth, Ba Le for banh mi, Thanh Nga for bun. Don\'t expect ambience—expect good food.",
c:["food","neighbourhoods"], r:"",
nn:"Cabramatta", ns:"Where Vietnamese food is just food", nst:"Families who came here kept cooking the way they always had.", nt:"Midweek lunch is less crowded. Cash preferred in older places."},

{id:79, n:"Redfern — The Original Country, Then Everything Else", a:"Redfern", v:["neighbourhoods","history_big","indigenous"], d:60,
s:"Gadigal country first. Then colonial mess. Then punk rock. Then now. Walk through all of it.",
st:"Redfern\'s got layers. The Gadigal people lived here for 50,000 years. Then British colonisation happened. Then in the 1960s-70s it became the heart of Aboriginal activism and the Tent Embassy movement. Then punk. Then gentrification. Now it\'s complicated but real.\n\nWalk from Redfern Park (where the original trees are) to Eveleigh Street (galleries, vintage shops, the original punk scene). Stop at places like Gavs Barber—been cutting hair there since before it was cool. The Aboriginal artists are in the galleries. The history\'s in the streets.",
im:"Corner store with Aboriginal mural, brick buildings, people with coloured hair outside a cafe.",
t:"Visit on a Saturday morning. Skip the cafes on the main streets—explore the laneways. ABC\'s in Redfern for coffee and food.",
c:["history_big","neighbourhoods"], r:"",
nn:"Redfern", ns:"Gadigal country, then everything that came after", nst:"This is where stuff happened.", nt:"Go to Block Commons (Cunningham St) if you want to understand modern Indigenous Sydney."},

{id:80, n:"Lakemba Food Strip — Lebanese Everything", a:"Lakemba", v:["food","neighbourhoods"], d:60,
s:"Halal restaurants, bakeries, spice shops. Actual Lebanese people eating actual Lebanese food. The real economy of the suburb lives here.",
st:"Lakemba\'s Lebanese Strip stretches along Haldon Street and Chester Avenue. Every corner has a bakery with warm pita, a restaurant with mezze that\'ll fill a table, and family groups eating at 2pm on a Tuesday like it\'s the most normal thing. Arz has incredible wood-fired lamb, Al-Reef\'s shawarma will ruin you for other shawarma, and the bakeries have knafeh that tastes like home cooking.\n\nSunday lunch is the best time. Families, couples, groups arguing about football. The space is yours too.",
im:"Warm bread just taken from oven, meze spread across a wooden table, Arabic signs in gold letters.",
t:"Go hungry. Order mezze—you can\'t go wrong. Ask locals what to try. Bring cash for some places.",
c:["food","neighbourhoods"], r:"",
nn:"Lakemba", ns:"Where Lebanese food is normal food", nst:"This is how people actually eat here.", nt:"The spice shops are worth exploring. Buy za\'atar, sumac, everything."},

{id:81, n:"Marrickville Pork Roll Paradise — One Specific Alley", a:"Marrickville", v:["food","weird"], d:45,
s:"You didn\'t know pork rolls were a thing. Then you tried one and understood why people queue at 9am.",
st:"Mary Wong\'s and a handful of other spots in Marrickville specialise in pork rolls—steamed baos filled with slow-cooked pork, and they\'re possibly the best fast breakfast in Sydney. They\'re cheap, they\'re hot, they\'re addictive. The pork\'s been stewing in soy and five-spice, and the bao\'s light enough to not feel heavy at 10am.\n\nOn Saturday mornings there\'s a line. Go early or go hungry and wait. The owners have been making them the same way for decades. It\'s not fancy—it\'s efficient and delicious.",
im:"Steamed white bun in cardboard wrapper, steam rising, person biting into pork roll, graffiti wall behind.",
t:"Mary Wong\'s in the Marrickville mall. Arrive before 10am. There\'s strong coffee next door.",
c:["food","weird"], r:"",
nn:"Marrickville", ns:"Pork roll for breakfast is normal here", nst:"A few people figured out a good thing and never stopped.", nt:"Get 2. You\'ll want another. Chilli sauce or not—both work."},

{id:82, n:"Fish Market at Sunrise — How to Actually Use It", a:"Pyrmont", v:["food","markets"], d:45,
s:"Not the touristy breakfast spot. 5am, when the fishing boats are unloading and the prices are real.",
st:"Sydney Fish Market at 5:30am is the working market. Boats unloading, fishmongers yelling, buyers from restaurants turning up with lists. By 9am it\'s breakfast tourists taking selfies with fish. The difference is everything.\n\nGet there early. Wander the aisles. Watch buyers bid on tuna. Buy something fresh—a snapper, a kingfish, something you\'ve never cooked before. Take it home. The staff will tell you how to cook it. Prices drop after 8am as tourists arrive, so you\'re not paying a premium for being in a nice place.",
im:"Stainless steel bench, ice and whole fish, fishmonger with knife and apron, morning light through windows.",
t:"Go 5:30-7am. Bring cash. Talk to the people selling—they\'re proud of their fish and will help.",
c:["food","markets"], r:"",
nn:"Fish Market", ns:"The actual market, not the cafe", nst:"This is where the city eats from.", nt:"If you don\'t know how to cook it, the fishmonger will teach you."},

{id:83, n:"Glebe Markets Saturday Morning — Actual Community", a:"Glebe", v:["markets","neighbourhoods","free_culture"], d:45,
s:"The only market in Sydney where you feel like you\'ve walked into someone\'s actual life, not a commercial space.",
st:"Glebe Markets in the school grounds every Saturday is a community market—locals selling plants they\'ve grown, baked goods, vintage, clothes, books, art. No giant corporate stalls. No staging. Just the neighbourhood showing up with what they\'ve made.\n\nYou\'ll see the same people every week. Retirees selling flowers. Artists selling prints. Kids running around. It\'s genuinely small-scale. Prices are cheap because it\'s for the community, not at the community. Coffee\'s great. The vibe\'s relaxed.",
im:"Wooden stall with homemade cakes, children playing, tree shade, handwritten price tags.",
t:"Saturday 10am-3pm. Arrive before noon if you want good plants. Bring cash and a bag.",
c:["free_culture","markets","neighbourhoods"], r:"",
nn:"Glebe Markets", ns:"People selling what they actually made", nst:"This is how markets work when there\'s no profit motive.", nt:"The second-hand books section is worth spending time in."},

{id:84, n:"Cockatoo Island — The Convict Prison, Then Shipyard, Then Ghost", a:"Darling Harbour", v:["history_big","abandoned","scary"], d:60,
s:"An entire prison and industrial site on an island in the harbour. You walk through the buildings where people were locked away. It\'s haunting.",
st:"Cockatoo Island was Australia\'s most brutal convict prison (1839-1869), then became a shipyard for a hundred years, then was mostly abandoned. The stone buildings are still there—cells, barracks, the flour mill, the smithy. You can walk through them.\n\nThe energy is heavy. Knowing what happened inside those walls, seeing where people were locked, reading the stories—it stays with you. Summer concerts happen here now, and that juxtaposition of music and history is strange. Go to understand Sydney\'s convict past, not to have fun.",
im:"Grey stone ruins, empty cell blocks, ocean visible through gaps, no people, evening light.",
t:"Ferry from Circular Quay. The walking tour is worth it for context. Go on a cloudy day—it suits the place.",
c:["abandoned","history_big","scary"], r:"",
nn:"Cockatoo Island", ns:"Where Sydney\'s convict past lives", nst:"These walls are older than modern Australia.", nt:"The ferry ride over is the actual experience—being surrounded by water, coming to this place."},

{id:85, n:"North Head to Shelly Beach Walk — Harbour Above Water", a:"Manly", v:["nature","high_spots"], d:90,
s:"From the lookout at North Head down to Shelly Beach. Arched cliffs, ocean on three sides, zero crowds if you go early.",
st:"Start at North Head Lookout (park there early, it fills up). The path drops down through native bushland to Shelly Beach, a tiny cove with a rocky beach and incredible snorkelling. The cliffs arch overhead. You\'re surrounded by water and sky.\n\nIt takes 2-3 hours return. Most people just hit the lookout and leave, so the walk itself is quiet. In September and October, whales pass by these headlands heading to Antarctica. The light in the afternoon makes the water look unreal.",
im:"Sheer sandstone cliffs curved like a theatre, blue water below, one person on rocky beach.",
t:"Start early (7am) to get parking. Bring water and good shoes. The walk\'s not hard, just scenic.",
c:["high_spots","nature"], r:"g",
nn:"North Head", ns:"Cliffs you can walk into", nst:"This is what the harbour looked like before buildings.", nt:"Shelly Beach snorkelling is brilliant in clear water."},

{id:86, n:"Newtown Beyond King Street — The Actual Neighbourhood", a:"Newtown", v:["neighbourhoods","weird"], d:60,
s:"King Street\'s the obvious bohemian strip. But the real Newtown is in the side streets—housing co-ops, community gardens, radical bookshops.",
st:"Everyone knows Newtown\'s King Street—vintage shops, student bars, Thai restaurants. But the neighbourhood itself lives in places like Mary Street, Young Street, and Bland Street. Here you\'ll find co-operative housing (people actually living communally), vegetable gardens on vacant land, the Backslash Club (an actual DIY venue), and independent bookshops run by people who care about what they\'re selling.\n\nIt\'s messier than the main street, more authentic, less curated. Walk around and you\'ll see the community doing the work of being a community, not just shopping.",
im:"House with painted fence, people sitting on porch, community garden sign, street lined with small independent storefronts.",
t:"Wander Bland Street and Young Street. Stop at Mary Street. Talk to people outside cafes.",
c:["neighbourhoods","weird"], r:"",
nn:"Newtown", ns:"The neighbourhood that built itself", nst:"King Street is the shop window. The real place is around the corner.", nt:"The bookshops (Gleebooks, Pulp Fiction) are worth an hour each."},

{id:87, n:"Quarantine Station, North Head — The Hospital for the Sick Ships", a:"Manly", v:["history_big","abandoned","scary"], d:120,
s:"From 1828 onwards, every ship that came to Sydney was checked for disease here. Hundreds died in isolation. The buildings are still standing.",
st:"The Quarantine Station operated for 150 years. Ships with plague, smallpox, cholera—they were anchored here. Sick passengers and crew were moved to hospital buildings where isolation meant total isolation. Hundreds died. They\'re buried on the headland.\n\nYou can only visit with a guided tour. The National Parks service runs them. The buildings are empty, the stories are in the walls. It\'s historically important and honestly sad—people dying far from home in a hospital that tried its best but couldn\'t stop the disease. The isolation was the whole point, and it worked until it didn\'t.",
im:"Weathered hospital building with small windows, headland cliffs behind, wildflowers in foreground.",
t:"Book a tour online. Tours are weekends. Bring water. The walk between buildings is steep and uneven.",
c:["abandoned","history_big","scary"], r:"",
nn:"Q Station", ns:"Where the sick ships came", nst:"This is where Sydney\'s public health started.", nt:"The cemetery on the headland is the part that stays with you."},

{id:88, n:"Bronte to Tamarama Coastal Walk — The Actual Beautiful Bit", a:"Bronte", v:["nature","swimming","romantic_water"], d:60,
s:"Everyone does Bondi to Coogee. This walk is prettier, less crowded, and has a pool that\'s genuinely special.",
st:"Bronte to Tamarama is only 1.5km, so it\'s usually skipped by walk-tourists heading to Coogee. That\'s perfect—you get dramatic cliffs, turquoise pools, and basically no crowds. Bronte Rock Pool is genuine. Tamarama\'s a tiny golden beach squeezed between cliffs. The rock formations are wild.\n\nThe walk takes 45 minutes. You could swim at both ends. The light in the afternoon bounces off the water and cliff faces in a way that makes you understand why people came to live here.",
im:"Deep turquoise pool surrounded by rust-coloured rocks, cliffs, one swimmer, no crowds.",
t:"Go on a weekday. Start at Bronte Pool, swim, then walk to Tamarama. Bring a towel.",
c:["nature","romantic_water","swimming"], r:"g",
nn:"Bronte walk", ns:"When the coast is actually beautiful", nst:"Two pools, one walk, nobody around.", nt:"The water at Tamarama is cleaner than Bondi. Bring goggles."},

{id:89, n:"White Rabbit Gallery, Chippendale — Art That Costs Nothing to See", a:"Chippendale", v:["free_culture","nerd"], d:90,
s:"Six storeys of contemporary Chinese art. The building itself is white and looks like it landed from another planet. Completely free.",
st:"White Rabbit Gallery is one person\'s private collection (Judith Neilson, and she\'s serious about it). The building in Chippendale is pure white, full of skylights, with six floors of contemporary Chinese painting and sculpture. Artists like Ai Weiwei, Laylah Ali, Xu Bing. The collection changes.\n\nIt\'s free because Neilson believes art should be accessible. The building\'s in a warehouse area of Chippendale that\'s becoming a creative district. The cafe\'s good. You can spend two hours here and feel like you\'ve been somewhere important. Most Sydneysiders don\'t even know it exists.",
im:"White concrete building with geometric cutouts, natural light pouring down through skylights, young couple looking at large abstract painting.",
t:"Go Thursday-Sunday (it closes other days). The cafe\'s worth sitting in. Weekday afternoons are quiet.",
c:["free_culture","nerd"], r:"",
nn:"White Rabbit", ns:"Art that doesn\'t cost money", nst:"One person decided everyone should see this.", nt:"The building is the art too. Photos don\'t capture it."}

<h2 className="text-base font-bold mb-3" style={{color:"white"}}>Before you start</h2>
<p className="text-sm leading-relaxed" style={{color:"#c8c0e0"}}>This app is a creative guide to hidden places. Content is curated for curiosity — not as instructions.</p>
<p className="text-xs leading-relaxed mt-1" style={{color:"#9990b8",fontStyle:"italic"}}>Explore respectfully. Acknowledge Aboriginal history and land ownership. Check tide times before visiting beaches.</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#c8c0e0"}}>Some locations include natural environments, heights, water, or areas that may be restricted or unsafe. You explore at your own risk.</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#c8c0e0"}}>Always follow local laws, respect private property, and check current conditions before visiting any place.</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#e8c0f0"}}>If you are under 18, please explore responsibly.</p>
</div>
<button onClick={onAccept} className="mt-6 w-full py-4 rounded-xl text-sm font-bold text-white" style={{background:"linear-gradient(135deg,#6366F1,#8B5CF6)",border:"none",cursor:"pointer",maxWidth:380,fontSize:"15px"}}>I understand — let me explore<br/><span style={{fontSize:"12px",opacity:0.85}}>Let's Explore</span></button>
</div>);

const PlaceCard=({place:p,idx,onOpen,lang})=>(
<button onClick={()=>onOpen(p)} className="text-left w-full rounded-2xl p-4 fade-up" style={{background:"white",border:"1.5px solid #e4e4ed",cursor:"pointer",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div style={{flex:1}}>
<h3 className="text-base font-bold" style={{color:"#1a1a2e",lineHeight:1.3}}>{lang==="native"&&p.nn?p.nn:p.n}</h3>
{lang==="native"&&p.nn&&<p className="text-xs" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-xs mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p></div>
<span className="text-xs font-bold px-2 py-1 rounded-full ml-2 flex-shrink-0" style={{background:p.r==="g"?"#dcfce7":"#fef9c3",color:p.r==="g"?"#166534":"#854d0e"}}>{p.r==="g"?"Green":"Yellow"}</span></div>
<p className="text-sm mt-2" style={{color:"#555",lineHeight:1.5}}>{lang==="native"&&p.ns?p.ns:p.s}</p>
<div className="flex gap-1.5 mt-2 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-2 py-0.5 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</button>);

const PlaceDetail=({place:p,onClose,onNext,onPrev,lang})=>(
<div style={{position:"fixed",inset:0,zIndex:1000,background:"url('https://mariavheland.github.io/godostuff/textures/tex13.png') center/cover no-repeat",overflowY:"auto"}}>
<div className="px-5 pt-6 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex justify-between items-center mb-4">
<button onClick={onClose} className="text-sm font-bold" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← Back</button>
<div className="flex gap-2">
<button onClick={onPrev} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>←</button>
<button onClick={onNext} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>→</button></div></div>
<h1 className="text-2xl font-black" style={{color:"#1a1a2e"}}>{lang==="native"&&p.nn?p.nn:p.n}</h1>
{lang==="native"&&p.nn&&<p className="text-sm font-medium" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-sm mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p>
{PLACE_IMAGES[p.id]&&<div className="mt-4 rounded-xl overflow-hidden" style={{maxHeight:"400px"}}>
<img src={`images/${PLACE_IMAGES[p.id]}`} alt={p.n} style={{width:"100%",maxHeight:"360px",objectFit:"contain",display:"block",borderRadius:"8px"}}/>
<p className="text-xs mt-1" style={{color:"#aaa",textAlign:"center"}}>AI-generated illustration</p></div>}
<div className="mt-4 p-4 rounded-xl" style={{background:"#f8f8ff"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#1a1a2e"}}>The Story</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nst?p.nst:p.st}</p></div>
{p.im&&<div className="mt-3 p-4 rounded-xl" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#a78bfa"}}>Imagine This</h3>
<p className="text-sm" style={{color:"#b8b0d0",lineHeight:1.7,fontStyle:"italic"}}>{p.im}</p></div>}
{p.t&&<div className="mt-3 p-4 rounded-xl" style={{background:"#f0fdf4"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#166534"}}>{lang==="native"?"Tips / "+LANG_NAME:"Tips"}</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nt?p.nt:p.t}</p>
<a href={`https://maps.google.com/?q=${encodeURIComponent(p.n+', '+CITY_EN)}`} target="_blank" rel="noopener noreferrer"
  className="mt-3 flex items-center gap-2 text-sm font-bold"
  style={{color:"#166534",textDecoration:"none",display:"inline-flex",marginTop:"10px"}}>
  🗺 Get directions
</a>
</div>}
{p.ef&&<p className="text-xs mt-3 pt-3" style={{color:"#555",lineHeight:1.7,borderTop:"1px solid #dcfce7"}}>🍔 {p.ef}</p>}
{p.sf&&<p className="text-xs mt-2" style={{color:"#555",lineHeight:1.7}}>🏠 {p.sf}</p>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
<div className="mt-5">
<p className="text-xs font-bold mb-2" style={{color:"#888",letterSpacing:"0.08em",textTransform:"uppercase"}}>City Moods</p>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} style={{borderRadius:10,overflow:"hidden",aspectRatio:"2/3",background:"#eee"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>)}</div></div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
const TBGS={"places":"https://mariavheland.github.io/godostuff/textures/tex12.png","collections":"https://mariavheland.github.io/godostuff/textures/tex16.png","missions":"https://mariavheland.github.io/godostuff/textures/tex16.png","plan":"https://mariavheland.github.io/godostuff/textures/tex16.png","phrases":"https://mariavheland.github.io/godostuff/textures/tex12.png","default":"https://mariavheland.github.io/godostuff/textures/tex12.png"};if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:"url('https://mariavheland.github.io/godostuff/textures/tex13.png') center/cover no-repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Sydney Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Sydney Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
