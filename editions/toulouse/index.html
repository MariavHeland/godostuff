  {id:112, n:"Base de Loisirs de Fonsérrannes — South", a:"South", v:["swimming","beautiful","local"], d:35, s:"Inland lake where Toulouse swims on hot days—reeds, ducks, locals paddling canoes summer.", st:"30 minutes south. Lake surrounded by grass and reeds. No commercialism. Just locals swimming July and August. Paddle boarders at sunset. Water is clean and quiet. Food trucks at entrance.", im:"Dark water lake. Reeds at edge. Paddleboard silhouetted against sunset.", t:"Bus 80 from city center (45 min). Free beach. Picnic tables. Best June–August. Bring own food.", c:["swimming","day_trips","local_only"], r:"g", nn:"Base de Loisirs de Fonsérrannes — South", ns:"Lac intérieur où Toulouse nage.", nst:"30 minutes au sud. Un lac entouré d\'herbe.", nt:"Bus 80 du centre-ville (45 min)."},
  {id:113, n:"Pont de Pierre Sunset — Carmes", a:"Carmes", v:["sunset","beautiful","romantic_water"], d:6, s:"17th-century brick bridge—river reflects gold at 8pm—entire western sky burns orange.", st:"Pont de Pierre is pink brick. At sunset in spring and summer, light comes low from west and hits water. Whole river becomes liquid fire. Stand at center. You can see kilometers down Garonne. City quiets.", im:"River water turning gold. Pink brick glowing. Single boat crossing below.", t:"Start at Place Esquirol, walk to bridge. 7–8pm May to August. Bring blanket, wine, bread.", c:["romantic_water","high_spots"], r:"g", nn:"Pont de Pierre Coucher — Carmes", ns:"Pont de brique 17ème siècle—la rivière reflète l\'or.", nst:"Le Pont de Pierre est en brique rose.", nt:"Commencez à Place Esquirol. 19–20 heures."},
  {id:114, n:"Gascony Wine Region — Armagnac Villages", a:"South", v:["day_trips","food","history"], d:60, s:"45min by train south—vineyards, fortified medieval villages, armagnac brandy aging in oak barrels.", st:"Take train to Auch. Walk old town—steep cobbled streets, cathedral, half-timbered houses. The armagnac region surrounds it. Distilleries welcome visitors. The brandy aged 30, 50, 100 years sits in wooden casks. Some smell like leather and smoke.", im:"Dark wooden barrels stacked in stone cellar. A label dated 1950.", t:"Train from Toulouse to Auch (50 min). Rent bicycle or taxi to villages. Armagnac Museum open daily. Return train 7pm.", c:["day_trips","food","history_big"], r:"g", nn:"Région Viticole de Gascogne — Villages", ns:"45min train sud—vignobles, villages médiévaux.", nst:"Prenez le train à Auch. Marchez la vieille ville.", nt:"Train de Toulouse à Auch (50 min)."},
  {id:115, n:"Basilica Saint-Sernin — Medieval Church", a:"Saint-Sernin", v:["history","architecture","sacred"], d:8, s:"Romanesque church 11th–13th century—relics of Saint Sernin—pilgrims walked here 1,000 years.", st:"Massive red brick and stone. Inside, ambulatory wraps around altar. Relics are in crypt—old bones in old gold. This was a pilgrimage church. The architecture guides you: walk in, approach slowly, kneel if you want.", im:"Red brick church rising above narrow streets. Inside: stone arches, candles, silence, one old woman praying.", t:"Place St-Sernin, Old Town. Open 8am–7pm daily. Free. Crypt: small fee. Go before tour groups.", c:["history_big","sacred"], r:"g", nn:"Basilique Saint-Sernin — Église Médiévale", ns:"Église romane 11e–13e siècle.", nst:"La basilique est d\'immense brique rouge.", nt:"Place St-Sernin, cœur de la Vieille Ville."},
  {id:116, n:"Cinéma Les Abattoirs Summer Outdoor Series — Warehouse", a:"Warehouse District", v:["free_entry","local","night"], d:12, s:"Free outdoor cinema in old industrial space—films projected on warehouse walls, Thursday nights summer.", st:"Old abattoir turned cultural space. In summer, they project films on outside walls after dark. Locals bring blankets, wine, cheese. The image is enormous. You watch Godard on a warehouse wall, sitting with strangers who become friends.", im:"Film projected 10 meters high on red brick. Blankets and people spread below.", t:"Les Abattoirs, Rue Poissonnerie. Thursdays June–August, 9pm. Free. Bring blanket. Films French and English.", c:["free_entry","local_only","night"], r:"g", nn:"Cinéma Les Abattoirs Série Estivale — District", ns:"Cinéma en plein air gratuit.", nst:"Un ancien abattoir converti. Été, ils projettent des films.", nt:"Les Abattoirs, Rue Poissonnerie."},
  {id:117, n:"Marché Carmes — Food Market", a:"Carmes", v:["food","market","local"], d:5, s:"Wednesday and Saturday morning market—vendors calling prices, duck meat hanging, sausage warm.", st:"Place du Carmes fills with vendors Wed and Sat mornings. Produce vendors, cheese people, meat hanging from hooks, flowers. Old Toulouse women know vendors by name. The acoustic is loud. This is how locals eat.", im:"Hanging duck carcasses. Old vendor\'s hands cutting herbs. Scales weighing produce.", t:"Place du Carmes, Old Town. Wed & Sat 6am–1pm. Go early (6–8am) for best selection.", c:["markets","food","local_only"], r:"g", nn:"Marché Carmes — Marché Alimentaire", ns:"Marché matin mercredi et samedi.", nst:"Place du Carmes se remplit de vendeurs.", nt:"Place du Carmes, Vieille Ville. Mer & Sam."},
  {id:118, n:"Garonne River Walk at 5am — Island", a:"Island", v:["quiet","beautiful","local"], d:10, s:"The river path before the city wakes—fishermen, joggers, swans on water, zero tourists.", st:"Garonne flows through Toulouse. At 5–6am, the river path belongs to locals only. Fishermen in boats. Joggers. An old man with binoculars watching birds. Water is still. City is quiet. Air is cold.", im:"Fisherman\'s line in still water. Jogger disappearing into mist. Swan moving.", t:"Start at Pont Neuf. Walk north along right bank. 5–6am best. Coffee opens 7am at banks.", c:["quiet","parks","local_only"], r:"g", nn:"Promenade Garonne à 5h — Île", ns:"Le chemin de la rivière avant le réveil.", nst:"La Garonne s\'écoule à travers Toulouse.", nt:"Commencez au Pont Neuf. Marchez vers le nord."},
  {id:119, n:"Musée des Augustins — Free First Sunday", a:"Carmes", v:["free_entry","art","history"], d:8, s:"Former convent turned art museum—free on first Sunday—paintings, sculptures, 14th-century cloisters.", st:"Medieval convent. The cloister is stone and quiet. Inside: French paintings, sculptures, religious art. The space itself is art—the way light moves through windows, stone floor worn smooth. First Sundays free.", im:"Stone cloister columns. Light in squares on floor. Woman looking at painting.", t:"Rue de Metz, Carmes. First Sunday each month: free. Otherwise 4€. 10am–6pm Wed–Mon.", c:["free_entry","art","history_big"], r:"g", nn:"Musée des Augustins — Gratuit Premier Dimanche", ns:"Ancien couvent transformé en musée.", nst:"Un couvent médiéval converti. Le cloître.", nt:"Rue de Metz, Carmes. Premier dimanche."},
  {id:120, n:"Hôtel d\'Assézat — Renaissance Secret", a:"Carmes", v:["history","architecture","hidden"], d:6, s:"16th-century mansion built by pastel merchant when blue dye made Toulouse rich—courtyard is a secret.", st:"Pastel merchant built this. The courtyard is pink brick, arcaded, perfect. The inside is closed, but courtyard is semi-public (ask guard). It\'s quiet. Few tourists. Few locals. Interior world of Renaissance Toulouse—beauty for its own sake.", im:"Pink brick courtyard. Arches repeating. Silence. Shadows in afternoon light.", t:"Rue de Metz, Carmes. Open courtyard 10am–5pm. Ring bell; they often let people in. 2€ suggested donation.", c:["architecture","history","hidden"], r:"g", nn:"Hôtel d\'Assézat — Secret Renaissance", ns:"Manoir 16e siècle construit par marchand.", nst:"Un marchand de pastel privé a construit.", nt:"Rue de Metz, Carmes. Cour ouverte."},
  {id:121, n:"Cité de l\'Espace — Space Museum", a:"East", v:["weird","beautiful","museum"], d:20, s:"Full-size Ariane 5 rocket standing vertical—you walk inside—Mir space station module where cosmonauts lived.", st:"Real 50-meter rocket standing upright that took satellites to space. You walk underneath it, look up. Real Mir module floats suspended inside hangar. Cosmonauts lived in that metal tube. Detail work extraordinary.", im:"Staring up at 50-meter rocket. Cosmonaut\'s bunk visible through porthole windows. Cable and valve work.", t:"Cité de l\'Espace, Avenue Jean Gonord. 10am–6pm. 22€. East side, bus 3.", c:["museums","weird","day_trips"], r:"g", nn:"Cité de l\'Espace — Musée Spatial", ns:"Fusée Ariane 5 de taille réelle.", nst:"Une véritable fusée de 50 mètres dressée.", nt:"Cité de l\'Espace, Avenue Jean Gonord."},
  {id:122, n:"Basilica of Notre-Dame de la Daurade — Riverside", a:"Riverside", v:["greatest_hits","beautiful","sacred"], d:8, s:"Baroque church on Garonne—dome rebuilt after collapse—one of most beautiful churches in France.", st:"Built 15th century, damaged, rebuilt baroque. Dome is enormous, covered in gold leaf. Sit inside facing dome at 4pm. Light comes from side. Gold catches it and glows. You understand why people built things this heavy and beautiful for something invisible.\n\nIt earned it.", im:"Inside looking up at gold dome. Afternoon light hitting one side. Gold glowing orange.", t:"Rue de la Daurade, along Garonne. Open 8am–7pm daily. Free. Best 3–4pm.", c:["greatest_hits","sacred","beautiful"], r:"g", nn:"Basilique Notre-Dame de la Daurade — Fluvial", ns:"Église baroque sur la Garonne.", nst:"Construite au 15e siècle, reconstruite baroque.", nt:"Rue de la Daurade, le long de la Garonne."}];

className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Toulouse Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
