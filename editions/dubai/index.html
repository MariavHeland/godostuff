<script>
const P = [
  {id:1,n:"Burj Khalifa — World's Tallest Building",a:"Downtown Dubai",v:["architecture", "views", "modern"],d:120,s:"At 828 meters, the Burj Khalifa dominates Dubai's skyline—the world's tallest building offering observation decks at 124m and 148m.",st:"The Burj Khalifa rises 828 meters; the observation deck at 124 meters offers 360-degree views across Dubai and the Arabian Gulf. On clear days, you see the palm-shaped islands, the desert extending toward horizon, the sea. The higher observation deck at 148 meters is more expensive but rewards with eagle-eye perspective. The elevator ascent takes 60 seconds—your ears pop, your stomach lightens. The building contains 163 floors: residences, offices, hotels. The architecture is distinctive: a spiraling tower suggesting a desert flower. The structure sways in wind—engineers designed this intentional movement to handle wind loads. The Burj Khalifa represents Dubai's ambition: to construct superlatives, to dominate global imagination through scale. The building is functional yet primarily symbolic: proof that humans can construct unprecedented heights. Walking through the building's base, you encounter shopping and dining. The observation decks offer the primary tourist experience.",im:"A worker in 2010, standing on the completed Burj Khalifa's top, looking across Dubai, understanding he had helped construct the world's highest human-built structure.",t:"Located in Downtown Dubai. Accessible by metro. Tickets Rs. 150-300 depending on deck selection. Open 8am-midnight. Book online to skip queues. Best visited sunset or night for dramatic lighting. Photography excellent. Allow 2-3 hours including queues.",c:[],r:"g",nn:"برج خليفة",ns:"ارتفاعها 828 متر، أطول مبنى في العالم",nst:"برج خليفة يهيمن على أفق دبي. أرضية المراقبة على 124 مترا و 148 مترا. آفاق 360 درجة.",nt:"وسط دبي. يمكن الوصول بالمترو. تذاكر متغيرة. 8-24. احجز عبر الإنترنت."},
  {id:2,n:"Dubai Mall — Global Shopping Temple",a:"Downtown Dubai",v:["modern", "local"],d:120,s:"The world's largest shopping mall by area—1200+ stores representing global brands, local merchants, luxury, and commerce.",st:"Dubai Mall connects to the Burj Khalifa; together they form a commercial complex. The mall covers 550,000 square meters. Walking its corridors, you encounter every retail brand: luxury fashion (Chanel, Louis Vuitton), high street (H&M, Zara), electronics, home goods, food courts. The mall is climate-controlled—essential in Dubai's heat. The mall is constantly crowded: tourists, residents, families spending entire days. The mall has entertainment: aquariums, skating rinks, cinemas. The basement contains a gold souk (traditional market) featuring gold jewelry at wholesale prices. Walking Dubai Mall, you understand global commerce: brands replicated identically across continents, consumption as leisure activity, retail as tourism. The mall represents Dubai's aspiration toward global consumer culture. The architecture is modern: clean lines, abundant light, accessibility. The mall never closes; shopping is available 24/7.",im:"A shopper in 2010, entering the newly-opened Dubai Mall, amazed at the scale and brand diversity—not knowing the mall would become global retail reference.",t:"Located Downtown Dubai. Accessible by metro. Entry free; shopping is paid. Open 10am-midnight typically. Best visited morning or late evening when less crowded. Stores vary in hours. Bring comfortable shoes; the mall is vast. Photography generally allowed in common areas.",c:[],r:"g",nn:"مول دبي",ns:"أكبر مركز تسوق في العالم",nst:"مول دبي مع أكثر من 1200 متجر. ماركات عالمية وتجار محليون. أسواق ذهب تقليدية.",nt:"وسط دبي. يمكن الوصول بالمترو. الدخول مجاني. 10-24. صباحاً أو مساءً أقل ازدحاماً."},
  {id:3,n:"Dubai Fountain — Choreographed Water Art",a:"Downtown Dubai",v:["beautiful", "modern"],d:60,s:"A massive fountain complex with illuminated water jets choreographed to music—evening spectacle drawing thousands.",st:"The Dubai Fountain sits in a lake adjacent to the Burj Khalifa. The fountain shoots water jets 140+ meters high, synchronized to classical and contemporary music. Shows run every 30 minutes; each performance lasts 3-5 minutes. Visitors gather at the fountain promenade, the crowds growing as show time approaches. The music begins; lights illuminate; water arcs across the sky in synchronized patterns. The fountain is engineering spectacle: precise control of millions of gallons of water, perfect timing with music, dramatic lighting. The beauty is undeniable: the visual composition, the music selection, the synchronization. Yet the fountain also represents excess: massive water consumption in a desert city, electricity used for evening spectacle, commerce masking environmental cost. Watching the fountain, you are entertained yet aware of the contradiction: desert city using precious water for evening entertainment.",im:"An engineer in 2010, watching the fountain's first performance, seeing the water synchronize perfectly with music—engineering ambition made beautiful.",t:"Located in downtown Dubai, in the lake at Dubai Mall. Shows every 30 minutes from 1pm-11pm (longer schedule during peak season). Free to watch from the promenade. Restaurants nearby offer dining with fountain views (premium prices). Photography excellent. Arrive early for seating. Best shows: 9pm onward when crowds are visible in photos.",c:[],r:"g",nn:"نافورة دبي",ns:"نافورة ضخمة مع عروض مائية موسيقية",nst:"نافورة دبي تطلق المياه 140 متراً أعلى. مزامنة مع الموسيقى والإضاءة. عروض كل 30 دقيقة.",nt:"وسط دبي، بجانب برج خليفة. مجاني. 13-23 عروض. صور رائعة."},
  {id:4,n:"Old Town District (Al Fahidi) — Historic Heart",a:"Old Dubai",v:["history", "architecture", "hidden", "local"],d:90,s:"Historic neighborhoods with traditional architecture, wind towers, and museums—preserving pre-modern Dubai.",st:"Al Fahidi is Old Dubai: traditional houses with wind towers (natural cooling), narrow lanes, traditional markets. The area is preserved; modern high-rises surround it but don't invade. Walking Al Fahidi, you step back in time: simple buildings of stone, decorated doors, shaded alleys. The Sheikh Mohammed Centre for Cultural Understanding occupies a restored house; cultural tours explain Emirati traditions. The Dubai Museum, housed in Al Fahidi Fort (1787), documents Dubai's transformation from fishing village to megacity. The area includes traditional markets: spice souks, textile shops, gold merchants. Walking the lanes, you encounter locals and tourists. The area is authentically preserved—not museum-like yet genuinely historical. The contrast is profound: traditional architecture surrounded by glass towers visible beyond low buildings. Al Fahidi represents Dubai's past: a simple trading port before oil wealth transformed it.",im:"A merchant in 1950, operating from the same location in Al Fahidi where ancestors traded for centuries—unaware that petroleum would transform his city.",t:"Located in Old Dubai, accessible by metro and walking. Museums: Sheikh Mohammed Centre and Dubai Museum. Entry fees minimal. Open generally 8am-8pm. Best visited morning before heat peaks. Walking tours available through hotels. Photography generally allowed. Allow 2-3 hours.",c:[],r:"g",nn:"حي الفهيدي القديم",ns:"دبي التاريخية مع أبراج الرياح التقليدية",nst:"الفهيدي هي دبي القديمة. منازل تقليدية، أسواق، أبراج رياح للتبريد الطبيعي.",nt:"دبي القديمة. يمكن الوصول بالمترو. متاحف متعددة. صباحاً قبل الحرارة."},
  {id:5,n:"Palm Islands (Aerial View) — Engineering Ambition",a:"West Dubai",v:["modern", "architecture", "views"],d:120,s:"Three man-made archipelagos shaped like palm trees—visible from aircraft, representing Dubai's reclamation engineering.",st:"Palm Jumeirah, Palm Jebel Ali, and Palm Deira are man-made islands shaped like palm trees. Visible from aircraft, they represent Dubai's ambition: reshaping coastline, adding land through engineering. Palm Jumeirah was the first, completed in 2008. The island is developed: luxury villas, resorts, recreational facilities. Walking the island via beachfront, you encounter opulent residences. The beach is public; accessible by bridge from the mainland. The islands required massive engineering: breakwaters, dredging, pile-driving, land reclamation. The environmental cost was substantial: coral destruction, ecosystem disruption, sand mining impacts. Yet the islands remain impressive as engineering achievement. Viewing the islands from the air (scenic flights available) reveals the palm shape and scale. The islands symbolize Dubai: ambitious, audacious, willing to reshape geography through human will and capital. The contrast is stark: artificial islands in the sea while desert extends inland.",im:"An engineer in 2005, overseeing the dredging and pile-driving for the Palm, confident that human engineering could reshape the coast.",t:"Best viewed from aircraft (scenic flights 30-90 minutes, premium price). Alternatively, access by vehicle to Palm Jumeirah via bridge. Beach access public but crowded. Photography excellent from aircraft. Resorts and restaurants available on-island. Allow time for traffic; bridges can be congested.",c:[],r:"g",nn:"جزر النخيل",ns:"ثلاث جزر اصطناعية بشكل أشجار نخيل",nst:"جزر النخيل: هندسة استثنائية تعيد رسم الساحل. مشاهدة من الجو أفضل.",nt:"رحلات جوية 30-90 دقيقة. أو زيارة برية. التصوير رائع من الجو."},
  {id:6,n:"Gold Souk & Spice Souk — Traditional Markets",a:"Old Dubai",v:["local", "food", "hidden"],d:120,s:"Traditional markets where gold and spices are traded—authentic commerce in modern Dubai.",st:"The Gold Souk is a narrow lane with hundreds of jewelry shops. Gold is displayed openly: bracelets, necklaces, rings, chains. Vendors negotiate prices by weight and purity. The souk is loud, chaotic, thrilling. Bargaining is expected. The gold is exceptional quality; prices are competitive. Walking the souk, you encounter vendors, buyers, tourists. The atmosphere is commercial yet social: relationships between regular customers and vendors, gossip and news exchanged. The Spice Souk adjoins the Gold Souk. Vendors display spices in open sacks: turmeric, cardamom, saffron, cinnamon, others. The smell is intoxicating. The spices supply the region's cooking: essential for traditional cuisine. Both souks represent pre-modern commerce: face-to-face negotiation, relationship-based transactions, knowledge of products, price variations by relationship and circumstance. The souks are tourist destinations yet remain functioning markets serving local needs.",im:"A gold merchant in 1980, operating from the same shop in the souk, negotiating with customers as his father did—tradition persisting.",t:"Located in Old Dubai. Gold Souk and Spice Souk near Deira. Accessible by metro and walking. Best visited late afternoon when heat decreases and markets activate. Bring cash; bartering expected. Photography varies by vendor; ask permission. Allow 2-3 hours for full exploration.",c:[],r:"g",nn:"سوق الذهب وسوق التوابل",ns:"أسواق تقليدية للذهب والتوابل",nst:"سوق الذهب: مئات متاجر المجوهرات. المساومة متوقعة. سوق التوابل: رائحة لا تُنسى.",nt:"دبي القديمة، ديرة. مساءً أفضل من صباح. احضر نقداً. التصوير بإذن."},
  {id:7,n:"Sheikh Mohammed Centre for Cultural Understanding — Emirati Traditions",a:"Old Dubai",v:["local", "history", "beautiful"],d:90,s:"A cultural institution explaining Emirati traditions, customs, religion, and hospitality—bridging cultures.",st:"The Sheikh Mohammed Centre occupies a beautifully restored traditional house. The centre offers cultural tours explaining Emirati history, Islam, customs, daily life. Knowledgeable guides contextualize Emirati traditions: the role of hospitality in Bedouin culture, Islamic principles, gender roles, family structures. The centre hosts cultural events: traditional dinners, fashion shows, craft demonstrations. The experience is educational and respectful: explaining culture without stereotyping, addressing misconceptions. The centre emphasizes that Emirates is multicultural: majority of residents are expatriates from dozens of countries. Yet Emirati culture persists as the nation's foundation. Visiting the centre offers depth beyond tourist superficiality: understanding actual cultural practices and values. The restoration of the traditional house itself is impressive: maintaining historical authenticity while providing contemporary comfort.",im:"An Emirati guide in 2000, explaining traditions to international visitors, bridging the gap between Emirati culture and global visitors.",t:"Located in Al Fahidi, Old Dubai. Tours available daily. Reservations recommended. Fees modest. Traditional dinners available (premium price, spectacular experience). Photography usually allowed. English tours available. Allow 1-2 hours for basic tour; 3+ hours for dinner experiences.",c:[],r:"g",nn:"مركز الشيخ محمد لفهم الثقافة",ns:"مركز ثقافي يشرح التقاليد الإماراتية",nst:"مركز يقدم الثقافة الإماراتية للزوار. جولات، عشاء تقليدي، حرف يدوية.",nt:"حي الفهيدي القديم. جولات يومية. حجوزات موصى بها. رسوم معقولة."},
  {id:8,n:"Dubai Museum — City Transformation",a:"Old Dubai",v:["history", "beautiful"],d:90,s:"A museum documenting Dubai's transformation from fishing village to megacity—housed in a historic fort.",st:"Dubai Museum occupies Al Fahidi Fort, built in 1787. The fort's exterior walls are original; inside, exhibits chronicle Dubai's evolution. Early sections show traditional life: pearling boats, simple housing, desert trade. Subsequent sections document the discovery of oil (1966), the subsequent transformation, modern development. Exhibits include artifacts, photographs, reconstructed environments. The transformation depicted is remarkable: a fishing village of 30,000 in 1960 to a metropolis of millions by 2020. The museum contextualizes Dubai's rise: geographic location advantageous for trade, the discovery of oil funding development, visionary leadership embracing modernization. Walking the museum, you understand Dubai's trajectory: not inevitably destined for greatness but result of specific decisions and fortune. The museum raises questions: Was the transformation beneficial? What was lost in the modernization? The museum doesn't answer; it presents facts for visitor interpretation.",im:"A child in 1970, walking through old Dubai, unaware that their city would transform into a global metropolis within their lifetime.",t:"Located in Al Fahidi Fort, Old Dubai. Accessible by metro and walking. Modest entry fee. Open 8am-8pm daily. English signage available. Allow 1-2 hours. Photography allowed in most areas. The exhibits are well-organized and informative.",c:[],r:"g",nn:"متحف دبي",ns:"متحف يوثق تحول دبي من قرية إلى مدينة عظيمة",nst:"متحف دبي يحكي قصة التحول. من القرية البسيطة إلى الحديثة. الدور النفط.",nt:"قلعة الفهيدي. 8-20. رسم مدخل متواضع. تصوير مسموح."},
  {id:9,n:"Burj Al Arab — Iconic Luxury Hotel",a:"Jumeirah",v:["architecture", "modern", "beautiful"],d:90,s:"A sail-shaped luxury hotel—architectural icon and symbol of Dubai's ambition, accessible by boat or bridge.",st:"Burj Al Arab is shaped like a billowing sail. The hotel occupies an artificial island; access is via private bridge. The architecture is distinctive: dramatic, visible from across Dubai. The interior is opulent: gold-plated surfaces, crystal chandeliers, marble, precious materials. The lobby's scale is overwhelming: a soaring atrium. The hotel contains suites only—no standard rooms. The cheapest rooms cost thousands of dollars per night. Most visitors cannot afford to stay; yet boat tours circumnavigate the island, and you can dine at restaurants accessible to non-residents. The hotel represents luxury redefined: not merely comfortable but extravagant. The architecture is recognizable globally; the building is synonymous with Dubai's opulence. Walking the entrance or taking a boat tour, you encounter the scale of ambition: a hotel designed to impress, to announce wealth, to symbolize Dubai's status. The building is beautiful despite its ostentation—or perhaps because its ostentation is executed with such confidence.",im:"An engineer in 1999, seeing the completed Burj Al Arab, understanding it would become Dubai's most recognizable symbol.",t:"Located on Jumeirah Beach. Access restricted to guests and restaurant patrons. Public boat tours available (circumnavigate the island, no interior access). Dining reservations required for restaurant access. Photography excellent from the beach and boat tours. Best photographed from the opposite shore of the bay.",c:[],r:"g",nn:"برج العرب",ns:"فندق فاخر على شكل شراع",nst:"برج العرب أيقونة معمارية. فندق فاخر على جزيرة اصطناعية. هندسة درامية.",nt:"جميرة. جولات قارب. مطاعم تتطلب حجز. التصوير من الشاطئ."},
  {id:10,n:"Jumeirah Beach Park & Public Beach",a:"Jumeirah",v:["nature", "local", "beautiful"],d:120,s:"Public beach with parks, recreational facilities, and golden sand—where Dubaiians and visitors experience Arabian Gulf.",st:"Jumeirah Beach is public; accessible to all. The beach is beautiful: golden sand, calm waters (breakwaters prevent wave action), palm trees providing shade. The park includes facilities: playgrounds, restaurants, changing rooms, parking. The beach is crowded on weekends; weekdays are quieter. Swimming is safe and pleasant. The water is warm year-round; winter (December-February) is optimal swimming season. Standing in the water, you contemplate the Arabian Gulf: the sea that has sustained the region for millennia through pearl diving and trade. The beach represents Dubai's relationship with its maritime heritage: modern recreation on the same waters where ancestors fished and dove for pearls. The beach is crowded yet welcoming; you encounter residents of dozens of nationalities. The park and beach offer respite from urban intensity: green space, water, relaxation. The contrast is stark: buildings visible beyond the beach, yet the beach offers escape from urban congestion.",im:"A pearl diver in 1920, diving in these same waters seeking sustenance—their descendants now relaxing on the beach above.",t:"Located in Jumeirah, west of central Dubai. Accessible by car or taxi. Parking available (fee). Facilities: restaurants, changing rooms, lifeguards, umbrellas. Swimming: safe year-round, optimal December-February. Photography excellent. Best visited early morning or late afternoon to avoid heat and crowds.",c:[],r:"g",nn:"شاطئ جميرة",ns:"شاطئ عام مع متنزهات وتسهيلات ترفيهية",nst:"شاطئ جميرة عام. رمال ذهبية، مياه دافئة. تسهيلات حديثة.",nt:"جميرة، غرب دبي. مواقف سيارات. أفضل صباحاً أو مساءً."},
  {id:11,n:"Dubai Desert Safari — Dune Experience",a:"Desert",v:["nature", "local"],d:240,s:"Desert excursion with dune bashing, camel rides, and traditional camp experiences—experiencing Dubai's sandy hinterland.",st:"Thirty kilometers outside Dubai, the desert begins. Desert safaris depart afternoons, returning after sunset. Vehicles race across dunes—thrilling, violent—your body thrown as the vehicle crests dunes and slides down. Then camel rides: slower, traditional, offering perspective from 2 meters height. Evening camps feature traditional tents, henna painting, belly dancing, and barbecue dinners. The experience is touristy yet offers genuine desert encounter: stars becoming visible as darkness falls, the vastness of sand, the temperature drop after sunset. The desert represents Dubai's hinterland: the empty space from which the city emerged. Walking the dunes at night, you feel isolation and scale: humanity tiny against endless sand. The safari experience is organized tourism yet offers escape from urban Dubai. The desert is genuinely beautiful—sunset and sunrise reveal colors (oranges, reds, purples) invisible during the day.",im:"A Bedouin in 1950, living in the desert, unaware that tourism would eventually bring visitors to experience the landscape his people inhabited.",t:"Tours depart from hotels. Afternoon departures: 3-5pm, return 8-10pm. Evening camps included. Cost moderate (shared tours) to expensive (private tours). Photography excellent at sunset and sunrise. Wear comfortable clothes; bring sunscreen. Camel rides are rough; not advised for back issues.",c:[],r:"g",nn:"سفاري دبي الصحراء",ns:"رحلة صحراوية مع القيادة والإبل والمخيم",nst:"سفاري صحراء 30 كم خارج دبي. قيادة الكثبان، ركوب الإبل، مخيم تقليدي.",nt:"جولات من الفنادق. بعد الظهر 15-17. تصوير رائع عند الغروب."},
  {id:12,n:"Dubai Mall (Aquarium & Underwater Zoo)",a:"Downtown Dubai",v:["nature", "modern"],d:120,s:"A massive public aquarium and underwater zoo showcasing Arabian Gulf marine life—connected to Dubai Mall.",st:"The Dubai Aquarium houses a 10-million-liter tank containing over 33,000 marine species. Sharks, rays, groupers, and hundreds of fish species. The main tank features a massive acrylic panel; fish swim at eye level. The underwater zoo offers walk-through tunnels—the experience of being submerged in the ocean. The facility is impressive: the engineering required to maintain such a tank, the biodiversity on display, the scale. The experience is meditative: watching fish, contemplating ocean depths, understanding marine ecosystems. The facility is very popular; crowded especially on weekends and school holidays. The aquarium represents Dubai's relationship with the sea: recreational and educational rather than utilitarian (fishing is no longer essential to the economy). The facility raises environmental questions: Is capturing and confining marine life justified by education? The aquarium educates; yet the act of confinement reflects modern human tendencies.",im:"An engineer in 2010, watching the aquarium fill for the first time, observing the fish acclimate to the tank.",t:"Located in Dubai Mall. Accessible by metro. Entry fee moderate. Open 10am-midnight. Best visited in morning before crowds. Photography with flash restricted (harms aquatic life). The tunnel experience is most dramatic. Allow 2-3 hours.",c:[],r:"g",nn:"أكواريوم دبي",ns:"حوض سمك ضخم مع حياة بحرية",nst:"أكواريوم دبي 10 ملايين لتر. 33 ألف نوع بحري. نفق تحت الماء.",nt:"مول دبي. صباحاً أقل ازدحاماً. 10-24. تصوير بدون فلاش."},
  {id:13,n:"Dubai World Trade Centre — Commercial Hub",a:"Downtown Dubai",v:["modern", "architecture"],d:60,s:"A historic 1979 building representing Dubai's commercial aspirations—still hosting trade conferences.",st:"The Dubai World Trade Centre was the tallest building in the Middle East when completed in 1979. The cylindrical building is distinctive: modern design for its era. The building remains significant: annual trade conferences, exhibitions. The exterior architecture reflects 1970s modernity: clean lines, functional design. Walking past the building, you understand Dubai's historical trajectory: what was cutting-edge in 1979 seems modest beside Burj Khalifa (completed 2010). Yet the building represents a moment: Dubai's commitment to trade and commerce as its identity. The building is functioning business center; public access is limited. The significance is external: observing the architecture and recognizing its historical role in Dubai's development.",im:"An entrepreneur in 1980, attending a trade conference in the newly-completed World Trade Centre, imagining Dubai's commercial future.",t:"Located in downtown Dubai. Exterior accessible; interior access limited. Best viewed from the street or nearby locations. Photography excellent. Nearby cafés offer rest. The building represents historical milestone in Dubai's architecture.",c:[],r:"g",nn:"مركز دبي للتجارة العالمية",ns:"مبنى تاريخي من 1979، أطول مبنى في الشرق الأوسط حينها",nst:"مركز التجارة العالمية 1979. أسطواني مميز. لا يزال مركز تجاري.",nt:"وسط دبي. الوصول الخارجي فقط عادة. تصوير من الشارع."},
  {id:14,n:"Dubai Museum of the Future (MOTF) — Futurism",a:"Downtown Dubai",v:["modern", "art"],d:120,s:"A museum exploring future technologies and possibilities—interactive exhibits imagining humanity's next chapters.",st:"The Museum of the Future is architecturally striking: a massive torus with Arabic calligraphy in negative space. Inside, exhibits explore artificial intelligence, space exploration, robotics, biotechnology. The museum is interactive: visitors engage with exhibits, not merely observe. The experience is forward-looking: imagining possibilities decades hence. The museum represents Dubai's self-image: innovative, technological, future-oriented. The exhibits are educational, somewhat speculative. The architecture is impressive; the building itself is artwork. The museum is expensive; yet the experience justifies cost for those interested in technology and futures. The museum represents humanity's hope: technological solutions to global problems. Yet the optimism is tempered with awareness that technology alone won't solve systemic issues. The museum is newer and less crowded than major sites; the experience is more contemplative.",im:"A designer in 2020, completing the MOTF, imagining that visitors would be inspired by possible futures.",t:"Located near Trade Centre metro station. Entry fee expensive but worthwhile. Open 10am-7pm. Best visited morning. Photography allowed in most areas; restricted in certain exhibits. Allow 3-4 hours for thorough experience. Book online for discounts.",c:[],r:"g",nn:"متحف المستقبل",ns:"متحف يستكشف التقنيات المستقبلية والاحتمالات",nst:"متحف المستقبل معمارياً مميز. عروض تفاعلية. الذكاء الاصطناعي، الفضاء.",nt:"بالقرب من محطة مترو التجارة. تذاكر باهظة الثمن. 10-19. احجز عبر الإنترنت."},
  {id:15,n:"Jumeirah Mosque — Islamic Architecture",a:"Jumeirah",v:["history", "beautiful", "local"],d:75,s:"A white marble mosque featuring Fatimid architecture—accessible to non-Muslims for understanding Islamic traditions.",st:"Jumeirah Mosque is one of Dubai's most beautiful buildings: white marble, domed roof, twin minarets. The mosque is contemporary (1998) yet traditional in design: Fatimid architectural style. Non-Muslims can enter outside prayer times (a remarkable openness). Visitors remove shoes, dress respectfully. The interior is serene: cool marble, geometric patterns, calligraphy. The mosque educator explains Islamic practices, traditions, beliefs. Understanding Islamic architecture and prayer practices is educational. The mosque balances tradition with modernity: ancient Islamic design meets contemporary engineering and materials. The mosque is operating religious institution; visitors respectfully observe. The experience offers insight into Islam's aesthetic traditions and spiritual practices. The accessibility to non-Muslims reflects Dubai's cosmopolitanism: a Muslim-majority nation welcoming visitors to sacred spaces.",im:"A Muslim worshipper in 1999, praying in the newly-completed mosque, performing daily salah as Muslims have for centuries.",t:"Located in Jumeirah. Accessible by metro and walking. Entry free outside prayer times. Photography allowed outside prayer spaces. Respectful dress required (cover shoulders, knees). Women may need head coverings. Allow 45-60 minutes. Tours available; reservations recommended.",c:[],r:"g",nn:"جامع جميرة",ns:"مسجد رخام أبيض بعمارة فاطمية",nst:"جامع جميرة معماري جميل. رخام أبيض، قبة، منارتان. مفتوح للزوار.",nt:"جميرة. مفتوح خارج أوقات الصلاة. ملابس احترامية. تصوير مسموح."},
  {id:16,n:"Hatta Dam — Mountain Escape",a:"East Dubai",v:["nature", "beautiful", "hidden"],d:180,s:"A dam in the Hajar Mountains 50km east—offering mountain scenery and recreation far from urban Dubai.",st:"Hatta Dam is 50 kilometers east of central Dubai in the Hajar Mountains. The drive through mountains is scenic: winding roads, stone villages, dramatic rock formations. The dam creates a lake surrounded by mountains. The area offers hiking, swimming, photography. The contrast with urban Dubai is stark: quiet, natural, minimal development. The mountains are relatively dry; vegetation is sparse. Yet the landscape is dramatically beautiful: geological formations, light playing across rock, the scale of mountains. The area represents Dubai's geographic diversity: desert within kilometers gives way to mountains. The drive requires proper vehicle (high clearance recommended). Weather can be extreme: summer heat, winter can bring rain. The area is popular with residents seeking weekend escapes from city. The dam area has basic facilities; bring water and supplies.",im:"A mountain villager in 1950, living in these mountains, unaware that future generations would drive from a megacity to escape into these mountains.",t:"Located 50km east of Dubai. Drive requires high-clearance vehicle or 4WD recommended (regular cars can drive but discomfort). Road is winding. Parking available at dam. Swimming safe in designated areas. Hiking trails available. Allow full day for experience. Best visited October-April when heat is manageable.",c:[],r:"g",nn:"سد هتا",ns:"سد في جبال الحجر 50 كم شرقاً",nst:"سد هتا بيئة جبلية. بحيرة محاطة بالجبال. هروب من المدينة.",nt:"50 كم شرقاً. سيارة برية مفضلة. الخريف-الربيع أفضل."},
  {id:17,n:"Bastakiya Quarter (Old Town Walking) — Restoration",a:"Old Dubai",v:["history", "architecture", "hidden"],d:90,s:"Historic quarter with restored traditional architecture, wind towers, and small galleries—preserved heritage.",st:"Bastakiya is adjacent to Al Fahidi, another preserved historical neighborhood. The quarter's buildings are restored traditional houses: stone construction, wind towers, courtyards. Small galleries, restaurants, and museums occupy restored buildings. Walking the narrow lanes, you encounter the old Dubai: simple, human-scaled, connected to climate and place. The architecture demonstrates sophisticated passive cooling: wind towers capture breezes, directing them into buildings. The buildings demonstrate adaptation to desert climate before mechanical air conditioning. The quarter represents heritage preservation: choosing to restore and maintain old buildings despite pressure to demolish for development. The atmosphere is peaceful; tourists and locals share narrow lanes. Small galleries showcase local art. Cafés serve traditional coffee and tea. The quarter is less commercialized than other old-town tourist areas; the atmosphere is more authentic.",im:"A resident in 1980, living in a Bastakiya house before restoration, unaware that future generations would visit the restored buildings.",t:"Located adjacent to Al Fahidi, Old Dubai. Accessible by metro and walking. Wandering is self-guided; galleries and restaurants have varying hours. Photography encouraged. Allow 1-2 hours for leisurely exploration. Best visited morning before heat peaks.",c:[],r:"g",nn:"حي البستكية",ns:"حي تاريخي محفوظ مع عمارة تقليدية",nst:"حي البستكية مستعاد. منازل حجرية، أبراج رياح. أسواق صغيرة ومعارض.",nt:"بجانب الفهيدي. 1-2 ساعات. صباحاً أقل حرارة."},
  {id:18,n:"Dubai Creek Harbour — New Mixed-Use Development",a:"East Dubai",v:["modern", "local"],d:120,s:"A contemporary waterfront development combining residences, offices, retail—future of Dubai urban living.",st:"Dubai Creek Harbour is a new development on Dubai's historic creek. The project includes residential towers, office buildings, restaurants, shops, parks. The design emphasizes sustainability: green buildings, public spaces, waterfront access. The development is ongoing; walking through reveals construction alongside completed sections. The project represents contemporary urban planning: mixed-use development, sustainable design, walkability. The creek connection is historical: the creek was the foundation of Dubai's early commerce. Today's development monetizes the waterfront while maintaining public access. The atmosphere is modern yet emerging. Restaurants and cafés operate; shops open. The development attracts both residents and visitors. The contrast with old Dubai is striking: modern design beside the same creek where merchants traded centuries ago. The development represents Dubai's vision: tradition acknowledged through creek proximity, yet thoroughly modern in design and function.",im:"A planner in 2015, envisioning Dubai Creek Harbour, imagining how residents would live and work on the historic creek.",t:"Located in east Dubai. Accessible by metro and walking. The development is large; walking the full extent requires hours. Restaurants and shops accessible. Photography excellent. The waterfront promenade is public and beautiful. Allow 2-3 hours.",c:[],r:"g",nn:"ميناء خور دبي",ns:"تطوير عصري على الخور التاريخي",nst:"ميناء خور دبي سكان وتجارة وعروض. تطوير مستدام. الوصول العام للخور.",nt:"شرق دبي. محطة مترو قريبة. 2-3 ساعات للاستكشاف."},
  {id:19,n:"Al Fahidi Historic District Night Walk — Heritage Lights",a:"Old Dubai",v:["history", "beautiful", "local"],d:90,s:"Evening walk through historic district with atmospheric lighting—romantic exploration of preserved heritage.",st:"The Al Fahidi Historic District transforms at night: strategic lighting illuminates buildings, creating dramatic shadows and highlights. The traditional architecture becomes ethereal: wind towers silhouetted against night sky, narrow lanes lined with soft light. The evening atmosphere is peaceful: fewer tourists than daytime, cooler temperature, different sensory experience. Walking evening lanes, you contemplate Dubai's layers: the preserved old city embedded within the modern metropolis. The lighting design is intentional: heritage is celebrated through thoughtful illumination. Restaurants and cafés remain open; evening is social time. The experience is romantic: couples walking hand-in-hand, the history palpable, the beauty undeniable. Photography is excellent at night: the lighting creates compositions unavailable during day. The night walk offers appreciation for heritage preservation: the choice to maintain these buildings, to honor Dubai's past while building future.",im:"A heritage conservationist in 2010, watching the newly-lit historic buildings, satisfied that the old city would be preserved for future generations.",t:"Located in Al Fahidi, Old Dubai. Best visited after sunset (timing varies by season; 6pm-7pm typical). Accessible by metro. Wandering is self-guided. Restaurants and cafés open. Photography excellent with night lighting. Allow 1-2 hours. Bring light layers; evening can cool.",c:[],r:"g",nn:"حي الفهيدي ليلاً",ns:"مشي مسائي في الحي التاريخي المضاء",nst:"حي الفهيدي بالإضاءة الليلية. معماري جميل. أجواء رومانسية.",nt:"بعد الغروب. 18-19 تقريباً. تصوير رائع بالليل."},
  {id:20,n:"Deira Corniche — Waterfront Promenade",a:"Old Dubai",v:["local", "beautiful"],d:90,s:"A waterfront promenade in traditional Deira district—where locals exercise, socialize, and contemplate the creek.",st:"Deira Corniche runs along Dubai Creek's edge. The promenade is tree-lined: shade and greenery providing respite from heat. Locals jog, walk, sit on benches. The creek reflects the development on both sides: traditional buildings in Deira, modern buildings across the creek. Fishing boats and traditional dhows occupy portions of the creek—vessels connected to maritime heritage. The atmosphere is local: not primarily touristic but residents' space. Evening is most active: families, couples, joggers filling the promenade. The breeze from the creek is cooling: temperature drops noticeably. Walking the corniche, you connect with Dubai's maritime past: the creek was the reason for Dubai's existence, the water that sustained pearl diving and trade. Modern Dubai extended inland; yet the creek remains central to residents' relationship with the city.",im:"A resident in 1990, walking the recently-created corniche, connecting with the creek that ancestors relied upon for livelihood.",t:"Located in Deira, Old Dubai. Accessible by metro and walking. Open 24/7. Best visited morning before heat or evening when cooler. Photography excellent of creek and reflections. Allow 1-2 hours for leisurely walk. Waterfront restaurants nearby.",c:[],r:"g",nn:"واجهة ديرة المائية",ns:"طريق مائي في الحي التقليدي",nst:"واجهة ديرة تخطط الخور. مظللة بالأشجار. سكان محليون يمارسون الرياضة.",nt:"ديرة، دبي القديمة. 24/7. مساءً أجمل."},
  {id:21,n:"Dubai Shopping Festival & Events — Seasonal Commerce",a:"Citywide",v:["local", "modern"],d:180,s:"Annual shopping festival featuring sales, entertainment, cultural events—celebration of consumer culture.",st:"The Dubai Shopping Festival (DSF) runs January-February annually. Shops offer sales: discounts 50-75% on goods. Malls host entertainment: live performances, contests, activities. The festival atmosphere is festive: crowds shopping, families attending events, the energy of commerce. The festival brings visitors globally; hotels fill; restaurants bustle. The festival is celebrated marketing: an excuse to shop, to gather, to celebrate consumption. Beyond shopping, there are cultural events: fashion shows, concerts, art exhibitions. The festival represents Dubai's identity: commerce and consumption as cultural celebration. Visiting during the festival immerses in Dubai's commercial spirit. The crowds are significant; patience required. Yet the festival energy is contagious: the collective excitement of shopping, the deals, the entertainment. The festival is major annual event; hotels and flights book months in advance.",im:"A shopper in 2000, experiencing the first Dubai Shopping Festival, exhilarated by the commercial energy and deals.",t:"Occurs January-February annually (check exact dates). Runs 3-5 weeks. Shops throughout Dubai participate. Major events in malls. Photography encouraged. The festival creates massive crowds; hotel availability essential. Shopping in malls features sales; streets feature vendor tents with discounted goods.",c:[],r:"g",nn:"مهرجان دبي للتسوق",ns:"مهرجان سنوي للتسوق والترفيه",nst:"مهرجان التسوق يناير-فبراير. تخفيضات كبيرة. أحداث ترفيهية. احتفال بالتسوق.",nt:"يناير-فبراير سنوياً. 3-5 أسابيع. حجز فندقي قبل التاريخ."},
  {id:22,n:"Arabian Ranches — Equestrian Community",a:"West Dubai",v:["local", "nature"],d:90,s:"A gated residential community featuring horse stables and ranches—combining traditional Arabian horse culture with modern comfort.",st:"Arabian Ranches is a planned community designed around horses and ranch lifestyle. Residents include equestrians, wealthy families seeking space and privacy. The community features stables, riding trails, open spaces—a stark contrast to urban density. Walking Arabian Ranches, you encounter spacious villas, well-maintained grounds, affluent residents. The horse culture reflects Arabian heritage: horses were central to Bedouin life. Modern Arabian Ranches represents appropriation of tradition: the lifestyle romanticized and monetized for wealthy residents. The community is primarily gated; public access limited. Yet driving through reveals the scale: extensive development devoted to equestrian culture. The contrasts are striking: ranches in the desert, luxury homes, traditional culture commercialized for contemporary consumption. The community represents Dubai's wealth: the ability to develop extensive communities for specialized purposes (horse ranches) that most world cities couldn't justify.",im:"An equestrian in 2000, moving to Arabian Ranches, able to pursue horse culture within a modern city.",t:"Located west of central Dubai. Accessible by car (taxi expensive). Community is primarily private; public access limited. Observe from outside community. Driving through reveals architecture and scale. Allow 30-45 minutes for viewing. Photography from outside acceptable.",c:[],r:"g",nn:"الحدائق العربية",ns:"مجتمع سكني مع إسطبلات وحياة الحدائق",nst:"حدائق عربية لمحبي الخيول. فلل فاخرة. ثقافة الحصان التقليدية.",nt:"غرب دبي. الوصول محدود. مراقبة من الخارج. 30-45 دقيقة."},
  {id:23,n:"Zabaeel Park & Al Fahidi Crossing — Urban Waterfront",a:"Downtown Dubai",v:["nature", "local", "beautiful"],d:90,s:"A recently developed park spanning Dubai Creek with walking bridges—new urban green space.",st:"Zabaeel Park is a contemporary urban park incorporating historic elements and new design. Walking bridges cross Dubai Creek, providing views of both Deira and Bur Dubai. The park includes landscaped areas, water features, recreational spaces. The park represents Dubai's commitment to green space and public access: reclaiming creek edges for residents. Walking the park, you encounter joggers, families, residents escaping urban intensity. The bridges offer vantage points: seeing the creek from different elevations, contemplating the waterway central to Dubai's history. The park is well-maintained, modern, welcoming. The experience combines nature with urban proximity: parks within the city, creek connectivity, public space for all residents. The park represents Dubai's vision: balancing development with livability, monetization with public access.",im:"A planner in 2010, envisioning Zabaeel Park, imagining residents reconnecting with the creek through public parkland.",t:"Located across Dubai Creek, near Al Fahidi. Accessible by metro and walking bridges. Entry free. Open dawn to dusk. Parks with seating, shade. Photography excellent. Allow 1-2 hours. Early morning or early evening best when temperature moderate.",c:[],r:"g",nn:"حديقة الزبيل",ns:"حديقة حضرية حديثة مع جسور فوق الخور",nst:"حديقة الزبيل تربط الخور. مناظر طبيعية، فضاء عام. الوصول حر.",nt:"فوق خور دبي. مجاني. الفجر إلى الغسق. صباحاً أو مساءً أفضل."},
  {id:24,n:"Al Boom Tourist Village — Heritage Experience",a:"Old Dubai",v:["history", "local"],d:120,s:"A heritage village recreating traditional maritime life—boutique hotels, restaurants, and cultural performances.",st:"Al Boom Tourist Village recreates traditional Dubai life. Buildings are designed resembling historic structures: traders' homes, warehouses. The village includes boutique hotels, restaurants serving traditional cuisine, craft demonstrations. Cultural performances occur: traditional music, dance. The village is semi-authentic: the atmosphere is preserved; the function is modern tourism. Walking the village, you encounter re-creations of historic life: demonstrations of pearl diving, traditional crafts. The experience is educational, somewhat theatrical. The restaurants serve food based on traditional recipes. The hotels offer accommodation with heritage aesthetic. The village represents heritage commodification: tradition packaged for tourist consumption. Yet the experience is respectful, educational, welcoming. The village is less crowded than major tourist sites; the experience is more intimate. The setting beside the creek connects to Dubai's maritime heritage.",im:"A trader in 1920, operating from an actual building on the creek, unaware that descendants would recreate similar structures for tourists.",t:"Located in Old Dubai along the creek. Accessible by metro and walking. Accommodation available (reserve in advance). Restaurants operate for lunch and dinner. Cultural performances in evenings (check schedule). Photography allowed. Allow 2-4 hours.",c:[],r:"g",nn:"قرية البوم السياحية",ns:"قرية تراث تحاكي الحياة البحرية التقليدية",nst:"قرية البوم تعيد الحياة التقليدية. فنادق بوتيك، مطاعم، عروض ثقافية.",nt:"دبي القديمة، بالقرب من الخور. فنادق وعروض. 2-4 ساعات."},
  {id:25,n:"Sheikh Zayed Road — Corporate Skyline",a:"Central Dubai",v:["architecture", "modern"],d:60,s:"Dubai's main thoroughfare featuring high-rise office and residential buildings—corporate landscape defining modern Dubai.",st:"Sheikh Zayed Road extends from downtown toward Abu Dhabi. The road is lined with high-rises: corporate offices, luxury residences, hotels. Walking the road (or observing from vehicles), you encounter Dubai's commercial core: where business happens, where capital concentrates. The architecture varies: buildings from different decades reveal architectural evolution. The road is often congested; driving is slow. The road is primarily vehicular; pedestrian experience is secondary. Yet the streetscape is impressive: the scale of development, the density of tall buildings, the corporate ambition. The road represents Dubai's identity: business-focused, modern, capital-intensive. Photography from vehicles or walkways captures skyline. The road offers sense of Dubai's economic significance: the concentrate of business activity, the infrastructure supporting commerce.",im:"A CEO in 2000, ascending to a high-rise office on Sheikh Zayed Road, conducting business from the tallest building available at that time.",t:"Located in central Dubai. Accessible by metro, car, or taxi. Pedestrian walking possible but not ideal (hot, congested). Photography from moving vehicle or stopping points. Best views at dawn or dusk when light is dramatic. Allow 30-60 minutes for observation.",c:[],r:"g",nn:"شارع الشيخ زايد",ns:"طريق رئيسي مع ناطحات سحاب فاخرة",nst:"شارع الشيخ زايد المراكز التجارية. مكاتب فاخرة. مناظر معمارية.",nt:"وسط دبي. مترو، تاكسي. تصوير من السيارات أو الخطوات."},
  {id:26,n:"Dubai Spice Museum — Aromatic Heritage",a:"Old Dubai",v:["history", "hidden"],d:60,s:"A museum documenting the history of spice trade—artifacts, samples, and information about Dubai's spice commerce.",st:"The Dubai Spice Museum occupies a traditional house. The museum documents Dubai's role in the spice trade: how spices flowed through Dubai connecting Asia and Europe. Exhibits include historic spice samples (though no longer aromatic), trade routes maps, merchant histories. The museum contextualizes Dubai's commerce: before oil, spice trade was primary economic activity. Walking the museum, you understand historical commerce: how spices were valuable as precious metals, how trade networks connected distant regions, how merchants became wealthy through spice commerce. The museum is modest; the experience is educational but not elaborate. The space is intimate: small rooms in traditional house. The smell of the historic spice souk outside the museum lingers. The museum complements market visits: understanding historical context of contemporary spice trading. The museum reveals Dubai's transformation: from spice-trade town to oil-wealthy megalopolis.",im:"A spice merchant in 1900, trading fragrant goods from the location where the museum now stands, unaware of future transformations.",t:"Located in Old Dubai, Spice Souk area. Entry fee modest. Open 10am-4pm typically. Photography allowed. Allow 45-60 minutes. The museum is small; the experience is concentrated. Nearby Spice Souk visit complements the museum.",c:[],r:"g",nn:"متحف دبي للتوابل",ns:"متحف يوثق تاريخ تجارة التوابل",nst:"متحف التوابل يكشف دور دبي في التجارة. عينات عطرية، خرائط.",nt:"دبي القديمة. 10-16 عادة. رسم صغير. 45-60 دقيقة."},
  {id:27,n:"Dune Bashing (Evening Experience) — Adrenaline Adventure",a:"Desert",v:["nature", "modern"],d:240,s:"Off-road vehicle desert adventure—high-speed dune driving followed by sunset and traditional camp experience.",st:"Dune bashing involves riding in 4WD vehicles across desert dunes at high speed. The experience is thrilling: your body thrown as vehicles crest dunes and descend at angles that seem impossible. Drivers are skilled; vehicles are designed for desert. The adrenaline rush is genuine. After driving, the group gathers as sunset transforms the desert: oranges, reds, purples across the sky and sand. Traditional camps feature Bedouin hospitality: coffee and dates, henna painting, shisha smoking, belly dancing, traditional dinner. The evening is festive: music, socializing, the desert's magic at night. The experience is organized tourism; yet the genuine desert encounter is real. The contrast between high-speed driving and the contemplative evening is striking. Visiting both reveals desert's dual nature: exhilarating and meditative. The experience requires physical tolerance: bouncing vehicles, extreme heat during day, intense cold at night.",im:"An off-road driver in 2005, thrilling tourists with dune bashing, aware that this adventure reveals the desert's untamed nature.",t:"Tours depart from hotels, typically afternoon. Drive lasts 1.5-2 hours. Camps remain 4-5 hours. Cost moderate to expensive. Wear comfortable clothes; bring sunscreen. The experience is suitable for most ages; back issues may find riding uncomfortable. Photography excellent at sunset.",c:[],r:"g",nn:"قيادة الكثبان (تجربة مسائية)",ns:"مغامرة صحراوية عالية السرعة مع غروب وحفل تقليدي",nst:"قيادة الكثبان بدون طريق. منعطفات حادة. غروب دراماتيكي. مخيم بدوي.",nt:"جولات من الفنادق. 1.5-2 ساعات قيادة. 4-5 ساعات مخيم. تصوير رائع."},
  {id:28,n:"Mangrove Kayaking — Coastal Ecosystems",a:"Coastal Dubai",v:["nature", "beautiful"],d:120,s:"Paddling through mangrove forests in kayaks—encountering marine ecosystems and birdlife.",st:"Mangrove kayaking in Dubai offers connection to coastal ecosystems. Mangroves are salt-tolerant trees that create unique habitats. Kayaking through mangrove channels, you encounter birds, fish, crustaceans. The experience is peaceful: paddling through natural corridors, the water mirror-like, vegetation surrounding. The mangroves are refugium for juvenile fish, birds' nesting sites, critical ecosystems. The experience is educational: understanding ecological significance of mangroves. The paddling is gentle; suitable for non-experienced kayakers. The best times are early morning or late afternoon when light is soft and wildlife active. The mangrove experience is meditative contrast to Dubai's urban intensity: nature persisting within city limits. The experience reveals Dubai's environmental commitment: preserving mangroves despite urban pressure.",im:"A kayaker in 2010, paddling through mangroves, alone with birds and fish, finding peace.",t:"Tours depart from coastal facilities. Kayaking duration 1.5-2 hours. Cost moderate. Early morning departures recommended (best light, coolest temperature, wildlife active). Minimal physical exertion. Photography challenges due to movement; still cameras better than video. Bring water; sun protection.",c:[],r:"g",nn:"التجديف في أشجار القرم",ns:"تجديف عبر غابات الأشجار الساحلية",nst:"تجديف في غابات الأشجار. طيور، أسماك. بيئة ساحلية. سلام.",nt:"جولات ساحلية. صباحاً أفضل. 1.5-2 ساعة. معتدل الصعوبة."},
  {id:29,n:"Al Marmoom Desert Conservation Reserve — Nature Preservation",a:"East Dubai",v:["nature", "hidden"],d:180,s:"A protected desert area showcasing flora and fauna—conservation effort preserving natural heritage.",st:"Al Marmoom Desert Conservation Reserve protects desert habitat and endemic species. The reserve includes botanical gardens, wildlife viewing areas, educational facilities. The experience reveals desert's ecological diversity: plants adapted to extreme aridity, animals thriving despite harsh conditions. Guided tours explain conservation efforts, ecosystem dynamics, climate adaptation. The reserve demonstrates that deserts are not barren wastelands but ecosystems with intricate ecological relationships. Visiting the reserve is educational: understanding desert biodiversity, appreciating conservation efforts. The experience is peaceful: the landscape beautiful, the air clean, silence profound. The reserve is relatively new; infrastructure is developing. The conservation mission is genuine; the reserve contributes to environmental protection. The reserve represents commitment to preserve natural heritage amid development: recognition that nature has value beyond commerce.",im:"A conservationist in 2010, establishing the reserve, envisioning that future generations would value desert preservation.",t:"Located 50km east of central Dubai. Accessible by organized tour or private vehicle (high clearance vehicles recommended). Entry requires guided tour. Fees moderate. Tours last 2-4 hours. Early morning or late afternoon optimal (cooler, better light). Photography excellent. Bring water; sun protection essential.",c:[],r:"g",nn:"محمية المرموم الصحراوية",ns:"منطقة محمية تعرض النباتات والحيوانات",nst:"محمية المرموم تحافظ على الصحراء. حدائق، مناطق حياة برية.",nt:"50 كم شرقاً. جولات موجهة فقط. 2-4 ساعات. صباحاً أو مساءً."},
  {id:30,n:"Dubai Souks Evening Walk — Atmospheric Bazaars",a:"Old Dubai",v:["local", "food", "night"],d:120,s:"Evening walking tour through traditional souks—experiencing nighttime bazaar atmosphere, food, commerce.",st:"Evening souks transform: cooling temperatures animate the markets. Vendors arrange goods; the pace of commerce accelerates. The Gold Souk gleams under lights; Spice Souk aromas intensify; textile vendors display fabrics. Walking evening souks, you encounter the authentic social commerce: negotiation, relationship-building, food consumption. Families shop, friends socialize, vendors conduct business. The atmosphere is vibrant: voices in multiple languages, the smell of various goods, the energy of commerce. Food stalls become busy: kebab sellers roasting meat, vegetable vendors arranging produce, juice makers squeezing fresh fruit. The evening walk offers sensory richness unavailable during day. Photography is challenging in low light; yet the atmosphere rewards the effort. The walk connects to Dubai's historical identity: souks were the foundation of commerce before oil. Evening souks represent continuity: the same commercial activity, the same negotiation, the same human connection.",im:"A merchant in 1980, opening his souk stall for the evening, welcoming customers as ancestors had for centuries.",t:"Guided souk walks available through hotels and tourism operators (recommended). Departures 5-6pm, returning 9-10pm. Walking pace leisurely; stops for shopping and food. Cost moderate. Wear comfortable shoes; bring cash. Photography in markets; respect vendors' privacy. Allow 2-3 hours.",c:[],r:"g",nn:"أسواق دبي ليلاً",ns:"مشي مسائي عبر الأسواق التقليدية",nst:"أسواق دبي ليلاً. برودة درجات الحرارة. الأسواق مأهولة بالزوار.",nt:"جولات موجهة من الفنادق. 17-18 تقريباً. نقداً. 2-3 ساعات."}
,
  {id:31,n:"Old Dubai Abra Ride — Wooden Boat Across the Creek",a:"Creek",v:["local","beautiful","cultural"],d:5,s:"An abra is a traditional wooden boat—locals use them daily to cross Dubai Creek for 1 AED (30 cents)—the ride is the real Dubai before the modern city.",st:"Aibras have crossed Dubai Creek for centuries. For 1 AED, you cross with locals going to work or shopping. The creek is the heart of old Dubai.",im:"Inside a wooden boat. The water reflecting buildings. The open side showing the city. Locals commuting. The wind. The simplicity.",t:"Flag down an abra at any dock (Bur Dubai or Deira side). Cost 1 AED. Journey 5 minutes. Go morning or evening when locals commute. No official timetable—boats run continuously.",c:["local","beautiful"],r:"g",nn:"Aara Ride",ns:"A traditional wooden boat ride across Dubai Creek for 1 AED.",nst:"Abaras have crossed Dubai Creek for centuries.",nt:"Flag down an abra at any dock. Cost 1 AED. Journey 5 minutes."},
  {id:32,n:"Bastakiya Old Town — Narrow Streets and Wind Towers",a:"Old Dubai",v:["neighborhoods","history","beautiful"],d:5,s:"A preserved neighborhood of narrow streets, traditional houses with wind towers for cooling, and the smell of spices—the old Dubai before the towers.",st:"Bastakiya is the oldest neighborhood in Dubai. The buildings are traditional with wind towers for natural air conditioning. The streets are narrow and winding.",im:"A narrow street. Old stone buildings. Wind towers visible. The smell of spices. A few people walking. The light filtered.",t:"Located in Bur Dubai. Enter from Al-Fahidi Street. Free to explore. Cafes and small shops throughout. Go morning. Allow 1–2 hours wandering.",c:["neighborhoods","history"],r:"g",nn:"Bastakiya Old Town",ns:"Preserved neighborhood with narrow streets and traditional wind tower architecture.",nst:"Bastakiya is the oldest neighborhood in Dubai.",nt:"Located in Bur Dubai. Free to explore."},
  {id:33,n:"Hatta Wadi — Mountain Valley Day Trip",a:"Southeast",v:["day_trips","hiking","beautiful"],d:120,s:"An hour east of Dubai, Hatta Wadi is a mountain valley with water pools, hiking trails, and complete quiet—a total escape from the city.",st:"Hatta Wadi is in the Hajar Mountains. There are hiking trails, natural pools (seasonal), and the landscape is dramatic.",im:"A mountain valley. Water pools reflecting sky. Rocky terrain. Few people. The scale of mountains. Complete quiet.",t:"Rent a car or join a tour. Drive 1.5 hours east from Dubai. Parking available. Trails are free. Bring water and sun protection. Best October–April (too hot May–September).",c:["day_trips","hiking"],r:"y",nn:"Hatta Wadi",ns:"Mountain valley day trip with hiking and water pools.",nst:"Hatta Wadi is in the Hajar Mountains east of Dubai.",nt:"Rent a car or join a tour. Drive 1.5 hours east."},
  {id:34,n:"Dubai Museum — The City Before Oil",a:"Old Dubai",v:["greatest_hits","history","museums"],d:5,s:"The Dubai Museum shows what the city was before oil—pearling, fishing, trading—the transformation is the story.",st:"The Dubai Museum is housed in an old fort. The exhibits show Dubai's history as a fishing and pearling village. The transformation is the entire story.",im:"Inside a display. Old photographs. Pearling equipment. Maps. The progression visible. The city's transformation from villages to towers.",t:"Located in Al-Fahidi Fort. Entry 3 AED (about 80 cents USD). Open 8:30am–8:30pm daily (closed Friday mornings). Allow 1–1.5 hours.",c:["greatest_hits","history"],r:"g",nn:"Dubai Museum",ns:"Museum showing Dubai before oil—pearling, fishing, trading.",nst:"Dubai Museum is housed in an old fort.",nt:"Located in Al-Fahidi Fort. Entry 3 AED."}];

<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Dubai Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Dubai Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
