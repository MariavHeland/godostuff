  {id:100,n:"Floreasca Lake Walk — Floreasca #100",a:"Floreasca",v:["local","nature","quiet"],d:50,s:"The lake where Bucharest jogs, picnics and forgets the chaos",st:"The lake has a running path, paddleboats and food stalls. On weekends it fills with families from early morning.",im:"Time-travel: Floreasca as a rural village outside Bucharest in 1900, farmers and cows",t:"Always free. Weekday mornings quiet. Weekend evenings social.",c:["abandoned"],r:"g",nn:"Lacul Floreasca — Floreasca #100",ns:"Lacul unde Bucureștiul aleargă, face picnic și uită haosul",nst:"Lacul are un traseu de alergare, hidrobiciclete și tarabe cu mâncare.",nt:"Mereu gratuit."},
  {id:101,n:"Old Town Belle Époque Backstreets — Centru Istoric #101",a:"Centru Istoric",v:["history","weird","hidden"],d:9,s:"Behind the bar street — crumbling belle époque buildings that will be gone in 10 years",st:"Behind the main bar street, Bucharest Old Town has crumbling belle époque buildings, workshops, and courts that feel untouched.",im:"Time-travel: Bucharest Old Town at its peak, 1905 — the most elegant city in Eastern Europe",t:"Wander freely. Stavropoleos Lane and Soarelui Street are best.",c:["free_museum"],r:"g",nn:"Fundăturile din Centrul Vechi — Centru Istoric #101",ns:"În spatele barurilor — clădiri belle époque în ruinare care vor dispărea în 10 ani",nst:"Clădiri belle époque în ruinare, ateliere și curți neatinse.",nt:"Rătăcește liber. Strada Soarelui e una din cele mai bune."},
  {id:102,n:"Pasajul Macca-Vilacrosse — Centru Istoric #102",a:"Centru Istoric",v:["beautiful","hidden","weird"],d:7,s:"A yellow glass-roofed arcade from 1891 — shisha bars, chess players, frozen time",st:"Bucharest\'s only covered arcade bends in a Y shape under yellow glass. Hookah cafés have been here for decades. Men play backgammon. The light through the glass is extraordinary.",im:"Time-travel: Bucharest merchants promenading through this arcade in 1900",t:"Free. Open during café hours. Go on rainy days.",c:["local_only"],r:"g",nn:"Pasajul Macca-Vilacrosse — Centru Istoric #102",ns:"Arcadă cu acoperiș galben din 1891 — narghilea, jucători de șah, timp îngețat",nst:"Singura arcadă acoperită a Bucureștiului în formă de Y sub sticlă galbenă.",nt:"Gratuit. Deschis în orele cafenelei."},
  {id:103,n:"Drumul Taberei Metro Art — Drumul Taberei #103",a:"Drumul Taberei",v:["street_art","hidden","local"],d:47,s:"The newest metro line has massive public art installations underground — almost no tourists",st:"The M5 line opened in 2020 and each station has large-scale art. Drumul Taberei station has extraordinary mosaic work. Ride the whole line for a free gallery.",im:"Time-travel: communist planners designing these tower blocks in 1970, promising a workers paradise",t:"Metro ticket only. Ride M5 end to end.",c:["architecture"],r:"g",nn:"Arta metroului Drumul Taberei — Drumul Taberei #103",ns:"Cea mai nouă linie de metrou are instalații masive de artă — aproape fără turiști",nst:"Linia M5 inaugurată în 2020. Fiecare stație are artă la scară mare.",nt:"Doar bilet de metrou. Mergeți cu M5 de la capăt la capăt."},
  {id:104,n:"Parcul Carol — Berceni #104",a:"Berceni",v:["history","beautiful","quiet"],d:19,s:"Bucharest\'s oldest formal park — a mausoleum, an aqueduct, and almost nobody here",st:"Carol Park was inaugurated in 1906 for the 40th anniversary of King Carol I. The communist mausoleum at the top was later used for unknown soldiers.",im:"Time-travel: the 1906 Jubilee Exhibition in this park — Romania showing itself to Europe",t:"Free. Enter from Șos. Olteniței. The hilltop has the best view.",c:["history_big"],r:"g",nn:"Parcul Carol — Berceni #104",ns:"Cel mai vechi parc formal din București — un mausoleu, un apeduct și aproape nimeni",nst:"Parcul Carol inaugurat în 1906 pentru aniversarea a 40 de ani a Regelui Carol I.",nt:"Gratuit. Intrare de pe Șos. Olteniței."},
  {id:105,n:"Antim Monastery — Centru Istoric #105",a:"Centru Istoric",v:["history","quiet","beautiful"],d:54,s:"Hidden monastery in a residential street — golden icons, silence, and no tourists at all",st:"Built in 1715 in the Brâncovenesc style. The founder Antim Ivireanul was later martyred by the Ottomans. You can walk in off the street and be in total silence.",im:"Time-travel: Antim Ivireanul printing books in the monastery press in 1715",t:"Free. Ring the bell to enter outside mass times.",c:["high_spots"],r:"g",nn:"Mănăstirea Antim — Centru Istoric #105",ns:"Mănăstire ascunsă pe o stradă rezidențială — icoane de aur, liniște, zero turiști",nst:"Construită în 1715 în stilul Brâncovenesc.",nt:"Gratuit. Sunați la clopoțel pentru a intra."}

,{id:115,n:"Hidden 1930s Inner Courtyards & Bridge Walk",a:"Centru Istoric",v:["hidden"],d:20,s:"Noir-style wander through secret interwar courtyards linked by spooky bridges.",st:"Slip into forgotten 1930s apartment blocks where time froze amid peeling art deco details. Cross elevated bridges that feel like urban catwalks over hidden worlds below. Perfect for moody photos that whisper Bucharest's elegant past.",im:"Imagine peering through arched doorways into lush, vine-draped courtyards, bridges swaying gently as you uncover the city's veiled heart.",t:"Near Universitate metro; search IG 'bridges inner courtyards Bucharest' for spots; free anytime, best rainy days for reflections; daylight for safety.",c:["architecture", "walks"],r:"g",nn:"Curți interioare ascunse anilor 1930 și plimbare pe poduri",ns:"Plimbare noir prin curți interioare interbelice secrete legate de poduri înfricoșătoare.",nst:"Pătrunde în blocuri de apartamente uitate din anii 1930 unde timpul s-a oprit printre detalii art deco cojite. Traversează poduri suspendate ca pe pasarele urbane peste lumi ascunse dedesubt. Perfect pentru poze moody care șoptesc trecutul elegant al Bucureștiului.",nt:"Lângă metrou Universitate; caută pe IG 'bridges inner courtyards Bucharest'; gratuit oricând, cel mai bine în zile ploioase pentru reflexii; zi pentru siguranță."},
{id:116,n:"Străzi Deschise / Open Streets Bucharest",a:"Centru Istoric",v:["events"],d:25,s:"Calea Victoriei turns car-free with free concerts, acrobats & pop-up art.",st:"Weekends explode into pedestrian paradise: street performers juggle fire, jazz drifts from corners, kids craft in workshops. Revolution Square buzzes with quizzes and exhibitions under summer skies. Bucharest's wild, communal heartbeat on display.",im:"Picture dodging unicyclists while snagging free gelato samples amid a sea of laughing locals.",t:"Summer weekends at Revolution Square / CEC Palace; check visitbucharest.today; free; arrive early for prime spots.",c:["events", "streets"],r:"g",nn:"Străzi Deschise București",ns:"Calea Victoriei devine fără mașini cu concerte gratuite, acrobati și artă pop-up.",nst:"Weekend-urile explodează în paradizi pentru pietoni: artiști stradali jonglează cu foc, jazz plutește din colțuri, copii creează în ateliere. Piața Revoluției vuiește cu quizz-uri și expoziții sub cerul de vară. Inima sălbatică și comunală a Bucureștiului la vedere.",nt:"Weekend-uri de vară la Piața Revoluției / Palatul CEC; verifică visitbucharest.today; gratuit; ajunge devreme pentru cele mai bune locuri."},
{id:117,n:"Cotroceni Bazaar & Romniceanu Park Stroll",a:"Cotroceni",v:["markets", "hidden"],d:22,s:"Chill neighborhood fest with jazz, art workshops & pretty villa vibes.",st:"Wander Cotroceni's leafy streets where locals jam classical tunes and paint en plein air. Romniceanu Park hums with participatory crafts and easygoing chats. Feels like crashing the coolest block party in town.",im:"Envision sketching with strangers under blooming acacias as a sax wails softly nearby.",t:"Cotroceni district weekends; near metro; free; combine with palace garden walk.",c:["parks", "events"],r:"g",nn:"Târgul Cotroceni & Parcul Romniceanu",ns:"Fest de cartier chill cu jazz, ateliere de artă și vibe-uri de vilă frumoasă.",nst:"Cutreieră străzile verzi din Cotroceni unde localnicii cântă jazz clasic și pictează în aer liber. Parcul Romniceanu vibrează cu meșteșuguri participative și discuții relaxate. Parcă ai pătruns la cea mai cool petrecere de bloc din oraș.",nt:"District Cotroceni în weekend-uri; lângă metrou; gratuit; combină cu plimbare în grădina palatului."},
{id:118,n:"Point Art Space Street-Art Hunt",a:"Universitate",v:["street art"],d:18,s:"DIY graffiti quest around hip murals and odd building quirks.",st:"Hunt massive walls splashed with surreal street art near Eremia Grigorescu. Unearth bizarre architectural details that locals whisper about. Dive into Bucharest's pulsing underground creative scene.",im:"Spot a giant fox mural staring down from a crumbling facade, daring you to snap the perfect shot.",t:"Near Universitate metro; daytime; free; follow lacarmina.com art tour leads.",c:["street art"],r:"g",nn:"Vânătoare de street art la Point Art Space",ns:"Quest DIY graffiti în jurul muralelor hip și ciudățeniilor arhitecturale.",nst:"Caută pereți masivi stropiți cu artă stradală suprarealistă lângă Eremia Grigorescu. Descoperă detalii arhitecturale bizare despre care șoptesc localnicii. Plonjează în scena creativă underground pulsatilă a Bucureștiului.",nt:"Lângă metrou Universitate; ziua; gratuit; urmează lead-urile din turul de artă de pe lacarmina.com."},
{id:119,n:"Strigoi Face Monster Hunt",a:"Centru Istoric",v:["hidden"],d:15,s:"Self-guided quest for carved evil-warding faces on old facades.",st:"Scan belle-époque buildings for creepy stone faces glaring from cornices—ancient strigoi repellents. Turn a simple walk into a thrilling urban myth chase. Who knew architecture hid such folklore fangs?",im:"Freeze as a snarling gargoyle face emerges from ivy, eyes locking with yours in eternal watch.",t:"Older streets downtown; free; anytime, golden hour for shadows; bring camera.",c:["architecture"],r:"g",nn:"Vânătoarea de fețe strigoi",ns:"Quest ghidată de sine pentru fețe sculptate care alungă răul pe fațade vechi.",nst:"Scanează clădiri belle-époque pentru fețe de piatră înfricoșătoare care privesc din cornișe—repelenți antici pentru strigoi. Transformă o plimbare simplă într-o urmărire urbană mitică palpitantă. Cine știa că arhitectura ascunde colți de folclor?",nt:"Străzi vechi din centru; gratuit; oricând, ora de aur pentru umbre; ia aparatul foto."},

<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Bucharest Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Bucharest Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
