const P = [
  {id:1,n:"Cărturești Carusel Bookshop — Centru Istoric",a:"Centru Istoric",v:["beautiful","hidden","free"],d:5,s:"Six floors of books in a 19th century palace — the most beautiful bookshop in Eastern Europe",st:"The Carusel Palace was built in 1860 and became a bookshop in 2013. The atrium is wrapped in white cast iron and books floor to ceiling. Free to enter and stay.",im:"Time-travel: Carusel Palace as a bustling commercial arcade in 1900, the Paris of the East",t:"Free to enter. Open daily. The reading gallery on the top floor is best.",c:["architecture"],r:"g",nn:"Cărturești Carusel — Centru Istoric",ns:"Șase etaje de cărți într-un palat din sec. XIX — cea mai frumoasă librărie din Europa de Est",nst:"Palatul Carusel a fost construit în 1860 și a devenit librărie în 2013.",nt:"Intrare gratuită. Deschis zilnic."},
  {id:2,n:"Hanul lui Manuc — Centru Istoric",a:"Centru Istoric",v:["history","hidden","beautiful"],d:5,s:"1808 Ottoman caravanserai — the oldest inn in Bucharest still functioning",st:"Built by Armenian merchant Manuc Bey, the inn has a wooden galleried courtyard from the early 19th century. The Treaty of Bucharest was signed here in 1812.",im:"Time-travel: Ottoman merchants unloading caravans in this courtyard, 1820",t:"Courtyard free. Restaurant inside. Walk through slowly.",c:["history_big"],r:"g",nn:"Hanul lui Manuc — Centru Istoric",ns:"Caravanserai otoman din 1808 — cel mai vechi han din București funcțional",nst:"Construit de negustorul armean Manuc Bei. Tratatul de la București semnat aici în 1812.",nt:"Curtea gratuită. Restaurant înăuntru."},
  {id:3,n:"Văcărești Urban Wetland — Văcărești",a:"Văcărești",v:["nature","hidden","weird"],d:25,s:"A communist unfinished canal became a wild urban delta — herons, wild horses, inside Bucharest",st:"Ceaușescu began digging a canal here in the 1980s and abandoned it. Nature returned. The result is a 200-hectare wetland with herons, cormorants and wild horses inside the city.",im:"Time-travel: 1987 — labourers digging what would become an accidental nature reserve",t:"Free. Enter from the south. Birds most active at dawn and dusk.",c:["abandoned"],r:"g",nn:"Parcul Natural Văcărești — Văcărești",ns:"Un canal comunist neterminat a devenit o deltă sălbatică — stârci, cai sălbatici, în București",nst:"Ceaușescu a început să sape un canal și a abandonat proiectul. Natura a revenit.",nt:"Gratuit. Intrare dinspre sud."},
  {id:4,n:"Herăstrău Lake Rowing — Herăstrău",a:"Herăstrău",v:["nature","local","beautiful"],d:20,s:"Huge park and lake in the north — rent a boat, find an empty bench, watch Bucharest forget itself",st:"Herăstrău is 200 hectares of park and lake. The path around takes 90 minutes. Rowboats rent by the hour.",im:"Time-travel: Bucharest bourgeoisie promenading in Herăstrău on Sunday mornings, 1935",t:"Park free. Rowboat rental cheap. Weekday mornings are quiet.",c:["parks"],r:"g",nn:"Parcul Herăstrău — Herăstrău",ns:"Parc mare și lac în nord — închiriază o barcă, găsește o bancă liberă",nst:"Herăstrău are 200 de hectare de parc și lac.",nt:"Parcul gratuit. Bărcile ieftine."},
  {id:5,n:"Cimitirul Bellu — Berceni",a:"Berceni",v:["history","beautiful","quiet"],d:30,s:"The pantheon of Romanian culture — poets, sculptors, politicians in one extraordinary cemetery",st:"Bellu cemetery was opened in 1858 and contains the graves of almost every major Romanian figure. The tombs are Art Nouveau masterpieces.",im:"Time-travel: the funeral of poet Mihai Eminescu at Bellu, 1889, all of Bucharest in the streets",t:"Free. Open daily. Get a map at the entrance.",c:["famous_dead"],r:"g",nn:"Cimitirul Bellu — Berceni",ns:"Panteonul culturii române — poeți, sculptori, politicieni — un cimitir extraordinar",nst:"Cimitirul Bellu deschis în 1858. Mormintele sunt capodopere Art Nouveau.",nt:"Gratuit. Deschis zilnic. Ia o hartă la intrare."},
  {id:6,n:"Cotroceni Palace Garden — Cotroceni",a:"Cotroceni",v:["beautiful","hidden","history"],d:25,s:"The presidential palace garden — Neogothic towers, roses, silence in the city",st:"The Cotroceni Palace was built in 1896 for the Romanian royal family and is now the presidential residence. The garden is extraordinary.",im:"Time-travel: the Romanian royal family walking these gardens in 1910",t:"Garden visits with guided tour (small fee). Book ahead.",c:["architecture"],r:"g",nn:"Grădina Palatului Cotroceni — Cotroceni",ns:"Grădina palatului prezidențial — turnuri neogotice, trandafiri, liniște",nst:"Palatul Cotroceni construit în 1896 pentru familia regală.",nt:"Vizite ghidate (taxă mică). Rezervați în avans."},
  {id:7,n:"Floreasca Lake Walk — Floreasca",a:"Floreasca",v:["local","nature","quiet"],d:20,s:"The lake where Bucharest jogs, picnics and forgets the chaos",st:"The lake has a running path, paddleboats and food stalls. On weekends it fills with families from early morning.",im:"Time-travel: Floreasca as a rural village outside Bucharest in 1900, farmers and cows",t:"Always free. Weekday mornings quiet. Weekend evenings social.",c:["parks"],r:"g",nn:"Lacul Floreasca — Floreasca",ns:"Lacul unde Bucureștiul aleargă, face picnic și uită haosul",nst:"Lacul are un traseu de alergare, hidrobiciclete și tarabe cu mâncare.",nt:"Mereu gratuit."},
  {id:8,n:"Old Town Belle Époque Backstreets — Centru Istoric",a:"Centru Istoric",v:["history","weird","hidden"],d:5,s:"Behind the bar street — crumbling belle époque buildings that will be gone in 10 years",st:"Behind the main bar street, Bucharest Old Town has crumbling belle époque buildings, workshops, and courts that feel untouched.",im:"Time-travel: Bucharest Old Town at its peak, 1905 — the most elegant city in Eastern Europe",t:"Wander freely. Stavropoleos Lane and Soarelui Street are best.",c:["abandoned"],r:"g",nn:"Fundăturile din Centrul Vechi — Centru Istoric",ns:"În spatele barurilor — clădiri belle époque în ruinare care vor dispărea în 10 ani",nst:"Clădiri belle époque în ruinare, ateliere și curți neatinse.",nt:"Rătăcește liber. Strada Soarelui e una din cele mai bune."},
  {id:9,n:"Pasajul Macca-Vilacrosse — Centru Istoric",a:"Centru Istoric",v:["beautiful","hidden","weird"],d:5,s:"A yellow glass-roofed arcade from 1891 — shisha bars, chess players, frozen time",st:"Bucharest\'s only covered arcade bends in a Y shape under yellow glass. Hookah cafés have been here for decades. Men play backgammon. The light through the glass is extraordinary.",im:"Time-travel: Bucharest merchants promenading through this arcade in 1900",t:"Free. Open during café hours. Go on rainy days.",c:["architecture"],r:"g",nn:"Pasajul Macca-Vilacrosse — Centru Istoric",ns:"Arcadă cu acoperiș galben din 1891 — narghilea, jucători de șah, timp îngețat",nst:"Singura arcadă acoperită a Bucureștiului în formă de Y sub sticlă galbenă.",nt:"Gratuit. Deschis în orele cafenelei."},
  {id:10,n:"Drumul Taberei Metro Art — Drumul Taberei",a:"Drumul Taberei",v:["street_art","hidden","local"],d:35,s:"The newest metro line has massive public art installations underground — almost no tourists",st:"The M5 line opened in 2020 and each station has large-scale art. Drumul Taberei station has extraordinary mosaic work. Ride the whole line for a free gallery.",im:"Time-travel: communist planners designing these tower blocks in 1970, promising a workers paradise",t:"Metro ticket only. Ride M5 end to end.",c:["street_art"],r:"g",nn:"Arta metroului Drumul Taberei — Drumul Taberei",ns:"Cea mai nouă linie de metrou are instalații masive de artă — aproape fără turiști",nst:"Linia M5 inaugurată în 2020. Fiecare stație are artă la scară mare.",nt:"Doar bilet de metrou. Mergeți cu M5 de la capăt la capăt."},
  {id:11,n:"Parcul Carol — Berceni",a:"Berceni",v:["history","beautiful","quiet"],d:30,s:"Bucharest\'s oldest formal park — a mausoleum, an aqueduct, and almost nobody here",st:"Carol Park was inaugurated in 1906 for the 40th anniversary of King Carol I. The communist mausoleum at the top was later used for unknown soldiers.",im:"Time-travel: the 1906 Jubilee Exhibition in this park — Romania showing itself to Europe",t:"Free. Enter from Șos. Olteniței. The hilltop has the best view.",c:["history_big"],r:"g",nn:"Parcul Carol — Berceni",ns:"Cel mai vechi parc formal din București — un mausoleu, un apeduct și aproape nimeni",nst:"Parcul Carol inaugurat în 1906 pentru aniversarea a 40 de ani a Regelui Carol I.",nt:"Gratuit. Intrare de pe Șos. Olteniței."},
  {id:12,n:"Antim Monastery — Centru Istoric",a:"Centru Istoric",v:["history","quiet","beautiful"],d:10,s:"Hidden monastery in a residential street — golden icons, silence, and no tourists at all",st:"Built in 1715 in the Brâncovenesc style. The founder Antim Ivireanul was later martyred by the Ottomans. You can walk in off the street and be in total silence.",im:"Time-travel: Antim Ivireanul printing books in the monastery press in 1715",t:"Free. Ring the bell to enter outside mass times.",c:["history_big"],r:"g",nn:"Mănăstirea Antim — Centru Istoric",ns:"Mănăstire ascunsă pe o stradă rezidențială — icoane de aur, liniște, zero turiști",nst:"Construită în 1715 în stilul Brâncovenesc.",nt:"Gratuit. Sunați la clopoțel pentru a intra."},
  {id:13,n:"Colentina Lake Chain — Colentina",a:"Colentina",v:["nature","local","hidden"],d:30,s:"A 15km chain of lakes in the northeast — local families, fishing, no tourists",st:"The Colentina River was dammed creating a chain of 18 lakes. The banks are public. Barbecues, fishing lines, weekend car radios. The Bucharest that guidebooks ignore.",im:"Time-travel: the Colentina River before the dams, 1920",t:"Free. Take bus 301 north. Any stop near Lacul Fundeni.",c:["parks"],r:"g",nn:"Lacurile Colentinei — Colentina",ns:"Un lanț de 15 km de lacuri în nord-est — familii locale, pescuit, fără turiști",nst:"Râul Colentina barajat, creând 18 lacuri cu maluri publice.",nt:"Gratuit. Autobuzul 301 nord."},
  {id:14,n:"Grădina Botanică — Cotroceni",a:"Cotroceni",v:["nature","beautiful","quiet"],d:25,s:"Botanical garden next to the university — greenhouses, Japanese garden, total calm",st:"Bucharest Botanical Garden covers 17 hectares. The rose garden peaks in June. The Japanese section is extraordinary. Almost no tourists.",im:"Time-travel: the botanical garden being laid out in 1874, just after Romanian independence",t:"Small entry fee. Worth it. Open daily in season.",c:["parks"],r:"g",nn:"Grădina Botanică — Cotroceni",ns:"Grădina botanică lângă universitate — sere, grădină japoneză, calm total",nst:"Grădina Botanică acoperă 17 hectare. Grădina de trandafiri e maximă în iunie.",nt:"Taxă mică. Merită."},
  {id:15,n:"Art Deco Villas Strada Polonă — Floreasca",a:"Floreasca",v:["architecture","beautiful","hidden"],d:20,s:"Five blocks of intact 1930s Art Deco villas — the Paris of the East still visible",st:"Strada Polonă and its side streets have Bucharest\'s finest concentration of interwar Art Deco and modernist villas.",im:"Time-travel: Bucharest\'s bourgeoisie commissioning these villas in 1935",t:"Free to walk. Best in morning light.",c:["architecture"],r:"g",nn:"Vilele Art Deco de pe Strada Polonă — Floreasca",ns:"Cinci blocuri de vile Art Deco din anii \'30 — Parisul Estului încă vizibil",nst:"Strada Polonă are cea mai mare concentrare de vile Art Deco interbelice din București.",nt:"Liber de plimbare. Cel mai bine dimineața."},
  {id:16,n:"Obor Flea Market — Colentina",a:"Colentina",v:["local","weird","free"],d:25,s:"The biggest flea and food market in Bucharest — everything sold, nothing curated",st:"Obor is where Bucharest actually shops. The outdoor market sells everything from live chickens to old communist furniture. The indoor market has the city\'s best cheese.",im:"Time-travel: Obor as a pre-communist peasant market, 1930 — carts arriving before dawn",t:"Free to enter. Wednesday, Saturday and Sunday best.",c:["local_only"],r:"g",nn:"Piața Obor — Colentina",ns:"Cea mai mare piață de vechituri din București — vânzut totul, nimic curatoriat",nst:"Obor vinde de la pui vii la mobilă comunistă.",nt:"Intrare gratuită. Miercuri, sâmbătă și duminică."},
  {id:17,n:"Palatul Parlamentului Grounds — Centru Istoric",a:"Centru Istoric",v:["weird","history","architecture"],d:10,s:"The second-largest building in the world — enter the grounds and feel the scale",st:"Ceaușescu demolished a quarter of Bucharest to build this. 1,100 rooms. 3,500 tonnes of crystal chandeliers. The entrance plaza alone is overwhelming.",im:"Time-travel: the demolition of the historic Uranus neighborhood in 1984 to make room",t:"Guided tours from the main entrance. Small fee. Book ahead.",c:["history_big"],r:"y",nn:"Palatul Parlamentului — Centru Istoric",ns:"A doua cea mai mare clădire din lume — intră și simte proporțiile",nst:"Ceaușescu a demolat un sfert din București. 1.100 de camere.",nt:"Tururi ghidate. Taxă mică. Rezervați."},
  {id:18,n:"Piața Amzei Morning Market — Floreasca",a:"Floreasca",v:["local","free","hidden"],d:15,s:"The neighbourhood food market where Bucharest\'s writers and artists have shopped for 150 years",st:"Piața Amzei is the market of the Calea Victoriei neighbourhood since the 1800s. Cheese, honey, mushrooms, wild herbs. Vendors whose families have been coming for generations.",im:"Time-travel: post-war Bucharest 1950 — this market one of the few places to find real food",t:"Free. Mornings only. Best Tuesday–Saturday.",c:["local_only"],r:"g",nn:"Piața Amzei — Floreasca",ns:"Piața unde scriitorii și artiștii din București cumpără de 150 de ani",nst:"Piața Amzei are brânzeturi, miere, ciuperci și ierburi sălbatice.",nt:"Gratuit. Numai dimineața."},
  {id:19,n:"Stavropoleos Monastery — Centru Istoric",a:"Centru Istoric",v:["history","beautiful","quiet"],d:5,s:"The most elegant church in Bucharest — Brâncovenesc courtyard hidden behind the Old Town bars",st:"Built in 1724 in the Brâncovenesc style — a mix of Byzantine, Ottoman and Renaissance. Walk in off the bar street and be in total silence.",im:"Time-travel: the monastery at full capacity in 1750, monks and merchants in the same courtyard",t:"Free. Open daily. The courtyard is the real reason to come.",c:["history_big"],r:"g",nn:"Mănăstirea Stavropoleos — Centru Istoric",ns:"Cea mai elegantă biserică din București — curtea Brâncovenească ascunsă în spatele barurilor",nst:"Construită în 1724 în stilul Brâncovenesc.",nt:"Gratuit. Deschis zilnic."},
  {id:20,n:"Cișmigiu Gardens Chess — Centru Istoric",a:"Centru Istoric",v:["local","nature","history"],d:10,s:"The oldest public park in Bucharest — Romanians play chess here every afternoon",st:"Cișmigiu was laid out in 1847 and is still the city\'s social living room. The chess pavilion has games every afternoon. Rowboats on the lake. Old men arguing about politics.",im:"Time-travel: Bucharest intelligentsia debating Romanian independence in this park, 1859",t:"Free. Chess pavilion free to watch. Rowboats cheap.",c:["local_only"],r:"g",nn:"Grădina Cișmigiu — Centru Istoric",ns:"Cel mai vechi parc public din București — românii joacă șah aici",nst:"Cișmigiu amenajat în 1847. Pavilionul de șah cu meciuri în fiecare după-amiază.",nt:"Gratuit. Bărcile ieftine."},
  {id:21,n:"Titan IOR Lake Park — Berceni",a:"Berceni",v:["local","nature","hidden"],d:35,s:"The communist-era park of the east — a huge lake, stadium and Bucharest on its day off",st:"IOR Park in Titan was built in the 1960s as the people\'s park for the new housing blocks. On Sundays it fills with the families who live in the blocks around it.",im:"Time-travel: families moving into the new Titan tower blocks in 1965, grateful for the lake",t:"Free. Take bus 104 east.",c:["parks"],r:"g",nn:"Parcul IOR Titan — Berceni",ns:"Parcul suburban comunist — un lac mare, stadion și Bucureștiul în ziua liberă",nst:"Parcul IOR construit în anii \'60 pentru noile blocuri.",nt:"Gratuit. Autobuzul 104 est."},
  {id:22,n:"Palatul Suțu City Museum — Centru Istoric",a:"Centru Istoric",v:["history","beautiful","hidden"],d:5,s:"1833 neo-Gothic palace now the Bucharest City Museum — extraordinary interior, almost empty",st:"The Suțu Palace was built in 1833 and is now the city history museum. The staircase and ballroom are original. Fewer than 50 visitors on a typical day.",im:"Time-travel: Bucharest\'s aristocracy dancing in this ballroom in 1860",t:"Small entry fee. Often empty. The staircase alone is worth it.",c:["architecture"],r:"g",nn:"Palatul Suțu — Centru Istoric",ns:"Palat neogotic din 1833, acum Muzeul Municipiului București — interior extraordinar",nst:"Palatul Suțu construit în 1833. Scara și sala de bal sunt originale.",nt:"Taxă mică. Adesea gol."},
  {id:23,n:"Văcărești Panorama Ridge — Văcărești",a:"Văcărești",v:["hidden","weird","free"],d:30,s:"The embankment of the unfinished canal overlooks the accidental wetland below",st:"The massive earthworks of the abandoned canal form a long ridge. Walk it and look down at the marshland that grew where Ceaușescu wanted ships.",im:"Time-travel: engineers surveying this canal project in 1986, expecting it finished in two years",t:"Free. Enter from Str. Vrancea. The ridge walk is 2km.",c:["abandoned"],r:"g",nn:"Panorama Văcărești — Văcărești",ns:"Digul canalului neterminat oferă vedere asupra zonei umede",nst:"Marile lucrări de pământ ale canalului abandonat formează un dig lung.",nt:"Gratuit. Intrare din Str. Vrancea."},
  {id:24,n:"Museum of Communist Consumer — Centru Istoric",a:"Centru Istoric",v:["weird","history","hidden"],d:10,s:"Every product made in communist Romania in one private apartment-museum",st:"A private collector has amassed the complete material culture of communist Romania. The museum is in a flat. Entry is guided with a small fee.",im:"Time-travel: a Bucharest family eating communist-era food, wearing communist-era clothes, 1980",t:"Small entry fee. Guided tour only. Book by phone.",c:["free_museum"],r:"g",nn:"Muzeul consumatorului comunist — Centru Istoric",ns:"Fiecare produs din România comunistă într-un apartament-muzeu privat",nst:"Un colecționar privat a adunat întreaga cultură materială a României comuniste.",nt:"Taxă mică. Numai tur ghidat."},
  {id:25,n:"Bulevardul Magheru Bookstalls — Centru Istoric",a:"Centru Istoric",v:["local","free","hidden"],d:5,s:"Second-hand book traders set up every morning — Romanian literature for €1",st:"The pavement booksellers of Magheru have been trading since the communist era. Philosophy, history, poetry, maps. The dealers know everything in the pile.",im:"Time-travel: intellectuals browsing these stalls in 1985, censored books hidden under the approved",t:"Free. Best Mon–Fri before 2pm. Bring cash.",c:["local_only"],r:"g",nn:"Anticarii de pe Magheru — Centru Istoric",ns:"Anticarii de cărți se instalează în fiecare dimineață — literatură română la 1€",nst:"Vânzătorii de trotuar de pe Magheru fac comerț din era comunistă.",nt:"Gratuit. Lun–vin înainte de 14:00."},
  {id:26,n:"Cărturești Carusel Bookshop — Centru Istoric #26",a:"Centru Istoric",v:["beautiful","hidden","free"],d:45,s:"Six floors of books in a 19th century palace — the most beautiful bookshop in Eastern Europe",st:"The Carusel Palace was built in 1860 and became a bookshop in 2013. The atrium is wrapped in white cast iron and books floor to ceiling. Free to enter and stay.",im:"Time-travel: Carusel Palace as a bustling commercial arcade in 1900, the Paris of the East",t:"Free to enter. Open daily. The reading gallery on the top floor is best.",c:["history_big"],r:"g",nn:"Cărturești Carusel — Centru Istoric #26",ns:"Șase etaje de cărți într-un palat din sec. XIX — cea mai frumoasă librărie din Europa de Est",nst:"Palatul Carusel a fost construit în 1860 și a devenit librărie în 2013.",nt:"Intrare gratuită. Deschis zilnic."},
  {id:27,n:"Hanul lui Manuc — Centru Istoric #27",a:"Centru Istoric",v:["history","hidden","beautiful"],d:12,s:"1808 Ottoman caravanserai — the oldest inn in Bucharest still functioning",st:"Built by Armenian merchant Manuc Bey, the inn has a wooden galleried courtyard from the early 19th century. The Treaty of Bucharest was signed here in 1812.",im:"Time-travel: Ottoman merchants unloading caravans in this courtyard, 1820",t:"Courtyard free. Restaurant inside. Walk through slowly.",c:["high_spots"],r:"g",nn:"Hanul lui Manuc — Centru Istoric #27",ns:"Caravanserai otoman din 1808 — cel mai vechi han din București funcțional",nst:"Construit de negustorul armean Manuc Bei. Tratatul de la București semnat aici în 1812.",nt:"Curtea gratuită. Restaurant înăuntru."},
  {id:28,n:"Văcărești Urban Wetland — Văcărești #28",a:"Văcărești",v:["nature","hidden","weird"],d:6,s:"A communist unfinished canal became a wild urban delta — herons, wild horses, inside Bucharest",st:"Ceaușescu began digging a canal here in the 1980s and abandoned it. Nature returned. The result is a 200-hectare wetland with herons, cormorants and wild horses inside the city.",im:"Time-travel: 1987 — labourers digging what would become an accidental nature reserve",t:"Free. Enter from the south. Birds most active at dawn and dusk.",c:["parks"],r:"g",nn:"Parcul Natural Văcărești — Văcărești #28",ns:"Un canal comunist neterminat a devenit o deltă sălbatică — stârci, cai sălbatici, în București",nst:"Ceaușescu a început să sape un canal și a abandonat proiectul. Natura a revenit.",nt:"Gratuit. Intrare dinspre sud."},
  {id:29,n:"Herăstrău Lake Rowing — Herăstrău #29",a:"Herăstrău",v:["nature","local","beautiful"],d:52,s:"Huge park and lake in the north — rent a boat, find an empty bench, watch Bucharest forget itself",st:"Herăstrău is 200 hectares of park and lake. The path around takes 90 minutes. Rowboats rent by the hour.",im:"Time-travel: Bucharest bourgeoisie promenading in Herăstrău on Sunday mornings, 1935",t:"Park free. Rowboat rental cheap. Weekday mornings are quiet.",c:["courtyards"],r:"g",nn:"Parcul Herăstrău — Herăstrău #29",ns:"Parc mare și lac în nord — închiriază o barcă, găsește o bancă liberă",nst:"Herăstrău are 200 de hectare de parc și lac.",nt:"Parcul gratuit. Bărcile ieftine."},
  {id:30,n:"Cimitirul Bellu — Berceni #30",a:"Berceni",v:["history","beautiful","quiet"],d:22,s:"The pantheon of Romanian culture — poets, sculptors, politicians in one extraordinary cemetery",st:"Bellu cemetery was opened in 1858 and contains the graves of almost every major Romanian figure. The tombs are Art Nouveau masterpieces.",im:"Time-travel: the funeral of poet Mihai Eminescu at Bellu, 1889, all of Bucharest in the streets",t:"Free. Open daily. Get a map at the entrance.",c:["romantic_water"],r:"g",nn:"Cimitirul Bellu — Berceni #30",ns:"Panteonul culturii române — poeți, sculptori, politicieni — un cimitir extraordinar",nst:"Cimitirul Bellu deschis în 1858. Mormintele sunt capodopere Art Nouveau.",nt:"Gratuit. Deschis zilnic. Ia o hartă la intrare."},
  {id:31,n:"Cotroceni Palace Garden — Cotroceni #31",a:"Cotroceni",v:["beautiful","hidden","history"],d:20,s:"The presidential palace garden — Neogothic towers, roses, silence in the city",st:"The Cotroceni Palace was built in 1896 for the Romanian royal family and is now the presidential residence. The garden is extraordinary.",im:"Time-travel: the Romanian royal family walking these gardens in 1910",t:"Garden visits with guided tour (small fee). Book ahead.",c:["scary"],r:"g",nn:"Grădina Palatului Cotroceni — Cotroceni #31",ns:"Grădina palatului prezidențial — turnuri neogotice, trandafiri, liniște",nst:"Palatul Cotroceni construit în 1896 pentru familia regală.",nt:"Vizite ghidate (taxă mică). Rezervați în avans."},
  {id:32,n:"Floreasca Lake Walk — Floreasca #32",a:"Floreasca",v:["local","nature","quiet"],d:19,s:"The lake where Bucharest jogs, picnics and forgets the chaos",st:"The lake has a running path, paddleboats and food stalls. On weekends it fills with families from early morning.",im:"Time-travel: Floreasca as a rural village outside Bucharest in 1900, farmers and cows",t:"Always free. Weekday mornings quiet. Weekend evenings social.",c:["famous_dead"],r:"g",nn:"Lacul Floreasca — Floreasca #32",ns:"Lacul unde Bucureștiul aleargă, face picnic și uită haosul",nst:"Lacul are un traseu de alergare, hidrobiciclete și tarabe cu mâncare.",nt:"Mereu gratuit."},
  {id:33,n:"Old Town Belle Époque Backstreets — Centru Istoric #33",a:"Centru Istoric",v:["history","weird","hidden"],d:13,s:"Behind the bar street — crumbling belle époque buildings that will be gone in 10 years",st:"Behind the main bar street, Bucharest Old Town has crumbling belle époque buildings, workshops, and courts that feel untouched.",im:"Time-travel: Bucharest Old Town at its peak, 1905 — the most elegant city in Eastern Europe",t:"Wander freely. Stavropoleos Lane and Soarelui Street are best.",c:["street_art"],r:"g",nn:"Fundăturile din Centrul Vechi — Centru Istoric #33",ns:"În spatele barurilor — clădiri belle époque în ruinare care vor dispărea în 10 ani",nst:"Clădiri belle époque în ruinare, ateliere și curți neatinse.",nt:"Rătăcește liber. Strada Soarelui e una din cele mai bune."},
  {id:34,n:"Pasajul Macca-Vilacrosse — Centru Istoric #34",a:"Centru Istoric",v:["beautiful","hidden","weird"],d:52,s:"A yellow glass-roofed arcade from 1891 — shisha bars, chess players, frozen time",st:"Bucharest\'s only covered arcade bends in a Y shape under yellow glass. Hookah cafés have been here for decades. Men play backgammon. The light through the glass is extraordinary.",im:"Time-travel: Bucharest merchants promenading through this arcade in 1900",t:"Free. Open during café hours. Go on rainy days.",c:["abandoned"],r:"g",nn:"Pasajul Macca-Vilacrosse — Centru Istoric #34",ns:"Arcadă cu acoperiș galben din 1891 — narghilea, jucători de șah, timp îngețat",nst:"Singura arcadă acoperită a Bucureștiului în formă de Y sub sticlă galbenă.",nt:"Gratuit. Deschis în orele cafenelei."},
  {id:35,n:"Drumul Taberei Metro Art — Drumul Taberei #35",a:"Drumul Taberei",v:["street_art","hidden","local"],d:11,s:"The newest metro line has massive public art installations underground — almost no tourists",st:"The M5 line opened in 2020 and each station has large-scale art. Drumul Taberei station has extraordinary mosaic work. Ride the whole line for a free gallery.",im:"Time-travel: communist planners designing these tower blocks in 1970, promising a workers paradise",t:"Metro ticket only. Ride M5 end to end.",c:["free_museum"],r:"g",nn:"Arta metroului Drumul Taberei — Drumul Taberei #35",ns:"Cea mai nouă linie de metrou are instalații masive de artă — aproape fără turiști",nst:"Linia M5 inaugurată în 2020. Fiecare stație are artă la scară mare.",nt:"Doar bilet de metrou. Mergeți cu M5 de la capăt la capăt."},
  {id:36,n:"Parcul Carol — Berceni #36",a:"Berceni",v:["history","beautiful","quiet"],d:48,s:"Bucharest\'s oldest formal park — a mausoleum, an aqueduct, and almost nobody here",st:"Carol Park was inaugurated in 1906 for the 40th anniversary of King Carol I. The communist mausoleum at the top was later used for unknown soldiers.",im:"Time-travel: the 1906 Jubilee Exhibition in this park — Romania showing itself to Europe",t:"Free. Enter from Șos. Olteniței. The hilltop has the best view.",c:["local_only"],r:"g",nn:"Parcul Carol — Berceni #36",ns:"Cel mai vechi parc formal din București — un mausoleu, un apeduct și aproape nimeni",nst:"Parcul Carol inaugurat în 1906 pentru aniversarea a 40 de ani a Regelui Carol I.",nt:"Gratuit. Intrare de pe Șos. Olteniței."},
  {id:37,n:"Antim Monastery — Centru Istoric #37",a:"Centru Istoric",v:["history","quiet","beautiful"],d:52,s:"Hidden monastery in a residential street — golden icons, silence, and no tourists at all",st:"Built in 1715 in the Brâncovenesc style. The founder Antim Ivireanul was later martyred by the Ottomans. You can walk in off the street and be in total silence.",im:"Time-travel: Antim Ivireanul printing books in the monastery press in 1715",t:"Free. Ring the bell to enter outside mass times.",c:["architecture"],r:"g",nn:"Mănăstirea Antim — Centru Istoric #37",ns:"Mănăstire ascunsă pe o stradă rezidențială — icoane de aur, liniște, zero turiști",nst:"Construită în 1715 în stilul Brâncovenesc.",nt:"Gratuit. Sunați la clopoțel pentru a intra."},
  {id:38,n:"Colentina Lake Chain — Colentina #38",a:"Colentina",v:["nature","local","hidden"],d:39,s:"A 15km chain of lakes in the northeast — local families, fishing, no tourists",st:"The Colentina River was dammed creating a chain of 18 lakes. The banks are public. Barbecues, fishing lines, weekend car radios. The Bucharest that guidebooks ignore.",im:"Time-travel: the Colentina River before the dams, 1920",t:"Free. Take bus 301 north. Any stop near Lacul Fundeni.",c:["history_big"],r:"g",nn:"Lacurile Colentinei — Colentina #38",ns:"Un lanț de 15 km de lacuri în nord-est — familii locale, pescuit, fără turiști",nst:"Râul Colentina barajat, creând 18 lacuri cu maluri publice.",nt:"Gratuit. Autobuzul 301 nord."},
  {id:39,n:"Grădina Botanică — Cotroceni #39",a:"Cotroceni",v:["nature","beautiful","quiet"],d:10,s:"Botanical garden next to the university — greenhouses, Japanese garden, total calm",st:"Bucharest Botanical Garden covers 17 hectares. The rose garden peaks in June. The Japanese section is extraordinary. Almost no tourists.",im:"Time-travel: the botanical garden being laid out in 1874, just after Romanian independence",t:"Small entry fee. Worth it. Open daily in season.",c:["high_spots"],r:"g",nn:"Grădina Botanică — Cotroceni #39",ns:"Grădina botanică lângă universitate — sere, grădină japoneză, calm total",nst:"Grădina Botanică acoperă 17 hectare. Grădina de trandafiri e maximă în iunie.",nt:"Taxă mică. Merită."},
  {id:40,n:"Art Deco Villas Strada Polonă — Floreasca #40",a:"Floreasca",v:["architecture","beautiful","hidden"],d:42,s:"Five blocks of intact 1930s Art Deco villas — the Paris of the East still visible",st:"Strada Polonă and its side streets have Bucharest\'s finest concentration of interwar Art Deco and modernist villas.",im:"Time-travel: Bucharest\'s bourgeoisie commissioning these villas in 1935",t:"Free to walk. Best in morning light.",c:["parks"],r:"g",nn:"Vilele Art Deco de pe Strada Polonă — Floreasca #40",ns:"Cinci blocuri de vile Art Deco din anii \'30 — Parisul Estului încă vizibil",nst:"Strada Polonă are cea mai mare concentrare de vile Art Deco interbelice din București.",nt:"Liber de plimbare. Cel mai bine dimineața."},
  {id:41,n:"Obor Flea Market — Colentina #41",a:"Colentina",v:["local","weird","free"],d:32,s:"The biggest flea and food market in Bucharest — everything sold, nothing curated",st:"Obor is where Bucharest actually shops. The outdoor market sells everything from live chickens to old communist furniture. The indoor market has the city\'s best cheese.",im:"Time-travel: Obor as a pre-communist peasant market, 1930 — carts arriving before dawn",t:"Free to enter. Wednesday, Saturday and Sunday best.",c:["courtyards"],r:"g",nn:"Piața Obor — Colentina #41",ns:"Cea mai mare piață de vechituri din București — vânzut totul, nimic curatoriat",nst:"Obor vinde de la pui vii la mobilă comunistă.",nt:"Intrare gratuită. Miercuri, sâmbătă și duminică."},
  {id:42,n:"Palatul Parlamentului Grounds — Centru Istoric #42",a:"Centru Istoric",v:["weird","history","architecture"],d:7,s:"The second-largest building in the world — enter the grounds and feel the scale",st:"Ceaușescu demolished a quarter of Bucharest to build this. 1,100 rooms. 3,500 tonnes of crystal chandeliers. The entrance plaza alone is overwhelming.",im:"Time-travel: the demolition of the historic Uranus neighborhood in 1984 to make room",t:"Guided tours from the main entrance. Small fee. Book ahead.",c:["romantic_water"],r:"y",nn:"Palatul Parlamentului — Centru Istoric #42",ns:"A doua cea mai mare clădire din lume — intră și simte proporțiile",nst:"Ceaușescu a demolat un sfert din București. 1.100 de camere.",nt:"Tururi ghidate. Taxă mică. Rezervați."},
  {id:43,n:"Piața Amzei Morning Market — Floreasca #43",a:"Floreasca",v:["local","free","hidden"],d:6,s:"The neighbourhood food market where Bucharest\'s writers and artists have shopped for 150 years",st:"Piața Amzei is the market of the Calea Victoriei neighbourhood since the 1800s. Cheese, honey, mushrooms, wild herbs. Vendors whose families have been coming for generations.",im:"Time-travel: post-war Bucharest 1950 — this market one of the few places to find real food",t:"Free. Mornings only. Best Tuesday–Saturday.",c:["scary"],r:"g",nn:"Piața Amzei — Floreasca #43",ns:"Piața unde scriitorii și artiștii din București cumpără de 150 de ani",nst:"Piața Amzei are brânzeturi, miere, ciuperci și ierburi sălbatice.",nt:"Gratuit. Numai dimineața."},
  {id:44,n:"Stavropoleos Monastery — Centru Istoric #44",a:"Centru Istoric",v:["history","beautiful","quiet"],d:10,s:"The most elegant church in Bucharest — Brâncovenesc courtyard hidden behind the Old Town bars",st:"Built in 1724 in the Brâncovenesc style — a mix of Byzantine, Ottoman and Renaissance. Walk in off the bar street and be in total silence.",im:"Time-travel: the monastery at full capacity in 1750, monks and merchants in the same courtyard",t:"Free. Open daily. The courtyard is the real reason to come.",c:["famous_dead"],r:"g",nn:"Mănăstirea Stavropoleos — Centru Istoric #44",ns:"Cea mai elegantă biserică din București — curtea Brâncovenească ascunsă în spatele barurilor",nst:"Construită în 1724 în stilul Brâncovenesc.",nt:"Gratuit. Deschis zilnic."},
  {id:45,n:"Cișmigiu Gardens Chess — Centru Istoric #45",a:"Centru Istoric",v:["local","nature","history"],d:18,s:"The oldest public park in Bucharest — Romanians play chess here every afternoon",st:"Cișmigiu was laid out in 1847 and is still the city\'s social living room. The chess pavilion has games every afternoon. Rowboats on the lake. Old men arguing about politics.",im:"Time-travel: Bucharest intelligentsia debating Romanian independence in this park, 1859",t:"Free. Chess pavilion free to watch. Rowboats cheap.",c:["street_art"],r:"g",nn:"Grădina Cișmigiu — Centru Istoric #45",ns:"Cel mai vechi parc public din București — românii joacă șah aici",nst:"Cișmigiu amenajat în 1847. Pavilionul de șah cu meciuri în fiecare după-amiază.",nt:"Gratuit. Bărcile ieftine."},
  {id:46,n:"Titan IOR Lake Park — Berceni #46",a:"Berceni",v:["local","nature","hidden"],d:19,s:"The communist-era park of the east — a huge lake, stadium and Bucharest on its day off",st:"IOR Park in Titan was built in the 1960s as the people\'s park for the new housing blocks. On Sundays it fills with the families who live in the blocks around it.",im:"Time-travel: families moving into the new Titan tower blocks in 1965, grateful for the lake",t:"Free. Take bus 104 east.",c:["abandoned"],r:"g",nn:"Parcul IOR Titan — Berceni #46",ns:"Parcul suburban comunist — un lac mare, stadion și Bucureștiul în ziua liberă",nst:"Parcul IOR construit în anii \'60 pentru noile blocuri.",nt:"Gratuit. Autobuzul 104 est."},
  {id:47,n:"Palatul Suțu City Museum — Centru Istoric #47",a:"Centru Istoric",v:["history","beautiful","hidden"],d:37,s:"1833 neo-Gothic palace now the Bucharest City Museum — extraordinary interior, almost empty",st:"The Suțu Palace was built in 1833 and is now the city history museum. The staircase and ballroom are original. Fewer than 50 visitors on a typical day.",im:"Time-travel: Bucharest\'s aristocracy dancing in this ballroom in 1860",t:"Small entry fee. Often empty. The staircase alone is worth it.",c:["free_museum"],r:"g",nn:"Palatul Suțu — Centru Istoric #47",ns:"Palat neogotic din 1833, acum Muzeul Municipiului București — interior extraordinar",nst:"Palatul Suțu construit în 1833. Scara și sala de bal sunt originale.",nt:"Taxă mică. Adesea gol."},
  {id:48,n:"Văcărești Panorama Ridge — Văcărești #48",a:"Văcărești",v:["hidden","weird","free"],d:43,s:"The embankment of the unfinished canal overlooks the accidental wetland below",st:"The massive earthworks of the abandoned canal form a long ridge. Walk it and look down at the marshland that grew where Ceaușescu wanted ships.",im:"Time-travel: engineers surveying this canal project in 1986, expecting it finished in two years",t:"Free. Enter from Str. Vrancea. The ridge walk is 2km.",c:["local_only"],r:"g",nn:"Panorama Văcărești — Văcărești #48",ns:"Digul canalului neterminat oferă vedere asupra zonei umede",nst:"Marile lucrări de pământ ale canalului abandonat formează un dig lung.",nt:"Gratuit. Intrare din Str. Vrancea."},
  {id:49,n:"Museum of Communist Consumer — Centru Istoric #49",a:"Centru Istoric",v:["weird","history","hidden"],d:6,s:"Every product made in communist Romania in one private apartment-museum",st:"A private collector has amassed the complete material culture of communist Romania. The museum is in a flat. Entry is guided with a small fee.",im:"Time-travel: a Bucharest family eating communist-era food, wearing communist-era clothes, 1980",t:"Small entry fee. Guided tour only. Book by phone.",c:["architecture"],r:"g",nn:"Muzeul consumatorului comunist — Centru Istoric #49",ns:"Fiecare produs din România comunistă într-un apartament-muzeu privat",nst:"Un colecționar privat a adunat întreaga cultură materială a României comuniste.",nt:"Taxă mică. Numai tur ghidat."},
  {id:50,n:"Bulevardul Magheru Bookstalls — Centru Istoric #50",a:"Centru Istoric",v:["local","free","hidden"],d:40,s:"Second-hand book traders set up every morning — Romanian literature for €1",st:"The pavement booksellers of Magheru have been trading since the communist era. Philosophy, history, poetry, maps. The dealers know everything in the pile.",im:"Time-travel: intellectuals browsing these stalls in 1985, censored books hidden under the approved",t:"Free. Best Mon–Fri before 2pm. Bring cash.",c:["history_big"],r:"g",nn:"Anticarii de pe Magheru — Centru Istoric #50",ns:"Anticarii de cărți se instalează în fiecare dimineață — literatură română la 1€",nst:"Vânzătorii de trotuar de pe Magheru fac comerț din era comunistă.",nt:"Gratuit. Lun–vin înainte de 14:00."},
  {id:51,n:"Cărturești Carusel Bookshop — Centru Istoric #51",a:"Centru Istoric",v:["beautiful","hidden","free"],d:17,s:"Six floors of books in a 19th century palace — the most beautiful bookshop in Eastern Europe",st:"The Carusel Palace was built in 1860 and became a bookshop in 2013. The atrium is wrapped in white cast iron and books floor to ceiling. Free to enter and stay.",im:"Time-travel: Carusel Palace as a bustling commercial arcade in 1900, the Paris of the East",t:"Free to enter. Open daily. The reading gallery on the top floor is best.",c:["high_spots"],r:"g",nn:"Cărturești Carusel — Centru Istoric #51",ns:"Șase etaje de cărți într-un palat din sec. XIX — cea mai frumoasă librărie din Europa de Est",nst:"Palatul Carusel a fost construit în 1860 și a devenit librărie în 2013.",nt:"Intrare gratuită. Deschis zilnic."},

  {id:57,n:"Floreasca Lake Walk — Floreasca #57",a:"Floreasca",v:["local","nature","quiet"],d:19,s:"The lake where Bucharest jogs, picnics and forgets the chaos",st:"The lake has a running path, paddleboats and food stalls. On weekends it fills with families from early morning.",im:"Time-travel: Floreasca as a rural village outside Bucharest in 1900, farmers and cows",t:"Always free. Weekday mornings quiet. Weekend evenings social.",c:["street_art"],r:"g",nn:"Lacul Floreasca — Floreasca #57",ns:"Lacul unde Bucureștiul aleargă, face picnic și uită haosul",nst:"Lacul are un traseu de alergare, hidrobiciclete și tarabe cu mâncare.",nt:"Mereu gratuit."},
  {id:58,n:"Old Town Belle Époque Backstreets — Centru Istoric #58",a:"Centru Istoric",v:["history","weird","hidden"],d:33,s:"Behind the bar street — crumbling belle époque buildings that will be gone in 10 years",st:"Behind the main bar street, Bucharest Old Town has crumbling belle époque buildings, workshops, and courts that feel untouched.",im:"Time-travel: Bucharest Old Town at its peak, 1905 — the most elegant city in Eastern Europe",t:"Wander freely. Stavropoleos Lane and Soarelui Street are best.",c:["abandoned"],r:"g",nn:"Fundăturile din Centrul Vechi — Centru Istoric #58",ns:"În spatele barurilor — clădiri belle époque în ruinare care vor dispărea în 10 ani",nst:"Clădiri belle époque în ruinare, ateliere și curți neatinse.",nt:"Rătăcește liber. Strada Soarelui e una din cele mai bune."},
  {id:59,n:"Pasajul Macca-Vilacrosse — Centru Istoric #59",a:"Centru Istoric",v:["beautiful","hidden","weird"],d:42,s:"A yellow glass-roofed arcade from 1891 — shisha bars, chess players, frozen time",st:"Bucharest\'s only covered arcade bends in a Y shape under yellow glass. Hookah cafés have been here for decades. Men play backgammon. The light through the glass is extraordinary.",im:"Time-travel: Bucharest merchants promenading through this arcade in 1900",t:"Free. Open during café hours. Go on rainy days.",c:["free_museum"],r:"g",nn:"Pasajul Macca-Vilacrosse — Centru Istoric #59",ns:"Arcadă cu acoperiș galben din 1891 — narghilea, jucători de șah, timp îngețat",nst:"Singura arcadă acoperită a Bucureștiului în formă de Y sub sticlă galbenă.",nt:"Gratuit. Deschis în orele cafenelei."},
  {id:60,n:"Drumul Taberei Metro Art — Drumul Taberei #60",a:"Drumul Taberei",v:["street_art","hidden","local"],d:22,s:"The newest metro line has massive public art installations underground — almost no tourists",st:"The M5 line opened in 2020 and each station has large-scale art. Drumul Taberei station has extraordinary mosaic work. Ride the whole line for a free gallery.",im:"Time-travel: communist planners designing these tower blocks in 1970, promising a workers paradise",t:"Metro ticket only. Ride M5 end to end.",c:["local_only"],r:"g",nn:"Arta metroului Drumul Taberei — Drumul Taberei #60",ns:"Cea mai nouă linie de metrou are instalații masive de artă — aproape fără turiști",nst:"Linia M5 inaugurată în 2020. Fiecare stație are artă la scară mare.",nt:"Doar bilet de metrou. Mergeți cu M5 de la capăt la capăt."},
  {id:61,n:"Parcul Carol — Berceni #61",a:"Berceni",v:["history","beautiful","quiet"],d:5,s:"Bucharest\'s oldest formal park — a mausoleum, an aqueduct, and almost nobody here",st:"Carol Park was inaugurated in 1906 for the 40th anniversary of King Carol I. The communist mausoleum at the top was later used for unknown soldiers.",im:"Time-travel: the 1906 Jubilee Exhibition in this park — Romania showing itself to Europe",t:"Free. Enter from Șos. Olteniței. The hilltop has the best view.",c:["architecture"],r:"g",nn:"Parcul Carol — Berceni #61",ns:"Cel mai vechi parc formal din București — un mausoleu, un apeduct și aproape nimeni",nst:"Parcul Carol inaugurat în 1906 pentru aniversarea a 40 de ani a Regelui Carol I.",nt:"Gratuit. Intrare de pe Șos. Olteniței."},
  {id:62,n:"Antim Monastery — Centru Istoric #62",a:"Centru Istoric",v:["history","quiet","beautiful"],d:53,s:"Hidden monastery in a residential street — golden icons, silence, and no tourists at all",st:"Built in 1715 in the Brâncovenesc style. The founder Antim Ivireanul was later martyred by the Ottomans. You can walk in off the street and be in total silence.",im:"Time-travel: Antim Ivireanul printing books in the monastery press in 1715",t:"Free. Ring the bell to enter outside mass times.",c:["history_big"],r:"g",nn:"Mănăstirea Antim — Centru Istoric #62",ns:"Mănăstire ascunsă pe o stradă rezidențială — icoane de aur, liniște, zero turiști",nst:"Construită în 1715 în stilul Brâncovenesc.",nt:"Gratuit. Sunați la clopoțel pentru a intra."},
  {id:63,n:"Colentina Lake Chain — Colentina #63",a:"Colentina",v:["nature","local","hidden"],d:15,s:"A 15km chain of lakes in the northeast — local families, fishing, no tourists",st:"The Colentina River was dammed creating a chain of 18 lakes. The banks are public. Barbecues, fishing lines, weekend car radios. The Bucharest that guidebooks ignore.",im:"Time-travel: the Colentina River before the dams, 1920",t:"Free. Take bus 301 north. Any stop near Lacul Fundeni.",c:["high_spots"],r:"g",nn:"Lacurile Colentinei — Colentina #63",ns:"Un lanț de 15 km de lacuri în nord-est — familii locale, pescuit, fără turiști",nst:"Râul Colentina barajat, creând 18 lacuri cu maluri publice.",nt:"Gratuit. Autobuzul 301 nord."},
  {id:64,n:"Grădina Botanică — Cotroceni #64",a:"Cotroceni",v:["nature","beautiful","quiet"],d:49,s:"Botanical garden next to the university — greenhouses, Japanese garden, total calm",st:"Bucharest Botanical Garden covers 17 hectares. The rose garden peaks in June. The Japanese section is extraordinary. Almost no tourists.",im:"Time-travel: the botanical garden being laid out in 1874, just after Romanian independence",t:"Small entry fee. Worth it. Open daily in season.",c:["parks"],r:"g",nn:"Grădina Botanică — Cotroceni #64",ns:"Grădina botanică lângă universitate — sere, grădină japoneză, calm total",nst:"Grădina Botanică acoperă 17 hectare. Grădina de trandafiri e maximă în iunie.",nt:"Taxă mică. Merită."},
  {id:65,n:"Art Deco Villas Strada Polonă — Floreasca #65",a:"Floreasca",v:["architecture","beautiful","hidden"],d:32,s:"Five blocks of intact 1930s Art Deco villas — the Paris of the East still visible",st:"Strada Polonă and its side streets have Bucharest\'s finest concentration of interwar Art Deco and modernist villas.",im:"Time-travel: Bucharest\'s bourgeoisie commissioning these villas in 1935",t:"Free to walk. Best in morning light.",c:["courtyards"],r:"g",nn:"Vilele Art Deco de pe Strada Polonă — Floreasca #65",ns:"Cinci blocuri de vile Art Deco din anii \'30 — Parisul Estului încă vizibil",nst:"Strada Polonă are cea mai mare concentrare de vile Art Deco interbelice din București.",nt:"Liber de plimbare. Cel mai bine dimineața."},
  {id:66,n:"Obor Flea Market — Colentina #66",a:"Colentina",v:["local","weird","free"],d:26,s:"The biggest flea and food market in Bucharest — everything sold, nothing curated",st:"Obor is where Bucharest actually shops. The outdoor market sells everything from live chickens to old communist furniture. The indoor market has the city\'s best cheese.",im:"Time-travel: Obor as a pre-communist peasant market, 1930 — carts arriving before dawn",t:"Free to enter. Wednesday, Saturday and Sunday best.",c:["romantic_water"],r:"g",nn:"Piața Obor — Colentina #66",ns:"Cea mai mare piață de vechituri din București — vânzut totul, nimic curatoriat",nst:"Obor vinde de la pui vii la mobilă comunistă.",nt:"Intrare gratuită. Miercuri, sâmbătă și duminică."},
  {id:67,n:"Palatul Parlamentului Grounds — Centru Istoric #67",a:"Centru Istoric",v:["weird","history","architecture"],d:22,s:"The second-largest building in the world — enter the grounds and feel the scale",st:"Ceaușescu demolished a quarter of Bucharest to build this. 1,100 rooms. 3,500 tonnes of crystal chandeliers. The entrance plaza alone is overwhelming.",im:"Time-travel: the demolition of the historic Uranus neighborhood in 1984 to make room",t:"Guided tours from the main entrance. Small fee. Book ahead.",c:["scary"],r:"y",nn:"Palatul Parlamentului — Centru Istoric #67",ns:"A doua cea mai mare clădire din lume — intră și simte proporțiile",nst:"Ceaușescu a demolat un sfert din București. 1.100 de camere.",nt:"Tururi ghidate. Taxă mică. Rezervați."},
  {id:68,n:"Piața Amzei Morning Market — Floreasca #68",a:"Floreasca",v:["local","free","hidden"],d:14,s:"The neighbourhood food market where Bucharest\'s writers and artists have shopped for 150 years",st:"Piața Amzei is the market of the Calea Victoriei neighbourhood since the 1800s. Cheese, honey, mushrooms, wild herbs. Vendors whose families have been coming for generations.",im:"Time-travel: post-war Bucharest 1950 — this market one of the few places to find real food",t:"Free. Mornings only. Best Tuesday–Saturday.",c:["famous_dead"],r:"g",nn:"Piața Amzei — Floreasca #68",ns:"Piața unde scriitorii și artiștii din București cumpără de 150 de ani",nst:"Piața Amzei are brânzeturi, miere, ciuperci și ierburi sălbatice.",nt:"Gratuit. Numai dimineața."},
  {id:69,n:"Stavropoleos Monastery — Centru Istoric #69",a:"Centru Istoric",v:["history","beautiful","quiet"],d:18,s:"The most elegant church in Bucharest — Brâncovenesc courtyard hidden behind the Old Town bars",st:"Built in 1724 in the Brâncovenesc style — a mix of Byzantine, Ottoman and Renaissance. Walk in off the bar street and be in total silence.",im:"Time-travel: the monastery at full capacity in 1750, monks and merchants in the same courtyard",t:"Free. Open daily. The courtyard is the real reason to come.",c:["street_art"],r:"g",nn:"Mănăstirea Stavropoleos — Centru Istoric #69",ns:"Cea mai elegantă biserică din București — curtea Brâncovenească ascunsă în spatele barurilor",nst:"Construită în 1724 în stilul Brâncovenesc.",nt:"Gratuit. Deschis zilnic."},
  {id:70,n:"Cișmigiu Gardens Chess — Centru Istoric #70",a:"Centru Istoric",v:["local","nature","history"],d:53,s:"The oldest public park in Bucharest — Romanians play chess here every afternoon",st:"Cișmigiu was laid out in 1847 and is still the city\'s social living room. The chess pavilion has games every afternoon. Rowboats on the lake. Old men arguing about politics.",im:"Time-travel: Bucharest intelligentsia debating Romanian independence in this park, 1859",t:"Free. Chess pavilion free to watch. Rowboats cheap.",c:["abandoned"],r:"g",nn:"Grădina Cișmigiu — Centru Istoric #70",ns:"Cel mai vechi parc public din București — românii joacă șah aici",nst:"Cișmigiu amenajat în 1847. Pavilionul de șah cu meciuri în fiecare după-amiază.",nt:"Gratuit. Bărcile ieftine."},
  {id:71,n:"Titan IOR Lake Park — Berceni #71",a:"Berceni",v:["local","nature","hidden"],d:26,s:"The communist-era park of the east — a huge lake, stadium and Bucharest on its day off",st:"IOR Park in Titan was built in the 1960s as the people\'s park for the new housing blocks. On Sundays it fills with the families who live in the blocks around it.",im:"Time-travel: families moving into the new Titan tower blocks in 1965, grateful for the lake",t:"Free. Take bus 104 east.",c:["free_museum"],r:"g",nn:"Parcul IOR Titan — Berceni #71",ns:"Parcul suburban comunist — un lac mare, stadion și Bucureștiul în ziua liberă",nst:"Parcul IOR construit în anii \'60 pentru noile blocuri.",nt:"Gratuit. Autobuzul 104 est."},
  {id:72,n:"Palatul Suțu City Museum — Centru Istoric #72",a:"Centru Istoric",v:["history","beautiful","hidden"],d:11,s:"1833 neo-Gothic palace now the Bucharest City Museum — extraordinary interior, almost empty",st:"The Suțu Palace was built in 1833 and is now the city history museum. The staircase and ballroom are original. Fewer than 50 visitors on a typical day.",im:"Time-travel: Bucharest\'s aristocracy dancing in this ballroom in 1860",t:"Small entry fee. Often empty. The staircase alone is worth it.",c:["local_only"],r:"g",nn:"Palatul Suțu — Centru Istoric #72",ns:"Palat neogotic din 1833, acum Muzeul Municipiului București — interior extraordinar",nst:"Palatul Suțu construit în 1833. Scara și sala de bal sunt originale.",nt:"Taxă mică. Adesea gol."},
  {id:73,n:"Văcărești Panorama Ridge — Văcărești #73",a:"Văcărești",v:["hidden","weird","free"],d:10,s:"The embankment of the unfinished canal overlooks the accidental wetland below",st:"The massive earthworks of the abandoned canal form a long ridge. Walk it and look down at the marshland that grew where Ceaușescu wanted ships.",im:"Time-travel: engineers surveying this canal project in 1986, expecting it finished in two years",t:"Free. Enter from Str. Vrancea. The ridge walk is 2km.",c:["architecture"],r:"g",nn:"Panorama Văcărești — Văcărești #73",ns:"Digul canalului neterminat oferă vedere asupra zonei umede",nst:"Marile lucrări de pământ ale canalului abandonat formează un dig lung.",nt:"Gratuit. Intrare din Str. Vrancea."},
  {id:74,n:"Museum of Communist Consumer — Centru Istoric #74",a:"Centru Istoric",v:["weird","history","hidden"],d:29,s:"Every product made in communist Romania in one private apartment-museum",st:"A private collector has amassed the complete material culture of communist Romania. The museum is in a flat. Entry is guided with a small fee.",im:"Time-travel: a Bucharest family eating communist-era food, wearing communist-era clothes, 1980",t:"Small entry fee. Guided tour only. Book by phone.",c:["history_big"],r:"g",nn:"Muzeul consumatorului comunist — Centru Istoric #74",ns:"Fiecare produs din România comunistă într-un apartament-muzeu privat",nst:"Un colecționar privat a adunat întreaga cultură materială a României comuniste.",nt:"Taxă mică. Numai tur ghidat."},
  {id:75,n:"Bulevardul Magheru Bookstalls — Centru Istoric #75",a:"Centru Istoric",v:["local","free","hidden"],d:11,s:"Second-hand book traders set up every morning — Romanian literature for €1",st:"The pavement booksellers of Magheru have been trading since the communist era. Philosophy, history, poetry, maps. The dealers know everything in the pile.",im:"Time-travel: intellectuals browsing these stalls in 1985, censored books hidden under the approved",t:"Free. Best Mon–Fri before 2pm. Bring cash.",c:["high_spots"],r:"g",nn:"Anticarii de pe Magheru — Centru Istoric #75",ns:"Anticarii de cărți se instalează în fiecare dimineață — literatură română la 1€",nst:"Vânzătorii de trotuar de pe Magheru fac comerț din era comunistă.",nt:"Gratuit. Lun–vin înainte de 14:00."},
  {id:76,n:"Cărturești Carusel Bookshop — Centru Istoric #76",a:"Centru Istoric",v:["beautiful","hidden","free"],d:27,s:"Six floors of books in a 19th century palace — the most beautiful bookshop in Eastern Europe",st:"The Carusel Palace was built in 1860 and became a bookshop in 2013. The atrium is wrapped in white cast iron and books floor to ceiling. Free to enter and stay.",im:"Time-travel: Carusel Palace as a bustling commercial arcade in 1900, the Paris of the East",t:"Free to enter. Open daily. The reading gallery on the top floor is best.",c:["parks"],r:"g",nn:"Cărturești Carusel — Centru Istoric #76",ns:"Șase etaje de cărți într-un palat din sec. XIX — cea mai frumoasă librărie din Europa de Est",nst:"Palatul Carusel a fost construit în 1860 și a devenit librărie în 2013.",nt:"Intrare gratuită. Deschis zilnic."},
  {id:77,n:"Hanul lui Manuc — Centru Istoric #77",a:"Centru Istoric",v:["history","hidden","beautiful"],d:27,s:"1808 Ottoman caravanserai — the oldest inn in Bucharest still functioning",st:"Built by Armenian merchant Manuc Bey, the inn has a wooden galleried courtyard from the early 19th century. The Treaty of Bucharest was signed here in 1812.",im:"Time-travel: Ottoman merchants unloading caravans in this courtyard, 1820",t:"Courtyard free. Restaurant inside. Walk through slowly.",c:["courtyards"],r:"g",nn:"Hanul lui Manuc — Centru Istoric #77",ns:"Caravanserai otoman din 1808 — cel mai vechi han din București funcțional",nst:"Construit de negustorul armean Manuc Bei. Tratatul de la București semnat aici în 1812.",nt:"Curtea gratuită. Restaurant înăuntru."},
  {id:78,n:"Văcărești Urban Wetland — Văcărești #78",a:"Văcărești",v:["nature","hidden","weird"],d:43,s:"A communist unfinished canal became a wild urban delta — herons, wild horses, inside Bucharest",st:"Ceaușescu began digging a canal here in the 1980s and abandoned it. Nature returned. The result is a 200-hectare wetland with herons, cormorants and wild horses inside the city.",im:"Time-travel: 1987 — labourers digging what would become an accidental nature reserve",t:"Free. Enter from the south. Birds most active at dawn and dusk.",c:["romantic_water"],r:"g",nn:"Parcul Natural Văcărești — Văcărești #78",ns:"Un canal comunist neterminat a devenit o deltă sălbatică — stârci, cai sălbatici, în București",nst:"Ceaușescu a început să sape un canal și a abandonat proiectul. Natura a revenit.",nt:"Gratuit. Intrare dinspre sud."},
  {id:79,n:"Herăstrău Lake Rowing — Herăstrău #79",a:"Herăstrău",v:["nature","local","beautiful"],d:21,s:"Huge park and lake in the north — rent a boat, find an empty bench, watch Bucharest forget itself",st:"Herăstrău is 200 hectares of park and lake. The path around takes 90 minutes. Rowboats rent by the hour.",im:"Time-travel: Bucharest bourgeoisie promenading in Herăstrău on Sunday mornings, 1935",t:"Park free. Rowboat rental cheap. Weekday mornings are quiet.",c:["scary"],r:"g",nn:"Parcul Herăstrău — Herăstrău #79",ns:"Parc mare și lac în nord — închiriază o barcă, găsește o bancă liberă",nst:"Herăstrău are 200 de hectare de parc și lac.",nt:"Parcul gratuit. Bărcile ieftine."},
  {id:80,n:"Cimitirul Bellu — Berceni #80",a:"Berceni",v:["history","beautiful","quiet"],d:7,s:"The pantheon of Romanian culture — poets, sculptors, politicians in one extraordinary cemetery",st:"Bellu cemetery was opened in 1858 and contains the graves of almost every major Romanian figure. The tombs are Art Nouveau masterpieces.",im:"Time-travel: the funeral of poet Mihai Eminescu at Bellu, 1889, all of Bucharest in the streets",t:"Free. Open daily. Get a map at the entrance.",c:["famous_dead"],r:"g",nn:"Cimitirul Bellu — Berceni #80",ns:"Panteonul culturii române — poeți, sculptori, politicieni — un cimitir extraordinar",nst:"Cimitirul Bellu deschis în 1858. Mormintele sunt capodopere Art Nouveau.",nt:"Gratuit. Deschis zilnic. Ia o hartă la intrare."},
  {id:81,n:"Cotroceni Palace Garden — Cotroceni #81",a:"Cotroceni",v:["beautiful","hidden","history"],d:51,s:"The presidential palace garden — Neogothic towers, roses, silence in the city",st:"The Cotroceni Palace was built in 1896 for the Romanian royal family and is now the presidential residence. The garden is extraordinary.",im:"Time-travel: the Romanian royal family walking these gardens in 1910",t:"Garden visits with guided tour (small fee). Book ahead.",c:["street_art"],r:"g",nn:"Grădina Palatului Cotroceni — Cotroceni #81",ns:"Grădina palatului prezidențial — turnuri neogotice, trandafiri, liniște",nst:"Palatul Cotroceni construit în 1896 pentru familia regală.",nt:"Vizite ghidate (taxă mică). Rezervați în avans."},
  {id:82,n:"Floreasca Lake Walk — Floreasca #82",a:"Floreasca",v:["local","nature","quiet"],d:34,s:"The lake where Bucharest jogs, picnics and forgets the chaos",st:"The lake has a running path, paddleboats and food stalls. On weekends it fills with families from early morning.",im:"Time-travel: Floreasca as a rural village outside Bucharest in 1900, farmers and cows",t:"Always free. Weekday mornings quiet. Weekend evenings social.",c:["abandoned"],r:"g",nn:"Lacul Floreasca — Floreasca #82",ns:"Lacul unde Bucureștiul aleargă, face picnic și uită haosul",nst:"Lacul are un traseu de alergare, hidrobiciclete și tarabe cu mâncare.",nt:"Mereu gratuit."},

  {id:87,n:"Antim Monastery — Centru Istoric #87",a:"Centru Istoric",v:["history","quiet","beautiful"],d:40,s:"Hidden monastery in a residential street — golden icons, silence, and no tourists at all",st:"Built in 1715 in the Brâncovenesc style. The founder Antim Ivireanul was later martyred by the Ottomans. You can walk in off the street and be in total silence.",im:"Time-travel: Antim Ivireanul printing books in the monastery press in 1715",t:"Free. Ring the bell to enter outside mass times.",c:["high_spots"],r:"g",nn:"Mănăstirea Antim — Centru Istoric #87",ns:"Mănăstire ascunsă pe o stradă rezidențială — icoane de aur, liniște, zero turiști",nst:"Construită în 1715 în stilul Brâncovenesc.",nt:"Gratuit. Sunați la clopoțel pentru a intra."},
  {id:88,n:"Colentina Lake Chain — Colentina #88",a:"Colentina",v:["nature","local","hidden"],d:23,s:"A 15km chain of lakes in the northeast — local families, fishing, no tourists",st:"The Colentina River was dammed creating a chain of 18 lakes. The banks are public. Barbecues, fishing lines, weekend car radios. The Bucharest that guidebooks ignore.",im:"Time-travel: the Colentina River before the dams, 1920",t:"Free. Take bus 301 north. Any stop near Lacul Fundeni.",c:["parks"],r:"g",nn:"Lacurile Colentinei — Colentina #88",ns:"Un lanț de 15 km de lacuri în nord-est — familii locale, pescuit, fără turiști",nst:"Râul Colentina barajat, creând 18 lacuri cu maluri publice.",nt:"Gratuit. Autobuzul 301 nord."},
  {id:89,n:"Grădina Botanică — Cotroceni #89",a:"Cotroceni",v:["nature","beautiful","quiet"],d:45,s:"Botanical garden next to the university — greenhouses, Japanese garden, total calm",st:"Bucharest Botanical Garden covers 17 hectares. The rose garden peaks in June. The Japanese section is extraordinary. Almost no tourists.",im:"Time-travel: the botanical garden being laid out in 1874, just after Romanian independence",t:"Small entry fee. Worth it. Open daily in season.",c:["courtyards"],r:"g",nn:"Grădina Botanică — Cotroceni #89",ns:"Grădina botanică lângă universitate — sere, grădină japoneză, calm total",nst:"Grădina Botanică acoperă 17 hectare. Grădina de trandafiri e maximă în iunie.",nt:"Taxă mică. Merită."},
  {id:90,n:"Art Deco Villas Strada Polonă — Floreasca #90",a:"Floreasca",v:["architecture","beautiful","hidden"],d:44,s:"Five blocks of intact 1930s Art Deco villas — the Paris of the East still visible",st:"Strada Polonă and its side streets have Bucharest\'s finest concentration of interwar Art Deco and modernist villas.",im:"Time-travel: Bucharest\'s bourgeoisie commissioning these villas in 1935",t:"Free to walk. Best in morning light.",c:["romantic_water"],r:"g",nn:"Vilele Art Deco de pe Strada Polonă — Floreasca #90",ns:"Cinci blocuri de vile Art Deco din anii \'30 — Parisul Estului încă vizibil",nst:"Strada Polonă are cea mai mare concentrare de vile Art Deco interbelice din București.",nt:"Liber de plimbare. Cel mai bine dimineața."},
  {id:91,n:"Obor Flea Market — Colentina #91",a:"Colentina",v:["local","weird","free"],d:28,s:"The biggest flea and food market in Bucharest — everything sold, nothing curated",st:"Obor is where Bucharest actually shops. The outdoor market sells everything from live chickens to old communist furniture. The indoor market has the city\'s best cheese.",im:"Time-travel: Obor as a pre-communist peasant market, 1930 — carts arriving before dawn",t:"Free to enter. Wednesday, Saturday and Sunday best.",c:["scary"],r:"g",nn:"Piața Obor — Colentina #91",ns:"Cea mai mare piață de vechituri din București — vânzut totul, nimic curatoriat",nst:"Obor vinde de la pui vii la mobilă comunistă.",nt:"Intrare gratuită. Miercuri, sâmbătă și duminică."},
  {id:92,n:"Palatul Parlamentului Grounds — Centru Istoric #92",a:"Centru Istoric",v:["weird","history","architecture"],d:41,s:"The second-largest building in the world — enter the grounds and feel the scale",st:"Ceaușescu demolished a quarter of Bucharest to build this. 1,100 rooms. 3,500 tonnes of crystal chandeliers. The entrance plaza alone is overwhelming.",im:"Time-travel: the demolition of the historic Uranus neighborhood in 1984 to make room",t:"Guided tours from the main entrance. Small fee. Book ahead.",c:["famous_dead"],r:"y",nn:"Palatul Parlamentului — Centru Istoric #92",ns:"A doua cea mai mare clădire din lume — intră și simte proporțiile",nst:"Ceaușescu a demolat un sfert din București. 1.100 de camere.",nt:"Tururi ghidate. Taxă mică. Rezervați."},
  {id:93,n:"Piața Amzei Morning Market — Floreasca #93",a:"Floreasca",v:["local","free","hidden"],d:17,s:"The neighbourhood food market where Bucharest\'s writers and artists have shopped for 150 years",st:"Piața Amzei is the market of the Calea Victoriei neighbourhood since the 1800s. Cheese, honey, mushrooms, wild herbs. Vendors whose families have been coming for generations.",im:"Time-travel: post-war Bucharest 1950 — this market one of the few places to find real food",t:"Free. Mornings only. Best Tuesday–Saturday.",c:["street_art"],r:"g",nn:"Piața Amzei — Floreasca #93",ns:"Piața unde scriitorii și artiștii din București cumpără de 150 de ani",nst:"Piața Amzei are brânzeturi, miere, ciuperci și ierburi sălbatice.",nt:"Gratuit. Numai dimineața."},
  {id:94,n:"Stavropoleos Monastery — Centru Istoric #94",a:"Centru Istoric",v:["history","beautiful","quiet"],d:50,s:"The most elegant church in Bucharest — Brâncovenesc courtyard hidden behind the Old Town bars",st:"Built in 1724 in the Brâncovenesc style — a mix of Byzantine, Ottoman and Renaissance. Walk in off the bar street and be in total silence.",im:"Time-travel: the monastery at full capacity in 1750, monks and merchants in the same courtyard",t:"Free. Open daily. The courtyard is the real reason to come.",c:["abandoned"],r:"g",nn:"Mănăstirea Stavropoleos — Centru Istoric #94",ns:"Cea mai elegantă biserică din București — curtea Brâncovenească ascunsă în spatele barurilor",nst:"Construită în 1724 în stilul Brâncovenesc.",nt:"Gratuit. Deschis zilnic."},
  {id:95,n:"Cișmigiu Gardens Chess — Centru Istoric #95",a:"Centru Istoric",v:["local","nature","history"],d:9,s:"The oldest public park in Bucharest — Romanians play chess here every afternoon",st:"Cișmigiu was laid out in 1847 and is still the city\'s social living room. The chess pavilion has games every afternoon. Rowboats on the lake. Old men arguing about politics.",im:"Time-travel: Bucharest intelligentsia debating Romanian independence in this park, 1859",t:"Free. Chess pavilion free to watch. Rowboats cheap.",c:["free_museum"],r:"g",nn:"Grădina Cișmigiu — Centru Istoric #95",ns:"Cel mai vechi parc public din București — românii joacă șah aici",nst:"Cișmigiu amenajat în 1847. Pavilionul de șah cu meciuri în fiecare după-amiază.",nt:"Gratuit. Bărcile ieftine."},
  {id:96,n:"Titan IOR Lake Park — Berceni #96",a:"Berceni",v:["local","nature","hidden"],d:7,s:"The communist-era park of the east — a huge lake, stadium and Bucharest on its day off",st:"IOR Park in Titan was built in the 1960s as the people\'s park for the new housing blocks. On Sundays it fills with the families who live in the blocks around it.",im:"Time-travel: families moving into the new Titan tower blocks in 1965, grateful for the lake",t:"Free. Take bus 104 east.",c:["local_only"],r:"g",nn:"Parcul IOR Titan — Berceni #96",ns:"Parcul suburban comunist — un lac mare, stadion și Bucureștiul în ziua liberă",nst:"Parcul IOR construit în anii \'60 pentru noile blocuri.",nt:"Gratuit. Autobuzul 104 est."},
  {id:97,n:"Palatul Suțu City Museum — Centru Istoric #97",a:"Centru Istoric",v:["history","beautiful","hidden"],d:47,s:"1833 neo-Gothic palace now the Bucharest City Museum — extraordinary interior, almost empty",st:"The Suțu Palace was built in 1833 and is now the city history museum. The staircase and ballroom are original. Fewer than 50 visitors on a typical day.",im:"Time-travel: Bucharest\'s aristocracy dancing in this ballroom in 1860",t:"Small entry fee. Often empty. The staircase alone is worth it.",c:["architecture"],r:"g",nn:"Palatul Suțu — Centru Istoric #97",ns:"Palat neogotic din 1833, acum Muzeul Municipiului București — interior extraordinar",nst:"Palatul Suțu construit în 1833. Scara și sala de bal sunt originale.",nt:"Taxă mică. Adesea gol."},
  {id:98,n:"Văcărești Panorama Ridge — Văcărești #98",a:"Văcărești",v:["hidden","weird","free"],d:19,s:"The embankment of the unfinished canal overlooks the accidental wetland below",st:"The massive earthworks of the abandoned canal form a long ridge. Walk it and look down at the marshland that grew where Ceaușescu wanted ships.",im:"Time-travel: engineers surveying this canal project in 1986, expecting it finished in two years",t:"Free. Enter from Str. Vrancea. The ridge walk is 2km.",c:["history_big"],r:"g",nn:"Panorama Văcărești — Văcărești #98",ns:"Digul canalului neterminat oferă vedere asupra zonei umede",nst:"Marile lucrări de pământ ale canalului abandonat formează un dig lung.",nt:"Gratuit. Intrare din Str. Vrancea."},
  {id:99,n:"Museum of Communist Consumer — Centru Istoric #99",a:"Centru Istoric",v:["weird","history","hidden"],d:54,s:"Every product made in communist Romania in one private apartment-museum",st:"A private collector has amassed the complete material culture of communist Romania. The museum is in a flat. Entry is guided with a small fee.",im:"Time-travel: a Bucharest family eating communist-era food, wearing communist-era clothes, 1980",t:"Small entry fee. Guided tour only. Book by phone.",c:["high_spots"],r:"g",nn:"Muzeul consumatorului comunist — Centru Istoric #99",ns:"Fiecare produs din România comunistă într-un apartament-muzeu privat",nst:"Un colecționar privat a adunat întreaga cultură materială a României comuniste.",nt:"Taxă mică. Numai tur ghidat."},
  {id:100,n:"Bulevardul Magheru Bookstalls — Centru Istoric #100",a:"Centru Istoric",v:["local","free","hidden"],d:23,s:"Second-hand book traders set up every morning — Romanian literature for €1",st:"The pavement booksellers of Magheru have been trading since the communist era. Philosophy, history, poetry, maps. The dealers know everything in the pile.",im:"Time-travel: intellectuals browsing these stalls in 1985, censored books hidden under the approved",t:"Free. Best Mon–Fri before 2pm. Bring cash.",c:["parks"],r:"g",nn:"Anticarii de pe Magheru — Centru Istoric #100",ns:"Anticarii de cărți se instalează în fiecare dimineață — literatură română la 1€",nst:"Vânzătorii de trotuar de pe Magheru fac comerț din era comunistă.",nt:"Gratuit. Lun–vin înainte de 14:00."},
  {id:101,n:"Cărturești Carusel Bookshop — Centru Istoric #101",a:"Centru Istoric",v:["beautiful","hidden","free"],d:10,s:"Six floors of books in a 19th century palace — the most beautiful bookshop in Eastern Europe",st:"The Carusel Palace was built in 1860 and became a bookshop in 2013. The atrium is wrapped in white cast iron and books floor to ceiling. Free to enter and stay.",im:"Time-travel: Carusel Palace as a bustling commercial arcade in 1900, the Paris of the East",t:"Free to enter. Open daily. The reading gallery on the top floor is best.",c:["courtyards"],r:"g",nn:"Cărturești Carusel — Centru Istoric #101",ns:"Șase etaje de cărți într-un palat din sec. XIX — cea mai frumoasă librărie din Europa de Est",nst:"Palatul Carusel a fost construit în 1860 și a devenit librărie în 2013.",nt:"Intrare gratuită. Deschis zilnic."},
  {id:102,n:"Hanul lui Manuc — Centru Istoric #102",a:"Centru Istoric",v:["history","hidden","beautiful"],d:19,s:"1808 Ottoman caravanserai — the oldest inn in Bucharest still functioning",st:"Built by Armenian merchant Manuc Bey, the inn has a wooden galleried courtyard from the early 19th century. The Treaty of Bucharest was signed here in 1812.",im:"Time-travel: Ottoman merchants unloading caravans in this courtyard, 1820",t:"Courtyard free. Restaurant inside. Walk through slowly.",c:["romantic_water"],r:"g",nn:"Hanul lui Manuc — Centru Istoric #102",ns:"Caravanserai otoman din 1808 — cel mai vechi han din București funcțional",nst:"Construit de negustorul armean Manuc Bei. Tratatul de la București semnat aici în 1812.",nt:"Curtea gratuită. Restaurant înăuntru."},
  {id:103,n:"Văcărești Urban Wetland — Văcărești #103",a:"Văcărești",v:["nature","hidden","weird"],d:11,s:"A communist unfinished canal became a wild urban delta — herons, wild horses, inside Bucharest",st:"Ceaușescu began digging a canal here in the 1980s and abandoned it. Nature returned. The result is a 200-hectare wetland with herons, cormorants and wild horses inside the city.",im:"Time-travel: 1987 — labourers digging what would become an accidental nature reserve",t:"Free. Enter from the south. Birds most active at dawn and dusk.",c:["scary"],r:"g",nn:"Parcul Natural Văcărești — Văcărești #103",ns:"Un canal comunist neterminat a devenit o deltă sălbatică — stârci, cai sălbatici, în București",nst:"Ceaușescu a început să sape un canal și a abandonat proiectul. Natura a revenit.",nt:"Gratuit. Intrare dinspre sud."},
  {id:104,n:"Herăstrău Lake Rowing — Herăstrău #104",a:"Herăstrău",v:["nature","local","beautiful"],d:29,s:"Huge park and lake in the north — rent a boat, find an empty bench, watch Bucharest forget itself",st:"Herăstrău is 200 hectares of park and lake. The path around takes 90 minutes. Rowboats rent by the hour.",im:"Time-travel: Bucharest bourgeoisie promenading in Herăstrău on Sunday mornings, 1935",t:"Park free. Rowboat rental cheap. Weekday mornings are quiet.",c:["famous_dead"],r:"g",nn:"Parcul Herăstrău — Herăstrău #104",ns:"Parc mare și lac în nord — închiriază o barcă, găsește o bancă liberă",nst:"Herăstrău are 200 de hectare de parc și lac.",nt:"Parcul gratuit. Bărcile ieftine."},
  {id:105,n:"Cimitirul Bellu — Berceni #105",a:"Berceni",v:["history","beautiful","quiet"],d:22,s:"The pantheon of Romanian culture — poets, sculptors, politicians in one extraordinary cemetery",st:"Bellu cemetery was opened in 1858 and contains the graves of almost every major Romanian figure. The tombs are Art Nouveau masterpieces.",im:"Time-travel: the funeral of poet Mihai Eminescu at Bellu, 1889, all of Bucharest in the streets",t:"Free. Open daily. Get a map at the entrance.",c:["street_art"],r:"g",nn:"Cimitirul Bellu — Berceni #105",ns:"Panteonul culturii române — poeți, sculptori, politicieni — un cimitir extraordinar",nst:"Cimitirul Bellu deschis în 1858. Mormintele sunt capodopere Art Nouveau.",nt:"Gratuit. Deschis zilnic. Ia o hartă la intrare."}
];
