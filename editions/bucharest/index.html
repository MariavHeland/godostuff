@keyframes diceSpin{0%{transform:rotateY(0deg) scale(1.1)}100%{transform:rotateY(360deg) scale(1.1)}}
@keyframes slotFlicker{0%,100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0px)}50%{opacity:.55;transform:translateY(-6px) scale(.96);filter:blur(1.5px)}}
@keyframes finalLand{0%{opacity:0;transform:scale(.75) translateY(28px)}65%{transform:scale(1.08) translateY(-4px)}85%{transform:scale(.97) translateY(2px)}100%{opacity:1;transform:scale(1) translateY(0)}}

<script>
const P = [
  {id:1,n:"Cărturești Carusel Bookshop — Centru Istoric",a:"Centru Istoric",v:["beautiful","hidden","free"],d:5,s:"Six floors of books in a 19th century palace — the most beautiful bookshop in Eastern Europe",st:"The Carusel Palace was built in 1860 and became a bookshop in 2013. The atrium is wrapped in white cast iron and books floor to ceiling. Free to enter and stay.",im:"Time-travel: Carusel Palace as a bustling commercial arcade in 1900, the Paris of the East",t:"Free to enter. Open daily. The reading gallery on the top floor is best.",c:["architecture"],r:"g",nn:"Cărturești Carusel — Centru Istoric",ns:"Șase etaje de cărți într-un palat din sec. XIX — cea mai frumoasă librărie din Europa de Est",nst:"Palatul Carusel a fost construit în 1860 și a devenit librărie în 2013.",nt:"Intrare gratuită. Deschis zilnic."},
  {id:2,n:"Hanul lui Manuc — Centru Istoric",a:"Centru Istoric",v:["history","hidden","beautiful"],d:5,s:"1808 Ottoman caravanserai — the oldest inn in Bucharest still functioning",st:"Built by Armenian merchant Manuc Bey, the inn has a wooden galleried courtyard from the early 19th century. The Treaty of Bucharest was signed here in 1812.",im:"Time-travel: Ottoman merchants unloading caravans in this courtyard, 1820",t:"Courtyard free. Restaurant inside. Walk through slowly.",c:["history_big"],r:"g",nn:"Hanul lui Manuc — Centru Istoric",ns:"Caravanserai otoman din 1808 — cel mai vechi han din București funcțional",nst:"Construit de negustorul armean Manuc Bei. Tratatul de la București semnat aici în 1812.",nt:"Curtea gratuită. Restaurant înăuntru."},
  {id:3,n:"Văcărești Urban Wetland — Văcărești",a:"Văcărești",v:["nature","hidden","weird"],d:25,s:"A communist unfinished canal became a wild urban delta — herons, wild horses, inside Bucharest",st:"Ceaușescu began digging a canal here in the 1980s and abandoned it. Nature returned. The result is a 200-hectare wetland with herons, cormorants and wild horses inside the city.",im:"Time-travel: 1987 — labourers digging what would become an accidental nature reserve",t:"Free. Enter from the south. Birds most active at dawn and dusk.",c:["abandoned"],r:"g",nn:"Parcul Natural Văcărești — Văcărești",ns:"Un canal comunist neterminat a devenit o deltă sălbatică — stârci, cai sălbatici, în București",nst:"Ceaușescu a început să sape un canal și a abandonat proiectul. Natura a revenit.",nt:"Gratuit. Intrare dinspre sud."},
  {id:4,n:"Herăstrău Lake Rowing — Herăstrău",a:"Herăstrău",v:["nature","local","beautiful"],d:20,s:"Huge park and lake in the north — rent a boat, find an empty bench, watch Bucharest forget itself",st:"Herăstrău is 200 hectares of park and lake. The path around takes 90 minutes. Rowboats rent by the hour.",im:"Time-travel: Bucharest bourgeoisie promenading in Herăstrău on Sunday mornings, 1935",t:"Park free. Rowboat rental cheap. Weekday mornings are quiet.",c:["parks"],r:"g",nn:"Parcul Herăstrău — Herăstrău",ns:"Parc mare și lac în nord — închiriază o barcă, găsește o bancă liberă",nst:"Herăstrău are 200 de hectare de parc și lac.",nt:"Parcul gratuit. Bărcile ieftine."},
  {id:5,n:"Cimitirul Bellu — Berceni",a:"Berceni",v:["history","beautiful","quiet"],d:30,s:"The pantheon of Romanian culture — poets, sculptors, politicians in one extraordinary cemetery",st:"Bellu cemetery was opened in 1858 and contains the graves of almost every major Romanian figure. The tombs are Art Nouveau masterpieces.",im:"Time-travel: the funeral of poet Mihai Eminescu at Bellu, 1889, all of Bucharest in the streets",t:"Free. Open daily. Get a map at the entrance.",c:["famous_dead"],r:"g",nn:"Cimitirul Bellu — Berceni",ns:"Panteonul culturii române — poeți, sculptori, politicieni — un cimitir extraordinar",nst:"Cimitirul Bellu deschis în 1858. Mormintele sunt capodopere Art Nouveau.",nt:"Gratuit. Deschis zilnic. Ia o hartă la intrare."},
  {id:6,n:"Cotroceni Palace Garden — Cotroceni",a:"Cotroceni",v:["beautiful","hidden","history"],d:25,s:"The presidential palace garden — Neogothic towers, roses, silence in the city",st:"The Cotroceni Palace was built in 1896 for the Romanian royal family and is now the presidential residence. The garden is extraordinary.",im:"Time-travel: the Romanian royal family walking these gardens in 1910",t:"Garden visits with guided tour (small fee). Book ahead.",c:["architecture"],r:"g",nn:"Grădina Palatului Cotroceni — Cotroceni",ns:"Grădina palatului prezidențial — turnuri neogotice, trandafiri, liniște",nst:"Palatul Cotroceni construit în 1896 pentru familia regală.",nt:"Vizite ghidate (taxă mică). Rezervați în avans."},
  {id:7,n:"Floreasca Lake Walk — Floreasca",a:"Floreasca",v:["local","nature","quiet"],d:20,s:"The lake where Bucharest jogs, picnics and forgets the chaos",st:"The lake has a running path, paddleboats and food stalls. On weekends it fills with families from early morning.",im:"Time-travel: Floreasca as a rural village outside Bucharest in 1900, farmers and cows",t:"Always free. Weekday mornings quiet. Weekend evenings social.",c:["parks"],r:"g",nn:"Lacul Floreasca — Floreasca",ns:"Lacul unde Bucureștiul aleargă, face picnic și uită haosul",nst:"Lacul are un traseu de alergare, hidrobiciclete și tarabe cu mâncare.",nt:"Mereu gratuit."},
  {id:8,n:"Old Town Belle Époque Backstreets — Centru Istoric",a:"Centru Istoric",v:["history","weird","hidden"],d:5,s:"Behind the bar street — crumbling belle époque buildings that will be gone in 10 years",st:"Behind the main bar street, Bucharest Old Town has crumbling belle époque buildings, workshops, and courts that feel untouched.",im:"Time-travel: Bucharest Old Town at its peak, 1905 — the most elegant city in Eastern Europe",t:"Wander freely. Stavropoleos Lane and Soarelui Street are best.",c:["abandoned"],r:"g",nn:"Fundăturile din Centrul Vechi — Centru Istoric",ns:"În spatele barurilor — clădiri belle époque în ruinare care vor dispărea în 10 ani",nst:"Clădiri belle époque în ruinare, ateliere și curți neatinse.",nt:"Rătăcește liber. Strada Soarelui e una din cele mai bune."},
  {id:9,n:"Pasajul Macca-Vilacrosse — Centru Istoric",a:"Centru Istoric",v:["beautiful","hidden","weird"],d:5,s:"A yellow glass-roofed arcade from 1891 — shisha bars, chess players, frozen time",st:"Bucharest\'s only covered arcade bends in a Y shape under yellow glass. Hookah cafés have been here for decades. Men play backgammon. The light through the glass is extraordinary.",im:"Time-travel: Bucharest merchants promenading through this arcade in 1900",t:"Free. Open during café hours. Go on rainy days.",c:["architecture"],r:"g",nn:"Pasajul Macca-Vilacrosse — Centru Istoric",ns:"Arcadă cu acoperiș galben din 1891 — narghilea, jucători de șah, timp îngețat",nst:"Singura arcadă acoperită a Bucureștiului în formă de Y sub sticlă galbenă.",nt:"Gratuit. Deschis în orele cafenelei."},
  {id:10,n:"Drumul Taberei Metro Art — Drumul Taberei",a:"Drumul Taberei",v:["street_art","hidden","local"],d:35,s:"The newest metro line has massive public art installations underground — almost no tourists",st:"The M5 line opened in 2020 and each station has large-scale art. Drumul Taberei station has extraordinary mosaic work. Ride the whole line for a free gallery.",im:"Time-travel: communist planners designing these tower blocks in 1970, promising a workers paradise",t:"Metro ticket only. Ride M5 end to end.",c:["street_art"],r:"g",nn:"Arta metroului Drumul Taberei — Drumul Taberei",ns:"Cea mai nouă linie de metrou are instalații masive de artă — aproape fără turiști",nst:"Linia M5 inaugurată în 2020. Fiecare stație are artă la scară mare.",nt:"Doar bilet de metrou. Mergeți cu M5 de la capăt la capăt."},
  {id:11,n:"Parcul Carol — Berceni",a:"Berceni",v:["history","beautiful","quiet"],d:30,s:"Bucharest\'s oldest formal park — a mausoleum, an aqueduct, and almost nobody here",st:"Carol Park was inaugurated in 1906 for the 40th anniversary of King Carol I. The communist mausoleum at the top was later used for unknown soldiers.",im:"Time-travel: the 1906 Jubilee Exhibition in this park — Romania showing itself to Europe",t:"Free. Enter from Șos. Olteniței. The hilltop has the best view.",c:["history_big"],r:"g",nn:"Parcul Carol — Berceni",ns:"Cel mai vechi parc formal din București — un mausoleu, un apeduct și aproape nimeni",nst:"Parcul Carol inaugurat în 1906 pentru aniversarea a 40 de ani a Regelui Carol I.",nt:"Gratuit. Intrare de pe Șos. Olteniței."},
  {id:12,n:"Antim Monastery — Centru Istoric",a:"Centru Istoric",v:["history","quiet","beautiful"],d:10,s:"Hidden monastery in a residential street — golden icons, silence, and no tourists at all",st:"Built in 1715 in the Brâncovenesc style. The founder Antim Ivireanul was later martyred by the Ottomans. You can walk in off the street and be in total silence.",im:"Time-travel: Antim Ivireanul printing books in the monastery press in 1715",t:"Free. Ring the bell to enter outside mass times.",c:["history_big"],r:"g",nn:"Mănăstirea Antim — Centru Istoric",ns:"Mănăstire ascunsă pe o stradă rezidențială — icoane de aur, liniște, zero turiști",nst:"Construită în 1715 în stilul Brâncovenesc.",nt:"Gratuit. Sunați la clopoțel pentru a intra."},
  {id:13,n:"Colentina Lake Chain — Colentina",a:"Colentina",v:["nature","local","hidden"],d:30,s:"A 15km chain of lakes in the northeast — local families, fishing, no tourists",st:"The Colentina River was dammed creating a chain of 18 lakes. The banks are public. Barbecues, fishing lines, weekend car radios. The Bucharest that guidebooks ignore.",im:"Time-travel: the Colentina River before the dams, 1920",t:"Free. Take bus 301 north. Any stop near Lacul Fundeni.",c:["parks"],r:"g",nn:"Lacurile Colentinei — Colentina",ns:"Un lanț de 15 km de lacuri în nord-est — familii locale, pescuit, fără turiști",nst:"Râul Colentina barajat, creând 18 lacuri cu maluri publice.",nt:"Gratuit. Autobuzul 301 nord."},
  {id:14,n:"Grădina Botanică — Cotroceni",a:"Cotroceni",v:["nature","beautiful","quiet"],d:25,s:"Botanical garden next to the university — greenhouses, Japanese garden, total calm",st:"Bucharest Botanical Garden covers 17 hectares. The rose garden peaks in June. The Japanese section is extraordinary. Almost no tourists.",im:"Time-travel: the botanical garden being laid out in 1874, just after Romanian independence",t:"Small entry fee. Worth it. Open daily in season.",c:["parks"],r:"g",nn:"Grădina Botanică — Cotroceni",ns:"Grădina botanică lângă universitate — sere, grădină japoneză, calm total",nst:"Grădina Botanică acoperă 17 hectare. Grădina de trandafiri e maximă în iunie.",nt:"Taxă mică. Merită."},
  {id:15,n:"Art Deco Villas Strada Polonă — Floreasca",a:"Floreasca",v:["architecture","beautiful","hidden"],d:20,s:"Five blocks of intact 1930s Art Deco villas — the Paris of the East still visible",st:"Strada Polonă and its side streets have Bucharest\'s finest concentration of interwar Art Deco and modernist villas.",im:"Time-travel: Bucharest\'s bourgeoisie commissioning these villas in 1935",t:"Free to walk. Best in morning light.",c:["architecture"],r:"g",nn:"Vilele Art Deco de pe Strada Polonă — Floreasca",ns:"Cinci blocuri de vile Art Deco din anii \'30 — Parisul Estului încă vizibil",nst:"Strada Polonă are cea mai mare concentrare de vile Art Deco interbelice din București.",nt:"Liber de plimbare. Cel mai bine dimineața."},
  {id:16,n:"Obor Flea Market — Colentina",a:"Colentina",v:["local","weird","free"],d:25,s:"The biggest flea and food market in Bucharest — everything sold, nothing curated",st:"Obor is where Bucharest actually shops. The outdoor market sells everything from live chickens to old communist furniture. The indoor market has the city\'s best cheese.",im:"Time-travel: Obor as a pre-communist peasant market, 1930 — carts arriving before dawn",t:"Free to enter. Wednesday, Saturday and Sunday best.",c:["local_only"],r:"g",nn:"Piața Obor — Colentina",ns:"Cea mai mare piață de vechituri din București — vânzut totul, nimic curatoriat",nst:"Obor vinde de la pui vii la mobilă comunistă.",nt:"Intrare gratuită. Miercuri, sâmbătă și duminică."},
  {id:17,n:"Palatul Parlamentului Grounds — Centru Istoric",a:"Centru Istoric",v:["weird","history","architecture"],d:10,s:"The second-largest building in the world — enter the grounds and feel the scale",st:"Ceaușescu demolished a quarter of Bucharest to build this. 1,100 rooms. 3,500 tonnes of crystal chandeliers. The entrance plaza alone is overwhelming.",im:"Time-travel: the demolition of the historic Uranus neighborhood in 1984 to make room",t:"Guided tours from the main entrance. Small fee. Book ahead.",c:["history_big"],r:"y",nn:"Palatul Parlamentului — Centru Istoric",ns:"A doua cea mai mare clădire din lume — intră și simte proporțiile",nst:"Ceaușescu a demolat un sfert din București. 1.100 de camere.",nt:"Tururi ghidate. Taxă mică. Rezervați."},
  {id:18,n:"Piața Amzei Morning Market — Floreasca",a:"Floreasca",v:["local","free","hidden"],d:15,s:"The neighbourhood food market where Bucharest\'s writers and artists have shopped for 150 years",st:"Piața Amzei is the market of the Calea Victoriei neighbourhood since the 1800s. Cheese, honey, mushrooms, wild herbs. Vendors whose families have been coming for generations.",im:"Time-travel: post-war Bucharest 1950 — this market one of the few places to find real food",t:"Free. Mornings only. Best Tuesday–Saturday.",c:["local_only"],r:"g",nn:"Piața Amzei — Floreasca",ns:"Piața unde scriitorii și artiștii din București cumpără de 150 de ani",nst:"Piața Amzei are brânzeturi, miere, ciuperci și ierburi sălbatice.",nt:"Gratuit. Numai dimineața."},
  {id:19,n:"Stavropoleos Monastery — Centru Istoric",a:"Centru Istoric",v:["history","beautiful","quiet"],d:5,s:"The most elegant church in Bucharest — Brâncovenesc courtyard hidden behind the Old Town bars",st:"Built in 1724 in the Brâncovenesc style — a mix of Byzantine, Ottoman and Renaissance. Walk in off the bar street and be in total silence.",im:"Time-travel: the monastery at full capacity in 1750, monks and merchants in the same courtyard",t:"Free. Open daily. The courtyard is the real reason to come.",c:["history_big"],r:"g",nn:"Mănăstirea Stavropoleos — Centru Istoric",ns:"Cea mai elegantă biserică din București — curtea Brâncovenească ascunsă în spatele barurilor",nst:"Construită în 1724 în stilul Brâncovenesc.",nt:"Gratuit. Deschis zilnic."},
  {id:20,n:"Cișmigiu Gardens Chess — Centru Istoric",a:"Centru Istoric",v:["local","nature","history"],d:10,s:"The oldest public park in Bucharest — Romanians play chess here every afternoon",st:"Cișmigiu was laid out in 1847 and is still the city\'s social living room. The chess pavilion has games every afternoon. Rowboats on the lake. Old men arguing about politics.",im:"Time-travel: Bucharest intelligentsia debating Romanian independence in this park, 1859",t:"Free. Chess pavilion free to watch. Rowboats cheap.",c:["local_only"],r:"g",nn:"Grădina Cișmigiu — Centru Istoric",ns:"Cel mai vechi parc public din București — românii joacă șah aici",nst:"Cișmigiu amenajat în 1847. Pavilionul de șah cu meciuri în fiecare după-amiază.",nt:"Gratuit. Bărcile ieftine."},
  {id:21,n:"Titan IOR Lake Park — Berceni",a:"Berceni",v:["local","nature","hidden"],d:35,s:"The communist-era park of the east — a huge lake, stadium and Bucharest on its day off",st:"IOR Park in Titan was built in the 1960s as the people\'s park for the new housing blocks. On Sundays it fills with the families who live in the blocks around it.",im:"Time-travel: families moving into the new Titan tower blocks in 1965, grateful for the lake",t:"Free. Take bus 104 east.",c:["parks"],r:"g",nn:"Parcul IOR Titan — Berceni",ns:"Parcul suburban comunist — un lac mare, stadion și Bucureștiul în ziua liberă",nst:"Parcul IOR construit în anii \'60 pentru noile blocuri.",nt:"Gratuit. Autobuzul 104 est."},
  {id:22,n:"Palatul Suțu City Museum — Centru Istoric",a:"Centru Istoric",v:["history","beautiful","hidden"],d:5,s:"1833 neo-Gothic palace now the Bucharest City Museum — extraordinary interior, almost empty",st:"The Suțu Palace was built in 1833 and is now the city history museum. The staircase and ballroom are original. Fewer than 50 visitors on a typical day.",im:"Time-travel: Bucharest\'s aristocracy dancing in this ballroom in 1860",t:"Small entry fee. Often empty. The staircase alone is worth it.",c:["architecture"],r:"g",nn:"Palatul Suțu — Centru Istoric",ns:"Palat neogotic din 1833, acum Muzeul Municipiului București — interior extraordinar",nst:"Palatul Suțu construit în 1833. Scara și sala de bal sunt originale.",nt:"Taxă mică. Adesea gol."},
  {id:23,n:"Văcărești Panorama Ridge — Văcărești",a:"Văcărești",v:["hidden","weird","free"],d:30,s:"The embankment of the unfinished canal overlooks the accidental wetland below",st:"The massive earthworks of the abandoned canal form a long ridge. Walk it and look down at the marshland that grew where Ceaușescu wanted ships.",im:"Time-travel: engineers surveying this canal project in 1986, expecting it finished in two years",t:"Free. Enter from Str. Vrancea. The ridge walk is 2km.",c:["abandoned"],r:"g",nn:"Panorama Văcărești — Văcărești",ns:"Digul canalului neterminat oferă vedere asupra zonei umede",nst:"Marile lucrări de pământ ale canalului abandonat formează un dig lung.",nt:"Gratuit. Intrare din Str. Vrancea."},
  {id:24,n:"Museum of Communist Consumer — Centru Istoric",a:"Centru Istoric",v:["weird","history","hidden"],d:10,s:"Every product made in communist Romania in one private apartment-museum",st:"A private collector has amassed the complete material culture of communist Romania. The museum is in a flat. Entry is guided with a small fee.",im:"Time-travel: a Bucharest family eating communist-era food, wearing communist-era clothes, 1980",t:"Small entry fee. Guided tour only. Book by phone.",c:["free_museum"],r:"g",nn:"Muzeul consumatorului comunist — Centru Istoric",ns:"Fiecare produs din România comunistă într-un apartament-muzeu privat",nst:"Un colecționar privat a adunat întreaga cultură materială a României comuniste.",nt:"Taxă mică. Numai tur ghidat."},
  {id:25,n:"Bulevardul Magheru Bookstalls — Centru Istoric",a:"Centru Istoric",v:["local","free","hidden"],d:5,s:"Second-hand book traders set up every morning — Romanian literature for €1",st:"The pavement booksellers of Magheru have been trading since the communist era. Philosophy, history, poetry, maps. The dealers know everything in the pile.",im:"Time-travel: intellectuals browsing these stalls in 1985, censored books hidden under the approved",t:"Free. Best Mon–Fri before 2pm. Bring cash.",c:["local_only"],r:"g",nn:"Anticarii de pe Magheru — Centru Istoric",ns:"Anticarii de cărți se instalează în fiecare dimineață — literatură română la 1€",nst:"Vânzătorii de trotuar de pe Magheru fac comerț din era comunistă.",nt:"Gratuit. Lun–vin înainte de 14:00."},
  {id:26,n:"Strada Arthur Verona Mural Lane — Centru Istoric",a:"Centru Istoric",v:["art","hidden","local"],d:5,s:"An entire street of murals one block from Piața Romană — Bucharest\'s open-air gallery that locals walk every day",st:"Arthur Verona Street has been a rotating mural gallery since 2010. Artists from across Romania paint the walls, gates and façades. Best after rain when the colours reflect in the cobblestones. No admission, no crowds.",im:"Time-travel: this street as a quiet residential lane in interwar Bucharest, 1930s, before the murals arrived",t:"Free. Walk from Piața Romană metro. Best in daylight.",c:["street_art"],r:"g",nn:"Strada Arthur Verona — Centru Istoric",ns:"O stradă întreagă de murals la un bloc de Piața Romană — galeria în aer liber a Bucureștiului",nst:"Strada Arthur Verona este o galerie de murals rotativi din 2010. Artiști din toată România pictează zidurile și fațadele.",nt:"Gratuit. Mergi de la metroul Piața Romană."},
  {id:27,n:"Pasajul Victoria Umbrella Alley — Centru Istoric",a:"Centru Istoric",v:["beautiful","hidden","weird"],d:5,s:"A tiny covered passage hung with rainbow umbrellas — 30 seconds off Calea Victoriei, nobody finds it",st:"Pasajul Victoria is a narrow arcade hung floor to ceiling with coloured umbrellas. The café tables below, the light filtering through. Takes two minutes to walk end to end. Do it twice.",im:"Time-travel: this arcade as a commercial passage in 1930s Bucharest, hats and gloves displayed instead of umbrellas",t:"Free. Find the entrance off Calea Victoriei near Piața Revoluției.",c:["courtyards"],r:"g",nn:"Pasajul Victoria — Centru Istoric",ns:"Un culoar mic acoperit cu umbrele curcubeu — 30 de secunde de pe Calea Victoriei, nimeni nu-l găsește",nst:"Pasajul Victoria este un coridor îngust împodobit cu umbrele colorate. Mesele de cafenea dedesubt, lumina filtrând prin.",nt:"Gratuit. Intrarea de pe Calea Victoriei lângă Piața Revoluției."},
  {id:28,n:"Piața Obor Market — Colentina",a:"Colentina",v:["local","weird","free"],d:30,s:"Bucharest\'s loudest, cheapest, most chaotic market — the real city, not the tourist one",st:"Obor is the big covered and open-air market of the eastern city. Pickled vegetables, live chickens, Soviet-era electronics, knock-off trainers, and incredible street food all in one block. Go hungry.",im:"Time-travel: this market site in the communist era, Bucharest workers queuing for state-issued produce, 1975",t:"Free to walk. Metro Obor. Best Sat morning. Bring cash.",c:["local_only"],r:"g",nn:"Piața Obor — Colentina",ns:"Piața cea mai zgomotoasă și ieftină din București — orașul real, nu cel turistic",nst:"Obor este marea piață acoperită și în aer liber din estul orașului. Murături, pui vii, electronice sovietice și mâncare stradală extraordinară.",nt:"Gratuit de vizitat. Metro Obor. Sâmbătă dimineața e cel mai bun."},
  {id:29,n:"Herăstrău Lake Promenade — Herăstrău",a:"Herăstrău",v:["beautiful","local","nature"],d:25,s:"Bucharest\'s big lake park — row boats, lakeside paths, and the city skyline at dusk",st:"King Michael I Park (Herăstrău) wraps around a large lake north of the centre. The lakeside promenade at sunset is the closest Bucharest comes to romantic. Rowboats available cheaply. The village museum inside the park is free on Sundays.",im:"Time-travel: the lake in the 1930s when Herăstrău was the new royal park, fashionable Bucharest promenading here",t:"Free park entry. Rowboats cheap. Metro to Aviatorilor.",c:["romantic_water"],r:"g",nn:"Promenada lacului Herăstrău — Herăstrău",ns:"Marele parc cu lac al Bucureștiului — bărci cu vâsle, alei lacustre și silueta orașului la amurg",nst:"Parcul Regele Mihai I înconjoară un lac mare la nordul centrului. Promenada la apus este cea mai romantică față a Bucureștiului.",nt:"Intrare gratuită. Bărci ieftine. Metro Aviatorilor."},
  {id:30,n:"Parc Carol Free Museum Sunday — Cotroceni",a:"Cotroceni",v:["history","hidden","beautiful"],d:20,s:"Bucharest\'s oldest park has a mausoleum, a hill, and a great view — and most tourists never leave the Old Town to find it",st:"Carol Park was built in 1906 for Romania\'s first international exhibition. The hill, the mausoleum, the Art Nouveau pavilions. On Sundays the park museum is often free. Locals come here to escape the Old Town crowds.",im:"Time-travel: the 1906 Jubilee Exhibition in this park, Romania presenting itself to Europe for the first time",t:"Free park. Weekdays very quiet. Walk from Tineretului metro.",c:["parks"],r:"g",nn:"Parcul Carol — Cotroceni",ns:"Cel mai vechi parc al Bucureștiului cu mausoleu, deal și privelște — și cei mai mulți turiști nu-l găsesc",nst:"Parcul Carol a fost construit în 1906 pentru prima expoziție internațională a României. Dealul, mausoleul, pavilioanele Art Nouveau.",nt:"Parc gratuit. Zilele de lucru sunt foarte liniștite. Mergi de la metroul Tineretului."},
  {id:31,n:"Calea Victoriei Evening Walk — Centru Istoric",a:"Centru Istoric",v:["beautiful","history","local"],d:10,s:"Bucharest\'s grand boulevard at golden hour — Belle Époque facades, palace gates, the city on its best behaviour",st:"Calea Victoriei runs from the river to Piața Victoriei. In the evening, the facades of the old palaces and ministry buildings catch the light. The Romanian Athenaeum and the CEC Palace are extraordinary. All free to walk.",im:"Time-travel: the interwar \"Paris of the East\" — fashionable Bucharest society promenading this boulevard in 1935",t:"Free. Start at Piața Revoluției. Walk north or south. Best 7–9pm.",c:["architecture"],r:"g",nn:"Calea Victoriei seara — Centru Istoric",ns:"Marele bulevard al Bucureștiului la ora de aur — fațade Belle Époque, porți de palate",nst:"Calea Victoriei merge de la râu la Piața Victoriei. Seara, fațadele palatelor și clădirilor ministeriale prind lumina.",nt:"Gratuit. Începeți de la Piața Revoluției. Cel mai bun 19–21."},
  {id:32,n:"Cărturești Carusel Bookshop — Centru Istoric #32",a:"Centru Istoric",v:["beautiful","hidden","free"],d:45,s:"Six floors of books in a 19th century palace — the most beautiful bookshop in Eastern Europe",st:"The Carusel Palace was built in 1860 and became a bookshop in 2013. The atrium is wrapped in white cast iron and books floor to ceiling. Free to enter and stay.",im:"Time-travel: Carusel Palace as a bustling commercial arcade in 1900, the Paris of the East",t:"Free to enter. Open daily. The reading gallery on the top floor is best.",c:["history_big"],r:"g",nn:"Cărturești Carusel — Centru Istoric #32",ns:"Șase etaje de cărți într-un palat din sec. XIX — cea mai frumoasă librărie din Europa de Est",nst:"Palatul Carusel a fost construit în 1860 și a devenit librărie în 2013.",nt:"Intrare gratuită. Deschis zilnic."},
  {id:33,n:"Hanul lui Manuc — Centru Istoric #33",a:"Centru Istoric",v:["history","hidden","beautiful"],d:12,s:"1808 Ottoman caravanserai — the oldest inn in Bucharest still functioning",st:"Built by Armenian merchant Manuc Bey, the inn has a wooden galleried courtyard from the early 19th century. The Treaty of Bucharest was signed here in 1812.",im:"Time-travel: Ottoman merchants unloading caravans in this courtyard, 1820",t:"Courtyard free. Restaurant inside. Walk through slowly.",c:["high_spots"],r:"g",nn:"Hanul lui Manuc — Centru Istoric #33",ns:"Caravanserai otoman din 1808 — cel mai vechi han din București funcțional",nst:"Construit de negustorul armean Manuc Bei. Tratatul de la București semnat aici în 1812.",nt:"Curtea gratuită. Restaurant înăuntru."},
  {id:34,n:"Văcărești Urban Wetland — Văcărești #34",a:"Văcărești",v:["nature","hidden","weird"],d:6,s:"A communist unfinished canal became a wild urban delta — herons, wild horses, inside Bucharest",st:"Ceaușescu began digging a canal here in the 1980s and abandoned it. Nature returned. The result is a 200-hectare wetland with herons, cormorants and wild horses inside the city.",im:"Time-travel: 1987 — labourers digging what would become an accidental nature reserve",t:"Free. Enter from the south. Birds most active at dawn and dusk.",c:["parks"],r:"g",nn:"Parcul Natural Văcărești — Văcărești #34",ns:"Un canal comunist neterminat a devenit o deltă sălbatică — stârci, cai sălbatici, în București",nst:"Ceaușescu a început să sape un canal și a abandonat proiectul. Natura a revenit.",nt:"Gratuit. Intrare dinspre sud."},
  {id:35,n:"Herăstrău Lake Rowing — Herăstrău #35",a:"Herăstrău",v:["nature","local","beautiful"],d:52,s:"Huge park and lake in the north — rent a boat, find an empty bench, watch Bucharest forget itself",st:"Herăstrău is 200 hectares of park and lake. The path around takes 90 minutes. Rowboats rent by the hour.",im:"Time-travel: Bucharest bourgeoisie promenading in Herăstrău on Sunday mornings, 1935",t:"Park free. Rowboat rental cheap. Weekday mornings are quiet.",c:["courtyards"],r:"g",nn:"Parcul Herăstrău — Herăstrău #35",ns:"Parc mare și lac în nord — închiriază o barcă, găsește o bancă liberă",nst:"Herăstrău are 200 de hectare de parc și lac.",nt:"Parcul gratuit. Bărcile ieftine."},
  {id:36,n:"Cimitirul Bellu — Berceni #36",a:"Berceni",v:["history","beautiful","quiet"],d:22,s:"The pantheon of Romanian culture — poets, sculptors, politicians in one extraordinary cemetery",st:"Bellu cemetery was opened in 1858 and contains the graves of almost every major Romanian figure. The tombs are Art Nouveau masterpieces.",im:"Time-travel: the funeral of poet Mihai Eminescu at Bellu, 1889, all of Bucharest in the streets",t:"Free. Open daily. Get a map at the entrance.",c:["romantic_water"],r:"g",nn:"Cimitirul Bellu — Berceni #36",ns:"Panteonul culturii române — poeți, sculptori, politicieni — un cimitir extraordinar",nst:"Cimitirul Bellu deschis în 1858. Mormintele sunt capodopere Art Nouveau.",nt:"Gratuit. Deschis zilnic. Ia o hartă la intrare."},
  {id:37,n:"Cotroceni Palace Garden — Cotroceni #37",a:"Cotroceni",v:["beautiful","hidden","history"],d:20,s:"The presidential palace garden — Neogothic towers, roses, silence in the city",st:"The Cotroceni Palace was built in 1896 for the Romanian royal family and is now the presidential residence. The garden is extraordinary.",im:"Time-travel: the Romanian royal family walking these gardens in 1910",t:"Garden visits with guided tour (small fee). Book ahead.",c:["scary"],r:"g",nn:"Grădina Palatului Cotroceni — Cotroceni #37",ns:"Grădina palatului prezidențial — turnuri neogotice, trandafiri, liniște",nst:"Palatul Cotroceni construit în 1896 pentru familia regală.",nt:"Vizite ghidate (taxă mică). Rezervați în avans."},
  {id:38,n:"Floreasca Lake Walk — Floreasca #38",a:"Floreasca",v:["local","nature","quiet"],d:19,s:"The lake where Bucharest jogs, picnics and forgets the chaos",st:"The lake has a running path, paddleboats and food stalls. On weekends it fills with families from early morning.",im:"Time-travel: Floreasca as a rural village outside Bucharest in 1900, farmers and cows",t:"Always free. Weekday mornings quiet. Weekend evenings social.",c:["famous_dead"],r:"g",nn:"Lacul Floreasca — Floreasca #38",ns:"Lacul unde Bucureștiul aleargă, face picnic și uită haosul",nst:"Lacul are un traseu de alergare, hidrobiciclete și tarabe cu mâncare.",nt:"Mereu gratuit."},
  {id:39,n:"Old Town Belle Époque Backstreets — Centru Istoric #39",a:"Centru Istoric",v:["history","weird","hidden"],d:13,s:"Behind the bar street — crumbling belle époque buildings that will be gone in 10 years",st:"Behind the main bar street, Bucharest Old Town has crumbling belle époque buildings, workshops, and courts that feel untouched.",im:"Time-travel: Bucharest Old Town at its peak, 1905 — the most elegant city in Eastern Europe",t:"Wander freely. Stavropoleos Lane and Soarelui Street are best.",c:["street_art"],r:"g",nn:"Fundăturile din Centrul Vechi — Centru Istoric #39",ns:"În spatele barurilor — clădiri belle époque în ruinare care vor dispărea în 10 ani",nst:"Clădiri belle époque în ruinare, ateliere și curți neatinse.",nt:"Rătăcește liber. Strada Soarelui e una din cele mai bune."},
  {id:40,n:"Pasajul Macca-Vilacrosse — Centru Istoric #40",a:"Centru Istoric",v:["beautiful","hidden","weird"],d:52,s:"A yellow glass-roofed arcade from 1891 — shisha bars, chess players, frozen time",st:"Bucharest\'s only covered arcade bends in a Y shape under yellow glass. Hookah cafés have been here for decades. Men play backgammon. The light through the glass is extraordinary.",im:"Time-travel: Bucharest merchants promenading through this arcade in 1900",t:"Free. Open during café hours. Go on rainy days.",c:["abandoned"],r:"g",nn:"Pasajul Macca-Vilacrosse — Centru Istoric #40",ns:"Arcadă cu acoperiș galben din 1891 — narghilea, jucători de șah, timp îngețat",nst:"Singura arcadă acoperită a Bucureștiului în formă de Y sub sticlă galbenă.",nt:"Gratuit. Deschis în orele cafenelei."},
  {id:41,n:"Drumul Taberei Metro Art — Drumul Taberei #41",a:"Drumul Taberei",v:["street_art","hidden","local"],d:11,s:"The newest metro line has massive public art installations underground — almost no tourists",st:"The M5 line opened in 2020 and each station has large-scale art. Drumul Taberei station has extraordinary mosaic work. Ride the whole line for a free gallery.",im:"Time-travel: communist planners designing these tower blocks in 1970, promising a workers paradise",t:"Metro ticket only. Ride M5 end to end.",c:["free_museum"],r:"g",nn:"Arta metroului Drumul Taberei — Drumul Taberei #41",ns:"Cea mai nouă linie de metrou are instalații masive de artă — aproape fără turiști",nst:"Linia M5 inaugurată în 2020. Fiecare stație are artă la scară mare.",nt:"Doar bilet de metrou. Mergeți cu M5 de la capăt la capăt."},
  {id:42,n:"Parcul Carol — Berceni #42",a:"Berceni",v:["history","beautiful","quiet"],d:48,s:"Bucharest\'s oldest formal park — a mausoleum, an aqueduct, and almost nobody here",st:"Carol Park was inaugurated in 1906 for the 40th anniversary of King Carol I. The communist mausoleum at the top was later used for unknown soldiers.",im:"Time-travel: the 1906 Jubilee Exhibition in this park — Romania showing itself to Europe",t:"Free. Enter from Șos. Olteniței. The hilltop has the best view.",c:["local_only"],r:"g",nn:"Parcul Carol — Berceni #42",ns:"Cel mai vechi parc formal din București — un mausoleu, un apeduct și aproape nimeni",nst:"Parcul Carol inaugurat în 1906 pentru aniversarea a 40 de ani a Regelui Carol I.",nt:"Gratuit. Intrare de pe Șos. Olteniței."},
  {id:43,n:"Antim Monastery — Centru Istoric #43",a:"Centru Istoric",v:["history","quiet","beautiful"],d:52,s:"Hidden monastery in a residential street — golden icons, silence, and no tourists at all",st:"Built in 1715 in the Brâncovenesc style. The founder Antim Ivireanul was later martyred by the Ottomans. You can walk in off the street and be in total silence.",im:"Time-travel: Antim Ivireanul printing books in the monastery press in 1715",t:"Free. Ring the bell to enter outside mass times.",c:["architecture"],r:"g",nn:"Mănăstirea Antim — Centru Istoric #43",ns:"Mănăstire ascunsă pe o stradă rezidențială — icoane de aur, liniște, zero turiști",nst:"Construită în 1715 în stilul Brâncovenesc.",nt:"Gratuit. Sunați la clopoțel pentru a intra."},
  {id:44,n:"Colentina Lake Chain — Colentina #44",a:"Colentina",v:["nature","local","hidden"],d:39,s:"A 15km chain of lakes in the northeast — local families, fishing, no tourists",st:"The Colentina River was dammed creating a chain of 18 lakes. The banks are public. Barbecues, fishing lines, weekend car radios. The Bucharest that guidebooks ignore.",im:"Time-travel: the Colentina River before the dams, 1920",t:"Free. Take bus 301 north. Any stop near Lacul Fundeni.",c:["history_big"],r:"g",nn:"Lacurile Colentinei — Colentina #44",ns:"Un lanț de 15 km de lacuri în nord-est — familii locale, pescuit, fără turiști",nst:"Râul Colentina barajat, creând 18 lacuri cu maluri publice.",nt:"Gratuit. Autobuzul 301 nord."},
  {id:45,n:"Grădina Botanică — Cotroceni #45",a:"Cotroceni",v:["nature","beautiful","quiet"],d:10,s:"Botanical garden next to the university — greenhouses, Japanese garden, total calm",st:"Bucharest Botanical Garden covers 17 hectares. The rose garden peaks in June. The Japanese section is extraordinary. Almost no tourists.",im:"Time-travel: the botanical garden being laid out in 1874, just after Romanian independence",t:"Small entry fee. Worth it. Open daily in season.",c:["high_spots"],r:"g",nn:"Grădina Botanică — Cotroceni #45",ns:"Grădina botanică lângă universitate — sere, grădină japoneză, calm total",nst:"Grădina Botanică acoperă 17 hectare. Grădina de trandafiri e maximă în iunie.",nt:"Taxă mică. Merită."},
  {id:46,n:"Art Deco Villas Strada Polonă — Floreasca #46",a:"Floreasca",v:["architecture","beautiful","hidden"],d:42,s:"Five blocks of intact 1930s Art Deco villas — the Paris of the East still visible",st:"Strada Polonă and its side streets have Bucharest\'s finest concentration of interwar Art Deco and modernist villas.",im:"Time-travel: Bucharest\'s bourgeoisie commissioning these villas in 1935",t:"Free to walk. Best in morning light.",c:["parks"],r:"g",nn:"Vilele Art Deco de pe Strada Polonă — Floreasca #46",ns:"Cinci blocuri de vile Art Deco din anii \'30 — Parisul Estului încă vizibil",nst:"Strada Polonă are cea mai mare concentrare de vile Art Deco interbelice din București.",nt:"Liber de plimbare. Cel mai bine dimineața."},
  {id:47,n:"Obor Flea Market — Colentina #47",a:"Colentina",v:["local","weird","free"],d:32,s:"The biggest flea and food market in Bucharest — everything sold, nothing curated",st:"Obor is where Bucharest actually shops. The outdoor market sells everything from live chickens to old communist furniture. The indoor market has the city\'s best cheese.",im:"Time-travel: Obor as a pre-communist peasant market, 1930 — carts arriving before dawn",t:"Free to enter. Wednesday, Saturday and Sunday best.",c:["courtyards"],r:"g",nn:"Piața Obor — Colentina #47",ns:"Cea mai mare piață de vechituri din București — vânzut totul, nimic curatoriat",nst:"Obor vinde de la pui vii la mobilă comunistă.",nt:"Intrare gratuită. Miercuri, sâmbătă și duminică."},
  {id:48,n:"Palatul Parlamentului Grounds — Centru Istoric #48",a:"Centru Istoric",v:["weird","history","architecture"],d:7,s:"The second-largest building in the world — enter the grounds and feel the scale",st:"Ceaușescu demolished a quarter of Bucharest to build this. 1,100 rooms. 3,500 tonnes of crystal chandeliers. The entrance plaza alone is overwhelming.",im:"Time-travel: the demolition of the historic Uranus neighborhood in 1984 to make room",t:"Guided tours from the main entrance. Small fee. Book ahead.",c:["romantic_water"],r:"y",nn:"Palatul Parlamentului — Centru Istoric #48",ns:"A doua cea mai mare clădire din lume — intră și simte proporțiile",nst:"Ceaușescu a demolat un sfert din București. 1.100 de camere.",nt:"Tururi ghidate. Taxă mică. Rezervați."},
  {id:49,n:"Piața Amzei Morning Market — Floreasca #49",a:"Floreasca",v:["local","free","hidden"],d:6,s:"The neighbourhood food market where Bucharest\'s writers and artists have shopped for 150 years",st:"Piața Amzei is the market of the Calea Victoriei neighbourhood since the 1800s. Cheese, honey, mushrooms, wild herbs. Vendors whose families have been coming for generations.",im:"Time-travel: post-war Bucharest 1950 — this market one of the few places to find real food",t:"Free. Mornings only. Best Tuesday–Saturday.",c:["scary"],r:"g",nn:"Piața Amzei — Floreasca #49",ns:"Piața unde scriitorii și artiștii din București cumpără de 150 de ani",nst:"Piața Amzei are brânzeturi, miere, ciuperci și ierburi sălbatice.",nt:"Gratuit. Numai dimineața."},
  {id:50,n:"Stavropoleos Monastery — Centru Istoric #50",a:"Centru Istoric",v:["history","beautiful","quiet"],d:10,s:"The most elegant church in Bucharest — Brâncovenesc courtyard hidden behind the Old Town bars",st:"Built in 1724 in the Brâncovenesc style — a mix of Byzantine, Ottoman and Renaissance. Walk in off the bar street and be in total silence.",im:"Time-travel: the monastery at full capacity in 1750, monks and merchants in the same courtyard",t:"Free. Open daily. The courtyard is the real reason to come.",c:["famous_dead"],r:"g",nn:"Mănăstirea Stavropoleos — Centru Istoric #50",ns:"Cea mai elegantă biserică din București — curtea Brâncovenească ascunsă în spatele barurilor",nst:"Construită în 1724 în stilul Brâncovenesc.",nt:"Gratuit. Deschis zilnic."},
  {id:51,n:"Cișmigiu Gardens Chess — Centru Istoric #51",a:"Centru Istoric",v:["local","nature","history"],d:18,s:"The oldest public park in Bucharest — Romanians play chess here every afternoon",st:"Cișmigiu was laid out in 1847 and is still the city\'s social living room. The chess pavilion has games every afternoon. Rowboats on the lake. Old men arguing about politics.",im:"Time-travel: Bucharest intelligentsia debating Romanian independence in this park, 1859",t:"Free. Chess pavilion free to watch. Rowboats cheap.",c:["street_art"],r:"g",nn:"Grădina Cișmigiu — Centru Istoric #51",ns:"Cel mai vechi parc public din București — românii joacă șah aici",nst:"Cișmigiu amenajat în 1847. Pavilionul de șah cu meciuri în fiecare după-amiază.",nt:"Gratuit. Bărcile ieftine."},
  {id:52,n:"Titan IOR Lake Park — Berceni #52",a:"Berceni",v:["local","nature","hidden"],d:19,s:"The communist-era park of the east — a huge lake, stadium and Bucharest on its day off",st:"IOR Park in Titan was built in the 1960s as the people\'s park for the new housing blocks. On Sundays it fills with the families who live in the blocks around it.",im:"Time-travel: families moving into the new Titan tower blocks in 1965, grateful for the lake",t:"Free. Take bus 104 east.",c:["abandoned"],r:"g",nn:"Parcul IOR Titan — Berceni #52",ns:"Parcul suburban comunist — un lac mare, stadion și Bucureștiul în ziua liberă",nst:"Parcul IOR construit în anii \'60 pentru noile blocuri.",nt:"Gratuit. Autobuzul 104 est."},
  {id:53,n:"Palatul Suțu City Museum — Centru Istoric #53",a:"Centru Istoric",v:["history","beautiful","hidden"],d:37,s:"1833 neo-Gothic palace now the Bucharest City Museum — extraordinary interior, almost empty",st:"The Suțu Palace was built in 1833 and is now the city history museum. The staircase and ballroom are original. Fewer than 50 visitors on a typical day.",im:"Time-travel: Bucharest\'s aristocracy dancing in this ballroom in 1860",t:"Small entry fee. Often empty. The staircase alone is worth it.",c:["free_museum"],r:"g",nn:"Palatul Suțu — Centru Istoric #53",ns:"Palat neogotic din 1833, acum Muzeul Municipiului București — interior extraordinar",nst:"Palatul Suțu construit în 1833. Scara și sala de bal sunt originale.",nt:"Taxă mică. Adesea gol."},
  {id:54,n:"Văcărești Panorama Ridge — Văcărești #54",a:"Văcărești",v:["hidden","weird","free"],d:43,s:"The embankment of the unfinished canal overlooks the accidental wetland below",st:"The massive earthworks of the abandoned canal form a long ridge. Walk it and look down at the marshland that grew where Ceaușescu wanted ships.",im:"Time-travel: engineers surveying this canal project in 1986, expecting it finished in two years",t:"Free. Enter from Str. Vrancea. The ridge walk is 2km.",c:["local_only"],r:"g",nn:"Panorama Văcărești — Văcărești #54",ns:"Digul canalului neterminat oferă vedere asupra zonei umede",nst:"Marile lucrări de pământ ale canalului abandonat formează un dig lung.",nt:"Gratuit. Intrare din Str. Vrancea."},
  {id:55,n:"Museum of Communist Consumer — Centru Istoric #55",a:"Centru Istoric",v:["weird","history","hidden"],d:6,s:"Every product made in communist Romania in one private apartment-museum",st:"A private collector has amassed the complete material culture of communist Romania. The museum is in a flat. Entry is guided with a small fee.",im:"Time-travel: a Bucharest family eating communist-era food, wearing communist-era clothes, 1980",t:"Small entry fee. Guided tour only. Book by phone.",c:["architecture"],r:"g",nn:"Muzeul consumatorului comunist — Centru Istoric #55",ns:"Fiecare produs din România comunistă într-un apartament-muzeu privat",nst:"Un colecționar privat a adunat întreaga cultură materială a României comuniste.",nt:"Taxă mică. Numai tur ghidat."},
  {id:56,n:"Bulevardul Magheru Bookstalls — Centru Istoric #56",a:"Centru Istoric",v:["local","free","hidden"],d:40,s:"Second-hand book traders set up every morning — Romanian literature for €1",st:"The pavement booksellers of Magheru have been trading since the communist era. Philosophy, history, poetry, maps. The dealers know everything in the pile.",im:"Time-travel: intellectuals browsing these stalls in 1985, censored books hidden under the approved",t:"Free. Best Mon–Fri before 2pm. Bring cash.",c:["history_big"],r:"g",nn:"Anticarii de pe Magheru — Centru Istoric #56",ns:"Anticarii de cărți se instalează în fiecare dimineață — literatură română la 1€",nst:"Vânzătorii de trotuar de pe Magheru fac comerț din era comunistă.",nt:"Gratuit. Lun–vin înainte de 14:00."},
  {id:57,n:"Strada Arthur Verona Mural Lane — Centru Istoric #57",a:"Centru Istoric",v:["art","hidden","local"],d:17,s:"An entire street of murals one block from Piața Romană — Bucharest\'s open-air gallery that locals walk every day",st:"Arthur Verona Street has been a rotating mural gallery since 2010. Artists from across Romania paint the walls, gates and façades. Best after rain when the colours reflect in the cobblestones. No admission, no crowds.",im:"Time-travel: this street as a quiet residential lane in interwar Bucharest, 1930s, before the murals arrived",t:"Free. Walk from Piața Romană metro. Best in daylight.",c:["high_spots"],r:"g",nn:"Strada Arthur Verona — Centru Istoric #57",ns:"O stradă întreagă de murals la un bloc de Piața Romană — galeria în aer liber a Bucureștiului",nst:"Strada Arthur Verona este o galerie de murals rotativi din 2010. Artiști din toată România pictează zidurile și fațadele.",nt:"Gratuit. Mergi de la metroul Piața Romană."},
  {id:58,n:"Pasajul Victoria Umbrella Alley — Centru Istoric #58",a:"Centru Istoric",v:["beautiful","hidden","weird"],d:50,s:"A tiny covered passage hung with rainbow umbrellas — 30 seconds off Calea Victoriei, nobody finds it",st:"Pasajul Victoria is a narrow arcade hung floor to ceiling with coloured umbrellas. The café tables below, the light filtering through. Takes two minutes to walk end to end. Do it twice.",im:"Time-travel: this arcade as a commercial passage in 1930s Bucharest, hats and gloves displayed instead of umbrellas",t:"Free. Find the entrance off Calea Victoriei near Piața Revoluției.",c:["parks"],r:"g",nn:"Pasajul Victoria — Centru Istoric #58",ns:"Un culoar mic acoperit cu umbrele curcubeu — 30 de secunde de pe Calea Victoriei, nimeni nu-l găsește",nst:"Pasajul Victoria este un coridor îngust împodobit cu umbrele colorate. Mesele de cafenea dedesubt, lumina filtrând prin.",nt:"Gratuit. Intrarea de pe Calea Victoriei lângă Piața Revoluției."},
  {id:59,n:"Piața Obor Market — Colentina #59",a:"Colentina",v:["local","weird","free"],d:46,s:"Bucharest\'s loudest, cheapest, most chaotic market — the real city, not the tourist one",st:"Obor is the big covered and open-air market of the eastern city. Pickled vegetables, live chickens, Soviet-era electronics, knock-off trainers, and incredible street food all in one block. Go hungry.",im:"Time-travel: this market site in the communist era, Bucharest workers queuing for state-issued produce, 1975",t:"Free to walk. Metro Obor. Best Sat morning. Bring cash.",c:["courtyards"],r:"g",nn:"Piața Obor — Colentina #59",ns:"Piața cea mai zgomotoasă și ieftină din București — orașul real, nu cel turistic",nst:"Obor este marea piață acoperită și în aer liber din estul orașului. Murături, pui vii, electronice sovietice și mâncare stradală extraordinară.",nt:"Gratuit de vizitat. Metro Obor. Sâmbătă dimineața e cel mai bun."},
  {id:60,n:"Herăstrău Lake Promenade — Herăstrău #60",a:"Herăstrău",v:["beautiful","local","nature"],d:49,s:"Bucharest\'s big lake park — row boats, lakeside paths, and the city skyline at dusk",st:"King Michael I Park (Herăstrău) wraps around a large lake north of the centre. The lakeside promenade at sunset is the closest Bucharest comes to romantic. Rowboats available cheaply. The village museum inside the park is free on Sundays.",im:"Time-travel: the lake in the 1930s when Herăstrău was the new royal park, fashionable Bucharest promenading here",t:"Free park entry. Rowboats cheap. Metro to Aviatorilor.",c:["romantic_water"],r:"g",nn:"Promenada lacului Herăstrău — Herăstrău #60",ns:"Marele parc cu lac al Bucureștiului — bărci cu vâsle, alei lacustre și silueta orașului la amurg",nst:"Parcul Regele Mihai I înconjoară un lac mare la nordul centrului. Promenada la apus este cea mai romantică față a Bucureștiului.",nt:"Intrare gratuită. Bărci ieftine. Metro Aviatorilor."},
  {id:61,n:"Parc Carol Free Museum Sunday — Cotroceni #61",a:"Cotroceni",v:["history","hidden","beautiful"],d:39,s:"Bucharest\'s oldest park has a mausoleum, a hill, and a great view — and most tourists never leave the Old Town to find it",st:"Carol Park was built in 1906 for Romania\'s first international exhibition. The hill, the mausoleum, the Art Nouveau pavilions. On Sundays the park museum is often free. Locals come here to escape the Old Town crowds.",im:"Time-travel: the 1906 Jubilee Exhibition in this park, Romania presenting itself to Europe for the first time",t:"Free park. Weekdays very quiet. Walk from Tineretului metro.",c:["scary"],r:"g",nn:"Parcul Carol — Cotroceni #61",ns:"Cel mai vechi parc al Bucureștiului cu mausoleu, deal și privelște — și cei mai mulți turiști nu-l găsesc",nst:"Parcul Carol a fost construit în 1906 pentru prima expoziție internațională a României. Dealul, mausoleul, pavilioanele Art Nouveau.",nt:"Parc gratuit. Zilele de lucru sunt foarte liniștite. Mergi de la metroul Tineretului."},
  {id:62,n:"Calea Victoriei Evening Walk — Centru Istoric #62",a:"Centru Istoric",v:["beautiful","history","local"],d:31,s:"Bucharest\'s grand boulevard at golden hour — Belle Époque facades, palace gates, the city on its best behaviour",st:"Calea Victoriei runs from the river to Piața Victoriei. In the evening, the facades of the old palaces and ministry buildings catch the light. The Romanian Athenaeum and the CEC Palace are extraordinary. All free to walk.",im:"Time-travel: the interwar \"Paris of the East\" — fashionable Bucharest society promenading this boulevard in 1935",t:"Free. Start at Piața Revoluției. Walk north or south. Best 7–9pm.",c:["famous_dead"],r:"g",nn:"Calea Victoriei seara — Centru Istoric #62",ns:"Marele bulevard al Bucureștiului la ora de aur — fațade Belle Époque, porți de palate",nst:"Calea Victoriei merge de la râu la Piața Victoriei. Seara, fațadele palatelor și clădirilor ministeriale prind lumina.",nt:"Gratuit. Începeți de la Piața Revoluției. Cel mai bun 19–21."},
  {id:63,n:"Cărturești Carusel Bookshop — Centru Istoric #63",a:"Centru Istoric",v:["beautiful","hidden","free"],d:19,s:"Six floors of books in a 19th century palace — the most beautiful bookshop in Eastern Europe",st:"The Carusel Palace was built in 1860 and became a bookshop in 2013. The atrium is wrapped in white cast iron and books floor to ceiling. Free to enter and stay.",im:"Time-travel: Carusel Palace as a bustling commercial arcade in 1900, the Paris of the East",t:"Free to enter. Open daily. The reading gallery on the top floor is best.",c:["street_art"],r:"g",nn:"Cărturești Carusel — Centru Istoric #63",ns:"Șase etaje de cărți într-un palat din sec. XIX — cea mai frumoasă librărie din Europa de Est",nst:"Palatul Carusel a fost construit în 1860 și a devenit librărie în 2013.",nt:"Intrare gratuită. Deschis zilnic."},
  {id:64,n:"Hanul lui Manuc — Centru Istoric #64",a:"Centru Istoric",v:["history","hidden","beautiful"],d:33,s:"1808 Ottoman caravanserai — the oldest inn in Bucharest still functioning",st:"Built by Armenian merchant Manuc Bey, the inn has a wooden galleried courtyard from the early 19th century. The Treaty of Bucharest was signed here in 1812.",im:"Time-travel: Ottoman merchants unloading caravans in this courtyard, 1820",t:"Courtyard free. Restaurant inside. Walk through slowly.",c:["abandoned"],r:"g",nn:"Hanul lui Manuc — Centru Istoric #64",ns:"Caravanserai otoman din 1808 — cel mai vechi han din București funcțional",nst:"Construit de negustorul armean Manuc Bei. Tratatul de la București semnat aici în 1812.",nt:"Curtea gratuită. Restaurant înăuntru."},
  {id:65,n:"Văcărești Urban Wetland — Văcărești #65",a:"Văcărești",v:["nature","hidden","weird"],d:42,s:"A communist unfinished canal became a wild urban delta — herons, wild horses, inside Bucharest",st:"Ceaușescu began digging a canal here in the 1980s and abandoned it. Nature returned. The result is a 200-hectare wetland with herons, cormorants and wild horses inside the city.",im:"Time-travel: 1987 — labourers digging what would become an accidental nature reserve",t:"Free. Enter from the south. Birds most active at dawn and dusk.",c:["free_museum"],r:"g",nn:"Parcul Natural Văcărești — Văcărești #65",ns:"Un canal comunist neterminat a devenit o deltă sălbatică — stârci, cai sălbatici, în București",nst:"Ceaușescu a început să sape un canal și a abandonat proiectul. Natura a revenit.",nt:"Gratuit. Intrare dinspre sud."},
  {id:66,n:"Herăstrău Lake Rowing — Herăstrău #66",a:"Herăstrău",v:["nature","local","beautiful"],d:22,s:"Huge park and lake in the north — rent a boat, find an empty bench, watch Bucharest forget itself",st:"Herăstrău is 200 hectares of park and lake. The path around takes 90 minutes. Rowboats rent by the hour.",im:"Time-travel: Bucharest bourgeoisie promenading in Herăstrău on Sunday mornings, 1935",t:"Park free. Rowboat rental cheap. Weekday mornings are quiet.",c:["local_only"],r:"g",nn:"Parcul Herăstrău — Herăstrău #66",ns:"Parc mare și lac în nord — închiriază o barcă, găsește o bancă liberă",nst:"Herăstrău are 200 de hectare de parc și lac.",nt:"Parcul gratuit. Bărcile ieftine."},
  {id:67,n:"Cimitirul Bellu — Berceni #67",a:"Berceni",v:["history","beautiful","quiet"],d:5,s:"The pantheon of Romanian culture — poets, sculptors, politicians in one extraordinary cemetery",st:"Bellu cemetery was opened in 1858 and contains the graves of almost every major Romanian figure. The tombs are Art Nouveau masterpieces.",im:"Time-travel: the funeral of poet Mihai Eminescu at Bellu, 1889, all of Bucharest in the streets",t:"Free. Open daily. Get a map at the entrance.",c:["architecture"],r:"g",nn:"Cimitirul Bellu — Berceni #67",ns:"Panteonul culturii române — poeți, sculptori, politicieni — un cimitir extraordinar",nst:"Cimitirul Bellu deschis în 1858. Mormintele sunt capodopere Art Nouveau.",nt:"Gratuit. Deschis zilnic. Ia o hartă la intrare."},
  {id:68,n:"Cotroceni Palace Garden — Cotroceni #68",a:"Cotroceni",v:["beautiful","hidden","history"],d:53,s:"The presidential palace garden — Neogothic towers, roses, silence in the city",st:"The Cotroceni Palace was built in 1896 for the Romanian royal family and is now the presidential residence. The garden is extraordinary.",im:"Time-travel: the Romanian royal family walking these gardens in 1910",t:"Garden visits with guided tour (small fee). Book ahead.",c:["history_big"],r:"g",nn:"Grădina Palatului Cotroceni — Cotroceni #68",ns:"Grădina palatului prezidențial — turnuri neogotice, trandafiri, liniște",nst:"Palatul Cotroceni construit în 1896 pentru familia regală.",nt:"Vizite ghidate (taxă mică). Rezervați în avans."},
  {id:69,n:"Floreasca Lake Walk — Floreasca #69",a:"Floreasca",v:["local","nature","quiet"],d:15,s:"The lake where Bucharest jogs, picnics and forgets the chaos",st:"The lake has a running path, paddleboats and food stalls. On weekends it fills with families from early morning.",im:"Time-travel: Floreasca as a rural village outside Bucharest in 1900, farmers and cows",t:"Always free. Weekday mornings quiet. Weekend evenings social.",c:["high_spots"],r:"g",nn:"Lacul Floreasca — Floreasca #69",ns:"Lacul unde Bucureștiul aleargă, face picnic și uită haosul",nst:"Lacul are un traseu de alergare, hidrobiciclete și tarabe cu mâncare.",nt:"Mereu gratuit."},
  {id:70,n:"Old Town Belle Époque Backstreets — Centru Istoric #70",a:"Centru Istoric",v:["history","weird","hidden"],d:49,s:"Behind the bar street — crumbling belle époque buildings that will be gone in 10 years",st:"Behind the main bar street, Bucharest Old Town has crumbling belle époque buildings, workshops, and courts that feel untouched.",im:"Time-travel: Bucharest Old Town at its peak, 1905 — the most elegant city in Eastern Europe",t:"Wander freely. Stavropoleos Lane and Soarelui Street are best.",c:["parks"],r:"g",nn:"Fundăturile din Centrul Vechi — Centru Istoric #70",ns:"În spatele barurilor — clădiri belle époque în ruinare care vor dispărea în 10 ani",nst:"Clădiri belle époque în ruinare, ateliere și curți neatinse.",nt:"Rătăcește liber. Strada Soarelui e una din cele mai bune."},
  {id:71,n:"Pasajul Macca-Vilacrosse — Centru Istoric #71",a:"Centru Istoric",v:["beautiful","hidden","weird"],d:32,s:"A yellow glass-roofed arcade from 1891 — shisha bars, chess players, frozen time",st:"Bucharest\'s only covered arcade bends in a Y shape under yellow glass. Hookah cafés have been here for decades. Men play backgammon. The light through the glass is extraordinary.",im:"Time-travel: Bucharest merchants promenading through this arcade in 1900",t:"Free. Open during café hours. Go on rainy days.",c:["courtyards"],r:"g",nn:"Pasajul Macca-Vilacrosse — Centru Istoric #71",ns:"Arcadă cu acoperiș galben din 1891 — narghilea, jucători de șah, timp îngețat",nst:"Singura arcadă acoperită a Bucureștiului în formă de Y sub sticlă galbenă.",nt:"Gratuit. Deschis în orele cafenelei."},
  {id:72,n:"Drumul Taberei Metro Art — Drumul Taberei #72",a:"Drumul Taberei",v:["street_art","hidden","local"],d:26,s:"The newest metro line has massive public art installations underground — almost no tourists",st:"The M5 line opened in 2020 and each station has large-scale art. Drumul Taberei station has extraordinary mosaic work. Ride the whole line for a free gallery.",im:"Time-travel: communist planners designing these tower blocks in 1970, promising a workers paradise",t:"Metro ticket only. Ride M5 end to end.",c:["romantic_water"],r:"g",nn:"Arta metroului Drumul Taberei — Drumul Taberei #72",ns:"Cea mai nouă linie de metrou are instalații masive de artă — aproape fără turiști",nst:"Linia M5 inaugurată în 2020. Fiecare stație are artă la scară mare.",nt:"Doar bilet de metrou. Mergeți cu M5 de la capăt la capăt."},
  {id:73,n:"Parcul Carol — Berceni #73",a:"Berceni",v:["history","beautiful","quiet"],d:22,s:"Bucharest\'s oldest formal park — a mausoleum, an aqueduct, and almost nobody here",st:"Carol Park was inaugurated in 1906 for the 40th anniversary of King Carol I. The communist mausoleum at the top was later used for unknown soldiers.",im:"Time-travel: the 1906 Jubilee Exhibition in this park — Romania showing itself to Europe",t:"Free. Enter from Șos. Olteniței. The hilltop has the best view.",c:["scary"],r:"g",nn:"Parcul Carol — Berceni #73",ns:"Cel mai vechi parc formal din București — un mausoleu, un apeduct și aproape nimeni",nst:"Parcul Carol inaugurat în 1906 pentru aniversarea a 40 de ani a Regelui Carol I.",nt:"Gratuit. Intrare de pe Șos. Olteniței."},
  {id:74,n:"Antim Monastery — Centru Istoric #74",a:"Centru Istoric",v:["history","quiet","beautiful"],d:14,s:"Hidden monastery in a residential street — golden icons, silence, and no tourists at all",st:"Built in 1715 in the Brâncovenesc style. The founder Antim Ivireanul was later martyred by the Ottomans. You can walk in off the street and be in total silence.",im:"Time-travel: Antim Ivireanul printing books in the monastery press in 1715",t:"Free. Ring the bell to enter outside mass times.",c:["famous_dead"],r:"g",nn:"Mănăstirea Antim — Centru Istoric #74",ns:"Mănăstire ascunsă pe o stradă rezidențială — icoane de aur, liniște, zero turiști",nst:"Construită în 1715 în stilul Brâncovenesc.",nt:"Gratuit. Sunați la clopoțel pentru a intra."},
  {id:75,n:"Colentina Lake Chain — Colentina #75",a:"Colentina",v:["nature","local","hidden"],d:18,s:"A 15km chain of lakes in the northeast — local families, fishing, no tourists",st:"The Colentina River was dammed creating a chain of 18 lakes. The banks are public. Barbecues, fishing lines, weekend car radios. The Bucharest that guidebooks ignore.",im:"Time-travel: the Colentina River before the dams, 1920",t:"Free. Take bus 301 north. Any stop near Lacul Fundeni.",c:["street_art"],r:"g",nn:"Lacurile Colentinei — Colentina #75",ns:"Un lanț de 15 km de lacuri în nord-est — familii locale, pescuit, fără turiști",nst:"Râul Colentina barajat, creând 18 lacuri cu maluri publice.",nt:"Gratuit. Autobuzul 301 nord."},
  {id:76,n:"Grădina Botanică — Cotroceni #76",a:"Cotroceni",v:["nature","beautiful","quiet"],d:53,s:"Botanical garden next to the university — greenhouses, Japanese garden, total calm",st:"Bucharest Botanical Garden covers 17 hectares. The rose garden peaks in June. The Japanese section is extraordinary. Almost no tourists.",im:"Time-travel: the botanical garden being laid out in 1874, just after Romanian independence",t:"Small entry fee. Worth it. Open daily in season.",c:["abandoned"],r:"g",nn:"Grădina Botanică — Cotroceni #76",ns:"Grădina botanică lângă universitate — sere, grădină japoneză, calm total",nst:"Grădina Botanică acoperă 17 hectare. Grădina de trandafiri e maximă în iunie.",nt:"Taxă mică. Merită."},
  {id:77,n:"Art Deco Villas Strada Polonă — Floreasca #77",a:"Floreasca",v:["architecture","beautiful","hidden"],d:26,s:"Five blocks of intact 1930s Art Deco villas — the Paris of the East still visible",st:"Strada Polonă and its side streets have Bucharest\'s finest concentration of interwar Art Deco and modernist villas.",im:"Time-travel: Bucharest\'s bourgeoisie commissioning these villas in 1935",t:"Free to walk. Best in morning light.",c:["free_museum"],r:"g",nn:"Vilele Art Deco de pe Strada Polonă — Floreasca #77",ns:"Cinci blocuri de vile Art Deco din anii \'30 — Parisul Estului încă vizibil",nst:"Strada Polonă are cea mai mare concentrare de vile Art Deco interbelice din București.",nt:"Liber de plimbare. Cel mai bine dimineața."},
  {id:78,n:"Obor Flea Market — Colentina #78",a:"Colentina",v:["local","weird","free"],d:11,s:"The biggest flea and food market in Bucharest — everything sold, nothing curated",st:"Obor is where Bucharest actually shops. The outdoor market sells everything from live chickens to old communist furniture. The indoor market has the city\'s best cheese.",im:"Time-travel: Obor as a pre-communist peasant market, 1930 — carts arriving before dawn",t:"Free to enter. Wednesday, Saturday and Sunday best.",c:["local_only"],r:"g",nn:"Piața Obor — Colentina #78",ns:"Cea mai mare piață de vechituri din București — vânzut totul, nimic curatoriat",nst:"Obor vinde de la pui vii la mobilă comunistă.",nt:"Intrare gratuită. Miercuri, sâmbătă și duminică."},
  {id:79,n:"Palatul Parlamentului Grounds — Centru Istoric #79",a:"Centru Istoric",v:["weird","history","architecture"],d:10,s:"The second-largest building in the world — enter the grounds and feel the scale",st:"Ceaușescu demolished a quarter of Bucharest to build this. 1,100 rooms. 3,500 tonnes of crystal chandeliers. The entrance plaza alone is overwhelming.",im:"Time-travel: the demolition of the historic Uranus neighborhood in 1984 to make room",t:"Guided tours from the main entrance. Small fee. Book ahead.",c:["architecture"],r:"y",nn:"Palatul Parlamentului — Centru Istoric #79",ns:"A doua cea mai mare clădire din lume — intră și simte proporțiile",nst:"Ceaușescu a demolat un sfert din București. 1.100 de camere.",nt:"Tururi ghidate. Taxă mică. Rezervați."},
  {id:80,n:"Piața Amzei Morning Market — Floreasca #80",a:"Floreasca",v:["local","free","hidden"],d:29,s:"The neighbourhood food market where Bucharest\'s writers and artists have shopped for 150 years",st:"Piața Amzei is the market of the Calea Victoriei neighbourhood since the 1800s. Cheese, honey, mushrooms, wild herbs. Vendors whose families have been coming for generations.",im:"Time-travel: post-war Bucharest 1950 — this market one of the few places to find real food",t:"Free. Mornings only. Best Tuesday–Saturday.",c:["history_big"],r:"g",nn:"Piața Amzei — Floreasca #80",ns:"Piața unde scriitorii și artiștii din București cumpără de 150 de ani",nst:"Piața Amzei are brânzeturi, miere, ciuperci și ierburi sălbatice.",nt:"Gratuit. Numai dimineața."},
  {id:81,n:"Stavropoleos Monastery — Centru Istoric #81",a:"Centru Istoric",v:["history","beautiful","quiet"],d:11,s:"The most elegant church in Bucharest — Brâncovenesc courtyard hidden behind the Old Town bars",st:"Built in 1724 in the Brâncovenesc style — a mix of Byzantine, Ottoman and Renaissance. Walk in off the bar street and be in total silence.",im:"Time-travel: the monastery at full capacity in 1750, monks and merchants in the same courtyard",t:"Free. Open daily. The courtyard is the real reason to come.",c:["high_spots"],r:"g",nn:"Mănăstirea Stavropoleos — Centru Istoric #81",ns:"Cea mai elegantă biserică din București — curtea Brâncovenească ascunsă în spatele barurilor",nst:"Construită în 1724 în stilul Brâncovenesc.",nt:"Gratuit. Deschis zilnic."},
  {id:82,n:"Cișmigiu Gardens Chess — Centru Istoric #82",a:"Centru Istoric",v:["local","nature","history"],d:27,s:"The oldest public park in Bucharest — Romanians play chess here every afternoon",st:"Cișmigiu was laid out in 1847 and is still the city\'s social living room. The chess pavilion has games every afternoon. Rowboats on the lake. Old men arguing about politics.",im:"Time-travel: Bucharest intelligentsia debating Romanian independence in this park, 1859",t:"Free. Chess pavilion free to watch. Rowboats cheap.",c:["parks"],r:"g",nn:"Grădina Cișmigiu — Centru Istoric #82",ns:"Cel mai vechi parc public din București — românii joacă șah aici",nst:"Cișmigiu amenajat în 1847. Pavilionul de șah cu meciuri în fiecare după-amiază.",nt:"Gratuit. Bărcile ieftine."},
  {id:83,n:"Titan IOR Lake Park — Berceni #83",a:"Berceni",v:["local","nature","hidden"],d:27,s:"The communist-era park of the east — a huge lake, stadium and Bucharest on its day off",st:"IOR Park in Titan was built in the 1960s as the people\'s park for the new housing blocks. On Sundays it fills with the families who live in the blocks around it.",im:"Time-travel: families moving into the new Titan tower blocks in 1965, grateful for the lake",t:"Free. Take bus 104 east.",c:["courtyards"],r:"g",nn:"Parcul IOR Titan — Berceni #83",ns:"Parcul suburban comunist — un lac mare, stadion și Bucureștiul în ziua liberă",nst:"Parcul IOR construit în anii \'60 pentru noile blocuri.",nt:"Gratuit. Autobuzul 104 est."},
  {id:84,n:"Palatul Suțu City Museum — Centru Istoric #84",a:"Centru Istoric",v:["history","beautiful","hidden"],d:43,s:"1833 neo-Gothic palace now the Bucharest City Museum — extraordinary interior, almost empty",st:"The Suțu Palace was built in 1833 and is now the city history museum. The staircase and ballroom are original. Fewer than 50 visitors on a typical day.",im:"Time-travel: Bucharest\'s aristocracy dancing in this ballroom in 1860",t:"Small entry fee. Often empty. The staircase alone is worth it.",c:["romantic_water"],r:"g",nn:"Palatul Suțu — Centru Istoric #84",ns:"Palat neogotic din 1833, acum Muzeul Municipiului București — interior extraordinar",nst:"Palatul Suțu construit în 1833. Scara și sala de bal sunt originale.",nt:"Taxă mică. Adesea gol."},
  {id:85,n:"Văcărești Panorama Ridge — Văcărești #85",a:"Văcărești",v:["hidden","weird","free"],d:21,s:"The embankment of the unfinished canal overlooks the accidental wetland below",st:"The massive earthworks of the abandoned canal form a long ridge. Walk it and look down at the marshland that grew where Ceaușescu wanted ships.",im:"Time-travel: engineers surveying this canal project in 1986, expecting it finished in two years",t:"Free. Enter from Str. Vrancea. The ridge walk is 2km.",c:["scary"],r:"g",nn:"Panorama Văcărești — Văcărești #85",ns:"Digul canalului neterminat oferă vedere asupra zonei umede",nst:"Marile lucrări de pământ ale canalului abandonat formează un dig lung.",nt:"Gratuit. Intrare din Str. Vrancea."},
  {id:86,n:"Museum of Communist Consumer — Centru Istoric #86",a:"Centru Istoric",v:["weird","history","hidden"],d:7,s:"Every product made in communist Romania in one private apartment-museum",st:"A private collector has amassed the complete material culture of communist Romania. The museum is in a flat. Entry is guided with a small fee.",im:"Time-travel: a Bucharest family eating communist-era food, wearing communist-era clothes, 1980",t:"Small entry fee. Guided tour only. Book by phone.",c:["famous_dead"],r:"g",nn:"Muzeul consumatorului comunist — Centru Istoric #86",ns:"Fiecare produs din România comunistă într-un apartament-muzeu privat",nst:"Un colecționar privat a adunat întreaga cultură materială a României comuniste.",nt:"Taxă mică. Numai tur ghidat."},
  {id:87,n:"Bulevardul Magheru Bookstalls — Centru Istoric #87",a:"Centru Istoric",v:["local","free","hidden"],d:51,s:"Second-hand book traders set up every morning — Romanian literature for €1",st:"The pavement booksellers of Magheru have been trading since the communist era. Philosophy, history, poetry, maps. The dealers know everything in the pile.",im:"Time-travel: intellectuals browsing these stalls in 1985, censored books hidden under the approved",t:"Free. Best Mon–Fri before 2pm. Bring cash.",c:["street_art"],r:"g",nn:"Anticarii de pe Magheru — Centru Istoric #87",ns:"Anticarii de cărți se instalează în fiecare dimineață — literatură română la 1€",nst:"Vânzătorii de trotuar de pe Magheru fac comerț din era comunistă.",nt:"Gratuit. Lun–vin înainte de 14:00."},
  {id:88,n:"Strada Arthur Verona Mural Lane — Centru Istoric #88",a:"Centru Istoric",v:["art","hidden","local"],d:34,s:"An entire street of murals one block from Piața Romană — Bucharest\'s open-air gallery that locals walk every day",st:"Arthur Verona Street has been a rotating mural gallery since 2010. Artists from across Romania paint the walls, gates and façades. Best after rain when the colours reflect in the cobblestones. No admission, no crowds.",im:"Time-travel: this street as a quiet residential lane in interwar Bucharest, 1930s, before the murals arrived",t:"Free. Walk from Piața Romană metro. Best in daylight.",c:["abandoned"],r:"g",nn:"Strada Arthur Verona — Centru Istoric #88",ns:"O stradă întreagă de murals la un bloc de Piața Romană — galeria în aer liber a Bucureștiului",nst:"Strada Arthur Verona este o galerie de murals rotativi din 2010. Artiști din toată România pictează zidurile și fațadele.",nt:"Gratuit. Mergi de la metroul Piața Romană."},
  {id:89,n:"Pasajul Victoria Umbrella Alley — Centru Istoric #89",a:"Centru Istoric",v:["beautiful","hidden","weird"],d:39,s:"A tiny covered passage hung with rainbow umbrellas — 30 seconds off Calea Victoriei, nobody finds it",st:"Pasajul Victoria is a narrow arcade hung floor to ceiling with coloured umbrellas. The café tables below, the light filtering through. Takes two minutes to walk end to end. Do it twice.",im:"Time-travel: this arcade as a commercial passage in 1930s Bucharest, hats and gloves displayed instead of umbrellas",t:"Free. Find the entrance off Calea Victoriei near Piața Revoluției.",c:["free_museum"],r:"g",nn:"Pasajul Victoria — Centru Istoric #89",ns:"Un culoar mic acoperit cu umbrele curcubeu — 30 de secunde de pe Calea Victoriei, nimeni nu-l găsește",nst:"Pasajul Victoria este un coridor îngust împodobit cu umbrele colorate. Mesele de cafenea dedesubt, lumina filtrând prin.",nt:"Gratuit. Intrarea de pe Calea Victoriei lângă Piața Revoluției."},
  {id:90,n:"Piața Obor Market — Colentina #90",a:"Colentina",v:["local","weird","free"],d:12,s:"Bucharest\'s loudest, cheapest, most chaotic market — the real city, not the tourist one",st:"Obor is the big covered and open-air market of the eastern city. Pickled vegetables, live chickens, Soviet-era electronics, knock-off trainers, and incredible street food all in one block. Go hungry.",im:"Time-travel: this market site in the communist era, Bucharest workers queuing for state-issued produce, 1975",t:"Free to walk. Metro Obor. Best Sat morning. Bring cash.",c:["local_only"],r:"g",nn:"Piața Obor — Colentina #90",ns:"Piața cea mai zgomotoasă și ieftină din București — orașul real, nu cel turistic",nst:"Obor este marea piață acoperită și în aer liber din estul orașului. Murături, pui vii, electronice sovietice și mâncare stradală extraordinară.",nt:"Gratuit de vizitat. Metro Obor. Sâmbătă dimineața e cel mai bun."},
  {id:91,n:"Herăstrău Lake Promenade — Herăstrău #91",a:"Herăstrău",v:["beautiful","local","nature"],d:29,s:"Bucharest\'s big lake park — row boats, lakeside paths, and the city skyline at dusk",st:"King Michael I Park (Herăstrău) wraps around a large lake north of the centre. The lakeside promenade at sunset is the closest Bucharest comes to romantic. Rowboats available cheaply. The village museum inside the park is free on Sundays.",im:"Time-travel: the lake in the 1930s when Herăstrău was the new royal park, fashionable Bucharest promenading here",t:"Free park entry. Rowboats cheap. Metro to Aviatorilor.",c:["architecture"],r:"g",nn:"Promenada lacului Herăstrău — Herăstrău #91",ns:"Marele parc cu lac al Bucureștiului — bărci cu vâsle, alei lacustre și silueta orașului la amurg",nst:"Parcul Regele Mihai I înconjoară un lac mare la nordul centrului. Promenada la apus este cea mai romantică față a Bucureștiului.",nt:"Intrare gratuită. Bărci ieftine. Metro Aviatorilor."},
  {id:92,n:"Parc Carol Free Museum Sunday — Cotroceni #92",a:"Cotroceni",v:["history","hidden","beautiful"],d:10,s:"Bucharest\'s oldest park has a mausoleum, a hill, and a great view — and most tourists never leave the Old Town to find it",st:"Carol Park was built in 1906 for Romania\'s first international exhibition. The hill, the mausoleum, the Art Nouveau pavilions. On Sundays the park museum is often free. Locals come here to escape the Old Town crowds.",im:"Time-travel: the 1906 Jubilee Exhibition in this park, Romania presenting itself to Europe for the first time",t:"Free park. Weekdays very quiet. Walk from Tineretului metro.",c:["history_big"],r:"g",nn:"Parcul Carol — Cotroceni #92",ns:"Cel mai vechi parc al Bucureștiului cu mausoleu, deal și privelște — și cei mai mulți turiști nu-l găsesc",nst:"Parcul Carol a fost construit în 1906 pentru prima expoziție internațională a României. Dealul, mausoleul, pavilioanele Art Nouveau.",nt:"Parc gratuit. Zilele de lucru sunt foarte liniștite. Mergi de la metroul Tineretului."},
  {id:93,n:"Calea Victoriei Evening Walk — Centru Istoric #93",a:"Centru Istoric",v:["beautiful","history","local"],d:40,s:"Bucharest\'s grand boulevard at golden hour — Belle Époque facades, palace gates, the city on its best behaviour",st:"Calea Victoriei runs from the river to Piața Victoriei. In the evening, the facades of the old palaces and ministry buildings catch the light. The Romanian Athenaeum and the CEC Palace are extraordinary. All free to walk.",im:"Time-travel: the interwar \"Paris of the East\" — fashionable Bucharest society promenading this boulevard in 1935",t:"Free. Start at Piața Revoluției. Walk north or south. Best 7–9pm.",c:["high_spots"],r:"g",nn:"Calea Victoriei seara — Centru Istoric #93",ns:"Marele bulevard al Bucureștiului la ora de aur — fațade Belle Époque, porți de palate",nst:"Calea Victoriei merge de la râu la Piața Victoriei. Seara, fațadele palatelor și clădirilor ministeriale prind lumina.",nt:"Gratuit. Începeți de la Piața Revoluției. Cel mai bun 19–21."},
  {id:94,n:"Cărturești Carusel Bookshop — Centru Istoric #94",a:"Centru Istoric",v:["beautiful","hidden","free"],d:23,s:"Six floors of books in a 19th century palace — the most beautiful bookshop in Eastern Europe",st:"The Carusel Palace was built in 1860 and became a bookshop in 2013. The atrium is wrapped in white cast iron and books floor to ceiling. Free to enter and stay.",im:"Time-travel: Carusel Palace as a bustling commercial arcade in 1900, the Paris of the East",t:"Free to enter. Open daily. The reading gallery on the top floor is best.",c:["parks"],r:"g",nn:"Cărturești Carusel — Centru Istoric #94",ns:"Șase etaje de cărți într-un palat din sec. XIX — cea mai frumoasă librărie din Europa de Est",nst:"Palatul Carusel a fost construit în 1860 și a devenit librărie în 2013.",nt:"Intrare gratuită. Deschis zilnic."},
  {id:95,n:"Hanul lui Manuc — Centru Istoric #95",a:"Centru Istoric",v:["history","hidden","beautiful"],d:45,s:"1808 Ottoman caravanserai — the oldest inn in Bucharest still functioning",st:"Built by Armenian merchant Manuc Bey, the inn has a wooden galleried courtyard from the early 19th century. The Treaty of Bucharest was signed here in 1812.",im:"Time-travel: Ottoman merchants unloading caravans in this courtyard, 1820",t:"Courtyard free. Restaurant inside. Walk through slowly.",c:["courtyards"],r:"g",nn:"Hanul lui Manuc — Centru Istoric #95",ns:"Caravanserai otoman din 1808 — cel mai vechi han din București funcțional",nst:"Construit de negustorul armean Manuc Bei. Tratatul de la București semnat aici în 1812.",nt:"Curtea gratuită. Restaurant înăuntru."},
  {id:96,n:"Văcărești Urban Wetland — Văcărești #96",a:"Văcărești",v:["nature","hidden","weird"],d:44,s:"A communist unfinished canal became a wild urban delta — herons, wild horses, inside Bucharest",st:"Ceaușescu began digging a canal here in the 1980s and abandoned it. Nature returned. The result is a 200-hectare wetland with herons, cormorants and wild horses inside the city.",im:"Time-travel: 1987 — labourers digging what would become an accidental nature reserve",t:"Free. Enter from the south. Birds most active at dawn and dusk.",c:["romantic_water"],r:"g",nn:"Parcul Natural Văcărești — Văcărești #96",ns:"Un canal comunist neterminat a devenit o deltă sălbatică — stârci, cai sălbatici, în București",nst:"Ceaușescu a început să sape un canal și a abandonat proiectul. Natura a revenit.",nt:"Gratuit. Intrare dinspre sud."},
  {id:97,n:"Herăstrău Lake Rowing — Herăstrău #97",a:"Herăstrău",v:["nature","local","beautiful"],d:28,s:"Huge park and lake in the north — rent a boat, find an empty bench, watch Bucharest forget itself",st:"Herăstrău is 200 hectares of park and lake. The path around takes 90 minutes. Rowboats rent by the hour.",im:"Time-travel: Bucharest bourgeoisie promenading in Herăstrău on Sunday mornings, 1935",t:"Park free. Rowboat rental cheap. Weekday mornings are quiet.",c:["scary"],r:"g",nn:"Parcul Herăstrău — Herăstrău #97",ns:"Parc mare și lac în nord — închiriază o barcă, găsește o bancă liberă",nst:"Herăstrău are 200 de hectare de parc și lac.",nt:"Parcul gratuit. Bărcile ieftine."},
  {id:98,n:"Cimitirul Bellu — Berceni #98",a:"Berceni",v:["history","beautiful","quiet"],d:41,s:"The pantheon of Romanian culture — poets, sculptors, politicians in one extraordinary cemetery",st:"Bellu cemetery was opened in 1858 and contains the graves of almost every major Romanian figure. The tombs are Art Nouveau masterpieces.",im:"Time-travel: the funeral of poet Mihai Eminescu at Bellu, 1889, all of Bucharest in the streets",t:"Free. Open daily. Get a map at the entrance.",c:["famous_dead"],r:"g",nn:"Cimitirul Bellu — Berceni #98",ns:"Panteonul culturii române — poeți, sculptori, politicieni — un cimitir extraordinar",nst:"Cimitirul Bellu deschis în 1858. Mormintele sunt capodopere Art Nouveau.",nt:"Gratuit. Deschis zilnic. Ia o hartă la intrare."},
  {id:99,n:"Cotroceni Palace Garden — Cotroceni #99",a:"Cotroceni",v:["beautiful","hidden","history"],d:17,s:"The presidential palace garden — Neogothic towers, roses, silence in the city",st:"The Cotroceni Palace was built in 1896 for the Romanian royal family and is now the presidential residence. The garden is extraordinary.",im:"Time-travel: the Romanian royal family walking these gardens in 1910",t:"Garden visits with guided tour (small fee). Book ahead.",c:["street_art"],r:"g",nn:"Grădina Palatului Cotroceni — Cotroceni #99",ns:"Grădina palatului prezidențial — turnuri neogotice, trandafiri, liniște",nst:"Palatul Cotroceni construit în 1896 pentru familia regală.",nt:"Vizite ghidate (taxă mică). Rezervați în avans."},
