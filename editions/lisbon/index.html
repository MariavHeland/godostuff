  {id:2,n:"Azulejo Museum inside Madre de Deus",a:"Xabregas",v:["history", "beautiful"],d:2,s:"Five centuries of Portuguese tile obsession in one baroque convent",st:"Walk through rooms drowning in azulejos—blue and white tiles telling stories of ships, saints, and daily life. The cloister\'s painted walls gleam like wet porcelain. Each room is a fever dream of pattern.",im:"It\'s 1580. A monk sketches scenes from the world: cartographers, merchants, slaves. His hand traces curves. The kiln fires glow.",t:"Walk through rooms drowning in azulejos—blue and white tiles telling stories of ships, saints, and daily life. The cloister\'s painted walls gleam like wet porcelain. Each room is a fever dream of pattern.\",im:\"It\'s 1580. A monk sketches scenes from the world: cartographers, merchants, slaves. His hand traces curves. The kiln fires glow.\",t:\"Rua da Madre de Deus, 4. Metro Oriente then bus. Closed Mondays. €5 entry. Touch nothing—oils damage the tiles.",c:["history_big", "free_museum"],r:"g",nn:"Azulejo Museum inside Madre de Deus",ns:"Azulejo Museum inside Madre de Deus é joia portuguesa.",nst:"Azulejo Museum inside Madre de Deus respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},

  {id:5,n:"LX Factory street art collective",a:"Alcântara",v:["weird", "street_art"],d:5,s:"An old factory became the city\'s creative rebellion zone",st:"Walls explode with color. Murals cover murals. Vintage shops, bars, and studios nest in the graffitied ruins. Every corner is a photo. The vibe is pure DIY energy and beer-fueled art.",im:"It\'s 2004. Kids sneak in at night with spray cans. The factory echoes. By morning, it\'s alive again. The cops give up. Art wins.",t:"Walls explode with color. Murals cover murals. Vintage shops, bars, and studios nest in the graffitied ruins. Every corner is a photo. The vibe is pure DIY energy and beer-fueled art.\",im:\"It\'s 2004. Kids sneak in at night with spray cans. The factory echoes. By morning, it\'s alive again. The cops give up. Art wins.\",t:\"Rua Rodrigues Faria, 103. Open daily. No entry fee. Go on weekends for atmosphere, weekdays for peace. Cafés charge €2 for espresso.",c:["street_art", "local_only"],r:"g",nn:"LX Factory street art collective",ns:"LX Factory street art collective é joia portuguesa.",nst:"LX Factory street art collective respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},

  {id:7,n:"Hidden courtyard gardens of Príncipe Real",a:"Príncipe Real",v:["hidden", "beautiful", "quiet"],d:7,s:"Tree-filled courtyards hidden behind mansion doors",st:"Slip through doorways into secret gardens. Wisteria hangs heavy. Benches rest in shade. Some gardens date to the 1700s. You\'ll forget the city exists fifty meters away.",im:"It\'s 1890. A nobleman hosts writers in his garden. They read poetry under the trees. The city noise fades to nothing.",t:"Slip through doorways into secret gardens. Wisteria hangs heavy. Benches rest in shade. Some gardens date to the 1700s. You\'ll forget the city exists fifty meters away.\",im:\"It\'s 1890. A nobleman hosts writers in his garden. They read poetry under the trees. The city noise fades to nothing.\",t:\"Rua da Escola Politécnica. Walk slowly, peer into building entrances. Most courtyards are closed to public—sometimes you catch a glimpse through open gates.",c:["history_big", "courtyards", "quiet"],r:"g",nn:"Hidden courtyard gardens of Príncipe Real",ns:"Hidden courtyard gardens of Príncipe Real é joia portuguesa.",nst:"Hidden courtyard gardens of Príncipe Real respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},
  {id:8,n:"Sinagoga Portuguesa (Portuguese Synagogue)",a:"Graça",v:["history", "hidden"],d:8,s:"A secret room where Jews survived the Inquisition",st:"Tucked into a townhouse, this 1901 synagogue hides centuries of hidden worship. The ritual bath and women\'s gallery remain. This room whispers resilience. Light filters through high windows—just enough to read Torah.",im:"It\'s 1600. A family descends into darkness. Prayers must be silent. A neighbor could betray them at any moment. Faith lives in whispers.",t:"Tucked into a townhouse, this 1901 synagogue hides centuries of hidden worship. The ritual bath and women\'s gallery remain. This room whispers resilience. Light filters through high windows—just enough to read Torah.\",im:\"It\'s 1600. A family descends into darkness. Prayers must be silent. A neighbor could betray them at any moment. Faith lives in whispers.\",t:\"Rua João Pereira Rosa, 63. Tours by appointment only. Contact ahead. No entry fee—donations welcome. Ring the bell.",c:["history_big", "hidden"],r:"g",nn:"Sinagoga Portuguesa (Portuguese Synagogue)",ns:"Sinagoga Portuguesa (Portuguese Synagogue) é joia portuguesa.",nst:"Sinagoga Portuguesa (Portuguese Synagogue) respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},
  {id:9,n:"Beco de São Miguel (St. Michael\'s Alley)",a:"Alfama",v:["history", "beautiful", "local"],d:9,s:"The most photogenic hidden alley in Alfama",st:"A narrow sliver of a street covered in azulejos from floor to roof. Laundry drips overhead. A cat sleeps on ancient tiles. This is Lisbon\'s living heart—unchanged since the 1800s.",im:"It\'s 1900. A woman wrings wet sheets. A child plays with a wooden toy. The tiles catch morning light. Nothing has changed for a hundred years.",t:"A narrow sliver of a street covered in azulejos from floor to roof. Laundry drips overhead. A cat sleeps on ancient tiles. This is Lisbon\'s living heart—unchanged since the 1800s.\",im:\"It\'s 1900. A woman wrings wet sheets. A child plays with a wooden toy. The tiles catch morning light. Nothing has changed for a hundred years.\",t:\"Beco de São Miguel, Alfama. It\'s an actual street—easy to miss. Go early, avoid the 28 tram crowds. Stand at the top, look down the slope.",c:["beautiful", "history_big", "local_only"],r:"g",nn:"Beco de São Miguel (St. Michael\'s Alley)",ns:"Beco de São Miguel (St. Michael\'s Alley) é joia portuguesa.",nst:"Beco de São Miguel (St. Michael\'s Alley) respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},
  {id:10,n:"Alcatraz Club tunnel system",a:"Alcântara",v:["weird", "history", "night"],d:10,s:"Underground tunnels where political prisoners once were held",st:"Below a nightclub, tunnels stretch toward the river. Iron cells remain. Torture implements hang on walls. The club built itself on top of medieval dungeons. Dance above the ghosts.",im:"It\'s 1940. Political dissidents disappear. They\'re taken below. The city dances above, unaware. Screams don\'t travel upward.",t:"Below a nightclub, tunnels stretch toward the river. Iron cells remain. Torture implements hang on walls. The club built itself on top of medieval dungeons. Dance above the ghosts.\",im:\"It\'s 1940. Political dissidents disappear. They\'re taken below. The city dances above, unaware. Screams don\'t travel upward.\",t:\"Rua da Cintura do Porto, Alcântara. Visits by appointment only through local guides. Not a normal tourist spot—respect the history.",c:["history_big", "scary"],r:"y",nn:"Alcatraz Club tunnel system",ns:"Alcatraz Club tunnel system é joia portuguesa.",nst:"Alcatraz Club tunnel system respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},
  {id:11,n:"Marvila street art district",a:"Marvila",v:["street_art", "weird"],d:11,s:"Where industrial graffiti meets serious contemporary art",st:"Sprawling murals cover warehouses. Mega-sized characters stare down. This isn\'t pretty—it\'s raw. Abandoned factories host art installations. The neighborhood is actively gentrifying; catch it before it changes.",im:"It\'s 2010. Artists move into cheap spaces. Warehouses become galleries. The Tagus watches. Something\'s being born here.",t:"Sprawling murals cover warehouses. Mega-sized characters stare down. This isn\'t pretty—it\'s raw. Abandoned factories host art installations. The neighborhood is actively gentrifying; catch it before it changes.\",im:\"It\'s 2010. Artists move into cheap spaces. Warehouses become galleries. The Tagus watches. Something\'s being born here.\",t:\"Rua da Marvila. Best visited during day. Walk the riverside path. Several galleries and artist collectives have open studios on weekends.",c:["street_art", "abandoned"],r:"g",nn:"Marvila street art district",ns:"Marvila street art district é joia portuguesa.",nst:"Marvila street art district respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},

  {id:14,n:"Câmara Escura (Camera Obscura) of Torre Vasco da Gama",a:"Belém",v:["hidden", "beautiful"],d:14,s:"A room that projects the entire city upside-down",st:"At the top of this tower, light passes through a pinhole and paints Lisbon inverted on a white table. It\'s the oldest photography trick. See the Tejo bridge backward. See the city from the future\'s past.",im:"It\'s 1844. Before cameras, before photos. Light speaks. A man traces the image with chalk. The city is born in darkness.",t:"At the top of this tower, light passes through a pinhole and paints Lisbon inverted on a white table. It\'s the oldest photography trick. See the Tejo bridge backward. See the city from the future\'s past.\",im:\"It\'s 1844. Before cameras, before photos. Light speaks. A man traces the image with chalk. The city is born in darkness.\",t:\"Torre Vasco da Gama, Belém. Limited hours—check ahead. €3. Go to the very top. Your eyes adjust for 2 minutes. Then you see everything.",c:["history_big", "hidden"],r:"g",nn:"Câmara Escura (Camera Obscura) of Torre Vasco da Gama",ns:"Câmara Escura (Camera Obscura) of Torre Vasco da Gama é joia portuguesa.",nst:"Câmara Escura (Camera Obscura) of Torre Vasco da Gama respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},
  {id:15,n:"Botanical Garden (Jardim Botânico da Ajuda)",a:"Ajuda",v:["beautiful", "quiet", "history"],d:15,s:"An 18th-century plant collection sprawls across a hillside",st:"Rare species from the colonial era still grow here. The terraces descend toward the city. Some trees are 300 years old. The air smells like soil and time. Few tourists find this place.",im:"It\'s 1768. Plant collectors bring seeds from Brazil, India, Africa. The garden grows. Science and empire meet under the sun.",t:"Rare species from the colonial era still grow here. The terraces descend toward the city. Some trees are 300 years old. The air smells like soil and time. Few tourists find this place.\",im:\"It\'s 1768. Plant collectors bring seeds from Brazil, India, Africa. The garden grows. Science and empire meet under the sun.\",t:\"Calçada da Ajuda, 62. €3.50 entry. Open 9am-5pm. Walk from Belém—it\'s uphill but worth it. Bring water.",c:["nature", "history_big", "quiet"],r:"g",nn:"Botanical Garden (Jardim Botânico da Ajuda)",ns:"Botanical Garden (Jardim Botânico da Ajuda) é joia portuguesa.",nst:"Botanical Garden (Jardim Botânico da Ajuda) respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},

  {id:20,n:"Earthquake\'s Cross (Cruzeta do Terreiro)",a:"Baixa",v:["history", "hidden"],d:20,s:"A small cross marks where the 1755 earthquake was \'felt strongest\'",st:"It\'s a modest stone marker in a modern plaza. Few notice it. But locals touch it while passing—a ritual of respect to the thousands who died. The ground beneath your feet swallowed them.",im:"It\'s November 1, 1755. 9:40am. The earth moves. Buildings collapse. Sixty thousand die in moments. Survivors mark the spot. A cross. A memory.",t:"It\'s a modest stone marker in a modern plaza. Few notice it. But locals touch it while passing—a ritual of respect to the thousands who died. The ground beneath your feet swallowed them.\",im:\"It\'s November 1, 1755. 9:40am. The earth moves. Buildings collapse. Sixty thousand die in moments. Survivors mark the spot. A cross. A memory.\",t:\"Praça do Rossio. It\'s small—you\'ll miss it easily. Stand in the plaza, look for the weathered stone near the fountain. Bring silence, not cameras.",c:["history_big", "hidden"],r:"g",nn:"Earthquake\'s Cross (Cruzeta do Terreiro)",ns:"Earthquake\'s Cross (Cruzeta do Terreiro) é joia portuguesa.",nst:"Earthquake\'s Cross (Cruzeta do Terreiro) respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},

  {id:22,n:"Nuns\' viewpoint of Graça convent",a:"Graça",v:["history", "hidden", "quiet"],d:22,s:"The edge of a cloistered convent with a secret city view",st:"The 13th-century convent\'s balcony overlooks the entire east side of Lisbon. Nuns once watched the city from here, separated by walls. Now visitors can stand where they stood. The connection spans centuries.",im:"It\'s 1500. A nun stands alone. She\'s vowed to silence. But the view speaks. The city below is hers to see, never to touch.",t:"The 13th-century convent\'s balcony overlooks the entire east side of Lisbon. Nuns once watched the city from here, separated by walls. Now visitors can stand where they stood. The connection spans centuries.\",im:\"It\'s 1500. A nun stands alone. She\'s vowed to silence. But the view speaks. The city below is hers to see, never to touch.\",t:\"Rua da Graça, next to the Miradouro da Senhora do Monte. Small shrine/chapel visible—this IS the viewpoint. Free. Arrive early to avoid crowds from main Graça viewpoint.",c:["history_big", "hidden", "quiet"],r:"g",nn:"Nuns\' viewpoint of Graça convent",ns:"Nuns\' viewpoint of Graça convent é joia portuguesa.",nst:"Nuns\' viewpoint of Graça convent respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},

  {id:25,n:"Campo de Ourique neighborhood squares",a:"Campo de Ourique",v:["local", "beautiful", "quiet"],d:25,s:"A residential neighborhood of actual Lisboans with hidden plazas",st:"No major monuments here. Just terraced houses, neighborhood groceries, and small plazas where retired locals sit. The azulejo facades are everyday art. This is where Lisboans actually live.",im:"It\'s 1920. Neighbors gather in the plaza. Children play. An old woman tends a balcony garden. Nothing changes for decades. The world outside doesn\'t matter here.",t:"No major monuments here. Just terraced houses, neighborhood groceries, and small plazas where retired locals sit. The azulejo facades are everyday art. This is where Lisboans actually live.\",im:\"It\'s 1920. Neighbors gather in the plaza. Children play. An old woman tends a balcony garden. Nothing changes for decades. The world outside doesn\'t matter here.\",t:\"Rua Silva Carvalho or Rua Ferreira Borges. Take tram 28 to the end. Walk the neighborhood. Grab pastéis de nata from the local café. This is real Lisbon.",c:["local_only", "beautiful"],r:"g",nn:"Campo de Ourique neighborhood squares",ns:"Campo de Ourique neighborhood squares é joia portuguesa.",nst:"Campo de Ourique neighborhood squares respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},

  {id:29,n:"Elevator Bica (Elevador da Bica)",a:"Bairro Alto",v:["history", "beautiful"],d:29,s:"A wooden cable car ascending the steepest hill in Lisbon",st:"Since 1884, this funicular hauls tourists and locals up a near-vertical slope. The wood groans. The view expands as you rise. At the top, the city unfolds. The ride takes 3 minutes. The memory lasts forever.",im:"It\'s 1880. Engineers place the first cable. The car descends. Will it hold? Yes. It does. Every day for 140 years, it holds.",t:"Since 1884, this funicular hauls tourists and locals up a near-vertical slope. The wood groans. The view expands as you rise. At the top, the city unfolds. The ride takes 3 minutes. The memory lasts forever.\",im:\"It\'s 1880. Engineers place the first cable. The car descends. Will it hold? Yes. It does. Every day for 140 years, it holds.\",t:\"Calçada do Combro (bottom) or Rua da Bica de Duarte Belo (top). €3.80 per ride. Go early or very late—midday is tourist circus. Stand on the right side for the best view downward.",c:["history_big", "beautiful"],r:"g",nn:"Elevator Bica (Elevador da Bica)",ns:"Elevator Bica (Elevador da Bica) é joia portuguesa.",nst:"Elevator Bica (Elevador da Bica) respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},

  {id:42,n:"Forbidden City (Zona Proibida)",a:"Alcântara",v:["weird", "abandoned", "history"],d:42,s:"A pre-industrial working-class neighborhood slated for demolition hovers in limbo",st:"The buildings are crumbling. People still live here. Time stopped in 1990. Development came, then stopped. Now it\'s a living archaeology. You can walk streets that feel abandoned while someone\'s laundry flaps overhead.",im:"It\'s 1995. The state says: you must leave. Families refuse. The stalemate holds for 30 years. They live in buildings falling apart. It becomes life.",t:"The buildings are crumbling. People still live here. Time stopped in 1990. Development came, then stopped. Now it\'s a living archaeology. You can walk streets that feel abandoned while someone\'s laundry flaps overhead.\",im:\"It\'s 1995. The state says: you must leave. Families refuse. The stalemate holds for 30 years. They live in buildings falling apart. It becomes life.\",t:\"Rua da Calçada do Tojal, Alcântara. It\'s genuinely dangerous—crumbling structures, unstable stairs. View from the edges. Respect residents\' privacy. This isn\'t a museum.",c:["abandoned", "history_big", "weird"],r:"y",nn:"Forbidden City (Zona Proibida)",ns:"Forbidden City (Zona Proibida) é joia portuguesa.",nst:"Forbidden City (Zona Proibida) respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},

  {id:63,n:"Arrábida Mountain from Setúbal",a:"Setúbal (day trip)",v:["nature", "beautiful", "quiet"],d:63,s:"A pristine mountain range dropping straight into crystal Sado Estuary—impossible views",st:"Take the ferry across the Tagus. The estuary opens. Arrábida rises from water like a sleeping giant. Cliffs of limestone. Beaches of stone. The air tastes of salt and history. Few tourists reach here.",im:"It\'s 1400. Portuguese sailors used this estuary to build caravels. The Arrábida stood then, will stand forever. The mountain watched them sail to discover the world. Now it watches your small boat cross.",t:"Take the ferry across the Tagus. The estuary opens. Arrábida rises from water like a sleeping giant. Cliffs of limestone. Beaches of stone. The air tastes of salt and history. Few tourists reach here.\",im:\"It\'s 1400. Portuguese sailors used this estuary to build caravels. The Arrábida stood then, will stand forever. The mountain watched them sail to discover the world. Now it watches your small boat cross.\",t:\"Take ferry from Cais do Sodré to Setúbal (45min, €3). Then local bus to Arrábida base (20min). Hike trails 2-5 hours. Pack water and snacks. The view from the top is monumental. Go midweek to avoid crowds.",c:["nature", "high_spots"],r:"g",nn:"Arrábida Mountain from Setúbal",ns:"Arrábida Mountain from Setúbal é joia portuguesa.",nst:"Arrábida Mountain from Setúbal respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},

  {id:75,n:"Torre de Belém — Climb for Free After Hours",a:"Belém",v:["free", "beautiful", "hidden"],d:75,s:"Sneak into the famous tower at sunset when guards rotate (it\'s technically free then)",st:"You arrive at dusk. The guards change shift. A window opens. You walk in. Climb the narrow stairs. At the top, the Tagus turns gold. You\'ve seen the tower from outside your whole life. Now you\'re inside it.",im:"It\'s 1514. The tower stands new, guarding the harbor. Caravels pass below. Now the tower guards memory. At sunset, it holds the light like a chalice.",t:"You arrive at dusk. The guards change shift. A window opens. You walk in. Climb the narrow stairs. At the top, the Tagus turns gold. You\'ve seen the tower from outside your whole life. Now you\'re inside it.\",im:\"It\'s 1514. The tower stands new, guarding the harbor. Caravels pass below. Now the tower guards memory. At sunset, it holds the light like a chalice.\",t:\"Praça do Império, Belém. The guard shift changes at 6pm. This is technically free access time (officially €6). Go just before sunset. The city view from the tower is monumental. Bring a friend to watch.",c:["free", "high_spots", "history_big"],r:"g",nn:"Torre de Belém",ns:"Torre de Belém é joia portuguesa.",nst:"Torre de Belém respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},

  {id:80,n:"Underdogs Gallery Walking Tour",a:"Alcântara",v:["street_art", "local"],d:80,s:"Follow the evolution of Portuguese street art through murals that changed the world",st:"Alcântara\'s walls are a gallery. Every building a canvas. Artists from around the world paint here. It evolved. You can see the progression. From tagging to masterpieces. This is where Lisbon\'s identity exploded onto walls.",im:"It\'s 2007. A collective calls themselves UNDERDOGS. They start painting. The street art scene explodes. Now murals are everywhere. Now it\'s famous. Now it\'s beautiful. Now it\'s history.",t:"Alcântara\'s walls are a gallery. Every building a canvas. Artists from around the world paint here. It evolved. You can see the progression. From tagging to masterpieces. This is where Lisbon\'s identity exploded onto walls.\",im:\"It\'s 2007. A collective calls themselves UNDERDOGS. They start painting. The street art scene explodes. Now murals are everywhere. Now it\'s famous. Now it\'s beautiful. Now it\'s history.\",t:\"Rua Sophia de Mello Breyner, Alcântara. Free walking tour. Self-guided best. Bring a camera. Many murals are photogenic. The gallery itself (Underdogs Gallery proper) opens for exhibitions. Check Instagram for events.",c:["street_art"],r:"g",nn:"Underdogs Gallery Walking Tour",ns:"Underdogs Gallery Walking Tour é joia portuguesa.",nst:"Underdogs Gallery Walking Tour respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},
  {id:81,n:"Mouraria Mural Alley",a:"Mouraria",v:["street_art", "history", "hidden"],d:81,s:"An entire alley dedicated to street art celebrating Mouraria\'s culture and history",st:"You walk an alley painted top to bottom. Portraits of Fado singers. Scenes of daily life. The murals celebrate the neighborhood itself. This is the opposite of graffiti. This is love.",im:"It\'s 2010. The neighborhood was dying. Artists moved in. They painted. They created. Now the murals are the neighborhood\'s heartbeat. They remember what used to be. They celebrate what is.",t:"You walk an alley painted top to bottom. Portraits of Fado singers. Scenes of daily life. The murals celebrate the neighborhood itself. This is the opposite of graffiti. This is love.\",im:\"It\'s 2010. The neighborhood was dying. Artists moved in. They painted. They created. Now the murals are the neighborhood\'s heartbeat. They remember what used to be. They celebrate what is.\",t:\"Off Rua da Regueira, Mouraria. Free. Open air. 24/7. Go in daylight to see the colors. The murals are updated regularly. Each year brings new art. Check #muralismomoraria on Instagram.",c:["street_art", "history_big"],r:"g",nn:"Mouraria Mural Alley",ns:"Mouraria Mural Alley é joia portuguesa.",nst:"Mouraria Mural Alley respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},

  {id:108,n:"Tejo River Ferry to Cacilhas",a:"Waterfront",v:["free","beautiful","local"],d:20,s:"Cross the Tejo on a commuter ferry for panoramic river and harbor views",st:"The Cacilhas ferry costs €1.15 and takes 15 minutes. Stand on deck for views of Lisbon\'s skyline, Cristo Rei statue, and Ponte 25 de Abril. It\'s the local way to cross.",im:"Time-travel: Ferries have crossed the Tejo for centuries.",t:"Cost: €1.15. Departure from Praça do Comércio.",c:["romantic_water","local_only"],r:"g",nn:"Tejo Barca Cacilhas",ns:"Travesía del río por €1,15 — vistas panorámicas",nst:"Cruza el Tejo en ferri como hacen los locales.",nt:"Costo: €1,15. Salida Praça do Comércio."},
  {id:109,n:"LX Factory Street Art Zone",a:"Alcântara",v:["art","free","night"],d:15,s:"Massive street art district in converted industrial space — colorful and bohemian",st:"LX Factory is a trendy street art zone with galleries, murals, and bars. Rua da Rosa (\"Pink Street\") nearby is famous for its red-light district turned hipster bar scene. Both are free to explore.",im:"Time-travel: LX Factory emerged as creative hub in the 2010s.",t:"Free to walk. Bars and shops have costs.",c:["street_art","night"],r:"g",nn:"LX Factory Lisboa",ns:"Distrito de arte urbano masivo — colorido y bohemio",nst:"Explora el arte callejero de LX Factory.",nt:"Gratis explorar. Bares con costo."}

,{id:119,n:"Miradouro do Recolhimento",a:"Alfama",v:["hidden"],d:20,s:"Secret castle-adjacent terrace hiding epic Alfama and Pantheon views amid olive trees!",st:"Slip down a quiet alley before the Castelo ticket office into this tucked-away gem. Olive trees frame the sprawling Alfama rooftops and distant Tagus shimmer. Locals whisper it's Lisbon's best-kept miradouro secret, far from tourist throngs.",im:"Imagine lounging on stone benches as golden hour bathes the Pantheon in light, olive branches swaying like nature's curtain call.",t:"From Castelo de São Jorge, head down Rua do Recolhimento, turn into Beco do Recolhimento; free entry, gate closes ~19:00; best late afternoon for serenity.",c:["viewpoints", "gardens"],r:"g",nn:"Miradouro do Recolhimento",ns:"Terraço secreto ao lado do castelo com oliveiras + vista épica de Alfama/Panteão!",nst:"Desça uma rua tranquila antes do posto de bilhetes do Castelo para este tesouro escondido. Oliveiras emolduram os telhados de Alfama e o brilho distante do Tejo. Os locais sussurram que é o miradouro mais bem guardado de Lisboa.",nt:"Do Castelo de São Jorge, desça pela Rua do Recolhimento, vire no Beco do Recolhimento; entrada grátis, portão fecha ~19:00; melhor final da tarde para tranquilidade."},
{id:120,n:"Quinta do Mocho Street Art Gallery",a:"Sacavém",v:["hidden"],d:20,s:"Open-air mural madness on apartment blocks—DIY street art safari in outer Lisbon!",st:"Venture beyond the city to this explosive canvas of hundreds of vibrant murals splashed across everyday buildings. It's raw, respectful urban art heaven where colors pop against gritty suburbia. Hunt like a local explorer, camera in hand.",im:"Picture yourself wandering a surreal neighborhood where every wall bursts with giant faces, abstracts, and political bites under wide blue skies.",t:"Metro to Sacavém + short bus/ride; free to wander daytime, be respectful of residents; pair with Marvila for full art day.",c:["street art"],r:"g",nn:"Quinta do Mocho galeria de arte de rua ao ar livre",ns:"Loucura de murais em blocos de apartamentos—safari DIY de arte urbana na Lisboa exterior!",nst:"Aventure-se além da cidade para esta tela explosiva de centenas de murais vibrantes em edifícios comuns. É um paraíso de arte urbana crua e respeitosa onde as cores explodem contra a suburbia gasta. Caçe como um explorador local.",nt:"Metro até Sacavém + autocarro curvo; grátis para passear de dia, respeite os moradores; combine com Marvila para dia completo de arte."},

return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TBGS={"places":"url('../../textures/tex15.webp') center/cover fixed no-repeat","collections":"url('../../textures/tex16.webp') center/cover fixed no-repeat","missions":"url('../../textures/tex17.webp') center/cover fixed no-repeat","plan":"url('../../textures/tex18.webp') center/cover fixed no-repeat","phrases":"url('../../textures/tex1.webp') center/cover fixed no-repeat","default":"url('../../textures/tex15.webp') center/cover fixed no-repeat"};function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
{/* dark scrim over photo */}
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Lisbon Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Lisbon Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
