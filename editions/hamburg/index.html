const P = [,
  {name:'Hof der kleinen Pause',area:'Sternschanze',desc:'Ein versteckter Innenhof mit Street-Art-Wänden und Bänken zum Verweilen, wo Locals picknicken oder einfach die Stadtluft atmen. Erreicht mit Bus 4 oder 18 bis Sternschanze. Locals schätzen die ruhige Oase inmitten des Trubels, perfekt für ein langsames Entspannen. Free.',tags:['courtyard','street art','hidden','free'],lat:53.565,lng:9.968},
  {name:'Park am Silbermannufer',area:'Eimsbüttel',desc:'Kleiner Kanalpark mit Wiesen und Blicken auf die Fleet, ideal für Spaziergänge oder Lesen unter Bäumen. Bus 182 bringt dich direkt hin. Hamburgens locals lieben es für die entspannte Atmosphäre fernab von Touristenströmen. Free.',tags:['park','local','free','hidden'],lat:53.559,lng:9.938},
  {name:'Ausblick vom Uwe-Dürr-Kai',area:'Wilhelmsburg',desc:'Geheimer Hafenblickpunkt mit Panoramablick auf die Werften und Elbe, wo Locals die Industrie-Skyline genießen. Mit der U3 bis Wilhelmsburg, dann zu Fuß. Die rohe, ungeschminkte Hamburg-Ansicht macht es zu einem Insider-Favoriten. Free.',tags:['viewpoint','hidden','free','local'],lat:53.521,lng:9.989},
  {name:'Boberger Auental',area:'Boberger Neuland',desc:'Verstecktes Naturschutzgebiet mit Wegen durch Wiesen und Teiche, ein Stück Wildnis in der Stadt. Bus 129 bis Boberger Markt. Locals kommen zum Wandern und Beobachten von Vögeln in aller Ruhe. Free.',tags:['park','hidden','free','local'],lat:53.445,lng:10.045},
  {name:'Fischmarkt Hinterhof',area:'Altona',desc:'Geheimer Hof hinter dem Wochenend-Fischmarkt mit Graffiti und alten Lagerhallen, lebendig sonntags. Bus 112 bis Altona. Locals hängen hier ab, genießen den echten Hafenflair ohne Massen. Free.',tags:['courtyard','street art','market','free'],lat:53.546,lng:9.934},
  {name:'St. Georg Parkanlage',area:'St. Georg',desc:'Kleiner, überschaubarer Park mit versteckten Bänken und Community-Garten, umgeben von Altbauten. U1 bis Hauptbahnhof Nord, dann Bus 5. Locals schätzen die Nachbarschaftsatmosphäre und spontanen Treffen. Free.',tags:['park','community','local','free'],lat:53.552,lng:10.01},
  {name:'Schanzen-Freskenwand',area:'Sternschanze',desc:'Monumentale Street-Art-Wand in einer Nebenstraße, ständig wechselnde Werke von lokalen Künstlern. Bus 4 oder 18. Die kreative Energie zieht Kreative und Spaziergänger an, die das Viertel aufsaugen. Free.',tags:['street art','hidden','free','local'],lat:53.567,lng:9.964},
  {name:'Jenfeld See Uferpfad',area:'Jenfeld',desc:'Rundweg am kleinen See mit Bänken und Wildvogelkolonien, ein ruhiger Spot für Kontemplation. Bus 17 bis Jenfeld. Locals nutzen es für meditative Spaziergänge oder Picknicks. Free.',tags:['park','hidden','free','local'],lat:53.585,lng:10.05},
  {name:'Hafenblick vom Veddeler Brückenturm',area:'Veddelen',desc:'Versteckter Turmausblick auf Containerterminals und Schiffe, erreichbar über alte Treppen. U3 bis Veddel. Die industrielle Weite fasziniert Locals als Kontrast zur glatten City. Free.',tags:['viewpoint','hidden','free','local'],lat:53.53,lng:9.997},
  {name:'Winterhude Hinterhöfe',area:'Winterhude',desc:'Reihe grüner Innenhöfe mit Kunstinstallationen und Bänken in der Mühlenkampgegend. Bus 22 bis Winterhude. Locals feiern die idyllischen Ecken für Kaffee-to-go-Momente. Free.',tags:['courtyard','street art','hidden','free'],lat:53.572,lng:10.02},
  {id:1,n:"Warehouse Shadows #1 — Speicherstadt",a:"Speicherstadt",v:["hidden", "history"],d:1,s:"Red brick time machines rising from dark canal water — illegal smuggling route turned hipster heaven.",st:"You walk between six-story warehouses that predate the Panama Canal. The cobblestones glisten. Canal boats drift silently below. Street-level galleries hide behind unmarked doors.",im:"It\'s 1890. Boats are loading contraband under gas lamps.",t:"You walk between six-story warehouses that predate the Panama Canal. The cobblestones glisten. Canal boats drift silently below. Street-level galleries hide behind unmarked doors.\",im:\"It\'s 1890. Boats are loading contraband under gas lamps.\",t:\"U-Bahn to Metrowerke. Free to walk. Early morning best.",c:["history_big", "local_only"],r:"g",nn:"Hafen",ns:"Der Hafen, der Hamburg zur Hansestadt machte.",nst:"Der Hafen ist riesig und immer in Bewegung. Große Schiffe kommen und gehen. Du kannst vom Ufer zusehen, wie die Welt ankommt und geht.",nt:"Frei zugänglich. Beste Aussicht von St. Pauli-Landungsbrücken. Hafenrundfahrten kosten etwa €15-18. Besuch am frühen Morgen für weniger Touristen."},
  {id:2,n:"Rote Flora Squat #2 — Schanzenviertel",a:"Schanzenviertel",v:["weird", "history", "night"],d:2,s:"Graffitied anarchist theater where punks still squat — Hamburg\'s unbroken punk heart.",st:"Pink building covered in murals. Boarded windows. Inside: underground theater, raves. Outside: street art constantly evolving. This is not a museum.",im:"It\'s 1989. Squatters chain the doors. A riot ignites.",t:"Pink building covered in murals. Boarded windows. Inside: underground theater, raves. Outside: street art constantly evolving. This is not a museum.\",im:\"It\'s 1989. Squatters chain the doors. A riot ignites.\",t:\"U-Bahn to Feldstrasse. Go at night for energy. Completely free.",c:["street_art", "history_big"],r:"y",nn:"Reeperbahn",ns:"Hamburgs berüchtigte Vergnügungsmeile – auch tagsüber interessant.",nst:"Das war die Straße der Beatels und Piraten. Heute haben sich die Clubs und Theater etabliert. Du kannst tagsüber spazieren, die Geschichte atmen, und nachts die Energie spüren.",nt:"St. Pauli. Tagsüber sicher, tagsüber interessant. Nachts für Nachtleben. Preise sind gehobener als anderswo in Hamburg."},
  {id:3,n:"Fish Market Dawn #3 — Altona",a:"Altona",v:["local", "weird", "history"],d:3,s:"5am chaos: screaming auctioneers, flying fish, vintage Germans doing shots, live bands.",st:"The St. Pauli Fischmarkt erupts at sunrise. Fishmongers slam fish. Crowd is 80% locals who\'ve been out all night. Bands play on warehouse stage.",im:"It\'s 1950. Dock workers unload the night\'s catch.",t:"The St. Pauli Fischmarkt erupts at sunrise. Fishmongers slam fish. Crowd is 80% locals who\'ve been out all night. Bands play on warehouse stage.\",im:\"It\'s 1950. Dock workers unload the night\'s catch.\",t:\"S-Bahn to Altona. Sunday only, 5-10am. Free entry. Bring cash.",c:["local_only", "free_museum"],r:"g",nn:"Speicherstadt",ns:"Europas größtes Lagerviertel aus rotem Backstein – ein Wunderland aus Wasser und Gebäuden.",nst:"Speicherstadt ist das größte Lagerviertel Europas, gebaut auf Pfählen über dem Wasser. Schiffe fahren durch enge Kanäle. Alte Lagerhäuser sind jetzt Museen und Restaurants.",nt:"U-Bahn zur Baumwall. Kostenlos spazieren. Viele kleine Kanäle – bring gutes Schuhwerk. Museen und Cafés überall."},

  {id:5,n:"Rote Flora Squat #5 — Schanzenviertel",a:"Schanzenviertel",v:["weird", "history", "night"],d:5,s:"Graffitied anarchist theater where punks still squat — Hamburg\'s unbroken punk heart.",st:"Pink building covered in murals. Boarded windows. Inside: underground theater, raves. Outside: street art constantly evolving. This is not a museum.",im:"It\'s 1989. Squatters chain the doors. A riot ignites.",t:"Pink building covered in murals. Boarded windows. Inside: underground theater, raves. Outside: street art constantly evolving. This is not a museum.\",im:\"It\'s 1989. Squatters chain the doors. A riot ignites.\",t:\"U-Bahn to Feldstrasse. Go at night for energy. Completely free.",c:["street_art", "history_big"],r:"y",nn:"Rote Flora Squat #5 Viertel — Schanzenviertel",ns:"Ein Dorf in Stadt—wo normale Menschen leben.",nst:"Das Viertel ist Wohn-Platz mit Läden und Restaurants. Nicht touristisch, echte Leute. Du bist Fremder aber willkommen. Es ist Gemeinschaft.",nt:"Kostenlos spazieren. Restaurants €8-20. Cafés €2-5. Sehr günstig und authentisch. Nicht schön aber real. U-Bahn oder Tram nötig oft."},

  {id:106,n:"Elbe Tunnel Pedestrian Path",a:"Neuwerk/South",v:["weird","free","local"],d:15,s:"408m tunnel under the Elbe River with escalators and stained glass",st:"The Old Elbe Tunnel is a working pedestrian/bike underpass decorated with tiled murals and original escalators from 1911. Walk 50 meters below the river while ships pass overhead. Surreal and rarely crowded.",im:"Time-travel: Opened in 1911 to connect workers from the South Bank to the docks.",t:"Free. Entrances at Landungsbrücken (north) and Neuwerk (south). Strollers/cycles allowed.",c:["architecture","history_big"],r:"g",nn:"Alter Elbtunnel",ns:"Tunnel unter der Elbe mit historischen Leitern",nst:"Spazieren Sie 50 Meter unter dem Fluss durch den Tunnel.",nt:"Kostenlos. Eingänge bei Landungsbrücken und Neuwerk."},
  {id:107,n:"Miniatur Wunderland Model Railway",a:"Warehouse",v:["weird","art","local"],d:20,s:"Obsessive model train empire — 1,500 square meters of miniature detail",st:"This is the world\'s largest model railway; it\'s hypnotic. Tiny villages, airports, and trains operate in perfect miniature. The level of detail is insane: individual trees, working lights, thousands of tiny figures. It\'s an art form disguised as a hobby.",im:"Time-travel: Built starting in 2000, it\'s still expanding—a labor of love.",t:"Paid entry (€15). Warehouse district. Self-guided or guided.",c:["weird","architecture"],r:"g",nn:"Miniatur Wunderland",ns:"Obsessive Modellbahn mit 1.500 qm Detail",nst:"Besuchen Sie die größte Modellbahn der Welt.",nt:"Eintritt erforderlich. Warehouse-Bezirk."}


  ,{id:108, n:"Altonaer Balkon Sunset Over Harbor — Altona", a:"Altona", v:["beautiful","local","quiet"], d:20, s:"Terrace 27 meters above Elbe River with 180° views of container ships, Köhlbrandbrücke bridge, port activity at golden hour.", st:"A long grassy slope descends from the terrace. Picnic blankets spread across grass. Families photograph the Köhlbrandbrücke with sun behind it. The light changes the water from gray to gold in 40 minutes. Benches face the water; many are taken by 5pm.", im:"Warm grass under your back, salt smell from the Elbe, the deep horn of a passing cargo ship, light reflecting off water into your eyes.", t:"Balkonplatz in Altona district. S/U-bahn to Altona Station, 5-min walk uphill. Free. Best visited 2 hours before sunset; come earlier to claim grass space. Café with river views at base of terrace.", c:[], r:"g", nn:"Altonaer Balkon Sonnenuntergang Über Hafen", ns:"Terrasse 27 Meter über der Elbe mit 180° Aussicht auf Containerschiffe, Köhlbrandbrücke, Hafenaktivität bei goldener Stunde.", nst:"Ein langer Grasshang steigt von der Terrasse ab. Picknickdecken verteilen sich über Gras. Familien fotografieren die Köhlbrandbrücke mit Sonne dahinter. Das Licht verändert das Wasser von grau zu gold in 40 Minuten. Bänke blicken auf das Wasser; viele sind um 17 Uhr besetzt.", nt:"Balkonplatz im Altonaer Bezirk. S/U-Bahn zur Altona-Station, 5 Minuten bergauf. Kostenlos. Am besten 2 Stunden vor Sonnenuntergang besucht; früher kommen, um Platz zu reservieren. Café mit Ausblick auf Fluss an der Basis der Terrasse."}

  ,{id:109, n:"Stadtparksee Outdoor Swimming — Winterhude", a:"Winterhude", v:["local","beautiful","free entry"], d:30, s:"107x138m outdoor swimming pool separated from natural lake by wall only—Hamburg's largest outdoor pool, packed weekends.", st:"On hot days, 200,000+ people come here. Families camp on towels. Swimmers do laps between the wall and lake. Young locals show up at 7am before crowds. The water is filtered but feels like swimming in the park. Grass surrounds everything.", im:"Chlorine mixed with park grass smell, the shock of cool water, bodies glistening with sunscreen, the distant sound of the city fading.", t:"Stadtpark, U3 Barmbek (5 min walk) or bus. Free entry. Open May-Sept, 8am-sunset. Weekday mornings (7-10am) are quietest. Kiosks sell beer, ice cream, sandwiches.", c:[], r:"g", nn:"Stadtparksee Außenschwimmen", ns:"107x138m Außenschwimmbad nur durch eine Wand vom natürlichen See getrennt—Hamburgs größtes Außenbad, Wochenenden voll.", nst:"An heißen Tagen kommen 200.000+ Menschen hierher. Familien lagern auf Handtüchern. Schwimmer machen Runden zwischen Wand und See. Junge Einheimische erscheinen um 7 Uhr vor den Menschenmassen. Das Wasser ist gefiltert, aber es fühlt sich an, als würde man im Park schwimmen. Gras umgibt alles.", nt:"Stadtpark, U3 Barmbek (5 Min. zu Fuß) oder Bus. Kostenlos. Geöffnet Mai-Sept, 8 Uhr bis Sonnenuntergang. Wochentag Morgens (7-10 Uhr) am ruhigsten. Kioske verkaufen Bier, Eis, Sandwiches."}

  ,{id:110, n:"Altona Fischmarkt 5am Sunday Market — Altona", a:"Altona", v:["weird","local","free entry"], d:30, s:"Sunday 5am-9:30am market trading fresh fish, produce, live music in 1703 fish auction hall, fishermen shouting bids.", st:"Fishermen in boots hose down wooden stalls. Barkers out-shout each other ('Come here, I throw salmon free!'). Live rock and jazz plays inside the Fischauktionshalle. Night owls from clubs next door stumble in. The smell is salt, ice, fresh crab.", im:"Ice-cold fish on your palm, shouting voices echoing off wood, the screech of seagulls, coffee steam rising in cold air.", t:"Altonaer Fischmarkt, Große Elbstr. 9. U-Bahn Landungsbrücken or bus 111. April-Oct Sundays 5-9:30am, Nov-March Sundays 7-9:30am. Free entry, coffee/food stalls pay-per-item.", c:[], r:"g", nn:"Altona Fischmarkt 5am Sonntagsmarkt", ns:"Sonntag 5am-9:30am Markt mit frischem Fisch, Produkten, Live-Musik in 1703 Fischauktionshalle, Fischer schreien Gebote.", nst:"Fischer in Stiefeln spritzen Holzstände. Ausrufer übertreffen sich gegenseitig ('Komm her, ich werfe Lachs frei!'). Live-Rock und Jazz spielen in der Fischauktionshalle. Nachtschwärmer aus benachbarten Clubs stolpern hinein. Der Geruch ist Salz, Eis, frische Krabbe.", nt:"Altonaer Fischmarkt, Große Elbstr. 9. U-Bahn Landungsbrücken oder Bus 111. April-Okt Sonntags 5-9:30am, Nov-März Sonntags 7-9:30am. Kostenlos, Kaffee/Essenstände bezahlt pro Artikel."}

  ,{id:111, n:"Lüneburg Medieval Salt City — Lüneburg", a:"Lüneburg", v:["history","beautiful"], d:90, s:"Medieval Hanseatic town 30km south, red-brick Gothic buildings, German Salt Museum, the salt that made Hamburg rich.", st:"Cobblestone Markt square has the tilt of centuries (medieval buildings settling unevenly). Crane House (Kran) overlooks harbor. Half-timbered buildings lean. The salt museum in a former warehouse shows why Lüneburg's salt preserved herring—the trade that built Hamburg's fortune.", im:"Uneven cobblestones under your feet, the specific silence of a 500-year-old square, salt crystallized in museum displays, cold stone corridors.", t:"30km south, train from Hamburg Hauptbahnhof, RE service 24-36 min, €7-12. From station, 10-15 min walk to Altstadt. Open daily, museums Tues-Sun 10am-5pm. Low-cost regional ticket covers travel.", c:[], r:"g", nn:"Lüneburg Mittelalterliches Salzstadt", ns:"Mittelalterliche Hansestadt 30 km südlich, rot-ziegel Gotik Gebäude, deutsches Salzmuseum, das Salz, das Hamburg reich machte.", nst:"Pflasterstein Markt hat die Neigung von Jahrhunderten (mittelalterliche Gebäude ungleichmäßig absetzend). Kranhaus blickt auf den Hafen hinab. Fachwerk-Gebäude lehnen. Das Salzmuseum in einem ehemaligen Lagerhaus zeigt, warum Lüneburgs Salz Hering konservierte—der Handel, der Hamburgs Vermögen aufbaute.", nt:"30 km südlich, Zug vom Hamburger Hauptbahnhof, RE Service 24-36 Min., €7-12. Von Station, 10-15 Min. Fußweg zur Altstadt. Täglich geöffnet, Museen Di-So 10 Uhr-17 Uhr. Günstiges Regionalticket deckt Reise ab."}

  ,{id:112, n:"Speicherstadt UNESCO Dawn Photography — Hafen", a:"Hafen", v:["beautiful","history","quiet"], d:30, s:"Largest warehouse district on timber-piles—15 warehouse blocks, 300,000m², UNESCO site, best at 5-6am before crowds.", st:"Gray light reflects off canals between brick warehouses. Photographers set tripods. The buildings stand on wooden foundations sinking millimeters per century. Early morning mist rises from water. By 8am tourists fill Instagram angles. The working harbor is silent until delivery trucks arrive at 6am.", im:"Cold stone under your feet, the specific smell of aged brick and water, silence so complete you hear your own breathing, soft light on red walls.", t:"Central Hamburg, U1 Baumwall (Speicherstadt station). Free to walk. Best visited 5-7am before tourists. Museums inside (Miniatur Wunderland, Spicy Spice Museum) open 9am+.", c:[], r:"g", nn:"Speicherstadt UNESCO Morgenfotografie", ns:"Größtes Lagerhaus viertel auf Pfahlgründungen—15 Lagerhausblöcke, 300.000m², UNESCO-Stätte, beste bei 5-6 Uhr vor Menschenmassen.", nst:"Graues Licht reflektiert sich von Kanälen zwischen Ziegellager häusern. Fotografen stellen Stative auf. Die Gebäude stehen auf Holzfundamenten, die millimeterweise pro Jahrhundert versinken. Morgennebel steigt aus dem Wasser auf. Um 8 Uhr füllen Touristen Instagram-Winkel. Der arbeitende Hafen ist still, bis Lieferwagen um 6 Uhr ankommen.", nt:"Zentrales Hamburg, U1 Baumwall (Speicherstadt Station). Kostenlos zum Spaziergang. Am besten um 5-7 Uhr vor Touristen besucht. Museen innen (Miniatur Wunderland, Spicy Spice Museum) ab 9 Uhr geöffnet."}

  ,{id:113, n:"Miniatur Wunderland World's Largest Model Railway — Speicherstadt", a:"Speicherstadt", v:["weird","history"], d:120, s:"World's largest model railway (Guinness verified)—16km track, 1,230 trains, 290,000 figures, Scandinavia/Alps/USA/Italy sections.", st:"Miniature Hamburg neighborhoods you can recognize. A tiny airport with planes that actually taxi. Switzerland has mountains with snow effects. Trains crash in slow motion (on purpose). The day-night cycle repeats every 15 minutes. Children press faces against glass. Adults plan retirement visits.", im:"The specific smell of model dust and electrical wiring, the tiny sound of train wheels, the hypnotic rhythm of the day-night lighting cycle.", t:"Speicherstadt, inside the Hamburgische Kaffeebörse building. U1 Baumwall. 14.50€ adult, 7€ child (online slightly cheaper). Open 9am-10pm daily (Mondays 10am+). Arrive early to avoid crowds; queues 1-2 hours during summer weekends.", c:[], r:"g", nn:"Miniatur Wunderland Weltweit Größte Modellbahn", ns:"Weltweit größte Modellbahn (Guinness verifiziert)—16 km Gleis, 1.230 Züge, 290.000 Figuren, Skandinavien/Alpen/USA/Italien Abschnitte.", nst:"Miniatur Hamburger Nachbarschaften, die du erkennen kannst. Ein winziger Flughafen mit Flugzeugen, die tatsächlich fahren. Die Schweiz hat Berge mit Schneeeffekten. Züge kollidieren in Zeitlupe (absichtlich). Der Tag-Nacht-Zyklus wiederholt sich alle 15 Minuten. Kinder drücken Gesichter gegen Glas. Erwachsene planen Ruhestandsbesuche.", nt:"Speicherstadt, im Hamburgische Kaffeebörse-Gebäude. U1 Baumwall. 14,50€ Erwachsener, 7€ Kind (online etwas billiger). Täglich 9 Uhr-22 Uhr geöffnet (Montags 10 Uhr+). Früh ankommen, um Menschenmassen zu vermeiden; Warteschlangen 1-2 Stunden an Sommerweek enden."}

  ,{id:114, n:"Schanzenviertel Rote Flora Street Culture — Sternschanze", a:"Sternschanze", v:["weird","local","history"], d:25, s:"Counter-cultural heart since 1971—autonomous youth center in repurposed theater, music venue, café, bike repair, anarchist bookshop.", st:"The red building with hand-painted signs. No corporate branding anywhere on Schulterblatt street. Record shops, vintage boutiques, bars. The Rote Flora runs workshops, concerts, activist meetings. Grafitti covers walls with political art. The street vibe shifts: morning cafés, evening bars, night clubs.", im:"The smell of old books and pot smoke, the bass from hidden clubs, the visual chaos of political murals, the specific energy of autonomous space.", t:"Schulterblatt/Sternschanze area. U3 Sternschanze. Free to walk the streets. Rote Flora interior tours available by arrangement. Bars open daily from 7pm, clubs open 11pm+. No entry fee to walk by.", c:[], r:"g", nn:"Schanzenviertel Rote Flora Straßenkultur", ns:"Gegenkultur Herz seit 1971—autonomes Jugendzentrum in umgenutztem Theater, Musikveranstaltungsort, Café, Fahrradreparatur, anarchistischer Buchladen.", nst:"Das rote Gebäude mit handgemalten Schildern. Keine Unternehmensmarketing irgendwo auf der Schulterblatt-Straße. Plattenladen, Vintage-Boutiquen, Bars. Die Rote Flora führt Workshops, Konzerte, Aktivistentreffen durch. Graffiti bedeckt Wände mit politischer Kunst. Die Straßenvibe verschiebt sich: Morgen Cafés, Abend Bars, Nacht Clubs.", nt:"Schulterblatt/Sternschanze Bereich. U3 Sternschanze. Kostenlos zum Spaziergang. Rote Flora Innentours nach Vereinbarung verfügbar. Bars täglich ab 19 Uhr geöffnet, Clubs ab 23 Uhr+. Keine Eintrittsgebühr zum Spaziergang vorbei."}

  ,{id:115, n:"St. Nikolai Church WWII Firestorm Memorial — Mitte", a:"Mitte", v:["history","weird","quiet"], d:20, s:"Ruined church spire—147.4m once world's tallest—bombed July 1943 (Operation Gomorrah), now memorial with museum in crypt.", st:"The building stands as rubble-beautiful. A 51-bell carillon installed 1993 plays melodies daily at noon (Thursdays live). A glass elevator ascends the spire. At 76m up, you overlook the port rebuilt from ashes. The basement museum shows photos of the firestorm—34,000 dead in one week.", im:"Rough stone under your fingers, the sound of church bells across the harbor, the dizzying height of the broken spire, cold wind at elevation.", t:"Willi-Brandt-Straße. U3 Rödingsmarkt or S1 Jungfernstieg. Free crypt entry, spire elevator €5. Open 10am-5pm daily (closed Mondays). The Thursday noon bell-ringing is unforgettable.", c:[], r:"g", nn:"St. Nikolai Kirche WWII Feuerunfall Denkmal", ns:"Zerstörter Kirchturm—147,4m einmal die höchste der Welt—im Juli 1943 bombardiert (Operation Gomorrah), jetzt Denkmal mit Museum in Krypta.", nst:"Das Gebäude steht als Ruinen-schön. Ein 51-glocken Glockenspiel das 1993 installiert wurde, spielt täglich Melodien um Mittag (Donnerstags live). Ein Glaselevator erklimmt den Spitz. In 76 m Höhe blicken Sie auf den aus der Asche wieder aufgebauten Hafen hinab. Das Kellermuseum zeigt Fotos des Feuer sturmes—34.000 Tote in einer Woche.", nt:"Willi-Brandt-Straße. U3 Rödingsmarkt oder S1 Jungfernstieg. Kostenlos Krypta Eintritt, Spitz Aufzug €5. Täglich 10 Uhr-17 Uhr geöffnet (Montags geschlossen). Die Donnerstag Mittag Glockenläutung ist unvergesslich."}

  ,{id:116, n:"Chilehaus Brick Expressionism Ship's Prow — Kontorhaus", a:"Kontorhaus", v:["history","beautiful"], d:15, s:"1922-24 office building shaped like ship prow—UNESCO Brick Expressionism, designed by Fritz Höger, named after Chilean saltpeter trade.", st:"The corner where two streets meet forms an impossibly sharp angle—like a ship's bow cutting through the street. Dark red clinker brick, copper roof. The shipping magnate who built it made his fortune preserving fish with Chilean salt. Every angle is intentional.", im:"The strange perspective of standing at the sharp corner, the weight of century-old brick, the copper roof glinting, shadows shifting across angled walls.", t:"Pumpen- & Niedernstrasse corner, city center. U1 Stephansplatz. Free to view exterior. Interior is offices (not open to public except special events). Best photographed from Niedernstrasse facing the prow. UNESCO plaque on building explains history.", c:[], r:"g", nn:"Chilehaus Ziegelexpression Schiffsbug", ns:"1922-24 Bürogebäude in Form eines Schiffsbugs—UNESCO Ziegelexpressionism, entworfen von Fritz Höger, benannt nach chilenischem Salpeterhandel.", nst:"Die Ecke, wo zwei Straßen aufeinandertreffen, bildet einen unmöglich scharfen Winkel—wie der Bug eines Schiffes, der die Straße durchschneidet. Dunkelrote Klinker ziegel, Kupferdach. Der Schiffsmilliardär, der es baute, machte sein Vermögen durch Konservieren von Fisch mit chilenischem Salz. Jeder Winkel ist absichtlich.", nt:"Pumpen- & Niedernstrasse Ecke, Innenstadt. U1 Stephansplatz. Kostenlos zum Anschauen von außen. Innenraum sind Büros (nicht öffentlich zugänglich außer bei speziellen Veranstaltungen). Am besten von der Niedernstraße fotografiert, die den Bug anblickt. UNESCO-Plakette am Gebäude erklärt Geschichte."}

  ,{id:117, n:"DESY Particle Accelerator Public Tours — Bahrenfeld", a:"Bahrenfeld", v:["weird","history"], d:90, s:"German particle physics research center with synchrotron accelerators, public tours of underground facilities, DESYUM visitor center opened 2025.", st:"Underground tunnels house the PETRA ring—a 2.3km electron/positron storage ring. Scientists in clean suits work at experiments. The DESYUM center shows X-ray technology and particle physics through interactive exhibits. Biennial open days draw 10,000+ visitors.", im:"The hum of massive equipment, the coolness of underground chambers, glowing screens showing particle collision data, the sense of exploring hidden science.", t:"Bahrenfeld district, west Hamburg. S-bahn S21 to DESY stop (35 min from city center). Public tours available year-round by arrangement. DESYUM open daily 10am-5pm. Free entry to visitor center. Tours €5.", c:[], r:"g", nn:"DESY Teilchenleser Öffentliche Touren", ns:"Deutsches Teilchenphysik Forschungszentrum mit Synchrotron Beschleuniger, öffentliche Touren unterirdischer Anlagen, DESYUM Besucherzentrum eröffnet 2025.", nst:"Unterirdische Tunnel beherbergen den PETRA-Ring—ein 2,3 km Elektron/Positron Speicherring. Wissenschaftler in Reinraum anzüge arbeiten an Experimenten. Das DESYUM-Zentrum zeigt Röntgentechnik und Teilchenphysik durch interaktive Exponate. Alle zwei Jahre offene Tage ziehen 10.000+ Besucher an.", nt:"Bahrenfeld Bezirk, Westham burg. S-Bahn S21 zur DESY-Haltestelle (35 Min. vom Stadtzentrum). Öffentliche Touren ganzjährig nach Vereinbarung verfügbar. DESYUM täglich 10 Uhr-17 Uhr geöffnet. Kostenlos Besucherzentrum Eintritt. Touren €5."}

  ,{id:118, n:"Elbphilharmonie Plaza FREE 360° Harbor Views — HafenCity", a:"HafenCity", v:["beautiful","free entry"], d:20, s:"37m-high plaza with 360° Hamburg views—no ticket needed, just walk in with free timed-entry (or €3 skip-the-line online).", st:"The plaza sits where red warehouse meets glass concert hall. Floor-to-ceiling windows frame the harbor. You can see the Elbe bridges, cranes, Speicherstadt, city spires. It's crowded but breathtaking. No concert ticket required—thousands use it daily as a free viewpoint.", im:"Polished floor under your feet, the scale of the harbor vista, wind at height, glass reflecting light and sky, the sound of the concert hall echoing below.", t:"HafenCity, Platz der Deutschen Einheit 1. U3 Baumwall (5 min walk). Free entry (go to desk, no fee). Online timed tickets €3 for skip-the-line if crowds are long. Open daily 9am-midnight.", c:[], r:"g", nn:"Elbphilharmonie Plaza KOSTENLOS 360° Hafenaussicht", ns:"37m hohe Plaza mit 360° Hamburg Aussicht—kein Ticket notwendig, einfach reingehen mit kostenlos zeitgesteuert (oder €3 skip-the-line online).", nst:"Die Plaza sitzt dort, wo rotes Lagerhaus auf Glasconcerthalle trifft. Boden-zu-Decke-Fenster rahmen den Hafen. Sie können die Elbbrücken, Kräne, Speicherstadt, Stadttürme sehen. Es ist voll aber atemberaubend. Kein Konzertkarte erforderlich—Tausende nutzen es täglich als kostenlosen Aussichtspunkt.", nt:"HafenCity, Platz der Deutschen Einheit 1. U3 Baumwall (5 Min. Fußweg). Kostenlos Eintritt (gehen Sie zum Schalter, keine Gebühr). Online zeitgesteuert Karten €3 zum Skip-the-line wenn Menschenmassen lang sind. Täglich 9 Uhr-Mitternacht geöffnet."}

  ,{id:119, n:"Elbstrand Wilhelmsburg Hidden Sand Beach — Wilhelmsburg", a:"Wilhelmsburg", v:["hidden","quiet","local"], d:45, s:"300m sandy beach on Elbe island—locals swim, grill, jog; no crowds, no commercialization, views of city skyline.", st:"Sand meets grass. Families set up grills. The city skyline visible across water. Unlike Amager, zero tourists. A jogger passes every 15 minutes. Evening light makes the water glow. Winter is windswept and yours alone.", im:"Sand between your toes, charcoal smoke from grills, the Elbe's murky water cool on your skin, the city lights starting at dusk.", t:"Wilhelmsburg island, U3 to Wilhelmsburg Station (20 min from city center), then walk 15 min to Elbstrand. Free. Summer early morning (7-9am) is best for avoiding crowds and grilling families. Cafés nearby on Mengestraße.", c:[], r:"g", nn:"Elbstrand Wilhelmsburg Versteckter Sandstrand", ns:"300m Sandstrand auf der Elbeinsel—Lokale schwimmen, grillen, jogging; keine Menschenmassen, keine Kommerzialisierung, Blick auf die Stadtsilhouette.", nst:"Sand trifft Gras. Familien richten Grills auf. Die Stadtsilhouette über dem Wasser sichtbar. Im Gegensatz zu Amager, Null Touristen. Ein Jogger passiert alle 15 Minuten. Abendlicht lässt das Wasser glühen. Winter ist windgepeitscht und ganz deins.", nt:"Wilhelmsburg-Insel, U3 zur Wilhelmsburg-Station (20 Min. vom Stadtzentrum), dann 15 Min. Fußweg zum Elbstrand. Kostenlos. Sommer früher Morgen (7-9 Uhr) ist beste um Menschenmassen und Grillfamilien zu vermeiden. Cafés in der Nähe auf der Mengestraße."}

{lang==="native"&&p.nn&&<p className="text-sm font-medium" style={{color:"#6366F1"}}>{p.n}</p>}

{PLACE_IMAGES[p.id]&&<div className="mt-4 rounded-xl overflow-hidden" style={{maxHeight:"400px"}}>
<img src={`images/${PLACE_IMAGES[p.id]}`} alt={p.n} style={{width:"100%",maxHeight:"360px",objectFit:"contain",display:"block",borderRadius:"8px"}}/>
<p className="text-xs mt-1" style={{color:"#aaa",textAlign:"center"}}>AI-generated illustration</p></div>}
<div className="mt-4 p-4 rounded-xl" style={{background:"#f8f8ff"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#1a1a2e"}}>The Story</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nst?p.nst:p.st}</p></div>
{p.im&&<div className="mt-3 p-4 rounded-xl" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#a78bfa"}}>Imagine This</h3>
<p className="text-sm" style={{color:"#b8b0d0",lineHeight:1.7,fontStyle:"italic"}}>{p.im}</p></div>}
{p.t&&<div className="mt-3 p-4 rounded-xl" style={{background:"#f0fdf4"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#166534"}}>{lang==="native"?"Tips / "+LANG_NAME:"Tips"}</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nt?p.nt:p.t}</p>
<a href={`https://maps.google.com/?q=${encodeURIComponent(p.n+', '+CITY_EN)}`} target="_blank" rel="noopener noreferrer"
  className="mt-3 flex items-center gap-2 text-sm font-bold"
  style={{color:"#166534",textDecoration:"none",display:"inline-flex",marginTop:"10px"}}>
  🗺 Get directions
</a>
</div>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TBGS={"places":"url('../../textures/tex18.png') center/cover no-repeat","collections":"url('../../textures/tex1.png') center/cover no-repeat","missions":"url('../../textures/tex2.png') center/cover no-repeat","plan":"url('../../textures/tex3.png') center/cover no-repeat","phrases":"url('../../textures/tex4.png') center/cover no-repeat","default":"url('../../textures/tex18.png') center/cover no-repeat"};function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
{/* dark scrim over photo */}
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Hamburg Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Hamburg Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
