const P = [
  {id:1,n:"Begijnhof Courtyard",a:"Centrum",v:["hidden", "history", "quiet"],d:1,s:"Medieval almshouse courtyard hiding behind a busy shopping street",st:"Step through the archway and enter 1300. A ring of tiny houses surrounds a chapel where beguines—religious women living communal life—worked and prayed. It\'s still a neighborhood today, just frozen in time.",im:"It\'s 1600. Women in white linen tend gardens between stone cottages. Church bells echo off old brick. No men allowed.",t:"Step through the archway and enter 1300. A ring of tiny houses surrounds a chapel where beguines—religious women living communal life—worked and prayed. It\'s still a neighborhood today, just frozen in time.\",im:\"It\'s 1600. Women in white linen tend gardens between stone cottages. Church bells echo off old brick. No men allowed.\",t:\"Free entry. Begijnhof 34, Centrum. Respect residents—it\'s a real community. Quiet afternoons best. Don\'t photograph people.",c:["history_big", "courtyards", "local_only"],r:"g",nn:"Begijnhof Courtyard",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:2,n:"Amsterdam Museum Hidden Wing",a:"Centrum",v:["hidden", "history"],d:2,s:"The floor nobody sees—street art and counterculture in the museum basement",st:"Slip downstairs past tourists staring at paintings. The basement galleries pulse with punk posters, squat manifestos, and Provo movement ephemera. This is Amsterdam\'s radical heart in cardboard boxes and neon.",im:"It\'s 1965. Student protestors glue posters to canal walls at midnight. The air smells like spray paint and defiance.",t:"Slip downstairs past tourists staring at paintings. The basement galleries pulse with punk posters, squat manifestos, and Provo movement ephemera. This is Amsterdam\'s radical heart in cardboard boxes and neon.\",im:\"It\'s 1965. Student protestors glue posters to canal walls at midnight. The air smells like spray paint and defiance.\",t:\"Amsterdam Museum, Kalverstraat 92. Pay entry fee. Ask staff where the street art collection lives—most visitors never find it.",c:["history_big", "street_art", "local_only"],r:"g",nn:"Amsterdam Museum Hidden Wing",ns:"Kunst die van de muren spreekt en de straat transformeert.",nst:"Kijk omhoog. Kleuren springen eruit. Kunstenaars claim de muren. Gemeenschappen volgen. Het is echt. Het is politiek. Het is levend. Dit is waar de stad zichzelf schildert.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:3,n:"Hofje van Brouwer",a:"Jordaan",v:["hidden", "history", "quiet"],d:3,s:"Courtyards that survived the war intact",st:"Walk through doorways and find chains of hidden courtyards dating to the 1700s. Stone plaques name dead brewers and their families. Gardens grow where workers once lived. The city noise vanishes.",im:"It\'s 1780. A brewer\'s widow tends herb gardens in her personal courtyard. Children play in the center square. No one passes who hasn\'t been invited.",t:"Walk through doorways and find chains of hidden courtyards dating to the 1700s. Stone plaques name dead brewers and their families. Gardens grow where workers once lived. The city noise vanishes.\",im:\"It\'s 1780. A brewer\'s widow tends herb gardens in her personal courtyard. Children play in the center square. No one passes who hasn\'t been invited.\",t:\"Elandsgracht 107-109, Jordaan. Free to enter courtyards. Daytime only. Knock softly if gates are closed.",c:["history_big", "courtyards", "local_only"],r:"g",nn:"Hofje van Brouwer",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:4,n:"NDSM Wharf Squat Evolution",a:"NDSM",v:["history", "weird", "local"],d:4,s:"Shipyard turned artist squatter kingdom turned cultural hub—watch gentrification happen live",st:"Abandoned dry dock. Artists moved in. Squatters built a city inside with galleries, studios, punk bars, and performance spaces. Now it\'s legal and massive. See where counterculture becomes Instagram.",im:"It\'s 1985. Kids in DIY jumpsuits weld metal sculptures. Bands rehearse in rusted hulls. Graffiti covers every surface.",t:"Abandoned dry dock. Artists moved in. Squatters built a city inside with galleries, studios, punk bars, and performance spaces. Now it\'s legal and massive. See where counterculture becomes Instagram.\",im:\"It\'s 1985. Kids in DIY jumpsuits weld metal sculptures. Bands rehearse in rusted hulls. Graffiti covers every surface.\",t:\"NDSM-plein 1, Noord. Free to wander. Live events weekends. Ferry across for free from Amsterdam Central.",c:["street_art", "history_big", "architecture"],r:"g",nn:"NDSM Wharf Squat Evolution",ns:"Kunst die van de muren spreekt en de straat transformeert.",nst:"Kijk omhoog. Kleuren springen eruit. Kunstenaars claim de muren. Gemeenschappen volgen. Het is echt. Het is politiek. Het is levend. Dit is waar de stad zichzelf schildert.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:5,n:"De Tolhuistuin Garden",a:"NDSM",v:["beautiful", "nature", "local", "free"],d:5,s:"Secret garden-theater-cinema hybrid in an old factory",st:"Artists reclaimed a warehouse and built gardens inside. Now strangers grow vegetables, watch films, and eat dinner together in a former industrial ruin. It\'s a community experiment that actually works.",im:"It\'s 2010. Hands in soil planting tomatoes. Sunset over raised beds. Someone\'s cooking outside.",t:"Artists reclaimed a warehouse and built gardens inside. Now strangers grow vegetables, watch films, and eat dinner together in a former industrial ruin. It\'s a community experiment that actually works.\",im:\"It\'s 2010. Hands in soil planting tomatoes. Sunset over raised beds. Someone\'s cooking outside.\",t:\"Tolhuistuin, NDSM-plein 5. Free entry. Open afternoons and evenings. Check website for events. Ferry from Central.",c:["free_museum", "nature", "local_only"],r:"g",nn:"De Tolhuistuin Garden",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:6,n:"Jordaan Neighborhood Hidden Bars",a:"Jordaan",v:["local", "night", "hidden"],d:6,s:"Brown bars where old men have sat in the same chair for 30 years",st:"No signs. No tourists. Walk in and you\'re in someone\'s living room made public. Sawdust on wooden floors. Drinks poured by the owner who knows everyone. These are the bars that survived.",im:"It\'s 1970. Cigarette smoke curls under bare bulbs. A man plays harmonica in the corner. No one\'s made a phone call here in decades.",t:"No signs. No tourists. Walk in and you\'re in someone\'s living room made public. Sawdust on wooden floors. Drinks poured by the owner who knows everyone. These are the bars that survived.\",im:\"It\'s 1970. Cigarette smoke curls under bare bulbs. A man plays harmonica in the corner. No one\'s made a phone call here in decades.\",t:\"Westerstraat area, Jordaan. You won\'t find names. Just walk quiet streets and look for light through old windows. Order a borrel (shot) and a bier (beer).",c:["local_only", "night"],r:"g",nn:"Jordaan Neighborhood Hidden Bars",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:7,n:"Vondelpark Secret Corners",a:"Westerpark",v:["beautiful", "hidden", "quiet", "nature"],d:7,s:"Amphitheater ruins, hidden lakes, and where artists sketch unobserved",st:"Everyone knows Vondelpark. No one knows the wild edges. Overgrown roman-style amphitheater. Ponds where turtles sleep. Meadows where grass grows tall and tourists don\'t venture.",im:"It\'s 1880. Painters set easels where no one watches. A woman rests on stone steps meant for amphitheater crowds that never came.",t:"Everyone knows Vondelpark. No one knows the wild edges. Overgrown roman-style amphitheater. Ponds where turtles sleep. Meadows where grass grows tall and tourists don\'t venture.\",im:\"It\'s 1880. Painters set easels where no one watches. A woman rests on stone steps meant for amphitheater crowds that never came.\",t:\"Vondelpark, Westerpark neighborhood. Free entry. Arrive before 10am to beat crowds. Find the old amphitheater on the eastern edge near Filmmuseum.",c:["beautiful", "nature", "parks"],r:"g",nn:"Vondelpark Secret Corners",ns:"Kunst die van de muren spreekt en de straat transformeert.",nst:"Kijk omhoog. Kleuren springen eruit. Kunstenaars claim de muren. Gemeenschappen volgen. Het is echt. Het is politiek. Het is levend. Dit is waar de stad zichzelf schildert.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:8,n:"Amsterdam Street Art in De Pijp",a:"De Pijp",v:["street_art", "weird", "local"],d:8,s:"Walls exploding with color—De Pijp is the working artist\'s canvas",st:"This neighborhood doesn\'t curate its street art. Real painters work here. You walk past murals becoming legends, tags becoming movements, blank walls becoming galleries overnight. It\'s alive.",im:"It\'s today at 2am. A painter on a ladder, illuminated by phone light, finishing a face that will change the block.",t:"This neighborhood doesn\'t curate its street art. Real painters work here. You walk past murals becoming legends, tags becoming movements, blank walls becoming galleries overnight. It\'s alive.\",im:\"It\'s today at 2am. A painter on a ladder, illuminated by phone light, finishing a face that will change the block.\",t:\"Albert Cuyp Straat and surrounding streets, De Pijp. Walk slowly. New work appears weekly. Saturday market fills Albert Cuyp during day.",c:["street_art", "local_only"],r:"g",nn:"Amsterdam Street Art in De Pijp",ns:"Kunst die van de muren spreekt en de straat transformeert.",nst:"Kijk omhoog. Kleuren springen eruit. Kunstenaars claim de muren. Gemeenschappen volgen. Het is echt. Het is politiek. Het is levend. Dit is waar de stad zichzelf schildert.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:9,n:"Plantage Resistance Museum",a:"Plantage",v:["history", "hidden"],d:9,s:"Where Amsterdam\'s WWII fighters planned in secret",st:"Underground resistance cells met in hidden rooms. In this neighborhood, ordinary people forged documents, hid refugees, and plotted against occupation. The buildings still stand with their secrets.",im:"It\'s 1943. A woman in an ordinary dress enters through a bakery back door carrying false papers sewn into her coat lining.",t:"Underground resistance cells met in hidden rooms. In this neighborhood, ordinary people forged documents, hid refugees, and plotted against occupation. The buildings still stand with their secrets.\",im:\"It\'s 1943. A woman in an ordinary dress enters through a bakery back door carrying false papers sewn into her coat lining.\",t:\"Visit Verzetsmuseum (Resistance Museum) at Plantage Kerklaan 61. Or walk the quiet residential streets where safe houses were marked by tiny chalk symbols.",c:["history_big"],r:"g",nn:"Plantage Resistance Museum",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:10,n:"Anne Frank House Beyond",a:"Plantage",v:["history", "hidden", "quiet"],d:10,s:"The hidden annex was here—but also walk where she walked before hiding",st:"Everyone lines up for the museum. But walk Prinsengracht and you\'re on her last-lived streets. She didn\'t hide when riding her bike here. The neighborhood is the prequel.",im:"It\'s 1940. A girl on a bike rides home from school past these same canal houses, not knowing what\'s coming.",t:"Everyone lines up for the museum. But walk Prinsengracht and you\'re on her last-lived streets. She didn\'t hide when riding her bike here. The neighborhood is the prequel.\",im:\"It\'s 1940. A girl on a bike rides home from school past these same canal houses, not knowing what\'s coming.\",t:\"Prinsengracht 263-267, Plantage. The museum has lines. Skip it and walk the canal at dawn. Quieter and cheaper.",c:["history_big"],r:"g",nn:"Anne Frank House Beyond",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:11,n:"Rembrandt\'s Studio and Neighborhood",a:"Oost",v:["history", "beautiful"],d:11,s:"The golden age preserved in one man\'s old house and all his subjects\' surrounding buildings",st:"Rembrandt lived here, painted here, and went bankrupt here. Walk the neighborhood and see the rich merchants and Jewish families he painted. The people are gone but their houses remain perfect.",im:"It\'s 1650. A merchant\'s daughter climbs stone steps for a sitting. Rembrandt mixes ochre and light. Outside, the city is making fortunes in the Indies trade.",t:"Rembrandt lived here, painted here, and went bankrupt here. Walk the neighborhood and see the rich merchants and Jewish families he painted. The people are gone but their houses remain perfect.\",im:\"It\'s 1650. A merchant\'s daughter climbs stone steps for a sitting. Rembrandt mixes ochre and light. Outside, the city is making fortunes in the Indies trade.\",t:\"Rembrandt House Museum at Sint-Anthonisbreestraat 4. Or just walk Sint-Anthonisbreestraat and Jodenbreestraat. Free to explore outside.",c:["history_big", "architecture"],r:"g",nn:"Rembrandt\'s Studio and Neighborhood",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:12,n:"Windmills of Amsterdam North",a:"Noord",v:["history", "beautiful", "quiet"],d:12,s:"Four ancient windmills still standing, still milling, still creaking like they\'re grinding centuries",st:"Get on the free ferry and cross the Ij. At Zaanse Schans, wooden windmills turn in the wind the way they did 400 years ago. Walk inside one and smell grain dust and oil. Time stops.",im:"It\'s 1750. A miller\'s son learns to read the wind. Sails turn. Grain flows. The river carries boats to the world.",t:"Get on the free ferry and cross the Ij. At Zaanse Schans, wooden windmills turn in the wind the way they did 400 years ago. Walk inside one and smell grain dust and oil. Time stops.\",im:\"It\'s 1750. A miller\'s son learns to read the wind. Sails turn. Grain flows. The river carries boats to the world.\",t:\"Zaanse Schans, Zaandam (north of Amsterdam). Free ferry from Central Station (behind the station). Small fee to enter windmills (€5-7). Walk around free.",c:["history_big", "nature", "architecture"],r:"g",nn:"Windmills of Amsterdam North",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:13,n:"Free Ferry to Noord",a:"Noord",v:["free", "beautiful", "local"],d:13,s:"Best free view of Amsterdam from the water—the 5-minute commute tourists skip",st:"Workers ride this every day. Tourists stay on the south bank. The ferry gives you Amsterdam from the water—canals, spires, light hitting old brick. It\'s free. Most people don\'t know.",im:"It\'s 7am. The city wakes across black water. Bicycles lean against railings. A bell rings.",t:"Workers ride this every day. Tourists stay on the south bank. The ferry gives you Amsterdam from the water—canals, spires, light hitting old brick. It\'s free. Most people don\'t know.\",im:\"It\'s 7am. The city wakes across black water. Bicycles lean against railings. A bell rings.\",t:\"Behind Centraal Station. Three free ferries run all night. Pick any one. Ride both ways for the full effect. Best at sunrise or sunset.",c:["free_museum", "beautiful", "local_only"],r:"g",nn:"Free Ferry to Noord",ns:"Water, bruggen en het hartslag van de stad.",nst:"Bruggen buigen zich over water. Sluizen gaan op en neer. Het is mechanisch en mooi. Bomen wuiven erbovenuit. Locals picknicken op de oevers. Het kanaal ademt. Het leeft.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:14,n:"Bijlmer Murals and Community",a:"Bijlmer",v:["street_art", "local", "weird"],d:14,s:"The neighborhood the city tried to forget—now painting its own story back",st:"High-rise housing meant for cars, not people. It failed and turned into something real—cheap housing for artists and migrants. Now giant murals cover the blocks. It\'s raw and alive.",im:"It\'s 1980. Families look out from cement balconies at a design that doesn\'t work. Artists move in because rent is nothing. They paint the walls.",t:"High-rise housing meant for cars, not people. It failed and turned into something real—cheap housing for artists and migrants. Now giant murals cover the blocks. It\'s raw and alive.\",im:\"It\'s 1980. Families look out from cement balconies at a design that doesn\'t work. Artists move in because rent is nothing. They paint the walls.\",t:\"Bijlmerplein area, Bijlmer neighborhood (south, metro line 50/54). Walk freely. Street art appears constantly. Local cafés welcome curious visitors.",c:["street_art", "local_only"],r:"g",nn:"Bijlmer Murals and Community",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:15,n:"Amstel River Locks and Industrial Past",a:"Oost",v:["history", "hidden", "beautiful"],d:15,s:"Where the city controlled water and commerce for 500 years",st:"Lock keepers operated gates that separated the city from the sea. Watch the locks work. Stand where merchants negotiated tolls. The river still flows the way it always did.",im:"It\'s 1600. A lock keeper winches a gate. A ship loaded with spices waits. The flow of trade depends on this exact moment.",t:"Lock keepers operated gates that separated the city from the sea. Watch the locks work. Stand where merchants negotiated tolls. The river still flows the way it always did.\",im:\"It\'s 1600. A lock keeper winches a gate. A ship loaded with spices waits. The flow of trade depends on this exact moment.\",t:\"Amstel Lock (Amstelsluis), Oost neighborhood near Magere Brug. Free to watch. Locks operate throughout day. Best in early morning when light hits water.",c:["history_big", "architecture"],r:"g",nn:"Amstel River Locks and Industrial Past",ns:"Water, bruggen en het hartslag van de stad.",nst:"Bruggen buigen zich over water. Sluizen gaan op en neer. Het is mechanisch en mooi. Bomen wuiven erbovenuit. Locals picknicken op de oevers. Het kanaal ademt. Het leeft.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:16,n:"Canal Ring Hidden Courtyards",a:"Grachtengordel",v:["hidden", "quiet", "beautiful"],d:16,s:"Behind every elegant facade is a secret garden—and a family still living there",st:"The canal belt looks uniform from the street. But behind each carved door is a courtyard garden, a world hidden from the water. Some are 400 years old. They\'re private but visible if you know where to look.",im:"It\'s 1750. A merchant\'s family takes tea in a hidden garden while the city roars beyond the gates. No one knows they\'re there.",t:"The canal belt looks uniform from the street. But behind each carved door is a courtyard garden, a world hidden from the water. Some are 400 years old. They\'re private but visible if you know where to look.\",im:\"It\'s 1750. A merchant\'s family takes tea in a hidden garden while the city roars beyond the gates. No one knows they\'re there.\",t:\"Walk Herengracht, Keizersgracht, and Prinsengracht. Peek through gates. Some courtyards are semi-public. Ask locals which ones welcome quiet visitors.",c:["courtyards", "hidden", "beautiful"],r:"g",nn:"Canal Ring Hidden Courtyards",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:17,n:"Brouwerij \'t IJ Brewery",a:"Oost",v:["local", "hidden", "free"],d:17,s:"Beer brewed in an old laundry by people who quit their jobs to make it perfect",st:"A tiny brewery in a former steam laundry. The founders walked away from corporate life to brew in defiance. Now people line up. It tastes like rebellion and hops.",im:"It\'s 1985. Two men stand in an industrial kitchen. \'Let\'s make beer.\' No business plan. Just hope.",t:"A tiny brewery in a former steam laundry. The founders walked away from corporate life to brew in defiance. Now people line up. It tastes like rebellion and hops.\",im:\"It\'s 1985. Two men stand in an industrial kitchen. \'Let\'s make beer.\' No business plan. Just hope.\",t:\"Brouwerij \'t IJ, Funenkade 7, Oost. Free to enter taproom. Beer €2-4. Weekends liveliest. Food trucks outside. No reservations.",c:["local_only", "free_museum"],r:"g",nn:"Brouwerij \'t IJ Brewery",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:18,n:"Westerpark Around the Edges",a:"Westerpark",v:["nature", "quiet", "beautiful", "free"],d:18,s:"Park designed by hippies in the 1980s—still feels like a community dream",st:"Grass grows wild in patches. Open-air theater. Sunday markets. Joggers and dogs and people doing nothing. It\'s not manicured. It\'s alive. Kids still climb on the old water tower.",im:"It\'s 1985. Park planners show locals designs. \'Make it for us, not pretty for tourists.\' They listened.",t:"Grass grows wild in patches. Open-air theater. Sunday markets. Joggers and dogs and people doing nothing. It\'s not manicured. It\'s alive. Kids still climb on the old water tower.\",im:\"It\'s 1985. Park planners show locals designs. \'Make it for us, not pretty for tourists.\' They listened.\",t:\"Westerpark, west Amsterdam. Free entry. Markets on summer weekends. Waterside cafés open spring-summer. Playground on north edge.",c:["parks", "nature", "free_museum"],r:"g",nn:"Westerpark Around the Edges",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:19,n:"Mozes en Aäron Church Crypt",a:"Centrum",v:["history", "hidden", "quiet"],d:19,s:"A hidden synagogue inside a church—four centuries of religious sleight of hand",st:"Catholics built a church. Jews built a synagogue inside it. For 200 years, the building looked like one thing from the street and meant another thing inside. It\'s a building that lies beautifully.",im:"It\'s 1750. A Jewish family enters through what looks like a warehouse. Inside, a synagogue with a thousand candles. The priest upstairs knows. Everyone knows. No one says anything.",t:"Catholics built a church. Jews built a synagogue inside it. For 200 years, the building looked like one thing from the street and meant another thing inside. It\'s a building that lies beautifully.\",im:\"It\'s 1750. A Jewish family enters through what looks like a warehouse. Inside, a synagogue with a thousand candles. The priest upstairs knows. Everyone knows. No one says anything.\",t:\"Mozes en Aäronkerk, Jodenbreestraat 2-4, Centrum. Open for visits afternoons. Crypt and synagogue visible. Small donation expected.",c:["history_big", "architecture"],r:"g",nn:"Mozes en Aäron Church Crypt",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:20,n:"Oud-West Food Markets and Community",a:"Oud-West",v:["local", "beautiful", "free"],d:20,s:"Neighborhood where immigrants fed Amsterdam and built something real",st:"Moroccans, Turks, Chinese, Dutch—they all opened restaurants here first. Walk Jan Evertsenstraat and smell fifty cuisines. This is where food culture gets born. Cheap. Real. Alive.",im:"It\'s 1975. A family opens their first restaurant in a small shop. No decor. Just food. People line up.",t:"Moroccans, Turks, Chinese, Dutch—they all opened restaurants here first. Walk Jan Evertsenstraat and smell fifty cuisines. This is where food culture gets born. Cheap. Real. Alive.\",im:\"It\'s 1975. A family opens their first restaurant in a small shop. No decor. Just food. People line up.\",t:\"Jan Evertsenstraat, Oud-West. Walk from morning through evening. Food markets. Small shops. No tourist crowds. Everything under €10.",c:["local_only", "free_museum"],r:"g",nn:"Oud-West Food Markets and Community",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:21,n:"Kinkerstraat Gallery Row",a:"Oud-West",v:["street_art", "local", "beautiful"],d:21,s:"Where independent artists prove you don\'t need a gallery to be seen",st:"Small storefronts became artist studios. No commissions. No gatekeepers. Just work you can see from the street. Every storefront window is a different world.",im:"It\'s 2005. An artist claims an empty shopfront. No rent. Just work. Windows draw crowds.",t:"Small storefronts became artist studios. No commissions. No gatekeepers. Just work you can see from the street. Every storefront window is a different world.\",im:\"It\'s 2005. An artist claims an empty shopfront. No rent. Just work. Windows draw crowds.\",t:\"Kinkerstraat, Oud-West. Free to walk and look. Stores closed Mondays. Most active late afternoon-evening.",c:["street_art", "local_only", "free_museum"],r:"g",nn:"Kinkerstraat Gallery Row",ns:"Kunst die van de muren spreekt en de straat transformeert.",nst:"Kijk omhoog. Kleuren springen eruit. Kunstenaars claim de muren. Gemeenschappen volgen. Het is echt. Het is politiek. Het is levend. Dit is waar de stad zichzelf schildert.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:22,n:"Amstelveen Canal Towns",a:"Amstelveen",v:["beautiful", "quiet", "history", "local"],d:22,s:"Villages that resisted becoming Amsterdam—narrow streets, old mills, family farms still operating",st:"Half hour south, the Amstel widens into farms and tiny villages. Aalsmeerdijk has flower markets. Nes an Ij has a 400-year-old village feel. It\'s like Amsterdam before Amsterdam.",im:"It\'s 1850. Farmers gather cows on village green. A mill grinds. Nothing has changed in 200 years. Nothing will for 100 more.",t:"Half hour south, the Amstel widens into farms and tiny villages. Aalsmeerdijk has flower markets. Nes an Ij has a 400-year-old village feel. It\'s like Amsterdam before Amsterdam.\",im:\"It\'s 1850. Farmers gather cows on village green. A mill grinds. Nothing has changed in 200 years. Nothing will for 100 more.\",t:\"Aalsmeerdijk and Nes an Ij, south of Amsterdam. Bike or bus (bus 50 from Amsterdam). Bike rental (€5/day). Riverside cafés.",c:["nature", "history_big", "beautiful"],r:"g",nn:"Amstelveen Canal Towns",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:23,n:"Prinsengracht Sunday Market",a:"Grachtengordel",v:["local", "beautiful", "free"],d:23,s:"Book market on a canal—where Amsterdam\'s readers have shopped for 50 years",st:"Summer Sundays. Books spread across tables beside the water. Old editions. First prints. People in deck chairs reading newly-bought books by the canal. It\'s Dutch life at its most peaceful.",im:"It\'s 1980. A man browses a table while swans pass. A woman reads the book she just bought. Sun hits old brick.",t:"Summer Sundays. Books spread across tables beside the water. Old editions. First prints. People in deck chairs reading newly-bought books by the canal. It\'s Dutch life at its most peaceful.\",im:\"It\'s 1980. A man browses a table while swans pass. A woman reads the book she just bought. Sun hits old brick.\",t:\"Prinsengracht (between Runstraat and Lijnbaansgracht), Sundays April-November. Free to walk and browse. No pressure to buy.",c:["free_museum", "beautiful", "local_only"],r:"g",nn:"Prinsengracht Sunday Market",ns:"Water, bruggen en het hartslag van de stad.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:24,n:"Hanbury Brown and Tweed Building",a:"Oost",v:["history", "weird", "hidden"],d:24,s:"A building designed for one impossible purpose—turning wheat into beer without steam",st:"Hanbury Brown designed a mill that used gravity and wind alone. It never worked as planned. Now it\'s a silent monument to beautiful failure in the industrial east.",im:"It\'s 1920. Engineers study designs. \'Will it work?\' \'Maybe.\' They build anyway.",t:"Hanbury Brown designed a mill that used gravity and wind alone. It never worked as planned. Now it\'s a silent monument to beautiful failure in the industrial east.\",im:\"It\'s 1920. Engineers study designs. \'Will it work?\' \'Maybe.\' They build anyway.\",t:\"Entrepotdok area, Oost. Walk around the outside. Industrial architecture open to observation. Best light in early morning.",c:["architecture", "history_big"],r:"g",nn:"Hanbury Brown and Tweed Building",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:25,n:"Floating Gardens of the Eastern Docks",a:"Oost",v:["beautiful", "nature", "hidden", "quiet"],d:25,s:"Houseboats with real gardens—people living on water and growing food",st:"Along the eastern docks, houseboats have gardens. Tomatoes grow on decks. Herbs spread in boxes. It\'s a neighborhood that chose to float. Weather moves them daily but roots stay.",im:"It\'s dawn. A woman waters herbs on her houseboat deck. The city is silent across the water. This is her garden, her kitchen, her home.",t:"Along the eastern docks, houseboats have gardens. Tomatoes grow on decks. Herbs spread in boxes. It\'s a neighborhood that chose to float. Weather moves them daily but roots stay.\",im:\"It\'s dawn. A woman waters herbs on her houseboat deck. The city is silent across the water. This is her garden, her kitchen, her home.\",t:\"Entrepotdok and surrounding water streets, Oost. Walk the docks early morning. Respect private boats. No entry onto boats.",c:["nature", "beautiful", "local_only"],r:"g",nn:"Floating Gardens of the Eastern Docks",ns:"Water, bruggen en het hartslag van de stad.",nst:"Bruggen buigen zich over water. Sluizen gaan op en neer. Het is mechanisch en mooi. Bomen wuiven erbovenuit. Locals picknicken op de oevers. Het kanaal ademt. Het leeft.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:26,n:"Cafe de Jaren Library-Terrace",a:"Centrum",v:["quiet", "beautiful", "hidden", "local"],d:26,s:"A library cafe with a secret upper terrace where daylight stops time",st:"Climb stairs in a small cafe and find a massive library with a hidden terrace. Sun breaks through glass. Books line walls. You can disappear here for hours.",im:"It\'s 2pm. A student finds the terrace. Sunlight. Quiet. The city vanishes below.",t:"Climb stairs in a small cafe and find a massive library with a hidden terrace. Sun breaks through glass. Books line walls. You can disappear here for hours.\",im:\"It\'s 2pm. A student finds the terrace. Sunlight. Quiet. The city vanishes below.\",t:\"Cafe de Jaren, Anjeliersstraat 34, Centrum. Coffee €3-5. Entry free (buy something small). Terrace overlooked by tourists.",c:["quiet", "local_only", "beautiful"],r:"g",nn:"Cafe de Jaren Library-Terrace",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:27,n:"Biblioteca Nacional Hidden Reading Rooms",a:"Plantage",v:["hidden", "quiet", "history"],d:27,s:"Reading rooms where scholars still work as if the world didn\'t change",st:"Inside the old library building are quiet rooms where old Amsterdam readers still come. Dust on shelves. Silence absolute. It\'s a room preserved from the 1920s.",im:"It\'s 1925. Scholars in long coats read by window light. A librarian marks a card. No sound. No rush.",t:"Inside the old library building are quiet rooms where old Amsterdam readers still come. Dust on shelves. Silence absolute. It\'s a room preserved from the 1920s.\",im:\"It\'s 1925. Scholars in long coats read by window light. A librarian marks a card. No sound. No rush.\",t:\"Library locations require visiting. Check current opening. Most are Centrum or Plantage. Photography usually forbidden. Respect silence.",c:["history_big", "quiet", "local_only"],r:"g",nn:"Biblioteca Nacional Hidden Reading Rooms",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:28,n:"Magere Brug (Skinny Bridge) at Dusk",a:"Oost",v:["beautiful", "quiet", "romantic_water"],d:28,s:"A footbridge so narrow two people must turn sideways—built 350 years ago and still elegant",st:"White drawbridge lit with 1,400 light bulbs at night. It\'s thin enough to make you careful. Boats pass under. Swans pass beneath. The geometry is perfect.",im:"It\'s 1670. Two people on the bridge step aside for a boat. They touch hands in the space. The bridge was built for moments like this.",t:"White drawbridge lit with 1,400 light bulbs at night. It\'s thin enough to make you careful. Boats pass under. Swans pass beneath. The geometry is perfect.\",im:\"It\'s 1670. Two people on the bridge step aside for a boat. They touch hands in the space. The bridge was built for moments like this.\",t:\"Magere Brug, spanning Amstel between Kerkstraat and Nieuwe Prinsengracht. Best at dusk. Walk both ways. Free.",c:["beautiful", "romantic_water", "architecture"],r:"g",nn:"Magere Brug (Skinny Bridge) at Dusk",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:29,n:"Tropenmuseum Exterior Worlds",a:"Oost",v:["beautiful", "history", "hidden"],d:29,s:"Colonial architecture that\'s now a museum about why colonialism was wrong—walk outside and feel the contradiction",st:"Building designed as a palace of stolen goods. The exterior is spectacular—tropical gardens, arches, light. Now it explains colonialism\'s violence. The contradiction is the point.",im:"It\'s 1920. A ship unloads silks and spices into this palace. It\'s called progress. It\'s called theft.",t:"Building designed as a palace of stolen goods. The exterior is spectacular—tropical gardens, arches, light. Now it explains colonialism\'s violence. The contradiction is the point.\",im:\"It\'s 1920. A ship unloads silks and spices into this palace. It\'s called progress. It\'s called theft.\",t:\"Tropenmuseum, Linnaeusstraat 2, Oost. Exterior and gardens free to photograph. Entry fee for museum. Grounds open and public.",c:["architecture", "history_big"],r:"g",nn:"Tropenmuseum Exterior Worlds",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:30,n:"Oost Market Days",a:"Oost",v:["local", "beautiful", "free"],d:30,s:"Neighborhood markets where actual residents buy food from actual farmers",st:"Albert Cuyp Market and smaller neighborhood markets. Vendors know repeat customers by name. It\'s not a tourist show. It\'s how people feed themselves.",im:"It\'s Saturday morning. A woman buys from the same cheese seller for 20 years. They talk about families. The market is a gathering.",t:"Albert Cuyp Market and smaller neighborhood markets. Vendors know repeat customers by name. It\'s not a tourist show. It\'s how people feed themselves.\",im:\"It\'s Saturday morning. A woman buys from the same cheese seller for 20 years. They talk about families. The market is a gathering.\",t:\"Albert Cuyp Straat (Albert Cuyp Market), Oost. Daily March-November. Free to walk. Cheapest in morning around 11am. No pressure to buy.",c:["local_only", "free_museum"],r:"g",nn:"Oost Market Days",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:31,n:"Ndsm Windmill Fortress",a:"Noord",v:["history", "architecture", "hidden"],d:31,s:"A 500-year-old windmill that was also a fortress—still turning in the wind",st:"Before factories, this mill defended Amsterdam. Sails turned. Cannons sat ready. Now it turns grain again. The layers of history are carved into its wood.",im:"It\'s 1600. Soldiers load cannons. The mill turns. It\'s both survival and livelihood.",t:"Before factories, this mill defended Amsterdam. Sails turned. Cannons sat ready. Now it turns grain again. The layers of history are carved into its wood.\",im:\"It\'s 1600. Soldiers load cannons. The mill turns. It\'s both survival and livelihood.\",t:\"De Gooyer Windmill, Funenkade 5, Noord. Free ferry from Central. External tours free. Internal tours small fee (€3-5).",c:["history_big", "architecture"],r:"g",nn:"Ndsm Windmill Fortress",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:32,n:"Bleecker Street Squatter History",a:"De Pijp",v:["history", "local", "weird"],d:32,s:"The street where squatters fought the city and won—making affordable housing real",st:"In the 1980s, kids took empty buildings. City tried to evict. Protests happened here. Some squats became legal cooperatives. Walk it and see alternative housing working.",im:"It\'s 1980. Kids occupy an empty house. Police surround it. A photographer documents resistance. The house will still be a home 40 years later.",t:"In the 1980s, kids took empty buildings. City tried to evict. Protests happened here. Some squats became legal cooperatives. Walk it and see alternative housing working.\",im:\"It\'s 1980. Kids occupy an empty house. Police surround it. A photographer documents resistance. The house will still be a home 40 years later.\",t:\"Walk streets around Bleecker/De Pijp area. Squatter heritage painted on walls. Several original squats now legal cooperatives.",c:["history_big", "local_only"],r:"g",nn:"Bleecker Street Squatter History",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:33,n:"Sint-Pancratiuskerk in Dusk",a:"Centrum",v:["beautiful", "quiet", "history"],d:33,s:"A church from 1885 that let go of God and became a gym with original stained glass still glowing",st:"Pink brick church. Twenty meters high. Now it\'s Amsterdam\'s most beautiful fitness center. People do yoga under stained glass that cost fortunes 150 years ago.",im:"It\'s 1890. Light breaks through colored glass onto wooden floors. A priest walks in silence. Now dumbbells clang. The light doesn\'t judge.",t:"Pink brick church. Twenty meters high. Now it\'s Amsterdam\'s most beautiful fitness center. People do yoga under stained glass that cost fortunes 150 years ago.\",im:\"It\'s 1890. Light breaks through colored glass onto wooden floors. A priest walks in silence. Now dumbbells clang. The light doesn\'t judge.\",t:\"Sint-Pancratiuskerk, Sarphatipark 25, Centrum. Outside free to see (especially at dusk). Entry requires gym membership or day pass (€15-20).",c:["architecture", "beautiful", "history_big"],r:"g",nn:"Sint-Pancratiuskerk in Dusk",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:34,n:"Rembrandtplein Hidden Courtyard",a:"Centrum",v:["hidden", "quiet", "beautiful"],d:34,s:"Right in the tourist square sits a perfectly preserved 1800s courtyard nobody knows about",st:"The square is packed. But behind one facade is a working neighborhood courtyard from the 1800s. Residents still live there. It\'s a pocket of peace in chaos.",im:"It\'s 1850. Families gather in their courtyard while the market outside trades fortunes. They know nothing of what\'s beyond their gates.",t:"The square is packed. But behind one facade is a working neighborhood courtyard from the 1800s. Residents still live there. It\'s a pocket of peace in chaos.\",im:\"It\'s 1850. Families gather in their courtyard while the market outside trades fortunes. They know nothing of what\'s beyond their gates.\",t:\"Rembrandtplein area. Look for unmarked gates. Some courtyards semi-accessible. Respect residents. Quiet hours observed.",c:["courtyards", "hidden", "beautiful"],r:"g",nn:"Rembrandtplein Hidden Courtyard",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:35,n:"Jewish Quarter Walking the Ghosts",a:"Centrum",v:["history", "quiet", "hidden"],d:35,s:"Narrow streets where 120,000 Jews lived and 100,000 didn\'t return—walk and remember",st:"Jodenbreestraat and surroundings. Street plaques mark deportations. Buildings stand empty where families lived. The quietness is the point. Empty buildings are monuments.",im:"It\'s 1940. Neighbors become strangers. Doors are locked. Possessions inventoried. Streets that thrived for 300 years empty in weeks.",t:"Jodenbreestraat and surroundings. Street plaques mark deportations. Buildings stand empty where families lived. The quietness is the point. Empty buildings are monuments.\",im:\"It\'s 1940. Neighbors become strangers. Doors are locked. Possessions inventoried. Streets that thrived for 300 years empty in weeks.\",t:\"Walk Jodenbreestraat and Mozes en Aäronkerk area. Portuguese Synagogue open for visits. Respectful silence expected. Several memorial plaques on streets.",c:["history_big", "quiet"],r:"g",nn:"Jewish Quarter Walking the Ghosts",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:36,n:"Sloterdijk Industrial Museum Trail",a:"Oud-West",v:["history", "architecture", "hidden"],d:36,s:"Where Amsterdam made things—factories turned to design studios, steam to sunlight",st:"This neighborhood industrialized the city. Bread factories. Clothing sweatshops. Printing presses. Now artists fill the same buildings. You see both eras layered.",im:"It\'s 1920. Smoke pours from brick smokestacks. Workers punch in. Now silence and light. Same building. Different dream.",t:"This neighborhood industrialized the city. Bread factories. Clothing sweatshops. Printing presses. Now artists fill the same buildings. You see both eras layered.\",im:\"It\'s 1920. Smoke pours from brick smokestacks. Workers punch in. Now silence and light. Same building. Different dream.\",t:\"Westerpark and Sloterdijk area. Walk streets independently. Some buildings open for studio tours on weekends. Check local event calendars.",c:["history_big", "architecture"],r:"g",nn:"Sloterdijk Industrial Museum Trail",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:37,n:"Pancake Houses Hidden in Plain Sight",a:"Jordaan",v:["local", "free", "hidden"],d:37,s:"Dutch grandmothers cooking from tiny kitchens—pancakes that are art",st:"Tucked in quiet neighborhoods are one-room restaurants cooking Dutch pancakes. 4 tables. 1 cook. Ingredients known for 40 years. It\'s home food. Cheap. Real.",im:"It\'s 1980. A woman cooks for the same 20 people who\'ve come every Friday for 20 years. She knows each person\'s preference.",t:"Tucked in quiet neighborhoods are one-room restaurants cooking Dutch pancakes. 4 tables. 1 cook. Ingredients known for 40 years. It\'s home food. Cheap. Real.\",im:\"It\'s 1980. A woman cooks for the same 20 people who\'ve come every Friday for 20 years. She knows each person\'s preference.\",t:\"Various pancake houses in Jordaan and Oud-West. Walk and look for small doorways with warm light. No names usually. Budget €5-8 per meal.",c:["local_only", "free_museum"],r:"g",nn:"Pancake Houses Hidden in Plain Sight",ns:"Kunst die van de muren spreekt en de straat transformeert.",nst:"Kijk omhoog. Kleuren springen eruit. Kunstenaars claim de muren. Gemeenschappen volgen. Het is echt. Het is politiek. Het is levend. Dit is waar de stad zichzelf schildert.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:38,n:"Hidden Roof Gardens",a:"Centrum",v:["hidden", "beautiful", "quiet"],d:38,s:"Amsterdam grows upward where tourists don\'t look—roofs with gardens and views",st:"Climb stairs in unmarked buildings and find rooftops blooming. People sun. Gardens grow. The city falls away below. It\'s impossible to find unless you\'re invited.",im:"It\'s summer. A woman climbs to her roof garden above the street noise. Tomatoes grow. She drinks wine overlooking the city\'s real life.",t:"Climb stairs in unmarked buildings and find rooftops blooming. People sun. Gardens grow. The city falls away below. It\'s impossible to find unless you\'re invited.\",im:\"It\'s summer. A woman climbs to her roof garden above the street noise. Tomatoes grow. She drinks wine overlooking the city\'s real life.\",t:\"Ask locals about roof parties. Join if invited. Respect private property. Best in summer evenings. Many rooftop bars have free entry before 9pm.",c:["hidden", "beautiful", "nature"],r:"g",nn:"Hidden Roof Gardens",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:39,n:"Music Museums Outside of Fame",a:"Plantage",v:["history", "hidden", "quiet"],d:39,s:"Where classical instruments are built and played in rooms nobody visits",st:"Small workshop museums show how harpsichords and violins are made. Silent rooms with tools unchanged for 300 years. Musicians still practice here.",im:"It\'s 1750. A craftsman shapes wood into a violin that will outlive him by 200 years. His hands know the secret.",t:"Small workshop museums show how harpsichords and violins are made. Silent rooms with tools unchanged for 300 years. Musicians still practice here.\",im:\"It\'s 1750. A craftsman shapes wood into a violin that will outlive him by 200 years. His hands know the secret.\",t:\"Various music museums in Plantage area. Check Amsterdam Museum guide for workshop addresses. Quiet afternoons best. Appointment often required.",c:["history_big", "quiet", "local_only"],r:"g",nn:"Music Museums Outside of Fame",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:40,n:"Amsterdam\'s Free Ferry Loop",a:"Noord",v:["free", "beautiful", "local"],d:40,s:"Ride free across the city\'s best water view—skip the canal tours, ride with workers",st:"Three ferries run free behind Central Station. Workers ride them daily. Tourists rent boats. Locals know the ferries are better—closer, free, real.",im:"It\'s 7am. A worker boards the ferry with coffee. The Ij opens up. Light hits old Amsterdam. It\'s free and nobody notices.",t:"Three ferries run free behind Central Station. Workers ride them daily. Tourists rent boats. Locals know the ferries are better—closer, free, real.\",im:\"It\'s 7am. A worker boards the ferry with coffee. The Ij opens up. Light hits old Amsterdam. It\'s free and nobody notices.\",t:\"Behind Centraal Station. Three routes (IJ, Tolhuisbrug, Amsterdam Noord). All free. All day and night. Ride during rush hour to feel real city.",c:["free_museum", "beautiful", "local_only"],r:"g",nn:"Amsterdam\'s Free Ferry Loop",ns:"Water, bruggen en het hartslag van de stad.",nst:"Bruggen buigen zich over water. Sluizen gaan op en neer. Het is mechanisch en mooi. Bomen wuiven erbovenuit. Locals picknicken op de oevers. Het kanaal ademt. Het leeft.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:41,n:"Vondelpark Outdoor Theater",a:"Westerpark",v:["beautiful", "free", "local", "night"],d:41,s:"Open-air theater under stars—Shakespeare for free on summer nights",st:"June-August. Theater groups perform under the sky. Grass audience. Free or tiny entry. It\'s Amsterdam theater the way it should be—accessible, outside, communal.",im:"It\'s a summer night. Actors perform on a stage surrounded by grass and stars. Hundreds of strangers become one audience.",t:"June-August. Theater groups perform under the sky. Grass audience. Free or tiny entry. It\'s Amsterdam theater the way it should be—accessible, outside, communal.\",im:\"It\'s a summer night. Actors perform on a stage surrounded by grass and stars. Hundreds of strangers become one audience.\",t:\"Vondelpark, various locations in park. Check website for schedule April-September. Many events free or €5-10. Bring blanket.",c:["free_museum", "beautiful", "night", "parks"],r:"g",nn:"Vondelpark Outdoor Theater",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:42,n:"Begijnhof Garden in April",a:"Centrum",v:["beautiful", "quiet", "history"],d:42,s:"Medieval courtyard where 17th-century flowers still bloom in precise geometric patterns",st:"Spring brings the courtyard garden to life. Tulips in neat lines. Residents tend them. The garden is 400 years old. The bulbs get replanted every year in the same order.",im:"It\'s 1650. A woman plants tulips in a geometric design. She\'ll do this for 50 years. Her daughter will do it for 50 more. Pattern continues.",t:"Spring brings the courtyard garden to life. Tulips in neat lines. Residents tend them. The garden is 400 years old. The bulbs get replanted every year in the same order.\",im:\"It\'s 1650. A woman plants tulips in a geometric design. She\'ll do this for 50 years. Her daughter will do it for 50 more. Pattern continues.\",t:\"Begijnhof 34, Centrum. Free entry to courtyard. Best in April-May for flowers. Daytime only. Respect residents in quiet area.",c:["beautiful", "courtyards", "history_big"],r:"g",nn:"Begijnhof Garden in April",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:43,n:"Nes Street Theater District",a:"Centrum",v:["local", "night", "hidden"],d:43,s:"Amsterdam\'s theater street—tiny stages crammed between tourists and locals living theater",st:"Nes Street is packed with small theaters. No big productions. Experimental work. Amsterdam\'s artists cut teeth here. Walk and see a poster that interests you.",im:"It\'s 9pm. An actor takes a stage the size of a living room. 30 people watch. The work is real and the stakes feel enormous in this intimate space.",t:"Nes Street is packed with small theaters. No big productions. Experimental work. Amsterdam\'s artists cut teeth here. Walk and see a poster that interests you.\",im:\"It\'s 9pm. An actor takes a stage the size of a living room. 30 people watch. The work is real and the stakes feel enormous in this intimate space.\",t:\"Nes Street, Centrum. Walk through. Posters advertise nightly shows. Tickets €5-15. Most shows 8-10pm. January-December year-round.",c:["local_only", "night"],r:"g",nn:"Nes Street Theater District",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:44,n:"NDSM Ferries and the North Crossing",a:"Noord",v:["beautiful", "free", "history"],d:44,s:"Free ferry across the widest water in the city—watch Amsterdam from the perspective it was built on",st:"The Ij was the city\'s frontier. Cross it free on a working ferry. From the water, see how Amsterdam oriented around water trade. You\'re riding history.",im:"It\'s 1600. A merchant ferry crosses. Cargo boats. Fishing boats. The city rises on both sides. Water is the city.",t:"The Ij was the city\'s frontier. Cross it free on a working ferry. From the water, see how Amsterdam oriented around water trade. You\'re riding history.\",im:\"It\'s 1600. A merchant ferry crosses. Cargo boats. Fishing boats. The city rises on both sides. Water is the city.\",t:\"NDSM Ferry, leaves from Centraal Station (10-minute ride, all day). Free. No reservation needed. Best at sunrise or sunset.",c:["free_museum", "beautiful", "history_big"],r:"g",nn:"NDSM Ferries and the North Crossing",ns:"Water, bruggen en het hartslag van de stad.",nst:"Bruggen buigen zich over water. Sluizen gaan op en neer. Het is mechanisch en mooi. Bomen wuiven erbovenuit. Locals picknicken op de oevers. Het kanaal ademt. Het leeft.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:45,n:"Breitner Museum",a:"Westerpark",v:["history", "hidden", "quiet"],d:45,s:"A painter\'s studio frozen in time—tools exactly where he left them in 1923",st:"George Hendrik Breitner painted Amsterdam from his window. His studio is unchanged. Paintings on walls. Canvas stretchers. Palettes with old paint. He just stepped out.",im:"It\'s 1923. A painter steps away from his canvas. He\'ll return tomorrow. He doesn\'t. A century passes. The room waits.",t:"George Hendrik Breitner painted Amsterdam from his window. His studio is unchanged. Paintings on walls. Canvas stretchers. Palettes with old paint. He just stepped out.\",im:\"It\'s 1923. A painter steps away from his canvas. He\'ll return tomorrow. He doesn\'t. A century passes. The room waits.\",t:\"Breitner Museum, Herengracht 686, Westerpark. Check hours (often limited). Appointment sometimes required. Photography forbidden. Small entry fee.",c:["history_big", "quiet", "local_only"],r:"g",nn:"Breitner Museum",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:46,n:"Jordaan Jazz Basements",a:"Jordaan",v:["night", "local", "hidden"],d:46,s:"Jazz played in basement bars where nobody knows your name—which is the point",st:"Descend unmarked stairs into rooms where live jazz means something. Tight spaces. Volume cranked. Musicians who care. Tourists rarely find these.",im:"It\'s midnight. Three musicians play in a room 3 meters wide. 20 people watch. The music is so close you\'re part of the band.",t:"Descend unmarked stairs into rooms where live jazz means something. Tight spaces. Volume cranked. Musicians who care. Tourists rarely find these.\",im:\"It\'s midnight. Three musicians play in a room 3 meters wide. 20 people watch. The music is so close you\'re part of the band.\",t:\"Jordaan area, various small bars. Ask locals for names. Most don\'t advertise. Cover small (€5-10). Drinks normal prices. Shows 9pm-1am.",c:["local_only", "night"],r:"g",nn:"Jordaan Jazz Basements",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:47,n:"Botanical Garden Greenhouse Heat",a:"Plantage",v:["beautiful", "nature", "quiet"],d:47,s:"Walk from Amsterdam cold into a tropical jungle—plants from the Indies still growing",st:"The greenhouses hold plants brought from Amsterdam\'s colonial empire. Orchids. Palms. Humid air. You\'re in another climate inside glass. It\'s strange and beautiful.",im:"It\'s 1800. A gardener tends plants from a world away. These specimens cost fortunes. They\'re proof of empire.",t:"The greenhouses hold plants brought from Amsterdam\'s colonial empire. Orchids. Palms. Humid air. You\'re in another climate inside glass. It\'s strange and beautiful.\",im:\"It\'s 1800. A gardener tends plants from a world away. These specimens cost fortunes. They\'re proof of empire.\",t:\"Hortus Botanicus, Plantage Middenlaan 2, Plantage. Entry fee (€8-10). Greenhouses warm and humid. Hours 10am-5pm (closed winter mornings).",c:["beautiful", "nature", "parks"],r:"g",nn:"Botanical Garden Greenhouse Heat",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:48,n:"Warehouse Rave Culture Memory",a:"Oost",v:["history", "weird", "local"],d:48,s:"Where underground dance culture was born in the 1980s—before it was cool, before it was crowds",st:"Industrial spaces near the docks hosted illegal raves. Ten thousand kids dancing to new music with no name yet. Police came. They kept going. Amsterdam became dance culture capital.",im:"It\'s 3am in 1985. A warehouse echoes with electronic sound nobody\'s made before. Kids from everywhere dance in darkness and light. This is the future being invented.",t:"Industrial spaces near the docks hosted illegal raves. Ten thousand kids dancing to new music with no name yet. Police came. They kept going. Amsterdam became dance culture capital.\",im:\"It\'s 3am in 1985. A warehouse echoes with electronic sound nobody\'s made before. Kids from everywhere dance in darkness and light. This is the future being invented.\",t:\"Various locations in Oost/east. Most sites are now regular venues or housing. Walk near Zuidas and Port areas for warehouse-era architecture. History lives in building shells.",c:["history_big", "weird", "local_only"],r:"g",nn:"Warehouse Rave Culture Memory",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:49,n:"Cheese and Market Culture",a:"Jordaan",v:["local", "beautiful", "free"],d:49,s:"Where Dutch cheese tradition lives in shopkeepers\' hands and grandmothers\' recipes",st:"Cheese shops in Jordaan unchanged since the 1950s. Sellers know their inventory like family. They\'ll cut you a wedge and tell you stories. You\'re not buying cheese, you\'re inheriting knowledge.",im:"It\'s 1960. A man inherits his father\'s cheese shop. He\'ll teach his son exactly what his father taught him. Knowledge flows like milk through generations.",t:"Cheese shops in Jordaan unchanged since the 1950s. Sellers know their inventory like family. They\'ll cut you a wedge and tell you stories. You\'re not buying cheese, you\'re inheriting knowledge.\",im:\"It\'s 1960. A man inherits his father\'s cheese shop. He\'ll teach his son exactly what his father taught him. Knowledge flows like milk through generations.\",t:\"Cheese Row (near Prinsengracht), Jordaan. Open weekdays. Walk and ask questions. Sellers love talking. Most pieces €3-8. Free tastings often given.",c:["local_only", "beautiful"],r:"g",nn:"Cheese and Market Culture",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:50,n:"Amsterdam Museum\'s Permanent Amsterdam",a:"Centrum",v:["history", "hidden", "local"],d:50,s:"The city\'s own archive—what Amsterdam keeps in the basement and only shows to people who ask",st:"Behind the main museum is storage. Maps from 1500. Personal objects from regular people. Street photos from every era. You\'re seeing the city\'s DNA.",im:"It\'s 1600. Someone draws a map. They die. The map survives. It becomes proof that their Amsterdam existed.",t:"Behind the main museum is storage. Maps from 1500. Personal objects from regular people. Street photos from every era. You\'re seeing the city\'s DNA.\",im:\"It\'s 1600. Someone draws a map. They die. The map survives. It becomes proof that their Amsterdam existed.\",t:\"Amsterdam Museum, Kalverstraat 92. Basement tours by request. Standard entry covers them. Hours 10am-5pm daily. Ask staff about storage access.",c:["history_big", "local_only"],r:"g",nn:"Amsterdam Museum\'s Permanent Amsterdam",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:51,n:"Zeedijk Historic Street Patience",a:"Centrum",v:["history", "beautiful", "quiet"],d:51,s:"The oldest street in Amsterdam where medieval walls still stand 700 years later",st:"Zeedijk is the seawall that started everything. Walls are original. Buildings replaced but foundations stayed. Walk it and you\'re walking the city\'s first defense against drowning.",im:"It\'s 1400. A dike keeper walks along the seawall. Water presses hard. The barrier holds. Tomorrow he\'ll check it again. It always holds.",t:"Zeedijk is the seawall that started everything. Walls are original. Buildings replaced but foundations stayed. Walk it and you\'re walking the city\'s first defense against drowning.\",im:\"It\'s 1400. A dike keeper walks along the seawall. Water presses hard. The barrier holds. Tomorrow he\'ll check it again. It always holds.\",t:\"Zeedijk, Centrum. Walk its length. Early morning best. Portuguese synagogue at number 74. Still looks medieval if you ignore modern storefronts.",c:["history_big", "architecture", "beautiful"],r:"g",nn:"Zeedijk Historic Street Patience",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:52,n:"Giethoorn Day Trip Water Village",a:"Amstelveen",v:["beautiful", "quiet", "nature", "hidden"],d:52,s:"The Venice-of-the-North built by monks—bike to a place where cars never arrived",st:"45 minutes by train. A village built on water where monks dug channels. Now it\'s farmland and water. Bikes rent for €5. You glide silent through 800 years.",im:"It\'s 1200. Monks dig channels between farms. Water becomes transportation. The village grows without roads. This works.",t:"45 minutes by train. A village built on water where monks dug channels. Now it\'s farmland and water. Bikes rent for €5. You glide silent through 800 years.\",im:\"It\'s 1200. Monks dig channels between farms. Water becomes transportation. The village grows without roads. This works.\",t:\"Train to Steenwijk (45 min from Central), then bus to Giethoorn (20 min). Bike rental at station (€5-8). Lunch spots scattered. Return by 5pm.",c:["beautiful", "nature", "quiet"],r:"g",nn:"Giethoorn Day Trip Water Village",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
  {id:53,n:"Stadsarchief Hidden Treasures",a:"Centrum",v:["history", "hidden", "quiet"],d:53,s:"The city archive where personal letters from 400 years ago sit in climate-controlled silence",st:"Love letters. Business notes. Divorce papers. Threat letters. Amsterdam\'s entire emotional life preserved. You can request to view them. Sit with strangers\' intimacy.",im:"It\'s 1650. A woman writes in anger to a man who wronged her. She seals it. It arrives. His response survives. Now you read it, 370 years later.",t:"Love letters. Business notes. Divorce papers. Threat letters. Amsterdam\'s entire emotional life preserved. You can request to view them. Sit with strangers\' intimacy.\",im:\"It\'s 1650. A woman writes in anger to a man who wronged her. She seals it. It arrives. His response survives. Now you read it, 370 years later.\",t:\"Stadsarchief Amsterdam, Vijzelstraat 32, Centrum. Free entry. View collections by request (need ID). Hours 10am-5pm. Photography forbidden.",c:["history_big", "quiet"],r:"g",nn:"Stadsarchief Hidden Treasures",ns:"Een authentieke plek waar locals werkelijk thuiskomen.",nst:"Dit is waar authenticiteit volhoudt. Waar locals werkelijk komen. Waar geschiedenis nog steeds lucht geeft. Waar tradities zich mengen met moderniteit. Dit is waar het leven echt gebeurt.",nt:"Neem de tijd om rond te wandelen. Let op details. Spreek met locals als ze open staan. Respecteer de ruimten. Bezoek zonder je telefoon. De ochtend is beter dan de middag. Weekends veranderen de sfeer. Kom met water en goede schoenen."},
