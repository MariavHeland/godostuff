  {id:121,n:"Marineterrein Wild Swimming",a:"Oost",v:["hidden","nature"],d:25,s:"Former naval base where locals swim year-round.",st:"Clean water, accessible ladders, and a thriving year-round wild swimming community in a converted naval base. This is where real Amsterdammers test themselves against the cold IJ.",im:"Jump in from wooden jetties into pristine water with the city skyline at your back.",t:"Go early morning at 6am in winter for solitude. Check water quality at zwemwater.nl.",c:["swimming"],r:"g",nn:"Marineterrein zwemmen",ns:"Voormalige marinebasis waar locals het hele jaar zwemmen.",nst:"Schoon water, toegankelijke ladders en een bloeiende gemeenschap van wildwimmers in een omgezette marinebasis.",nt:"Ga vroeg in de ochtend om 6 uur in winter voor stilte. Controleer waterkwaliteit op zwemwater.nl."},
  {id:122,n:"Park Schinkeleilanden — Diving Jetties",a:"Westerpark",v:["hidden","swimming"],d:20,s:"Undiscovered swimming spot with wooden jetties.",st:"Tucked beside the Olympisch Stadion, locals jump off handmade wooden jetties into calm water. Barely anyone finds this. The jetties wobble as you run—genuine, unmanicured Amsterdam swimming.",im:"The moment the jetty splinters beneath your feet and you're airborne over impossibly blue water.",t:"Go before 10am to avoid the stadion crowds. No facilities; bring a towel.",c:["swimming"],r:"g",nn:"Park Schinkeleilanden",ns:"Onontdekt zwemspot met houten steigers.",nst:"Naast het Olympisch Stadion springt lokaal publiek van handgemaakte houten steigers in kalm water.",nt:"Ga voor 10 uur 's ochtends om stadionmenigtes te vermijden. Geen faciliteiten; breng een handdoek mee."},
  {id:123,n:"Lokaal van de Stad — Sunset Spot",a:"Oud-West",v:["hidden","beautiful","quiet"],d:25,s:"Local gem: sunset over the Westlandgracht.",st:"A café overlooking the Westlandgracht canal where locals gather at dusk. The light turns the water molten. No tourists. Pure Amsterdam: bikes parked, wine in hand, the city wind in your hair.",im:"Sun sinking behind 17th-century gables, canal water glowing rose and amber.",t:"Go 1 hour before sunset. Order a wine. Stay for an hour. Don't take photos. This is for you.",c:["sunsets"],r:"g",nn:"Lokaal van de Stad",ns:"Lokaal juweel: zonsondergang over de Westlandgracht.",nst:"Een café met uitzicht op de Westlandgracht waar locals bij zonsondergang samenkomen.",nt:"Ga 1 uur voor zonsondergang. Bestel een wijn. Blijf een uur. Maak geen foto's."},
  {id:124,n:"Westergasfabriek Sunset — The Gasworks",a:"Westerpark",v:["beautiful","quiet","hidden"],d:22,s:"Former gasworks with vast park and pond reflection.",st:"Transformed industrial space with a sprawling park, cinema, theater, and brewery. The pond mirrors the sky at sunset. Locals come here because it's wide, open, and feels like the city dropped away. Authentic Amsterdam without the crowds.",im:"Golden light rippling across still water, factory architecture framing the horizon.",t:"Visit 5-6pm. Grab something from Brouwerij Troost. Find a spot on the grass.",c:["sunsets","culture"],r:"g",nn:"Westergasfabriek",ns:"Voormalige gasfabriek met vast park en waterkaatsing.",nst:"Omgetoverde industriële ruimte met uitgestrekt park, bioscoop, theater en brouwerij.",nt:"Bezoek 17-18 uur. Grab iets van Brouwerij Troost. Vind een spot op het gras."},
  {id:125,n:"Magere Brug at Dusk — The Skinny Bridge",a:"Grachtengordel",v:["beautiful","history"],d:15,s:"Wooden drawbridge lit up over the Amstel River.",st:"Spanning the Amstel River at dusk, this white wooden drawbridge becomes something from a dream. The cable lights twinkle on. The surrounding canal houses glow peach. For 5 minutes, everything is perfect. Locals know to arrive 30 minutes early.",im:"Bridge lights dancing off water like fireflies frozen in amber.",t:"Arrive 30min before sunset on the east bank. Cross the bridge twice.",c:["sunsets","history"],r:"g",nn:"Magere Brug",ns:"Houten ophaalbrug verlicht boven de Amstel.",nst:"Deze witte houten ophaalbrug over de Amstel wordt bij zonsondergang magisch.",nt:"Kom 30 minuten voor zonsondergang aan op de oostoever."},
  {id:126,n:"Aalsmeer Royal FloraHolland — World's Largest Flower Auction",a:"Day Trip",v:["weird","hidden"],d:60,s:"20 million flowers trade hands at dawn.",st:"An hour from Amsterdam, this is the world's largest flower marketplace. Flowers arrive from 10pm, get sorted and cooled through the night, then auctioned from 7am. Walk the elevated gallery and watch 20 million flowers change hands in hours. The scale is staggering. You'll understand how Amsterdam became a flower empire.",im:"Tens of thousands of stalks moving on conveyor belts beneath you, a living tsunami of color and bloom.",t:"Go Tues-Fri. Arrive at 7am. Get tickets (€11.50, €9 kids). Best 7-9am. It's 1 hour by bus from Central.",c:["early morning","day trip"],r:"g",nn:"Aalsmeer FloraHolland",ns:"Wereld's grootste bloemenveilig: 20 miljoen bloemen bij dageraad.",nst:"Een uur van Amsterdam, de grootste bloemenmarkt ter wereld. Bloemen arriveren om 22.00 uur.",nt:"Dinsdag t/m vrijdag. Aankomst 7 uur. Kaarten €11,50. Beste 7-9 uur."},
  {id:127,n:"Eye Film Museum — Ground Floor Gallery",a:"Noord",v:["free entry","beautiful"],d:20,s:"Free to roam the ground floor. The building itself is architecture.",st:"The iconic white building on the IJ riverbank has an extraordinary ground floor you can explore for free. The curves, the light, the views. If you can't afford a ticket to the film screenings, just being inside this space is enough. You're in a museum designed by Rem Koolhaas.",im:"Sunlight pouring through vast floor-to-ceiling windows, the IJ stretching beyond.",t:"Drop by 10am-5pm any day. No ticket needed for ground floor. Take the free ferry from Central.",c:["free culture","building"],r:"g",nn:"EYE Filmmuseum",ns:"Gratis verkenning van de begane grond.",nst:"Het ikonische witte gebouw aan de IJ-oever heeft een bijzondere begane grond.",nt:"Kom langs 10.00-17.00 uur. Geen kaartje nodig voor begane grond."},
  {id:128,n:"Hollandsche Schouwburg — Jewish Memory",a:"Plantage",v:["history","quiet"],d:30,s:"Free memorial. 46,000 Jews deported from this theater.",st:"In August 1942, this theater became a holding point for Jews awaiting deportation to Westerbork and Auschwitz. In 16 months, 46,000 people passed through. Across the street, a resistance network smuggled 600 Jewish children to safety in bags. Now it's a free memorial. Almost nobody visits. The weight of it is staggering.",im:"An empty theater with light falling through windows. Names of the deported written on the walls.",t:"Go early morning when it's quiet. Don't rush. Bring tissues.",c:["forgotten history","jewish history"],r:"g",nn:"Hollandsche Schouwburg",ns:"Gratis memorial. 46.000 Joden gedeporteerd uit dit theater.",nst:"In augustus 1942 werd dit theater een verzamelpunt voor Joden die op deportatie wachtten.",nt:"Ga vroeg in de ochtend wanneer het stil is. Haast je niet. Breng tissues mee."},
  {id:129,n:"Stolpersteine Walk — Stumbling Stones",a:"Centrum",v:["history","hidden"],d:90,s:"70,000 brass plaques naming Jewish deportation victims.",st:"Embedded in sidewalks across Amsterdam, these 10x10cm brass squares read 'Hier woonde' (here lived) followed by a name, birth date, and deportation date. 70,000 exist. Each one marks a home, a life, a family erased. There's no official route. You find them by stumbling. That's the point.",im:"Bronze glinting in wet cobblestone as you notice it under your feet.",t:"Get a Stolpersteine map online. Walk slowly. Stop at each one. Understand the name.",c:["forgotten history","walking"],r:"g",nn:"Stolpersteine",ns:"70.000 koperen plaatsen met namen van slachtoffers.",nst:"In stoeptegels zijn deze 10x10cm bronzen vierkanten ingebed met 'Hier woonde'.",nt:"Haal online een kaart. Loop langzaam. Stop bij elke steen."},
  {id:130,n:"Begijnhof — 1346 Women's Sanctuary",a:"Centrum",v:["history","quiet","hidden"],d:20,s:"Medieval courtyard where 1346-era women lived in religious community.",st:"Hidden behind unmarked doors in the city center, this courtyard was founded around 1346 as a sanctuary for Begijntjes—women who lived like nuns but without taking permanent vows. It's still a residential community. You walk through silence. The light is medieval. Nobody knows about it.",im:"Narrow gateway opening onto a quiet, tree-lined square of 17th-century buildings. Amsterdam drops away.",t:"Open every day. Visit 8am-5pm. Walk the central path only; homes are private. Donate €1 at the chapel.",c:["history","quiet"],r:"g",nn:"Begijnhof",ns:"Middeleeuws klooster uit 1346 voor vrouwen.",nst:"Achter onopvallende deuren verborgen, deze binnenplaats werd rond 1346 opgericht als heiligdom.",nt:"Open elke dag. Bezoek 8-17 uur. Loop alleen het middel pad. Doneer €1 bij kapel."},
  {id:131,n:"Ons Lieve Heer op Solder — Hidden Church",a:"Centrum",v:["weird","history"],d:25,s:"Clandestine Catholic church hidden in a 17th-century attic.",st:"When Catholic worship was banned in the 1600s, wealthy merchants built secret churches in their attics. This one, commissioned in 1663, had a hidden door in the living room leading to a spiral staircase up into the attic chapel. You enter the house, notice nothing, then suddenly you're in a full church suspended above the street. Worth paying for (€13).",im:"Candlelit altar beneath carved wooden ceiling, the city completely silent above you.",t:"Wednesday-Sunday 10am-6pm. €13 adults, €6 kids. The experience is compressed and intense.",c:["weird","history"],r:"g",nn:"Ons Lieve Heer op Solder",ns:"Verborgen katholieke kerk in een zeventiende-eeuws zolderkamer.",nst:"Toen katholiek aanbidden werd verboden, bouwden rijke handelaren geheime kerken in zolders.",nt:"Woensdag-zondag 10-18 uur. €13 volwassenen, €6 kinderen."},
  {id:132,n:"Singel 7 — The Narrowest Facade",a:"Grachtengordel",v:["weird","hidden"],d:10,s:"House facade barely 2 meters wide. Tax evasion architecture.",st:"Amsterdam charged tax based on building width, so in the 1600s, a merchant built the narrowest facade possible: just over 2 meters (barely wider than a door). Behind it, the house is 5 meters deep. It's the geometry of Dutch pragmatism—the oldest tax dodge still standing.",im:"A sliver of brick barely catching your eye, impossibly narrow door, impossibly deep inside.",t:"Walk past 100 times. You'll still miss it. It's on the Singel canal, just north of Leidsegracht.",c:["weird","history"],r:"g",nn:"Singel 7",ns:"Huisfacade van amper 2 meter breed. Belastingvlucht architectuur.",nst:"Amsterdam hief belasting op basis van breedte van gebouwen.",nt:"Loop er 100 keer langs. Je mist het nog steeds."},
  {id:133,n:"NDSM Wharf Sunday Flea — IJ-Hallen",a:"NDSM",v:["local","hidden"],d:120,s:"Europe's largest flea market: 750 stalls one weekend per month.",st:"Once a year, the massive shipyard transforms. 750 outdoor stalls (500 indoors in winter) spread across NDSM's industrial halls. It's one of Europe's biggest flea markets, and it only happens one weekend a month. Locals queue from 8am. Furniture, vintage, junk, treasure, anything—the energy is pure Amsterdam.",im:"A warehouse the size of a ship, packed shoulder-to-shoulder with dealers and dreamers, light streaming through industrial windows.",t:"First weekend of each month, Sat-Sun 9am-4:30pm. Get there by 9am. Free ferry from Central.",c:["local","markets"],r:"g",nn:"IJ-Hallen",ns:"Europas grootste vlooienmarkt: 750 kramen één weekend per maand.",nst:"Eenmaal per jaar transformeert de massieve scheepswerf. 750 buitenkramen.",nt:"Eerste weekend van elke maand, zaterdag-zondag 9-16.30 uur."},
  {id:134,n:"Albert Cuyp Market — 7am Locals Run",a:"De Pijp",v:["local","free entry"],d:45,s:"Arrive at 7am before tourists. This is where Amsterdam shops.",st:"Don't go at 11am like the guidebooks say. Go at 7am. The stalls are just opening. Locals are doing their real shopping—cheese, herring, stroopwafels, poffertjes. This is a working market for a working neighborhood, not a tourist circus. You'll see Amsterdam as Amsterdammers do.",im:"Vendor's hands moving fast, plastic bags filling, morning light, the smell of fresh stroopwafels and frying oil.",t:"Monday-Saturday 7am-5pm. Go 7-8am. Bring cash. Try Rudi's stroopwafels, Chris Kip roast chicken.",c:["markets","local"],r:"g",nn:"Albert Cuypmarkt",ns:"Kom om 7 uur 's ochtends, voor toeristen. Dit is waar Amsterdam winkelt.",nst:"Kom niet om 11 uur zoals de gidsen zeggen. Kom om 7 uur. De kramen gaan net open.",nt:"Maandag-zaterdag 7-17 uur. Ga 7-8 uur. Breng contant geld mee."},
  {id:135,n:"Waterlooplein Flea — The Jewish Market",a:"Plantage",v:["history","local"],d:60,s:"This was entirely a Jewish neighborhood. Now it's a flea market.",st:"Before WWII, this square bustled with Jewish merchants—daily market except Saturdays (the sabbath). In 1942, the quarter emptied as residents were rounded up. The market disappeared. After the war, it became a flea market, operating daily with 300 stalls. Now most vendors aren't Jewish. But the weight remains. Walk and remember.",im:"Vintage clothes hanging from racks, the plaza full of sound and commerce, ghosts in every corner.",t:"Daily except Sunday 9am-5pm. Go early to browse. The real value is the history, not the merchandise.",c:["markets","history"],r:"g",nn:"Waterlooplein markt",ns:"Dit was geheel een Joodse buurt. Nu is het een vlooienmarkt.",nst:"Voor WWII bruiste dit plein van Joodse handelaren. In 1942 was het leeg.",nt:"Dagelijks behalve zondag 9-17 uur."},
  {id:136,n:"Concertgebouw Free Lunch Concerts",a:"Oud-West",v:["free entry","culture"],d:30,s:"Free classical concert every Wednesday at 12:30pm.",st:"Wednesday at 12:30pm sharp, the Concertgebouw opens its doors for 30 minutes of chamber music or rehearsals. Free entry (the Grote Zaal never needs tickets). The orchestra rehearses openly. You sit with Amsterdammers and hear world-class music for nothing.",im:"Violin bow rising, the Kleine Zaal acoustics swallowing the room, absolute silence from 100 listeners.",t:"Check concertgebouw.nl for the program (released 1 week prior). No advance tickets needed for Grote Zaal.",c:["free culture","music"],r:"g",nn:"Concertgebouw lunchtconcerten",ns:"Gratis klassieks concert elke woensdag om 12.30 uur.",nst:"Woensdag 12.30 uur exact opent de Concertgebouw de deuren voor 30 minuten kamermuiziek.",nt:"Controleer concertgebouw.nl voor het programma. Geen tickets nodig voor Grote Zaal."},
  {id:137,n:"Pllek Beach Bar — Industrial Beachside",a:"Noord",v:["local","beautiful"],d:40,s:"Built from shipping containers. Free entry Friday-Saturday nights.",st:"Perched on the IJ near NDSM, Pllek is constructed entirely from shipping containers. Industrial, warm, with beanbags overlooking the water. Free entry Friday-Saturday nights with DJ sets (Afro, house, funk, techno). If you pay cover, the drinks are fair and food is vegetarian/vegan and sourced locally.",im:"Corrugated metal walls warmed by bright art, huge windows opening onto the dark IJ, city lights across the water.",t:"Free ferry from Central (15min). Fri-Sat nights 11pm+ are free entry. Day: grab a drink, relax on the beach.",c:["local","nightlife"],r:"g",nn:"Pllek",ns:"Gemaakt van scheepscontainers. Vrij entrée vrijdag-zaterdag.",nst:"Aan de IJ-oever bij NDSM is Pllek volledig uit scheepscontainers.",nt:"Gratis veerboot van Central (15 min). Vrij-zat nachts gratis entree."},
  {id:138,n:"Oud-West Neighborhood — Where Real Locals Live",a:"Oud-West",v:["local","hidden"],d:90,s:"Vondelpark to the east, but live like an Amsterdammer here.",st:"Oud-West is sandwiched between Vondelpark and Westerpark, but it's where locals actually live. Tree-lined streets, trendy bars, concert venues, restaurants opening every month. It's Amsterdam at a human scale—no Red Light District energy, no museum queues, just ordinary people choosing where to get coffee.",im:"Wide streets on bicycles, bars spilling onto sidewalks, the smell of fresh bread from bakeries.",t:"Base yourself here if you want to live like an Amsterdammer. Kinkerstraat is the heart. Take tram 7.",c:["neighborhoods","local"],r:"g",nn:"Oud-West buurt",ns:"Vondelpark ligt ten oosten, maar leef hier als een Amsterdammer.",nst:"Oud-West ligt tussen Vondelpark en Westerpark, maar hier wonen echte Amsterdammers.",nt:"Vestig jezelf hier als je als Amsterdammer wilt leven. Kinkerstraat is het hart."},
  {id:139,n:"De Pijp — Village in the City",a:"De Pijp",v:["local","beautiful"],d:60,s:"Albert Cuyp, boutiques, cafes. Amsterdam's most charming neighborhood.",st:"De Pijp feels like a village planted inside the city. Between Museumplein and the Amstel River, narrow streets, small shops, the iconic Albert Cuyp market. Old brewery buildings house restaurants. Locals choose to live here and never leave. It has that rarest thing in Amsterdam: a sense of place that isn't performing for tourists.",im:"Bicycles leaning against shuttered storefronts, market vendors calling out, the smell of flowers and bread.",t:"Walk without direction. Get lost in the side streets. Albert Cuyp is the spine.",c:["neighborhoods","local"],r:"g",nn:"De Pijp buurt",ns:"Dorp in de stad. Albert Cuyp, boetiekjes, cafés.",nst:"De Pijp voelt als een dorp in de stad. Tussen Museumplein en de Amstel.",nt:"Loop zonder richting. Verdwaal in de zijstraten."},
  {id:140,n:"Indische Buurt — Indonesian-Dutch Heritage",a:"Oost",v:["local","hidden"],d:75,s:"The Indies neighborhood where Dutch-Indonesian culture lives.",st:"The Dutch colonial presence in Indonesia shaped this neighborhood. It's where Dutch soldiers returned post-WWII and Indonesian immigrants built community. Today it's a living museum of fusion: rijsttafel restaurants, Indonesian spice shops, Dutch-Indonesian households. Mama Makan Indonesian Kitchen near Plantage serves rijsttafel the way it was meant to be. Walk the streets and taste the history.",im:"Smell of Indonesian spices mixing with Dutch canal air, storefront signs in two languages, generations meeting in cafes.",t:"Go for lunch or dinner. Try Mama Makan or any rijsttafel restaurant. Walk Javastraat and Sumatrastraat.",c:["neighborhoods","culture"],r:"g",nn:"Indische Buurt",ns:"De Indiëbuurt waar Nederlands-Indonesische cultuur leeft.",nst:"De Nederlandse koloniale aanwezigheid in Indonesië vormde deze buurt.",nt:"Ga voor lunch of diner. Probeer Mama Makan of een rijsttafel restaurant."},
  {id:141,n:"Bimhuis Jazz Club — Affordable Live Jazz",a:"Centrum",v:["local","culture"],d:40,s:"Amsterdam's premier jazz venue with reasonable cover charges.",st:"Bimhuis sits in the Muziekgebouw aan 't IJ. World-class jazz musicians perform nightly. Ticket prices are fair (€10-25 for most shows). The sound is impeccable. Locals come here instead of tourist traps because the music is real and the bar is honest.",im:"Spotlight on the saxophonist's face, sweat and concentration, crowd leaning in.",t:"Check bimhuis.nl for schedule. Come early, sit near the stage. Most shows 20:30.",c:["music","local"],r:"g",nn:"Bimhuis",ns:"Amsterdams toonaangevende jazzclub met redelijke entreeprijzen.",nst:"Bimhuis zit in het Muziekgebouw aan 't IJ. Wereldklasse jazzmusici treden elke avond op.",nt:"Controleer bimhuis.nl voor schema. Kom vroeg, zit vlak bij het podium."},
  {id:142,n:"Houseboat Museum — Life on the Canals",a:"Jordaan",v:["weird","history"],d:20,s:"The only houseboat museum in the world.",st:"The 'Hendrika Maria', a 1914 cargo ship-turned-houseboat on the Prinsengracht, is the world's only houseboat museum. You climb inside, see how people live on Amsterdam's canals, understand the coziness and compromises of water-living. It's tiny, intimate, real. The gift shop smells like old wood and time.",im:"Narrow cabin with porthole windows, the sound of water beneath floorboards, light bouncing off canal ripples.",t:"Hendrika Maria, Prinsengracht 296K. Tues-Sun 11am-5pm. €5 adults.",c:["weird","museums"],r:"g",nn:"Woonbootmuseum",ns:"Het enige woonbootmuseum ter wereld.",nst:"De 'Hendrika Maria', een scheepscontainer van 1914 aan de Prinsengracht.",nt:"Hendrika Maria, Prinsengracht 296K. Di-zo 11-17 uur. €5 volwassenen."},
  {id:143,n:"Foam Photography Museum — Free Tuesdays",a:"Oud-West",v:["free entry","culture"],d:30,s:"Photography museum with free admission Tuesday evenings.",st:"Foam (Photography Museum Amsterdam) on Keizersgracht is dedicated to international photography. Thursday-Friday open until 9pm, and on Tuesday evenings admission is completely free. World-class exhibitions, spotless space, the kind of museum that charges €12 but celebrates free access once a week.",im:"Photographs life-sized on clean white walls, light from canal-side windows, the sound of your own breathing.",t:"Tuesday evenings free. Wed-Sun 10am-6pm. €12 regular admission. Keizersgracht 609.",c:["free culture","photography"],r:"g",nn:"Foam Museum",ns:"Fotografiemuseum met gratis toegang dinsdag avond.",nst:"Foam (Fotografiemuseum Amsterdam) aan de Keizersgracht is gewijd aan internationale fotografie.",nt:"Dinsdag avond gratis. Wo-zo 10-18 uur. €12 reguliere toegang."},
  {id:144,n:"Stedelijk Museum Free Friday Night",a:"South",v:["free entry","culture"],d:60,s:"Modern art museum free on Friday evenings.",st:"The Stedelijk has extraordinary modern and contemporary work—often more accessible than the Van Gogh Museum. Free admission on Friday evenings after 6pm. It's one of the world's best design museums. You can spend 2 hours here for nothing and see work that will change how you see.",im:"Minimalist canvases in gallery light, sound installations filling white space, contemporary video art.",t:"Fridays 6pm-10pm free. Wed-Sun 10am-6pm normal hours. €20 regular admission.",c:["free culture","art"],r:"g",nn:"Stedelijk Museum",ns:"Museum voor hedendaagse kunst met gratis vrijdagavond.",nst:"Het Stedelijk heeft buitengewone moderne werken—meestal toegankelijker dan Van Gogh.",nt:"Vrijdag 18-22 uur gratis. Wo-zo 10-18 uur normale uren."},
  {id:145,n:"Vondelpark Open-Air Theater — Free Summer Concerts",a:"Vondelpark",v:["free entry","culture"],d:40,s:"Free outdoor concerts and theater every summer.",st:"From June-August, Amsterdam's Vondelpark becomes a stage. Free concerts, theater, dance performances under the trees. The amphitheater is simple. The performances are professional. Locals bring picnics. No tickets required. Just show up.",im:"Summer light through oak trees, voices carrying across grass, strangers sitting side-by-side, the smell of picnic sandwiches.",t:"Check openluchttheater.nl for June-August schedule. Performances usually 8pm-10pm.",c:["free culture","nature"],r:"g",nn:"Vondelpark Open-Air Theater",ns:"Gratis zomerconerten en theater.",nst:"Van juni tot augustus wordt Vondelpark van Amsterdam een podium. Gratis concerten.",nt:"Controleer openluchttheater.nl voor juni-augustusschema."},
  {id:146,n:"Rijksmuseum Night Watch — Before 10am",a:"South",v:["beautiful","history"],d:45,s:"Rembrandt's masterpiece in Room 2.12, emptiest before 10am.",st:"Rembrandt's 'The Night Watch' is in Room 2.12. Go before 10am when the tour groups haven't arrived. You stand alone with a 4x5 meter painting that changed art history. The brushwork is visible. The drama is overwhelming. The Rijksmuseum also has free access to its courtyard and gardens.",im:"Golden light falling on the militia, centuries of paint and intention facing you alone.",t:"Before 10am. Book 2+ days ahead. Or explore the free courtyard. Check rijksmuseum.nl.",c:["art","history"],r:"g",nn:"Rijksmuseum Night Watch",ns:"Rembrandts meesterwerk in zaal 2.12, het leegst voor 10 uur.",nst:"Rembrandts 'De Nachtwacht' hangt in zaal 2.12. Ga voor 10 uur.",nt:"Voor 10 uur. Boek 2+ dagen van tevoren. Of verken de gratis binnenplaats."},
  {id:147,n:"Anne Frank House — Timing Strategy",a:"Grachtengordel",v:["history","quiet"],d:60,s:"Tickets release 2 months ahead at 9am. Set an alarm or try day-of at noon.",st:"Tickets for the Anne Frank House are fiercely competitive. They release exactly 2 months in advance at 9am Amsterdam time. If you miss that, 20% of remaining tickets release same-day at 9am and noon. If you can't get in: stand outside at dusk. The building still reaches you.",im:"Light slanting through the hidden room where Anne Frank wrote. The smallness of the space. The weight of knowing.",t:"Set phone alarm for 2 months ahead, 9am Amsterdam time. Or try annefrank.org at 9am day-of.",c:["history","jewish history"],r:"g",nn:"Anne Frank Huis",ns:"Kaarten verschijnen 2 maanden van tevoren om 9 uur. Zet een wekker.",nst:"Kaarten voor het Anne Frank Huis zijn zeer competitief. Ze verschijnen precies 2 maanden van tevoren.",nt:"Zet telefoonwekker 2 maanden van tevoren, 9 uur Amsterdam time."},
  {id:148,n:"Haarlem Day Trip — Frans Hals, Cheese, Cycling",a:"Day Trip",v:["history","beautiful"],d:180,s:"20 minutes by bike. Frans Hals Museum, real market, perfect town.",st:"From Amsterdam, it's 20 minutes by bike or 15 by train. Haarlem is everything Amsterdam was: medieval, complete, human-scaled. The Frans Hals Museum is extraordinary—the paintings are better lit than most. The market square is genuine. Grab cheese, sit, watch the city. No tourists really know about it.",im:"Medieval towers framing a market square, light on brick, the smell of stroopwafels and fresh fish.",t:"Bike: cross the Amsterdamse Bos, follow signs. Train: 15min from Central. Stay 4-5 hours. Rent a bike in Haarlem.",c:["day trip","history","art"],r:"g",nn:"Haarlem dagje uit",ns:"20 minuten fietsen. Frans Hals Museum, echte markt, perfect stadje.",nst:"Vanaf Amsterdam fietst het 20 minuten of 15 met de trein. Haarlem is alles wat Amsterdam was.",nt:"Fiets: steek de Amsterdamse Bos over. Trein: 15 min van Central. Blijf 4-5 uur."},
  {id:149,n:"Zaanse Schaan — Early Morning (Before the Buses)",a:"Day Trip",v:["history","beautiful"],d:120,s:"Historic windmill village. Go before 9am when tour buses arrive.",st:"Yes, Zaanse Schaan is touristy, but here's the trick: arrive at 8am before the first buses. Windmills stand in the mist. Grass is wet. No crowds. You get 1 hour of authentic 18th-century Dutch village before the machinery of tourism starts. Then watch it transform. The contrast teaches you something.",im:"Windmills silhouetted against dawn fog, water wheels still, no sound but birds and water.",t:"Train from Central to Zaandam (15min), then bus. Go 8am-9am. Leave by 11am before buses.",c:["day trip","history"],r:"g",nn:"Zaanse Schans",ns:"Historisch molenvillage. Ga voor 9 uur, voor bustoerisme.",nst:"Ja, Zaanse Schans is toeristisch, maar de truc: kom om 8 uur aan.",nt:"Trein van Central naar Zaandam (15 min), dan bus. Ga 8-9 uur."},

<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Amsterdam Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Amsterdam Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
