  {id:73,n:"Hussite Revolution Sites",a:"Staré Město",v:["history", "weird"],d:73,s:"The square where religious rebels executed an archbishop—a revolution that changed Europe",st:"This square saw violence. An archbishop fell from a tower. The crowd below waited. The Hussite revolution started here. Religious freedom was born from bloodshed. Now it\'s a plaza.",im:"It\'s 1419. The crowd storms the city hall. An archbishop is thrown from the window. He falls. It lands. The revolution ignites. Religion will never be the same.",t:"This square saw violence. An archbishop fell from a tower. The crowd below waited. The Hussite revolution started here. Religious freedom was born from bloodshed. Now it\'s a plaza.\",im:\"It\'s 1419. The crowd storms the city hall. An archbishop is thrown from the window. He falls. It lands. The revolution ignites. Religion will never be the same.\",t:\"Old Town Square, Prague. Free. Plaques mark the sites. The Town Hall tower is accessible (€3). The history is written in architecture and stone. Read the markers. Imagine the chaos.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:74,n:"Free Gallery Nights — First Thursdays",a:"Prague galleries",v:["free", "art"],d:74,s:"Prague\'s galleries open free the first Thursday—contemporary art night in the city",st:"First Thursday evening. Galleries open free. Artists mingle with visitors. Wine appears. The city\'s art scene becomes democratic. This is culture as community, not commerce.",im:"It\'s 2010. Prague\'s galleries decide to open free monthly. They want to democratize art. Now thousands come. Now it\'s tradition. Now it\'s beautiful.",t:"First Thursday evening. Galleries open free. Artists mingle with visitors. Wine appears. The city\'s art scene becomes democratic. This is culture as community, not commerce.\",im:\"It\'s 2010. Prague\'s galleries decide to open free monthly. They want to democratize art. Now thousands come. Now it\'s tradition. Now it\'s beautiful.\",t:\"Check Prague.eu for participating galleries. Most cluster in Vinohrady and Holešovice. First Thursday 5-9pm. Completely free. The crowds are real but manageable. The art is contemporary and good.",c:["free", "art"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:75,n:"Free Church Concerts",a:"Old Town",v:["free", "night", "music"],d:75,s:"Classical musicians perform in medieval churches—gorgeous music, zero cost",st:"You sit in a 800-year-old church. Musicians perform Bach. The acoustics are perfect. The stone remembers centuries of prayer and music. Now it receives your presence.",im:"It\'s always been like this. This church was built for sound. For prayer. For music. The technology changes. The magic doesn\'t.",t:"You sit in a 800-year-old church. Musicians perform Bach. The acoustics are perfect. The stone remembers centuries of prayer and music. Now it receives your presence.\",im:\"It\'s always been like this. This church was built for sound. For prayer. For music. The technology changes. The magic doesn\'t.\",t:\"St. James Church, Old Town Square area. Concerts 6-7pm most nights. Donation-based (typically €3-5). The church is beautiful even without music. The musicians are professional. The experience is transcendent.",c:["free", "music", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:76,n:"Žižkov Wall Murals",a:"Žižkov",v:["street_art", "hidden", "local"],d:76,s:"An entire neighborhood claiming walls—Žižkov is Prague\'s underground art district",st:"You walk Žižkov. Every building is art. Murals evolve. Styles clash. Local artists own these walls. The neighborhood is the gallery. The streets are canvas. It\'s anarchic and beautiful.",im:"It\'s 2000. Žižkov is rough. Squatters move in. Artists follow. They paint. The walls transform. Now it\'s famous. Now it\'s gentrifying. But the art remains radical.",t:"You walk Žižkov. Every building is art. Murals evolve. Styles clash. Local artists own these walls. The neighborhood is the gallery. The streets are canvas. It\'s anarchic and beautiful.\",im:\"It\'s 2000. Žižkov is rough. Squatters move in. Artists follow. They paint. The walls transform. Now it\'s famous. Now it\'s gentrifying. But the art remains radical.\",t:\"Žižkov neighborhood (around Náměstí Jiřího z Poděbrad). Free walking tour. Best explored on foot, slowly. Bring a camera. The murals change seasonally. It\'s alive and growing.",c:["street_art"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:77,n:"Karlín Murals — Industrial Uprising",a:"Karlín",v:["street_art", "hidden"],d:77,s:"Murals transforming an industrial district—street art as neighborhood resurrection",st:"Karlín was industrial wasteland. Artists moved in. They painted. The walls exploded with color. Now it\'s a destination. Now it\'s gentrified. But the art is still raw.",im:"It\'s 2005. Karlín is abandoned. Empty factories. Then street artists arrive. They see possibility. They paint. The paint becomes a promise. The promise becomes reality.",t:"Karlín was industrial wasteland. Artists moved in. They painted. The walls exploded with color. Now it\'s a destination. Now it\'s gentrified. But the art is still raw.\",im:\"It\'s 2005. Karlín is abandoned. Empty factories. Then street artists arrive. They see possibility. They paint. The paint becomes a promise. The promise becomes reality.\",t:\"Karlín district (metro line C). Walking tour self-guided. Free. The murals cluster around Kpt. Jaroše and Haštalská. Many are photogenic. The neighborhood is still industrial. Still real.",c:["street_art"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:78,n:"Holešovice Art District — Underground Scene",a:"Holešovice",v:["street_art", "art", "hidden"],d:78,s:"A former warehouse district now full of artist studios, galleries, and street art collectives",st:"You wander converted warehouses. Each one is a studio. Street art outside. Galleries inside. Artists paint. Musicians play. The scene is underground, it\'s alive, it\'s uninstitutionalized.",im:"It\'s 1990. Soviet factories close. Buildings stand empty. Artists squat. They set up studios. Now it\'s official. Now it\'s beautiful. Now it\'s becoming expensive. But the art is still authentic.",t:"You wander converted warehouses. Each one is a studio. Street art outside. Galleries inside. Artists paint. Musicians play. The scene is underground, it\'s alive, it\'s uninstitutionalized.\",im:\"It\'s 1990. Soviet factories close. Buildings stand empty. Artists squat. They set up studios. Now it\'s official. Now it\'s beautiful. Now it\'s becoming expensive. But the art is still authentic.\",t:\"Holešovice (metro line C). Self-guided walking tour. Free. Open studios most weekends. Check Holešovice Artist Collective online. Bring cash for small purchases. The scene is welcoming. The energy is young.",c:["street_art", "art"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:79,n:"Mildred Hall — Underground Jazz Club",a:"Old Town",v:["night", "hidden", "music"],d:79,s:"A speakeasy-style jazz club in a cellar—password changes weekly",st:"You find a nondescript door. You know the password. You descend. A jazz trio plays. The sound bounces off stone. The room is intimate. This is how music should be experienced.",im:"It\'s 2010. Someone creates a secret club. It stays underground. It stays pure. Now it\'s legendary.",t:"You find a nondescript door. You know the password. You descend. A jazz trio plays. The sound bounces off stone. The room is intimate. This is how music should be experienced.\",im:\"It\'s 2010. Someone creates a secret club. It stays underground. It stays pure. Now it\'s legendary.\",t:\"Old Town (location kept secret, check Resident Advisor). €8 entry (with password). Opens 9pm. Peak 11pm-1am. Very local. Very underground.",c:["night", "music", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:80,n:"Strahov Library Rare Books Rooms",a:"Strahov Monastery",v:["history", "beautiful", "hidden"],d:80,s:"A monastery library with 300-year-old manuscripts—one of Europe\'s finest collections",st:"You walk through rooms of ancient books. Leather covers. Handwritten margins. The air smells of time and knowledge. Each book is a monk\'s lifetime of work.",im:"It\'s 1600. A monk copies a book by candlelight. It takes one year. It\'s perfect. Now you see it. Now you know the work.",t:"You walk through rooms of ancient books. Leather covers. Handwritten margins. The air smells of time and knowledge. Each book is a monk\'s lifetime of work.\",im:\"It\'s 1600. A monk copies a book by candlelight. It takes one year. It\'s perfect. Now you see it. Now you know the work.\",t:\"Strahov Monastery. €4 entry. Open 9am-5pm. The library is the main attraction. Go early for solitude. Bring a notebook. The experience is meditative.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:81,n:"St. Vitus Cathedral Crypt",a:"Prague Castle",v:["history", "weird", "scary"],d:81,s:"Royal tombs of Bohemian kings buried below the cathedral",st:"You descend to the crypt. Stone tombs line the walls. Kings and queens sleeping beneath centuries. The air is cool. The silence is reverent. It\'s history made tangible.",im:"It\'s medieval times. A king is laid to rest here. Centuries pass. Other kings join. Now you walk among them.",t:"You descend to the crypt. Stone tombs line the walls. Kings and queens sleeping beneath centuries. The air is cool. The silence is reverent. It\'s history made tangible.\",im:\"It\'s medieval times. A king is laid to rest here. Centuries pass. Other kings join. Now you walk among them.\",t:\"Prague Castle complex. €12 entry (crypt included). Open 9am-5pm. The crypt is small but powerful. Very atmospheric. Bring respect.",c:["history_big", "scary"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:82,n:"Lennon Wall Private Alley",a:"Malá Strana",v:["art", "hidden", "street_art"],d:82,s:"A lesser-known wall covered in graffiti and art—John Lennon\'s spirit lives on walls",st:"You find a side wall. It\'s painted. It\'s layered. Decades of paint, messages, art. Each layer is a moment. Each moment is rebellion. It\'s beautiful because it\'s living.",im:"It\'s the 1980s. The wall appears during Cold War. Dissidents paint. The government whitewashes. The dissidents paint again. Now freedom won. The paint remains.",t:"You find a side wall. It\'s painted. It\'s layered. Decades of paint, messages, art. Each layer is a moment. Each moment is rebellion. It\'s beautiful because it\'s living.\",im:\"It\'s the 1980s. The wall appears during Cold War. Dissidents paint. The government whitewashes. The dissidents paint again. Now freedom won. The paint remains.\",t:\"Malá Strana area. Free. Open air. 24/7. Best in daylight. It\'s photogenic. It\'s alive. New art constantly covers old.",c:["art", "street_art"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:83,n:"Petřín Hunger Wall",a:"Petřín",v:["history", "hidden", "nature"],d:83,s:"A medieval wall running through forest—built during famine to provide work",st:"You hike and discover a stone wall snaking through trees. It\'s partially crumbled. It\'s partially intact. For 700 years it\'s stood. Now nature reclaims. Now it\'s melancholic and beautiful.",im:"It\'s 1360. A famine. The king builds a wall. It gives people work. It\'s strategic defense. It\'s also mercy. Now time slowly destroys it.",t:"You hike and discover a stone wall snaking through trees. It\'s partially crumbled. It\'s partially intact. For 700 years it\'s stood. Now nature reclaims. Now it\'s melancholic and beautiful.\",im:\"It\'s 1360. A famine. The king builds a wall. It gives people work. It\'s strategic defense. It\'s also mercy. Now time slowly destroys it.\",t:\"Petřín Park (north of lookout tower). Free. The wall walks about 2km. Moderate hike. Bring water. The views through trees are beautiful. The history is quiet.",c:["history_big", "nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:84,n:"Powder Gate Climb — Hidden Stairs",a:"Old Town",v:["history", "high_spots"],d:84,s:"A medieval tower climb that\'s not mentioned in guidebooks—the view is unobstructed",st:"You climb narrow spiral stairs. Each step is centuries old. At the top, 360 views. Old Town spreads. It\'s the same view tourists get from the main gate, but you earned it by climbing.",im:"It\'s medieval times. Guards climbed these stairs. Now you do. The stone is the same. The view is the same. Your heart is as elevated.",t:"You climb narrow spiral stairs. Each step is centuries old. At the top, 360 views. Old Town spreads. It\'s the same view tourists get from the main gate, but you earned it by climbing.\",im:\"It\'s medieval times. Guards climbed these stairs. Now you do. The stone is the same. The view is the same. Your heart is as elevated.\",t:\"Powder Gate, Old Town Square. €5 entry. Open 10am-6pm. Only 186 steps. The climb is moderate. The view is unmissable.",c:["history_big", "high_spots"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:85,n:"Sedlec Cathedral Ossuary Tour",a:"Kutná Hora (day trip)",v:["weird", "history", "scary"],d:85,s:"The bone cathedral\'s main cathedral where reliquaries hold even older remains",st:"You walk through a church. Everywhere, reliquaries. Ancient bones arranged in holy patterns. It\'s deeply medieval. It\'s deeply weird. It\'s a meditation on faith and death.",im:"It\'s 900 AD. Monks gather bones and create shrines. It\'s spiritual. It\'s obsessive. Now you see their faith made bone.",t:"You walk through a church. Everywhere, reliquaries. Ancient bones arranged in holy patterns. It\'s deeply medieval. It\'s deeply weird. It\'s a meditation on faith and death.\",im:\"It\'s 900 AD. Monks gather bones and create shrines. It\'s spiritual. It\'s obsessive. Now you see their faith made bone.\",t:\"Sedlec Cathedral, Kutná Hora (train 1 hour from Prague). €4 entry. Open 10am-4pm. Combine with the ossuary (€5 separate). The experience is surreal.",c:["history_big", "weird", "scary"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:86,n:"Old Town Square Astronomical Clock Secret",a:"Staré Město",v:["history", "weird"],d:86,s:"The famous clock has a mechanical show every hour — it\'s been doing it for 600 years",st:"At the top of the hour, small doors open. Mechanical apostles appear. They\'re stiff. They\'re ancient. They process. It\'s awkward. It\'s beautiful. It\'s a clock as theater.",im:"It\'s 1410. Someone builds a clock. It shows time. It shows the universe. Now it shows itself every hour. People watch. The show is unchanged.",t:"At the top of the hour, small doors open. Mechanical apostles appear. They\'re stiff. They\'re ancient. They process. It\'s awkward. It\'s beautiful. It\'s a clock as theater.\",im:\"It\'s 1410. Someone builds a clock. It shows time. It shows the universe. Now it shows itself every hour. People watch. The show is unchanged.\",t:\"Old Town Square. Free from street. Go just before the hour to get a good position. Very crowded but worth it. The clock face itself is gorgeous even between shows.",c:["history_big", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:87,n:"Franciscan Monastery Secret Garden",a:"Nerudova",v:["hidden", "beautiful", "quiet"],d:87,s:"A monastery courtyard garden open to the public but nobody visits",st:"You find a gate. You push. Inside, a garden. Stone benches. Flowers. Moss-covered walls. It\'s been here 500 years. It\'s peaceful. It\'s yours for the taking.",im:"It\'s medieval times. Monks plant a garden. They tend it. They meditate in it. Centuries later, it endures.",t:"You find a gate. You push. Inside, a garden. Stone benches. Flowers. Moss-covered walls. It\'s been here 500 years. It\'s peaceful. It\'s yours for the taking.\",im:\"It\'s medieval times. Monks plant a garden. They tend it. They meditate in it. Centuries later, it endures.\",t:\"Nerudova street (behind small gate). Free. Open 9am-5pm. Very few tourists. Bring a book. The silence is absolute.",c:["beautiful", "quiet", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:88,n:"Black Light Theater — Czech Innovation",a:"Old Town",v:["weird", "art", "night"],d:88,s:"A theater form invented in Prague where performers glow against black — surreal movement art",st:"You sit in darkness. Neon performers appear. They move. They transform. The effect is dreamlike. It\'s circus. It\'s dance. It\'s completely Czech. It\'s completely weird.",im:"It\'s 1960. Czech artists invent a new form. Now it\'s famous. Now it\'s exported. Now you see the origin.",t:"You sit in darkness. Neon performers appear. They move. They transform. The effect is dreamlike. It\'s circus. It\'s dance. It\'s completely Czech. It\'s completely weird.\",im:\"It\'s 1960. Czech artists invent a new form. Now it\'s famous. Now it\'s exported. Now you see the origin.\",t:\"Multiple theaters offer black light shows. €10-20 entry. Shows 90min. Daily performances. Book ahead. The audience is international. The experience is unforgettable.",c:["weird", "art", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:89,n:"Prague Spring Musical Festival Venues",a:"Multiple venues",v:["music", "beautiful", "history"],d:89,s:"Classical concerts in the city\'s most historic venues — May Festival in concert halls since 1946",st:"You sit in a gilded concert hall. An orchestra plays. The ceiling is frescoed. The walls are marble. You\'re in a room where generations have listened to the same music.",im:"It\'s 1946. Prague tries to heal. Music helps. The festival begins. Now it\'s 80 years old. The music never stops.",t:"You sit in a gilded concert hall. An orchestra plays. The ceiling is frescoed. The walls are marble. You\'re in a room where generations have listened to the same music.\",im:\"It\'s 1946. Prague tries to heal. Music helps. The festival begins. Now it\'s 80 years old. The music never stops.\",t:\"Prague Spring Festival (May annually). Check website for schedule. €20-100 depending on venue and performance. Venues: Rudolfinum, National Theater, others. Book early.",c:["music", "beautiful", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:90,n:"Klementinum Library Baroque Hall",a:"Old Town",v:["history", "beautiful"],d:90,s:"A baroque library with a 3-story reading room — 20 thousand books and endless columns",st:"You walk up narrow stairs. The reading room opens. Columns rise three stories. Books line every wall. Ladders lean against shelves. It\'s architectural perfection in service of reading.",im:"It\'s 1700. The Jesuits build the perfect library. They build it for contemplation. Now you contemplate in their space.",t:"You walk up narrow stairs. The reading room opens. Columns rise three stories. Books line every wall. Ladders lean against shelves. It\'s architectural perfection in service of reading.\",im:\"It\'s 1700. The Jesuits build the perfect library. They build it for contemplation. Now you contemplate in their space.\",t:\"Klementinum complex. €7 entry (library only). Open 10am-6pm. The staircase alone is worth it. The reading hall is unforgettable. Bring a camera.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:91,n:"Certovka Mill Stream Hidden Path",a:"Malá Strana",v:["nature", "quiet", "hidden"],d:91,s:"A tiny creek with a working watermill — Prague\'s secret creek",st:"You find water. A stream flows. An actual mill. It\'s small. It\'s real. The city roars beyond. Here, just water and stone.",im:"It\'s medieval. The mill grinds. Centuries pass. The mill still grinds.",t:"You find water. A stream flows. An actual mill. It\'s small. It\'s real. The city roars beyond. Here, just water and stone.\",im:\"It\'s medieval. The mill grinds. Centuries pass. The mill still grinds.\",t:\"Certovka, Malá Strana. Free. Walk the creek path. Very quiet. Very beautiful. Few tourists.",c:["nature", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:92,n:"Prague 6 Nebozízek Observation Plaform",a:"Petřín",v:["beautiful", "high_spots"],d:92,s:"An observation point that\'s higher than the famous tower but completely unknown",st:"You climb. You reach a platform. Prague sprawls in all directions. The view is identical to the tower. But you\'re alone. That\'s the difference.",im:"It\'s there. Few people find it. Now you do.",t:"You climb. You reach a platform. Prague sprawls in all directions. The view is identical to the tower. But you\'re alone. That\'s the difference.\",im:\"It\'s there. Few people find it. Now you do.\",t:\"Petřín area, northwest. Free. Moderate hike. The view is monumental. Bring time.",c:["beautiful", "high_spots"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:93,n:"Emmaus Monastery — Slav Gothic",a:"Nové Město",v:["history", "beautiful", "quiet"],d:93,s:"A monastery damaged in WWII, rebuilt with Czech pride — radical modern spires",st:"You approach a monastery. The original spires were destroyed. They rebuilt with modern spires. It\'s jarring. It\'s beautiful. It\'s a statement: we survived.",im:"It\'s 1944. Bombs fall. The monastery burns. By 1960, it\'s rebuilt. Modern. Bold. Czech.",t:"You approach a monastery. The original spires were destroyed. They rebuilt with modern spires. It\'s jarring. It\'s beautiful. It\'s a statement: we survived.\",im:\"It\'s 1944. Bombs fall. The monastery burns. By 1960, it\'s rebuilt. Modern. Bold. Czech.\",t:\"Nové Město. €3 entry. Open 10am-4pm. The contrast is striking. The story is powerful.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:94,n:"Petřín Orchid Greenhouse",a:"Petřín",v:["nature", "hidden", "beautiful"],d:94,s:"A small greenhouse full of orchids — a botanical secret in plain sight",st:"You find a greenhouse. It\'s warm. It\'s humid. Orchids everywhere. Colors you\'ve never seen. It\'s tropical in Prague. It\'s a moment of magic.",im:"Botanists built it. Now it grows. Now you find it.",t:"You find a greenhouse. It\'s warm. It\'s humid. Orchids everywhere. Colors you\'ve never seen. It\'s tropical in Prague. It\'s a moment of magic.\",im:\"Botanists built it. Now it grows. Now you find it.\",t:\"Petřín Park. €3 entry. Open 10am-4pm. Very few tourists. Bring a notebook. The orchids are hypnotic.",c:["nature", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:95,n:"Basilica of St. George — Interior Frescoes",a:"Prague Castle",v:["history", "beautiful"],d:95,s:"A church famous outside, but the interior is a fresco masterpiece",st:"You walk in. The walls explode with color. Medieval frescoes. Centuries of paint. The stone speaks in pigment. It\'s visual theology.",im:"It\'s 900 AD. An artist paints by candlelight. The fresco lasts 1000 years. Now you see it.",t:"You walk in. The walls explode with color. Medieval frescoes. Centuries of paint. The stone speaks in pigment. It\'s visual theology.\",im:\"It\'s 900 AD. An artist paints by candlelight. The fresco lasts 1000 years. Now you see it.\",t:\"Prague Castle complex. €12 entry (basilica included). Open 9am-5pm. The interior rivals better-known churches. Bring a notebook.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:96,n:"Bertramka Mozart House",a:"Smíchov",v:["history", "beautiful"],d:96,s:"Where Mozart composed Don Giovanni — his hands touched these walls",st:"You walk where he walked. You see the room where he worked. The pianoforte still stands. It\'s intimate. It\'s intimate with genius.",im:"It\'s 1787. Mozart lives here. He composes one of the greatest operas ever. Then he leaves. Now you stand where greatness happened.",t:"You walk where he walked. You see the room where he worked. The pianoforte still stands. It\'s intimate. It\'s intimate with genius.\",im:\"It\'s 1787. Mozart lives here. He composes one of the greatest operas ever. Then he leaves. Now you stand where greatness happened.\",t:\"Smíchov. €8 entry. Open 10am-4pm, closed Mondays. Small but powerful. Bring music in your head.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:97,n:"Lichtenstein Palace Library Vault",a:"Malá Strana",v:["history", "hidden", "weird"],d:97,s:"A palace library that survived wars — books with handwritten notes from centuries",st:"You see the collection. Books with marginal notes from the 1600s. A person read this 400 years ago. They wrote in the margin. You read their thoughts.",im:"It\'s 1600. Someone reads. They think. They write in the margin. Now you read their mind.",t:"You see the collection. Books with marginal notes from the 1600s. A person read this 400 years ago. They wrote in the margin. You read their thoughts.\",im:\"It\'s 1600. Someone reads. They think. They write in the margin. Now you read their mind.\",t:\"Lichtenstein Palace, Malá Strana. €6 entry. Open 10am-5pm. The library is intimate. The history is palpable.",c:["history_big", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:98,n:"Tyn Church Bell Tower Climb",a:"Old Town",v:["history", "high_spots", "weird"],d:98,s:"Climb a Gothic church tower where old bells hang — the sound echoes centuries",st:"You climb narrow stairs. They get tighter. You emerge by massive bells. The city spreads. When they ring, the world shakes. You\'re in the center of sound.",im:"It\'s been ringing for 500 years. Same bells. Same metal. Now you stand beside them.",t:"You climb narrow stairs. They get tighter. You emerge by massive bells. The city spreads. When they ring, the world shakes. You\'re in the center of sound.\",im:\"It\'s been ringing for 500 years. Same bells. Same metal. Now you stand beside them.\",t:\"Tyn Church, Old Town. €3 entry to tower. Open 10am-5pm. The climb is tight but manageable. The view is stunning.",c:["history_big", "high_spots"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:99,n:"Prague Astronomical Museum — Hidden Collection",a:"Old Town",v:["weird", "history", "hidden"],d:99,s:"A tiny museum about Prague\'s role in astronomical discovery",st:"You find instruments. Old telescopes. Star charts. Prague had astronomers. Important ones. Now you see what they saw.",im:"It\'s medieval. Prague academics study the stars. They map. They predict. Their work endures.",t:"You find instruments. Old telescopes. Star charts. Prague had astronomers. Important ones. Now you see what they saw.\",im:\"It\'s medieval. Prague academics study the stars. They map. They predict. Their work endures.\",t:\"Prague astronomy museum locations (ask tourism). €3-5 entry. Open 10am-5pm. Very specialized. Very interesting if you like science.",c:["weird", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:100,n:"Nusle Bridge Art Installation — Underpass Gallery",a:"Nusle",v:["art", "weird", "hidden"],d:100,s:"Murals and installations under a highway bridge — underground art space",st:"You walk under the bridge. The pillars are covered in art. It\'s anarchic. It\'s alive. The art reclaims the underbelly of the city.",im:"It\'s urban. Artists claim the forgotten space. Now it\'s a gallery.",t:"You walk under the bridge. The pillars are covered in art. It\'s anarchic. It\'s alive. The art reclaims the underbelly of the city.\",im:\"It\'s urban. Artists claim the forgotten space. Now it\'s a gallery.\",t:\"Nusle Bridge area. Free. Walking tour, self-guided. Best in daylight. The street art changes seasonally. Very local vibe.",c:["art", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:101,n:"Vojan Park Secret Benches",a:"Malá Strana",v:["quiet", "hidden", "beautiful"],d:101,s:"A hidden park where locals sit and read — zero tourists",st:"You find a gate. You push. Inside, a park frozen in time. Benches. Trees. A chapel ruin. It\'s peaceful. It\'s yours. Nobody else knows.",im:"It\'s been like this for 200 years. Locals come. They sit. They read. They keep it secret.",t:"You find a gate. You push. Inside, a park frozen in time. Benches. Trees. A chapel ruin. It\'s peaceful. It\'s yours. Nobody else knows.\",im:\"It\'s been like this for 200 years. Locals come. They sit. They read. They keep it secret.\",t:\"Malá Strana (small gate on street). Free. Open dawn-dusk. Very few tourists. Bring a book. The quiet is absolute.",c:["quiet", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:102,n:"Chalice Restaurant — Icon Location",a:"Old Town",v:["history", "weird"],d:102,s:"The pub where Good Soldier Švejk was set — drinking where literature lives",st:"You sit in the restaurant. This is where the character was created. You drink beer where he drank. The walls hold that history. The beer is real.",im:"It\'s 1910. An author sits here. He imagines a soldier. The soldier becomes immortal. Now you sit in the place where immortality was born.",t:"You sit in the restaurant. This is where the character was created. You drink beer where he drank. The walls hold that history. The beer is real.\",im:\"It\'s 1910. An author sits here. He imagines a soldier. The soldier becomes immortal. Now you sit in the place where immortality was born.\",t:\"Nerudova street, Old Town. Beer €2-4. Food cheap and good. Very touristy now. But the history is real. Go anyway.",c:["history_big", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:103,n:"Obecní Dům Czech Ballroom",a:"Old Town",v:["beautiful", "history"],d:103,s:"An Art Nouveau hall where Prague\'s elite danced — now you can dance in the same space",st:"You walk into a ballroom. The ceiling is frescoed. The walls are frescoed. Crystal chandeliers. It\'s a time capsule of beauty. History was made here. Now new history makes itself.",im:"It\'s 1900. The ballroom opens. Prague dances. Generations dance. Now you\'re part of the dance.",t:"You walk into a ballroom. The ceiling is frescoed. The walls are frescoed. Crystal chandeliers. It\'s a time capsule of beauty. History was made here. Now new history makes itself.\",im:\"It\'s 1900. The ballroom opens. Prague dances. Generations dance. Now you\'re part of the dance.\",t:\"Obecní Dům, Old Town. Tours €12. Or attend a concert/event. Very beautiful. Go even just to see the exterior.",c:["beautiful", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:104,n:"Zbraslav Monastery Baroque Library",a:"Zbraslav (south Prague)",v:["history", "beautiful"],d:104,s:"A countryside monastery with a Baroque library of 300,000 books",st:"You find a monastery in nature. The library is immense. Books everywhere. Ladders. Galleries. It\'s a cathedral to reading.",im:"It\'s 1600. Monks build a library. They collect books. Now it\'s immense. Now you\'re inside their obsession.",t:"You find a monastery in nature. The library is immense. Books everywhere. Ladders. Galleries. It\'s a cathedral to reading.\",im:\"It\'s 1600. Monks build a library. They collect books. Now it\'s immense. Now you\'re inside their obsession.\",t:\"Zbraslav (bus 30min from Prague). €8 entry. Open 10am-5pm. Very worth the trip. Bring time. The library is hypnotic.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:105,n:"Powder Tower Basement Mystery",a:"Old Town",v:["weird", "history", "hidden"],d:105,s:"Below the famous tower, a basement where medieval secrets wait in darkness",st:"You descend from the tower. A basement opens. Stone. Darkness. It\'s unexplained. It\'s medieval. It\'s yours to interpret.",im:"It\'s medieval. Someone carved this. Why is unknown. Now you wonder.",t:"You descend from the tower. A basement opens. Stone. Darkness. It\'s unexplained. It\'s medieval. It\'s yours to interpret.\",im:\"It\'s medieval. Someone carved this. Why is unknown. Now you wonder.\",t:\"Powder Tower. €5 entry (includes basement). Open 10am-6pm. The climb and descent is memorable. Bring a light.",c:["weird", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""}

  {id:108,n:"Letná Park Metronome Viewpoint",a:"Letná",v:["beautiful","free","history"],d:20,s:"Giant metronome on a hill with panoramic city views and skater culture",st:"The Letná Park metronome was built on the pedestal where a Stalin statue once stood. Now it swings eternally. The overlook offers perfect Prague photos; skaters use the nearby slopes. It\'s free, iconic, and full of local life.",im:"Time-travel: The Stalin statue dominated 1955-1962; now the metronome symbolizes freedom.",t:"Free. Metro or walk to Letná Park.",c:["high_spots","history_big"],r:"g",nn:"Letná Metrnom",ns:"Metrónomo gigante con vistas panorámicas",nst:"Sube a Letná para vistas completas de Praga.",nt:"Gratis. Metro a Letná."},
  {id:109,n:"Žižkov Street Art & Bohemia District",a:"Žižkov",v:["art","free","local"],d:15,s:"Gritty bohemian neighborhood with murals and working-class bars",st:"Žižkov resists gentrification. Murals cover buildings, bars are cheap and authentic, and locals aren\'t performed-for tourists. It\'s the real Prague: imperfect, vibrant, and genuine.",im:"Time-travel: Žižkov was a working-class district; it\'s becoming trendy but resists it.",t:"Free to explore. Beers in bars ~€1-2.",c:["street_art","local_only"],r:"g",nn:"Žižkov Bohemica",ns:"Distrito bohemio con murales y bares auténticos",nst:"Explora la verdadera Praga en Žižkov.",nt:"Gratis explorar. Cervezas muy baratas."}

,{id:119,n:"Hanavský Pavilon viewpoint",a:"Letná",v:["hidden", "viewpoint"],d:20,s:"Calmer sunset perch away from the crowds!",st:"Escape the packed ledges for this serene spot overlooking Prague's skyline. Feel the golden hour magic without the hustle. Perfect for broke romantics dreaming big.",im:"Imagine sipping a sneaky beer as the sun dips behind the castle, city lights flickering to life below.",t:"5 min walk from Letná Metronome; tram to Letenské náměstí. Free always. Best at sunset. Almost free and worth it: nearby beer garden, ~50 CZK pint.",c:["viewpoints", "parks"],r:"g",nn:"Hanavský pavilon",ns:"Klidný západ slunce mimo dav!",nst:"Unikněte přeplněným lavičkám do tohoto klidného místa s výhledem na panoramatu Prahy. Pocítíte kouzlo zlaté hodiny bez shonu. Ideální pro romantiky na suchu.",nt:"5 min chůze od metronomu Letná; tramvaj na Letenské náměstí. Vždy zdarma. Nejlepší při západu slunce. Takřka zdarma a stojí za to: nedaleký pivní zahrad, ~50 Kč pivo."},
{id:120,n:"Kasárna Karlín courtyard",a:"Karlín",v:["hidden", "local"],d:25,s:"Huge ex-barracks yard pulsing with local art vibes!",st:"Wander this massive open space where pop-ups and street art mix with chill hangs. Soak up authentic Prague energy without spending a crown. People-watch like a pro spy.",im:"Picture yourself lounging on the grass amid graffiti walls, locals chatting as evening sun casts long shadows.",t:"Metro Křižíkova. Free entry, just vibe. Best evenings/weekends. ef: Nearby Lidová jídelna, daily menu ~150 CZK.",c:["courtyards", "street-art"],r:"g",nn:"Kasárna Karlín",ns:"Procházejte tímto obrovským otevřeným prostorem, kde se pop-upy a street art mísí s chillováním. Nasákněte autentickou pražskou energií bez koruny. Pozorujte lidi jako profík špeh.",nt:"Metro Křižíkova. Vstup zdarma, jen relaxujte. Nejlepší večery/víkendy. ef: Nedaleko Lidová jídelna, denní menu ~150 Kč."},
{id:121,n:"Cross Club exterior",a:"Holešovice",v:["hidden", "weird"],d:30,s:"Steampunk metal madness on the building facade!",st:"Gawk at the kinetic industrial sculpture twisting in the night breeze. Neighborhood's gritty weirdness amps the adventure. Free front-row seat to Prague's wild side.",im:"Envision giant gears and pipes churning like a cyberpunk dream under neon glows.",t:"Metro Nádraží Holešovice. Exterior free 24/7. Best after dark. ef: Holesovická tržnice cheap eats, ~100 CZK.",c:["architecture", "street-art"],r:"g",nn:"Cross Club",ns:"Parní punk kovové šílenství na fasádě!",nst:"Zírujte na kinetickou industriální sochu, která se kroutí v nočním vánku. Gritty podivnost okolí navyšuje dobrodružství. Zdarma první řada do divoké strany Prahy.",nt:"Metro Nádraží Holešovice. Exteriér zdarma 24/7. Nejlepší po tmě. ef: Holesovická tržnice levné jídlo, ~100 Kč."},
{id:122,n:"Nádraží Holešovice station",a:"Holešovice",v:["hidden", "gritty"],d:15,s:"Gritty people-watching at the weird train hub!",st:"Blend into the eclectic crowd at this under-the-radar station. Pair with nearby oddities for max offbeat detour. Raw Prague pulses here unfiltered.",im:"Feel the buzz of travelers and locals weaving through faded platforms at dusk.",t:"Metro Nádraží Holešovice. Free anytime. Best rush hours for vibes. ef: Vietnamese stands at market, ~80 CZK.",c:["stations", "people-watching"],r:"g",nn:"Nádraží Holešovice",ns:"Špinavé pozorování lidí na podivném nádraží!",nst:"Ponor se do eklektického davu na tomto podradarovém nádraží. Spoj s blízkými podivnostmi pro max offbeat odbočku. Syrová Praha tu pulzuje nefilrováno.",nt:"Metro Nádraží Holešovice. Zdarma kdykoli. Nejlepší v špičce pro atmosféru. ef: Vietnamci na trhu, ~80 Kč."},
{id:123,n:"Havelská Market wander",a:"Old Town",v:["hidden", "market"],d:10,s:"Sensory overload in classic Old Town market chaos!",st:"Dive into sights, smells, and cheap produce amid the bustle. Skip tourist traps for real local snack hits. Pure Prague sensory adventure on zero budget.",im:"Breathe in fresh fruit aromas as vendors hawk their wares under colorful awnings.",t:"Near Old Town Square, metro Staroměstská. Free wander daily. Mornings freshest. ef: Budget produce ~50 CZK.",c:["markets"],r:"g",nn:"Havelská tržnice",ns:"Smyslový přetížení v klasickém chaosu trhu!",nst:"Ponoř se do pohledů, vůní a levného ovoce uprostřed shonu. Přeskoč turistické pasti pro skutečné místní snacky. Čisté pražské smyslové dobrodružství na nulu.",nt:"U Staroměstského náměstí, metro Staroměstská. Procházka zdarma denně. Ráno nejčerstvější. ef: Levné ovoce ~50 Kč."},
{id:124,n:"Rudolfinum Gallery free days",a:"Staré Město",v:["hidden", "art"],d:15,s:"Classy art without the National Gallery price tag!",st:"Slip into elegant halls for cultured vibes on free entry days. Feels like a secret date spot for art lovers. Prague's refined side, zero cost.",im:"Stand mesmerized by modern masterpieces in gilded rooms echoing with whispers.",t:"Jan Palach Sq, metro Staroměstská. Free on select days (check Co je v Praze zadarmo). Best weekdays. ef: Nearby Jídelna ~120 CZK.",c:["galleries", "free-events"],r:"g",nn:"Rudolfinum galerie",ns:"Kulturní umění bez cen Národní galerie!",nst:"Vklouzni do elegantních sálů pro kulturní atmosféru v dny zdarma. Cítí se jako tajný rande místo pro milovníky umění. Uhlazená strana Prahy, nula nákladů.",nt:"Náměstí Jana Palacha, metro Staroměstská. Zdarma vybrané dny (zkontroluj Co je v Praze zadarmo). Nejlepší pracovní dny. ef: Nedaleko Jídelna ~120 Kč."},
{id:125,n:"Hostivař Reservoir pier",a:"Prague 10",v:["hidden", "nature"],d:45,s:"Secret summer pier dipping into urban waters!",st:"Escape city buzz for waterside chill at this Reddit-faved spot. Lounge on the free pier with skyline distant. Wild swimming vibes for adventurers.",im:"Dangle feet in cool reservoir waters, birds skimming the surface at golden hour.",t:"Bus/tram from center ~40min. Free access summer. Best warm evenings. sf: Bezkempu.cz nearby private spots ~200 CZK/night.",c:["nature", "swimming"],r:"g",nn:"Hostivařská příhrada",ns:"Tajný letní můl do městských vod!",nst:"Unikněte městskému shonu k vodnímu chlápnutí na tomto Reddit oblíbenci. Oddychujte na zdarma molo s panoramatem v dálce. Divoké plavecké vibrace pro dobrodruhy.",nt:"Autobus/tramvaj z centra ~40min. Zdarma přístup léto. Nejlepší teplé večery. sf: Bezkempu.cz blízko soukromé místa ~200 Kč/noc."},
{id:126,n:"Vltava grassy access spots",a:"Prague 4",v:["hidden", "river"],d:35,s:"Free riverbank dips between bridges!",st:"Reddit-hidden lawns for toes-in-Vltava moments. Picnic perilously close to boat wakes. Ultimate budget riverside rebel spot.",im:"Splash barefoot on hidden grass as barges glide by, castle glowing afar.",t:"Between Branické ledárny & Branický most, tram/bus. Free summer. Dawn/dusk best, mind boats. ef: Náplavka market snacks ~60 CZK.",c:["river", "nature"],r:"g",nn:"Vltavské trávnaté přístupy",ns:"Zdarma šplouchání u řeky mezi mosty!",nst:"Reddit skryté trávníky pro chvilky nohou ve Vltavě. Piknik nebezpečně blízko vln lodí. Ultimátní budget rebelské místo u řeky.",nt:"Mezi Branické ledárny & Branický most, tramvaj/autobus. Zdarma léto. Úsvit/soumrak nejlepší, pozor na lodě. ef: Náplavka trh snacky ~60 Kč."},
{id:127,n:"Náplavka riverbank stroll",a:"Nové Město",v:["hidden", "stroll"],d:25,s:"Busker-filled evening riverside vibe fest!",st:"Stroll with live tunes and boat views under Vyšehrad. Market days amp the cheap snack scene. Free flow of Prague's coolest evening energy.",im:"Dance to street guitar as lights reflect on rippling Vltava waves.",t:"Under Vyšehrad, tram from center. Free daily, markets weekends. Evenings magic. ef: Farmers market weekends ~100 CZK.",c:["river", "street-performers"],r:"g",nn:"Náplavka",ns:"Buskeři plná večerní říční vibe!",nst:"Procházka s živou hudbou a výhledy na lodě pod Vyšehradem. Tržní dny navyšují levné snacky. Zdarma tok nejlepší večerní energie Prahy.",nt:"Pod Vyšehradem, tram z centra. Zdarma denně, trhy vikendy. Večery kouzelné. ef: Farmářský trh vikendy ~100 Kč."}];

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Prague Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
