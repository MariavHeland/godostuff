<script>
const P = [
  {id:1,n:"Petřín Lookout Tower at sunset",a:"Petřín",v:["beautiful", "high_spots"],d:1,s:"An Eiffel Tower replica where the city turns gold",st:"The tower was built in 1891. Climb the 299 steps or ride the funicular. At the top, Prague sprawls 360 degrees. The Vltava winds like a snake. The spires catch fire at sunset.",im:"It\'s 1890. Engineers build a tower as a joke—an homage to Paris. It stands. It watches. People climb it. The joke becomes beloved.",t:"The tower was built in 1891. Climb the 299 steps or ride the funicular. At the top, Prague sprawls 360 degrees. The Vltava winds like a snake. The spires catch fire at sunset.\",im:\"It\'s 1890. Engineers build a tower as a joke—an homage to Paris. It stands. It watches. People climb it. The joke becomes beloved.\",t:\"Petřín Park. Funicular ticket €2. Open daily 10am-10pm. Go 30 minutes before sunset. Bring wind-resistant jacket. The views south are best from the platform.",c:["high_spots", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:2,n:"Žižkov TV Tower babies",a:"Žižkov",v:["weird", "history"],d:2,s:"A brutalist tower with climbing bronze babies on its exterior",st:"In 1992, artist David Černý bolted 10 bronze infants crawling up the tower\'s legs. It\'s grotesque. It\'s genius. The Communists hated it. Now it\'s iconic. The babies grin as they climb.",im:"It\'s 1992. A young artist glues babies to a Communist monument. The city wakes up to art terrorism. Nobody takes them down. They stay. Art wins.",t:"In 1992, artist David Černý bolted 10 bronze infants crawling up the tower\'s legs. It\'s grotesque. It\'s genius. The Communists hated it. Now it\'s iconic. The babies grin as they climb.\",im:\"It\'s 1992. A young artist glues babies to a Communist monument. The city wakes up to art terrorism. Nobody takes them down. They stay. Art wins.\",t:\"Žižkovská, Žižkov. Free to view. Best photos from the street level looking up. The tower has a restaurant inside (€15 cover). Go outside on the observation deck at night.",c:["weird", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:3,n:"Astronomical Clock\'s hidden back room",a:"Staré Město",v:["hidden", "history"],d:3,s:"Behind the famous clock, a secret 15th-century room survived bombing",st:"The clock is mobbed. But climb above it. The original mechanism room remains. Gears and weights. Medieval engineering. The clockmaker\'s workspace frozen in time. Few tourists make it here.",im:"It\'s 1490. A clockmaker crafts the mechanism. It will work for 500 years. He dies. The clock stays. It outlives everyone who watches it.",t:"The clock is mobbed. But climb above it. The original mechanism room remains. Gears and weights. Medieval engineering. The clockmaker\'s workspace frozen in time. Few tourists make it here.\",im:\"It\'s 1490. A clockmaker crafts the mechanism. It will work for 500 years. He dies. The clock stays. It outlives everyone who watches it.\",t:\"Old Town Square. €4 entry to climb. Hours 9am-6pm. Go at 3pm when crowds thin. The back stairs are narrow. Bring curiosity, not cameras—light is poor.",c:["hidden", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:4,n:"Underground tunnels of Old Town",a:"Staré Město",v:["history", "scary"],d:4,s:"Medieval Prague exists one story below the street",st:"The city built up. The old level was buried. Now tunnels honeycomb beneath Old Town Square. You walk on Medieval vaults. The floor above is the modern world. Below is the past, still intact.",im:"It\'s 1350. A merchant walks above. In 1950, he walks below. The streets rose. The old city sank. Now we descend to see what we buried.",t:"The city built up. The old level was buried. Now tunnels honeycomb beneath Old Town Square. You walk on Medieval vaults. The floor above is the modern world. Below is the past, still intact.\",im:\"It\'s 1350. A merchant walks above. In 1950, he walks below. The streets rose. The old city sank. Now we descend to see what we buried.\",t:\"Underground tours depart from Old Town Square. €12 per person. 90-minute tours. Go early—slots fill fast. Wear good shoes. The air is damp. The walls drip history.",c:["history_big", "scary"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:5,n:"Kafka\'s birthplace apartment",a:"Staré Město",v:["history", "hidden"],d:5,s:"The small house where one of the 20th century\'s strangest minds was born",st:"The room is tiny. The walls are thin. Kafka was born in this cramped space. Is it any wonder he wrote about claustrophobic bureaucracies? The building itself is a confession.",im:"It\'s 1883. A boy is born in this room. He\'ll grow up to write about trials and transformations. The room is already too small.",t:"The room is tiny. The walls are thin. Kafka was born in this cramped space. Is it any wonder he wrote about claustrophobic bureaucracies? The building itself is a confession.\",im:\"It\'s 1883. A boy is born in this room. He\'ll grow up to write about trials and transformations. The room is already too small.\",t:\"U Radnice 5, Old Town Square. €2 entry. Open 10am-6pm. It\'s a small house on the square—easy to miss. The museum is intimate, not grand.",c:["history_big", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:6,n:"Jewish Quarter narrow streets (Josefov)",a:"Josefov",v:["history", "sad"],d:6,s:"Streets so narrow daylight barely touches ground level",st:"The ghetto was cramped by law. 40,000 people lived in 10 blocks. The buildings rose five, six, seven stories to fit everyone in. Walk here and feel the compression. The sadness is physical.",im:"It\'s 1880. Families stack on families. A child born here may never see the sky between buildings. The ghetto is a prison made of regulation.",t:"The ghetto was cramped by law. 40,000 people lived in 10 blocks. The buildings rose five, six, seven stories to fit everyone in. Walk here and feel the compression. The sadness is physical.\",im:\"It\'s 1880. Families stack on families. A child born here may never see the sky between buildings. The ghetto is a prison made of regulation.\",t:\"Enter from Pařížská Street. Most buildings are museums now (€30 pass). The streets themselves are free to walk. Go early morning before crowds. Photography is free on the streets.",c:["history_big", "sad"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:7,n:"Powder Tower at night",a:"Nové Město",v:["history", "beautiful", "night"],d:7,s:"A 15th-century gate lit from within glows like a lantern",st:"The tower was the start of the Old Town. It\'s been destroyed and rebuilt. Now it\'s lit in amber. Walk around it at night. The stone looks alive. The color pulses with history.",im:"It\'s 1475. The tower is completed. It stands 65 meters. It will defend the city. It will watch the city. It will become a symbol.",t:"The tower was the start of the Old Town. It\'s been destroyed and rebuilt. Now it\'s lit in amber. Walk around it at night. The stone looks alive. The color pulses with history.\",im:\"It\'s 1475. The tower is completed. It stands 65 meters. It will defend the city. It will watch the city. It will become a symbol.\",t:\"Náměstí Republiky. €3 entry to climb. Open 10am-6pm. Go at dusk to see it light up. The views from the top see the Castle. The climb is steep but short.",c:["history_big", "beautiful", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:8,n:"Letná Park wooden TV tower viewing platform",a:"Letná",v:["beautiful", "high_spots"],d:8,s:"A panoramic platform above Prague where locals watch the sunset",st:"This isn\'t a tower. It\'s a flat platform in a park. The city unfolds below. The Vltava makes oxbow curves. The Castle glows in the west. Locals bring wine and friends. Tourists miss it entirely.",im:"It\'s 1970. A family picnics here on a summer evening. The city is theirs. The sunset lasts forever. This moment is not in any guidebook.",t:"This isn\'t a tower. It\'s a flat platform in a park. The city unfolds below. The Vltava makes oxbow curves. The Castle glows in the west. Locals bring wine and friends. Tourists miss it entirely.\",im:\"It\'s 1970. A family picnics here on a summer evening. The city is theirs. The sunset lasts forever. This moment is not in any guidebook.\",t:\"Letenské Sady Park. Enter from Dukelských hrdinů Street. Free. Open always. Best time: 6pm-9pm. Bring wine and bread. Sit on the grass. Watch the city change color.",c:["beautiful", "high_spots"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:9,n:"Communist-era apartment block \'Panel\' housing",a:"Holešovice",v:["weird", "history"],d:9,s:"Massive concrete panel buildings from the 1960s-80s still house families",st:"They\'re ugly. They\'re functional. They\'re everywhere. Inside, families have made homes. The blocks are monuments to efficiency over beauty. Walk among them. Feel the ideology made concrete.",im:"It\'s 1975. Families move into new panel apartments. No beauty, but shelter. Guaranteed by the state. They should be grateful. They are. And they aren\'t.",t:"They\'re ugly. They\'re functional. They\'re everywhere. Inside, families have made homes. The blocks are monuments to efficiency over beauty. Walk among them. Feel the ideology made concrete.\",im:\"It\'s 1975. Families move into new panel apartments. No beauty, but shelter. Guaranteed by the state. They should be grateful. They are. And they aren\'t.\",t:\"Palackého Náměstí, Holešovice. Take Metro B to Holešovická. The blocks are massive—impossible to miss. Walk through the courtyards. Talk to residents if possible. It\'s not scary, just striking.",c:["weird", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:10,n:"Vyšehrad fortress\'s grass cemetery",a:"Vyšehrad",v:["history", "quiet", "sad"],d:10,s:"A medieval fortress where famous Czechs are buried under open sky",st:"The graveyard is a meadow. Headstones sit in grass. Composers, writers, actors. The city is below. The cemetery is above. The dead have a better view than they did in life.",im:"It\'s 1880. A great man dies. He\'s buried here, on the hill. Below, the city continues. Above, he watches it all. Finally, he has perspective.",t:"The graveyard is a meadow. Headstones sit in grass. Composers, writers, actors. The city is below. The cemetery is above. The dead have a better view than they did in life.\",im:\"It\'s 1880. A great man dies. He\'s buried here, on the hill. Below, the city continues. Above, he watches it all. Finally, he has perspective.\",t:\"Vyšehradské Nám. Free entry. Open 9am-6pm. Bring a map of graves—Czech names are hard to find. Spend time here. This cemetery is meditation, not tourism.",c:["history_big", "quiet", "sad"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:11,n:"Smetana Museum beside Charles Bridge",a:"Malá Strana",v:["history", "hidden"],d:11,s:"The home of the composer who wrote \'My Homeland\' is a tiny Renaissance house",st:"Smetana lived here briefly. The museum is small. But it\'s beside the bridge where musicians play. His spirit still inhabits the corner. The Vltava flows past. His music still plays.",im:"It\'s 1880. A composer sits at a window overlooking the bridge. Musicians play below. His ears are failing. He composes from memory and silence now.",t:"Smetana lived here briefly. The museum is small. But it\'s beside the bridge where musicians play. His spirit still inhabits the corner. The Vltava flows past. His music still plays.\",im:\"It\'s 1880. A composer sits at a window overlooking the bridge. Musicians play below. His ears are failing. He composes from memory and silence now.\",t:\"Novotného Lávka 1. €2 entry. Open 10am-5pm. It\'s tiny—20 minutes is enough. The real museum is the Vltava and bridge views from the house.",c:["history_big", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:12,n:"Catacombs of St. Vitus Cathedral",a:"Prague Castle",v:["scary", "history"],d:12,s:"Underground passages where ancient burials rest beneath the Cathedral",st:"You descend below centuries of royalty. The bones of early Czech nobles are here. It\'s dark. It\'s cool. It\'s the foundation that everything stands on. Above, tourists mob the cathedral. Below, the dead sleep.",im:"It\'s 1200. A bishop is buried here. The crypt is carved from rock. Centuries pass. More bodies join. The darkness accumulates.",t:"You descend below centuries of royalty. The bones of early Czech nobles are here. It\'s dark. It\'s cool. It\'s the foundation that everything stands on. Above, tourists mob the cathedral. Below, the dead sleep.\",im:\"It\'s 1200. A bishop is buried here. The crypt is carved from rock. Centuries pass. More bodies join. The darkness accumulates.\",t:\"St. Vitus Cathedral crypt entry. €5 added to cathedral ticket. It\'s cold—bring a sweater. Wear sturdy shoes. The stairs are medieval—narrow and steep.",c:["scary", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:13,n:"Old Jewish Cemetery (Starý Židovský hřbitov)",a:"Josefov",v:["history", "sad", "quiet"],d:13,s:"Twelve layers of graves compressed into an impossibly small space",st:"The ghetto had limited land. Jews were confined. When they died, there was nowhere to bury them but up. The cemetery stacks graves vertically. The stones lean at angles. The sadness is architecture.",im:"It\'s 1700. A mother is buried. Her son is buried above her. His wife above him. There\'s no room. Space is forced to expand upward. The stone shoulders touch.",t:"The ghetto had limited land. Jews were confined. When they died, there was nowhere to bury them but up. The cemetery stacks graves vertically. The stones lean at angles. The sadness is architecture.\",im:\"It\'s 1700. A mother is buried. Her son is buried above her. His wife above him. There\'s no room. Space is forced to expand upward. The stone shoulders touch.\",t:\"U Staré Školy. €8 entry (combined with Pinkas Synagogue). Open 9am-6pm. Go early. Walk slowly. This is mourning made physical. Bring respect.",c:["history_big", "sad", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:14,n:"Kampa Island water wheel remnants",a:"Kampa",v:["beautiful", "history"],d:14,s:"Medieval water wheels still turn beneath Charles Bridge",st:"The wheels powered mills centuries ago. Now they\'re decorative. One still operates. The Vltava water flows. The wheel creaks. It\'s mechanical poetry. Time moves in circles here.",im:"It\'s 1400. Water mills operate. Grain becomes flour. The wheels turn every day. In 2024, they still turn. The river hasn\'t changed its mind.",t:"The wheels powered mills centuries ago. Now they\'re decorative. One still operates. The Vltava water flows. The wheel creaks. It\'s mechanical poetry. Time moves in circles here.\",im:\"It\'s 1400. Water mills operate. Grain becomes flour. The wheels turn every day. In 2024, they still turn. The river hasn\'t changed its mind.\",t:\"Nerudova Street or Malostranská. The wheels are visible from the bridge or from the water level paths. Walk to the island\'s edge. The sound of turning water is meditative.",c:["beautiful", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:15,n:"Barrandov film studios outdoor sets",a:"Barrandov",v:["weird", "history"],d:15,s:"A 1930s film studio where fake Prague sets remain abandoned",st:"The studio built movie sets. Some still stand. Half-built facades. Cardboard cities. It\'s a graveyard of cinematic dreams. Walk through. The sets look real at first. Then you notice the lack of depth.",im:"It\'s 1935. Directors build Prague in miniature. Actors perform. Cameras roll. By 1945, it\'s all burned or abandoned. The ruins remain.",t:"The studio built movie sets. Some still stand. Half-built facades. Cardboard cities. It\'s a graveyard of cinematic dreams. Walk through. The sets look real at first. Then you notice the lack of depth.\",im:\"It\'s 1935. Directors build Prague in miniature. Actors perform. Cameras roll. By 1945, it\'s all burned or abandoned. The ruins remain.\",t:\"Barrandovská, Barrandov. Studio tours available €10. The outdoor sets are accessible on some days. Call ahead. The location is real but access is limited.",c:["weird", "history_big", "abandoned"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:16,n:"Smíchov industrial riverside path",a:"Smíchov",v:["weird", "history"],d:16,s:"Walking along the Vltava past abandoned factories and urban decay",st:"Old breweries. Closed textile mills. The river was the lifeblood of industry. Now the buildings leak. Ivy grows through windows. Artists squat. The past is tangible, rotting softly into the future.",im:"It\'s 1890. Factories pump smoke. Workers flow toward the river. By 2010, the buildings are ghosts. The river remembers what they made.",t:"Old breweries. Closed textile mills. The river was the lifeblood of industry. Now the buildings leak. Ivy grows through windows. Artists squat. The past is tangible, rotting softly into the future.\",im:\"It\'s 1890. Factories pump smoke. Workers flow toward the river. By 2010, the buildings are ghosts. The river remembers what they made.\",t:\"Rybářský Ostrov to Dívčí hráz. Walk along the water. The path is free and accessible. Best in early morning when light is low and the decay is beautiful. Photography is excellent.",c:["weird", "abandoned", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:17,n:"Prague Nuclear Bunker (Krčená Věž)",a:"Vinohrady",v:["scary", "history"],d:17,s:"A Cold War nuclear bunker disguised as an apartment building",st:"The ground floor is fake. Below exists a reinforced bunker designed to survive apocalypse. Beds, supplies, communication equipment. It was never used. The Cold War ended. The bunker remains, holding its breath.",im:"It\'s 1965. Engineers build underneath. Nobody knows. The apartment above is normal. But below, Armageddon is prepared for. The waiting never ends.",t:"The ground floor is fake. Below exists a reinforced bunker designed to survive apocalypse. Beds, supplies, communication equipment. It was never used. The Cold War ended. The bunker remains, holding its breath.\",im:\"It\'s 1965. Engineers build underneath. Nobody knows. The apartment above is normal. But below, Armageddon is prepared for. The waiting never ends.\",t:\"Olšanská, Vinohrady. Tours €10. Reservations required. The tours are in Czech—English available on request. It\'s genuinely creepy. Bring claustrophobia tolerance.",c:["scary", "history_big"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:18,n:"Charles Bridge midnight walk",a:"Staré Město/Malá Strana",v:["beautiful", "history", "night"],d:18,s:"Fourteen statues stand guard while the city sleeps",st:"By day, it\'s mobbed. By midnight, it\'s yours. The Vltava flows beneath. The statues stand in shadow. Each is carved with intention. Walk slowly. Listen to your footsteps echo across medieval stone.",im:"It\'s 1350. The bridge is new. Statues will be added over centuries. A night walker in 1500 sees fewer statues than today. A walker in 2500 will see the same ones, older.",t:"By day, it\'s mobbed. By midnight, it\'s yours. The Vltava flows beneath. The statues stand in shadow. Each is carved with intention. Walk slowly. Listen to your footsteps echo across medieval stone.\",im:\"It\'s 1350. The bridge is new. Statues will be added over centuries. A night walker in 1500 sees fewer statues than today. A walker in 2500 will see the same ones, older.\",t:\"Charles Bridge. Free. Open 24 hours. Go between midnight and 5am. The crowds are gone. The light is blue. The magic is real.",c:["beautiful", "history_big", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:19,n:"Kafka Museum\'s dark chamber",a:"Malá Strana",v:["history", "hidden"],d:19,s:"A room dedicated to Kafka\'s paranoia and alienation",st:"The museum explores his writing. But one room amplifies the themes. Walls close in. The light fades. It\'s a physical representation of his prose. Leave feeling slightly anxious. That\'s the point.",im:"It\'s 1920. A writer sits in a small room. He writes about bureaucracy that traps. He\'s writing about his life. The room reflects the writing. The suffering is recursive.",t:"The museum explores his writing. But one room amplifies the themes. Walls close in. The light fades. It\'s a physical representation of his prose. Leave feeling slightly anxious. That\'s the point.\",im:\"It\'s 1920. A writer sits in a small room. He writes about bureaucracy that traps. He\'s writing about his life. The room reflects the writing. The suffering is recursive.\",t:\"Nový Svět 20. €10 entry. Open 10am-6pm. The dark chamber is the finale—emotional not sensory. Go slowly. Don\'t rush. Let the discomfort settle.",c:["history_big", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:20,n:"Vinohrady vineyard remnants",a:"Vinohrady",v:["beautiful", "history", "quiet"],d:20,s:"Stone terraces where grapes once grew now frame the city view",st:"The neighborhood is named for vineyards that are long gone. But the stone walls remain. Grapevines are being replanted. The past is being resurrected. The terraces slope down toward the river. The view is intact.",im:"It\'s 1700. Wine is made here. The grapes are sweet. By 1900, the vineyards are paved over. In 2020, someone plants a vine again. Memory starts to return.",t:"The neighborhood is named for vineyards that are long gone. But the stone walls remain. Grapevines are being replanted. The past is being resurrected. The terraces slope down toward the river. The view is intact.\",im:\"It\'s 1700. Wine is made here. The grapes are sweet. By 1900, the vineyards are paved over. In 2020, someone plants a vine again. Memory starts to return.\",t:\"Riegrovy Sady Park. Free entry. The vineyard terraces are visible from pathways. Restored grape plantings are labeled. Sit on the terraces. The city spreads below.",c:["beautiful", "history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:21,n:"Ghost statues of Žižkov",a:"Žižkov",v:["weird", "hidden"],d:21,s:"Plaster statues left over from Communist era line a street",st:"When monuments were removed, some statues were hidden in a basement. Now they\'re displayed in a small gallery. Communist heroes in white plaster. Their eyes stare ahead. It\'s eerie. It\'s history as tragedy.",im:"It\'s 1989. Statues are torn down. Some are broken. Some are hidden. Decades later, they\'re displayed like ghosts. The gaze is still forward. The ideology is still frozen.",t:"When monuments were removed, some statues were hidden in a basement. Now they\'re displayed in a small gallery. Communist heroes in white plaster. Their eyes stare ahead. It\'s eerie. It\'s history as tragedy.\",im:\"It\'s 1989. Statues are torn down. Some are broken. Some are hidden. Decades later, they\'re displayed like ghosts. The gaze is still forward. The ideology is still frozen.\",t:\"Kamenická, Žižkov. The collection is in a private space. Ask locals for \"umělecká galerie\"—art gallery. Hours are limited. It\'s more about atmosphere than art-historical importance.",c:["weird", "hidden", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:22,n:"Sex Machines Museum (yes, real)",a:"Staré Město",v:["weird", "hidden"],d:22,s:"A museum of erotic mechanical inventions from the 20th century",st:"It\'s not pornographic. It\'s mechanical engineering applied to pleasure. The machines are bizarre. The history is documented. It\'s uncomfortable in a way that teaches. The collection is oddly reverent.",im:"It\'s 1950. An inventor builds a machine for pleasure. He\'s serious. The engineering is sound. The society is shocked. But the machine keeps working.",t:"It\'s not pornographic. It\'s mechanical engineering applied to pleasure. The machines are bizarre. The history is documented. It\'s uncomfortable in a way that teaches. The collection is oddly reverent.\",im:\"It\'s 1950. An inventor builds a machine for pleasure. He\'s serious. The engineering is sound. The society is shocked. But the machine keeps working.\",t:\"Husova 10. €8 entry. Open 10am-11pm. It\'s clinical, not lewd. Go at 3pm when other tourists are elsewhere. The museum is surprisingly thoughtful.",c:["weird", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:23,n:"Strahov Library manuscript collection",a:"Strahovský klášter",v:["history", "quiet"],d:23,s:"An 800-year-old monastery library with medieval manuscripts still in use",st:"The Philosophical Hall is the main room. Frescoes cover ceilings. Books line walls. Monks still use this library. The manuscripts are touched gently. Time moves slowly here. Centuries are dust on shelves.",im:"It\'s 1200. A monk copies a text by hand. His work will be used 800 years later. He doesn\'t know. He just keeps writing. His pages survive.",t:"The Philosophical Hall is the main room. Frescoes cover ceilings. Books line walls. Monks still use this library. The manuscripts are touched gently. Time moves slowly here. Centuries are dust on shelves.\",im:\"It\'s 1200. A monk copies a text by hand. His work will be used 800 years later. He doesn\'t know. He just keeps writing. His pages survive.\",t:\"Strahovský Klášter. €3 entry. Open 9am-11:45am, 1pm-5pm. The library is accessible but reverent—quiet voices only. Don\'t touch. Bring silence.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:24,n:"Vyšehrad basilica crypt of V.I. Lenin\'s friend",a:"Vyšehrad",v:["history", "scary"],d:24,s:"A saint\'s tomb in a basilica has unexpected Leninist connections",st:"St. Peter and Paul Basilica houses graves. One belonged to a revolutionary. The history is tangled. The saint and the radical share stone. Czech identity is always more complex than simple categories.",im:"It\'s 1920. A revolutionary is buried. Decades later, he\'s a villain. Centuries later, he\'s history. The church keeps the tomb. The stone doesn\'t judge.",t:"St. Peter and Paul Basilica houses graves. One belonged to a revolutionary. The history is tangled. The saint and the radical share stone. Czech identity is always more complex than simple categories.\",im:\"It\'s 1920. A revolutionary is buried. Decades later, he\'s a villain. Centuries later, he\'s history. The church keeps the tomb. The stone doesn\'t judge.\",t:\"Vyšehradská. €1 entry to basilica. The crypt requires permission from priests. Ask at the main entrance. Go early morning when priests are around. It\'s atmospheric, not touristy.",c:["history_big", "scary"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:25,n:"Old Town Hall courtyard fountain",a:"Staré Město",v:["beautiful", "history"],d:25,s:"A Renaissance fountain in a hidden courtyard off the main square",st:"The tourists mob the clock. The courtyard is empty. A fountain splashes. The Renaissance carved stone catches light. You\'re in the past. The noise of the present is outside the walls.",im:"It\'s 1550. A wealthy merchant funds the fountain. People gather. Water flows. By 2024, they still gather. The fountain still flows. Some things refuse to age.",t:"The tourists mob the clock. The courtyard is empty. A fountain splashes. The Renaissance carved stone catches light. You\'re in the past. The noise of the present is outside the walls.\",im:\"It\'s 1550. A wealthy merchant funds the fountain. People gather. Water flows. By 2024, they still gather. The fountain still flows. Some things refuse to age.\",t:\"Staroměstské Nám. 1. Enter through the archways on the side. The courtyard is free. The fountain is worth sitting beside. Bring 10 minutes of nothing to do.",c:["beautiful", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:26,n:"Kafka Hotel room (where he lived)",a:"Staré Město",v:["history", "hidden", "sad"],d:26,s:"The actual hotel room where Kafka lived is now a museum",st:"The room is small. The window is small. The light is grey. Kafka lived here writing his alienation. The room confirms his writing wasn\'t invention—it was observation of where he actually was.",im:"It\'s 1912. A man rents a small room. He sits. He writes about trials and transformations. The walls listen. They don\'t judge. They understand.",t:"The room is small. The window is small. The light is grey. Kafka lived here writing his alienation. The room confirms his writing wasn\'t invention—it was observation of where he actually was.\",im:\"It\'s 1912. A man rents a small room. He sits. He writes about trials and transformations. The walls listen. They don\'t judge. They understand.\",t:\"Husova 13. €4 entry. Open 10am-6pm. The room is accessed via a steep narrow staircase. It\'s authentic, not restored. The sadness is in the architecture.",c:["history_big", "hidden", "sad"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:27,n:"Prague\'s smallest house (Dům U Minuty)",a:"Staré Město",v:["hidden", "weird"],d:27,s:"A house so small it was never renovated because it was too cramped",st:"It sits in Old Town Square\'s corner. It\'s incredibly narrow. Families lived in it. Now it\'s a tourist shop. The narrowness is the point. Prague always had space problems. This house is the physical statement.",im:"It\'s 1450. A family of four lives here. One room is kitchen, bedroom, and everything. In winter, they barely move. It\'s survival architecture.",t:"It sits in Old Town Square\'s corner. It\'s incredibly narrow. Families lived in it. Now it\'s a tourist shop. The narrowness is the point. Prague always had space problems. This house is the physical statement.\",im:\"It\'s 1450. A family of four lives here. One room is kitchen, bedroom, and everything. In winter, they barely move. It\'s survival architecture.\",t:\"Staroměstské Nám. Look for the narrow house on the Old Town Square\'s northeast corner. It\'s now a souvenir shop. It\'s visible and accessible. The narrowness is shocking up close.",c:["hidden", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:28,n:"Petřín Observation Tower funicular railway",a:"Petřín",v:["beautiful", "history"],d:28,s:"A cable car that\'s been operating since 1891",st:"The car is wooden. It moves up Petřín Hill via a cable. The mechanism is visible. It\'s mechanical authenticity. The ascent is slow. The view expands gradually. By the top, the city is tiny.",im:"It\'s 1891. Engineers test the first ascent. It works. They rebuild it in 1960. They\'re still rebuilding it. The technology is 130 years old and still climbing.",t:"The car is wooden. It moves up Petřín Hill via a cable. The mechanism is visible. It\'s mechanical authenticity. The ascent is slow. The view expands gradually. By the top, the city is tiny.\",im:\"It\'s 1891. Engineers test the first ascent. It works. They rebuild it in 1960. They\'re still rebuilding it. The technology is 130 years old and still climbing.\",t:\"Nerudova to Petřín Park. €2 roundtrip. Open 9am-11:45pm. Go at sunset. The wooden car is the experience, not just transportation.",c:["beautiful", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:29,n:"Communism Museum\'s secret police room",a:"Nové Město",v:["history", "scary"],d:29,s:"Display of listening devices used by the StB secret police",st:"The room documents surveillance. Microphones hidden in buttons. Bugs in light fixtures. The walls were everywhere. The state was inside your home. This museum shows the intimacy of oppression.",im:"It\'s 1975. A family talks quietly. But the microphone in the light hears. The speaker in the wall broadcasts. Privacy is a lie they believe. But it\'s recorded.",t:"The room documents surveillance. Microphones hidden in buttons. Bugs in light fixtures. The walls were everywhere. The state was inside your home. This museum shows the intimacy of oppression.\",im:\"It\'s 1975. A family talks quietly. But the microphone in the light hears. The speaker in the wall broadcasts. Privacy is a lie they believe. But it\'s recorded.\",t:\"Na Příkopě 10. €6 entry. Open 9am-9pm daily. The secret police exhibit is the second floor. It\'s chilling without being theatrical. The documentation is real.",c:["history_big", "scary"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:30,n:"Vyšehrad gardens at dawn",a:"Vyšehrad",v:["beautiful", "quiet", "nature"],d:30,s:"Fortress walls encircle gardens where morning mist rises off the Vltava",st:"The fortress is medieval. The gardens are peace. Early morning, nobody is here. The Vltava mists. The city is still sleeping. The fortress watches. The gardens breathe.",im:"It\'s 1100. A fortress is built. The view matters. The defense matters. The peace in between battles is what the garden is. Now, there are no battles. Only peace.",t:"The fortress is medieval. The gardens are peace. Early morning, nobody is here. The Vltava mists. The city is still sleeping. The fortress watches. The gardens breathe.\",im:\"It\'s 1100. A fortress is built. The view matters. The defense matters. The peace in between battles is what the garden is. Now, there are no battles. Only peace.\",t:\"Vyšehradská or V Pevnosti. Free entry to grounds. Open sunrise to sunset. Go by 7am. Bring nothing but silence. This is meditation made geographic.",c:["beautiful", "quiet", "nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:31,n:"Holešovice\'s Velet Market building",a:"Holešovice",v:["weird", "history"],d:31,s:"A 1920s functionalist market hall now home to artist studios",st:"The architecture is pure Czech modernism. The interior is now chaos—artist studios, performance spaces, underground galleries. It\'s a living museum of contemporary Czech rebellion.",im:"It\'s 1928. The market opens. Vegetables and fish. By 1989, it\'s empty. In 1995, artists move in. The building finds new purpose. The walls are relieved.",t:"The architecture is pure Czech modernism. The interior is now chaos—artist studios, performance spaces, underground galleries. It\'s a living museum of contemporary Czech rebellion.\",im:\"It\'s 1928. The market opens. Vegetables and fish. By 1989, it\'s empty. In 1995, artists move in. The building finds new purpose. The walls are relieved.\",t:\"Dukelských hrdinů 47. Free to enter. Most studios open on weekends or by appointment. The building is worth seeing empty or full. Architecture is enough.",c:["weird", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:32,n:"Prague Astronomical Clock mechanism",a:"Staré Město",v:["history", "beautiful"],d:32,s:"Medieval gears still track the sun and moon after 600 years",st:"The clock face is famous. But the mechanism is the miracle. Gears carved from wood and iron. They move precisely. They calculate celestial bodies. Medieval engineering achieved perfection.",im:"It\'s 1410. A clockmaker finishes. The clock ticks. It will tick for 600 years. He doesn\'t know. He just keeps checking the gears.",t:"The clock face is famous. But the mechanism is the miracle. Gears carved from wood and iron. They move precisely. They calculate celestial bodies. Medieval engineering achieved perfection.\",im:\"It\'s 1410. A clockmaker finishes. The clock ticks. It will tick for 600 years. He doesn\'t know. He just keeps checking the gears.\",t:\"Old Town Square. €4 to enter mechanism room. Open 9am-6pm. The mechanism tour is small—maximum 10 people. Reserve ahead. You\'ll touch the gears. You\'ll understand.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:33,n:"Sternberg Palace rococo chapel",a:"Prague Castle area",v:["beautiful", "history"],d:33,s:"A private chapel where aristocrats prayed in gilt and marble",st:"The rococo style overwhelms. Every surface is decorated. Gold leaf catches light. The ceiling frescoes are impossible. It\'s religious maximalism. Prayer here means drowning in beauty.",im:"It\'s 1760. A nobleman kneels. The gold surrounds. He feels closer to God. Is it the gold or the silence? He stops asking questions.",t:"The rococo style overwhelms. Every surface is decorated. Gold leaf catches light. The ceiling frescoes are impossible. It\'s religious maximalism. Prayer here means drowning in beauty.\",im:\"It\'s 1760. A nobleman kneels. The gold surrounds. He feels closer to God. Is it the gold or the silence? He stops asking questions.\",t:\"Hradčanské Nám. 15. €8 entry (part of museum pass). Open 9am-4pm. The chapel is the best room. Go there first, before fatigue.",c:["beautiful", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:34,n:"Kampa Island\'s hidden studio doors",a:"Kampa",v:["hidden", "local"],d:34,s:"Artists\' studios tucked behind unmarked doors on a quiet island",st:"Kampa is touristy now. But deep in its streets, doors open to studios. Painters work. Sculptors carve. You\'re invited in by strangers. It\'s community art, not commercial.",im:"It\'s 2000. An artist moves to a cheap studio on Kampa. Neighbors become friends. They show their work. Nobody makes money. Everybody makes art.",t:"Kampa is touristy now. But deep in its streets, doors open to studios. Painters work. Sculptors carve. You\'re invited in by strangers. It\'s community art, not commercial.\",im:\"It\'s 2000. An artist moves to a cheap studio on Kampa. Neighbors become friends. They show their work. Nobody makes money. Everybody makes art.\",t:\"Nerudova or U Lužického semináře streets, Kampa. Walk slowly. Look for open studio doors. There\'s often a schedule posted. First Fridays usually feature open houses.",c:["hidden", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:35,n:"Waldstein Gardens secret tunnels",a:"Malá Strana",v:["hidden", "history"],d:35,s:"Baroque gardens with underground passages for escape",st:"The general built this palace. He built escape routes. The tunnels run beneath the garden toward the river. Now they\'re sealed. But the paranoia is visible in the design.",im:"It\'s 1630. A general plots. He needs escape routes. The tunnels are dug. He never uses them. But they\'re there. The fortress mentality is architecture.",t:"The general built this palace. He built escape routes. The tunnels run beneath the garden toward the river. Now they\'re sealed. But the paranoia is visible in the design.\",im:\"It\'s 1630. A general plots. He needs escape routes. The tunnels are dug. He never uses them. But they\'re there. The fortress mentality is architecture.\",t:\"Valdštejnská, Malá Strana. €5 entry to gardens. Open 10am-5pm. The tunnels are sealed—you can\'t enter them. But the design reveals the fear.",c:["hidden", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:36,n:"Nové Město brewery taproom",a:"Nové Město",v:["local", "history"],d:36,s:"A 500-year-old brewery\'s taproom where locals still gather",st:"No tourists usually. No menu. You ask for beer. They pour. The beer is perfect. The room smells like centuries. Locals nod. You sit. You exist. Time passes differently here.",im:"It\'s 1520. A man drinks beer here. In 1920, his descendant drinks. In 2024, a stranger drinks at the same bar. The beer is the only constant.",t:"No tourists usually. No menu. You ask for beer. They pour. The beer is perfect. The room smells like centuries. Locals nod. You sit. You exist. Time passes differently here.\",im:\"It\'s 1520. A man drinks beer here. In 1920, his descendant drinks. In 2024, a stranger drinks at the same bar. The beer is the only constant.\",t:\"Štupartská 3. Open 11am-11pm. No sign in English. Ask locals to point. Cash only. Plan to stay 2 hours minimum. Rushing is disrespectful.",c:["local_only", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:37,n:"Prague Puppet Museum",a:"Mala Strana",v:["weird", "hidden"],d:37,s:"Hundreds of marionettes in cases, some hundreds of years old",st:"The puppets stare. Some are broken. Some are pristine. Czech puppet tradition is ancient and eerie. The glass cases amplify the wrongness. They\'re not quite dolls. They\'re not quite alive.",im:"It\'s 1800. A puppeteer carves. The puppet will move by his hand. His children will move it. His grandchildren will move it. The puppet is immortal. The puppeteers age.",t:"The puppets stare. Some are broken. Some are pristine. Czech puppet tradition is ancient and eerie. The glass cases amplify the wrongness. They\'re not quite dolls. They\'re not quite alive.\",im:\"It\'s 1800. A puppeteer carves. The puppet will move by his hand. His children will move it. His grandchildren will move it. The puppet is immortal. The puppeteers age.\",t:\"Jánský Vršek 6. €7 entry. Open 10am-6pm. The collection is obsessive and complete. It\'s unsettling in the best way. Don\'t come if dolls disturb you.",c:["weird", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:38,n:"Charles IV\'s Vltava bank meditation spot",a:"Malá Strana",v:["quiet", "beautiful"],d:38,s:"A hidden bench where the emperor supposedly meditated",st:"The emperor walked here. He sat. He thought about his city. Now it\'s a bench by the water. The Vltava flows. The castle floats above. Nothing has changed except everything.",im:"It\'s 1365. The emperor sits alone. He has built a city. He has built a bridge. He is exhausted. The water is cold. It helps.",t:"The emperor walked here. He sat. He thought about his city. Now it\'s a bench by the water. The Vltava flows. The castle floats above. Nothing has changed except everything.\",im:\"It\'s 1365. The emperor sits alone. He has built a city. He has built a bridge. He is exhausted. The water is cold. It helps.\",t:\"Rybářský Ostrov, near Kampa. There\'s a bench on the water\'s edge. It\'s free. It\'s accessible. It\'s forgotten. Sit there. The meditation space still holds power.",c:["quiet", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:39,n:"Mucha Museum\'s private collection",a:"Nové Město",v:["beautiful", "history"],d:39,s:"Art Nouveau originals in a 19th-century palace",st:"Alfons Mucha defined the visual language of an era. His originals glow with gold and sensuality. The palace is the right frame. Every room is a different painting brought to life.",im:"It\'s 1896. Mucha designs a poster. The entire city becomes his gallery. His style is everywhere. In 2024, it\'s still everywhere. Beauty that doesn\'t age.",t:"Alfons Mucha defined the visual language of an era. His originals glow with gold and sensuality. The palace is the right frame. Every room is a different painting brought to life.\",im:\"It\'s 1896. Mucha designs a poster. The entire city becomes his gallery. His style is everywhere. In 2024, it\'s still everywhere. Beauty that doesn\'t age.\",t:\"Panská 7. €10 entry. Open 10am-6pm. Go early. The light is best 11am-3pm. The paintings deserve time. Budget at least 2 hours.",c:["beautiful", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:40,n:"Žižkov\'s Literary Pub culture",a:"Žižkov",v:["local", "history"],d:40,s:"Working-class pubs where writers drink and argue",st:"Václav Havel drank here. Poets gathered. Ideas were debated over beer. The pubs haven\'t changed. Writers still come. The tables are sticky. The conversation is sharp. This is Czech intellectual tradition.",im:"It\'s 1985. A writer sits in a corner. He cannot publish. He drinks. A friend arrives. They talk in whispers. The beer is cheap. The company is everything.",t:"Václav Havel drank here. Poets gathered. Ideas were debated over beer. The pubs haven\'t changed. Writers still come. The tables are sticky. The conversation is sharp. This is Czech intellectual tradition.\",im:\"It\'s 1985. A writer sits in a corner. He cannot publish. He drinks. A friend arrives. They talk in whispers. The beer is cheap. The company is everything.\",t:\"Nerudova or Bořivojova Streets, Žižkov. The pubs are unmarked. Ask locals. Go around 8pm. Bring Czech if possible. Otherwise, smiles work. Expect to be joined by strangers.",c:["local_only", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:41,n:"Prague\'s narrowest street (Zlatá ulička)",a:"Prague Castle",v:["hidden", "history"],d:41,s:"A 16th-century alley where servants and alchemists lived",st:"The street is a meter wide. Tiny houses face each other. Residents knew their neighbors\' names and everything else. Privacy didn\'t exist. Now it\'s a tourist curiosity. The claustrophobia remains.",im:"It\'s 1600. A servant lives in a 4-meter-wide house. His life is his work. In off hours, he sits on the step. He looks at the opposite wall. That\'s his view.",t:"The street is a meter wide. Tiny houses face each other. Residents knew their neighbors\' names and everything else. Privacy didn\'t exist. Now it\'s a tourist curiosity. The claustrophobia remains.\",im:\"It\'s 1600. A servant lives in a 4-meter-wide house. His life is his work. In off hours, he sits on the step. He looks at the opposite wall. That\'s his view.\",t:\"Prague Castle complex. €4 entry to the street. Open 9am-4:30pm. The street is cramped—best visited early morning. Go inside one of the houses. See the actual living space.",c:["hidden", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:42,n:"Powder Tower\'s inner spiral staircase",a:"Nové Město",v:["history", "beautiful"],d:42,s:"A 186-step spiral that corkscrews upward through the tower\'s core",st:"The stairs are medieval. Each step is worn. Centuries of footsteps have curved the stone. Your feet follow the same grooves. The wall curves. The ascent feels endless. At the top, the exhaustion is worth it.",im:"It\'s 1475. A guard climbs daily. His feet wear the same groove. In 2024, a tourist climbs the worn stone. The guard\'s feet have guided the path.",t:"The stairs are medieval. Each step is worn. Centuries of footsteps have curved the stone. Your feet follow the same grooves. The wall curves. The ascent feels endless. At the top, the exhaustion is worth it.\",im:\"It\'s 1475. A guard climbs daily. His feet wear the same groove. In 2024, a tourist climbs the worn stone. The guard\'s feet have guided the path.\",t:\"Náměstí Republiky. €3 entry. The stairs are steep and many. Take your time. People pass—don\'t feel pressured. The view at the top is your reward.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:43,n:"Old Town Hall execution site (Staroměstských)",a:"Staré Město",v:["history", "scary"],d:43,s:"The plaza where 27 nobles were executed during the religious wars",st:"The stones aren\'t marked but locals know. In 1621, they died here. The square doesn\'t show the blood. But the weight of it remains. This is where Czech rebellion was broken.",im:"It\'s 1621. The execution happens. The city watches in horror. Nobody expected this. The rebellion dies. Or it transforms into quieter resistance.",t:"The stones aren\'t marked but locals know. In 1621, they died here. The square doesn\'t show the blood. But the weight of it remains. This is where Czech rebellion was broken.\",im:\"It\'s 1621. The execution happens. The city watches in horror. Nobody expected this. The rebellion dies. Or it transforms into quieter resistance.\",t:\"Old Town Square. It\'s free. Stand in the center. Ask locals about \"Staroměstská popraviště\"—the execution place. The history isn\'t visible but it\'s real.",c:["history_big", "scary"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:44,n:"Prague Doll Museum\'s doll autopsy",a:"Staré Město",v:["weird", "hidden"],d:44,s:"A glass case with a doll dissected to show internal mechanisms",st:"The doll is laid open. Gears and springs visible. It\'s medical but the subject is cloth and wood. It\'s discomforting. The museum embraces the wrongness. It\'s Czech humor—dark and specific.",im:"It\'s 1920. A doll maker experiments. What\'s inside? They carefully open one. Gears and springs and secrets. The doll is never the same.",t:"The doll is laid open. Gears and springs visible. It\'s medical but the subject is cloth and wood. It\'s discomforting. The museum embraces the wrongness. It\'s Czech humor—dark and specific.\",im:\"It\'s 1920. A doll maker experiments. What\'s inside? They carefully open one. Gears and springs and secrets. The doll is never the same.\",t:\"Nerudova 13. €8 entry. Open 10am-6pm. The doll autopsy is the finale. Go through the whole museum for context. The weirdness makes sense by the end.",c:["weird", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:45,n:"Charles Bridge at dawn with musicians",a:"Staré Město",v:["beautiful", "night"],d:45,s:"Street musicians perform as the sun rises",st:"One or two musicians arrive at 6am. They play beneath the arches. The Vltava changes color. The city wakes. Their music is the soundtrack. It\'s intimate. It\'s sacred.",im:"It\'s 6am. A violinist plays. The city is sleeping. The bridge is hers. The music bounces off stone. She plays for the river. The river listens.",t:"One or two musicians arrive at 6am. They play beneath the arches. The Vltava changes color. The city wakes. Their music is the soundtrack. It\'s intimate. It\'s sacred.\",im:\"It\'s 6am. A violinist plays. The city is sleeping. The bridge is hers. The music bounces off stone. She plays for the river. The river listens.\",t:\"Charles Bridge, middle section. Go between 6am-7am. The musicians are different each morning. Bring cash to tip. Sit on a statue base. Don\'t talk. Just listen.",c:["beautiful", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:46,n:"Myslbek passage underground arcade",a:"Nové Město",v:["hidden", "weird"],d:46,s:"A 1950s underground shopping passage with vintage shops still operating",st:"Fluorescent lights. 1950s aesthetic. Some shops have been here since opening. The passage is below the noise. The pace is slow. It\'s a time capsule that nobody visits.",im:"It\'s 1952. The passage opens. Prague goes underground. By 1989, it\'s dated. In 2024, it\'s retro but still functioning. Time moves differently below ground.",t:"Fluorescent lights. 1950s aesthetic. Some shops have been here since opening. The passage is below the noise. The pace is slow. It\'s a time capsule that nobody visits.\",im:\"It\'s 1952. The passage opens. Prague goes underground. By 1989, it\'s dated. In 2024, it\'s retro but still functioning. Time moves differently below ground.\",t:\"Na Příkopě 15-23. Free to walk. Most shops open 9am-6pm. Go at 11am on a weekday—nearly empty. The passage is worth experiencing just for the architecture.",c:["hidden", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:47,n:"Dvořák Museum\'s concert room",a:"Nové Město",v:["history", "beautiful"],d:47,s:"A composer\'s home with original manuscripts and a small concert venue",st:"Antonín Dvořák lived here. His scores are displayed. Musicians still perform in the room where he composed. The acoustics are perfect. The history is breathable. You hear his ghosts.",im:"It\'s 1890. Dvořák composes here. Musicians gather. They play his new work. He listens. In 2024, different musicians play the same work in the same room. The circle completes.",t:"Antonín Dvořák lived here. His scores are displayed. Musicians still perform in the room where he composed. The acoustics are perfect. The history is breathable. You hear his ghosts.\",im:\"It\'s 1890. Dvořák composes here. Musicians gather. They play his new work. He listens. In 2024, different musicians play the same work in the same room. The circle completes.\",t:\"Ke Karlovu 20. €4 entry. Open 10am-1:30pm, 2pm-4:30pm. Concerts happen occasionally—check ahead. The museum is small but complete. His life is visible.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:48,n:"Vinohrady\'s hidden beer gardens",a:"Vinohrady",v:["local", "quiet"],d:48,s:"Neighborhood gardens where locals gather after 5pm",st:"They\'re tucked behind buildings. No signs. You must know to look. Long benches. Cheap beer. Locals own the space. The city\'s chaos is distant. This is Prague\'s real life.",im:"It\'s 1990. A family claims a bench. They sit here every summer evening. Their children grow up here. The bench becomes home. They don\'t own it. It owns them.",t:"They\'re tucked behind buildings. No signs. You must know to look. Long benches. Cheap beer. Locals own the space. The city\'s chaos is distant. This is Prague\'s real life.\",im:\"It\'s 1990. A family claims a bench. They sit here every summer evening. Their children grow up here. The bench becomes home. They don\'t own it. It owns them.\",t:\"Walk Riegrovy Sady area, Vinohrady. Ask locals about \"zahrádka\"—garden. Early evening is best (6pm-9pm). Bring cash. Don\'t dress fancy. This is worker culture.",c:["local_only", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:49,n:"Old Jewish Town Hall interior staircase",a:"Josefov",v:["history", "beautiful"],d:49,s:"A spiraling staircase designed so the ascent defies gravity",st:"The stairs spiral outward without a central support column. Medieval engineering achieved impossible grace. The perspective tricks your eye. It\'s functional architecture as art.",im:"It\'s 1580. A builder constructs the staircase. It must be strong but beautiful. He spirals it without a column. It stands. It will stand forever.",t:"The stairs spiral outward without a central support column. Medieval engineering achieved impossible grace. The perspective tricks your eye. It\'s functional architecture as art.\",im:\"It\'s 1580. A builder constructs the staircase. It must be strong but beautiful. He spirals it without a column. It stands. It will stand forever.\",t:\"Maiselova 18. €8 entry (combined with other Jewish museums). The staircase is visible on the way in. Climb to the top floor. The spiral is perfect.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:50,n:"Prague\'s Literary Map walking path",a:"Multi-neighborhood",v:["history", "hidden", "local"],d:50,s:"A self-guided route visiting places mentioned in Czech literature",st:"Kafka\'s apartments. Havel\'s favorite pubs. Seifert\'s inspiration spots. You walk through the literature. The city becomes a text. Every corner has a story written before you arrived.",im:"It\'s 1920. A writer walks these streets. He writes about them. In 2024, you walk where he walked. You read what he wrote. The path connects them.",t:"Kafka\'s apartments. Havel\'s favorite pubs. Seifert\'s inspiration spots. You walk through the literature. The city becomes a text. Every corner has a story written before you arrived.\",im:\"It\'s 1920. A writer walks these streets. He writes about them. In 2024, you walk where he walked. You read what he wrote. The path connects them.\",t:\"Literary Prague website has maps. €0 for digital version. Walk at your own pace. Each location takes 20 minutes to find and experience. Budget a full day for the route.",c:["history_big", "hidden", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:51,n:"Kafka\'s grave at Jewish Cemetery",a:"Prague/Strašnice",v:["history", "quiet", "sad"],d:51,s:"The grave of the writer who wrote about meaninglessness",st:"The stone is simple. The grave is modest. It\'s in the Prague section of a larger cemetery. Fans leave notes. Stones are placed on the headstone—a Jewish tradition. The irony matters: he wrote about death. He found peace.",im:"It\'s 1924. Kafka dies. He\'s buried simply. He wanted it this way. In 2024, writers still visit. They touch the stone. They understand.",t:"The stone is simple. The grave is modest. It\'s in the Prague section of a larger cemetery. Fans leave notes. Stones are placed on the headstone—a Jewish tradition. The irony matters: he wrote about death. He found peace.\",im:\"It\'s 1924. Kafka dies. He\'s buried simply. He wanted it this way. In 2024, writers still visit. They touch the stone. They understand.\",t:\"Zličín Cemetery, Prague. Directions: take tram to final stop, walk 20 minutes. €2 entry. The grave is in an older section—ask caretakers. Bring a stone if you can. It matters.",c:["history_big", "quiet", "sad"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:52,n:"Prague Fringe Theatre (underground performance)",a:"Holešovice",v:["weird", "local"],d:52,s:"Independent theater in converted warehouse with experimental performances",st:"The shows are in Czech mostly. But the physicality transcends language. It\'s avant-garde, sometimes incomprehensible. The audience is locals. The theater is cheap. The art is genuine.",im:"It\'s 2010. Actors create. They have no money. The warehouse is cold. The audience is small. They perform anyway. Art doesn\'t need permission.",t:"The shows are in Czech mostly. But the physicality transcends language. It\'s avant-garde, sometimes incomprehensible. The audience is locals. The theater is cheap. The art is genuine.\",im:\"It\'s 2010. Actors create. They have no money. The warehouse is cold. The audience is small. They perform anyway. Art doesn\'t need permission.\",t:\"Check Prague Post or local websites for current venues and shows. Tickets €5-10. Go on weekends. The experience is more important than understanding the plot.",c:["weird", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:53,n:"St. Vitus Cathedral\'s rose window at sunset",a:"Prague Castle",v:["beautiful", "history"],d:53,s:"A 14-meter diameter stained glass window that glows gold at sunset",st:"The light fills the entire west wall. The window depicts saints and history. The color shifts as the sun moves. It\'s religious art at maximum scale. The experience is transcendent.",im:"It\'s 1380. Artisans install the window. The sun tests their work. Light transforms their art. Every day for 650 years, the sun validates their effort.",t:"The light fills the entire west wall. The window depicts saints and history. The color shifts as the sun moves. It\'s religious art at maximum scale. The experience is transcendent.\",im:\"It\'s 1380. Artisans install the window. The sun tests their work. Light transforms their art. Every day for 650 years, the sun validates their effort.\",t:\"St. Vitus Cathedral. €12 entry. Go at 4pm on a clear day. Position yourself in the nave where the light hits the floor. The experience is free once inside.",c:["beautiful", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:54,n:"Holešovice\'s Prague Planetarium",a:"Holešovice",v:["beautiful", "quiet"],d:54,s:"A dome projecting the entire cosmos inside a 1960s building",st:"The show maps stars and galaxies. You lie back. The universe unfolds. Prague disappears. You\'re in space. The experience is meditative. The building is modernist perfection.",im:"It\'s 1961. The planetarium opens. People see stars they\'ve never seen. The concrete dome becomes the sky. The metaphor is perfect.",t:"The show maps stars and galaxies. You lie back. The universe unfolds. Prague disappears. You\'re in space. The experience is meditative. The building is modernist perfection.\",im:\"It\'s 1961. The planetarium opens. People see stars they\'ve never seen. The concrete dome becomes the sky. The metaphor is perfect.\",t:\"Královská obora, Holešovice. €8 entry. Shows hourly 10am-7pm. Book ahead on weekends. The building itself is worth photographing. The show is bonus.",c:["beautiful", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:55,n:"Prague\'s Last Bookstore (pre-internet)",a:"Nové Město",v:["hidden", "history", "local"],d:55,s:"An antiquarian bookshop that hasn\'t changed since the 1980s",st:"Dust covers everything. The owner is in his 80s. The inventory is chaotic and brilliant. You dig. You find unexpected treasures. It\'s research without systems. It\'s pre-digital knowledge.",im:"It\'s 1988. A bookshop owner catalogs manually. He knows every title. The shop is his life. In 2024, he\'s still here. Digital databases will never match his mind.",t:"Dust covers everything. The owner is in his 80s. The inventory is chaotic and brilliant. You dig. You find unexpected treasures. It\'s research without systems. It\'s pre-digital knowledge.\",im:\"It\'s 1988. A bookshop owner catalogs manually. He knows every title. The shop is his life. In 2024, he\'s still here. Digital databases will never match his mind.\",t:\"Nerudova 7. Open 10am-6pm. It\'s chaotic—allow 90 minutes to search properly. Cash only. The owner loves to talk. Ask him questions. He\'s lived through all of it.",c:["hidden", "history_big", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:56,n:"Pivoteka — Local Beer Bar",a:"Vinohrady",v:["hidden", "local", "night"],d:56,s:"A tiny bar where Czech beer nerds gather—26 taps, zero tourists",st:"You walk into a narrow room. Men in work clothes huddle over beers. The bartender knows every style. Seasonal IPAs from local breweries. Pivo Kultu. Matuška. This is how Czechs drink. No frills. Pure beer.",im:"It\'s 1990. Czechoslovakia opens. Suddenly, beer varieties explode. Microbreweries start. Now there are hundreds. This bar represents the revolution. Fermentation as freedom.",t:"You walk into a narrow room. Men in work clothes huddle over beers. The bartender knows every style. Seasonal IPAs from local breweries. Pivo Kultu. Matuška. This is how Czechs drink. No frills. Pure beer.\",im:\"It\'s 1990. Czechoslovakia opens. Suddenly, beer varieties explode. Microbreweries start. Now there are hundreds. This bar represents the revolution. Fermentation as freedom.\",t:\"Bílkova 6, Vinohrady. No sign. Walk down the alley. Czech beers €1-3. Opens 4pm. Closed Mondays. Very local crowd. No English spoken. Point at what you want.",c:["local_only", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:57,n:"U Fleku Hidden Basement",a:"Nové Město",v:["history", "night", "hidden"],d:57,s:"The oldest beer hall (1499) has secret basement chambers where 600-year-old ghosts drink",st:"Everyone knows the main hall. But descend the stairs. Medieval stone. Old barrels. Candles. This is the original brewery cave. Monks brewed here. Time stopped here. You\'re in the 1400s.",im:"It\'s 1499. Monks brew in these caves. Their yeast cultures are alive for 500 years. Now you taste beer that\'s been perfected for half a millennium. You\'re drinking liquid history.",t:"Everyone knows the main hall. But descend the stairs. Medieval stone. Old barrels. Candles. This is the original brewery cave. Monks brewed here. Time stopped here. You\'re in the 1400s.\",im:\"It\'s 1499. Monks brew in these caves. Their yeast cultures are alive for 500 years. Now you taste beer that\'s been perfected for half a millennium. You\'re drinking liquid history.\",t:\"Křemencova 11, Nové Město. €1 entry to basement (drink €2-4). Opens 11am. Everyone goes to the main hall. Go downstairs. Dark. Atmospheric. Bring friends.",c:["history_big", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:58,n:"Hospoda U Cerného Kola",a:"Žižkov",v:["local", "hidden", "free"],d:58,s:"A workers\' pub where construction workers drink alongside philosophers—pure Žižkov chaos",st:"You open a door into noise. Arguments in Czech. Accordion music. Everyone\'s known each other for 30 years. You sit at a shared table. They adopt you instantly. This is communal drinking.",im:"It\'s 1968. The Soviet tanks roll in. People gather in pubs. They speak freely. Fast forward 50 years. The freedom is permanent. The pubs still gather. The arguments still matter.",t:"You open a door into noise. Arguments in Czech. Accordion music. Everyone\'s known each other for 30 years. You sit at a shared table. They adopt you instantly. This is communal drinking.\",im:\"It\'s 1968. The Soviet tanks roll in. People gather in pubs. They speak freely. Fast forward 50 years. The freedom is permanent. The pubs still gather. The arguments still matter.\",t:\"Žižkov (exact address hidden—ask locals). No sign. Just ask \"Hospoda?\". Beers €1. Food cheap. Opens noon. The chaos is the charm. If you don\'t speak Czech, smile a lot. They\'ll help.",c:["local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:59,n:"Underground Electronic Music Venues — Subterranea",a:"Vinohrady",v:["hidden", "night", "weird"],d:59,s:"Techno and house in converted Cold War bunkers—the bass shakes centuries",st:"You descend stairs. The world above vanishes. Soviet-era concrete. Now it throbs with electronic music. DJs spin. Artists paint murals on bunker walls. The Cold War became a club.",im:"It\'s 1960. This bunker was built to survive nuclear war. It failed at that. Now it survives in a different way. Now it throbs with life. Now it\'s weaponless.",t:"You descend stairs. The world above vanishes. Soviet-era concrete. Now it throbs with electronic music. DJs spin. Artists paint murals on bunker walls. The Cold War became a club.\",im:\"It\'s 1960. This bunker was built to survive nuclear war. It failed at that. Now it survives in a different way. Now it throbs with life. Now it\'s weaponless.\",t:\"Various locations (check Resident Advisor). Usually €5-10 entry. Opens 10pm, peak 1-4am. Bring earplugs if sensitive. The community is welcoming. Very Czech underground vibe.",c:["night", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:60,n:"Sedlec Ossuary — The Bone Cathedral",a:"Kutná Hora (day trip)",v:["weird", "history", "scary"],d:60,s:"A chapel decorated entirely with human skeletons—40,000 bones arranged as art",st:"You enter a church made of bones. Chandelier of skulls. Pyramid of femurs. Coat of arms in ribs. It\'s macabre, it\'s genius, it\'s a medieval meditation on death. You\'ve never seen anything like it.",im:"It\'s 1400. The plague kills millions. Kutná Hora\'s cemetery fills. Bones pile. A monk has an idea: arrange them as decoration. A memento mori. A reminder: we all end here.",t:"You enter a church made of bones. Chandelier of skulls. Pyramid of femurs. Coat of arms in ribs. It\'s macabre, it\'s genius, it\'s a medieval meditation on death. You\'ve never seen anything like it.\",im:\"It\'s 1400. The plague kills millions. Kutná Hora\'s cemetery fills. Bones pile. A monk has an idea: arrange them as decoration. A memento mori. A reminder: we all end here.\",t:\"Kutná Hora (train from Prague 1 hour, €3). Ossuary €5 entry. Open 10am-5pm daily. Go early, avoid tour groups (peak 11am-1pm). The bone arrangement is hypnotic. Don\'t miss the coat of arms.",c:["history_big", "scary", "weird"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:61,n:"Kutná Hora Silver Mines — Descend",a:"Kutná Hora (day trip)",v:["history", "hidden", "weird"],d:61,s:"Medieval silver mines where you descend 40 meters into the dark where miners died",st:"You go down. Stone walls. It\'s cold. It\'s dark. Miners worked here 400 years. Many never came up. The air tastes of dust and age. The stone remembers their hammers.",im:"It\'s 1500. A miner swings a hammer. The silver glints. He\'ll never get rich. He\'ll die down here. Four hundred years later, you descend his legacy.",t:"You go down. Stone walls. It\'s cold. It\'s dark. Miners worked here 400 years. Many never came up. The air tastes of dust and age. The stone remembers their hammers.\",im:\"It\'s 1500. A miner swings a hammer. The silver glints. He\'ll never get rich. He\'ll die down here. Four hundred years later, you descend his legacy.\",t:\"Kutná Hora (train 1 hour from Prague). Mines open 9am-5pm. €6 entry. Bring a light jacket—it\'s 12°C underground. The hike down is steep. The history is heavy.",c:["history_big", "scary"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:62,n:"Karlštejn Castle Forest Hike",a:"Karlštejn (day trip)",v:["nature", "history", "beautiful"],d:62,s:"Hike through medieval forest to a Gothic castle perched impossibly on a cliff",st:"You hike through old woods. The path climbs. Then suddenly, stone. A castle appears as if it grew from the rock. Gothic towers. Narrow windows. This is how medieval power looked—dramatic, impossible, beautiful.",im:"It\'s 1365. The Holy Roman Emperor builds this castle to hold sacred relics. It must be impregnable. It must be glorious. He builds it on a cliff where only faith can reach it.",t:"You hike through old woods. The path climbs. Then suddenly, stone. A castle appears as if it grew from the rock. Gothic towers. Narrow windows. This is how medieval power looked—dramatic, impossible, beautiful.\",im:\"It\'s 1365. The Holy Roman Emperor builds this castle to hold sacred relics. It must be impregnable. It must be glorious. He builds it on a cliff where only faith can reach it.\",t:\"Karlštejn (train from Prague 45min, €3). Hike trails from town start easy. Castle entry €8. Open 10am-5pm. The hike is moderate, 1-2 hours. The views from the castle are monumental.",c:["history_big", "nature", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:63,n:"Český Kras Caves — Underground Kingdom",a:"Český Kras (day trip)",v:["nature", "weird", "hidden"],d:63,s:"Limestone caves with underground rivers—Prague\'s hidden geology",st:"You descend into rock. Stalactites drip. An underground river flows. The cave is alive. It\'s being built still, one droplet at a time. You\'re in a place time forgot.",im:"It\'s 100,000 years ago. Water starts carving. It carves for millennia. Now you see what water does. Now you walk through time itself.",t:"You descend into rock. Stalactites drip. An underground river flows. The cave is alive. It\'s being built still, one droplet at a time. You\'re in a place time forgot.\",im:\"It\'s 100,000 years ago. Water starts carving. It carves for millennia. Now you see what water does. Now you walk through time itself.\",t:\"Český Kras region (train from Prague 1 hour to Beroun, then local bus). Caves open 9am-5pm with guided tours. €7-12 depending on cave. Bring a warm layer. It\'s 8°C inside.",c:["nature", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:64,n:"Konopiště Castle — Archer\'s Paradise",a:"Konopiště (day trip)",v:["history", "weird", "beautiful"],d:64,s:"A castle obsessed with hunting—walls covered with 30,000 animal trophies",st:"You walk through rooms. Every wall: mounted heads. Stag. Boar. Eagle. The last Habsburg archduke who lived here killed 300,000 animals in his lifetime. It\'s beautiful. It\'s horrifying. It\'s a window into obsession.",im:"It\'s 1900. A young archduke receives bow and arrow as a gift. He becomes obsessed. He hunts across the world. He mounts everything. By 1914, his castle is a trophy room. By 1918, he\'s dead. The animals endure.",t:"You walk through rooms. Every wall: mounted heads. Stag. Boar. Eagle. The last Habsburg archduke who lived here killed 300,000 animals in his lifetime. It\'s beautiful. It\'s horrifying. It\'s a window into obsession.\",im:\"It\'s 1900. A young archduke receives bow and arrow as a gift. He becomes obsessed. He hunts across the world. He mounts everything. By 1914, his castle is a trophy room. By 1918, he\'s dead. The animals endure.\",t:\"Konopiště (train from Prague 1 hour to Benešov, then bus 20min). Castle tour €8-12. Open 10am-5pm. The hunting collection is the real attraction. Guides are knowledgeable. The story is dark and compelling.",c:["history_big", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:65,n:"Letná Park Beer Garden — Golden Hour",a:"Letná",v:["beautiful", "local", "high_spots"],d:65,s:"The locals\' sunset spot where the city turns amber and beer is cheap",st:"You sit on benches overlooking the city. The metronome spins above. The Vltava winds below. You drink Pilsner. The light fades gold. This is how Prague lives—outdoors, golden, collective.",im:"It\'s 1991. The metronome replaced Stalin\'s statue. It spins. It means freedom. Now locals gather here every evening. The beer is cold. The sky is warm. It\'s rebirth.",t:"You sit on benches overlooking the city. The metronome spins above. The Vltava winds below. You drink Pilsner. The light fades gold. This is how Prague lives—outdoors, golden, collective.\",im:\"It\'s 1991. The metronome replaced Stalin\'s statue. It spins. It means freedom. Now locals gather here every evening. The beer is cold. The sky is warm. It\'s rebirth.\",t:\"Letná Park. Free entry. Beer €1-2. Opens 11am. Peak 5-7pm. Bring cash. No phone service up there. Just people and sky and beer and city below.",c:["high_spots", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:66,n:"Vyšehrad Fortress Ramparts",a:"Vyšehrad",v:["history", "beautiful", "quiet"],d:66,s:"Medieval fortress walls overlooking the Vltava—empty of tourists, full of history",st:"You walk medieval ramparts. The Vltava curves below. Charles Bridge is visible in the distance. This is the original Prague fortress. Before Prague was beautiful, it was strategic. Now it\'s both.",im:"It\'s 900 AD. A fortress rises. Power. Defense. Then Prague becomes famous for Charles Bridge. Vyšehrad fades to memory. Now you find it. Now you\'re alone with the views.",t:"You walk medieval ramparts. The Vltava curves below. Charles Bridge is visible in the distance. This is the original Prague fortress. Before Prague was beautiful, it was strategic. Now it\'s both.\",im:\"It\'s 900 AD. A fortress rises. Power. Defense. Then Prague becomes famous for Charles Bridge. Vyšehrad fades to memory. Now you find it. Now you\'re alone with the views.\",t:\"Vyšehrad station. Free to walk ramparts. Church entry €2. Open 10am-5pm. Go early morning for emptiness. The cemetery is beautiful and melancholic. Very few tourists know this place.",c:["history_big", "beautiful", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:67,n:"Petřín Hill Orchard",a:"Petřín",v:["nature", "quiet", "beautiful"],d:67,s:"A hidden orchard on a hill where fruit trees grow and the city vanishes",st:"You climb past the lookout tower. The crowds fade. You find yourself in an orchard. Apple trees. Pear trees. Birds sing. Below, Prague. Here, nature. The balance is perfect.",im:"It\'s 1800s. This hill was left wild. Orchards grew. Farmers tended them. Now it\'s a park. The orchard remains. The fruit still grows. The birds still come.",t:"You climb past the lookout tower. The crowds fade. You find yourself in an orchard. Apple trees. Pear trees. Birds sing. Below, Prague. Here, nature. The balance is perfect.\",im:\"It\'s 1800s. This hill was left wild. Orchards grew. Farmers tended them. Now it\'s a park. The orchard remains. The fruit still grows. The birds still come.\",t:\"Petřín Park (funicular €2 or hike 30min). The orchard is north of the tower. Free access. Best spring (blossoms) or autumn (fruit). Very few tourists find this part. Bring a notebook.",c:["nature", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:68,n:"Riegrovy Sady Park — Sunset Ritual",a:"Žižkov",v:["beautiful", "local", "quiet"],d:68,s:"A neighborhood park where Prague gathers to watch sunset—no tourists, pure community",st:"You sit on benches. Locals arrive with beer and wine. They watch the sun fall. The sky turns every color. The city glows. This is the ritual. This happens every day. You\'re part of it now.",im:"It\'s any day for 100 years. People climb this hill. They watch the sun set. It never gets old. It never will.",t:"You sit on benches. Locals arrive with beer and wine. They watch the sun fall. The sky turns every color. The city glows. This is the ritual. This happens every day. You\'re part of it now.\",im:\"It\'s any day for 100 years. People climb this hill. They watch the sun set. It never gets old. It never will.\",t:\"Riegrovy Sady, Žižkov. Free. Always open. Peak 6-7pm any day of year. Bring your own drinks (no bars). Bring friends. This is where Prague actually lives.",c:["beautiful", "quiet", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:69,n:"Alchemist Lane — Real History Beyond the Fantasy",a:"Prague Castle",v:["history", "hidden", "weird"],d:69,s:"Medieval goldsmiths\' street where alchemists tried to make gold—the legends are partly true",st:"You walk a narrow alley. Each house tiny. The alchemists worked here. They didn\'t make gold. They made chemistry. Modern science was born in failure. Now it\'s a gift shop street. But the history remains.",im:"It\'s 1600. A man mixes mercury and gold. He believes in transformation. He fails. He dies. His work becomes alchemy. Four hundred years later, we understand he was trying to do real science.",t:"You walk a narrow alley. Each house tiny. The alchemists worked here. They didn\'t make gold. They made chemistry. Modern science was born in failure. Now it\'s a gift shop street. But the history remains.\",im:\"It\'s 1600. A man mixes mercury and gold. He believes in transformation. He fails. He dies. His work becomes alchemy. Four hundred years later, we understand he was trying to do real science.\",t:\"Prague Castle complex, Golden Lane. €12 castle entry (lane included). Open 9am-5pm. The street is now commercial, but the stone is medieval. Read the plaques. Imagine the obsession.",c:["history_big", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:70,n:"Underground Tunnels — Secret Prague",a:"Staré Město",v:["history", "weird", "hidden"],d:70,s:"Medieval tunnels beneath the Old Town where water ran and secrets moved",st:"You descend. The tunnel is stone and history. Water once ran here. Sewage. Secrets. Escapes. Now it\'s dry and dark. You\'re in a hidden Prague. Medieval infrastructure is visible.",im:"It\'s 1400. A person flees plague. They run through these tunnels. They emerge blocks away. Safe. Hidden. The stones remember. The network survives.",t:"You descend. The tunnel is stone and history. Water once ran here. Sewage. Secrets. Escapes. Now it\'s dry and dark. You\'re in a hidden Prague. Medieval infrastructure is visible.\",im:\"It\'s 1400. A person flees plague. They run through these tunnels. They emerge blocks away. Safe. Hidden. The stones remember. The network survives.\",t:\"Tours offered by Prague tourism (€15-25). Book ahead. The tunnels are cool and damp. Bring a light jacket. The tours are 90 minutes. The history is claustrophobic and fascinating.",c:["history_big", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:71,n:"Communist-Era Bunkers",a:"Prague suburbs",v:["history", "weird", "scary"],d:71,s:"Secret Cold War bunkers built to survive nuclear war—now you can enter them",st:"You descend into a bunker. Soviet concrete. Radiation meters. Command centers. This is how the government planned to survive the end of the world. It never came. The bunker remains.",im:"It\'s 1962. The Cuban Missile Crisis. This bunker was built for this moment. The bombs never fell. The bunker waits. Forever waiting. Now you see what they feared.",t:"You descend into a bunker. Soviet concrete. Radiation meters. Command centers. This is how the government planned to survive the end of the world. It never came. The bunker remains.\",im:\"It\'s 1962. The Cuban Missile Crisis. This bunker was built for this moment. The bombs never fell. The bunker waits. Forever waiting. Now you see what they feared.\",t:\"Several sites open to tours. Check tourism office. Usually 1.5 hours, €12-20. You need a guide (dangerous without). The experience is deeply Cold War. Deeply sobering. Deeply real.",c:["history_big", "scary"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:72,n:"Jewish Cemetery Layers",a:"Staré Město",v:["history", "scary", "weird"],d:72,s:"Bodies stacked 12 deep—a cemetery where the living stood on top of the dead",st:"You walk through a graveyard. The stones are crowded. This cemetery has 12 layers. There\'s no room. So bodies were stacked. The gravestones mark the final layer. Below them, centuries of dead.",im:"It\'s 1200s. A Jewish community builds this cemetery. Centuries pass. It fills. They bury deeper. They bury higher. The generations stack. Now you walk on memory.",t:"You walk through a graveyard. The stones are crowded. This cemetery has 12 layers. There\'s no room. So bodies were stacked. The gravestones mark the final layer. Below them, centuries of dead.\",im:\"It\'s 1200s. A Jewish community builds this cemetery. Centuries pass. It fills. They bury deeper. They bury higher. The generations stack. Now you walk on memory.\",t:\"Old Jewish Cemetery, Staré Město. €10 entry (or combined ticket €18 for all Jewish sites). Open 10am-4pm. It\'s a sacred space. Respectful silence. The crowded stones tell a heavy story.",c:["history_big", "scary"],r:"g",nn:"",ns:"",nst:"",nt:""},
