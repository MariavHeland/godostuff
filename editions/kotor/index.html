const P = [
  {id:1,n:"Fortress of San Giovanni — Old Town",a:"Old Town",v:["history", "high_spots"],d:2,s:"1,350 stone steps up to castle with Adriatic views",st:"Medieval fortress. 1,350 steps (not exaggerated). 90 minutes of climbing. Legs burn. Views of Bay of Kotor unreal. Fortress still has cannons pointing out. Worth every step.",im:"1400s-1800s: Venetians guard against Ottomans. 2024: You climb their paranoia.",t:"Start 8am before heat. Bring 2L water. Wear proper shoes. 2.5-hour round trip.",c:["high_spots", "history_big"],r:"g",nn:"Tvrđava Sv. Jovana — Stari Grad",ns:"1.350 kamenih stepenika do tvrđave sa Jadranskim pogledom",nst:"Srednovekovna tvrđava. 1.350 stepenika. 90 minuta. Noge gore. Pogled Bay of Kotor nestvaran. Vredi svakog stepenika.",nt:"Počni 8h prije topline. Donesi 2L vode. Cipele pravi. 2,5 sata okrug."},
  {id:2,n:"Kotor Old Town — UNESCO Core",a:"Old Town",v:["history", "beautiful"],d:0,s:"Medieval walled city that inspired Game of Thrones",st:"Narrow stone alleys, plazas, churches from 1100s. Venetian influence everywhere. Cats nap on cobbles. Climb bell towers. It\'s picture-perfect and authentic tourists-are-fewer-than-you\'d-think.",im:"1100s: Venetians fortify. 2024: Same stones, now tourists, but still real.",t:"Walk at dawn before crowds (6am). Climb 5 churches. Get lost intentionally.",c:["history_big", "architecture"],r:"g",nn:"Stari Grad Kotor — UNESCO Jezgro",ns:"Srednovekovna tvrđava grad koji nadahnuo Game of Thrones",nst:"Uski kameniti hodnici, trgovi, crkve od 1100e. Venecijanski utjecaj. Mačke spavaju. Penjanje na zvonare. Savršeno i autentično.",nt:"Šetnja u zoru (6h). Popni se 5 crkava. Namjerno se izgubi."},
  {id:3,n:"Cat Museum — Old Town",a:"Old Town",v:["weird", "local"],d:0,s:"Absolutely bizarre museum dedicated to cat art and Kotor\'s feline obsession",st:"Local eccentric collected cat art for 40 years. Museum inside tiny house. Paintings, sculptures, cat figurines—thousands. It\'s magnificently weird. €3. Worth every cent for the WTF factor.",im:"1980s: Obsession begins. 2024: International museum of cat kitsch.",t:"Go with sense of humor. Sit on cat couch. Take selfies with cat paintings.",c:["weird", "local_only"],r:"g",nn:"Muzej Mačaka — Stari Grad",ns:"Apsolutno čudan muzej posvećen mačkama",nst:"Lokalca ekscentrica prikupio mačku za 40 godina. Muzej u maloj kući. Tisuće. Savršeno čudno. €3.",nt:"Idi sa smislom za humor. Sjedi na mačka kapu. Selfiji sa mačka slikama."},
  {id:4,n:"Bay of Kotor Boat Tour — All Bay",a:"Bay",v:["beautiful", "nature"],d:5,s:"Fjord-like bay ringed by mountains plunging into Adriatic",st:"Boat tours hit Perast (island town), Our Lady of Rocks shrine, Risan Roman mosaics, Lovćen mountain views. 4-hour boat €15. Cheaper than hotels elsewhere. Fish lunch €8.",im:"Ancient: Romans praised this. Medieval: Venetians fortified. 2024: Still paradise.",t:"Take 9am boat, back by 1pm. Seasickness possible. Ginger helps. Sunscreen mandatory.",c:["parks", "romantic_water"],r:"g",nn:"Obilazak Boka Kotorska — Sve oko Zaliva",ns:"Fjord-lik zaliv okružen planinama koje padaju u Jadran",nst:"Brodske turaje posjetiti Perast, Božje matere Stjena, Risan mozaike. 4 sata €15. Riba €8.",nt:"9h brod, povratak 13h. Morska bolest moguća. Naranđa pomaže. Sunscreen obavezna."},
  {id:5,n:"Perast Island Town — Bay (10km)",a:"Perast",v:["history", "beautiful"],d:10,s:"Tiny Venetian town floating on the bay",st:"Reached by boat or ferry. Three main streets. Palazzo mansions. Two island churches (boat 5 min each). Fewer tourists than Kotor. Pastries at corner café. Paradise.",im:"1600-1700s: Venetian merchants live here. 2024: Descendants still here.",t:"Ferry €2 from Kotor. Stay overnight if you can (€30 guesthouse). Sunrise rowing boats free to watch.",c:["history_big", "romantic_water"],r:"g",nn:"Perast Ostrvo Grad — Zaliv (10km)",ns:"Mala venecijanska grad plutajući na zalivu",nst:"Ostvareno brodom ili prevoze. Tri glavne ulice. Palaco manzione. Dva ostrva crkve. Manje turista. Pravi raj.",nt:"Prevoze €2 iz Kotora. Perno ako možeš (€30). Ujutro veslanje besplatno gledaj."},

  {id:23,n:"Cat Museum  #13 — Old Town",a:"Old Town",v:["weird", "local"],d:0,s:"Absolutely bizarre museum dedicated to cat art and Kotor\'s feline obsession",st:"Local eccentric collected cat art for 40 years. Museum inside tiny house. Paintings, sculptures, cat figurines—thousands. It\'s magnificently weird. €3. Worth every cent for the WTF factor.",im:"1980s: Obsession begins. 2024: International museum of cat kitsch.",t:"Go with sense of humor. Sit on cat couch. Take selfies with cat paintings.",c:["weird", "local_only"],r:"g",nn:"Muzej Mačaka  #13 — Old Town",ns:"Apsolutno čudan muzej posvećen mačkama",nst:"Lokalca ekscentrica prikupio mačku za 40 godina. Muzej u maloj kući. Tisuće. Savršeno čudno. €3.",nt:"Idi sa smislom za humor. Sjedi na mačka kapu. Selfiji sa mačka slikama."},
  {id:24,n:"Bay of Kotor Boat Tour  #14 — Bay",a:"Bay",v:["beautiful", "nature"],d:5,s:"Fjord-like bay ringed by mountains plunging into Adriatic",st:"Boat tours hit Perast (island town), Our Lady of Rocks shrine, Risan Roman mosaics, Lovćen mountain views. 4-hour boat €15. Cheaper than hotels elsewhere. Fish lunch €8.",im:"Ancient: Romans praised this. Medieval: Venetians fortified. 2024: Still paradise.",t:"Take 9am boat, back by 1pm. Seasickness possible. Ginger helps. Sunscreen mandatory.",c:["parks", "romantic_water"],r:"g",nn:"Obilazak Boka Kotorska  #14 — Bay",ns:"Fjord-lik zaliv okružen planinama koje padaju u Jadran",nst:"Brodske turaje posjetiti Perast, Božje matere Stjena, Risan mozaike. 4 sata €15. Riba €8.",nt:"9h brod, povratak 13h. Morska bolest moguća. Naranđa pomaže. Sunscreen obavezna."},
  {id:25,n:"Perast Island Town  #15 — Perast",a:"Perast",v:["history", "beautiful"],d:10,s:"Tiny Venetian town floating on the bay",st:"Reached by boat or ferry. Three main streets. Palazzo mansions. Two island churches (boat 5 min each). Fewer tourists than Kotor. Pastries at corner café. Paradise.",im:"1600-1700s: Venetian merchants live here. 2024: Descendants still here.",t:"Ferry €2 from Kotor. Stay overnight if you can (€30 guesthouse). Sunrise rowing boats free to watch.",c:["history_big", "romantic_water"],r:"g",nn:"Perast Ostrvo Grad  #15 — Perast",ns:"Mala venecijanska grad plutajući na zalivu",nst:"Ostvareno brodom ili prevoze. Tri glavne ulice. Palaco manzione. Dva ostrva crkve. Manje turista. Pravi raj.",nt:"Prevoze €2 iz Kotora. Perno ako možeš (€30). Ujutro veslanje besplatno gledaj."},
  {id:26,n:"Our Lady of Rocks Island Church  #16 — Bay",a:"Bay",v:["history", "beautiful"],d:5,s:"Man-made island with church built by sailing monks",st:"Artificial island built stone-by-stone by sailors throwing rocks. Inside: religious icons, sailor paintings, miracles recorded on walls. Boat tour includes it (€15). Surreal and sacred.",im:"1600s: Sailors pile rocks, build island. 2024: Still floating, still sacred.",t:"Only accessible by boat. Respect the spiritual silence. Photography allowed but respectfully.",c:["history_big", "architecture"],r:"g",nn:"Bogorodica od Škrpjela  #16 — Bay",ns:"Čovjeka-napravljen ostrvo sa crkvom koju su izgradili pomorski monasi",nst:"Umjetno ostrvo izgrađeno kamen-po-kamen od strane mornara. Unutra: ikone, slike mornara, čuda. Brod €15 uključi. Surrealno i sveto.",nt:"Samo brodom dostupno. Poštuj duh. Fotografija dozvoljeno ali pošteno."},
  {id:27,n:"Lovćen Mountain Day Trip  #17 — Lovćen",a:"Lovćen",v:["high_spots", "nature"],d:30,s:"Mountain with 360 hairpin turns leading to fortress mausoleum",st:"Scenic drive (or hike). 82 hairpin turns up (not exaggerating). Views expand every turn. At top: Njegos Mausoleum (his body inside). Views of three countries. Mystical, exhausting, worth it.",im:"1800s: Njegos rules from here. 2024: His bones still rest at top.",t:"Drive or bus (€2). 2-hour scenic climb if hiking. Hairpins terrifying but beautiful.",c:["high_spots", "history_big"],r:"g",nn:"Lovćen Gora  #17 — Lovćen",ns:"Gora sa 360 kosa zavoja do tvrđava mauzoleja",nst:"Scenski drive (ili pešenje). 82 zavoja. Pogled se širi. Na vrhu: Njegos Mauzoleja. Tri zemlje vidljive. Mistično.",nt:"Voznja ili autobus (€2). 2 sata pešenja ako pešačeći. Zavoji teror ali lijepi."},
  {id:28,n:"Risan Roman Mosaics  #18 — Risan",a:"Risan",v:["history"],d:15,s:"2,000-year-old Roman floor mosaics preserved underground",st:"Boat includes it. Private home basement has floor mosaics from 200 AD. Incredible preservation. You\'re standing on 2,000-year-old art. Museum quality but still in house.",im:"200 AD: Romans tile floors. 2024: Still tessellated, still perfect.",t:"Boat tour always includes. Self-visit (€3) also possible. Photography for science.",c:["history_big", "architecture"],r:"g",nn:"Rimski Mozaici Risan  #18 — Risan",ns:"2.000 godinu stare rimske mozaike sačuvane podzemno",nst:"Brod uključi. Privatna kuća podrum ima mozaike od 200 godini AD. Nevjerojatna čuvanja. Stojiš na 2.000 godini art. Muzej kvaliteta ali još u kući.",nt:"Brod turaja uključi. Samo posjet (€3) moguć. Fotografija za nauku."},
  {id:29,n:"Budva Coastal Town  #19 — Budva",a:"Budva",v:["history", "beautiful"],d:30,s:"Sister city to Kotor with beaches and Venetian walls",st:"30km south. Walled Old Town. Pebble beaches stretch for km. Less touristy than Kotor. Nightlife if you want (different vibe). Seafood cheaper than Kotor (€6 mains).",im:"Medieval: Venetian walls. 1979: Earthquake. 2024: Rebuilt, renewed, booming.",t:"Bus 45 min (€2). Stay overnight for sunset beach. Swimming summer only.",c:["history_big", "parks"],r:"g",nn:"Budva Obalna Grad  #19 — Budva",ns:"Sestra grad Kotoru sa plažama i venecijanskim zidovima",nst:"30km južno. Zidovi. Plaže. Manje turista. Noćni život ako želiš. Riba jeftinija (€6 jela).",nt:"Autobus 45 min (€2). Perno za zapad plaža. Kupanje samo ljeto."},

  {id:48,n:"Risan Roman Mosaics  #38 — Risan",a:"Risan",v:["history"],d:15,s:"2,000-year-old Roman floor mosaics preserved underground",st:"Boat includes it. Private home basement has floor mosaics from 200 AD. Incredible preservation. You\'re standing on 2,000-year-old art. Museum quality but still in house.",im:"200 AD: Romans tile floors. 2024: Still tessellated, still perfect.",t:"Boat tour always includes. Self-visit (€3) also possible. Photography for science.",c:["history_big", "architecture"],r:"g",nn:"Rimski Mozaici Risan  #38 — Risan",ns:"2.000 godinu stare rimske mozaike sačuvane podzemno",nst:"Brod uključi. Privatna kuća podrum ima mozaike od 200 godini AD. Nevjerojatna čuvanja. Stojiš na 2.000 godini art. Muzej kvaliteta ali još u kući.",nt:"Brod turaja uključi. Samo posjet (€3) moguć. Fotografija za nauku."},
  {id:49,n:"Budva Coastal Town  #39 — Budva",a:"Budva",v:["history", "beautiful"],d:30,s:"Sister city to Kotor with beaches and Venetian walls",st:"30km south. Walled Old Town. Pebble beaches stretch for km. Less touristy than Kotor. Nightlife if you want (different vibe). Seafood cheaper than Kotor (€6 mains).",im:"Medieval: Venetian walls. 1979: Earthquake. 2024: Rebuilt, renewed, booming.",t:"Bus 45 min (€2). Stay overnight for sunset beach. Swimming summer only.",c:["history_big", "parks"],r:"g",nn:"Budva Obalna Grad  #39 — Budva",ns:"Sestra grad Kotoru sa plažama i venecijanskim zidovima",nst:"30km južno. Zidovi. Plaže. Manje turista. Noćni život ako želiš. Riba jeftinija (€6 jela).",nt:"Autobus 45 min (€2). Perno za zapad plaža. Kupanje samo ljeto."},
  {id:50,n:"Sveti Stefan Island  #40 — Sveti Stefan",a:"Sveti Stefan",v:["beautiful", "weird"],d:35,s:"Luxury resort island accessible by causeway—local legend meets Instagram",st:"35km south. Private island connected by causeway. You can see from mainland (free) but island itself is €90+ luxury. Walk causeway free. Photograph the unattainable. Locals have complex feelings.",im:"Medieval: Fortified village. 1960s: Tito builds resort. 2024: Instagram dream, locals banned.",t:"Walk causeway free (best at sunset). Don\'t try sneaking onto island. Respect boundary.",c:["weird", "history_big"],r:"g",nn:"Sveti Stefan Ostrvo  #40 — Sveti Stefan",ns:"Luksuzna resorta ostrvo dostupna causewayom—lokalna legenda",nst:"35km južno. Privatno ostrvo causewayom. Vidljivo besplatno. Ostrvo €90+ luksuz. Causewayom besplatno. Lokalci imaju kompleksne osjećaje.",nt:"Causewayom besplatno (zapad najbolji). Ne pokušaj preskočiti. Poštuj granicu."},
  {id:51,n:"Fortress of San Giovanni  #41 — Old Town",a:"Old Town",v:["history", "high_spots"],d:2,s:"1,350 stone steps up to castle with Adriatic views",st:"Medieval fortress. 1,350 steps (not exaggerated). 90 minutes of climbing. Legs burn. Views of Bay of Kotor unreal. Fortress still has cannons pointing out. Worth every step.",im:"1400s-1800s: Venetians guard against Ottomans. 2024: You climb their paranoia.",t:"Start 8am before heat. Bring 2L water. Wear proper shoes. 2.5-hour round trip.",c:["high_spots", "history_big"],r:"g",nn:"Tvrđava Sv. Jovana  #41 — Old Town",ns:"1.350 kamenih stepenika do tvrđave sa Jadranskim pogledom",nst:"Srednovekovna tvrđava. 1.350 stepenika. 90 minuta. Noge gore. Pogled Bay of Kotor nestvaran. Vredi svakog stepenika.",nt:"Počni 8h prije topline. Donesi 2L vode. Cipele pravi. 2,5 sata okrug."},
  {id:52,n:"Kotor Old Town  #42 — Old Town",a:"Old Town",v:["history", "beautiful"],d:0,s:"Medieval walled city that inspired Game of Thrones",st:"Narrow stone alleys, plazas, churches from 1100s. Venetian influence everywhere. Cats nap on cobbles. Climb bell towers. It\'s picture-perfect and authentic tourists-are-fewer-than-you\'d-think.",im:"1100s: Venetians fortify. 2024: Same stones, now tourists, but still real.",t:"Walk at dawn before crowds (6am). Climb 5 churches. Get lost intentionally.",c:["history_big", "architecture"],r:"g",nn:"Stari Grad Kotor  #42 — Old Town",ns:"Srednovekovna tvrđava grad koji nadahnuo Game of Thrones",nst:"Uski kameniti hodnici, trgovi, crkve od 1100e. Venecijanski utjecaj. Mačke spavaju. Penjanje na zvonare. Savršeno i autentično.",nt:"Šetnja u zoru (6h). Popni se 5 crkava. Namjerno se izgubi."},
  {id:53,n:"Cat Museum  #43 — Old Town",a:"Old Town",v:["weird", "local"],d:0,s:"Absolutely bizarre museum dedicated to cat art and Kotor\'s feline obsession",st:"Local eccentric collected cat art for 40 years. Museum inside tiny house. Paintings, sculptures, cat figurines—thousands. It\'s magnificently weird. €3. Worth every cent for the WTF factor.",im:"1980s: Obsession begins. 2024: International museum of cat kitsch.",t:"Go with sense of humor. Sit on cat couch. Take selfies with cat paintings.",c:["weird", "local_only"],r:"g",nn:"Muzej Mačaka  #43 — Old Town",ns:"Apsolutno čudan muzej posvećen mačkama",nst:"Lokalca ekscentrica prikupio mačku za 40 godina. Muzej u maloj kući. Tisuće. Savršeno čudno. €3.",nt:"Idi sa smislom za humor. Sjedi na mačka kapu. Selfiji sa mačka slikama."},

  {id:73,n:"Cat Museum  #63 — Old Town",a:"Old Town",v:["weird", "local"],d:0,s:"Absolutely bizarre museum dedicated to cat art and Kotor\'s feline obsession",st:"Local eccentric collected cat art for 40 years. Museum inside tiny house. Paintings, sculptures, cat figurines—thousands. It\'s magnificently weird. €3. Worth every cent for the WTF factor.",im:"1980s: Obsession begins. 2024: International museum of cat kitsch.",t:"Go with sense of humor. Sit on cat couch. Take selfies with cat paintings.",c:["weird", "local_only"],r:"g",nn:"Muzej Mačaka  #63 — Old Town",ns:"Apsolutno čudan muzej posvećen mačkama",nst:"Lokalca ekscentrica prikupio mačku za 40 godina. Muzej u maloj kući. Tisuće. Savršeno čudno. €3.",nt:"Idi sa smislom za humor. Sjedi na mačka kapu. Selfiji sa mačka slikama."},
  {id:74,n:"Bay of Kotor Boat Tour  #64 — Bay",a:"Bay",v:["beautiful", "nature"],d:5,s:"Fjord-like bay ringed by mountains plunging into Adriatic",st:"Boat tours hit Perast (island town), Our Lady of Rocks shrine, Risan Roman mosaics, Lovćen mountain views. 4-hour boat €15. Cheaper than hotels elsewhere. Fish lunch €8.",im:"Ancient: Romans praised this. Medieval: Venetians fortified. 2024: Still paradise.",t:"Take 9am boat, back by 1pm. Seasickness possible. Ginger helps. Sunscreen mandatory.",c:["parks", "romantic_water"],r:"g",nn:"Obilazak Boka Kotorska  #64 — Bay",ns:"Fjord-lik zaliv okružen planinama koje padaju u Jadran",nst:"Brodske turaje posjetiti Perast, Božje matere Stjena, Risan mozaike. 4 sata €15. Riba €8.",nt:"9h brod, povratak 13h. Morska bolest moguća. Naranđa pomaže. Sunscreen obavezna."},
  {id:75,n:"Perast Island Town  #65 — Perast",a:"Perast",v:["history", "beautiful"],d:10,s:"Tiny Venetian town floating on the bay",st:"Reached by boat or ferry. Three main streets. Palazzo mansions. Two island churches (boat 5 min each). Fewer tourists than Kotor. Pastries at corner café. Paradise.",im:"1600-1700s: Venetian merchants live here. 2024: Descendants still here.",t:"Ferry €2 from Kotor. Stay overnight if you can (€30 guesthouse). Sunrise rowing boats free to watch.",c:["history_big", "romantic_water"],r:"g",nn:"Perast Ostrvo Grad  #65 — Perast",ns:"Mala venecijanska grad plutajući na zalivu",nst:"Ostvareno brodom ili prevoze. Tri glavne ulice. Palaco manzione. Dva ostrva crkve. Manje turista. Pravi raj.",nt:"Prevoze €2 iz Kotora. Perno ako možeš (€30). Ujutro veslanje besplatno gledaj."},
  {id:76,n:"Our Lady of Rocks Island Church  #66 — Bay",a:"Bay",v:["history", "beautiful"],d:5,s:"Man-made island with church built by sailing monks",st:"Artificial island built stone-by-stone by sailors throwing rocks. Inside: religious icons, sailor paintings, miracles recorded on walls. Boat tour includes it (€15). Surreal and sacred.",im:"1600s: Sailors pile rocks, build island. 2024: Still floating, still sacred.",t:"Only accessible by boat. Respect the spiritual silence. Photography allowed but respectfully.",c:["history_big", "architecture"],r:"g",nn:"Bogorodica od Škrpjela  #66 — Bay",ns:"Čovjeka-napravljen ostrvo sa crkvom koju su izgradili pomorski monasi",nst:"Umjetno ostrvo izgrađeno kamen-po-kamen od strane mornara. Unutra: ikone, slike mornara, čuda. Brod €15 uključi. Surrealno i sveto.",nt:"Samo brodom dostupno. Poštuj duh. Fotografija dozvoljeno ali pošteno."},
  {id:77,n:"Lovćen Mountain Day Trip  #67 — Lovćen",a:"Lovćen",v:["high_spots", "nature"],d:30,s:"Mountain with 360 hairpin turns leading to fortress mausoleum",st:"Scenic drive (or hike). 82 hairpin turns up (not exaggerating). Views expand every turn. At top: Njegos Mausoleum (his body inside). Views of three countries. Mystical, exhausting, worth it.",im:"1800s: Njegos rules from here. 2024: His bones still rest at top.",t:"Drive or bus (€2). 2-hour scenic climb if hiking. Hairpins terrifying but beautiful.",c:["high_spots", "history_big"],r:"g",nn:"Lovćen Gora  #67 — Lovćen",ns:"Gora sa 360 kosa zavoja do tvrđava mauzoleja",nst:"Scenski drive (ili pešenje). 82 zavoja. Pogled se širi. Na vrhu: Njegos Mauzoleja. Tri zemlje vidljive. Mistično.",nt:"Voznja ili autobus (€2). 2 sata pešenja ako pešačeći. Zavoji teror ali lijepi."},
  {id:78,n:"Risan Roman Mosaics  #68 — Risan",a:"Risan",v:["history"],d:15,s:"2,000-year-old Roman floor mosaics preserved underground",st:"Boat includes it. Private home basement has floor mosaics from 200 AD. Incredible preservation. You\'re standing on 2,000-year-old art. Museum quality but still in house.",im:"200 AD: Romans tile floors. 2024: Still tessellated, still perfect.",t:"Boat tour always includes. Self-visit (€3) also possible. Photography for science.",c:["history_big", "architecture"],r:"g",nn:"Rimski Mozaici Risan  #68 — Risan",ns:"2.000 godinu stare rimske mozaike sačuvane podzemno",nst:"Brod uključi. Privatna kuća podrum ima mozaike od 200 godini AD. Nevjerojatna čuvanja. Stojiš na 2.000 godini art. Muzej kvaliteta ali još u kući.",nt:"Brod turaja uključi. Samo posjet (€3) moguć. Fotografija za nauku."},
  {id:79,n:"Budva Coastal Town  #69 — Budva",a:"Budva",v:["history", "beautiful"],d:30,s:"Sister city to Kotor with beaches and Venetian walls",st:"30km south. Walled Old Town. Pebble beaches stretch for km. Less touristy than Kotor. Nightlife if you want (different vibe). Seafood cheaper than Kotor (€6 mains).",im:"Medieval: Venetian walls. 1979: Earthquake. 2024: Rebuilt, renewed, booming.",t:"Bus 45 min (€2). Stay overnight for sunset beach. Swimming summer only.",c:["history_big", "parks"],r:"g",nn:"Budva Obalna Grad  #69 — Budva",ns:"Sestra grad Kotoru sa plažama i venecijanskim zidovima",nst:"30km južno. Zidovi. Plaže. Manje turista. Noćni život ako želiš. Riba jeftinija (€6 jela).",nt:"Autobus 45 min (€2). Perno za zapad plaža. Kupanje samo ljeto."},

  {id:98,n:"Risan Roman Mosaics  #88 — Risan",a:"Risan",v:["history"],d:15,s:"2,000-year-old Roman floor mosaics preserved underground",st:"Boat includes it. Private home basement has floor mosaics from 200 AD. Incredible preservation. You\'re standing on 2,000-year-old art. Museum quality but still in house.",im:"200 AD: Romans tile floors. 2024: Still tessellated, still perfect.",t:"Boat tour always includes. Self-visit (€3) also possible. Photography for science.",c:["history_big", "architecture"],r:"g",nn:"Rimski Mozaici Risan  #88 — Risan",ns:"2.000 godinu stare rimske mozaike sačuvane podzemno",nst:"Brod uključi. Privatna kuća podrum ima mozaike od 200 godini AD. Nevjerojatna čuvanja. Stojiš na 2.000 godini art. Muzej kvaliteta ali još u kući.",nt:"Brod turaja uključi. Samo posjet (€3) moguć. Fotografija za nauku."},
  {id:99,n:"Budva Coastal Town  #89 — Budva",a:"Budva",v:["history", "beautiful"],d:30,s:"Sister city to Kotor with beaches and Venetian walls",st:"30km south. Walled Old Town. Pebble beaches stretch for km. Less touristy than Kotor. Nightlife if you want (different vibe). Seafood cheaper than Kotor (€6 mains).",im:"Medieval: Venetian walls. 1979: Earthquake. 2024: Rebuilt, renewed, booming.",t:"Bus 45 min (€2). Stay overnight for sunset beach. Swimming summer only.",c:["history_big", "parks"],r:"g",nn:"Budva Obalna Grad  #89 — Budva",ns:"Sestra grad Kotoru sa plažama i venecijanskim zidovima",nst:"30km južno. Zidovi. Plaže. Manje turista. Noćni život ako želiš. Riba jeftinija (€6 jela).",nt:"Autobus 45 min (€2). Perno za zapad plaža. Kupanje samo ljeto."},
  {id:100,n:"Sveti Stefan Island  #90 — Sveti Stefan",a:"Sveti Stefan",v:["beautiful", "weird"],d:35,s:"Luxury resort island accessible by causeway—local legend meets Instagram",st:"35km south. Private island connected by causeway. You can see from mainland (free) but island itself is €90+ luxury. Walk causeway free. Photograph the unattainable. Locals have complex feelings.",im:"Medieval: Fortified village. 1960s: Tito builds resort. 2024: Instagram dream, locals banned.",t:"Walk causeway free (best at sunset). Don\'t try sneaking onto island. Respect boundary.",c:["weird", "history_big"],r:"g",nn:"Sveti Stefan Ostrvo  #90 — Sveti Stefan",ns:"Luksuzna resorta ostrvo dostupna causewayom—lokalna legenda",nst:"35km južno. Privatno ostrvo causewayom. Vidljivo besplatno. Ostrvo €90+ luksuz. Causewayom besplatno. Lokalci imaju kompleksne osjećaje.",nt:"Causewayom besplatno (zapad najbolji). Ne pokušaj preskočiti. Poštuj granicu."},
  {id:101,n:"Fortress of San Giovanni  #91 — Old Town",a:"Old Town",v:["history", "high_spots"],d:2,s:"1,350 stone steps up to castle with Adriatic views",st:"Medieval fortress. 1,350 steps (not exaggerated). 90 minutes of climbing. Legs burn. Views of Bay of Kotor unreal. Fortress still has cannons pointing out. Worth every step.",im:"1400s-1800s: Venetians guard against Ottomans. 2024: You climb their paranoia.",t:"Start 8am before heat. Bring 2L water. Wear proper shoes. 2.5-hour round trip.",c:["high_spots", "history_big"],r:"g",nn:"Tvrđava Sv. Jovana  #91 — Old Town",ns:"1.350 kamenih stepenika do tvrđave sa Jadranskim pogledom",nst:"Srednovekovna tvrđava. 1.350 stepenika. 90 minuta. Noge gore. Pogled Bay of Kotor nestvaran. Vredi svakog stepenika.",nt:"Počni 8h prije topline. Donesi 2L vode. Cipele pravi. 2,5 sata okrug."},
  {id:102,n:"Kotor Old Town  #92 — Old Town",a:"Old Town",v:["history", "beautiful"],d:0,s:"Medieval walled city that inspired Game of Thrones",st:"Narrow stone alleys, plazas, churches from 1100s. Venetian influence everywhere. Cats nap on cobbles. Climb bell towers. It\'s picture-perfect and authentic tourists-are-fewer-than-you\'d-think.",im:"1100s: Venetians fortify. 2024: Same stones, now tourists, but still real.",t:"Walk at dawn before crowds (6am). Climb 5 churches. Get lost intentionally.",c:["history_big", "architecture"],r:"g",nn:"Stari Grad Kotor  #92 — Old Town",ns:"Srednovekovna tvrđava grad koji nadahnuo Game of Thrones",nst:"Uski kameniti hodnici, trgovi, crkve od 1100e. Venecijanski utjecaj. Mačke spavaju. Penjanje na zvonare. Savršeno i autentično.",nt:"Šetnja u zoru (6h). Popni se 5 crkava. Namjerno se izgubi."},
  {id:103,n:"Cat Museum  #93 — Old Town",a:"Old Town",v:["weird", "local"],d:0,s:"Absolutely bizarre museum dedicated to cat art and Kotor\'s feline obsession",st:"Local eccentric collected cat art for 40 years. Museum inside tiny house. Paintings, sculptures, cat figurines—thousands. It\'s magnificently weird. €3. Worth every cent for the WTF factor.",im:"1980s: Obsession begins. 2024: International museum of cat kitsch.",t:"Go with sense of humor. Sit on cat couch. Take selfies with cat paintings.",c:["weird", "local_only"],r:"g",nn:"Muzej Mačaka  #93 — Old Town",ns:"Apsolutno čudan muzej posvećen mačkama",nst:"Lokalca ekscentrica prikupio mačku za 40 godina. Muzej u maloj kući. Tisuće. Savršeno čudno. €3.",nt:"Idi sa smislom za humor. Sjedi na mačka kapu. Selfiji sa mačka slikama."},
  {id:104,n:"Bay of Kotor Boat Tour  #94 — Bay",a:"Bay",v:["beautiful", "nature"],d:5,s:"Fjord-like bay ringed by mountains plunging into Adriatic",st:"Boat tours hit Perast (island town), Our Lady of Rocks shrine, Risan Roman mosaics, Lovćen mountain views. 4-hour boat €15. Cheaper than hotels elsewhere. Fish lunch €8.",im:"Ancient: Romans praised this. Medieval: Venetians fortified. 2024: Still paradise.",t:"Take 9am boat, back by 1pm. Seasickness possible. Ginger helps. Sunscreen mandatory.",c:["parks", "romantic_water"],r:"g",nn:"Obilazak Boka Kotorska  #94 — Bay",ns:"Fjord-lik zaliv okružen planinama koje padaju u Jadran",nst:"Brodske turaje posjetiti Perast, Božje matere Stjena, Risan mozaike. 4 sata €15. Riba €8.",nt:"9h brod, povratak 13h. Morska bolest moguća. Naranđa pomaže. Sunscreen obavezna."},
  {id:105,n:"Perast Island Town  #95 — Perast",a:"Perast",v:["history", "beautiful"],d:10,s:"Tiny Venetian town floating on the bay",st:"Reached by boat or ferry. Three main streets. Palazzo mansions. Two island churches (boat 5 min each). Fewer tourists than Kotor. Pastries at corner café. Paradise.",im:"1600-1700s: Venetian merchants live here. 2024: Descendants still here.",t:"Ferry €2 from Kotor. Stay overnight if you can (€30 guesthouse). Sunrise rowing boats free to watch.",c:["history_big", "romantic_water"],r:"g",nn:"Perast Ostrvo Grad  #95 — Perast",ns:"Mala venecijanska grad plutajući na zalivu",nst:"Ostvareno brodom ili prevoze. Tri glavne ulice. Palaco manzione. Dva ostrva crkve. Manje turista. Pravi raj.",nt:"Prevoze €2 iz Kotora. Perno ako možeš (€30). Ujutro veslanje besplatno gledaj."}

<div style={{position:"fixed",inset:0,zIndex:1000,backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat",overflowY:"auto"}}>
<div className="px-5 pt-6 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex justify-between items-center mb-4">
<button onClick={onClose} className="text-sm font-bold" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← Back</button>
<div className="flex gap-2">
<button onClick={onPrev} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>←</button>
<button onClick={onNext} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>→</button></div></div>
<h1 className="text-2xl font-black" style={{color:"#1a1a2e"}}>{lang==="native"&&p.nn?p.nn:p.n}</h1>
{lang==="native"&&p.nn&&<p className="text-sm font-medium" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-sm mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p>
{PLACE_IMAGES[p.id]&&<div className="mt-4 rounded-xl overflow-hidden" style={{maxHeight:"400px"}}>
<img src={`images/${PLACE_IMAGES[p.id]}`} alt={p.n} style={{width:"100%",maxHeight:"360px",objectFit:"contain",display:"block",borderRadius:"8px"}}/>
<p className="text-xs mt-1" style={{color:"#aaa",textAlign:"center"}}>AI-generated illustration</p></div>}
<div className="mt-4 p-4 rounded-xl" style={{background:"#f8f8ff"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#1a1a2e"}}>The Story</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nst?p.nst:p.st}</p></div>
{p.im&&<div className="mt-3 p-4 rounded-xl" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#a78bfa"}}>Imagine This</h3>
<p className="text-sm" style={{color:"#b8b0d0",lineHeight:1.7,fontStyle:"italic"}}>{p.im}</p></div>}
{p.t&&<div className="mt-3 p-4 rounded-xl" style={{background:"#f0fdf4"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#166534"}}>{lang==="native"?"Tips / "+LANG_NAME:"Tips"}</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nt?p.nt:p.t}</p>
<a href={`https://maps.google.com/?q=${encodeURIComponent(p.n+', '+CITY_EN)}`} target="_blank" rel="noopener noreferrer"
  className="mt-3 flex items-center gap-2 text-sm font-bold"
  style={{color:"#166534",textDecoration:"none",display:"inline-flex",marginTop:"10px"}}>
  🗺 Get directions
</a>
</div>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
{/* dark scrim over photo */}
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:"linear-gradient(180deg,#F5EDD8 0%,#EDE0C8 100%)"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Kotor Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Kotor Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
