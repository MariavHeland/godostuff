,{id:121,n:"Secret Courtyards & Doorway Luck",a:"Grande Île",v:["hidden"],d:5,s:"Peek into hidden Renaissance courtyards that locals swear by for that magical 'blink and you'll miss it' vibe!",st:"Wander the old town's carriage doors—when one swings open at 24 Rue des Orfèvres or 120 Grand’Rue, slip in for a secret world of ancient stone and forgotten gardens. These inner sanctums whisper tales of medieval merchants and hidden lives. Cour du Corbeau at 1 Quai des Bateliers is the star: a Renaissance gem through a sneaky archway.",im:"Imagine ducking under a low arch to emerge in a sun-dappled courtyard where time stops and ivy-cloaked walls hold centuries of secrets.",t:"Stroll Grande Île streets; check doors randomly (best afternoons when locals come/ go). Free 24/7. Pair with cathedral wander.",c:["architecture", "hidden"],r:"g",nn:"Cours secrètes & Chance des portes",ns:"Jette un œil dans des cours Renaissance cachées que les locaux adorent pour leur vibe 'cligne des yeux et tu rates tout' !",nst:"Flâne dans les portes cochères de la vieille ville—quand l'une s'ouvre à 24 Rue des Orfèvres ou 120 Grand’Rue, glisse-toi dedans pour un monde secret de pierre ancienne et jardins oubliés. Ces sanctuaires intérieurs murmurent des histoires de marchands médiévaux et de vies cachées. Cour du Corbeau au 1 Quai des Bateliers est la star : une gemme Renaissance par une arche discrète.",nt:"Parcourt les rues de Grande Île ; vérifie les portes au hasard (meilleurs après-midi quand les locaux passent). Gratuit 24/7. Associe à une balade cathédrale."},
{id:122,n:"Cathedral Quarter Micro-Oddities",a:"Place du Château",v:["hidden"],d:5,s:"Hunt the belly-measuring column and chase the eerie 'Devil’s Wind' legend around the cathedral!",st:"At 10 Place de la Cathédrale, find the quirky Büchmesser column—medieval locals measured their 'prosperity' here. Feel the relentless gusts dubbed 'Devil’s Wind' swirling around the spire, fueling ghostly tales from Strasbourg's shadowy past.",im:"Picture yourself pressing against the ancient stone column, wind whipping your hair as cathedral shadows dance with devilish whispers.",t:"Right by cathedral entrance; free anytime. Ask passersby for wind lore. Best windy days for full effect.",c:["historical", "quirky"],r:"g",nn:"Micro-curiosités du quartier cathédrale",ns:"Chasse la colonne mesure-ventre et poursuis la légende du 'Vent du Diable' autour de la cathédrale !",nst:"À 10 Place de la Cathédrale, trouve la colonne Büchmesser excentrique—les locaux médiévaux mesuraient leur 'prospérité' ici. Sens les rafales incessantes surnommées 'Vent du Diable' tourbillonner autour de la flèche, alimentant des contes fantomatiques du passé obscur de Strasbourg.",nt:"Juste à l'entrée de la cathédrale ; gratuit n'importe quand. Demande aux passants pour les histoires de vent. Meilleur les jours venteux."},
{id:123,n:"DNA Rooster Clock Performance",a:"Grande Île",v:["hidden"],d:5,s:"Catch the free daily rooster crow & hen reply show—Strasbourg's weirdest clock spectacle!",st:"At 17 Rue de la Nuée Bleue, the DNA rooster atop the clock belts out a noon crow, answered by a cheeky hen across the street. This quirky mechanical dance has amused passersby for decades. Pure offbeat whimsy in the heart of history.",im:"Hear the sudden cock-a-doodle-doo echo off half-timbered walls as the hen clucks back, turning lunchtime into live theater.",t:"17 Rue de la Nuée Bleue; free daily at noon. Arrive 11:50 for best spot. Sunny days amplify the fun.",c:["quirky", "historical"],r:"g",nn:"Performance horloge coq ADN",ns:"Attrape le spectacle gratuit quotidien du coq qui chante & poule qui répond—le show d'horloge le plus barré de Strasbourg !",nst:"À 17 Rue de la Nuée Bleue, le coq ADN au sommet de l'horloge lance un cocorico à midi, répondu par une poule coquine de l'autre côté. Cette danse mécanique excentrique amuse les passants depuis des décennies. Pure fantaisie décalée au cœur de l'histoire.",nt:"17 Rue de la Nuée Bleue ; gratuit tous les jours à midi. Arrive 11:50 pour la meilleure place. Jours ensoleillés boostent le fun."},
{id:124,n:"Aubette 1928",a:"Place Kléber",v:["hidden"],d:10,s:"Dive into free avant-garde 1920s murals in a shopping arcade—Strasbourg's hidden art deco gem!",st:"This restored passage bursts with bold geometric murals by Theo van Doesburg and Hans Arp, a riot of color from the roaring twenties. Wander its halls feeling the pulse of early modern art rebellion. Locals' secret for cultured cool without crowds.",im:"Step into swirling reds, blues, and yellows that wrap around you like a living Mondrian fever dream.",t:"Place Kléber arcade entrance; free daily. Best mornings for light on murals. No appointment needed.",c:["art", "historical"],r:"g",nn:"Aubette 1928",ns:"Plonge dans les fresques gratuites avant-gardistes des années 1920 dans une galerie commerçante—la perle art déco cachée de Strasbourg !",nst:"Ce passage restauré explose de murals géométriques audacieux par Theo van Doesburg et Hans Arp, un feu d'artifice de couleurs des années folles. Flâne dans ses couloirs en sentant le pouls de la rébellion artistique moderniste. Secret des locaux pour du cool culturel sans foule.",nt:"Entrée arcade Place Kléber ; gratuit tous les jours. Meilleurs matins pour la lumière sur les fresques. Pas de RDV requis."},
{id:125,n:"Forêt de Pourtalès Trails",a:"Pourtalès",v:["hidden"],d:15,s:"Escape to low-effort forest trails just outside town—locals' fave for wild walks & trail running!",st:"Bus or tram drops you at this lush woodland haven, where paths wind through ancient trees and quiet clearings. Breathe deep the pine-scented air as squirrels dart and birdsong fills the canopy. Perfect for that instant nature reset.",im:"Crunch leaves underfoot on a sun-speckled path, far from city buzz, with only whispering woods for company.",t:"Bus/tram to Pourtalès stop; free trails anytime. Dawn/dusk for wildlife. Bring water; loops 1-3hrs.",c:["parks", "hiking"],r:"g",nn:"Sentiers Forêt de Pourtalès",ns:"Échappe-toi sur des sentiers forestiers faciles juste hors ville—le chouchou des locaux pour randos sauvages !",nst:"Bus ou tram te dépose dans ce havre boisé luxuriant, où les chemins serpentent parmi arbres ancestraux et clairières paisibles. Respire l'air pin-scenté tandis que les écureuils filent et le chant des oiseaux emplit la canopée. Parfait pour un reset nature instantané.",nt:"Bus/tram arrêt Pourtalès ; sentiers gratuits anytime. Aube/crépuscule pour faune. Eau ; boucles 1-3h."},
{id:126,n:"Baggersee Wild Swim Spot",a:"Illkirch",v:["hidden"],d:20,s:"Locals' summer secret: quick tram to this chill lake for free wild swimming & beach vibes!",st:"Tram zips you to Baggersee's calm waters, where Strassbourgeois splash and picnic on pebbly shores. Float under blue skies, dodging paddleboards in this urban oasis. Pure refreshment without the tourist crush.",im:"Dive into cool lake water, emerging to laughter and lazy sunbathing on a hidden sandy edge.",t:"Tram A/E to Illkirch; free entry/swim (summer). Weekday afternoons less crowded. Sunscreen/toe shoes.",c:["outdoor", "beach"],r:"g",nn:"Baggersee spot baignade sauvage",ns:"Secret estival des locaux : tram rapide vers ce lac cool pour baignade sauvage gratuite & vibes plage !",nst:"Le tram t'emmène aux eaux calmes de Baggersee, où les Strasbourgeois barbotent et pique-niquent sur rives caillouteuses. Flotte sous ciel bleu, évitant paddleboards dans cette oasis urbaine. Pure fraîcheur sans horde touristique.",nt:"Tram A/E vers Illkirch ; entrée/baignade gratuites (été). Après-midi semaine moins bondé. Crème solaire/chaussons."}];

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Strasbourg Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
