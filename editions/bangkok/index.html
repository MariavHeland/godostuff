<script>
const P = [
  {id:1,n:"Wat Pho Back Courtyard at Dawn",a:"Rattanakosin",v:["history", "quiet", "hidden"],d:10,s:"The enormous reclining Buddha temple's hidden back courtyards where monks live before tourists arrive",st:"Wat Pho is famous for its 46-meter reclining gold Buddha, but tourists see only the front chambers. The back courtyard contains dozens of smaller stupas, meditation halls, and the actual monastery where monks live. At 5:30am the courtyard is silent except for the sound of monks chanting. Cats sleep on doorsteps. You enter a functioning temple, not a museum.",im:"A young monk in orange robes carries water from a well past a sleeping cat, while morning light illuminates a line of small Buddha statues on a shelf and the sound of distant chanting echoes from a stone building.",t:"Metro BTS to Saphan Taksin, exit 3. Cross the river by ferry. Wat Pho entrance opens 8:30am but monks are visible from 5:30am (arrive early from riverbank). Entry 100 THB at main entrance, but back courtyard is free. One hour.",c:["history_big"],r:"y",nn:"วัดโพธิ์ อาคารหลังตอนเช้า",ns:"วัดโพธิ์ที่งามงาม เมื่อนักท่องเที่ยวยังไม่มา",nst:"วัดโพธิ์มีชื่อเสียงเพราะรูปพระพุทธเรียนไข่ 46 เมตร แต่นักท่องเที่ยวเห็นเพียงห้องด้านหน้า บริเวณชั้นหลังมีสถูปเล็ก ๆ หลายสิบแห่ง ห้องสมาธิ และวัตรที่สงฆ์อาศัยอยู่จริง ตอนเช้า 5:30 น. ลานวัดเงียบสงบ มีแต่เสียงสวดมนต์ของสงฆ์เท่านั้น",nt:"BTS สถานีสะพานตากสิน ทางออก 3 แล้วข้ามแม่น้ำด้วยเรือข้ามฟาก วัดโพธิ์เปิดบริการ 8:30 น. แต่สงฆ์มองเห็นได้ตั้งแต่ 5:30 น. ค่าเข้า 100 บาท"},
  {id:2,n:"Khaosan Road Opposite Side Streets",a:"Banglamphu",v:["hidden", "night", "local"],d:8,s:"Skip Khaosan Road itself and explore the parallel sois where real Bangkok backpackers and locals mix",st:"Khaosan Road is overcrowded with tour buses. But three blocks east on Phra Athit Road and the parallel sois, you find the real backpacker culture: small guesthouses, local restaurants, young travelers who came here by accident. The streets are narrow, the bars are smaller, and conversations happen in whispers. This is the authentic Khaosan energy before commercialization.",im:"Two backpackers sit on a plastic stool in an open-air restaurant eating khao pad gai, while a tuk-tuk driver naps on a bench nearby and a teenager on a motorbike delivers som tam to the next table.",t:"Metro BTS to National Stadium, exit 3. Walk east 10 minutes. Open anytime. Bars 6pm-2am. Food 5,000-10,000 THB. Two hours.",c:["local_only"],r:"y",nn:"ถนนข้าวสาร ซอยข้างเคียง",ns:"บ้านแพคไปจริง ที่คนท้องถิ่นกับนักท่องเที่ยวปะปนกัน",nst:"ถนนข้าวสารเต็มไปด้วยรถท่องเที่ยว แต่ด้านตะวันออกสามช่วงใน ถนนพระอาทิตย์ และซอยข้างเคียง คุณจะพบวัฒนธรรมนักท่องเที่ยวที่แท้จริง บ้านพักเล็ก ๆ ร้านอาหารท้องถิ่น นักท่องเที่ยวหนุ่มสาวที่มาที่นี่โดยบังเอิญ",nt:"BTS สถานีสนามกีฬาแห่งชาติ ทางออก 3 แล้วเดินไปทางตะวันออก 10 นาที เปิดตลอดเวลา บาร์เปิด 6 น. - 2 น."},
  {id:3,n:"Arun Temple From Opposite Bank at Dawn",a:"Rattanakosin",v:["history", "beautiful", "quiet"],d:8,s:"Temple of Dawn viewed from the quiet opposite bank where locals fish, not from the crowded temple side",st:"Wat Arun is stunning, but the temple side is packed with tourists paying entry fees and fighting for photos. The free, quiet view is from the opposite bank where locals cast fishing lines into the Chao Phraya River at dawn. The temple rises above the water like a dream. You see the structure in silence, reflected in still water.",im:"A fisherman sits alone on the bank with his line in the water while the sun rises behind Wat Arun's spires, the sky turning pink and the temple gradually emerging from darkness.",t:"Metro BTS to Saphan Taksin, exit 3. Take ferry across river to Tha Tien pier. Walk north along river 5 minutes to opposite bank. Free. Best 5:30am-7am. One hour.",c:["history_big", "romantic_water"],r:"g",nn:"วัดอรุณ จากฝั่งตรงข้าม ตอนเช้า",ns:"วิวสวย ๆ ของวัดอรุณจากฝั่งตรงข้าม ที่นี่ไม่มีนักท่องเที่ยว",nst:"วัดอรุณสวยงาม แต่ด้านวัดเต็มไปด้วยนักท่องเที่ยว ที่ขายราคาแพงและต่อสู้กันเพื่อถ่ายรูป วิวฟรีที่เงียบสงบคือจากฝั่งตรงข้าม ที่คนท้องถิ่นปล่อยเบ็ดลงน้ำ",nt:"BTS สถานีสะพานตากสิน ทางออก 3 แล้วขึ้นเรือข้ามฟากไปยัง ท่าเทียน เดินไปทางเหนือตามแม่น้ำ 5 นาที"},
  {id:4,n:"Thonburi Canal Network by Longtail Boat",a:"Thonburi",v:["history", "quiet", "beautiful"],d:20,s:"A network of narrow canals lined with stilt houses, temples, and floating markets seen by commuter boats, not tour boats",st:"The Thonburi canals are ancient waterways where Bangkok before cars still lives. Stilt houses line the narrow khlong, temples sit on water, and locals commute by longtail boat. Tourist boats exist but are expensive. Cheaper: hire a local longtail driver who knows the residential channels. You pass monks getting water, kids playing, breakfast vendors, all from the boat.",im:"A child stands in the doorway of a stilt house watching the longtail boat pass, while a woman inside the house hangs laundry on a rope suspended over the water and a cat watches from a wooden railing.",t:"Metro BTS to Saphan Taksin, exit 3. Take Chao Phraya Express ferry to Wat Rakhang pier. Hire longtail boat driver directly 400-600 THB/hour. Negotiate. Open anytime. Best early morning. Two to three hours.",c:["history_big"],r:"y",nn:"เครือข่ายคลองธนบุรี",ns:"เดินทางด้วยเรือยาว ผ่านบ้านเก่า ๆ บนสันติกร",nst:"คลองธนบุรีเป็นเส้นทางน้ำโบราณที่กรุงเทพฯ ก่อนรถยนต์ยังมีชีวิตอยู่ บ้านเก่า ๆ บนสันติกรเรียงรายตามคลองแคบ ๆ วัดนั่งอยู่บนน้ำ และคนท้องถิ่นเดินทางด้วยเรือยาว",nt:"BTS สถานีสะพานตากสิน ทางออก 3 แล้วขึ้นเรือด่วน Chao Phraya ไปยังท่าวัดราขัง จ้างคนขับเรือยาว 400-600 บาท/ชั่วโมง"},
  {id:5,n:"Chinatown Yaowarat at Midnight",a:"Chinatown",v:["night", "weird", "local"],d:12,s:"Bangkok's oldest neighborhood becomes a neon labyrinth of street food, gold shops, and ancient family businesses at night",st:"Yaowarat Road is a 1-kilometer street that transforms at sunset. By midnight, the street is closed to cars, packed with food stalls, and glowing with neon signs selling gold jewelry, traditional medicines, and century-old ingredients. The smell is overwhelming: grilled seafood, burning charcoal, incense. Families have run shops here for 100 years.",im:"An old woman in a gold shop counts banknotes at midnight while teenagers with motorcycles park outside, and neon signs reflect off the wet street after recent rain, creating a dreamlike glow.",t:"Metro MRT to Yaowarat, exit 1. Street comes alive 8pm-3am. Free to walk. Eat 50-200 THB per dish. Completely packed 9pm-midnight. Plan three to four hours.",c:["local_only"],r:"g",nn:"พื้นที่ไชน่าทาวน์ยาวราษฎร์ ตอนเที่ยงคืน",ns:"ถนนที่เต็มไปด้วยแสงนีออน ร้านอาหาร และทองคำ",nst:"ถนนยาวราษฎร์เป็นถนน 1 กิโลเมตรที่เปลี่ยนแปลงเมื่อพระอาทิตย์ลับขอบฟ้า เวลาเที่ยงคืน ถนนปิดสำหรับรถยนต์ เต็มไปด้วยแผงอาหาร และเรืองแสงด้วยป้ายนีออนขายทองคำ ยา และส่วนผสม",nt:"MRT สถานียาวราษฎร์ ทางออก 1 ถนนกลับชีวิต 8 น. - 3 น. เดินเล่นฟรี"},
  {id:6,n:"Baan Silapin — Artist House on Khlong Bang Luang",a:"Thonburi",v:["hidden", "beautiful", "spiritual"],d:60,s:"Traditional teak house on quiet khlong with puppet performances. Cats, boats, water sounds.",st:"Baan Silapin is a 200-year-old teak structure on the Bang Luang Canal in Thonburi. An elderly puppet master has lived here for half a century, performing traditional shadow puppet theatre three times daily. The performances are silent except for a gamelan musician. The intricate carved puppets act out ancient Indian epics behind an illuminated cloth screen. Donations voluntary. The water outside is still. Cats sleep in rafters. This is old Bangkok continuing without nostalgia.",im:"Shadows of dancing puppet figures move across a white screen while an elderly musician plays beside it, and through the window behind the screen water reflects light from the khlong.",t:"Hire longtail boat from Wat Rakhang or Arun Amarin pier, or take public ferry. Performances 11am, 2pm, 5pm daily. Donations 100-200 THB suggested. Allow one hour for performance plus journey.",c:["local_only"],r:"y",nn:"บ้านศิลปิน — คลองบางลำ",ns:"บ้านสักเก่า 200 ปี ตุ๊กตาเงา",nst:"บ้านศิลปินเป็นสักเก่า 200 ปี บนคลองบางลำ ศิลปินแสดงตุ๊กตาเงา 50 ปี การแสดงเงียบ เฉพาะศิลปินเล่นเดินส้อย",nt:"จ้างเรือยางจาก วัดราขัง หรือท่าเอรัณ อารมณ์ แสดง 11, 14, 17 น. บริจาค 100-200 บาท"},
  {id:7,n:"Bang Krachao — Green Lung Across River",a:"Khlong San",v:["nature", "quiet", "bikes"],d:120,s:"Loop of land covered in orchards, raised wooden walkways, temples, bicycle paths. Ferry plus bike equals Bangkok that feels like 1970.",st:"Bang Krachao is a crescent of undeveloped land in the middle of the Chao Phraya River. No cars allowed. You ferry across, rent a bike, and pedal through fruit orchards, past raised wooden houses, through temple compounds, over wooden footbridges that creak. Birds sound like they own the place. Old men sell mangoes from small stalls. The river curves all around you. Bangkok's skyline is visible just across the water—close enough to remember you're in a city, far enough to forget.",im:"A boy in a red shirt pedals slowly past a fruit orchard where an elderly farmer arranges mangoes in a wooden crate, while the Chao Phraya skyline rises in the background and a kingfisher darts low over the water.",t:"Metro BTS to Taksin, exit 3. Ferry across to Bang Krachao (15 THB). Bike rental 50-100 THB per day. Island open dawn to dusk. Best 6am-9am. Allow three to four hours to cover highlights.",c:["parks", "nature", "bikes"],r:"g",nn:"เกาะบางกระเข้า — ปอดเขียวของกรุงเทพ",ns:"วงเวียนพื้นที่เกาะ สวนผลไม้ เส้นทางจักรยาน รถเข้าไม่ได้",nst:"เกาะบางกระเข้าเป็นพื้นที่ทรงจันทร์ในแม่น้ำเจ้าพระยา ไม่มีรถยนต์เข้าได้ คุณข้ามแม่น้ำ เช่าจักรยาน และปั่นผ่านสวนผลไม้ บ้านไม้ยกพื้น วัด สะพานไม้ที่มีเสียงครวญครวญ",nt:"BTS Taksin ทางออก 3 ข้ามแม่น้ำไปเกาะบางกระเข้า 15 บาท เช่าจักรยาน 50-100 บาท"},
  {id:8,n:"Dusit Palace and Zoo Area",a:"Dusit",v:["history", "quiet", "local"],d:15,s:"The old royal neighborhood with palaces, a cheap zoo, and winding streets where time slowed down",st:"Dusit was built as a royal district in 1901. It remains quiet and tree-lined, with several palaces and government buildings set far apart. The Dusit Zoo is small, cheap, and full of local families rather than tourists. The neighborhood has a sleepy 1950s feel. You walk for hours and pass few other tourists. Many streets are shaded by old trees.",im:"A child stands before an elephant behind a glass barrier while a peacock walks freely through the zoo grounds, and the afternoon heat creates a haze over the tree-lined paths.",t:"Metro BTS to National Stadium, exit 5. Walk northeast 20 minutes. Zoo entry 100 THB. Open 8am-6pm. Palaces viewable from outside. Plan full day to explore neighborhood. Best 6am-10am.",c:["parks"],r:"g",nn:"พระราชวัง ดุสิต และสวนสัตว์",ns:"ย่านหลวงเก่า ที่เงียบสงบและมีสวนสัตว์ถูก ๆ",nst:"ดุสิตถูกสร้างเป็นย่านหลวงในปี 2444 มันยังคงเงียบสงบและฟังการสนทนา พระราชวังมีหลายแห่ง สวนสัตว์ดุสิตเล็ก ๆ ถูก และเต็มไปด้วยครอบครัวท้องถิ่นมากกว่านักท่องเที่ยว",nt:"BTS สถานีสนามกีฬาแห่งชาติ ทางออก 5 แล้วเดินไปทางตะวันออกเฉียงเหนือ 20 นาที ค่าเข้าสวนสัตว์ 100 บาท"},
  {id:9,n:"Democracy Monument",a:"Phra Nakhon",v:["history", "quiet"],d:8,s:"The 1932 monument marking Thailand's first constitution and transition to democracy",st:"The Democracy Monument was erected in 1932 to commemorate Thailand's first constitution and bloodless revolution. The sculpture shows an open hand offering the charter to the people. It stands in a quiet roundabout and is a gathering point for Thais but ignored by tourists. Every May 20 it lights up with ceremony. The monument itself is understated and powerful.",im:"An elderly man places flowers at the monument's base while traffic circles around him, and his face shows a quiet reverence for the history the structure represents.",t:"Metro MRT to Ratchadamnoen, exit 1. Monument is in the middle of the road in a roundabout. Free. Open anytime. 20 minutes.",c:["history_big"],r:"g",nn:"อนุสรณ์สถาน ประชาธิปไตย",ns:"อนุสรณ์สถาน 2475 ของประชาธิปไตยไทย",nst:"อนุสรณ์สถานประชาธิปไตยถูกตั้งในปี 2475 เพื่อระลึกถึงรัฐธรรมนูญฉบับแรกของไทยและการปฏิวัติอย่างสงบ รูปปั้นแสดงมือเปิดนำเสนออักษรต่อประชาชน",nt:"MRT สถานีราชดำเนิน ทางออก 1 อนุสรณ์สถานอยู่ตรงกลางถนนในวงเวียน ฟรี"},
  {id:10,n:"Erawan Shrine: Spirit House Legend",a:"Ratchaprasong",v:["weird", "local"],d:5,s:"A four-armed Brahma shrine that became a city legend after a murder, a love story, and decades of miracles",st:"The Erawan Shrine was built in 1956 to ward off bad luck during construction. It became Bangkok's most powerful spirit house. Legend says it granted a woman's wish to marry a millionaire, and she honored the shrine with dancers. Now devotees from across Asia come asking for miracles. You see incense smoke, garland offerings, and people praying with genuine hope. It is the intersection of city commerce and spiritual belief.",im:"An elderly woman in prayer stands before the four-armed Brahma statue while incense rises in thick coils around her face, and behind her a younger woman photographs herself with the shrine, documenting her prayer.",t:"Metro BTS to Chit Lom, exit 1. Shrine is in the middle of an intersection. Free. Open 6am-9pm. Busiest 7am-8am and 5pm-6pm. 15 minutes.",c:["weird"],r:"g",nn:"ศาลเจ้าพระแม่มารี",ns:"ศาลเจ้าที่ได้รับการรักษามวยที่มีตำนานมากมาย",nst:"ศาลเจ้าพระแม่มารีถูกสร้างในปี 2499 เพื่อขจัดโชคร้ายระหว่างการก่อสร้าง มันกลายมาเป็นศาลเจ้าที่มีพลังที่สุดในกรุงเทพ ตำนานกล่าวว่ามันให้พรให้กับผู้หญิงที่ต้องการแต่งงานกับเศรษฐี",nt:"BTS สถาน Chit Lom ทางออก 1 ศาลเจ้าอยู่ตรงกลางทางแยก ฟรี"},
  {id:11,n:"Chatuchak Weekend Market",a:"Chatuchak",v:["local", "weird"],d:20,s:"The world's largest weekend market: 35 acres, 15,000 stalls, everything sold including illegal animals",st:"Chatuchak opens only Saturday and Sunday and sprawls across 35 acres. There are 15,000 stalls selling clothing, antiques, plants, animals, counterfeit goods, food, and things you have never seen. The market has a maze-like structure. Many stalls are family-run for 20 years. It is chaotic, overwhelming, and fascinating. Go early to avoid the worst crowds. The animal section is controversial but real.",im:"A vendor sits surrounded by hundreds of potted plants in a narrow corridor of the market while tourists and locals push past each other, and the smell is a mix of grilled meat, flowers, and crowded humanity.",t:"Metro BTS to Mo Chit, exit 1. Market open 9am-6pm Saturdays-Sundays only. Free to enter. Arrive 8:30am. Budget 1,000-5,000 THB for shopping. Four to six hours.",c:["local_only"],r:"g",nn:"ตลาดนัดจตุจักร",ns:"ตลาดที่ใหญ่ที่สุดในโลก ทำงานเฉพาะวันเสาร์-อาทิตย์",nst:"ตลาดนัดจตุจักรเปิดเฉพาะวันเสาร์-อาทิตย์และขยายออกไป 35 เอเคอร์ มี 15,000 คนขาย ขายเสื้อผ้า โบราณวัตถุ พืช สัตว์ สินค้าปลอม อาหาร และสิ่งที่คุณไม่เคยเห็นมาก่อน",nt:"BTS สถาน Mo Chit ทางออก 1 ตลาดเปิด 9 น. - 6 น. วันเสาร์-อาทิตย์เท่านั้น ฟรี"},
  {id:12,n:"Victory Monument Early Morning Food Market",a:"Ratchathewi",v:["local", "free"],d:8,s:"A neighborhood food market open only 5am-8am where locals buy breakfast before work",st:"Victory Monument is famous as a political gathering place, but locals know it as the location of an excellent early morning food market. From 5am to 8am, vendors sell noodle soup, rice dishes, grilled meats, and drinks. The market collapses by 9am. You eat standing or sitting on plastic stools among Thai workers starting their day. No tourists, no photos, just food.",im:"A construction worker in a hard hat eats khao man gai from a bowl while standing at a stall, steam rising from the hot rice, while another vendor behind him ladled soup into a container.",t:"Metro BTS to Victory Monument, exit 1. Market only 5am-8am. Food 30-50 THB. Free. Completely over by 8am. One to two hours.",c:["local_only"],r:"g",nn:"ตลาดอาหารเช้า สถานีชัยสมรภูมิ",ns:"ตลาดที่เปิดเฉพาะ 5 น. - 8 น. ของท้องถิ่น",nst:"สถานีชัยสมรภูมิมีชื่อเสียงเพราะเป็นศูนย์รวมการเมือง แต่คนท้องถิ่นรู้จักมันจากตลาดอาหารเช้าที่ยอดเยี่ยม ตั้งแต่ 5 น. ถึง 8 น. ผู้ขายขายซูปเส้น ข้าว เนื้อย่าง และเครื่องดื่ม",nt:"BTS สถาน Victory Monument ทางออก 1 ตลาดเปิดเฉพาะ 5 น. - 8 น. เท่านั้น"},
  {id:13,n:"Phra Nakhon Khiri Phetchaburi Day Trip",a:"Phetchaburi",v:["history", "beautiful"],d:30,s:"A hilltop palace from the reign of King Mongkut in 1860, surrounded by old temples, one hour from Bangkok",st:"Phra Nakhon Khiri is a 19th-century palace on a hill in Phetchaburi province, overlooking a town that remains much unchanged. The palace chambers are modest but the views are spectacular. The surrounding hillside contains multiple temples and small structures. It is a day trip from Bangkok and feels like a complete world unto itself.",im:"A woman in a blue dress walks through a palace doorway carved with stucco flowers while morning light illuminates the old plaster and reveals the craftsmanship of 150 years of sitting in the sun.",t:"Train from Bangkok to Phetchaburi 3 hours. Then motorbike taxi 20 minutes uphill. Entry 100 THB. Open 8am-4:30pm. Allow full day. Return train 5pm.",c:["history_big"],r:"y",nn:"พระนครขีรี",ns:"พระราชวังบนเขา จากสมัยพระมงกุฎเกล้า",nst:"พระนครขีรีเป็นพระราชวังศตวรรษ 19 บนเขาในจังหวัดเพชรบุรี มองเห็นเมืองที่อยู่ด้านล่าง ห้องของพระราชวังเป็นแบบธรรมชาติ แต่วิวสวยงาม",nt:"รถไฟจากกรุงเทพไปเพชรบุรี 3 ชั่วโมง จากนั้นแท็กซี่มอเตอร์ 20 นาที ค่าเข้า 100 บาท"},
  {id:14,n:"Nonthaburi Market and Riverside",a:"Nonthaburi",v:["local", "free"],d:12,s:"A riverside provincial town 30 minutes north where locals buy produce and weekenders bike along the Chao Phraya",st:"Nonthaburi is the first province north of Bangkok. The riverside is lined with old wooden houses, fruit orchards, and a market where locals sell produce. Weekend cyclists and joggers use the riverbank path. The pace is slower than Bangkok. The air is cleaner. You are still close to the city but feel removed from it entirely.",im:"An elderly woman arranges dragon fruit in a pyramid at a riverside market stall while a jogger in bright clothes passes behind her and the river moves slowly in the background.",t:"Metro BTS to National Stadium, exit 3. Take Chao Phraya Express ferry north 30 minutes. Nonthaburi pier. Free to explore. Market 9am-5pm. Open anytime. Two to three hours.",c:["local_only"],r:"g",nn:"ตลาดนนทบุรี และแม่น้ำ",ns:"เมืองริมแม่น้ำ ที่ห่างจากกรุงเทพ",nst:"นนทบุรีเป็นจังหวัดแรกทางเหนือของกรุงเทพ ริมแม่น้ำเรียงแสดงบ้านไม้เก่า ไร่ผลไม้ และตลาดที่ขายผลไม้ ในวันสุดสัปดาห์นักปั่นจักรยานใช้เส้นทางริมแม่น้ำ",nt:"BTS สถานี National Stadium ทางออก 3 ขึ้นเรือด่วน Chao Phraya ไปทางเหนือ 30 นาที"},
  {id:15,n:"Talat Noi Backstreets — River Edge Labyrinth",a:"Talat Noi",v:["hidden", "history", "sensory"],d:120,s:"Maze of Chinese shophouses, shrines, old car-repair workshops, tiny cafés by Chao Phraya. Walk without headphones.",st:"Talat Noi's backstreets twist like a living organism. Temple bells echo between shophouses. Welding sparks fly from repair workshops. Wok smoke hangs in narrow passages. Old men repair motorcycles in doorways. Chinese shrines sit beside Thai temples. The river appears unexpectedly at every third corner. This isn't a tourist route—it's where Bangkok still breathes without permission.",im:"A mechanic in a blue shirt sits in an open garage doorway, welding torch casting orange light, while behind him a narrow lane curves toward a distant temple spire and morning light filters through shophouse windows.",t:"Metro BTS to Saphan Taksin, exit 3. Walk southwest along river 15 minutes toward Talat Noi. Neighborhood open 24 hours. Best 6am-10am for temple bells and wok smoke. Three to four hours.",c:["history_big"],r:"g",nn:"ตลาดน้อย ซอยด้านหลัง — เขาวงเวียนริมแม่น้ำ",ns:"เขาวงเวียนของร้านค้าจีน วัด ห้องซ่อมรถเก่า คาเฟ่เล็ก ๆ ริมเจ้าพระยา",nst:"ซอยของตลาดน้อยคดเคี้ยวเหมือนสิ่งมีชีวิต เสียงระฆังวัดสะท้อนระหว่างร้านค้า ประกายไฟแตกจากห้องซ่อมเครื่องจักร",nt:"BTS Saphan Taksin ทางออก 3 เดินตะวันตกเฉียงใต้ตามแม่น้ำ 15 นาที ตลาดน้อยเปิด 24 ชั่วโมง"},
  {id:16,n:"Pak Khlong Talat Flower Market 3am",a:"Rattanakosin",v:["night", "weird"],d:8,s:"Bangkok's wholesale flower market opens at midnight and peaks at 3am with thousands of vendors",st:"Pak Khlong Talat is a hidden wholesale flower market operating 24 hours but most active from midnight to 4am. Thousands of flowers arrive from farms at night. Vendors arrange orchids, roses, marigolds, and jasmine in the dim light. The smell is overwhelming and beautiful. You see real commerce, not tourism. The market collapses by 6am.",im:"A vendor in a headlamp arranges dozens of orchid stems into bouquets while around her thousands of flower heads in woven baskets create a sea of color under harsh night lights.",t:"Metro BTS to Saphan Taksin, exit 3. Walk south to flower market pier. Open 24 hours, peak 3am. Free to watch. Arrive 2:30am-3:30am. One to two hours.",c:["local_only"],r:"g",nn:"ตลาดดอกไม้ปากคลอง",ns:"ตลาดดอกไม้ขายส่ง ที่เปิดตอนกลางคืน",nst:"ตลาดดอกไม้ปากคลองเป็นตลาดดอกไม้ขายส่งที่ซ่อนอยู่ โดยเปิด 24 ชั่วโมง แต่สำคัญที่สุดคือ 24.00 น. - 4.00 น. ดอกไม้นับพันมาถึงจากฟาร์มในตอนกลางคืน",nt:"BTS สถาน Saphan Taksin ทางออก 3 เดินไปทางใต้ไปตลาดดอกไม้ เปิด 24 ชั่วโมง สูงสุด 3.00 น."},
  {id:17,n:"Phaya Thai Palace Tours",a:"Phaya Thai",v:["history", "hidden"],d:8,s:"A former royal palace now controlled by the military, accessible by special permission for brief touring",st:"Phaya Thai Palace was built in 1909 as a royal residence. It has been controlled by the military for decades and is rarely open to the public. Tours are possible but require making special arrangements and sometimes have periods of closure. When open, you see Victorian and Thai architectural fusion, empty halls, and a sense of a place suspended in time. Visiting requires patience and planning.",im:"An empty ballroom with peeling paint shows where royal balls once danced, while afternoon light slants through closed curtains and dust particles float in the silence.",t:"Contact local tourism office for access information. Located near Phaya Thai BTS station. Tours typically 30-60 minutes. Closed unpredictably. Plan ahead.",c:["history_big"],r:"y",nn:"พระราชวังพญาไท",ns:"พระราชวังเก่าที่ควบคุมโดยกองทัพ",nst:"พระราชวังพญาไทถูกสร้างในปี 1909 เป็นพระราชวัง มันถูกควบคุมโดยกองทัพเป็นเวลาหลายสิบปี และหาก ต้องขอการอนุญาตพิเศษ",nt:"ติดต่อสำนักท่องเที่ยวท้องถิ่นเพื่อขอข้อมูลการเข้าถึง"},
  {id:18,n:"Suan Phakkat Palace",a:"Ratchadamri",v:["history", "beautiful", "quiet"],d:10,s:"A private museum housed in five traditional Thai houses with lacquerware, art, and the life of a collector",st:"Suan Phakkat Palace is a collection of five old Thai teak houses moved to one location and preserved as a museum by a royal collector. The grounds are quiet gardens. Inside you see royal lacquerware, Buddha statues, art, and furniture showing Thai domestic life. Entry requires walking through a gate into a separate world.",im:"A woman sits in an empty room of an old wooden house looking at a glass case of antique lacquerware while sunlight illuminates dust particles and the sound of birds outside is the only noise.",t:"Metro BTS to Phaya Thai, exit 3. Walk northeast 10 minutes. Entry 100 THB. Open 9am-4pm. Closed Mondays and holidays. One to two hours.",c:["history_big"],r:"y",nn:"สวนผักษัตร",ns:"พิพิธภัณฑ์ส่วนตัว ในบ้านไม้ไทยเก่า 5 หลัง",nst:"สวนผักษัตรเป็นชุดของห้าบ้านไม้ไทยเก่า ที่ย้ายมาในสถานที่เดียว และอนุรักษ์เป็นพิพิธภัณฑ์โดยสะสมราชครอบครัว ลานสวนเงียบสงบ",nt:"BTS สถาน Phaya Thai ทางออก 3 เดินไปทางตะวันออกเฉียงเหนือ 10 นาที ค่าเข้า 100 บาท"},
  {id:19,n:"Santichaiprakarn Park Chao Phraya Riverfront Evening",a:"Phra Nakhon",v:["beautiful", "quiet", "romantic_water"],d:10,s:"A small riverside park where locals watch sunset over the Chao Phraya, no tourists, no crowds",st:"Santichaiprakarn Park is a narrow waterfront park along the Chao Phraya River where locals sit on benches and watch the water. It is quiet, free, and completely overlooked by tourists. Sunset turns the water gold. Fishermen cast lines. Couples sit in silence. It is the intersection of water, city, and stillness.",im:"An elderly man in a white shirt sits alone on a bench with a fishing line in the water while the sun lowers and his shadow stretches long across the grass beside him.",t:"Metro MRT to Ratchadamnoen, exit 1. Walk west 5 minutes toward river. Park open 6am-9pm. Free. Best 5:30pm-7pm. 30 minutes to one hour.",c:["parks", "romantic_water"],r:"g",nn:"สวนสนิทไชยปราการ",ns:"อุทยานริมแม่น้ำ ที่เงียบสงบและสวยงาม",nst:"สวนสนิทไชยปราการเป็นอุทยานริมน้ำแคบ ๆ ตามแม่น้ำเจ้าพระยา ที่คนท้องถิ่นนั่งบนม้านั่ง มองน้ำ มันเงียบสงบ ฟรี และไม่มีนักท่องเที่ยว",nt:"MRT สถาน Ratchadamnoen ทางออก 1 เดินไปทางตะวันตกไปยังแม่น้ำ 5 นาที"},
  {id:20,n:"Ratchada Train Market Night Market",a:"Huai Khwang",v:["night", "weird", "local"],d:12,s:"Thailand's coolest night market with 200 food and craft vendors on an old train platform, open weekends",st:"Ratchada Train Market operates in the old Ratchada Railway Station area on weekends only. Vendors set up stalls where trains once parked. The market is part food court, part craft fair, part night bazaar. The energy is high, the food is excellent, and the crowd includes mostly Thais. It feels like a secret place that only locals know, even though it is popular.",im:"A teenage couple eats grilled seafood on wooden sticks while neon signs reflect in puddles and music from a nearby stage creates a pulsing beat under the old railway canopy.",t:"Metro MRT to Huai Khwang, exit 1. Walk north 10 minutes. Open Friday-Sunday 5pm-11pm. Food 50-150 THB. Free entry. Two to three hours.",c:["local_only"],r:"g",nn:"ตลาดรถไฟรัชดา",ns:"ตลาดกลางคืนที่เย็นที่สุดของไทย",nst:"ตลาดรถไฟรัชดาทำงานในพื้นที่สถานีรถไฟรัชดาเก่า โดยเปิดเฉพาะวันสุดสัปดาห์เท่านั้น ผู้ขายตั้งคนขายที่เคยจอดรถไฟ ตลาดเป็นส่วนหนึ่งของสนามอาหาร ส่วนหนึ่งของตลาดงาน ส่วนหนึ่งของตลาดกลางคืน",nt:"MRT สถาน Huai Khwang ทางออก 1 เดินไปทางเหนือ 10 นาที เปิด ศุกร์-อาทิตย์ 5 น. - 11 น."},
  {id:21,n:"Huai Khwang Night Market and Local Food Street",a:"Huai Khwang",v:["night", "local"],d:10,s:"A lively neighborhood night market with dozens of food stalls and locals eating dinner at 9pm",st:"Huai Khwang Night Market is a traditional street market that operates in the evenings. Vendors set up stalls with grilled meats, noodles, desserts, and drinks. The crowd is mostly Thai families and workers eating dinner. It is loud, crowded, and authentic. You stand and eat from a small plate with a plastic fork, surrounded by dozens of other people doing the same.",im:"A mother holds a child on her hip while eating noodles with a wooden fork, while beside her a vendor grills chicken over charcoal and the smoke creates a haze in the narrow street.",t:"Metro MRT to Huai Khwang, exit 1. Market 5pm-10pm. Food 30-80 THB. Free entry. Busiest 7pm-8:30pm. Two hours.",c:["local_only"],r:"g",nn:"ตลาดกลางคืน ห้วยขวาง",ns:"ตลาดกลางคืน ที่เต็มไปด้วยคนท้องถิ่น",nst:"ตลาดกลางคืน ห้วยขวาง เป็นตลาดสตรีทดั้งเดิม ที่ทำงานในเวลาเย็น ผู้ขายตั้งคนขายกับเนื้อย่าง เส้นใหญ่ ของหวาน และเครื่องดื่ม",nt:"MRT สถาน Huai Khwang ทางออก 1 ตลาด 5 น. - 10 น."},
  {id:22,n:"Phu Khao Thong (Golden Mount) Free Climb",a:"Phra Nakhon",v:["history", "free", "beautiful"],d:12,s:"An artificial hill built from temple rubble in 1852, now a 360-degree viewpoint over old Bangkok",st:"Phu Khao Thong is an artificial mound created when a temple collapsed during floods in 1852. Rubble was piled up and the structure was gilded. Now it is a golden sphere visible from across Bangkok, and you can climb the stairs to the top for panoramic views. The climb is steep but short. The view shows the old wooden neighborhoods, temples, and the Chao Phraya River winding.",im:"A jogger climbs the steep exterior stairs of the golden mount while looking back at the sprawl of Bangkok's old neighborhoods spreading out behind him, a sea of tile roofs and temple spires.",t:"Metro MRT to Sanam Chai, exit 2. Walk south 10 minutes. Free to climb. Open 6am-6pm. Steep 40 steps. 20 minutes to summit.",c:["history_big"],r:"g",nn:"ภูเขาทอง",ns:"เนินเทียมสร้าง ที่เต็มไปด้วยทองคำ",nst:"ภูเขาทองเป็นเนินเทียมสร้างจากวัตถุเศษหลักจากที่วัดพังในสมัย 1852 เศษซากถูกวางซ้อนกัน และโครงสร้างถูกอุปถัมภ์ทองคำ ตอนนี้มันเป็นทรงกลมสีทองที่มองเห็นได้จากทั่วกรุงเทพ",nt:"MRT สถาน Sanam Chai ทางออก 2 เดินไปทางใต้ 10 นาที ขึ้นได้ฟรี"},
  {id:23,n:"The Giant Swing (Sao Ching Cha) at Wat Suthat",a:"Phra Nakhon",v:["history", "weird"],d:8,s:"A 25-meter wooden swing built in 1784 for a Hindu ceremony that swings dangerously high above the street",st:"The Giant Swing was built by King Rama I in 1784 for Hindu Brahmin ceremonies to bring good harvests. The swing reaches over 25 meters into the air and swings above a narrow Bangkok street. The ceremony is no longer performed for safety reasons, but the swing stands as a relic. It is an unusual monument: massive, old, and purposefully dangerous-looking.",im:"The enormous wooden swing hangs empty above a busy street while pedestrians walk beneath it, unaware of how high the structure swings during ceremonies that no longer occur.",t:"Metro MRT to Sanam Chai, exit 2. Swing is visible near Wat Suthat temple. Free to view from street. Walk around the temple. 30 minutes.",c:["history_big"],r:"g",nn:"ชิงชา (สาวชิงชา)",ns:"ชิงชาไม้ยักษ์ ที่ขึ้นสูง 25 เมตร",nst:"ชิงชาถูกสร้างโดยพระบาทสมเด็จพ่อที่ 1 ในปี 1784 สำหรับพิธีสิวลี เพื่อเก็บเกี่ยวที่ดี ชิงชาสูงกว่า 25 เมตร และดัดแปลงสูงเหนือถนนกรุงเทพแคบ ๆ",nt:"MRT สถาน Sanam Chai ทางออก 2 ชิงชามองเห็นได้ใกล้วัดสุทัศน์"},
  {id:24,n:"Bang Kapi Market District",a:"Bang Kapi",v:["local", "free"],d:10,s:"A sprawling neighborhood market in eastern Bangkok where locals buy daily supplies and eat lunch",st:"Bang Kapi is a large neighborhood market in a working-class Bangkok district. The market covers several blocks with vegetable vendors, fish stalls, and food restaurants. It is completely local: families with children, workers on break, elderly people shopping daily. No tourists in sight. You can eat excellent rice and curry for a few dollars.",im:"A grandmother selects fresh ginger from a pile while haggling with a vendor, while behind them a worker eats curry rice quickly from a bowl, standing in a narrow corridor of the market.",t:"Metro MRT to Bang Kapi, exit 1. Market immediately near station. Open 7am-6pm. Food 50-100 THB. Free. Two hours.",c:["local_only"],r:"g",nn:"ตลาดบางกะปิ",ns:"ตลาดละแวกที่เต็มไปด้วยคนท้องถิ่น",nst:"ตลาดบางกะปิเป็นตลาดละแวกขนาดใหญ่ในเขตกรุงเทพ ตลาดครอบคลุมหลายบล็อกด้วยผู้ขายผักสินค้า คนท้องถิ่นมาซื้อสินค้าวันนี้",nt:"MRT สถาน Bang Kapi ทางออก 1 ตลาดใกล้สถานีทันที"},
  {id:25,n:"Talad Rot Fai Ratchada Amphitheater View",a:"Huai Khwang",v:["weird", "night"],d:10,s:"An abandoned railway yard with a sunken amphitheater on the grounds visible from above, now a night market",st:"The Ratchada train yard once parked trains and had an amphitheater built into the grounds. Much of this infrastructure is now a weekend night market, but walking the grounds you see the architectural bones: the sunken amphitheater, old railway tracks, loading platforms. It is a strange layering of old industrial function and current commerce.",im:"A vendor sets up stalls in what was once an amphitheater while old railway tracks remain visible in the cracked ground beneath her feet and she arranges goods in the vanished theater's seating areas.",t:"Metro MRT to Huai Khwang, exit 1. Walk north 10 minutes. Market Friday-Sunday 5pm-11pm. Free to explore. One to two hours.",c:["weird"],r:"g",nn:"ตลาดรถไฟรัชดา ห้องประชุม",ns:"สนามรถไฟเก่า ที่มีโรงละคร",nst:"สนามรถไฟรัชดาเคยจอดรถไฟและมีโรงละครเล็ก ๆ สร้างในพื้นที่ ตอนนี้เป็นส่วนหนึ่งของตลาดกลางคืน",nt:"MRT สถาน Huai Khwang ทางออก 1 เดินไปทางเหนือ 10 นาที"},
  {id:26,n:"Wat Benchamabophit Marble Temple",a:"Dusit",v:["history", "quiet", "beautiful"],d:8,s:"An 1899 temple built entirely from white Carrara marble imported from Italy, glowing in morning light",st:"Wat Benchamabophit is one of Bangkok's newest major temples, built in 1899. The entire structure is white Italian marble, which was revolutionary for Thailand at the time. The temple stands out in pure white against the sky. Monks walk the marble corridors. It is a functioning temple, not a tourist attraction. Visit early morning when monks meditate and chant.",im:"A young monk in orange robes walks barefoot across white marble floors that reflect the ceiling above, while morning light illuminates the emptiness of the corridor and his footsteps echo.",t:"Metro BTS to National Stadium, exit 5. Walk northeast 10 minutes. Open 5am-9pm. Free to enter. Best 6am-7am. One hour.",c:["history_big"],r:"g",nn:"วัดเบญจมบพิตร",ns:"วัดหินอ่อนไข่ สีขาว ที่สวยงามมาก",nst:"วัดเบญจมบพิตรเป็นหนึ่งในวัดใหญ่ที่สร้างใหม่ของกรุงเทพ สร้างในปี 1899 โครงสร้างทั้งหมดเป็นหินอ่อน Carrara ของอิตาลี ซึ่งเป็นเรื่องปฏิวัติในไทยในสมัยนั้น",nt:"BTS สถาน National Stadium ทางออก 5 เดินไปทางตะวันออกเฉียงเหนือ 10 นาที"},
  {id:27,n:"Royal Barge Museum Thonburi",a:"Thonburi",v:["history", "beautiful"],d:10,s:"Ancient royal parade boats with gold and jeweled decorations used for processions, displayed on a canal",st:"The Royal Barge Museum displays the actual boats used for royal processions on the Chao Phraya River. The boats are enormous, ornate, intricately carved, and gilded. They are rarely used now, but the collection shows the craftsmanship and ceremony of Thai royalty. The boats are visible along a still canal.",im:"An ornate golden boat with an enormous carved prow sits motionless in a canal while a caretaker in old clothes sits on its deck reading a newspaper, the boat catching afternoon light.",t:"Take longtail boat from Wat Rakhang pier 100 THB. Museum open 9am-5pm. Entry 100 THB. Closed Mondays. One to two hours.",c:["history_big"],r:"y",nn:"พิพิธภัณฑ์เรือหลวง",ns:"เรือพระที่ศักดิ์สิทธิ์ ประดับปพยพและอัญมณี",nst:"พิพิธภัณฑ์เรือหลวงจัดแสดงเรือจริงที่ใช้สำหรับการแห่พระพิจารณาบนแม่น้ำเจ้าพระยา เรือมีขนาดใหญ่ ฟุ่มเฟือย และเรียบเรียงด้วยความประณีต",nt:"จ้างเรือยางจาก ท่าวัดราขัง 100 บาท พิพิธภัณฑ์เปิด 9 น. - 5 น. ค่าเข้า 100 บาท"},
  {id:28,n:"Lak Mueang City Pillar Bangkok",a:"Rattanakosin",v:["history", "quiet"],d:5,s:"The spiritual foundation stone of Bangkok itself, a pillar said to house the city's soul, built in 1782",st:"Lak Mueang is the city pillar that marks Bangkok's spiritual foundation. Built in 1782 by King Rama I, it is believed to house the city's protective spirit. Devotees come to pray and make offerings. The pillar stands in a small shrine near the Grand Palace. Despite its historical significance, most tourists miss it entirely.",im:"An elderly woman lights incense in a shrine around the ancient pillar while whispering a prayer, her hands pressed together, and the smoke rises around the wooden structure that has stood for 240 years.",t:"Metro MRT to Sanam Chai, exit 1. Pillar is near Grand Palace. Free. Open 6am-9pm. 15 minutes.",c:["history_big"],r:"g",nn:"หลักเมืองแห่งกรุงเทพ",ns:"เสาตั้งสิ่งศักดิ์สิทธิ์ของกรุงเทพ",nst:"หลักเมืองแห่งกรุงเทพเป็นเสาปลายที่ทำให้กรุงเทพมีพื้นฐาน สร้างในปี 1782 โดยพระบาทสมเด็จพ่อที่ 1 เชื่อกันว่าเป็นที่อาศัยของจิตวิญญาณป้องกัน",nt:"MRT สถาน Sanam Chai ทางออก 1 เสาอยู่ใกล้วัง ฟรี"},
  {id:29,n:"Street Food on Charoen Krung Road",a:"Talat Noi",v:["local", "history"],d:10,s:"Bangkok's oldest road from 1861, lined with street food vendors and colonial-era storefronts",st:"Charoen Krung Road is Bangkok's first planned street, laid out by King Mongkut in 1861. The street remains lined with old shophouses, antique shops, and persistent street food vendors. Walking Charoen Krung is walking through Bangkok's commerce from the 19th century to now. The food is excellent and cheap.",im:"A vendor grills meatballs on skewers over a charcoal fire while colonial-era shophouses with peeling paint stand behind her, and a motorcycle taxi waits at the curb.",t:"Metro BTS to Saphan Taksin, exit 3. Walk east along river. Road runs north-south. Open anytime. Street food 30-80 THB. Two hours.",c:["local_only"],r:"g",nn:"ถนนเจริงกรุง",ns:"ถนนเก่าแก่สุดของกรุงเทพ ตั้งแต่ปี 1861",nst:"ถนนเจริงกรุงเป็นถนนที่วางแผนแรกของกรุงเทพ วางแผนโดยพระบาทสมเด็จพ่อที่ 4 ในปี 1861 ถนนยังคงเต็มไปด้วยร้านค้าเก่า ร้านโบราณวัตถุ และผู้ขายขนมขบเคี้ยว",nt:"BTS สถาน Saphan Taksin ทางออก 3 เดินไปทางตะวันออกตามแม่น้ำ"},
  {id:30,n:"Wat Traimit Golden Buddha",a:"Chinatown",v:["history", "beautiful"],d:8,s:"A solid gold Buddha statue weighing 5.5 tonnes, covered for 200 years until 1955, now in a modern temple",st:"The Golden Buddha was covered in stucco and hidden for 200 years. In 1955, when the stucco cracked, the gold inside was revealed. The statue is nearly 4 meters tall and weighs 5.5 tonnes of solid gold. It is now housed in a modern temple built to protect it. The face is serene, the posture is meditation, and the scale is overwhelming.",im:"A man stands before the enormous golden Buddha in quiet awe, his hand pressed to his chest in reverence, while the light reflects off the metal surface and creates a glow around the statue's calm face.",t:"Metro MRT to Yaowarat, exit 1. Temple open 8am-5pm. Entry 40 THB. One hour.",c:["history_big"],r:"y",nn:"วัดไตรมิตร พระพุทธรูปสีทอง",ns:"พระพุทธรูปทองคำแท้ สองพันห้าร้อยกิโล",nst:"พระพุทธรูปทองคำถูกปิดด้วยปูนขาวและซ่อนไว้ 200 ปี ในปี 1898 เมื่อปูนขาวแตก ทองคำข้างในก็ถูกเปิดเผย พระรูปสูง 4 เมตรเกือบและหนัก 5.5 ตันทองคำแท้",nt:"MRT สถาน Yaowarat ทางออก 1 วัดเปิด 8 น. - 5 น. ค่าเข้า 40 บาท"}
,
  {id:31,n:"Chao Phraya River Sunset Cruise — Floating Temple Views",a:"Along Chao Phraya",v:["beautiful","romantic_water","sunset"],d:0,s:"A simple longtail boat at sunset traveling the Chao Phraya River, watching temples light up and the city turn gold.",st:"The Chao Phraya River is Bangkoksmain artery. At sunset, locals and travelers take longtail boats—simple wooden boats with powerful motors. As you float downstream, temples appear illuminated, the water reflects the sky, and the city transforms.",im:"Floating on the water. Temples silhouetted. Gold light on the river. A few other boats. The sound of the motor.",t:"Flag down a longtail boat at any pier (Central, Wat Arun, or Sathorn). Cost 20–50 baht per person for a shared boat. Go at 5:15pm to catch sunset. Allow 1 hour.",c:["beautiful","romantic_water","sunset"],r:"g",nn:"ล่องเรือพระราชวัง",ns:"เรือยาวที่ลงแม่น้ำเจ้าพระยา พอนาคม ชมเมืองสีทองและวัดไฟ",nst:"แม่น้ำเจ้าพระยาคือหลัวใจหลักของเมืองกรุงเทพ ลงเรือเย็นหลังตะวันกำลังจะตกกำลังลงไป",nt:"หาเรือยาว ณ ที่จอดใด ๆ (Central, Wat Arun, หรือ Sathorn). ค่าโดยสาร 20–50 บาท ต่อคน"},
  {id:32,n:"Taling Chan Floating Market — Fruit Boats at Morning",a:"West Bangkok",v:["markets","local","beautiful"],d:40,s:"One of the last authentic floating markets where vendors sell fruit from wooden boats—you arrive at 7am when it's still real.",st:"Taling Chan Floating Market is operational every weekend and still functions as a real market, not a tourist show. Vendors arrive early with boats loaded with tropical fruit, snacks, and cooked food. The market is active 7am–noon.",im:"Wooden boats. Piles of mangoes and rambutan. A vendor in a straw hat. The smell of fruit and water. No tourists visible.",t:"Take a taxi or Grab to Taling Chan Floating Market. Go Saturday or Sunday morning, 7–9am. Entry is free. Buy fruit directly from boats. Allow 1–2 hours. No organized tours—just locals buying.",c:["markets","local"],r:"y",nn:"ตลาดลอยน้ำท่าลิ่ง",ns:"หนึ่งในตลาดลอยน้ำสุดท้ายที่ยังคงเป็นของจริง",nst:"ตลาดลอยน้ำท่าลิ่งดำเนินการ ทุกวันสุดสัปดาห์ และยังคงทำหน้าที่เป็นตลาดจริง",nt:"ไปที่วันเสาร์หรือวันอาทิตย์ตอนเช้า 7–9 นาฬิกา"},
  {id:33,n:"Wat Saket Golden Mount — Climb for City Views",a:"Old City",v:["history","beautiful","quiet"],d:15,s:"A small temple on an artificial hill with 318 steps—climb to the top for 360-degree views of Bangkok and the temple grounds below.",st:"Wat Saket is an ancient temple on an artificially created hill. You climb 318 steps to reach the golden chedi at the top. The views are extraordinary—you see the entire old city, the Chao Phraya River, and modern Bangkok beyond.",im:"Standing at the top. The city spread beneath you. A golden structure. The river winding through. Heat. Light. Completely exposed.",t:"Located in the old city area, near Khao San Road. Take BTS or a taxi. Entry fee: 20 baht. Open 7am–5pm daily. The climb is steep but manageable in 15 minutes. Go early morning before heat.",c:["history","beautiful"],r:"g",nn:"วัดสะเก็ต",ns:"วัดเล็ก ๆ บนเนินเขาเทียมพร้อมชั้นบันได 318",nst:"วัดสะเก็ตเป็นวัดโบราณบนเนินเขาที่สร้างขึ้นเป็นประดิษฐ์",nt:"ตั้งอยู่ในบริเวณเมืองเก่า ใกล้กับถนนข้าวสาร"},
  {id:34,n:"Lumphini Park Early Morning — Tai Chi & Exercise Locals",a:"Central Bangkok",v:["local","quiet","beautiful"],d:10,s:"At 6am, locals fill Lumphini Park for tai chi, jogging, and exercise—the water is still, the air is cool, and the city hasn't started yet.",st:"Lumphini Park is Bangkok's largest public park. At dawn, it transforms into a space for local exercise and meditation. Tai chi groups move in synchronization. Joggers run the paths. People fish from the lake. By 8am tourists start arriving.",im:"6am light. Synchronized tai chi on the grass. Joggers passing. The lake still. A few early birds. Complete calm.",t:"Enter at any gate. Go 6–8am daily. No entry fee. Bring water. Locals will welcome you to join tai chi groups. Comfortable clothes needed. Avoid weekends if possible.",c:["local","quiet"],r:"g",nn:"สวนลุมพินี",ns:"ตอน 6 นาฬิกาเช้า สถานที่เต็มไปด้วยสัปเตช์ของชาวบ้าน",nst:"สวนลุมพินีเป็นสวนสาธารณะที่ใหญ่ที่สุดของกรุงเทพ ตอนรุ่งสาง จะเปลี่ยนเป็นพื้นที่สำหรับการออกกำลังกาย",nt:"เข้า ณ ประตูใด ๆ ไป 6–8 นาฬิกาเช้า ทุกวัน"},
  {id:35,n:"Grand Palace",a:"Rattanakosin",v:["famous","history"],d:90,s:"The official residence of Thai kings for 240 years. The Emerald Buddha sits in the innermost chapel under intense security.",st:"The Grand Palace is a sprawling complex of ornate buildings at the water\'s edge. The main temple, Wat Phra Kaew, houses the Emerald Buddha - small, carved from jade, dressed in gold robes that change with the seasons. You cannot photograph it. Guards stop you at a rope.\\n\\nArrive before 8:30am or after 3pm to avoid tour groups. The sound of bells, the smell of incense, the silence inside the chapel - that is why you go.",im:"Standing in front of the Emerald Buddha, dressed in intricate gold. Silence. Guards everywhere. Completely still.",t:"Open 8:30am-3:30pm (closed Mon, Buddhist holidays). Entry 500 THB. No shorts, sleeveless shirts, or hats. Arrive early. 5 min BTS to Sanam Luang.",c:["greatest_hits","history_big"],r:"g",nn:"พระบรมมหาราชวัง",ns:"ที่อยู่อาศัยของพระมหากษัตริย์ 240 ปี",nst:"วังพระบรมมหาราชวัง คือ คอมเพล็กซ์ของอาคาร ที่สุดขอบน้ำ วัดพระแก้ว",nt:"เปิด 8:30-15:30 ค่าเข้า 500 บาท ไปตอนเช้า"},
  {id:36,n:"Wat Arun at Sunset from Water",a:"Thonburi",v:["famous","beautiful","romantic_water"],d:60,s:"Bangkok\'s most iconic temple rises 86 meters covered in porcelain tiles. Watch it from the river at dusk.",st:"Wat Arun is famous for three things: the scale, the geometry, where it sits. The prang is decorated with porcelain and glazed tiles that catch light. At sunset, it is fire.\\n\\nBest experience: sit on the opposite bank at a cafe, take the ferry across, watch it from water. Climb to the top platform if you enter - views of the city are extraordinary.",im:"The prang at sunset, covered in porcelain tiles catching the last light, rising from the river. Water reflects it.",t:"Best seen from Asiatique pier or from a cafe on the opposite bank. Ferry to Wat Arun pier is 4 THB. Entry 100 THB. Go at 5-5:30pm for light. Sunset cruises depart 5pm-7pm (600-900 THB with food).",c:["greatest_hits","high_spots","romantic_water"],r:"g",nn:"วัดอรุณ พระอาทิตย์ตก",ns:"วัดสวยที่สุด Bangkok",nst:"วัดอรุณชื่นชอบเพราะ: ขนาด เรขาคณิต และที่ตั้ง",nt:"ดูดีที่สุดจากท่า Asiatique"},
  {id:37,n:"Jim Thompson House",a:"Pathum Wan",v:["famous","history","weird"],d:60,s:"An American silk merchant collected six teak houses and filled them with Khmer sculptures. Then vanished in Malaysia 1967.",st:"Jim Thompson came to Bangkok after WWII obsessed with Thai silk. He bought six traditional wooden houses (no nails), moved them here, filled them with Khmer sculptures, Buddhist paintings, ceramics. In 1967 he walked into the Malaysian jungle and was never found.\\n\\nThe houses are a museum. You see them as he left them - cluttered, lived-in, beautiful. The architecture is Thai traditional. The art is extraordinary.",im:"Walking through creaking wooden rooms filled with Hindu sculptures, ancient paintings, and polished teak, lit by slanted afternoon light.",t:"Guided tours only: English tours at 10am, 11:30am, 1pm, 2:30pm, 4pm. Tue-Sun. Entry 200 THB. Near Sanam Luang BTS. 45 min. Book online to skip lines.",c:["greatest_hits","history_big","weird"],r:"g",nn:"บ้านจิม ทอมสัน",ns:"บ้านไม้สักหกหลัง",nst:"จิม ทอมสัน มาถึง Bangkok หลังสงครามโลก",nt:"ทัวร์เดินชม: อังกฤษ 10:00, 11:30"},
  {id:38,n:"Floating Markets at Damnoen Saduak",a:"Ratchaburi",v:["famous","markets","morning"],d:120,s:"Wooden boats, vendors in conical hats selling fruit from the water. The postcard version of Thailand. Go at 6am, leave by 8am.",st:"Damnoen Saduak is where tour buses arrive starting at 8am. By 9am boats push through camera phones. The magic is arriving when water is still dark. 6:30am. Vendors are setting up. Air is cool. Maybe ten tourists instead of hundreds.\\n\\nYou buy fresh coconuts, watch boats maneuver in narrow channels, see actual commerce before the day starts.",im:"A wooden boat piled with dragon fruit and roses. An elderly woman in a conical hat paddling silently through narrow channels. Grey-gold light.",t:"Private car from Bangkok (3 hours each way, 1200-1500 THB). Leave 4:30-5am to arrive 6:30am. Or minibus 4 hours (120 THB) from Mo Chit. Hire boat (400-600 THB/hour). Bring cash. Stay away 8am-4pm.",c:["greatest_hits","markets","morning"],r:"g",nn:"ตลาดลอยน้ำ ดำเนินสะดวก",ns:"เรือไม้ ผู้ขายสินค้า",nst:"ตลาดลอยน้ำ Damnoen Saduak เมื่อ 6:30 น.",nt:"รถส่วนตัว 3 ชั่วโมง 1200-1500 บาท"},
  {id:501,n:"Grand Palace and Emerald Buddha",a:"Rattanakosin",v:["famous","history","beautiful"],d:120,s:"The royal palace since 1782 — 218,000 square meters of gold, intricate detail, and the Sacred Emerald Buddha still in residence.",st:"The Grand Palace is one of Southeast Asia\'s most complex structures. Enter through the gates and immediately you see gold — everywhere, on roofs, pillars, spires. The main temple (Wat Phra Kaew) houses the Emerald Buddha, a small carved jade figure that is the most sacred object in Thailand. The surrounding cloisters tell the Ramayana in intricate murals.

The palace is active — the king still uses certain sections. Guards stand at posts. The order and geometry are perfect. Walk slowly. The detail is overwhelming. Bare shoulders, knees, and closed shoes required. Go early to avoid crowds and the heat.

Safety: Daytime visits to major attractions like this are safe. Dress appropriately (rent sarongs at entrance if needed). Avoid unofficial guides offering entrance — go direct.",im:"Standing inside the main temple looking up at the ceiling covered in gold leaf, the Emerald Buddha on its altar behind bulletproof glass.",t:"Rattanakosin. Open 8:30am-4:30pm daily (may close during royal ceremonies). ฿500 entry (about €14). RTB Boat to Tha Chang. No photography inside. Modest dress required.",c:["greatest_hits","history_big","beautiful"],r:"g",nn:"大王宮和翡翠佛",ns:"自1782年以來的皇宮 — 218,000平方米的金色、複雜的細節。",nst:"大王宮是東南亞最複雜的建築之一。進入大門，立即看到金色 — 到處都是，在屋頂、柱子、尖塔上。

宮殿是活躍的 — 國王仍然使用某些部分。衛兵站在崗位上。秩序和幾何是完美的。",nt:"拉塔納科辛。8:30-16:30每日開放。฿500入場。RTB船至Tha Chang。"},
  {id:502,n:"Wat Arun at sunrise",a:"Thonburi",v:["famous","beautiful","romantic_water"],d:45,s:"The "Temple of Dawn" with a central prang 82 meters tall — most stunning at the moment the sun rises behind it.",st:"Wat Arun (Temple of Dawn) sits on the opposite bank of the Chao Phraya River from the Grand Palace. The main prang (spire) is decorated with ceramic and porcelain pieces in intricate patterns. The structure is symmetrical and rises from the river\'s edge.

The best time to visit is sunrise. Take a long-tail boat across the river just before dawn. Climb the prang steps and wait for the sun. As it rises behind the temple, the light turns the ceramics gold. The river is still. There\'s almost no one there. This is the money shot but it\'s genuine.",im:"Sitting on the upper level of the prang as the sun rises, the ceramic pieces glowing gold, the river below still and gold.",t:"Thonburi, opposite the Grand Palace. Open 8:30am-5:30pm daily. ฿100 entry (about €3). Take long-tail boat from Tha Chang (฿100 round trip). Go 5-6am for sunrise. BTS Saphan Taksin + boat or cross from Grand Palace area.",c:["greatest_hits","beautiful","romantic_water"],r:"g",nn:"黎明寺",ns:""黎明之廟"，中央塔82米高 — 日出時最驚人。",nst:"黎明寺位於昭披耶河的對岸，与大王宮相對。主塔被裝飾為複雜的陶瓷和瓷器。

最好的參訪時間是日出。日出前乘坐長尾船渡河。爬塔樓台階並等待太陽。",nt:"吞武里。8:30-17:30每日開放。฿100入場。長尾船฿100來回。"},
  {id:503,n:"Chatuchak Weekend Market",a:"Chatuchak",v:["famous","local","free entry"],d:180,s:"27 acres and 15,000 vendors — the world\'s largest weekend market where locals actually buy their lives.",st:"Chatuchak Market operates Saturday-Sunday with 15,000 vendors organized by section: clothes, furniture, plants, books, food, antiques, pet supplies. The scale is overwhelming — you cannot see everything in a single day. But the point is not to see everything.

Go with a local or a guidebook and head to specific sections. The plant section is extraordinary — orchids, succulents, rare species. The food section is nonstop eating. The antique and used items section has treasures. Prices are extremely low. Haggling is expected but not necessary. The energy is pure commerce.

Safety note: Crowded areas mean pickpockets are active. Keep valuables secured. Go in pairs if possible. Daytime is safest. Avoid carrying excessive cash.",im:"Walking through the plant section at noon, vendors selling rare orchids and succulents, the air thick with plant smell.",t:"Chatuchak. Open Saturday-Sunday 9am-6pm. Completely free entry. MRT/BTS to Chatuchak Park. Food stalls ฿30-100 per item. Dress for heat and crowds. Go early morning for best selection.",c:["greatest_hits","local","free entry"],r:"g",nn:"恰圖恰克週末市場",ns:"27英畝和15,000個小販 — 世界上最大的週末市場。",nst:"恰圖恰克市場在週六-週日運營，有15,000個小販按部分組織：衣服、家具、植物、書籍、食物、古董、寵物用品。

規模令人難以置信 — 您無法在一天內看到一切。但重點不是看到一切。",nt:"恰圖恰克。週六-週日9-18開放。完全免費進入。BTS至恰圖恰克公園。食物攤位฿30-100。"},
  {id:504,n:"Muay Thai at Rajadamnern Stadium",a:"Rattanakosin",v:["famous","local","weird"],d:150,s:"Watch Thai boxing in the national stadium where champions fight — not a tourist show, the real thing.",st:"Rajadamnern Stadium is where professional Muay Thai fighters compete at the highest level. The stadium has been operating since 1945. Fights happen 5 nights a week. The betting is intense. The skill is extraordinary. The sound is both brutal and precise — the impact of shin on shin, the crowd roaring.

Go to an evening fight (5-11pm) and sit in the tourist section or better yet with locals. Arrive early. Buy a program. Watch the undercard fights where younger fighters prove themselves. The main event features fighters who have trained since childhood. The speed and power are overwhelming.",im:"Sitting in the stadium as a main event fight happens — the roar of the crowd, the explosive kicks, the precision of movement.",t:"Rattanakosin. Fights Tuesday-Sunday 5-11pm. Tickets ฿400-2000 depending on section (about €11-55). Online booking available. Arrive 30 min early. BTS/MRT to nearby stations. Safety: Avoid areas with heavy drinking. Stick with crowds.",c:["greatest_hits","local","weird"],r:"g",nn:"拉查達姆嫩體育場",ns:"在國家體育館觀看泰拳 — 不是旅遊表演，真實的東西。",nst:"拉查達姆嫩體育館是專業泰拳選手在最高級別競賽的地方。體育館自1945年以來一直在運營。戰鬥每週發生5個晚上。

去一場晚間比賽（17-23）並坐在遊客區或更好的是和當地人一起。提前到達。",nt:"拉塔納科辛。週二-週日17-23戰鬥。票฿400-2000。在線預訂可用。"}

  {id:533,n:"Phraya Nakhon Cave Day Trip",a:"Sam Roi Yot",v:['day_trips','nature','caves'],d:480,s:"Cave in national park 3 hours away, light shafts through ceiling, hiking.",st:"Drive 3 hours to Sam Roi Yot. Hike 45 min to cave. Inside light shafting through ceiling holes. Beach beyond cave entrance. Staircase visible in light.

Swim in cave pool. Sit in shafts of light.",im:"Light shafts in cave, staircase, beach, natural formations.",t:"Car rental or tour. 6am start. 3-hour drive. Entrance fee 300 baht.",c:["day_trips", "nature"],r:"g",nn:"ถ้ำพระยานคร",ns:"Cave light shafts",nst:"6am start.",nt:"Car from Bangkok."},
  {id:534,n:"Sukhothai Temples Historic Park Day",a:"Sukhothai",v:['day_trips','history'],d:600,s:"Ancient capital ruins 5 hours north, temples, ponds, cycling.",st:"Train or drive early 6am. Arrive 11am. Rent bike. Cycle through ruins of 40+ temples. Ponds everywhere. Stonework beautiful and crumbling.

Stop at each. Feel history layer.",im:"Temple ruins, cycling paths, ponds, stone statues, peaceful.",t:"Train 7am Sukhothai. 5 hours. Or rent car. Full day trip.",c:["day_trips", "history"],r:"g",nn:"สุโขทัย",ns:"Ancient temple park",nst:"6am start.",nt:"Bangkok station."},
  {id:535,n:"Khao San Alley Hidden Rooftop",a:"Khao San",v:['neighborhoods'],d:120,s:"Find rooftop overlooking chaos, quiet escape above Khao San madness.",st:"Enter building. Climb stairs. Find rooftop. Above street noise. Locals sitting. Few tourists know. View of madness below. Quiet above.

Sit. Watch chaos. Drink. Reflect.",im:"Rooftop view of Khaosan below, quiet above noise.",t:"BTS Saphan Kwai. Walk Khaosan. Enter building. Climb stairs.",c:["neighbourhoods"],r:"g",nn:"หลังคา",ns:"Rooftop escape",nst:"Sunset climb.",nt:"Saphan Kwai BTS."}
,
  {id:536,n:"Bangkokian Museum — Wooden Houses in Time",a:"Dusit",v:["hidden", "history", "quiet"],d:45,s:"Three preserved wooden houses from 1940s-60s Bangkok life. Garden muffles city. Almost nobody comes.",st:"The Bangkokian Museum is three linked wooden houses preserved as a time capsule of middle-class Bangkok life between 1940-1960. The rooms are exactly as they were—furniture, photographs, kitchen tools, children's toys. A garden surrounds the houses and muffles the city completely. You stand in a living room and hear only leaf-rustle and distant temple bells. Western tourists never find it. Thai history students come sometimes. Mostly you are alone.",im:"An elderly woman stands in a 1950s kitchen, hands on a wooden counter, while morning light streams through small windows and a framed family photo hangs above her.",t:"Metro BTS to National Stadium, exit 5. Taxi or walk northeast 20 minutes to Dusit area. Museum open Tuesday-Sunday 10am-4pm. Entry 50 THB. Closed Mondays. Allow 45 minutes.",c:["history_big"],r:"g",nn:"พิพิธภัณฑ์กรุงเทพเมื่อวาน",ns:"บ้านไม้เก่า สามหลัง ชีวิตกรุงเทพ ค.ศ. 1940-1960",nst:"พิพิธภัณฑ์กรุงเทพเมื่อวานเป็นบ้านไม้สามหลังที่เชื่อมต่อกัน เก็บรักษาไว้เป็นช่วงเวลาของชีวิตชนชั้นกลางกรุงเทพ ระหว่าง 1940-1960 ห้องทั้งหมดยังคงอยู่เหมือนเดิม เฟอร์นิเจอร์ รูปถ่าย เครื่องครัว ของเล่นเด็ก สวนล้อมรอบบ้านและตัดเสียงเมืองออก",nt:"BTS National Stadium ทางออก 5 แท็กซี่ไปทางตะวันออกเฉียงเหนือ 20 นาที เปิด เอ., 10-16 น. ค่าเข้า 50 บาท ปิดจันทร์"},
  {id:537,n:"Kudeejeen — Three Faiths One Waterfront",a:"Talat Noi",v:["history", "hidden", "spiritual"],d:60,s:"Portuguese-founded Catholic church, Chinese shrine, Thai wooden houses on same lane. Famous bakery with 1600s recipe egg custard tarts.",st:"Kudeejeen lane was founded by Portuguese traders in the 1600s and remains a remarkable intersection of three faiths. A small Portuguese Catholic church sits 50 meters from a Chinese shrine. Thai wooden houses stand between them. The street is narrow, quiet, and rarely photographed. The famous bakery sells egg custard tarts from a 1600s Portuguese recipe—centuries old, still warm, butter melting through. This lane is the last living evidence of Bangkok's first encounter with the West.",im:"An elderly Thai woman arranges fresh egg custard tarts in a wooden display case while light streams through a shophouse window and a church steeple is visible through the open door behind her.",t:"Metro BTS to Saphan Taksin, exit 3. Walk southwest toward river then south along Talat Noi side streets. Kudeejeen lane near Sothorn. Lane open 24 hours. Bakery 7am-5pm. Church open morning. Allow 45 minutes to one hour.",c:["history_big"],r:"g",nn:"ซอยกูเดี่ยน — ศาสนาสามศาสนา",ns:"โบสถ์โปรตุเกส ศาลเจ้าจีน บ้านไม้ไทย บนซอยเดียวกัน",nst:"ซอยกูเดี่ยนก่อตั้งโดยพ่อค้าโปรตุเกส และคงเป็นจุดตัดกันของศาสนาสามศาสนา โบสถ์คาทอลิกโปรตุเกสเล็ก ๆ อยู่ห่างจากศาลเจ้าจีน บ้านไม้ไทยอยู่ระหว่างพวกเขา ซอยแคบ เงียบสงบ และหายากในการถ่ายรูป",nt:"BTS Saphan Taksin ทางออก 3 เดินตะวันตกเฉียงใต้ไปยังแม่น้ำ จากนั้นเดินใต้ตลาดน้อย"},
  {id:538,n:"Khlong Saen Saep Express — Rush Hour Canal",a:"Huai Khwang",v:["local", "sensory"],d:20,s:"Rush-hour canal boat through city's back doors. People board with athletic precision. Fast, murky brown water.",st:"The Khlong Saen Saep express boat runs 7am-8am and 5pm-6:30pm with Bangkok commuters—office workers, motorcycle mechanics, monks, school children. The boat is long and narrow. People board mid-motion with practiced athleticism. The canal is brown, murky, narrow. You pass under low bridges, by temple complexes, through alleyways most Bangkokians never see. This is the city's nervous system running in reverse.",im:"A young woman in office clothes grabs a pole as the boat lurches forward, while commuters pack shoulder-to-shoulder behind her and low-hanging bridge cables blur overhead.",t:"Metro BTS to Saphan Taksin, exit 3. Walk to Khlong Saen Saep pier near Victory Monument. Boat runs 7-8am and 5-6:30pm weekdays. Fare 15-25 THB. Ride full 20 minutes one direction. Best 7:30am or 5:45pm.",c:["local_only"],r:"g",nn:"ขนส่งน้ำด่วน แคนนอลเสนแสบ",ns:"เรือด่วน ชั่วโมงเร่งรีบ คนขึ้นอย่างแม่นยำ",nst:"เรือด่วนเสนแสบวิ่ง 7-8 น. และ 17-18:30 น. กับคนทำงานกรุงเทพ พนักงาน ช่างซ่อมรถจักรยานยนต์ พระสงฆ์ เด็กนักเรียน เรือยาว แคบ คนขึ้นขณะที่เรือเคลื่อนที่",nt:"BTS Saphan Taksin ทางออก 3 เดินไปท่าขนส่งน้ำด่วนเสนแสบ ค่า 15-25 บาท"},
  {id:539,n:"Phra Athit & Santichaiprakarn Park — Riverside Sunset",a:"Phra Nakhon",v:["romantic_water", "local", "beautiful"],d:90,s:"Riverside park with old white fort. Students, buskers, couples at sunset. Ferries pass every few minutes.",st:"Phra Athit Road curves along the Chao Phraya with the white-walled Santichaiprakarn Fort anchoring its north end. At dusk the park fills with Bangkok's young—university students, musicians, couples. The river turns bronze. Ferries pass continuously, their electric horns clear and lonely. You can watch a sunset, eat something sweet from a cart, sit on old stone walls where history happened, and feel entirely alone in the middle of a city of ten million.",im:"A couple sits on a stone bench watching the river while a boatload of tourists passes and the western sky glows orange behind a distant temple spire.",t:"Metro BTS to National Stadium, exit 3. Walk northeast 15 minutes toward river and Phra Athit Road. Park open 6am-9pm. Best 5pm-7pm for sunset. Food carts everywhere. Allow one to two hours.",c:["parks", "romantic_water"],r:"g",nn:"ถนนพระอาทิตย์ และสวนสนิทไชยปราการ — ริมแม่น้ำพระอาทิตย์",ns:"อุทยานริมแม่น้ำ กำแพงขาวเก่า นักเรียน ดนตรี คู่หญิงชายตอนพระอาทิตย์ลับ",nst:"ถนนพระอาทิตย์โค้งตามแม่น้ำเจ้าพระยา กับกำแพงขาวสนิทไชยปราการ ตอนเย็นสวนเต็มไปด้วยเยาวชนกรุงเทพ นักเรียนมหาวิทยาลัย นักดนตรี คู่ แม่น้ำกลายเป็นสีน้ำตาลแดง เรือข้ามฟากผ่านอย่างต่อเนื่อง",nt:"BTS National Stadium ทางออก 3 เดินไปทางตะวันออกเฉียงเหนือ 15 นาที ถนนพระอาทิตย์ สวนเปิด 6-21 น. ดีที่สุด 17-19 น."},
  {id:540,n:"Ekkamai & Thong Lo Sois — Bangkok's Style District",a:"Ekkamai",v:["local", "modern"],d:120,s:"Cafés in converted houses, salons in old shopfronts. Bangkok's style crowd lives here. People-watching better than any fashion event.",st:"Sukhumvit Soi 61 (Ekkamai) and the surrounding sois between Ekkamai and Thonglor have transformed into Bangkok's creative quarter. Old single-family houses have become concept cafés with three roasts of coffee and a designer in every corner. Salons occupy 60-year-old shopfronts with concrete peeling and new glass inserted. Young Thais with aesthetic sense and money move here. You see fashion you've never seen before. The streets themselves are an exhibition.",im:"A woman with shaved sides walks past a restored wooden shophouse converted into a minimalist café, where another woman photographs her espresso in filtered light while a stylist cuts a man's hair in the window.",t:"Metro BTS to Ekkamai, exit 3. Walk through Soi 61 and surrounding streets. Open 9am-6pm mostly. Cafés often 10am-6pm. No entry fees. Budget 100-300 THB per café. Allow two to three hours.",c:["local_only"],r:"g",nn:"ซอยเอกมัย และซอยทองหล่อ — ย่านแฟชั่น",ns:"คาเฟ่ในบ้านเก่า สัตตหลักในหน้าร้านเก่า ชีวิตสไตล์กรุงเทพ",nst:"ซอยเอกมัย 61 และซอยรอบด้านระหว่างเอกมัยและทองหล่อ ได้กลายมาเป็นย่านสร้างสรรค์ของกรุงเทพ บ้านครอบครัวเก่ามีกลายเป็นคาเฟ่แนวคิด หลายสาขาของกาแฟและนักออกแบบในทุกมุม",nt:"BTS Ekkamai ทางออก 3 เดินผ่านซอย 61 และซอยรอบด้าน เปิด 9-18 น. โดยปกติ"},
  {id:541,n:"Wat Don & Temple Columbariums — Walking Among Niches",a:"Phra Nakhon",v:["spiritual", "hidden", "quiet"],d:45,s:"Walk among niches, weathered photos, Chinese characters, food offerings. Unexpectedly moving, completely empty of tourists.",st:"Many Bangkok temples have columbariums and small graveyards stacked into narrow buildings. Wat Don has one of the most remarkable—thousands of small niches holding ashes, each with a weathered photograph of the deceased, incense sticks, small food offerings. The walls are covered in decades of ritual. You walk slowly past thousands of faces, reading the dates, watching incense smoke drift. No tourists ever come. Only monks and families maintaining traditions.",im:"A woman in black places fresh flowers at a niche while incense smoke rises past hundreds of small photos and faded gold lettering on the wall.",t:"Metro MRT to Hua Lamphong, exit 1. Walk or taxi to Wat Don in old city area. Temple open 6am-6pm daily. Columbariums accessible anytime. Allow 45 minutes to one hour. Free.",c:["spiritual"],r:"g",nn:"วัดดอนและหอศพในวัด",ns:"เดินผ่านรูตรง รูปถ่ายเก่า หนังสือจีน ครัวเครื่องอาหาร",nst:"วัดหลายแห่งในกรุงเทพมีหอศพและสุสาน เล็ก ๆ วัดดอนมีหนึ่งในที่น่าทึ่งที่สุด หลายพันรูตรง เรือน เถ้าถูก รูปถ่ายเก่า ไม้ธูป เครื่องอาหาร เล็ก ๆ",nt:"MRT Hua Lamphong ทางออก 1 เดินหรือแท็กซี่ไปวัดดอน เปิด 6-18 น."},
  {id:542,n:"Lumpini Park at Dawn — Tai Chi & Monitor Lizards",a:"Lumphini",v:["local", "quiet", "spiritual"],d:60,s:"Before full light: tai chi groups, slow circles, stretching, enormous monitor lizards in the lake. By 8am the spell dissolves.",st:"Lumpini Park at 5:30am is Bangkok's morning soul. Circles of older Thais move through tai chi routines with precise slowness. Some practice qigong, their breathing synchronized. The lake is still and dark. Herons wait on the banks. Enormous monitor lizards surface occasionally, primordial and indifferent. By 6:30am the city starts waking—joggers arrive, vendors set up carts. By 8am the magic is gone, replaced by fitness culture and Instagram. Come early or not at all.",im:"An elderly man in white clothes moves slowly through tai chi while a monitor lizard emerges from dark water in the background and morning mist rises from the lake.",t:"Metro MRT to Lumphini, exit 2. Walk to park. Arrive 5:30am. Park open 4:30am-9pm. Free. Tai chi groups start 6am and dissolve by 7:30am. Allow one hour.",c:["spiritual"],r:"g",nn:"สวนลุมพินี ตอนเช้า — ไทฉี่และจระเข้",ns:"ก่อนพระอาทิตย์ขึ้น ชุมชนไทฉี่ วงกลมช้า ยืดตัว จระเข้ใหญ่",nst:"สวนลุมพินี 5:30 น. เป็นจิตใจเช้าของกรุงเทพ วงกลมของคนแก่ไทยเคลื่อนไหวผ่านไทฉี่อย่างช้า บางคนฝึก ฉีกง สัตว์เลื้อยคลาน ขนาดใหญ่ ค่อย ๆ ปรากฏ",nt:"MRT Lumphini ทางออก 2 เดินเข้าไป มา 5:30 น. เปิด 4:30-21 น."},
  {id:543,n:"Ratchadamnoen Avenue — Wide Boulevard at Golden Hour",a:"Phra Nakhon",v:["history", "quiet", "emotional"],d:60,s:"Wide ceremonial boulevard designed to echo Paris. History full of marches, coups, crackdowns, celebrations. Walk slowly at golden hour.",st:"Ratchadamnoen Avenue was designed in 1899 to resemble the grand boulevards of Paris, but it has become the heart of Thai political theatre. Nearly every major protest, march, celebration, and crackdown in modern Thailand has happened here. The Democracy Monument stands at its center. At dusk the light turns golden and the street is almost empty. The weight of contested history is palpable. Walk slowly. Read the plaques. The cement remembers.",im:"An elderly couple walks hand-in-hand down the wide empty avenue at sunset while the Democracy Monument is silhouetted ahead and flags hang still between lampposts.",t:"Metro MRT to Ratchadamnoen, exit 1. Avenue runs north-south through the city. Best walked 5pm-7pm. Free, open anytime. Allow one to two hours for slow walking and contemplation.",c:["history_big"],r:"g",nn:"ถนนราชดำเนิน — ตอนเย็น",ns:"ถนนพิธีกรรมกว้าง ได้รับการออกแบบเพื่อสะท้อนปารีส ประวัติศาสตร์เต็มไปด้วยการเดินขบวน",nst:"ถนนราชดำเนินได้รับการออกแบบเพื่อเรียนแบบบูเลวาร์ดกรุงปารีส เกือบทุกการเดินขบวนใหญ่ ประกาศเปลี่ยนแปลง และปราบปราม ได้เกิดขึ้น เดินช้า ๆ",nt:"MRT Ratchadamnoen ทางออก 1 ดี 17-19 น."},
  {id:544,n:"Cross-River Ferries — Wooden Boats at Water Level",a:"Rattanakosin",v:["local", "sensory"],d:20,s:"Tiny wooden ferries across Chao Phraya. Cost almost nothing, last under 5 minutes. Go back and forth twice.",st:"The Chao Phraya is crossed by a hundred small wooden ferries operated by individual families. They take 3-5 minutes, cost 3-5 THB, and carry whoever arrives. The ride is close to the water—you see the river's surface, boat traffic, fishing nets, temple details from water level, laundry drying on boats, fishermen. The ferries are working boats, not tourist attractions. If you ride the same ferry three times you might recognize the operator's face. Go back and forth. Watch the light change on the water.",im:"A young man grips a wooden pole as a tiny ferry accelerates with a push of a pole, water spraying, while temple spires and hotel towers reflect in the choppy green water.",t:"Multiple ferry points along the Chao Phraya. Most concentrated near Phra Nakhon district, near Democracy Monument area, near Saphan Taksin BTS. Ferries run 6am-6pm mostly. Fare 3-5 THB per crossing. Allow 20-30 minutes for multiple crossings.",c:["local_only"],r:"g",nn:"เรือข้ามฟากเล็ก — เรือไม้",ns:"เรือเล็ก ๆ ข้ามแม่น้ำ ราคาถูกมาก ใช้เวลาน้อยกว่า 5 นาที",nst:"แม่น้ำเจ้าพระยาข้ามโดยเรือไม้เล็ก ๆ หลายสิบลำ โดยครอบครัวแต่ละคน เดินทาง 3-5 นาที ค่า 3-5 บาท สูง ใจที่อยู่ใกล้แม่น้ำ",nt:"หลายจุดข้ามฟากตามแม่น้ำเจ้าพระยา ค่า 3-5 บาท"},
  {id:545,n:"Chatuchak Outer Edges — Market as City",a:"Chatuchak",v:["local", "weird"],d:180,s:"Skip central sections. Outer rings: plant market, second-hand furniture, tiny food stalls facing away. Market as a city in itself.",st:"Most visitors enter Chatuchak at the main entrance and immediately get lost in the clothes and antique sections. The outer rings are different: hundreds of plant stalls with rare orchids and unusual succulents, entire sections of second-hand furniture and doors and marble slabs, food stalls facing inward toward workers rather than tourists, a used motorcycle parts area, a section selling tools you've never heard of. You can spend five hours and never see a tourist. The market is a complete economy unto itself.",im:"A vendor sits surrounded by hundreds of potted plants in a narrow corridor while Bangkokians push through with shopping bags, and the smell is soil and flowers and humanity.",t:"Metro BTS to Mo Chit, exit 1. Walk to outer sections (Sections 21-27 mostly). Market open Saturday-Sunday 9am-6pm only. Free entry. Arrive 8:30am to avoid crowds. Allow four to five hours minimum.",c:["local_only"],r:"g",nn:"ตลาดจตุจักร ขอบนอก — ตลาดเป็นเมือง",ns:"ข้าม ส่วนกลาง เข้าไปพื้นที่นอก หญ้า มือสองเฟอร์นิเจอร์",nst:"ผู้เยี่ยมชมส่วนใหญ่เข้าจตุจักรที่ทางเข้าหลักและติดกำแพงเสื้อผ้า ส่วนนอกต่างกัน หลายร้อยแสตนด์พืช ส่วนเฟอร์นิเจอร์มือสอง",nt:"BTS Mo Chit ทางออก 1 เดินไปส่วนนอก เปิด ส.-อา. 9-18 น."},
  {id:546,n:"Rooftop Car Parks — Gritty Beauty at Dusk",a:"Ratchaprasong",v:["hidden", "views"],d:45,s:"Upper parking levels of malls/hotels, open and quiet at dusk. Free city view, no ticket, no queue, slightly gritty beauty.",st:"Bangkok's upper parking levels of shopping malls and hotels offer unobstructed 360-degree city views at dusk without crowds or entry fees. Climb to the top floor of the Emporium parking garage, Siam Paragon parking, or the old Bangkok shopping mall parking structure. At 6pm you're alone with the city spreading below, skyline turning purple, temple spires silhouetted, traffic lights beginning to twinkle. The light is perfect. The view is free. No tourists. No rules.",im:"A young couple stands at the edge of a concrete parking level while the Bangkok skyline spreads before them in purple and gold light, and a motorcycle alarm sounds distantly.",t:"Multiple parking garages across central Bangkok. Emporium (Sukhumvit Soi 24), Siam Paragon, or older malls near Mo Chit. Parking structures are public. Simply walk in and climb. Best 5:30pm-7pm. Free. Allow 30-45 minutes to take photos and absorb the view.",c:["hidden_gems"],r:"g",nn:"ที่จอดรถบนหลังคา — ความงามที่มีเฉพาะตัว",ns:"ชั้นบนของห้องจอด ปลายฟ้า วิวเมือง ฟรี",nst:"ชั้นจอดบนของห้องจอดและโรงแรม ให้มุมมอง 360 องศา ตอนเย็น ไม่มีค่าใช้จ่าย ไม่มีคิว ราคาถูก",nt:"หลายแห่ง ดี 17:30-19 น. ฟรี 30-45 นาที"}];

  {id:511,n:"Grand Palace Inner Temple Walk",a:"Rattanakosin",v:['famous', 'history'],d:60,s:"Golden temple complex, intricate detail, early morning light perfect.",st:"Enter 8:30am right at opening. Temple cool and glowing. Gold catching light. Crowds just arriving. Intricate tiling everywhere. Quiet reverential energy.\n\nWalk slowly through shrines. Sit by courtyard. Feel the craftsmanship and scale.",im:"Golden temple, intricate tile detail, early light, few people.",t:"BTS to Saphan Taksin. Walk or boat to Grand Palace. 8:30am. 1.5-2 hours.",c:["greatest_hits", 'history', 'beautiful'],r:"g",nn:"วัดพระแก้ว",ns:"Grand temple golden",nst:"8:30am opening.",nt:"Saphan Taksin BTS."},
