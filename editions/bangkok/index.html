<script>
const P = [
  {id:1,n:"Wat Pho Back Courtyard at Dawn",a:"Rattanakosin",v:["history", "quiet", "hidden"],d:10,s:"The enormous reclining Buddha temple's hidden back courtyards where monks live before tourists arrive",st:"Wat Pho is famous for its 46-meter reclining gold Buddha, but tourists see only the front chambers. The back courtyard contains dozens of smaller stupas, meditation halls, and the actual monastery where monks live. At 5:30am the courtyard is silent except for the sound of monks chanting. Cats sleep on doorsteps. You enter a functioning temple, not a museum.",im:"A young monk in orange robes carries water from a well past a sleeping cat, while morning light illuminates a line of small Buddha statues on a shelf and the sound of distant chanting echoes from a stone building.",t:"Metro BTS to Saphan Taksin, exit 3. Cross the river by ferry. Wat Pho entrance opens 8:30am but monks are visible from 5:30am (arrive early from riverbank). Entry 100 THB at main entrance, but back courtyard is free. One hour.",c:["history_big"],r:"y",nn:"วัดโพธิ์ อาคารหลังตอนเช้า",ns:"วัดโพธิ์ที่งามงาม เมื่อนักท่องเที่ยวยังไม่มา",nst:"วัดโพธิ์มีชื่อเสียงเพราะรูปพระพุทธเรียนไข่ 46 เมตร แต่นักท่องเที่ยวเห็นเพียงห้องด้านหน้า บริเวณชั้นหลังมีสถูปเล็ก ๆ หลายสิบแห่ง ห้องสมาธิ และวัตรที่สงฆ์อาศัยอยู่จริง ตอนเช้า 5:30 น. ลานวัดเงียบสงบ มีแต่เสียงสวดมนต์ของสงฆ์เท่านั้น",nt:"BTS สถานีสะพานตากสิน ทางออก 3 แล้วข้ามแม่น้ำด้วยเรือข้ามฟาก วัดโพธิ์เปิดบริการ 8:30 น. แต่สงฆ์มองเห็นได้ตั้งแต่ 5:30 น. ค่าเข้า 100 บาท"},
  {id:2,n:"Khaosan Road Opposite Side Streets",a:"Banglamphu",v:["hidden", "night", "local"],d:8,s:"Skip Khaosan Road itself and explore the parallel sois where real Bangkok backpackers and locals mix",st:"Khaosan Road is overcrowded with tour buses. But three blocks east on Phra Athit Road and the parallel sois, you find the real backpacker culture: small guesthouses, local restaurants, young travelers who came here by accident. The streets are narrow, the bars are smaller, and conversations happen in whispers. This is the authentic Khaosan energy before commercialization.",im:"Two backpackers sit on a plastic stool in an open-air restaurant eating khao pad gai, while a tuk-tuk driver naps on a bench nearby and a teenager on a motorbike delivers som tam to the next table.",t:"Metro BTS to National Stadium, exit 3. Walk east 10 minutes. Open anytime. Bars 6pm-2am. Food 5,000-10,000 THB. Two hours.",c:["local_only"],r:"y",nn:"ถนนข้าวสาร ซอยข้างเคียง",ns:"บ้านแพคไปจริง ที่คนท้องถิ่นกับนักท่องเที่ยวปะปนกัน",nst:"ถนนข้าวสารเต็มไปด้วยรถท่องเที่ยว แต่ด้านตะวันออกสามช่วงใน ถนนพระอาทิตย์ และซอยข้างเคียง คุณจะพบวัฒนธรรมนักท่องเที่ยวที่แท้จริง บ้านพักเล็ก ๆ ร้านอาหารท้องถิ่น นักท่องเที่ยวหนุ่มสาวที่มาที่นี่โดยบังเอิญ",nt:"BTS สถานีสนามกีฬาแห่งชาติ ทางออก 3 แล้วเดินไปทางตะวันออก 10 นาที เปิดตลอดเวลา บาร์เปิด 6 น. - 2 น."},
  {id:3,n:"Arun Temple From Opposite Bank at Dawn",a:"Rattanakosin",v:["history", "beautiful", "quiet"],d:8,s:"Temple of Dawn viewed from the quiet opposite bank where locals fish, not from the crowded temple side",st:"Wat Arun is stunning, but the temple side is packed with tourists paying entry fees and fighting for photos. The free, quiet view is from the opposite bank where locals cast fishing lines into the Chao Phraya River at dawn. The temple rises above the water like a dream. You see the structure in silence, reflected in still water.",im:"A fisherman sits alone on the bank with his line in the water while the sun rises behind Wat Arun's spires, the sky turning pink and the temple gradually emerging from darkness.",t:"Metro BTS to Saphan Taksin, exit 3. Take ferry across river to Tha Tien pier. Walk north along river 5 minutes to opposite bank. Free. Best 5:30am-7am. One hour.",c:["history_big", "romantic_water"],r:"g",nn:"วัดอรุณ จากฝั่งตรงข้าม ตอนเช้า",ns:"วิวสวย ๆ ของวัดอรุณจากฝั่งตรงข้าม ที่นี่ไม่มีนักท่องเที่ยว",nst:"วัดอรุณสวยงาม แต่ด้านวัดเต็มไปด้วยนักท่องเที่ยว ที่ขายราคาแพงและต่อสู้กันเพื่อถ่ายรูป วิวฟรีที่เงียบสงบคือจากฝั่งตรงข้าม ที่คนท้องถิ่นปล่อยเบ็ดลงน้ำ",nt:"BTS สถานีสะพานตากสิน ทางออก 3 แล้วขึ้นเรือข้ามฟากไปยัง ท่าเทียน เดินไปทางเหนือตามแม่น้ำ 5 นาที"},
  {id:4,n:"Thonburi Canal Network by Longtail Boat",a:"Thonburi",v:["history", "quiet", "beautiful"],d:20,s:"A network of narrow canals lined with stilt houses, temples, and floating markets seen by commuter boats, not tour boats",st:"The Thonburi canals are ancient waterways where Bangkok before cars still lives. Stilt houses line the narrow khlong, temples sit on water, and locals commute by longtail boat. Tourist boats exist but are expensive. Cheaper: hire a local longtail driver who knows the residential channels. You pass monks getting water, kids playing, breakfast vendors, all from the boat.",im:"A child stands in the doorway of a stilt house watching the longtail boat pass, while a woman inside the house hangs laundry on a rope suspended over the water and a cat watches from a wooden railing.",t:"Metro BTS to Saphan Taksin, exit 3. Take Chao Phraya Express ferry to Wat Rakhang pier. Hire longtail boat driver directly 400-600 THB/hour. Negotiate. Open anytime. Best early morning. Two to three hours.",c:["history_big"],r:"y",nn:"เครือข่ายคลองธนบุรี",ns:"เดินทางด้วยเรือยาว ผ่านบ้านเก่า ๆ บนสันติกร",nst:"คลองธนบุรีเป็นเส้นทางน้ำโบราณที่กรุงเทพฯ ก่อนรถยนต์ยังมีชีวิตอยู่ บ้านเก่า ๆ บนสันติกรเรียงรายตามคลองแคบ ๆ วัดนั่งอยู่บนน้ำ และคนท้องถิ่นเดินทางด้วยเรือยาว",nt:"BTS สถานีสะพานตากสิน ทางออก 3 แล้วขึ้นเรือด่วน Chao Phraya ไปยังท่าวัดราขัง จ้างคนขับเรือยาว 400-600 บาท/ชั่วโมง"},
  {id:5,n:"Chinatown Yaowarat at Midnight",a:"Chinatown",v:["night", "weird", "local"],d:12,s:"Bangkok's oldest neighborhood becomes a neon labyrinth of street food, gold shops, and ancient family businesses at night",st:"Yaowarat Road is a 1-kilometer street that transforms at sunset. By midnight, the street is closed to cars, packed with food stalls, and glowing with neon signs selling gold jewelry, traditional medicines, and century-old ingredients. The smell is overwhelming: grilled seafood, burning charcoal, incense. Families have run shops here for 100 years.",im:"An old woman in a gold shop counts banknotes at midnight while teenagers with motorcycles park outside, and neon signs reflect off the wet street after recent rain, creating a dreamlike glow.",t:"Metro MRT to Yaowarat, exit 1. Street comes alive 8pm-3am. Free to walk. Eat 50-200 THB per dish. Completely packed 9pm-midnight. Plan three to four hours.",c:["local_only"],r:"g",nn:"พื้นที่ไชน่าทาวน์ยาวราษฎร์ ตอนเที่ยงคืน",ns:"ถนนที่เต็มไปด้วยแสงนีออน ร้านอาหาร และทองคำ",nst:"ถนนยาวราษฎร์เป็นถนน 1 กิโลเมตรที่เปลี่ยนแปลงเมื่อพระอาทิตย์ลับขอบฟ้า เวลาเที่ยงคืน ถนนปิดสำหรับรถยนต์ เต็มไปด้วยแผงอาหาร และเรืองแสงด้วยป้ายนีออนขายทองคำ ยา และส่วนผสม",nt:"MRT สถานียาวราษฎร์ ทางออก 1 ถนนกลับชีวิต 8 น. - 3 น. เดินเล่นฟรี"},
  {id:6,n:"The Artist House (Khlong Bang Luang)",a:"Thonburi",v:["hidden", "beautiful", "local"],d:10,s:"An old wooden house on a canal where a puppet master performs traditional shadow puppet theater three times daily",st:"The Artist House is a 200-year-old teak building on a canal in Thonburi. An elderly puppet master has lived here 50 years and performs traditional shadow puppet theater three times daily for whoever arrives. No schedule, no tickets, donations voluntary. The puppets are intricately carved, the stories are from ancient Indian epics, and the performance is hypnotic.",im:"A woman sits alone watching a white screen illuminated from behind while carved shadow puppets move in intricate gestures, telling a story in silence punctuated by a gamelan musician playing beside the screen.",t:"Hire longtail boat from Wat Rakhang pier 100 THB or take public ferry. Artist House open daily. Performances 11am, 2pm, 5pm. Donations 100 THB suggested. One hour.",c:["local_only"],r:"y",nn:"บ้านศิลปิน (คลองบางลำ)",ns:"บ้านไม้เก่าที่มีการแสดงตุ๊กตาเงา",nst:"บ้านศิลปินเป็นบ้านสักเก่า 200 ปีบนคลองใน ธนบุรี ศิลปินแสดงตุ๊กตาเงาแบบดั้งเดิมสามครั้งต่อวัน ไม่มีตารางเวลา ไม่มีตั๋ว บริจาคโดยสมัครใจ",nt:"จ้างเรือยางจาก ท่าวัดราขัง 100 บาท หรือขึ้นเรือข้ามสาธารณะ แสดง 11 น. 2 น. 5 น. บริจาค 100 บาท"},
  {id:7,n:"Bang Krachao Green Lung Island by Bike",a:"Khlong San",v:["nature", "quiet", "free"],d:25,s:"An undeveloped island in the Chao Phraya River where Bangkok goes to bike through orchards and wetlands",st:"Bang Krachao is a bicycle island in the middle of the river, car-free and undeveloped. Locals farm and raise animals here. You rent a bike and pedal through narrow paths past fruit orchards, temples, and bird sanctuaries. The river curves all around you. It is startlingly quiet for a place inside Bangkok. Sunrise here is spectacular.",im:"A woman pedals slowly past a fruit stand where an elderly man sells mangoes, while birds fly overhead and the Chao Phraya River curves behind a canopy of mango trees.",t:"Metro BTS to Taksin, exit 3. Take ferry to Bang Krachao pier. Bike rental 50-100 THB. Island open 6am-6pm. Free to bike. Best 6am-9am. Full island is 15km, but three hours covers most highlights.",c:["parks", "nature"],r:"g",nn:"เกาะบางกระเข้า ปั่นจักรยาน",ns:"เกาะไม่พัฒนา ที่ฟรี ที่เงียบสงบ",nst:"บางกระเข้าเป็นเกาะจักรยานในแม่น้ำ ไม่มีรถยนต์ ยังไม่พัฒนา คนท้องถิ่นทำไร่และเลี้ยงสัตว์ที่นี่ คุณเช่าจักรยานและปั่นผ่านเส้นทางแคบ ๆ ที่ผ่านไร่ผลไม้ วัด และสิ่งอุปถัมภ์นกนยพักษ์",nt:"BTS สถานีตากสิน ทางออก 3 แล้วขึ้นเรือไปยัง ท่าบางกระเข้า เช่าจักรยาน 50-100 บาท"},
  {id:8,n:"Dusit Palace and Zoo Area",a:"Dusit",v:["history", "quiet", "local"],d:15,s:"The old royal neighborhood with palaces, a cheap zoo, and winding streets where time slowed down",st:"Dusit was built as a royal district in 1901. It remains quiet and tree-lined, with several palaces and government buildings set far apart. The Dusit Zoo is small, cheap, and full of local families rather than tourists. The neighborhood has a sleepy 1950s feel. You walk for hours and pass few other tourists. Many streets are shaded by old trees.",im:"A child stands before an elephant behind a glass barrier while a peacock walks freely through the zoo grounds, and the afternoon heat creates a haze over the tree-lined paths.",t:"Metro BTS to National Stadium, exit 5. Walk northeast 20 minutes. Zoo entry 100 THB. Open 8am-6pm. Palaces viewable from outside. Plan full day to explore neighborhood. Best 6am-10am.",c:["parks"],r:"g",nn:"พระราชวัง ดุสิต และสวนสัตว์",ns:"ย่านหลวงเก่า ที่เงียบสงบและมีสวนสัตว์ถูก ๆ",nst:"ดุสิตถูกสร้างเป็นย่านหลวงในปี 2444 มันยังคงเงียบสงบและฟังการสนทนา พระราชวังมีหลายแห่ง สวนสัตว์ดุสิตเล็ก ๆ ถูก และเต็มไปด้วยครอบครัวท้องถิ่นมากกว่านักท่องเที่ยว",nt:"BTS สถานีสนามกีฬาแห่งชาติ ทางออก 5 แล้วเดินไปทางตะวันออกเฉียงเหนือ 20 นาที ค่าเข้าสวนสัตว์ 100 บาท"},
  {id:9,n:"Democracy Monument",a:"Phra Nakhon",v:["history", "quiet"],d:8,s:"The 1932 monument marking Thailand's first constitution and transition to democracy",st:"The Democracy Monument was erected in 1932 to commemorate Thailand's first constitution and bloodless revolution. The sculpture shows an open hand offering the charter to the people. It stands in a quiet roundabout and is a gathering point for Thais but ignored by tourists. Every May 20 it lights up with ceremony. The monument itself is understated and powerful.",im:"An elderly man places flowers at the monument's base while traffic circles around him, and his face shows a quiet reverence for the history the structure represents.",t:"Metro MRT to Ratchadamnoen, exit 1. Monument is in the middle of the road in a roundabout. Free. Open anytime. 20 minutes.",c:["history_big"],r:"g",nn:"อนุสรณ์สถาน ประชาธิปไตย",ns:"อนุสรณ์สถาน 2475 ของประชาธิปไตยไทย",nst:"อนุสรณ์สถานประชาธิปไตยถูกตั้งในปี 2475 เพื่อระลึกถึงรัฐธรรมนูญฉบับแรกของไทยและการปฏิวัติอย่างสงบ รูปปั้นแสดงมือเปิดนำเสนออักษรต่อประชาชน",nt:"MRT สถานีราชดำเนิน ทางออก 1 อนุสรณ์สถานอยู่ตรงกลางถนนในวงเวียน ฟรี"},
  {id:10,n:"Erawan Shrine: Spirit House Legend",a:"Ratchaprasong",v:["weird", "local"],d:5,s:"A four-armed Brahma shrine that became a city legend after a murder, a love story, and decades of miracles",st:"The Erawan Shrine was built in 1956 to ward off bad luck during construction. It became Bangkok's most powerful spirit house. Legend says it granted a woman's wish to marry a millionaire, and she honored the shrine with dancers. Now devotees from across Asia come asking for miracles. You see incense smoke, garland offerings, and people praying with genuine hope. It is the intersection of city commerce and spiritual belief.",im:"An elderly woman in prayer stands before the four-armed Brahma statue while incense rises in thick coils around her face, and behind her a younger woman photographs herself with the shrine, documenting her prayer.",t:"Metro BTS to Chit Lom, exit 1. Shrine is in the middle of an intersection. Free. Open 6am-9pm. Busiest 7am-8am and 5pm-6pm. 15 minutes.",c:["weird"],r:"g",nn:"ศาลเจ้าพระแม่มารี",ns:"ศาลเจ้าที่ได้รับการรักษามวยที่มีตำนานมากมาย",nst:"ศาลเจ้าพระแม่มารีถูกสร้างในปี 2499 เพื่อขจัดโชคร้ายระหว่างการก่อสร้าง มันกลายมาเป็นศาลเจ้าที่มีพลังที่สุดในกรุงเทพ ตำนานกล่าวว่ามันให้พรให้กับผู้หญิงที่ต้องการแต่งงานกับเศรษฐี",nt:"BTS สถาน Chit Lom ทางออก 1 ศาลเจ้าอยู่ตรงกลางทางแยก ฟรี"},
  {id:11,n:"Chatuchak Weekend Market",a:"Chatuchak",v:["local", "weird"],d:20,s:"The world's largest weekend market: 35 acres, 15,000 stalls, everything sold including illegal animals",st:"Chatuchak opens only Saturday and Sunday and sprawls across 35 acres. There are 15,000 stalls selling clothing, antiques, plants, animals, counterfeit goods, food, and things you have never seen. The market has a maze-like structure. Many stalls are family-run for 20 years. It is chaotic, overwhelming, and fascinating. Go early to avoid the worst crowds. The animal section is controversial but real.",im:"A vendor sits surrounded by hundreds of potted plants in a narrow corridor of the market while tourists and locals push past each other, and the smell is a mix of grilled meat, flowers, and crowded humanity.",t:"Metro BTS to Mo Chit, exit 1. Market open 9am-6pm Saturdays-Sundays only. Free to enter. Arrive 8:30am. Budget 1,000-5,000 THB for shopping. Four to six hours.",c:["local_only"],r:"g",nn:"ตลาดนัดจตุจักร",ns:"ตลาดที่ใหญ่ที่สุดในโลก ทำงานเฉพาะวันเสาร์-อาทิตย์",nst:"ตลาดนัดจตุจักรเปิดเฉพาะวันเสาร์-อาทิตย์และขยายออกไป 35 เอเคอร์ มี 15,000 คนขาย ขายเสื้อผ้า โบราณวัตถุ พืช สัตว์ สินค้าปลอม อาหาร และสิ่งที่คุณไม่เคยเห็นมาก่อน",nt:"BTS สถาน Mo Chit ทางออก 1 ตลาดเปิด 9 น. - 6 น. วันเสาร์-อาทิตย์เท่านั้น ฟรี"},
  {id:12,n:"Victory Monument Early Morning Food Market",a:"Ratchathewi",v:["local", "free"],d:8,s:"A neighborhood food market open only 5am-8am where locals buy breakfast before work",st:"Victory Monument is famous as a political gathering place, but locals know it as the location of an excellent early morning food market. From 5am to 8am, vendors sell noodle soup, rice dishes, grilled meats, and drinks. The market collapses by 9am. You eat standing or sitting on plastic stools among Thai workers starting their day. No tourists, no photos, just food.",im:"A construction worker in a hard hat eats khao man gai from a bowl while standing at a stall, steam rising from the hot rice, while another vendor behind him ladled soup into a container.",t:"Metro BTS to Victory Monument, exit 1. Market only 5am-8am. Food 30-50 THB. Free. Completely over by 8am. One to two hours.",c:["local_only"],r:"g",nn:"ตลาดอาหารเช้า สถานีชัยสมรภูมิ",ns:"ตลาดที่เปิดเฉพาะ 5 น. - 8 น. ของท้องถิ่น",nst:"สถานีชัยสมรภูมิมีชื่อเสียงเพราะเป็นศูนย์รวมการเมือง แต่คนท้องถิ่นรู้จักมันจากตลาดอาหารเช้าที่ยอดเยี่ยม ตั้งแต่ 5 น. ถึง 8 น. ผู้ขายขายซูปเส้น ข้าว เนื้อย่าง และเครื่องดื่ม",nt:"BTS สถาน Victory Monument ทางออก 1 ตลาดเปิดเฉพาะ 5 น. - 8 น. เท่านั้น"},
  {id:13,n:"Phra Nakhon Khiri Phetchaburi Day Trip",a:"Phetchaburi",v:["history", "beautiful"],d:30,s:"A hilltop palace from the reign of King Mongkut in 1860, surrounded by old temples, one hour from Bangkok",st:"Phra Nakhon Khiri is a 19th-century palace on a hill in Phetchaburi province, overlooking a town that remains much unchanged. The palace chambers are modest but the views are spectacular. The surrounding hillside contains multiple temples and small structures. It is a day trip from Bangkok and feels like a complete world unto itself.",im:"A woman in a blue dress walks through a palace doorway carved with stucco flowers while morning light illuminates the old plaster and reveals the craftsmanship of 150 years of sitting in the sun.",t:"Train from Bangkok to Phetchaburi 3 hours. Then motorbike taxi 20 minutes uphill. Entry 100 THB. Open 8am-4:30pm. Allow full day. Return train 5pm.",c:["history_big"],r:"y",nn:"พระนครขีรี",ns:"พระราชวังบนเขา จากสมัยพระมงกุฎเกล้า",nst:"พระนครขีรีเป็นพระราชวังศตวรรษ 19 บนเขาในจังหวัดเพชรบุรี มองเห็นเมืองที่อยู่ด้านล่าง ห้องของพระราชวังเป็นแบบธรรมชาติ แต่วิวสวยงาม",nt:"รถไฟจากกรุงเทพไปเพชรบุรี 3 ชั่วโมง จากนั้นแท็กซี่มอเตอร์ 20 นาที ค่าเข้า 100 บาท"},
  {id:14,n:"Nonthaburi Market and Riverside",a:"Nonthaburi",v:["local", "free"],d:12,s:"A riverside provincial town 30 minutes north where locals buy produce and weekenders bike along the Chao Phraya",st:"Nonthaburi is the first province north of Bangkok. The riverside is lined with old wooden houses, fruit orchards, and a market where locals sell produce. Weekend cyclists and joggers use the riverbank path. The pace is slower than Bangkok. The air is cleaner. You are still close to the city but feel removed from it entirely.",im:"An elderly woman arranges dragon fruit in a pyramid at a riverside market stall while a jogger in bright clothes passes behind her and the river moves slowly in the background.",t:"Metro BTS to National Stadium, exit 3. Take Chao Phraya Express ferry north 30 minutes. Nonthaburi pier. Free to explore. Market 9am-5pm. Open anytime. Two to three hours.",c:["local_only"],r:"g",nn:"ตลาดนนทบุรี และแม่น้ำ",ns:"เมืองริมแม่น้ำ ที่ห่างจากกรุงเทพ",nst:"นนทบุรีเป็นจังหวัดแรกทางเหนือของกรุงเทพ ริมแม่น้ำเรียงแสดงบ้านไม้เก่า ไร่ผลไม้ และตลาดที่ขายผลไม้ ในวันสุดสัปดาห์นักปั่นจักรยานใช้เส้นทางริมแม่น้ำ",nt:"BTS สถานี National Stadium ทางออก 3 ขึ้นเรือด่วน Chao Phraya ไปทางเหนือ 30 นาที"},
  {id:15,n:"Talat Noi Old Portuguese Quarter",a:"Talat Noi",v:["history", "hidden"],d:10,s:"Bangkok's oldest neighborhood with remnants of Portuguese influence, now gentrifying but still raw",st:"Talat Noi was Bangkok's first foreign quarter, established by Portuguese traders in the 1600s. The neighborhood is a tangle of narrow alleyways, old shophouses, temples, and family businesses. It is being renovated by Bangkok creatives but maintains its rough character. You find century-old noodle shops, old pharmacies with wooden signage, and dark alleyways where time has stopped.",im:"A weathered wooden storefront displays aged bottles on a shelf beside a doorway where a cat sleeps, while rain drips from a rusty gutter above and old tiles on the wall are faded to pale colors.",t:"Metro BTS to Saphan Taksin, exit 3. Walk southwest along river 10 minutes. Neighborhood is open 24 hours. Best 8am-5pm. Three hours.",c:["history_big"],r:"g",nn:"ตลาดน้อย ย่านโปรตุเกสเก่า",ns:"ย่านเก่าแก่สุดของกรุงเทพ ที่มีอิทธิพลจากโปรตุเกส",nst:"ตลาดน้อยเป็นย่านต่างประเทศแรกของกรุงเทพ ที่จัดตั้งโดยพ่อค้าโปรตุเกส มันเป็นเขาวงเวียนของซอยแคบ ๆ บ้านเก่า วัด และธุรกิจครอบครัว",nt:"BTS สถาน Saphan Taksin ทางออก 3 เดินไปทางตะวันตกเฉียงใต้ตามแม่น้ำ 10 นาที"},
  {id:16,n:"Pak Khlong Talat Flower Market 3am",a:"Rattanakosin",v:["night", "weird"],d:8,s:"Bangkok's wholesale flower market opens at midnight and peaks at 3am with thousands of vendors",st:"Pak Khlong Talat is a hidden wholesale flower market operating 24 hours but most active from midnight to 4am. Thousands of flowers arrive from farms at night. Vendors arrange orchids, roses, marigolds, and jasmine in the dim light. The smell is overwhelming and beautiful. You see real commerce, not tourism. The market collapses by 6am.",im:"A vendor in a headlamp arranges dozens of orchid stems into bouquets while around her thousands of flower heads in woven baskets create a sea of color under harsh night lights.",t:"Metro BTS to Saphan Taksin, exit 3. Walk south to flower market pier. Open 24 hours, peak 3am. Free to watch. Arrive 2:30am-3:30am. One to two hours.",c:["local_only"],r:"g",nn:"ตลาดดอกไม้ปากคลอง",ns:"ตลาดดอกไม้ขายส่ง ที่เปิดตอนกลางคืน",nst:"ตลาดดอกไม้ปากคลองเป็นตลาดดอกไม้ขายส่งที่ซ่อนอยู่ โดยเปิด 24 ชั่วโมง แต่สำคัญที่สุดคือ 24.00 น. - 4.00 น. ดอกไม้นับพันมาถึงจากฟาร์มในตอนกลางคืน",nt:"BTS สถาน Saphan Taksin ทางออก 3 เดินไปทางใต้ไปตลาดดอกไม้ เปิด 24 ชั่วโมง สูงสุด 3.00 น."},
  {id:17,n:"Phaya Thai Palace Tours",a:"Phaya Thai",v:["history", "hidden"],d:8,s:"A former royal palace now controlled by the military, accessible by special permission for brief touring",st:"Phaya Thai Palace was built in 1909 as a royal residence. It has been controlled by the military for decades and is rarely open to the public. Tours are possible but require making special arrangements and sometimes have periods of closure. When open, you see Victorian and Thai architectural fusion, empty halls, and a sense of a place suspended in time. Visiting requires patience and planning.",im:"An empty ballroom with peeling paint shows where royal balls once danced, while afternoon light slants through closed curtains and dust particles float in the silence.",t:"Contact local tourism office for access information. Located near Phaya Thai BTS station. Tours typically 30-60 minutes. Closed unpredictably. Plan ahead.",c:["history_big"],r:"y",nn:"พระราชวังพญาไท",ns:"พระราชวังเก่าที่ควบคุมโดยกองทัพ",nst:"พระราชวังพญาไทถูกสร้างในปี 1909 เป็นพระราชวัง มันถูกควบคุมโดยกองทัพเป็นเวลาหลายสิบปี และหาก ต้องขอการอนุญาตพิเศษ",nt:"ติดต่อสำนักท่องเที่ยวท้องถิ่นเพื่อขอข้อมูลการเข้าถึง"},
  {id:18,n:"Suan Phakkat Palace",a:"Ratchadamri",v:["history", "beautiful", "quiet"],d:10,s:"A private museum housed in five traditional Thai houses with lacquerware, art, and the life of a collector",st:"Suan Phakkat Palace is a collection of five old Thai teak houses moved to one location and preserved as a museum by a royal collector. The grounds are quiet gardens. Inside you see royal lacquerware, Buddha statues, art, and furniture showing Thai domestic life. Entry requires walking through a gate into a separate world.",im:"A woman sits in an empty room of an old wooden house looking at a glass case of antique lacquerware while sunlight illuminates dust particles and the sound of birds outside is the only noise.",t:"Metro BTS to Phaya Thai, exit 3. Walk northeast 10 minutes. Entry 100 THB. Open 9am-4pm. Closed Mondays and holidays. One to two hours.",c:["history_big"],r:"y",nn:"สวนผักษัตร",ns:"พิพิธภัณฑ์ส่วนตัว ในบ้านไม้ไทยเก่า 5 หลัง",nst:"สวนผักษัตรเป็นชุดของห้าบ้านไม้ไทยเก่า ที่ย้ายมาในสถานที่เดียว และอนุรักษ์เป็นพิพิธภัณฑ์โดยสะสมราชครอบครัว ลานสวนเงียบสงบ",nt:"BTS สถาน Phaya Thai ทางออก 3 เดินไปทางตะวันออกเฉียงเหนือ 10 นาที ค่าเข้า 100 บาท"},
  {id:19,n:"Santichaiprakarn Park Chao Phraya Riverfront Evening",a:"Phra Nakhon",v:["beautiful", "quiet", "romantic_water"],d:10,s:"A small riverside park where locals watch sunset over the Chao Phraya, no tourists, no crowds",st:"Santichaiprakarn Park is a narrow waterfront park along the Chao Phraya River where locals sit on benches and watch the water. It is quiet, free, and completely overlooked by tourists. Sunset turns the water gold. Fishermen cast lines. Couples sit in silence. It is the intersection of water, city, and stillness.",im:"An elderly man in a white shirt sits alone on a bench with a fishing line in the water while the sun lowers and his shadow stretches long across the grass beside him.",t:"Metro MRT to Ratchadamnoen, exit 1. Walk west 5 minutes toward river. Park open 6am-9pm. Free. Best 5:30pm-7pm. 30 minutes to one hour.",c:["parks", "romantic_water"],r:"g",nn:"สวนสนิทไชยปราการ",ns:"อุทยานริมแม่น้ำ ที่เงียบสงบและสวยงาม",nst:"สวนสนิทไชยปราการเป็นอุทยานริมน้ำแคบ ๆ ตามแม่น้ำเจ้าพระยา ที่คนท้องถิ่นนั่งบนม้านั่ง มองน้ำ มันเงียบสงบ ฟรี และไม่มีนักท่องเที่ยว",nt:"MRT สถาน Ratchadamnoen ทางออก 1 เดินไปทางตะวันตกไปยังแม่น้ำ 5 นาที"},
  {id:20,n:"Ratchada Train Market Night Market",a:"Huai Khwang",v:["night", "weird", "local"],d:12,s:"Thailand's coolest night market with 200 food and craft vendors on an old train platform, open weekends",st:"Ratchada Train Market operates in the old Ratchada Railway Station area on weekends only. Vendors set up stalls where trains once parked. The market is part food court, part craft fair, part night bazaar. The energy is high, the food is excellent, and the crowd includes mostly Thais. It feels like a secret place that only locals know, even though it is popular.",im:"A teenage couple eats grilled seafood on wooden sticks while neon signs reflect in puddles and music from a nearby stage creates a pulsing beat under the old railway canopy.",t:"Metro MRT to Huai Khwang, exit 1. Walk north 10 minutes. Open Friday-Sunday 5pm-11pm. Food 50-150 THB. Free entry. Two to three hours.",c:["local_only"],r:"g",nn:"ตลาดรถไฟรัชดา",ns:"ตลาดกลางคืนที่เย็นที่สุดของไทย",nst:"ตลาดรถไฟรัชดาทำงานในพื้นที่สถานีรถไฟรัชดาเก่า โดยเปิดเฉพาะวันสุดสัปดาห์เท่านั้น ผู้ขายตั้งคนขายที่เคยจอดรถไฟ ตลาดเป็นส่วนหนึ่งของสนามอาหาร ส่วนหนึ่งของตลาดงาน ส่วนหนึ่งของตลาดกลางคืน",nt:"MRT สถาน Huai Khwang ทางออก 1 เดินไปทางเหนือ 10 นาที เปิด ศุกร์-อาทิตย์ 5 น. - 11 น."},
  {id:21,n:"Huai Khwang Night Market and Local Food Street",a:"Huai Khwang",v:["night", "local"],d:10,s:"A lively neighborhood night market with dozens of food stalls and locals eating dinner at 9pm",st:"Huai Khwang Night Market is a traditional street market that operates in the evenings. Vendors set up stalls with grilled meats, noodles, desserts, and drinks. The crowd is mostly Thai families and workers eating dinner. It is loud, crowded, and authentic. You stand and eat from a small plate with a plastic fork, surrounded by dozens of other people doing the same.",im:"A mother holds a child on her hip while eating noodles with a wooden fork, while beside her a vendor grills chicken over charcoal and the smoke creates a haze in the narrow street.",t:"Metro MRT to Huai Khwang, exit 1. Market 5pm-10pm. Food 30-80 THB. Free entry. Busiest 7pm-8:30pm. Two hours.",c:["local_only"],r:"g",nn:"ตลาดกลางคืน ห้วยขวาง",ns:"ตลาดกลางคืน ที่เต็มไปด้วยคนท้องถิ่น",nst:"ตลาดกลางคืน ห้วยขวาง เป็นตลาดสตรีทดั้งเดิม ที่ทำงานในเวลาเย็น ผู้ขายตั้งคนขายกับเนื้อย่าง เส้นใหญ่ ของหวาน และเครื่องดื่ม",nt:"MRT สถาน Huai Khwang ทางออก 1 ตลาด 5 น. - 10 น."},
  {id:22,n:"Phu Khao Thong (Golden Mount) Free Climb",a:"Phra Nakhon",v:["history", "free", "beautiful"],d:12,s:"An artificial hill built from temple rubble in 1852, now a 360-degree viewpoint over old Bangkok",st:"Phu Khao Thong is an artificial mound created when a temple collapsed during floods in 1852. Rubble was piled up and the structure was gilded. Now it is a golden sphere visible from across Bangkok, and you can climb the stairs to the top for panoramic views. The climb is steep but short. The view shows the old wooden neighborhoods, temples, and the Chao Phraya River winding.",im:"A jogger climbs the steep exterior stairs of the golden mount while looking back at the sprawl of Bangkok's old neighborhoods spreading out behind him, a sea of tile roofs and temple spires.",t:"Metro MRT to Sanam Chai, exit 2. Walk south 10 minutes. Free to climb. Open 6am-6pm. Steep 40 steps. 20 minutes to summit.",c:["history_big"],r:"g",nn:"ภูเขาทอง",ns:"เนินเทียมสร้าง ที่เต็มไปด้วยทองคำ",nst:"ภูเขาทองเป็นเนินเทียมสร้างจากวัตถุเศษหลักจากที่วัดพังในสมัย 1852 เศษซากถูกวางซ้อนกัน และโครงสร้างถูกอุปถัมภ์ทองคำ ตอนนี้มันเป็นทรงกลมสีทองที่มองเห็นได้จากทั่วกรุงเทพ",nt:"MRT สถาน Sanam Chai ทางออก 2 เดินไปทางใต้ 10 นาที ขึ้นได้ฟรี"},
  {id:23,n:"The Giant Swing (Sao Ching Cha) at Wat Suthat",a:"Phra Nakhon",v:["history", "weird"],d:8,s:"A 25-meter wooden swing built in 1784 for a Hindu ceremony that swings dangerously high above the street",st:"The Giant Swing was built by King Rama I in 1784 for Hindu Brahmin ceremonies to bring good harvests. The swing reaches over 25 meters into the air and swings above a narrow Bangkok street. The ceremony is no longer performed for safety reasons, but the swing stands as a relic. It is an unusual monument: massive, old, and purposefully dangerous-looking.",im:"The enormous wooden swing hangs empty above a busy street while pedestrians walk beneath it, unaware of how high the structure swings during ceremonies that no longer occur.",t:"Metro MRT to Sanam Chai, exit 2. Swing is visible near Wat Suthat temple. Free to view from street. Walk around the temple. 30 minutes.",c:["history_big"],r:"g",nn:"ชิงชา (สาวชิงชา)",ns:"ชิงชาไม้ยักษ์ ที่ขึ้นสูง 25 เมตร",nst:"ชิงชาถูกสร้างโดยพระบาทสมเด็จพ่อที่ 1 ในปี 1784 สำหรับพิธีสิวลี เพื่อเก็บเกี่ยวที่ดี ชิงชาสูงกว่า 25 เมตร และดัดแปลงสูงเหนือถนนกรุงเทพแคบ ๆ",nt:"MRT สถาน Sanam Chai ทางออก 2 ชิงชามองเห็นได้ใกล้วัดสุทัศน์"},
  {id:24,n:"Bang Kapi Market District",a:"Bang Kapi",v:["local", "free"],d:10,s:"A sprawling neighborhood market in eastern Bangkok where locals buy daily supplies and eat lunch",st:"Bang Kapi is a large neighborhood market in a working-class Bangkok district. The market covers several blocks with vegetable vendors, fish stalls, and food restaurants. It is completely local: families with children, workers on break, elderly people shopping daily. No tourists in sight. You can eat excellent rice and curry for a few dollars.",im:"A grandmother selects fresh ginger from a pile while haggling with a vendor, while behind them a worker eats curry rice quickly from a bowl, standing in a narrow corridor of the market.",t:"Metro MRT to Bang Kapi, exit 1. Market immediately near station. Open 7am-6pm. Food 50-100 THB. Free. Two hours.",c:["local_only"],r:"g",nn:"ตลาดบางกะปิ",ns:"ตลาดละแวกที่เต็มไปด้วยคนท้องถิ่น",nst:"ตลาดบางกะปิเป็นตลาดละแวกขนาดใหญ่ในเขตกรุงเทพ ตลาดครอบคลุมหลายบล็อกด้วยผู้ขายผักสินค้า คนท้องถิ่นมาซื้อสินค้าวันนี้",nt:"MRT สถาน Bang Kapi ทางออก 1 ตลาดใกล้สถานีทันที"},
  {id:25,n:"Talad Rot Fai Ratchada Amphitheater View",a:"Huai Khwang",v:["weird", "night"],d:10,s:"An abandoned railway yard with a sunken amphitheater on the grounds visible from above, now a night market",st:"The Ratchada train yard once parked trains and had an amphitheater built into the grounds. Much of this infrastructure is now a weekend night market, but walking the grounds you see the architectural bones: the sunken amphitheater, old railway tracks, loading platforms. It is a strange layering of old industrial function and current commerce.",im:"A vendor sets up stalls in what was once an amphitheater while old railway tracks remain visible in the cracked ground beneath her feet and she arranges goods in the vanished theater's seating areas.",t:"Metro MRT to Huai Khwang, exit 1. Walk north 10 minutes. Market Friday-Sunday 5pm-11pm. Free to explore. One to two hours.",c:["weird"],r:"g",nn:"ตลาดรถไฟรัชดา ห้องประชุม",ns:"สนามรถไฟเก่า ที่มีโรงละคร",nst:"สนามรถไฟรัชดาเคยจอดรถไฟและมีโรงละครเล็ก ๆ สร้างในพื้นที่ ตอนนี้เป็นส่วนหนึ่งของตลาดกลางคืน",nt:"MRT สถาน Huai Khwang ทางออก 1 เดินไปทางเหนือ 10 นาที"},
  {id:26,n:"Wat Benchamabophit Marble Temple",a:"Dusit",v:["history", "quiet", "beautiful"],d:8,s:"An 1899 temple built entirely from white Carrara marble imported from Italy, glowing in morning light",st:"Wat Benchamabophit is one of Bangkok's newest major temples, built in 1899. The entire structure is white Italian marble, which was revolutionary for Thailand at the time. The temple stands out in pure white against the sky. Monks walk the marble corridors. It is a functioning temple, not a tourist attraction. Visit early morning when monks meditate and chant.",im:"A young monk in orange robes walks barefoot across white marble floors that reflect the ceiling above, while morning light illuminates the emptiness of the corridor and his footsteps echo.",t:"Metro BTS to National Stadium, exit 5. Walk northeast 10 minutes. Open 5am-9pm. Free to enter. Best 6am-7am. One hour.",c:["history_big"],r:"g",nn:"วัดเบญจมบพิตร",ns:"วัดหินอ่อนไข่ สีขาว ที่สวยงามมาก",nst:"วัดเบญจมบพิตรเป็นหนึ่งในวัดใหญ่ที่สร้างใหม่ของกรุงเทพ สร้างในปี 1899 โครงสร้างทั้งหมดเป็นหินอ่อน Carrara ของอิตาลี ซึ่งเป็นเรื่องปฏิวัติในไทยในสมัยนั้น",nt:"BTS สถาน National Stadium ทางออก 5 เดินไปทางตะวันออกเฉียงเหนือ 10 นาที"},
  {id:27,n:"Royal Barge Museum Thonburi",a:"Thonburi",v:["history", "beautiful"],d:10,s:"Ancient royal parade boats with gold and jeweled decorations used for processions, displayed on a canal",st:"The Royal Barge Museum displays the actual boats used for royal processions on the Chao Phraya River. The boats are enormous, ornate, intricately carved, and gilded. They are rarely used now, but the collection shows the craftsmanship and ceremony of Thai royalty. The boats are visible along a still canal.",im:"An ornate golden boat with an enormous carved prow sits motionless in a canal while a caretaker in old clothes sits on its deck reading a newspaper, the boat catching afternoon light.",t:"Take longtail boat from Wat Rakhang pier 100 THB. Museum open 9am-5pm. Entry 100 THB. Closed Mondays. One to two hours.",c:["history_big"],r:"y",nn:"พิพิธภัณฑ์เรือหลวง",ns:"เรือพระที่ศักดิ์สิทธิ์ ประดับปพยพและอัญมณี",nst:"พิพิธภัณฑ์เรือหลวงจัดแสดงเรือจริงที่ใช้สำหรับการแห่พระพิจารณาบนแม่น้ำเจ้าพระยา เรือมีขนาดใหญ่ ฟุ่มเฟือย และเรียบเรียงด้วยความประณีต",nt:"จ้างเรือยางจาก ท่าวัดราขัง 100 บาท พิพิธภัณฑ์เปิด 9 น. - 5 น. ค่าเข้า 100 บาท"},
  {id:28,n:"Lak Mueang City Pillar Bangkok",a:"Rattanakosin",v:["history", "quiet"],d:5,s:"The spiritual foundation stone of Bangkok itself, a pillar said to house the city's soul, built in 1782",st:"Lak Mueang is the city pillar that marks Bangkok's spiritual foundation. Built in 1782 by King Rama I, it is believed to house the city's protective spirit. Devotees come to pray and make offerings. The pillar stands in a small shrine near the Grand Palace. Despite its historical significance, most tourists miss it entirely.",im:"An elderly woman lights incense in a shrine around the ancient pillar while whispering a prayer, her hands pressed together, and the smoke rises around the wooden structure that has stood for 240 years.",t:"Metro MRT to Sanam Chai, exit 1. Pillar is near Grand Palace. Free. Open 6am-9pm. 15 minutes.",c:["history_big"],r:"g",nn:"หลักเมืองแห่งกรุงเทพ",ns:"เสาตั้งสิ่งศักดิ์สิทธิ์ของกรุงเทพ",nst:"หลักเมืองแห่งกรุงเทพเป็นเสาปลายที่ทำให้กรุงเทพมีพื้นฐาน สร้างในปี 1782 โดยพระบาทสมเด็จพ่อที่ 1 เชื่อกันว่าเป็นที่อาศัยของจิตวิญญาณป้องกัน",nt:"MRT สถาน Sanam Chai ทางออก 1 เสาอยู่ใกล้วัง ฟรี"},
  {id:29,n:"Street Food on Charoen Krung Road",a:"Talat Noi",v:["local", "history"],d:10,s:"Bangkok's oldest road from 1861, lined with street food vendors and colonial-era storefronts",st:"Charoen Krung Road is Bangkok's first planned street, laid out by King Mongkut in 1861. The street remains lined with old shophouses, antique shops, and persistent street food vendors. Walking Charoen Krung is walking through Bangkok's commerce from the 19th century to now. The food is excellent and cheap.",im:"A vendor grills meatballs on skewers over a charcoal fire while colonial-era shophouses with peeling paint stand behind her, and a motorcycle taxi waits at the curb.",t:"Metro BTS to Saphan Taksin, exit 3. Walk east along river. Road runs north-south. Open anytime. Street food 30-80 THB. Two hours.",c:["local_only"],r:"g",nn:"ถนนเจริงกรุง",ns:"ถนนเก่าแก่สุดของกรุงเทพ ตั้งแต่ปี 1861",nst:"ถนนเจริงกรุงเป็นถนนที่วางแผนแรกของกรุงเทพ วางแผนโดยพระบาทสมเด็จพ่อที่ 4 ในปี 1861 ถนนยังคงเต็มไปด้วยร้านค้าเก่า ร้านโบราณวัตถุ และผู้ขายขนมขบเคี้ยว",nt:"BTS สถาน Saphan Taksin ทางออก 3 เดินไปทางตะวันออกตามแม่น้ำ"},
  {id:30,n:"Wat Traimit Golden Buddha",a:"Chinatown",v:["history", "beautiful"],d:8,s:"A solid gold Buddha statue weighing 5.5 tonnes, covered for 200 years until 1955, now in a modern temple",st:"The Golden Buddha was covered in stucco and hidden for 200 years. In 1955, when the stucco cracked, the gold inside was revealed. The statue is nearly 4 meters tall and weighs 5.5 tonnes of solid gold. It is now housed in a modern temple built to protect it. The face is serene, the posture is meditation, and the scale is overwhelming.",im:"A man stands before the enormous golden Buddha in quiet awe, his hand pressed to his chest in reverence, while the light reflects off the metal surface and creates a glow around the statue's calm face.",t:"Metro MRT to Yaowarat, exit 1. Temple open 8am-5pm. Entry 40 THB. One hour.",c:["history_big"],r:"y",nn:"วัดไตรมิตร พระพุทธรูปสีทอง",ns:"พระพุทธรูปทองคำแท้ สองพันห้าร้อยกิโล",nst:"พระพุทธรูปทองคำถูกปิดด้วยปูนขาวและซ่อนไว้ 200 ปี ในปี 1898 เมื่อปูนขาวแตก ทองคำข้างในก็ถูกเปิดเผย พระรูปสูง 4 เมตรเกือบและหนัก 5.5 ตันทองคำแท้",nt:"MRT สถาน Yaowarat ทางออก 1 วัดเปิด 8 น. - 5 น. ค่าเข้า 40 บาท"}
];

const PlaceDetail=({place:p,onClose,onNext,onPrev,lang})=>(
<div style={{position:"fixed",inset:0,zIndex:1000,backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat",overflowY:"auto"}}>
<div className="px-5 pt-6 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex justify-between items-center mb-4">
<button onClick={onClose} className="text-sm font-bold" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← Back</button>
<div className="flex gap-2">
<button onClick={onPrev} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>←</button>
<button onClick={onNext} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>→</button></div></div>
<h1 className="text-2xl font-black" style={{color:"#1a1a2e"}}>{lang==="native"&&p.nn?p.nn:p.n}</h1>
{lang==="native"&&p.nn&&<p className="text-sm font-medium" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-sm mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p>
{PLACE_IMAGES[p.id]&&<div className="mt-4 rounded-xl overflow-hidden" style={{maxHeight:"400px"}}>
<img src={`images/${PLACE_IMAGES[p.id]}`} alt={p.n} style={{width:"100%",maxHeight:"360px",objectFit:"contain",display:"block",borderRadius:"8px"}}/>
<p className="text-xs mt-1" style={{color:"#aaa",textAlign:"center"}}>AI-generated illustration</p></div>}
<div className="mt-4 p-4 rounded-xl" style={{background:"#f8f8ff"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#1a1a2e"}}>The Story</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nst?p.nst:p.st}</p></div>
{p.im&&<div className="mt-3 p-4 rounded-xl" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#a78bfa"}}>Imagine This</h3>
<p className="text-sm" style={{color:"#b8b0d0",lineHeight:1.7,fontStyle:"italic"}}>{p.im}</p></div>}
{p.t&&<div className="mt-3 p-4 rounded-xl" style={{background:"#f0fdf4"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#166534"}}>{lang==="native"?"Tips / "+LANG_NAME:"Tips"}</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nt?p.nt:p.t}</p>
<a href={`https://maps.google.com/?q=${encodeURIComponent(p.n+', '+CITY_EN)}`} target="_blank" rel="noopener noreferrer"
  className="mt-3 flex items-center gap-2 text-sm font-bold"
  style={{color:"#166534",textDecoration:"none",display:"inline-flex",marginTop:"10px"}}>
  🗺 Get directions
</a>
</div>}
{p.ef&&<p className="text-xs mt-3 pt-3" style={{color:"#555",lineHeight:1.7,borderTop:"1px solid #dcfce7"}}>🍔 {p.ef}</p>}
{p.sf&&<p className="text-xs mt-2" style={{color:"#555",lineHeight:1.7}}>🏠 {p.sf}</p>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
<div className="mt-5">
<p className="text-xs font-bold mb-2" style={{color:"#888",letterSpacing:"0.08em",textTransform:"uppercase"}}>City Moods</p>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} style={{borderRadius:10,overflow:"hidden",aspectRatio:"2/3",background:"#eee"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>)}</div></div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TBGS={"places":"url('../../textures/tex5.png') center/cover no-repeat","collections":"url('../../textures/tex6.png') center/cover no-repeat","missions":"url('../../textures/tex7.png') center/cover no-repeat","plan":"url('../../textures/tex8.png') center/cover no-repeat","phrases":"url('../../textures/tex9.png') center/cover no-repeat","default":"url('../../textures/tex5.png') center/cover no-repeat"};function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Bangkok Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Bangkok Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
