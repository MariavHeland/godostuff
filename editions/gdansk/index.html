const P = [
  {id:1,n:"Long Market Colored Facades — Stare Miasto",a:"Stare Miasto",v:["beautiful", "history"],d:1,s:"A Renaissance square surrounded by merchant townhouses in pastel colors—postcard perfect but real, not a museum recreation.",st:"The facades are ornate, decorated, each building different. Gold trim, carved details, elaborate window frames. It\'s wealth made visible in architecture. People walk through like it\'s normal. Because it is.",im:"It\'s 1500. Merchants build these houses to advertise their success. Now tourists photograph them like they\'re still new. They\'re faded and perfect.",t:"The facades are ornate, decorated, each building different. Gold trim, carved details, elaborate window frames. It\'s wealth made visible in architecture. People walk through like it\'s normal. Because it is.\",im:\"It\'s 1500. Merchants build these houses to advertise their success. Now tourists photograph them like they\'re still new. They\'re faded and perfect.\",t:\"Free. It\'s the center, walkable from everywhere. Go at sunrise when light is golden and crowds don\'t exist. Sit on a bench. Watch the buildings change color as light shifts.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:2,n:"Westerplatte WWII Monument and Beach — Westerplatte",a:"Westerplatte",v:["history", "beautiful"],d:2,s:"The spot where WWII started in Europe—German guns fired here first, then there\'s a beach where locals swim.",st:"The monument is stark. Ruins visible. You stand where first shots of European war happened. Then you look at the beach. People swimming. The contrast is jarring. War then, peace now, same water.",im:"It\'s Sept 1, 1939. German battleships fire. The war begins. 7 years of death start here.",t:"The monument is stark. Ruins visible. You stand where first shots of European war happened. Then you look at the beach. People swimming. The contrast is jarring. War then, peace now, same water.\",im:\"It\'s Sept 1, 1939. German battleships fire. The war begins. 7 years of death start here.\",t:\"Ferry or taxi to Westerplatte (30 min from center). Free access. Museum €8. Spend 2-3 hours. The monument is powerful. The beach is ordinary. The contrast is the point.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:3,n:"European Solidarity Centre Museum — Wrzeszcz",a:"Wrzeszcz",v:["history", "powerful"],d:3,s:"A museum about Solidarity movement that ended communism in Poland—ordinary people defeating a system through strikes.",st:"The exhibits show how workers organized, risked arrest, refused compliance. It\'s powerful without being propagandistic. It\'s human-scale history. Workers\' voices throughout.",im:"It\'s 1980. Workers strike. The government can\'t break them. Solidarity spreads. Ten years later, communism collapses. Ordinary people changed history.",t:"The exhibits show how workers organized, risked arrest, refused compliance. It\'s powerful without being propagandistic. It\'s human-scale history. Workers\' voices throughout.\",im:\"It\'s 1980. Workers strike. The government can\'t break them. Solidarity spreads. Ten years later, communism collapses. Ordinary people changed history.\",t:\"€10-12 entry. North of center. Spend 3 hours. It\'s dense, important. Go on a quiet afternoon. Read everything. This changed Europe.",c:["history_big", "powerful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:4,n:"Oliwa Cathedral Organ Concert — Oliwa",a:"Oliwa",v:["beautiful", "quiet"],d:4,s:"An 18th-century cathedral with a massive organ that sounds like wind, water, and thunder combined—concerts happen daily.",st:"You sit in a wooden pew. The organ starts. It\'s not just sound, it\'s vibration. The entire cathedral resonates. You understand why people built these instruments. It\'s faith made audible.",im:"It\'s 1780. An artisan builds this organ. It plays for 240 years. A thousand concerts happen. Now it\'s your turn to listen.",t:"You sit in a wooden pew. The organ starts. It\'s not just sound, it\'s vibration. The entire cathedral resonates. You understand why people built these instruments. It\'s faith made audible.\",im:\"It\'s 1780. An artisan builds this organ. It plays for 240 years. A thousand concerts happen. Now it\'s your turn to listen.\",t:\"€10-15 for concert, €5 for basilica alone. Concerts daily usually. Check schedule. Go for a concert, not just the building. Takes 60 minutes. Arrive early for a seat.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:5,n:"Żuraw Medieval Crane Port — Stare Miasto",a:"Stare Miasto",v:["history", "architecture"],d:5,s:"A 15th-century cargo crane still standing in the harbor—massive wooden structure that loaded ships for 600 years.",st:"It\'s wooden, intricate, improbably tall. It\'s a machine that\'s 600 years old. Walking past it, you see how different people\'s engineering was. Simpler. More beautiful. More honest.",im:"It\'s 1400. A ship arrives. The crane loads cargo using ropes and human strength. This same crane might load the same type of cargo now.",t:"It\'s wooden, intricate, improbably tall. It\'s a machine that\'s 600 years old. Walking past it, you see how different people\'s engineering was. Simpler. More beautiful. More honest.\",im:\"It\'s 1400. A ship arrives. The crane loads cargo using ropes and human strength. This same crane might load the same type of cargo now.\",t:\"Free to see from outside. Museum inside (€8-10). It\'s right on the harbor, impossible to miss. Takes 30 minutes to explore.",c:["history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:6,n:"Stare Miasto Rebuilt Streets — Stare Miasto",a:"Stare Miasto",v:["history", "beautiful"],d:6,s:"The old town is a perfect reconstruction after WWII destruction—locals rebuilt it based on old paintings and memories.",st:"Walking here, you\'re technically in a 1950s-60s recreation. But it feels medieval. That\'s the point—Poles refused to let the war erase their city. They rebuilt it exactly. From rubble to perfect recreation.",im:"It\'s 1945. The city is rubble. Poles say: we\'ll rebuild. It takes decades. By 1980, it looks like it never burned.",t:"Walking here, you\'re technically in a 1950s-60s recreation. But it feels medieval. That\'s the point—Poles refused to let the war erase their city. They rebuilt it exactly. From rubble to perfect recreation.\",im:\"It\'s 1945. The city is rubble. Poles say: we\'ll rebuild. It takes decades. By 1980, it looks like it never burned.\",t:\"Free. The entire old town is walkable. Spend a full day. Go slowly. Understand what reconstruction meant—cultural resistance to erasure.",c:["history_big", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:7,n:"Wrzeszcz Günter Grass Birthplace — Wrzeszcz",a:"Wrzeszcz",v:["history", "hidden"],d:7,s:"The apartment building where Günter Grass was born—now a plaque and apartment building, simple but meaningful.",st:"It\'s an ordinary residential building. Nothing fancy. Inside, Grass was born. Outside, a plaque notes the fact. It\'s humble, which makes it more real than a museum.",im:"It\'s 1927. A child is born who will write one of the greatest novels of the 20th century. The building doesn\'t know this yet.",t:"It\'s an ordinary residential building. Nothing fancy. Inside, Grass was born. Outside, a plaque notes the fact. It\'s humble, which makes it more real than a museum.\",im:\"It\'s 1927. A child is born who will write one of the greatest novels of the 20th century. The building doesn\'t know this yet.\",t:\"Free. It\'s in Wrzeszcz neighborhood, north of center. Tram 12 gets you close. It\'s just a building with a plaque. Go if you love Grass, otherwise skip.",c:["history_big", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:8,n:"Oliwa Park Lakes and Paths — Oliwa",a:"Oliwa",v:["nature", "quiet"],d:8,s:"A large park with small lakes, tree-lined paths, locals walking dogs—the kind of place that\'s beautiful because nobody\'s trying.",st:"The park is green, peaceful. Paths follow lakes. People jog, walk, exist. It\'s functional beauty. It\'s where Gdańskians actually spend time when they leave the old town.",im:"It\'s any afternoon. Same peace. Same humans needing green space.",t:"The park is green, peaceful. Paths follow lakes. People jog, walk, exist. It\'s functional beauty. It\'s where Gdańskians actually spend time when they leave the old town.\",im:\"It\'s any afternoon. Same peace. Same humans needing green space.\",t:\"Free. Tram 2 or 12 to Oliwa. Spend 90 minutes walking slowly. Bring a book. Sit by a lake. No destinations, just presence.",c:["nature", "parks"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:9,n:"Nowy Port Abandoned District Exploration — Nowy Port",a:"Nowy Port",v:["abandoned", "weird"],d:9,s:"A formerly prosperous port neighborhood now partly abandoned—empty shopfronts, faded signs, Polish industrial nostalgia.",st:"You walk streets that used to throb with commerce. Now it\'s quiet. Some shops are boarded. Some still operate. It\'s eerie not morbidly but honestly. Time made this place obsolete.",im:"It\'s 1970. Nowy Port bustles. Ships arrive. Workers work. Now it\'s 2026 and the world moved on.",t:"You walk streets that used to throb with commerce. Now it\'s quiet. Some shops are boarded. Some still operate. It\'s eerie not morbidly but honestly. Time made this place obsolete.\",im:\"It\'s 1970. Nowy Port bustles. Ships arrive. Workers work. Now it\'s 2026 and the world moved on.\",t:\"Free walking. It\'s accessible by tram 3 or 12 from center (20 min). Go during the day. It\'s safe but melancholic. Go with a friend. Take photos. Understand urban change.",c:["abandoned", "history_big"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:10,n:"Zaspa Murals District Open-Air Gallery — Zaspa",a:"Zaspa",v:["street_art", "weird"],d:10,s:"A Soviet-era housing block neighborhood where the entire district is painted with massive murals—150+ artists on 26 buildings.",st:"You walk and the walls are everywhere—colorful, abstract, faces, political messages. It\'s not a tourist street art spot, it\'s how people live. Houses are painted. Normal daily life surrounded by extraordinary art.",im:"It\'s 2005. Artists start painting the block. Now it\'s the largest open-air gallery in Poland. Residents paint over grey concrete with identity.",t:"You walk and the walls are everywhere—colorful, abstract, faces, political messages. It\'s not a tourist street art spot, it\'s how people live. Houses are painted. Normal daily life surrounded by extraordinary art.\",im:\"It\'s 2005. Artists start painting the block. Now it\'s the largest open-air gallery in Poland. Residents paint over grey concrete with identity.\",t:\"Free. Tram 7 or 12 to Zaspa. Spend 90 minutes walking. Take photos. It\'s constantly changing as new murals appear. Go midweek for fewer people. This is real cultural expression.",c:["street_art", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:11,n:"Brzeźno Beach Walk — Brzeźno",a:"Brzeźno",v:["nature", "beautiful"],d:11,s:"A long beach with a pier, local swimmers, and genuine Polish Baltic Sea vibes—not a resort, a living beach.",st:"The beach is wide, sandy, backed by residential buildings. People swim, dogs run, someone\'s fishing from the pier. It\'s ordinary and perfect. Real life in a coastal setting.",im:"It\'s 1950. The same beach. People swimming in the same water. Time changes but the water remains.",t:"The beach is wide, sandy, backed by residential buildings. People swim, dogs run, someone\'s fishing from the pier. It\'s ordinary and perfect. Real life in a coastal setting.\",im:\"It\'s 1950. The same beach. People swimming in the same water. Time changes but the water remains.\",t:\"Free. Tram 5 or 12 to Brzeźno (30 min from center). Swim May-September. The water is cold but people do it. Rent a beach chair (€5-10). Spend a half day. It\'s local, not touristy.",c:["nature", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:12,n:"Gradowa Hill Fort Viewpoint — Wrzeszcz",a:"Wrzeszcz",v:["high_spots", "history"],d:12,s:"Climb a hill where a medieval fort stood—now a viewpoint where you see Gdańsk from the defensive perspective.",st:"The hill rises above the city. From the top, Gdańsk spreads below. You see the harbor, the old town, the extent of the city. You understand why the fort was here.",im:"It\'s 1200. Defenders stood here watching for invaders. Now you stand in the same spot, watching tourists.",t:"The hill rises above the city. From the top, Gdańsk spreads below. You see the harbor, the old town, the extent of the city. You understand why the fort was here.\",im:\"It\'s 1200. Defenders stood here watching for invaders. Now you stand in the same spot, watching tourists.\",t:\"Free. Tram 12 to Wrzeszcz, then a 20-minute walk. Takes 30 minutes to climb and enjoy the view. Go midweek morning for solitude.",c:["high_spots", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:13,n:"Sopot Pier and Beach Day Trip — Day Trip",a:"Day Trip",v:["beautiful", "local"],d:13,s:"Train 20 minutes to a coastal resort town with a historic pier—total Baltic beach vibe without leaving the region.",st:"Sopot is smaller, friendlier than Gdańsk. A long wooden pier extends into the sea. The beach is crowded on weekends, quiet on weekdays. You understand Polish beach culture.",im:"It\'s 1900. Sopot is a fashionable resort. Now it\'s more casual but still charming. The pier remains.",t:"Sopot is smaller, friendlier than Gdańsk. A long wooden pier extends into the sea. The beach is crowded on weekends, quiet on weekdays. You understand Polish beach culture.\",im:\"It\'s 1900. Sopot is a fashionable resort. Now it\'s more casual but still charming. The pier remains.\",t:\"SKM train from Gdańsk Główny (20 min, €3-5). Free to walk pier and beach. Spend a full day. Eat fish, swim, walk. Budget €50-80 for food and pier entrance (€3-5).",c:["nature", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:14,n:"Gdynia Modernist Architecture Day Trip — Day Trip",a:"Day Trip",v:["architecture", "beautiful"],d:14,s:"Train 30 minutes to a city built in the 1920s-30s—pristine art deco and modernist buildings, planned city beauty.",st:"Gdynia is ordered, beautiful, clearly designed. Buildings are angular, symmetrical, designed by visionary architects. It\'s the opposite of organic medieval cities. It\'s rational beauty.",im:"It\'s 1920. Poland needs a modern port city. Architects draw rational spaces. Buildings rise. Now it\'s a time capsule of modernism.",t:"Gdynia is ordered, beautiful, clearly designed. Buildings are angular, symmetrical, designed by visionary architects. It\'s the opposite of organic medieval cities. It\'s rational beauty.\",im:\"It\'s 1920. Poland needs a modern port city. Architects draw rational spaces. Buildings rise. Now it\'s a time capsule of modernism.\",t:\"SKM train from Gdańsk (30 min, €3-5). Walk the central area. Swim at the beach. Eat at a modern restaurant (€25-40). Spend a half or full day.",c:["architecture", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:15,n:"Malbork Castle Day Trip — Day Trip",a:"Day Trip",v:["history", "beautiful"],d:15,s:"Train 1 hour to the largest medieval castle in Europe—WWII destruction, Soviet occupation, Polish restoration. Full history.",st:"The castle is massive, brick, intimidating. Inside, courtyards, towers, rooms. The restoration shows what was destroyed and what remains. It\'s powerful. It\'s Polish determination made architecture.",im:"It\'s 1400. The castle is built. It stands for 500 years. Then WWII bombs it. Poland rebuilds it. Now it stands again.",t:"The castle is massive, brick, intimidating. Inside, courtyards, towers, rooms. The restoration shows what was destroyed and what remains. It\'s powerful. It\'s Polish determination made architecture.\",im:\"It\'s 1400. The castle is built. It stands for 500 years. Then WWII bombs it. Poland rebuilds it. Now it stands again.\",t:\"Train from Gdańsk Główny (1 hour, €8-12). Entry €15-20. Takes 3-4 hours to properly explore. Go on a clear day. The castle changes color with light. Worth every minute.",c:["history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:16,n:"Hel Peninsula Beach Day Trip — Day Trip",a:"Day Trip",v:["nature", "beautiful"],d:16,s:"Train to a narrow peninsula with beaches on both sides—Baltic wind, sand dunes, wild feeling 1 hour from the city.",st:"The train follows the coast. You arrive at a place that feels like the edge of the world. Beaches on both sides. The water is cold, grey, real. It\'s honest beauty.",im:"It\'s 1950. Same peninsula. Same wind. Same sense of being at the edge.",t:"The train follows the coast. You arrive at a place that feels like the edge of the world. Beaches on both sides. The water is cold, grey, real. It\'s honest beauty.\",im:\"It\'s 1950. Same peninsula. Same wind. Same sense of being at the edge.\",t:\"Train from Gdańsk (1 hour, €5-8) to Hel. Beach access free. Spend a full day. Bring warm clothes—it\'s windy. Eat fresh fish. Walk the dunes. Feel the Baltic.",c:["nature", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:17,n:"Długa Street Merchant Houses Detail Walk — Stare Miasto",a:"Stare Miasto",v:["history", "beautiful"],d:17,s:"Walk down a single street noticing architectural details—each building tells a story through its decoration.",st:"Elaborate window frames. Carved wooden details. Painted facades fading authentically. Each building was a family\'s statement. Now the details are the story.",im:"It\'s 1600. A merchant builds a house showing off. The details remain 400 years later.",t:"Elaborate window frames. Carved wooden details. Painted facades fading authentically. Each building was a family\'s statement. Now the details are the story.\",im:\"It\'s 1600. A merchant builds a house showing off. The details remain 400 years later.\",t:\"Free walk. Slowly. Notice everything. Bring binoculars to see roof details.",c:["architecture", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:18,n:"Amber Shops and History — Stare Miasto",a:"Stare Miasto",v:["history", "weird"],d:18,s:"Gdańsk\'s history is connected to amber trade—visit shops where 40-million-year-old resin is sold and displayed.",st:"Amber glows in shop windows. The material is ancient, precious, Baltic. Jewelry, sculptures, raw pieces. You hold something millions of years old in your hand.",im:"It\'s 40 million years ago. Tree sap falls. Now people wear it as jewelry.",t:"Amber glows in shop windows. The material is ancient, precious, Baltic. Jewelry, sculptures, raw pieces. You hold something millions of years old in your hand.\",im:\"It\'s 40 million years ago. Tree sap falls. Now people wear it as jewelry.\",t:\"Free to browse. Prices vary (€5 to thousands). It\'s throughout the old town. One shop can\'t contain it.",c:["history_big", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:19,n:"Mariacka Street Pedestrian Lane — Stare Miasto",a:"Stare Miasto",v:["beautiful", "local"],d:19,s:"A narrow lane full of amber shops, restaurants, and local life—the human-scale heart of the old town.",st:"Narrow, intimate, crowded with people eating and shopping. Balconies overhang. The street is so narrow you feel surrounded by history and commerce mixed.",im:"It\'s 1700. Same street. Same commerce. Same human energy.",t:"Narrow, intimate, crowded with people eating and shopping. Balconies overhang. The street is so narrow you feel surrounded by history and commerce mixed.\",im:\"It\'s 1700. Same street. Same commerce. Same human energy.\",t:\"Free walk. Go early morning or late evening when crowds thin. Eat at a restaurant (€20-40). Browse shops. It\'s touristy but real underneath.",c:["local_only", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:20,n:"Motławska Riverside Walk — Stare Miasto",a:"Stare Miasto",v:["beautiful", "romantic_water"],d:20,s:"Walk along the river where merchant boats once docked—now it\'s a promenade where people stroll and water reflects buildings.",st:"The river is calm, reflective. Buildings rise above. People sit on benches watching water and boats. It\'s peaceful in the middle of the city.",im:"It\'s 1500. Merchants load boats on this river. Now you walk where they worked.",t:"The river is calm, reflective. Buildings rise above. People sit on benches watching water and boats. It\'s peaceful in the middle of the city.\",im:\"It\'s 1500. Merchants load boats on this river. Now you walk where they worked.\",t:\"Free. It\'s the waterfront. Spend 60 minutes walking slowly. Sit and watch. It\'s meditative.",c:["romantic_water", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:21,n:"Gdańsk Hidden Gem 21 — District",a:"District",v:["history", "local"],d:21,s:"Gdańsk\'s layered history, Baltic culture, and artistic revival waiting in neighborhoods beyond the tourist square.",st:"Gdańsk is more than postcard facades. Walk neighborhoods. Find murals, cafes, local life. History is embedded in everything.",im:"It\'s any era. Same city, different faces, same spirit of resilience and creativity.",t:"Gdańsk is more than postcard facades. Walk neighborhoods. Find murals, cafes, local life. History is embedded in everything.\",im:\"It\'s any era. Same city, different faces, same spirit of resilience and creativity.\",t:\"Walk, explore, chat with locals. Be respectful. Gdańsk rewards curiosity with authentic encounters.",c:["local_only", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},

<div className="mt-4 p-4 rounded-xl" style={{background:"#f8f8ff"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#1a1a2e"}}>The Story</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nst?p.nst:p.st}</p></div>
{p.im&&<div className="mt-3 p-4 rounded-xl" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#a78bfa"}}>Imagine This</h3>
<p className="text-sm" style={{color:"#b8b0d0",lineHeight:1.7,fontStyle:"italic"}}>{p.im}</p></div>}
{p.t&&<div className="mt-3 p-4 rounded-xl" style={{background:"#f0fdf4"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#166534"}}>{lang==="native"?"Tips / "+LANG_NAME:"Tips"}</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nt?p.nt:p.t}</p>
<a href={`https://maps.google.com/?q=${encodeURIComponent(p.n+', '+CITY_EN)}`} target="_blank" rel="noopener noreferrer"
  className="mt-3 flex items-center gap-2 text-sm font-bold"
  style={{color:"#166534",textDecoration:"none",display:"inline-flex",marginTop:"10px"}}>
  🗺 Get directions
</a>
</div>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
{/* dark scrim over photo */}
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:"linear-gradient(180deg,#F5EDD8 0%,#EDE0C8 100%)"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Gdańsk Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Gdańsk Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
