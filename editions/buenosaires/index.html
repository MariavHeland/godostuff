<script>
const P = [
  {id:1,n:"Teatro Colón — Latin America's greatest opera house",a:"San Telmo",v:["architecture", "art", "history"],d:120,s:"A UNESCO World Heritage theatre completed in 1908 with ornate Italianate architecture and world-class acoustics.",st:"The Teatro Colón took 20 years to construct, opening in 1908 as a symbol of Argentina's Belle Époque prosperity. The building is overwhelming—entering the main foyer, your breath catches at the sheer opulence. The facade is white marble with sculptural details. The interior is a riot of gilded surfaces, frescoed ceilings, and velvet seats. The acoustics were deliberately engineered; a silver spoon dropped on stage can be heard in the highest balcony. The theatre hosted the world's greatest opera singers and dancers. During Argentina's economic crises, the Colón was maintained—never neglected—because it represented the nation's cultural pride. Tours of the theatre are excellent; the guide explains technical innovations. Attending a performance is transformative. The surrounding neighborhood, San Telmo, maintains historic character with cobblestone streets and antique shops.",im:"The glittering interior of the opera house at twilight, every surface gleaming with gilt and decoration, the vast stage curtain drawn, empty seats in curved rows catching soft light.",t:"Subway to Diagonal Norte. Tours: AR$400-600. Shows vary by season; check website for schedule. Dress code for performances is elegant but not strictly enforced. Photography restricted during performances.",c:[],r:"g",nn:"Teatro Colón",ns:"Casa de ópera de América Latina más hermosa, completada 1908.",nst:"La construcción tomó 20 años, abierto 1908. Símbolo de prosperidad de Argentina Belle Époque. Arquitectura Italianate exuberante. Acústica deliberadamente ingeniada.",nt:"Metro a Diagonal Norte. Tours: AR$400-600. Espectáculos varían. Código de vestimenta elegante pero no estricto."},
  {id:2,n:"Casa Rosada — presidential palace facing the plaza",a:"Monserrat",v:["history", "architecture", "local"],d:90,s:"The pink presidential palace overlooking Plaza de Mayo, the political center of Argentina since the 1800s.",st:"The Casa Rosada (Pink House) is painted an distinctive salmon color, visible from across the plaza. The building has witnessed Argentina's entire modern history—military coups, democratic transitions, economic crises. Interior tours show official reception rooms with their imperial proportions. The building's pink color was originally accidental (lime and blood mixed), but became iconic. The surrounding Plaza de Mayo hosted massive protests—the 1989 food riots, the 2001 financial crisis protests, Mothers of the Plaza de Mayo demonstrating for disappeared relatives. Standing in the plaza, you feel the weight of political history. The gates are guarded but the plaza remains public. The aesthetics of power are obvious—the size of the building, the elevation, the official arrangement. Tours are available; advance booking recommended.",im:"The pink presidential palace facade glowing in sunset light, its neoclassical proportions dominating the plaza, crowds moving across the stone plaza below.",t:"Subway to Plaza de Mayo. Tours available (reserve in advance): AR$100. Open Tuesday-Sunday, times vary. Free entry to plaza. Restrictions during official events.",c:[],r:"g",nn:"Casa Rosada",ns:"Palacio presidencial rosa que domina Plaza de Mayo.",nst:"Pintada color salmón distintivo. Color original accidental (cal y sangre). Presenciado toda historia moderna Argentina. Giras interiores mostran salones recepción.",nt:"Metro a Plaza de Mayo. Tours: AR$100 (reservar). Martes-domingo. Entrada gratis a plaza. Restricciones durante eventos."},
  {id:3,n:"La Boca — colorful neighborhood and tango birthplace",a:"La Boca",v:["history", "art", "local", "food"],d:120,s:"A historic waterfront neighborhood famous for colorful corrugated metal buildings and tango traditions.",st:"La Boca sits where the Riachuelo River meets the Rio de la Plata. The neighborhood's iconic corrugated metal houses, painted in brilliant colors, were originally built with scrap materials from the port. The architecture is functional turned aesthetic. Tango was born in La Boca's brothels and dance halls in the late 1800s. The neighborhood deteriorated during the 20th century but has been revitalized as a cultural and tourist destination. Caminito Street is the tourist heart—lined with restaurants, tango shows, and shops. The area feels performative; tourists and tango dancers coexist visibly. The surrounding residential areas are less touristy. The neighborhood's bohemian character persists, though authenticity is debatable. The riverfront provides genuine atmosphere; the water smells of history and industry.",im:"A street of corrugated metal houses painted brilliant yellow, red, blue, white, with tango dancers performing on the pavement, tourists photographing the scene.",t:"Subway to La Boca. Free walking; Caminito is the main tourist strip. Tango shows in restaurants (AR$2000-4000 including dinner). Photography encouraged. Nighttime is safer in busy areas; avoid side streets after dark.",c:[],r:"g",nn:"La Boca",ns:"Barrio histórico costero, pintoresco y cuna del tango.",nst:"Casas de metal corrugado pintadas brillantes, construidas con materiales de desecho portuario. El tango nació en burdeles. Revitalizada como destino cultural.",nt:"Metro a La Boca. Paseos libres. Espectáculos tango en restaurantes (AR$2000-4000). Fotografía alentada. Nocturno más seguro en áreas ocupadas."},
  {id:4,n:"Recoleta Cemetery — necropolis of the elite",a:"Recoleta",v:["history", "architecture", "hidden", "art"],d:90,s:"An extraordinary cemetery featuring elaborate family mausoleums and the tomb of Eva Perón, designed as a city of the dead.",st:"Recoleta Cemetery is less a burial ground than a city unto itself—streets, plazas, architectural styles. The mausoleums range from neoclassical temples to art deco modernism. The most prominent is the Duarte Family Vault (Eva Perón's tomb), always guarded and decorated with flowers. Walking the 'streets' (named like a real city), you encounter elaborate sculptural work—marble angels, bronze plaques, eternal flames. The cemetery reflects Argentina's class structure; prominent families occupy premium plots. The architecture reveals funeral aesthetics and immortality pretension. I spent hours discovering elaborate designs. Some tombs are neglected, their families emigrated or deceased. The cemetery is simultaneously beautiful and morbid. Many Argentines view it as a crucial cultural site. The surrounding neighborhood, Recoleta proper, is the city's wealthiest.",im:"A marble-lined avenue between ornate family mausoleums with sculptural details, stone angels standing guard, flowers at tomb entrances, the 'city' of the dead stretching beyond.",t:"Subway to Recoleta. Free entrance. Open daily 8 AM-6 PM. Guides available (AR$300). Photography allowed. Respect the dead; avoid disrespectful behavior. Avoid after dark.",c:[],r:"g",nn:"Cementerio Recoleta",ns:"Necrópolis de élites con mausoleos elaborados, tumba de Eva Perón.",nst:"Menos campo sepultura que ciudad—calles, plazas, estilos arquitectónicos. Mausoleos desde templos neoclásicos a modernismo art decó. Refleja estructura clase Argentina.",nt:"Metro a Recoleta. Entrada gratis. Abierto 8 pam-6 pm. Guías disponibles (AR$300). Fotografía permitida. Respeta difuntos. Evita después oscuridad."},
  {id:5,n:"San Telmo neighborhood — bohemian and historic streets",a:"San Telmo",v:["local", "art", "hidden", "history"],d:120,s:"Buenos Aires' oldest neighborhood with colonial architecture, antique shops, and tango culture.",st:"San Telmo was the original center of Buenos Aires before the city expanded north. The neighborhood maintained working-class character while gradually attracting artists and bohemians. The architecture is colonial and early 20th-century—narrow buildings, interior courtyards, colonial facades. The streets are named for saints. Sunday antique market (Feria de San Telmo) fills Plaza Dorrego with vendors. I wandered side streets discovering tiny bars (bares), tango clubs, and antique shops. The neighborhood feels authentically lived-in, not performed for tourists (though tourism has arrived). The restaurants range from simple pulperias to sophisticated establishments. The tango culture is genuine; you hear music from practice studios. The neighborhood preserves lower-middle-class character despite gentrification pressure. Walking at dusk, with colonial buildings glowing in the golden light, feels like time travel.",im:"A San Telmo street with colonial buildings of varying pastels, weathered facades, a couple dancing tango on the cobblestones, overhead lights beginning to glow.",t:"Subway to San Telmo. Sunday feria 10 AM-5 PM is iconic. Walk the streets, discover side alley bars. Restaurants throughout. Photography welcomed in most places. Safe area with good nightlife.",c:[],r:"g",nn:"San Telmo",ns:"Barrio más antiguo con arquitectura colonial, tiendas de antigüedades.",nst:"Original centro de Buenos Aires. Arquitectura colonial y temprano siglo 20. Feria de antiques domingos. Auténtico pero gentrificación creciente.",nt:"Metro a San Telmo. Feria domingos 10 pam-5 pm. Paseos calles, descubre bares. Restaurantes. Fotografía bienvenida. Área segura."},
  {id:6,n:"MALBA — museum of Latin American art",a:"Palermo",v:["art", "architecture", "hidden"],d:90,s:"A contemporary art museum in an elegant converted mansion featuring significant Latin American artists.",st:"MALBA (Museo de Arte Latinoamericano de Buenos Aires) occupies a beautifully renovated mansion. The collection emphasizes 20th and 21st-century Latin American art. The curatorial approach connects art to political and social contexts. I spent time with works exploring colonialism, indigenous perspectives, political violence, and cultural identity. The building's architecture is as important as the art—the proportions, the light, the spatial flow create contemplative experience. Temporary exhibitions rotate regularly; the permanent collection provides context. The museum shop is excellent. The surrounding Palermo neighborhood is upscale; the museum attracts serious art viewers alongside tourists. The permanent collection includes significant Latin American masters. The museum represents Buenos Aires' cultural sophistication.",im:"Gallery interior with modern art installations against white walls, natural light from large windows creating shadows and emphasis, viewers contemplating pieces.",t:"Subway to Plaza Italia or Scalabrini Ortiz, walk 15 min. Admission: AR$400. Open Tuesday-Sunday 10 AM-6 PM, closed Mondays. Excellent restaurant. Photography restrictions vary by exhibition.",c:[],r:"g",nn:"MALBA",ns:"Museo de arte latinoamericano en mansión convertida.",nst:"Colección enfatiza arte latinoamericano siglo 20 y 21. Arquitectura mansión importante como el arte. Exposiciones temporales rotan regularmente.",nt:"Metro a Plaza Italia o Scalabrini Ortiz. Entrada: AR$400. Martes-domingo 10 pam-6 pm. Restaurante excelente. Restricciones fotografía varían."},
  {id:7,n:"Obelisco — iconic monument at city center",a:"Monserrat",v:["architecture", "local", "beautiful"],d:45,s:"A 67-meter white granite obelisk at the intersection of major avenues, the most recognizable symbol of Buenos Aires.",st:"The Obelisco rises dramatically where 9 de Julio and Corrientes avenues intersect. Built in 1936 to commemorate the 400th anniversary of the city's founding, the monument seems impossibly slender relative to its height. From certain angles it aligns perfectly with the Teatro Colón—a planned urban geometry. The monument has been the site of political rallies, celebrations, and protests. Sports victories are celebrated here (thousands converged after Argentina's 1986 World Cup win). The surrounding traffic circles and intersecting avenues create visual drama. Climbing the obelisk is restricted; it remains visually dominant but physically inaccessible. The monument represents Buenos Aires' ambition—geometric, elegant, modernist. It's visible from many parts of the city, functioning as a constant orientation point.",im:"The white obelisk piercing the sky at the intersection of major avenues, traffic flowing around it in all directions, the city's buildings rising around it.",t:"Subway to 9 de Julio. Free viewing. No interior access. Best viewed from surrounding cafes with drinks. Photographed from multiple angles. Nighttime lighting emphasizes the form.",c:[],r:"g",nn:"Obelisco",ns:"Monumento de 67 metros, símbolo más reconocible de Buenos Aires.",nst:"Construido 1936 para conmemorar 400 aniversario. Parece imposiblemente delgado. Alineado perfectamente con Teatro Colón.",nt:"Metro a 9 de Julio. Vistazo gratis. Sin acceso interior. Mejor visto desde cafés. Fotografiado ángulos múltiples. Iluminación nocturna."},
  {id:8,n:"Plaza de la República — parliament and civic gathering",a:"Monserrat",v:["history", "architecture", "local"],d:60,s:"A major plaza anchored by the National Congress building, the seat of legislative power.",st:"Plaza de la República (also called Plaza Congreso) is dominated by the Congress building—a neoclassical palace that signals legislative authority. The plaza itself is a gathering space; political demonstrations, celebrations, and everyday life overlap here. The Congress building is lit dramatically at night, projecting power through light. The surrounding area is touristy but also genuinely active—government officials, workers, residents all move through. The building's architecture is impressive without being overwhelming. Tours of the Congress interior are available; the legislative chambers are operating spaces, not museums. The plaza provides perspective on Buenos Aires' political geography. The building represents the nation's claim to democratic governance (though Argentina's history shows democracy is contested). The light display at night is worth seeing.",im:"The Congress building's neoclassical facade glowing under dramatic lighting as the plaza below fills with people, the scale suggesting institutional power.",t:"Subway to Congreso. Free plaza access. Congress tours (reserve in advance): AR$150. Demonstrations sometimes restrict plaza access. Photography allowed. Evening light most dramatic.",c:[],r:"g",nn:"Plaza de la República",ns:"Plaza mayor con Congreso Nacional, sede poder legislativo.",nst:"Dominada por edificio Congreso—palacio neoclásico señal autoridad legislativa. Plaza es espacio reunión. Demostraciones políticas, celebraciones.",nt:"Metro a Congreso. Acceso plaza gratis. Tours Congreso (reservar): AR$150. Acceso puede restricción. Fotografía permitida. Luz nocturna dramática."},
  {id:9,n:"Palermo neighborhood — modern Buenos Aires lifestyle",a:"Palermo",v:["food", "local", "art", "night"],d:180,s:"A trendy neighborhood with parks, restaurants, galleries, and boutiques representing contemporary Buenos Aires.",st:"Palermo has undergone transformation from working-class barrio to fashionable destination. The neighborhood divides into distinct sub-areas: Palermo Viejo (the original village center), Palermo Soho (high-end shops and restaurants), Palermo Hollywood (media and entertainment). The streets are tree-lined, the buildings are mid-20th-century renovations. Street art and murals enliven walls. The parks (Parque 3 de Febrero) provide green space and recreation. Restaurants range from casual to upscale; the food scene is excellent and expensive. Shopping is sophisticated; boutiques sell local designers. The neighborhood attracts young professionals, artists, and tourists. Nightlife is significant—bars, clubs, live music. The transformation is rapid; traditional businesses are displaced by chains and upscale establishments. Gentrification is visible and contested.",im:"A tree-lined street in Palermo with outdoor restaurant tables, boutique storefronts, street art on building walls, young urbanites moving between spaces.",t:"Subway to Palermo or Las Heras. Walking is primary mode. Restaurants and bars abundant. Shopping concentrated on streets like Honduras, Arévalo. Nightlife best from 11 PM onward. Safe area with heavy tourist presence.",c:[],r:"g",nn:"Palermo",ns:"Barrio moderno con parques, restaurantes, galerías, boutiques.",nst:"Transformación de barrio clase trabajadora a destino fashionable. Subáreas distintas: Viejo, Soho, Hollywood. Árboles, edificios mediados siglo 20.",nt:"Metro a Palermo o Las Heras. Caminar es principal. Restaurantes abundantes. Compras en Honduras, Arévalo. Vida nocturna desde 11 pm. Área segura."},
  {id:10,n:"Hipódromo Argentino de Palermo — horse racing tradition",a:"Palermo",v:["local", "history", "hidden"],d:120,s:"Argentina's most prestigious horse racing track within an urban park, representing the nation's racing traditions.",st:"Horse racing has deep roots in Argentine culture—particularly the working and middle classes. The Hipódromo is embedded within Palermo's large park. The architecture is early-20th-century modernist. The track remains active, hosting races. I attended a racing day and witnessed the betting frenzy, the carefully dressed spectators, the intense focus on horses and odds. The paddock area allows close viewing of thoroughbreds. The crowds are mostly Argentine, not tourists. The betting system is complex; long-time attendees have strategies honed over decades. The social geography is clear—different classes occupy different seating areas. The experience is thoroughly Argentine; I felt like an anthropological observer of a ritual. The surrounding park provides shade and recreation; families often attend just for the park rather than racing.",im:"The racing track with horses mid-gallop, crowds in viewing stands with binoculars and betting slips, the Victorian-style grandstand structure in background.",t:"Subway to Las Heras then bus or taxi (20 min). Admission: AR$100-300 depending on area. Racing schedule varies; check website. Betting requires small change. No photography in restricted areas.",c:[],r:"g",nn:"Hipódromo Argentino de Palermo",ns:"Pista de carreras más prestigiosa, dentro de parque urbano.",nst:"Carreras caballos raíces profundas cultura argentina. Arquitectura modernista temprano siglo 20. Tradición de apuestas.",nt:"Metro a Las Heras luego bus o taxi (20 min). Entrada: AR$100-300. Calendario carreras varía. Apuestas requieren cambio pequeño. Sin fotografía restringida."},
  {id:11,n:"Café Tortoni — historic cafe since 1858",a:"Monserrat",v:["history", "food", "local", "hidden"],d:60,s:"Argentina's oldest and most famous cafe, located on Avenida de Mayo, serving coffee and medialunas since 1858.",st:"Café Tortoni occupies a prime location on Avenida de Mayo, the grand avenue connecting Casa Rosada to Congress. The cafe is a historical institution; poets, writers, and intellectuals gathered here during the 20th century. The interior is preserved Belle Époque—ornate mirrors, wood paneling, chandeliers, waiters in formal attire. The ambiance is theatrical; you feel like you've entered a scene from a period film. The coffee is good though not exceptional; the real product is the atmosphere. The medialunas (croissants) are excellent. Sitting here, you participate in Buenos Aires' cultural mythology. The cafe is expensive and crowded with tourists, yet maintains authenticity through the consistency of the experience. Many visitors sit briefly then leave; locals sit for hours. The location is strategic; it's between major attractions.",im:"The ornate interior of Café Tortoni with aged mirrors and wood paneling, waiter in formal attire serving coffee, patrons at small marble-topped tables.",t:"Subway to Avenida de Mayo. Located at 825 Avenida de Mayo. Open daily 8 AM-midnight. Coffee AR$300-400. Photography allowed. Crowded at certain hours; quiet in early morning.",c:[],r:"g",nn:"Café Tortoni",ns:"Café histórico más famoso desde 1858, sirviendo café y medialunas.",nst:"Ubicación prima Avenida de Mayo. Institución histórica; poetas, escritores, intelectuales reunieron aquí. Interior Belle Époque preservado. Atmósfera teatral.",nt:"Metro a Avenida de Mayo. Ubicación 825 Avenida de Mayo. Abierto diario 8 pam-medianoche. Café AR$300-400. Fotografía permitida. Lleno ciertos horas."},
  {id:12,n:"Parque Tres de Febrero — urban park and recreation",a:"Palermo",v:["nature", "beautiful", "local", "hidden"],d:120,s:"A large urban park with lakes, gardens, cultural institutions, and recreational facilities.",st:"Parque Tres de Febrero (named for the date a political battle occurred) is Buenos Aires' main urban park. The park is extensive—350+ hectares—containing lakes, gardens, museums, restaurants. The design is naturalistic; pathways wind through landscapes suggesting wilderness despite urban surroundings. Rowers use the artificial lakes; joggers fill the paths; families picnic on the grass. The park hosts cultural institutions (museums, theaters) around its periphery. The design creates accessible nature in the city. I walked for hours discovering hidden features—baroque fountains, classical sculptures, botanical gardens. The park is simultaneously designed and natural-appearing; it's an artifact of landscape architecture. The surrounding Palermo neighborhood's transformation is partly justified by the park's presence. The park is accessible, welcoming, and well-maintained.",im:"A lake reflecting trees and sky, paths winding through cultivated gardens transitioning to wilder vegetation, urbanites enjoying recreational activities.",t:"Multiple subway stations provide access. Free entry. Open dawn to dusk. Multiple museums around perimeter charge separate admission. Restaurants throughout. Safe area with many people present.",c:[],r:"g",nn:"Parque Tres de Febrero",ns:"Parque urbano grande con lagos, jardines, instituciones culturales.",nst:"350+ hectáreas conteniendo lagos, jardines, museos, restaurantes. Diseño naturalista; senderos sugieren paisaje silvestre. Accesible naturaleza en ciudad.",nt:"Múltiples estaciones metro acceso. Entrada gratis. Abierto alba oscuridad. Museos cobran separadamente. Restaurantes. Área segura."},
  {id:13,n:"MALBA Museo Evita — museum dedicated to Eva Perón",a:"Palermo",v:["history", "hidden", "art"],d:90,s:"A museum in an elegant mansion dedicated to Eva Perón, Argentina's most iconic political figure.",st:"The museum occupies a mansion that once housed government offices. It's dedicated to Eva Perón (1919-1952), who rose from poverty to become the most politically influential woman in Argentina. The exhibits display photographs, clothing, documents, and personal items. The narrative is respectful but critical; the museum doesn't ignore controversies. Eva's legacy is complex—symbol of female political power and also tool of male authority. The museum's curation addresses these tensions. The mansion's interior is elegant; the display design is contemporary. I spent time with photographs tracing Eva's trajectory from actress to First Lady. Her influence persisted after death (her embalmed body was subject of bizarre treatment during the military dictatorship). The museum represents Argentina's engagement with its controversial recent history.",im:"Museum display with Eva Perón's personal items—shoes, jewelry, photographs—arranged on gallery walls with careful lighting and interpretation.",t:"Subway to Plaza Italia or Scalabrini Ortiz. Admission: AR$200. Open Tuesday-Sunday 10 AM-6 PM, closed Mondays. Guided tours available. Photography restrictions in some areas.",c:[],r:"g",nn:"Museo Evita",ns:"Museo en mansión dedicado a Eva Perón, figura icónica Argentina.",nst:"Ocupando mansión. Dedicado Eva Perón (1919-1952), mujer política influyente Argentina. Exhibe fotografías, ropa, documentos. Curaduría respetuosa pero crítica.",nt:"Metro a Plaza Italia o Scalabrini Ortiz. Entrada: AR$200. Martes-domingo 10 pam-6 pm. Tours disponibles. Restricciones fotografía algunas áreas."},
  {id:14,n:"Mercado de Abasto — historic market now shopping center",a:"Abasto",v:["history", "food", "local"],d:90,s:"A historic produce market converted into a modern shopping mall, preserving the original building's architecture.",st:"The Mercado de Abasto was Buenos Aires' primary produce market in the early 20th century. The original cast-iron and brick structure was built in 1893. When supermarkets replaced traditional markets, the building was adapted into a shopping center (1999). The adaptation preserved the original architecture while modernizing the interior. The result is hybrid—the facade and overall structure feel historic, but inside are contemporary retail chains and restaurants. The market was associated with the tango neighborhood; bandoneon (tango accordion) player Carlos Gardel was famously found dead here. The transformation represents Buenos Aires' evolution; traditional commerce was displaced by modern retail. Yet the building's preservation allows appreciation of historical architecture. The ground floor maintains some traditional flavor with food vendors. The shopping experience is thoroughly contemporary; any sense of 'market' is theatrical.",im:"The historic cast-iron and brick structure of the market hall, exterior view showing original architecture, modern storefronts visible through the archways.",t:"Subway to Abasto. Free entry (shopping and dining cost). Open daily 10 AM-10 PM. Multiple restaurants offer diverse cuisines. Parking available. Modern shopping experience with historic setting.",c:[],r:"g",nn:"Mercado de Abasto",ns:"Mercado histórico convertido centro compras, preservando arquitectura.",nst:"Mercado de productos histórico siglo temprano 20. Estructura hierro fundido y ladrillo construida 1893. Adaptado centro compras 1999, preservando arquitectura original.",nt:"Metro a Abasto. Entrada libre. Abierto diario 10 pam-10 pm. Restaurantes múltiples. Estacionamiento disponible. Experiencia compras moderna, ambiente histórico."},
  {id:15,n:"Basilica de Nuestra Señora de Luján — pilgrimage site outside capital",a:"Luján (outside Buenos Aires)",v:["religion", "history", "hidden"],d:180,s:"A major Marian pilgrimage site located 65 km west of Buenos Aires, visited by millions annually.",st:"The Basilica de Luján is the most visited pilgrimage site in Argentina. The Neo-Gothic basilica (completed 1935) is impressive in scale and proportion. The history involves a small statue of the Virgin Mary that allegedly worked miracles. Millions visit, particularly on the Feast of the Virgin (May 25). I went on a regular day; even then, crowds were substantial. The experience mixes religion and commerce—vendors sell religious items, food, flowers. The main basilica interior is vast and ornate. Side chapels accommodate specific devotions. The surrounding area has developed to accommodate pilgrims—hotels, restaurants, shops. It's a religious center but also a touristic destination. The journey to Luján (accessible by train or car) is part of the pilgrimage experience. The devotion is genuine but also about cultural tradition and family gathering.",im:"The Neo-Gothic basilica rising dramatically, its twin spires pointing skyward, crowds of pilgrims in the plaza before it, vendors selling candles and religious items.",t:"Train from Retiro station (2 hours) or drive (65 km west). Admission free. Open daily. Best visited weekdays to avoid crowds. May 25 is Feast day (massive crowds). Restaurants and hotels nearby.",c:[],r:"g",nn:"Basílica de Nuestra Señora de Luján",ns:"Sitio peregrinación Mariana visitado millones anualmente.",nst:"Sitio peregrinación más visitado Argentina. Basílica Neo-Gótica completada 1935. Historia implica estatua Virgen María milagros. Millones visitan, especialmente Fiesta Virgen (mayo 25).",nt:"Tren desde Retiro (2 horas) o auto (65 km). Entrada libre. Abierto diario. Semana mejor evitar multitudes. Mayo 25 día fiesta. Restaurantes y hoteles cercanos."},
  {id:16,n:"Museo Nacional de Antropología — Argentine cultures exhibited",a:"Parque Centenario (Flores neighborhood)",v:["history", "art", "hidden"],d:90,s:"A museum documenting Argentina's indigenous cultures and archaeological heritage.",st:"The museum occupies a building in the Flores neighborhood's Parque Centenario. The collections document indigenous peoples' presence in Argentine territory before and during Spanish colonization. The exhibits show artifacts—pottery, textiles, tools—organized by region and time period. The presentation emphasizes indigenous agency and cultural continuity despite colonial disruption. Argentina's historical narrative often downplays indigenous presence (unlike Peru or Bolivia); this museum corrects that omission. The collections are significant but the museum is understaffed and underfunded. The exhibits could be more engaging; presentation is traditional. Few tourists visit compared to major museums. The museum represents institutional commitment to recognizing Argentina's indigenous heritage, though implementation is modest. The park setting is pleasant; the museum is integrated into public green space.",im:"Museum display cases with indigenous artifacts arranged chronologically, pottery and textiles illuminated by gallery lighting, minimal crowds in quiet gallery space.",t:"Subway to Primera Junta, then bus or taxi. Admission: AR$200 (free Wednesdays). Open Tuesday-Sunday 1-7 PM, closed Mondays. Guided tours available. Photography allowed. Quiet, uncrowded experience.",c:[],r:"g",nn:"Museo Nacional de Antropología",ns:"Museo documentando culturas indígenas argentinas.",nst:"Ocupando edificio Parque Centenario. Colecciones documentan pueblos indígenas. Artifacts—cerámica, textiles, herramientas. Presenta agencia indígena.",nt:"Metro a Primera Junta luego bus o taxi. Entrada: AR$200 (libre miércoles). Martes-domingo 1-7 pm. Tours disponibles. Fotografía permitida. Tranquilo."},
  {id:17,n:"Caminito Street — tourist street in La Boca",a:"La Boca",v:["art", "local", "night"],d:75,s:"A famous touristy pedestrian street with restaurants, tango shows, and street performers.",st:"Caminito is the heart of La Boca tourism. The street was revitalized in the 1950s and 60s as a tourist destination. Every building is painted in brilliant colors; tango dancers perform; vendors sell crafts. The street feels performative—tourists and performers face each other. The experience is carefully curated entertainment. Yet the street maintains something authentic; the people working here are genuine, the cultural traditions are real (even if packaged). The restaurants line both sides; tango shows include dinner. The street is crowded during afternoon and evening. The photographs are iconic—the colorful buildings are among Buenos Aires' most-photographed sites. I felt simultaneously charmed and aware of the tourism machinery. The surrounding area is less touristy; just beyond Caminito, La Boca is a working neighborhood. The street represents how tourist zones are created and maintained.",im:"Caminito street lined with brilliant painted buildings, tango dancers in traditional dress performing on the pavement, crowds of tourists photographing the scene.",t:"Subway to La Boca. Free to walk; restaurants charge AR$2000-4000 for dinner and tango show. Day visits free; evening has better ambiance. Photography encouraged; expect crowds.",c:[],r:"g",nn:"Calle Caminito",ns:"Calle turística famosa con restaurantes, espectáculos tango.",nst:"Corazón turismo La Boca. Revitalizada 1950s-60s destino turística. Edificios pintados brillante; bailarines tango; vendedores artesanía. Experiencia cuidadosamente curada.",nt:"Metro a La Boca. Gratis caminar. Restaurantes AR$2000-4000 cena tango. Día visita gratis; noche mejor. Fotografía alentada; multitudes esperadas."},
  {id:18,n:"Iglesia de San Telmo — colonial church and neighborhood anchor",a:"San Telmo",v:["history", "architecture", "local", "hidden"],d:60,s:"A colonial church dating to 1735, anchoring the San Telmo neighborhood with baroque architecture.",st:"The Iglesia de San Telmo is one of Buenos Aires' oldest churches. The baroque architecture is modest compared to European exemplars but represents local achievement. The church interior is dim; light filters through colored glass windows creating contemplative atmosphere. The altarpiece is the focal point—ornate and gilded. The church remains actively used for worship. Sunday masses are attended by parishioners. The surrounding neighborhood organized itself around the church—the plaza before it (Plaza Dorrego) became the neighborhood's commercial and social center. The church preserves colonial-era Buenos Aires; its continued function integrates past into present. I attended evening mass and felt the continuity of worship across centuries. The church is free to visit; donations are appreciated. The location is strategic for understanding the neighborhood's history and character.",im:"The colonial facade of the church with baroque details, the interior illuminated dimly, worshippers seated in pews, the altarpiece gleaming with gilded decoration.",t:"Subway to San Telmo. Free entry. Open daily for prayer and worship. Mass times vary; check schedule. Photography allowed outside; restricted during services. Respectful dress expected.",c:[],r:"g",nn:"Iglesia de San Telmo",ns:"Iglesia colonial desde 1735, arquitectura barroca.",nst:"Una de las iglesias más antiguas. Arquitectura barroca modesta. Interior iglesia dimly iluminado. Permanece activamente usada adoración. Misa domingos asistida feligreses.",nt:"Metro a San Telmo. Entrada libre. Abierto diario. Horarios misa varían. Fotografía permitida exterior; restringida durante servicios. Vestimenta respetuosa."},
  {id:19,n:"Avenida 9 de Julio — widest avenue in the world",a:"Monserrat",v:["architecture", "beautiful", "local"],d:75,s:"The world's widest avenue, 140 meters across, stretching across Buenos Aires, named for the independence declaration date.",st:"Avenida 9 de Julio was carved through Buenos Aires in 1910 as a modern urban intervention. The width is extraordinary; it requires multiple minutes to cross. The avenue connects north to south, organizing the city's geography. The central median is a park-like strip. Buildings along the avenue represent different eras—some colonial survivors, many early 20th-century, modern additions continue. The avenue's function is both practical (traffic) and symbolic (modernity, progress). Walking along it feels like being in a grand urban space. The Obelisco sits at its intersection with Corrientes Avenue, the most prominent landmark. The avenue is photographically dramatic; its scale is visually impressive. The modern metropolis Brazil created its own avenue competition; Buenos Aires' remains iconic. The surrounding area is active—shops, restaurants, theaters.",im:"The impossibly wide avenue with traffic flowing in multiple directions, the Obelisco visible in distance, buildings rising on both sides, the median park visible.",t:"Subway to 9 de Julio (there are multiple stations along the avenue). Walking is primary experience. Multiple cafes and restaurants. Evening light emphasizes the scale. Best photographed from elevated vantage points.",c:[],r:"g",nn:"Avenida 9 de Julio",ns:"Avenida más ancha mundo, 140 metros, conecta norte a sur.",nst:"Tallada 1910 intervención urbana moderna. Amplitud extraordinaria; requiere minutos cruzar. Símbol modernidad, progreso. Obelisco ubicación intersección central.",nt:"Metro a 9 de Julio. Caminar experiencia principal. Múltiples cafés, restaurantes. Luz nocturna enfatiza escala. Mejor fotografiado vantage elevado."},
  {id:20,n:"Museo de la Ciudad — history of Buenos Aires",a:"San Telmo",v:["history", "hidden", "art"],d:75,s:"A museum documenting Buenos Aires' history from colonial times through the present.",st:"The Museo de la Ciudad (open since 1883, revamped in 2011) occupies a colonial-era building. The exhibits progress chronologically through Buenos Aires' development. Early galleries show indigenous peoples and Spanish colonization. Subsequent periods document the city's growth—from fortified settlement to economic powerhouse to metropolitan center. The exhibits include maps, photographs, artifacts, and artworks. The museum emphasizes ordinary life alongside major political events. The curatorial approach is inclusive; multiple narratives are presented. The building itself is historically significant—it was a private mansion, then government offices. The museum's interpretation guides visitors through understanding Buenos Aires' transformation. The collection is not particularly famous but is comprehensive and well-presented. Few tourists visit; most visitors are local students and residents.",im:"Museum gallery with photographs of Buenos Aires from different eras displayed chronologically, showing the city's transformation from colonial settlement to modern metropolis.",t:"Subway to San Telmo. Admission: AR$200 (free Wednesdays). Open Tuesday-Sunday 11 AM-7 PM, closed Mondays. Guided tours available. Photography allowed. Quiet, contemplative experience.",c:[],r:"g",nn:"Museo de la Ciudad",ns:"Museo documentando historia Buenos Aires.",nst:"Abierto desde 1883, reformado 2011. Ocupando edificio colonial. Exhibe progresan cronológicamente. Documentan desarrollo ciudad—de colonia a potencia económica.",nt:"Metro a San Telmo. Entrada: AR$200 (libre miércoles). Martes-domingo 11 pam-7 pm. Tours disponibles. Fotografía permitida. Tranquilo, contemplativo."},
  {id:21,n:"CENMA — art space in converted military building",a:"San Telmo",v:["art", "architecture", "hidden"],d:60,s:"An arts center and cultural space in a former military barracks, featuring exhibitions and cultural programming.",st:"CENMA occupies a building with military history—the Barracks of San Telmo. The conversion from military to cultural use represents Argentina's transition from dictatorship to democracy. The building's industrial architecture provides raw space for contemporary art. Exhibitions rotate; programming includes performances, workshops, and discussions. The space encourages experimental practice. The interior is deliberately minimalist—exposed brick, high ceilings, industrial lighting. The conversion preserves historical character while enabling contemporary use. I attended an exhibition exploring political memory; the raw space seemed appropriate for confronting difficult history. The organization is non-commercial; they prioritize artistic integrity over commercial success. The space feels genuinely committed to cultural work rather than tourism. The surrounding San Telmo neighborhood supports such institutions; there's an arts ecosystem present.",im:"An art gallery with contemporary installations in an exposed brick converted military barracks space, high industrial ceilings, minimalist aesthetic emphasizing the artwork.",t:"Subway to San Telmo. Free or low admission depending on programming. Hours vary by exhibition; check website. Photography restrictions may apply. Genuinely local arts experience.",c:[],r:"g",nn:"CENMA",ns:"Espacio arte en barracón militar convertido.",nst:"Ocupando Barracón San Telmo. Conversión de militar a uso cultural. Representa transición dictadura a democracia argentina. Arquitectura industrial, espacio bruto.",nt:"Metro a San Telmo. Entrada libre o baja. Horarios varían. Restricciones fotografía pueden aplicar. Experiencia artes genuinamente local."},
  {id:22,n:"Montserrat Neighborhood — colonial administrative center",a:"Monserrat",v:["history", "architecture", "local", "hidden"],d:90,s:"The city's original administrative center with colonial buildings and governmental institutions.",st:"Monserrat is where Buenos Aires began—the original colonial settlement. The neighborhood contains governmental buildings, historic churches, and old streets. Casa Rosada, Congress, and other major institutions are located here. The architecture ranges from colonial to early twentieth-century modernist. The neighborhood feels official and administrative; the scale is grand. Walking the streets, you traverse Buenos Aires' political geography. The surrounding areas have deteriorated economically; government flight to Recoleta and northern neighborhoods left Monserrat as somewhat abandoned administrative zone. Yet the institutions remain; the daily work of government happens here. The neighborhood is less touristy than San Telmo despite proximity. The scale is monumental; individual buildings dwarf human perspective. The neighborhood represents Buenos Aires' past power and present complexity.",im:"Grand neoclassical government buildings lining wide streets, colonial architecture visible alongside modern additions, administrative bustle visible through building windows.",t:"Subway to multiple stations in area. Free walking. Photography allowed. Area is safe during business hours; less so after dark. Evening light on official buildings is dramatic. Museums and government buildings have variable hours.",c:[],r:"g",nn:"Monserrat",ns:"Centro administrativo colonial original.",nst:"Donde Buenos Aires comenzó—colonia original. Contiene ediciones gubernamentales. Arquitectura colonial a modernista temprano siglo 20. Siente oficial.",nt:"Metro múltiples estaciones. Paseos libres. Fotografía permitida. Área segura horas negocio; menos noche. Luz nocturna edificios oficial dramática."},
  {id:23,n:"Lungomare cultural path — waterfront transformation",a:"Puerto Madero",v:["architecture", "beautiful", "hidden"],d:75,s:"A modern waterfront promenade created from former port infrastructure, representing urban regeneration.",st:"Puerto Madero was Buenos Aires' old port, abandoned and degraded after modern container facilities developed elsewhere. The waterfront was transformed into a recreational and cultural space. The Lungomare (waterfront path) stretches along the Rio de la Plata. The old port buildings were preserved as restaurants and cultural spaces. New bridges connect neighborhoods. Parks and plazas were created. The transformation is successful urban regeneration—converting obsolete infrastructure into vibrant public space. I walked the path at sunset; the light reflected off water and modern buildings created beautiful compositions. The experience is simultaneously nature (the river, the sky) and human construction (buildings, paths). The area attracts affluent users; it's become expensive and somewhat exclusive. The transformation represents Buenos Aires' capacity for reinvention. The view back toward the city shows Monserrat's architecture from new perspective.",im:"The waterfront promenade with the Rio de la Plata stretching beyond, modern buildings reflecting in the water, converted port structures now cultural venues, the city skyline visible.",t:"Subway to Acoyte or short taxi ride. Free access to paths. Restaurants and cafes throughout (high prices). Walking is primary activity. Sunset visits recommended. Photography friendly.",c:[],r:"g",nn:"Lungomare",ns:"Paseo costero moderno de infraestructura puertaria transformada.",nst:"Puerto Madero fue puerto viejo, abandonado. Waterfront transformado espacio recreativo cultural. Lungomare extiende Río de la Plata. Ediciones puerto preservadas restaurantes.",nt:"Metro a Acoyte o taxi. Acceso paseos gratis. Restaurantes, cafés (precios altos). Paseos actividad principal. Atardecer recomendado. Fotografía amigable."},
  {id:24,n:"National Library of Argentina — knowledge institution",a:"Recoleta",v:["architecture", "hidden", "art"],d:75,s:"A modern library building housing millions of books, representing Argentina's commitment to intellectual culture.",st:"The Biblioteca Nacional was rebuilt in the 1990s; the original building housed a presidential residence. The new structure is contemporary architecture—clean lines, significant use of glass and steel. The building houses millions of books and documents. The reading rooms are available to the public (registration required). The exhibitions showcase significant holdings. The architecture emphasizes transparency—the building itself is visible from outside; visitors can observe researchers working. The institution represents Argentina's self-understanding as a cultured nation. The surrounding park was converted to public space. The building is impressive without being monumental—it prioritizes function over grandeur. Tours are available and worthwhile. The collection's scope is extraordinary; it's one of the world's largest libraries. Few tourists visit; most users are students and scholars. The experience feels genuinely intellectual rather than touristic.",im:"The modern library building with extensive glass surfaces, visible bookshelves visible from outside, bright interior with natural light filtering through large windows.",t:"Subway to Congreso or Libertad. Free entry to public areas; reading rooms require registration. Open Monday-Friday 9 AM-8 PM, Saturday 11 AM-6 PM, closed Sundays. Tours available. Photography allowed in public areas.",c:[],r:"g",nn:"Biblioteca Nacional de Argentina",ns:"Institución conocimiento moderno, millones libros.",nst:"Reconstruida 1990s. Estructura arquitectura contemporánea—líneas limpias, vidrio y acero. Casa millones libros, documentos. Salas lectura disponibles públicas.",nt:"Metro a Congreso o Libertad. Entrada libre áreas públicas. Lunes-viernes 9 pam-8 pm. Tours disponibles. Fotografía permitida áreas públicas."},
  {id:25,n:"Estancia Guerrero — traditional cattle ranch experience",a:"Outside Buenos Aires",v:["local", "nature", "hidden"],d:240,s:"A traditional estancia (cattle ranch) outside Buenos Aires offering authentic gaucho experiences and asado meals.",st:"An estancia is an Argentine cattle ranch. The experience here includes riding horses, observing working gauchos, learning about ranching culture, and eating asado (grilled meat). The estancia is working ranch (not a museum). The landscape is flat pampas—stretching horizons, few trees, immense sky. Gauchos are skilled horsemen with distinctive clothing (bombachas, rebenque). The cultural traditions are real though somewhat performed for tourists. The asado meal is excellent—meat grilled over open fire, accompanied by wines. The experience is physically engaging; riding requires comfort with horses. The day trip from Buenos Aires is exhausting but rewarding. The estancia represents Argentine identity mythology—the gaucho as symbol of freedom and authentic Argentina. The landscape experience is profound; the pampa's vastness creates perspective.",im:"A gaucho on horseback silhouetted against flat pampas landscape, wide sky above, asado flames visible in distance, the ranch buildings in the background.",t:"Excursion from Buenos Aires (60+ km). Tours available through travel agencies (AR$1500-3000 including transportation, meal, activities). Day-long experience (7-8 hours). Bring sunscreen, appropriate clothing. Horse experience helpful but not required.",c:[],r:"g",nn:"Estancia Guerrero",ns:"Rancho ganadería tradicional ofrece experiencias gaucho auténtico.",nst:"Estancia es rancho ganadería argentina. Experiencia incluye caballos, gauchos, cultura ganadería, asado. Rancho trabajador (no museo). Paisaje pampas planas.",nt:"Excursión Buenos Aires (60+ km). Tours agencias viajes (AR$1500-3000). Experiencia día completo (7-8 horas). Protector solar, ropa apropiada. Experiencia caballo útil."},
  {id:26,n:"Museo Xul Solar — surrealist visionary artist",a:"San Telmo",v:["art", "hidden"],d:75,s:"A museum dedicated to Xul Solar, a visionary surrealist artist, in his converted house.",st:"Xul Solar (1887-1963) was a visionary artist creating surrealist works, invented scripts, musical instruments. The museum occupies his former house—a small building with narrow rooms. The interior preserves the artist's workspace; his paintings and inventions are displayed intimately. The artwork is extraordinary; the compositions blend mysticism, music, and visual form. Solar invented languages and instruments reflecting his synesthetic perception. The museum feels like entering an artist's mind. The scale is personal; this isn't a grand institution but a preserved workspace. Few tourists know about it; the experience is quiet and contemplative. The artist's legacy is significant but underappreciated outside Argentina. The museum represents how important artists can be locally embedded. The surrounding San Telmo neighborhood feels appropriate for an avant-garde artist's workspace.",im:"The artist's small studio space with paintings covering walls, invented instruments displayed, handwritten notes and sketches visible, intimate and cluttered with creative energy.",t:"Subway to San Telmo. Admission: AR$200. Open Tuesday-Friday 2-8 PM, Saturday 11 AM-8 PM, closed Sundays and Mondays. Guided tours by appointment. Photography allowed. Very quiet, few tourists.",c:[],r:"g",nn:"Museo Xul Solar",ns:"Museo dedicado artista surrealista visionaria, casa convertida.",nst:"Xul Solar (1887-1963) artista visionaria surrealista. Ocupando casa antigua—pequeño edición. Interior preserva espacio artista. Obra extraordinaria.",nt:"Metro a San Telmo. Entrada: AR$200. Martes-viernes 2-8 pm. Tours cita. Fotografía permitida. Tranquilo, pocos turistas."},
  {id:27,n:"La Noche de los Museos — city-wide art event",a:"City-wide",v:["art", "night", "local"],d:480,s:"An annual city-wide event where museums open at night with extended hours, performances, and special activities.",st:"La Noche de los Museos (Night of the Museums) occurs once yearly (typically October or November). Museums stay open late (often midnight or later), offer free admission, and host special events. The streets fill with people moving between institutions. Food vendors operate. Live music and performances happen throughout the city. The experience transforms museums from daytime experiences to evening social events. I attended years ago; the vibe was festive. Long lines formed at popular museums; smaller institutions were quieter. The event emphasizes culture as public good. It exposes people to museums they wouldn't normally visit. The night setting creates different lighting and atmosphere. The event requires planning; a map shows participating institutions. It's physically exhausting trying to visit multiple museums in one night, but rewarding. The cultural participation is impressive.",im:"City streets filled with people moving between museums at night, museum entrances brightly lit with crowds gathering, live performances and food vendors activating public space.",t:"Check tourism website for date and participating institutions (typically November). Free admission during event night. Plan route in advance. Comfortable shoes essential. Most museums participate. Celebration atmosphere; expect crowds.",c:[],r:"g",nn:"La Noche de los Museos",ns:"Evento anual ciudad-amplio noche museos abiertos.",nst:"Ocurre anualmente (típicamente octubre o noviembre). Museos abiertos tarde (usualmente medianoche). Oferecen entrada gratis, eventos especiales. Calles llenan gente.",nt:"Chequea página turismo fecha, instituciones (típicamente noviembre). Entrada gratis evento. Planifica ruta avanzado. Zapatos cómodos. Mayoría participa."},
  {id:28,n:"Estádio La Bombonera — football temple",a:"La Boca",v:["local", "history", "hidden"],d:120,s:"Home of Boca Juniors football club, one of Argentina's most successful and passionate sports institutions.",st:"La Bombonera (The Bonbon Box—nickname for the stadium's shape) is one of the world's most intense football experiences. The stadium's location in La Boca reinforces the working-class identity. Boca Juniors fans are notoriously passionate; the atmosphere during matches is electric. Tours of the stadium are available on non-match days; match day experiences are transformative but challenging (crowds, intensity, security concerns). The stadium's history is long; it's hosted countless memorable matches. The club's rivalry with River Plate is one of sports' greatest (Superclásico). The surrounding area fills with fans before matches; the energy is palpable. I attended a match and was overwhelmed by noise, passion, and collective emotion. The football culture in Argentina is profound—it's not merely sport but identity. The stadium tour shows dressing rooms, pitch, trophy rooms. Photography during matches is challenging due to crowds and security.",im:"The iconic stadium shape filled with blue and gold fans creating tifo displays, the pitch visible below, the noise and energy visually almost tangible.",t:"Subway to La Boca. Tours available on non-match days: AR$300-500. Match days require tickets (AR$500-5000+ depending on seating, opposition). Security is strict during matches. Arrive early. Avoid traveling alone; group travel safer.",c:[],r:"g",nn:"Estadio La Bombonera",ns:"Hogar club fútbol Boca Juniors, institucion deportiva apasionada.",nst:"Nickname 'Bonbon Box'—forma estadio. Ubicación La Boca refuerza identidad clase trabajadora. Fans notoriamente apasionados. Atmosfera durante partidos eléctrica.",nt:"Metro a La Boca. Tours no-partido días: AR$300-500. Días partido requiere entradas (AR$500-5000+). Seguridad estricta. Llega temprano. Evita viajar solo."},
  {id:29,n:"Corrientes Avenue — theater district and cultural strip",a:"Monserrat",v:["history", "local", "art", "night"],d:90,s:"A major avenue famous for theaters, cinemas, bookstores, and late-night restaurants and bars.",st:"Avenida Corrientes is Buenos Aires' cultural artery. Theater concentrates here; multiple venues host everything from commercial productions to avant-garde experimental work. Bookstores (many independent) line the avenue. Cinemas show international and Argentine films. Late-night restaurants and bars cater to theater-goers and night workers. The avenue fills after sunset; people move between venues. The energy is intellectual and social. The avenue has declined somewhat from its mid-20th-century heyday but maintains cultural significance. It's a place to experience Buenos Aires' cultural life. The surrounding neighborhood is commercial rather than residential; it activates at night. Walking the avenue, you encounter performance posters, bookstore windows, restaurant menus. It's simultaneously commercial and genuinely cultural.",im:"Corrientes Avenue at night with theater marquees glowing, crowds moving between venues, bookstore windows illuminated, the avenue alive with cultural activity.",t:"Subway to multiple stations along avenue. Free walking. Theater tickets AR$500-2000 depending on venue and production. Cinema tickets AR$400-600. Restaurants and bars throughout. Safest in groups, evening hours.",c:[],r:"g",nn:"Avenida Corrientes",ns:"Avenida principal famosa teatros, cines, librerías.",nst:"Arteria cultural Buenos Aires. Teatro concentra aquí; múltiples lugares. Librerías (muchas independientes) linean avenida. Cines películas. Restaurantes, bares tardío.",nt:"Metro múltiples estaciones. Paseos libres. Entradas teatro AR$500-2000. Cine AR$400-600. Restaurantes, bares. Seguro grupos, horas nocturnas."},
  {id:30,n:"Piazzolla Museum — tango composer's life and works",a:"San Telmo",v:["music", "history", "hidden", "art"],d:60,s:"A museum dedicated to Astor Piazzolla, the revolutionary tango musician who transformed the genre.",st:"Astor Piazzolla (1921-1992) revolutionized tango, infusing it with jazz harmonies and contemporary sensibilities. The museum occupies a small space and displays photographs, instruments, recordings, documents. The exhibits trace Piazzolla's evolution from traditional tango through classical training to his fusion innovations. Listening stations allow experiencing his compositions. The museum feels intimate—his life is presented through personal objects. Piazzolla's legacy is profound in Argentina; he's simultaneously beloved for innovation and critiqued for moving away from traditional forms. The museum presents a balanced view. The surrounding San Telmo neighborhood is appropriate for a tango musician's memorial. Few tourists visit; most visitors are music lovers and students. The museum represents how a single artist can transform an entire cultural form.",im:"A museum display with Piazzolla's violin, photographs from different periods of his life, sheet music, and a listening station where his compositions can be heard.",t:"Subway to San Telmo. Admission: AR$200. Open Monday-Friday 3-8 PM, Saturday 2-8 PM, closed Sundays. Guided tours available (Spanish and English). Photography allowed. Quiet, contemplative experience.",c:[],r:"g",nn:"Museo Piazzolla",ns:"Museo dedicado Astor Piazzolla, músico tango revolucionario.",nst:"Astor Piazzolla (1921-1992) revolucionó tango, infundió armonías jazz. Museo ocupando espacio pequeño. Exhibe fotografías, instrumentos, grabaciones. Legado profundo Argentina.",nt:"Metro a San Telmo. Entrada: AR$200. Lunes-viernes 3-8 pm. Tours disponibles (español e inglés). Fotografía permitida. Tranquilo, contemplativo."}
,
  {id:31,n:"Tango Show at Piazzolla — Living Tradition",a:"San Telmo",v:["cultural","greatest_hits","local"],d:15,s:"Tango is Buenos Aires' identity—a real show where dancers and musicians perform the dance that defines the city.",st:"Tango shows exist throughout BA, but Piazzolla is one of the best. Real dancers, real musicians, the energy is genuine.",im:"Inside a dimly lit venue. Dancers in embrace. The violin playing. The emotion in movement. Couples watching. The history of the city in motion.",t:"Book in advance online or through your hotel. Entry 90–150 ARS including drinks. Shows nightly 9:30pm and 11:30pm. Dinner packages available. Respectful dress.",c:["cultural","greatest_hits"],r:"g",nn:"Tango Show Piazzolla",ns:"Tango show where dancers and musicians perform the dance that defines the city.",nst:"Tango is Buenos Aires' identity. Piazzolla is one of the best venues.",nt:"Book in advance. Entry 90–150 ARS including drinks. Shows nightly 9:30pm and 11:30pm."},
  {id:32,n:"La Boca Neighbourhood — Colorful Houses and History",a:"La Boca",v:["neighborhoods","colorful","greatest_hits"],d:15,s:"La Boca is where Buenos Aires was born as a port—the buildings are painted bright colors, the streets are cobbled, and locals still live here despite tourism.",st:"La Boca is the historic neighbourhood where immigrants and traders built the city. The buildings are intentionally colourful and charming.",im:"Walking a street. Bright painted houses. Red, yellow, blue. Cobblestones. A cafe spilling onto street. The smell of the river.",t:"Walk around Caminito Street (famous cobblestone street). It's touristy but authentic. Cafes and tango venues throughout. Go morning for fewer crowds. Allow 1–2 hours.",c:["neighborhoods","greatest_hits"],r:"g",nn:"La Boca",ns:"Neighborhood where Buenos Aires was born as a port with colorful houses.",nst:"La Boca is the historic neighborhood.",nt:"Walk around Caminito Street. Go morning for fewer crowds."},
  {id:33,n:"Parque Centenario — Sunday Market and Green Space",a:"Caballito",v:["parks","markets","local"],d:25,s:"On Sunday mornings, Parque Centenario fills with locals—craft markets, food vendors, tai chi groups, and the park is alive in a way that feels completely genuine.",st:"Parque Centenario is a large park in the Caballito neighbourhood. On Sundays, markets, exercise classes, and locals fill the space.",im:"The park on Sunday morning. A market under trees. People exercising. Families. Vendors calling. The smell of coffee and bread. The city energy.",t:"Go Sunday morning 9am–2pm. Take Metro to Primera Junta. Markets are free to walk through. Street food cheap (5–10 ARS). Allow 2–3 hours.",c:["parks","markets","local"],r:"g",nn:"Parque Centenario",ns:"Sunday market and park where locals gather.",nst:"Parque Centenario on Sundays fills with locals.",nt:"Go Sunday morning 9am–2pm. Take Metro to Primera Junta."},

if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Buenos Aires Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Buenos Aires Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
