return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length),{id:45,n:"La Glorieta de Belgrano — free outdoor milonga under the gazebo",a:"Belgrano",v:["free entry", "local", "beautiful"],d:45,s:"Saturday nights, locals dance tango outdoors in a historic gazebo while strangers watch like it's a natural wonder.",st:"Around 9pm on Saturdays, the accordion player sets up near the gazebo in Belgrano, and couples start appearing—not tourists, just neighbors who grew up dancing. The pavement is uneven, the light comes from old street lamps. Someone brings a small radio for backup. An old woman sitting on a bench hums along, having watched this spot for 40 years. By midnight, there's a small crowd creating a natural dance floor. It feels like time moved slowly here.",im:"Two strangers from different blocks moving perfectly together under golden street light, worn cobblestones, the weight of real tango with no audience.",t:"Subte D to Belgrano, exits near Plaza Belgrano. Saturday 9pm-midnight. Free. Go early to find a spot, bring a sweater—nights get cool.",c:[],r:"g",nn:"La Glorieta de Belgrano — milonga al aire libre",ns:"Sábados, tango gratis bajo la glorieta, vecinos bailan como si nadie mirara.",nst:"Alrededor de las 9pm los sábados, el acordeonista se pone cerca de la glorieta y aparecen parejas—gente del barrio nada más. Luz de faroles viejos. A la medianoche hay una multitud natural. Se siente como si el tiempo aquí se moviera lentamente.",nt:"Subte D a Belgrano. Sábados 9pm-medianoche. Gratis. Llega temprano, traé abrigo."},{id:46,n:"Mercado de Pulgas de San Telmo — vinyl, vintage, and Sunday chaos",a:"San Telmo",v:["hidden", "weird", "local"],d:60,s:"Sundays, the entire neighborhood becomes a flea market where locals hunt for decades-old vinyl records and broken-in leather jackets.",st:"Parque Rivadavia fills with vinyl vendors on Sunday mornings. Real collectors dig through stacks of 1970s tango records while street musicians play three different melodies at once. The air smells like old dust and turpentine. You'll find a postcard from 1955, a typewriter that still works, a mirror frame with baroque angels falling off. Vendors sit behind their wares like they're guarding memories. Coffee carts sell small bitter coffees and medialunas.",im:"Fingers flipping through plastic sleeves, finding an exact record you didn't know you needed, bargaining in rapid Spanish, the smell of decades.",t:"Subte A to San Telmo. Sundays 10am-5pm. Free to browse, haggle for prices (expect to pay AR$50-500 per item). Bring cash.",c:[],r:"g",nn:"Mercado de Pulgas de San Telmo — vinilos y caos dominical",ns:"Domingos, el barrio se vuelve un mercado de pulgas. Buscadores de vinilos viejos y chaquetas de cuero.",nst:"Domingos llena el Parque Rivadavia con vendedores de vinilos. Coleccionistas verdaderos cavan a través de pilas de discos de tango 70s mientras músicos callejeros tocan tres melodías a la vez. Huele a polvo viejo y trementina.",nt:"Subte A a San Telmo. Domingos 10am-5pm. Gratis mirar, regatear (esperá AR$50-500). Efectivo."},{id:47,n:"Centro Cultural Recoleta — free exhibitions and tucked-away cafe",a:"Recoleta",v:["free entry", "beautiful", "quiet"],d:75,s:"A sprawling cultural center with rotating contemporary art, a hidden courtyard cafe, and the kind of silence museums should have.",st:"Walking into CCR feels like stepping into someone's private gallery. The exhibitions change monthly—sometimes raw installations, sometimes video art that makes you uncomfortable in good ways. The courtyard in the back has a cafe where artists and students drink coffee for hours. Afternoon light falls through old wooden beams. You might hear someone's thesis being rehearsed aloud. The bathrooms are cleaner than anywhere else in the city.",im:"Sunlight cutting through skylights, old wooden floorboards, the hum of a city you forgot was outside.",t:"Subte D to Recoleta, walk toward Av. Alvear. Tues-Fri 2pm-8pm, Sat-Sun 11am-8pm. Free. Cafe inside accepts cards.",c:[],r:"g",nn:"Centro Cultural Recoleta — arte gratis y silencio real",ns:"Exposiciones rotativas, patio escondido. El silencio que los museos deberían tener.",nst:"Entrar al CCR se siente como pisar una galería privada. Exposiciones cada mes—instalaciones crudas, a veces video art incómodo. El patio tiene un cafe donde artistas beben café por horas.",nt:"Subte D a Recoleta. Mar-Vie 2-8pm, Sab-Dom 11-8pm. Gratis. Cafe con tarjeta."},{id:48,n:"Librería del Pasaje — century-old bookshop in an alley",a:"San Telmo",v:["history", "quiet", "beautiful"],d:45,s:"A maze of shelves tucked inside a colonial-era passageway, where the owner knows every book's history better than you know your own.",st:"Pasaje del Correo is a hidden cobblestone alley built in the 1920s. Inside, Librería del Pasaje occupies what was once a family home. The owner, who's been there 25 years, remembers everyone who's ever bought a book. Shelves are crammed floor to ceiling with first editions, some falling apart, some pristine. Books on tango history, poetry by dead poets, novels with marginalia from previous readers. It smells like aged paper and the kind of dust that means care. You could hide there for hours.",im:"Slanted shelves under low wooden ceilings, books organized by some personal logic, the owner's reading glasses on a stack of manuscripts.",t:"Subte A to San Telmo. Walk toward Bolívar and turn down Pasaje del Correo. Wed-Sun 11am-7pm. Cards accepted, but prefer cash.",c:[],r:"g",nn:"Librería del Pasaje — librería centenaria en pasaje",ns:"Dédalo de estantes en pasaje colonial, donde el dueño sabe más que vos.",nst:"Pasaje del Correo es un callejón adoquinado escondido. La librería ocupa lo que fue una casa familiar. El dueño, 25 años ahí, recuerda cada cliente. Estantes repletos de primeras ediciones, libros descascarados y pristinos.",nt:"Subte A a San Telmo. Mira hacia Bolívar, gira a Pasaje del Correo. Mie-Dom 11-7pm. Tarjetas, prefieren efectivo."},{id:49,n:"Costanera Sur Ecological Reserve — where the city ends and the city forgets",a:"Costanera Sur",v:["free entry", "hidden", "beautiful"],d:60,s:"A wetland nature reserve 15 minutes from downtown where locals birdwatch and joggers disappear into reeds like they're escaping something.",st:"Few porteños know this reserve exists. It's 350 hectares of marshland, lagoons, and restored wetland literally adjacent to Puerto Madero's glass towers. You can see both worlds here—herons fishing while cranes are building downtown. The path is long, quiet, and shaded. On weekends, maybe a dozen people max. The air is cleaner. You hear water lapping, birds calling, wind through reeds. It feels like BA's secret lung. Bring binoculars; the birdwatching is serious.",im:"Wooden boardwalk disappearing into green-brown water, the sound of a bird you can't identify, the skyline forgotten.",t:"Subte A or B to Constitución, then bus 33 to Costanera Sur. Or bike via the Costanera path. 9am-sunset. Free. Bring water.",c:[],r:"g",nn:"Reserva Ecológica Costanera Sur — donde la ciudad termina",ns:"Humedales 15 minutos del centro donde locales observan pájaros.",nst:"Pocos porteños saben que existe. 350 hectáreas de marisma y lagunas restauradas. Puedes ver dos mundos—garzas pescando mientras grúas construyen. El camino es largo, silencioso. Aire más limpio.",nt:"Subte A o B a Constitución, colectivo 33. O bici por la Costanera. 9am-atardecer. Gratis. Agua."},{id:50,n:"Villa Crespo Street Art Collective — muralists' neighborhood before it's too late",a:"Villa Crespo",v:["weird", "hidden", "beautiful"],d:90,s:"A neighborhood just beyond Palermo that hasn't Palermo-fied yet—still has muralists, dive bars, and a palpable sense of artists choosing to be here.",st:"Walk Humboldt, Niceto Vega, and Jalapeño streets at dawn or dusk. The murals are dense, enormous, and often being painted by the artist while you watch. Coffee shops serve real cortados to regulars only. A record store owner shares vinyl with customers for free. Galleries open in living rooms. The barrio still feels like something is happening here, not like something happened. The gentrification wave is coming—you can feel it—but Villa Crespo isn't there yet. It still smells like paint, diesel, and fresh bread.",im:"A three-story woman's face being completed on a wall by someone in a gas mask, the smell of spray paint, neighbors watching like it's normal.",t:"Subte D to Dorrego or Malabia. Get lost between Humboldt and Jalapeño. Free. Best at sunrise or sunset. Cafes around AR$30.",c:[],r:"g",nn:"Villa Crespo — colectivo de artistas street art",ns:"Barrio justo antes de plamermizarse. Muralistas, bares de mala muerte, artistas eligiendo estar aquí.",nst:"Camina Humboldt, Niceto Vega, y Jalapeño al amanecer o atardecer. Murales enormes, a veces siendo pintados. Cafes de cortado real. Una discoteca comparte vinilos gratis.",nt:"Subte D a Dorrego o Malabia. Pierdate entre Humboldt y Jalapeño. Gratis. Mejor amanecer/atardecer. Cafes AR$30."},{id:51,n:"Almacén de Tango — dive bar where real musicians drink",a:"Almagro",v:["local", "weird", "history"],d:60,s:"A basement bar where tango musicians go after their gigs to drink with people who actually get it.",st:"Almacén de Tango is below street level, accessed by descending worn stairs into dim light. The owner's been there 30 years, knows every regular by their drink order. The walls are covered with signed photos of musicians from the 1970s onward. A piano sits in the corner, rarely touched, always ready. The bartender makes drinks nobody orders elsewhere. Conversation is in rapid Spanish between musicians debating tempo. On random nights, someone pulls out a guitar and plays for 20 minutes, then leaves. The bathroom hasn't been updated since 1995, but it's clean. The air is thick with cigarette smoke and history.",im:"Red neon sign barely visible from street level, stairs descending, the muffled sound of a world below.",t:"Subte A to Medrano, walk toward Almagro. Open Wed-Sun 8pm-late. Drinks AR$80-150. Cash preferred.",c:[],r:"g",nn:"Almacén de Tango — bar sótano de músicos reales",ns:"Sótano donde músicos de tango beben después de tocar.",nst:"Bajo tierra, acceso por escaleras gastadas. El dueño 30 años. Paredes con fotos firmadas de músicos 70s en adelante. Piano en la esquina, raramente tocado, siempre listo.",nt:"Subte A a Medrano, camina a Almagro. Mie-Dom 8pm. Tragos AR$80-150. Efectivo."},{id:52,n:"Floresta Market Strip — micro-barrio's cobbled heart",a:"Floresta",v:["local", "free entry", "quiet"],d:30,s:"Two blocks of Avellaneda Street where Korean restaurants, vintage shops, and fruit vendors create unexpected harmony.",st:"Floresta is small, densely packed, and feels like it was designed by accident rather than planning. Avellaneda Street is the spine—Korean restaurants with handwritten menus sit next to fruit carts and a fabric store run by an old couple. The Vietnamese cafe is always half-full with construction workers. A vintage shop owner finds pieces in estate sales and sells them to people who actually remember their era. The bodega smells like floor wax and fresh produce. Nobody speaks English, everyone's in a hurry, nothing is expensive. It feels like a neighborhood that hasn't noticed the city changed around it.",im:"Narrow sidewalk crowded with shopping bags, smells of kimchi and overripe peaches, awnings blocking the harsh sun.",t:"Subte B to Flores. Walk Avellaneda north. Mon-Sat 10am-7pm. Free. Restaurants AR$100-200 per meal.",c:[],r:"g",nn:"Floresta Strip de Avellaneda — corazón micro-barrio",ns:"Dos cuadras donde restaurantes coreanos y puestos de fruta conviven.",nst:"Floresta es pequeño, denso, diseñado por accidente. Avellaneda es la espina—restaurantes coreanos con menús manuscritos junto a puestos de fruta. Una tienda vintage donde el dueño encuentra piezas en remates.",nt:"Subte B a Flores. Camina Avellaneda norte. Lun-Sab 10-7pm. Gratis. Restaurantes AR$100-200."},{id:53,n:"Centro Cultural General San Martín — free shows, always something",a:"San Martín",v:["free entry", "beautiful", "quiet"],d:120,s:"A massive cultural complex from the 1960s with perpetual exhibitions, theater rehearsals you can watch, and a sense of culture as public right.",st:"The building itself is a statement—brutalist, monumental, sitting on Av. Corrientes like a guardian. Inside, corridors are lined with posters for next week's shows, rehearsals happening behind glass, artists building installations in hallways. The theater has permanent free exhibitions. You can wander for three hours and never see the same corner twice. The cafe is cheap and full of real people—dancers, musicians, artists between gigs, unemployed philosophers. The bathrooms have art in them. It feels like a city that believed culture was essential.",im:"Tall brutalist columns, a rehearsal space visible through glass with dancers mid-leap, the echo of footsteps on concrete.",t:"Subte B or D to Corrientes. Walk Av. Corrientes west toward the building. Tues-Sun 10am-8pm. Free entry. Shows vary, some free, some AR$100-300.",c:[],r:"g",nn:"Centro Cultural General San Martín — espectáculos gratis",ns:"Complejo masivo 1960s, siempre algo. Exposiciones libres, ensayos visibles.",nst:"El edificio es una declaración—brutalista, monumental. Pasillos revestidos de afiches. Puedes caminar tres horas sin ver la misma esquina. Cafe barato, gente real.",nt:"Subte B o D a Corrientes. Mar-Dom 10-8pm. Entrada libre. Espectáculos varían, algunos gratis."},{id:54,n:"Calle de las Librerías Antiguas — book valley under the radar",a:"San Telmo",v:["history", "quiet", "hidden"],d:75,s:"Three antique bookshops compressed into a few blocks where collectors hunt and obsessives disappear for hours.",st:"Bolívar, Perú, and Defensa streets converge here, and antiquarian bookshops cluster like they planned it. Each shop is different—one specializes in illustrated editions of gaucho literature, one in signed books, one in scientific texts from the 1800s. Shop owners are serious people. They know their inventory by memory. The smell is consistent across all three: old leather, aged paper, dust that means preservation. Sunlight is low and golden. Other customers look like they haven't been outside in days. You'll find a book you didn't know existed, priced at AR$200-2000 depending on rarity. Conversations are whispered.",im:"A leather-bound first edition with gilt lettering, pages yellowed perfect, a price tag handwritten on a weathered card.",t:"Subte A to San Telmo. Walk toward Bolívar-Perú intersection. Tues-Sun 11am-6pm. Cards accepted, some prefer cash.",c:[],r:"g",nn:"Calle de Librerías Antiguas — valle de libros",ns:"Tres librerías anticuarias donde coleccionistas buscan y obsesivos desaparecen.",nst:"Bolívar, Perú, y Defensa convergen aquí. Cada tienda diferente—una especializada en ediciones ilustradas de literatura gaucha, otra en libros firmados. Dueños serios, saben inventario de memoria.",nt:"Subte A a San Telmo. Camina a intersección Bolívar-Perú. Mar-Dom 11-6pm. Tarjetas aceptadas."},{id:55,n:"Café Tortoni Backroom — café where tango poets actually wrote",a:"San Telmo",v:["history", "local", "beautiful"],d:45,s:"The rear patio of a landmark cafe where Argentine poets and tango musicians spent decades in productive argument.",st:"Café Tortoni's front room is a museum, full of tourists. The backroom is real. Order a cortado at the counter, ask to sit in back, and you're in a patio garden that time forgot. Tables are small, marble-topped, seats are wooden and worn. The walls have mirror panels that reflect afternoon light in specific ways. The air tastes like espresso and the past. Old men read newspapers. Couples sit in silence. A waitress who's been there 20 years brings coffee without asking. This was where poets came to argue about meter and meaning. Gardel might have sat at this exact table. The feeling is unmistakable.",im:"Afternoon light on marble, worn wood creaking under weight, the ghost of a conversation about verse.",t:"Subte A or D to Avenida de Mayo. Café Tortoni at Av. de Mayo 825. Ask for the backroom. Daily 10am-9pm. Cortado AR$50, coffee AR$60.",c:[],r:"g",nn:"Café Tortoni Salón Trasero — café donde poetas escribieron",ns:"Patio trasero donde poetas de tango pasaron décadas en disputa productiva.",nst:"El salón frontal es museo. El trasero es real. Patio jardín que olvidó el tiempo. Mesas pequeñas, mármol, sillas gastadas. Mesera 20 años, trae café sin preguntar.",nt:"Subte A o D a Avenida de Mayo. Café Tortoni 825. Pidé el salón trasero. Diarios 10-9pm. Cortado AR$50."},{id:56,n:"Usina del Arte — art from everything, everywhere, free",a:"La Boca",v:["free entry", "weird", "beautiful"],d:90,s:"An abandoned power plant converted into a sprawling multidisciplinary cultural center where experimental theater, dance, and visual art happen simultaneously.",st:"Usina del Arte (Art Plant) is raw, unpolished, and intentional about it. A former electrical generation plant was transformed but not sanitized. Industrial elements remain—exposed brick, old machinery, the weight of what used to happen here. Multiple performance spaces host simultaneous events; you can wander from a dance piece to video art to live music without leaving the building. The curation feels curated by humans, not committees. Exhibitions rotate constantly. The cafe is cheap. The bathrooms are art. The whole place feels like a giant middle finger to commercial art spaces. Entrance is free for exhibitions; performances cost AR$100-300.",im:"Exposed pipes and beams, a massive stage in an old turbine room, light coming through industrial windows.",t:"Subte C to La Boca, walk toward Av. Almirante Brown. Wed-Sun 11am-8pm. Free for galleries, shows AR$100-300. Cards accepted.",c:[],r:"g",nn:"Usina del Arte — arte de todo, gratis",ns:"Planta eléctrica abandonada convertida en centro cultural multidisciplinario.",nst:"Crudo, sin pulir e intencional. Planta eléctrica transformada sin sanitizar. Elementos industriales permanecen. Espacios simultáneos con eventos diferentes.",nt:"Subte C a La Boca. Mie-Dom 11-8pm. Galerías gratis, shows AR$100-300. Tarjetas."}];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Buenos Aires Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Buenos Aires Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
