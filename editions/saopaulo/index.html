  {id:45,n:"Ibirapuera Park — Massive Urban Green Space",a:"Vila Mariana",v:["beautiful"],d:30,s:"Massive 151-hectare park with museums, theaters, gardens, and native Atlantic rainforest — São Paulo\'s lungs",st:"Walk through the park. The Obelisk is the symbol. There are museums, theaters, playgrounds, and gardens. The native forest is being restored. At 3,000 meters of paths, you could spend a full day here. Early mornings are peaceful; afternoons are crowded with families.",im:"The Obelisk monument. Parkland and lakes. Families and couples. The forest canopy. The city noise fading. The sense of green space in an urban jungle. Dogs, picnics, and people.",t:"Free to walk. Vila Mariana location (south of center, easily accessible). Best 6am-10am (peaceful) or weekend afternoons (family activities). Museums inside have separate fees. The park is constantly busy; it\'s a true public space. Bring water and sunscreen. This is São Paulo\'s greatest escape.",c:["greatest_hits"],r:"g",nn:"Parque Ibirapuera",ns:"Ibirapuera Park — Parque Ibirapuera Espaço Verde Urbano Gigante",nst:"Caminhe pelo parque. O Obelisco é o símbolo.",nt:"Grátis. Vila Mariana. Melhor 6-10 ou fins de semana."},
  {id:46,n:"Mercado Municipal — Food Market and Street Food",a:"Centro",v:["beautiful"],d:30,s:"Historic public market (since 1933) — vendors, lunch counters, and the famous X-tudo sandwich",st:"Enter this cavernous market filled with fruit, meat, and vegetable vendors. The lunch counter serves São Paulo specialties. The X-tudo (everything sandwich) is the signature item. Watch the vendors skillfully cut and prepare food. The energy is intense. This is where São Paulo eats.",im:"Stalls piled with tropical fruit. Meat hanging. The lunch counter action. The X-tudo sandwich being assembled. The smell of fresh food. The organized chaos of a working market. The mix of tourists and locals at lunch counter.",t:"Free to walk. Entry for food costs money. Centro location (accessible via metro). Lunch 11am-2pm is when it\'s most active. Budget 30-50 BRL for a meal. The X-tudo is legendary. Photography allowed. This is the authentic market experience.",c:["greatest_hits"],r:"g",nn:"Mercado Municipal",ns:"Mercado Municipal — Mercado Público e Rua de Comida",nst:"Entre neste mercado cavernoso cheio de vendedores de frutas, carne e vegetais.",nt:"Grátis para caminhar. Almoço 11-14."},
  {id:47,n:"Vila Madalena Street Art District — Urban Art Hub",a:"Vila Madalena",v:["beautiful"],d:30,s:"Bohemian neighborhood with street art murals, galleries, cafés, and artistic energy — São Paulo\'s creative quarter",st:"Walk the streets and see massive murals covering buildings. Artists from around the world have painted here. Galleries and small shops line the streets. Cafés and restaurants are excellent. The neighborhood is creative and welcoming. It\'s an active art scene, not a museum.",im:"Massive colorful murals on walls. Street art signatures and tags. Galleries with open doors. Young people in cafés. The bohemian vibe. The energy of creation and community.",t:"Free to walk. Vila Madalena area (30 minutes from center). Best 10am-6pm (galleries and shops open). Cafés and restaurants abundant. Photography is excellent and encouraged. There\'s no tourist trap feeling; it\'s genuinely creative. Spend a day exploring and eating.",c:["greatest_hits"],r:"g",nn:"Vila Madalena",ns:"Bairro Vila Madalena — Distrito de Arte de Rua Urbana",nst:"Caminhe pelas ruas e veja murais gigantescos cobrindo prédios.",nt:"Grátis. Vila Madalena. Melhor 10-18."}];

  {id:1,title:"Museums and Culture: S\u00e3o Paulo's Artistic Wealth",desc:"Experience S\u00e3o Paulo's museum scene. Visit MASP for revolutionary architecture and Latin American art. Explore Pinacoteca for Brazilian art history. Visit Instituto Tomie Ohtake for contemporary practice. See how museums shape cultural identity.",places:[1, 2, 8],time:"5 hours"},

{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — São Paulo Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
