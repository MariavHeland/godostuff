<script>
const P = [{id:1,n:"MASP — Latin America's greatest art museum",a:"Avenida Paulista",v:["art","architecture","beautiful"],d:120,s:"A revolutionary modernist museum suspended above a public plaza, housing Latin America's most important art collection.",st:"The Museu de Arte de São Paulo (MASP) is architecturally revolutionary—a massive red building appears to float above its supporting columns, creating a public plaza beneath. The architect Lina Bo Bardi designed the building (completed 1968) to democratize art—the plaza below provides free public space; the museum above is equally accessible to all economic classes. The collection emphasizes Brazilian and Latin American art. The wooden 'cavaletes' (easels) that display paintings were designed by Bardi to rotate, allowing viewing from both sides. The exhibitions change frequently. The building's structure and the art's presentation emphasize intellectual access over aesthetic elitism. I spent hours viewing paintings and feeling the democratic ethos. The surrounding Avenida Paulista is São Paulo's cultural spine.",im:"The massive red modernist MASP building floating above public plaza, the clean architectural lines emphasizing open space, sunlight creating dramatic shadows.",t:"Metro to Brigadeiro. Admission: R$40-60. Open Tuesday-Sunday 10 AM-6 PM, extended hours on Thursdays. Free for students, children under 6. Photography allowed. Excellent gift shop and cafe.",c:[],r:"g",nn:"MASP",ns:"Museu revolucionário suspenso acima plaza pública, maior coleção arte.",nst:"Arquitetura revolucionária—edifício flutuante. Arquiteta Lina Bo Bardi 1968. Democratizar arte—plaza pública grátis. Coleção énfase brasileira e latinoamericana.",nt:"Metro a Brigadeiro. Entrada: R$40-60. Terça-domingo 10 pam-6 pm. Grátis estudantes. Fotografía permitida. Loja e café excelente."},{id:2,n:"Pinacoteca do Estado — classical art collection",a:"Luz neighborhood",v:["art","history","hidden"],d:90,s:"A traditional art museum in a neoclassical building featuring Brazilian and international art from colonial through contemporary periods.",st:"The Pinacoteca is housed in a beautiful neoclassical building (completed 1905) in the Luz neighborhood. The permanent collection emphasizes Brazilian art—colonial paintings, 19th-century academic work, modernist innovations. The museum provides historical narrative through art. The building's restoration (2010) was meticulous; the design emphasizes the art through minimalist display and careful lighting. The educational mission is clear; plaques explain artistic movements and techniques. The collection is less internationally famous than MASP but is equally important for understanding Brazilian art history. The Luz neighborhood has gentrified recently; the museum is part of cultural revitalization. Few tourists visit compared to MASP; the experience is quieter and more contemplative.",im:"Gallery interior with paintings on white walls, careful museum lighting, wooden floors reflecting light, visitors contemplating artworks at a relaxed pace.",t:"Metro to Luz. Admission: R$15 (free on Saturdays). Open Tuesday-Sunday 10 AM-5:30 PM. Guided tours available. Photography allowed in most galleries. Well-maintained facilities.",c:[],r:"g",nn:"Pinacoteca do Estado",ns:"Museu arte tradicional em edificio neoclásico.",nst:"Localizado belo edifício neoclásico 1905. Coleção énfase arte brasileira. Restauração 2010 foi cuidadosa. Missão educacional clara.",nt:"Metro a Luz. Entrada: R$15 (sábado grátis). Terça-domingo 10 pam-5:30 pm. Tours disponibles. Fotografía permitida. Instalaciones bien mantenidas."},{id:3,n:"Pinheiros neighborhood — bohemian and artistic quarter",a:"Pinheiros",v:["local","art","food","night"],d:120,s:"A vibrant neighborhood with street art, independent galleries, restaurants, bars, and creative communities.",st:"Pinheiros is São Paulo's artistic heart. The streets are covered with elaborate street art and murals. Independent galleries, artist studios, and design shops populate the area. The restaurant and bar scene is sophisticated; many establishments are chef-owned and creative. The neighborhood attracts young professionals, artists, and tourists seeking authentic São Paulo culture. Rua dos Pinheiros and surrounding streets are walking destinations. The neighborhood is expensive and sometimes feels performatively bohemian (gentrified rather than genuinely alternative). Yet the creative energy is real; exhibitions and events constantly occur. Nightlife is excellent—multiple music venues host everything from samba to electronic. The neighborhood is safe, walkable, and genuinely reflects São Paulo's contemporary culture. The density of options is overwhelming; discovering smaller venues rewards exploration.",im:"A Pinheiros street wall covered entirely with colorful elaborate street art and murals, outdoor restaurant seating, young urbanites walking between venues.",t:"Metro to Faria Lima, then bus or walk. Neighborhood sprawls; walking is essential. Restaurants and bars abundant; booking recommended for popular spots. Nightlife best from 11 PM. Safe during day; busy streets at night mean constant activity.",c:[],r:"g",nn:"Pinheiros",ns:"Barrio vibrante con arte callejero, galerías, restaurantes.",nst:"Corazón artístico São Paulo. Calles cubiertas arte callejero. Galerías independientes, tiendas diseño. Restaurantes bares sofisticados. Atrae profesionales jóvenes.",nt:"Metro a Faria Lima, luego bus o camina. Caminar es esencial. Restaurantes, bares abundantes; reservar recomendado. Vida nocturna desde 11 pm."},{id:4,n:"Liberdade neighborhood — Japanese immigration hub",a:"Liberdade",v:["local","food","history","hidden"],d:90,s:"The world's largest Japanese diaspora community, featuring markets, restaurants, temples, and cultural institutions.",st:"Liberdade is home to the largest concentration of Japanese people outside Japan. The neighborhood resulted from Japanese immigration beginning in the early 1900s. The commercial heart is Rua Galvão, lined with Japanese restaurants, shops, and markets. The covered market (Praça da Liberdade) is chaotic and wonderful—fish stalls, vegetable vendors, restaurants, currency exchange. The architecture is modest—mostly low-rise buildings with Japanese signage. The cultural institutions are significant—temples, cultural centers, museums. I attended a festival and experienced the integration of Japanese and Brazilian cultures—sushi and samba music simultaneously. The neighborhood has gentrified; younger Japanese-Brazilians relocate elsewhere as property values rise. Yet the neighborhood remains fundamentally Japanese-Brazilian. The restaurant quality is exceptional; you can eat authentic Japanese food at any price point. The experience reveals how immigration creates cultural geography.",im:"A Liberdade market with Japanese signage, street vendors selling fresh fish and produce, customers in casual dress, the bustling chaos of a working market.",t:"Subway to Liberdade Station (convenient). Neighborhood is walkable. Restaurants and markets abundant. Prices very reasonable. Markets most active mornings. Japanese language helpful but English available. Safe area with many residents.",c:[],r:"g",nn:"Liberdade",ns:"Comunidad diáspora japonesa más grande, mercados y restaurantes.",nst:"Hogar concentración japonesa más grande fuera Japón. Inmigración temprano 1900s. Corazón comercial Rua Galvão—restaurantes japoneses. Mercado cubierto caótico y maravilloso.",nt:"Metro a Liberdade Station. Barrio caminable. Restaurantes, mercados abundantes. Precios muy razonables. Mercados más activos mañanas. Idioma japonés útil. Área segura."},{id:5,n:"Ibirapuera Park — urban park and cultural complex",a:"Vila Mariana",v:["nature","beautiful","art"],d:180,s:"A massive urban park (162 hectares) with lakes, gardens, museums, and cultural venues.",st:"Ibirapuera Park is São Paulo's main urban green space. The park was designed by renowned landscape architect Burle Marx. The design creates natural-appearing landscape while actually being sophisticated architecture. Lakes, gardens themed by region (Japanese, Brazilian native), walking paths all encourage recreation. The surrounding museums (Museu do Ipiranga, Oca art space, Pavilhão da Bienal) provide cultural programming. The park is crowded on weekends; weekday visits are quieter. Joggers, cyclists, families, and couples use the park intensively. The park provides refuge from the city's intensity. I walked for hours discovering hidden features. The design's sophistication reveals itself gradually; paths seem random but connect intentionally. The park is free and accessible; it represents São Paulo's commitment to public recreation. The surrounding neighborhoods are upscale; the park serves as amenity for wealthy areas.",im:"A lake in Ibirapuera reflecting trees and sky, landscaped gardens surrounding, visitors recreating on paths and lawns, museum buildings visible in distance.",t:"Metro to Brigadeiro or Morumbi. Free entry. Open daily 6 AM-midnight. Multiple museums charge separate admission (R$30-50). Restaurants and cafes throughout. Safe area with many people present.",c:[],r:"g",nn:"Parque Ibirapuera",ns:"Parque urbano masivo 162 hectáreas con lagos, jardines, museos.",nst:"Espacio verde principal São Paulo. Diseñado paisajista Burle Marx. Crea apariencia natural pero arquitectura sofisticada. Lagos, jardines temáticos.",nt:"Metro a Brigadeiro o Morumbi. Entrada libre. Abierto diario 6 pam-medianoche. Museos cobran separadamente. Restaurantes, cafés. Área segura."},{id:6,n:"Cathedral Metropolitana — modernist religious architecture",a:"Centro",v:["architecture","history","religion"],d:75,s:"A modernist cathedral (completed 1967) featuring striking geometric forms and capacity for 8,000 worshippers.",st:"The Cathedral Metropolitana is an architectural achievement that's also a functioning religious space. The exterior is striking—a massive square structure with sculptural forms. The interior is vast; the space creates awe through scale and geometry. The design is deliberately modern; it's not referencing medieval cathedrals but creating contemporary religious expression. The altar sits in the center; the congregation surrounds it, emphasizing participation over hierarchy. The stained glass is minimal; the light comes from geometric windows. Masses occur regularly; tourists can observe respectfully. The surrounding Praça da Sé plaza has been renovated; the cathedral now has appropriate setting. The cathedral represents 1960s modernism applied to religious architecture. It's photographically striking; the forms create dramatic compositions.",im:"The modernist cathedral facade with striking geometric forms, sunlight casting dramatic shadows on the concrete surfaces, the massive scale visible.",t:"Subway to Sé. Free entry. Open daily for worship and tourism. Respect ongoing religious services; dress modestly. Photography allowed outside; restricted during worship. Tours available periodically.",c:[],r:"g",nn:"Catedral Metropolitana",ns:"Catedral modernista 1967 con formas geométricas sorprendentes.",nst:"Logro arquitectónico y espacio religioso funcionando. Exterior sorprendente—estructura cuadrada masiva. Interior vasto. Diseño deliberadamente moderno.",nt:"Metro a Sé. Entrada libre. Abierto diario. Respetar servicios religiosos. Vestimenta modesta. Fotografía permitida exterior. Tours periodicos."},{id:7,n:"Mercadão — São Paulo's iconic food market",a:"Centro",v:["food","local","hidden"],d:90,s:"A massive municipal market with thousands of vendors selling produce, spices, meats, and prepared foods.",st:"The Mercadão (literally 'Big Market') is São Paulo's primary food market. The scale is overwhelming—multiple levels, hundreds of stalls, the air thick with aromas of spices, fish, flowers, coffee. The market operates at intense pace—vendors calling out prices, customers bargaining, money changing hands. The diversity of products is astonishing—regional Brazilian foods, international specialties, exotic ingredients. I visited early morning when the action is most intense. Standing in the market, you experience São Paulo's diversity and commercial energy. The market is primarily for residents buying food; tourists are obvious outsiders but welcomed. Some stalls have seating where you can eat fresh lunch. The market is crowded and chaotic; theft risk exists (watch valuables). The experience is thoroughly Brazilian—loud, crowded, efficient, and friendly. The market represents how cities function beyond tourist infrastructure.",im:"The market interior crowded densely with vendor stalls, hanging meats and produce displayed, customers moving between rows, the controlled chaos of commerce.",t:"Subway to São Bento or Tatuapé. Best visited early morning (6-10 AM). Very crowded; watch belongings carefully. Small cash transactions. Limited English; bring translation app. Photography ask permission. Bring bags for purchases.",c:[],r:"g",nn:"Mercadão",ns:"Mercado municipal masivo, miles vendedores vendiendo productos.",nst:"Mercado primario alimentos São Paulo. Escala abrumadora—múltiples niveles. Aire espeso con aromas. Mercado opera ritmo intenso. Diversidad productos asombrosa.",nt:"Metro a São Bento o Tatuapé. Terbaik pagi (6-10 pam). Muy lleno; vigila pertenencias. Transacciones tunai pequeñas. Inglés limitado. Pide permiso fotografiar. Trae bolsas."},{id:8,n:"Instituto Tomie Ohtake — contemporary art institution",a:"Pinheiros",v:["art","architecture","hidden"],d:75,s:"A contemporary art institution in an iconic sculptural building, featuring cutting-edge exhibitions and cultural programming.",st:"The Tomie Ohtake is housed in a sculptural building with striking geometric forms (designed by Ruy Ohtake). The building itself is artwork. The interior houses exhibition spaces dedicated to contemporary art practice. The curatorial approach emphasizes experimentation—the institution takes risks on emerging artists. Exhibitions rotate frequently; the programming addresses current cultural issues. The building's design emphasizes verticality and light. Walking through the galleries, the spaces feel designed thoughtfully. The institution represents São Paulo's investment in contemporary culture. The surrounding Pinheiros neighborhood adds context; the institution sits within creative networks. Ticket prices are low (R$20) or free on certain days, emphasizing accessibility. The crowds are sophisticated but not exclusive—students, professionals, curious visitors all attend.",im:"The sculptural geometric exterior of the building reflecting light, interior gallery space with contemporary art installations, clean modernist architecture emphasizing the work.",t:"Metro to Faria Lima, then walk or bus. Admission: R$20 (free Thursdays 5-9 PM). Open Tuesday-Sunday, hours vary by exhibitions. Photography usually permitted. Café on premises.",c:[],r:"g",nn:"Instituto Tomie Ohtake",ns:"Institución arte contemporáneo en edificio escultural.",nst:"Alojado en edificio escultural (Ruy Ohtake diseño). Edifício es obra arte. Salas exposición arte contemporáneo. Acercamiento curatorial énfasis experimentación.",nt:"Metro a Faria Lima, camina o bus. Entrada: R$20 (jueves 5-9 pm grátis). Martes-domingo. Fotografía usualmente permitida. Café en instalaciones."},{id:9,n:"Avenida Paulista — São Paulo's cultural spine",a:"Avenida Paulista",v:["architecture","beautiful","local"],d:90,s:"A major avenue with museums, cultural institutions, restaurants, and commercial buildings representing São Paulo's vitality.",st:"Avenida Paulista is São Paulo's most iconic street. The avenue stretches 2.8 kilometers with a tree-lined median. Major institutions line the avenue—MASP, Museu de Arte Brasileira, banks, corporate headquarters. The architecture ranges from early-20th-century mansions to contemporary high-rises. The avenue is crowded; millions pass through daily. On Sundays, the avenue is closed to traffic; it becomes a massive pedestrian area. The Sunday experience (markets, street performers, families, cyclists) reveals the avenue's public role. Walking the avenue, you experience São Paulo's development through architecture. The street's perspective is dramatic; the vanishing point creates strong composition. The avenue is well-maintained; it represents São Paulo's presentation of itself. The surrounding neighborhoods vary from upscale to modest; the avenue sits at the intersection of social geography.",im:"Avenida Paulista at sunset with tree-lined median, modernist buildings rising on both sides, crowds of people walking, vehicles flowing in organized lanes.",t:"Subway to Consolação, Brigadeiro, or Trianon-MASP for different segments. Walk the entire avenue (1+ hours) or visit specific institutions. Sunday closures create best pedestrian experience. Safe, well-lit, lots of activity.",c:[],r:"g",nn:"Avenida Paulista",ns:"Avenida principal con museos, instituciones culturales.",nst:"Calle más icónica São Paulo. Avenida extiende 2.8 kilómetros. Instituciones principales—MASP, Museu Arte Brasileira. Arquitectura varían temprano-siglo a contemporáneo.",nt:"Metro a Consolação, Brigadeiro, o Trianon-MASP. Camina avenida entera (1+ horas). Cierres domingos crean mejor experiencia peatonal. Seguro, bien iluminado."},{id:10,n:"Alcântara neighborhood — hip and increasingly gentrified",a:"Alcântara",v:["local","art","food","night"],d:120,s:"An emerging artistic neighborhood with street art, independent galleries, vintage shops, bars, and bohemian energy.",st:"Alcântara has transformed from working-class residential area to creative neighborhood in the past decade. The streets are lined with elaborate street art. Independent galleries show emerging artists. Vintage shops sell clothing and furniture. The restaurant and bar scene is developing; proprietors are often artists or creative professionals. The neighborhood attracts young people priced out of Pinheiros; it's becoming gentrified but at slower pace. The authenticity is genuine; real cultural production happens here. Rua Rego Monteiro is the main street. The surrounding blocks have hidden galleries and studios. The neighborhood is still developing; businesses open and close quickly. It feels like witnessing gentrification in progress—the bohemian phase before commercialization. The neighborhood is safe but less touristy than Pinheiros; fewer English speakers. The energy is youthful and experimental.",im:"A Alcântara street with colorful street art covering entire walls, galleries and vintage shops in ground floor, people walking between venues, the neighborhood in transformation.",t:"Metro to Central do Brasil, then bus to Alcântara. Neighborhood sprawls; walking is essential. Restaurants and bars scattered; discovery is part of experience. Nightlife developing but not as established as Pinheiros. Safe area with younger crowd.",c:[],r:"g",nn:"Alcântara",ns:"Barrio artístico emergente con arte callejero, galerías.",nst:"Transformado de residencial clase trabajadora a creativo. Últimas décadas proceso gentrificación. Calles lineadas arte sofisticado. Galerías independientes muestran artistas emergentes.",nt:"Metro a Central Brasil, luego bus a Alcântara. Barrio se dispersa; caminar esencial. Restaurantes, bares dispersos. Vida nocturna desarrollándose. Área segura con multitud joven."},{id:11,n:"Museu de Arte Brasileira — Brazilian art history",a:"Morumbi",v:["art","history","hidden"],d:90,s:"A museum dedicated to Brazilian art from colonial through contemporary periods.",st:"The Museu de Arte Brasileira (MAB) is located in the FAAP (Fundação Armando Alvares Penteado) complex. The museum occupies a modern building with excellent design. The collection traces Brazilian art history—colonial religious works, 19th-century academic painting, early modernism, contemporary practice. The permanent collection is organized chronologically; temporary exhibitions feature contemporary work. The museum provides clear historical narrative. The curatorial approach emphasizes how Brazilian artists engaged with international movements while developing distinct aesthetic. The building's location on a hillside provides views. The museum is less crowded than MASP; the experience is quieter. The gift shop is excellent. The surrounding campus has restaurants and green space. The museum represents institutional commitment to historical documentation.",im:"Gallery interior with Brazilian paintings organized chronologically, careful museum lighting on works, wooden floors, minimalist display emphasizing the art.",t:"Subway to Morumbi, then walk or taxi. Admission: R$30. Open Tuesday-Sunday 10 AM-6 PM. Free on certain days; check website. Photography allowed. Quiet, contemplative experience. Few tourists.",c:[],r:"g",nn:"Museu de Arte Brasileira",ns:"Museu dedicado arte brasileña desde colonial.",nst:"Ubicado complejo FAAP. Colección rastrea historia arte brasileña. Permanentes colección organizado cronológicamente. Curatorial enfatiza arte brasileño. Ubicación en ladera proporciona vistas.",nt:"Metro a Morumbi, camina o taxi. Entrada: R$30. Martes-domingo 10 pam-6 pm. Grátis ciertos días; consulta. Fotografía permitida. Tranquilo, contemplativo. Pocos turistas."},{id:12,n:"Estação da Luz — historic railway station and cultural hub",a:"Luz neighborhood",v:["history","architecture","hidden"],d:60,s:"A Victorian-era railway station (1901) now functioning as cultural center and transit hub.",st:"The Estação da Luz is an architectural gem—Victorian ironwork, ornate detailing, monumental proportions. The station operated as primary railway terminal for much of the 20th century. Today it's a metro station and cultural venue. The architecture is preserved meticulously; the original design remains visible. The station is simultaneously functional (people passing through) and monumental (inspiring awe). The surrounding Luz neighborhood has undergone revitalization; cultural institutions have concentrated here. The station represents industrial-era São Paulo—a moment of confidence and architectural ambition. I sat in the station observing the mixing of commuters and visitors, contemporary life within 19th-century architecture. The station is beautifully maintained; recent restoration was respectful of historical character.",im:"The station interior with Victorian ironwork, natural light filtering through glass roof panels, people moving through the space, the architectural details visible throughout.",t:"Subway to Luz Station (terminus of Red Line). Free to enter station; cultural programs vary in cost (R$10-30). Open daily; hours vary by programming. Photography allowed. Part of walking tour route through Luz neighborhood.",c:[],r:"g",nn:"Estação da Luz",ns:"Estación ferrocarril era Victoriana 1901 ahora hub cultural.",nst:"Joya arquitectónica—herrería victoriana, detalles ornados. Estación operada como terminal ferrocarril primario. Hoy es metro y sede cultural. Arquitectura preservada meticulosamente.",nt:"Metro a Luz Station. Grátis entrar estación. Programas culturales varían costo (R$10-30). Abierto diario. Fotografía permitida. Parte ruta paseo Luz."},{id:13,n:"Mosteiro de São Bento — colonial monastery and chanting monks",a:"Centro",v:["history","religion","hidden","architecture"],d:75,s:"A 16th-century Benedictine monastery with daily chanted Mass, colonial architecture, and peaceful cloisters.",st:"The Mosteiro de São Bento is one of São Paulo's oldest structures, dating to the 16th century. The monastery is an active religious community; daily life includes prayer, study, and agricultural work (monks maintain a farm). The main church is accessible; the architecture is colonial baroque—ornate but not overwhelming. The highlight is the Gregorian chant Mass held daily (typically 10 AM). The monks' voices fill the space with ethereal sound; the experience is deeply meditative. The surrounding cloisters are peaceful—open to sky, with gardens, columns. The monastery produces honey and baked goods sold in the shop. The experience is genuinely spiritual despite being open to tourists. The monks welcome visitors respectfully. The monastery represents continuity—the same community has occupied this space for centuries. The sounds and rhythms structure the community's days.",im:"The monastery church interior with ornate baroque details, monks in black robes singing in unison, natural light filtering through windows, the space resonating with chanted prayer.",t:"Subway to São Bento. Free entry to church; cloisters require tour (R$20). Mass times vary; check schedule. Respectful dress expected; covered shoulders and knees. Photography restricted during Mass. Tours explain monastery's history.",c:[],r:"g",nn:"Mosteiro de São Bento",ns:"Monasterio Benedictino 16 siglo con misa cantada diaria.",nst:"Una estructuras más antiguas São Paulo, siglo 16. Comunidad religiosa activa. Iglesia principal accessible, arquitectura colonial barroca. Misa gregoriano canto diario.",nt:"Metro a São Bento. Entrada iglesia grátis; claustros requieren tour (R$20). Horarios misa varían. Vestimenta respetuosa. Fotografía restringida durante misa."},{id:14,n:"Theatro Municipal — Beaux-Arts performing arts palace",a:"Centro",v:["architecture","history","art"],d:75,s:"A Beaux-Arts theater (1911) with opulent interior, grand staircase, and ongoing opera, ballet, and theatre programming.",st:"The Theatro Municipal rivals any opera house globally. The architecture is Beaux-Arts grandeur—marble, gilt, crystal chandeliers, sculptural decoration. The main facade faces a plaza; the approach is ceremonial. The interior grand staircase is famous—multiple cascades, elaborate railings, overwhelming decoration. The theater hosts opera, ballet, and theatrical productions. Even without attending a performance, the building tour is worthwhile. I sat in the balcony during an opera; the experience of viewing performers and architecture simultaneously was overwhelming. The theater represents Belle Époque São Paulo—a moment of wealth and confidence. The surrounding area has deteriorated; the theater remains impeccably maintained as cultural monument. The theater's existence speaks to the importance of cultural institutions in urban identity.",im:"The grand staircase of the theater with multiple cascades, marble and gilt surfaces, elaborate railings and sculpture, warm lighting emphasizing opulence.",t:"Subway to Anhangabaú. Tours available (R$15): Tuesday-Friday 2-5 PM. Performance tickets vary (R$30-300+) depending on show and seating. Check website for programming. Photography allowed on tours; restricted during performances.",c:[],r:"g",nn:"Theatro Municipal",ns:"Teatro Beaux-Arts 1911 con interior opulento.",nst:"Rival cualquier casa ópera globalmente. Arquitectura Beaux-Arts grandeza. Fachada principal plaza. Escalera interior famosa—cascadas múltiples.",nt:"Metro a Anhangabaú. Tours disponibles (R$15): martes-viernes 2-5 pm. Entradas espectáculos varían. Consulta sitio. Fotografía permitida tours."},{id:15,n:"Museu do Futebol — Brazilian football culture",a:"Estádio do Pacaembu",v:["history","local","hidden"],d:90,s:"A museum documenting Brazilian football history, culture, and passion within a historic stadium.",st:"Brazilian football is deeply intertwined with national identity; this museum explores that relationship. The museum occupies multiple levels of the Estádio do Pacaembu (Pacaembu Stadium). The exhibits cover football history from its introduction through contemporary era. Interactive displays allow visitors to understand the game's complexity. The museum emphasizes football's social importance—how the sport shapes communities. The stadium experience adds authenticity; standing on the stadium's levels while learning history creates immersion. I walked through exhibits feeling how football dominates Brazilian culture. The museum shop is excellent. The surrounding stadium (no longer used for professional matches) is somewhat deteriorated but historically significant. The museum represents how sport shapes national narratives. The passion visible in exhibits feels genuine; football is serious business.",im:"Museum exhibit showing football history with photographs, trophies, uniforms displayed, stadium levels visible, visitors moving between exhibits.",t:"Subway to Trianon-MASP, then walk or taxi. Admission: R$30. Open Tuesday-Sunday 10 AM-5 PM. Tours available. Photography allowed. Accessible to all football levels of enthusiasm.",c:[],r:"g",nn:"Museu do Futebol",ns:"Museu documentando historia, cultura fútbol brasileño.",nst:"Fútbol brasileño profundamente entrelazado identidad nacional. Ocupando niveles múltiples estadio. Exhibe cubren historia fútbol. Énfasis importancia social—comunidades.",nt:"Metro a Trianon-MASP, camina o taxi. Entrada: R$30. Martes-domingo 10 pam-5 pm. Tours disponibles. Fotografía permitida. Accesible entusiasmo fútbol."},{id:16,n:"Instituto Masp de Pós-Colonialsmo — decolonial thought and art",a:"Av. Paulista",v:["art","hidden","architecture"],d:60,s:"An institute dedicated to postcolonial art and thought, examining how colonialism shapes contemporary culture.",st:"The IMPC (recently established within MASP framework) focuses on postcolonial perspectives. The programming and exhibitions examine how European colonialism continues affecting Global South cultures. The curatorial approach is intellectually rigorous. Exhibitions might feature artists exploring indigenous perspectives, African diasporas, or colonial legacies. The institution represents growing awareness in major museums of colonial critique. The space is often experimental—not always beautiful but always thought-provoking. Attendance is smaller than mainstream MASP exhibitions; visitors tend to be academics, students, and serious art viewers. The intellectual engagement is genuine; the exhibitions assume educated viewers. São Paulo's cultural institutions are increasingly addressing colonial histories—this institute represents that shift.",im:"Exhibition gallery with contemporary art exploring postcolonial themes, interpretive text on walls, visitors engaged in contemplation, the space designed for intellectual engagement.",t:"At MASP location (Avenida Paulista). Admission included in MASP ticket (R$40-60) or free with MASP. Hours coincide with main museum. Photography restrictions vary by exhibition. Small crowds; contemplative experience.",c:[],r:"g",nn:"Instituto MASP Pós-Colonialismo",ns:"Instituto dedicado arte pensamiento poscolonial.",nst:"Recientemente establecido dentro marco MASP. Enfoque programación/exhibiciones perspectivas poscoloniales. Curatorial aproximación intelectualmente rigurosa.",nt:"Ubicación MASP (Avenida Paulista). Entrada incluida MASP (R$40-60) o grátis. Horas coinciden museo principal. Restricciones fotografía varían. Multitudes pequeñas."},{id:17,n:"Favela Santa Marta — controlled tourism in urban settlement",a:"Zone South",v:["local","hidden","social"],d:120,s:"A favela (informal settlement) with organized tours led by residents, revealing complex urban reality.",st:"Santa Marta is a favela—an informal settlement of low-income residents. Unlike many favelas, this community has established controlled tourism to generate income and provide accurate representation. Tours are led by residents; the revenue supports community projects. The experience reveals São Paulo's inequality—the contrast between wealthy neighborhoods and favelas is stark. I climbed steep streets observing homes built densely on hillside, clotheslines strung between buildings, children playing. The residents are friendly and welcoming; the tours avoid performance and present reality. The architecture is ingenious—homes built efficiently within constraint. The infrastructure (electricity, water) was largely built through community self-organization. The tour challenges stereotypes about violence and drug cartels; residents emphasize they're ordinary people managing difficult circumstances. The experience is simultaneously educational and ethically fraught—questions about voluntourism persist. Yet resident-led tours represent agency and income control.",im:"A favela street steeply inclined, homes built densely uphill, clotheslines and overhead wires creating complexity, residents moving about, the hillside settlement visible entirely.",t:"Tours should be organized through official community operators (seek recommendations from hotel/travel agencies). Cost approximately R$100-200 per person. Tours typically 2-3 hours. Respect privacy; photography requires permission. Avoid after dark. Go with organized group.",c:[],r:"g",nn:"Favela Santa Marta",ns:"Asentamiento informal con tours organizados por residentes.",nst:"Favela—asentamiento informal residentes bajos ingresos. Tours organizados residentes; ingresos soportan proyectos comunidad. Experiencia revela desigualdad São Paulo.",nt:"Tours operadores comunidad oficial. Costo aproximadamente R$100-200 por persona. Tours típicamente 2-3 horas. Respeta privacidad. Fotografia requiere permiso. Evita oscuridad."},{id:18,n:"Bairro do Bixiga — bohemian cultural quarter",a:"Bixiga",v:["local","art","theater","night"],d:120,s:"A historic bohemian neighborhood with theaters, cafes, street performances, and cultural institutions.",st:"Bixiga (also called Bela Vista) has been São Paulo's bohemian center for decades. The neighborhood is home to numerous theater venues—small independent theaters with avant-garde programming. Street cafes line Rua 13 de Maio. The architecture is modestly built but culturally rich. The neighborhood attracts artists, theater practitioners, and cultural seekers. It's less gentrified than Pinheiros; the neighborhood maintains authentic character. Street performances happen constantly; the energy is creative. The neighborhood has deteriorated infrastructurally; the streets need repair. Yet the cultural vitality is evident. I attended an experimental theater production in a tiny theater; the intimacy and intensity were remarkable. The neighborhood is becoming touristy but remains genuine. Nightlife is excellent—multiple theaters, bars, late-night restaurants.",im:"A Bixiga street with small theater venue signage, cafes with outdoor seating, performers on the street, the neighborhood packed densely with cultural energy.",t:"Subway to Bixiga Station or nearby. Neighborhood is walkable. Theaters scattered throughout; check programming in advance. Restaurants and cafes abundant. Nightlife concentrated around Rua 13 de Maio. Safe area with constant activity.",c:[],r:"g",nn:"Bairro Bixiga",ns:"Barrio bohemio histórico con teatros, cafés.",nst:"Centro bohemio São Paulo por décadas. Hogar múltiples teatros. Calles cafés. Arquitectura modestamente construida pero culturalmente rica. Atrae artistas.",nt:"Metro a Bixiga Station. Barrio caminable. Teatros dispersos; programación consulta avanzado. Restaurantes, cafés abundantes. Vida nocturna concentrada Rua 13 Mayo."},{id:19,n:"Sé Cathedral — imposing Gothic structure in city center",a:"Centro",v:["architecture","history","religion"],d:60,s:"A neo-Gothic cathedral completed in 1954, dominating the central plaza with imposing architecture.",st:"The Sé Cathedral is São Paulo's most iconic religious building. The neo-Gothic architecture was controversial when built (traditionalists preferred baroque; modernists saw pastiche). The building is massive—the interior vaults soar. The cathedral remains actively used for worship. The exterior plaza (Praça da Sé) is public gathering space. The cathedral demonstrates 20th-century urban priorities—this building replaced an earlier church; the reconstruction emphasized monumentality. The interior is somewhat plain (no elaborate decoration) which allows focus on the architectural forms. Masses occur regularly. The cathedral sits at the intersection of major streets; it's a constant visual reference point for downtown navigation. I attended evening Mass and felt the space's power—the scale and acoustics create profound atmosphere. The cathedral's existence demonstrates the importance of religious institutions in urban form.",im:"The neo-Gothic facade of the cathedral rising above Praça da Sé, the pointed arches and towers reaching skyward, the plaza below filled with people.",t:"Subway to Sé. Free entry. Open daily for worship and tourism. Respectful dress expected. Photography allowed; restricted during services. Tours available periodically. Adjacent plaza provides gathering space.",c:[],r:"g",nn:"Catedral Metropolitana de São Paulo (Sé)",ns:"Catedral neo-Gótico 1954 dominando plaza central.",nst:"Edificio religioso más icónico São Paulo. Arquitectura neo-Gótico controvertida cuando construida. Interior bóvedas se elevan. Sigue activamente usada.",nt:"Metro a Sé. Entrada libre. Abierto diario. Vestimenta respetuosa. Fotografía permitida; restringida servicios. Tours periodicos. Plaza adyacente espacio reunión."},{id:20,n:"Vila Olímpia neighborhood — corporate and upscale residential",a:"Vila Olímpia",v:["local","beautiful","food"],d:120,s:"An upscale residential and business neighborhood with shopping malls, restaurants, and contemporary architecture.",st:"Vila Olímpia represents contemporary São Paulo's aspirational landscape. The neighborhood is entirely developed; no trace of earlier uses remain. The architecture is contemporary—glass office towers, residential high-rises, commercial centers. The infrastructure is modern; the streets are clean. The neighborhood attracts affluent residents and corporate offices. The restaurants are upscale; chain restaurants and boutique establishments coexist. Shopping malls provide retail and dining. The neighborhood is safe and organized. It's primarily a working and living neighborhood; few tourists venture here. The experience reveals how São Paulo's wealthy live—in secure, modern, comfortable spaces somewhat isolated from the city's complexity. The neighborhood is efficient but lacks character or history. It represents São Paulo's future more than its past or present. The contrast with favelas is stark; São Paulo's inequality is geographically visible.",im:"Modern high-rise residential and office towers, shopping mall exterior, clean streets with contemporary landscaping, automobiles and well-dressed people moving efficiently.",t:"Subway to Vila Olímpia area. Neighborhood is sprawling; walking limited. Taxis and buses provide transportation. Restaurants and shopping abundant. Safe area with heavy security presence. Nightlife concentrated in bars and restaurants.",c:[],r:"g",nn:"Vila Olímpia",ns:"Barrio residencial upscale con centros comerciales.",nst:"Representa paisaje aspiracional São Paulo contemporáneo. Barrio completamente desarrollado. Arquitectura contemporánea—torres oficina vidrio. Restaurantes upscale.",nt:"Metro a Vila Olímpia área. Barrio dispersado; caminar limitado. Taxis, buses transportación. Restaurantes, tiendas abundantes. Área segura."},{id:21,n:"Rua 25 de Março — commercial and pedestrian street",a:"Centro",v:["local","commerce","hidden"],d:90,s:"A famous commercial street famous for wholesale goods, clothing, and supplies.",st:"Rua 25 de Março is a pedestrian commercial street packed with shops selling everything wholesale—fabrics, decorations, clothing, electronics. The street is a merchant's paradise; prices are low because volume is high. The street is crowded; navigating requires patience. The atmosphere is intense—vendors calling out prices, customers bargaining, merchandise displayed densely. It's less touristy than other markets; most visitors are business people. The street is active during business hours; after hours it empties. The architecture is functional—modestly built commercial structures. The street represents São Paulo's commerce-focused identity. I walked the street observing transactions and efficient chaos. The experience is overwhelming for tourists but rewarding. The street's energy is contagious. The crowds are manageable if you avoid peak hours (late morning, afternoon).",im:"The street crowded densely with pedestrians and merchandise displays, shop fronts with signage in multiple colors, commercial activity at maximum intensity.",t:"Subway to Tatuapé or Tem-Tém. Free walking. Peak hours are mid-morning and afternoon; early morning is quieter. Photography ask permission. Watch valuables carefully; theft risk exists. No restaurants but street food vendors. Cash essential.",c:[],r:"g",nn:"Rua 25 de Março",ns:"Calle comercial famosa por bienes mayorista.",nst:"Calle comercial peatonal empacada con tiendas vendiendo mayorista. Precio bajo porque volumen alto. Calle atestada. Atmosfera intenso.",nt:"Metro a Tatuapé o Tem-Tém. Paseos libres. Horas pico medio-mañana, tarde. Fotografía pide permiso. Vigila pertenencias. Sin restaurantes, vendedores comida calle."},{id:22,n:"Museu Lasar Segall — modern artist's studio and museum",a:"Vila Mariana",v:["art","history","hidden"],d:75,s:"A museum dedicated to Lasar Segall, a modernist artist, in his converted studio and house.",st:"Lasar Segall (1891-1957) was a pivotal modernist artist. The museum occupies his former studio and residence—a small, intimate space. The building architecture is elegant modernist—clean lines, appropriate materials, functional design. The permanent collection includes Segall's paintings, sculptures, and prints. The work reveals an artist deeply engaged with Brazilian culture while maintaining modernist aesthetics. The museum provides biographical information; you understand Segall's artistic development. The intimate scale creates direct relationship between viewer and work. Few tourists visit; the experience is quiet and contemplative. The surrounding Villa Mariana neighborhood is residential; the museum feels embedded in lived community. The museum shop sells reproductions and art books. The experience reveals how important artists are to understanding cultural development.",im:"Artist's studio with paintings on walls, sculptural works displayed, natural light from large windows illuminating the space, the intimate scale of the workspace.",t:"Subway to Brigadeiro or São Bento, then bus or taxi. Admission: R$20. Open Tuesday-Sunday 1-5 PM. Guided tours available (Portuguese). Photography allowed. Very quiet, few tourists. Free Thursdays 6-8 PM.",c:[],r:"g",nn:"Museu Lasar Segall",ns:"Museu dedicado artista moderno, estudio y casa convertida.",nst:"Lasar Segall (1891-1957) artista modernista pivotal. Ocupando estudio y residencia anterior. Arquitectura edificio elegante modernista. Colección permanente.",nt:"Metro a Brigadeiro o São Bento, luego bus o taxi. Entrada: R$20. Martes-domingo 1-5 pm. Tours guiados (portugués). Fotografía permitida. Tranquilo, pocos turistas."},{id:23,n:"Cemitério da Consolação — history in stone",a:"Centro",v:["history","architecture","hidden"],d:75,s:"A historic cemetery with elaborate tombs, sculptures, and graves of prominent Brazilians.",st:"The Cemitério da Consolação is São Paulo's oldest cemetery. Walking through, you encounter elaborate family mausoleums, sculptural monuments, and gravesites of important historical figures. The cemetery is like an outdoor museum—the architecture and art reveal aesthetic preferences across centuries. The vegetation creates peaceful environment. The cemetery is simultaneously beautiful and morbid. The spatial organization shows class distinctions—prominent families occupy premium locations. The craftsmanship of monuments demonstrates artistic achievement. I walked the cemetery discovering elaborate designs. The experience is contemplative; cemeteries reveal how societies understand death and immortality. The surrounding neighborhood is historic; the cemetery sits within older São Paulo. The experience is free and accessible; cemeteries are public spaces in Brazil.",im:"A cemetery path lined with elaborate family mausoleums, sculptural monuments, vegetation creating dappled shade, the artistic designs visible on every structure.",t:"Subway to República or nearby. Free entrance. Open daily dawn to dusk. Respectful behavior expected. Maps available at entrance. Photography ask permission. Peaceful, quiet experience despite urban location.",c:[],r:"g",nn:"Cemitério da Consolação",ns:"Cementerio histórico con tumbas elaboradas, esculturas.",nst:"Cementerio más antiguo São Paulo. Caminando encuentras mausoleos familia. Simultaneamente hermoso y mórbido. Organización espacial muestra distinciones clase.",nt:"Metro a República o cercano. Entrada grátis. Abierto alba oscuridad. Comportamiento respetuoso. Mapas disponibles entrada. Fotografía pide permiso. Tranquilo."},{id:24,n:"Instituto Cultural Itaú — art and contemporary culture",a:"Avenida Paulista",v:["art","hidden"],d:60,s:"A contemporary art space showcasing Brazilian and international artists, with cutting-edge exhibitions.",st:"The Instituto Cultural Itaú is funded by the Itaú Bank and provides art space for contemporary practice. The building is modern; the galleries are well-designed. The exhibitions are contemporary and experimental—not always historically focused like major museums. The curatorial approach emphasizes emerging artists and new ideas. Attendance is substantial; the institution is successful in drawing crowds. The admission is free or low-cost (bank support removes pricing barriers). The gift shop is excellent. The surrounding Avenida Paulista location makes the institution accessible. Few tourists specifically visit; most visitors are Brazilian art enthusiasts. The institution represents corporate patronage of culture; this model allows ambitious programming without full public funding.",im:"Contemporary gallery with large-scale installations, minimalist design emphasizing the work, visitors moving through bright white spaces, the art displayed with intentionality.",t:"Subway to Brigadeiro or Consolação. Free admission. Open Tuesday-Sunday 10 AM-6 PM (extended Thursday until 9 PM). Photography usually permitted. Cafe on premises. Crowds less on weekday mornings.",c:[],r:"g",nn:"Instituto Cultural Itaú",ns:"Espacio arte contemporáneo mostrando artistas brasileños.",nst:"Financiado banco Itaú. Edifício moderno; galerías bien diseñadas. Exhibiciones contemporáneo y experimental. Acercamiento curatorial énfasis artistas emergentes.",nt:"Metro a Brigadeiro o Consolação. Entrada libre. Martes-domingo 10 pam-6 pm. Fotografía usualmente permitida. Café en instalaciones. Multitudes menos mañanas semana."},{id:25,n:"Corporativo complex at Brooklin — contemporary urban development",a:"Brooklin",v:["architecture","beautiful","hidden"],d:60,s:"A planned corporate and residential complex representing contemporary urban planning.",st:"The Brooklin complex is a modern planned development—office towers, residential high-rises, shops, restaurants organized around plazas. The architecture is contemporary; the design emphasizes openness and pedestrian experience. The complex is wealthy, safe, and organized. It represents how affluent São Paulo is developing—integrated master-planned spaces rather than organic urban growth. The plazas host events; the space is designed for public gathering. The experience is similar to global corporate districts—clean, modern, somewhat sterile. It reveals São Paulo's aspiration toward global contemporary urbanism. Few tourists visit; residents and workers use the spaces. The contrast with central São Paulo is stark—this space is planned, controlled, predictable. It's worth visiting to understand São Paulo's multiple realities. The architecture is competent; it's not avant-garde but demonstrates contemporary design principles.",im:"Modern plaza surrounded by glass office towers and residential high-rises, clean landscaping, well-dressed people moving efficiently through organized space.",t:"Subway to nearby stations, then bus or taxi. Free access to public plazas. Restaurants and shops throughout. Safe area with heavy presence of security and well-maintained infrastructure.",c:[],r:"g",nn:"Complejo Corporativo Brooklin",ns:"Complejo planeado corporativo y residencial desarrollo urbano.",nst:"Desarrollo planeado moderno—torres oficina, residencial. Arquitectura contemporáneo; diseño énfasis apertura. Representan São Paulo desarrollo—master-planeado.",nt:"Metro a estaciones cercanas, luego bus o taxi. Acceso libre plazas públicas. Restaurantes, tiendas. Área segura presencia seguridad."},{id:26,n:"Praça do Patriarca — historic city plaza",a:"Centro",v:["history","architecture","local"],d:45,s:"A historic plaza in central São Paulo surrounded by important buildings and serving as a gathering point.",st:"Praça do Patriarca sits where several important streets intersect. The plaza is surrounded by historic buildings—churches, colonial structures, early-modern additions. The space functions as public gathering point; street vendors, performers, residents all activate the plaza. The plaza has been renovated recently; the design emphasizes pedestrian experience. The surrounding architecture reveals São Paulo's historical layers. The plaza is crowded; it represents the energy of central São Paulo. I sat observing the mixing of people, commerce, and history. The plaza feels genuinely lived; it's not a tourist attraction but a public space serving residents. The accessibility and vitality make it a good spot to experience São Paulo's urban character.",im:"Plaza surrounded by historic and modern buildings, crowded with pedestrians and vendors, street activity filling the space, the historic and contemporary mixing visibly.",t:"Subway to Sé or nearby stations. Free access. Located in Centro; walking connects to other attractions. Cafes and restaurants nearby. Safe during day; more caution after dark. Active, animated space.",c:[],r:"g",nn:"Praça do Patriarca",ns:"Plaza histórica ciudad rodeada edificios importantes.",nst:"Praça se sienta donde calles intersectan. Rodeado ediciones históricos. Función espacio público reunión. Recientemente renovado; diseño énfasis peatonal.",nt:"Metro a Sé o estaciones cercanas. Acceso libre. Centro ubicación. Cafés, restaurantes cercanos. Seguro día. Espacio activo, animado."},{id:27,n:"Museu de Artes da Dança — dance history and practice",a:"Luz neighborhood",v:["art","history","hidden"],d:60,s:"A museum dedicated to dance history and culture, with collections of costumes, photographs, and historical materials.",st:"The Museu de Artes da Dança documents Brazil's rich dance traditions—samba, forró, capoeira, ballet, contemporary practice. The exhibits include costumes, photographs, videos, and interactive displays. The curatorial approach emphasizes how dance shapes Brazilian culture. The museum is not large but is intellectually engaging. Few tourists visit; most visitors are dance enthusiasts and students. The surrounding Luz neighborhood is becoming cultural hub; the museum is part of that revitalization. The admission is low (R$10-15). The experience reveals dance's importance in Brazilian identity. The gift shop sells dance-related books and DVDs. The museum demonstrates how movement arts can be historically documented and analyzed.",im:"Museum display of dance costumes on mannequins, photographs on walls showing historical dancers, videoscreens showing performances, the collection organized thematically.",t:"Subway to Luz. Admission: R$10-15. Hours variable; check ahead. Often closed Mondays. Photography may be restricted. Free hours sometimes available. Quiet, contemplative experience.",c:[],r:"g",nn:"Museu de Artes da Dança",ns:"Museu dedicado historia, cultura danza.",nst:"Documenta tradiciones danza rica Brasil. Exhibiciones costumes, fotografías, videos. Acercamiento curatorial énfasis danza forma cultura brasileña.",nt:"Metro a Luz. Entrada: R$10-15. Horarios variable; chequea. Frecuentemente cerrado lunes. Fotografía puede restricción. Grátis horas algunas. Tranquilo, contemplativo."},{id:28,n:"Vale do Anhangabaú — urban green corridor",a:"Centro",v:["nature","beautiful","hidden"],d:60,s:"A green corridor along a reclaimed urban valley with parks, paths, and cultural venues.",st:"The Vale do Anhangabaú is an urban park built along a reclaimed valley. The park stretches north-south through central São Paulo. The design includes walking paths, vegetation, cultural venues, and public gathering spaces. The park was created to remediate environmental damage and provide green space in dense urban area. The design is successful—people use it actively. The park connects historic areas (Teatro Municipal, Cathedral) with cultural institutions. Walking through the park, you experience São Paulo's geography; the valley's topography is visible. The park is simultaneously peaceful and connected to city's energy. The design allows views of surrounding buildings. The park demonstrates urban regeneration; reclaimed spaces can become community assets.",im:"A green path through the valley with walking trails, surrounding trees creating partial enclosure, the valley's topography visible, the city visible above the park.",t:"Multiple access points throughout Centro. Free access. Walking path connects major attractions. Best during day; avoid after dark. Restaurants and cafes nearby. Safe with consistent pedestrian traffic.",c:[],r:"g",nn:"Vale do Anhangabaú",ns:"Pasillo verde urbano con parques, senderos.",nst:"Parque construido por valle reclamado. Extiende norte-sur São Paulo central. Diseño incluye senderos, vegetación, lugares públicos reunión. Demonstración remediación ambiental.",nt:"Múltiples puntos acceso Centro. Acceso libre. Sendero peatonal conecta atracciones principales. Mejor día; evita oscuridad. Restaurantes, cafés cercanos. Seguro tráfico peatonal."},{id:29,n:"Parque Estadual da Cantareira — protected forest near city",a:"North of São Paulo",v:["nature","beautiful","hidden"],d:240,s:"A state park protecting Atlantic Forest, with hiking trails and biodiversity near the city.",st:"Cantareira State Park is one of São Paulo's greatest treasures—protected forest in an urban region. The park preserves Atlantic Forest ecosystem; the trails wind through humid subtropical forest. The biodiversity is significant; over 1,000 plant species and numerous animals inhabit the park. The trails range in difficulty. I hiked a moderate trail and encountered streams, waterfalls, and dense vegetation. The experience is genuinely immersive in nature despite being accessible from the city. The park was created to protect watershed and biodiversity; it now serves multiple functions. The surrounding neighborhoods are expanding; the park's protection is increasingly important. The air quality improves noticeably as you enter the forest. The experience reveals how nature can be preserved near cities when intentionally protected.",im:"A forest trail through humid subtropical vegetation, tall trees creating canopy, a stream visible, the richness of plant life visible at multiple levels.",t:"Bus from central São Paulo (1.5-2 hours) to park entrance. Admission: R$15-30. Multiple trailheads; choose appropriate difficulty. Bring water and sun protection. Guides available for hire. Early morning quieter than afternoon. Weather dependent on season; rainy season (summer) can be muddy.",c:[],r:"g",nn:"Parque Estadual Cantareira",ns:"Parque estado protegiendo bosque atlántico.",nst:"Protege ecosistema bosque atlántico; senderos serpentean bosque húmedo subtropical. Biodiversidad significativa—1000+ especies plantas. Creado proteger cuenca y biodiversidad.",nt:"Bus São Paulo central (1.5-2 horas) entrada parque. Entrada: R$15-30. Múltiples trailheads; elige dificultad. Trae agua, protección solar. Guías disponibles. Mañana temprano quieter. Clima-dependiente estación."},{id:30,n:"Avenida Brasil — modernist urban planning",a:"Multiple neighborhoods",v:["architecture","hidden"],d:90,s:"A major avenue cutting through São Paulo's east zone, designed for modernist traffic flow and urban efficiency.",st:"Avenida Brasil is a wide avenue designed in the 1960s with modernist planning principles—fast traffic flow, minimal pedestrian crossing, grade separations. The avenue cuts through multiple neighborhoods; it's a dominant feature of São Paulo's urban geography. The design privileges automobiles over pedestrians; the street is fast and efficient. The architecture along the avenue shows different eras and uses. The experience of the avenue is modern; it emphasizes speed and efficiency over human scale. Walking is not the typical experience; driving or taxi provides the avenue's intended perspective. The avenue reveals how modernist planning prioritizes certain values—efficiency, automobile use—over others. The avenue is well-maintained; it represents continuing modernist urban philosophy. Observing the avenue provides perspective on São Paulo's development model.",im:"A wide modernist avenue with multiple traffic lanes, grade separations, minimal pedestrian presence, the design emphasizing speed and efficiency, buildings visible at distance.",t:"Travel via bus, taxi, or car; not a walking avenue. Multiple metro connections provide alternative transportation. The avenue is best experienced from vehicle or elevated viewing points. Not a tourist destination but interesting for urban design observation.",c:[],r:"g",nn:"Avenida Brasil",ns:"Avenida principal diseño modernista, planificación tráfico.",nst:"Avenida ancha diseñada 1960s principios planeamiento modernista. Cortada múltiples barrios; característica dominante geografía urbana. Diseño privilegia automóviles.",nt:"Viaja auto, taxi, o coche; no es avenida peatonal. Múltiples conexiones metro alternativas transportación. Mejor experimentada vehículo. No turista destino pero interesante."},{id:31,n:"Mirante Sesc Avenida Paulista — vista grátis da Paulista",s:"Mirante no 17º andar do Sesc com vista 360 graus da cidade, Parque Ibirapuera e skyline.",a:"Av. Paulista, 119 - Bela Vista",st:"Eu subo aqui todo domingo de manhã pra tomar café vendo o sol bater nos prédios. Uma vez peguei um show grátis na cobertura enquanto via a neblina descer. Melhor jeito de começar o dia sem gastar nada.",im:"O vento fresco da tarde bagunça o cabelo enquanto o cheiro de pipoca do café lá embaixo sobe.",t:"Chegue 30 min antes no sábado/domingo, reserve grátis no app do Sesc pra pegar pôr do sol às 17h.",nst:"Eu subo aqui todo domingo de manhã pra tomar café vendo o sol bater nos prédios. Uma vez peguei um show grátis na cobertura enquanto via a neblina descer. Melhor jeito de começar o dia sem gastar nada.",nt:"Chegue 30 min antes no sábado/domingo, reserve grátis no app do Sesc pra pegar pôr do sol às 17h.",v:["hidden"],r:"g",d:30,c:[],nn:"Mirante Sesc Avenida Paulista — vista grátis da Paulista",ns:"Mirante no 17º andar do Sesc com vista 360 graus da cidade, Parque Ibirapuera e skyline."},{id:32,n:"Mirante Edifício Martinelli — primeiro arranha-céu do centro",s:"Mirante grátis no topo do prédio histórico com vista única do centro antigo de SP.",a:"Rua São Bento, 405 - Centro",st:"Fui numa visita guiada de 30 min e vi o Vale do Anhangabaú lotado de gente no fim de tarde. O guia contou que o Martinelli foi o mais alto da América Latina em 1934. Sensação de viagem no tempo grátis.",im:"O barulho distante dos buzinas ecoa enquanto o sol poente pinta as cúpulas de laranja.",t:"Reserve online quinta-feira anterior no site oficial, visitas sáb/dom 14h30/16h30, grupo de 20 pessoas.",nst:"Fui numa visita guiada de 30 min e vi o Vale do Anhangabaú lotado de gente no fim de tarde. O guia contou que o Martinelli foi o mais alto da América Latina em 1934. Sensação de viagem no tempo grátis.",nt:"Reserve online quinta-feira anterior no site oficial, visitas sáb/dom 14h30/16h30, grupo de 20 pessoas.",v:["hidden"],r:"g",d:30,c:[],nn:"Mirante Edifício Martinelli — primeiro arranha-céu do centro",ns:"Mirante grátis no topo do prédio histórico com vista única do centro antigo de SP."},{id:33,n:"Mirante MAC-USP — vista pro Ibirapuera",s:"Mirante grátis no topo do Museu de Arte Contemporânea com panorama do parque e skyline.",a:"Av. Pedro Álvares Cabral, 1301 - Vila Mariana",st:"Combinei com um rolê no Ibirapuera e subi pro mirante depois da exposição de graça. Vi o obelisco e a Oca de cima, perfeita pra fotos sem fila. Arte e vista num pacote só.",im:"O verde do parque contrasta com o cinza dos prédios sob o céu limpo de outono.",t:"Entre grátis no museu terça-domingo 10h-18h, suba direto pro terraço sem agendar nada.",nst:"Combinei com um rolê no Ibirapuera e subi pro mirante depois da exposição de graça. Vi o obelisco e a Oca de cima, perfeita pra fotos sem fila. Arte e vista num pacote só.",nt:"Entre grátis no museu terça-domingo 10h-18h, suba direto pro terraço sem agendar nada.",v:["hidden"],r:"g",d:30,c:[],nn:"Mirante MAC-USP — vista pro Ibirapuera",ns:"Mirante grátis no topo do Museu de Arte Contemporânea com panorama do parque e skyline."},{id:34,n:"Mirante do Copan — vista do Edifício Copan",s:"Mirante grátis no topo do icônico Copan com vista pro centro e Sambódromo.",a:"Av. Ipiranga, 200 - República",st:"Cheguei 15 min antes e entrei no grupo das 15h30, vi o Anhembi e Serra da Cantareira clara. 30 min cronometrados mas rendeu fotos incríveis. Clássico dos paulistanos sem custo.",im:"A brisa morna carrega cheiro de pastel das feiras próximas misturado ao concreto.",t:"Seg-sex 10h30/15h30, chegue 15 min cedo pra cadastro no hall, metrô República linha vermelha.",nst:"Cheguei 15 min antes e entrei no grupo das 15h30, vi o Anhembi e Serra da Cantareira clara. 30 min cronometrados mas rendeu fotos incríveis. Clássico dos paulistanos sem custo.",nt:"Seg-sex 10h30/15h30, chegue 15 min cedo pra cadastro no hall, metrô República linha vermelha.",v:["hidden"],r:"g",d:30,c:[],nn:"Mirante do Copan — vista do Edifício Copan",ns:"Mirante grátis no topo do icônico Copan com vista pro centro e Sambódromo."},{id:35,n:"Praça Pôr do Sol — mirante natural na zona oeste",s:"Praça com mirante grátis pra ver o pôr do sol sobre a cidade e Marginal Pinheiros.",a:"Praça Largo da Matriz de Santíssima Trindade - Vila Madalena",st:"Eu levo uma breja gelada aqui às 18h pra ver o sol mergulhar atrás dos prédios. Todo mundo aplaude no final, virou tradição local. Grátis e lotado de locals.",im:"O céu explode em vermelho enquanto vozes riem e violas dedilham ao fundo.",t:"Ônibus 175R-10 da Vila Madalena até Largo da Matriz, vá terça ou quinta pra evitar multidão.",nst:"Eu levo uma breja gelada aqui às 18h pra ver o sol mergulhar atrás dos prédios. Todo mundo aplaude no final, virou tradição local. Grátis e lotado de locals.",nt:"Ônibus 175R-10 da Vila Madalena até Largo da Matriz, vá terça ou quinta pra evitar multidão.",v:["hidden"],r:"g",d:30,c:[],nn:"Praça Pôr do Sol — mirante natural na zona oeste",ns:"Praça com mirante grátis pra ver o pôr do sol sobre a cidade e Marginal Pinheiros."},{id:36,n:"Pico do Jaraguá — mirante na mata atlântica",s:"Mirante grátis no pico mais alto de SP com trilha e vista da Serra da Cantareira.",a:"Parque Estadual do Jaraguá - Estrada Turística do Jaraguá, km 14,5 - Pirituba",st:"Subi a trilha de 1h num sábado fresco e vi toda Mantiqueira em dia claro. Peguei goiaba selvagem no caminho, aventura urbana total. Melhor escape da selva de pedra.",im:"O canto dos pássaros e cheiro de terra úmida envolvem enquanto a brisa refresca a pele suada.",t:"Pegue ônibus 183T da Lapa até Torcedor Franco, trilha fácil 2km, leve água e tênis.",nst:"Subi a trilha de 1h num sábado fresco e vi toda Mantiqueira em dia claro. Peguei goiaba selvagem no caminho, aventura urbana total. Melhor escape da selva de pedra.",nt:"Pegue ônibus 183T da Lapa até Torcedor Franco, trilha fácil 2km, leve água e tênis.",v:["hidden"],r:"g",d:30,c:[],nn:"Pico do Jaraguá — mirante na mata atlântica",ns:"Mirante grátis no pico mais alto de SP com trilha e vista da Serra da Cantareira."}];

,{id:37,n:"Parque Villa-Lobos Free Walks",a:"Lapa",v:["beautiful","free entry","quiet"],d:90,s:"732,000 m² of Atlantic Forest and open air with zero tourists",st:"Unlike Ibirapuera's crowds, Villa-Lobos is where paulistanos actually spend their mornings: running, cycling, or sitting in silence under real trees. Free entrance. Forest trails, river walks, Saturday markets. The light at 6am is perfect.",im:"Morning mist through Atlantic Forest canopy, the smell of wet earth and eucalyptus, joggers emerging like ghosts.",t:"Open 5:30am-7pm daily. Bring water. Saturday mornings have informal markets. Best to visit before 9am. The bike path is excellent.",c:[],r:"g",nn:"Parque Villa-Lobos",ns:"Floresta Atlântica urbana e gratuita",nst:"Parque Villa-Lobos tem 732 mil metros quadrados de natureza. Os paulistanos vêm aqui correr, pedalar, caminhar. Sem turistas. Floresta de verdade.",nt:"Aberto 5:30am-7pm. Chegue cedo. Leve água."},
{id:38,n:"Beco do Batman Deep Dive",a:"Vila Madalena",v:["weird","beautiful","local"],d:60,s:"Before 10am: when every inch of wall is fresh art and no selfie-sticks exist",st:"The Batman Alley gets tourists by afternoon. Come at 9am. Walls change weekly—street artists paint over yesterday's work. You're watching an urban DNA conversation. Walk to Horácio Lane (fewer crowds, better murals). The whole Vila Madalena neighborhood is a canvas.",im:"Paint-thick walls glowing in early light, the smell of fresh spray paint, the ghostly quiet before the crowds.",t:"Go 8-10am weekdays. Bring good shoes; cobblestones are brutal. The alleys around São Paulo Cemetery have better murals now. Get lost intentionally.",c:[],r:"g",nn:"Beco do Batman",ns:"Galeria de rua antes das 10am",nst:"As paredes do Beco do Batman mudam toda semana. Artistas paulistas e internacionais pintam sobre a noite anterior. Você vê arte em processo vivo.",nt:"Chegue cedo, 8-10am. Ruas de paralelepípedos. Horácio Lane tem murais melhores."},
{id:39,n:"Liberdade Japantown Market Saturday",a:"Liberdade",v:["local","weird","free entry"],d:120,s:"Largest Japanese community outside Japan meets São Paulo on weekends",st:"Feira da Liberdade happens every Saturday and Sunday outside the Liberdade metro station. Osaka meets São Paulo here: ramen stalls, yakisoba vendors, Japanese crafts, origami, the scent of seven cuisines at once. July brings Tanabata—paper wishes hung everywhere. Entry is free. Eat standing up.",im:"The steam from a thousand food carts, paper lanterns swaying, the particular shriek of Japanese vendors and Portuguese laughter mixing.",t:"Come 10am-2pm for best food selection. Bring cash only. The Japão-Liberdade metro exit puts you right in it. Saturdays more crowded; Sundays quieter.",c:[],r:"g",nn:"Liberdade Feira",ns:"Maior comunidade japonesa fora do Japão",nst:"Feira da Liberdade acontece sábados e domingos. Osaka encontra São Paulo aqui. Ramen, yakisoba, artesanato japonês. Em julho, Tanabata com desejos de papel.",nt:"Chegue 10am-2pm. Dinheiro apenas. Metro Japão-Liberdade."},
{id:40,n:"Parque Estadual Cantareira Hiking",a:"North São Paulo",v:["beautiful","history","hidden"],d:180,s:"Mountains 30 minutes from the city center with views of 10 million people below",st:"Cantareira State Park is where paulistanos hike when they need to disappear. The Pedra Grande trail is 4.6 stars: mostly paved, rewarding, the view is the whole city glittering below. Atlantic Forest. Real silence. Small entrance fee (R$19, free under 12 and over 60). Go early; the air is cleaner before noon.",im:"The city spreading below like a circuit board, morning mist in the valleys, the sudden awareness of being outside the machine.",t:"Entrance R$19. Bring water and snacks. Pedra Grande trail is the most famous. Go 7am to beat crowds and heat. Best Oct-Mar (cooler).",c:[],r:"g",nn:"Parque Cantareira",ns:"Montanhas perto do centro e uma visão inteira da cidade",nst:"Parque Estadual da Cantareira é floresta e silêncio. A trilha Pedra Grande: 4.6 estrelas. A vista é São Paulo inteira brilhando abaixo.",nt:"R$19 entrada. Leve água. 7am é ideal."},
{id:41,n:"SESC Pompeia Industrial Design",a:"Pompeia",v:["history","beautiful","weird"],d:120,s:"A 1920s drum factory transformed by Lina Bo Bardi into a monument to possibility",st:"SESC Pompeia is architecture as a kind of faith: a former industrial shed, a red brick ghost from the 1920s, now contains three impossible towers connected by aerial walkways. It's free. Lina Bo Bardi designed it in 1982 for the working-class people of São Paulo. It's used. You'll see actual humans dancing, swimming, creating art. Rooftop views of the city at dusk.",im:"Red brick and impossible concrete, people moving across sky-bridges, the particular light of industrial São Paulo.",t:"Free entrance for exploring. Some activities cost. Go on a weekday morning when it's less crowded. The building tour itself is worth hours.",c:[],r:"g",nn:"SESC Pompeia",ns:"Fábrica de 1920 virada monumento de possibilidade",nst:"SESC Pompeia foi transformado por Lina Bo Bardi. Três torres de concreto conectadas por passarelas aéreas. Gratuito. Pessoas dançam, nadam, criam arte dentro.",nt:"Entrada gratuita. Manhã de segunda-sexta é melhor."},
{id:42,n:"Pinacoteca Luz Gardens Free Saturdays",a:"Bom Retiro",v:["beautiful","hidden","free entry"],d:90,s:"Brazil's oldest art museum with a sculpture garden that's rarely crowded",st:"The Pinacoteca do Estado (1905) has free admission every Saturday and offers Jardim da Luz: a 18th-century botanical garden with sculptures. Most paulistanos don't know this. The light through the garden paths is yellow and patient. Tree canopies are ancient.",im:"Dappled light on old sculptures, the smell of wet stone and earth after rain, the sound of your own footsteps.",t:"Free Saturdays. Also free 2nd Sunday of each month. Bring a book. The garden is separate from the galleries and never crowded. Early morning (8am) is perfect.",c:[],r:"g",nn:"Pinacoteca Luz",ns:"Museu mais antigo do Brasil com jardim escultura",nst:"Pinacoteca do Estado tem entrada gratuita sábados. Jardim da Luz é século 18. Esculturas e árvores antigas. Poucos paulistanos sabem.",nt:"Gratuito sábados. 2º domingo mês também. 8am é ideal."},
{id:43,n:"Santa Cecília Nightfall Markets",a:"Santa Cecília",v:["local","weird","quiet"],d:120,s:"The hipster heartbeat of São Paulo where craft beer meets working-class São Paulo",st:"Santa Cecília is São Paulo's most confusing neighborhood: gritty old apartment blocks next to craft cocktail bars, a Sunday market with pastel and sugarcane juice, street art on falling buildings. Walk from Julio Prestes station to the market near the subway station. You're seeing São Paulo as paulistanos actually live it: unfinished, raw, alive.",im:"The smell of pastel frying and sugarcane juice, graffiti on century-old stonework, the particular feeling of a neighborhood still becoming itself.",t:"Sunday mornings for the market. Evenings have informal bars and street life. The Julio Prestes concert hall is nearby (sometimes free performances). Walk with intention; some areas aren't safe at night.",c:[],r:"g",nn:"Santa Cecília",ns:"Coração hipster e São Paulo verdadeira",nst:"Santa Cecília mistura prédios antigos, bares artesanais, e mercado de domingo. Pastel e caldo de cana. São Paulo como paulistanos vivem.",nt:"Domingos pela manhã para mercado. Leve dinheiro pequeno."},
{id:44,n:"Minhocão Street Festival Sundays",a:"Multiple",v:["local","beautiful","weird"],d:90,s:"A 2.2-mile elevated freeway closes to cars and becomes the city's largest pedestrian zone",st:"The Minhocão is how it sounds: a worm. A 1970s raised freeway, now mostly unused, closes to traffic Sunday mornings and some weekday evenings. Hundreds of paulistanos walk, run, cycle, skateboard, sit, and talk. The murals on the building sides are massive and constantly changing. You can see the city from above the city.",im:"Murals the size of buildings flashing past, the sound of a thousand skateboard wheels, the smell of street food vendors and exhaust finally gone.",t:"Sundays for the best crowds and festival atmosphere. Some weekday evenings (9pm+) also open. The walk is 2.2 miles; bring water. Free.",c:[],r:"g",nn:"Minhocão",ns:"Estrada elevada virada parque de domingo",nst:"Minhocão é uma estrada elevada de 1970. Fecha para carros domingos. Murais gigantes. Centenas de paulistanos caminham, correm, skateboard.",nt:"Domingos para melhor atmosfera. 2.2 milhas. Leve água."},
{id:45,n:"Largo da Batata Weekday Dusk",a:"Pinheiros",v:["local","quiet","beautiful"],d:60,s:"The actual plaza where young São Paulo happens before nightfall",st:"Largo da Batata isn't beautiful in a postcard way. It's a working plaza: students studying, young people gathering, the light turning gold at 5pm. Nearby shops sell records, vintage clothes, books. The bars fill at dusk. You're witnessing São Paulo's younger self before it parties.",im:"Gold light on stone, the smell of coffee from small bars, the low hum of a city waking up for the night.",t:"Go 4-6pm. Sit at a bar or on the plaza. Walk to the adjacent Rua dos Pinheiros for vintage shops and street life. It's not fancy; it's real.",c:[],r:"g",nn:"Largo da Batata",ns:"Praça onde São Paulo jovem acontece",nst:"Largo da Batata é plaza de trabalho: estudantes, jovens, luz dourada. Bares próximos. Lojas de vinil e roupas vintage.",nt:"Vá 4-6pm. Sente em um bar. Caminhe por Rua dos Pinheiros."},
{id:46,n:"Água Branca Park Weekend Market",a:"Lapa",v:["local","beautiful","free entry"],d:120,s:"An urban oasis with a farmer's market where paulistanos actually buy groceries",st:"Parque da Água Branca is in the heart of the city but feels separate from it. Weekend market (Saturday mornings) is where locals source organic vegetables, cheeses, crafts. It's not touristy. It's a real market. The park itself has trails, a pond, birds. The light is good. Locals bring their kids and dogs.",im:"Stalls of purple tomatoes and bright peppers, the smell of earth and fresh bread, people carrying baskets like they have time.",t:"Go Saturdays 7am-2pm for market. The park is open daily, free. Trees are old. Bring a bag. Arrive early for best selection. Have cafezinho at the café.",c:[],r:"g",nn:"Parque Água Branca",ns:"Oásis urbano com mercado de verdade",nst:"Parque da Água Branca tem mercado sábados onde paulistanos compram. Legumes orgânicos, queijo. Não é turístico. É de verdade.",nt:"Sábados 7am-2pm para mercado. Parque sempre gratuito."},
{id:47,n:"Largo do Arouche Early Morning",a:"Centro",v:["weird","history","local"],d:60,s:"Downtown São Paulo's strangest plaza: underground bars, drag queens, night workers at dawn",st:"Arouche Square is where São Paulo's night ends and day begins. It's a plaza of contrasts: historic 19th-century facade, underground gay bars, night workers, early morning street vendors. The energy at 6am is specific: tired, human, alive. It's not safe to glamorize, but it's undeniably real São Paulo.",im:"The particular sadness and aliveness of night-shift workers heading home, dawn light on 100-year-old buildings, the smell of cheap coffee.",t:"Go 6-8am to see the shift change. It's safe in the early morning. The surrounding streets have independent bookstores, vintage shops. Not for everyone; it's raw.",c:[],r:"g",nn:"Largo do Arouche",ns:"Madrugada paulistana contra alvorada",nst:"Largo do Arouche é onde a noite de São Paulo termina e o dia começa. Praça com contrastes: fachadas de 1800s, bares gays subterrâneos.",nt:"Vá 6-8am. Seguro pela manhã. Casarões históricos."},
{id:48,n:"Pinheiros River Walk Sunset",a:"Pinheiros",v:["quiet","beautiful","hidden"],d:90,s:"The river most paulistanos never see: a path where the city finally stops talking",st:"Most of São Paulo's rivers are hidden, channeled underground. The Pinheiros has a bike and walking path that few tourists find. At sunset, it's people cycling slowly, the light turning copper on the water, the sound of evening birds. It's not romantic, but it is peaceful. The path connects to larger greenways.",im:"Copper light on polluted-but-living water, the sound of evening traffic fading, the silhouettes of bridge arches.",t:"Best Oct-Mar (fewer bugs). Go 5-7pm. Bring water. Sundown on the path is quiet. Bike rentals available nearby. Not all of the path is equally safe; stick to main sections.",c:[],r:"g",nn:"Rio Pinheiros",ns:"Caminho onde São Paulo finalmente silencia",nst:"Rio Pinheiros tem uma trilha que poucos encontram. Ao entardecer: pessoas ciclando, luz cobre na água, som de pássaros.",nt:"Melhor out-mar. 5-7pm. Leve água."}}];

  {id:1,title:"Museums and Culture: S\u00e3o Paulo's Artistic Wealth",desc:"Experience S\u00e3o Paulo's museum scene. Visit MASP for revolutionary architecture and Latin American art. Explore Pinacoteca for Brazilian art history. Visit Instituto Tomie Ohtake for contemporary practice. See how museums shape cultural identity.",places:[1, 2, 8],time:"5 hours"},
  {id:2,title:"Bohemian S\u00e3o Paulo: Pinheiros and Alc\u00e2ntara",desc:"Experience artistic neighborhoods. Walk Pinheiros' street art and galleries. Discover independent restaurants and boutiques. Venture to Alc\u00e2ntara to see gentrification in progress. Understand S\u00e3o Paulo's creative scene.",places:[3, 10],time:"5 hours"},
  {id:3,title:"Cultural Institutions: Theater, Music, Dance",desc:"Experience performing arts institutions. Visit Theatro Municipal for architectural grandeur. Explore Bixiga's experimental theater venues. See Museu de Artes da Dan\u00e7a. Attend performance if possible.",places:[14, 18, 27],time:"4 hours"},
  {id:4,title:"Japanese-Brazilian Identity: Liberdade",desc:"Immerse in world's largest Japanese diaspora. Explore Liberdade's markets, restaurants, temples. Eat authentic Japanese food at any price. Understand immigration's cultural impact.",places:[4],time:"3 hours"},

<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — São Paulo Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
