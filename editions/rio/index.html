<script>
const P = [{id:1,n:"Christ the Redeemer — Cristo Redentor",a:"Corcovado",v:["history","views","art"],d:40,s:"An Art Deco monument standing 98 feet tall, opened in 1931, overlooking the entire city from Corcovado mountain.",st:"Completed in 1931 after nearly a decade of construction, Cristo Redentor emerged from a partnership between Brazilian engineer Heitor da Silva Costa and French designer Paul Landowski. The monument was funded by donations and has become synonymous with Rio itself. Standing atop Corcovado mountain, at 2,300 feet elevation, it watches over a city that sprawls below in all directions—the Atlantic coastline glittering in one direction, the granite peaks of the Serra da Carioca in another. Locals rarely climb to the top, but visitors from around the world queue for hours to touch its stone feet and feel the weight of history beneath their hands.",im:"A lone climber reaches the summit platform as dawn breaks, the statue silhouetted against a salmon-pink sky, with Ipanema beach emerging from the morning mist below.",t:"Take the cog train from Estação de Corcovado (15 min to summit). Go early morning to avoid crowds and heat. Bring water. The site is accessible to those with mobility limitations.",c:[],r:"g",nn:"Cristo Redentor",ns:"Monumento icônico com vistas panorâmicas da cidade",nst:"Construído em 1931, é um símbolo de fé e resistência que vigia o Rio há décadas, criando um elo espiritual entre a população e a natureza.",nt:"Trem de cremalheira desde a Estação de Corcovado. Leve água e chegue cedo para evitar multidões. Acessível para pessoas com mobilidade reduzida."},{id:2,n:"Copacabana Beach — Praia de Copacabana",a:"Copacabana",v:["beautiful","local","views"],d:20,s:"A 2.3-mile curve of white sand and black and white mosaic promenade, one of the world's most iconic beaches where cariocas have gathered since the 1920s.",st:"Copacabana transformed from a fishing village to a beach mecca in the 1920s when tycoon Henrique Dodsworth envisioned a grand resort destination. The neighborhood boomed during Rio's heady mid-20th century, when the beach became the stage for Brazil's cultural explosion—samba emerged here, bossa nova was born in its bars, and the famous New Year's Eve celebrations began in 1941, now drawing two million people annually. Walk the mosaic promenade at dawn when local joggers and fishermen own the space, or sit at a beachside boteco and watch the Atlantic light change across the water as you sip a caipirinha.",im:"An elderly vendor arranges fresh coconuts in neat rows at sunrise, their golden husks glowing against the grey sand, as a few early swimmers emerge from the glassy water.",t:"Metro directly to Copacabana station. The beach is patrolled by lifeguards. Best swimming areas are marked. Bring cash for vendors. Bring a strong sunscreen. Avoid displaying expensive items.",c:[],r:"g",nn:"Praia de Copacabana",ns:"Praia lendária com águas quentes e vida cultural vibrante",nst:"Durante décadas, Copacabana foi o coração da vida carioca, palco de encontros românticos e celebrações que moldaram a cultura brasileira.",nt:"Metrô direto até a estação Copacabana. Nadadeiras seguras e marcadas. Traga dinheiro para vendedores e protetor solar forte."},{id:3,n:"Ipanema Beach — Praia de Ipanema",a:"Ipanema",v:["beautiful","local","food"],d:30,s:"A sophisticated beach neighborhood where bossa nova was born, fronted by white sand and surrounded by art galleries, upscale restaurants, and lively cafés.",st:"In 1957, two Brazilians—João Gilberto and guitarist João Gismonti—were walking along Ipanema's shore when inspiration struck: the smooth, sophisticated sound of bossa nova was born right there on this very beach. The neighborhood became an artistic haven, attracting poets, painters, and musicians who gathered at the beach bars and cafés. By the 1960s, Ipanema had replaced Copacabana as Rio's cultural epicenter. Today, the beach retains that bohemian spirit—you'll see groups of men playing frescobol (a paddleball game), vendors selling tropical fruits, and the ever-present street musicians reminding passersby of the neighborhood's musical heritage.",im:"An elderly guitarist sits beneath a striped umbrella, playing for handful of listeners as the afternoon sun casts long shadows across the white sand and families wade in turquoise water.",t:"Bus 464 or 472 to Ipanema. Parking is difficult; metro and buses are best. The beach is calm for swimming. Dozens of beach vendors sell food, drinks, and ice cream. Arpoador area (western end) has better waves for surfers.",c:[],r:"g",nn:"Praia de Ipanema",ns:"Berço da bossa nova e santuário da sofisticação carioca",nst:"Aqui nasceu a bossa nova em 1957, transformando-se no coração artístico do Rio, onde poetas e músicos ainda se reúnem para criar.",nt:"Ônibus 464 ou 472 para Ipanema. A praia é calma para nadar. Muitos vendedores de alimentos e bebidas. Extremidade oeste tem melhores ondas para surfe."},{id:4,n:"Sugarloaf Mountain — Pão de Açúcar",a:"Urca",v:["history","views","beautiful"],d:35,s:"A dramatic 1,300-foot granite and quartz monolith accessible by two cable cars offering 360-degree views of Rio, the bay, and the surrounding mountains.",st:"Named Pão de Açúcar by Portuguese colonists who fancied its resemblance to the refined sugar loaves that arrived from their homeland, this iconic peak has watched over Rio for five centuries. The cable car itself is an engineering marvel—opened in 1912, it was one of the first of its kind in the world. Ride it at dusk when the city lights begin to twinkle, and you'll understand why cariocas call this their crown jewel. The upper station sits at 3,000 feet, offering unobstructed views of Christ the Redeemer in the distance, Copacabana curving along the shore, and Guanabara Bay stretching out like an inland sea.",im:"A couple stands at the observation platform at sunset as Rio spreads beneath them in shades of amber and violet, the cable car visible below against the dark mountain face.",t:"Cable car operates 8am-8pm from Praia Vermelha station in Urca. Arrive early for first trip or after 5pm to avoid crowds. Bring a light jacket as winds are strong. The lower station can be reached by bus 511 or a short taxi ride from Copacabana.",c:[],r:"g",nn:"Pão de Açúcar",ns:"Monumento geológico singular com vistas incomparáveis",nst:"O teleférico, aberto em 1912, foi um dos primeiros do mundo, levando visitantes aos 1000m de altura para contemplar a beleza da baía de Guanabara.",nt:"Teleférico funciona 8h-20h da estação da Praia Vermelha em Urca. Chegue cedo ou após 17h. Traga jaqueta leve. Ônibus 511 ou táxi do Leblon."},{id:5,n:"Maracanã Stadium — Estádio do Maracanã",a:"São Cristóvão",v:["history","local"],d:25,s:"Built in 1950 for the World Cup, this stadium once held 200,000 spectators and remains Brazil's most emotionally resonant sporting venue.",st:"The Maracanã was constructed in just 18 months to host the 1950 FIFA World Cup, a time when Brazil believed itself on the verge of a football revolution. The final match—Brazil versus Uruguay—is still discussed with a mixture of pride and heartbreak among older cariocas, as Uruguay's unexpected victory devastated a nation that had dreamed of its first World Cup. The stadium has since hosted countless pivotal moments: the 1978 FIFA World Cup, innumerable Flamengo and Vasco da Gama derbies, concerts by The Rolling Stones and U2. Renovated extensively for the 2014 World Cup and 2016 Olympics, the stadium still carries the weight of these histories in its every corner.",im:"A street vendor sells cold beer outside the stadium gates as fans in green and yellow shirts stream past, their voices blending into a roar that echoes off the walls.",t:"Located in São Cristóvão, a 10-minute metro ride from Centro. Stadium tours available on non-match days (check ahead). Take an official tour rather than exploring alone. Visit the museum for football history. Match days create heavy traffic and crowds.",c:[],r:"g",nn:"Estádio do Maracanã",ns:"Templo do futebol onde histórias de glória e tristeza se entrelaçam",nst:"Construído em 1950, abrigou o coração partido de uma nação quando o Uruguai venceu a final, mas permanece sagrado para os torcedores brasileiros.",nt:"Metrô para São Cristóvão. Passeios no estádio disponíveis em dias sem jogos. Visite o museu para história do futebol. Dias de jogo criam trânsito pesado."},{id:6,n:"Lapa District — Bairro da Lapa",a:"Lapa",v:["history","night","art"],d:25,s:"A bohemian neighborhood with 18th-century colonial architecture, iconic street art, samba clubs, and the famous Lapa Steps—a cultural mecca for music and nightlife.",st:"Lapa's history is layered like the paint on its walls. Once Rio's red-light district in the early 20th century, it transformed into a haven for artists and musicians by mid-century. The Arcos de Lapa (aqueduct built in 1750) presides over the neighborhood like a guardian spirit. In the 1970s, when samba was under threat from military censorship, Lapa became a refuge where the music survived—in small clubs, on street corners, in the hearts of its residents. Today, the neighborhood pulses with creative energy. Walk the Escadaria Selarón (Selaron Steps)—a thousand-step staircase hand-decorated by a Chilean artist with colorful tiles—and you'll understand why artists have always been drawn here.",im:"A street musician plays saxophone on the cobblestones beneath the Arcos de Lapa at dusk, his silhouette framed by the colonial arches and city lights beginning to glow.",t:"Metro to Lapa station. The neighborhood is lively at night but exercise caution. Best visited after 5pm when samba clubs open. Join a walking tour to understand its history. The Escadaria Selarón attracts crowds during day—climb early or late.",c:[],r:"g",nn:"Bairro da Lapa",ns:"Coração artístico do Rio onde samba e história pulsam nas ruas",nst:"Refúgio da samba durante tempos sombrios, Lapa ressurgiu como santuário da criatividade, onde arte muralista e música se entrelaçam em cada esquina.",nt:"Metrô até Lapa. Bairro animado à noite, mas com cautela. Melhor visitado após 17h quando os clubes abrem. Escadaria Selarón: suba cedo ou tarde para evitar multidões."},{id:7,n:"Botanical Garden — Jardim Botânico",a:"Botafogo",v:["nature","beautiful","hidden"],d:45,s:"Founded in 1808, this 340-acre tropical garden contains 6,500 plant species, serene pathways, and a hidden monastery with historical significance.",st:"Prince João VI, fleeing Napoleon's forces, arrived in Rio in 1808 and established this botanical garden as both a scientific endeavor and a refuge. The garden was designed to acclimatize tropical plants and study their medicinal properties—a living library of Brazil's botanical wealth. Two centuries later, it remains a sanctuary within the city. The main avenue is lined with towering royal palms planted in the 1850s; a meditation lake reflects the surrounding jungle canopy; hidden grottos and fountains surprise you around every corner. The small monastery tucked into one corner, built in the 1780s by monks seeking solitude, still stands as a testament to spiritual seeking.",im:"A woman in a white dress walks beneath a tunnel of towering green palms, dappled sunlight creating a path of shadows across the stone walkway.",t:"Bus 474 to the entrance or taxi/Uber from Leblon. Allow 2 hours minimum. The garden is flat and easy to walk. Bring water and insect repellent. The lake area is particularly peaceful in early morning. Guided tours available.",c:[],r:"g",nn:"Jardim Botânico",ns:"Oásis tropical de tranquilidade e contemplação",nst:"Fundado em 1808 pelo Príncipe João VI, abriga 6500 espécies de plantas e um mosteiro secreto que convida ao repouso espiritual.",nt:"Ônibus 474 ou Uber. Permita 2 horas mínimo. Terreno plano e fácil de caminhar. Leve água e repelente de insetos. Passeios guiados disponíveis."},{id:8,n:"Centro (Historic Downtown) — Centro Histórico",a:"Centro",v:["history","architecture","art"],d:30,s:"Rio's oldest neighborhood preserves 400 years of Portuguese colonial, imperial, and modernist architecture, including palaces, churches, and cultural institutions.",st:"Walk through Centro and you walk through time itself. The Praça XV de Novembro, once the colonial city's heart, still radiates with history—it was here that Dom Pedro II ruled Brazil's empire. The Cathedral, completed in 1976, sits boldly modern against the surrounding colonial facades. The Biblioteca Nacional, built in 1910, houses over 9 million volumes—Portugal's royal library was transferred here when the Portuguese court fled to Rio in 1808. The Teatro Municipal, opened in 1909, hosted performances by Sarah Bernhardt and Nijinsky. Every corner holds stories: the street where slaves were traded centuries ago, the corner where independence was declared, the building where Machado de Assis—Brazil's greatest writer—spent his final years.",im:"Afternoon light streams between tall colonial buildings onto a square where a vendor arranges fresh açaí bowls, tourists study maps, and a street musician plays guitar beneath a building's ornate balcony.",t:"Metro to Centro station. The neighborhood requires daylight visits; exercise caution at night. Join a historical walking tour to understand the layered history. The Cathedral's modernist interior is striking. Visit the Biblioteca Nacional's reading room.",c:[],r:"g",nn:"Centro Histórico",ns:"Coração antigo de Rio onde séculos de história convergem",nst:"400 anos de história colonial, imperial e modernista se revelam a cada passo, desde a Praça XV até a majestosa Biblioteca Nacional.",nt:"Metrô até Centro. Visite durante o dia. Passeio histórico recomendado. Cathedral's interior é impressionante. Biblioteca Nacional's sala de leitura é imperdível."},{id:9,n:"Estácio District — Bairro de Estácio",a:"Estácio",v:["history","local","food"],d:20,s:"The birthplace of modern samba, this working-class neighborhood created the sound that defines Brazil, where samba schools are born and samba's soul still pulses.",st:"In the early 1900s, former slaves and poor migrants clustered in the hills of Estácio and created something entirely new: modern samba. In 1928, the neighborhood's samba schools, led by Mangueira, formally organized and paraded for the first time in what would become Rio's Carnival tradition. The Estácio neighborhood, often overlooked by tourists, remains the true heart of samba culture—less polished than the official Carnival parade, more authentic in its street celebrations and community percussion sessions. Walk these hills at night during Carnival season and you'll hear the heartbeat of Brazil itself echoing off the buildings.",im:"A street corner erupts in impromptu samba dancing as a drummer sets the rhythm on a plastic bucket, onlookers clapping, a vendor selling frozen drinks catching the moment.",t:"Bus routes 298 and 327 serve the neighborhood. Best visited during Carnival season (February-March). Exercise caution at night. Join a local guide tour to understand the samba schools. The local bars and street food are authentic.",c:[],r:"g",nn:"Bairro de Estácio",ns:"Berço do samba moderno onde a alma brasileira bate",nst:"Em 1928, as escolas de samba nascem aqui, criando a tradição do Carnaval que perdura até hoje como celebração da cultura afro-brasileira.",nt:"Ônibus 298 e 327. Melhor visitado durante Carnaval. Cuidado à noite. Passeios com guia local recomendados. Comida de rua autêntica."},{id:10,n:"Rocinha Favela — Comunidade Rocinha",a:"São Conrado",v:["local","hidden","architecture"],d:30,s:"South America's largest favela, home to 100,000 residents, visible from Christ the Redeemer—a complex community requiring respectful, guided exploration.",st:"Rocinha grew organically from the 1940s onward, as rural Brazilians arrived seeking work in the booming city. What Western media often portrays as a 'slum' is actually a thriving, self-organized community with schools, businesses, churches, and deep social networks. The houses, painted in bright blues, yellows, and pinks, cascade down the mountainside in an organic architecture born of necessity and ingenuity. A responsible tour—led by someone from the community—offers insights into real life here: the underground market economy, the informal governance systems, the music and art that flourish amid hardship. This is not tourism to gawk at poverty, but an opportunity to understand a crucial part of Rio's social reality.",im:"A narrow path winds between colorful houses stacked vertically up the hillside, laundry strung between buildings, children playing soccer in a small clearing with Guanabara Bay glinting far below.",t:"Only visit with a registered community guide (not street tours). Guides can be arranged through hotels or booking platforms. Go during daylight only. Be respectful with cameras—ask permission before photographing residents. Expect narrow, steep walkways.",c:[],r:"g",nn:"Comunidade Rocinha",ns:"Comunidade vibrante de 100,000 pessoas com arquitetura espontânea",nst:"Nascida nos anos 1940, Rocinha é um organismo social complexo onde criatividade e resiliência se tecem nas cores das casas que cobrem a montanha.",nt:"Visite apenas com guia comunitário registrado. Guias disponíveis em hotéis. Apenas durante o dia. Respeite os residentes ao fotografar. Caminhos estreitos e íngremes."},{id:11,n:"Vidigal Favela — Morro da Vidigal",a:"São Conrado",v:["local","views","art"],d:25,s:"A smaller, more accessible favela community than Rocinha, with stunning city views, street art, and a reputation as an artistic haven.",st:"Vidigal, perched on a hilltop overlooking Leblon Beach, has become known in recent years as a hub for artist-activists and cultural initiatives. While still a working-class community with its share of challenges, Vidigal has attracted young artists, photographers, and musicians who've contributed vibrant street art and community programming. The climb to the top reveals painted murals, galleries in modest homes, and viewpoints that rival any paid tourist destination. The community has grown more welcoming to respectful visitors, and several bars and cafés cater to those seeking authentic Rio experiences beyond the beachfront tourist zones.",im:"A street artist applies final touches to a massive mural of a woman's face, her expression serene and powerful, the city sprawling behind in the afternoon light.",t:"Enter from Rua Dois de Dezembro near Leblon. Can also take a helicopter tour that departs from nearby. Go with a local guide or join a group tour. The walk up is steep but manageable. Visit during daylight. Support local businesses by purchasing food and drinks.",c:[],r:"g",nn:"Morro da Vidigal",ns:"Comunidade artística com vistas espetaculares da cidade",nst:"Transformada por artistas e ativistas, Vidigal oferece murais vibrantes, cafés autênticos e perspectivas que rivais as melhores vistas turísticas.",nt:"Entrada pela Rua Dois de Dezembro perto de Leblon. Caminhada íngreme mas acessível. Visite com guia ou em grupo. Apenas durante o dia. Apoie negócios locais."},{id:12,n:"Petropolis City — Cidade de Petrópolis",a:"Petrópolis (Day Trip)",v:["history","architecture","hidden"],d:480,s:"A mountain retreat 40 miles north, built as the imperial summer palace in the 1840s, with European architecture, cool climate, and the Petropolis Cathedral.",st:"In 1843, Emperor Pedro II commissioned Petropolis as an escape from Rio's sweltering heat—a 'Switzerland in the Tropics.' European architects and craftsmen were brought in to construct a city of grand palaces, churches, and villas in an alpine style that seemed impossibly transplanted to Brazil. The Palácio Imperial (Imperial Palace), completed in 1862, served as the royal residence during summer months and witnessed key moments in Brazilian history—including the signing of the Golden Law, which abolished slavery in 1888. Today, Petropolis feels frozen in time: grand mansions line tree-shaded avenues, the cathedral's twin spires pierce the mountain mist, and the river runs crystal clear through town. Visitors often spend a day here, feeling they've stepped into 19th-century Europe.",im:"A tourist climbs the cathedral steps as afternoon light catches the twin spires, mountains rising misty in the background, horse-drawn carriages waiting at the plaza below.",t:"Bus or car from Rio (1.5 hours). The mountain climate is noticeably cooler. Petropolis can be crowded on weekends. Visit on a weekday if possible. The Cathedral and Imperial Palace are the main attractions. Excellent restaurants and cafés throughout the town. Return to Rio before dark.",c:[],r:"g",nn:"Cidade de Petrópolis",ns:"Retiro imperial europeu suspenso nas montanhas",nst:"Construída em 1843 como refúgio de verão imperial, Petropolis preserva a elegância arquitectónica de um século passado nas suas ruas arborizadas.",nt:"Ônibus ou carro do Rio (1.5 horas). Clima montanhoso notavelmente mais fresco. Visite em semana se possível. Catedral e Palácio Imperial são principais. Ótimos restaurantes."},{id:13,n:"Escadaria Selarón — Selarón Steps",a:"Lapa",v:["art","beautiful","history"],d:25,s:"A 125-meter staircase in Lapa hand-decorated with over 2,000 ceramic tiles by Chilean artist Jorge Selarón over 25 years.",st:"Jorge Selarón, a Chilean painter who arrived in Rio in 1987, fell in love with the city and decided to give back. He took over an abandoned staircase in Lapa and, over 25 years, single-handedly transformed it into an art installation of breathtaking beauty—each of the 250 steps decorated with hand-painted and donated tiles. Selarón used tiles from around the world: Portuguese azulejos, Italian mosaics, Brazilian ceramics, each one deliberately placed like a master craftsman. He worked for free, funding the project through painting and odd jobs. The steps became an open-air gallery, a meditation on immigration, belonging, and artistic dedication. Tragically, Selarón died in his home in 2013, but the steps remain his masterwork—a stairway to heaven painted in ten thousand colors.",im:"A barefoot child runs up the ceramic steps, each tile glowing in different colors—blues, reds, yellows, greens—creating a rainbow path climbing the hillside.",t:"Metro to Lapa, then a 10-minute walk. The steps are steep—wear good shoes. Go early morning to avoid crowds and get the best light for photos. The steps can get slippery in rain. Respectful behavior required—this is an active art installation.",c:[],r:"g",nn:"Escadaria Selarón",ns:"Escadaria de arte com 2000 azulejos transformada por um artista chileno",nst:"Durante 25 anos, Jorge Selarón dedicou-se a transformar uma escadaria abandonada numa obra-prima de arte comunitária, cada azulejo uma história de amor pela cidade.",nt:"Metrô até Lapa. Escadaria íngreme. Visite cedo para evitar multidões e melhor luz. Pode escorregar em dias de chuva. Comportamento respeitoso requerido."},{id:14,n:"Carnival Museum — Museu do Carnaval",a:"Centro",v:["history","art","local"],d:45,s:"A repository of Rio Carnival's 100-year history featuring costumes, floats, photographs, and cultural artifacts celebrating Brazil's most important cultural event.",st:"The Carnival Museum captures the essence of Rio's most feverish celebration. The first official Carnival parade occurred in 1928 in Estácio, and the tradition has grown into a global phenomenon. The museum displays elaborate costumes worn by carnival queens and dancers, towering headdresses decorated with feathers and crystals that took months to create, photographs of legendary performers, and installations that immerse visitors in the rhythm and color of the festival. You learn that Carnival is not just a tourist spectacle but a spiritual and cultural moment where class differences temporarily dissolve, where Brazilian identity is performed and renewed. The museum offers context to understand what you see on television, revealing the artistry and months of preparation behind those fleeting moments of television glory.",im:"A massive carnival costume—featuring a headdress of peacock feathers and a bodice covered in hand-sewn crystals—stands alone in a glass case under theatrical lighting.",t:"Located in Centro, near Praça Onze. Metro to Uruguaiana station. Admission required. Allow 1-2 hours. The museum can be crowded during Carnival season; visit before or after for a more reflective experience. Portuguese language exhibits, but visual displays transcend language.",c:[],r:"g",nn:"Museu do Carnaval",ns:"Repositório de 100 anos de história do Carnaval carioca",nst:"O museu celebra a explosão artística e cultural que é o Carnaval, revelando os meses de preparação por trás dos momentos gloriosos.",nt:"Localizado em Centro, perto de Praça Onze. Metrô até Uruguaiana. Entrada requerida. Permita 1-2 horas. Visite antes ou depois da Carnaval para experiência mais reflexiva."},{id:15,n:"CCBB (Banco Central Cultural Center) — Centro Cultural Banco do Brasil",a:"Centro",v:["art","architecture","history"],d:35,s:"A palatial 1880s building housing rotating exhibitions of Brazilian and international contemporary art, plus a cinema and reading room.",st:"The building itself is a masterwork of Beaux-Arts architecture, completed in 1880 as the headquarters of the Bank of Brazil. When it was converted into a cultural center in 1989, it became one of Rio's most important spaces for artistic expression. The grand staircases, ornate columns, high ceilings, and multiple galleries create an atmosphere of intellectual grandeur. The exhibitions are carefully curated, ranging from photography to installations to historical retrospectives. The cinema shows art films and documentaries. The reading room contains rare books. This is where Rio's cultural elite gather, where art is taken seriously, where the building's own history as a symbol of economic power is being rewritten into a symbol of cultural democracy.",im:"A visitor stands before an abstract canvas the size of a wall, the painting's colors reflected faintly on their face as they study the artist's brushstrokes.",t:"Metro to Uruguaiana or Carioca station. Admission is free for most exhibitions (some charged). Hours are Wednesdays through Mondays, 10am-8pm. Allow 1-2 hours. Check the website for current exhibitions. The café is excellent for a break.",c:[],r:"g",nn:"Centro Cultural Banco do Brasil",ns:"Palácio cultural com exposições de arte contemporânea",nst:"Convertido em 1989 de um banco em 1880 para espaço cultural, o CCBB democratiza a arte através de exposições cuidadosamente curadas.",nt:"Metrô até Uruguaiana ou Carioca. Entrada gratuita para maioria das exposições. Aberto quarta a segunda, 10h-20h. Permita 1-2 horas. Café excelente."},{id:16,n:"Lagoa Rodrigo de Freitas — Rodrigo de Freitas Lagoon",a:"Lagoa",v:["nature","beautiful","local"],d:30,s:"A saltwater lagoon bordered by 7.5 km of paths, lined with trees, and rimmed by neighborhoods offering jogging, cycling, rowing, and contemplative walks.",st:"This lagoon, separated from the Atlantic by a narrow strip of land, has been a gathering place for cariocas for centuries. Colonial-era maps show small fishing settlements here; 19th-century poets wrote about its mirror-like surface reflecting the mountains. Today, the lagoon is ringed by a beautiful promenade where locals jog, cycle, and walk every dawn and dusk. The water supports sailboats and rowing clubs. The neighborhoods around it—Lagoa, Ipanema, Leblon—are among Rio's most desirable, but the lagoon itself remains a public space where class boundaries blur and Brazilians of all backgrounds share the same path. At sunset, when the mountains turn purple and the light softens, you understand why this place has always drawn human connection.",im:"A jogger runs along the lagoon path at dawn, the water glass-smooth and reflecting the pre-sunrise sky, mountains rising dark in the background.",t:"The path is accessible from multiple points: Leblon, Ipanema, Lagoa neighborhood. It's very safe during daylight; locals jog here throughout the day. The best times are dawn (5-7am) or sunset (5-7pm). Bring water. The neighborhoods around have cafés and restaurants.",c:[],r:"g",nn:"Lagoa Rodrigo de Freitas",ns:"Lagoa serena circundada por 7.5km de caminhos arborizados",nst:"Séculos de história se refletem nesta lagoa, onde cariocas de todas as classes compartilham o mesmo caminho ao amanhecer e entardecer.",nt:"Acessível de vários pontos: Leblon, Ipanema, bairro da Lagoa. Muito seguro durante o dia. Melhor ao amanhecer (5-7h) ou entardecer (5-7h). Leve água."},{id:17,n:"Instituto Moreira Salles — Moreira Salles Institute",a:"Gávea",v:["art","architecture","beautiful"],d:40,s:"A stunning modern glass and steel structure in a leafy neighborhood housing photography, film, and visual arts exhibitions in one of Rio's finest cultural institutions.",st:"The building itself, designed by architect Didi Contini, is a work of art—all glass walls and open spaces that dissolve the boundary between interior gallery and exterior landscape. Opened in 2006, the Moreira Salles Institute has become one of South America's finest cultural spaces. The exhibitions are intellectually rigorous and visually stunning: retrospectives of important Brazilian photographers, international contemporary art, film series, and performances. The café overlooking the gardens is peaceful, the staff knowledgeable and friendly. This is high culture presented not with pretension but with genuine passion for artistic inquiry. The location in Gávea puts it in a quieter part of Rio, removing it from tourist circuits but making it a cherished refuge for those seeking serious aesthetic experience.",im:"A visitor stands within the glass structure, surrounded by both landscape and artwork, the boundary between nature and art dissolved completely.",t:"Located in Gávea, a quiet residential neighborhood. Takes about 30-40 minutes from Copacabana via taxi or Uber. Admission is free. Open Tuesdays through Sundays. Allow 1-2 hours. The surrounding neighborhood has good restaurants and cafés.",c:[],r:"g",nn:"Instituto Moreira Salles",ns:"Instituição cultural de vidro e arte em paisagem arborizada",nst:"A arquitetura moderna de Didi Contini cria uma experiência fluida onde arte e natureza se comunicam através de paredes de vidro.",nt:"Localizado em Gávea. 30-40 minutos de Copacabana. Entrada gratuita. Aberto terça a domingo. Permita 1-2 horas. Bons restaurantes próximos."},{id:18,n:"Museu de Arte Moderna — Museum of Modern Art",a:"Centro",v:["art","history","architecture"],d:45,s:"Rio's premier modern art museum in a Modernist building with exhibitions of Brazilian and international contemporary art, design, and photography.",st:"Founded in 1948, the Museu de Arte Moderna reflects Brazil's modernist aspirations in both its collection and its architecture. The building, designed by Affonso Eduardo Reidy, sits near the water's edge in a park-like setting—a masterpiece of Modernism itself. The museum suffered a devastating fire in 1961 that destroyed much of its early collection, but it rebuilt and grew stronger. Today it houses works by Burle Marx (who also designed the gardens), Portinari, Athos Bulcão, and many others who shaped Brazil's visual culture. The permanent collection is supplemented by traveling exhibitions. The museum embodies a particular moment in Brazilian history when modernism was seen as the path to national progress, and art was a tool for nation-building.",im:"A visitor contemplates an abstract painting in a gallery overlooking the park and harbor, afternoon light streaming through the modernist windows.",t:"Located near Aterro do Flamengo park. Metro to Glória station, then a short walk. Admission is modest. Open Tuesdays through Sundays. Allow 1-2 hours. The park surrounding the museum is also pleasant for walking.",c:[],r:"g",nn:"Museu de Arte Moderna",ns:"Museu de arte contemporânea com edifício modernista",nst:"Fundado em 1948, representa as aspirações modernistas do Brasil através de sua arquitetura de Affonso Eduardo Reidy e sua coleção de arte.",nt:"Perto de Aterro do Flamengo. Metrô até Glória, curta caminhada. Entrada modesta. Aberto terça a domingo. Permita 1-2 horas. Parque agradável para caminhar."},{id:19,n:"Armazém do Gavião — Gavião Warehouse Market",a:"Saúde",v:["local","food","history"],d:20,s:"A historic market in the port district (Saúde) selling fresh fish, produce, and traditional ingredients used in Brazilian and Afro-Brazilian cooking.",st:"The Armazém do Gavião is where Rio's culinary soul is traded daily. Built in the 1950s but rooted in centuries of port commerce, this warehouse market connects Rio to its maritime history and to the Afro-Brazilian traditions that shaped its food culture. You'll find ingredients here that connect to the Middle Passage—palm oil, okra, dried fish—but also the vibrant produce of the Brazilian interior. The vendors, many of them third-generation stallholders, know their products intimately. This is where professional chefs shop, where traditional cooks gather, where food history is written in the daily commerce of feeding a city. The surrounding Saúde neighborhood has undergone gentrification, but the market remains authentic, a place where cultural and culinary traditions still matter more than tourism.",im:"A vendor arranges fresh fish on ice in the early morning light, water running across the stall, other vendors calling out their goods in rapid Portuguese.",t:"Located in the Saúde neighborhood near the port. Bus or taxi from Centro. Go early morning (6-9am) when the market is most alive and selection is best. Bring cash. It's an active working market, not a tourist attraction, so exercise respect.",c:[],r:"g",nn:"Armazém do Gavião",ns:"Mercado histórico onde tradições culinárias são preservadas",nst:"Desde os anos 1950, este armazém conecta o Rio à sua história marítima e tradições afro-brasileiras através de ingredientes e conhecimento culinário.",nt:"Bairro Saúde, perto do porto. Ônibus ou táxi do Centro. Chegue cedo (6-9h). Traga dinheiro. Mercado de trabalho ativo, não turístico."},{id:20,n:"Biblioteca Nacional — National Library",a:"Centro",v:["history","architecture","art"],d:35,s:"Brazil's largest library, opened in 1910, housing 9 million items including rare manuscripts, first editions, and the Portuguese royal collection transferred in 1808.",st:"When Portugal's royal family fled Napoleon's armies and arrived in Rio in 1808, they brought the Portuguese royal library—over a million volumes. The library remained in temporary quarters for over a century until this magnificent Beaux-Arts building was completed in 1910. The entrance hall, with its soaring columns and intricate tilework, announces that this is a temple to knowledge. The reading room is one of the most beautiful spaces in Rio—long wooden tables, high windows, an atmosphere of quiet intellectual pursuits. Holdings include incunabula (early printed books), manuscripts by Brazilian writers, maps, engravings, and rare volumes. The library represents a moment when Brazil aspired to be a cosmopolitan empire with access to the world's accumulated knowledge. Today it remains that, though now in service of public learning rather than royal privilege.",im:"A scholar sits at a wooden table in the reading room, a rare manuscript open before them, light from tall windows creating patterns across the aged pages.",t:"Located in Centro, near Praça XV. Metro to Carioca station. Free admission to the reading room. Allow 1-2 hours. The building itself is worth seeing even if you don't access the collection. Bring ID. Tours available.",c:[],r:"g",nn:"Biblioteca Nacional",ns:"Templo do conhecimento com 9 milhões de itens",nst:"Aberta em 1910, abriga a coleção real portuguesa transferida em 1808, representando as aspirações cosmopolitas do Brasil imperial.",nt:"Centro, perto de Praça XV. Metrô até Carioca. Entrada gratuita. Permita 1-2 horas. Traga ID. Passeios disponíveis."},{id:21,n:"Museu Nacional da Quinta da Boa Vista — National Museum at Quinta da Boa Vista",a:"São Cristóvão",v:["history","architecture","nature"],d:45,s:"A former royal palace in a lush park setting, housing Brazil's oldest museum with natural history, ethnography, and anthropology collections spanning millennia.",st:"The Quinta da Boa Vista was the royal family's preferred residence during their Brazilian exile (1808-1821), and the palace later became the National Museum in 1818. It is Brazil's oldest museum, housing extensive collections of natural history—fossils, meteorites, minerals—and ethnographic materials documenting indigenous Brazilian cultures and African diasporic traditions. The building itself, with its elegant portico and gardens designed by Burle Marx, is a work of art. The park surrounding it offers respite from the city, with tree-shaded pathways and peaceful spaces. Though the museum suffered damage in a recent fire (2018), restoration has been ongoing. The collections remain extraordinary: they tell the story of Brazil's natural history, its indigenous peoples, and the people brought through the slave trade.",im:"A family walks through the park toward the palace, its neoclassical façade framed by tall palms, the building glowing in afternoon light.",t:"Located in São Cristóvão. Metro to São Cristóvão station. Admission is modest. Hours vary; check ahead. The park is pleasant for a long visit (2-3 hours). The museum may have limited access due to ongoing restoration. Bring water and sunscreen.",c:[],r:"g",nn:"Museu Nacional da Quinta da Boa Vista",ns:"Palácio real transformado em museu de história natural",nst:"Residência favorita da família real em 1808, tornou-se em 1818 o museu mais antigo do Brasil, preservando séculos de história natural.",nt:"São Cristóvão. Metrô até São Cristóvão. Entrada modesta. Parque agradável para longa visita. Verificar acesso devido a restauração. Leve água e protetor solar."},{id:22,n:"Theatro Municipal — Municipal Theatre",a:"Centro",v:["architecture","history","art"],d:30,s:"A Beaux-Arts masterpiece built in 1909, hosting world-class performances of opera, ballet, and theater, with a stunning interior of marble and stained glass.",st:"Completed in 1909 during Rio's Belle Époque, the Theatro Municipal was designed to rival the great theaters of Europe. The exterior, with its green copper dome, is visible from across the city. The interior is overwhelming in its opulence—marble staircases, gilded balconies, stained glass ceiling panels depicting scenes from Dante's Inferno. The inaugural performance was a Brazilian adaptation of 'The Merchant of Venice.' The theater hosted Sarah Bernhardt, Nijinsky, and countless Brazilian and international performers who shaped cultural history. The theater remains a functioning performing arts space, hosting the Rio de Janeiro Opera Company and Brazilian ballet companies. A tour of the theater is as much about architectural appreciation as about performing arts—the building itself is the art.",im:"The interior of the theater glows in warm light—red velvet seats, golden railings, the painted ceiling depicting dramatic scenes, an orchestra warming up below the stage.",t:"Located in Centro. Metro to Cinelândia station. Guided tours available on days without performances. Attending a performance is the ultimate experience. Book ahead for shows. Dress code varies by event. The building is magnificent whether you attend a show or just take a tour.",c:[],r:"g",nn:"Theatro Municipal",ns:"Obra-prima Beaux-Arts com arquitetura esplêndida",nst:"Inaugurado em 1909, hospedou Sarah Bernhardt e Nijinsky, permanecendo como templo de artes cênicas onde arquitetura e performance se unem.",nt:"Centro. Metrô até Cinelândia. Passeios guiados disponíveis. Assistir a performance é experiência máxima. Reserve com antecedência. Código de vestiário varia."},{id:23,n:"Parque Lage — Lage Park",a:"Jardim Botânico",v:["nature","architecture","art"],d:35,s:"A mountain park with a historic mansion, art school, walking trails through Atlantic rainforest, and hidden waterfalls in a lush garden setting.",st:"Parque Lage offers a remarkable combination of history, art, and nature. The mansion, built in 1913 for businessman Henrique Lage, sits at the center of the park with its neoclassical façade and beautiful gardens. The building now houses an art school and often hosts exhibitions and cultural events. The park itself is threaded with walking trails that climb into the Atlantic rainforest, offering glimpses of endemic birds, bromeliads, and ferns found nowhere else on Earth. Hidden waterfalls refresh small pools where you can cool off. The juxtaposition of mansion and wild forest—of human ambition and nature's persistence—makes this one of Rio's most contemplative spaces. Local artists come here to find inspiration; photographers find light filtering through the canopy.",im:"A solitary hiker emerges from dense forest into a small clearing where a hidden waterfall drops into a crystal pool, the only sounds those of dripping water and calling birds.",t:"Located in the Jardim Botânico neighborhood. Metro to General Osório, then bus. Admission is free. Open daily. Allow 2-3 hours for a full visit. The trails are well-marked but can be muddy. Bring good walking shoes and water. The mansion may have limited access if an event is occurring.",c:[],r:"g",nn:"Parque Lage",ns:"Mansão histórica suspensa entre arte e floresta tropical",nst:"A mansão de 1913 contrasta com a floresta atlântica intocada, criando espaço onde história humana encontra a resiliência da natureza.",nt:"Bairro Jardim Botânico. Metrô até General Osório. Entrada gratuita. Aberto diariamente. Permita 2-3 horas. Trilhas bem marcadas, podem ser enlameadas. Bom calçado."},{id:24,n:"Paço Imperial — Imperial Palace",a:"Centro",v:["history","architecture"],d:30,s:"A restored 1743 colonial palace where emperors ruled Brazil, now a cultural center hosting exhibitions and performances in one of Rio's oldest buildings.",st:"The Paço Imperial (also called Paço da Cidade) was built in 1743 and served as the colonial governor's residence and later as the seat of imperial power when Pedro I and Pedro II ruled Brazil from here. The building witnessed the signing of Brazil's independence declaration, the debates over abolition, and countless moments that shaped national destiny. After Brazil became a republic, the palace fell into disrepair until restoration efforts in the 1980s transformed it into a cultural center. The rooms now host exhibitions, theater productions, and concerts. Walking through the restored chambers, you feel the weight of history—the decisions made here, the proclamations issued, the ceremonies held. The palace is both a museum of architecture and a living cultural space.",im:"Light streams through colonial windows onto a wooden floor polished to a shine, portraits of emperors hanging on whitewashed walls, an empty grand staircase descending.",t:"Located at Praça XV de Novembro in Centro. Metro to Carioca station. Admission is free for exhibitions. Hours are Tuesdays through Sundays, 10am-6pm. Allow 1-2 hours. Check ahead for performances or special events.",c:[],r:"g",nn:"Paço Imperial",ns:"Palácio colonial onde impérios foram governados",nst:"Construído em 1743, testemunhou a independência e debates sobre abolição, permanecendo como centro cultural onde história e arte se encontram.",nt:"Praça XV de Novembro em Centro. Metrô até Carioca. Entrada gratuita. Terça a domingo, 10h-18h. Permita 1-2 horas. Verifique performances."},{id:25,n:"Pista Clássica — Classic Walking Track at Lagoa",a:"Lagoa",v:["local","nature","views"],d:20,s:"A scenic path along Lagoa Rodrigo de Freitas where locals walk, jog, and cycle, with views of mountains, vegetation, and surrounding neighborhoods.",st:"While Lagoa itself is listed separately, the Pista Clássica (classic track) deserves special mention as the soul of the lagoon experience. This path, which loops the lagoon, is where Rio's informal community gathers daily. Early morning brings joggers, many of them elderly Brazilians who've been running this same route for decades. Mid-morning brings power walkers and those seeking fitness. At dusk, the path fills with cyclists, roller skaters, children, and families out for an evening stroll. The path connects neighborhoods—you can start in Ipanema, loop through Leblon, and end in the Lagoa neighborhood, seeing how these affluent areas have developed while maintaining this public space. The mountains rise constantly visible, the water reflects sky, and there's a sense of community maintained despite Rio's inequalities.",im:"An elderly couple walks hand-in-hand along the path at sunset, the mountain silhouettes turning purple, sailboats gliding past on the glassy water.",t:"Multiple entry points from Ipanema, Leblon, and Lagoa neighborhoods. The path is very safe during daylight. Go during prime hours (7-9am or 5-7pm) when you'll be among locals. Bring water. The neighborhoods have excellent cafés for post-walk socializing.",c:[],r:"g",nn:"Pista Clássica",ns:"Caminho comunitário onde Cariocas se reúnem diariamente",nst:"Percurso que conecta bairros e gerações, mantendo espaço público onde tradições informais de encontro permanecem vivas.",nt:"Múltiplos pontos de entrada de Ipanema, Leblon, Lagoa. Seguro durante o dia. Primeiras horas (7-9h) ou entardecer. Leve água. Cafés nos bairros."},{id:26,n:"Beco das Garrafas — Bottle Alley",a:"Botafogo",v:["history","music","hidden"],d:20,s:"A narrow alley in Botafogo where bossa nova was born in the 1960s, with live music venues and a legendary jazz club still operating.",st:"In the late 1950s and early 1960s, a narrow alley near Botafogo's waterfront became the birthplace of bossa nova. Musicians, including João Gilberto and Tom Jobim, would gather in small clubs in this alley—named 'Garrafas' (Bottles) because of the glass bottles lining its sides. The music that emerged was revolutionary: a fusion of samba rhythm with jazz harmonies, sung with a cool, intimate vocal style that became bossa nova. The Garrafas clubs were tiny, intimate spaces where the music was created and first heard by small audiences before it conquered the world. Today, the alley is less famous than Lapa, but it preserves something more authentic: the actual place where the music was born, still with bars and musicians, less polished than tourist attractions but more genuine.",im:"A musician plays guitar in a small doorway opening onto the narrow alley, the street barely wide enough for two people, the sound of music echoing off old walls.",t:"Located in Botafogo, near the waterfront. Metro to Botafogo station, then a 10-minute walk. The alley is not heavily touristed, so it feels authentic. Go in the evening when bars are lively. Check ahead for live music schedules. The neighborhood has good restaurants nearby.",c:[],r:"g",nn:"Beco das Garrafas",ns:"Viela histórica onde a bossa nova nasceu",nst:"Em 1957-1960, músicos como João Gilberto criaram o som revolucionário aqui, num espaço tão pequeno quanto a intimidade da música que criaram.",nt:"Botafogo, perto do cais. Metrô até Botafogo. Caminhe 10 minutos. Visite ao anoitecer quando bares têm vida. Verifique programação de música ao vivo."},{id:27,n:"Forte de Copacabana — Copacabana Fort",a:"Copacabana",v:["history","architecture","views"],d:25,s:"A 1914 military fort at the southern tip of Copacabana Beach with artillery pieces, historical exhibits, and sweeping views of the beach and Atlantic.",st:"Built in 1914 to protect Rio from naval attack, the Forte de Copacabana sits on a rocky outcropping at the southern end of the beach. The fort's thick stone walls, gun emplacements, and barracks represent turn-of-the-century military architecture. The 1922 Tenentista Revolt (a military uprising against the government) occurred here, with cannons firing from the fort—a dramatic moment in Brazilian military history. Today, the fort houses a small museum with historical exhibits about Rio's military past, and the ramparts offer stunning 360-degree views: the beach stretches northward in a graceful curve, the ocean extends to the horizon, and the city rises in the background. It's a quiet, contemplative spot where few tourists venture, despite being centrally located.",im:"The barrel of a rusted cannon points toward the horizon, the Atlantic stretching endlessly beyond, the beach a thread of white below.",t:"Located at the southern tip of Copacabana Beach. Metro to Copacabana, then a 10-minute walk to the fort entrance. Admission is modest. Hours are typically 10am-6pm. Allow 1-2 hours. The walk up to the fort is somewhat steep. The views are worth the climb. Bring water.",c:[],r:"g",nn:"Forte de Copacabana",ns:"Fortaleza de 1914 com vistas panorâmicas",nst:"Construído para defesa naval, o forte testemunhou a revolta de 1922 e permanece como sentinela histórica sobre a praia e o oceano.",nt:"Ponta sul de Copacabana. Metrô até Copacabana, caminhada de 10 min. Entrada modesta. 10h-18h. Permita 1-2 horas. Caminhada íngreme. Leve água."},{id:28,n:"Arena da Juventude — Youth Arena (Olympic Venue)",a:"Deodoro",v:["architecture","history"],d:30,s:"A 2016 Olympic venue designed with inflatable roof technology, now hosting sports events and competitions in western Rio.",st:"Built for the 2016 Rio Olympics as a multipurpose arena, the Arena da Juventude exemplifies modern sports architecture with its innovative inflatable roof system. The building hosted badminton, modern pentathlon, and other sports during the Olympics, with a capacity for 8,000 spectators. The architecture is striking—the transparent and semi-transparent materials allow light to flood in while maintaining climate control. Since the Olympics, the facility has been repurposed for local sporting events, training, and community activities. It represents Rio's Olympic legacy: a functional building serving the community rather than becoming a white elephant. The surrounding area of Deodoro has been developed with Olympic infrastructure, transforming western Rio into a new sports district.",im:"The transparent roof glows with diffused natural light, casting patterns across the arena floor where athletes train below, the structural elements visible in dramatic silhouette.",t:"Located in Deodoro, in western Rio. Accessible by metro to Deodoro station. May require advance booking to visit unless an event is scheduled. Check ahead for events. The area is somewhat removed from central Rio but represents the Olympic legacy.",c:[],r:"g",nn:"Arena da Juventude",ns:"Venue olímpico com tecnologia de teto inflável",nst:"Construída para os Jogos de 2016, a arena permanece funcional, servindo a comunidade com seus inovadores sistemas arquitetônicos.",nt:"Deodoro, oeste do Rio. Metrô até Deodoro. Pode requerer reserva antecipada. Verifique eventos. Área afastada mas representativa do legado olímpico."},{id:29,n:"Museu de Arte do Rio (MAR) — Rio Art Museum",a:"Centro",v:["art","architecture","history"],d:40,s:"A contemporary art museum opened in 2013 with a wave-shaped modern design, focusing on Rio's cultural identity through innovative exhibitions.",st:"The Museu de Arte do Rio, opened in 2013, is housed in a striking modernist building with a curved façade that evokes ocean waves—a fitting metaphor for a museum dedicated to Rio's cultural identity. The museum's mission differs from traditional art institutions: rather than preserving historical artifacts, it focuses on understanding Rio's complex contemporary culture through exhibitions that might blend visual art with music, history, popular culture, and street art. The building itself is architecturally significant, designed to harmonize with its surroundings while making a bold contemporary statement. The location in Centro, near the historic port, connects the museum to Rio's maritime heritage and its role as a center of cultural exchange.",im:"The wave-shaped exterior of the museum glows in evening light, its curves reflecting the harbor beyond, visitors climbing the grand staircase visible through glass walls.",t:"Located in Centro at Praça Mauá. Metro to Central station. Admission is modest. Open Wednesdays through Mondays, 10am-5:30pm. Allow 1-2 hours. The building itself is worth seeing. The neighborhood has undergone recent revitalization with new restaurants and cultural spaces.",c:[],r:"g",nn:"Museu de Arte do Rio",ns:"Museu de arte contemporânea com design em forma de ondas",nst:"Aberto em 2013, foca na identidade cultural de Rio através de exposições que misturam arte visual, música, e cultura de rua.",nt:"Praça Mauá em Centro. Metrô até Central. Entrada modesta. Quarta a segunda, 10h-17:30h. Permita 1-2 horas. Bairro revitalizado com novos restaurantes."},{id:30,n:"Mirante do Leblon — Leblon Viewpoint",a:"Leblon",v:["views","beautiful","sunset"],d:15,s:"A scenic overlook at the southern end of Leblon Beach offering panoramic views of Rio's coastline, sunset vistas, and access to nearby trails.",st:"The Mirante do Leblon sits at the southern tip of this iconic beach, where urban Rio meets the mountains beyond. The viewpoint offers unobstructed vistas down the coastline toward Copacabana and beyond. At sunset, when the light turns amber and gold, the view is almost unreal—the white sand glowing, the ocean reflecting light, the mountains turning purple. The location is easily accessible from the beach, making it a natural gathering spot for visitors and locals alike. Nearby, trails lead into the Dois Irmãos mountain offering more ambitious hikers a deeper natural experience. The viewpoint is perfect for a sunset moment—a quiet pause in Rio's frenetic energy.",im:"The sun descends toward the ocean as a couple sits on a bench overlooking the panoramic coastline, the beach curving away beneath them, the city lights beginning to twinkle.",t:"Located at the southern end of Leblon Beach. M <a href={`https://maps.google.com/?q=${encodeURIComponent(p.n+', '+CITY_EN)}`} target="_blank" rel="noopener noreferrer"
  className="mt-3 flex items-center gap-2 text-sm font-bold"
  style={{color:"#166534",textDecoration:"none",display:"inline-flex",marginTop:"10px"}}>
  🗺 Get directions
</a>
</div>}
{p.ef&&<p className="text-xs mt-3 pt-3" style={{color:"#555",lineHeight:1.7,borderTop:"1px solid #dcfce7"}}>🍔 {p.ef}</p>}
{p.sf&&<p className="text-xs mt-2" style={{color:"#555",lineHeight:1.7}}>🏠 {p.sf}</p>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
<div className="mt-5">
<p className="text-xs font-bold mb-2" style={{color:"#888",letterSpacing:"0.08em",textTransform:"uppercase"}}>City Moods</p>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} style={{borderRadius:10,overflow:"hidden",aspectRatio:"2/3",background:"#eee"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>)}</div></div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TBGS={"places":"url('../../textures/tex16.png') center/cover no-repeat","collections":"url('../../textures/tex17.png') center/cover no-repeat","missions":"url('../../textures/tex18.png') center/cover no-repeat","plan":"url('../../textures/tex1.png') center/cover no-repeat","phrases":"url('../../textures/tex2.png') center/cover no-repeat","default":"url('../../textures/tex16.png') center/cover no-repeat"};function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Rio de Janeiro Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Rio de Janeiro Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
