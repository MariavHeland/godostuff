{id:74, n:"Niterói Contemporary Art Museum (Oscar Niemeyer) — Across the Bay", a:"Niterói", v:["day_trips","history_big"], d:120, s:"Take the ferry across Guanabara Bay. The building itself is the art—a UFO designed by Niemeyer in 1996.", st:"Niterói is a separate city across the bay, 20 minutes by ferry from Centro. The museum is a concrete saucer designed by Oscar Niemeyer (Brazil's most famous modernist architect) and opened in 1996. The building is shaped like a flying saucer or, some say, a woman's breast. Niemeyer designed it after his mother and his romantic ideals. The interior is a spiral ramp descending to a central exhibition space. The art inside is secondary to the architecture—everyone knows this. What matters is the geometry, the light, the views of Rio from the ramp, and knowing you're looking at the future as Niemeyer imagined it in the 1990s. The ferry ride itself is worth it—you see Rio from the water, the fortress islands, the Sugarloaf from a different angle. Niterói is poorer and quieter than Rio; it feels like a separate world.", im:"White concrete UFO shape, huge circular opening, modern ramp, bay beyond, Rio skyline across the water.", t:"Ferry from Praça XV (Downtown) is R$ 6, 20 minutes, runs all day. Safe, busy with commuters. The museum is in the Boa Viagem neighborhood, which is safe. Don't walk alone at night. The ferry is your transportation—don't take a taxi or Uber to Niterói at night. The area around the museum is fine during the day. Wear sunscreen; the ramp is exposed. Bring water.", c:["day_trips","history_big","nerd"], r:"g", nn:"Museu de Arte Contemporânea de Niterói", ns:"Uma nave de Oscar Niemeyer.", nst:"Niterói é uma cidade separada do outro lado da baía, 20 minutos de balsa do Centro. O museu é um disco de concreto desenhado por Oscar Niemeyer em 1996. O edifício é moldado como um disco voador ou, alguns dizem, um seio feminino.", nt:"Balsa de Praça XV (Centro) é R$ 6, 20 minutos, funciona o dia todo. Seguro, ocupado com commuters. O museu está no bairro Boa Viagem, que é seguro."},
{id:75, n:"Urca Village — The Other Side of Sugarloaf", a:"Urca", v:["neighbourhoods","romantic_water"], d:60, s:"Before you cable car, walk the quiet neighborhood below. Fishing village vibe, colonial alleys, Cariocas living.", st:"Urca is technically a neighborhood in Rio, but it feels like a village. It's the base of the Sugarloaf, so most tourists skip it to go up the mountain. The actual neighborhood is small, quiet, old. Fishermen still live here, families in colonial houses, an old school, a small church. Rua Cândido Mariano runs along the water with bars and restaurants, most opened before 1990. Walk to Praia Vermelha (Red Beach), which has red sand and is clean enough to swim in if you want something close to the city center. The vibe is slower, older, family-oriented. No young people trying to be cool, no digital nomads. Cariocas who grew up here still live here. It's a place that time moved around, not through.", im:"Narrow colonial streets, white stucco walls, small bars, red sand beach, fishing boats, old couples.", t:"Safe during day and early evening. Don't walk alone at night—the neighborhood has limited lighting and can attract opportunistic crime. The beach is safe for swimming during the day. Use Uber to get there, but walking within the neighborhood during daylight is fine. The area around Praia Vermelha is the safest part. Don't leave valuables on the beach. Avoid weekends when it gets busier and the vibe changes slightly.", c:["neighbourhoods","romantic_water","swimming"], r:"g", nn:"Bairro de Urca", ns:"Antes de subir o Pão de Açúcar, caminhe pelo bairro tranquilo abaixo.", nst:"Urca é tecnicamente um bairro do Rio, mas parece uma vila. É a base do Pão de Açúcar, então a maioria dos turistas pula para subir a montanha. O bairro real é pequeno, tranquilo, antigo. Pescadores ainda vivem aqui, famílias em casas coloniais, uma escola antiga, uma pequena Igreja.", nt:"Seguro durante o dia e no início da noite. Não caminhe sozinho à noite—o bairro tem iluminação limitada. A praia é segura para nadar durante o dia."},
{id:76, n:"Parque Lage — Overgrown Mansion + Trails", a:"Lagoa", v:["nature","parks","history_big"], d:90, s:"A 1920s mansion in the middle of a rainforest park. Crumbling, beautiful, with serious jungle trails above.", st:"Parque Lage is a public park around a decaying mansion built in the 1920s by a coffee baron. The mansion houses a free art school (Escola de Artes Visuais). The park is actually entrance to Tijuca National Forest trails. You can walk around the mansion, sit in the overgrown gardens where vines grow over architecture, then head up the trails into the forest. The forest is humid, dense, real jungle. The mansion itself is slowly being consumed by plants and time—windows broken, plaster peeling, but still elegant in its decay. Not many tourists know about it; most go straight to Corcovado. This is the same forest, but quieter, for free, and with a story of wealth and neglect. The trails can be muddy and steep; plan 2–3 hours.", im:"Green-covered stone mansion, vines, empty windows, moss, forest canopy, worn stone terraces.", t:"Park is open until 5 PM. Safe during daytime. Don't go alone into the forest trails. The trails themselves are well-established, but the forest is dense and it's easy to get turned around. Go with a friend or a guide. The Lagoa neighborhood around the park is safe. Never go in the early morning before other people are around—forest trails attract robbery. Bring water and a phone with charge. The mansion interior is sometimes closed for events; call ahead. Wear closed-toe shoes.", c:["abandoned","history_big","nature","parks"], r:"g", nn:"Parque Lage", ns:"Mansão abandonada em floresta tropical.", nst:"Parque Lage é um parque público em torno de uma mansão em declínio construída nos anos 1920 por um barão do café. A mansão abriga uma escola de arte gratuita. O parque é na verdade entrada para trilhas da Floresta Nacional da Tijuca.", nt:"Parque aberto até 17h. Seguro durante o dia. Não vá sozinho pelas trilhas da floresta. As trilhas em si são bem estabelecidas, mas a floresta é densa e é fácil se perder."},
{id:77, n:"Pedra da Gávea — The Hard Hike", a:"Tijuca", v:["high_spots","nature","sport"], d:180, s:"3-hour uphill climb to a stone peak 844 meters above Rio. View is absurd. Legs will hurt.", st:"Pedra da Gávea is the highest exposed stone peak in Rio. It's a serious hike, not a casual walk. The trailhead is in Zona Sul (near Barra, or from Tijuca entrance). The ascent is steep, some sections require scrambling on rock, chains bolted into the mountain help. Three hours up, maybe two hours down. The top is a stone outcropping where you stand 844 meters above the city and can see the entire bay, both coasts, mountains in all directions. On clear days (May–September) you see forever. The experience is earning the view, not just buying a cable car ticket. The hike is full of cariocas, especially on weekends—mostly young and athletic. It's a serious trail but not technical. Bring water (at least 2 liters), leave early (6–7 AM).", im:"Brown rock face, hikers in silhouette on a steep trail, chains, blue sky, Rio spread below.", t:"Never hike alone. Go with at least one other person, preferably a guide or a group. The trail can be slippery in rain; go only on dry days. Theft is a real problem—secure all valuables in your backpack (zip lock inside another pouch). Phone is fine; theft is usually jewelry/cameras. Wear good hiking shoes; the rock is sharp. The trail is open daylight only. Start early; be back down before dark. Stick to marked paths. Many robberies happen at dawn or dusk when the trail is emptier. Go mid-morning when other hikers are around.", c:["high_spots","nature","sport"], r:"g", nn:"Pedra da Gávea", ns:"Subida de 3 horas para um pico de pedra.", nst:"Pedra da Gávea é o pico de pedra exposto mais alto do Rio. É uma caminhada séria, não uma caminhada casual. A trilha é íngreme, algumas seções requerem escalada em rocha, correntes aparafusadas na montanha ajudam.", nt:"Nunca caminhe sozinho. Vá com pelo menos outra pessoa, de preferência um guia ou um grupo. A trilha pode ser escorregadia na chuva; vá apenas em dias secos. Roubo é um problema real—coloque todos os valores em sua mochila."},
{id:78, n:"Santa Teresa Tram — Nostalgia in Motion", a:"Santa Teresa", v:["neighbourhoods","history_big","greatest_hits"], d:45, s:"Ride the antique trolley through Rio's bohemian hill neighborhood. Tram breaks down regularly. Part of the experience.", st:"Santa Teresa is a neighborhood built on hills, old money, bohemians, artists, colonial architecture. The highlight is the bonde (tram), an electric trolley car that's been running since 1912, mostly on the original track. It's small, slow, and frequently breaks down. That's part of it. The tram runs from Carioca Station (Downtown) up through the neighborhood, and the views from the tram are the streets, the houses, the city stacked vertically. Get on at 9 AM or 3 PM (rush hour or super late is less fun). A ticket costs R$ 20 for a round trip. The ride lasts about 30 minutes each way. The tram is packed with locals going to work or school, tourists, elderly women in housedresses with shopping bags. The experience is the ride, not the destination. Then walk the neighborhood's narrow streets, small restaurants, art galleries, live music venues. But the tram is the famous thing.", im:"Vintage wooden tram, street level view of colonial buildings, tangled power lines, passengers in shade.", t:"The tram is generally safe during daytime. Never go alone late at night—Santa Teresa has a history of robbery and gang activity at night. The neighborhood itself is safe and bohemian by day. Use Uber to get back late at night, don't take the tram after 8 PM. The area around the tram station (Carioca) is Downtown and can be sketchy at night. Stay in the tram and the main tourist streets (Rua Almirante Alexandrino, Rua Paschoal Carlos Magno). Don't walk into side alleys alone, especially at dusk. Bring a local friend or a guide.", c:["greatest_hits","history_big","neighbourhoods"], r:"g", nn:"Bonde de Santa Teresa", ns:"Passeio de bonde vintage através do bairro boêmio.", nst:"Santa Teresa é um bairro construído em colinas, dinheiro antigo, boêmios, artistas, arquitetura colonial. O destaque é o bonde, um bonde elétrico que está funcionando desde 1912, principalmente na trilha original.", nt:"O bonde é geralmente seguro durante o dia. Nunca vá sozinho tarde da noite—Santa Teresa tem histórico de roubo e atividade de gangues à noite. Use Uber para voltar tarde à noite."},
{id:79, n:"Arcos da Lapa — The Aqueduct That Became a Bar District", a:"Lapa", v:["history_big","weird","neighbourhoods"], d:45, s:"18th-century aqueduct that used to carry water. Now it's the symbol of Lapa nightlife and gentrification in progress.", st:"The Arcos da Lapa is a double-tiered stone aqueduct built in 1750 to carry water from the Tijuca mountains to the city. It's 65 meters long and was the height of engineering for the time. Water stopped flowing in the 1900s; the structure became a monument. Now it's surrounded by bars, restaurants, and nightlife—it's the heart of Lapa's tourism and nightlife scene. The structure itself is impressive and atmospheric, especially lit at night. But the neighborhood around it has become increasingly gentrified, filled with expensive bars charging tourist prices, cover bands, selfie tourists. The honest truth: it's beautiful architecture inside a commercialized neighborhood. The bars and restaurants around it are overpriced and mediocre. Go during the day to see the aqueduct's architecture and the city's history, then leave before nightfall when it becomes a party scene.", im:"Double stone arches, colonial architecture, worn masonry, sunset light making it golden, bars below.", t:"Safe to visit during day. The aqueduct itself (you can walk under it) is always monitored and busy. At night, Lapa becomes a party district with high crime, drugging in drinks, expensive bar scams, and mugging. Never go at night alone or without local friends who know the current dangers. If you do go at night, use Uber door-to-door, stay in the main bar areas (don't walk between bars), watch your drink, don't carry valuables, stay in groups. Women should be especially careful—predatory behavior toward lone women is common in nightlife bars. The neighborhood has gang presence that doesn't tolerate outsiders after dark.", c:["history_big","neighbourhoods","weird"], r:"g", nn:"Arcos da Lapa", ns:"Aqueduto que virou bairro de bares.", nst:"Os Arcos da Lapa é um aqueduto de dois andares construído em 1750 para transportar água das montanhas da Tijuca para a cidade. Tem 65 metros de comprimento e era o auge da engenharia da época. A água parou de fluir em 1900; a estrutura virou monumento.", nt:"Seguro para visitar durante o dia. O aqueduto em si (você pode caminhar embaixo dele) é sempre monitorado e ocupado. À noite, Lapa torna-se um bairro de festa com crime alto, bebidas dopadas, golpes de bar caros e roubo."},
{id:80, n:"Ilha Grande Day Trip — The Island Where Tourists Feel Rich", a:"Angra dos Reis", v:["day_trips","swimming","nature"], d:480, s:"40 minutes by ferry to an island with pristine beaches, jungle, no cars. Overhyped, but the water is genuinely warm and clean.", st:"Ilha Grande is accessible by ferry from Angra dos Reis (2 hours by car or bus from Rio). The island has no cars, only walking trails and beach access. Main town is Vila do Abraão, which has restaurants, pousadas, bars, tourists from around the world. The beaches around the island are warm-water Atlantic, clear enough to see fish, white sand. You can hike to other beaches (Lopes Mendes, Aventureiro), take boat tours, explore mangroves. The island is actually beautiful—the tourism infrastructure exists because it's worth visiting. However, it's become a backpacker destination, which means overpriced pousadas, mediocre beach restaurants charging Rio prices, and crowds. It's safe, clean, and accessible. If you want pure island paradise without the Rio intensity, one day on Ilha Grande delivers it. But you'll share it with hundreds of other tourists. The ferry itself is often crowded and takes time.", im:"Clear turquoise water, white sand beach, jungle green above, simple wooden pousadas, boats in harbor.", t:"Ferry is operated by legitimate companies; book in advance (Barcas Brasil, CCR). Safe, full of tourists and locals. Takes 45 min–1.5 hours depending on sea state. The island's main village is safe and tourist-oriented. Don't go alone into jungle trails at night—stick to main paths. The beaches are safe for swimming during the day. Don't leave valuables on the beach. The water is warm (better than Rio beaches) but the tide is strong in some spots; ask locals about swim locations. Bring cash or withdraw at the ATM in the main town before going to beaches. Accommodation and food are expensive (R$ 50+ for meals). Don't expect luxury. Overnight requires booking; day trips are feasible but tiring.", c:["day_trips","nature","swimming"], r:"g", nn:"Ilha Grande — Viagem de um dia", ns:"Balsa para uma ilha com praias intocadas.", nst:"Ilha Grande é acessível por balsa de Angra dos Reis (2 horas de carro ou ônibus do Rio). A ilha não tem carros, apenas trilhas e acesso à praia. A cidade principal é Vila do Abraão, que tem restaurantes, pousadas, bares, turistas de todo o mundo.", nt:"Balsa é operada por companhias legítimas; reserve com antecedência. Seguro, cheio de turistas e locais. A vila principal da ilha é segura e orientada para turistas."},
{id:81, n:"Pedra Bonita — Hang Gliding Off the Mountain", a:"Barra/Zona Oeste", v:["sport","high_spots","weird"], d:120, s:"Jump off a mountain with a guide strapped to your back. It's real flying, not a fairground ride.", st:"Pedra Bonita is a 510-meter rock outcropping at the western edge of Zona Oeste, in the Barra area. Experienced pilots use it as a takeoff point for hang gliding and paragliding. Several companies offer tandem flights where you go along as a passenger with an expert. The actual takeoff is abrupt—you run off the mountain edge while the pilot catches air on a paraglider canopy. The flight lasts 20–45 minutes, soaring above the coast, seeing Barra, smaller beaches, the Pedra da Gávea in the distance. The adrenaline is real. It's not a theme park—you're actually flying. The views are unmatched. It's expensive (R$ 400–600) and weather-dependent; you need clear skies and wind conditions. Some flights are cancelled. But if it works, it's a high like nothing else—literally and figuratively.", im:"Paraglider canopy above, coastline far below, green slopes, white beaches, tiny people on sand.", t:"Use only established, licensed companies (FlySky Rio, Clube de Voo Livre Rio). They have safety records, insurance, and certification. The takeoff is dramatic and you feel unstable for the first minute, then it's surprisingly smooth. The pilot is in control; you're just experiencing. Weather is unpredictable—book flexible, and be ready to cancel. The flight is actually safer than driving to get there. The location (Pedra Bonita) is reachable by car but the road is steep and narrow; use a driver/Uber. Don't drive yourself. Wear clothes you don't mind getting wrinkled (sitting in harness). The landing can be bumpy; it's gentler than the takeoff. You'll be sore the next day (harness digs in). Book in advance; weekend slots fill up.", c:["high_spots","sport","weird"], r:"g", nn:"Pedra Bonita — Parapente", ns:"Voe de uma montanha com um guia.", nst:"Pedra Bonita é um afloramento de rocha de 510 metros na borda ocidental de Zona Oeste, na área de Barra. Pilotos experientes o usam como ponto de decolagem para asa delta e parapente. Várias empresas oferecem voos em tandem onde você vai como passageiro com um especialista.", nt:"Use apenas empresas estabelecidas e licenciadas (FlySky Rio, Clube de Voo Livre Rio). Têm registros de segurança, seguro e certificação. A decolagem é dramática e você se sente instável no primeiro minuto, depois é surpreendentemente suave."},
{id:82, n:"Dois Irmãos Early Morning Hike — The Viewpoint Over Leblon", a:"Leblon", v:["sunrise","high_spots","nature","sport"], d:120, s:"40-minute steep hike to twin peaks above Leblon. Sunrise view is why cariocas do this at dawn.", st:"Dois Irmãos is a pair of rock peaks (Two Brothers) that rise 528 meters above Leblon. The hike starts from a trailhead near Belmonte Street and is steep, rocky, takes about 40 minutes to the top. The ascent is relentless—basically climbing a staircase of rocks. But the summit offers a view straight down at Leblon beach, across to Ipanema, out to the Arpoador rock, and inland to the city. The light at sunrise (6–7 AM) is clean and golden. You're surrounded by other hikers all trying to catch it. The Brazilian hiking community takes this seriously. There's a scramble near the top on metal chains. It's more difficult than Pedra da Gávea. It's more crowded. But if you want a Rio sunrise view without paying for a cable car, this is it.", im:"Two brown rock peaks side-by-side, hikers silhouetted, city below waking up, morning light pink.", t:"The trailhead is in a residential neighborhood (Leblon). Safe during dawn hours because there are many hikers going up. Never hike alone. The trail is steep and rocky; good hiking shoes required. The rocks can be slippery, especially in humid or slightly wet conditions. Metal chains help but are exposed. Many robberies have happened on this trail, especially at dawn when hikers are tired, distracted, or coming down. Hike with a local or a guide group if you can. Bring valuables in a secure backpack pocket or leave them behind. The peak itself is safe (lots of people). The danger is the trail. Stick with other hikers; don't lag behind or rush ahead alone. The descent is where most robberies happen (you're tired, less alert). Come with a buddy.", c:["high_spots","nature","sport"], r:"g", nn:"Dois Irmãos", ns:"Trilha íngreme até dois picos com vista ao amanhecer.", nst:"Dois Irmãos é um par de picos de rocha que se elevam 528 metros acima de Leblon. A trilha começa de uma cabeça de trilha perto da Rua Belmonte e é íngreme, rochosa, leva cerca de 40 minutos para o topo.", nt:"A cabeça da trilha está em um bairro residencial (Leblon). Seguro durante horas de madrugada porque há muitos caminhantes subindo. Nunca caminhe sozinho. A trilha é íngreme e rochosa; sapatos de trekking bons obrigatórios."}

  {id:35,n:"Selaron Steps (Escadaria Selarón) — Mosaic Stairway",a:"Lapa",v:["art","beautiful","weird"],d:20,s:"A spectacular 225-step stairway covered entirely in hand-placed ceramic tiles in every color imaginable, created by Chilean artist Jorge Selarón.",st:"Jorge Selarón spent 25 years hand-gluing ceramic tiles to the steps connecting Lapa and Santa Teresa. The tiles come from around the world—donations, castoffs, collected pieces—creating a mosaic that tells stories of global connections. Each step is a small artwork. The colors shift from blue to yellow to red as you climb. Selarón himself was eccentric, theatrical, beloved by locals. He died in 2013, but the steps are maintained by the community. It's become a major attraction but retains authenticity—it's still the vision of one person who believed in beauty.",im:"A visitor's foot on a blue tile, stepping up to red, then yellow. The patterns beneath their feet. The colors intense. Sunlight catching the glaze.",t:"Located in Lapa. Walk from Carceres, or metro to Cinelândia. Free entry. Go early morning to avoid crowds and heat. It's a steep walk—wear good shoes. Bring water. The neighborhood has cafés.",c:["art","beautiful"],r:"g",nn:"Escadaria Selarón",ns:"Escadaria de 225 degraus coberta inteiramente de azulejos cerâmicos",nst:"Jorge Selarón gastou 25 anos colando azulejos à mão, criando uma história de conexões globais passo a passo.",nt:"Lapa. Caminhada de Carceres ou metrô até Cinelândia. Entrada gratuita. Cedo para evitar multidões. Bom calçado. Leve água."},
  {id:36,n:"Santa Teresa Neighborhood — Time Stopped Here",a:"Santa Teresa",v:["neighborhoods","beautiful","history"],d:25,s:"A colonial hilltop neighborhood with narrow cobbled streets, tram cars, street art, and bohemian culture—authentically Rio before gentrification.",st:"Santa Teresa sits on a hill overlooking Centro. The neighborhood developed in the 1800s as a residential area for the wealthy, but as Rio grew toward the beaches, Santa Teresa became bohemian. Artists moved in. Musicians. Writers. The streets, impossibly narrow, are lined with colonial houses painted in pastels. The tram (bonde) still runs through the center, vintage wooden cars clanging up the hill. Street art covers some walls. Small galleries and bars occupy old buildings. Gentrification is happening but slowly—the topography (steep hills) and the tram infrastructure protect it from total transformation. It remains the most European-feeling neighborhood in Rio.",im:"A vintage tram car ascending a narrow cobbled street lined with colonial houses, laundry hanging between buildings, street art visible on weathered walls.",t:"Metro to Cinelândia, then a walk or tram ride up. The tram is the most authentic way to experience the area. Walk the main streets. Stop at bars and small galleries. It's safe during daylight. Allow 2-3 hours. The neighborhood has excellent restaurants and cafés.",c:["neighborhoods","beautiful","history"],r:"g",nn:"Bairro de Santa Teresa",ns:"Bairro colonial no topo de uma colina com ruas estreitas e autênticas",nst:"Santa Teresa tornou-se boêmia quando artistas e músicos se mudaram. As ruas impossibilidades mantêm autenticidade através da topografia.",nt:"Metrô até Cinelândia, depois caminhada ou bonde. O bonde é a forma mais autêntica. Caminhe pelas ruas principais. Seguro durante o dia. Permita 2-3 horas."},
  {id:37,n:"Urca Neighborhood (Before Sugarloaf) — The Quiet Side",a:"Urca",v:["neighborhoods","beautiful","local"],d:20,s:"The quiet residential neighborhood at the base of Sugarloaf, with a small beach, seafood restaurants, and none of the Copacabana chaos.",st:"Urca exists in the shadow of Sugarloaf, which means it's less touristed. It's a small neighborhood with a crescent beach, traditional fishermen, and excellent seafood restaurants. The locals know each other. It feels like a small fishing village that happens to be in Rio. The beach is protected by the mountain, so the water is calmer than in Copacabana. The restaurants serve fresh fish at reasonable prices. This is where Cariocas come for Sunday lunch, not tourists.",im:"A weathered fisherman sits on the beach mending nets, small fishing boats moored in calm water, a seafood restaurant glowing warm beyond the sand.",t:"Metro to Urca station. The neighborhood is compact and walkable. Pick a seafood restaurant and sit by the water. Go on weekends to experience the local vibe. Stay for sunset. Bring a light jacket.",c:["neighborhoods","beautiful","local"],r:"g",nn:"Bairro de Urca",ns:"Bairro residencial tranquilo na base de Pão de Açúcar",nst:"Urca existe à sombra de Pão de Açúcar, permanecendo autêntico e focado em pescadores e restaurantes tradicionais.",nt:"Metrô até Urca. Compacto e a pé. Escolha um restaurante de frutos do mar. Vá nos fins de semana. Fica para o pôr do sol. Traga jaqueta leve."},
  {id:38,n:"Botafogo Beach & Neighborhood — Quiet Carioca Life",a:"Botafogo",v:["neighborhoods","beautiful","local"],d:20,s:"A working-class beach neighborhood with a lively waterfront, older bars where musicians gather, and street art reflecting real Rio culture.",st:"Botafogo was once wealthy but is now middle-class and authentic. The beach is small, calm, and used by locals—not for swimming in many areas due to pollution, but for walking and sitting. The neighborhood has bars where musicians perform—related to the bossa nova history in the nearby Beco das Garrafas. The streets have street art that reflects the neighborhood's cultural identity rather than tourism. Small shops, padarias, and casual restaurants serve the community. This is real Carioca life.",im:"A group of musicians plays guitar at a small bar on Botafogo Beach at dusk, the water calm, a few locals seated nearby, the city lights beginning to reflect.",t:"Metro to Botafogo station. Walk along the beach or through the neighborhood. It's safe and accessible. Go in the evening for the best vibe. Street vendors sell snacks and beer. Allow 2-3 hours. The neighborhood has excellent smaller bars and casual restaurants.",c:["neighborhoods","beautiful","local"],r:"g",nn:"Bairro de Botafogo",ns:"Praia de bairro com vida musical e autêntica",nst:"Botafogo, antes wealthy, agora é autêntico. O bairro mantém raízes musicais e cultura comunitária.",nt:"Metrô até Botafogo. A pé pela praia ou bairro. Seguro e acessível. Melhor ao anoitecer. Vendedores ambulantes. Permita 2-3 horas."},
  {id:39,n:"Zona Sul Cycling — See Rio on Two Wheels",a:"Ipanema",v:["free_culture","sport","neighborhoods"],d:45,s:"A self-guided bike tour along the coast from Ipanema to Leblon, Copacabana, and beyond, seeing the city the way locals do.",st:"Cycling is how Brazilians move through their city. The Zona Sul (South Zone) has bike paths along the beach and through neighborhoods. You see Rio at human speed—the details, the street vendors, the way neighborhoods connect, the quality of light at different times of day. Bike rental is cheap (30-50 BRL per day). You can cycle from Ipanema all the way to Copacabana and beyond, following the coast. Stop at beaches, street vendors, small restaurants. See where locals sit, where they gather. This is how Rio actually works.",im:"A cyclist pedals along a beachside path, the ocean on one side, a tree-lined neighborhood on the other, other cyclists and locals visible, the city spreading inland.",t:"Rent a bike from any shop in Ipanema (30-50 BRL/day). Bring water and sunscreen. Start early. Bike paths are along most major beaches. Wear a helmet (even if you don't want to). Stop often. The best time is late afternoon. It's safe along the paths.",c:["free_culture","sport"],r:"g",nn:"Ciclismo Zona Sul",ns:"Explorar Rio em duas rodas pelas costas",nst:"Andar de bicicleta é como os cariocas se movem. As ciclovias da Zona Sul conectam praias e bairros.",nt:"Alugue bicicleta em Ipanema (30-50 BRL/dia). Leve água e protetor solar. Comece cedo. Caminhos seguros. Hora melhor é fim de tarde."},
  {id:40,n:"Confeitaria Colombo — Historic Café with Belle Époque Interior",a:"Centro",v:["history","food","beautiful"],d:30,s:"An ornate 1894 café with mirrors, dark wood, and vintage bakery items—the interior is a time machine to Rio's golden age.",st:"Colombo opened in 1894 in Centro. The interior remains unchanged: towering mirrors, dark wood panels, marble counters, ornate lamps. The bakery produces the same pastries it has for over a century. Eating here is like stepping into a photograph from 1920. The cakes are expensive and decadent. The service is formal. You sit at tiny tables in rooms that drip with history. Everyone from presidents to poets has eaten here. It's the best preserved example of Belle Époque Rio architecture and culture still functioning.",im:"A server in formal attire places a plate of petit fours on a marble-topped table, the mirrored walls reflecting warm light from vintage lamps.",t:"Located in Centro at Rua Gonçalves Dias. Metro to Carioca. Hours 9am-6pm, closed Sundays. Budget 40-80 BRL for coffee and a pastry. It's a formal place. Sit and stay for at least 30 minutes. The experience matters more than speed.",c:["history","food","beautiful"],r:"g",nn:"Confeitaria Colombo",ns:"Café de 1894 com interior Belle Époque preservado",nst:"Colombo abriu em 1894 em Centro. O interior permanece inalterado, um viagem no tempo à Rio dourada.",nt:"Centro em Rua Gonçalves Dias. Metrô até Carioca. 9h-18h, fechado domingos. Orçamento 40-80 BRL. Lugar formal. Sente e fica pelo menos 30 minutos."},
  {id:41,n:"Petropolis Day Trip — Imperial City in the Mountains",a:"Petrópolis (Day Trip)",v:["day_trips","history","beautiful"],d:180,s:"A mountain city 40km from Rio where the imperial family ruled during summer, with palaces, museums, and cooler mountain air.",st:"When Rio's heat became unbearable, the imperial family moved to Petrópolis, in the mountains, where the air was cool and the building of a new city could represent new ambitions. Emperor Pedro II built a palace (now a museum) in a neoclassical style. The city developed around it with wide streets, Europeanesque architecture, and botanical gardens. The city remains where it was: cooler, quieter, historical. Many palaces and museums remain. The drive from Rio takes 1-1.5 hours. The city is day-trip accessible and very different from beach Rio.",im:"A neoclassical palace with white columns sits surrounded by green mountains, a waterfall visible beyond, formal gardens in the foreground.",t:"Bus from Rio (1-1.5 hours) to Petrópolis station. The city is walkable from there. Admission to palaces and museums is modest. Allow 4-6 hours including travel. Go early morning. Bring a light jacket—it's cooler. The city has restaurants and cafés.",c:["day_trips","history"],r:"g",nn:"Petrópolis",ns:"Cidade imperial nas montanhas com palácios e história",nst:"Quando o calor do Rio ficava insuportável, a família imperial movia-se para Petrópolis, mais fresca e apropriada para novas ambições.",nt:"Ônibus do Rio (1-1.5 horas) até estação de Petrópolis. Entrada modesta para palácios. Permita 4-6 horas. Vá cedo. Traga jaqueta leve."},
  {id:42,n:"Parque Nacional da Tijuca — Rainforest Within the City",a:"Tijuca",v:["nature","parks","day_trips"],d:120,s:"One of the world's largest urban rainforests with hiking trails, waterfalls, and the Cascatinha waterfall—wilderness inside the city.",st:"The Tijuca Forest is a reforested Atlantic rainforest entirely within Rio's city limits. In the 1800s it was logged nearly to destruction. Environmental initiatives replanted the forest. Now it's a wilderness: endemic species, thick vegetation, waterfalls, cool streams. There are multiple entry points and trails. The Cascatinha waterfall is a popular destination. The forest offers escape from the city while being accessible by metro. The air is different—humid, green, alive. It's where Cariocas come to remember that Rio sits within nature.",im:"A hiker stands at a waterfall hidden deep in the forest, mist rising, the sound of water, ferns and moss covering everything, no human structures visible.",t:"Multiple entry points. Metro to Alto da Boa Vista is one option. Wear good hiking shoes. Bring water. Go early morning (7-10am) when it's coolest and the light is best. Allow 2-4 hours depending on which trails you take. The forest can be muddy after rain.",c:["nature","parks"],r:"g",nn:"Parque Nacional da Tijuca",ns:"Floresta tropical remanescente dentro da cidade",nst:"Floresta da Tijuca é replantada do século XIX, agora oferece refúgio selvagem dentro de Rio.",nt:"Múltiplos pontos de entrada. Metrô até Alto da Boa Vista. Bom calçado. Leve água. Madrugada. Permita 2-4 horas. Pode estar lamacenta após chuva."},
  {id:43,n:"Artigianato Brasileiro (Brazilian Crafts) — Authentic Workshops",a:"Various",v:["free_culture","markets","weird"],d:60,s:"Visit working craft studios where artisans make pottery, textiles, and wood carvings—a step beyond tourist markets.",st:"While Feira de São Cristóvão sells traditional goods, seeing them being made is different. Small studios scattered through the city house artisans working in traditional techniques. Woodcarvers create religious figures. Potters throw clay on wheels. Textile artists work at looms. These aren't performances for tourists—they're working studios. Some welcome visitors, though calling ahead is respectful. The products are often more authentic and cheaper than market versions, and you support artisans directly.",im:"An older woodcarver shapes wood with a hand tool, shavings curling, the figure emerging from the raw wood, tools worn smooth by decades of use.",t:"Call ahead to specific studios. Many are in Saúde, Lapa, and neighborhood areas. Go slowly. Ask questions. Buy directly. Prices are negotiable and often cheaper than markets. Budget varies—from 50 BRL for small items to 500+ for large pieces.",c:["free_culture","weird"],r:"g",nn:"Artigianato Brasileiro",ns:"Oficinas de artesãos trabalho em técnicas tradicionais",nst:"Studios espalhados pela cidade onde artesãos trabalham em técnicas tradicionais de madeira, cerâmica, e têxteis.",nt:"Ligue com antecedência para studios específicos. Muitos em Saúde e Lapa. Vá devagar. Faça perguntas. Compre direto de artesãos."},
  {id:44,n:"Pedra Bonita & Hang Gliding — Jump Off the Mountain",a:"Pedra Bonita",v:["high_spots","scary","weird"],d:120,s:"A dramatic 1,105m mountain where brave (or foolish) people jump with hang gliders and land on Barra da Tijuca Beach below.",st:"Pedra Bonita means 'pretty stone,' but the stone sits at 1,100+ meters overlooking the west side of Rio. For decades, people have jump from this mountain with hang gliders. The jump is dramatic—a running start off a cliff, the glider catching updrafts, circling as you descend 1,000+ meters to Barra Beach. It requires physical fitness and courage. Tandem flights with experienced pilots are available for tourists (expensive: 400-600 BRL). Even watching people jump is extraordinary. The view from the top is stunning in all directions.",im:"A hang glider launches off a cliff edge, the person barely visible against the sky, the coast spreading impossibly far below.",t:"It's a demanding hike (1.5-2 hours up) or drive to Pedra Bonita. The hike is steep. Go early morning. Bring water and sun protection. Tandem flights require booking in advance. If just watching/hiking, wear good shoes. The hike is very rewarding.",c:["high_spots","scary"],r:"g",nn:"Pedra Bonita",ns:"Montanha de 1,105m onde pessoas saltam de asa delta",nst:"Pedra Bonita oferece o salto em asa delta, dramaticamente acima da Barra da Tijuca abaixo.",nt:"Subida exigente (1.5-2 horas) ou carro até Pedra Bonita. Escalada íngreme. Vá cedo. Leve água. Voos em tandem requerem reserva. Bom calçado."},
  {id:45,n:"Prainha & Grumari — Hidden Beaches Beyond Barra",a:"West Rio",v:["swimming","beautiful","hidden"],d:90,s:"Two hidden beaches beyond Barra da Tijuca requiring car/taxi access, with real sand, real locals, and no vendors.",st:"West of Barra, where most tourists don't go, two small beaches sit protected by rock formations: Prainha and Grumari. They're less developed than Barra, quieter, with real swimmers and a local vibe. The rocks protect them from waves and pollution, making the water cleaner. Grumari is more developed (has a parking lot), while Prainha is smaller and more secret. The drive from Centro is 40-50 minutes. They're worth the effort for beach days that feel real rather than touristy.",im:"A small crescent beach with dark sand, large rocks on either side, crystal water, and a handful of locals swimming, no vendors or infrastructure visible.",t:"Taxi or rental car from Centro (40-50 min). Parking is available. There are no facilities, so bring water and food. Go early morning. Bring sun protection. The water is clean and safe for swimming. Stay until sunset.",c:["swimming","beautiful"],r:"g",nn:"Prainha e Grumari",ns:"Praias ocultas além de Barra da Tijuca",nst:"Prainha e Grumari são praias pequenas, protegidas, com água limpa e atmosfera local autêntica.",nt:"Táxi ou carro alugado do Centro (40-50 min). Estacionamento disponível. Sem facilidades—leve água e comida. Vá cedo. Permita entardecer."},
  {id:46,n:"Museu Casa da Ruy Barbosa — Lawyer's House Museum",a:"Botafogo",v:["history","free_culture","beautiful"],d:45,s:"The restored home of Ruy Barbosa, one of Brazil's most important lawyers and abolitionists, with period furnishings and political artifacts.",st:"Ruy Barbosa was Brazil's most brilliant lawyer in the late 1800s and early 1900s. He authored the abolitionist manifesto. He crafted constitutional law. He lived in this beautiful house in Botafogo filled with books, documents, and furnishings from the period. The house is preserved as it was, offering a glimpse into the intellectual life of Rio's elite during a transformational time. The library is extraordinary—thousands of books, the work of a man who read constantly. This is where big ideas came from.",im:"A library with floor-to-ceiling books, a wooden desk with papers and inkwell, a leather chair, afternoon light streaming through tall windows.",t:"Located in Botafogo. Metro to Botafogo station, then short walk. Admission is free to very cheap. Hours are limited—check ahead. Tours available. Allow 1-2 hours. The neighborhood has good restaurants nearby.",c:["history","free_culture"],r:"g",nn:"Casa de Ruy Barbosa",ns:"Casa museu de um dos mais importantes juristas e abolicionistas",nst:"Preserva a vida intelectual da elite durante época de transformação, com biblioteca extraordinária de milhares de livros.",nt:"Botafogo. Metrô até Botafogo. Entrada gratuita ou muito barata. Horário limitado—verifique. Permita 1-2 horas."},
  {id:47,n:"Niterói Contemporary Art Museum (Oscar Niemeyer) — Day Trip",a:"Niterói",v:["art","beautiful","day_trips"],d:180,s:"Across the bay in Niterói, a striking spaceship-shaped museum designed by Oscar Niemeyer, with contemporary art and stunning Rio views.",st:"Oscar Niemeyer designed this museum to look like a spaceship—or a flying saucer descending to land on a hillside overlooking the Rio harbor. The building is the art. Inside, contemporary exhibitions rotate, but the real experience is the architecture, the curves, the views. The museum is in Niterói, across the Guanabara Bay from Rio. The ferry crossing itself is part of the experience—leaving Rio, approaching a new city. Many Cariocas have never been to Niterói, though it's accessible by ferry or bridge.",im:"A striking circular white building with a ramp descending from its underside, perched on a hillside overlooking the bay, Rio's skyline visible beyond.",t:"Ferry from Rio Centro (station near Praça XV) to Niterói (20 min, 5-10 BRL). From ferry terminal, taxi or bus to museum (10-15 min). Admission is modest. Open Tuesdays through Sundays. Allow 2-3 hours. The ferry itself is worth the trip.",c:["art","beautiful","day_trips"],r:"g",nn:"Museu de Arte Contemporânea de Niterói",ns:"Museu em forma de nave espacial com vistas de Rio",nst:"Niemeyer projetou para parecer nave—o edifício é arte. Vistas extraordinárias sobre a baía de Guanabara.",nt:"Ferry de Rio Centro até Niterói (20 min, 5-10 BRL). Táxi ou ônibus até museu. Entrada modesta. Permita 2-3 horas."},
  {id:48,n:"Gafieiras — Traditional Rio Samba Dance Halls",a:"Various",v:["music","local","weird"],d:120,s:"Authentic samba dance halls where older Cariocas dance ballroom-style samba—less touristy than Lapa clubs.",st:"Gafieiras are Rio institutions: large halls where samba orchestras play and couples dance in a ballroom-style samba that's formal and complex. They've existed since the 1940s. The crowds are older, local, serious dancers. The music is live and loud. The atmosphere is completely authentic—tourists mostly go to Lapa or street parties instead. Several gafieiras still operate in Rio. This is what Cariocas meant by samba before it became a tourist thing.",im:"An older couple dances closely, their footwork complex and practiced, the woman's dress spinning, the band on stage playing full-volume samba, the hall packed with dancers.",t:"Gafieiras operate primarily Thu-Sat nights. Entry is 20-50 BRL. A drink costs 10-20 BRL. Go late (10pm+). Dress nicely—it's a formal affair. Most are in Saúde, Centro, and suburban areas (not touristy zones). Take a taxi. Don't expect to dance unless you know samba; watch and appreciate instead.",c:["music","local"],r:"g",nn:"Gafieiras",ns:"Salões tradicionais de samba com dança de salão",nst:"Gafieiras existem desde 1940s, onde cariocas sérios dançam samba complexa e formal.",nt:"Operam quinta-sábado à noite. Entrada 20-50 BRL. Bebida 10-20 BRL. Vá tarde (22h+). Roupa formal. Localizadas fora de zonas turísticas. Táxi. Assista se não souber dançar."},
  {id:49,n:"Barra de São Gonçalo — Kite Surfing & Extreme Sports",a:"Barra da Tijuca",v:["sport","swimming","weird"],d:90,s:"A section of Barra Beach where wind and waves align for kite surfing and other extreme water sports.",st:"Certain sections of Barra's long beach are ideal for wind sports: kite surfing, windsurfing, stand-up paddling. The consistent wind and wave conditions attract athletes and beginners alike. Multiple schools offer lessons. The vibe is different from the touristed parts of Barra—it's athletic, energetic, international. It's where Rio's water sports community gathers.",im:"A kite surfer launches off the water, the massive kite pulling them, their board skimming the white-capped waves, the beach crowded with others in wetsuits.",t:"Barra Beach, western section. Multiple kite school. Lesson packages (300-600 BRL) available. Go on windy days. Bring sun protection. The water is cold—bring a wetsuit or rent one. Beginners are welcome.",c:["sport","swimming","weird"],r:"g",nn:"Barra de São Gonçalo",ns:"Seção da Barra ideal para esportes aquáticos radicais",nst:"Vento e ondas consistentes atraem kitesurfistas e atletas para esta seção de Barra.",nt:"Barra Beach, seção oeste. Múltiplas escolas de kite. Pacotes de aula (300-600 BRL). Dias ventosos. Protetor solar. Água fria—traga wetsuit."},
  {id:50,n:"Real Gabinete Português de Leitura — The World's Most Beautiful Library",a:"Centro",v:["history","architecture","weird"],d:45,s:"A Portuguese library in Rio with an impossibly beautiful interior—soaring atrium, five stories of books, cast iron railings.",st:"The Real Gabinete Português (Royal Portuguese Reading Room) was founded in 1837 as a library for the Portuguese community. The building's interior is architectural theater: a five-story atrium with cast iron railings forming intricate patterns, skylight flooding light from above, books lining every wall to a dizzying height. It's been called 'the most beautiful library in the world' by some. The collection is Portuguese-language books and rare editions. The library requires membership or a day pass, but day visitors are welcome. Standing in the atrium, looking up, is an experience of beauty.",im:"Looking up from the reading room floor through five stories of cast iron railings and stacked shelves, light descending from a distant skylight.",t:"Located in Centro at Rua Ouvidor. Metro to Carioca. Admission is very cheap (10-20 BRL) for a day pass. Hours are Mon-Fri, 10am-6pm. Go on a clear day so light floods in. Allow 1-2 hours. Photography allowed. This place rewards slow looking.",c:["history","architecture"],r:"g",nn:"Real Gabinete Português de Leitura",ns:"Biblioteca dita a mais bela do mundo com interior teatral",nst:"Fundada em 1837, a biblioteca possui átrio de cinco andares com grades de ferro fundido e livros até o teto.",nt:"Centro em Rua Ouvidor. Metrô até Carioca. Entrada muito barata (10-20 BRL). Segunda-sexta 10h-18h. Dia claro. Permita 1-2 horas. Fotografia permitida."},
  {id:51,n:"Instituto Moreira Salles (Photography & Design)",a:"Ipanema",v:["free_culture","art","beautiful"],d:60,s:"A photography and design museum in a modernist house with exhibitions, a beautiful garden, and free admission.",st:"The Instituto Moreira Salles is housed in a pristine modernist house designed by Lúcio Costa (who also influenced Niemeyer). The ground floor has rotating exhibitions of photography and design. The building is small but perfect—every detail considered. The garden is beautiful, filled with native plants, a refuge from Ipanema's busy streets. Admission is free. It's less crowded than other museums. The curations are thoughtful—focused on aesthetics and meaning rather than crowd-pleasing.",im:"A contemporary photograph hangs on a white wall, light streaming through tall windows overlooking a lush garden visible outside.",t:"Located in Ipanema. Metro to Ipanema station, short walk. Admission is free. Hours are Tuesdays through Sundays, 10am-6pm. Allow 1-2 hours. Check what exhibitions are current. The garden is perfect for sitting.",c:["free_culture","art"],r:"g",nn:"Instituto Moreira Salles",ns:"Museu de fotografia e design em casa modernista",nst:"Alojado em casa projetada por Lúcio Costa, com exposições de fotografia e design.",nt:"Ipanema. Metrô até Ipanema. Entrada gratuita. Terça-domingo, 10h-18h. Permita 1-2 horas. Verifique exposições atuais."},
  {id:52,n:"Feira de São Cristóvão — Northeast Culture in Rio",a:"São Cristóvão",v:["markets","food","local"],d:90,s:"A massive weekend market where northern Brazilians (especially from the northeast) sell regional goods, food, crafts, and live music happens.",st:"São Cristóvão was built by migrants from northeast Brazil who came to Rio seeking work. The Feira (market) grew from informal street commerce. On weekends it explodes: hundreds of stalls selling regional foods (tapioca, acarajé, dried meat), crafts, clothes, music. Live bands play northeastern forró music. The food is authentic and cheap. The vibe is family-oriented and deeply Brazilian—not oriented toward tourists. It's where Rio's internal diversity is visible and celebrated.",im:"A food vendor grills acarajé (fried bean cakes) at a stall, steam rising, families standing with plates, a live band playing forró in the distance.",t:"Located in São Cristóvão. Metro to São Cristóvão station. Open primarily Saturdays and Sundays, 10am-6pm. It's crowded—go early morning or late afternoon. Bring cash. Food from stalls (15-30 BRL per item) is excellent. Allow 2-3 hours. It's safe and family-friendly.",c:["markets","food","local"],r:"g",nn:"Feira de São Cristóvão",ns:"Mercado massivo onde migrantes do nordeste vendem bens regionais",nst:"Feira cresceu de comércio informal. Finais de semana explodem com centenas de barracas vendendo comida autêntica.",nt:"São Cristóvão. Metrô até São Cristóvão. Sábados e domingos 10h-18h. Cedo ou fim de tarde. Dinheiro. Comida 15-30 BRL. Permita 2-3 horas."},
  {id:53,n:"Museu do Homem do Nordeste — Northeastern Culture Museum",a:"Centro",v:["history","free_culture","local"],d:60,s:"A small museum documenting the culture, history, and traditions of Brazil's northeast region and its migration to Rio.",st:"While São Cristóvão celebrates northeast culture in commerce, this museum documents its history, arts, and traditions. Exhibits cover regional music (forró), agriculture, religious traditions, and the experience of migration to Rio. The collection is thoughtful and small—not overwhelming. It's a chance to understand the cultural foundation of much of Rio's identity.",im:"A display case holds traditional northeastern instruments—a rasp, a drum, a stringed instrument—with labels explaining their role in forró music.",t:"Located in Centro. Metro to Cinelândia or similar. Admission is cheap or free (verify ahead). Hours are limited. Allow 1-2 hours. It's quieter than large museums. Go when you have time to read.",c:["history","free_culture"],r:"g",nn:"Museu do Homem do Nordeste",ns:"Museu documentando cultura do nordeste e migração para Rio",nst:"Pequeno museu com coleção de música regional, agricultura, tradições religiosas.",nt:"Centro. Metrô até Cinelândia. Entrada barata ou gratuita. Permita 1-2 horas. Quieto que museus maiores. Leia as explicações."},
  {id:54,n:"Mercado Público Rio Antigo — Historic Market Building",a:"Centro",v:["history","markets","free_culture"],d:30,s:"A preserved 1862 market building with original structure, now containing restaurants and small vendors in a historic setting.",st:"The Mercado Público was built in 1862 as Rio's central market. The structure—cast iron columns, high ceilings, grand architecture—remains. The market function has changed: it's now primarily restaurants and bars operating inside the historic structure. You can eat fresh seafood or traditional dishes while seated under a building that's witnessed 160 years of Rio's commerce. The building itself is the point—it's one of Rio's best-preserved 19th-century structures.",im:"Inside the market building: cast iron columns soar upward, natural light floods from skylights, people eating at small tables, the architecture visible above.",t:"Located in Centro at Rua 1 de Março. Metro to Carioca or Central. Free to walk through. Restaurants inside charge standard prices (30-80 BRL for a meal). Open weekdays and weekends. Allow 1 hour. Go for lunch when it's most lively.",c:["history","markets","free_culture"],r:"g",nn:"Mercado Público Rio Antigo",ns:"Edifício de mercado de 1862 com estrutura original preservada",nst:"Construído em 1862, o mercado agora contém restaurantes dentro da estrutura histórica.",nt:"Centro em Rua 1 de Março. Metrô até Carioca ou Central. Entrada gratuita. Restaurantes 30-80 BRL. Almoço mais animado. Permita 1 hora."},
  {id:55,n:"Biblioteca Municipal — Local Library in Modernist Building",a:"Centro",v:["architecture","free_culture","quiet"],d:40,s:"A modernist library building with a beautiful interior, collections of Brazilian literature, and a peaceful reading space.",st:"Rio's municipal library is housed in a modernist building with clean lines and natural light. The collection focuses on Brazilian literature and local history. The reading rooms are quiet sanctuaries in the middle of the city. It's free and rarely visited by tourists. Locals come to read, study, and explore Brazil's written culture. The building itself exemplifies mid-century modernist design.",im:"A reader sits at a wooden table in a light-filled reading room, tall windows overlooking the city, shelves of books visible in soft focus.",t:"Located in Centro. Metro access. Free admission. Hours are weekdays and weekends. Go during quiet hours (mornings or mid-week). Allow 1-2 hours. No photography in reading rooms. It's a space for contemplation.",c:["architecture","free_culture"],r:"g",nn:"Biblioteca Municipal",ns:"Biblioteca em edifício modernista com coleção de literatura brasileira",nst:"Espaço de leitura quieto com design modernista, aberto ao público.",nt:"Centro. Acesso metrô. Entrada gratuita. Horas quietas (manhãs ou meio de semana). Permita 1-2 horas. Sem fotografia. Contemple."},
  {id:56,n:"Favela Santa Marta — Ethical Tour",a:"Botafogo",v:["neighborhoods","history","scary"],d:60,s:"With a registered guide, a respectful tour through a favela showing community organizations, murals, and real Rio culture.",st:"Favelas are hillside neighborhoods where Rio's poorest live. Tourism has complicated their existence—some see it as exploitative, some as economic opportunity. Santa Marta chose to engage respectfully. Local guides conduct tours that show community projects, murals, local businesses. It's not a performance—you see real homes, real people building real lives. The guide's payment goes to the community. It requires local guides only (ethical tourism). Approaching it with respect and humility is essential.",im:"A narrow street winds uphill through a favela, bright murals on the walls, local shops at street level, a guide explaining community projects to visitors.",t:"Requires booking with legitimate local guide organizations (Favela Santa Marta guides, or similar). Go in small groups only. Maximum 6 people. 100-150 BRL per person. 2-3 hours. Bring only necessary items. Respect residents. Ask permission before photographing. Do not condescend. Approach as a learner.",c:["neighborhoods","history"],r:"y",nn:"Favela Santa Marta",ns:"Tour ético de comunidade com guias locais",nst:"Santa Marta escolheu envolver-se respeitosamente, mostrando organizações comunitárias autênticas.",nt:"Requer guia local legítimo. Grupos pequenos apenas. 100-150 BRL. 2-3 horas. Respeito é essencial. Peça permissão para fotografar."},
  {id:57,n:"Zona Portuária Revitalization (Pier Mauá) — New Rio",a:"Centro",v:["architecture","neighborhoods","art"],d:90,s:"Rio's modernized port area with museums (MAR), restaurants, cultural spaces, and the renovated waterfront.",st:"In the 2000s, Rio invested heavily in revitalizing the port area. The Museu de Arte do Rio opened. A pier was renovated. Restaurants and bars opened along the water. It's not entirely successful—parts still feel empty—but it represents Rio's attempt to reclaim its waterfront as a cultural and social space. It's more authentic than some revitalizations and worth exploring to see contemporary Rio.",im:"A modern cultural institution overlooks the renovated pier, contemporary art visible through glass walls, a few people walking along new waterfront promenade.",t:"Located in Centro near Praça Mauá. Metro to Central. Free to walk around. Museums have separate admission. Restaurants range from 40-120 BRL. Allow 2-3 hours. The waterfront is pleasant for an evening walk.",c:["architecture","neighborhoods"],r:"g",nn:"Zona Portuária",ns:"Área portuária revitalizada com museus e culturais",nst:"Investimento em revitalização do porto com Museu de Arte do Rio e espaços culturais.",nt:"Centro perto de Praça Mauá. Metrô até Central. Passeio gratuito. Museus com entrada. Restaurantes 40-120 BRL. Permita 2-3 horas."},
  {id:58,n:"Sítio Roberto Burle Marx — Landscape Designer's Studio & Gardens",a:"Barra da Tijuca",v:["nature","architecture","beautiful"],d:120,s:"The former studio and gardens of Brazil's most important landscape architect, with examples of his design philosophy.",st:"Roberto Burle Marx was Brazil's most important landscape architect. He designed gardens and public spaces throughout Rio and Brazil using modernist principles and native plants. His studio—Sítio—contains his personal collection of plants, art, and design objects. The gardens show his philosophy: form following from understanding of Brazilian nature. The sítio functions as a museum of his work and life. It's quieter and more authentic than many museums.",im:"A modernist garden with flowing curves, native plants arranged with precision, a studio building visible, the design integrated with the landscape.",t:"Located in Barra da Tijuca. Requires taxi or rental car from Centro (30-40 min). Hours limited; call ahead (3324-4412) for tours. Tours are required. Admission is modest. Allow 2-3 hours. The gardens are extraordinary.",c:["nature","architecture"],r:"g",nn:"Sítio Roberto Burle Marx",ns:"Studio e jardins do mais importante paisagista brasileiro",nst:"Burle Marx criou jardins usando plantas nativas e princípios modernistas.",nt:"Barra da Tijuca. Táxi ou carro (30-40 min). Horas limitadas—ligue antecedência. Tours requeridas. Entrada modesta. Permita 2-3 horas."},
  {id:59,n:"Museu de Arte Sacra — Sacred Art Museum",a:"Centro",v:["history","art","quiet"],d:45,s:"A small museum in a former convent with religious art, sculptures, and objects spanning centuries of Brazilian Catholicism.",st:"Brazil's Catholicism, shaped by indigenous and African traditions, created a unique sacred art. This museum houses paintings, sculptures, and objects—often depictions of saints, crucifixes, processional items—from colonial and imperial periods. The museum is small and intimate, housed in a former convent. Few tourists visit. It's a chance to understand the spiritual dimensions of Brazilian culture.",im:"A wooden sculpture of a saint stands in a glass case, the carving intricate and aged, candlelight casting shadows.",t:"Located in Centro. Metro access. Admission is free or very cheap. Hours limited (usually 1-5pm, closed Mondays). Allow 1-2 hours. It's a quiet, contemplative space.",c:["history","art"],r:"g",nn:"Museu de Arte Sacra",ns:"Museu de arte religiosa em antigo convento",nst:"Abriga arte católica única do Brasil, moldada por tradições indígenas e africanas.",nt:"Centro. Metrô. Entrada gratuita ou muito barata. Terça-quinta 13h-17h. Permita 1-2 horas."},
  {id:60,n:"Afro-Brazilian Museum (Museu Afro Brasil Connection)",a:"Various",v:["history","free_culture","weird"],d:90,s:"Understanding Rio's profound African heritage through museums, cultural centers, and historic sites related to the slave trade and African diaspora.",st:"Rio was built on the forced labor of enslaved Africans. The traces of this history are everywhere but often invisible. The Museu Afro Brasil (technically in São Paulo, but Rio has related institutions) documents African heritage. In Rio itself, sites like the Valongo waterfront (where enslaved people were brought), quilombo sites, and cultural centers preserve this history. Understanding it is essential to understanding Rio.",im:"A historical artifact in a museum case—shackles, a ceremonial object, a piece of cloth—with careful explanatory text.",t:"Multiple sites across Rio. Start with a reputable guide or cultural organization focused on Afro-Brazilian history. Budget 150-300 BRL for guided experiences. Allow half days. Approach with respect and commitment to understanding, not morbid curiosity.",c:["history","free_culture"],r:"g",nn:"Museu Afro-Brasileiro",ns:"Documentação da herança africana profunda no Rio",nst:"Rio foi construída sobre trabalho forçado. Museus e centros culturais preservam esta história essencial.",nt:"Múltiplos sítios. Guia respeitável enfocado em história afro-brasileira. Abordagem respeitosa e comprometida com compreensão."}

<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
<div className="mt-5">
<p className="text-xs font-bold mb-2" style={{color:"#888",letterSpacing:"0.08em",textTransform:"uppercase"}}>City Moods</p>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} style={{borderRadius:10,overflow:"hidden",aspectRatio:"2/3",background:"#eee"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>)}</div></div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
const TBGS={"places":"https://mariavheland.github.io/godostuff/textures/tex17.png","collections":"https://mariavheland.github.io/godostuff/textures/tex07.png","missions":"https://mariavheland.github.io/godostuff/textures/tex07.png","plan":"https://mariavheland.github.io/godostuff/textures/tex07.png","phrases":"https://mariavheland.github.io/godostuff/textures/tex17.png","default":"https://mariavheland.github.io/godostuff/textures/tex17.png"};if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:"url('https://mariavheland.github.io/godostuff/textures/tex12.png') center/cover no-repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Rio de Janeiro Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Rio de Janeiro Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
