<script>
const P = [
  {id:1,n:"Christ the Redeemer — Cristo Redentor",a:"Corcovado",v:["history", "views", "art"],d:40,s:"An Art Deco monument standing 98 feet tall, opened in 1931, overlooking the entire city from Corcovado mountain.",st:"Completed in 1931 after nearly a decade of construction, Cristo Redentor emerged from a partnership between Brazilian engineer Heitor da Silva Costa and French designer Paul Landowski. The monument was funded by donations and has become synonymous with Rio itself. Standing atop Corcovado mountain, at 2,300 feet elevation, it watches over a city that sprawls below in all directions—the Atlantic coastline glittering in one direction, the granite peaks of the Serra da Carioca in another. Locals rarely climb to the top, but visitors from around the world queue for hours to touch its stone feet and feel the weight of history beneath their hands.",im:"A lone climber reaches the summit platform as dawn breaks, the statue silhouetted against a salmon-pink sky, with Ipanema beach emerging from the morning mist below.",t:"Take the cog train from Estação de Corcovado (15 min to summit). Go early morning to avoid crowds and heat. Bring water. The site is accessible to those with mobility limitations.",c:[],r:"g",nn:"Cristo Redentor",ns:"Monumento icônico com vistas panorâmicas da cidade",nst:"Construído em 1931, é um símbolo de fé e resistência que vigia o Rio há décadas, criando um elo espiritual entre a população e a natureza.",nt:"Trem de cremalheira desde a Estação de Corcovado. Leve água e chegue cedo para evitar multidões. Acessível para pessoas com mobilidade reduzida."},
  {id:2,n:"Copacabana Beach — Praia de Copacabana",a:"Copacabana",v:["beautiful", "local", "views"],d:20,s:"A 2.3-mile curve of white sand and black and white mosaic promenade, one of the world's most iconic beaches where cariocas have gathered since the 1920s.",st:"Copacabana transformed from a fishing village to a beach mecca in the 1920s when tycoon Henrique Dodsworth envisioned a grand resort destination. The neighborhood boomed during Rio's heady mid-20th century, when the beach became the stage for Brazil's cultural explosion—samba emerged here, bossa nova was born in its bars, and the famous New Year's Eve celebrations began in 1941, now drawing two million people annually. Walk the mosaic promenade at dawn when local joggers and fishermen own the space, or sit at a beachside boteco and watch the Atlantic light change across the water as you sip a caipirinha.",im:"An elderly vendor arranges fresh coconuts in neat rows at sunrise, their golden husks glowing against the grey sand, as a few early swimmers emerge from the glassy water.",t:"Metro directly to Copacabana station. The beach is patrolled by lifeguards. Best swimming areas are marked. Bring cash for vendors. Bring a strong sunscreen. Avoid displaying expensive items.",c:[],r:"g",nn:"Praia de Copacabana",ns:"Praia lendária com águas quentes e vida cultural vibrante",nst:"Durante décadas, Copacabana foi o coração da vida carioca, palco de encontros românticos e celebrações que moldaram a cultura brasileira.",nt:"Metrô direto até a estação Copacabana. Nadadeiras seguras e marcadas. Traga dinheiro para vendedores e protetor solar forte."},
  {id:3,n:"Ipanema Beach — Praia de Ipanema",a:"Ipanema",v:["beautiful", "local", "food"],d:30,s:"A sophisticated beach neighborhood where bossa nova was born, fronted by white sand and surrounded by art galleries, upscale restaurants, and lively cafés.",st:"In 1957, two Brazilians—João Gilberto and guitarist João Gismonti—were walking along Ipanema's shore when inspiration struck: the smooth, sophisticated sound of bossa nova was born right there on this very beach. The neighborhood became an artistic haven, attracting poets, painters, and musicians who gathered at the beach bars and cafés. By the 1960s, Ipanema had replaced Copacabana as Rio's cultural epicenter. Today, the beach retains that bohemian spirit—you'll see groups of men playing frescobol (a paddleball game), vendors selling tropical fruits, and the ever-present street musicians reminding passersby of the neighborhood's musical heritage.",im:"An elderly guitarist sits beneath a striped umbrella, playing for handful of listeners as the afternoon sun casts long shadows across the white sand and families wade in turquoise water.",t:"Bus 464 or 472 to Ipanema. Parking is difficult; metro and buses are best. The beach is calm for swimming. Dozens of beach vendors sell food, drinks, and ice cream. Arpoador area (western end) has better waves for surfers.",c:[],r:"g",nn:"Praia de Ipanema",ns:"Berço da bossa nova e santuário da sofisticação carioca",nst:"Aqui nasceu a bossa nova em 1957, transformando-se no coração artístico do Rio, onde poetas e músicos ainda se reúnem para criar.",nt:"Ônibus 464 ou 472 para Ipanema. A praia é calma para nadar. Muitos vendedores de alimentos e bebidas. Extremidade oeste tem melhores ondas para surfe."},
  {id:4,n:"Sugarloaf Mountain — Pão de Açúcar",a:"Urca",v:["history", "views", "beautiful"],d:35,s:"A dramatic 1,300-foot granite and quartz monolith accessible by two cable cars offering 360-degree views of Rio, the bay, and the surrounding mountains.",st:"Named Pão de Açúcar by Portuguese colonists who fancied its resemblance to the refined sugar loaves that arrived from their homeland, this iconic peak has watched over Rio for five centuries. The cable car itself is an engineering marvel—opened in 1912, it was one of the first of its kind in the world. Ride it at dusk when the city lights begin to twinkle, and you'll understand why cariocas call this their crown jewel. The upper station sits at 3,000 feet, offering unobstructed views of Christ the Redeemer in the distance, Copacabana curving along the shore, and Guanabara Bay stretching out like an inland sea.",im:"A couple stands at the observation platform at sunset as Rio spreads beneath them in shades of amber and violet, the cable car visible below against the dark mountain face.",t:"Cable car operates 8am-8pm from Praia Vermelha station in Urca. Arrive early for first trip or after 5pm to avoid crowds. Bring a light jacket as winds are strong. The lower station can be reached by bus 511 or a short taxi ride from Copacabana.",c:[],r:"g",nn:"Pão de Açúcar",ns:"Monumento geológico singular com vistas incomparáveis",nst:"O teleférico, aberto em 1912, foi um dos primeiros do mundo, levando visitantes aos 1000m de altura para contemplar a beleza da baía de Guanabara.",nt:"Teleférico funciona 8h-20h da estação da Praia Vermelha em Urca. Chegue cedo ou após 17h. Traga jaqueta leve. Ônibus 511 ou táxi do Leblon."},
  {id:5,n:"Maracanã Stadium — Estádio do Maracanã",a:"São Cristóvão",v:["history", "local"],d:25,s:"Built in 1950 for the World Cup, this stadium once held 200,000 spectators and remains Brazil's most emotionally resonant sporting venue.",st:"The Maracanã was constructed in just 18 months to host the 1950 FIFA World Cup, a time when Brazil believed itself on the verge of a football revolution. The final match—Brazil versus Uruguay—is still discussed with a mixture of pride and heartbreak among older cariocas, as Uruguay's unexpected victory devastated a nation that had dreamed of its first World Cup. The stadium has since hosted countless pivotal moments: the 1978 FIFA World Cup, innumerable Flamengo and Vasco da Gama derbies, concerts by The Rolling Stones and U2. Renovated extensively for the 2014 World Cup and 2016 Olympics, the stadium still carries the weight of these histories in its every corner.",im:"A street vendor sells cold beer outside the stadium gates as fans in green and yellow shirts stream past, their voices blending into a roar that echoes off the walls.",t:"Located in São Cristóvão, a 10-minute metro ride from Centro. Stadium tours available on non-match days (check ahead). Take an official tour rather than exploring alone. Visit the museum for football history. Match days create heavy traffic and crowds.",c:[],r:"g",nn:"Estádio do Maracanã",ns:"Templo do futebol onde histórias de glória e tristeza se entrelaçam",nst:"Construído em 1950, abrigou o coração partido de uma nação quando o Uruguai venceu a final, mas permanece sagrado para os torcedores brasileiros.",nt:"Metrô para São Cristóvão. Passeios no estádio disponíveis em dias sem jogos. Visite o museu para história do futebol. Dias de jogo criam trânsito pesado."},
  {id:6,n:"Lapa District — Bairro da Lapa",a:"Lapa",v:["history", "night", "art"],d:25,s:"A bohemian neighborhood with 18th-century colonial architecture, iconic street art, samba clubs, and the famous Lapa Steps—a cultural mecca for music and nightlife.",st:"Lapa's history is layered like the paint on its walls. Once Rio's red-light district in the early 20th century, it transformed into a haven for artists and musicians by mid-century. The Arcos de Lapa (aqueduct built in 1750) presides over the neighborhood like a guardian spirit. In the 1970s, when samba was under threat from military censorship, Lapa became a refuge where the music survived—in small clubs, on street corners, in the hearts of its residents. Today, the neighborhood pulses with creative energy. Walk the Escadaria Selarón (Selaron Steps)—a thousand-step staircase hand-decorated by a Chilean artist with colorful tiles—and you'll understand why artists have always been drawn here.",im:"A street musician plays saxophone on the cobblestones beneath the Arcos de Lapa at dusk, his silhouette framed by the colonial arches and city lights beginning to glow.",t:"Metro to Lapa station. The neighborhood is lively at night but exercise caution. Best visited after 5pm when samba clubs open. Join a walking tour to understand its history. The Escadaria Selarón attracts crowds during day—climb early or late.",c:[],r:"g",nn:"Bairro da Lapa",ns:"Coração artístico do Rio onde samba e história pulsam nas ruas",nst:"Refúgio da samba durante tempos sombrios, Lapa ressurgiu como santuário da criatividade, onde arte muralista e música se entrelaçam em cada esquina.",nt:"Metrô até Lapa. Bairro animado à noite, mas com cautela. Melhor visitado após 17h quando os clubes abrem. Escadaria Selarón: suba cedo ou tarde para evitar multidões."},
  {id:7,n:"Botanical Garden — Jardim Botânico",a:"Botafogo",v:["nature", "beautiful", "hidden"],d:45,s:"Founded in 1808, this 340-acre tropical garden contains 6,500 plant species, serene pathways, and a hidden monastery with historical significance.",st:"Prince João VI, fleeing Napoleon's forces, arrived in Rio in 1808 and established this botanical garden as both a scientific endeavor and a refuge. The garden was designed to acclimatize tropical plants and study their medicinal properties—a living library of Brazil's botanical wealth. Two centuries later, it remains a sanctuary within the city. The main avenue is lined with towering royal palms planted in the 1850s; a meditation lake reflects the surrounding jungle canopy; hidden grottos and fountains surprise you around every corner. The small monastery tucked into one corner, built in the 1780s by monks seeking solitude, still stands as a testament to spiritual seeking.",im:"A woman in a white dress walks beneath a tunnel of towering green palms, dappled sunlight creating a path of shadows across the stone walkway.",t:"Bus 474 to the entrance or taxi/Uber from Leblon. Allow 2 hours minimum. The garden is flat and easy to walk. Bring water and insect repellent. The lake area is particularly peaceful in early morning. Guided tours available.",c:[],r:"g",nn:"Jardim Botânico",ns:"Oásis tropical de tranquilidade e contemplação",nst:"Fundado em 1808 pelo Príncipe João VI, abriga 6500 espécies de plantas e um mosteiro secreto que convida ao repouso espiritual.",nt:"Ônibus 474 ou Uber. Permita 2 horas mínimo. Terreno plano e fácil de caminhar. Leve água e repelente de insetos. Passeios guiados disponíveis."},
  {id:8,n:"Centro (Historic Downtown) — Centro Histórico",a:"Centro",v:["history", "architecture", "art"],d:30,s:"Rio's oldest neighborhood preserves 400 years of Portuguese colonial, imperial, and modernist architecture, including palaces, churches, and cultural institutions.",st:"Walk through Centro and you walk through time itself. The Praça XV de Novembro, once the colonial city's heart, still radiates with history—it was here that Dom Pedro II ruled Brazil's empire. The Cathedral, completed in 1976, sits boldly modern against the surrounding colonial facades. The Biblioteca Nacional, built in 1910, houses over 9 million volumes—Portugal's royal library was transferred here when the Portuguese court fled to Rio in 1808. The Teatro Municipal, opened in 1909, hosted performances by Sarah Bernhardt and Nijinsky. Every corner holds stories: the street where slaves were traded centuries ago, the corner where independence was declared, the building where Machado de Assis—Brazil's greatest writer—spent his final years.",im:"Afternoon light streams between tall colonial buildings onto a square where a vendor arranges fresh açaí bowls, tourists study maps, and a street musician plays guitar beneath a building's ornate balcony.",t:"Metro to Centro station. The neighborhood requires daylight visits; exercise caution at night. Join a historical walking tour to understand the layered history. The Cathedral's modernist interior is striking. Visit the Biblioteca Nacional's reading room.",c:[],r:"g",nn:"Centro Histórico",ns:"Coração antigo de Rio onde séculos de história convergem",nst:"400 anos de história colonial, imperial e modernista se revelam a cada passo, desde a Praça XV até a majestosa Biblioteca Nacional.",nt:"Metrô até Centro. Visite durante o dia. Passeio histórico recomendado. Cathedral's interior é impressionante. Biblioteca Nacional's sala de leitura é imperdível."},
  {id:9,n:"Estácio District — Bairro de Estácio",a:"Estácio",v:["history", "local", "food"],d:20,s:"The birthplace of modern samba, this working-class neighborhood created the sound that defines Brazil, where samba schools are born and samba's soul still pulses.",st:"In the early 1900s, former slaves and poor migrants clustered in the hills of Estácio and created something entirely new: modern samba. In 1928, the neighborhood's samba schools, led by Mangueira, formally organized and paraded for the first time in what would become Rio's Carnival tradition. The Estácio neighborhood, often overlooked by tourists, remains the true heart of samba culture—less polished than the official Carnival parade, more authentic in its street celebrations and community percussion sessions. Walk these hills at night during Carnival season and you'll hear the heartbeat of Brazil itself echoing off the buildings.",im:"A street corner erupts in impromptu samba dancing as a drummer sets the rhythm on a plastic bucket, onlookers clapping, a vendor selling frozen drinks catching the moment.",t:"Bus routes 298 and 327 serve the neighborhood. Best visited during Carnival season (February-March). Exercise caution at night. Join a local guide tour to understand the samba schools. The local bars and street food are authentic.",c:[],r:"g",nn:"Bairro de Estácio",ns:"Berço do samba moderno onde a alma brasileira bate",nst:"Em 1928, as escolas de samba nascem aqui, criando a tradição do Carnaval que perdura até hoje como celebração da cultura afro-brasileira.",nt:"Ônibus 298 e 327. Melhor visitado durante Carnaval. Cuidado à noite. Passeios com guia local recomendados. Comida de rua autêntica."},
  {id:10,n:"Rocinha Favela — Comunidade Rocinha",a:"São Conrado",v:["local", "hidden", "architecture"],d:30,s:"South America's largest favela, home to 100,000 residents, visible from Christ the Redeemer—a complex community requiring respectful, guided exploration.",st:"Rocinha grew organically from the 1940s onward, as rural Brazilians arrived seeking work in the booming city. What Western media often portrays as a 'slum' is actually a thriving, self-organized community with schools, businesses, churches, and deep social networks. The houses, painted in bright blues, yellows, and pinks, cascade down the mountainside in an organic architecture born of necessity and ingenuity. A responsible tour—led by someone from the community—offers insights into real life here: the underground market economy, the informal governance systems, the music and art that flourish amid hardship. This is not tourism to gawk at poverty, but an opportunity to understand a crucial part of Rio's social reality.",im:"A narrow path winds between colorful houses stacked vertically up the hillside, laundry strung between buildings, children playing soccer in a small clearing with Guanabara Bay glinting far below.",t:"Only visit with a registered community guide (not street tours). Guides can be arranged through hotels or booking platforms. Go during daylight only. Be respectful with cameras—ask permission before photographing residents. Expect narrow, steep walkways.",c:[],r:"g",nn:"Comunidade Rocinha",ns:"Comunidade vibrante de 100,000 pessoas com arquitetura espontânea",nst:"Nascida nos anos 1940, Rocinha é um organismo social complexo onde criatividade e resiliência se tecem nas cores das casas que cobrem a montanha.",nt:"Visite apenas com guia comunitário registrado. Guias disponíveis em hotéis. Apenas durante o dia. Respeite os residentes ao fotografar. Caminhos estreitos e íngremes."},
  {id:11,n:"Vidigal Favela — Morro da Vidigal",a:"São Conrado",v:["local", "views", "art"],d:25,s:"A smaller, more accessible favela community than Rocinha, with stunning city views, street art, and a reputation as an artistic haven.",st:"Vidigal, perched on a hilltop overlooking Leblon Beach, has become known in recent years as a hub for artist-activists and cultural initiatives. While still a working-class community with its share of challenges, Vidigal has attracted young artists, photographers, and musicians who've contributed vibrant street art and community programming. The climb to the top reveals painted murals, galleries in modest homes, and viewpoints that rival any paid tourist destination. The community has grown more welcoming to respectful visitors, and several bars and cafés cater to those seeking authentic Rio experiences beyond the beachfront tourist zones.",im:"A street artist applies final touches to a massive mural of a woman's face, her expression serene and powerful, the city sprawling behind in the afternoon light.",t:"Enter from Rua Dois de Dezembro near Leblon. Can also take a helicopter tour that departs from nearby. Go with a local guide or join a group tour. The walk up is steep but manageable. Visit during daylight. Support local businesses by purchasing food and drinks.",c:[],r:"g",nn:"Morro da Vidigal",ns:"Comunidade artística com vistas espetaculares da cidade",nst:"Transformada por artistas e ativistas, Vidigal oferece murais vibrantes, cafés autênticos e perspectivas que rivais as melhores vistas turísticas.",nt:"Entrada pela Rua Dois de Dezembro perto de Leblon. Caminhada íngreme mas acessível. Visite com guia ou em grupo. Apenas durante o dia. Apoie negócios locais."},
  {id:12,n:"Petropolis City — Cidade de Petrópolis",a:"Petrópolis (Day Trip)",v:["history", "architecture", "hidden"],d:480,s:"A mountain retreat 40 miles north, built as the imperial summer palace in the 1840s, with European architecture, cool climate, and the Petropolis Cathedral.",st:"In 1843, Emperor Pedro II commissioned Petropolis as an escape from Rio's sweltering heat—a 'Switzerland in the Tropics.' European architects and craftsmen were brought in to construct a city of grand palaces, churches, and villas in an alpine style that seemed impossibly transplanted to Brazil. The Palácio Imperial (Imperial Palace), completed in 1862, served as the royal residence during summer months and witnessed key moments in Brazilian history—including the signing of the Golden Law, which abolished slavery in 1888. Today, Petropolis feels frozen in time: grand mansions line tree-shaded avenues, the cathedral's twin spires pierce the mountain mist, and the river runs crystal clear through town. Visitors often spend a day here, feeling they've stepped into 19th-century Europe.",im:"A tourist climbs the cathedral steps as afternoon light catches the twin spires, mountains rising misty in the background, horse-drawn carriages waiting at the plaza below.",t:"Bus or car from Rio (1.5 hours). The mountain climate is noticeably cooler. Petropolis can be crowded on weekends. Visit on a weekday if possible. The Cathedral and Imperial Palace are the main attractions. Excellent restaurants and cafés throughout the town. Return to Rio before dark.",c:[],r:"g",nn:"Cidade de Petrópolis",ns:"Retiro imperial europeu suspenso nas montanhas",nst:"Construída em 1843 como refúgio de verão imperial, Petropolis preserva a elegância arquitectónica de um século passado nas suas ruas arborizadas.",nt:"Ônibus ou carro do Rio (1.5 horas). Clima montanhoso notavelmente mais fresco. Visite em semana se possível. Catedral e Palácio Imperial são principais. Ótimos restaurantes."},
  {id:13,n:"Escadaria Selarón — Selarón Steps",a:"Lapa",v:["art", "beautiful", "history"],d:25,s:"A 125-meter staircase in Lapa hand-decorated with over 2,000 ceramic tiles by Chilean artist Jorge Selarón over 25 years.",st:"Jorge Selarón, a Chilean painter who arrived in Rio in 1987, fell in love with the city and decided to give back. He took over an abandoned staircase in Lapa and, over 25 years, single-handedly transformed it into an art installation of breathtaking beauty—each of the 250 steps decorated with hand-painted and donated tiles. Selarón used tiles from around the world: Portuguese azulejos, Italian mosaics, Brazilian ceramics, each one deliberately placed like a master craftsman. He worked for free, funding the project through painting and odd jobs. The steps became an open-air gallery, a meditation on immigration, belonging, and artistic dedication. Tragically, Selarón died in his home in 2013, but the steps remain his masterwork—a stairway to heaven painted in ten thousand colors.",im:"A barefoot child runs up the ceramic steps, each tile glowing in different colors—blues, reds, yellows, greens—creating a rainbow path climbing the hillside.",t:"Metro to Lapa, then a 10-minute walk. The steps are steep—wear good shoes. Go early morning to avoid crowds and get the best light for photos. The steps can get slippery in rain. Respectful behavior required—this is an active art installation.",c:[],r:"g",nn:"Escadaria Selarón",ns:"Escadaria de arte com 2000 azulejos transformada por um artista chileno",nst:"Durante 25 anos, Jorge Selarón dedicou-se a transformar uma escadaria abandonada numa obra-prima de arte comunitária, cada azulejo uma história de amor pela cidade.",nt:"Metrô até Lapa. Escadaria íngreme. Visite cedo para evitar multidões e melhor luz. Pode escorregar em dias de chuva. Comportamento respeitoso requerido."},
  {id:14,n:"Carnival Museum — Museu do Carnaval",a:"Centro",v:["history", "art", "local"],d:45,s:"A repository of Rio Carnival's 100-year history featuring costumes, floats, photographs, and cultural artifacts celebrating Brazil's most important cultural event.",st:"The Carnival Museum captures the essence of Rio's most feverish celebration. The first official Carnival parade occurred in 1928 in Estácio, and the tradition has grown into a global phenomenon. The museum displays elaborate costumes worn by carnival queens and dancers, towering headdresses decorated with feathers and crystals that took months to create, photographs of legendary performers, and installations that immerse visitors in the rhythm and color of the festival. You learn that Carnival is not just a tourist spectacle but a spiritual and cultural moment where class differences temporarily dissolve, where Brazilian identity is performed and renewed. The museum offers context to understand what you see on television, revealing the artistry and months of preparation behind those fleeting moments of television glory.",im:"A massive carnival costume—featuring a headdress of peacock feathers and a bodice covered in hand-sewn crystals—stands alone in a glass case under theatrical lighting.",t:"Located in Centro, near Praça Onze. Metro to Uruguaiana station. Admission required. Allow 1-2 hours. The museum can be crowded during Carnival season; visit before or after for a more reflective experience. Portuguese language exhibits, but visual displays transcend language.",c:[],r:"g",nn:"Museu do Carnaval",ns:"Repositório de 100 anos de história do Carnaval carioca",nst:"O museu celebra a explosão artística e cultural que é o Carnaval, revelando os meses de preparação por trás dos momentos gloriosos.",nt:"Localizado em Centro, perto de Praça Onze. Metrô até Uruguaiana. Entrada requerida. Permita 1-2 horas. Visite antes ou depois da Carnaval para experiência mais reflexiva."},
  {id:15,n:"CCBB (Banco Central Cultural Center) — Centro Cultural Banco do Brasil",a:"Centro",v:["art", "architecture", "history"],d:35,s:"A palatial 1880s building housing rotating exhibitions of Brazilian and international contemporary art, plus a cinema and reading room.",st:"The building itself is a masterwork of Beaux-Arts architecture, completed in 1880 as the headquarters of the Bank of Brazil. When it was converted into a cultural center in 1989, it became one of Rio's most important spaces for artistic expression. The grand staircases, ornate columns, high ceilings, and multiple galleries create an atmosphere of intellectual grandeur. The exhibitions are carefully curated, ranging from photography to installations to historical retrospectives. The cinema shows art films and documentaries. The reading room contains rare books. This is where Rio's cultural elite gather, where art is taken seriously, where the building's own history as a symbol of economic power is being rewritten into a symbol of cultural democracy.",im:"A visitor stands before an abstract canvas the size of a wall, the painting's colors reflected faintly on their face as they study the artist's brushstrokes.",t:"Metro to Uruguaiana or Carioca station. Admission is free for most exhibitions (some charged). Hours are Wednesdays through Mondays, 10am-8pm. Allow 1-2 hours. Check the website for current exhibitions. The café is excellent for a break.",c:[],r:"g",nn:"Centro Cultural Banco do Brasil",ns:"Palácio cultural com exposições de arte contemporânea",nst:"Convertido em 1989 de um banco em 1880 para espaço cultural, o CCBB democratiza a arte através de exposições cuidadosamente curadas.",nt:"Metrô até Uruguaiana ou Carioca. Entrada gratuita para maioria das exposições. Aberto quarta a segunda, 10h-20h. Permita 1-2 horas. Café excelente."},
  {id:16,n:"Lagoa Rodrigo de Freitas — Rodrigo de Freitas Lagoon",a:"Lagoa",v:["nature", "beautiful", "local"],d:30,s:"A saltwater lagoon bordered by 7.5 km of paths, lined with trees, and rimmed by neighborhoods offering jogging, cycling, rowing, and contemplative walks.",st:"This lagoon, separated from the Atlantic by a narrow strip of land, has been a gathering place for cariocas for centuries. Colonial-era maps show small fishing settlements here; 19th-century poets wrote about its mirror-like surface reflecting the mountains. Today, the lagoon is ringed by a beautiful promenade where locals jog, cycle, and walk every dawn and dusk. The water supports sailboats and rowing clubs. The neighborhoods around it—Lagoa, Ipanema, Leblon—are among Rio's most desirable, but the lagoon itself remains a public space where class boundaries blur and Brazilians of all backgrounds share the same path. At sunset, when the mountains turn purple and the light softens, you understand why this place has always drawn human connection.",im:"A jogger runs along the lagoon path at dawn, the water glass-smooth and reflecting the pre-sunrise sky, mountains rising dark in the background.",t:"The path is accessible from multiple points: Leblon, Ipanema, Lagoa neighborhood. It's very safe during daylight; locals jog here throughout the day. The best times are dawn (5-7am) or sunset (5-7pm). Bring water. The neighborhoods around have cafés and restaurants.",c:[],r:"g",nn:"Lagoa Rodrigo de Freitas",ns:"Lagoa serena circundada por 7.5km de caminhos arborizados",nst:"Séculos de história se refletem nesta lagoa, onde cariocas de todas as classes compartilham o mesmo caminho ao amanhecer e entardecer.",nt:"Acessível de vários pontos: Leblon, Ipanema, bairro da Lagoa. Muito seguro durante o dia. Melhor ao amanhecer (5-7h) ou entardecer (5-7h). Leve água."},
  {id:17,n:"Instituto Moreira Salles — Moreira Salles Institute",a:"Gávea",v:["art", "architecture", "beautiful"],d:40,s:"A stunning modern glass and steel structure in a leafy neighborhood housing photography, film, and visual arts exhibitions in one of Rio's finest cultural institutions.",st:"The building itself, designed by architect Didi Contini, is a work of art—all glass walls and open spaces that dissolve the boundary between interior gallery and exterior landscape. Opened in 2006, the Moreira Salles Institute has become one of South America's finest cultural spaces. The exhibitions are intellectually rigorous and visually stunning: retrospectives of important Brazilian photographers, international contemporary art, film series, and performances. The café overlooking the gardens is peaceful, the staff knowledgeable and friendly. This is high culture presented not with pretension but with genuine passion for artistic inquiry. The location in Gávea puts it in a quieter part of Rio, removing it from tourist circuits but making it a cherished refuge for those seeking serious aesthetic experience.",im:"A visitor stands within the glass structure, surrounded by both landscape and artwork, the boundary between nature and art dissolved completely.",t:"Located in Gávea, a quiet residential neighborhood. Takes about 30-40 minutes from Copacabana via taxi or Uber. Admission is free. Open Tuesdays through Sundays. Allow 1-2 hours. The surrounding neighborhood has good restaurants and cafés.",c:[],r:"g",nn:"Instituto Moreira Salles",ns:"Instituição cultural de vidro e arte em paisagem arborizada",nst:"A arquitetura moderna de Didi Contini cria uma experiência fluida onde arte e natureza se comunicam através de paredes de vidro.",nt:"Localizado em Gávea. 30-40 minutos de Copacabana. Entrada gratuita. Aberto terça a domingo. Permita 1-2 horas. Bons restaurantes próximos."},
  {id:18,n:"Museu de Arte Moderna — Museum of Modern Art",a:"Centro",v:["art", "history", "architecture"],d:45,s:"Rio's premier modern art museum in a Modernist building with exhibitions of Brazilian and international contemporary art, design, and photography.",st:"Founded in 1948, the Museu de Arte Moderna reflects Brazil's modernist aspirations in both its collection and its architecture. The building, designed by Affonso Eduardo Reidy, sits near the water's edge in a park-like setting—a masterpiece of Modernism itself. The museum suffered a devastating fire in 1961 that destroyed much of its early collection, but it rebuilt and grew stronger. Today it houses works by Burle Marx (who also designed the gardens), Portinari, Athos Bulcão, and many others who shaped Brazil's visual culture. The permanent collection is supplemented by traveling exhibitions. The museum embodies a particular moment in Brazilian history when modernism was seen as the path to national progress, and art was a tool for nation-building.",im:"A visitor contemplates an abstract painting in a gallery overlooking the park and harbor, afternoon light streaming through the modernist windows.",t:"Located near Aterro do Flamengo park. Metro to Glória station, then a short walk. Admission is modest. Open Tuesdays through Sundays. Allow 1-2 hours. The park surrounding the museum is also pleasant for walking.",c:[],r:"g",nn:"Museu de Arte Moderna",ns:"Museu de arte contemporânea com edifício modernista",nst:"Fundado em 1948, representa as aspirações modernistas do Brasil através de sua arquitetura de Affonso Eduardo Reidy e sua coleção de arte.",nt:"Perto de Aterro do Flamengo. Metrô até Glória, curta caminhada. Entrada modesta. Aberto terça a domingo. Permita 1-2 horas. Parque agradável para caminhar."},
  {id:19,n:"Armazém do Gavião — Gavião Warehouse Market",a:"Saúde",v:["local", "food", "history"],d:20,s:"A historic market in the port district (Saúde) selling fresh fish, produce, and traditional ingredients used in Brazilian and Afro-Brazilian cooking.",st:"The Armazém do Gavião is where Rio's culinary soul is traded daily. Built in the 1950s but rooted in centuries of port commerce, this warehouse market connects Rio to its maritime history and to the Afro-Brazilian traditions that shaped its food culture. You'll find ingredients here that connect to the Middle Passage—palm oil, okra, dried fish—but also the vibrant produce of the Brazilian interior. The vendors, many of them third-generation stallholders, know their products intimately. This is where professional chefs shop, where traditional cooks gather, where food history is written in the daily commerce of feeding a city. The surrounding Saúde neighborhood has undergone gentrification, but the market remains authentic, a place where cultural and culinary traditions still matter more than tourism.",im:"A vendor arranges fresh fish on ice in the early morning light, water running across the stall, other vendors calling out their goods in rapid Portuguese.",t:"Located in the Saúde neighborhood near the port. Bus or taxi from Centro. Go early morning (6-9am) when the market is most alive and selection is best. Bring cash. It's an active working market, not a tourist attraction, so exercise respect.",c:[],r:"g",nn:"Armazém do Gavião",ns:"Mercado histórico onde tradições culinárias são preservadas",nst:"Desde os anos 1950, este armazém conecta o Rio à sua história marítima e tradições afro-brasileiras através de ingredientes e conhecimento culinário.",nt:"Bairro Saúde, perto do porto. Ônibus ou táxi do Centro. Chegue cedo (6-9h). Traga dinheiro. Mercado de trabalho ativo, não turístico."},
  {id:20,n:"Biblioteca Nacional — National Library",a:"Centro",v:["history", "architecture", "art"],d:35,s:"Brazil's largest library, opened in 1910, housing 9 million items including rare manuscripts, first editions, and the Portuguese royal collection transferred in 1808.",st:"When Portugal's royal family fled Napoleon's armies and arrived in Rio in 1808, they brought the Portuguese royal library—over a million volumes. The library remained in temporary quarters for over a century until this magnificent Beaux-Arts building was completed in 1910. The entrance hall, with its soaring columns and intricate tilework, announces that this is a temple to knowledge. The reading room is one of the most beautiful spaces in Rio—long wooden tables, high windows, an atmosphere of quiet intellectual pursuits. Holdings include incunabula (early printed books), manuscripts by Brazilian writers, maps, engravings, and rare volumes. The library represents a moment when Brazil aspired to be a cosmopolitan empire with access to the world's accumulated knowledge. Today it remains that, though now in service of public learning rather than royal privilege.",im:"A scholar sits at a wooden table in the reading room, a rare manuscript open before them, light from tall windows creating patterns across the aged pages.",t:"Located in Centro, near Praça XV. Metro to Carioca station. Free admission to the reading room. Allow 1-2 hours. The building itself is worth seeing even if you don't access the collection. Bring ID. Tours available.",c:[],r:"g",nn:"Biblioteca Nacional",ns:"Templo do conhecimento com 9 milhões de itens",nst:"Aberta em 1910, abriga a coleção real portuguesa transferida em 1808, representando as aspirações cosmopolitas do Brasil imperial.",nt:"Centro, perto de Praça XV. Metrô até Carioca. Entrada gratuita. Permita 1-2 horas. Traga ID. Passeios disponíveis."},
  {id:21,n:"Museu Nacional da Quinta da Boa Vista — National Museum at Quinta da Boa Vista",a:"São Cristóvão",v:["history", "architecture", "nature"],d:45,s:"A former royal palace in a lush park setting, housing Brazil's oldest museum with natural history, ethnography, and anthropology collections spanning millennia.",st:"The Quinta da Boa Vista was the royal family's preferred residence during their Brazilian exile (1808-1821), and the palace later became the National Museum in 1818. It is Brazil's oldest museum, housing extensive collections of natural history—fossils, meteorites, minerals—and ethnographic materials documenting indigenous Brazilian cultures and African diasporic traditions. The building itself, with its elegant portico and gardens designed by Burle Marx, is a work of art. The park surrounding it offers respite from the city, with tree-shaded pathways and peaceful spaces. Though the museum suffered damage in a recent fire (2018), restoration has been ongoing. The collections remain extraordinary: they tell the story of Brazil's natural history, its indigenous peoples, and the people brought through the slave trade.",im:"A family walks through the park toward the palace, its neoclassical façade framed by tall palms, the building glowing in afternoon light.",t:"Located in São Cristóvão. Metro to São Cristóvão station. Admission is modest. Hours vary; check ahead. The park is pleasant for a long visit (2-3 hours). The museum may have limited access due to ongoing restoration. Bring water and sunscreen.",c:[],r:"g",nn:"Museu Nacional da Quinta da Boa Vista",ns:"Palácio real transformado em museu de história natural",nst:"Residência favorita da família real em 1808, tornou-se em 1818 o museu mais antigo do Brasil, preservando séculos de história natural.",nt:"São Cristóvão. Metrô até São Cristóvão. Entrada modesta. Parque agradável para longa visita. Verificar acesso devido a restauração. Leve água e protetor solar."},
  {id:22,n:"Theatro Municipal — Municipal Theatre",a:"Centro",v:["architecture", "history", "art"],d:30,s:"A Beaux-Arts masterpiece built in 1909, hosting world-class performances of opera, ballet, and theater, with a stunning interior of marble and stained glass.",st:"Completed in 1909 during Rio's Belle Époque, the Theatro Municipal was designed to rival the great theaters of Europe. The exterior, with its green copper dome, is visible from across the city. The interior is overwhelming in its opulence—marble staircases, gilded balconies, stained glass ceiling panels depicting scenes from Dante's Inferno. The inaugural performance was a Brazilian adaptation of 'The Merchant of Venice.' The theater hosted Sarah Bernhardt, Nijinsky, and countless Brazilian and international performers who shaped cultural history. The theater remains a functioning performing arts space, hosting the Rio de Janeiro Opera Company and Brazilian ballet companies. A tour of the theater is as much about architectural appreciation as about performing arts—the building itself is the art.",im:"The interior of the theater glows in warm light—red velvet seats, golden railings, the painted ceiling depicting dramatic scenes, an orchestra warming up below the stage.",t:"Located in Centro. Metro to Cinelândia station. Guided tours available on days without performances. Attending a performance is the ultimate experience. Book ahead for shows. Dress code varies by event. The building is magnificent whether you attend a show or just take a tour.",c:[],r:"g",nn:"Theatro Municipal",ns:"Obra-prima Beaux-Arts com arquitetura esplêndida",nst:"Inaugurado em 1909, hospedou Sarah Bernhardt e Nijinsky, permanecendo como templo de artes cênicas onde arquitetura e performance se unem.",nt:"Centro. Metrô até Cinelândia. Passeios guiados disponíveis. Assistir a performance é experiência máxima. Reserve com antecedência. Código de vestiário varia."},
  {id:23,n:"Parque Lage — Lage Park",a:"Jardim Botânico",v:["nature", "architecture", "art"],d:35,s:"A mountain park with a historic mansion, art school, walking trails through Atlantic rainforest, and hidden waterfalls in a lush garden setting.",st:"Parque Lage offers a remarkable combination of history, art, and nature. The mansion, built in 1913 for businessman Henrique Lage, sits at the center of the park with its neoclassical façade and beautiful gardens. The building now houses an art school and often hosts exhibitions and cultural events. The park itself is threaded with walking trails that climb into the Atlantic rainforest, offering glimpses of endemic birds, bromeliads, and ferns found nowhere else on Earth. Hidden waterfalls refresh small pools where you can cool off. The juxtaposition of mansion and wild forest—of human ambition and nature's persistence—makes this one of Rio's most contemplative spaces. Local artists come here to find inspiration; photographers find light filtering through the canopy.",im:"A solitary hiker emerges from dense forest into a small clearing where a hidden waterfall drops into a crystal pool, the only sounds those of dripping water and calling birds.",t:"Located in the Jardim Botânico neighborhood. Metro to General Osório, then bus. Admission is free. Open daily. Allow 2-3 hours for a full visit. The trails are well-marked but can be muddy. Bring good walking shoes and water. The mansion may have limited access if an event is occurring.",c:[],r:"g",nn:"Parque Lage",ns:"Mansão histórica suspensa entre arte e floresta tropical",nst:"A mansão de 1913 contrasta com a floresta atlântica intocada, criando espaço onde história humana encontra a resiliência da natureza.",nt:"Bairro Jardim Botânico. Metrô até General Osório. Entrada gratuita. Aberto diariamente. Permita 2-3 horas. Trilhas bem marcadas, podem ser enlameadas. Bom calçado."},
  {id:24,n:"Paço Imperial — Imperial Palace",a:"Centro",v:["history", "architecture"],d:30,s:"A restored 1743 colonial palace where emperors ruled Brazil, now a cultural center hosting exhibitions and performances in one of Rio's oldest buildings.",st:"The Paço Imperial (also called Paço da Cidade) was built in 1743 and served as the colonial governor's residence and later as the seat of imperial power when Pedro I and Pedro II ruled Brazil from here. The building witnessed the signing of Brazil's independence declaration, the debates over abolition, and countless moments that shaped national destiny. After Brazil became a republic, the palace fell into disrepair until restoration efforts in the 1980s transformed it into a cultural center. The rooms now host exhibitions, theater productions, and concerts. Walking through the restored chambers, you feel the weight of history—the decisions made here, the proclamations issued, the ceremonies held. The palace is both a museum of architecture and a living cultural space.",im:"Light streams through colonial windows onto a wooden floor polished to a shine, portraits of emperors hanging on whitewashed walls, an empty grand staircase descending.",t:"Located at Praça XV de Novembro in Centro. Metro to Carioca station. Admission is free for exhibitions. Hours are Tuesdays through Sundays, 10am-6pm. Allow 1-2 hours. Check ahead for performances or special events.",c:[],r:"g",nn:"Paço Imperial",ns:"Palácio colonial onde impérios foram governados",nst:"Construído em 1743, testemunhou a independência e debates sobre abolição, permanecendo como centro cultural onde história e arte se encontram.",nt:"Praça XV de Novembro em Centro. Metrô até Carioca. Entrada gratuita. Terça a domingo, 10h-18h. Permita 1-2 horas. Verifique performances."},
  {id:25,n:"Pista Clássica — Classic Walking Track at Lagoa",a:"Lagoa",v:["local", "nature", "views"],d:20,s:"A scenic path along Lagoa Rodrigo de Freitas where locals walk, jog, and cycle, with views of mountains, vegetation, and surrounding neighborhoods.",st:"While Lagoa itself is listed separately, the Pista Clássica (classic track) deserves special mention as the soul of the lagoon experience. This path, which loops the lagoon, is where Rio's informal community gathers daily. Early morning brings joggers, many of them elderly Brazilians who've been running this same route for decades. Mid-morning brings power walkers and those seeking fitness. At dusk, the path fills with cyclists, roller skaters, children, and families out for an evening stroll. The path connects neighborhoods—you can start in Ipanema, loop through Leblon, and end in the Lagoa neighborhood, seeing how these affluent areas have developed while maintaining this public space. The mountains rise constantly visible, the water reflects sky, and there's a sense of community maintained despite Rio's inequalities.",im:"An elderly couple walks hand-in-hand along the path at sunset, the mountain silhouettes turning purple, sailboats gliding past on the glassy water.",t:"Multiple entry points from Ipanema, Leblon, and Lagoa neighborhoods. The path is very safe during daylight. Go during prime hours (7-9am or 5-7pm) when you'll be among locals. Bring water. The neighborhoods have excellent cafés for post-walk socializing.",c:[],r:"g",nn:"Pista Clássica",ns:"Caminho comunitário onde Cariocas se reúnem diariamente",nst:"Percurso que conecta bairros e gerações, mantendo espaço público onde tradições informais de encontro permanecem vivas.",nt:"Múltiplos pontos de entrada de Ipanema, Leblon, Lagoa. Seguro durante o dia. Primeiras horas (7-9h) ou entardecer. Leve água. Cafés nos bairros."},
  {id:26,n:"Beco das Garrafas — Bottle Alley",a:"Botafogo",v:["history", "music", "hidden"],d:20,s:"A narrow alley in Botafogo where bossa nova was born in the 1960s, with live music venues and a legendary jazz club still operating.",st:"In the late 1950s and early 1960s, a narrow alley near Botafogo's waterfront became the birthplace of bossa nova. Musicians, including João Gilberto and Tom Jobim, would gather in small clubs in this alley—named 'Garrafas' (Bottles) because of the glass bottles lining its sides. The music that emerged was revolutionary: a fusion of samba rhythm with jazz harmonies, sung with a cool, intimate vocal style that became bossa nova. The Garrafas clubs were tiny, intimate spaces where the music was created and first heard by small audiences before it conquered the world. Today, the alley is less famous than Lapa, but it preserves something more authentic: the actual place where the music was born, still with bars and musicians, less polished than tourist attractions but more genuine.",im:"A musician plays guitar in a small doorway opening onto the narrow alley, the street barely wide enough for two people, the sound of music echoing off old walls.",t:"Located in Botafogo, near the waterfront. Metro to Botafogo station, then a 10-minute walk. The alley is not heavily touristed, so it feels authentic. Go in the evening when bars are lively. Check ahead for live music schedules. The neighborhood has good restaurants nearby.",c:[],r:"g",nn:"Beco das Garrafas",ns:"Viela histórica onde a bossa nova nasceu",nst:"Em 1957-1960, músicos como João Gilberto criaram o som revolucionário aqui, num espaço tão pequeno quanto a intimidade da música que criaram.",nt:"Botafogo, perto do cais. Metrô até Botafogo. Caminhe 10 minutos. Visite ao anoitecer quando bares têm vida. Verifique programação de música ao vivo."},
  {id:27,n:"Forte de Copacabana — Copacabana Fort",a:"Copacabana",v:["history", "architecture", "views"],d:25,s:"A 1914 military fort at the southern tip of Copacabana Beach with artillery pieces, historical exhibits, and sweeping views of the beach and Atlantic.",st:"Built in 1914 to protect Rio from naval attack, the Forte de Copacabana sits on a rocky outcropping at the southern end of the beach. The fort's thick stone walls, gun emplacements, and barracks represent turn-of-the-century military architecture. The 1922 Tenentista Revolt (a military uprising against the government) occurred here, with cannons firing from the fort—a dramatic moment in Brazilian military history. Today, the fort houses a small museum with historical exhibits about Rio's military past, and the ramparts offer stunning 360-degree views: the beach stretches northward in a graceful curve, the ocean extends to the horizon, and the city rises in the background. It's a quiet, contemplative spot where few tourists venture, despite being centrally located.",im:"The barrel of a rusted cannon points toward the horizon, the Atlantic stretching endlessly beyond, the beach a thread of white below.",t:"Located at the southern tip of Copacabana Beach. Metro to Copacabana, then a 10-minute walk to the fort entrance. Admission is modest. Hours are typically 10am-6pm. Allow 1-2 hours. The walk up to the fort is somewhat steep. The views are worth the climb. Bring water.",c:[],r:"g",nn:"Forte de Copacabana",ns:"Fortaleza de 1914 com vistas panorâmicas",nst:"Construído para defesa naval, o forte testemunhou a revolta de 1922 e permanece como sentinela histórica sobre a praia e o oceano.",nt:"Ponta sul de Copacabana. Metrô até Copacabana, caminhada de 10 min. Entrada modesta. 10h-18h. Permita 1-2 horas. Caminhada íngreme. Leve água."},
  {id:28,n:"Arena da Juventude — Youth Arena (Olympic Venue)",a:"Deodoro",v:["architecture", "history"],d:30,s:"A 2016 Olympic venue designed with inflatable roof technology, now hosting sports events and competitions in western Rio.",st:"Built for the 2016 Rio Olympics as a multipurpose arena, the Arena da Juventude exemplifies modern sports architecture with its innovative inflatable roof system. The building hosted badminton, modern pentathlon, and other sports during the Olympics, with a capacity for 8,000 spectators. The architecture is striking—the transparent and semi-transparent materials allow light to flood in while maintaining climate control. Since the Olympics, the facility has been repurposed for local sporting events, training, and community activities. It represents Rio's Olympic legacy: a functional building serving the community rather than becoming a white elephant. The surrounding area of Deodoro has been developed with Olympic infrastructure, transforming western Rio into a new sports district.",im:"The transparent roof glows with diffused natural light, casting patterns across the arena floor where athletes train below, the structural elements visible in dramatic silhouette.",t:"Located in Deodoro, in western Rio. Accessible by metro to Deodoro station. May require advance booking to visit unless an event is scheduled. Check ahead for events. The area is somewhat removed from central Rio but represents the Olympic legacy.",c:[],r:"g",nn:"Arena da Juventude",ns:"Venue olímpico com tecnologia de teto inflável",nst:"Construída para os Jogos de 2016, a arena permanece funcional, servindo a comunidade com seus inovadores sistemas arquitetônicos.",nt:"Deodoro, oeste do Rio. Metrô até Deodoro. Pode requerer reserva antecipada. Verifique eventos. Área afastada mas representativa do legado olímpico."},
  {id:29,n:"Museu de Arte do Rio (MAR) — Rio Art Museum",a:"Centro",v:["art", "architecture", "history"],d:40,s:"A contemporary art museum opened in 2013 with a wave-shaped modern design, focusing on Rio's cultural identity through innovative exhibitions.",st:"The Museu de Arte do Rio, opened in 2013, is housed in a striking modernist building with a curved façade that evokes ocean waves—a fitting metaphor for a museum dedicated to Rio's cultural identity. The museum's mission differs from traditional art institutions: rather than preserving historical artifacts, it focuses on understanding Rio's complex contemporary culture through exhibitions that might blend visual art with music, history, popular culture, and street art. The building itself is architecturally significant, designed to harmonize with its surroundings while making a bold contemporary statement. The location in Centro, near the historic port, connects the museum to Rio's maritime heritage and its role as a center of cultural exchange.",im:"The wave-shaped exterior of the museum glows in evening light, its curves reflecting the harbor beyond, visitors climbing the grand staircase visible through glass walls.",t:"Located in Centro at Praça Mauá. Metro to Central station. Admission is modest. Open Wednesdays through Mondays, 10am-5:30pm. Allow 1-2 hours. The building itself is worth seeing. The neighborhood has undergone recent revitalization with new restaurants and cultural spaces.",c:[],r:"g",nn:"Museu de Arte do Rio",ns:"Museu de arte contemporânea com design em forma de ondas",nst:"Aberto em 2013, foca na identidade cultural de Rio através de exposições que misturam arte visual, música, e cultura de rua.",nt:"Praça Mauá em Centro. Metrô até Central. Entrada modesta. Quarta a segunda, 10h-17:30h. Permita 1-2 horas. Bairro revitalizado com novos restaurantes."},
  {id:30,n:"Mirante do Leblon — Leblon Viewpoint",a:"Leblon",v:["views", "beautiful", "sunset"],d:15,s:"A scenic overlook at the southern end of Leblon Beach offering panoramic views of Rio's coastline, sunset vistas, and access to nearby trails.",st:"The Mirante do Leblon sits at the southern tip of this iconic beach, where urban Rio meets the mountains beyond. The viewpoint offers unobstructed vistas down the coastline toward Copacabana and beyond. At sunset, when the light turns amber and gold, the view is almost unreal—the white sand glowing, the ocean reflecting light, the mountains turning purple. The location is easily accessible from the beach, making it a natural gathering spot for visitors and locals alike. Nearby, trails lead into the Dois Irmãos mountain offering more ambitious hikers a deeper natural experience. The viewpoint is perfect for a sunset moment—a quiet pause in Rio's frenetic energy.",im:"The sun descends toward the ocean as a couple sits on a bench overlooking the panoramic coastline, the beach curving away beneath them, the city lights beginning to twinkle.",t:"Located at the southern end of Leblon Beach. Metro to Leblon station, then a 5-minute walk to the beach. The viewpoint is accessible and safe throughout the day. Best time is late afternoon (4-6pm) for sunset viewing. Bring a light jacket as wind can be strong. Nearby restaurants and cafés in Leblon.",c:[],r:"g",nn:"Mirante do Leblon",ns:"Ponto de vista panorâmico com espetáculo de entardecer",nst:"Ao pôr do sol, a vista se torna quase irreal, o litoral transformando-se em ouro e roxo enquanto a cidade acende suas luzes abaixo.",nt:"Sul de Leblon. Metrô até Leblon, 5 min de caminhada. Acessível e seguro. Melhor ao entardecer (16-18h). Traga jaqueta leve. Cafés e restaurantes próximos."}
,
  {id:31,n:"Arpoador Beach Sunset — Where tourists and View",a:"Ipanema",v:["beautiful","sunset","swimming","greatest_hits"],d:5,s:"Arpoador is where the Arpoador rock juts into the sea—at sunset the light turns the water turquoise, the sky pink, and the whole beach gold.",st:"Arpoador Beach sits at the far west end of Ipanema Beach where a rock formation creates a natural boundary. At sunset, this spot becomes the gathering place—locals, families, couples. The light reflects off the water perfectly.",im:"The rock formation. Water turning turquoise then gold. The sky pink. Silhouettes of people. The sound of waves.",t:"Arrive 5pm (winter) or 5:30pm (summer). It fills with people. Free entry. Street vendors sell beer and snacks. Stay until dark to see the city lights.",c:["beautiful","sunset","greatest_hits"],r:"g",nn:"Praia de Arpoador",ns:"Arpoador é onde a rocha de Arpoador se projeta no mar—o pôr do sol.",nst:"Arpoador fica na extremidade oeste de Ipanema, onde a rocha cria um limite natural.",nt:"Chegue às 5 da tarde (inverno) ou 5:30 (verão)."},
  {id:32,n:"Lapa Neighborhood — Street Art and Nightlife",a:"Lapa",v:["neighborhoods","local","beautiful"],d:10,s:"A gritty, artistic neighborhood with street art, colonial architecture, and nightlife—it's bohemian, real, and completely different from the beach neighbourhoods.",st:"Lapa is Rio's artistic heart. The streets are covered with murals. The buildings are colonial and decaying. At night, live music pours from bars and clubs.",im:"A street covered in art. Neon signs. People walking. The sound of music and Spanish guitar. The smell of street food. Nighttime energy.",t:"Go after 8pm on Thu/Fri/Sat. Walk the main streets. Music venues don't charge cover. Drinks 10–15 BRL. It's safe but busy and loud. Budget 50–100 BRL for evening.",c:["neighborhoods","local"],r:"g",nn:"Bairro de Lapa",ns:"Um bairro boêmio com arte urbana e vida noturna.",nst:"Lapa é o coração artístico do Rio. As ruas estão cobertas de murais.",nt:"Vá após 20h nas quintas/sextas/sábados. Caminhe pelas ruas principais."},
  {id:33,n:"Sugarloaf Mountain Cable Car — Where tourists and Ascent",a:"Urca",v:["beautiful","highest_points","greatest_hits"],d:20,s:"The cable car up Sugarloaf offers views of the entire bay, the beaches, and the mountains—it's touristy but genuinely worth it.",st:"Sugarloaf Mountain is Rio's most recognizable landmark. The cable car climbs in two stages. From the top you see the entire city, the bay, and Christ the Redeemer across the water.",im:"Inside the cable car. The city dropping away below. The bay spreading wider. The view impossible. The city entire.",t:"Located in Urca. Entry: 60–70 BRL roundtrip. Go early morning (7–9am) for fewer crowds. Open daily 8am–8pm. Allow 2 hours. The view is real—not hyped.",c:["beautiful","greatest_hits"],r:"g",nn:"Pão de Açúcar",ns:"O teleférico até Pão de Açúcar oferece vistas de toda a baía.",nst:"Pão de Açúcar é a marca mais reconhecível do Rio. O teleférico sobe em dois estágios.",nt:"Localizado em Urca. Entrada: 60–70 BRL ida e volta."},
  {id:34,n:"Christ the Redeemer at Sunrise — Emptier Than Sunset",a:"Corcovado",v:["greatest_hits","beautiful","sunrise"],d:30,s:"Christ the Redeemer at sunrise is less crowded than sunset—you see the city waking beneath the statue, the light is better, the experience is intimate.",st:"Christ the Redeemer is the symbol of Rio. At sunset it's chaos. At sunrise it's peaceful. You see the city emerging from darkness into light.",im:"The statue at dawn. The city below still dark. The light growing. Quiet. A handful of people. The scale massive.",t:"Take a Grab to Corcovado station. Arrive 5:45am. Entry: 80 BRL. The train runs early. Go on a clear morning. The view from the statue itself is worth the price.",c:["greatest_hits","beautiful"],r:"y",nn:"Cristo Redentor Amanhecer",ns:"Cristo Redentor ao amanhecer é menos lotado que ao pôr do sol.",nst:"Cristo Redentor é o símbolo do Rio. Ao pôr do sol é caos. Ao amanhecer é pacífico.",nt:"Pegue um Grab para a estação de Corcovado. Chegue às 5h45m.,
  {id:61,n:"Pedra do Arpoador at sunset — The city\'s best free viewpoint",a:"Central",v:[\"local\"],d:60,s:"A rocky headland between Ipanema and Copacabana where locals gather every evening to watch the sunset. When the sun drop...",st:"A rocky headland between Ipanema and Copacabana where locals gather every evening to watch the sunset. When the sun drops below the horizon, the crowd spontaneously applauds. It is one of the most joyful and unplanned urban rituals in the world. Arrive 20 minutes before sunset with something cold to drink.",im:"Standing at Pedra do Arpoador at sunset, taking in the scene.",t:"Visit Pedra do Arpoador at sunset and take your time.",c:[\"greatest_hits\", \"high_spots\"],r:"g"},
  {id:62,n:"Passeio Público at dawn — The oldest park in Brazil",a:"Central",v:[\"nature\", \"local\", \"quiet\"],d:60,s:"Rio\'s oldest public garden, opened in 1783, is now a quiet slightly faded park in the city centre where older residents...",st:"Rio\'s oldest public garden, opened in 1783, is now a quiet slightly faded park in the city centre where older residents sit on benches under ancient trees. At 7am before the city fully wakes it has a melancholy, layered beauty.",im:"Standing at Passeio Público at dawn, taking in the scene.",t:"Visit Passeio Público at dawn and take your time.",c:[\"history_big\", \"nature\", \"parks\"],r:"g"},
P = [
{id:63, n:"Pão de Açúcar at 5 AM — See Rio Wake Up", a:"Urca", v:["sunrise","high_spots","romantic_water"], d:45, s:"The cable car opens at dawn. Beat the crowds, see the light hit the bay before the city wakes.", st:"Most people show up at sunset with thousands. Go early, be alone with the goddess statue and Guanabara Bay. The second cable car up takes you to Morro da Urca first—stop there, sit on the rocks, watch fishing boats. Then the final ascent. By 6:30 AM you're back down before the tour buses arrive.\n\nOctober–November cleanest air and light.", im:"Golden light on Guanabara Bay, Christ in the distance, no people.", t:"Uber to Praia Vermelha (not walking—dark and sketchy early), arrive 4:50 AM. Cable car is safe, well-lit. Avoid weekends when crowds start early. Bring a light layer; wind is cold at altitude.", c:["greatest_hits","high_spots","romantic_water"], r:"g", nn:"Pão de Açúcar ao Amanhecer", ns:"Suba no teleférico antes do amanhecer, sozinho.", nst:"A maioria vai ao pôr do sol com milhares de pessoas. Vá cedo, fique sozinho com a estátua da deusa e a Baía de Guanabara. O segundo teleférico sobe primeiro ao Morro da Urca—pare lá, sente-se nas rochas, veja barcos de pesca. Depois a subida final. Às 6:30 da manhã está de volta antes dos ônibus turísticos chegarem.", nt:"Uber para Praia Vermelha (não a pé—escuro e suspeito de manhã cedo). Teleférico é seguro, bem iluminado. Evite finais de semana quando multidões começam cedo."},
{id:64, n:"Cristo Redentor — The Real Story", a:"Corcovado", v:["high_spots","history_big","romantic_water"], d:60, s:"Ignore the Christ-blessing-the-city poetry. Come for the actual view—it's the best vantage point in Rio, full stop.", st:"Take the train from Cosme Velho station (safer, clearer views than the road). The statue itself? It's a symbol of Catholic Rio, built in the 1930s during Vargas's regime. Not sacred, not mandatory. The real gift is standing on Corcovado mountain and seeing the entire bay, the hills, the sprawl. Come at 3 PM when the light is clean but the morning crush is gone. You'll see Christ from below your whole stay—might as well climb up once and know the geography.\n\nRain means thick clouds; April–May clearest.", im:"Corcovado ridge, Rio spread below like a map, sugar mountains, beaches.", t:"Train is R$35, runs 8 AM–7 PM. Never walk up the mountain—gangs control the trails. Don't go at dusk; too many robberies of tourists leaving when light's fading. Urca neighbourhood around the base is safe, busy during day. Bring water.", c:["greatest_hits","high_spots","history_big"], r:"g", nn:"Cristo Redentor", ns:"A melhor vista do Rio, ponto.", nst:"Pegue o trem da estação Cosme Velho (mais seguro, vistas mais claras que a estrada). A estátua em si? É um símbolo do Rio católico, construído nos anos 1930 durante o regime de Vargas. Não é sagrada, não é obrigatória. O presente real é estar no topo do Corcovado e ver toda a baía, as colinas, o espalhamento. Vá às 3 PM quando a luz está limpa mas a multidão da manhã sumiu.", nt:"Trem é R$ 35, funciona 8 AM–7 PM. Nunca suba a pé pela montanha—gangues controlam as trilhas. Não vá ao anoitecer; muitos roubos de turistas saindo quando a luz está desaparecendo."},
{id:65, n:"Ipanema Sunrise Run — The Real Carioca Morning", a:"Ipanema", v:["sunrise","sport","romantic_water"], d:30, s:"Forget the beach bars at noon. Watch Ipanema actually work: joggers, old men in speedos, fishermen, locals who live here.", st:"Show up at Praia de Ipanema around 6:30 AM. The sun comes up over the hills behind the city (not the ocean—Rio's geography flips you). Run or walk the length of the beach toward Arpoador. You'll see the volleyball guys setting up nets for the day, surfers catching first waves at Arpoador, the city slowly opening. Stop at a juice bar (not a tourist café) around 7:30 AM for fresh açaí and água de coco. Locals are reading papers, heading to work. This is Rio when it's real.", im:"Pink sunrise light on empty sand, fishermen pulling nets, joggers in silhouette.", t:"Safe at dawn—lots of people, all cariocas. Don't wear jewelry or bring valuables. Walk, don't run with a phone in hand. Avoid coming back alone after 8 AM when the vibe changes and petty theft increases. Arpoador end is safer than walking past Leblon.", c:["neighbourhoods","romantic_water","sport"], r:"g", nn:"Amanhecer em Ipanema", ns:"Veja Ipanema quando funciona de verdade.", nst:"Chegue à Praia de Ipanema por volta das 6:30 da manhã. O sol nasce sobre as colinas atrás da cidade (não o oceano—a geografia do Rio te vira). Corra ou caminhe o comprimento da praia em direção ao Arpoador. Você verá os caras de vôlei montando redes para o dia, surfistas pegando primeiras ondas no Arpoador, a cidade lentamente se abrindo. Pare em uma lanchonete de suco (não um café turístico) por volta das 7:30 AM para açaí fresco e água de coco.", nt:"Seguro ao amanhecer—muitas pessoas, todos cariocas. Não use joias ou traga valores. Caminhe, não corra com telefone na mão."},
{id:66, n:"Botafogo at 6 PM — The Honest Neighborhood", a:"Botafogo", v:["neighbourhoods","romantic_water","food"], d:40, s:"Not postcard-pretty. Real Carioca living: old money, artists, families, crumbling colonial architecture, fish soup for dinner.", st:"Botafogo is where Rio used to be rich and now is mixed—old families, young bohemians, neglected beauty. Walk Rua São Clemente from the beach toward Botafogo Praia. You'll pass bars where men in their 70s have played dominoes for decades, art galleries in converted mansions, a church, a cemetery, cheap boteco restaurants. The beach itself is not safe for swimming (polluted harbor), but Botafogo's inland life is genuine. Eat at a standing-room-only cevichería or sit at a wooden table for caldo de peixe (fish soup) on Saturday. The neighborhood hasn't been gentrified or packaged—it just is.", im:"Crumbling stucco facades, wooden bars, cemetery gates, palm trees, evening light turning gold.", t:"Safe during daylight and early evening. Don't walk alone after 9 PM—the neighborhood has real crime (not tourist crime, actual mugging). Use Uber or take the bus home before dark. Botafogo Praia corner (where the beach meets Rua São Clemente) can get sketchy after sunset. Stick to the main streets.", c:["food","neighbourhoods","romantic_water"], r:"g", nn:"Botafogo às 6 PM", ns:"O bairro de verdade.", nst:"Botafogo é onde o Rio era rico e agora é misto—famílias antigas, boêmios jovens, beleza negligenciada. Caminhe pela Rua São Clemente da praia em direção à Praia de Botafogo. Você passará por bares onde homens dos seus 70 jogam dominó há décadas, galerias de arte em mansões convertidas, uma igreja, um cemitério, restaurantes boteco baratos.", nt:"Seguro durante o dia e início da noite. Não caminhe sozinho depois das 21h—o bairro tem crime real (não crime turístico, assaltos de verdade)."},
{id:67, n:"Suco e Açaí de Manhã — Where Cariocas Actually Eat", a:"Multiple", v:["food","free_culture"], d:20, s:"Skip the tourist juice bars. The real Rio breakfast is 10 minutes in line at a juice stand, R$ 6, and it changes your morning.", st:"Real juice bars are small, packed, locals only, cash-only. Go to any neighborhood boteco or street-side juice stand between 7–9 AM. Ask for a suco de laranja com beterraba e cenoura (orange, beet, carrot), an açaí bowl with granola and honey, or a vitamina de banana (banana smoothie with milk). The juice is squeezed in front of you. The açaí is not Instagram-pretty—it's thick, cold, practical. You'll stand shoulder-to-shoulder with construction workers, nannies, office staff. This is how Rio fuels itself. Costs R$ 8–15. The vibe is pure function, no style.", im:"Stainless steel juicer, plastic cups, hands moving fast, condensation on the glass, street noise.", t:"Safe and busy at breakfast time. Bring cash. Juice stands are in every neighborhood—ask your hostel. Avoid going alone very late morning if the bar is empty; stick to rush times. Botafogo, Santa Teresa, and Centro have the best cheapest juice spots.", c:["food","free_culture","neighbourhoods"], r:"g", nn:"Suco e Açaí de Manhã", ns:"Onde cariocas comem de verdade.", nst:"Bares de suco reais são pequenos, lotados, apenas locais, apenas dinheiro. Vá a qualquer boteco de bairro ou barraca de suco na rua entre 7–9 AM. Peça um suco de laranja com beterraba e cenoura, uma tigela de açaí com granola e mel, ou uma vitamina de banana com leite. O suco é espremido na sua frente.", nt:"Seguro e ocupado na hora do café da manhã. Traga dinheiro. Barracas de suco estão em cada bairro—pergunte ao seu hostel."},
{id:68, n:"Maracanã Stadium — Where Football Actually Happened", a:"Maracanã", v:["sport","history_big","greatest_hits"], d:50, s:"Built for the 1950 World Cup. Now in slow decline. Still the temple of Brazilian football, even if it's sad.", st:"Maracanã holds 80,000. In 1950, Brazil lost the final here to Uruguay—the entire city went silent. That trauma shaped Rio. Now the stadium is half-empty most match days, feels abandoned, barely maintained by a corrupt government. But when you stand in the seats, you can feel the weight of Brazilian football. Take a stadium tour (not a match—they're rare and expensive). The structure is brutalist, concrete, open to the elements. The tunnel where Pelé walked, the field where the 1970 World Cup winner played. It's not glorious—it's honest about Brazil's decline and football's corruption. Go for the history and the sadness, not the spectacle.", im:"Crumbling concrete, empty sections, the green pitch, turnstiles, faded paint.", t:"Tours run daytime only, book in advance (Ingresso.com). The neighborhood around Maracanã (São Cristóvão) is rough—don't walk alone, use Uber. Never attend a match without serious local advice; hooligans and police tensions are real. During the day with tourists it's safe enough.", c:["greatest_hits","history_big","sport"], r:"g", nn:"Maracanã", ns:"Templo do futebol, agora em declínio.", nst:"Maracanã foi construído para a Copa de 1950. Agora em declínio lento. Ainda o templo do futebol brasileiro, mesmo que seja triste. Quando você fica nos assentos, pode sentir o peso do futebol brasileiro. Pegue um tour do estádio. A estrutura é brutalista, concreto, aberta aos elementos.", nt:"Tours funcionam apenas durante o dia, reserve com antecedência. O bairro ao redor de Maracanã (São Cristóvão) é rough—não caminhe sozinho, use Uber."},
{id:69, n:"Escadaria Selarón — No Mystique, Just Labor", a:"Lapa", v:["weird","history_big","free_culture"], d:30, s:"A Chilean artist spent 20 years gluing blue tiles to stairs. It's become Instagram famous. Acknowledge the work, then leave.", st:"Selarón Steps is in Lapa, a neighborhood that's part nightlife and part genuine history. The Chilean artist Jorge Selarón started tiling a staircase outside his home in the 1980s. He was obsessed, depressed, lonely—the tiles were an outlet. He died in 2013 (possibly suicide, possibly robbery). The steps are now a monument to obsession, not beauty. Hundreds of tourists per day. The tiles are beautiful, sure, but the story is about a man who couldn't belong, who made something and became famous for it too late, who died in the neighborhood he'd lived in for decades. Go in the early morning before buses arrive. See it. Don't stay—Lapa after dark is genuinely dangerous and touristy.", im:"Blue Portuguese ceramic tiles, rainbow mosaic pattern, worn from footsteps, empty morning light.", t:"Go 7–9 AM before crowds. Never go at night—Lapa nightlife is chaotic, expensive, and dangerous. Don't walk alone. The steps themselves are safe, but the neighborhood has gang activity. Use Uber door-to-door. Women especially should be cautious about drinks at bars—drugging happens. Bring a friend.", c:["free_culture","history_big","weird"], r:"g", nn:"Escadaria Selarón", ns:"Ladrilhos de um homem solitário.", nst:"Um artista chileno passou 20 anos colando azulejos em degraus. Tornou-se famoso no Instagram. Reconheça o trabalho, depois saia. O artista chileno Jorge Selarón começou a cobrir uma escadaria fora de sua casa nos anos 1980. Ele era obcecado, deprimido, solitário—os azulejos eram um escape.", nt:"Vá 7–9 AM antes das multidões. Nunca vá à noite—Lapa à noite é caótica, cara e perigosa. Não caminhe sozinho. Use Uber porta a porta."},
{id:70, n:"Lagoa Rodrigo de Freitas Sunrise Run — Locals Only", a:"Lagoa", v:["sunrise","sport","nature"], d:30, s:"5:30 AM, the lagoon is yours. Joggers, fishermen, the city skyline still asleep.", st:"The Lagoa is Rio's best running circuit—it's a protected body of fresh water in the middle of the city. The path is about 7 km, paved, and crowded with cariocas from 5 AM onward. Come before that, you get quiet and clean air. The hill to your right is Corcovado; the city rises around you. Old men fish from the banks with handmade lines. A botanical garden edges one side. You'll feel like a real Rio person for exactly one hour. Then the city wakes and tourists show up.", im:"Still water reflecting dawn sky, joggers in silhouette, palm trees, distant Christ statue.", t:"Safe in the early morning with other joggers. Don't go alone after 7 AM. Don't carry valuables. The neighborhood around the Lagoa (Lagoa, Ipanema, Botafogo, Leblon) is safer than most, but petty theft is common—leave your phone at home if possible. Path is well-lit at dawn. Use the main circuit, not side paths.", c:["nature","neighbourhoods","sport"], r:"g", nn:"Lagoa Rodrigo de Freitas ao Amanhecer", ns:"5h30 da manhã, a lagoa é sua.", nst:"A Lagoa é o melhor circuito de corrida do Rio—é um corpo de água doce protegido no meio da cidade. O caminho tem cerca de 7 km, pavimentado, e lotado de cariocas a partir das 5 da manhã.", nt:"Seguro no início da manhã com outros corredores. Não vá sozinho depois das 7 AM. Não leve valores. O bairro ao redor da Lagoa (Lagoa, Ipanema, Botafogo, Leblon) é mais seguro que a maioria."},
{id:71, n:"Feijoada Saturday — The Ritual Meal", a:"Multiple", v:["food","culture","neighbourhoods"], d:90, s:"Saturday feijoada is when Rio eats family lunch. It's a stew of black beans, pork offal, and tradition. Find a real restaurant, not a tourist trap.", st:"Feijoada is Brazil's national dish, but it's a Rio Saturday ritual. A thick black-bean stew cooked overnight with pig ears, feet, tail, tongue—the parts tourists won't eat. Served with white rice, farofa (fried manioc flour), orange slices, hot sauce. You eat it at 1 PM on a Saturday with a caipirinha or beer. Every family has their recipe. Good boteco restaurants in residential neighborhoods serve it noon–3 PM on Saturdays only. Go to Botafogo, Urca, or Santa Teresa (not Copacabana—all tourist traps there). Sit at a long table with locals. It's warm, heavy, costs R$ 25–40. You'll understand why cariocas take Saturdays seriously.", im:"Brown ceramic bowl of dark stew, white rice on the side, orange slices, hands eating, afternoon light.", t:"Saturday lunch is safe and family-oriented. Stick to local botecos in residential neighborhoods. Ask your hostel which one locals use. These places are small, cash-only, no English, loud with families. Don't go at night—completely different vibe. Avoid anywhere that looks empty or tourist-focused (they overcharge and skimp on meat).", c:["food","free_culture","neighbourhoods"], r:"g", nn:"Feijoada de Sábado", ns:"O ritual de comida familiar.", nst:"Feijoada é o prato nacional do Brasil, mas é um ritual de sábado no Rio. Um caldo espesso de feijão-preto cozido a noite toda com orelhas, pés, cauda, língua de porco—as partes que turistas não comem. Servido com arroz branco, farofa, rodelas de laranja, molho picante.", nt:"Almoço de sábado é seguro e orientado para a família. Fique em botecos locais em bairros residenciais. Pergunte ao seu hostel qual os locais usam."},
{id:72, n:"Praia da Prainha — The Quiet Swell", a:"Barra", v:["swimming","sport","nature"], d:40, s:"West of Barra. Small, cold, with actual waves and the smell of real ocean. No tourists. Brazilian surfers only.", st:"Prainha is a 10-minute walk from the road at Barra, past a closed restaurant, down a sand track. The beach is maybe 200 meters long, fronts a deep cove, has real Atlantic swell even on calm days. The water is cold (this is real ocean, not the calm Copacabana bath). Brazilian surfers, a handful of local fishermen, and people swimming for exercise. No bars, no chairs, no shade. You bring your own water and snacks. It's a serious swimming beach, not a social one. The water is clean enough; the light is clean. You feel the difference between a beach and the ocean. Go in the morning before wind picks up and makes the swell harder to read.", im:"Gray-blue swell, rocky cove walls, maybe six surfers scattered, white foam, clean sky.", t:"Safe during daylight. The road to Prainha gets sketchy at dusk. Drive or Uber there; don't walk from Barra. The beach itself is full of people, so it's safe. Don't go in water alone if you can't swim—the swell is real. The parking area is fine during the day but sketchy at night. Bring everything you need; there's a closed restaurant and nothing else.", c:["nature","sport","swimming"], r:"g", nn:"Praia da Prainha", ns:"Onda pequena e quieta.", nst:"Prainha é uma caminhada de 10 minutos da estrada em Barra, passando por um restaurante fechado. A praia tem talvez 200 metros de comprimento, enfrenta um enseada profunda, tem ressaca atlântica real mesmo em dias calmos.", nt:"Seguro durante a luz do dia. A estrada para Prainha fica suspeita ao anoitecer. Dirija ou Uber lá; não caminhe de Barra."},
{id:73, n:"Valongo Wharf — Slave History, Rio's Real Foundation", a:"Centro", v:["history_big","weird","scary"], d:45, s:"Underground 18th-century wharf where enslaved Africans were sold. Now excavated, silent, impossible to ignore.", st:"Rio was built on slavery. More enslaved Africans entered Rio than any other port in the Americas—over 1 million people. The Valongo Wharf was buried by urban development in the 1800s, then archaeologists uncovered it in 2011. Now it's a small excavation site, open to the public, in the middle of a rough Centro neighborhood. You see the actual stones where auction blocks stood. Chains, pottery, skeletal remains. No gift shop, no narration, just the evidence. It forces you to reckon with Rio's birth. The neighborhood around it is economically marginalized, still dealing with the consequences. Go with a guide or with respect—not as a tourism photo op. Many Brazilians don't know this site exists or avoid it.", im:"Rough stone wharf, gray excavation, empty lots, old colonial buildings, gray sky.", t:"Only visit during daylight (9 AM–4 PM) with a guide. The Centro neighborhood around Valongo is genuinely rough—don't walk alone, don't carry valuables, don't use your phone visibly. Book a guide tour through a historical society (Rio Negro tours or Academia de História). Take Uber directly to the guide meeting point. The excavation itself is safe and monitored, but the area surrounding it is one of Rio's poorest and most affected by gang activity.", c:["free_culture","history_big","scary","weird"], r:"g", nn:"Cais do Valongo", ns:"História de escravidão, fundação real do Rio.", nst:"Rio foi construído sobre escravidão. Mais africanos escravizados entraram no Rio do que em qualquer outro porto das Américas—mais de 1 milhão de pessoas. O Cais do Valongo estava enterrado pelo desenvolvimento urbano no século XIX, depois arqueólogos o descobriram em 2011.", nt:"Visite apenas durante a luz do dia (9 AM–4 PM) com um guia. O bairro Centro ao redor de Valongo é genuinamente áspero—não caminhe sozinho, não carregue valores, não use seu telefone visivelmente."},
