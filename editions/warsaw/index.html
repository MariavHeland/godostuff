<script>
const P = [
  {id:1,n:"Uprising Museum (POLIN)",a:"Muranów",v:["history", "hidden"],d:1,s:"Warsaw\'s walls still tell stories.",st:"The Polish history museum sits on the actual site of the Warsaw Ghetto. Walk through doorways where daily life unfolded in impossibly small spaces. The building itself is a metaphor — entering it means descending.",im:"It\'s 1942. Families squeeze into rooms stacked ten-high. A child draws on a wall. Voices echo through courtyards that once held 400,000 people.",t:"The Polish history museum sits on the actual site of the Warsaw Ghetto. Walk through doorways where daily life unfolded in impossibly small spaces. The building itself is a metaphor — entering it means descending.\",im:\"It\'s 1942. Families squeeze into rooms stacked ten-high. A child draws on a wall. Voices echo through courtyards that once held 400,000 people.\",t:\"Anielewicza 6. Open 10am-6pm. The basement galleries are intense. Bring time, not just an hour.",c:["history_big", "local_only"],r:"g",nn:"Muzeum Powstania Warszawskiego (POLIN)",ns:"Muzeum opowiadające historię Polski i jej narodu.",nst:"Muzeum Powstania Warszawskiego znajduje się na terenie byłego Getta Warszawskiego. Jego architektura symbolizuje upadek i wzniesienie się narodu. W jego wnętrzu przechowywane są artefakty opowiadające o tragicznych latach wojny. To miejsce głębokich emocji i refleksji nad historią.",nt:"Adres: Anielewicza 6. Otwarte 10:00-18:00. Rezerwuj bilet online. Część podziemną warto odwiedzić z przewodnikiem. Postaw się na co najmniej 3 godziny."},
  {id:2,n:"Praga Street Art District",a:"Praga North",v:["weird", "beautiful", "street_art"],d:2,s:"Walls that roar louder than museums.",st:"Praga\'s blocks were left to decay, so artists claimed them. Entire building faces burst with color and politics. Walk any street and stumble into galleries that cost nothing and demand everything.",im:"It\'s 2005. A graffiti crew scales a communist factory wall. By dawn, a phoenix covers three stories. By next week, it\'s a memorial. By next month, something new.",t:"Praga\'s blocks were left to decay, so artists claimed them. Entire building faces burst with color and politics. Walk any street and stumble into galleries that cost nothing and demand everything.\",im:\"It\'s 2005. A graffiti crew scales a communist factory wall. By dawn, a phoenix covers three stories. By next week, it\'s a memorial. By next month, something new.\",t:\"Start at Ząbkowska Street. Walk west into Strzelecka, Panska, Brzeska. Street art changes weekly. Bring a camera.",c:["street_art", "history_big"],r:"g",nn:"Dzielnica Sztuki Ulicznej Praga",ns:"Artystyczne serce Warszawy pulsuje kolorami i czasami.",nst:"Praga Północna to miejsce, gdzie artyści przemienili szare bloki w galerię pod otwartym niebem. Każdy mur opowiada inną historię, każda malarnia jest dziełem sztuki. Nie ma tu kuratora ani biletów, tylko autentyczność i pasja. To dzielnica, która żyje własnym rytmem.",nt:"Zacznij przy ulicy Ząbkowskiej. Spaceruj ulicą Strzelecką, Pańską i Brzezką. Sztuka zmienia się cotygodniowo. Najlepiej odwiedzić w dzień, zawsze miej aparat gotowy."},
  {id:3,n:"Bunker-1 Gestapo Prison",a:"Śródmieście",v:["hidden", "history", "scary"],d:3,s:"The basement where Warsaw screamed.",st:"Under a nondescript building on Szucha Avenue is the Gestapo\'s Warsaw headquarters. Cells. Torture chambers. Names carved in walls. This isn\'t a curated museum — it\'s raw.",im:"It\'s 1943. Interrogation lamps blind a prisoner in cell 3. Footsteps above mean executions. The walls absorbed 60,000 screams.",t:"Under a nondescript building on Szucha Avenue is the Gestapo\'s Warsaw headquarters. Cells. Torture chambers. Names carved in walls. This isn\'t a curated museum — it\'s raw.\",im:\"It\'s 1943. Interrogation lamps blind a prisoner in cell 3. Footsteps above mean executions. The walls absorbed 60,000 screams.\",t:\"Szucha 25. Tours in Polish or English. Reserve ahead. Not for the faint-hearted. Adults only.",c:["history_big"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:4,n:"Palace of Culture & Science Rooftop",a:"Śródmieście",v:["beautiful", "high_spots"],d:4,s:"See the whole city from a Soviet gift.",st:"Stalin gifted this 1950s tower to Warsaw. It\'s brutal, it\'s socialist, it\'s unavoidable. Ride to the 30th floor and watch the city spread like a map. Praga glitters. The Vistula winds. You stand inside propaganda that somehow became iconic.",im:"It\'s 1955. Workers hoist the last spire. Moscow watches. Warsaw will remember this whether it likes it or not.",t:"Stalin gifted this 1950s tower to Warsaw. It\'s brutal, it\'s socialist, it\'s unavoidable. Ride to the 30th floor and watch the city spread like a map. Praga glitters. The Vistula winds. You stand inside propaganda that somehow became iconic.\",im:\"It\'s 1955. Workers hoist the last spire. Moscow watches. Warsaw will remember this whether it likes it or not.\",t:\"Plac Defilad 1. Observation deck €4. Go at sunset. The café up top serves decent coffee. Open 9am-midnight.",c:["architecture", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:5,n:"Vodka Museum (Polmos)",a:"Śródmieście",v:["local", "free"],d:5,s:"Polish spirits, literally.",st:"A tasting room and museum dedicated to żubrówka and vodka history. It\'s small, it\'s focused, it\'s surprisingly moving. Learn why this drink matters to Polish identity. Taste without pretension.",im:"It\'s 1890. Alchemists experiment with grain and tradition. The result: something that tastes like winter and survival.",t:"A tasting room and museum dedicated to żubrówka and vodka history. It\'s small, it\'s focused, it\'s surprisingly moving. Learn why this drink matters to Polish identity. Taste without pretension.\",im:\"It\'s 1890. Alchemists experiment with grain and tradition. The result: something that tastes like winter and survival.\",t:\"Miodowa 9. Tastings from €12. Open 11am-9pm daily. Book group tours ahead.",c:["local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:6,n:"Neon Museum (Neon Signs)",a:"Praga South",v:["weird", "history", "beautiful"],d:6,s:"Dead neon that still glows.",st:"Seventy communist-era signs collected from torn-down shops, cinemas, and bars. They pulse in darkness like ghosts of a city that moved too fast. Each one is a love letter to socialist commerce.",im:"It\'s 1960. A neon sign of a cinema marquee blinks to life. Below, a queue forms. The future feels electric.",t:"Seventy communist-era signs collected from torn-down shops, cinemas, and bars. They pulse in darkness like ghosts of a city that moved too fast. Each one is a love letter to socialist commerce.\",im:\"It\'s 1960. A neon sign of a cinema marquee blinks to life. Below, a queue forms. The future feels electric.\",t:\"Umschlagplatz 1, Praga. Open Wednesday-Sunday 4pm-10pm. €3 entry. Perfect for moody photos.",c:["history_big", "weird", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:7,n:"Krasiński Palace Secret Gardens",a:"Śródmieście",v:["hidden", "beautiful", "quiet"],d:7,s:"A garden frozen in the 1700s.",st:"Behind a baroque palace is a symmetrical garden that survived the war because Nazis wanted it preserved. Locals barely know it exists. Benches face nothing but trees and history.",im:"It\'s 1780. A noblewoman walks gravel paths. Servants maintain geometry. The city outside doesn\'t matter here.",t:"Behind a baroque palace is a symmetrical garden that survived the war because Nazis wanted it preserved. Locals barely know it exists. Benches face nothing but trees and history.\",im:\"It\'s 1780. A noblewoman walks gravel paths. Servants maintain geometry. The city outside doesn\'t matter here.\",t:\"Krakowskie Przedmieście 13. Free entry to grounds. Palace museum open 10am-4pm. Bring a book. Bring quiet.",c:["beautiful", "parks", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:8,n:"Milk Bar Mleczarnia",a:"Wola",v:["local", "free", "history"],d:8,s:"Communist canteens that still feed the city.",st:"These state-run cafeterias are ghosts of socialism. Trays. Queues. Generous portions. Borscht costs pennies. Sit next to construction workers and old men reading newspapers. Food tastes like 1975.",im:"It\'s 1980. A mother feeds her son żurek — sour rye soup — at a laminate table. She\'s exhausted. This meal is all they can afford.",t:"These state-run cafeterias are ghosts of socialism. Trays. Queues. Generous portions. Borscht costs pennies. Sit next to construction workers and old men reading newspapers. Food tastes like 1975.\",im:\"It\'s 1980. A mother feeds her son żurek — sour rye soup — at a laminate table. She\'s exhausted. This meal is all they can afford.\",t:\"Chłodna 22. Open 7am-8pm. Cash only. Order at the counter. Budget €2 per meal.",c:["local_only", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:9,n:"Vistula Riverbank (Powiśle)",a:"Powiśle",v:["beautiful", "nature", "quiet"],d:9,s:"Where the city meets water.",st:"The Vistula\'s left bank became a promenade. Sculptures. Gardens. Floating restaurants. On summer nights, the water reflects sky. You forget this is a capital city.",im:"It\'s 1900. A fisherman casts lines where now joggers run. The river remembers both.",t:"The Vistula\'s left bank became a promenade. Sculptures. Gardens. Floating restaurants. On summer nights, the water reflects sky. You forget this is a capital city.\",im:\"It\'s 1900. A fisherman casts lines where now joggers run. The river remembers both.\",t:\"Start at Poniatowskiego Avenue. Walk north toward Krasinski Gardens. Free. Best at sunset. Cafés every 500m.",c:["parks", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:10,n:"Saska Kępa Villas",a:"Saska Kępa",v:["beautiful", "local"],d:10,s:"Warsaw\'s secret suburb of good taste.",st:"Early 20th-century villas hidden behind walls. Tree-lined streets. A neighborhood that looks Swiss somehow. Artists live here now. Galleries hide in courtyards. It\'s bucolic. It\'s strange for a city.",im:"It\'s 1925. Architects and engineers build escape pods from the urban core. Modernist villas with gardens. A utopia that nearly made it.",t:"Early 20th-century villas hidden behind walls. Tree-lined streets. A neighborhood that looks Swiss somehow. Artists live here now. Galleries hide in courtyards. It\'s bucolic. It\'s strange for a city.\",im:\"It\'s 1925. Architects and engineers build escape pods from the urban core. Modernist villas with gardens. A utopia that nearly made it.\",t:\"Main strip is Mysliwiecka Street. Galleries and cafés. Walk Meander Street for villas. Best explored on foot or bike.",c:["architecture", "beautiful", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:11,n:"Uprising Monument (Ronda Dmowskiego)",a:"Śródmieście",v:["history", "beautiful"],d:11,s:"Stone faces screaming silently.",st:"A brutal monument to the 1944 uprising. Young fighters frozen mid-struggle. The sculpture is violent and moving. It sits in the middle of a roundabout — cars whiz past the most important memory in Warsaw.",im:"It\'s 1944. Teenagers with Molotov cocktails face tanks. Some die. Some become stone.",t:"A brutal monument to the 1944 uprising. Young fighters frozen mid-struggle. The sculpture is violent and moving. It sits in the middle of a roundabout — cars whiz past the most important memory in Warsaw.\",im:\"It\'s 1944. Teenagers with Molotov cocktails face tanks. Some die. Some become stone.\",t:\"Ronda Dmowskiego, between Nowy Świat and Aleje Jerozolimskie. Free. Visible 24/7. Flowers appear often.",c:["history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:12,n:"Jewish Cemetery Mausoleum",a:"Muranów",v:["history", "quiet", "hidden"],d:12,s:"90,000 graves in silence.",st:"The largest Jewish cemetery in the world. Rows upon rows of stones and Yiddish inscriptions. It\'s vast and quiet and heartbreaking. Walk here to understand scale. Names. Dates. Loss.",im:"It\'s 1939. Families visit graves. They don\'t know this is goodbye. By 1945, most graves are orphaned.",t:"The largest Jewish cemetery in the world. Rows upon rows of stones and Yiddish inscriptions. It\'s vast and quiet and heartbreaking. Walk here to understand scale. Names. Dates. Loss.\",im:\"It\'s 1939. Families visit graves. They don\'t know this is goodbye. By 1945, most graves are orphaned.\",t:\"Okopowa 49/51. Open 9am-5pm. Respectful dress. Maps at entrance. Allow 2+ hours. Very moving.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:13,n:"Smolna Street Courtyards",a:"Śródmieście",v:["hidden", "beautiful", "quiet"],d:13,s:"Passages where time loops.",st:"Walk through the doorways of Smolna Street and discover courtyards stacked like nesting dolls. Each passage leads deeper. Workshops, galleries, cafés hide inside. The street is chaos. Inside is monastic.",im:"It\'s 1890. Merchants\' warehouses open onto shared courtyards. Children play. Laundry dries. A self-contained world.",t:"Walk through the doorways of Smolna Street and discover courtyards stacked like nesting dolls. Each passage leads deeper. Workshops, galleries, cafés hide inside. The street is chaos. Inside is monastic.\",im:\"It\'s 1890. Merchants\' warehouses open onto shared courtyards. Children play. Laundry dries. A self-contained world.\",t:\"Smolna 9, 10, 11, 17. Free to explore. Courtyards open until dark. Best for photography in afternoon light.",c:["courtyards", "hidden", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:14,n:"Żoliborz Modernist Colony",a:"Żoliborz",v:["architecture", "beautiful", "quiet"],d:14,s:"A planned utopia, still nearly intact.",st:"Built in the 1920s as affordable housing for the working class. Clean lines. Communal spaces. Courtyards. It was radical then. It\'s still beautiful. Residents have protected this fiercely.",im:"It\'s 1928. Workers move into their own villas with heating and running water. The future is here and it\'s for them.",t:"Built in the 1920s as affordable housing for the working class. Clean lines. Communal spaces. Courtyards. It was radical then. It\'s still beautiful. Residents have protected this fiercely.\",im:\"It\'s 1928. Workers move into their own villas with heating and running water. The future is here and it\'s for them.\",t:\"Between Żoliborska, Folwarcka, and Kwiatkowskiego streets. Self-guided walking tours. Respect residents. Best explored early morning.",c:["architecture", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:15,n:"Stary Rynek Square (Praga)",a:"Praga North",v:["local", "hidden", "beautiful"],d:15,s:"Market square where locals actually shop.",st:"While tourists fill the Old Town, locals navigate this authentic market. Flower vendors. Fruit stalls. Cafés for workers. It\'s chaotic and real. This is how Warsaw shopped for 200 years.",im:"It\'s 1950. Vendors shout prices. Housewives negotiate. A child cries. Money changes. Life happens.",t:"While tourists fill the Old Town, locals navigate this authentic market. Flower vendors. Fruit stalls. Cafés for workers. It\'s chaotic and real. This is how Warsaw shopped for 200 years.\",im:\"It\'s 1950. Vendors shout prices. Housewives negotiate. A child cries. Money changes. Life happens.\",t:\"Rynek Starego Miasta in Praga. Best 6am-2pm. Cash preferred. Photos discourage some vendors.",c:["local_only", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:16,n:"Powązki Cemetery Sculptural Garden",a:"Ochota",v:["beautiful", "quiet", "history"],d:16,s:"Where art meets mortality.",st:"One of Europe\'s most important cemeteries. Polish monuments to art, literature, and resistance. Massive sculptures. Detailed plaques. Graves of composers, writers, fighters. It\'s solemn. It\'s inspiring.",im:"It\'s 1890. A sculptor chisel their grief into stone. The dead are honored. Their names won\'t fade.",t:"One of Europe\'s most important cemeteries. Polish monuments to art, literature, and resistance. Massive sculptures. Detailed plaques. Graves of composers, writers, fighters. It\'s solemn. It\'s inspiring.\",im:\"It\'s 1890. A sculptor chisel their grief into stone. The dead are honored. Their names won\'t fade.\",t:\"Powązkowska 43. Open 8am-5pm. Maps at gate. Respect required. 2+ hours minimum.",c:["history_big", "beautiful", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:17,n:"Tunnel Under Śródmieście (Preserved)",a:"Śródmieście",v:["history", "scary", "hidden"],d:17,s:"Underground passages where Warsaw escaped.",st:"During the uprising, fighters moved through sewers and tunnels. Some are preserved, opened for tours. Crouch. Crawl. Feel the desperation. This is where kids fought. This is where it smelled of death and determination.",im:"It\'s 1944. A teenage fighter crawls through darkness. Above, gunfire. His hand touches walls carved by others escaping the same. He\'s not alone.",t:"During the uprising, fighters moved through sewers and tunnels. Some are preserved, opened for tours. Crouch. Crawl. Feel the desperation. This is where kids fought. This is where it smelled of death and determination.\",im:\"It\'s 1944. A teenage fighter crawls through darkness. Above, gunfire. His hand touches walls carved by others escaping the same. He\'s not alone.\",t:\"Multiple locations. Krasiński Museum offers guided sewer tours. €8. Tight spaces. Not for claustrophobic. Reserve ahead.",c:["history_big", "scary"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:18,n:"Żelazna Street Flea Market",a:"Wola",v:["local", "weird", "free"],d:18,s:"Sunday chaos where junk becomes treasure.",st:"Every Sunday, vendors pack this street with used goods. Soviet medals. Vinyl. Old typewriters. Clothes. Broken electronics. Hunt. Haggle. Find a story. It\'s a living museum of Polish consumption.",im:"It\'s 1989. The flea market explodes with goods the system never had. Freedom tastes like abundance.",t:"Every Sunday, vendors pack this street with used goods. Soviet medals. Vinyl. Old typewriters. Clothes. Broken electronics. Hunt. Haggle. Find a story. It\'s a living museum of Polish consumption.\",im:\"It\'s 1989. The flea market explodes with goods the system never had. Freedom tastes like abundance.\",t:\"Żelazna Street, near Metro Rondo Onz. Sundays 8am-2pm. Go early. Bring cash. Pickpockets exist. Keep valuables close.",c:["local_only", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:19,n:"Kieślowski Apartment (Film Location)",a:"Praga South",v:["local", "history"],d:19,s:"Where \'Three Colors\' was filmed.",st:"A real Warsaw apartment where Krzysztof Kieślowski shot iconic scenes. It\'s still lived-in, visible from street. Simple. Honest. The films made it legendary. The place stayed humble.",im:"It\'s 1993. A camera frames a window. Light falls perfectly. A moment becomes immortal.",t:"A real Warsaw apartment where Krzysztof Kieślowski shot iconic scenes. It\'s still lived-in, visible from street. Simple. Honest. The films made it legendary. The place stayed humble.\",im:\"It\'s 1993. A camera frames a window. Light falls perfectly. A moment becomes immortal.\",t:\"Marszałkowska 104. Private residence. Viewable from street only. Respect residents. Go quietly.",c:["local_only", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:20,n:"Orangery in Łazienki Palace",a:"Mokotów",v:["beautiful", "quiet", "nature"],d:20,s:"1700s greenhouse still blooming.",st:"A baroque palace surrounded by gardens. The Orangery preserves exotic plants since royal times. Peacocks roam grounds. It\'s formal. It\'s serene. Benches overlook water. Escape the city here.",im:"It\'s 1780. A queen walks gardens. Exotic fruit trees from across Europe. Peacocks strut. Perfection is maintained.",t:"A baroque palace surrounded by gardens. The Orangery preserves exotic plants since royal times. Peacocks roam grounds. It\'s formal. It\'s serene. Benches overlook water. Escape the city here.\",im:\"It\'s 1780. A queen walks gardens. Exotic fruit trees from across Europe. Peacocks strut. Perfection is maintained.\",t:\"Łazienki Królewskie Park, Agrykola 1. Open daily 9am-5pm. €3 grounds. Palace €8. Allow 3 hours.",c:["parks", "beautiful", "nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:21,n:"Ghetto Uprising Bunker Site",a:"Muranów",v:["history", "scary", "hidden"],d:21,s:"Where 500 fighters died for hope.",st:"The main bunker of the 1943 Ghetto Uprising. Walls were demolished but the location is marked. Commemorative plaques. Invisible to most passersby. Underground heroism. April 19, 1943. Longest battle of the war.",im:"It\'s April 1943. Thousands of fighters. Molotov cocktails. Hope despite certainty of death. They fight anyway.",t:"The main bunker of the 1943 Ghetto Uprising. Walls were demolished but the location is marked. Commemorative plaques. Invisible to most passersby. Underground heroism. April 19, 1943. Longest battle of the war.\",im:\"It\'s April 1943. Thousands of fighters. Molotov cocktails. Hope despite certainty of death. They fight anyway.\",t:\"Mila 18 (building now, but monument nearby on Miła/Zamenhofa intersection). Plaques visible. Respectful contemplation required.",c:["history_big"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:22,n:"Danilowicz Palace Courtyard",a:"Śródmieście",v:["beautiful", "hidden", "quiet"],d:22,s:"Renaissance calm behind baroque chaos.",st:"An entire Renaissance palace courtyard survives hidden behind modern Śródmieście. Red brick. Arches. Silence. Nobody knows about it. Students study here. Birds nest here. Time moved differently here.",im:"It\'s 1610. Merchants build a passage. Traders cross courtyards. A world within walls.",t:"An entire Renaissance palace courtyard survives hidden behind modern Śródmieście. Red brick. Arches. Silence. Nobody knows about it. Students study here. Birds nest here. Time moved differently here.\",im:\"It\'s 1610. Merchants build a passage. Traders cross courtyards. A world within walls.\",t:\"Senatorska 35/37. Courtyard open 24/7. Free. Best discovered by accident. Few tourists know.",c:["courtyards", "hidden", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:23,n:"Praga Bridge (Most Śląsko-Dąbrowski)",a:"Praga North",v:["history", "beautiful"],d:23,s:"Bridge built by Nazis, blown up twice, rebuilt always.",st:"Three times destroyed. Three times rebuilt. It connects territories separated by war. Walk across and feel engineering triumph. Below, the Vistula flows indifferent. Modern girders span where old stone fell.",im:"It\'s 1945. Engineers calculate. Steel bends to will. The bridge rises again. Survival tastes like iron.",t:"Three times destroyed. Three times rebuilt. It connects territories separated by war. Walk across and feel engineering triumph. Below, the Vistula flows indifferent. Modern girders span where old stone fell.\",im:\"It\'s 1945. Engineers calculate. Steel bends to will. The bridge rises again. Survival tastes like iron.\",t:\"Crosses Vistula from Śródmieście to Praga. Walkable 24/7. Best at night when lit. Sculptures at its foot worth inspecting.",c:["history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:24,n:"Femina Cinema Restoration",a:"Wola",v:["beautiful", "history", "architecture"],d:24,s:"Art Deco that refused to disappear.",st:"A 1927 cinema frozen for decades. Now restored to original glamor. Geometric patterns. Chrome. Red velvet. Watch films where your grandparents watched them. The building is part of the experience.",im:"It\'s 1930. Couples enter under marquee lights. The screen glows. Escape costs 50 groszy.",t:"A 1927 cinema frozen for decades. Now restored to original glamor. Geometric patterns. Chrome. Red velvet. Watch films where your grandparents watched them. The building is part of the experience.\",im:\"It\'s 1930. Couples enter under marquee lights. The screen glows. Escape costs 50 groszy.\",t:\"Marszałkowska 46/50. Now shows classic and modern films. Ticket €8. Café serves vintage drinks. Check schedule online.",c:["architecture", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:25,n:"Vistula Escarpment Path",a:"Powiśle",v:["beautiful", "quiet", "nature"],d:25,s:"Geology carved into a 30-meter cliff.",st:"The Vistula drops suddenly. A footpath traces the cliff edge. Below, water. Above, trees. Stone layers expose ice age. Glaciers carved this valley. Stand here and feel geological time.",im:"It\'s 20,000 years ago. Ice a kilometer thick. When it melts, the Vistula will find this path.",t:"The Vistula drops suddenly. A footpath traces the cliff edge. Below, water. Above, trees. Stone layers expose ice age. Glaciers carved this valley. Stand here and feel geological time.\",im:\"It\'s 20,000 years ago. Ice a kilometer thick. When it melts, the Vistula will find this path.\",t:\"Start at Książęcia Street near Powiśle. Path runs north. Free. Misty mornings are best. Loose stone — wear good shoes.",c:["nature", "beautiful", "parks"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:26,n:"Hidden Factory Courtyard (Praga)",a:"Praga South",v:["weird", "history", "architecture"],d:26,s:"Soviet industry preserved in amber.",st:"An entire factory courtyard from 1970s frozen inside. Machinery. Faded propaganda posters. Administrative buildings with socialist murals. Locals work here still. Tourists almost never find it. It\'s a time machine in plain sight.",im:"It\'s 1975. Workers arrive at 6am. Machines roar. Production targets loom. Lunch is borscht from the factory canteen.",t:"An entire factory courtyard from 1970s frozen inside. Machinery. Faded propaganda posters. Administrative buildings with socialist murals. Locals work here still. Tourists almost never find it. It\'s a time machine in plain sight.\",im:\"It\'s 1975. Workers arrive at 6am. Machines roar. Production targets loom. Lunch is borscht from the factory canteen.\",t:\"Near Stalowa Street, Praga South. Walk courtyards. Some buildings gated but exteriors visible. Go weekday mornings. Respectful observation.",c:["history_big", "architecture", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:27,n:"Nomads Market (Bazar Różyckiego)",a:"Wola",v:["local", "weird", "free"],d:27,s:"Where contraband becomes community.",st:"Saturday-Sunday street market. Clothes. Electronics. Knockoffs. Fresh produce. Chaos. Haggling. A cultural experience. Pickpockets lurk but locals navigate effortlessly. Food stalls serve street food. It\'s sensory overload.",im:"It\'s 1989. The market explodes with goods. Suddenly borders are porous. Abundance is possible.",t:"Saturday-Sunday street market. Clothes. Electronics. Knockoffs. Fresh produce. Chaos. Haggling. A cultural experience. Pickpockets lurk but locals navigate effortlessly. Food stalls serve street food. It\'s sensory overload.\",im:\"It\'s 1989. The market explodes with goods. Suddenly borders are porous. Abundance is possible.\",t:\"Różyckiego Street, near Metro Różyckiego. Saturday-Sunday 8am-2pm. Go early. Keep valuables secure. Bring cash.",c:["local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:28,n:"Kahlert Jewish School Remains",a:"Muranów",v:["history", "scary", "hidden"],d:28,s:"Architecture of destroyed dreams.",st:"Fragments of a pre-war Jewish school remain. Brick walls. Window frames. A memorial of incompleteness. The building was partly destroyed in 1944. Reconstruction attempts failed. Now it stands as ruin with purpose.",im:"It\'s 1939. Children learn. Teachers inspire. By 1942, the building is empty. By 1944, it\'s burning.",t:"Fragments of a pre-war Jewish school remain. Brick walls. Window frames. A memorial of incompleteness. The building was partly destroyed in 1944. Reconstruction attempts failed. Now it stands as ruin with purpose.\",im:\"It\'s 1939. Children learn. Teachers inspire. By 1942, the building is empty. By 1944, it\'s burning.\",t:\"Stawki Street area. Approached from Zamenhofa or Dzielna. Visible from street. Somber. Respectful. Quiet contemplation.",c:["history_big"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:29,n:"Botanical Garden (Ogród Botaniczny)",a:"Mokotów",v:["nature", "quiet", "beautiful"],d:29,s:"Plant diversity in the city\'s heart.",st:"Twenty hectares of greenhouses and gardens. Tropical plants. Succulents. Alpine flowers. Designed for quiet study, not spectacle. Old gardeners tend plots carefully. It\'s contemplative. It\'s alive.",im:"It\'s 1818. Scientists plant the first beds. Taxonomy grows. Classification matters. Nature becomes ordered.",t:"Twenty hectares of greenhouses and gardens. Tropical plants. Succulents. Alpine flowers. Designed for quiet study, not spectacle. Old gardeners tend plots carefully. It\'s contemplative. It\'s alive.\",im:\"It\'s 1818. Scientists plant the first beds. Taxonomy grows. Classification matters. Nature becomes ordered.\",t:\"Aleje Ujazdowskie 4. Open 9am-6pm (seasonal). €4. Palm House highlights. Go off-peak. Bring a guide book.",c:["nature", "parks", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:30,n:"Rondo Wiatraczów Roundabout Murals",a:"Wola",v:["street_art", "beautiful", "local"],d:30,s:"Roundabout as canvas for resistance.",st:"A working traffic roundabout covered in street art. Murals change seasonally. Artists use this as political billboard. Environmental themes. Social critique. It\'s functional chaos. It\'s beautiful.",im:"It\'s 2010. A crane arrives. Artists launch two-day mural. By Sunday it\'s iconic. By spring it\'s covered by new work.",t:"A working traffic roundabout covered in street art. Murals change seasonally. Artists use this as political billboard. Environmental themes. Social critique. It\'s functional chaos. It\'s beautiful.\",im:\"It\'s 2010. A crane arrives. Artists launch two-day mural. By Sunday it\'s iconic. By spring it\'s covered by new work.\",t:\"Rondo Wiatraczów intersection, Wola. Visible 24/7. Best photographed at golden hour. Free. Walk the full circle.",c:["street_art"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:31,n:"Underground Press Museum",a:"Śródmieście",v:["history", "hidden", "scary"],d:31,s:"Forbidden words printed in cellars.",st:"During martial law, opposition movement printed newspapers in basement hideouts. Cramped presses. Dangerous distribution. One slip meant prison. A tiny museum preserves these crude printing operations. See the revolution before it was televised.",im:"It\'s 1981. A student feeds paper into an illegal press. Footsteps above. The revolution is whispered, not shouted. Yet.",t:"During martial law, opposition movement printed newspapers in basement hideouts. Cramped presses. Dangerous distribution. One slip meant prison. A tiny museum preserves these crude printing operations. See the revolution before it was televised.\",im:\"It\'s 1981. A student feeds paper into an illegal press. Footsteps above. The revolution is whispered, not shouted. Yet.\",t:\"Multiple small exhibitions. Solidarity movement museums exist. Check Muzeum Powstaí Warszawy. €8. Reserve ahead for special tours.",c:["history_big", "scary"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:32,n:"Cytadela Park Fortress Tunnels",a:"Żoliborz",v:["history", "scary", "hidden"],d:32,s:"Russian fortification still underground.",st:"A 19th-century Russian fortress built after 1831 Uprising. Massive walls. Deep tunnels. Some sections open for tours. Walls are thick enough to stop time. Below are dungeons. Above are parks. Few realize the ground beneath them echoes with history.",im:"It\'s 1832. Russian engineers build. Walls are punishment. The fortress will guard Polish submission.",t:"A 19th-century Russian fortress built after 1831 Uprising. Massive walls. Deep tunnels. Some sections open for tours. Walls are thick enough to stop time. Below are dungeons. Above are parks. Few realize the ground beneath them echoes with history.\",im:\"It\'s 1832. Russian engineers build. Walls are punishment. The fortress will guard Polish submission.\",t:\"Cybernetyki 1. Open daily. Fortress exterior free. Underground tours €4. Reserve ahead. Flashlights provided.",c:["history_big", "scary"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:33,n:"Krakowskie Przedmieście Royal Route",a:"Śródmieście",v:["history", "beautiful"],d:33,s:"The street where power walked.",st:"From castle to university, royalty processed here. Baroque churches. Neoclassical mansions. Rebuilt after war brick-by-brick from pre-war photos. It\'s architectural resurrection. Walk it and feel protocol.",im:"It\'s 1750. The king\'s carriage rolls on stone. Nobles bow. Commoners scatter. Power is visible.",t:"From castle to university, royalty processed here. Baroque churches. Neoclassical mansions. Rebuilt after war brick-by-brick from pre-war photos. It\'s architectural resurrection. Walk it and feel protocol.\",im:\"It\'s 1750. The king\'s carriage rolls on stone. Nobles bow. Commoners scatter. Power is visible.\",t:\"Krakowskie Przedmieście, from Castle Square toward Town. Best walked slowly. Museums inside. Cafés throughout. Allow 90 minutes.",c:["history_big", "beautiful", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:34,n:"Jabłkowska Street Market (Weekends)",a:"Praga North",v:["local", "weird"],d:34,s:"Vintage chaos where history is priced.",st:"Weekend bazaar of used goods. Soviet memorabilia. Vintage clothes. Books. Furniture. Everything is a story. Negotiate. Find absurdities. It\'s funky. It\'s addictive. Locals hunt treasures here.",im:"It\'s 1995. The first flea market explodes. Suddenly everything is buyable. Nostalgia has a price.",t:"Weekend bazaar of used goods. Soviet memorabilia. Vintage clothes. Books. Furniture. Everything is a story. Negotiate. Find absurdities. It\'s funky. It\'s addictive. Locals hunt treasures here.\",im:\"It\'s 1995. The first flea market explodes. Suddenly everything is buyable. Nostalgia has a price.\",t:\"Jabłkowska Street, near Żytnia. Weekends 8am-2pm. Go early for best selection. Cash only. Pickpockets exist.",c:["local_only", "weird"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:35,n:"Copernicus Science Center Labs",a:"Powiśle",v:["beautiful", "quiet", "nature"],d:35,s:"Science as playground, not lecture.",st:"Hands-on experiments. Interactive exhibits. No ropes behind. Touch everything. Experiment. Fail. Learn. Built on Vistula bank with river views. Science feels alive here. Innovation feels possible.",im:"It\'s 2010. A child spins a vortex chamber. Eyes widen. Science is no longer distant.",t:"Hands-on experiments. Interactive exhibits. No ropes behind. Touch everything. Experiment. Fail. Learn. Built on Vistula bank with river views. Science feels alive here. Innovation feels possible.\",im:\"It\'s 2010. A child spins a vortex chamber. Eyes widen. Science is no longer distant.\",t:\"Wybrzeże Kościuszkowskie 19. Open 10am-7pm. €8. Book ahead for groups. Café with riverside view.",c:["beautiful", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:36,n:"Henryk de Saint-Martin Church",a:"Wola",v:["beautiful", "architecture", "quiet"],d:36,s:"Gothic revival rising from industrial grime.",st:"A soaring church built in 1880s industrial Wola. Neo-Gothic spire. Ornate interior. Workers prayed here. It survived the war. Sits awkwardly amid apartment blocks. Sacred geometry interrupts communism.",im:"It\'s 1888. The spire rises. Workers bow their heads. Here, among factories, God has a house.",t:"A soaring church built in 1880s industrial Wola. Neo-Gothic spire. Ornate interior. Workers prayed here. It survived the war. Sits awkwardly amid apartment blocks. Sacred geometry interrupts communism.\",im:\"It\'s 1888. The spire rises. Workers bow their heads. Here, among factories, God has a house.\",t:\"Długa 1, Wola. Open for Mass and visits. €0. Modest dress. Interior stunning. Check visiting hours.",c:["architecture", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:37,n:"Wasal Street Courtyard Network",a:"Praga North",v:["hidden", "beautiful", "courtyards"],d:37,s:"Passages that time forgot.",st:"Multiple courtyards connected by passages. Each one is a village. Gardens grow. Artists work. Cafés serve coffee. Residents protect fiercely. Outsiders barely know. It\'s hidden Warsaw, the real Warsaw.",im:"It\'s 1920. Merchants connect courtyards with passages. A self-sufficient world forms. Walls define society.",t:"Multiple courtyards connected by passages. Each one is a village. Gardens grow. Artists work. Cafés serve coffee. Residents protect fiercely. Outsiders barely know. It\'s hidden Warsaw, the real Warsaw.\",im:\"It\'s 1920. Merchants connect courtyards with passages. A self-sufficient world forms. Walls define society.\",t:\"Wasal Street, Praga North. Multiple entry points. Free. Respect residents. Quiet hours after 10pm. Best morning light.",c:["courtyards", "hidden", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:38,n:"Żeromski Museum (Apartment)",a:"Śródmieście",v:["history", "quiet", "local"],d:38,s:"A writer\'s desk, frozen in time.",st:"Stefan Żeromski\'s apartment as he left it. Books. Manuscripts. Personal effects. Small but intimate. See how a major novelist actually lived. The rooms are modest. The presence is immense.",im:"It\'s 1920. A writer sits at desk. Pages accumulate. Poland\'s conscience takes shape in paragraphs.",t:"Stefan Żeromski\'s apartment as he left it. Books. Manuscripts. Personal effects. Small but intimate. See how a major novelist actually lived. The rooms are modest. The presence is immense.\",im:\"It\'s 1920. A writer sits at desk. Pages accumulate. Poland\'s conscience takes shape in paragraphs.\",t:\"Tamka 43. Open 10am-4pm Wed-Sun. €2. Quiet visit. Reserved groups. Few tourists. Intimate.",c:["local_only", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:39,n:"Sezam Falafel Stand",a:"Śródmieście",v:["local", "free"],d:39,s:"Levantine lunch under a bridge.",st:"A stand serving falafel and hummus. No pretension. Tourists and construction workers queue. €2 for incredible food. Eaten standing. Perfection in simplicity. This is how Warsaw eats when not posing.",im:"It\'s 2000. An immigrant opens a stand. Suddenly Polish workers taste Middle East. Lunch is transformed.",t:"A stand serving falafel and hummus. No pretension. Tourists and construction workers queue. €2 for incredible food. Eaten standing. Perfection in simplicity. This is how Warsaw eats when not posing.\",im:\"It\'s 2000. An immigrant opens a stand. Suddenly Polish workers taste Middle East. Lunch is transformed.\",t:\"Under Poniatowskiego Bridge, near Powiśle. 11am-8pm. Cash only. €2-3 per meal. Busiest noon-1pm.",c:["local_only", "free"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:40,n:"Miłość (Love) Mural Viewpoint",a:"Praga South",v:["street_art", "beautiful", "weird"],d:40,s:"One word in 30-meter letters.",st:"A massive wall reads \'Miłość\' (Love) in flowing script. It\'s visible from across the river. Locals point it out constantly. Street art that became cityscape. Simple. Overwhelming. Beautiful despite (because of?) its obviousness.",im:"It\'s 2012. An artist climbs. The word grows. By morning, Praga has a declaration.",t:"A massive wall reads \'Miłość\' (Love) in flowing script. It\'s visible from across the river. Locals point it out constantly. Street art that became cityscape. Simple. Overwhelming. Beautiful despite (because of?) its obviousness.\",im:\"It\'s 2012. An artist climbs. The word grows. By morning, Praga has a declaration.\",t:\"Ulica Ściegna, Praga South. Visible from street level and from Vistula. Best photographed from Powiśle side. Free. Obvious. Magnificent.",c:["street_art", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:41,n:"Ogród Saski (Saxon Garden) Ruins",a:"Śródmieście",v:["history", "beautiful", "hidden"],d:41,s:"Baroque garden where a palace once ruled.",st:"An 18th-century royal garden. The palace was destroyed. The garden remained. Fountains. Statuary. Paths. Now it\'s public. Free. Quiet. Used by locals, ignored by tourists. History grows roses here.",im:"It\'s 1750. The king walks gravel. Symmetry pleases power. By 1944, the palace is ash.",t:"An 18th-century royal garden. The palace was destroyed. The garden remained. Fountains. Statuary. Paths. Now it\'s public. Free. Quiet. Used by locals, ignored by tourists. History grows roses here.\",im:\"It\'s 1750. The king walks gravel. Symmetry pleases power. By 1944, the palace is ash.\",t:\"Ulica Ogrodowa or Senatorska. Open dawn-dusk. Free. Best morning walk. Few tourists. Locals\' secret.",c:["parks", "beautiful", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:42,n:"Umschlagplatz Memorial Square",a:"Muranów",v:["history", "scary", "quiet"],d:42,s:"Where 300,000 began their last journey.",st:"The loading platform for trains to Treblinka. A square now. 400 glass floor blocks. Underneath, empty chairs. 7,000 of them. Each represents ten people. A visual equation of loss. Silence is the only sound.",im:"It\'s August 1942. Thousands wait. Guards shout. Steam whistles. By nightfall, the platform is empty. Chairs remain forever.",t:"The loading platform for trains to Treblinka. A square now. 400 glass floor blocks. Underneath, empty chairs. 7,000 of them. Each represents ten people. A visual equation of loss. Silence is the only sound.\",im:\"It\'s August 1942. Thousands wait. Guards shout. Steam whistles. By nightfall, the platform is empty. Chairs remain forever.\",t:\"Ulica Stawki/Zamenhofsa corner. Open 24/7. Free. Bring silence. Allow 30 minutes. Profound.",c:["history_big"],r:"y",nn:"",ns:"",nst:"",nt:""},
  {id:43,n:"Wilanów Palace and Park",a:"Mokotów",v:["beautiful", "history", "nature"],d:43,s:"A royal escape still offering refuge.",st:"King John\'s summer palace. Baroque grandeur. Vast gardens. Museum inside. Walk grounds that shaped Polish culture. Peacocks roam. Lakes reflect palaces. It\'s formal. It\'s alive. It\'s essential.",im:"It\'s 1690. The king builds escape. By night, nobility dances. Versailles is envied. Warsaw achieves glory.",t:"King John\'s summer palace. Baroque grandeur. Vast gardens. Museum inside. Walk grounds that shaped Polish culture. Peacocks roam. Lakes reflect palaces. It\'s formal. It\'s alive. It\'s essential.\",im:\"It\'s 1690. The king builds escape. By night, nobility dances. Versailles is envied. Warsaw achieves glory.\",t:\"Ulica Stanisława Kostki Potockiego 10/16. Open daily 9:30am-6pm. €8. Allow 3-4 hours. Rent a boat. Café with garden views.",c:["parks", "beautiful", "history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:44,n:"Praga Crossroads Graffiti",a:"Praga South",v:["street_art", "weird", "local"],d:44,s:"Intersection where artists declare war on walls.",st:"A chaotic crossing where murals overlap. Politics. Portraiture. Abstraction. It changes weekly. No permits. Artists come at night. By morning, new declarations cover old ones. It\'s controlled chaos.",im:"It\'s 2008. Artists gather at midnight. By dawn, the wall screams. Authority shrugs. The wall speaks anyway.",t:"A chaotic crossing where murals overlap. Politics. Portraiture. Abstraction. It changes weekly. No permits. Artists come at night. By morning, new declarations cover old ones. It\'s controlled chaos.\",im:\"It\'s 2008. Artists gather at midnight. By dawn, the wall screams. Authority shrugs. The wall speaks anyway.\",t:\"Brzeska/Ząbkowska intersection, Praga. Check weekly for changes. Photography encouraged. Free. Best lit at dusk.",c:["street_art"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:45,n:"Muranów Rebuilt Neighborhood",a:"Muranów",v:["history", "architecture", "quiet"],d:45,s:"Communist blocks rising over ashes.",st:"After the ghetto destruction, the Communists built Muranów from scratch. Soviet realism architecture. Identical facades. Hidden courtyards. It\'s brutal. It\'s honest. It\'s haunted by what came before.",im:"It\'s 1950. Workers lay brick. Above, ghosts of 400,000. Below, foundations of tragedy. The new city buries old pain.",t:"After the ghetto destruction, the Communists built Muranów from scratch. Soviet realism architecture. Identical facades. Hidden courtyards. It\'s brutal. It\'s honest. It\'s haunted by what came before.\",im:\"It\'s 1950. Workers lay brick. Above, ghosts of 400,000. Below, foundations of tragedy. The new city buries old pain.\",t:\"Explore Muranów district. Stawki, Miła, Zamenhofa are core streets. Memorials throughout. Walk respectfully. Many courtyards open to explore.",c:["history_big", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:46,n:"Vistula Bulwark Sculptures",a:"Powiśle",v:["beautiful", "art", "quiet"],d:46,s:"Modern art installed on medieval walls.",st:"Contemporary sculptures placed along ancient Vistula banks. Glass. Steel. Stone. Old fortress walls meet new vision. It\'s jarring. It\'s inspiring. The river connects past and present.",im:"It\'s 2008. Artists install. Traditionalists protest. By next year, it\'s iconic. Art becomes landscape.",t:"Contemporary sculptures placed along ancient Vistula banks. Glass. Steel. Stone. Old fortress walls meet new vision. It\'s jarring. It\'s inspiring. The river connects past and present.\",im:\"It\'s 2008. Artists install. Traditionalists protest. By next year, it\'s iconic. Art becomes landscape.\",t:\"Bulwary Wiślane, from Powiśle to Kazimierz. Walk length. Sculptures visible 24/7. Photography excellent. Free. Peaceful.",c:["beautiful", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:47,n:"Krasinski Library Reading Room",a:"Śródmieście",v:["beautiful", "quiet", "architecture"],d:47,s:"Where books breathe in Gothic silence.",st:"A 1920s neogothic library. Soaring shelves. Ornate ceiling. Readers work silently. Open to public. Sit for hours. No one bothers you. It\'s a sanctuary for the mind. Beautiful beyond necessity.",im:"It\'s 1928. A student discovers. The reading room becomes refuge. Books are doors. Knowledge is escape.",t:"A 1920s neogothic library. Soaring shelves. Ornate ceiling. Readers work silently. Open to public. Sit for hours. No one bothers you. It\'s a sanctuary for the mind. Beautiful beyond necessity.\",im:\"It\'s 1928. A student discovers. The reading room becomes refuge. Books are doors. Knowledge is escape.\",t:\"Krakowskie Przedmieście 32. Open 10am-6pm. Registration €0. ID required. Laptop-free zones exist. Bring respect.",c:["beautiful", "quiet", "architecture"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:48,n:"Leśna Street Beer Bar (Pijalnia)",a:"Wola",v:["local", "history"],d:48,s:"Boilermakers\' refuge, still pouring.",st:"A beer bar that\'s served construction workers since 1970. No decor. Beer. Sausage. Conversation. Walls are decorated with nothing but time. It\'s authenticity distilled. It\'s disappearing Warsaw.",im:"It\'s 1975. A worker sits. A beer arrives. The world outside is chaos. Here, order and fermentation.",t:"A beer bar that\'s served construction workers since 1970. No decor. Beer. Sausage. Conversation. Walls are decorated with nothing but time. It\'s authenticity distilled. It\'s disappearing Warsaw.\",im:\"It\'s 1975. A worker sits. A beer arrives. The world outside is chaos. Here, order and fermentation.\",t:\"Leśna 11. Open 6am-10pm. €0.50 per beer. Cash only. Workers arrive 6am. Tourists almost never.",c:["local_only", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:49,n:"Vistula Flooding Markers",a:"Powiśle",v:["history", "nature", "quiet"],d:49,s:"Medieval water marked on modern walls.",st:"Plaques on building walls show historical flood levels. 16th century here. 18th century there. The river reminds the city who came first. Walk and read water lines. History measured in meters.",im:"It\'s 1610. Water rises. Merchants watch. Markets flood. Nature decides commerce.",t:"Plaques on building walls show historical flood levels. 16th century here. 18th century there. The river reminds the city who came first. Walk and read water lines. History measured in meters.\",im:\"It\'s 1610. Water rises. Merchants watch. Markets flood. Nature decides commerce.\",t:\"Bulwary Wiślane and Powiśle streets. Plaques visible on walls. Free. Educational. Self-guided tour possible.",c:["history_big", "nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:50,n:"National Museum Upper Galleries",a:"Śródmieście",v:["beautiful", "quiet"],d:50,s:"Art unfinished and therefore perfect.",st:"Upper floors less crowded than ground level. Medieval art. Polish masterworks. Rooms that feel like museums 50 years ago. Peaceful. Scholarly. Few tourists navigate this high.",im:"It\'s 1930. A collector donates paintings. They will survive the war. Hidden. Returned. Cherished.",t:"Upper floors less crowded than ground level. Medieval art. Polish masterworks. Rooms that feel like museums 50 years ago. Peaceful. Scholarly. Few tourists navigate this high.\",im:\"It\'s 1930. A collector donates paintings. They will survive the war. Hidden. Returned. Cherished.\",t:\"Aleje Jerozolimskie 3. Open 10am-6pm (closed Mon). €8. Upper galleries documented in guidebook. Go mid-afternoon.",c:["beautiful", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:51,n:"Praga Film Library Basement",a:"Praga South",v:["hidden", "local", "history"],d:51,s:"Archive of disappeared cinema.",st:"A small library preserving Polish film history. Reels. Posters. Photographs. Film books. It\'s dusty. It\'s authentic. Regular screenings show classics in original cuts. Cinephiles find it by accident. They return intentionally.",im:"It\'s 1960. A projectionist loads film. By week\'s end, audiences transport. Memory flickers on screens.",t:"A small library preserving Polish film history. Reels. Posters. Photographs. Film books. It\'s dusty. It\'s authentic. Regular screenings show classics in original cuts. Cinephiles find it by accident. They return intentionally.\",im:\"It\'s 1960. A projectionist loads film. By week\'s end, audiences transport. Memory flickers on screens.\",t:\"Ulica Pogonowskiego 27. Check schedule online. Screenings occasional. €3. No reservations. First-come. Check ahead.",c:["local_only", "history_big"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:52,n:"Saska Kępa Bridge (Footbridge)",a:"Saska Kępa",v:["beautiful", "quiet", "nature"],d:52,s:"Where suburbs meet Vistula romance.",st:"A modest footbridge connects Saska Kępa to gardens. On one side, villas. On the other, river. Stop midway. Look up. Look down. This bridge is a hinge between urban and natural.",im:"It\'s 1920. A couple crosses at sunset. Behind, villas sleep. Ahead, water reflects sky. Romance is geometry.",t:"A modest footbridge connects Saska Kępa to gardens. On one side, villas. On the other, river. Stop midway. Look up. Look down. This bridge is a hinge between urban and natural.\",im:\"It\'s 1920. A couple crosses at sunset. Behind, villas sleep. Ahead, water reflects sky. Romance is geometry.\",t:\"Saska Kępa area. Bridge near Mysliwiecka Street. Free. Walk both directions. Evening light is sublime. Bring someone.",c:["beautiful", "parks", "nature"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:53,n:"Szpital Wolski Hospital Courtyard",a:"Wola",v:["history", "quiet", "hidden"],d:53,s:"Medicine and resistance merged.",st:"A working hospital with 1920s courtyard. During WWII, resistance operated from here. Now it\'s a medical facility. Courtyards are quiet. History is embedded in walls. Walk past workers in scrubs. They ignore visitors. History ignores them too.",im:"It\'s 1943. A doctor treats a fighter. Nazis watch from outside. Medicine becomes sabotage.",t:"A working hospital with 1920s courtyard. During WWII, resistance operated from here. Now it\'s a medical facility. Courtyards are quiet. History is embedded in walls. Walk past workers in scrubs. They ignore visitors. History ignores them too.\",im:\"It\'s 1943. A doctor treats a fighter. Nazis watch from outside. Medicine becomes sabotage.\",t:\"Ulica Szpitalna 9. Hospital courtyard accessible during business hours. Respectful observation. Ask permission. Workers are kind.",c:["history_big", "quiet"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:54,n:"Praga Apartments Block with Murals",a:"Praga North",v:["street_art", "beautiful", "architecture"],d:54,s:"Brutalism meets street art masterpiece.",st:"An enormous Soviet-era apartment block is now a canvas. A full-facade mural. Heroic figures. Bold colors. The building was ugly. Now it\'s iconic. Street art saved it from demolition.",im:"It\'s 1975. A gray block rises. Nobody celebrates. By 2010, an artist transforms it. The city gasps. Suddenly brutalism is beautiful.",t:"An enormous Soviet-era apartment block is now a canvas. A full-facade mural. Heroic figures. Bold colors. The building was ugly. Now it\'s iconic. Street art saved it from demolition.\",im:\"It\'s 1975. A gray block rises. Nobody celebrates. By 2010, an artist transforms it. The city gasps. Suddenly brutalism is beautiful.\",t:\"Kilka possible locations in Praga North. Ask locals. Photography welcomed. Free. Visible 24/7. Murals change every 2-3 years.",c:["street_art", "architecture", "beautiful"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:55,n:"Old Town Squares Hidden Café",a:"Śródmieście",v:["hidden", "beautiful", "local"],d:55,s:"Tourist trap with locals\' secret inside.",st:"The Old Town is crowded. But inside a courtyard off Rynek, a café serves the same people daily. No menu. Fresh coffee. Conversation. It\'s been here 20 years. Tourists walk past. Locals return.",im:"It\'s 1995. A café opens. By 2000, regulars are family. The outside world doesn\'t matter.",t:"The Old Town is crowded. But inside a courtyard off Rynek, a café serves the same people daily. No menu. Fresh coffee. Conversation. It\'s been here 20 years. Tourists walk past. Locals return.\",im:\"It\'s 1995. A café opens. By 2000, regulars are family. The outside world doesn\'t matter.\",t:\"Off Rynek Starego Miasta, look for unmarked courtyard entries. Café Lolita hidden inside. €2 coffee. Locals only vibe. Worth discovering accidentally.",c:["hidden", "beautiful", "local_only"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:56,n:"Copacabana Nightclub (Former)",a:"Praga South",v:["history", "night", "weird"],d:56,s:"1990s rave temple now art space.",st:"A warehouse converted to legendary club in post-communist chaos. DJs from across Europe. Illegal until it wasn\'t. Now it\'s a gallery and event space. The walls still vibrate with memory.",im:"It\'s 1992. Eastern Europeans dance to house music for the first time. Freedom tastes like a 4/4 beat.",t:"A warehouse converted to legendary club in post-communist chaos. DJs from across Europe. Illegal until it wasn\'t. Now it\'s a gallery and event space. The walls still vibrate with memory.\",im:\"It\'s 1992. Eastern Europeans dance to house music for the first time. Freedom tastes like a 4/4 beat.\",t:\"Ulica Ściegna, Praga South. Event-dependent. Check online. €3-8 entry. Best weekend nights.",c:["history_big", "night"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:57,n:"Kanał Water Gate (Keepers\' House)",a:"Powiśle",v:["hidden", "history", "quiet"],d:57,s:"Where water controllers live.",st:"A small house manages Vistula flow. Built 1920s. Still operational. The keeper lives inside. A tiny museum explains hydraulics. Few know this place exists. Sewage becomes infrastructure poetry.",im:"It\'s 1930. An engineer studies maps. Water levels. Locks. The city depends on this invisible man.",t:"A small house manages Vistula flow. Built 1920s. Still operational. The keeper lives inside. A tiny museum explains hydraulics. Few know this place exists. Sewage becomes infrastructure poetry.\",im:\"It\'s 1930. An engineer studies maps. Water levels. Locks. The city depends on this invisible man.\",t:\"Ulica Wybrzeże Kościuszkowskie, near Poniatowskiego. Visits by appointment. €0. Call ahead. Extremely obscure.",c:["history_big", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:58,n:"Dorotheergasse Passage (Art Nouveau)",a:"Śródmieście",v:["beautiful", "hidden", "architecture"],d:58,s:"Stained glass survives behind concrete.",st:"A passage with Art Nouveau details buried behind modern facades. Original floor tiles. Ornate railings. Restored windows. Walk through and time shifts. The street is busy. The passage is serene.",im:"It\'s 1910. Merchants move through elegant passages. By 1950, walls hide them. By 2010, restoration reveals buried beauty.",t:"A passage with Art Nouveau details buried behind modern facades. Original floor tiles. Ornate railings. Restored windows. Walk through and time shifts. The street is busy. The passage is serene.\",im:\"It\'s 1910. Merchants move through elegant passages. By 1950, walls hide them. By 2010, restoration reveals buried beauty.\",t:\"Between Szpitalna and Miodowa. Easy to miss. Free. Walk in daylight to see stained glass details.",c:["architecture", "beautiful", "hidden"],r:"g",nn:"",ns:"",nst:"",nt:""},
  {id:59,n:"Żydowski Szpital (Jewish Hospital Site)",a:"Muranów",v:["history", "scary", "quiet"],d:59,s:"Medicine under occupation.",st:"The Jewish Hospital operated during ghetto and war. Doctors saved who they could. Now it\'s medical offices. A plaque marks heroism. The walls treated patients Nazi law forbade.",im:"It\'s 1943. A doctor operates. Supplies run out. She uses prayer as anesthesia. Medicine becomes resistance.",t:"The Jewish Hospital operated during ghetto and war. Doctors saved who they could. Now it\'s medical offices. A plaque marks heroism. The walls treated patients Nazi law forbade.\",im:\"It\'s 1943. A doctor operates. Supplies run out. She uses prayer as anesthesia. Medicine becomes resistance.\",t:\"Ulica Miła area. Plaque visible. Building functional. Respectful observation from street.",c:["history_big"],r:"y",nn:"",ns:"",nst:"",nt:""},

<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TBGS={"places":"url('../../textures/tex4.png') center/cover no-repeat","collections":"url('../../textures/tex1.png') center/cover no-repeat","missions":"url('../../textures/tex3.png') center/cover no-repeat","plan":"url('../../textures/tex2.png') center/cover no-repeat","phrases":"url('../../textures/tex4.png') center/cover no-repeat","default":"url('../../textures/tex4.png') center/cover no-repeat"};function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
{/* dark scrim over photo */}
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Warsaw Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Warsaw Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
