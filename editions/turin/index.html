const P = [
  {id:1,n:"Piazza Castello — Centro Storico",a:"Centro Storico",v:["beautiful","history","architecture"],d:15,s:"Turin\'s grand baroque heart — Palazzo Reale, Palazzo Madama, and Teatro Regio all meet here",st:"The piazza is always open and free. Walk the arcaded porticoes that shelter you in any weather. Palazzo Madama straddles the gap between Roman gate and baroque palace — two thousand years of history in one building.",im:"Time-travel: the Savoy court processing from the Royal Palace to the theatre across this square, 1750",t:"Free always. Best in morning light before tour groups arrive.",c:["architecture"],r:"g",nn:"Piazza Castello — Centro Storico",ns:"Il cuore barocco di Torino — Palazzo Reale, Palazzo Madama e il Teatro Regio",nst:"La piazza è sempre aperta e gratuita. I portici arcuati ti proteggono in ogni stagione.",nt:"Sempre gratis. Meglio la mattina presto."},
  {id:2,n:"Porta Palazzo Market — Centro Storico",a:"Centro Storico",v:["local","free","weird"],d:30,s:"Europe\'s largest open-air market fills this sprawling piazza every morning — free to wander",st:"Every Tuesday–Saturday morning, Porta Palazzo becomes a city in motion: hundreds of vendors, immigrants from a dozen countries, mountains of vegetables and secondhand clothing. The energy is extraordinary.",im:"Time-travel: this piazza as the edge of medieval Turin, just outside the city gate, 1600",t:"Free to wander. Tue–Sat mornings. Arrive before 10am for the best atmosphere.",c:["local_only"],r:"g",nn:"Mercato di Porta Palazzo — Centro Storico",ns:"Il più grande mercato all\'aperto d\'Europa riempie questa piazza ogni mattina",nst:"Ogni mattina Martedì–Sabato, Porta Palazzo diventa una città in movimento.",nt:"Gratis. Mar–Sab mattino. Arriva prima delle 10."},
  {id:3,n:"Galleria Subalpina — Centro Storico",a:"Centro Storico",v:["beautiful","architecture","quiet"],d:15,s:"A 19th-century glass-roofed arcade with bookshops, a chess café, and ornate ironwork",st:"The Galleria Subalpina connects Piazza Castello to Via Po. Antiquarian bookshops, a chess café, and the ornate 1874 ironwork make it a serene refuge from the city. Free to enter and browse.",im:"Time-travel: Turinese intellectuals meeting in the chess café under this glass roof, 1890",t:"Free. Open during arcade hours. The chess café at the far end is excellent.",c:["architecture"],r:"g",nn:"Galleria Subalpina — Centro Storico",ns:"Un\'arcade con tetto in vetro del XIX secolo - librerie antiquarie, caffe degli scacchi",nst:"La Galleria Subalpina collega Piazza Castello a Via Po.",nt:"Gratis. Aperta durante gli orari dell\'arcade."},
  {id:4,n:"Parco del Valentino — San Salvario",a:"San Salvario",v:["nature","beautiful","local"],d:40,s:"Turin\'s riverside park along the Po — 500,000 m² of joggers, picnics, and herons",st:"Valentino is Turin\'s main park, running along the Po\'s west bank. Joggers, couples, students, and herons share the riverside. The 1880s Borgo Medievale replica castle is free to view from outside.",im:"Time-travel: the Savoy court using this park as a private hunting ground before the city expanded, 1800",t:"Free. Open always.",c:["parks"],r:"g",nn:"Parco del Valentino — San Salvario",ns:"Il parco lungo il Po di Torino — 500.000 m² di corridori, picnic ed aironi",nst:"Valentino è il parco principale di Torino, lungo la sponda ovest del Po.",nt:"Gratis. Sempre aperto."},
  {id:5,n:"Borgo Medievale — San Salvario",a:"San Salvario",v:["history","beautiful","architecture"],d:20,s:"A full-scale reproduction of a 15th-century Piedmontese village, built for the 1884 exhibition",st:"The Borgo Medievale sits inside Valentino Park. It is a faithful copy of a medieval hill village, built as a historical showcase. The exterior and courtyard are free to walk at any time.",im:"Time-travel: the 1884 Exhibition visitors marvelling at this reconstruction, seeing their own medieval past rebuilt, 1884",t:"Free outside. Interior has small entry fee.",c:["history_big"],r:"g",nn:"Borgo Medievale — San Salvario",ns:"Una riproduzione in scala reale di un borgo piemontese del XV secolo",nst:"Il Borgo Medievale si trova dentro il Parco del Valentino.",nt:"Gratis fuori. Interno con piccolo biglietto."},
  {id:6,n:"San Salvario Aperitivo — San Salvario",a:"San Salvario",v:["local","free","night"],d:20,s:"Turin\'s most vibrant aperitivo neighbourhood — free snacks with drinks, 18:30–20:00",st:"San Salvario around Via Baretti and Via Madama Cristina is packed with affordable bars offering free snacks with evening drinks. Turin invented the aperitivo — and it is still done best here.",im:"Time-travel: the student workers of FIAT stopping here on their way home from the factory, 1960",t:"Free snacks with any drink (around €5 buys you access to the buffet). Best 18:30–20:00.",c:["local_only"],r:"g",nn:"San Salvario aperitivo — San Salvario",ns:"Il quartiere aperitivo più vivace di Torino — snack gratuiti con le bevande",nst:"Il San Salvario è pieno di bar a prezzi accessibili che offrono stuzzichini con i drinks.",nt:"Snack gratuiti con qualsiasi drink. Meglio 18:30–20:00."},
  {id:7,n:"Murazzi del Po — Vanchiglia",a:"Vanchiglia",v:["local","nature","beautiful"],d:25,s:"The Po riverbank below Vanchiglia — sun-bathing on flat stones, fishing, summer terraces",st:"The Murazzi is a long stretch of flat stone embankment along the Po\'s west bank. People sunbathe on the stones, fishermen cast lines, and in summer bar terraces spill to the water\'s edge. Free at all times.",im:"Time-travel: the old Po docks here, boats loading marble and grain for the Savoy factories, 1880",t:"Free always. Summer evenings are the best time.",c:["romantic_water"],r:"g",nn:"Murazzi del Po — Vanchiglia",ns:"La riva del Po sotto Vanchiglia — bagni di sole, pesca, terrazze estive",nst:"I Murazzi sono un lungo tratto di argine piano lungo la sponda ovest del Po.",nt:"Sempre gratis. Le serate estive sono il momento migliore."},
  {id:8,n:"Piazza Vittorio Veneto — Vanchiglia",a:"Vanchiglia",v:["beautiful","history","architecture"],d:10,s:"One of Europe\'s largest baroque piazzas, sloping toward the Po — and it\'s free to sit in",st:"The massive piazza slopes from the arcaded buildings down to the river. The view from the far end toward the Gran Madre church and the hills of Superga is among Turin\'s best.",im:"Time-travel: the Turin bourgeoisie promenading here on Sunday afternoons, the Alps visible on clear days, 1900",t:"Free always.",c:["architecture"],r:"g",nn:"Piazza Vittorio Veneto — Vanchiglia",ns:"Una delle più grandi piazze barocche d\'Europa, che scende verso il Po",nst:"La grande piazza scende dagli edifici porticati fino al fiume.",nt:"Sempre gratis."},
  {id:9,n:"Vanchiglia Street Art Walk — Vanchiglia",a:"Vanchiglia",v:["street_art","art","local"],d:30,s:"Turin\'s most concentrated street art neighbourhood — murals by Italian and international artists",st:"Walk Via Lombroso, Corso Brescia, and the backstreets of Vanchiglia for murals by Italian and international artists. All free, all outdoors. The Vanki Festival murals are particularly good.",im:"Time-travel: this as an industrial workers\' quarter before the art arrived, factories humming, 1970",t:"Free always.",c:["street_art"],r:"g",nn:"Street art a Vanchiglia — Vanchiglia",ns:"Il quartiere di street art più concentrato di Torino",nst:"Passeggiata lungo Via Lombroso, Corso Brescia e i vicoli di Vanchiglia.",nt:"Sempre gratis."},
  {id:10,n:"Balon Flea Market — Aurora",a:"Aurora",v:["local","free","hidden"],d:40,s:"Every Saturday, Borgo Dora\'s streets become a sprawling flea market — antiques, vinyl, vintage",st:"The Balon fills Via Borgo Dora with antiques, records, vintage clothes, and street food every Saturday. The Gran Balon (second Sunday of each month) doubles in size. Both are free to browse.",im:"Time-travel: the Balon as Turin\'s main rag-and-bone market, the poor buying and selling to survive, 1920",t:"Free. Saturdays all day. Gran Balon: second Sunday of each month.",c:["local_only"],r:"g",nn:"Balon — Aurora",ns:"Ogni sabato, le strade del Borgo Dora diventano un immenso mercatino delle pulci",nst:"Il Balon riempie Via Borgo Dora di antiquariato, dischi e vestiti vintage ogni sabato.",nt:"Gratis. Sabati tutto il giorno."},
  {id:11,n:"OGR Cultural Centre — Aurora",a:"Aurora",v:["art","local","architecture"],d:30,s:"The old railway workshops turned cultural hub — free outdoor events and markets in the vast courtyard",st:"The Officine Grandi Riparazioni (old FIAT railway workshops) host free cultural events, outdoor screenings, and markets in their vast brick courtyard. Check their programme — many events are free.",im:"Time-travel: the railway workshops full of mechanics repairing locomotives, the sound of metal on metal, 1910",t:"Courtyard free. Check programme for free events.",c:["free_museum"],r:"g",nn:"OGR Torino — Aurora",ns:"Le vecchie officine ferroviarie diventate hub culturale",nst:"Le Officine Grandi Riparazioni ospitano eventi culturali gratuiti e mercati.",nt:"Cortile gratuito. Verifica programma eventi gratuiti."},
  {id:12,n:"Crocetta Market Hall — Crocetta",a:"Crocetta",v:["local","free","hidden"],d:20,s:"A covered daily market beloved by residents — excellent Piedmont cheeses, truffles in season",st:"The Mercato della Crocetta on Piazza Madama Cristina is a covered daily market. Excellent Piedmont cheeses, truffles in season, the cheapest espresso in the area at the bar inside. A genuine neighbourhood institution.",im:"Time-travel: Crocetta as the residential quarter of Turin\'s professional class — lawyers buying dinner here, 1950",t:"Free. Open Mon–Sat mornings and early afternoons.",c:["local_only"],r:"g",nn:"Mercato Crocetta — Crocetta",ns:"Un mercato coperto amato dai residenti — eccellenti formaggi piemontesi",nst:"Il Mercato della Crocetta è un mercato coperto quotidiano.",nt:"Gratis. Aperto Lun–Sab mattino."},
  {id:13,n:"Villa della Regina Terraces — Crocetta",a:"Crocetta",v:["beautiful","history","nature"],d:30,s:"The UNESCO terraced gardens of a 17th-century Savoy villa — panoramic view over the Po plain",st:"The terraced gardens of Villa della Regina are open on selected days. The view from the terraces over the Po plain and the Alps on clear days is extraordinary.",im:"Time-travel: the Savoy princes retreating to these terraces above the city dust in summer, 1720",t:"Check opening days (sporadic). Free entry when open.",c:["parks"],r:"g",nn:"Villa della Regina — Crocetta",ns:"I giardini terrazzati UNESCO di una villa sabauda del XVII secolo",nst:"I giardini terrazzati della Villa della Regina sono aperti in giorni selezionati.",nt:"Verifica i giorni di apertura. Ingresso gratuito quando aperto."},
  {id:14,n:"Monte dei Cappuccini — Borgo Po",a:"Borgo Po",v:["beautiful","high_spots","history"],d:25,s:"A small hill rising from the Po — climb it for the best panorama in Turin",st:"Monte dei Cappuccini rises from the Po\'s east bank, topped by a 16th-century Capuchin church. From the summit: the whole city, the Po, Superga, and the Alps on clear days. Free to climb anytime.",im:"Time-travel: the Capuchin friars establishing their monastery on this hill, deliberately above the city, 1580",t:"Free. Walk up from the Gran Madre bridge. 10 minutes.",c:["high_spots"],r:"g",nn:"Monte dei Cappuccini — Borgo Po",ns:"Una piccola collina sul Po — salila per il miglior panorama di Torino",nst:"Il Monte dei Cappuccini si alza dalla sponda est del Po.",nt:"Gratis. Sale dalla Gran Madre. 10 minuti."},
  {id:15,n:"Via Po Porticoes — Borgo Po",a:"Borgo Po",v:["architecture","beautiful","local"],d:20,s:"Turin\'s 18 km of porticoes — walk Via Po from Piazza Castello to the river under cover",st:"Via Po\'s covered arcade runs from Piazza Castello to the river, lined with bookshops, antique dealers, and old-fashioned cafés. Turin\'s porticoes total 18 km — among Europe\'s longest. Free to walk.",im:"Time-travel: the Turin porticoes as revolutionary infrastructure — walking without getting wet or cold, 1750",t:"Free. Always open.",c:["architecture"],r:"g",nn:"Portici di Via Po — Borgo Po",ns:"18 km di portici — percorri Via Po da Piazza Castello al fiume al coperto",nst:"I portici di Via Po corrono da Piazza Castello al fiume.",nt:"Gratis. Sempre aperto."},
  {id:16,n:"Gran Madre di Dio Church — Borgo Po",a:"Borgo Po",v:["architecture","beautiful","history"],d:15,s:"A Pantheon-inspired neoclassical church on the Po\'s east bank — climb the steps for the view",st:"The Gran Madre di Dio was built in 1831 to celebrate Napoleon\'s defeat. It sits at the end of the Vittorio Veneto axis. Climb the broad steps for a famous view back across the piazza.",im:"Time-travel: the citizenry celebrating the defeat of Napoleon by laying this church\'s foundation, 1818",t:"Free. Open daily. The steps alone are worth the visit.",c:["architecture"],r:"g",nn:"Gran Madre di Dio — Borgo Po",ns:"Una chiesa neoclassica ispirata al Pantheon — sali i gradini per la vista",nst:"La Gran Madre di Dio fu costruita nel 1831 per celebrare la sconfitta di Napoleone.",nt:"Gratis. Aperta quotidianamente."},
  {id:17,n:"Moncalieri Castle Grounds — Moncalieri",a:"Moncalieri",v:["history","beautiful","hidden"],d:50,s:"A massive Savoy castle on the hill above Moncalieri — village and hillside paths free anytime",st:"The Castello di Moncalieri dominates the hill above the Po. Once a royal residence, the castle now has guided visits. The surrounding village streets and hillside paths are free to walk at any time.",im:"Time-travel: the Savoy court moving between Turin and Moncalieri with the seasons, 1750",t:"Free outside. Castle interior has guided visits (€8). Village free.",c:["history_big"],r:"g",nn:"Castello di Moncalieri — Moncalieri",ns:"Un imponente castello sabaudo sulla collina sopra Moncalieri",nst:"Il Castello di Moncalieri domina la collina sopra il Po.",nt:"Gratis fuori. Interno con visita guidata (8 €)."},
  {id:18,n:"Moncalieri Saturday Market — Moncalieri",a:"Moncalieri",v:["local","free","hidden"],d:30,s:"Every Saturday morning — a local market calmer and cheaper than Turin city markets, 15 min by bus",st:"The Saturday market fills Moncalieri\'s main piazza with fresh produce, cheese vendors, and local street food. Calmer and cheaper than the Turin city markets. Good for cheap Piedmont specialities.",im:"Time-travel: Moncalieri\'s farmers selling surplus to the castle servants every Saturday morning, 1800",t:"Free. Bus 67 from Turin centre. Saturdays only.",c:["local_only"],r:"g",nn:"Mercato Moncalieri — Moncalieri",ns:"Ogni sabato mattina — un mercato più tranquillo e economico di quelli di Torino",nst:"Il mercato del sabato riempie la piazza principale di Moncalieri.",nt:"Gratis. Bus 67 da Torino. Solo sabati."},
  {id:19,n:"Stupinigi Palace Park — Stupinigi",a:"Stupinigi",v:["nature","history","beautiful"],d:60,s:"A UNESCO World Heritage Savoy residence with an enormous baroque park and deer",st:"The Palazzina di Caccia di Stupinigi is one of the most beautiful buildings in Italy. Entry to the main palace costs €12, but the outer park and approach avenues are free to walk at any time. Deer roam the forests.",im:"Time-travel: the Savoy king setting out from this palace at dawn for a day\'s hunting in the royal forest, 1720",t:"Park free. Palace entry €12. Deer visible in the forested avenues.",c:["parks"],r:"g",nn:"Parco della Palazzina di Stupinigi — Stupinigi",ns:"Una residenza sabauda Patrimonio UNESCO con un immenso parco barocco e cervi",nst:"La Palazzina di Caccia di Stupinigi è uno degli edifici più belli d\'Italia.",nt:"Parco gratis. Palazzo 12 €."},
  {id:20,n:"Stupinigi Deer Forest Walk — Stupinigi",a:"Stupinigi",v:["nature","local","hidden"],d:45,s:"Morning walks in the nature reserve where hundreds of deer roam the beech avenues",st:"The forested reserve around the Stupinigi palace is home to hundreds of free-roaming deer. Morning and evening walks through the beech avenues are free; deer are often visible from the paths.",im:"Time-travel: the royal hunting parties harvesting deer from these woods for the court banquets, 1760",t:"Free. Enter from the park approach avenues. Best at dawn and dusk.",c:["parks"],r:"g",nn:"Riserva di Stupinigi — Stupinigi",ns:"Passeggiate mattutine nella riserva dove centinaia di cervi vagano per i viali",nst:"La riserva forestale attorno alla palazzina ospita centinaia di cervi liberi.",nt:"Gratis. Alba e tramonto sono i momenti migliori."},
  {id:21,n:"Quadrilatero Romano Walk — Centro Storico",a:"Centro Storico",v:["history","architecture","local"],d:30,s:"Turin\'s oldest quarter follows the Roman grid — walk Via Garibaldi, Europe\'s longest pedestrian street",st:"The Quadrilatero Romano follows the Roman street plan. Walk Via Garibaldi (pedestrian for 1.2 km), Via della Basilica (covered market), and the medieval Torre dei due Frati. All free.",im:"Time-travel: the Roman colony of Augusta Taurinorum laid out in this exact grid, 28 BC",t:"Free always.",c:["history_big"],r:"g",nn:"Quadrilatero Romano — Centro Storico",ns:"Il quartiere più antico di Torino segue la griglia romana",nst:"Il Quadrilatero Romano segue il piano stradale romano.",nt:"Sempre gratis."},
  {id:22,n:"Piazza San Carlo — Centro Storico",a:"Centro Storico",v:["beautiful","architecture","history"],d:10,s:"Called Turin\'s drawing room — twin baroque churches, equestrian statue, and free steps to sit on",st:"Piazza San Carlo is flanked by two identical baroque churches and centred on the bronze equestrian statue of Emanuele Filiberto. The cafés under the porticoes are expensive, but sitting on the steps costs nothing.",im:"Time-travel: the Spanish gallop infantry drilling on this piazza when it was a military parade ground, 1650",t:"Free. Always open.",c:["architecture"],r:"g",nn:"Piazza San Carlo — Centro Storico",ns:"Il salotto di Torino — due chiese barocche gemelle, statua equestre, gradini gratis",nst:"Piazza San Carlo è affiancata da due chiese barocche identiche.",nt:"Gratis. Sempre aperta."},
  {id:23,n:"Superga Hilltop Walk — Borgo Po",a:"Borgo Po",v:["nature","high_spots","history"],d:120,s:"Take the historic rack tram up to Superga at 670 m — sweeping Alps panorama, free esplanade",st:"The historic GTT rack tram climbs to the Basilica di Superga at 670 m (or walk 1 hour through woodland). At the top: sweeping Alps panorama and the royal crypt. Free access to the esplanade.",im:"Time-travel: the same rack tram carrying Turin Sunday families up for the fresh air, 1905",t:"Rack tram uses a standard city ticket. Walk from Sassi takes 1 hour. Esplanade free.",c:["high_spots"],r:"g",nn:"Superga — Borgo Po",ns:"Prendi il tram a cremagliera storico fino a Superga a 670 m",nst:"Il tram a cremagliera GTT sale alla Basilica di Superga a 670 m.",nt:"Tram con biglietto ordinario. A piedi da Sassi 1 ora. Spianata gratuita."},
  {id:24,n:"Parco Michelotti — Borgo Po",a:"Borgo Po",v:["nature","local","quiet"],d:30,s:"The quieter east-bank Po park — preferred by local joggers and cyclists, far from tourist trail",st:"Parco Michelotti runs along the Po\'s east bank, quieter than Valentino. Preferred by local joggers and dog walkers. The towpath continues for kilometres. Almost no tourists.",im:"Time-travel: the east bank as working docks and textile factories before the park was made, 1920",t:"Free. Open always.",c:["parks"],r:"g",nn:"Parco Michelotti — Borgo Po",ns:"Il parco sulla sponda est del Po — preferito dai corridori locali",nst:"Parco Michelotti corre lungo la sponda est del Po.",nt:"Gratis. Sempre aperto."},
  {id:25,n:"Piazza della Repubblica Morning Market — Centro Storico",a:"Centro Storico",v:["local","free","history"],d:25,s:"The daily morning market at Porta Palazzo\'s outer piazza — cheapest breakfast in Turin",st:"Before the main Porta Palazzo market opens, the outer edges of Piazza della Repubblica fill with fruit and vegetable sellers, espresso carts, and street food from 6am. The cheapest food in the city centre.",im:"Time-travel: this piazza as a Roman road intersection at the edge of Augusta Taurinorum, 100 AD",t:"Free. Arrives from 6am, peaks around 8–10am. Tue–Sat.",c:["local_only"],r:"g",nn:"Piazza della Repubblica mattina — Centro Storico",ns:"Il mercato mattutino quotidiano — la colazione più economica di Torino",nst:"Prima dell\'apertura del mercato principale, i bordi della piazza si riempiono di venditori.",nt:"Gratis. Dalle 6, meglio 8–10. Mar–Sab."},
  {id:26,n:"Piazza Castello — Centro Storico #26",a:"Centro Storico",v:["beautiful","history","architecture"],d:45,s:"Turin\'s grand baroque heart — Palazzo Reale, Palazzo Madama, and Teatro Regio all meet here",st:"The piazza is always open and free. Walk the arcaded porticoes that shelter you in any weather. Palazzo Madama straddles the gap between Roman gate and baroque palace — two thousand years of history in one building.",im:"Time-travel: the Savoy court processing from the Royal Palace to the theatre across this square, 1750",t:"Free always. Best in morning light before tour groups arrive.",c:["history_big"],r:"g",nn:"Piazza Castello — Centro Storico #26",ns:"Il cuore barocco di Torino — Palazzo Reale, Palazzo Madama e il Teatro Regio",nst:"La piazza è sempre aperta e gratuita. I portici arcuati ti proteggono in ogni stagione.",nt:"Sempre gratis. Meglio la mattina presto."},
  {id:27,n:"Porta Palazzo Market — Centro Storico #27",a:"Centro Storico",v:["local","free","weird"],d:12,s:"Europe\'s largest open-air market fills this sprawling piazza every morning — free to wander",st:"Every Tuesday–Saturday morning, Porta Palazzo becomes a city in motion: hundreds of vendors, immigrants from a dozen countries, mountains of vegetables and secondhand clothing. The energy is extraordinary.",im:"Time-travel: this piazza as the edge of medieval Turin, just outside the city gate, 1600",t:"Free to wander. Tue–Sat mornings. Arrive before 10am for the best atmosphere.",c:["high_spots"],r:"g",nn:"Mercato di Porta Palazzo — Centro Storico #27",ns:"Il più grande mercato all\'aperto d\'Europa riempie questa piazza ogni mattina",nst:"Ogni mattina Martedì–Sabato, Porta Palazzo diventa una città in movimento.",nt:"Gratis. Mar–Sab mattino. Arriva prima delle 10."},
  {id:28,n:"Galleria Subalpina — Centro Storico #28",a:"Centro Storico",v:["beautiful","architecture","quiet"],d:6,s:"A 19th-century glass-roofed arcade with bookshops, a chess café, and ornate ironwork",st:"The Galleria Subalpina connects Piazza Castello to Via Po. Antiquarian bookshops, a chess café, and the ornate 1874 ironwork make it a serene refuge from the city. Free to enter and browse.",im:"Time-travel: Turinese intellectuals meeting in the chess café under this glass roof, 1890",t:"Free. Open during arcade hours. The chess café at the far end is excellent.",c:["parks"],r:"g",nn:"Galleria Subalpina — Centro Storico #28",ns:"Un\'arcade con tetto in vetro del XIX secolo - librerie antiquarie, caffe degli scacchi",nst:"La Galleria Subalpina collega Piazza Castello a Via Po.",nt:"Gratis. Aperta durante gli orari dell\'arcade."},
  {id:29,n:"Parco del Valentino — San Salvario #29",a:"San Salvario",v:["nature","beautiful","local"],d:52,s:"Turin\'s riverside park along the Po — 500,000 m² of joggers, picnics, and herons",st:"Valentino is Turin\'s main park, running along the Po\'s west bank. Joggers, couples, students, and herons share the riverside. The 1880s Borgo Medievale replica castle is free to view from outside.",im:"Time-travel: the Savoy court using this park as a private hunting ground before the city expanded, 1800",t:"Free. Open always.",c:["courtyards"],r:"g",nn:"Parco del Valentino — San Salvario #29",ns:"Il parco lungo il Po di Torino — 500.000 m² di corridori, picnic ed aironi",nst:"Valentino è il parco principale di Torino, lungo la sponda ovest del Po.",nt:"Gratis. Sempre aperto."},
  {id:30,n:"Borgo Medievale — San Salvario #30",a:"San Salvario",v:["history","beautiful","architecture"],d:22,s:"A full-scale reproduction of a 15th-century Piedmontese village, built for the 1884 exhibition",st:"The Borgo Medievale sits inside Valentino Park. It is a faithful copy of a medieval hill village, built as a historical showcase. The exterior and courtyard are free to walk at any time.",im:"Time-travel: the 1884 Exhibition visitors marvelling at this reconstruction, seeing their own medieval past rebuilt, 1884",t:"Free outside. Interior has small entry fee.",c:["romantic_water"],r:"g",nn:"Borgo Medievale — San Salvario #30",ns:"Una riproduzione in scala reale di un borgo piemontese del XV secolo",nst:"Il Borgo Medievale si trova dentro il Parco del Valentino.",nt:"Gratis fuori. Interno con piccolo biglietto."},
  {id:31,n:"San Salvario Aperitivo — San Salvario #31",a:"San Salvario",v:["local","free","night"],d:20,s:"Turin\'s most vibrant aperitivo neighbourhood — free snacks with drinks, 18:30–20:00",st:"San Salvario around Via Baretti and Via Madama Cristina is packed with affordable bars offering free snacks with evening drinks. Turin invented the aperitivo — and it is still done best here.",im:"Time-travel: the student workers of FIAT stopping here on their way home from the factory, 1960",t:"Free snacks with any drink (around €5 buys you access to the buffet). Best 18:30–20:00.",c:["scary"],r:"g",nn:"San Salvario aperitivo — San Salvario #31",ns:"Il quartiere aperitivo più vivace di Torino — snack gratuiti con le bevande",nst:"Il San Salvario è pieno di bar a prezzi accessibili che offrono stuzzichini con i drinks.",nt:"Snack gratuiti con qualsiasi drink. Meglio 18:30–20:00."},
  {id:32,n:"Murazzi del Po — Vanchiglia #32",a:"Vanchiglia",v:["local","nature","beautiful"],d:19,s:"The Po riverbank below Vanchiglia — sun-bathing on flat stones, fishing, summer terraces",st:"The Murazzi is a long stretch of flat stone embankment along the Po\'s west bank. People sunbathe on the stones, fishermen cast lines, and in summer bar terraces spill to the water\'s edge. Free at all times.",im:"Time-travel: the old Po docks here, boats loading marble and grain for the Savoy factories, 1880",t:"Free always. Summer evenings are the best time.",c:["famous_dead"],r:"g",nn:"Murazzi del Po — Vanchiglia #32",ns:"La riva del Po sotto Vanchiglia — bagni di sole, pesca, terrazze estive",nst:"I Murazzi sono un lungo tratto di argine piano lungo la sponda ovest del Po.",nt:"Sempre gratis. Le serate estive sono il momento migliore."},
  {id:33,n:"Piazza Vittorio Veneto — Vanchiglia #33",a:"Vanchiglia",v:["beautiful","history","architecture"],d:13,s:"One of Europe\'s largest baroque piazzas, sloping toward the Po — and it\'s free to sit in",st:"The massive piazza slopes from the arcaded buildings down to the river. The view from the far end toward the Gran Madre church and the hills of Superga is among Turin\'s best.",im:"Time-travel: the Turin bourgeoisie promenading here on Sunday afternoons, the Alps visible on clear days, 1900",t:"Free always.",c:["street_art"],r:"g",nn:"Piazza Vittorio Veneto — Vanchiglia #33",ns:"Una delle più grandi piazze barocche d\'Europa, che scende verso il Po",nst:"La grande piazza scende dagli edifici porticati fino al fiume.",nt:"Sempre gratis."},
  {id:34,n:"Vanchiglia Street Art Walk — Vanchiglia #34",a:"Vanchiglia",v:["street_art","art","local"],d:52,s:"Turin\'s most concentrated street art neighbourhood — murals by Italian and international artists",st:"Walk Via Lombroso, Corso Brescia, and the backstreets of Vanchiglia for murals by Italian and international artists. All free, all outdoors. The Vanki Festival murals are particularly good.",im:"Time-travel: this as an industrial workers\' quarter before the art arrived, factories humming, 1970",t:"Free always.",c:["abandoned"],r:"g",nn:"Street art a Vanchiglia — Vanchiglia #34",ns:"Il quartiere di street art più concentrato di Torino",nst:"Passeggiata lungo Via Lombroso, Corso Brescia e i vicoli di Vanchiglia.",nt:"Sempre gratis."},
  {id:35,n:"Balon Flea Market — Aurora #35",a:"Aurora",v:["local","free","hidden"],d:11,s:"Every Saturday, Borgo Dora\'s streets become a sprawling flea market — antiques, vinyl, vintage",st:"The Balon fills Via Borgo Dora with antiques, records, vintage clothes, and street food every Saturday. The Gran Balon (second Sunday of each month) doubles in size. Both are free to browse.",im:"Time-travel: the Balon as Turin\'s main rag-and-bone market, the poor buying and selling to survive, 1920",t:"Free. Saturdays all day. Gran Balon: second Sunday of each month.",c:["free_museum"],r:"g",nn:"Balon — Aurora #35",ns:"Ogni sabato, le strade del Borgo Dora diventano un immenso mercatino delle pulci",nst:"Il Balon riempie Via Borgo Dora di antiquariato, dischi e vestiti vintage ogni sabato.",nt:"Gratis. Sabati tutto il giorno."},
  {id:36,n:"OGR Cultural Centre — Aurora #36",a:"Aurora",v:["art","local","architecture"],d:48,s:"The old railway workshops turned cultural hub — free outdoor events and markets in the vast courtyard",st:"The Officine Grandi Riparazioni (old FIAT railway workshops) host free cultural events, outdoor screenings, and markets in their vast brick courtyard. Check their programme — many events are free.",im:"Time-travel: the railway workshops full of mechanics repairing locomotives, the sound of metal on metal, 1910",t:"Courtyard free. Check programme for free events.",c:["local_only"],r:"g",nn:"OGR Torino — Aurora #36",ns:"Le vecchie officine ferroviarie diventate hub culturale",nst:"Le Officine Grandi Riparazioni ospitano eventi culturali gratuiti e mercati.",nt:"Cortile gratuito. Verifica programma eventi gratuiti."},
  {id:37,n:"Crocetta Market Hall — Crocetta #37",a:"Crocetta",v:["local","free","hidden"],d:52,s:"A covered daily market beloved by residents — excellent Piedmont cheeses, truffles in season",st:"The Mercato della Crocetta on Piazza Madama Cristina is a covered daily market. Excellent Piedmont cheeses, truffles in season, the cheapest espresso in the area at the bar inside. A genuine neighbourhood institution.",im:"Time-travel: Crocetta as the residential quarter of Turin\'s professional class — lawyers buying dinner here, 1950",t:"Free. Open Mon–Sat mornings and early afternoons.",c:["architecture"],r:"g",nn:"Mercato Crocetta — Crocetta #37",ns:"Un mercato coperto amato dai residenti — eccellenti formaggi piemontesi",nst:"Il Mercato della Crocetta è un mercato coperto quotidiano.",nt:"Gratis. Aperto Lun–Sab mattino."},
  {id:38,n:"Villa della Regina Terraces — Crocetta #38",a:"Crocetta",v:["beautiful","history","nature"],d:39,s:"The UNESCO terraced gardens of a 17th-century Savoy villa — panoramic view over the Po plain",st:"The terraced gardens of Villa della Regina are open on selected days. The view from the terraces over the Po plain and the Alps on clear days is extraordinary.",im:"Time-travel: the Savoy princes retreating to these terraces above the city dust in summer, 1720",t:"Check opening days (sporadic). Free entry when open.",c:["history_big"],r:"g",nn:"Villa della Regina — Crocetta #38",ns:"I giardini terrazzati UNESCO di una villa sabauda del XVII secolo",nst:"I giardini terrazzati della Villa della Regina sono aperti in giorni selezionati.",nt:"Verifica i giorni di apertura. Ingresso gratuito quando aperto."},
  {id:39,n:"Monte dei Cappuccini — Borgo Po #39",a:"Borgo Po",v:["beautiful","high_spots","history"],d:10,s:"A small hill rising from the Po — climb it for the best panorama in Turin",st:"Monte dei Cappuccini rises from the Po\'s east bank, topped by a 16th-century Capuchin church. From the summit: the whole city, the Po, Superga, and the Alps on clear days. Free to climb anytime.",im:"Time-travel: the Capuchin friars establishing their monastery on this hill, deliberately above the city, 1580",t:"Free. Walk up from the Gran Madre bridge. 10 minutes.",c:["high_spots"],r:"g",nn:"Monte dei Cappuccini — Borgo Po #39",ns:"Una piccola collina sul Po — salila per il miglior panorama di Torino",nst:"Il Monte dei Cappuccini si alza dalla sponda est del Po.",nt:"Gratis. Sale dalla Gran Madre. 10 minuti."},
  {id:40,n:"Via Po Porticoes — Borgo Po #40",a:"Borgo Po",v:["architecture","beautiful","local"],d:42,s:"Turin\'s 18 km of porticoes — walk Via Po from Piazza Castello to the river under cover",st:"Via Po\'s covered arcade runs from Piazza Castello to the river, lined with bookshops, antique dealers, and old-fashioned cafés. Turin\'s porticoes total 18 km — among Europe\'s longest. Free to walk.",im:"Time-travel: the Turin porticoes as revolutionary infrastructure — walking without getting wet or cold, 1750",t:"Free. Always open.",c:["parks"],r:"g",nn:"Portici di Via Po — Borgo Po #40",ns:"18 km di portici — percorri Via Po da Piazza Castello al fiume al coperto",nst:"I portici di Via Po corrono da Piazza Castello al fiume.",nt:"Gratis. Sempre aperto."},
  {id:41,n:"Gran Madre di Dio Church — Borgo Po #41",a:"Borgo Po",v:["architecture","beautiful","history"],d:32,s:"A Pantheon-inspired neoclassical church on the Po\'s east bank — climb the steps for the view",st:"The Gran Madre di Dio was built in 1831 to celebrate Napoleon\'s defeat. It sits at the end of the Vittorio Veneto axis. Climb the broad steps for a famous view back across the piazza.",im:"Time-travel: the citizenry celebrating the defeat of Napoleon by laying this church\'s foundation, 1818",t:"Free. Open daily. The steps alone are worth the visit.",c:["courtyards"],r:"g",nn:"Gran Madre di Dio — Borgo Po #41",ns:"Una chiesa neoclassica ispirata al Pantheon — sali i gradini per la vista",nst:"La Gran Madre di Dio fu costruita nel 1831 per celebrare la sconfitta di Napoleone.",nt:"Gratis. Aperta quotidianamente."},
  {id:42,n:"Moncalieri Castle Grounds — Moncalieri #42",a:"Moncalieri",v:["history","beautiful","hidden"],d:7,s:"A massive Savoy castle on the hill above Moncalieri — village and hillside paths free anytime",st:"The Castello di Moncalieri dominates the hill above the Po. Once a royal residence, the castle now has guided visits. The surrounding village streets and hillside paths are free to walk at any time.",im:"Time-travel: the Savoy court moving between Turin and Moncalieri with the seasons, 1750",t:"Free outside. Castle interior has guided visits (€8). Village free.",c:["romantic_water"],r:"g",nn:"Castello di Moncalieri — Moncalieri #42",ns:"Un imponente castello sabaudo sulla collina sopra Moncalieri",nst:"Il Castello di Moncalieri domina la collina sopra il Po.",nt:"Gratis fuori. Interno con visita guidata (8 €)."},
  {id:43,n:"Moncalieri Saturday Market — Moncalieri #43",a:"Moncalieri",v:["local","free","hidden"],d:6,s:"Every Saturday morning — a local market calmer and cheaper than Turin city markets, 15 min by bus",st:"The Saturday market fills Moncalieri\'s main piazza with fresh produce, cheese vendors, and local street food. Calmer and cheaper than the Turin city markets. Good for cheap Piedmont specialities.",im:"Time-travel: Moncalieri\'s farmers selling surplus to the castle servants every Saturday morning, 1800",t:"Free. Bus 67 from Turin centre. Saturdays only.",c:["scary"],r:"g",nn:"Mercato Moncalieri — Moncalieri #43",ns:"Ogni sabato mattina — un mercato più tranquillo e economico di quelli di Torino",nst:"Il mercato del sabato riempie la piazza principale di Moncalieri.",nt:"Gratis. Bus 67 da Torino. Solo sabati."},
  {id:44,n:"Stupinigi Palace Park — Stupinigi #44",a:"Stupinigi",v:["nature","history","beautiful"],d:10,s:"A UNESCO World Heritage Savoy residence with an enormous baroque park and deer",st:"The Palazzina di Caccia di Stupinigi is one of the most beautiful buildings in Italy. Entry to the main palace costs €12, but the outer park and approach avenues are free to walk at any time. Deer roam the forests.",im:"Time-travel: the Savoy king setting out from this palace at dawn for a day\'s hunting in the royal forest, 1720",t:"Park free. Palace entry €12. Deer visible in the forested avenues.",c:["famous_dead"],r:"g",nn:"Parco della Palazzina di Stupinigi — Stupinigi #44",ns:"Una residenza sabauda Patrimonio UNESCO con un immenso parco barocco e cervi",nst:"La Palazzina di Caccia di Stupinigi è uno degli edifici più belli d\'Italia.",nt:"Parco gratis. Palazzo 12 €."},
  {id:45,n:"Stupinigi Deer Forest Walk — Stupinigi #45",a:"Stupinigi",v:["nature","local","hidden"],d:18,s:"Morning walks in the nature reserve where hundreds of deer roam the beech avenues",st:"The forested reserve around the Stupinigi palace is home to hundreds of free-roaming deer. Morning and evening walks through the beech avenues are free; deer are often visible from the paths.",im:"Time-travel: the royal hunting parties harvesting deer from these woods for the court banquets, 1760",t:"Free. Enter from the park approach avenues. Best at dawn and dusk.",c:["street_art"],r:"g",nn:"Riserva di Stupinigi — Stupinigi #45",ns:"Passeggiate mattutine nella riserva dove centinaia di cervi vagano per i viali",nst:"La riserva forestale attorno alla palazzina ospita centinaia di cervi liberi.",nt:"Gratis. Alba e tramonto sono i momenti migliori."},
  {id:46,n:"Quadrilatero Romano Walk — Centro Storico #46",a:"Centro Storico",v:["history","architecture","local"],d:19,s:"Turin\'s oldest quarter follows the Roman grid — walk Via Garibaldi, Europe\'s longest pedestrian street",st:"The Quadrilatero Romano follows the Roman street plan. Walk Via Garibaldi (pedestrian for 1.2 km), Via della Basilica (covered market), and the medieval Torre dei due Frati. All free.",im:"Time-travel: the Roman colony of Augusta Taurinorum laid out in this exact grid, 28 BC",t:"Free always.",c:["abandoned"],r:"g",nn:"Quadrilatero Romano — Centro Storico #46",ns:"Il quartiere più antico di Torino segue la griglia romana",nst:"Il Quadrilatero Romano segue il piano stradale romano.",nt:"Sempre gratis."},
  {id:47,n:"Piazza San Carlo — Centro Storico #47",a:"Centro Storico",v:["beautiful","architecture","history"],d:37,s:"Called Turin\'s drawing room — twin baroque churches, equestrian statue, and free steps to sit on",st:"Piazza San Carlo is flanked by two identical baroque churches and centred on the bronze equestrian statue of Emanuele Filiberto. The cafés under the porticoes are expensive, but sitting on the steps costs nothing.",im:"Time-travel: the Spanish gallop infantry drilling on this piazza when it was a military parade ground, 1650",t:"Free. Always open.",c:["free_museum"],r:"g",nn:"Piazza San Carlo — Centro Storico #47",ns:"Il salotto di Torino — due chiese barocche gemelle, statua equestre, gradini gratis",nst:"Piazza San Carlo è affiancata da due chiese barocche identiche.",nt:"Gratis. Sempre aperta."},
  {id:48,n:"Superga Hilltop Walk — Borgo Po #48",a:"Borgo Po",v:["nature","high_spots","history"],d:43,s:"Take the historic rack tram up to Superga at 670 m — sweeping Alps panorama, free esplanade",st:"The historic GTT rack tram climbs to the Basilica di Superga at 670 m (or walk 1 hour through woodland). At the top: sweeping Alps panorama and the royal crypt. Free access to the esplanade.",im:"Time-travel: the same rack tram carrying Turin Sunday families up for the fresh air, 1905",t:"Rack tram uses a standard city ticket. Walk from Sassi takes 1 hour. Esplanade free.",c:["local_only"],r:"g",nn:"Superga — Borgo Po #48",ns:"Prendi il tram a cremagliera storico fino a Superga a 670 m",nst:"Il tram a cremagliera GTT sale alla Basilica di Superga a 670 m.",nt:"Tram con biglietto ordinario. A piedi da Sassi 1 ora. Spianata gratuita."},
  {id:49,n:"Parco Michelotti — Borgo Po #49",a:"Borgo Po",v:["nature","local","quiet"],d:6,s:"The quieter east-bank Po park — preferred by local joggers and cyclists, far from tourist trail",st:"Parco Michelotti runs along the Po\'s east bank, quieter than Valentino. Preferred by local joggers and dog walkers. The towpath continues for kilometres. Almost no tourists.",im:"Time-travel: the east bank as working docks and textile factories before the park was made, 1920",t:"Free. Open always.",c:["architecture"],r:"g",nn:"Parco Michelotti — Borgo Po #49",ns:"Il parco sulla sponda est del Po — preferito dai corridori locali",nst:"Parco Michelotti corre lungo la sponda est del Po.",nt:"Gratis. Sempre aperto."},
  {id:50,n:"Piazza della Repubblica Morning Market — Centro Storico #50",a:"Centro Storico",v:["local","free","history"],d:40,s:"The daily morning market at Porta Palazzo\'s outer piazza — cheapest breakfast in Turin",st:"Before the main Porta Palazzo market opens, the outer edges of Piazza della Repubblica fill with fruit and vegetable sellers, espresso carts, and street food from 6am. The cheapest food in the city centre.",im:"Time-travel: this piazza as a Roman road intersection at the edge of Augusta Taurinorum, 100 AD",t:"Free. Arrives from 6am, peaks around 8–10am. Tue–Sat.",c:["history_big"],r:"g",nn:"Piazza della Repubblica mattina — Centro Storico #50",ns:"Il mercato mattutino quotidiano — la colazione più economica di Torino",nst:"Prima dell\'apertura del mercato principale, i bordi della piazza si riempiono di venditori.",nt:"Gratis. Dalle 6, meglio 8–10. Mar–Sab."},
  {id:51,n:"Piazza Castello — Centro Storico #51",a:"Centro Storico",v:["beautiful","history","architecture"],d:17,s:"Turin\'s grand baroque heart — Palazzo Reale, Palazzo Madama, and Teatro Regio all meet here",st:"The piazza is always open and free. Walk the arcaded porticoes that shelter you in any weather. Palazzo Madama straddles the gap between Roman gate and baroque palace — two thousand years of history in one building.",im:"Time-travel: the Savoy court processing from the Royal Palace to the theatre across this square, 1750",t:"Free always. Best in morning light before tour groups arrive.",c:["high_spots"],r:"g",nn:"Piazza Castello — Centro Storico #51",ns:"Il cuore barocco di Torino — Palazzo Reale, Palazzo Madama e il Teatro Regio",nst:"La piazza è sempre aperta e gratuita. I portici arcuati ti proteggono in ogni stagione.",nt:"Sempre gratis. Meglio la mattina presto."},

  {id:57,n:"Murazzi del Po — Vanchiglia #57",a:"Vanchiglia",v:["local","nature","beautiful"],d:19,s:"The Po riverbank below Vanchiglia — sun-bathing on flat stones, fishing, summer terraces",st:"The Murazzi is a long stretch of flat stone embankment along the Po\'s west bank. People sunbathe on the stones, fishermen cast lines, and in summer bar terraces spill to the water\'s edge. Free at all times.",im:"Time-travel: the old Po docks here, boats loading marble and grain for the Savoy factories, 1880",t:"Free always. Summer evenings are the best time.",c:["street_art"],r:"g",nn:"Murazzi del Po — Vanchiglia #57",ns:"La riva del Po sotto Vanchiglia — bagni di sole, pesca, terrazze estive",nst:"I Murazzi sono un lungo tratto di argine piano lungo la sponda ovest del Po.",nt:"Sempre gratis. Le serate estive sono il momento migliore."},
  {id:58,n:"Piazza Vittorio Veneto — Vanchiglia #58",a:"Vanchiglia",v:["beautiful","history","architecture"],d:33,s:"One of Europe\'s largest baroque piazzas, sloping toward the Po — and it\'s free to sit in",st:"The massive piazza slopes from the arcaded buildings down to the river. The view from the far end toward the Gran Madre church and the hills of Superga is among Turin\'s best.",im:"Time-travel: the Turin bourgeoisie promenading here on Sunday afternoons, the Alps visible on clear days, 1900",t:"Free always.",c:["abandoned"],r:"g",nn:"Piazza Vittorio Veneto — Vanchiglia #58",ns:"Una delle più grandi piazze barocche d\'Europa, che scende verso il Po",nst:"La grande piazza scende dagli edifici porticati fino al fiume.",nt:"Sempre gratis."},
  {id:59,n:"Vanchiglia Street Art Walk — Vanchiglia #59",a:"Vanchiglia",v:["street_art","art","local"],d:42,s:"Turin\'s most concentrated street art neighbourhood — murals by Italian and international artists",st:"Walk Via Lombroso, Corso Brescia, and the backstreets of Vanchiglia for murals by Italian and international artists. All free, all outdoors. The Vanki Festival murals are particularly good.",im:"Time-travel: this as an industrial workers\' quarter before the art arrived, factories humming, 1970",t:"Free always.",c:["free_museum"],r:"g",nn:"Street art a Vanchiglia — Vanchiglia #59",ns:"Il quartiere di street art più concentrato di Torino",nst:"Passeggiata lungo Via Lombroso, Corso Brescia e i vicoli di Vanchiglia.",nt:"Sempre gratis."},
  {id:60,n:"Balon Flea Market — Aurora #60",a:"Aurora",v:["local","free","hidden"],d:22,s:"Every Saturday, Borgo Dora\'s streets become a sprawling flea market — antiques, vinyl, vintage",st:"The Balon fills Via Borgo Dora with antiques, records, vintage clothes, and street food every Saturday. The Gran Balon (second Sunday of each month) doubles in size. Both are free to browse.",im:"Time-travel: the Balon as Turin\'s main rag-and-bone market, the poor buying and selling to survive, 1920",t:"Free. Saturdays all day. Gran Balon: second Sunday of each month.",c:["local_only"],r:"g",nn:"Balon — Aurora #60",ns:"Ogni sabato, le strade del Borgo Dora diventano un immenso mercatino delle pulci",nst:"Il Balon riempie Via Borgo Dora di antiquariato, dischi e vestiti vintage ogni sabato.",nt:"Gratis. Sabati tutto il giorno."},
  {id:61,n:"OGR Cultural Centre — Aurora #61",a:"Aurora",v:["art","local","architecture"],d:5,s:"The old railway workshops turned cultural hub — free outdoor events and markets in the vast courtyard",st:"The Officine Grandi Riparazioni (old FIAT railway workshops) host free cultural events, outdoor screenings, and markets in their vast brick courtyard. Check their programme — many events are free.",im:"Time-travel: the railway workshops full of mechanics repairing locomotives, the sound of metal on metal, 1910",t:"Courtyard free. Check programme for free events.",c:["architecture"],r:"g",nn:"OGR Torino — Aurora #61",ns:"Le vecchie officine ferroviarie diventate hub culturale",nst:"Le Officine Grandi Riparazioni ospitano eventi culturali gratuiti e mercati.",nt:"Cortile gratuito. Verifica programma eventi gratuiti."},
  {id:62,n:"Crocetta Market Hall — Crocetta #62",a:"Crocetta",v:["local","free","hidden"],d:53,s:"A covered daily market beloved by residents — excellent Piedmont cheeses, truffles in season",st:"The Mercato della Crocetta on Piazza Madama Cristina is a covered daily market. Excellent Piedmont cheeses, truffles in season, the cheapest espresso in the area at the bar inside. A genuine neighbourhood institution.",im:"Time-travel: Crocetta as the residential quarter of Turin\'s professional class — lawyers buying dinner here, 1950",t:"Free. Open Mon–Sat mornings and early afternoons.",c:["history_big"],r:"g",nn:"Mercato Crocetta — Crocetta #62",ns:"Un mercato coperto amato dai residenti — eccellenti formaggi piemontesi",nst:"Il Mercato della Crocetta è un mercato coperto quotidiano.",nt:"Gratis. Aperto Lun–Sab mattino."},
  {id:63,n:"Villa della Regina Terraces — Crocetta #63",a:"Crocetta",v:["beautiful","history","nature"],d:15,s:"The UNESCO terraced gardens of a 17th-century Savoy villa — panoramic view over the Po plain",st:"The terraced gardens of Villa della Regina are open on selected days. The view from the terraces over the Po plain and the Alps on clear days is extraordinary.",im:"Time-travel: the Savoy princes retreating to these terraces above the city dust in summer, 1720",t:"Check opening days (sporadic). Free entry when open.",c:["high_spots"],r:"g",nn:"Villa della Regina — Crocetta #63",ns:"I giardini terrazzati UNESCO di una villa sabauda del XVII secolo",nst:"I giardini terrazzati della Villa della Regina sono aperti in giorni selezionati.",nt:"Verifica i giorni di apertura. Ingresso gratuito quando aperto."},
  {id:64,n:"Monte dei Cappuccini — Borgo Po #64",a:"Borgo Po",v:["beautiful","high_spots","history"],d:49,s:"A small hill rising from the Po — climb it for the best panorama in Turin",st:"Monte dei Cappuccini rises from the Po\'s east bank, topped by a 16th-century Capuchin church. From the summit: the whole city, the Po, Superga, and the Alps on clear days. Free to climb anytime.",im:"Time-travel: the Capuchin friars establishing their monastery on this hill, deliberately above the city, 1580",t:"Free. Walk up from the Gran Madre bridge. 10 minutes.",c:["parks"],r:"g",nn:"Monte dei Cappuccini — Borgo Po #64",ns:"Una piccola collina sul Po — salila per il miglior panorama di Torino",nst:"Il Monte dei Cappuccini si alza dalla sponda est del Po.",nt:"Gratis. Sale dalla Gran Madre. 10 minuti."},
  {id:65,n:"Via Po Porticoes — Borgo Po #65",a:"Borgo Po",v:["architecture","beautiful","local"],d:32,s:"Turin\'s 18 km of porticoes — walk Via Po from Piazza Castello to the river under cover",st:"Via Po\'s covered arcade runs from Piazza Castello to the river, lined with bookshops, antique dealers, and old-fashioned cafés. Turin\'s porticoes total 18 km — among Europe\'s longest. Free to walk.",im:"Time-travel: the Turin porticoes as revolutionary infrastructure — walking without getting wet or cold, 1750",t:"Free. Always open.",c:["courtyards"],r:"g",nn:"Portici di Via Po — Borgo Po #65",ns:"18 km di portici — percorri Via Po da Piazza Castello al fiume al coperto",nst:"I portici di Via Po corrono da Piazza Castello al fiume.",nt:"Gratis. Sempre aperto."},
  {id:66,n:"Gran Madre di Dio Church — Borgo Po #66",a:"Borgo Po",v:["architecture","beautiful","history"],d:26,s:"A Pantheon-inspired neoclassical church on the Po\'s east bank — climb the steps for the view",st:"The Gran Madre di Dio was built in 1831 to celebrate Napoleon\'s defeat. It sits at the end of the Vittorio Veneto axis. Climb the broad steps for a famous view back across the piazza.",im:"Time-travel: the citizenry celebrating the defeat of Napoleon by laying this church\'s foundation, 1818",t:"Free. Open daily. The steps alone are worth the visit.",c:["romantic_water"],r:"g",nn:"Gran Madre di Dio — Borgo Po #66",ns:"Una chiesa neoclassica ispirata al Pantheon — sali i gradini per la vista",nst:"La Gran Madre di Dio fu costruita nel 1831 per celebrare la sconfitta di Napoleone.",nt:"Gratis. Aperta quotidianamente."},
  {id:67,n:"Moncalieri Castle Grounds — Moncalieri #67",a:"Moncalieri",v:["history","beautiful","hidden"],d:22,s:"A massive Savoy castle on the hill above Moncalieri — village and hillside paths free anytime",st:"The Castello di Moncalieri dominates the hill above the Po. Once a royal residence, the castle now has guided visits. The surrounding village streets and hillside paths are free to walk at any time.",im:"Time-travel: the Savoy court moving between Turin and Moncalieri with the seasons, 1750",t:"Free outside. Castle interior has guided visits (€8). Village free.",c:["scary"],r:"g",nn:"Castello di Moncalieri — Moncalieri #67",ns:"Un imponente castello sabaudo sulla collina sopra Moncalieri",nst:"Il Castello di Moncalieri domina la collina sopra il Po.",nt:"Gratis fuori. Interno con visita guidata (8 €)."},
  {id:68,n:"Moncalieri Saturday Market — Moncalieri #68",a:"Moncalieri",v:["local","free","hidden"],d:14,s:"Every Saturday morning — a local market calmer and cheaper than Turin city markets, 15 min by bus",st:"The Saturday market fills Moncalieri\'s main piazza with fresh produce, cheese vendors, and local street food. Calmer and cheaper than the Turin city markets. Good for cheap Piedmont specialities.",im:"Time-travel: Moncalieri\'s farmers selling surplus to the castle servants every Saturday morning, 1800",t:"Free. Bus 67 from Turin centre. Saturdays only.",c:["famous_dead"],r:"g",nn:"Mercato Moncalieri — Moncalieri #68",ns:"Ogni sabato mattina — un mercato più tranquillo e economico di quelli di Torino",nst:"Il mercato del sabato riempie la piazza principale di Moncalieri.",nt:"Gratis. Bus 67 da Torino. Solo sabati."},
  {id:69,n:"Stupinigi Palace Park — Stupinigi #69",a:"Stupinigi",v:["nature","history","beautiful"],d:18,s:"A UNESCO World Heritage Savoy residence with an enormous baroque park and deer",st:"The Palazzina di Caccia di Stupinigi is one of the most beautiful buildings in Italy. Entry to the main palace costs €12, but the outer park and approach avenues are free to walk at any time. Deer roam the forests.",im:"Time-travel: the Savoy king setting out from this palace at dawn for a day\'s hunting in the royal forest, 1720",t:"Park free. Palace entry €12. Deer visible in the forested avenues.",c:["street_art"],r:"g",nn:"Parco della Palazzina di Stupinigi — Stupinigi #69",ns:"Una residenza sabauda Patrimonio UNESCO con un immenso parco barocco e cervi",nst:"La Palazzina di Caccia di Stupinigi è uno degli edifici più belli d\'Italia.",nt:"Parco gratis. Palazzo 12 €."},
  {id:70,n:"Stupinigi Deer Forest Walk — Stupinigi #70",a:"Stupinigi",v:["nature","local","hidden"],d:53,s:"Morning walks in the nature reserve where hundreds of deer roam the beech avenues",st:"The forested reserve around the Stupinigi palace is home to hundreds of free-roaming deer. Morning and evening walks through the beech avenues are free; deer are often visible from the paths.",im:"Time-travel: the royal hunting parties harvesting deer from these woods for the court banquets, 1760",t:"Free. Enter from the park approach avenues. Best at dawn and dusk.",c:["abandoned"],r:"g",nn:"Riserva di Stupinigi — Stupinigi #70",ns:"Passeggiate mattutine nella riserva dove centinaia di cervi vagano per i viali",nst:"La riserva forestale attorno alla palazzina ospita centinaia di cervi liberi.",nt:"Gratis. Alba e tramonto sono i momenti migliori."},
  {id:71,n:"Quadrilatero Romano Walk — Centro Storico #71",a:"Centro Storico",v:["history","architecture","local"],d:26,s:"Turin\'s oldest quarter follows the Roman grid — walk Via Garibaldi, Europe\'s longest pedestrian street",st:"The Quadrilatero Romano follows the Roman street plan. Walk Via Garibaldi (pedestrian for 1.2 km), Via della Basilica (covered market), and the medieval Torre dei due Frati. All free.",im:"Time-travel: the Roman colony of Augusta Taurinorum laid out in this exact grid, 28 BC",t:"Free always.",c:["free_museum"],r:"g",nn:"Quadrilatero Romano — Centro Storico #71",ns:"Il quartiere più antico di Torino segue la griglia romana",nst:"Il Quadrilatero Romano segue il piano stradale romano.",nt:"Sempre gratis."},
  {id:72,n:"Piazza San Carlo — Centro Storico #72",a:"Centro Storico",v:["beautiful","architecture","history"],d:11,s:"Called Turin\'s drawing room — twin baroque churches, equestrian statue, and free steps to sit on",st:"Piazza San Carlo is flanked by two identical baroque churches and centred on the bronze equestrian statue of Emanuele Filiberto. The cafés under the porticoes are expensive, but sitting on the steps costs nothing.",im:"Time-travel: the Spanish gallop infantry drilling on this piazza when it was a military parade ground, 1650",t:"Free. Always open.",c:["local_only"],r:"g",nn:"Piazza San Carlo — Centro Storico #72",ns:"Il salotto di Torino — due chiese barocche gemelle, statua equestre, gradini gratis",nst:"Piazza San Carlo è affiancata da due chiese barocche identiche.",nt:"Gratis. Sempre aperta."},
  {id:73,n:"Superga Hilltop Walk — Borgo Po #73",a:"Borgo Po",v:["nature","high_spots","history"],d:10,s:"Take the historic rack tram up to Superga at 670 m — sweeping Alps panorama, free esplanade",st:"The historic GTT rack tram climbs to the Basilica di Superga at 670 m (or walk 1 hour through woodland). At the top: sweeping Alps panorama and the royal crypt. Free access to the esplanade.",im:"Time-travel: the same rack tram carrying Turin Sunday families up for the fresh air, 1905",t:"Rack tram uses a standard city ticket. Walk from Sassi takes 1 hour. Esplanade free.",c:["architecture"],r:"g",nn:"Superga — Borgo Po #73",ns:"Prendi il tram a cremagliera storico fino a Superga a 670 m",nst:"Il tram a cremagliera GTT sale alla Basilica di Superga a 670 m.",nt:"Tram con biglietto ordinario. A piedi da Sassi 1 ora. Spianata gratuita."},
  {id:74,n:"Parco Michelotti — Borgo Po #74",a:"Borgo Po",v:["nature","local","quiet"],d:29,s:"The quieter east-bank Po park — preferred by local joggers and cyclists, far from tourist trail",st:"Parco Michelotti runs along the Po\'s east bank, quieter than Valentino. Preferred by local joggers and dog walkers. The towpath continues for kilometres. Almost no tourists.",im:"Time-travel: the east bank as working docks and textile factories before the park was made, 1920",t:"Free. Open always.",c:["history_big"],r:"g",nn:"Parco Michelotti — Borgo Po #74",ns:"Il parco sulla sponda est del Po — preferito dai corridori locali",nst:"Parco Michelotti corre lungo la sponda est del Po.",nt:"Gratis. Sempre aperto."},
  {id:75,n:"Piazza della Repubblica Morning Market — Centro Storico #75",a:"Centro Storico",v:["local","free","history"],d:11,s:"The daily morning market at Porta Palazzo\'s outer piazza — cheapest breakfast in Turin",st:"Before the main Porta Palazzo market opens, the outer edges of Piazza della Repubblica fill with fruit and vegetable sellers, espresso carts, and street food from 6am. The cheapest food in the city centre.",im:"Time-travel: this piazza as a Roman road intersection at the edge of Augusta Taurinorum, 100 AD",t:"Free. Arrives from 6am, peaks around 8–10am. Tue–Sat.",c:["high_spots"],r:"g",nn:"Piazza della Repubblica mattina — Centro Storico #75",ns:"Il mercato mattutino quotidiano — la colazione più economica di Torino",nst:"Prima dell\'apertura del mercato principale, i bordi della piazza si riempiono di venditori.",nt:"Gratis. Dalle 6, meglio 8–10. Mar–Sab."},
  {id:76,n:"Piazza Castello — Centro Storico #76",a:"Centro Storico",v:["beautiful","history","architecture"],d:27,s:"Turin\'s grand baroque heart — Palazzo Reale, Palazzo Madama, and Teatro Regio all meet here",st:"The piazza is always open and free. Walk the arcaded porticoes that shelter you in any weather. Palazzo Madama straddles the gap between Roman gate and baroque palace — two thousand years of history in one building.",im:"Time-travel: the Savoy court processing from the Royal Palace to the theatre across this square, 1750",t:"Free always. Best in morning light before tour groups arrive.",c:["parks"],r:"g",nn:"Piazza Castello — Centro Storico #76",ns:"Il cuore barocco di Torino — Palazzo Reale, Palazzo Madama e il Teatro Regio",nst:"La piazza è sempre aperta e gratuita. I portici arcuati ti proteggono in ogni stagione.",nt:"Sempre gratis. Meglio la mattina presto."},
  {id:77,n:"Porta Palazzo Market — Centro Storico #77",a:"Centro Storico",v:["local","free","weird"],d:27,s:"Europe\'s largest open-air market fills this sprawling piazza every morning — free to wander",st:"Every Tuesday–Saturday morning, Porta Palazzo becomes a city in motion: hundreds of vendors, immigrants from a dozen countries, mountains of vegetables and secondhand clothing. The energy is extraordinary.",im:"Time-travel: this piazza as the edge of medieval Turin, just outside the city gate, 1600",t:"Free to wander. Tue–Sat mornings. Arrive before 10am for the best atmosphere.",c:["courtyards"],r:"g",nn:"Mercato di Porta Palazzo — Centro Storico #77",ns:"Il più grande mercato all\'aperto d\'Europa riempie questa piazza ogni mattina",nst:"Ogni mattina Martedì–Sabato, Porta Palazzo diventa una città in movimento.",nt:"Gratis. Mar–Sab mattino. Arriva prima delle 10."},
  {id:78,n:"Galleria Subalpina — Centro Storico #78",a:"Centro Storico",v:["beautiful","architecture","quiet"],d:43,s:"A 19th-century glass-roofed arcade with bookshops, a chess café, and ornate ironwork",st:"The Galleria Subalpina connects Piazza Castello to Via Po. Antiquarian bookshops, a chess café, and the ornate 1874 ironwork make it a serene refuge from the city. Free to enter and browse.",im:"Time-travel: Turinese intellectuals meeting in the chess café under this glass roof, 1890",t:"Free. Open during arcade hours. The chess café at the far end is excellent.",c:["romantic_water"],r:"g",nn:"Galleria Subalpina — Centro Storico #78",ns:"Un\'arcade con tetto in vetro del XIX secolo - librerie antiquarie, caffe degli scacchi",nst:"La Galleria Subalpina collega Piazza Castello a Via Po.",nt:"Gratis. Aperta durante gli orari dell\'arcade."},
  {id:79,n:"Parco del Valentino — San Salvario #79",a:"San Salvario",v:["nature","beautiful","local"],d:21,s:"Turin\'s riverside park along the Po — 500,000 m² of joggers, picnics, and herons",st:"Valentino is Turin\'s main park, running along the Po\'s west bank. Joggers, couples, students, and herons share the riverside. The 1880s Borgo Medievale replica castle is free to view from outside.",im:"Time-travel: the Savoy court using this park as a private hunting ground before the city expanded, 1800",t:"Free. Open always.",c:["scary"],r:"g",nn:"Parco del Valentino — San Salvario #79",ns:"Il parco lungo il Po di Torino — 500.000 m² di corridori, picnic ed aironi",nst:"Valentino è il parco principale di Torino, lungo la sponda ovest del Po.",nt:"Gratis. Sempre aperto."},
  {id:80,n:"Borgo Medievale — San Salvario #80",a:"San Salvario",v:["history","beautiful","architecture"],d:7,s:"A full-scale reproduction of a 15th-century Piedmontese village, built for the 1884 exhibition",st:"The Borgo Medievale sits inside Valentino Park. It is a faithful copy of a medieval hill village, built as a historical showcase. The exterior and courtyard are free to walk at any time.",im:"Time-travel: the 1884 Exhibition visitors marvelling at this reconstruction, seeing their own medieval past rebuilt, 1884",t:"Free outside. Interior has small entry fee.",c:["famous_dead"],r:"g",nn:"Borgo Medievale — San Salvario #80",ns:"Una riproduzione in scala reale di un borgo piemontese del XV secolo",nst:"Il Borgo Medievale si trova dentro il Parco del Valentino.",nt:"Gratis fuori. Interno con piccolo biglietto."},
  {id:81,n:"San Salvario Aperitivo — San Salvario #81",a:"San Salvario",v:["local","free","night"],d:51,s:"Turin\'s most vibrant aperitivo neighbourhood — free snacks with drinks, 18:30–20:00",st:"San Salvario around Via Baretti and Via Madama Cristina is packed with affordable bars offering free snacks with evening drinks. Turin invented the aperitivo — and it is still done best here.",im:"Time-travel: the student workers of FIAT stopping here on their way home from the factory, 1960",t:"Free snacks with any drink (around €5 buys you access to the buffet). Best 18:30–20:00.",c:["street_art"],r:"g",nn:"San Salvario aperitivo — San Salvario #81",ns:"Il quartiere aperitivo più vivace di Torino — snack gratuiti con le bevande",nst:"Il San Salvario è pieno di bar a prezzi accessibili che offrono stuzzichini con i drinks.",nt:"Snack gratuiti con qualsiasi drink. Meglio 18:30–20:00."},

  {id:87,n:"Crocetta Market Hall — Crocetta #87",a:"Crocetta",v:["local","free","hidden"],d:40,s:"A covered daily market beloved by residents — excellent Piedmont cheeses, truffles in season",st:"The Mercato della Crocetta on Piazza Madama Cristina is a covered daily market. Excellent Piedmont cheeses, truffles in season, the cheapest espresso in the area at the bar inside. A genuine neighbourhood institution.",im:"Time-travel: Crocetta as the residential quarter of Turin\'s professional class — lawyers buying dinner here, 1950",t:"Free. Open Mon–Sat mornings and early afternoons.",c:["high_spots"],r:"g",nn:"Mercato Crocetta — Crocetta #87",ns:"Un mercato coperto amato dai residenti — eccellenti formaggi piemontesi",nst:"Il Mercato della Crocetta è un mercato coperto quotidiano.",nt:"Gratis. Aperto Lun–Sab mattino."},
  {id:88,n:"Villa della Regina Terraces — Crocetta #88",a:"Crocetta",v:["beautiful","history","nature"],d:23,s:"The UNESCO terraced gardens of a 17th-century Savoy villa — panoramic view over the Po plain",st:"The terraced gardens of Villa della Regina are open on selected days. The view from the terraces over the Po plain and the Alps on clear days is extraordinary.",im:"Time-travel: the Savoy princes retreating to these terraces above the city dust in summer, 1720",t:"Check opening days (sporadic). Free entry when open.",c:["parks"],r:"g",nn:"Villa della Regina — Crocetta #88",ns:"I giardini terrazzati UNESCO di una villa sabauda del XVII secolo",nst:"I giardini terrazzati della Villa della Regina sono aperti in giorni selezionati.",nt:"Verifica i giorni di apertura. Ingresso gratuito quando aperto."},
  {id:89,n:"Monte dei Cappuccini — Borgo Po #89",a:"Borgo Po",v:["beautiful","high_spots","history"],d:45,s:"A small hill rising from the Po — climb it for the best panorama in Turin",st:"Monte dei Cappuccini rises from the Po\'s east bank, topped by a 16th-century Capuchin church. From the summit: the whole city, the Po, Superga, and the Alps on clear days. Free to climb anytime.",im:"Time-travel: the Capuchin friars establishing their monastery on this hill, deliberately above the city, 1580",t:"Free. Walk up from the Gran Madre bridge. 10 minutes.",c:["courtyards"],r:"g",nn:"Monte dei Cappuccini — Borgo Po #89",ns:"Una piccola collina sul Po — salila per il miglior panorama di Torino",nst:"Il Monte dei Cappuccini si alza dalla sponda est del Po.",nt:"Gratis. Sale dalla Gran Madre. 10 minuti."},
  {id:90,n:"Via Po Porticoes — Borgo Po #90",a:"Borgo Po",v:["architecture","beautiful","local"],d:44,s:"Turin\'s 18 km of porticoes — walk Via Po from Piazza Castello to the river under cover",st:"Via Po\'s covered arcade runs from Piazza Castello to the river, lined with bookshops, antique dealers, and old-fashioned cafés. Turin\'s porticoes total 18 km — among Europe\'s longest. Free to walk.",im:"Time-travel: the Turin porticoes as revolutionary infrastructure — walking without getting wet or cold, 1750",t:"Free. Always open.",c:["romantic_water"],r:"g",nn:"Portici di Via Po — Borgo Po #90",ns:"18 km di portici — percorri Via Po da Piazza Castello al fiume al coperto",nst:"I portici di Via Po corrono da Piazza Castello al fiume.",nt:"Gratis. Sempre aperto."},
  {id:91,n:"Gran Madre di Dio Church — Borgo Po #91",a:"Borgo Po",v:["architecture","beautiful","history"],d:28,s:"A Pantheon-inspired neoclassical church on the Po\'s east bank — climb the steps for the view",st:"The Gran Madre di Dio was built in 1831 to celebrate Napoleon\'s defeat. It sits at the end of the Vittorio Veneto axis. Climb the broad steps for a famous view back across the piazza.",im:"Time-travel: the citizenry celebrating the defeat of Napoleon by laying this church\'s foundation, 1818",t:"Free. Open daily. The steps alone are worth the visit.",c:["scary"],r:"g",nn:"Gran Madre di Dio — Borgo Po #91",ns:"Una chiesa neoclassica ispirata al Pantheon — sali i gradini per la vista",nst:"La Gran Madre di Dio fu costruita nel 1831 per celebrare la sconfitta di Napoleone.",nt:"Gratis. Aperta quotidianamente."},
  {id:92,n:"Moncalieri Castle Grounds — Moncalieri #92",a:"Moncalieri",v:["history","beautiful","hidden"],d:41,s:"A massive Savoy castle on the hill above Moncalieri — village and hillside paths free anytime",st:"The Castello di Moncalieri dominates the hill above the Po. Once a royal residence, the castle now has guided visits. The surrounding village streets and hillside paths are free to walk at any time.",im:"Time-travel: the Savoy court moving between Turin and Moncalieri with the seasons, 1750",t:"Free outside. Castle interior has guided visits (€8). Village free.",c:["famous_dead"],r:"g",nn:"Castello di Moncalieri — Moncalieri #92",ns:"Un imponente castello sabaudo sulla collina sopra Moncalieri",nst:"Il Castello di Moncalieri domina la collina sopra il Po.",nt:"Gratis fuori. Interno con visita guidata (8 €)."},
  {id:93,n:"Moncalieri Saturday Market — Moncalieri #93",a:"Moncalieri",v:["local","free","hidden"],d:17,s:"Every Saturday morning — a local market calmer and cheaper than Turin city markets, 15 min by bus",st:"The Saturday market fills Moncalieri\'s main piazza with fresh produce, cheese vendors, and local street food. Calmer and cheaper than the Turin city markets. Good for cheap Piedmont specialities.",im:"Time-travel: Moncalieri\'s farmers selling surplus to the castle servants every Saturday morning, 1800",t:"Free. Bus 67 from Turin centre. Saturdays only.",c:["street_art"],r:"g",nn:"Mercato Moncalieri — Moncalieri #93",ns:"Ogni sabato mattina — un mercato più tranquillo e economico di quelli di Torino",nst:"Il mercato del sabato riempie la piazza principale di Moncalieri.",nt:"Gratis. Bus 67 da Torino. Solo sabati."},
  {id:94,n:"Stupinigi Palace Park — Stupinigi #94",a:"Stupinigi",v:["nature","history","beautiful"],d:50,s:"A UNESCO World Heritage Savoy residence with an enormous baroque park and deer",st:"The Palazzina di Caccia di Stupinigi is one of the most beautiful buildings in Italy. Entry to the main palace costs €12, but the outer park and approach avenues are free to walk at any time. Deer roam the forests.",im:"Time-travel: the Savoy king setting out from this palace at dawn for a day\'s hunting in the royal forest, 1720",t:"Park free. Palace entry €12. Deer visible in the forested avenues.",c:["abandoned"],r:"g",nn:"Parco della Palazzina di Stupinigi — Stupinigi #94",ns:"Una residenza sabauda Patrimonio UNESCO con un immenso parco barocco e cervi",nst:"La Palazzina di Caccia di Stupinigi è uno degli edifici più belli d\'Italia.",nt:"Parco gratis. Palazzo 12 €."},
  {id:95,n:"Stupinigi Deer Forest Walk — Stupinigi #95",a:"Stupinigi",v:["nature","local","hidden"],d:9,s:"Morning walks in the nature reserve where hundreds of deer roam the beech avenues",st:"The forested reserve around the Stupinigi palace is home to hundreds of free-roaming deer. Morning and evening walks through the beech avenues are free; deer are often visible from the paths.",im:"Time-travel: the royal hunting parties harvesting deer from these woods for the court banquets, 1760",t:"Free. Enter from the park approach avenues. Best at dawn and dusk.",c:["free_museum"],r:"g",nn:"Riserva di Stupinigi — Stupinigi #95",ns:"Passeggiate mattutine nella riserva dove centinaia di cervi vagano per i viali",nst:"La riserva forestale attorno alla palazzina ospita centinaia di cervi liberi.",nt:"Gratis. Alba e tramonto sono i momenti migliori."},
  {id:96,n:"Quadrilatero Romano Walk — Centro Storico #96",a:"Centro Storico",v:["history","architecture","local"],d:7,s:"Turin\'s oldest quarter follows the Roman grid — walk Via Garibaldi, Europe\'s longest pedestrian street",st:"The Quadrilatero Romano follows the Roman street plan. Walk Via Garibaldi (pedestrian for 1.2 km), Via della Basilica (covered market), and the medieval Torre dei due Frati. All free.",im:"Time-travel: the Roman colony of Augusta Taurinorum laid out in this exact grid, 28 BC",t:"Free always.",c:["local_only"],r:"g",nn:"Quadrilatero Romano — Centro Storico #96",ns:"Il quartiere più antico di Torino segue la griglia romana",nst:"Il Quadrilatero Romano segue il piano stradale romano.",nt:"Sempre gratis."},
  {id:97,n:"Piazza San Carlo — Centro Storico #97",a:"Centro Storico",v:["beautiful","architecture","history"],d:47,s:"Called Turin\'s drawing room — twin baroque churches, equestrian statue, and free steps to sit on",st:"Piazza San Carlo is flanked by two identical baroque churches and centred on the bronze equestrian statue of Emanuele Filiberto. The cafés under the porticoes are expensive, but sitting on the steps costs nothing.",im:"Time-travel: the Spanish gallop infantry drilling on this piazza when it was a military parade ground, 1650",t:"Free. Always open.",c:["architecture"],r:"g",nn:"Piazza San Carlo — Centro Storico #97",ns:"Il salotto di Torino — due chiese barocche gemelle, statua equestre, gradini gratis",nst:"Piazza San Carlo è affiancata da due chiese barocche identiche.",nt:"Gratis. Sempre aperta."},
  {id:98,n:"Superga Hilltop Walk — Borgo Po #98",a:"Borgo Po",v:["nature","high_spots","history"],d:19,s:"Take the historic rack tram up to Superga at 670 m — sweeping Alps panorama, free esplanade",st:"The historic GTT rack tram climbs to the Basilica di Superga at 670 m (or walk 1 hour through woodland). At the top: sweeping Alps panorama and the royal crypt. Free access to the esplanade.",im:"Time-travel: the same rack tram carrying Turin Sunday families up for the fresh air, 1905",t:"Rack tram uses a standard city ticket. Walk from Sassi takes 1 hour. Esplanade free.",c:["history_big"],r:"g",nn:"Superga — Borgo Po #98",ns:"Prendi il tram a cremagliera storico fino a Superga a 670 m",nst:"Il tram a cremagliera GTT sale alla Basilica di Superga a 670 m.",nt:"Tram con biglietto ordinario. A piedi da Sassi 1 ora. Spianata gratuita."},
  {id:99,n:"Parco Michelotti — Borgo Po #99",a:"Borgo Po",v:["nature","local","quiet"],d:54,s:"The quieter east-bank Po park — preferred by local joggers and cyclists, far from tourist trail",st:"Parco Michelotti runs along the Po\'s east bank, quieter than Valentino. Preferred by local joggers and dog walkers. The towpath continues for kilometres. Almost no tourists.",im:"Time-travel: the east bank as working docks and textile factories before the park was made, 1920",t:"Free. Open always.",c:["high_spots"],r:"g",nn:"Parco Michelotti — Borgo Po #99",ns:"Il parco sulla sponda est del Po — preferito dai corridori locali",nst:"Parco Michelotti corre lungo la sponda est del Po.",nt:"Gratis. Sempre aperto."},
  {id:100,n:"Piazza della Repubblica Morning Market — Centro Storico #100",a:"Centro Storico",v:["local","free","history"],d:23,s:"The daily morning market at Porta Palazzo\'s outer piazza — cheapest breakfast in Turin",st:"Before the main Porta Palazzo market opens, the outer edges of Piazza della Repubblica fill with fruit and vegetable sellers, espresso carts, and street food from 6am. The cheapest food in the city centre.",im:"Time-travel: this piazza as a Roman road intersection at the edge of Augusta Taurinorum, 100 AD",t:"Free. Arrives from 6am, peaks around 8–10am. Tue–Sat.",c:["parks"],r:"g",nn:"Piazza della Repubblica mattina — Centro Storico #100",ns:"Il mercato mattutino quotidiano — la colazione più economica di Torino",nst:"Prima dell\'apertura del mercato principale, i bordi della piazza si riempiono di venditori.",nt:"Gratis. Dalle 6, meglio 8–10. Mar–Sab."},
  {id:101,n:"Piazza Castello — Centro Storico #101",a:"Centro Storico",v:["beautiful","history","architecture"],d:10,s:"Turin\'s grand baroque heart — Palazzo Reale, Palazzo Madama, and Teatro Regio all meet here",st:"The piazza is always open and free. Walk the arcaded porticoes that shelter you in any weather. Palazzo Madama straddles the gap between Roman gate and baroque palace — two thousand years of history in one building.",im:"Time-travel: the Savoy court processing from the Royal Palace to the theatre across this square, 1750",t:"Free always. Best in morning light before tour groups arrive.",c:["courtyards"],r:"g",nn:"Piazza Castello — Centro Storico #101",ns:"Il cuore barocco di Torino — Palazzo Reale, Palazzo Madama e il Teatro Regio",nst:"La piazza è sempre aperta e gratuita. I portici arcuati ti proteggono in ogni stagione.",nt:"Sempre gratis. Meglio la mattina presto."},
  {id:102,n:"Porta Palazzo Market — Centro Storico #102",a:"Centro Storico",v:["local","free","weird"],d:19,s:"Europe\'s largest open-air market fills this sprawling piazza every morning — free to wander",st:"Every Tuesday–Saturday morning, Porta Palazzo becomes a city in motion: hundreds of vendors, immigrants from a dozen countries, mountains of vegetables and secondhand clothing. The energy is extraordinary.",im:"Time-travel: this piazza as the edge of medieval Turin, just outside the city gate, 1600",t:"Free to wander. Tue–Sat mornings. Arrive before 10am for the best atmosphere.",c:["romantic_water"],r:"g",nn:"Mercato di Porta Palazzo — Centro Storico #102",ns:"Il più grande mercato all\'aperto d\'Europa riempie questa piazza ogni mattina",nst:"Ogni mattina Martedì–Sabato, Porta Palazzo diventa una città in movimento.",nt:"Gratis. Mar–Sab mattino. Arriva prima delle 10."},
  {id:103,n:"Galleria Subalpina — Centro Storico #103",a:"Centro Storico",v:["beautiful","architecture","quiet"],d:11,s:"A 19th-century glass-roofed arcade with bookshops, a chess café, and ornate ironwork",st:"The Galleria Subalpina connects Piazza Castello to Via Po. Antiquarian bookshops, a chess café, and the ornate 1874 ironwork make it a serene refuge from the city. Free to enter and browse.",im:"Time-travel: Turinese intellectuals meeting in the chess café under this glass roof, 1890",t:"Free. Open during arcade hours. The chess café at the far end is excellent.",c:["scary"],r:"g",nn:"Galleria Subalpina — Centro Storico #103",ns:"Un\'arcade con tetto in vetro del XIX secolo - librerie antiquarie, caffe degli scacchi",nst:"La Galleria Subalpina collega Piazza Castello a Via Po.",nt:"Gratis. Aperta durante gli orari dell\'arcade."},
  {id:104,n:"Parco del Valentino — San Salvario #104",a:"San Salvario",v:["nature","beautiful","local"],d:29,s:"Turin\'s riverside park along the Po — 500,000 m² of joggers, picnics, and herons",st:"Valentino is Turin\'s main park, running along the Po\'s west bank. Joggers, couples, students, and herons share the riverside. The 1880s Borgo Medievale replica castle is free to view from outside.",im:"Time-travel: the Savoy court using this park as a private hunting ground before the city expanded, 1800",t:"Free. Open always.",c:["famous_dead"],r:"g",nn:"Parco del Valentino — San Salvario #104",ns:"Il parco lungo il Po di Torino — 500.000 m² di corridori, picnic ed aironi",nst:"Valentino è il parco principale di Torino, lungo la sponda ovest del Po.",nt:"Gratis. Sempre aperto."},
  {id:105,n:"Borgo Medievale — San Salvario #105",a:"San Salvario",v:["history","beautiful","architecture"],d:22,s:"A full-scale reproduction of a 15th-century Piedmontese village, built for the 1884 exhibition",st:"The Borgo Medievale sits inside Valentino Park. It is a faithful copy of a medieval hill village, built as a historical showcase. The exterior and courtyard are free to walk at any time.",im:"Time-travel: the 1884 Exhibition visitors marvelling at this reconstruction, seeing their own medieval past rebuilt, 1884",t:"Free outside. Interior has small entry fee.",c:["street_art"],r:"g",nn:"Borgo Medievale — San Salvario #105",ns:"Una riproduzione in scala reale di un borgo piemontese del XV secolo",nst:"Il Borgo Medievale si trova dentro il Parco del Valentino.",nt:"Gratis fuori. Interno con piccolo biglietto."}
];
