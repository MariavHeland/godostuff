<script>
const P = [
  {id:1,n:"Piazza Castello — Centro Storico",a:"Centro Storico",v:["beautiful","history","architecture"],d:15,s:"Turin\'s grand baroque heart — Palazzo Reale, Palazzo Madama, and Teatro Regio all meet here",st:"The piazza is always open and free. Walk the arcaded porticoes that shelter you in any weather. Palazzo Madama straddles the gap between Roman gate and baroque palace — two thousand years of history in one building.",im:"Time-travel: the Savoy court processing from the Royal Palace to the theatre across this square, 1750",t:"Free always. Best in morning light before tour groups arrive.",c:["architecture"],r:"g",nn:"Piazza Castello — Centro Storico",ns:"Il cuore barocco di Torino — Palazzo Reale, Palazzo Madama e il Teatro Regio",nst:"La piazza è sempre aperta e gratuita. I portici arcuati ti proteggono in ogni stagione.",nt:"Sempre gratis. Meglio la mattina presto."},
  {id:2,n:"Porta Palazzo Market — Centro Storico",a:"Centro Storico",v:["local","free","weird"],d:30,s:"Europe\'s largest open-air market fills this sprawling piazza every morning — free to wander",st:"Every Tuesday–Saturday morning, Porta Palazzo becomes a city in motion: hundreds of vendors, immigrants from a dozen countries, mountains of vegetables and secondhand clothing. The energy is extraordinary.",im:"Time-travel: this piazza as the edge of medieval Turin, just outside the city gate, 1600",t:"Free to wander. Tue–Sat mornings. Arrive before 10am for the best atmosphere.",c:["local_only"],r:"g",nn:"Mercato di Porta Palazzo — Centro Storico",ns:"Il più grande mercato all\'aperto d\'Europa riempie questa piazza ogni mattina",nst:"Ogni mattina Martedì–Sabato, Porta Palazzo diventa una città in movimento.",nt:"Gratis. Mar–Sab mattino. Arriva prima delle 10."},
  {id:3,n:"Galleria Subalpina — Centro Storico",a:"Centro Storico",v:["beautiful","architecture","quiet"],d:15,s:"A 19th-century glass-roofed arcade with bookshops, a chess café, and ornate ironwork",st:"The Galleria Subalpina connects Piazza Castello to Via Po. Antiquarian bookshops, a chess café, and the ornate 1874 ironwork make it a serene refuge from the city. Free to enter and browse.",im:"Time-travel: Turinese intellectuals meeting in the chess café under this glass roof, 1890",t:"Free. Open during arcade hours. The chess café at the far end is excellent.",c:["architecture"],r:"g",nn:"Galleria Subalpina — Centro Storico",ns:"Un\'arcade con tetto in vetro del XIX secolo - librerie antiquarie, caffe degli scacchi",nst:"La Galleria Subalpina collega Piazza Castello a Via Po.",nt:"Gratis. Aperta durante gli orari dell\'arcade."},
  {id:4,n:"Parco del Valentino — San Salvario",a:"San Salvario",v:["nature","beautiful","local"],d:40,s:"Turin\'s riverside park along the Po — 500,000 m² of joggers, picnics, and herons",st:"Valentino is Turin\'s main park, running along the Po\'s west bank. Joggers, couples, students, and herons share the riverside. The 1880s Borgo Medievale replica castle is free to view from outside.",im:"Time-travel: the Savoy court using this park as a private hunting ground before the city expanded, 1800",t:"Free. Open always.",c:["parks"],r:"g",nn:"Parco del Valentino — San Salvario",ns:"Il parco lungo il Po di Torino — 500.000 m² di corridori, picnic ed aironi",nst:"Valentino è il parco principale di Torino, lungo la sponda ovest del Po.",nt:"Gratis. Sempre aperto."},
  {id:5,n:"Borgo Medievale — San Salvario",a:"San Salvario",v:["history","beautiful","architecture"],d:20,s:"A full-scale reproduction of a 15th-century Piedmontese village, built for the 1884 exhibition",st:"The Borgo Medievale sits inside Valentino Park. It is a faithful copy of a medieval hill village, built as a historical showcase. The exterior and courtyard are free to walk at any time.",im:"Time-travel: the 1884 Exhibition visitors marvelling at this reconstruction, seeing their own medieval past rebuilt, 1884",t:"Free outside. Interior has small entry fee.",c:["history_big"],r:"g",nn:"Borgo Medievale — San Salvario",ns:"Una riproduzione in scala reale di un borgo piemontese del XV secolo",nst:"Il Borgo Medievale si trova dentro il Parco del Valentino.",nt:"Gratis fuori. Interno con piccolo biglietto."},
  {id:6,n:"San Salvario Aperitivo — San Salvario",a:"San Salvario",v:["local","free","night"],d:20,s:"Turin\'s most vibrant aperitivo neighbourhood — free snacks with drinks, 18:30–20:00",st:"San Salvario around Via Baretti and Via Madama Cristina is packed with affordable bars offering free snacks with evening drinks. Turin invented the aperitivo — and it is still done best here.",im:"Time-travel: the student workers of FIAT stopping here on their way home from the factory, 1960",t:"Free snacks with any drink (around €5 buys you access to the buffet). Best 18:30–20:00.",c:["local_only"],r:"g",nn:"San Salvario aperitivo — San Salvario",ns:"Il quartiere aperitivo più vivace di Torino — snack gratuiti con le bevande",nst:"Il San Salvario è pieno di bar a prezzi accessibili che offrono stuzzichini con i drinks.",nt:"Snack gratuiti con qualsiasi drink. Meglio 18:30–20:00."},
  {id:7,n:"Murazzi del Po — Vanchiglia",a:"Vanchiglia",v:["local","nature","beautiful"],d:25,s:"The Po riverbank below Vanchiglia — sun-bathing on flat stones, fishing, summer terraces",st:"The Murazzi is a long stretch of flat stone embankment along the Po\'s west bank. People sunbathe on the stones, fishermen cast lines, and in summer bar terraces spill to the water\'s edge. Free at all times.",im:"Time-travel: the old Po docks here, boats loading marble and grain for the Savoy factories, 1880",t:"Free always. Summer evenings are the best time.",c:["romantic_water"],r:"g",nn:"Murazzi del Po — Vanchiglia",ns:"La riva del Po sotto Vanchiglia — bagni di sole, pesca, terrazze estive",nst:"I Murazzi sono un lungo tratto di argine piano lungo la sponda ovest del Po.",nt:"Sempre gratis. Le serate estive sono il momento migliore."},
  {id:8,n:"Piazza Vittorio Veneto — Vanchiglia",a:"Vanchiglia",v:["beautiful","history","architecture"],d:10,s:"One of Europe\'s largest baroque piazzas, sloping toward the Po — and it\'s free to sit in",st:"The massive piazza slopes from the arcaded buildings down to the river. The view from the far end toward the Gran Madre church and the hills of Superga is among Turin\'s best.",im:"Time-travel: the Turin bourgeoisie promenading here on Sunday afternoons, the Alps visible on clear days, 1900",t:"Free always.",c:["architecture"],r:"g",nn:"Piazza Vittorio Veneto — Vanchiglia",ns:"Una delle più grandi piazze barocche d\'Europa, che scende verso il Po",nst:"La grande piazza scende dagli edifici porticati fino al fiume.",nt:"Sempre gratis."},
  {id:9,n:"Vanchiglia Street Art Walk — Vanchiglia",a:"Vanchiglia",v:["street_art","art","local"],d:30,s:"Turin\'s most concentrated street art neighbourhood — murals by Italian and international artists",st:"Walk Via Lombroso, Corso Brescia, and the backstreets of Vanchiglia for murals by Italian and international artists. All free, all outdoors. The Vanki Festival murals are particularly good.",im:"Time-travel: this as an industrial workers\' quarter before the art arrived, factories humming, 1970",t:"Free always.",c:["street_art"],r:"g",nn:"Street art a Vanchiglia — Vanchiglia",ns:"Il quartiere di street art più concentrato di Torino",nst:"Passeggiata lungo Via Lombroso, Corso Brescia e i vicoli di Vanchiglia.",nt:"Sempre gratis."},
  {id:10,n:"Balon Flea Market — Aurora",a:"Aurora",v:["local","free","hidden"],d:40,s:"Every Saturday, Borgo Dora\'s streets become a sprawling flea market — antiques, vinyl, vintage",st:"The Balon fills Via Borgo Dora with antiques, records, vintage clothes, and street food every Saturday. The Gran Balon (second Sunday of each month) doubles in size. Both are free to browse.",im:"Time-travel: the Balon as Turin\'s main rag-and-bone market, the poor buying and selling to survive, 1920",t:"Free. Saturdays all day. Gran Balon: second Sunday of each month.",c:["local_only"],r:"g",nn:"Balon — Aurora",ns:"Ogni sabato, le strade del Borgo Dora diventano un immenso mercatino delle pulci",nst:"Il Balon riempie Via Borgo Dora di antiquariato, dischi e vestiti vintage ogni sabato.",nt:"Gratis. Sabati tutto il giorno."},
  {id:11,n:"OGR Cultural Centre — Aurora",a:"Aurora",v:["art","local","architecture"],d:30,s:"The old railway workshops turned cultural hub — free outdoor events and markets in the vast courtyard",st:"The Officine Grandi Riparazioni (old FIAT railway workshops) host free cultural events, outdoor screenings, and markets in their vast brick courtyard. Check their programme — many events are free.",im:"Time-travel: the railway workshops full of mechanics repairing locomotives, the sound of metal on metal, 1910",t:"Courtyard free. Check programme for free events.",c:["free_museum"],r:"g",nn:"OGR Torino — Aurora",ns:"Le vecchie officine ferroviarie diventate hub culturale",nst:"Le Officine Grandi Riparazioni ospitano eventi culturali gratuiti e mercati.",nt:"Cortile gratuito. Verifica programma eventi gratuiti."},
  {id:12,n:"Crocetta Market Hall — Crocetta",a:"Crocetta",v:["local","free","hidden"],d:20,s:"A covered daily market beloved by residents — excellent Piedmont cheeses, truffles in season",st:"The Mercato della Crocetta on Piazza Madama Cristina is a covered daily market. Excellent Piedmont cheeses, truffles in season, the cheapest espresso in the area at the bar inside. A genuine neighbourhood institution.",im:"Time-travel: Crocetta as the residential quarter of Turin\'s professional class — lawyers buying dinner here, 1950",t:"Free. Open Mon–Sat mornings and early afternoons.",c:["local_only"],r:"g",nn:"Mercato Crocetta — Crocetta",ns:"Un mercato coperto amato dai residenti — eccellenti formaggi piemontesi",nst:"Il Mercato della Crocetta è un mercato coperto quotidiano.",nt:"Gratis. Aperto Lun–Sab mattino."},
  {id:13,n:"Villa della Regina Terraces — Crocetta",a:"Crocetta",v:["beautiful","history","nature"],d:30,s:"The UNESCO terraced gardens of a 17th-century Savoy villa — panoramic view over the Po plain",st:"The terraced gardens of Villa della Regina are open on selected days. The view from the terraces over the Po plain and the Alps on clear days is extraordinary.",im:"Time-travel: the Savoy princes retreating to these terraces above the city dust in summer, 1720",t:"Check opening days (sporadic). Free entry when open.",c:["parks"],r:"g",nn:"Villa della Regina — Crocetta",ns:"I giardini terrazzati UNESCO di una villa sabauda del XVII secolo",nst:"I giardini terrazzati della Villa della Regina sono aperti in giorni selezionati.",nt:"Verifica i giorni di apertura. Ingresso gratuito quando aperto."},
  {id:14,n:"Monte dei Cappuccini — Borgo Po",a:"Borgo Po",v:["beautiful","high_spots","history"],d:25,s:"A small hill rising from the Po — climb it for the best panorama in Turin",st:"Monte dei Cappuccini rises from the Po\'s east bank, topped by a 16th-century Capuchin church. From the summit: the whole city, the Po, Superga, and the Alps on clear days. Free to climb anytime.",im:"Time-travel: the Capuchin friars establishing their monastery on this hill, deliberately above the city, 1580",t:"Free. Walk up from the Gran Madre bridge. 10 minutes.",c:["high_spots"],r:"g",nn:"Monte dei Cappuccini — Borgo Po",ns:"Una piccola collina sul Po — salila per il miglior panorama di Torino",nst:"Il Monte dei Cappuccini si alza dalla sponda est del Po.",nt:"Gratis. Sale dalla Gran Madre. 10 minuti."},
  {id:15,n:"Via Po Porticoes — Borgo Po",a:"Borgo Po",v:["architecture","beautiful","local"],d:20,s:"Turin\'s 18 km of porticoes — walk Via Po from Piazza Castello to the river under cover",st:"Via Po\'s covered arcade runs from Piazza Castello to the river, lined with bookshops, antique dealers, and old-fashioned cafés. Turin\'s porticoes total 18 km — among Europe\'s longest. Free to walk.",im:"Time-travel: the Turin porticoes as revolutionary infrastructure — walking without getting wet or cold, 1750",t:"Free. Always open.",c:["architecture"],r:"g",nn:"Portici di Via Po — Borgo Po",ns:"18 km di portici — percorri Via Po da Piazza Castello al fiume al coperto",nst:"I portici di Via Po corrono da Piazza Castello al fiume.",nt:"Gratis. Sempre aperto."},
  {id:16,n:"Gran Madre di Dio Church — Borgo Po",a:"Borgo Po",v:["architecture","beautiful","history"],d:15,s:"A Pantheon-inspired neoclassical church on the Po\'s east bank — climb the steps for the view",st:"The Gran Madre di Dio was built in 1831 to celebrate Napoleon\'s defeat. It sits at the end of the Vittorio Veneto axis. Climb the broad steps for a famous view back across the piazza.",im:"Time-travel: the citizenry celebrating the defeat of Napoleon by laying this church\'s foundation, 1818",t:"Free. Open daily. The steps alone are worth the visit.",c:["architecture"],r:"g",nn:"Gran Madre di Dio — Borgo Po",ns:"Una chiesa neoclassica ispirata al Pantheon — sali i gradini per la vista",nst:"La Gran Madre di Dio fu costruita nel 1831 per celebrare la sconfitta di Napoleone.",nt:"Gratis. Aperta quotidianamente."},
  {id:17,n:"Moncalieri Castle Grounds — Moncalieri",a:"Moncalieri",v:["history","beautiful","hidden"],d:50,s:"A massive Savoy castle on the hill above Moncalieri — village and hillside paths free anytime",st:"The Castello di Moncalieri dominates the hill above the Po. Once a royal residence, the castle now has guided visits. The surrounding village streets and hillside paths are free to walk at any time.",im:"Time-travel: the Savoy court moving between Turin and Moncalieri with the seasons, 1750",t:"Free outside. Castle interior has guided visits (€8). Village free.",c:["history_big"],r:"g",nn:"Castello di Moncalieri — Moncalieri",ns:"Un imponente castello sabaudo sulla collina sopra Moncalieri",nst:"Il Castello di Moncalieri domina la collina sopra il Po.",nt:"Gratis fuori. Interno con visita guidata (8 €)."},
  {id:18,n:"Moncalieri Saturday Market — Moncalieri",a:"Moncalieri",v:["local","free","hidden"],d:30,s:"Every Saturday morning — a local market calmer and cheaper than Turin city markets, 15 min by bus",st:"The Saturday market fills Moncalieri\'s main piazza with fresh produce, cheese vendors, and local street food. Calmer and cheaper than the Turin city markets. Good for cheap Piedmont specialities.",im:"Time-travel: Moncalieri\'s farmers selling surplus to the castle servants every Saturday morning, 1800",t:"Free. Bus 67 from Turin centre. Saturdays only.",c:["local_only"],r:"g",nn:"Mercato Moncalieri — Moncalieri",ns:"Ogni sabato mattina — un mercato più tranquillo e economico di quelli di Torino",nst:"Il mercato del sabato riempie la piazza principale di Moncalieri.",nt:"Gratis. Bus 67 da Torino. Solo sabati."},
  {id:19,n:"Stupinigi Palace Park — Stupinigi",a:"Stupinigi",v:["nature","history","beautiful"],d:60,s:"A UNESCO World Heritage Savoy residence with an enormous baroque park and deer",st:"The Palazzina di Caccia di Stupinigi is one of the most beautiful buildings in Italy. Entry to the main palace costs €12, but the outer park and approach avenues are free to walk at any time. Deer roam the forests.",im:"Time-travel: the Savoy king setting out from this palace at dawn for a day\'s hunting in the royal forest, 1720",t:"Park free. Palace entry €12. Deer visible in the forested avenues.",c:["parks"],r:"g",nn:"Parco della Palazzina di Stupinigi — Stupinigi",ns:"Una residenza sabauda Patrimonio UNESCO con un immenso parco barocco e cervi",nst:"La Palazzina di Caccia di Stupinigi è uno degli edifici più belli d\'Italia.",nt:"Parco gratis. Palazzo 12 €."},
  {id:20,n:"Stupinigi Deer Forest Walk — Stupinigi",a:"Stupinigi",v:["nature","local","hidden"],d:45,s:"Morning walks in the nature reserve where hundreds of deer roam the beech avenues",st:"The forested reserve around the Stupinigi palace is home to hundreds of free-roaming deer. Morning and evening walks through the beech avenues are free; deer are often visible from the paths.",im:"Time-travel: the royal hunting parties harvesting deer from these woods for the court banquets, 1760",t:"Free. Enter from the park approach avenues. Best at dawn and dusk.",c:["parks"],r:"g",nn:"Riserva di Stupinigi — Stupinigi",ns:"Passeggiate mattutine nella riserva dove centinaia di cervi vagano per i viali",nst:"La riserva forestale attorno alla palazzina ospita centinaia di cervi liberi.",nt:"Gratis. Alba e tramonto sono i momenti migliori."},
  {id:21,n:"Quadrilatero Romano Walk — Centro Storico",a:"Centro Storico",v:["history","architecture","local"],d:30,s:"Turin\'s oldest quarter follows the Roman grid — walk Via Garibaldi, Europe\'s longest pedestrian street",st:"The Quadrilatero Romano follows the Roman street plan. Walk Via Garibaldi (pedestrian for 1.2 km), Via della Basilica (covered market), and the medieval Torre dei due Frati. All free.",im:"Time-travel: the Roman colony of Augusta Taurinorum laid out in this exact grid, 28 BC",t:"Free always.",c:["history_big"],r:"g",nn:"Quadrilatero Romano — Centro Storico",ns:"Il quartiere più antico di Torino segue la griglia romana",nst:"Il Quadrilatero Romano segue il piano stradale romano.",nt:"Sempre gratis."},
  {id:22,n:"Piazza San Carlo — Centro Storico",a:"Centro Storico",v:["beautiful","architecture","history"],d:10,s:"Called Turin\'s drawing room — twin baroque churches, equestrian statue, and free steps to sit on",st:"Piazza San Carlo is flanked by two identical baroque churches and centred on the bronze equestrian statue of Emanuele Filiberto. The cafés under the porticoes are expensive, but sitting on the steps costs nothing.",im:"Time-travel: the Spanish gallop infantry drilling on this piazza when it was a military parade ground, 1650",t:"Free. Always open.",c:["architecture"],r:"g",nn:"Piazza San Carlo — Centro Storico",ns:"Il salotto di Torino — due chiese barocche gemelle, statua equestre, gradini gratis",nst:"Piazza San Carlo è affiancata da due chiese barocche identiche.",nt:"Gratis. Sempre aperta."},
  {id:23,n:"Superga Hilltop Walk — Borgo Po",a:"Borgo Po",v:["nature","high_spots","history"],d:120,s:"Take the historic rack tram up to Superga at 670 m — sweeping Alps panorama, free esplanade",st:"The historic GTT rack tram climbs to the Basilica di Superga at 670 m (or walk 1 hour through woodland). At the top: sweeping Alps panorama and the royal crypt. Free access to the esplanade.",im:"Time-travel: the same rack tram carrying Turin Sunday families up for the fresh air, 1905",t:"Rack tram uses a standard city ticket. Walk from Sassi takes 1 hour. Esplanade free.",c:["high_spots"],r:"g",nn:"Superga — Borgo Po",ns:"Prendi il tram a cremagliera storico fino a Superga a 670 m",nst:"Il tram a cremagliera GTT sale alla Basilica di Superga a 670 m.",nt:"Tram con biglietto ordinario. A piedi da Sassi 1 ora. Spianata gratuita."},
  {id:24,n:"Parco Michelotti — Borgo Po",a:"Borgo Po",v:["nature","local","quiet"],d:30,s:"The quieter east-bank Po park — preferred by local joggers and cyclists, far from tourist trail",st:"Parco Michelotti runs along the Po\'s east bank, quieter than Valentino. Preferred by local joggers and dog walkers. The towpath continues for kilometres. Almost no tourists.",im:"Time-travel: the east bank as working docks and textile factories before the park was made, 1920",t:"Free. Open always.",c:["parks"],r:"g",nn:"Parco Michelotti — Borgo Po",ns:"Il parco sulla sponda est del Po — preferito dai corridori locali",nst:"Parco Michelotti corre lungo la sponda est del Po.",nt:"Gratis. Sempre aperto."},
  {id:25,n:"Piazza della Repubblica Morning Market — Centro Storico",a:"Centro Storico",v:["local","free","history"],d:25,s:"The daily morning market at Porta Palazzo\'s outer piazza — cheapest breakfast in Turin",st:"Before the main Porta Palazzo market opens, the outer edges of Piazza della Repubblica fill with fruit and vegetable sellers, espresso carts, and street food from 6am. The cheapest food in the city centre.",im:"Time-travel: this piazza as a Roman road intersection at the edge of Augusta Taurinorum, 100 AD",t:"Free. Arrives from 6am, peaks around 8–10am. Tue–Sat.",c:["local_only"],r:"g",nn:"Piazza della Repubblica mattina — Centro Storico",ns:"Il mercato mattutino quotidiano — la colazione più economica di Torino",nst:"Prima dell\'apertura del mercato principale, i bordi della piazza si riempiono di venditori.",nt:"Gratis. Dalle 6, meglio 8–10. Mar–Sab."},
  {id:26,n:"Il Balon Flea Market — Aurora",a:"Aurora",v:["local","weird","free"],d:25,s:"One of Italy\'s best flea markets — every Saturday in Borgo Dora, dealers who know every object in the pile",st:"Il Balon runs every Saturday in Borgo Dora, just north of Porta Palazzo. Vintage furniture, 1950s posters, Soviet cameras, broken clocks. The Gran Balon on the second Sunday of the month is even bigger. Free to browse.",im:"Time-travel: the rag-and-bone men of Borgo Dora trading salvage from demolished Turin buildings in the 1920s",t:"Free. Saturdays from 7am. Borgo Dora, north of Porta Palazzo.",c:["local_only"],r:"g",nn:"Il Balon mercatino — Aurora",ns:"Uno dei migliori mercati delle pulci d\'Italia — ogni sabato nel Borgo Dora",nst:"Il Balon si tiene ogni sabato nel Borgo Dora, appena a nord di Porta Palazzo. Mobili vintage, poster anni \'50, macchine fotografiche sovietiche.",nt:"Gratis. Sabato dalle 7. Borgo Dora, a nord di Porta Palazzo."},
  {id:27,n:"Parco Dora Industrial Park — Aurora",a:"Aurora",v:["weird","art","free"],d:20,s:"A park built inside a rusting Fiat factory — steel arches 30m high, skaters, wildflowers through the concrete",st:"When the Fiat Ferriere plant closed, the city left the industrial structures and built a park around them. Huge steel arches, old rail tracks, rusting cranes. Wildflowers grow through the cracks. It looks like a sci-fi film set.",im:"Time-travel: the Fiat Ferriere plant at full production in 1960, 3,000 workers inside these buildings",t:"Free. Open daily. Tram 3 or 9, Corso Mortara stop.",c:["abandoned"],r:"g",nn:"Parco Dora — Aurora",ns:"Un parco costruito dentro una fabbrica Fiat arrugginita — archi di acciaio di 30m, skater, fiori selvatici nel cemento",nst:"Quando lo stabilimento Fiat Ferriere chiuse, la città lasciò le strutture industriali e costruì un parco intorno a esse.",nt:"Gratis. Aperto ogni giorno. Tram 3 o 9, fermata Corso Mortara."},
  {id:28,n:"Monte dei Cappuccini Viewpoint — Borgo Po",a:"Borgo Po",v:["beautiful","hidden","free"],d:20,s:"Turin\'s best free panorama — the Alps, the Po, the Mole Antonelliana, all in one view from a Capuchin hilltop",st:"The Capuchin monastery sits on a small hill directly above Piazza Vittorio Veneto. The walk up is 10 minutes. The terrace in front of the church has the definitive Turin panorama — the Alps sharp behind the city on clear days.",im:"Time-travel: Capuchin monks watching the Austrian army approach Turin from this exact hilltop in 1706",t:"Free. Walk up from Piazza Vittorio Veneto, follow the signs to the monastery.",c:["high_spots"],r:"g",nn:"Monte dei Cappuccini — Borgo Po",ns:"Il miglior panorama gratuito di Torino — le Alpi, il Po, la Mole Antonelliana in un solo sguardo",nst:"Il monastero cappuccino sorge su una piccola collina sopra Piazza Vittorio Veneto. La terrazza ha il panorama definitivo di Torino.",nt:"Gratis. Salire da Piazza Vittorio Veneto seguendo i segnali del monastero."},
  {id:29,n:"Parco del Valentino Riverside — Centro Storico",a:"Centro Storico",v:["beautiful","local","free"],d:15,s:"Turin\'s great riverside park with a fake Medieval castle inside — free, enormous, the city on its Sunday best",st:"Valentino runs 2km along the Po south of the centre. Inside there is a full-scale reproduction of a medieval castle and village built for the 1884 exhibition. On Sundays half of Turin is here.",im:"Time-travel: the 1884 Esposizione Generale Italiana unveiling the fake Medieval Castle, Turin presenting itself as industrial and historical at once",t:"Free. Tram 9 to Piazza Vittorio then walk south along the river.",c:["parks"],r:"g",nn:"Parco del Valentino — Centro Storico",ns:"Il grande parco fluviale di Torino con un castello medievale falso dentro — gratuito, enorme, la città alla sua domenica migliore",nst:"Il Valentino si estende per 2 km lungo il Po. All\'interno c\'è una riproduzione in scala reale di un castello medievale costruita per l\'esposizione del 1884.",nt:"Gratis. Tram 9 fino a Piazza Vittorio poi camminare verso sud lungo il fiume."},
  {id:30,n:"Hidden Courtyards (Portoni) Walk — Centro Storico",a:"Centro Storico",v:["hidden","architecture","local"],d:30,s:"Push open the big palazzo doors on Via Po and find an entire hidden city of internal courtyards",st:"Turin\'s grand palazzi have enormous wooden portoni gates. Many open to the public during the day. Behind them are arcaded courtyards, internal streets, private gardens. The whole historic centre has a parallel world inside.",im:"Time-travel: these same courtyards in 1800, the palazzo residents emerging onto private arcades above the street noise",t:"Free. Try Via Po, Via Roma, Via Lagrange. Push gently. Most are open 9am–7pm.",c:["courtyards"],r:"g",nn:"Cortili nascosti (Portoni) — Centro Storico",ns:"Spingi i grandi portoni dei palazzi in Via Po e trova un\'intera città nascosta di cortili interni",nst:"I grandi palazzi di Torino hanno enormi portoni in legno. Molti sono aperti al pubblico durante il giorno. Dietro ci sono cortili con portici.",nt:"Gratis. Prova Via Po, Via Roma, Via Lagrange. Spingi delicatamente. La maggior parte aperta 9-19."},
  {id:31,n:"Piazza Vittorio Veneto Night Arcades — Centro Storico",a:"Centro Storico",v:["beautiful","night","free"],d:10,s:"The largest baroque square in Europe at night — Via Po arcades, gelato, the river at the end of the street",st:"Piazza Vittorio Veneto is enormous. At night the arcades of Via Po fill with students and the square itself is lit from the Monte dei Cappuccini hill. Walk down to the Po bridge and back. One euro gelato available.",im:"Time-travel: the newly completed Piazza Vittorio Veneto in 1830, Napoleon\'s engineers having just finished Turin\'s grandest public space",t:"Free. Every night. Via Po runs straight to the square from Piazza Castello.",c:["architecture"],r:"g",nn:"Piazza Vittorio Veneto di notte — Centro Storico",ns:"La piazza barocca più grande d\'Europa di notte — portici di Via Po, gelato, il fiume in fondo alla strada",nst:"Piazza Vittorio Veneto è enorme. Di notte i portici di Via Po si riempiono di studenti e la piazza è illuminata dalla collina dei Cappuccini.",nt:"Gratis. Ogni sera. Via Po porta direttamente alla piazza da Piazza Castello."},
  {id:32,n:"Sacra di San Michele Mountain Abbey — Stupinigi",a:"Stupinigi",v:["history","beautiful","architecture"],d:60,s:"A Gothic abbey perched on a 1000m peak 35km west — the inspiration for Umberto Eco\'s The Name of the Rose",st:"The Sacra di San Michele was begun in 983 and sits at the top of Monte Pirchiriano. The view from the top is straight down the Susa Valley. The Gothic entrance staircase is one of the most dramatic in Italy. Reachable by bus from Turin.",im:"Time-travel: Benedictine monks completing the first stone tower in 987, the Alps rising around them",t:"Small entry fee. Bus 36 from Corso Francia to Sant\'Ambrogio then walk 45 min up.",c:["history_big"],r:"g",nn:"Sacra di San Michele — Stupinigi",ns:"Un\'abbazia gotica su una vetta di 1000m — l\'ispirazione per Il Nome della Rosa di Eco",nst:"La Sacra di San Michele fu iniziata nel 983 e siede in cima al Monte Pirchiriano. La scala gotica d\'ingresso è tra le più drammatiche d\'Italia.",nt:"Piccolo costo. Bus 36 da Corso Francia fino a Sant\'Ambrogio poi 45 min a piedi."},
  {id:33,n:"Piazza Castello — Centro Storico #33",a:"Centro Storico",v:["beautiful","history","architecture"],d:45,s:"Turin\'s grand baroque heart — Palazzo Reale, Palazzo Madama, and Teatro Regio all meet here",st:"The piazza is always open and free. Walk the arcaded porticoes that shelter you in any weather. Palazzo Madama straddles the gap between Roman gate and baroque palace — two thousand years of history in one building.",im:"Time-travel: the Savoy court processing from the Royal Palace to the theatre across this square, 1750",t:"Free always. Best in morning light before tour groups arrive.",c:["history_big"],r:"g",nn:"Piazza Castello — Centro Storico #33",ns:"Il cuore barocco di Torino — Palazzo Reale, Palazzo Madama e il Teatro Regio",nst:"La piazza è sempre aperta e gratuita. I portici arcuati ti proteggono in ogni stagione.",nt:"Sempre gratis. Meglio la mattina presto."},
  {id:34,n:"Porta Palazzo Market — Centro Storico #34",a:"Centro Storico",v:["local","free","weird"],d:12,s:"Europe\'s largest open-air market fills this sprawling piazza every morning — free to wander",st:"Every Tuesday–Saturday morning, Porta Palazzo becomes a city in motion: hundreds of vendors, immigrants from a dozen countries, mountains of vegetables and secondhand clothing. The energy is extraordinary.",im:"Time-travel: this piazza as the edge of medieval Turin, just outside the city gate, 1600",t:"Free to wander. Tue–Sat mornings. Arrive before 10am for the best atmosphere.",c:["high_spots"],r:"g",nn:"Mercato di Porta Palazzo — Centro Storico #34",ns:"Il più grande mercato all\'aperto d\'Europa riempie questa piazza ogni mattina",nst:"Ogni mattina Martedì–Sabato, Porta Palazzo diventa una città in movimento.",nt:"Gratis. Mar–Sab mattino. Arriva prima delle 10."},
  {id:35,n:"Galleria Subalpina — Centro Storico #35",a:"Centro Storico",v:["beautiful","architecture","quiet"],d:6,s:"A 19th-century glass-roofed arcade with bookshops, a chess café, and ornate ironwork",st:"The Galleria Subalpina connects Piazza Castello to Via Po. Antiquarian bookshops, a chess café, and the ornate 1874 ironwork make it a serene refuge from the city. Free to enter and browse.",im:"Time-travel: Turinese intellectuals meeting in the chess café under this glass roof, 1890",t:"Free. Open during arcade hours. The chess café at the far end is excellent.",c:["parks"],r:"g",nn:"Galleria Subalpina — Centro Storico #35",ns:"Un\'arcade con tetto in vetro del XIX secolo - librerie antiquarie, caffe degli scacchi",nst:"La Galleria Subalpina collega Piazza Castello a Via Po.",nt:"Gratis. Aperta durante gli orari dell\'arcade."},
  {id:36,n:"Parco del Valentino — San Salvario #36",a:"San Salvario",v:["nature","beautiful","local"],d:52,s:"Turin\'s riverside park along the Po — 500,000 m² of joggers, picnics, and herons",st:"Valentino is Turin\'s main park, running along the Po\'s west bank. Joggers, couples, students, and herons share the riverside. The 1880s Borgo Medievale replica castle is free to view from outside.",im:"Time-travel: the Savoy court using this park as a private hunting ground before the city expanded, 1800",t:"Free. Open always.",c:["courtyards"],r:"g",nn:"Parco del Valentino — San Salvario #36",ns:"Il parco lungo il Po di Torino — 500.000 m² di corridori, picnic ed aironi",nst:"Valentino è il parco principale di Torino, lungo la sponda ovest del Po.",nt:"Gratis. Sempre aperto."},
  {id:37,n:"Borgo Medievale — San Salvario #37",a:"San Salvario",v:["history","beautiful","architecture"],d:22,s:"A full-scale reproduction of a 15th-century Piedmontese village, built for the 1884 exhibition",st:"The Borgo Medievale sits inside Valentino Park. It is a faithful copy of a medieval hill village, built as a historical showcase. The exterior and courtyard are free to walk at any time.",im:"Time-travel: the 1884 Exhibition visitors marvelling at this reconstruction, seeing their own medieval past rebuilt, 1884",t:"Free outside. Interior has small entry fee.",c:["romantic_water"],r:"g",nn:"Borgo Medievale — San Salvario #37",ns:"Una riproduzione in scala reale di un borgo piemontese del XV secolo",nst:"Il Borgo Medievale si trova dentro il Parco del Valentino.",nt:"Gratis fuori. Interno con piccolo biglietto."},
  {id:38,n:"San Salvario Aperitivo — San Salvario #38",a:"San Salvario",v:["local","free","night"],d:20,s:"Turin\'s most vibrant aperitivo neighbourhood — free snacks with drinks, 18:30–20:00",st:"San Salvario around Via Baretti and Via Madama Cristina is packed with affordable bars offering free snacks with evening drinks. Turin invented the aperitivo — and it is still done best here.",im:"Time-travel: the student workers of FIAT stopping here on their way home from the factory, 1960",t:"Free snacks with any drink (around €5 buys you access to the buffet). Best 18:30–20:00.",c:["scary"],r:"g",nn:"San Salvario aperitivo — San Salvario #38",ns:"Il quartiere aperitivo più vivace di Torino — snack gratuiti con le bevande",nst:"Il San Salvario è pieno di bar a prezzi accessibili che offrono stuzzichini con i drinks.",nt:"Snack gratuiti con qualsiasi drink. Meglio 18:30–20:00."},
  {id:39,n:"Murazzi del Po — Vanchiglia #39",a:"Vanchiglia",v:["local","nature","beautiful"],d:19,s:"The Po riverbank below Vanchiglia — sun-bathing on flat stones, fishing, summer terraces",st:"The Murazzi is a long stretch of flat stone embankment along the Po\'s west bank. People sunbathe on the stones, fishermen cast lines, and in summer bar terraces spill to the water\'s edge. Free at all times.",im:"Time-travel: the old Po docks here, boats loading marble and grain for the Savoy factories, 1880",t:"Free always. Summer evenings are the best time.",c:["famous_dead"],r:"g",nn:"Murazzi del Po — Vanchiglia #39",ns:"La riva del Po sotto Vanchiglia — bagni di sole, pesca, terrazze estive",nst:"I Murazzi sono un lungo tratto di argine piano lungo la sponda ovest del Po.",nt:"Sempre gratis. Le serate estive sono il momento migliore."},
  {id:40,n:"Piazza Vittorio Veneto — Vanchiglia #40",a:"Vanchiglia",v:["beautiful","history","architecture"],d:13,s:"One of Europe\'s largest baroque piazzas, sloping toward the Po — and it\'s free to sit in",st:"The massive piazza slopes from the arcaded buildings down to the river. The view from the far end toward the Gran Madre church and the hills of Superga is among Turin\'s best.",im:"Time-travel: the Turin bourgeoisie promenading here on Sunday afternoons, the Alps visible on clear days, 1900",t:"Free always.",c:["street_art"],r:"g",nn:"Piazza Vittorio Veneto — Vanchiglia #40",ns:"Una delle più grandi piazze barocche d\'Europa, che scende verso il Po",nst:"La grande piazza scende dagli edifici porticati fino al fiume.",nt:"Sempre gratis."},
  {id:41,n:"Vanchiglia Street Art Walk — Vanchiglia #41",a:"Vanchiglia",v:["street_art","art","local"],d:52,s:"Turin\'s most concentrated street art neighbourhood — murals by Italian and international artists",st:"Walk Via Lombroso, Corso Brescia, and the backstreets of Vanchiglia for murals by Italian and international artists. All free, all outdoors. The Vanki Festival murals are particularly good.",im:"Time-travel: this as an industrial workers\' quarter before the art arrived, factories humming, 1970",t:"Free always.",c:["abandoned"],r:"g",nn:"Street art a Vanchiglia — Vanchiglia #41",ns:"Il quartiere di street art più concentrato di Torino",nst:"Passeggiata lungo Via Lombroso, Corso Brescia e i vicoli di Vanchiglia.",nt:"Sempre gratis."},
  {id:42,n:"Balon Flea Market — Aurora #42",a:"Aurora",v:["local","free","hidden"],d:11,s:"Every Saturday, Borgo Dora\'s streets become a sprawling flea market — antiques, vinyl, vintage",st:"The Balon fills Via Borgo Dora with antiques, records, vintage clothes, and street food every Saturday. The Gran Balon (second Sunday of each month) doubles in size. Both are free to browse.",im:"Time-travel: the Balon as Turin\'s main rag-and-bone market, the poor buying and selling to survive, 1920",t:"Free. Saturdays all day. Gran Balon: second Sunday of each month.",c:["free_museum"],r:"g",nn:"Balon — Aurora #42",ns:"Ogni sabato, le strade del Borgo Dora diventano un immenso mercatino delle pulci",nst:"Il Balon riempie Via Borgo Dora di antiquariato, dischi e vestiti vintage ogni sabato.",nt:"Gratis. Sabati tutto il giorno."},
  {id:43,n:"OGR Cultural Centre — Aurora #43",a:"Aurora",v:["art","local","architecture"],d:48,s:"The old railway workshops turned cultural hub — free outdoor events and markets in the vast courtyard",st:"The Officine Grandi Riparazioni (old FIAT railway workshops) host free cultural events, outdoor screenings, and markets in their vast brick courtyard. Check their programme — many events are free.",im:"Time-travel: the railway workshops full of mechanics repairing locomotives, the sound of metal on metal, 1910",t:"Courtyard free. Check programme for free events.",c:["local_only"],r:"g",nn:"OGR Torino — Aurora #43",ns:"Le vecchie officine ferroviarie diventate hub culturale",nst:"Le Officine Grandi Riparazioni ospitano eventi culturali gratuiti e mercati.",nt:"Cortile gratuito. Verifica programma eventi gratuiti."},
  {id:44,n:"Crocetta Market Hall — Crocetta #44",a:"Crocetta",v:["local","free","hidden"],d:52,s:"A covered daily market beloved by residents — excellent Piedmont cheeses, truffles in season",st:"The Mercato della Crocetta on Piazza Madama Cristina is a covered daily market. Excellent Piedmont cheeses, truffles in season, the cheapest espresso in the area at the bar inside. A genuine neighbourhood institution.",im:"Time-travel: Crocetta as the residential quarter of Turin\'s professional class — lawyers buying dinner here, 1950",t:"Free. Open Mon–Sat mornings and early afternoons.",c:["architecture"],r:"g",nn:"Mercato Crocetta — Crocetta #44",ns:"Un mercato coperto amato dai residenti — eccellenti formaggi piemontesi",nst:"Il Mercato della Crocetta è un mercato coperto quotidiano.",nt:"Gratis. Aperto Lun–Sab mattino."},
  {id:45,n:"Villa della Regina Terraces — Crocetta #45",a:"Crocetta",v:["beautiful","history","nature"],d:39,s:"The UNESCO terraced gardens of a 17th-century Savoy villa — panoramic view over the Po plain",st:"The terraced gardens of Villa della Regina are open on selected days. The view from the terraces over the Po plain and the Alps on clear days is extraordinary.",im:"Time-travel: the Savoy princes retreating to these terraces above the city dust in summer, 1720",t:"Check opening days (sporadic). Free entry when open.",c:["history_big"],r:"g",nn:"Villa della Regina — Crocetta #45",ns:"I giardini terrazzati UNESCO di una villa sabauda del XVII secolo",nst:"I giardini terrazzati della Villa della Regina sono aperti in giorni selezionati.",nt:"Verifica i giorni di apertura. Ingresso gratuito quando aperto."},
  {id:46,n:"Monte dei Cappuccini — Borgo Po #46",a:"Borgo Po",v:["beautiful","high_spots","history"],d:10,s:"A small hill rising from the Po — climb it for the best panorama in Turin",st:"Monte dei Cappuccini rises from the Po\'s east bank, topped by a 16th-century Capuchin church. From the summit: the whole city, the Po, Superga, and the Alps on clear days. Free to climb anytime.",im:"Time-travel: the Capuchin friars establishing their monastery on this hill, deliberately above the city, 1580",t:"Free. Walk up from the Gran Madre bridge. 10 minutes.",c:["high_spots"],r:"g",nn:"Monte dei Cappuccini — Borgo Po #46",ns:"Una piccola collina sul Po — salila per il miglior panorama di Torino",nst:"Il Monte dei Cappuccini si alza dalla sponda est del Po.",nt:"Gratis. Sale dalla Gran Madre. 10 minuti."},
  {id:47,n:"Via Po Porticoes — Borgo Po #47",a:"Borgo Po",v:["architecture","beautiful","local"],d:42,s:"Turin\'s 18 km of porticoes — walk Via Po from Piazza Castello to the river under cover",st:"Via Po\'s covered arcade runs from Piazza Castello to the river, lined with bookshops, antique dealers, and old-fashioned cafés. Turin\'s porticoes total 18 km — among Europe\'s longest. Free to walk.",im:"Time-travel: the Turin porticoes as revolutionary infrastructure — walking without getting wet or cold, 1750",t:"Free. Always open.",c:["parks"],r:"g",nn:"Portici di Via Po — Borgo Po #47",ns:"18 km di portici — percorri Via Po da Piazza Castello al fiume al coperto",nst:"I portici di Via Po corrono da Piazza Castello al fiume.",nt:"Gratis. Sempre aperto."},
  {id:48,n:"Gran Madre di Dio Church — Borgo Po #48",a:"Borgo Po",v:["architecture","beautiful","history"],d:32,s:"A Pantheon-inspired neoclassical church on the Po\'s east bank — climb the steps for the view",st:"The Gran Madre di Dio was built in 1831 to celebrate Napoleon\'s defeat. It sits at the end of the Vittorio Veneto axis. Climb the broad steps for a famous view back across the piazza.",im:"Time-travel: the citizenry celebrating the defeat of Napoleon by laying this church\'s foundation, 1818",t:"Free. Open daily. The steps alone are worth the visit.",c:["courtyards"],r:"g",nn:"Gran Madre di Dio — Borgo Po #48",ns:"Una chiesa neoclassica ispirata al Pantheon — sali i gradini per la vista",nst:"La Gran Madre di Dio fu costruita nel 1831 per celebrare la sconfitta di Napoleone.",nt:"Gratis. Aperta quotidianamente."},
  {id:49,n:"Moncalieri Castle Grounds — Moncalieri #49",a:"Moncalieri",v:["history","beautiful","hidden"],d:7,s:"A massive Savoy castle on the hill above Moncalieri — village and hillside paths free anytime",st:"The Castello di Moncalieri dominates the hill above the Po. Once a royal residence, the castle now has guided visits. The surrounding village streets and hillside paths are free to walk at any time.",im:"Time-travel: the Savoy court moving between Turin and Moncalieri with the seasons, 1750",t:"Free outside. Castle interior has guided visits (€8). Village free.",c:["romantic_water"],r:"g",nn:"Castello di Moncalieri — Moncalieri #49",ns:"Un imponente castello sabaudo sulla collina sopra Moncalieri",nst:"Il Castello di Moncalieri domina la collina sopra il Po.",nt:"Gratis fuori. Interno con visita guidata (8 €)."},
  {id:50,n:"Moncalieri Saturday Market — Moncalieri #50",a:"Moncalieri",v:["local","free","hidden"],d:6,s:"Every Saturday morning — a local market calmer and cheaper than Turin city markets, 15 min by bus",st:"The Saturday market fills Moncalieri\'s main piazza with fresh produce, cheese vendors, and local street food. Calmer and cheaper than the Turin city markets. Good for cheap Piedmont specialities.",im:"Time-travel: Moncalieri\'s farmers selling surplus to the castle servants every Saturday morning, 1800",t:"Free. Bus 67 from Turin centre. Saturdays only.",c:["scary"],r:"g",nn:"Mercato Moncalieri — Moncalieri #50",ns:"Ogni sabato mattina — un mercato più tranquillo e economico di quelli di Torino",nst:"Il mercato del sabato riempie la piazza principale di Moncalieri.",nt:"Gratis. Bus 67 da Torino. Solo sabati."},
  {id:51,n:"Stupinigi Palace Park — Stupinigi #51",a:"Stupinigi",v:["nature","history","beautiful"],d:10,s:"A UNESCO World Heritage Savoy residence with an enormous baroque park and deer",st:"The Palazzina di Caccia di Stupinigi is one of the most beautiful buildings in Italy. Entry to the main palace costs €12, but the outer park and approach avenues are free to walk at any time. Deer roam the forests.",im:"Time-travel: the Savoy king setting out from this palace at dawn for a day\'s hunting in the royal forest, 1720",t:"Park free. Palace entry €12. Deer visible in the forested avenues.",c:["famous_dead"],r:"g",nn:"Parco della Palazzina di Stupinigi — Stupinigi #51",ns:"Una residenza sabauda Patrimonio UNESCO con un immenso parco barocco e cervi",nst:"La Palazzina di Caccia di Stupinigi è uno degli edifici più belli d\'Italia.",nt:"Parco gratis. Palazzo 12 €."},
  {id:52,n:"Stupinigi Deer Forest Walk — Stupinigi #52",a:"Stupinigi",v:["nature","local","hidden"],d:18,s:"Morning walks in the nature reserve where hundreds of deer roam the beech avenues",st:"The forested reserve around the Stupinigi palace is home to hundreds of free-roaming deer. Morning and evening walks through the beech avenues are free; deer are often visible from the paths.",im:"Time-travel: the royal hunting parties harvesting deer from these woods for the court banquets, 1760",t:"Free. Enter from the park approach avenues. Best at dawn and dusk.",c:["street_art"],r:"g",nn:"Riserva di Stupinigi — Stupinigi #52",ns:"Passeggiate mattutine nella riserva dove centinaia di cervi vagano per i viali",nst:"La riserva forestale attorno alla palazzina ospita centinaia di cervi liberi.",nt:"Gratis. Alba e tramonto sono i momenti migliori."},
  {id:53,n:"Quadrilatero Romano Walk — Centro Storico #53",a:"Centro Storico",v:["history","architecture","local"],d:19,s:"Turin\'s oldest quarter follows the Roman grid — walk Via Garibaldi, Europe\'s longest pedestrian street",st:"The Quadrilatero Romano follows the Roman street plan. Walk Via Garibaldi (pedestrian for 1.2 km), Via della Basilica (covered market), and the medieval Torre dei due Frati. All free.",im:"Time-travel: the Roman colony of Augusta Taurinorum laid out in this exact grid, 28 BC",t:"Free always.",c:["abandoned"],r:"g",nn:"Quadrilatero Romano — Centro Storico #53",ns:"Il quartiere più antico di Torino segue la griglia romana",nst:"Il Quadrilatero Romano segue il piano stradale romano.",nt:"Sempre gratis."},
  {id:54,n:"Piazza San Carlo — Centro Storico #54",a:"Centro Storico",v:["beautiful","architecture","history"],d:37,s:"Called Turin\'s drawing room — twin baroque churches, equestrian statue, and free steps to sit on",st:"Piazza San Carlo is flanked by two identical baroque churches and centred on the bronze equestrian statue of Emanuele Filiberto. The cafés under the porticoes are expensive, but sitting on the steps costs nothing.",im:"Time-travel: the Spanish gallop infantry drilling on this piazza when it was a military parade ground, 1650",t:"Free. Always open.",c:["free_museum"],r:"g",nn:"Piazza San Carlo — Centro Storico #54",ns:"Il salotto di Torino — due chiese barocche gemelle, statua equestre, gradini gratis",nst:"Piazza San Carlo è affiancata da due chiese barocche identiche.",nt:"Gratis. Sempre aperta."},
  {id:55,n:"Superga Hilltop Walk — Borgo Po #55",a:"Borgo Po",v:["nature","high_spots","history"],d:43,s:"Take the historic rack tram up to Superga at 670 m — sweeping Alps panorama, free esplanade",st:"The historic GTT rack tram climbs to the Basilica di Superga at 670 m (or walk 1 hour through woodland). At the top: sweeping Alps panorama and the royal crypt. Free access to the esplanade.",im:"Time-travel: the same rack tram carrying Turin Sunday families up for the fresh air, 1905",t:"Rack tram uses a standard city ticket. Walk from Sassi takes 1 hour. Esplanade free.",c:["local_only"],r:"g",nn:"Superga — Borgo Po #55",ns:"Prendi il tram a cremagliera storico fino a Superga a 670 m",nst:"Il tram a cremagliera GTT sale alla Basilica di Superga a 670 m.",nt:"Tram con biglietto ordinario. A piedi da Sassi 1 ora. Spianata gratuita."},
  {id:56,n:"Parco Michelotti — Borgo Po #56",a:"Borgo Po",v:["nature","local","quiet"],d:6,s:"The quieter east-bank Po park — preferred by local joggers and cyclists, far from tourist trail",st:"Parco Michelotti runs along the Po\'s east bank, quieter than Valentino. Preferred by local joggers and dog walkers. The towpath continues for kilometres. Almost no tourists.",im:"Time-travel: the east bank as working docks and textile factories before the park was made, 1920",t:"Free. Open always.",c:["architecture"],r:"g",nn:"Parco Michelotti — Borgo Po #56",ns:"Il parco sulla sponda est del Po — preferito dai corridori locali",nst:"Parco Michelotti corre lungo la sponda est del Po.",nt:"Gratis. Sempre aperto."},
  {id:57,n:"Piazza della Repubblica Morning Market — Centro Storico #57",a:"Centro Storico",v:["local","free","history"],d:40,s:"The daily morning market at Porta Palazzo\'s outer piazza — cheapest breakfast in Turin",st:"Before the main Porta Palazzo market opens, the outer edges of Piazza della Repubblica fill with fruit and vegetable sellers, espresso carts, and street food from 6am. The cheapest food in the city centre.",im:"Time-travel: this piazza as a Roman road intersection at the edge of Augusta Taurinorum, 100 AD",t:"Free. Arrives from 6am, peaks around 8–10am. Tue–Sat.",c:["history_big"],r:"g",nn:"Piazza della Repubblica mattina — Centro Storico #57",ns:"Il mercato mattutino quotidiano — la colazione più economica di Torino",nst:"Prima dell\'apertura del mercato principale, i bordi della piazza si riempiono di venditori.",nt:"Gratis. Dalle 6, meglio 8–10. Mar–Sab."},
  {id:58,n:"Il Balon Flea Market — Aurora #58",a:"Aurora",v:["local","weird","free"],d:17,s:"One of Italy\'s best flea markets — every Saturday in Borgo Dora, dealers who know every object in the pile",st:"Il Balon runs every Saturday in Borgo Dora, just north of Porta Palazzo. Vintage furniture, 1950s posters, Soviet cameras, broken clocks. The Gran Balon on the second Sunday of the month is even bigger. Free to browse.",im:"Time-travel: the rag-and-bone men of Borgo Dora trading salvage from demolished Turin buildings in the 1920s",t:"Free. Saturdays from 7am. Borgo Dora, north of Porta Palazzo.",c:["high_spots"],r:"g",nn:"Il Balon mercatino — Aurora #58",ns:"Uno dei migliori mercati delle pulci d\'Italia — ogni sabato nel Borgo Dora",nst:"Il Balon si tiene ogni sabato nel Borgo Dora, appena a nord di Porta Palazzo. Mobili vintage, poster anni \'50, macchine fotografiche sovietiche.",nt:"Gratis. Sabato dalle 7. Borgo Dora, a nord di Porta Palazzo."},
  {id:59,n:"Parco Dora Industrial Park — Aurora #59",a:"Aurora",v:["weird","art","free"],d:50,s:"A park built inside a rusting Fiat factory — steel arches 30m high, skaters, wildflowers through the concrete",st:"When the Fiat Ferriere plant closed, the city left the industrial structures and built a park around them. Huge steel arches, old rail tracks, rusting cranes. Wildflowers grow through the cracks. It looks like a sci-fi film set.",im:"Time-travel: the Fiat Ferriere plant at full production in 1960, 3,000 workers inside these buildings",t:"Free. Open daily. Tram 3 or 9, Corso Mortara stop.",c:["parks"],r:"g",nn:"Parco Dora — Aurora #59",ns:"Un parco costruito dentro una fabbrica Fiat arrugginita — archi di acciaio di 30m, skater, fiori selvatici nel cemento",nst:"Quando lo stabilimento Fiat Ferriere chiuse, la città lasciò le strutture industriali e costruì un parco intorno a esse.",nt:"Gratis. Aperto ogni giorno. Tram 3 o 9, fermata Corso Mortara."},
  {id:60,n:"Monte dei Cappuccini Viewpoint — Borgo Po #60",a:"Borgo Po",v:["beautiful","hidden","free"],d:46,s:"Turin\'s best free panorama — the Alps, the Po, the Mole Antonelliana, all in one view from a Capuchin hilltop",st:"The Capuchin monastery sits on a small hill directly above Piazza Vittorio Veneto. The walk up is 10 minutes. The terrace in front of the church has the definitive Turin panorama — the Alps sharp behind the city on clear days.",im:"Time-travel: Capuchin monks watching the Austrian army approach Turin from this exact hilltop in 1706",t:"Free. Walk up from Piazza Vittorio Veneto, follow the signs to the monastery.",c:["courtyards"],r:"g",nn:"Monte dei Cappuccini — Borgo Po #60",ns:"Il miglior panorama gratuito di Torino — le Alpi, il Po, la Mole Antonelliana in un solo sguardo",nst:"Il monastero cappuccino sorge su una piccola collina sopra Piazza Vittorio Veneto. La terrazza ha il panorama definitivo di Torino.",nt:"Gratis. Salire da Piazza Vittorio Veneto seguendo i segnali del monastero."},
  {id:61,n:"Parco del Valentino Riverside — Centro Storico #61",a:"Centro Storico",v:["beautiful","local","free"],d:49,s:"Turin\'s great riverside park with a fake Medieval castle inside — free, enormous, the city on its Sunday best",st:"Valentino runs 2km along the Po south of the centre. Inside there is a full-scale reproduction of a medieval castle and village built for the 1884 exhibition. On Sundays half of Turin is here.",im:"Time-travel: the 1884 Esposizione Generale Italiana unveiling the fake Medieval Castle, Turin presenting itself as industrial and historical at once",t:"Free. Tram 9 to Piazza Vittorio then walk south along the river.",c:["romantic_water"],r:"g",nn:"Parco del Valentino — Centro Storico #61",ns:"Il grande parco fluviale di Torino con un castello medievale falso dentro — gratuito, enorme, la città alla sua domenica migliore",nst:"Il Valentino si estende per 2 km lungo il Po. All\'interno c\'è una riproduzione in scala reale di un castello medievale costruita per l\'esposizione del 1884.",nt:"Gratis. Tram 9 fino a Piazza Vittorio poi camminare verso sud lungo il fiume."},
  {id:62,n:"Hidden Courtyards (Portoni) Walk — Centro Storico #62",a:"Centro Storico",v:["hidden","architecture","local"],d:39,s:"Push open the big palazzo doors on Via Po and find an entire hidden city of internal courtyards",st:"Turin\'s grand palazzi have enormous wooden portoni gates. Many open to the public during the day. Behind them are arcaded courtyards, internal streets, private gardens. The whole historic centre has a parallel world inside.",im:"Time-travel: these same courtyards in 1800, the palazzo residents emerging onto private arcades above the street noise",t:"Free. Try Via Po, Via Roma, Via Lagrange. Push gently. Most are open 9am–7pm.",c:["scary"],r:"g",nn:"Cortili nascosti (Portoni) — Centro Storico #62",ns:"Spingi i grandi portoni dei palazzi in Via Po e trova un\'intera città nascosta di cortili interni",nst:"I grandi palazzi di Torino hanno enormi portoni in legno. Molti sono aperti al pubblico durante il giorno. Dietro ci sono cortili con portici.",nt:"Gratis. Prova Via Po, Via Roma, Via Lagrange. Spingi delicatamente. La maggior parte aperta 9-19."},
  {id:63,n:"Piazza Vittorio Veneto Night Arcades — Centro Storico #63",a:"Centro Storico",v:["beautiful","night","free"],d:31,s:"The largest baroque square in Europe at night — Via Po arcades, gelato, the river at the end of the street",st:"Piazza Vittorio Veneto is enormous. At night the arcades of Via Po fill with students and the square itself is lit from the Monte dei Cappuccini hill. Walk down to the Po bridge and back. One euro gelato available.",im:"Time-travel: the newly completed Piazza Vittorio Veneto in 1830, Napoleon\'s engineers having just finished Turin\'s grandest public space",t:"Free. Every night. Via Po runs straight to the square from Piazza Castello.",c:["famous_dead"],r:"g",nn:"Piazza Vittorio Veneto di notte — Centro Storico #63",ns:"La piazza barocca più grande d\'Europa di notte — portici di Via Po, gelato, il fiume in fondo alla strada",nst:"Piazza Vittorio Veneto è enorme. Di notte i portici di Via Po si riempiono di studenti e la piazza è illuminata dalla collina dei Cappuccini.",nt:"Gratis. Ogni sera. Via Po porta direttamente alla piazza da Piazza Castello."},
  {id:64,n:"Sacra di San Michele Mountain Abbey — Stupinigi #64",a:"Stupinigi",v:["history","beautiful","architecture"],d:19,s:"A Gothic abbey perched on a 1000m peak 35km west — the inspiration for Umberto Eco\'s The Name of the Rose",st:"The Sacra di San Michele was begun in 983 and sits at the top of Monte Pirchiriano. The view from the top is straight down the Susa Valley. The Gothic entrance staircase is one of the most dramatic in Italy. Reachable by bus from Turin.",im:"Time-travel: Benedictine monks completing the first stone tower in 987, the Alps rising around them",t:"Small entry fee. Bus 36 from Corso Francia to Sant\'Ambrogio then walk 45 min up.",c:["street_art"],r:"g",nn:"Sacra di San Michele — Stupinigi #64",ns:"Un\'abbazia gotica su una vetta di 1000m — l\'ispirazione per Il Nome della Rosa di Eco",nst:"La Sacra di San Michele fu iniziata nel 983 e siede in cima al Monte Pirchiriano. La scala gotica d\'ingresso è tra le più drammatiche d\'Italia.",nt:"Piccolo costo. Bus 36 da Corso Francia fino a Sant\'Ambrogio poi 45 min a piedi."},
  {id:65,n:"Piazza Castello — Centro Storico #65",a:"Centro Storico",v:["beautiful","history","architecture"],d:33,s:"Turin\'s grand baroque heart — Palazzo Reale, Palazzo Madama, and Teatro Regio all meet here",st:"The piazza is always open and free. Walk the arcaded porticoes that shelter you in any weather. Palazzo Madama straddles the gap between Roman gate and baroque palace — two thousand years of history in one building.",im:"Time-travel: the Savoy court processing from the Royal Palace to the theatre across this square, 1750",t:"Free always. Best in morning light before tour groups arrive.",c:["abandoned"],r:"g",nn:"Piazza Castello — Centro Storico #65",ns:"Il cuore barocco di Torino — Palazzo Reale, Palazzo Madama e il Teatro Regio",nst:"La piazza è sempre aperta e gratuita. I portici arcuati ti proteggono in ogni stagione.",nt:"Sempre gratis. Meglio la mattina presto."},
  {id:66,n:"Porta Palazzo Market — Centro Storico #66",a:"Centro Storico",v:["local","free","weird"],d:42,s:"Europe\'s largest open-air market fills this sprawling piazza every morning — free to wander",st:"Every Tuesday–Saturday morning, Porta Palazzo becomes a city in motion: hundreds of vendors, immigrants from a dozen countries, mountains of vegetables and secondhand clothing. The energy is extraordinary.",im:"Time-travel: this piazza as the edge of medieval Turin, just outside the city gate, 1600",t:"Free to wander. Tue–Sat mornings. Arrive before 10am for the best atmosphere.",c:["free_museum"],r:"g",nn:"Mercato di Porta Palazzo — Centro Storico #66",ns:"Il più grande mercato all\'aperto d\'Europa riempie questa piazza ogni mattina",nst:"Ogni mattina Martedì–Sabato, Porta Palazzo diventa una città in movimento.",nt:"Gratis. Mar–Sab mattino. Arriva prima delle 10."},
  {id:67,n:"Galleria Subalpina — Centro Storico #67",a:"Centro Storico",v:["beautiful","architecture","quiet"],d:22,s:"A 19th-century glass-roofed arcade with bookshops, a chess café, and ornate ironwork",st:"The Galleria Subalpina connects Piazza Castello to Via Po. Antiquarian bookshops, a chess café, and the ornate 1874 ironwork make it a serene refuge from the city. Free to enter and browse.",im:"Time-travel: Turinese intellectuals meeting in the chess café under this glass roof, 1890",t:"Free. Open during arcade hours. The chess café at the far end is excellent.",c:["local_only"],r:"g",nn:"Galleria Subalpina — Centro Storico #67",ns:"Un\'arcade con tetto in vetro del XIX secolo - librerie antiquarie, caffe degli scacchi",nst:"La Galleria Subalpina collega Piazza Castello a Via Po.",nt:"Gratis. Aperta durante gli orari dell\'arcade."},
  {id:68,n:"Parco del Valentino — San Salvario #68",a:"San Salvario",v:["nature","beautiful","local"],d:5,s:"Turin\'s riverside park along the Po — 500,000 m² of joggers, picnics, and herons",st:"Valentino is Turin\'s main park, running along the Po\'s west bank. Joggers, couples, students, and herons share the riverside. The 1880s Borgo Medievale replica castle is free to view from outside.",im:"Time-travel: the Savoy court using this park as a private hunting ground before the city expanded, 1800",t:"Free. Open always.",c:["architecture"],r:"g",nn:"Parco del Valentino — San Salvario #68",ns:"Il parco lungo il Po di Torino — 500.000 m² di corridori, picnic ed aironi",nst:"Valentino è il parco principale di Torino, lungo la sponda ovest del Po.",nt:"Gratis. Sempre aperto."},
  {id:69,n:"Borgo Medievale — San Salvario #69",a:"San Salvario",v:["history","beautiful","architecture"],d:53,s:"A full-scale reproduction of a 15th-century Piedmontese village, built for the 1884 exhibition",st:"The Borgo Medievale sits inside Valentino Park. It is a faithful copy of a medieval hill village, built as a historical showcase. The exterior and courtyard are free to walk at any time.",im:"Time-travel: the 1884 Exhibition visitors marvelling at this reconstruction, seeing their own medieval past rebuilt, 1884",t:"Free outside. Interior has small entry fee.",c:["history_big"],r:"g",nn:"Borgo Medievale — San Salvario #69",ns:"Una riproduzione in scala reale di un borgo piemontese del XV secolo",nst:"Il Borgo Medievale si trova dentro il Parco del Valentino.",nt:"Gratis fuori. Interno con piccolo biglietto."},
  {id:70,n:"San Salvario Aperitivo — San Salvario #70",a:"San Salvario",v:["local","free","night"],d:15,s:"Turin\'s most vibrant aperitivo neighbourhood — free snacks with drinks, 18:30–20:00",st:"San Salvario around Via Baretti and Via Madama Cristina is packed with affordable bars offering free snacks with evening drinks. Turin invented the aperitivo — and it is still done best here.",im:"Time-travel: the student workers of FIAT stopping here on their way home from the factory, 1960",t:"Free snacks with any drink (around €5 buys you access to the buffet). Best 18:30–20:00.",c:["high_spots"],r:"g",nn:"San Salvario aperitivo — San Salvario #70",ns:"Il quartiere aperitivo più vivace di Torino — snack gratuiti con le bevande",nst:"Il San Salvario è pieno di bar a prezzi accessibili che offrono stuzzichini con i drinks.",nt:"Snack gratuiti con qualsiasi drink. Meglio 18:30–20:00."},
  {id:71,n:"Murazzi del Po — Vanchiglia #71",a:"Vanchiglia",v:["local","nature","beautiful"],d:49,s:"The Po riverbank below Vanchiglia — sun-bathing on flat stones, fishing, summer terraces",st:"The Murazzi is a long stretch of flat stone embankment along the Po\'s west bank. People sunbathe on the stones, fishermen cast lines, and in summer bar terraces spill to the water\'s edge. Free at all times.",im:"Time-travel: the old Po docks here, boats loading marble and grain for the Savoy factories, 1880",t:"Free always. Summer evenings are the best time.",c:["parks"],r:"g",nn:"Murazzi del Po — Vanchiglia #71",ns:"La riva del Po sotto Vanchiglia — bagni di sole, pesca, terrazze estive",nst:"I Murazzi sono un lungo tratto di argine piano lungo la sponda ovest del Po.",nt:"Sempre gratis. Le serate estive sono il momento migliore."},
  {id:72,n:"Piazza Vittorio Veneto — Vanchiglia #72",a:"Vanchiglia",v:["beautiful","history","architecture"],d:32,s:"One of Europe\'s largest baroque piazzas, sloping toward the Po — and it\'s free to sit in",st:"The massive piazza slopes from the arcaded buildings down to the river. The view from the far end toward the Gran Madre church and the hills of Superga is among Turin\'s best.",im:"Time-travel: the Turin bourgeoisie promenading here on Sunday afternoons, the Alps visible on clear days, 1900",t:"Free always.",c:["courtyards"],r:"g",nn:"Piazza Vittorio Veneto — Vanchiglia #72",ns:"Una delle più grandi piazze barocche d\'Europa, che scende verso il Po",nst:"La grande piazza scende dagli edifici porticati fino al fiume.",nt:"Sempre gratis."},
  {id:73,n:"Vanchiglia Street Art Walk — Vanchiglia #73",a:"Vanchiglia",v:["street_art","art","local"],d:26,s:"Turin\'s most concentrated street art neighbourhood — murals by Italian and international artists",st:"Walk Via Lombroso, Corso Brescia, and the backstreets of Vanchiglia for murals by Italian and international artists. All free, all outdoors. The Vanki Festival murals are particularly good.",im:"Time-travel: this as an industrial workers\' quarter before the art arrived, factories humming, 1970",t:"Free always.",c:["romantic_water"],r:"g",nn:"Street art a Vanchiglia — Vanchiglia #73",ns:"Il quartiere di street art più concentrato di Torino",nst:"Passeggiata lungo Via Lombroso, Corso Brescia e i vicoli di Vanchiglia.",nt:"Sempre gratis."},
  {id:74,n:"Balon Flea Market — Aurora #74",a:"Aurora",v:["local","free","hidden"],d:22,s:"Every Saturday, Borgo Dora\'s streets become a sprawling flea market — antiques, vinyl, vintage",st:"The Balon fills Via Borgo Dora with antiques, records, vintage clothes, and street food every Saturday. The Gran Balon (second Sunday of each month) doubles in size. Both are free to browse.",im:"Time-travel: the Balon as Turin\'s main rag-and-bone market, the poor buying and selling to survive, 1920",t:"Free. Saturdays all day. Gran Balon: second Sunday of each month.",c:["scary"],r:"g",nn:"Balon — Aurora #74",ns:"Ogni sabato, le strade del Borgo Dora diventano un immenso mercatino delle pulci",nst:"Il Balon riempie Via Borgo Dora di antiquariato, dischi e vestiti vintage ogni sabato.",nt:"Gratis. Sabati tutto il giorno."},
  {id:75,n:"OGR Cultural Centre — Aurora #75",a:"Aurora",v:["art","local","architecture"],d:14,s:"The old railway workshops turned cultural hub — free outdoor events and markets in the vast courtyard",st:"The Officine Grandi Riparazioni (old FIAT railway workshops) host free cultural events, outdoor screenings, and markets in their vast brick courtyard. Check their programme — many events are free.",im:"Time-travel: the railway workshops full of mechanics repairing locomotives, the sound of metal on metal, 1910",t:"Courtyard free. Check programme for free events.",c:["famous_dead"],r:"g",nn:"OGR Torino — Aurora #75",ns:"Le vecchie officine ferroviarie diventate hub culturale",nst:"Le Officine Grandi Riparazioni ospitano eventi culturali gratuiti e mercati.",nt:"Cortile gratuito. Verifica programma eventi gratuiti."},
  {id:76,n:"Crocetta Market Hall — Crocetta #76",a:"Crocetta",v:["local","free","hidden"],d:18,s:"A covered daily market beloved by residents — excellent Piedmont cheeses, truffles in season",st:"The Mercato della Crocetta on Piazza Madama Cristina is a covered daily market. Excellent Piedmont cheeses, truffles in season, the cheapest espresso in the area at the bar inside. A genuine neighbourhood institution.",im:"Time-travel: Crocetta as the residential quarter of Turin\'s professional class — lawyers buying dinner here, 1950",t:"Free. Open Mon–Sat mornings and early afternoons.",c:["street_art"],r:"g",nn:"Mercato Crocetta — Crocetta #76",ns:"Un mercato coperto amato dai residenti — eccellenti formaggi piemontesi",nst:"Il Mercato della Crocetta è un mercato coperto quotidiano.",nt:"Gratis. Aperto Lun–Sab mattino."},
  {id:77,n:"Villa della Regina Terraces — Crocetta #77",a:"Crocetta",v:["beautiful","history","nature"],d:53,s:"The UNESCO terraced gardens of a 17th-century Savoy villa — panoramic view over the Po plain",st:"The terraced gardens of Villa della Regina are open on selected days. The view from the terraces over the Po plain and the Alps on clear days is extraordinary.",im:"Time-travel: the Savoy princes retreating to these terraces above the city dust in summer, 1720",t:"Check opening days (sporadic). Free entry when open.",c:["abandoned"],r:"g",nn:"Villa della Regina — Crocetta #77",ns:"I giardini terrazzati UNESCO di una villa sabauda del XVII secolo",nst:"I giardini terrazzati della Villa della Regina sono aperti in giorni selezionati.",nt:"Verifica i giorni di apertura. Ingresso gratuito quando aperto."},
  {id:78,n:"Monte dei Cappuccini — Borgo Po #78",a:"Borgo Po",v:["beautiful","high_spots","history"],d:26,s:"A small hill rising from the Po — climb it for the best panorama in Turin",st:"Monte dei Cappuccini rises from the Po\'s east bank, topped by a 16th-century Capuchin church. From the summit: the whole city, the Po, Superga, and the Alps on clear days. Free to climb anytime.",im:"Time-travel: the Capuchin friars establishing their monastery on this hill, deliberately above the city, 1580",t:"Free. Walk up from the Gran Madre bridge. 10 minutes.",c:["free_museum"],r:"g",nn:"Monte dei Cappuccini — Borgo Po #78",ns:"Una piccola collina sul Po — salila per il miglior panorama di Torino",nst:"Il Monte dei Cappuccini si alza dalla sponda est del Po.",nt:"Gratis. Sale dalla Gran Madre. 10 minuti."},
  {id:79,n:"Via Po Porticoes — Borgo Po #79",a:"Borgo Po",v:["architecture","beautiful","local"],d:11,s:"Turin\'s 18 km of porticoes — walk Via Po from Piazza Castello to the river under cover",st:"Via Po\'s covered arcade runs from Piazza Castello to the river, lined with bookshops, antique dealers, and old-fashioned cafés. Turin\'s porticoes total 18 km — among Europe\'s longest. Free to walk.",im:"Time-travel: the Turin porticoes as revolutionary infrastructure — walking without getting wet or cold, 1750",t:"Free. Always open.",c:["local_only"],r:"g",nn:"Portici di Via Po — Borgo Po #79",ns:"18 km di portici — percorri Via Po da Piazza Castello al fiume al coperto",nst:"I portici di Via Po corrono da Piazza Castello al fiume.",nt:"Gratis. Sempre aperto."},
  {id:80,n:"Gran Madre di Dio Church — Borgo Po #80",a:"Borgo Po",v:["architecture","beautiful","history"],d:10,s:"A Pantheon-inspired neoclassical church on the Po\'s east bank — climb the steps for the view",st:"The Gran Madre di Dio was built in 1831 to celebrate Napoleon\'s defeat. It sits at the end of the Vittorio Veneto axis. Climb the broad steps for a famous view back across the piazza.",im:"Time-travel: the citizenry celebrating the defeat of Napoleon by laying this church\'s foundation, 1818",t:"Free. Open daily. The steps alone are worth the visit.",c:["architecture"],r:"g",nn:"Gran Madre di Dio — Borgo Po #80",ns:"Una chiesa neoclassica ispirata al Pantheon — sali i gradini per la vista",nst:"La Gran Madre di Dio fu costruita nel 1831 per celebrare la sconfitta di Napoleone.",nt:"Gratis. Aperta quotidianamente."},
  {id:81,n:"Moncalieri Castle Grounds — Moncalieri #81",a:"Moncalieri",v:["history","beautiful","hidden"],d:29,s:"A massive Savoy castle on the hill above Moncalieri — village and hillside paths free anytime",st:"The Castello di Moncalieri dominates the hill above the Po. Once a royal residence, the castle now has guided visits. The surrounding village streets and hillside paths are free to walk at any time.",im:"Time-travel: the Savoy court moving between Turin and Moncalieri with the seasons, 1750",t:"Free outside. Castle interior has guided visits (€8). Village free.",c:["history_big"],r:"g",nn:"Castello di Moncalieri — Moncalieri #81",ns:"Un imponente castello sabaudo sulla collina sopra Moncalieri",nst:"Il Castello di Moncalieri domina la collina sopra il Po.",nt:"Gratis fuori. Interno con visita guidata (8 €)."},
  {id:82,n:"Moncalieri Saturday Market — Moncalieri #82",a:"Moncalieri",v:["local","free","hidden"],d:11,s:"Every Saturday morning — a local market calmer and cheaper than Turin city markets, 15 min by bus",st:"The Saturday market fills Moncalieri\'s main piazza with fresh produce, cheese vendors, and local street food. Calmer and cheaper than the Turin city markets. Good for cheap Piedmont specialities.",im:"Time-travel: Moncalieri\'s farmers selling surplus to the castle servants every Saturday morning, 1800",t:"Free. Bus 67 from Turin centre. Saturdays only.",c:["high_spots"],r:"g",nn:"Mercato Moncalieri — Moncalieri #82",ns:"Ogni sabato mattina — un mercato più tranquillo e economico di quelli di Torino",nst:"Il mercato del sabato riempie la piazza principale di Moncalieri.",nt:"Gratis. Bus 67 da Torino. Solo sabati."},
  {id:83,n:"Stupinigi Palace Park — Stupinigi #83",a:"Stupinigi",v:["nature","history","beautiful"],d:27,s:"A UNESCO World Heritage Savoy residence with an enormous baroque park and deer",st:"The Palazzina di Caccia di Stupinigi is one of the most beautiful buildings in Italy. Entry to the main palace costs €12, but the outer park and approach avenues are free to walk at any time. Deer roam the forests.",im:"Time-travel: the Savoy king setting out from this palace at dawn for a day\'s hunting in the royal forest, 1720",t:"Park free. Palace entry €12. Deer visible in the forested avenues.",c:["parks"],r:"g",nn:"Parco della Palazzina di Stupinigi — Stupinigi #83",ns:"Una residenza sabauda Patrimonio UNESCO con un immenso parco barocco e cervi",nst:"La Palazzina di Caccia di Stupinigi è uno degli edifici più belli d\'Italia.",nt:"Parco gratis. Palazzo 12 €."},
  {id:84,n:"Stupinigi Deer Forest Walk — Stupinigi #84",a:"Stupinigi",v:["nature","local","hidden"],d:27,s:"Morning walks in the nature reserve where hundreds of deer roam the beech avenues",st:"The forested reserve around the Stupinigi palace is home to hundreds of free-roaming deer. Morning and evening walks through the beech avenues are free; deer are often visible from the paths.",im:"Time-travel: the royal hunting parties harvesting deer from these woods for the court banquets, 1760",t:"Free. Enter from the park approach avenues. Best at dawn and dusk.",c:["courtyards"],r:"g",nn:"Riserva di Stupinigi — Stupinigi #84",ns:"Passeggiate mattutine nella riserva dove centinaia di cervi vagano per i viali",nst:"La riserva forestale attorno alla palazzina ospita centinaia di cervi liberi.",nt:"Gratis. Alba e tramonto sono i momenti migliori."},
  {id:85,n:"Quadrilatero Romano Walk — Centro Storico #85",a:"Centro Storico",v:["history","architecture","local"],d:43,s:"Turin\'s oldest quarter follows the Roman grid — walk Via Garibaldi, Europe\'s longest pedestrian street",st:"The Quadrilatero Romano follows the Roman street plan. Walk Via Garibaldi (pedestrian for 1.2 km), Via della Basilica (covered market), and the medieval Torre dei due Frati. All free.",im:"Time-travel: the Roman colony of Augusta Taurinorum laid out in this exact grid, 28 BC",t:"Free always.",c:["romantic_water"],r:"g",nn:"Quadrilatero Romano — Centro Storico #85",ns:"Il quartiere più antico di Torino segue la griglia romana",nst:"Il Quadrilatero Romano segue il piano stradale romano.",nt:"Sempre gratis."},
  {id:86,n:"Piazza San Carlo — Centro Storico #86",a:"Centro Storico",v:["beautiful","architecture","history"],d:21,s:"Called Turin\'s drawing room — twin baroque churches, equestrian statue, and free steps to sit on",st:"Piazza San Carlo is flanked by two identical baroque churches and centred on the bronze equestrian statue of Emanuele Filiberto. The cafés under the porticoes are expensive, but sitting on the steps costs nothing.",im:"Time-travel: the Spanish gallop infantry drilling on this piazza when it was a military parade ground, 1650",t:"Free. Always open.",c:["scary"],r:"g",nn:"Piazza San Carlo — Centro Storico #86",ns:"Il salotto di Torino — due chiese barocche gemelle, statua equestre, gradini gratis",nst:"Piazza San Carlo è affiancata da due chiese barocche identiche.",nt:"Gratis. Sempre aperta."},
  {id:87,n:"Superga Hilltop Walk — Borgo Po #87",a:"Borgo Po",v:["nature","high_spots","history"],d:7,s:"Take the historic rack tram up to Superga at 670 m — sweeping Alps panorama, free esplanade",st:"The historic GTT rack tram climbs to the Basilica di Superga at 670 m (or walk 1 hour through woodland). At the top: sweeping Alps panorama and the royal crypt. Free access to the esplanade.",im:"Time-travel: the same rack tram carrying Turin Sunday families up for the fresh air, 1905",t:"Rack tram uses a standard city ticket. Walk from Sassi takes 1 hour. Esplanade free.",c:["famous_dead"],r:"g",nn:"Superga — Borgo Po #87",ns:"Prendi il tram a cremagliera storico fino a Superga a 670 m",nst:"Il tram a cremagliera GTT sale alla Basilica di Superga a 670 m.",nt:"Tram con biglietto ordinario. A piedi da Sassi 1 ora. Spianata gratuita."},
  {id:88,n:"Parco Michelotti — Borgo Po #88",a:"Borgo Po",v:["nature","local","quiet"],d:51,s:"The quieter east-bank Po park — preferred by local joggers and cyclists, far from tourist trail",st:"Parco Michelotti runs along the Po\'s east bank, quieter than Valentino. Preferred by local joggers and dog walkers. The towpath continues for kilometres. Almost no tourists.",im:"Time-travel: the east bank as working docks and textile factories before the park was made, 1920",t:"Free. Open always.",c:["street_art"],r:"g",nn:"Parco Michelotti — Borgo Po #88",ns:"Il parco sulla sponda est del Po — preferito dai corridori locali",nst:"Parco Michelotti corre lungo la sponda est del Po.",nt:"Gratis. Sempre aperto."},
  {id:89,n:"Piazza della Repubblica Morning Market — Centro Storico #89",a:"Centro Storico",v:["local","free","history"],d:34,s:"The daily morning market at Porta Palazzo\'s outer piazza — cheapest breakfast in Turin",st:"Before the main Porta Palazzo market opens, the outer edges of Piazza della Repubblica fill with fruit and vegetable sellers, espresso carts, and street food from 6am. The cheapest food in the city centre.",im:"Time-travel: this piazza as a Roman road intersection at the edge of Augusta Taurinorum, 100 AD",t:"Free. Arrives from 6am, peaks around 8–10am. Tue–Sat.",c:["abandoned"],r:"g",nn:"Piazza della Repubblica mattina — Centro Storico #89",ns:"Il mercato mattutino quotidiano — la colazione più economica di Torino",nst:"Prima dell\'apertura del mercato principale, i bordi della piazza si riempiono di venditori.",nt:"Gratis. Dalle 6, meglio 8–10. Mar–Sab."},
  {id:90,n:"Il Balon Flea Market — Aurora #90",a:"Aurora",v:["local","weird","free"],d:39,s:"One of Italy\'s best flea markets — every Saturday in Borgo Dora, dealers who know every object in the pile",st:"Il Balon runs every Saturday in Borgo Dora, just north of Porta Palazzo. Vintage furniture, 1950s posters, Soviet cameras, broken clocks. The Gran Balon on the second Sunday of the month is even bigger. Free to browse.",im:"Time-travel: the rag-and-bone men of Borgo Dora trading salvage from demolished Turin buildings in the 1920s",t:"Free. Saturdays from 7am. Borgo Dora, north of Porta Palazzo.",c:["free_museum"],r:"g",nn:"Il Balon mercatino — Aurora #90",ns:"Uno dei migliori mercati delle pulci d\'Italia — ogni sabato nel Borgo Dora",nst:"Il Balon si tiene ogni sabato nel Borgo Dora, appena a nord di Porta Palazzo. Mobili vintage, poster anni \'50, macchine fotografiche sovietiche.",nt:"Gratis. Sabato dalle 7. Borgo Dora, a nord di Porta Palazzo."},
  {id:91,n:"Parco Dora Industrial Park — Aurora #91",a:"Aurora",v:["weird","art","free"],d:12,s:"A park built inside a rusting Fiat factory — steel arches 30m high, skaters, wildflowers through the concrete",st:"When the Fiat Ferriere plant closed, the city left the industrial structures and built a park around them. Huge steel arches, old rail tracks, rusting cranes. Wildflowers grow through the cracks. It looks like a sci-fi film set.",im:"Time-travel: the Fiat Ferriere plant at full production in 1960, 3,000 workers inside these buildings",t:"Free. Open daily. Tram 3 or 9, Corso Mortara stop.",c:["local_only"],r:"g",nn:"Parco Dora — Aurora #91",ns:"Un parco costruito dentro una fabbrica Fiat arrugginita — archi di acciaio di 30m, skater, fiori selvatici nel cemento",nst:"Quando lo stabilimento Fiat Ferriere chiuse, la città lasciò le strutture industriali e costruì un parco intorno a esse.",nt:"Gratis. Aperto ogni giorno. Tram 3 o 9, fermata Corso Mortara."},
  {id:92,n:"Monte dei Cappuccini Viewpoint — Borgo Po #92",a:"Borgo Po",v:["beautiful","hidden","free"],d:29,s:"Turin\'s best free panorama — the Alps, the Po, the Mole Antonelliana, all in one view from a Capuchin hilltop",st:"The Capuchin monastery sits on a small hill directly above Piazza Vittorio Veneto. The walk up is 10 minutes. The terrace in front of the church has the definitive Turin panorama — the Alps sharp behind the city on clear days.",im:"Time-travel: Capuchin monks watching the Austrian army approach Turin from this exact hilltop in 1706",t:"Free. Walk up from Piazza Vittorio Veneto, follow the signs to the monastery.",c:["architecture"],r:"g",nn:"Monte dei Cappuccini — Borgo Po #92",ns:"Il miglior panorama gratuito di Torino — le Alpi, il Po, la Mole Antonelliana in un solo sguardo",nst:"Il monastero cappuccino sorge su una piccola collina sopra Piazza Vittorio Veneto. La terrazza ha il panorama definitivo di Torino.",nt:"Gratis. Salire da Piazza Vittorio Veneto seguendo i segnali del monastero."},
