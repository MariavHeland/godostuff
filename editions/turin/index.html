  {id:93,n:"Parco del Valentino Riverside — Centro Storico #93",a:"Centro Storico",v:["beautiful","local","free"],d:10,s:"Turin\'s great riverside park with a fake Medieval castle inside — free, enormous, the city on its Sunday best",st:"Valentino runs 2km along the Po south of the centre. Inside there is a full-scale reproduction of a medieval castle and village built for the 1884 exhibition. On Sundays half of Turin is here.",im:"Time-travel: the 1884 Esposizione Generale Italiana unveiling the fake Medieval Castle, Turin presenting itself as industrial and historical at once",t:"Free. Tram 9 to Piazza Vittorio then walk south along the river.",c:["history_big"],r:"g",nn:"Parco del Valentino — Centro Storico #93",ns:"Il grande parco fluviale di Torino con un castello medievale falso dentro — gratuito, enorme, la città alla sua domenica migliore",nst:"Il Valentino si estende per 2 km lungo il Po. All\'interno c\'è una riproduzione in scala reale di un castello medievale costruita per l\'esposizione del 1884.",nt:"Gratis. Tram 9 fino a Piazza Vittorio poi camminare verso sud lungo il fiume."},
  {id:94,n:"Hidden Courtyards (Portoni) Walk — Centro Storico #94",a:"Centro Storico",v:["hidden","architecture","local"],d:40,s:"Push open the big palazzo doors on Via Po and find an entire hidden city of internal courtyards",st:"Turin\'s grand palazzi have enormous wooden portoni gates. Many open to the public during the day. Behind them are arcaded courtyards, internal streets, private gardens. The whole historic centre has a parallel world inside.",im:"Time-travel: these same courtyards in 1800, the palazzo residents emerging onto private arcades above the street noise",t:"Free. Try Via Po, Via Roma, Via Lagrange. Push gently. Most are open 9am–7pm.",c:["high_spots"],r:"g",nn:"Cortili nascosti (Portoni) — Centro Storico #94",ns:"Spingi i grandi portoni dei palazzi in Via Po e trova un\'intera città nascosta di cortili interni",nst:"I grandi palazzi di Torino hanno enormi portoni in legno. Molti sono aperti al pubblico durante il giorno. Dietro ci sono cortili con portici.",nt:"Gratis. Prova Via Po, Via Roma, Via Lagrange. Spingi delicatamente. La maggior parte aperta 9-19."},
  {id:95,n:"Piazza Vittorio Veneto Night Arcades — Centro Storico #95",a:"Centro Storico",v:["beautiful","night","free"],d:23,s:"The largest baroque square in Europe at night — Via Po arcades, gelato, the river at the end of the street",st:"Piazza Vittorio Veneto is enormous. At night the arcades of Via Po fill with students and the square itself is lit from the Monte dei Cappuccini hill. Walk down to the Po bridge and back. One euro gelato available.",im:"Time-travel: the newly completed Piazza Vittorio Veneto in 1830, Napoleon\'s engineers having just finished Turin\'s grandest public space",t:"Free. Every night. Via Po runs straight to the square from Piazza Castello.",c:["parks"],r:"g",nn:"Piazza Vittorio Veneto di notte — Centro Storico #95",ns:"La piazza barocca più grande d\'Europa di notte — portici di Via Po, gelato, il fiume in fondo alla strada",nst:"Piazza Vittorio Veneto è enorme. Di notte i portici di Via Po si riempiono di studenti e la piazza è illuminata dalla collina dei Cappuccini.",nt:"Gratis. Ogni sera. Via Po porta direttamente alla piazza da Piazza Castello."},
  {id:96,n:"Sacra di San Michele Mountain Abbey — Stupinigi #96",a:"Stupinigi",v:["history","beautiful","architecture"],d:45,s:"A Gothic abbey perched on a 1000m peak 35km west — the inspiration for Umberto Eco\'s The Name of the Rose",st:"The Sacra di San Michele was begun in 983 and sits at the top of Monte Pirchiriano. The view from the top is straight down the Susa Valley. The Gothic entrance staircase is one of the most dramatic in Italy. Reachable by bus from Turin.",im:"Time-travel: Benedictine monks completing the first stone tower in 987, the Alps rising around them",t:"Small entry fee. Bus 36 from Corso Francia to Sant\'Ambrogio then walk 45 min up.",c:["courtyards"],r:"g",nn:"Sacra di San Michele — Stupinigi #96",ns:"Un\'abbazia gotica su una vetta di 1000m — l\'ispirazione per Il Nome della Rosa di Eco",nst:"La Sacra di San Michele fu iniziata nel 983 e siede in cima al Monte Pirchiriano. La scala gotica d\'ingresso è tra le più drammatiche d\'Italia.",nt:"Piccolo costo. Bus 36 da Corso Francia fino a Sant\'Ambrogio poi 45 min a piedi."},
  {id:97,n:"Piazza Castello — Centro Storico #97",a:"Centro Storico",v:["beautiful","history","architecture"],d:44,s:"Turin\'s grand baroque heart — Palazzo Reale, Palazzo Madama, and Teatro Regio all meet here",st:"The piazza is always open and free. Walk the arcaded porticoes that shelter you in any weather. Palazzo Madama straddles the gap between Roman gate and baroque palace — two thousand years of history in one building.",im:"Time-travel: the Savoy court processing from the Royal Palace to the theatre across this square, 1750",t:"Free always. Best in morning light before tour groups arrive.",c:["romantic_water"],r:"g",nn:"Piazza Castello — Centro Storico #97",ns:"Il cuore barocco di Torino — Palazzo Reale, Palazzo Madama e il Teatro Regio",nst:"La piazza è sempre aperta e gratuita. I portici arcuati ti proteggono in ogni stagione.",nt:"Sempre gratis. Meglio la mattina presto."},
  {id:98,n:"Porta Palazzo Market — Centro Storico #98",a:"Centro Storico",v:["local","free","weird"],d:28,s:"Europe\'s largest open-air market fills this sprawling piazza every morning — free to wander",st:"Every Tuesday–Saturday morning, Porta Palazzo becomes a city in motion: hundreds of vendors, immigrants from a dozen countries, mountains of vegetables and secondhand clothing. The energy is extraordinary.",im:"Time-travel: this piazza as the edge of medieval Turin, just outside the city gate, 1600",t:"Free to wander. Tue–Sat mornings. Arrive before 10am for the best atmosphere.",c:["scary"],r:"g",nn:"Mercato di Porta Palazzo — Centro Storico #98",ns:"Il più grande mercato all\'aperto d\'Europa riempie questa piazza ogni mattina",nst:"Ogni mattina Martedì–Sabato, Porta Palazzo diventa una città in movimento.",nt:"Gratis. Mar–Sab mattino. Arriva prima delle 10."},
  {id:99,n:"Galleria Subalpina — Centro Storico #99",a:"Centro Storico",v:["beautiful","architecture","quiet"],d:41,s:"A 19th-century glass-roofed arcade with bookshops, a chess café, and ornate ironwork",st:"The Galleria Subalpina connects Piazza Castello to Via Po. Antiquarian bookshops, a chess café, and the ornate 1874 ironwork make it a serene refuge from the city. Free to enter and browse.",im:"Time-travel: Turinese intellectuals meeting in the chess café under this glass roof, 1890",t:"Free. Open during arcade hours. The chess café at the far end is excellent.",c:["famous_dead"],r:"g",nn:"Galleria Subalpina — Centro Storico #99",ns:"Un\'arcade con tetto in vetro del XIX secolo - librerie antiquarie, caffe degli scacchi",nst:"La Galleria Subalpina collega Piazza Castello a Via Po.",nt:"Gratis. Aperta durante gli orari dell\'arcade."},
  {id:100,n:"Parco del Valentino — San Salvario #100",a:"San Salvario",v:["nature","beautiful","local"],d:17,s:"Turin\'s riverside park along the Po — 500,000 m² of joggers, picnics, and herons",st:"Valentino is Turin\'s main park, running along the Po\'s west bank. Joggers, couples, students, and herons share the riverside. The 1880s Borgo Medievale replica castle is free to view from outside.",im:"Time-travel: the Savoy court using this park as a private hunting ground before the city expanded, 1800",t:"Free. Open always.",c:["street_art"],r:"g",nn:"Parco del Valentino — San Salvario #100",ns:"Il parco lungo il Po di Torino — 500.000 m² di corridori, picnic ed aironi",nst:"Valentino è il parco principale di Torino, lungo la sponda ovest del Po.",nt:"Gratis. Sempre aperto."},
  {id:101,n:"Borgo Medievale — San Salvario #101",a:"San Salvario",v:["history","beautiful","architecture"],d:50,s:"A full-scale reproduction of a 15th-century Piedmontese village, built for the 1884 exhibition",st:"The Borgo Medievale sits inside Valentino Park. It is a faithful copy of a medieval hill village, built as a historical showcase. The exterior and courtyard are free to walk at any time.",im:"Time-travel: the 1884 Exhibition visitors marvelling at this reconstruction, seeing their own medieval past rebuilt, 1884",t:"Free outside. Interior has small entry fee.",c:["abandoned"],r:"g",nn:"Borgo Medievale — San Salvario #101",ns:"Una riproduzione in scala reale di un borgo piemontese del XV secolo",nst:"Il Borgo Medievale si trova dentro il Parco del Valentino.",nt:"Gratis fuori. Interno con piccolo biglietto."},
  {id:102,n:"San Salvario Aperitivo — San Salvario #102",a:"San Salvario",v:["local","free","night"],d:9,s:"Turin\'s most vibrant aperitivo neighbourhood — free snacks with drinks, 18:30–20:00",st:"San Salvario around Via Baretti and Via Madama Cristina is packed with affordable bars offering free snacks with evening drinks. Turin invented the aperitivo — and it is still done best here.",im:"Time-travel: the student workers of FIAT stopping here on their way home from the factory, 1960",t:"Free snacks with any drink (around €5 buys you access to the buffet). Best 18:30–20:00.",c:["free_museum"],r:"g",nn:"San Salvario aperitivo — San Salvario #102",ns:"Il quartiere aperitivo più vivace di Torino — snack gratuiti con le bevande",nst:"Il San Salvario è pieno di bar a prezzi accessibili che offrono stuzzichini con i drinks.",nt:"Snack gratuiti con qualsiasi drink. Meglio 18:30–20:00."},
  {id:103,n:"Murazzi del Po — Vanchiglia #103",a:"Vanchiglia",v:["local","nature","beautiful"],d:7,s:"The Po riverbank below Vanchiglia — sun-bathing on flat stones, fishing, summer terraces",st:"The Murazzi is a long stretch of flat stone embankment along the Po\'s west bank. People sunbathe on the stones, fishermen cast lines, and in summer bar terraces spill to the water\'s edge. Free at all times.",im:"Time-travel: the old Po docks here, boats loading marble and grain for the Savoy factories, 1880",t:"Free always. Summer evenings are the best time.",c:["local_only"],r:"g",nn:"Murazzi del Po — Vanchiglia #103",ns:"La riva del Po sotto Vanchiglia — bagni di sole, pesca, terrazze estive",nst:"I Murazzi sono un lungo tratto di argine piano lungo la sponda ovest del Po.",nt:"Sempre gratis. Le serate estive sono il momento migliore."},
  {id:104,n:"Piazza Vittorio Veneto — Vanchiglia #104",a:"Vanchiglia",v:["beautiful","history","architecture"],d:47,s:"One of Europe\'s largest baroque piazzas, sloping toward the Po — and it\'s free to sit in",st:"The massive piazza slopes from the arcaded buildings down to the river. The view from the far end toward the Gran Madre church and the hills of Superga is among Turin\'s best.",im:"Time-travel: the Turin bourgeoisie promenading here on Sunday afternoons, the Alps visible on clear days, 1900",t:"Free always.",c:["architecture"],r:"g",nn:"Piazza Vittorio Veneto — Vanchiglia #104",ns:"Una delle più grandi piazze barocche d\'Europa, che scende verso il Po",nst:"La grande piazza scende dagli edifici porticati fino al fiume.",nt:"Sempre gratis."},
  {id:105,n:"Vanchiglia Street Art Walk — Vanchiglia #105",a:"Vanchiglia",v:["street_art","art","local"],d:19,s:"Turin\'s most concentrated street art neighbourhood — murals by Italian and international artists",st:"Walk Via Lombroso, Corso Brescia, and the backstreets of Vanchiglia for murals by Italian and international artists. All free, all outdoors. The Vanki Festival murals are particularly good.",im:"Time-travel: this as an industrial workers\' quarter before the art arrived, factories humming, 1970",t:"Free always.",c:["history_big"],r:"g",nn:"Street art a Vanchiglia — Vanchiglia #105",ns:"Il quartiere di street art più concentrato di Torino",nst:"Passeggiata lungo Via Lombroso, Corso Brescia e i vicoli di Vanchiglia.",nt:"Sempre gratis."}
  {id:106,n:"Mole Antonelliana at Dusk — Centro",a:"Centro",v:["famous","beautiful","high_spots"],d:5,s:"The tallest museum building in the world — climb 85 meters for the Piedmont light hitting the Po Valley.",st:"The Mole Antonelliana is a 19th-century obelisk that's now a museum. You can skip the museum (Cinema Museum inside is fine but not essential). Take the elevator to the top and stand in the glass observation deck.

At dusk the light is perfect. The Po Valley spreads below. The Alps are visible in the distance. You're alone up there. The whole city falls away.",im:"Climbing the elevator. Glass on all sides. The Po Valley spreading. Light turning golden. The Alps just visible. Completely silent.",t:"€8 total (€5 elevator, €3 museum optional). Open daily 9am–7pm. The elevator runs constantly. Come 5–7pm for the light.",c:["greatest_hits","beautiful","high_spots"],r:"g",nn:"Mole Antonelliana bei Sonnenuntergang — Centro",ns:"Das höchste Museumgebäude der Welt — 85 Meter hoch für das Piemonte-Licht auf dem Po-Tal",nst:"Die Mole Antonelliana ist ein Obelisk aus dem 19. Jahrhundert, jetzt ein Museum. Du kannst den Aufzug zur Spitze nehmen.",nt:"€8 gesamt (€5 Aufzug, €3 Museum optional). Täglich 9–19 Uhr offen. Aufzug läuft ständig."},
  {id:107,n:"Po River Cycling — Po Valley",a:"Po Valley",v:["cycling","day_trips","beautiful"],d:35,s:"Flat 40km cycle route along the Po River — farms, old village stops, perfect Piedmont afternoon.",st:"From Turin, you can cycle east along the Po River for 40km through agricultural land and small villages. The route is completely flat. You pass vineyards (though not the famous ones). You reach small villages with ice cream shops.

It's pure rhythm. Pedal. Water. Sky. Stop for coffee. Pedal more. Return in the afternoon.",im:"Pedaling past fields. The Po River always to your left. A village appearing with a church steeple. Completely flat. Wide sky.",t:"Rent from central Turin (€8–12/day). Route is marked. 40km (4 hours). Bring water. Stop anywhere in villages for food.",c:["cycling","day_trips","beautiful"],r:"g",nn:"Po-Fluss-Radstrecke — Po Valley",ns:"Flache 40-km-Radstrecke entlang des Po-Flusses — Bauernhöfe, alte Dorfstopps, perfekter Piemont-Nachmittag",nst:"Von Turin aus kannst du östlich entlang des Po-Flusses für 40 km durch Ackerland und kleine Dörfer radeln.",nt:"Miete aus dem Zentrum von Turin (€8–12/Tag). Strecke markiert. 40 km (4 Stunden). Wasser mitbringen."},
  {id:108,n:"Museo Egizio (Egyptian Museum) — Centro",a:"Centro",v:["history_big","nerd_pilgrimage","beautiful"],d:8,s:"Second-largest Egyptian collection outside Cairo — the mummies and temples and papyrus without the Louvre crowds.",st:"Turin's Egyptian Museum is extraordinary and almost completely empty. It has the second-largest Egyptian collection outside Cairo. The mummies are displayed respectfully. The temple fragments are intact. The papyrus scrolls are visible.

Go on a Tuesday morning. You might be the only person in entire rooms. It feels like you've discovered something secret.",im:"Mummy cases. Papyrus scrolls under glass. Temple reliefs. A painting of Ramesses that's 3000 years old. Completely alone in the room.",t:"€12 entry. Open 8:30am–7:30pm (9am Wed). Tuesday–Thursday mornings are quiet. Via Accademia delle Scienze 6. Allow 2–3 hours.",c:["history_big","nerd_pilgrimage"],r:"g",nn:"Museo Egizio — Centro",ns:"Zweitgrößte ägyptische Sammlung außerhalb Kairos — die Mumien ohne die Louvre-Massen",nst:"Turins Ägyptisches Museum ist außergewöhnlich und fast komplett leer. Es hat die zweitgrößte ägyptische Sammlung außerhalb Kairos.",nt:"€12 Eintritt. 8:30–19:30 Uhr offen (9 Uhr Mi). Di–Do morgens ruhig."},
  {id:109,n:"Cappella della Sindone (Holy Shroud Chapel) — Centro",a:"Centro",v:["history_big","weird","quiet"],d:5,s:"The chapel where the Shroud of Turin is housed (you can't see it but you can stand where it lives) — weirdly moving.",st:"The Shroud of Turin is supposedly the burial cloth of Jesus. Whether you believe that or not, the chapel is extraordinary. Black marble. Underground. Designed to hold a relic that most people never see.

You won't see the shroud (it's sealed in a lead box behind bulletproof glass). But you'll stand in the room where it's kept. The chapel is designed to amplify that absence. It's strange and actually moving.",im:"Black marble walls. Underground. A sealed case on the wall behind glass. Silence. The feeling that you're standing in front of something people have believed in for 500 years.",t:"€6 entry. Open 3–7pm (7–10pm some days). Adjacent to the Cathedral. 20 min is enough. It's small but powerful.",c:["history_big","weird","quiet"],r:"g",nn:"Cappella della Sindone — Centro",ns:"Die Kapelle, wo das Turiner Grabtuch untergebracht ist (du kannst es nicht sehen, aber du kannst stehen, wo es lebt)",nst:"Das Turiner Grabtuch ist angeblich das Begräbnistuch Jesu. Ob du das glaubst oder nicht, die Kapelle ist außergewöhnlich.",nt:"€6 Eintritt. 15–19 Uhr offen (19–22 Uhr einige Tage). Neben der Kathedrale. 20 Min ist genug."},
  {id:110,n:"Parco del Valentino — Po Riverside",a:"Valentino",v:["parks","beautiful","local"],d:10,s:"The vast riverside park where locals actually spend time — bike rides, families, the castle isn't the point.",st:"Parco del Valentino stretches along the Po for kilometers. It has a castle (which is fine) but that's not why locals come. They come to walk, bike, picnic, and watch the river.

On weekends it's full of Turinese families. There are restaurants built into old buildings. It's green and peaceful and nobody is checking admission. Just walk the entire thing.",im:"Green space. River on one side. Trees. A family with kids. Someone on a bike. The Po brown and moving.",t:"Free to walk. Bikes rentable at several points (€5–10/day). Restaurants throughout. Hours dependent on weather and season. Best April–October.",c:["parks","beautiful"],r:"g",nn:"Parco del Valentino — Po Flussufer",ns:"Der riesige Flussufer-Park, wo Einheimische Zeit verbringen — Radfahren, Familien, das Schloss ist nicht der Punkt",nst:"Der Parco del Valentino erstreckt sich für Kilometer entlang des Po. Es hat ein Schloss (das ist in Ordnung), aber das ist nicht, warum Einheimische kommen.",nt:"Kostenlos zum Gehen. Fahrräder an mehreren Stellen mietbar (€5–10/Tag). Restaurants überall. 4–10 Uhr beste Jahreszeit."},
  {id:111,n:"Turin Mahjong Parlors — Quartiere Musicisti",a:"Musicisti",v:["weird","local","hidden"],d:20,s:"The neighborhood where Chinese community plays mahjong in public storefronts — you can watch, no admission, completely fascinating.",st:"Turin has a significant Chinese community. In the Quartiere Musicisti (and around Via Conte Verde), there are mahjong parlors where games happen openly in windows. You can stand outside and watch people play for hours.

It's completely non-touristy. Nobody cares if you watch. The games are serious and fast. The sound of tiles is hypnotic.",im:"Mahjong tiles clicking rapidly. Old people absolutely focused. A cup of tea. The game table. City noise outside. Completely absorbed players.",t:"Free to watch. Open afternoons and evenings. No entry fee, just stand outside. Via Conte Verde and surrounding streets. Afternoons best (2–5pm).",c:["weird","local","hidden"],r:"g",nn:"Turin Mahjong-Parlors — Quartiere Musicisti",ns:"Das Viertel, wo chinesische Gemeinde Mahjong in öffentlichen Läden spielt — du kannst zuschauen, keine Eintrittsgebühr",nst:"Turin hat eine bedeutende chinesische Gemeinschaft. In Quartiere Musicisti gibt es Mahjong-Parlors, wo Spiele offen in Fenstern stattfinden.",nt:"Kostenlos zum Zuschauen. Nachmittags und abends offen. Kein Eintritt, einfach außen stehen. Via Conte Verde und umgebende Straßen."},
  {id:112,n:"Lingotto Shopping Center Rooftop — Lingotto",a:"Lingotto",v:["beautiful","architecture","weird"],d:15,s:"The Fiat rooftop test track where cars were tested — now a running track and museum, strange hybrid space.",st:"The Lingotto is a Fiat factory from the 1920s. On the roof there's a test track where they used to drive new cars to test them before delivering them. Now the track is a running path with a museum inside.

It's bizarre and beautiful. You're walking on a rooftop where Ferraris were tested. The views of Turin are perfect. It's a completely unique space.",im:"Running on a roof 5 stories up. City spread below. Car factory architecture. The track curves like a real race circuit. Wind.",t:"€6 entry (or free just to walk the roof). Rooftop loop is about 500m. 1 hour needed. Lingotto neighborhood.",c:["beautiful","architecture","weird"],r:"g",nn:"Lingotto Einkaufszentrum Dach — Lingotto",ns:"Die Fiat-Dachprüfstrecke, wo Autos getestet wurden — jetzt eine Laufstrecke und Museum, merkwürdiger Hybridraum",nst:"Der Lingotto ist eine Fiat-Fabrik von 1920. Auf dem Dach gibt es eine Testanlage, wo sie neue Autos testeten.",nt:"€6 Eintritt (oder kostenlos nur zum Dach spazieren). Dachschleife etwa 500 m. 1 Stunde nötig."},
  {id:113,n:"Piedmont Wine Region Day Trip — Langhe",a:"Langhe",v:["day_trips","local","beautiful"],d:90,s:"45km south to the rolling hills where Barolo and Barbaresco wines come from — villages, wine bars, the Piedmont itself.",st:"From Turin, a train goes south to Barolo, passing through the Langhe hills where Piedmont's famous wines grow. The landscape is perfect rolling hills with vineyards.

You can visit wine bars in small towns (no tastings necessary, just wine and bread). Stay for lunch. Walk the vineyards. Return by evening train.",im:"Rolling hills covered in vines. A small village with a church. Wine being poured. The Piedmont light golden.",t:"Train from Turin Porta Nuova (€15 return). 1 hour to Barolo. Wine bars €5–15 per glass. Bread and cheese minimal. Best May–October.",c:["day_trips","beautiful"],r:"g",nn:"Piemont-Weinregion Tagesausflug — Langhe",ns:"45 km südlich zu den Hügeln, wo Barolo- und Barbaresco-Weine kommen — Dörfer, Weinbars, das Piemont selbst",nst:"Von Turin führt ein Zug nach Süden zu Barolo und führt durch die Langhe-Hügel, wo Piemonts berühmte Weine wachsen.",nt:"Zug von Turin Porta Nuova (€15 Rückfahrt). 1 Stunde nach Barolo. Weinbars €5–15 pro Glas."},
  {id:114,n:"Piazza Castello Square Walk — Centro",a:"Centro",v:["beautiful","local","architecture"],d:5,s:"The geometrically perfect central square where Turin citizens actually gather — cafes, the rhythm of the city.",st:"Piazza Castello is the heart of Turin's grid system. It's not as famous as Piazza San Carlo, so it's less crowded. The architecture is perfect Renaissance geometry. Locals sit at the cafés.

Go for coffee at one of the bars facing the square. Sit for an hour. Watch Turin move. This is the actual city, not the tourist version.",im:"Perfect arcade architecture. A woman with a coffee. The church bell. People crossing the square. The geometry making sense.",t:"Free to sit. Coffee €3–4 at bar. Multiple cafes around the square. Morning is quietest. Any time of day works.",c:["beautiful","local","architecture"],r:"g",nn:"Piazza Castello Platz-Spaziergang — Centro",ns:"Der geometrisch perfekte zentrale Platz, wo Turinese Bürger sich tatsächlich versammeln — Cafes, der Rhythmus der Stadt",nst:"Piazza Castello ist das Herz von Turins Gittersystem. Die Architektur ist perfekte Renaissance-Geometrie.",nt:"Kostenlos zum Sitzen. Kaffee €3–4 an der Bar. Mehrere Cafes um den Platz. Morgens am ruhigsten."},
  {id:115,n:"Turin Bakeries at 5:30am — Centro",a:"Centro",v:["local","quiet","hidden"],d:5,s:"The morning ritual — still-warm croissants, espresso, the smell of Turin waking up.",st:"Italian bakeries open at 4:30am. By 5:30am, Turin is buying fresh croissants (cornetti) and espresso. This is how the day starts. Not tourists. Just people.

Wake early. Go to any bakery. Order a cornetto and espresso at the counter. Stand and drink it (don't sit, you pay more). Watch Turin appear.",im:"Warm croissant. Fresh espresso. Steam rising. A businessman in a suit buying the same thing. The baker knowing the customers.",t:"€1–2 for cornetto and espresso. Any Panetteria or Pasticceria. Open from 4:30am. No English, bring euros. Standing only if you want cheap.",c:["local","quiet"],r:"g",nn:"Turin Bäckereien um 5:30 Uhr — Centro",ns:"Das Morgenritual — noch warme Hörnchen, Espresso, der Duft von Turin, das aufwacht",nst:"Italienische Bäckereien öffnen um 4:30 Uhr. Um 5:30 Uhr kauft Turin frische Hörnchen (Cornetti) und Espresso.",nt:"€1–2 für Cornetto und Espresso. Jede Panetteria oder Pasticceria. Ab 4:30 Uhr offen. Kein Englisch, Euro mitbringen."},
  {id:116,n:"Castello di Rivoli Contemporary Art Museum — Rivoli",a:"Rivoli",v:["architecture","weird","art"],d:20,s:"The Baroque palace turned contemporary art museum — the contrast between the building and what's inside is the art itself.",st:"About 20 minutes west of Turin, Castello di Rivoli is a Baroque palace that now houses contemporary art. The collection is curated to create cognitive dissonance with the palace itself.

Walking through a ballroom and finding a modern video installation, or standing in a chapel with contemporary sculptures — the clash is intentional and fascinating.",im:"Ornate Baroque ceiling. A modern installation below. The jarring aesthetic collision. Visitors standing confused then laughing.",t:"€12 entry. Open 10am–7pm (closes 5pm some days). Take bus 36 from central Turin. Allow 2–3 hours. Call ahead (011-956-5222) as hours vary.",c:["architecture","weird","art"],r:"y",nn:"Castello di Rivoli Gegenwartskunstmuseum — Rivoli",ns:"Der Barock-Palast mit zeitgenössischer Kunst — der Kontrast zwischen dem Gebäude und seinem Inhalt ist die Kunst selbst",nst:"Etwa 20 Minuten westlich von Turin ist das Castello di Rivoli ein Barockpalast mit zeitgenössischer Kunst.",nt:"€12 Eintritt. 10–19 Uhr offen (17 Uhr einige Tage). Bus 36 vom Zentrum Turin. 2–3 Stunden. Vorher anrufen."},
  {id:117,n:"Mole Antonelliana (National Cinema Museum)",a:"Centro",v:["famous","beautiful"],d:90,s:"World's tallest brick museum at 167.5m — a building that defied gravity when built and still does, housing centuries of cinema.",st:"The exterior is soaring spire. The interior is cavernous atrium with a glass lift rising through the center. The elevator ascends slowly — you watch Turin expand below. The museum chronicles cinema chronologically.\n\nThe actual objects are here — projectors, cameras, reels from the earliest films. The weight of cinema's history is visible. The top of the elevator gives a 360-degree view of the city and surrounding Alps.\n\nThe building itself is the real exhibit — it was originally conceived as a synagogue, then became a monument to technology. Now it holds art.",im:"Rising in the glass elevator through the soaring brick atrium, Turin rotating below, the Alps on the horizon.",t:"€11 museum + lift to top. €5 lift only (top viewing terrace). Lift is rapid but mesmerizing. Allow 2–3 hours for museum if interested in cinema. The rooftop view is the point if you're just visiting for the building. Go morning for light on the Alps. Audioguide available.",c:["greatest_hits","beautiful"],r:"g",nn:"Mole Antonelliana (Museo Nazionale del Cinema)",ns:"Il museo in mattoni più alto del mondo a 167,5m — un edificio che ha sfidato la gravità quando costruito.",nst:"L'esterno è una guglia che si erge al cielo. L'interno è un atrio cavernoso con un ascensore di vetro al centro. L'ascensore sale lentamente — vedi Torino espandersi sotto di te. Il museo racconta la storia del cinema.\n\nGli oggetti veri sono qui — proiettori, videocamere, pellicole. Il peso della storia del cinema è visibile. La cima dell'ascensore offre una vista a 360 gradi della città e delle Alpi.",nt:"€11 museo + ascensore in cima. €5 solo ascensore. L'ascensore è rapido ma ipnotizzante. 2-3 ore se interessato al cinema. La vista dal tetto è il punto se visiti solo per l'edificio."},
  {id:118,n:"Turin Cathedral & Shroud of Turin",a:"Centro",v:["famous","history"],d:30,s:"A piece of linen 4.4 meters long that bears the imprint of a human body — debated, studied, never definitively explained.",st:"The Shroud is displayed only occasionally (last shown 2015, next planned for 2025+). When displayed, it lies in a protected chamber behind bulletproof glass in a climate-controlled case. The image is faint but visible — a crucified figure, front and back, with wounds consistent with Roman execution.\n\nRadiocarbon dating suggests 1260–1390 AD creation. Skeptics argue forgery or natural process. Believers maintain it wrapped the body of Christ. The scientific papers are mountains. The mystery remains.\n\nThe cathedral around it is Renaissance marble, elegant, restrained. Whether or not the Shroud is genuine, you are standing in a place where millions have stood with the same question.",im:"A faint image of a wounded man on ancient linen, lying under glass, surrounded by centuries of certainty and doubt.",t:"Check Turin tourism for Shroud display dates (very rare, typically 6 weeks every few years). Regular cathedral entry €2-5. Shroud viewing usually €15-20 during display periods. Allow 30 min in cathedral, 20-30 min for Shroud queue if on display. Photography usually prohibited. Weekday visits less crowded than weekends.",c:["greatest_hits","history_big"],r:"y",nn:"Cattedrale di San Giovanni Battista & Sindone di Torino",ns:"Un pezzo di lino di 4,4 metri che porta l'impronta di un corpo umano — dibattito, studio, mai definitivamente spiegato.",nst:"La Sindone è esposta solo occasionalmente (ultima volta 2015, prossima prevista 2025+). Quando esposta, riposa in una camera protetta dietro vetro blindato in una custodia climatizzata. L'immagine è fioca ma visibile — una figura crocifissa.\n\nLa datazione al radiocarbonio suggerisce creazione 1260–1390 AD. Gli scettici sostengono falsificazione. I credenti sostengono avvolse il corpo di Cristo. Il mistero rimane.",nt:"Verifica le date di esposizione della Sindone (molto rare). Ingresso cattedrale €2-5. Visualizzazione Sindone solitamente €15-20 durante i periodi di esposizione. Visite tra semana meno affollate."}

<div className="flex gap-1.5 mt-2 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-2 py-0.5 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</button>);

const PlaceDetail=({place:p,onClose,onNext,onPrev,lang})=>(
<div style={{position:"fixed",inset:0,zIndex:1000,background:"url('https://mariavheland.github.io/godostuff/textures/tex11.png') center/cover no-repeat",overflowY:"auto"}}>
<div className="px-5 pt-6 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex justify-between items-center mb-4">
<button onClick={onClose} className="text-sm font-bold" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← Back</button>
<div className="flex gap-2">
<button onClick={onPrev} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>←</button>
<button onClick={onNext} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>→</button></div></div>
<h1 className="text-2xl font-black" style={{color:"#1a1a2e"}}>{lang==="native"&&p.nn?p.nn:p.n}</h1>
{lang==="native"&&p.nn&&<p className="text-sm font-medium" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-sm mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p>
{PLACE_IMAGES[p.id]&&<div className="mt-4 rounded-xl overflow-hidden" style={{maxHeight:"400px"}}>
<img src={`images/${PLACE_IMAGES[p.id]}`} alt={p.n} style={{width:"100%",maxHeight:"360px",objectFit:"contain",display:"block",borderRadius:"8px"}}/>
<p className="text-xs mt-1" style={{color:"#aaa",textAlign:"center"}}>AI-generated illustration</p></div>}
<div className="mt-4 p-4 rounded-xl" style={{background:"#f8f8ff"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#1a1a2e"}}>The Story</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nst?p.nst:p.st}</p></div>
{p.im&&<div className="mt-3 p-4 rounded-xl" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#a78bfa"}}>Imagine This</h3>
<p className="text-sm" style={{color:"#b8b0d0",lineHeight:1.7,fontStyle:"italic"}}>{p.im}</p></div>}
{p.t&&<div className="mt-3 p-4 rounded-xl" style={{background:"#f0fdf4"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#166534"}}>{lang==="native"?"Tips / "+LANG_NAME:"Tips"}</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nt?p.nt:p.t}</p>
<a href={`https://maps.google.com/?q=${encodeURIComponent(p.n+', '+CITY_EN)}`} target="_blank" rel="noopener noreferrer"
  className="mt-3 flex items-center gap-2 text-sm font-bold"
  style={{color:"#166534",textDecoration:"none",display:"inline-flex",marginTop:"10px"}}>
  🗺 Get directions
</a>
</div>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
const TBGS={"places":"https://mariavheland.github.io/godostuff/textures/tex08.png","collections":"https://mariavheland.github.io/godostuff/textures/tex15.png","missions":"https://mariavheland.github.io/godostuff/textures/tex15.png","plan":"https://mariavheland.github.io/godostuff/textures/tex15.png","phrases":"https://mariavheland.github.io/godostuff/textures/tex08.png","default":"https://mariavheland.github.io/godostuff/textures/tex08.png"};if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
{/* dark scrim over photo */}
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:`url(\'${TBGS[tab]||TBGS.default}\') center/cover no-repeat`}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Turin Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Turin Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
