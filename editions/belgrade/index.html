const P = [
  {id:1,n:"Kalemegdan Fortress Layers",a:"Stari Grad",v:["history", "beautiful"],d:1,s:"2000 years of walls watching the Danube.",st:"Roman fort. Ottoman fortress. Austrian stronghold. Now it\'s park. Walk the layers. Each stone is history. Vistula and Danube meet at its feet. Views unmatched. Power was here. Memory remains.",im:"It\'s 1200. Ottoman builders expand. By 1800, Austrians hold. By 2024, Belgradians remember all of them.",t:"Roman fort. Ottoman fortress. Austrian stronghold. Now it\'s park. Walk the layers. Each stone is history. Vistula and Danube meet at its feet. Views unmatched. Power was here. Memory remains.\",im:\"It\'s 1200. Ottoman builders expand. By 1800, Austrians hold. By 2024, Belgradians remember all of them.\",t:\"Kalemegdan Fortress. Open 8am-10pm. Free entry. Museum inside €3. Walk all levels. Allow 2 hours. Sunset essential.",c:["history_big", "beautiful"],r:"g",nn:"Београд",ns:"Где река Дунав утупа своју моћ у поетско срце.",nst:"Београд је град контраста, где су турци и хабсбуршани оставили своје печате. Дунав протиче крај Земуна са његовим чарантним кулама. Нови Београд је озбиљан и модеран док Старо граѓе животариште и душе. Суќани су жарки, директни и страствени.",nt:"Прођите кроз Теразије за приказ. Дунав даје слободе за прошетавање. Каф је живот—вода и разговор су неделивни. Ноћ долази са рок музиком и пивом. Србијанци говоре с почастима у срцу. Четири хилјаде наступа годишње оживе место."},
  {id:2,n:"Savamala Creative Quarter Galleries",a:"Savamala",v:["street_art", "local", "beautiful"],d:2,s:"Industrial zone became artist rebellion.",st:"Abandoned warehouses claimed by artists. Street art. Galleries. Cafés. Music venues. It\'s gentrifying. It\'s resistant. It\'s real. Walk warehouses. Spray-painted prophecies. This is where Belgrade creates.",im:"It\'s 2005. Artists arrive. Rent is free. By 2024, developers circle. Artists resist.",t:"Abandoned warehouses claimed by artists. Street art. Galleries. Cafés. Music venues. It\'s gentrifying. It\'s resistant. It\'s real. Walk warehouses. Spray-painted prophecies. This is where Belgrade creates.\",im:\"It\'s 2005. Artists arrive. Rent is free. By 2024, developers circle. Artists resist.\",t:\"Savamala district. Start at Beton Hall. Walk Danube bank. Multiple galleries open weekends. Free. Allow 2-3 hours. Night energy best.",c:["street_art", "local_only"],r:"g",nn:"Београд",ns:"Где река Дунав утупа своју моћ у поетско срце.",nst:"Београд је град контраста, где су турци и хабсбуршани оставили своје печате. Дунав протиче крај Земуна са његовим чарантним кулама. Нови Београд је озбиљан и модеран док Старо граѓе животариште и душе. Суќани су жарки, директни и страствени.",nt:"Прођите кроз Теразије за приказ. Дунав даје слободе за прошетавање. Каф је живот—вода и разговор су неделивни. Ноћ долази са рок музиком и пивом. Србијанци говоре с почастима у срцу. Четири хилјаде наступа годишње оживе место."},
  {id:3,n:"Danube-Sava Confluence Point",a:"Dorćol",v:["nature", "beautiful", "quiet"],d:3,s:"Two rivers deciding on Belgrade.",st:"Where the Sava meets the Danube. Geography decides settlement. Water defines identity. Stand at the point. Water merges. Currents visible. Cities on opposite banks. Nature\'s geometry.",im:"It\'s 1000 years ago. A trader notes the point. By 2024, it\'s still the spot where Belgrade makes sense.",t:"Where the Sava meets the Danube. Geography decides settlement. Water defines identity. Stand at the point. Water merges. Currents visible. Cities on opposite banks. Nature\'s geometry.\",im:\"It\'s 1000 years ago. A trader notes the point. By 2024, it\'s still the spot where Belgrade makes sense.\",t:\"Danube confluence park. Visible from Kalemegdan area and Zemun. Walk Danube promenade. Free. Best at dusk. Photography stunning.",c:["nature", "beautiful", "parks"],r:"g",nn:"Београд",ns:"Где река Дунав утупа своју моћ у поетско срце.",nst:"Београд је град контраста, где су турци и хабсбуршани оставили своје печате. Дунав протиче крај Земуна са његовим чарантним кулама. Нови Београд је озбиљан и модеран док Старо граѓе животариште и душе. Суќани су жарки, директни и страствени.",nt:"Прођите кроз Теразије за приказ. Дунав даје слободе за прошетавање. Каф је живот—вода и разговор су неделивни. Ноћ долази са рок музиком и пивом. Србијанци говоре с почастима у срцу. Четири хилјаде наступа годишње оживе место."},
  {id:4,n:"Tito\'s Underground Bunker (D-0)",a:"Dedinje",v:["history", "scary", "hidden"],d:4,s:"Nuclear shelter for a dead dictator.",st:"Tito\'s secret bunker buried 80 meters deep. Cold War paranoia. Now a museum. Beds. Command centers. It\'s preserved. It\'s haunting. It\'s testimony to fear and power.",im:"It\'s 1960. Engineers hide a bunker. Tito sleeps safe. By 2024, tourists walk where nuclear war was prepared.",t:"Tito\'s secret bunker buried 80 meters deep. Cold War paranoia. Now a museum. Beds. Command centers. It\'s preserved. It\'s haunting. It\'s testimony to fear and power.\",im:\"It\'s 1960. Engineers hide a bunker. Tito sleeps safe. By 2024, tourists walk where nuclear war was prepared.\",t:\"Ulica Dedinjska Rajka area. Tours Saturdays only by reservation. €10. Book ahead. 2-hour tours. Intense experience.",c:["history_big", "scary"],r:"y",nn:"Београд",ns:"Где река Дунав утупа своју моћ у поетско срце.",nst:"Београд је град контраста, где су турци и хабсбуршани оставили своје печате. Дунав протиче крај Земуна са његовим чарантним кулама. Нови Београд је озбиљан и модеран док Старо граѓе животариште и душе. Суќани су жарки, директни и страствени.",nt:"Прођите кроз Теразије за приказ. Дунав даје слободе за прошетавање. Каф је живот—вода и разговор су неделивни. Ноћ долази са рок музиком и пивом. Србијанци говоре с почастима у срцу. Четири хилјаде наступа годишње оживе место."},
  {id:5,n:"Skadarlija Bohemian Quarter History",a:"Skadarlija",v:["history", "local", "beautiful"],d:5,s:"Bohemia before gentrification claimed it.",st:"Skadarlija is Belgrade\'s artist quarter. Narrow streets. Music venues. Traditional restaurants. It\'s bohemian. It\'s packaged now. But authenticity survived somehow. Artists still drink here. Still create. It\'s honest about compromise.",im:"It\'s 1900. Artists and writers cluster. By 2024, it\'s tourist destination. Yet artists persist.",t:"Skadarlija is Belgrade\'s artist quarter. Narrow streets. Music venues. Traditional restaurants. It\'s bohemian. It\'s packaged now. But authenticity survived somehow. Artists still drink here. Still create. It\'s honest about compromise.\",im:\"It\'s 1900. Artists and writers cluster. By 2024, it\'s tourist destination. Yet artists persist.\",t:\"Skadarlija Street and surrounding blocks. Restaurants €8-15. Music venues every night. Walk slowly. Absorb. Allow 2+ hours. Dinner best.",c:["local_only", "history_big"],r:"g",nn:"Београд",ns:"Где река Дунав утупа своју моћ у поетско срце.",nst:"Београд је град контраста, где су турци и хабсбуршани оставили своје печате. Дунав протиче крај Земуна са његовим чарантним кулама. Нови Београд је озбиљан и модеран док Старо граѓе животариште и душе. Суќани су жарки, директни и страствени.",nt:"Прођите кроз Теразије за приказ. Дунав даје слободе за прошетавање. Каф је живот—вода и разговор су неделивни. Ноћ долази са рок музиком и пивом. Србијанци говоре с почастима у срцу. Четири хилјаде наступа годишње оживе место."},
  {id:6,n:"Sava River Splavovi (Floating Clubs)",a:"Savski Venac",v:["night", "local", "beautiful"],d:6,s:"Nightlife floating on water.",st:"Splavovi. Barges become clubs. Music. Dancing. Water. It\'s Belgrade\'s summer. Thousands gather. The river becomes nightclub. It\'s chaotic. It\'s alive. It\'s essential.",im:"It\'s midnight. The splavas pulse. Music bounces off water. Danube remembers dancing.",t:"Splavovi. Barges become clubs. Music. Dancing. Water. It\'s Belgrade\'s summer. Thousands gather. The river becomes nightclub. It\'s chaotic. It\'s alive. It\'s essential.\",im:\"It\'s midnight. The splavas pulse. Music bounces off water. Danube remembers dancing.\",t:\"Sava river, multiple splavovi. Clubs open 10pm-4am. Entry €3-8. Multiple clubs. Music varies. Arrive after midnight. Go with locals.",c:["night", "local_only"],r:"g",nn:"Београд",ns:"Где река Дунав утупа своју моћ у поетско срце.",nst:"Београд је град контраста, где су турци и хабсбуршани оставили своје печате. Дунав протиче крај Земуна са његовим чарантним кулама. Нови Београд је озбиљан и модеран док Старо граѓе животариште и душе. Суќани су жарки, директни и страствени.",nt:"Прођите кроз Теразије за приказ. Дунав даје слободе за прошетавање. Каф је живот—вода и разговор су неделивни. Ноћ долази са рок музиком и пивом. Србијанци говоре с почастима у срцу. Четири хилјаде наступа годишње оживе место."},

  {id:109,n:"Danube Islands (Ada Ciganlija)",a:"New Belgrade",v:["nature","sport","free"],d:25,s:"Natural island park in the middle of the Danube — swimming, beaches, and wild camping culture",st:"Ada Ciganlija is a lush island in the Danube where locals swim, sunbathe, and camp. The atmosphere is free-spirited; bring a tent or hammock and join the bohemian river scene. Sunsets over the water are epic.",im:"Time-travel: Ada became a nature reserve and beach destination in the 1980s.",t:"Free. Bus or bike across the bridge. Camping spots are semi-legal but tolerated.",c:["parks","local_only"],r:"g",nn:"Ada Ciganlija",ns:"Prirodni ostrov u Dunavu — kupanje, plaže i šatorski kampovanje",nst:"Plovite na ostrvu Ada sa lokalnim kampujućima i plaćama.",nt:"Besplatno. Autobus ili bicikl preko mosta. Kampovanje je polu-legalno."},
  {id:110,n:"Nikola Tesla Museum Courtyard",a:"Voždovac",v:["history","weird","local"],d:10,s:"Hidden museum honoring the mad scientist in his former home — strange and intimate",st:"The Tesla Museum is housed in his actual residence. Even without paying entry, the courtyard and facade evoke the eccentric genius. Locals know this as a pilgrimage site for electrical obsessives.",im:"Time-travel: Tesla lived here in the 1880s-1890s while perfecting wireless transmission.",t:"Paid entry for interior. Courtyard viewable from street. Mihaila Milovića st.",c:["history_big","architecture"],r:"g",nn:"Muzej Nikole Tesle",ns:"Muzej čudnog naučnika u njegovoj bivšoj kući",nst:"Posjetite muzej Nikolom Tesle i njegove misterije.",nt:"Ulaznica obavezna za enterijer. Devor vidljiv sa ulice."}

,{id:120,n:"Silosi Grain Silos Sunset Spot",a:"Savamala",v:["hidden", "industrial"],d:20,s:"Epic industrial ruins glowing at golden hour by the Danube!",st:"These towering old grain silos stand as forgotten giants along the riverfront, whispering tales of Belgrade's gritty past. Locals flock here for the ultimate sunset ritual, turning rusty decay into pure magic. It's the perfect hideout for adventurous souls chasing that raw, unpolished vibe.",im:"Imagine perched on a crumbling edge, beer in hand, as the sun dips behind the Danube, painting the silos in fiery orange hues.",t:"Bus 18 or 68 to Dunav riverbank near Brankov Bridge; free entry, best at sunset (golden hour ~17:00-19:00). Bring your own drinks/snacks. Almost free and worth it: nearby splavovi beers ~200 RSD.",c:["industrial", "sunset"],r:"g",nn:"Silosi (Stari Silosi)",ns:"Epčni industrijski ruševine koji sijaju u zlatnom satu pored Dunava!",nst:"Ovi visoki stari silosi stoje kao zaboravljeni divovi duž obale reke, šapćući priče o gruboj prošlosti Beograda. Lokalci dolaze ovde za ultimativni zalazak sunca, pretvarajući rđu u čistu magiju. Savršeno utočište za avanturiste koji gone sirov, neobrađen osećaj.",nt:"Autobus 18 ili 68 do Dunavske obale blizu Brankovog mosta; besplatan ulaz, najbolje u zalasku sunca (zlatni sat ~17:00-19:00). Ponesite piće/uzinu. Gotovo besplatno i vredi: obližnji splavovi pivo ~200 RSD."},
{id:121,n:"Cetinjska Street Bar-Yard Complex",a:"Savska",v:["hidden", "bohemian"],d:15,s:"Wander secret courtyards buzzing with DIY art and bar vibes!",st:"Tucked in Cetinjska 15, this maze of interconnected yards pulses with Belgrade's underground creative energy. Graffiti-splashed walls and eclectic crowds create a living street art gallery. Peek into the free-entry chaos for people-watching gold.",im:"Picture yourself drifting through dimly lit yards, laughter echoing off brick walls as strangers share stories under fairy lights.",t:"Tram 2/7/11 to Cetinjska 15 (5min walk from Savamala); free to wander courtyards, best evenings. Nurse a cheap beer if tempted (~150 RSD). ef: Grab burek at nearby pekara ~100 RSD.",c:["street art", "nightlife"],r:"g",nn:"Cetinjska Ulica Bar-Dvorište Kompleks",ns:"Šetaj tajnim dvorištima punim DIY umetnosti i barskih vibracija!",nst:"Skriveno u Cetinjskoj 15, ovaj labirint povezanih dvorišta pulsira podzemnjom kreativnom energijom Beograda. Zidovi prekriveni grafitima i eklektične mase stvaraju živu uličnu umetničku galeriju. Zavirite u besplatan haos za zlato za posmatranje ljudi.",nt:"Tramvaj 2/7/11 do Cetinjske 15 (5min hoda od Savamale); besplatno lutanje dvorištima, najbolje uveče. Popijte jeftino pivo ako vas vuče (~150 RSD). ef: Uzmite burek u obližnjoj pekarici ~100 RSD."},
{id:122,n:"Pijaca Green Market End-of-Day Popust",a:"Dorćol",v:["hidden", "local"],d:10,s:"Score discounts and soak up the chaotic market buzz near closing!",st:"As the sun dips, vendors slash prices on fresh produce in this vibrant green market frenzy. It's a whirlwind of haggling aunties, ripe fruits, and pure Serbian social theater. Dive into the end-of-day ritual for authentic local flavor.",im:"Envision baskets overflowing with cherries and kajmak, vendors shouting 'popust!' as the crowd surges in electric anticipation.",t:"Markets like Bajloni (Dorćol) or Zeleni Venac; arrive ~16:30-17:00 for discounts; totally free to browse/atmosphere. Best weekdays.",c:["markets", "culture"],r:"g",nn:"Pijaca Zeleni Tržnica Popust",ns:"Ostvari popuste i upij kaotičan tržni žar oko zatvaranja!",nst:"Kako sunce zalazi, prodavci seku cene na svežem voću u ovom živahnom zelenom tržnom ludilu. Vrtlog cene-kačkih tetki, zrelih plodova i čiste srpske socijalne pozornice. Zaronite u ritual kraja dana za autentičan lokalni ukus.",nt:"Tržnice poput Bajlonija (Dorćol) ili Zelenog Venca; dođite ~16:30-17:00 za popuste; potpuno besplatno za pregled/ambijent. Najbolje radnim danima."},

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
