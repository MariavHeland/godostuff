  {id:1,n:"Ribeira Waterfront (Medieval Streets) — Ribeira",a:"Ribeira",v:["history", "beautiful"],d:1,s:"Tilework, laundry, fishermen, 500 years of layered history in narrow streets dropping to the river below.",st:"Narrow streets slope steeply. Laundry hangs between buildings like colored flags. Stone walls everywhere. You smell river and cooking. The Douro stretches below, its industrial past visible in crumbling warehouses.",im:"It\'s 1520. A ship docks. Spices and gold are unloaded. The city is becoming rich.",t:"Narrow streets slope steeply. Laundry hangs between buildings like colored flags. Stone walls everywhere. You smell river and cooking. The Douro stretches below, its industrial past visible in crumbling warehouses.\",im:\"It\'s 1520. A ship docks. Spices and gold are unloaded. The city is becoming rich.\",t:\"Enter from hilltop or climb from riverbank. Free walking. Wear grip shoes—steep cobblestones. Early morning before crowds.",c:["history_big", "beautiful"],r:"g",nn:"Ribeira Waterfront (Medieval Streets)",ns:"Ribeira Waterfront (Medieval Streets) é joia portuguesa.",nst:"Ribeira Waterfront (Medieval Streets) respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},

  {id:6,n:"Miragaia Fisherman Quarter — Miragaia",a:"Miragaia",v:["local_only", "history"],d:6,s:"Neighborhood where fishermen\'s families actually live—not gentrified, just daily life in medieval streets.",st:"Women hang laundry from windows 4 stories up. Fishermen repair nets in doorways. The smell of fish and cooking. Kids play soccer in tiny squares. Architecture is functional and old.",im:"It\'s 1950. This is how everyone lived. Now it\'s rare and precious.",t:"Women hang laundry from windows 4 stories up. Fishermen repair nets in doorways. The smell of fish and cooking. Kids play soccer in tiny squares. Architecture is functional and old.\",im:\"It\'s 1950. This is how everyone lived. Now it\'s rare and precious.\",t:\"Walk slowly. Don\'t photograph people without asking. Go early morning or early evening. Bring cash for tiny cafés.",c:["local_only", "history_big"],r:"g",nn:"Miragaia Fisherman Quarter",ns:"Miragaia Fisherman Quarter é joia portuguesa.",nst:"Miragaia Fisherman Quarter respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},

  {id:10,n:"Porto Wine Cellars (Free Tastings) — Vila Nova de Gaia",a:"Vila Nova de Gaia",v:["history", "free"],d:10,s:"Historic cellars where port wine aged for centuries—some offer free tastings in 300-year-old barrel rooms.",st:"Wooden barrels stretch cathedral-like. The smell is intoxicating—alcohol and oak and time. Light filters through tiny windows. Bottles age in darkness. The temperature is cool and constant.",im:"It\'s 1750. A barrel is filled and dated. It will sit here 40 years before anyone tastes it.",t:"Wooden barrels stretch cathedral-like. The smell is intoxicating—alcohol and oak and time. Light filters through tiny windows. Bottles age in darkness. The temperature is cool and constant.\",im:\"It\'s 1750. A barrel is filled and dated. It will sit here 40 years before anyone tastes it.\",t:\"Cross the bridge, walk to cellars. Some free (small tastings), some €10-15. Go off-season for fewer crowds. Morning tastings quietest.",c:["free_museum", "history_big"],r:"g",nn:"Porto Wine Cellars (Free Tastings)",ns:"Porto Wine Cellars (Free Tastings) é joia portuguesa.",nst:"Porto Wine Cellars (Free Tastings) respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},

  {id:12,n:"Fontainhas Colorful Houses — Fontainhas",a:"Fontainhas",v:["beautiful", "hidden", "local_only"],d:12,s:"Houses painted in every color, stacked impossibly on a cliff—locals live here, tourists get lost finding it.",st:"Houses pressed together, painted blues, yellows, pinks, greens. Stairs wind between them. Laundry hangs. Cats sleep. The view drops away. It\'s chaotic and beautiful and genuine.",im:"It\'s 1970s. Painters color their houses to express themselves in a gray world.",t:"Houses pressed together, painted blues, yellows, pinks, greens. Stairs wind between them. Laundry hangs. Cats sleep. The view drops away. It\'s chaotic and beautiful and genuine.\",im:\"It\'s 1970s. Painters color their houses to express themselves in a gray world.\",t:\"Walk from Ribeira or bus. Hard to find—that\'s the appeal. Go early morning when light is golden. Respect privacy.",c:["beautiful", "local_only"],r:"g",nn:"Fontainhas Colorful Houses",ns:"Fontainhas Colorful Houses é joia portuguesa.",nst:"Fontainhas Colorful Houses respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},

  {id:16,n:"Matosinhos Beach (Fish Restaurants) — Matosinhos",a:"Matosinhos",v:["beautiful", "local_only"],d:16,s:"Beach where fishermen\'s families live and eat—grilled sardines on the beach, beer, the Atlantic, unfiltered Porto life.",st:"Beach is rocky. Waves are strong. Along shore, tiny restaurants with tables on sand. Grilled fish arrives steaming. Beer is cold. Ocean spray mixes with smoke. Fishermen eat here too.",im:"It\'s 1960. This beach is how people vacationed if they were lucky.",t:"Beach is rocky. Waves are strong. Along shore, tiny restaurants with tables on sand. Grilled fish arrives steaming. Beer is cold. Ocean spray mixes with smoke. Fishermen eat here too.\",im:\"It\'s 1960. This beach is how people vacationed if they were lucky.\",t:\"Tram to Matosinhos. Walk beach. Pick any restaurant—all good. €10-15 for fresh grilled fish. Go for lunch. Bring cash.",c:["beautiful", "local_only"],r:"g",nn:"Matosinhos Beach (Fish Restaurants)",ns:"Matosinhos Beach (Fish Restaurants) é joia portuguesa.",nst:"Matosinhos Beach (Fish Restaurants) respira história. Gerações caminharam aqui. Agora você. É experiência que muda.",nt:"Ouça os locais. Chegue cedo. Respire lentamente. Deixe-se surpreender."},

,{id:121,n:"Sé District Medieval Maze",a:"Sé",v:["hidden", "authentic"],d:15,s:"Porto's oldest neighborhood—narrow cobbled streets, laundry-draped balconies, medieval atmosphere without the crowds",st:"Granite walls and steep staircases wind through tightly packed houses that feel frozen in time. The Sé Cathedral dominates from above, watching over hidden alleys where locals still live their daily lives. Walking here means discovering Porto before tourism reshaped it.",im:"Imagine climbing a narrow staircase between two ancient buildings, laundry fluttering overhead, and suddenly emerging onto a viewpoint overlooking the entire Douro River valley.",t:"Start near Sé Cathedral (easily reached from São Bento station). Best visited early morning or late afternoon to avoid midday heat in narrow streets. Free to wander. Recommended for photography, traditional fado restaurants, and authentic Porto experience. Allow 1.5–2 hours.",c:["neighborhoods", "history", "photography"],r:"g",nn:"Bairro da Sé",ns:"O labirinto medieval mais antigo do Porto—ruas de calçada, roupa pendurada, atmosfera medieval sem multidões",nst:"Muros de granito e escadas íngremes serpenteia entre casarões apinhados que parecem congelados no tempo. A Catedral da Sé domina de cima, vigiando becos escondidos onde os locais ainda vivem suas vidas diárias. Caminhar aqui significa descobrir o Porto antes do turismo o remodelar.",nt:"Comece perto da Catedral da Sé (fácil acesso da estação de São Bento). Melhor visitado no início da manhã ou final da tarde para evitar calor do meio-dia nas ruas estreitas. Gratuito para explorar. Recomendado para fotografia, restaurantes tradicionais de fado e experiência autêntica do Porto. Reserve 1,5–2 horas."},
{id:122,n:"Bonfim Street Art & Creative Spaces",a:"Bonfim",v:["hidden", "artistic"],d:18,s:"Working-class neighborhood in creative transformation—street art, minimalist cafés, emerging cultural spaces, and stories still being written",st:"Bonfim attracts students, artists, and locals seeking something different from Porto's postcard image. Old houses with decadent charm sit alongside fresh murals and independent galleries. Every corner feels like it has a narrative unfolding in real time.",im:"Picture yourself turning a corner to discover a half-finished mural, a tiny café with mismatched vintage chairs, and a group of art students debating their latest installation.",t:"Accessible via metro (Bonfim station on Line A). Less touristy than Ribeira or Cedofeita, so fewer crowds and lower prices. Best explored on foot, wandering side streets. Free to explore. Allow 1–2 hours. Pair with cheap eats at nearby student cafés.",c:["neighborhoods", "street-art", "culture"],r:"g",nn:"Bairro do Bonfim",ns:"Bairro de classe trabalhadora em transformação criativa—arte de rua, cafés minimalistas, espaços culturais emergentes",nst:"Bonfim atrai estudantes, artistas e locais que buscam algo diferente da imagem de postal do Porto. Casarões antigos com encanto decadente ficam ao lado de murais frescos e galerias independentes. Cada esquina parece ter uma narrativa se desdobrando em tempo real.",nt:"Acessível via metrô (estação Bonfim na Linha A). Menos turístico que Ribeira ou Cedofeita, então menos multidões e preços mais baixos. Melhor explorado a pé, vagando pelas ruas laterais. Gratuito para explorar. Reserve 1–2 horas. Combine com comidas baratas em cafés de estudantes próximos."},
{id:123,n:"Marquês Residential Calm",a:"Marquês",v:["hidden", "local"],d:12,s:"Classic residential neighborhood where Porto actually lives—tree-lined squares, children playing, elderly residents chatting, zero tourist infrastructure",st:"Marquês is where you see real Portuguese daily life unfolding. Tall buildings frame quiet squares with small gardens. The metro station keeps it well-connected, but few visitors venture here. It feels genuinely lived-in, not performed for cameras.",im:"Imagine sitting on a stone bench in a small plaza, watching children play while elderly residents chat in Portuguese, completely unbothered by your presence.",t:"Metro station Marquês (Line A or D) puts you in the heart. Very well-connected but intentionally off the tourist trail. Free to explore and sit. Best visited during afternoon hours when neighborhood life is most visible. Allow 1–1.5 hours for a genuine neighborhood walk.",c:["neighborhoods", "local-life"],r:"g",nn:"Bairro do Marquês",ns:"Bairro residencial clássico onde o Porto realmente vive—praças arborizadas, crianças brincando, moradores idosos conversando",nst:"Marquês é onde você vê a vida diária portuguesa real se desdobrando. Edifícios altos emolduram praças tranquilas com pequenos jardins. A estação de metrô o mantém bem conectado, mas poucos visitantes se aventuram aqui. Parece genuinamente vivido, não encenado para câmeras.",nt:"Estação de metrô Marquês (Linha A ou D) o coloca no coração. Muito bem conectado, mas intencionalmente fora do caminho turístico. Gratuito para explorar e sentar. Melhor visitado durante horas da tarde quando a vida do bairro é mais visível. Reserve 1–1,5 horas para um passeio genuíno pelo bairro."},
{id:124,n:"Miragaia Quiet Riverfront",a:"Miragaia",v:["hidden", "peaceful"],d:14,s:"Peaceful extension of Ribeira along the Douro—colorful houses, moored boats, narrow streets where time moves slowly and tourists rarely venture",st:"Miragaia feels like Ribeira's quieter sibling. Colorful houses line narrow streets that open onto views of moored fishing boats. Art students, curious travelers, and locals who have no intention of leaving create an unhurried atmosphere. The river breeze carries the smell of the sea.",im:"Picture yourself walking a narrow street between pastel-colored buildings, suddenly emerging to see fishing boats bobbing on the Douro, with no crowds in sight.",t:"Located directly along the Douro River, accessible from Ribeira by walking downhill toward the water. Free to explore. Best visited late afternoon or early evening when fishermen return and light turns golden. Allow 1–1.5 hours. Fewer restaurants than Ribeira, so eat first or bring snacks.",c:["neighborhoods", "riverside", "photography"],r:"g",nn:"Bairro da Miragaia",ns:"Extensão tranquila da Ribeira ao longo do Douro—casarões coloridos, barcos atracados, ruas estreitas onde o tempo se move lentamente",nst:"Miragaia parece ser a irmã mais tranquila da Ribeira. Casarões coloridos alinham ruas estreitas que se abrem para vistas de barcos de pesca atracados. Estudantes de arte, viajantes curiosos e locais que não têm intenção de sair criam uma atmosfera desapressada. A brisa do rio carrega o cheiro do mar.",nt:"Localizado diretamente ao longo do Rio Douro, acessível da Ribeira caminhando morro abaixo em direção à água. Gratuito para explorar. Melhor visitado no final da tarde ou início da noite quando os pescadores retornam e a luz fica dourada. Reserve 1–1,5 horas. Menos restaurantes que Ribeira, então coma primeiro ou traga lanches."},
{id:125,n:"Cedofeita Bohemian Art District Deep Dive",a:"Cedofeita",v:["artistic", "bohemian"],d:16,s:"Porto's answer to Montmartre—20+ art galleries on Miguel Bombarda street, concept stores, best breakfast/brunch scene, and genuine bohemian energy",st:"Cedofeita pulses with creative energy. Miguel Bombarda street alone hosts over 20 galleries showcasing contemporary art, installations, and emerging artists. Beyond galleries, the neighborhood offers the best breakfast and brunch culture in Porto, with concept stores mixing vintage finds and local design. It's where Porto's creative class actually gathers.",im:"Imagine gallery-hopping on a Saturday morning, stopping for a perfect cappuccino at a minimalist café, then discovering a vintage bookstore hidden in a converted warehouse.",t:"Start at Praça Carlos Alberto and walk down Miguel Bombarda street (perpendicular to Cedofeita). Most galleries are free to enter. Best visited Saturday morning or weekday afternoon. Many galleries close Mondays. Allow 2–3 hours for proper exploration. Excellent cheap eats nearby (see research source for Espaço 77, Pimenta Rosa).",c:["neighborhoods", "art-galleries", "food"],r:"g",nn:"Bairro das Artes (Cedofeita)",ns:"Resposta do Porto a Montmartre—20+ galerias de arte na rua Miguel Bombarda, lojas conceituais, melhor cena de café da manhã/brunch",nst:"Cedofeita pulsa com energia criativa. A rua Miguel Bombarda sozinha hospeda mais de 20 galerias exibindo arte contemporânea, instalações e artistas emergentes. Além das galerias, o bairro oferece a melhor cultura de café da manhã e brunch do Porto, com lojas conceituais misturando achados vintage e design local. É onde a classe criativa do Porto realmente se reúne.",nt:"Comece na Praça Carlos Alberto e caminhe pela rua Miguel Bombarda (perpendicular a Cedofeita). A maioria das galerias é gratuita para entrar. Melhor visitado sábado de manhã ou tarde de dia de semana. Muitas galerias fecham segundas. Reserve 2–3 horas para exploração adequada. Excelentes comidas baratas próximas."}];

{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
