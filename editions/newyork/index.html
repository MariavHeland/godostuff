<script>
const P = [
  {id:1,n:"Dead Horse Bay Brooklyn Beach",a:"Brooklyn",v:["weird", "hidden", "history"],d:12,s:"A beach made of Depression-era garbage and horse bones where horses were discarded before cars existed",st:"Dead Horse Bay is at the far end of Brooklyn, where factories once dumped waste including horse carcasses and broken pottery from the 1930s. The beach is covered in fragments: broken bottles, ceramics, and bones. It is a time capsule of urban waste. Archaeologists study it. Few tourists know it exists. It is beautiful and disturbing simultaneously.",im:"Fragments of colored glass lie on black sand next to pieces of ancient pottery while a woman carefully photographs pieces, reconstructing the past from garbage.",t:"Subway A train to Canarsie-Rockaway Parkway. Walk east 20 minutes. Beach free. Open anytime. Best low tide. Two hours.",c:["weird"],r:"g",nn:"Dead Horse Bay",ns:"Una playa hecha de basura y huesos de caballos",nst:"Dead Horse Bay está en el extremo lejano de Brooklyn, donde las fábricas descargaban desperdicios que incluían cadáveres de caballos y cerámica rota de los años 1930. La playa está cubierta de fragmentos: botellas rotas, cerámica y huesos.",nt:"Tren A hasta Canarsie-Rockaway Parkway. Camina al este 20 minutos. Playa gratis. Abierto cualquier hora."},
  {id:2,n:"Unterberg Poetry Center YIVO Archive",a:"Lower East Side",v:["hidden", "history", "quiet"],d:8,s:"An archive of Yiddish civilization in an old building on the Lower East Side, free to visit",st:"YIVO is an archive of Yiddish language, literature, and culture. The Unterberg Poetry Center is a reading room containing thousands of documents, recordings, and texts in Yiddish. It is rarely visited. You can sit and listen to recordings of Yiddish poetry from the early 1900s. It is a museum of a lost world that was erased.",im:"A woman listens through headphones to a recording of a Yiddish poet reading in a voice from 1935, while dust motes float in afternoon light through tall windows.",t:"Subway F or M to Second Ave, exit 1. Walk north 3 blocks. Entry free. Open Monday-Thursday 10am-5pm. One to two hours.",c:["history_big"],r:"g",nn:"Centro de Poesía de Unterberg",ns:"Archivo de la civilización Yiddish",nst:"YIVO es un archivo de idioma, literatura y cultura Yiddish. El Centro de Poesía Unterberg es una sala de lectura con miles de documentos, grabaciones y textos en Yiddish.",nt:"Tren F o M a Second Ave. Camina norte 3 cuadras. Entrada gratis. Abierto lunes-jueves 10-17 horas."},
  {id:3,n:"The High Line Before 8am",a:"Chelsea",v:["quiet", "beautiful", "free"],d:12,s:"An elevated park on a repurposed railway, completely empty before 8am, packed with tourists after",st:"The High Line is a 1.5-mile elevated park built on an old freight rail line. During the day it is crowded. Before 8am it is completely empty. You walk through the space alone: plants, views of the Hudson, galleries and restaurants still closed. The architecture and plants are visible without crowds. By 9am it fills with hundreds of people.",im:"A single person walks a completely empty elevated pathway lined with native plants and tall buildings, morning light creating long shadows.",t:"Subway A/C/E to 14th St, exit 1. High Line entrance nearby. Free. Open 7am-10pm. Go 6:30am-8am. One to two hours.",c:["parks"],r:"g",nn:"The High Line Antes de las 8am",ns:"Un parque elevado completamente vacío al amanecer",nst:"The High Line es un parque elevado de 1,5 millas construido en una vieja línea de ferrocarril de carga. Durante el día está lleno. Antes de las 8am está completamente vacío. Camina solo a través del espacio.",nt:"Tren A/C/E a 14th St. Entrada a High Line cerca. Gratis. Abierto 7-22 horas. Ve 6:30-8 horas."},
  {id:4,n:"Green-Wood Cemetery Brooklyn",a:"Brooklyn",v:["history", "beautiful"],d:20,s:"A 478-acre Victorian cemetery where Boss Tweed and Basquiat are buried, beautiful and peaceful",st:"Green-Wood Cemetery is the largest cemetery in New York, 478 acres of rolling hills, monuments, and graves. Boss Tweed is buried here, Jean-Michel Basquiat is here, and thousands of notable New Yorkers. It is open to the public and is more like a museum of sculpture and landscape than a cemetery. Free to walk. Many come to run or sit quietly.",im:"A woman sits on a bench beside a Victorian monument while birds sing and the city skyline is visible in the distance, and stone angels watch over the graves.",t:"Subway N or R to 36th St, exit 1. Cemetery entrance is a block away. Free entry. Open 8am-5pm. Two to four hours depending on route.",c:["history_big"],r:"g",nn:"Cementerio Green-Wood",ns:"Un cementerio de 478 acres donde reposan figuras famosas",nst:"El Cementerio Green-Wood es el cementerio más grande de Nueva York, con 478 acres de colinas, monumentos y tumbas. Boss Tweed está enterrado aquí, Jean-Michel Basquiat también.",nt:"Tren N o R a 36th St. Entrada al cementerio a una cuadra. Entrada gratis. Abierto 8-17 horas."},
  {id:5,n:"Newtown Creek Nature Walk Greenpoint",a:"Greenpoint",v:["hidden", "nature", "weird"],d:10,s:"A walk along the most polluted waterway in America that is being restored to wetlands and birds",st:"Newtown Creek was the most polluted body of water in the United States. Now it is being restored and a nature trail follows the creek. You see how nature returns to human wastelands. It is beautiful in an unexpected way: egrets, herons, marshes, and resilience. The industrial past is visible, the natural future is growing.",im:"A great blue heron stands motionless in a restored wetland while an old industrial building sits abandoned across the water and the creek moves slowly between them.",t:"Subway G to Greenpoint Ave, exit 1. Walk to creek area 10 minutes. Nature walk free. Open anytime. Two hours.",c:["nature"],r:"g",nn:"Paseo de la Naturaleza de Newtown Creek",ns:"Una caminata por la vía fluvial más contaminada que se restaura",nst:"Newtown Creek fue el cuerpo de agua más contaminado de Estados Unidos. Ahora se está restaurando y un sendero natural sigue el arroyo.",nt:"Tren G a Greenpoint Ave. Camina hacia el área del arroyo 10 minutos. Paseo de naturaleza gratis."},
  {id:6,n:"Governors Island Ferry and Car-Free Island",a:"Governors Island",v:["free", "beautiful", "quiet"],d:15,s:"A car-free island in the harbor with free ferry access, great views of Manhattan and old fortresses",st:"Governors Island is reached by free ferry. The entire island is car-free. You walk, bike, or rent a cart. The island has historic fortresses, a nature preserve, open space, and views of Manhattan. Few New Yorkers know about it. It feels completely removed from the city while being 10 minutes from downtown.",im:"A cyclist rides on an empty path while the Manhattan skyline rises across the water and an old stone fortress sits quietly in the distance.",t:"Ferry from Battery Park (near Subway 4/5 to Bowling Green). Free ferry. Island open May-September 10am-6pm, limited hours other seasons. One to four hours.",c:["parks"],r:"g",nn:"Isla de Gobernadores",ns:"Una isla libre de autos con acceso gratuito en ferry",nst:"La Isla de Gobernadores es accesible por ferry gratuito. Toda la isla no tiene autos. Camina, monta bicicleta o renta un carrito.",nt:"Transatlántico desde Battery Park. Ferry gratuito. Isla abierta mayo-septiembre 10-18 horas."},
  {id:7,n:"Inwood Hill Park Old Growth Forest",a:"Inwood",v:["nature", "hidden"],d:20,s:"Manhattan's last old-growth forest with Native American cave drawings, 218 acres at the island's tip",st:"Inwood Hill Park is Manhattan's northern tip, a forest of 218 acres. Most of Manhattan was clearcut 300 years ago. This forest remains. There are Native American cave drawings on stone. Hiking trails go through old forest with massive trees. It is the only place on Manhattan where you forget the city exists.",im:"An old oak tree stands with gnarled branches while a woman touches a stone marked with faded red paint made hundreds of years ago by Native Americans.",t:"Subway A to Inwood, exit 1. Walk west to park entrance 10 minutes. Free. Open dawn-dusk. Two to three hours.",c:["parks", "nature"],r:"g",nn:"Parque Inwood Hill",ns:"El último bosque original de Manhattan",nst:"Inwood Hill Park es la punta norte de Manhattan, un bosque de 218 acres. Hace 300 años la mayoría de Manhattan fue talado. Este bosque permanece.",nt:"Tren A a Inwood. Camina oeste a la entrada del parque 10 minutos. Gratis. Abierto amanecer-anochecer."},
  {id:8,n:"The Ramble Central Park Bird Migration",a:"Midtown",v:["nature", "quiet", "beautiful"],d:12,s:"A 36-acre woodland in Central Park where bird migrations concentrate, full of birdwatchers in spring",st:"The Ramble is a wild woodland section of Central Park. During spring migration, thousands of birds pass through and concentrate in this area. Birdwatchers arrive before dawn. You see warblers, vireos, tanagers, and rare species. It is one of North America's premier birding locations. No knowledge of birds is required. The experience is magical.",im:"A woman holds binoculars while pointing upward at a flash of orange wings in the canopy, a warbler momentarily visible before disappearing into the branches.",t:"Subway A/B/C to 81st St, exit 1. Walk to Ramble entrance 5 minutes. Free. Open anytime. Best 5am-10am April-May. Two hours.",c:["parks", "nature"],r:"g",nn:"The Ramble",ns:"Un bosque de 36 acres donde se concentran migraciones de aves",nst:"The Ramble es una sección de bosque salvaje de Central Park. Durante la migración de primavera, miles de pájaros pasan y se concentran en este área.",nt:"Tren A/B/C a 81st St. Camina a la entrada de Ramble 5 minutos. Gratis. Abierto cualquier hora."},
  {id:9,n:"Roosevelt Island Tramway and Island",a:"Roosevelt Island",v:["free", "quiet", "beautiful"],d:15,s:"A cable car over the East River to an island with ruins, parks, and views of Manhattan",st:"The Roosevelt Island Tramway is an aerial cable car that crosses the East River. Entry is free with a MetroCard. The tram itself is the main experience: views of the city, the river, and the island below. The island has parks, ruins of old hospital, and wide promenades. Few tourists. The vibe is that you have discovered a hidden place.",im:"A man rides the tram alone while the city rises on both sides and the East River moves beneath him, his face reflecting peace and the joy of simple height and views.",t:"Subway N/Q/R/W to Lexington Ave 59th St, exit 1. Tram visible. Tram free with MetroCard. Island open anytime. One to three hours.",c:["parks"],r:"g",nn:"Teleférico de la Isla Roosevelt",ns:"Un teleférico gratis con vistas de la ciudad",nst:"El Teleférico de la Isla Roosevelt es un teleférico aéreo que cruza el East River. La entrada es gratis con una MetroCard.",nt:"Tren N/Q/R/W a Lexington Ave 59th St. Teleférico visible. Teleférico gratis."},
  {id:10,n:"Elevated Acre Rooftop Park at 55 Water Street",a:"Lower Manhattan",v:["hidden", "beautiful", "quiet"],d:8,s:"A secret rooftop public park hidden five stories up in a financial district building, free and empty",st:"Elevated Acre is a rooftop plaza on top of an office building in the Financial District. It is technically open to the public but almost nobody knows about it. You access it through the building. The plaza is quiet, planted with trees, and overlooks the downtown waterfront. Occasionally you find people eating lunch. Often you are alone.",im:"A woman sits alone on a bench on a rooftop plaza 50 feet above the street, while the city moves below her and she is completely removed from it.",t:"Subway 4/5 to Bowling Green, exit 1. Walk to 55 Water Street. Enter through main lobby. Rooftop free. Open 8am-5:30pm weekdays. 30 minutes to one hour.",c:["parks"],r:"g",nn:"Acre Elevado",ns:"Un parque en azotea oculto cinco pisos arriba",nst:"Elevated Acre es una plaza en azotea en la parte superior de un edificio de oficinas en el Distrito Financiero.",nt:"Tren 4/5 a Bowling Green. Camina a 55 Water Street. Entrada por vestíbulo principal. Azotea gratis."},
  {id:11,n:"Greenpoint Terminal Warehouse Ruin Photography",a:"Greenpoint",v:["weird", "hidden"],d:8,s:"A massive abandoned warehouse visible from McGuinness Boulevard, a ruin that photographers documented",st:"The Greenpoint Terminal is a vast, decaying warehouse visible from McGuinness Boulevard. It has been abandoned for years. Photographers have documented it extensively. You cannot enter, but the exterior is remarkable: broken windows, faded paint, the scale of abandoned industry. It is a ruin on the edge of gentrification.",im:"A five-story warehouse with hundreds of broken windows stands empty while graffiti and peeling paint create layers of decay and street artists' marks.",t:"Subway G to Greenpoint Ave, exit 1. Walk south 10 minutes to McGuinness Boulevard. Viewable from street. Free. Best overcast days. 30 minutes.",c:["weird"],r:"g",nn:"Almacén Terminal Greenpoint",ns:"Un almacén abandonado masivo",nst:"El Terminal Greenpoint es un almacén vasto y en descomposición visible desde McGuinness Boulevard.",nt:"Tren G a Greenpoint Ave. Camina sur 10 minutos a McGuinness Boulevard. Visible desde la calle. Gratis."},
  {id:12,n:"City Hall Station Closed Subway Station 1945",a:"Lower Manhattan",v:["hidden", "history"],d:5,s:"A legendary closed subway station visible from the 6 train, abandoned since 1945, viewable without trespassing",st:"City Hall Station is a beautiful Art Deco subway station closed in 1945. It is visible from the 6 train which passes through it. You can see the tiles, the platform, the chandeliers from the train without entering. It has been abandoned for 80 years. It is a ghost station frozen in time.",im:"From a moving train window, an abandoned platform with ornate chandeliers is briefly visible, the Art Deco tilework creating beauty in a place no one has visited in decades.",t:"Subway 6 train runs through it. Board at Brooklyn Bridge-City Hall, stay on train as it loops back. You will see the station for 20 seconds. Free.",c:["history_big"],r:"g",nn:"Estación de City Hall Cerrada",ns:"Una estación de metro cerrada y visible desde el tren",nst:"La Estación de City Hall es una hermosa estación de metro Art Deco cerrada en 1945. Es visible desde el tren 6 que la atraviesa.",nt:"Tren 6 corre a través de él. Sube en Brooklyn Bridge-City Hall. Verás la estación brevemente. Gratis."},
  {id:13,n:"Socrates Sculpture Park Astoria Queens",a:"Astoria",v:["free", "beautiful", "art"],d:12,s:"A free waterfront sculpture park in Queens with large-scale art and Manhattan skyline views",st:"Socrates Sculpture Park is a waterfront park in Astoria, Queens. Large sculptures rotate through the space. It is completely free. The views of Manhattan across the East River are stunning. The sculptures are serious contemporary art, not park decoration. Few tourists venture to Queens. This is a gem.",im:"A massive sculpture of twisted metal and wood stands in an empty park while the Manhattan skyline rises across the water in the background.",t:"Subway N/W to Broadway, exit 1. Walk north 10 minutes to park. Free. Open sunrise-sunset. One to two hours.",c:["art"],r:"g",nn:"Parque de Escultura Sócrates",ns:"Un parque de escultura gratuito en la orilla del agua",nst:"El Parque de Escultura Sócrates es un parque frente al mar en Astoria, Queens. Las esculturas grandes rotan en el espacio.",nt:"Tren N/W a Broadway. Camina norte 10 minutos al parque. Gratis. Abierto amanecer-anochecer."},
  {id:14,n:"The Noguchi Museum Long Island City",a:"Long Island City",v:["beautiful", "quiet", "art"],d:10,s:"The finest sculpture museum in New York with works by Isamu Noguchi, cheap entry and mostly empty",st:"The Noguchi Museum is dedicated to the work of sculptor Isamu Noguchi. The building and gardens display his sculptures: stone, wood, metal, and abstract forms. The museum is quiet and rarely crowded. It is one of the best museums in New York. Entry is only 10 dollars. Most New Yorkers have never been.",im:"A smooth stone sculpture sits in a garden courtyard while natural light illuminates its curves and a visitor sits silently on a bench studying its shape.",t:"Subway N/W to Long Island City, exit 1. Walk northeast 5 minutes. Entry 10 dollars. Open 10am-5pm Wednesday-Monday. Two hours.",c:["beautiful"],r:"y",nn:"Museo Noguchi",ns:"El mejor museo de escultura de Nueva York",nst:"El Museo Noguchi está dedicado al trabajo del escultor Isamu Noguchi. El edificio y los jardines muestran sus esculturas.",nt:"Tren N/W a Long Island City. Camina noreste 5 minutos. Entrada 10 dólares. Abierto 10-17 miércoles-lunes."},
  {id:15,n:"Williamsburg Bridge Walk",a:"Williamsburg",v:["beautiful", "quiet"],d:12,s:"A walkway crossing the East River less famous than Brooklyn Bridge, with better views and fewer crowds",st:"The Williamsburg Bridge has a dedicated pedestrian walkway. It is less crowded than the Brooklyn Bridge. The views of the Manhattan skyline, the river, and Brooklyn waterfront are equal or better. You walk across, see the engineering, feel the height. The experience is more intimate than the tourist-packed Brooklyn Bridge.",im:"A woman walks the bridge while the span stretches ahead and the river moves below and the city rises on both sides, and she has the walkway almost to herself.",t:"Subway J/M/Z to Marcy Ave, exit 1. Walk to bridge entrance 5 minutes. Free. Open dawn-midnight. One to two hours.",c:["beautiful"],r:"g",nn:"Paseo del Puente Williamsburg",ns:"Un puente menos famoso que el Brooklyn Bridge, mejores vistas",nst:"El Puente Williamsburg tiene un paseo peatonal dedicado. Es menos concurrido que el Puente de Brooklyn.",nt:"Tren J/M/Z a Marcy Ave. Camina a la entrada del puente 5 minutos. Gratis. Abierto amanecer-medianoche."},
  {id:16,n:"Mmuseumm Smallest Museum in Elevator Shaft",a:"Tribeca",v:["weird", "hidden"],d:3,s:"The world's smallest museum in a freight elevator shaft, permanent collection of tiny, strange objects",st:"Mmuseumm is literally a museum inside a freight elevator shaft. It is the size of a closet. The collection rotates but includes bizarre small items: a bottle of Saddam Hussein cologne, a toy soldier collection, strange artifacts. You look at the display for five minutes. It is conceptual art and genuine oddity combined.",im:"A woman stands before an elevator shaft converted to a display case, her eyes close to the glass while objects inside catch light at strange angles.",t:"Subway 1 to Franklin St, exit 1. Walk south on Greenwich Street. Mmuseumm is between Franklin and Leonard on street level. Free to view from street. Entrance sometimes locked.",c:["weird"],r:"g",nn:"Mmuseumm",ns:"El museo más pequeño del mundo en un pozo de ascensor",nst:"Mmuseumm es literalmente un museo dentro de un pozo de ascensor de carga. Es del tamaño de un armario.",nt:"Tren 1 a Franklin St. Camina sur en Greenwich Street. Mmuseumm está entre Franklin y Leonard."},
  {id:17,n:"Canarsie Pier End of L Train",a:"Canarsie",v:["quiet", "beautiful"],d:12,s:"The end of the L train line at a quiet waterfront pier, industrial and peaceful",st:"The L train ends at Canarsie Pier. The area is residential, industrial, and quiet. The pier extends into Jamaica Bay. Fishermen stand on it year-round. The view is of water, marshes, and the city across the water. Few tourists come. It is the edge of New York where the city meets the bay.",im:"A man sits alone fishing while the sun lowers and the Brooklyn waterfront is visible across the water and his line drifts in the still water.",t:"Subway L to Canarsie-Rockaway Parkway, exit 1. Walk to pier 10 minutes. Free. Open anytime. Best sunset. One to two hours.",c:["parks"],r:"g",nn:"Muelle de Canarsie",ns:"El final del tren L en un muelle tranquilo",nst:"El tren L termina en el Muelle de Canarsie. El área es residencial, industrial y tranquila.",nt:"Tren L a Canarsie-Rockaway Parkway. Camina al muelle 10 minutos. Gratis. Abierto cualquier hora."},
  {id:18,n:"Weeksville Heritage Center Crown Heights",a:"Crown Heights",v:["history", "free"],d:10,s:"The only surviving structures of the free Black community from 1838, preserved as a museum",st:"Weeksville was a free Black community established in 1838 in Brooklyn. By 1900 it was buried under later development. A few houses survive and are now a museum. The site tells the story of Black Brooklyn history before many neighborhoods existed. Entry is free. Few people visit. It is crucial history.",im:"An old wooden house from the 1800s sits preserved while exhibits inside tell the story of Black families who built a thriving community.",t:"Subway A/C to Nostrand Ave, exit 1. Walk to Weeksville 10 minutes. Free entry. Open 10am-5pm Thursday-Sunday. One to two hours.",c:["history_big"],r:"g",nn:"Centro de Patrimonio de Weeksville",ns:"Comunidad negra libre de 1838",nst:"Weeksville era una comunidad negra libre establecida en 1838 en Brooklyn. Por 1900 estaba enterrada bajo desarrollo posterior.",nt:"Tren A/C a Nostrand Ave. Camina a Weeksville 10 minutos. Entrada gratis. Abierto 10-17 jueves-domingo."},
  {id:19,n:"Brooklyn Navy Yard Rooftop at BLDG 92",a:"Brooklyn Navy Yard",v:["history", "beautiful"],d:10,s:"A 300-year-old military shipyard now a museum with rooftop views of the Manhattan and Brooklyn waterfronts",st:"The Brooklyn Navy Yard was where warships were built for 300 years. BLDG 92 is a museum in one of the original buildings. The rooftop has views of both the Manhattan and Brooklyn skylines, the East River, and the yards themselves. The history is visible in the infrastructure: the dry docks, the rail lines, the scale.",im:"A person stands on a rooftop looking out across the navy yard waterfront while the Manhattan skyline rises behind them and old shipping equipment sits still below.",t:"Subway A/C to High St-Brooklyn Bridge Park, exit 1. Walk to Navy Yard entrance 10 minutes. Entry to BLDG 92 free. Open noon-6pm Friday-Sunday. One to two hours.",c:["history_big"],r:"g",nn:"Astillero Naval de Brooklyn",ns:"Astillero militar de 300 años ahora museo",nst:"El Astillero Naval de Brooklyn era donde se construían buques de guerra durante 300 años.",nt:"Tren A/C a High St-Brooklyn Bridge Park. Camina a la entrada del Navy Yard 10 minutos. Entrada a BLDG 92 gratis."},
  {id:20,n:"Astoria Park Queens Under the Triborough Bridge",a:"Astoria",v:["free", "beautiful"],d:12,s:"A waterfront park in Queens under the Triborough Bridge with views of the bridge and Manhattan",st:"Astoria Park is on the waterfront in Queens, directly under the Triborough Bridge. The massive bridge looms above. Views are of the bridge structure, Manhattan across the water, and the East River. The park has an Olympic-size pool (seasonal). It is accessible and beautiful. Few tourists from Manhattan venture here.",im:"The massive bridge spans overhead while a woman lies on grass looking up at the metal structure and the sky beyond, the geometry of engineering visible above her.",t:"Subway N/W to Astoria Boulevard, exit 1. Walk south 5 minutes. Park free. Open anytime. One to two hours.",c:["parks"],r:"g",nn:"Parque Astoria",ns:"Parque frente al mar bajo el Puente Triborough",nst:"El Parque Astoria está frente al mar en Queens, directamente bajo el Puente Triborough.",nt:"Tren N/W a Astoria Boulevard. Camina sur 5 minutos. Parque gratis. Abierto cualquier hora."},
  {id:21,n:"Washington Heights Dominican Neighborhood",a:"Washington Heights",v:["local", "free"],d:15,s:"The Dominican neighborhood of Manhattan where real neighborhood life continues, bodegas and restaurants",st:"Washington Heights is a Dominican neighborhood in upper Manhattan. The area is populated by Dominican families, restaurants, bodegas, and street vendors. It is completely unpretentious. You eat excellent food cheaply. It is where Manhattan actually functions as a neighborhood, not a tourist destination. Grocery stores, schools, and laundromats serve locals.",im:"A man stands outside a small bodega eating a platano while children run past and the smell of cilantro and garlic drifts from a restaurant kitchen.",t:"Subway A to 181st St, exit 1. Walk neighborhoods 10 Am. Completely free. Best morning and afternoon. Three to four hours.",c:["local_only"],r:"g",nn:"Barrio de Washington Heights",ns:"Barrio dominicano donde la vida sigue normalmente",nst:"Washington Heights es un barrio dominicano en Manhattan superior. El área está poblada por familias dominicanas, restaurantes y bodegas.",nt:"Tren A a 181st St. Camina por los barrios. Completamente gratis. Mejor mañana y tarde."},
  {id:22,n:"The Cloisters Medieval Museum in Fort Tryon Park",a:"Washington Heights",v:["history", "beautiful", "art"],d:15,s:"A medieval art museum in a reconstructed cloister with free admission with MetroCard receipt",st:"The Cloisters is a museum of medieval art housed in a reconstructed medieval cloister. The building was assembled from real European monastery pieces. The grounds are Fort Tryon Park with views of the Hudson River. The art is world-class. Admission is free if you show a subway receipt from the last three hours.",im:"A woman stands in an open cloister courtyard surrounded by stone arches while medieval sculptures sit in alcoves and the Hudson River is visible beyond the garden.",t:"Subway A to 190th St, exit 1. Walk uphill 20 minutes to museum. Free with MetroCard receipt. Open 10am-5pm. Two to three hours.",c:["history_big"],r:"g",nn:"Los Claustros",ns:"Museo de arte medieval en un claustro reconstruido",nst:"Los Claustros es un museo de arte medieval alojado en un claustro medieval reconstruido.",nt:"Tren A a 190th St. Camina cuesta arriba 20 minutos al museo. Gratis con recibo de MetroCard."},
  {id:23,n:"Bronx Terminal Market and Arthur Avenue Little Italy",a:"The Bronx",v:["local", "history"],d:12,s:"The real Italian neighborhood of the Bronx where old family businesses serve food as they have for 80 years",st:"Arthur Avenue in the Bronx is the real Little Italy. Unlike Manhattan's Manhattan version, this is still residential Italian. Delis, bakeries, restaurants, and shops have been operated by families since the 1930s-40s. You eat extraordinary Italian food for cheap. It is how New York functioned before gentrification.",im:"An elderly Italian man cuts prosciutto by hand in a shop that has been in his family 60 years while the smells of aged salami and fresh mozzarella fill the small space.",t:"Subway 2/5 to Pelham Parkway, exit 1. Walk to Arthur Avenue 5 minutes. Free to walk. Restaurants and shops 10am-6pm. Two to three hours.",c:["local_only"],r:"g",nn:"Avenida Arthur Bronx",ns:"El verdadero Little Italy donde viven italianos",nst:"La Avenida Arthur en el Bronx es el verdadero Little Italy. A diferencia de la versión turística de Manhattan, este todavía es residencial italiano.",nt:"Tren 2/5 a Pelham Parkway. Camina a la Avenida Arthur 5 minutos. Gratis. Restaurantes 10-18 horas."},
  {id:24,n:"Woodlawn Cemetery The Bronx",a:"The Bronx",v:["history", "free", "quiet"],d:12,s:"A 400-acre cemetery where Duke Ellington, Herman Melville, and Miles Davis are buried",st:"Woodlawn Cemetery is a 400-acre Victorian cemetery in the Bronx. Duke Ellington, Miles Davis, and Herman Melville are buried here. It is open to the public, free, and peaceful. Maps show the locations of famous graves. It is a museum of American cultural history in stone. Few people visit. The vibe is quiet and contemplative.",im:"A woman stands before a grave of a jazz musician while stone sculptures and mausoleums surround her in an almost-empty cemetery.",t:"Subway 2/5 to Woodlawn, exit 1. Cemetery entrance at station. Free. Open 8:30am-4:30pm. Two to three hours.",c:["history_big"],r:"g",nn:"Cementerio Woodlawn",ns:"Cementerio donde descansan Miles Davis y Duke Ellington",nst:"El Cementerio Woodlawn es un cementerio victoriano de 400 acres en el Bronx.",nt:"Tren 2/5 a Woodlawn. Entrada al cementerio en la estación. Gratis. Abierto 8:30-16:30."},
  {id:25,n:"Red Hook Brooklyn Waterfront and IKEA Ferry",a:"Red Hook",v:["beautiful", "free"],d:15,s:"An isolated Brooklyn waterfront where the IKEA ferry brings Swedish furniture, views of Statue of Liberty",st:"Red Hook is a waterfront neighborhood in Brooklyn that is isolated from the rest of the borough. It has views of the Statue of Liberty, shipping terminals, and old warehouses. The IKEA ferry docks here (free to ride, no furniture purchase necessary). The neighborhood is gentrifying slowly. The waterfront remains working and beautiful.",im:"A man stands on a pier looking toward the Statue of Liberty in the distance while a ferry passes and old shipping equipment sits unused nearby.",t:"Subway F to Smith-9th St, exit 1. Walk south to waterfront 15 minutes. Free to explore. IKEA ferry free. One to three hours.",c:["parks"],r:"g",nn:"Red Hook",ns:"Orilla del agua aislada de Brooklyn",nst:"Red Hook es un barrio frente al mar en Brooklyn que está aislado del resto del municipio.",nt:"Tren F a Smith-9th St. Camina sur hacia la orilla 15 minutos. Gratis explorar. Ferry IKEA gratis."},
  {id:26,n:"Coney Island Off-Season November to March",a:"Coney Island",v:["quiet", "beautiful"],d:20,s:"The boardwalk and beach are peaceful and empty November-March, no summer crowds or noise",st:"Coney Island is crowded in summer. November through March it is quiet and mostly empty. The boardwalk is peaceful. The beach is deserted. The amusement park operates but is sparse. The atmosphere is nostalgic and contemplative. You see the bones of the place without summer tourism.",im:"A lone woman walks a completely empty boardwalk while the Atlantic Ocean moves in the distance and wind blows debris across the wooden planks.",t:"Subway F/Q to Coney Island-Stillwell Ave, exit 1. Boardwalk immediately accessible. Free. Open anytime. One to two hours.",c:["parks"],r:"g",nn:"Coney Island Fuera de Temporada",ns:"La playa vacía de noviembre a marzo",nst:"Coney Island está abarrotado en verano. De noviembre a marzo es tranquilo y mayormente vacío.",nt:"Tren F/Q a Coney Island-Stillwell Ave. Paseo marítimo accesible. Gratis. Abierto cualquier hora."},
  {id:27,n:"Flushing Meadows Park 1964 World Fair Ruins",a:"Flushing",v:["weird", "free", "history"],d:15,s:"A park with 1964 World Fair ruins, the Unisphere, and Queens Museum, all free",st:"Flushing Meadows-Corona Park contains remains of the 1964 World's Fair. The Unisphere is the iconic sphere structure. Buildings from the fair remain, some abandoned. The Queens Museum is inside one of the pavilions (free admission). The park is vast, underfunded, and fascinating. Most people miss the history hiding in the ruins.",im:"The massive metal Unisphere stands in a park while crumbling 1960s buildings sit nearby, showing how fairs fade into ruin.",t:"Subway 7 to Mets-Willets Point, exit 1. Park entrance at stadium. Free to walk. Queens Museum free admission. Two to four hours.",c:["weird"],r:"g",nn:"Parque Flushing Meadows",ns:"Ruinas de la Feria Mundial de 1964",nst:"El Parque Flushing Meadows-Corona contiene restos de la Feria Mundial de 1964.",nt:"Tren 7 a Mets-Willets Point. Entrada al parque en el estadio. Gratis. Museo de Queens entrada gratis."},
  {id:28,n:"Jackson Hole Diner Astoria Authentic Greek",a:"Astoria",v:["local", "free"],d:5,s:"An authentic Greek-American diner operating since 1970s, unchanged interior, affordable Greek food",st:"Jackson Hole is a Greek diner in Astoria that has operated since the 1970s. The interior is unchanged. Booths are vinyl. The menu is basic: eggs, toast, Greek specialties, cheap. The clientele is almost entirely Greek. It is a time capsule of what diners were.",im:"An elderly Greek man sits at the counter eating eggs while a younger waitress in an apron pours coffee and the diner hums with the sound of plates and conversation.",t:"Subway N/W to Astoria Boulevard, exit 1. Diner 5 minutes walk. Open breakfast and lunch. Coffee costs 2 dollars. 30 minutes to one hour.",c:["local_only"],r:"g",nn:"Jackson Hole Diner",ns:"Auténtico restaurante greco-americano",nst:"Jackson Hole es un restaurante greco-americano en Astoria que ha estado funcionando desde los años 70.",nt:"Tren N/W a Astoria Boulevard. Restaurante 5 minutos a pie. Abierto desayuno y almuerzo. Café 2 dólares."},
  {id:29,n:"Bushwick Collective Street Art Museum",a:"Bushwick",v:["art", "free"],d:12,s:"The largest open-air street art museum in the world, entire blocks covered in murals, free to walk",st:"Bushwick Collective is a six-block area in Brooklyn completely covered in street art murals. Dozens of international artists paint the walls. New murals appear continuously. It is the largest open-air street art gallery in the world. Entry is free. Walking through is overwhelming: color, scale, and creativity at every angle.",im:"A woman photographs a five-story mural while walking slowly through a street lined with elaborate murals on every wall, every surface transformed to art.",t:"Subway L to Morgan Ave, exit 1. Walk to Bushwick Ave. Entire neighborhood is open-air murals. Free. Best any daylight. One to two hours.",c:["street_art"],r:"g",nn:"Colectivo Bushwick",ns:"Museo de arte callejero más grande del mundo",nst:"Bushwick Collective es un área de seis cuadras en Brooklyn completamente cubierta de murales de arte callejero.",nt:"Tren L a Morgan Ave. Camina a Bushwick Ave. Todo el barrio es murales al aire libre. Gratis."},
  {id:30,n:"Rockaway Beach Free Ocean Beach at End of A Train",a:"Rockaway",v:["free", "beautiful", "nature"],d:20,s:"A real ocean beach at the end of the A subway line, free, under-touristed, with waves and sand",st:"Rockaway Beach is a real ocean beach in New York City, at the end of the A train. It has actual waves suitable for surfing. The beach is free. There are few tourists. Local surfers, families, and swimmers use it. It is a genuine beach experience within the city. Summer weekends are busy; weekdays are quiet.",im:"A surfer walks into the ocean with a board while waves form behind him and the beach stretches empty on either side.",t:"Subway A to Far Rockaway-Mott Ave, exit 1. Beach entrance at street. Free. Open dawn-dusk. Swimming season May-September. One to four hours.",c:["parks", "nature"],r:"g",nn:"Playa de Rockaway",ns:"Una playa de océano real al final del tren A",nst:"Rockaway Beach es una playa de océano real en la ciudad de Nueva York, al final del tren A.",nt:"Tren A a Far Rockaway-Mott Ave. Entrada a la playa en la calle. Gratis. Abierto amanecer-anochecer."},
  {id:31,n:"Morning Market Walk",a:"City",v:["local"],d:30,s:"Early market where locals shop before tourists wake",st:"Walking the stalls, smelling fresh produce, meeting vendors",im:"Piles of vegetables, vendor voices, morning light",t:"Go at 6am, bring cash, walk slowly",c:["local_only"],r:"g",nn:"早市步行",ns:"当地人购物的地方",nst:"走过摊位，闻新鲜农产品",nt:"早上6点去"},
  {id:32,n:"Sunset Viewpoint",a:"City",v:["beautiful"],d:45,s:"Where locals watch the sun drop, few tourists know it",st:"Sitting with locals, watching colors change",im:"Sky turning colors, silence, the moment perfect",t:"Go 60 minutes before sunset, bring a friend",c:["beautiful"],r:"g",nn:"日落观景点",ns:"看日落的地方",nst:"坐着看颜色改变",nt:"日落前60分钟去"},
  {id:33,n:"Old Town Wandering",a:"Old Town",v:["history"],d:30,s:"Historic district with medieval architecture still lived in",st:"Walking narrow streets, discovering hidden courtyards",im:"Stone walls ancient, doors painted bright colors, history everywhere",t:"Walk with no plan, get lost intentionally, find cafes",c:["architecture"],r:"g",nn:"老城区漫步",ns:"历史街道",nst:"走狭窄的街道，发现隐蔽的庭院",nt:"漫步，故意迷路"},
  {id:34,n:"River Walk Evening",a:"Riverfront",v:["romantic_water"],d:20,s:"Evening walk along the water, locals only spot",st:"Walking beside water, watching light change",im:"Water reflecting sky colors, people moving slowly, peace",t:"Go at 5pm, walk slowly, bring wine",c:["romantic_water"],r:"g",nn:"河滨傍晚漫步",ns:"沿着水边的傍晚散步",nst:"走在水旁边，看光线改变",nt:"下午5点去，带酒"},
  {id:35,n:"Local Restaurant Hidden",a:"City",v:["local"],d:35,s:"Where townspeople eat, tourists never find it",st:"Eating with locals, trying the daily special",im:"Food hot and fresh, conversations in local language, real flavor",t:"Ask locals for direction, bring cash, go early",c:["local_only"],r:"g",nn:"本地餐厅",ns:"当地人吃饭的地方",nst:"与当地人一起吃，尝试每日特餐",nt:"问当地人，现金"},
  {id:36,n:"Park Morning Tai Chi",a:"Central Park",v:["quiet"],d:30,s:"At 6am, locals do tai chi, you can join for free",st:"Moving slowly with the group, feeling the city wake",im:"People moving in silence, morning light spreading, the group growing",t:"Arrive by 5:50am, watch and learn, move with group",c:["parks"],r:"g",nn:"公园太极",ns:"早上6点免费太极课",nst:"与小组一起缓慢移动，感受城市苏醒",nt:"凌晨5点50分到达，观看学习"},
  {id:37,n:"Museum Free Hour",a:"Downtown",v:["free"],d:25,s:"Most museums have a free entry hour, find the schedule",st:"Walking the galleries, understanding local culture",im:"Paintings and sculptures, the silence of museums, learning",t:"Check museum website for free hours, go early",c:["free_museum"],r:"g",nn:"博物馆免费时段",ns:"博物馆免费入场时间",nst:"在画廊中走动，了解当地文化",nt:"检查博物馆网站"},
  {id:38,n:"Craft Market Saturday",a:"Market District",v:["local"],d:30,s:"Saturdays, artisans sell directly from their shops",st:"Browsing handmade goods, talking to makers",im:"Colors and textures, hands working, the craft visible",t:"Go Saturday, bring cash, buy directly from artists",c:["local_only"],r:"g",nn:"手工艺市场",ns:"周六手工艺品市场",nst:"浏览手工制品，与制造者交谈",nt:"周六去，带现金"},
  {id:39,n:"Night Food Street",a:"Food Quarter",v:["night"],d:45,s:"Evening street food vendors appear, locals gather",st:"Eating at standing counters, trying different stalls",im:"Smoke rising from grills, voices calling prices, the energy unmistakable",t:"Go after 7pm, bring cash, eat multiple items",c:["night"],r:"g",nn:"夜间食品街",ns:"夜间街头食品",nst:"在站台处吃饭，尝试不同的摊位",nt:"晚上7点后去，带现金"},
  {id:40,n:"Views from Top",a:"City Center",v:["high_spots"],d:40,s:"Climb to the highest public viewpoint, city spreads below",st:"Standing at the top, seeing the entire city at once",im:"City stretching in all directions, landmarks visible, the view complete",t:"Climb early morning, bring water, stay for sunset",c:["high_spots"],r:"g",nn:"顶部景色",ns:"从最高的公众观景点看景色",nst:"站在顶部，一次看整个城市",nt:"早上爬升，日落时留下"},
  {id:41,n:"West Village — Narrow Streets & Jazz History",a:"West Village",v:["history","romantic_water"],d:45,s:"Greenwich Village\'s most charming neighborhood with tree-lined streets, 1920s brownstones, and hidden jazz clubs",st:"Walking Grove Street, Bleecker Street corners, discovering speakeasy entrances hidden between storefronts. The past lives here in every facade.",im:"A tree-lined street in autumn, yellow leaves covering a cobblestone corner, jazz drifting from a basement window, locals carrying brown paper bags",t:"Subway A/C/E to West 4 St. Walk the triangle bounded by Christopher, Bleecker, Grove. Allow 2-3 hours. Listen for live music at Village Vanguard.",c:["history_big","neighbourhoods"],r:"g",nn:"西村",ns:"爵士音乐历史和窄街道",nst:"格林威治村最迷人的社区，树木遮荫的街道和1920年代的褐石建筑",nt:"A/C/E线到West 4 St。散步2-3小时"},
  {id:42,n:"Williamsburg Weekend — Rooftops & Galleries",a:"Williamsburg",v:["street_art","night"],d:120,s:"Brooklyn\'s young creative neighborhood with rooftop bars, street art murals, and converted warehouse galleries",st:"Climbing to rooftop bars at sunset, seeing the Manhattan skyline glow. Street art changes weekly. Galleries stay open late.",im:"A rooftop bar at golden hour, the East River reflecting orange light, the Williamsburg Bridge metallic and detailed, people with drinks silhouetted",t:"L train to Bedford Ave. Walk east toward waterfront. Rooftop bars open 5pm+. Galleries on Kent Street. Best Friday/Saturday nights.",c:["street_art","neighbourhoods"],r:"g",nn:"威廉斯堡",ns:"屋顶酒吧和街头艺术",nst:"布鲁克林年轻创意社区，屋顶酒吧、街头艺术壁画和改建仓库画廊",nt:"L线到Bedford Ave。向东走向海滨"},
  {id:43,n:"DUMBO — Instagram Bridge Walk & Cinnamon Rolls",a:"DUMBO",v:["beautiful","food"],d:30,s:"The most photographed street in NYC (under the Manhattan Bridge) plus Jane Grocery\'s cinnamon rolls",st:"Walking under the Manhattan Bridge at dawn, light hits the cobblestones at a perfect angle. The cinnamon rolls arrive warm at 8am.",im:"Standing under the Manhattan Bridge arch, the steel grid above, light streaming through, warm cinnamon roll in hand, the bridge reflection on wet stone",t:"F/A train to High St-Brooklyn Bridge. Walk to Washington St under bridge. Jane\'s opens 8am. Go early to avoid crowds.",c:["beautiful","food","greatest_hits"],r:"g",nn:"DUMBO",ns:"曼哈顿桥下和肉桂卷",nst:"最著名的街道在大桥下，Jane杂货店的肉桂卷温热到达",nt:"F/A线到High St。华盛顿街下桥。Jane早上8点开门"},
  {id:44,n:"Chinatown Dumpling Crawl — Jing Fong & Nom Wah",a:"Chinatown",v:["food"],d:60,s:"Dim sum competition: Jing Fong (chaotic, authentic, excellent) versus Nom Wah (refined, famous, slower service)",st:"Eating har gow, siu mai, char siu bao. Watching carts roll past, cooks shouting orders. The rhythm of dim sum service is hypnotic.",im:"A bamboo basket of dumplings, steam rising, soy sauce in a small white dish, the table surrounded by empty plates stacked high, everyone eating intensely",t:"Jing Fong: 27 Division St, no reservation, arrive 10am. Nom Wah: 13A Mott St, reserve ahead. Choose based on mood.",c:["food","greatest_hits"],r:"g",nn:"唐人街",ns:"饺子爬行和点心竞争",nst:"精丰和南华的点心比赛，美食和传统",nt:"精丰：27 Division St。南华：13A Mott St。早上10点到达"},
  {id:45,n:"Harlem Gospel Sunday — Abyssinian Baptist Church",a:"Harlem",v:["history","weird"],d:90,s:"Sunday 11am service with world-class gospel choir at a historic church where MLK once preached",st:"The choir\'s voices fill the church, voices layered and soaring. The congregation sings along. It is transcendent and utterly real.",im:"The interior of a historic church, dark wood pews filled with people, light from tall windows, a choir in white robes, voices carrying up to vaulted ceilings",t:"123rd St & Malcolm X Blvd (2/3 trains). Arrive early (10am). Sit in rear, stand if needed. Donation suggested. Photography usually not allowed during service.",c:["history_big"],r:"g",nn:"哈莱姆",ns:"美国黑人教堂和福音唱诗班",nst:"周日上午11点的世界级福音唱诗班，MLK曾在此传教",nt:"123rd St下车。提前到达。捐赠。不拍照"},
  {id:46,n:"High Line Sunset Walk — Elevated Park Timing",a:"Meatpacking District",v:["beautiful","parks"],d:45,s:"An abandoned railway converted to elevated park. Visit 60 minutes before sunset for perfect light, then stay for the city glow",st:"Walking the narrow path above the city, plants on both sides, the Hudson River visible at edges. Sunset hits the buildings orange. Tourist crowds thin out.",im:"Walking elevated above 10th Ave, wildflowers on both sides, the Hudson River caught in golden light, the city horizon turning pink and orange",t:"Subway A/C/E to 14th St. Enter at Gansevoort St. Allow 1-2 hours to walk full length. Arrive at 4pm if sunset is 5pm.",c:["beautiful","parks"],r:"g",nn:"高线公园",ns:"日落黄金时刻的高架公园步行",nst:"被遗弃的铁路改建为高架公园。日落前最完美的光线",nt:"A/C/E线到14th St。从Gansevoort St进入。日落前1小时到达"},
  {id:47,n:"Central Park — Bethesda Fountain at Sunrise",a:"Central Park",v:["beautiful","high_spots"],d:30,s:"The park\'s most elegant fountain, empty at sunrise except for a few locals walking dogs",st:"The fountain is silent at 6am. Water cascades without crowds. The Terrace is yours alone. By 8am, it\'s invaded by tourists.",im:"A stone fountain with an angel on top, water reflecting pink sunrise light, empty benches, a lone jogger passing, the Terrace steps leading down",t:"Subway A/B/C/D to 59th St-Columbus Circle. Walk east into park. Gate near 72nd St for Bethesda. Go 6-7am.",c:["beautiful","parks","greatest_hits"],r:"g",nn:"中央公园",ns:"日出时的贝塞斯达喷泉",nst:"公园最优雅的喷泉，日出时只有当地人和遛狗的人",nt:"A/B/C/D线到59th St。早上6点到达"},
  {id:48,n:"Central Park — The Ramble & Belvedere Castle",a:"Central Park",v:["nature","hidden"],d:60,s:"The park\'s wildest section: dense forest trails, birdwatchers, castle ruins overlooking the lake",st:"The Ramble feels like a real forest inside the city. Paths twist through dense vegetation. Belvedere Castle sits on a promontory overlooking the lake.",im:"A path wound through thick trees and brush, light filtering green, a stone tower (Belvedere Castle) visible through trees, a hawk circling above",t:"Subway B/C to 72nd St. Enter Central Park. Walk to Ramble (south of 79th St). Allow 90 minutes. Binoculars for birds.",c:["nature","parks"],r:"g",nn:"中央公园漫步",ns:"公园最野生的部分",nst:"稠密的森林步道，观鸟者，俯瞰湖泊的城堡废墟",nt:"B/C线到72nd St。进入中央公园。走向Ramble。90分钟"},
  {id:49,n:"Bow Bridge — Photos & Local Couples",a:"Central Park",v:["beautiful","romantic_water"],d:15,s:"The most photographed bridge in the park, especially at sunset, locals use it for proposals",st:"The arched bridge reflects perfectly in the lake water. Golden light hits stone. Couples lean against railings.",im:"A stone arch bridge over still water, the arch mirrored in the lake, evening light warm and orange, two people silhouetted leaning together",t:"Subway B/C to 72nd St. Walk through Central Park to Bridge (west of Bethesda Terrace). Best 30 minutes before sunset.",c:["beautiful","romantic_water"],r:"g",nn:"弓桥",ns:"公园最上镜的桥",nst:"日落时最被拍摄的桥，当地人用来求婚",nt:"B/C线到72nd St。走向Bow Bridge。日落前30分钟"},
  {id:50,n:"Brooklyn Bridge at Sunrise — No Crowds Yet",a:"Brooklyn Heights Promenade",v:["beautiful","greatest_hits"],d:30,s:"Sunrise walk across the bridge before it fills with tourists and photographers",st:"The bridge is nearly empty at 5:30am. The city lights fade as the sun rises. You feel the bridge\'s scale and beauty.",im:"Walking on the bridge deck, the towers rising above, the city skyline turning from dark blue to gold, the river below still dark and reflective",t:"Subway J/Z to High St-Brooklyn Bridge or walk from Lower Manhattan. Start 5:30am. No cars, no crowds. Bring water.",c:["beautiful","parks","greatest_hits"],r:"g",nn:"布鲁克林桥",ns:"日出时的无人桥",nst:"日出时的桥梁步行，在游客到达之前",nt:"早上5点30分开始。无人群。带水"},
  {id:51,n:"Joe\'s Pizza — $1 Slice on Prince Street",a:"SoHo",v:["food"],d:15,s:"The original Joe\'s: just cheese, pepperoni, or Sicilian. Thin crust, hot, cheap, real. It tastes like NYC 1975.",st:"You order by pointing. They fold the slice. You eat standing up. The owner watches from behind the counter. It tastes better than it should.",im:"A thin slice of pizza on a paper plate, the cheese still bubbling slightly, the crust golden, the owner in the background, a line of people waiting",t:"Spring St & Prince St. Cash only. Open daily 10am-8pm. Get one slice to start. It is enough.",c:["food"],r:"g",nn:"乔氏披萨",ns:"王子街上的1美元切片",nst:"最初的乔氏：奶酪、意大利香肠或西西里。薄脆皮，便宜，真实",nt:"Prince和Spring街角。仅现金。白天营业。一片就够了"},
  {id:52,n:"MET Rooftop Bar — Seasonal, Sunset Required",a:"Upper East Side",v:["beautiful","high_spots"],d:90,s:"The Metropolitan Museum rooftop bar: art museum by day, drinks overlooking Central Park and the city at sunset",st:"The view is 360 degrees. Central Park below. The Upper West Side. The Midtown skyline. The sun sets orange and pink.",im:"Standing on a rooftop, overlooking Central Park in the distance, the city skyline glowing, a cocktail in hand, people relaxing in evening light",t:"1000 Fifth Ave (at 82nd St). Subway 4/5 to 86th St. Open May-October only. Allow time to explore museum. Arrive 5pm for sunset.",c:["high_spots","beautiful"],r:"y",nn:"大都会艺术博物馆屋顶酒吧",ns:"俯瞰中央公园的屋顶酒吧",nst:"夕阳西下时，俯瞰中央公园和城市的屋顶酒吧",nt:"1000 Fifth Ave。Subway 4/5到86th St。5月-10月开放"},
  {id:53,n:"Staten Island Ferry — Free, Best Views of Harbor",a:"Lower Manhattan",v:["free_culture","romantic_water"],d:30,s:"The most underrated view in NYC: a free ferry ride past the Statue of Liberty, Ellis Island, and back at sunset",st:"The ferry is filled with commuters and a few tourists who know. The bow catches spray. Lower Manhattan recedes. The Statue of Liberty passes close.",im:"The ferry deck, people leaning on railings, the Statue of Liberty passing at close range, the harbor water choppy and reflective, Lower Manhattan behind",t:"South Ferry Terminal, Whitehall Terminal. Runs 24 hours. Free. Ride to Staten Island and back (45 minutes total). Go at sunset.",c:["free_culture","romantic_water"],r:"g",nn:"斯坦顿岛渡轮",ns:"免费的港口最佳景观",nst:"最被低估的视图：免费渡轮经过自由女神像",nt:"South Ferry码头。24小时运行。免费。日落时去"},
  {id:54,n:"Comedy Cellar — Live Shows Every Night",a:"Greenwich Village",v:["weird","night"],d:60,s:"A basement comedy club where Jerry Seinfeld still drops in unannounced, two shows nightly, cheap, dark, real laughs",st:"You descend a staircase into a dark room. A stage is lit. Comics run through material. The audience is packed and laughing constantly.",im:"A basement room with low ceilings, a small stage with a single spotlight, rows of small tables crowded together, people laughing",t:"117 MacDougal St. No reservations. Show up early. Two seatings: 7:30pm and 9:30pm. Buy a drink at the bar.",c:["night","weird"],r:"g",nn:"喜剧地窖",ns:"现场表演每晚都有",nst:"杰里·宋飞（Jerry Seinfeld）仍会出现的地下喜剧俱乐部",nt:"117 MacDougal St。现场直播。早到。7:30pm和9:30pm。买饮料"},
  {id:55,n:"Washington Square Park — People Watching & Musicians",a:"Greenwich Village",v:["local_only","neighbourhoods"],d:45,s:"The village\'s living room: street musicians, chess players, locals walking dogs, park benches filled with city life",st:"The park is never the same twice. Musicians play. Performers dance. Locals sit and read. It is constant motion and life.",im:"A park filled with people, a street musician playing guitar, chess games at tables, people sitting on benches, the Washington Arch visible",t:"Subway A/C/E to West 4 St. Enter the park. Find a bench. Watch for 45 minutes. Come back different times of day.",c:["local_only","neighbourhoods"],r:"g",nn:"华盛顿广场公园",ns:"村庄的客厅",nst:"街头音乐家、国际象棋棋手、遛狗的当地人",nt:"A/C/E线到West 4 St。找个长凳。坐45分钟"},
  {id:56,n:"Village Vanguard Jazz Club — The Legend",a:"West Village",v:["history","night"],d:120,s:"Since 1935, the most important jazz club in America. John Coltrane, Thelonious Monk, Bill Evans recorded here.",st:"The room is small and dark. The stage is tiny. The sound is perfect. You sit close enough to see the musician\'s fingers.",im:"A small dark room, a jazz quartet on a small stage, the bass player\'s hands moving, the audience leaning forward, cigarette smoke rising",t:"178 Seventh Ave S. Reservations essential. Two-drink minimum. Shows 8pm and 10pm. Great drinks.",c:["history_big","night"],r:"g",nn:"村前卫爵士俱乐部",ns:"美国的传奇爵士俱乐部",nst:"自1935年以来，美国最重要的爵士俱乐部",nt:"178 Seventh Ave S。预订必需。两饮最少。晚上8点和10点"},
  {id:57,n:"Smorgasburg — Weekend Food Market Redux",a:"Williamsburg Waterfront",v:["food","local_only"],d:120,s:"Outdoor food market: 100+ vendors, 2000+ people, Saturday/Sunday summers only, NYC\'s best eating day",st:"Hundreds of vendors cook in front of you. You walk the aisles. Everything smells incredible. The sun sets over the East River.",im:"Crowds of people eating standing up, dozens of food stalls, the smell of grilled meat and spices, the sun setting over water and bridges",t:"East River State Park, North Side. Saturdays/Sundays 11am-6pm May-November. Arrive early. Come hungry. Bring cash.",c:["food","local_only"],r:"y",nn:"Smorgasburg",ns:"周末食品市场",nst:"100多个摊位，2000多人，仅在夏季周六日",nt:"East River State Park。周六日11am-6pm。现金。空腹来"},
  {id:58,n:"Roosevelt Island Tram — Cable Car Sky Ride",a:"Upper East Side",v:["high_spots","romantic_water"],d:20,s:"A cable car suspended 250 feet above the East River, crossing between Manhattan and Roosevelt Island, incredible views",st:"The tram ascends slowly. The city falls away below. You can see for miles. The return ride is sunset-perfect.",im:"Inside a cable car 250 feet above water, the city sprawling below, the East River visible directly below, Manhattan skyline receding",t:"Subway 4/5/6 to 59th St. Walk to tram terminal at 59th & 2nd Ave. $2.75 round trip. Ride across and back.",c:["high_spots"],r:"g",nn:"罗斯福岛缆车",ns:"缆车天空之旅",nst:"悬停在东河上空，穿越曼哈顿和罗斯福岛",nt:"59th & 2nd Ave。$2.75来回。乘坐往返"},
  {id:59,n:"Little Island — Floating Platform & Sunset Seating",a:"Chelsea",v:["beautiful","parks"],d:30,s:"A new floating platform between Chelsea and the Hudson River, designed as an impossible park, sunset is perfect",st:"The platform rises and falls slightly with the river. You walk among planted terraces. The Hudson River surrounds you. Sunset is magic.",im:"A wooden platform floating on the water, planted with flowers and grasses, people sitting and standing, the Hudson River on both sides, golden sunset",t:"Access via Pier 55, West 14th St. Open daily 6am-midnight. Free. Best 5-9pm.",c:["beautiful","parks"],r:"g",nn:"小岛",ns:"浮动平台和日落座位",nst:"新的浮动平台，日落时完美",nt:"Pier 55, West 14th St。免费。下午5-9点最好"},
  {id:60,n:"Chelsea Market — Historic Building & Food Hall",a:"Chelsea",v:["food","architecture"],d:60,s:"A converted cookie factory turned massive food hall, 100+ food vendors, historic industrial building with character",st:"The building has exposed brick and steel beams from 1890s. Vendors line the main corridor. The food is diverse and excellent.",im:"A large indoor space with exposed brick arched ceilings, vendor stalls along corridors, people carrying food, industrial architecture",t:"75 Ninth Ave (15th St). Subway A/C/E to 14th St. Open 7am-10pm. Walk the full corridor. Bring cash and appetite.",c:["food","architecture"],r:"g",nn:"切尔西市场",ns:"历史建筑和美食大厅",nst:"改造的饼干工厂，100多家食品摊位",nt:"75 Ninth Ave。A/C/E线。白天营业。带现金"},
  {id:61,n:"The Cloisters — Medieval Art in Upper Manhattan",a:"Upper Manhattan",v:["history","parks"],d:120,s:"Medieval monastery art and architecture transported to Upper Manhattan, set in a garden overlooking the Hudson River",st:"The cloisters feel like you\'ve walked into a 14th-century monastery. The stone work is original. The garden is quiet.",im:"Stone cloisters surrounding a central garden, arched doorways, medieval sculptures, a quiet courtyard with a fountain",t:"99 Margaret Corbin Drive. Subway A to 190th St. Walk north. Open 10am-4:45pm. Part of the Met. Suggested donation.",c:["history_big","parks"],r:"y",nn:"修道院",ns:"中世纪艺术和建筑",nst:"14世纪修道院艺术和建筑在曼哈顿上城转移",nt:"A线到190th St。开放10am-4:45pm。捐款建议"},
  {id:62,n:"Grand Central Terminal — Ceiling & Architecture",a:"Midtown",v:["architecture","free_culture"],d:30,s:"The main concourse ceiling is a painted zodiac map, the building is Beaux-Arts perfection, whisper across the chamber",st:"The ceiling is 125 feet above the marble floor. The constellations are painted backward (on purpose). Thousands of people cross daily but few look up.",im:"A vast marble hall with a high painted ceiling showing constellations, arched windows letting in light, hundreds of people crossing",t:"42nd St & Park Ave South. Subway 4/5/6 to Grand Central. Free to walk. Lunch at the Oyster Bar downstairs. Look up.",c:["architecture","free_culture"],r:"g",nn:"中央车站",ns:"天花板和建筑",nst:"主交叉处天花板是黄道十二宫图",nt:"42nd St & Park Ave。地铁4/5/6。免费进入。往上看"},
  {id:63,n:"Brooklyn Botanic Garden — Cherry Hill & Paths",a:"Park Slope",v:["beautiful","parks"],d:90,s:"125 acres of gardens, Cherry Hill overlooks the city, Woodland Walk is a hidden forest path inside Brooklyn",st:"The garden has multiple environments: rose garden, Japanese garden, native plant garden. The Woodland Walk feels like you\'ve left the city.",im:"A woman walking among cherry trees in bloom, pink blossoms everywhere, a small path winding through trees",t:"1000 Washington Ave. Subway 2/3 to Flatbush Ave. Open 8am-6pm most of year. Suggested donation. Allow 2 hours.",c:["beautiful","parks"],r:"g",nn:"布鲁克林植物园",ns:"樱花山和小路",nst:"樱花山俯瞰城市，林地步行是隐藏的森林小径",nt:"1000 Washington Ave。Subway 2/3。捐款建议"},
  {id:64,n:"Prospect Park — Barclays Center to Lake Loop",a:"Park Slope",v:["parks","nature"],d:120,s:"550 acres, a full loop that runs past the lake, through the forest, and over meadows where locals actually relax",st:"The park has multiple trails and environments. The lake is surrounded by forest. Meadows have local relaxing. It feels like upstate New York.",im:"A walking path winding through trees, a lake visible in distance, a meadow with people sitting and reading, the city skyline never visible",t:"Subway 2/3 to Grand Army Plaza. Full loop is 3.35 miles (60 minutes). Visit on a weekend afternoon.",c:["parks","nature"],r:"g",nn:"前景公园",ns:"条形码中心到湖泊环路",nst:"550英亩，经过湖泊、森林和草地的完整循环",nt:"Subway 2/3到Grand Army Plaza。整个环路60分钟"},
  {id:65,n:"Coney Island — Boardwalk & Cyclone Ride",a:"Coney Island",v:["weird","beautiful"],d:180,s:"The boardwalk with an 1920s wooden roller coaster, old arcade games, hot dog stands, the Atlantic Ocean, graffiti, crowds, chaos, authenticity",st:"The Cyclone is a real wooden coaster with air gaps. The boardwalk is crowded and diverse. The beach is wide. Nathan\'s hot dog stand is crowded.",im:"The wooden roller coaster against a blue sky, people with their hands up as it descends, the boardwalk stretching in both directions, the ocean beyond",t:"Subway D/F to Coney Island-Stillwell Ave. Cyclone ride $15. Nathan\'s hot dogs $5. Boardwalk is free to walk.",c:["weird","beautiful"],r:"g",nn:"康尼岛",ns:"木板路和旋风骑行",nst:"20世纪20年代木制过山车、街机游戏、热狗摊位",nt:"D/F线到Coney Island。Cyclone $15。Nathan\'s $5"},
  {id:66,n:"Green-Wood Cemetery — Graves of NYC History",a:"Park Slope",v:["history","parks"],d:90,s:"A gorgeous 478-acre cemetery where NYC\'s famous and ordinary are buried. The monuments are sculpture. The views are transcendent.",st:"Green-Wood is a garden cemetery designed like a park. Jean-Michel Basquiat is buried here. Graves date back to 1838. The landscape is beautiful.",im:"A monument of an angel, marble white against green trees, a path winding through the cemetery, other monuments visible in distance, a blue sky",t:"Fifth Ave & 25th St, Brooklyn. Free walking tours. Bring map. Allow 2-3 hours. Main gate is stunning.",c:["history_big","parks"],r:"g",nn:"绿林公墓",ns:"纽约历史的墓地",nst:"478英亩的美丽公墓，埋葬纽约的名人",nt:"Fifth Ave & 25th St。免费导游。地图。2-3小时"},
  {id:67,n:"St. Mark\'s Place — Punk History & Vintage Shops",a:"East Village",v:["weird","history"],d:60,s:"The street where punk rock was invented, still has tattoo shops, vintage stores, head shops, and graffiti walls",st:"St. Mark\'s Place is wider than most East Village streets. It\'s lined with vintage shops and record stores. Punks still exist here, mostly tourists now.",im:"A street lined with shop fronts, punk rock memorabilia in windows, graffiti on walls, people with colored hair and piercings, old concert posters",t:"Subway 6 to Astor Place. Walk down St. Mark\'s from 3rd Ave to Avenue B. Stop at vintage shops. Drink at dive bars.",c:["history_big","weird"],r:"g",nn:"圣马克广场",ns:"朋克历史和二手店",nst:"朋克摇滚被发明的街道，仍有纹身店和二手店",nt:"Subway 6到Astor Place。走St. Mark\'s。逛二手店"},
  {id:68,n:"East Village Ramen Row — Intense Bowl Competition",a:"East Village",v:["food"],d:45,s:"A block where five ramen restaurants compete within 100 feet. Each is obsessed with perfection. Eat a bowl and compare.",st:"The ramen shops are small, 8-12 seats at counters. The chefs are serious about their craft. You slurp loudly. It\'s expected.",im:"A small ramen counter, a large bowl of noodles with broth steaming, a person leaning over the bowl, slurping audibly, the chef watching",t:"East 9th St between 2nd & 3rd Ave. Try: Ippudo, Ichiran, Rai-Rai-Ken. Each is different. Eat a bowl at each.",c:["food"],r:"g",nn:"东村拉面街",ns:"激烈的碗竞争",nst:"五家拉面餐厅在100英尺内竞争。每个都追求完美",nt:"East 9th St between 2nd & 3rd Ave。100米范围内5家店"},
  {id:69,n:"Flushing Chinatown — Better Food Than Manhattan",a:"Flushing",v:["food","local_only"],d:120,s:"The largest Chinese neighborhood in NYC. Restaurants are cheaper, food is more authentic, crowds are entirely local.",st:"Flushing is a sensory overload: signs in Chinese, vendors calling prices, the smell of char and spices. No English spoken in most places.",im:"A crowded street market, vendors selling vegetables and meats, shops with Chinese signs, the smell of grilled meat and garlic, crowds of people",t:"Subway 7 (Main St-Flushing). Walk Prince St to Murray Ave. Lunch dim sum at jing fong or dim sum palace. Bring appetite.",c:["food","local_only"],r:"g",nn:"法拉盛",ns:"比曼哈顿更好的食物",nst:"纽约最大的中国社区。食物更便宜，更地道",nt:"Subway 7 (Main St-Flushing)。Prince St午餐。带胃口"}

const PLACE_IMAGES={,{id:41,n:"Statue of Liberty",a:"Liberty Island",v:["famous","history"],d:120,s:"305 feet tall, a universal symbol of freedom since 1886. The ferry ride alone is worth it.",st:"The Statue of Liberty is the first thing many people see when arriving in America. It is the most photographed monument in the western hemisphere. And somehow, when you stand in front of it—when you feel the actual scale, the copper turning green with age, the weight of the thing—it still moves you.\\n\\nThe trick is the timing. Go in the morning, the first ferry, 7:30am from Battery Park. You'll have the island almost alone before the tour groups arrive. The view back toward Manhattan from the island is better than the view from the statue.",im:"Massive copper woman against blue sky. The harbor, the island, Manhattan rising behind you.",t:"Ferry: $24 (crown only) or $27 (pedestal). Battery Park, lower Manhattan. First ferry 7:30am. Book tickets in advance. The pedestal has better views than the crown.",c:["greatest_hits","history","beautiful"],r:"g",nn:"Statue of Liberty",ns:"305フートの自由の女神像。1886年以来の自由の普遍的シンボル。",nst:"自由の女神像はアメリカに到着した多くの人々が最初に見るものだ。西半球で最も多く撮影された記念碑だ。あなたがそれの前に立つとき、実際のスケール、年齢とともに緑に変わる銅を感じるとき、それはまだあなたを動かす。\\n\\nコツはタイミングだ。朝、最初のフェリー、午前7時30分にバッテリーパークから行こう。",nt:"フェリー：¥24（王冠のみ）または¥27（台座）。バッテリーパーク。最初のフェリー午前7時30分。"},{id:42,n:"Empire State Building",a:"Midtown",v:["famous","beautiful"],d:60,s:"1,453 feet of Art Deco steel. The best views of the city are from the observation deck at night.",st:"The Empire State Building was the world's tallest building for over forty years. It is no longer the tallest, but it remains the most beautiful. The Art Deco styling from 1931 looks better now than it did then—the geometry, the proportions, the materials. At night, from the 86th floor observation deck, you can see the entire city in every direction.\\n\\nThe crowds are real. Go at night after 8pm. The city lights become the main attraction, and the deck feels different—quieter, more contemplative. The wind is stronger, the cold is real, but the views make it worth it.",im:"The Manhattan skyline spreading out in all directions. City lights in perfect darkness.",t:"$29 for the 86th floor. $45 for the 102nd floor. 350 5th Ave, Midtown. Open 8am–2am. Best after 8pm.",c:["greatest_hits","beautiful","famous"],r:"g",nn:"Empire State Building",ns:"1,453フートのアールデコ様式の高層ビル。",nst:"帝国国家ビルは40年以上にわたって世界で最も高いビルだった。もはや最も高いわけではないが、最も美しい建築のままだ。1931年のアールデコのスタイルは今の方が見栄えがする。\\n\\n夜、午後8時以降に行こう。街の明かりは主な魅力になり、デッキは異なる雰囲気を感じる。",nt:"¥29で86階。$45で102階。350 5th Ave、ミッドタウン。午前8時～午前2時営業。午後8時以降がベスト。"},{id:43,n:"Central Park",a:"Midtown/UES",v:["famous","beautiful","parks"],d:120,s:"843 acres of landscape architecture in the middle of Manhattan. The whole city vanishes when you're inside.",st:"Central Park is an engineering feat disguised as nature. Designed in 1858 by Frederick Law Olmsted and Calvert Vaux, it is a careful arrangement of lakes, forests, meadows, and paths that feels completely natural. Over 42 million people visit annually. And somehow, it never feels crowded.\\n\\nThe trick is direction and time. Most visitors stick to the main paths around Bethesda Terrace. Instead, take the path north past the Loeb Boathouse. Walk into the North Woods. It feels like you've left the city entirely. At dusk, when the light turns golden and the park empties, this is the most beautiful place in New York.",im:"Ancient-looking forest in the middle of skyscrapers. Golden light filtering through trees. A small lake. You can't hear traffic.",t:"Free. Always open. Main entrances: Columbus Circle (S), Grand Army Plaza (S), 5th Ave and 110th St (N). Best early morning (6-9am) or late evening (7-8pm).",c:["greatest_hits","beautiful","parks"],r:"g",nn:"Central Park",ns:"マンハッタンの中にある843エーカーの風景建築。",nst:"セントラルパークはエンジニアリングの偉業だ。自然に偽装されている。1858年に設計された慎重な配置だ。\\n\\nコツは方向と時間だ。ほとんどの訪問者はベセスダテラス周辺の主な小道にこだわる。代わりに、ローブボートハウスの過去への道を進もう。",nt:"無料。常に開放。主な入口：コロンバスサークル、グランドアーミープラザ。早朝（6-9am）または夜間（7-8pm）がベスト。"},{id:44,n:"Brooklyn Bridge",a:"Lower East/DUMBO",v:["famous","beautiful"],d:45,s:"A wooden and stone bridge built in 1883. Walk it at dawn, before the tourists. The view back to Manhattan is worth the walk.",st:"The Brooklyn Bridge is more than a bridge—it's a phenomenon. Built in 1883, it was the world's longest suspension bridge at the time. The stone towers, the intricate cable work, the width of the boards beneath your feet—everything about it feels like a structure that took 13 years to build (it did).\\n\\nThe crowds are overwhelming during the day. Go at 6:30am on a weekday. You'll have the bridge almost entirely to yourself. Walk slowly. Look at the construction details. Look back at Manhattan rising from the water. The light at that hour is perfect—golden, horizontal, making the city look like a watercolor.",im:"Stone tower ahead, the bridge stretching behind you. Manhattan in perfect golden light.",t:"Free. Always open. Cross from Manhattan (City Hall area) to Brooklyn (DUMBO). The 30-minute walk is the point. Go at dawn.",c:["greatest_hits","beautiful","famous"],r:"g",nn:"Brooklyn Bridge",ns:"1883年に建てられた橋。",nst:"ブルックリン橋は橋以上のものだ。現象だ。1883年に建てられ、当時世界で最長の吊り橋だった。石の塔、複雑なケーブル工事—すべてがそれは建設に13年かかった構造に感じられる。\\n\\n群衆は日中は圧倒的だ。平日の午前6時30分に行こう。橋はほぼ完全に独りきりになるだろう。",nt:"無料。常に開放。マンハッタンからブルックリンへ。30分の歩行が要点だ。夜明けに行く。"},{id:45,n:"Grand Central Terminal",a:"Midtown",v:["famous","architecture","beautiful"],d:60,s:"The largest train station in the world by number of tracks. Built in 1913. The main concourse is a cathedral to movement.",st:"Grand Central Terminal is a building that makes you stop. Completed in 1913, it remains the largest train station in the world by number of platforms (21 tracks, 44 platforms). The main concourse is 120 feet high, with a vaulted ceiling covered in constellations (yes, they're backwards—a charming historical error).\\n\\nGo early in the morning. 7am is perfect. The light comes through the tall windows and illuminates the dust particles. The crowds haven't arrived yet. Stand in the center of the concourse. Listen to the echoes. Feel the scale of a building made for moving humans from one place to another. It is almost a religious experience.",im:"Massive vaulted ceiling, shaft of golden light, marble floors, the whisper of thousands of footsteps.",t:"Free to walk around. Main concourse is always accessible. 42nd St and Park Ave, Midtown. Go 7-9am weekdays.",c:["greatest_hits","architecture","beautiful"],r:"g",nn:"Grand Central Terminal",ns:"1913年に建てられた世界最大級の駅。",nst:"グランドセントラルターミナルはあなたを停止させる建物だ。1913年に完成し、世界で最大の駅のままだ。メインコンコースは高さ120フィートで、星座で覆われた天井がある。\\n\\n朝早く行く。午前7時は完璧だ。光が高い窓から入り、ほこりの粒を照らす。",nt:"歩いて無料。メインコンコースはいつでもアクセス可能。42nd St and Park Ave。平日午前7～9時。"}};
