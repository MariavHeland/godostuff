  {id:106,n:"Vlaeykensgang Secret Alley",a:"Centrum",v:["beautiful","history","quiet"],d:6,s:"Medieval cobblestone passage hidden behind Grote Markt — atmospheric at night",st:"This secret passage opens behind the Antwerp Cathedral area and transforms into a romantic alleyway with historic façades. The cobblestones echo with centuries of footsteps; it\'s most magical at dusk.",im:"Medieval Antwerp merchants used passages like this to escape taxes and city surveillance.",t:"Free. Near Grote Markt, entrance is easy to miss. Best explored evening hours.",c:["architecture","history_big"],r:"g",nn:"Vlaeykensgang",ns:"Verborgen middeleeuwse steeg — magisch in de avond",nst:"Ontdek de romantische straat achter de kathedraal van Antwerpen.",nt:"Gratis. Bij Grote Markt. Avondverkenning aanbevolen."},
  {id:107,n:"MAS Building Rooftop Views",a:"Docklands",v:["beautiful","free","high_spots"],d:15,s:"360° city and harbor views from the red building rooftop — a free sunset date spot",st:"The Museum aan de Stroom (MAS) offers free access to the rooftop via escalators. Watch the harbor activity below while the city glows at dusk. Hanzestedenplaats becomes a romantic gathering spot.",im:"Time-travel: The MAS opened in 2011, replacing old shipping warehouses; now it\'s a symbol of Antwerp\'s cultural rebirth.",t:"Free rooftop access with museum entry (or check if rooftop is accessible without). Tram 1/2 to MAS.",c:["high_spots","romantic_water"],r:"g",nn:"MAS Dak",ns:"360°-zicht op de stad en haven — gratis zonsondergang datum",nst:"Geniet van het panorama boven op het rode Museum aan de Stroom.",nt:"Gratis dak toegang. Tram 1/2 naar MAS."},
  {id:108,n:"St. Anna\'s Pedestrian Tunnel",a:"Scheldt River",v:["weird","hidden","local"],d:12,s:"Underground 572m tunnel with vintage escalators — an adventurous walk under the Scheldt",st:"This working pedestrian tunnel crosses under the Scheldt River, complete with original escalators from decades past. It\'s surreal to walk underground while ships pass overhead; locals use it daily, but tourists rarely know it exists.",im:"Time-travel: Opened in 1933, the tunnel represents engineering ambition during Antwerp\'s port boom.",t:"Free. Entrance near St. Anna\'s Church (eastern bank). Walk down, ride the escalators.",c:["architecture","local_only"],r:"g",nn:"Sint-Annastunnel",ns:"Ondergrondse tunnel met vintage roltrap — een avontuurlijke wandeling",nst:"Loop onder de Scheldt door in deze aangrijpende historische tunnel.",nt:"Gratis. Ingang bij Sint-Annakerk. Breng flashlight mee."},
  {id:109,n:"Doel Ghost Village",a:"Port Area (Short Trip)",v:["weird","abandoned","art"],d:30,s:"Abandoned industrial village with street art — a surreal urbex destination",st:"A 15-minute trip from downtown, Doel is a gradually disappearing village reclaimed by street artists. Crumbling buildings are covered in murals; locals have left, but artists keep adding color. It feels like stepping into a post-apocalyptic art film.",im:"Time-travel: Doel was a thriving community until the port expanded; since 1985, it\'s been in planned decline.",t:"Free to explore. Bus from downtown or bike. Be respectful of remaining residents.",c:["abandoned","street_art"],r:"g",nn:"Doelspookdorp",ns:"Verlaten industrieel dorp met street art — urbex bestemming",nst:"Ontdek de spookachtige kunstgemeenschap Doel buiten de stad.",nt:"Gratis. Bus of fiets van centrum. Respecteer lokale bewoners."},
  {id:110,n:"Street Art Walking Tour (Self-Guided)",a:"Berchem/Sint-Andries",v:["art","local","free"],d:20,s:"Massive murals by international street artists — a colorful neighborhood exploration",st:"The Vlijtstraat and surrounding streets in Berchem are a shifting gallery of large-scale street art. Artists like Rise One and Zenith have transformed walls into masterpieces. Download Street Art Cities app for a guided discovery.",im:"Time-travel: Berchem was an industrial working-class area; street art transformed it into a cultural district.",t:"Free. Tram 2/3 to Berchem. Use Street Art Cities app for location guides.",c:["street_art","architecture"],r:"g",nn:"Berchems Street Art Wandeling",ns:"Massale muurschilderingen door internationale kunstenaars",nst:"Ontdek de kleurrijke street art in het Berchems-Sint-Andries district.",nt:"Gratis. Tram 2/3 naar Berchem. Street Art Cities app aanbevolen."}

,{id:120,n:"De Ruien Underground Sewers",a:"City Center",v:["hidden", "underground"],d:20,s:"Explore Antwerp's medieval underbelly in forgotten sewers!",st:"Wander through dark, echoing tunnels where Antwerp's gritty past hides beneath the streets. Dripping walls whisper tales of ancient floods and forgotten secrets. Feel like an urban archaeologist uncovering the city's hidden veins.",im:"Imagine flashlight beams dancing on mossy stone walls as you step into a time capsule 600 years old.",t:"Free self-guided entry at Groenplaats; guided tours €8 (almost free and worth it). Best at dusk for eerie vibes. Wear sturdy shoes, 45min walk.",c:["urban exploration"],r:"g",nn:"De Ruien",ns:"Verken de middeleeuwse onderbuik van Antwerpen in vergeten riolen!",nst:"Dwars door donkere, echoënde tunnels waar het ruige verleden van Antwerpen schuilt onder de straten. Druppelende muren fluisteren verhalen van oude overstromingen en vergeten geheimen. Voel je als een stedelijke archeoloog die de verborgen aderen van de stad blootlegt.",nt:"Gratis zelfgeleide toegang bij Groenplaats; geleide tours €8 (bijna gratis en de moeite waard). Beste bij schemer voor griezelige sfeer. Stevige schoenen aan, 45min wandeling."},
{id:121,n:"Begijnhof Hidden Courtyard",a:"City Center",v:["hidden", "peaceful"],d:15,s:"Secret historic courtyard oasis amid city buzz!",st:"Step into a serene world of 16th-century beguines, where quiet nuns once lived in pious simplicity. Cobblestone paths and tiny houses evoke timeless tranquility. Perfect hideaway for whispered dreams.",im:"Picture sunlight filtering through ancient trees onto flower-lined paths, far from the urban roar.",t:"Free 24/7 near Rodestraat; respectful silence please. Dawn or dusk for magic light. 10min from Grote Markt.",c:["historic sites"],r:"g",nn:"Begijnhof",ns:"Geheime historische binnenplaats-oase te midden van stadsgezoem!",nst:"Stap een serene wereld in van 16e-eeuwse begijnen, waar stille nonnen ooit in vrome eenvoud leefden. Kinderkopjes en kleine huizen roepen tijdloze rust op. Perfecte schuilplaats voor gefluisterde dromen.",nt:"Gratis 24/7 bij Rodestraat; respectvolle stilte aub. Ochtendgloren of schemer voor magisch licht. 10min van Grote Markt."},
{id:122,n:"Plantentuin Botanic Garden",a:"City Center",v:["secret", "oasis"],d:25,s:"Tropical jungle escape tucked in urban heart!",st:"Lose yourself in lush greenery, exotic plants, and birdsong symphony. This hidden gem feels worlds away from Antwerp's hustle. Butterflies flutter as you uncover rare blooms.",im:"Envision strolling fern-shaded paths with hummingbirds darting amid vibrant orchids.",t:"Free entry daily at Leuvenstraat; best spring-summer. 15min walk from Centraal Station.",c:["parks"],r:"g",nn:"Plantentuin",ns:"Tropisch jungle-oase verborgen in stedelijk hart!",nst:"Verdwaal in weelderig groen, exotische planten en vogelgezang. Dit verborgen juweel voelt werelden verwijderd van Antwerpens drukte. Vlinders fladderen terwijl je zeldzame bloemen ontdekt.",nt:"Gratis toegang dagelijks aan Leuvenstraat; lente-zomer ideaal. 15min lopen van Centraal Station.",ef:"Grab cheap falafel at nearby Falafel Tof (~€7) on Hoogstraat."},
{id:123,n:"Het Steen Riverside Terrace",a:"City Center",v:["hidden", "riverside"],d:18,s:"Free Scheldt views with giant trickster legend!",st:"Climb to the terrace of Antwerp's oldest castle for sweeping river panoramas. Spot the mischievous Lange Wapper statue, folklore giant who loves pranks. Ships glide by as legends come alive.",im:"Feel the breeze as massive cargo ships pass, with the giant's stone gaze watching your every move.",t:"Free terrace at Het Steen on Scheldt quay; anytime, golden hour best. 5min from Grote Markt.",c:["historic sites"],r:"g",nn:"Het Steen terras",ns:"Gratis Schelde-uitzichten met reuzen-truclegendes!",nst:"Klim naar het terras van Antwerpen's oudste kasteel voor wijde rivierpanorama's. Spot het ondeugende Lange Wapper-beeld, folklore-reus die van streken houdt. Schepen varen voorbij terwijl legendes tot leven komen.",nt:"Gratis terras bij Het Steen aan Scheldekade; altijd open, gouden uur het best. 5min van Grote Markt."},
{id:124,n:"Cogels-Osylei Art Deco Street",a:"Zurenborg",v:["architectural", "stroll"],d:30,s:"Fairy-tale Art Deco mansions on a secret avenue!",st:"Marvel at whimsical houses blending fairy tales and opulence from 1900s elite. Turrets, gables, and ornate facades spark imagination. Stroll like in a storybook neighborhood.",im:"Gawk at a house shaped like a ship, complete with portholes and waves carved in stone.",t:"Free self-guided walk; tram 24 from Centraal to Zurenborg. Weekdays quietest. 20min from center.",c:["architecture"],r:"g",nn:"Cogels-Osylei",ns:"Sprookjesachtige Art Deco-herenhuizen op geheime laan!",nst:"Sta versteld van grillige huizen die sprookjes en weelde mengen uit 1900s elite. Torens, gevels en sierlijke gevels prikkelen de fantasie. Wandelen als in een prentenboekwijk.",nt:"Gratis zelfgeleide wandeling; tram 24 vanaf Centraal naar Zurenborg. Weekdagen rustigst. 20min van centrum."},
{id:125,n:"Middelheim Open Air Sculpture Park",a:"Middelheim",v:["art", "park"],d:40,s:"Giant modern sculptures in wild woodland trails!",st:"Wander forested paths encountering massive, quirky art installations that provoke thought. Rodin rubs shoulders with contemporary giants amid nature. Serene yet surreal adventure.",im:"Stand dwarfed by a colossal abstract figure emerging from the trees like a forest guardian.",t:"Free daily; bus 23/17 from station (20min). Sunny weekends best, 2hr explore.",c:["parks", "museums"],r:"g",nn:"Middelheim Openluchtmuseum",ns:"Reuzen moderne sculpturen op wilde bospaden!",nst:"Dwars door bosrijke paden met massieve, eigenzinnige kunstinstallaties die aanzetten tot denken. Rodin naast hedendaagse reuzen te midden van natuur. Rustig maar surreëel avontuur.",nt:"Gratis dagelijks; bus 23/17 vanaf station (20min). Zonnige weekends top, 2u verkennen."},
{id:126,n:"Boekenberg Ecological Pond",a:"Deurne",v:["nature", "swim"],d:35,s:"Crystal-clear wild swimming in a book-shaped pond!",st:"Dive into pure, filtered lake water surrounded by green hills. This eco-gem mimics natural filtration for refreshing dips. Locals' secret summer splash spot.",im:"Plunge into turquoise depths with dragonflies skimming the surface under leafy canopy.",t:"Free swimming May-Sep; tram 7 to Boekenbergpark. Warm days only, bring towel.",c:["nature"],r:"g",nn:"Boekenberg",ns:"Kristalhelder wildzwemmen in boekvormig meer!",nst:"Duik in puur, gefilterd meerwater omringd door groene heuvels. Dit eco-juweel bootst natuurlijke filtering na voor verkwikkende plonsjes. Lokale zomergeheimtip.",nt:"Gratis zwemmen mei-sep; tram 7 naar Boekenbergpark. Warme dagen, handdoek mee.",ef:"Cheap eats at nearby Lidl Deurne."},
{id:127,n:"Scheldt Kaaien Harbor Promenade",a:"Het Eilandje",v:["riverside", "sunset"],d:25,s:"Epic sunsets over massive working harbor cranes!",st:"Saunter the quay watching colossal ships unload amid industrial giants. Golden light bathes cranes in fiery glow. Raw port energy meets serene riverside chill.",im:"Witness the sun dip behind towering cranes as freighters honk in the distance.",t:"Free along north Scheldt quays; tram 7. Sunset hour magic, any weather.",c:["riverside"],r:"g",nn:"Scheldtkaaien",ns:"Epische zonsondergangen over reusachtige havenkranen!",nst:"Slenter langs de kade terwijl kolossale schepen lossen te midden van industriële reuzen. Gouden licht baadt kranen in vurige gloed. Rauwe havenenergie meets serene rivieroever.",nt:"Gratis langs noordelijke Scheldekaden; tram 7. Zonsondergang uur magisch, elk weer."},
{id:128,n:"Vrijdagmarkt Flea Market",a:"City Center",v:["market", "vintage"],d:22,s:"Treasure hunt at Europe's oldest flea market!",st:"Rummage through stalls of antiques, oddities, and local lore every Friday. Haggling echoes under historic arches. Uncover forgotten gems from Antwerp's past.",im:"Bargain for a dusty vinyl record or quirky brass lamp amid bustling chatter.",t:"Free Fridays 8am-1pm at Vrijdagmarkt square. Arrive early for best finds.",c:["markets"],r:"g",nn:"Vrijdagmarkt",ns:"Schatjacht op Europa's oudste rommelmarkt!",nst:"Wroet door kramen met antiek, rariteiten en lokale lore elke vrijdag. Afdingen echoot onder historische bogen. Ontdek vergeten juwelen uit Antwerpens verleden.",nt:"Gratis vrijdagen 8u-13u op Vrijdagmarkt plein. Vroeg komen voor topvondsten."},
{id:129,n:"Street Art Meeting of Styles",a:"Berchem",v:["street art"],d:28,s:"Vibrant murals exploding on gritty backstreets!",st:"Hunt colossal street art by global artists on Vlijtstraat walls. Colors pop against urban decay, telling rebellious tales. Self-guided urban canvas adventure.",im:"Snap a selfie dwarfed by a 10m-high vibrant phoenix rising from brick.",t:"Free anytime; tram 4/9 to Berchem. Download Street Art Cities app. Sunny days pop.",c:["street art"],r:"g",nn:"Street Art Meeting of Styles",ns:"Kleurrijke muurschilderingen exploderend op grauwe achterstraten!",nst:"Jaag op kolossale straatkunst door globale artiesten op Vlijtstraat muren. Kleuren spatten tegen stedelijke aftakeling, vertellen rebelse verhalen. Zelfgeleide urban canvas avontuur.",nt:"Gratis altijd; tram 4/9 naar Berchem. Street Art Cities app downloaden. Zonnige dagen spatten."}];

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Antwerp Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
