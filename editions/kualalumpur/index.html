{id:46,n:"Brickfields colonial streets — old British administrative quarter",a:"Brickfields",v:["history","beautiful","quiet","hidden"],d:90,s:"Tree-lined colonial-era streets with Victorian architecture, old government buildings, and heritage mansions slowly being gentrified, offering a glimpse of British-designed Malaysia.",st:"Walking the quiet streets of Brickfields north of Jalan Raja Abdullah is like walking through preserved British India. Victorian-era bungalows with deep verandahs sit behind overgrown gardens. The old Brickfields Railway Station (built 1886) still functions, its architecture pure colonial railway aesthetics. Surrounding streets feature turn-of-the-20th-century buildings: old police barracks, administrative offices, heritage mansions divided into private residences. The architectural style reflects the British imperial vision of orderly urban design adapted to tropical climate—large roofs for monsoon protection, verandahs for shade, whitewashed walls to reflect heat. Trees—old rain trees, angsanas, neem—have grown massive, creating canopy that cools the streets. Gentrification is slowly arriving (new cafes, design studios), but the bones remain authentically colonial. The streets are remarkably quiet for being in central KL. This quarter embodies the moment when the British were most confident about their permanence in Malaysia—architectural expressions of power that now feel melancholic and historically distant.",im:"Tree-lined avenue with Victorian bungalows on either side, deep shadows from massive canopy, old railway station visible at street's end.",t:"LRT to Brickfields Station. Walk north from station through residential streets. Best: early morning before heat intensifies. Free wandering. Photography permitted. Quiet cafes emerging on Jalan Thambipillay. Bring water.",c:[],r:"g",nn:"Jalan Kolonial Brickfields",ns:"Jalan era kolonial dengan arsitektur Victorian, gedung pemerintah tua, mansion heritage sedikit dalam gentrifikasi.",nst:"Berjalan jalanan tenang Brickfields utara Jalan Raja Abdullah seperti berjalan India Inggris terpelihara. Bungalo era Victorian dengan verandah dalam duduk di belakang taman tumbuh liar. Stasiun Kereta Api Brickfields lama (dibangun 1886) masih berfungsi, arsitektur murni kereta api kolonial. Jalan sekitarnya menampilkan bangunan awal abad ke-20.",nt:"LRT ke Brickfields Station. Jalan utara dari stasiun melalui jalan perumahan. Terbaik: pagi awal sebelum panas meningkat. Jalan gratis. Fotografi diizinkan. Kafe tenang muncul. Bawa air."}
{id:47,n:"KL Financial District rooftops — urban hikes with 360° views",a:"Kuala Lumpur City Centre",v:["beautiful","free entry","weird"],d:60,s:"A network of elevated bridges and rooftop walkways connecting downtown office towers, offering panoramic city views and unconventional pedestrian routes through the vertical city.",st:"The financial district's rooftop network is a secret most locals don't know about—elevated walkways connecting office towers at 5, 10, 20-story heights, allowing foot traffic to bypass street-level chaos and experience the city from its upper layers. These bridges create an alternate geography: you walk through layers of KL that most visitors never perceive. The views from these heights show the city's true complexity—the water towers on building tops, the way the city transitions from glass towers to traditional neighborhoods, the patterns of traffic below. Early morning (7-8 AM) you're alone with office workers preparing for their day. The bridges were designed for office-tower convenience, but they create an unexpected spatial experience—the sensation of walking through the city's circulatory system. Few tourists attempt this; it remains a locals' discovery. The sun's angle changes the experience dramatically throughout the day—dawn light hitting glass towers, midday intensity, sunset creating silhouettes.",im:"Elevated bridge connecting office towers suspended above city streets, glass and steel railings, panoramic city views receding into haze.",t:"MRT/LRT to various downtown stations. Key junctions: Petronas Twin Towers, Pavilion KL, Menara Maybank areas. Free access. Best 7-8 AM before crowds. Bring water. Wear comfortable shoes. Bring camera for light conditions.",c:[],r:"g",nn:"Jembatan Atap Pusat Keuangan",ns:"Jaringan jembatan ketinggian tinggi menghubungkan menara perkantoran dengan pemandangan 360 derajat, rute pejalan kaki tanpa konvensional.",nst:"Jaringan rooftop distrik keuangan adalah rahasia yang tidak diketahui sebagian besar lokal—jalan setapak ketinggian yang menghubungkan menara perkantoran di ketinggian 5, 10, 20 lantai, memungkinkan lalu lintas kaki untuk melewati chaos tingkat jalan. Jembatan ini menciptakan geografi alternatif: Anda berjalan melalui lapisan KL yang tidak pernah dirasakan pengunjung.",nt:"MRT/LRT ke berbagai stasiun pusat. Simpul kunci: Petronas Twin Towers, Pavilion KL, area Menara Maybank. Akses gratis. Terbaik 7-8 pagi. Bawa air. Pakaian sepatu nyaman. Bawa kamera."}
{id:48,n:"Bangsar Sunday market — creative neighborhood hang",a:"Bangsar",v:["local","beautiful","hidden"],d:60,s:"A weekend street market featuring vintage goods, local crafts, street food, and independent stalls that captures Bangsar's creative neighborhood identity.",st:"The Bangsar Sunday market operates in a parking lot that transforms into a bazaar from 10 AM-3 PM, attracting a mix of locals, expats, young creatives, and serious vintage hunters. Stalls sell handmade jewelry, vintage furniture, vinyl records, independent fashion designers, local art, and street food from several cuisines. Unlike KL's planned shopping malls, the Sunday market feels organic—vendors know each other, return customers develop relationships with makers. The neighborhood that surrounds it (Bangsar) reflects this creative energy: narrow streets with boutique coffee shops, wine bars, art studios, independent bookstores, graffiti and street art. It's one of KL's most genuinely cosmopolitan neighborhoods, where locals choose to spend leisure time rather than tourists following guidebooks. The market attracts the people who make KL's contemporary culture—musicians, designers, writers, artists buying and selling. It's a small window into local creative identity.",im:"Market stalls under blue tarps with vintage goods, vinyl records, handmade crafts, browsing crowds in casual clothing amid colorful displayed items.",t:"LRT to Bangsar Station. Walk 10 min to market location (confirm exact spot on Instagram @bangsarsundaymarket). Hours: 10 AM-3 PM Sundays only. Free entry. Cash and card accepted. Arrive early (10-11 AM) for best selection. Walk neighborhood streets after market.",c:[],r:"g",nn:"Pasar Minggu Bangsar",ns:"Pasar akhir pekan dengan barang vintage, kerajinan lokal, makanan jalanan, toko independen menangkap identitas kreatif.",nst:"Pasar minggu Bangsar beroperasi di tempat parkir yang berubah menjadi bazaar 10 pagi-3 sore, menarik campuran lokal, ekspat, kreatif muda, pemburu vintage serius. Warung menjual perhiasan buatan tangan, furniture vintage, rekaman vinil, desainer fashion independen, seni lokal, makanan jalanan. Tidak seperti mal perencanaan KL, pasar minggu terasa organik—penjual saling mengenal.",nt:"LRT ke Bangsar Station. Jalan 10 menit ke lokasi pasar. Jam: 10 pagi-3 sore Minggu saja. Masuk gratis. Uang tunai dan kartu diterima. Tiba awal (10-11 pagi) untuk pilihan terbaik. Jalan jalan lingkungan."}
{id:49,n:"Jalan Masjid India — fabric and textile street market",a:"Masjid India",v:["weird","local","history","hidden"],d:75,s:"A narrow street devoted entirely to fabric, textiles, and sewing supplies, where Indian merchants sell bolts of cloth from storefronts and create a kaleidoscope of color and pattern.",st:"Jalan Masjid India is a single-purpose street that seems like a relic from 19th-century markets—the entire block is devoted to fabric, textiles, and sewing supplies. Bolts of cloth hang from every storefront, creating a visual density that's almost overwhelming. Indian merchant families have run the same shops for decades, sourcing fabrics from India and Southeast Asia. The inventory is staggering: cotton for traditional dress, silk for formal wear, polyester for everyday, lace, embroidery, trim, buttons, needles, thread in every conceivable color. The street developed because of proximity to the Masjid India mosque and the Indian Muslim community's historical presence here. Despite gentrification pressures elsewhere, this street has remained true to its purpose—it's where locals (Malaysian women of all backgrounds) come to buy fabric for traditional dress, school uniforms, home projects. The street is chaotic, narrow, crowded, with haggling as standard practice. It represents economic resilience of immigrant communities and preservation of functional neighborhood identity against homogenizing development.",im:"Narrow street with fabric bolts hanging overhead creating canopy of color and pattern, merchant storefronts crammed with textile goods, browsing customers.",t:"LRT/MRT to Masjid India nearby. Walk down Jalan Masjid India (parallel to main street). Best: weekday mornings before crowds. Free browsing. Haggling expected on bulk purchases. Cash transactions preferred. Photography casual but respectful—don't photograph people without asking.",c:[],r:"g",nn:"Jalan Masjid India",ns:"Jalan sempit didedikasikan untuk kain dan tekstil, pedagang India menjual bolts kain dari toko depan.",nst:"Jalan Masjid India adalah jalan satu tujuan yang terasa seperti sisa pasar abad ke-19—seluruh blok didedikasikan untuk kain, tekstil, dan perlengkapan jahit. Bolts kain menggantung dari setiap toko depan, menciptakan kepadatan visual hampir menakutkan. Keluarga pedagang India menjalankan toko yang sama selama puluhan tahun.",nt:"LRT/MRT ke Masjid India terdekat. Berjalan Jalan Masjid India. Terbaik: pagi hari kerja sebelum keramaian. Penelusuran gratis. Tawar menawar diharapkan. Transaksi tunai lebih disukai. Fotografi santai tapi hormat."}
{id:50,n:"Sungai Gombak river community projects — local environmental activism",a:"Various (Gombak area)",v:["hidden","local","weird","history"],d:100,s:"Community-led restoration and cleanup efforts along the Gombak River, including riverside walks, local workshops, and environmental education connected to the city's water systems.",st:"The Sungai Gombak (Gombak River) was historically one of KL's two central rivers—where 'Kuala' (confluence) Lumpur was founded. The river became polluted and neglected for decades as the city developed, receiving industrial waste and sewage. In the last 15 years, community groups have worked systematically to restore sections of the river, clean the water, plant riparian vegetation, and create walkable access points. The restoration efforts create a visible contrast: sections where community efforts have cleared debris show the river's actual potential—natural banks, fish returning, birds. Other sections remain garbage-filled, polluted, evidence of environmental injustice. Walking along community-restored sections reveals local environmental activism, local stories, and the city's relationship with its water systems. There are occasional community events—river walks, cleanup days, educational workshops. It's not a manicured park but an ongoing struggle to reclaim urban ecology. The river's historical importance (the city is literally named after its confluence) makes the restoration work culturally significant beyond environmental practice.",im:"River water reflecting sky, community members walking along natural bank with restored vegetation, clear contrast between cleaned section and polluted sections upstream.",t:"Various access points along Gombak River. Central point: near Masjid Jamek area where rivers meet. Free walking. Community events irregular—check local social media (Facebook groups for 'Gombak River restoration'). Best weekends. Bring insect repellent. Respect private property boundaries.",c:[],r:"g",nn:"Komunitas Sungai Gombak",ns:"Upaya restorasi dan pembersihan pimpinan komunitas sepanjang Sungai Gombak, termasuk jalan tepi, workshop lokal.",nst:"Sungai Gombak secara historis adalah salah satu dari dua sungai pusat KL—tempat 'Kuala' (pertemuan) Lumpur didirikan. Sungai menjadi tercemar dan terabaikan selama puluhan tahun saat kota berkembang. Dalam 15 tahun terakhir, kelompok komunitas telah bekerja sistematis memulihkan bagian sungai, membersihkan air, menanam vegetasi riparian, menciptakan akses yang dapat dilalui.",nt:"Berbagai titik akses di Sungai Gombak. Titik pusat: dekat area Masjid Jamek tempat sungai bertemu. Jalan gratis. Acara komunitas tidak teratur—periksa media sosial lokal. Terbaik akhir pekan. Bawa anti serangga. Hormati batas properti pribadi."}
{id:51,n:"Kwai Chai Hong — art and heritage collective in Kuala Lumpur",a:"Kuala Lumpur City Centre",v:["art","history","weird","local"],d:75,s:"A renovated heritage shophouse complex transformed into a contemporary art collective with gallery spaces, independent shops, and a functioning café preserving 1920s-30s architecture.",st:"Kwai Chai Hong is a remarkable adaptive reuse project: a row of 1920s-30s shophouses in central KL has been carefully restored and converted into artist studios, gallery spaces, independent boutiques, and a café. The project preserves the original architecture—ceiling beams, tile floors, wooden doors—while creating spaces for contemporary practice. The ground floor cafés feel like stepping into preserved time; the upper levels function as working artist studios and exhibition spaces. The collective was born from grassroots efforts to save the buildings from demolition during the 2000s. The restoration respects historical elements while allowing contemporary use—tension that produces interesting spatial effects. You'll find independent jewelry makers, painters, photographers, designers working and displaying their work. The café serves excellent coffee and local pastries. It's become a focal point for creative communities, but it has avoided commodification—the artists and makers are genuine, not tourist performers. The surrounding neighborhood shows the collision of conservation and development: heritage shophouses adjacent to new high-rises.",im:"Restored 1920s shophouse facade with traditional red tiles, wooden window frames, contemporary art displayed in shop windows, café patrons visible within.",t:"LRT to Pasar Seni/Central Market Station (5 min walk). Free to browse galleries and shops. Café has excellent coffee. Opening times: check website for latest hours (typically 11 AM-6 PM). Photography permitted in galleries—ask for shop policies. Support independent makers by purchasing directly.",c:[],r:"g",nn:"Kwai Chai Hong",ns:"Kompleks toko warisan direnovasi menjadi kolektif seni kontemporer dengan ruang galeri, toko independen, kafe.",nst:"Kwai Chai Hong adalah proyek adaptive reuse yang luar biasa: satu baris toko rumah 1920-30an di KL pusat telah dipulihkan dengan hati-hati dan dikonversi menjadi studio seniman, ruang galeri, butik independen, dan kafe. Proyek melestarikan arsitektur asli—balok plafon, lantai ubin, pintu kayu—sambil menciptakan ruang untuk praktik kontemporer.",nt:"LRT ke Pasar Seni/Central Market Station (5 menit jalan). Gratis jelajahi galeri dan toko. Kafe kopi luar biasa. Jam buka: periksa situs. Fotografi diizinkan di galeri. Dukung pembuat independen dengan membeli langsung."}
{id:52,n:"Kuala Lumpur Street Art precinct — organized graffiti and murals",a:"Various neighborhoods (Kampung Baru, Merdeka, Bukit Bintang areas)",v:["art","beautiful","weird","hidden"],d:90,s:"Deliberately preserved and supported street art zones featuring murals by local and international artists, transforming previously neglected areas into open-air galleries.",st:"In recent years, KL's city government has designated several neighborhoods as legal street art zones—areas where graffiti artists are permitted (even encouraged) to create large-scale murals. The major concentrations are in Kampung Baru (traditional village meets contemporary art), near Merdeka Stadium, and scattered throughout emerging creative neighborhoods. Unlike chaotic street art cities (New York, Berlin), KL's approach is more curated—artists are selected, walls are designated, the practice is officially sanctioned while maintaining visual energy. The work ranges from abstract geometric pieces to representational murals addressing social themes, environmental concerns, Malaysian identity. Local artists have visibility; international artists are brought for specific projects. The street art itself has become a point of neighborhood identity—younger Malaysians gather, photograph, use these spaces for social media narratives about contemporary Malaysia. Unlike the permanent, unchanging murals of public art installations, these walls evolve: pieces are painted over, new works emerge, the visual landscape remains dynamic. It represents how cities are attempting to integrate artist expression into urban design.",im:"Large-scale colorful mural on building side wall, geometrical and abstract forms, street-level perspective showing urban context and passing pedestrians.",t:"Multiple locations: Kampung Baru, near Merdeka Stadium, Bukit Bintang area. Free to view. Best: daylight hours. Excellent for photography. Bring comfortable shoes for walking between locations. Check local art guides for current locations and artist information.",c:[],r:"g",nn:"Seni Jalanan KL",ns:"Zona seni jalanan yang disengaja dilestarikan dengan mural seniman lokal dan internasional mengubah area yang terabaikan.",nst:"Dalam beberapa tahun terakhir, pemerintah kota KL telah menunjuk beberapa lingkungan sebagai zona seni jalanan legal—area di mana seniman grafiti diizinkan (bahkan didorong) untuk membuat mural skala besar. Konsentrasi utama ada di Kampung Baru, dekat Stadion Merdeka, dan tersebar di seluruh lingkungan kreatif yang muncul.",nt:"Berbagai lokasi: Kampung Baru, dekat Stadion Merdeka, area Bukit Bintang. Gratis untuk dilihat. Terbaik: siang hari. Luar biasa untuk fotografi. Bawa sepatu nyaman. Periksa panduan seni lokal untuk lokasi saat ini."}

  {id:2,title:"Sacred Geometry: Religion in Public Space",desc:"Understand how different faiths shape Kuala Lumpur. Visit Jamek Mosque's Mughal architecture and Islamic geometry. Explore Thean Hou Temple's elaborate Chinese decorations. Visit Sri Mahamariamman Temple's intricate gopuram. See how three religions coexist in Malaysia's multicultural framework.",places:[3, 4, 17],time:"4 hours"},

<p className="text-xs leading-relaxed mt-1" style={{color:"#9990b8",fontStyle:"italic"}}>Berwisata dengan bertanggung jawab dan hormati budaya lokal.</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#c8c0e0"}}>Some locations include natural environments, heights, water, or areas that may be restricted or unsafe. You explore at your own risk.</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#c8c0e0"}}>Always follow local laws, respect private property, and check current conditions before visiting any place.</p>
<p className="text-sm leading-relaxed mt-3" style={{color:"#e8c0f0"}}>If you are under 18, please explore responsibly.</p>
</div>
<button onClick={onAccept} className="mt-6 w-full py-4 rounded-xl text-sm font-bold text-white" style={{background:"linear-gradient(135deg,#6366F1,#8B5CF6)",border:"none",cursor:"pointer",maxWidth:380,fontSize:"15px"}}>I understand — let me explore<br/><span style={{fontSize:"12px",opacity:0.85}}>Mulai Jelajahi</span></button>
</div>);

const PlaceCard=({place:p,idx,onOpen,lang})=>(
<button onClick={()=>onOpen(p)} className="text-left w-full rounded-2xl p-4 fade-up" style={{background:"white",border:"1.5px solid #e4e4ed",cursor:"pointer",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div style={{flex:1}}>
<h3 className="text-base font-bold" style={{color:"#1a1a2e",lineHeight:1.3}}>{lang==="native"&&p.nn?p.nn:p.n}</h3>
{lang==="native"&&p.nn&&<p className="text-xs" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-xs mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p></div>
<span className="text-xs font-bold px-2 py-1 rounded-full ml-2 flex-shrink-0" style={{background:p.r==="g"?"#dcfce7":"#fef9c3",color:p.r==="g"?"#166534":"#854d0e"}}>{p.r==="g"?"Green":"Yellow"}</span></div>
<p className="text-sm mt-2" style={{color:"#555",lineHeight:1.5}}>{lang==="native"&&p.ns?p.ns:p.s}</p>
<div className="flex gap-1.5 mt-2 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-2 py-0.5 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</button>);

const PlaceDetail=({place:p,onClose,onNext,onPrev,lang})=>(
<div style={{position:"fixed",inset:0,zIndex:1000,backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat",overflowY:"auto"}}>
<div className="px-5 pt-6 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex justify-between items-center mb-4">
<button onClick={onClose} className="text-sm font-bold" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← Back</button>
<div className="flex gap-2">
<button onClick={onPrev} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>←</button>
<button onClick={onNext} style={{background:"#f0f0ff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:14}}>→</button></div></div>
<h1 className="text-2xl font-black" style={{color:"#1a1a2e"}}>{lang==="native"&&p.nn?p.nn:p.n}</h1>
{lang==="native"&&p.nn&&<p className="text-sm font-medium" style={{color:"#6366F1"}}>{p.n}</p>}
<p className="text-sm mt-1" style={{color:"#888"}}>{p.a} · {p.d} min</p>
{PLACE_IMAGES[p.id]&&<div className="mt-4 rounded-xl overflow-hidden" style={{maxHeight:"400px"}}>
<img src={`images/${PLACE_IMAGES[p.id]}`} alt={p.n} style={{width:"100%",maxHeight:"360px",objectFit:"contain",display:"block",borderRadius:"8px"}}/>
<p className="text-xs mt-1" style={{color:"#aaa",textAlign:"center"}}>AI-generated illustration</p></div>}
<div className="mt-4 p-4 rounded-xl" style={{background:"#f8f8ff"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#1a1a2e"}}>The Story</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nst?p.nst:p.st}</p></div>
{p.im&&<div className="mt-3 p-4 rounded-xl" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#a78bfa"}}>Imagine This</h3>
<p className="text-sm" style={{color:"#b8b0d0",lineHeight:1.7,fontStyle:"italic"}}>{p.im}</p></div>}
{p.t&&<div className="mt-3 p-4 rounded-xl" style={{background:"#f0fdf4"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#166534"}}>{lang==="native"?"Tips / "+LANG_NAME:"Tips"}</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nt?p.nt:p.t}</p>
<a href={`https://maps.google.com/?q=${encodeURIComponent(p.n+', '+CITY_EN)}`} target="_blank" rel="noopener noreferrer"
  className="mt-3 flex items-center gap-2 text-sm font-bold"
  style={{color:"#166534",textDecoration:"none",display:"inline-flex",marginTop:"10px"}}>
  🗺 Get directions
</a>
</div>}
{p.ef&&<p className="text-xs mt-3 pt-3" style={{color:"#555",lineHeight:1.7,borderTop:"1px solid #dcfce7"}}>🍔 {p.ef}</p>}
{p.sf&&<p className="text-xs mt-2" style={{color:"#555",lineHeight:1.7}}>🏠 {p.sf}</p>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
<div className="mt-5">
<p className="text-xs font-bold mb-2" style={{color:"#888",letterSpacing:"0.08em",textTransform:"uppercase"}}>City Moods</p>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} style={{borderRadius:10,overflow:"hidden",aspectRatio:"2/3",background:"#eee"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>)}</div></div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TBGS={"places":"url('../../textures/tex11.png') center/cover no-repeat","collections":"url('../../textures/tex12.png') center/cover no-repeat","missions":"url('../../textures/tex13.png') center/cover no-repeat","plan":"url('../../textures/tex14.png') center/cover no-repeat","phrases":"url('../../textures/tex15.png') center/cover no-repeat","default":"url('../../textures/tex11.png') center/cover no-repeat"};function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Kuala Lumpur Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Kuala Lumpur Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
