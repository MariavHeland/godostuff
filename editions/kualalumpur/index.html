The tower has a restaurant and a more casual observation deck. The fast-moving dusk in the tropics means the window for optimal light is brief — about 20 minutes of perfect color. Go at dusk, not at night. The best view is the moment when the city lights activate.",im:"Standing on the observation deck as the sun sets and the city lights turn on below, the Petronas Towers glowing in the distance.",t:"Bukit Nanas. Open 9am-10pm daily. RM 58 (observation deck, about €12). RM 115 (with Skybox section). Online booking available. Parking included. Best 5:30-7pm.",c:["greatest_hits","beautiful","high_spots"],r:"g",nn:"吉隆坡塔",ns:"高421米的電視塔 — 觀景台提供完整的360度景色。",nst:"吉隆坡塔於1996年建造，當時保持著世界上最高的自由站立塔的紀錄。觀景台在276米。

日落時，當天空變色，城市燈亮起時，您看到吉隆坡的完整地理。",nt:"武吉納納斯。每天9-22開放。RM 58。RM 115（有Skybox部分）。在線預訂可用。"},
  {id:604,n:"Chinatown (Petaling Street) dawn",a:"Chinatown",v:["famous","local","free entry"],d:90,s:"The street where Malaysian Chinese culture operates 24/7 — best at dawn when vendors are setting up and locals are shopping.",st:"Petaling Street in Chinatown is perpetually busy. But it\'s most authentic at dawn (5-7am) when vendors are arranging goods, locals are buying vegetables and spices for the day, and the energy is pure commerce. The street is narrow, the stalls are packed, the variety is overwhelming.

The medicine shops, the spice vendors, the produce sellers, the dried goods — everything has been here for decades. Walk slowly and watch the system work. By 9am the tourists have arrived and the atmosphere changes. The dawn version is the real one.",im:"Walking through Petaling Street at 6am, vendors arranging goods, locals shopping, the smell of spices and produce.",t:"Chinatown. Petaling Street runs north-south. Best 5-7am. Completely free. Food stalls serve breakfast RM 3-8 (€0.60-1.50). LRT/Monorail to Pasar Seni or walk from Merdeka Square.",c:["greatest_hits","local","free entry"],r:"g",nn:"茨廠街 黎明",ns:"馬來西亞華人文化24/7運營的街道 — 黎明最佳。",nst:"茨廠街在唐人街永遠很忙。但黎明時最真實（5-7 am），當小販正在安排商品時，當地人正在購買蔬菜和香料。街道狹窄，攤位擁擠。

醫藥店、香料小販、農產品賣家、乾貨 — 一切都在這裡數十年。",nt:"茨廠街。每天5-7最佳。完全免費。食物攤位早餐RM 3-8。LRT至帕薩爾森尼。"},
  {id:605,n:"Legoland Malaysia",a:"Johore Bahru",v:["famous","weird","free entry"],d:300,s:"The theme park 1.5 hours south where 55 million LEGO bricks create miniature landscapes of Asia.",st:"Legoland Malaysia opened in 2012 and contains 15,000 LEGO structures made from 55 million individual bricks. The entire theme park is built in miniature from LEGO blocks. The detail is extraordinary — buildings, landscapes, vehicles, all constructed at scale. Walk through the Miniland section and you see LEGO versions of famous Asian sites: Angkor Wat, the Great Wall, Petronas Towers.

The park also has rides and water attractions. But the real experience is the Miniland — an entire landscape constructed from plastic bricks with obsessive attention to detail. It\'s bizarre but impressive.",im:"Standing in Miniland looking at an entire city constructed from LEGO blocks, the detail astonishing.",t:"Johore Bahru (Nusajaya). 1.5-2 hour drive/bus south of KL. Open 10am-5pm weekdays, 10am-6pm weekends. RM 119 entry (about €25). Parking and food available. Can be done as day trip from KL.",c:["greatest_hits","weird","beautiful"],r:"g",nn:"馬來西亞樂高樂園",ns:"主題公園，距離南方1.5小時，55百萬樂高磚塊創建亞洲微型景觀。",nst:"樂高樂園馬來西亞於2012年開業，包含15,000個由5500萬個樂高積木製成的樂高結構。整個主題公園都是用樂高積木的縮小版本建造的。

細節非常了不起 — 建築物、景觀、車輛，都是按比例構建的。",nt:"柔佛州（努沙杰亞）。吉隆坡以南1.5-2小時。10-17平日，10-18週末。RM 119入場。"},
  {id:606,n:"Lake Gardens (Taman Tasik Perdana)",a:"Kuala Lumpur",v:["famous","beautiful","quiet"],d:120,s:"92 hectares in the city center with gardens, gardens within gardens, orchids, and water.",st:"Lake Gardens (Taman Tasik Perdana) is where Kuala Lumpur residents come to escape. The park is vast and beautifully maintained. There are themed gardens: the Rose Garden, the Orchid Garden, the Palm Valley, the Deer Park. The central lake is perfect for walking around — 1.3km perimeter.

Go in the morning or late afternoon. The light is best. The crowds are lightest. Walk slowly. The park is completely free. The scale is such that you can wander for hours and barely see other people. The Orchid Garden alone is worth the visit.",im:"Walking along the lake path in late afternoon, the water still, trees reflected, the city buildings visible on one side.",t:"Kuala Lumpur city center. Open daily 6am-midnight. Completely free. Guided tours available for small fee. Parking available. Multiple cafés. KL Sentral or walk from Merdeka Square.",c:["greatest_hits","beautiful","quiet"],r:"g",nn:"湖花園（塔曼塔西克失利亞納）",ns:"城市中心92公頃，有花園、花園中的花園、蘭花和水。",nst:"湖花園是吉隆坡居民來逃脫的地方。公園廣闊，保養良好。有主題花園：玫瑰園、蘭花園、棕櫚谷、鹿園。

走漫長。公園完全免費。規模使您可以漫步數小時而幾乎看不到其他人。",nt:"吉隆坡市中心。每天6-24開放。完全免費。導遊可用。停車可用。多家咖啡館。"},
P=[
{id:618, n:"Jalan Alor at midnight — neon hawker sprawl", a:"Bukit Bintang", v:["food","weird","neighbourhoods"], d:30,
s:"The part they don\'t show tourists. Barbecue sticks smoking under fluorescent, drunk guys debating char siu, plastic stools groaning.", st:"Jalan Alor at 2am is where KL actually eats. Not the polished version—the real one. Stalls crammed between office buildings, three deep with people ordering offal grilled to black. The char kuey teow vendors know your face after twice. No reservations, no plating, just pure competence and heat.\n\nCome after midnight when the city workers roll through. Sit next to the construction crews and Indian businessmen and teenagers pretending to be older.", im:"Red neon on wet pavement, metal baskets of raw meat, flames under wire grills.", t:"Cash only most places. Go 1-3am for the real crowd. Avoid peak dinner hours if you want actual seating.",
c:["food","neighbourhoods","weird"], r:"g",
nn:"Jalan Alor tengah malam — lorong hawker bercahaya neon", ns:"Bagian yang mereka tidak tunjukkan kepada pelancong. Kesinambungan barbekyu di bawah lampu fluoresen.", nst:"Jalan Alor tengah malam adalah tempat KL sebenarnya makan. Bukan versi yang dipoles—yang asli. Warung sesak di antara bangunan pejabat, tiga lapis dengan orang memesan jeroan panggang hitam. Penjual char kuey teow tahu wajah Anda setelah dua kali.\n\nDatang setelah tengah malam ketika para pekerja kota berkeliling. Duduk di sebelah kru konstruksi dan pengusaha India dan remaja yang berpura-pura lebih tua.", nt:"Kebanyakan tempat hanya terima tunai. Pergi 1-3 pagi untuk kerumunan asli."},

{id:619, n:"Banana leaf at Laksa Lemak — Chow Kit institutional", a:"Chow Kit", v:["food","neighbourhoods"], d:30,
s:"Not fancy. Just the right lunch: fish curry on banana leaf, rice, sambals that wake you up, your own small story joining a thousand others.", st:"This place has been feeding Chow Kit for longer than anyone wants to admit. Workers, office people, families—everyone comes the same way. No menu talk, just point at what the aunty has ready. The fish curry has depth, proper spice, the kind where you taste yesterday\'s cooking in it.\n\nIt\'s chaos but efficient chaos. The tables are small, the fans loud, and you eat fast because people are standing behind you.", im:"Stainless steel table, bright yellow rice, dark curry pooling on banana leaf, plastic chairs.", t:"Go 11:30am-2pm. It fills completely. Don\'t overthink it—just order what looks good on other tables.",
c:["food","neighbourhoods"], r:"g",
nn:"Pisang daun di Laksa Lemak — institusi Chow Kit", ns:"Bukan mewah. Hanya makan siang yang tepat: kari ikan di atas daun pisang, nasi, sambal yang membangunkan Anda.", nst:"Tempat ini telah memberi makan Chow Kit lebih lama dari yang siapa pun ingin diakui. Pekerja, pegawai kantor, keluarga—semua orang datang dengan cara yang sama. Tanpa pembicaraan menu, hanya menunjuk pada apa yang disiapkan oleh nenek-nenek. Kari ikannya memiliki kedalaman, rempah yang tepat, jenis di mana Anda merasakan memasak kemarin di dalamnya.", nt:"Pergi 11:30-2 siang. Penuhnya sepenuhnya. Jangan terlalu berpikir—hanya pesan apa yang terlihat bagus di meja lain."},

{id:620, n:"Mamak at 3am — the insomniacs\\' parliament", a:"Multiple", v:["food","weird"], d:30,
s:"When the night shift ends, they come. When you can\'t sleep, you find them. The only place awake when the rest of the city dreams.", st:"Every mamak in KL has a 3am crowd and they\'re all different. Construction crews still in hi-vis, hospital staff off their shift, security guards, taxi drivers, insomniacs like you. The roti canai is the same but the context makes it taste like survival and camaraderie.\n\nThe aunties know what you need before you ask. There\'s no rush, no judgment. Time works differently here. You can sit for hours with one teh tarik.", im:"Plastic table under hanging bulbs, golden roti canai torn into pieces, dark teh tarik with foam.", t:"Look for the ones near construction sites or highways. The busier the surrounding area at night, the better the mamak.",
c:["food","weird"], r:"g",
nn:"Mamak tengah malam 3 — parlimen insomniacs", ns:"Ketika shift malam berakhir, mereka datang. Ketika Anda tidak bisa tidur, Anda menemukannya. Satu-satunya tempat yang terjaga ketika sisa kota bermimpi.", nst:"Setiap mamak di KL memiliki kerumunan 3am dan semuanya berbeda. Kru konstruksi masih dalam hi-vis, staf rumah sakit lepas shift, penjaga keamanan, sopir taksi, insomnia seperti Anda. Roti canai sama tapi konteksnya membuat rasanya seperti kelangsungan hidup dan kebersamaan.", nt:"Cari yang dekat lokasi konstruksi atau jalan raya. Semakin sibuk area sekitarnya di malam hari, semakin baik mamak-nya."},

{id:621, n:"Wet market Segambut at sunrise — actual commerce", a:"Segambut", v:["food","markets","free_culture"], d:30,
s:"Before the packed lunches, there\'s this: fishmongers sorting ice, vegetable pyramids, actual chaos that serves breakfast.", st:"Segambut wet market opens early and the real buying starts before dawn. Aunties with big plastic bags filling up for family meals, restaurants picking the best produce, home cooks who know every vendor. The smell is honest—fish and wet stone and morning air.\n\nNo Instagram angles here. Just speed, quality, and people who know food. You can eat breakfast at any of the dozen stalls surrounding the market itself. The kuey teow is made while you wait.", im:"Metal stalls piled high with white fish on crushed ice, bundles of green vegetables, steam rising.", t:"Sunday morning is absolute peak. Go 6-8am. Bring cash, bring a bag, avoid the fish section if blood makes you squeamish.",
c:["food","free_culture","markets"], r:"g",
nn:"Pasar basah Segambut saat fajar — perdagangan sebenarnya", ns:"Sebelum makan siang yang dikemas, ada ini: pedagang ikan mengurutkan es, piramida sayuran, kekacauan aktual yang melayani sarapan.", nst:"Pasar basah Segambut dibuka awal dan pembelian nyata dimulai sebelum fajar. Nenek dengan tas plastik besar yang diisi untuk makanan keluarga, restoran memilih hasil terbaik, memasak di rumah yang tahu setiap penjual. Baunya jujur—ikan dan batu basah dan udara pagi.\n\nTidak ada sudut Instagram di sini. Hanya kecepatan, kualitas, dan orang yang tahu makanan. Anda dapat makan sarapan di salah satu lusin warung yang mengelilingi pasar itu sendiri. Kuey teow dibuat saat Anda menunggu.", nt:"Minggu pagi adalah puncak mutlak. Pergi 6-8 pagi. Bawa uang tunai, bawa tas, hindari bagian ikan jika darah membuat Anda merasa tidak nyaman."},

{id:622, n:"Batu Caves without the cave — the shrine approach", a:"Batu Caves", v:["free_culture","history_big","nature"], d:30,
s:"Everyone goes up the stairs. Nobody sits down at the base shrine and watches the bats leave.", st:"The real Batu Caves experience is 5:30-6:30pm when the caves literally empty. A million bats have been hanging in the dark limestone cathedral all day—suddenly they pour out. The approach is covered in Hindu shrines, flower offerings, incense. The sound is unreal.\n\nThe stairs to the main cave are taxing, sure, but this bit is free and profound. Sit with the devotional energy, watch the river of bats pour across the golden light. It\'s genuinely religious without requiring you to be religious.", im:"Columns of bats silhouetted against orange sky, flowers and incense smoke at shrine level.", t:"Arrive by 5:15pm. The bats leave when it gets darker—stay 45 minutes max. Bring water. Respect the shrine—it\'s not a photo spot.",
c:["free_culture","history_big","nature"], r:"g",
nn:"Gua Batu tanpa gua — pendekatan makam", ns:"Semua orang naik tangga. Tidak ada yang duduk di makam dasar dan menonton kelelawar pergi.", nst:"Pengalaman Gua Batu yang sebenarnya adalah 5:30-6:30 malam ketika gua benar-benar kosong. Satu juta kelelawar telah menggantung di katedral batu kapur gelap sepanjang hari—tiba-tiba mereka keluar. Pendekatannya ditutupi dengan makam Hindu, persembahan bunga, kemenyan. Suaranya tidak nyata.", nt:"Tiba pukul 5:15 sore. Kelelawar pergi ketika menjadi lebih gelap—tinggal maksimal 45 menit. Bawa air. Hormati makam—ini bukan tempat foto."},

{id:623, n:"Putrajaya administration district at dusk — accidental beauty", a:"Putrajaya", v:["high_spots","nerd","neighbourhoods"], d:30,
s:"A planned city full of bureaucrats learning to live there. The canals mirror everything pink and gold at hour.", st:"Putrajaya was supposed to be Malaysia\'s futuristic admin center and somehow it ended up being beautiful by accident. The grand mosque reflects perfectly in the water, the government buildings have actual geometry, the streets are impossibly clean. At dusk it\'s like someone frosted the whole place with light.\n\nWalk the mosque grounds if you\'re respectful, take the bridge walks, grab a coffee and watch the swans. There\'s almost no tourists because there\'s no \'point\' to it, which is exactly the point.", im:"Symmetrical water reflection, white mosque dome against pink sky, manicured gardens.", t:"Go 5-7pm for the light and emptiness. Modest dress for mosque areas. Free entry to most outdoor spaces.",
c:["high_spots","neighbourhoods","nerd"], r:"g",
nn:"Pusat pentadbiran Putrajaya saat senja — keindahan kebetulan", ns:"Sebuah kota terencana penuh dengan birokrat belajar tinggal di sana. Saluran mencerminkan segalanya merah jambu dan emas per jam.", nst:"Putrajaya seharusnya menjadi pusat admin futuristik Malaysia dan entah bagaimana itu berakhir dengan indah secara kebetulan. Masjid besar mencerminkan sempurna di air, bangunan pemerintah memiliki geometri aktual, jalan-jalan tidak mungkin bersih. Saat senja seolah seseorang membekukan seluruh tempat dengan cahaya.", nt:"Pergi 5-7 malam untuk cahaya dan kekosongan. Pakaian sederhana untuk area masjid. Masuk gratis ke sebagian besar ruang outdoor."},

{id:624, n:"Fraser\'s Hill — the station that time forgot", a:"Day Trip", v:["nature","day_trips","cool_reliefs"], d:30,
s:"Two thousand feet up and forty minutes away. A British hill station that stayed weird instead of becoming a resort.", st:"Fraser\'s Hill was built as a British retreat and nobody updated it much. The hotel is old in an honest way. The air is actually cooler—legitimately 10 degrees below KL. The roads wind through hill village estates, past strawberry farms, actual pine-scented forest.\n\nYou can hike from the Saddle, take the stone steps toward Kledang Peak, or just sit in the village and watch tourists be confused about paying for a permit to drive up the road. The whole place feels like stepping sideways in time.", im:"Misty forested hills, old British Tudor buildings, winding mountain roads.", t:"Bring a layer. The road up charges a small entry fee. Go on a weekday if you want it quiet. The raspberry jam at the gift shop is actually good.",
c:["day_trips","nature"], r:"g",
nn:"Bukit Fraser — stesen yang waktu lupakan", ns:"Dua ribu kaki ke atas dan empat puluh menit jauhnya. Sebuah stasiun bukit Inggris yang tetap aneh sebagai gantinya menjadi resor.", nst:"Bukit Fraser dibangun sebagai penarikan Inggris dan tidak ada yang banyak memperbarui. Hotelnya tua dengan cara yang jujur. Udaranya benar-benar lebih sejuk—secara sah 10 derajat di bawah KL. Jalan-jalan melengkung melalui perkebunan desa perbukitan, melewati pertanian stroberi, hutan bau pinus aktual.", nt:"Bawa lapisan. Jalan ke atas mengenakan biaya masuk kecil. Pergi di hari kerja jika Anda menginginkannya tenang. Selai raspberry di toko hadiah benar-benar bagus."},

{id:625, n:"Kuala Selangor fireflies at night — synchronized magic", a:"Day Trip", v:["romantic_water","nature","day_trips"], d:30,
s:"Mangrove darkness. Twenty thousand insects flashing at once. No electricity needed.", st:"Kuala Selangor is an hour north and the fireflies (kunang-kunang) here are a real thing—not a tourist trap. You take a small boat through the mangrove forest at night and the trees literally light up with synchronous blinking. Hundreds of thousands of beetles having conversations in bioluminescence.\n\nIt\'s romantic by accident. The darkness, the boats, the silence broken only by water, then suddenly your face is illuminated green by living light. Bring someone you want to see that way, or go alone and feel weird.", im:"Dark mangrove water, scattered green lights on black, silhouettes of boats.", t:"Book with a local guide in the village. Go when it\'s dark—new moon is better. Rainy season is brighter. No flash photography.",
c:["day_trips","nature","romantic_water"], r:"g",
nn:"Kunang-kunang Kuala Selangor malam — keajaiban sinkron", ns:"Kegelapan bakau. Dua puluh ribu serangga berkilau sekaligus. Tidak perlu listrik.", nst:"Kuala Selangor adalah satu jam ke utara dan kunang-kunang di sini adalah hal yang nyata—bukan jebakan turis. Anda naik perahu kecil melalui hutan bakau di malam hari dan pohon-pohon benar-benar menyala dengan kedipan yang sinkron. Ratusan ribu kumbang memiliki percakapan dalam bioluminescence.", nt:"Pesan dengan pemandu lokal di desa. Pergi ketika gelap—bulan baru lebih baik. Musim hujan lebih terang. Tanpa fotografi kilat."},

{id:626, n:"Tin Dredge No. 5 — the monster machine", a:"Kuala Lumpur", v:["weird","history_big","nerd"], d:30,
s:"A two-hundred-ton bucket crane that ate Malaysia\'s mountains. It\'s parked in a museum looking like a sleeping robot.", st:"Malaysia got rich on tin and this is the proof. The dredge is enormous—a literal bucket that could fit a car, suspended from an impossible crane, operated by one guy who\'d point at mountains and watch them become holes. The museum lets you walk inside it, under it, around it.\n\nIt\'s technically industrial archeology but it feels more like seeing a time machine. The rust and scale and sheer engineering stupidity that made it work. You touch the metal and understand colonial extraction in a way no lecture could teach.", im:"Massive rusted metal bucket, intricate steel framework, museum lighting making it look archaeological.", t:"Small entry fee. Go on a quiet day. Bring real shoes—there\'s lots of climbing inside the structure.",
c:["history_big","nerd","weird"], r:"g",
nn:"Keruk Timah No. 5 — mesin monster", ns:"Sebuah derek ember dua ratus ton yang memakan gunung Malaysia. Ini diparkir di museum yang terlihat seperti robot tidur.", nst:"Malaysia kaya dengan timah dan ini buktinya. Keruk sangat besar—ember harfiah yang bisa muat mobil, digantung dari derek yang mustahil, dioperasikan oleh satu orang yang akan menunjuk pada gunung dan menonton mereka menjadi lubang. Museum memungkinkan Anda berjalan di dalamnya, di bawahnya, di sekitarnya.", nt:"Biaya masuk kecil. Pergi di hari yang sepi. Bawa sepatu nyata—ada banyak pendakian di dalam struktur."},

{id:627, n:"KL Bird Park at dawn — before the school groups", a:"Lake Gardens", v:["nature","parks","free_culture"], d:30,
s:"Two hundred bird species in cages but the sound at 7am when they all wake up is the real thing.", st:"The Bird Park is hokey but it works. Come at opening (8am) and you get the birds active and the place nearly empty. Three hundred aviaries crammed into landscaped mess, parrots screaming, eagles looking contemplative, hornbills acting like comedians.\n\nBy noon it\'s packed with school kids. By 7am it\'s just you and the dawn chorus and people actually interested in birds. The free flight show happens twice daily but the best part is just walking through the tropical humidity and watching 200 species ignore you.", im:"Bright tropical birds against jungle green, aviaries in dappled light, early morning steam.", t:"Arrive 10 minutes before opening. Wear comfortable shoes—it\'s larger than it looks. Bring water.",
c:["free_culture","nature","parks"], r:"g",
nn:"Taman Burung KL subuh — sebelum grup sekolah", ns:"Dua ratus spesies burung dalam sangkar tetapi suara pukul 7 pagi ketika mereka semua bangun adalah hal yang sebenarnya.", nst:"Taman Burung itu aneh tapi berhasil. Datang saat pembukaan (jam 8 pagi) dan Anda mendapatkan burung aktif dan tempat hampir kosong. Tiga ratus aviarium yang terjebak dalam kekacauan yang dibangun taman, burung beo berteriak, elang terlihat kontemplatif, rangkong bertindak seperti komedian.", nt:"Tiba 10 menit sebelum pembukaan. Gunakan sepatu yang nyaman—lebih besar dari yang terlihat. Bawa air."},

{id:628, n:"Thean Hou Temple — the honest decoration", a:"Sentul", v:["free_culture","parks","history_big"], d:30,
s:"An enormous Chinese temple where nothing is understated. Gold, red, dragons, incense so thick you inhale centuries.", st:"Thean Hou is free and it hits hard. The three main halls are massive—one for Buddha, one for Confucius, one for local deities—and every surface is covered in ornament. The craftsmanship is genuine, not cheap reproduction. Real jade, real gold leaf, real carving.\n\nGo when there\'s a ceremony or just go on a quiet Tuesday. The incense smoke tells stories about devotion, not marketing. You can light a stick if you want, or just sit in a carved wooden pew and feel the weight of a hundred years of prayers.", im:"Massive red and gold interior, coiled incense smoke, jade and ceramic details catching light.", t:"Free entry. Modest dress. Quiet hours are better for photography. The ground level temple is more accessible than upper levels.",
c:["free_culture","history_big","parks"], r:"g",
nn:"Kuil Thean Hou — dekorasi jujur", ns:"Sebuah kuil Cina yang sangat besar di mana tidak ada yang kurang terucapkan. Emas, merah, naga, dupa begitu tebal Anda menghirup berabad-abad.", nst:"Thean Hou gratis dan itu menonjol keras. Tiga aula utama sangat besar—satu untuk Buddha, satu untuk Konfusius, satu untuk dewa lokal—dan setiap permukaan ditutupi dengan hiasan. Keahlian adalah asli, bukan reproduksi murah. Giok nyata, daun emas nyata, ukiran nyata.", nt:"Pergi ketika ada upacara atau hanya pergi pada hari Selasa yang tenang. Asap dupa menceritakan cerita tentang pengabdian, bukan pemasaran."},

{id:629, n:"Merdeka Square at 7am — when it belonged to people", a:"City Centre", v:["history_big","nerd","free_culture"], d:30,
s:"The flag. The square. Joggers and office workers moving across space that held independence.", st:"Dataran Merdeka at dawn is undefended. No crowds, no performances, just the massive flagpole and the rectangular space where Malaysia decided to be a country. The old colonial buildings square around it, looking official and tired.\n\nThere\'s a decent walk around the perimeter. The National Museum sits on one side. The Sultan Abdul Samad Building (with the famous clock tower) guards the whole thing. You can imagine what 1957 felt like here, or just enjoy the peace of a historical space when history isn\'t being performed.", im:"Empty square at sunrise, massive flagpole against pale sky, colonial buildings in shadow.", t:"Go 6-8am weekdays. It\'s empty and peaceful. The National Museum opens 9am. Dress normally but respect the history.",
c:["free_culture","history_big","nerd"], r:"g",
nn:"Dataran Merdeka pukul 7 pagi — ketika itu milik orang", ns:"Bendera. Alun-alun. Pelari dan pekerja kantor bergerak di ruang yang dipegang kemerdekaan.", nst:"Dataran Merdeka di fajar tidak terbela. Tidak ada kerumunan, tidak ada pertunjukan, hanya tiang bendera besar dan ruang persegi panjang di mana Malaysia memutuskan menjadi negara. Bangunan-bangunan kolonial lama di sekitarnya, terlihat resmi dan lelah.", nt:"Pergi 6-8 pagi hari kerja. Itu kosong dan damai. Museum Nasional dibuka 9 pagi. Berpakaian normal tetapi hormati sejarahnya."},

{id:630, n:"Kampung Baru — when the village is still a village", a:"Kampung Baru", v:["neighbourhoods","markets","history_big"], d:30,
s:"The last Malay village inside the city. Wooden houses on stilts, narrow lanes, markets that existed before malls were a concept.", st:"Kampung Baru is three minutes from the Petronas Towers and absolutely refuses to change. Wooden shophouses, chicken coops, narrow lanes crammed with commerce that happens between 6am-noon. The food is straightforward—nasi kuning, satay, kueh, stuff people eat for actual breakfast, not Instagram breakfast.\n\nGo early. The whole market energy dies by 2pm. The wooden buildings are worth seeing just for the architecture—pre-modern density and efficiency that cities tried to copy and failed. You\'ll see old KL here.", im:"Wooden shophouses painted faded colors, narrow alleys with vegetable piles, roosters and morning clatter.", t:"Go 6-11am. Bring cash. The market is chaotic and efficient—follow the locals. Avoid Fridays if you want parking.",
c:["history_big","markets","neighbourhoods"], r:"g",
nn:"Kampung Baru — ketika desa masih desa", ns:"Desa Melayu terakhir di dalam kota. Rumah kayu di atas tiang, gang sempit, pasar yang ada sebelum mal adalah konsep.", nst:"Kampung Baru adalah tiga menit dari Petronas Towers dan benar-benar menolak untuk berubah. Toko rumah kayu, kandang ayam, gang sempit dipenuhi dengan perdagangan yang terjadi antara 6-12. Makanannya sederhana—nasi kuning, sate, kueh, hal-hal yang dimakan orang untuk sarapan aktual, bukan sarapan Instagram.", nt:"Pergi 6-11 pagi. Bawa uang tunai. Pasar kacau dan efisien—ikuti penduduk lokal. Hindari Jumat jika Anda ingin parkir."},

{id:631, n:"Brickfields — the Indian meal and the history", a:"Brickfields", v:["neighbourhoods","food","history_big"], d:30,
s:"Little India that still smells like India. Spices, saffron cooking, jasmine garlands, and a century of temples.", st:"Brickfields was built for railroad workers. A hundred fifty years later it\'s still Indian in a way that matters. The temples are real temples, not theme parks. The shops sell spices you\'ve never heard of. The restaurants feed you quantities of food that feel generous instead of portioned.\n\nWalk Jalan Tun Sambanthan early morning and watch the vegetable markets, the flower sellers, the old guys on plastic chairs. Eat a proper South Indian breakfast—roti canai, teh tarik, some kind of fish curry. The community still runs itself.", im:"Colorful temple gopuram above street level, flower garlands for sale, steel pots of curries steaming.", t:"Go 7-11am or 5-9pm. The neighborhood feeds itself at those hours. Parking is tight. Modest dress near temples.",
c:["food","history_big","neighbourhoods"], r:"g",
nn:"Brickfields — hidangan India dan sejarah", ns:"Little India yang masih tercium seperti India. Rempah, memasak saffron, garland bunga melati, dan abad kuil.", nst:"Brickfields dibangun untuk pekerja kereta api. Seratus lima puluh tahun kemudian itu masih India dengan cara yang penting. Kuil-kuil adalah kuil asli, bukan taman hiburan. Toko-toko menjual rempah yang tidak pernah Anda dengar. Restoran memberi makan Anda jumlah makanan yang terasa murah hati sebagai gantinya membatasi.", nt:"Pergi 7-11 pagi atau 5-9 malam. Komunitas masih menjalankan dirinya sendiri. Parkir ketat. Pakaian sederhana di dekat kuil."},

{id:632, n:"KLCC Park at 6am — the empty tower and your breathing", a:"KLCC", v:["parks","high_spots","free_culture"], d:30,
s:"The Petronas Twin Towers from ground level when there\'s nobody there yet. Just you and the morning joggers and your own thoughts bouncing off glass.", st:"Taman KLCC is fully free and it opens early. Six in the morning and the park is maybe thirty percent full—yoga people, serious runners, old guys walking for health. The towers are close enough to feel massive, far enough to feel unreal. The landscaping is precise and peaceful.\n\nThere\'s water features, manicured garden, promenades for aimless walking. The whole point is that it\'s integrated luxury without requiring you to buy anything. Just show up, breathe the filtered air, watch the towers turn from blue shadow to white reality as the sun comes up.", im:"Twin towers catching golden light, manicured green grass, reflection pools, early light and few people.", t:"Go 6-7am. It stays open until 10pm. Free entry. Bring water if you\'re exercising.",
c:["free_culture","high_spots","parks"], r:"g",
nn:"Taman KLCC jam 6 pagi — menara kosong dan napas Anda", ns:"Menara Petronas Twin Towers dari tingkat tanah ketika tidak ada orang di sana. Hanya Anda dan pelari pagi dan pikiran Anda sendiri memantul dari kaca.", nst:"Taman KLCC sepenuhnya gratis dan dibuka awal. Jam enam pagi dan taman mungkin tiga puluh persen penuh—orang yoga, pelari serius, orang tua berjalan untuk kesehatan. Menara cukup dekat untuk terasa besar, cukup jauh untuk terasa tidak nyata. Lansekap itu presisi dan damai.", nt:"Pergi 6-7 pagi. Tetap buka hingga 10 malam. Masuk gratis. Bawa air jika Anda berolahraga."},

{id:633, n:"Hash House Harriers KL run — Thursday night chaos", a:"Rotating", v:["sport","weird","neighbourhoods"], d:30,
s:"A two-hundred-year-old drinking club with a running problem. Every Thursday they mark a trail through the city and maybe three hundred people follow it.", st:"The Hash House Harriers started in Malaysia and they\'re still the real deal here. You show up, you pay a small fee, you get a map or marks, and you follow hundreds of people running through backlots and shortcuts and private property (with permission). It\'s part bar crawl, part navigation challenge, part social club.\n\nThe vibe is anarchic but inclusive. People of all speeds join. There\'s usually a beer stop halfway, definitely one at the end. The banter is stupid, the beer cheap, the community genuine. You get a close look at neighborhoods you\'d never visit otherwise.", im:"Trail markers on pavement, runners navigating narrow alleyways, outdoor tent with plastic chairs and beer.", t:"Look up the weekly schedule online. Wear good shoes. Go to the On-On beer gathering afterward. It\'s more about the people than speed.",
c:["neighbourhoods","sport","weird"], r:"g",
nn:"Larian Hash House Harriers KL — kekacauan malam Kamis", ns:"Klub minum berusia dua ratus tahun dengan masalah berlari. Setiap Kamis mereka menandai jejak melalui kota dan mungkin tiga ratus orang mengikutinya.", nst:"Hash House Harriers dimulai di Malaysia dan mereka masih hal yang nyata di sini. Anda datang, Anda membayar biaya kecil, Anda mendapatkan peta atau tanda, dan Anda mengikuti ratusan orang berlari melalui backlot dan jalan pintas dan properti pribadi (dengan izin). Ini bagian bar crawl, bagian tantangan navigasi, bagian klub sosial.", nt:"Cari jadwal mingguan online. Kenakan sepatu yang bagus. Pergi ke perkumpulan bir On-On sesudahnya. Ini lebih tentang orang daripada kecepatan."},

{id:634, n:"Templer Park waterfall — the river still works", a:"Day Trip", v:["nature","day_trips","swimming"], d:30,
s:"Thirty minutes and a highway away. A river that hasn\'t been paved over yet. Water you can actually get in.", st:"Templer Park is the excuse to get outside the city. A proper jungle trail (the Waterfall Trail is four km return, easy) leads to a waterfall that isn\'t famous enough to be destroyed. The river is clean enough to swim in, the pool deep enough to feel like swimming instead of wading.\n\nThe trail itself is just proper jungle—dense, humid, vines, the sound of actual water. There\'s a small entrance fee. The pool at the base is where everyone gathers. The water is cold and shocking and real.\n\nCome early to avoid crowds, come alone to hear the forest properly. The whole thing takes four hours if you move slowly.", im:"Jungle canopy, thin waterfall dropping into clear pool, rocks and river, people swimming in water.", t:"Go 7-9am. Bring proper shoes (rocks are slippery), water, don\'t wear anything you care about. The walk back up is harder than the walk down.",
c:["day_trips","nature","swimming"], r:"g",
nn:"Air terjun Templer Park — sungai masih bekerja", ns:"Tiga puluh menit dan jalan raya jauhnya. Sungai yang belum diaspal. Air yang benar-benar bisa Anda dapatkan.", nst:"Templer Park adalah alasan untuk keluar dari kota. Jejak hutan yang tepat (Waterfall Trail adalah empat km kembali, mudah) mengarah ke air terjun yang tidak cukup terkenal untuk dihancurkan. Sungai cukup bersih untuk berenang, kolam cukup dalam untuk terasa seperti berenang bukan menyelam.", nt:"Pergi 7-9 pagi. Bawa sepatu yang tepat (batu licin), air, jangan kenakan apa pun yang Anda pedulikan. Jalan kembali naik lebih sulit dari jalan turun."},

{id:635, n:"Islamic Arts Museum — the real answer", a:"Lake Gardens", v:["free_culture","nerd","history_big"], d:30,
s:"Malaysia has an actual world-class museum that costs less than a fancy coffee. The Islamic Art collection is complete.", st:"The Islamic Arts Museum is absurdly good and nobody goes because it\'s not Instagram-shaped. The collection spans thirteen centuries and three continents of Islamic culture. There\'s textiles, metalwork, ceramics, manuscripts, architecture fragments that just sit there quietly being brilliant.\n\nThe building itself is designed properly—galleries flow into each other, light enters from correct angles, the craftsmanship matters. No rush. No crowds. You can spend two hours or six. The audio guide is actually informative.\n\nThere\'s a cafe and a gift shop that sells things worth buying.", im:"Arched Islamic architecture, detailed textile fragments, brass vessels and ceramic displays, natural light in galleries.", t:"Entry is about seven ringgit. Go on a weekday morning. The textile gallery is enormous. The courtyard has excellent light for sitting.",
c:["free_culture","history_big","nerd"], r:"g",
nn:"Museum Seni Islam — jawaban nyata", ns:"Malaysia memiliki museum kelas dunia yang sebenarnya yang harganya kurang dari kopi mewah. Koleksi Seni Islam itu lengkap.", nst:"Museum Seni Islam secara absurd bagus dan tidak ada yang pergi karena itu bukan bentuk Instagram. Koleksi mencakup tiga belas abad dan tiga benua budaya Islam. Ada tekstil, logamkerja, keramik, naskah, fragmen arsitektur yang hanya duduk di sana dengan tenang menjadi cemerlang.", nt:"Masuk sekitar tujuh ringgit. Pergi pagi hari kerja. Galeri tekstil sangat besar. Halaman memiliki cahaya yang sangat bagus untuk duduk."},

{id:636, n:"FRIM Canopy Walk — among the trees at eye level", a:"Day Trip", v:["nature","high_spots","parks"], d:30,
s:"A metal bridge through the treetops. Forty meters up. The city below looks smaller and you look at leaves.", st:"The Forest Research Institute (FRIM) is thirty minutes north. The Canopy Walk is their signature thing—a bridge that takes you through the layer where monkeys live. You\'re at eye level with the canopy itself. The air is different up there.\n\nThe full trail loop is four km and mostly flat. The canopy walk is just the first section but it\'s the good part. Other trails descend through proper forest. The whole place is legitimately a nature reserve, not a park.\n\nIt\'s not scary but it is exposed. You\'re definitely walking above ground. The views through the trees of the distant city are strange and excellent.", im:"Metal grid walkway among tall tree trunks, canopy leaves overhead, distant city visible through gaps.", t:"Entry is about fifteen ringgit. Go early—the canopy walk only works on clear days. Bring water. Wear proper shoes (it gets slippery).",
c:["high_spots","nature","parks"], r:"g",
nn:"Jalan Kanopi FRIM — di antara pohon di tingkat mata", ns:"Jembatan logam melalui puncak pohon. Empat puluh meter ke atas. Kota di bawah terlihat lebih kecil dan Anda melihat daun.", nst:"Forest Research Institute (FRIM) adalah tiga puluh menit ke utara. Canopy Walk adalah hal tanda tangan mereka—jembatan yang membawa Anda melalui lapisan tempat monyet tinggal. Anda berada di tingkat mata dengan kanopi itu sendiri. Udara berbeda di sana.", nt:"Masuk sekitar lima belas ringgit. Pergi awal—jalan kanopi hanya bekerja pada hari yang cerah. Bawa air. Kenakan sepatu yang tepat (itu licin)."},

{id:637, n:"Istana Negara — the one day the royals let you look", a:"Jalan Duta", v:["history_big","nerd","free_culture"], d:30,
s:"The king\'s house. Once a year they open the doors. You can walk the grounds, see the state rooms, understand the scale of a nation on one family.", st:"Istana Negara is the royal palace and it\'s genuinely impressive—not as a display but as an actual functioning official residence. Once yearly (check dates—usually around National Day) they open it to the public for a few hours. You walk through the state rooms where actual government happens.\n\nThe architecture mixes Malay and British sensibilities. The grounds are immaculate. You see the throne, you see the scale, you understand Malaysia\'s relationship with monarchy in a different way.\n\nIt\'s not tours with audio guides—it\'s just you, crowds, and spectacular rooms. Respect the quiet. No photography in the state rooms.", im:"Golden domed architecture, manicured palace grounds, formal gardens, crowds of Malaysian visitors.", t:"Dates change yearly—check online beforehand. Go early to avoid peak crowds. Dress respectfully (no shorts, covered shoulders). It\'s free.",
c:["free_culture","history_big","nerd"], r:"g",
nn:"Istana Negara — hari ketika raja membiarkan Anda melihat", ns:"Rumah raja. Sekali setahun mereka membuka pintu. Anda bisa berjalan di taman, melihat ruang negara, memahami skala bangsa di satu keluarga.", nst:"Istana Negara adalah istana kerajaan dan itu benar-benar mengesankan—bukan sebagai tampilan tetapi sebagai kediaman resmi yang benar-benar berfungsi. Sekali setiap tahun (cek tanggal—biasanya sekitar Hari Nasional) mereka membukanya ke publik selama beberapa jam. Anda berjalan melalui ruang negara di mana pemerintah aktual terjadi.", nt:"Tanggal berubah setiap tahun—periksa secara online sebelumnya. Pergi awal untuk menghindari kerumunan puncak. Berpakaian dengan menghormati (tanpa celana pendek, bahu tertutup). Itu gratis."}
];
];

  {id:1,title:"Modern Malaysia: Towers of Aspiration",desc:"Explore Malaysia's commitment to becoming a global player. Ascend Petronas Twin Towers for views of the city's ambition. Visit Menara KL for alternative perspectives. Explore Pavilion KL to understand contemporary consumption culture. Experience how Malaysia positions itself internationally.",places:[1, 11, 19],time:"5 hours"},
  {id:2,title:"Sacred Geometry: Religion in Public Space",desc:"Understand how different faiths shape Kuala Lumpur. Visit Jamek Mosque's Mughal architecture and Islamic geometry. Explore Thean Hou Temple's elaborate Chinese decorations. Visit Sri Mahamariamman Temple's intricate gopuram. See how three religions coexist in Malaysia's multicultural framework.",places:[3, 4, 17],time:"4 hours"},

  {id:4,title:"Colonial Heritage: British Infrastructure and Design",desc:"Trace British influence on Malaysia. Visit Railway Station's Moorish-colonial architecture. Explore Central Market's cast-iron engineering. Visit Istana Negara to see contemporary royalty's setting. Understand how colonialism shaped Malaysian modernity.",places:[7, 18, 22],time:"4 hours"},

  {id:7,title:"Hawker Heaven: Street Food Cultures",desc:"Taste authentic Malaysia through food. Start early at residential Kok Liang Market for neighborhood hawker culture. Explore Chow Kit Market's overwhelming scale. Visit smaller stalls throughout neighborhoods. Understand how Malaysian identity expresses through food.",places:[12, 20],time:"4 hours"},

<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
const TBGS={"places":"https://mariavheland.github.io/godostuff/textures/tex05.png","collections":"https://mariavheland.github.io/godostuff/textures/tex16.png","missions":"https://mariavheland.github.io/godostuff/textures/tex16.png","plan":"https://mariavheland.github.io/godostuff/textures/tex16.png","phrases":"https://mariavheland.github.io/godostuff/textures/tex05.png","default":"https://mariavheland.github.io/godostuff/textures/tex05.png"};if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length),
  {id:607,n:"Petronas Twin Towers Skyline",a:"KLCC",v:['famous', 'high_spots'],d:45,s:"Iconic 452-meter towers with sky bridge and observation deck.",st:"Take elevator 10am. Up to 41st floor sky bridge. City spread below. Humidity makes distance hazy.\n\nWalk bridge. Feel height. Sit at viewing gallery. Watch sunset if staying.",im:"Tower observation, city spread below, sky bridge walkway.",t:"Walk to Petronas Towers KLCC. 10am. Entry 72 MYR sky bridge. 1-1.5 hours.",c:["greatest_hits", 'high_spots', 'modern'],r:"g",nn:"Petronas Twin Towers",ns:"Towers iconic skyline",nst:"10am elevator start.",nt:"KLCC station nearby."},
  {id:608,n:"Place 2",a:"Area",v:['famous'],d:30,s:"d",st:"s\n\nd",im:"i",t:"t",c:["greatest_hits"],r:"g",nn:"N",ns:"s",nst:"s",nt:"t"},
  {id:609,n:"Place 3",a:"Area",v:['famous'],d:30,s:"d",st:"s\n\nd",im:"i",t:"t",c:["greatest_hits"],r:"g",nn:"N",ns:"s",nst:"s",nt:"t"},
  {id:610,n:"Place 4",a:"Area",v:['famous'],d:30,s:"d",st:"s\n\nd",im:"i",t:"t",c:["greatest_hits"],r:"g",nn:"N",ns:"s",nst:"s",nt:"t"},
  {id:611,n:"Place 5",a:"Area",v:['famous'],d:30,s:"d",st:"s\n\nd",im:"i",t:"t",c:["greatest_hits"],r:"g",nn:"N",ns:"s",nst:"s",nt:"t"},
  {id:612,n:"Place 6",a:"Area",v:['famous'],d:30,s:"d",st:"s\n\nd",im:"i",t:"t",c:["greatest_hits"],r:"g",nn:"N",ns:"s",nst:"s",nt:"t"},
  {id:613,n:"Place 7",a:"Area",v:['famous'],d:30,s:"d",st:"s\n\nd",im:"i",t:"t",c:["greatest_hits"],r:"g",nn:"N",ns:"s",nst:"s",nt:"t"},
  {id:614,n:"Place 8",a:"Area",v:['famous'],d:30,s:"d",st:"s\n\nd",im:"i",t:"t",c:["greatest_hits"],r:"g",nn:"N",ns:"s",nst:"s",nt:"t"},
  {id:615,n:"Place 9",a:"Area",v:['famous'],d:30,s:"d",st:"s\n\nd",im:"i",t:"t",c:["greatest_hits"],r:"g",nn:"N",ns:"s",nst:"s",nt:"t"},
  {id:616,n:"Place 10",a:"Area",v:['famous'],d:30,s:"d",st:"s\n\nd",im:"i",t:"t",c:["greatest_hits"],r:"g",nn:"N",ns:"s",nst:"s",nt:"t"},
  {id:617,n:"Place 11",a:"Area",v:['famous'],d:30,s:"d",st:"s\n\nd",im:"i",t:"t",c:["greatest_hits"],r:"g",nn:"N",ns:"s",nst:"s",nt:"t"}];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:"url('https://mariavheland.github.io/godostuff/textures/tex09.png') center/cover no-repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Kuala Lumpur Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Kuala Lumpur Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
