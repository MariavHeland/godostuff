  {id:1,n:"Parque del Capricho",a:"Barajas",v:["beautiful", "hidden", "nature"],d:1,s:"A palace garden frozen in the 1800s—the city\'s secret world exists 20 minutes from the center",st:"North Madrid hides an 14-hectare fantasy. A Duke built his dream. Now it\'s public. Waterfalls. Grottoes. A hermitage nobody goes to. You walk through someone\'s private paradise.",im:"It\'s 1890. A Duke walks alone through gardens he\'s commanded into existence. Servants have shaped water and stone to match his moods. He\'s paid to be alone with beauty.",t:"North Madrid hides an 14-hectare fantasy. A Duke built his dream. Now it\'s public. Waterfalls. Grottoes. A hermitage nobody goes to. You walk through someone\'s private paradise.\",im:\"It\'s 1890. A Duke walks alone through gardens he\'s commanded into existence. Servants have shaped water and stone to match his moods. He\'s paid to be alone with beauty.\",t:\"Parque del Capricho, 112 Calle del Ojo de Agua. Metro: Canillejas (line 5). Entry €5. Arrive early (opens 10am). Few tourists know it.",c:["parks", "beautiful", "history_big"],r:"g",nn:"Parque del Capricho",ns:"Parque del Capricho es tesoro español.",nst:"Parque del Capricho respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:2,n:"Lavapiés Street Art Quarter",a:"Lavapiés",v:["street_art", "weird", "local"],d:2,s:"Walls exploding with color—real artists live here, paint here, sell here",st:"Lavapiés was poor. Immigrants came. Artists moved in for cheap rent. Now murals cover buildings six stories high. It\'s a neighborhood that paints its own story daily.",im:"It\'s 2am. A young woman on scaffolding finishes a face. She won\'t sign it. She\'ll do it again next week on a different wall. This is her city now.",t:"Lavapiés was poor. Immigrants came. Artists moved in for cheap rent. Now murals cover buildings six stories high. It\'s a neighborhood that paints its own story daily.\",im:\"It\'s 2am. A young woman on scaffolding finishes a face. She won\'t sign it. She\'ll do it again next week on a different wall. This is her city now.\",t:\"Calle Sombrerete and surroundings, Lavapiés. Walk slowly early morning. New work appears constantly. Photography welcome. Cafés cheap. No tourist vibe.",c:["street_art", "local_only"],r:"g",nn:"Lavapiés Street Art Quarter",ns:"Lavapiés Street Art Quarter es tesoro español.",nst:"Lavapiés Street Art Quarter respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:3,n:"Templo de Debod",a:"Moncloa",v:["history", "beautiful", "quiet"],d:3,s:"A 2,200-year-old Egyptian temple standing in Madrid—transported stone-by-stone in 1968",st:"Egypt gave Spain a temple as a gift. Egyptologists disassembled it. Ships carried it. Madrid rebuilt it perfectly. Now sunset hits ancient stone and the Andes meet the Nile.",im:"It\'s 1968. Workers align stones dated to 200 BC. The temple rises in Madrid. Nobody expected it to work. It does.",t:"Egypt gave Spain a temple as a gift. Egyptologists disassembled it. Ships carried it. Madrid rebuilt it perfectly. Now sunset hits ancient stone and the Andes meet the Nile.\",im:\"It\'s 1968. Workers align stones dated to 200 BC. The temple rises in Madrid. Nobody expected it to work. It does.\",t:\"Templo de Debod, Calle Ferraz 1, Moncloa. Free entry. Best at sunset (hours 10am-8pm in summer). Arrive 5:30pm to watch light change.",c:["history_big", "beautiful"],r:"g",nn:"Templo de Debod",ns:"Templo de Debod es tesoro español.",nst:"Templo de Debod respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:4,n:"Malasaña Vintage and Rebellion",a:"Malasaña",v:["local", "weird", "street_art"],d:4,s:"The neighborhood that invented Madrid\'s counterculture—still living it",st:"In the 1980s, this was the punk heart. Movida Madrileña. Music, art, freedom. Now it\'s gentrifying but the bones are still rebellious. Walk and see old fight marks.",im:"It\'s 1985. Kids in leather jackets crowd Plaza del Dos de Mayo at midnight. Music spills from bars. No rules. Pure rebellion.",t:"In the 1980s, this was the punk heart. Movida Madrileña. Music, art, freedom. Now it\'s gentrifying but the bones are still rebellious. Walk and see old fight marks.\",im:\"It\'s 1985. Kids in leather jackets crowd Plaza del Dos de Mayo at midnight. Music spills from bars. No rules. Pure rebellion.\",t:\"Plaza del Dos de Mayo, Malasaña. Walk San Andrés and Espíritu Santo streets. Vintage shops. Small bars. Daytime sleepy. Night alive.",c:["local_only", "weird", "street_art"],r:"g",nn:"Malasaña Vintage and Rebellion",ns:"Malasaña Vintage and Rebellion es tesoro español.",nst:"Malasaña Vintage and Rebellion respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:5,n:"Real Jardín Botánico Free Hours",a:"Retiro",v:["beautiful", "nature", "free"],d:5,s:"Royal botanical gardens—pay one hour and stay all day if you time it right",st:"Opened at 4pm on weekdays. Full price. Stay until closing. It\'s nearly empty in evening light. Spanish and African plants growing in neat beds. You\'re basically alone.",im:"It\'s 5:30pm. A woman walks between rows of plants with a book. No crowds. Sunlight pools on paths. She has the garden to herself.",t:"Opened at 4pm on weekdays. Full price. Stay until closing. It\'s nearly empty in evening light. Spanish and African plants growing in neat beds. You\'re basically alone.\",im:\"It\'s 5:30pm. A woman walks between rows of plants with a book. No crowds. Sunlight pools on paths. She has the garden to herself.\",t:\"Real Jardín Botánico, Plaza de Murillo 2, Retiro. Entry €5-6. Open til 8-9pm depending on season. Arrive late afternoon. Worth the patience.",c:["beautiful", "nature", "parks"],r:"g",nn:"Real Jardín Botánico Free Hours",ns:"Real Jardín Botánico Free Hours es tesoro español.",nst:"Real Jardín Botánico Free Hours respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:6,n:"La Tabacalera CSA Collective Space",a:"Lavapiés",v:["weird", "local", "history"],d:6,s:"An old tobacco factory turned into an anarchist collective—artists and activists working without permission from anyone",st:"Madrid squatters occupied an abandoned tobacco factory. Made it legal through sheer staying. Now it\'s galleries, studios, theater, politics. No boss. Just work.",im:"It\'s 1999. 200 people move into empty factory. \'We\'ll leave when we leave.\' They don\'t leave. Twenty-five years later it\'s still working.",t:"Madrid squatters occupied an abandoned tobacco factory. Made it legal through sheer staying. Now it\'s galleries, studios, theater, politics. No boss. Just work.\",im:\"It\'s 1999. 200 people move into empty factory. \'We\'ll leave when we leave.\' They don\'t leave. Twenty-five years later it\'s still working.\",t:\"La Tabacalera, Embajadores 51, Lavapiés. Free entry. Events and shows mostly free or €2-5. Check website for schedule. Thursday-Sunday usually active.",c:["local_only", "weird", "history_big"],r:"g",nn:"La Tabacalera CSA Collective Space",ns:"La Tabacalera CSA Collective Space es tesoro español.",nst:"La Tabacalera CSA Collective Space respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:7,n:"Retiro Park at Dawn",a:"Retiro",v:["beautiful", "quiet", "free"],d:7,s:"Madrid\'s lung before tourists arrive—water, trees, locals moving slow",st:"Gates open at 6am. For one hour it\'s peaceful. Joggers and old men on benches. Birds loud. Water reflects sky without ripples. Then buses bring crowds.",im:"It\'s 6:30am. An old woman feeds pigeons. A jogger passes. The park is hers. In one hour it will belong to everyone. She comes tomorrow.",t:"Gates open at 6am. For one hour it\'s peaceful. Joggers and old men on benches. Birds loud. Water reflects sky without ripples. Then buses bring crowds.\",im:\"It\'s 6:30am. An old woman feeds pigeons. A jogger passes. The park is hers. In one hour it will belong to everyone. She comes tomorrow.\",t:\"Retiro Park, various entrances (Puerta de Alcalá easiest). Free. Open dawn to dusk. Arrive before 7:30am for quiet. Caffeine before you go.",c:["free_museum", "beautiful", "nature"],r:"g",nn:"Retiro Park at Dawn",ns:"Retiro Park at Dawn es tesoro español.",nst:"Retiro Park at Dawn respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:8,n:"Museo Sorolla Hidden Artist Home",a:"Chamberí",v:["history", "quiet", "beautiful"],d:8,s:"A painter\'s house from 1910—museum frozen where his brushes sit beside his garden",st:"Joaquín Sorolla painted light. His home captured it perfectly. Rooms full of paintings. Windows open to gardens he planted. It\'s a love letter to living space.",im:"It\'s 1920. A painter descends stairs from his studio. His wife calls from the garden. Tea is ready. The house is everything. He\'ll paint it a hundred times.",t:"Joaquín Sorolla painted light. His home captured it perfectly. Rooms full of paintings. Windows open to gardens he planted. It\'s a love letter to living space.\",im:\"It\'s 1920. A painter descends stairs from his studio. His wife calls from the garden. Tea is ready. The house is everything. He\'ll paint it a hundred times.\",t:\"Museo Sorolla, Paseo General Martínez Campos 37, Chamberí. Entry €3. Hours 10am-8pm. Garden open all hours. Few tourists find it.",c:["history_big", "quiet", "beautiful"],r:"g",nn:"Museo Sorolla Hidden Artist Home",ns:"Museo Sorolla Hidden Artist Home es tesoro español.",nst:"Museo Sorolla Hidden Artist Home respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:9,n:"Chueca Neighborhood Food and Pride",a:"Chueca",v:["local", "beautiful", "free"],d:9,s:"Where Madrid\'s queer culture lives and eats—small bars in tight streets",st:"Narrow streets that smell like 10 cuisines. LGBTQ culture visible on flags and in residents. Food cheap. Community real. Walk and feel accepted by strangers.",im:"It\'s evening. A bartender knows everyone\'s name. Stories flow. It\'s home. It\'s community. It\'s dinner.",t:"Narrow streets that smell like 10 cuisines. LGBTQ culture visible on flags and in residents. Food cheap. Community real. Walk and feel accepted by strangers.\",im:\"It\'s evening. A bartender knows everyone\'s name. Stories flow. It\'s home. It\'s community. It\'s dinner.\",t:\"Chueca neighborhood (Calle Gravina, Hortaleza). Walk freely. Small tapas bars everywhere (€2-6 tapas). Markets. No English needed. June Pride festival fills streets.",c:["local_only", "beautiful", "free_museum"],r:"g",nn:"Chueca Neighborhood Food and Pride",ns:"Chueca Neighborhood Food and Pride es tesoro español.",nst:"Chueca Neighborhood Food and Pride respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:10,n:"Atocha Tropical Garden",a:"Atocha",v:["beautiful", "hidden", "nature"],d:10,s:"Inside a 1800s greenhouse, plants from the Amazon and Africa grow in controlled jungle",st:"The train station has a secret. Behind ticket gates is a botanical garden. Palms 6 meters high. Humidity 80%. You step from Spain into tropics.",im:"It\'s 1890. A botanist oversees plants brought from empire. Spanish wealth in chlorophyll. Each plant cost more than a house.",t:"The train station has a secret. Behind ticket gates is a botanical garden. Palms 6 meters high. Humidity 80%. You step from Spain into tropics.\",im:\"It\'s 1890. A botanist oversees plants brought from empire. Spanish wealth in chlorophyll. Each plant cost more than a house.\",t:\"Atocha Station (behind ticket gates), Atocha. Free to enter with ticket. Or enter museum side (€8-10) for full access. Open 10am-8pm.",c:["beautiful", "nature", "hidden"],r:"g",nn:"Atocha Tropical Garden",ns:"Atocha Tropical Garden es tesoro español.",nst:"Atocha Tropical Garden respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:11,n:"Casa de Lope de Vega Literary Shrine",a:"Barrio de las Letras",v:["history", "quiet"],d:11,s:"Spain\'s greatest playwright lived here—his home is his last masterpiece",st:"Lope de Vega wrote 1,500 plays. He lived in a simple house in a simple street. The room where he wrote is preserved. It smells like old paper and dedication.",im:"It\'s 1600. Lope writes. Outside, Madrid roars. He\'s deaf to it. Words fill the page. He writes like he\'s racing death.",t:"Lope de Vega wrote 1,500 plays. He lived in a simple house in a simple street. The room where he wrote is preserved. It smells like old paper and dedication.\",im:\"It\'s 1600. Lope writes. Outside, Madrid roars. He\'s deaf to it. Words fill the page. He writes like he\'s racing death.\",t:\"Casa de Lope de Vega, Calle Cervantes 11, Barrio de las Letras. Entry €4. Hours 10am-2pm & 4-7pm (closed Mondays). Guided tour included.",c:["history_big", "quiet"],r:"g",nn:"Casa de Lope de Vega Literary Shrine",ns:"Casa de Lope de Vega Literary Shrine es tesoro español.",nst:"Casa de Lope de Vega Literary Shrine respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:12,n:"Barrio de las Letras Walking Plaques",a:"Barrio de las Letras",v:["history", "beautiful", "quiet"],d:12,s:"Sidewalk plaques mark where Cervantes, Quevedo, and Góngora walked—the quarter of writers who made Spanish literature",st:"This neighborhood is a poem written in stone. Every corner is a literary reference. Cafés where writers drank. Streets they walked. You\'re walking a library.",im:"It\'s 1620. A poet walks these streets looking for truth. He finds it in bars. He writes it down. His words survive the building that housed them.",t:"This neighborhood is a poem written in stone. Every corner is a literary reference. Cafés where writers drank. Streets they walked. You\'re walking a library.\",im:\"It\'s 1620. A poet walks these streets looking for truth. He finds it in bars. He writes it down. His words survive the building that housed them.\",t:\"Walk Calle Cervantes, Calle Lope de Vega, Paseo del Prado area. Map available at tourist office. Literary plaques explain context. Two hours to fully appreciate.",c:["history_big", "beautiful", "quiet"],r:"g",nn:"Barrio de las Letras Walking Plaques",ns:"Barrio de las Letras Walking Plaques es tesoro español.",nst:"Barrio de las Letras Walking Plaques respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:13,n:"Fountain of the Fallen Angel",a:"Retiro",v:["weird", "history", "beautiful"],d:13,s:"Madrid\'s only monument to the devil—a cherub falling from grace in a beautiful plaza",st:"Officially it\'s a sculpture. Realistically, it\'s the devil. Fallen. In pain. Beautiful. You can\'t tell if it\'s punishment or transformation.",im:"It\'s 1885. A sculptor creates a devil and calls it art. The church complains. It stays anyway. Spain allows complexity.",t:"Officially it\'s a sculpture. Realistically, it\'s the devil. Fallen. In pain. Beautiful. You can\'t tell if it\'s punishment or transformation.\",im:\"It\'s 1885. A sculptor creates a devil and calls it art. The church complains. It stays anyway. Spain allows complexity.\",t:\"Plaza del Ángel Caído, Retiro Park. Free. Small plaza. Bench seating. Photography forbidden (really, there\'s a rule). View from outside if needed.",c:["weird", "beautiful", "history_big"],r:"g",nn:"Fountain of the Fallen Angel",ns:"Fountain of the Fallen Angel es tesoro español.",nst:"Fountain of the Fallen Angel respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:14,n:"Barrio de Salamanca Hidden Courtyards",a:"Salamanca",v:["hidden", "beautiful", "quiet"],d:14,s:"Wealthy neighborhood with palaces hidden behind plain facades—knock and sometimes you can look",st:"1800s buildings look simple from street. Pass through gates and find mansion courtyards with fountains. Some are apartments. Some are still single families with servants.",im:"It\'s 1920. A wealthy family emerges through gates into a courtyard nobody outside knows exists. Their home is a world unto itself.",t:"1800s buildings look simple from street. Pass through gates and find mansion courtyards with fountains. Some are apartments. Some are still single families with servants.\",im:\"It\'s 1920. A wealthy family emerges through gates into a courtyard nobody outside knows exists. Their home is a world unto itself.\",t:\"Calle Serrano area, Salamanca. Walk and look for open gates. Some courtyards semi-visible. Daytime better. Respect privacy. Photography limited.",c:["hidden", "beautiful", "courtyards"],r:"g",nn:"Barrio de Salamanca Hidden Courtyards",ns:"Barrio de Salamanca Hidden Courtyards es tesoro español.",nst:"Barrio de Salamanca Hidden Courtyards respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},
  {id:15,n:"Museo Cerralbo Secret Mansion",a:"Moncloa",v:["hidden", "history", "quiet"],d:15,s:"A collector\'s home—1,500 objects in rooms nobody visits because tourists don\'t know it exists",st:"A nobleman filled his mansion with art, furniture, weapons, and obsessions. Died. Left it to Spain. Now it\'s exactly as he left it. Time stopped inside.",im:"It\'s 1922. A man arranges his 1,000th painting. Each piece has cost fortunes. When he dies, it will all stay exactly here.",t:"A nobleman filled his mansion with art, furniture, weapons, and obsessions. Died. Left it to Spain. Now it\'s exactly as he left it. Time stopped inside.\",im:\"It\'s 1922. A man arranges his 1,000th painting. Each piece has cost fortunes. When he dies, it will all stay exactly here.\",t:\"Museo Cerralbo, Ventura Rodríguez 17, Moncloa. Entry €3. Hours 10am-2pm Tuesday-Saturday, 10am-3pm Sunday. Ten people max per room. Silent place.",c:["history_big", "quiet"],r:"g",nn:"Museo Cerralbo Secret Mansion",ns:"Museo Cerralbo Secret Mansion es tesoro español.",nst:"Museo Cerralbo Secret Mansion respira pasión. Generaciones han caminado aquí. Ahora tú. Es experiencia que cambia.",nt:"Escucha a los locales. Llega temprano. Respira lentamente. Déjate sorprender."},

<div className="mt-4 p-4 rounded-xl" style={{background:"#f8f8ff"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#1a1a2e"}}>The Story</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nst?p.nst:p.st}</p></div>
{p.im&&<div className="mt-3 p-4 rounded-xl" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#a78bfa"}}>Imagine This</h3>
<p className="text-sm" style={{color:"#b8b0d0",lineHeight:1.7,fontStyle:"italic"}}>{p.im}</p></div>}
{p.t&&<div className="mt-3 p-4 rounded-xl" style={{background:"#f0fdf4"}}>
<h3 className="text-sm font-bold mb-2" style={{color:"#166534"}}>{lang==="native"?"Tips / "+LANG_NAME:"Tips"}</h3>
<p className="text-sm" style={{color:"#555",lineHeight:1.7}}>{lang==="native"&&p.nt?p.nt:p.t}</p>
<a href={`https://maps.google.com/?q=${encodeURIComponent(p.n+', '+CITY_EN)}`} target="_blank" rel="noopener noreferrer"
  className="mt-3 flex items-center gap-2 text-sm font-bold"
  style={{color:"#166534",textDecoration:"none",display:"inline-flex",marginTop:"10px"}}>
  🗺 Get directions
</a>
</div>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TBGS={"places":"url('../../textures/tex3.png') center/cover no-repeat","collections":"url('../../textures/tex4.png') center/cover no-repeat","missions":"url('../../textures/tex5.png') center/cover no-repeat","plan":"url('../../textures/tex6.png') center/cover no-repeat","phrases":"url('../../textures/tex7.png') center/cover no-repeat","default":"url('../../textures/tex3.png') center/cover no-repeat"};function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
{/* dark scrim over photo */}
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Madrid Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Madrid Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
