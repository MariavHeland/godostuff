<script>
const P = [
  {id:1,n:"Sham Shui Po Electronics Market",a:"Sham Shui Po",v:["weird", "local"],d:45,s:"Chaotic electronics and fabric market, the real Kowloon chaos, no tourists",st:"Browsing electronics stalls, watching vendors negotiate, discovering hidden shops",im:"Piles of electronics, cables everywhere, people haggling, neon shop signs",t:"Go early morning, bring a backpack, haggle everything",c:["local_only"],r:"g",nn:"深水埗",ns:"混乱的电子和织物市场",nst:"浏览电子摊位，观看供应商谈判",nt:"早上去，砍价所有东西"},
  {id:2,n:"Yau Ma Tei Temple Street Night Market",a:"Yau Ma Tei",v:["night", "local"],d:45,s:"Famous night market with food, clothes, antiques, temple at one end",st:"Walking the entire street, eating street food, buying souvenirs",im:"Vendor stalls glowing with lights, crowds flowing, the smell of cooking",t:"Go after 8pm, bring cash, expect large crowds",c:["night"],r:"g",nn:"油麻地庙街夜市",ns:"著名的夜市",nst:"走遍整条街，吃街头食物",nt:"晚上8点后去，带现金"},
  {id:3,n:"Lei Cheng Uk Han Tomb Free",a:"Sham Shui Po",v:["history", "free", "weird"],d:20,s:"2000-year-old Han Dynasty tomb under an apartment building, free entrance",st:"Descending into the ancient tomb, seeing the chamber and artifacts",im:"Stone walls 2000 years old, ancient pottery displayed, the weight of time",t:"Visit during opening hours, wear warm clothing underground, take photos",c:["history_big"],r:"g",nn:"李郑屋古墓",ns:"公寓楼下的2000年前的汉代墓葬",nst:"下到古墓里",nt:"在营业时间参观，带相机"},
  {id:4,n:"Sheung Wan Funeral Street and Dried Goods",a:"Sheung Wan",v:["weird", "local"],d:30,s:"Street of funeral shops and dried seafood, unique Hong Kong culture",st:"Walking past funeral paper shops and dried seafood stalls, observing",im:"Gold and red decorations, dried fish hanging, incense smoke",t:"Walk respectfully, do not photograph funeral shops, observe the trade",c:["local_only"],r:"g",nn:"上环殡仪街",ns:"殡仪店和干海产街",nst:"尊重地走过殡仪店",nt:"不要拍照殡仪店，观察交易"},
  {id:5,n:"Kennedy Town Tram Terminus Neighbourhood",a:"Kennedy Town",v:["local", "beautiful"],d:40,s:"West Hong Kong village where the tram ends, residential and charming",st:"Walking the tram line to its end, exploring the waterfront neighbourhood",im:"Old trams arriving, the smell of salt water, quieter pace than the city",t:"Take the tram to the end, walk around, eat at local cafes",c:["local_only"],r:"g",nn:"坚尼地城",ns:"电车终点的乡村",nst:"沿着电车线走到最后",nt:"乘坐电车到终点，在当地咖啡厅吃饭"},
  {id:6,n:"Apliu Street Flea Market",a:"Sham Shui Po",v:["weird", "local", "free"],d:45,s:"Chaotic flea market with vintage items, broken electronics, tools, chaos",st:"Hunting through piles for treasure, haggling with vendors",im:"Piles of junk and treasures, vendors calling out, the energy of the hunt",t:"Go early morning, bring a backpack, prepare for chaos",c:["local_only"],r:"g",nn:"鸦栏街跳蚤市场",ns:"混乱的跳蚤市场",nst:"在堆中寻找珍宝",nt:"早上去，带背包"},
  {id:7,n:"Nan Lian Garden Free",a:"Diamond Hill",v:["beautiful", "free"],d:45,s:"Free Tang Dynasty style garden, peaceful mountain sanctuary, no crowds",st:"Walking paths through the garden, sitting by the water, meditating",im:"Pavilions reflecting in still water, mountain backdrop, complete peace",t:"Arrive early, sit for an hour, walk the entire garden",c:["beautiful"],r:"g",nn:"南莲园池",ns:"免费的唐朝风格花园",nst:"走过花园的小径，坐在水边",nt:"早到，花时间走遍花园"},
  {id:8,n:"Lion Rock Hike Free Views",a:"New Territories",v:["nature", "free"],d:90,s:"Mountain hike to the iconic peak, free access, views of all Hong Kong",st:"Climbing to the summit, watching the city spread below on all sides",im:"The city from high up, mountains in distance, the island and harbour",t:"Start early, bring water, wear hiking shoes",c:["high_spots"],r:"g",nn:"狮子山",ns:"标志性山峰的登山",nst:"爬到顶峰",nt:"早到，带足水，穿登山鞋"},
  {id:9,n:"Cheung Chau Island No Cars",a:"Cheung Chau",v:["hidden", "beautiful"],d:120,s:"Car-free island with beaches, local culture, fishing village character",st:"Taking the ferry, cycling or walking the island, swimming, eating local food",im:"Boats in the harbor, local shops, children playing in streets, fishermen working",t:"Take a daytrip, bring swimwear, try the fresh seafood restaurants",c:["local_only"],r:"y",nn:"长洲岛",ns:"无汽车的岛屿",nst:"乘坐渡船，骑自行车或走岛上",nt:"带泳衣，尝试新鲜海鲜"},
  {id:10,n:"Lamma Island Walking Trail",a:"Lamma Island",v:["nature", "hidden"],d:120,s:"Island with hiking trails connecting villages, seafood and nature",st:"Walking from one village to another, swimming at beach, eating seafood",im:"Forest trails opening to sea views, fresh seafood drying, boats in harbor",t:"Take the ferry, walk the full trail, eat at waterfront restaurants",c:["nature"],r:"y",nn:"南丫岛",ns:"有登山步道连接村庄的岛屿",nst:"从一个村庄走到另一个村庄",nt:"乘坐渡船，走整条步道"},
  {id:11,n:"Sai Kung Waterfront and Country Park",a:"Sai Kung",v:["nature", "local"],d:120,s:"Seaside town with sampan boats, country park trails, local seafood restaurants",st:"Renting a sampan with locals, exploring hidden beaches, eating fresh fish",im:"Fishing boats with colorful sails, hidden coves, mountains dropping to sea",t:"Take a minibus, rent boats with others, eat at the famous restaurants",c:["nature"],r:"y",nn:"西贡",ns:"有三文鱼和国家公园的海滨城镇",nst:"与当地人租赁三文鱼",nt:"坐小巴，与其他人租赁船只"},
  {id:12,n:"Wong Tai Sin Temple",a:"Wong Tai Sin",v:["history", "beautiful"],d:30,s:"Busy Taoist temple with red and gold decorations, spiritual atmosphere",st:"Observing worshippers, consulting fortune sticks, exploring the temple",im:"Red and gold everywhere, incense smoke, devoted faces, spiritual energy",t:"Visit mornings for fewer crowds, respect the rituals, observe quietly",c:["history_big"],r:"g",nn:"黄大仙庙",ns:"繁忙的道教寺庙",nst:"观察礼拜者，咨询抽签",nt:"早上访问，尊重仪式，静静观察"},
  {id:13,n:"Chi Lin Nunnery Tang Dynasty Wooden",a:"Chi Lin",v:["history", "beautiful"],d:45,s:"Tang Dynasty wooden buildings, nunnery still active, free entrance",st:"Walking the wooden structures, observing nuns at prayer, sitting in gardens",im:"Dark wood carved intricately, gardens with bonsai, the smell of incense",t:"Visit mid-afternoon, dress respectfully, sit in silence",c:["history_big"],r:"g",nn:"志莲净苑",ns:"唐朝风格的木制建筑",nst:"走过木制建筑，观察修女祈祷",nt:"下午中旬访问，尊重着装"},
  {id:14,n:"Ping Shan Heritage Trail New Territories",a:"Ping Shan",v:["history", "hidden"],d:90,s:"700-year-old clan village with ancestral halls, temples, heritage buildings",st:"Following the heritage trail, learning about a clan that spans 700 year history",im:"Ancient stone buildings, clan halls with ancestor tablets, quiet village paths",t:"Get the heritage trail map, visit all halls, allow 2-3 hours",c:["history_big"],r:"g",nn:"屏山文物径",ns:"700年的宗族村庄",nst:"跟随遗产步道",nt:"获得遗产步道地图，花2-3小时"},
  {id:15,n:"Sam Tung Uk Museum Free Hakka Village",a:"Tsuen Wan",v:["history", "free"],d:25,s:"Free museum in preserved Hakka village house, understanding rural life",st:"Exploring the house, learning about Hakka culture and village life",im:"Traditional layout, old furniture and tools, the feeling of centuries",t:"Visit in the afternoon, read the displays carefully, sit in the courtyard",c:["history_big"],r:"g",nn:"三栋屋博物馆",ns:"保存的客家村屋博物馆",nst:"探索房屋，学习客家文化",nt:"下午访问，仔细阅读展品"},
  {id:16,n:"Mai Po Nature Reserve Wetlands",a:"Mai Po",v:["nature", "free"],d:45,s:"Wetland reserve with migratory birds, free birdwatching, binoculars reveal life",st:"Watching for rare birds, identifying species, sitting in blinds",im:"Birds everywhere, water rippling, the quiet of the reserve",t:"Bring binoculars, dress in neutral colors, visit at dawn",c:["nature"],r:"g",nn:"米埔自然保护区",ns:"有候鸟的湿地保护区",nst:"观看罕见的鸟类",nt:"带双筒望远镜，黎明访问"},
  {id:17,n:"Star Ferry Sunrise Crossing",a:"Central",v:["beautiful", "local"],d:20,s:"Historic ferry crossing Victoria Harbour, ride it at sunrise for magic",st:"Taking the ferry at 6am, watching Hong Kong light up from the water",im:"Ferry cutting through water, skyline turning colors, morning light spreading",t:"Buy a ticket, stand outside, watch both sides of the harbour",c:["romantic_water"],r:"g",nn:"天星小轮",ns:"日出时的渡轮穿越",nst:"乘坐渡船观看香港点亮",nt:"早上6点乘坐，站在外面观看"},
  {id:18,n:"Kowloon Walled City Park",a:"Kowloon City",v:["history", "beautiful"],d:45,s:"Former walled city now a park, preserving the history and design",st:"Walking through the gardens, reading about the history of the walled city",im:"Traditional Chinese garden, paths winding through green, history plaques",t:"Visit early morning for quiet, sit in the tea pavilion",c:["beautiful"],r:"g",nn:"九龙城寨公园",ns:"前城墙现在的公园",nst:"走过花园，阅读城市历史",nt:"早上访问，在茶亭坐下"},
  {id:19,n:"Aberdeen Floating Village Remnants",a:"Aberdeen",v:["history", "weird"],d:30,s:"Remnants of the floating village, mostly gone but boats still fish here",st:"Taking a sampan ride through the harbor, seeing traditional boats",im:"Boats of all kinds, fishermen casting nets, water reflecting lights at night",t:"Hire a sampan at dusk, enjoy the evening light, eat dinner at a float",c:["romantic_water"],r:"y",nn:"香港仔浮村",ns:"浮村的残余",nst:"乘坐三文鱼穿过港口",nt:"黄昏租赁三文鱼，吃晚餐"},
  {id:20,n:"Mui Wo Lantau Cycling Flat Island",a:"Lantau",v:["local", "hidden"],d:90,s:"Flat island with cycling trails, no tourist crowds, local villages",st:"Cycling the island, visiting villages, swimming at quiet beaches",im:"Flat trails winding through villages, water views, quiet everywhere",t:"Take the ferry to Mui Wo, rent bikes, cycle the entire island",c:["nature"],r:"y",nn:"梅窝兰屿自行车",ns:"平坦岛屿的自行车步道",nst:"骑自行车穿过岛屿",nt:"租赁自行车，骑遍整个岛屿"},
  {id:21,n:"Mong Kok Street Chaos",a:"Mong Kok",v:["weird", "local"],d:30,s:"Chaotic street market with haggling, crowds, energy, local life exposed",st:"Wandering through the chaos, watching people, buying snacks",im:"Rows of stalls, people pushing, voices calling prices, neon signs",t:"Go during the day, bring a backpack, expect chaos and crowds",c:["local_only"],r:"g",nn:"旺角",ns:"混乱的街道市场",nst:"在混乱中漫步，观看人群",nt:"白天去，带背包，预期混乱"},
  {id:22,n:"Central Soho District Gentrified",a:"Central",v:["local", "night"],d:45,s:"Gentrified neighbourhood with bars and restaurants, expensive but lively",st:"Walking the narrow streets, peeking into bars, experiencing nightlife",im:"Neon signs, crowds spilling out of bars, the energy of evening",t:"Go after 9pm, bring money, explore the side alleys",c:["night"],r:"y",nn:"中环苏豪区",ns:"酒吧和餐厅的地区",nst:"走过狭窄的街道，探索",nt:"晚上9点后去，带钱"},
  {id:23,n:"Hollywood Road Antique Shops",a:"Central",v:["history", "local"],d:30,s:"Long street lined with antique shops, art galleries, used bookstores",st:"Browsing antiques, discovering hidden shops, finding treasures",im:"Shop windows full of old things, narrow storefronts, quiet street",t:"Walk slowly, go into every shop, spend hours browsing",c:["local_only"],r:"y",nn:"荷里活道古董街",ns:"满是古董店的街道",nst:"浏览古董，发现隐藏的店铺",nt:"慢慢走，进入每家店"},
  {id:24,n:"Central Mid-Levels Escalator Sky",a:"Central",v:["weird", "local"],d:25,s:"The longest escalator system climbing the hillside, people go to work on it",st:"Riding the escalators up the hill, watching the city change elevation",im:"Metal stairs climbing endlessly, the city getting smaller below",t:"Ride it all the way up, exit and walk around, experience the height",c:["high_spots"],r:"g",nn:"中环半山自动扶梯",ns:"世界上最长的自动扶梯系统",nst:"乘坐自动扶梯上山",nt:"一直往上乘坐，步行周围"},
  {id:25,n:"Lan Kwai Fong Bar Street",a:"Central",v:["night"],d:30,s:"Famous bar street, crowded with expatriates and tourists, expensive drinks",st:"Walking the street, choosing a bar, experiencing the nightlife",im:"Neon signs, crowds of people, music pouring out of bars",t:"Go after 10pm, bring money, expect crowds and expense",c:["night"],r:"y",nn:"兰桂坊",ns:"著名的酒吧街",nst:"走过街道，选择一家酒吧",nt:"晚上10点后去，带钱"},
  {id:26,n:"Causeway Bay Typhoon Shelter Boats",a:"Causeway Bay",v:["local", "weird"],d:30,s:"Shelter with hundreds of junks and fishing boats, local life preserved",st:"Walking the harbor, observing boats, watching fishermen",im:"Boats packed tight, lines and nets, weathered faces, the smell of fish",t:"Walk the entire shelter, photograph carefully, respect the workers",c:["local_only"],r:"g",nn:"铜锣湾台风避难所",ns:"数百艘帆船和渔船",nst:"走过港口，观察船只",nt:"尊重地走，尊重工人"},
  {id:27,n:"Peak Tram to the Viewpoint",a:"Central",v:["high_spots", "beautiful"],d:30,s:"Historic tram to the Peak, most famous viewpoint in Hong Kong",st:"Taking the tram, watching the city rise, reaching the peak at sunset",im:"The tram climbing impossibly steep, the city appearing below, sunset spreading",t:"Go at sunset, buy tickets online, arrive early",c:["high_spots"],r:"y",nn:"山顶缆车",ns:"香港最著名的观点",nst:"乘坐缆车到山顶",nt:"日落时去，提前到达"},
  {id:28,n:"Repulse Bay Beach Colonial",a:"Repulse Bay",v:["beautiful"],d:45,s:"Famous crescent beach with colonial hotels, swimmers and walkers",st:"Swimming or wading, walking the beach, sitting in the colonial setting",im:"Blue water, sand beach, old colonial buildings, people from around the world",t:"Go in the morning, bring swimwear, eat at the beachfront cafes",c:["romantic_water"],r:"y",nn:"浅水湾",ns:"著名的新月形海滩",nst:"游泳或涉水，走沙滩",nt:"早上去，带泳衣"},
  {id:29,n:"Star House Shopping Traditional",a:"Tsim Sha Tsui",v:["weird"],d:30,s:"Old shopping complex, traditional Hong Kong style, electronic goods and chaos",st:"Browsing the stalls, watching merchants, discovering electronics and goods",im:"Narrow aisles, piles of goods, merchants calling out, organized chaos",t:"Go early morning, bring a backpack, haggle prices",c:["local_only"],r:"g",nn:"星光行",ns:"传统香港风格的旧购物中心",nst:"浏览摊位，观察商人",nt:"早上去，砍价商品"},
  {id:30,n:"Ocean Park Morning Tai Chi",a:"Wong Chuk Hang",v:["free", "local"],d:30,s:"Park where locals do tai chi at dawn before tourists arrive",st:"Joining tai chi groups, learning movements, watching sunrise",im:"People moving slowly, morning mist, the feeling of group harmony",t:"Arrive before 7am, observe and learn, sit after and meditate",c:["parks"],r:"g",nn:"海洋公园晨练",ns:"当地人黎明做太极的公园",nst:"加入太极小组，学习动作",nt:"早上7点前到达，观察和学习"},
  {id:31,n:"Hopewell Centre Observation Elevators — Free Sky Ride",a:"Wan Chai",v:["weird", "free", "beautiful"],d:20,s:"Free curved glass elevators rising 40 storeys above Wan Chai, views of the whole harbour",st:"Riding the glass pods from the 17th to 56th floor on the north face. The city below gets smaller as you rise, Victoria Harbour spreading wide. The lift goes quiet when you\'re alone. The view changes completely every 10 seconds. Nobody comes here — you\'ll have the pod to yourself at 3pm on a Tuesday.",im:"The city dropping away beneath you, glass all around, the harbour curving, islands appearing in the distance, the island getting smaller",t:"Monday–Saturday 11:30am–2:30pm and 6–10pm, Sundays/holidays 12–3pm and 6–10pm. Free. Take escalators to 3rd floor, look for lifts next to McDonald\'s, head to the mini lobby.",c:["high_spots", "free_museum"],r:"g",nn:"萬慈高樓觀景電梯",ns:"免費的弧形玻璃電梯上升40層",nst:"乘坐玻璃舱從17樓到56樓上升。城市下方變小，維多利亞港展開。電梯安靜。景色每10秒完全改變。",nt:"週一至週六11:30am–2:30pm和6–10pm，周日/假日12–3pm和6–10pm。免費。"},
  {id:32,n:"Cha Chaan Teng — East Meets West Café Culture",a:"Central",v:["local", "history"],d:25,s:"Retro diners where British empire met Cantonese kitchen, milk tea and pineapple buns still define the place",st:"Walking into wood-panelled café with plastic chairs and condensed milk cans on shelves. Breakfast is scrambled eggs on toast next to char siu rice. Milk tea arrives in a tin cup. The menu is a document of Hong Kong history — every dish is a negotiation between London and Guangzhou. Cha chaan tengs started as ice shops after WWII and became the DNA of local eating.",im:"Condensed milk tins stacked high, plastic chairs at tiny tables, the hiss of milk tea being poured from a great height, the smell of toasted bread and condensed milk",t:"Go before noon for breakfast. Every neighbourhood has one. Try egg tart, pineapple bun, and lai cha (milk tea). Sit at the counter if you can.",c:["local_only", "free_museum"],r:"g",nn:"茶餐廳",ns:"東方遇見西方的咖啡館文化",nst:"走進木製外觀的咖啡館。早餐是炒蛋敦司旁邊是叉燒飯。奶茶裝在錫杯裡。菜單是香港歷史的文件。",nt:"早上去，每個社區都有一家。試試蛋撻、菠蘿包和奶茶。"},
  {id:33,n:"Dai Pai Dong — Last of Hong Kong Street Stalls",a:"Sham Shui Po",v:["local", "weird"],d:45,s:"Only 17 remain in all Hong Kong — open-air Cantonese wok stalls with plastic chairs on the pavement",st:"Sitting on plastic chair inches from a roaring wok, watching the chef work. Smoke and steam rising. Six tables crammed into half a pavement. The stall has been here since 1956. Hong Kong\'s government stopped renewing licences in 1979 — these last ones exist because of grandfather laws. Come while they\'re still here.",im:"Flames jumping in a wok, vegetables flying, the smell of wok hei (the breath of the wok), steam rising around your head, plastic stools at tables on pavement",t:"Go to Sing Heung Yuen in Central or find one of the Sham Shui Po stalls. Early morning or lunchtime. Cash only. Expect \'we don\'t have that today.\' That\'s the point.",c:["local_only", "free_museum"],r:"g",nn:"大牌檔",ns:"香港最後的街頭攤檔",nst:"坐在塑膠椅子上，離旺火的鑊只有幾英寸。煙霧和蒸氣上升。六張桌子擠入半個人行道。",nt:"去中環的勝香園或找沙嗲埔的攤檔之一。早上或午餐時間。只收現金。"},
  {id:34,n:"Kai Tak Cruise Terminal — Haunted Airport Landings Past",a:"Kowloon City",v:["history", "weird"],d:30,s:"Where planes landed at terrifying 47-degree angles between apartment blocks. Now a cruise terminal but the old runways are still visible below",st:"Standing where the famous Checkerboard Turn happened. Pilots would see the orange-and-white painted marker, veer hard right, drop low over residential buildings, and land. 73 years of the world\'s most technically demanding approach. Closed in 1998. The place is now ferries and hotels but the history is written into the water and air.",im:"The curve of the harbour, the wide open water where danger was, the memory of roaring engines at rooftop height, the scale of the old runway visible below",t:"Kai Tak Cruise Terminal is open to visitors. Walk the waterfront to see the old runway geography. Nearby: Sung Wong Toi ancient site.",c:["history_big"],r:"y",nn:"啟德機場",ns:"飛機以恐怖的47度角著陸的地方",nst:"站在著名的棋盤轉彎發生的地方。飛行員看到橙白色的標記，急速向右轉，低空飛過住宅建築。",nt:"啟德郵輪碼頭對遊客開放。沿著海濱漫步看看舊跑道地理。"},
  {id:35,n:"The Whampoa — Ship-Shaped Shopping Palace",a:"Hung Hom",v:["weird", "architecture"],d:35,s:"A 360-foot shopping mall disguised as a massive cruise ship, built on the ruins of an old shipyard",st:"Walking into a mall that was designed to look like an ocean liner. Entire floors themed differently — Fashion World, Treasure World, Gourmet Place. The whole thing is meant to be a ship. It\'s absurd and it works. Built in 1985 on what used to be Asia\'s largest shipyard — the Hong Kong and Whampoa Docks employed thousands. Now it\'s 1.7 million square feet of themed retail on ship-shaped levels.",im:"Walls curved like a ship\'s hull, the theatre inside the mall like a ship\'s bridge, escalators rising through levels marked like decks, the strange ship-interior lighting",t:"Take MTR to Hung Hom. It\'s impossible to miss. Free to walk around. Gourmet Place on the top floor has views.",c:["architecture"],r:"y",nn:"潢貨中心",ns:"一個360英尺的購物中心偽裝成大遊輪",nst:"走進一個被設計成看起來像遠洋輪船的購物中心。整個樓層主題不同。",nt:"乘坐地鐵到紅磡。免費參觀。最上層的美食廣場有景色。"},
  {id:36,n:"Stanley Beach Sunset — Colonial Curve and Evening Light",a:"Stanley",v:["beautiful", "romantic_water"],d:60,s:"Crescent beach with colonial villas behind it, sunset turning the bay gold, locals and dogs and families",st:"Sitting on Stanley Beach at 5pm. The colonial buildings behind you, white and grand. The water gold then orange then red. Families swimming, couples sitting, dogs running. The beach curves perfectly and catches the light. No crowds because it\'s not the Peak — everyone else is elsewhere.",im:"Water turning gold at sunset, colonial villas white against the sky, sand still warm, the curve of the beach stretching, shadows lengthening",t:"Take bus 6 or 260 from Central, ride to the end. Go at 5pm or 5:30pm depending on season. Bring wine and a friend. Swim after if the tide is right.",c:["romantic_water", "beautiful"],r:"y",nn:"赤柱灘",ns:"殖民地新月形海灘與傍晚的光線",nst:"坐在赤柱海灘上。後面是殖民地建築。水變成金色。",nt:"坐巴士6或260從中環出發。下午5點或5:30點去。帶酒和朋友。"},
  {id:37,n:"Kai Tak Sung Wong Toi — Ancient Sacred Site Below the City",a:"Kowloon City",v:["history", "hidden"],d:30,s:"Where ancient Sung Dynasty emperors walked, now a small sacred monument overlooked by apartment blocks",st:"This rock platform dates to the Sung Dynasty. Three emperors visited. The government built a small museum around it. It\'s tucked under flyovers with apartment blocks looming. The view now is modern chaos, but standing here you\'re touching 900-year-old stone.",im:"Ancient weathered rock, the weight of centuries, apartment blocks towering close, the sound of traffic above, the smallness of the monument",t:"Walk from Kai Tak waterfront, follow signs. The site is free and open during daylight. Extremely quiet. Takes 15 minutes to see.",c:["history_big"],r:"g",nn:"宋王台",ns:"古代宋朝皇帝走過的地方",nst:"這個岩石平台可追溯到宋代。三位皇帝參觀過。政府建立了一個小博物館。",nt:"從啟德海濱步行，跟著標誌。該網站免費開放。"},
  {id:38,n:"Petromax Lane Food Alley — Early Morning Hawker Energy",a:"Mong Kok",v:["local", "weird"],d:45,s:"Narrow alley where breakfast vendors set up tables and stools before dawn, disappearing by 10am",st:"Arriving at 6:30am to find the alley completely transformed. Vendors in white hats working stalls, steam rising, the clatter of bowls. It\'s Cantonese breakfast theatre. Fish porridge, rice noodle rolls, youtiao (fried bread sticks). Everyone knows everyone. By 10am it\'s gone — completely dismantled.",im:"Steam rising from metal pots, white-hatted vendors moving fast, cramped tables full of eating people, the smell of fish and congee, chaos contained in an alley",t:"Arrive 6–7am when it\'s at peak madness. Bring cash. Don\'t linger — tables turn over in 15 minutes. Nearby: Apliu Street opens at the same time.",c:["local_only", "free_museum"],r:"g",nn:"扁擔街美食巷",ns:"早上清晨攤販設置桌子和凳子的狹窄小巷",nst:"早上6:30抵達時發現小巷完全改變。白帽供應商工作攤檔。",nt:"上午6-7點到達。帶現金。不要停留。"},
  {id:39,n:"Repulse Bay Tin Hau Temple — Hidden Inside the Beach",a:"Repulse Bay",v:["hidden", "history"],d:45,s:"Open-air temple wedged into the rock face of Repulse Bay, watching bathers from behind ancient stone",st:"Repulse Bay Beach is famous and packed. But tucked into the rock face at the far end is a small temple dedicated to Tin Hau, the goddess of the sea. Worshippers pour water over the rocks. It\'s ancient and completely overshadowed by the beach crowds. Nobody notices it.",im:"Ancient stone worn smooth by centuries of hands, incense smoke curling, the sound of beach beyond but here it\'s quiet, the rock face protecting the small space",t:"Walk to the far end of Repulse Bay Beach, look right at the rock face. Entrance is small. Bring coins if you want to make an offering. The beach is right there but you\'re in another world.",c:["history_big"],r:"g",nn:"淺水灣天后廟",ns:"隱藏在淺水灣岩石面內的開放式寺廟",nst:"淺水灣海灘很有名且擁擠。但在遠端的岩石面內有一個小寺廟。",nt:"走到淺水灣海灘的遠端，看右邊的岩石面。"},
  {id:40,n:"Lei Yue Mun Fishing Village — Last Working Boats and Fish Markets",a:"Lei Yue Mun",v:["local", "hidden"],d:25,s:"Working fishing village with active boats, fish stalls, and seafood restaurants, actually lived in and worked",st:"Lei Yue Mun is not a museum. Fishing boats still launch from here. Stalls still sell fish. Restaurants buy from the morning catch. Walk the waterfront at dawn when the boats are returning and the ice is still piled high. No tourists come here. The old stone quarry ruins are visible from the rocks.",im:"Fishing boats with ropes and nets, ice piled high on stalls, fishermen in rubber boots, the smell of the sea and fresh fish, quarry ruins in the rock face",t:"Take a minibus from Quarry Bay towards Lei Yue Mun. Get off early and walk. Go in the morning (6–8am) when boats return. Seafood restaurants open for lunch.",c:["local_only"],r:"g",nn:"鯉魚門漁村",ns:"有活躍的船隻和魚市場的工作中漁村",nst:"鯉魚門不是博物館。漁船仍在這裡發動。攤檔仍在販賣魚。",nt:"乘坐小巴從採石灣往鯉魚門。早上去（早上6-8點）。"},
  {id:41,n:"Pi Tou Shan Quarry Ruins — Stone Remnants and Swimming Holes",a:"Lei Yue Mun",v:["hidden", "weird"],d:25,s:"Abandoned stone quarry in the water, flooded chambers now filled with jade-green water, locals still swim here",st:"Walking down the rock path to find a completely flooded quarry. The stone walls are 40 feet high, carved straight. The water is calm and jade green. Local swimmers dive in. The silence is complete. It was one of Hong Kong\'s biggest quarries, supplying all the granite for the early buildings. Now it\'s just a strange water-filled chamber in the rocks.",im:"Jade-green water completely still, stone walls rising from the water, silence and echo, the water so clear you can see the bottom, shadows and light playing on the walls",t:"Walk from Lei Yue Mun waterfront towards the rocks, signs point to the quarry. Free access. Bring a towel if you want to swim (water is cold year-round). Takes 30 minutes to hike there.",c:["swimming", "weird"],r:"g",nn:"批頭山採石場遺跡",ns:"廢棄的石採場，灌水的石室現在充滿了翡翠綠的水",nst:"沿著岩石小徑走下去發現一個完全灌滿水的採石場。石牆有40英尺高。",nt:"從鯉魚門海濱步行朝向岩石。免費進入。帶毛巾如果你想游泳。"},
  {id:42,n:"Flagstaff House Museum Free — Victorian Architecture and Teaware",a:"Central",v:["history", "free"],d:25,s:"Oldest colonial building in Hong Kong, 1846, now filled with ancient tea sets and porcelain, completely free",st:"Walking up to the small stone house on a quiet slope. It was a magistrate\'s residence, then a police commissioner\'s home. Now it holds one of the world\'s finest teaware collections — ancient porcelain, Song dynasty pieces, everything meticulously preserved. The building itself is the story — thick walls, tall ceilings, the way light falls.",im:"Colonial stone walls, high ceilings, sunlight falling on ancient porcelain under glass, the weight of being the oldest building still standing in Hong Kong",t:"Free entry. Wednesday–Sunday 10am–5pm, closed Tuesdays. Climb up the slope from Central. The collection rotates so it\'s worth visiting multiple times.",c:["history_big", "free_museum"],r:"g",nn:"旗竿屋博物館",ns:"香港最古老的殖民地建築，1846年",nst:"走到安靜斜坡上的小石頭房子。曾是治安官的住所，後來是警察局長的家。",nt:"免費進入。周三至周日上午10點至下午5點。從中環爬上斜坡。"},
  {id:201,n:"Peak Tram to Victoria Peak",a:"Central",v:["famous","beautiful","high_spots"],d:60,s:"The most famous viewpoint in Asia — not for the view, but because 3.5 million people come annually and you see both the city and the human scale of tourism.",st:"Take the Peak Tram and in 8 minutes you ascend 500 meters. Exit at the top and you are surrounded by crowds looking at the same view. Behind them, the harbor spreads endlessly — Victoria Harbour with ferries and cargo ships, Kowloon beyond, the New Territories beyond that. The view justifies the crowd in one specific way: no other place gives you this complete geography.

Go at sunset when the light is best. Or go at midnight when the lights turn the city into a circuit board. The worst time is afternoon when it\'s just crowded. Early morning before 8am it\'s quieter and the light is clear.",im:"Standing at the railing at dusk looking across the harbor as the city lights begin to glow below.",t:"Central District. Tram station at St. John\'s Building. Open 7am-midnight daily. HK$47 one-way (about €6), HK$64 round trip. Queues: book online or go very early. Allow 1-2 hours.",c:["greatest_hits","beautiful","high_spots"],r:"g",nn:"Peak Tram 至 維多利亞峰",ns:"最著名的觀點 — 不是為了景色，而是因為每年有350萬人來。",nst:"搭乘Peak Tram，8分鐘內上升500米。退出頂部，您被人群所包圍。在它們後面，港口無盡地展開 — 維多利亞港，九龍，新界。

日落時分，光線最好。午夜時，燈光將城市變成電路板。",nt:"中環區。電車站在聖約翰大廈。開放7-24 (午夜)。HK$47單程，HK$64來回。早期提前訂票。"},
  {id:202,n:"Star Ferry",a:"Harbour",v:["famous","beautiful","romantic_water"],d:15,s:"The ferry that has crossed Victoria Harbour for over 100 years — five minutes that cost HK$2.50 and offer the complete Hong Kong geography.",st:"The Star Ferry runs from Central to Kowloon and back. The journey takes 8 minutes. For HK$2.50 (€0.30), you cross one of the world\'s busiest harbors on a boat that has barely changed design in a century. The upper deck is open air. The lower deck has benches. You see cargo ships, fishing boats, submarines, the skyline changing angle as you move across the water.

Take it at dusk. The light hits the water, the buildings turn gold, and you understand why this harbor has been strategically important for 200 years. The only way to truly see Hong Kong\'s geography is from the water.",im:"Standing on the upper deck as the ferry moves, the harbor alive with boats, the skylines of Central and Kowloon framing the water.",t:"Central Pier (near the Hong Kong Stock Exchange) to Kowloon (Tsim Sha Tsui). Runs every 6-10 minutes. HK$2.50 peak / HK$2 off-peak. Open 6:30am-11:30pm. Best at sunset.",c:["greatest_hits","beautiful","romantic_water"],r:"g",nn:"天星小輪",ns:"渡輪已經跨越維多利亞港超過100年 — 五分鐘要求HK$2.50。",nst:"星輪從中環往九龍來回。行程需要8分鐘。HK$2.50，您跨越世界上最繁忙的港口之一。

在黃昏時乘坐。光線打在水上，建築物變金色。",nt:"中環碼頭至尖沙咀。每6-10分鐘一班。HK$2.50峰值/ HK$2非峰值。日落最好。"},
  {id:203,n:"Temple Street Night Market",a:"Mong Kok",v:["famous","local","free entry"],d:90,s:"The night market where locals buy everything — clothes, tools, food — with no obligation to tourists watching.",st:"Temple Street Night Market is a working market where locals shop. At night it becomes a night market for tourists, but the function doesn\'t change: people are buying and selling goods. The energy is commerce, not performance. Vendors shout, negotiate, move stock. You can walk freely and watch the system work.

Food stalls operate at one end — dai pai dong (open-air food stalls) where you can eat seafood and noodles standing or on plastic stools. Clothes vendors, tool vendors, gadget vendors fill the street. The smell is of street food and commerce. The chaos is real.",im:"Standing in the thick of it at 9pm, vendors calling, neon signs, crowds moving, the smell of grilled seafood.",t:"Mong Kok. Temple Street runs north-south. Best after 7pm. Completely free to walk and watch. Food stalls require payment (HK$40-80 per dish, about €5-10). MTR to Mong Kok. Pick-pockets active — keep valuables secured.",c:["greatest_hits","local","free entry"],r:"g",nn:"廟街夜市",ns:"夜市場，當地人購買一切 — 衣服，工具，食物。",nst:"廟街夜市是當地人購物的工作市場。晚上它變成夜市。功能不會改變：人們在買賣商品。能量是商業，不是表演。

食物攤位在一端運營 — 大牌檔（露天美食攤），您可以吃海鮮和麵條。",nt:"旺角。廟街南北走向。7pm後最好。完全免費行走。食物需付款。MTR至旺角。"},
  {id:204,n:"Tian Tan Buddha (Big Buddha)",a:"Lantau Island",v:["famous","beautiful","history"],d:120,s:"The 34-meter seated bronze Buddha overlooking the valley and South China Sea — takes 20 minutes to climb the steps, the effort is part of the experience.",st:"The Big Buddha was completed in 1993 and has become the most photographed monument in Hong Kong. But the power is in the approach: take the cable car up the mountain, walk to the temple, then climb 268 steps to the Buddha\'s base. By the time you reach it, you\'ve earned the view. The Buddha sits facing the sea, serene and enormous. On clear days you see across the island to the coast.

The monastery at the base serves vegetarian meals. The walk around the Buddha costs nothing. The cable car and transportation cost money. But the view from the steps — the sea, the valley, the geometry of sitting at the Buddha\'s feet — is worth the trip.",im:"Climbing the final steps and finding yourself at the level of the Buddha\'s hands, the sea visible beyond.",t:"Lantau Island. Ferry from Central to Mui Wo (35 minutes, HK$17), then bus 2 (45 minutes) or cable car from Tung Chung MTR. Cable car: HK$140 return (about €18). Buddha open 10am-5pm. Allow 3-4 hours total.",c:["greatest_hits","beautiful","history"],r:"g",nn:"天壇大佛",ns:"34米青銅坐佛 — 爬20分鐘台階，努力是體驗的一部分。",nst:"大佛於1993年竣工，已成為香港最常拍攝的紀念碑。但力量在於方法：乘坐纜車上山，走到寺廟，然後爬268級台階到佛像的基座。

寺廟提供素食餐。佛像周圍散步不費錢。",nt:"興趣島。從中環渡輪至梅窩（35分鐘，HK$17），然後巴士2或從東涌MTR的纜車。纜車：HK$140來回。"},
  {id:205,n:"Stanley Beach and Market",a:"Stanley",v:["famous","beautiful","local"],d:120,s:"A coastal village 40 minutes from Central — beach, market, restaurants in a place where Hong Kong mainland residents go on weekends.",st:"Stanley on Hong Kong Island\'s south coast is not a tourist resort but a working neighborhood with a beach. The Stanley Market sells clothes and tourist items but locals actually shop there too. Walk the market then go to the beach or grab lunch at one of the dai pai dong stalls.

The beach is not pristine but it\'s real — locals swim here, families spread out on the sand. The restaurants overlook the beach and serve fresh seafood. This is where Hong Kong residents escape on weekends. There\'s no performance for tourists — just people living their lives by the sea.",im:"Walking from the market toward the beach, restaurants spilling onto the pavement, the sea visible beyond.",t:"Stanley. Bus 6 from Central (40 minutes, HK$9). Or ferry from Central to Stanley pier (25 minutes). Market open daily 10am-6pm. Beach free. Restaurants scattered around.",c:["greatest_hits","beautiful","local"],r:"g",nn:"赤柱海灘",ns:"南海岸的沿海村莊 — 香港本土居民週末去的地方。",nst:"赤柱是香港島南海岸的工作社區，有海灘。赤柱市場販售衣服和旅遊用品，但當地人實際上也在那裡購物。

海灘不是處女地，但很真實 — 當地人在這裡游泳，家庭在沙灘上展開。",nt:"赤柱。從中環的巴士6（40分鐘，HK$9）。海灘免費。餐廳四處散開。"},
  {id:206,n:"Harbor-side promenade at dusk",a:"Tsim Sha Tsui",v:["famous","beautiful","romantic_water"],d:45,s:"The waterfront promenade opposite Central — where 10,000 people gather each evening to watch the skyline light up.",st:"The promenade runs along the Kowloon side of Victoria Harbour from the Space Museum east to the neighborhoods beyond. At sunset, locals and tourists mix in equal numbers. Vendors sell drinks, musicians play, couples sit on the railings. The sun drops behind Central and the buildings turn gold, then pink, then the lights kick in.

The experience is communal. You\'re watching the city light up in the presence of thousands. It\'s crowded and it shouldn\'t work, but the moment — that specific moment as dusk turns to night and a city of 7 million lights itself up — is genuine.",im:"Standing on the promenade at 6:30pm as the first lights begin to glow in the buildings opposite, thousands of people around you watching the same moment.",t:"Tsim Sha Tsui waterfront. Start at Star Ferry Terminal and walk east. Open dawn-dusk. Free. Best 5:30-7pm. MTR to Tsim Sha Tsui. Food and drink vendors available.",c:["greatest_hits","beautiful","romantic_water"],r:"g",nn:"海濱長廊 日暮時分",ns:"相對於中環的沿海長廊 — 每晚10,000人聚集。",nst:"長廊沿著維多利亞港的九龍一側從太空館東走。日落時，當地人和遊客人數相等。小販出售飲料，音樂家彈奏。

體驗是社區性的。您在數千人的存在下看著城市亮起。",nt:"尖沙咀海濱。從星輪碼頭開始向東走。最好5:30-19:00。MTR至尖沙咀。"},
  {id:207,n:"Hong Kong Museum of History",a:"Tsim Sha Tsui",v:["famous","history","quiet"],d:120,s:"The complete story of Hong Kong from 4,000 years ago to 1997 — told with nuance about colonialism, war, and transformation.",st:"The Hong Kong Museum of History takes up six floors and doesn\'t rush. It begins with the natural history of the harbor, moves through the Paleolithic period, shows the development of trade routes, then Hong Kong as a trading post. The war galleries show World War II and the Japanese occupation. The colonial galleries show the British period with honesty — not glorifying it, not condemning it, just presenting it.

<div className="flex flex-col items-end gap-2">

{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>

<div className="mt-8 mb-4 text-center">

<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
