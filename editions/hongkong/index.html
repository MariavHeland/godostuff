alleys",c:["night"],r:"y",nn:"中环苏豪区",ns:"酒吧和餐厅的地区",nst:"走过狭窄的街道，探索",nt:"晚上9点后去，带钱"},{id:23,n:"Hollywood Road Antique Shops",a:"Central",v:["history","local"],d:30,s:"Long street lined with antique shops, art galleries, used bookstores",st:"Browsing antiques, discovering hidden shops, finding treasures",im:"Shop windows full of old things, narrow storefronts, quiet street",t:"Walk slowly, go into every shop, spend hours browsing",c:["local_only"],r:"y",nn:"荷里活道古董街",ns:"满是古董店的街道",nst:"浏览古董，发现隐藏的店铺",nt:"慢慢走，进入每家店"},{id:24,n:"Central Mid-Levels Escalator Sky",a:"Central",v:["weird","local"],d:25,s:"The longest escalator system climbing the hillside, people go to work on it",st:"Riding the escalators up the hill, watching the city change elevation",im:"Metal stairs climbing endlessly, the city getting smaller below",t:"Ride it all the way up, exit and walk around, experience the height",c:["high_spots"],r:"g",nn:"中环半山自动扶梯",ns:"世界上最长的自动扶梯系统",nst:"乘坐自动扶梯上山",nt:"一直往上乘坐，步行周围"},{id:25,n:"Lan Kwai Fong Bar Street",a:"Central",v:["night"],d:30,s:"Famous bar street, crowded with expatriates and tourists, expensive drinks",st:"Walking the street, choosing a bar, experiencing the nightlife",im:"Neon signs, crowds of people, music pouring out of bars",t:"Go after 10pm, bring money, expect crowds and expense",c:["night"],r:"y",nn:"兰桂坊",ns:"著名的酒吧街",nst:"走过街道，选择一家酒吧",nt:"晚上10点后去，带钱"},{id:26,n:"Causeway Bay Typhoon Shelter Boats",a:"Causeway Bay",v:["local","weird"],d:30,s:"Shelter with hundreds of junks and fishing boats, local life preserved",st:"Walking the harbor, observing boats, watching fishermen",im:"Boats packed tight, lines and nets, weathered faces, the smell of fish",t:"Walk the entire shelter, photograph carefully, respect the workers",c:["local_only"],r:"g",nn:"铜锣湾台风避难所",ns:"数百艘帆船和渔船",nst:"走过港口，观察船只",nt:"尊重地走，尊重工人"},{id:27,n:"Peak Tram to the Viewpoint",a:"Central",v:["high_spots","beautiful"],d:30,s:"Historic tram to the Peak, most famous viewpoint in Hong Kong",st:"Taking the tram, watching the city rise, reaching the peak at sunset",im:"The tram climbing impossibly steep, the city appearing below, sunset spreading",t:"Go at sunset, buy tickets online, arrive early",c:["high_spots"],r:"y",nn:"山顶缆车",ns:"香港最著名的观点",nst:"乘坐缆车到山顶",nt:"日落时去，提前到达"},{id:28,n:"Repulse Bay Beach Colonial",a:"Repulse Bay",v:["beautiful"],d:45,s:"Famous crescent beach with colonial hotels, swimmers and walkers",st:"Swimming or wading, walking the beach, sitting in the colonial setting",im:"Blue water, sand beach, old colonial buildings, people from around the world",t:"Go in the morning, bring swimwear, eat at the beachfront cafes",c:["romantic_water"],r:"y",nn:"浅水湾",ns:"著名的新月形海滩",nst:"游泳或涉水，走沙滩",nt:"早上去，带泳衣"},{id:29,n:"Star House Shopping Traditional",a:"Tsim Sha Tsui",v:["weird"],d:30,s:"Old shopping complex, traditional Hong Kong style, electronic goods and chaos",st:"Browsing the stalls, watching merchants, discovering electronics and goods",im:"Narrow aisles, piles of goods, merchants calling out, organized chaos",t:"Go early morning, bring a backpack, haggle prices",c:["local_only"],r:"g",nn:"星光行",ns:"传统香港风格的旧购物中心",nst:"浏览摊位，观察商人",nt:"早上去，砍价商品"},{id:30,n:"Ocean Park Morning Tai Chi",a:"Wong Chuk Hang",v:["free","local"],d:30,s:"Park where locals do tai chi at dawn before tourists arrive",st:"Joining tai chi groups, learning movements, watching sunrise",im:"People moving slowly, morning mist, the feeling of group harmony",t:"Arrive before 7am, observe and learn, sit after and meditate",c:["parks"],r:"g",nn:"海洋公园晨练",ns:"当地人黎明做太极的公园",nst:"加入太极小组，学习动作",nt:"早上7点前到达，观察和学习"},{id:31,n:"大館",v:["hidden"],d:30,s:"以前警署法院監獄，現文青基地，紅磚牆老牢房免費逛，影相夠味。地址：中環荷李活道10號。",st:"上個月同朋友喺大館度閒逛，發現舊法庭位有光影超靚，坐低飲杯咖啡聽歷史故事，時間過得好快。",im:"陽光灑落紅磚牆，海風夾雜舊建築味撲鼻而來。",t:"朝早8點去，避開人潮，從荷李活道步行5分鐘到。",c:[],r:"g",nn:"大館",ns:"以前警署法院監獄，現文青基地，紅磚牆老牢房免費逛，影相夠味。地址：中環荷李活道10號。",nst:"上個月同朋友喺大館度閒逛，發現舊法庭位有光影超靚，坐低飲杯咖啡聽歷史故事，時間過得好快。",nt:"朝早8點去，避開人潮，從荷李活道步行5分鐘到。"},{id:32,n:"西九文化區海景",v:["hidden"],d:30,s:"大草地望維港，免費追日落野餐，超chill。地址：九龍西九龍文化區。",st:"上次週末帶野餐墊嚟西九，睇住日落染紅海面，附近細路仔踩滑板聲，好有生活感。",im:"海風吹草地，海浪聲混城市嗡嗡。",t:"黃昏5點後到，帶毛巾坐草地，從九龍站步行10分鐘。",c:[],r:"g",nn:"西九文化區海景",ns:"大草地望維港，免費追日落野餐，超chill。地址：九龍西九龍文化區。",nst:"上次週末帶野餐墊嚟西九，睇住日落染紅海面，附近細路仔踩滑板聲，好有生活感。",nt:"黃昏5點後到，帶毛巾坐草地，從九龍站步行10分鐘。"},{id:33,n:"太平山頂環迴徑免費景",v:["hidden"],d:30,s:"山頂盧吉道-夏力道中段，免費俯瞰港九新界，靚過凌霄閣。地址：山頂道。",st:"上次天晴爬環迴徑，遠望昂船洲大橋，藍天海樓影，影咗幾十張相。",im:"清風吹過樹葉，遠處高樓閃耀陽光。",t:"搭巴士15號上山頂，避中午曬，從盧吉道行30分鐘到最佳點。",c:[],r:"g",nn:"太平山頂環迴徑免費景",ns:"山頂盧吉道-夏力道中段，免費俯瞰港九新界，靚過凌霄閣。地址：山頂道。",nst:"上次天晴爬環迴徑，遠望昂船洲大橋，藍天海樓影，影咗幾十張相。",nt:"搭巴士15號上山頂，避中午曬，從盧吉道行30分鐘到最佳點。"},{id:34,n:"香港公園市區綠洲",v:["hidden"],d:30,s:"中環高樓中綠洲，有瀑布溫室觀鳥園，免費。地址：中區紅棉路19號。",st:"朝早嚟香港公園，見阿伯阿姨練氣功，水池雀仔飛來飛去，好靜。",im:"水流聲伴鳥鳴，空氣濕潤帶花香。",t:"平日朝早7點去最靜，從金鐘站A出口步行8分鐘。",c:[],r:"g",nn:"香港公園市區綠洲",ns:"中環高樓中綠洲，有瀑布溫室觀鳥園，免費。地址：中區紅棉路19號。",nst:"朝早嚟香港公園，見阿伯阿姨練氣功，水池雀仔飛來飛去，好靜。",nt:"平日朝早7點去最靜，從金鐘站A出口步行8分鐘。"},{id:35,n:"荔枝角公園",v:["hidden"],d:30,s:"市區隱世公園，有湖鳥全歐洲後花園feel，免費睇動物。地址：九龍荔枝角荔灣道1號。",st:"上次喺荔枝角公園餵鴨，見猴子喺樹跳，感覺返鄉下。",im:"湖水反射陽光，動物叫聲四起。",t:"週末中午去，帶麵包餵鳥，從荔枝角站C出口步行5分鐘。",c:[],r:"g",nn:"荔枝角公園",ns:"市區隱世公園，有湖鳥全歐洲後花園feel，免費睇動物。地址：九龍荔枝角荔灣道1號。",nst:"上次喺荔枝角公園餵鴨，見猴子喺樹跳，感覺返鄉下。",nt:"週末中午去，帶麵包餵鳥，從荔枝角站C出口步行5分鐘。"},{id:36,n:"中山紀念公園海景",v:["hidden"],d:30,s:"西營盤海邊公園，圓草坪望維港日落，免費。地址：西營盤第三街附近。",st:"日落時分喺草坪練瑜伽，孫中山像後海景，超relax。",im:"夕陽暖光照銅像，海浪輕拍岸邊。",t:"黃昏6點到，帶瑜伽墊，從西營盤站D2出口步行10分鐘。",c:[],r:"g",nn:"中山紀念公園海景",ns:"西營盤海邊公園，圓草坪望維港日落，免費。地址：西營盤第三街附近。",nst:"日落時分喺草坪練瑜伽，孫中山像後海景，超relax。",nt:"黃昏6點到，帶瑜伽墊，從西營盤站D2出口步行10分鐘。"},{id:37,n:"尖沙咀海濱花園步道",v:["hidden"],d:30,s:"沿維港2km步道，免費睇燈光秀城市景。地址：尖沙咀海濱。",st:"夜晚行步道，8點幻彩詠香江燈光秀，船來船往好夢幻。",im:"夜風涼涼，燈光映水閃爍。",t:"晚上7點半從天星碼頭起步行，避高峰人群。",c:[],r:"g",nn:"尖沙咀海濱花園步道",ns:"沿維港2km步道，免費睇燈光秀城市景。地址：尖沙咀海濱。",nst:"夜晚行步道，8點幻彩詠香江燈光秀，船來船往好夢幻。",nt:"晚上7點半從天星碼頭起步行，避高峰人群。"},{id:38,n:"11號巴士港島海景線",v:["hidden"],d:30,s:"經典巴士路線由西環去筲箕灣，免費海景全港島。地址：西環總站開始。",st:"上次坐11號巴士，窗外電車叮叮聲，海風吹入，好有舊香港feel。",im:"巴士搖晃，海浪藍天飛速掠過。",t:"朝早8點西環總站上，選上層前座，車程45分鐘。",c:[],r:"g",nn:"11號巴士港島海景線",ns:"經典巴士路線由西環去筲箕灣，免費海景全港島。地址：西環總站開始。",nst:"上次坐11號巴士，窗外電車叮叮聲，海風吹入，好有舊香港feel。",nt:"朝早8點西環總站上，選上層前座，車程45分鐘。"},{id:39,n:"6號巴士山頂線",v:["hidden"],d:30,s:"由中環去山頂免費路線，風景巴士替代纜車。地址：中環交易所廣場。",st:"坐6號上山，途經半山樓群，落山時維港全收眼底。",im:"引擎聲中，樹影山風撲面。",t:"平日避高峰坐，$10.6車費，從中環總站上雙層巴士。",c:[],r:"g",nn:"6號巴士山頂線",ns:"由中環去山頂免費路線，風景巴士替代纜車。地址：中環交易所廣場。",nst:"坐6號上山，途經半山樓群，落山時維港全收眼底。",nt:"平日避高峰坐，$10.6車費，從中環總站上雙層巴士。"},{id:40,n:"Tai Long Wan Beach Lantau",a:"Lantau",v:["hidden","beautiful","quiet"],d:30,s:"Rugged coastal escape where the South China Sea meets Lantau's wild edge",st:"Tai Long Wan feels like Hong Kong's secret—a black sand beach hemmed by vertical cliffs, reachable only by serious hikers on the Lantau Trail. The approach takes hours but rewards with silence and sea spray. Like locals escaping the grid.",im:"Spray-lashed rocks and volcanic sand under a sky so clear it aches.",t:"Start early. Bring water. The trail is 15km round trip from Pak Kung Au; split into two days or commit to a full day push.",c:[],r:"g",nn:"大浪灣",ns:"南中國海邊嘅瀑布邊",nst:"呢個地方淨係本地行山隊知。冰凍嘅沙灘。垂直懸崖。幾粒鐘先到。",nt:"帶足水。行七個鐘。值。"},{id:41,n:"Sunset Peak Lantau Trail",a:"Lantau",v:["beautiful","quiet","free entry"],d:30,s:"Hong Kong's third-highest point glows orange at dusk—and you'll be alone up there",st:"Sunset Peak (869m) commands the Lantau skyline. The approach from Pak Kung Au is under 2km and turns vicious—switchbacks on exposed ridges, 360-degree drops to cloud. You earn the light here. Like a Lantau local.",im:"The entire Pearl River estuary goes molten gold as the sun touches Macau across the water.",t:"Start at Pak Kung Au MTR bus terminus. Arrive 1.5 hours before sunset. Bring a torch for descent.",c:[],r:"g",nn:"日落峰",ns:"香港第三高。夕陽染紅天邊",nst:"行山隊嘅秘密景點。西邊個陽光金燦燦。一個人靜靜行。",nt:"日落前九十分鐘去到。帶火電筒返。"},{id:42,n:"Family Trail Lamma Island",a:"Lamma",v:["beautiful","local","free entry"],d:30,s:"Paved 5km coastal path where villages, temples, and the South China Sea feel totally forgotten",st:"The Family Trail between Yung Shui Wan and Sok Kwu Wan is almost entirely paved—a rarity in Hong Kong. You'll cut through Feng Shui forests, spot the 19th-century Tin Hau temple, and emerge in a working fishing village untouched by tourism. Like a Lamma fisherman's morning walk.",im:"The bamboo path narrows to single-file as egrets scatter ahead and the temple appears.",t:"Ferry from Outlying Islands pier. Trail takes 2 hours easy pace. Sok Kwu Wan has dinner spots if you time it right.",c:[],r:"g",nn:"南樂島家庭步行徑",ns:"鋪石路。古廟。漁村。靜",nst:"鋪到尾都係香港少有。竹林靜靜。村婦靜靜晾衫。廟香靜靜裊裊。",nt:"東灣坪搭船。行兩個鐘。漁村食海鮮。"},{id:43,n:"Sham Shui Po Back Lanes Textile District",a:"Sham Shui Po",v:["hidden","local","weird"],d:30,s:"Where Hong Kong's textile soul lives—chaotic, cramped, utterly real",st:"Sham Shui Po is the grittier sibling to Mong Kok or Central. Yen Chow Street and Tung Chau are now temporary markets (relocated 2023) but the back lanes still pulse with fabric stalls, electronics vendors, and locals haggling in Cantonese without tourists watching. Like a Kowloon regular before sunrise.",im:"Bolts of silk stacked floor to ceiling, sweat and diesel fumes, the smell of machine oil and burnt fabric.",t:"Go on a weekday morning. Haggling is expected. Better deals than tourist markets. Bring cash.",c:[],r:"g",nn:"深水埗布料街後巷",ns:"紡織業心臟。雜亂。廉。本地人",nst:"深水埗好過旺角。無遊客睇著。議價激烈。舊香港感覺。",nt:"平日早上去。帶現金。議價要得。"},{id:44,n:"Aberdeen Fishing Village Beyond Floating Restaurant",a:"Aberdeen",v:["hidden","local","history"],d:30,s:"Where fishing junks still tie up at the quay—far from the clichéd Jumbo Palace",st:"The Floating Restaurant drowns in tour buses. But Aberdeen's working harbor—a tangle of sampans, junks, and weathered fishermen—exists 200 meters away. Sampan rides still cost HK$20 with locals. The water tastes of salt and engine oil. Like a fisherman's dawn patrol.",im:"The creak of wooden hulls, the slap of nets hitting the quay, diesel and brine and ancient rope.",t:"Walk the waterfront west of the main pier. Hire a sampan directly from fishermen—cheaper and realer than tour operators. Bring coins.",c:[],r:"g",nn:"香港仔漁村",ns:"漁民靜靜靠岸。無遊客。木船吱吱聲",nst:"金鐘灣旁邊淨係旅行隊。呢邊係真漁民。二十蚊一艘舢舨。水腥腥。",nt:"行去西邊。親自同漁民講。無中介賺。"},{id:45,n:"Temple Street Before Dusk",a:"Yau Ma Tei",v:["local","weird","history"],d:30,s:"Temple Street at 6pm—before the tour groups, when it's a real Kowloon night bazaar",st:"Temple Street transforms at dusk. Before the crowds arrive (8pm), it's street opera singers, fortune tellers, and vendors setting up by neon. The air is chaos and Cantonese and transistor radios. Like a Kowloon local's evening stroll.",im:"Neon kanji reflecting off wet concrete as vendors shouting prices clash with street singers in Peking Opera makeup.",t:"Arrive 6pm sharp. Eat at a sidewalk dai pai dong (food stall). Photography allowed but ask first. Don't go after 9pm—tourist trap.",c:[],r:"g",nn:"廟街黃昏時分",ns:"六點出現。歌聲。占卜。霓虹",nst:"八點前係真本地人。京劇妝扮。無線電聲。攤檔香亂亂。",nt:"六點一定到。靠邊食檔。問定先影相。"},{id:46,n:"Yau Ma Tei Jade Market Backstreets",a:"Yau Ma Tei",v:["hidden","local","beautiful"],d:30,s:"Hong Kong's jade heartbeat—locals negotiating blood-stone under fluorescent lights",st:"The Jade Market off MTR Yau Ma Tei is tourist central. But the backstreets immediately south—Portland Street, Reclamation Street—are where Cantonese grandmothers buy heirlooms and collectors hunt for bloodstone. Quiet. Serious. Ancient. Like a jade buyer's secret route.",im:"Jade the color of celadon and rust and moss, each piece turning light like a tiny green sun.",t:"Go 10am-12pm on weekday mornings. Bring a torch—back stalls are dark. Know nothing; ask everything.",c:[],r:"g",nn:"油麻地玉石街後巷",ns:"玉石人生地不熟。老太議價",nst:"玉石市場遊客多。條後街淨係本地買血玉。靜靜揀寶。",nt:"平日早上十點。帶火電筒。裝成要買。"},{id:47,n:"Rooftop Views from Housing Estates",a:"Multiple",v:["free entry","beautiful","hidden"],d:30,s:"Hong Kong's vertical density seen from the inside—rooftops of council estates become viewpoints",st:"Housing estates like Choi Hung (Causeway Bay) and Shau Kei Wan terraces have rooftop gardens that residents use. No tourists. Free. The views are raw—Victoria Harbour at dawn, neon bled into rain, the grid of Hong Kong's actual people. Like a local on laundry day.",im:"Wet hanging clothes flapping against a skyline of opposite towers, each one crackling with AC units and satellite dishes.",t:"Ask the security guard politely in Cantonese. Most allow residents' guests. Go at dawn or dusk. Not everywhere opens—trial and ask.",c:[],r:"g",nn:"公屋天台景觀",ns:"高樓天台。無遊客。免費靚景",nst:"外邦人唔知嘅景點。晾衫嘅地方。維港靚景。居民天台花園。",nt:"禮貌請保安。講廣東話。朝早或黃昏去。"},{id:48,n:"Stanley Market Back Lanes",a:"Stanley",v:["hidden","local","beautiful"],d:30,s:"Where the seaside market spills into narrow lanes dotted with tiny restaurants locals actually eat at",st:"Stanley Market is tourist theater. But 50 meters inland, side streets hide corner cha chaan tengs, dai pai dong carts, and families eating fresh catch. The back lanes wind between colonial shophouses painted faded blue and pink. Like a Stanley local's lunch hour.",im:"The smell of wonton broth steaming from a ground-floor kitchen, wet laundry dripping between buildings, sea breeze cutting through narrow alleys.",t:"Skip the main market—walk the lanes south of the market. Eat at the smallest shops. English menus are rare and unnecessary.",c:[],r:"g",nn:"赤柱市場後巷",ns:"靜靜食檔。海風。舊香港",nst:"赤柱市場係遊客。條後街係本地人食飯。平房舊舊地。海邊靜靜。",nt:"避開主街。行細街食檔。讓開遊客。"},{id:49,n:"Cheung Chau Island Breakfast before Market",a:"Cheung Chau",v:["local","beautiful","free entry"],d:30,s:"Island time at dawn—before the night market roars, when fishermen unload the catch",st:"Cheung Chau at 7am is pure island rhythm. Fishing boats unload, breakfasts are being prepped, the small harbor smells of salt and diesel. By 6pm it's tourist chaos. Like a Cheung Chau fisherman before the crowds.",im:"The sun turning the harbor water bronze and the cry of gulls as nets slap wet concrete.",t:"Take the early ferry from Central (30 mins). Eat breakfast at a waterfront dai pai dong. Expect loud, salty, authentic.",c:[],r:"g",nn:"長洲島早晨",ns:"日出。漁船。早餐。靜",nst:"長洲夜市係遊客。早上係漁民世界。港灣靜靜。海腥腥。",nt:"搭早船。食檔位邊坐。靜靜睇日出。"},{id:50,n:"Free Ferry Views Hong Kong Island to Kowloon",a:"Multiple",v:["free entry","beautiful","quiet"],d:30,s:"The cheapest and truest way to see Hong Kong—six dollars for an hour on the harbor at sunset",st:"The Star Ferry is iconic but packed. The public ferries (HK$6-9) between Hong Kong Island and Kowloon are commuter routes that happen to be gorgeous. Victoria Harbour, the harbor's back alleys, the neon reflected in water at dusk. Like a local going home.",im:"The salt breeze, the rumble of the diesel engine, the city skyline fracturing into neon ribbons on black water.",t:"Go at golden hour (5-6pm). Stand at the rail, not inside. The cheaper routes are slightly slower—better for views.",c:[],r:"g",nn:"渡輪靚景",ns:"六蚊海景。維港靜靜",nst:"天星渡輪遊客揼。公共渡輪係上班路線。夕陽靚。對岸霓虹。",nt:"黃昏時搭。企欄邊。靠碼頭幾靜。"},{id:51,n:"Shek Pik Reservoir Lantau Hike",a:"Lantau",v:["beautiful","quiet","hidden"],d:30,s:"Lantau's largest reservoir—a mirror of green mountains where the island's rhythm slows to water and birds",st:"Shek Pik Reservoir sits in Lantau's interior, reachable via the Lantau Trail or Shek Pik path. It's a freshwater lake ringed by forest and bird hides. Herons and egrets. No crowds. The water reflects sky and peaks and silence. Like a bird watcher's paradise.",im:"The reservoir so still it mirrors the mountains perfectly, a dragonfly skimming the surface and ripples spreading like slow motion.",t:"From Tai O village or Lantau Trail section markers. Bring binoculars if you bird watch. The walk is moderate; total 2-3 hours.",c:[],r:"g",nn:"石壁水塘",ns:"水鏡山色。無人。鳥類多",nst:"石壁係大澳人飲用。風景寧靜。白鷺靜靜企喺水邊。",nt:"帶望遠鏡。行三個鐘。靜靜聽鳥聲。"}];

const TBGS={"places":"url('../../textures/tex5.webp') center/cover fixed no-repeat","collections":"url('../../textures/tex6.webp') center/cover fixed no-repeat","missions":"url('../../textures/tex7.webp') center/cover fixed no-repeat","plan":"url('../../textures/tex8.webp') center/cover fixed no-repeat","phrases":"url('../../textures/tex9.webp') center/cover fixed no-repeat","default":"url('../../textures/tex5.webp') center/cover fixed no-repeat"};function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",backgroundColor:"#faf8f4",backgroundImage:"url('https://mariavheland.github.io/godostuff/bg/letter.jpg')",backgroundPosition:"top left",backgroundSize:"900px",backgroundRepeat:"repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Hong Kong Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Hong Kong Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
