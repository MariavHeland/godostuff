<script>
const P = [
  {id:1,n:"Christiania Freetown Entry",a:"Christianshavn",v:["weird", "free", "local"],d:1,s:"An autonomous zone that shouldn\'t exist",st:"In 1971, squatters took an abandoned military base. Forty years later it\'s still here. Part bohemia, part drug market, part genuine community. Rules are weird but real. You\'re a tourist in someone\'s home.",im:"It\'s 1971. Hippies lock a gate. The state doesn\'t notice yet. By 1985, a village is built. By now, they\'ve won a strange peace.",t:"In 1971, squatters took an abandoned military base. Forty years later it\'s still here. Part bohemia, part drug market, part genuine community. Rules are weird but real. You\'re a tourist in someone\'s home.\",im:\"It\'s 1971. Hippies lock a gate. The state doesn\'t notice yet. By 1985, a village is built. By now, they\'ve won a strange peace.\",t:\"Prinsessegade 43, Christianshavn (walk from Christianshavn metro). Free entry (unofficial). Photography restricted in some areas. Don\'t photograph dealing. It\'s dangerous. Walk respectfully.",c:["local_only", "weird"],r:"y",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:2,n:"Islands Brygge Harbor Baths",a:"Islands Brygge",v:["free", "nature", "local"],d:2,s:"Jump into the harbor and it\'s free",st:"Danes built floating pools in the harbor. Jump in summer. It\'s cold. It\'s free. You\'re swimming where ships used to dock. This is Nordic practicality. This is freedom.",im:"It\'s July. 100 people float in the harbor. It\'s 15 degrees. They smile anyway.",t:"Danes built floating pools in the harbor. Jump in summer. It\'s cold. It\'s free. You\'re swimming where ships used to dock. This is Nordic practicality. This is freedom.\",im:\"It\'s July. 100 people float in the harbor. It\'s 15 degrees. They smile anyway.\",t:\"Islands Brygge Harbour Bath, Islands Brygge (Metro to Islands Brygge). Free. Bring a towel. Bring courage. Open May-September.",c:["free", "nature"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:3,n:"Street Kitchen and Night Food Democracy",a:"Nørrebro",v:["local", "night", "free"],d:3,s:"When chefs cook for normal people on the street",st:"Food trucks and street vendors. Vietnamese, Turkish, Thai. Not expensive. Not Instagram. Just hungry Copenhageners eating standing up at midnight. This is the real meal.",im:"It\'s 11pm. A Turkish woman serves kebab. A student eats. No performance. No photos. Just sustenance and community.",t:"Food trucks and street vendors. Vietnamese, Turkish, Thai. Not expensive. Not Instagram. Just hungry Copenhageners eating standing up at midnight. This is the real meal.\",im:\"It\'s 11pm. A Turkish woman serves kebab. A student eats. No performance. No photos. Just sustenance and community.\",t:\"Nørrebro various corners (Rantzausgade area best). Food €7-12. Come at night. Cash preferred. The people are the atmosphere.",c:["local_only"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:4,n:"Nørrebro Cemetery and Peaceful Rebellion",a:"Nørrebro",v:["quiet", "history", "beautiful"],d:4,s:"Where Copenhageners tend graves like gardens",st:"A cemetery that\'s a park. Benches. Flowers. Walking paths. Danes come here not to mourn but to sit. To think. The dead are integrated into life. Graves are gardens.",im:"It\'s October. A woman puts flowers on a grave. She sits. She reads. The cemetery is not sad.",t:"A cemetery that\'s a park. Benches. Flowers. Walking paths. Danes come here not to mourn but to sit. To think. The dead are integrated into life. Graves are gardens.\",im:\"It\'s October. A woman puts flowers on a grave. She sits. She reads. The cemetery is not sad.\",t:\"Assistens Cemetery, Rantzausgade 60, Nørrebro (Nørrebro metro or 14 bus). Free. Beautiful at dusk. Walk slowly. Sit anywhere.",c:["quiet", "history_big"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:5,n:"Vesterbro Red Light Past",a:"Vesterbro",v:["history", "local"],d:5,s:"Where sex work and gentrification argue",st:"Once pure red-light district. Windows with curtains. Now half hip-bars, half sex workers. The neighborhood is in transition. Old Copenhagen resists new Copenhagen on the same street.",im:"It\'s 1990. A woman stands in a window. It\'s 2010. A barista makes espresso in the same block. Both Copenhagenhagens exist here.",t:"Once pure red-light district. Windows with curtains. Now half hip-bars, half sex workers. The neighborhood is in transition. Old Copenhagen resists new Copenhagen on the same street.\",im:\"It\'s 1990. A woman stands in a window. It\'s 2010. A barista makes espresso in the same block. Both Copenhagenhagens exist here.\",t:\"Walk Istedgade, Vesterbro (S-train to Vesterbro Station). Daytime is safe. Evening gets edgier. Respect the workers. Don\'t stare. This is someone\'s workplace.",c:["history_big", "local_only"],r:"y",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:6,n:"Freetown Christiania Cannabis Market",a:"Christianshavn",v:["weird", "history"],d:6,s:"The open market that the state tolerates",st:"Pusher Street. Green House painted building. Stalls. Dealers. It\'s been here 50 years. Police don\'t raid. It\'s an arrangement. You\'re witnessing organized crime blessed by bureaucracy.",im:"It\'s 1985. Authorities decide: coexist. It\'s now. The arrangement holds.",t:"Pusher Street. Green House painted building. Stalls. Dealers. It\'s been here 50 years. Police don\'t raid. It\'s an arrangement. You\'re witnessing organized crime blessed by bureaucracy.\",im:\"It\'s 1985. Authorities decide: coexist. It\'s now. The arrangement holds.\",t:\"Pusher Street, Christiania (Christianshavn metro, walk through gate). Free to look. Don\'t buy. Don\'t photograph. Don\'t touch anything. Understand you\'re watching power play out.",c:["weird", "history_big"],r:"y",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:7,n:"Nyhavn Postcard Reality",a:"Indre By",v:["beautiful", "history"],d:7,s:"The painting that became real and then fake",st:"Colorful houses on a canal. Built by sailors. Now banks own them. Tourists fill it. But early morning or late night, something of the original remains. Beauty and commerce fight here.",im:"It\'s 1850. Sailors come home. Their wives wait on the canal banks. It\'s 2020. Tourists take the same photo again.",t:"Colorful houses on a canal. Built by sailors. Now banks own them. Tourists fill it. But early morning or late night, something of the original remains. Beauty and commerce fight here.\",im:\"It\'s 1850. Sailors come home. Their wives wait on the canal banks. It\'s 2020. Tourists take the same photo again.\",t:\"Nyhavn, Indre By (metro or bus). Free to walk. Cafés €3-8 for coffee. Go at 7am or 10pm for the real place. Midday is just faces and cameras.",c:["history_big", "beautiful"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:8,n:"Rooftop Bars and City Below",a:"Indre By",v:["night", "beautiful"],d:8,s:"Where Copenhagen shows off from above",st:"The city is low-rise. Rooftop bars see everything. Spires. Streetlights. The Baltic beyond. You\'re flying in a city designed for walking. The perspective shift is the whole point.",im:"It\'s dusk. A city of red roofs glows. You stand above it. You understand its shape.",t:"The city is low-rise. Rooftop bars see everything. Spires. Streetlights. The Baltic beyond. You\'re flying in a city designed for walking. The perspective shift is the whole point.\",im:\"It\'s dusk. A city of red roofs glows. You stand above it. You understand its shape.\",t:\"Stay Rooftop Bar, Kronprinsessegade 54, Indre By. Cocktails €15-18. Go at golden hour. Reservation recommended. The view justifies the price.",c:["night"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:9,n:"Refshaleøen Island and Artist Squat",a:"Refshaleøen",v:["weird", "beautiful", "local"],d:9,s:"A shipping yard becoming a creative island",st:"An abandoned island. Artists took it. Studios. Street art. Music venues. The city lets it happen. It\'s illegal and blessed simultaneously. Copenhagen\'s future invents itself here.",im:"It\'s 2000. An artist squats a building. By 2020, it\'s a destination. The city holds its breath.",t:"An abandoned island. Artists took it. Studios. Street art. Music venues. The city lets it happen. It\'s illegal and blessed simultaneously. Copenhagen\'s future invents itself here.\",im:\"It\'s 2000. An artist squats a building. By 2020, it\'s a destination. The city holds its breath.\",t:\"Refshaleøen, take bike or bus (2A bus from center, 25 min). Free to explore. Artist studios often open. Weekend events. Photography gold.",c:["street_art", "weird"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:10,n:"Nordhavn and the New Copenhagen",a:"Nordhavn",v:["architecture", "beautiful"],d:10,s:"Where Copenhagen\'s future argues with itself",st:"Old shipping docks. Now luxury apartments. Nordic minimalism. Water views. Young Denmark. But it\'s sterile. Too perfect. Still: the transformation shows Copenhagen\'s confidence.",im:"It\'s 1990. Ships dock here. It\'s 2015. Yuppies sip wine. The water is the same. Everything else changed.",t:"Old shipping docks. Now luxury apartments. Nordic minimalism. Water views. Young Denmark. But it\'s sterile. Too perfect. Still: the transformation shows Copenhagen\'s confidence.\",im:\"It\'s 1990. Ships dock here. It\'s 2015. Yuppies sip wine. The water is the same. Everything else changed.\",t:\"Nordhavn, various spots (metro to Nordhavn). Free walk. The cafés are expensive (€20+ for a meal). Walk at sunset. Understand what progress looks like.",c:["architecture"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:11,n:"Malmö Bridge and Swedish Escape",a:"Amager",v:["nature", "history"],d:11,s:"A bridge that changed Scandinavia",st:"The Øresund Bridge. Connects Copenhagen to Malmö. Built 1999. Before: isolated. After: region. From the bridge you see both countries. Border as connection.",im:"It\'s 1995. Two countries plan. It\'s 1999. They\'re one region. Geography rewrites.",t:"The Øresund Bridge. Connects Copenhagen to Malmö. Built 1999. Before: isolated. After: region. From the bridge you see both countries. Border as connection.\",im:\"It\'s 1995. Two countries plan. It\'s 1999. They\'re one region. Geography rewrites.\",t:\"Öresundsbron. Walkable (30 min from Amager Side). €14 one way. Dramatic views mid-bridge. Go on a clear day. Bring wind resistance.",c:["history_big", "nature"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:12,n:"Rundetårn Spiral Tower",a:"Indre By",v:["history", "beautiful"],d:12,s:"A tower where up is a unicorn\'s walk",st:"Built 1642. A spiral ramp instead of stairs. 34 meter climb. No stairs. Disabled access in the 1600s. At the top: everything. At the bottom: the mind bent by geometry.",im:"It\'s 1642. An astronomer climbs the spiral. His horse climbs too. The ramp was built for this.",t:"Built 1642. A spiral ramp instead of stairs. 34 meter climb. No stairs. Disabled access in the 1600s. At the top: everything. At the bottom: the mind bent by geometry.\",im:\"It\'s 1642. An astronomer climbs the spiral. His horse climbs too. The ramp was built for this.\",t:\"Rundetårn, Bought Rundetarn 52A, Indre By (metro nearby). €6.50. Climb at your pace. The top view justifies the climb. Photography excellent.",c:["history_big", "architecture"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:13,n:"Tivoli Gardens and the Respectable Dark Side",a:"Indre By",v:["beautiful", "history"],d:13,s:"An amusement park older than fun parks existed",st:"1843. The oldest operating amusement park. Rides that\'ll kill you. Gardens that\'ll make you cry. Roller coasters wooden and original. It\'s beautiful and terrifying. Copenhagen invented the modern fun park.",im:"It\'s 1850. People pay to be scared. The wooden coaster twists. This is a new kind of freedom.",t:"1843. The oldest operating amusement park. Rides that\'ll kill you. Gardens that\'ll make you cry. Roller coasters wooden and original. It\'s beautiful and terrifying. Copenhagen invented the modern fun park.\",im:\"It\'s 1850. People pay to be scared. The wooden coaster twists. This is a new kind of freedom.\",t:\"Tivoli Gardens, Vesterbrogade 3, Indre By (metro to Nørreport). €20 entry (rides cost extra €2-10 each). Go at dusk. The lights matter. September is best—fewer tourists.",c:["history_big", "beautiful"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:14,n:"Kronborg Castle and Literary Ghosts",a:"Helsingør",v:["history", "beautiful"],d:14,s:"Hamlet\'s castle (spoiler: he wasn\'t real)",st:"Shakespeare set Hamlet here. Tourists come looking for Danish tragedy. But the castle\'s real story: power, strategy, trade control. Hamlet is the legend. The castle is the fact.",im:"It\'s 1585. A king calculates power. It\'s 1603. Shakespeare invents a ghost. It\'s now. We visit both.",t:"Shakespeare set Hamlet here. Tourists come looking for Danish tragedy. But the castle\'s real story: power, strategy, trade control. Hamlet is the legend. The castle is the fact.\",im:\"It\'s 1585. A king calculates power. It\'s 1603. Shakespeare invents a ghost. It\'s now. We visit both.\",t:\"Kronborg Slot, Helsingør (S-train from center, 40 min). €15. Skip the Hamlet obsession. See the castle itself. The ramparts matter.",c:["history_big"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:15,n:"National Museum Hidden Rooms",a:"Indre By",v:["history", "quiet"],d:15,s:"Where Denmark keeps its secrets in glass cases",st:"The big stories: Vikings, medieval kings. But wander to the back rooms. Exhibits almost nobody enters. Pre-Christian artifacts. Medieval life. The real stuff.",im:"It\'s 900 AD. A Viking\'s grave. It\'s now. You\'re alone with his bones and his meaning.",t:"The big stories: Vikings, medieval kings. But wander to the back rooms. Exhibits almost nobody enters. Pre-Christian artifacts. Medieval life. The real stuff.\",im:\"It\'s 900 AD. A Viking\'s grave. It\'s now. You\'re alone with his bones and his meaning.\",t:\"Ny Vestergade 10, Indre By (metro nearby). €15. Go on a Tuesday morning. The back galleries are empty. Bring a notebook. History speaks to those who listen.",c:["history_big", "quiet"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:16,n:"Grundtvig Church and Brutalist Prayer",a:"Bispebjerg",v:["architecture", "quiet", "beautiful"],d:16,s:"A brick cathedral that looks like a Piranesi drawing",st:"Finished 1940. Yellow brick. Gothic feeling. But modern. Cavernous. Columns rise like forests. It\'s overwhelming. It\'s empty most days. You whisper here.",im:"It\'s 1935. An architect dreams of heaven in brick. The church becomes a thought made solid.",t:"Finished 1940. Yellow brick. Gothic feeling. But modern. Cavernous. Columns rise like forests. It\'s overwhelming. It\'s empty most days. You whisper here.\",im:\"It\'s 1935. An architect dreams of heaven in brick. The church becomes a thought made solid.\",t:\"Grundtvig Church, Birkegårdsvej 14, Bispebjerg (Metro to Nørrebro). Free entry. Go on a quiet afternoon. Bring silence. The space teaches.",c:["architecture", "quiet"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:17,n:"Glyptotek and Gauguin\'s Fever Dream",a:"Indre By",v:["beautiful", "history"],d:17,s:"Where a Danish millionaire kept his addiction",st:"Carl Jacobsen collected obsessively. Ancient sculpture. Gauguin. Monet. Modern French art. The museum is a collector\'s dream. Rooms cascade. Beauty seems infinite. It\'s too much and exactly right.",im:"It\'s 1880. A collector adds another painting. By 1906, he\'s built a cathedral to beauty.",t:"Carl Jacobsen collected obsessively. Ancient sculpture. Gauguin. Monet. Modern French art. The museum is a collector\'s dream. Rooms cascade. Beauty seems infinite. It\'s too much and exactly right.\",im:\"It\'s 1880. A collector adds another painting. By 1906, he\'s built a cathedral to beauty.\",t:\"Ny Carlsberg Glyptotek, Dantes Plads 7, Indre By (metro nearby). €15. Go on a quiet morning. The sculpture hall is hushed and holy.",c:["history_big", "beautiful"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:18,n:"Strøget and the Pedestrian Revolution",a:"Indre By",v:["local", "free"],d:18,s:"Where cars got kicked out and shopping continued",st:"World\'s first major car-free shopping street (1962). Copenhagen proved cars weren\'t necessary. Now most cities copy. This is where urban planning changed direction.",im:"It\'s 1962. They close the street to cars. Merchants panic. Traffic gets rerouted. The street thrives anyway.",t:"World\'s first major car-free shopping street (1962). Copenhagen proved cars weren\'t necessary. Now most cities copy. This is where urban planning changed direction.\",im:\"It\'s 1962. They close the street to cars. Merchants panic. Traffic gets rerouted. The street thrives anyway.\",t:\"Strøget, Indre By (various metro stops). Free to walk. Cafés everywhere (€3-10). Best at dusk when office workers walk home. Photography gold.",c:["free", "local_only"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:19,n:"Vesterbro and Immigrant Food History",a:"Vesterbro",v:["local", "history"],d:19,s:"Where Denmark\'s future landed and fed itself",st:"Pakistani, Turkish, Middle Eastern. This neighborhood fed new arrivals and changed Danish food forever. Walk Istedgade. Every cuisine. All excellent. Cheap. Real.",im:"It\'s 1970. A Pakistani man opens a small restaurant. By 2020, Vesterbro is impossible without immigrant cooks.",t:"Pakistani, Turkish, Middle Eastern. This neighborhood fed new arrivals and changed Danish food forever. Walk Istedgade. Every cuisine. All excellent. Cheap. Real.\",im:\"It\'s 1970. A Pakistani man opens a small restaurant. By 2020, Vesterbro is impossible without immigrant cooks.\",t:\"Walk Istedgade, Vesterbro (S-train to station). Food €7-15. No reservations. Cash preferred. Go hungry. Leave overstuffed.",c:["local_only", "history_big"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:20,n:"Carlsberg Brewery and Industrial Heritage",a:"Vesterbro",v:["history", "local"],d:20,s:"Where beer became a global business and the city followed",st:"JC Jacobsen built an empire. The brewery is still there. Now a museum. Visitor center. You walk through the history of scale. A Danish family changed global beer.",im:"It\'s 1875. A brewer succeeds locally. By 1900, he exports globally. By 1945, nations war over the idea.",t:"JC Jacobsen built an empire. The brewery is still there. Now a museum. Visitor center. You walk through the history of scale. A Danish family changed global beer.\",im:\"It\'s 1875. A brewer succeeds locally. By 1900, he exports globally. By 1945, nations war over the idea.\",t:\"Carlsberg Visitors Center, Gamle Carlsberg Vej 11, Vesterbro (metro to Carlsberg). €16. Sample beer. The history matters. Understand beer as commerce and culture.",c:["history_big"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:21,n:"Harbor Promenade Harborside Walk",a:"Nørrebro",v:["beautiful", "free", "nature"],d:21,s:"Where water and walking merge",st:"Kilometers of waterfront. You walk between commerce and nature. Boats. Cyclists. Swimmers. It\'s flat. It\'s easy. It\'s everything Copenhagen is.",im:"It\'s morning. A woman jogs. A cyclist rides. A swimmer enters. The harbor accepts all comers.",t:"Kilometers of waterfront. You walk between commerce and nature. Boats. Cyclists. Swimmers. It\'s flat. It\'s easy. It\'s everything Copenhagen is.\",im:\"It\'s morning. A woman jogs. A cyclist rides. A swimmer enters. The harbor accepts all comers.\",t:\"Start at Islands Brygge, walk west or east. Free. Take 2-3 hours. Bring water. Bring a bike if you have one. This is Copenhagen living.",c:["free", "nature"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:22,n:"Bike Culture and Rush Hour Humanity",a:"Nørrebro",v:["local", "free"],d:22,s:"When 40,000 cyclists are one organism",st:"Peak hours. Cyclists flood the city. Mothers with kids in seats. Professionals in suits. Students in hoodies. No cars. Just bikes. It\'s the future Copenhagen has already built.",im:"It\'s 8am. A tidal wave of bicycles. Nobody honks. Everyone gets home.",t:"Peak hours. Cyclists flood the city. Mothers with kids in seats. Professionals in suits. Students in hoodies. No cars. Just bikes. It\'s the future Copenhagen has already built.\",im:\"It\'s 8am. A tidal wave of bicycles. Nobody honks. Everyone gets home.\",t:\"Stand at any major intersection (Nørrebrogade x Rantzausgade best) at 8am on a workday. Free to watch. Bring a camera. Bring amazement.",c:["free", "local_only"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:23,n:"Amalienborg Palace and Royalty\'s Geometry",a:"Frederiksstaden",v:["history", "beautiful"],d:23,s:"A square where the royal family lives visibly",st:"A perfect octagon. Four identical palaces around it. One is the royal residence. You stand outside their home. Guards change at 11:30am. Pomp in the morning. But you see the windows where they wake.",im:"It\'s 1750. A king designs perfection. A century later, he\'s dead. The palace still stands exact.",t:"A perfect octagon. Four identical palaces around it. One is the royal residence. You stand outside their home. Guards change at 11:30am. Pomp in the morning. But you see the windows where they wake.\",im:\"It\'s 1750. A king designs perfection. A century later, he\'s dead. The palace still stands exact.\",t:\"Amalienborg Plads, Frederiksstaden (metro to Kongens Nytorv). Free to view exterior. Changing of the Guard 11:30am daily. Photography encouraged.",c:["history_big", "beautiful"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:24,n:"Marmorkirken Rotunda Dream",a:"Frederiksstaden",v:["architecture", "beautiful", "quiet"],d:24,s:"A dome that took 100 years to finish",st:"Started 1749. Finished 1894. A massive dome. Inside: rotunda. Light from above. Massive and intimate. The slow build made it better—each generation added its own vision.",im:"It\'s 1750. A foundation is laid. It\'s 1894. A dome crowns the work. A century of hope becomes stone.",t:"Started 1749. Finished 1894. A massive dome. Inside: rotunda. Light from above. Massive and intimate. The slow build made it better—each generation added its own vision.\",im:\"It\'s 1750. A foundation is laid. It\'s 1894. A dome crowns the work. A century of hope becomes stone.\",t:\"Frederik\'s Church (Marmorkirken), Frederiksgade 4, Frederiksstaden (metro to Kongens Nytorv). €7 dome access (stairs only, no elevator). Go early morning. Empty and sublime.",c:["architecture", "quiet"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:25,n:"Kastellet Star Fortress and Strategic Thinking",a:"Frederiksstaden",v:["history", "beautiful"],d:25,s:"A five-pointed fortress designed for eternal war",st:"Pentagonal ramparts. Moats. Built 1660. Never attacked (successfully anyway). It\'s a museum of strategic thinking. Now green grass grows on the ramparts. War becomes nature.",im:"It\'s 1665. Engineers design protection. It\'s now. Tourists picnic where cannons pointed.",t:"Pentagonal ramparts. Moats. Built 1660. Never attacked (successfully anyway). It\'s a museum of strategic thinking. Now green grass grows on the ramparts. War becomes nature.\",im:\"It\'s 1665. Engineers design protection. It\'s now. Tourists picnic where cannons pointed.\",t:\"Kastellet, Kastellvej 100, Frederiksstaden (walk from Amalienborg). Free entry. Walk the walls. Photography is beautiful. Bring a bike—easy ride around.",c:["history_big"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:26,n:"Gefion Fountain and Giant Myth",a:"Frederiksstaden",v:["beautiful", "history"],d:26,s:"A goddess who carved the island with oxen",st:"Sculpture by Anders Bundgaard. A Norse goddess. Oxen. The story: Gefion plowed Zealand from Sweden. The fountain tells the myth. It\'s 1908 but feels eternal.",im:"It\'s 1500 BC (in the myth). A goddess plows. It\'s 1908 AD. Bundgaard sculpts proof. Now it\'s permanent.",t:"Sculpture by Anders Bundgaard. A Norse goddess. Oxen. The story: Gefion plowed Zealand from Sweden. The fountain tells the myth. It\'s 1908 but feels eternal.\",im:\"It\'s 1500 BC (in the myth). A goddess plows. It\'s 1908 AD. Bundgaard sculpts proof. Now it\'s permanent.\",t:\"Gefion Fountain, Langelinie Quay, Frederiksstaden (walk from Amalienborg). Free. Photography excellent. Go at golden hour. The water turns amber.",c:["beautiful"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:27,n:"Little Mermaid Statue and Graffiti Reality",a:"Frederiksstaden",v:["history", "weird"],d:27,s:"A tiny statue that the world magnified",st:"1.25 meters tall. By Edvard Eriksen 1913. Inspired by Hans Christian Andersen and a ballet dancer. Tourists line up to photograph something most miss. It\'s tiny. Powerful. Sad.",im:"It\'s 1913. A sculptor carves a girl with a fish tail. By now, she\'s famous for being small. Irony is the point.",t:"1.25 meters tall. By Edvard Eriksen 1913. Inspired by Hans Christian Andersen and a ballet dancer. Tourists line up to photograph something most miss. It\'s tiny. Powerful. Sad.\",im:\"It\'s 1913. A sculptor carves a girl with a fish tail. By now, she\'s famous for being small. Irony is the point.\",t:\"Langelinie Quay, Frederiksstaden. Free to view (from outside the fence). Go at dawn before crowds. Photography crowded but possible. The statue knows she\'s watched.",c:["history_big", "weird"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},

  {id:29,n:"Assistens Cemetery Community",a:"Nørrebro",v:["quiet", "local"],d:29,s:"A graveyard that\'s also a social space",st:"Danish respect the dead by living near them. Graves have benches. Families visit like parks. Poetry is carved. Artists are buried. Death is integrated. Not morose. Peaceful.",im:"It\'s summer. A woman sits by her husband\'s grave. She reads. She cries. She lives.",t:"Danish respect the dead by living near them. Graves have benches. Families visit like parks. Poetry is carved. Artists are buried. Death is integrated. Not morose. Peaceful.\",im:\"It\'s summer. A woman sits by her husband\'s grave. She reads. She cries. She lives.\",t:\"Assistens Cemetery, Rantzausgade 60, Nørrebro (metro/bus). Free. Open daylight hours. Go on a sunny afternoon. Bring a book. The dead don\'t mind.",c:["quiet", "history_big"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:30,n:"Vesterbro Night Market Friday",a:"Vesterbro",v:["local", "night"],d:30,s:"When immigrant food courts feed the city",st:"Friday nights. Pop-up food stalls. Thai, Pakistani, Turkish. Tables under lights. Community eating. Not fancy. Not Instagram. Just sustenance and conversation.",im:"It\'s Friday 8pm. Lights go up. Grills heat. The neighborhood gathers to eat.",t:"Friday nights. Pop-up food stalls. Thai, Pakistani, Turkish. Tables under lights. Community eating. Not fancy. Not Instagram. Just sustenance and conversation.\",im:\"It\'s Friday 8pm. Lights go up. Grills heat. The neighborhood gathers to eat.\",t:\"Vesterbro area (Istedgade base), Friday evenings. Food €8-15. Cash preferred. Come hungry. The atmosphere is the meal.",c:["local_only", "night"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:31,n:"Brooklyn Street and Gentrification\'s Line",a:"Nørrebro",v:["local", "weird"],d:31,s:"Where expensive coffee meets DIY culture",st:"Brooklyn Street is the battle line. One side: old Nørrebro (immigrant, working-class). Other side: new Nørrebro (hip, expat, expensive). Both sides exist. The coffee price marks the border.",im:"It\'s 2010. A café opens charging €4 for coffee. The old price was €2. Nørrebro divides.",t:"Brooklyn Street is the battle line. One side: old Nørrebro (immigrant, working-class). Other side: new Nørrebro (hip, expat, expensive). Both sides exist. The coffee price marks the border.\",im:\"It\'s 2010. A café opens charging €4 for coffee. The old price was €2. Nørrebro divides.\",t:\"Rantzausgade and area, Nørrebro (metro). Walk both sides. Understand gentrification through your coffee bill.",c:["local_only"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:32,n:"Graffiti Street and Copenhagen\'s Art Tolerance",a:"Nørrebro",v:["street_art", "local"],d:32,s:"Where spray paint is sanctioned vandalism",st:"A whole street. Legal graffiti wall. Artists paint. The city lets it happen. It\'s not rebellion. It\'s cooperation. Copenhagen understands: control kills art. Permission kills graffiti.",im:"It\'s 2010. An artist paints illegally. The city says: paint here instead. The art becomes better.",t:"A whole street. Legal graffiti wall. Artists paint. The city lets it happen. It\'s not rebellion. It\'s cooperation. Copenhagen understands: control kills art. Permission kills graffiti.\",im:\"It\'s 2010. An artist paints illegally. The city says: paint here instead. The art becomes better.\",t:\"Graffiti Street, Nørrebro (walk from metro). Free. Photography excellent. The art changes weekly. Return often.",c:["street_art", "local_only"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:33,n:"Superkilen Park and International Density",a:"Nørrebro",v:["free", "beautiful", "local"],d:33,s:"A park designed by the neighborhood it serves",st:"70 neighborhoods contributed to the design. Every object placed means something. A basketball hoop from Compton. A bench from Istanbul. It\'s the city as pure mixing.",im:"It\'s 2012. A designer asks: who are you? The neighborhood answers with objects. The park becomes their portrait.",t:"70 neighborhoods contributed to the design. Every object placed means something. A basketball hoop from Compton. A bench from Istanbul. It\'s the city as pure mixing.\",im:\"It\'s 2012. A designer asks: who are you? The neighborhood answers with objects. The park becomes their portrait.\",t:\"Superkilen, Nørrebrogade, Nørrebro (Metro to Nørrebro). Free. Walk the whole length. Read the plaques. Understand cultural integration through public space.",c:["free", "local_only"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:34,n:"Malmö Swedish Escape on Bike",a:"Amager",v:["nature", "free"],d:34,s:"A 30-minute pedal to a different country",st:"Rent a bike. Cross the bridge. You\'re in Sweden. Different prices. Different language. Same Scandinavian feeling. Day trip that feels international.",im:"It\'s 1998. A border was a problem. It\'s 1999. A bridge solved it. Cycling replaced passports.",t:"Rent a bike. Cross the bridge. You\'re in Sweden. Different prices. Different language. Same Scandinavian feeling. Day trip that feels international.\",im:\"It\'s 1998. A border was a problem. It\'s 1999. A bridge solved it. Cycling replaced passports.\",t:\"Rent a bike (€15/day). Cross Öresund Bridge (pedestrian/bike path exists, you pay €8). Malmö is flat and walkable. Return by sunset.",c:["free", "nature"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:35,n:"Refshaleøen Street Art Studios",a:"Refshaleøen",v:["street_art", "weird"],d:35,s:"An island where the city lets artists squat legally",st:"Former industrial zone. Now artist studios. Walls are galleries. Buildings are paint. It\'s semi-legal. Semi-blessed. Copenhagen\'s creative future lives here.",im:"It\'s 2000. An artist breaks in. By 2020, the city acknowledges them. The squat becomes institution.",t:"Former industrial zone. Now artist studios. Walls are galleries. Buildings are paint. It\'s semi-legal. Semi-blessed. Copenhagen\'s creative future lives here.\",im:\"It\'s 2000. An artist breaks in. By 2020, the city acknowledges them. The squat becomes institution.\",t:\"Refshaleøen, take bike (2A bus, 25 min from center). Free to explore. Artist studios often open weekends. Amazing views and better art.",c:["street_art", "weird"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:36,n:"Copenhagen Central Station and Transit Poetry",a:"Indre By",v:["architecture", "history"],d:36,s:"Where trains arrive and departure is architecture",st:"1911. Massive building. 10 platforms. The departures board was once the way to escape. Now it\'s just transit. But the building remembers when leaving mattered.",im:"It\'s 1920. A soldier leaves for war. His mother watches the departures board. It\'s now. Nobody remembers why leaving seemed so important.",t:"1911. Massive building. 10 platforms. The departures board was once the way to escape. Now it\'s just transit. But the building remembers when leaving mattered.\",im:\"It\'s 1920. A soldier leaves for war. His mother watches the departures board. It\'s now. Nobody remembers why leaving seemed so important.\",t:\"Hovedbanegården, Bernstorffsgade, Indre By (it\'s the central station). Free to walk through. Photography allowed. The building is the show.",c:["architecture", "history_big"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:37,n:"Christiania Greenhouses and Vegetable Community",a:"Christianshavn",v:["local", "free"],d:37,s:"Where food is grown in the margins",st:"Freetown\'s greenhouses. They feed residents. Tomatoes, herbs, vegetables. Growing food in a space the state doesn\'t own. Practical ideology. Food as freedom.",im:"It\'s 1975. Seeds are planted. By now, people eat what grew in contradiction.",t:"Freetown\'s greenhouses. They feed residents. Tomatoes, herbs, vegetables. Growing food in a space the state doesn\'t own. Practical ideology. Food as freedom.\",im:\"It\'s 1975. Seeds are planted. By now, people eat what grew in contradiction.\",t:\"Christiania, various greenhouses (ask a resident where). Free to see. Respect the space. This is food and philosophy combined.",c:["local_only", "free"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:38,n:"Tåsinge Plads and Playground Memory",a:"Frederiksberg",v:["beautiful", "local", "quiet"],d:38,s:"A square where children play and time stops",st:"A neighborhood plaza. Playground. Benches. It\'s ordinary. But it\'s where Copenhagen\'s family culture lives. This is what cities are for—protecting childhood.",im:"It\'s afternoon. Children play. Parents watch. Nothing happens. Everything happens.",t:"A neighborhood plaza. Playground. Benches. It\'s ordinary. But it\'s where Copenhagen\'s family culture lives. This is what cities are for—protecting childhood.\",im:\"It\'s afternoon. Children play. Parents watch. Nothing happens. Everything happens.\",t:\"Tåsinge Plads, Frederiksberg (S-train to Frederiksberg Station). Free. Go on a weekend afternoon. Bring quiet. Watch community happen.",c:["quiet"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:39,n:"Elephant Gate and Frederiksborg Entrance",a:"Frederiksberg",v:["history", "beautiful"],d:39,s:"A gate where an elephant walked in 1654",st:"A gate decorated with elephants. Why? A king received an elephant as a gift. Now the gate is the only memory. The elephant is long dead. The gate stands.",im:"It\'s 1654. An elephant walks through. The city gasps. By now, the gate is all that\'s left.",t:"A gate decorated with elephants. Why? A king received an elephant as a gift. Now the gate is the only memory. The elephant is long dead. The gate stands.\",im:\"It\'s 1654. An elephant walks through. The city gasps. By now, the gate is all that\'s left.\",t:\"Elephant Gate (Elefantporten), Frederiksberg Have entrance, Frederiksberg. Free to view. Photography is the point. The history seems absurd now.",c:["history_big"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:40,n:"Frederiksborg Lake and Green Escape",a:"Frederiksberg",v:["nature", "beautiful", "free"],d:40,s:"When Copenhagen becomes a lakeside town",st:"A lake in the city. Rowing boats. Ducks. Paths around it. In summer, Copenhageners escape to water without leaving. It\'s urban and empty simultaneously.",im:"It\'s June. A couple rows. The city is invisible. For an hour, they\'re not in Copenhagen.",t:"A lake in the city. Rowing boats. Ducks. Paths around it. In summer, Copenhageners escape to water without leaving. It\'s urban and empty simultaneously.\",im:\"It\'s June. A couple rows. The city is invisible. For an hour, they\'re not in Copenhagen.\",t:\"Frederiksborg Lake, Frederiksberg (various entry points). Free. Rowing rentals €20/hour. Go in early morning. Bring silence. The water teaches.",c:["nature", "free"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:41,n:"Nørrebrogade Sunday Promenade",a:"Nørrebro",v:["local", "free"],d:41,s:"When a street becomes a social event",st:"Sunday afternoons. Nørrebrogade fills. People. Cafés. Street musicians. It\'s not organized. It just happens. The street becomes proof that city life is social.",im:"It\'s Sunday 3pm. The street fills. Nobody announced it. Copenhageners came because they knew.",t:"Sunday afternoons. Nørrebrogade fills. People. Cafés. Street musicians. It\'s not organized. It just happens. The street becomes proof that city life is social.\",im:\"It\'s Sunday 3pm. The street fills. Nobody announced it. Copenhageners came because they knew.\",t:\"Nørrebrogade, Nørrebro (from metro to far north). Free walk. Cafés everywhere. This is Copenhagen\'s pulse.",c:["free", "local_only"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:42,n:"Bispebjerg Cemetery and Artist Graves",a:"Bispebjerg",v:["quiet", "history"],d:42,s:"Where Danish artists rest and inspire",st:"A cemetery with notable graves. Danish artists. Sculptors. Painters. Buried together. Flowers bloom. It\'s melancholy and peaceful. Art continues here.",im:"It\'s now. An artist walks between graves of other artists. The question: will they join?",t:"A cemetery with notable graves. Danish artists. Sculptors. Painters. Buried together. Flowers bloom. It\'s melancholy and peaceful. Art continues here.\",im:\"It\'s now. An artist walks between graves of other artists. The question: will they join?\",t:\"Bispebjerg Cemetery, Randbøl Allé 43, Bispebjerg (Metro to Nørrebro). Free. Go on a quiet weekday morning. Flowers are the offering.",c:["quiet", "history_big"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:43,n:"Zoo at Frederiksberg and Victorian Pleasure",a:"Frederiksberg",v:["local", "history"],d:43,s:"One of Europe\'s oldest zoos still going",st:"Opened 1859. The layouts are original. Victorian landscaping. Animals live in old enclosures. It\'s quaint and problematic. A window into what Copenhageners thought animals needed.",im:"It\'s 1870. A family visits. The elephant is the main event. It\'s now. The elephant is gone. The enclosure remains.",t:"Opened 1859. The layouts are original. Victorian landscaping. Animals live in old enclosures. It\'s quaint and problematic. A window into what Copenhageners thought animals needed.\",im:\"It\'s 1870. A family visits. The elephant is the main event. It\'s now. The elephant is gone. The enclosure remains.\",t:\"Copenhagen Zoo, Søndag 80, Frederiksberg (S-train to Frederiksberg Station). €20 entry. Go early. The landscaping is better than the animals.",c:["history_big", "local_only"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:44,n:"Zoological Museum and Victorian Display",a:"Frederiksberg",v:["history", "quiet"],d:44,s:"Taxidermied history arranged by 19th-century logic",st:"Dead animals in glass cases. The arrangement is obsolete taxonomy. The display case is the museum now. You\'re seeing how Europeans understood nature once. It\'s creepy and instructive.",im:"It\'s 1880. A naturalist arranges specimens. It\'s now. We see his thinking literally.",t:"Dead animals in glass cases. The arrangement is obsolete taxonomy. The display case is the museum now. You\'re seeing how Europeans understood nature once. It\'s creepy and instructive.\",im:\"It\'s 1880. A naturalist arranges specimens. It\'s now. We see his thinking literally.\",t:\"Zoological Museum, Universitetsparken 15, Frederiksberg (Metro to Nørrebro, walk 20 min). €8. Go on a quiet morning. The strangeness is the point.",c:["quiet", "history_big"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
