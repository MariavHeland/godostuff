  {id:105,n:"Freetown Christiania",a:"Christianshavn",v:["weird","local","free"],d:15,s:"Anarchist squatter community in a former military base — wild and colorful freedom zone",st:"Christiania is a self-governed enclave where residents openly reject capitalism and authority. Murals cover every surface; smells are strong; the vibe is bohemian-chaos. It\'s not a museum but a living counter-culture.",im:"Time-travel: Founded in 1971 when hippies occupied the abandoned Christianhavn barracks.",t:"Free to walk. Tram 1/2/6 to Prinsessegade. Don\'t take photos of people. Be respectful.",c:["street_art","local_only"],r:"g",nn:"Fristad Christiania",ns:"Anarchistisk fristaden i tidligere militærkaserne",nst:"Besøg den selvstyrende samfund uden regler.",nt:"Gratis. Tram 1/2/6 til Prinsessegade. Respektfuldt adfærd nødvendigt."},
  {id:106,n:"Rosenborg Castle Gardens (Free Entry)",a:"Nørrebro",v:["beautiful","free","quiet"],d:12,s:"Renaissance castle surrounded by stunning gardens — locals\' favorite free green space",st:"The castle itself is paid, but the surrounding Kongens Have (King\'s Garden) is free and gorgeous. Centuries-old trees, manicured beds, and locals lounging with beer on a budget. Sunset turns it magical.",im:"Time-travel: Rosenborg was built in 1606 as a royal summer house.",t:"Free garden entry. Castle is paid. Nørreport station nearby. Sun best.",c:["parks","romantic_water"],r:"g",nn:"Rosenborg Havepark",ns:"Gratis adgang til Renaissance-slottets hager",nst:"Slap af under de gamle træer i kongehagen.",nt:"Gratis indgang. Nærby Nørreport station."}

,{id:116,n:"Nordvest Open-Air Graffiti Walls",a:"Nordvest",v:["hidden", "street-art"],d:0,s:"Copenhagen's least touristy street-art district with massive murals covering entire building facades",st:"Nordvest is where locals go to see real urban art without the Instagram crowds. The neighborhood pulses with creative energy—every corner reveals new murals, from nature-inspired animal paintings to bold geometric designs. It's a living gallery that changes constantly.",im:"Picture yourself turning a corner onto a quiet residential street and suddenly facing a three-story building completely transformed into a kaleidoscope of color and form—no tourists, just you and the art.",t:"Metro to Nørrebro Station, then walk northwest into Nordvest. Free. Best visited mid-morning on weekdays to avoid crowds. Bring a camera; the light hits differently on each street. Wear comfortable shoes—you'll wander for hours.",c:["street-art", "neighborhoods"],r:"g",nn:"Nordvest Graffiti-Vægge",ns:"Københavns mindst turistiske street-art-kvarter med massive murals",nst:"Nordvest er hvor lokale går for at se rigtig urban kunst uden Instagram-mængder. Kvarteret pulserer med kreativ energi—hvert hjørne afslører nye murals, fra naturinspirerede dyremalerier til dristige geometriske designs. Det er et levende galleri, der konstant ændrer sig.",nt:"Metro til Nørrebro Station, derefter gå nordvest ind i Nordvest. Gratis. Bedst besøgt på hverdage om formiddagen for at undgå mængder. Tag et kamera med; lyset rammer forskelligt på hver gade. Bær komfortable sko—du vil vandre i timevis."},
{id:117,n:"Vesterbro Street Art & Murals (Gentrified District)",a:"Vesterbro",v:["hidden", "street-art"],d:0,s:"Judiciously gentrified Vesterbro west of Central Station hosts some of Copenhagen's most vibrant and accessible murals",st:"Vesterbro has transformed from a rough red-light district into a creative hub where street art tells stories of cultural transition. The murals here are bold and contemporary, reflecting the neighborhood's immigrant communities and artistic renaissance. Walking these streets feels like moving through a living art history.",im:"Imagine strolling past a five-story mural of a woman's face rendered in impossible detail, then ducking into a side street where abstract geometric patterns cover every surface—each piece more surprising than the last.",t:"Walk west from Copenhagen Central Station (Hovedbanegården) into Vesterbro proper. Free. Best explored on foot; allow 2-3 hours to really absorb the art. Early evening light is magical. Bring snacks from a local bodega.",c:["street-art", "neighborhoods"],r:"g",nn:"Vesterbro Street Art & Murals",ns:"Vesterbro vest for Hovedbanegården med nogle af Københavns mest levende murals",nst:"Vesterbro har transformeret fra et råt rødt lyskvartal til et kreativt knudepunkt, hvor street art fortæller historier om kulturel overgang. Murals her er dristige og samtidskunst, der afspejler kvarteret's immigrantsamfund og kunstneriske renæssance. At gå disse gader føles som at bevæge sig gennem en levende kunsthistorie.",nt:"Gå vest fra Københavns Hovedbanegård ind i Vesterbro selv. Gratis. Bedst udforsket til fods; tillad 2-3 timer for virkelig at absorbere kunsten. Aftenlys er magisk. Tag snacks fra en lokal bodega."},
{id:118,n:"Nørrebro Street Art Route (Self-Guided 9.5km Walk)",a:"Nørrebro",v:["hidden", "street-art"],d:0,s:"Official self-guided 9.5km route through one of Copenhagen's most dynamic neighborhoods showcasing diverse street art and cultural murals",st:"Nørrebro is Copenhagen's creative heartland, where street art reflects the neighborhood's cultural diversity and artistic spirit. The official route winds through residential streets, past community spaces, and along major thoroughfares—each section revealing different artistic movements and styles. This is where Copenhagen's street-art scene actually lives.",im:"Picture yourself following a winding path through tree-lined streets where every wall is a canvas—from political statements to whimsical characters to abstract explosions of color—each piece telling part of Nørrebro's story.",t:"Start from Nørrebro Station or any point along the route. Free. Download the OpdagDanmark route map online or pick up a printed guide at the tourist office. Best done on a Saturday morning when the neighborhood is alive but not chaotic. Wear comfortable shoes; it's a long walk. Stop at a local café for coffee.",c:["street-art", "neighborhoods"],r:"g",nn:"Nørrebro Street Art Rute",ns:"Officiel selvguidet 9,5km rute gennem et af Københavns mest dynamiske kvarterer",nst:"Nørrebro er Københavns kreative hjerteland, hvor street art afspejler kvarteret's kulturelle mangfoldighed og kunstneriske ånd. Den officielle rute slynger sig gennem boligkvarterer, forbi fællesskabsrum og langs større gader—hver sektion afslører forskellige kunstneriske bevægelser og stilarter. Dette er hvor Københavns street-art-scene faktisk lever.",nt:"Start fra Nørrebro Station eller ethvert punkt langs ruten. Gratis. Download OpdagDanmark-rutekort online eller hent en trykt guide på turistkontoret. Bedst gjort på en lørdagmorgen, når kvarteret er levende men ikke kaotisk. Bær komfortable sko; det er en lang gåtur. Stop på et lokalt café for kaffe."},
{id:119,n:"Christiania Street Art & Murals (Open-Air Gallery)",a:"Christianshavn",v:["hidden", "street-art"],d:0,s:"Freetown Christiania functions as Copenhagen's most eccentric open-air art gallery with colorful murals, graffiti, and creative installations covering every surface",st:"Christiania is a self-proclaimed micro-nation where approximately 1,000 residents live by their own rules, and the street art reflects this anarchic creative spirit. Buildings come in impossible shapes and colors, topped with strange decorations and drawings. Every wall, structure, and corner bursts with artistic expression—it's less a neighborhood and more an immersive art experience.",im:"Imagine stepping through the Elephant Gate into another world where a three-story building is painted in swirling rainbow patterns, a wooden structure looks like it was designed by a fever dream, and street art covers every available surface in layers of history and rebellion.",t:"Enter via the Elephant Gate (Elefantporten) at Prinsessegade 43, 1407 Copenhagen K. Free entry. Best visited during daylight hours (avoid late night). Photography is allowed but be respectful—ask before photographing residents. Spend 1-2 hours wandering. Bring cash; there are small cafés inside.",c:["street-art", "neighborhoods"],r:"g",nn:"Christiania Street Art & Murals",ns:"Christiania som Københavns mest ekscentriske open-air kunstgalleri",nst:"Christiania er en selvudråbt mikronation, hvor cirka 1.000 beboere lever efter deres egne regler, og street art afspejler denne anarkistiske kreative ånd. Bygninger kommer i umulige former og farver, toppet med mærkelige dekorationer og tegninger. Hver væg, struktur og hjørne brister af kunstnerisk udtryk—det er mindre et kvarter og mere en immersiv kunstoplevelse.",nt:"Gå ind via Elefantporten på Prinsessegade 43, 1407 København K. Gratis adgang. Bedst besøgt i dagslys (undgå sent på aften). Fotografering er tilladt, men vær respektfuld—spørg før du fotograferer beboere. Tilbring 1-2 timer på at vandre omkring. Tag kontanter med; der er små caféer indeni."}

  ,{id:120, n:"Svanemølle Strand Summer Bathe — Østerbro", a:"Østerbro", v:["beautiful","local","quiet"], d:20, s:"Sandy beach pier with Øresund views where locals cycle 15 minutes north to escape Amager's crowds.", st:"A 130-meter wooden pier extends into calm water. Locals arrive early summer mornings with coffee. Driftwood benches, wild grass meeting sand, occasional windsurfers in distance. The pier is packed mid-afternoon; arrive before noon.", im:"Cool water on your legs from the pier edge, smell of salt and fresh breeze, sound of families laughing in Danish.", t:"Metro/bus to Hellerup Station (20 min from center), 10-min walk to strand. Free entry. June-September, arrive before 11am to avoid crowds.", c:[], r:"g", nn:"Svanemølle Strand Sommerbade", ns:"Sandstrand med øresundsudsyn hvor lokale cykler nordpå for at undslippe Amagers flokke.", nst:"En 130-meter lang træpier strækker sig ud i roligt vand. Lokale ankommer på tidlige sommermorgener med kaffe. Drivtøjsbænke, vildt græs møder sand, lejlighedsvise windsurfere i det fjerne. Pieren er fuldt pakket om eftermiddagen; kom før klokken 11.", nt:"Metro/bus til Hellerup Station (20 min fra centrum), 10 min gang til stranden. Gratis entré. Juni-september, ankomst før 11.00 for at undgå mængder."}

  ,{id:121, n:"Utterslev Mose Nature Reserve — Vesterbro", a:"Vesterbro", v:["hidden","quiet","local","free entry"], d:45, s:"Wetland with 200+ bird species and dense walking trails 6km northwest where locals jog and bike year-round.", st:"Reed beds frame lakes, poplars line the paths. Joggers pass fishermen, families with dogs, cyclists testing their gears. In autumn, migrating birds fill the sky. Winter transforms it into frost-silent meditation space.", im:"Soft mud underfoot, distant croaking of frogs, binoculars hanging from necks of patient birders, wind through reeds.", t:"Bus 16A (25 min from Nørrebro). Free entry. Best dawn/dusk for birds. Trails marked, bring waterproof shoes.", c:[], r:"g", nn:"Utterslev Mose Naturreservat", ns:"Vådbund med 200+ fuglearter og tætte vandrestier 6 km nordvest, hvor lokale jogging og cykling året rundt.", nst:"Rørkanter rammer søer, poplarer begrænser stier. Jogger passerer fiskere, familier med hunde, cyklister tester deres gear. Om efteråret fylder vandrende fugle himlen. Vinteren forvandler det til stillevand meditativ rum.", nt:"Bus 16A (25 min fra Nørrebro). Gratis entré. Bedste daggry/skumring til fugle. Stier markeret, bring vandtæt skojtøj."}

  ,{id:122, n:"Assistens Kirkegård Literary Pilgrimage — Nørrebro", a:"Nørrebro", v:["history","quiet","beautiful","free entry"], d:30, s:"Romantic cemetery where Kierkegaard, H.C. Andersen, and Niels Bohr are buried among poplars and rare trees.", st:"Large poplar trees line the central parkway. Graves marked with bronze plaques sit beneath quiet. Locals picnic here on weekends reading philosophy. The grass is long and green. In winter, snow settles on stone crosses.", im:"Gravel path under your feet, bronze plaques cool to touch, whisper of wind through tall trees, the specific silence of centuries.", t:"S-train to Nørrebro Station, 5-min walk. Free. Open dawn to dusk. Bring a book about one of the graves.", c:[], r:"g", nn:"Assistens Kirkegård Litterær Pilegrimssted", ns:"Romantisk kirkegård hvor Kierkegaard, H.C. Andersen og Niels Bohr ligger begravet blandt poplarer og sjældne træer.", nst:"Store poplartre laver den centrale parksti. Grave markeret med bronzeplaketter ligger under stilhed. Lokale piknikere her i weekender læser filosofi. Græsset er langt og grønt. Om vinteren sætter sne sig på stenekors.", nt:"S-tog til Nørrebro Station, 5 min gang. Gratis. Åbn fra daggry til skumring. Bring en bog om en af gravene."}

  ,{id:123, n:"Rundetårn Rooftop Sunset — Indre By", a:"Indre By", v:["beautiful","history","quiet"], d:15, s:"1642 observatory tower with spiral ramp (no stairs) offering 360° views of spires, Christiansborg, and Marble Church.", st:"The slow spiral ramp climbs inside the round brick tower. At top, you see the entire medieval grid of Copenhagen shrink beneath you. Windows frame steeples like paintings. Golden light hits the city 30 minutes before sunset.", im:"Smooth brick under palms as you spiral upward, church bells ringing below, the vertiginous moment at the rail edge.", t:"Central Copenhagen, Kompagnistræde 40. 70 DKK adult. Open 10am-sunset. Come 30 min before sunset for best light and smallest crowds.", c:[], r:"g", nn:"Rundetårn Tagsolnedgang", ns:"1642 observatorie tårn med spiralrampe (ingen trappe) med 360° udsigt over spir, Christiansborg og Marmorkirkjen.", nst:"Den langsomme spiralrampe klatrer ind i det runde murstentårn. I toppen, du se hele medievale netværk af København krympe under dig. Vinduer indramme steeples som malerier. Gyllent lys rammer byen 30 minutter før solnedgang.", nt:"Centrale København, Kompagnistræde 40. 70 DKK voksen. Åbn 10am-solnedgang. Kom 30 min før solnedgang for bedste lys og mindste mængder."}

  ,{id:124, n:"Ravnsborggade Antique Street — Nørrebro", a:"Nørrebro", v:["hidden","history","local","beautiful"], d:25, s:"Single street with 35 antique/vintage shops—Royal Danish porcelain, 19th-century furniture, silverware, collectibles.", st:"Shop windows overflow with gilded clocks, silver candlesticks, oil paintings. One store smells of old leather and wax. A 70-year-old dealer sits in a wooden chair recognizing regulars by face. Loppemarked (flea market) Saturdays explodes with finds.", im:"Dust motes in shop light, the creaking floorboard under your foot, worn leather binding under your fingers, the price tags handwritten in shaky cursive.", t:"Nørrebro location. U-bahn Nørrebro, 7-min walk or bike 10 min from city center. Flea market Saturdays 10am-3pm. Shops open Tues-Fri 11am-5:30pm.", c:[], r:"g", nn:"Ravnsborggade Antikvitet Gade", ns:"Enkel gade med 35 antikvitet/vintage butikker—Kgl. dansk porcelæn, 19. århundredesmøbler, sølvtøj, samlinger.", nst:"Butikvinduer overløber af forgyldte ure, sølvstager, oliemalerier. En butik lugter af gammelt læder og voks. En 70-årig forhandler sidder i en træstol og genkender stammekunder ved ansigt. Loppemarked (loppemarked) lørdage eksploderer med fund.", nt:"Nørrebro lokation. U-bahn Nørrebro, 7 min gang eller cykling 10 min fra centrum. Loppemarked lørdage 10am-3pm. Butikker åbn Tirs-Fre 11am-17:30."}

  ,{id:125, n:"Hellerup Strand Winter Bath — Østerbro", a:"Østerbro", v:["weird","local","beautiful"], d:30, s:"Popular kids' beach with long pier famous for winter bathing—locals take year-round ice-cold dips.", st:"Cream-colored wooden pier stretches 80 meters. In winter, bundled figures descend steps into steaming water. Summer crowds sunbathe on trimmed grass near rose gardens and marina. The contrast—frozen kids in wetsuits, tanned adults—defines this place.", im:"Cold water shock on skin, steam rising in winter air, the specific screech of joy from kids, salt spray on lips.", t:"1.2km from Hellerup Station (S-train 15 min from center). Free entry. Winter swimming season Nov-March, clubs meet Wed/Sun early morning. Bus 6A also goes there.", c:[], r:"g", nn:"Hellerup Strand Vinterbade", ns:"Populært børnebestrand med lang pir kendt for vinterbadning—lokale tager år rundt isvand dips.", nst:"Creme farvet træpir strækker sig 80 meter. Om vinteren, pakket figurer går ned i trin i damprende vand. Sommertængde mængder solbader på trimmet græs nær rosenhaver og marina. Kontrasten—iskolde børn i våddragter, solbrændte voksne—definerer dette sted.", nt:"1,2km fra Hellerup Station (S-tog 15 min fra centrum). Gratis entré. Vinterbadningssæson nov-marts, klubber mødes ons/søn tidlig morgen. Bus 6A går også derhen."}

  ,{id:126, n:"Reffen Street Food Harbor Island — Refshaleøen", a:"Refshaleøen", v:["local","beautiful","free entry"], d:25, s:"Largest street food market in Northern Europe—35+ food stalls, 10 bars, brewery, workshops in repurposed shipping containers on shipyard.", st:"Corrugated metal frames food stalls. Smells collide: Thai spices, grilled meat, fresh fish, craft beer. A DJ plays electronic music at 7pm. Water of the harbor reflects container lights. The crowd is young, mixed languages, communal picnic tables.", im:"Grease on your hands from pulled pork, beer condensation on your glass, bass beats vibrating your chest, salt smell from harbor.", t:"Bus 2A from Central Station (10 min). Harbor buses 991/992 also stop here (20 min intervals). Free entry, pay per food/drink. Open mid-March to end-September, 11am-late. Concerts/markets Thurs-Sun.", c:[], r:"g", nn:"Reffen Gademat Øen", ns:"Største gademat marked i Nordeuropa—35+ madstandere, 10 barer, bryggeri, værksteder i genbrugt skibscontainere på værftArea.", nst:"Korrugeret metal rammer madstandere. Lugte kolliderer: Thai krydderier, grillet kød, frisk fisk, håndværksøl. En DJ spiller elektronisk musik kl. 19. Vandløb af havnen reflekterer containerlyster. Mængden er ung, blandede sprog, kommunale picnicborde.", nt:"Bus 2A fra Central Station (10 min). Havnebusser 991/992 stopper også her (20 min intervaller). Gratis entré, betale pr. mad/drikke. Åbn midt-marts til slutningen af september, 11am-sen. Koncerter/marked tors-søn."}

  ,{id:127, n:"Frederiksborg Castle Renaissance Moat — Hillerød", a:"Hillerød", v:["history","beautiful"], d:120, s:"Largest Renaissance palace in Scandinavia built on 3 lake islets with formal gardens, art collection, 40-minute train ride.", st:"Three connected islands mean the red-brick castle reflects in water on all sides. Swans glide past. Inside, long galleries hold paintings from the 1600s. The chapel dome glints gold. Gardens stretch in perfect grids; locals bring laptops to work here.", im:"The specific sound of swans' wings, cool stone corridors, the smell of old paint in galleries, water lapping stone foundations.", t:"S-train Line A from Central Station (40 min to final stop Hillerød). Exit and take bus 301/302 or 15-min walk. April-Oct 10am-5pm, Nov-March 11am-3pm. 75 DKK adult (60 DKK student), free w/CPH Card.", c:[], r:"g", nn:"Frederiksborg Slot Renaissance Grav", ns:"Største renæssanceslot i Skandinavien bygget på 3 søøer med formelle haver, kunstsamling, 40-minutters tog.", nst:"Tre forbundne øer betyder, at det røde mursten slot reflekterer i vand på alle sider. Svaner glider forbi. Indeni har lange gallerier malerier fra 1600-tallet. Kapelkuppelen glinter guld. Haven strækker sig i perfekte gitter; lokale bringer laptops for at arbejde her.", nt:"S-tog linje A fra Central Station (40 min til sidste stop Hillerød). Exit og tag bus 301/302 eller 15 min gang. April-okt 10am-5pm, nov-marts 11am-3pm. 75 DKK voksen (60 DKK studerende), gratis m/CPH kort."}

  ,{id:128, n:"Roskilde Viking Ships 1070AD — Roskilde", a:"Roskilde", v:["history","weird"], d:90, s:"Only museum with recovered 1000-year-old Viking ships (not replicas)—5 vessels sunk in fjord 1070, discovered 1962.", st:"Glass cases hold wooden ships with actual rune marks. Outside, reconstructed ships float at the quay—you can sail them May-Sept. A blacksmith demonstrates iron work daily. School groups examine ax marks. The harbor is alive with activity from Vikings' trading routes.", im:"Splinters of wood older than any building you've seen, the weight of iron in your hand at the forge, salt smell mixing with old wood.", t:"30 km from Copenhagen, train from Central Station 22-26 min (frequent). From Roskilde station, 27-min walk or short bus ride. 130 DKK winter, 165 DKK summer, 50% student. Boat sail trips daily May-Sept.", c:[], r:"g", nn:"Roskilde Vikinge Skibe 1070AD", ns:"Eneste museum med genfundne 1000 år gamle vikingeskibe (ikke replikaer)—5 fartøjer sænket i fjord 1070, opdaget 1962.", nst:"Glaskasser holder træskibe med faktiske runer mærker. Udenfor, genopbygget skibe flyder ved kajen—du kan sejle dem maj-sept. En smed demonstrerer jernarbejde dagligt. Skoleklasser undersøger øksemarkinger. Havnen er levende med aktivitet fra vikingernes handelsruter.", nt:"30 km fra København, tog fra Central Station 22-26 min (hyppig). Fra Roskilde station, 27 min gang eller kort bustur. 130 DKK vinter, 165 DKK sommer, 50% studerende. Bådsejl dagligt maj-sept."}

  ,{id:129, n:"Louisiana Museum Modern Art — Humlebæk", a:"Humlebæk", v:["beautiful","history"], d:90, s:"World-class contemporary art museum in waterfront manor 35 minutes north—Giacometti sculptures, Yves Klein, Danish design.", st:"The manor itself is art. Floor-to-floor windows overlook Øresund Sound. A Calder mobile hangs in the atrium. The grounds have grass where people lie reading catalogs. The light changes every hour; the collection changes every 3 months.", im:"Polished concrete floors, afternoon sun creating shadows on white walls, the specific hush of a room with one extraordinary painting.", t:"30 km north. Train from Central Station to Humlebæk (35 min), 10-min walk to museum, or bus 388. 160 DKK adult, 90 DKK student. Free entry first Sun of month. Café overlooks water.", c:[], r:"g", nn:"Louisiana Kunstmuseum Modern Kunst", ns:"Verdensklasses samtidig kunstmuseum i vandfront herregård 35 minutter nord—Giacometti skulpturer, Yves Klein, dansk design.", nst:"Herregården selv er kunst. Gulv-til-gulv vinduer med udsigt over Øresund Sound. En Calder mobil hænger i atrium. Grundene har græs hvor mennesker ligger læser kataloger. Lyset ændrer sig hver time; samlingen skifter hver 3 måneder.", nt:"30 km nord. Tog fra Central Station til Humlebæk (35 min), 10 min gang til museum, eller bus 388. 160 DKK voksen, 90 DKK studerende. Gratis entré første søn i måneden. Café overlooksvand."}

  ,{id:130, n:"Mikkeller & Friends Craft Beer — Nørrebro", a:"Nørrebro", v:["local","weird"], d:20, s:"Flagship craft brewery bar with 40 taps rotating global guest beers, Mikkeller originals, on Stefansgade's hip street.", st:"The bar splits into intimate sections. Tap list changes weekly. Conversations happen in 6 languages. A regular sits at the corner with the same stool every Thurs. IPAs from Seattle hang next to sours from Belgium. The bartender knows proportions by heart.", im:"Condensation on cold glass, the tang of a Belgian lambic, conversations too loud and then quiet, the clink of bottles being swapped.", t:"Nørrebro, Stefansgade 35. S-train to Nørrebro, 8-min walk. Open daily 4pm-midnight (Fri-Sat until 2am). No entry fee, beer 60-120 DKK depending on rarity.", c:[], r:"g", nn:"Mikkeller & Venner Håndværk Øl", ns:"Flagskib håndværksbrygger bar med 40 taps roterende globale gæsteøl, Mikkeller originaler, på Stefansgades hotte gade.", nst:"Baren deler sig i intime sektioner. Taplisten skifter ugentligt. Samtaler sker på 6 sprog. En stamkunde sidder i hjørnet med samme stol hver torsdag. IPAs fra Seattle hænger ved siden af sure fra Belgien. Bartenderen kender proportioner uden navn.", nt:"Nørrebro, Stefansgade 35. S-tog til Nørrebro, 8 min gang. Åbn dagligt 4pm-midnat (fre-lør til 2am). Ingen indgangsbetaling, øl 60-120 DKK afhængigt af sjældenhed."}

  ,{id:131, n:"Distortion Music Festival Streets — Nørrebro", a:"Nørrebro", v:["weird","local","free entry"], d:30, s:"Citywide street festival June 3-7 with 20-40 free music stages per day hosted by bars, shops, residents, galleries.", st:"Nørrebro section runs 4-10pm. Local sound systems improvise on the street. A record shop hosts a DJ. A gallery plays live techno. Residents lean from windows. The vibe shifts block by block. Zero corporate sponsorship. Pure neighborhood culture.", im:"Bass reverberating from storefronts, dancing bodies in the street, beer spilled on cobblestones, shouting conversations over drums.", t:"June 3-7, 2026. Nørrebro, Vesterbro, and harbor areas. Street parties free, 4-10pm daily. Club nights and Distortion Ø festival (paid) also run. No tickets for street stages.", c:[], r:"g", nn:"Distortion Musikfestival Gader", ns:"Byomfattende gadefestival juni 3-7 med 20-40 gratis musikscener pr. dag arrangeret af barer, butikker, beboere, gallerier.", nst:"Nørrebro sektion kører 4-10pm. Lokale lydsystemer improviserer på gaden. En pladbutik hoster en DJ. Et galleri spiller live techno. Beboere læner sig fra vinduer. Vibrakten skifter blok efter blok. Nul virksomhedssponsoring. Ren kvarter kultur.", nt:"Juni 3-7, 2026. Nørrebro, Vesterbro og havnebukker. Gatepartier gratis, 4-10pm dagligt. Klubnætter og Distortion Ø festival (betalt) også kører. Ingen billetter til gadesfærer."}

  ,{id:132, n:"Torvehallerne Weekday Morning Market — Nørrebro", a:"Nørrebro", v:["local","free entry"], d:15, s:"Double-hall food market open 10am-7pm weekdays, weekends—vegetables from 5am delivery, fresh bread, local cheese.", st:"Mornings (before 10am), you see the actual wholesale—vendors arranging berries, dairy trucks unloading. By afternoon it's tourists. Hallerne smells of fresh herbs, cured meat, coffee. A regular buys the same goat cheese from the same woman for 20 years.", im:"Wet market floor under wet shoes, the smell of fresh-cut herbs, the weight of a crusty loaf warm in your hands.", t:"Nørrebro Torvehallerne at Frederiksborggade 21. S-train to Nørrebro, 3-min walk. Open 10am-7pm daily. Arrive 10-11am for best selection, 4pm for reduced prices.", c:[], r:"g", nn:"Torvehallerne Ugedags Formiddag Marked", ns:"Dobbelt-hal madmarked åbt 10am-7pm hverdage, weekender—grøntsager fra 5am levering, frisk brød, lokale ost.", nst:"Morgene (før 10am), du ser det faktiske engros—leverandører arrangerer bær, mejerivogne aflæsning. Ved eftermiddag er det turister. Hallerne lugter af frisk krydderier, kureret kød, kaffe. En stamkunde køber den samme gederost fra samme kvinde i 20 år.", nt:"Nørrebro Torvehallerne på Frederiksborggade 21. S-tog til Nørrebro, 3 min gang. Åbn 10am-7pm dagligt. Ankomst 10-11am for bedste valg, 4pm for reduceret priser."}

  ,{id:133, n:"Nyhavn 6am Before Tourists — Indre By", a:"Indre By", v:["history","beautiful","quiet"], d:15, s:"The famous rainbow harbor row empty at 6am—fishing boats unloading before the crowds, original 17th century Hanseatic buildings.", st:"Fishermen in rubber boots hose down wooden boats. The light is gray-gold. Seagulls own the quay. By 8am, the first tour buses arrive and the spell breaks. Sip coffee at a café table alone watching the working harbor. The buildings are indeed candy-colored but nobody's taking selfies yet.", im:"Smell of fresh fish and salt water, the slap of rope against wood, cold morning air on your face, coffee steam.", t:"City center, Nyhavn. Walk there before 6am from anywhere central (1-3 km). Cafés begin serving coffee at 6am. Free to walk. Tour groups arrive 8am-5pm, so time your visit accordingly.", c:[], r:"g", nn:"Nyhavn 6am Før Turister", ns:"Den berømte regnbuehavnrad tomme klokken 6—fiskebåde aflæser før mængderne, originale 1700-tals Hanseatic bygninger.", nst:"Fiskere i gummistøvler skolder træbåde. Lyset er grå-guld. Måger ejer kajen. Ved 8am ankommer de første turbusser og trylden bryder. Slurp kaffe ved et cafébord alene og se arbejdshavnen. Bygningerne er sandelig karamelfarvet men ingen tager selfies endnu.", nt:"Bycenter, Nyhavn. Gang dertil før 6am fra et hvilket som helst centralt (1-3 km). Caféer begynder at servere kaffe kl. 6. Gratis at gå. Turgrupper ankomst 8am-5pm, så tid dit besøg derfor."}

  ,{id:134, n:"Christiania Freetown Rules & Reality — Christania", a:"Christania", v:["weird","history"], d:30, s:"Autonomous commune since 1971 with its own rules: no hard drugs on Pusher Street, no photography, no violence, bikes over cars.", st:"Colorful hand-painted houses lean at odd angles. Crafts fill storefronts. The smell is incense mixed with herb smoke. On Pusher Street, transactions happen openly but the NO PHOTOS rule is absolute—cameras confiscated. A community council meets weekly. Outside the gates, it's still Copenhagen.", im:"Paint-splattered wooden buildings, the sound of bikes on gravel, the specific silence when someone raises a camera (then lowered immediately), incense thick in air.", t:"South of city center, Prinsessegade entrance. Bike or walk (20 min from Nørrebro). Free entry. Respect NO PHOTOS rule strictly. Guided tours available but less 'real' than solo exploration. Winter quieter, summer packed.", c:[], r:"g", nn:"Christiania Fristad Regler & Virkelighed", ns:"Autonomt kommune siden 1971 med sine egne regler: ingen hårde stoffer på Pusher gade, ingen fotografi, ingen vold, cykler over biler.", nst:"Farverige håndmalede huse læner sig i mærkelige vinkler. Håndværk fylde butiksfronter. Lugten er røgelse blandet med urtelyst. På Pusher gade, transaktioner sker åbent men NO PHOTOS reglen er absolut—kameraer konfiskeret. Et samfund råd mødes ugentligt. Uden for portene, det er stadig København.", nt:"Syd for bycenter, Prinsessegade indgang. Cykel eller gang (20 min fra Nørrebro). Gratis entré. Respekter NO PHOTOS regel strengt. Guidede rundvisninger tilgængelig men mindre 'virkelig' end solo udforskning. Vinter stille, sommer fuldt."}

  ,{id:135, n:"Bakken World's Oldest Amusement Park — Klampenborg", a:"Klampenborg", v:["weird","history"], d:40, s:"Since 1583, before Ferris wheels were invented—wooden roller coaster, fortune tellers, beer halls, no entry fee, just pay-per-ride.", st:"The wooden Rutschebanen coaster screams with the same sound for 440 years. Families do this pilgrimage. Fortune tellers in crystal-decorated rooms. Bears and other stuffed games in the shooting galleries. The beer hall serves øl by the liter. Zero corporate branding.", im:"Creaking wood as the coaster climbs, screams of joy, the smell of hot sugar and beer, faded paint on old structures.", t:"35 km north, S-train Line C to Klampenborg (20 min from center), walk 15 min through Dyrehaven (Deer Park). Free entry, rides 40-80 DKK each. Open late April-early Sept daily, weekends in April/September.", c:[], r:"g", nn:"Bakken Verdens Ældste Forlystelsespark", ns:"Siden 1583, før rutsjebaner blev opfundet—træ rutsjebane, spådomer, ølhaller, ingen indgang gebyr, bare betal pr. tur.", nst:"Den træ rutsjebanen skriger med det samme lyd i 440 år. Familier gør denne pilegrimstur. Spådommer i krystalbeskyttede værelser. Bjørne og andre stoppet legetøj i skydegallerier. Ølhallen serverer øl ved literen. Nul virksomhedsbranding.", nt:"35 km nord, S-tog linje C til Klampenborg (20 min fra centrum), gang 15 min gennem Dyrehaven (Dyrepark). Gratis entré, ture 40-80 DKK hver. Åbn sen april-tidlig sept dagligt, weekender april/september."}

{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Copenhagen Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
