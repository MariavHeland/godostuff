  {id:46,n:"Operaen (Copenhagen Opera House) at Dusk",a:"Holmen",v:["architecture", "beautiful"],d:46,s:"A marble block that swallowed perfection",st:"2005. Henning Larsen design. Minimalist. Black marble. Expensive. It\'s half-submerged in water. The building and its reflection are the same. That\'s the architecture.",im:"It\'s 1998. An architect dreams of simplicity. By 2005, marble contradicts his dream. The building is argument.",t:"2005. Henning Larsen design. Minimalist. Black marble. Expensive. It\'s half-submerged in water. The building and its reflection are the same. That\'s the architecture.\",im:\"It\'s 1998. An architect dreams of simplicity. By 2005, marble contradicts his dream. The building is argument.\",t:\"Operaen, Ekvipagemestervej 10, Holmen (metro to Christianshavn). Tickets €20-200. Even standing outside at dusk is worth the walk. The building argues with beauty.",c:["architecture", "beautiful"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:47,n:"Nordhavn Waterfront and Yachts as Art",a:"Nordhavn",v:["beautiful", "architecture"],d:47,s:"Where millionaires park their money and call it living",st:"Luxury yachts. Modern apartments. The transformation is complete. Old working docks. New money landscape. It\'s sterile but undeniably beautiful. Progress looks like this now.",im:"It\'s 2000. A dock waits. It\'s 2015. Yachts reflect light. The water knows both.",t:"Luxury yachts. Modern apartments. The transformation is complete. Old working docks. New money landscape. It\'s sterile but undeniably beautiful. Progress looks like this now.\",im:\"It\'s 2000. A dock waits. It\'s 2015. Yachts reflect light. The water knows both.\",t:\"Nordhavn, various points (metro to Nordhavn). Free to walk. Cafés overpriced. The architecture is the point. Go at sunset.",c:["architecture", "beautiful"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:48,n:"Jægersborg Dyrehave and Copenhagen\'s Wild",a:"Lyngby",v:["nature", "free", "beautiful"],d:48,s:"Where deer roam and the city remembers forest",st:"A royal hunting forest. Opened to public. Now wild deer. Walking paths. Lakes. You escape the city without leaving Copenhagen. Nature isn\'t far. It\'s just gated.",im:"It\'s 1670. A king hunts here. It\'s now. Anyone walks. The deer don\'t care who hunts.",t:"A royal hunting forest. Opened to public. Now wild deer. Walking paths. Lakes. You escape the city without leaving Copenhagen. Nature isn\'t far. It\'s just gated.\",im:\"It\'s 1670. A king hunts here. It\'s now. Anyone walks. The deer don\'t care who hunts.\",t:\"Jægersborg Dyrehave, multiple entry points (bus or bike from center, 25-30 min). Free entry. Endless walking. Photography excellent. Go early morning. Deer are shy.",c:["free", "nature"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:49,n:"Klampenborg Bakken and Amusement Democracy",a:"Lyngby",v:["local", "free"],d:49,s:"The oldest amusement park run by collective chaos",st:"Bakken. 1583. Fun rides. Game stalls. It\'s chaotic and free (you pay per ride). Not corporate. Not Disneyed. Still anarchic. Copenhagen proves fun doesn\'t need order.",im:"It\'s 1600. A fair happens. It\'s now. The fair still happens. Nothing\'s changed except centuries.",t:"Bakken. 1583. Fun rides. Game stalls. It\'s chaotic and free (you pay per ride). Not corporate. Not Disneyed. Still anarchic. Copenhagen proves fun doesn\'t need order.\",im:\"It\'s 1600. A fair happens. It\'s now. The fair still happens. Nothing\'s changed except centuries.\",t:\"Bakken, Jægersborg Allé 32, Lyngby (S-train to Jægersborg). Free entry (rides €2-8). Go on a summer evening. The atmosphere is 400 years old.",c:["free", "local_only"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:50,n:"Kongelunden Beach and Suburban Water",a:"Amager",v:["free", "nature"],d:50,s:"When Copenhagen remembers it has a coast",st:"A beach in the suburbs. Less fancy than Nyhavn. Real Copenhageners swim here. Cold water. Fine sand. The Øresund beyond. You\'re in the city but the beach thinks you\'re not.",im:"It\'s August. A family swims. The water is 15 degrees. Nobody cares. The beach is freedom.",t:"A beach in the suburbs. Less fancy than Nyhavn. Real Copenhageners swim here. Cold water. Fine sand. The Øresund beyond. You\'re in the city but the beach thinks you\'re not.\",im:\"It\'s August. A family swims. The water is 15 degrees. Nobody cares. The beach is freedom.\",t:\"Kongelunden, Amager (S-train to Amager Strand, 20 min). Free. Bring a towel. Bring courage. Go in summer. Go when weather\'s doubtful (real Danes do).",c:["free", "nature"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:51,n:"Arken Museum and Prefab Architecture",a:"Ishøj",v:["architecture", "beautiful"],d:51,s:"A building that looks like it sailed ashore",st:"Søren Robert Lund design. A ship or a building? Prefab construction. White walls. Angular. It\'s geometric joy. The museum inside is secondary. The building is the art.",im:"It\'s 1996. An architect dreams ships. By opening day, it\'s real.",t:"Søren Robert Lund design. A ship or a building? Prefab construction. White walls. Angular. It\'s geometric joy. The museum inside is secondary. The building is the art.\",im:\"It\'s 1996. An architect dreams ships. By opening day, it\'s real.\",t:\"Arken, Skovvej 100, Ishøj (S-train to Ishøj, then bus, 40 min from center). €15 entry. The building is worth the trip. Photography mandatory.",c:["architecture"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:52,n:"Louisiana Museum and Lawn Philosophy",a:"Humlebæk",v:["beautiful", "history"],d:52,s:"Art museum that uses nature as curation",st:"North coast. Modern art. But the lawn is the real piece. You walk grass facing the Øresund. Art and ocean. Coast and thought. The building is smart enough to get out of the way.",im:"It\'s 1958. An architect designs light. By now, the lawn does the real work.",t:"North coast. Modern art. But the lawn is the real piece. You walk grass facing the Øresund. Art and ocean. Coast and thought. The building is smart enough to get out of the way.\",im:\"It\'s 1958. An architect designs light. By now, the lawn does the real work.\",t:\"Louisiana Museum of Modern Art, Gammel Strandvej 13, Humlebæk (S-train toward Helsingør, 30 min). €22. Bring a book. The lawn has benches. The ocean does the teaching.",c:["beautiful", "history_big"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:53,n:"Kastrup Beach and Danish Summer Life",a:"Kastrup",v:["free", "nature", "local"],d:53,s:"Where package tourists flee and Danes swim",st:"South of airport. Small beach. Local swimming. Cheap food. No resort culture. This is how Copenhageners vacation in summer. Simple. Water. Time.",im:"It\'s July. A family arrives. The water is cold. They swim anyway. This is Denmark.",t:"South of airport. Small beach. Local swimming. Cheap food. No resort culture. This is how Copenhageners vacation in summer. Simple. Water. Time.\",im:\"It\'s July. A family arrives. The water is cold. They swim anyway. This is Denmark.\",t:\"Kastrup Beach (metro to Kastrup station, walk 10 min). Free entry. Kiosks with hot dogs €5. This is real summer culture. Go on weekends.",c:["free", "nature", "local_only"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:54,n:"Thorvaldsen Museum and Neoclassical Dream",a:"Holmen",v:["history", "beautiful"],d:54,s:"Where a Danish sculptor imagined eternal forms",st:"Bertel Thorvaldsen. Roman-influenced. Neoclassical. He\'s buried in the museum courtyard. His life and death in one space. The sculptures are beautiful. The idea of perfection is visible.",im:"It\'s 1800. A sculptor carves eternal forms. By now, we know beauty doesn\'t last. The museum proves he tried anyway.",t:"Bertel Thorvaldsen. Roman-influenced. Neoclassical. He\'s buried in the museum courtyard. His life and death in one space. The sculptures are beautiful. The idea of perfection is visible.\",im:\"It\'s 1800. A sculptor carves eternal forms. By now, we know beauty doesn\'t last. The museum proves he tried anyway.\",t:\"Thorvaldsen Museum, Porthusgade 2, Holmen (metro to Christianshavn). €10. The courtyard is the heart. Go quietly.",c:["history_big", "beautiful"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:55,n:"Åbenrå Street and Fashion Rebellion",a:"Indre By",v:["local", "beautiful"],d:55,s:"Where Copenhageners dress like it matters",st:"A small street of independent fashion shops. Danish minimalism. Experimental. Affordable. This is where Copenhagen dresses itself. Not chains. Not brands. Designers.",im:"It\'s 2010. A designer opens a shop. Copenhageners recognize their own style reflected back.",t:"A small street of independent fashion shops. Danish minimalism. Experimental. Affordable. This is where Copenhagen dresses itself. Not chains. Not brands. Designers.\",im:\"It\'s 2010. A designer opens a shop. Copenhageners recognize their own style reflected back.\",t:\"Åbenrå, Indre By (walk from Strøget). Shops €50-200. Photography gold. Go on a weekend. See Copenhagen see itself.",c:["beautiful", "local_only"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:56,n:"Gammel Strand Old Port Secrets — Indre By",a:"Indre By",v:["history", "hidden", "beautiful"],d:56,s:"Where Viking ships moored and Renaissance merchants built their fortunes",st:"Gammel Strand is ancient. The water that touches these buildings has been touched by Viking keels. Medieval facades lean over cobblestones. In summer, beer gardens appear. But stand here at dawn and feel the centuries. The Børsen building\'s copper spire twists overhead like a crown.",im:"It\'s 1400. A merchant unloads spices from the East. His daughter stands on the dock. The smell is overwhelming. The horizon promises everything.",t:"Gammel Strand is ancient. The water that touches these buildings has been touched by Viking keels. Medieval facades lean over cobblestones. In summer, beer gardens appear. But stand here at dawn and feel the centuries. The Børsen building\'s copper spire twists overhead like a crown.\",im:\"It\'s 1400. A merchant unloads spices from the East. His daughter stands on the dock. The smell is overwhelming. The horizon promises everything.\",t:\"Gammel Strand (beside Børsen), Indre By. Free to walk. U-Bahn to Gammel Torv. Best at 7am before vendors set up. The Børsen is Copenhagen\'s 1624 stock exchange—closed to public but magnificent from outside.",c:["history_big"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:57,n:"Kastellet Bastion Star Fort — Nørrebro/Østerbro",a:"Østerbro",v:["history", "beautiful", "free"],d:57,s:"A 17th-century military fortress with views of where enemies never came",st:"Kastellet is a perfect five-pointed star when seen from above. Walk the ramparts. In summer, Danish families picnic where cannons once pointed at sea. The views are spectacular—the harbor, Amager, and beyond. The fortress never saw battle. It\'s beautiful because it was never used.",im:"It\'s 1660. Soldiers garrison the ramparts. They expect invasion from Sweden. The cannons are loaded. The invasion never comes. In 360 years, the only conquest will be by tourists and families seeking peace.",t:"Kastellet is a perfect five-pointed star when seen from above. Walk the ramparts. In summer, Danish families picnic where cannons once pointed at sea. The views are spectacular—the harbor, Amager, and beyond. The fortress never saw battle. It\'s beautiful because it was never used.\",im:\"It\'s 1660. Soldiers garrison the ramparts. They expect invasion from Sweden. The cannons are loaded. The invasion never comes. In 360 years, the only conquest will be by tourists and families seeking peace.\",t:\"Kastellet, Østerbro (tram 14, 26 to Kastellet). Free entry. Open dawn-dusk. The ramparts are a 2km walk. Bring a picnic. The moat is real—don\'t fall in.",c:["history_big", "parks"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:58,n:"Christiania Hidden Markets — Christianshavn",a:"Christianshavn",v:["weird", "local", "night"],d:58,s:"50 years of radical freedom squatter culture surviving in capitalism\'s heart",st:"Christiania is a 50-year-old experiment in collective living on military land. 800 residents reject private property. Murals cover every wall. Musicians play for free. The air smells like weed and revolution. It\'s controversial, real, and unlike anywhere else in Copenhagen. Walk through. Don\'t judge. Feel it.",im:"It\'s 1971. Hippies squat abandoned barracks. They declare independence. They have no government, no police, no laws but consensus. Forty years later, they still refuse to leave.",t:"Christiania is a 50-year-old experiment in collective living on military land. 800 residents reject private property. Murals cover every wall. Musicians play for free. The air smells like weed and revolution. It\'s controversial, real, and unlike anywhere else in Copenhagen. Walk through. Don\'t judge. Feel it.\",im:\"It\'s 1971. Hippies squat abandoned barracks. They declare independence. They have no government, no police, no laws but consensus. Forty years later, they still refuse to leave.\",t:\"Prinsessegade 43, Christianshavn. Free entry (donations welcome). S-train to Christianshavn Station. The main entrance (Grønlandske Forsamlingshus) sells day passes (€7). Don\'t photograph residents or the markets. Be respectful.",c:["local_only", "weird"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe   {id:59,n:"Ny Carlsberg Glyptotek Tuesdays — Tivoli",a:"Tivoli",v:["free", "beautiful", "history"],d:59,s:"An Egyptian temple filled with art and Italian courtyards (free on Tuesdays)",st:"Every Tuesday, entry is free to one of Europe\'s best-kept art secrets. Mummy cases, ancient sculptures, Rodin\'s bronze thinker. The Winter Garden courtyard has palm trees and a glass ceiling. You\'ll be alone in rooms full of masterpieces. The light is golden. The air smells of stone and history.",im:"It\'s 1888. A brewery magnate unveils his collection. He built this temple just to hold beauty. Every object was chosen for one reason: because he loved it.",t:"Every Tuesday, entry is free to one of Europe\'s best-kept art secrets. Mummy cases, ancient sculptures, Rodin\'s bronze thinker. The Winter Garden courtyard has palm trees and a glass ceiling. You\'ll be alone in rooms full of masterpieces. The light is golden. The air smells of stone and history.\",im:\"It\'s 1888. A brewery magnate unveils his collection. He built this temple just to hold beauty. Every object was chosen for one reason: because he loved it.\",t:\"Dantes Plads 7, Tivoli area. €0 Tuesdays (€20 other days). S-train to Tivoli. Hours 11am-6pm Tuesday. Closed Mondays. Bring a notebook. Arrive at 11:15am for the morning light.",c:["free_museum", "history_big"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver dagene. Høvlighed betyder meget."},
  {id:60,n:"Assistens Cemetery Famous Graves — Nørrebro",a:"Nørrebro",v:["history", "quiet", "beautiful"],d:60,s:"Where Hans Christian Andersen sleeps and teenagers make out in grass",st:"This cemetery is a park where people come to sit, read, and find peace. Hans Christian Andersen is buried here. So are Søren Kierkegaard and other Danish giants. But what makes it special is that life happens here too. It\'s a place where death and picnics coexist. Flowers on graves. Families on blankets. The contradiction is beautiful.",im:"It\'s 1875. Andersen is buried. Children play in the grass above. He wrote stories about the Little Match Girl starving in the cold. Now children laugh in the warm sun above his bones.",t:"This cemetery is a park where people come to sit, read, and find peace. Hans Christian Andersen is buried here. So are Søren Kierkegaard and other Danish giants. But what makes it special is that life happens here too. It\'s a place where death and picnics coexist. Flowers on graves. Families on blankets. The contradiction is beautiful.\",im:\"It\'s 1875. Andersen is buried. Children play in the grass above. He wrote stories about the Little Match Girl starving in the cold. Now children laugh in the warm sun above his bones.\",t:\"Rantzausgade 60, Nørrebro. Free entry. S-train to Nørrebro Station. Open dawn-dusk. Pick up a cemetery map at entrance. Visit early morning for silence.",c:["history_big", "parks", "famous_dead"],r:"g",nn:"København",ns:"Cykelenes by hvor sjælen er fri.",nst:"København er en by hvor cyklister dikterer tempoet, og bryggerierne definerer kulturen. Her blander københ avnerne traditionel hygge med moderne innovation. Hver kvarter har sin egen personlighed, fra hippe Vesterbro til kunstnerige Nørrebro. Fiskebilerne ved havnen fortæller historierne om en maritime arv, der mødes med samtid.",nt:"Tag bussen eller cyklen. Søg efter små værtshuse med øl på tøm. Respekter Christiania-reglerne. Badning i haven er helt legalt. Øl og kaffe driver
