{id:52, n:"Downtown Cairo Walking — Art Deco and Empty Streets", a:"Downtown Cairo", v:["architecture", "neighbourhoods", "history", "beautiful"], d:30, s:"The streets where Cairo tried to be Paris 100 years ago—art deco buildings, elegant cornices, balconies that reach across streets.", st:"Downtown Cairo is 19th-century European architecture transplanted to the Nile. The buildings are magnificent. Many are being restored. Many are collapsing. Some are both at the same time. Walk early in the morning—the light is perfect, the streets are emptier, you can actually see the detail of what was built.\n\nTahrir Square, the Muhammad Ali Street neighbourhood, the streets around Midan Talaat Harb—this is where you see what wealth looked like 100 years ago. It\'s melancholic. It\'s beautiful.", im:"Walking down a wide street lined with belle-époque buildings. Ornate balconies overhead. Few cars, few people. Sunlight hitting stone. A café opening its chairs.", t:"Central location. Walk from Tahrir Square. Best at dawn (6-8am) or late afternoon (4-6pm). Explore side streets, especially around Midan Talaat Harb and Muhammad Ali. The area is safe during the day; at night use Uber. Allow 2-3 hours. Bring a camera but be respectful about photographing people.", c:["architecture", "neighbourhoods", "history"], r:"g", nn:"وسط البلد", ns:"شوارع حيث حاولت القاهرة أن تكون باريس", nst:"وسط البلد هو العمارة الأوروبية من القرن التاسع عشر المنقولة إلى النيل. المباني رائعة.", nt:"موقع مركزي. امش من ميدان التحرير. الأفضل عند الفجر (6-8 صباحاً) أو في آخر بعد الظهر."},
{id:53, n:"Dokki Market — Where Cairo Actually Eats", a:"Dokki", v:["food", "local", "markets"], d:20, s:"The vegetable and fruit market where Cairo\'s middle class does its shopping—no tourists, real prices, locals in a hurry.", st:"Dokki Market is on Soliman Gohar Street. It\'s a working market: produce stalls, butchers, fishmongers. You\'re surrounded by Egyptians buying dinner. The prices are honest. The energy is rush. It\'s the opposite of Khan El-Khalili\'s staged performance—this is where Cairo actually lives.\n\nGo early morning (6-9am) when the market is fullest. The colours are astounding. You can buy fruit that tastes like fruit.", im:"A narrow street lined with wooden crates of vegetables. Voices shouting prices in Arabic. The smell of fresh herbs and citrus. People moving fast, purposeful.", t:"In Dokki neighbourhood, west bank of the Nile. Metro line 2 (Dokki station) or Uber. Open 6am–2pm daily. Go early, before heat. Bring a bag if you want to buy fruit. The area is completely safe. Don\'t bring expensive cameras or jewellery—it\'s a working-class neighbourhood, not a tourist zone. Allow 1-2 hours.", c:["food", "local", "markets"], r:"g", nn:"سوق الدقي", ns:"سوق الخضار والفاكهة حيث تتسوق الطبقة الوسطى بالقاهرة", nst:"سوق الدقي على شارع سليمان جوهر. سوق عامل: أكشاك المنتجات والجزارين والسمكاريين.", nt:"في حي الدقي، الضفة الغربية للنيل. خط المترو 2 أو Uber. مفتوح 6 صباحاً–2 ظهراً يومياً."},
{id:54, n:"6 October Bridge at Dusk — City-Wide View", a:"Downtown Cairo", v:["high_spots", "beautiful", "free entry"], d:15, s:"The highest point you can reach in downtown Cairo where the entire city spreads below as the light changes.", st:"The 6 October Bridge is a major traffic crossing, but at dusk it\'s something else. The road narrows as it slopes. The light hits the city and everything is gold. You can see from the pyramids in the west to the city sprawling east. The Nile curves below.\n\nStand at the bridge\'s highest point. No one else is stopping. Cars pass. The city is happening all around you. The scale is overwhelming.", im:"Standing on a bridge. The entire city below. Light turning gold. The Nile a ribbon. A million windows lighting up.", t:"Crosses the Nile north of downtown. Use Uber or taxi—don\'t walk on the bridge. Go around 5-6pm in winter (sun earlier in summer). Spend 15-30 minutes. The view is free. The bridge is safe but busy with traffic. This is a drive-by experience, not a long stop.", c:["high_spots", "beautiful", "free entry"], r:"g", nn:"جسر 6 أكتوبر", ns:"أعلى نقطة يمكنك الوصول إليها في وسط القاهرة", nst:"جسر 6 أكتوبر هو عبور حركة مرور رئيسي، لكن عند الغروب فهو شيء آخر.", nt:"يعبر النيل شمال وسط البلد. استخدم Uber أو سيارة أجرة. اذهب حوالي 5-6 مساءً في الشتاء."},
{id:55, n:"Al Muizz Street — The Medieval City Pedestrianized", a:"Islamic Cairo", v:["neighbourhoods", "history", "walking"], d:30, s:"The oldest street in Cairo, closed to cars, where medieval gates still stand and the muezzin calls at actual prayer times.", st:"Al Muizz Street is the spine of Islamic Cairo. It\'s been the main bazaar for over 1,000 years. It was pedestrianized in 2013, so now you can actually walk without cars. The medieval gates of Bab al-Futuh and Bab al-Zuweila still stand at each end. Mosques line the street. The architecture is extraordinary.\n\nGo early morning or just before evening prayer. The call to prayer echoes off the medieval stone. The light is different. The commerce slows. It\'s one of the most important streets in Islamic history and you can walk it for free.", im:"A narrow street lined with medieval stone buildings. Narrow shopfronts. A minaret rising. The call to prayer echoing. Few crowds. Light filtered from above.", t:"Pedestrian street in Islamic Cairo, running north-south. Enter near Bab al-Futuh (north) or Bab al-Zuweila (south). Metro line 2 (Al-Ataba station) nearby or Uber to one of the gates. Open all day. Dress respectfully (cover knees and shoulders). Daytime is completely safe with foot traffic. Don\'t carry expensive items or wear obvious jewellery. Allow 2-3 hours to walk and explore.", c:["neighbourhoods", "history", "walking"], r:"g", nn:"شارع المعز", ns:"أقدم شارع في القاهرة، مغلق السيارات", nst:"شارع المعز هو العمود الفقري للقاهرة الإسلامية. كان البازار الرئيسي لأكثر من 1000 سنة.", nt:"شارع المشاة في القاهرة الإسلامية. ادخل بالقرب من باب الفتوح (شمال) أو باب زويلة (جنوب)."},
{id:56, n:"Abdeen Palace Museum — Royalty in the City", a:"Downtown Cairo", v:["history", "museums"], d:60, s:"The palace where Egyptian kings actually lived—furniture, jewels, and the personal objects that reveal how the monarchy was actually lived.", st:"Abdeen Palace was built for Khedive Ismail in 1872. It\'s enormous. It contains the rooms where Egyptian history happened. The throne room is massive. The private apartments show how the royal family lived. There are carriages, weapons, ceremonial robes. The scale of Egypt\'s royal power is in the objects.\n\nMost visitors don\'t know it exists. The Egyptian Museum is famous. This is better.", im:"A gilded throne room. Sunlight through tall windows. Polished marble floors. Portraits of kings on walls. A sense of power and isolation.", t:"Located in downtown Cairo near the old government district. Metro line 1 (Al-Sayyida Zainab) or Uber. Entry 250 EGP (about $5). Open daily 9am–4pm, closed Fridays. Dress neatly (this is a formal palace). Allow 2 hours minimum. Photography may be restricted in some rooms. The museum is well-maintained and safe.", c:["history", "museums"], r:"g", nn:"قصر عابدين", ns:"القصر حيث عاش الملوك المصريون فعلياً", nst:"تم بناء قصر عابدين للخديوي إسماعيل في عام 1872. إنه ضخم جداً.", nt:"يقع في وسط القاهرة بالقرب من الحي الحكومي القديم. خط المترو 1 أو Uber."},
{id:57, n:"Mohamed Nagui Museum — Egyptian Modernism", a:"Zamalek", v:["art", "museums", "free entry"], d:60, s:"The home and studio of Egypt\'s most important 20th-century painter—every room is still exactly as he left it, including works in progress.", st:"Mohamed Nagui lived and worked in this Zamalek villa from 1941 until his death. His paintings cover the walls. His studio is frozen in time. The light comes through the same windows where he worked. You walk through a complete Egyptian modernist life.\n\nThe museum is small and rarely crowded. The paintings are extraordinary—he bridges East and West. This is where to understand modern Egyptian art.", im:"Walking into an artist\'s studio. Paint on tables. Sketches pinned to walls. A painting half-finished on an easel. Light from tall windows. The Nile visible.", t:"Located in Zamalek. Address: 15 Al-Saray Street, Zamalek. Metro line 2 or Uber. Entry free (donations welcomed). Open Tuesday–Sunday 10am–5pm, closed Mondays. Allow 1-1.5 hours. The area is very safe. Call ahead to confirm opening hours (+20 2 728 5880).", c:["art", "museums", "free entry"], r:"y", nn:"متحف محمد ناجي", ns:"منزل واستوديو أهم رسام مصري حديث", nst:"عاش محمد ناجي وعمل في هذه الفيلا في الزمالك منذ عام 1941 حتى وفاته.", nt:"يقع في الزمالك. الدخول مجاني. مفتوح الثلاثاء–الأحد 10 صباحاً–5 مساءً."},
{id:58, n:"Heliopolis — The Garden City Model", a:"Heliopolis", v:["neighbourhoods", "history", "architecture"], d:45, s:"A planned neighbourhood from 1905 where Belgian industrialist Baron Empain built an entire city—art nouveau buildings, wide avenues, a total vision.", st:"Heliopolis is a rarity: a complete planned city from a century ago, still intact. Baron Empain hired European architects and built an entire neighbourhood with art nouveau villas, Belle Époque squares, a palace for himself (and it\'s bizarre—a mixture of French château and Egyptian Revival). The wide avenues are tree-lined. The buildings are beautiful.\n\nIt\'s where Cairo\'s wealth moved in 1905. Some of it has decayed. Some of it\'s being restored. Walking here is like walking through a moment in time that never quite left.", im:"Walking down a wide, tree-lined avenue. Grand villas set back from the street. Art nouveau details on buildings. Few cars. Peaceful.", t:"North of downtown. Metro line 2 (Heliopolis stations) or Uber. The area is large; hire a taxi or Uber to drive you around for 1-2 hours. The Palace of Baron Empain (Qasr al-Nile Museum) has limited hours and may be closed for restoration. Walk the main avenues and admire the architecture from outside. The neighbourhood is very safe during the day. Allow 2-3 hours.", c:["neighbourhoods", "history", "architecture"], r:"g", nn:"هليوبوليس", ns:"مدينة مخطط لها من عام 1905", nst:"هليوبوليس نادرة: مدينة مخطط لها بالكامل من قبل قرن، لا تزال سليمة.", nt:"شمال وسط البلد. خط المترو 2 أو Uber. الحي كبير جداً."},
{id:59, n:"Papyrus Institute — How to Spot Real vs. Fake", a:"Downtown Cairo", v:["craft", "local"], d:30, s:"A workshop where they still make papyrus the ancient way—you watch them grow papyrus plants, strip them, press them, and paint them.", st:"The Papyrus Institute is a small workshop run by Egyptologists who wanted to preserve the ancient technique. They grow papyrus plants on-site. They show you how to harvest them, how to strip the fibre, how to layer and press it into sheets. Then they paint scenes from ancient Egypt on the sheets.\n\nThe real skill is in pressing—get it wrong and the papyrus tears. The workshop produces real papyrus (expensive, lasts thousands of years) and can show you exactly why tourist papyrus is fake (it\'s banana skin pressed and painted). You learn something, and everything they make is legitimately done the old way.", im:"Watching a worker strip a papyrus stalk. Fine green fibres. Pressing the fibres together. The sheet forming. A paintbrush touching the finished papyrus.", t:"Located in downtown Cairo. Address varies; book through your hotel or a tour company (it\'s run on small-group appointments, not walk-ins). Uber is the way to get there. Entry and workshop: about 50-100 EGP. Allow 45 minutes to an hour. You\'ll see authentic work and can ask questions. The area around the institute is not a major tourist zone but is safe during the day.", c:["craft", "local", "free entry"], r:"y", nn:"معهد البردى", ns:"ورشة عمل حيث لا تزال تصنع البردي بالطريقة القديمة", nst:"معهد البردى عبارة عن ورشة عمل صغيرة يديرها علماء مصريات.", nt:"يقع في وسط القاهرة. احجز من فندقك. الدخول والورش حوالي 50-100 جنيه مصري."},
{id:60, n:"Garden City — Where Embassies Actually Are", a:"Garden City", v:["neighbourhoods", "quiet"], d:20, s:"A planned residential neighbourhood from 1898 where wide streets curve, embassies hide behind walls, and it\'s one of Cairo\'s safest places to walk.", st:"Garden City was designed at the same time as Heliopolis, but by British planners. The streets curve. The buildings are set back. There are walls. It\'s formal but not stuffy—it\'s genuinely pleasant to walk through. Many embassies are here. There are old colonial buildings, green spaces, a sense of order.\n\nIt\'s one of the safest areas to walk in Cairo because it\'s well-maintained and relatively empty. The Nile Corniche forms one edge. It\'s a brief escape from chaos.", im:"Walking down a curved street lined with walls and gates. Trees visible behind the walls. Quiet. A few parked cars. A sense of controlled peace.", t:"South of downtown. Walk from Tahrir Square (10-15 min) or use Uber. The area is very safe to walk during the day and evening. Streets are tree-lined and pleasant. Allow 30-45 minutes for a walk. Best combined with a Corniche walk or a visit to Abdeen Palace. Bring water.", c:["neighbourhoods", "quiet", "history"], r:"g", nn:"جاردن سيتي", ns:"حي سكني مخطط من عام 1898", nst:"تم تصميم جاردن سيتي في نفس الوقت الذي تم تصميم هليوبوليس فيه، لكن من قبل المخططين البريطانيين.", nt:"جنوب وسط البلد. امش من ميدان التحرير أو استخدم Uber. المنطقة آمنة جداً للمشي."},
{id:61, n:"Khan El-Khalili Spice & Tea Stalls — The Back Half", a:"Islamic Cairo", v:["food", "markets", "local"], d:45, s:"The tourist part of Khan El-Khalili sells scarves. The back half sells spices, herbs, and tea in quantities measured by the handful—this is where locals actually shop.", st:"Everyone goes to Khan El-Khalili. Almost no one goes to the back half. Past the copper souks and jewellery stalls, the spice section opens up. Mounds of saffron, cardamom, dried hibiscus, fresh mint, every herb Egypt grows. The smell is overwhelming. The colours are vivid. Merchants sell by the kilo or handful to locals and restaurants.\n\nYou can buy enough hibiscus tea for a pound for $2. The spices are fresh, real, not the stale stuff in tourist bottles. The energy is completely different—people are here to buy, not browse.", im:"Facing a wooden counter stacked with pyramids of spices. Red hibiscus, gold saffron, green cardamom seeds. The smell so strong it\'s almost visible.", t:"Deep in Khan El-Khalili market, past the central tourist sections. Go early morning (8-10am) or late afternoon (5-7pm) to avoid heat and crowds. Get a bit lost on purpose—that\'s how you find it. The vendors are used to tourists looking for the \'real\' market and will help direct you. Daytime is completely safe. Bring small bills (the vendors make change). Allow 45 minutes to an hour to explore and shop.", c:["food", "markets", "local"], r:"g", nn:"خان الخليلي أقسام التوابل والشاي", ns:"الجزء السياحي من خان الخليلي يبيع الأوشحة، الجزء الخلفي يبيع التوابل", nst:"يذهب الجميع إلى خان الخليلي. تقريباً لا أحد يذهب إلى النصف الخلفي.", nt:"عميق في سوق خان الخليلي، بعد أقسام السياحة المركزية. اذهب في الصباح الباكر أو بعد الظهر."},
{id:62, n:"Saqqara Day Trip — Oldest Stone Pyramid", a:"Day Trips", v:["day_trips", "history", "ancient"], d:90, s:"The Step Pyramid of Djoser (2670 BCE) is 4,700 years old and you can walk inside its underground chambers—the oldest monumental stone structure on Earth.", st:"Saqqara is what Giza should have been—less crowded, genuinely awe-inspiring, and you can actually go inside. The Step Pyramid was the first ever built. Walk through its limestone tunnels and see hieroglyphs and reliefs thousands of years old. Recently, the Tomb of Chaty Mehu was opened for the first time—the hieroglyphs look painted last week.\n\nThe scale is overwhelming. The engineering is impossible. Almost no crowds makes it feel like archaeology, not tourism.", im:"Walking through a dark stone corridor. A torch catches hieroglyphics painted red and blue. The floor is thousands of years old.", t:"About 30km south of Cairo. Hire a private driver (400-600 EGP for the day) or book a tour. Entry 350 EGP. Open 8am–5pm. Go early to beat heat and crowds. Bring water and sunscreen. Your driver can wait. The site is safe during the day with foot traffic.", c:["day_trips", "history", "ancient"], r:"g", nn:"سقارة", ns:"هرم جوسر ذو الدرجات الأقدم", nst:"سقارة هي ما كان يجب أن تكون الجيزة. يمكنك المشي بالداخل.", nt:"30 كم جنوب القاهرة. استأجر سائق أو احجز جولة. 350 جنيه الدخول."},
{id:63, n:"Al-Azhar Park — Green Walls Above the City", a:"Islamic Cairo", v:["parks", "free entry", "high_spots"], d:30, s:"A massive restored garden on the Fatimid city walls where 40,000 trees and perfect vies of Islamic Cairo create an unexpected escape.", st:"Al-Azhar Park wasn\'t there until 2005 when the Aga Khan restored the medieval walls. It\'s wild—you enter from a crowded street and suddenly you\'re overlooking all of Islamic Cairo from green space. Locals bring families. Picnics happen. Kids run through gardens. The medieval city below, the modern city beyond.\n\nGo early morning before heat. The park is managed and safe. You can see for miles from the walls.", im:"Sitting under olive trees. The medieval gate visible. Stone walls stretching. Water sounds. City noise below.", t:"Entry free. Open daily 8am–6pm (later in summer). Multiple entrances; closest is on Sultan Qaitbay near Khan El-Khalili. Use Uber to get there, don\'t walk at night. Bring water. Allow 2-3 hours.", c:["parks", "free entry", "high_spots"], r:"g", nn:"حديقة الأزهر — الجدران الخضراء", ns:"حديقة على جدران المدينة الفاطمية", nst:"تم استعادة الحديقة سنة 2005. غرس 40000 شجرة على الجدران القديمة.", nt:"الدخول مجاني. مفتوح 8 صباحاً–6 مساءً. استخدم أوبر. اجلب ماء."},
{id:64, n:"Early Morning Fish Market — Bulaq Waterfront", a:"Bulaq", v:["food", "early_morning", "local"], d:20, s:"5am at the Bulaq waterfront where fishing boats arrive and the market explodes into negotiation—a working marketplace where millions of pounds of fish move in three hours.", st:"Bulaq fish market starts at 4am when boats arrive. By 5am it\'s chaos—ice, fish, noise, negotiation. Restaurant owners buying for the day. Fishmongers filleting and packing. The smell is salt and ice and river.\n\nYou\'re the only tourist watching. The energy is completely different from daylight Cairo. This is a working market where millions move in three hours. Most people see nothing of it.", im:"Ice-filled crates of fish. Men in rubber boots. A filleting knife flashing. The Nile dark in the background. Sound of negotiation and ice. The smell overwhelming.", t:"Bulaq waterfront, west bank of the Nile. Use Uber; do not go alone at night. Arrive 5-6am. Go with a local guide if possible. The market is very active and safe at this hour with foot traffic, but the neighbourhood isn\'t ideal at night. Stay 30-45 minutes, then breakfast at a café. This is not a tourist experience—you\'re genuinely present for a working market.", c:["food", "early_morning", "local"], r:"y", nn:"سوق السمك الصباحي", ns:"5 صباحاً عند الواجهة البحرية", nst:"يبدأ السوق في الساعة 4 صباحاً. بـ 5 صباحاً مليء بالفوضى والسمك والثلج.", nt:"واجهة بولاق. استخدم أوبر. وصول 5-6 صباحاً مع دليل محلي."}

]
,
{id:45, n:"Al-Azhar Park — Green in the Stone City", a:"Islamic Cairo", v:["parks", "free entry", "nature"], d:30, s:"A massive garden carved into the Fatimid city walls, where green runs across stone and the whole city spreads beneath you.", st:"Al-Azhar Park wasn\'t there until 2005. The Aga Khan Trust rebuilt the medieval walls and planted 40,000 trees on top. It\'s wild: you walk in from a crowded neighbourhood and suddenly you\'re in green space overlooking all of Islamic Cairo. Locals come here to escape. Families eat picnics. Kids run through gardens. The wall views are exceptional—the medieval city below, the modern city beyond.\n\nGo early morning, before heat. The park is managed and safe. You can see for miles.", im:"Sitting under olive trees. The medieval gate visible. Stone walls stretching. The sound of water. City noise below.", t:"Entry free. Open daily 8am–6pm (later in summer). Multiple entrances; closest is on Sultan Qaitbay street near Khan El-Khalili. Use Uber to get there, don\'t walk at night. Bring water. Allow 2-3 hours.", c:["parks", "free entry", "nature"], r:"g", nn:"حديقة الأزهر", ns:"حديقة ضخمة محفورة في جدران مدينة فاطمية", nst:"لم تكن حديقة الأزهر موجودة حتى عام 2005. أعاد المركز الآغاخاني بناء الجدران الوسيطة وزراعة 40000 شجرة في الأعلى. يأتي السكان المحليون هنا للهروب.", nt:"الدخول مجاني. مفتوح يومياً 8 صباحاً–6 مساءً. استخدم Uber للوصول. اجلب الماء."},
{id:46, n:"Fishawy Café — Coffee Since Napoleon", a:"Islamic Cairo", v:["local", "history", "free entry"], d:15, s:"The oldest coffee shop in Cairo, operating since the 1700s, where the same sheesha pipes and marble tables have held conversations for three centuries.", st:"Fishawy is at the centre of Khan El-Khalili. The café hasn\'t changed its layout or furniture in centuries. Marble tables, brass inlay, waiters who have worked there for decades. You order ahwa (coffee) or shay (tea), and sit in the exact same seat where Nasser sat, where Nagib Mahfouz wrote, where countless Cairenes have watched the market flow past.\n\nMornings are quiet. Evenings fill with locals playing backgammon and smoking sheesha. The energy is completely different from daytime tourist rush.", im:"Sitting at a tiny marble table. The waiter sets down thick black coffee in a small brass cup. Sheesha smoke curling. The market beyond. The sound of hundreds of conversations.", t:"Located in Khan El-Khalili market. Coffee or tea costs 5-10 EGP (pennies). Open early morning to late evening. Go before 11am or after 5pm to see locals. The neighbourhood is safe during the day; don\'t walk back to your hotel alone after dark—use Uber.", c:["local", "history", "free entry"], r:"g", nn:"قهوة الفشاوي", ns:"أقدم مقهى في القاهرة، يعمل منذ السبعينيات", nst:"الفشاوي في قلب سوق خان الخليلي. المقهى لم يغير تخطيطه أو أثاثه لقرون. طاولات رخام وصناديق نحاس وعاملون عملوا هناك لعقود.", nt:"تكلفة القهوة أو الشاي 5-10 جنيه مصري. مفتوح من الصباح الباكر إلى المساء المتأخر."},
{id:47, n:"Maadi Corniche — Cairo\'s Quietest Neighbourhood", a:"Maadi", v:["local", "nature", "quiet"], d:20, s:"An expat neighbourhood frozen in calm—wide streets, bookshops, cafes—where the Nile is accessible and the city noise disappears.", st:"Maadi is the relief valve for Cairo. Built in the 1960s and 70s as a planned neighbourhood for Egypt\'s professional classes, it has stayed quiet. Tree-lined streets, small bookstores, vintage cafes. The Corniche here is wider than downtown. Families walk. The air feels different.\n\nYou can actually breathe. The Nile feels real, not city-sized. It\'s where Egyptians go when Cairo overwhelms them.", im:"Walking along a quiet street. Fig trees overhead. A café terrace with few tables. The Nile visible between buildings. Absolutely calm.", t:"South of downtown. Metro line 1 (Corniche Maadi station) or Uber. The area is safe to walk during the day and evening. Good restaurants and cafes. Allow 2-3 hours to wander and sit. This is where tourists rarely go, which makes it gold.", c:["neighbourhoods", "local", "quiet", "nature"], r:"g", nn:"كورنيش المعادي", ns:"حي هادئ مجمد في الهدوء", nst:"المعادي هو صمام التخفيف لتغيير القاهرة. تم بناؤها في الستينيات والسبعينيات كحي مخطط للطبقة المهنية المصرية.", nt:"جنوب وسط البلد. خط المترو 1 أو Uber. يمكنك المشي بأمان خلال اليوم والمساء."},
{id:48, n:"Coptic Cairo — Christian Quarter Hidden in Stone", a:"Islamic Cairo", v:["history", "neighbourhoods", "religious"], d:20, s:"The oldest church in Egypt sits in the basement of another building, down stone steps where Coptic Christianity has rooted for 2,000 years.", st:"Coptic Cairo is a pocket of ancient Christianity inside Islamic Cairo. The Hanging Church (Al-Muallaqa) literally hangs over a Roman fortress from the 1st century. The Ben Ezra Synagogue is built on the spot where the Nile saved baby Moses. These are not museum pieces—they are still working, living places of worship.\n\nYou walk down narrow alleys, through unmarked doors, down spiraling stone stairs. The light changes. The sound muffles. You\'re in another Cairo entirely, one that predates Islam by centuries. It\'s perfectly safe during the day. The people are used to visitors.", im:"Stone stairs descending. The air cooler. A vaulted ceiling appearing. Icons on walls. Light filtering through tiny windows. The sound of water and ancient stone.", t:"Located south of Islamic Cairo. Use Uber or taxi; the alleys are hard to navigate. Entry to main churches is free (donations welcomed). Allow 2-3 hours. Most churches close for 3 hours in afternoon (around 1pm-4pm). Go in the morning. Women should dress modestly (cover knees and shoulders). Completely safe during the day with foot traffic.", c:["history", "neighbourhoods", "religious"], r:"y", nn:"القاهرة القبطية", ns:"ربع مسيحي مخفي في الحجر", nst:"القاهرة القبطية هي جيب المسيحية القديمة داخل القاهرة الإسلامية. كنيسة المعلقة حرفيا معلقة فوق حصن روماني من القرن الأول.", nt:"يقع جنوب القاهرة الإسلامية. استخدم Uber أو سيارة أجرة. الدخول إلى الكنائس الرئيسية مجاني (التبرعات مرحب بها)."},
{id:49, n:"Manara Lighthouse — Gezira Island at Sunset", a:"Nile Islands", v:["high_spots", "sunset", "beautiful"], d:15, s:"The lighthouse at the southern tip of Gezira Island where the Nile bends and the light turns everything gold.", st:"The Manara lighthouse isn\'t tall, but it sits at the exact point where the geography of the Nile changes. At sunset the light hits the water at an angle that makes everything glow. The island is peaceful. Few tourists find it. Locals come here in the evening with friends.\n\nYou can sit on the rocks below. The water is still. The city lights are switching on across the river. It\'s the quietly beautiful side of Cairo that nobody photographs.", im:"Sitting on warm rocks. The lighthouse above. The Nile bending. Light gold on water. The city becoming silhouettes across the river.", t:"Located on the southern tip of Gezira Island. Uber or taxi from downtown (15 min). The area is safe but quiet at night; go at sunset (around 5-6pm in winter), don\'t stay after dark. No entrance fee. Allow 1-2 hours. Bring water.", c:["high_spots", "sunset", "beautiful", "romantic_water"], r:"g", nn:"منارة الجزيرة", ns:"المنارة في الطرف الجنوبي لجزيرة الجزيرة", nst:"منارة الجزيرة ليست طويلة، لكنها تقع في النقطة الدقيقة حيث يتغير جغرافيا النيل.", nt:"يقع على الطرف الجنوبي من جزيرة الجزيرة. Uber أو سيارة أجرة من وسط البلد. اذهب عند الغروب (حوالي 5-6 مساءً في الشتاء)، لا تبقى بعد الظلام."},
{id:50, n:"Dahshur Bent Pyramid — The Impossible Angle", a:"Day Trips", v:["day_trips", "history", "ancient", "weird"], d:90, s:"The only pyramid with its original limestone still intact—and the angle of the sides changes halfway up the slope.", st:"The Bent Pyramid is a geological accident that turned out to be perfect. The architects got halfway up and realized the angle was wrong. Instead of starting over, they changed it—a 54-degree lower slope, then 43 degrees above. It looks crooked. It looks wrong. It is masterfully wrong.\n\nNo crowds. You can touch the original limestone casing. Red pyramid is next to it—smoother, later, still covered in parts of its original finish. You can actually climb inside both.", im:"Standing in front of the pyramid. The change in angle obvious. The white limestone catching light. No other tourists. The slope seeming physically impossible.", t:"40km south of Cairo. Hire a driver (500-700 EGP for the day) or book a tour through your hotel. Entry 150 EGP for Bent Pyramid, 150 EGP for Red Pyramid. Open 8am–5pm. Go early. Bring water, sun protection, and a strong torch if you go inside. The site is safe and very quiet.", c:["day_trips", "history", "ancient", "weird"], r:"g", nn:"هرم دهشور المنحني", ns:"الهرم الوحيد مع حجر الجير الأصلي سليماً", nst:"هرم دهشور المنحني هو حادث جيولوجي تحول إلى أنه مثالي.", nt:"40 كم جنوب القاهرة. استأجر سائق. الدخول 150 جنيه مصري."},
{id:51, n:"Zamalek Galleries — Where Cairo\'s Art Scene Actually Happens", a:"Zamalek", v:["art", "local", "free entry"], d:20, s:"An island in the Nile filled with contemporary art galleries, design studios, and the beating heart of Egypt\'s art world.", st:"Zamalek is where contemporary Egyptian art lives. The galleries here aren\'t tourist traps—they show work by serious artists. The Townhouse Gallery shows emerging talent. Zamalek Atelier is a working artist space. Walk down side streets and you\'ll find studio doors open, people working, exhibitions you weren\'t expecting.\n\nSaturday mornings are best. The galleries open late (11am). You can move between them in an hour. The vibe is international but genuinely local.", im:"Walking through a white gallery space. Paintings that make you stop. A sculptor in a nearby studio visible through a window. The Nile visible from upper windows.", t:"Island in the Nile, north of downtown. Metro line 2 (Saad Zaghloul station) or Uber. Most galleries are free to enter. Open usually 11am–6pm, closed Mondays and Fridays morning. Dress casually but respectfully. The area is very safe, especially during the day and early evening. Saturday morning is peak time for locals.", c:["art", "local", "free entry"], r:"g", nn:"معارض الزمالك", ns:"جزيرة في النيل مليئة بمعارض الفن المعاصر", nst:"الزمالك هي حيث يعيش الفن المعاصر المصري. المعارض هنا ليست فخاخ سياحية.", nt:"جزيرة في النيل، شمال وسط البلد. خط المترو 2 أو Uber. معظم المعارض مجانية. مفتوح عادة 11 صباحاً–6 مساءً."},
{id:52, n:"Downtown Cairo Walking — Art Deco and Empty Streets", a:"Downtown Cairo", v:["architecture", "neighbourhoods", "history", "beautiful"], d:30, s:"The streets where Cairo tried to be Paris 100 years ago—art deco buildings, elegant cornices, balconies that reach across streets.", st:"Downtown Cairo is 19th-century European architecture transplanted to the Nile. The buildings are magnificent. Many are being restored. Many are collapsing. Some are both at the same time. Walk early in the morning—the light is perfect, the streets are emptier, you can actually see the detail of what was built.\n\nTahrir Square, the Muhammad Ali Street neighbourhood, the streets around Midan Talaat Harb—this is where you see what wealth looked like 100 years ago. It\'s melancholic. It\'s beautiful.", im:"Walking down a wide street lined with belle-époque buildings. Ornate balconies overhead. Few cars, few people. Sunlight hitting stone. A café opening its chairs.", t:"Central location. Walk from Tahrir Square. Best at dawn (6-8am) or late afternoon (4-6pm). Explore side streets, especially around Midan Talaat Harb and Muhammad Ali. The area is safe during the day; at night use Uber. Allow 2-3 hours. Bring a camera but be respectful about photographing people.", c:["architecture", "neighbourhoods", "history"], r:"g", nn:"وسط البلد", ns:"شوارع حيث حاولت القاهرة أن تكون باريس", nst:"وسط البلد هو العمارة الأوروبية من القرن التاسع عشر المنقولة إلى النيل. المباني رائعة.", nt:"موقع مركزي. امش من ميدان التحرير. الأفضل عند الفجر (6-8 صباحاً) أو في آخر بعد الظهر."},
{id:53, n:"Dokki Market — Where Cairo Actually Eats", a:"Dokki", v:["food", "local", "markets"], d:20, s:"The vegetable and fruit market where Cairo\'s middle class does its shopping—no tourists, real prices, locals in a hurry.", st:"Dokki Market is on Soliman Gohar Street. It\'s a working market: produce stalls, butchers, fishmongers. You\'re surrounded by Egyptians buying dinner. The prices are honest. The energy is rush. It\'s the opposite of Khan El-Khalili\'s staged performance—this is where Cairo actually lives.\n\nGo early morning (6-9am) when the market is fullest. The colours are astounding. You can buy fruit that tastes like fruit.", im:"A narrow street lined with wooden crates of vegetables. Voices shouting prices in Arabic. The smell of fresh herbs and citrus. People moving fast, purposeful.", t:"In Dokki neighbourhood, west bank of the Nile. Metro line 2 (Dokki station) or Uber. Open 6am–2pm daily. Go early, before heat. Bring a bag if you want to buy fruit. The area is completely safe. Don\'t bring expensive cameras or jewellery—it\'s a working-class neighbourhood, not a tourist zone. Allow 1-2 hours.", c:["food", "local", "markets"], r:"g", nn:"سوق الدقي", ns:"سوق الخضار والفاكهة حيث تتسوق الطبقة الوسطى بالقاهرة", nst:"سوق الدقي على شارع سليمان جوهر. سوق عامل: أكشاك المنتجات والجزارين والسمكاريين.", nt:"في حي الدقي، الضفة الغربية للنيل. خط المترو 2 أو Uber. مفتوح 6 صباحاً–2 ظهراً يومياً."},
{id:54, n:"6 October Bridge at Dusk — City-Wide View", a:"Downtown Cairo", v:["high_spots", "beautiful", "free entry"], d:15, s:"The highest point you can reach in downtown Cairo where the entire city spreads below as the light changes.", st:"The 6 October Bridge is a major traffic crossing, but at dusk it\'s something else. The road narrows as it slopes. The light hits the city and everything is gold. You can see from the pyramids in the west to the city sprawling east. The Nile curves below.\n\nStand at the bridge\'s highest point. No one else is stopping. Cars pass. The city is happening all around you. The scale is overwhelming.", im:"Standing on a bridge. The entire city below. Light turning gold. The Nile a ribbon. A million windows lighting up.", t:"Crosses the Nile north of downtown. Use Uber or taxi—don\'t walk on the bridge. Go around 5-6pm in winter (sun earlier in summer). Spend 15-30 minutes. The view is free. The bridge is safe but busy with traffic. This is a drive-by experience, not a long stop.", c:["high_spots", "beautiful", "free entry"], r:"g", nn:"جسر 6 أكتوبر", ns:"أعلى نقطة يمكنك الوصول إليها في وسط القاهرة", nst:"جسر 6 أكتوبر هو عبور حركة مرور رئيسي، لكن عند الغروب فهو شيء آخر.", nt:"يعبر النيل شمال وسط البلد. استخدم Uber أو سيارة أجرة. اذهب حوالي 5-6 مساءً في الشتاء."},
{id:55, n:"Al Muizz Street — The Medieval City Pedestrianized", a:"Islamic Cairo", v:["neighbourhoods", "history", "walking"], d:30, s:"The oldest street in Cairo, closed to cars, where medieval gates still stand and the muezzin calls at actual prayer times.", st:"Al Muizz Street is the spine of Islamic Cairo. It\'s been the main bazaar for over 1,000 years. It was pedestrianized in 2013, so now you can actually walk without cars. The medieval gates of Bab al-Futuh and Bab al-Zuweila still stand at each end. Mosques line the street. The architecture is extraordinary.\n\nGo early morning or just before evening prayer. The call to prayer echoes off the medieval stone. The light is different. The commerce slows. It\'s one of the most important streets in Islamic history and you can walk it for free.", im:"A narrow street lined with medieval stone buildings. Narrow shopfronts. A minaret rising. The call to prayer echoing. Few crowds. Light filtered from above.", t:"Pedestrian street in Islamic Cairo, running north-south. Enter near Bab al-Futuh (north) or Bab al-Zuweila (south). Metro line 2 (Al-Ataba station) nearby or Uber to one of the gates. Open all day. Dress respectfully (cover knees and shoulders). Daytime is completely safe with foot traffic. Don\'t carry expensive items or wear obvious jewellery. Allow 2-3 hours to walk and explore.", c:["neighbourhoods", "history", "walking"], r:"g", nn:"شارع المعز", ns:"أقدم شارع في القاهرة، مغلق السيارات", nst:"شارع المعز هو العمود الفقري للقاهرة الإسلامية. كان البازار الرئيسي لأكثر من 1000 سنة.", nt:"شارع المشاة في القاهرة الإسلامية. ادخل بالقرب من باب الفتوح (شمال) أو باب زويلة (جنوب)."},
{id:56, n:"Abdeen Palace Museum — Royalty in the City", a:"Downtown Cairo", v:["history", "museums"], d:60, s:"The palace where Egyptian kings actually lived—furniture, jewels, and the personal objects that reveal how the monarchy was actually lived.", st:"Abdeen Palace was built for Khedive Ismail in 1872. It\'s enormous. It contains the rooms where Egyptian history happened. The throne room is massive. The private apartments show how the royal family lived. There are carriages, weapons, ceremonial robes. The scale of Egypt\'s royal power is in the objects.\n\nMost visitors don\'t know it exists. The Egyptian Museum is famous. This is better.", im:"A gilded throne room. Sunlight through tall windows. Polished marble floors. Portraits of kings on walls. A sense of power and isolation.", t:"Located in downtown Cairo near the old government district. Metro line 1 (Al-Sayyida Zainab) or Uber. Entry 250 EGP (about $5). Open daily 9am–4pm, closed Fridays. Dress neatly (this is a formal palace). Allow 2 hours minimum. Photography may be restricted in some rooms. The museum is well-maintained and safe.", c:["history", "museums"], r:"g", nn:"قصر عابدين", ns:"القصر حيث عاش الملوك المصريون فعلياً", nst:"تم بناء قصر عابدين للخديوي إسماعيل في عام 1872. إنه ضخم جداً.", nt:"يقع في وسط القاهرة بالقرب من الحي الحكومي القديم. خط المترو 1 أو Uber."},
{id:57, n:"Mohamed Nagui Museum — Egyptian Modernism", a:"Zamalek", v:["art", "museums", "free entry"], d:60, s:"The home and studio of Egypt\'s most important 20th-century painter—every room is still exactly as he left it, including works in progress.", st:"Mohamed Nagui lived and worked in this Zamalek villa from 1941 until his death. His paintings cover the walls. His studio is frozen in time. The light comes through the same windows where he worked. You walk through a complete Egyptian modernist life.\n\nThe museum is small and rarely crowded. The paintings are extraordinary—he bridges East and West. This is where to understand modern Egyptian art.", im:"Walking into an artist\'s studio. Paint on tables. Sketches pinned to walls. A painting half-finished on an easel. Light from tall windows. The Nile visible.", t:"Located in Zamalek. Address: 15 Al-Saray Street, Zamalek. Metro line 2 or Uber. Entry free (donations welcomed). Open Tuesday–Sunday 10am–5pm, closed Mondays. Allow 1-1.5 hours. The area is very safe. Call ahead to confirm opening hours (+20 2 728 5880).", c:["art", "museums", "free entry"], r:"y", nn:"متحف محمد ناجي", ns:"منزل واستوديو أهم رسام مصري حديث", nst:"عاش محمد ناجي وعمل في هذه الفيلا في الزمالك منذ عام 1941 حتى وفاته.", nt:"يقع في الزمالك. الدخول مجاني. مفتوح الثلاثاء–الأحد 10 صباحاً–5 مساءً."},
{id:58, n:"Heliopolis — The Garden City Model", a:"Heliopolis", v:["neighbourhoods", "history", "architecture"], d:45, s:"A planned neighbourhood from 1905 where Belgian industrialist Baron Empain built an entire city—art nouveau buildings, wide avenues, a total vision.", st:"Heliopolis is a rarity: a complete planned city from a century ago, still intact. Baron Empain hired European architects and built an entire neighbourhood with art nouveau villas, Belle Époque squares, a palace for himself (and it\'s bizarre—a mixture of French château and Egyptian Revival). The wide avenues are tree-lined. The buildings are beautiful.\n\nIt\'s where Cairo\'s wealth moved in 1905. Some of it has decayed. Some of it\'s being restored. Walking here is like walking through a moment in time that never quite left.", im:"Walking down a wide, tree-lined avenue. Grand villas set back from the street. Art nouveau details on buildings. Few cars. Peaceful.", t:"North of downtown. Metro line 2 (Heliopolis stations) or Uber. The area is large; hire a taxi or Uber to drive you around for 1-2 hours. The Palace of Baron Empain (Qasr al-Nile Museum) has limited hours and may be closed for restoration. Walk the main avenues and admire the architecture from outside. The neighbourhood is very safe during the day. Allow 2-3 hours.", c:["neighbourhoods", "history", "architecture"], r:"g", nn:"هليوبوليس", ns:"مدينة مخطط لها من عام 1905", nst:"هليوبوليس نادرة: مدينة مخطط لها بالكامل من قبل قرن، لا تزال سليمة.", nt:"شمال وسط البلد. خط المترو 2 أو Uber. الحي كبير جداً."},
{id:59, n:"Papyrus Institute — How to Spot Real vs. Fake", a:"Downtown Cairo", v:["craft", "local"], d:30, s:"A workshop where they still make papyrus the ancient way—you watch them grow papyrus plants, strip them, press them, and paint them.", st:"The Papyrus Institute is a small workshop run by Egyptologists who wanted to preserve the ancient technique. They grow papyrus plants on-site. They show you how to harvest them, how to strip the fibre, how to layer and press it into sheets. Then they paint scenes from ancient Egypt on the sheets.\n\nThe real skill is in pressing—get it wrong and the papyrus tears. The workshop produces real papyrus (expensive, lasts thousands of years) and can show you exactly why tourist papyrus is fake (it\'s banana skin pressed and painted). You learn something, and everything they make is legitimately done the old way.", im:"Watching a worker strip a papyrus stalk. Fine green fibres. Pressing the fibres together. The sheet forming. A paintbrush touching the finished papyrus.", t:"Located in downtown Cairo. Address varies; book through your hotel or a tour company (it\'s run on small-group appointments, not walk-ins). Uber is the way to get there. Entry and workshop: about 50-100 EGP. Allow 45 minutes to an hour. You\'ll see authentic work and can ask questions. The area around the institute is not a major tourist zone but is safe during the day.", c:["craft", "local", "free entry"], r:"y", nn:"معهد البردى", ns:"ورشة عمل حيث لا تزال تصنع البردي بالطريقة القديمة", nst:"معهد البردى عبارة عن ورشة عمل صغيرة يديرها علماء مصريات.", nt:"يقع في وسط القاهرة. احجز من فندقك. الدخول والورش حوالي 50-100 جنيه مصري."},
{id:60, n:"Garden City — Where Embassies Actually Are", a:"Garden City", v:["neighbourhoods", "quiet"], d:20, s:"A planned residential neighbourhood from 1898 where wide streets curve, embassies hide behind walls, and it\'s one of Cairo\'s safest places to walk.", st:"Garden City was designed at the same time as Heliopolis, but by British planners. The streets curve. The buildings are set back. There are walls. It\'s formal but not stuffy—it\'s genuinely pleasant to walk through. Many embassies are here. There are old colonial buildings, green spaces, a sense of order.\n\nIt\'s one of the safest areas to walk in Cairo because it\'s well-maintained and relatively empty. The Nile Corniche forms one edge. It\'s a brief escape from chaos.", im:"Walking down a curved street lined with walls and gates. Trees visible behind the walls. Quiet. A few parked cars. A sense of controlled peace.", t:"South of downtown. Walk from Tahrir Square (10-15 min) or use Uber. The area is very safe to walk during the day and evening. Streets are tree-lined and pleasant. Allow 30-45 minutes for a walk. Best combined with a Corniche walk or a visit to Abdeen Palace. Bring water.", c:["neighbourhoods", "quiet", "history"], r:"g", nn:"جاردن سيتي", ns:"حي سكني مخطط من عام 1898", nst:"تم تصميم جاردن سيتي في نفس الوقت الذي تم تصميم هليوبوليس فيه، لكن من قبل المخططين البريطانيين.", nt:"جنوب وسط البلد. امش من ميدان التحرير أو استخدم Uber. المنطقة آمنة جداً للمشي."},
{id:61, n:"Khan El-Khalili Spice & Tea Stalls — The Back Half", a:"Islamic Cairo", v:["food", "markets", "local"], d:45, s:"The tourist part of Khan El-Khalili sells scarves. The back half sells spices, herbs, and tea in quantities measured by the handful—this is where locals actually shop.", st:"Everyone goes to Khan El-Khalili. Almost no one goes to the back half. Past the copper souks and jewellery stalls, the spice section opens up. Mounds of saffron, cardamom, dried hibiscus, fresh mint, every herb Egypt grows. The smell is overwhelming. The colours are vivid. Merchants sell by the kilo or handful to locals and restaurants.\n\nYou can buy enough hibiscus tea for a pound for $2. The spices are fresh, real, not the stale stuff in tourist bottles. The energy is completely different—people are here to buy, not browse.", im:"Facing a wooden counter stacked with pyramids of spices. Red hibiscus, gold saffron, green cardamom seeds. The smell so strong it\'s almost visible.", t:"Deep in Khan El-Khalili market, past the central tourist sections. Go early morning (8-10am) or late afternoon (5-7pm) to avoid heat and crowds. Get a bit lost on purpose—that\'s how you find it. The vendors are used to tourists looking for the \'real\' market and will help direct you. Daytime is completely safe. Bring small bills (the vendors make change). Allow 45 minutes to an hour to explore and shop.", c:["food", "markets", "local"], r:"g", nn:"خان الخليلي أقسام التوابل والشاي", ns:"الجزء السياحي من خان الخليلي يبيع الأوشحة، الجزء الخلفي يبيع التوابل", nst:"يذهب الجميع إلى خان الخليلي. تقريباً لا أحد يذهب إلى النصف الخلفي.", nt:"عميق في سوق خان الخليلي، بعد أقسام السياحة المركزية. اذهب في الصباح الباكر أو بعد الظهر."},
{id:62, n:"Saqqara Day Trip — Oldest Stone Pyramid", a:"Day Trips", v:["day_trips", "history", "ancient"], d:90, s:"The Step Pyramid of Djoser (2670 BCE) is 4,700 years old and you can walk inside its underground chambers—the oldest monumental stone structure on Earth.", st:"Saqqara is what Giza should have been—less crowded, genuinely awe-inspiring, and you can actually go inside. The Step Pyramid was the first ever built. Walk through its limestone tunnels and see hieroglyphs and reliefs thousands of years old. Recently, the Tomb of Chaty Mehu was opened for the first time—the hieroglyphs look painted last week.\n\nThe scale is overwhelming. The engineering is impossible. Almost no crowds makes it feel like archaeology, not tourism.", im:"Walking through a dark stone corridor. A torch catches hieroglyphics painted red and blue. The floor is thousands of years old.", t:"About 30km south of Cairo. Hire a private driver (400-600 EGP for the day) or book a tour. Entry 350 EGP. Open 8am–5pm. Go early to beat heat and crowds. Bring water and sunscreen. Your driver can wait. The site is safe during the day with foot traffic.", c:["day_trips", "history", "ancient"], r:"g", nn:"سقارة", ns:"هرم جوسر ذو الدرجات الأقدم", nst:"سقارة هي ما كان يجب أن تكون الجيزة. يمكنك المشي بالداخل.", nt:"30 كم جنوب القاهرة. استأجر سائق أو احجز جولة. 350 جنيه الدخول."},
{id:63, n:"Al-Azhar Park — Green Walls Above the City", a:"Islamic Cairo", v:["parks", "free entry", "high_spots"], d:30, s:"A massive restored garden on the Fatimid city walls where 40,000 trees and perfect vies of Islamic Cairo create an unexpected escape.", st:"Al-Azhar Park wasn\'t there until 2005 when the Aga Khan restored the medieval walls. It\'s wild—you enter from a crowded street and suddenly you\'re overlooking all of Islamic Cairo from green space. Locals bring families. Picnics happen. Kids run through gardens. The medieval city below, the modern city beyond.\n\nGo early morning before heat. The park is managed and safe. You can see for miles from the walls.", im:"Sitting under olive trees. The medieval gate visible. Stone walls stretching. Water sounds. City noise below.", t:"Entry free. Open daily 8am–6pm (later in summer). Multiple entrances; closest is on Sultan Qaitbay near Khan El-Khalili. Use Uber to get there, don\'t walk at night. Bring water. Allow 2-3 hours.", c:["parks", "free entry", "high_spots"], r:"g", nn:"حديقة الأزهر — الجدران الخضراء", ns:"حديقة على جدران المدينة الفاطمية", nst:"تم استعادة الحديقة سنة 2005. غرس 40000 شجرة على الجدران القديمة.", nt:"الدخول مجاني. مفتوح 8 صباحاً–6 مساءً. استخدم أوبر. اجلب ماء."},
{id:64, n:"Early Morning Fish Market — Bulaq Waterfront", a:"Bulaq", v:["food", "early_morning", "local"], d:20, s:"5am at the Bulaq waterfront where fishing boats arrive and the market explodes into negotiation—a working marketplace where millions of pounds of fish move in three hours.", st:"Bulaq fish market starts at 4am when boats arrive. By 5am it\'s chaos—ice, fish, noise, negotiation. Restaurant owners buying for the day. Fishmongers filleting and packing. The smell is salt and ice and river.\n\nYou\'re the only tourist watching. The energy is completely different from daylight Cairo. This is a working market where millions move in three hours. Most people see nothing of it.", im:"Ice-filled crates of fish. Men in rubber boots. A filleting knife flashing. The Nile dark in the background. Sound of negotiation and ice. The smell overwhelming.", t:"Bulaq waterfront, west bank of the Nile. Use Uber; do not go alone at night. Arrive 5-6am. Go with a local guide if possible. The market is very active and safe at this hour with foot traffic, but the neighbourhood isn\'t ideal at night. Stay 30-45 minutes, then breakfast at a café. This is not a tourist experience—you\'re genuinely present for a working market.", c:["food", "early_morning", "local"], r:"y", nn:"سوق السمك الصباحي", ns:"5 صباحاً عند الواجهة البحرية", nst:"يبدأ السوق في الساعة 4 صباحاً. بـ 5 صباحاً مليء بالفوضى والسمك والثلج.", nt:"واجهة بولاق. استخدم أوبر. وصول 5-6 صباحاً مع دليل محلي."}
const PHRASES = [{native:"السلام عليكم",en:"Hello (formal)"},{native:"مرحبا",en:"Hello"},{native:"شكراً",en:"Thank you"},{native:"من فضلك",en:"Please"},{native:"كم السعر؟",en:"How much?"},{native:"أين الحمام؟",en:"Where is the bathroom?"},{native:"لا أتكلم العربية",en:"I don't speak Arabic"},{native:"هل تتكلم الإنجليزية؟",en:"Do you speak English?"},{native:"وداعاً",en:"Goodbye"},{native:"ماء بارد",en:"Cold water"},{native:"مساء الخير",en:"Good evening"},
{id:11,n:"Islamic Cairo Walking — Al-Muizz Street",a:"Islamic Cairo",v:["history","neighbourhoods"],d:120,s:"Walking the ancient street where sultans once ruled—centuries of Islamic architecture.",st:"Al-Muizz Street is Islamic Cairo's main artery. Walking it reveals: mosques, madrassas, palaces, gates from centuries past.",im:"A sultan in 1300s, processing down Al-Muizz in royal ceremony.",t:"Located in Islamic Cairo. Open 24/7 (best 8am-11am before heat). Free to walk. Allow 2-3 hours.",c:["history","neighbourhoods"],r:"g",nn:"شارع المعز",ns:"القاهرة الإسلامية المشي",nst:"شارع المعز الإسلامية القاهرة سير.",nt:"الإسلامية القاهرة الشارع المعز."},
{id:12,n:"Khan el-Khalili Beyond Main Drag — Side Street Markets",a:"Khan el-Khalili",v:["market","local"],d:90,s:"Beyond tourist main street—side alleys where locals shop, authentic commerce.",st:"Khan el-Khalili is Cairo's famous bazaar. Main street is touristy; side streets are authentic: locals shopping, local commerce.",im:"A shopkeeper in 1900, selling from same khan for a century.",t:"Located in Islamic Cairo. Open 10am-10pm (varying hours per shop). Bring cash. Allow 2-3 hours.",c:["market","local"],r:"g",nn:"خان الخليلي",ns:"الأساسي الشارع وراء",nst:"خان الخليلي الجانبية الشوارع.",nt:"الخليلي خان السياق الأصلي."},
{id:13,n:"Al-Azhar Park — Best City View",a:"Islamic Cairo",v:["parks","high_spots","beautiful"],d:90,s:"Restored Islamic park atop hill overlooking entire Cairo—stunning 360-degree views.",st:"Al-Azhar Park is restored Ayyubid-era park. From the top, Cairo's sprawl reveals: mosques, rivers, desert, city chaos.",im:"A visitor in 2005, discovering newly-restored Al-Azhar Park views.",t:"Located in Islamic Cairo area (near Al-Azhar Mosque). Entry ~15 EGP. Open 8am-sunset. Photography excellent. Allow 1.5-2 hours.",c:["parks","high_spots","beautiful"],r:"g",nn:"حديقة الأزهر",ns:"الأفضل المدينة إطلالة",nst:"حديقة الأزهر المدينة إطلالة.",nt:"الإسلامية القاهرة حديقة الأزهر."},
{id:14,n:"Coptic Cairo Churches — Christian Heritage",a:"Coptic Cairo",v:["history","religious"],d:90,s:"Ancient Coptic churches preserving early Christian traditions—Hanging Church, synagogue.",st:"Coptic Cairo contains early Christian churches: Hanging Church (suspended over fortress), Ben Ezra Synagogue, churches with Coptic traditions.",im:"An early Coptic believer in 300s, worshipping in same church.",t:"Located in Coptic Cairo area. Metro or taxi to Old Cairo. Entry free (donations appreciated). Allow 1.5-2 hours.",c:["history","religious"],r:"g",nn:"الكنائس القبطية",ns:"المسيحية التراث",nst:"الكنائس القبطية التراث المسيحي.",nt:"القاهرة القبطية الكنائس."},
{id:15,n:"City of the Dead — Living Cemetery",a:"City of the Dead",v:["scary","history","weird"],d:120,s:"Vast necropolis where thousands live among tombs—unique inhabited cemetery.",st:"City of the Dead (Qarafa) is vast cemetery where thousands live in tomb structures.",im:"A inhabitant in 1950, living in Cairo's City of the Dead.",t:"Located east of central Cairo. Taxi or organized tour (safety recommended). Allow 2-3 hours.",c:["scary","history","weird"],r:"g",nn:"مدينة الموتى",ns:"الحية المقبرة",nst:"مدينة الموتى الحية المقبرة.",nt:"القاهرة الموتى مدينة."},

</div>}
{p.ef&&<p className="text-xs mt-3 pt-3" style={{color:"#555",lineHeight:1.7,borderTop:"1px solid #dcfce7"}}>🍔 {p.ef}</p>}
{p.sf&&<p className="text-xs mt-2" style={{color:"#555",lineHeight:1.7}}>🏠 {p.sf}</p>}
<div className="flex gap-2 mt-4 flex-wrap">{p.v.map(v=><span key={v} className="text-xs px-3 py-1 rounded-full" style={{background:"#f0f0ff",color:"#6366F1"}}>{VIBES.find(x=>x.id===v)?.e} {v}</span>)}</div>
<div className="mt-5">
<p className="text-xs font-bold mb-2" style={{color:"#888",letterSpacing:"0.08em",textTransform:"uppercase"}}>City Moods</p>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} style={{borderRadius:10,overflow:"hidden",aspectRatio:"2/3",background:"#eee"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>)}</div></div>
</div></div>);

const MissionCard=({m,idx})=>(
<div className="rounded-2xl p-4 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",animationDelay:`${idx*40}ms`}}>
<div className="flex items-start justify-between"><div>
<h3 className="text-base font-bold" style={{color:"white"}}>{m.title}</h3>
<p className="text-xs mt-1" style={{color:"#b8b0d0"}}>{m.places.length} places · {m.time}</p></div>
<span className="text-2xl">⚡</span></div>
<p className="text-sm mt-2" style={{color:"#8b7fb8"}}>{m.desc}</p></div>);

const CollectionView=({col,onOpenPlace,lang})=>{
const places=P.filter(p=>p.c?.includes(col.id));
return <div><div className="flex items-center gap-2 mb-3">
<span className="text-2xl">{col.emoji}</span>
<div><h2 className="text-lg font-bold" style={{color:col.color}}>{col.name}</h2>
<p className="text-xs" style={{color:"#888"}}>{col.desc} · {places.length} places</p></div></div>
<div className="flex flex-col gap-3">{places.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

const TripPlanner=({onOpenPlace,lang})=>{
const[hrs,setHrs]=useState(3);
const plan=useMemo(()=>{const s=[...P].sort(()=>Math.random()-0.5);let t=0;const picks=[];
for(const p of s){if(t+p.d>hrs*60)continue;picks.push(p);t+=p.d;if(picks.length>=8)break}return picks},[hrs]);
return <div className="mt-3">
<h2 className="text-lg font-bold" style={{color:"#1a1a2e"}}>🧭 Trip Planner</h2>
<p className="text-sm mt-1 mb-3" style={{color:"#888"}}>How many hours do you have?</p>
<div className="flex gap-2 mb-4">{[2,3,4,6,8].map(h=><button key={h} onClick={()=>setHrs(h)} className="px-3 py-1.5 rounded-full text-xs font-bold" style={{background:hrs===h?"#1a1a2e":"white",color:hrs===h?"white":"#888",border:"1.5px solid #e4e4ed",cursor:"pointer"}}>{h}h</button>)}</div>
<div className="flex flex-col gap-3">{plan.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={onOpenPlace} lang={lang}/>)}</div></div>};

function App(){
const[accepted,setAccepted]=useState(false);
const[tab,setTab]=useState("places");
const[vibe,setVibe]=useState("all");
const[area,setArea]=useState(null);
const[search,setSearch]=useState("");
const[selected,setSelected]=useState(null);
const[showPicker,setShowPicker]=useState(false);const[spinning,setSpinning]=useState(false);const[spinPlace,setSpinPlace]=useState(null);
const[activeCol,setActiveCol]=useState(null);
const[lang,setLang]=useState("en");

const filtered=useMemo(()=>P.filter(p=>{
if(vibe!=="all"&&!p.v.includes(vibe))return false;
if(area&&p.a!==area)return false;
if(search){const s=search.toLowerCase();const name=lang==="native"&&p.nn?p.nn:p.n;const hook=lang==="native"&&p.ns?p.ns:p.s;const story=lang==="native"&&p.nst?p.nst:p.st;return name.toLowerCase().includes(s)||hook.toLowerCase().includes(s)||p.a.toLowerCase().includes(s)||story.toLowerCase().includes(s)}
return true}),[vibe,area,search,lang]);

const filteredM=useMemo(()=>{if(!search)return M;const s=search.toLowerCase();return M.filter(m=>m.title.toLowerCase().includes(s)||m.desc.toLowerCase().includes(s))},[search]);

const goN=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i+1)%a.length])};
const goP=()=>{const a=activeCol?P.filter(p=>p.c?.includes(activeCol)):filtered;const i=a.findIndex(p=>p.id===selected.id);setSelected(a[(i-1+a.length)%a.length])};

useEffect(()=>{document.getElementById("loading")?.classList.add("done")},[]);
const TBGS={"places":"https://mariavheland.github.io/godostuff/textures/tex08.png","collections":"https://mariavheland.github.io/godostuff/textures/tex04.png","missions":"https://mariavheland.github.io/godostuff/textures/tex04.png","plan":"https://mariavheland.github.io/godostuff/textures/tex04.png","phrases":"https://mariavheland.github.io/godostuff/textures/tex08.png","default":"https://mariavheland.github.io/godostuff/textures/tex08.png"};if(!accepted)return <EntryGate onAccept={()=>setAccepted(true)}/>;
if(selected)return <PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP} lang={lang}/>;

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div></div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:"url('https://mariavheland.github.io/godostuff/textures/tex05.png') center/cover no-repeat"}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Cairo Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>

<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Cairo Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
