<script>
const P = [
  {id:1,n:"Great Pyramid of Khufu — Giza's Eternal Marvel",a:"Giza",v:["history", "architecture", "views"],d:20,s:"The last surviving Wonder of the Ancient World, built 4,500 years ago with 2.3 million stone blocks.",st:"Standing before the Great Pyramid is to stand at the intersection of human ambition and geological permanence. Constructed during the reign of Pharaoh Khufu (2589-2566 BCE), this limestone colossus originally rose 146.5 meters and was covered in polished white Tura limestone that gleamed like a mirror in the desert sun. Workers—recent evidence suggests they were skilled laborers, not slaves—hauled each 2.5-ton block with rope and ingenuity over decades. The internal geometry is staggering: the 4.5-acre base is level to within 15 centimeters, and the passages align with mathematical precision to stellar coordinates. Walking around its perimeter, you feel the weight of millennia; locals call it 'Khufu's Eternal House.'",im:"A Nile sunrise casts long shadows across the sand, revealing the pyramid's true scale as a distant caravan passes below.",t:"Best visited at sunrise (5-6am) to avoid crowds and heat. Hire a licensed guide; many offer astronomical interpretation. Climbing the exterior is no longer permitted, but internal passage tours are available. Bring water and sunscreen.",c:[],r:"g",nn:"هرم خوفو",ns:"أكبر أهرام الجيزة، بني قبل 4500 سنة",nst:"يعتبر من عجائب الدنيا السبع القديمة. بني الهرم في عهد الفرعون خوفو لمدة 20 سنة تقريباً باستخدام أكثر من مليوني كتلة حجرية.",nt:"الذهاب مبكراً في الصباح أفضل لتجنب الزحام. استأجر دليلاً رسمياً. احضر معك الماء والواقي من الشمس."},
  {id:2,n:"Egyptian Museum — 5,000 Years Under Glass",a:"Downtown Cairo",v:["history", "art", "architecture"],d:25,s:"Home to Tutankhamun's treasure and the world's most comprehensive collection of ancient Egyptian artifacts.",st:"The Egyptian Museum, established in 1858, is a time capsule where mummies of pharaohs rest in climate-controlled tombs and the golden mask of Tutankhamun sits behind bulletproof glass like a sleeping god. The centerpiece is the Tutankhamun gallery: at just 18 years old, this boy-king was entombed with over 5,000 treasures—gilded chariots, ceremonial daggers, sandals of papyrus and leather. Upstairs, in gallery after gallery, you'll find statues of Khafre and Menkaure, papyri inscribed with the Book of the Dead, and delicate canopic jars that held viscera 3,000 years ago. The mummy room (closed for some items during renovation) housed actual pharaohs—Ramesses II, Seti I, and dozens of others—their preserved faces still bearing traces of their mortality and power.",im:"Dim light catches the gold of Tutankhamun's mask, and for a moment you're standing in his tomb in the Valley of the Kings, holding your breath.",t:"Located in Tahrir Square, downtown. Get there early (museum opens at 9am) to beat crowds. Separate ticket for mummy room. Photography banned inside; guides available for hourly tours. Best to spend 3-4 hours minimum.",c:[],r:"g",nn:"المتحف المصري",ns:"يضم أكبر مجموعة من الآثار المصرية القديمة في العالم",nst:"المتحف يحتوي على كنز توت عنخ آمون وعدد من المومياوات الفرعونية. يعتبر من أهم المتاحف الأثرية في العالم.",nt:"يفتح من التاسعة صباحاً. استأجر دليلاً للحصول على معلومات عميقة. الكاميرات ممنوعة في الداخل."},
  {id:3,n:"Khan el-Khalili Bazaar — Sensory Overload in the Old City",a:"Islamic Cairo",v:["local", "history", "food"],d:15,s:"Medieval souk dating to 1382, where merchants still haggle over spices, textiles, and jewelry in narrow, winding streets.",st:"Khan el-Khalili is less a marketplace and more a living museum of Mamluk-era commerce. Founded by Amir Jarkas el-Khalili in 1382, this souk sprawls across dozens of interconnected courtyards where the air is thick with cardamom, saffron, and the calls of vendors. Copper workers hammer bowls near mint tea stalls; textile merchants unfurl silks and cottons in stalls so ancient the wood seems to have grown in place. The architecture itself is a lesson in medieval Cairo: carved wooden screens (mushrabiya) filter light onto shoppers below, while intricate carved doorways lead to hidden courtyards. Negotiate prices with a smile—the haggling is theater, an ancient dance between buyer and seller.",im:"Golden afternoon light filters through wooden screens, casting geometric shadows on bolts of crimson and turquoise fabric, while the calls of spice sellers echo off limestone walls.",t:"Located in Islamic Cairo, accessible by metro (line 1, Sayyida Zainab station) or taxi. Best visited in late afternoon when locals shop. Wear comfortable shoes; you'll walk for hours. Bring small bills for cash-only vendors. Don't buy gold without a scale check.",c:[],r:"g",nn:"خان الخليلي",ns:"سوق عريق يعود للقرن الرابع عشر",nst:"أحد أشهر الأسواق في القاهرة، يشتهر بتجارة التوابل والحرير والذهب والنحاس. يمثل حياة القاهرة الإسلامية القديمة.",nt:"استخدم المترو للوصول. أفضل وقت بعد الظهر. ارتد أحذية مريحة. كن مستعداً للمساومة على الأسعار."},
  {id:4,n:"Al-Azhar Mosque — Thousand Years of Faith",a:"Islamic Cairo",v:["history", "architecture", "beautiful"],d:20,s:"Founded in 970 CE, one of Islam's oldest universities and a masterpiece of Islamic architecture.",st:"Al-Azhar is more than a mosque; it's an institution of learning that has shaped Islamic thought for over a millennium. Built in 970 CE during the Fatimid dynasty, it served as both place of worship and university—a role it maintains today with thousands of students studying theology, law, and Islamic sciences. The courtyard opens to the sky with geometric precision; arcaded colonnades frame a central pool reflecting the minaret and sky. The prayer hall showcases the evolution of Islamic architecture: Fatimid arches give way to Mamluk columns, while Quranic inscriptions flow across stone like liquid prayer. The minarets, particularly the Ottoman-era tower, offer views across Islamic Cairo to the Citadel.",im:"At noon, sunlight streams through latticed windows, creating a checkerboard pattern on the prayer hall floor where scholars and worshippers move in quiet contemplation.",t:"Modest dress required (shoulders and knees covered). Remove shoes before entering prayer hall. Non-Muslim visitors welcome; avoid prayer times if possible (call out 5 times daily). Friday is busiest. Respectful silence appreciated.",c:[],r:"g",nn:"مسجد الأزهر",ns:"مسجد وجامعة إسلامية عريقة",nst:"بني سنة 970 ميلادية في عهد الدولة الفاطمية. يعتبر من أقدم وأهم الجامعات الإسلامية في العالم.",nt:"ارتد ملابس محتشمة. انزع حذاءك قبل الدخول. احترم أوقات الصلوات. الجمعة يكون مكتظاً بالزوار."},
  {id:5,n:"Cairo Tower — Urban Canvas Above the Chaos",a:"Downtown Cairo",v:["views", "modern", "beautiful"],d:10,s:"218-meter observation tower offering 360-degree views of Cairo, built in 1961 from Aswan granite.",st:"Completed in 1961 and designed by architect Naoum Baalbaki, the Cairo Tower rises from the Nile's Gezira Island like a modernist lotus blossom. Constructed from Aswan granite (the same material used in pharaonic monuments), it was built as a monument to Egyptian independence. The observation deck at 140 meters is dizzying: on clear days, you see the Giza pyramids on the western horizon, the sprawl of East Cairo toward the Muqattam hills, and the Nile braiding through the city in emerald threads. The revolving restaurant on the upper level—though dated—serves kushari and kofta as the city rotates beneath you. At sunset, Cairo transforms: the brown haze lifts, the sky ignites orange and pink, and the call to prayer rises from a thousand minarets.",im:"At sunset, the Nile turns molten gold while Cairo's minarets pierce the rose-colored sky, their calls to prayer creating a haunting symphony.",t:"Located on Gezira Island; metro line 2 (Saray el-Qobba station) or taxi. Open 9am-midnight. Elevator may be slow during peak hours. Best visited late afternoon for sunset views. Bring binoculars for distant landmarks.",c:[],r:"g",nn:"برج القاهرة",ns:"برج حديث يوفر إطلالات على المدينة",nst:"بني سنة 1961 من حجر أسوان. يوفر منصة مراقبة على ارتفاع 140 متر تطل على كل القاهرة وأهرامات الجيزة.",nt:"اذهب في المساء لمشاهدة الغروب. استخدم المترو للوصول. احضر منظاراً لرؤية المعالم البعيدة."},
  {id:6,n:"Citadel of Saladin — Fortress Above the City",a:"Islamic Cairo",v:["history", "architecture", "views"],d:25,s:"12th-century fortress that commands Cairo from a limestone ridge, built by Saladin during the Crusades.",st:"Perched on the Muqattam hill 75 meters above the city, the Citadel of Saladin is a masterpiece of medieval military architecture. Built by Saladin (Salah ad-Din) in 1176 to protect Cairo from Crusader invasion, it served as the royal residence for 700 years through the Mamluk and Ottoman eras. The walls are massive: limestone blocks fitted without mortar, towers positioned to command every approach. Inside, the Muhammad Ali Mosque dominates with its Ottoman-style dome and twin minarets of alabaster—so bright they seem carved from light itself. The Al-Gawhara Palace within is a jewel of Mamluk design with intricate lattice screens and a throne room where sultans ruled an empire. From the ramparts, the view is hypnotic: downtown sprawls north, the pyramids fade in the western haze, and the Nile winds through green strips toward the delta.",im:"From the fortress walls, Cairo unfolds like an ancient map: minarets pierce the smog, the Nile curves through concrete, and in the distance, the pyramids are barely visible through the haze.",t:"Open 8am-5pm (6pm in summer). Citadel entrance includes several buildings; pace yourself over 2-3 hours. Wear comfortable shoes for steep stairs. Bring water. Visitors with mobility issues may struggle with the terrain.",c:[],r:"g",nn:"قلعة صلاح الدين",ns:"قلعة تاريخية تطل على القاهرة من الأعلى",nst:"بنيت سنة 1176 من قبل صلاح الدين لحماية القاهرة من الصليبيين. تحتوي على مسجد محمد علي وقصور ملكية قديمة.",nt:"تفتح من الساعة الثامنة صباحاً. الصعود شاق، احضر الماء. يمكن رؤية كل القاهرة من الأعلى."},
  {id:7,n:"Coptic Cairo — Christian Heritage in a Muslim City",a:"Islamic Cairo",v:["history", "art", "hidden"],d:20,s:"Ancient Christian quarter with churches, monasteries, and the Ben Ezra Synagogue, dating back to early Christianity.",st:"In the shadow of the Citadel, Coptic Cairo preserves Christianity's place in Egypt's story. The Hanging Church (Al-Muallaqa), so named because it literally hangs above a Roman fortress gate, is Egypt's oldest church, built around the 7th century on foundations from the 1st century. Its wooden roof is carved with intricate geometric patterns; the iconostasis glows with gold. The Church of St. Sergius (Abu Serga) sits atop a crypt that legend claims harbored Mary and the infant Jesus during their flight to Egypt. Nearby, the Ben Ezra Synagogue—though now mostly empty of worshippers—holds 1,000 years of Karaite Judaism in its rafters, including the Cairo Geniza, a trove of medieval documents. The contrast is profound: in this quarter, mosque calls and church bells coexist in a city where 90% of citizens are Muslim, yet Christianity has deep roots here.",im:"Candlelight reflects off golden icons in the Hanging Church, while outside the narrow street echoes with the chants of evening prayers.",t:"Coptic Cairo is walkable; start at the Hanging Church and spiral outward. Wear modest dress; women may be offered headscarves. Many churches close at 4pm; plan accordingly. Entrance fees are minimal. A local guide adds layers of meaning.",c:[],r:"g",nn:"القاهرة القبطية",ns:"حي مسيحي قديم يحتوي على كنائس وأديرة",nst:"يضم أقدم الكنائس في مصر، بما فيها كنيسة المعلقة التي بنيت فوق قلعة رومانية قديمة.",nt:"ارتد ملابس محتشمة. اذهب في الصباح الباكر قبل إغلاق الكنائس. استأجر دليلاً لفهم التاريخ."},
  {id:8,n:"Manara El Safa Beach Club — Nile Escape",a:"Nile Islands",v:["local", "views", "food"],d:15,s:"Riverside garden and restaurant complex on the Nile, popular with locals for sunset and traditional Egyptian food.",st:"Hidden from the chaos of downtown, Manara El Safa is where Cairo's middle class escapes on warm evenings. This sprawling open-air complex sits on the Nile's edge with a garden of date palms and acacia trees. In the 1970s it was grander; now it has the charm of faded elegance—vinyl chairs, hand-painted signs, and a kitchen that produces simple, honest Egyptian food: ful medames (fava bean stew), koshari (lentils, rice, pasta), fresh tahini. Families gather after sunset, smoking shisha and playing backgammon on the terrace. The Nile flows past, dark and slow, carrying the sound of felucca sails and the honk of river taxis. This is Cairo for Cairenes, not for tour groups—the real pulse of the city.",im:"An elderly man in a galabiya tilts back in a plastic chair, smoke from his shisha curling toward the stars as the Nile flows black beneath a crescent moon.",t:"Cross to Gezira Island via 15 May Bridge, then navigate to the riverside location (ask taxi driver for 'Manara El Safa'). Open from late afternoon until midnight. Shisha, beer, and soft drinks available. Expect to spend 2-3 hours; this is not a rushed meal.",c:[],r:"g",nn:"منارة السفا",ns:"حديقة ومطعم على ضفة النيل",nst:"مكان شهير بين السكان المحليين للاستمتاع بالغروب والطعام المصري التقليدي والشيشة.",nt:"استخدم سيارة أجرة للوصول. الأفضل بعد الغروب. استرخِ هنا لعدة ساعات مع العائلات المصرية."},
  {id:9,n:"Mosque of Ibn Tulun — Simplicity as Grandeur",a:"Islamic Cairo",v:["history", "architecture", "hidden"],d:20,s:"Built in 879 CE, the largest medieval mosque by floor area, designed with austere Islamic purity.",st:"The Mosque of Ibn Tulun is Islam's answer to simplicity. Commissioned by Ahmad ibn Tulun in 879 CE—before Baghdad's great mosques, before the Alhambra—it sprawls across 20,000 square meters of courtyard and prayer hall. The interior is almost bare: massive columns march in rows, a wooden dome floats above, light filters through latticed windows. There are no gaudy decorations, no inlaid precious stones, no glass chandeliers—just the pure geometry of prayer. The minaret, added later, spirals in a unique corkscrew pattern that you can climb for views across Islamic Cairo. During Ramadan, thousands gather here to pray, and the courtyard becomes a sea of prostrate worshippers beneath the stars. The quietness is profound; despite its enormity, the mosque feels intimate—a vast, empty cathedral of faith.",im:"At dawn, the prayer hall stands nearly empty, columns casting long shadows, and the call to prayer echoes through the void like a song sung to God alone.",t:"Open daily except during prayers. Best visited early morning or late afternoon. The minaret climb is steep and narrow; not recommended for those with mobility issues. Bring water. Modest dress required. Allow 1-2 hours to appreciate the space.",c:[],r:"g",nn:"مسجد ابن طولون",ns:"أكبر مسجد وسيط من حيث المساحة",nst:"بني سنة 879 ميلادية. يتميز بالبساطة والنقاء المعماري الإسلامي، بدون زخارف فاخرة.",nt:"اذهب في الصباح الباكر. ارتد ملابس محتشمة. يمكن صعود المئذنة للحصول على منظر رائع."},
  {id:10,n:"National Concourse of Fine Arts — Contemporary Egypt",a:"Downtown Cairo",v:["art", "modern", "hidden"],d:15,s:"Museum showcasing modern and contemporary Egyptian art, from nationalist movements to contemporary installations.",st:"While tourists flock to pharaonic artifacts, the Concourse of Fine Arts holds the visual history of modern Egypt. The building itself, opened in 1908, was designed to rival European art academies—neoclassical facades with ornate interiors. Inside, galleries trace Egypt's artistic journey: early 20th-century nationalist paintings by Mahmoud Mukhtar and Abdel Halim Ibrahim; abstract works responding to the 1967 war; contemporary installations addressing migration and identity. There are portraits of Arab nationalists, revolutionary posters from the Nasser era, and provocative pieces from young artists questioning tradition. The third floor focuses on women artists—a rare acknowledgment of their contributions to Egypt's cultural narrative. Many pieces are in Arabic, requiring a guide or app to fully understand the political and social contexts.",im:"A massive Mahmoud Mukhtar sculpture of fellaheen (peasants) dominates a gallery, their limestone bodies straining against unseen weight—a monument to the land and its people.",t:"Located near Tahrir Square, downtown. Open 10am-5pm, closed Mondays. Entrance fee minimal. A guide or audio app essential for context. Less crowded than the Egyptian Museum. Allow 2 hours.",c:[],r:"g",nn:"المجلس الأعلى للفنون",ns:"متحف الفن الحديث والمعاصر المصري",nst:"يعرض تطور الفن المصري من الحركات القومية إلى الفن المعاصر، مع التركيز على الفنانين المصريين الحديثين.",nt:"قريب من ميدان التحرير. مفتوح من العاشرة صباحاً. استأجر دليلاً لفهم السياق الفني والسياسي."},
  {id:11,n:"Wikalat al-Ghuri — Cultural Hub in a Caravanserai",a:"Islamic Cairo",v:["history", "art", "local"],d:20,s:"16th-century caravanserai turned cultural center with gallery, theater, and café in historic merchant quarter.",st:"A caravanserai is a traveler's fortress: a massive courtyard surrounded by merchant stalls and sleeping quarters where traders once sheltered with their goods and livestock. Wikalat al-Ghuri, built by Amir al-Ghuri in 1504, is perhaps Cairo's best-preserved example, now ingeniously repurposed as a cultural venue. The ground floor hosts temporary art exhibitions; the upper galleries are dedicated to traditional crafts. The central courtyard hosts evening concerts—Sufi music, jazz, theater—creating an acoustic experience unlike anywhere else in Cairo. The café serves traditional mint tea and pastries while musicians tune instruments in the corners. Walking these passageways at dusk, with shadows deepening in carved doorways, you feel as if medieval merchants might materialize around any corner.",im:"Musicians in the candlelit courtyard play oud and ney as their silhouettes flicker against 500-year-old stone walls.",t:"Located in Khan el-Khalili area. Open 10am-10pm. Check schedule for evening performances. Free entry to galleries; performances have separate tickets. A café for tea and shisha. Best visited in late afternoon or evening.",c:[],r:"g",nn:"وكالة الغوري",ns:"مركز ثقافي في سراي تاريخية",nst:"بني سنة 1504، يستخدم الآن كمركز ثقافي يضم معارض فنية وحفلات موسيقية تقليدية.",nt:"بالقرب من خان الخليلي. افتح في المساء لحضور الحفلات الموسيقية. استمتع بالشاي والشيشة في الكافيه."},
  {id:12,n:"Roda Island — Nilometer and Island Sanctuary",a:"Nile Islands",v:["history", "nature", "hidden"],d:15,s:"Island home to the ancient Nilometer, a medieval agricultural measurement device, and lush gardens.",st:"Roda Island sits in the Nile's embrace like a green lung in the city's chest. Its most famous monument is the Nilometer—a remarkable engineering feat from 715 CE. This ingenious well has a staircase descending to the river; graduated markers on the walls measured the Nile's annual flood. Knowing the water level was critical: high floods brought fertile silt and prosperity; low floods meant famine. Astronomers and mathematicians worked here, calculating taxes based on the flood's height. Today, the Nilometer stands as a monument to pre-industrial hydraulic engineering. Beyond it, Roda offers quiet paths lined with date palms, a modern museum (El-Manyal Palace), gardens where Cairenes walk with their families, and cafés with views of the Nile. It's a world apart from downtown chaos, yet only a short bridge away.",im:"Afternoon light slants into the Nilometer's stone staircase, illuminating carved measurements where scribes once calculated the coming harvest.",t:"Cross to Roda via 15 May Bridge from downtown or use metro (line 1, Nile-side stations). The Nilometer has a small entrance fee. Best visited in late afternoon. Bring water. El-Manyal Palace Museum is worth a 1-hour visit.",c:[],r:"g",nn:"جزيرة الروضة",ns:"جزيرة تاريخية في النيل",nst:"تضم النيلومتر القديم، جهاز قياس فيضان النيل من العصور الوسطى، وحدائق خضراء جميلة.",nt:"استخدم الجسر أو المترو للوصول. هادئة وهانئة بعيداً عن ضجيج المدينة. استرخِ بجانب النيل."},
  {id:13,n:"Street Art Scene in Zamalek — Urban Murals",a:"Nile Islands",v:["art", "modern", "local"],d:10,s:"Contemporary street art and murals by Egyptian and international artists on walls throughout the upscale island.",st:"Zamalek, an island neighborhood of embassies and galleries, has become an unexpected canvas for Cairo's street art revolution. Post-2011 Egyptian artists began reclaiming public spaces with bold murals—some political, some whimsical. You'll find satirical critiques of government painted alongside abstract patterns, stenciled faces of revolution martyrs beside colorful geometric designs. The art is not always legal; many pieces are painted overnight and often quickly painted over by authorities, making the scene constantly evolving. Notable murals appear near the Nile Hilton, on side streets near the American University, and throughout the island's alleys. This is urban Egypt asserting its voice: irreverent, youthful, and impossible to silence completely.",im:"A massive stencil of a veiled woman's eyes peers from a white-washed wall, her gaze knowing and defiant, surrounded by Arabic script and geometric patterns.",t:"Zamalek is easily reached by metro (line 1) or taxi. Best explored on foot with a camera. Street art changes constantly; hire a street art guide for current locations. Morning light is best for photography. Respectful observation appreciated.",c:[],r:"g",nn:"فن الشارع في الزمالك",ns:"لوحات جدارية حديثة للفنانين المصريين",nst:"جزيرة الزمالك شهدت ثورة فنية حيث رسم الفنانون المصريون لوحات جريئة تعكس الواقع السياسي والاجتماعي.",nt:"استكشف الجزيرة سيراً على الأقدام. احضر كاميرا. استأجر دليل فن شارع لمعرفة أفضل المواقع."},
  {id:14,n:"Al-Refai Mosque — Dynasties and Devotion",a:"Islamic Cairo",v:["history", "architecture", "beautiful"],d:20,s:"19th-century mosque built by royal decree, burial place of Muhammad Ali's family and later rulers.",st:"Directly across from the Citadel stands Al-Refai Mosque, a monument to Egypt's complex relationship with its past. Built between 1869 and 1912, it was commissioned to honor the Refai Sufi order but became a royal mausoleum. Inside, you'll find the tombs of Muhammad Ali (the 19th-century modernizer who built the dynasty), his descendants, and even Shah Reza Pahlavi of Iran, who died in exile in Egypt. The architecture blends Ottoman and Mamluk styles: soaring arches, tilework, and calligraphy in perfect proportion. The marble floors reflect light from stained glass windows. It's less a place of active worship than a tomb-museum, where history is literally buried in stone. The contrast is haunting: outside, modern Cairo pulses; inside, the echoes of empire rest in silence.",im:"Filtered light from stained glass casts colored squares across white marble floors, where the cenotaphs of dead rulers lie in geometric rows.",t:"Opposite the Citadel; accessible by same transport. Open 8am-5pm. Entrance fee minimal. Women may be offered headscarves. Less crowded than other major mosques. Allow 1-2 hours. Respect any active prayers.",c:[],r:"g",nn:"مسجد الرفاعي",ns:"مسجد ملكي من القرن التاسع عشر",nst:"بني بين 1869 و 1912، يضم قبور محمد علي وأفراد الأسرة الملكية وحكام آخرين.",nt:"مقابل قلعة صلاح الدين. مفتوح صباحاً. أقل ازدحاماً من المساجد الأخرى. قبور مهمة في التاريخ المصري."},
  {id:15,n:"Fishawy's Café — Shisha in a Historic Hall",a:"Islamic Cairo",v:["food", "local", "history"],d:10,s:"Cairo's oldest café, operating since 1773, serving strong coffee and shisha in a labyrinth of mirrored rooms.",st:"Fishawy's is not a café; it's a temporal vortex. Open since 1773 in Khan el-Khalili, it's where Napoleon's soldiers gambled, where 19th-century poets composed verse, where Naguib Mahfouz—Egypt's Nobel laureate—sat daily with notebook in hand. The interior is a maze of mirrors, wooden lattice screens, and low cushioned seating—a design unchanged in 250 years. The smell is intoxicating: apple-scented shisha smoke, strong Egyptian coffee (ahwa), and the faint sweetness of molasses. Order an ahwa saada (unsweetened) or saada with mint. The coffee arrives in a traditional copper cezve, black as oil and intense. The walls seem to absorb conversation: you'll hear Arabic, English, French, German—tourists and locals alike, sitting shoulder-to-shoulder, watching the souk beyond the open-air seating area.",im:"Through clouds of apple-scented smoke, a businessman in a suit sits across from a teenager in jeans, both nursing small cups of thick coffee and long shisha pipes.",t:"In Khan el-Khalili souk. Open 24 hours. No entrance fee; you pay for drinks and shisha (usually 20-40 EGP per shisha). Tourist-oriented but authentic. Go in late evening for the real crowd. Tipping expected.",c:[],r:"g",nn:"قهوة فيشاوي",ns:"أقدم مقهى في القاهرة، منذ 1773",nst:"مقهى تاريخي في خان الخليلي، جلس فيها الشاعر نجيب محفوظ يومياً. تشتهر بالقهوة القوية والشيشة.",nt:"مفتوح 24 ساعة. اطلب قهوة أحمر سادة أو بالنعناع. الجو مريح وتاريخي."},
  {id:16,n:"Al-Muizz Street — Open-Air Museum of Medieval Cairo",a:"Islamic Cairo",v:["history", "architecture", "hidden"],d:30,s:"Kilometer-long historic street lined with 500+ years of Islamic architecture, mosques, and palaces.",st:"Al-Muizz Street is a geographical timeline of Islamic architecture. Running north-south through Islamic Cairo, it's named after the Fatimid caliph who founded the city, and every meter holds lessons in medieval design. You walk past the Qalawun Complex (1285), an amalgam of mosque, mausoleum, and hospital; its carved stone entrance is a masterwork of 13th-century proportions. The Bab Zuweila gate (1477) marks the southern terminus—a towering structure where Ottoman cannons once guarded the city. Between them lie dozens of monuments: the gorgeous mashrabiya screens of the Ghuri Palace, the tilework of the Sudanese Mosque, the worn stones of medieval khans. The street is semi-pedestrianized, lined with vendor stalls and spice shops, but the medieval fabric is unmistakable. Most tourists miss it entirely, making it wonderfully less crowded than the Bazaar.",im:"Sunlight filters through intricately carved wooden screens, casting intricate geometric shadows on stone walls where craftsmen worked 600 years ago.",t:"Starting point: Bab Zuweila (south) or Khan el-Khalili (north). Best walked north-to-south over 1-2 hours. Wear comfortable shoes. Many buildings are closed to casual visitors; external viewing sufficient for appreciation. A guide makes architectural details sing.",c:[],r:"g",nn:"شارع المعز",ns:"شارع تاريخي عريق بمعالم إسلامية عديدة",nst:"يمتد كيلومتر واحد، يضم أكثر من 500 سنة من العمارة الإسلامية والمساجد والقصور.",nt:"افتح في الصباح لتجنب الزحام. ارتد أحذية مريحة. استكشف التفاصيل المعمارية ببطء."},
  {id:17,n:"Saad Zaghloul Square (Tahrir) — Heart of Modern Egypt",a:"Downtown Cairo",v:["history", "modern", "architecture"],d:10,s:"Historic plaza where the 2011 revolution unfolded, surrounded by key institutional buildings and museums.",st:"Tahrir means 'liberation,' and this square has witnessed Egypt's struggle for it. In 2011, nearly a million Egyptians gathered here to demand Mubarak's ouster—one of the largest mass protests of the Arab Spring. Today, the square is ringed with security and fencing, a far cry from those chaotic, hopeful days. But the energy persists. The nearby Egyptian Museum, Opera House, and American University create an intellectual perimeter. The square itself is rebuilt, cleaner, with new sculptures and street-level cafés. The infamous Mubarak-era Hilton overlooks it—now a symbol of the old regime. Locals still gather here for political demonstrations, though the space is heavily guarded. Walking the perimeter, you sense history: recent enough to smell, powerful enough to change a nation.",im:"At dusk, the square is half-empty, security vehicles parked strategically, and a lone vendor sells flags and postcards of Tahrir at its moment of glory.",t:"Easily reached by metro (line 1 and 2) or taxi from anywhere in downtown. The surrounding area is safer than it was in 2011. Visit during daylight. The neighboring museums are the real attractions; the square itself is more symbolic than scenic.",c:[],r:"g",nn:"ميدان التحرير",ns:"ميدان تاريخي شهد الثورة المصرية",nst:"جمعت الملايين هنا في 2011 للمطالبة بتحقيق الحرية والعدالة. الميدان محاط بالمتاحف والمؤسسات الثقافية.",nt:"آمن للزيارة نهاراً. استخدم المترو للوصول. المتاحف المحيطة هي الكنز الحقيقي."},
  {id:18,n:"Naguib Mahfouz Café — Literary Cairo Lives",a:"Islamic Cairo",v:["local", "food", "history"],d:10,s:"Modern café named after Egypt's Nobel laureate, located in Khan el-Khalili with traditional Arabic sweets.",st:"Named after Egypt's only Nobel Prize winner for literature (1988), this café sits in the Khan el-Khalili bazaar as a tribute to Egypt's literary heritage. Mahfouz spent decades observing Cairo's street life, and his novels are urban anthropology masquerading as fiction. The café serves traditional Egyptian pastries (basboosa, konafa, umm ali) and coffee in a modern-rustic setting that balances souk authenticity with contemporary comfort. The walls display quotes from Mahfouz's works in Arabic and English. The clientele is mixed: tourists drawn by the name, students, and locals seeking respite from the bazaar's chaos. Unlike Fishawy's, which feels frozen in time, this café acknowledges the present while honoring the past.",im:"An elderly man reads a dog-eared copy of 'Midaq Alley' at a corner table, a cup of coffee steaming beside him as the souk bustles beyond the café's threshold.",t:"In Khan el-Khalili souk. Open daily 10am-late evening. Entrance free; coffee and pastries are reasonably priced (20-50 EGP). Order umm ali (bread pudding) or konafa with pistachios. Good for a 30-minute break during bazaar exploration.",c:[],r:"g",nn:"مقهى نجيب محفوظ",ns:"مقهى حديثة تكريماً للروائي المصري الحائز على جائزة نوبل",nst:"في خان الخليلي، تشتهر بالحلويات العربية التقليدية والقهوة. تكريم لنجيب محفوظ الكاتب المصري الشهير.",nt:"قريبة من الباز. اطلب الكنافة والقهوة. استرخِ هنا من ضجيج السوق."},
  {id:19,n:"Cairo Opera House — Grand Theater on the Nile",a:"Downtown Cairo",v:["art", "architecture", "modern"],d:10,s:"Modern opera house built in 1988, presenting classical and contemporary performances on Gezira Island.",st:"Built in 1988 as a gift from the Japanese government, the Cairo Opera House is a marvel of modern acoustics and design. Its tiered facade evokes traditional Islamic lattice screens (mashrabiya) abstracted into geometric modernism. Inside, the main hall seats 1,600 and hosts opera, ballet, symphony, and theater. The acoustics are outstanding—every seat hears the performance with clarity. Beyond the auditorium, there are smaller performance spaces, an art gallery, and a pleasant garden overlooking the Nile. The programming is serious: you might catch a Verdi opera one night and experimental Egyptian theater the next. It's a world-class venue in a city not often associated with high culture, yet Cairo has supported music and dance for centuries. The Opera House is where that tradition meets modernity.",im:"A soprano in a red gown commands the stage as the orchestra's strings swell and Cairo's lights twinkle beyond the darkened windows.",t:"Located on Gezira Island; metro line 2 (Saray el-Qobba station) or taxi. Check the schedule online for performances. Tickets range from affordable to expensive depending on the show. Dress code: smart casual to formal depending on the event. Arrive early for the best parking.",c:[],r:"g",nn:"دار الأوبرا المصرية",ns:"مسرح عصري يستضيف الأوبرا والباليه والحفلات الموسيقية",nst:"بني سنة 1988، يقع على جزيرة الزمالك. يستضيف عروضاً موسيقية عالمية المستوى.",nt:"استخدم المترو للوصول. تحقق من البرامج اليومية. احضر تذكرتك مقدماً."},
  {id:20,n:"Islamic Art Museum — Decorative Treasures",a:"Islamic Cairo",v:["art", "history", "architecture"],d:25,s:"World's largest collection of Islamic decorative arts, from pottery to armor, housed in a grand 19th-century building.",st:"While the Egyptian Museum focuses on pharaonic Egypt, the Islamic Art Museum tells the story of Egypt's medieval and Ottoman centuries. Housed in a stunning 1903 palace, it contains the world's most comprehensive collection of Islamic decorative arts: intricate tilework from Damascus and Isfahan, Mamluk glass lamps inlaid with gold, calligraphic manuscripts, armor studded with precious stones, and carpets that took years to weave. Gallery after gallery reveals the sophistication of Islamic design—geometry, arabesque, calligraphy interweaving in endless variation. The woodwork is staggering: doors carved with such precision they seem to breathe. The metal work gallery has inlaid brass boxes, bronze mirrors, and swords with damascene patterns. This is not art for museums; it's the stuff of palaces and courts, now preserved for those who would understand Islamic civilization's aesthetic achievements.",im:"A Mamluk glass lamp glows amber in a darkened case, gold inlay catching light, creating shadows that dance on the museum wall like memories of 15th-century palaces.",t:"Located near Khan el-Khalili. Open 10am-5pm, closed Monday. Entrance moderate. A guide essential for Islamic art appreciation. Allow 2-3 hours. Photography permitted but often disappointing due to lighting; better to simply observe.",c:[],r:"g",nn:"متحف الفن الإسلامي",ns:"أكبر مجموعة من الفنون الإسلامية الزخرفية",nst:"يضم أضخم مجموعة من الفنون الإسلامية من العصور الوسطى، بما فيها الخزف والزجاج والمعادن والسجاد.",nt:"قريب من خان الخليلي. استأجر دليلاً لفهم الفن الإسلامي. قضِ 2-3 ساعات هنا."},
  {id:21,n:"Felucca Sailing on the Nile — Timeless Transport",a:"Nile Islands",v:["nature", "views", "local"],d:20,s:"Traditional wooden sailboat rides on the Nile, a practice unchanged for millennia, offering sunset views.",st:"A felucca is a simple wooden sailboat with a large triangular sail—the same design that ferried pharaohs and merchants for 5,000 years. Today, feluccas are tourism enterprises, but the experience is genuine: you sit on cushioned benches, a warm breeze fills the linen sail, and the Nile's waters lap against the wooden hull. The current carries you north past Gezira Island, past riverside gardens, past neighborhoods where locals wave from balconies. As sunset approaches, the sky turns orange and pink, reflecting off the water. The city's noise fades; you hear only the splash of water and the creak of the sail. It's a meditation, a return to the Nile's ancient rhythms. Many sailboats include stops at island gardens or riverside restaurants. The sunset is universally magical; the sailing itself is pure peace.",im:"A felucca's shadow stretches across the golden Nile as the sun dips behind Cairo's skyline, the sail silhouetted against burning clouds.",t:"Feluccas depart from corniche (riverside road) areas near hotels or Khan el-Khalili. Book through hotels or negotiate directly with boat captains (usually 50-150 EGP per person, depending on duration). Sunset sails (5-8pm) are popular; book ahead. Bring sun protection and water.",c:[],r:"g",nn:"الفلوكة على النيل",ns:"قوارب شراعية تقليدية على النيل",nst:"نقل تقليدي على نفس تصميم قوارب الفراعنة. جلسة هادئة على النيل مع إطلالات الغروب الجميلة.",nt:"احجز من الفنادق أو من قباطنة القوارب. الغروب أفضل وقت. احضر واقي الشمس والماء."},
  {id:22,n:"Qasr al-Aini Street — Medical Innovation and Colonial Legacy",a:"Downtown Cairo",v:["history", "architecture", "hidden"],d:10,s:"Historic street lined with 19th-century hospitals, medical schools, and Pasha palaces reflecting Egyptian modernity.",st:"Qasr al-Aini Street is where Egypt's medical revolution began. Named after a 16th-century Ottoman physician, the street hosts Qasr al-Aini Hospital (1827), one of the Middle East's first teaching hospitals, and the Kasr Al-Ainy Faculty of Medicine, established to bring European medical science to Egypt. Walking the street, you pass buildings of pale limestone, ornate balconies, and facades that whisper of imperial ambition. In the 19th century, Cairo's elite lived here in mansions that rivaled European palaces. Some buildings are still grand; others show decay—a visual metaphor for Egypt's complicated relationship with its colonial past. The street connects to the Nile and Tahrir Square, making it a transit corridor few tourists notice, yet architecturally it's a museum of Cairo's aspirations.",im:"A weathered limestone facade with ornate ironwork balconies crumbles slowly in the Cairo heat, its grandeur fading but still evident.",t:"Walking the street takes 20-30 minutes. It's not a major tourist destination; your interest signals an appreciation for Cairo's 19th-century transformation. Most buildings are institutional and not open to visitors, but external observation rewards careful eyes.",c:[],r:"g",nn:"شارع قصر العيني",ns:"شارع تاريخي من العصر الحديث",nst:"يضم مستشفيات ومدارس طب قديمة من العصر الحديث. يعكس محاولة مصر الحديثة لتبني العلوم الأوروبية.",nt:"تمشية هادئة عبر التاريخ الحديث لمصر. المباني تظهر آثار الزمن."},
  {id:23,n:"City Stars Mall and Heliopolis District — Modern Cairo Sprawl",a:"East Side",v:["modern", "local", "architecture"],d:15,s:"Modern shopping district in the planned suburb of Heliopolis, Cairo's first garden city from 1905.",st:"Heliopolis was a utopian vision: in 1905, Belgian industrialist Baron Édouard Empain envisioned a garden suburb north of Cairo with tree-lined avenues, villas, and art deco buildings. City Stars is the contemporary iteration—a gleaming mall in a neighborhood that still bears traces of Empain's vision. The surrounding streets, though more congested now, retain 1920s-40s architecture: art deco facades, vintage cinema facades, and tree-canopied plazas. It's a fascinating contrast: modern Egypt's consumption culture (City Stars) juxtaposed with pre-World War II elegance. The mall itself offers air-conditioned respite and reflects how affluent Egyptians shop today. The surrounding district offers a glimpse of how foreign investors imagined Cairo's future a century ago—a vision partially realized, partially demolished.",im:"Vintage art deco storefronts from the 1930s stand behind modern shop signs, and a new metro station rises nearby, bridging eras.",t:"Metro line 1 (Heliopolis station). City Stars is accessible by metro or taxi. The mall is open daily 10am-midnight; it offers restaurants, cinemas, and boutiques. The surrounding Heliopolis district is best explored on foot. Allow 2-3 hours.",c:[],r:"g",nn:"سيتي ستارز والعاصمة الجديدة",ns:"مول حديث في حي هليوبوليس",nst:"هليوبوليس أول مدينة حديثة في القاهرة، بنيت سنة 1905. سيتي ستارز يعكس التطور المعاصر.",nt:"استخدم المترو. المول مريح ومكيّف. استكشف المباني القديمة من حقبة الثلاثينات."},
  {id:24,n:"Nubian Museum (Alexandria Day Trip) — Upper Egyptian Heritage",a:"Day Trips",v:["history", "art", "hidden"],d:60,s:"Modern museum in Alexandria (2-3 hour drive) showcasing Nubian civilization and artifacts from Aswan temples.",st:"A day trip to Alexandria is worthwhile, and within Alexandria, the Nubian Museum is a revelation. Designed to honor Nubian (Sudanese) culture often overshadowed by pharaonic Egypt, it displays artifacts saved from temples submerged by the Aswan High Dam. Nubian gold work is exquisite—jewelry, vessels, and figurines with a sophistication rivaling pharaonic treasures. The pottery is exceptional: hand-thrown vessels with incised patterns. The museum's layout guides visitors through Nubian history from prehistoric times to the Islamic period. Unlike the Egyptian Museum's crowded halls, this space is contemplative. Nubian culture is Egypt's southern neighbor, yet few Egyptians—and fewer tourists—appreciate its contributions. The artifacts tell a story of a kingdom equally ancient and equally magnificent as anything north of Aswan.",im:"A Nubian gold crown, small but intricate, catches the light—proof that power and artistry flourished in lands Egypt often ignored.",t:"Located in Alexandria, requiring a 2-3 hour drive or train from Cairo. The journey itself is interesting—crossing the Delta, seeing the agricultural heartland. Best done as a full-day excursion. Consider staying overnight in Alexandria. Museum opens 9am-5pm.",c:[],r:"g",nn:"متحف النوبة (رحلة يومية)",ns:"متحف في الإسكندرية يعرض الحضارة النوبية",nst:"يضم آثار نوبية من المعابد المغمورة بسد أسوان. يعكس حضارة عظيمة شمال إفريقيا.",nt:"رحلة يومية من القاهرة إلى الإسكندرية. احضر الطعام والماء. قطار أو سيارة مستأجرة."},
  {id:25,n:"Karanis Archaeological Site — Graeco-Roman Delta Ruins",a:"Day Trips",v:["history", "hidden", "nature"],d:45,s:"Ruins of Graeco-Roman settlements in the Faiyum, 100km south, offering insights into Ptolemaic Egypt.",st:"An hour south of Cairo lies the Faiyum, an oasis where Ptolemaic Egypt thrived. Karanis is a spectacular archaeological site: ruins of mud-brick houses dating to the 3rd century BCE when Greeks settled here after Alexander's conquest. The excavations reveal domestic life 2,300 years ago—grinding stones, oil lamps, pottery with Greek inscriptions. Two temple towers (towers of brick) still stand, weathered but unmistakable. The site's advantage is its accessibility and emptiness: few tourists venture here, so you walk among ruins with only echoes for company. The landscape is stark—desert meeting cultivated land—and the silence is profound. This is Egypt at the intersection of cultures: Pharaonic tradition, Greek innovation, and the practical machinery of empire.",im:"Two mud-brick towers rise from an endless field of debris, and the only sound is wind carrying sand across ruins where merchants once negotiated prices.",t:"Located near Medinet el-Faiyum, 100km from Cairo (1.5-2 hour drive). Best reached by hired car or organized tour. Few facilities on-site; bring water and sun protection. Open-air ruins offer little shade. Best visited in cooler months.",c:[],r:"g",nn:"موقع كرانيس الأثري",ns:"أطلال مستوطنة يونانية رومانية",nst:"في الفيوم، على بعد 100 كم جنوب القاهرة. آثار حياة يونانية في مصر البطلمية.",nt:"رحلة بسيارة مستأجرة. احضر ماء وحماية من الشمس. لا ظل في الموقع."},
  {id:26,n:"Dendur Temple (Metropolitan Museum, NYC) — But See Abu Simbel Instead",a:"Day Trips",v:["history", "views", "architecture"],d:120,s:"Multi-day trip to Aswan and Abu Simbel temples—colossal statues of Ramesses II carved into a mountainside.",st:"The Temple of Dendur sits in New York's Metropolitan Museum, but the greater experience is Abu Simbel, deep in Upper Egypt near the Sudanese border. This is a multi-day journey (overnight train or flight), but Ramesses II's colossal temple is worth every hour. Four 67-meter statues of the pharaoh are carved directly from the mountainside—faces of stone that stare across the desert toward eternity. Twice yearly, during the equinoxes, sunlight penetrates the inner sanctum to illuminate the statue of the sun god Ra. Constructed around 1250 BCE, Abu Simbel was nearly lost when the Aswan High Dam would have drowned it; UNESCO saved it by dismantling and reassembling the entire temple higher on the mountain—an engineering feat matching ancient skill. The experience is humbling: standing before something so vast, so permanent, made by humans with copper tools and will.",im:"Two massive stone faces of Ramesses II loom against the dawn sky, and you understand why ancients believed pharaohs were gods.",t:"Requires plane or overnight train from Cairo to Aswan (4-6 hours). From Aswan, organized tours (2-3 hours) depart early morning to Abu Simbel. The journey is long but essential. Stay overnight in Aswan to explore temples there (Philae, Unfinished Obelisk). Bring sun protection, water, and patience.",c:[],r:"g",nn:"معبد أبو سمبل",ns:"معبد عملاق محفور في الجبل",nst:"معبد رمسيس الثاني بأربع تماثيل ضخمة. بني قبل 3200 سنة. نقل بالكامل لإنقاذه من الغمر.",nt:"رحلة متعددة الأيام. طائرة أو قطار إلى أسوان ثم جولة منظمة. احضر حماية من الشمس."},
  {id:27,n:"Saqqara — Djoser's Step Pyramid and Necropolis",a:"Giza",v:["history", "architecture", "hidden"],d:30,s:"Ancient necropolis with the Step Pyramid (2670 BCE), humanity's first monumental stone structure, and underground tombs.",st:"While Giza's pyramids are famous, Saqqara is magical. The Step Pyramid of Djoser (2670 BCE) is the world's oldest monumental stone structure—humanity's first attempt at reaching the heavens with geometry. Built by the architect Imhotep (later deified as a god), it rises 62 meters in six receding tiers, each level smaller than the last. The entire complex is surrounded by a limestone wall with gates and courtyards. Unlike Khufu's pyramid, this one is climbable—or rather, you can ascend the exterior staircases (though climbing is restricted; permission and a guide necessary). The interior contains narrow passages and chambers where Djoser's mummified body rested. Beyond the pyramid, Saqqara spreads across the desert like a vast cemetery: mastabas (flat-roofed tombs), shaft tombs, causeways, all revealing how the Egyptians prepared for the afterlife. The site is less crowded than Giza, making it more contemplative.",im:"The Step Pyramid rises against a pink dawn sky, its geometric precision appearing almost crystalline, a structure that belonged to the gods until humans built it.",t:"Located 30km south of Cairo. Organized tours from downtown are common; alternatively, hire a car. Best visited early morning before crowds and heat. The site is extensive; allow 2-3 hours. Climbing the pyramid is restricted; external viewing is sufficient.",c:[],r:"g",nn:"سقارة",ns:"مقبرة فرعونية قديمة جداً",nst:"تضم هرم جوسر ذو الدرجات من سنة 2670 قبل الميلاد. أول هيكل حجري ضخم في التاريخ البشري.",nt:"جنوب القاهرة بـ 30 كم. اذهب في الصباح الباكر. استأجر دليلاً لفهم المقبرة."},
  {id:28,n:"Memphis — Ancient Capital's Scattered Ruins",a:"Day Trips",v:["history", "hidden", "nature"],d:25,s:"Open-air museum at the site of ancient Memphis, Egypt's capital for 3,000 years, featuring colossal statues and temples.",st:"Memphis was the world's largest city in the 18th century BCE—a capital of such magnitude that Greek historians were still amazed by its ruins 1,500 years later. Today, it's an open-air museum: fragments of what was once grand. A colossal statue of Ramesses II lies on its back, 10 meters long, carved from a single limestone block—the sheer scale makes you feel diminished. Nearby, a pink granite sphinx (possibly of Amenhotep II) watches over the grounds like a smaller, less famous cousin of Giza's Great Sphinx. Scattered around are temple fragments, obelisks, and tombs. The site lacks the drama of standing in a completed structure, but there's an archaeology-in-action quality: you're seeing not finished monuments but the fragments of a civilization, imagining the city that surrounded these ruins.",im:"A colossal pharaoh lies supine on the desert sand, and birds perch on the ancient stone face as if to say: time wins all battles.",t:"Located 24km south of Cairo, near the village of Mit Rahina. Organized tours are common and reasonably priced. Allow 1.5-2 hours. Combine with Saqqara for a fuller experience (both are on the west bank of the Nile). Bring water and sun protection.",c:[],r:"g",nn:"منف",ns:"عاصمة فرعونية قديمة",nst:"كانت أكبر مدينة في الدنيا في القرن 18 قبل الميلاد. الآن موقع أثري مفتوح يضم تماثيل ضخمة.",nt:"24 كم جنوب القاهرة. استأجر جولة منظمة. قضِ ساعة أو ساعتين هنا."},
  {id:29,n:"Darb al-Laban — Working-Class Neighborhood Authenticity",a:"Islamic Cairo",v:["local", "hidden", "food"],d:10,s:"Unpolished neighborhood south of Islamic Cairo where daily life unfolds without tourist infrastructure.",st:"Darb al-Laban is not in guidebooks because it's not touristy—it's real. South of Khan el-Khalili, this neighborhood is a warren of narrow streets, small shops, and apartment buildings where working-class Cairenes live. You'll see women selling vegetables from stalls, children playing football in alleyways, men gathering in cafés to drink coffee and discuss politics. The architecture is a jumble of eras: Ottoman-era carved doorways next to 1950s concrete, modern building siding over medieval walls. Street food is exceptional: falafel carts, ta'ameya (Egyptian falafel made from fava beans), and grilled meats. The energy is authentic—no one is here for you; they're here for life. It's easy to get lost, which is the point. Wandering these streets, you're seeing Cairo as it exists for its citizens, not for tourists.",im:"Children chase a soccer ball through a narrow alley while their mothers call from windows above, and the smell of grilling meat fills the air.",t:"Start from Khan el-Khalili and venture south into uncharted streets. No major attractions; the neighborhood itself is the experience. Be respectful and aware of your surroundings. Petty theft can occur; don't flash valuables. Street food is safe if busy (high turnover). English speakers are rare; a phrasebook helps.",c:[],r:"g",nn:"درب اللبان",ns:"حي شعبي حقيقي بعيد عن السياحة",nst:"حي للطبقة العاملة جنوب الإسلامية. حياة يومية حقيقية بدون بنية سياحية.",nt:"ابدأ من خان الخليلي. كن محترماً. تجنب إظهار الأشياء الثمينة. استمتع بالطعام الشارعي."},
  {id:30,n:"Gezira Club — Colonial Legacy and Local Escape",a:"Nile Islands",v:["local", "nature", "hidden"],d:15,s:"Historic sporting club on Gezira Island since 1882, offering grounds, tennis, swimming, and Egyptian social life.",st:"The Gezira Club is an anachronism: a 19th-century British colonial creation now populated by Cairo's middle and upper-middle class. Founded in 1882, it sprawls across 38 hectares of prime island real estate with manicured lawns, tennis courts, swimming pools, and restaurants. The main clubhouse is art deco elegance; the grounds feel frozen in a gentler era. Membership is expensive and exclusive, but day passes are available for tourists—an unusual opportunity to observe how Egyptian elites socialize. You'll see families swimming, teenagers playing squash, and expatriates sipping cocktails on terraces. It's an oasis of privilege in a crowded city, a place where Cairo's noise becomes a distant murmur. The contrast is sharp: beyond the gates, the city pulses; inside, croquet lawns and calm prevail. For many Egyptians, the club symbolizes colonial nostalgia; for others, it's simply a pleasant escape.",im:"Families stroll through manicured gardens while the Nile glides silently beyond, and the city feels very far away.",t:"Located on Gezira Island; metro line 2 or taxi. Day passes available at entrance (usually 50-100 EGP). Dress code enforced (no shorts in some areas). Restaurant and café available. Best visited mid-day or evening. Photography may be restricted in some areas.",c:[],r:"g",nn:"نادي الجزيرة",ns:"نادٍ رياضي تاريخي على جزيرة الجزيرة",nst:"تأسس سنة 1882 كنادٍ بريطاني استعماري. الآن مكان للطبقة العليا المصرية للاسترخاء.",nt:"استخدم المترو. اشتر تذكرة يومية. الملابس المناسبة مطلوبة. استمتع بالمسابح والحدائق."}
,
  {id:31,n:"Nile River Felucca Sunset — Traditional Sail Boat",a:"Nile Riverside",v:["beautiful","romantic_water","sunset"],d:5,s:"A felucca is a traditional wooden sailboat—at sunset, locals charter them and drift with the current as the city lights turn on across the river.",st:"Feluccas have sailed the Nile for centuries. At sunset, you catch a breeze and drift past the riverside. The light hits the water and reflects on the city.",im:"In a small sailboat. The white sail catching wind. The Nile flowing. The city lights switching on. The water smooth.",t:"Hire a felucca at any riverside dock. Cost 50–100 EGP for 1 hour (about $1.50–$3 USD). Go 5:30pm to catch sunset. Bring water. The boat is stable.",c:["beautiful","romantic_water","sunset"],r:"g",nn:"قارب فلوكة نيل",ns:"يانورة فلوكة هي قارب خشبي تقليدي—عند الغروب، يستأجرها السكان المحليون.",nst:"تبحر القوارب الفلوكة في النيل منذ قرون. عند الغروب، تمسك بنسيم وتنجرف مع التيار.",nt:"استأجر فلوكة في أي رصيف نهري. التكلفة 50–100 جنيه مصري لمدة ساعة واحدة."},
  {id:32,n:"Islamic Cairo — Medieval Streets and Mosques",a:"Islamic Cairo",v:["neighborhoods","history","beautiful"],d:10,s:"Medieval Cairo is a labyrinth of narrow streets, markets, and mosques—the architecture is extraordinary and the atmosphere is completely separate from modern Cairo.",st:"Islamic Cairo is where the medieval city still exists. The streets are narrow and crowded. Mosques are ornate. The smell is spices and bread.",im:"A narrow street. Hanging laundry. A mosque entrance. The smell overwhelming. People everywhere. The light filtered.",t:"Explore on foot starting from Khan El-Khalili market. Go morning before heat. Wear comfortable shoes and respect dress codes near mosques. Allow 3–4 hours.",c:["neighborhoods","history"],r:"y",nn:"القاهرة الإسلامية",ns:"القاهرة الوسيطة هي متاهة من الشوارع الضيقة والأسواق والمساجد.",nst:"القاهرة الإسلامية هي حيث تزال المدينة الوسيطة موجودة.",nt:"استكشف سيراً على الأقدام بدءاً من سوق خان الخليلي."},
  {id:33,n:"Egyptian Museum — Treasures of Pharaohs",a:"Downtown",v:["greatest_hits","history","museums"],d:10,s:"The Egyptian Museum holds the largest collection of ancient Egyptian artifacts in the world—the treasures are the physical presence of history.",st:"The Egyptian Museum has mummies, sculptures, jewelry, and artifacts from every period of ancient Egypt. The display is extraordinary. The history is in the objects.",im:"Inside a gallery. Gold glinting. Mummies in cases. Sculptures of gods. The scale of time. Few visitors. The weight of history.",t:"Located downtown. Entry 300 EGP (about $6 USD). Open 9am–5pm daily (closed Fridays 11am–2pm). Go early morning. Allow 3–4 hours minimum.",c:["greatest_hits","history"],r:"g",nn:"المتحف المصري",ns:"يحتوي المتحف المصري على أكبر مجموعة من القطع الأثرية المصرية القديمة.",nst:"يحتوي المتحف المصري على موميائات وتماثيل وحلي وقطع أثرية.",nt:"يقع في وسط المدينة. الدخول 300 جنيه مصري."},
  {id:34,n:"Giza Pyramids at Sunrise — The Monument Itself",a:"Giza Plateau",v:["greatest_hits","beautiful","history"],d:60,s:"The pyramids are the physical proof of an empire—see them at sunrise when the light is gold and the crowds haven't arrived.",st:"The Great Pyramid of Khufu is the last standing wonder of the ancient world. At sunrise, the light hits the stone gold. By 9am, crowds arrive.",im:"The pyramid at dawn. The light gold on the stone. The desert vast. Few people. The scale impossible. The gravity of history.",t:"Go with a guide or private driver. Allow 2–3 hours. Entry 350 EGP (about $7 USD) per site. Go 6am to catch sunrise. Wear sunscreen and bring water.",c:["greatest_hits","beautiful","history"],r:"g",nn:"أهرامات الجيزة",ns:"الأهرامات هي الدليل المادي على إمبراطورية.",nst:"هرم خوفو الأكبر هو آخر عجيبة قائمة من العالم القديم.",nt:"اذهب مع دليل أو سائق خاص. اسمح بـ 2–3 ساعات."},
  {id:35,n:"Nile River Swimming — Maadi Beach",a:"Maadi",v:["swimming","local","free"],d:15,s:"Locals swim in the Nile at Maadi — it's safe in daylight with crowds, warm water, sandy beaches.",st:"The Nile near Maadi is where Cairene families actually swim. The water is warmer than you'd expect and the current is gentle along sandy beaches. Weekends get crowded, which is safest — plenty of lifeguards and families. Early morning (6-8am) is quieter and the light is perfect.\n\nHelwan's public beaches are even less touristy. You'll see school groups and workers cooling off. Bring reef shoes — the bottom is silty.",im:"Morning sun on the Nile, families in the water, the opposite bank green with date palms.",t:"Go in daylight, never alone. Maadi Beach Club has facilities (small fee). Public beaches free but basic. Use Uber/Bolt there. Streets to riverside safe during day but don't walk back alone after sunset.",c:["swimming","free entry","local"],r:"g",nn:"السباحة في النيل — المعادي",ns:"السباحة الآمنة في النيل عند المعادي",nst:"المعادي مكان آمن للسباحة في النيل. الماء دافئ والحشد يعني أمان أكثر.",nt:"اذهب نهاراً مع أشخاص. استخدم أوبر للذهاب والعودة."},
  {id:36,n:"Spice Market — Khan el-Khalili Perfume Quarter",a:"Islamic Cairo",v:["markets","sensory","local"],d:10,s:"Medieval perfumeries and spice merchants where prices are lowest if you arrive early and watch locals first.",st:"Khan el-Khalili's perfume quarter (Kanasi area) is where the real smell hits you first — cardamom, saffron, rose water, musk blending into something indescribable. Merchants sit in narrow stalls with enormous jars of spices from family recipes. The 'oud' section is where wealthy Egyptians buy frankincense that costs more than gold.\n\nMornings (7-10am) are best — less crowded, cooler, merchants more patient. After 11am it gets thick with tour groups. Watch what locals buy, then ask the same merchant. The negotiation is part of it.",im:"Walls of glass jars in amber, crimson, and gold. A merchant grinding fresh spices with a mortar and pestle.",t:"Morning visits 7-10am best. Bring small bills. Watch your bag — crowded but safe if aware. Negotiate prices. Use Uber back if carrying purchases.",c:["markets","sensory","local"],r:"g",nn:"سوق التوابل — خان الخليلي",ns:"أسواق البهارات والعطور في خان الخليلي",nst:"رائحة البهارات والعطور تملأ الأسواق. التجار يبيعون العود والزعفران منذ قرون.",nt:"اذهب صباحاً. ابقِ حذراً من حقيبتك. فاوض على الأسعار."},
  {id:37,n:"Manial Island — Palaces and Local Streets",a:"Manial",v:["neighborhoods","history","quiet"],d:5,s:"The least touristy island in Cairo where royal palaces from the 1920s face palm-lined streets — safe and genuinely local.",st:"Manial Island is what Cairo was before it became a capital. Royal palaces from the 1920s face tree-lined streets where families have owned apartments for three generations. The Palace of Amir Khayer Bey is extraordinary — 1920s Islamic design that nobody visits. You walk through garden gates and suddenly you're in another era.\n\nIt's genuinely safe to walk around during the day and evening if you stay on main streets. Very few hassles because there's almost no tourist infrastructure.",im:"Garden walls dripping with flowering vines. A palace gate from the 1920s. Quiet broken only by birds and the Nile a few blocks away.",t:"Day or evening both safe. Walk from downtown or use Uber (near Egyptian Museum area). Palace costs a few pounds to enter. Grab tea at a local café — they'll be delighted you're there.",c:["neighborhoods","history","quiet"],r:"g",nn:"جزيرة المنيل — القصور والشوارع الهادئة",ns:"جزيرة بعيدة عن السياح، مع القصور والحياة المحلية",nst:"جزيرة المنيل حيث العائلات تعيش لأجيال. القصور من العشرينات. آمن وهادئ.",nt:"آمن للمشي نهاراً ومساءً. استخدم أوبر. القصر رخيص الدخول."},
  {id:38,n:"Memphis — Ancient Capital (30km Day Trip)",a:"Memphis",v:["day_trips","history","ancient"],d:30,s:"Egypt's original capital where the colossal statue of Ramesses II still waits — take the metro, not a random taxi.",st:"Memphis was Egypt's first capital. What's left is scattered across open fields — a limestone sphinx, a 10-meter statue of Ramesses II lying on its side, temple foundations. The museum is small and often empty. The scale of what was once here hits you standing in an empty field.\n\nThe metro goes most of the way; a taxi from the end costs almost nothing with locals. You'll see agricultural villages, date palms, nothing touristy. Go on a clear morning when the light is sharp.",im:"The massive limestone figure of Ramesses II stretched on stone, weathered smooth by centuries. An enormous palm-lined courtyard that once held a thousand people.",t:"Take metro to Ramesses Station, then local taxi (50-100 LE) or Uber from station. Do NOT take unmarked taxi from downtown — metro + local taxi is safer, cheaper, more authentic. Bring water. Open-air museum, no shade. Best 6am-10am.",c:["day_trips","history","ancient"],r:"g",nn:"ممفيس — العاصمة القديمة",ns:"العاصمة الأولى لمصر حيث التماثيل العملاقة",nst:"ممفيس كانت أول عاصمة. الآن يبقى تمثال رمسيس. الرحلة نصف التجربة.",nt:"اذهب بالمترو. استخدم تاكسي محلي أو أوبر. احضر ماء. صباحاً مبكراً أفضل."},
  {id:39,n:"Dar al-Kutub — National Library Manuscripts",a:"Citadel area",v:["nerd","history","quiet"],d:5,s:"Where the oldest Arabic manuscripts live — medieval medical texts and hand-illuminated Qurans from the 700s, in a library that opened in 1870.",st:"Dar al-Kutub houses Egypt's collected written heritage. The reading rooms are lined with oldest surviving copies of texts that shaped Islamic scholarship — medical treatises where surgery concepts haven't changed in 900 years, astronomical tables that guided navigation, administrative records from the 14th century.\n\nThe library is quiet. Almost no tourists. Scholars come here. The building is beautiful — marble staircases, skylights that make reading rooms golden in afternoon light. You can request to see specific manuscripts.",im:"An old scholar bent over a manuscript under a skylight, centuries of paper and ink surrounding them, dust motes floating in afternoon sun.",t:"Sat-Thu 9am-4pm. Bring photocopy of passport ID page. 50 LE entry. Request specific collections — more accommodating if you know what you're looking for. The quietness makes it feel like a different Cairo.",c:["nerd","history","quiet"],r:"g",nn:"دار الكتب المصرية — المخطوطات القديمة",ns:"حيث أقدم المخطوطات العربية",nst:"مخطوطات طبية وقرآنات من قرون. المكتبة هادئة والعلماء يأتون هنا.",nt:"السبت-الخميس 9ص-4م. احضر صورة جواز. 50 جنيه الدخول."},
  {id:40,n:"City of the Dead (Qarafa) — Living Necropolis",a:"Qarafa",v:["weird","history","haunting"],d:8,s:"A medieval graveyard where 2 million people once lived in tombs — some still occupied — walk with respect through stone lanes that disappeared from time.",st:"The City of the Dead is exactly that: a necropolis so vast that people built homes inside tombs and lived there for generations. Now it's partly abandoned, partly occupied, a maze of medieval Islamic tombs. Some tombs are as tall as buildings. Some are visited daily. Some you could wander into and disappear.\n\nWalking through at dawn, before the day gets hot, it's beautiful and haunting. You'll see families getting breakfast ready, someone watering plants on a tomb. The scale is overwhelming — kilometers of graves stretching across rocky ground.",im:"Stone tombs as tall as houses disappearing into the distance. A woman hanging laundry on a clothesline strung between two 400-year-old graves.",t:"Go early morning (6-8am) with a guide — paths loop and easy to get turned around. Hire local guide (200-300 LE) who knows where things are. Respectful behavior essential — sacred place with real tombs and people living there. Do NOT go alone after sunset.",c:["weird","history","haunting"],r:"g",nn:"مدينة الأموات — القرافة",ns:"مقابر إسلامية قديمة حيث عاش الناس في القبور",nst:"مدينة الأموات — ملايين القبور مع عائلات تعيش فيها. تاريخ وأسرار.",nt:"اذهب مبكراً. استأجر دليلاً محلياً. احترم المكان. لا تذهب وحدك ليلاً."},
  {id:41,n:"Citadel of Saladin — Medieval Fortress Overlooking Cairo",a:"Citadel",v:["greatest_hits","history","views"],d:5,s:"Saladin's 12th-century fortress where the city spreads below — climb the medieval walls and the pyramids are visible on the horizon.",st:"The Citadel rises from a limestone plateau fortified in 1176. The walls are thick enough to look permanent. Inside is a city unto itself — courtyards, gates, the Mohamed Ali Mosque with its alabaster dome. The Muhammad Ali Mosque is the jewel — domed interior that feels like standing inside a pearl, light filtering through stained glass onto marble floors.\n\nThe views from the outer walls are staggering: Cairo spreads in every direction, and on clear mornings the pyramids are visible. The best hour is just after opening (9am) when crowds haven't arrived.",im:"Light through blue and red stained glass pooling on white marble. Beyond the citadel walls, Cairo's minarets rise like a forest of stone.",t:"9am-4pm daily. 140 LE entry. Go early for empty spaces and clear light. Stairs are rough. Bring something to cover shoulders. Use Uber back down to your hotel.",c:["greatest_hits","history","views"],r:"g",nn:"قلعة صلاح الدين — القاهرة من الأعلى",ns:"حصن صلاح الدين يطل على القاهرة كلها",nst:"القلعة من 1176. مسجد محمد علي من الداخل مثل كنز — قباب وزجاج ملون.",nt:"9ص-4م. 140 جنيه الدخول. اذهب مبكراً. المنظر يستحق."},
  {id:42,n:"Al-Azhar Mosque and University — 1,000 Years of Islamic Thought",a:"Islamic Cairo",v:["greatest_hits","history","architecture"],d:8,s:"Built in 970 CE and still standing — one of the oldest functioning universities in the world, where Islamic scholars have debated theology since the beginning.",st:"Al-Azhar is not just a mosque, it's an intellectual institution that has shaped Islamic thought for 1,000 years. The courtyard is colonnade-shaded, students study here between prayers, the prayer hall's arches stretch into shadow. You can feel the accumulated learning.\n\nWhat's remarkable is it's still actively used — prayers happen regularly, students study theology here. The architecture spans a thousand years: oldest parts from 10th century, later expansions adding Ottoman arches, Mamluk carvings.",im:"Stone columns casting sharp shadows across an open courtyard. Young students in traditional dress studying theological texts. Call to prayer echoing from minaret to minaret.",t:"Open to visitors 9am-4pm except prayer times. Dress respectfully (shoulders/knees covered). 50 LE entry. Guides offered but courtyard more powerful alone. Combine with Khan el-Khalili (10 min walk).",c:["greatest_hits","history","architecture"],r:"g",nn:"مسجد الأزهر والجامعة الأزهرية",ns:"ألف سنة من العلم الإسلامي",nst:"الأزهر لا يزال مركز الدراسة الإسلامية. الطلاب يدرسون كما درسوا منذ قرون.",nt:"9ص-4م ما عدا الصلاة. ألبس احترام. 50 جنيه الدخول."},
  {id:43,n:"Egyptian Museum — World's Ancient Treasure",a:"Tahrir Square",v:["greatest_hits","free_culture","history"],d:5,s:"The world's most comprehensive ancient Egyptian collection — normally expensive, but free Friday mornings (roughly 11am-1pm) if you can get in.",st:"The Egyptian Museum holds Tutankhamun's mask, mummies of pharaohs, and thousands of artifacts foundational to human history. The building itself is 1920s neoclassical. The collection is overwhelming — you could spend a day here and only skim the surface.\n\nFriday mornings (11am-1pm) entry is free for Egyptian citizens, but enforcement is loose enough that some tourists slip in. Even if free hours don't work, 140 LE is worth it for Tutankhamun's room alone. The mask is small — six inches of gold — but seeing it changes something.",im:"A glass case and the golden face of a boy pharaoh, 3,300 years old, the detail so precise you can see his expression.",t:"Paid entry: 140 LE. Friday mornings around 11am-1pm supposedly free but verify and arrive early. Security is straightforward. Go straight to Tutankhamun's room first — most crowded later. Audio guides available. Allow 2-3 hours.",c:["greatest_hits","free_culture","history"],r:"g",nn:"المتحف المصري — دخول مجاني يوم الجمعة",ns:"أكبر مجموعة آثار مصرية في العالم",nst:"قناع توت عنخ آمون من ذهب. ممياوات الفراعنة. آلاف القطع.",nt:"140 جنيه للدخول. الجمعة صباحاً مجاني. اذهب مبكراً إلى غرفة توت أولاً."},
  {id:44,n:"Nile Felucca Sunset — Most Beautiful Moment in Cairo",a:"Nile River",v:["greatest_hits","sunset","romantic"],d:0,s:"An ancient wooden sailboat on the Nile at golden hour — suspended between day and night for 45 minutes while the city lights flicker on.",st:"A felucca is a wooden sailboat that has carried people on the Nile for centuries. At sunset, the light turns golden and then crimson. The banks shift from dusty gray to purple. The city becomes a silhouette of minarets and modern buildings glowing against the darkening sky.\n\nHire a felucca from docks near the Egyptian Museum or Gezira Island. A small boat for one or two costs 200-300 LE for an hour. You sit on cushions while the captain navigates by wind and intuition. The pace is slow enough that you notice everything.",im:"The felucca's canvas catching gold light. Cairo's minarets turn purple and black against a sky that's still burning orange. The water beneath you reflects sky.",t:"Book a felucca 30 min before sunset (roughly 6pm depending on season). Start from Zamalek docks or near Egyptian Museum. Expect 200-400 LE for small boat. Bring something to cover shoulders. Tell captain exactly when you want on water — timing matters.",c:["greatest_hits","sunset","romantic"],r:"g",nn:"رحلة الفلوكة على النيل عند الغروب",ns:"قارب شراع على النيل وقت الغروب",nst:"القارب تحت أشعة ذهبية. المآذن تتحول لسيلويت. الماء يعكس السماء.",nt:"احجز قبل الغروب بـ 30 دقيقة. من جزيرة الزمالك. 200-400 جنيه للقارب."}
,
{id:45, n:"Al-Azhar Park — Green in the Stone City", a:"Islamic Cairo", v:["parks", "free entry", "nature"], d:30, s:"A massive garden carved into the Fatimid city walls, where green runs across stone and the whole city spreads beneath you.", st:"Al-Azhar Park wasn\'t there until 2005. The Aga Khan Trust rebuilt the medieval walls and planted 40,000 trees on top. It\'s wild: you walk in from a crowded neighbourhood and suddenly you\'re in green space overlooking all of Islamic Cairo. Locals come here to escape. Families eat picnics. Kids run through gardens. The wall views are exceptional—the medieval city below, the modern city beyond.\n\nGo early morning, before heat. The park is managed and safe. You can see for miles.", im:"Sitting under olive trees. The medieval gate visible. Stone walls stretching. The sound of water. City noise below.", t:"Entry free. Open daily 8am–6pm (later in summer). Multiple entrances; closest is on Sultan Qaitbay street near Khan El-Khalili. Use Uber to get there, don\'t walk at night. Bring water. Allow 2-3 hours.", c:["parks", "free entry", "nature"], r:"g", nn:"حديقة الأزهر", ns:"حديقة ضخمة محفورة في جدران مدينة فاطمية", nst:"لم تكن حديقة الأزهر موجودة حتى عام 2005. أعاد المركز الآغاخاني بناء الجدران الوسيطة وزراعة 40000 شجرة في الأعلى. يأتي السكان المحليون هنا للهروب.", nt:"الدخول مجاني. مفتوح يومياً 8 صباحاً–6 مساءً. استخدم Uber للوصول. اجلب الماء."},
{id:46, n:"Fishawy Café — Coffee Since Napoleon", a:"Islamic Cairo", v:["local", "history", "free entry"], d:15, s:"The oldest coffee shop in Cairo, operating since the 1700s, where the same sheesha pipes and marble tables have held conversations for three centuries.", st:"Fishawy is at the centre of Khan El-Khalili. The café hasn\'t changed its layout or furniture in centuries. Marble tables, brass inlay, waiters who have worked there for decades. You order ahwa (coffee) or shay (tea), and sit in the exact same seat where Nasser sat, where Nagib Mahfouz wrote, where countless Cairenes have watched the market flow past.\n\nMornings are quiet. Evenings fill with locals playing backgammon and smoking sheesha. The energy is completely different from daytime tourist rush.", im:"Sitting at a tiny marble table. The waiter sets down thick black coffee in a small brass cup. Sheesha smoke curling. The market beyond. The sound of hundreds of conversations.", t:"Located in Khan El-Khalili market. Coffee or tea costs 5-10 EGP (pennies). Open early morning to late evening. Go before 11am or after 5pm to see locals. The neighbourhood is safe during the day; don\'t walk back to your hotel alone after dark—use Uber.", c:["local", "history", "free entry"], r:"g", nn:"قهوة الفشاوي", ns:"أقدم مقهى في القاهرة، يعمل منذ السبعينيات", nst:"الفشاوي في قلب سوق خان الخليلي. المقهى لم يغير تخطيطه أو أثاثه لقرون. طاولات رخام وصناديق نحاس وعاملون عملوا هناك لعقود.", nt:"تكلفة القهوة أو الشاي 5-10 جنيه مصري. مفتوح من الصباح الباكر إلى المساء المتأخر."},
{id:47, n:"Maadi Corniche — Cairo\'s Quietest Neighbourhood", a:"Maadi", v:["local", "nature", "quiet"], d:20, s:"An expat neighbourhood frozen in calm—wide streets, bookshops, cafes—where the Nile is accessible and the city noise disappears.", st:"Maadi is the relief valve for Cairo. Built in the 1960s and 70s as a planned neighbourhood for Egypt\'s professional classes, it has stayed quiet. Tree-lined streets, small bookstores, vintage cafes. The Corniche here is wider than downtown. Families walk. The air feels different.\n\nYou can actually breathe. The Nile feels real, not city-sized. It\'s where Egyptians go when Cairo overwhelms them.", im:"Walking along a quiet street. Fig trees overhead. A café terrace with few tables. The Nile visible between buildings. Absolutely calm.", t:"South of downtown. Metro line 1 (Corniche Maadi station) or Uber. The area is safe to walk during the day and evening. Good restaurants and cafes. Allow 2-3 hours to wander and sit. This is where tourists rarely go, which makes it gold.", c:["neighbourhoods", "local", "quiet", "nature"], r:"g", nn:"كورنيش المعادي", ns:"حي هادئ مجمد في الهدوء", nst:"المعادي هو صمام التخفيف لتغيير القاهرة. تم بناؤها في الستينيات والسبعينيات كحي مخطط للطبقة المهنية المصرية.", nt:"جنوب وسط البلد. خط المترو 1 أو Uber. يمكنك المشي بأمان خلال اليوم والمساء."},
{id:48, n:"Coptic Cairo — Christian Quarter Hidden in Stone", a:"Islamic Cairo", v:["history", "neighbourhoods", "religious"], d:20, s:"The oldest church in Egypt sits in the basement of another building, down stone steps where Coptic Christianity has rooted for 2,000 years.", st:"Coptic Cairo is a pocket of ancient Christianity inside Islamic Cairo. The Hanging Church (Al-Muallaqa) literally hangs over a Roman fortress from the 1st century. The Ben Ezra Synagogue is built on the spot where the Nile saved baby Moses. These are not museum pieces—they are still working, living places of worship.\n\nYou walk down narrow alleys, through unmarked doors, down spiraling stone stairs. The light changes. The sound muffles. You\'re in another Cairo entirely, one that predates Islam by centuries. It\'s perfectly safe during the day. The people are used to visitors.", im:"Stone stairs descending. The air cooler. A vaulted ceiling appearing. Icons on walls. Light filtering through tiny windows. The sound of water and ancient stone.", t:"Located south of Islamic Cairo. Use Uber or taxi; the alleys are hard to navigate. Entry to main churches is free (donations welcomed). Allow 2-3 hours. Most churches close for 3 hours in afternoon (around 1pm-4pm). Go in the morning. Women should dress modestly (cover knees and shoulders). Completely safe during the day with foot traffic.", c:["history", "neighbourhoods", "religious"], r:"y", nn:"القاهرة القبطية", ns:"ربع مسيحي مخفي في الحجر", nst:"القاهرة القبطية هي جيب المسيحية القديمة داخل القاهرة الإسلامية. كنيسة المعلقة حرفيا معلقة فوق حصن روماني من القرن الأول.", nt:"يقع جنوب القاهرة الإسلامية. استخدم Uber أو سيارة أجرة. الدخول إلى الكنائس الرئيسية مجاني (التبرعات مرحب بها)."},
{id:49, n:"Manara Lighthouse — Gezira Island at Sunset", a:"Nile Islands", v:["high_spots", "sunset", "beautiful"], d:15, s:"The lighthouse at the southern tip of Gezira Island where the Nile bends and the light turns everything gold.", st:"The Manara lighthouse isn\'t tall, but it sits at the exact point where the geography of the Nile changes. At sunset the light hits the water at an angle that makes everything glow. The island is peaceful. Few tourists find it. Locals come here in the evening with friends.\n\nYou can sit on the rocks below. The water is still. The city lights are switching on across the river. It\'s the quietly beautiful side of Cairo that nobody photographs.", im:"Sitting on warm rocks. The lighthouse above. The Nile bending. Light gold on water. The city becoming silhouettes across the river.", t:"Located on the southern tip of Gezira Island. Uber or taxi from downtown (15 min). The area is safe but quiet at night; go at sunset (around 5-6pm in winter), don\'t stay after dark. No entrance fee. Allow 1-2 hours. Bring water.", c:["high_spots", "sunset", "beautiful", "romantic_water"], r:"g", nn:"منارة الجزيرة", ns:"المنارة في الطرف الجنوبي لجزيرة الجزيرة", nst:"منارة الجزيرة ليست طويلة، لكنها تقع في النقطة الدقيقة حيث يتغير جغرافيا النيل.", nt:"يقع على الطرف الجنوبي من جزيرة الجزيرة. Uber أو سيارة أجرة من وسط البلد. اذهب عند الغروب (حوالي 5-6 مساءً في الشتاء)، لا تبقى بعد الظلام."},
{id:50, n:"Dahshur Bent Pyramid — The Impossible Angle", a:"Day Trips", v:["day_trips", "history", "ancient", "weird"], d:90, s:"The only pyramid with its original limestone still intact—and the angle of the sides changes halfway up the slope.", st:"The Bent Pyramid is a geological accident that turned out to be perfect. The architects got halfway up and realized the angle was wrong. Instead of starting over, they changed it—a 54-degree lower slope, then 43 degrees above. It looks crooked. It looks wrong. It is masterfully wrong.\n\nNo crowds. You can touch the original limestone casing. Red pyramid is next to it—smoother, later, still covered in parts of its original finish. You can actually climb inside both.", im:"Standing in front of the pyramid. The change in angle obvious. The white limestone catching light. No other tourists. The slope seeming physically impossible.", t:"40km south of Cairo. Hire a driver (500-700 EGP for the day) or book a tour through your hotel. Entry 150 EGP for Bent Pyramid, 150 EGP for Red Pyramid. Open 8am–5pm. Go early. Bring water, sun protection, and a strong torch if you go inside. The site is safe and very quiet.", c:["day_trips", "history", "ancient", "weird"], r:"g", nn:"هرم دهشور المنحني", ns:"الهرم الوحيد مع حجر الجير الأصلي سليماً", nst:"هرم دهشور المنحني هو حادث جيولوجي تحول إلى أنه مثالي.", nt:"40 كم جنوب القاهرة. استأجر سائق. الدخول 150 جنيه مصري."},
{id:51, n:"Zamalek Galleries — Where Cairo\'s Art Scene Actually Happens", a:"Zamalek", v:["art", "local", "free entry"], d:20, s:"An island in the Nile filled with contemporary art galleries, design studios, and the beating heart of Egypt\'s art world.", st:"Zamalek is where contemporary Egyptian art lives. The galleries here aren\'t tourist traps—they show work by serious artists. The Townhouse Gallery shows emerging talent. Zamalek Atelier is a working artist space. Walk down side streets and you\'ll find studio doors open, people working, exhibitions you weren\'t expecting.\n\nSaturday mornings are best. The galleries open late (11am). You can move between them in an hour. The vibe is international but genuinely local.", im:"Walking through a white gallery space. Paintings that make you stop. A sculptor in a nearby studio visible through a window. The Nile visible from upper windows.", t:"Island in the Nile, north of downtown. Metro line 2 (Saad Zaghloul station) or Uber. Most galleries are free to enter. Open usually 11am–6pm, closed Mondays and Fridays morning. Dress casually but respectfully. The area is very safe, especially during the day and early evening. Saturday morning is peak time for locals.", c:["art", "local", "free entry"], r:"g", nn:"معارض الزمالك", ns:"جزيرة في النيل مليئة بمعارض الفن المعاصر", nst:"الزمالك هي حيث يعيش الفن المعاصر المصري. المعارض هنا ليست فخاخ سياحية.", nt:"جزيرة في النيل، شمال وسط البلد. خط المترو 2 أو Uber. معظم المعارض مجانية. مفتوح عادة 11 صباحاً–6 مساءً."},
