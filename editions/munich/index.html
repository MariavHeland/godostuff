<script>
const P = [
  {id:1,n:"Eisbach Surfing Wave (River Surfing) — Englischer Garten",a:"Englischer Garten",v:["weird", "beautiful"],d:1,s:"Standing wave in a river where surfers ride year-round—water sports in the city, a unique Munich sight.",st:"The wave forms in the river current. Surfers paddle in. The river carries them. It\'s surreal. Cold water, November to April most popular. Spectators watch. It\'s ordinary and completely strange.",im:"It\'s 1970. Someone realizes you can surf a river. It becomes a sport.",t:"The wave forms in the river current. Surfers paddle in. The river carries them. It\'s surreal. Cold water, November to April most popular. Spectators watch. It\'s ordinary and completely strange.\",im:\"It\'s 1970. Someone realizes you can surf a river. It becomes a sport.\",t:\"Free to watch. Surfers rent gear elsewhere (€15-30). Go morning in summer for light. Bring camera. The absurdity is photo-worthy.",c:["weird", "beautiful"],r:"g",nn:"Marienplatz",ns:"Das Herz Münchens, wo die Stadt ihre Geschichte ausstellt.",nst:"Der Platz ist umgeben von gotischen Gebäuden. Im Zentrum die Mariensäule. Das Neue Rathaus ist spektakulär. Jeden Mittag spielt das Glockenspiel seine Melodie.",nt:"Zentral, kostenlos. Das Glockenspiel spielt um 11 Uhr und 12 Uhr. Rathaustreppe kostet €2,50. Viele Cafés rund um den Platz."},
  {id:2,n:"Olympiapark + Tower (1972 Venues) — Olympiapark",a:"Olympiapark",v:["history", "high_spots"],d:2,s:"Olympic facilities from 1972—tower, stadium, venues—now a sprawling park where locals run and bike.",st:"The tower rises. Views from top are panoramic. The stadium is enormous. Parks sprawl. It\'s not a museum—it\'s actual living space. The 1972 promise to use facilities for public good was kept.",im:"It\'s 1972. Munich stages the Olympics. The city believes it\'s changed forever.",t:"The tower rises. Views from top are panoramic. The stadium is enormous. Parks sprawl. It\'s not a museum—it\'s actual living space. The 1972 promise to use facilities for public good was kept.\",im:\"It\'s 1972. Munich stages the Olympics. The city believes it\'s changed forever.\",t:\"Tower €7. Park is free. Walk for hours. Cafés throughout. Bike rental available (€10-15). Good U-Bahn access. Go good weather.",c:["high_spots", "parks"],r:"g",nn:"Englischer Garten",ns:"Der größte innerstädtische Park der Welt – größer als der Central Park.",nst:"Der Englische Garten ist riesig. Es gibt Bäche, Wiesen, Biergärten und dichte Wälder. Surfen auf dem Eisbach (im Sommer). Radfahren auf langen Wegen.",nt:"U-Bahn zum Universität oder Münchener Freiheit. Kostenlos. Biergärten im Park kosten moderat. Bring Badeklamotten im Sommer."},
  {id:3,n:"Viktualienmarkt (Daily Market, Historic) — Marienplatz",a:"Marienplatz",v:["local_only", "beautiful"],d:3,s:"Produce and food market operating on the same site for 200+ years—locals still shop despite city changes.",st:"Stalls sell vegetables, flowers, regional products. Vendors call prices. It\'s organized chaos. Smells intense—produce and cooking. It\'s authentically local even with tourists present.",im:"It\'s anytime in the last 200 years. The market is where food comes from.",t:"Stalls sell vegetables, flowers, regional products. Vendors call prices. It\'s organized chaos. Smells intense—produce and cooking. It\'s authentically local even with tourists present.\",im:\"It\'s anytime in the last 200 years. The market is where food comes from.\",t:\"Go mornings (best selection). Free to browse. Food/flowers €2-10. Cash preferred. Sit in outdoor beergarden (€5-10 for beer/snack). Feel daily rhythm.",c:["local_only", "beautiful"],r:"g",nn:"Neuschwanstein",ns:"Ludwigs berühmtes Märchenschloss – das Original, das Disney inspirierte.",nst:"Das Schloss thront auf einem Berg über dem Dorf Hohenschwangau. Es sieht aus wie eine Fantasie. Millionen von Touristen kommen. Du verstehst warum, wenn du es siehst.",nt:"Etwa 2 Stunden von München. Zugfahrt plus Bus. Eintritt €14 (Führung erforderlich). Besser früh morgens gehen. Das berühmteste Foto wird von der Marienbrücke gemacht."},
  {id:4,n:"Schwabing (Bohemian Neighborhood) — Schwabing",a:"Schwabing",v:["local_only", "beautiful"],d:4,s:"Neighborhood where artists and students live—cafés, galleries, low-key nightlife—authentically bohemian.",st:"Streets lined with small shops, galleries, bookstores. Cafés full of people working or reading. Quiet but alive. It\'s organized differently—not for tourism, for living.",im:"It\'s 1900. Artists move here because rent is cheap. The neighborhood becomes bohemia.",t:"Streets lined with small shops, galleries, bookstores. Cafés full of people working or reading. Quiet but alive. It\'s organized differently—not for tourism, for living.\",im:\"It\'s 1900. Artists move here because rent is cheap. The neighborhood becomes bohemia.\",t:\"Walk freely. Cafés €3-8 for coffee. Go afternoon or evening. The vibe is specific—unhurried and creative. Bring a book if you want to sit.",c:["local_only", "beautiful"],r:"g",nn:"Schwabing Viertel — Schwabing",ns:"Ein Dorf in Stadt—wo normale Menschen leben.",nst:"Das Viertel ist Wohn-Platz mit Läden und Restaurants. Nicht touristisch, echte Leute. Du bist Fremder aber willkommen. Es ist Gemeinschaft.",nt:"Kostenlos spazieren. Restaurants €8-20. Cafés €2-5. Sehr günstig und authentisch. Nicht schön aber real. U-Bahn oder Tram nötig oft."},
  {id:5,n:"Glockenbach (Nightlife + Quiet Streets) — Glockenbach",a:"Glockenbach",v:["night", "local_only", "beautiful"],d:5,s:"Neighborhood that\'s quiet during day, alive at night—bars, music, young people—the Munich nightlife tourists miss.",st:"Day: normal streets, cafés, shops. Night: transforms into bar district. The same spaces become different. Music spills. People gather. The neighborhood designed for both modes.",im:"It\'s Friday night. The neighborhood transforms. Monday morning it\'s quiet again.",t:"Day: normal streets, cafés, shops. Night: transforms into bar district. The same spaces become different. Music spills. People gather. The neighborhood designed for both modes.\",im:\"It\'s Friday night. The neighborhood transforms. Monday morning it\'s quiet again.\",t:\"Daytime is tourist-free. Night visit (after 8pm) for authentic Munich. Bars €5-8 per drink. Go expecting to find something, not knowing what.",c:["night", "local_only"],r:"g",nn:"Glockenbach Straße — Glockenbach",ns:"Gassen voller Leben—wo echt Köln/München/etc. ist.",nst:"Die Straße ist lebendig. Läden, Restaurants, Menschen überall. Du wandelst und absorberst Atmosphäre. Es ist Stadt pur.",nt:"Kostenlos spazieren. Restaurants €10-30. Cafés €3-7. Beste Zeit: Wochenende. Shopping und Essen zusammen. Sehr authentisch."},
  {id:6,n:"Au-Haidhausen Hidden Gardens — Au-Haidhausen",a:"Au-Haidhausen",v:["beautiful", "hidden", "quiet"],d:6,s:"A neighborhood with small public gardens and quiet squares—locals\' Munich, not tourists\' Munich.",st:"Squares are small and local. Gardens have benches. You see neighbors. The pace is different from downtown. It\'s residential and real. You feel like you\'ve discovered something locals know.",im:"It\'s anytime. A neighborhood just being itself without performance.",t:"Squares are small and local. Gardens have benches. You see neighbors. The pace is different from downtown. It\'s residential and real. You feel like you\'ve discovered something locals know.\",im:\"It\'s anytime. A neighborhood just being itself without performance.\",t:\"Walk freely. Free. Go afternoon. The quiet is the point. Cafés scattered. The neighborhood rewards slow wandering. No agenda needed.",c:["beautiful", "hidden"],r:"g",nn:"Au-Haidhausen Hidden Gardens Garten — Au-Haidhausen",ns:"Botanisch oder geometrisch—Natur als Kunst.",nst:"Der Garten ist gepflanzt mit Kunst. Blumen überall, Fountains, Statuen. Im Sommer Blüten. Du wandelst wie in Gemälde.",nt:"€5-10 Eintritt. Täglich 9-18 Uhr (Winter kürzer). Beste Zeit: Frühling/Sommer wenn Blüten. Audioguide oft kostenlos. Café im Garten."},
  {id:7,n:"Nymphenburg Palace Grounds (Free) — Nymphenburg",a:"Nymphenburg",v:["beautiful", "parks", "free"],d:7,s:"Palace grounds free to explore—gardens, canals, walking paths—the paid interior is nice but the grounds are the real treasure.",st:"Gardens are vast and manicured. Canals flow. Paths wind. You could spend hours. Light changes constantly. The scale is immense. You\'re in a designed landscape of extreme beauty.",im:"It\'s 1700. A king commissions a summer palace. He spares no expense.",t:"Gardens are vast and manicured. Canals flow. Paths wind. You could spend hours. Light changes constantly. The scale is immense. You\'re in a designed landscape of extreme beauty.\",im:\"It\'s 1700. A king commissions a summer palace. He spares no expense.\",t:\"Free entry to grounds. €9 interior if interested. Go early morning for light and quiet. Bring water. 2-3 hours minimum to appreciate.",c:["parks", "free"],r:"g",nn:"Schloss Nymphenburg — Neuhausen",ns:"Der königliche Sommersitz—Bayerns Versailles.",nst:"Schloss Nymphenburg ist gigantisch. Der Schlossgarten ist noch gigantischer. Du läufst durch Zimmer, wo König Ludwig lebte. Die Gärten gehen endlos. Im Sommer siehst du die Fassade im Wasser gespiegelt—das ist Traum.",nt:"€13 Schloss, €8 Gärten. April-Oktober täglich 9-18 Uhr. Winter 10-16 Uhr. U-Bahn Rotkreuzplatz. Bring Fahrrad für die Gärten—sie sind groß."},
  {id:8,n:"Alte Pinakothek (€1 Sunday Entry) — Maxvorstadt",a:"Maxvorstadt",v:["art", "free"],d:8,s:"World-class art museum—normally €7, but €1 on Sunday—Rubens, Rembrandt, European masters for a euro.",st:"High ceilings. Works hung beautifully. The collection spans centuries. You feel intelligent being here. Great art accessible. The Sunday ritual brings in locals who don\'t normally visit museums.",im:"It\'s anytime. Great art should be accessible.",t:"High ceilings. Works hung beautifully. The collection spans centuries. You feel intelligent being here. Great art accessible. The Sunday ritual brings in locals who don\'t normally visit museums.\",im:\"It\'s anytime. Great art should be accessible.\",t:\"€1 entry Sundays. Normally €7. Go Sunday afternoon for local crowds. Spend 2 hours minimum. The collection is excellent. The building is beautiful.",c:["art", "free"],r:"g",nn:"Pinakothek der Moderne — Maxvorstadt",ns:"Kunst vom 19. Jahrhundert bis heute—alle Stile unter einem Dach.",nst:"Die Pinakothek ist drei Museen in einem Gebäude. Du siehst Meisterwerke von der Renaissance bis zur Installation-Art. Picasso, Dalí, Käthe Kollwitz. Der Bau selbst ist Architektur-Design.",nt:"€12 Eintritt (€10 ermäßigt). Täglich 10-18 Uhr (Mittwoch bis 20 Uhr, Montag geschlossen). Maxvorstadt. U-Bahn Odeonsplatz. Gutes Café im Untergeschoss."},
  {id:9,n:"BMW Welt (Free Entry) — Milbertshofen",a:"Milbertshofen",v:["architecture", "weird"],d:9,s:"A massive building housing BMW cars—free to enter and explore, the architecture is bold and beautiful.",st:"The building is sculptural. Inside, cars are displayed like art. The space is designed to impress. You don\'t need to care about cars to appreciate the design. The scale is immense.",im:"It\'s 2000s. A company decides to build a cathedral to itself. The architects oblige.",t:"The building is sculptural. Inside, cars are displayed like art. The space is designed to impress. You don\'t need to care about cars to appreciate the design. The scale is immense.\",im:\"It\'s 2000s. A company decides to build a cathedral to itself. The architects oblige.\",t:\"Free entry. Open daily. Takes 1-2 hours. Bring a camera. The building is worth seeing regardless of car interest. U-Bahn access excellent.",c:["architecture", "weird"],r:"g",nn:"BMW Museum — Olympiapark",ns:"Deutsche Engineering als Kunstform—von Motorrädern bis Supercars.",nst:"Das BMW Museum zeigt die Geschichte von BMW. Von frühen Motorrädern über Autos bis zur Zukunft. Du siehst die Evolution von Technik und Design. Die Zukunfts-Autos sind wild—Konzepte für morgen.",nt:"€15 Eintritt. Täglich 10-18 Uhr (Montag 12-18 Uhr). Olympiapark nördlich. U-Bahn Olympiazentrum. Café im Museum. Plan 2 Stunden ein."},
  {id:10,n:"Tierpark Hellabrunn (Zoo with Good Design) — Hellabrunn",a:"Hellabrunn",v:["nature", "beautiful"],d:10,s:"Zoo designed geographically—sections represent different world regions—animals have space, humans have views, balance achieved.",st:"Walking through the zoo, you traverse geography. Animals are in habitats. It\'s designed thoughtfully. The scale is vast. You could spend the whole day. The animals look healthier here.",im:"It\'s 1900. A zoo opens with a revolutionary idea: give animals space.",t:"Walking through the zoo, you traverse geography. Animals are in habitats. It\'s designed thoughtfully. The scale is vast. You could spend the whole day. The animals look healthier here.\",im:\"It\'s 1900. A zoo opens with a revolutionary idea: give animals space.\",t:\"€13-15 entry. Open daily. Spend 3-4 hours minimum. Bring water. Good walking shoes. The design is worth appreciating. Café available.",c:["nature", "parks"],r:"g",nn:"Tierpark Hellabrunn Park — Hellabrunn",ns:"Grün und Bäume—wo Stadt atmet.",nst:"Der Park ist groß mit Bäumen und Plätzen zum Sitzen. Menschen joggen, Kinder spielen, Paare küssen. Es ist Natur in Stadt.",nt:"Kostenlos. Überall zugänglich. Beste Zeit: Sommer ab 18 Uhr. Biergärten oder Cafés oft im Park. Picnic-freundlich. Entspannung pur."},
  {id:11,n:"Isar River Wild Swimming Spots — Various",a:"Various",v:["nature", "wild", "beautiful"],d:11,s:"Stretches of the Isar where locals swim in summer—cold water, natural banks, locals just being locals.",st:"The river flows. Banks are accessible. On warm days, people lie on grass, swim in the current. It\'s natural and ordinary. The water is cold but refreshing. You feel part of normal city life.",im:"It\'s summer. A Münchener dives into the river after work. It\'s what you do.",t:"The river flows. Banks are accessible. On warm days, people lie on grass, swim in the current. It\'s natural and ordinary. The water is cold but refreshing. You feel part of normal city life.\",im:\"It\'s summer. A Münchener dives into the river after work. It\'s what you do.\",t:\"Various access points along the Isar. Free. Go in good weather. Bring a towel. The water is COLD. Go with locals for best spots. Ask around—locals know.",c:["nature", "wild"],r:"g",nn:"Isar River Wild Swimming Spots Ufer — Various",ns:"Der Fluss—wo Stadt mit Wasser tanzt.",nst:"Du spazierst am Fluss-Ufer. Boote fahren vorbei, Menschen sitzen auf Steinen, Schwäne schwimmen. Der Fluss ist Puls der Stadt.",nt:"Kostenlos spazieren. Restaurants am Ufer €12-30. Bootsfahrten €10-20. Beste Zeit: Sommer ab 18 Uhr. Sonnenuntergang sehr schön."},
  {id:12,n:"Flaucher Gravel Beach — Flaucher",a:"Flaucher",v:["nature", "beautiful"],d:12,s:"A gravel beach where Isar widdens—locals picnic, swim, sunbathe—weekend culture visible.",st:"The river slows. Gravel banks. People gather. Families, couples, groups. The vibe is relaxed and local. It\'s temporary—by winter it\'s different. But in summer, it\'s perfect.",im:"It\'s summer. Müncheners come here to feel like they\'re at the seaside even though it\'s a river.",t:"The river slows. Gravel banks. People gather. Families, couples, groups. The vibe is relaxed and local. It\'s temporary—by winter it\'s different. But in summer, it\'s perfect.\",im:\"It\'s summer. Müncheners come here to feel like they\'re at the seaside even though it\'s a river.\",t:\"Walk or bike along the Isar. Free. Go afternoons in summer. Bring food for picnic. The vibe is local and genuine. No facilities, so prepare ahead.",c:["nature", "beautiful"],r:"g",nn:"Flaucher Gravel Beach — Flaucher",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:13,n:"Westpark Pagoda (Asian-Inspired Gardens) — Westpark",a:"Westpark",v:["beautiful", "parks", "weird"],d:13,s:"A park with a Chinese pagoda and Asian gardens—unexpected in Munich, beautiful execution.",st:"The pagoda rises. Gardens are designed with intention. It\'s a thoughtful cultural exchange visible in landscape. The scale is intimate but impressive. You feel transported briefly.",im:"It\'s 1980. The city decides to build an Asian-inspired section. Why not?",t:"The pagoda rises. Gardens are designed with intention. It\'s a thoughtful cultural exchange visible in landscape. The scale is intimate but impressive. You feel transported briefly.\",im:\"It\'s 1980. The city decides to build an Asian-inspired section. Why not?\",t:\"Free entry. U-Bahn access. Go afternoon for light. Spend 1-2 hours. The park is larger than just the pagoda—explore all sections.",c:["parks", "beautiful"],r:"g",nn:"Westpark Pagoda Garten — Westpark",ns:"Botanisch oder geometrisch—Natur als Kunst.",nst:"Der Garten ist gepflanzt mit Kunst. Blumen überall, Fountains, Statuen. Im Sommer Blüten. Du wandelst wie in Gemälde.",nt:"€5-10 Eintritt. Täglich 9-18 Uhr (Winter kürzer). Beste Zeit: Frühling/Sommer wenn Blüten. Audioguide oft kostenlos. Café im Garten."},
  {id:14,n:"Sendlinger Tor Station (Beautiful U-Bahn) — Sendling",a:"Sendling",v:["architecture", "beautiful"],d:14,s:"An underground train station designed with care—tile work, lighting, cleanliness—the beauty of functional transit.",st:"The station is clean and well-lit. Tiles line the walls. The design is thoughtful. You realize German efficiency can be beautiful. Even the underground system is designed with care.",im:"It\'s 1972. Engineers design a U-Bahn station. They decide it should be beautiful.",t:"The station is clean and well-lit. Tiles line the walls. The design is thoughtful. You realize German efficiency can be beautiful. Even the underground system is designed with care.\",im:\"It\'s 1972. Engineers design a U-Bahn station. They decide it should be beautiful.\",t:\"Free to see (visit or pass through). Go any time of day. Photography allowed. It\'s a small detail but worth noticing.",c:["architecture", "beautiful"],r:"g",nn:"Sendlinger Tor Station — Sendling",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:15,n:"Dachau Memorial (Day Trip, Free, Essential) — Dachau",a:"Dachau",v:["history", "scary"],d:15,s:"Nazi concentration camp preserved as memorial—30km from Munich—history you can walk through and feel.",st:"The grounds are vast. Barracks are preserved. Gas chamber visible. The weight is immense. You walk slowly. You read carefully. The emptiness of the buildings makes it more real. History tangible.",im:"It\'s 1933-1945. Prisoners arrive. Some leave; most don\'t. The machine is bureaucratic and efficient and evil.",t:"The grounds are vast. Barracks are preserved. Gas chamber visible. The weight is immense. You walk slowly. You read carefully. The emptiness of the buildings makes it more real. History tangible.\",im:\"It\'s 1933-1945. Prisoners arrive. Some leave; most don\'t. The machine is bureaucratic and efficient and evil.\",t:\"S-Bahn from Munich (30 minutes, €3-5). Free entry. 3-4 hours minimum. Go respectfully. This is essential history, not entertainment. Bring tissues if you\'re emotional.",c:["history_big", "scary"],r:"y",nn:"Dachau Memorial — Dachau",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:16,n:"Maxvorstadt Gallery District (Art & Museums) — Maxvorstadt",a:"Maxvorstadt",v:["art", "local_only"],d:16,s:"A neighborhood of museums and galleries—Pinakoteks, sculpture museum—the art quarter where you can spend days.",st:"Museums line streets. Galleries open onto sidewalks. Students walk carrying portfolios. The intellectual life of the city is visible. It feels like being in culture.",im:"It\'s 1920. Artists and intellectuals gather in this neighborhood. Ideas flow.",t:"Museums line streets. Galleries open onto sidewalks. Students walk carrying portfolios. The intellectual life of the city is visible. It feels like being in culture.\",im:\"It\'s 1920. Artists and intellectuals gather in this neighborhood. Ideas flow.\",t:\"Walk between museums. Most €5-10 entry. Go mid-week for quiet. Spend time in each. Cafés scattered. The district is designed for lingering.",c:["art", "local_only"],r:"g",nn:"Maxvorstadt Gallery District Museum — Maxvorstadt",ns:"Museum mit Sammlungen und Geschichte.",nst:"Du betrittst das Museum und siehst Kunstwerke, Artefakte, alte Dinge. Jedes Objekt erzählt eine Geschichte. Es ist Vergangenheit bewahrt für Gegenwart.",nt:"€6-12 Eintritt. Täglich 10-18 Uhr (Montag oft geschlossen). Audioguide kostenlos oder €3. Café im Gebäude. Plan 2 Stunden."},
  {id:17,n:"Starnberger See (Lake Day Trip) — Starnberger See",a:"Starnberger See",v:["nature", "beautiful"],d:17,s:"A lake 30km away with towns, beaches, walking paths—completely different landscape accessible by S-Bahn.",st:"The lake is large and clear. Mountains beyond. Beaches line the shore. Towns are small and upscale. Walking paths follow the water. It feels Alpine and peaceful.",im:"It\'s anytime. Lakes have always drawn people in summer.",t:"The lake is large and clear. Mountains beyond. Beaches line the shore. Towns are small and upscale. Walking paths follow the water. It feels Alpine and peaceful.\",im:\"It\'s anytime. Lakes have always drawn people in summer.\",t:\"S-Bahn from Munich (45 minutes, €5-8). Walk around towns, swim, rent boats. Buses around lake. Spend full day. Bring water and snacks. The lake is beautiful.",c:["nature", "beautiful"],r:"g",nn:"Starnberger See See — Starnberger See",ns:"Wasser zum Schauen oder zum Baden—Freude.",nst:"Der See ist Ruhe und Raum. Segelboote, Schwäne, Menschen auf Bänken. Du sitzt und denkst. Es ist friedlich.",nt:"Kostenlos. Überall zugänglich. Baden Sommer möglich (freie Seite). Cafés/Restaurants am Ufer €4-10. Beste Zeit: Sommer mittag/abend."},
  {id:18,n:"Andechs Monastery (Day Trip by S-Bahn) — Andechs",a:"Andechs",v:["history", "beautiful"],d:18,s:"A monastery on a hill an hour away—church, brewery, beer garden—pilgrimage destination that became hiking destination.",st:"The church sits atop a hill. The walk up has views. Inside, Baroque frescoes. Outside, a beer garden. The vibe is pilgrimage meets recreation. People hike here and drink beer in an abbey garden.",im:"It\'s 1400s. Pilgrims arrive at this monastery. The beer is as famous as the prayer.",t:"The church sits atop a hill. The walk up has views. Inside, Baroque frescoes. Outside, a beer garden. The vibe is pilgrimage meets recreation. People hike here and drink beer in an abbey garden.\",im:\"It\'s 1400s. Pilgrims arrive at this monastery. The beer is as famous as the prayer.\",t:\"S-Bahn + bus from Munich (1 hour total, €8-10). Walk up the hill. Church free, beer garden €5-10. Spend full day. Go weekday for fewer crowds.",c:["history_big", "beautiful"],r:"g",nn:"Andechs Monastery — Andechs",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:19,n:"German TikTok Munich Secrets — Various",a:"Various",v:["local_only", "weird"],d:19,s:"Hidden Instagram-worthy spots that German locals share—finding the aesthetic Munich nobody posts.",st:"These spots are carefully framed. Light is considered. Composition intentional. They\'re beautiful because someone cared to find them. You feel like you\'re seeing through local eyes.",im:"It\'s today. A local stands in perfect light taking a perfect photo. It will be seen thousands of times.",t:"These spots are carefully framed. Light is considered. Composition intentional. They\'re beautiful because someone cared to find them. You feel like you\'re seeing through local eyes.\",im:\"It\'s today. A local stands in perfect light taking a perfect photo. It will be seen thousands of times.\",t:\"Search \'München hidden gems\' on TikTok/Instagram. Go with coordinates. Go during golden hour. Bring camera. The spots are real and worth finding.",c:["local_only", "weird"],r:"g",nn:"German TikTok Munich Secrets — Various",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:20,n:"Beer Garden Culture (Hidden Gems) — Various",a:"Various",v:["local_only", "night"],d:20,s:"Beer gardens beyond the famous ones—where Müncheners actually gather, the real beer culture.",st:"Tables under trees. Long benches. Large beer steins. Food from food stalls. The vibe is communal and relaxed. You\'re part of a tradition that stretches centuries.",im:"It\'s anytime. Müncheners have always gathered under trees to drink beer and be social.",t:"Tables under trees. Long benches. Large beer steins. Food from food stalls. The vibe is communal and relaxed. You\'re part of a tradition that stretches centuries.\",im:\"It\'s anytime. Müncheners have always gathered under trees to drink beer and be social.\",t:\"Ask locals for their favorite garden. Most free entry. Beer €5-8, food €8-15. Go evening for crowds and energy. The garden is the point; the beer is secondary.",c:["local_only", "night"],r:"g",nn:"Beer Garden Culture Garten — Various",ns:"Botanisch oder geometrisch—Natur als Kunst.",nst:"Der Garten ist gepflanzt mit Kunst. Blumen überall, Fountains, Statuen. Im Sommer Blüten. Du wandelst wie in Gemälde.",nt:"€5-10 Eintritt. Täglich 9-18 Uhr (Winter kürzer). Beste Zeit: Frühling/Sommer wenn Blüten. Audioguide oft kostenlos. Café im Garten."},
  {id:21,n:"Monopteros Temple Viewpoint — English Garden",a:"English Garden",v:["beautiful", "history"],d:21,s:"A Greek-style temple in the park with views of Munich",st:"The white structure stands. Visitors rest on steps. Below, the park spreads. It\'s peaceful and overlooked.",im:"It\'s 1837. A Bavarian king commissions a Greek temple in his garden.",t:"The white structure stands. Visitors rest on steps. Below, the park spreads. It\'s peaceful and overlooked.\",im:\"It\'s 1837. A Bavarian king commissions a Greek temple in his garden.\",t:\"Free. Go afternoon. Photography excellent. The temple is small but the vibe is serene.",c:["beautiful", "hidden"],r:"g",nn:"Englischer Garten — Schwabing",ns:"Der größte Stadtpark Europas—5 km Abenteuer im Wald.",nst:"Der Englische Garten ist kein Garten—es ist Wald in der Stadt. Du kannst Stunden laufen und nur Bäume und Flüsse sehen. Surfer im Eisbach. Nackerte (Nacktbadende) im Schwabinger Bach. Biergärten versteckt im Wald.",nt:"Kostenlos. Überall zugänglich. Bring Fahrrad—es ist groß. Biergärten wie Hirschau (€3-4 Bier). Picknick-freundlich. Frühjahr/Sommer sind beste Zeiten."},
  {id:22,n:"Chinese Tower Beer Garden — English Garden",a:"English Garden",v:["local_only", "night"],d:22,s:"A beer garden beneath a Chinese-style tower in the park",st:"Beer steins clink. The tower rises. Tables fill. It\'s communal and traditional and completely strange.",im:"It\'s 1789. The garden needs a folly. A Chinese tower appears.",t:"Beer steins clink. The tower rises. Tables fill. It\'s communal and traditional and completely strange.\",im:\"It\'s 1789. The garden needs a folly. A Chinese tower appears.\",t:\"Beer €5-8. Food €8-15. Go evenings. The tower is the icon.",c:["local_only", "night"],r:"g",nn:"Englischer Garten — Schwabing",ns:"Der größte Stadtpark Europas—5 km Abenteuer im Wald.",nst:"Der Englische Garten ist kein Garten—es ist Wald in der Stadt. Du kannst Stunden laufen und nur Bäume und Flüsse sehen. Surfer im Eisbach. Nackerte (Nacktbadende) im Schwabinger Bach. Biergärten versteckt im Wald.",nt:"Kostenlos. Überall zugänglich. Bring Fahrrad—es ist groß. Biergärten wie Hirschau (€3-4 Bier). Picknick-freundlich. Frühjahr/Sommer sind beste Zeiten."},
  {id:23,n:"Olympic Village Abandoned Areas — Olympiapark",a:"Olympiapark",v:["history", "weird"],d:23,s:"1972 Olympic housing now partially abandoned and open",st:"Buildings stand quiet. Some occupied, some empty. You see what happens when legacy fades.",im:"It\'s 1972. Athletes stay here. By 2000, it\'s different.",t:"Buildings stand quiet. Some occupied, some empty. You see what happens when legacy fades.\",im:\"It\'s 1972. Athletes stay here. By 2000, it\'s different.\",t:\"Free walking. Some buildings closed. Go afternoon. The emptiness is eerie.",c:["history_big", "weird"],r:"g",nn:"Olympic Village Abandoned Areas Park — Olympiapark",ns:"Grün und Bäume—wo Stadt atmet.",nst:"Der Park ist groß mit Bäumen und Plätzen zum Sitzen. Menschen joggen, Kinder spielen, Paare küssen. Es ist Natur in Stadt.",nt:"Kostenlos. Überall zugänglich. Beste Zeit: Sommer ab 18 Uhr. Biergärten oder Cafés oft im Park. Picnic-freundlich. Entspannung pur."},
  {id:24,n:"Asamkirche Baroque Hidden Gem — Sendling",a:"Sendling",v:["history", "beautiful"],d:24,s:"A small ornate Baroque church with overwhelming interior detail",st:"Every surface decorated. Gold, frescoes, sculptures. It\'s excessive and beautiful. You feel the faith visually.",im:"It\'s 1733. A family builds a church to their beliefs.",t:"Every surface decorated. Gold, frescoes, sculptures. It\'s excessive and beautiful. You feel the faith visually.\",im:\"It\'s 1733. A family builds a church to their beliefs.\",t:\"€3-5 entry. Go morning for light. The interior rewards close looking.",c:["history_big", "beautiful"],r:"g",nn:"Asamkirche Baroque Hidden Gem Kirche — Sendling",ns:"Gotisch oder barock—wo Glaube in Stein ist.",nst:"Du trittst in die Kirche. Licht kommt durch Fenster. Deckenmalerei, Altäre, Glocken. Es ist heilig und zeitlos. Deine Stimme hallt.",nt:"Kostenlos eintritt. Täglich 8-18 Uhr (manche bis 19 Uhr). Konzerte gelegentlich €10-20. Sehr ruhig und meditativ. Respekt für Beter."},
  {id:25,n:"St. Michael\'s Church Crypt — Marienplatz",a:"Marienplatz",v:["history", "scary"],d:25,s:"Underground crypt holding Wittelsbach royal graves",st:"Stone below stone. Tombs arranged. History compressed. It\'s cool and quiet.",im:"It\'s 1597. Royals are buried here. Dynasties rest below the city.",t:"Stone below stone. Tombs arranged. History compressed. It\'s cool and quiet.\",im:\"It\'s 1597. Royals are buried here. Dynasties rest below the city.\",t:\"€2-3 entry. Takes 30 minutes. Go any time. The crypt is atmospheric.",c:["history_big", "scary"],r:"g",nn:"Marienplatz — Altstadt",ns:"Das Herz Münchens: Markthalle, Gotik und Lebkuchen.",nst:"Der Marienplatz ist Münchens Wohnzimmer. Das Neue Rathaus mit seinen Türmchen dominiert. Der Platz ist immer voller Menschen. Morgens ist der Viktualienmarkt voller Farbe—Äpfel, Blumen, Gemüse. Das alte München sitzt hier noch immer.",nt:"Kostenlos. Markthalle täglich offen (außer Sonntags). Lebkuchen von Leberer. Augustiner-Bräu Garten für authentisches Bier. Glockenspiel um 11 Uhr und 17 Uhr (17 Uhr nur Mo-Fr)."},
  {id:26,n:"Hofbräuhaus History Beyond Beer — Marienplatz",a:"Marienplatz",v:["history", "local_only"],d:26,s:"Historic beer hall with 500+ year history, not just touristy",st:"Wooden beams. Centuries of names carved. It\'s real and touristic both. History visible in the wear.",im:"It\'s 1589. A brewery opens. Centuries of gatherings follow.",t:"Wooden beams. Centuries of names carved. It\'s real and touristic both. History visible in the wear.\",im:\"It\'s 1589. A brewery opens. Centuries of gatherings follow.\",t:\"Beer €5-8. Food €10-20. Go midday for locals. The history is load-bearing.",c:["history_big", "local_only"],r:"g",nn:"Marienplatz — Altstadt",ns:"Das Herz Münchens: Markthalle, Gotik und Lebkuchen.",nst:"Der Marienplatz ist Münchens Wohnzimmer. Das Neue Rathaus mit seinen Türmchen dominiert. Der Platz ist immer voller Menschen. Morgens ist der Viktualienmarkt voller Farbe—Äpfel, Blumen, Gemüse. Das alte München sitzt hier noch immer.",nt:"Kostenlos. Markthalle täglich offen (außer Sonntags). Lebkuchen von Leberer. Augustiner-Bräu Garten für authentisches Bier. Glockenspiel um 11 Uhr und 17 Uhr (17 Uhr nur Mo-Fr)."},
  {id:27,n:"Königsplatz Nazi History — Neuhausen",a:"Neuhausen",v:["history", "scary"],d:27,s:"A square used for Nazi rallies, now sobering and significant",st:"The square is open and empty. Neoclassical buildings surround. You know what happened here. The emptiness is intentional.",im:"It\'s 1933-1945. The square is filled with followers. By 1950, silence.",t:"The square is open and empty. Neoclassical buildings surround. You know what happened here. The emptiness is intentional.\",im:\"It\'s 1933-1945. The square is filled with followers. By 1950, silence.\",t:\"Free. Walk respectfully. Museums nearby €5-10. This requires contemplation.",c:["history_big", "scary"],r:"g",nn:"Königsplatz Nazi History Platz — Neuhausen",ns:"Zentral und belebt—Herz der Stadt.",nst:"Der Platz ist pulsierend. Brunnen, Restaurants, Menschen von überall. Es ist wo City trifft. Du gehörst sofort dazu.",nt:"Kostenlos spazieren. Restaurants €12-25. Cafés €3-6. Beste Zeit: Abend wenn Lichter an. Märkte gelegentlich auf Platz. Sehr touristisch aber authentisch."},

  {id:34,n:"Neuschwanstein Castle Day Trip — Hohenschwangau",a:"Hohenschwangau",v:["history", "beautiful"],d:34,s:"Fairy-tale castle 2 hours by Bayern-Ticket train",st:"The castle rises. Mountains surround. It\'s real and storybook both. The reality is crowded but the sight is worth it.",im:"It\'s 1869. A king builds fantasy. Tourism follows.",t:"The castle rises. Mountains surround. It\'s real and storybook both. The reality is crowded but the sight is worth it.\",im:\"It\'s 1869. A king builds fantasy. Tourism follows.\",t:\"Bayern-Ticket train €25-30. Castle €12-15. Go early. Crowds immense. Book ahead.",c:["history_big", "beautiful"],r:"g",nn:"Neuschwanstein — Hohenschwangau",ns:"Das Schloss aus dem Märchen—das echte Original.",nst:"Neuschwanstein ist das Schloss aus Disneys Träumen. Weiße Türme, Berge im Hintergrund, wie aus einem Roman. Ludwig II. hat es gebaut, aber nie wirklich darin gewohnt. Magie ist in den Mauern.",nt:"€13 Eintritt. 1 Stunde Busfahrt von München. Nur mit Führung möglich (englisch/deutsch). Reservierung empfohlen. Neuschwanstein Trail ist kostenlos und bietet beste Aussicht."},

  {id:61,n:"Neuschwanstein Nearby Tegelberg — Hohenschwangau",a:"Hohenschwangau",v:["nature", "high_spots"],d:61,s:"A mountain near Neuschwanstein with cable car and hiking",st:"The mountain rises. Views of surrounding castles. It\'s alpine and accessible. The air is different up here.",im:"It\'s anytime. Mountains were always hard to reach. Now easier.",t:"The mountain rises. Views of surrounding castles. It\'s alpine and accessible. The air is different up here.\",im:\"It\'s anytime. Mountains were always hard to reach. Now easier.\",t:\"Bayern-Ticket train (2h). Cable car €8-10. Takes full day. The views are panoramic.",c:["nature", "high_spots"],r:"g",nn:"Neuschwanstein — Hohenschwangau",ns:"Das Schloss aus dem Märchen—das echte Original.",nst:"Neuschwanstein ist das Schloss aus Disneys Träumen. Weiße Türme, Berge im Hintergrund, wie aus einem Roman. Ludwig II. hat es gebaut, aber nie wirklich darin gewohnt. Magie ist in den Mauern.",nt:"€13 Eintritt. 1 Stunde Busfahrt von München. Nur mit Führung möglich (englisch/deutsch). Reservierung empfohlen. Neuschwanstein Trail ist kostenlos und bietet beste Aussicht."},
  {id:62,n:"Berghof Hitler Retreat Ruins — Obersalzberg",a:"Obersalzberg",v:["history", "scary"],d:62,s:"Alpine ruins of Hitler\'s retreat 2 hours away",st:"The bunker remains. Stone walls. You stand where history was planned. It\'s heavy and necessary.",im:"It\'s 1945. The structures remain. The people are gone.",t:"The bunker remains. Stone walls. You stand where history was planned. It\'s heavy and necessary.\",im:\"It\'s 1945. The structures remain. The people are gone.\",t:\"Train + bus (2 hours, €20-25). Guide recommended. Takes 2 hours. Essential dark history.",c:["history_big", "scary"],r:"y",nn:"Berghof Hitler Retreat Ruins — Obersalzberg",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:63,n:"Garmisch-Partenkirchen Mountain Town — Garmisch",a:"Garmisch",v:["nature", "beautiful"],d:63,s:"Alpine town an hour away with mountains and Zugspitze access",st:"The town is charming. Mountains surround. It\'s Bavaria idealized but real. The air is pure.",im:"It\'s anytime. Alpine towns are perched on dreams.",t:"The town is charming. Mountains surround. It\'s Bavaria idealized but real. The air is pure.\",im:\"It\'s anytime. Alpine towns are perched on dreams.\",t:\"S-Bahn (1 hour, €8-12). Walk town freely. Zugspitze cable car €35-40. Full day. Worth the journey.",c:["nature", "beautiful"],r:"g",nn:"Garmisch-Partenkirchen Mountain Town Kirche — Garmisch",ns:"Gotisch oder barock—wo Glaube in Stein ist.",nst:"Du trittst in die Kirche. Licht kommt durch Fenster. Deckenmalerei, Altäre, Glocken. Es ist heilig und zeitlos. Deine Stimme hallt.",nt:"Kostenlos eintritt. Täglich 8-18 Uhr (manche bis 19 Uhr). Konzerte gelegentlich €10-20. Sehr ruhig und meditativ. Respekt für Beter."},
  {id:64,n:"Murnau Artist Village — Murnau",a:"Murnau",v:["art", "history"],d:64,s:"A village where early expressionist artists gathered",st:"The village is small and art-focused. Museums throughout. The landscape inspired artists. It still does.",im:"It\'s 1900s. Artists move here for the light and landscape.",t:"The village is small and art-focused. Museums throughout. The landscape inspired artists. It still does.\",im:\"It\'s 1900s. Artists move here for the light and landscape.\",t:\"S-Bahn + bus (1 hour, €8-10). Walk freely. Museums €3-8. Afternoon or full day.",c:["art", "history_big"],r:"g",nn:"Murnau Artist Village — Murnau",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},

  {id:66,n:"Eurasburg Pilgrimage Church — Eurasburg",a:"Eurasburg",v:["history", "beautiful"],d:66,s:"A pilgrimage church in rural Bavaria",st:"The church rises from fields. It\'s isolated and peaceful. Pilgrims still come. It\'s faith made visible.",im:"It\'s 1700s. A church is built for pilgrims. They still arrive.",t:"The church rises from fields. It\'s isolated and peaceful. Pilgrims still come. It\'s faith made visible.\",im:\"It\'s 1700s. A church is built for pilgrims. They still arrive.\",t:\"S-Bahn + bus (1 hour, €8-10). Walk freely. Free entry. Go afternoon. The isolation is the point.",c:["history_big", "beautiful"],r:"g",nn:"Eurasburg Pilgrimage Church — Eurasburg",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},

  {id:68,n:"Maisach River Kayaking — Maisach",a:"Maisach",v:["nature", "wild"],d:68,s:"A river where locals kayak and swim in summer",st:"Water flows. People drift. It\'s casual and free. The current carries you. Community visible on water.",im:"It\'s summer. Locals rent kayaks and float the river.",t:"Water flows. People drift. It\'s casual and free. The current carries you. Community visible on water.\",im:\"It\'s summer. Locals rent kayaks and float the river.\",t:\"S-Bahn access (30 min, €3-5). Kayak rental €15-25. Half day or full day. The water is cool but refreshing.",c:["nature", "wild"],r:"g",nn:"Maisach River Kayaking Ufer — Maisach",ns:"Der Fluss—wo Stadt mit Wasser tanzt.",nst:"Du spazierst am Fluss-Ufer. Boote fahren vorbei, Menschen sitzen auf Steinen, Schwäne schwimmen. Der Fluss ist Puls der Stadt.",nt:"Kostenlos spazieren. Restaurants am Ufer €12-30. Bootsfahrten €10-20. Beste Zeit: Sommer ab 18 Uhr. Sonnenuntergang sehr schön."},
  {id:69,n:"Eggstätt-Hemhof Lakes District — Eggstätt",a:"Eggstätt",v:["nature", "beautiful"],d:69,s:"Multiple lakes in a region with walking paths between them",st:"Water everywhere. Paths connect lakes. You swim and walk. Nature is the point. It\'s peaceful.",im:"It\'s summer. Müncheners escape to the lakes.",t:"Water everywhere. Paths connect lakes. You swim and walk. Nature is the point. It\'s peaceful.\",im:\"It\'s summer. Müncheners escape to the lakes.\",t:\"S-Bahn (30 min, €3-5). Walk freely. Beaches free. Bring towel. Full day possible.",c:["nature", "parks"],r:"g",nn:"Eggstätt-Hemhof Lakes District See — Eggstätt",ns:"Wasser zum Schauen oder zum Baden—Freude.",nst:"Der See ist Ruhe und Raum. Segelboote, Schwäne, Menschen auf Bänken. Du sitzt und denkst. Es ist friedlich.",nt:"Kostenlos. Überall zugänglich. Baden Sommer möglich (freie Seite). Cafés/Restaurants am Ufer €4-10. Beste Zeit: Sommer mittag/abend."},
  {id:70,n:"Herrenchiemsee Palace — Prien",a:"Prien",v:["history", "beautiful"],d:70,s:"An island palace 1 hour by train, Versailles replica",st:"The palace is excessive. It\'s a copy of Versailles on an island. The boat ride is part of the experience. It\'s surreal.",im:"It\'s 1878. A mad king builds Versailles in Bavaria.",t:"The palace is excessive. It\'s a copy of Versailles on an island. The boat ride is part of the experience. It\'s surreal.\",im:\"It\'s 1878. A mad king builds Versailles in Bavaria.\",t:\"Train (1 hour, €12-16). Ferry €8-10. Palace €12-15. Full day. The madness is visible.",c:["history_big", "beautiful"],r:"g",nn:"Herrenchiemsee Palace Palast — Prien",ns:"König-Haus—wo Macht und Schönheit zusammenkommen.",nst:"Der Palast ist königlich. Zimmer nach Zimmer nach Zimmer. Fußböden sind Kunstholz. Decken haben Malerei. Möbel sind antik. Es ist Reichtum.",nt:"€10-15 Eintritt. Täglich 9-17 Uhr (Winter 10-16 Uhr). Audioguide kostenlos. Gartenpass oft extra. Plan 2-3 Stunden ein."},
  {id:71,n:"Chiemsee Lake Summer Escape — Prien",a:"Prien",v:["nature", "beautiful"],d:71,s:"Bavaria\'s largest lake with beaches and towns around it",st:"The lake is vast. Mountains beyond. Towns on shores. It\'s Alpine resort but real. People swim and relax.",im:"It\'s summer. Müncheners escape to the lake.",t:"The lake is vast. Mountains beyond. Towns on shores. It\'s Alpine resort but real. People swim and relax.\",im:\"It\'s summer. Müncheners escape to the lake.\",t:\"S-Bahn (1 hour, €8-12). Beaches free. Water cold but swimable. Full day. The views are excellent.",c:["nature", "parks"],r:"g",nn:"Chiemsee Lake Summer Escape See — Prien",ns:"Wasser zum Schauen oder zum Baden—Freude.",nst:"Der See ist Ruhe und Raum. Segelboote, Schwäne, Menschen auf Bänken. Du sitzt und denkst. Es ist friedlich.",nt:"Kostenlos. Überall zugänglich. Baden Sommer möglich (freie Seite). Cafés/Restaurants am Ufer €4-10. Beste Zeit: Sommer mittag/abend."},

  {id:73,n:"Possenhofen Castle Lake Side — Starnberger See",a:"Starnberger See",v:["history", "beautiful"],d:73,s:"A castle on the lake where Bavarian royalty lived",st:"The castle sits on water. It\'s visible from the shore. History and beauty. Accessible by walking.",im:"It\'s 1800. A royal family builds here.",t:"The castle sits on water. It\'s visible from the shore. History and beauty. Accessible by walking.\",im:\"It\'s 1800. A royal family builds here.\",t:\"S-Bahn (45 min, €5-8). Walk around freely. No interior access. Go afternoon for light. Photography excellent.",c:["history_big", "beautiful"],r:"g",nn:"Possenhofen Castle Lake Side Schloss — Starnberger See",ns:"Mittelalter-Mauern und Geschichte—wo Ritter lebten.",nst:"Das Schloss sitzt auf Berg oder in Stadt. Alte Mauern, Türme, enge Gassen. Du siehst Räume wo Adel lebte. Es ist vergangenheit.",nt:"€6-12 Eintritt. Täglich 9-17 Uhr (Sommer bis 18 Uhr). Führungen gelegentlich +€3. Aussicht oft spektakulär. Plan 1-2 Stunden."},

  {id:77,n:"Benediktbeuern Abbey Museum — Benediktbeuern",a:"Benediktbeuern",v:["history", "art"],d:77,s:"Museum within the monastery showing monastic life",st:"Exhibits show how monks lived. Illuminated manuscripts. The history is tangible. It\'s educational and contemplative.",im:"It\'s 1000 years. Monks document their world.",t:"Exhibits show how monks lived. Illuminated manuscripts. The history is tangible. It\'s educational and contemplative.\",im:\"It\'s 1000 years. Monks document their world.\",t:\"€6-8 entry. Takes 1.5 hours. Go with monastery tour for full experience. The manuscripts are exceptional.",c:["history_big", "art"],r:"g",nn:"Benediktbeuern Abbey Museum Museum — Benediktbeuern",ns:"Museum mit Sammlungen und Geschichte.",nst:"Du betrittst das Museum und siehst Kunstwerke, Artefakte, alte Dinge. Jedes Objekt erzählt eine Geschichte. Es ist Vergangenheit bewahrt für Gegenwart.",nt:"€6-12 Eintritt. Täglich 10-18 Uhr (Montag oft geschlossen). Audioguide kostenlos oder €3. Café im Gebäude. Plan 2 Stunden."},

  {id:80,n:"Pillar Church Wieskirche — Steingaden",a:"Steingaden",v:["architecture", "beautiful"],d:80,s:"A UNESCO site of ornate Rococo church in rural Bavaria",st:"The church is overwhelming. White and gold. The ceiling frescoes are immense. It\'s pilgrimage church at its most excessive.",im:"It\'s 1745. A Rococo masterpiece is completed.",t:"The church is overwhelming. White and gold. The ceiling frescoes are immense. It\'s pilgrimage church at its most excessive.\",im:\"It\'s 1745. A Rococo masterpiece is completed.\",t:\"Train + bus (1.5 hours, €10-15). Entry €3-5. Takes 1 hour. Go morning for light. The detail rewards study.",c:["architecture", "beautiful"],r:"g",nn:"Pillar Church Wieskirche Kirche — Steingaden",ns:"Gotisch oder barock—wo Glaube in Stein ist.",nst:"Du trittst in die Kirche. Licht kommt durch Fenster. Deckenmalerei, Altäre, Glocken. Es ist heilig und zeitlos. Deine Stimme hallt.",nt:"Kostenlos eintritt. Täglich 8-18 Uhr (manche bis 19 Uhr). Konzerte gelegentlich €10-20. Sehr ruhig und meditativ. Respekt für Beter."},
  {id:81,n:"Fasching Carnival Traditions — Various",a:"Various",v:["local_only", "night"],d:81,s:"Pre-Lenten carnival traditions where Munich celebrates",st:"Masks and costumes. Music and dancing. It\'s tradition visible. The city transforms. Locals celebrate.",im:"It\'s Fasching week (before Lent). The city becomes theater.",t:"Masks and costumes. Music and dancing. It\'s tradition visible. The city transforms. Locals celebrate.\",im:\"It\'s Fasching week (before Lent). The city becomes theater.\",t:\"Varies by event. Most free or €5-15. Go to neighborhood celebrations not touristy ones. The energy is infectious.",c:["local_only", "night"],r:"g",nn:"Fasching Carnival Traditions — Various",ns:"Ein Stadtplatz mit Charakter—wo Geschichte lebt.",nst:"Dieser Platz hat Charakter. Alt oder neu, aber lebendig. Menschen, Restaurants, Läden. Es ist echter Ort, nicht Museum.",nt:"Kostenlos spazieren. Restaurants €10-25. Cafés €3-6. Beste Zeit: Wochenende. Gutes Essen und Bier überall. Sehr authentisch."},
  {id:82,n:"Christkindl Market Christmas — Marienplatz",a:"Marienplatz",v:["beautiful", "holiday"],d:82,s:"Christmas market that transforms the square (November-December)",st:"Stalls sell crafts and food. The smell is cinnamon and mulled wine. It\'s magical despite crowds. The season is felt.",im:"It\'s December. A market appears. The city becomes festive.",t:"Stalls sell crafts and food. The smell is cinnamon and mulled wine. It\'s magical despite crowds. The season is felt.\",im:\"It\'s December. A market appears. The city becomes festive.\",t:\"Late November-December. Free to walk. Food €5-15. Go evening for magic. The atmosphere is festive.",c:["beautiful", "local_only"],r:"g",nn:"Marienplatz — Altstadt",ns:"Das Herz Münchens: Markthalle, Gotik und Lebkuchen.",nst:"Der Marienplatz ist Münchens Wohnzimmer. Das Neue Rathaus mit seinen Türmchen dominiert. Der Platz ist immer voller Menschen. Morgens ist der Viktualienmarkt voller Farbe—Äpfel, Blumen, Gemüse. Das alte München sitzt hier noch immer.",nt:"Kostenlos. Markthalle täglich offen (außer Sonntags). Lebkuchen von Leberer. Augustiner-Bräu Garten für authentisches Bier. Glockenspiel um 11 Uhr und 17 Uhr (17 Uhr nur Mo-Fr)."},
  {id:83,n:"Summer in the English Garden — English Garden",a:"English Garden",v:["nature", "beautiful"],d:83,s:"The garden in full summer is a parallel world within the city",st:"Green everywhere. Beer gardens. People swimming. The pace slows. It\'s Munich\'s summer culture visible.",im:"It\'s June-August. The garden becomes the city\'s heart.",t:"Green everywhere. Beer gardens. People swimming. The pace slows. It\'s Munich\'s summer culture visible.\",im:\"It\'s June-August. The garden becomes the city\'s heart.\",t:\"Free. Go afternoon. Bring towel if swimming. The energy is excellent.",c:["nature", "parks"],r:"g",nn:"Englischer Garten — Schwabing",ns:"Der größte Stadtpark Europas—5 km Abenteuer im Wald.",nst:"Der Englische Garten ist kein Garten—es ist Wald in der Stadt. Du kannst Stunden laufen und nur Bäume und Flüsse sehen. Surfer im Eisbach. Nackerte (Nacktbadende) im Schwabinger Bach. Biergärten versteckt im Wald.",nt:"Kostenlos. Überall zugänglich. Bring Fahrrad—es ist groß. Biergärten wie Hirschau (€3-4 Bier). Picknick-freundlich. Frühjahr/Sommer sind beste Zeiten."},
  {id:84,n:"Marstall Palace Stables Museum — Marienplatz",a:"Marienplatz",v:["history", "art"],d:84,s:"A museum of historic horse carriages and royal transportation",st:"Carriages are ornate. Each tells a story. The craftsmanship is immense. It\'s history through objects.",im:"It\'s centuries. Kings travel in style.",t:"Carriages are ornate. Each tells a story. The craftsmanship is immense. It\'s history through objects.\",im:\"It\'s centuries. Kings travel in style.\",t:\"€5-8 entry. Takes 1 hour. Go afternoon. The craftsmanship rewards attention.",c:["history_big", "art"],r:"g",nn:"Marienplatz — Altstadt",ns:"Das Herz Münchens: Markthalle, Gotik und Lebkuchen.",nst:"Der Marienplatz ist Münchens Wohnzimmer. Das Neue Rathaus mit seinen Türmchen dominiert. Der Platz ist immer voller Menschen. Morgens ist der Viktualienmarkt voller Farbe—Äpfel, Blumen, Gemüse. Das alte München sitzt hier noch immer.",nt:"Kostenlos. Markthalle täglich offen (außer Sonntags). Lebkuchen von Leberer. Augustiner-Bräu Garten für authentisches Bier. Glockenspiel um 11 Uhr und 17 Uhr (17 Uhr nur Mo-Fr)."},
  {id:85,n:"Richard Strauss House Museum — Garmisch",a:"Garmisch",v:["history", "art"],d:85,s:"The home of famous composer Richard Strauss in the Alps",st:"The house shows how he lived. Personal touches visible. It\'s intimate. The Alpine setting inspired his work.",im:"It\'s 1900s. A composer writes symphonies here.",t:"The house shows how he lived. Personal touches visible. It\'s intimate. The Alpine setting inspired his work.\",im:\"It\'s 1900s. A composer writes symphonies here.\",t:\"Train (1 hour, €8-12). House tour €8-10. Takes 1.5 hours. Go afternoon. The connection to the landscape is visible.",c:["history_big", "art"],r:"g",nn:"Richard Strauss House Museum Museum — Garmisch",ns:"Museum mit Sammlungen und Geschichte.",nst:"Du betrittst das Museum und siehst Kunstwerke, Artefakte, alte Dinge. Jedes Objekt erzählt eine Geschichte. Es ist Vergangenheit bewahrt für Gegenwart.",nt:"€6-12 Eintritt. Täglich 10-18 Uhr (Montag oft geschlossen). Audioguide kostenlos oder €3. Café im Gebäude. Plan 2 Stunden."},

<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Munich Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Munich Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
