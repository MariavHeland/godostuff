<script>
const P = [,
  {name:'Hügelpark am Tiefurt',area:'Tiefurt',desc:'Ein versteckter Hügel mit wildem Waldweg, der einen atemberaubenden Blick über die Ilmtal-Landschaft und Teile Weimars bietet – perfekt für Sonnenuntergänge. Locals pilgern hierhin für Picknicks und Spaziergänge fernab der Touristenmassen, erreichbar mit Bus 4 Richtung Tiefurt. Frei zugänglich, bring einfach eine Decke mit.',tags:['viewpoint','park','hidden','free'],lat:50.993,lng:11.34},
  {name:'Courtyard der Cranachstraße',area:'Altstadt',desc:'Ein geheimer Innenhof hinter den alten Fachwerkhäusern der Cranachstraße, voller wilder Blumen und alter Bänke, wo Locals heimlich Kaffee trinken. Tritt durch den unscheinbaren Durchgang und entdecke Street-Art-Reste aus den 90ern. Kostenlos, Tram 2 oder 4 bis Marktplatz.',tags:['courtyard','street art','hidden','free'],lat:50.985,lng:11.329},
  {name:'Park an der Ilsenburger Straße',area:'Ilsenburg-Vorstadt',desc:'Ein ruhiger Nachbarschaftspark mit alten Kastanienbäumen und versteckten Bänken, wo Familien grillen und Hunde toben – das Herz der lokalen Community. Im Sommer blüht hier Lavendel, den Locals ernten. Frei, Bus 1 bis Ilsenburger Straße.',tags:['park','community','local','free'],lat:50.978,lng:11.335},
  {name:'Street Art Mauer am Stein',area:'Steinviertel',desc:'Eine alte Mauer entlang des Flusses, übersät mit frischen Graffiti von lokalen Künstlern – Themen von Thüringer Wäldern bis Bauhaus-Motiven. Locals chillen hier bei Bier aus der Dose und knipsen Insta-Stories. Vollkommen gratis, zu Fuß von Bus 3 Haltestelle Stein.',tags:['street art','hidden','local','free'],lat:50.982,lng:11.322},
  {name:'Warteberg Aussichtspunkt',area:'Am Herrenholz',desc:'Versteckter Hügelpfad mit Panoramablick auf Weimars Dächer und den Ettersberg – ideal für contemplative Spaziergänge. Locals teilen hier Sonnenaufgänge in Facebook-Gruppen. Frei, Bus 6 bis Herrenholz, dann 10 Min. bergauf.',tags:['viewpoint','hidden','local','free'],lat:50.999,lng:11.35},
  {name:'Hof der Berkaer Straße',area:'Berkaer Vorstadt',desc:'Ein magischer Hinterhof mit Moosbänken und selbstgebauten Skulpturen, wo Künstler-Communities treffen und jamen. Perfekt für slow Nachmittage mit Buch. Kostenlos, Bus 2 Richtung Berka.',tags:['courtyard','community','hidden','free'],lat:50.977,lng:11.342},
  {name:'Wochemarkt am Vandebar',area:'Gabelbach',desc:'Kleiner lokaler Flohmarkt samstags mit Second-Hand-Schätzen und selbstgemachten Limos – Locals handeln hier Geschichten aus. Günstig ab 1€, Bus 5 bis Vandebar-Platz.',tags:['market','local','cheap'],lat:50.975,lng:11.328},
  {name:'Kunstpark Piesporter Straße',area:'Piesport',desc:'Versteckter Park mit temporären Street-Art-Installationen von Weimar-Studenten, umgeben von Wildkräutern. Locals picknicken hier bei TikTok-Sessions. Frei, Tram 1 bis Piesporter Straße.',tags:['park','street art','hidden','free'],lat:50.989,lng:11.337},
  {name:'Ilmtal Uferweg View',area:'Ilmtal',desc:'Geheimer Uferpfad mit erhöhtem Blick auf die Ilm und Wald – Locals joggen hier oder meditieren. Pure Ruhe, geteilt in Slow-Travel-Blogs. Frei, Bus 4 entlang der Ilm.',tags:['viewpoint','hidden','local','free'],lat:50.98,lng:11.31},
  {name:'Community Garten Schützengasse',area:'Schütze',desc:'Kleiner Gemeinschaftsgarten in einem Innenhof, wo Locals Gemüse anbauen und teilen – mit Bänken zum Plaudern. Ein Stück echtes Weimar-Leben. Kostenlos, zu Fuß von Bus 3.',tags:['community','courtyard','local','free'],lat:50.983,lng:11.331},
  {id:1,n:"Park an der Ilm — Park an der Ilm",a:"Park an der Ilm",v:["nature","beautiful","history"],d:5,s:"Goethe\'s garden park along the river — free, extraordinary, and always beautiful",st:"Goethe designed and maintained this English landscape park for 50 years. He is buried here spiritually even if not physically. The park has 48 hectares and is completely free. Europe\'s finest free park.",im:"Time-travel: Goethe walking his park with Schiller, debating nature and poetry, 1799",t:"Always free. Enter from Weimarparkstraße. The Gartenhaus is inside.",c:["parks"],r:"g",nn:"Park an der Ilm — Park an der Ilm",ns:"Goethes Gartenparkanlage am Fluss — kostenlos, außergewöhnlich und immer schön",nst:"Goethe gestaltete und pflegte diesen englischen Landschaftspark 50 Jahre lang. 48 Hektar, völlig kostenlos.",nt:"Immer kostenlos. Von der Weimarparkstraße eintreten. Das Gartenhaus liegt darin."},
  {id:2,n:"Goethe\'s Gartenhaus — Park an der Ilm",a:"Park an der Ilm",v:["history","beautiful","quiet"],d:8,s:"The small house where Goethe lived before his grander residence — original garden, original magic",st:"Goethe was given this small Renaissance house in 1776 by Duke Karl August and lived in it for years before his Frauenplan residence. The exterior and surrounding garden are always free.",im:"Time-travel: young Goethe arriving at this garden house for the first time, enchanted, 1776",t:"Exterior and park free. House interior small entry fee.",c:["history_big"],r:"g",nn:"Goethes Gartenhaus — Park an der Ilm",ns:"Das kleine Haus, in dem Goethe lebte bevor er sein größeres Anwesen bezog — originaler Garten",nst:"Goethe erhielt 1776 von Herzog Karl August dieses kleine Renaissancehaus.",nt:"Außen und Park kostenlos. Hausinneres kleiner Eintritt."},
  {id:3,n:"Goethe-Schiller Monument — Altstadt",a:"Altstadt",v:["history","beautiful"],d:5,s:"The most famous monument in German literature — two geniuses sharing one pedestal",st:"Unveiled in 1857, the double statue of Goethe and Schiller is the defining image of Weimar. Both hold a laurel wreath together. The monument is on Theaterplatz in front of the National Theatre.",im:"Time-travel: the 1857 unveiling ceremony — literary Germany gathering to honour both men",t:"Free. The Theaterplatz around it is always open.",c:["famous_dead"],r:"g",nn:"Goethe-Schiller-Denkmal — Altstadt",ns:"Das bekannteste Denkmal der deutschen Literatur — zwei Genies auf einem Sockel",nst:"1857 enthüllt, ist das Doppelstandbild von Goethe und Schiller das bestimmende Bild Weimars.",nt:"Kostenlos. Der Theaterplatz ist immer geöffnet."},
  {id:4,n:"Historischer Friedhof — Goethe Quarter",a:"Goethe Quarter",v:["history","quiet","famous_dead"],d:8,s:"The cemetery where Goethe and Schiller are both buried — the Fürstengruft vault",st:"The Fürstengruft (Ducal Vault) in Weimar\'s historic cemetery holds the coffins of Goethe and Schiller in the same room. Walking to it through the historic graves is free.",im:"Time-travel: Schiller\'s coffin being moved here to rest beside Goethe, 1827",t:"Free to walk the cemetery. Fürstengruft interior small fee.",c:["famous_dead"],r:"g",nn:"Historischer Friedhof — Goethe Quarter",ns:"Der Friedhof, wo Goethe und Schiller begraben sind — die Fürstengruft",nst:"Die Fürstengruft in Weimars historischem Friedhof enthält die Sargkisten von Goethe und Schiller.",nt:"Friedhof kostenlos zu gehen. Fürstengruft Inneres kleiner Eintritt."},
  {id:5,n:"Bauhaus Museum Exterior — Bauhaus Quarter",a:"Bauhaus Quarter",v:["architecture","history","beautiful"],d:8,s:"The new Bauhaus Museum — architecture as bold as the movement itself",st:"Weimar was the birthplace of the Bauhaus in 1919. The museum opened in 2019 for the 100th anniversary. The exterior is a bold piece of architectural statement. The park around it is free.",im:"Time-travel: Gropius founding the Bauhaus in Weimar in 1919, the most radical art school ever created",t:"Exterior and park free. Museum small entry fee.",c:["architecture"],r:"g",nn:"Bauhaus Museum Außen — Bauhaus Quarter",ns:"Das neue Bauhaus-Museum — Architektur so kühn wie die Bewegung selbst",nst:"Weimar war 1919 die Geburtsstätte des Bauhauses. Das Museum öffnete 2019 zum 100. Jubiläum.",nt:"Außen und Park kostenlos. Museum kleiner Eintritt."},
  {id:6,n:"Bauhaus Universität Campus — Bauhaus Quarter",a:"Bauhaus Quarter",v:["architecture","history","beautiful"],d:8,s:"The original Bauhaus buildings on the university campus — Gropius\'s revolution in stone",st:"The original Bauhaus buildings are now part of Weimar\'s art university. The main building by van de Velde (1906) and the Gropius-era buildings can be seen freely. A UNESCO World Heritage site.",im:"Time-travel: Bauhaus students painting the main hall in 1923, Kandinsky watching approvingly",t:"Campus free to walk. Enter from Geschwister-Scholl-Straße.",c:["history_big"],r:"g",nn:"Bauhaus Universität Campus — Bauhaus Quarter",ns:"Die ursprünglichen Bauhaus-Gebäude auf dem Universitätscampus — Gropius Revolution in Stein",nst:"Die ursprünglichen Bauhaus-Gebäude sind jetzt Teil von Weimars Kunstuniversität. UNESCO-Welterbe.",nt:"Campus kostenlos zu gehen. Von der Geschwister-Scholl-Straße eintreten."},
  {id:7,n:"Theaterplatz — Altstadt",a:"Altstadt",v:["history","beautiful","local"],d:5,s:"The square of German culture — the Deutsches Nationaltheater, Goethe-Schiller, and a café terrace",st:"This square contains the National Theatre where the Weimar Republic was proclaimed in 1919, and the Goethe-Schiller monument. It has been the centre of German intellectual life for 200 years.",im:"Time-travel: the proclamation of the Weimar Republic from the National Theatre steps, February 1919",t:"Free. The square is always open.",c:["history_big"],r:"g",nn:"Theaterplatz — Altstadt",ns:"Der Platz der deutschen Kultur — das Deutsche Nationaltheater, Goethe-Schiller und eine Café-Terrasse",nst:"Dieser Platz enthält das Nationaltheater, wo 1919 die Weimarer Republik ausgerufen wurde.",nt:"Kostenlos. Der Platz ist immer geöffnet."},
  {id:8,n:"Markt & Stadtkirche — Altstadt",a:"Altstadt",v:["history","beautiful","local"],d:5,s:"The market square where Weimar\'s weekly life happens — and Lucas Cranach painted here",st:"Weimar\'s market square has been trading since the Middle Ages. The Stadtkirche facing it contains the only altar-piece that Cranach the Elder completed himself. Free to enter the church.",im:"Time-travel: Lucas Cranach at work in the Stadtkirche workshop, 1555, his last great commission",t:"Church free. Market on Saturdays.",c:["history_big"],r:"g",nn:"Markt & Stadtkirche — Altstadt",ns:"Der Marktplatz, wo Weimars Wochenleben stattfindet — und Lucas Cranach hier malte",nst:"Der Marktplatz handelt seit dem Mittelalter. Die Stadtkirche enthält das einzige Altarbild, das Cranach selbst vollendete.",nt:"Kirche kostenlos. Markt Samstags."},
  {id:9,n:"Nietzsche Archive Exterior — Goethe Quarter",a:"Goethe Quarter",v:["history","hidden"],d:10,s:"The house where Nietzsche spent his final decade — insane, silent, and cared for by his sister",st:"Nietzsche collapsed in Turin in 1889 and spent the rest of his life here in mental darkness, cared for by his sister Elisabeth who then systematically misrepresented his philosophy. The house exterior is always accessible.",im:"Time-travel: Nietzsche sitting at the window of this house, no longer recognising the world, 1895",t:"Exterior free. Interior museum on appointment.",c:["famous_dead"],r:"g",nn:"Nietzsche-Archiv Außen — Goethe Quarter",ns:"Das Haus, wo Nietzsche sein letztes Jahrzehnt verbrachte — wahnsinnig, still, von seiner Schwester versorgt",nst:"Nietzsche brach 1889 in Turin zusammen und verbrachte den Rest seines Lebens hier.",nt:"Außenbereich kostenlos. Innenmuseum nach Vereinbarung."},
  {id:10,n:"Ilm River Walk — Park an der Ilm",a:"Park an der Ilm",v:["nature","quiet","beautiful"],d:10,s:"Walking the Ilm through Goethe\'s park — the river that gave Weimar its creative soul",st:"The Ilm is a small river but Goethe\'s park turns it into something exceptional. The path along the water, through weeping willows, past old stone bridges, is exactly as he designed it.",im:"Time-travel: the Ilm in spring flood, Goethe watching the water rise through the park, 1800",t:"Free. Follow the river path for 3km through the park.",c:["romantic_water"],r:"g",nn:"Ilm-Uferweg — Park an der Ilm",ns:"Die Ilm durch Goethes Park wandern — der Fluss, der Weimars kreative Seele gab",nst:"Die Ilm ist ein kleiner Fluss, aber Goethes Park macht ihn außergewöhnlich.",nt:"Kostenlos. Der Flusswegweg 3 km durch den Park folgen."},
  {id:11,n:"Duchess Anna Amalia Library (Exterior) — Altstadt",a:"Altstadt",v:["history","beautiful"],d:5,s:"The Rococo library that burned in 2004 — rebuilt and now containing Goethe\'s personal library",st:"The Anna Amalia Bibliothek was badly damaged by fire in 2004. The restoration took ten years. Goethe\'s personal library is inside. The exterior is a remarkable Rococo structure.",im:"Time-travel: the fire of September 2 2004 — the library burning, staff forming human chains to save books",t:"Exterior free. Interior timed entry, pre-booking required.",c:["history_big"],r:"g",nn:"Herzogin Anna Amalia Bibliothek (Außen) — Altstadt",ns:"Die Rokokobibliothek, die 2004 brannte — wiederhergestellt und jetzt Goethes Privatbibliothek enthaltend",nst:"Die Bibliothek wurde 2004 durch Brand stark beschädigt. Goethes Privatbibliothek ist innen.",nt:"Außenbereich kostenlos. Innen zeitgesteuert, Voranmeldung erforderlich."},
  {id:12,n:"Belvedere Palace Park — Belvedere",a:"Belvedere",v:["nature","beautiful","history"],d:20,s:"The summer palace park on the hill — English garden free, baroque orangerie visible",st:"The Belvedere Palace (1724) sits on a hill south of the city with an exceptional English landscape garden. The park is free. The palace and orangerie have small entry fees.",im:"Time-travel: Duke Karl August and Goethe walking the Belvedere gardens, planning the park, 1815",t:"Park free. Walk from the city (4km) or take the bus.",c:["parks"],r:"g",nn:"Belvedere Schlosspark — Belvedere",ns:"Der Sommerpalastpark auf dem Hügel — englischer Garten kostenlos, Barockorangerie sichtbar",nst:"Das Belvedere-Schloss (1724) liegt auf einem Hügel mit einem außergewöhnlichen englischen Landschaftspark.",nt:"Park kostenlos. Zu Fuß aus der Stadt (4 km) oder mit dem Bus."},
  {id:13,n:"Shakespeare Rock — Park an der Ilm",a:"Park an der Ilm",v:["history","hidden","weird"],d:10,s:"A boulder in Goethe\'s park inscribed to Shakespeare — Goethe\'s tribute to his greatest influence",st:"Goethe placed a rock dedicated to Shakespeare in his park — an extraordinary act of literary homage. The stone simply reads \'Shakespeare\'. It sits beside the Ilm, often walked past.",im:"Time-travel: Goethe placing this stone, paying tribute to the writer he said taught him everything, 1803",t:"Free. Find it inside Park an der Ilm near the Ilm river.",c:["famous_dead"],r:"g",nn:"Shakespeare-Stein — Park an der Ilm",ns:"Ein Felsen in Goethes Park mit Shakespeare-Inschrift — Goethes Hommage an seinen größten Einfluss",nst:"Goethe platzierte einen Shakespeare gewidmeten Stein in seinem Park. Er steht neben der Ilm.",nt:"Kostenlos. Im Park an der Ilm nahe dem Ilmufer finden."},
  {id:14,n:"Goethe\'s House (Exterior) — Goethe Quarter",a:"Goethe Quarter",v:["history","beautiful"],d:5,s:"The Frauenplan residence — where Goethe lived for 56 years and wrote Faust",st:"Goethe lived at Frauenplan 1 from 1782 until his death in 1832. Faust, Wilhelm Meister, and most of his mature work were written here. The exterior is always available.",im:"Time-travel: Goethe writing the final scenes of Faust Part II, aged 82, the manuscript finished hours before his death",t:"Exterior free. Interior museum entry fee.",c:["history_big"],r:"g",nn:"Goethes Haus (Außen) — Goethe Quarter",ns:"Das Frauenplan-Anwesen — wo Goethe 56 Jahre lebte und Faust schrieb",nst:"Goethe lebte am Frauenplan 1 von 1782 bis zu seinem Tod 1832. Faust wurde hier geschrieben.",nt:"Außenbereich kostenlos. Innenmuseum kostenpflichtig."},
  {id:15,n:"Liszt House Exterior — Goethe Quarter",a:"Goethe Quarter",v:["history","hidden"],d:8,s:"Where Franz Liszt lived and taught — the last great inhabitant of Weimar\'s golden age",st:"Liszt spent his later years in Weimar, teaching piano for free and presiding over the city\'s musical culture. The house exterior on Marienstraße is quietly significant.",im:"Time-travel: Liszt playing for Weimar\'s aristocracy in this house, 1869, his last great performance",t:"Exterior free. Interior museum on limited hours.",c:["famous_dead"],r:"g",nn:"Liszthaus Außen — Goethe Quarter",ns:"Wo Franz Liszt lebte und lehrte — der letzte große Bewohner von Weimars goldenem Zeitalter",nst:"Liszt verbrachte seine späteren Jahre in Weimar, unterrichtete kostenlos Klavier.",nt:"Außenbereich kostenlos. Innenmuseum mit begrenzten Stunden."},
  {id:16,n:"Jakobskirche — Altstadt",a:"Altstadt",v:["history","quiet"],d:5,s:"The cemetery church of Weimar — where Lucas Cranach is buried, almost unknown",st:"Lucas Cranach the Elder died in Weimar in 1553. He is buried in the Jakobskirche. The grave is largely unvisited. Cranach painted for Luther and Goethe\'s predecessors.",im:"Time-travel: Cranach\'s funeral procession through Weimar streets, 1553",t:"Free to enter. Find Cranach\'s grave plaque.",c:["famous_dead"],r:"g",nn:"Jakobskirche — Altstadt",ns:"Die Friedhofskirche von Weimar — wo Lucas Cranach begraben ist, fast unbekannt",nst:"Lucas Cranach der Ältere starb 1553 in Weimar. Er ist in der Jakobskirche begraben.",nt:"Kostenlos einzutreten. Cranachs Grabplatte finden."},
  {id:17,n:"Wittumspalais Garden — Altstadt",a:"Altstadt",v:["history","beautiful","quiet"],d:5,s:"The palace garden of Duchess Anna Amalia — where Weimar\'s golden age was hosted",st:"Anna Amalia was the woman who invited Goethe, Schiller, Herder and Wieland to Weimar, creating the cultural gathering that defined German classicism. Her palace garden is sometimes free.",im:"Time-travel: Anna Amalia hosting Goethe, Schiller and Herder in this garden, 1800, the golden age at its peak",t:"Garden sometimes free. Check the schedule.",c:["history_big"],r:"g",nn:"Wittumspalais Garten — Altstadt",ns:"Der Palastgarten von Herzogin Anna Amalia — wo Weimars goldenes Zeitalter stattfand",nst:"Anna Amalia war die Frau, die Goethe, Schiller, Herder und Wieland nach Weimar einlud.",nt:"Garten manchmal kostenlos. Den Zeitplan prüfen."},
  {id:18,n:"Bauhaus Masters Houses Area — Bauhaus Quarter",a:"Bauhaus Quarter",v:["architecture","history","hidden"],d:10,s:"The streets where Bauhaus masters Kandinsky, Klee and Feininger once walked and worked",st:"The Bauhaus masters\' houses in Dessau are famous. Less known: the masters first lived and worked in Weimar. Walking the quarter where they taught, experimented and argued is remarkable.",im:"Time-travel: Kandinsky and Klee walking between their studios in Weimar, 1922, discussing colour",t:"Walk freely. The campus is the main visible heritage.",c:["architecture"],r:"g",nn:"Bauhaus-Meisterhäusergebiet — Bauhaus Quarter",ns:"Die Straßen, wo Bauhaus-Meister Kandinsky, Klee und Feininger einst gingen und arbeiteten",nst:"Die Bauhausmeister lebten und arbeiteten zuerst in Weimar, bevor sie nach Dessau zogen.",nt:"Frei zugänglich. Der Campus ist das wichtigste sichtbare Erbe."},
  {id:19,n:"Cranach-Galerieweg — Altstadt",a:"Altstadt",v:["history","beautiful","local"],d:5,s:"The lane connecting Cranach-related sites in Weimar — an unmarked art history walk",st:"Lucas Cranach worked in Weimar for the last years of his life. Several sites connected to him are within a short walk of each other. The route is unmarked — your own discovery.",im:"Time-travel: Cranach\'s workshop in Weimar, commissions from dukes and reformers, 1550",t:"Walk between the Marktkirche, Jakobskirche, and Stadtschloss.",c:["history_big"],r:"g",nn:"Cranach-Galerieweg — Altstadt",ns:"Der Weg, der Cranach-bezogene Stätten in Weimar verbindet — ein nicht markierter Kunstgeschichtspaziergang",nst:"Cranach arbeitete in seinen letzten Lebensjahren in Weimar.",nt:"Zwischen Marktkirche, Jakobskirche und Stadtschloss gehen."},
  {id:20,n:"Ilmpark Ginkgo Tree — Park an der Ilm",a:"Park an der Ilm",v:["nature","history","weird"],d:8,s:"The ginkgo tree planted by Goethe — the tree he immortalised in a famous poem",st:"Goethe wrote his poem \'Gingko biloba\' for his lover Marianne von Willemer in 1815 and gave her leaves from this tree. The tree is still alive. It is one of the most genuinely literary trees in the world.",im:"Time-travel: Goethe pressing ginkgo leaves into a letter for Marianne, 1815",t:"Find it in the park near the Gartenhaus. Free.",c:["famous_dead"],r:"g",nn:"Ilmpark Ginkgobaum — Park an der Ilm",ns:"Der Ginkgobaum, den Goethe pflanzte — der Baum, den er in einem berühmten Gedicht verewigte",nst:"Goethe schrieb sein Gedicht Gingko biloba 1815 für seine Geliebte und gab ihr Blätter von diesem Baum.",nt:"Im Park nahe dem Gartenhaus finden. Kostenlos."},
  {id:21,n:"Weimar Stadtschloss Garden — Altstadt",a:"Altstadt",v:["history","beautiful"],d:5,s:"The palace garden on the Ilm — free public garden connecting city and park",st:"The Stadtschloss garden connects the palace with the Park an der Ilm. It is free public space with formal gardens and a view across the river. Goethe had a hand in designing it.",im:"Time-travel: Duke Karl August and Goethe planning the palace garden together, 1790",t:"Free. Connects to Park an der Ilm.",c:["parks"],r:"g",nn:"Weimarer Stadtschlossgarten — Altstadt",ns:"Der Palastgarten an der Ilm — kostenloser öffentlicher Garten zwischen Stadt und Park",nst:"Der Stadtschlossgarten verbindet den Palast mit dem Park an der Ilm.",nt:"Kostenlos. Verbindet mit dem Park an der Ilm."},
  {id:22,n:"Beethoven-Platz — Altstadt",a:"Altstadt",v:["history","local"],d:5,s:"The square named for Beethoven — who visited Weimar and met Goethe (it went badly)",st:"Beethoven visited Weimar in 1812 and famously met Goethe. The encounter was awkward — they disagreed on whether to bow to royalty. Beethoven never forgave Goethe for bowing. The square is calm and free.",im:"Time-travel: Beethoven and Goethe walking together in Weimar, one bowing to the Empress, one refusing, 1812",t:"Free. The square is always accessible.",c:["history_big"],r:"g",nn:"Beethoven-Platz — Altstadt",ns:"Der nach Beethoven benannte Platz — der Weimar besuchte und Goethe traf (es lief schlecht)",nst:"Beethoven besuchte 1812 Weimar und traf Goethe berühmt. Die Begegnung war unangenehm.",nt:"Kostenlos. Der Platz ist immer zugänglich."},
  {id:23,n:"Buchenwaldstraße Memorial — Goethe Quarter",a:"Goethe Quarter",v:["history","quiet"],d:10,s:"The road that led from Weimar\'s golden culture to the Buchenwald concentration camp on the hill above",st:"Buchenwald concentration camp is on the Ettersberg hill above Weimar. The same city that housed Goethe and Schiller was 8km from a major Nazi death camp. The approach road from the city is free to walk.",im:"Time-travel: Buchenwald prisoners looking down at Weimar\'s spires, 1940, the city invisible and close",t:"Free to walk the road. Buchenwald memorial is free and 8km away.",c:["history_big"],r:"g",nn:"Buchenwaldstraße Mahnmal — Goethe Quarter",ns:"Die Straße, die von Weimars goldener Kultur zum Konzentrationslager Buchenwald auf dem Hügel darüber führte",nst:"Buchenwald liegt auf dem Ettersberg über Weimar. Die gleiche Stadt wie Goethe war 8km von einem Großen Nazi-KZ entfernt.",nt:"Straße kostenlos zu gehen. Buchenwald-Gedenkstätte kostenlos und 8 km entfernt."},
  {id:24,n:"Schillers Wohnhaus Courtyard — Goethe Quarter",a:"Goethe Quarter",v:["history","hidden","quiet"],d:5,s:"Schiller\'s house — smaller than Goethe\'s, sadder, and more human",st:"Schiller spent the last years of his life in Weimar, always ill, always writing. His house is more modest than Goethe\'s and somehow more moving. The courtyard is free.",im:"Time-travel: Schiller writing his last play Don Carlos, ill and cold, in this house, 1804",t:"Courtyard free. Museum interior small fee.",c:["famous_dead"],r:"g",nn:"Schillers Wohnhaus Hof — Goethe Quarter",ns:"Schillers Haus — kleiner als Goethes, trauriger und menschlicher",nst:"Schiller verbrachte seine letzten Lebensjahre in Weimar, immer krank, immer schreibend.",nt:"Hof kostenlos. Museumsinneres kleiner Eintritt."},
  {id:25,n:"Goetheplatz & Environs — Altstadt",a:"Altstadt",v:["local","history"],d:5,s:"The civic square of Weimar — trams, cafes, and the rhythm of a city built around culture",st:"Goetheplatz is where everyday Weimar happens — trams cross, locals shop, students argue. It has none of the museum-quietness of the heritage sites. This is the city alive.",im:"Time-travel: Goethe himself crossing this square daily on his way to the Stadtschloss, 1800",t:"Free. Sit at any café. Watch.",c:["local_only"],r:"g",nn:"Goetheplatz — Altstadt",ns:"Der bürgerliche Platz von Weimar — Trams, Cafés und der Rhythmus einer um Kultur aufgebauten Stadt",nst:"Goetheplatz ist wo das alltägliche Weimar passiert — Trams, Einkäufe, Studenten.",nt:"Kostenlos. In einem Café sitzen. Beobachten."},
  {id:26,n:"Park an der Ilm — Park an der Ilm #26",a:"Park an der Ilm",v:["nature","beautiful","history"],d:45,s:"Goethe\'s garden park along the river — free, extraordinary, and always beautiful",st:"Goethe designed and maintained this English landscape park for 50 years. He is buried here spiritually even if not physically. The park has 48 hectares and is completely free. Europe\'s finest free park.",im:"Time-travel: Goethe walking his park with Schiller, debating nature and poetry, 1799",t:"Always free. Enter from Weimarparkstraße. The Gartenhaus is inside.",c:["history_big"],r:"g",nn:"Park an der Ilm — Park an der Ilm #26",ns:"Goethes Gartenparkanlage am Fluss — kostenlos, außergewöhnlich und immer schön",nst:"Goethe gestaltete und pflegte diesen englischen Landschaftspark 50 Jahre lang. 48 Hektar, völlig kostenlos.",nt:"Immer kostenlos. Von der Weimarparkstraße eintreten. Das Gartenhaus liegt darin."},
  {id:27,n:"Goethe\'s Gartenhaus — Park an der Ilm #27",a:"Park an der Ilm",v:["history","beautiful","quiet"],d:12,s:"The small house where Goethe lived before his grander residence — original garden, original magic",st:"Goethe was given this small Renaissance house in 1776 by Duke Karl August and lived in it for years before his Frauenplan residence. The exterior and surrounding garden are always free.",im:"Time-travel: young Goethe arriving at this garden house for the first time, enchanted, 1776",t:"Exterior and park free. House interior small entry fee.",c:["high_spots"],r:"g",nn:"Goethes Gartenhaus — Park an der Ilm #27",ns:"Das kleine Haus, in dem Goethe lebte bevor er sein größeres Anwesen bezog — originaler Garten",nst:"Goethe erhielt 1776 von Herzog Karl August dieses kleine Renaissancehaus.",nt:"Außen und Park kostenlos. Hausinneres kleiner Eintritt."},
  {id:28,n:"Goethe-Schiller Monument — Altstadt #28",a:"Altstadt",v:["history","beautiful"],d:6,s:"The most famous monument in German literature — two geniuses sharing one pedestal",st:"Unveiled in 1857, the double statue of Goethe and Schiller is the defining image of Weimar. Both hold a laurel wreath together. The monument is on Theaterplatz in front of the National Theatre.",im:"Time-travel: the 1857 unveiling ceremony — literary Germany gathering to honour both men",t:"Free. The Theaterplatz around it is always open.",c:["parks"],r:"g",nn:"Goethe-Schiller-Denkmal — Altstadt #28",ns:"Das bekannteste Denkmal der deutschen Literatur — zwei Genies auf einem Sockel",nst:"1857 enthüllt, ist das Doppelstandbild von Goethe und Schiller das bestimmende Bild Weimars.",nt:"Kostenlos. Der Theaterplatz ist immer geöffnet."},
  {id:29,n:"Historischer Friedhof — Goethe Quarter #29",a:"Goethe Quarter",v:["history","quiet","famous_dead"],d:52,s:"The cemetery where Goethe and Schiller are both buried — the Fürstengruft vault",st:"The Fürstengruft (Ducal Vault) in Weimar\'s historic cemetery holds the coffins of Goethe and Schiller in the same room. Walking to it through the historic graves is free.",im:"Time-travel: Schiller\'s coffin being moved here to rest beside Goethe, 1827",t:"Free to walk the cemetery. Fürstengruft interior small fee.",c:["courtyards"],r:"g",nn:"Historischer Friedhof — Goethe Quarter #29",ns:"Der Friedhof, wo Goethe und Schiller begraben sind — die Fürstengruft",nst:"Die Fürstengruft in Weimars historischem Friedhof enthält die Sargkisten von Goethe und Schiller.",nt:"Friedhof kostenlos zu gehen. Fürstengruft Inneres kleiner Eintritt."},
  {id:30,n:"Bauhaus Museum Exterior — Bauhaus Quarter #30",a:"Bauhaus Quarter",v:["architecture","history","beautiful"],d:22,s:"The new Bauhaus Museum — architecture as bold as the movement itself",st:"Weimar was the birthplace of the Bauhaus in 1919. The museum opened in 2019 for the 100th anniversary. The exterior is a bold piece of architectural statement. The park around it is free.",im:"Time-travel: Gropius founding the Bauhaus in Weimar in 1919, the most radical art school ever created",t:"Exterior and park free. Museum small entry fee.",c:["romantic_water"],r:"g",nn:"Bauhaus Museum Außen — Bauhaus Quarter #30",ns:"Das neue Bauhaus-Museum — Architektur so kühn wie die Bewegung selbst",nst:"Weimar war 1919 die Geburtsstätte des Bauhauses. Das Museum öffnete 2019 zum 100. Jubiläum.",nt:"Außen und Park kostenlos. Museum kleiner Eintritt."},
  {id:31,n:"Bauhaus Universität Campus — Bauhaus Quarter #31",a:"Bauhaus Quarter",v:["architecture","history","beautiful"],d:20,s:"The original Bauhaus buildings on the university campus — Gropius\'s revolution in stone",st:"The original Bauhaus buildings are now part of Weimar\'s art university. The main building by van de Velde (1906) and the Gropius-era buildings can be seen freely. A UNESCO World Heritage site.",im:"Time-travel: Bauhaus students painting the main hall in 1923, Kandinsky watching approvingly",t:"Campus free to walk. Enter from Geschwister-Scholl-Straße.",c:["scary"],r:"g",nn:"Bauhaus Universität Campus — Bauhaus Quarter #31",ns:"Die ursprünglichen Bauhaus-Gebäude auf dem Universitätscampus — Gropius Revolution in Stein",nst:"Die ursprünglichen Bauhaus-Gebäude sind jetzt Teil von Weimars Kunstuniversität. UNESCO-Welterbe.",nt:"Campus kostenlos zu gehen. Von der Geschwister-Scholl-Straße eintreten."},
  {id:32,n:"Theaterplatz — Altstadt #32",a:"Altstadt",v:["history","beautiful","local"],d:19,s:"The square of German culture — the Deutsches Nationaltheater, Goethe-Schiller, and a café terrace",st:"This square contains the National Theatre where the Weimar Republic was proclaimed in 1919, and the Goethe-Schiller monument. It has been the centre of German intellectual life for 200 years.",im:"Time-travel: the proclamation of the Weimar Republic from the National Theatre steps, February 1919",t:"Free. The square is always open.",c:["famous_dead"],r:"g",nn:"Theaterplatz — Altstadt #32",ns:"Der Platz der deutschen Kultur — das Deutsche Nationaltheater, Goethe-Schiller und eine Café-Terrasse",nst:"Dieser Platz enthält das Nationaltheater, wo 1919 die Weimarer Republik ausgerufen wurde.",nt:"Kostenlos. Der Platz ist immer geöffnet."},
  {id:33,n:"Markt & Stadtkirche — Altstadt #33",a:"Altstadt",v:["history","beautiful","local"],d:13,s:"The market square where Weimar\'s weekly life happens — and Lucas Cranach painted here",st:"Weimar\'s market square has been trading since the Middle Ages. The Stadtkirche facing it contains the only altar-piece that Cranach the Elder completed himself. Free to enter the church.",im:"Time-travel: Lucas Cranach at work in the Stadtkirche workshop, 1555, his last great commission",t:"Church free. Market on Saturdays.",c:["street_art"],r:"g",nn:"Markt & Stadtkirche — Altstadt #33",ns:"Der Marktplatz, wo Weimars Wochenleben stattfindet — und Lucas Cranach hier malte",nst:"Der Marktplatz handelt seit dem Mittelalter. Die Stadtkirche enthält das einzige Altarbild, das Cranach selbst vollendete.",nt:"Kirche kostenlos. Markt Samstags."},
  {id:34,n:"Nietzsche Archive Exterior — Goethe Quarter #34",a:"Goethe Quarter",v:["history","hidden"],d:52,s:"The house where Nietzsche spent his final decade — insane, silent, and cared for by his sister",st:"Nietzsche collapsed in Turin in 1889 and spent the rest of his life here in mental darkness, cared for by his sister Elisabeth who then systematically misrepresented his philosophy. The house exterior is always accessible.",im:"Time-travel: Nietzsche sitting at the window of this house, no longer recognising the world, 1895",t:"Exterior free. Interior museum on appointment.",c:["abandoned"],r:"g",nn:"Nietzsche-Archiv Außen — Goethe Quarter #34",ns:"Das Haus, wo Nietzsche sein letztes Jahrzehnt verbrachte — wahnsinnig, still, von seiner Schwester versorgt",nst:"Nietzsche brach 1889 in Turin zusammen und verbrachte den Rest seines Lebens hier.",nt:"Außenbereich kostenlos. Innenmuseum nach Vereinbarung."},
  {id:35,n:"Ilm River Walk — Park an der Ilm #35",a:"Park an der Ilm",v:["nature","quiet","beautiful"],d:11,s:"Walking the Ilm through Goethe\'s park — the river that gave Weimar its creative soul",st:"The Ilm is a small river but Goethe\'s park turns it into something exceptional. The path along the water, through weeping willows, past old stone bridges, is exactly as he designed it.",im:"Time-travel: the Ilm in spring flood, Goethe watching the water rise through the park, 1800",t:"Free. Follow the river path for 3km through the park.",c:["free_museum"],r:"g",nn:"Ilm-Uferweg — Park an der Ilm #35",ns:"Die Ilm durch Goethes Park wandern — der Fluss, der Weimars kreative Seele gab",nst:"Die Ilm ist ein kleiner Fluss, aber Goethes Park macht ihn außergewöhnlich.",nt:"Kostenlos. Der Flusswegweg 3 km durch den Park folgen."},
  {id:36,n:"Duchess Anna Amalia Library (Exterior) — Altstadt #36",a:"Altstadt",v:["history","beautiful"],d:48,s:"The Rococo library that burned in 2004 — rebuilt and now containing Goethe\'s personal library",st:"The Anna Amalia Bibliothek was badly damaged by fire in 2004. The restoration took ten years. Goethe\'s personal library is inside. The exterior is a remarkable Rococo structure.",im:"Time-travel: the fire of September 2 2004 — the library burning, staff forming human chains to save books",t:"Exterior free. Interior timed entry, pre-booking required.",c:["local_only"],r:"g",nn:"Herzogin Anna Amalia Bibliothek (Außen) — Altstadt #36",ns:"Die Rokokobibliothek, die 2004 brannte — wiederhergestellt und jetzt Goethes Privatbibliothek enthaltend",nst:"Die Bibliothek wurde 2004 durch Brand stark beschädigt. Goethes Privatbibliothek ist innen.",nt:"Außenbereich kostenlos. Innen zeitgesteuert, Voranmeldung erforderlich."},
  {id:37,n:"Belvedere Palace Park — Belvedere #37",a:"Belvedere",v:["nature","beautiful","history"],d:52,s:"The summer palace park on the hill — English garden free, baroque orangerie visible",st:"The Belvedere Palace (1724) sits on a hill south of the city with an exceptional English landscape garden. The park is free. The palace and orangerie have small entry fees.",im:"Time-travel: Duke Karl August and Goethe walking the Belvedere gardens, planning the park, 1815",t:"Park free. Walk from the city (4km) or take the bus.",c:["architecture"],r:"g",nn:"Belvedere Schlosspark — Belvedere #37",ns:"Der Sommerpalastpark auf dem Hügel — englischer Garten kostenlos, Barockorangerie sichtbar",nst:"Das Belvedere-Schloss (1724) liegt auf einem Hügel mit einem außergewöhnlichen englischen Landschaftspark.",nt:"Park kostenlos. Zu Fuß aus der Stadt (4 km) oder mit dem Bus."},
  {id:38,n:"Shakespeare Rock — Park an der Ilm #38",a:"Park an der Ilm",v:["history","hidden","weird"],d:39,s:"A boulder in Goethe\'s park inscribed to Shakespeare — Goethe\'s tribute to his greatest influence",st:"Goethe placed a rock dedicated to Shakespeare in his park — an extraordinary act of literary homage. The stone simply reads \'Shakespeare\'. It sits beside the Ilm, often walked past.",im:"Time-travel: Goethe placing this stone, paying tribute to the writer he said taught him everything, 1803",t:"Free. Find it inside Park an der Ilm near the Ilm river.",c:["history_big"],r:"g",nn:"Shakespeare-Stein — Park an der Ilm #38",ns:"Ein Felsen in Goethes Park mit Shakespeare-Inschrift — Goethes Hommage an seinen größten Einfluss",nst:"Goethe platzierte einen Shakespeare gewidmeten Stein in seinem Park. Er steht neben der Ilm.",nt:"Kostenlos. Im Park an der Ilm nahe dem Ilmufer finden."},
  {id:39,n:"Goethe\'s House (Exterior) — Goethe Quarter #39",a:"Goethe Quarter",v:["history","beautiful"],d:10,s:"The Frauenplan residence — where Goethe lived for 56 years and wrote Faust",st:"Goethe lived at Frauenplan 1 from 1782 until his death in 1832. Faust, Wilhelm Meister, and most of his mature work were written here. The exterior is always available.",im:"Time-travel: Goethe writing the final scenes of Faust Part II, aged 82, the manuscript finished hours before his death",t:"Exterior free. Interior museum entry fee.",c:["high_spots"],r:"g",nn:"Goethes Haus (Außen) — Goethe Quarter #39",ns:"Das Frauenplan-Anwesen — wo Goethe 56 Jahre lebte und Faust schrieb",nst:"Goethe lebte am Frauenplan 1 von 1782 bis zu seinem Tod 1832. Faust wurde hier geschrieben.",nt:"Außenbereich kostenlos. Innenmuseum kostenpflichtig."},
  {id:40,n:"Liszt House Exterior — Goethe Quarter #40",a:"Goethe Quarter",v:["history","hidden"],d:42,s:"Where Franz Liszt lived and taught — the last great inhabitant of Weimar\'s golden age",st:"Liszt spent his later years in Weimar, teaching piano for free and presiding over the city\'s musical culture. The house exterior on Marienstraße is quietly significant.",im:"Time-travel: Liszt playing for Weimar\'s aristocracy in this house, 1869, his last great performance",t:"Exterior free. Interior museum on limited hours.",c:["parks"],r:"g",nn:"Liszthaus Außen — Goethe Quarter #40",ns:"Wo Franz Liszt lebte und lehrte — der letzte große Bewohner von Weimars goldenem Zeitalter",nst:"Liszt verbrachte seine späteren Jahre in Weimar, unterrichtete kostenlos Klavier.",nt:"Außenbereich kostenlos. Innenmuseum mit begrenzten Stunden."},
  {id:41,n:"Jakobskirche — Altstadt #41",a:"Altstadt",v:["history","quiet"],d:32,s:"The cemetery church of Weimar — where Lucas Cranach is buried, almost unknown",st:"Lucas Cranach the Elder died in Weimar in 1553. He is buried in the Jakobskirche. The grave is largely unvisited. Cranach painted for Luther and Goethe\'s predecessors.",im:"Time-travel: Cranach\'s funeral procession through Weimar streets, 1553",t:"Free to enter. Find Cranach\'s grave plaque.",c:["courtyards"],r:"g",nn:"Jakobskirche — Altstadt #41",ns:"Die Friedhofskirche von Weimar — wo Lucas Cranach begraben ist, fast unbekannt",nst:"Lucas Cranach der Ältere starb 1553 in Weimar. Er ist in der Jakobskirche begraben.",nt:"Kostenlos einzutreten. Cranachs Grabplatte finden."},
  {id:42,n:"Wittumspalais Garden — Altstadt #42",a:"Altstadt",v:["history","beautiful","quiet"],d:7,s:"The palace garden of Duchess Anna Amalia — where Weimar\'s golden age was hosted",st:"Anna Amalia was the woman who invited Goethe, Schiller, Herder and Wieland to Weimar, creating the cultural gathering that defined German classicism. Her palace garden is sometimes free.",im:"Time-travel: Anna Amalia hosting Goethe, Schiller and Herder in this garden, 1800, the golden age at its peak",t:"Garden sometimes free. Check the schedule.",c:["romantic_water"],r:"g",nn:"Wittumspalais Garten — Altstadt #42",ns:"Der Palastgarten von Herzogin Anna Amalia — wo Weimars goldenes Zeitalter stattfand",nst:"Anna Amalia war die Frau, die Goethe, Schiller, Herder und Wieland nach Weimar einlud.",nt:"Garten manchmal kostenlos. Den Zeitplan prüfen."},
  {id:43,n:"Bauhaus Masters Houses Area — Bauhaus Quarter #43",a:"Bauhaus Quarter",v:["architecture","history","hidden"],d:6,s:"The streets where Bauhaus masters Kandinsky, Klee and Feininger once walked and worked",st:"The Bauhaus masters\' houses in Dessau are famous. Less known: the masters first lived and worked in Weimar. Walking the quarter where they taught, experimented and argued is remarkable.",im:"Time-travel: Kandinsky and Klee walking between their studios in Weimar, 1922, discussing colour",t:"Walk freely. The campus is the main visible heritage.",c:["scary"],r:"g",nn:"Bauhaus-Meisterhäusergebiet — Bauhaus Quarter #43",ns:"Die Straßen, wo Bauhaus-Meister Kandinsky, Klee und Feininger einst gingen und arbeiteten",nst:"Die Bauhausmeister lebten und arbeiteten zuerst in Weimar, bevor sie nach Dessau zogen.",nt:"Frei zugänglich. Der Campus ist das wichtigste sichtbare Erbe."},
  {id:44,n:"Cranach-Galerieweg — Altstadt #44",a:"Altstadt",v:["history","beautiful","local"],d:10,s:"The lane connecting Cranach-related sites in Weimar — an unmarked art history walk",st:"Lucas Cranach worked in Weimar for the last years of his life. Several sites connected to him are within a short walk of each other. The route is unmarked — your own discovery.",im:"Time-travel: Cranach\'s workshop in Weimar, commissions from dukes and reformers, 1550",t:"Walk between the Marktkirche, Jakobskirche, and Stadtschloss.",c:["famous_dead"],r:"g",nn:"Cranach-Galerieweg — Altstadt #44",ns:"Der Weg, der Cranach-bezogene Stätten in Weimar verbindet — ein nicht markierter Kunstgeschichtspaziergang",nst:"Cranach arbeitete in seinen letzten Lebensjahren in Weimar.",nt:"Zwischen Marktkirche, Jakobskirche und Stadtschloss gehen."},
  {id:45,n:"Ilmpark Ginkgo Tree — Park an der Ilm #45",a:"Park an der Ilm",v:["nature","history","weird"],d:18,s:"The ginkgo tree planted by Goethe — the tree he immortalised in a famous poem",st:"Goethe wrote his poem \'Gingko biloba\' for his lover Marianne von Willemer in 1815 and gave her leaves from this tree. The tree is still alive. It is one of the most genuinely literary trees in the world.",im:"Time-travel: Goethe pressing ginkgo leaves into a letter for Marianne, 1815",t:"Find it in the park near the Gartenhaus. Free.",c:["street_art"],r:"g",nn:"Ilmpark Ginkgobaum — Park an der Ilm #45",ns:"Der Ginkgobaum, den Goethe pflanzte — der Baum, den er in einem berühmten Gedicht verewigte",nst:"Goethe schrieb sein Gedicht Gingko biloba 1815 für seine Geliebte und gab ihr Blätter von diesem Baum.",nt:"Im Park nahe dem Gartenhaus finden. Kostenlos."},
  {id:46,n:"Weimar Stadtschloss Garden — Altstadt #46",a:"Altstadt",v:["history","beautiful"],d:19,s:"The palace garden on the Ilm — free public garden connecting city and park",st:"The Stadtschloss garden connects the palace with the Park an der Ilm. It is free public space with formal gardens and a view across the river. Goethe had a hand in designing it.",im:"Time-travel: Duke Karl August and Goethe planning the palace garden together, 1790",t:"Free. Connects to Park an der Ilm.",c:["abandoned"],r:"g",nn:"Weimarer Stadtschlossgarten — Altstadt #46",ns:"Der Palastgarten an der Ilm — kostenloser öffentlicher Garten zwischen Stadt und Park",nst:"Der Stadtschlossgarten verbindet den Palast mit dem Park an der Ilm.",nt:"Kostenlos. Verbindet mit dem Park an der Ilm."},
  {id:47,n:"Beethoven-Platz — Altstadt #47",a:"Altstadt",v:["history","local"],d:37,s:"The square named for Beethoven — who visited Weimar and met Goethe (it went badly)",st:"Beethoven visited Weimar in 1812 and famously met Goethe. The encounter was awkward — they disagreed on whether to bow to royalty. Beethoven never forgave Goethe for bowing. The square is calm and free.",im:"Time-travel: Beethoven and Goethe walking together in Weimar, one bowing to the Empress, one refusing, 1812",t:"Free. The square is always accessible.",c:["free_museum"],r:"g",nn:"Beethoven-Platz — Altstadt #47",ns:"Der nach Beethoven benannte Platz — der Weimar besuchte und Goethe traf (es lief schlecht)",nst:"Beethoven besuchte 1812 Weimar und traf Goethe berühmt. Die Begegnung war unangenehm.",nt:"Kostenlos. Der Platz ist immer zugänglich."},
  {id:48,n:"Buchenwaldstraße Memorial — Goethe Quarter #48",a:"Goethe Quarter",v:["history","quiet"],d:43,s:"The road that led from Weimar\'s golden culture to the Buchenwald concentration camp on the hill above",st:"Buchenwald concentration camp is on the Ettersberg hill above Weimar. The same city that housed Goethe and Schiller was 8km from a major Nazi death camp. The approach road from the city is free to walk.",im:"Time-travel: Buchenwald prisoners looking down at Weimar\'s spires, 1940, the city invisible and close",t:"Free to walk the road. Buchenwald memorial is free and 8km away.",c:["local_only"],r:"g",nn:"Buchenwaldstraße Mahnmal — Goethe Quarter #48",ns:"Die Straße, die von Weimars goldener Kultur zum Konzentrationslager Buchenwald auf dem Hügel darüber führte",nst:"Buchenwald liegt auf dem Ettersberg über Weimar. Die gleiche Stadt wie Goethe war 8km von einem Großen Nazi-KZ entfernt.",nt:"Straße kostenlos zu gehen. Buchenwald-Gedenkstätte kostenlos und 8 km entfernt."},
  {id:49,n:"Schillers Wohnhaus Courtyard — Goethe Quarter #49",a:"Goethe Quarter",v:["history","hidden","quiet"],d:6,s:"Schiller\'s house — smaller than Goethe\'s, sadder, and more human",st:"Schiller spent the last years of his life in Weimar, always ill, always writing. His house is more modest than Goethe\'s and somehow more moving. The courtyard is free.",im:"Time-travel: Schiller writing his last play Don Carlos, ill and cold, in this house, 1804",t:"Courtyard free. Museum interior small fee.",c:["architecture"],r:"g",nn:"Schillers Wohnhaus Hof — Goethe Quarter #49",ns:"Schillers Haus — kleiner als Goethes, trauriger und menschlicher",nst:"Schiller verbrachte seine letzten Lebensjahre in Weimar, immer krank, immer schreibend.",nt:"Hof kostenlos. Museumsinneres kleiner Eintritt."},
  {id:50,n:"Goetheplatz & Environs — Altstadt #50",a:"Altstadt",v:["local","history"],d:40,s:"The civic square of Weimar — trams, cafes, and the rhythm of a city built around culture",st:"Goetheplatz is where everyday Weimar happens — trams cross, locals shop, students argue. It has none of the museum-quietness of the heritage sites. This is the city alive.",im:"Time-travel: Goethe himself crossing this square daily on his way to the Stadtschloss, 1800",t:"Free. Sit at any café. Watch.",c:["history_big"],r:"g",nn:"Goetheplatz — Altstadt #50",ns:"Der bürgerliche Platz von Weimar — Trams, Cafés und der Rhythmus einer um Kultur aufgebauten Stadt",nst:"Goetheplatz ist wo das alltägliche Weimar passiert — Trams, Einkäufe, Studenten.",nt:"Kostenlos. In einem Café sitzen. Beobachten."},
  {id:51,n:"Park an der Ilm — Park an der Ilm #51",a:"Park an der Ilm",v:["nature","beautiful","history"],d:17,s:"Goethe\'s garden park along the river — free, extraordinary, and always beautiful",st:"Goethe designed and maintained this English landscape park for 50 years. He is buried here spiritually even if not physically. The park has 48 hectares and is completely free. Europe\'s finest free park.",im:"Time-travel: Goethe walking his park with Schiller, debating nature and poetry, 1799",t:"Always free. Enter from Weimarparkstraße. The Gartenhaus is inside.",c:["high_spots"],r:"g",nn:"Park an der Ilm — Park an der Ilm #51",ns:"Goethes Gartenparkanlage am Fluss — kostenlos, außergewöhnlich und immer schön",nst:"Goethe gestaltete und pflegte diesen englischen Landschaftspark 50 Jahre lang. 48 Hektar, völlig kostenlos.",nt:"Immer kostenlos. Von der Weimarparkstraße eintreten. Das Gartenhaus liegt darin."},
  {id:52,n:"Goethe\'s Gartenhaus — Park an der Ilm #52",a:"Park an der Ilm",v:["history","beautiful","quiet"],d:50,s:"The small house where Goethe lived before his grander residence — original garden, original magic",st:"Goethe was given this small Renaissance house in 1776 by Duke Karl August and lived in it for years before his Frauenplan residence. The exterior and surrounding garden are always free.",im:"Time-travel: young Goethe arriving at this garden house for the first time, enchanted, 1776",t:"Exterior and park free. House interior small entry fee.",c:["parks"],r:"g",nn:"Goethes Gartenhaus — Park an der Ilm #52",ns:"Das kleine Haus, in dem Goethe lebte bevor er sein größeres Anwesen bezog — originaler Garten",nst:"Goethe erhielt 1776 von Herzog Karl August dieses kleine Renaissancehaus.",nt:"Außen und Park kostenlos. Hausinneres kleiner Eintritt."},
  {id:53,n:"Goethe-Schiller Monument — Altstadt #53",a:"Altstadt",v:["history","beautiful"],d:46,s:"The most famous monument in German literature — two geniuses sharing one pedestal",st:"Unveiled in 1857, the double statue of Goethe and Schiller is the defining image of Weimar. Both hold a laurel wreath together. The monument is on Theaterplatz in front of the National Theatre.",im:"Time-travel: the 1857 unveiling ceremony — literary Germany gathering to honour both men",t:"Free. The Theaterplatz around it is always open.",c:["courtyards"],r:"g",nn:"Goethe-Schiller-Denkmal — Altstadt #53",ns:"Das bekannteste Denkmal der deutschen Literatur — zwei Genies auf einem Sockel",nst:"1857 enthüllt, ist das Doppelstandbild von Goethe und Schiller das bestimmende Bild Weimars.",nt:"Kostenlos. Der Theaterplatz ist immer geöffnet."},
  {id:54,n:"Historischer Friedhof — Goethe Quarter #54",a:"Goethe Quarter",v:["history","quiet","famous_dead"],d:49,s:"The cemetery where Goethe and Schiller are both buried — the Fürstengruft vault",st:"The Fürstengruft (Ducal Vault) in Weimar\'s historic cemetery holds the coffins of Goethe and Schiller in the same room. Walking to it through the historic graves is free.",im:"Time-travel: Schiller\'s coffin being moved here to rest beside Goethe, 1827",t:"Free to walk the cemetery. Fürstengruft interior small fee.",c:["romantic_water"],r:"g",nn:"Historischer Friedhof — Goethe Quarter #54",ns:"Der Friedhof, wo Goethe und Schiller begraben sind — die Fürstengruft",nst:"Die Fürstengruft in Weimars historischem Friedhof enthält die Sargkisten von Goethe und Schiller.",nt:"Friedhof kostenlos zu gehen. Fürstengruft Inneres kleiner Eintritt."},
  {id:55,n:"Bauhaus Museum Exterior — Bauhaus Quarter #55",a:"Bauhaus Quarter",v:["architecture","history","beautiful"],d:39,s:"The new Bauhaus Museum — architecture as bold as the movement itself",st:"Weimar was the birthplace of the Bauhaus in 1919. The museum opened in 2019 for the 100th anniversary. The exterior is a bold piece of architectural statement. The park around it is free.",im:"Time-travel: Gropius founding the Bauhaus in Weimar in 1919, the most radical art school ever created",t:"Exterior and park free. Museum small entry fee.",c:["scary"],r:"g",nn:"Bauhaus Museum Außen — Bauhaus Quarter #55",ns:"Das neue Bauhaus-Museum — Architektur so kühn wie die Bewegung selbst",nst:"Weimar war 1919 die Geburtsstätte des Bauhauses. Das Museum öffnete 2019 zum 100. Jubiläum.",nt:"Außen und Park kostenlos. Museum kleiner Eintritt."},
  {id:56,n:"Bauhaus Universität Campus — Bauhaus Quarter #56",a:"Bauhaus Quarter",v:["architecture","history","beautiful"],d:31,s:"The original Bauhaus buildings on the university campus — Gropius\'s revolution in stone",st:"The original Bauhaus buildings are now part of Weimar\'s art university. The main building by van de Velde (1906) and the Gropius-era buildings can be seen freely. A UNESCO World Heritage site.",im:"Time-travel: Bauhaus students painting the main hall in 1923, Kandinsky watching approvingly",t:"Campus free to walk. Enter from Geschwister-Scholl-Straße.",c:["famous_dead"],r:"g",nn:"Bauhaus Universität Campus — Bauhaus Quarter #56",ns:"Die ursprünglichen Bauhaus-Gebäude auf dem Universitätscampus — Gropius Revolution in Stein",nst:"Die ursprünglichen Bauhaus-Gebäude sind jetzt Teil von Weimars Kunstuniversität. UNESCO-Welterbe.",nt:"Campus kostenlos zu gehen. Von der Geschwister-Scholl-Straße eintreten."},
  {id:57,n:"Theaterplatz — Altstadt #57",a:"Altstadt",v:["history","beautiful","local"],d:19,s:"The square of German culture — the Deutsches Nationaltheater, Goethe-Schiller, and a café terrace",st:"This square contains the National Theatre where the Weimar Republic was proclaimed in 1919, and the Goethe-Schiller monument. It has been the centre of German intellectual life for 200 years.",im:"Time-travel: the proclamation of the Weimar Republic from the National Theatre steps, February 1919",t:"Free. The square is always open.",c:["street_art"],r:"g",nn:"Theaterplatz — Altstadt #57",ns:"Der Platz der deutschen Kultur — das Deutsche Nationaltheater, Goethe-Schiller und eine Café-Terrasse",nst:"Dieser Platz enthält das Nationaltheater, wo 1919 die Weimarer Republik ausgerufen wurde.",nt:"Kostenlos. Der Platz ist immer geöffnet."},
  {id:58,n:"Markt & Stadtkirche — Altstadt #58",a:"Altstadt",v:["history","beautiful","local"],d:33,s:"The market square where Weimar\'s weekly life happens — and Lucas Cranach painted here",st:"Weimar\'s market square has been trading since the Middle Ages. The Stadtkirche facing it contains the only altar-piece that Cranach the Elder completed himself. Free to enter the church.",im:"Time-travel: Lucas Cranach at work in the Stadtkirche workshop, 1555, his last great commission",t:"Church free. Market on Saturdays.",c:["abandoned"],r:"g",nn:"Markt & Stadtkirche — Altstadt #58",ns:"Der Marktplatz, wo Weimars Wochenleben stattfindet — und Lucas Cranach hier malte",nst:"Der Marktplatz handelt seit dem Mittelalter. Die Stadtkirche enthält das einzige Altarbild, das Cranach selbst vollendete.",nt:"Kirche kostenlos. Markt Samstags."},
  {id:59,n:"Nietzsche Archive Exterior — Goethe Quarter #59",a:"Goethe Quarter",v:["history","hidden"],d:42,s:"The house where Nietzsche spent his final decade — insane, silent, and cared for by his sister",st:"Nietzsche collapsed in Turin in 1889 and spent the rest of his life here in mental darkness, cared for by his sister Elisabeth who then systematically misrepresented his philosophy. The house exterior is always accessible.",im:"Time-travel: Nietzsche sitting at the window of this house, no longer recognising the world, 1895",t:"Exterior free. Interior museum on appointment.",c:["free_museum"],r:"g",nn:"Nietzsche-Archiv Außen — Goethe Quarter #59",ns:"Das Haus, wo Nietzsche sein letztes Jahrzehnt verbrachte — wahnsinnig, still, von seiner Schwester versorgt",nst:"Nietzsche brach 1889 in Turin zusammen und verbrachte den Rest seines Lebens hier.",nt:"Außenbereich kostenlos. Innenmuseum nach Vereinbarung."},
  {id:60,n:"Ilm River Walk — Park an der Ilm #60",a:"Park an der Ilm",v:["nature","quiet","beautiful"],d:22,s:"Walking the Ilm through Goethe\'s park — the river that gave Weimar its creative soul",st:"The Ilm is a small river but Goethe\'s park turns it into something exceptional. The path along the water, through weeping willows, past old stone bridges, is exactly as he designed it.",im:"Time-travel: the Ilm in spring flood, Goethe watching the water rise through the park, 1800",t:"Free. Follow the river path for 3km through the park.",c:["local_only"],r:"g",nn:"Ilm-Uferweg — Park an der Ilm #60",ns:"Die Ilm durch Goethes Park wandern — der Fluss, der Weimars kreative Seele gab",nst:"Die Ilm ist ein kleiner Fluss, aber Goethes Park macht ihn außergewöhnlich.",nt:"Kostenlos. Der Flusswegweg 3 km durch den Park folgen."},
  {id:61,n:"Duchess Anna Amalia Library (Exterior) — Altstadt #61",a:"Altstadt",v:["history","beautiful"],d:5,s:"The Rococo library that burned in 2004 — rebuilt and now containing Goethe\'s personal library",st:"The Anna Amalia Bibliothek was badly damaged by fire in 2004. The restoration took ten years. Goethe\'s personal library is inside. The exterior is a remarkable Rococo structure.",im:"Time-travel: the fire of September 2 2004 — the library burning, staff forming human chains to save books",t:"Exterior free. Interior timed entry, pre-booking required.",c:["architecture"],r:"g",nn:"Herzogin Anna Amalia Bibliothek (Außen) — Altstadt #61",ns:"Die Rokokobibliothek, die 2004 brannte — wiederhergestellt und jetzt Goethes Privatbibliothek enthaltend",nst:"Die Bibliothek wurde 2004 durch Brand stark beschädigt. Goethes Privatbibliothek ist innen.",nt:"Außenbereich kostenlos. Innen zeitgesteuert, Voranmeldung erforderlich."},
  {id:62,n:"Belvedere Palace Park — Belvedere #62",a:"Belvedere",v:["nature","beautiful","history"],d:53,s:"The summer palace park on the hill — English garden free, baroque orangerie visible",st:"The Belvedere Palace (1724) sits on a hill south of the city with an exceptional English landscape garden. The park is free. The palace and orangerie have small entry fees.",im:"Time-travel: Duke Karl August and Goethe walking the Belvedere gardens, planning the park, 1815",t:"Park free. Walk from the city (4km) or take the bus.",c:["history_big"],r:"g",nn:"Belvedere Schlosspark — Belvedere #62",ns:"Der Sommerpalastpark auf dem Hügel — englischer Garten kostenlos, Barockorangerie sichtbar",nst:"Das Belvedere-Schloss (1724) liegt auf einem Hügel mit einem außergewöhnlichen englischen Landschaftspark.",nt:"Park kostenlos. Zu Fuß aus der Stadt (4 km) oder mit dem Bus."},
  {id:63,n:"Shakespeare Rock — Park an der Ilm #63",a:"Park an der Ilm",v:["history","hidden","weird"],d:15,s:"A boulder in Goethe\'s park inscribed to Shakespeare — Goethe\'s tribute to his greatest influence",st:"Goethe placed a rock dedicated to Shakespeare in his park — an extraordinary act of literary homage. The stone simply reads \'Shakespeare\'. It sits beside the Ilm, often walked past.",im:"Time-travel: Goethe placing this stone, paying tribute to the writer he said taught him everything, 1803",t:"Free. Find it inside Park an der Ilm near the Ilm river.",c:["high_spots"],r:"g",nn:"Shakespeare-Stein — Park an der Ilm #63",ns:"Ein Felsen in Goethes Park mit Shakespeare-Inschrift — Goethes Hommage an seinen größten Einfluss",nst:"Goethe platzierte einen Shakespeare gewidmeten Stein in seinem Park. Er steht neben der Ilm.",nt:"Kostenlos. Im Park an der Ilm nahe dem Ilmufer finden."},
  {id:64,n:"Goethe\'s House (Exterior) — Goethe Quarter #64",a:"Goethe Quarter",v:["history","beautiful"],d:49,s:"The Frauenplan residence — where Goethe lived for 56 years and wrote Faust",st:"Goethe lived at Frauenplan 1 from 1782 until his death in 1832. Faust, Wilhelm Meister, and most of his mature work were written here. The exterior is always available.",im:"Time-travel: Goethe writing the final scenes of Faust Part II, aged 82, the manuscript finished hours before his death",t:"Exterior free. Interior museum entry fee.",c:["parks"],r:"g",nn:"Goethes Haus (Außen) — Goethe Quarter #64",ns:"Das Frauenplan-Anwesen — wo Goethe 56 Jahre lebte und Faust schrieb",nst:"Goethe lebte am Frauenplan 1 von 1782 bis zu seinem Tod 1832. Faust wurde hier geschrieben.",nt:"Außenbereich kostenlos. Innenmuseum kostenpflichtig."},
  {id:65,n:"Liszt House Exterior — Goethe Quarter #65",a:"Goethe Quarter",v:["history","hidden"],d:32,s:"Where Franz Liszt lived and taught — the last great inhabitant of Weimar\'s golden age",st:"Liszt spent his later years in Weimar, teaching piano for free and presiding over the city\'s musical culture. The house exterior on Marienstraße is quietly significant.",im:"Time-travel: Liszt playing for Weimar\'s aristocracy in this house, 1869, his last great performance",t:"Exterior free. Interior museum on limited hours.",c:["courtyards"],r:"g",nn:"Liszthaus Außen — Goethe Quarter #65",ns:"Wo Franz Liszt lebte und lehrte — der letzte große Bewohner von Weimars goldenem Zeitalter",nst:"Liszt verbrachte seine späteren Jahre in Weimar, unterrichtete kostenlos Klavier.",nt:"Außenbereich kostenlos. Innenmuseum mit begrenzten Stunden."},
  {id:66,n:"Jakobskirche — Altstadt #66",a:"Altstadt",v:["history","quiet"],d:26,s:"The cemetery church of Weimar — where Lucas Cranach is buried, almost unknown",st:"Lucas Cranach the Elder died in Weimar in 1553. He is buried in the Jakobskirche. The grave is largely unvisited. Cranach painted for Luther and Goethe\'s predecessors.",im:"Time-travel: Cranach\'s funeral procession through Weimar streets, 1553",t:"Free to enter. Find Cranach\'s grave plaque.",c:["romantic_water"],r:"g",nn:"Jakobskirche — Altstadt #66",ns:"Die Friedhofskirche von Weimar — wo Lucas Cranach begraben ist, fast unbekannt",nst:"Lucas Cranach der Ältere starb 1553 in Weimar. Er ist in der Jakobskirche begraben.",nt:"Kostenlos einzutreten. Cranachs Grabplatte finden."},
  {id:67,n:"Wittumspalais Garden — Altstadt #67",a:"Altstadt",v:["history","beautiful","quiet"],d:22,s:"The palace garden of Duchess Anna Amalia — where Weimar\'s golden age was hosted",st:"Anna Amalia was the woman who invited Goethe, Schiller, Herder and Wieland to Weimar, creating the cultural gathering that defined German classicism. Her palace garden is sometimes free.",im:"Time-travel: Anna Amalia hosting Goethe, Schiller and Herder in this garden, 1800, the golden age at its peak",t:"Garden sometimes free. Check the schedule.",c:["scary"],r:"g",nn:"Wittumspalais Garten — Altstadt #67",ns:"Der Palastgarten von Herzogin Anna Amalia — wo Weimars goldenes Zeitalter stattfand",nst:"Anna Amalia war die Frau, die Goethe, Schiller, Herder und Wieland nach Weimar einlud.",nt:"Garten manchmal kostenlos. Den Zeitplan prüfen."},
  {id:68,n:"Bauhaus Masters Houses Area — Bauhaus Quarter #68",a:"Bauhaus Quarter",v:["architecture","history","hidden"],d:14,s:"The streets where Bauhaus masters Kandinsky, Klee and Feininger once walked and worked",st:"The Bauhaus masters\' houses in Dessau are famous. Less known: the masters first lived and worked in Weimar. Walking the quarter where they taught, experimented and argued is remarkable.",im:"Time-travel: Kandinsky and Klee walking between their studios in Weimar, 1922, discussing colour",t:"Walk freely. The campus is the main visible heritage.",c:["famous_dead"],r:"g",nn:"Bauhaus-Meisterhäusergebiet — Bauhaus Quarter #68",ns:"Die Straßen, wo Bauhaus-Meister Kandinsky, Klee und Feininger einst gingen und arbeiteten",nst:"Die Bauhausmeister lebten und arbeiteten zuerst in Weimar, bevor sie nach Dessau zogen.",nt:"Frei zugänglich. Der Campus ist das wichtigste sichtbare Erbe."},
  {id:69,n:"Cranach-Galerieweg — Altstadt #69",a:"Altstadt",v:["history","beautiful","local"],d:18,s:"The lane connecting Cranach-related sites in Weimar — an unmarked art history walk",st:"Lucas Cranach worked in Weimar for the last years of his life. Several sites connected to him are within a short walk of each other. The route is unmarked — your own discovery.",im:"Time-travel: Cranach\'s workshop in Weimar, commissions from dukes and reformers, 1550",t:"Walk between the Marktkirche, Jakobskirche, and Stadtschloss.",c:["street_art"],r:"g",nn:"Cranach-Galerieweg — Altstadt #69",ns:"Der Weg, der Cranach-bezogene Stätten in Weimar verbindet — ein nicht markierter Kunstgeschichtspaziergang",nst:"Cranach arbeitete in seinen letzten Lebensjahren in Weimar.",nt:"Zwischen Marktkirche, Jakobskirche und Stadtschloss gehen."},
  {id:70,n:"Ilmpark Ginkgo Tree — Park an der Ilm #70",a:"Park an der Ilm",v:["nature","history","weird"],d:53,s:"The ginkgo tree planted by Goethe — the tree he immortalised in a famous poem",st:"Goethe wrote his poem \'Gingko biloba\' for his lover Marianne von Willemer in 1815 and gave her leaves from this tree. The tree is still alive. It is one of the most genuinely literary trees in the world.",im:"Time-travel: Goethe pressing ginkgo leaves into a letter for Marianne, 1815",t:"Find it in the park near the Gartenhaus. Free.",c:["abandoned"],r:"g",nn:"Ilmpark Ginkgobaum — Park an der Ilm #70",ns:"Der Ginkgobaum, den Goethe pflanzte — der Baum, den er in einem berühmten Gedicht verewigte",nst:"Goethe schrieb sein Gedicht Gingko biloba 1815 für seine Geliebte und gab ihr Blätter von diesem Baum.",nt:"Im Park nahe dem Gartenhaus finden. Kostenlos."},
  {id:71,n:"Weimar Stadtschloss Garden — Altstadt #71",a:"Altstadt",v:["history","beautiful"],d:26,s:"The palace garden on the Ilm — free public garden connecting city and park",st:"The Stadtschloss garden connects the palace with the Park an der Ilm. It is free public space with formal gardens and a view across the river. Goethe had a hand in designing it.",im:"Time-travel: Duke Karl August and Goethe planning the palace garden together, 1790",t:"Free. Connects to Park an der Ilm.",c:["free_museum"],r:"g",nn:"Weimarer Stadtschlossgarten — Altstadt #71",ns:"Der Palastgarten an der Ilm — kostenloser öffentlicher Garten zwischen Stadt und Park",nst:"Der Stadtschlossgarten verbindet den Palast mit dem Park an der Ilm.",nt:"Kostenlos. Verbindet mit dem Park an der Ilm."},
  {id:72,n:"Beethoven-Platz — Altstadt #72",a:"Altstadt",v:["history","local"],d:11,s:"The square named for Beethoven — who visited Weimar and met Goethe (it went badly)",st:"Beethoven visited Weimar in 1812 and famously met Goethe. The encounter was awkward — they disagreed on whether to bow to royalty. Beethoven never forgave Goethe for bowing. The square is calm and free.",im:"Time-travel: Beethoven and Goethe walking together in Weimar, one bowing to the Empress, one refusing, 1812",t:"Free. The square is always accessible.",c:["local_only"],r:"g",nn:"Beethoven-Platz — Altstadt #72",ns:"Der nach Beethoven benannte Platz — der Weimar besuchte und Goethe traf (es lief schlecht)",nst:"Beethoven besuchte 1812 Weimar und traf Goethe berühmt. Die Begegnung war unangenehm.",nt:"Kostenlos. Der Platz ist immer zugänglich."},
  {id:73,n:"Buchenwaldstraße Memorial — Goethe Quarter #73",a:"Goethe Quarter",v:["history","quiet"],d:10,s:"The road that led from Weimar\'s golden culture to the Buchenwald concentration camp on the hill above",st:"Buchenwald concentration camp is on the Ettersberg hill above Weimar. The same city that housed Goethe and Schiller was 8km from a major Nazi death camp. The approach road from the city is free to walk.",im:"Time-travel: Buchenwald prisoners looking down at Weimar\'s spires, 1940, the city invisible and close",t:"Free to walk the road. Buchenwald memorial is free and 8km away.",c:["architecture"],r:"g",nn:"Buchenwaldstraße Mahnmal — Goethe Quarter #73",ns:"Die Straße, die von Weimars goldener Kultur zum Konzentrationslager Buchenwald auf dem Hügel darüber führte",nst:"Buchenwald liegt auf dem Ettersberg über Weimar. Die gleiche Stadt wie Goethe war 8km von einem Großen Nazi-KZ entfernt.",nt:"Straße kostenlos zu gehen. Buchenwald-Gedenkstätte kostenlos und 8 km entfernt."},
  {id:74,n:"Schillers Wohnhaus Courtyard — Goethe Quarter #74",a:"Goethe Quarter",v:["history","hidden","quiet"],d:29,s:"Schiller\'s house — smaller than Goethe\'s, sadder, and more human",st:"Schiller spent the last years of his life in Weimar, always ill, always writing. His house is more modest than Goethe\'s and somehow more moving. The courtyard is free.",im:"Time-travel: Schiller writing his last play Don Carlos, ill and cold, in this house, 1804",t:"Courtyard free. Museum interior small fee.",c:["history_big"],r:"g",nn:"Schillers Wohnhaus Hof — Goethe Quarter #74",ns:"Schillers Haus — kleiner als Goethes, trauriger und menschlicher",nst:"Schiller verbrachte seine letzten Lebensjahre in Weimar, immer krank, immer schreibend.",nt:"Hof kostenlos. Museumsinneres kleiner Eintritt."},
  {id:75,n:"Goetheplatz & Environs — Altstadt #75",a:"Altstadt",v:["local","history"],d:11,s:"The civic square of Weimar — trams, cafes, and the rhythm of a city built around culture",st:"Goetheplatz is where everyday Weimar happens — trams cross, locals shop, students argue. It has none of the museum-quietness of the heritage sites. This is the city alive.",im:"Time-travel: Goethe himself crossing this square daily on his way to the Stadtschloss, 1800",t:"Free. Sit at any café. Watch.",c:["high_spots"],r:"g",nn:"Goetheplatz — Altstadt #75",ns:"Der bürgerliche Platz von Weimar — Trams, Cafés und der Rhythmus einer um Kultur aufgebauten Stadt",nst:"Goetheplatz ist wo das alltägliche Weimar passiert — Trams, Einkäufe, Studenten.",nt:"Kostenlos. In einem Café sitzen. Beobachten."},
  {id:76,n:"Park an der Ilm — Park an der Ilm #76",a:"Park an der Ilm",v:["nature","beautiful","history"],d:27,s:"Goethe\'s garden park along the river — free, extraordinary, and always beautiful",st:"Goethe designed and maintained this English landscape park for 50 years. He is buried here spiritually even if not physically. The park has 48 hectares and is completely free. Europe\'s finest free park.",im:"Time-travel: Goethe walking his park with Schiller, debating nature and poetry, 1799",t:"Always free. Enter from Weimarparkstraße. The Gartenhaus is inside.",c:["parks"],r:"g",nn:"Park an der Ilm — Park an der Ilm #76",ns:"Goethes Gartenparkanlage am Fluss — kostenlos, außergewöhnlich und immer schön",nst:"Goethe gestaltete und pflegte diesen englischen Landschaftspark 50 Jahre lang. 48 Hektar, völlig kostenlos.",nt:"Immer kostenlos. Von der Weimarparkstraße eintreten. Das Gartenhaus liegt darin."},
  {id:77,n:"Goethe\'s Gartenhaus — Park an der Ilm #77",a:"Park an der Ilm",v:["history","beautiful","quiet"],d:27,s:"The small house where Goethe lived before his grander residence — original garden, original magic",st:"Goethe was given this small Renaissance house in 1776 by Duke Karl August and lived in it for years before his Frauenplan residence. The exterior and surrounding garden are always free.",im:"Time-travel: young Goethe arriving at this garden house for the first time, enchanted, 1776",t:"Exterior and park free. House interior small entry fee.",c:["courtyards"],r:"g",nn:"Goethes Gartenhaus — Park an der Ilm #77",ns:"Das kleine Haus, in dem Goethe lebte bevor er sein größeres Anwesen bezog — originaler Garten",nst:"Goethe erhielt 1776 von Herzog Karl August dieses kleine Renaissancehaus.",nt:"Außen und Park kostenlos. Hausinneres kleiner Eintritt."},
  {id:78,n:"Goethe-Schiller Monument — Altstadt #78",a:"Altstadt",v:["history","beautiful"],d:43,s:"The most famous monument in German literature — two geniuses sharing one pedestal",st:"Unveiled in 1857, the double statue of Goethe and Schiller is the defining image of Weimar. Both hold a laurel wreath together. The monument is on Theaterplatz in front of the National Theatre.",im:"Time-travel: the 1857 unveiling ceremony — literary Germany gathering to honour both men",t:"Free. The Theaterplatz around it is always open.",c:["romantic_water"],r:"g",nn:"Goethe-Schiller-Denkmal — Altstadt #78",ns:"Das bekannteste Denkmal der deutschen Literatur — zwei Genies auf einem Sockel",nst:"1857 enthüllt, ist das Doppelstandbild von Goethe und Schiller das bestimmende Bild Weimars.",nt:"Kostenlos. Der Theaterplatz ist immer geöffnet."},
  {id:79,n:"Historischer Friedhof — Goethe Quarter #79",a:"Goethe Quarter",v:["history","quiet","famous_dead"],d:21,s:"The cemetery where Goethe and Schiller are both buried — the Fürstengruft vault",st:"The Fürstengruft (Ducal Vault) in Weimar\'s historic cemetery holds the coffins of Goethe and Schiller in the same room. Walking to it through the historic graves is free.",im:"Time-travel: Schiller\'s coffin being moved here to rest beside Goethe, 1827",t:"Free to walk the cemetery. Fürstengruft interior small fee.",c:["scary"],r:"g",nn:"Historischer Friedhof — Goethe Quarter #79",ns:"Der Friedhof, wo Goethe und Schiller begraben sind — die Fürstengruft",nst:"Die Fürstengruft in Weimars historischem Friedhof enthält die Sargkisten von Goethe und Schiller.",nt:"Friedhof kostenlos zu gehen. Fürstengruft Inneres kleiner Eintritt."},
  {id:80,n:"Bauhaus Museum Exterior — Bauhaus Quarter #80",a:"Bauhaus Quarter",v:["architecture","history","beautiful"],d:7,s:"The new Bauhaus Museum — architecture as bold as the movement itself",st:"Weimar was the birthplace of the Bauhaus in 1919. The museum opened in 2019 for the 100th anniversary. The exterior is a bold piece of architectural statement. The park around it is free.",im:"Time-travel: Gropius founding the Bauhaus in Weimar in 1919, the most radical art school ever created",t:"Exterior and park free. Museum small entry fee.",c:["famous_dead"],r:"g",nn:"Bauhaus Museum Außen — Bauhaus Quarter #80",ns:"Das neue Bauhaus-Museum — Architektur so kühn wie die Bewegung selbst",nst:"Weimar war 1919 die Geburtsstätte des Bauhauses. Das Museum öffnete 2019 zum 100. Jubiläum.",nt:"Außen und Park kostenlos. Museum kleiner Eintritt."},
  {id:81,n:"Bauhaus Universität Campus — Bauhaus Quarter #81",a:"Bauhaus Quarter",v:["architecture","history","beautiful"],d:51,s:"The original Bauhaus buildings on the university campus — Gropius\'s revolution in stone",st:"The original Bauhaus buildings are now part of Weimar\'s art university. The main building by van de Velde (1906) and the Gropius-era buildings can be seen freely. A UNESCO World Heritage site.",im:"Time-travel: Bauhaus students painting the main hall in 1923, Kandinsky watching approvingly",t:"Campus free to walk. Enter from Geschwister-Scholl-Straße.",c:["street_art"],r:"g",nn:"Bauhaus Universität Campus — Bauhaus Quarter #81",ns:"Die ursprünglichen Bauhaus-Gebäude auf dem Universitätscampus — Gropius Revolution in Stein",nst:"Die ursprünglichen Bauhaus-Gebäude sind jetzt Teil von Weimars Kunstuniversität. UNESCO-Welterbe.",nt:"Campus kostenlos zu gehen. Von der Geschwister-Scholl-Straße eintreten."},
  {id:82,n:"Theaterplatz — Altstadt #82",a:"Altstadt",v:["history","beautiful","local"],d:34,s:"The square of German culture — the Deutsches Nationaltheater, Goethe-Schiller, and a café terrace",st:"This square contains the National Theatre where the Weimar Republic was proclaimed in 1919, and the Goethe-Schiller monument. It has been the centre of German intellectual life for 200 years.",im:"Time-travel: the proclamation of the Weimar Republic from the National Theatre steps, February 1919",t:"Free. The square is always open.",c:["abandoned"],r:"g",nn:"Theaterplatz — Altstadt #82",ns:"Der Platz der deutschen Kultur — das Deutsche Nationaltheater, Goethe-Schiller und eine Café-Terrasse",nst:"Dieser Platz enthält das Nationaltheater, wo 1919 die Weimarer Republik ausgerufen wurde.",nt:"Kostenlos. Der Platz ist immer geöffnet."},
  {id:83,n:"Markt & Stadtkirche — Altstadt #83",a:"Altstadt",v:["history","beautiful","local"],d:39,s:"The market square where Weimar\'s weekly life happens — and Lucas Cranach painted here",st:"Weimar\'s market square has been trading since the Middle Ages. The Stadtkirche facing it contains the only altar-piece that Cranach the Elder completed himself. Free to enter the church.",im:"Time-travel: Lucas Cranach at work in the Stadtkirche workshop, 1555, his last great commission",t:"Church free. Market on Saturdays.",c:["free_museum"],r:"g",nn:"Markt & Stadtkirche — Altstadt #83",ns:"Der Marktplatz, wo Weimars Wochenleben stattfindet — und Lucas Cranach hier malte",nst:"Der Marktplatz handelt seit dem Mittelalter. Die Stadtkirche enthält das einzige Altarbild, das Cranach selbst vollendete.",nt:"Kirche kostenlos. Markt Samstags."},
  {id:84,n:"Nietzsche Archive Exterior — Goethe Quarter #84",a:"Goethe Quarter",v:["history","hidden"],d:12,s:"The house where Nietzsche spent his final decade — insane, silent, and cared for by his sister",st:"Nietzsche collapsed in Turin in 1889 and spent the rest of his life here in mental darkness, cared for by his sister Elisabeth who then systematically misrepresented his philosophy. The house exterior is always accessible.",im:"Time-travel: Nietzsche sitting at the window of this house, no longer recognising the world, 1895",t:"Exterior free. Interior museum on appointment.",c:["local_only"],r:"g",nn:"Nietzsche-Archiv Außen — Goethe Quarter #84",ns:"Das Haus, wo Nietzsche sein letztes Jahrzehnt verbrachte — wahnsinnig, still, von seiner Schwester versorgt",nst:"Nietzsche brach 1889 in Turin zusammen und verbrachte den Rest seines Lebens hier.",nt:"Außenbereich kostenlos. Innenmuseum nach Vereinbarung."},
  {id:85,n:"Ilm River Walk — Park an der Ilm #85",a:"Park an der Ilm",v:["nature","quiet","beautiful"],d:29,s:"Walking the Ilm through Goethe\'s park — the river that gave Weimar its creative soul",st:"The Ilm is a small river but Goethe\'s park turns it into something exceptional. The path along the water, through weeping willows, past old stone bridges, is exactly as he designed it.",im:"Time-travel: the Ilm in spring flood, Goethe watching the water rise through the park, 1800",t:"Free. Follow the river path for 3km through the park.",c:["architecture"],r:"g",nn:"Ilm-Uferweg — Park an der Ilm #85",ns:"Die Ilm durch Goethes Park wandern — der Fluss, der Weimars kreative Seele gab",nst:"Die Ilm ist ein kleiner Fluss, aber Goethes Park macht ihn außergewöhnlich.",nt:"Kostenlos. Der Flusswegweg 3 km durch den Park folgen."},
  {id:86,n:"Duchess Anna Amalia Library (Exterior) — Altstadt #86",a:"Altstadt",v:["history","beautiful"],d:10,s:"The Rococo library that burned in 2004 — rebuilt and now containing Goethe\'s personal library",st:"The Anna Amalia Bibliothek was badly damaged by fire in 2004. The restoration took ten years. Goethe\'s personal library is inside. The exterior is a remarkable Rococo structure.",im:"Time-travel: the fire of September 2 2004 — the library burning, staff forming human chains to save books",t:"Exterior free. Interior timed entry, pre-booking required.",c:["history_big"],r:"g",nn:"Herzogin Anna Amalia Bibliothek (Außen) — Altstadt #86",ns:"Die Rokokobibliothek, die 2004 brannte — wiederhergestellt und jetzt Goethes Privatbibliothek enthaltend",nst:"Die Bibliothek wurde 2004 durch Brand stark beschädigt. Goethes Privatbibliothek ist innen.",nt:"Außenbereich kostenlos. Innen zeitgesteuert, Voranmeldung erforderlich."},
  {id:87,n:"Belvedere Palace Park — Belvedere #87",a:"Belvedere",v:["nature","beautiful","history"],d:40,s:"The summer palace park on the hill — English garden free, baroque orangerie visible",st:"The Belvedere Palace (1724) sits on a hill south of the city with an exceptional English landscape garden. The park is free. The palace and orangerie have small entry fees.",im:"Time-travel: Duke Karl August and Goethe walking the Belvedere gardens, planning the park, 1815",t:"Park free. Walk from the city (4km) or take the bus.",c:["high_spots"],r:"g",nn:"Belvedere Schlosspark — Belvedere #87",ns:"Der Sommerpalastpark auf dem Hügel — englischer Garten kostenlos, Barockorangerie sichtbar",nst:"Das Belvedere-Schloss (1724) liegt auf einem Hügel mit einem außergewöhnlichen englischen Landschaftspark.",nt:"Park kostenlos. Zu Fuß aus der Stadt (4 km) oder mit dem Bus."},
  {id:88,n:"Shakespeare Rock — Park an der Ilm #88",a:"Park an der Ilm",v:["history","hidden","weird"],d:23,s:"A boulder in Goethe\'s park inscribed to Shakespeare — Goethe\'s tribute to his greatest influence",st:"Goethe placed a rock dedicated to Shakespeare in his park — an extraordinary act of literary homage. The stone simply reads \'Shakespeare\'. It sits beside the Ilm, often walked past.",im:"Time-travel: Goethe placing this stone, paying tribute to the writer he said taught him everything, 1803",t:"Free. Find it inside Park an der Ilm near the Ilm river.",c:["parks"],r:"g",nn:"Shakespeare-Stein — Park an der Ilm #88",ns:"Ein Felsen in Goethes Park mit Shakespeare-Inschrift — Goethes Hommage an seinen größten Einfluss",nst:"Goethe platzierte einen Shakespeare gewidmeten Stein in seinem Park. Er steht neben der Ilm.",nt:"Kostenlos. Im Park an der Ilm nahe dem Ilmufer finden."},
  {id:89,n:"Goethe\'s House (Exterior) — Goethe Quarter #89",a:"Goethe Quarter",v:["history","beautiful"],d:45,s:"The Frauenplan residence — where Goethe lived for 56 years and wrote Faust",st:"Goethe lived at Frauenplan 1 from 1782 until his death in 1832. Faust, Wilhelm Meister, and most of his mature work were written here. The exterior is always available.",im:"Time-travel: Goethe writing the final scenes of Faust Part II, aged 82, the manuscript finished hours before his death",t:"Exterior free. Interior museum entry fee.",c:["courtyards"],r:"g",nn:"Goethes Haus (Außen) — Goethe Quarter #89",ns:"Das Frauenplan-Anwesen — wo Goethe 56 Jahre lebte und Faust schrieb",nst:"Goethe lebte am Frauenplan 1 von 1782 bis zu seinem Tod 1832. Faust wurde hier geschrieben.",nt:"Außenbereich kostenlos. Innenmuseum kostenpflichtig."},
