  {id:90,n:"Liszt House Exterior — Goethe Quarter #90",a:"Goethe Quarter",v:["history","hidden"],d:44,s:"Where Franz Liszt lived and taught — the last great inhabitant of Weimar\'s golden age",st:"Liszt spent his later years in Weimar, teaching piano for free and presiding over the city\'s musical culture. The house exterior on Marienstraße is quietly significant.",im:"Time-travel: Liszt playing for Weimar\'s aristocracy in this house, 1869, his last great performance",t:"Exterior free. Interior museum on limited hours.",c:["romantic_water"],r:"g",nn:"Liszthaus Außen — Goethe Quarter #90",ns:"Wo Franz Liszt lebte und lehrte — der letzte große Bewohner von Weimars goldenem Zeitalter",nst:"Liszt verbrachte seine späteren Jahre in Weimar, unterrichtete kostenlos Klavier.",nt:"Außenbereich kostenlos. Innenmuseum mit begrenzten Stunden."},
  {id:91,n:"Jakobskirche — Altstadt #91",a:"Altstadt",v:["history","quiet"],d:28,s:"The cemetery church of Weimar — where Lucas Cranach is buried, almost unknown",st:"Lucas Cranach the Elder died in Weimar in 1553. He is buried in the Jakobskirche. The grave is largely unvisited. Cranach painted for Luther and Goethe\'s predecessors.",im:"Time-travel: Cranach\'s funeral procession through Weimar streets, 1553",t:"Free to enter. Find Cranach\'s grave plaque.",c:["scary"],r:"g",nn:"Jakobskirche — Altstadt #91",ns:"Die Friedhofskirche von Weimar — wo Lucas Cranach begraben ist, fast unbekannt",nst:"Lucas Cranach der Ältere starb 1553 in Weimar. Er ist in der Jakobskirche begraben.",nt:"Kostenlos einzutreten. Cranachs Grabplatte finden."},
  {id:92,n:"Wittumspalais Garden — Altstadt #92",a:"Altstadt",v:["history","beautiful","quiet"],d:41,s:"The palace garden of Duchess Anna Amalia — where Weimar\'s golden age was hosted",st:"Anna Amalia was the woman who invited Goethe, Schiller, Herder and Wieland to Weimar, creating the cultural gathering that defined German classicism. Her palace garden is sometimes free.",im:"Time-travel: Anna Amalia hosting Goethe, Schiller and Herder in this garden, 1800, the golden age at its peak",t:"Garden sometimes free. Check the schedule.",c:["famous_dead"],r:"g",nn:"Wittumspalais Garten — Altstadt #92",ns:"Der Palastgarten von Herzogin Anna Amalia — wo Weimars goldenes Zeitalter stattfand",nst:"Anna Amalia war die Frau, die Goethe, Schiller, Herder und Wieland nach Weimar einlud.",nt:"Garten manchmal kostenlos. Den Zeitplan prüfen."},
  {id:93,n:"Bauhaus Masters Houses Area — Bauhaus Quarter #93",a:"Bauhaus Quarter",v:["architecture","history","hidden"],d:17,s:"The streets where Bauhaus masters Kandinsky, Klee and Feininger once walked and worked",st:"The Bauhaus masters\' houses in Dessau are famous. Less known: the masters first lived and worked in Weimar. Walking the quarter where they taught, experimented and argued is remarkable.",im:"Time-travel: Kandinsky and Klee walking between their studios in Weimar, 1922, discussing colour",t:"Walk freely. The campus is the main visible heritage.",c:["street_art"],r:"g",nn:"Bauhaus-Meisterhäusergebiet — Bauhaus Quarter #93",ns:"Die Straßen, wo Bauhaus-Meister Kandinsky, Klee und Feininger einst gingen und arbeiteten",nst:"Die Bauhausmeister lebten und arbeiteten zuerst in Weimar, bevor sie nach Dessau zogen.",nt:"Frei zugänglich. Der Campus ist das wichtigste sichtbare Erbe."},
  {id:94,n:"Cranach-Galerieweg — Altstadt #94",a:"Altstadt",v:["history","beautiful","local"],d:50,s:"The lane connecting Cranach-related sites in Weimar — an unmarked art history walk",st:"Lucas Cranach worked in Weimar for the last years of his life. Several sites connected to him are within a short walk of each other. The route is unmarked — your own discovery.",im:"Time-travel: Cranach\'s workshop in Weimar, commissions from dukes and reformers, 1550",t:"Walk between the Marktkirche, Jakobskirche, and Stadtschloss.",c:["abandoned"],r:"g",nn:"Cranach-Galerieweg — Altstadt #94",ns:"Der Weg, der Cranach-bezogene Stätten in Weimar verbindet — ein nicht markierter Kunstgeschichtspaziergang",nst:"Cranach arbeitete in seinen letzten Lebensjahren in Weimar.",nt:"Zwischen Marktkirche, Jakobskirche und Stadtschloss gehen."},
  {id:95,n:"Ilmpark Ginkgo Tree — Park an der Ilm #95",a:"Park an der Ilm",v:["nature","history","weird"],d:9,s:"The ginkgo tree planted by Goethe — the tree he immortalised in a famous poem",st:"Goethe wrote his poem \'Gingko biloba\' for his lover Marianne von Willemer in 1815 and gave her leaves from this tree. The tree is still alive. It is one of the most genuinely literary trees in the world.",im:"Time-travel: Goethe pressing ginkgo leaves into a letter for Marianne, 1815",t:"Find it in the park near the Gartenhaus. Free.",c:["free_museum"],r:"g",nn:"Ilmpark Ginkgobaum — Park an der Ilm #95",ns:"Der Ginkgobaum, den Goethe pflanzte — der Baum, den er in einem berühmten Gedicht verewigte",nst:"Goethe schrieb sein Gedicht Gingko biloba 1815 für seine Geliebte und gab ihr Blätter von diesem Baum.",nt:"Im Park nahe dem Gartenhaus finden. Kostenlos."},
  {id:96,n:"Weimar Stadtschloss Garden — Altstadt #96",a:"Altstadt",v:["history","beautiful"],d:7,s:"The palace garden on the Ilm — free public garden connecting city and park",st:"The Stadtschloss garden connects the palace with the Park an der Ilm. It is free public space with formal gardens and a view across the river. Goethe had a hand in designing it.",im:"Time-travel: Duke Karl August and Goethe planning the palace garden together, 1790",t:"Free. Connects to Park an der Ilm.",c:["local_only"],r:"g",nn:"Weimarer Stadtschlossgarten — Altstadt #96",ns:"Der Palastgarten an der Ilm — kostenloser öffentlicher Garten zwischen Stadt und Park",nst:"Der Stadtschlossgarten verbindet den Palast mit dem Park an der Ilm.",nt:"Kostenlos. Verbindet mit dem Park an der Ilm."},
  {id:97,n:"Beethoven-Platz — Altstadt #97",a:"Altstadt",v:["history","local"],d:47,s:"The square named for Beethoven — who visited Weimar and met Goethe (it went badly)",st:"Beethoven visited Weimar in 1812 and famously met Goethe. The encounter was awkward — they disagreed on whether to bow to royalty. Beethoven never forgave Goethe for bowing. The square is calm and free.",im:"Time-travel: Beethoven and Goethe walking together in Weimar, one bowing to the Empress, one refusing, 1812",t:"Free. The square is always accessible.",c:["architecture"],r:"g",nn:"Beethoven-Platz — Altstadt #97",ns:"Der nach Beethoven benannte Platz — der Weimar besuchte und Goethe traf (es lief schlecht)",nst:"Beethoven besuchte 1812 Weimar und traf Goethe berühmt. Die Begegnung war unangenehm.",nt:"Kostenlos. Der Platz ist immer zugänglich."},
  {id:98,n:"Buchenwaldstraße Memorial — Goethe Quarter #98",a:"Goethe Quarter",v:["history","quiet"],d:19,s:"The road that led from Weimar\'s golden culture to the Buchenwald concentration camp on the hill above",st:"Buchenwald concentration camp is on the Ettersberg hill above Weimar. The same city that housed Goethe and Schiller was 8km from a major Nazi death camp. The approach road from the city is free to walk.",im:"Time-travel: Buchenwald prisoners looking down at Weimar\'s spires, 1940, the city invisible and close",t:"Free to walk the road. Buchenwald memorial is free and 8km away.",c:["history_big"],r:"g",nn:"Buchenwaldstraße Mahnmal — Goethe Quarter #98",ns:"Die Straße, die von Weimars goldener Kultur zum Konzentrationslager Buchenwald auf dem Hügel darüber führte",nst:"Buchenwald liegt auf dem Ettersberg über Weimar. Die gleiche Stadt wie Goethe war 8km von einem Großen Nazi-KZ entfernt.",nt:"Straße kostenlos zu gehen. Buchenwald-Gedenkstätte kostenlos und 8 km entfernt."},
  {id:99,n:"Schillers Wohnhaus Courtyard — Goethe Quarter #99",a:"Goethe Quarter",v:["history","hidden","quiet"],d:54,s:"Schiller\'s house — smaller than Goethe\'s, sadder, and more human",st:"Schiller spent the last years of his life in Weimar, always ill, always writing. His house is more modest than Goethe\'s and somehow more moving. The courtyard is free.",im:"Time-travel: Schiller writing his last play Don Carlos, ill and cold, in this house, 1804",t:"Courtyard free. Museum interior small fee.",c:["high_spots"],r:"g",nn:"Schillers Wohnhaus Hof — Goethe Quarter #99",ns:"Schillers Haus — kleiner als Goethes, trauriger und menschlicher",nst:"Schiller verbrachte seine letzten Lebensjahre in Weimar, immer krank, immer schreibend.",nt:"Hof kostenlos. Museumsinneres kleiner Eintritt."},
  {id:100,n:"Goetheplatz & Environs — Altstadt #100",a:"Altstadt",v:["local","history"],d:23,s:"The civic square of Weimar — trams, cafes, and the rhythm of a city built around culture",st:"Goetheplatz is where everyday Weimar happens — trams cross, locals shop, students argue. It has none of the museum-quietness of the heritage sites. This is the city alive.",im:"Time-travel: Goethe himself crossing this square daily on his way to the Stadtschloss, 1800",t:"Free. Sit at any café. Watch.",c:["parks"],r:"g",nn:"Goetheplatz — Altstadt #100",ns:"Der bürgerliche Platz von Weimar — Trams, Cafés und der Rhythmus einer um Kultur aufgebauten Stadt",nst:"Goetheplatz ist wo das alltägliche Weimar passiert — Trams, Einkäufe, Studenten.",nt:"Kostenlos. In einem Café sitzen. Beobachten."},
  {id:101,n:"Park an der Ilm — Park an der Ilm #101",a:"Park an der Ilm",v:["nature","beautiful","history"],d:10,s:"Goethe\'s garden park along the river — free, extraordinary, and always beautiful",st:"Goethe designed and maintained this English landscape park for 50 years. He is buried here spiritually even if not physically. The park has 48 hectares and is completely free. Europe\'s finest free park.",im:"Time-travel: Goethe walking his park with Schiller, debating nature and poetry, 1799",t:"Always free. Enter from Weimarparkstraße. The Gartenhaus is inside.",c:["courtyards"],r:"g",nn:"Park an der Ilm — Park an der Ilm #101",ns:"Goethes Gartenparkanlage am Fluss — kostenlos, außergewöhnlich und immer schön",nst:"Goethe gestaltete und pflegte diesen englischen Landschaftspark 50 Jahre lang. 48 Hektar, völlig kostenlos.",nt:"Immer kostenlos. Von der Weimarparkstraße eintreten. Das Gartenhaus liegt darin."},
  {id:102,n:"Goethe\'s Gartenhaus — Park an der Ilm #102",a:"Park an der Ilm",v:["history","beautiful","quiet"],d:19,s:"The small house where Goethe lived before his grander residence — original garden, original magic",st:"Goethe was given this small Renaissance house in 1776 by Duke Karl August and lived in it for years before his Frauenplan residence. The exterior and surrounding garden are always free.",im:"Time-travel: young Goethe arriving at this garden house for the first time, enchanted, 1776",t:"Exterior and park free. House interior small entry fee.",c:["romantic_water"],r:"g",nn:"Goethes Gartenhaus — Park an der Ilm #102",ns:"Das kleine Haus, in dem Goethe lebte bevor er sein größeres Anwesen bezog — originaler Garten",nst:"Goethe erhielt 1776 von Herzog Karl August dieses kleine Renaissancehaus.",nt:"Außen und Park kostenlos. Hausinneres kleiner Eintritt."},
  {id:103,n:"Goethe-Schiller Monument — Altstadt #103",a:"Altstadt",v:["history","beautiful"],d:11,s:"The most famous monument in German literature — two geniuses sharing one pedestal",st:"Unveiled in 1857, the double statue of Goethe and Schiller is the defining image of Weimar. Both hold a laurel wreath together. The monument is on Theaterplatz in front of the National Theatre.",im:"Time-travel: the 1857 unveiling ceremony — literary Germany gathering to honour both men",t:"Free. The Theaterplatz around it is always open.",c:["scary"],r:"g",nn:"Goethe-Schiller-Denkmal — Altstadt #103",ns:"Das bekannteste Denkmal der deutschen Literatur — zwei Genies auf einem Sockel",nst:"1857 enthüllt, ist das Doppelstandbild von Goethe und Schiller das bestimmende Bild Weimars.",nt:"Kostenlos. Der Theaterplatz ist immer geöffnet."},
  {id:104,n:"Historischer Friedhof — Goethe Quarter #104",a:"Goethe Quarter",v:["history","quiet","famous_dead"],d:29,s:"The cemetery where Goethe and Schiller are both buried — the Fürstengruft vault",st:"The Fürstengruft (Ducal Vault) in Weimar\'s historic cemetery holds the coffins of Goethe and Schiller in the same room. Walking to it through the historic graves is free.",im:"Time-travel: Schiller\'s coffin being moved here to rest beside Goethe, 1827",t:"Free to walk the cemetery. Fürstengruft interior small fee.",c:["famous_dead"],r:"g",nn:"Historischer Friedhof — Goethe Quarter #104",ns:"Der Friedhof, wo Goethe und Schiller begraben sind — die Fürstengruft",nst:"Die Fürstengruft in Weimars historischem Friedhof enthält die Sargkisten von Goethe und Schiller.",nt:"Friedhof kostenlos zu gehen. Fürstengruft Inneres kleiner Eintritt."},
  {id:105,n:"Bauhaus Museum Exterior — Bauhaus Quarter #105",a:"Bauhaus Quarter",v:["architecture","history","beautiful"],d:22,s:"The new Bauhaus Museum — architecture as bold as the movement itself",st:"Weimar was the birthplace of the Bauhaus in 1919. The museum opened in 2019 for the 100th anniversary. The exterior is a bold piece of architectural statement. The park around it is free.",im:"Time-travel: Gropius founding the Bauhaus in Weimar in 1919, the most radical art school ever created",t:"Exterior and park free. Museum small entry fee.",c:["street_art"],r:"g",nn:"Bauhaus Museum Außen — Bauhaus Quarter #105",ns:"Das neue Bauhaus-Museum — Architektur so kühn wie die Bewegung selbst",nst:"Weimar war 1919 die Geburtsstätte des Bauhauses. Das Museum öffnete 2019 zum 100. Jubiläum.",nt:"Außen und Park kostenlos. Museum kleiner Eintritt."}

const startSpin=()=>{setShowPicker(true);setSpinning(true);setSpinPlace(null);const delays=[55,60,70,80,95,115,140,170,210,265,340,440,580];let i=0;const tick=()=>{if(i<delays.length){setSpinPlace(P[Math.floor(Math.random()*P.length)]);setTimeout(tick,delays[i++]);}else{const fin=P[Math.floor(Math.random()*P.length)];setSpinPlace(fin);setSpinning(false);}};tick();};
if(showPicker){const rp=spinPlace||P[0];const _bgs=["https://mariavheland.github.io/godostuff/dice/bg1.jpg","https://mariavheland.github.io/godostuff/dice/bg2.jpg","https://mariavheland.github.io/godostuff/dice/bg3.jpg"];const _bg=_bgs[Math.floor(Math.random()*_bgs.length)];
return <div style={{position:"fixed",inset:0,zIndex:1000,overflow:"hidden",backgroundImage:`url(${_bg})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px"}}>
{/* dark scrim over photo */}
<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",pointerEvents:"none"}}/>
{/* felt grain */}
<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,.018) 2px,rgba(255,255,255,.018) 4px)",pointerEvents:"none"}}/>
{/* center spotlight */}
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:420,height:420,borderRadius:"50%",background:"radial-gradient(ellipse,rgba(255,220,80,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
{/* floating card suits */}
<span style={{position:"absolute",top:"8%",left:"6%",fontSize:48,color:"#c8102e",animation:"floatSuit 6.2s ease-in-out infinite",pointerEvents:"none"}}>♥</span>
<span style={{position:"absolute",top:"12%",right:"8%",fontSize:40,color:"#1a1a1a",textShadow:"0 0 0 #fff",WebkitTextStroke:"1px rgba(255,255,255,.25)",animation:"floatSuit2 5.8s ease-in-out infinite .8s",pointerEvents:"none"}}>♠</span>
<span style={{position:"absolute",bottom:"18%",left:"5%",fontSize:36,color:"#c8102e",animation:"floatSuit 7.1s ease-in-out infinite 1.5s",pointerEvents:"none"}}>♦</span>
<span style={{position:"absolute",bottom:"15%",right:"6%",fontSize:44,color:"rgba(255,255,255,.18)",animation:"floatSuit2 6.5s ease-in-out infinite 2.2s",pointerEvents:"none"}}>♣</span>
<span style={{position:"absolute",top:"35%",left:"2%",fontSize:28,color:"rgba(255,220,80,.2)",animation:"floatSuit 8s ease-in-out infinite .4s",pointerEvents:"none"}}>⚄</span>
<span style={{position:"absolute",top:"55%",right:"3%",fontSize:30,color:"rgba(255,220,80,.18)",animation:"floatSuit2 7.4s ease-in-out infinite 1.1s",pointerEvents:"none"}}>⚂</span>
{/* gold border frame */}
<div style={{position:"absolute",inset:16,border:"1px solid rgba(212,175,55,.18)",borderRadius:24,pointerEvents:"none"}}/>
<div style={{position:"absolute",inset:20,border:"1px solid rgba(212,175,55,.08)",borderRadius:22,pointerEvents:"none"}}/>
{/* content */}
<p className={spinning?"text-5xl mb-6 dice-spin":"text-5xl mb-6 final-land"} style={{lineHeight:1,filter:spinning?"drop-shadow(0 0 12px rgba(255,220,80,.7))":"drop-shadow(0 0 8px rgba(255,220,80,.5))"}}>🎲</p>
{!spinPlace&&<p style={{color:"rgba(212,175,55,.6)",fontSize:14,letterSpacing:"2px",textTransform:"uppercase"}}>rolling…</p>}
{spinPlace&&<div className={spinning?"slot-flicker text-center":"final-land text-center"} style={{maxWidth:320,position:"relative",zIndex:1}}>
<div style={{background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",borderRadius:16,border:"1px solid rgba(212,175,55,.25)",padding:"20px 24px",boxShadow:"0 8px 40px rgba(0,0,0,.5)"}}>
<h2 className="text-2xl font-black" style={{color:"#fff",letterSpacing:"-.5px",lineHeight:1.15}}>{lang==="native"&&rp.nn?rp.nn:rp.n}</h2>
<p className="text-xs font-bold mt-2 uppercase" style={{color:"#d4af37",letterSpacing:"2px"}}>{rp.a} · {rp.d} min</p>
<p className="text-sm mt-3" style={{color:"rgba(255,255,255,.75)",lineHeight:1.65}}>{lang==="native"&&rp.ns?rp.ns:rp.s}</p>
</div>
</div>}
<div className="flex gap-3 mt-8" style={{position:"relative",zIndex:1}}>
<button onClick={()=>{setShowPicker(false);setSpinPlace(null);setSpinning(false);}} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>✕ Close</button>
{!spinning&&spinPlace&&<button onClick={()=>{setSelected(rp);setShowPicker(false);setSpinPlace(null);}} className="px-6 py-2 rounded-full text-sm font-black" style={{background:"linear-gradient(135deg,#d4af37,#f0c040)",color:"#0e3a1e",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,.5)",letterSpacing:".3px"}}>Let's go →</button>}
{!spinning&&spinPlace&&<button onClick={startSpin} className="px-5 py-2 rounded-full text-sm font-bold" style={{background:"rgba(0,0,0,.4)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(212,175,55,.3)",cursor:"pointer",backdropFilter:"blur(4px)"}}>🎲 Again</button>}
</div></div>}

return <div style={{minHeight:"100vh",background:TBGS[tab]||TBGS.default}}>
<div className="px-5 pt-8 pb-2" style={{maxWidth:540,margin:"0 auto"}}>
<div className="flex items-start justify-between">
<div><h1 className="text-3xl font-black" style={{color:"#1a1a2e",letterSpacing:"-.5px",lineHeight:1.1}}>Go Do Stuff</h1>
<p className="text-xs font-bold mt-0.5" style={{color:"#6366F1",letterSpacing:"1px",textTransform:"uppercase"}}>Weimar Edition</p>
<p className="text-sm mt-1.5" style={{color:"#888",lineHeight:1.4}}>{P.length} hidden places. {M.length} missions. {COLLECTIONS.length} collections.<br/>For the curious. All free.</p></div>
<div className="flex flex-col items-end gap-2">
<button onClick={startSpin} className="text-3xl" style={{background:"none",border:"none",cursor:"pointer"}}>🎲</button>
<LangToggle lang={lang} setLang={setLang}/>
</div></div>


<div className="mt-4 -mx-5 overflow-x-auto pb-2" style={{scrollBehavior:"smooth"}}>
<div className="flex gap-2 px-5" style={{minWidth:"fit-content"}}>
{["02_detail.png","03_explorer.png","04_night.png","05_timetravel.png","06_aerial.png","07_abstract.png"].map((img,i)=>
<div key={i} className="flex-shrink-0" style={{width:"110px",height:"160px"}}>
<img src={`images/${img}`} alt={`Mood ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"10px",display:"block"}}/>
</div>)}
</div></div>
<div className="flex gap-0 mt-5 rounded-xl overflow-hidden" style={{border:"1.5px solid #e4e4ed"}}>
{[{k:"places",l:`🗺 All (${filtered.length})`},{k:"collections",l:"📚 Collections"},{k:"phrases",l:"🗣️ Phrases"},{k:"plan",l:"🧭 Plan"},{k:"missions",l:"⚡ Missions"}].map(t=>
<button key={t.k} onClick={()=>{setTab(t.k);setActiveCol(null)}} className="flex-1 py-2.5 text-xs font-bold"
style={{background:tab===t.k?"#1a1a2e":"white",color:tab===t.k?"white":"#888",border:"none",cursor:"pointer",borderLeft:t.k!=="places"?"1.5px solid #e4e4ed":"none"}}>{t.l}</button>)}</div>

{(tab==="places"||tab==="missions")&&<div className="mt-3 relative">
<input type="text" placeholder={tab==="places"?"Search places, areas, stories...":"Search missions..."} value={search} onChange={e=>setSearch(e.target.value)}
className="w-full rounded-xl px-4 py-3 text-sm" style={{border:"1.5px solid #e4e4ed",background:"white",outline:"none",color:"#1a1a2e"}}/>
{search&&<button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 text-sm" style={{transform:"translateY(-50%)",color:"#aaa",background:"none",border:"none",cursor:"pointer"}}>✕</button>}</div>}

{tab==="places"&&<>
<div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {v.l}</button>)}</div>
<div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
<button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>All areas</button>
{AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}</div></>}
</div>

<div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
{tab==="places"?(filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>Nothing found</p></div>
:<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}</div>
):tab==="collections"?(activeCol?<div className="mt-3">
<button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← All collections</button>
<CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>setSelected(x)} lang={lang}/></div>
:<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
{COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
<div className="text-2xl mb-1">{col.emoji}</div>
<h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
<p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
<p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p></button>})}</div>
):tab==="phrases"?(<div className="mt-3"><PhrasesCard/></div>
):tab==="missions"?(<div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
):(<TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}} lang={lang}/>)}

<div className="mt-8 mb-4 text-center">
<p className="text-xs" style={{color:"#bbb"}}>Go Do Stuff — Weimar Edition</p>
<p className="text-xs mt-1" style={{color:"#ddd"}}>{P.length} places · {M.length} missions · {COLLECTIONS.length} collections</p></div>
</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
