  { id:129, n:"Rummelsburger Bucht", a:"Friedrichshain", v:["local","beautiful"], d:60, s:"A bay on the Spree with houseboats and sunset views — closest lake-feeling to the centre", st:"Not technically a lake but a wide bay of the Spree between Stralau and Rummelsburg. Houseboats, a floating swimming pool in summer, sunset views over the water, and a boardwalk. The closest thing to lakeside living in central Berlin.", im:"In the DDR this was industrial waterfront — coal barges, factory runoff. Now houseboats bob where barges docked. The water cleaned itself. The city turned its back to the water for decades, and now slowly turns around again.", t:"🚇 S-Bahn to Ostkreuz, walk 10 min south to the water. Or tram 21 to Rummelsburger Bucht. The boardwalk runs along the south shore. Floating pool (Badeschiff-style) in summer. Free to walk, small fee for pool.", c:["swimming","lakes","romantic_water","instagram"], r:"g" },
  // ══════ END OF THE LINE ══════
  { id:130, n:"Tram 68 to Alt-Schmöckwitz", a:"Köpenick", v:["beautiful","nature"], d:120, s:"One of the world's most beautiful tram rides — lakes, forest, a ferry", st:"National Geographic named this one of the 10 most beautiful tram rides in the world. 14.5 km hugging the shore of Langer See through pine forest. Swimmers sunbathe yards from the tracks. At the end: a tiny village, water on all sides, and ferry F21 to Krampenburg — a campsite in dense forest across the lake.", im:"1912. They built a tram line to the lakes because Berliners needed to escape. The city grew but the tram still runs the same route through the same pines to the same water.", t:"🚇 S3 to Köpenick or S46 to Grünau, then Tram 68 to Alt-Schmöckwitz. The full tram ride is the point — sit by the window. At the end, take Ferry F21 (BVG ticket valid) to Krampenburg. Every 20 min.", c:["rides","lakes","nature","nature_walks","end_of_line"], r:"g" },
  { id:131, n:"Ruhleben — U2's secret forest end", a:"Charlottenburg", v:["secret","nature"], d:60, s:"The U2 ends in a forest clearing next to an Olympic horse arena", st:"Everyone knows the U2 runs from Pankow through Alexanderplatz and Zoo. Almost nobody rides it to the end. Ruhleben station sits in a forest clearing beside the 1936 Olympic equestrian grounds. Step out and you're in the Grunewald with zero transition — subway to wilderness in one step.", im:"1936 Olympics. Horses and riders competing for gold where now only joggers and deer pass. The U-Bahn brought the crowds. Now it brings you to silence.", t:"🚇 U2 to Ruhleben (end of line, 30 min from Alexanderplatz). Walk out and you're at the edge of Grunewald forest. The old Olympic equestrian grounds are a 5-min walk. Trails lead deep into the forest.", c:["nature","end_of_line"], r:"g" },
  { id:132, n:"Rathaus Spandau — cathedral underground", a:"Spandau", v:["weird","beautiful"], d:45, s:"Berlin's most dramatic U-Bahn station + a medieval old town above", st:"The U7 runs 32 km — Berlin's longest line — and ends at Rathaus Spandau, a postmodern cathedral underground. High vaulted ceilings, 64 suspended lamps, black granite columns, parquet floors. The station itself is a protected monument. Above ground: Spandau's medieval old town and the Zitadelle fortress with 800-year-old walls and a bat cave.", im:"The architects thought: if people must travel underground, give them a cathedral. Above, Spandau has been a town since 1232 — older than Berlin itself.", t:"🚇 U7 to Rathaus Spandau (end of line, 45 min from Neukölln). Admire the station first. Then walk 10 min to Zitadelle Spandau — free courtyard, small museum fee. The old town has cobblestones and half-timbered houses.", c:["end_of_line","history_big"], r:"g" },
  { id:133, n:"Hönow — where Berlin just stops", a:"Marzahn", v:["weird","quiet"], d:90, s:"The U5 ends and Berlin becomes Brandenburg fields", st:"The U5 is Berlin's newest-oldest line — extended to Hauptbahnhof in 2020, but its eastern end has been at Hönow since 1989. Step out and the city just... ends. Fields, allotment gardens, silence. But nearby: Gärten der Welt (Gardens of the World) — a massive park with a Chinese garden, Japanese garden, Balinese garden, and a cable car over the whole thing.", im:"November 1989. This station opened the same month the Wall fell. East Berlin's newest subway stop, built for a future that changed overnight.", t:"🚇 U5 to Hönow (end of line, 40 min from Alexanderplatz). For Gärten der Welt: get off at Kienberg instead — cable car from the hill. Hönow itself: walk into the fields. Feel Berlin disappear.", c:["end_of_line","nature","parks"], r:"g" },
  { id:134, n:"Mahlsdorf — a Gründerzeit time capsule", a:"Marzahn", v:["history","hidden"], d:60, s:"A manor house frozen in the 1890s, at the end of the S5", st:"At the end of the S5, the Gründerzeitmuseum in Gutshaus Mahlsdorf is Europe's largest collection of Gründerzeit furniture and objects — 17 fully furnished rooms from the 1870s-1900s. Mechanical music machines, original wallpaper, gas lamps. The house was saved single-handedly by Charlotte von Mahlsdorf, a legendary trans woman who survived the Nazis and the DDR.", im:"Charlotte von Mahlsdorf — born Lothar Berfelde — spent her life rescuing beautiful things from demolished buildings. She carried chandeliers through rubble. The house is her life's work, every room a rescue.", t:"🚇 S5 to Mahlsdorf (end of line, 40 min from Alexanderplatz), then Tram 62 two stops. Small entry fee. Check opening hours — limited days.", c:["end_of_line","history_big","famous_dead"], r:"g" },
  { id:135, n:"Oranienburg — Sachsenhausen Memorial", a:"Oranienburg", v:["history","quiet"], d:180, s:"A concentration camp memorial at the end of the S1 — heavy but important", st:"The S1 runs north to Oranienburg, where the Sachsenhausen concentration camp memorial stands. Over 200,000 people were imprisoned here between 1936-1945. The barracks, guard towers, execution trench, and Station Z remain. It's one of the most important memorial sites in Germany. Not a fun day out — but an essential one.", im:"1936. This was designed to be visible. The triangular layout meant guards could see everything from one point. It was built to break people. Now it stands so we don't forget what breaking people looks like.", t:"🚇 S1 to Oranienburg (end of line, 50 min from Friedrichstraße). Walk 20 min or bus 804 to the memorial. Free entry. Audio guide €3. Allow 2-3 hours minimum. Go with someone.", c:["end_of_line","history_big","scary"], r:"g" },
  { id:136, n:"Strausberg Nord — lake town in Brandenburg", a:"Strausberg", v:["nature","beautiful"], d:150, s:"The S5 ends at a quiet lake town with a ferry you can ride with your BVG ticket", st:"Ride the S5 all the way east and you end up in Strausberg — a small Brandenburg town on Straussee lake. There's a historic lakeside ferry (Strausberger Fähre) that's been running since 1894 and accepts your BVG ticket. Swim in the lake, walk the shore, eat cake in the old town. It feels like a holiday for the price of a train ticket.", im:"This ferry has crossed the lake since 1894. Kaisers, wars, communism, reunification — the ferry just kept going. You ride it for €0 extra with your monthly pass.", t:"🚇 S5 to Strausberg or Strausberg Nord (end of line, 55 min from Alexanderplatz). Walk to the lake. The ferry runs from the Altstadt side. BVG ABC ticket required (or Deutschlandticket). Free swimming, free walking.", c:["end_of_line","lakes","romantic_water","rides"], r:"g" },
  { id:137, n:"Rudow — the quiet border crossing", a:"Neukölln", v:["history","quiet"], d:45, s:"The U7's southern end — where West Berlin touched the Wall", st:"Rudow was a West Berlin border village. The U7 ended here because the Wall was just beyond. The Schönefeld border crossing was nearby. Now it's a quiet residential area with allotment gardens and the surreal experience of standing where the city simply stopped for 28 years.", im:"1985. You ride the U7 to the last stop. You get out. Beyond the gardens: the Wall, the death strip, East Germany. You turn around and ride back. There's nowhere else to go.", t:"🚇 U7 to Rudow (end of line, 35 min from Hermannplatz). Walk south toward the old border area. Allotment gardens, quiet streets, a village feeling inside a city. The memorial markers are subtle.", c:["end_of_line","history_big"], r:"g" },
  // ══════ ART SPACES (via BPIGS) ══════
  { id:138, n:"Kunstquartier Bethanien", a:"Kreuzberg", v:["art","free"], d:45, s:"A massive former hospital turned free art complex", st:"This 1847 hospital on Mariannenplatz is now one of Berlin's biggest free art spaces — studios, galleries, project rooms, a theatre, all open to the public. The courtyard alone is worth the visit. Rotating exhibitions, often political, always free. The building itself is monumental.", im:"1847. Patients in iron beds, nuns in the corridors. Now artists in the wards, installations where surgery happened. The building heals differently now.", t:"🚇 U1/U8 Kottbusser Tor, walk 5 min to Mariannenplatz 2. Free entry. Multiple exhibition spaces — check what's on. The courtyard and café are always accessible.", c:["art","history_big"], r:"g" },
  { id:139, n:"ZK/U — Zentrum für Kunst und Urbanistik", a:"Moabit", v:["art","hidden"], d:40, s:"An old railway depot turned art lab — free, weird, and important", st:"A former railway freight depot in Moabit now housing artist residencies, exhibitions, and urban research projects. The building is enormous and industrial. Events range from sound art to urban farming workshops. The garden and outdoor area are open and strange.", im:"Freight trains loaded here. Goods for the city. Now the goods are ideas — artists from 20 countries making work about how cities should be.", t:"🚇 U9 Birkenstraße or S-Bahn Westhafen, walk 8 min to Siemensstraße 27. Free events regularly. Check their programme — some events are extraordinary.", c:["art","abandoned"], r:"g" },
  { id:140, n:"ACUD Gallery & Kunsthaus KuLe", a:"Mitte", v:["art","local"], d:30, s:"Two tiny artist-run spaces hiding in Mitte courtyards", st:"ACUD on Veteranenstraße and KuLe on Auguststraße are both artist-run, both free, both hiding in plain sight. ACUD has a gallery, cinema, club, and theatre in one building. KuLe is a Hausprojekt — a collectively run building with exhibition space on the ground floor. Together they represent what Mitte used to be before the money arrived.", im:"1990. The Wall just fell. Squatters took empty buildings and made galleries, cinemas, theatres. ACUD and KuLe are survivors — still here, still free, still artist-run.", t:"🚇 U8 Rosenthaler Platz. ACUD: Veteranenstraße 21. KuLe: Auguststraße 10. Both free. Check openings — they're small but the shows can be remarkable.", c:["art"], r:"g" },
  { id:141, n:"Kotti-Shop project space", a:"Kreuzberg", v:["art","local"], d:20, s:"A glass-box gallery at Kottbusser Tor — free art in the chaos", st:"A tiny glass-walled project space right on Kottbusser Tor — one of Berlin's most chaotic intersections. Inside: curated contemporary art. Outside: the roar of the city. The contrast is the point. Free, artist-run, and deeply Kreuzberg.", im:"Kotti never sleeps. Traffic, music, arguments, laughter. And in a glass box on the corner: someone's art, quiet and strange, visible to everyone who walks past.", t:"🚇 U1/U8 Kottbusser Tor. Adalbertstraße 4. Free. The space is small — sometimes one work fills it entirely. Open hours vary, check bpigs.com for current shows.", c:["art"], r:"g" },
  { id:142, n:"Panke Gallery", a:"Wedding", v:["art","hidden"], d:30, s:"Sound art and experimental shows in a Wedding courtyard", st:"In a courtyard on Gerichtstraße in Wedding, Panke Gallery focuses on sound art, new media, and experimental work. Free entry, regular openings with music and performances. Part of the wave of artist-run spaces that moved to Wedding when Mitte and Kreuzberg got expensive.", im:"The artists follow the cheap rent. First Mitte, then Prenzlauer Berg, then Kreuzberg, now Wedding. The art is always one neighbourhood ahead of the money.", t:"🚇 U6 Wedding or U9 Amrumer Straße. Gerichtstraße 23. Free. Check programme at panke.gallery — openings often have live sound performances.", c:["art"], r:"g" },
  { id:143, n:"Kreuzberg Pavillon", a:"Kreuzberg", v:["art","weird"], d:20, s:"A storefront gallery that exists for one night only — every Saturday", st:"A storefront window on Naunynstraße that hosts a new exhibition every Saturday from 8pm to 1am — then takes it down. One night only, every time. You see the art from the sidewalk. Wheelchair accessible, free, experimental. The most radical gallery format in Berlin.", im:"Saturday night. A new show appears in a window. By Sunday morning it's gone. The artists had five hours. You had five hours. That's it. Art as event, not object.", t:"🚇 U1/U8 Kottbusser Tor. Naunynstraße 53. Saturdays 8pm–1am only. Free. Check kreuzbergpavillon.tumblr.com for what's showing this week.", c:["art","night"], r:"g" },
  { id:144, n:"Club der Polnischen Versager", a:"Mitte", v:["art","weird"], d:30, s:"A Polish-German cultural club hiding on Ackerstraße — readings, art, chaos", st:"The Club of Polish Losers is a tiny cultural space run by Polish artists and writers in Mitte. Readings, performances, exhibitions, discussions — often bilingual, always free or cheap, reliably strange. One of Berlin's most authentic cross-cultural meeting points.", im:"Berlin and Warsaw have always been entangled — war, migration, art, love. This tiny club is where that conversation happens now, over bad wine and good poetry.", t:"🚇 U8 Rosenthaler Platz. Ackerstraße 169. Free or donation. Check their programme — events are irregular but always interesting.", c:["art"], r:"g" },
  { id:145, n:"Kommunale Galerie — borrow real art for your flat", a:"Charlottenburg", v:["art","free"], d:30, s:"A free gallery where you can literally borrow original artworks to take home", st:"A public gallery in Charlottenburg-Wilmersdorf with rotating contemporary exhibitions — always free. But the real secret is the Artothek: a lending library of original artworks by Berlin-based artists. You can borrow a real painting or print and hang it in your flat. Art on your wall, for free.", im:"Imagine a library, but instead of books you borrow paintings. You carry a framed artwork home on the U-Bahn. Your flat has a real piece by a Berlin artist on the wall. You return it in three months and pick a new one.", t:"🚇 U3/U7 Fehrbelliner Platz, or bus 101/115. Hohenzollerndamm 176. Free entry. Tue–Fri 10–17, Wed until 19, weekends 11–17. Ask about the Artothek at the desk.", c:["art"], r:"g" },
  { id:146, n:"BPIGS art walk — free gallery crawl", a:"Various", v:["art","free"], d:120, s:"Use the BPIGS map to build your own free gallery crawl", st:"Berlin has over 100 free artist-run project spaces — more than any other city. BPIGS (Berlin Independents Guide at bpigs.com) maps them all. Pick a neighbourhood, find 4-5 spaces within walking distance, and build your own gallery crawl. Each space is usually one room. Most are free. Many have opening nights with free drinks.", im:"No other city works like this. Artists rent cheap spaces, show their work, invite the neighbourhood. You walk in off the street. No ticket, no guard, no gift shop. Just art and the person who made it.", t:"Visit bpigs.com for the interactive map. Best neighbourhoods for density: Wedding (Gerichtstraße area), Mitte (Auguststraße/Linienstraße), Kreuzberg (Kottbusser Tor area), Neukölln (Maybachufer area). Saturday afternoons are best — many spaces open simultaneously.", c:["art"], r:"g" },

  // ══════ DAY TRIPS (Deutschlandticket / Regional trains) ══════
  { id:147, n:"Spreewald — canoe through a living forest", a:"Spreewald", v:["nature","vast"], d:360, s:"A labyrinth of 300+ water channels through ancient forest — free dike walks, cheap canoe rental", st:"An hour south of Berlin, the Spree splits into over 300 channels winding through forest, meadows, and tiny Sorbian villages. The Sorbs — a Slavic minority — have lived here for over 1,000 years and built this landscape by hand. You can rent a canoe cheaply or walk the endless dike paths for free. Lübbenau is the starting point — a small harbour town with pickles, pumpkin oil, and a fairy-tale old town.", im:"A Sorbian family 500 years ago, navigating these same channels by wooden boat, delivering hay and firewood. The postman here used a punt until 2005. No roads. Just water, trees, and silence.", t:"🚇 RE2 from Berlin Hbf to Lübbenau (1h10, Deutschlandticket). Walk 15 min to the Spreehafen. Canoe rental from ~€10/2h. Free: walk the dike paths along the channels — Lehde village is 30 min on foot and feels like another century. Pack a picnic.", c:["day_trips","nature","romantic_water"], r:"g" },
  { id:148, n:"Beelitz-Heilstätten — abandoned sanatorium in the forest", a:"Beelitz", v:["weird","nature"], d:240, s:"60 ruined hospital buildings in the woods — trees growing through roofs, free to explore from outside", st:"In 1898 Berlin built a vast sanatorium complex in the forest at Beelitz to treat tuberculosis. 60 buildings. Hitler recovered here in 1916 after being wounded at the Somme. The Soviets used it as a military hospital until 1995. Now most buildings are abandoned — trees growing through roofs, corridors open to sky. Walking the perimeter paths is extraordinary and completely free. There's also a paid treetop walkway (Baumkronenpfad, ~€12.50) if you have the budget.", im:"A wounded soldier in 1916 — the future dictator — lying in a bed here, staring at these same trees through the window. Then Soviet soldiers in the same beds, 30 years later. Then silence. Then trees through the windows.", t:"🚇 RE7 from Berlin Hbf to Beelitz-Heilstätten (45 min, Deutschlandticket). Walk 10 min. Free: walk the perimeter paths through the forest — the ruins are visible and atmospheric from outside. Optional: Baumkronenpfad treetop walkway ~€12.50 (320m long, 23m high).", c:["day_trips","abandoned","nature"], r:"y" },
  { id:149, n:"Potsdam — Sanssouci Park & palaces", a:"Potsdam", v:["beautiful","history"], d:300, s:"Frederick the Great's palace and 300 hectares of gardens — the park is completely free", st:"Sanssouci is Frederick the Great's summer palace from 1747 — the Prussian Versailles. But the real treasure is the park: 300 hectares of gardens, follies, temples, and smaller palaces, all connected by paths through ancient trees. The park is completely free. The New Palace, the Chinese House, the Roman Baths, the Orangery — all free to walk around. Only the palace interiors have entry fees.", im:"Frederick the Great — philosopher, flute player, military genius — designed these terraces himself. He wanted a place 'without care' (sans souci). He's buried here, next to his beloved dogs, because he preferred their company to humans.", t:"🚇 S7 to Potsdam Hbf (35 min from Berlin Hbf) or RE1 (25 min). Then bus 695 to Schloss Sanssouci, or walk 25 min through the town. Park is free, open dawn to dusk. Allow a full day. The vineyard terraces at sunset are extraordinary.", c:["day_trips","parks","history_big","romantic_water"], r:"g" },
  { id:150, n:"Wandlitzsee — swim where the DDR elite hid", a:"Wandlitz", v:["nature","history"], d:180, s:"A forest lake with a secret — the DDR's top leaders lived hidden in the woods nearby", st:"Wandlitzsee is a beautiful, clean forest lake north of Berlin with free swimming and a path around the shore. But the real story: in the woods nearby is the Waldsiedlung — a gated compound where the DDR's Politburo lived in luxury while preaching equality. Honecker, Mielke, all of them. Hidden from their own people. The compound is now partly accessible and has a small exhibition.", im:"The most powerful men in East Germany, living behind walls in the forest, with Western goods, swimming pools, and servants — while telling 17 million people that everyone was equal. The hypocrisy still hangs in the air.", t:"🚇 Heidekrautbahn (RB27) from Berlin-Karow to Wandlitzsee (35 min, Deutschlandticket). Walk 5 min to the lake. Free swimming, path around the lake. Waldsiedlung: 15 min walk north — check opening hours for the exhibition.", c:["day_trips","swimming","lakes","history_big","scary"], r:"g" },
  { id:151, n:"Buckow — Brecht's lakeside escape in the 'Märkische Schweiz'", a:"Buckow", v:["beautiful","quiet"], d:240, s:"Hills, lakes, and Brecht's summer house in Brandenburg's 'little Switzerland'", st:"An hour east of Berlin, the flat Brandenburg landscape suddenly crumples into hills, gorges, and lakes — the Märkische Schweiz (Brandenburg Switzerland). Buckow sits on Schermützelsee lake, surrounded by beech forest. Brecht and Helene Weigel had their summer house here. The town is tiny, the lake is swimmable, and the surrounding trails through the Naturpark feel like the Alps in miniature.", im:"Brecht sitting on the terrace in 1953, looking at the lake, writing the Buckow Elegies after the workers' uprising was crushed. The beauty of the place and the ugliness of the regime, side by side.", t:"🚇 RE1 to Müncheberg (40 min from Ostkreuz), then bus 928 to Buckow (30 min). Or S5 to Strausberg then bus 928. Brecht-Weigel-Haus: small fee. Free: swim in the lake, hike the Schlucht (gorge trail), walk the town. Pack food — options are limited.", c:["day_trips","nature","famous_dead","romantic_water"], r:"g" },
  { id:152, n:"Brandenburg an der Havel — island old town on the water", a:"Brandenburg", v:["history","beautiful"], d:240, s:"A thousand-year-old island town with medieval churches, canals, and barely any tourists", st:"Brandenburg an der Havel is older than Berlin and far more beautiful in places. The old town sits on an island between branches of the Havel river. Romanesque cathedral from 1165. Medieval brick churches. Half-timbered houses. Canals with small bridges. Practically no tourists despite being an hour from Berlin. The town gave the state of Brandenburg its name.", im:"1165. Monks building a cathedral on a river island in the marshes. 860 years later, the cathedral still stands, and you can sit in the same cloister and hear the same river.", t:"🚇 RE1 from Berlin Hbf to Brandenburg Hbf (1h, Deutschlandticket). Walk 15 min to the island old town (Dominsel). Cathedral and cloister: small fee. Free: walk the old town, the riverbanks, and the Neustädtischer Markt. Quiet even on weekends.", c:["day_trips","history_big","romantic_water"], r:"g" },
  { id:153, n:"Rheinsberg — Tucholsky's lake, Frederick's first palace", a:"Rheinsberg", v:["beautiful","quiet"], d:300, s:"A fairy-tale palace on a lake where a young prince dreamed and a writer fell in love", st:"Rheinsberg is where the young Frederick the Great spent his happiest years before becoming king — playing music, reading philosophy, hosting friends at a small palace on a lake. 200 years later, Kurt Tucholsky wrote 'Rheinsberg: A Picture Book for Lovers' about a couple's weekend here. The town is tiny, the lake is pristine, the palace gardens are free, and the whole thing feels like a painting.", im:"A young prince in 1736, finally away from his brutal father, playing the flute in a palace by a lake. The happiest years of his life. Then he became king and never felt free again.", t:"🚇 RE5 to Löwenberg, then RB54 to Rheinsberg (1h40 total from Berlin Hbf, Deutschlandticket). Palace gardens: free. Palace interior: small fee. Free: walk the lake shore, swim in Grienericksee, wander the tiny town. Bring food or eat at the old market square.", c:["day_trips","romantic_water","history_big","famous_dead"], r:"g" },
  { id:154, n:"Liepnitzsee — Berlin's secret perfect lake", a:"Wandlitz", v:["nature","quiet"], d:180, s:"A crystal-clear forest lake with an island — possibly the most beautiful lake near Berlin", st:"Liepnitzsee is a deep, clear lake hidden in the forest north of Berlin. No roads reach it — you walk 20 minutes through trees to get there. An island in the middle has a small beach you can swim to. The water is so clean you can see the bottom at 5 meters. On weekdays you might be alone. This is the lake Berliners whisper about.", im:"No buildings. No cars. No shops. Just water, forest, and an island. The kind of place that makes you forget cities exist. People have been swimming here for thousands of years.", t:"🚇 S2 to Bernau, then bus 894 to Wandlitz, walk 20 min through forest. Or Heidekrautbahn RB27 to Wandlitzsee, then 30 min walk. No facilities — bring everything. Free. The island swim is ~200m.", c:["day_trips","swimming","lakes","nature"], r:"y" },

  // ══════ INSTA / TIKTOK GAPS ══════
  { id:155, n:"Haus Schwarzenberg", a:"Mitte", v:["art","history"], d:40, s:"Berlin's last rebel courtyard — street art, hidden museums, and a story about saving lives", st:"Behind Rosenthaler Straße 39 — across from the Apple Store — hides a courtyard covered in murals, stickers, and installations. It changes constantly. But the real story is deeper: inside is the Blindenwerkstatt Otto Weidt, a free museum about a brush-maker who hid Jewish workers in his factory during the Holocaust. He bribed, forged, and lied to keep them alive. The courtyard is what remains of 1990s squatter Berlin — artists took empty buildings and made culture. This one survived.", im:"Otto Weidt in 1943, hiding Jewish workers behind a false wall in his workshop while Gestapo officers inspected the front room. Blind and deaf workers making brushes. Weidt gambling his life every day. The workshop is still there, exactly as it was.", t:"🚇 U8 Rosenthaler Platz or S-Bahn Hackescher Markt. Rosenthaler Straße 39, walk through the passage. Courtyard: free, always open. Otto Weidt Museum: free, Tue-Sun. The street art changes — go twice and see different walls.", c:["art","scary","history_big","instagram"], r:"g" },
  { id:156, n:"East Side Gallery", a:"Friedrichshain", v:["art","history"], d:45, s:"1.3 km of the Berlin Wall covered in murals — the longest open-air gallery on earth", st:"After the Wall fell in 1989, over 100 artists from around the world painted the east side of a 1.3 km stretch that was left standing along the Spree. The famous kiss between Brezhnev and Honecker. The Trabant crashing through concrete. These aren't decorations — they were painted in the euphoria of a world changing overnight. The wall is weathered now, some parts restored, but walking the full length with the Spree on one side and the city on the other still hits.", im:"November 1989. The Wall is open. Within weeks, artists arrive with paint. They cover the concrete that imprisoned people for 28 years with color, rage, joy, and hope. The guards' side becomes the world's biggest canvas.", t:"🚇 S-Bahn Ostbahnhof or Warschauer Straße. Walk the full 1.3 km — start from Ostbahnhof heading east. Free, always open. Best early morning before crowds. The Spree-side path is quieter.", c:["art","history_big","instagram"], r:"g" },
  { id:157, n:"Holzmarkt 25 — the Spree village", a:"Friedrichshain", v:["local","weird"], d:60, s:"A self-built creative village on the Spree — bars, food, music, and a different idea of how cities could work", st:"On a prime stretch of Spree riverbank between Jannowitzbrücke and Ostbahnhof, a community bought the land and built their own village. Wooden structures, shipping containers, a restaurant in a boat, a climbing wall, a nightclub, and a playground — all self-organized. No chain stores. No corporate landlord. In a city being swallowed by investors, Holzmarkt is what happens when people fight back and win.", im:"Developers wanted luxury apartments here. Instead, a cooperative raised millions, bought the land, and built a village by hand. Every crooked beam is a middle finger to speculation.", t:"🚇 S-Bahn Jannowitzbrücke or Ostbahnhof, walk 3 min to the Spree. Holzmarktstraße 25. Free entry. Walk through, sit by the water, eat something. Open daily. Best in summer evenings.", c:["romantic_water","art"], r:"g" },
  { id:158, n:"Neu-Venedig — canals through garden cottages", a:"Köpenick", v:["hidden","beautiful"], d:60, s:"A miniature Venice of tree-lined canals and tiny bridges in southeast Berlin", st:"In the far southeast, where the Müggelspree splits into small channels, a neighbourhood of garden cottages sits on tiny canal islands connected by wooden bridges. Built in the 1920s as weekend escapes for working-class Berliners, the houses have their own boat docks and the canals are lined with willows. Almost nobody from outside the area knows it exists.", im:"A factory worker in 1925, saving for months to buy a small plot on a canal. Building a tiny cottage with his own hands. Rowing home on Friday evenings. His great-grandchildren still live here.", t:"🚇 S3 to Wilhelmshagen (40 min from Alexanderplatz), walk 15 min south to the canal area. Free. Walk the paths along Müggelspree and its channels. Quietest on weekday mornings.", c:["romantic_water","hidden","instagram"], r:"g" },
  { id:159, n:"Modersohnbrücke at golden hour", a:"Friedrichshain", v:["beautiful","local"], d:20, s:"The bridge where young Berlin watches the sunset — viral for a reason", st:"A railway overpass between Friedrichshain and Kreuzberg that became Berlin's unofficial sunset gathering point. Every warm evening, people sit on the railing and steps watching trains pass below while the sky turns gold over the Fernsehturm. No admission, no event — just people and light.", im:"A hundred people sitting on a bridge, not looking at phones, watching the sun go down behind the TV tower. Trains underneath. The whole city turning gold. Nobody planned this. It just happened.", t:"🚇 S-Bahn Ostkreuz, walk 5 min west. Or U1 Schlesisches Tor, walk north. The bridge spans S-Bahn tracks on Modersohnstraße. Free. Best 30 min before sunset.", c:["instagram","romantic_water"], r:"g" },
  { id:160, n:"Rixdorf — the Bohemian village inside Neukölln", a:"Neukölln", v:["hidden","history"], d:30, s:"Cobblestones, a forge, and a 300-year-old village square hiding in the middle of Neukölln", st:"Before Neukölln swallowed it, Rixdorf was its own village — and part of it still feels like one. Around Richardplatz, cobblestone lanes lead to a working blacksmith's forge, half-timbered cottages, and a Bohemian church. In 1737, King Friedrich Wilhelm I invited persecuted Bohemian Protestants to settle here. Their village, Böhmisch-Rixdorf, still has a distinct character. The Christmas market here is one of Berlin's most atmospheric — tiny, candlelit, on the old village square.", im:"Bohemian refugees in 1737, fleeing religious persecution, arriving in this village outside Berlin. Building a church, a school, a new life. 300 years later, the village square is still here — surrounded by Neukölln's kebab shops and Spätis.", t:"🚇 U7 Karl-Marx-Straße, walk 5 min east to Richardplatz. Free. The forge is sometimes open — check the sign. The December Christmas market on the square is unmissable.", c:["history_big","hidden"], r:"g" },

// ═══════ TRIP PLANNER ═══════
function buildTrip(sa,dur,food){
  const W=15;let b=dur,ca=sa;const vis=new Set(),route=[];
  const pick=(a,bl)=>{const lo=P.filter(p=>p.a===a&&!vis.has(p.id)&&p.d+W<=bl);if(lo.length)return lo[Math.floor(Math.random()*lo.length)];const nb=AN[a]||[];const all=P.filter(p=>[a,...nb].includes(p.a)&&!vis.has(p.id)&&p.a!=="Various"&&p.d+W<=bl);return all.length?all[Math.floor(Math.random()*all.length)]:null};
  while(b>30){const nx=pick(ca,b);if(!nx)break;vis.add(nx.id);route.push(nx);b-=(nx.d+W);ca=nx.a}
  let fs=[];
  if(food&&route.length){const aa=[...new Set(route.map(p=>p.a))];for(const a of aa){const o=FOOD[a];if(o?.length)fs.push({area:a,spot:o[Math.floor(Math.random()*o.length)]})}fs=fs.slice(0,Math.max(1,Math.floor(route.length/2)))}
  return{route,fs,tt:dur-b};
}

        <div className="flex gap-2 mt-3 pb-1" style={{overflowX:"auto"}}>{VIBES.map(v=><button key={v.id} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold" style={{background:vibe===v.id?"#1a1a2e":"white",color:vibe===v.id?"white":"#555",border:"1.5px solid #e4e4ed",cursor:"pointer"}} onClick={()=>setVibe(vibe===v.id?"all":v.id)}>{v.e} {t(v.l,lang)}</button>)}</div>
        <div className="flex gap-2 mt-2 pb-1" style={{overflowX:"auto"}}>
          <button className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:!area?"#1a1a2e":"transparent",color:!area?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(null)}>{t("All areas",lang)}</button>
          {AREAS.map(a=><button key={a} className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-medium" style={{background:area===a?"#1a1a2e":"transparent",color:area===a?"white":"#888",border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>setArea(area===a?null:a)}>{a}</button>)}
        </div>
      </>}
    </div>

    {/* Content */}
    <div className="px-5 pb-24" style={{maxWidth:540,margin:"0 auto"}}>
      {tab==="places"?(
        filtered.length===0?<div className="text-center py-16"><div className="text-4xl mb-3">🔍</div><p className="text-base font-bold" style={{color:"#1a1a2e"}}>{t("Nothing found",lang)}</p></div>
        :<div className="flex flex-col gap-3 mt-3">{filtered.map((p,i)=><PlaceCard key={p.id} place={p} idx={i} onOpen={x=>{setSelected(x);setActiveCol(null)}}/>)}</div>
      ):tab==="collections"?(
        activeCol?<div className="mt-3">
          <button onClick={()=>setActiveCol(null)} className="text-sm font-bold mb-3 flex items-center gap-1" style={{color:"#6366F1",background:"none",border:"none",cursor:"pointer"}}>← {t("All collections",lang)}</button>
          <CollectionView col={COLLECTIONS.find(c=>c.id===activeCol)} onOpenPlace={x=>{setSelected(x)}}/>
        </div>
        :<div className="grid gap-3 mt-3" style={{gridTemplateColumns:"1fr 1fr"}}>
          {COLLECTIONS.map((col,i)=>{const cnt=P.filter(p=>p.c?.includes(col.id)).length;
            return <button key={col.id} onClick={()=>setActiveCol(col.id)} className="text-left rounded-2xl p-4 fade-up" style={{background:"white",border:`1.5px solid ${col.color}20`,cursor:"pointer",animationDelay:`${i*40}ms`}}>
              <div className="text-2xl mb-1">{col.emoji}</div>
              <h3 className="text-sm font-bold" style={{color:col.color}}>{col.name}</h3>
              <p className="text-xs mt-1" style={{color:"#888"}}>{col.desc}</p>
              <p className="text-xs mt-2 font-semibold" style={{color:"#bbb"}}>{cnt} places</p>
            </button>})}
        </div>
      ):tab==="missions"?(
        <div className="flex flex-col gap-3 mt-3">{filteredM.map((m,i)=><MissionCard key={m.id} m={m} idx={i}/>)}</div>
      ):tab==="phrases"?(
        <div className="flex flex-col gap-3 mt-3">{PHRASES.map((ph,i)=><PhraseCard key={i} phrase={ph} idx={i}/>)}</div>
      ):(
        <TripPlanner onOpenPlace={x=>{setSelected(x);setActiveCol(null)}}/>
      )}

      {/* Discover More — indie sources */}
      <div className="mt-8 mb-20 rounded-2xl p-5 fade-up" style={{background:"linear-gradient(135deg,#1a1a2e,#2d1b69)",color:"white"}}>
        <h2 className="text-lg font-black mb-1">🔮 {t("Discover More",lang)}</h2>
        <p className="text-xs mb-2" style={{color:"#b8b0d0"}}>Indie blogs, local creators & underground guides — the real Berlin lives here.</p>
        <p className="text-xs mb-4" style={{color:"#8b7fb8",fontStyle:"italic"}}>External links lead to third-party content. We are not responsible for their content, accuracy, or data practices.</p>
        {[
          {emoji:"🏚️",name:"Abandoned Berlin",url:"abandonedberlin.com",by:"Ciarán Fahey",desc:"The best city-blog in Germany (The Guardian). Urbex, lost places, forgotten stories."},
          {emoji:"📸",name:"@berlin_ickliebedir",url:"instagram.com/berlin_ickliebedir",by:"Instagram",desc:"Beautiful, offbeat Berlin photography from local creators."},
          {emoji:"🗺️",name:"BertaBerlin Maps",url:"walk-this-way.net",by:"BertaBerlin",desc:"Hand-curated neighbourhood walk maps. Print one and get lost."},
          {emoji:"🏗️",name:"Digital Cosmonaut",url:"digitalcosmonaut.com",by:"urbex blog",desc:"Lost places, abandoned factories, ghost stations — deep Berlin exploration."},
          {emoji:"🎨",name:"Alternative Berlin",url:"alternativeberlin.com",by:"tours & community",desc:"Street art, subculture, underground scene tours and workshops."},
          {emoji:"🐘",name:"Elephant in Berlin",url:"elephantinberlin.com",by:"local blog",desc:"An insider's guide to living and exploring Berlin — quirky, personal, honest."},
          {emoji:"📍",name:"The Needle Berlin",url:"needleberlin.com",by:"neighbourhood guide",desc:"Hyper-local tips sorted by Kiez. Cafés, bars, shops the tourists miss."},
          {emoji:"🗺️",name:"MapUrbex",url:"mapurbex.com",by:"community map",desc:"Interactive map of abandoned & urban exploration spots across Berlin and beyond."},
          {emoji:"🎭",name:"BPIGS — Berlin Independents Guide",url:"bpigs.com",by:"art map & directory",desc:"Interactive map of Berlin's independent art spaces, project rooms, galleries, and alternative venues. The real creative underground."},
          {emoji:"📖",name:"The 500 Hidden Secrets of Berlin",url:"",by:"book by Nicky Haslehurst",desc:"A gorgeous guidebook of 500 places — markets, pools, galleries, corners. Find it at your library."},
        ].map((src,i)=><a key={i} href={src.url?`https://${src.url}`:"#"} target="_blank" rel="noopener noreferrer"
          className="flex items-start gap-3 rounded-xl p-3 mb-2" style={{background:"rgba(10,10,30,0.93)",textDecoration:"none",color:"white",cursor:src.url?"pointer":"default"}}>
          <span className="text-xl mt-0.5">{src.emoji}</span>
          <div className="flex-1 min-w-0">
            <div className="flex items-baseline gap-2 flex-wrap">
              <span className="text-sm font-bold">{src.name}</span>
              <span className="text-xs" style={{color:"#8b7fb8"}}>{src.by}</span>
            </div>
            <p className="text-xs mt-1" style={{color:"#c8c0e0"}}>{src.desc}</p>
            {src.url&&<p className="text-xs mt-1 font-semibold" style={{color:"#a78bfa"}}>{src.url} {"→"}</p>}
          </div>
        </a>)}
      </div>

      {/* About */}
      <div className="mt-6 rounded-xl p-4" style={{background:"#f8f7ff",border:"1px solid #e4e4ed"}}>
        <p className="text-sm font-bold mb-2" style={{color:"#1a1a2e"}}>{t("About Go Do Stuff",lang)}</p>
        <p className="text-xs leading-relaxed" style={{color:"#6366F1",fontWeight:600}}>Berlin Edition</p>
        <p className="text-xs leading-relaxed mt-1" style={{color:"#888"}}>Go Do Stuff is a franchise of city guides for the curious, the broke, and the ones who want to feel alive. This is the Berlin edition — 160 hidden, free places to discover. Every place should be explored responsibly, legally, and with awareness.</p>
        <p className="text-xs mt-2 leading-relaxed" style={{color:"#888"}}>Images used in this app are AI-generated illustrations and do not represent real conditions. They are for mood and atmosphere only.</p>
      </div>

      {/* Disclaimer */}
      <div className="mt-4 rounded-xl p-5" style={{background:"#f5f5f5",border:"1px solid #e0e0e0"}}>
        <p className="text-xs font-bold mb-2" style={{color:"#777"}}>{t("Disclaimer",lang)}</p>
        <p className="text-xs leading-relaxed" style={{color:"#999"}}>This app is intended for inspiration and general information only. All content is provided without guarantee of accuracy. Information such as accessibility, safety conditions, and opening status may change at any time. Users are responsible for verifying all details independently before visiting any location.</p>
        <p className="text-xs leading-relaxed mt-2" style={{color:"#999"}}>Some places described in this app include environments that may involve inherent risks, including but not limited to heights, water, uneven terrain, or urban structures. Users are solely responsible for their actions and decisions.</p>
        <p className="text-xs leading-relaxed mt-2" style={{color:"#999"}}>This app does not encourage trespassing, unsafe behaviour, or entry into restricted areas. Always follow local laws and posted regulations.</p>
        <p className="text-xs leading-relaxed mt-2" style={{color:"#999"}}>Images used in this app are AI-generated illustrations and do not represent real conditions. They are for mood and atmosphere only.</p>
        <p className="text-xs leading-relaxed mt-2" style={{color:"#999"}}>The creators accept no liability for any damage, injury, or loss resulting from the use of this app.</p>
      </div>

      {/* Terms of Use */}
      <div className="mt-4 rounded-xl p-5" style={{background:"#f5f5f5",border:"1px solid #e0e0e0"}}>
        <p className="text-xs font-bold mb-2" style={{color:"#777"}}>{t("Terms of Use",lang)}</p>
        <p className="text-xs leading-relaxed" style={{color:"#999"}}>By using this app, you agree that: you use the app at your own risk; you are responsible for your own safety and decisions; you will follow all applicable laws and regulations; you will not enter restricted or dangerous areas. This app provides inspiration only and does not guarantee accuracy or safety.</p>
      </div>

      {/* Privacy */}
      <div className="mt-4 mb-20 rounded-xl p-5" style={{background:"#f5f5f5",border:"1px solid #e0e0e0"}}>
        <p className="text-xs font-bold mb-2" style={{color:"#777"}}>{t("Privacy",lang)}</p>
        <p className="text-xs leading-relaxed" style={{color:"#999"}}>This app does not collect, store, or process personal data. No accounts, tracking, or analytics are used. External links may be subject to the privacy policies of third-party providers.</p>
      </div>
    </div>

    <div className="fixed bottom-6 right-6" style={{zIndex:50}}>
      <button onClick={()=>setShowPicker(true)} className="rounded-full flex items-center justify-center shadow-lg" style={{width:56,height:56,background:"linear-gradient(135deg,#6366F1,#8B5CF6)",border:"none",cursor:"pointer",fontSize:"24px"}}>🎲</button>
    </div>

    {selected&&<PlaceDetail place={selected} onClose={()=>setSelected(null)} onNext={goN} onPrev={goP}/>}
    {showPicker&&<RandomPicker onClose={()=>setShowPicker(false)} onOpen={x=>{setSelected(x);setActiveCol(null)}}/>}
  </div>;
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
// Hide loading screen
setTimeout(() => { const el = document.getElementById('loading'); if(el) el.classList.add('done'); setTimeout(() => el?.remove(), 600); }, 100);
</script>
<script>
// Register service worker for PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
