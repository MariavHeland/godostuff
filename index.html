const PHRASES = [{"native": "Hallo, wie geht's?", "en": "Hello, how are you?"}, {"native": "Wo ist...?", "en": "Where is...?"}, {"native": "Danke schön!", "en": "Thank you!"}, {"native": "Wie viel kostet das?", "en": "How much does this cost?"}, {"native": "Entschuldigung", "en": "Excuse me"}, {"native": "Ich hätte gerne...", "en": "I'd like to have..."}, {"native": "Wo ist die nächste U-Bahn?", "en": "Where's the nearest subway?"}, {"native": "Ist das kostenlos?", "en": "Is this free?"}, {"native": "Können Sie mir helfen?", "en": "Can you help me?"}, {"native": "Tschüss!", "en": "Bye!"}];

// ═══════════════════════════════════════════════════════════════════════
// GO DO STUFF — Berlin's hidden world. 160 places. 22 missions. 18 collections.
// For the curious. For the broke. For the ones who want to feel alive.
// ═══════════════════════════════════════════════════════════════════════

const P = [
  // ══════ MITTE ══════
  { id:1, n:"Hinterhöfe of Sophienstraße", a:"Mitte", v:["hidden","history"], d:30, s:"Courtyards that survived the war", st:"Walk through the doorways and find chains of hidden courtyards dating to the 1800s. Most survived the bombing. Old signage on the walls if you look up.", im:"It's 1920. Workshops — tailors, metalworkers, printing presses. Kids running between buildings. The city roaring into the Weimar Republic.", t:"Many courtyards are semi-public and accessible through unlocked doorways. Be quiet and respectful — people live here.", c:["courtyards"], r:"g" },
  { id:2, n:"Invalidenfriedhof", a:"Mitte", v:["quiet","history"], d:40, s:"A cemetery split by the Wall", st:"Military cemetery from 1748 cut in half by the Berlin Wall. Graves destroyed for the death strip. You can see where the Wall ran.", im:"1961. Soldiers stringing barbed wire through a cemetery. The dead on one side, families on the other, unable to visit for 28 years.", t:"Scharnhorststraße. Free, daylight hours. Almost nobody comes.", c:["scary","history_big"], r:"g" },
  { id:3, n:"Ghost stations of the U-Bahn", a:"Mitte", v:["weird","history"], d:45, s:"Abandoned platforms you pass through on the train", st:"Cold War: several U-Bahn stations sealed shut. West Berlin trains passed without stopping. Ghostly platforms with armed guards. Some still have DDR tiles.", im:"A West Berlin train in 1975. It slows through a station but doesn't stop. Through the window — a platform in the dark. A soldier stares back. Then blackness.", t:"Ride U6 between Friedrichstraße and Kochstraße. Nordbahnhof has a free exhibition.", c:["scary","history_big"], r:"g" },
  { id:4, n:"Dorotheenstädtischer Friedhof", a:"Mitte", v:["quiet","beautiful"], d:40, s:"Where Hegel, Brecht, and Fichte are buried", st:"Small cemetery where some of history's most important thinkers are buried. Hegel. Brecht. Heinrich Mann. Peaceful, overgrown, barely visited.", im:"Brecht's funeral, 1956. East Berlin intellectuals in the rain, knowing the state they believed in was cracking.", t:"Free. Chausseestraße 126. Daylight hours.", c:["famous_dead","parks"], r:"g" },
  { id:5, n:"Humboldt Forum roof terrace", a:"Mitte", v:["beautiful","free"], d:25, s:"Best free view in central Berlin", st:"Free rooftop terrace — TV tower, Museum Island, Unter den Linden. Most tourists pay to go inside. The terrace is free and almost nobody goes up.", im:"Prussian royal palace. Then DDR parliament. Then empty lot. Now palace again. 500 years of reinvention.", t:"West side entrance, elevator to terrace. Free. Best at golden hour.", c:["high_spots"], r:"g" },
  { id:6, n:"Monbijoupark at midnight", a:"Mitte", v:["local","night"], d:60, s:"The Spree at night with Museum Island glowing", st:"After dark this park transforms. Museum Island lit up across water. Free swing or tango nights in summer. The view alone is worth it.", im:"1750 — garden of palace Monbijou. Nobility walking by torchlight along the same riverbank. The cathedral doesn't exist yet.", t:"Best visited in summer evenings when the park is busy. Bring a blanket. Visit with friends.", c:["romantic_water"], r:"y" },
  { id:7, n:"Bebelplatz", a:"Mitte", v:["history","quiet"], d:15, s:"Where the Nazis burned 20,000 books", st:"On May 10, 1933, Nazi students burned 20,000 books here. A glass panel in the ground shows empty white bookshelves below — a memorial to the books that were destroyed. Look down through the glass at night when it's lit.", im:"The fire is enormous. Students throwing books by Freud, Einstein, Mann, Kafka. A crowd watches. Heinrich Heine wrote: 'Where they burn books, they will also burn people.'", t:"Free, always accessible. Best at night when the underground memorial is lit. Look for the glass square in the pavement.", c:["scary","history_big"], r:"g" },
  { id:8, n:"Hitler's bunker site", a:"Mitte", v:["history","weird"], d:10, s:"A parking lot where the war ended", st:"This is where Hitler spent his last days and killed himself. There's no monument — just a car park and an information board. The deliberate ordinariness is the point. The most evil man of the 20th century ended in a hole under a parking lot.", im:"April 1945. Underground, the dictator rages at maps while the city above burns. Soviet shells shake the ceiling. Then a gunshot. Then silence.", t:"Near In den Ministergärten / Gertrud-Kolmar-Straße. Just a parking lot with an info sign. That's all.", c:["scary","history_big"], r:"g" },
  { id:9, n:"Reichstag dome", a:"Mitte", v:["free","beautiful"], d:30, s:"Free but register online first", st:"Glass dome of parliament — spiral ramp with audio guide, looking into the chamber and over Berlin. Burned 1933, bombed 1945, wrapped by Christo 1995, rebuilt by Foster.", im:"Looking down into democracy. Then up through glass at sky. The architect put the people above their politicians.", t:"Register free at bundestag.de days in advance.", c:["high_spots","history_big"], r:"g" },
  { id:10, n:"Hackesche Höfe", a:"Mitte", v:["beautiful","local"], d:25, s:"Berlin's most famous courtyard complex — 8 connected courtyards", st:"Eight interconnected courtyards from 1906 with Art Nouveau tile facades, galleries, cafés, a cinema, and a theater. The first courtyard is stunning — blue and gold Jugendstil tiles on every wall.", im:"Imagine 1906: this was a revolutionary idea — connecting residential, commercial, and cultural spaces through courtyards. Light and air for everyone, not just the rich.", t:"Rosenthaler Straße 40-41. Free to walk through all 8 courtyards. Go deep — courtyard 5 and beyond get quieter.", c:["courtyards","staircases"], r:"g" },

  // ══════ KREUZBERG ══════
  { id:11, n:"Viktoriapark waterfall & monument", a:"Kreuzberg", v:["beautiful","nature"], d:35, s:"A 24m waterfall and the highest point in inner Berlin", st:"A genuine waterfall cascading down rocks. Built 1894. At the top: the iron cross monument that gave Kreuzberg its name, and a panoramic view of the city.", im:"Workers hauling massive boulders up a hill to create a fake mountain waterfall in flat Berlin. A city dreaming itself into a landscape.", t:"Kreuzbergstraße entrance. Climb to the top. Free.", c:["high_spots","parks","romantic_water"], r:"y" },
  { id:12, n:"Markthalle Neun", a:"Kreuzberg", v:["local","free"], d:45, s:"1891 iron market hall — free to wander", st:"Gorgeous iron hall. Thursday is Street Food Thursday — even without buying, the atmosphere and architecture are electric.", im:"1891 — gas lamps, horse carts, women buying potatoes. Same iron columns, same roof, same light.", t:"Eisenbahnstraße 42/43. Thursday from 5pm.", c:[], r:"g" },
  { id:13, n:"Turkish market Maybachufer", a:"Kreuzberg", v:["local","beautiful"], d:45, s:"A canal-side market that feels like Istanbul", st:"Tuesdays and Fridays — olives, bread, fabrics, spices along the Landwehrkanal. The canal sparkles. Börek fills the air.", im:"A Turkish family in 1960s Kreuzberg. Homesick. Then slowly building this — a piece of home by a Berlin canal.", t:"Maybachufer, Tue and Fri mornings.", c:["romantic_water"], r:"g" },
  { id:14, n:"Böcklerpark canal steps", a:"Kreuzberg", v:["quiet","nature"], d:30, s:"Stone steps right at the water", st:"Wide steps down to the Landwehrkanal. Sit with feet almost in water, watch boats. Mediterranean quay vibes with a döner shop behind you.", im:"This canal was hand-dug in the 1850s by workers from the slums. The same water that was once a sewer.", t:"South side of Landwehrkanal near Prinzenstraße.", c:["romantic_water"], r:"g" },
  { id:15, n:"Landwehrkanal at golden hour", a:"Kreuzberg", v:["beautiful","quiet"], d:30, s:"The canal turns gold for 20 minutes every evening", st:"Around sunset, the canal between Kottbusser Brücke and Paul-Lincke-Ufer glows. Houseboats, swans, willows — all in gold. Lasts 20 minutes.", im:"Rosa Luxemburg was killed and thrown in this canal in 1919. Now Kreuzberg sits in evening light, grateful to be alive.", t:"Paul-Lincke-Ufer facing west, 30 min before sunset.", c:["romantic_water","history_big"], r:"g" },
  { id:16, n:"Görlitzer Park railway embankment", a:"Kreuzberg", v:["hidden","nature"], d:30, s:"Elevated secret corner nobody walks to", st:"Nobody walks to Görli's southeast corner where the old railway embankment rises. Hidden community garden, elevated Kreuzberg rooftop views.", im:"This was Görlitzer Bahnhof. Steam trains from Saxony. All gone. Grass where tracks were.", t:"Southeast corner near Wiener Straße.", c:["parks"], r:"g" },
  { id:17, n:"Where Rosa Luxemburg was murdered", a:"Kreuzberg", v:["history","quiet"], d:15, s:"A bridge with a memorial where a revolutionary was killed", st:"On January 15, 1919, Rosa Luxemburg was beaten, shot, and thrown into the Landwehrkanal from the Lichtensteinbrücke. A small cross and flowers mark the spot on the canal bank. Most people walk right past.", im:"Soldiers drag a woman to a bridge in the winter dark. A gunshot. A splash. The water closes over one of the 20th century's most brilliant minds.", t:"Lichtensteinbrücke / Katharina-Heinroth-Ufer on the canal. A small memorial is on the bank. Quiet and unnoticed.", c:["history_big","scary","famous_dead"], r:"g" },

  // ══════ NEUKÖLLN ══════
  { id:18, n:"Körnerpark", a:"Neukölln", v:["beautiful","hidden"], d:35, s:"A sunken Baroque garden nobody knows", st:"Below street level — a miniature Versailles. Waterfalls, colonnades, hedges. Built 1916 on a gravel pit. Free gallery.", im:"Someone turned a hole in the ground into a palace garden for working-class Neukölln.", t:"Enter from Schierker Straße — you descend steps.", c:["parks","courtyards"], r:"g" },
  { id:19, n:"Tempelhofer Feld at night", a:"Neukölln", v:["vast","night"], d:60, s:"Walk an airport runway under the stars", st:"At night, runways stretch into darkness. The city glows at edges. Above: more sky than seems possible in a city.", im:"1948. Every 90 seconds, a plane with food, coal, medicine. 2 million surviving on what comes through the sky.", t:"Columbiadamm entrance. Open until dusk (summer = very late).", c:["romantic_water","history_big","high_spots"], r:"y" },
  { id:20, n:"Comenius Garden", a:"Neukölln", v:["hidden","quiet"], d:25, s:"A philosophical garden behind a wall", st:"Behind an unmarked wall — a garden designed around 17th-century philosopher Comenius. Paths = stages of life. Plants chosen for symbolic meaning.", im:"Comenius believed every person deserved education and beauty. A free thinking space hidden in Berlin's poorest neighborhood.", t:"Richardstraße 35. Small gate. Daylight hours.", c:["parks"], r:"g" },
  { id:21, n:"Neukölln Arcaden car park rooftop", a:"Neukölln", v:["weird","secret"], d:15, s:"Parking garage with 360° views", st:"Top floor of the parking structure. 360° view of south Berlin. Nobody else up here. Completely public.", im:"All the shoppers below, unaware the best view in Neukölln is above their heads.", t:"Karl-Marx-Straße. Elevator to top. Free.", c:["high_spots"], r:"g" },

  // ══════ FRIEDRICHSHAIN ══════
  { id:22, n:"RAW Gelände side paths", a:"Friedrichshain", v:["local","weird"], d:40, s:"Crumbling railway buildings turned art jungle", st:"1860s railway repair halls. Decades of street art, abandoned infrastructure, studios in shipping containers.", im:"1870 — Prussian railway expansion. Massive halls of steam engines. Now artists where machines were.", t:"Walk past main entrance, explore the edges.", c:["abandoned"], r:"r" },
  { id:23, n:"Oberbaumbrücke at sunrise", a:"Friedrichshain", v:["beautiful","quiet"], d:20, s:"Berlin's most beautiful bridge, empty at dawn", st:"At 5am in summer, you own it. Double-decker brick Gothic, Spree below, skyline turning gold. Cold War checkpoint.", im:"1986. Bridge closed — wall across the middle. Now people jog across with coffee.", t:"Before 6am. Stand in middle. Look both ways.", c:["romantic_water","history_big"], r:"g" },
  { id:24, n:"Volkspark Friedrichshain fairy tale fountain", a:"Friedrichshain", v:["beautiful","hidden"], d:30, s:"A fountain with 106 Brothers Grimm stone figures", st:"In Berlin's oldest park (1846), an enormous neo-Baroque fountain with 106 fairy tale figures. Hansel and Gretel, Sleeping Beauty, Snow White — all in stone.", im:"The sculptor spending years on each character, knowing children would climb them for centuries.", t:"Enter from Friedenstraße. Southwest section.", c:["parks"], r:"g" },
  { id:25, n:"Spreepark from the river path", a:"Friedrichshain", v:["secret","weird"], d:40, s:"A rusting Ferris wheel in the forest", st:"East Germany's only amusement park — closed 2001 after the owner fled to Peru (with drugs in the rides). Decaying dinosaurs visible from the fence.", im:"1989. Last summer before the Wall. East Berlin families on the Ferris wheel, not knowing everything was about to change.", t:"Walk through Plänterwald along the Spree. The park is visible from the public path and through the fence. Do not enter — the site is under restoration.", c:["abandoned"], r:"r" },
  { id:26, n:"Rummelsburg Bay houseboats", a:"Friedrichshain", v:["weird","quiet"], d:30, s:"A floating village on the Spree", st:"Wide Spree bay — houseboats, floating gardens, improvised docks. The old Rummelsburg prison looms on the south bank.", im:"DDR prisoners seeing water through windows but never touching it. Now free people live on it in floating homes.", t:"North bank from Ostkreuz. Quiet mornings.", c:["romantic_water","abandoned"], r:"r" },
  { id:27, n:"Monte Klamott (Friedrichshain rubble hills)", a:"Friedrichshain", v:["hidden","history"], d:25, s:"WWII rubble hills hiding bunkers inside", st:"The two hills in Volkspark Friedrichshain are artificial — WWII rubble piled over two massive flak towers. The bunkers are sealed inside. Climb either for hidden viewpoints over east Berlin.", im:"1945 — colossal anti-aircraft towers. After the war, impossible to demolish. So they piled the rubble of the city on top and planted trees.", t:"Volkspark Friedrichshain. Climb the larger hill (Großer Bunkerberg) from the east side. The view from the top is surprising.", c:["high_spots","history_big"], r:"y" },

  // ══════ PRENZLAUER BERG ══════
  { id:28, n:"Mauerpark Sunday karaoke", a:"Prenzlauer Berg", v:["local","vast"], d:90, s:"Where the Wall was, now people sing", st:"The death strip is now where hundreds watch strangers sing karaoke. Anyone can sing.", im:"1985. Guard towers. Dogs. Shoot orders. Now ABBA and 500 people clapping.", t:"Sunday from 3pm. Get there early.", c:["history_big"], r:"g" },
  { id:29, n:"Wasserturm Prenzlauer Berg", a:"Prenzlauer Berg", v:["hidden","history"], d:25, s:"Oldest water tower with a dark past", st:"Beautiful 1877 brick water tower. During the Nazi era, the basement was an SA torture site. Memorial marks the spot. Beauty and horror in one building.", im:"1933. People disappearing at night, taken to the basement. Neighbors hearing screams. Water above, cruelty below.", t:"Knaackstraße. Free park around it.", c:["scary","famous_dead"], r:"g" },
  { id:30, n:"Kollwitzplatz & Käthe Kollwitz's home", a:"Prenzlauer Berg", v:["beautiful","history"], d:25, s:"Where Germany's greatest artist of suffering lived", st:"Käthe Kollwitz lived at Weißenburger Straße 25 (now Kollwitzstraße) from 1891 to 1943. She drew and sculpted the poverty, hunger, and grief she saw from her window. The square named after her has a sculpture of her face.", im:"Kollwitz at her window, watching mothers carrying dead children during WWI food shortages. Then drawing exactly what she saw. Making the invisible suffering visible.", t:"Kollwitzplatz. Her former address is marked. The Saturday farmer's market on the square is free to wander.", c:["famous_dead"], r:"g" },
  { id:31, n:"Bowie's Berlin (Hauptstraße 155)", a:"Schöneberg", v:["history","local"], d:15, s:"Where David Bowie lived and made Heroes", st:"David Bowie lived in a flat at Hauptstraße 155 in Schöneberg from 1976-1978. He recorded Heroes, Low, and Lodger here. The Wall ran just behind Hansa Studios where he recorded — he could see the guards from the studio window.", im:"Bowie at the window of Hansa Studios, watching East German guards on the Wall, and writing 'Heroes' — a song about lovers kissing by the Wall. Standing by the Wall.", t:"Hauptstraße 155 (plaque on building). Then walk to Hansa Studios, Köthener Straße 38 near Potsdamer Platz. The wall was visible from the studio.", c:["famous_dead","history_big"], r:"g" },

  // ══════ WEDDING & GESUNDBRUNNEN ══════
  { id:32, n:"Silent Green Kulturquartier", a:"Wedding", v:["hidden","quiet"], d:40, s:"A crematorium turned culture space", st:"Domed crematorium, now art/film/concerts. Below: the 'Betonhalle' — former furnace room.", im:"Families saying goodbye. Chimney smoke across Wedding. Now electronic music in the furnace room.", t:"Free events often. Plantagenstraße 31.", c:["abandoned"], r:"g" },
  { id:33, n:"Plötzensee Memorial", a:"Wedding", v:["quiet","history"], d:30, s:"Where the resistance was executed", st:"Bare room. Steel beam. Hooks on ceiling. 3,000 executed here — including the July 20 plotters who tried to kill Hitler.", im:"1944. You tried to stop a dictator. You failed. This is the room. The hooks are still there.", t:"Free, daily. Hüttigpfad.", c:["scary","history_big","famous_dead"], r:"g" },
  { id:34, n:"Humboldthain Flak Tower ruins", a:"Gesundbrunnen", v:["secret","history"], d:35, s:"A WWII bunker buried under a hill", st:"Hill isn't natural — rubble on a massive anti-aircraft tower. Parts poke through. Concrete ruins exposed on north side.", im:"1945. Colossal fortress with guns firing at bombers. They couldn't demolish it, so they buried it.", t:"Viewing platform on top, free. Best at sunset.", c:["high_spots","abandoned","history_big"], r:"y" },
  { id:35, n:"Panke river walk", a:"Wedding", v:["nature","quiet"], d:60, s:"A secret river through Wedding", st:"Most don't know the Panke runs through Wedding. Tree-lined paths, old mills, community gardens, near-wild stretches.", im:"Before Berlin, this river powered mills. The Panke was here first.", t:"Start at Badstraße, walk north. Gets wilder.", c:["romantic_water","parks"], r:"g" },
  { id:36, n:"Schillerpark UNESCO housing", a:"Wedding", v:["hidden","beautiful"], d:25, s:"Bauhaus housing for workers — UNESCO-listed", st:"Bruno Taut, 1920s. For working-class families. Colors, geometry, the radical idea that poor people deserved beauty.", im:"1928. Workers moving in — light, color, gardens. After slums, this felt like the future.", t:"Bristolstraße area. Free to walk through.", c:["courtyards"], r:"g" },

  // ══════ CHARLOTTENBURG & WEST ══════
  { id:37, n:"Lietzensee Park", a:"Charlottenburg", v:["beautiful","quiet"], d:25, s:"A hidden lake with weeping willows", st:"Hidden lake surrounded by grand buildings. Willows, a waterfall, ducks, empty benches. Rose garden on the west side.", im:"1900s Charlottenburg — fur coats and top hats strolling here. Same trees, same water.", t:"Enter from Wundtstraße. 15 min around the lake.", c:["romantic_water","parks"], r:"g" },
  { id:38, n:"Teufelsberg", a:"Grunewald", v:["secret","history"], d:90, s:"Spy station on a rubble mountain", st:"West Berlin's highest point — 75 million cubic meters of rubble burying a Nazi college. American listening station on top. Domes covered in street art.", im:"1960s. American soldiers with headphones. A buried Nazi building below. The Wall beyond the forest.", t:"Hill is open — walk up free. View is incredible.", c:["high_spots","abandoned","history_big"], r:"y" },
  { id:39, n:"Olympiastadion grounds", a:"Westend", v:["history","vast"], d:45, s:"Nazi architecture you can walk free", st:"Can't enter free, but Maifeld parade ground, Waldbühne area, bell tower ruins are open. Scale designed to make you feel small.", im:"1936. Jesse Owels destroying the Aryan myth while Hitler watches.", t:"Walk exterior and Maifeld. Free.", c:["history_big","scary"], r:"g" },
  { id:40, n:"Glienicker Brücke (Bridge of Spies)", a:"Wannsee", v:["history","beautiful"], d:25, s:"Where Cold War spies were exchanged", st:"This bridge between Berlin and Potsdam was where the US and USSR exchanged captured spies. Gary Powers was swapped here. The bridge connects two worlds — West and East, then and now. The Spielberg film was named after it.", im:"A foggy morning, 1962. Two men walk from opposite ends of a bridge. In the middle, they pass each other without a word. One goes east, one goes west. The cars on both sides drive away.", t:"Bus 316 from Wannsee S-Bahn. Walk across the bridge — halfway is where the border was. Free. The Havel views are gorgeous.", c:["history_big","romantic_water"], r:"g" },

  // ══════ SCHÖNEBERG & TEMPELHOF ══════
  { id:41, n:"Natur-Park Südgelände", a:"Schöneberg", v:["nature","weird"], d:60, s:"Railway yard swallowed by forest", st:"Freight yard abandoned after war, untouched 50 years. Trees through tracks. Elevated steel paths. Rusting locomotives.", im:"1930s trains. Then silence for decades. Seeds, roots, forest took it back.", t:"1-2€. S-Bahn Priesterweg.", c:["abandoned","parks","nature"], r:"r" },
  { id:42, n:"Schwerbelastungskörper", a:"Tempelhof", v:["history","weird"], d:20, s:"Concrete cylinder testing Hitler's megacity", st:"12,000-ton cylinder (1941) to test if Berlin could hold a triumphal arch for 'Germania.' Sank too much. Never built. Still sinking.", im:"An arch for the Arc de Triomphe to fit inside. A dome with its own weather. This cylinder is all that was built.", t:"Free. General-Pape-Straße. Among apartments.", c:["history_big","weird"], r:"g" },
  { id:43, n:"Schöneberg Rathaus", a:"Schöneberg", v:["history","free"], d:20, s:"Where JFK said 'Ich bin ein Berliner'", st:"June 26, 1963. Kennedy on this balcony. One of the most famous Cold War speeches. Free exhibition.", im:"400,000 West Berliners terrified of abandonment. Kennedy says four words in German. The crowd erupts.", t:"John-F.-Kennedy-Platz. Free.", c:["history_big","famous_dead"], r:"g" },
  { id:44, n:"Insulaner hill observatory", a:"Schöneberg", v:["quiet","nature"], d:35, s:"Rubble mountain with observatory on top", st:"WWII rubble = 78m hill. Observatory on top. Quiet climb, south Berlin views.", im:"The Trümmerfrauen passing rubble bucket by bucket. Every stone was once a wall, a staircase, a home.", t:"Free to walk up via paved paths. Observatory sometimes has free public nights.", c:["high_spots"], r:"y" },
  { id:45, n:"Christopher Isherwood's flat", a:"Schöneberg", v:["history","local"], d:10, s:"Where 'Cabaret' was born", st:"Nollendorfstraße 17 — Christopher Isherwood lived here in the early 1930s and wrote the Berlin Stories that became the musical Cabaret. A plaque marks the building. The area around Nollendorfplatz was (and is) Berlin's queer heart.", im:"Isherwood at his window watching the Weimar Republic collapse. Drag bars closing. Brown shirts marching. 'I am a camera with its shutter open,' he wrote.", t:"Nollendorfstraße 17. Plaque on the building. Walk around Nollendorfplatz — still the heart of queer Berlin.", c:["famous_dead"], r:"g" },

  // ══════ LICHTENBERG ══════
  { id:46, n:"Dong Xuan Center", a:"Lichtenberg", v:["hidden","weird"], d:60, s:"Vietnamese market city in warehouses", st:"Former DDR Vietnamese workers created their own economy. Hundreds of stalls. Best, cheapest Vietnamese food in Europe.", im:"Vietnamese contract worker, 1980s. Wall falls, contract void. You build a world inside warehouses.", t:"Tram to Herzbergstraße. Food hall in back. Thu-Sat.", c:[], r:"g" },
  { id:47, n:"Stasi Museum / HQ", a:"Lichtenberg", v:["history","weird"], d:60, s:"East German secret police headquarters", st:"Exactly as it was when the Wall fell. Mielke's preserved office. 90,000 employees. 189,000 informants. One in every 63 East Germans.", im:"Working here. Monitoring neighbors, friends, family. The desk where surveillance on millions was ordered.", t:"Ruschestraße 103. Some exhibitions free.", c:["scary","history_big"], r:"g" },
  { id:48, n:"Stasi Prison Hohenschönhausen", a:"Lichtenberg", v:["history","quiet"], d:90, s:"Where political prisoners were held and tortured", st:"The main Stasi remand prison, hidden in a residential area. Prisoners were brought here in windowless vans so they never knew where they were. The cells, interrogation rooms, and isolation chambers are preserved exactly as they were. Tours are led by former prisoners.", im:"You're arrested at night. Driven for hours in a van with no windows. You have no idea where you are. The door opens onto a corridor of cells. You won't leave for months. Nobody knows you're here.", t:"Genslerstraße 66. Guided tours (small fee) — try to get one led by a former inmate. Their stories are devastating. Book online.", c:["scary","history_big"], r:"g" },

  // ══════ PANKOW ══════
  { id:49, n:"Botanischer Volkspark Pankow", a:"Pankow", v:["quiet","nature"], d:50, s:"A forgotten botanical garden", st:"Free and empty. Old greenhouses, wildflower meadows, geological garden, crumbling DDR infrastructure reclaimed by plants.", im:"DDR botanists tending plants from the socialist world. Trees planted under a different country.", t:"Blankenfelder Chaussee. Free.", c:["parks","nature"], r:"g" },
  { id:50, n:"Schloss Schönhausen gardens", a:"Pankow", v:["beautiful","history"], d:35, s:"Royal palace garden in Pankow", st:"Baroque palace — Prussian queen's summer home, then DDR president's residence. Free gardens: French parterre, old trees, canal.", im:"Queen Elisabeth Christine in 1750. Then DDR president Pieck 200 years later. Same garden, opposite worlds.", t:"Tschaikowskistraße. Free garden.", c:["parks","romantic_water"], r:"g" },

  // ══════ KÖPENICK & EAST ══════
  { id:51, n:"Müggelsee & Müggelberge", a:"Köpenick", v:["nature","vast"], d:180, s:"Berlin's biggest lake and actual hills", st:"Huge lake with hills, trails, ancient woodland. Free beaches. Feels nothing like a city.", im:"Slavic people fished here thousands of years before Berlin. The Spree flows from this lake.", t:"🚇 S3 to Friedrichshagen (45 min from Alexanderplatz), then tram 60 or 15-min walk through the old town to the shore. Free beaches, forest trails.", c:["swimming","nature","romantic_water","lakes"], r:"g" },
  { id:52, n:"Köpenick Old Town island", a:"Köpenick", v:["beautiful","quiet"], d:50, s:"A medieval island town inside Berlin", st:"Island where Spree meets Dahme. Cobblestones, palace, fishermen's cottages. Famous for the cobbler who impersonated a captain and robbed the town in 1906.", im:"Wilhelm Voigt in a thrift-shop captain's uniform commanding real soldiers. They arrest the mayor and steal the cash.", t:"S3 Köpenick. Schloss garden free.", c:["history_big","romantic_water"], r:"g" },
  { id:53, n:"Schöneweide industrial ruins", a:"Schöneweide", v:["secret","weird"], d:40, s:"Crumbling factories on the Spree", st:"Oberschöneweide — AEG, cable works, massive factories. Many crumbling, some now art. Scale is staggering.", im:"1910. Tens of thousands. Coal smoke. Cables made here powered Europe.", t:"Wilhelminenhofstraße from S-Bahn.", c:["abandoned"], r:"r" },

  // ══════ SPANDAU & FAR WEST ══════
  { id:54, n:"Fort Hahneberg", a:"Spandau", v:["secret","history"], d:60, s:"1880s fortress at Berlin's edge", st:"Far western edge. 1880s Prussian fortress, in the Wall's death strip for decades. Tunnels, ramparts, bat colony.", im:"Prussian soldiers against France. Then border guards keeping their own people in.", t:"Free tours some days. Walking the perimeter is atmospheric.", c:["abandoned","history_big"], r:"y" },
  { id:55, n:"Spandau Old Town", a:"Spandau", v:["hidden","beautiful"], d:45, s:"Medieval town older than Berlin", st:"Existed before Berlin. Cobblestones, half-timbered houses, 14th-century church. The Zitadelle nearby.", im:"1200. Berlin is a fishing village. Spandau has markets and walls.", t:"Walk from Spandau S-Bahn.", c:["history_big"], r:"g" },
  { id:56, n:"Pfaueninsel", a:"Wannsee", v:["beautiful","nature"], d:90, s:"Fairy-tale island with peacocks", st:"Tiny Havel island. Fake ruined castle (1794), free-roaming peacocks, ancient oaks. UNESCO.", im:"Prussian kings escaping by boat. A castle built to look already ruined — the Romantics loved decay.", t:"S-Bahn Wannsee, bus 218 to ferry.", c:["romantic_water","nature","parks"], r:"g" },

  // ══════ TIERGARTEN & MOABIT ══════
  { id:57, n:"Soviet War Memorial Tiergarten", a:"Tiergarten", v:["history","beautiful"], d:25, s:"Built from Hitler's chancellery marble", st:"Two Soviet tanks, memorial. Built months after war from Hitler's Reich Chancellery marble. Soldiers buried here, in the British sector.", im:"Soviet soldiers building a monument from the building where Hitler planned their destruction.", t:"Free, 24h. Walk from Brandenburg Gate.", c:["history_big"], r:"g" },
  { id:58, n:"Tiergarten deep interior", a:"Tiergarten", v:["nature","quiet"], d:60, s:"The wild parts nobody reaches", st:"Past the main paths: wild meadows, hidden benches, ponds with herons, silence.", im:"Before a park, this was a royal hunting ground — Tiergarten means 'animal garden.' Boar and deer.", t:"Enter from a side path. Neuer See and Lichtensteinbrücke areas.", c:["parks","nature","romantic_water"], r:"g" },
  { id:59, n:"Siegessäule (Victory Column)", a:"Tiergarten", v:["history","beautiful"], d:30, s:"Climb 285 steps for a 360° view from the golden angel", st:"Berlin's golden angel — the Victory Column. 67 meters tall, 285 steps to the viewing platform. Panoramic view over Tiergarten, the Reichstag, the skyline. Originally on Potsdamer Platz, moved here by the Nazis to fit their megacity plans.", im:"This column celebrated Prussian military victories. The Nazis moved it. The Allies wanted to demolish it. The French wanted to blow it up. It survived everything. Now it's a symbol of Berlin's queer community.", t:"Großer Stern. Small entrance fee. The 285 steps are a spiral — dizzying but worth it. Best on clear days.", c:["high_spots","history_big"], r:"y" },
  { id:60, n:"Arminiusmarkthalle", a:"Moabit", v:["local","hidden"], d:30, s:"1891 market hall locals actually use", st:"Same era as Markthalle Neun, same iron beauty, without hipster prices.", im:"1890s Berlin had dozens of these iron food cathedrals. Most destroyed. This survived.", t:"Arminiusstraße 2-4. Free to walk.", c:[], r:"g" },

  // ══════ TREPTOW ══════
  { id:61, n:"Soviet War Memorial Treptower Park", a:"Treptow", v:["history","vast"], d:40, s:"The most overwhelming war memorial in Europe", st:"12-meter soldier, child, crushed swastika. 7,000 buried below. Stone sarcophagi. Nothing prepares you for the scale.", im:"Battle of Berlin: 80,000 Soviet soldiers in two weeks. Built on their graves from city ruins.", t:"Free, always open. Walk the full approach.", c:["history_big","scary"], r:"g" },
  { id:62, n:"Insel der Jugend", a:"Treptow", v:["beautiful","quiet"], d:30, s:"Tiny island via footbridge", st:"Small Spree island via arched bridge. Peace, water, a path around it. Sometimes cinema.", im:"DDR teenagers — Island of Youth — together, away from adults and the state.", t:"From S Treptower Park along the river.", c:["romantic_water","parks"], r:"g" },
  { id:63, n:"Archenhold Observatory", a:"Treptow", v:["weird","history"], d:30, s:"World's longest telescope — Einstein lectured here", st:"Built 1896. 21-meter telescope. Einstein on general relativity here, 1915.", im:"Einstein explaining curved spacetime. Nobody understood. The telescope pointed at a universe that just got stranger.", t:"Alt-Treptow 1. Free exterior. Check observation nights.", c:["history_big","famous_dead"], r:"g" },

  // ══════ REINICKENDORF ══════
  { id:64, n:"Tegeler Forst", a:"Reinickendorf", v:["nature","vast"], d:120, s:"Genuine forest at Berlin's edge", st:"One of the largest forests. Old beech, wild boar, sandy paths. Tegeler Fließ wetlands on the edge.", im:"Before Berlin — all forest. Slavic hunters, wolves, bears.", t:"U6 Alt-Tegel, walk north.", c:["nature"], r:"g" },
  { id:65, n:"Tegel Greenwich-Promenade", a:"Reinickendorf", v:["beautiful","quiet"], d:35, s:"Lakeside promenade — resort vibes", st:"Tegeler See, one of Berlin's cleanest lakes. Promenade with benches, trees, water views.", im:"1920s Berliners escaping by steamer. Same view, same water.", t:"🚇 U6 to Alt-Tegel, walk 10 min to the Greenwich-Promenade. Dicke Marie — 900-year-old tree — nearby.", c:["romantic_water","swimming","lakes"], r:"g" },

  // ══════ DAHLEM & STEGLITZ ══════
  { id:66, n:"Domäne Dahlem", a:"Dahlem", v:["weird","nature"], d:40, s:"Working farm in the middle of Berlin", st:"Real farm — cows, pigs, chickens — in an expensive neighborhood. 800-year-old buildings.", im:"This farm since the 1200s. Kings, wars, walls, reunification — cows kept being milked.", t:"U3 Dahlem-Dorf. Outdoor fields free.", c:["nature"], r:"g" },
  { id:67, n:"Bierpinsel tower", a:"Steglitz", v:["weird","hidden"], d:10, s:"Brutalist tower shaped like a tree", st:"1972 concrete tower. Tree-mushroom-brush. Empty years, graffiti covered. Magnificent and useless.", im:"Architect in 1970: 'Restaurants in the canopy!' Berlin said yes. Then it closed.", t:"Schloßstraße. Can't enter. Exterior is the point.", c:["abandoned","weird"], r:"r" },

  // ══════ MARZAHN ══════
  { id:68, n:"Gärten der Welt", a:"Marzahn", v:["beautiful","vast"], d:90, s:"World gardens in a Plattenbau district", st:"Chinese, Japanese, Korean, Balinese gardens among socialist housing blocks. Surreal contrast.", im:"City planner sees grey towers: 'What this needs is a Korean temple garden.' They were right.", t:"U5 Kienberg. Hill next to it is free.", c:["parks","nature"], r:"g" },
  { id:69, n:"Marzahn from Kienberg", a:"Marzahn", v:["weird","vast"], d:30, s:"Europe's largest prefab estate", st:"Most concentrated socialist housing in Europe. Sheer scale from the Skywalk.", im:"1980. New apartment. Hot water — luxury. Your view: identical buildings to the horizon.", t:"Walk up Kienberg (free, accessible path) for the view.", c:["high_spots"], r:"g" },

  // ══════ SWIMMING SPOTS ══════
  { id:70, n:"Schlachtensee", a:"Zehlendorf", v:["nature","beautiful"], d:120, s:"Crystal-clear forest lake with sandy beaches", st:"Berlin's most beloved swimming lake. Clean glacial water, sandy shores, thick forest pressing in from all sides. On hot days the whole of southwest Berlin comes here, but there's always space if you walk further around.", im:"Carved by glaciers 10,000 years ago. The same water, the same sand. Your body touching the same cold that the first humans here felt.", t:"🚇 S1 to Schlachtensee (30 min from Friedrichstraße). Walk 2 min to the water. The further south you walk, the emptier it gets. Free.", c:["swimming","nature","romantic_water","lakes"], r:"g" },
  { id:71, n:"Krumme Lanke", a:"Zehlendorf", v:["nature","quiet"], d:90, s:"Quieter, deeper, surrounded by forest", st:"Next lake south from Schlachtensee but wilder and quieter. Deeper water, more forest. A path connects them through the trees.", im:"These lakes are a chain left by melting ice. Walk south from Krumme Lanke and you reach wilder and wilder water.", t:"🚇 U3 to Krumme Lanke (end of line, 35 min from Wittenbergplatz). Walk south toward the water. Free. Bring towel.", c:["swimming","nature","lakes"], r:"y" },
  { id:72, n:"Plötzensee Strandbad", a:"Wedding", v:["local","nature"], d:90, s:"A beach in the middle of Wedding", st:"Sandy beach on a lake in Wedding. One of the few free-access lakeshores in central Berlin. The memorial is nearby but the mood is completely different — families, kids, barbecues.", im:"The lake doesn't know about the memorial down the road. Water is just water. Sun is just sun. People swim where they can.", t:"🚇 U9 to Amrumer Straße or bus 106 to Nordufer. Walk 5 min. Free access to parts of the lakeshore. Paid Strandbad area is a few euros.", c:["swimming","lakes"], r:"g" },
  { id:73, n:"Weißer See", a:"Pankow", v:["local","beautiful"], d:60, s:"A lake with a free beach, boats, and a fairy-tale feel", st:"A small lake in Weißensee with a free bathing beach, rowboat rental, and parkland all around it. Art Nouveau buildings peek through the trees. On summer evenings, it feels like a village lake, not a city.", im:"In the 1920s this was a resort — Berliners took the tram here for weekend swimming. The same beach, the same water, the same summer happiness.", t:"🚇 Tram M4 or M13 to Berliner Allee / Indira-Gandhi-Straße (25 min from Alexanderplatz). Free beach on the west side. Path around the lake is a 20-min walk.", c:["swimming","romantic_water","parks","lakes"], r:"g" },
  { id:74, n:"Obersee & Orankesee", a:"Lichtenberg", v:["quiet","beautiful"], d:45, s:"Twin lakes with a hidden villa garden between them", st:"Two small lakes connected by a path through the gardens of abandoned villas. Almost nobody from outside the neighborhood comes here. The water is fringed with willows and reeds. One of the most romantic spots in all of Berlin.", im:"In the 1920s, wealthy families built lakeside villas here. The DDR turned them into community spaces. Now they're half-abandoned, half-reclaimed, and the gardens between the lakes are magical.", t:"🚇 Tram M5 to Obersee (20 min from Alexanderplatz). Walk between the two lakes. Villa gardens are accessible. Quiet even on weekends.", c:["swimming","romantic_water","abandoned","lakes"], r:"y" },

  // ══════ FAMOUS PEOPLE LIVED/DIED ══════
  { id:75, n:"Bertolt Brecht's house", a:"Mitte", v:["history","quiet"], d:20, s:"Where the playwright lived and wrote", st:"Brecht lived at Chausseestraße 125, right next to the cemetery where he's now buried. You can see his apartment from the street — the windows where he sat writing Mother Courage and The Threepenny Opera in his later years.", im:"Brecht at his desk, looking out at the cemetery next door where he knew he'd end up. Writing plays about war and poverty while the DDR built socialism outside his window.", t:"Chausseestraße 125. Small museum (few euros). The cemetery next door (free) has his grave.", c:["famous_dead"], r:"g" },
  { id:76, n:"Einstein's Berlin addresses", a:"Schöneberg", v:["history","hidden"], d:20, s:"Where Einstein developed general relativity", st:"Einstein lived in Berlin from 1914 to 1933 at several addresses. His apartment at Haberlandstraße 5 in Bayerisches Viertel is where he was living when the Nazis came to power. There's a memorial. The whole Bayerisches Viertel has memorial signs on lampposts listing the anti-Jewish laws.", im:"The greatest physicist alive, sitting in this apartment in 1933, reading in the newspaper that the new government has banned Jews from universities. Packing a suitcase. Never coming back.", t:"Haberlandstraße 5. Memorial sign. Walk the Bayerisches Viertel — the lamppost memorials listing anti-Jewish laws are devastating and unique.", c:["famous_dead","scary"], r:"g" },
  { id:77, n:"Marlene Dietrich's birthplace", a:"Schöneberg", v:["history","local"], d:10, s:"Where the world's most glamorous Berliner was born", st:"Marlene Dietrich was born at Leberstraße 65 in 1901 (building destroyed in the war, but the street is there). She grew up on Sedanstraße (now Leberstraße). A plaque marks approximately where. She left Germany in the 1930s and never really came back.", im:"A baby born on this street in 1901. She'll become the most famous woman in the world. She'll refuse to work for the Nazis. She'll entertain Allied troops. She'll never forgive Germany and Germany will never forgive her.", t:"Leberstraße (near Schöneberg Rathaus). Memorial plaque. Not much to see, but the story is powerful.", c:["famous_dead"], r:"g" },
  { id:78, n:"House of the Wannsee Conference", a:"Wannsee", v:["history","quiet"], d:60, s:"Where the Holocaust was organized over breakfast", st:"On January 20, 1942, fifteen senior Nazi officials met in this beautiful lakeside villa over coffee and cognac to plan the systematic murder of Europe's Jews. The meeting lasted 90 minutes. The minutes were discovered after the war. The villa is now a museum and memorial. Free.", im:"Fifteen men in suits sitting around a table in a lovely house by a lake, calmly discussing how to kill 11 million people. The minutes record that they broke for breakfast.", t:"Am Großen Wannsee 56-58. Free. Open daily. Bus 114 from Wannsee S-Bahn. Take your time. Read the documents.", c:["scary","history_big","famous_dead"], r:"g" },

  // ══════ BEAUTIFUL STAIRCASES ══════
  { id:79, n:"Altes Stadthaus spiral staircase", a:"Mitte", v:["beautiful","hidden"], d:15, s:"A perfect spiral staircase in a city government building", st:"The Altes Stadthaus on Molkenmarkt has one of Berlin's most beautiful staircases — a spiral of white stone and iron railings rising through the tower. It's a government building so it's free to enter during office hours, but almost nobody knows the staircase is there.", im:"Imagine the architect drawing this spiral in 1911 — knowing that generations of Berliners would climb it without looking up. Look up.", t:"Molkenmarkt 1. Enter during weekday office hours. Ask at the desk if you can see the staircase. They usually say yes.", c:["staircases"], r:"g" },
  { id:80, n:"Berliner Dom interior staircase", a:"Mitte", v:["beautiful","history"], d:20, s:"270 steps up to the cathedral dome — dizzying spiral", st:"The Berlin Cathedral has a staircase of 270 steps spiraling up to the dome walkway with panoramic views. The staircase itself is the attraction — narrow, dizzying, with the dome's interior painting getting closer and closer above you.", im:"Imagine climbing this in 1905 when the cathedral was new. The same spiral, the same vertigo, the same moment when you step onto the dome walkway and Berlin opens up below.", t:"Small entrance fee. The staircase narrows near the top. Not for the claustrophobic. The view from the dome walkway is one of the best in Berlin.", c:["staircases","high_spots"], r:"y" },
  { id:81, n:"Prenzlauer Berg Altbau staircases", a:"Prenzlauer Berg", v:["beautiful","hidden"], d:30, s:"Push open doors and find Art Nouveau staircases", st:"Many of the 1890-1910 apartment buildings in Prenzlauer Berg have stunning staircases — ornate iron railings, tiled floors, stained glass windows, carved banisters. Push open an unlocked front door and look up.", im:"A young couple in 1905, moving into their first apartment, carrying furniture up these same stairs. The tiles under their feet are the same tiles under yours.", t:"Rykestraße, Wörther Straße, Husemannstraße — the area between Kollwitzplatz and Wasserturm has the best. Push doors open, look up, be respectful.", c:["staircases","courtyards"], r:"g" },

  // ══════ SCARY / DARK ══════
  { id:82, n:"Topography of Terror", a:"Kreuzberg", v:["history","free"], d:60, s:"Where the Gestapo and SS had their headquarters", st:"The Gestapo headquarters, SS command center, and Reich Security Main Office were all here. The buildings were destroyed but the cellars where prisoners were tortured are excavated and visible. A long stretch of the Berlin Wall runs alongside. Free museum.", im:"This was the most feared address in Europe. People brought here for interrogation often never left. The cellars are open to the sky now. Rain falls where screams once echoed.", t:"Niederkirchnerstraße 8. Free. Open daily. Give yourself time — it's extensive. The Berlin Wall fragment here is one of the longest remaining stretches.", c:["scary","history_big"], r:"g" },
  { id:83, n:"Sachsenhausen approach (from Oranienburg)", a:"Various", v:["history","quiet"], d:240, s:"Walk the route prisoners walked to the camp", st:"Sachsenhausen concentration camp is a 35-minute S-Bahn ride from central Berlin. But what most people miss: the walk from Oranienburg station to the camp follows approximately the route prisoners were marched. The camp is free, devastating, and essential.", im:"Walking this road in 1936. A column of prisoners, shaved heads, thin clothes in winter. The town's residents watch from their windows. Nobody stops it.", t:"S1 to Oranienburg. Walk 20 minutes to the camp. Free entry. Audio guide a few euros. Go early, take your time. This is not a quick visit.", c:["scary","history_big"], r:"g" },
  { id:84, n:"Eisfabrik (Ice Factory ruins)", a:"Mitte", v:["weird","secret"], d:15, s:"A crumbling ice factory on the Spree — abandoned since WWII", st:"On the banks of the Spree near Schiffbauerdamm stands a ruined building that was once Berlin's ice factory. It's been abandoned since the war and slowly crumbling. You can't enter, but from the riverbank you can see the hollow shell — one of the last true war ruins in central Berlin.", im:"This factory made ice for Berlin's butchers and restaurants in the 1900s. Then the bombs came. Then everyone forgot about it. Now it just stands there, falling apart in the middle of a city that rebuilt everything else.", t:"Visible from the Spree bank path near Schiffbauerdamm. Best seen from across the river. You can't enter — just look.", c:["abandoned","scary"], r:"r" },

  // ══════ WATER / MORE VIEWPOINTS ══════
  { id:85, n:"Bärenquell Brewery ruins", a:"Schöneweide", v:["secret","weird"], d:30, s:"A massive abandoned brewery on the Spree", st:"A huge 19th-century brewery complex on the Spree, abandoned since 1994. Red brick towers, broken windows, trees growing through the roof. You can see it from the Spree path — one of Berlin's most photogenic ruins.", im:"1880s. This brewery is pumping out beer for all of Berlin. Workers everywhere. Horses pulling barrels. Now the horses are gone, the workers are gone, and birch trees grow where beer was brewed.", t:"Schnellerstraße, visible from Spree path. You can't enter, but the exterior is extraordinary. Walk around the perimeter.", c:["abandoned","romantic_water"], r:"r" },
  { id:86, n:"Drachenberg viewpoint", a:"Grunewald", v:["nature","vast"], d:30, s:"The other rubble hill next to Teufelsberg — better view, fewer people", st:"Right next to Teufelsberg is a smaller rubble hill — Drachenberg — with a completely open summit and one of the best panoramic views in Berlin. No trees blocking the view. No fence. Just sky and city in every direction.", im:"Two rubble mountains side by side in the forest. One got the spy station. This one got nothing — just height, and silence, and the whole city laid out below.", t:"Walk through Grunewald forest toward Teufelsberg but take the right fork to Drachenberg. The summit is completely open. Free. Rarely crowded.", c:["high_spots","nature"], r:"y" },
  { id:87, n:"Treptower Park Spree banks", a:"Treptow", v:["beautiful","quiet"], d:45, s:"Kilometre-long tree-lined Spree banks — the most romantic walk in Berlin", st:"The Spree banks through Treptower Park are lined with massive old trees, wide grassy slopes running down to the water, and benches placed perfectly for watching boats and sunsets. In the evening light, this might be the single most beautiful free walk in Berlin.", im:"Berliners have been walking along this stretch of river since the 1800s. The trees are the same. The river is the same. The feeling of the sun going down over the water — exactly the same.", t:"Walk from S Treptower Park south along the Spree. Keep going past the Soviet memorial. The stretch toward Plänterwald is the quietest and most beautiful.", c:["romantic_water","parks"], r:"g" },

  // ══════ GREAT TRANSIT RIDES ══════
  { id:88, n:"Bus 100 — the free sightseeing bus", a:"Various", v:["free","beautiful"], d:45, s:"A regular city bus that passes every major landmark", st:"Bus 100 runs from Zoologischer Garten to Alexanderplatz and passes the Victory Column, Reichstag, Brandenburg Gate, Unter den Linden, and Museum Island. It's a regular double-decker city bus that happens to hit every major sight. Sit upstairs, front seat.", im:"You're on the top deck of a double-decker bus, watching all of central Berlin roll past your window like a movie. Except this movie cost €3.50 and has real people in it.", t:"Get on at Zoo or Alex. Sit upstairs, front left seat. A regular BVG ticket is all you need. Runs every 5-10 minutes.", c:["rides","instagram"], r:"g" },
  { id:89, n:"S1 ride — along the former Wall, end to end", a:"Various", v:["vast","history"], d:80, s:"A train ride that traces the entire Cold War divide", st:"The S1 runs from Wannsee in the far southwest to Oranienburg in the far north. For much of its length, it runs exactly along where the Berlin Wall stood. You pass through wealthy west, through the center, and out into the east. Every station change is a chapter of Berlin history.", im:"This train line was split for 28 years. West Berlin passengers could only ride part of it. East Berlin passengers the other part. Now the whole line is connected again. Sit on this train and you're riding reunification.", t:"Get on at either end. The ride takes about 80 minutes end to end. Wannsee is near the Bridge of Spies. Oranienburg is near Sachsenhausen. Both ends are worth exploring.", c:["rides","history_big"], r:"g" },
  { id:90, n:"U5 ride — new stations from Hauptbahnhof to Alexanderplatz", a:"Mitte", v:["beautiful","weird"], d:20, s:"Berlin's newest U-Bahn stations are underground cathedrals", st:"The U5 extension opened in 2020 with stations designed as art. Museumsinsel station has 6,600 points of light in the ceiling — a starry sky underground. Unter den Linden station has vast modernist halls. Bundestag station is sleek and enormous. Ride just 4 stops and you're in a design exhibition.", im:"These stations took 20 years to build. Engineers had to tunnel under the Spree, under Museum Island, under history itself. Now you ride through in 8 minutes without thinking.", t:"Get on at Hauptbahnhof or Alexanderplatz. Ride the full U5 if you have time — it goes all the way to Hönow at the eastern city edge. But the new section between Hauptbahnhof and Alex is the showpiece.", c:["rides","staircases","instagram"], r:"g" },
  { id:91, n:"S7 to Ahrensfelde — where Berlin just stops", a:"Various", v:["weird","vast"], d:50, s:"Ride to the eastern terminus where the city meets fields", st:"The S7 takes you from the center of Berlin to Ahrensfelde, where the city abruptly ends and open farmland begins. Step off the train at the last stop and you're standing at Berlin's edge — Plattenbau towers behind you, wheat fields ahead. It's one of the sharpest city-countryside borders you'll ever see.", im:"For 28 years this was the edge of East Berlin. The countryside beyond was another country. Now it's just... the end of the S-Bahn line. You can walk into the fields.", t:"S7 from Friedrichstraße. Ride to the end. Step off. Walk to where the buildings end and the fields begin. Then ride back. The whole trip is a meditation on edges.", c:["rides"], r:"g" },
  { id:92, n:"Heidelberger Platz U-Bahn station", a:"Charlottenburg", v:["beautiful","hidden"], d:10, s:"An underground cathedral with echoing vaults", st:"Heidelberger Platz station on the U3 is twice as deep as most stations. The vaulted ceiling creates a cathedral atmosphere — voices echo, footsteps resonate. It was designed in 1913 and feels like walking into a church. Most Berliners ride through without looking up.", im:"1913. They're building a train station underground and the architect decides it should feel like a cathedral. Not because God is here, but because the daily commute deserves beauty too.", t:"U3 Heidelberger Platz. Stand in the center of the platform and look up. Listen to the echo. Then look at the Art Deco details in the tilework.", c:["rides","staircases"], r:"g" },
  { id:93, n:"M10 tram ride — Kreuzberg to Prenzlauer Berg", a:"Various", v:["local","vast"], d:35, s:"The tram that connects two Berlins", st:"The M10 runs from Warschauer Straße through Friedrichshain, up through Prenzlauer Berg to Wedding. It crosses from the east hipster heartland into the old working-class north. Watch through the window as döner shops become Vietnamese restaurants become African hair salons. Berlin's diversity in one tram ride.", im:"This tram runs through what used to be East Berlin only. All of it was behind the Wall. Now it's the most international stretch of city in Germany.", t:"Get on at Warschauer Straße. Ride north. Sit by the window. Watch the city change.", c:["rides"], r:"g" },

  // ══════ NATURE WALKS BY TRANSIT ══════
  { id:94, n:"Tegeler Fließ wetlands walk", a:"Reinickendorf", v:["nature","quiet"], d:120, s:"Water buffalo, rare birds, and wildflower meadows — 30 min from the center", st:"A 6km walk along the Tegeler Fließ — a stream valley with wetlands, reed beds, and (yes) water buffalo grazing in the meadows. Rare birds nest here. Wildflowers everywhere in spring. It feels like Brandenburg, not Berlin.", im:"Water buffalo in Berlin. Not in a zoo — just standing in a wetland eating grass, 30 minutes from Alexanderplatz. Berlin is weirder than people think.", t:"S-Bahn to Hermsdorf or Alt-Tegel. Walk north to the Fließ. The path follows the stream east through Lübars to Schildow. Completely free.", c:["nature_walks","nature"], r:"g" },
  { id:95, n:"Wuhletal trail", a:"Marzahn", v:["nature","quiet"], d:120, s:"A hidden valley walk from Marzahn to Köpenick", st:"The Wuhle is a small river that carved a green valley through east Berlin. A trail follows it from Marzahn south through surprisingly wild landscape — meadows, ponds, kingfishers — all the way to the Spree near Köpenick. Nobody from west Berlin has ever heard of it.", im:"In the shadow of Marzahn's tower blocks, a river cuts through a valley of wildflowers. The contrast is Berlin in one image.", t:"U5 to Wuhletal station (the station is named after it). Walk south along the river. The trail goes for 12km. Do as much as you want.", c:["nature_walks","nature"], r:"g" },
  { id:96, n:"Panke trail to Karower Teiche", a:"Pankow", v:["nature","local"], d:150, s:"Follow a river from Wedding to wild ponds with birds", st:"Start in urban Wedding and follow the Panke river north for 8km. The city fades away. You end up at Karower Teiche — a nature reserve with ponds, waterfowl, and actual water buffalo. Then hop on the S-Bahn home.", im:"Walking north along the Panke is like time-traveling backwards through Berlin's history. Concrete gives way to gravel, gravel to grass, grass to wild reeds.", t:"Start at S Gesundbrunnen, follow Panke north. End at Karower Teiche (near S Karow). The S-Bahn takes you back in 20 minutes.", c:["nature_walks","nature"], r:"g" },
  { id:97, n:"Grunewald circular walk via Teufelssee", a:"Grunewald", v:["nature","beautiful"], d:120, s:"A forest lake circuit through Berlin's biggest forest", st:"A loop through Grunewald forest past Teufelssee (Devil's Lake) — a dark, still lake surrounded by old-growth beech and oak. The path climbs through forest, past Teufelsberg, and back. Wild boar live here. You'll forget you're in a city of 4 million.", im:"This forest has been here for thousands of years. Kings hunted here. Artists painted it. Soldiers hid in it. Now families hike it on Sundays and the boar still don't care.", t:"S-Bahn Grunewald, walk west into the forest. Follow signs to Teufelssee. The full loop is about 10km. Completely free.", c:["nature_walks","nature","swimming"], r:"y" },

  // ══════ INSTAGRAM / PHOTO SPOTS ══════
  { id:98, n:"James Simon Galerie", a:"Mitte", v:["beautiful","free"], d:15, s:"Museum Island's newest building — geometry, columns, perfect light", st:"David Chipperfield's entrance building for Museum Island (2019) is a photographer's dream. Minimal columns, clean stone, wide staircases that catch the light perfectly. The exterior and staircase are free to walk.", im:"An architect designed a building specifically to make you look good standing in front of it. The columns frame you. The stairs elevate you. The light sculpts you. It's architecture as Instagram filter.", t:"Bodestraße, Museum Island. The exterior stairs and colonnades are free. Best light: late afternoon or blue hour.", c:["instagram","staircases"], r:"g" },
  { id:99, n:"Haus Schwarzenberg street art courtyard", a:"Mitte", v:["weird","local"], d:20, s:"The last raw courtyard in polished Mitte", st:"While the Hackesche Höfe got renovated into boutiques, Haus Schwarzenberg next door stayed wild. The courtyard is covered floor-to-ceiling in street art — changing constantly. Art studios, the Anne Frank memorial, and Monster Kabinett are inside. It's the last piece of 1990s Berlin in Mitte.", im:"Every wall was tagged, painted, pasted over, and painted again. Layers on layers. This courtyard is a time capsule of every style of Berlin street art from the last 30 years.", t:"Rosenthaler Straße 39. Walk through the entrance into the courtyard. Free. Every surface is art. Look up, look down.", c:["instagram","courtyards"], r:"g" },
  { id:100, n:"East Side Gallery", a:"Friedrichshain", v:["history","vast"], d:40, s:"1.3km of painted Wall — the world's longest open-air gallery", st:"The longest remaining stretch of the Berlin Wall, painted by artists from around the world after it fell. 105 paintings on 1.3km of concrete. The most famous: Brezhnev and Honecker kissing, and the Trabant breaking through the Wall.", im:"In 1989 this was a death strip. Within months, artists were painting it. A wall that killed people became a canvas. That transformation is Berlin in one act.", t:"Along Mühlenstraße. Free. Walk the full 1.3km. Go early morning for photos without crowds. The river side is less visited.", c:["instagram","history_big"], r:"g" },
  { id:101, n:"Molecule Man from Elsenbrücke", a:"Treptow", v:["beautiful","weird"], d:10, s:"Three giant aluminum figures in the Spree", st:"Jonathan Borofsky's 30-meter sculpture of three figures meeting in the river — symbolizing the meeting of three former city districts (Kreuzberg, Treptow, Friedrichshain). Best photographed from the Elsenbrücke bridge or the Spree banks at sunset.", im:"Three giants standing in the river where three Berlins used to meet. Full of holes — you can see the sky through them. We're all full of holes too.", t:"View from Elsenbrücke bridge (S Treptower Park). Sunset photos are extraordinary — the figures are silhouetted against the sky.", c:["instagram","romantic_water"], r:"g" },
  { id:102, n:"Teledisko at RAW Gelände", a:"Friedrichshain", v:["weird","local"], d:5, s:"The world's smallest disco — inside a phone booth", st:"A repurposed phone booth at RAW Gelände that's been turned into the world's tiniest nightclub. Put in a coin, pick a song, and for 3 minutes you get fog machine, strobe lights, disco ball, and a dancefloor for one (or two, if you squeeze).", im:"Berlin turned a phone booth into a nightclub. Because why not. Because this city takes abandoned infrastructure and makes it dance.", t:"RAW Gelände, near the entrance area. Look for the old phone booth with lights inside. A few coins per ride. Best at night.", c:["instagram","weird"], r:"r" },
  { id:103, n:"Prinzessinnengarten", a:"Kreuzberg", v:["nature","local"], d:30, s:"A community garden that turned wasteland into paradise", st:"Vacant lot turned community garden. Raised beds from shipping crates, bees, vegetables, herbs, café serving on-site food.", im:"2009. Empty lot, trash. 'What if we planted things?' Now it feeds people and teaches kids where food comes from.", t:"Near Moritzplatz. Free. Café lovely. Check for workshops.", c:["instagram","nature","parks"], r:"g" },

  // ══════ FROM INDIE BLOGS & LOCAL SOURCES ══════
  { id:104, n:"Neu-Venedig (New Venice)", a:"Köpenick", v:["beautiful","hidden"], d:90, s:"Five canals, 13 bridges, water lilies — Berlin's secret Venice", st:"Hidden between Müggelsee and Dämeritzsee: a settlement of holiday homes along five hand-dug canals with 13 bridges. Water lilies, swans, weeping willows, tiny footbridges. Dug in 1926 when they decided to live with the marshland instead of draining it.", im:"1926. Someone looks at a swamp: 'What if we don't drain it? What if we dig canals?' Now it's a Venice that 99% of Berliners have never heard of.", t:"S3 to Wilhelmshagen (AB zone), 15 min walk. Paths are public. Free. Canoe rental ~€10/hr but walking is free.", c:["romantic_water","nature","instagram"], r:"g" },
  { id:105, n:"Holzmarkt 25", a:"Friedrichshain", v:["local","weird"], d:45, s:"A hand-built creative village on the Spree", st:"When Bar 25 was demolished, the community crowdfunded to buy the land back. Holzmarkt 25 is what they built — restaurants, workshops, a club, a kindergarten, a sauna, all on the Spree bank. Ramshackle, idealistic, alive.", im:"Berlin keeps selling riverbanks to developers. These people said no. They crowdfunded, fought city hall, built a village with their hands. Messy, free, theirs.", t:"Holzmarktstraße 25 (near Jannowitzbrücke). Free to walk. Riverbank terrace is beautiful.", c:["romantic_water","instagram"], r:"g" },
  { id:106, n:"Boros Collection bunker", a:"Mitte", v:["history","weird"], d:15, s:"WWII bunker → Soviet prison → fruit warehouse → techno club → fetish dungeon → art gallery", st:"This concrete cube has been a wartime shelter, Soviet POW prison, tropical fruit warehouse, techno club, and fetish dungeon. Now it houses a billionaire's art collection. The exterior alone tells the story — raw concrete in polished Mitte.", im:"Every layer is a Berlin chapter. Air raids. Soviet prisoners. Bananas. Techno. Fetish. Contemporary art. All in one concrete cube.", t:"Reinhardtstraße 20. Exterior always visible. Art visits free but book months ahead. The building itself is the statement.", c:["abandoned","history_big","instagram"], r:"g" },
  { id:107, n:"Siemensbahn ghost railway", a:"Spandau", v:["secret","weird"], d:40, s:"An entire 1929 elevated railway frozen since 1980", st:"A full S-Bahn line built by Siemens in 1929 for factory workers. Closed 1980. Abandoned since — stations, platforms, tracks, all overgrown. Trees grow from platforms. Ghost stations visible from below.", im:"1929 — gleaming electric railway, workers commuting to the future. Now birch trees on platforms, ivy in ticket halls. The future became the past.", t:"Walk Rohrdamm or Nonnendammallee to see elevated structure. Wernerwerk and Siemensstadt stations most visible. See it before it reopens.", c:["abandoned","rides"], r:"r" },
  { id:108, n:"Charlottenburg Palace gardens", a:"Charlottenburg", v:["beautiful","free"], d:60, s:"Baroque and English gardens behind a palace — free", st:"Palace costs money but the enormous gardens are free. Formal French baroque, romantic English landscape, mausoleum, carp pond, Spree at the back.", im:"Prussian queens in silk walking past the same hedges, same Spree. Frederick the Great's mother buried in the mausoleum among the trees.", t:"Spandauer Damm. Gardens always open, free. Walk to the river at the back — most people stop at the formal garden.", c:["parks","romantic_water","instagram"], r:"g" },
  { id:109, n:"The Ringbahn experiment", a:"Various", v:["weird","local"], d:60, s:"Get off at a random ring station and explore for 30 min", st:"Ride S41/S42. Close your eyes. Get off at random. Walk 15 minutes in any direction, then back. Every station is a different Berlin. Sonnenallee ≠ Westend ≠ Wedding ≠ Treptow.", im:"Berlin is 30 cities pretending to be one. The ring connects them. Close your eyes, get off, discover which Berlin you've landed in.", t:"S41 or S42. Eyes closed. Get off. Walk. Repeat at different stations on different days.", c:["rides"], r:"g" },
  { id:110, n:"Bornholmer Straße bridge", a:"Prenzlauer Berg", v:["history","quiet"], d:20, s:"The exact spot where the Berlin Wall first opened", st:"On November 9, 1989, this was the first border crossing to open. The guards were overwhelmed by the crowd and just let people through. Thousands streamed across this bridge — the first steps from East to West in 28 years. A memorial marks the exact spot.", im:"The guard looks at the crowd. He looks at his orders. He looks at the crowd again. Then he shrugs and opens the barrier. The Cold War ends on a bridge in Prenzlauer Berg because one man decided not to follow orders.", t:"S Bornholmer Straße. Walk onto the bridge. The memorial is on the east side. Free. Almost nobody visits. One of the most important spots in 20th-century history.", c:["history_big"], r:"g" },
  // ══════ TUNNELS & BRIDGES ══════
  { id:111, n:"Gleimtunnel", a:"Wedding", v:["history","secret"], d:20, s:"A brick tunnel where the Berlin Wall ran overhead", st:"This 1800s railway underpass became a border crossing during the Wall years — the Wall ran right over the top. Bricked up for 28 years. Now you can walk through and see the memorial on both sides. The brickwork still feels heavy, old, and haunted.", im:"You're walking through in 1985. Except you can't — it's sealed. East on one side, West on the other. People who grew up 50 meters apart haven't seen each other in decades. The tunnel waits.", t:"Gleimstraße at the Mauerpark end. Walk through slowly. Look at the memorial plaques on the Wedding side. Then walk into Mauerpark.", c:["history_big","scary"], r:"g" },
  { id:112, n:"Yorckbrücken", a:"Schöneberg", v:["weird","beautiful"], d:30, s:"30 rusting iron railway bridges — a cathedral of steel", st:"Over Yorckstraße, roughly 30 old railway bridges span the road in a row — some active, most abandoned. Different eras, different styles, rusting at different speeds. Painted in wild colours since 2015. Walking under them feels like passing through an industrial cathedral.", im:"1880s. Every bridge carries a different railway company into Anhalter or Potsdamer Bahnhof. Steam and noise and coal smoke. Now: silence, rust, pigeons, street art.", t:"Yorckstraße between S Yorckstraße and U Yorckstraße. Walk the full length. Look up. Some bridges have been painted bright colours — green, orange, blue.", c:["instagram","history_big"], r:"g" },
  { id:113, n:"Yorck train tracks nature trail", a:"Schöneberg", v:["nature","secret"], d:45, s:"Wild overgrown railway tracks you can walk along", st:"Behind the Yorck bridges, old rail lines stretch south through Schöneberg — tracks still in the ground, overgrown with birch trees and wildflowers. A secret corridor of green running through the city. Some sections are now Flaschenhalspark, some are still wild.", im:"Last train: maybe 1952. Since then, nature reclaimed every centimeter. Rails buried in moss. Signal boxes covered in ivy. A fox path through what used to be an empire's railway.", t:"🚇 Enter from Yorckstraße S-Bahn side or from Monumentenbrücke. Flaschenhalspark is the publicly accessible section with maintained paths. Stay on designated trails.", c:["nature","abandoned","nature_walks"], r:"r" },
  // ══════ STRALAU ══════
  { id:114, n:"Stralau houseboat walk", a:"Friedrichshain", v:["beautiful","quiet"], d:40, s:"A hidden peninsula of houseboats, water, and silence", st:"The Stralau peninsula juts into the Spree and Rummelsburger Bucht — and almost nobody goes there. Walk the waterfront path past houseboats, tiny gardens, old fishing village houses, and views across to Treptow. It feels like you left Berlin.", im:"This was a fishing village before Berlin swallowed it. Fishermen pulling nets from the Spree. Now houseboats bob where their boats once anchored. Same water, same quiet.", t:"S Treptower Park or tram to Stralau. Walk the full loop around the peninsula. End at Schiffskontor on Rummelsburger Bucht for a cheap drink by the water — a local secret bar right on the shore.", c:["romantic_water","nature_walks","instagram"], r:"g" },
  // ══════ FREE ART & QUIET SPACES ══════
  { id:115, n:"Urban Nation Museum", a:"Schöneberg", v:["art","free"], d:45, s:"A whole museum of street art — inside and out", st:"A building covered in massive murals housing curated urban art exhibitions inside. Feels like walking a graffiti world that somebody turned into a gallery. Artists from all over the world. The exterior alone is worth the trip — every wall is a canvas.", im:"Imagine if Banksy designed a museum and then invited every street artist alive to fill it. That's roughly what happened here.", t:"Bülowstraße 7. Free entry. Check the exterior murals on surrounding streets too — the whole block is a gallery.", c:["instagram","art"], r:"g" },
  { id:116, n:"Haus am Lützowplatz", a:"Tiergarten", v:["art","quiet"], d:30, s:"Tiny contemporary art gallery — empty, free, surprising", st:"A small exhibition space with rotating contemporary shows that locals drop into and tourists never find. Quiet rooms, interesting work, the feeling of having a gallery to yourself. Sometimes video art, sometimes installations, always free.", im:"You walk in and there's nobody here. Just you and whatever strange beautiful thing an artist made this month. This is what galleries felt like before Instagram.", t:"Lützowplatz 9. Free. Check what's on — shows rotate every few weeks.", c:["art"], r:"g" },
  { id:117, n:"Schinkel Pavillon", a:"Mitte", v:["art","hidden"], d:25, s:"Contemporary art in a tiny neoclassical jewel box", st:"A small octagonal pavilion from the 1960s (named after Berlin's legendary architect Schinkel) hosting ambitious contemporary art exhibitions. The space is so small that installations feel immersive — you're inside the art, not looking at it.", im:"Schinkel built half of classical Berlin. Now his namesake pavilion holds art that would make him raise an eyebrow. The old city meets whatever comes next.", t:"Oberwallstraße 1, near Schlossplatz. Free or donation. Check current show — some are extraordinary.", c:["art","history_big"], r:"g" },
  // ══════ MODERNIST ARCHITECTURE ══════
  { id:118, n:"Hansaviertel", a:"Tiergarten", v:["weird","beautiful"], d:45, s:"A whole neighbourhood designed by the world's best architects", st:"After the 1957 Interbau exhibition, this neighbourhood was rebuilt by 53 architects from 13 countries — Aalto, Niemeyer, Gropius, all of them. Every building is different. Walk through and you're in an open-air architecture museum. Brutalist towers next to organic curves next to glass boxes.", im:"1957. Berlin says: 'We'll rebuild this neighbourhood as the future.' Niemeyer flies in from Brazil. Aalto from Finland. Each designs one building. The future arrives, one block at a time.", t:"U Hansaplatz. Walk slowly. Every building is by a different famous architect. The Aalto building and Niemeyer apartment block are the stars. Free, always, just walk.", c:["instagram","history_big"], r:"g" },
  // ══════ FUTURISM ══════
  { id:119, n:"Futurium", a:"Mitte", v:["weird","free"], d:60, s:"Free interactive museum about the future — surprisingly good", st:"A genuinely great free museum about technology, cities, nature, and the future. Interactive, smart, not dumbed down. The building itself is striking — angular and reflective on the Spree. The rooftop terrace has views. The lab lets you tinker and build.", im:"What if Berlin in 2060 has vertical farms, robot neighbours, and buildings that breathe? Walk through the scenarios. Some are exciting. Some are terrifying. All are free.", t:"Alexanderufer 2, near Hauptbahnhof. Completely free. Go to the Futurium Lab too — hands-on experiments and workshops.", c:["art"], r:"g" },
  // ══════ MEDIEVAL VILLAGE ══════
  { id:120, n:"Düppel Museum Village", a:"Zehlendorf", v:["weird","nature"], d:90, s:"A reconstructed medieval village at the edge of Berlin", st:"A living-history site where a 13th-century village has been rebuilt on its actual archaeological site. Thatched huts, heritage breed animals, medieval gardens, forge demonstrations. Feels genuinely ancient and strange, especially during seasonal events with fire and folklore.", im:"It's 1250. You live here. Your house is wattle and daub. Your pig is heritage breed. Your herbs are medicine. Berlin doesn't exist yet — just forest and this clearing.", t:"Clauertstraße 11, Zehlendorf. Small entry fee for events, but grounds often accessible. Spring and harvest events are wild — fire, folklore, surreal atmosphere.", c:["nature","history_big"], r:"g" },
  // ══════ NIGHT ENERGY ══════
  { id:121, n:"East Side Gallery at midnight", a:"Friedrichshain", v:["night","history"], d:30, s:"The longest Wall section — completely different after dark", st:"During the day it's tourists and selfie sticks. At midnight it's empty. Just you, the painted Wall, the Spree, and the Oberbaumbrücke glowing at the end. The art looks different in the dark — more urgent, more political, more raw.", im:"November 1989. This concrete just became worthless. Within months, artists from 21 countries paint it. At night, alone, you feel what they felt — the wall is still warm from history.", t:"If you choose to visit in the evening, the atmosphere is completely different from daytime. Walk the full 1.3km. The Oberbaumbrücke end is most atmospheric. Visit with friends.", c:["history_big","scary","instagram"], r:"y" },
  // ══════ LAKES ══════
  { id:122, n:"Flughafensee", a:"Reinickendorf", v:["secret","nature"], d:120, s:"A turquoise lake in a crater next to the old Tegel airport", st:"A flooded gravel pit turned surreal turquoise swimming lake, right next to the Tegel airport runway. The water is unnervingly clear and blue-green. Sandy beach, dunes, and a nature reserve with rare birds on the far shore. One of Berlin's best-kept secrets.", im:"Planes used to land 200 meters away. Now: silence, herons, turquoise water so clear you can see the bottom at 3 meters. The airport closed and the lake got quieter.", t:"🚇 Take U6 to Alt-Tegel, then bus 133 to Bernauer Str. Walk 10 min through the path at Flughafensee entrance. Or cycle from Tegel — 15 min. Free, no lifeguard.", c:["swimming","lakes","nature"], r:"g" },
  { id:123, n:"Liepnitzsee", a:"Wandlitz", v:["beautiful","nature"], d:180, s:"The most beautiful lake near Berlin — an island in the middle", st:"Just outside Berlin in Brandenburg, this glacial lake has water so clear it looks Caribbean. A forested island (Großer Werder) sits in the middle that you can swim to. Almost no development on the shore — just forest meeting water. Many Berliners consider this the best lake within reach.", im:"Glaciers carved this 10,000 years ago and left the island as a gift. GDR party elites used to come here secretly. Now it belongs to everyone with a towel and a train ticket.", t:"🚇 S2 to Bernau, then bus 894 to Wandlitz Bahnhof, then walk 20 min through the forest to the lake. About 50 min total from Friedrichstraße. Bring everything — no shops. Free.", c:["swimming","lakes","nature","romantic_water"], r:"y" },
  { id:124, n:"Großer Wannsee (Strandbad)", a:"Wannsee", v:["vast","beautiful"], d:120, s:"Europe's longest inland beach — 1,275 meters of sand", st:"The famous Wannsee lido has a sand beach longer than most seaside resorts. Art Deco changing cabins from the 1920s. The Havel stretches out like a sea. On hot days 10,000 people come, but the beach is so long you always find space.", im:"1920s Berlin — the golden age of lake culture. Factory workers and aristocrats side by side on the sand. Same beach, same water, same summer democracy.", t:"🚇 S1 or S7 to Wannsee, then bus 114 to Strandbad Wannsee. 40 min from Friedrichstraße. Small entry fee (€5.50) but worth it. Free shore access at other spots along the Havel.", c:["swimming","lakes"], r:"g" },
  { id:125, n:"Groß Glienicker See", a:"Spandau", v:["secret","quiet"], d:150, s:"The lake the Berlin Wall cut in half", st:"During the Wall years, this lake was literally divided — the border ran through the water. West Berliners swam on one side, East Germans were forbidden from their own shore. Now reunited, with a wild, undeveloped east bank that still feels like a secret.", im:"1970. You're swimming. The buoy line is the border. Beyond it: East Germany. Guards with binoculars on the far shore. You swim back. Someone on the other side watches you swim away.", t:"🚇 Take S-Bahn to Spandau, then bus X34 to Groß Glienicke, Ort. Walk 5 min to the lake. The east shore (Sacrower Weg) is the wildest and quietest. About 55 min from Zoo. Free.", c:["swimming","lakes","history_big","romantic_water"], r:"y" },
  { id:126, n:"Tegeler See", a:"Reinickendorf", v:["beautiful","local"], d:90, s:"Berlin's cleanest big lake — resort vibes 25 min from Mitte", st:"One of Berlin's largest and cleanest lakes, with a proper promenade, sailing boats, and a resort atmosphere. The Greenwich-Promenade along the shore has old trees, benches, and views across the water. Nearby: Dicke Marie, a 900-year-old oak tree — the oldest in Berlin.", im:"In the 1920s, steamers brought Berliners here for weekend escapes. Same promenade, same trees, same water glittering. The 900-year-old oak watched all of it.", t:"🚇 U6 to Alt-Tegel, walk 10 min to the Greenwich-Promenade. Free swimming spots on the east shore. The boat rental is cheap. 25 min from Friedrichstraße. Free.", c:["swimming","lakes","romantic_water"], r:"g" },
  { id:127, n:"Müggelsee beaches", a:"Köpenick", v:["vast","nature"], d:180, s:"Berlin's biggest lake — free beaches and actual wilderness", st:"Müggelsee is enormous — 7.4 km² of open water. The south shore has free sandy beaches backed by deep forest. The Müggelberge hills rise behind — Berlin's highest natural point. On a sunny day, standing at the water's edge, you'd never believe you're in a city of 3.7 million.", im:"Slavic fishermen lived here a thousand years before Berlin existed. The lake fed them, the forest sheltered them. The Spree flows out of this water toward a city that doesn't know it depends on a lake.", t:"🚇 S3 to Friedrichshagen (45 min from Alexanderplatz), then tram 60 to the lake or walk 15 min through the old town to the shore. Rübezahl beer garden on the south shore. Free beaches everywhere.", c:["swimming","lakes","nature"], r:"g" },
  { id:128, n:"Jungfernheideteich", a:"Charlottenburg", v:["local","quiet"], d:60, s:"A hidden pond for swimming in the middle of Jungfernheide park", st:"Inside the large Volkspark Jungfernheide, this pond has a small free bathing area that most Berliners don't even know exists. Surrounded by old trees and parkland. It's not glamorous — it's better. A neighbourhood secret.", im:"This was a military training ground. Then a people's park. The pond doesn't care about history. It just sits there, cool and green, waiting for someone to swim.", t:"🚇 U7 to Jakob-Kaiser-Platz, walk 10 min into the park. Or U7 Jungfernheide, walk south. The bathing pond is signed. Free. Bring a towel and snacks.", c:["swimming","lakes"], r:"g" },
